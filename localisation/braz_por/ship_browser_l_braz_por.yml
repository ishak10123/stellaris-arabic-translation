l_braz_por:
 SHIPSET_LABEL: "Conjunto de Naves"
 SHIPSETS_LABEL: "Conjuntos de Naves"
 SHIP_GRAPHICS_PREVIEW: "Prévia das Classes de Nave"
 SHIP_GRAPHICS_REQUIRED_DLC: "DLC Necessário"
 SHIP_GRAPHICS_MISSING_DLC_TOOLTIP: "§GClique para visualizar naves $CULTURE_NAME$§!"
 SHIP_GRAPHICS_CAMERA_TRANSFORM_TOOLTIP: "£camera_zoom_in£ Use o §Gbotão de rolagem do mouse para cima§! para aproximar.\n£camera_zoom_out£ Use o §Gbotão de rolagem do mouse para trás§! para afastar.\n£camera_rotate£ Segure e arraste o §Gbotão direito do mouse§! no modelo de nave para girar."
 SHIP_GRAPHICS_CORVETTE_DESC: "Corvetas são a primeira classe de nave militar disponível para os impérios. Elas são rápidas, ágeis e baratas."
 SHIP_GRAPHICS_FRIGATE_DESC: "Fragatas são uma variante avançada da Corveta e especializadas em lançamento de torpedos. Elas podem ser mais lentas e mais vulneráveis, mas causam um efeito devastador em alvos grandes."
 SHIP_GRAPHICS_DESTROYER_DESC: "Destroiers trocam a agilidade e velocidade de uma corveta por mais poder de fogo e um casco mais grosso."
 SHIP_GRAPHICS_CRUISER_DESC: "Cruzadores são versáteis e duradouros, capazes tanto de absorver quanto de causar dano."
 SHIP_GRAPHICS_BATTLESHIP_DESC: "Encouraçados são caros, mas poderosos. Com seu grande alcance de disparo, eles são excelentes em causar dano a um adversário antes de poderem atacar de volta."
 SHIP_GRAPHICS_TITAN_DESC: "Apesar de serem imensamente poderosos por si mesmos, Titãs também podem usar habilidades de Aura para impulsionar naves amigáveis."
 SHIP_GRAPHICS_BIO_TITAN_DESC: "$SHIP_GRAPHICS_TITAN_DESC$"
 SHIP_GRAPHICS_JUGGERNAUT_DESC: "Construir um Juguernauta é um grande empreendimento para qualquer império. Estas naves gigantescas funcionam tanto como estaleiros móveis como naves suporte."
 SHIP_GRAPHICS_COLOSSUS_DESC: "Estas naves imensas são equipadas não somente para enfrentarem frotas hostis, como também neutralizarem mundos inteiros."
 SHIP_GRAPHICS_OUTPOST_DESC: "Um Entreposto é o nível mais baixo de uma base estelar, tendo como única função marcar a propriedade de um sistema estelar."
 SHIP_GRAPHICS_STARBASE_CITADEL_DESC: "Uma Cidadela é o nível mais alto de aprimoramento de uma base estelar. Equipada com imensas defesas, a Cidadela é um muro quase que intransponível."
 SHIP_GRAPHICS_TRANSPORT_DESC: "Naves de Transporte carregam exércitos para atacares planetas hostis durante uma guerra. Sem blindagem e sem armas, elas precisam de uma frota de suporte quando estão em território hostil."
 SHIP_GRAPHICS_SCIENCE_DESC: "Naves Científicas são primariamente usadas para explorar novos sistemas estelares e pesquisar anomalias. Sendo uma nave civil, elas não possuem defesas e são vulneráveis."
 SHIP_GRAPHICS_CONSTRUCTOR_DESC: "Naves de Construção são necessárias para construir qualquer estação espacial. Sendo uma nave civil, elas não possuem defesas, nem armas e são vulneráveis."
 SHIP_GRAPHICS_COLONIZER_DESC: "Naves Coloniais carregam colonizadores de planetas colonizados até novos para colonização. Sendo uma nave civil, elas não possuem defesas, nem armas e são vulneráveis."
 SHIP_GRAPHICS_SHIP_SIZE_LOCKED_DESC: "§REsta classe de nave requer o DLC $SHIP_SIZE_NAME$.§!"
 SHIP_GRAPHICS_ION_CANNON_DESC: "Uma imensa arma de defesa que dispara descargas de energia devastadoras, incapacitando naves inimigas. É lenta, mas poderosa, e serve como um dissuasor formidável contra visitantes indesejados."
 SHIP_GRAPHICS_MILITARY_STATION_SMALL_DESC: "Plataformas de Defesa são fortificações orbitais imóveis, projetadas para proteger as bases estelares contra incursões hostis."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_1_DESC: "Uma estação orbital que serve como a primeira linha de defesa do sistema. Construída para projetar poder e proteger locais estratégicos."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_2_DESC: "Uma fortaleza avançada repleta de armas e sistemas de defesa. Reforçada para combates prolongados, ela atua como base para operações de frota em espaços disputados."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_3_DESC: "Esta imensa estação é o ápice da fortificação espacial e um bastião quase inabalável, capaz de resistir a ataques potentes enquanto detém o controle total da logística do sistema."
 SHIP_SIZE_SELECTOR_LOC: "SHIP_GRAPHICS_$SIZE$_DESC"
 SHIPSETS_DESCRIPTION_LABEL: "Descrição"
 SHIP_GRAPHICS_NANITE_SWARMER_DESC: "Uma nave de ataque veloz e imprevisível composta de nanites autorreplicáveis. Sem pilotos convencionais, esses enxames autônomos sobrecarregam os inimigos com suas diversas unidades, dissolvendo as defesas da oposição com uma precisão implacável."
 SHIP_GRAPHICS_NANITE_INTERDICTOR_DESC: "A Interditora é uma nave de ataque adaptativa formada por nanites autorreplicáveis que prioriza o controle sobre o caos. Esses constructos autônomos operam como uma unidade coesa, e interceptam e neutralizam ameaças com uma eficiência assustadora, desfazendo as formações inimigas com ataques coordenados e uma perseguição implacável."
 SHIP_GRAPHICS_CRISIS_CORVETTE_DESC: "Corvetas de Crise são projetadas para terem uma mobilização rápida e força dominante com suas várias unidades. Elas superam as corvetas tradicionais, instigando medo em quem se opõe à tempestade iminente."
 SHIP_GRAPHICS_CRISIS_DESTROYER_DESC: "Uma nave de guerra com armamento pesado, projetada para ter uma eficiência impiedosa. É maior e mais durável que as corvetas, possui um poder de fogo esmagador e mantém a velocidade para caçar inimigos fugitivos."
 SHIP_GRAPHICS_CRISIS_CRUISER_DESC: "Uma nave de guerra formidável que equilibra poder de fogo, durabilidade e domínio estratégico. Fortemente armada e resiliente, ela serve como pilar da carnificina iminente, destruindo as linhas inimigas com uma força implacável."
 SHIP_GRAPHICS_STAR_EATER_DESC: "Esta nave monumental é capaz de consumir estrelas inteiras, além de emitir supernovas que aniquilam sistemas completos. A Devoradora de Estrelas é mais do que uma nave de guerra, é uma mensageira do fim da galáxia, que transforma mundos em vazios sem vida por onde passa."
 SHIP_GRAPHICS_COSMO_CRISIS_DESTROYER_DESC: "Uma nave de guerra aerodinâmica infundida com energias cósmicas e capaz de atacar com precisão e força implacável. É mais que uma nave, é um arauto da nova realidade."
 SHIP_GRAPHICS_COSMO_CRISIS_BATTLECRUISER_DESC: "Uma fusão imponente de ciência e destino, dotada de um poder de fogo devastador. Esta nave de guerra altera o campo de batalha como seus mestres alteram as estrelas."
 SHIP_GRAPHICS_COSMO_CRISIS_TITAN_DESC: "Uma máquina de guerra celestial que irradia o poder da transformação iminente. Sua mera presença altera a realidade, anunciando a chegada de um universo renascido."
 SHIP_GRAPHICS_OFFSPRING_CORVETTE_DESC: "$SHIP_GRAPHICS_CORVETTE_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_DESTROYER_DESC: "$SHIP_GRAPHICS_DESTROYER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_CRUISER_DESC: "$SHIP_GRAPHICS_CRUISER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_BATTLESHIP_DESC: "$SHIP_GRAPHICS_BATTLESHIP_DESC$\n\n$OFFSPRING_SHIP_DESC$"
