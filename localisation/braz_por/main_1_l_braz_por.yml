 android_army_plural: "Exércitos Androides"
 android_army_desc: "Engrenagens semi-autônomas em uma máquina de guerra bem lubrificada, combatentes androides são mais resilientes, agressivos e responsivos à mudanças nas condições do campo de batalha que seus predecessores robóticos."
