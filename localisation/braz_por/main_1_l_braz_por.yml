 psionic_army_desc: "Soldados dotados com habilidades psiônicas. Seu foco em poderes psiônicos destrutivos levou a táticas drasticamente diferentes e estratégias no campo de batalha - seu primeiro objetivo sempre é retirar a vontade do inimigo de lutar."
