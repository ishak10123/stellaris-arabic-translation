 DIFFICULTY_ADJUSTED_AI_MODIFIERS_TOOLTIP: "§H$DIFFICULTY_ADJUSTED_AI_MODIFIERS$§!\nOs modificadores econômicos do império são multiplicados pelo bônus de §YDificuldade§! para os Impérios de IA. Por exemplo, uma tecnologia que concede +20% de £minerals£ $minerals$ pelos Empregos de [miner.GetIcon] Mineradores passará a conceder +40% para Impérios de IA na dificuldade ['concept_grand_admiral']. \n\n§PAtenção:§! Isso torna as economias de IA no Fim de Jogo consideravelmente mais fortes."
 DIFFICULTY_CIVILIAN_DESC: "O jogador recebe bônus gigantes na economia, pesquisas e capacidade naval, além de um bônus para estabelecer novos Contatos. Os tipos de Império de IA mais agressivos e conflituosos são desativados."
