 FE_ADVANCED_EMPIRES_TOOLTIP: "§HQuantidade de Inícios de IA Avançados§!\nIsso controla quantos Impérios de IA comuns iniciarão com uma vantagem em recursos, tecnologia e população. Eles não ganham bônus adicionais, exceto uma posição inicial mais forte. Esta configuração não afeta ['concept_fallen_empires']."
