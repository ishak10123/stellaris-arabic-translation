 trait_ruler_explorer_2_desc: "$trait_ruler_explorer_desc$"
 #Machine
 leader_trait_ruler_machine_intelligence: "Inteligência Maquinária"
 leader_trait_ruler_machine_intelligence_desc: "Este líder é a inteligência central que supervisiona e direciona todas as ações em um Império Maquinário."
 leader_trait_flexible_programming: "Programação Flexível"
 leader_trait_flexible_programming_desc: "Este líder possui uma programação estranhamente flexível, e é capaz de se adaptar rapidamente a novos métodos e procedimentos, se produzirem resultados superiores."
 leader_trait_rigid_programming: "Programação Rígida"
 leader_trait_rigid_programming_desc: "Este líder possui uma programação especialmente rígida que só raramente permite modificações comportamentais, mesmo quando tais mudanças melhorariam a eficiência."
 leader_trait_newboot: "Nova instalação"
 leader_trait_newboot_desc: "Este líder foi atualizado só recentemente para um estado suficientemente autônomo para permitir posições de comando."
 leader_trait_warbot_tinkerer: "Aprimorador de Máquinas de Guerra"
 leader_trait_warbot_tinkerer_desc: "Este líder possui um interesse incomum em projetos de máquinas de guerra, e está constantemente melhorando e mexendo em nossos modelos existentes."
 leader_trait_ai_aided_design: "Projeto Auxiliado por IA"
 leader_trait_ai_aided_design_desc: "Este líder constantemente roda modelos teóricos em um núcleo de memória secundário para melhorar a eficiência da construção de naves estelares."
 leader_trait_bulldozer: "Escavadeira"
 leader_trait_bulldozer_desc: "Este líder dominou a arte de transformar de maneira rápida e eficiente terreno alienígena em um estacionamento."
 leader_trait_analytical: "Analítico"
 leader_trait_analytical_desc: "Este líder dedica uma porcentagem estranhamente alta do seu poder de processamento para analisar as ciências naturais e promover o seu estudo por outros."
 leader_trait_parts_cannibalizer: "Canibalizador de Partes"
 leader_trait_parts_cannibalizer_desc: "Este líder é adepto em canibalizar partes de outras máquinas de guerra abatidas ou defeituosas para manter outras funcionando por mais tempo."
 leader_trait_demoralizer: "Desmoralizador"
 leader_trait_demoralizer_desc: "Este líder é fascinado pelas mentes frágeis de orgânicos e como elas podem ser derrubadas de maneira muito eficiente através do uso criativo de táticas de terror no campo de batalha."
 leader_trait_erratic_morality_core: "Núcleo de Moralidade Errático"
 leader_trait_erratic_morality_core_desc: "Este líder frequentemente sofre crises intensas de vergonha e arrependimento devido a mortes de inimigos devido a um núcleo de moralidade errático."
 leader_trait_maintenance_loop: "Loop de Manutenção"
 leader_trait_maintenance_loop_desc: "Este líder está constantemente envolvido em um loop de manutenção secundário, sendo cuidadosamente meticuloso com todas as naves em sua frota e reduzindo seus custos logísticos."
 leader_trait_unstable_code_base: "Código Base Instável"
 leader_trait_unstable_code_base_desc: "Este líder sofre com um código base instável, resultando em nervosismo e, às vezes, comportamento ilógico."
 leader_trait_cataloger: "Catalogador"
 leader_trait_cataloger_desc: "Este líder não consegue imaginar um chamado maior do que catalogar o universo inteiro."
 #Event Special
 leader_trait_sentinel: "Treinamento de Sentinela"
 leader_trait_sentinel_desc: "Comandantes de frotas sentinelas possuem conhecimento detalhado de táticas e anatomia Prethoryn."
 leader_trait_hive_mind: "Mente-Colmeia"
 leader_trait_hive_mind_desc: "A consciência gestalt que controla as ações de frotas Prethoryn se mostrou uma tremenda habilidade de multi-tarefas."
 leader_trait_hive_affinity: "Afinidade de Colmeia"
 leader_trait_hive_affinity_desc: "As criaturas Prethoryn que operam sob esta consciência de frota conseguiram obter um nível incomum de afinidade um com o outro. Sua disciplina de disparos aumentou imensamente, levando a uma maior taxa de disparos."
 leader_trait_void_swimmer: "Caçador do Vazio"
 leader_trait_void_swimmer_desc: "Os instintos caçadores desta consciência de frota levaram as criaturas Prethoryn sob o seu domínio a uma grande exaltação. Sua vontade de lutar os impulsiona cada vez mais."
 leader_trait_ethereal: "Etéreo"
 leader_trait_ethereal_desc: "Alguns senhores de frotas extradimensionais aprenderam a usar a natureza etérea de suas naves para aumentar muito as suas capacidades evasivas em combate."
 leader_trait_dimensional_stutter: "Instabilidade Dimensional"
 leader_trait_dimensional_stutter_desc: "Por motivos desconhecidos, as naves sob o comando deste senhor de frota extradimensional parecer alternar rapidamente entre dentro e fora da existência enquanto se movem, o que tem o efeito de aumentar suas velocidades abaixo da luz."
