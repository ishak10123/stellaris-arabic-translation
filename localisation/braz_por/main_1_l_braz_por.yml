 FE_AGGRESSIVENESS: "Agressividade da IA"
 FE_AGGRESSIVENESS_TOOLTIP: "§HAgressividade da IA§!\nIsso controla a probabilidade de Impérios de IA declararem guerra aos seus inimigos, e com isso a quantidade geral de guerras que são iniciadas durante uma campanha. Independentemente da configuração de agressividade, a IA ainda declarará guerra somente se sua atitude com relação ao alvo permitir."
