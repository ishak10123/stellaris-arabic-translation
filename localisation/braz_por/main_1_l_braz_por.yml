 clone_army_desc: "Clones especializados que atingem a idade adulta em questão de meses. Com uma vida natural de menos de uma década, a falta de iniciativa pessoal deles é vista como uma troca aceitável pela obediência total aos oficiais."
 robotic_army: "Exército de Ataque Robótico"
 robotic_army_plural: "Exércitos Robóticos"
 robotic_army_desc: "Máquinas de matar frias e sem coração desenvolvidas exclusivamente para a guerra. Elas perseguem seus objetivos incansavelmente, e são imunes aos efeitos terríveis da baixa moral que frequentemente atingem unidades de combate orgânicas."
