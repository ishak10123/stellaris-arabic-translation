 #Leader Traits
 ####################################
 #All
 leader_trait_adaptable: "Adaptável"
 leader_trait_adaptable_desc: "Este líder é rápido em adotar novos métodos e ideias comprovadamente superiores."
 leader_trait_stubborn: "Teimoso"
 leader_trait_stubborn_desc: "Este líder é teimoso e lento na hora de aceitar novos métodos e ideias, mesmo se eles forem superiores."
 leader_trait_resilient: "Resiliente"
 leader_trait_resilient_desc: "Este líder é resiliente e está em excelente condição física, o que aumenta sua expectativa de vida."
 leader_trait_substance_abuser: "Viciado"
 leader_trait_substance_abuser_desc: "Este líder recorreu à dependência química para lidar com o estresse, prejudicando sua saúde física."
 leader_trait_eager: "Ansioso"
 leader_trait_eager_desc: "Este líder está especialmente ansioso por uma tarefa."
 leader_trait_arrested_development: "Desenvolvimento Interrompido"
 leader_trait_arrested_development_desc: "O desenvolvimento e habilidades pessoais deste líder parecem estar no seu ápice."
 leader_trait_intemporal: "Atemporal"
 leader_trait_intemporal_desc: "Este líder não sofre os efeitos do tempo e não morrerá de velhice."
 #Admiral
 leader_trait_ex_fighter_pilot: "Ex Piloto de Caça"
 leader_trait_ex_fighter_pilot_desc: "Um antigo ás espacial, este líder se destaca em utilizar a velocidade e manobrabilidade de esquadrões de Caças de Ataque."
 leader_trait_trickster: "Trapaceiro"
 leader_trait_trickster_desc: "Este líder luta com astúcia, confiando no erro de direção e na surpresa para levar a melhor contra o inimigo."
 leader_trait_fleet_logistician: "Operador Logístico de Frota"
 leader_trait_fleet_logistician_desc: "Este líder dominou o campo de logística, e sabe como gerenciar suprimentos para manter os custos de manutenção baixos."
 leader_trait_fleet_organizer: "Organizador de Frotas"
 leader_trait_fleet_organizer_desc: "Este líder é especialista em organização e tem as habilidades de microgerenciamento necessárias para comandar enormes formações de naves espaciais."
 leader_trait_nervous: "Nervoso"
 leader_trait_nervous_desc: "Este líder se deixa levar pelo nervosismo e apreensão, podendo facilmente se sobrecarregar no comando de grandes formações de naves estelares."
 leader_trait_engineer: "Engenheiro"
 leader_trait_engineer_desc: "Este líder tem um dom natural para a engenharia e possui o conhecimento e as habilidades para organizar e supervisionar reparos em naves estelares durante as missões."
 leader_trait_aggressive: "Agressivo"
 leader_trait_aggressive_desc: "Este líder é famoso por sua agressividade e sobrepuja os inimigos por meio do poder de fogo superior de sua frota."
 leader_trait_cautious: "Cuidadoso"
 leader_trait_cautious_desc: "Este líder comanda com cautela, evitando riscos desnecessários e tomando cuidado para sempre manter formações com as quais as unidades da frota podem se apoiar mutuamente contra o inimigo."
 leader_trait_unyielding: "Inflexível"
 leader_trait_unyielding_desc: "Este líder prefere lutar até a morte a se render."
 leader_trait_gale_speed: "Ágil"
 leader_trait_gale_speed_desc: "Este líder acredita que velocidade e manobras rápidas são as chaves para o sucesso em qualquer batalha espacial."
 leader_trait_lethargic: "Letárgico"
 leader_trait_lethargic_desc: "Este líder é lento e preguiçoso, desempenhando tarefas com o mínimo de energia ou iniciativa."
 #General
 leader_trait_restrained: "Cuidadoso"
 leader_trait_restrained_desc: "Este líder se preocupa em minimizar as perdas e evitar mortes desnecessárias entre os soldados e civis."
 leader_trait_defender: "Defensor"
 leader_trait_defender_desc: "Este líder é um perito em defesa, conhecendo a melhor forma de lançar unidades terrestres e utilizar fortificações para fazer com que as invasões planetárias sejam as mais difíceis possível para o inimigo."
 leader_trait_attacker: "Invasor"
 leader_trait_attacker_desc: "Este líder dominou a arte de invasões planetárias, sabendo como atacar de maneira mais eficaz um planeta inimigo a partir do espaço."
 leader_trait_butcher: "Açougueiro"
 leader_trait_butcher_desc: "Este líder é cruel e não tem piedade do inimigo."
 leader_trait_glory_seeker: "Busca a Glória"
 leader_trait_glory_seeker_desc: "Este líder está sempre na linha de frente estimulando o ânimo das tropas, apesar dos riscos envolvidos."
 leader_trait_armchair_commander: "Comandante de Poltrona"
 leader_trait_armchair_commander_desc: "Este líder comanda da retaguarda, o que desmotiva as tropas da linha de frente."
 leader_trait_army_logistician: "Operador Logístico de Exército"
 leader_trait_army_logistician_desc: "Este líder consegue arrumar suprimentos do nada, diminuindo os custos de manutenção de forças terrestres."
 #Governor
 leader_trait_iron_fist: "Mão de Ferro"
 leader_trait_iron_fist_desc: "Este líder é famoso por sua perseguição implacável pela eficiência, e é capaz de tirar o máximo do trabalho escravo."
 leader_trait_army_veteran: "Veterano do Exército"
 leader_trait_army_veteran_desc: "Este líder concede tratamento especial ao exército em seu setor."
 leader_trait_retired_fleet_officer: "Oficial de Frota Aposentado"
 leader_trait_retired_fleet_officer_desc: "Este líder é um ex-oficial que apoia ativamente os estaleiros sob sua administração."
 leader_trait_architectural_interest: "Interesse Arquitetônico"
 leader_trait_architectural_interest_desc: "Este líder cultiva um forte interesse em técnicas de arquitetura e construção."
 leader_trait_agrarian_upbringing: "Criação Agrária"
 leader_trait_agrarian_upbringing_desc: "Este líder cresceu em uma fazenda e tem interesse em otimizar a produção agrícola."
 leader_trait_intellectual: "Intelectual"
 leader_trait_intellectual_desc: "Este líder tem um interesse nato pelas ciências e busca fomentar a curiosidade sobre o mundo natural nos seus súditos."
 leader_trait_environmental_engineer: "Engenheiro Ambiental"
 leader_trait_environmental_engineer_desc: "Este líder é especialista em processos avançados de formação geográfica e técnicas que minimizam os gastos."
 leader_trait_bureaucrat: "Unificador"
