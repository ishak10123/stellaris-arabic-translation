 trait_ruler_space_miner: "Minerador Espacial"
 trait_ruler_space_miner_desc: "Este líder reconhece a importância da exploração de recursos extramundo para uma nação estelar."
 trait_ruler_explorer: "Filomatia"
 trait_ruler_explorer_desc: "Este líder é conhecido por sua curiosidade insaciável, valorizando a exploração espacial acima de todo o resto."
