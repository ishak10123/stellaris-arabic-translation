 FE_CLUSTERED_STARTS: "Colocação do Império"
 FE_CLUSTERED_STARTS_TOOLTIP: "§HColocação dos Impérios§!\nIsso controla se os impérios devem surgir em aglomerados ou ser colocados aleatoriamente pela galáxia."
 FE_ADVANCED_NEAR_PLAYER: "Vizinhos Avançados"
 FE_ADVANCED_NEAR_PLAYER_TOOLTIP: "§HVizinhos Avançados§!\nIsso controla se os impérios com ['concept_advanced_empires', Inícios de IA Avançados] podem surgir próximos a um jogador. §YDesabilitar§! esta opção pode resultar em uma geração menor de inícios avançados."
 FE_MID_GAME: "Início do Meio de Jogo"
 FE_MID_GAME_TOOLTIP: "§H$FE_MID_GAME$§!\nIsso controla qual é o primeiro ano em que podem ocorrer eventos de meio de jogo, como a ['concept_machine_uprising'] e o ['concept_great_khan']."
 FE_GUARANTEED_COLONIES: "Mundos Habitáveis Garantidos"
 FE_GUARANTEED_COLONIES_TOOLTIP: "§H$FE_GUARANTEED_COLONIES$§!\nIsso controla quantos planetas habitáveis da mesma classe planetária do seu mundo natal aparecerão perto do seu sistema inicial.\n\n§RCuidado:§! Desabilitar esta opção pode significar que você não encontrará mundos habitáveis perto do seu mundo natal."
 FE_VICTORY: "Ano da Vitória"
 FE_VICTORY_TOOLTIP: "§H$FE_VICTORY$§!\nIsso controla em qual ano o jogo pode terminar, se não houver uma ['concept_endgame_crisis'] ou ['concept_war_in_heaven'] ativa. O império vencedor será aquele com a §IPontuação§! mais alta. Ainda é possível jogar após este ano.\n\nColocar este seletor no máximo desativará completamente a vitória por tempo."
 FE_END_GAME: "Início do Fim de Jogo"
 FE_END_GAME_TOOLTIP: "§H$FE_END_GAME$§!\nIsso controla qual é o primeiro ano em que podem ocorrer eventos de fim de jogo, como as ['concept_endgame_crises'] e o ['concept_fallen_empire_awakening']."
 FE_TECH_SPEED: "Custo de Tecnologia"
 FE_TECH_SPEED_TOOLTIP: "§H$FE_TECH_SPEED$§!\nIsso controla a velocidade com que impérios comuns ganham ['concept_technologies']."
 FE_TECH_SPEED_DIFFICULTY_SCALE: "Custos de Tecnologia Ajustados pela Dificuldade"
 FE_TECH_SPEED_DIFFICULTY_SCALE_TOOLTIP: "§H$FE_TECH_SPEED_DIFFICULTY_SCALE$§!\nIsso controla o quanto a dificuldade selecionada afeta o custo de pesquisa de ['concept_technologies']. O efeito é ainda maior em tecnologias mais avançadas.\n\nQuanto maior o valor, mais difícil fica o jogo, principalmente em dificuldades mais altas."
 DIFF_TECH_SCALING_OFF: "Desligado"
 DIFF_TECH_SCALING_LOW: "Baixo"
 DIFF_TECH_SCALING_NORMAL: "Normal"
 DIFF_TECH_SCALING_HIGH: "Alto"
 DIFF_TECH_SCALING_EXTREME: "Extremo"
 DIFF_TECH_SCALING_OFF_TOOLTIP: "§H$DIFF_TECH_SCALING_OFF$§!\nA dificuldade do jogo não afeta os custos de ['concept_technology']."
 DIFF_TECH_SCALING_LOW_TOOLTIP: "§H$DIFF_TECH_SCALING_LOW$§!\nA dificuldade mais alta tem um leve impacto nos custos de ['concept_technology']. Tecnologias de níveis mais altos aumentam mais que as de níveis mais baixos."
 DIFF_TECH_SCALING_NORMAL_TOOLTIP: "§H$DIFF_TECH_SCALING_NORMAL$§!\nA dificuldade mais alta tem um impacto moderado nos custos de ['concept_technology']. Tecnologias de níveis mais altos aumentam mais que as de níveis mais baixos."
 DIFF_TECH_SCALING_HIGH_TOOLTIP: "§H$DIFF_TECH_SCALING_HIGH$§!\nA dificuldade mais alta tem um grande impacto nos custos de ['concept_technology']. Tecnologias de níveis mais altos aumentam mais que as de níveis mais baixos."
 DIFF_TECH_SCALING_EXTREME_TOOLTIP: "§H$DIFF_TECH_SCALING_EXTREME$§!\nA dificuldade mais alta tem um impacto enorme nos custos de ['concept_technology']. Tecnologias de níveis mais altos aumentam mais que as de níveis mais baixos.\n\n§RAtenção:§! nas dificuldades altas, pode ser difícil, ou até impossível, derrotar os oponentes de fim de jogo."
 FE_TRADITION_SPEED: "Custo de Tradição"
 FE_TRADITION_SPEED_TOOLTIP: "§H$FE_TRADITION_SPEED$§!\nIsso controla a velocidade com que impérios comuns ganham ['concept_traditions']."
 FE_NAVAL_CAPACITY_MULT: "$NAVY_SIZE_TITLE$"
 FE_NAVAL_CAPACITY_MULT_TOOLTIP: "§H$FE_NAVAL_CAPACITY_MULT$§!\nIsso multiplica a Capacidade Naval de todos os impérios e tem efeito multiplicativo com todos os outros modificadores de Capacidade Naval.\n\n§RAtenção:§! se aumentada, esta configuração pode impactar o desempenho e o equilíbrio no fim de jogo."
 FE_COMMAND_LIMIT_MULT: "$COMMAND_LIMIT$"
 FE_COMMAND_LIMIT_MULT_TOOLTIP: "§H$FE_COMMAND_LIMIT_MULT$§!\nIsso multiplica o Limite de Comando de todos os impérios e tem efeito multiplicativo com todos os outros modificadores de Limite de Comando.\n\n§RAtenção:§! se alterada, esta configuração pode impactar o equilíbrio do jogo."
 FE_CRISES: "Força da Crise"
 FE_CRISES_TOOLTIP: "§KForça da Crise§!\nIsso controla a força da frota das ['concept_endgame_crises']. Quanto mais alto o multiplicador, mais perigosas as Crises de Fim de Jogo serão.\n\nSe a configuração §ITipo de Crise§! for definida para §ITodas§!, esse valor será multiplicado por 2 a cada crise superada.\n\nNa §YDificuldade $DIFFICULTY_ENSIGN$§! ou superior, isto também afetará as §YCrises de Meio de Jogo§!."
 FE_PRIMITIVE_WORLDS: "Civilizações Pré-MRQL e Espécies Pré-Sapientes"
 FE_PRIMITIVE_WORLDS_TOOLTIP: "§H$FE_PRIMITIVE_WORLDS$§!\nIsso controla a prevalência de ['concept_preftl_civilizations'] e ['concept_presapient_species'] na galáxia.\n\nQuanto mais alto, maior será a chance dessas civilizações e espécies serem criadas quando uma galáxia for gerada."
 FE_LOGISTIC_CEILING: "Teto de Crescimento Logístico"
 FE_LOGISTIC_CEILING_TOOLTIP: "§H$FE_LOGISTIC_CEILING$§!\nIsso controla o tamanho dos bônus de crescimento de Pop quando os planetas estão no meio de sua curva logística. Quanto mais alto, mais rápido será o crescimento dos Pops.\n\n§RCuidado:§! Se aumentada, esta configuração pode impactar o desempenho e o equilíbrio no fim de jogo."
 FE_GROWTH_SCALE: "Escalonamento Necessário de Crescimento"
 FE_GROWTH_SCALE_TOOLTIP: "§H$FE_GROWTH_SCALE$§!\nIsto determina o Crescimento de Pop de acordo com o número de Pops no império. Quanto mais alto, mais lento será o crescimento dos Pops.\n\n§RCuidado:§! diminuir isto tem impactos significativos no desempenho e equilíbrio; é altamente recomendado que uma redução aqui seja acompanhada de uma redução no §Y$FE_LOGISTIC_CEILING$§!."
 FE_LOGISTICS_FLEET_UPKEEP: "Custo de Logística da Manutenção de Frota"
 FE_LOGISTICS_FLEET_UPKEEP_TOOLTIP: "§H$FE_LOGISTICS_FLEET_UPKEEP$§!\nIsto controla a manutenção de $r_trade$ das frotas quando estão em ação ou em território inimigo. Quanto mais alto, mais caro será manter frotas em uma guerra."
 FE_LOGISTICS_PLANET_DEFICIT: "Custo de Logística do Déficit Planetário"
 FE_LOGISTICS_PLANET_DEFICIT_TOOLTIP: "§H$FE_LOGISTICS_PLANET_DEFICIT$§!\nIsto controla o custo de $r_trade$ para abastecer planetas com déficits locais. Quanto mais alto, mais caro será ter planetas superespecializados com déficits locais grandes, mesmo se forem abastecidos por outros planetas do seu império."
