 trait_ruler_home_in_the_sky: "O Lar é no Céu"
 trait_ruler_home_in_the_sky_desc: "Este líder busca as estrelas."
 trait_ruler_industrialist: "Mineração Acelerada"
 trait_ruler_industrialist_desc: "Este líder é focado em aumentar a produção de minerais."
 trait_ruler_eye_for_talent: "Tem Olho para Talento"
 trait_ruler_eye_for_talent_desc: "Este líder é considerado como excepcionalmente perceptivo, identificando talento onde outros veem apenas estranhezas ou incompetência."
 trait_ruler_deep_connections: "Conexões Profundas"
 trait_ruler_deep_connections_desc: "Este líder está firmemente fincado na rede de labirintos que compõe a máquina política."
 trait_ruler_deep_connections_2: "$trait_ruler_deep_connections$ II"
 trait_ruler_deep_connections_2_desc: "$trait_ruler_deep_connections_desc$"
 trait_ruler_charismatic: "Carismático"
 trait_ruler_charismatic_desc: "Este líder é excepcionalmente carismático, fazendo com que sua vontade aconteça com facilidade."
 trait_ruler_champion_of_the_people: "Campeão do Povo"
 trait_ruler_champion_of_the_people_desc: "Este líder parece realmente se importar com os seus súditos."
 trait_ruler_feedback_loop: "Ciclo de Retroalimentação"
 trait_ruler_feedback_loop_desc: "Ciclos de retroalimentação eficientes e análises de ação-reação melhoram bastante a capacidade de previsão de resultados desta unidade."
 trait_ruler_expansionist: "Expansionista"
 trait_ruler_expansionist_desc: "Este líder busca aumentar suas fronteiras"
 trait_ruler_fertility_preacher: "Pregador da Fertilidade"
 trait_ruler_fertility_preacher_desc: "Este líder se destaca na obtenção de recursos vitais para uma população emergente."
 trait_ruler_investor: "Investidor"
