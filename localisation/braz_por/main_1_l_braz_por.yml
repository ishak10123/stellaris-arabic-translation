 slave_army_plural: "Exércitos Escravos"
 slave_army_desc: "Soldados escravos que servem seus senhores no campo de batalha. A maioria é alistada à força, mas muitos escravos são voluntários em uma tentativa desesperada de aumentar suas porções de comida ou escapar do trabalho cruel."
