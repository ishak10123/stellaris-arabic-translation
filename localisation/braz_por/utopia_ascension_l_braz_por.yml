 covenant.tooltip: "§YHaverá um preço a ser pago.§!\n\n"
 covenant.cycle.tooltip: "§RNão faça isso.§!\n\n"
 covenant.whisperers.desc: "Está feito. Formamos um Pacto com $whisperers_in_the_void_color_article$, e eles já começaram a compartilhar seus segredos com nossos cientistas e líderes. O conhecimento deles nos beneficiará imensamente.\n\nO único ponto negativo parece ser um aumento súbito de transtornos mentais e suicídios entre a população geral, e alguns de nossos mundos estão sofrendo uma enxurrada de assassinatos e ataques inexplicáveis cometidos por indivíduos até então estáveis e bem-ajustados. Nossas clínicas e sanatórios estão com dificuldade para lidar com o aumento súbito de pacientes."
 covenant.whisperers.option: "Podemos lidar com isso."
 covenant.eater.desc: "Está feito. Formamos um Pacto com $the_eater_of_worlds_color_article$ e os efeitos já podem ser sentidos em nosso Exército e Marinha. Nossos soldados agora lutam com uma ferocidade que se aproxima da selvageria, e até mesmo as armas de nossas naves parecem ter fome pelas mortes de nossos inimigos.\n\nCertamente, o desaparecimento súbito e misterioso da população inteira de uma cidade em uma de nossas colônias também é consequência disso; seu povo aparentemente levado pela Comedora como o tributo prometido.\n\nParece um preço pequeno a pagar – pressupondo, é claro, que a Comedora não sinta fome novamente..."
 covenant.eater.option: "Esperamos que não."
 covenant.instrument.desc: "Está feito. Formamos um Pacto com $the_instrument_of_desire_color_article$. Não demorou muito para sentirmos os efeitos: relatos de novos veios abundantes de minérios encontrados em nossas minas, negócios que estavam prestes a falir recuperando-se repentinamente, recursos raros e valiosos encontrados em asteroides que antes tínhamos certeza de que não continham nada além de gelo e rocha.\n\nAo que parece, nosso império está entrando em uma era de ouro de riqueza e prosperidade, assim como o Instrumento nos prometeu. Mas qual foi o custo mencionado...?"
 covenant.instrument.option: "Tenho certeza que não é nada demais."
 covenant.composer.desc: "Está feito. Formamos um Pacto com $the_composer_of_strands_color_article$. Não demorou muito para sentirmos os efeitos: um aumento súbito e significativo na quantidade de nascimentos, sem dúvida obra da Compositora. Portanto, junto com esses efeitos positivos, também experimentamos um aumento em novas e estranhas mutações: bebês nascendo com membros e órgãos a mais... alguns dos quais não se parecem nem um pouco com qualquer parte de sua anatomia anteriormente catalogada.\n\nFelizmente, as poucas mortes resultantes disso são mais que compensadas pelo aumento na taxa de nascimento e pela aparente nova vitalidade de nosso povo."
 covenant.composer.option: "Fizemos a coisa certa."
 covenant.cycle.desc: "Está pronto. Formamos um Pacto com o §YFim do Ciclo§!. Quando aceitamos sua oferta, apenas duas palavras foram ditas: §R\"CINQUENTA ANOS\"§!. Depois, silêncio enquanto fomos deixados para contemplar as consequências futuras do que acabamos de causar em nós mesmos."
 covenant.cycle.option: "Que os Espíritos tenham misericórdia de nós."
 covenant_shroud_marked: "Marcado pelo Véu"
 covenant_shroud_marked_desc: "Este mundo está marcado pelo Véu.\n\n§RAlguma coisa muito ruim vai acontecer aqui.§!"
