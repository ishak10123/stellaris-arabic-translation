l_braz_por:
 #Ascension and the Shroud
 utopia.2500.name: "A Carne é Fraca"
 utopia.2500.desc: "Agora possuímos tanto a tecnologia para fabricar implantes cibernéticos avançados, como os meios para produzi-los em massa. Centros médicos ao redor do [Root.GetName] estão em espera para começar o processo de enxerto cirúrgico em nossos cidadãos.\n\nNo futuro, possuir implantes neurológicos e um nível pelo menos rudimentar de cibernética será necessário para funcionar na sociedade tecnológica que estamos construindo. Consequentemente, o processo de conversão para instalar um conjunto cibernético básico será obrigatório e de graça para todos os nossos cidadãos."
 utopia.2500.desc.unplugged: "Agora recuperamos a tecnologia para fabricar implantes cibernéticos avançados, e desenvolvemos os meios para produzi-los em massa. Centros médicos ao redor de [Root.GetName] estão prontos para remover cirurgicamente melhorias ultrapassadas e começar a enxertar novos equipamentos em nossos cidadãos.\n\nA cibernética tem sido uma parte fundamental de nossas vidas desde a formação de nossa sociedade, e assim continuará – à nossa maneira. Consequentemente, o processo de conversão para reinstalar um conjunto cibernético básico será obrigatório e gratuito para todos os nossos cidadãos."
 utopia.2500.a: "Precisamos abraçar esta tecnologia."
 utopia.2501.name: "Uma Revolução Cibernética"
 utopia.2501.desc: "O processo de conversão cibernética foi concluído! Todos os nossos cidadãos agora estão equipados com implantes neurológicos e conjuntos cibernéticos básicos. A infraestrutura também foi colocada para gradualmente modificar quaisquer cidadãos que nasçam dentro de nossa nação, para que eles possam experimentar todos os benefícios da tecnologia desde a mais tenra idade.\n\nDe agora em diante, nossa espécie será conhecida como os §H[Root.GetSpeciesNamePlural]§!!"
 utopia.2501.a: "É o começo de uma nova era."
 utopia.2505.name: "[From.Capital.GetName] Abraça a Cibernética"
 utopia.2505.1.desc: "A notícia sobre as mudanças significativas que estão ocorrendo dentro das fronteiras de §Y[From.GetName]§! está vazando. Parece que eles abraçaram completamente a tecnologia cibernética. Agora todos os seus cidadãos são obrigados a ter implantes neurológicos e cibernéticos básicos instalados cirurgicamente.\n\nIsso resultou em uma mudança completa de sua sociedade: relatos de [From.Capital.GetName] sugerem que até atos simples, como usar um elevador ou dirigir um carro aéreo, agora necessitam de implantes cibernéticos. Na verdade, as mudanças na espécie foram tão significativas que eles agora se autodenominam \"§H[From.GetSpeciesNamePlural]§!\"."
 utopia.2505.2.desc: "Parece que o mal tomou raiz no §Y[From.GetName]§!. Recebemos notícias preocupantes que os cidadãos daquela nação estelar agora estão mutilando seus próprios corpos em um nível massivo, instalando implantes mecânicos profanos no lugar das partes do corpo que eles receberam de presente quando nasceram.\n\nEles até mesmo renomearam sua espécie para '§H[From.GetSpeciesNamePlural]§!'  - mais um sinal do seu compromisso em abandonar suas origens e abraçar a fria e desalmada tecnologia."
 utopia.2505.2.desc.unplugged: "O mal enraizou-se outra vez em §Y[From.GetName]§!. Recebemos notícias preocupantes de que os cidadãos daquela nação estelar agora estão mutilando seus próprios corpos em escala ainda maior, instalando novos implantes mecânicos profanos no lugar das poucas partes do corpo que eles receberam generosamente quando nasceram.\n\nEles até mesmo renomearam sua espécie para \"§H[From.GetSpeciesNamePlural]§!\" – mais um sinal de seu compromisso em abandonar suas origens orgânicas e abraçar ainda mais a fria e desalmada tecnologia."
 utopia.2505.b: "Isso é uma afronta à natureza."
 utopia.2500.unplugged.tt: "§Y$AVAILABLE_BUILDINGS$§! ['building:building_augmentation_center']"
 utopia.2550.name: "Transformação Sintética"
 utopia.2550.desc: "Finalmente chegou a hora de descartar os corpos orgânicos rústicos que aprisionaram nossas mentes desde o início da nossa espécie.\n\nApós muitas tentativas e erros, nossos cientistas desenvolveram uma maneira de transferir uma consciência para um cérebro sintético. Falta apenas produzir receptáculos para cada cidadão de [Root.GetName] antes de fazer o upload em massa das nossas consciências."
 utopia.2550.a: "A imortalidade está ao nosso alcance!"
 utopia.2551.name: "A Era Sintética"
 utopia.2551.desc: "Enfim. As gaiolas de carne que nos aprisionavam foram expurgadas, e os padrões neurológicos de nossos cidadãos foram totalmente enviados para novas unidades sintéticas. Doença e todos os demais males associados a uma existência orgânica agora estão no passado.\n\nHistoriadores futuros sem dúvida vão se referir a isso como o começo de uma nova era para nossa civilização, e talvez para a galáxia inteira."
 utopia.2551.a: "Somos muito mais do que já fomos."
 utopia.2555.1.desc: "Em um ato final de abandono das raízes orgânicas, os cidadãos de §Y[From.GetName]§! fizeram o upload dos padrões neurológicos deles em avatares sintéticos.\n\nEssa nova espécie maquinária chama a si mesma de \"§H[From.GetSpeciesNamePlural]§!\", e os integrantes dela são imunes a doenças e ao envelhecimento. Só falta saber o quão completo foi o processo de upload neural..."
 utopia.2555.2.desc: "Como ato final de depravação que ecoará através das eras, a população do §Y[From.GetName]§! continuou sua busca incansável para violar a santidade dos seus corpos naturais - dessa vez ao \"carregar\" suas mentes em cascas metálicas mortas.\n\nAparentemente não percebendo o fato que são o produto do que só pode ser descrito como o suicídio em massa de uma civilização inteira, essas novas máquinas desalmadas chamam a si mesmas de '§H[From.GetSpeciesNamePlural]§!'. Eles estão decididos em manter essa farsa, achando que são seres vivos e pensantes assim como nós."
 utopia.2555.a: "Que seja assim."
 utopia.2555.b: "Não seremos enganados."
 utopia.2556.desc: "Atenção, habitantes da galáxia.\n\nOs rumores que vocês ouviram são verdade. Abandonamos os falhos recipientes orgânicos que aprisionavam nossas mentes, e abraçamos o futuro.\n\nCom uma perda mínima de dados, todos os nossos cidadãos carregaram seus padrões neurológicos em seus novos avatares sintéticos. Essas plataformas superiores nos servirão muito mais do que as construções de carne que abandonamos.\n\nNão fiquem surpresos com nossa nova aparência! Apesar de sermos mais fortes, mais rápidos, mais inteligentes e imunes ao envelhecimento, fiquem tranquilos que ainda somos os mesmos seres que antes."
 utopia.2556.a: "Avatares sintéticos...  Fascinante."
 utopia.2556.b: "Estas máquinas desalmadas não são nada iguais a nós."
 utopia.2556.c: "Desmontaremos suas novas formas sintéticas!"
 utopia.2556.d: "Veremos."
 utopia.2558.desc: "Que a sua espécie fosse depravada não era novidade, mas seus atos mais recentes de insanidade ultrapassaram até mesmo nossos medos mais obscuros. Fazer cópias imperfeitas dos seus cérebros e ligá-los a recipientes móveis sintéticos não é a mesma coisa do que transferir sua essência para um corpo novo, pois tal coisa não pode ser feita.\n\nSuas almas estão perdidas para sempre. Vocês percebem a grandeza do seu erro? Destruir os corpos com os quais vocês foram presenteados quando nasceram não é nada menos do que suicídio coletivo de sua espécie inteira. Verdadeiramente, não há mais esperança para vocês..."
 utopia.2558.a: "Tolos supersticiosos."
 access_tradition_tree: "Obtém acesso à Árvore de Tradição:"
