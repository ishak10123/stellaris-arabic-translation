 whisperers_covenant_chain_title: "Os Sussurradores no Vazio"
 whisperers_covenant_chain_desc: "Criamos um vínculo com uma entidade do Véu conhecida como $whisperers_in_the_void_color_article$. Insondáveis, eles nos concederam fragmentos de seu poder, por um preço. E tudo indica que há mais por vir.\n\nSegundo nossa equipe de [GetTelepathPlural], será mais fácil fortalecer essa ligação se passarmos a agir conforme a vontade de nossa entidade patronal.\n\nOs Sussurradores apreciam novos conhecimentos, segredos silenciosos e conspirações. Encontram êxtase na simples alegria de uma mente que transborda, prestes a se romper."
 whisperers_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 whisperers_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 eater_covenant_chain_title: "A Comedora de Mundos"
 eater_covenant_chain_desc.intro: "Criamos um vínculo com uma entidade do Véu conhecida como $the_eater_of_worlds_color_article$. Insaciável, ela nos concedeu fragmentos de seu poder, por um preço. E tudo indica que há mais por vir.\n\nSegundo nossa equipe de [GetTelepathPlural], será mais fácil fortalecer essa ligação se passarmos a agir conforme a vontade de nossa entidade patronal."
 eater_covenant_chain_desc: "$eater_covenant_chain_desc.intro$\n\nA Comedora está faminta. Ela anseia pela guerra, o doce sabor do conflito e do lamento."
 eater_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 eater_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 composer_covenant_chain_title: "A Compositora dos Fios"
 composer_covenant_chain_desc.intro: "Criamos um vínculo com uma entidade do Véu conhecida como $the_composer_of_strands_color_article$. Acolhedora, ela nos concedeu fragmentos de seu poder, por um preço. E tudo indica que há mais por vir.\n\nSegundo nossa equipe de [GetTelepathPlural], será mais fácil fortalecer ainda mais essa ligação se passarmos a agir conforme a vontade de nossa entidade patronal."
 composer_covenant_chain_desc: "$composer_covenant_chain_desc.intro$\n\nA Compositora deseja manipular a genética e libertar a carne das amarras da evolução. Ela prega o respeito à vida e à natureza, e nos conta sobre a santidade da carne."
 composer_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 composer_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 instrument_covenant_chain_title: "O Instrumento de Desejo"
 instrument_covenant_chain_desc.intro: "Criamos um vínculo com uma entidade do Véu conhecida como $the_instrument_of_desire_color_article$. Atencioso, ele nos concedeu fragmentos de seu poder, por um preço. E tudo indica que há mais por vir.\n\nSegundo nossa equipe de [GetTelepathPlural], será mais fácil fortalecer essa ligação se passarmos a agir conforme a vontade de nossa entidade patronal."
 instrument_covenant_chain_desc: "$instrument_covenant_chain_desc.intro$\n\nO Instrumento anseia pelo desejo. Prazeres indulgentes, decadência e escravidão definem a essência do Instrumento."
 instrument_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 instrument_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 utopia.2671.name: "Nosso Vínculo Se Fortalece"
 utopia.2671.desc: "Estamos compreendendo nossa entidade patronal cada vez mais. Para ela, somos um simples detalhe. Insetos na casa dela. Mesmo assim, ela nos aprecia e deixou cair outra gota de poder sobre nós.\n\nNossos telepatas agora estão mais conectados com a entidade e, para celebrar o nosso pacto, nós fomos inspirados a criar um monumento. Nele, os nossos melhores telepatas podem tentar uma comunhão com §Y[GetShroudPatron]§!."
 utopia.2671.a: "Nós nos sentimos mais seguros com o acolhimento da Compositora."
 utopia.2671.a.tt: "Nossos telepatas agora produzem mais £pop£ §YCrescimento de Pop§!.\n\nNós podemos construir um £building£ §YSanctum da Compositora§! em um de nossos planetas."
 utopia.2671.b: "Nós também temos fome. A guerra pode nos saciar."
 utopia.2671.b.tt: "Nossos telepatas agora produzem mais £mod_country_naval_cap_add£ Capacidade Naval.\n\nE podemos construir um £building£ §YSanctum da Comedora§! em um dos nossos planetas."
 utopia.2671.c: "Não há nada mais belo do que o desejo."
 utopia.2671.c.tt: "Nossos telepatas agora produzem mais £amenities£ Confortos.\n\nE podemos construir um £building£ §YSanctum do Instrumento§! em um dos nossos planetas."
 utopia.2671.d: "Uma mente cheia não tem espaço para dúvidas."
 utopia.2671.d.tt: "Nossos telepatas agora produzem mais $r_research$.\n\nE podemos construir um £building£ §YSanctum dos Sussurradores§! em um dos nossos planetas."
 utopia.2676.name: "Potencial Alcançado"
 utopia.2676.desc: "Os mistérios do §HVéu§! são estranhos demais para desvendarmos, mas estamos mais conectados com nossa entidade patronal, §Y[GetShroudPatron]§!. Em todo lugar, conseguimos sentir a entidade no fundo de nossas mentes, e seu poder se infiltra em nossa realidade a partir das fissuras em nossa psique."
 utopia.2676.a: "A vontade da carne é sagrada."
 utopia.2676.b: "Discórdia é devoção."
 utopia.2676.c: "Tu cobiçarás."
 utopia.2676.d: "Segredo é segurança."
 utopia.2681.name: "Resquícios de Poder"
 utopia.2681.desc: "§H[GetShroudPatron]§!, nossa entidade patronal, depositou uma parte de sua energia em uma dobra do §HVéu§!, pronta para ser extraída. Nosso vínculo estreito permitirá que um de nós absorva com segurança esse poder.\n\nAlguns candidatos foram escolhidos, mas apenas um deles poderá receber o privilégio. Precisamos decidir quem será."
 utopia.2681.a: "§H[leader_1.GetTitle]§! [leader_1.GetName]"
 utopia.2681.b: "§H[leader_2.GetTitle]§! [leader_2.GetName]"
 utopia.2681.c: "§H[leader_3.GetTitle]§! [leader_3.GetName]"
 utopia.2681.d: "§H[leader_4.GetTitle]§! [leader_4.GetName]"
 utopia.2682.name: "Elevado"
 utopia.2682.desc.intro: "Está feito. À medida que o poder foi imbuído em [chosen_leader.GetName], todos ao redor puderam [GetFeelLoc] sua presença psiônica, poderosa e imponente. Todos agora lhe conhecerão como"
 utopia.2682.desc.patron_champion: "$utopia.2682.desc.intro$ a eminência [GetImmortalLoc] de §H[GetShroudPatron]§!."
 utopia.2682.desc.shroudshaper_champion: "$utopia.2682.desc.intro$ o ser $leader_trait_shroudshaper$ de §H[This.GetName]§!."
 utopia.2682.desc.previous_chosen_killed: "O evento teve um efeito devastador em §H[previous_chosen_leader.GetName]§! e sua heresia, uma vez considerado o Ser Escolhido de nossa antiga entidade patronal. De seu local de exílio, [previous_chosen_leader.GetHeShe] definhou em silêncio quando os últimos resquícios de poder psiônico abandonaram sua forma destruída."
 utopia.2682.desc.previous_chosen_lost_patron: "O evento teve efeitos notáveis em §H[chosen_leader_lost_patron.GetName]§!. Embora uma energia psiônica considerável ainda lhe envolvesse, [chosen_leader_lost_patron.GetHeShe] perdeu o poder que uma vez fora concedido por nossa antiga entidade patronal."
 utopia.2682.a: "Essa pessoa estava destinada a ser escolhida."
 utopia.2682.a.shroudshaper: "Este é o seu destino."
 utopia.2686.name: "Armamentos Abençoados"
 utopia.2686.desc: "O Conclave de Telepatas fez uma descoberta ao utilizar o poder de §H[GetShroudPatron]§!, nossa entidade patronal. Antes, apenas indivíduos psiônicos podiam perceber totalmente a extensão do Pacto. Agora, elaboramos uma forma de deixar o poder fluir por espaçonaves inteiras, em uma escala jamais vista.\n\nSe desejarmos, a marca de §H[GetShroudPatron]§! poderá levar nossas naves ainda mais longe."
 utopia.2686.a: "O que é um casco se não carne?"
 utopia.2686.b: "Nossas naves também são vorazes."
 utopia.2686.c: "Essas naves querem um propósito."
 utopia.2686.d: "Segredos são armas inigualáveis."
 building_composer_sanctum: "Sanctum da Compositora"
 building_composer_sanctum_desc: "O Sanctum é um lugar dedicado à comunhão com a Compositora. [GetComposerSanctumDesc]"
 building_composer_sanctum_desc_default: "Aqui, a carne é tão livre quanto o pensamento, permitindo ao Véu nos refazer além de nossos meios."
 building_composer_sanctum_desc_machine: "Aqui, circuitos correm desimpedidos por fatores físicos. O Véu é capaz de otimizar nossos processadores de maneiras que vão além de nossos parâmetros convencionais."
 building_eater_sanctum: "Sanctum da Comedora"
 building_eater_sanctum_desc: "O Sanctum é um lugar dedicado à comunhão com a Comedora. Aqui, o Véu nos prepara para a guerra conforme planejamos nosso próximo [GetEaterSanctumDesc]."
 building_eater_sanctum_desc_machine: "domínio"
 building_eater_sanctum_desc_default: "banquete"
 building_instrument_sanctum: "Sanctum do Instrumento"
 building_instrument_sanctum_desc: "O Sanctum é um lugar dedicado à comunhão com o Instrumento. [GetInstrumentSanctumDesc]"
 building_instrument_sanctum_desc_gestalt: "Aqui, o excesso é acumulado, higienizado e redistribuído para promover a estabilidade no coletivo."
 building_instrument_sanctum_desc_default: "Aqui, riquezas são acumuladas e depois negociadas em um frenesi de consumo que nunca nos deixa completamente satisfeitos."
 building_whisperers_sanctum: "Sanctum dos Sussurradores"
 building_whisperers_sanctum_desc: "O Sanctum é um lugar dedicado à comunhão com os Sussurradores. [GetWhisperersSanctumDesc]"
 building_whisperers_sanctum_desc_machine: "Aqui, segredos são trocados em transações enigmáticas, novos conhecimentos são codificados e os nossos sinais se juntam ao coro."
 building_whisperers_sanctum_desc_default: "Aqui, segredos são trocados em voz baixa, novos conhecimentos são selados e os nossos murmúrios se juntam ao coro."
