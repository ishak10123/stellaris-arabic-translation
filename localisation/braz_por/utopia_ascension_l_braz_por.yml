 utopia.3400.name: "Uma Soberania Divina"
 utopia.3400.desc: "A entidade [GetImmortalLoc] conhecida como §H[chosen_one.GetName]§! – anteriormente membro da espécie [chosen_one_species.GetName], agora algo muito maior – atraiu um grande culto de seguidores devotos em [Root.GetName]. Após conquistar a adoração de muitos como uma divindade suprema, um pedido foi feito oficialmente para coroar [chosen_one.GetName] como governante permanente de nosso grande império, sob o título de [chosen_one.GetTitle], doravante até a eternidade."
 utopia.3400.a: "Um paranormal poderoso, mas um Deus? Dificilmente."
 utopia.3400.b: "Que o reino [chosen_one.GetHerHis] se espalhe até o infinito... e além!"
 reject_god_emperor: "[chosen_one.GetName] permanecerá como [chosen_one.GetTitle]."
 utopia.3401.name: "[chosen_one.GetTitle] Assume o Poder em [From.Capital.GetName]"
 utopia.3401.desc.intro: "Um indivíduo [chosen_one_species.GetAdj] extremamente poderoso e [GetPsychicNoun] assumiu o controle de §H[From.GetName]§!! Este"
 utopia.3401.desc.outro: "denominado em meio a sussurros de O Escolhido por seus seguidores, foi coroado em [From.Capital.GetName] durante uma cerimônia exuberante nesta manhã. Um comunicado celebrando o governo eterno de §H[chosen_one.GetRulerTitle] [chosen_one.GetRegnalName]§! foi enviado logo em seguida a todos os governos interestelares."
