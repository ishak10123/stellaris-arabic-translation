 utopia.3100.name: "Fogo e Ruína"
 utopia.3100.desc_prefix: "[Root.Capital.GetName]... A visão é confusa e imprecisa, mas não há dúvida: é [Root.Capital.GetName], nossa capital. "
 utopia.3100.desc_suffix: "\n\n§HNÃO UM ENTRE MUITOS. HÁ DE ACONTECER. ASSIM COMO O SOL NASCE. ESTE É O SEU DESTINO.§!\n\nAssim como começou, a visão se encerra repentinamente, deixando para trás um miasma de energia psiônica."
 utopia.3100.desc_default: "$utopia.3100.desc_prefix$As grandes cidades parecem diferentes, mas ao mesmo tempo familiares, mesmo através da muralha obscura de chamas e fumaça. Milhares... não, milhões de corpos mutilados amontoam-se nas ruas, todos eles [Root.GetSpeciesNamePlural]. O cheiro de decomposição é insuportável.\n\n§H\"SEU FUTURO.\"§!\n\nNenhum ser vivo resta nas ruínas. No céu acima, instalações orbitais gigantescas começaram sua queda lenta e inevitável rumo ao planeta, seguidas por um rastro de fumaça. Estaríamos testemunhando um futuro possível entre muitos?$utopia.3100.desc_suffix$"
 utopia.3100.desc_hive: "$utopia.3100.desc_prefix$As grandes cidades parecem diferentes, mas ao mesmo tempo familiares, mesmo através da muralha obscura de chamas e fumaça. Milhares... não, milhões de corpos mutilados amontoam-se nas ruas, todos eles [Root.GetSpeciesNamePlural]. O cheiro de decomposição é onipresente.\n\n§H\"SEU FUTURO.\"§!\n\nNenhum ser vivo resta nas ruínas. No céu acima, instalações orbitais gigantescas começaram sua queda lenta e inevitável rumo ao planeta, seguidas por um rastro de fumaça. Estaríamos testemunhando um futuro possível entre muitos?$utopia.3100.desc_suffix$"
 utopia.3100.desc_machine: "$utopia.3100.desc_prefix$As grandes cidades parecem diferentes, mas ao mesmo tempo identificáveis, mesmo através da muralha obscura de chamas e fumaça. Milhares... não, milhões de unidades desmontadas amontoam-se nas ruas, todas elas [Root.GetSpeciesNamePlural]. Estamos cercados de destruição.\n\n§H\"SEU FUTURO.\"§!\n\nNão há nada funcional em meio às ruínas. No céu acima, instalações orbitais gigantescas começaram sua queda lenta e inevitável rumo ao planeta, seguidas por um rastro de fumaça. Estaríamos recebendo um futuro possível entre muitos?$utopia.3100.desc_suffix$"
 utopia.3100.a: "§GCanalizar as energias em um Avatar.§!"
 utopia.3100.b: "§YBenefício: Alcance do Sensor Aumentado§!"
 utopia.3100.c: "§RBenefício: Força dos Escudos Aumentada.§!"
 utopia.3110.name: "Aparições em Conflito"
 utopia.3110.desc: "O Véu é tempestuoso aqui. Conforme correntes gigantescas de energia psiônica são canalizadas, reações violentas fazem surgir aparições semi-inteligentes.\n\nEsses espíritos confusos geralmente se enfrentam, liberando quantidades fenomenais de energia psíquica em batalhas que podem durar milênios. Aliás, diversos duelos parecem estar acontecendo neste momento.\n\nDevemos agir com cuidado."
 utopia.3120.name: "Visitantes Psiônicos"
 utopia.3120.desc_suffix: "Visitantes, como nós: uma poderosa sonda psiônica criada por mentes tão alienígenas para nós quanto são para o Véu.\n\nConforme seu eco psiônico toca o nosso, uma imagem fraca tremeluz em nosso âmago: criaturas orgânicas gigantescas flutuando em uma atmosfera gasosa e espessa, assistidas por enxames de criaturas menores."
 utopia.3120.desc_machine: "Detectamos uma presença Véu adentro. $utopia.3120.desc_suffix$"
 utopia.3120.desc_default: "De repente, uma presença se faz sentir Véu adentro. $utopia.3120.desc_suffix$"
 utopia.3130.name: "Areias sem Fim"
 utopia.3130.desc: "Um deserto sem fim se estende à nossa frente. Já estivemos aqui.\n\n§H\"Shala'kul milem zunak?\"§!\n\nAlgo surge da areia. É difícil enxergar.\n\n§H\"Zharabi, melasuk.\"§!\n\nAs palavras são igual trovão, faladas por uma boca pela qual nunca houve a intenção de existir. Sentimo-nos obrigados a responder."
 utopia.3130.a: "Shashka malak."
 utopia.3130.b: "Tirit nali dasumara!"
 utopia.3130.c: "Kunak de'Kirak."
 utopia.3140.name: "As Multitudes"
 utopia.3140.desc_common: "a natureza de nossa existência é revelada. Um multiverso onde milhares de galáxias como a nossa estão presas em ciclos infinitos de conflitos.\n\nComeça, termina e começa outra vez. E a cada ciclo trilhões de"
 utopia.3140.desc_suffix: "§H\"Assim é\"§! uma voz sussurra, §H\"e assim sempre será.\"§!"
 utopia.3140.desc_default: "De repente, em um momento doloroso de clareza, $utopia.3140.desc_common$ vidas são ameaçadas.\n\n$utopia.3140.desc_suffix$"
 utopia.3140.desc_machine: "De repente, em um momento surpreendente de clareza, $utopia.3140.desc_common$ variáveis são ameaçadas.\n\n$utopia.3140.desc_suffix$"
 utopia.3150.name: "Vozes dos Caídos"
 utopia.3150.desc: "Estamos olhando para a nossa galáxia de cima, a uma distância que só pode estar a centenas de milhares de anos luz. Sem aviso, a corrente psiônica nos suga para baixo em direção à miríade de estrelas a uma velocidade incrível, para a região do espaço que pertence a um dos Impérios Caídos - o [fallen_empire.GetName].\n\nAs estrelas passam por nós, depois os planetas até que a visão finalmente para em uma cidade [fallen_empire.GetSpeciesName]. Espirais incríveis sobem em direção ao céu, auxiliadas por gerações de tecnologia anti-gravidade além da nossa. A corrente nos leva para uma espiral, atravessando parede após parede até que atingimos uma grande sala de reunião. Estão presentes dois [fallen_empire.GetSpeciesNamePlural], flutuando confortavelmente em cadeiras de gravidade zero enquanto conversam um com o outro em vozes macias.\n\nEles não percebem nossa presença."
 utopia.3150.a: "§YTente entrar em suas mentes em busca de segredos.§!"
 utopia.3151.name: "§GSegredos Tecnológicos§!"
 utopia.3151.v1.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.1.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.4.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v2.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.2.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.5.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v3.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.3.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.6.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.a.desc: "Os [fallen_empire.GetSpeciesNamePlural] claramente são dignatários de algum tipo, discutindo questões de Estado. Lenta e certamente, a visão se aproxima deles enquanto o seu discurso alienígena gradualmente é transformado em palavras que possuem significado para nós."
 utopia.3151.b.desc: "O brilho mental dos dois [fallen_empire.GetSpeciesNamePlural] é gigantesco. Como uma flor desabrochando, suas mentes são abertas e desnudas. Seria muito fácil entrar nelas."
 utopia.3151.c.desc: "Pronto. Segredos tecnológicos arrancados dos cantos de suas mentes, tão fácil quanto copiar um arquivo de um computador aberto. Os [fallen_empire.GetSpeciesNamePlural] permanecem ignorantes do roubo que acabou de acontecer dentro de suas mentes."
 utopia.3151.1.desc: "§H\"...está louca. Se ela acha que as pessoas estariam dispostas a aceitar até um lapso momentâneo nos padrões de vida ao qual foram acostumadas, há...\"§!"
 utopia.3151.2.desc: "§H\"...é uma desgraça. Imagine se as raças mais jovens ao menos suspeitassem que não mais compreendemos nossa própria tecnologia! Devemos...\"§!"
 utopia.3151.3.desc: "§H\"...estão ficando cada vez mais poderosos. Os Elementos do Conselho estão convencidos que, a não ser que façamos alguma coisa...\"§!"
 utopia.3151.4.desc: "§H\"...eu não me importo com o que o Conselho diz. Os iniciantes ainda estão milênios atrás de nós, e suas frotas miseráveis não são mais ameaçadoras do que um mosquito Gazuriano tentando consumir um lagarto de fogo Hilaxi. Não há necessidade de...\"§!"
 utopia.3151.5.desc: "§H\"...ainda acham que ações punitivas não são necessárias. Eles são jovens e descuidados, mas nós também já fomos assim. Ainda há tempo para eles...\"§!"
 utopia.3151.6.desc: "§H\"...e talvez seja por isso que deveríamos ter dado passos para exterminar as raças mais jovens antes de elas ficarem poderosas demais. Preciso dizer que concordo com ele, mas o Conselho acredita que agora é tarde demais para...\"§!"
 utopia.3152.name: "Segredos Inauditos"
 utopia.3152.desc: "Os [fallen_empire.GetSpeciesNamePlural] claramente são dignatários de algum tipo, discutindo questões de Estado. Lenta e certamente, a visão se aproxima deles enquanto o seu discurso alienígena gradualmente se transforma em palavras que possuem significado para nós.\n\nDe repente, os alienígenas ficam quietos e imóveis.\n\n§H\"Está sentindo isso?\"\n\n\"Sim. Alguém está observando.\"§!\n\nEles vasculham a sala até que ambos estejam olhando diretamente para nós.\n\n§H\"Incrível. Uma sonda psiônica.\"§!\n\n§H\"Parece ter se originado no povo [Root.GetSpeciesAdj]. Rápido! Ative o escudo transplanar.§!\"\n\nA visão é encerrada abruptamente."
 utopia.3153.desc: "[Root.GetSpeciesNamePlural].\n\nNão pense que sua tentativa repugnante de invadir as mentes de nossos líderes passou despercebida.\n\nHaverá consequências."
 utopia.3153.a: "M-mas... podemos explicar!"
 utopia.3153.b: "Há uma explicação perfeitamente lógica para isso..."
 utopia.3160.name: "Brilho no Vazio"
 utopia.3160.desc: "Uma pequena estrela cintilante se materializa dentro do Véu. Ela voa por nós a uma velocidade incrível, e, por um segundo, se revela como uma nave alienígena de configuração desconhecida. Depois desaparece em uma nuvem de energia psiônica tão rápido quanto apareceu.\n\nSerá possível? Será possível entrar fisicamente no Véu e depois surgir em algum lugar completamente diferente no espaço normal?"
 utopia.3160.a: "§YPermanecer por um tempo.§!"
 utopia.3161.desc: "Mais uma estrela cintilante aparece repentinamente, mas dessa vez estamos prontos. De fato, é uma nave alienígena, diferente de qualquer outra que já tenha sido vista em nossa galáxia. Enquanto ela voa por nós, sentimos o brilho da mente de sua tripulação, e seus segredos são nossos.\n\nUm Propulsor de Salto Psiônico. Que engenhoso."
 utopia.3161.name: "§GPropulsores de Salto Psiônicos§!"
 utopia.3162.desc: "Mais uma estrela cintilante aparece repentinamente, mas dessa vez estamos prontos. De fato é uma nave alienígena, diferente de qualquer outra que já tenha sido vista em nossa galáxia. Enquanto ela voa por nós, tentamos nos fundir com o brilho da mente de sua tripulação, mas seus intelectos são mais obscuros e mais alienígenas do que qualquer um que já encontramos.\n\nNão apenas somos expulsos da nave deles, mas o feedback psiônico da rejeição violenta nos seguiu para fora do Véu! A velocidade abaixo da luz de nossas naves estelares foi reduzida momentaneamente."
 utopia.3170.name: "Entidade Protegida"
 utopia.3170.desc: "Depois de seguir um eco fraco no Véu, encontramos um espírito que se refugiou atrás de algum tipo de escudo psiônico poderoso.\n\n§HSAIAM.§!"
 utopia.3170.a: "§YTentar penetrar o escudo.§!"
 utopia.3171.name: "§GEscudos Psiônicos§!"
 utopia.3171.desc_suffix: "no entanto, o ato de romper o escudo nos mostrou como gerar um campo de força parecido. Se a técnica puder ser refinada, talvez seja possível formar escudos psiônicos grandes o suficiente para envolver naves estelares inteiras."
 utopia.3171.desc_machine_gestalt: "Não chegamos tão longe no Véu apenas para voltar agora. Depois de concentrar toda a capacidade psiônica do coletivo, fomos capazes de criar uma brecha no escudo grande o suficiente para vislumbramos momentaneamente o interior.\n\nO que há do outro lado do escudo está além da nossa compreensão atual e sobrecarregou criticamente nossos processadores psiônicos; $utopia.3171.desc_suffix$"
 utopia.3171.desc_organic: "Não chegamos tão longe no Véu apenas para voltar agora. Após concentrar toda a sua força psiônica, nossos telepatas conseguiram criar uma brecha no escudo grande o suficiente para alguns deles vislumbrarem o interior.\n\nNão sabemos o que os telepatas viram do outro lado do escudo, mas foi suficiente para desequilibrar permanentemente suas mentes; $utopia.3171.desc_suffix$"
 utopia.3172.name: "Escudo Intacto"
 utopia.3172.desc_machine_gestalt: "Nossa equipe de [GetTelepathPlural], sobrecarregada por ter ido tão longe dentro do Véu, falhou em canalizar força psiônica suficiente para penetrar o escudo. Nossa falha foi respondida com a seguinte comunicação."
 utopia.3172.desc_machine_non_gestalt: "Nossa equipe de [GetTelepathPlural], sobrecarregada por ter ido tão longe dentro do Véu, falhou em canalizar força psiônica suficiente para penetrar o escudo. A tentativa fracassada parece ter provocado o espírito."
 utopia.3172.desc_organic_gestalt: "Nossa equipe de [GetTelepathPlural], exausta por ter ido tão longe dentro do Véu, falhou em canalizar força psiônica suficiente para penetrar o escudo. Nossa falha foi respondida com a seguinte comunicação."
 utopia.3172.desc_organic_non_gestalt: "Nossa equipe de [GetTelepathPlural], exausta por ter ido tão longe dentro do Véu, falhou em canalizar força psiônica suficiente para penetrar o escudo. A tentativa fracassada parece ter provocado o espírito."
 utopia.3180.name: "Esperando pelo Futuro"
 utopia.3180.desc.intro: "O conceito de tempo, como o conhecemos, é estranho para o Véu. O que pode parecer séculos aqui talvez sejam meras horas ou mesmo minutos no mundo real."
 utopia.3180.desc_gestalt: "$utopia.3180.desc.intro$ Se soubermos onde procurar, a precognição ainda pode estar ao nosso alcance.\n\nTal habilidade traz riscos para nosso coletivo; se prosseguirmos, deverá ser com cautela."
 utopia.3180.desc_machine_non_gestalt: "$utopia.3180.desc.intro$ Se soubermos onde procurar, talvez seja possível ter uma visão do futuro...\n\nO conceito de precognição pode sobrecarregar nossos processadores psiônicos. Devemos seguir com cautela."
 utopia.3180.desc_organic_non_gestalt: "$utopia.3180.desc.intro$ Se soubermos onde procurar, talvez seja possível ter uma visão do futuro...\n\nA precognição é um dos caminhos mais certos para a insanidade de um telepata; portanto, devemos ter cuidado."
 utopia.3180.a: "§YMeditar aqui por um momento.§!"
 utopia.3181.desc_gestalt: "Uma conexão precognitiva limitada com o Véu pode ser mantida sem arriscar sobrecarga nas unidades, mas a confluência gigantesca de dados de probabilidade é grande demais para ter algum uso prático.\n\nEntretanto, nossos nódulos de pesquisa encontraram aplicações menores para esses dados: implementá-los em nossas frotas pode melhorar sua eficiência em combate."
 utopia.3181.desc_machine_non_gestalt: "Uma conexão precognitiva limitada com o Véu pode ser mantida sem arriscar sobrecarga nas unidades, mas a confluência gigantesca de dados de probabilidade é grande demais para ter algum uso prático.\n\nAinda assim, se uma interface digital puder ser desenvolvida para interpretar esses dados, eles poderão ser aplicados para melhorar o desempenho dos computadores de combate de nossas naves estelares..."
 utopia.3181.desc_organic_non_gestalt: "Uma conexão precognitiva limitada ao Véu pode ser mantida sem arriscar a insanidade, mas a confluência gigantesca de dados de probabilidade é grande demais para ter algum uso prático.\n\nAinda assim, se uma interface digital puder ser desenvolvida para interpretar estes dados, ela potencialmente poderia ser aplicada para melhorar o desempenho dos computadores de combate de nossas naves estelares..."
 utopia.3181.name: "§GInterface Precognitiva§!"
 utopia.3182.name: "§RLoucura do Véu§!"
 utopia.3182.desc_gestalt: "Como temíamos, tentar compreender as incontáveis multitudes de opções e probabilidades que existem tanto no passado quanto no futuro resultou em um estado generalizado de catatonia entre nossos drones psiônicos.\n\nIsso os desconectou da Mente Superior, deixando-os sem propósito. Se quisermos pesquisar sobre o Véu novamente, precisaremos reciclar essas carcaças danificadas e recuperar a força do coletivo."
 utopia.3182.desc.non_gestalt.1: "incontáveis multitudes de opções e probabilidades que existem tanto no passado quanto no futuro.\n\nCada variação e cenário, não importa quão colossal ou minúscula seja a diferença entre elas, está sendo repetida infinitamente dentro de seus [GetSpeciesBrainPlural], acarretando um estado de catatonia permanente.\n\n"
 utopia.3182.desc.non_gestalt.2: " novos grupos de [GetTelepathPlural], vai demorar até termos a força psiônica necessária para alcançar o Véu outra vez."
 utopia.3182.desc_machine_non_gestalt: "Como esperávamos, nossos processadores psiônicos foram incapazes de compreender as $utopia.3182.desc.non_gestalt.1$Como precisamos construir$utopia.3182.desc.non_gestalt.2$"
 utopia.3182.desc_organic_non_gestalt: "Como temíamos, a insanidade tomou conta de nossos telepatas. De uma só vez, suas mentes ficaram expostas às $utopia.3182.desc.non_gestalt.1$Como precisamos de recrutar$utopia.3182.desc.non_gestalt.2$"
 utopia.3190.name: "Energia Concentrada"
 utopia.3190.desc.intro: "Encontramos um pequeno espaço dentro do Véu que tem uma concentração de energia psiônica de uma magnitude jamais vista."
 utopia.3190.desc_gestalt: "$utopia.3190.desc.intro$ Tamanha energia psiônica, se explorada corretamente, se dissipará dentro do coletivo problemas mais graves. Entretanto, talvez sejamos capazes de designar um único drone \"escolhido\" para agir como um canal direto para essa energia, tornando-se imensamente poderoso no processo. \n\nNão sabemos se sua forma solitária será capaz de suportar uma quantidade tão grande de energia sem repercussões letais. Nós selecionamos alguns candidatos."
 utopia.3190.desc_non_gestalt: "$utopia.3190.desc.intro$ Qualquer [GetPsychicNoun] capaz de acessar esse bolsão de energia bruta terá seu poder aumentado em muitas ordens de magnitude... mas há apenas energia suficiente para um único indivíduo, e o processo envolve riscos.\n\nApenas alguns indivíduos em todo o território de [Root.GetName] possuem a força psiônica necessária para acessar esse bolsão de energia com chances de sobreviver. Quem vamos enviar?"
 utopia.3190.1.a: "§G[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.2.a: "§Y[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.3.a: "§R[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.1.b: "§G[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.2.b: "§Y[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.3.b: "§R[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.1.c: "§G[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.2.c: "§Y[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.3.c: "§R[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.1.d: "§G[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.2.d: "§Y[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.3.d: "§R[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3191.name: "[GetChosenName]"
 utopia.3191.desc_organic_non_gestalt: "$utopia.3191.desc_machine_non_gestalt$ Que os espíritos tenham piedade de nossas almas."
 utopia.3191.desc_machine_non_gestalt: "Está... Está feito. O Véu inteiro parece estremecer conforme o bolsão de energia psiônica é drenado, e seu poder transferido para [chosen_leader.GetName].\n\nSomente alguns indivíduos na história da galáxia inteira foram presenteados com uma força psiônica desta magnitude."
 utopia.3191.desc_gestalt: "Canalizamos com sucesso todo o poder do bolsão de energia psiônica para o alvo designado, [chosen_leader.GetName].\n\nO que antes era uma gota no oceano do coletivo agora é uma ferramenta poderosa para [Root.GetName], uma vez que [chosen_leader.GetName] usa suas habilidades para o benefício de todos os [Root.Species.GetNamePlural]."
 utopia.3192.name: "§RA Morte de um Líder§!"
 utopia.3192.desc_gestalt: "O Véu inteiro estremece conforme as imensas energias psiônicas contidas dentro do bolsão são canalizadas para [chosen_leader.GetName].\n\nEntretanto, como suspeitávamos, tamanho poder está além de uma única entidade. A forma física de [chosen_leader.GetName] irrompeu em uma explosão de energia psiônica, separando sua voz do [GetBrainName]."
 utopia.3192.desc_non_gestalt: "O Véu inteiro parece estremecer conforme as imensas energias psiônicas contidas no bolsão são transferidas para [chosen_leader.GetName].\n\nInfelizmente, seu [GetSpeciesBrain] não conseguiu suportar a pressão. Talvez tamanho poder não possa ser contido por entidades físicas. O corpo de [chosen_leader.GetName] foi consumido em uma grande explosão de energia psiônica que matou todos os que estavam por perto."
 utopia.3193.name: "§RTransformação Psiônica§!"
 utopia.3193.desc.intro: "O Véu inteiro parece estremecer conforme as imensas energias psiônicas contidas no bolsão são transferidas para [chosen_leader.GetName].\n\nApesar de a transferência ter sido bem-sucedida, [chosen_leader.GetName] passou por uma... transformação..."
 utopia.3193.desc.outro: "\n\n§HPIRRALHOS INSIGNIFICANTES... O QUE... O QUE VOCÊS.. FIZERAM... COMIGO... §!\n\n§HVOCÊS... PAGARÃO... POR SUA SOBERBA...§!"
 utopia.3193.desc_gestalt: "$utopia.3193.desc.intro$ separando-se do coletivo conforme uma entidade completamente estranha habita e possui sua forma.$utopia.3193.desc.outro$"
 utopia.3193.desc_non_gestalt: "$utopia.3193.desc.intro$ Seu corpo foi habitado e possuído por um constructo de pura energia.$utopia.3193.desc.outro$"
 utopia.3200.name: "Uma Visão"
 utopia.3200.1.desc_organic: "O vazio aqui treme com poder. Vamos descansar um pouco."
 utopia.3200.1.desc_machine: "O vazio aqui treme com poder. Vamos recarregar um pouco."
 utopia.3200.2.desc: "O caminho que seguimos chegou a um fim repentino. Não podemos seguir adiante."
 utopia.3200.3.desc_organic: "Alguma coisa fala conosco aqui. Alguma coisa maravilhosa."
 utopia.3200.3.desc_machine: "Algo fala conosco aqui. Algo extraordinário."
 utopia.3200.4.desc: "Por motivos que não podemos conceber, fomos atraídos para este veio de energia no Véu. Por quê?"
 utopia.3200.5.desc.outro: "se apossa de nós enquanto contemplamos uma eternidade passada dentro do Véu. Então recobramos a razão, e o terror recua."
 utopia.3200.5.desc_organic: "Por um breve momento, ficamos perdidos. Uma sensação de pânico extremo $utopia.3200.5.desc.outro$"
 utopia.3200.5.desc_machine: "Por um breve momento, ficamos perdidos. Uma crescente sensação de incerteza $utopia.3200.5.desc.outro$"
 utopia.3200.6.desc.intro: "Conforme nos aprofundamos no Véu, um bando de espíritos dança ao nosso redor por várias horas. Eles brilham com cores deslumbrantes que nunca testemunhamos no espaço normal.\n\n"
 utopia.3200.6.desc_organic: "$utopia.3200.6.desc.intro$O espetáculo é agradável, até que percebemos: estamos sendo conduzidos como gado."
 utopia.3200.6.desc_machine: "$utopia.3200.6.desc.intro$O espetáculo é fascinante, até que percebemos: estamos sendo conduzidos como gado."
 utopia.3200.7.desc: "Um fragmento de um cristal perfeito flutua aqui, girando lentamente ao redor do seu próprio eixo. Conforme nos aproximamos, ele se despedaça em milhares de pedaços."
 utopia.3200.8.desc_organic: "O corpo de um [Root.GetSpeciesName] morto segue pelo vazio à frente. A carcaça podre emite um guincho agudo antes de desaparecer completamente."
 utopia.3200.8.desc_machine: "A estrutura danificada de um [Root.GetSpeciesName] segue pelo vazio à frente. A carcaça destroçada emite um guincho agudo antes de desaparecer completamente."
 utopia.3200.9.desc.intro: "Não podemos ter certeza de que isso realmente está acontecendo. Estamos mesmo no Véu, ou"
 utopia.3200.9.desc_hive: "$utopia.3200.9.desc.intro$ ou sofrendo os efeitos de um mau funcionamento sensorial grave?"
 utopia.3200.9.desc_organic_non_hive: "$utopia.3200.9.desc.intro$ estaria um de nós sofrendo um colapso nervoso?"
 utopia.3200.9.desc_machine_non_hive: "$utopia.3200.9.desc.intro$ sofrendo os efeitos de um erro de processamento grave?"
 terraforming_candidate_category: "Sinais Antigos de Vida\""
 terraforming_candidate_category_desc: "Este mundo estéril e sem vida está mostrando sinais de já ter suportado uma biosfera."
 MESSAGE_TERRAFORM_FOUND_TITLE: "$anomaly.2575.name$"
 MESSAGE_TERRAFORM_FOUND_DESC: "[From.GetName] foi identificado como um candidato à Terraformação. O mundo será rastreada como um potencial alvo para colonização."
 anomaly.2575.name: "Candidato a Terraformação Descoberto"
 anomaly.2575.desc.intro: "Nossa inspeção detalhada do [From.GetName] revelou que ele já pode ter suportado a vida no passado distante. Há depósitos significativos de água congelada nas calotas polares e abaixo da superfície [From.GetPlanetMoon]. A existência de redes de vales sugere que a água já pode ter fluido livremente."
 anomaly.2575.desc.1: "$anomaly.2575.desc.intro$\n\nTerraformar este [From.GetPlanetMoon] teoricamente é possível, mas ainda não possuímos a tecnologia para concluir essa tarefa monumental em um período realista."
 anomaly.2575.desc.2: "$anomaly.2575.desc.intro$\n\nOs custos de energia seriam gigantescos, mas temos a tecnologia para terraformar gradualmente este [From.GetPlanetMoon] em algo que suportaria a vida novamente."
 anomaly.2575.desc.3: "$anomaly.2575.desc.intro$\n\nInfelizmente, a §YEsfera de Dyson§! neste sistema removeu qualquer possibilidade de restaurar o planeta."
 anomaly.2575.a: "Com o tempo, talvez possamos despertá-lo outra vez."
 utopia.3300.name: "Uma Presença no Véu"
 utopia.3300.desc: "Há uma presença aqui, ocupando esta parte inteira Véu. Já encontramos espíritos antes, mas isso é outra coisa, algo muito mais poderoso... algo muito mais antigo.\n\nParece não ter nos percebido ainda. Talvez esteja dormindo. Talvez simplesmente estejamos além de sua percepção.\n\nTalvez devêssemos sair daqui."
 utopia.3300.1.a: "§GTentar se comunicar com a presença§!"
 utopia.3300.1.b: "§YTentar se comunicar com a presença§!"
 utopia.3300.1.c: "§RTentar se comunicar com a presença§!"
 utopia.3300.1.d: "§G[chosen_one.GetName] falará com a presença§!"
 utopia.3301.name: "§RComunhão Rejeitada§!"
 utopia.3301.desc: "Conforme entramos em contato com a presença, podemos senti-la se mexendo, sua atenção agora totalmente sobre nós. Ela não gosta de ser interrompida.\n\nUma onda de energia é disparada em nossos telepatas, causando grande agonia para alguns e deixando outros inconscientes. Não temos escolha a não ser sair do Véu, por enquanto."
 utopia.3302.desc: "Conforme entramos em contato com a presença, podemos senti-la se mexendo, sua atenção agora totalmente sobre nós. Ela parece não gostar de ser interrompida.\n\nUma onda enorme de energia psiônica cai sobre nós, apagando os sentidos de nossos telepatas. Quando acordam, percebem que um deles está faltando. §Y[leader_to_kill.GetName]§! sumiu completamente, e onde [leader_to_kill.GetSheHe] estava, há apenas o rastro psiônico de uma pequena fenda, como se a entidade tivesse entrado em nosso mundo e arrastado [leader_to_kill.GetHerHim] para o Véu para... bem, ninguém sabe por qual motivo ou propósito, realmente.\n\nNão importam os motivos pelo qual levaram [leader_to_kill.GetHerHim], parece pouco provável que veremos [leader_to_kill.GetName] novamente."
 utopia.3304.name: "Pacto Proposto"
 utopia.3304.desc.start.default: "Conforme entramos em contato com a presença"
 utopia.3304.desc.start.shroud: "Conforme chegamos ao Véu"
 utopia.3304.desc.common: "as mentes de nossos telepatas são preenchidas por um coro. São apenas sussurros a princípio, mas a cacofonia aumenta, e milhares de vozes passam a falar em uníssono.\n\nAs vozes se apresentam como $whisperers_in_the_void_color_article$. Alguns membros do coro se revelam individualmente: o Sussurro dos Segredos,"
 utopia.3304.desc.throne.default: "Sombra do Trono"
 utopia.3304.desc.throne.shroud: "$the_vacant_throne$"
 utopia.3304.desc.end: ", o Mestre de Marionetes: há muitas vozes, todas unidas no coro dos Sussurradores. Ele... Eles... afirmam ter todo o conhecimento sussurrado em segredo de um mortal para outro, e oferecem compartilhar uma parte conosco...\n\n§HBasta permitirmos que acessem a nossa consciência.§!\n\nElas garantem que é um preço insignificante. Mal perceberemos que estão lá.\n\nHá uma urgência no tom das vozes."
 utopia.3304.desc: "$utopia.3304.desc.start.default$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.default$$utopia.3304.desc.end$"
 utopia.3304.desc.shroud: "$utopia.3304.desc.start.shroud$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.shroud$$utopia.3304.desc.end$"
 utopia.3304.a: "§YFormar um Pacto com os Sussurradores no Vazio§!"
 utopia.3305.desc: "A presença nos dá boas-vindas com cordialidade. Sua comunicação não se dá por meio de palavras, mas por visões, conceitos, ideias. Ela se infiltra nas mentes de nossos telepatas com tanta delicadeza que parece sempre ter estado ali. Uma série de imagens se manifesta.\n\nA presença é conhecida como $the_composer_of_strands_color_article$ e observa nossas formas orgânicas com interesse e curiosidade. Ela nos mostra diversas maneiras de cultivá-las, transformá-las. Aprimorá-las. Evoluí-las.\n\n§HBasta permitirmos que entre em nossa carne.§!\n\nEla aguarda a nossa resposta com paciência e afeto. Como uma mãe zelosa à espera de seu filho favorito. Atrás dela está seu irmão gêmeo, o Animador de Argila. Este não tem interesse em nossas mentes orgânicas. Ele anseia por criar almas, combinar circuitos com o espírito.\n\nA Compositora aguarda a nossa resposta."
 utopia.3305.a: "§YFormar um Pacto com a Compositora dos Fios§!"
 utopia.3306.desc.1: "Conforme entramos em contato com a presença, sentimos uma fome intensa. "
 utopia.3306.desc.2: "A presença não desperdiça tempo nem palavras. Ela é $the_eater_of_worlds_color_article$ e deseja nos devorar.\n\nMas só alguns de nós. Nenhum a mais do que podemos ceder. Em troca, ela nos dará grandes poderes. Ela nos ensinará sua fome, sua raiva. Ela as moldará em armas psiônicas capazes de conquistar qualquer inimigo.\n\n§HBasta permitirmos que se alimente de nós.§!"
 utopia.3306.desc.3: "$utopia.3306.desc.2$\n\nEla parece impaciente para começar."
 utopia.3306.desc: "$utopia.3306.desc.1$$utopia.3306.desc.3$"
 utopia.3306.a: "§YFormar um Pacto com a Comedora de Mundos§!"
 utopia.3307.desc: "Antes que conseguíssemos encontrar a presença, ela entra em contato conosco. Seus pensamentos se enroscam e serpenteiam ao redor das mentes de nossos telepatas, barganhando, persuadindo. É $the_instrument_of_desire_color_article$ e ele nos oferece riqueza, poder, prestígio... tudo o que já desejamos. Tudo o que um dia desejaremos.\n\nO preço? Irrelevante, uma mera formalidade. Ele só deseja o nosso bem. Irá nos ajudar, guiar, moldar nossas ambições e sonhos.\n\n§HBasta aceitá-lo em nossos corações.§!\n\nEle tem certeza de que diremos sim. Como poderíamos recusar?"
 utopia.3307.a: "§YFormar um Pacto com o Instrumento de Desejo§!"
 utopia.3308.desc: "A presença estava nos esperando. É §RO Fim do Ciclo§! e ela sempre esteve nos esperando. Nossos telepatas de repente falam em uníssono, uma dúzia de vozes em um coro perfeito: §R\"AINDA NÃO É SUA HORA.\"§! Uma pausa. §R\"MAS PODERIA SER.\"§!\n\nNada mais é dito, mas uma barganha foi oferecida - isso nós sabemos. Poder, sabedoria e riqueza além da medida são nossas se quisermos.\n\n§RTudo que precisamos é apenas realizar o Fim.§!"
 utopia.3308.a: "§YFormar um Pacto com o Fim do Ciclo§!"
 utopia.3310.name: "Pacto Formado"
 utopia.3320.name: "O Fim do Ciclo: §RAcerto de Contas§!"
 utopia.3320.desc.intro: "Nosso tempo acabou. Por um breve momento, nos beneficiamos do poder imenso que nos foi dado pel$end_of_the_cycle_color_article$. Sabíamos que haveria um preço a ser pago, mas imaginávamos que seria suportável, ou que poderíamos encontrar alguma forma de evitar o pagamento.\n\nNão era, e não encontramos.\n\nO preço que pagamos foi tudo. Em um instante, a totalidade de [Root.GetName]... desapareceu. Onde antes havia colônias prósperas, agora há somente ruína. Onde antes havia frotas poderosas cruzando o vazio, há apenas silêncio e destroços. Tudo foi devorado pelo Fim. Tudo foi tomado pelo §HVéu§!."
 utopia.3320.desc.outro: "se materializou perto de [former_capital.GetName]. Ganhando um poder imenso ao devorar a consciência de nossos grupos de [GetPsychicNounPlural], ela agora percorre a galáxia em busca de mais presas."
 utopia.3320.desc.a.1.gestalt: "Tudo que restou de nosso império foi um grupo de exilados liderados por §H[Root.GetRulerName]§!, um poderoso ser psiônico que se desconectou do coletivo e conduziu um pequeno grupo de [GetIndividualPlural] para se esconder em um mundo que não foi marcado pelo Fim."
 utopia.3320.desc.a.1.non_gestalt: "Tudo que restou de nosso império foi um grupo de exilados liderados por §H[Root.GetRulerName]§!, um poderoso ser psiônico que viu o que estava opor vir e conduziu uma pequena parte da população para se esconder em um mundo que não foi marcado pelo Fim."
 utopia.3320.desc.a.outro: "Como se ter nosso império destruído da noite para o dia não fosse ruim o bastante, uma entidade psiônica gigantesca $utopia.3320.desc.outro$"
 utopia.3320.desc.a.gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.a.non_gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.non_gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.b: "$utopia.3320.desc.intro$\n\nNão só nosso império foi absolutamente dizimado, mas uma entidade psiônica gigantesca se materializou perto de [former_capital.GetName]. Ganhando um poder imenso ao devorar a consciência de nossos grupos de [GetPsychicNounPlural], ela agora percorre a galáxia em busca de mais presas. Pelo menos não estaremos lá para vê-la concluir o que começamos."
 utopia.3320.opt.a: "O que fizemos...?"
 utopia.3320.opt.a.shroud.tt: "$BEGINS_EVENT_CHAIN$ §Y$the_reckoning_chain_title$§!"
 utopia.3321.desc.1: "Por muito tempo, soubemos que havia algo errado com §H[From.GetName]§!. Anos atrás, suas indústrias, sua ciência, tudo naquele império passou subitamente por um aumento gigantesco e inexplicável de produtividade e eficácia, como se tivessem sido abençoados por um poder invisível.\n\nPorém, não foi uma bênção, mas uma maldição. A liderança de [From.GetName] fez uma dívida mortal, e agora ela foi cobrada.\n\nEm um instante, a totalidade de [From.GetName]... desapareceu. Onde antes havia colônias prósperas, agora há somente ruína. Onde antes havia frotas poderosas cruzando o vazio, agora existem apenas o silêncio e destroços."
 utopia.3321.desc.2: "Agora, um ser de energia imensamente poderoso se materializou perto de sua antiga capital."
 utopia.3321.desc.3: "Décadas atrás, detectamos atividades anômalas em sistemas estelares distantes. Nossa equipe de [GetResearchers] especulou que aumentos de movimentação e radiação eram indicativos de uma civilização alienígena passando por um crescimento repentino de produtividade. Como não estabelecemos contato com essa sociedade hipotética, a teoria nunca foi confirmada.\n\nEntão, quase que instantaneamente, a atividade cessou. O silêncio agora reina naquelas regiões do espaço outrora tão vivas."
 utopia.3321.desc.4: "Agora, análises de longo alcance detectaram um fenômeno bizarro naqueles mesmos sistemas distantes. Se os relatórios estiverem corretos, é algo que só pode ser descrito como uma entidade imensamente poderosa feita de pura energia, causando grande destruição conforme se move pelo espaço."
 utopia.3321.desc.a.contact: "$utopia.3321.desc.1$ O desastre chegou a ultrapassar nossas fronteiras, destruindo alguns de nossos mundos que estavam sob o governo [From.GetAdj].\n\n$utopia.3321.desc.2$\n\nE parece estar com fome."
 utopia.3321.desc.a.no_contact: "$utopia.3321.desc.3$ Por motivos desconhecidos, alguns mundos dentro de nossas fronteiras caíram em ruína ao mesmo tempo.\n\n$utopia.3321.desc.4$"
 utopia.3321.desc.b.contact: "$utopia.3321.desc.1$\n\n$utopia.3321.desc.2$ Ele se move de mundo em mundo, destruindo tudo em seu caminho."
 utopia.3321.desc.b.no_contact: "$utopia.3321.desc.3$\n\n$utopia.3321.desc.4$"
 utopia.3321.opt.a.contact: "O que eles fizeram?!"
 utopia.3321.opt.a.no_contact: "Mas o que isso significa?!"
 utopia.3325.name: "O Fim do Ciclo: §REnvolto§!"
 utopia.3325.desc.organic: "Não conseguimos impedir a energia monstruosa de encobrir §H[Root.GetName]§!. O planeta e toda a sua população foram consumidos pelo §HVéu§!."
 utopia.3325.desc.machine: "Não conseguimos impedir a energia imensa de encobrir §H[Root.GetName]§!. O planeta e toda a sua população foram consumidos pelo §HVéu§!."
 utopia.3325.opt.a.organic_non_gestalt: "Horrível!"
 utopia.3325.opt.a.machine_or_gestalt: "Uma catástrofe."
 utopia.3331.name: "Sussurradores no Vazio: §RLidando§!"
 utopia.3331.desc.intro: "Embora os segredos transmitidos ao nosso povo pelos §HSussurradores§! sejam de grande utilidade, alguns deles também são muito perturbadores"
 utopia.3331.desc: "$utopia.3331.desc.intro$. Lidar com o estresse de saber demais pode ser difícil, e isso causou um aumento no uso de narcóticos em nossa população, incluindo §H[leader_target.GetTitle] [leader_target.GetName]§!, como válvula de escape."
 utopia.3331.opt.a: "Isso é infeliz."
 utopia.3332.name: "Sussurradores no Vazio: §RSuicídio§!"
 utopia.3332.desc.intro: "$utopia.3331.desc.intro$, especialmente aqueles que foram compartilhados com indivíduos importantes. §H[leader_target.GetTitle] [leader_target.GetName]§!, incapaz de"
 utopia.3332.desc.organic_non_gestalt: "$utopia.3332.desc.intro$ lidar com toda a pressão, tirou a própria vida."
 utopia.3332.desc.machine_non_gestalt: "$utopia.3332.desc.intro$ processar esses detalhes de maneira efetiva, acionou sua autodestruição, desligando-se permanentemente."
 utopia.3332.desc.gestalt: "Embora os segredos transmitidos pelos §HSussurradores§! sejam de grande utilidade, alguns também são de uma natureza individualista perturbadora. A exposição prolongada a tamanho desvio levou §H[leader_target.GetTitle] [leader_target.GetName]§! a se separar do coletivo, deixando para trás apenas sua carcaça decadente."
 utopia.3332.opt.a.non_gestalt: "Uma tragédia."
 utopia.3332.opt.a.gestalt: "Vamos reciclá-lo."
 utopia.3333.name: "Sussurradores no Vazio: §RLoucura§!"
 utopia.3333.desc.intro: "Desde que deixamos os §HSussurradores§! se comunicarem com nossa [GetBrainName], começamos a perceber um aumento perturbador de desvios dentro do coletivo."
 utopia.3333.desc.gestalt: "$utopia.3333.desc.intro$\n\nDrones estão atacando uns aos outros enquanto realizam procedimentos padrão, bem como usufruindo de confortos em um nível quase individualista.\n\nPrecisaremos expurgar os receptáculos afetados se quisermos restaurar a ordem."
 utopia.3333.desc.outro: "e atos inexplicáveis de violência vêm crescendo entre a nossa população psiônica. No início, esses problemas eram contornáveis, mas recentemente a questão escapou ao nosso controle. Por todo o império, facções radicais divergentes surgiram e entraram em um conflito violento umas com as outras."
 utopia.3333.desc.organic_non_gestalt: "Desde que convidamos os §HSussurradores§! para nossas mentes, transtornos mentais $utopia.3333.desc.outro$"
 utopia.3333.desc.machine_non_gestalt: "Desde que convidamos os §HSussurradores§! para nossas mentes, erros intermitentes de programação $utopia.3333.desc.outro$"
 utopia.3333.opt.a: "Precisamos restaurar a ordem!"
 utopia.3334.name: "Sussurradores no Vazio: §RPsicose§!"
 utopia.3334.desc.gestalt: "$utopia.3333.desc.intro$\n\nPior ainda, nosso senso de unidade começou a vacilar. O coletivo está incapaz de se comunicar efetivamente devido ao aumento de desvios individualistas de origem psiônica.\n\nPrecisaremos expurgar esses excessos de nós mesmos se quisermos restaurar a ordem."
 utopia.3334.desc.outro: "e atos inexplicáveis de violência vêm crescendo entre a nossa população psiônica. No início, a situação era contornável, mas recentemente a questão escapou ao nosso controle. Sociedades secretas começaram a surgir por todo o império; algumas inofensivas, outras com objetivos mais perversos. A desconfiança se instaurou em nossa sociedade."
 utopia.3334.desc.organic_non_gestalt: "Desde que convidamos os §HSussurradores§! para nossas mentes, transtornos mentais $utopia.3334.desc.outro$"
 utopia.3334.desc.machine_non_gestalt: "Desde que convidamos os §HSussurradores§! para nossas mentes, erros intermitentes de programação $utopia.3334.desc.outro$"
 utopia.3334.opt.a: "Terrível!"
 utopia.3335.name: "Comedora de Mundos: §RExperimentando§!"
 utopia.3335.desc.common: "§H[devoured_leader.GetTitle] [devoured_leader.GetName]§! desapareceu de repente, deixando para trás apenas ecos de atividade psiônica."
 utopia.3335.desc.gestalt: "$utopia.3335.desc.common$ Parece que $the_eater_of_worlds_color_article$ julgou oportuno devorar [devoured_leader.GetName]. Apesar de ter poupado nossos outros líderes, não podemos prever quando a Comedora voltará para mais."
 utopia.3335.desc.non_gestalt: "$utopia.3335.desc.common$ Acreditamos que a $the_eater_of_worlds_color_article$ tenha julgado oportuno devorar [devoured_leader.GetName]. Conseguimos encobrir a história, e esperamos que o apetite da Comedora permaneça saciado por algum tempo."
 utopia.3335.opt.a: "O preço foi pequeno."
 utopia.3336.name: "Comedora de Mundos: §RCom fome§!"
 utopia.3336.desc.intro: "Mais uma vez, a §HComedora§! retornou para reivindicar seu tributo"
 utopia.3336.desc.gestalt: "$utopia.3336.desc.intro$, devorando uma porção significativa de nossa população em §Y[planet_target.GetName]§!.\n\nEmbora tenhamos ciência dos benefícios de nosso pacto com a Comedora, tal abate desenfreado de nosso coletivo está começando a plantar as sementes da agitação e da instabilidade, deixando-nos mais fragmentados."
 utopia.3336.desc.non_gestalt: "$utopia.3336.desc.intro$, devorando uma parte significativa da população em §Y[planet_target.GetName]§!.\n\nApesar de termos conseguido esconder da população o nosso pacto com a Comedora, o povo no planeta está compreensivelmente assustado e furioso com esses \"desaparecimentos misteriosos\", e exige uma explicação do governo."
 utopia.3336.opt.a: "Infeliz, mas inevitável."
 utopia.3337.name: "Comedora de Mundos: §RMorta de fome§!"
 utopia.3337.desc: "Mais uma vez, a Comedora retornou para reivindicar o tributo. Não contente em capturar uma parte de nossa população, ela devorou um planeta inteiro. §YUma neblina psiônica espessa envolveu [planet_target.GetName]§! e as sondas enviadas para a atmosfera não retornaram. Por sorte, o mundo não era habitado, mas tememos que o próximo possa ser uma das nossas colônias prósperas."
 utopia.3337.desc.shadows: "$utopia.3336.desc.intro$, agora devorando um planeta inteiro.\n\n§H[planet_target.GetName]§! se encontra encoberto por uma névoa psiônica espessa, e qualquer tentativa de entrar em sua atmosfera se provou infrutífera. Esse mundo não era habitado; as consequências serão catastróficas se o próximo alvo for uma colônia próspera."
 utopia.3337.opt.a: "Por quanto tempo isso vai continuar?"
 utopia.3337.opt.tt: "[shrouded_planet.GetName] se transforma em §Y$pc_shrouded$§!"
 #utopia.3338.name: "Instrument of Desire: §RParticularism§!"
 #utopia.3338.desc: "The desires inflicted upon our people by the Instrument are strong. The people of §Y[planet_target.GetName]§! have become convinced that their own particular customs are of distinct and paramount importance over those of our society as a whole. Alternative political movements are springing up like wildfire, and the political situation on the planet has become unpredictable, to say the least."
 utopia.3338.opt.a: "Infeliz."
 #utopia.3339.name: "Instrument of Desire: §RDeviance§!"
 #utopia.3339.desc: "The desires inflicted upon our people by the Instrument are strong. As if overnight, the population of our empire appear to have turned against both the government and the very traditions of our people, questioning ages-old customs and breaking social taboos. Support for government positions are rapidly dropping, and it seems we may be in for a period of considerable political turmoil."
 #utopia.3339.opt.a: "Terrible!"
 utopia.3340.name: "Instrumento de Desejo: §RDecadência§!"
 utopia.3340.desc.gestalt: "A influência do §HInstrumento§! pode ser sentida por toda a [GetBrainName]; seus desejos sobrenaturais corrompem nosso coletivo com noções abstratas individualistas como \"exclusividade\" e \"riqueza\".\n\nTais conceitos provocam doenças em nosso drones, fazendo-os desviar do propósito de unificação que nos move. Talvez seja necessário usufruir desses vícios para nos recompor."
 utopia.3340.desc.organic_non_gestalt: "Os desejos provocados pelo §HInstrumento§! são fortes. Nossa população entrou em um frenesi de consumismo e decadência, e começou a exigir mercadorias cada vez mais exclusivas e alimentos cada vez mais exóticos e raros. Já há tumultos em vários distritos comerciais.\n\nTalvez sejamos forçados a aumentar a produção de §H[GetInstrumentCraving]§! para acalmar as massas."
 utopia.3340.desc.machine_non_gestalt: "Os desejos que nasceram da influência do §HInstrumento§! em nossa programação estão se sobrepondo aos centros de lógica de nossa população.\n\nO consumismo e a decadência começaram a prejudicar a eficiência operacional, e unidades estão realizando engenharia reversa em suas peças por pura estética em detrimento da funcionalidade. A consequente falta de peças de alta demanda resultou em pequenos confrontos ao longo das linhas de montagem.\n\nTeremos que aumentar a produção de §H[GetInstrumentCraving]§! para resolver esse problema."
 utopia.3340.opt.a.organic_non_gestalt: "Mas por quê?"
 utopia.3340.opt.a.machine_or_gestalt: "É este o preço do sucesso."
 instrument_cravings: "Desejos Descontrolados"
 instrument_cravings_tooltip: "§RNossos £pops£ Pops agora têm manutenção em§! [GetInstrumentCravingIconAndName]"
 instrument_cravings_desc: "$the_instrument_of_desire_color_article_cap$ estimulou uma nova tendência entre a nossa população. Todo mundo deseja a mesma coisa; em grande parte apenas pela coisa em si, e não por sua utilidade."
 instrument_cravings_gestalt: "$instrument_cravings$"
 instrument_cravings_gestalt_desc: "$the_instrument_of_desire_color_article_cap$ nos acometeu com a enfermidade do desejo compulsivo, uma nova sensação para nosso coletivo. Todos queremos a mesma coisa, independentemente de seu propósito."
 utopia.3341.name: "[GetComposerMutationName]"
 utopia.3341.name.organic: "$name_composer$: §RMutação§!"
 utopia.3341.name.machine: "$name_composer$: §RReconfiguração§!"
 utopia.3341.desc.machine: "$the_composer_of_strands_color_article_cap$ nos concedeu suas bênçãos, alterando diretamente alguns de nossos componentes principais. Circuitos foram combinados em novas configurações. Metal sólido foi fundido em formas totalmente novas. De maneira impressionante, nossos processadores continuam funcionando sem apresentar problemas."
 utopia.3341.desc.organic_gestalt: "$the_composer_of_strands_color_article_cap$ nos concedeu suas bênçãos, alterando diretamente o código genético do povo §H[Root.GetSpeciesAdj]§!. Estranhamente, as mutações rápidas e imprevisíveis não causaram nada além de uma reação discreta. Parece que as mutações aleatórias podem ser tratadas como uma parte normal da vida, dificilmente digna de revolta ou alarde."
 utopia.3341.desc.organic_non_gestalt: "$the_composer_of_strands_color_article_cap$ nos concedeu suas bênçãos, alterando diretamente o código genético do povo §H[Root.GetSpeciesAdj]§!. Estranhamente, as mutações rápidas e imprevisíveis não causaram nada além de uma reação discreta. Parece que nossa população está enxergando as mutações aleatórias como uma parte normal da vida, dificilmente digna de revolta, alarde ou mesmo discussão."
 utopia.3341.opt.a: "Vamos ver quais serão os resultados..."
 utopia.3342.name: "Comedora de Mundos: §RFaminta§!"
 utopia.3342.desc.intro: "Não é possível saciar o apetite da §HComedora§!. Desta vez, ela deu uma mordida em uma das nossas colônias."
 utopia.3342.desc.outro: "tudo que restou foi uma cratera de proporções imensas, tomada por névoas púrpuras rodopiantes."
 utopia.3342.desc.gestalt: "$utopia.3342.desc.intro$ Onde uma porção significativa do coletivo uma vez ocupou o espaço físico, $utopia.3342.desc.outro$"
 utopia.3342.desc.non_gestalt: "$utopia.3342.desc.intro$ Uma parte significativa do mundo sumiu de nossa realidade, e $utopia.3342.desc.outro$"
 utopia.3342.opt.a.non_gestalt: "Vai ser difícil encobrir isso..."
 utopia.3342.opt.a.gestalt: "É este o preço do poder."
 utopia.3343.name: "Comedora de Mundos: §RVoraz§!"
 utopia.3343.desc.gestalt: "Mais uma vez a §HComedora§! retornou para reivindicar seu tributo, devorando uma cidade inteira em §Y[planet_target.GetName]§!. Com a perda de tantos drones, o coletivo pagou um preço alto por nosso pacto com a Comedora."
 utopia.3343.desc.organic_non_gestalt: "Mais uma vez, a §HComedora§! retornou para reivindicar seu tributo, devorando uma cidade inteira em §Y[planet_target.GetName]§!. Apesar de termos conseguido esconder da população o nosso pacto com a Comedora, o povo no planeta está compreensivelmente assustado e furioso com esses \"desaparecimentos misteriosos\", e exige uma explicação do governo."
 utopia.3343.desc.machine_non_gestalt: "Mais uma vez, a §HComedora§! retornou para reivindicar seu tributo, devorando uma cidade inteira em §Y[planet_target.GetName]§!. Apesar de termos conseguido esconder da população o nosso pacto com a Comedora, aqueles que permanecem no planeta estão insatisfeitos quanto a esses \"desaparecimentos misteriosos\", e exigem uma explicação do governo."
 utopia.3343.opt.a.organic_non_gestalt: "É trágico, mas inevitável."
 utopia.3343.opt.a.machine_or_gestalt: "É lamentável, mas inevitável."
 utopia.3345.name: "[GetComposerDegenerationName]"
 utopia.3345.name.organic: "$name_composer$: §RDegeneração§!"
 utopia.3345.name.machine: "$name_composer$: §RDegradação Irreparável§!"
 utopia.3345.desc.organic_1: "As bênçãos d$the_composer_of_strands_color_article$ são imprevisíveis. Uma de nossas lideranças teve uma infeliz experiência quando"
 utopia.3345.desc.organic_2: "ganhou vontade própria. Em pouco tempo, ela se degenerou e se transformou em uma massa retorcida irreconhecível. Sem qualquer esperança de reverter o processo, nós agora consideramos"
 utopia.3345.desc.organic_3: "efetivamente em estado de óbito."
 utopia.3345.desc.organic_individual_lithoid: "$utopia.3345.desc.organic_1$ sua forma física $utopia.3345.desc.organic_2$ essa liderança $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_lithoid: "$utopia.3345.desc.organic_1$ sua forma física $utopia.3345.desc.organic_2$ esse drone de liderança $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_individual_non_lithoid: "$utopia.3345.desc.organic_1$ sua carne $utopia.3345.desc.organic_2$ essa liderança $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_non_lithoid: "$utopia.3345.desc.organic_1$ sua carne $utopia.3345.desc.organic_2$ esse drone de liderança $utopia.3345.desc.organic_3$"
 utopia.3345.desc.machine_non_gestalt: "As bênçãos d$the_composer_of_strands_color_article$ são imprevisíveis. Um de nossos líderes sofreu uma falha crítica espetacular quando seus componentes físicos ganharam vontade própria, espontaneamente fundindo-se e unindo-se em uma forma nova e bizarra. Agora, com seu corpo reduzido a um monte de sucata irreparável e defeituosa, essa liderança não tem mais utilidade para [Root.GetName]."
 utopia.3345.desc.machine_gestalt: "As bênçãos d$the_composer_of_strands_color_article$ são imprevisíveis. Um de nossos nódulos de liderança sofreu uma falha crítica espetacular quando seus componentes físicos ganharam vontade própria, espontaneamente fundindo-se e unindo-se em uma forma nova e bizarra. Agora, com seu corpo reduzido a um monte de sucata irreparável e defeituosa, esse nódulo de liderança não tem mais utilidade para [Root.GetName]."
 utopia.3345.opt.a.organic: "Agora ele leva uma vida mais simples."
 utopia.3345.opt.a.machine: "Todos os hardwares ficam obsoletos um dia."
 utopia.3346.name: "Compositora dos Fios: §RRegressão§!"
 utopia.3346.desc: "As dádivas d$the_composer_of_strands_color_article$ recaíram sobre [devolved_species_planet.GetName], onde algumas de nossas populações sofreram uma mutação severa que as fez regredir ao estado de pré-sapientes."
 utopia.3346.opt.a.non_gestalt: "Fascinante, mas é uma pena."
 utopia.3346.opt.a.gestalt: "Lamentável."
 utopia.3346.opt.a.tt: "§Y500§! £pop£ §HPops§! em [devolved_species_planet.GetName] se transformaram em §YPré-Sapientes§!.\n\nCom a tecnologia certa, eles podem ser §Yelevados§! na aba Espécies."
 utopia.3347.name: "$name_cradle$: §RDesmilitarização§!"
 utopia.3347.desc: "O §HBerço§! busca equilíbrio em todas as coisas, de acordo com nossa equipe de [GetTelepathPlural], e isso inclui um exército proporcional às necessidades da paz. O tamanho de nossa Marinha deve ter trazido a ira de nosso patrono, já que um grupo de naves de §H[demilitarized_fleet.GetFleetName]§! de repente desapareceu em uma onda violenta de energia psiônica."
 utopia.3347.opt.a: "$UNFORTUNATE$"
 utopia.3347.opt.a.tt: "Uma frota aleatória que controlamos perde até 12 de §HCapacidade Naval§!."
 utopia.3348.name: "[GetCradleChaoticAnguishName]"
 utopia.3348.name.organic_non_gestalt: "$name_cradle$: §RAngústia§!"
 utopia.3348.name.machine_or_gestalt: "$name_cradle$: §RPerturbação§!"
 utopia.3348.desc.intro: "[GetCradleAnguishIntro]"
 utopia.3348.desc.organic_non_gestalt: "$utopia.3348.desc.intro$ uma angústia existencial generalizada."
 utopia.3348.desc.machine_or_gestalt: "$utopia.3348.desc.intro$ uma perturbação cognitiva generalizada."
 utopia.3348.desc_intro_homicidal: "Sintonizada à vontade do §HBerço§!, a psique do povo [root.GetSpeciesAdj] é atormentada pela dissonância, validando a noção absurda da coexistência harmoniosa entre todas as mentes. Em resposta à desordem atual dos assuntos galácticos, uma onda de perturbação psiônica envolveu a população, causando"
 utopia.3348.desc_intro_default: "Sintonizado à vontade do §HBerço§!, o povo [root.GetSpeciesAdj] passou a preferir a coexistência harmoniosa entre todas as mentes. Em resposta à desordem atual dos assuntos galácticos, uma onda de perturbação psiônica envolveu a população, causando"
 utopia.3348.opt.a: "Precisamos resistir."
 anguish_of_the_cradle: "Angústia do Berço"
 anguish_of_the_cradle_desc: "$the_cradle_of_souls_article_cap$ enviou uma onda de perturbação psiônica por toda a nossa população."
 anguish_of_the_cradle_gestalt: "$anguish_of_the_cradle$"
 anguish_of_the_cradle_gestalt_desc: "$anguish_of_the_cradle_desc$"
 utopia.3349.name: "$name_cradle$: §RLimitação§!"
 utopia.3349.desc: "A capacidade de apoiar e manter nossas frotas militares se tornou mais difícil em §H[root.GetName]§!.\n\nNossa equipe de [GetTelepathPlural] sente que essa perturbação foi causada pelo §HBerço§!, que anseia pela ordem galáctica. Nossos investimentos em infraestrutura militar, não importa o quão pequenos, devem ter lhe causado insatisfação."
 utopia.3349.opt.a: "Deveríamos limitar nossa presença no Vazio."
 limit_of_the_cradle: "Limite do Berço"
 limit_of_the_cradle_desc: "Nossa infraestrutura de apoio militar foi limitada pel$the_cradle_of_souls_article$."
 utopia.3350.name: "[GetLavishLifestyleEventName]"
 utopia.3350.name.individual: "$name_instrument$: §REstilo de Vida Extravagante§!"
 utopia.3350.name.gestalt: "$name_instrument$: §RConsumo Excessivo§!"
 utopia.3350.desc.individual: "Nosso vínculo com o §HInstrumento§! está fazendo com que uma parcela da liderança do povo [Root.GetSpeciesAdj] desenvolva hábitos de consumo.\n\n[lavish_leader.GetName] está gastando vastas somas de créditos energéticos em itens extravagantes, sustentando um estilo de vida cada vez mais indulgente."
 utopia.3350.desc.gestalt: "Nosso vínculo estreito com o §HInstrumento§! está gerando um alto consumo de recursos entre alguns drones de liderança do povo [Root.GetSpeciesAdj].\n\n[lavish_leader.GetName] vem usando mais energia do que o necessário para manter suas funções básicas. Não encontramos nenhuma base física para tal comportamento, fazendo-nos concluir que esse uso indulgente de recursos é de alguma maneira preferencial."
 utopia.3350.opt.a: "Este é o preço do desejo."
 utopia.3351.name: "$name_instrument$: §RDistrações da Força de Trabalho§!"
 utopia.3351.desc.individual: "Conforme a influência de nosso patrono se espalha ainda mais por [Root.GetName], novas distrações e lazeres estão desviando a energia da população do trabalho produtivo.\n\nMediante essa motivação decrescente, alcançar a mesma produtividade da força de trabalho agora requer maior investimento do que antes."
 utopia.3351.desc.gestalt: "Conforme a influência de nosso patrono se espalha ainda mais por [Root.GetName], um desvio insidioso surgiu dentro do coletivo [Root.GetSpeciesAdj].\n\nEsses impulsos individualistas momentâneos e essa propensão à distração são particularmente comuns durante tarefas de trabalho. Agora é necessário maior investimento para manter a coesão e a disciplina da força de trabalho."
 utopia.3351.opt.a: "Um capricho temporário do §HInstrumento§!."
 distracted_workforce: "Força de Trabalho Distraída"
 distracted_workforce_desc: "Esta força de trabalho está sujeita à distração e requer constante supervisão."
 utopia.200.name: "Uma Nova Presença no Véu"
 utopia.200.desc.a: "Uma mudança veio sobre os [target_species.GetNamePlural] que vivem em nosso império. Tudo começou com uma leve ondulação no Véu. Agora é como se eles estivessem vibrando em um nível diferente. Todos nós estamos sentindo, os [target_species.GetNamePlural] estão à beira de desenvolver habilidades psiônicas latentes, parecidas com as nossas.\n\nTalvez seja devido à proximidade conosco. Talvez o Véu simplesmente os escolheu. O Conclave de Telepatas, nossos especialistas psiônicos, avisam que essa pode ser nossa única chance de intervir. Podemos cortar pela raiz, ou ajudá-los a despertar. Eles não chegarão muito longe sem a nossa orientação."
 utopia.200.desc.b: "Uma atividade incomum no Véu sugere que outra espécie em nossa nação, os [target_species.GetNamePlural], estão começando a manifestar habilidades psiônicas latentes. Agora temos a mesma escolha de antes - vamos suprimi-los ou liberar seus poderes que estão desabrochando?"
 utopia.200.a: "Vamos liberar o potencial deles."
 utopia.200.a.tooltip: "Todos os Pops do povo [target_species.GetAdj] ganharão a característica §Y$trait_latent_psionic$§!."
 utopia.200.b: "Eles não são dignos."
 utopia.203.name: "O Despertar"
 utopia.203.desc.a: "Sob a orientação do Conclave de Telepatas, os [target_species.GetNamePlural] desenvolveram uma conexão mais profunda com o Véu do que jamais poderíamos ter imaginado. É como se todos esses poderes tivessem sido feitos para eles o tempo todo.\n\nAgora eles dizem estar prontos para liberar seu potencial psiônico pleno. O conclave, porém, está dividido. Alguns estão preocupados que a mudança chegou rápido demais e que suas mentes se tornariam instáveis, outros que seus poderes recém descobertos podem subir à cabeça. Mas se não atacarmos agora, talvez nunca mais tenhamos outra chance."
 utopia.203.desc.b: "Os [target_species.GetNamePlural] também dizem que estão prontos para dar os passos necessários para atingir o seu potencial psiônico pleno e serem despertados."
 utopia.203.a: "Eles estão prontos."
 utopia.203.a.tooltip: "Todos os Pops do povo [target_species.GetAdj] ganharão a característica §Y$trait_psionic$§!."
 utopia.203.b: "Eles não são dignos."
 utopia.203.c: "É perigoso demais."
 utopia.204.name: "Um Despertar Rude"
 utopia.204.desc.a: "Nos últimos tempos, nossos pesquisadores têm estado perplexos com a manifestação não esperada de habilidades psiônicas em alguns [original_species.GetSpeciesNamePlural]. Após uma investigação, eles descobriram que essas mudanças coincidiram com um grande despertar psiônico dos seus irmãos no [target_country.GetName], uma nação que há muito tempo é conhecida pela sua habilidade no campo da psiônica.\n\nSó podemos assumir que alguns dos poderes recém-descobertos deles transbordaram para seus parentes distantes em nosso império, através de meios que ainda não compreendemos."
 utopia.204.desc.b: "Recentemente nossos pesquisadores estão perplexos com a manifestação não esperada de habilidades psiônicas em alguns [original_species.GetSpeciesNamePlural]. Após uma análise mais detalhada, eles descobriram que os psiônicos estão ligados telepaticamente com os seus irmãos em uma nação até então desconhecida, o [target_country.GetName], com a qual estabelecemos comunicações agora. Parece que as mudanças que sentimos foram um efeito cascata, trazido por um grande despertar psiônico de todos os [original_species.GetSpeciesNamePlural] no [target_country.GetName]."
 utopia.204.a.tooltip: "Até 4 Pops [original_species.GetSpeciesAdj] ganharão a característica §Ypsiônico latente§!."
 utopia.205.name: "Um Despertar Inesperado"
 utopia.205.desc: "Desde o despertar psiônico do [target_species.GetName], nossos informantes relatam que alguns indivíduos que pertencem à mesma espécie em outro lugar também começaram a mostrar sinais de habilidades psiônicas latentes. É como se a descendência comum os conectasse no Véu, independentemente da distância física entre eles.\n\nPorém, ao contrário dos seus parentes distantes em nossa nação, eles são poucos, e é improvável que atinjam um despertar completo."
 whisperers_madness: "Loucura do Véu"
 whisperers_madness_desc: "A população de nosso império está dividida devido à loucura causada pel$whisperers_in_the_void_color_article$."
 whisperers_madness_gestalt: "$whisperers_madness$"
 whisperers_madness_gestalt_desc: "Nossos drones estão divididos devido à mania coletiva causada pel$whisperers_in_the_void_color_article$."
 whisperers_psychosis: "Psicose do Véu"
 whisperers_psychosis_desc: "Nosso império foi vítima de disputas internas devido à loucura causada pel$whisperers_in_the_void_color_article$."
 whisperers_psychosis_gestalt: "$whisperers_psychosis$"
 whisperers_psychosis_gestalt_desc: "Nosso império foi tomado pela discórdia interna devido aos desequilíbrios causados pel$whisperers_in_the_void_color_article$."
