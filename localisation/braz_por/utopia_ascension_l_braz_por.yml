 triggered_opinion_both_wilderness: "Companheira Silvestria"
 triggered_opinion_hive_mind: "Mente-Colmeia"
 utopia.2700.name: "Evolução Engendrada"
 utopia.2700.desc: "Às vezes, a evolução precisa de um empurrãozinho na direção certa. Agora temos a tecnologia para modificar geneticamente nossos corpos e mentes para suportarem os desafios de um ambiente que está sempre mudando e cada vez mais rápido."
 utopia.2703.name: "Domínio da Evolução"
 utopia.2703.desc: "Foram-se os dias em que a sobrevivência de nossa espécie estava à mercê do acaso. Quando o destino de um [Root.GetSpeciesName] era decidido pelos caprichos da natureza, em uma loteria genética.\n\nOs Engenheiros do nosso tempo não trabalham com aço e concreto, mas com as pedras fundamentais da vida em si. Com a modificação de gene avançada, garantiremos o futuro de nossa nação."
 utopia.2600.name: "Mente sobre a Matéria"
 utopia.2600.desc: "Desde o começo de nossa civilização, histórias se popularizaram sobre grandes feiticeiros com poderes que só podem ser descritos como naturalmente supernaturais. Estes raros [Root.GetSpeciesNamePlural] supostamente poderiam invadir as mentes de seus companheiros, levantar objetos pesados simplesmente com a força do pensamento, ou desempenhar quaisquer outros feitos \"mágicos\". Até pouco tempo, estas histórias eram justamente isso - histórias.\n\nAgora porém, nossos cientistas finalmente obtiveram provas conclusivas que provam o potencial inerente em certos indivíduos [Root.GetSpeciesName]. Apesar de somente uma pequena minoria de nossa espécie como um todo ter sido presenteada com poderes psiônicos, seus números relativos à população total cresceram nos últimos séculos.\n\nSe isso é algum tipo de crescimento evolucionário súbito ou por que algo ativou suas habilidades psiônicas latentes que sempre estiveram presentes em nosso código genético, nossos cientistas não sabem dizer."
 utopia.2600.desc.unplugged: "Apesar da história breve e violenta de nossa jovem civilização, nós, [root.GetSpeciesNamePlural], tivemos momentos em que demos asas à nossa imaginação e desfrutamos de histórias fantásticas. Entre essas ideias divertidas, eram recorrentes contos sobre grandes feiticeiros com poderes que só podem ser descritos como naturalmente supernaturais: ler mentes, mover objetos pesados com o pensamento ou desempenhar quaisquer outros feitos \"mágicos\".\n\nMuitos acreditam que contamos essas histórias desde antes de nossa assimilação, que elas estão inseridas na psique coletiva de nossa espécie. Até recentemente, a maior parte dos [root.GetSpeciesNamePlural] considerava essa uma ilusão ingênua. Agora, porém, nossos cientistas finalmente obtiveram provas conclusivas que atestam um potencial psiônico inerente em certos indivíduos do povo [Root.GetSpeciesAdj].\n\nApesar de somente uma pequena parcela de nossa espécie ter sido presenteada com poderes psiônicos, estudos genéticos indicam que seus números aumentaram gradualmente nos últimos séculos. Se isso é algum tipo de desenvolvimento evolucionário súbito ou fruto da interferência de [origin_unplugged_assimilator_empire.GetName], nossos cientistas não sabem dizer."
 utopia.2600.a: "Uma prévia, talvez, do que nos aguarda no futuro."
 utopia.2602.name: "[From.GetSpeciesNamePlural] Exibem Potencial Psiônico"
 utopia.2602.1.desc.1.non_gestalt_intro: "Poderes psiônicos latentes começaram a se manifestar entre certos indivíduos"
 utopia.2602.1.desc.1.non_gestalt_outro: "de acordo com relatórios vazados de autoridades em §H[From.GetName]§!. Isso deve ser um evento um tanto recente, já que não temos relatos de [From.GetSpeciesNamePlural] demonstrando habilidades psiônicas."
 utopia.2602.1.desc.1.organic_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ pertencentes à espécie [From.GetSpeciesName] $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.machine_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ do tipo mecânico [From.GetSpeciesName], $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.gestalt_intro: "Poderes psiônicos latentes começaram a se manifestar entre certos [From.GetSpeciesNamePlural], de acordo com relatórios vazados de autoridades em §H[From.GetName]§!. Embora"
 utopia.2602.1.desc.1.gestalt_outro: "habilidades paranormais muito além de tudo já registrado sobre eles."
 utopia.2602.1.desc.1.organic_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ uma conexão cognitiva entre suas espécies não seja novidade, esses relatórios descrevem $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.1.machine_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ a comunicação via rede neural entre seus membros não seja novidade, esses relatórios descrevem $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.2.intro: "Até o momento, esses poderes estão restritos a um pequeno grupo"
 utopia.2602.1.desc.2.outro: "Os relatórios são incapazes de explicar o fenômeno."
 utopia.2602.1.desc.2.organic: "$utopia.2602.1.desc.2.intro$ da espécie [From.GetSpeciesName] como um todo. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.2.machine: "$utopia.2602.1.desc.2.intro$ De [From.GetSpeciesNamePlural]. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.machine_gestalt: "$utopia.2602.1.desc.1.machine_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.machine_non_gestalt: "$utopia.2602.1.desc.1.machine_non_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.organic_gestalt: "$utopia.2602.1.desc.1.organic_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.1.desc.organic_non_gestalt: "$utopia.2602.1.desc.1.organic_non_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.2.desc: "A população de [From.GetSpeciesNamePlural] dentro de nossas fronteiras também começou a exibir mudanças semelhantes, então o que quer que esteja acontecendo à sua espécie não está localizado numa região específica do espaço."
 utopia.2602.a.organic_non_gestalt: "Que peculiar."
 utopia.2602.a.hive_or_machine_non_gestalt: "Poderes especiais? Improvável."
 utopia.2602.a.machine_gestalt: "A informação não computa."
 utopia.2602.b: "Poderes psíquicos? Que ideia!"
 utopia.2602.c: "A feitiçaria deles não será suficiente para salvá-los."
 utopia.2602.d.organic: "Sim... Sim, podemos sentir suas emanações psíquicas."
 utopia.2602.d.machine: "Sim... Registramos suas frequências psiônicas"
 utopia.2605.name.organic_non_gestalt: "Revelação de Poderes Psíquicos de [psionic_leader.GetTitle]"
 utopia.2605.name.machine_non_gestalt: "Identificação de Poderes Psiônicos em [psionic_leader.GetTitle]"
 utopia.2605.name.gestalt: "Identificação de Poderes Psiônicos em [psionic_leader.GetName]"
 utopia.2605.desc.organic_non_gestalt: "Apesar da manifestação de poderes psiônicos no início da fase adulta ser rara, não é algo inédito. [psionic_leader.GetTitle] [psionic_leader.GetName] recentemente demonstrou habilidades que suspeitamos serem naturalmente psiônicas. Após um minucioso teste de percepção extrassensorial, identificamos que seu talento psiônico é de classe 4."
 utopia.2605.desc.machine_non_gestalt: "Embora seja raro, unidades que não conhecidas por apresentar poderes psiônicos ainda podem desenvolvê-los. [psionic_leader.GetTitle] [psionic_leader.GetName] demonstrou recentemente funcionalidades que poderiam ser classificadas como psiônicas. Após testes minuciosos, identificamos suas capacidades psiônicas como de classe 4."
 utopia.2605.desc.gestalt: "A influência de nossos poderes recém-descobertos cresce todos os dias. O receptáculo de nosso [GetBrainName], [psionic_leader.GetName], demonstrou recentemente habilidades que podem ser classificadas como psiônicas. Após testes minuciosos, identificamos [psionic_leader.GetName] como [GetPsychicNoun] de classe 4."
 utopia.2605.a: "Estas novas habilidades nos servirão bem."
 utopia.2652.name: "[This.GetSpeciesNamePlural] Despertam Habilidades Psiônicas"
 utopia.2652.desc.1.intro: "Todos os [This.GetSpeciesNamePlural] pela galáxia sofreram mudanças profundas. Se antes seus poderes psiônicos latentes haviam"
 utopia.2652.desc.1.outro: "agora liberou seu potencial psiônico pleno."
 utopia.2652.desc.1.organic: "$utopia.2652.desc.1.intro$ florescido apenas em uma minoria, a espécie inteira $utopia.2652.desc.1.outro$"
 utopia.2652.desc.1.machine: "$utopia.2652.desc.1.intro$ surgido apenas em uma minoria, a totalidade de seus membros $utopia.2652.desc.1.outro$"
 utopia.2652.desc.2.non_gestalt: "Embora essas mudanças possam ter se originado em [From.GetName], elas se manifestaram em todos os membros de sua [GetSpeciesWord], independentemente da localização."
 utopia.2652.desc.2.organic_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\nAlém de exibirem uma grande variedade de habilidades psiônicas poderosas, os [This.GetSpeciesNamePlural] começaram a abrir mão da comunicação verbal entre si em favor da telepatia."
 utopia.2652.desc.2.machine_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.desc.2.gestalt.intro: "Além de exibirem uma grande variedade de habilidades psiônicas poderosas, os [This.GetSpeciesNamePlural] agora podem se comunicar"
 utopia.2652.desc.2.organic_gestalt: "$utopia.2652.desc.2.gestalt.intro$ de forma não verbal, além de seus canais existentes."
 utopia.2652.desc.2.machine_gestalt: "$utopia.2652.desc.2.gestalt.intro$ além de seus canais coletivos existentes."
 utopia.2652.desc.organic_non_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_non_gestalt$"
 utopia.2652.desc.machine_non_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_non_gestalt$"
 utopia.2652.desc.organic_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_gestalt$"
 utopia.2652.desc.machine_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.b: "Deve haver alguma explicação lógica para isso."
 utopia.2652.c.organic: "Prossiga com cuidado."
 utopia.2652.c.machine: "Um desenvolvimento aquém do esperado."
 utopia.2652.d.organic: "Sentimos a grande perturbação psiônica do seu Despertar."
 utopia.2652.d.machine: "Isso explica as perturbações psiônicas que detectamos."
 utopia.2650.name: "O Grande Despertar"
 utopia.2650.desc: "A espécie [Root.GetSpeciesName] passou por algo que só pode ser descrito como um Grande Despertar. Já há algum tempo, estamos cientes do grande potencial psiônico inerente à nossa espécie, mas tais poderes só se manifestaram em uma pequena minoria... até agora.\n\nPraticamente da noite para o dia, [Root.GetSpeciesNamePlural] em vários lugares liberaram sua capacidade psiônica plena. É como se algum tipo de piscina comum de energia psíquica [Root.GetSpeciesName] finalmente atingisse um ponto de virada crítico, despertando coletivamente as habilidades latentes em nosso cérebro.\n\nA telepatia já substituiu a maior parte da comunicação verbal entre os [Root.GetSpeciesNamePlural], e isso é só um pequeno exemplo das inumeráveis mudanças que nossa sociedade enfrentará. Agora estamos unidos de uma tal forma que poucos de nós poderiam ter imaginado."
 utopia.2650.a: "O manto foi removido."
 utopia.2655.name: "O Véu"
 utopia.2655.desc: "Como um sussurro abafado em um ambiente escuro, o Véu nos chama de dentro de nossas mentes. É um reino primordial de pura energia psíquica que surgiu no início dos tempos. Todas as criaturas que foram dotadas de habilidades psiônicas se conectam com o Véu de alguma forma para extrair poder, mesmo que apenas de modo subconsciente.\n\nDesde nossa transcendência, começamos a enxergar o Véu com mais clareza. Há padrões onde até mesmo nossos telepatas mais fortes conseguiam ver apenas uma massa disforme de energia. Há... outras coisas também. Espíritos que olham de volta para nós do outro lado. Às vezes com curiosidade, às vezes com gentileza... e às vezes com maldade.\n\nAinda estamos no processo de descobrir a extensão dos nossos novos poderes, mas talvez possamos nos comunicar com esses espíritos. Isso vai exigir os esforços combinados de nossos telepatas mais poderosos."
 utopia.2655.a: "Precisamos explorar o Véu."
 BREACHING_SHROUD_PROJECT: "Rompendo o Véu"
 BREACHING_SHROUD_PROJECT_DESC: "Se vamos nos comunicar com os cidadãos do reino psíquico conhecido como o Véu, teremos que libertar uma grande quantidade de energia psiônica. Preparações foram feitas para uma grande sessão espírita envolvendo nossos paranormais mais poderosos no recém-estabelecido Conclave de Telepatas em [Root.Capital.GetName]."
 utopia.2656.name: "A Sessão Espírita"
 utopia.2656.desc: "Após dias trancados em um transe hipnótico, nossos paranormais no Conclave de Telepatas finalmente conseguiram abrir um portal para o Véu.\n\nAgora que estabelecemos uma conexão psiônica inicial, conseguiremos acessar o Véu através do menu §HContatos§! no futuro. Para realizar qualquer tipo de incursão neste reino e encontrar os seres que lá habitam, provavelmente precisaremos usar emissores psiônicos especiais para aumentar nosso alcance psíquico. Isso consumirá uma quantidade tremenda de energia."
 utopia.2656.a: "Hora de tentar entrar e ver o que descobrimos."
 utopia.2657.name: "Através do Espelho"
 utopia.2657.desc: "Embora ainda tenhamos que perfurar o manto, podemos sentir que ele fica cada vez mais tênue sob a pressão conjunta de nossas mentes. Porém, nossos esforços para entrar no §HVéu§! não passaram despercebidos. Há algo nos observando.\n\nEssa presença emite um poder fenomenal, e seu objetivo é desconhecido. Ela se infiltra nas fissuras de nossa psique.\n\nA presença quase não nos percebe e nos observa como nós observaríamos uma gota de condensação na escotilha. Talvez nos deixe entrar, se conseguirmos alcançar sua mente insondável."
 utopia.2657.a: "Tente se comunicar com ela."
 utopia.2657.a.tt: "§GIsso vai nos permitir formar um Pacto.§!"
 utopia.2657.b: "Vamos nos aventurar sozinhos."
 utopia.2657.c: "Foi uma péssima ideia! Nós precisamos tomar mais cuidado."
 utopia.2658.name: "Uma Confirmação"
 utopia.2658.desc: "Já se passou algum tempo desde que estabelecemos as bases de um Pacto com §H[GetShroudPatron]§!. Nosso vínculo continua fraco, e ainda temos a possibilidade de encerrá-lo – ou de fortalecê-lo."
 utopia.2658.a: "Confirme o Pacto."
 utopia.2658.b: "Rejeite §Y[GetShroudPatron]§!."
 utopia.2659.name: "Uma Entrada"
 utopia.2659.desc: "Nossos telepatas se empenharam incansavelmente para romper o §HVéu§! sem a ajuda de seus habitantes. Por fim, eles encontraram uma entrada. O abismo está nos chamando. Precisamos apenas ter a coragem de saltar para dentro dele."
 utopia.2659.a: "Vamos para as profundezas veladas."
 FORM_COVENANT_PROJECT: "Comunicação com o Desconhecido"
 FORM_COVENANT_PROJECT_DESC: "O Conclave de Telepatas em [Root.Capital.GetName] está preparando uma grande comunicação para contatar uma entidade que habita o Véu."
 utopia.3020.name: "§GAvatar Psiônico Invocado§!"
 utopia.3020.desc: "As poderosas energias do §HVéu§! foram canalizadas com sucesso para um Avatar psiônico sob nosso controle!\n\nApós trazê-lo à nossa dimensão, o Avatar recém-nascido se transformou em uma entidade espacial em órbita sobre [Root.Capital.GetName]."
 utopia.3021.desc: "As poderosas energias do §HVéu§! foram canalizadas com sucesso para um Avatar psiônico sob nosso controle!\n\nApós trazê-lo à nossa dimensão, o Avatar recém-nascido se transformou em um guerreiro colossal na superfície de [Root.Capital.GetName]."
 utopia.3022.name: "§RInvocação Falhou§!"
 utopia.3022.desc: "A canalização de energia psiônica necessária para invocar um Avatar e trazê-lo à nossa dimensão está simplesmente além de nossa capacidade atual. As energias do §HVéu§! tremem em agitação enquanto nossa tentativa falha."
 utopia.3023.name: "Ataques de Entidade Psiônica"
 utopia.3023.desc: "A tentativa de invocar um Avatar psiônico foi apenas parcialmente bem-sucedida. Apesar de a criatura ter assumido sua forma correta e entrado em nossa dimensão, nossa equipe de [GetTelepathPlural] não conseguiu controlá-la!\n\nAgora estamos enfrentando uma entidade psiônica agressiva que destruirá tudo em seu caminho."
 utopia.3024.name: "Incursão do Véu"
 utopia.3024.desc: "Uma criatura do §HVéu§! perfurou o tecido do espaço e se materializou no sistema [shroud_spawn_system.GetName]! Esse Avatar vingativo reuniu uma quantidade tremenda de energia psiônica, e a está usando para atacar tudo e todos que atravessarem o seu caminho."
 utopia.3024.a: "Ele deve ser detido!"
 utopia.3026.name: "Avatar do Véu Banido"
 utopia.3026.desc: "A atrofia contínua de existir no espaço normal enfraqueceu o Avatar no sistema §H[shroud_spawn_system.GetName]§!.\n\nSem poder manter sua forma tangível, ele retornou para o §HVéu§!."
 utopia.3026.a.default: "Já vai tarde."
 utopia.3026.a.machine_or_hive: "Um resultado fortuito."
 exit.shroud: "Saindo do Véu."
 shroud_army: "Avatar Psiônico"
 shroud_army_desc: "Um guerreiro colossal do Véu que foi feito de energia psiônica pura."
