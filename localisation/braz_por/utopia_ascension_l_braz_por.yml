 utopia.3000.name: "O Véu"
 utopia.3000.a: "Entrando em contato com o Véu."
 utopia.3000.intro.desc: "O Véu. Ele é inacreditavelmente estranho e perturbador, mas também... imediatamente familiar. Qualquer um com poderes psiônicos já viu este lugar nos seus sonhos, apesar de eles não saberem disso quando aconteceu.\n\nAgora estamos no precipício deste reino, não distantes do vazio do Entremundos que serve como fronteira entre aqui e o espaço normal - ou o que chamamos de mundo real.\n\nPara nos aventurarmos mais profundamente no Véu, precisaremos de muito esforço por parte de nossos telepatas, bem como uma grande quantidade de energia. Não podemos demorar... agora mesmo, estamos sendo observados."
 utopia.3000.1.desc: "O Véu está em silêncio hoje."
 utopia.3000.2.desc: "Algo está nos observando."
 utopia.3000.3.desc: "Tudo parece tão diferente deste lado."
 utopia.3000.4.desc: "Eles deveriam ter mandado um poeta..."
 utopia.3000.5.desc: "Algo de sombrio está por vir."
 utopia.3000.6.desc: "Ainda estamos sonhando?"
 utopia.3000.7.desc: "Nós... nós conseguimos. Estamos dentro!"
 utopia.3000.8.desc: "Um... tipo de, presença, está próximo. Ele nos chama a ir mais fundo no Véu..."
 utopia.3000.9.desc: "Você também consegue ouvir as vozes?"
 utopia.3000.10.desc: "O Véu pulsa com poder. Parece que estamos... em casa."
 utopia.3000.11.desc: "Você acha que isso que está respirando é ar?"
 utopia.3000.12.desc: "Vemos e mesmo assim não vemos. Ainda há muito a ser aprendido sobre este lugar."
 utopia.3000.13.desc: "Que sentidos não temos que não conseguimos ver e ouvir outro mundo que está totalmente ao nosso redor?"
 utopia.3000.14.desc: "Tome o maior cuidado possível. Até um pensamento perdido pode ser transformado em algo tangível neste lugar... e, geralmente, voltado contra si mesmo."
 utopia.3000.15.desc: "Nunca fomos feitos para estar aqui."
 utopia.3000.16.desc: "Tanto... poder..."
 utopia.3000.17.desc: "Preciso... me concentrar..."
 utopia.3000.18.desc: "Isso pode ser onde tudo começou?"
 utopia.3000.19.desc: "O terror... o terror tem um rosto."
 utopia.3000.b: "§MContate um ser superior.§!"
 utopia.3005.desc: "Sabemos que há entidades com muito poder na imensidão do espaço. Embora não seja nosso hábito chamar atenção, poderíamos tentar nos comunicar por meio dos poderes do Zro. A influência das entidades é sentida pelos nossos telepatas por todo o Véu. Com qual delas devemos falar?"
 utopia.3005.a: "§GCom uma que cheire a carne desfeita.§!"
 utopia.3005.b: "§PCom uma que grite sobre o vazio insaciável.§!"
 utopia.3005.c: "§HCom uma que sussurre sobre desejo e posse.§!"
 utopia.3005.d: "§BCom uma que tenha gosto de confiança perdida.§!"
 utopia.3010.desc: "O Conclave de Telepatas ainda não se recuperou do cansaço de nossa visita anterior ao Véu. Sem o seu poder psiônico combinado, conseguimos apenas enxergar breves relances deste reino fugaz - como se fosse as bordas borradas de uma memória que está um pouco fora de alcance.\n\nNão há nada para nós aqui. Teremos que voltar mais tarde."
 boon.bestowed: "§GBenefício Concedido§!"
 curse.bestowed: "§RMaldição Concedida§!"
 boon.psi.link.machine: "As energias poderosas do §HVéu§! inundaram o hub de processamento psiônico que é compartilhado entre todos os [Root.GetSpeciesNamePlural]."
 boon.psi.link.organic_non_gestalt: "As energias poderosas do §HVéu§! inundaram a conexão psiônica comunal que é compartilhada entre todos os [Root.GetSpeciesNamePlural]."
 boon.psi.link.hive: "As energias poderosas do §HVéu§! inundaram a conexão psiônica comunal que pulsa através da Mente Superior do povo [Root.GetAdjective]."
 boon.psi.link: "[GetBoonPsiLink]"
 boon.ship.link: "Nossa equipe de [GetTelepathPlural] conseguiu estabelecer um canal temporário entre o §HVéu§! e nossas naves estelares."
 utopia.3030.desc.gestalt: "$boon.psi.link$\n\nEssas energias fluem pela rede do coletivo, garantindo perfeita estabilidade enquanto nossos drones cumprem seu propósito."
 utopia.3030.desc.organic_non_gestalt: "$boon.psi.link$\n\nUma sensação de calmaria profunda está se espalhando por [Root.GetName] e afetando até mesmo aqueles sem habilidades psiônicas."
 utopia.3030.desc.machine_non_gestalt: "$boon.psi.link$\n\nUm equilíbrio operacional profundo está se espalhando por [Root.GetName] e afetando até mesmo aqueles sem componentes psiônicos."
 utopia.3031.desc: "$boon.ship.link$\n\nNossas frotas não demonstram nenhum sinal de degradação independentemente de seu registro de serviços. Como resultado, nossos custos de manutenção diminuíram significativamente."
 utopia.3032.desc.non_gestalt: "$boon.psi.link$\n\nEstabelecemos uma base coletiva de conhecimento compartilhado entre nossas equipes de [GetScientistPlural], o que aumentará muito sua eficiência de trabalho."
 utopia.3032.desc.organic_gestalt: "$boon.psi.link$\n\nNossos nódulos focados em pesquisa dentro da Mente Superior dos [Root.GetSpeciesNamePlural] estão operando em perfeita sincronia, aumentando nossa capacidade cognitiva."
 utopia.3032.desc.machine_gestalt: "$boon.psi.link$\n\nCiclos de renderização psiônicos permitem que nossa matriz de pesquisa opere além da eficiência máxima, melhorando bastante a eficácia do aprendizado."
 utopia.3033.desc: "$boon.ship.link$\n\nAs tripulações de nossas naves de guerra agora podem aumentar a força de nossos sistemas de escudo usando seus poderes psiônicos."
 utopia.3034.desc: "$boon.ship.link$\n\nAo usar seus poderes psiônicos, nossa tripulação agora é capaz de aumentar a força de nossos sistemas de armas."
 utopia.3035.desc: "$boon.ship.link$\n\nAo usar seus poderes psiônicos, nossa tripulação agora é capaz aumentar a taxa de disparos de nossos sistemas de armas."
 utopia.3036.desc.organic_non_gestalt: "$boon.psi.link$\n\nUm novo senso de solidariedade floresceu nos corações e mentes de nossos cidadãos, tornando-os mais dispostos a trabalhar em conjunto rumo aos objetivos mútuos estabelecidos pelo nosso governo."
 utopia.3036.desc.machine_non_gestalt: "$boon.psi.link$\n\nUm novo senso de solidariedade apareceu nos núcleos de processamento de nossos cidadãos, tornando-os mais dispostos a trabalhar em conjunto rumo aos objetivos mútuos estabelecidos pelo nosso governo."
 utopia.3036.desc.gestalt: "$boon.psi.link$\n\nEssas energias persistem no coletivo, otimizando a eficiência de nossos drones e reduzindo qualquer desvio remanescente que, do contrário, tiraria nosso foco."
 utopia.3037.desc.organic_non_genocidal: "$boon.psi.link$\n\nNossas empatias estão mais fortes do que nunca, resultando em uma influência política maior."
 utopia.3037.desc.machine_non_genocidal: "$boon.psi.link$\n\nNossas unidades diplomáticas estão operando com eficiência empática máxima, resultando em maior influência política."
 utopia.3037.desc.genocidal: "$boon.psi.link$\n\nNossa vontade é imposta sobre a galáxia em uma escala nunca antes vista."
 utopia.3038.desc.gestalt: "$boon.psi.link$\n\nNunca experimentamos tamanho esclarecimento e unidade de objetivo."
 utopia.3038.desc.non_gestalt: "$boon.psi.link$\n\nNunca tivemos uma noção tão grande de unidade."
 utopia.3039.desc: "$boon.ship.link$\n\nAo usar seus poderes psiônicos, nossa tripulação agora consegue afetar diretamente o movimento de nossas naves, aumentando sua ação evasiva contra o fogo inimigo."
 utopia.3040.desc.organic: "$boon.ship.link$\n\nAo usar seus poderes psiônicos, nossa tripulação agora consegue executar reparos limitados em campo, consertando rachaduras no casco apenas com suas mentes."
 utopia.3040.desc.machine: "$boon.ship.link$\n\nAo usar seus poderes psiônicos, nossa tripulação agora consegue executar reparos limitados em campo, consertando rachaduras no casco apenas com seus neuroprocessadores."
 utopia.3041.desc.machine: "$boon.psi.link$\n\nNossa equipe de [GetTelepathPlural] usou esse poder para momentaneamente melhorar o desempenho funcional entre nossas unidades líderes proeminentes, adiando sua data estimada de obsolescência em décadas. Infelizmente, não havia energia psiônica suficiente para aplicar o efeito na população como um todo."
 utopia.3041.desc.organic_gestalt: "$boon.psi.link$\n\nNossa equipe de [GetTelepathPlural] usou esse poder para momentaneamente diminuir o processo de envelhecimento de nossos drones líderes proeminentes, adicionando décadas às suas expectativas de vida naturais. Infelizmente, não havia energia psiônica suficiente para aplicar o efeito na população como um todo."
 utopia.3041.desc.organic_non_gestalt: "$boon.psi.link$\n\nNossa equipe de [GetTelepathPlural] usou esse poder para momentaneamente diminuir o processo de envelhecimento de nossos líderes proeminentes, adicionando décadas às suas expectativas de vida naturais. Infelizmente, não havia energia psiônica suficiente para aplicar o efeito na população como um todo."
 utopia.3041.tooltip: "Todos os líderes recebem a característica §Y$leader_trait_shroud_age$§!, que concede §G+40§! anos à expectativa de vida do líder."
 utopia.3042.desc: "$boon.ship.link$\n\nAo usar seus poderes psiônicos, nossa tripulação agora é capaz de aumentar a força dos propulsores em suas naves, resultando em um grande aumento na velocidade abaixo da luz."
 utopia.3043.desc.organic: "$boon.psi.link$\n\nIsso fortificou as mentes de nossos soldados, que agora estão dispostos a enfrentar qualquer perigo no campo de batalha. Seu moral é inigualável."
 utopia.3043.desc.machine_or_gestalt: "$boon.psi.link$\n\nIsso reforçou o comprometimento de nossos drones de combate a seus propósitos, otimizando sua eficiência em campo."
 utopia.3044.desc: "$boon.psi.link$\n\nAgora podemos sentir as naves enquanto elas se movem através do espaço com uma velocidade muito maior do que qualquer rede de sensores seria capaz de detectar."
 utopia.3045.name: "Expulsos do Véu"
 utopia.3045.1.desc: "O canal que nossa equipe de [GetTelepathPlural] estava usando para se conectar ao Véu colapsou quando diversas camadas de energia psíquica se moveram sem aviso.\n\nEstamos sendo expulsos rapidamente de volta para o espaço normal."
 utopia.3045.2.desc: "Nossa equipe de [GetTelepathPlural] foi dominada pela pressão intensa a que estava submetida durante nossa comunhão com o Véu.\n\nA conexão não pode mais ser mantida."
 utopia.3045.3.desc_organic: "Inicialmente aos poucos, depois cada vez mais rápido, nosso domínio sobre o Véu começa a fraquejar. Nossa equipe de [GetTelepathPlural] grita de angústia enquanto perde sua base e somos expulsos de volta para o espaço normal."
 utopia.3045.3.desc_machine: "Inicialmente aos poucos, depois cada vez mais rápido, nosso domínio sobre o Véu começa a fraquejar. Nossa equipe de [GetTelepathPlural] começa a apresentar defeitos enquanto perde sua base e somos expulsos de volta para o espaço normal."
 curse.psi.link.organic: "Um contra-ataque psíquico poderoso voltou pelo nosso túnel com o Véu, e para a conexão psiônica comunal que é compartilhada entre todos os [Root.GetSpeciesNamePlural]."
 curse.psi.link.machine: "Uma reação neural poderosa reverberou pelo nosso canal com o Véu, e para a conexão psiônica comunal que é compartilhada entre todos os [Root.GetSpeciesNamePlural]."
 curse.psi.link: "[GetCursePsiLink]"
 curse.ship.link: "Uma reação psiônica poderosa reverberou pelo nosso canal com o Véu, e parece estar afetando nossas naves."
 utopia.3050.desc.gestalt: "$curse.psi.link$\n\nIsso resultou em uma perturbação dentro do coletivo [Root.GetName], levando à desestabilização de todo o império."
 utopia.3050.desc.non_gestalt: "$curse.psi.link$\n\nIsso teve um efeito profundo sobre a felicidade de nossos cidadãos, e uma sensação de melancolia agora permeia todo o território de [Root.GetName]."
 utopia.3051.desc.gestalt: "$curse.psi.link$\n\nAs ondas de choque resultantes que se espalharam pelo coletivo levaram a um aumento perturbador de comportamentos desviantes em nossos drones."
 utopia.3051.desc.non_gestalt: "$curse.psi.link$\n\nEssa energia negativa espalhou dúvida nas mentes de nossos cidadãos. Muitos estão se voltando para novas ideias radicais que não estão de acordo com nosso governo. O efeito se espalhou até para nossos cidadãos não-paranormais!"
 utopia.3052.desc: "$curse.ship.link$\n\nA blindagem deles ficou quebradiça, e não pode mais aguentar o impacto que aguentava."
 utopia.3053.desc.machine: "$curse.psi.link$\n\nA pressão resultante em nossa rede neural levou a uma notável queda na construção de unidades em todo o território de [Root.GetName]."
 utopia.3053.desc.organic_gestalt: "$curse.psi.link$\n\nA dor resultante sentida em todo coletivo causou uma notável redução em nossa habilidade de produzir novos drones físicos."
 utopia.3053.desc.organic_non_gestalt: "$curse.psi.link$\n\nPor algum motivo, isso teve um efeito prejudicial na quantidade de nascimentos ao redor do [Root.GetName]. Isso afetou até mesmo membros das raças que não possuem habilidade psiônica inerente!"
 utopia.3054.desc.machine_gestalt: "$curse.psi.link$\n\nOs ciclos de retroalimentação de renderização psiônica resultantes estão impedindo nossas matrizes de pesquisa de operarem eficientemente em capacidade total."
 utopia.3054.desc.machine_non_gestalt: "$curse.psi.link$\n\nAs [GetMindPhysicalLoc] de nossos pesquisadores estão sendo sobrecarregadas, deixando-os incapazes de se concentrar em seu trabalho de maneira eficiente."
 utopia.3054.desc.organic_gestalt: "$curse.psi.link$\n\nNossos nódulos de pesquisa dentro do coletivo dos [Root.GetSpeciesNamePlural] estão sobrecarregados. Dessa forma, somos incapazes de processar novas descobertas de maneira eficiente."
 utopia.3054.desc.organic_non_gestalt: "$curse.psi.link$\n\nAs [GetMindPhysicalLoc] de nossos pesquisadores estão ficando confusas, deixando-os incapazes de se concentrar em seu trabalho de maneira eficiente."
 utopia.3055.desc: "$curse.psi.link$\n\nA taxa com a qual acumulamos influência política foi muito diminuída."
 utopia.3056.desc.organic_non_gestalt: "$curse.psi.link$\n\nA noção de unidade que já existiu entre nossos cidadãos foi destruída."
 utopia.3056.desc.machine_or_gestalt: "$curse.psi.link$\n\nO sentido de unidade que uma vez existiu em [Root.GetName] foi abalado, levando a uma falta de coordenação generalizada."
 utopia.3057.desc: "$curse.ship.link$\n\nNossas naves se movem como se fossem refreadas por uma força invisível. Isso resultou em uma velocidade de viagem abaixo da luz muito mais lenta."
 utopia.3058.desc.organic_non_gestalt: "$curse.psi.link$\n\nEssa energia negativa corroeu a moral de nossas tropas terrestres, que ficarão muito menos eficazes em batalha por um tempo."
 utopia.3058.desc.machine_or_gestalt: "$curse.psi.link$\n\nCiclos de retroalimentação causados por esse pico de energia danificaram a eficiência operacional de nossas tropas terrestres."
 utopia.3059.desc: "Uma reação psiônica poderosa reverberou pelo nosso canal com o Véu e parece interferir com nossos sensores interestelares.\n\nA resolução dos sensores de todas as fontes foi seriamente reduzida, resultando em alcances de sensor muito mais curtos."
