 instrument_deviance_planet: "Desvio do Véu"
 instrument_deviance_planet_desc: "A população deste planeta está se afastando das éticas do nosso império para perseguir seus próprios objetivos. Isso é sem dúvida graças ao §YInstrumento de Desejo§!."
 instrument_deviance_empire: "Desvio do Véu"
 instrument_deviance_empire_desc: "A população do nosso império inteiro começou a questionar a ética e as políticas de nosso império. Isso é sem dúvida graças ao §YInstrumento de Desejo§!."
 instrument_consumer_goods: "Decadência do Véu"
 instrument_consumer_goods_desc: "A população deste planeta se voltou ao consumismo decadente, desesperada por comidas e bens exóticos e exclusivos. Isso é sem dúvida graças ao §YInstrumento de Desejo§!."
 d_eater_deposit: "Cratera Velada"
 d_eater_deposit_desc: "Parte deste planeta foi devorada por uma entidade do §HVéu§!. A cratera resultante agora abriga névoas púrpuras rodopiantes, e aqueles que chegam perto demais tendem a desaparecer."
