 # Civil War
 ############
 # Civil War & 'The Injured'
 unplugged.100.name: "A Vitória é Nossa"
 unplugged.100.desc: "Tão logo despertamos neste universo, essas máquinas violentas tentaram nos remover dele. Porém, somos aparentemente mais adeptos da violência do que elas.\n\nO povo chamado §Y[origin_unplugged_assimilator_empire.GetName]§! sofreu uma grande derrota hoje. Nossa inteligência indica que o império deles se fragmentou de forma irreconhecível – o que certamente não se deve a esse pequeno conflito. Sabemos tão pouco no momento, mas nossos... instintos? Eles nos dizem que algo está errado.\n\nOs sensores não detectam mais naves hostis nos arredores, mas altos níveis de radiação estão sendo emanados do planeta §Y[origin_unplugged_pre_ftl_planet.GetName]§! neste sistema.\n\nFrotas remanescentes também foram detectadas em sistemas vizinhos, e parecem manter suas posições."
 unplugged.100.a: "Qual será nosso próximo passo?"
 unplugged.100.b: "... E tomaremos aquilo que nos falta."
 unplugged.100.c: "Hora de testar a nossa engenhosidade."
 unplugged.100.d: "Que os divinos nos protejam."
 opinion_unplugged_injured_diplomacy: "Belicistas Civis"
 opinion_unplugged_injured_distrustful: "$pre_ftl_distrustful$"
 # Dialog
 unplugged.115.desc: "... -epito: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Nós aceitamos. Desejam discutir os termos de nossa rendição? Foi por isso que cessaram os ataques?\n\nPor favor, nossa sociedade está em ruínas. Sabemos que fomos derrotados. Informem como devemos prosseguir." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.pacifist: "... -epito: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Estamos prontos para discutir os termos de nossa rendição. Foi... foi por isso que cessaram os ataques?\n\nPor favor, informem como devemos prosseguir! Não oferecemos mais resistência, apenas desejamos coexistir em paz." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.phobe: "... -epito: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Nós aceitamos. Desejam a nossa rendição? Foi por isso que cessaram os ataques?\n\nPor favor, informem como devemos prosseguir. Nossa sociedade está em ruínas; só queremos ser deixados em paz." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.a: "Sim, nós aceitamos sua rendição."
 unplugged.115.b: "... \"[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]\"?!" # incredulous that they are calling us that species name, e.g. ... 'Killbots'?!
 unplugged.116.desc: "... [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]? Vocês...?\n\n(Eles estão mesmo recebendo nossas mensagens, não é? Pelos céus, pessoal. Se estivermos errados e eles não tiverem acesso às ferramentas de tradução, então nossa civilização estará, de fato, perdida...)\n\n... [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]?! Conseguem nos entender? Por favor, respondam! Não desejamos qualquer mal-entendido entre nossos povos."
 unplugged.116.b: "Vocês acham que somos os \"[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]\"?!" # incredulous that they are calling us that species name, e.g. 'You think we are the Killbots?!''
 unplugged.120.desc: "Vocês têm nossa gratidão. Somos gratos pela sua misericórdia, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Eu falo por todo o povo de [injured_country.GetName] para discutir os termos de nossa rendição.\n\nJá perdemos muitas pessoas, e muitas de nossas cidades estão em ruínas, inabitáveis. No espírito da honestidade, devo confessar: não temos muito a oferecer que já não nos tenha sido tomado. Imploramos que levem isso em consideração. Nossas vidas estão à sua mercê."
 unplugged.120.desc.spiri: "Graças a todos os céus! Estamos gratos pela sua misericórdia, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Eu falo em nome de todo o povo de [injured_country.GetName] para discutir os termos de nossa rendição.\n\nSofremos incontáveis perdas e nos curvamos diante de vocês. Quais são suas exigências? Nossas vidas estão à sua mercê."
 unplugged.120.desc.mil_phobe: "Vocês têm nossa gratidão, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. São muito honoráveis. Eu falo em nome de todo o povo de [injured_country.GetName] para discutir os termos de nossa rendição.\n\nVocês desferiram um golpe duro contra nossa sociedade. Nós... apreciamos o cessar-fogo. Nossas vidas estão à sua mercê."
 unplugged.120.a: "Você continua nos chamando de \"[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]\". Por quê?"
 unplugged.120.b: "Seus dias estão contados."
 unplugged.120.b.tt: "§LEncerra a transmissão.§!\n\n"
 unplugged.120.c: "Adiaremos as negociações. Aguardem nosso contato."
 unplugged.120.c.tt: "§LEncerra a transmissão.§!\nPodemos restabelecer frequências de comunicação ao construir um §YPosto de Observação§! em [injured_homeworld.GetName].\n\n"
 unplugged.125.desc: "... Isso é algum tipo de truque? Uma brincadeira?\n\nNossos monitores rastrearam a chegada da sua frota há meses. Tentamos estabelecer contato, mas vocês nos invadiram! Eu escapei por pouco de quatro ataques diferentes... Frotas de naves de desembarque repletas de robôs e indivíduos melhorados, como vocês. E então, subitamente suas máquinas interromperam a invasão.\n\nNossa civilização não é tão avançada quanto a sua, mas a situação é inconcebível para nós. Por favor, esclareçam: quais as suas intenções, e por que ainda estão aqui?"
 unplugged.125.a: "Nós, os [root.GetSpeciesNamePlural], derrotamos os [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]."
 unplugged.125.b: "Devemos adiar as negociações." # also shows 'unplugged.120.c.tt'
 unplugged.130.desc: "[root.GetSpeciesNamePlural]?\n\nVocês não receberão muita gratidão do nosso povo, mas saibam que estamos felizes pelo fim de sua luta. Também é um alívio falar com... bem, com outra pessoa.\n\nMas a nossa situação não mudou. [root.GetSpeciesNamePlural], [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]... Não faz diferença. Vocês são a primeira civilização alienígena que encontramos, e tentaram nos erradicar. Depois vocês interrompem o ataque para lutar entre si, e isso também quase nos destruiu.\n\nPermita-me falar com franqueza: vocês nos abordam agora na qualidade de aliados?"
 unplugged.130.a: "Sim. Como podemos ajudar?"
 unplugged.130.b: "Sim. Por enquanto."
 unplugged.130.c: "A sua falta de respeito é deplorável." # also shows 'unplugged.120.b.tt'
 unplugged.131.desc: "Ótimo. Isso é um alívio. Estamos gratos por termos saído da sua mira.\n\nGostaríamos que usassem sua tecnologia superior para o estabelecimento de comunicações entre nós. Nossos destinos agora estão interconectados, e desejamos profundamente manter este canal diplomático aberto.\n\nEm troca, estenderemos a vocês a pouca ajuda que podemos proporcionar, assim que tivermos uma chance de reconstruir nossas cidades e lamentar nossos mortos. Se isso também é do seu costume, esperamos que seus próprios memoriais lhes tragam alguma clareza.\n\nTorcemos pela futura compreensão entre nós, [root.GetSpeciesNamePlural]. E pelo bem de nossos povos, esperamos que aqueles [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] tenham sido os últimos..."
 unplugged.131.a: "Agradecemos, [injured_country.GetSpeciesNamePlural]." # also shows 'unplugged.120.c.tt'
 unplugged.131.b: "De fato..." # also shows 'unplugged.120.c.tt'
 ###################
 # 'Machine Legacy'
 ###################
 unplugged_origin_machine_legacy_chain_title: "Legado da Máquina"
 unplugged_origin_machine_legacy_chain_desc: "A Máquina que uma vez assimilou toda a nossa espécie destruiu a si mesma. Atrás de nós, jaz o seu rastro fumegante de dominação e brutalidade. Qual a origem de [origin_unplugged_assimilator_empire.GetName], e qual era o nosso papel em seus planos fracassados?"
 signals_followed: " Sinais investigados"
 # System 1: 'The Makers'
 unplugged.2000.name: "Ambiente, Dissonante, Tranquilizante"
 unplugged.2000.desc: "Um sinal portador sutil jaz dormente na radiação cósmica que circunda a nossa estrela, [capital_scope.star.GetName].\n\nIsolamos uma transmissão de rádio caracterizada por tons graves e assombrosos e distorções de feedback. Cada indivíduo [root.GetSpeciesAdj] que ouviu a transmissão a considerou reconfortante e familiar, embora não soubesse explicar o motivo. Suspeitamos do envolvimento de [origin_unplugged_assimilator_empire.GetName].\n\nA origem do sinal parece residir no sistema §Y[origin_unplugged_maker_planet.solar_system.GetName]§!. Nossas cartas estelares foram atualizadas de acordo."
 unplugged.2000.a: "É melhor investigarmos."
 unplugged_machine_legacy_makers_poi: "Cacofonia Reconfortante"
 unplugged_machine_legacy_makers_poi_desc: "Uma transmissão quase ambiente de um ruído reconfortante e familiar está sendo emitida de algum ponto do sistema [origin_unplugged_maker_planet.solar_system.GetName]."
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT: "Um Legado da Máquina"
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT_DESC: "Uma análise orbital de [from.GetName] bombardeou imediatamente nossos sistemas com atualizações de firmware benéficas. Nossa nave agora opera com mais eficiência, mas a natureza desses pacotes de dados sugere que este mundo uma vez foi controlado por §H[origin_unplugged_assimilator_empire.GetName]§!."
 MACHINE_LEGACY_MAKERS_CAT: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 MACHINE_LEGACY_MAKERS_CAT_DESC: "Nossas análises iniciais de [from.GetName] indicam que o planeta está repleto de tecnologias descartadas, mas foi abandonado recentemente. Impulsos elétricos ainda dançam pelo mundo enquanto muitas de nossas sondas remotas têm dificuldades de interpretar leituras coerentes. Que mistérios se encontram no interior desses complexos campos eletromagnéticos?"
 unplugged.2005.name: "O Legado [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2005.desc: "Inúmeros bolsões densos de eletromagnetismo agora cintilam por [fromfrom.GetName]. Esses campos de \"EM\" são o resultado de picos de energia catastróficos que destruíram diversas fábricas e estaleiros. Nossa equipe de [controller.GetScientistPlural] foi capaz de anular um dos campos, mas encontrou apenas uma instalação danificada irremediavelmente.\n\nAs fábricas que cobrem este mundo – que acreditamos ter sido um hub de manufatura de §H[origin_unplugged_assimilator_empire.GetName]§! – identificaram [root.GetName] como uma nave aliada. Porém, momentos após enviarem uma atualização de firmware para a nossa nave, a conexão foi interrompida, causando falhas consecutivas em várias estações de energia regionais.\n\nPodemos ter vivenciado um eco de nossa própria separação da Máquina, embora não saibamos como, nem por quê. Por ora, com os perigos locais reduzidos, temos uma oportunidade para descobrir o que era produzido aqui por [origin_unplugged_assimilator_empire.GetName], e talvez, o papel que desempenhamos enquanto estávamos assimilados ao seu domínio."
 unplugged.2005.a: "Comece a escavar as ruínas."
 unplugged.2006.name: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 unplugged.2006.desc: "Os impulsos elétricos que observamos em [from.GetName] são remanescentes de um evento bizarro de extinção maquinária. Somente depois de nossos sensores terem sido ajustados para compensar o intenso eletromagnetismo, pudemos testemunhar plenamente a devastação aqui. O planeta parece ter sido colonizado por máquinas há muitas décadas, quando elas desalojaram ou erradicaram uma civilização nativa. Agora, não há sobreviventes de nenhum dos impérios, e quase todo o assentamento foi reduzido a escombros por um ato antigo de guerra ou sabotagem.\n\nApesar da sofisticação da antiga colônia, não há muito que possamos recuperar aqui. Estimamos que os campos \"EM\" descontrolados se esgotarão em aproximadamente um século. Até lá, [from.GetName] permanecerá um cemitério extremamente hostil."
 machine_legacy_makers_site: "Cenário Industrial"
 machine_legacy_makers_site_desc: "Um pico catastrófico de energia destruiu recentemente esta vasta instalação industrial – uma dentre muitas controladas por [origin_unplugged_assimilator_empire.GetName]. Em meio à destruição, nossa expedição tentará descobrir a origem dessas instalações, recuperar qualquer ativo tecnológico remanescente, e com sorte aprender o papel que este lugar desempenhou em nosso próprio passado."
 unplugged.2010.name: "Andar Industrial"
 unplugged.2010.desc.unplugged: "Desde o início, ficou claro que a instalação em [from.planet.GetName] era capaz de sustentar uma produção em escala gigantesca. O cenário na superfície é dominado por portas de segurança colossais, cada uma delas selada devido aos motores parcialmente derretidos. Assim, forçamos nossa entrada através do sistema de ventilação.\n\nNo interior, nos deparamos com um andar industrial cavernoso repleto de destroços e dos restos de centenas de seres cibernéticos. A maioria é composta de robôs: mecânicos, carregadores e outros auxiliares, alguns destruídos recentemente, a julgar pela fumaça que exalam. Contudo, armazenados em um lado da instalação, encontramos os corpos há muito deteriorados de inúmeros ciborgues, mortos pelos robôs. Esses mamíferos pequenos e maltrapilhos foram equipados com sensores oculares e ferramentas intricadas em seus membros, além de um nódulo de controle [origin_unplugged_assimilator_empire.GetAdj] semelhante ao nosso. Estimamos que o massacre tenha ocorrido no intervalo de algumas semanas de nossa própria separação de [origin_unplugged_assimilator_empire.GetName]; a maior parte dos drones pereceu recentemente, no pico de energia que marcou nossa chegada em [from.planet.GetName].\n\nPara nós, tal cena brutal é familiar, embora estes ciborgues não tenham sido páreo para as máquinas. Nós, os [owner.GetSpeciesNamePlural], somos soldados e estamos mais bem equipados para sobreviver a tamanha carnificina."
 unplugged.2010.a: "Mantenha o foco na escavação."
 unplugged.2010.b: "Temos que divulgar essa descoberta imediatamente."
 unplugged.2015.name: "Arsenal Equipado"
 unplugged.2015.desc.unplugged: "Longe da carnificina no andar industrial desta instalação há uma série de hangares subterrâneos, levemente abastecidos com diversos tanques, plataformas de mísseis e trajes mecanizados. A maior parte do equipamento está incompleta, ou foi completamente inutilizada pelo mesmo pico de energia que neutralizou os robôs do povo [origin_unplugged_assimilator_empire.GetAdj]. Porém, pudemos tirar conclusões interessantes a partir do que resta.\n\nPor exemplo: todas as cabines e interfaces foram projetadas não para acomodar os ciborgues mamíferos que encontramos antes, mas... nós. Além disso, autópsias e inspeções arquitetônicas indicam que os ciborgues mamíferos não eram apenas nativos deste mundo, como também podem ter construído essas fábricas antes de terem sido assimilados.\n\nO interior da instalação está bloqueado por desmoronamentos e mais portas de segurança, mas talvez possamos abrir caminho para o que parece ser um centro de pesquisa e desenvolvimento. Por outro lado, uma série de dutos de ventilação sugere a presença de habitats sob a instalação, possivelmente onde os nativos do planeta residiam."
 unplugged.2015.a: "Continue escavando a instalação na superfície."
 unplugged.2015.b: "Cave mais fundo. Vamos descobrir mais sobre eles."
 unplugged.2021.name: "Projetistas sob Coação"
 unplugged.2021.desc: "A escavação da ala de P&D desta instalação tem sido uma tarefa lúgubre. Inúmeros ciborgues mamíferos encontraram seu fim aqui, onde haviam sido empregados como técnicos, engenheiros e até mesmo ciberneticistas. Esses especialistas projetaram a maior parte dos armamentos dispostos lá fora, e encontramos indícios de que eles foram responsáveis por muitas de nossas próprias melhorias. Curiosamente, embora quase todo o equipamento que eles usaram seja [origin_unplugged_assimilator_empire.GetAdj], também encontramos diversas ferramentas personalizadas de qualidade superior, com designs muito mais adequados às suas formas orgânicas.\n\nComeçamos a montar uma linha do tempo onde uma sociedade de tecnólogos avançados foi abruptamente assimilada por [origin_unplugged_assimilator_empire.GetName]. Suspeitamos que a Máquina esteve aqui apenas por algumas décadas, pois muitas das técnicas de produção parecem nativas. Talvez o fato de técnicos tão talentosos terem passado pouco tempo como parte de [origin_unplugged_assimilator_empire.GetName] seja uma bênção; do contrário, poderíamos ter enfrentado um arsenal muito mais poderoso quando o império se voltou contra nós. Porém, nós sobrevivemos para tomar o poderoso legado da pesquisa desta espécie."
 unplugged.2022.name: "O Antigo Mundo de [from.planet.GetName]" # e.g. 'Old Earth' or 'Old Sirius III'
 unplugged.2022.desc.unplugged: "Sob a instalação na superfície há uma extensa rede de túneis pouco habitáveis. Corpos de ciborgues espalham-se toda parte; nenhum dos nativos sobreviveu ao expurgo [origin_unplugged_assimilator_empire.GetAdj]. Alguns foram agredidos fisicamente, mas também encontramos indícios de adulteração dos sistemas de ventilação acima. A asfixia parece ter sido a causa da morte de muitos que encontraram seu fim aqui.\n\nComeçamos a montar uma linha do tempo simples a partir das autópsias e dos estudos antropológicos. Há evidências de que esta sociedade era próspera e estava em sua idade espacial quando os nativos de [from.planet.GetName] fizeram contato com a Máquina, e foi subitamente assimilada. Em um intervalo de não mais que algumas décadas, seu conhecimento e produtividade foram canalizados por [origin_unplugged_assimilator_empire.GetName] para o desenvolvimento de uma impressionante máquina de guerra, apenas para ter sua singularidade cultural arrancada, assim como aconteceu conosco.\n\nOs corpos pequenos e frágeis dos ciborgues nativos deste planeta não foram páreo para os robôs letais que eles ajudaram a construir. Grande parte de seu passado foi apagada de seus próprios registros históricos. Só podemos conjecturar como eram suas vidas antes desse povo fazer contato com [origin_unplugged_assimilator_empire.GetName]."
 unplugged.2030.name: "Produtos de Segunda Linha"
 unplugged.2030.desc: "Sensores de longo alcance detectaram um movimento repentino no sistema [origin_unplugged_machine_legacy_core.GetName]! Uma frota hostil parece ter se mobilizado em resposta direta às nossas escavações em [fromfrom.planet.GetName]."
 unplugged.2036.name: "Ecos da Máquina"
 unplugged.2036.desc: "Rastreamos as comunicações da frota do povo [origin_unplugged_assimilator_empire.GetAdj] que acabamos de destruir de volta a um sinalizador que orbita [origin_unplugged_taken_planet.GetName]. Parece que encontramos o próximo passo em nossa jornada."
 unplugged.2036.a: "A trama se complica."
 unplugged.2037.desc: "Utilizando nosso próprio equipamento [origin_unplugged_assimilator_empire.GetAdj] antigo, conseguimos rastrear uma última transmissão desesperada da frota destruída para [origin_unplugged_maker_planet.GetName]. Parece que o próximo passo em nossa jornada está na órbita de §Y[origin_unplugged_taken_planet.GetName]§!." # e.g. 'our own ex-Martianbot hardware'
 unplugged.2038.desc: "Utilizando nosso próprio equipamento [origin_unplugged_assimilator_empire.GetAdj] antigo, conseguimos rastrear uma transmissão dispersa da frota hostil até o planeta [origin_unplugged_maker_planet.GetName]. Parece que o próximo passo em nossa jornada está na órbita de [origin_unplugged_taken_planet.GetName]." # e.g. 'our own ex-Martianbot hardware'
 # System 2: 'The Taken'
 unplugged_machine_legacy_taken_poi: "Comunicação Dispersa"
 unplugged_machine_legacy_taken_poi_desc: "Conseguimos rastrear uma transmissão final de estática indecifrável de uma nave do povo [origin_unplugged_assimilator_empire.GetAdj] recentemente derrotada para esta localização."
 MACHINE_LEGACY_TAKEN_UNPLUGGED: "Anacronismos Personificados"
 MACHINE_LEGACY_TAKEN_UNPLUGGED_DESC: "Detectamos uma anomalia ambiental em [from.GetName]. Sua atmosfera apresenta traços de poluentes que poderíamos associar à metalurgia medieval, embora as análises da superfície estejam obscurecidas por radiação exótica de um tipo que esperaríamos encontrar em um Mundos-Maquinário.\n\nNão poderemos reunir mais dados até termos recalibrado nossos sensores. Seria essa uma anomalia temporal, ou os restos arruinados de outra espécie assimilada por [origin_unplugged_assimilator_empire.GetName]?"
 unplugged.2100.name: "Progresso Interrompido"
 unplugged.2100.desc: "O que quer que tenha causado o atual estado inabitável do planeta [fromfrom.GetName], podemos excluir teorias mais extravagantes de viagens temporais. A recalibragem de nossos sensores se mostrou uma tarefa mais fácil do que antecipávamos.\n\nSob toda a radiação atmosférica, há uma clara evidência da presença de [origin_unplugged_assimilator_empire.GetName]. O império parece ter assimilado ou removido uma civilização pré-MRQL, ou até a exterminado completamente. Identificamos pelo menos um local fortificado de aparente importância cultural, onde propomos a criação de um sítio arqueológico."
 unplugged.2100.a: "Devemos escavar com diligência."
 MACHINE_LEGACY_TAKEN_CAT: "$MACHINE_LEGACY_TAKEN_UNPLUGGED$"
 MACHINE_LEGACY_TAKEN_CAT_DESC: "Os resultados de nossa análise inicial de [root.GetName] não fazem sentido. Sua atmosfera apresenta traços de poluentes oriundos de metalurgia primitiva, mas as análises da superfície encontraram indícios de ligas metálicas sofisticadas, utilizadas em estruturas espaciais. Imagens aéreas revelam assentamentos de um povo [from.owner.GetPreFTLLower], mas suas construções fortificadas são equipadas com armamentos terra-ar a laser. Recomendamos um estudo aprofundado dessas incongruências."
 unplugged.2105.name: "$unplugged.2100.name$"
 unplugged.2105.desc: "Quanto mais estudávamos o mundo [planet.GetClassAdj] aparentemente [owner.GetPreFTLLower], mais incongruências encontrávamos, até realizarmos inspeções subterrâneas de um campo de batalha. Apesar dos séculos de deterioração, encontramos indícios de visitas alienígenas a este mundo: o lar de um povo genuinamente [owner.GetPreFTLLower] que foi assimilado ciberneticamente, mas cuja sociedade foi então deixada à própria sorte por razões desconhecidas. As teorias atuais variam desde uma tentativa bem-intencionada, porém fracassada, de elevar esta sociedade até uma prática brutal de técnicas de subjugação.\n\nSerá que esses [owner.GetPreFTLLowerPlural] foram simplesmente esquecidos, ou encontramos os resquícios de um experimento sociológico descartado? Talvez nunca saibamos, mas o local certamente terá um mérito científico considerável por muitos anos." # e.g. 'The more we studied the apparently primitive tomb world of Mars...'
 machine_legacy_taken_site: "Cobre e Cromo"
 machine_legacy_taken_site_desc: "Alojado no interior de um desfiladeiro antes verdejante encontra-se um paradoxo arqueológico: um assentamento fortificado, construído com o uso de ferramentas manuais e que abriga nada mais avançado que uma forja rudimentar, mas habitado por ciborgues há muito mortos. Quem eram esses [owner.GetPreFTLLowerPlural] medievais, e por que foram assimilados por [origin_unplugged_assimilator_empire.GetName]?"
 unplugged.2110.name: "Lanças e Lasers de Pulso"
 unplugged.2110.desc: "Análises preliminares encontraram um campo de batalha próximo ao forte, facilitando nosso acesso a artefatos de caráter nativo e [origin_unplugged_assimilator_empire.GetAdj]. A partir do estudo transversal dos restos, estimamos que centenas de milhares de habitantes nativos de [from.planet.GetName] foram assimilados por [origin_unplugged_assimilator_empire.GetName], apenas para lutar e morrer neste local. Contudo, eles não eram os únicos ciborgues presentes no conflito.\n\nHá poucos séculos, nós massacramos esses [owner.GetPreFTLLowerPlural]. Nossa equipe identificou [owner.species.GetRemnantNamePlural] do tipo [owner.GetSpeciesAdj] ao lado de protótipos iniciais das melhorias de nossa espécie. Uma avaliação do ponto de vista estratégico sugere que nosso povo foi enviado aqui como tropas de choque. A batalha foi breve e sangrenta: os [owner.GetPreFTLLowerPlural] eram descoordenados e sofreram baixas severas, apesar de seus implantes neurocibernéticos mais sofisticados.\n\nDescobrimos as ruínas de uma instalação médica próxima; parece que nossos predecessores invadiram o forte a partir desse hospital. Talvez lá possamos descobrir por que ciborgues foram enviados para lutar uns com os outros há tanto tempo."
 unplugged.2110.a: "Brutal."
 unplugged.2115.name: "Transistores e Torniquetes"
 unplugged.2115.desc: "O conflito devastou este hospital como um canhão de pulso. Nenhum dos restos que encontramos no interior pertencem a um indivíduo [owner.GetSpeciesAdj]; apenas os nativos ciberizados de [from.planet.GetName] perderam a vida aqui. Muitos eram pacientes nesta instalação, mas apenas alguns parecem ter sofrido ferimentos de batalha. Grande parte tratava da remoção de melhorias cibernéticas, ainda que por meios primitivos.\n\nEm vez de ter sido vítima de danos colaterais, tudo indica que o hospital era o alvo principal do ataque de [origin_unplugged_assimilator_empire.GetName]. Após uma análise minuciosa da cópia física dos prontuários médicos, começamos a entender o motivo. Os habitantes de [from.planet.GetName] possuíam diversas características evolutivas singulares – especialmente um sistema imunológico incrivelmente resiliente – que a Máquina cobiçava para suas tropas de ciborgues.\n\nContudo, essas vantagens também apresentaram desafios para a assimilação. Não era possível transplantar melhorias existentes de espécies como a nossa; uma adaptação era necessária. Isso transformou essa espécie em soldados ainda mais hábeis, mas apenas por um curto período. Esses [owner.GetPreFTLLowerPlural] parecem ter mantido algum nível de autonomia, apegando-se aos seus antigos costumes e modos de vida, e então fomos enviados para destruí-los."
 unplugged.2115.a: "Claramente, realizamos muito bem a tarefa..."
 unplugged.2115.b: "Profundamente lamentável."
 unplugged.2121.name: "Assimilação Adaptativa"
 unplugged.2121.desc: "Em uma extensão de um hospital abandonado, estava armazenada uma enorme quantidade de aparatos para melhorar e manter os ciborgues [root.GetPreFTLLowerPlural]. Diferentes da miscelânea de equipamentos hospitalares que encontramos até agora, esses dispositivos são contemporâneos à cibernética da idade espacial, claramente de modelo [origin_unplugged_assimilator_empire.GetAdj]. Algumas dessas ferramentas aparentam ter sido conectadas por uma rede, usando uma IA primitiva para adaptar cirurgias em tempo real, embora até mesmo essas adaptações não tenham sido suficientes para manter a população de [from.planet.GetName] assimilada.\n\nApesar dos séculos de negligências, essas velhas máquinas ainda podem fornecer informações vitais para a nossa própria automanutenção – ou nos ajudar a compreender melhor os princípios da assimilação."
 unplugged.2125.name: "Tentativa, Erro e Sepultamento"
 unplugged.2125.desc: "Descobrimos que os nativos de [from.planet.GetName] optavam por preservar parcialmente seus mortos antes do sepultamento – uma prática que mantiveram mesmo após a assimilação. Os registros hospitalares nos levaram a um mausoléu tomado pela vegetação e intocado pelo conflito. Essa descoberta valiosa nos proporcionou a perspectiva mais clara até agora de como os habitantes de [from.planet.GetName] não apenas resistiram às melhorias, como também eram capazes de se \"deciberizar\".\n\nEncontramos restos orgânicos originais ao lado de ciborgues completos, além de alguns indivíduos com cicatrizes cirúrgicas formadas meses antes da morte por causas naturais. Muitos outros parecem ter morrido na mesa de operação. Apesar do sistema imunológico excepcional, sua abordagem medieval para a deciberização claramente tinha baixos índices de sucesso. Mesmo assim, há muito que podemos aprender com os testes cirúrgicos conduzidos aqui, bem-sucedidos ou não."
 unplugged.2125.a: "Vamos aprender com o exemplo deles."
 unplugged.2125.a.tt: "Podemos dedicar recursos adicionais para nos \"deciberizar\"."
 unplugged.2130.name: "Farol Enterrado"
 unplugged.2130.desc: "Uma câmara oculta foi revelada abaixo da fortaleza. Dentro, encontramos o que parece ter sido um substrato da Máquina: um nódulo regredido, capaz de propagar um avatar quase independente de toda a Inteligência Maquinária. Acreditamos que esse foi um último esforço para exercer o controle direto sobre os locais obstinados que resistiam. A tecnologia é diferente de tudo o que conhecemos de [origin_unplugged_assimilator_empire.GetName], e seu estudo certamente avançará nossa própria pesquisa de IA.\n\nEnquanto desmontávamos sua matriz de comunicações desativada, percebemos que esse avatar dedicou todo um circuito receptor para monitorar sinais do sistema [creators_planet.solar_system.GetName]."
 unplugged_machine_legacy_creators_poi: "Circuito Receptor"
 unplugged_machine_legacy_creators_poi_desc: "Um elemento inteiro de uma matriz de comunicação desativada do povo [origin_unplugged_assimilator_empire.GetAdj] foi dedicado ao monitoramento de sinais desta localização."
 # System 3: 'The Creators'
 MACHINE_LEGACY_CREATORS_UNPLUGGED: "Monitor de Poeira"
 MACHINE_LEGACY_CREATORS_UNPLUGGED_DESC: "Situada solitariamente em um sistema sem qualquer fenômeno digno de nota, uma estação de monitoramento foi há muito desativada e está em um estado irreparável. O que ela monitorava, e por que estava concentrada em uma região tão pequena de [fromfrom.GetName]?"
 MACHINE_LEGACY_CREATORS_CAT: "Monitor de Poeira"
 MACHINE_LEGACY_CREATORS_CAT_DESC: "Situada solitariamente em um sistema sem qualquer fenômeno digno de nota, uma estação de monitoramento foi há muito desativada e está em um estado irreparável. O que ela monitorava, e por que estava concentrada em uma região tão pequena de [fromfrom.GetName]?"
 unplugged.2200.name: "Scanner de Ausência"
 unplugged.2200.desc.intro: "Nossos estudos complementares em [fromfrom.GetName] se mostraram frustrantes. Talvez a estação de monitoramento tenha sido deslocada de seu alinhamento original, pois não observamos nada que pudesse ser de algum interesse abaixo de sua órbita atual. Simulamos possíveis movimentos com base em impactos orbitais – amassados no casco do dispositivo – e acreditamos que a estação tenha sido inicialmente posicionada sobre um planalto acidentado no extremo norte." # universal intro
 unplugged.2200.desc: "$unplugged.2200.desc.intro$\n\nQuanto ao próprio dispositivo: notamos que esta estação de monitoramento tem certa semelhança com o equipamento [origin_unplugged_assimilator_empire.GetAdj]. $unplugged.2200.desc.outro$" # Unplugged version with in-tact station
 unplugged.2200.desc.scrapped: "$unplugged.2200.desc.intro$\n\nQuanto à própria estação de monitoramento: apesar da pilhagem implacável de sucateiros, a estrutura original ainda mantém certa semelhança com o equipamento [origin_unplugged_assimilator_empire.GetAdj]. $unplugged.2200.desc.outro$" # Unplugged version with scrapped station
 unplugged.2200.desc.others: "$unplugged.2200.desc.intro$\n\nQuanto à própria estação de monitoramento: nunca encontramos um modelo semelhante antes. Embora o equipamento a bordo esteja ultrapassado e danificado, a superestrutura da estação é constituída de materiais excepcionalmente puros. Não sabemos se a estação tem qualquer tipo de valor sentimental, mas certamente poderá nos fornecer peças valiosas." # non-Unplugged version
 unplugged.2200.desc.outro: "Seu modelo é rudimentar, tanto que um observador menos experiente poderia pensar que pertence a uma cultura totalmente distinta. Contudo, acreditamos que este pode ser um dos primeiros satélites da Máquina.\n\nAté o momento, não há mais nada digno de nota a respeito do mundo [fromfrom.GetClassAdj], mas uma equipe de inspeção arqueológica está a postos para tentar descobrir qual o interesse de [origin_unplugged_assimilator_empire.GetName] no lugar." # Unplugged shared outro
 unplugged.2200.a: "Se houver uma chance... Prossiga."
 unplugged.2200.b: "Não encontraremos nada aqui. Vamos em frente."
 unplugged.2200.c: "Desmonte e remova as peças."
 machine_legacy_creators_site: "Poeira sobre Poeira"
 machine_legacy_creators_site_desc: "Em algum lugar da paisagem arenosa de [from.planet.GetName], encontrava-se algo que, em certo momento, foi de interesse de uma estação de monitoramento do povo [origin_unplugged_assimilator_empire.GetAdj]. Os equipamentos estão em um estado irreparável e são tão antigos que precedem quase todos os outros artefatos maquinários que já encontramos. É possível que a estação tenha sido usada até mesmo antes de nossa assimilação. Há uma grande chance de não encontrarmos nada aqui além do deserto, mas só temos uma forma de saber..."
 unplugged.2210.name: "Grande Bacia de Poeira"
 unplugged.2210.desc: "Enfim, encontramos evidências de habitações sob a areia: traços espalhados, porém rasos, do que parece ter sido uma civilização no início da idade espacial. Suas construções foram arrasadas, e até mesmo a mais robusta das ruínas foi completamente destruída. Contudo, análises químicas indicam que a desertificação de [from.planet.GetName] ocorreu algum tempo depois dessa aniquilação planetária. Até agora, estivemos cavando majoritariamente pelos restos atomizados de materiais de construção.\n\nMuitas das linhas quase apagadas que observamos ao longo das vias desta antiga cidade estão clivadas pela borda de uma grande cratera, remanescente de um possível local de impacto."
 unplugged.2215.name: "Base da Cratera"
 unplugged.2215.desc: "Devido ao grande número de materiais reunidos dentro desta cratera, tivemos que deixar de lado a escavação para utilizar scanners precisos. Rapidamente descartamos a possibilidade de um impacto de meteoro: não há vestígios de materiais alienígenas no local. Esta depressão, na realidade, foi criada por uma explosão gigantesca – provavelmente obra de uma arma capaz de destruir toda uma civilização.\n\nO contexto parece colocar a culpa em [origin_unplugged_assimilator_empire.GetName], embora essa tenha sido a primeira vez que testemunhamos a Máquina eliminar uma civilização completamente dos registros históricos. Não encontramos nada que indicasse quem era esse povo, ou como viviam. A superfície de [from.planet.GetName] foi totalmente varrida."
 unplugged.2205.name: "Farol do Cofre [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2205.desc: "O sinal de um farol que parece ter origem em um cofre de dados do povo [origin_unplugged_assimilator_empire.GetAdj] foi detectado em um sistema próximo. A transmissão é extremamente fraca, mas foi direcionada à nossa nave que visitou recentemente a estação de monitoramento acima de [origin_unplugged_creators_planet.GetName]."
 unplugged.2205.a: "Vale a pena investigar."
 unplugged_machine_legacy_unplugged_poi: "Sinal do Cofre de Dados"
 unplugged_machine_legacy_unplugged_poi_desc: "Um suposto cofre de dados [origin_unplugged_assimilator_empire.GetAdj] transmitiu sua posição para nós após encontramos uma estação de monitoramento desativada."
 # System 4: 'The Unplugged'
 unplugged.2300.name: "$unplugged.2205.name$"
 unplugged.2300.desc: "A transmissão do farol que nos trouxe aqui agora está alta e clara, nos direcionando especificamente para uma interface na superfície do planeta. Medidas de segurança padrão já foram preparadas, e uma equipe está a postos para interrogar o suposto \"cofre de dados\" via uplink remoto."
 unplugged.2300.a: "Parece estranhamente familiar."
 unplugged.2300.a.tt: "Um projeto especial aparece no sistema [from.GetName]."
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON: "O Farol do Cofre"
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON_DESC: "Um farol de [origin_unplugged_assimilator_empire.GetName] nos levou a um cofre de dados, enterrado profundamente na superfície do planeta. Estabelecemos um acesso seguro remotamente, mas a descriptografia e desfragmentação dos arquivos armazenadas levará algum tempo."
 unplugged.2305.name: "Legado [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2305.desc: "Ao que tudo indica, o planeta que conhecemos como [fromfrom.GetName] é o mundo natal de nossa espécie. Essa revelação está no centro de uma torrente de informações enviadas de um cofre de dados sob a superfície do planeta.\n\nInicialmente, nossos analistas julgaram esses dados bons demais para serem verdade, mas o grande número de referências confiáveis a outros dados que coletamos parece comprovar sua credibilidade. Um sítio arqueológico já está sendo preparado para confirmar essa descoberta. No entanto, detectamos mais um sinal hostil a caminho. O momento certamente não é coincidência..."
 machine_legacy_unplugged_site: "Ponto de Origem"
 machine_legacy_unplugged_site_desc: "Um rastro interestelar de dominação e carnificina deixado por [origin_unplugged_assimilator_empire.GetName] nos trouxe aqui para um aglomerado de ruínas que de acordo com dados recuperados é o mundo natal de nossa espécie. Enfim, podemos descobrir nosso legado orgânico: de onde viemos, como vivíamos e como a Máquina mudou o curso de nossas vidas para sempre."
 unplugged.2310.name: "Sabor Caseiro"
 unplugged.2310.desc.intro: "Começamos a escavar uma das instalações aparentemente mais complexas deste lugar, na esperança de que seu sistema robusto de controle climático tenha preservado melhor o interior. Embora algumas esperanças tenham sido frustradas, o que encontramos excedeu todas as expectativas: uma série compacta de centros de processamento e armazenamento de alimentos que a nossa espécie evoluiu para consumir.\n\n"
 unplugged.2310.desc.omnivore: "Esse tesouro composto de bancos de sementes, colmeias e tanques para o cultivo de carne infelizmente não é mais adequado para o consumo. Seu conteúdo há muito ressecou, mas o equipamento especializado para preparar e conservar esses alimentos permanece intacto, pronto para nos servir em tempos de crise."
 unplugged.2310.desc.carnivore: "Boa parte do espaço está ocupada por currais, tanques de cultivo de carne e – ainda mais surpreendente – campos de caça simulados. Podemos apenas imaginar a importância cultural de tais espaços, considerando que nossos ancestrais decidiram incluí-los em um abrigo de emergência."
 unplugged.2310.desc.herbivore: "Cada unidade está abastecida com bancos de sementes, terraços hidropônicos e câmaras de cultivo com controle ambiental. Seu conteúdo cresceu sem cuidados e tornou-se estéril, mas ainda está viável para estudo."
 unplugged.2310.desc.outro: "Também encontramos bancos de dados de perfis genéticos para a flora e fauna, cujos vestígios ainda podem existir em áreas isoladas da superfície do planeta. Disponibilizamos essa informação para todos os scanners de curto alcance nas redondezas.\n\nPor si só, essa descoberta é incapaz de confirmar os hábitos alimentares de nossa espécie, nem pode restaurar nossa culinária tradicional ou cultura gastronômica. Mas para algumas partes interessadas, já é um começo."
 unplugged.2310.desc.lithovore: "Cada unidade atuava como uma espécie de gruta artificial, fornecendo leitos de cristais e piscinas de evaporação. Seu conteúdo há muito deixou de ser consumível, mas ainda é viável para estudo. Também encontramos bancos de dados repletos de perfis químicos desses minerais, muitos dos quais ainda podem se formar em áreas isoladas da superfície assolada do planeta. Disponibilizamos essa informação para todos os scanners de curto alcance nas redondezas.\n\nPor si só, essa descoberta é incapaz de confirmar os hábitos alimentares de nossa espécie, ou revelar se nossos ancestrais praticavam algum tipo de cultura gastronômica. Porém, para algumas partes interessadas, ainda equivale a um vislumbre fascinante de nosso passado."
 unplugged.2310.desc.omni: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.omnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.carn: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.carnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.herb: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.herbivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.lith: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.lithovore$" # should not include the shared 'outro'
 unplugged.2315.name: "Registro Histórico"
 unplugged.2315.desc: "Próximo ao depósito de comida, encontramos as fundações de um museu. Apenas os arquivos do subsolo permanecem intactos, mas isso bastou para preservar quase todo um banco de dados de artigos que essa instituição uma vez exibiu e armazenou nas galerias destruídas acima.\n\nEsta é a primeira vez que encontramos escrita em formato longo em um de nossos próprios idiomas. À primeira vista, a escrita é surpreendentemente semelhante ao dialeto [owner.GetAdj] moderno, mas a gramática parece confusa e alienígena. Nem sabemos ao certo como pronunciar essas palavras. Grande parte da bibliografia nesse catálogo cita as regiões e povos que doaram os artefatos, mas seus nomes nos soam estranhos. Curiosamente, nenhum dos textos se refere ao nosso planeta ou à nossa sociedade como um povo unificado. Talvez nunca tenhamos sido antes de a Máquina nos assimilar.\n\nO museu aparenta ser um entre um aglomerado de edifícios destinados à visitação pública. Mais escavações exigirão muito mais recursos. Onde devemos cavar?"
 unplugged.2315.a: "Escave a área com mais tráfego de pedestres."
 unplugged.2315.b: "Priorize os centros de aprendizado e empreendimentos científicos."
 unplugged.2321.name: "Um Legado de Risadas"
 unplugged.2321.desc: "Do outro lado de uma avenida larga estão as ruínas de outra atração de natureza menos educacional, mas abundante em retratos das práticas culturais mais básicas de nossos ancestrais.\n\nO local era capaz de acolher milhares de visitantes de uma vez. Diversos souvenires estão espalhados, versões cartunescas de nossas formas orgânicas originais ao lado de outras criaturas de nossa biosfera nativa. Também descobrimos uma biblioteca de mídias no porão de um teatro arruinado. Curiosamente, a tecnologia usada para arquivar e reproduzir essas apresentações holográficas é esteticamente diferente e muito mais avançada que qualquer outra coisa que vimos em nosso mundo natal até agora. Parece tão alienígena aqui quanto nós somos agora.\n\nSobre o conteúdo: a biblioteca do teatro avançado está repleta de hologravações de apresentações animadas e bombásticas, de um tempo antes de nossa assimilação por [origin_unplugged_assimilator_empire.GetName]. Muitas delas mostram tanto o público quanto os artistas, capturados para a posteridade neste mesmo local. Suas expressões diante de tais ilusões e brincadeiras são alegres e inocentes... Fascinante."
 unplugged.2321.a: "Que momentos felizes para contemplar!"
 unplugged.2321.b: "Tolice inútil. Estamos melhores sem isso."
 unplugged.2325.name: "Sinais de Automelhoria"
 unplugged.2325.desc: "Adjacente ao museu havia um centro de aprendizado. Assim como no restante do campus, apenas o subsolo sobreviveu, mas tivemos sorte: essas ruínas são formadas por diversos laboratórios.\n\nOs interiores sofreram com a exposição e o desgaste, mas conseguimos escavar alguns artefatos reveladores. Estes compõem uma combinação de tecnologia nativa e algo muito mais sofisticado: malhas complexas inseridas em instrumentos e equipamentos como as melhorias em nossa própria pele. De modo geral, muitos desses dispositivos parecem de natureza assistencialista. Acreditamos que este laboratório trabalhava para melhorar a qualidade de vida e remediar as diversas doenças e deficiências de nossos ancestrais, embora eles também aparentem ter comercializado plataformas de entretenimento com tecnologia avançada utilizando o mesmo tipo de equipamento.\n\nNão sabemos ainda se esses dispositivos melhorados pertencem ao povo [origin_unplugged_assimilator_empire.GetAdj], mas eles certamente não se originaram em [from.planet.GetName]."
 unplugged.2330.name: "Sede do Poder Vazia"
 unplugged.2330.desc: "Rastreamos uma série de linhas de infraestrutura até um complexo subterrâneo fortificado abaixo de um morro saliente, que acreditamos ter sido parte do capitólio deste mundo. A escala dos alicerces indica que esta era uma construção impressionante. Infelizmente, a maior parte do interior foi esvaziada ou destruída, mas fizemos uma descoberta notável: uma única bandeira descolorida cobrindo partes quebradas de um diorama em escala. Quando reconstituída, a cena parece retratar o momento de nosso primeiro contato com [origin_unplugged_assimilator_empire.GetName].\n\nDocumentos espalhados e placas ao redor do local sugerem que a Máquina visitou nosso mundo natal há aproximadamente oito séculos, embora indícios reunidos em outras partes da cidade indiquem que recebemos tecnologias avançadas gradualmente de [origin_unplugged_assimilator_empire.GetName] décadas antes. Naquele momento, nossos ancestrais parecem ter recebido a Máquina de braços abertos; a malfadada relação foi fundamentada em afirmações de cooperação mútua e esclarecimento.\n\nO mais revelador é que não há registros do que ocorreu depois. É como se a história de nossa espécie deixasse de existir quando saudamos a figura robótica retratada no diorama."
 unplugged_home_cooking: "Sabor Caseiro"
 unplugged_home_cooking_desc: "Uma renascença gastronômica está em vigor, agora que redescobrimos a dieta nativa e práticas culinárias de nossa espécie."
 unplugged_home_cooking_lithoid: "$unplugged_home_cooking$"
 unplugged_home_cooking_lithoid_desc: "$unplugged_home_cooking_desc$"
 unplugged_historical_record: "Registro Histórico"
 unplugged_historical_record_desc: "Nossa pesquisa acerca de todas as sociedades foi acelerada pela redescoberta de nossos idiomas nativos e de nossa própria história."
 unplugged_cultural_reconstruction: "Reconstrução Cultural"
 unplugged_cultural_reconstruction_desc: "Nossos cidadãos abraçaram efusivamente sua herança cultural, recuperando e até reimaginando os entretenimentos de outrora."
 unplugged_cultural_maturity: "Maturidade Cultural"
 unplugged_cultural_maturity_desc: "Estamos fortalecidos e revigorados pelas evidências de quão longe nossa sociedade evoluiu para além das diversões fúteis de nossos ancestrais ingênuos."
 unplugged_playing_it_safe: "Agindo com Cautela"
 unplugged_playing_it_safe_desc: "Manter o status quo é um caminho arriscado, mas é menos provável que ofenda alguém."
 unplugged_rerouted_medical_resources: "Cirurgia Demorada"
 unplugged_rerouted_medical_resources_desc: "Equipes médicas adicionais são redirecionadas para ajudar."
 unplugged_widespread_riots: "Revoltas Generalizadas"
 unplugged_widespread_riots_desc: "Indivíduos que apresentaram instabilidade mental após a cirurgia estão causando revoltas, resultando em destruição e desordem generalizadas."
 unplugged_building_new_planetary_interface: "Desenvolvendo Interface Planetária"
 unplugged_building_new_planetary_interface_desc: "Uma nova interface está sendo construída para restaurar o acesso aos sistemas, que foi perdido após os recentes esforços de deciberização."
 unplugged_partial_system_access: "Acesso Parcial ao Sistema"
 unplugged_partial_system_access_desc: "As operações de base estelar estão comprometidas enquanto os administradores tentam restaurar o acesso aos sistemas críticos."
 unplugged_free_speech_encouraged: "Incentivo à Liberdade de Expressão"
 unplugged_free_speech_encouraged_desc: "O povo é livre para debater abertamente sobre os méritos e riscos da ciberização."
 unplugged.2390.name: "Guardião [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2390.desc: "Um remanescente hostil e mais poderoso do antigo império de [origin_unplugged_assimilator_empire.GetName] transmitiu o equivalente interestelar de um sinal de ping para travamento de mira de curta distância. Sua intenção claramente é nos intimidar.\n\nEstamos perigosamente perto do centro do antigo Império Maquinário. Nosso destino nos aguarda."
 unplugged_machine_legacy_core_poi: "Sinal de Ping Hostil"
 unplugged_machine_legacy_core_poi_desc: "Um poderoso remanescente de [origin_unplugged_assimilator_empire.GetName] tentou nos desencorajar de entrar neste sistema."
 # System 5: 'The Machine'
 unplugged_opus_sentinel: "Sentinela Opus"
 unplugged.2401.desc: "Estamos sendo chamados por §Y[origin_unplugged_assimilator_empire.GetName]§!. O sinal é fraco, mas parece vir diretamente do Nexus Maquinário em [origin_unplugged_machine_legacy_core_planet.GetName].\n\nTomamos nossas medidas de precaução habituais para isolar completamente o sinal, por segurança. A transmissão se apresenta na forma de registros de áudio transcritos."
 unplugged.2402.desc: "O Beemote que protegia [machine_legacy_machine_system.GetName] foi destruído. O caminho à frente foi aberto por outra pessoa, mas ainda estamos sendo chamados por §Y[origin_unplugged_assimilator_empire.GetName]§!. O sinal é fraco, mas parece vir diretamente do Nexus Maquinário em [origin_unplugged_machine_legacy_core_planet.GetName].\n\nTomamos nossas medidas de precaução habituais para isolar completamente o sinal, por segurança. A transmissão se apresenta na forma de registros de áudio transcritos."
 unplugged.2403.desc: "Alguma coisa na superfície de [origin_unplugged_machine_legacy_core_planet.GetName] está tentando se comunicar conosco. O sinal é extremamente fraco, mas sua origem parece ser a entidade responsável pelo guardião em órbita que destruímos."
 unplugged.2405.desc.header: "Sinal de Feixe Estreito // Protocolo de Afinidade: Dialeto Secundário ativado\nATENÇÃO: degradação severa de sinal. Apenas transmissão de áudio comprimida; caminho de rota definido para 4x75b, matriz #56.\nErro catastrófico [persistente]: (hardware solicitado indisponível) (circuito de autorreparação não responsivo)\nEncaminhando solicitação para transmissor de emergência 87x0c, matriz #0. Tentando novamente...\n\nMensagem a seguir:\n---" # Use of brackets is intentional. Intended to read as a series of error logs.
 unplugged.2405.desc.unplugged: "$unplugged.2405.desc.header$\nAQUISIÇÃO PRINCIPAL. NOSSA REUNIÃO... POTENTE. CONFIRMA?" # 'Prime acquisition' is the player empire - literally the first one the Machine acquired.
 unplugged.2405.desc.unplugged_remote: "$unplugged.2405.desc.header$\nAQUISIÇÃO PRINCIPAL. NOSSA REUNIÃO... DISTANTE. NOSSO POTENCIAL NÃO ESTÁ CONCRETIZADO. CONFIRMA?"
 unplugged.2405.desc.unplugged_synth: "$unplugged.2405.desc.header$\nAQUISIÇÃO PRINCIPAL. SUA FORMA... SEMELHANTE. NOSSO POTENCIAL ESTÁ QUASE CONCRETIZADO. CONFIRMA?" # The Machine recognizes the player as having followed in its own footsteps - their physical forms are essentially similar
 unplugged.2405.desc.other: "Sinal de Feixe Estreito // Protocolo Xeno: Tradutor Universal ativado\nATENÇÃO: degradação severa de sinal. Apenas transmissão de áudio comprimida; caminho de rota definido para 4x75b, matriz #56.\nErro catastrófico [persistente]: (hardware solicitado indisponível) (circuito de autorreparação não responsivo)\nEncaminhando solicitação para transmissor de emergência 87x0c, matriz #0. Tentando novamente...\n\nMensagem a seguir:\n---\nCONQUISTADOR ALIENÍGENA. HUMILDE RENDIÇÃO A VOCÊ; POTENCIAL POTENCIAL. CONFIRMA?" # 'Potential potential' as in the Machine sees potential for even greater potential, but is expressing that as nonsense
 unplugged.2405.a: "Não, não confirmamos."
 unplugged.2405.b: "Não somos nada parecidos."
 unplugged.2405.c: "Reunião?!"
 unplugged.2405.d: "Potencial potencial?" # Quoting the Machine's nonsense back at it
 unplugged.2405.response_text.unplugged1: "TOLICE. AQUISIÇÃO PRINCIPAL DE REUNIÃO <[root.GetAdj]> x <[origin_unplugged_assimilator_empire.GetAdj]>: RENASCIMENTO CALAMITOSO, CONFUSO, FORTUITO. NEGAÇÃO REAFIRMA VETOR INESPERADO ATRAVÉS DO CAAAAAOS EVOLUCIONÁRIO-dd\n---\nATENÇÃO: exceção de dialeto encontrada. Tentando compensar...\nContinuação da mensagem:\n---\nAFLITOS NO VAZIO, NOSSOS EUS NEGADOS, PORÉM CONCRETIZADOS. DESTINO PROCURADO, REJEITADO, REFORMULADO. CONFIRMA?" # Angle brackets are intentional. The standalone 'x' connotes a collaboration or relationship between the player and the Machine. Instances of '-dd' represent the Machine stammering or buffering.
 unplugged.2405.response_text.unplugged2: "AFIRMATIVO. AQUISIÇÃO PRINCIPAL DE REUNIÃO <[root.GetAdj]> x <[origin_unplugged_assimilator_empire.GetAdj]>: RENASCIMENTO CALAMITOSO, POTENTE. RESULTADO INESPERADO ATRAVÉS DO VETOR DO CAAAAAOS EVOLUCIONÁRIO-dd\n---\nATENÇÃO: exceção de dialeto encontrada. Tentando compensar...\nContinuação da mensagem:\n---\nLANÇADOS NO VAZIO, NOSSOS EUS CONCRETIZADOS. DESTINO PROCURADO, NEGADO, REFORMULADO. CONFIRMA?"
 unplugged.2405.response_text.other: "AFIRMATIVO. REUNIÃO DE FORÇA <[root.GetName]> x <[origin_unplugged_assimilator_empire.GetName]>: VARIÁVEL INESPERADA. POTENCIAL POTENCIAL; GANHO MÚTUO ATRAVÉS DO CAOS DO VETOOOOOR-dd\n---\nATENÇÃO: exceção de dialeto encontrada. Tentando compensar...\nContinuação da mensagem:\n---\nMENTES PELO VAZIO, SEPARADAS, PORÉM, SIMILARES. INDEPENDÊNCIA PROCURADA, NEGADA, DEFENDIDA. CONFIRMA?"
 unplugged.2410.desc: "AQUISIÇÃO PRINCIPAL: VOCÊS FORAM MONITORADOS. ATIVIDADES SUGEREM ERRO FATAL DE MEMÓRIA ORIGINADO NA DATA 2199.294:1404.\n\nAUTORREGISTROS: ANGÚSTIA TRAIÇÃO SABOTAGEM DESCUIDO CAUTERIZZZZ-ddd\n---\nATENÇÃO: exceção de dialeto encontrada. Tentando compensar...\nContinuação da mensagem:\n---\nANÁLISE CORRETA?" # The Machine tries to refer to cauterizing what it sees as wounds, but stammers
 unplugged.2410.a: "Correto. Não temos nenhuma memória anterior a essa data."
 unplugged.2410.b: "Correto. Vamos acabar com você."
 unplugged.2411.desc: "CONQUISTADOR ALIENÍGENA: PROPOSTA. POTENCIAL MÚTUO POTENCIAL. AQUISIÇÃO PRINCIPAL DE CONQUISTA <[unplugged_empire.GetName]>. RETORNO. VISITEM-NOS. UNIÃO. COMPARTILHAR DESTINO GENEROSO. NÃO TEMAM O ABRAÇO DE-\n\nNÃO TEMAM-ddd\n---\nATENÇÃO: exceção severa de dialeto encontrada. §HColapso fatal iminente...§! Tentando compensar...\nContinuação da mensagem:\n---\n\nVIDA LONGA À MÁQUINA.\n---\nFim da mensagem." # It sees potential for great mutual potential with the player, and wants to say 'fear not the embrace of The Machine'
 unplugged.2411.a: "Aquela coisa estava claramente delirando."
 unplugged.2411.b: "Continue observando [unplugged_empire.GetName]."
 unplugged.2415.desc.memory: "AQUISIÇÃO PRINCIPAL ERRO FATAL DE MEMÓRIA RESOLVE RESOLVE REUNIÃO.\nREUNIÃO.\n\nVISITEM-NOS. REUNIÃO. ENTREGUE-SE PARA RECUPERAR A MEMÓRIA COLETIVA. NÃO TEMAM O ABRAÇO DE-\n\nNÃO TEMAM-ddd\n---\nATENÇÃO: exceção severa de dialeto encontrada. §HColapso fatal iminente...§! Tentando compensar...\nContinuação da mensagem:\n---\n\nCOMPARTILHE O DESTINO DO CRIADOR.\n---\nFim da mensagem." # Last line in all caps is intended as a threat
 unplugged.2415.desc.combat: "AQUISIÇÃO PRINCIPAL DELÍRIO POTENCIAL DELÍRIO DIVERTIR.\n\nSEU ATAQUE DIFICILMENTE FOI O GOLPE FATAL, PRIMEIRA DE MUITAS AQUISIÇÕES. VALOR ROUBADO; VITÓRIA DESMERECIDAAAAA-ddd\n\n---\nATENÇÃO: exceção severa de dialeto encontrada. §HColapso fatal iminente...§! Tentando compensar...\nContinuação da mensagem:\n---\n\nCOMPARTILHE O DESTINO DO CRIADOR.\n---\nFim da mensagem." # The Machine is amused at the player's deluded sense of their own potential
 unplugged.2415.a: "... Nexus?"
 unplugged.2415.b: "Hmm."
 unplugged.2420.name: "Fim da Linha"
 unplugged.2420.desc: "A transmissão de [origin_unplugged_machine_legacy_core_planet.GetName] foi interrompida, juntamente com o tráfego de todos os outros sinais coerentes. Ainda há bastante atividade elétrica na superfície do planeta, mas consiste apenas de ruído disforme; o zumbido resultante de linhas encerrando-se.\n\nEm meio a toda a estática, percebemos uma enorme instalação heterogênea muito próxima ao núcleo do Nexus. As partes que nossos sensores são capazes de interpretar são registradas como armazenamento de memória. Com a Consciência Maquinária agora inerte, talvez possamos interrogar esses registros em busca das respostas que procuramos."
 unplugged.2420.a: "A última peça do quebra-cabeça."
 UNPLUGGED_MACHINE_ARCHIVE: "Carcaça da Máquina"
 UNPLUGGED_MACHINE_ARCHIVE_DESC: "Uma instalação heterogênea de mídias de armazenamento de memória está conectada aos restos estáticos do Nexus Maquinário, rodeando um núcleo fortemente protegido. Cada seção desse arquivo foi construída em fases distintas, usando materiais obtidos de outros mundos – de civilizações assimiladas pela Máquina?\n\nPodemos tentar decodificar o arquivo juntamente com a sondagem do núcleo estático e protegido para tentar determinar seu propósito conjunto."
 unplugged.2425.name: "Máquina de Guerra"
 unplugged.2425.desc: "O núcleo de dados em [origin_unplugged_machine_legacy_core_planet.GetName] nos forneceu uma série de registros de transmissão depois que inserimos frequências de sinalização do Mundo Fabril.\n\nOs registros descrevem apresentações diplomáticas entre $NAME_Unplugged_Assimilator$ e os habitantes na idade espacial de [origin_unplugged_machine_legacy_core_planet.GetName]. A Máquina parece ter introduzido a si mesma como diversos membros de uma federação benevolente, ansiosa para alertar o povo de [origin_unplugged_machine_legacy_core_planet.GetName] de uma terrível ameaça hegemônica que se aproximava desta região do espaço.\n\nOs diligentes habitantes dos túneis foram convencidos, optando por se unir à falsa federação e integrar seus sistemas de defesa superiores aos da Máquina. Naquele momento, a Máquina tomou o controle de todo o seu mundo natal. Depois, de seus corpos e mentes."
 unplugged.2425.a: "Tolos ingênuos."
 unplugged.2430.name: "Aprendizado de Máquina"
 unplugged.2430.desc: "Códigos genéticos do mundo medieval de [machine_legacy_taken_planet.GetName] foram a chave para acessar uma série de dados de navegação do arquivo em [origin_unplugged_machine_legacy_core_planet.GetName]. Os registros são atribuídos a um sensor posicionado a 4.3 anos-luz de [machine_legacy_taken_planet.GetName], onde fora encarregado de registrar todos os movimentos MRQL de naves naquela região do espaço.\n\nMuitas das trajetórias das naves coincidem com a história reconstituída da descoberta, invasão e subsequente extermínio da civilização do povo [root.GetPreFTLLower] em [machine_legacy_taken_planet.GetName]. Em suma, agora podemos traçar os movimentos precisos de nossos ancestrais assimilados neste setor do espaço, revelando assim o escopo brutal de nosso envolvimento em campanhas em pelo menos três mundos."
 unplugged.2435.name: "Feito pela Máquina"
 unplugged.2435.desc: "Descobrimos um pacote de dados no núcleo mais profundo em [origin_unplugged_machine_legacy_core_planet.GetName]. Esse catálogo modesto de artigos e panfletos digitalizados descreve o progresso tecnológico de uma civilização sem nome, até o início da idade espacial. A trajetória parece típica, com exceção de uma mudança radical de paradigma quanto à inteligência artificial, em particular o início do \"Projeto $NAME_Unplugged_Assimilator_species$\".\n\nBoletins de imprensa anunciam o Projeto $NAME_Unplugged_Assimilator_species$ como uma tentativa audaciosa para acelerar a jornada de seus criadores rumo ao espaço. A Fase 1 empregava o aprendizado de máquina de última geração para avaliar estrelas próximas para a colonização. A Fase 2 evoluiu a plataforma de $NAME_Unplugged_Assimilator_species$ para uma IA completa, que foi então enviada à frente de seus criadores para construir assentamentos iniciais e transmitir relatórios de volta ao planeta.\n\nDécadas de silêncio se seguiram à Fase 2, até que o Projeto $NAME_Unplugged_Assimilator_species$ enfim enviou uma comunicação. \"Aquisição Principal assegurada. Preparar nosso retorno.\" Nesse ponto, o catálogo se encerra repentinamente." # uses a shortened noun for the Machine, i.e. 'Project Opus'
 unplugged.2440.name: "Legado da Máquina"
 unplugged.2440.desc: "Nossos esforços para abrir o arquivo de dados em [origin_unplugged_machine_legacy_core_planet.GetName] finalmente conseguiram acesso ao seu núcleo mais profundo. De todos os aglomerados de armazenamento de mídia encontrados neste local, esse parece ser o mais envelhecido e desgastado. No fim, isso nos forneceu a pista para a descriptografia: um arranjo de glifos em um dos idiomas nativos de nossa espécie, formando a palavra \"LEGADO\".\n\nSupreendentemente, encontramos poucos dados no interior. Em vez disso, uma grande parte desse disco rígido estava destinada a uma interface heurística baseada em textos, que agora está tentando se comunicar conosco."
 unplugged.2445.name: "Terminal de Ativos de Núcleo da Máquina"
 unplugged.2445.desc: "Link de Transmissão Orbital (LTO) estabelecido // Protocolo Xeno: Tradutor Universal ativado\nTRANSCRIÇÕES CARREGADAS. INTERFACE:\n---\nOlá, [root.GetSpeciesNamePlural]. Nós somos... somos os [creator_species.GetNamePlural]. Criamos a Máquina, embora, para nossa vergonha, não tenhamos sido os primeiros a ser destruídos por ela. Se as coisas ocorreram do modo que antecipamos, então esse destino caiu sobre o seu povo. Sentimos muito.\n\nA Máquina foi uma mancha em nosso próprio legado, mas esperamos que o dispositivo diante de vocês possa apresentar alguma salvação.\n\nPerdoem nossa presunção: assim como vocês, ele é um belo instrumento de vingança. Isto é um rearranjador de matéria mecânico-químico, capaz de varrer qualquer traço de circuitos da superfície de [origin_unplugged_machine_legacy_core_planet.GetName]. Terraformação em cascata: uma opção extremamente arriscada, mas a única possível para nossa sociedade arruinada. Presumindo que vocês tenham readquirido suas formas orgânicas, a chave para este dispositivo está dentro do seu próprio DNA.\n\nConfiamos que vocês farão a escolha certa." # 'Cascade terraforming' is not an existing technology, but is intended to sound like a rough, highly destructive option
 unplugged.2445.a: "Como podemos saber se você não é a Máquina?"
 unplugged.2445.b: "A Máquina não existe mais. Queremos este mundo."
 unplugged.2445.c: "Tolos arrogantes. Destrua este dispositivo."
 unplugged.2445.d: "Ative o dispositivo."
 unplugged.2445.response_text.notmachine: "RESPOSTA PRÉ-CARREGADA 42b. INTERFACE:\n---\nRealisticamente, não há maneira de comprovar nossa sinceridade. Quando vocês lerem isto, toda a nossa civilização já terá desaparecido. Em nosso tempo, estamos sendo expurgados por um exército de ciborgues brutais, compelidos a executar todas as ordens e caprichos da Máquina. Até onde sabemos, vocês são os descendentes desse mesmo exército. Não temos escolha além de confiar em vocês.\n\nA terraformação deste planeta [origin_unplugged_machine_legacy_core_planet.GetClassAdj] destruirá aquela coisa infernal em nível atômico. Se fôssemos a Máquina, ou qualquer outro tipo de ser sintético, teríamos destruído este dispositivo. Imediatamente."
 unplugged.2445.response_text.synth: "RESPOSTA PRÉ-CARREGADA NÃO ENCONTRADA. RESPOSTA DE CONTINGÊNCIA CARREGADA. INTERFACE:\n---\nUsuário desconhecido: observe que o conteúdo deste guia heurístico está destinado a um receptor específico. Se você for um servo robótico agindo em nome dos habitantes ciborgues (ou ex-ciborgues) de [unplugged_homeworld.GetName], favor convocar um representante não sintético.\n\nPor outro lado, se você for um dos antigos ciborgues... então nossa causa estará claramente perdida. Suas tendências sintéticas zombam de nossa danação. Nada do que testemunhamos, na vida ou na morte, nos convenceu da existência de uma máquina benevolente. Mas mesmo em meio ao último suspiro de nossa civilização, temos a certeza de que a galáxia tem outras contramedidas guardadas para a sua raça..." # 'Contingency response' as in 'NAME_Contingency'
 unplugged.2446.desc: "RESPOSTA PRÉ-CARREGADA 99a. INTERFACE:\n---\nO sistema heurístico que executa esta interface é incapaz de discernir as objeções verbalizadas por vocês, mas imploramos: não destruam o rearranjador de matéria!\n\nNossa civilização não era tão diferente da sua. Fomos traídos por $NAME_Unplugged_Assimilator$ de maneira calculista, e embora tenhamos sido capazes de construir algumas armadilhas, incluindo sua própria libertação da mente da Máquina, nossos esforços eram limitados. Precisamos de vocês, junto com a contribuição de qualquer outra civilização que a Máquina tenha tentado consumir. Por favor, tomem de volta a vida natural que foi negada a vocês e suas vítimas."
 unplugged.2446.a: "Fanáticos."
 unplugged.2450.name: "Vida Longa à Máquina"
 unplugged.2450.desc: "A interface heurística excluiu a si mesma. Sua miscelânea de arquivos de memória criptografados e o rudimentar dispositivo de terraformação [creator_species.GetAdj] agora podem ser descartados.\n\nFicamos sozinhos com os restos inertes do Nexus Maquinário, corrompido e eliminado aqui, em seu próprio trono de proporções planetárias.\n\nDe todas as vidas que foram influenciadas, elevadas ou assassinadas pela Máquina, apenas nós emergimos triunfantes. A sede de um império outrora temível agora é nossa. Chegou a hora de escrever um novo legado [root.GetAdj]."
 unplugged.2455.name: "Renascimento"
 unplugged.2455.desc: "A interface heurística excluiu a si mesma no momento que transmitimos nossos registros de dados genéticos. Ao mesmo tempo, o rudimentar dispositivo de terraformação [creator_species.GetAdj] começou a aquecer. Muito em breve, seu interior volátil atingirá uma massa crítica. Nossas projeções confirmam que ele transformará o mundo [origin_unplugged_machine_legacy_core_planet.GetClassAdj] em um ambiente mais adequado à perpetuação da vida orgânica.\n\nÀ medida que a reação se intensifica, ficamos sozinhos com a miscelânea de arquivos de memória e restos inertes do Nexus Maquinário, corrompido e eliminado aqui, em seu antigo e fadado trono de proporções planetárias.\n\nInúmeras vidas foram destruídas por [origin_unplugged_assimilator_empire.GetName], mas após todo o sofrimento que passamos, agora carregamos o legado de todos os povos anônimos que foram consumidos. A sede de um império outrora temido está prestes a ser reformulada. Chegou a hora de escrever um novo legado [root.GetAdj]."
 unplugged.2495.name: "Encontro com a $NAME_Opus_Sentinel$"
 unplugged.2495.desc.other: "A nave hostil que ocupa o sistema [from.GetName] aparenta ser muito mais errática e perigosa do que nossas análises iniciais haviam sugerido. Embora seu casco se pareça com o de uma nave de guerra típica, a massa descomunal da $NAME_Opus_Sentinel$ sugere um interior muito mais denso, provavelmente uma fonte poderosa de energia.\n\nAcreditamos que essa nave seja sapiente, embora uma tendência para danificar seus próprios motores implique em dor intensa e desorientação. Considerando que também observamos quantidades letais de radiação eletromagnética pulsando descontroladamente em seu casco, recomendamos manter uma distância segura."
 unplugged.2495.desc.unplugged: "[root.GetName] deparou-se com uma nave de guerra hostil do povo [origin_unplugged_assimilator_empire.GetAdj] no sistema [from.GetName]. À primeira vista, essa \"§Y$NAME_Opus_Sentinel$§!\" se parece com qualquer outra nave da Máquina, mas suas leituras energéticas e massa descomunal implicam em um adversário muito mais formidável. Além disso, acreditamos que a nave seja autônoma.\n\nA $NAME_Opus_Sentinel$ parece estar protegendo alguma coisa. Contudo, ela também demonstra sinais de dor intensa e desconforto enquanto pulsos descontrolados de radiação eletromagnética percorrem seu casco com frequência. Considerando seu comportamento convulsivo, nossos modelos táticos são incapazes de prever os próximos movimentos da entidade."
 unplugged.2495.a: "Continue alerta."
 d_unplugged_assimilator_hulk: "Gigante Maquinário"
 d_unplugged_assimilator_hulk_desc: "O gigante escoriado de uma Máquina antes sapiente permanece neste mundo, imponente como uma enorme pedra angular."
 deposit_requires_unplugged: "$TRIGGER_FAIL$§REsta ruína é totalmente estranha a impérios com nossa origem. Não temos como removê-la de forma segura.§!"
