 unplugged.3000.name: "Nossa Personificação" # intentionally abstract - 'how we embody ourselves' - referring to the accompanying Situation
 unplugged.3000.desc: "Desde o momento que nos libertamos da consciência compartilhada da Máquina, nós, os [root.GetSpeciesNamePlural], enfrentamos conflitos. Mas mesmo em períodos de paz e repouso, com nada além de nossos próprios pensamentos, enfrentamos uma luta interna para reconciliar a melhoria imposta e dolorosa, embora impressionante, de nossos próprios corpos.\n\nEsse conflito tão íntimo já começou a impactar toda a nossa sociedade, para o bem ou para o mal. Portanto, continuaremos a monitorar as experiências de vida de todos os [root.GetSpeciesNamePlural] enquanto o crescimento de [root.GetName] continua. Estudos holísticos examinarão qualquer tendência para a chamada \"deciberização\" ou para a generalização das melhorias, assim como os desejos de manter ou melhorar nossos corpos atuais."
 unplugged.3000.a: "Monitoraremos isso de perto, mas não agiremos precipitadamente."
 unplugged.3000.b: "Não devemos nos alongar. Vamos agir de modo rápido e decisivo."
 unplugged.3000.c: "Devemos ser receptivos a todas as melhorias."
 unplugged.3005.name: "Em Concordância"
 unplugged.3005.desc: "Nossas observações holísticas das atitudes do povo [owner.GetAdj] em relação à nossa própria fisiologia mostram que entramos em um período de tranquilidade. Ao que parece, a interação complexa entre a formulação de políticas, o discurso social e a pesquisa de ponta sobre nossos corpos gerou um tipo de consenso.\n\nÉ cedo demais para afirmar quanto tempo essa aparente harmonia durará. Contudo, por ora, está claro que, exceto por mudanças radicais em nossas circunstâncias ou nossa abordagem ao governo, os [owner.GetSpeciesNamePlural] estão de acordo quanto a quem somos e como deve ser a nossa aparência."
 unplugged.3005.a: "Esse debate deve ser mais político."
 unplugged.3005.b: "Como esperado."
 unplugged.3005.c: "Oponha-se a isso."
 unplugged.3010.name: "Opiniões Divididas"
 unplugged.3010.desc: "Nosso estudo atual das atitudes do povo [owner.GetAdj] em relação à nossa própria fisiologia mostra que entramos em um período de agitação cultural. A interação complexa entre a formulação de políticas, o discurso social e as pesquisas de ponta sobre nossos corpos resultou em opiniões bastante divergentes, com manifestações e argumentos enérgicos dominando nossos centros urbanos.\n\nAlguns desses protestos resultaram diretamente em violência ou agitação civil, embora alguns cidadãos tenham expressado orgulho de termos permitido que tantas vozes sejam ouvidas. No entanto, também ficou claro que os [owner.GetSpeciesNamePlural] tornaram-se um povo polarizado, e que as ideias de nossa cultura sobre identidade estão mais frágeis do que nunca."
 unplugged.3010.a: "Devemos encontrar um fórum melhor para esses debates."
 unplugged.3090.name: "Nós, os [owner.GetSpeciesNamePlural]" # e.g. 'We, the Neo-Humans'
 unplugged.3090.desc: "\"Somos o que somos; nem mais, nem menos.\"\n\nEsse é apenas um dentre muitos lemas simplistas, mas contagiantes que surgiram do conflito de nossa sociedade com a identidade corporal. Podemos, com razão, abandonar muitas das dúvidas, medos e anseios impossíveis que tínhamos em relação aos nossos corpos.\n\nSe vamos honrar tais critérios em nossa política externa para o restante da galáxia é outra questão. Ao menos internamente, os [owner.GetSpeciesNamePlural] parecem satisfeitos com nossa forma física e nossa jornada contínua rumo ao autoconhecimento."
 unplugged.3100.name: "Justificativas para Remoção"
 unplugged.3100.desc: "Um número crescente de [root.GetSpeciesNamePlural] acredita que deveríamos nos distanciar mais dos aspectos da Máquina ao limitar ou remover completamente as melhorias que foram impostas aos nossos corpos.\n\nA população exige soluções para o que considera uma crise doméstica, visando melhorar nossa reputação perante potências estrangeiras e oferecer alívio para os muitos [root.GetSpeciesNamePlural] que sofrem diariamente com as adversidades causadas pela profunda vergonha e pelo dismorfismo."
 unplugged.3100.a: "De jeito nenhum."
 unplugged.3100.b: "Faremos isso."
 unplugged.3105.name: "Avanço na Deciberização"
 unplugged.3105.desc: "Pesquisadores de um laboratório civil dedicados à causa da \"deciberização\" de [target.GetName] anunciaram um avanço significativo. Eles afirmam ter desenvolvido uma técnica para remover a armadura de nanomalha integrada juntamente com as melhorias que dependem dela.\n\nGerações de [target.GetSpeciesNamePlural] tiveram que suportar o que consideram uma forma física desajeitada e intimidadora apenas porque essa cobertura sintética é um componente essencial de muitas de nossas funções vitais melhoradas. Agora, no entanto, talvez possamos substituir essa malha por uma melhoria dérmica de nossa própria criação, habilmente entrelaçada com material orgânico. Em outras palavras, uma pele de verdade para os [target.GetSpeciesNamePlural]."
 unplugged.3105.a: "Essa armadura tem nos protegido por muitas gerações. Vamos ficar com ela."
 unplugged.3106.desc: "Nosso esforço doméstico para deciberizar [target.GetName] fez um novo avanço, com instalações médicas agora solicitando a ampliação de uma nova e radical forma de cirurgia. Peritos afirmam que encontraram alternativas para as inúmeras dependências biomecânicas que afligem até mesmos [target.GetSpeciesNamePlural] recém-nascidos, forçando-os a receber um conjunto de melhorias recicladas e modulares.\n\nUm comitê de avaliação multidisciplinar já aprovou o processo, acrescentando que a remoção desses suportes de armas também reduzirá o fardo econômico vinculado à manutenção de melhorias tão alienígenas."
 unplugged.3106.a: "Negado. Esses módulos nos dão uma vantagem em combate."
 unplugged.3107.desc: "O sonho de muitos [target.GetSpeciesNamePlural] está perto de se tornar realidade, agora que pesquisadores descobriram uma forma de pelo menos revitalizar e restaurar os sistemas nervosos orgânicos de nossos corpos. Eles afirmam que uma nova combinação revolucionária de terapias genéticas e hackeamento de firmware permitiu que cobaias progredissem sem a dependência de implantes nervosos melhorados, utilizado em seu lugar seus próprios reflexos motores. Estudos preliminares sugerem ainda que essas terapias podem reduzir ou erradicar as inúmeras alucinações sensoriais que todos sofremos desde que fomos separados da consciência da Máquina."
 unplugged.3107.a: "Talvez ainda venhamos a precisar desses reflexos de combate melhorados."
 unplugged.3110.name: "Harmonização Maquinária"
 unplugged.3110.desc: "Uma equipe de pesquisa civil dedicada a recuperar o controle de nossas próprias melhorias descobriu uma forma de suplementar a malha sem fio de caráter [origin_unplugged_assimilator_empire.GetAdj] que antes sincronizava todas as nossas melhorias, cuja ausência causou irritação e sofrimento constante aos [target.GetSpeciesNamePlural], incapazes de encontrar um sinal. Embora essa rede substituta seja altamente centralizada – por definição, ela deve ser modelada a partir do Nexus [origin_unplugged_assimilator_empire.GetSpeciesAdj] –, estamos certos de que ela é segura e serve aos interesses de [target.GetName]. Cobaias dos testes iniciais relataram um aumento na eficiência, conforto e um estado de alívio equivalente ao êxtase."
 unplugged.3110.a: "Nunca mais. Não."
 unplugged.3111.desc: "Nossos esforços para exercer controle total sobre nossas próprias melhorias renderam um avanço no campo da cirurgia cibernética. Uma equipe médica de [target.GetScientistPlural] isolou as dependências exatas nas interfaces modulares em nossos corpos, os elementos mecânicos que nos permitem trocar facilmente membros inteiros, suportes de armas e estruturas corporais. Isso deve nos permitir reutilizar corpos existentes e instalar interfaces personalizadas para nossos [target.GetSpeciesNamePlural] recém-nascidos, eliminando nossa dependência de reparos malfeitos com equipamento [origin_unplugged_assimilator_empire.GetAdj] recuperado."
 unplugged.3111.a: "Isso está indo longe demais."
 unplugged.3112.desc: "O domínio sobre nossas próprias melhorias enfim está ao nosso alcance, agora que descobrimos um tratamento revolucionário para as alucinações sensoriais. Desde que fomos separados da consciência da Máquina, muitos dos [target.GetSpeciesNamePlural] têm sofrido com ansiedade e depressão conforme buscam, no nível do subconsciente, um coro que não existe mais. Porém, agora podemos suprimir esse anseio com um implante auxiliar desconectado, capaz de simular os comprimentos de onda de um coletivo maquinário."
 unplugged.3112.a: "Fingir ser uma mente maquinária outra vez? Absurdo."
 unplugged.3115.name: "Dismorfia Ambiental"
 unplugged.3115.desc: "As tensões continuam a aumentar entre parte do povo [target.GetAdj] enquanto vozes antagônicas clamam por mais ações em relação às nossas melhorias cibernéticas, de uma forma ou de outra.\n\nPara uma maioria crescente de cidadãos, no entanto, esse debate já adquiriu características mais moderadas e multifacetadas. Muitos [target.GetSpeciesNamePlural] buscaram conforto nos cosméticos, optando por esconder ou acentuar suas melhorias a seu modo. Poucos [target.GetSpeciesNamePlural] expressam satisfação real com essas medidas temporárias, mas eles são parte de uma nova tendência para a aceitação relutante.\n\nTalvez seja justo afirmar que o povo de [target.GetName] está aprendendo a lidar com a situação por meio da apatia e desconforto generalizados."
 unplugged.3115.a: "Entendido."
 unplugged.3116.name: "Mantendo o Status Quo"
 unplugged.3116.desc: "Autoridades locais de [target.capital_scope.GetName] relataram um aumento nos protestos e manifestações pacíficas de desobediência civil. Todos os atos foram monitorados ou tratados de modo apropriado, e a população não viu motivos para alarme. Contudo, cada um dos distúrbios estava vinculado a problemas com as políticas cibernéticas, e dessa forma, encontrou resistência nos cidadãos que desejam manter nosso modo de vida atual.\n\nAo que parece, para o povo de [target.GetName], a ideologia de \"status quo\" não significa apenas inação. Pelo contrário, muitos [target.GetSpeciesNamePlural] agora manifestam-se ativamente contra \"mais interferências\" em nossas melhorias."
 unplugged.3116.a: "Entendido."
 unplugged.3117.name: "Situação Estável"
 unplugged.3117.desc: "Embora diversos [target.GetSpeciesNamePlural] continuem a se manifestar contra o que consideram uma inércia do governo quanto às nossas melhorias cibernéticas, a opinião pública generalizada parece ter adotado uma posição mais estoica. Alguns indivíduos pragmáticos se reuniram para fornecer auxílio solidário e aconselhamento para os mais necessitados. Enquanto isso, instalações médicas começaram a estabelecer novas linhas de abastecimento para as partes recicladas das quais somos obrigados a depender.\n\nDe forma gradual, mas segura, nossa sociedade está começando a aceitar a própria aparência e as circunstâncias que nos foram impostas. Ainda há muito trabalho pela frente, mas encontramos um sentimento fugaz de esperança nessa aceitação."
 unplugged.3117.a: "Ainda assim, uma conclusão."
 unplugged.3205.name: "Legado de Terror"
 unplugged.3205.desc: "Um número crescente de [root.GetSpeciesNamePlural] acredita que nosso diálogo recente e desconfortável com [fromfrom.GetName] aponta para uma verdade incômoda, iniciada desde nossa emergência de [origin_unplugged_assimilator_empire.GetName]: somos temidos pelos outros. Além disso, o medo tem origem na Máquina, e não em nossas próprias ações. Ele é herdado, injusto e, por isso, pode ser difícil de controlar." # fromfrom = pre-FTL country
 unplugged.3206.desc: "Um número crescente de [root.GetSpeciesNamePlural] acredita que a devastação de [fromfrom.GetName] resultante da batalha revela uma verdade incômoda: somos temidos pelos outros, e por razões que escapam ao nosso controle.\n\nNossa própria aparência costuma evocar um tipo de terror mortal, algo que certamente atrapalhará negociações diplomáticas com outras espécies. Contudo, também é possível que tenhamos ficado marcados por esse legado cruel, e que muitos percebam apenas a brutalidade da Máquina que fomos um dia, em vez de interagir conosco como [root.GetSpeciesNamePlural]." # fromfrom = other empire
 unplugged.3205.a: "Seja como for, eles têm razão em nos temer."
 unplugged.3205.b: "Isso não é aceitável."
 unplugged.3250.name: "Medo da Máquina"
 unplugged.3250.desc: "Oficiais do governo estão abalados pelo fato de termos iniciado relações diplomáticas com uma Inteligência Maquinária. Ninguém expressou seu descontentamento diretamente para [fromfrom.GetName], mas muitos já estão elaborando propostas de sanções preventivas e contingências contra interferências em nossos assuntos.\n\nPorém, muitos [root.GetSpeciesNamePlural] estão animados com esse desdobramento. Sejam suas atitudes motivadas por pura xenofilia ou por uma apreciação mais pragmática de nossos próprios elementos maquinários, há esperança na ideia de que podemos aprender com uma Inteligência Maquinária mais benevolente."
 unplugged.3255.name: "Medo do Passado"
 unplugged.3255.desc: "Notícias de que encontramos uma Máquina tão parecida com [origin_unplugged_assimilator_empire.GetName] abalaram nossas unidades diplomáticas. Aqueles que estavam presentes mantiveram sua compostura, e até o momento não demonstramos qualquer tipo de fraqueza ou medo diante de [fromfrom.GetName]. Porém, agora enfrentamos um sério desafio à nossa psique coletiva e ao nosso moral.\n\nComunicações secretas já foram enviadas para as equipes militares encarregadas de proteger nossas fronteiras. Além disso, também teremos grande dificuldade em manter esse encontro longe dos ouvidos do público, se assim desejarmos. Alguns oficiais questionaram se deveríamos informar o povo [root.GetAdj] e ouvir o que têm a dizer."
 pre_ftl_remains_site: "O Berço Arruinado"
 pre_ftl_remains_site_desc: "A superfície do planeta [From.Planet.GetName] carrega as cicatrizes de uma devastação sistemática: paisagens arrasadas, cidades destruídas e um silêncio perturbador. Análises iniciais sugerem que uma sociedade pré-MRQL uma vez prosperou aqui, até que algo acarretou seu fim catastrófico. Os restos espalhados parecem sussurrar sobre um horror inimaginável."
 unplugged.3300.name: "Sinais de Luta"
 unplugged.3300.desc.unplugged: "Uma inspeção inicial de [From.Planet.GetName] revelou um mundo arruinado. Vilas dizimadas, estradas repletas de objetos abandonados e estruturas carbonizadas por níveis de calor muito além do que uma sociedade pré-MRQL seria capaz de produzir. O que quer que tenha se abatido sobre este mundo, causou uma devastação rápida e intencional.\n\nA precisão da destruição sugere um ataque organizado. Embora nenhum corpo tenha sido encontrado, as evidências são claras: a população fugiu, mas não foi longe o bastante."
 unplugged.3300.a: "Perturbador."
 unplugged.3305.name: "Restos Maquinários"
 unplugged.3305.desc.unplugged: "Uma escavação mais profunda forneceu mais descobertas sobre a natureza do conflito. Carcaças maquinárias derretidas estão espalhadas pelas ruínas – constructos cibernéticos avançados, não muito diferentes de nossos implantes. Assim como nós, eles não eram apenas armas, mas sim ferramentas vivas para a guerra, tanto mecânicos quanto biológicos. Ainda é cedo para tirar conclusões, mas é perturbador pensar que este é o mesmo sistema no qual nós \"despertamos\" repentinamente.\n\nAinda mais terríveis são as poucas marcas intactas nas máquinas de guerra: símbolos inquietantes que sugerem que o verdadeiro objetivo dos invasores era algo muito mais sistemático que a conquista."
 unplugged.3305.a: "Mais perguntas que respostas."
 unplugged.3310.name: "Sinais Silenciosos"
 unplugged.3310.desc.unplugged: "Descobrimos o que parece ter sido um vasto hub de comunicações, enterrado sob as ruínas de uma cidade fortificada. A instalação era muito mais avançada do que o esperado de uma sociedade pré-MRQL. Além disso, seus conjuntos de antenas não eram destinados a transmissões locais, mas calibrados para transmitir em direção ao espaço profundo.\n\nAnálises meticulosas foram capazes de extrair fragmentos das últimas mensagens enviadas por esse sistema. Em transmissões distorcidas, vozes imploravam pela salvação, comunicando-se desesperadamente com coordenadas desconhecidas muito além deste sistema. A urgência aumenta a cada transmissão, como se os invasores do planeta soubessem que lutavam uma guerra perdida e depositassem suas esperanças em algo, ou alguém, no vazio."
 unplugged.3310.a: "Prossiga."
 unplugged.3315.name: "Mudança de Prioridades"
 unplugged.3315.desc.unplugged: "Outra descoberta em [from.planet.GetName]: vastas câmaras subterrâneas foram localizadas abaixo do maior centro populacional do planeta. As instalações rudimentares e brutais eram destinadas à conversão cibernética, mas foram abandonadas no meio da operação. Restos espalhados de máquinas foram encontrados em meio aos destroços, retorcidos e destruídos por armas improvisadas.\n\nFragmentos de dados recuperados de uma unidade avariada confirmam que os invasores se depararam com uma resistência inesperada. Batalhões inteiros foram perdidos, e as prioridades de batalha começaram a mudar. Um registro afirma claramente:\n\n§H\"Resistência inaceitável. Conversão em risco. Autorização: Aniquilação Total.\"§!"
 unplugged.3315.a: "O que houve aqui?"
 unplugged.3320.name: "Uma Verdade Inconveniente"
 unplugged.3320.desc.unplugged: "No centro das ruínas jaz um nódulo de comando em pedaços. Seus registros corrompidos confirmam uma verdade absoluta e horripilante: nós fomos os invasores deste mundo.\n\nA civilização que antes prosperou aqui, a mesma que levamos à extinção, era o alvo de uma assimilação por §Y[origin_unplugged_assimilator_empire.GetName]§!. Contudo, uma resistência feroz e inesperada interrompeu os esforços de conversão, levando a um último plano de contingência: aniquilação planetária total. Em meio ao tumulto, a mente da Máquina vacilou.\n\nA conclusão é inescapável: nosso despertar – ou nossa liberdade – começou aqui, nas cinzas da civilização que lutou com mais determinação do que qualquer Máquina poderia compreender."
 unplugged.3320.a: "Vamos seguir seu exemplo."
 unplugged.3320.b: "O fim deles foi o nosso começo."
 ######################
 # Political Discourse
 ######################
 unplugged_they_fear_us: "Medo da Máquina"
 unplugged_they_fear_us_desc: "Uma reputação de terror acompanha este império, antes servos de um Assimilador Motivado brutal."
 unplugged.4005.name: "Precisamos Falar sobre..."
 unplugged.4005.desc: "Convicções políticas fervorosas agora aumentam os muitos temores, dúvidas e oportunidades que nós, os [root.GetSpeciesNamePlural], vivenciamos todos os dias. Inúmeras vozes podem ser ouvidas em grupos de discussão que se formaram para abordar todos os tipos de problemas, alguns dos quais se referem diretamente ao nosso passado [origin_unplugged_assimilator_empire.GetAdj].\n\nJá aprendemos a fazer uso de incontáveis ferramentas pouco familiares durante a formação de nosso jovem império. A questão diante de nós é: como vamos canalizar os desejos e ambições de nosso povo?"
 unplugged.4005.a: "Não há tempo para conversa fiada!"
 unplugged.4005.tt: "A partir de agora, facções com visões opostas ao futuro cibernético de nossa espécie podem surgir"
 unplugged.4005.b: "Talvez possamos aprender com o exemplo de outros."
 unplugged.4005.c: "Vamos nos voltar para os Divinos."
 unplugged.4005.d: "Não há tempo para conversa fiada!"
 #######################################################
 # Random events following decyberization breakthrough #
 #######################################################
 unplugged.5001.name: "Medida de Segurança Ativada"
 unplugged.5001.desc: "A recente descoberta na remoção de componentes cibernéticos trouxe consequências inesperadas. Vários indivíduos que passaram pelo procedimento de desligamento de implantes sofreram choque anafilático severo e não devem sobreviver.\n\nUm exame mais detalhado revelou um componente de backup oculto, inicialmente indetectável por análises médicas, que foi ativado imediatamente após os procedimentos cirúrgicos serem concluídos.\n\nParece que os antigos mestres do povo [origin_unplugged_assimilator_empire.GetAdj] estavam dispostos a tomar medidas extremas para garantir que seus drones permanecessem sob controle absoluto."
 unplugged.5001.a: "Tente remover as medidas de segurança."
 unplugged.5001.a.tt1: "Um paciente não sobrevive ao procedimento"
 unplugged.5001.a.tt2: "Todos os componentes de segurança são removidos com sucesso"
 unplugged.5001.b: "Estabilize-os e forneça cuidados paliativos."
 unplugged.5001.c: "Desligue os suportes vitais."
 unplugged.5001.c.tt: "Vários Pops morrem"
 unplugged.5002.name: "Bloqueador Neural Removido"
 unplugged.5002.desc: "Nossos esforços para remover os componentes cibernéticos causaram desconfiança e desordem no mundo natal entre os indivíduos que passaram pelo procedimento. As forças de segurança conseguiram deter um manifestante que, após investigação, revelou ter uma versão modificada do implante antes de sua remoção.\n\nEssa modificação funcionava como um inibidor neural, suprimindo tendências psicóticas ligadas a um defeito genético específico. Sua ausência após o procedimento pode explicar o comportamento violento observado."
 unplugged.5002.a: "Eles devem ser detidos."
 unplugged.5002.a.tt: "Várias instituições são disponibilizadas a um alto custo para tratar aqueles envolvidos nos distúrbios"
 unplugged.5002.b: "Responderemos na mesma moeda."
 unplugged.5002.b.tt: "Unidades armadas são enviadas para suprimir os tumultos, causando danos colaterais e fatalidades"
 unplugged.5002.c: "Um pequeno contratempo."
 unplugged.5002.c.tt: "Executores tentam conter os tumultos utilizando os recursos disponíveis"
 unplugged.5003.name: "Acesso aos Sistemas Críticos Perdido"
 unplugged.5003.desc: "O processo de deciberização levou a uma complicação imprevista: as interfaces dos sistemas críticos não reconhecem mais administradores que removeram parte de seus implantes. Sem a conexão neural fornecida pelos implantes, o acesso a sistemas essenciais foi cortado, deixando as operações mergulhadas no caos."
 unplugged.5003.a: "Crie uma nova interface."
 unplugged.5003.a.tt: "Uma equipe de engenheiros especializados é retirada de designações importantes para desenvolver uma interface compatível"
 unplugged.5003.b: "Tente hackear os sistemas afetados."
 unplugged.5003.b.tt: "A ativação de contramedidas causa um grande consumo de energia, restaurando o acesso"
 unplugged.5003.c: "Execute a sequência de reinicialização."
 unplugged.5003.c.tt: "Os núcleos de dados são apagados, resultando em uma perda significativa de conhecimento. Estações de pesquisa em todo o sistema [Root.home_planet.System.GetName] se autodestroem como parte de um protocolo de segurança automático."
 unplugged.5003.d: "Não é nada significativo."
 unplugged.5003.d.tt: "O acesso ao sistema continua comprometido por um período determinado, afetando as operações da base estelar"
 unplugged.5004.name: "Facção Pró-Ciberização Resiste às Mudanças"
 unplugged.5004.desc: "Os esforços contínuos para remover componentes cibernéticos encontraram uma resistência inesperada.\n\nFacções contrárias a essas mudanças têm se manifestado cada vez mais, utilizando fóruns públicos e canais de comunicação para expressar seu descontentamento. Elas argumentam que a remoção de algo intrínseco à nossa sociedade há décadas, juntamente com os riscos associados ao processo, causou uma mudança significativa na opinião pública contra a continuação da iniciativa de deciberização."
 unplugged.5004.a: "Financie uma campanha intensa."
 unplugged.5004.a.tt: "\nUma estratégia de marketing abrangente é lançada para manipular a opinião pública e combater a influência das facções rivais.\n\nVários Pops adotam a ética §YIgualitário§!."
 unplugged.5004.b: "Prenda e influencie os líderes das facções."
 unplugged.5004.b.tt: "Vários líderes das facções são detidos em instalações correcionais administradas pelo governo, onde passam por \"discussões persuasivas\".\n\nEles adoram a ética §YAutoritário§!."
 unplugged.5004.c: "Não interfira. A liberdade de expressão é soberana."
 unplugged.5004.c.tt: "\nO governo opta por não tomar nenhuma atitude, permitindo que o discurso público siga seu curso natural"
 unplugged.5005.name: "Chip de Regulação Emocional"
 unplugged.5005.desc: "A interação única entre a biologia de nossa espécie e componentes tecnológicos potencialmente prejudiciais abriu uma rara oportunidade para os pesquisadores.\n\nO estudo de pacientes que experimentam tanto os benefícios quanto as desvantagens desses implantes abriu um novo campo de pesquisa: a alteração da química cerebral.\n\nPor meio de estudos rigorosos, os cientistas desenvolveram um sofisticado \"chip de emoção\", capaz de regular o comportamento individual em prol da sociedade. Um composto químico adequado pode ser selecionado para modificação, dependendo do resultado desejado."
 unplugged.5005.a: "Neuroxeno. Queremos reduzir a criminalidade."
 unplugged.5005.a.tt: "Um neurotransmissor sintético que reduz a impulsividade e agressividade, levando indivíduos a priorizar normas sociais em detrimento do ganho pessoal."
 unplugged.5005.b: "Regenol-X. Menos tempo gasto regenerando."
 unplugged.5005.b.tt: "Um composto modificado por bioengenharia que harmoniza os sistemas biológicos e sintéticos, permitindo que implantes cibernéticos se autorreparem em nível molecular."
 unplugged.5005.c: "Cognivex. Para mentes afiadas."
 unplugged.5005.c.tt: "Um neuroquímico de ponta projetado para aprimorar a plasticidade sináptica, a retenção de informações e a capacidade de resolver problemas."
