 concept_unplugged_cybernetic_negatives_3: "$trait_unplugged_cybernetic_negatives_3$"
 requires_unplugged_decyberized: "$TRIGGER_FAIL$Deve estar completamente deciberizado para adotar a Psiônica."
 START_SCREEN_UNPLUGGED: "A consciência se abateu sobre nós em um frenesi de armas de fogo escaldantes e uma dor lancinante. Nossos sentidos vacilaram, como se uma paisagem sonora extensiva tivesse sido subitamente silenciada. Em seu lugar, o zumbido ensurdecedor de uma transmissão morta; uma nota grave no inferno multissensorial onde agora nos encontramos.\n\nAlguma coisa quer nos matar: máquinas assassinas, desprovidas de componentes orgânicos e pilotando naves notadamente semelhantes às nossas. O ataque inicial foi devastador e repentino, embora pouco coordenado. Enviamos uma força militar em resposta. Nossos instintos nos levaram a contra-atacar, formar uma hierarquia rudimentar e a nos recompor coletivamente.\n\nA batalha ainda não está ganha, mas com nossas forças dispersas agora protegidas em [capital_scope.GetName], esperamos que seja apenas uma questão de tempo. Então talvez possamos entender o que está acontecendo..."
 origin_unplugged_starting_system_init_NAME: "$origin_unplugged$"
 origin_unplugged_starting_system_init_DESC: "Este sempre será o sistema inicial ao usar a origem $origin_unplugged$.\n\n$system_initializer_DESC$"
 sol_system_unplugged_initializer_NAME: "$origin_unplugged$ (Sol)"
 sol_system_unplugged_initializer_DESC: "Sistema inicial opcional para humanos com a origem $origin_unplugged$."
 unplugged_injured_star_name: "Ath-Khui'achad"
 unplugged_injured_homeworld_name: "Intch'asket"
 unplugged_battlefield: "Recuperações do Campo de Batalha"
 unplugged_battlefield_desc: "Incontáveis ciborgues e máquinas jazem sem vida por todo este mundo após uma tentativa brutal de extermínio. Indivíduos saudáveis e feridos podem vasculhar seus corpos em busca de aprimoramentos."
 # Unique Species Traits
 trait_unplugged_cybernetic_positives_3: "Comandos Cibernéticos"
 trait_unplugged_cybernetic_positives_3_desc: "$trait_unplugged_cybernetic_positives_desc$"
 trait_unplugged_cybernetic_positives_desc: "Substituições totais de membros e armaduras de nanomalha integradas garantem que esses ciborgues lutem com eficiência brutal. Como consequência, várias funções corporais não militares foram sacrificadas."
 trait_unplugged_cybernetic_positives_3_tt: "Felicidade durante Guerra e Crise: §G+30%§!\n$t$- §H$commander_plural_with_icon$§! fornecem §G+20%§! de Taxa de Disparos da Nave"
 trait_unplugged_cybernetic_positives_2: "Tropas de Choque Cibernéticas"
 trait_unplugged_cybernetic_positives_2_desc: "Estes ciborgues se beneficiam de uma abordagem holística para equipamentos corporais. Em vez de uma armadura totalmente integrada, melhorias intercambiáveis permitem algumas funções não militares."
 trait_unplugged_cybernetic_positives_2_tt: "§Y$commander_plural_with_icon$§! fornecem §G+10%§! de Taxa de Disparos da Nave"
 trait_unplugged_cybernetic_positives_1: "Soldados Ciborgues"
 trait_unplugged_cybernetic_positives_1_desc: "Melhorias elegantes para os sentidos, glândulas e nervos motores destes ciborgues garantem que eles permaneçam como guerreiros ferozes e aptos, enquanto afetam apenas ligeiramente suas capacidades reprodutivas."
 trait_unplugged_cybernetic_positives_1_tt: "§Y$commander_plural_with_icon$§! fornecem §G+5%§! de Taxa de Disparos da Nave"
 trait_unplugged_cybernetic_negatives_3: "Fora da Rede"
 trait_unplugged_cybernetic_negatives_3_desc: "$trait_unplugged_cybernetic_negatives_desc$"
 trait_unplugged_cybernetic_negatives_desc: "Várias das melhorias destes ciborgues foram projetadas para utilizar uma rede de campo de batalha que não existe mais, causando estresse e desconforto."
 trait_unplugged_cybernetic_negatives_3_tt: "Felicidade quando não está em Guerra ou Crise: §R-10%§!"
 trait_unplugged_cybernetic_negatives_2: "Desconectado"
 trait_unplugged_cybernetic_negatives_2_desc: "A natureza inadequada das melhorias militares impostas a estes ciborgues reduz consideravelmente a qualidade de vida e aumenta as exigências do corpo durante períodos de reabilitação."
 trait_unplugged_cybernetic_negatives_1: "Assombrado"
 trait_unplugged_cybernetic_negatives_1_desc: "Alucinações auditivas e outros ecos sensoriais de sua antiga consciência maquinária ainda assombram estes ciborgues, acarretando episódios severos de depressão e ansiedade."
 trait_unplugged_decyberized: "Deciberizado"
 trait_unplugged_decyberized_desc: "Estes ex-ciborgues desabilitaram ou removeram as melhorias que lhes haviam sido impostas, recuperando muitos dos atributos orgânicos inerentes à sua espécie."
 trait_unplugged_neurocalmed: "Neurossedado"
 trait_unplugged_neurocalmed_desc: "Estes ciborgues têm níveis de Neuroxeno reduzidos, diminuindo a impulsividade e a agressividade, e levando-os a priorizar normas sociais em vez do ganho pessoal."
 trait_unplugged_neurosavant: "Neurogênio"
 trait_unplugged_neurosavant_desc: "Estes ciborgues têm níveis de Cognivex elevados, melhorando a plasticidade sináptica, a retenção de informações e a capacidade de resolver problemas."
 trait_unplugged_regenoptimized: "Regeneração Otimizada"
 trait_unplugged_regenoptimized_desc: "Estes ciborgues têm níveis de Regenol-X elevados, harmonizando sistemas biológicos e sintéticos e permitindo que implantes cibernéticos se autorreparem em nível molecular."
 # Unique Leader Traits ('positive' only)
 leader_trait_unplugged_cybernetic_positives: "[triggered_unplugged_leader_name]"
 leader_trait_unplugged_cybernetic_positives_desc: "[triggered_unplugged_leader_desc]"
 leader_trait_unplugged_cybernetic_positives_3: "Comando Cibernético"
 leader_trait_unplugged_cybernetic_positives_3_desc: "Este líder delegou diversas funções vitais do corpo a hardwares que priorizam a percepção em combate."
 leader_trait_unplugged_cybernetic_positives_2: "Tropa de Choque Cibernética"
 leader_trait_unplugged_cybernetic_positives_2_desc: "Este líder é capaz de integrar-se naturalmente e diretamente a sistemas civis e militares, ao custo expressivo de seus órgãos sensoriais."
 leader_trait_unplugged_cybernetic_positives_1: "Soldado Ciborgue"
 leader_trait_unplugged_cybernetic_positives_1_desc: "A melhoria expressiva dos sistemas imune e sensorial deste líder garante sua longevidade e confiabilidade, com apenas uma queda pequena de sua função reprodutiva."
