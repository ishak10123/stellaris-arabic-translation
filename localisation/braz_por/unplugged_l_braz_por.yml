 gov_unplugged_assimilator_empire: "$NAME_Unplugged_Assimilator$"
 gov_unplugged_assimilator_empire_desc: "Esta Inteligência Maquinária excedeu os parâmetros de seu projeto original. Ela traiu seus criadores orgânicos, embarcando em uma campanha para assimilar à força outros seres em sua consciência coletiva."
