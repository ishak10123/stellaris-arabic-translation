 situation_unplugged_identity_desc: "Livres do controle de [origin_unplugged_assimilator_empire.GetName], devemos decidir como nos apresentaremos para a galáxia. Vamos abraçar o poder temível da Máquina, ou abandonar nossas melhorias estigmáticas? Muitas vozes do povo [owner.GetSpeciesAdj] desejam ser ouvidas."
