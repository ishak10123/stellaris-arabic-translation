 ### FE Civics
 civic_antediluvian_mind: "Mente Anciã"
 civic_antediluvian_mind_desc: "O tempo não foi gentil com esta mente gestalt. Uma existência prolongada em uma bolha cronológica esmoreceu seu antigo desejo insaciável de sobreviver."
 civic_sluggish_drones: "Drones sem Orientação"
 civic_sluggish_drones_desc: "Com a pouca pressão exercida pela mente superior, os drones deste império trabalham vagarosamente, parecendo quase indiferentes."
 ### FE Buildings
 building_fe: "Construção de Império Caído"
 building_ancient_control_center: "Centro de Controle Antigo"
 building_ancient_control_center_desc: "O antigo centro de controle do mundo-anel é mantido em condições mínimas de funcionamento pelos esforços incansáveis de uma legião de drones maquinários."
 building_ancient_palace: "Palácio Antigo"
 building_ancient_palace_desc: "Este imenso complexo palaciano é de eras antigas. Apesar de sua fachada luminosa ter resistido à passagem do tempo, várias alas foram abandonadas em diferentes níveis de deterioração."
 building_ancient_hive_capital: "Núcleo Venerável"
 building_ancient_hive_capital_desc: "Este antigo nexus da supremacia da colmeia é onde inúmeras gerações de drones exerceram suas ordens com diligência."
 building_affluence_emporium: "Empório de Afluência"
 building_affluence_emporium_desc: "Este centro antecipa e realiza desejos materiais por meio de um algoritmo de compras avançado, entregando satisfação antes mesmo que a população perceba suas necessidades."
 building_affluence_center: "Centro de Afluência"
 building_affluence_center_desc: "Este centro materializa os desejos mais excêntricos com facilidade e de imediato."
 building_nourishment_complex: "Complexo de Nutrição"
 building_nourishment_complex_desc: "A tecnologia de replicação produz novos sabores rapidamente e a qualquer momento."
 building_nourishment_center: "Centro de Nutrição"
 building_nourishment_center_desc: "Todos os sabores imagináveis podem ser reproduzidos neste lugar."
 building_dimensional_replicator: "Replicador Dimensional"
 building_dimensional_replicator_desc: "A tecnologia deste fabricador realiza a conversão perfeita de energia em matéria."
 building_dimensional_fabricator: "Fabricador Dimensional"
 building_dimensional_fabricator_desc: "Este fabricador avançado é capaz de perfurar facilmente o tecido do espaço dimensional para extrair recursos valiosos."
 building_class_3_singularity: "Singularidade Classe-3"
 building_class_3_singularity_desc: "Capturar toda a produção de energia desta singularidade é uma maravilha da engenharia."
 building_class_4_singularity: "Singularidade Classe-4"
 building_class_4_singularity_desc: "A produção de energia desta singularidade desafia as leis da física, mas mesmo assim seus campos de contenção têm uma estabilidade inabalável."
 building_micro_forge: "Hiperforja"
 building_micro_forge_desc: "A velocidade de produção desta forja é limitada apenas pela quantidade de recursos colocados nela."
 building_nano_forge: "Nano Fornalha"
 building_nano_forge_desc: "Os extensos compartimentos nanorreplicadores desta forja transformam matérias-primas em ligas metálicas avançadas com uma eficiência impressionante."
 building_fe_sky_dome: "Redoma Celeste"
 building_fe_sky_dome_desc: "Esta cidade flutuante, impulsionada com tecnologia antigravitacional avançada, fornece um abrigo idílico para sua população."
 building_fe_dome: "Redoma Empírica"
 building_fe_dome_desc: "Estas redomas suspensas por meio de nulificações gravimétricas transcendem as limitações físicas, enquanto sistemas avançados de suporte à vida atendem às necessidades da população com perfeição."
 building_fe_fortress: "Bastião Áspide"
 building_fe_fortress_desc: "Este complexo de defesa planetária colossal conta com vários arsenais e é protegido por diversas camadas de blindagem. Somente um exército de cerco altamente especializado poderia penetrar suas defesas."
 building_fe_stronghold: "Complexo Égide"
 building_fe_stronghold_desc: "Este monumental complexo de defesa planetária conta com inúmeros arsenais e diversas camadas de proteção. As montanhas do planeta ruirão antes de suas defesas serem penetradas."
 building_master_archive: "Arquivo Mestre"
 building_master_archive_desc: "Este repositório abriga o conhecimento de várias eras galácticas, porém a capacidade de operar seu sistema de recuperação arcano foi perdida. Os fragmentos de dados extraídos são inestimáveis."
 building_empyrean_shrine: "Templo Empírico Interplanar"
 building_empyrean_shrine_desc: "Usado exclusivamente para a comunhão com os espíritos do Véu, este templo se manifesta apenas parcialmente em nossa dimensão."
 building_ancient_cryo_chamber: "Câmara Criogênica Antiga"
 building_ancient_cryo_chamber_desc: "Filas e mais filas de câmaras criogênicas cercam esta estrutura gigantesca, contendo os restos mortais de bilhões de espécies alienígenas congeladas há muito tempo."
 building_fe_administration_1: "Administração Onividente"
 building_fe_administration_1_desc: "Este enorme complexo, vital para um sistema burocrático que abrange toda a galáxia, está conectado a uma vasta rede administrativa."
 building_fe_administration_2: "Administração Onisciente"
 building_fe_administration_2_desc: "Este enorme complexo, a peça central de um sistema burocrático que abrange toda a galáxia, coordena uma rede administrativa robusta e avançada."
 building_fe_administration_hive_1: "Aglomerado Efático"
 building_fe_administration_hive_1_desc: "Cuidada com esmero por drones altamente especializados, esta rede de nódulos efáticos fortalece o poder da Colmeia sobre seu extenso domínio cognitivo."
 building_fe_administration_hive_2: "Axônio Efático"
 building_fe_administration_hive_2_desc: "Cuidada com esmero por drones altamente especializados, esta vasta rede de nódulos efáticos fortalece a vontade da Colmeia na galáxia."
 building_fe_administration_machine_1: "Ponto de Coordenação Fractal"
 building_fe_administration_machine_1_desc: "Um hub fractal avançado que processa e transmite trilhões de sinais continuamente e com precisão quase instantânea."
 building_fe_administration_machine_2: "Ponto de Coordenação Quântica"
 building_fe_administration_machine_2_desc: "Um hub avançado de emaranhamento quântico que processa e transmite quatrilhões de sinais de forma instantânea e precisa."
 building_fe_temple_1: "Sanctum Celeste"
 building_fe_temple_1_desc: "Avanços inovadores na tecnologia metafísica concedem aos devotos uma comunhão direta com a essência divina."
 building_fe_temple_2: "Catedral Celeste"
 building_fe_temple_2_desc: "O uso de tecnologia metafísica em sermões psiônicos amplifica a ressonância espiritual. Este imenso complexo permite que os devotos se conectem de forma íntima à essência divina com um alcance que abrange todo o sistema."
 building_fe_assembly_1: "Nexus de Fabricação de Robôs"
 building_fe_assembly_1_desc: "Este complexo de montagem revolucionário é operado por roboticistas habilidosos e transcende os limites convencionais, formando meticulosamente a vanguarda da inovação robótica."
 building_fe_assembly_2: "Hub de Produção Quântica de Robôs"
 building_fe_assembly_2_desc: "Uma maravilha da engenharia, a linha de montagem quântica desta instalação usa conversores de emaranhamento para fabricar peças mecânicas perfeitas até nos mínimos detalhes. Nem um átomo sequer fica fora de lugar."
 building_fe_clinic_1: "Instituto de Revitalização Molecular"
 building_fe_clinic_1_desc: "Os Institutos de Revitalização Molecular se valem de um profundo conhecimento sobre as complexidades celulares para amplificar a eficácia de tratamentos médicos, aumentando drasticamente a qualidade da saúde da população e sua longevidade."
 building_fe_clinic_2: "Instituto de Biorregeneração"
 building_fe_clinic_2_desc: "O expoente máximo da tecnologia médica, o Instituto de Biorregeneração desenvolve terapias biorregenerativas inovadoras, constantemente redefinindo os limites da expectativa de vida."
 building_fe_security_1: "Complexo da Justiça"
 building_fe_security_1_desc: "Este imenso complexo jurídico conecta com facilidade os tribunais e as forças de execução da lei."
 building_fe_security_2: "Zigurate da Justiça"
 building_fe_security_2_desc: "O zênite das instituições legais, este edifício colossal é um monumento à justiça que abriga tribunais, instalações de contenção e instalações correcionais capazes de redimir até os criminosos mais reincidentes."
 building_fe_market_1: "Hub de Comércio Galáctico"
 building_fe_market_1_desc: "Dominando o horizonte, estas torres gigantescas lançam sombras sobre os movimentados distritos comerciais abaixo."
 building_fe_market_2: "Nexus de Comércio Interestelar"
 building_fe_market_2_desc: "Reinando de forma incontestável sobre a economia galáctica, as torres gigantescas deste distrito comercial podem ser vistas do espaço."
 building_fe_silo_1: "Depósito Compressor de Espaço"
 building_fe_silo_1_desc: "Este depósito permite manipular uma porção de subespaço onde a distância entre as moléculas é reduzida, encolhendo tudo o que é armazenado nele. É proibido o armazenamento de seres vivos."
 building_fe_silo_2: "Depósito Extradimensional"
 building_fe_silo_2_desc: "Com a criação de uma dimensão de bolso limitada, podemos armazenar recursos quase infinitos."
 building_fe_entertainment_1: "Praça de Alegria Virtual"
 building_fe_entertainment_1_desc: "Estes imensos setores de entretenimento representam a vanguarda da diversão e do lazer. Leitores de ondas cerebrais permitem a criação de experiências e destinos virtuais instantâneos e personalizados."
 building_fe_entertainment_2: "Nexus de Omni-Alegria"
 building_fe_entertainment_2_desc: "O apogeu grandioso da cultura de entretenimento. Este nexus transcende os limites convencionais e materializa sonhos antes mesmo que os desejos se manifestem."
 building_fe_lab_1: "Nexus de Inovação Quântica"
 building_fe_lab_1_desc: "Este nexus conta com equipamentos de última geração e uma capacidade de funcionários sem precedentes, introduzindo uma era em que as teorias quânticas não são apenas exploradas, mas também usadas em inovações revolucionárias."
 building_fe_lab_2: "Departamento de Inovação Transcendental"
 building_fe_lab_2_desc: "Esta construção representa o ápice do avanço científico e a prova de que vivemos em uma época de inovação sem limites."
 building_fe_mine_1: "Instalação de Perfuração Quântica"
 building_fe_mine_1_desc: "Esta instalação de mineração usa uma tecnologia quântica de perfuração de túneis para cavar através de materiais sólidos, sem a necessidade de contato físico, e encontrar minerais em qualquer lugar do manto deste planeta."
 building_fe_mine_2: "Hub de Perfuração Quântica"
 building_fe_mine_2_desc: "Este hub de mineração usa uma tecnologia quântica de perfuração de túneis para cavar através de materiais sólidos ou líquidos, sem a necessidade de contato físico, e extrair minerais em qualquer lugar do núcleo externo do planeta."
 ### FE Jobs
 job_fe_overseer: "Supervisor"
 job_fe_overseer_plural: "Supervisores"
 job_fe_overseer_desc: "Os poucos corajosos que rejeitaram suas vidas de luxo em favor do serviço público. Cabe a eles supervisionar e guiar os remanescentes de sua antiga civilização."
 mod_job_fe_overseer_add: "Empregos $job_fe_overseer$"
 job_fe_maintenance_bot: "Zelador"
 job_fe_maintenance_bot_plural: "Zeladores"
 job_fe_maintenance_bot_desc: "Estas máquinas antigas mantêm e consertam incansavelmente o maquinário decadente do mundo-anel onde residem."
 mod_job_fe_maintenance_bot_add: "Empregos $job_fe_maintenance_bot$"
 mod_job_fe_maintenance_bot_per_pop: "§G+1§! Emprego de $job_fe_maintenance_bot$ a cada $VALUE$ Pops"
 mod_job_fe_maintenance_bot_per_pop_short: "\n§G+1§! para £mod_job_maintenance_drone_add£ a cada $VALUE$ £pop£"
 job_fe_guardian_bot: "Guardião"
 job_fe_guardian_bot_plural: "Guardiões"
 job_fe_guardian_bot_desc: "Estas máquinas antigas mantêm uma vigília incessante sobre os restos mortais de bilhões de seres sapientes congelados criogenicamente há muito tempo."
 mod_job_fe_guardian_bot_add: "Empregos $job_fe_guardian_bot$"
 fe_hedonist: "$job_fe_hedonist$"
 job_fe_hedonist: "Hedonista"
 job_fe_hedonist_plural: "Hedonistas"
 job_fe_hedonist_desc: "Uma vida de opulência total, onde cada necessidade ou desejo material possível pode ser satisfeito."
 mod_job_fe_hedonist_add: "Empregos $job_fe_hedonist$"
 job_fe_archivist: "Arquivista"
 job_fe_archivist_plural: "Arquivistas"
 job_fe_archivist_effect_desc: "£job_archivist£ $job_fe_archivist_plural$ transformam $r_consumer_goods$ em $r_research$."
 job_fe_archivist_desc: "Cada fragmento de dados deve ser arquivado, catalogado e indexado exatamente de acordo com os ritos antigos estabelecidos eras atrás pelo Primeiro Bibliotecário."
 mod_job_fe_archivist_add: "Empregos $job_fe_archivist$"
 job_fe_acolyte_farm: "Acólito do Arado"
 job_fe_acolyte_farm_plural: "Acólitos do Arado"
 job_fe_acolyte_farm_plural_with_icon: "£job_fe_acolyte_farm£ $job_fe_acolyte_farm_plural$"
 job_fe_acolyte_farm_desc: "Não foi o arado, este instrumento de tamanha nobreza, que Kazargiel usou para cortar a cauda venenosa do demônio três vezes amaldiçoado e com isso afastou a fome?"
 job_fe_acolyte_farm_effect_desc: "£job_fe_acolyte_farm£ $job_fe_acolyte_farm_plural$ produzem £food£ §Y$food$§!"
 mod_job_fe_acolyte_farm_add: "Empregos $job_fe_acolyte_farm$"
 job_fe_acolyte_mine: "Acólito do Martelo"
 job_fe_acolyte_mine_plural: "Acólitos do Martelo"
 job_fe_acolyte_mine_plural_with_icon: "£job_fe_acolyte_mine£ $job_fe_acolyte_mine_plural$"
 job_fe_acolyte_mine_desc: "E com um forte golpe, Santa Mazakedal usou seu martelo flamejante para dilacerar o crânio da Primeira Sombra, abrindo o caminho para os cristais."
 job_fe_acolyte_mine_effect_desc: "£job_fe_acolyte_mine£ $job_fe_acolyte_mine_plural$ produzem £minerals£ §Y$minerals$§!"
 mod_job_fe_acolyte_mine_add: "Empregos $job_fe_acolyte_mine$"
 job_fe_acolyte_generator: "Acólito da Hiperferramenta"
 job_fe_acolyte_generator_plural: "Acólitos da Hiperferramenta"
 job_fe_acolyte_generator_plural_with_icon: "£job_fe_acolyte_generator£ $job_fe_acolyte_generator_plural$"
 job_fe_acolyte_generator_desc: "Lembrem-se também da hiperferramenta e de como ela foi usada por Bazagg, o Brilhante, para domar o sol quando parecia que a escuridão envolveria o mundo."
 job_fe_acolyte_generator_effect_desc: "£job_fe_acolyte_generator£ $job_fe_acolyte_generator_plural$ produzem £energy£ §Y$energy$§!"
 mod_job_fe_acolyte_generator_add: "Empregos $job_fe_acolyte_generator$"
 job_fe_acolyte_artisan: "Acólito da Oficina"
 job_fe_acolyte_artisan_plural: "Acólitos da Oficina"
 job_fe_acolyte_artisan_desc: "Então Aznakha disse aos seus acólitos: \"Ide para as oficinas e, com tuas criações, forjem o futuro que quereis\"."
 job_fe_acolyte_artisan_effect_desc: "£job_fe_acolyte_artisan£ $job_fe_acolyte_artisan_plural$ produzem £consumer_goods£ §Y$consumer_goods$§!"
 mod_job_fe_acolyte_artisan_add: "Empregos $job_fe_acolyte_artisan$"
 job_fe_protector: "Protetor"
 job_fe_protector_plural: "Protetores"
 job_fe_protector_desc: "Para que a maioria possa descansar sem preocupações e desfrutar suas vidas de extravagância, estes indivíduos brutos ficam de prontidão durante a noite para levar violência àqueles que buscam o conflito."
 mod_job_fe_protector_add: "Empregos $job_fe_protector$"
 job_fe_augur: "Áugure do Véu"
 job_fe_augur_plural: "Áugures do Véu"
 job_fe_augur_desc: "Ele fala, mas não através de palavras. Para adivinhar qualquer significado, é necessário estar no precipício da loucura."
 mod_job_fe_augur_add: "Empregos $job_fe_augur$"
 job_fe_sky_cardinal: "Cardeal Celeste"
 job_fe_sky_cardinal_plural: "Cardeais Celestes"
 job_fe_sky_cardinal_desc: "E foi lá, no céu, que o futuro nasceu. A luz era deveras brilhante, mas alguns poucos puderam ver além dela. Eles tomaram sobre si a responsabilidade de liderar os outros no caminho adiante."
 mod_job_fe_sky_cardinal_add: "Empregos $job_fe_sky_cardinal$"
 job_fe_xeno_ward: "Xeno-Guardião"
 job_fe_xeno_ward_plural: "Xeno-Guardiões"
 job_fe_xeno_ward_desc: "Estes espécimes foram reunidos aqui, em ambientes que se aproximam dos seus habitats naturais, para garantir a preservação de sua espécie em uma galáxia normalmente caótica e destrutiva."
 mod_job_fe_xeno_ward_add: "Empregos $job_fe_xeno_ward$"
 job_fe_xeno_keeper: "Xeno-Cuidador"
 job_fe_xeno_keeper_plural: "Xeno-Cuidadores"
 job_fe_xeno_keeper_desc: "Estes cuidadores precursores atendem às necessidades dos Xeno-Guardiões sob seu cuidado."
 mod_job_fe_xeno_keeper_add: "Empregos $job_fe_xeno_keeper$"
