 sm_voidlure_desc: "Iscas do Vazio transmitem sinais para o espaço profundo capazes de atrair organismos que habitam o vazio."
 sm_voidlure_desc_know_fauna: "Iscas do Vazio transmitem sinais para o espaço profundo capazes de atrair tipos específicos de Fauna Espacial com o tempo. Cada instalação deve ser construída no tipo de sistema preferido pela criatura. Criaturas atraídas se tornarão dóceis por um ano."
