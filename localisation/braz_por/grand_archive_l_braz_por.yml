 grand_archive.1170.a: "$grand_archive.1165.a$"
 grand_archive.1180.name: "Vermes do Vazio Mutantes Encontrados"
 grand_archive.1180.desc: "Após termos eliminado um grupo de Vermes do Vazio, descobrimos que essas criaturas sofreram uma mutação distinta.\n\nElas parecem capazes de se reproduzir de forma não parasítica e estão em um estado acentuado de agressividade, o que explicaria sua força e resistência incomuns.\n\nFelizmente, nós preservamos um dos ninhos como troféu. Sob nosso controle, podemos criar mais dessas criaturas sem arriscarmos infestar toda a galáxia."
 grand_archive.1180.a: "Um desdobramento inesperado, mas bem-vindo."
 grand_archive.1185.name: "Vermes do Vazio Exterminados"
 grand_archive.1185.desc: "Descobrimos que os Vermes do Vazio que ameaçavam nossa colônia foram eliminados.\n\nUma conclusão inesperada, mas bem-vinda. Podemos nos confortar com o fato de que essas criaturas não serão mais um risco aos nossos sistemas."
 grand_archive.1185.a: "A galáxia está mais segura."
 grand_archive.1200.name: "Ataque de Vermes do Vazio"
 grand_archive.1200.desc: "Os Vermes do Vazio ensandecidos estão atacando [frenzied_voidworms_target.solar_system.GetName]!\n\nA agressividade deles atingiu o ápice, e a trajetória atual do enxame principal aponta diretamente para [frenzied_voidworms_target.GetName].\n\nÉ improvável que deixem sobreviventes."
 grand_archive.1200.a: "Prepare as nossas defesas."
 grand_archive.1205.name: "O Preço mais Alto"
 grand_archive.1205.desc_common: "Apesar de nossos esforços, os Vermes do Vazio mutantes esmagaram [this.GetName] completamente. O bombardeio das criaturas ensandecidas foi tão violento que rachou o núcleo do planeta, causando sua fragmentação. Não houve sobreviventes.\n\nDesde então, eles retornaram aos ninhos e não parecem mais agitados com a nossa presença. Com sorte, é lá que eles permanecerão."
 grand_archive.1205.desc.default: "$grand_archive.1205.desc_common$\n\nNão temos alternativa diante dessa tragédia além de seguir em frente e aprender com nossos erros."
 grand_archive.1205.desc.gestalt: "$grand_archive.1205.desc_common$\n\nA perda de nossa colmeia principal foi um golpe duro para [event_target:victim_country.GetName], mas temos que seguir em frente."
 grand_archive.1205.a: "Agora é a hora de reconstruir."
 grand_archive.1210.name: "Vermes do Vazio Mutantes Eliminados"
 grand_archive.1210.desc: "Os Vermes do Vazio descobertos em [From.GetName] foram eliminados. A destruição de [avenged_homeworld.GetName] foi vingada.\n\nO maior ninho das estranhas criaturas mutantes foi preservado. Sob nosso controle, podemos criar mais desses seres únicos sem arriscarmos infestar toda a galáxia.\n\nDessa forma, o legado de nosso mundo perdido continuará vivo."
 grand_archive.1210.a: "$grand_archive.1165.a$"
 grand_archive.1220.name: "Vermes do Vazio Amansados"
 grand_archive.1220.desc.common: "Com o envio de quantidades significativas de alimento mineral diretamente aos ninhos, conseguimos estabelecer uma relação com os Vermes do Vazio em [frenzied_home_system.GetName]. Essas criaturas não ameaçarão mais [frenzied_voidworms_target.GetName]. A segurança de nosso planeta"
 grand_archive.1220.desc.common_2: "Nossos cuidadores de animais mais experientes estão trabalhando para tratar as feras, e chegamos ao ponto onde elas parecem receptivas à cooperação mútua.\n\nTrouxemos um de seus maiores ninhos. Com isso, poderemos cultivar mais desses Vermes do Vazio mutantes que do contrário seriam deixados à própria sorte."
 grand_archive.1220.desc.default: "$grand_archive.1220.desc.common$ e do ecossistema galáctico está garantida.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.desc.homicidal: "$grand_archive.1220.desc.common$ está garantida.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.a: "Uma bela adição às frotas."
 grand_archive.1220.tt: "Todas as frotas de Vermes do Vazio Ensandecidos estão sob o controle do seu império"
 grand_archive.7010.name: "Iscas do Vazio Desenvolvidas"
 grand_archive.7010.desc.common: "Nosso entendimento acerca de organismos espaciais levou ao desenvolvimento do que estamos chamando de §YIscas do Vazio§!."
 grand_archive.7010.desc: "$grand_archive.7010.desc.common$\n\nEssas construções de base estelar devem ser construídas dentro dos sistemas nativos de cada tipo específico de Fauna Espacial. Uma vez instaladas, elas atrairão periodicamente frotas de criaturas até a base estelar.\n\nDevemos agir com cautela, pois alguns organismos podem ser agressivos."
 grand_archive.7010.desc.primal_calling: "$grand_archive.7010.desc.common$\n\nEsses dispositivos foram projetados para enviar um chamado espaço adentro e atrair organismos que habitam o vazio. Não sabemos o que podemos atrair, mas as frequências que estamos transmitindo atualmente estão recebendo respostas regulares e análogas.\n\nAlgo está a caminho."
 grand_archive.7020.name: "Canto das Baleias"
 grand_archive.7020.desc: "A §YIsca do Vazio§! que desenvolvemos atraiu um grupo de baleias espaciais nativas a sistemas com §Ygigantes gasosos§!, semelhantes a [This.Capital.System.GetName].\n\nTudo indica que nossos dispositivos devem ser construídos nesses ambientes para funcionarem corretamente. Se descobrirmos mais fauna selvagem, talvez possamos construir também Iscas do Vazio próximas aos seus habitats naturais."
 ### Treasure Hunters
 origin_treasure_hunters: "Caçadores de Tesouros"
 origin_treasure_hunters_desc: "Motivada pela sede de aventuras, esta civilização está pronta para lançar sua maior e mais desafiadora expedição. Armados apenas com um mapa misterioso, eles agora cruzam as estrelas em busca de um lendário tesouro pirata."
 origin_tooltip_treasure_hunters_effects: "- Começa com um ['r_celestial_chart_0_desc', $celestial_chart$] inativo\n- Todos os líderes recrutados têm uma característica ['concept_adventurous_spirit_trait'] extra$NEW_LINE$- Características do Governante:$TABBED_NEW_LINE$- ['leader_trait:leader_trait_buccaneer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_trailblazer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_treasure_hoarder']"
 START_SCREEN_TREASURE_HUNTERS: "Nossa civilização é definida por sua sede de aventuras.\n\nDescobrir tesouros há muito perdidos, explorar ruínas antigas e escavar artefatos de eras distantes; tais eventos constituem nossas histórias mais celebradas e inspira nossa sociedade há muitas gerações.\n\nLogo, teria sido coincidência ou obra do destino quando nossa primeira incursão no espaço resultou em um chamado para a aventura? Uma cápsula misteriosa de origem desconhecida foi descoberta na órbita de nosso planeta. Dentro havia um mapa codificado para as estrelas.\n\nApós muitos anos de trabalho árduo, agora temos a tecnologia para decifrar o mapa e traçar um curso rumo ao desconhecido. Enquanto zarpamos para as fronteiras da galáxia, somos unidos pela determinação de embarcar em nossa maior e mais ousada expedição até então."
 d_treasure_planet: "Cofre do Tesouro"
 d_treasure_planet_desc: "Um depósito seguro onde artigos de valor podem ser organizados, restaurados e preservados."
 concept_treasure_vault: "$d_treasure_planet$"
 concept_treasure_vault_desc: "$d_treasure_planet_desc$"
 job_treasure_gatherer: "Curador de Tesouros"
 job_treasure_gatherer_plural: "Curadores de Tesouros"
 job_treasure_gatherer_desc: "Treinados para avaliar todo o tipo de bens raros e valiosos, estes profissionais podem extrair o mais alto valor de tesouros encontrados ao redor da galáxia."
 mod_job_treasure_gatherer_add: "$job_treasure_gatherer_plural$"
 mod_job_treasure_gatherer_per_pop: "§G+1§! Emprego de $job_treasure_gatherer$ a cada $VALUE$ Pops"
 mod_job_treasure_gatherer_per_pop_short: "\n§G+1§! para $job_treasure_gatherer$ a cada $VALUE$ £pop£"
 job_treasure_gatherer_gestalt: "Drone Avaliador de Tesouros"
 job_treasure_gatherer_gestalt_plural: "Drones Avaliadores de Tesouros"
 job_treasure_gatherer_gestalt_desc: "Capazes de avaliar todo o tipo de bens raros e valiosos, estes drones podem extrair a melhor utilidade possível de tesouros encontrados ao redor da galáxia."
 mod_job_treasure_gatherer_gestalt_add: "$job_treasure_gatherer_gestalt_plural$"
 mod_job_treasure_gatherer_gestalt_per_pop: "§G+1§! Emprego de $job_treasure_gatherer_gestalt$ a cada $VALUE$ Pops"
 mod_job_treasure_gatherer_gestalt_per_pop_short: "\n§G+1§! para $job_treasure_gatherer_gestalt$ a cada $VALUE$ £pop£"
 planet_treasure_gatherers: "$job_treasure_gatherer_plural$"
 mod_planet_treasure_gatherers_produces_mult: "Produção de £job_treasure_gatherer£ $planet_treasure_gatherers$"
 grand_archive.5015.name: "Estabelecimento do Cofre do Tesouro"
 grand_archive.5015.desc: "O §Y$celestial_chart$§! nos forneceu informações de apreciação arquivadas úteis para extrairmos mais valor dos tesouros que descobrirmos. Deveríamos estabelecer um §YCofre do Tesouro§! em um de nossos planetas, onde artigos valiosos poderão ser organizados, restaurados e preservados. Com base na logística atual, os seguintes planetas são adequados para essa nova instalação."
 grand_archive.5015.a: "Crie um $d_treasure_planet$ em §Y[event_target:treasure_planet_candidate_1.GetName]§!."
 grand_archive.5015.b: "Crie um $d_treasure_planet$ em §Y[event_target:treasure_planet_candidate_2.GetName]§!."
 grand_archive.5015.c: "Crie um $d_treasure_planet$ em §Y[event_target:treasure_planet_candidate_3.GetName]§!."
