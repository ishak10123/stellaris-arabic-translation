 ##########
 #Civics #
 ##########
 civic_galactic_curators: "Curadores Galácticos"
 civic_galactic_curators_desc: "A coleta e preservação meticulosa de artefatos históricos sempre fascinou esta civilização. Agora, porém, com os mistérios da galáxia ao seu alcance, ela ainda tem muito a aprender."
 civic_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$"
 civic_corporate_galactic_curators: "Especialidade Antiquária"
 civic_corporate_galactic_curators_desc: "Há muito dinheiro envolvido no âmbito das antiguidades e artigos colecionáveis, e esta sociedade sabe disso melhor que ninguém. Peritos na especulação material, eles agora voltam-se para o céu em busca de oportunidades de investimento."
 civic_corporate_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$\n- A £building£ §Y$building_public_relations_office$§! $megacorp_civic_branch_office_building_effect$"
 civic_hive_galactic_curators: "Rede de Cuidadores"
 civic_hive_galactic_curators_desc: "Este coletivo desenvolveu uma compulsão por pegar, salvaguardar e manter itens diversos. Tal comportamento, que antes ajudou em sua sobrevivência, agora o motiva a exibir seus objetos coletados em um grande arranjo."
 civic_hive_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_machine_galactic_curators: "Rede de Cuidadores"
 civic_machine_galactic_curators_desc: "Esta Inteligência Maquinária tem uma diretriz primária em seu código-fonte: Coletar e Preservar."
 civic_machine_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_galactic_curators_effects_common: "- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_galactic_archivism', £society_research£$tech_galactic_archivism$]\n- ['concept_specimen', Espécimes] iniciais: um §0$common$§! de cada Categoria da Coleção \n- Ganha $r_unity$ sempre que encontra um §YEspécime§! ou conclui um §Y$ARCHAEOLOGICAL_SITE$§! \n- Compras do §YEnclave dos Curadores§!: §G$@galactic_curators_curator_enclave_purchase_cost|%0$§!\n- Habilita o Edito §Y$edict_decentralized_research$§!, que aumenta a Produção da §YEstação de Pesquisa§!, mas reduz a Produção dos empregos de £job_researcher£ §Y[GetResearcher]§!"
 edict_decentralized_research: "Pesquisa Descentralizada"
 edict_decentralized_research_desc: "O maior conhecimento jaz fora de nossa própria civilização. Ao nos concentrarmos na galáxia como um todo, poderemos alcançar uma compreensão mais completa de nós mesmos."
 MOD_COUNTRY_SPECIMEN_ACQUIRE_CHANCE_MULT: "Maior chance de descobrir Espécimes"
 councilor_galactic_curators: "Curador Supremo"
 councilor_galactic_curators_desc: "O $TITLE$ supervisiona a qualidade da preservação de todos os espécimes."
 councilor_corporate_galactic_curators: "Diretor de Curadoria"
 councilor_corporate_galactic_curators_desc: "O $TITLE$ gerencia a exibição e venda de espécimes."
 civic_beastmasters: "Mestres das Feras"
 civic_beastmasters_desc: "Tendo atingindo a maturidade tecnológica completa em um sistema que serve como zona de alimentação para Amebas Espaciais, esta sociedade adquiriu um profundo conhecimento do ciclo de vida desses animais. Eles agora trabalham para nutrir, criar e, enfim, clonar essas criaturas para benefício próprio."
 civic_machine_beastmasters: "Biodrones"
 civic_machine_beastmasters_desc: "Tendo interagido diretamente com organismos biológicos do vazio em seu sistema natal, esta Inteligência Maquinária integrou essas poderosas criaturas ao seu funcionamento básico, resultando numa relação de benefício mútuo."
 civic_hive_beastmasters: "Enxame Selvagem"
 civic_hive_beastmasters_desc: "Uma colônia altamente adaptativa, esta Mente-Colmeia se desenvolveu em uma relação simbiótica com os organismos biológicos do vazio em seu sistema natal. Como mentes separadas, eles trabalham juntos para alcançar seus objetivos em comum."
 civic_wilderness_beastmasters: "$civic_hive_beastmasters$"
 civic_wilderness_beastmasters_desc: "Esta Silvestria abriu-se à simbiose com a Fauna Espacial de seu sistema natal. Embora não esteja totalmente integrada à Inteligência Mutualística, esses organismos trabalham juntos para alcançar objetivos comuns."
 civic_corporate_beastmasters: "Rancheiros Espaciais"
 civic_corporate_beastmasters_desc: "Originalmente uma guilda de rancheiros de elite, esta Megacorporação desenvolveu a tecnologia para criar e cuidar de criaturas do vazio em seu sistema natal."
 civic_beastmasters_common_effects_1: "$t$- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$$t$- ['technology:tech_gravity_wells', £physics£ $tech_gravity_wells$]$TABBED_NEW_LINE$$t$- ['technology:tech_alien_cloning', £society£ $tech_alien_cloning$]$TABBED_NEW_LINE$- $AVAILABLE_STARBASE_BUILDINGS$ ['concept_beastport', Portos de Feras]$TABBED_NEW_LINE$- $HOME_SYSTEM$ Começa com um ['concept_beastport']"
 civic_beastmasters_ships: "$t$- §YNaves Militares§! iniciais são substituídas por §YAmebas Espaciais§!"
 civic_beastmasters_common_effects_2: "$t$- £genetic_material£ ['concept_dna'] inicial:$TABBED_NEW_LINE$$t$- Ameba Espacial §0Comum§!"
