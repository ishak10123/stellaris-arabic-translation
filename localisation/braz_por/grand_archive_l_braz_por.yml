 leader_trait_buccaneer: "Bucaneiro"
 leader_trait_buccaneer_desc: "Um mestre na pilhagem do campo de batalha, este líder é capaz de extrair até a última peça de valor até mesmo dos destroços mais danificados."
 leader_trait_trailblazer: "Desbravador"
 leader_trait_trailblazer_desc: "Fascinado pelos prospectos gratificantes da fronteira galáctica, este líder busca mapear os confins mais longínquos do espaço."
 leader_trait_treasure_hoarder: "Acumulador de Tesouro"
 leader_trait_treasure_hoarder_desc: "Nenhuma recompensa é grande o bastante para satisfazer a ambição deste líder. O acúmulo de recursos valiosos é sua maior motivação."
 mod_enemy_ship_destroyed_energy_add: "$r_energy$ por tamanho da nave inimiga destruída"
