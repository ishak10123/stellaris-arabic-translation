 grand_archive.4580.name: "Projeto de Repovoamento do Viveiro"
 grand_archive.4580.desc: "Agora que um novo $grand_archive$ foi estabelecido em [from.GetName], temos a oportunidade de restaurar muito do que nosso Viveiro perdeu.\n\nO material genético de todas as espécies de Fauna Espacial que criamos anteriormente foi preservado. Com recursos suficientes, poderemos clonar novos filhotes."
 grand_archive.4580.a: "Não, precisamos desses recursos."
 grand_archive.4580.b: "Clone a nova Fauna Espacial."
