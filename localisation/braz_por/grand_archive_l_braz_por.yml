 councilor_beastmasters: "Senhor das Feras"
 councilor_beastmasters_desc: "O $TITLE$ é um cargo altamente especializado e prestigiado que se concentra primariamente em gerenciamento e desenvolvimento estratégico de Naves de Fauna Espacial."
 councilor_corporate_beastmasters: "Rancheiro Chefe"
 councilor_corporate_beastmasters_desc: "O $TITLE$ garante a saúde e a reposição contínua de Naves de Fauna Espacial. Este cargo dinâmico requer uma combinação única de especialidades em logísticas, ecologia e criação de animais."
