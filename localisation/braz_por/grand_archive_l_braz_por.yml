 NAME_Treasure_Trove_Pirate_Ship: "Bandidos de [event_target:pirate_system.GetName]"
 NAME_Treasure_Trove_Pirate_Ship_Design: "Flibusteira"
 grand_archive.6025.name: "Emboscada Pirata"
 grand_archive.6025.desc: "Enquanto procurávamos a §Y$TREASURE_TROVE$§! em [from.GetName], [fromfromfrom.Leader.GetName] caiu na emboscada de uma frota pirata!\n\nDe alguma forma, esses bandoleiros acompanharam o nosso progresso e pretendem tomar o tesouro para si. Se quisermos recuperar o butim, teremos que derrotar a frota antes que roubem os itens valiosos."
 grand_archive.6025.a: "Preparar para o combate."
 TREASURE_TROVE_PIRATES: "Derrote os $NAME_Treasure_Trove_Pirate_Ship$"
 TREASURE_TROVE_PIRATES_DESC: "Uma frota pirata quer saquear a §Y$TREASURE_TROVE$§! em [this.GetName]!"
 TREASURE_TROVE_EVENT_TOOLTIP: "§RTemos que derrotar esses oportunistas antes que roubem os recursos valiosos.§!"
 grand_archive.6031.name: "Piratas Derrotados"
 grand_archive.6031.desc: "Agora que acabamos com os piratas oportunistas, podemos reivindicar a Arca do Tesouro em [event_target:treasure_trove_planet.GetName]."
 grand_archive.6031.a: "Uma recompensa merecida."
 grand_archive.6035.name: "Arca do Tesouro Perdida"
 grand_archive.6035.desc: "Os piratas oportunistas saquearam a §Y$TREASURE_TROVE$§! em [event_target:treasure_trove_planet.GetName].\n\nNão sobrou nada de valor."
 grand_archive.6035.a: "É a vida."
