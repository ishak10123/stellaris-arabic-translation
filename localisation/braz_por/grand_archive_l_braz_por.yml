 #Events
 grand_archive.8000.name: "Cápsula Antiga"
 grand_archive.8000.desc: "Fizemos uma descoberta a respeito da Cápsula Antiga encontrada na órbita de [this.GetHomeWorldName]. Graças aos esforços incansáveis de nossa equipe de [this.GetScientistPlural], agora podemos decodificar a última camada da segurança digital e decifrar o mapa que nos intrigou por tanto tempo."
 grand_archive.8000.a: "O que ele contém?"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT: "Análise da Cápsula Antiga"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT_DESC: "Nossa análise inicial do mapa dentro da cápsula orbital revelou a localização de vários corpos celestes fora de nosso sistema natal. Precisaremos de tempo para extrair as coordenadas exatas."
 grand_archive.8005.name: "Cápsula Antiga Analisada"
 grand_archive.8005.desc: "O mapa está apenas parcialmente completo!\n\nOs dados dentro da cápsula orbital estão fragmentados, e cada lacuna óbvia é como a peça ausente de um quebra-cabeça. Mesmo assim, ele revelou as coordenadas de um sistema estelar desconhecido, mas não dá detalhes do que encontraremos lá.\n\nO mapa também destaca uma série de pontos de fendas estabelecidos para facilitar a viagem via hiperestradas até o destino."
 grand_archive.8005.a.lom: "Todos para o convés!"
 grand_archive.8015.name: "O Mapa Celestial"
 grand_archive.8015.desc.common: "Nossas naves aguardam ansiosamente para embarcar na maior aventura de nossa civilização."
 grand_archive.8015.desc.default: "A população de [this.GetHomeWorldName] está fascinada pela carta estelar recentemente decifrada. Comumente chamado de \"§Y$celestial_chart$§!\", até agora ele tem elicitado mais perguntas que respostas. Qual a sua origem? Quem o criou, e por que razão? E ainda mais importante: ele vai nos levar até uma armadilha?\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.desc.gestalt: "A descoberta do mapa dentro da cápsula cativou a atenção de nossa sociedade. Agora que ele se revelou uma parte entre muitas, indagamos aonde ele vai nos levar e o que nos espera lá. Estamos determinados a completar esse \"§Y$celestial_chart$§!\".\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.a.default: "Avante rumo à aventura!"
 grand_archive.8015.a.lom: "Içar travas de ancoragem!"
 grand_archive.8020.name: "Um Encontro Inesperado"
 grand_archive.8020.desc: "Encontramos uma frota fortemente armada ostentando uma bandeira desconhecida. Suas naves estão organizadas em uma formação, mas não têm modelos uniformes. Muitas estão equipadas com lançadores cinéticos afixados a rolos de grossos cabos terminados em ganchos de aço de carbono e arpões. Além disso, um grupo de cargueiros blindados toma o centro da frota. Só podemos presumir que essas naves são controladas por um bando de piratas ou mercenários.\n\nEstamos recebendo uma transmissão da nave principal."
 grand_archive.8020.a.lom: "Parola!"
 grand_archive.8025.name: "$NAME_CaptainHoo$ da $NAME_BlackNeedle$"
 grand_archive.8025.desc: "§HDistinto e altivo, este capitão proscrito finge desinteresse. Ele olha sob o próprio bico enquanto fala e se recusa a fazer contato visual, como se fôssemos indignos de sua atenção plena. Ele gesticula com suas penas de maneira involuntariamente cômica.§!\n\nVocês cruzaram o caminho da §Y$NAME_BlackNeedle$§!, um erro de sua parte!\n\nOuvimos rumores de que sua pequena sociedade incipiente viria explorar este sistema. Vocês se depararam com um mapa que claramente nos pertence. Entreguem-no, antes que as coisas fiquem violentas."
 grand_archive.8025.a: "Quem é você?"
 grand_archive.8025.a.reply: "Sou Hoo! Meu nome é Glimarhoo Zelmendrion, mas podem me chamar de §Y$NAME_CaptainHoo$§!, Capitão da Asa de Prata e Segundo Imediato Tenente dos piratas da ilustre §Y$NAME_BlackNeedle$§!. Tomamos parte em todo o tipo de negócio ilícito por milhares de anos, e eu sou apenas um fio na majestosa tapeçaria do nosso legado.\n\nVocê faria bem em se lembrar do meu nome, pois espero uma recompensa generosa após entregar esse mapa à nossa inigualável liderança."
 grand_archive.8025.b: "O que você sabe sobre o mapa?"
 grand_archive.8025.b.reply: "Um informante talentoso e muito caro nos alertou de que vocês haviam encontrado uma cápsula peculiar... Uma cápsula que supostamente contém direções para um sistema oculto de grande interesse para nós.\n\nTambém temos uma parte do mapa, mas ela é inútil sem os dados da sua cápsula. Não consigo imaginar porque a §Y$NAME_CaptainNess$§! lhes daria a chave do seu legado, mas cabe a nós tomá-la de vocês."
 grand_archive.8025.c: "Por que você deseja tanto esse mapa?"
 grand_archive.8025.c.reply: "Ah, quanta ingenuidade. [this.GetCaptainHooSnarkyInsult] Acho que vou ter que falar mais claramente.\n\nUma mapa funciona como um tipo de guia de navegação até um destino específico. Nossa intenção é visitar esse destino e reivindicar o tesouro perdido da §Y$NAME_CaptainNess$§!."
 grand_archive.8025.d: "Quem é a $NAME_CaptainNess$?"
 grand_archive.8025.d.reply: "Achávamos que vocês seriam mais bem-informados. Foi ela quem criou esse mapa. Talvez ela tenha se identificado com a ignorância da sua espécie, aquela bárbara insensata.\n\nNo mais, isso não lhes diz respeito. Passem as informações para cá e nós assumiremos daqui."
 grand_archive.8025.e: "Vamos ficar com o seu mapa."
 grand_archive.8025.e.reply: "Foi o que pensei. Preparem-se para encontrar o seu fim.\n\nAtacar!"
 grand_archive.8025.f.lom: "Venha pegar, patife!"
 CAPTAIN_HOO_INSULT_MACHINE: "Pensei que uma Inteligência Maquinária seria inteligente, mas parece que me enganei."
 CAPTAIN_HOO_INSULT_HIVE: "Muitas mentes deveriam pensar melhor do que uma, mas a inteligência do seu coletivo é ínfima."
 CAPTAIN_HOO_INSULT_HUM: "Vocês, sacos de ossos pesados e peles lisas, descobriram a viagem interestelar, mas são incapazes de enxergar o senso comum."
 CAPTAIN_HOO_INSULT_MAM: "Bestas como vocês não foram agraciadas com o intelecto e requinte da nossa grande liderança."
 CAPTAIN_HOO_INSULT_REP: "Embora eu não esperasse que simplórios como vocês compreendessem um conceito tão básico."
 CAPTAIN_HOO_INSULT_AVI: "Talvez seus ancestrais tenham levado bicadas demais na cabeça."
 CAPTAIN_HOO_INSULT_ART: "Não me admira que a capacidade de pensamento crítico seja incapaz de penetrar o exoesqueleto da sua espécie."
 CAPTAIN_HOO_INSULT_MOL: "É fato que os moluscoides não têm um cérebro identificável. Sua espécie é prova disso."
 CAPTAIN_HOO_INSULT_FUN: "Parece que você tem alguns esporos soltos."
 CAPTAIN_HOO_INSULT_PLANT: "Está cada vez mais óbvio o motivo das plantas não terem desenvolvido inteligência na maioria dos mundos."
 CAPTAIN_HOO_INSULT_LITHOID: "Sua espécie é mesmo tão estúpida quanto uma pedra."
 CAPTAIN_HOO_INSULT_NECROID: "Vocês devem ser apenas a carcaça de uma espécie outrora inteligente."
 CAPTAIN_HOO_INSULT_AQUATIC: "Você é claramente um peixe fora d'água aqui."
 CAPTAIN_HOO_INSULT_TOX: "Talvez uma existência em meio ao lixo tenha ofuscado suas mentes."
 CAPTAIN_HOO_INSULT_ROBOT: "Talvez os seus módulos de individualidade tomem a maior parte do seu poder de processamento."
 CAPTAIN_HOO_INSULT_DEFAULT: "Talvez a sua espécie seja tão intelectualmente limitada quanto é terrivelmente desfigurada."
 grand_archive.8045.name: "$grand_archive.8025.name$"
 grand_archive.8045.desc: "Você zombou de mim e da §Y$NAME_BlackNeedle$§!. Isso não ficará assim!\n\nSua resistência em cooperar não será esquecida. A $NAME_BlackNeedle$ atacará você com toda a força. Sua civilização infantil não sobreviverá à nossa ira.\n\nNada nos impedirá de tomar esse mapa! E com isso, eu lhes desejo um bom dia!"
 grand_archive.8045.a.lom: "Da próxima vez, fale menos e lute mais!"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT: "Um Planeta em Oito Partes"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT_DESC: "O §H$celestial_chart$§! nos levou até um mundo despedaçado. Detectamos um túnel artificial escavado na maior das placas da crosta planetária. Acreditamos que a próxima parte de nosso mapa esteja escondida no interior, mas teremos que cavar cuidadosamente para alcançá-la.\n\numa nave de construção poderia criar o equipamento necessário para extrair a parte."
 grand_archive.8055.name: "Escavação Bem-Sucedida"
 grand_archive.8055.desc: "Conseguimos extrair a cápsula dos destroços planetários que flutuavam, juntamente com alguns minerais. Ao abri-la, descobrimos uma nova parte do §Y$celestial_chart$§! e uma seleção de artefatos culturais singulares. Além disso, havia um bilhete escrito em diversos idiomas para facilitar a tradução.\n\n\"Isto é tudo o que resta de $NAME_Soropegma$, o mundo natal ytterita. Os ytteritas foram uma espécie pré-MRQL extinta por um trágico acidente. Ignorantes das consequências, nós acidentalmente acionamos o poder destrutivo de um Colosso roubado. Por favor, preserve e respeite nossa memória.\""
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT: "Decifre a Parte do Mapa"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT_DESC: "Após escavar a cápsula dos resquícios do planeta despedaçado, temos que decifrar seus dados de navegação. Esse processo exigirá o cruzamento de referências cartográficas em nossa base de dados e o mapeamento de corpos celestes contra sistemas conhecidos."
 grand_archive.8060.name: "Mapa Decifrado"
 grand_archive.8060.desc: "Após termos decodificado diversas camadas de criptografia, as novas informações foram perfeitamente adicionados ao §Y$celestial_chart$§!. Quando as partes se combinaram, um novo sistema foi revelado. Estamos diante do próximo passo em nossa jornada. Devemos entrar nessa área desconhecida do espaço com cautela."
 grand_archive.8075.name: "Um Grande Arquivo"
 grand_archive.8075.desc: "Após a aquisição do espécime de §Y[This.GetLastAcquiredSpecimenName]§!, nossos cientistas concordam que o espécime merece ser colocado em exibição pública dentro de um §Y$grand_archive$§!. Essa estrutura abrigará nossa crescente coleção de artigos raros, que em troca resultará em ganhos culturais e científicos significativos. Um investimento inicial impulsionaria a pesquisa acerca das técnicas e tecnologias necessárias para preservar e exibir os espécimes diversos e delicados da galáxia.\n\nAlém disso, um diagrama encontrado ao lado do artefato ytterita continha um projeto avançado para um mostruário com uma tecnologia de monitoramento atmosférico inovadora. Desenvolver essa ideia aprimoraria as capacidades de preservação do arquivo como um todo."
 grand_archive.8076.name: "O Espécime Ytterita"
 grand_archive.8076.desc: "O último resquício da civilização ytterita merece uma exibição exclusiva.\n\nFelizmente, um diagrama encontrado ao lado do artefato ytterita contém um projeto avançado para um mostruário com uma tecnologia de monitoramento atmosférico inovadora. Desenvolver essa ideia aprimoraria as capacidades de preservação do arquivo como um todo."
 grand_archive.8076.a: "Uma bela oportunidade."
 TREASURE_HUNTERS_EXHIBITION_PROJECT: "Diagrama de Aprimoramento de Exibição"
 TREASURE_HUNTERS_EXHIBITION_PROJECT_DESC: "Junto com o espécime ytterita, descobrimos um projeto avançado para um complexo de mostruários que ajudaria em sua preservação.\n\nA pesquisa das técnicas usadas nesse diagrama certamente auxiliará nossos esforços de conservação e exibição."
 TREASURE_HUNTERS_EXHIBITION_PROJECT_TOOLTIP: "Use uma §YNave de Construção§! para construir um §YGrande Arquivo§! na órbita de um planeta com 2.5 mil ou mais £pop£ §HPops§!.\nRequer: §H£society_research£$tech_galactic_archivism$§!."
 grand_archive.8080.name: "Aprimoramento de Exibição"
 grand_archive.8080.desc: "Após uma análise minuciosa do diagrama ytterita, construímos uma unidade de contenção avançada com um monitoramento atmosférico preciso em nível atômico. Isso permitirá que os curadores monitorem as condições atmosféricas do delicado espécime ytterita em detalhes e detectem qualquer sinal de alerta para o seu potencial desgaste. Ele permanecerá exatamente como era, para sempre.\n\nPodemos aplicar essas técnicas para aprimorar as condições de armazenamento de todos os itens em nossa coleção."
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE: "Construa o Grande Arquivo"
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE_DESC: "Durante nossa exploração do cosmo, coletamos incontáveis artefatos únicos e peculiaridades culturais. Esses espécimes inspirarão a população e farão de nossa exibição a primeira a expor e conservar todos os campos do conhecimento galáctico.\n\nConstruir um §H$grand_archive$§! atenderia esse objetivo."
 grand_archive.8090.name: "Inauguração do Grande Arquivo"
 grand_archive.8090.desc: "A inauguração do §Y$grand_archive$§! em [fromfrom.GetName] é um grande dia para o povo de [this.GetName]. Essa exibição de tesouros oriundos de toda a galáxia inspira a exploração e nos convida a aprender com o passado."
 d_black_needle_base: "Base da Agulha Negra Oculta"
 d_black_needle_base_desc: "Uma base secreta usada pelos piratas da Agulha Negra para conduzir diversas operações ilegais e esconder bens roubados."
 d_abandoned_black_needle_base: "Base da Agulha Negra Abandonada"
 d_abandoned_black_needle_base_desc: "Esta base já foi usada pelos piratas da Agulha Negra como um entreposto e refúgio para criminosos procurados e bens roubados."
 d_abandoned_black_needle_base_naval_cap: "Capacidade Naval dos Empregos de Soldado: §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 d_abandoned_black_needle_base_naval_cap_short: "£mod_country_naval_cap_add£ de Empregos de £job_soldier£: §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 black_needle_base_system_poi: "Siga o Mapa Celestial"
 black_needle_base_system_poi_desc: "O §H$celestial_chart$§! revelou um sistema oculto, [Prev.GetName]. Temos que viajar até lá e descobrir o que nos aguarda."
 grand_archive.8100.name: "Esconderijo Pirata Descoberto"
 grand_archive.8100.desc: "Encontramos uma base subterrânea secreta em [From.GetName] com o emblema da §YAgulha Negra§!. Acreditamos que essa é uma base externa usada pelo grupo pirata, isolada das outras operações. A próxima parte do §Y$celestial_chart$§! deve estar armazenada aqui, provavelmente ao lado de outros objetos de valor e quinquilharias.\n\nPodemos facilmente iniciar o bombardeio orbital da base, mas isso poderia dar à Agulha Negra tempo suficiente para chamar reforços. Por outro lado, uma rápida mobilização de forças terrestres tomaria a base mais depressa, dando ao inimigo pouco tempo de resposta.\n\nUma abordagem mais furtiva seria invadir os sistemas do computador da base e roubar o $celestial_chart$ em um golpe ousado."
 grand_archive.8100.a: "Temos muito a ponderar."
 COLONIZATION_IMPOSSIBLE_DEFENDED_PLANET: "$TRIGGER_FAIL$§REste planeta é fortemente protegido e não pode ser colonizado.§!"
 BLACK_NEEDLE_BASE_BOMBARD: "Bombardeie a Base da Agulha Negra"
 BLACK_NEEDLE_BASE_BOMBARD_DESC: "A base subterrânea em [This.GetName] é muito resistente a um bombardeio orbital, mas com tempo e poder de fogo suficientes, é possível destruí-la apenas com a nossa frota. Uma vez que a base tenha sido neutralizada, nós podemos vasculhar as ruínas em busca da parte do §H$celestial_chart$§! e de outros itens valiosos.\n\nNossos conselheiros táticos alertam que essa abordagem pode dar à Agulha Negra tempo suficiente para que chamem reforços."
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED: "$BLACK_NEEDLE_BASE_BOMBARD$"
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED_DESC: "$BLACK_NEEDLE_BASE_BOMBARD_DESC$"
 grand_archive.8103.name: "Contra-ataque da Agulha Negra"
 grand_archive.8103.desc: "Como esperado, a Agulha Negra enviou uma frota para proteger sua base em [FromFrom.GetName].\n\nTeremos que eliminar essas naves antes de tomar [FromFrom.System.GetName]."
 grand_archive.8105.name: "Em Meio às Ruínas e Cinzas"
 grand_archive.8105.desc: "Após o bombardeio da base pirata com armamentos orbitais, finalmente a reduzimos a ruínas, juntamente com seus habitantes. Com a ameaça neutralizada, agora podemos enviar cientistas para explorar a base arruinada e extrair a próxima parte do §Y$celestial_chart$§!."
 grand_archive.8105.a.custom_tooltip: "A base da Agulha Negra foi destruída. Podemos explorar livremente §Y[FromFrom.GetName]§!."
 grand_archive.8105.a.lom: "Esse butim é nosso!"
 project_type_research: "$RESEARCH$"
 project_type_bombardment: "Bombardear"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES: "Ataque à Base da Agulha Negra"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES_DESC: "A base subterrânea em [FromFrom.GetName] está fortemente protegida por tropas e drones de segurança. Mobilizar exércitos na superfície do planeta nos permitirá tomar a base rapidamente, dando poucas chances para a §YAgulha Negra§! reagir.\n\nApós a captura da base, poderemos extrair a cápsula do mapa e quaisquer outros objetos de valor roubados que os piratas acumularam."
 grand_archive.8110.name: "Defesas Expugnadas"
 grand_archive.8110.desc: "Nossas forças em terra capturaram a base da §YAgulha Negra§! e estão neste momento protegendo a construção e seus recursos. Com todas as ameaças neutralizadas, podemos enviar um cientista para extrair a próxima parte do §Y$celestial_chart$§!."
 grand_archive.8110.a.custom_tooltip: "As forças em terra da Agulha Negra foram neutralizadas. Podemos explorar livremente §Y[FromFromFrom.GetName]§!."
 grand_archive.8110.a.lom: "Hora de dividir os espólios."
 BLACK_NEEDLE_BASE_HACK: "Invadindo o Sistema dos Piratas"
 BLACK_NEEDLE_BASE_HACK_DESC: "A dependência exagerada dos piratas em equipamentos roubados ou readaptados os deixou vulneráveis a uma invasão. Uma única nave de pesquisa foi capaz de invadir a rede em [FromFrom.GetName] a partir da órbita, fazendo-se passar por um transporte da §YAgulha Negra§! sob ordens do Capitão Hoo. Isso deve bastar para convencê-los a nos entregar a cápsula do mapa sem derramamento de sangue."
 grand_archive.8115.name: "Manobra Bem-Sucedida"
 grand_archive.8115.desc.1: "Após meses de preparação, [Leader.GetName], da equipe científica, conseguiu se infiltrar na rede de comunicações e fingiu ser tripulante de uma nave da §YAgulha Negra§!. Sob supostas ordens do Capitão Hoo, [Leader.GetHeShe] ludibriou os operadores da base para que preparassem a cápsula para uma transferência de emergência."
 grand_archive.8115.desc.slippery: "[Leader.GetName], da equipe científica, aterrissou sua nave em uma posição ideal para uma fuga rápida, caso seu disfarce seja revelado."
 grand_archive.8115.desc.charismatic: "Usando todo o seu charme e carisma, [Leader.GetName], da equipe científica, conseguiu contornar as perguntas difíceis."
 grand_archive.8115.desc.psionic_organic: "Com um simples gesto de [Leader.Species.GetHandNamePlural], [Leader.GetName], da equipe científica, manipulou as mentes dos guardas para evitar suspeitas."
 grand_archive.8115.desc.psionic_machine: "Por meio da coerção psiônica, [Leader.GetName] foi capaz de manipular facilmente as mentes inferiores dos guardas para evitar maiores suspeitas."
 grand_archive.8115.desc.2: "A cápsula foi recuperada sem baixas. Os piratas ainda não sabem que foram enganados."
 grand_archive.8115.a: "$EXCELLENT$"
 grand_archive.8120.name: "Pegos em Flagrante"
 grand_archive.8120.desc: "Infelizmente, um dos guardas desconfiou de nossos planos enquanto carregávamos a cápsula para a nave. A descoberta resultou em uma breve troca de tiros, e fomos forçados a fugir do local com a preciosa carga a reboque. A cápsula foi extraída com sucesso, mas [Leader.GetName], da equipe científica, perdeu a vida no tiroteio."
 grand_archive.8120.a: "$TERRIBLE$"
 grand_archive.8125.name: "Base Pirata Abandonada"
 grand_archive.8125.common: "Expostos e vulneráveis, os piratas decidiram abandonar a base em [FromFromFromFrom.GetName], realizando uma evacuação de emergência e levando consigo os demais objetos de valor que estavam armazenados lá. A lua habitável foi desocupada e agora pode ser colonizada."
 grand_archive.8125.desc.alive: "Os piratas da §YAgulha Negra§! finalmente perceberam que foram ludibriados ao descobrir as lacunas em sua rede de segurança fechada.\n\n$grand_archive.8125.common$"
 grand_archive.8125.desc.dead: "Logo após a nossa fuga apressada da fortaleza da §YAgulha Negra§!, a totalidade de nossos esforços de infiltração foi descoberta.\n\n$grand_archive.8125.common$"
 grand_archive.8125.a: "Uma decisão lógica."
 grand_archive.8125.a.custom_tooltip: "Os exércitos em §Y[FromFromFromFrom.GetName]§! deixaram o planeta. Agora podemos colonizá-lo."
 grand_archive.8130.name: "Saqueando a Base da Agulha Negra"
 grand_archive.8130.desc.common: "O cofre continha uma grande variedade de objetos preciosos, bem como bugigangas de valor sentimental vinculados à história da organização pirata. Encontramos a cápsula do mapa entre obras de arte roubadas, joias personalizadas e carteiras digitais criptografadas.\n\nSuspeitamos que teríamos problemas em vender muitos dos bens descobertos aqui. As obras de arte são conhecidas, as joias precisariam ser derretidas e transações usando carteiras digitais são normalmente rastreáveis. Alguns dos antigos proprietários desses artigos podem já ter morrido, mas outros ainda estarão procurando suas posses roubadas."
 grand_archive.8130.desc.bombarded: "Ao navegar pelas ruínas da base da §YAgulha Negra§!, encontramos um cofre subterrâneo. Ao abri-lo, nos deparamos com uma pequena coleção de tesouros roubados.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.desc.landed: "Ao explorar a base destruída da §YAgulha Negra§!, encontramos uma planta da instalação que revelou a existência de um cofre subterrâneo. Após descer muito abaixo da superfície em um elevador de serviço, inserimos o código de acesso e nos deparamos com uma pequena coleção de tesouros roubados.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.a: "Tente repatriar os itens roubados."
 grand_archive.8130.b: "Venda tudo."
 grand_archive.8130.c.default: "Fique com os itens roubados."
 grand_archive.8130.c.lom: "Achado não é roubado."
 black_needle_base_sold_stolen_items: "Vendeu os Itens Roubados da Base da Agulha Negra"
 opinion_black_needle_base_repatriate_stolen_items: "Itens Roubados Repatriados"
 opinion_black_needle_base_repatriate_stolen_items_tt: "§G+$@opinion_black_needle_base_repatriate_stolen_items_value|0$§! de £opinion£ Opinião com todos os impérios não homicidas com os quais não estamos em guerra."
 DECODE_THIRD_MAP_PIECE: "Decodifique a Parte do Mapa"
 DECODE_THIRD_MAP_PIECE_DESC: "Com a cápsula recuperada da base da §YAgulha Negra§!, só nos resta decifrar seus dados e integrar as novas informações ao §H$celestial_chart$§!."
 grand_archive.8135.name: "Mapa Decodificado"
 grand_archive.8135.desc: "Conseguimos passar pelas camadas de criptografia digital e integramos as novas informações ao §Y$celestial_chart$§!. Isso revelou mais um destino a ser explorado, e agora o mapa está quase completo. Acreditamos que só resta uma peça do quebra-cabeça, e estamos um pouco otimistas de que o fim de nossa busca está próximo.\n\nEnquanto os dados de navegação estavam sendo decodificados, também analisamos o exterior imaculado da cápsula. A força e durabilidade do recipiente é surpreendente; a capacidade de replicar esse material forneceria muitas oportunidades de pesquisa no futuro."
 grand_archive.8135.a: "$GOOD$"
 d_hive_dwelling: "Habitação de Mente-Colmeia"
 d_hive_dwelling_desc: "Um assentamento isolado ocupado pelo coletivo Smeegibb, antigos colegas de tripulação da Capitã Ness."
 d_ruined_hive_dwelling: "Habitação de Mente-Colmeia Arruinada"
 d_ruined_hive_dwelling_desc: "O assentamento arruinado do coletivo Smeegibb, antigos colegas de tripulação da Capitã Ness."
 COLONIZATION_IMPOSSIBLE_SMEEGIBB_PLANET: "§REste planeta pertence ao $NAME_Smeegibb$.§!"
 grand_archive.8200.name: "Assentamento Oculto"
 grand_archive.8200.desc.common_1: "Encontramos um pequeno assentamento em [FROM.GetName] com uma população de menos de mil moluscoides sencientes. Uma análise preliminar da espécie revelou uma capacidade para a comunicação por junção subespacial, indicando a existência de uma mente-colmeia. Além desse acampamento isolado, o planeta não é habitado por qualquer outra forma de vida senciente."
 grand_archive.8200.desc.common_2: "Ainda não sabemos por que o §Y$celestial_chart$§! nos trouxe até aqui, fato que pede uma investigação mais aprofundada."
 grand_archive.8200.desc: "$grand_archive.8200.desc.common_1$\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8200.desc.alt: "$grand_archive.8200.desc.common_1$\n\nTalvez essa espécie tenha mais informações sobre essa \"§Y$NAME_CaptainNess$§!\" de que ouvimos falar.\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8205.desc.common_1: "§HUm nódulo da mente-colmeia encontrada no sistema oculto de [FROM.GetName], $NAME_Smeegibb$ parece inquieto. Ele tem uma tendência a baixar o olhar quando questionado, como se estivesse acostumado à subserviência.§!"
 grand_archive.8205.desc.common_2: "Nosso nome é $NAME_Smeegibb$. Queremos saber como vocês nos encontraram. Este sistema esteve escondido do restante da galáxia por milhares de anos.\n\nApenas a §YCapitã§! conhece este lugar. O que vocês procuram?"
 grand_archive.8205.desc.default: "$grand_archive.8205.desc.common_1$\n\nSmarak! Faz muito, muito tempo desde que conversamos com mentes individuais.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.desc.gestalt: "$grand_archive.8205.desc.common_1$\n\nSmarak! Faz muito, muito tempo desde que conversamos com outra mente coletiva.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.a: "O que é este lugar?"
 grand_archive.8205.a.reply: "Smarak! Este planeta é o nosso alojamento. Vivemos em muita, muita segurança, longe da galáxia violenta. Antes, participávamos da violência. Mortes, crime, pirataria - fazíamos de tudo. Mas hoje isso acabou. Cuidamos dos nossos hidropônicos.\n\nAntes, éramos refugiados. Ninguém nos queria, até que a §YCapitã§! apareceu. Ela nos salvou de uma sina terrível e nos aceitou em sua tripulação. A Capitã nos deu um novo nome e em troca nós cuidamos da nave.\n\nCuidamos da limpeza, da cozinha, dos armamentos, dos hidropônicos e da carga. Trabalhamos, e então participamos do grupo de abordagem. Proteger a Capitã enquanto ela rouba tesouros ou sequestra pessoas. Nunca trair a Capitã. Sempre leais."
 grand_archive.8205.b: "O que vocês sabem sobre o §Y$celestial_chart$§!?"
 grand_archive.8205.b.reply: "Smarak! Não sabemos de mapa nenhum, só ficamos no nosso alojamento. Se a §YCapitã§! fez um mapa que trouxe você aqui, então deve ter tido um bom motivo... Ela quer nos ajudar, ou nos machucar. Nunca temos certeza. A Capitã pode ser complicada.\n\nEla mandou uma mensagem uma vez. A Capitã nos enviou uma estátua gigante do seu drone favorito, o $NAME_Smeegibb$ que ela se lembra e salvou uma vez. É impressionante, mas não sabemos por que ela mandou. Talvez seja um pedido de desculpas, mas não tem bilhete."
 grand_archive.8205.c: "Conte mais sobre a §YCapitã§!."
 grand_archive.8205.c.reply: "Smarak! Antes, a §YCapitã§! nos salvou. Antes ela era nossa mentora e líder. Ela nos ensinou a cuidar da nave. Disse \"$NAME_Smeegibb$, trabalhe como intendente, mecânico e mão de obra - você tem muito valor.\"\n\nA Capitã vive segundo dois princípios: \"Riqueza significa independência\" e \"A vida existe pelo seu legado\". Juntos, caçamos os pobres e os ricos. Tomamos o que desejamos da galáxia violenta.\n\nMas então a Capitã ficou muito, muito gananciosa e descuidada. Ela sacrifica colegas de tripulação ou os trai em troca de recompensas. A Capitã perdeu todos, menos o $NAME_Smeegibb$. Sempre leais.\n\nEla mostrou como a galáxia é violenta. Agora preferimos manter distância."
 grand_archive.8205.d: "Por que nosso Mapa nos trouxe aqui?"
 grand_archive.8205.d.reply: "Smarak! Não sabemos por que a §YCapitã§! trouxe vocês aqui. Ela nunca conta nada.\n\nTemos uma ideia. Existe um lugar onde a §YCapitã§! e nós nos escondemos dos caçadores de recompensas. Um lugar seguro. Talvez você encontre alguma coisa lá."
 grand_archive.8210.name: "Refúgio Descoberto"
 grand_archive.8210.desc: "O ser que conhecemos em [from.GetName], $NAME_Smeegibb$, revelou as coordenadas de um antigo refúgio abandonado onde ele e a §Y$NAME_CaptainNess$§! se abrigavam. A investigação desse local pode nos levar até a próxima parte do §Y$celestial_chart$§!, ou pelo menos até uma pista que nos aponte a direção certa."
 grand_archive.8210.a: "Vamos começar a cavar."
 smeegibb_digsite_poi: "Explore o Refúgio"
 smeegibb_digsite_poi_desc: "Este sítio arqueológico pode conter a chave para a próxima parte do §H$celestial_chart$§!. Temos que investigar o refúgio abandonado para continuar nossa busca pela $TREASURE_TROVE$ da §H$NAME_CaptainNess$§!."
 NAME_Bemat_cruiser_inax_01: "Hebehr"
 #Treasure Hunters Origin - Smeegibb
 smeegibb_digsite: "Refúgio Abandonado"
 smeegibb_digsite_desc: "Na desolação frígida de [fromfrom.planet.GetName], detectamos um pequeno abrigo pré-fabricado equipado com dispositivos inativos de suporte à vida e alojamentos. Ele sofreu intenso desgaste e está parcialmente enterrado por muitos milênios de tempestades de gelo."
 grand_archive.8220.name: "Diário da Capitã"
 grand_archive.8220.desc: "A estrutura escavada revelou evidências de longos períodos de uso, e estava bem abastecida com confortos básicos. Bugigangas e curiosidades foram descobertas em toda a construção. Em meio a uma pilha desorganizada de documentos, encontramos um diário escrito pela própria §Y$NAME_CaptainNess$§!.\n\n§LAbordamos e confiscamos mais um transporte de tesouro perikano; desta vez, estavam prontos para nós. Sofremos mais baixas do que o esperado, mas já passamos por coisa pior. Boa grana, mas nada da Joia de Tapico. Infelizmente, agora os perikanos aumentaram novamente a recompensa pela nossa cabeça e a Federação entrou em cena. As coisas estão agitadas. É melhor eu desaparecer por um tempo.§!"
 grand_archive.8220.a: "Continue procurando."
 grand_archive.8225.name: "Matando o Tempo"
 grand_archive.8225.desc: "Após escavar sob a estrutura, encontramos um pequeno esconderijo de objetos de valor e sistemas de saneamento básico. Infelizmente, não conseguimos encontrar indícios da parte do §Y$celestial_chart$§! após uma varredura completa.\n\nColetamos mais cadernos e documentos na esperança de descobrir uma pista dentro das anotações espalhadas do diário da §Y$NAME_CaptainNess$§!.\n\n§LO tempo passa mais depressa com um companheiro como o $NAME_Smeegibb$, mas vale a pena dividir a glória? Claro, trabalhar com uma mente-colmeia é bastante vantajoso. Acessar centenas de drones em troca de uma única parcela dos lucros? Que barganha! Mas será que o trabalho dele ofusca minhas próprias conquistas...? Não sei se posso conviver com a ideia de dividir o meu legado. Tenho que pensar melhor sobre isso.§!"
 grand_archive.8225.a: "$grand_archive.8220.a$"
 grand_archive.8230.name: "Algo a Provar"
 grand_archive.8230.desc: "Encontramos a entrada final do diário da §Y$NAME_CaptainNess$§! escondida em um duto de ventilação.\n\n§LNão é assim que eu quero ser lembrada. $NAME_Smeegibb$ tem sido um companheiro fiel, mas que nunca digam que eu precisei dele. Posso enfrentar a galáxia sozinha. Deixarei a MINHA marca, e não dividirei a glória. Nem as riquezas.\n\nNota pessoal: é melhor enviar ao $NAME_Smeegibb$ algo para se lembrar de mim.§!\n\nIsso é tudo. Não há mais resquícios da Capitã ou qualquer outro sinal do §Y$celestial_chart$§!.\n\nTalvez o presente para $NAME_Smeegibb$ contenha alguma pista do paradeiro da última parte. Devemos reabrir a comunicação com ele."
 grand_archive.8230.a: "Sítio investigado."
 grand_archive.8236.name: "$NAME_Smeegibb$ Está Desaparecido"
 grand_archive.8236.desc.default: "$smeegibb_shelter_system_2_poi_desc$"
 grand_archive.8236.desc.xenophile: "$smeegibb_shelter_system_2_poi_desc$\n\nEsperamos que nosso novo amigo esteja bem."
 grand_archive.8236.a: "Para [smeegibb_system.GetName]."
 grand_archive.8241.name: "O Retorno da $NAME_BlackNeedle$"
 grand_archive.8241.desc: "Uma grande frota portando a bandeira da organização pirata conhecida como §Y$NAME_BlackNeedle$§! foi avistada na órbita de [smeegibb_shelter.GetName]. Acreditamos que esses piratas estavam no nosso encalço e destruíram a moradia do coletivo chamado $NAME_Smeegibb$. Eles ainda devem estar procurando pela próxima parte do §Y$celestial_chart$§!.\n\nNão há sinais de vida senciente no planeta.\n\nEstamos recebendo uma transmissão da nave principal."
 grand_archive.8245.name: "$NAME_CaptainInax$ da $NAME_BlackNeedle$"
 grand_archive.8245.desc.inax.1: "§HEsta artrópode tem uma postura altiva, seus olhos compostos brilham intensamente. Seu comportamento disciplinado contrasta com os movimentos frenéticos de suas mandíbulas, que estalam esporadicamente e estremecem de euforia.§!\n\nEnfim nos enc-contramos. C-como vocês, c-c-cascas molengas, c-conseguiram derrotar o §YC-c-capitão Hoo§!? Até mesmo aq-q-quele velho patife deveria ter eliminado rapidamente a sua frota patétic-ca. Vocês vão pagar por terem"
 grand_archive.8245.desc.inax.2: "Obrigada por nos trazerem aq-q-qui. §Y$NAME_SilverQuill$§! c-caçou aq-q-quele $NAME_Smeegibb$ desprezível por mais de cem cic-clos. Se eu puser um fim a uma das antigas rixas dele, vou ganhar uma bela rec-compensa... depois de ac-c-cabar com vocês."
 grand_archive.8245.desc.ransacked: "$grand_archive.8245.desc.inax.1$ saq-q-queado nossa base em [black_needle_base.GetName].\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.desc.stolen: "$grand_archive.8245.desc.inax.1$ roubado da §YAgulha Negra§!.\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.a: "Quem é você?"
 grand_archive.8245.a.reply: "Pode me chamar de Inax, C-c-contra-Almirante da §YAgulha Negra§!.\n\nAgora você já sabe q-q-quem vai te matar. Essa é uma morte honrosa. Ac-conselho aceitá-la.\n\nC-c-como de costume, vocês podem dar o primeiro tiro."
 grand_archive.8245.b: "Você matou o $NAME_Smeegibb$..."
 grand_archive.8245.b.reply.common: "Não foi nada difícil. Pintamos o muq-quifo dele com sangue azul de molusc-c-coide. Sem frotas, sem armas... Alguém daria c-cabo dele mais cedo ou mais tarde. Ninguém q-que é perfurado pela §YAgulha Negra§! sobrevive.\n\nEle era seu amigo. Q-q-que gracinha. Vocês logo se juntarão a ele. Em nome do §Y$NAME_SilverQuill$§!, tomaremos o mapa"
 grand_archive.8245.b.reply.default: "$grand_archive.8245.b.reply.common$ dos seus c-c-cadáveres c-contorcidos."
 grand_archive.8245.b.reply.robot: "$grand_archive.8245.b.reply.common$ quando as suas luzes pisc-c-carem pela última vez."
 grand_archive.8245.c: "Quem é o $NAME_SilverQuill$?"
 grand_archive.8245.c.reply: "Q-quem é o §Y$NAME_SilverQuill$§!? Q-q-que pergunta. Nosso lendário fundador era brilhante. A partir de uma únic-ca nave, ele tornou a §YAgulha Negra§! uma organização que c-c-cobre toda a galáxia.\n\nA Agulha Negra vive para c-continuar o legado dele. Sua morte será o próximo verso em nossa c-c-canção."
 grand_archive.8245.d: "O que você quer com o $celestial_chart$?"
 grand_archive.8245.d.reply: "Você não sabe o q-que tem em mãos? Esse é o mapa para o tesouro da §YC-c-capitã Ness§!! Cada c-c-crédito e joia roubada durante sua vida.\n\nA riq-queza dela nos pertence. Quando a tomarmos para nós, c-c-cantarão nossos nomes pela história. Todos os sistemas se ac-c-covardarão diante da §YAgulha Negra§!... e o primeiro verso do refrão será seu. Não somos generosos?"
 grand_archive.8245.e: "Não vamos desistir tão facilmente."
 grand_archive.8245.e.reply: "Então vamos c-c-cantar! Farei um troféu c-com o que restar de vocês e o darei de presente à nossa liderança."
 grand_archive.8265.name: "$grand_archive.8245.name$"
 grand_archive.8265.desc: "Uma batalha memorável! Vocês não são tão frac-c-cos quanto parecem. Subestimamos suas habilidades duas vezes, mas agora basta. Da próxima vez, a §YAgulha Negra§! não poupará forças.\n\nIsso não é um aviso. É uma sentença de morte."
 grand_archive.8265.a.scared: "Perturbador..."
 grand_archive.8265.a.homicidal: "Pode vir."
 grand_archive.8265.a.gestalt: "Comunicação encerrada."
 gateway_to_ness_treasure_system_poi: "O X Marca o Mapa"
 gateway_to_ness_treasure_system_poi_desc: "O §H$celestial_chart$§! está completo. Ele revelou um último sistema oculto, [Prev.GetName]. Nossa longa busca está quase no fim: vamos até lá para descobrir o que nos aguarda!"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT: "Cápsula Escondida"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT_DESC: "Com base em nossa investigação, acreditamos que a próxima parte do §H$celestial_chart$§! está escondida em algum lugar do assentamento arruinado em [this.GetName].\n\nA julgar pela fabricação resistente das últimas cápsulas, podemos presumir que ela tenha sobrevivido ao bombardeio."
 grand_archive.8270.name: "O Segredo da Estátua"
 grand_archive.8270.desc: "Nossa busca pela quarta parte do §Y$celestial_chart$§! em [from.GetName] foi concluída com sucesso. A cápsula estava incrustada em uma estátua de pedra que retratava um drone de um coletivo extinto conhecido como $NAME_Smeegibb$. A inscrição na estátua diz:\n\n§L\"Para meu leal tripulante: um símbolo do meu apreço. Que a sua solidão seja longa e pacífica.\"§!\n\nAssim que decodificarmos a parte final do mapa, poderemos continuar nossa busca pelo tesouro da §Y$NAME_CaptainNess$§!."
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT: "A Última Parte do Mapa"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT_DESC: "Após a extração da cápsula dentre as ruínas do assentamento de $NAME_Smeegibb$, só nos resta decifrar seus dados e completar o §H$celestial_chart$§!. Logo descobriremos o que nos aguarda no fim da trilha da §H$NAME_CaptainNess$§!."
 grand_archive.8280.name: "Mapa Completo"
 grand_archive.8280.desc: "Uma vez decodificados, os novos fragmentos de dados completaram nosso §Y$celestial_chart$§!. Focos de luz brilharam em vários vértices, indicando os destinos intermediários que encontramos pelo caminho. As quatro luzes então piscaram em consonância antes de revelarem mais um sistema oculto.\n\nA última parte dos dados liberou capacidades adicionais. O §YMapa§! não é um mero guia: ele contém informações sobre riquezas perdidas e tesouros ilícitos por toda a galáxia, coletados pela §Y$NAME_CaptainNess$§!. Alguns dos dados já podem ter expirado, mas esse dispositivo é capaz de detectar esconderijos de tesouros em todos os nossos sistemas.\n\nAlém disso, o §YMapa§! contém informações de valoração para cada tesouro descoberto ao longo da carreira da Capitã. Essas anotações detalhadas explicam como identificar, avaliar e apresentar objetos de valor adquiridos a possíveis compradores para obter lucro máximo. A reativação do dispositivo fornecerá esquemas para um Cofre do Tesouro único, permitindo que nossas colônias aproveitem o conhecimento ímpar da Capitã e agreguem valor às nossas riquezas."
 grand_archive.8280.a.lom: "Tesouro além da conta."
 grand_archive.8285.name: "O X Marca o Mapa"
 grand_archive.8285.desc: "A conclusão do §Y$celestial_chart$§! é uma ocasião importante para o povo de [this.GetName]. Com todos os seus segredos revelados, agora somos direcionados para um destino inescapável: o sistema [gateway_to_ness_treasure_system.GetName].\n\nApós superar tantos obstáculos, estamos a apenas um passo do desfecho. Uma única pergunta permanece: o que jaz no fim do §YMapa§!?\n\nNão há garantias de sucesso, mas não faríamos diferente. Vamos em frente, rumo à conclusão desta aventura!"
 grand_archive.8285.a.default: "Prossiga."
 grand_archive.8285.a.lom: "Avante!"
 councilor_head_treasure_hunter: "Caçador de Tesouros Chefe"
 councilor_head_treasure_hunter_female: "Caçadora de Tesouros Chefe"
 councilor_head_treasure_hunter_desc: "O $TITLE$ analisa cuidadosamente o §Y$celestial_chart$§! em busca de reservas ocultas e avalia os artefatos de valor."
 councilor_corporate_head_treasure_hunter: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_female: "Caçadora de Tesouros Chefe"
 councilor_corporate_head_treasure_hunter_desc: "$councilor_head_treasure_hunter_desc$"
 prospect_of_treasure_modifier: "Prospecção de Tesouro"
 prospect_of_treasure_modifier_tt: "Concede §G+$@prospect_of_treasure_treasure_trove_reward|0%$§! de $mod_treasure_trove_reward_mult$, §G+$@prospect_of_treasure_treasure_gatherers_produces|0%$§! de $mod_planet_treasure_gatherers_produces_mult$ e §G+$@prospect_of_treasure_energy_produces|0$§! de $mod_country_base_energy_produces_add$ para cada nível de $ruler$:\n\n"
 grand_archive.8290.name: "Gosto pelo Tesouro"
 grand_archive.8290.desc.chart: "Com o estabelecimento do Cofre do Tesouro em [from.GetName], acreditamos que o §Y$celestial_chart$§! tem o potencial de contribuir significativamente para a nossa economia."
 grand_archive.8290.desc.trove: "Enquanto distribuímos os recursos da $TREASURE_TROVE$ descoberta em [from.GetName], fica evidente que o §Y$celestial_chart$§! tem o potencial de contribuir significativamente para a nossa economia."
 grand_archive.8290.desc.default: "Para tirar melhor proveito das capacidades do §YMapa§!, concebemos uma nova posição no Conselho para um indivíduo liderar nossos esforços de descoberta e coleta de tesouros."
 grand_archive.8290.desc.gestalt: "Para tirar melhor proveito das capacidades do §YMapa§!, tomamos medidas para permitir uma maior alocação de recursos direcionados à descoberta e coleta de tesouros."
 grand_archive.8290.desc.chart.default: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.chart.gestalt: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.desc.trove.default: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.trove.gestalt: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.tt: "\n§ELibera a Posição no Conselho:§!\n§H$t$$councilor_head_treasure_hunter$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_treasure_trove_reward_mult$: §G+$@councilor_head_treasure_hunter_treasure_trove_reward|0%$§!\n$ttt$$mod_planet_treasure_gatherers_produces_mult$: §G+$@councilor_head_treasure_hunter_treasure_gatherers_produces|0%$§!\n$ttt$$mod_country_base_energy_produces_add$: §G+$@councilor_head_treasure_hunter_energy_produces|0$§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$scientist_with_icon$ $commander_with_icon$"
 grand_archive.8300.name: "Portal Infestado de Vermes"
 grand_archive.8300.desc.common: "Este deve ser o Portal que nos levará até o tão procurado tesouro."
 grand_archive.8300.desc.did_encounter_voidworms: "O mapa nos levou até um buraco negro desconhecido em um sistema infestado de $NAME_Voidworms$. Aninhados em um Portal desativado na cercania, os maiores espécimes circundam a estrutura abandonada de forma zelosa.\n\n$grand_archive.8300.desc.common$ Se quisermos chegar no fim da trilha, teremos que eliminar os $NAME_Voidworms$ e reparar o Portal."
 grand_archive.8300.desc.didnt_encounter_voidworms: "O mapa nos levou até um buraco negro desconhecido em um sistema infestado de criaturas estranhas. Aninhados em um Portal desativado na cercania, os maiores espécimes circundam a estrutura abandonada de forma zelosa.\n\nEssas entidades gigantescas semelhantes a vermes não estão em nossa base de dados sobre a Fauna Espacial. Estamos neste momento tentando estabelecer comunicações. $grand_archive.8300.desc.common$ Se quisermos chegar ao fim da trilha, teremos que lidar com essas criaturas e reparar o Portal."
 grand_archive.8300.a: "Nada ficará em nosso caminho."
 grand_archive.8300.a.pacifist: "Se não houver outro jeito."
 grand_archive.8300.a.lom: "Disparem uma salva de tiros!"
 GATEWAY_VOIDWORMS_KILL_PROJECT: "$grand_archive.8300.name$"
 GATEWAY_VOIDWORMS_KILL_PROJECT_DESC: "Seguimos o §H$celestial_chart$§! até um §HPortal§! infestado no sistema [this.solar_system.GetName]. Teremos que lidar com essas criaturas antes de reativar o Portal e ver o que nos espera do outro lado."
 GATEWAY_VOIDWORMS_KILL_PROJECT_TT: "§RDerrote as criaturas em [this.solar_system.GetName]§!"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT: "Restos de $NAME_Voidworms$"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT_DESC: "Os restos de Vermes do Vazio em [this.solar_system.GetName] estão exibindo leituras estranhas. Nossos scanners estão detectando sinais de vida em uma Troika em decomposição. Deveríamos enviar uma nave científica para investigar."
 grand_archive.8310.name: "Ninhada de Vermes do Vazio"
 grand_archive.8310.desc.did_encounter_voidworms: "Um grupo de ninfas foi encontrado aninhado em uma das carcaças de Vermes do Vazio. Apesar das perdas sofridas pela sua espécie, elas aproximaram-se de nossas naves e começaram a pairar ao lado de nossa frota em um gesto de súplica.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.didnt_encounter_voidworms: "Um grupo de filhotes foi encontrado aninhado em uma das carcaças tortuosas. Apesar das perdas sofridas pela sua espécie, elas aproximaram-se de nossas naves e começaram a pairar ao lado de nossa frota em um gesto de súplica.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.common: "Se desejarmos, poderemos usar seu vínculo instintivo a nosso favor: quanto atingirem a idade adulta, esse grupo de criaturas espaciais pode se tornar uma poderosa frota orgânica sob nosso controle."
 grand_archive.8310.a: "Uma descoberta extraordinária."
 grand_archive.8310.a.tt: "Ganharemos uma frota de §Y$@gateway_voidworm_nymph_reward_count|0$ $voidworms_small_plural$ do tipo §2$epic$§!§!."
 grand_archive.8310.b: "Presa fácil."
 grand_archive.8315.name: "Investigue a Tecnologia do Portal"
 grand_archive.8315.desc: "O Portal em [FromFromFrom.System.GetName] está inativo. Quando nos aproximamos da estrutura, o §Y$celestial_chart$§! forneceu uma série de informações sobre essa tecnologia perdida. O conhecimento acerca desse antigo método de transporte certamente se mostrará útil em outras situações."
 RESEARCH_GATEWAY_ACTIVATION_PROJECT: "$grand_archive.8315.name$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_DESC: "$grand_archive.8315.desc$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_TT: "Pesquise a Tecnologia £physics£§Y$tech_gateway_activation$§!"
 grand_archive.8325.name: "Ative o Portal"
 grand_archive.8325.desc.common: "Depois de restabelecermos a conexão entre os sistemas, o mapa chegará ao fim. Quaisquer segredos que ele contenha logo serão revelados."
 grand_archive.8325.desc.tech: "Depois de pesquisar a tecnologia apropriada, agora podemos reativar o antigo Portal em [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.known: "Com a situação das criaturas resolvida, tudo o que resta é reativar o antigo Portal em [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.unknown: "Com a situação dos $NAME_Voidworms$ resolvida, tudo o que resta é reativar o antigo Portal em [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 ACTIVATE_GATEWAY_PROJECT: "$grand_archive.8325.name$"
 ACTIVATE_GATEWAY_PROJECT_DESC: "O último destino do §H$celestial_chart$§!, o §HPortal§! inativo em [this.solar_system.GetName] deve levar a algo de grande importância."
 ACTIVATE_GATEWAY_PROJECT_TT: "§HAtive o Portal§!"
 grand_archive.8400.name: "Tesouro à Vista!"
 grand_archive.8400.desc: "Quando reativamos o Portal ao fim do §Y$celestial_chart$§!, o sistema [ness_treasure_system.GetName] foi revelado. A distribuição dos corpos celestes corresponde aos desenhos encontrados no diário da §Y$NAME_CaptainNess$§!.\n\nNossa longa jornada está quase no fim."
 grand_archive.8400.a: "Prossiga."
 ness_treasure_system_poi: "Viaje através do Portal em [from.solar_system.GetName]"
 ness_treasure_system_poi_desc: "Seguimos o §H$celestial_chart$§! até o fim, lutando contra piratas e criaturas monstruosas. O Portal agora está ativo; tudo o que resta é descobrir o que jaz do outro lado."
 #Megastructure
 gateway_ness_ruined: "$gateway_ruined$"
 gateway_ness_ruined_DESC: "$gateway_ruined_DESC$"
 gateway_ness_ruined_MEGASTRUCTURE_DETAILS: "$gateway_ruined_MEGASTRUCTURE_DETAILS$"
 gateway_ness_restored: "$gateway_final$"
 gateway_ness_restored_DESC: "$gateway_final_DESC$"
 gateway_ness_restored_MEGASTRUCTURE_DETAILS: "$gateway_final_MEGASTRUCTURE_DETAILS$"
 NESS_GRAND_ARCHIVE: "Tesouro da $NAME_CaptainNess$"
 NESS_GRAND_ARCHIVE_HOARDED: "$NESS_GRAND_ARCHIVE$"
 grand_archive.8405.name: "Emboscada!"
 grand_archive.8405.desc: "Fomos seguidos.\n\nUma frota imponente da §Y$NAME_BlackNeedle$§! nos confrontou em [ness_treasure_system.GetName]. Em comparação ao nosso último encontro, seus números aumentaram consideravelmente com a inclusão de naves militares e civis adaptadas com armamentos pesados. Eles parecem ter reunido a maior parte de suas frotas reservas para essa batalha. No centro está a capitânia, uma gigantesca nave de classe $titan$.\n\nEmbora estejam em formação de combate, a maioria das naves ainda não preparou suas armas, o que sugere que desejam negociar.\n\nEstamos recebendo uma transmissão da capitânia."
 grand_archive.8405.a.lom: "Vamos parolar."
 grand_archive.8410.name: "$NAME_CobaltQuill$, Capitão da $NAME_BlackNeedle$"
 grand_archive.8410.desc: "§HApesar da baixa estatura, este pirata emana seriedade. Seus olhos são calculistas, nos analisando como parte de uma equação complexa.§!\n\nEnfim nos encontramos. $NAME_CobaltQuill$ ao seu dispor, Capitão da ilustre §Y$NAME_BlackNeedle$§! e humilde descendente de nosso fundador, o $NAME_SilverQuill$. Vocês têm sido uma pedra na minha bota por muitos anos, mas comedimento é uma de minhas virtudes. Venho oferecer uma proposta.\n\nDaremos a vocês uma recompensa generosa por terem completado o mapa e deixaremos que partam com suas reles vidas intactas.\n\nCaso recusem, seremos forçados a tomar o que quisermos à força. Não bastasse nossa superioridade naval, também nos infiltramos em diversos níveis importantes do seu império. Basta uma ordem minha e vocês cairão em ruína."
 grand_archive.8410.a: "Qual é a sua oferta?"
 grand_archive.8410.a.reply: "Apesar dos contratempos que causaram, estou disposto a oferecer uma bela recompensa em troca da relíquia completa da §Y$NAME_CaptainNess$§!.\n\nSe aceitarem essa oferta generosa, estarei disposto a esquecer todas as suas transgressões. Não há motivo para que esse nosso conflito continue. Ou se agrave..."
 grand_archive.8410.b: "Você está nos ameaçando..."
 grand_archive.8410.b.reply.common_1: "Eu sei tudo o que há para saber sobre a infraestrutura de [this.GetName]. Suas redes de abastecimento, a localização dos seus silos de recursos, a distribuição das suas bases estelares: tudo foi meticulosamente contabilizado."
 grand_archive.8410.b.reply.common_2: "Meu pessoal fez a pesquisa, e eu sei exatamente como arruinar o seu império. Levarei a fome aos seus planetas, roubarei seus suprimentos e destruirei o que sobrar. A menos, é claro, que me entregue o que eu desejo..."
 grand_archive.8410.b.reply.default: "$grand_archive.8410.b.reply.common_1$\n\nEu tenho olhos vigiando todos os indivíduos confiáveis em meio às suas lideranças, assim como as famílias deles...\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.hive_mind: "$grand_archive.8410.b.reply.common_1$\n\nEu estou rastreando cada nódulo importante do seu coletivo e sou alertado sempre que outro é criado.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.machine: "$grand_archive.8410.b.reply.common_1$\n\nEu tenho acesso à sua matriz de localização e rastreei a posição de todos os nódulos principais da sua rede.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.c: "Por que negociar?"
 grand_archive.8410.c.reply: "Uma operação de sabotagem em larga escala não é barata. Manutenção de naves, honorários, propinas: todas essas coisas custam caro, e eu não enriqueci gastando sem necessidade. Há um grande custo de oportunidade para a escala inimaginável de destruição que aguarda vocês ao apertar de um botão.\n\nExistem formas melhores de gastar o meu dinheiro suado. Vamos evitar mais carnificina desnecessária. Leve a sua nova fortuna e deixe a pirataria para os profissionais."
 grand_archive.8410.d: "Isso não se trata apenas dos créditos, não é?"
 grand_archive.8410.d.reply: "Há 5.000 anos meu ancestral, o grande $NAME_SilverQuill$, foi o Primeiro Imediato da $NAME_CaptainNess$. Ele a serviu lealmente por muitos anos, e o que ganhou em troca?\n\nTraição!\n\nEla o entregou para as autoridades e ficou com a recompensa! Obviamente, nenhuma prisão é capaz de conter o poderoso $NAME_SilverQuill$.\n\nApós uma fuga ousada, ele ressurgiu das cinzas e transformou sua tripulação de maltrapilhos na lendária $NAME_BlackNeedle$ que está diante de você. Jurando vingança contra a traiçoeira $NAME_CaptainNess$, ele dedicou sua vida a saquear os tesouros e enterrar o legado dela sob o peso do próprio sucesso.\n\nEstou meramente terminando o que ele começou. Esse mapa é a chave para tomar aquilo que nos pertence por direito.\n\nAgora, entregue-o para mim."
 grand_archive.8415.name: "Uma Proposta Ousada"
 grand_archive.8415.desc: "O líder da §Y$NAME_BlackNeedle$§! ofereceu uma recompensa generosa em troca do §Y$celestial_chart$§!. Se aceitarmos o acordo, teremos que entregar a chave para o tesouro da §Y$NAME_CaptainNess$§!.\n\nDo contrário, sofreremos sua ira absoluta. Ainda não sabemos até que ponto os piratas se infiltraram em nosso meio, mas eles ameaçaram destruir completamente [this.GetName] de dentro para fora. Teremos que pagar para ver se estão blefando."
 grand_archive.8415.a: "Rejeite a oferta."
 grand_archive.8415.b: "Venda o §Y$celestial_chart$§!."
 grand_archive.8415.b.effect_tt: "Perde o §Y$celestial_chart$§!\nGanha §G+$@max_credit_mult|0%$§! do seu máximo de $r_energy$\nGanha uma nave da §Y$NAME_BlackNeedle$§!"
 grand_archive.8500.name: "Um Acordo Honrado"
 grand_archive.8500.desc: "Entregamos o §Y$celestial_chart$§! em troca de uma grande quantia de $MONEY$ e uma capitânia militar extraordinária, conhecida como o §YOlho da Agulha§!. Podemos considerar nossa disputa com a §Y$NAME_BlackNeedle$§! encerrada de uma vez por todas.\n\nEvitamos uma batalha árdua com a força total de suas frotas e uma tentativa de sabotagem em escala galáctica.\n\nÉ melhor deixar a pirataria para os piratas."
 grand_archive.8500.a: "Nossos negócios estão encerrados."
 grand_archive.8500.a.tt: "Todas as naves foram ejetadas do sistema da $TREASURE_TROVE$."
 HOARD_LOOTED_BY_PIRATES: "Esta estrutura foi saqueada por piratas e não contém mais nada de valor"
 grand_archive.8505.name: "Sabotagem!"
 grand_archive.8505.desc: "A §Y$NAME_BlackNeedle$§! lançou um ataque generalizado, mergulhando nossos sistemas no caos. Linhas de montagem foram interrompidas, geradores foram queimados e a infraestrutura administrativa essencial foi derrubada. Carregamentos estão desaparecendo, estações de pesquisa tiveram seus dados apagados, e minas estão desmoronando cinco vezes mais.\n\nA devastação é extensa, resultante do trabalho ardiloso de milhares de agentes maldosos agindo em sincronia. Uma vasta rede de sabotadores está oculta em nossas colônias e parece estar sempre um passo à frente."
 grand_archive.8505.a: "Alerta vermelho!"
 situation_sabotage: "Sabotadores da Agulha Negra"
 situation_sabotage_type: "$situation_sabotage$"
 situation_sabotage_desc: "Uma vasta rede de sabotadores da §Y$NAME_BlackNeedle$§! está oculta em nossas colônias, causando distúrbios generalizados ao redor de [owner.GetName]. A menos que esses agentes sejam eliminados, o dano continuará até que nossas linhas de abastecimento entrem em colapso."
 situation_sabotage_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 approach_sabotage_do_nothing: "Não fazer nada"
 approach_sabotage_do_nothing_tt: "Não realizaremos nenhuma ação especial aqui."
 approach_sabotage_purge: "Expurgar os sabotadores"
 approach_sabotage_purge_tt: "Caçar os agentes ocultos em nosso meio resultará em danos colaterais inevitáveis."
 approach_sabotage_mitigate: "Mitigar os danos"
 approach_sabotage_mitigate_tt: "Medidas de resposta serão tomadas para reconstruir nossa infraestrutura na esperança de resistir até que os efeitos da sabotagem cheguem ao fim."
 finisher_effects_sabotage: "Vamos eliminar os sabotadores da Agulha Negra e impedir que reforcem o bloqueio ao redor do tesouro da Capitã Ness."
 finisher_effects_sabotage_fail: "Nossa infraestrutura será irremediavelmente danificada e a Agulha Negra reforçará o bloqueio ao redor do tesouro da Capitã Ness."
 grand_archive.8520.name: "Rede de Sabotadores Exposta"
 grand_archive.8520.desc.common: "Interceptamos comunicações em uma frequência secreta usada pela §Y$NAME_BlackNeedle$§! ao redor de nossas colônias. Depois que deciframos suas mensagens, conseguimos identificar todos os conspiradores e sabotadores em nosso meio."
 grand_archive.8520.desc.machine: "$grand_archive.8520.desc.common$\n\nSeus agentes estavam espalhando malwares nocivos secretamente dentro de nossos sistemas operacionais, criando um exército infiltrado de unidades rebeldes em várias posições em todos os nossos sistemas.\n\nO esquema de reprogramação maliciosa chegou a ponto de corromper um dos nódulos independentes mais importantes de [root.GetName], §Y[traitor_leader.GetName]§!, que atuava no cargo de [traitor_leader.GetClass]."
 grand_archive.8520.desc.hive: "$grand_archive.8520.desc.common$\n\nSeus agentes estavam inundando os habitats com feromônios dissociativos, fazendo com que muitos de nossos drones desenvolvessem um desvio latente. Quando contrariados, os piratas reorganizaram nossos drones em células de agentes infiltrados que estão atualmente derrubando a nossa infraestrutura.\n\nO extenso esquema chegou a ponto de corromper um dos nódulos independentes mais importantes de [root.GetName], §Y[traitor_leader.GetName]§!, que atuava no cargo de [traitor_leader.GetClass]."
 grand_archive.8520.desc.default: "$grand_archive.8520.desc.common$\n\nDescobrimos que seus agentes recrutaram cidadãos insatisfeitos durante anos, preparando esse ataque generalizado com células infiltradas e diversos simpatizantes prontos para se voltar contra nós.\n\nUm desses indivíduos traiçoeiros era §Y[traitor_leader.GetName]§!, que atuava no cargo de [traitor_leader.GetClass], apresentando um enorme risco à segurança. Temos que lidar com essa traição sem perder o semblante da estabilidade. Se notícias de uma infiltração a esse nível viessem à público, nosso governo sofreria graves repercussões."
 grand_archive.8520.a.default: "Execute os traidores."
 grand_archive.8520.a.machine: "Desative as unidades desviantes."
 grand_archive.8520.a.hive: "Elimine os drones desviantes."
 grand_archive.8520.a.tt: "§R100§! £pop£ §HPops§! são mortos em cada planeta povoado."
 grand_archive.8520.b.default: "Reeduque os traidores."
 grand_archive.8520.b.machine: "Reprograme as unidades desviantes."
 grand_archive.8520.b.hive: "Reintegre os drones desviantes."
 grand_archive.8520.c: "Exponha as identidades dos traidores."
 grand_archive.8525.name.default: "Traidor Executado"
 grand_archive.8525.name.hive: "Desvio Eliminado"
 grand_archive.8525.name.machine: "Unidade Exterminada"
 grand_archive.8525.desc.common: "Após a descoberta de sua associação com os piratas da §Y$NAME_BlackNeedle$§!"
 grand_archive.8525.desc.default: "$grand_archive.8525.desc.common$, a execução de [traitor_leader.GetName] foi cumprida.\n\nAs circunstâncias exatas de sua morte foram mantidas em segredo."
 grand_archive.8525.desc.hive: "$grand_archive.8525.desc.common$, a eliminação de [traitor_leader.GetName] foi cumprida."
 grand_archive.8525.desc.machine: "$grand_archive.8525.desc.common$, a desativação de [traitor_leader.GetName] foi cumprida."
 grand_archive.8525.a: "Uma medida necessária."
 grand_archive.8530.name.default: "Traidor Reeducado"
 grand_archive.8530.name.hive: "Desvio Reeducado"
 grand_archive.8530.name.machine: "Unidade Reprogramada"
 grand_archive.8530.desc.default: "$grand_archive.8525.desc.common$, [traitor_leader.GetName] concluiu sua reabilitação.\n\nInfelizmente, o processo de reeducação deixou uma impressão negativa permanente."
 grand_archive.8530.desc.hive: "$grand_archive.8525.desc.common$, [traitor_leader.GetName] concluiu sua reabilitação.\n\nInfelizmente, o processo de reintegração deixou uma impressão negativa permanente."
 grand_archive.8530.desc.machine: "$grand_archive.8525.desc.common$, [traitor_leader.GetName] concluiu sua reprogramação.\n\nInfelizmente, o processo de reformatação deixou uma impressão negativa permanente."
 grand_archive.8530.a.tt: "[traitor_leader.GetName] ganha 2 níveis de Características Negativas"
 grand_archive.8535.name: "Corpo de [traitor_leader.GetName] Encontrado"
 grand_archive.8535.desc: "$grand_archive.8525.desc.common$, cidadãos furiosos de [root.GetName] se organizaram em protestos. A turba justiceira invadiu o domicílio de [traitor_leader.GetName]. [traitor_leader.GetHeSheCap] morreu no local."
 grand_archive.8536.name: "Traidor Faz Reparações"
 grand_archive.8536.desc: "$grand_archive.8525.desc.common$, [traitor_leader.GetHeShe] emitiu um pronunciamento público lamentando profundamente suas ações. A experiência parece ter deixado um efeito permanente em sua capacidade de liderança.\n\nApesar de seus crimes, parece que [traitor_leader.GetName] reconquistou a confiança do povo de [root.GetName]."
 grand_archive.8536.a: "Um desdobramento inesperado."
 grand_archive.8536.a.tt: "[traitor_leader.GetName] ganha 1 nível de Características Negativas"
 grand_archive.8545.name: "Infraestrutura em Colapso"
 grand_archive.8545.desc: "Infelizmente, não fomos capazes de impedir as operações devastadoras da §Y$NAME_BlackNeedle$§!. Os sabotadores danificaram nossa infraestrutura de logística severamente, e precisaremos de muitos anos para reconstruir nossas cadeias de abastecimento. A corrupção que disseminaram em nossos sistemas está além do nosso alcance.\n\nContudo, isso não nos impedirá de reivindicar o §Y$NESS_GRAND_ARCHIVE$§!. Tudo o que precisamos fazer é derrotar os piratas em batalha."
 grand_archive.8545.a: "A luta ainda não acabou."
 grand_archive.8550.name: "Mais Fortes Que a Sabotagem"
 grand_archive.8550.desc: "Apesar de todos os esforços da §Y$NAME_BlackNeedle$§! para sabotar nossa infraestrutura, conseguimos nos recuperar e estabilizar a situação. Com os agentes agressores derrotados, só nos resta confrontar a frota inimiga reunida em [hoard_system.GetName] e reivindicar o §Y$NESS_GRAND_ARCHIVE$§! em nome de [root.GetName]."
 grand_archive.8550.a: "Está na hora."
 grand_archive.8555.name: "$NAME_BlackNeedle$ Derrotada"
 grand_archive.8555.desc: "A §Y$NAME_BlackNeedle$§! não foi páreo para o nosso poderio militar. Com sua frota principal derrotada, eles não serão mais capazes de apoiar os esforços de sabotagem em nossos sistemas. Estamos livres para reivindicar o §Y$NESS_GRAND_ARCHIVE$§! em nome de [root.GetName]."
 grand_archive.8555.a: "Um esforço patético."
 grand_archive.8555.a.lom: "Paspalhões patéticos."
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT: "A Última Resistência da $NAME_BlackNeedle$"
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_DESC: "Após os ataques generalizados de sabotagem nos sistemas de [root.GetName], a $NAME_BlackNeedle$ manteve seu bloqueio ao redor do §H$NESS_GRAND_ARCHIVE$§!. Eles esgotaram quase todos os seus recursos e agora estão vulneráveis. Se os derrotarmos aqui, sua organização certamente cairá, nos permitindo reivindicar o tesouro sem impedimentos."
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_TOOLTIP: "§RDerrote a $NAME_BlackNeedle$ em [solar_system.GetName].§!"
 grand_archive.8560.name: "$grand_archive.8410.name$"
 grand_archive.8560.desc: "As crianças da Ness... que irônico.\n\nEla escolheu vocês, sabiam disso?\n\nDentre centenas de espécies... ela escolheu vocês. Talvez ela tenha visto algo especial no seu povo, ou talvez tenha sido puro acaso. Seja como for, cá estamos.\n\nVocês venceram... por enquanto. Valorizem esta vitória, pois fizeram um inimigo poderoso. A §Y$NAME_BlackNeedle$§! não perdoa, nem jamais esquece.\n\nAssim como meus ancestrais, nós prevaleceremos. Vamos reconstruir tudo o que perdemos, pouco a pouco. Mesmo que leve mil anos, um milhão... voltaremos para tomar tudo o que vocês roubaram de nós.\n\nA $NAME_BlackNeedle$ viverá para sempre! Para sempre!"
 grand_archive.8560.a: "Só o tempo dirá."
 grand_archive.8560.a.lom: "Caiam fora, palermas."
 CAPTAIN_NESS_HOARD_PROJECT: "Tesouro da Capitã Ness"
 CAPTAIN_NESS_HOARD_PROJECT_DESC: "O §H$NESS_GRAND_ARCHIVE$§! é nosso.\n\nApesar da aparência abandonada, muitos dos sistemas da construção permanecem ativos. Considerando a fama da §H$NAME_CaptainNess$§!, temos que estar atentos a medidas de segurança inesperadas.\n\nA única entrada da arca do tesouro tem um recesso entalhado na escotilha central. Devemos inserir o §H$celestial_chart$§! aqui para abrir esta instalação misteriosa."
 grand_archive.8565.name: "Tesouro da $NAME_CaptainNess$"
 grand_archive.8565.desc: "O §Y$celestial_chart$§! era uma chave; o cofre, a fechadura. Nós o inserimos na escotilha principal da megaestrutura.\n\nO mapa foi ativado, traçando internamente um único feixe de luz por todas as estrelas ao longo de nossa jornada. O antigo maquinário voltou à vida, e logo estávamos em seu interior.\n\nTesouros inacreditáveis, saqueados de milhares de mundos, ocupam o piso e as paredes. Estátuas delicadas justapostas a armas forjadas de metais preciosos. Joias finas pendem das extremidades de fósseis antiquíssimos e dispositivos complexos acumulam-se em pilhas desordenadas.\n\nPassos metálicos ressoam na passagem central. Com os braços erguidos, uma máquina humanoide preenchida de fluidos se aproxima. Seus circuitos vocais ativam-se com um estalido:\n\n§L\"Então... vocês encontraram o meu mapa. Como são espertos.\"§!"
 grand_archive.8565.a: "Abra a comunicação."
 grand_archive.8565.a.lom: "Sim, capitã!"
 grand_archive.8570.desc: "§HApesar das expressões limitadas de sua forma robótica, a máquina conhecida como Capitã Ness nos cumprimenta com certa arrogância. Seu corpo metálico não demonstra sinais de desgaste, como se tivesse acabado de ser montado. Seu tom é paciente, embora um pouco condescendente, como alguém que se considera superior.§!\n\nSuponho que eu deva me apresentar, mas acho que já sabem quem eu sou.\n\nMeu nome é Saanda Ness; ou melhor, já foi um dia. Antiga \"Rainha Pirata da Galáxia\" e atual residente desta pilha fria de parafusos.\n\n§HA máquina pausa momentaneamente, avaliando nossas formas.§!\n\nFaz muito tempo desde a última vez que vi a sua espécie. Parece que vocês, criaturas primitivas, cresceram!\n\nDevo admitir que não esperava que chegassem até aqui."
 grand_archive.8570.a: "Como você está viva?"
 grand_archive.8570.a.reply_fallen_empire: "A imortalidade custa caro. Paguei certos cientistas de [fallen_empire.GetRealName] alguns milhões de créditos para que transferissem minha consciência sem alarde. Fizeram um belo trabalho, mas já não danço mais tão bem quanto antes.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply_curator: "A imortalidade custa caro. Paguei certos cientistas da $NAME_Curator_Order$ alguns milhões de créditos para que transferissem minha consciência sem alarde. Fizeram um belo trabalho, mas já não danço mais tão bem quanto antes.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply: "§HA máquina ativa um console, revelando uma câmara oculta na parede. Dentro de uma antiga cápsula criogênica descansam os restos de um ser orgânico.§!\n\nEssa sou eu. Uma decoração inútil, mas sou um pouco sentimental. Nada mal, não é?\n\nDepois que me certifiquei de que as coisas estavam em ordem, eu selei este cofre e me desliguei por alguns milhares de anos. Quando me dei conta, vocês abriram a porta e agora estamos aqui conversando. Parece que foi ontem que eu deitei para uma soneca..."
 grand_archive.8570.b: "De onde você pegou todo esse tesouro?"
 grand_archive.8570.b.reply: "A maior parte foi roubada. Ou negociada por outros artigos de procedência questionável. Na minha época, eu passei a perna em todos os figurões da galáxia. Naves cargueiras, armas Colosso; o que você imaginar, eu já roubei. Eu sempre disse que, se posso roubar uma coisa facilmente de você, é porque você não merece tê-la.\n\nÀs vezes, a situação ficava... complicada. Você viu o que aconteceu com os ytteritas. Aquilo realmente abriu meus olhos.\n\nÉ tudo diversão, até a coisa ficar feia..."
 grand_archive.8570.c: "Por que você nos escolheu?"
 grand_archive.8570.c.reply: "Acreditaria em mim se eu dissesse que estava solitária?\n\n§HOs circuitos vocais da máquina estalam com o que pode ter sido uma gargalhada.§!\n\nEu tinha todo esse tesouro, mas para quê? O que eu ganhei no fim? Percebi que eu não queria fortuna; eu queria um legado. Mas não se pode roubar um legado, então como criá-lo?\n\nBem, esta foi a minha tentativa. Encontrei algumas das espécies primitivas mais promissoras e semeei seus mundos com tesouros - e com o mapa, é claro. Quem conseguisse desvendar o meu mapa primeiro passaria no teste e reivindicaria a obra da minha vida. Então... cá estamos.\n\nTalvez vocês façam o que fui incapaz de fazer: encontrar uma utilidade para tudo isso."
 grand_archive.8570.d: "Por que você deseja entregar tudo?"
 grand_archive.8570.d.reply: "Como disse, estou passando a tocha. Eu nunca soube gastar dinheiro, apenas roubá-lo.\n\nMas eu não podia entregar tudo para qualquer pessoa; tinha que ser alguém esperto o bastante para chegar até aqui. Uma tripulação que me enchesse de orgulho, para quem eu pudesse contar a minha história..."
 grand_archive.8570.e: "Qual é a sua história?"
 grand_archive.8570.e.reply: "Bem, já que perguntou...\n\n§HA máquina ativa um console e uma série de registros digitais são projetados na parede.§!\n\nTodo este cofre é a minha biografia. Paguei uma bela soma para que uma equipe de autores registrasse todos os momentos da minha vida que pudessem ser lembrados. Acho que fizeram um bom trabalho.\n\n§HAs imagens se transformam e revelam uma tripulação pirata com a forma biológica da Capitã Ness no comando. Uma crepitação escapa dos circuitos vocais da máquina; um suspiro?§!\n\nEu já fui a mais temida pirata da galáxia. Levei megacorporações à falência, sequestrei planetas inteiros e reduzi impérios a cinzas. Qualquer um tolo o bastante para me desafiar provava da minha lâmina ou era vendido por um resgate. Já a recompensa pela minha cabeça? Era astronômica."
 grand_archive.8570.f: "Continue, por favor."
 grand_archive.8570.f.reply: "§HRegistros digitais de inúmeros roubos, golpes e fugas ousadas são projetados ao som de uma música heroica.§!\n\nInicialmente, eu escolhia meus alvos com cuidado e procurava motivos para justificar que eles mereciam. Cada trabalho era mais estimulante que o anterior. Era um ciclo: planejamento, demonização, roubo e celebração. O problema é que procurar alvos \"maus\" consumia muito tempo. Eu precisava expandir meus horizontes.\n\nNo fim, se eu desejasse algo, simplesmente ia lá e tomava para mim. Eu gostava de ver os números aumentarem: o preço pela minha cabeça e o valor do meu tesouro. Eu estava deixando minha marca no mundo e nunca seria esquecida. Todo o resto era descartável."
 grand_archive.8570.g: "O que mudou?"
 grand_archive.8570.g.reply: "§HA ruína do mundo natal ytterita é exibida.§!\n\nEntão aconteceu o incidente com os ytteritas... Você viu, não foi? Ainda consigo ouvir os gritos no rádio enquanto as últimas vidas eram ceifadas. As coisas foram longe demais. Era hora de mudar.\n\nEu descobri um padrão durante minha carreira: a história se apaga, as lições são esquecidas e alguém novo toma o seu lugar. Tudo que eu queria era poder escolher meus sucessores.\n\nVocês, [root.GetSpeciesNamePlural], passaram no teste. O que acontece em seguida depende de vocês."
 grand_archive.8575.name: "Riquezas além da Conta"
 grand_archive.8575.desc.default: "O §Y$NESS_GRAND_ARCHIVE$§! contém uma incrível abundância de riquezas. No entanto, precisamos considerar as consequências de ficarmos com elas.\n\nCada crédito do tesouro foi obtido ilegalmente. Tomar posse desses recursos demonstraria tolerância com a criminalidade excessiva da $NAME_CaptainNess$ em troca de bens materiais.\n\nDito isso, muitas das pessoas prejudicadas pela $NAME_CaptainNess$ morreram há muito tempo. Tomar essa fortuna não geraria novas vítimas. Além disso, dizimamos a §Y$NAME_BlackNeedle$§!, e com isso deixamos a galáxia mais segura. Após um longo caminho repleto de perigos, certamente merecemos uma recompensa substancial por nossos esforços.\n\nTemos que decidir o que faremos com seu conteúdo."
 grand_archive.8575.desc.lom: "O §Y$NESS_GRAND_ARCHIVE$§! é a maior das fortunas, e teremos prazer em tomar esse butim.\n\nUma recompensa merecida por derrotar a §Y$NAME_BlackNeedle$§!. Três vivas para [this.GetName]!\n\nVamos sair desse cofre. Todos para o convés!"
 grand_archive.8575.a.default: "Tome o tesouro em nosso nome."
 grand_archive.8575.a.lom: "Tome o nosso tão merecido butim."
 grand_archive.8575.b: "Devolva os itens rastreáveis aos legítimos donos."
 grand_archive.8575.c: "Distribua essa riqueza entre toda a galáxia."
 grand_archive.8580.name: "Nossa Patrona"
 grand_archive.8580.desc.1: "§HA máquina conhecida como §Y$NAME_CaptainNess$§! ficou impressionada com a rapidez com a qual esvaziamos o cofre.§!\n\nVão em frente, vocês mereceram. Esse tesouro custou muito sangue, suor e lágrimas. Não gastem tudo de uma vez."
 grand_archive.8580.desc.2: "§HA máquina conhecida como §Y$NAME_CaptainNess$§! ficou preocupada com o nosso desejo de repatriar parte do seu tesouro.§!\n\nQue decepção. Então alguém vai receber as joias dos seus ancestrais quinze gerações depois. Bem, espero que vocês usem o que sobrar em um projeto mais digno. Apesar da evidência recente, confio que vocês farão a coisa certa."
 grand_archive.8580.desc.3: "§HA máquina conhecida como §Y$NAME_CaptainNess$§! ficou enojada quando descobriu que escolhemos distribuir todo o seu tesouro.§!\n\nEsse é o seu grande plano? Distribuir presentes por aí? O que eles fizeram para merecer isso? Que desperdício!\n\nAcho que superestimei vocês... Pelo menos me entreguem algumas frotas para eu tentar recuperar isso."
 grand_archive.8580.desc.default: "§HAinda temos que decidir o que fazer quanto à $NAME_CaptainNess$. Com sua experiência como piloto que sobreviveu a inúmeros perigos, ela seria uma excelente adição às nossas forças como Comandante. Por outro lado, ela poderia desempenhar um papel menos direto e treinar a nossa próxima geração de pilotos.§!"
 grand_archive.8580.desc.no_lom: "§HA menos, é claro, que decidamos simplesmente colocá-la atrás das grades como um exemplo para os nossos cidadãos de que nenhum crime passará impune. Ela teria muito tempo para pensar no que fez.§!"
 grand_archive.8580.desc.gestalt: "§HTudo o que resta agora é decidir o que fazer quanto à $NAME_CaptainNess$. Com sua poderosa mente independente, ela seria uma adição valiosa como Comandante, oferecendo estratégias criativas que poderiam pegar nossos inimigos de surpresa. Por outro lado, poderíamos integrar sua vasta experiência de combate ao conhecimento de nosso coletivo para ampliar nossa compreensão da guerra.\n\nA menos, é claro, que decidamos simplesmente aprisioná-la para deixar claro que os desvios e a criminalidade não serão tolerados em [this.GetName].§!"
 grand_archive.8580.a: "Poderíamos usar você como piloto."
 grand_archive.8580.a.tt: "Ganha uma §YAlmirante Imortal§! de nível 10"
 grand_archive.8580.b: "§YVamos integrar seu conhecimento à nossa consciência.§!"
 grand_archive.8580.c: "§YAjude-nos a treinar novos pilotos.§!"
 grand_archive.8580.d: "§RVocê vai apodrecer na prisão.§!"
 grand_archive.8585.desc: "Então é isso?\n\nVocês vão simplesmente me escantear?\n\nQue decepção... Bem, hora de seguir meu caminho.\n\nBoa sorte, eu acho."
 grand_archive.8585.a: "Não devemos nada a você."
 grand_archive.8590.desc: "Seus cabeças-ocas! Eu ofereço o mundo a vocês e em troca ganho um novo par de algemas? Vocês não merecem esse tesouro! Não merecem nem lustrar as minhas botas!\n\nQue uma praga caia sobre [this.GetName], malditos sejam!\n\nQue seus restos definhem no vazio e seus nomes sejam esquecidos."
 grand_archive.8590.a: "Nenhum crime passará impune."
 grand_archive.8595.name: "$NAME_CaptainNess$ Desativada"
 grand_archive.8595.desc: "A máquina aprisionada conhecida como §Y$NAME_CaptainNess$§! foi encontrada desativada em sua cela. Achamos que ela causou uma falha crítica intencional em seus circuitos, encerrando sistemas cruciais e apagando todos os dados armazenados de sua consciência transferida. Uma mensagem foi rabiscada nas paredes da cela:\n\n§LPara o vazio com vocês...§!"
 grand_archive.8595.a: "Um final apropriado."
 grand_archive.8600.name: "Fim do Arco-Íris"
 grand_archive.8600.desc.common: "Chegou a hora de forjarmos nosso próprio destino. Sem um mapa, as estrelas nos guiarão.\n\nQuais serão nossas conquistas? Como seremos lembrados?"
 grand_archive.8600.desc.default: "Esta aventura chegou ao fim. A busca pelo Tesouro da §HCapitã Ness§! foi concluída.\n\n$grand_archive.8600.desc.common$\n\nAqui começa a verdadeira história de [this.GetName]."
 grand_archive.8600.desc.lom: "Que histórias serão contadas desta aventura! Descobrimos o tesouro escondido da Capitã Ness e nenhuma tripulação ficou em nosso caminho.\n\n$grand_archive.8600.desc.common$\n\nIcem a bandeira de [this.GetName] com orgulho. Agora a nossa história começa de verdade!"
 grand_archive.8600.a.default: "Em frente!"
 grand_archive.8600.a.lom: "Yo, ho, ho!"
 valuable_insight: "Um conhecimento valioso."
 grand_archive.9960.name: "$tech_alien_cloning$"
 grand_archive.9960.desc: "Com a nossa primeira captura bem-sucedida da Fauna Espacial selvagem em [from.solar_system.GetName], acreditamos ser possível clonar mais dessas criaturas mediante o investimento adequado nas ciências."
 grand_archive.9960.a: "$valuable_insight$"
 grand_archive.9970.name: "Potencial de Mutação"
 grand_archive.9970.desc: "O primeiro clone de Fauna Espacial foi criado em [from.solar_system.GetName].\n\nNossa pesquisa de xenobiologia indica que ainda há potencial para melhorarmos a fisiologia dessas criaturas, se quisermos. Isso nos permitirá equipar nossas frotas biológicas com componentes de combate especializados."
 grand_archive.9970.a: "$valuable_insight$"
