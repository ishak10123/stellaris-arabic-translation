 tech_gravity_wells: "Armadilhas Gravitacionais"
 tech_gravity_wells_desc: "Concentrações localizadas de massa quântica podem ser usadas para criar curtas rajadas de gravidade extrema. Se manipulada corretamente, essa força gravitacional poderá, em teoria, capturar e conter uma criatura de qualquer tamanho sem feri-la."
