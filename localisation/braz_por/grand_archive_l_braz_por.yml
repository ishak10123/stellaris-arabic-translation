 grand_archive.4510.nothing: "Infelizmente, não havia nada de valor em seu interior."
 grand_archive.4510.freed: "Além disso, parece que libertamos alguns espécimes de Fauna Espacial que estavam no Viveiro. É possível que eles estejam agressivos e confusos com a nova realidade."
