 tech_improved_incubators_tt: "§HLibera o Recurso:§! Clonagem de Fauna Espacial Tamanho Destróier"
 tech_improved_incubators_tt_desc: "Incubadoras agora podem clonar espécimes maiores de §YFauna Espacial§!, equiparados ao tamanho de Destróieres tradicionais."
