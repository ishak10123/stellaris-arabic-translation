 pc_cutholoid: "$pc_asteroid$"
 pc_cutholoid_desc: "$pc_asteroid_desc$"
 resolution_cutholoid_eradication: "Erradicação de $cutholoids$"
 resolution_cutholoid_eradication_desc: "Cutholoides devoradores de naves não deveriam existir livremente dentro de sistemas civilizados. Essas criaturas devem ser exterminadas a qualquer custo."
 resolution_cutholoid_eradication_tooltip: "Qualquer império com §Y$cutholoids_plural$§! dentro de suas fronteiras estará §RViolando a Lei Galáctica§! até que todas as criaturas sejam destruídas."
 resolution_repeal_cutholoid_eradication: "§RRevogar a $resolution_cutholoid_eradication$§!"
 resolution_repeal_cutholoid_eradication_desc: "Não é papel d[global_event_country.GetOACommImp] [global_event_country.GetGalCommunityOrGalImperium] exigir a erradicação indiscriminada da espécie dos Cutholoides."
 resolution_repeal_cutholoid_eradication_effect_success: "Revoga a §Y$resolution_cutholoid_eradication$§!."
 fcsum_cutholoids_1: "$fcsum_critters_1$"
 further_fc_cutholoids_completed: "$further_fc_amoebas_completed$"
 grand_archive.3103.name: "$resolution_cutholoid_eradication$"
 grand_archive.3103.desc: "Uma declaração d[global_event_country.GetOAGalCommImp] [global_event_country.GetGalCommunityOrGalImperium] afirma que os Cutholoides não são mais permitidos nos sistemas de seus membros.\n\nEssas criaturas devem ser destruídas assim que descobertas, ou o império [Root.GetName] estará §RViolando a Lei Galáctica§!."
 grand_archive.3105.name: "$cutholoids_plural$ no Espaço [this.GetSpeciesName]"
 grand_archive.3105.desc: "Um Cutholoide foi descoberto no sistema [from.GetName]. Identificados como uma praga perigosa pel[global_event_country.GetOAGalCommImp] [global_event_country.GetGalCommunityOrGalImperium], todos os seus membros têm a obrigação legal de sacrificar imediatamente qualquer Cutholoide dentro de suas fronteiras.\n\nO império [Root.GetName] estará §RViolando a Lei Galáctica§! até que os Cutholoides tenham deixado nosso espaço ou sejam exterminados."
 grand_archive.3107.desc: "A presença contínua de Cutholoides em nosso sistema [invaded_system.GetName] é uma grave §RViolação da Lei Galáctica§! sob a resolução $resolution_cutholoid_eradication$. Como resultado, [global_event_country.GetOAGalCommImp] [global_event_country.GetGalCommunityOrGalImperium] permitiu que membros votassem na imposição de sanções sobre [Root.GetName]."
 grand_archive.3011.name: "Nave Científica Desaparecida"
 grand_archive.3011.desc: "Perdemos o contato com nossa nave científica enquanto ela investigava um estranho asteroide em [cutholoid_under_radar.solar_system.GetName].\n\nDetectamos fracos sinais de emergência originários de sua última posição conhecida. Se quisermos recuperar a nave perdida, teremos que investigá-los mais a fundo."
 grand_archive.3011.a: "Isso é ruim."
 grand_archive.3012.name: "Entidade Asteroidal Descoberta"
 grand_archive.3012.desc: "Mais uma das estranhas criaturas asteroidais foi descoberta em §H[from.solar_system.GetName]§! durante uma exploração de rotina.\n\nDevemos evitar o envio de §Hnaves científicas§! para esse sistema até sabermos mais sobre esses objetos perigosos."
 grand_archive.3012.a: "Continue com as investigações."
 grand_archive.3016.name: "Uma Surpresa Desagradável"
 grand_archive.3016.desc.default: "O asteroide em [fromfrom.GetName] servia apenas como uma carapaça para o organismo gigantesco que o habitava.\n\nConseguimos destruí-lo e recuperamos [this.GetName]. Devemos ter mais cuidado ao investigar asteroides no futuro.\n\nMais dessas criaturas podem estar à espera de uma presa fácil."
 grand_archive.3016.desc.leader_killed: "$grand_archive.3016.desc.default$ Infelizmente, [leader.GetName] sofreu ferimentos irremediáveis."
 grand_archive.3018.name: "Da Barriga da Fera"
 grand_archive.3018.desc: "Nossa nave científica perdida em §H[current_system.GetName]§! retornou!\n\nRelatórios de §H[leader.GetName]§! informam que eles foram engolidos por uma entidade espacial que se escondia dentro de um asteroide, e que a integridade do casco estava no limite quando a nave foi inesperadamente ejetada. Ao que parece, outra coisa surpreendeu a criatura antes que pudéssemos intervir.\n\nDevemos ter mais cuidado ao abordar certos cinturões de asteroides antes de descobrirmos novas informações."
 grand_archive.3018.a: "Que sorte."
 grand_archive.3020.name: "Nave Científica Perdida"
 grand_archive.3020.desc: "As transmissões de emergência de [from.GetName] foram interrompidas. Só podemos supor que a nave científica [from.GetName] tenha sido perdida para sempre."
 alert_mia_fleet_eaten_title: "$alert_mia_title$"
 alert_mia_fleet_eaten_instant: "Perdemos o contato com nossa nave científica enquanto ela investigava um asteroide. Detectamos fracos sinais de emergência originários de sua última posição conhecida."
 cutholoid_discovered_chain_title: "Recupere [this.GetName]"
 cutholoid_discovered_chain_desc: "Perdemos a comunicação com nossa nave científica [this.GetName] em [cutholoid_under_radar.solar_system.GetName].\n\nSua última transmissão indica que estavam iniciando a inspeção de um asteroide próximo, [cutholoid_under_radar.GetName].\n\nRecomenda-se cautela ao entrar novamente nesse sistema."
 HIDDEN_CUTHOLOID_ATTACK_PROJECT: "Destrua o Asteroide"
 HIDDEN_CUTHOLOID_ATTACK_PROJECT_DESC: "O asteroide [cutholoid_under_radar.GetName] não é o que parece. Devemos abordá-lo com uma força militar considerável e tentar recuperar nossa nave científica [this.GetName] antes que ela se perca para sempre."
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT: "Capture o Asteroide"
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT_DESC: "O asteroide [cutholoid_under_radar.GetName] não é o que parece. Com a tecnologia certa, poderemos capturá-lo por inteiro e recuperar facilmente nossa nave científica [this.GetName] antes que ela se perca para sempre."
 grand_archive.2800.name: "Asteroide Falso"
 grand_archive.2800.desc: "O asteroide irregular que encontramos em §H[This.System.GetName]§! aparenta ter uma natureza senciente. Invadir a órbita desses objetos é extremamente arriscado, e naves científicas devem deixar imediatamente os sistemas afetados até que tenhamos mais informações sobre essas entidades."
 grand_archive.2800.a: "Continue com as investigações."
 grand_archive.2900.name: "Cutholoides"
 grand_archive.2900.desc: "Descobrimos um tipo de organismo espacial que se abriga dentro de asteroides. Conhecidos como \"§HCutholoides§!\", esses predadores de emboscada podem aguardar muitos anos pela sua presa e são capazes de engolir naves inteiras. Devemos ter cuidado extra ao nos aproximarmos de cinturões de asteroides desconhecidos, pois esses seres são extremamente perigosos.\n\nO lado positivo é que sua ocorrência é bastante rara, e seus processos de reprodução assexuada podem perdurar por centenas de anos."
 grand_archive.2900.a: "Deveríamos estudar melhor essas criaturas."
 grand_archive.2900.b: "Predadores de emboscada. Destrua todos eles."
 grand_archive.2900.b.homicidal: "O predador se torna a presa."
 grand_archive.2905.name: "Carapaças de Cutholoides"
 grand_archive.2905.desc: "Além de ser composta de minerais, a carapaça de um Cutholoide é reforçada por poderosas fibras biológicas. Essas fibras estão em constante crescimento e estima-se que a composição de biomassa de algumas carapaças ultrapassa 50%.\n\nQuando um Cutholoide fica grande demais para o seu asteroide, ele busca outro abrigo e recomeça o processo de integração. Embora sejam normalmente muito territoriais, diversos Cutholoides foram observados orbitando um novo candidato à carapaça. A maior das criaturas ocupará o novo asteroide, enquanto as outras se organizarão por tamanho e trocarão pacificamente com a próxima da fila; desse modo, os asteroides que elas habitam frequentemente já foram ocupados por dezenas de organismos.\n\nComo resultado, os menores asteroides têm o maior índice de reforço biológico, pois já foram trocados mais vezes. Essas amostras têm grande valor científico."
 grand_archive.2905.a: "Melhore a nossa Fauna Espacial."
 grand_archive.2905.b: "Aprimore nossas naves."
 cutholoids_hunting_buff: "Caçador de Cutholoides"
 cutholoids_hunting_buff_desc: "As carapaças ricas em minerais dos Cutholoides são recuperadas após a batalha, gerando §G$@cutholoids_hunting_buff_mineral_reward|0$§! £minerals£ para cada frota derrotada."
 grand_archive.2900.b.cutholoidhunt: "§G+$@cutholoids_hunting_buff_mineral_reward|0$§! £minerals£ por frota de Cutholoide destruída."
