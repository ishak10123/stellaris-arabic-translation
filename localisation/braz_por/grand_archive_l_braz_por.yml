 leviathans.4105.desc: "Mas é claro.\n\nO que gostariam de saber?"
 leviathans.4105.a: "Temos interesse na sua orientação para áreas específicas."
 leviathans.4105.b.common: "Queremos comprar planos para"
 leviathans.4105.b.aesthetic_wonder: "$leviathans.4105.b.common$ um museu de §Y$EXHIBITION_AESTHETIC_WONDERS$§!."
 leviathans.4105.b.historical_item: "$leviathans.4105.b.common$ um museu de §Y$EXHIBITION_GALACTIC_HISTORY$§!."
 leviathans.4105.b.xeno_geology: "$leviathans.4105.b.common$ um museu de §Y$EXHIBITION_XENO_GEOLOGY$§!."
 leviathans.4105.c: "Temos interesse em comprar uma §YRelíquia§!."
 leviathans.506.g: "De que outra forma vocês podem ajudar nossa §YColeção§!?"
 leviathans.4110.desc: "Só podemos oferecer nossa experiência em uma área. Nosso número é limitado, e a galáxia é imensa.\n\nComo podemos ajudar?"
 leviathans.4111.desc: "$leviathans.4110.desc$"
 leviathans.4112.desc: "$leviathans.4110.desc$"
 leviathans.4115.desc: "Certamente. Confiaremos a vocês um item de nossa coleção particular.\n\nEsta não é uma requisição trivial, e esperamos em troca uma doação substancial."
