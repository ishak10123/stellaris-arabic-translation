 grand_archive.2000.name: "Múltiplas Vozes"
 grand_archive.2000.desc: "Sensores indicam uma presença no sistema [This.System.GetName] que está enviando sinais rudimentares para toda a galáxia. Esses mesmos padrões de origem desconhecida foram registrados em scanners de longo alcance. Embora ainda não esteja claro se esses sinais são intencionais ou naturais, devemos investigá-los melhor."
 grand_archive.2000.a: "Descubra mais."
 fcsum_voidworms_2: "Identificamos §H[This.ContactCountry.GetName]§! como parasitas galácticos conhecidos como \"Vermes do Vazio\"."
 grand_archive.2005.name: "$NAME_Voidworms$"
 grand_archive.2005.desc: "Descobrimos que os sinais distantes originam-se de um organismo espacial simples que passamos a chamar de §H\"$NAME_Voidworms$\"§!. A galáxia aparenta estar repleta dessas criaturas. A partir das variações das formas de onda dos sinais, determinamos que esses seres passam por uma série de estágios de desenvolvimento antes de atingirem a maturidade. Embora não pareçam abertamente agressivos, seus padrões de comunicação sugerem uma coordenação em escala galáctica."
 grand_archive.2005.a.homicidal: "Feras irracionais a serem abatidas."
 grand_archive.2015.name: "Enzimas de Verme do Vazio"
 grand_archive.2015.desc: "Vermes do Vazio procriam em grupos de três, uma formação conhecida como \"Troika\". Essas criaturas se unem pelo resto de suas vidas em um ritual de acasalamento. Porém, necessitam de um hospedeiro biológico externo para produzir crias.\n\nEles são parasitas.\n\nApós atingir a maturidade, cada Verme do Vazio desenvolve um grupo de cistos em seu sistema reprodutivo. Esses cistos protetores contêm gametas altamente cáusticos que, quando combinados com outros em uma Troika podem ser enviados a planetas com uma biomassa adequada para dar origem a novas ninfas. Seus hospedeiros não sobrevivem ao processo. Encontramos evidências de que os Vermes do Vazio coordenam seus bombardeios para manter um número sustentável de hospedeiros viáveis em toda a galáxia.\n\nDe todo modo, achamos que podemos aproveitar o poder de suas enzimas reprodutivas para nosso benefício. Talvez até possamos desenvolver imunidade aos seus mecanismos de reprodução."
 grand_archive.2015.a: "Explore a fertilidade deles para nossos próprios fins."
 grand_archive.2015.b: "Repugnante. Encontre uma cura."
