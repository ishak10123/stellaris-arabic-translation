 VOIDLURE_ATTRACTED_FAUNA_DESC: "Fauna Espacial foi atraída até uma de nossas Iscas do Vazio."
 NAME_Lured_Fauna: "Fauna Atraída Temporariamente"
 wildlife_ranch: "Rancho de Vida Selvagem"
 wildlife_ranch_desc: "Vivemos em parceria com as criaturas nativas, tomando o mais extremo cuidado com a proteção de seus habitats e com o crescimento sustentável de suas espécies."
 wildlife_ranch_2: "Extensão de Vida Selvagem"
 wildlife_ranch_2_desc: "O gerenciamento cuidadoso de ecossistemas melhora as condições para as criaturas nativas e facilita as atividades de criação."
 wildlife_ranch_3: "Nexus de Vida Selvagem"
 wildlife_ranch_3_desc: "Uma vasta instalação onde animais vagam livremente. Eles recebem luxos e confortos para maximizar a qualidade dos recursos que fornecem."
 hunting_grounds: "Campos de Caça"
 hunting_grounds_desc: "Um complexo de treinamento usado para promover a excelência das técnicas de caça. Desde modernas armas energéticas até implementos marciais tradicionais, destreza e habilidades inigualáveis são necessárias para abater predadores temíveis e recuperar seus troféus."
 hunting_grounds_2: "Expansão de Caça"
 hunting_grounds_2_desc: "Uma instalação de treinamento e monitoramento que fornece as condições ideais para a fauna local. Tecnologias de mapeamento térmico ajudam a identificar rastros animais recentes e obter troféus de qualidade."
 hunting_grounds_3: "Nexus de Caça"
 hunting_grounds_3_desc: "Uma vasta expansão que comporta grupos de caça planetários em escala maciça. Equipados com armas e acessórios de rastreamento da mais alta qualidade, os caçadores recebem um treinamento de alto nível para maximizar a quantidade e qualidade das presas abatidas."
 wildlife_sanctuary: "Santuário de Vida Selvagem"
 wildlife_sanctuary_desc: "Uma reserva natural protegida onde animais selvagens são estudados em seus habitats nativos. Salvaguardas são estabelecidas para impedir a instabilidade populacional ou a disseminação excessiva de doenças. O próprio estudo dessas criaturas é um esforço acadêmico louvável, mas também nos ensina conhecimentos cruciais sobre a nossa própria natureza."
 wildlife_sanctuary_2: "Santuário Avançado"
 wildlife_sanctuary_2_desc: "As criaturas aqui recebem cuidados de forma individual, e suas dietas e necessidades médicas únicas são fornecidas com o mínimo de perturbação aos seus habitats naturais. Ecossistemas especializados permitem a propagação e reintrodução de espécies ameaçadas."
 wildlife_sanctuary_3: "Nexus de Santuário"
 wildlife_sanctuary_3_desc: "Os animais aqui são monitorados e tratados por meio de uma infraestrutura cuidadosamente projetada para parecer invisível. Pesquisadores são proibidos de interferir com o comportamento natural dos espécimes, garantindo uma coleta de dados de pesquisa da mais alta qualidade."
 primal_arena: "Arena Primitiva"
 primal_arena_desc: "Um anfiteatro onde os guerreiros mais fortes enfrentam ferozes criaturas em um combate primitivo. Não há maior entretenimento do que assistir a esses heróis triunfarem sobre as feras selvagens - ou morrerem tentando."
 primal_arena_2: "Estádio Primitivo"
 primal_arena_2_desc: "Neste gigantesco estádio, bandos de animais são treinados por tratadores habilidosos em ataques coordenados. Os lutadores de feras não podem mais depender apenas de números para subjugar suas presas: eles precisarão ser mais astutos que os treinadores se quiserem sobreviver."
 primal_arena_3: "Coliseu Primitivo"
 primal_arena_3_desc: "Uma arena impressionante projetada para receber embates monumentais entre guerreiros e feras. Cada batalha leva semanas de preparação e pode alojar um público de milhões de pessoas."
 symbiosis_nexus: "Nódulo de Simbiose"
 symbiosis_nexus_desc: "Uma reserva natural onde parceiros selvagens são recebidos em nosso grupo. Cada criatura tem algo único para oferecer à malha mental."
 symbiosis_nexus_2: "Expansão de Simbiose"
 symbiosis_nexus_2_desc: "Uma reserva central que serve para agrupar nossos parceiros selvagens em manadas autossustentáveis. A coordenação de suas capacidades mentais inferiores fornece estabilidade de pensamento à grande malha mental."
 symbiosis_nexus_3: "Nexus de Simbiose"
 symbiosis_nexus_3_desc: "Um centro expansivo que serve para unir as mentes de todas as criaturas para fortalecer nosso pensamento coletivo."
 edict_space_fauna_exhibition: "Exibição de Fauna Espacial"
 space_fauna_exhibition: "$edict_space_fauna_exhibition$"
 edict_space_fauna_exhibition_desc: "Rancheiros de toda a galáxia exibem seus estimados animais e competem pelo cobiçado prêmio de \"Melhor do Show\"."
 edict_beasts_burden: "Bestas de Carga"
 beasts_burden: "$edict_beasts_burden$"
 edict_beasts_burden_desc: "Nosso gado mais resistente deve assumir parte do trabalho mais pesado em nosso império."
 edict_creature_welfare: "Bem-Estar das Criaturas"
 creature_welfare: "$edict_creature_welfare$"
 edict_creature_welfare_desc: "É nossa responsabilidade assegurar a mais alta qualidade de vida para as criaturas sob nossos cuidados."
 edict_crack_the_whip: "Descer o Açoite"
 crack_the_whip: "$edict_crack_the_whip$"
 edict_crack_the_whip_desc: "Não importa a espécie, todos os organismos têm uma resposta semelhante à dor. O segredo é aprender a provocá-la da forma correta."
 edict_exotic_network: "Rede Neurológica Exótica"
 exotic_network: "$edict_exotic_network$"
 edict_exotic_network_desc: "As mentes dos organismos inferiores sob nossos cuidados são suficientes para aumentar o poder de computação durante cálculos mais complexos."
 edict_defensive_instincts: "Instintos de Autopreservação"
 defensive_instincts: "$edict_defensive_instincts$"
 edict_defensive_instincts_desc: "Somos um só. Que nossos instintos se entrelacem no espaço frio e profundo."
 edict_biological_overdrive: "Sobrecarga Biológica"
 biological_overdrive: "$edict_biological_overdrive$"
 edict_biological_overdrive_desc: "As criaturas inferiores sob nossos cuidados podem ser levadas ao limite com os devidos receptores neurais instalados."
 grand_archive.1060.name: "Cadáver de [from.GetSpaceFaunaName]"
 grand_archive.1060.desc: "Após termos estabelecido contato com o grupo de [from.GetSpaceFaunaNamePlural], detectamos uma carcaça em decomposição de um de seus espécimes em [fromfrom.GetName]. Os restos mortais estão ressecados e congelados após a exposição prolongada ao espaço.\n\nAcreditamos que essa carcaça foi o objeto que atraiu outros indivíduos de sua espécie; talvez estivessem procurando um membro perdido d[from.GetSpaceFaunaGroup]. Esta é uma rara oportunidade para estudarmos a biologia de um espécime de [from.GetSpaceFaunaName] que morreu de causas naturais no vazio."
 TIYANKI_GROUP_NAME: "a manada"
 SPACE_AMOEBA_GROUP_NAME: "a colônia"
 CRYSTAL_GROUP_NAME: "o aglomerado"
 VOIDWORM_GROUP_NAME: "a ninhada"
 CUTHOLOID_GROUP_NAME: "o grupo"
 voidworm_carcass_01_object: "Restos de Verme do Vazio"
 carcass_01_object: "Carcaça de Fauna Espacial"
 CARRION_DEBRIS_PROJECT: "Autópsia de [met_critter.GetSpaceFaunaName]"
 CARRION_DEBRIS_PROJECT_DESC: "A carcaça de um espécime de [met_critter.GetSpaceFaunaName] foi descoberta em [contact_system.GetName]. O estudo desses restos mortais ampliará o nosso entendimento dessas criaturas espaciais."
 grand_archive.1065.name: "Autópsia Concluída"
 grand_archive.1065.desc: "A autópsia do espécime de [met_critter.GetSpaceFaunaName] em [contact_system.GetName] terminou. Recuperamos um indivíduo biológico bem-preservado de dentro dos restos mortais que fornece uma perspectiva única de sua fisiologia."
 grand_archive.1065.specimen_tt: "['concept_specimen'] §MÉpico§! Específico da Fauna"
 NAME_BoneShip: "Nave de Ossos"
 NAME_BoneShip_desc: "A nave está decorada por tentáculos de um Tiyanki adulto, fileiras de dentes de um Verme do Vazio e o crânio de uma criatura até então desconhecida, e está equipada com um conjunto de armas de precisão."
 grand_archive.1069.name: "$NAME_BoneShip$"
 grand_archive.1069.desc: "Fomos contatados por uma nave estranhamente modificada em [from.GetName]. $NAME_BoneShip_desc$\n\nApós aceitar ingenuamente nosso convite para dialogar, o piloto foi rapidamente [GetExecuted]. Tomamos a nave peculiar e a adicionamos às nossas frotas. Descobrimos um guia de caça útil entre os objetos pessoais."
 grand_archive.1069.a: "Um presente bem-vindo."
 EXECUTED: "executado"
 DEVOURED: "devorado"
 grand_archive.1070.name: "$NAME_BoneShip$"
 grand_archive.1070.desc: "Fomos contatados por uma nave estranhamente modificada em [from.GetName]. $NAME_BoneShip_desc$\n\nEstão nos chamando em todas as frequências."
 grand_archive.1070.a: "Abra a comunicação."
 NAME_PrimalHunter: "Ceriz t'Xal"
 primal_hunter_desc: "Um indivíduo caçador experiente que percorre a galáxia em busca de presas grandes."
 primal_hunter_catchphrase: "§L\"Procuro mais um troféu para a minha coleção.\"§!"
 grand_archive.1075.name: "$grand_archive.1070.name$"
 grand_archive.1075.desc: "§HA voz taciturna de Ceriz é rouca e intermitente, como se estivesse voltando a ser usada após muitas semanas. Sua maneira é direta e seus olhos mantêm um contato estoico, de forma que parece igualmente respeitoso e ameaçador.§!\n\nCaçar troféus é a minha vida, e não é fácil me impressionar. Mas o seu povo conseguiu.\n\nOfereço-me para acompanhar seus grupos de caça sob a condição de que nossa parceria seja fundamentada pela conveniência e pela instrução mútua."
 grand_archive.1075.a: "Quem é você?"
 grand_archive.1075.a.reply: "Eu sou $NAME_PrimalHunter$. Caço por esses sistemas há muitos anos. Eu busco novas presas, e o seu povo parece abrigar rastreadores hábeis.\n\nMinha motivação é simples: a emoção da caçada."
 grand_archive.1075.b: "O que é esse crânio na sua nave?"
 grand_archive.1075.b.reply: "Era o último de sua espécie. Ofereceu uma luta e tanto."
 grand_archive.1075.c: "Há quanto tempo você vem nos observando?"
 grand_archive.1075.c.reply: "Está claro que o seu povo tem muito a aprender.\n\nUm bom caçador pode rastrear sua presa furtivamente pelo tempo que for necessário. Para ser verdadeiramente letal, é preciso permanecer oculto até o momento do disparo. O tempo que passei nas sombras não é importante; o que conta é o fato de que escolhi me revelar."
 grand_archive.1075.d: "Por que quer se juntar a nós?"
 grand_archive.1075.d.reply: "Não desejo competição. Embora eu relute em compartilhar território, prefiro trabalhar ao lado de seus caçadores a lutar pela mesma presa.\n\nO que vocês rastrearem, eu mato."
 grand_archive.1075.hire: "Alistar"
 grand_archive.1075.hire_tt: "§Y$NAME_PrimalHunter$§! une-se ao nosso império como §HLíder§!."
 grand_archive.1075.dismiss: "Dispensar"
 grand_archive.1080.name: "Xenóloga Errante"
 grand_archive.1080.desc: "Fomos contatados por uma nave de pesquisa independente em nossa base estelar, em [from.GetName]. Equipada com um conjunto de armadilhas e ferramentas analíticas, a nave foi especialmente adaptada para a captura e análise de vida espacial.\n\nEstão nos chamando em todas as frequências."
 grand_archive.1080.a: "Abra a comunicação."
 NAME_PrimalRancher: "Ruuk Qabruuk"
 primal_rancher_desc: "Uma xenóloga apaixonada pelo trabalho de campo, ela já estudou todo o tipo de feras espaciais."
 primal_rancher_catchphrase: "§L\"Todas as criaturas têm uma história para contar, e eu sou uma excelente ouvinte!\"§!"
 grand_archive.1085.desc: "§HInquisitivos e analíticos, os olhos de Ruuk piscam constantemente para um pequeno dispositivo portátil. Mesmo enquanto nos saúda, ela parece fazer anotações. No entanto, sua conduta é cordial e profissional, embora um tanto distante.§!\n\nVejo que não sou a única interessada em criaturas espaciais. Tenho estudado a pesquisa conduzida por [root.GetName] e posso afirmar que é esclarecedora. Eu adoraria auxiliar nesses esforços como parte do seu departamento científico. Se me aceitarem, é claro."
 grand_archive.1085.a: "Quem é você?"
 grand_archive.1085.a.reply: "Perdão, estou me adiantando.\n\nMeu nome é Ruuk. Sou uma pesquisadora especializada no campo da fauna espacial. Minha equipe e eu coletamos dados sobre padrões de migração, composição corpórea e biodiversidade no nível galáctico.\n\nPessoalmente, eu amo animais desde que era um pintinho. Nunca vou a lugar algum sem o Fuluff."
 grand_archive.1085.b: "Quem é Fuluff?"
 grand_archive.1085.b.reply: "O meu carinha favorito de toda a galáxia!\n\nEu mostraria a vocês, mas ele está dormindo agora. No meu planeta natal, nós criamos essa espécie como bichinhos de estimação e eu o adotei durante a última visita. É a coisa mais fofa; ouvir os casquinhos dele trotando no piso de metal, o jeito que ele mordisca as minhas penas, o tufo de lã que cresce entre seus olhinhos. Tenho certeza de que vocês vão amá-lo... se começarmos a trabalhar juntos."
 grand_archive.1085.c: "Como você nos encontrou?"
 grand_archive.1085.c.reply: "Um dos espécimes que estávamos rastreando demonstrou comportamentos anômalos, então o seguimos. Lá encontramos sua equipe científica interagindo com nosso objeto de pesquisa. O cuidado que vocês demonstraram com as criaturas revelou um profundo respeito pela vida espacial, e isso me inspirou a procurar sua pesquisa, coisa que me impressionou ainda mais. Eu sempre estou em busca de colegas que compartilham dos mesmos ideais no campo."
 grand_archive.1085.d: "Por que quer se juntar a nós?"
 grand_archive.1085.d.reply: "Francamente, pesquisa científica independente não é uma atividade muito rentável. Eu acredito no meu trabalho, mas passar a vida atrás de financiamento demanda muito tempo, que poderia ser mais bem aproveitado na ciência propriamente dita.\n\nEm uma parceria com [root.GetName], eu poderia dedicar todo o meu tempo ao que faço de melhor: estudar formas de vida espaciais. Eu teria acesso a mais recursos e poderia colaborar com a sua equipe científica para alcançarmos nossos objetivos em comum."
 grand_archive.1085.hire: "Alistar"
 grand_archive.1085.hire_tt: "§Y$NAME_PrimalRancher$§! une-se ao nosso império como §HLíder§!."
 grand_archive.1085.dismiss: "Dispensar"
 grand_archive.1100.name: "Berro Bestial"
 grand_archive.1100.desc: "Detectamos um alto número de ondas eletromagnéticas peculiares oriundas do espaço inexplorado.\n\nAnálises iniciais sugerem uma semelhança com os sinais de comunicação dos §YVermes do Vazio§!, embora sejam mais irregulares e com uma amplitude muito mais elevada. Devemos investigar isso a fundo."
 grand_archive.1100.a: "Preocupante."
 grand_archive.1105.name: "Vermes do Vazio Berradores"
 grand_archive.1105.desc: "Identificamos a fonte dos berros animalísticos: um sistema oculto populado por §YVermes do Vazio§! perto de [frenzied_voidworms_target.solar_system.GetName].\n\nOs Vermes do Vazio nesse sistema são diferentes de todos que já encontramos até agora. Essas criaturas sofreram mutações; não há formação de troikas e os espécimes adultos estão envolvidos no que só podemos descrever como um frenesi brutal de acasalamento.\n\nIsso é preocupante: tal comportamento não parasítico significa que essa colmeia pode procriar de forma independente, sem a necessidade de hospedeiros planetários."
 grand_archive.1105.desc_no_homicidal: "\nSe essa espécie variante se espalhar descontroladamente, poderá perturbar o equilíbrio de todo o ecossistema galáctico. A julgar pelo comportamento agressivo, acreditamos que essas criaturas estão se preparando para atacar [frenzied_voidworms_target.GetName]."
 grand_archive.1105.desc_2: "\nTemos que preparar nossa defesas."
 grand_archive.1105.a: "Alerta vermelho!"
 situation_frenzied_voidworms: "Vermes do Vazio Ensandecidos"
 situation_frenzied_voidworms_type: "$situation_frenzied_voidworms$"
 situation_frenzied_voidworms_desc: "Descobrimos uma grande colmeia de Vermes do Vazio claramente mutantes. Eles existem em um estado acentuado de agressividade, e ao que parece são capazes de se reproduzir de forma não parasítica.\n\nNossa presença aparenta ter agitado os ninhos. Temos que prosseguir com cuidado.\n\n[GetVoidwormsHostility]"
 situation_frenzied_voidworms_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_frenzied_voidworms: "Vermes do Vazio agressivos podem atacar nossa capital."
 approach_frenzied_voidworms_do_nothing: "Não fazer nada"
 approach_frenzied_voidworms_do_nothing_tt: "Não realizaremos nenhuma ação especial aqui."
 approach_frenzied_voidworms_hide_presence: "Ocultar nossa presença"
 approach_frenzied_voidworms_hide_presence_tt: "Todas as atividades de construção no sistema mais próximo do sistema natal deles serão interrompidas."
 approach_frenzied_voidworms_stir_nests: "Provocar os ninhos"
 approach_frenzied_voidworms_stir_nests_tt: "Provocar as criaturas aumentará a hostilidade delas em relação a nós."
 approach_frenzied_voidworms_feed_nests: "Alimentar os ninhos"
 approach_frenzied_voidworms_feed_nests_tt: "Se reduzirmos a agressividade dos vermes, talvez possamos conquistar sua confiança."
