 ###################
 TREASURE_TROVE: "Arca do Tesouro"
 TREASURE_TROVE_DESC: "Uma §Y$TREASURE_TROVE$§! pirata há muito perdida foi detectada em algum lugar de [this.GetName]. Quem saberia dizer quais riquezas ela contém...?"
 treasure_troves_chain_title: "Arcas do Tesouro"
 treasure_troves_chain_desc: "Ao longo da história da galáxia, piratas esconderam seus butins roubados em Arcas do Tesouro cuidadosamente posicionadas. Muitos desses esconderijos foram abandonados e considerados perdidos, mas agora nos pertencem."
 mod_treasure_trove_reward_mult: "Recompensas da Arca do Tesouro"
 grand_archive.6010.name: "$TREASURE_TROVE$ Descoberta"
 grand_archive.6010.desc: "Detectamos um sinal fraco originando-se de algum lugar em [event_target:treasure_trove_planet.GetName]. Com base na criptografia rudimentar, acreditamos pertencer a uma §Y$TREASURE_TROVE$§! pirata há muito perdida.\n\nCom algum esforço, estamos confiantes de que podemos revelar seus segredos."
 grand_archive.6010.a: "Revele a localização."
 grand_archive.6015.name: "Tesouro Recuperado"
 grand_archive.6015.common.1: "Após desarmar cuidadosamente as defesas da §Y$TREASURE_TROVE$§! pirata escondida em [event_target:treasure_trove_planet.GetName]"
 grand_archive.6015.desc: "$grand_archive.6015.common.1$, descobrimos uma reserva repleta de recursos valiosos.\n\nFaremos bom uso dessa recompensa inesperada."
 grand_archive.6015.desc.specimen: "$grand_archive.6015.common.1$, descobrimos um antigo artefato pirata preservado em um recipiente hermético. Essa parte da história bucaneira será adicionada à nossa coleção."
 grand_archive.6015.desc.specimen_extra: "Além disso, descobrimos um antigo artefato pirata escondido na vasta §Y$TREASURE_TROVE$§!. Com a devida restauração, essa parte da história bucaneira será uma bela adição à nossa coleção."
 grand_archive.6015.desc.pirate_ship: "Após desarmar a §Y$TREASURE_TROVE$§! perdida, descobrimos direções analógicas indicando um ponto no planeta abaixo. Lá, encontramos um incrível encouraçado pirata protegido por uma matriz antidetecção.\n\nA nave, chamada de [treasure_trove_pirate_ship.GetName], foi confiscada pelas nossas Forças Armadas."
 grand_archive.6015.desc.tech: "$grand_archive.6015.common.1$, descobrimos um banco de dados com ensaios de pesquisa raros e valiosos.\n\nNão sabemos como foram obtidos, mas podemos fazer bom uso deles."
 grand_archive.6015.a: "$GOOD$"
 treasure_trove_specimen_tt: "$t$Recuperamos um ['concept_specimen']."
 treasure_trove_pirate_ship_tt: "$t$Recuperamos uma nave militar pirata."
