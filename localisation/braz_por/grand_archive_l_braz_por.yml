 tech_boarding_cables: "$BOARDING_CABLES$"
 tech_boarding_cables_desc: "Artilharia adaptada de baixo calibre que dispara ganchos perfurantes afixados a resistentes cabos de fibra de carbono, ideais para a imobilização e abordagem de naves inimigas."
 tech_controlled_mutations: "Mutações Controladas"
 tech_controlled_mutations_desc: "Podemos aumentar a eficácia de nossas Naves de Fauna Espacial ao modificar seus genomas, permitindo a integração de tecnologia artificial em sua biomassa."
