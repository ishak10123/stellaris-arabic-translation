 grand_archive.4555.name: "$grand_archive$ Desmontado"
 grand_archive.4555.desc: "O $grand_archive$ de [from.GetName] em [fromfrom.GetName] foi desmontado após nossa aquisição do sistema.\n\nO espaço que ele ocupava nos foi devolvido."
 grand_archive.4560.name: "$grand_archive.4555.name$"
 grand_archive.4560.desc.common_1: "Nosso $grand_archive$ em [from.GetName] foi desmontado após termos abandonado o sistema."
 grand_archive.4560.desc.common_2: "Conseguimos recuperar boa parte das ligas metálicas usadas na construção original. Teremos que reconstruir completamente a estrutura em outro sistema para dar continuidade às exibições."
 grand_archive.4560.desc.specimen: "Todos os espécimes foram recuperados e devidamente armazenados até que um novo $grand_archive$ seja construído."
 grand_archive.4560.desc.fauna: "Toda a Fauna Espacial foi abatida para a coleta de seus recursos básicos."
 grand_archive.4560.desc.specimen_fauna: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.specimen$\n$grand_archive.4560.desc.fauna$\n\n$grand_archive.4560.desc.common_2$"
