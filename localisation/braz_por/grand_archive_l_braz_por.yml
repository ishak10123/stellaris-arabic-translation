 grand_archive.10009.desc: "$unique_mutation_project_unlock_desc$"
 grand_archive.10010.name: "Projeto de Mutação de Amebas Espaciais Concluído"
 grand_archive.10010.desc: "Nosso projeto de mutação experimental em §YAmebas Espaciais§! foi concluído e resultou em algumas organelas interessantes: §Y$tech_unique_mutation_space_amoeba$§! mobilizáveis.\n\nEsses organismos simbióticos são capazes de drenar energia de objetos próximos e devolvê-la ao seu hospedeiro, aprimorando suas capacidades de sobrevivência e regeneração."
 grand_archive.10015.name: "Projeto de Mutação dos Tiyanki Concluído"
 grand_archive.10015.desc: "Nosso projeto de mutação experimental nos §YTiyanki§! foi concluído e resultou em alguns aprimoramentos interessantes: §Y$tech_unique_mutation_tiyanki$§!.\n\nAmplificamos as vibrações naturais que essas criaturas usam para se comunicar entre as manadas até um nível máximo sustentável. Isso produziu um campo controlável que fortalece o tecido de outras criaturas próximas."
 grand_archive.10020.name: "Projeto de Mutação de Vermes do Vazio Concluído"
 grand_archive.10020.desc: "Nosso projeto de mutação experimental em §YVermes do Vazio§! foi concluído e resultou em variações interessantes de seus ciclos reprodutivos: §Y$tech_unique_mutation_voidworm$§!.\n\nConseguimos aumentar a fertilidade dos cistos parasíticos que essas criaturas usam para bombardear os planetas hospedeiros. Com isso, há um aumento no número de ninfas geradas."
 grand_archive.10025.name: "Projeto de Mutação de Cutholoides Concluído"
 grand_archive.10025.desc: "Nosso projeto de mutação experimental em §YCutholoides§! foi concluído com resultados interessantes: §Y$tech_unique_mutation_cutholoid$§!.\n\nEncontramos uma forma de adaptar seu gigantesco sistema digestivo para disparar projéteis de longo alcance a altas velocidades. Infelizmente, essa extensa modificação biológica os impede de engolir frotas inimigas."
 grand_archive.10030.name: "Projeto de Mutação de Entidades Cristalinas Concluído"
 grand_archive.10030.desc: "Nosso projeto de mutação experimental em §YEntidades Cristalinas§! foi concluído com resultados interessantes: §Y$tech_unique_mutation_crystalline_entity$§!.\n\nCom essa modificação à sua genética cristalina, cada criatura é capaz de se dividir em dois organismos independentes quando sofre um trauma grave. Isso deve aumentar consideravelmente suas capacidades de combate."
 grand_archive.10030.a: "$FASCINATING$"
 leviathan_unique_mutation_project_unlock_name: "Projeto de Mutação de [FromFromFrom.GetShipSizeName]"
 leviathan_unique_mutation_project_unlock_desc: "Recuperamos o material genético dos espécimes de [FromFromFrom.GetShipSizeName] que encontramos em [FromFrom.solar_system.GetName].\n\nEmbora ainda não tenhamos a capacidade de clonar essas criaturas, podemos extrair conhecimentos valiosos de sua biologia singular."
 grand_archive.10055.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10055.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10060.name: "Projeto de Mutação de Matriarca Concluído"
 grand_archive.10060.desc: "Nosso projeto de mutação experimental usando o material genético de uma $NAME_Elderly_Tiyanki$ foi concluído com resultados interessantes: §H$restorative_enzymes$§!.\n\nAs enzimas restauradoras presentes no material genético da Matriarca podem ser reproduzidas em glândulas similares de outras criaturas. Isso transformará seu tecido estrutural em material regenerativo, algo muito útil em formações fechadas após uma explosão."
 grand_archive.10075.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10075.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10080.name: "Projeto de Mutação de Mortenascida Concluído"
 grand_archive.10080.desc: "Nosso projeto de mutação experimental usando o material genético de uma $NAME_Voidspawn$ foi concluído e rendeu uma descoberta interessante: §H$starborne_biology$§!.\n\nO tecido dessas criaturas reage intensamente à luz das estrelas e pode estimular o crescimento em outros organismos. Isso requer uma pequena manutenção de energia, mas aumenta significativamente sua taxa de crescimento quando próximo de estrelas brilhantes."
