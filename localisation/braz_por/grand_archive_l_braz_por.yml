 starborne_biology_desc: "Uma das principais fontes de energia para criaturas no espaço profundo é o poder da luz estelar. Quanto mais perto estiverem de estrelas brilhantes, mais rapidamente elas se desenvolverão."
 STARBORNE_BIOLOGY_TOOLTIP: "Substitui a manutenção por Energia\n\nVelocidade de Crescimento enquanto orbita uma estrela: §G+$@unique_mutation_starborne_growth_speed|0%$§!"
 tech_unique_mutation_starborne_biology: "$starborne_biology$"
 tech_unique_mutation_starborne_biology_desc: "$starborne_biology_desc$"
 berserker_glands_modifier: "O dano sofrido pelo Casco e pela Blindagem aumenta a Taxa de Disparos em: §Y$@unique_mutation_berserker_glands_fire_rate|0%$§! por $@unique_mutation_berserker_glands_days|0$ dias"
 BERSERKER_GLANDS_TOOLTIP: "$berserker_glands_modifier$"
 REPAIR_ARMOR_PERCENTAGE_EFFECT: "Repara $VALUE|Y%$ da Blindagem"
 space_amoeba_UNIQUE_MUTATION_PROJECT: "Projeto de Mutação de Amebas Espaciais"
 space_amoeba_UNIQUE_MUTATION_PROJECT_DESC: "Durante o processo de treinamento de organismos recém-clonados, uma Ameba Espacial ferida empregou uma técnica inovadora para derrotar seu oponente. Os flagelos da Ameba foram capazes de extrair nutrientes e materiais das defesas naturais de sua parceira de treinamento, usando-os para reparar sua própria blindagem e recuperar suas forças.\n\nMais pesquisas sobre esse fenômeno podem revelar um novo elemento da biologia das Amebas Espaciais que podemos aperfeiçoar para desenvolver uma nova mutação específica da espécie."
 tiyanki_UNIQUE_MUTATION_PROJECT: "Projeto de Mutação dos Tiyanki"
 tiyanki_UNIQUE_MUTATION_PROJECT_DESC: "Uma frota de Tiyanki recém-clonada foi observada em comunhão, emitindo repetidamente uma série de vocalizações complexas. Os sons, quase inaudíveis, parecem confortar e tranquilizar todas as criaturas próximas.\n\nMais pesquisas sobre esse fenômeno podem revelar um novo elemento da biologia dos Tiyanki que podemos aperfeiçoar para desenvolver uma nova mutação específica da espécie."
 voidworm_UNIQUE_MUTATION_PROJECT: "Projeto de Mutação de Vermes do Vazio"
 voidworm_UNIQUE_MUTATION_PROJECT_DESC: "Percebemos que alguns dos Vermes do Vazio tendem a desenvolver pequenos abcessos em forma de cisto quando atingem a maturidade. Observações detalhadas revelaram que espécimes com essas vesículas asquerosas são tipicamente mais férteis que seus parceiros.\n\nMais pesquisas sobre esse fenômeno podem revelar um novo elemento da biologia dos Vermes do Vazio que podemos aperfeiçoar para desenvolver uma nova mutação específica da espécie."
 cutholoid_UNIQUE_MUTATION_PROJECT: "Projeto de Mutação de Cutholoides"
 cutholoid_UNIQUE_MUTATION_PROJECT_DESC: "Em consequência da alimentação em demasia, um de nossos Cutholoides clonados foi visto regurgitando violentamente o conteúdo de seu estômago. Os fluidos digestivos resultantes mostraram-se fatais quando concentrados em um projétil, mantendo suas qualidades radioativas por um longo tempo fora do corpo da criatura.\n\nMais pesquisas sobre esse fenômeno podem revelar um novo elemento da biologia dos Cutholoides que podemos aperfeiçoar para desenvolver uma nova mutação específica da espécie."
 crystalline_entity_UNIQUE_MUTATION_PROJECT: "Projeto de Mutação de Entidades Cristalinas"
 crystalline_entity_UNIQUE_MUTATION_PROJECT_DESC: "Durante um teste de combate, algumas Entidades Cristalinas dividiram-se perfeitamente em duas partes quando destruídas. Essas metades fragmentadas sustentaram sinais vitais e continuaram a viver por um breve período."
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT: "Projeto de Mutação de $NAME_Elderly_Tiyanki$"
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT_DESC: "O material genético que recuperamos da $NAME_Elderly_Tiyanki$ forneceu algumas perspectivas particulares que nos permitirão dar seguimento a um projeto de mutação experimental que poderia ser aplicado a qualquer tipo de Fauna Espacial."
 voidspawn_UNIQUE_MUTATION_PROJECT: "Projeto de Mutação de Mortenascida"
 voidspawn_UNIQUE_MUTATION_PROJECT_DESC: "O material genético que recuperamos da $NAME_Voidspawn$ forneceu algumas perspectivas particulares que nos permitirão dar seguimento a um projeto de mutação experimental que poderia ser aplicado a qualquer tipo de Fauna Espacial."
 unique_mutation_project_unlock_desc: "Nossos esforços de clonagem de Fauna Espacial da classe [From.GetShipCategoryName] resultaram em uma descoberta no campo da genética. Talvez possamos combinar a anatomia singular dessas criaturas com nossa perícia em manipulação genética para criar um novo tipo de mutação."
