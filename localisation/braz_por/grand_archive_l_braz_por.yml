 treasure_hunters_origin_story_chain_desc: "Após descobrir um mapa misterioso para as estrelas, embarcamos em nossa maior aventura. Quem seria capaz de dizer o que nos aguarda no fim do §H$celestial_chart$§!, e que perigos enfrentaremos no caminho?"
 treasure_hunters_hidden_system_1_poi: "Procure por [prev.GetName]"
 treasure_hunters_hidden_system_1_poi_desc: "O mapa encontrado em uma antiga cápsula orbital revelou um sistema oculto, [prev.GetName]. Para saber mais, precisamos ir até lá."
 treasure_hunters_explore_system_1_poi: "Inspecione [treasure_hunters_hidden_system_1.GetName]"
 treasure_hunters_explore_system_1_poi_desc: "Com a derrota da frota §Y$NAME_BlackNeedle$§!, podemos dar continuidade à nossa busca. O §H$celestial_chart$§! nos trouxe até este sistema, e só podemos supor que a próxima parte do mapa está escondida aqui."
 black_needle_fleet_poi: "A Frota Agulha Negra"
 black_needle_fleet_poi_desc: "Fomos emboscados no sistema [from.GetName] por uma frota de piratas extremamente organizados. Eles querem roubar o nosso §H$celestial_chart$§! e estavam preparados para a nossa chegada."
 smeegibb_shelter_system_1_poi: "Procure por [prev.GetName]"
 smeegibb_shelter_system_1_poi_desc: "O §H$celestial_chart$§! revelou mais um sistema oculto, [prev.GetName]. Temos que viajar até lá e descobrir o que nos aguarda."
 smeegibb_shelter_system_2_poi: "Viaje para [smeegibb_system.GetName]"
 smeegibb_shelter_system_2_poi_desc: "Não conseguimos restabelecer as comunicações com $NAME_Smeegibb$. Deveríamos voltar para [smeegibb_system.GetName] e investigar a situação, pois essa é a nossa única pista para a próxima parte do §H$celestial_chart$§!. Ainda não sabemos a razão da interrupção repentina no contato."
 black_needle_fleet_2_poi: "Derrote a $NAME_CaptainInax$"
 black_needle_fleet_2_poi_desc: "A frota §Y$NAME_BlackNeedle$§! nos rastreou outra vez, interrompendo o contato com $NAME_Smeegibb$ e cercando o sistema [from.GetName]. Acreditamos que a quarta parte do §H$celestial_chart$§! esteja escondida em algum lugar da superfície de [smeegibb_shelter.GetName].\n\nTeremos que derrotar a frota inimiga para procurar pela cápsula."
