 tech_thrusters_bio_integration_desc: "Propulsores artificiais podem ser integrados a organismos espaciais com as devidas considerações quanto ao abastecimento de energia e conexões aos centros nervosos motores."
 tech_thrusters_bio_integration_effect: "§HLibera o Recurso:§! Aprimoramentos de Propulsores para Fauna Espacial"
 tech_hyper_drive_bio_integration: "Biointegração de Hiperpropulsores"
 tech_hyper_drive_bio_integration_desc: "A viagem através das hiperestradas pode ser perigosa para a vida espacial, mas podemos aprimorar suas capacidades."
 tech_hyper_drive_bio_integration_effect: "§HLibera o Recurso:§! Aprimoramentos de Hiperpropulsores para Fauna Espacial"
 tech_sensors_bio_integration: "Biointegração de Sensores"
 tech_sensors_bio_integration_desc: "Os diversos órgãos sensoriais da vida espacial podem ser aprimorados por nossas tecnologias com o mínimo de dano ao organismo."
 tech_sensors_bio_integration_effect: "§HLibera o Recurso:§! Aprimoramentos de Sensores para Fauna Espacial"
 tech_combat_computers_bio_integration: "Biointegração de Computadores de Combate"
 tech_combat_computers_bio_integration_desc: "Podemos desenvolver neurochips especializados para influenciar o comportamento da Fauna Espacial envolvida em combates de frotas em larga escala."
