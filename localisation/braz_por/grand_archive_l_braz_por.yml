 grand_archive.4121.name: "$leviathans.500.name$"
 grand_archive.4121.desc.common: "informações de que vocês construíram um §Y$grand_archive$§! capaz de acolher um público maciço. Essa é uma iniciativa louvável para o compartilhamento da história de nossa galáxia com todos que buscam conhecimento. Partilhamos de ideais semelhantes.\n\nTemos interesse em ajudar vocês nessa empreitada."
 grand_archive.4121.desc.default: "Nós recebemos $grand_archive.4121.desc.common$ Continuem a expandir sua §YColeção§!, e ofereceremos ajuda da forma que pudermos."
 grand_archive.4121.desc.dead: "Os últimos de nossa ordem receberam $grand_archive.4121.desc.common$ Embora nossa ordem tenha sido desfeita recentemente, usaremos os recursos que nos restam para oferecer ajuda enquanto vocês expandem sua §YColeção§!."
 leviathans.4100.desc: "Certamente!\n\nSeus esforços foram percebidos. Com base em sua §YColeção§! atual, podemos oferecer a seguinte assistência em troca de uma pequena doação."
