 grand_archive.4105.desc.3.common_2: "Claro, um artigo tão valioso requer uma doação substancial..."
 CURATORS_STAGE_3_DESC: "Vocês podem escolher um objeto poderoso de nossa coleção mais estimada. Temos certeza de que ele estará em boas mãos.\n\n$grand_archive.4105.desc.3.common_2$"
 DEAD_CURATORS_STAGE_3_DESC: "Esses objetos poderosos estavam guardados em esconderijos por toda a galáxia, o que os permitiu sobreviver à destruição de nossa estação.\n\n$grand_archive.4105.desc.3.common_2$ Não podemos reconstruir com boa-fé apenas."
