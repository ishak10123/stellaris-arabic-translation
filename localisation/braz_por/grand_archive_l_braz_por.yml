 ### Primal Calling
 origin_primal_calling: "Chamado Primitivo"
 origin_primal_calling_desc: "O farfalhar da grama. O silêncio ensurdecedor da noite. A determinação do caçador, astuto e frio como a luz das estrelas...\n\nEsta civilização tem uma conexão primordial com a natureza. Considerando-se os guardiões da diversa (e por vezes mortal) vida selvagem de seu mundo, eles agora voltam sua atenção para o céu. Mestres do adestramento e da criação de animais, essa relação com a fauna se desenvolveu de acordo com sua ética. Como tal vínculo evoluirá para uma escala galáctica, só o tempo dirá."
 origin_tooltip_primal_calling_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$ ['concept_untamed_wilds_mod']\n- $HOME_SYSTEM$ §YFauna Espacial§! em um sistema vizinho\n- $AVAILABLE_BUILDINGS$ ['concept_wildlife_ranch', £building£ $wildlife_ranch$]\n- Pode escolher uma ['concept_primal_calling_stance'] em relação à §YFauna Espacial§! durante o Primeiro Contato\n- $ADDITIONAL_TECHNOLOGIES_STRING$ ['technology:tech_genome_mapping', £society_research£ $tech_genome_mapping$]\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_alien_life_studies', £society£ $tech_alien_life_studies$]\n- Ganha conhecimento sobre ['technology:tech_gravity_wells', £physics_research£ $tech_gravity_wells$] após o Primeiro Contato com a Fauna Espacial\n- Ganha conhecimento sobre ['technology:tech_alien_cloning', £society_research£ $tech_alien_cloning$] após capturar a Fauna Espacial\n- Ganha conhecimento sobre ['technology:tech_controlled_mutations', £society_research£ $tech_controlled_mutations$] após clonar a Fauna Espacial"
 START_SCREEN_PRIMAL_CALLING: "Apesar do rápido progresso tecnológico, permanecemos conectados às criaturas silvestres em nosso mundo. Companheiras constantes ao longo de nossa evolução, elas são nossas mentoras assim como somos seus guardiões. Não tomamos delas mais do que podem nos dar, e seus sacrifícios são venerados.\n\nNas vastidões indômitas do espaço, podemos descobrir novos seres selvagens, e os trataremos com o mesmo respeito destinado às criaturas de nosso mundo. Eles aprenderão seu lugar, assim como aprenderemos o nosso, para que possamos crescer juntos.\n\nConvocados pelas estrelas, um desejo primitivo arde em nosso âmago. Enfrentaremos com convicção o que quer que exista lá fora."
 leader_trait_trophy_hunter: "Caçador de Troféus"
 leader_trait_trophy_hunter_desc: "Fortalecido pelas dificuldades e munido de uma vida inteira de experiência, este comandante tem uma compreensão inigualável da Fauna Espacial. O segredo para uma caçada próspera é pensar como a presa; porém, é claro, apenas um disparo perfeito resultará em um troféu perfeito."
 leader_trait_gifted_trapper: "Capturador Talentoso"
 leader_trait_gifted_trapper_desc: "Um pesquisador talentoso que conduz com o máximo cuidado a captura e o transporte de espécimes vivos. O compromisso deste líder com o bem-estar das criaturas inspira outros a melhorarem os critérios de pesquisa em todas as disciplinas."
 leader_trait_void_hunter: "Caçador do Vazio"
 leader_trait_void_hunter_desc: "Um caçador experiente e bem-equipado para caçar presas grandes. Paciente em sua abordagem e preciso em seu ataque."
 leader_trait_void_hunter_2: "$leader_trait_void_hunter$ II"
 leader_trait_void_hunter_2_desc: "$leader_trait_void_hunter_desc$"
 leader_trait_void_tracker: "Rastreador do Vazio"
 leader_trait_void_tracker_desc: "O talento deste líder para capturar Fauna Espacial selvagem de modo eficaz e seguro é incomparável."
 leader_trait_void_tracker_2: "$leader_trait_void_tracker$ II"
 leader_trait_void_tracker_2_desc: "$leader_trait_void_tracker_desc$"
 #First Contacts
 first_contact_critters.15.desc.primal_calling: "Notadamente, existe uma hierarquia matriarcal no centro de cada manada §HTiyanki§!, onde uma única vaca lidera o grupo por vez. As fêmeas têm prioridade em relação a todos os recursos de comida, o que lhes permite produzir gases maternos para as crias e conduzir as migrações da manada. Dessa forma, os touros abdicam dos alimentos quando os recursos estão escassos, o que os encoraja a buscar mais comida enquanto o grupo descansa."
 first_contact_critters.25.desc.primal_calling: "Com exceção dos espécimes mais jovens, todos os indivíduos são acompanhados por organismos semi-independentes controlados por secreções compostas de RNA. Esses \"flagelos\" atacam em padrões complexos, de modo que apesar de sua aparente ausência de sapiência, as §H\"Amebas Espaciais\"§! são predadoras naturais aptas."
 first_contact_critters.35.desc.primal_calling: "Essas criaturas parecem se comunicar entre si por meio de alterações cromáticas da luz refratada. Embora essa forma de comunicação apresente um alto potencial para expressões complexas, ela é utilizada de maneira rudimentar por essas formas de vida semissencientes. As mudanças de cor podem ser usadas para indicar posição social, agressão e até mesmo níveis de fertilidade."
 grand_archive.2005.desc.primal_calling: "Essas criaturas parasíticas não dispõem da habilidade natural para a reprodução e dependem da aquisição de hospedeiros planetários. Matéria orgânica suficiente deve ser coletada de planetas habitados para que os §H\"Vermes do Vazio\"§! produzam um hormônio essencial em seus trios de acasalamento, conhecidos como \"troikas\". Por serem criaturas hermafroditas, a escolha de parceiros é determinada primariamente pelas características físicas complementares e tamanho semelhante."
 grand_archive.2900.desc.primal_calling: "Acreditamos que as criaturas escolhem seus asteroides com base na composição mineral, bem como no tamanho. Embora o primeiro espécime que encontramos tenha uma preferência biológica por [GetCommonMineral], é provável que cada indivíduo desenvolva essa adaptação com o tempo e de acordo com o ambiente. Análises mostram que traços desse metal estão presentes em todo o asteroide hospedeiro, assim como no interior do sistema nervoso e trato digestivo do próprio §H\"Cutholoide\"§!."
 COMMON_MINERAL_1: "cobalto"
 COMMON_MINERAL_2: "platina"
