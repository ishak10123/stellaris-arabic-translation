 grand_archive.4105.name: "$leviathans.500.name$"
 grand_archive.4105.desc.common.aesthetic_wonder: "Seus esforços na coleta e preservação de espécimes de §Y$EXHIBITION_AESTHETIC_WONDERS$§! foram percebidos por [GetCuratorsDesignation]. Há beleza em todos os lugares da galáxia. Basta saber onde procurar."
 grand_archive.4105.desc.common.historical_item: "Seus esforços na coleta e preservação de espécimes de §Y$EXHIBITION_GALACTIC_HISTORY$§! foram percebidos por [GetCuratorsDesignation]. A dádiva da imortalidade recai sobre aqueles cujos objetos você preserva."
 grand_archive.4105.desc.common.xeno_geology: "Seus esforços na coleta e preservação de espécimes de §Y$EXHIBITION_XENO_GEOLOGY$§! foram percebidos por [GetCuratorsDesignation]. A história de nossa galáxia está frequentemente oculta em suas rochas e pedras."
