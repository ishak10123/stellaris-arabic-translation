 grand_archive.4105.desc.3.no_relic.common: "Normalmente, teríamos concedido a vocês um de nossos artefatos mais preciosos, mas outros na galáxia foram mais rápidos e os tomaram.\n\nComo consolação, vocês podem escolher um destes itens."
 grand_archive.4105.desc.3.no_relic.xeno_geology: "Sua dedicação à preservação da §YXenogeologia§! é quase inigualável.\n\n$grand_archive.4105.desc.3.no_relic.common$"
