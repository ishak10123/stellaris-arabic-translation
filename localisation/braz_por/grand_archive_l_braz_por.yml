 grand_archive.1165.name: "Vermes do Vazio Mutantes Destruídos"
 grand_archive.1165.desc.common: "Sem esperar pelo ataque inevitável, nós lançamos uma campanha militar bem-sucedida contra os Vermes do Vazio mutantes em seu sistema natal. As criaturas não ameaçarão mais [frenzied_voidworms_target.GetName], e a segurança de nosso planeta"
 grand_archive.1165.desc.default: "$grand_archive.1165.desc.common$ e do ecossistema galáctico está garantida.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.desc.homicidal: "$grand_archive.1165.desc.common$ está garantida.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.a: "Um triunfo."
 grand_archive.1170.name: "Vermes do Vazio Mutantes Eliminados"
 grand_archive.1170.desc.common: "Os Vermes do Vazio mutantes foram eliminados. As criaturas não ameaçarão mais [frenzied_voidworms_target.GetName], e a segurança de nosso planeta"
 grand_archive.1170.desc.default: "$grand_archive.1170.desc.common$ e do ecossistema galáctico está garantida.\n\n$frenzied_voidworms_killed.desc.common$"
