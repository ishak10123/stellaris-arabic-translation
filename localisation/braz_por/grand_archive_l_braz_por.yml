 grand_archive.7210.name: "Armadilhas Gravitacionais"
 grand_archive.7210.desc.common: "Após a recente descoberta das §Y$tech_gravity_wells$§!, as naves científicas do povo [root.GetAdjective] são agora capazes de lançar $gravity_snare_plural$."
 grand_archive.7210.desc.vivarium: "Estes projéteis não letais são capazes de capturar e transportar Fauna Espacial para o nosso §YViveiro§!, onde os espécimes poderão procriar.\n\nAo abater e dissecar essas criaturas, poderemos coletar seu §Y$genetic_material$§! para a clonagem, além de outros recursos."
 grand_archive.7210.desc.no_vivarium: "Estes projéteis não letais são capazes de capturar e transportar Fauna Espacial para estudo e dissecação, coletando seu §Y$genetic_material$§! e recursos.\n\nSe quisermos manter as criaturas vivas para a procriação, teremos que estabelecer um §YViveiro§!. Para isso, devemos construir um §Y$grand_archive$§! ou §Y[GetHatcheryPlural]§! em nossas bases estelares."
 grand_archive.7220.name: "Feras Prethoryn"
 grand_archive.7220.desc: "Nossas §Y$gravity_snare_plural$§! são incapazes de rastrear e conter de maneira satisfatória a §Y$NAME_Prethoryn_Scourge$§!. Com base em seus padrões de movimento, acreditamos que esses seres são controlados por algum tipo de consciência superior, e não são entidades individuais.\n\nTentar conter um desses organismos em um Viveiro colocaria em risco outros espécimes e até mesmo [this.GetName].\n\nSuspendemos as operações de captura desses organismos por tempo indeterminado."
 grand_archive.7220.a: "Uma decisão prudente."
