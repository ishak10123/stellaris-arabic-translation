 resolution_galactic_focus_crisis_voidworm_plague: "Foco: A Praga de Vermes do Vazio"
 resolution_galactic_focus_crisis_voidworm_plague_desc: "Os Vermes do Vazio parasitas são uma ameaça à galáxia. Se não nos unirmos para pôr um fim a isso, eles consumirão todos nós. Devemos fazer desta crise o Foco Galáctico."
 resolution_galactic_focus_crisis_voidworm_plague_effect_success: "$resolution_galactic_focus_crisis_effect_success$"
 galactic_focus_crisis_voidworm_plague: "Derrote a Praga de Vermes do Vazio"
 galactic_focus_crisis_voidworm_plague_desc: "A praga de Vermes do Vazio põe em risco a galáxia inteira. Devemos nos unir e derrotar essa ameaça parasítica."
 gal_com_crisis_voidworm_pop_victims: "Os Vermes do Vazio causaram danos significativos às populações em seu território."
