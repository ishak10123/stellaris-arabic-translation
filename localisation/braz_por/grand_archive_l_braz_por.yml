 FEDERATION_CREATURE_FLEET_DESC: "§HFrotas da Federação§! são frotas especiais controladas pelo Presidente da Federação. Elas são projetadas na §H$CREATURE_DESIGNER$ da Federação§! e podem utilizar qualquer tecnologia disponível a qualquer membro da Federação. Frotas da Federação não possuem manutenção, mas não podem exceder a §HCapacidade Naval da Federação§!, para a qual cada membro contribui com pelo menos §Y$PERC|0%$§! de sua própria §HCapacidade Naval§!. Se as frotas de Fauna Espacial ultrapassarem a §HCapacidade Naval da Federação§!, as criaturas excedentes serão entregues ao Presidente da Federação."
