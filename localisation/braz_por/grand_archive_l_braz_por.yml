 ###########################
 #Space Fauna Description #
 ###########################
 space_amoeba_desc: "Amebas Espaciais são predadoras solitárias e atacam tudo que encontram. Utilizando crias parcialmente formadas conhecidas como \"flagelos\", essas criaturas são adeptas no rastreamento de presas."
 tiyanki_desc: "Tiyanki, também conhecidas como \"Baleias Espaciais\", são criaturas tipicamente dóceis que pastam nos gases atmosféricos. Esses seres são extremamente sociais e as manadas selvagens organizam-se sob uma rígida hierarquia."
 voidworm_desc: "Vermes do Vazio são organismos parasíticos que precisam depositar esporos em mundos habitados com uma biomassa suficiente para se reproduzirem. Indivíduos adultos procriam em trios conhecidos como \"Troikas\" e fazem ninhos próximos de buracos negros para proteger e criar seus filhotes."
 cutholoid_desc: "Cutholoides são organismos colossais que habitam asteroides para proteger seus corpos macios. Essas criaturas engolem suas presas por completo, usando fluidos digestivos radioativos para consumi-las lentamente."
 crystalline_entity_desc: "Entidades Cristalinas são uma forma única de seres de silicato animada que podem se impulsionar livremente pelo espaço. A coloração de cada entidade varia não com a idade, mas devido à sua carga latente interna."
 wild_tiyanki_ox_modifier: "Boi Tiyanki Selvagem"
 fauna_disengagement_modifier: "Separação de Fauna Espacial"
