 grand_archive.4515.stolen: "Infelizmente, não conseguimos recuperar nossos valiosos espécimes."
 grand_archive.4515.freed: "Alguns indivíduos da Fauna Espacial em cativeiro foram soltos. Muitos estão confusos e agressivos."
