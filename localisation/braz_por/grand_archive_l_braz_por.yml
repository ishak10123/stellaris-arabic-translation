 resolution_voidworm_eradication: "Erradicação de Vermes do Vazio"
 resolution_voidworm_eradication_desc: "Os parasíticos Vermes do Vazio são um flagelo na galáxia e uma ameaça aos mundos habitados. Seu ciclo natural de vida perturba o equilíbrio do ecossistema galáctico e a espécie deve ser erradicada."
 resolution_voidworm_eradication_tooltip: "Qualquer império com §Y$NAME_Voidworms$§! dentro de suas fronteiras estará §RViolando a Lei Galáctica§! até que todas as criaturas saiam por conta própria ou sejam destruídas."
 resolution_repeal_voidworm_eradication: "§RRevogar a $resolution_voidworm_eradication$§!"
 resolution_repeal_voidworm_eradication_desc: "Não é direito d[global_event_country.GetOAGalCommImp] [global_event_country.GetGalCommunityOrGalImperium] aniquilar a espécie dos Vermes do Vazio."
 resolution_repeal_voidworm_eradication_effect_success: "Revoga a §Y$resolution_voidworm_eradication$§!."
 grand_archive.2103.name: "$resolution_voidworm_eradication$"
 grand_archive.2103.desc: "Uma declaração d[global_event_country.GetOAGalCommImp] [global_event_country.GetGalCommunityOrGalImperium] afirma que os Vermes do Vazio não são mais permitidos nos sistemas de seus membros.\n\nAté que eles sejam eliminados ou saiam por vontade própria, o império [this.GetName] estará §RViolando a Lei Galáctica§!."
 grand_archive.2105.name: "$NAME_Voidworms$ no Espaço [this.GetSpeciesName]"
 grand_archive.2105.desc: "Uma frota de Vermes do Vazio entrou em nosso espaço no sistema [from.GetName]. Como membros d[global_event_country.GetOAGalCommImp] [global_event_country.GetGalCommunityOrGalImperium], temos a obrigação legal de sacrificar imediatamente qualquer Verme do Vazio dentro de nossas fronteiras.\n\nO império [this.GetName] estará §RViolando a Lei Galáctica§! até que os Vermes do Vazio tenham deixado nosso espaço ou sejam exterminados."
 grand_archive.2107.desc: "A presença contínua de Vermes do Vazio em nosso sistema [invaded_system.GetName] é uma grave §RViolação da Lei Galáctica§! sob a resolução $resolution_voidworm_eradication$. Como resultado, [global_event_country.GetOAGalCommImp] [global_event_country.GetGalCommunityOrGalImperium] permitiu que membros votem na imposição de sanções sobre [this.GetName]."
 bombardment_damage_moderate: "§YModerado§!"
 bombardment_damage_massive: "§RMaciço§!"
 bombardment_voidworm_invasion_desc_common: "$bombardment_voidworm_invasion$ destroem populações e criam novas Ninfas de Verme do Vazio.\n- Dano §YModerado§! a §YExércitos§!\n- Dano [GetVoidwormFleetBombardmentDamageIntensity] a §YPlanetas§! até §Y25%§! de devastação\n- Dano §YModerado§! a §YPops§!"
