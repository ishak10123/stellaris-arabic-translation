 r_everchanging_stone: "Pedra Impermanente"
 r_everchanging_stone_desc: "Uma joia projetada que muda de cor e composição química de acordo com o ambiente. Quando colocada perto de outro objeto, ela mimetiza os elementos do material deste e nos permite compreender melhor a composição molecular do objeto."
 everchanging_stone_modifier: "Triunfo da $r_everchanging_stone$"
 everchanging_stone_modifier_tt: "Para cada ['concept_specimen'] exibido na exposição de $EXHIBITION_XENO_GEOLOGY$, a produção das outras duas categorias aumenta em §G+$@everchanging_stone_modifier|0%$§!."
 r_pulsestone: "Pedra Pulsante"
 r_pulsestone_desc: "Uma pedra altamente radioativa que cria perigosas ondas de força magnética. Isso tem o potencial para revolucionar o nosso entendimento da manipulação de campo, mas a energia emitida é quase impossível de conter."
 pulsestone_modifier: "$r_pulsestone$"
 mod_scientist_lifespan_add: "Expectativa de Vida dos Cientistas"
 r_gavel_of_the_tribunal: "Martelo do Tribunal"
 r_gavel_of_the_tribunal_desc: "Inscritos no punho deste martelo estão os nomes de um antigo triunvirato de mentes que governou uma galáxia há muito morta. Embora seja grande demais para qualquer indivíduo de nossa espécie manipular, sua mera presença evoca imensa reverência."
 gavel_of_the_tribunal_galcom: "$r_gavel_of_the_tribunal$"
 gavel_of_the_tribunal_galcom_tt: "§G+$@gavel_of_the_tribunal_galcom_diplo_weight|0%$§! de £diplo_weight£ Peso Diplomático até a próxima §YResolução§! ser aprovada."
 gavel_of_the_tribunal_no_galcom: "$r_gavel_of_the_tribunal$"
 r_celestial_resonator: "Ressonador Celestial"
 r_celestial_resonator_desc: "Um estranho dispositivo que gera enormes espetáculos de luz fascinantes e ganha potência quando colocado perto de espécimes."
 celestial_resonator_tt: "Produz 10 de $r_unity$ para cada ['concept_specimen'] em exibição"
 celestial_resonator_triumph_tt: "Ganha §G+$@celestial_resonator_happiness|0%$§! de £happiness£ §YFelicidade§! e §G+$@celestial_resonator_diplo_weight|0%$§! de £diplo_weight£ §YPeso Diplomático§! para cada ['concept_specimen'] em exibição"
 celestial_resonator_modifier: "$r_celestial_resonator$"
 r_entangled_relay: "Transmissores Emaranhados"
 r_entangled_relay_desc: "Este antigo objeto é capaz de conectar redes de transmissão de informações distantes por meio do emaranhamento quântico, permitindo uma perfeita comunicação galáctica."
 entangled_relay_modifier: "$r_entangled_relay$"
 r_prototype_vir_core: "Núcleo de Protótipo VIR"
 r_prototype_vir_core_desc: "Esta inteligência artificial isolada é um professor e mentor particularmente eficaz, capaz de auxiliar em praticamente qualquer situação. Ele descreve explicações complicadas em termos simples, fornecendo informações de forma clara para que o usuário tome decisões embasadas."
 prototype_vir_core_modifier: "$r_prototype_vir_core$"
 r_propagandosphere: "Propagandosfera"
 r_propagandosphere_desc: "Esta esfera holográfica contém um arquivo de filmes de propaganda de uma civilização há muito esquecida. Incrivelmente inventivos e cativantes, eles podem ser reformulados à nossa imagem para inspirar nossas tropas e nosso povo."
 r_executus_compendium: "Executus Compendium"
 r_executus_compendium_desc: "Estes extensos registros do conselho de uma antiga civilização foram preservados em uma cápsula hermética. Dentro de suas trilhões de páginas estão detalhadas otimizações burocráticas e ferramentas organizacionais inovadoras. Muitas dessas melhorias poderiam ser implementadas em nossos processos governamentais."
 executus_compendium_triumph_tt: "Lança o Interesse por 10% do seu custo inicial de lançamento. (Custo mínimo de £unity£ 3.000)"
 r_the_pattern_maker: "O Criador de Padrões"
 r_the_pattern_maker_desc: "Esta antiga calculadora tem uma capacidade inigualável para monitorar trajetórias dinâmicas e prever como objetos como as naves inimigas se comportarão. Os padrões de dados computados por seus algoritmos de previsão são tão profundamente complexos quanto os projetos de um arquiteto mestre. Com energia e materiais suficientes, ele pode produzir uma nave de reconhecimento equipada com sensores de alta potência."
 r_the_pattern_maker_effect_tt: "Cria uma Nave de Reconhecimento Classe §YApuradora de Padrões§!.\n - Alta velocidade e Faixa de Detecção de Hiperestrada"
 NAME_Patternwalker: "Apuradora de Padrões"
 NAME_Patternwalker_Cloak: "$NAME_Patternwalker$"
 SENSOR_PATTERNWALKER: "Sensores de Padrões Precógnitos"
 r_vaporous_mega_orchid: "Megaorquídea Vaporosa"
 r_vaporous_mega_orchid_desc: "Esta gigantesca orquídea floresce apenas uma vez a cada 50 anos. Seu aroma é conhecido por produzir um efeito tranquilizante que bloqueia temporariamente as sinapses mentais que causam agressão e desconfiança."
 r_vaporous_mega_orchid_effect_tt: "§G+$@vaporous_mega_orchid_opinion|0$§! de £opinion£ opinião com todos os impérios não homicidas, não Caídos e não Maquinários por §Y$@vaporous_mega_orchid_opinion_duration_years|0$§! anos."
 opinion_vaporous_mega_orchid: "$r_vaporous_mega_orchid$"
 r_tiyanki_matriarch_nerve_core: "Núcleo Nervoso de Matriarca Tiyanki"
 r_tiyanki_matriarch_nerve_core_desc: "A massa cerebral desta antiga baleia espacial contém séculos de dados evolutivos codificados em seus neurônios. Ao decodificar essa rede, poderemos descobrir vulnerabilidades em outros superpredadores, além de desvendar os segredos de sua sobrevivência."
 tiyanki_matriarch_nerve_core: "$r_tiyanki_matriarch_nerve_core$"
 celestial_chart: "Mapa Celestial"
 r_celestial_chart_0: "Cápsula Orbital Misteriosa"
 r_celestial_chart_0_desc: "Uma cápsula peculiar que orbita nosso mundo natal há milhares de anos. Ainda não sabemos quais informações ela contém."
 r_celestial_chart_1: "$celestial_chart$"
 r_celestial_chart_1_desc: "A primeira parte de um extenso mapa encontrado dentro de uma cápsula antiga."
 r_celestial_chart_2: "$celestial_chart$"
 r_celestial_chart_2_desc: "Um mapa incompleto encontrado dentro de uma cápsula antiga."
 r_celestial_chart_3: "$celestial_chart$"
 r_celestial_chart_3_desc: "Um mapa quase completo encontrado dentro de uma cápsula antiga."
 r_celestial_chart_4: "$celestial_chart$"
 r_celestial_chart_4_desc: "Uma extensa carta estelar e banco de dados criados pela lendária pirata $NAME_CaptainNess$."
 r_celestial_chart_4_effect_tt: "Estabelece um ['concept_treasure_vault'] em uma de nossas colônias."
 celestial_chart_upgraded_tt: "O §Y$celestial_chart$§! foi aprimorado com novas informações."
 r_mutated_voidworm_nest: "Ninho de Vermes do Vazio Mutantes"
 r_mutated_voidworm_nest_desc: "Um ninho de Vermes do Vazio mutantes que evoluíram para procriar sem a necessidade de uma infecção parasítica. Algumas dessas crias podem atingir a idade adulta em questão de dias."
 r_mutated_voidworm_nest_effect_tt: "Gera uma frota de $NAME_Frenzied_Voidworms$ Adultos no sistema capital"
