 alert_space_fauna_bombardment_title: "Vermes do Vazio estão bombardeando nossa colônia!"
 alert_space_fauna_bombardment_instant: "Nossa colônia está sendo bombardeada por parasitas galácticos!\nEles carregam consigo um número limitado de esporos para distribuir em colônias povoadas e logo partirão."
 ALERT_SPACE_FAUNA_BOMBARDMENT_DETAIL: "$PLANET_NAME|Y$ em $SYSTEM_NAME|Y$. Pops restantes a serem consumidos: §Y$POPS_TO_KILL$§!."
 grand_archive.2195.name: "Parasitas Galácticos"
 grand_archive.2195.desc.common_1: "[from.GetName] está sob ataque.\n\nUm grande grupo de Vermes do Vazio está orbitando a colônia, bombardeando-a com cistos parasíticos."
 grand_archive.2195.desc.common_2: "Uma análise biológica indica que cada grupo de Vermes do Vazio tem um número limitado de cistos para distribuir, e provavelmente partirá assim que todos forem lançados. Até lá, sofreremos uma perda populacional considerável."
 grand_archive.2195.desc.default: "$grand_archive.2195.desc.common_1$\n\nCada cisto contém um esporo tóxico e extremamente letal não apenas para os nossos colonizadores, mas para todas as formas de vida. Uma vez ingerido, o esporo rapidamente gesta uma ninfa que emergirá violentamente destruindo seu hospedeiro. Essas ninfas têm uma bexiga com gases comprimidos que permite que flutuem até a atmosfera superior, onde elas se impulsionam instintivamente até um local pré-determinado.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.desc.rocks: "$grand_archive.2195.desc.common_1$\n\nCada cisto contém um esporo tóxico extremamente letal para toda a fauna nativa. Quando ingerido, ele rapidamente gesta uma ninfa que emergirá violentamente destruindo seu hospedeiro. As ninfas, que normalmente se alimentam dos metais preciosos de asteroides, são caçadoras oportunistas e atacam [this.GetColonistPlural] vulneráveis. Cada cria tem uma bexiga com gases comprimidos que permite que flutuem até a atmosfera superior, onde ela se impulsiona instintivamente até um local pré-determinado.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.a: "Perturbador."
 grand_archive.2195.a.homicidal: "Elas perecerão."
 ap_galactic_contender_voidworms_tt: "$MOD_DIPLO_WEIGHT_MULT$: §G+20%§!\n$mod_damage_vs_country_type_fallen_empire_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_awakened_fallen_empire_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_gate_builders_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!"
 ap_defender_of_the_galaxy_voidworm_modifier_desc: "$mod_damage_vs_country_type_voidworms_mult$: §G+$@ap_defender_of_the_galaxy_voidworm_dmg_mult|0%$§!\n$ap_defender_of_the_galaxy_modifier_desc$"
