 crystalline_entity_plural: "Entidades Cristalinas"
 grand_archive.1002.name: "Vida nas Estrelas"
 grand_archive.1002.desc.default: "O vazio está repleto de vida. Descobrimos a existência de [from.GetSpaceFaunaNamePlural], mas o que mais espreita lá fora?\n\nNossa estreita relação com a vida selvagem em [capital_scope.GetName] pode não ser adequada quando aplicada a uma escala galáctica. O vazio do espaço representa um ecossistema inteiramente novo, e agora nos deparamos com uma encruzilhada.\n\nO que essas criaturas significam para nós?\n\nSeja qual for a nossa escolha, sua consequência será sentida por muitos anos."
 grand_archive.1002.desc.homicidal: "O vazio pode estar repleto de vida - vida essa que podemos extinguir ou explorar. Após termos descoberto a existência de [from.GetSpaceFaunaNamePlural], estamos ávidos para saber mais. Novas presas ou bestas de carga: a escolha é nossa."
 grand_archive.1002.a: "Espécimes a serem exibidos."
 grand_archive.1002.b: "Gado a ser explorado."
 grand_archive.1002.c: "Organismos que devem ser protegidos."
 grand_archive.1002.d: "Novas presas a serem caçadas."
 grand_archive.1002.d.purifier: "Corpos para a pilha."
 grand_archive.1002.e: "Mais mentes para assimilar."
 grand_archive.1002.f: "Parceiros de simbiose."
 grand_archive.1002.g: "Presas e troféus."
 untamed_wilds: "Natureza Selvagem"
 untamed_wilds_desc: "Grandes expansões de território protegido onde a vida selvagem se prolifera, fornecendo um suprimento sustentável de criaturas nativas."
 grand_archive.1010.desc: "Nossa colônia em [Root.GetName] aprendeu a respeitar os limites do território natural da §YVida Titânica§! nativa.\n\nEssas feras gigantescas serão um benefício para o nosso assentamento enquanto expandimos nossas fronteiras e trabalhamos a terra."
 grand_archive.1010.a: "Nossa equipe de [owner.GetWranglerJobNamePlural] se dará bem aqui."
