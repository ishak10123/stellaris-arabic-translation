 grand_archive.9005.desc: "§Y[fromfrom.GetName]§!, que atuava no cargo de §H[fromfrom.GetClass]§!, foi vítima de uma missão de captura por agentes de [from.GetName] durante uma batalha em [fromfromfrom.GetName]. Estão exigindo um resgate em troca de sua vida."
 grand_archive.9005.desc.second: "Como relatado, [fromfrom.GetName], que atuava no cargo de Comandante, foi vítima de uma captura por [from.GetName] e estão exigindo um pagamento em troca de sua vida."
