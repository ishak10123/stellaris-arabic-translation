 #Homicidal considerations #
 #Fanatic Purifiers
 grand_archive.4135.name: "Quinquilharias de Nossos Inferiores"
 grand_archive.4135.desc: "Enquanto continuamos nossos esforços para limpar este mundo da escória dos xenos, nossa coleção de troféus de [GetCollectionRewardCategory] cresce.\n\nQue essas exibições sirvam como a carcaça desta galáxia contaminada e nos inspire cada vez mais em nossa missão."
 grand_archive.4135.desc.geology: "$grand_archive.4135.desc$"
 grand_archive.4135.desc.aesthetic: "$grand_archive.4135.desc$"
 grand_archive.4135.a: "Pela glória de [this.GetName]!"
 grand_archive.4140.name: "Bugigangas Acumuladas"
 grand_archive.4140.desc.geology: "Continuamos a acumular objetos de [GetCollectionRewardCategory], bugigangas e esquisitices desta galáxia imunda.\n\nVamos parar e admirar nossos troféus, mas sabendo que ainda há muito mais para tomar."
 grand_archive.4140.desc.aesthetic: "Continuamos a acumular quinquilharias de [GetCollectionRewardCategory], restos da contaminação semeada por formas de vida inferiores.\n\nQuando todos os xenos repugnantes tiverem sido expurgados das estrelas, esses itens nos lembrarão de sua natureza inferior."
 grand_archive.4140.a: "Esta galáxia deve ser purificada."
 grand_archive.4145.name: "Mostruário de Troféus Cheio"
 grand_archive.4145.desc.geology: "Nós ocupamos nossos depósitos com objetos de [GetCollectionRewardCategory], a antiga carne desta galáxia.\n\nConsideramos essa vasta coleção como um registro da destruição que provocamos. Deixem que todos vejam o nosso triunfo."
 grand_archive.4145.desc.aesthetic: "Nós ocupamos nossos depósitos com curiosidades de [GetCollectionRewardCategory], uma verdadeira fortuna de ornamentos xenos irrelevantes.\n\nObservamos essa coleção e gargalhamos da natureza patética de nossos inferiores. Uma vez que todos tenham sido exterminados, esses mostruários serão tudo que resta deles."
 grand_archive.4145.a: "Um brinde à morte!"
 #Devouring Swarm
 grand_archive.4136.name: "Fome de Bugigangas"
 grand_archive.4136.desc: "A fome é interminável. Nossa coleção de curiosidades de [GetCollectionRewardCategory] cresceu durante nossa campanha de destruição.\n\nQue essas exibições sirvam como as últimas lembranças da galáxia que devoramos."
 grand_archive.4136.desc.geology: "$grand_archive.4136.desc$"
 grand_archive.4136.desc.aesthetic: "$grand_archive.4136.desc$"
 grand_archive.4136.a: "Fome sem fim."
 grand_archive.4141.name: "$grand_archive.4136.name$"
 grand_archive.4141.desc.common: "Enquanto nos alimentamos, esses itens servirão como um lembrete dos incontáveis banquetes que consumimos."
 grand_archive.4141.desc.geology: "Continuamos a acumular espécimes de [GetCollectionRewardCategory], pedaços antigos da carne desta galáxia.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.desc.aesthetic: "Continuamos a acumular quinquilharias de [GetCollectionRewardCategory], curiosidades outrora estimadas por formas de vida inferiores.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.a: "O banquete continua."
 grand_archive.4146.name: "Memórias de Nossa Refeição"
 grand_archive.4146.desc: "Enquanto banqueteamos tão profusamente nesta galáxia, preenchemos nossos depósitos com curiosidades de [GetCollectionRewardCategory].\n\nEssa vasta coleção serve apenas como um lembrete de nossa fome insaciável. Quando esta galáxia tiver sido inteiramente devorada, olharemos para esses itens e saborearemos as memórias."
 grand_archive.4146.desc.geology: "$grand_archive.4146.desc$"
 grand_archive.4146.desc.aesthetic: "$grand_archive.4146.desc$"
 grand_archive.4146.a: "Que delícia."
 #Determined Exterminators
 grand_archive.4137.name: "Quinquilharias de Valor Percebido"
 grand_archive.4137.desc: "Reunimos uma seleção de itens de [GetCollectionRewardCategory] que os orgânicos acreditam ter valor como artefatos únicos.\n\nSob nosso monitoramento, esses artigos perdurarão por muito tempo após a vida orgânica ter sido exterminada desta galáxia."
 grand_archive.4137.desc.geology: "$grand_archive.4137.desc$"
 grand_archive.4137.desc.aesthetic: "$grand_archive.4137.desc$"
 grand_archive.4137.a: "Curiosidades inofensivas."
 grand_archive.4142.name: "Curiosidades Acumuladas"
 grand_archive.4142.desc: "Continuamos a acumular troféus de [GetCollectionRewardCategory] enquanto removemos a mácula da vida orgânica desta galáxia.\n\nEsses itens servirão como um lembrete da irracionalidade da vida orgânica para o benefício de futuros protocolos de extermínio."
 grand_archive.4142.desc.geology: "$grand_archive.4142.desc$"
 grand_archive.4142.desc.aesthetic: "$grand_archive.4142.desc$"
 grand_archive.4142.a: "Protocolos realinhados."
 grand_archive.4147.name: "Espaço de Memória Cheio"
 grand_archive.4147.desc: "Enquanto expurgamos esta galáxia, preenchemos nossos bancos de memória designados aos espécimes de [GetCollectionRewardCategory].\n\nEssa coleção fornece dados sobre o que os orgânicos costumam valorizar. Ela servirá para promover sua erradicação e existe como um ponto de referência na história desta galáxia infectada."
 grand_archive.4147.desc.geology: "$grand_archive.4147.desc$"
 grand_archive.4147.desc.aesthetic: "$grand_archive.4147.desc$"
 grand_archive.4147.a: "As tolices da vida orgânica."
