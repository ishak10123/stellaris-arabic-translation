 VOIDWORMS_PROJECT: "Pesquisa de Vermes do Vazio"
 VOIDWORMS_PROJECT_DESC: "A biologia e os padrões reprodutivos dos Vermes do Vazio devem ser estudados mais a fundo."
 tech_voidworm_immunity: "Imunidade a Vermes do Vazio"
 tech_voidworm_immunity_desc: "Podemos desenvolver uma cura para a infecção parasítica dos Vermes do Vazio. Todas as nossas colônias ficariam imunes à atual estirpe de bombardeamento de esporos."
 tech_voidworm_immunity_effect: "Colônias ficam imunes ao bombardeamento dos Vermes do Vazio.\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!"
 tech_voidworm_immunity_effect_during_situation: "§RA imunidade a bombardeios é ineficaz durante a Praga de Vermes do Vazio.§!\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!\nAvança a situação §Y$situation_voidworm_plague$§! em §G+$@vaccine_situation_advancement|0$§!"
