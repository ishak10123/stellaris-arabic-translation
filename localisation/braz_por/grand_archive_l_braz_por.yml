 ###########################
 production_surge_modifier: "Surto de Produção"
 public_distrust_modifier: "Desconfiança Pública"
 test_subject_unwilling_modifier: "Cobaias"
 test_subject_volunteer_modifier: "$test_subject_unwilling_modifier$"
 test_subject_gestalt_modifier: "$test_subject_unwilling_modifier$"
 grand_archive.2310.name: "Praga de Vermes do Vazio"
 grand_archive.2310.desc.default: "A população de $NAME_Voidworms$ na galáxia atingiu um ponto crítico, o que alterou notadamente seu comportamento.\n\nO estágio típico do ciclo de vida dos vermes onde as populações hospedeiras seriam poupadas foi afetado. Não parece haver mais atenção à sustentabilidade das zonas de desova.\n\nTodas as nossas colônias estão em alerta vermelho. A presença de $NAME_Voidworms$ em qualquer sistema deve ser tratada com extrema cautela.\n\nUm frenesi de acasalamento em escala galáctica está próximo."
 grand_archive.2310.desc.tech: "$grand_archive.2310.desc.default$\n\nA imunidade que desenvolvemos anteriormente contra esses parasitas não tem mais a mesma eficácia. Teremos que voltar à estaca zero."
 grand_archive.2310.desc.nocontact: "Estamos interceptando relatórios perturbadores por toda a galáxia, informando que uma espécie de Fauna Espacial até então desconhecida, os \"Vermes do Vazio\", entraram em um frenesi reprodutivo. Essas criaturas são supostamente uma ameaça grave aos planetas sem sistemas de defesa adequados. Todas as nossas colônias estão em alerta máximo."
 grand_archive.2310.a: "$DISTURBING$$DOTDOTDOT$"
 situation_voidworm_plague: "Praga de Vermes do Vazio"
 situation_voidworm_plague_type: "$situation_voidworm_plague$"
 situation_voidworm_plague_desc: "Uma praga de $NAME_Voidworms$ se abateu sobre nós.\n\nEssas criaturas não pouparão mais planetas hospedeiros como zonas de desova. Temos que trabalhar para erradicá-los ou nossas colônias estarão ameaçadas.\n\n§YCada Verme do Vazio destruído desacelera o progresso da Situação.§!"
 situation_voidworm_plague_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_voidworm_plague: "Suas colônias não ficarão mais vulneráveis ao bombardeio dos Vermes do Vazio."
 approach_voidworm_plague_do_nothing: "Não fazer nada"
 approach_voidworm_plague_do_nothing_tt: "Não realizaremos nenhuma ação especial aqui."
 approach_voidworm_plague_support_fleets: "Apoiar nossas frotas"
 approach_voidworm_plague_support_fleets_tt: "Podemos sacrificar um pouco de qualidade de vida para apoiar nossas frotas militares contra a ameaça dos Vermes do Vazio.\n$SITUATION_MONTHLY_CHANGE$ da Situação: §G+0.5§!"
 approach_voidworm_plague_purge_infected_pops: "Expurgar infecção"
 approach_voidworm_plague_purge_infected_pops_tt: "O bombardeio dos $NAME_Voidworms$ contra nossas colônias não gerará novos $NAME_Voidworms$.\n$SITUATION_MONTHLY_CHANGE$ da Situação: §G+0.7§!"
 approach_voidworm_plague_search_for_cure: "Buscar uma cura"
 approach_voidworm_plague_search_for_cure_tt: "Se conseguirmos interromper seu ciclo biológico, os $NAME_Voidworms$ não poderão mais se reproduzir nesta galáxia.\n$SITUATION_MONTHLY_CHANGE$ da Situação: §G+1.0§!"
 change_approach_will_temporarily_lock: "§SAdotar esta abordagem bloqueará outras abordagens por §Y$@voidworm_plague_approach_cooldown_years|0$ anos§!.§!"
 too_early_to_change_approach: "§SÉ cedo demais para mudar as Abordagens da Situação outra vez.§!"
 voidworm_crisis_eradicate_chain_title: "Erradicar os $NAME_Voidworms$"
 voidworm_crisis_eradicate_chain_desc: "A população de Vermes do Vazio na galáxia atingiu níveis insustentáveis, e eles devem ser erradicados.\n\nLocalizamos todos os §YNinhos de Vermes do Vazio§! que devem ser destruídos."
 voidworm_system_poi_title: "Destruir [prev.GetName]"
 voidworm_system_poi_desc: "§YNinhos de Vermes do Vazio§! foram detectados neste sistema.\n\nDestrua-os para impedir a criação de mais parasitas."
 #Voidworms Plague Crisis Random Events #
 grand_archive.2400.name: "Componentes Excedentes"
 grand_archive.2400.desc: "O apoio crescente de nossas frotas contra os $NAME_Voidworms$ rendeu um superavit inesperado de componentes adicionais graças aos protocolos de manutenção aperfeiçoados. Temos uma oportunidade para investir esses materiais na melhoria de nossa produção imediata de novas frotas."
 grand_archive.2400.a: "Invista nos reforços."
 grand_archive.2400.b: "Mantenha as reservas."
 grand_archive.2405.name: "Chamado às Armas"
 grand_archive.2405.desc.default: "Nossas preparações incessantes contra os Vermes do Vazio inspiraram uma nova geração de comandantes. Cidadãos experientes de [this.GetName] ofereceram seus talentos para a eliminação dessa ameaça galáctica."
 grand_archive.2405.desc.gestalt: "Nossas preparações incessantes contra a ameaça dos Vermes do Vazio permitiram a produção de nódulos de liderança de classe comandante adicionais. Para fornecer mais apoio às nossas frotas, esses nódulos centrados no combate receberam maiores recursos para facilitar sua rápida integração aos nossos esforços militares."
 grand_archive.2405.a: "Inspirador."
 grand_archive.2405.tt: "Atualiza nossa lista de §H$RECRUITABLE_LEADERS$§! e adiciona 3 novos §HComandantes§! com um nível extra."
 grand_archive.2410.name: "Desenvolvimento de Linha de Frente"
 grand_archive.2410.desc.default: "Um membro da equipe de engenharia em [random_shipyard.GetName] desenvolveu um novo diagrama conceitual para a defesa das naves. [random_shipyard.leader.GetHeSheCap] estava realizando reparos de rotina durante a luta contra os Vermes do Vazio quando teve uma ideia para um novo componente que poderia aumentar a resistência de nossas naves. A ideia foi apresentada ao nosso departamento de pesquisa, e acreditamos que tenha um grande potencial."
 grand_archive.2410.desc.gestalt: "Um indivíduo que atua como [root.GetIndividualName] de reparos em [random_shipyard.GetName] inspirou novas ideias de pesquisa para melhorar as defesas das naves. Após um mal-entendido durante reparos de rotina, o indivíduo em questão usou uma combinação peculiar de métodos e materiais para criar um novo componente de proteção. Após a investigação das possibilidades de pesquisa, essa descoberta acidental demonstra grande potencial quando refinada."
 grand_archive.2420.name: "Infecção de [infected_leader.GetName]"
 grand_archive.2420.desc: "Durante a realização de suas tarefas, [infected_leader.GetName] infectou-se com esporos ativos de Vermes do Vazio. Não demorará até que novas ninfas irrompam e destruam o corpo hospedeiro.\n\nTalvez seja uma causa perdida, mas a equipe médica especula que pode ser possível extrair as larvas antes que elas se integrem totalmente ao sistema nervoso de [infected_leader.GetName]. Apesar dos riscos envolvidos, [infected_leader.GetHeShe] deseja seguir com o procedimento."
 grand_archive.2420.a: "Expurgue o indivíduo infectado."
 grand_archive.2420.b: "Extraia as larvas."
 grand_archive.2425.name: "Violação de Quarentena"
 grand_archive.2425.desc.common: "Um pequeno grupo [infected_planet_pop.species.GetName] infectado fugiu do expurgo em [infected_planet.GetName] e dispersou-se por nossos sistemas. Se ignorada, a infecção de Vermes do Vazio poderia se espalhar por todo o território de [this.GetName]."
 grand_archive.2425.desc.default: "$grand_archive.2425.desc.common$ Devemos lidar com os indivíduos que escaparam antes que ponham todos em risco."
 grand_archive.2425.desc.rogue: "$grand_archive.2425.desc.common$ Devemos lidar com os indivíduos que escaparam antes que ponham em risco outros biotroféus."
 grand_archive.2425.desc.gestalt: "$grand_archive.2425.desc.common$ Devemos lidar com os indivíduos que escaparam antes que ponham em risco todo o coletivo."
 grand_archive.2425.desc.robot: "Amostras de flora e fauna infectadas destinadas à análise foram de alguma forma erroneamente processadas como alimentos comuns. Como consequência, uma grande quantidade de matéria orgânica foi contaminada por parasitas de Vermes do Vazio e deve ser eliminada."
 grand_archive.2425.a.default: "Cace os espécimes."
 grand_archive.2425.a.default.tt: "-1 Pop Orgânico em cada colônia própria"
 grand_archive.2425.a.robot: "Queime o suprimento de comida."
 grand_archive.2425.a.robot.tt: "$@infected_devastation|0$ de devastação em todos os planetas não infectados"
 grand_archive.2425.b: "Não faça nada."
 grand_archive.2425.b.tt: "Ninfas de Verme do Vazio podem aparecer perto de nossas colônias!"
 grand_archive.2430.name: "Abandono do Dever"
 grand_archive.2430.desc: "Embora tenham concordado que expurgar os infectados seja o plano de ação mais sensato, muitos soldados estão relutantes em seguir suas ordens. Apesar do perigo apresentado pelos parasitas de Vermes do Vazio, muitos não conseguem eliminar seus concidadãos pelo bem de todos.\n\nAlgo deve ser feito para impedir que a infecção de Vermes do Vazio se espalhe por nossas colônias. Podemos automatizar certas partes do processo de expurgo para que necessitem de menos soldados. Por outro lado, podemos lançar uma curta campanha publicitária para promover os padrões éticos de nossas iniciativas de expurgo e reafirmar sua necessidade."
 grand_archive.2430.a: "Automatize os processos de expurgo."
 grand_archive.2430.b: "Lance uma campanha de relações públicas."
 grand_archive.2440.name: "Avanço Tangencial"
 grand_archive.2440.desc: "Nossa busca por uma cura para a praga de Vermes do Vazio permitiu que o progresso na pesquisa de outros campos da biologia avançasse em paralelo. Embora os parasitas permaneçam como prioridade, esse avanço tem um enorme potencial para novos estudos."
 grand_archive.2445.name: "Testes Iniciais"
 grand_archive.2445.desc.common: "Nossa compreensão da praga de Vermes do Vazio está avançando e a base para uma cura foi desenvolvida."
 grand_archive.2445.desc.default: "$grand_archive.2445.desc.common$ Contudo, nossa pesquisa poderia avançar mais rapidamente se realizássemos testes iniciais em participantes da espécie [owner_main_species.GetName].\n\nConsiderações éticas à parte, pode ser melhor contornar algumas medidas de segurança pelo bem maior."
 grand_archive.2445.desc.gestalt: "$grand_archive.2445.desc.common$ Contudo, o processo de testes demanda bastante tempo, especialmente devido à constante necessidade de encontrar [root.GetIndividualNamePlural] inativos para servirem como cobaias. Se pudéssemos simplesmente redesignar [root.GetIndividualNamePlural] para se tornarem cobaias, a cura avançaria muito mais rapidamente.\n\nAs consequências seriam sentidas em outras partes do coletivo, pois [root.GetIndividualNamePlural] ausentes deixariam suas funções prévias em desordem."
 grand_archive.2445.a.default: "Teste em indivíduos desavisados da espécie [owner_main_species.GetName]."
 grand_archive.2445.a.gestalt: "Priorize os testes."
 grand_archive.2445.b.default: "Teste apenas em voluntários."
 grand_archive.2445.b.gestalt: "Continue a pesquisa normalmente."
 grand_archive.2445.c: "Não realizaremos testes antiéticos."
 grand_archive.2450.name: "Glândulas de Verme do Vazio"
 grand_archive.2450.desc: "Descobrimos um padrão no ciclo reprodutivo dos Vermes do Vazio que poderia levar a grandes avanços na síntese de uma cura para a praga dos vermes.\n\nPara confirmar essa hipótese, as glândulas reprodutivas de uma $voidworms_titan$ selvagem devem ser extraídas para análise. É crucial que essa $voidworms_titan$ seja abatida enquanto bombardeia um planeta para que os gametas sejam preservados."
 grand_archive.2450.a: "Não temos tempo para isso."
 grand_archive.2450.b: "Você terá as suas glândulas."
 VOIDWORM_GLANDS_PROJECT: "Glândulas Reprodutivas de Troika"
 VOIDWORM_GLANDS_PROJECT_DESC: "Fizemos uma descoberta extraordinária enquanto procurávamos por uma cura para a praga de Vermes do Vazio. Só precisamos das glândulas reprodutivas de uma Troika de Vermes do Vazio em um estado de fertilidade ativa."
 VOIDWORM_GLANDS_PROJECT_TOOLTIP: "§RColete os restos de uma Troika que está bombardeando ativamente um planeta.§!"
 VOIDWORM_TITAN_DEBRIS_PROJECT: "Restos de $NAME_Voidworms_Troika$"
 VOIDWORM_TITAN_DEBRIS_PROJECT_DESC: "Podemos extrair as glândulas reprodutivas férteis dos restos desta Troika de Vermes do Vazio.\n\nEsses órgãos ampliariam consideravelmente nosso entendimento da biologia das criaturas e ajudariam a erradicar a praga de Vermes do Vazio de uma vez por todas."
 grand_archive.2455.name: "Glândulas Recuperadas"
 grand_archive.2455.desc: "As glândulas recuperadas de uma Troika de Vermes do Vazio fértil revelaram novas informações sobre seus ciclos reprodutivos.\n\nUnidos por um ritual de acasalamento até sua morte, cada um dos três Vermes do Vazio no abraço reprodutivo distribui seu material genético igualmente entre si, tornando-se, na prática, um organismo inteiramente novo.\n\nPodemos usar essa maleabilidade genética contra eles."
 grand_archive.2500.name: "Cura Descoberta"
 grand_archive.2500.desc.default: "Concluímos o desenvolvimento de uma cura definitiva para a infecção parasítica dos Vermes do Vazio. Nossas colônias não estão mais suscetíveis aos bombardeios de esporos, e não precisamos mais nos preocupar com a presença deles na galáxia."
 grand_archive.2500.desc.tech: "$grand_archive.2500.desc.default$\n\nTemos certeza de que, desta vez, a cura que elaboramos será eficaz contra quaisquer mutações futuras na biologia dos vermes."
 #########################################
