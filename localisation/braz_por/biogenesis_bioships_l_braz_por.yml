 #Mauler Technologies
 tech_maulers: "$mauler_class_plural_cap$"
 tech_maulers_desc: "Avanços na bioengenharia permitiram a criação de naves capazes de voo espacial MRQL com aplicações militares"
 TECH_UNLOCK_mauler_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_1$"
 TECH_UNLOCK_mauler_stage_1_CONSTRUCTION_DESC: "§H$mauler_stage_1$§!\nA $mauler_class_cap$ é a nave militar mais básica, equipada com armamentos de curto alcance e uma espessa carapaça blindada."
 tech_mauler_build_speed: "Incubação de Dilaceradora Padronizada"
 tech_mauler_build_speed_desc: "Estas câmaras de incubação aceleram a gestação de naves de guerra embrionárias dentro de biocápsulas ricas em nutrientes. Embora rudimentares, elas representam o primeiro passo para uma frota que não é construída, mas gerada."
 tech_mauler_build_speed_effect: "$mod_ship_mauler_cost_mult$: §G-5%§!\nVelocidade de Construção de $mauler_class_cap$: §G+25%§!"
 tech_mauler_growth_1: "Desenvolvimento de Dilaceradora Melhorado"
 tech_mauler_growth_1_desc: "Processos avançados de incubação reduzem o tempo de maturação e aumentam a integridade estrutural das naves orgânicas. Sistemas aprimorados de entrega de nutrientes e ajustes genéticos garantem que as naves sejam rápidas e resistentes."
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_2$"
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_DESC: "§H$mauler_stage_2$§!\nUma $mauler_class_cap$ de $ship_growth_stage_2$ foi criada seletivamente para suportar maior blindagem e poder de fogo."
 gateway_bio_ships: "§HCaminho de Naves Biológicas§!\n§EEsta tecnologia levará a mais avanços para naves biológicas poderosas.§!"
 tech_mauler_growth_2: "Desenvolvimento de Dilaceradora Avançado"
 tech_mauler_growth_2_desc: "Estas instalações geram naves de vitalidade e capacidade de adaptação inigualáveis. Matrizes genéticas otimizadas e suporte biotecnológico avançado garantem um desempenho incomparável no vazio."
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_3$"
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_DESC: "§H$mauler_stage_3$§!\nUma $mauler_class_cap$ de $ship_growth_stage_3$ é a $mauler_class_cap$ máxima, com blindagem elevada e muitos armamentos de curto alcance."
 #Weaver Technologies
 tech_weavers: "$weaver_class_plural_cap$"
 tech_weavers_desc: "Com base nos princípios da bioengenharia, as Tecelãs são projetadas para equilibrar agilidade com maior capacidade de combate."
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_1$"
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_DESC: "§H$weaver_stage_1$§!\nA $weaver_class_cap$ é uma nave biológica versátil de médio porte, projetada para superar inimigos maiores e dar apoio às frotas de combate."
 tech_weaver_build_speed: "Incubação de Tecelã Padronizada"
 tech_weaver_build_speed_desc: "Estas instalações nutrem naves biológicas de médio porte em biocápsulas refinadas, empregando sistemas aprimorados de nutrição e otimização genética para produzir naves ágeis e adaptáveis para a frota."
 tech_weaver_build_speed_effect: "$mod_ship_weaver_cost_mult$: §G-5%§!\nVelocidade de Construção de $weaver_class_cap$: §G+25%§!"
 tech_weaver_growth_1: "Desenvolvimento de Tecelã Melhorado"
 tech_weaver_growth_1_desc: "Estas instalações empregam técnicas avançadas de bioengenharia para acelerar os ciclos de crescimento e aprimorar a adaptabilidade das naves. Matrizes genéticas melhoradas e ambientes otimizados garantem que essas naves biológicas sejam resistentes e altamente responsivas em combate."
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_2$"
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_DESC: "§H$weaver_stage_2$§!\nUma $weaver_class_cap$ de $ship_growth_stage_2$ foi criada seletivamente para aprimorar a mobilidade e adaptabilidade nas operações de frota."
 tech_weaver_growth_2: "Desenvolvimento de Tecelã Avançado"
 tech_weaver_growth_2_desc: "Estas instalações produzem naves biológicas precisas e versáteis. Técnicas revolucionárias de crescimento e aprimoramentos genéticos adaptativos resultam em naves que prosperam mesmo nos cenários táticos mais desafiadores."
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_3$"
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_DESC: "§H$weaver_stage_3$§!\nUma $weaver_class_cap$ de $ship_growth_stage_3$ foi meticulosamente criada para ter maior agilidade e versatilidade tática."
 #Harbinger Technologies
 tech_harbingers: "$harbinger_class_plural_cap$"
 tech_harbingers_desc: "Os Arautos representam um avanço significativo na bioengenharia bélica, combinando poder de fogo devastador com a resiliência da tecnologia viva. Essas naves são a base da frota."
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_1$"
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_DESC: "§H$harbinger_stage_1$§!\nO $harbinger_class_cap$ fortalece a frota ao gerar naves de ataque."
 tech_harbinger_build_speed: "Incubação de Arauto Padronizada"
 tech_harbinger_build_speed_desc: "Estas instalações nutrem grandes naves biológicas, alimentando-as por meio de infusões avançadas de nutrientes para garantir resiliência e prontidão para o combate."
 tech_harbinger_build_speed_effect: "$mod_ship_harbinger_cost_mult$: §G-5%§!\nVelocidade de Construção de $harbinger_class_cap$: §G+25%§!"
 tech_harbinger_growth_1: "Desenvolvimento de Arauto Melhorado"
 tech_harbinger_growth_1_desc: "Instalações refinadas utilizam técnicas sofisticadas de bioengenharia para acelerar o crescimento e aumentar a integridade estrutural. As naves resultantes possuem maior resistência e eficiência em combate."
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_2$"
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_DESC: "§H$harbinger_stage_2$§!\nTécnicas aprimoradas de crescimento geram naves mais fortes e confiáveis."
 tech_harbinger_growth_2: "Desenvolvimento de Arauto Avançado"
 tech_harbinger_growth_2_desc: "Sistemas avançados de incubação produzem naves biológicas de durabilidade e poder de fogo excepcionais. O ajuste genético e ambientes de crescimento superiores criam naves capazes de dominar o campo de batalha com resiliência incomparável."
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_3$"
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_DESC: "§H$harbinger_stage_3$§!\nCriado para ter força máxima e superioridade no campo de batalha."
 #Stinger Technologies
 tech_stingers: "$stinger_class_plural_cap$"
 tech_stingers_desc: "Os Aguilhões foram projetados para desferir ataques devastadores contra alvos estratégicos, explorando vulnerabilidades nas defesas inimigas."
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_1$"
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_DESC: "§H$stinger_stage_1$§!\nUma nave biológica ágil e mortal, criada para ataques precisos e supremacia tática."
 tech_stinger_build_speed: "Incubação de Aguilhão Padronizada"
 tech_stinger_build_speed_desc: "Estas instalações geram naves biológicas ágeis e aerodinâmicas projetadas para ter precisão e velocidade. Utilizando biocápsulas avançadas e soluções de nutrientes especializadas, elas produzem naves capazes de ataques precisos e eficientes."
 tech_stinger_build_speed_effect: "$mod_ship_stinger_cost_mult$: §G-5%§!\nVelocidade de Construção de $stinger_class_cap$: §G+25%§!"
 tech_stinger_growth_1: "Desenvolvimento de Aguilhão Melhorado"
 tech_stinger_growth_1_desc: "Instalações refinadas aceleram os ciclos de crescimento e aprimoram a precisão da bioengenharia, resultando em naves com navegabilidade e precisão superiores. Esses aprimoramentos tornam o Aguilhão uma força devastadora em confrontos táticos."
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_2$"
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_DESC: "§H$stinger_stage_2$§!\nRefinado para ter maior velocidade e precisão em operações táticas."
 tech_stinger_growth_2: "Desenvolvimento de Aguilhão Avançado"
 tech_stinger_growth_2_desc: "O ápice da tecnologia de geração de naves biológicas. Estas instalações avançadas produzem Aguilhões com velocidade e letalidade incomparáveis. Modelos genéticos otimizados e técnicas de incubação de ponta garantem que essas naves dominem qualquer campo de batalha com precisão mortal."
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_3$"
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_DESC: "§H$stinger_stage_3$§!\nGerado para ter velocidade, precisão e domínio incomparáveis no campo de batalha."
