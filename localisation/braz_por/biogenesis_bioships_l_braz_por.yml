 bio_ship_unique_components: "Órgãos Suplementares"
 bio_ship_unique_components_DESC: "Gerados ou enxertados em cascos vivos, estes órgãos suplementares são projetados para ajustar as capacidades únicas das naves biológicas."
 MAULER_STAGE_1_GROWTH_1: "Glândula de Crescimento de $ship_growth_stage_1$"
 MAULER_STAGE_1_GROWTH_1_DESC: "Glândulas implantadas que secretam uma mistura de hormônios e esteroides, forçando a nave a avançar para o próximo estágio de crescimento."
 MAULER_STAGE_1_GROWTH_2: "Glândula de Crescimento de $ship_growth_stage_1$ Acelerada"
 MAULER_STAGE_1_GROWTH_2_DESC: "Este órgão acelera o crescimento de naves biológicas ao infundir gases exóticos em suas secreções ricas em hormônios e esteroide."
