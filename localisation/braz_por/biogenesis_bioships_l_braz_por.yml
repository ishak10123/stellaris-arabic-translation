 concept_biological_ship_desc: "- As naves biológicas usam classes de naves de combate especializadas com funções bem definidas e três estágios de crescimento.$NEW_LINE$- Elas são construídas principalmente usando $i_food$ em vez de $i_alloys$. $NEW_LINE$- Os custos de manutenção são compostos principalmente de $i_food$ em vez de $i_energy$. $NEW_LINE$- Depende de tecnologias de §Y£society£ Biologia§! em vez de §Y£engineering£ Ciência do Vazio§!. $NEW_LINE$$h_line$§LNaves vivas compostas de fibras musculares maciças e ondulantes, repletas de organelas bioluminescentes que liberam compostos ricos em energia para produzir rajadas de luz e calor como propulsão.§!"
 default_ship: "Naves Mecânicas"
 bio_ship: "Naves Biológicas"
 #Shipset Descriptions
 biogenesis_01_shipset_desc: "§HTipo de Conjunto de Nave: ['concept_biological_ship', Biológica]§!\nGeradas pela natureza e tecnologia, estas naves de guerra vivas personificam o ápice da predação. Sua biomassa semissenciente se adapta, caça e ataca com uma vontade insaciável."
 biogenesis_02_shipset_desc: "§HTipo de Conjunto de Nave: ['concept_biological_ship', Biológica]§!\nCriadas para os mais valentes, estas naves estelares de carapaça resistente jamais se submetem; elas persistem, evoluindo ao lado dos intrépidos exploradores que as chamam de lar."
 humanoid_01_shipset_desc: "Resistentes e determinadas, estas naves foram construídas para suportar os desafios do espaço profundo. Projetadas para conquistar o desconhecido, carregam as esperanças e sonhos de seus criadores até as estrelas mais distantes."
 synthetics_01_shipset_desc: "Estes projetos refletem a pureza de mentes incansáveis. Cascos termoespiralados dissipam a energia de mainframes sobrecarregados, garantindo uma operação impecável na busca pela máxima eficiência."
 mammalian_01_shipset_desc: "Construídas para durar, estas formidáveis naves refletem a resistência de seus criadores. Cascos densos isolam e protegem, enquanto sistemas redundantes garantem a sobrevivência nas condições mais extremas."
 reptilian_01_shipset_desc: "Compacto e utilitário, este projeto robusto evoca a resiliência de um predador. Sua presença no vazio é um testemunho da tenacidade implacável de seus criadores de sangue-frio."
 avian_01_shipset_desc: "Graciosas e elegantes, estas naves versáteis personificam a beleza do voo. Cada curva e contorno reflete uma espécie que vê o espaço não como um obstáculo, mas como uma extensão natural do céu."
 arthropoid_01_shipset_desc: "Quitina ou aço, estética ou propósito – não há diferença. Estas naves não são projetadas para inspirar, mas para resistir. Seus cascos em camadas são um testemunho de uma filosofia de pura sobrevivência."
 molluscoid_01_shipset_desc: "Graciosas, porém duráveis, estas naves servem tanto como abrigo quanto como arma. Sob suas carapaças reforçadas, sistemas avançados regulam o fluxo de energia e os ciclos de nutrientes com uma precisão silenciosa."
 fungoid_01_shipset_desc: "Estas naves bulbosas evocam a beleza das flores fúngicas. Projetadas para serem autossuficientes, seus sistemas especializados formam redes internas intrincadas, refletindo a lógica do micélio."
 plantoid_01_shipset_desc: "Estas naves verdejantes não apenas viajam pelas estrelas: elas criam raízes entre elas. Nacelas fotossintéticas mantêm o equilíbrio, gerenciando os biomas a bordo."
 lithoid_01_shipset_desc: "Forjadas pelo tempo e pela pressão, estas naves de aspecto rochoso representam a perseverança. Matrizes de cristal de silício reforçam os sistemas principais, extraindo energia das mesmas forças que moldam os mundos."
 necroid_01_shipset_desc: "Sombrias e ominosas, estas catedrais flutuantes são monumentos à morte e ao renascimento. Seus núcleos entrópicos e desígnios ritualísticos sussurram sobre o poder nascido do vazio e a ambição eterna."
 nemesis_01_shipset_desc: "Colossais e imponentes, estas naves impõem autoridade. Superestruturas reforçadas e sistemas redundantes irradiam uma aura de domínio inigualável."
 aquatic_01_shipset_desc: "Fluídas e ao mesmo tempo túrgidas, estas naves canalizam o poder oceânico. Interiores aquosos e contornos hidrodinâmicos encarnam a graça de seus criadores."
 toxoid_01_shipset_desc: "Estas naves soltam fumaça, fazem barulhos sinistros e violam todas as normas possíveis, mas funcionam. Movidas por resíduos e sustentadas por uma engenhosidade obstinada, elas resistem onde outras falham."
 cybernetics_01_shipset_desc: "O cromo reluz, os circuitos vibram e os reflexos se tornam obsoletos. Conexões neurais diretas eliminam atrasos e limites. Agora há apenas a pura precisão de alta octanagem."
