 BIO_EMPTY_DRIVE_DESC: "$EMPTY_DRIVE_DESC$"
 BIO_HYPER_DRIVE_1: "Campo de Bio-Hiperestradas I"
 BIO_HYPER_DRIVE_1_DESC: "A força constante aplicada contra o hiperespaço permite que uma nave atravesse as passagens estreitas das hiperestradas interestelares."
 BIO_HYPER_DRIVE_2: "Campo de Bio-Hiperestradas II"
 BIO_HYPER_DRIVE_2_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_HYPER_DRIVE_3: "Campo de Bio-Hiperestradas III"
 BIO_HYPER_DRIVE_3_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_JUMP_DRIVE_1: "Órgão de Salto"
 BIO_JUMP_DRIVE_1_DESC: "O Órgão de Salto cria buracos do tamanho de naves no próprio tecido da realidade, permitindo movimentações quase instantâneas entre sistemas. A natureza do espaço pelo qual a nave passa durante essa jornada ainda é pouco compreendida."
 BIO_PSI_JUMP_DRIVE_1: "Órgão de Salto Psiônico"
 BIO_PSI_JUMP_DRIVE_1_DESC: "O Órgão de Salto Psiônico atua como ponto focal para o potencial psiônico da tripulação e da nave para manipular o espaço-tempo, eliminando a distância entre o ponto de origem e o ponto de destino. Supostamente."
 tech_bio_hyper_drive_1: "Viagem pelo Hiperespaço"
 tech_bio_hyper_drive_1_desc: "Como os fios de uma teia de aranha, o reino extradimensional do hiperespaço corre através dos poços gravitacionais da maioria das estrelas. A viagem mais rápida que a luz é teoricamente possível usando essas hiperestradas."
 tech_bio_hyper_drive_2: "Pontos de Fendas em Hiperestradas"
 tech_bio_hyper_drive_2_desc: "Identificamos a existência de pontos no espaço nos quais uma nave gasta menos energia para \"romper as paredes\" de uma hiperestrada. Isso levará a uma nova geração de hiperpropulsores."
 tech_bio_hyper_drive_3: "Turbilhonamento Quântico Hiperespacial"
 tech_bio_hyper_drive_3_desc: "Uma nova geração de hiperpropulsores capazes de acessar os pontos de turbilhonamento quântico no subespaço. Isso proporciona um desempenho de propulsão dramaticamente aprimorado."
 tech_bio_jump_drive_1: "$BIO_JUMP_DRIVE_1$"
 tech_bio_jump_drive_1_desc: "Um $BIO_JUMP_DRIVE_1$ revolucionário que manipula o espaço-tempo local em nível quântico, reestruturando-o para coincidir com o destino desejado. Esse processo faz com que as naves pareçam \"saltar\" quase instantaneamente entre sistemas."
