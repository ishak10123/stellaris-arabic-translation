 BIOSHIP_SENSOR_1: "Radiolocalização"
 BIOSHIP_SENSOR_1_DESC: "Estes órgãos sensoriais utilizam um equivalente biológico de um radar para operar no espaço profundo, oferecendo às naves capacidades básicas de detecção e rastreamento."
 BIOSHIP_SENSOR_2: "Sensores Gravíticos"
 BIOSHIP_SENSOR_2_DESC: "Estes órgãos sensoriais foram desenvolvidos para detectar alterações gravitacionais no espaço, tais como as produzidas pela presença de uma nave espacial."
 TECH_UNLOCK_BIOSHIP_SENSOR_2_TITLE: "§HLibera o Componente:§! $BIOSHIP_SENSOR_2$"
 TECH_UNLOCK_BIOSHIP_SENSOR_2_DESC: "§H$BIOSHIP_SENSOR_2$§!\n$BIOSHIP_SENSOR_2_DESC$"
 BIOSHIP_SENSOR_3: "Sensores Subespaciais"
 BIOSHIP_SENSOR_3_DESC: "Órgãos sensoriais que detectam as flutuações subespaciais deixadas por naves espaciais. Sua sensibilidade e alcance são muito superiores aos órgãos sensoriais desenvolvidos anteriormente para o espaço profundo."
 TECH_UNLOCK_BIOSHIP_SENSOR_3_TITLE: "§HLibera o Componente:§! $BIOSHIP_SENSOR_3$"
 TECH_UNLOCK_BIOSHIP_SENSOR_3_DESC: "§H$BIOSHIP_SENSOR_3$§!\n$BIOSHIP_SENSOR_3_DESC$"
 BIOSHIP_SENSOR_4: "Sensores Taquiônicos"
 BIOSHIP_SENSOR_4_DESC: "Órgãos sensoriais que empregam feixes de táquions rotativos para detectar movimento interestelar a distâncias extremas."
 TECH_UNLOCK_BIOSHIP_SENSOR_4_TITLE: "§HLibera o Componente:§! $BIOSHIP_SENSOR_4$"
