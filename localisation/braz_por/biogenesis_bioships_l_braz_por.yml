 #Combat Computers
 BIO_COMBAT_COMPUTER_DEFAULT: "Instintos de Combate"
 BIO_COMBAT_COMPUTER_DEFAULT_DESC: "Todas as naves biológicas têm instintos rudimentares de combate, capazes de realizar manobras evasivas e cálculos de mira."
 BIO_COMBAT_COMPUTER_BASIC: "Implantes Neurais"
 BIO_COMBAT_COMPUTER_BASIC_DESC: "Estes implantes se conectam diretamente aos sistemas orgânicos da nave, permitindo tomadas de decisão rápidas e coordenação tática precisa. Funcionando como um computador de combate vivo, ampliam a percepção situacional e otimizam o desempenho em batalha."
 BIO_COMBAT_COMPUTER_ADVANCED: "Implantes Neurais Avançados"
 BIO_COMBAT_COMPUTER_ADVANCED_DESC: "Uma evolução dos implantes neurais padrão, estes sistemas aprimoram o processamento tático e a velocidade de tomada de decisões, além de proporcionar maior eficiência e coordenação, permitindo que as naves biológicas respondam com agilidade às mudanças no campo de batalha."
 BIO_COMBAT_COMPUTER_SAPIENT: "Implantes Neurais Sapientes"
 BIO_COMBAT_COMPUTER_SAPIENT_DESC: "Estes implantes abrigam uma inteligência biossapiente capaz de pensamento estratégico independente. Ao combinar instinto orgânico com raciocínio artificial, eles permitem que as naves biológicas se adaptem de forma dinâmica a cenários de combate complexos, demonstrando uma tomada de decisões quase autônoma."
 BIO_COMBAT_COMPUTER_AUTONOMOUS: "Implantes Neurais Autônomos"
 BIO_COMBAT_COMPUTER_AUTONOMOUS_DESC: "Estes sistemas operam com total autonomia. Infundidos com uma biointeligência autoconsciente, conferem às naves a capacidade de analisar, planejar e executar decisões sem intervenção externa, alcançando uma eficiência de combate sem igual."
 BIO_COMBAT_COMPUTER_PRECOG: "Instintos de Combate Precognitivos"
 BIO_COMBAT_COMPUTER_PRECOG_DESC: "Canalizando o poder psiônico, estes implantes oferecem às naves biológicas uma percepção precognitiva, capaz de antecipar as ações inimigas antes que ocorram. Essa capacidade quase sobrenatural concede às frotas uma vantagem crucial, permitindo reações instantâneas até mesmo às ameaças mais complexas."
