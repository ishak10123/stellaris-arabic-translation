 #Unique components
 MAULER_PURSUIT_1: "Reciclador Metabólico"
 MAULER_PURSUIT_1_DESC: "A reciclagem dos resíduos químicos produzidos pelos órgãos motores da nave permite maior vigor."
 MAULER_PURSUIT_2: "Reciclador Energético"
 MAULER_PURSUIT_2_DESC: "A adição de partículas voláteis às vias de reciclagem da nave fornece um maior aumento de vigor."
 MAULER_BITER_1: "Fluidos Corrosivos"
 MAULER_BITER_1_DESC: "Glândulas implantadas alteram os fluidos corporais da $mauler_class_plural_cap$, tornando-os corrosivos e ampliando seu potencial destrutivo."
 MAULER_BITER_2: "Fluidos Cáusticos"
 MAULER_BITER_2_DESC: "A incorporação de partículas voláteis aos fluidos de nossas $mauler_class_plural_cap$ aumentam ainda mais o dano causado, especialmente contra a blindagem de naves inimigas."
 weapon_type_mandible: "§YMandíbula§!"
 mod_weapon_type_mandible_weapon_damage_mult: "Dano de Arma de Mandíbula"
 APPLIED_MODIFIERS_SUPPORT_TITLE: "Modificadores Aplicados de Armas de Suporte:"
 WEAVER_GROWTH_AURA_1: "Feromônios de Desenvolvimento"
 WEAVER_GROWTH_AURA_1_DESC: "As Tecelãs liberam uma complexa matriz de sinais bioquímicos que aceleram a maturação de entidades orgânicas próximas. Estes feromônios de desenvolvimento aumentam a taxa de crescimento e adaptação, garantindo que a frota evolua rapidamente para encarar qualquer desafio."
 WEAVER_GROWTH_AURA_2: "Feromônios de Desenvolvimento Exóticos"
 WEAVER_GROWTH_AURA_2_DESC: "A bioengenharia refinada amplifica a potência destes feromônios, acelerando dramaticamente o crescimento e a otimização das naves biológicas aliadas. Essa aura aprimorada garante que a frota atinja desempenho máximo com notável rapidez, mesmo no calor da batalha."
 GROWTH_AURA: "$WEAVER_GROWTH_AURA_1$"
 GROWTH_AURA_TT: "§PEsta aura se aplica apenas a Naves Biológicas capazes de crescer.§!"
 WEAVER_BOOSTER_1: "Amplificador Simbiótico Básico"
 WEAVER_BOOSTER_1_DESC: "Este dispositivo orgânico fortalece o vínculo entre as naves biológicas, melhorando a transferência de energia e a coordenação da frota. Sua presença garante maior eficiência em combate e gerenciamento de recursos."
 WEAVER_BOOSTER_2: "Amplificador Simbiótico Aprimorado"
 WEAVER_BOOSTER_2_DESC: "Uma iteração mais avançada do amplificador simbiótico. Este dispositivo se ajusta dinamicamente às necessidades da frota, oferecendo maior eficiência e responsividade. Ele otimiza as capacidades de toda a frota, garantindo adaptabilidade contínua durante as operações."
 HARBINGER_INCUBATOR_1: "Matriz de Incubação"
 HARBINGER_INCUBATOR_1_DESC: "Esta matriz celular se forma ao redor dos ovos de naves de ataque em amadurecimento, agindo com um incubador criado por bioengenharia."
 HARBINGER_INCUBATOR_2: "$HARBINGER_INCUBATOR_1$ Rápida"
 HARBINGER_INCUBATOR_2_DESC: "A exposição a gases exóticos durante o período de incubação leva a uma rápida maturação das naves de ataque desta nave."
 HARBINGER_CHITIN_1: "Reguladores de Crescimento de Quitina"
 HARBINGER_CHITIN_1_DESC: "Secreções nos hangares estimulam o crescimento de quitina nas naves de ataque em desenvolvimento, aumentando sua durabilidade."
 HARBINGER_CHITIN_2: "Reguladores de Crescimento Cristalino"
 HARBINGER_CHITIN_2_DESC: "Inserir cristais raros nos exoesqueletos de nossas naves de ataque fornece ainda mais resistência a dano."
 STINGER_RANGE_1: "Aglomerado de Telêmetros"
 STINGER_RANGE_1_DESC: "Um aglomerado neurológico secundário, dedicado ao processamento de dados sensoriais."
 STINGER_RANGE_2: "$STINGER_RANGE_1$ Melhorado"
 STINGER_RANGE_2_DESC: "Cristais raros inseridos nas bainhas de vias neurais permitem uma maior capacidade de processamento de alvos."
 STINGER_FIRE_RATE_1: "Espiráculos de Dispersão de Calor"
 STINGER_FIRE_RATE_1_DESC: "Uma série de aberturas para dispersão de calor ao longo do tórax desta nave permite a ela expelir gases comprimidos e a altas temperaturas para o espaço, melhorando a taxa de disparos de suas armas."
 STINGER_FIRE_RATE_2: "Espiráculos Voláteis"
 STINGER_FIRE_RATE_2_DESC: "O uso de partículas voláteis como meio de troca de calor exige uma matriz celular dedicada para prevenir qualquer explosão acidental."
 #Armor/Carapace
 tech_bio_ship_armor_1: "$tech_ship_armor_1$"
 BIO_ARMOR_1: "$NANOCOMPOSITE_CARAPACE$"
 BIO_ARMOR_1_DESC: "Esta bioarmadura avançada integra tecidos orgânicos resistentes com materiais nanoestruturados, criando uma carapaça viva capaz de suportar impactos extremos. A carapaça adapta-se de forma dinâmica aos danos, sendo capaz de se regenerar e proporcionar uma proteção inigualável às naves biológicas."
 SMALL_BIO_ARMOR_1: "$BIO_ARMOR_1$ Pequena"
 MEDIUM_BIO_ARMOR_1: "$BIO_ARMOR_1$ Média"
 LARGE_BIO_ARMOR_1: "$BIO_ARMOR_1$ Grande"
 tech_bio_ship_armor_2: "$tech_ship_armor_2$"
 BIO_ARMOR_2: "$CERAMO_CHITIN_CARAPACE$"
 BIO_ARMOR_2_DESC: "Quitina reforçada com compostos cerâmicos confere a esta bioarmadura durabilidade excepcional e resistência térmica. Sua estrutura em camadas oferece proteção robusta sem comprometer a mobilidade das naves orgânicas."
 SMALL_BIO_ARMOR_2: "$CERAMO_CHITIN_CARAPACE$ Pequena"
 MEDIUM_BIO_ARMOR_2: "$CERAMO_CHITIN_CARAPACE$ Média"
 LARGE_BIO_ARMOR_2: "$CERAMO_CHITIN_CARAPACE$ Grande"
 tech_bio_ship_armor_3: "$tech_ship_armor_3$"
 BIO_ARMOR_3: "$PLASTEEL_CARAPACE$"
 BIO_ARMOR_3_DESC: "Esta bioarmadura combina tecidos orgânicos resilientes com reforços de açoplástico, garantindo um equilíbrio notável entre força e flexibilidade. Sua estrutura híbrida proporciona defesa superior contra ataques cinéticos e de energia, tornando-a uma escolha segura para naves biológicas."
 SMALL_BIO_ARMOR_3: "$PLASTEEL_CARAPACE$ Pequena"
 MEDIUM_BIO_ARMOR_3: "$PLASTEEL_CARAPACE$ Média"
 LARGE_BIO_ARMOR_3: "$PLASTEEL_CARAPACE$ Grande"
 tech_bio_ship_armor_4: "$tech_ship_armor_4$"
 BIO_ARMOR_4: "Carapaça de Duraço"
 BIO_ARMOR_4_DESC: "Enriquecida com compostos orgânicos duráveis, esta bioarmadura oferece resistência excepcional a danos prolongados. Sua estrutura híbrida garante uma resistência notável sem comprometer a mobilidade das naves vivas."
 SMALL_BIO_ARMOR_4: "$DURASTEEL_CARAPACE$ Pequena"
 MEDIUM_BIO_ARMOR_4: "$DURASTEEL_CARAPACE$ Média"
 LARGE_BIO_ARMOR_4: "$DURASTEEL_CARAPACE$ Grande"
 tech_bio_ship_armor_5: "$tech_ship_armor_5$"
 BIO_ARMOR_5: "Carapaça de Neutrônio"
 BIO_ARMOR_5_DESC: "Um milagre da bioengenharia. Esta carapaça incorpora filamentos de neutrônio mesclados em tecido orgânico, criando uma blindagem quase impenetrável. Sua composição densa e adaptável proporciona proteção incomparável até contra as forças mais destrutivas."
 SMALL_BIO_ARMOR_5: "$NEUTRONIUM_CARAPACE$ Pequena"
 MEDIUM_BIO_ARMOR_5: "$NEUTRONIUM_CARAPACE$ Média"
 LARGE_BIO_ARMOR_5: "$NEUTRONIUM_CARAPACE$ Grande"
 tech_bio_dragon_armor: "$tech_dragon_armor$"
 DRAGON_BIO_ARMOR: "$DRACONIC_CARAPACE$"
 DRAGON_BIO_ARMOR_DESC: "O auge da evolução das bioarmaduras. Esta carapaça é inspirada nos antigos predadores alfas. Sua estrutura em camadas combina matéria orgânica regenerativa com bioligas quase indestrutíveis, criando uma defesa tão feroz e inabalável quanto as criaturas que a inspiraram."
 SMALL_DRAGON_BIO_ARMOR: "$DRAGON_BIO_ARMOR$ Pequena"
 MEDIUM_DRAGON_BIO_ARMOR: "$DRAGON_BIO_ARMOR$ Média"
 LARGE_DRAGON_BIO_ARMOR: "$DRAGON_BIO_ARMOR$ Grande"
 tech_bio_archaeoarmor: "$tech_archaeoarmor$"
 BIO_ARCHAEO_ARMOR: "Carapaça de Pulso"
 BIO_ARCHAEO_ARMOR_DESC: "Camadas ionizadas na carapaça geram uma carga reativa, dispersando a energia dos impactos por meio de repulsão magnética e campos projetados."
