 tech_bio_shields_1: "$tech_shields_1$"
 BIO_SHIELD_1: "Musculatura Defletora"
 BIO_SHIELD_1_DESC: "Tecidos musculares especializados geram um campo de energia, formando um escudo defletor. Embora sua capacidade de absorção de dano seja limitada, ele se regenera rapidamente."
 SMALL_BIO_SHIELD_1: "$BIO_SHIELD_1$ Pequena"
 MEDIUM_BIO_SHIELD_1: "$BIO_SHIELD_1$ Média"
 LARGE_BIO_SHIELD_1: "$BIO_SHIELD_1$ Grande"
 tech_bio_shields_2: "$tech_shields_2$"
 BIO_SHIELD_2: "Musculatura Defletora Melhorada"
 BIO_SHIELD_2_DESC: "Tecidos musculares refinados canalizam energia de forma mais eficiente, fortalecendo os escudos defletores. Esses sistemas aprimorados absorvem mais dano e recarregam mais rapidamente, oferecendo maior proteção em combates prolongados."
 SMALL_BIO_SHIELD_2: "$BIO_SHIELD_2$ Pequena"
 MEDIUM_BIO_SHIELD_2: "$BIO_SHIELD_2$ Média"
 LARGE_BIO_SHIELD_2: "$BIO_SHIELD_2$ Grande"
 tech_bio_shields_3: "$tech_shields_3$"
 BIO_SHIELD_3: "Musculatura Protegida"
 BIO_SHIELD_3_DESC: "Esta tecnologia de bioescudo combina tecidos reforçados e condutores de energia com maior capacidade defensiva. Oferece alta resistência contra ataques cinéticos e de energia, garantindo uma defesa adaptável para naves biológicas em diversos cenários de combate."
 SMALL_BIO_SHIELD_3: "$BIO_SHIELD_3$ Pequena"
 MEDIUM_BIO_SHIELD_3: "$BIO_SHIELD_3$ Média"
 LARGE_BIO_SHIELD_3: "$BIO_SHIELD_3$ Grande"
 tech_bio_shields_4: "$tech_shields_4$"
 BIO_SHIELD_4: "Musculatura Protegida Avançada"
 BIO_SHIELD_4_DESC: "O ápice da tecnologia de bioescudos. Esta musculatura reforçada conduz energia com maior eficácia, aumentando a força dos escudos. Ela oferece proteção robusta contra ataques cinéticos e de energia, garantindo uma defesa versátil em combate."
 SMALL_BIO_SHIELD_4: "$BIO_SHIELD_4$ Pequena"
 MEDIUM_BIO_SHIELD_4: "$BIO_SHIELD_4$ Média"
 LARGE_BIO_SHIELD_4: "$BIO_SHIELD_4$ Grande"
 tech_bio_shields_5: "$tech_shields_5$"
 BIO_SHIELD_5: "Musculatura Hiperprotegida"
 BIO_SHIELD_5_DESC: "Tecidos altamente adaptáveis canalizam fluxos de energia imensos, criando uma defesa quase impenetrável. Este sistema avançado se regenera rapidamente, mantendo a nave biológica protegida mesmo sob ataques implacáveis."
 SMALL_BIO_SHIELD_5: "$BIO_SHIELD_5$ Pequena"
 MEDIUM_BIO_SHIELD_5: "$BIO_SHIELD_5$ Média"
 LARGE_BIO_SHIELD_5: "$BIO_SHIELD_5$ Grande"
 tech_bio_dark_matter_deflector: "$tech_dark_matter_deflector$"
 DARK_MATTER_BIO_DEFLECTOR: "Musculatura Enriquecida com Matéria Escura"
 DARK_MATTER_BIO_DEFLECTOR_DESC: "Esta tecnologia inovadora de bioescudos integra matéria escura aos tecidos orgânicos, ampliando drasticamente a condução de energia e a capacidade de defesa. A infusão dessa substância exótica permite que a musculatura gere escudos de força incomparável, capazes de suportar níveis extremos de dano."
 SMALL_DARK_MATTER_BIO_DEFLECTOR: "$DARK_MATTER_BIO_DEFLECTOR$ Pequena"
 MEDIUM_DARK_MATTER_BIO_DEFLECTOR: "$DARK_MATTER_BIO_DEFLECTOR$ Média"
 LARGE_DARK_MATTER_BIO_DEFLECTOR: "$DARK_MATTER_BIO_DEFLECTOR$ Grande"
 tech_bio_psionic_barrier: "$tech_psionic_barrier$"
 PSI_BIO_SHIELD: "Musculatura Enriquecida com Zro"
 PSI_BIO_SHIELD_DESC: "Uma musculatura enriquecida com a substância Zro, que reage a poderes psiônicos e gera escudos com precisão e adaptabilidade incomparáveis. Suas propriedades únicas aumentam tanto a resiliência quanto as capacidades regenerativas do bioescudo, proporcionando um nível de defesa quase sobrenatural."
 SMALL_PSI_BIO_SHIELD: "$PSI_BIO_SHIELD$ Pequena"
 MEDIUM_PSI_BIO_SHIELD: "$PSI_BIO_SHIELD$ Média"
 LARGE_PSI_BIO_SHIELD: "$PSI_BIO_SHIELD$ Grande"
 tech_bio_psionic_shield: "$tech_psionic_shield$"
 PSI_BIO_BARRIER: "Tecido com Ressonância Psi"
 PSI_BIO_BARRIER_DESC: "Este impressionante bioescudo canaliza energia psiônica por meio de tecidos cuidadosamente cultivados, formando defesas que se ajustam com precisão a qualquer ameaça iminente. Sua ressonância amplifica a força do escudo e acelera sua regeneração, tornando-o uma salvaguarda formidável contra os ataques mais imprevisíveis."
 SMALL_PSI_BIO_BARRIER: "$PSI_BIO_BARRIER$ Pequeno"
 MEDIUM_PSI_BIO_BARRIER: "$PSI_BIO_BARRIER$ Médio"
 LARGE_PSI_BIO_BARRIER: "$PSI_BIO_BARRIER$ Grande"
 tech_bio_archaeoshield: "$tech_archaeoshield$"
 BIO_ARCHAEO_SHIELD: "Tecido de Suspensão de Campo"
 BIO_ARCHAEO_SHIELD_DESC: "Ao cultivar tecidos de projeção de escudos em torno de nódulos de artefatos antigos, essa tecnologia gera campos de suspensão que desaceleram o tempo no ponto de impacto. Esse atraso melhora a capacidade do escudo de dissipar a energia dos ataques recebidos, aumentando significativamente sua resiliência."
 SMALL_BIO_ARCHAEO_SHIELD: "$BIO_ARCHAEO_SHIELD$ Pequeno"
 MEDIUM_BIO_ARCHAEO_SHIELD: "$BIO_ARCHAEO_SHIELD$ Médio"
 LARGE_BIO_ARCHAEO_SHIELD: "$BIO_ARCHAEO_SHIELD$ Grande"
