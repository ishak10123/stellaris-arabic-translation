 # RG Timeline events
 TIMELINE_EVENT_ORIGIN_RG_START: "$origin_red_giant$\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_START_TOOLTIP: "§HTunelamento Estelar§!\n§YEvento de Origem§!\n\nDescobrimos uma série de perturbações no subespaço. A busca pela origem da instabilidade perigosa de nossa estrela começou."
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA: "Morte de uma Gigante\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA_TOOLTIP: "§HTestemunhou uma Supernova§!\n§YEvento de Origem§!\n\nNossa estrela se expandiu até engolir todo o sistema, deixando os planetas em ruínas incandescentes e espalhando recursos pelo vazio. Agora a única escolha é buscar um novo futuro entre as estrelas."
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE: "Gigante Apaziguada\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE_TOOLTIP: "§HSalvou Nosso Mundo Natal§!\n§YEvento de Origem§!\n\nA estabilização do tamanho estelar foi alcançada, evitando um colapso catastrófico. A produção intensificada da estrela exigirá adaptação, mas ao enfrentar esses desafios, temos a chance de voltar mais fortes do que nunca."
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL: "Gigante em Paz\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL_TOOLTIP: "§HSalvou Nosso Mundo Natal§!\n§YEvento de Origem§!\n\nRevertemos as mudanças devastadoras em nossa estrela, fazendo com que ela voltasse ao estado pacífico sob o qual evoluímos. Provamos que podemos superar a ameaça mais apocalíptica e agora estamos prontos para enfrentar qualquer desafio que o universo apresente."
 # COSMIC DAWN
 # All strings below are in order of their appearance ingame
 infernals.2500.name: "Sinais das Profundezas" # intro
 infernals.2500.desc: "Análises direcionadas encontraram indícios de instalações sofisticadas enterradas sob a superfície de §Y[root.capital_scope.GetName]§!, aumentando em tamanho e complexidade conforme se aproximam do núcleo. Seus sinais materiais e energéticos correspondem aos da câmara de estase em que despertamos pela primeira vez.\n\nDevem ser restos de nossa civilização anterior. Se conseguirmos acessar essas instalações, talvez seja possível achar respostas para as maiores perguntas sobre o nosso passado: quem somos e o que aconteceu conosco?"
 infernals.2500.a: "Nossa jornada começa."
 INF_ORIGIN_COSMIC_DAWN_DRILLING: "Perfurando a Crosta" # from 2500
 INF_ORIGIN_COSMIC_DAWN_DRILLING_DESC: "Para entender quem somos, devemos primeiro descobrir de onde viemos. Precisaremos escavar as instalações enterradas sob a superfície de §Y[owner.Capital.GetName]§!."
 infernals.2505.name: "Mais de Nosso Povo Desperta"
 infernals.2505.desc.a: "Descobrimos mais cápsulas de estase contendo §Y[root.GetSpeciesNamePlural]§! com vida. Estamos tentando acordá-los, mas eles parecem não ter uma noção do passado muito mais clara do que a nossa."
 infernals.2505.desc.b: "Descobrimos mais cápsulas de estase contendo §Y[root.GetSpeciesNamePlural]§! com vida. Mesmo após a integração, ficou claro que eles não têm lembranças úteis."
 infernals.2505.a: "Autorize uma escavação completa."
 infernals.2505.b: "Remova apenas o que é necessário."
 infernals.2505.c: "Contrate terceirizados para escavar."
 situation_cosmic_dawn: "Escavação Profunda"
 situation_cosmic_dawn_type: "$situation_cosmic_dawn$"
 situation_cosmic_dawn_monthly_change_tooltip: "O progresso atual de nossa escavação profunda."
 situation_cosmic_dawn_desc: "Nossa escavação revelou instalações subterrâneas com tecnologia avançada, dados arquivados e cápsulas de estase contendo mais membros adormecidos de nossa raça. Nossa própria história está enterrada aqui. Se conseguirmos desenterrar tudo, talvez finalmente seja possível entender quem somos."
 situation_cosmic_dawn_finish_tt: "Para descobrir mais sobre nós mesmos, primeiro precisamos redescobrir o nosso passado distante."
 situation_cd_mod_mining: "$approach_cd_mining$"
 situation_cd_mod_drilling: "$approach_cd_drilling$"
 situation_cd_mod_financial: "$approach_cd_financial$"
 situation_cd_mod_storm: "$TRIGGER_FAIL$ Projeto especial §Y$INF_ORIGIN_COSMIC_DAWN_STORM$§! inacabado"
 situation_cd_mod_bribe: "$TRIGGER_FAIL$ Projeto especial §Y$INF_ORIGIN_COSMIC_DAWN_BRIBE$§! inacabado"
 sit_cd_stage1_tt: "Começamos a perfurar a crosta do planeta."
 sit_cd_stage2_tt: "A partir daqui, não conseguimos mais ver a superfície."
 sit_cd_stage3_tt: "Na metade da crosta, a temperatura está aumentando."
 sit_cd_stage4_tt: "Tão fundo na crosta, conseguimos ouvir a agitação do núcleo."
 sit_cd_stage5_tt: "Não podemos avançar mais ou seremos engolidos pelo núcleo."
 approach_cd_mining: "Mineração de Superfície"
 approach_cd_mining_tt: "Vamos colocar todos para escavar. Enquanto estamos lá embaixo, também podemos coletar recursos minerais. \nProgresso Mensal: §Y+$@approach_cd_mining$§!\n\n"
 approach_cd_drilling: "Perfuração Direcionada"
 approach_cd_drilling_tt: "Vamos implantar o equipamento de perfuração mais preciso e de maior qualidade que temos. Cavem apenas o que for necessário. \nProgresso Mensal: §Y+$@approach_cd_drilling$§!\n\n"
 approach_cd_financial: "Incentivos Financeiros"
 approach_cd_financial_tt: "Vamos redirecionar as autorizações de nossos terceirizados de mineração para essa via e ficar com parte dos lucros para nós. \nProgresso Mensal: §Y+$@approach_cd_financial$§!\n\n"
 # Stage 2
 infernals.2510.name: "Amnésia e Dados"
 infernals.2510.intro: "À medida que encontramos mais cápsulas de estase, descobrimos que a perda de memória é quase completa."
 infernals.2510.desc.a: "$infernals.2510.intro$\n\nAlguns de nossa raça que acabaram de despertar fizeram a mesma pergunta que agora nos inquieta: quem são vocês?\n\nApesar de séculos de história e de uma sociedade cada vez mais desenvolvida, não estamos mais próximos da resposta do que eles.\n\n$infernals.2510.outro$"
 infernals.2510.desc.b: "$infernals.2510.intro$\n\nApós acordarem, esses membros adormecidos da nossa raça continuam sem lembranças pertinentes sobre nossas origens, assim como os demais. Na ausência de respostas, somos obrigados a traçar o nosso próprio caminho pela história.\n\n$infernals.2510.outro$"
 infernals.2510.outro: "Ao contrário dos adormecidos, seus bancos de dados contêm informações surpreendentes. Repetimos a análise diversas vezes para confirmar, mas os resultados são inegáveis. Eles sugerem que mais de doze bilhões de anos se passaram desde que entramos em estase pela primeira vez.\n\nIsso situa a nossa origem próxima ao início do universo, em meio à formação das primeiras estrelas e planetas. Podemos estar entre os primeiros seres sencientes a evoluir."
 infernals.2510.a: "Coloque em dia o que perdemos."
 infernals.2510.b: "O universo é nosso por direito."
 # Stage 3
 infernals.2515.name: "Falha no Suporte à Vida"
 infernals.2515.desc: "Desenterramos uma tragédia. Registros desta instalação de cápsulas de estase ainda intacta revelam que §Y[event_target:homeworld.GetName]§! vagou à deriva por bilhões de anos antes do planeta ser capturado pela sua estrela atual. Isso desencadeou maremotos gigantescos.\n\nEmbora essas forças tenham formado o paraíso vulcânico que agora chamamos de lar, a onda de choque inicial rompeu de maneira crítica as células de energia da instalação. Os sistemas automatizados priorizaram indivíduos de alta patente, desativando cápsulas de status inferior e a manutenção estrutural. \n\nNossa equipe de [GetScientistPlural] estima que apenas um indivíduo pode ser salvo antes que a ativação comprometa o abastecimento precário de energia e acarrete um colapso total do túnel. \n\nSe a hierarquia não tivesse ditado a prioridade, talvez tivéssemos salvado muitos mais."
 infernals.2515.a: "O progresso científico é fundamental."
 infernals.2515.a.tt: "Líder obtido: £scientist£ §Y$scientist$§!"
 infernals.2515.b: "Priorizar os especialistas foi uma boa escolha."
 infernals.2515.b.tt: "Líder obtido: £official£ §Y$official$§!"
 infernals.2515.c: "Desligue as células sem a ativação."
 infernals.2515.c.tt: "Indivíduos podem ser substituídos, mas nosso império precisa de espaço para crescer."
 infernals.2520.name: "Refúgios Interstelares"
 infernals.2520.desc: "§Y[event_target:leader.GetName]§! está reconstruindo seus arquivos de estase. Suas descobertas mais recentes sugerem que inúmeras populações menores de [root.GetSpeciesNamePlural] podem estar espalhadas pela galáxia, preservadas em estase assim como nós estávamos.\n\nOs arquivos registraram as posições desses mundos, mas, como estrelas inteiras nasceram e morreram desde então, localizá-los agora exige uma interpolação complexa. Como prova de conceito, [event_target:leader.GetName] identificou um desses planetas, mas a tradução completa do conjunto de dados está na fase inicial.\n\nEnquanto isso, surge um pensamento inquietante: [root.Capital.GetStarName] pode não ser a nossa verdadeira estrela natal, mas apenas um refúgio entre muitos. Se for assim, qual é a nossa origem? Isso ainda importa?"
 infernals.2520.a: "Precisamos encontrar o nosso povo."
 infernals.2520.b: "Este mundo é o nosso lar agora."
 cosmic_dawn_anomalies_event_chain_title: "Refúgios Interstelares"
 cosmic_dawn_anomalies_event_chain_desc: "Inúmeras populações ocultas de [root.GetSpeciesNamePlural] podem estar espalhadas pela galáxia, preservadas em estase assim como nós estávamos.\n\nOs arquivos registraram as posições desses mundos, mas, como estrelas inteiras nasceram e morreram desde então, localizá-los agora exige uma interpolação complexa."
 # Anomaly 2
 cosmic_dawn_sleepers_category: "Adormecidos Isolados"
 cosmic_dawn_sleepers_category_desc: "Ao que tudo indica, o planeta nestas coordenadas oculta um esconderijo de adormecidos e tecnologia. Devemos investigá-lo minuciosamente."
 infernals.2525.name: "$cosmic_dawn_sleepers_category$"
 infernals.2525.desc: "§Y[root.leader.GetName]§! descobriu uma instalação subterrânea que abrigava mais de nosso povo em estase e conseguiu despertá-los com sucesso. Diferentemente de nós, eles têm vagas lembranças de suas vidas e são motivados por histórias de um grande império estelar que um dia pode voltar para resgatá-los.\n\nEles estão cautelosos, mas nos reconhecem como seus semelhantes. Podemos nos apresentar como seus tão aguardados salvadores, herdeiros daquela glória ancestral. Ou podemos dizer a verdade: estamos criando algo novo, ansiosos tanto para aprender com eles quanto para ensinar.\n\nReferências adicionais nos arquivos nos permitiram identificar um segundo candidato com cápsulas de estase."
 infernals.2525.a: "Somos seus salvadores ancestrais."
 infernals.2525.b: "Estamos construindo algo novo."
 infernals.2525.c: "Assimile todos eles."
 # Anomaly 3
 cosmic_dawn_sleepers2_category: "Adormecidos Cautelosos"
 cosmic_dawn_sleepers2_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2530.name: "$cosmic_dawn_sleepers2_category$"
 infernals.2530.desc: "§Y[root.leader.GetName]§! descobriu mais indivíduos de nosso povo em estase e conseguiu despertá-los, mas eles reagiram com medo, exigindo que partíssemos. Eles não nos reconheceram como semelhantes, nem acolheram a nossa presença.\n\nApós uma negociação tensa, eles expressaram o desejo de partir e explorar a galáxia. Podemos lhes oferecer uma nave simples a um custo modesto. Ou, diante de nossa necessidade constante de mão de obra, podemos realocá-los para a colônia mais próxima. Talvez assim eles nos entendam melhor.\n\nOs arquivos nesta instalação mostram a localização de outro mundo com mais cápsulas de estase."
 infernals.2530.a: "Dê uma nave a eles."
 infernals.2530.b: "Traga todos para o nosso lar."
 infernals.2530.b.tt: "£pop£ $POPS$ obtidos: §G+200§!"
 infernals.2530.c: "Assimile todos eles."
 # Ship returns
 infernals.2531.name: "O Retorno"
 infernals.2531.desc: "Os adormecidos que levaram nossa nave voltaram a bordo de uma nave de guerra imensa. Sua jornada pela galáxia os colocou em conflito com piratas que eles conseguiram enganar e derrotar.\n\nTomar a nave inimiga despertou algo neles: um gosto pela pirataria. A partir daí, seus saques ficaram cada vez mais ousados e seus alvos, cada vez mais poderosos, mas até mesmo a pirataria triunfante não pode durar para sempre.\n\nAgora, eles voltaram para casa em busca de estabilidade e talvez de algo maior. Com sua nave, experiência e despojos, eles ainda podem ser extremamente úteis."
 infernals.2531.a: "Valeu a pena."
 infernals.2531.a.tt: "Podemos usar a nave deles em nossa frota. Ganhamos um Cruzador."
 infernals.2531.b: "Readapte a nave deles para conquistar um novo mundo para nós."
 infernals.2531.b.tt: "Ganhamos um §H$colonizer$§!."
 infernals.2531.c: "Temos espaço para eles em nossa capital."
 infernals.2531.c.tt: "£pop£ $POPS$ obtidos: §G+200§!"
 # Anomaly 4
 cosmic_dawn_sleepers3_category: "Porto Estelar de Adormecidos"
 cosmic_dawn_sleepers3_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2535.name: "$cosmic_dawn_sleepers3_category$"
 infernals.2535.desc: "§Y[root.leader.GetName]§! descobriu uma instalação de estase menor junto a um porto estelar oculto, no qual havia uma nave científica quase funcional. Pequenos reparos serão suficientes.\n\nO local também continha um vasto acervo de dados científicos, incluindo espécimes preservados de outras espécies[GetInterstellarRefugiaDesc2535] Não está claro se foram capturados à força ou entregues voluntariamente, mas a nave inclui celas destinadas ao transporte de seres sencientes.\n\nPodemos descobrir muito ao estudá-los, talvez até haja mais formas de vida a serem descobertas."
 infernals.2535.contact: ", alguns provavelmente ancestrais dos sencientes modernos." # prints this in [GetInterstellarRefugiaDesc2535] above
 infernals.2535.nocontact: "." # Can't be empty, so holds the full stop.
 infernals.2535.a: "Estude os espécimes."
 infernals.2535.b: "Devolva os espécimes aos seus semelhantes."
 infernals.2535.c: "Elimine as evidências."
 # Random Stasis Pods discovered
 infernals.2536.1: "Após meses de trabalho, todos os [root.GetSpeciesNamePlural] adormecidos em [planet.GetName] juntaram-se a nós."
 infernals.2536.1.a: "Trace um curso para o sistema!"
 infernals.2536.1.b: "Não temos mais tempo para isso." # ends the chance to spawn more pods.
 infernals.2536.2: "Mais uma cápsula de estase foi aberta e seus habitantes levados para casa."
 infernals.2536.3: "Libertamos mais [root.GetSpeciesNamePlural] e estamos ajudando-os a se adaptar a um universo mais frio, no qual o calor estelar é imprescindível à sobrevivência."
 infernals.2536.4: "Mais [root.GetSpeciesNamePlural] foram despertados em [planet.GetName]."
 infernals.2536.5: "Outra cápsula de estase foi localizada."
 infernals.2536.6: "[root.leader.GetName] descobriu uma cápsula de estase adicional, trazendo mais [root.GetSpeciesNamePlural] de milênios atrás para o nosso presente."
 infernals.2536.7: "[root.leader.GetName] localizou mais uma cápsula de estase com [root.GetSpeciesNamePlural] preservados em segurança."
 infernals.2536.8: "[root.leader.GetName] abriu uma antiga cápsula de estase em [planet.GetName] e está tratando o choque térmico de seus habitantes."
 infernals.2536.9: "Mais uma cápsula de estase com [root.GetSpeciesNamePlural] foi encontrada em [planet.GetName]."
 infernals.2536.10: "Mais [root.GetSpeciesNamePlural] de milênios atrás foram despertados para se unirem a nós."
 # Stage 4
 infernals.2540.name: "Uma Prisão Ancestral"
 infernals.2540.desc: "Nossa escavação mais recente revelou uma surpresa: esse grupo de adormecidos despertou séculos atrás, mas nunca saiu da instalação.\n\nA análise arquitetônica mostra que ela foi trancada por fora, aparentemente para contê-los. Ao arrombar as portas reforçadas, fomos recebidos com hostilidade imediata, embora os adormecidos tenham recuado desde então.\n\nOs arquivos podem explicar isso, mas o acesso traz riscos de mais provocações. Podemos invadir a instalação e encerrar o assunto rapidamente ou tentar suborná-los para que cooperem."
 infernals.2540.a: "Invada a instalação."
 infernals.2540.b: "Ofereça presentes e amizade."
 INF_ORIGIN_COSMIC_DAWN_STORM: "Invadir a Instalação de Estase"
 INF_ORIGIN_COSMIC_DAWN_STORM_DESC: "Precisamos obter acesso a essa instalação, e os adormecidos despertos estão no caminho. Vamos removê-los à força."
 infernals.2545.name: "Tomando a Prisão"
 infernals.2545.desc: "Nossas forças invadiram a instalação e rapidamente subjugaram a maioria dos habitantes, encontrando apenas um pouco de resistência.\n\nOs arquivos revelam que se tratava de uma prisão. Os detentos eram extremistas que defendiam esforços tecnológicos radicais para reaquecer o universo em resfriamento, alguns extremamente impraticáveis e outros, possivelmente catastróficos. \n\nAlguns §Y[root.GetSpeciesNamePlural]§! que lideravam os prisioneiros barricaram-se em uma câmara central com explosivos e exigem que todos os habitantes fiquem e sejam soltos.\n\nO túnel poderia ser preenchido por um gás invisível que desativaria os explosivos para salvar a estrutura, mas faria com que a maioria dos habitantes sufocasse rapidamente."
 infernals.2545.a: "Preencha o túnel com gás."
 infernals.2545.a.tt: "£pop£ $POPS$ obtidos: §G+100§!"
 infernals.2545.b: "Evacue rapidamente."
 infernals.2545.b.tt: "£pop£ $POPS$ obtidos: §G+400§!"
 INF_ORIGIN_COSMIC_DAWN_BRIBE: "Subornar a Instalação de Estase"
 INF_ORIGIN_COSMIC_DAWN_BRIBE_DESC: "Se conseguirmos tornar os habitantes desta instalação dependentes de nós, poderemos exigir acesso ao local. Devemos oferecer muitos bens e recursos úteis e essenciais a eles."
 infernals.2550.name: "Tomando a Prisão"
 infernals.2550.desc: "Meses de comércio deixaram os antigos detentos da estase dependentes de nossos suprimentos. Quando ameaçamos interromper esse apoio, eles entraram em pânico e entregaram o controle da instalação.\n\nOs arquivos confirmam que se tratava de uma prisão. Esses indivíduos defendiam tecnologias radicais para reaquecer o universo em resfriamento; algumas ideias eram absurdas, enquanto outras eram perigosamente práticas.\n\nFelizmente, eles não se lembram de nada disso. Conforme os cientistas estudam o local, os antigos detentos se integram à sociedade, preparando-se para a assimilação."
 infernals.2550.a: "Muito bem."
 infernals.2550.a.tt: "£pop£ $POPS$ obtidos: §G+300§!"
 # Stage 5
 infernals.2555.name: "Um Acidente Trágico"
 infernals.2555.intro: "Houve um acidente no local da escavação mais recente. A estação de energia da instalação foi danificada. Por enquanto, as cápsulas de estase continuam ativas."
 infernals.2555.outro: "Não está claro por quanto tempo os sistemas continuarão funcionando. Para resgatarmos os adormecidos, precisamos agir antes que a instalação fique sem energia."
 infernals.2555.desc.a: "$infernals.2555.intro$\n\nHá suspeitas sobre alguns dos termófilos da instalação anterior que foram assimilados recentemente. Circulam boatos de que talvez eles não sejam os trabalhadores mais dedicados.\n\n$infernals.2555.outro$"
 infernals.2555.desc.b: "$infernals.2555.intro$\n\nAo saber desse desastre, a comunidade anterior de termófilos resgatados se ofereceu para ajudar a acelerar o processo de resgate.\n\n$infernals.2555.outro$"
 infernals.2555.a: "Expurgue qualquer trabalhador desleal."
 infernals.2555.b: "Pague para contratar mais ajuda."
 infernals.2555.c: "Corra para o resgate."
 infernals.2555.d: "Prossiga com cuidado."
 # Option events from above (Stage 4)
 infernals.2560.name: "Remediando a Situação"
 infernals.2560.desc: "Restringimos o acesso apenas aos nossos trabalhadores mais leais, minimizando transtornos durante o resgate.\n\nInfelizmente, a triagem de segurança reduziu nossa mão de obra e não conseguimos salvar a instalação. Os adormecidos faleceram.\n\nNosso único consolo é estudar a tecnologia. Sua decadência e desligamento gradual podem proporcionar conhecimentos valiosos."
 infernals.2560.a: "Que pena."
 infernals.2565.name: "$infernals.2560.name$"
 infernals.2565.desc: "Oferecemos recompensas financeiras pelo resgate e recebemos um grande número de candidatos.\n\nInfelizmente, o esforço foi sabotado por antigos detentos ressentidos com o uso de nossa riqueza para exercer controle. A sabotagem levou à morte de todos os habitantes das cápsulas de estase.\n\nComo pequeno consolo, avaliamos que os danos foram direcionados. Ainda podemos estudar a tecnologia e os arquivos, e essa falha expôs lacunas em nossa triagem de segurança que agora podem ser corrigidas."
 infernals.2565.a: "Que ato desprezível!"
 infernals.2570.name: "$infernals.2560.name$"
 infernals.2570.intro: "A chegada de inúmeros trabalhadores e equipes de resgate à instalação subterrânea nos permitiu extrair de maneira rápida e segura os [Species.GetNamePlural] adormecidos de suas cápsulas de estase defeituosas. Esses novos cidadãos, ao perceberem o destino do qual foram salvos, nos agradeceram pelo resgate."
 infernals.2570.outro: "Durante o resgate apressado, infelizmente muitas cápsulas de estase tiveram de ser cortadas ou destruídas, o que limita seu valor científico."
 infernals.2570.desc.a: "$infernals.2570.intro$\n\n$infernals.2570.outro$"
 infernals.2570.desc.b: "$infernals.2570.intro$\n\nAlém disso, parece que os voluntários da assimilação dos antigos detentos têm apoiado esses recém-chegados com diálogo e suprimentos, facilitando sua integração à sociedade.\n\n$infernals.2570.outro$"
 infernals.2570.a: "Ainda bem que tínhamos esses voluntários a mais."
 infernals.2570.a.tt: "£pop£ $POPS$ obtidos: §G+400§!"
 infernals.2570.b: "Muito bem."
 infernals.2570.b.tt: "£pop£ $POPS$ obtidos: §G+400§!"
 infernals.2570.c: "$ACKNOWLEDGED$"
 infernals.2570.c.tt: "£pop£ $POPS$ obtidos: §G+400§!"
 infernals.2575.name: "$infernals.2560.name$"
 infernals.2575.desc: "Nossos cientistas analisaram os sistemas com cuidado, garantindo que entendíamos totalmente com o que estávamos lidando antes de tentar resgatar a população adormecida.\n\nInfelizmente o processo, da análise à publicação e aos estudos complementares, demorou demais. Quando estávamos prontos, os sistemas de suporte à vida já haviam falhado e todas as vidas foram perdidas.\n\nEmbora seja trágico, o resgate rendeu grandes ganhos científicos, e a tecnologia recuperada já está se mostrando valiosa."
 infernals.2575.a: "Felizmente os vivos ainda se beneficiarão."
 infernals.2575.b: "$ACKNOWLEDGED$"
 # Situation completed
 infernals.2580.name: "Revelação de Nossa História"
 infernals.2580.desc: "Finalmente chegamos ao núcleo central, e seu tamanho desafia a imaginação. Uma vasta arcologia ocupa o interior do planeta, alimentada por magma e abrigando milhares de adormecidos.\n\nEla também contém arquivos imensos que registram o nosso passado: a ascensão de nosso império galáctico e vozes do grande resfriamento do universo. Alguns optaram pela estase, outros lutaram contra o inevitável e muitos simplesmente negaram a realidade e faleceram.\n\nEsse acervo revela verdades enterradas há muito tempo. Alguns acreditam que ele demonstra quem realmente somos e quem ainda podemos nos tornar. Outros argumentam que criamos uma nova identidade bem-sucedida e que a sociedade de nossos ancestrais já não é adequada para o universo de hoje.\n\nSeja como for, podemos utilizar essa vasta rede de túneis como preferirmos."
 infernals.2580.a: "Devemos reconstruir o nosso império antigo."
 infernals.2580.b: "Outros impérios deveriam respeitar o nosso legado."
 infernals.2580.b.tt: "Líder obtido: £commander£ §Y$commander$§! com nível inicial de §G5§!"
 infernals.2580.c: "Devemos pensar no futuro."
 infernals.2580.d: "Só importa que façamos o bem."
 # Relic & Specimen
 r_pyroglyphic_codex: "Códice Piroglífico"
 r_pyroglyphic_codex_desc: "Um planetário de cristal complexo que contém um vasto acervo de informações sobre uma civilização das origens do tempo. Seu conteúdo tem muito a ensinar sobre como construir uma grande sociedade."
 r_pyroglyphic_codex_effect_tt: "\nAtivar o $r_pyroglyphic_codex$ pela §Yprimeira vez§! adiciona permanentemente o modificador §Y$infernal_library$§! à nossa capital com os seguintes efeitos: $TABBED_NEW_LINE$- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+5§! $TABBED_NEW_LINE$- $MOD_PLANET_HOUSING_MULT$: §G+20%§! $TABBED_NEW_LINE$- $MOD_PLANET_AMENITIES_ADD$: §G+10%§!"
 infernal_library: "Arquitetura Subterrânea"
 infernal_library_desc: "A redescoberta de técnicas de construção antigas neste mundo abriu novas possibilidades para erguer cidades vastas e cavernosas. Detalhes e formas arquitetônicas nunca vistas são um espetáculo, lembrando a todos os cidadãos suas verdadeiras origens."
 pyroglyphic_codex_mod: "$r_pyroglyphic_codex$"
 pyroglyphic_codex_mod_desc: "Os segredos fascinantes encontrados no Códice Piroglífico estão estimulando novas linhas de pesquisa e continuarão a fazer isso por muitos anos."
 infernal_stasispod: "Cápsula de Estase Ancestral"
 infernal_stasispod_desc_short: "Uma caixa de pedra sintética equipada com controles térmicos surpreendentemente precisos."
 infernal_stasispod_desc_details: "Cápsulas de estase eram usadas para manter os [Species.GetNamePlural] em um estado de animação suspensa por bilhões de anos, despertando seus ocupantes somente se as temperaturas aquecessem o suficiente para sustentá-los. Esta cápsula veio de uma instalação na qual muitos sistemas falharam, causando a morte muitos indivíduos. Ela serve como um lembrete sombrio e solene de tudo o que os sobreviventes do povo [Species.GetName] superaram."
 ####################################
 # Colony Events
 ####################################
 # Imminent Eruption
 infernals.3000.name: "Erupção Iminente"
 infernals.3000.desc: "Sistemas de alerta geológico indicam uma provável erupção vulcânica perto do assentamento principal em §Y[planet.GetName]§! em algum momento do próximo ano.\n\nInvestir na liberação controlada de pressão poderia permitir que o fluxo de lava fosse aproveitado para geração de energia. Equipes também poderiam ficar de prontidão para extrair magma diretamente da erupção e filtrá-lo em busca de metais preciosos. Outra opção seria nos concentrar na evacuação de civis e suprimentos da área para minimizar riscos.\n\nTambém podemos continuar monitorando a situação antes de tomar qualquer medida, caso as previsões estejam incorretas."
 infernals.3000.a: "Evacuem!"
 infernals.3000.a.tt: "Tem §Y500§! de $energy$."
 infernals.3000.b: "Aguarde para ver."
 infernals.3000.c: "Concentre-se na geração de energia."
 infernals.3000.d: "Colete o magma."
 infernals.3005.name: "Bem na Hora"
 infernals.3005.desc: "A evacuação antecipada da colônia acabou sendo uma boa escolha. O vulcão entrou em erupção antes do esperado, danificando seriamente as construções da área. Agora que a pressão vulcânica subterrânea está no mínimo, os colonizadores podem voltar e reconstruir em segurança."
 infernals.3010.name: "Ira Vulcânica"
 infernals.3010.desc: "O vulcão entrou em erupção antes do previsto, e a colônia não estava preparada para lidar com a catástrofe. Houve grandes danos à infraestrutura e a perda de vidas foi significativa."
 infernals.3015.name: "Aguardar para Ver"
 infernals.3015.desc: "Após alguns meses, a atividade vulcânica perto da colônia §Y[planet.GetName]§! diminuiu novamente. Embora o risco à segurança não tenha desaparecido a longo prazo, parece que a colônia está segura por enquanto."
 infernals.3015.a: "Os riscos valeram a pena."
 infernals.3020.name: "Rede Elétrica Aprimorada"
 infernals.3020.desc: "As equipes de engenharia conseguiram estabelecer um sistema seguro para liberar lentamente a lava pressurizada das câmaras subterrâneas, fazendo-a passar por geradores de energia durante o processo. Isso resultou em um benefício de curto prazo para a rede elétrica da colônia."
 infernals.3025.name: "Extração de Magma"
 infernals.3025.desc: "A erupção vulcânica foi interrompida por uma combinação de disruptores ultrassônicos e barreiras físicas, resultando em um grande campo de magma contido e no processo de solidificação na superfície. As equipes de mineração já começaram a extrair essa riqueza mineral."
 # Lava Sports
 infernals.3030.name: "Esportes na Lava"
 infernals.3030.desc: "Há quem pense que ninguém gostaria de passar o tempo perto dos fluxos de lava abertos e velozes. Pelo menos em §Y[planet.GetName]§!, esse não seria o caso.\n\nColonizadores estão disputando corridas com aerobarcos em fluxos de lava ativos, desviando de rochas flutuantes e se jogando sobre quedas de lava. Outros estão apostando nos resultados dessas corridas, e casas de apostas já atraíram o interesse do crime organizado. Alguns pilotos até morreram em uma variedade de acidentes.\n\nA colônia não tem leis contra essa prática, já que nunca se imaginou que alguém faria algo assim. Podemos abraçar o entusiasmo dos colonizadores e deixá-los fazer o que quiserem, mas isso pode levar a façanhas cada vez mais perigosas, além de um possível componente criminoso, já que as apostas nesses eventos estão cada vez maiores. Outra alternativa seria regulamentarmos o esporte; embora possa trazer algumas queixas, isso deve reduzir mortes e crimes no longo prazo. Também poderíamos proibir os esportes por completo, o que seria eficaz, mas custoso de aplicar."
 infernals.3030.a: "Deixe rolar."
 infernals.3030.b: "Regulamente o esporte."
 infernals.3030.c: "Proíba essa bobagem!"
 lava_surfboard: "Prancha de Surfe na Lava"
 lava_surfboard_desc_short: "Uma placa de aço alongada com um mecanismo de flutuação improvisado soldado na parte inferior."
 lava_surfboard_desc_details: "Embora claramente tenha sido montada a partir de peças de reposição, esta prancha usada nos esportes de lava de [Event.Planet.GetName] foi criada com um cuidado e uma engenhosidade incomuns. Seu sistema de flutuação e suas proteções térmicas são excelentes e sua estética evoca a autossuficiência dos colonizadores da fronteira."
 infernals.3035.name: "Deixe fluir!"
 infernals.3035.desc: "Permitir que os colonizadores seguissem essa tendência gerou uma onda de entusiasmo em relação aos esportes de lava. Imagens de pilotos manobrando seus aerobarcos sobre fluxos de lava estão rapidamente virando um símbolo da cultura local de §Y[planet.GetName]§!.\n\nInfelizmente, o entusiasmo tem ofuscado a segurança. Continuam surgindo relatos esporádicos de mortes em corridas, e parece que agiotas ligados ao crime estão explorando os hábitos de apostas dos entusiastas desses esportes. Embora a aprovação pública da prática continue em alta, devemos monitorar as consequências negativas no futuro."
 infernals.3035.a: "Perturbador."
 infernals.3040.name: "Medidas de Segurança"
 infernals.3040.desc: "Embora os colonizadores inicialmente tenham se ressentido com a chegada das autoridades imperiais para regulamentar seu passatempo querido, as novas medidas de segurança exigidas nos veículos de corrida praticamente acabaram com ferimentos e fatalidades. Pilotos de corrida têm destacado os benefícios dessas regulamentações para sua própria segurança, e isso está conquistando a opinião pública.\n\nTambém foram impostas transparência financeira e tributação sobre as apostas em esportes de lava, com a arrecadação destinada ao equipamento de segurança dos corredores. Os elementos criminosos praticamente desapareceram das casas de apostas, embora alguns colonizadores reclamem que a tributação pelas autoridades é injusta."
 infernals.3040.a: "Melhor prevenir do que remediar."
 infernals.3045.name: "Esporte Proibido"
 infernals.3045.desc: "Autoridades policiais foram mobilizadas para acabar com essa prática perigosa. A indignação pública contra a repressão foi intensa, e protestos ocorreram por toda a colônia. No entanto, com os fluxos de lava sob vigilância constante e os corredores impossibilitados de competir, as mortes caíram para zero e a rede de apostas praticamente desapareceu."
 infernals.3045.a: "Não tínhamos escolha."
 lava_sports_flow: "Esportes de Lava: §GPermitidos§!"
 lava_sports_flow_desc: "Permitir que os colonizadores continuassem com essa tendência gerou uma onda de entusiasmo em relação aos esportes de lava."
 lava_sports_regulated: "Esportes de Lava: §YRegulamentados§!"
 lava_sports_regulated_desc: "Embora os colonizadores inicialmente tenham se ressentido com a chegada das autoridades imperiais para regulamentar seu passatempo querido, as novas medidas de segurança exigidas nos veículos de corrida praticamente acabaram com ferimentos e fatalidades. Pilotos de corrida têm destacado os benefícios dessas regulamentações para sua própria segurança, e isso está conquistando a opinião pública."
 lava_sports_banned: "Esportes de Lava: §RProibidos§!"
 lava_sports_banned_desc: "Autoridades policiais foram mobilizadas para acabar com essa prática perigosa."
 # Kindled Myths
 infernals.3055.name: "Mitos Inflamados"
 infernals.3055.desc: "Membros da espécie pré-MRQL em §Y[pre_ftl_planet.GetName]§! têm semelhanças impressionantes com seres mitológicos de alguns de nossos mitos mais antigos. Parte disso pode ser explicada por tendências amplas de evolução convergente e psicologia, mas quanto mais aprendemos sobre essa espécie, mais ligações encontramos.\n\nSerá que são os mesmos seres de nossos mitos e lendas? Há um grande entusiasmo acerca dessa possibilidade, e poderíamos investir nessa pesquisa. No entanto, às vezes coincidências se acumulam sem um grande significado, e investigar demais poderia revelar nossa presença a essa sociedade, trazendo consequências indesejadas."
 infernals.3055.a: "Ignore essa coincidência."
 infernals.3055.b: "Investigue mais."
 infernals.3060.name: "Pressuposto Tolo"
 infernals.3060.desc: "Apesar de alguns pedidos para a investigação, seria imprudente continuar acreditando nessa hipótese de alienígenas mitológicos. Afinal, essa espécie tem seus próprios mitos, lendas e maneiras de se representar que podem não se encaixar bem em nossos próprios pressupostos. As pesquisas sobre o tema foram interrompidas, e os recursos foram redirecionados para outras prioridades."
 infernals.3060.a: "Familiares, mas estranhos."
 infernals.3065.name: "Agitações Primitivas"
 infernals.3065.desc: "Ansiosos para conectar essa espécie aos nossos mitos, nossos agentes negligenciaram o protocolo de segurança de contato com civilizações pré-MRQL. Por todo o planeta, os habitantes registraram múltiplas observações de nossas naves, roubaram equipamentos e até sequestraram um de nossos agentes para estudo. A descoberta de nossa existência gerou agitação e respostas polarizadas.\n\nApesar do caos operacional, o entusiasmo pelas conexões mitológicas persiste entre nosso povo. Essa espécie está sendo vista sob uma ótica cada vez mais espiritual em todo o nosso império."
 infernals.3065.a: "Deveríamos ter sido mais cuidadosos."
 infernals.3070.name: "Descoberta Impressionante"
 infernals.3070.desc: "Estudos detalhados sobre os habitantes de §Y[pre_ftl_planet.GetName]§! enfraqueceram a hipótese mitológica. Embora muitos paralelos tenham sido encontrados entre as nossas histórias mais antigas e esses seres, também foram descobertas diferenças irreconciliáveis.\n\nApesar desse quadro mais complexo, ainda há entusiasmo por essa espécie. Foi sugerido que eles podem ser uma população remanescente dos seres originais de nossas histórias e que as diferenças podem ser decorrentes dos vastos períodos transcorridos desde então. Embora sejamos obrigados a reconhecê-los como uma sociedade própria hoje, muitos em nosso império agora sentem uma forte conexão espiritual com eles."
 infernals.3070.a: "Um momento enriquecedor para todos nós."
 # Molten Core Grand Archive specimen
 infernals.3200.name: "Núcleo Derretido"
 infernals.3200.desc: "À medida que a colônia em §Y[planet.GetName]§! crescia, também aumentavam as evidências da existência de uma civilização extinta que fazia uso de $sr_living_metal$, embora não houvesse nenhuma pista sobre como eles obtinham esse recurso.\n\nRecentemente, uma possível resposta surgiu na forma de uma estranha esfera cintilante envolta em um campo de força, trazida das profundezas pelos fluxos de magma do núcleo planetário. Seu propósito original e sua construção não são óbvias, mas ela produz um fluxo constante de $sr_living_metal$ quando exposta a temperaturas extremamente altas. Embora isso resolva de maneira conveniente aquele enigma arqueológico, agora é necessário decidir o que fazer com ela."
 infernals.3200.a: "Guarde o artefato."
 infernals.3200.a.accept: "Este objeto curioso não se parece com nada que tenhamos desenvolvido. Não é apenas útil como fonte de $sr_living_metal$, mas também constitui uma curiosidade científica e histórica digna de estudo."
 infernals.3200.b: "Jogue de volta na lava."
 infernals.3200.b.deny: "Não há nada a ser admirado em uma civilização que não conseguiu se adaptar e acabou extinta. O artefato deve ser descartado e esquecido."
 infernal_molten_core: "Núcleo Derretido"
 infernal_molten_core_desc_short: "Um orbe prateado com uma textura ondulante e fluida, envolto por um campo de força que emite um chiado sutil."
 infernal_molten_core_desc_details: "O campo de força do núcleo só enfraquece quando exposto a altas temperaturas, permitindo que uma gota de $r_living_metal$ escape. Seus criadores originais já se foram há muito tempo, mas este núcleo permanece como um testemunho de sua ciência e engenhosidade."
 # CD Timeline events
 TIMELINE_EVENT_ORIGIN_CD_START: "Ecos Profundos\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_START_TOOLTIP: "§HSeguindo Rastros§!\n§YEvento de Origem§!\n\nDetectamos sinais fracos e complexos muito abaixo da superfície do planeta. Eles se originam de uma rede de estruturas antigas das camadas profundas da crosta, construções que antecedem nossas eras de estase."
 TIMELINE_EVENT_ORIGIN_CD_END: "História Revelada\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_END_TOOLTIP: "§HFim da Cadeia de Eventos§!\n§YEvento de Origem§!\n\nDescobrimos uma vasta instalação ancestral nas profundezas do planeta e extraímos um códice de informações perdidas originárias de uma era muito antiga. Somos os herdeiros de um legado ancestral e poderoso, prontos para reivindicar a nossa herança."
