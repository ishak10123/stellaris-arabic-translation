 approach_reassure_public_effect: "Informações sobre esta crise poderiam desestabilizar a sociedade. Vamos manter isso em segredo.$rg_default_progress$"
 approach_find_the_cause_effect: "A expansão da estrela não pode ser detida. Uma investigação imediata e abrangente é essencial para determinar a causa subjacente.$rg_default_progress$"
 approach_suppress_unrest2_effect: "Uma resolução eficaz é impossível em meio à inquietação social. A prioridade é restaurar a ordem e a estabilidade.$rg_default_progress$"
 approach_disrupt_subspace_tunnels2_effect: "Preservar a integridade de nossa estrela exige contramedidas imediatas. A interrupção dos túneis subespaciais é essencial.$rg_small_progress$"
 approach_add_fuel_to_the_fire3_effect: "Este desenvolvimento apresenta uma oportunidade para iniciarmos operações de extração profunda nos planetas de nosso sistema natal, maximizando a aquisição de minerais.$rg_high_progress$"
 approach_wait_and_see3_effect: "Devemos parar de tomar decisões precipitadas. Vamos ter paciência e observar.$rg_small_negative_progress$"
 approach_siphon_stellar_material3_effect: "Talvez seja possível acelerar o retorno à normalidade se removermos material da estrela diretamente.$rg_medium_negative_progress$"
 approach_continue_siphoning4_effect: "Podemos usar esse poder para incinerar o nosso sistema natal, o que permitirá filtrar os restos em busca de riquezas.$rg_high_progress$"
 approach_stabilize_the_star4_effect: "Podemos estabilizar a estrela em seu estado atual, mantendo as nossas adaptações atuais.$rg_no_progress$"
 approach_cease_activity4_effect: "Podemos desativar a plataforma de mineração e permitir que a estrela volte a um estado mais tranquilo.$rg_small_negative_progress$"
 approach_reverse_inflation4_effect: "Podemos reduzir a nossa estrela de volta ao seu tamanho anterior, restaurando a habitabilidade de nosso mundo natal.$rg_high_negative_progress$"
 approach_at_any_cost_effect: "Devemos conter o crescimento para evitar o desastre, custe o que custar.\nCrescimento Mensal: §G+0.5§!\n\n"
 INF_ORIGIN_RED_GIANT_TRIANGULATION: "Triangular Interferência Subespacial"
 INF_ORIGIN_RED_GIANT_TRIANGULATION_DESC: "Local viável para triangular a origem da interferência."
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD: "Proteger o Mundo Natal"
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD_DESC: "Enquanto trabalhamos incansavelmente para reverter as mudanças da nossa estrela, nossas próprias formas devem estar preparadas para enfrentar o calor. Adaptar a população a temperaturas mais altas nos ajudará a prosperar ao lado do novo futuro ardente de nossa estrela."
 INF_ORIGIN_RED_GIANT_EXPLOIT: "Exploração Térmica"
 INF_ORIGIN_RED_GIANT_EXPLOIT_DESC: "O aumento da radiação solar apresenta sérios problemas a longo prazo, mas no curto prazo podemos aproveitá-la para ampliar a nossa capacidade industrial e energética."
 INF_ORIGIN_RED_GIANT_BOARD_STATION: "Embarcando na Estação"
 INF_ORIGIN_RED_GIANT_BOARD_STATION_DESC: "Esses alienígenas imprudentes estão explorando a nossa estrela. Devemos embarcar na estação deles imediatamente e assumir o controle."
 INF_ORIGIN_RED_GIANT_PARLAY: "Xenolinguística de Emergência"
 INF_ORIGIN_RED_GIANT_PARLAY_DESC: "Os habitantes da estação controlam o sifão subespacial que está destruindo a nossa estrela. Devemos estabelecer comunicações para garantir sua cooperação na resolução desse problema."
 INF_THERMOPHILE_ADAPTATION: "Evolução Termofílica"
 INF_THERMOPHILE_ADAPTATION_DESC: "Iniciamos nossa jornada para incendiar a galáxia, mas as nossas próprias formas devem estar preparadas para enfrentar o calor. Adaptar a nossa população a temperaturas mais altas nos ajudará a prosperar no novo futuro ardente.\n\n§HAo Concluir:§!$TABBED_NEW_LINE$- Adiciona o modificador §Y$crisis_thermophile_adaptation$§!$TABBED_NEW_LINE$- Aumenta a §Y$mod_pc_volcanic_habitability$§! em §G+50%§!"
