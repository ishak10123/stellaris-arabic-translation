l_braz_por:
 ####################################
 # Anomaly Events
 ####################################
 # useful refs:
 # [From.GetName] planet
 # [From.GetStarName]
 # [Leader.GetName] scientist
 spires_of_light_category: "Pináculos de Luz"
 spires_of_light_category_desc: "Análises iniciais revelam uma série de estruturas imponentes e luminescentes se erguendo em meio a uma paisagem que, de outro modo, pareceria insignificante. Sua origem e propósito são obscuros, mas seu brilho espectral sugere algo além de um simples fenômeno natural."
 infernals.500.name: "$spires_of_light_category$"
 infernals.500.desc: "Sondas enviadas para investigar os pilares luminosos determinaram que eles são formados a partir de um magma de silicato maleável. Esse material sobe por aberturas na rocha matriz, solidificando-se antes de chegar à superfície. As estruturas resultantes podem crescer centenas de metros de altura até que seu próprio peso provoque o colapso.\n\nO resultado é uma verdadeira floresta de pináculos compostos de vidro vulcânico quase puro e transparente, e cada um reflete o brilho alaranjado do magma incandescente que ainda se agita abaixo.\n\n[Leader.GetName], da equipe científica, sugere que os restos desses pináculos colapsados poderiam servir como um recurso valioso."
 #EXCELLENT:0 (first option has default answer)
 infernals.500.a: "Deixe este local divino em paz."
 infernals.500.b: "Faça uma oferta para uma licença de extração."
 infernals.500.c: "Use-os para tiro ao alvo."
 lava_whirlpool_category: "Redemoinho de Lava"
 lava_whirlpool_category_desc: "A primeira inspeção de [Planet.GetName] revelou uma estranha formação semelhante a uma tempestade no principal oceano de lava do planeta. Um fenômeno raro que merece investigação."
 infernals.56.name: "Redemoinho de Lava"
 infernals.56.desc: "[Leader.GetName] confirmou que a formação estranha é um redemoinho de lava. Tais ocorrências são extremamente raras, e jamais registrou-se uma dessa magnitude. Querendo saber mais sobre o fenômeno, [Leader.GetName] ordenou uma missão de coleta de amostras.\n\nAs amostras revelam que o redemoinho é parcialmente sustentado por uma poça estável de metal vivo, que é despedaçado pelas correntes e, em seguida, tenta se reconstituir. Esse processo de recomposição perturba ainda mais a lava, mantendo o movimento do redemoinho. A análise também demonstra que esse metal vivo poderia ser extraído com pouco esforço."
 infernals.56.a: "Inicie operações de extração."
 outgassing_category: "Desgaseificação"
 outgassing_category_desc: "Uma varredura de rotina em [Planet.GetName] registrou flutuações químicas fortes e incomuns na atmosfera. Uma inspeção mais detalhada pode explicar o que está acontecendo aqui."
 infernals.1001.name: "Desgaseificação"
 infernals.1001.desc: "As flutuações químicas na atmosfera foram confirmadas tanto ao longo do tempo quanto pela superfície. Elas se mostraram mais intensas sobre o grande oceano de magma exposto do planeta, levando ao envio de uma sonda para coletar amostras.\n\nApós uma análise mais aprofundada, [Leader.GetName] determinou que o oceano de magma em [Planet.GetName] está soltando gases exóticos valiosos. Essa descoberta inesperada sugere que o planeta pode se tornar um possível contribuinte para as nossas indústrias, caso seja possível explorá-lo."
 infernals.1001.a: "Inicie os procedimentos de extração."
 crystal_lava_lakes_category: "Lagos de Lava Cristalina"
 crystal_lava_lakes_category_desc: "Parece que este planeta tem grandes lagos formados pela lava que flui livremente em sua superfície. Vale a pena investigá-las em busca de oportunidades de extração de recursos."
 infernals.1002.name: "Lagos de Lava Cristalina"
 infernals.1002.desc: "Nossas primeiras imagens da superfície de [Planet.GetName] revelaram formações geológicas impressionantes e inesperadas que estão sendo chamadas de \"lagos de lava cristalina\". Esses corpos duradouros de magma são infundidos com minerais únicos que, dentro de uma faixa específica de temperatura, se organizam naturalmente em matrizes cristalinas. O resultado é uma transparência excepcional e uma iridescência vermelha por todo o lago. Devido à órbita do planeta, esse efeito visual marcante aumenta e diminui em um ciclo sazonal conforme as temperaturas oscilam.\n\nO apelo estético desses lagos de lava cristalina pode virar uma atração turística poderosa. Os minerais cristalinos em si também poderiam ser coletados da superfície durante a estação ativa, e suas propriedades poderiam ser aproveitadas como meio de armazenamento de energia."
 infernals.1002.a: "Transforme o local em um resort."
 infernals.1002.b: "Extraia energia dos lagos."
 crystal_lava_resort: "Resort de Lava Cristalina"
 crystal_lava_resort_desc: "Os lagos visualmente deslumbrantes deste planeta foram transformados em um destino turístico de luxo, atraindo visitantes de toda a galáxia."
 bioadaptive_flora_category: "Flora Bioadaptativa"
 bioadaptive_flora_category_desc: "Embora [Planet.GetName] se pareça com uma típica terra vulcânica devastada, o teor de oxigênio é estranhamente alto. Algo incomum deve estar produzindo esse oxigênio."
 infernals.1003.name: "Flora Bioadaptativa"
 infernals.1003.desc: "A avaliação inicial de [Planet.GetName] caracterizou o planeta como um mundo de magma e fogo, mas inspeções revelaram um ecossistema nativo de flora complexa habitando uma rede de vales de fenda espalhados pela superfície. Essas plantas produzem oxigênio e retêm a pouca umidade, criando bolsões de microclimas quase temperados em meio a um deserto superaquecido.\n\nOs biomas sustentados por essa flora podem ser habitáveis para espécies que normalmente evitam colonizar mundos vulcânicos, e a própria flora pode ser adequada para a agricultura. Qualquer grupo de colonizadores se beneficiaria de uma exploração minuciosa para descobrir exatamente o que vive nesses cânions."
 infernals.1003.a: "Marque a área como uma zona de assentamento viável."
 infernals.1003.tooltip_a: "Adiciona um modificador planetário que melhora a Tolerância e o Crescimento da Habitabilidade."
 bioadaptive_flora_modifier: "Flora Bioadaptativa"
 bioadaptive_flora_modifier_desc: "Uma flora nativa resistente cobre os vales de fenda deste planeta, criando microclimas mais frescos e respiráveis e sustentando uma habitabilidade limitada mesmo em um ambiente vulcânico."
 tectonic_icebreaker_category: "Quebra-Gelo Tectônico"
 tectonic_icebreaker_category_desc: "Anomalias estranhas de baixa temperatura foram detectadas no regolito de [Planet.GetName], sugerindo que algum processo ou objeto pode estar resfriando partes da superfície. Uma expedição de perfuração revelaria mais."
 infernals.1004.name: "Quebra-Gelo Tectônico"
 infernals.1004.desc: "[Leader.GetName] relata que, sob a superfície vulcânica de §Y[from.GetName]§!, existem grandes geleiras. Elas estão envoltas em formações rochosas incomuns, compostas de minerais com propriedades isolantes excepcionais. A atividade tectônica está degradando aos poucos essas camadas de isolamento, e [Leader.GetName] prevê que, caso as temperaturas entre as geleiras e o restante do planeta se igualem, o planeta esfriaria o suficiente para ser considerado um mundo árido, em vez de vulcânico.\n\nPodemos acelerar esse processo para tornar o planeta um pouco mais habitável. No entanto, o fenômeno é cientificamente curioso, e pode ser benéfico permitir que seja estudado enquanto ocorre de forma natural."
 infernals.1004.a: "Estabilize as placas tectônicas."
 infernals.1004.b: "Acelere o derretimento."
 infernal_oasis_category: "Oásis Infernal"
 infernal_oasis_category_desc: "Imagens impressionantes de §Y[from.GetName]§! mostram um mundo derretido e ardente, interrompido por uma faixa brilhante e verde do tamanho de um continente. Essa visão extraordinária sugere algo muito incomum na superfície."
 infernals.505.name: "Um Refúgio entre o Cataclismo"
 infernals.505.desc: "A composição única e as placas tectônicas de §Y[from.GetName]§! deram origem a uma maravilha inigualável. Enquanto a maior parte do planeta é um deserto escaldante, tomado por fumaça vulcânica e rios de lava, uma imensa placa continental de rocha sólida se ergue dezenas de quilômetros acima da superfície média. As terras altas resultantes, bem acima da camada de nuvens tóxicas, abrigam um ecossistema verdejante de plantas e animais nativos.\n\nEsse planalto seria facilmente habitável para muitas espécies e poderia oferecer descobertas científicas fascinantes, caso fosse estudado."
 infernals.505.a: "Uma descoberta incrível."
 NAME_Vermilion: "Vermilion"
 NAME_Kira: "Kira"
 mysterious_ringing_category: "Zumbido Misterioso"
 mysterious_ringing_category_desc: "Nossos cientistas detectaram picos regulares de ondas de rádio oriundos de um único ponto em [Planet.GetName]. Eles parecem coincidir com o momento da passagem da noite para o dia sobre a fonte do sinal."
 infernals.3210.name: "Zumbido Misterioso"
 infernals.3210.desc: "Uma equipe científica chegou a [from.GetName] para rastrear o sinal e determinou que ele vinha de um sistema de cavernas subterrâneas equipadas com instrumentos de observação científica.\n\n[Leader.GetName] liderou a equipe pelas cavernas, onde encontraram uma câmara isolada por ligas metálicas desconhecidas que emitia um leve zumbido. [GetMysteriousRingingDesc3210]\n\nApós receber equipamentos de proteção auditiva, a equipe entrou e se deparou com uma criatura de espécie desconhecida hibernando ao lado da fonte do sinal: um dispositivo cilíndrico estranho.\n\nA análise determinou que o dispositivo emite ondas intensas e regulares de rádio, seguidas de várias horas de ruído melódico sobreposto a vocalizações que parecem compatíveis com a anatomia vocal da criatura. [Leader.GetName] especula que o dispositivo possa estar tentando despertar a criatura de acordo com um cronograma definido."
 infernals.3210.individual: "A equipe de inspeção descobriu uma falha na vedação e conseguiu atravessá-la bem no momento que o zumbido ficou ensurdecedor, provocando ataques de pânico e surtos de fúria entre os membros da equipe."
 infernals.3210.gestalt: "A equipe de inspeção descobriu uma falha na vedação e conseguiu atravessá-la bem no momento que o zumbido ficou ensurdecedor, provocando sobrecarga sensorial e colapso cognitivo entre os drones."
 infernals.3210.a: "Copiem a pesquisa deles e saiam daí."
 infernals.3210.b: "Tentem acordar e recrutar a criatura."
 infernals.3210.btt: "Líder obtido: £scientist£ §Y$scientist$§! com nível inicial de §G4§!."
 infernals.3210.c: "Roubem o dispositivo."
 infernals.3210.ctt: "A eficiência de nossos trabalhadores aumentaria se fossem lembrados frequentemente de voltar ao trabalho. Libera uma decisão que concede §G+10%§! de produção de £job£ ['concept_jobs'] ao custo de §R-5%§! de £happiness£ ['concept_happiness']."
 decision_planetary_workshift: "Impor Turnos de Trabalho Planetários"
 decision_planetary_workshift_desc: "$planetary_workshift_deployed_desc$"
 planetary_workshift_deployed: "Turnos de Trabalho Planetários Impostos"
 planetary_workshift_deployed_desc: "Garantir que o planeta inteiro funcione em um único fuso horário melhorará a comunicação e a eficiência entre equipes a um custo aceitável de redução de felicidade."
 ####################################
 # Origin Events
 ####################################
 # Red Giant Origin
 infernals.45.name: "Tendências Preocupantes"
 infernals.45.desc: "Há muito tempo consideramos §Y[capital_star.GetName]§! uma típica gigante vermelha, mas análises recentes indicam que seu tamanho e emissões de radiação estão aumentando. Essas mudanças já estão causando efeitos mensuráveis em nosso clima, e a população está começando a se preocupar.\n\nParece que essa tendência não vai mudar. Para garantir a sobrevivência de nossa espécie, devemos investigar a causa desse fenômeno."
 infernals.45.desc.gestalt: "Há muito tempo consideramos §Y[capital_star.GetName]§! uma típica gigante vermelha, mas análises recentes indicam que seu tamanho e emissões de radiação estão aumentando. Essas mudanças já estão causando efeitos mensuráveis em nosso clima.\n\nParece que essa tendência não vai mudar. Para garantir a sobrevivência de nossa espécie, devemos investigar a causa desse fenômeno."
 infernals.45.a: "Mantenha a calma e minimize o problema."
 infernals.45.b: "Temos que investigar o quanto antes."
 infernals.45.c: "Temos outras prioridades."
 infernals.45.d: "Que a equipe de RP cuide disso."
 infernals.45.public.tt: "\n§HSituação:§! $situation_red_giant_expansion$ \n- Define a abordagem da situação para §Y$approach_reassure_public$§! \n- Ganho Mensal de Recursos: §G10§! £unity£"
 infernals.45.cause.tt: "\n§HSituação:§! $situation_red_giant_expansion$ \n- Define a abordagem da situação para §Y$approach_find_the_cause$§!"
 infernals.50.name: "Nova Estelar"
 infernals.50.desc: "[GetRedGiantEndingExplode]"
 infernals.50.totalIgnorance: "Já não importa mais o que causou a calamidade da gigante vermelha; tudo o que podemos fazer agora é aceitar nossa condição atual e reconstruir a partir do que restou."
 infernals.50.semiIgnorance: "As perturbações causadas pela explosão estelar eliminaram qualquer evidência necessária para identificar o culpado.\n\nTudo o que podemos fazer agora é aceitar nossa condição atual e reconstruir a partir do que restou."
 infernals.50.defaultEnding: "O processo iniciado por uma população remanescente de alienígenas em uma estação de mineração degradada finalmente chegou ao fim: §Y[Target.GetStarName]§! entrou em nova após engolir quase todo o sistema. Plasma em tecnicolor e radiação varreram §Y[event_target:red_giant_homeworld_tmp.GetName]§!, juntamente com o restante de nosso sistema natal.\n\n[GetMegacorpDesc50]\n\n[GetLususMiningDesc]"
 infernals.50.megacorp: "Nosso mundo natal foi transformado em um vasto campo de riquezas minerais espalhadas convenientemente pelo sistema. O custo de mineração desses recursos é muito menor do que seria se ainda estivessem em seus respectivos planetas e luas. Nossos lucros devem disparar graças a esse fornecimento barato de recursos."
 infernals.50.nonmegacorp: "Embora nosso mundo natal tenha sido devastado, a nova expôs um tesouro de recursos minerais em todo o sistema que podem ser coletados facilmente por equipamentos de mineração convencionais. Essa riqueza pode ser usada para construir um novo futuro."
 infernals.50.lususExists: "A estação emite um último pulso de energia antes de se desligar, deixando-nos sozinhos para recolher os cacos de nosso mundo natal."
 infernals.50.lususGone: "Agora que a estação não existe mais, §Y[event_target:red_giant_homeworld_tmp.GetName]§! pode descansar em paz sabendo que isso nunca mais vai acontecer."
 infernals.50.a: "Precisamos fazer o possível para restaurar o nosso lar."
 infernals.51.name: "Nova Controlada"
 infernals.51.desc: "Após esforços monumentais de limpeza, a superfície de §Y[this.GetName]§! voltou a ser habitável para $trait_infernal_plural$. Embora algumas cicatrizes permanentes se mantenham, agora elas podem ser aproveitadas em todo o seu potencial para oportunidades únicas de pesquisa."
 infernals.60.name: "Volta ao Normal"
 infernals.60.desc: "Ao ajustar o sifão, extrair hidrogênio da camada e calibrar as proporções de entrada da estrela, conseguimos reverter com segurança a expansão de §Y[Target.GetStarName]§!, que voltou à sua antiga tranquilidade como uma gigante vermelha estável.\n\nJá detectamos a estabilização climática de §Y[Target.GetStarName]§! e contamos com um futuro mais habitável no qual nosso planeta natal continuará sendo o coração de nosso império.\n\n[GetRedGiantEndingKalmStationStatus]"
 infernals.60.lususDestroyed: "Sem a estação, talvez nunca seja possível compreender exatamente o que aconteceu, mas podemos aproveitar ao máximo qualquer material liberado pela estrela."
 infernals.60.lususAlive: "Agora que compreendemos como controlar a estação, podemos decidir como ela será usada."
 infernals.60.a: "Desmonte a estação."
 infernals.60.b: "Mantenha o nosso estudo da estação."
 infernals.60.c: "Deixe que se torne um monumento da nossa vitória."
 infernals.60.d: "Enfim, alívio."
 infernals.65.name: "Expansão Estelar"
 infernals.65.desc: "Observações contínuas confirmam que §Y[Target.system_star.GetName]§! está se expandindo em um ritmo acelerado. Também estão sendo relatados efeitos físicos decorrentes do aumento da radiação. Se não encontrarmos uma forma de detê-la, §Y[Target.system_star.GetName]§! vai nos erradicar muito antes de consumir o planeta.\n\n[GetMegacorpDesc65]"
 infernals.65.nonmegacorp: "A proteção contra a radiação estelar pode nos dar mais tempo. Um plano mais arriscado, mas possivelmente lucrativo, seria aproveitar o aumento da radiação para impulsionar nossos setores de energia e indústria."
 infernals.65.megacorp: "Um investimento em proteção planetária funcionaria como um seguro contra a volatilidade e ajudaria a preservar a nossa base de ativos, mas talvez possamos aumentar nossas métricas de energia e indústria se optarmos por aproveitar o aumento da radiação em vez disso."
 infernals.65.a: "Proteja o nosso mundo natal."
 infernals.65.b: "Explore o fenômeno."
 infernals.70.name: "Uma Estrela Faminta"
 infernals.70.desc: "A estrela §Y[Target.GetName]§! fez sua primeira grande vítima, engolindo o mundo mais interno de nosso sistema. As matérias-primas ainda existem, mas agora estão além de nosso alcance, nas profundezas ardentes do astro.\n\nEmbora possamos superar a perda econômica imediata, isso nos dá um vislumbre assustador do que aguarda §Y[Owner.Capital.GetName]§!."
 infernals.75.name: "Dano Colateral"
 infernals.75.desc: "O crescimento imprevisto de nossa gigante vermelha consumiu mais um planeta. Seus ricos recursos ficarão para sempre inacessíveis, a menos que a estrela expulse suas camadas externas em uma nova violenta."
 infernals.95.name: "Tunelamento Estelar"
 infernals.95.desc: "A verdade sobre §Y[capital_star.GetName]§! é mais estranha do que imaginávamos. Investigações em andamento revelaram um par de túneis subespaciais idênticos nas profundezas de nossa estrela.\n\nUm desses canais direciona material rico em hidrogênio diretamente para a camada externa, acelerando a fusão e aumentando a produção de hélio. Isso deveria provocar a compressão do núcleo, mas o segundo túnel drena energia ativamente, contrabalançando o processo e resultando na expansão da estrela.\n\nA telemetria inicial dos túneis subespaciais sugere que eles se conectam a múltiplos pontos espalhados pela galáxia. Nossa sobrevivência depende da investigação urgente deles."
 infernals.95.a: "Vamos precisar investigar três desses locais."
 infernals.95.a.tt: "Alvos viáveis para a triangulação da origem subespacial foram localizados."
 infernals.105.name: "Marcas Subespaciais"
 infernals.105.desc: "Análises astrométricas ao redor de §Y[FromFromFrom.GetName]§! revelaram marcas subespaciais inexplicáveis. Embora atualmente não exista um ponto de saída nesse local, um túnel pode ter se aberto na órbita desse gigante gasoso no passado. Os dados forneceram descobertas na Física que podem ser aplicadas em outras áreas.\n\nEnquanto isso, precisaremos procurar em outro lugar para determinar a origem dos túneis subespaciais ativos dentro de nossa estrela."
 infernals.105.a: "Continue procurando."
 infernals.110.name: "Sucata Alienígena"
 infernals.110.desc: "As análises em torno de §Y[FromFromFrom.GetName]§! indicam marcas subespaciais. Também identificamos bolsões de sucata antiga próximos ao planeta. Esses fragmentos estão em órbita travada e podem ter relação com as marcas.\n\nAnálises contínuas dessas flutuações subespaciais devem nos ajudar a otimizar as matrizes solares em torno de nossa estrela natal.\n\nEmbora esses dados tenham sido úteis, precisamos de pelo menos mais um local de inspeção para determinar com precisão a origem atual de nossos problemas."
 infernals.110.a: "Leiloe a sucata."
 infernals.115.name: "Triangulação Concluída"
 infernals.115.desc: "Finalmente um avanço de verdade.\n\nNovas marcas ao redor de §Y[FromFromFrom.GetName]§! nos permitiram triangular a origem da perturbação de nossa estrela para um sistema com assinaturas hostis que até então não havia sido detectado.\n\nEssa investigação pode acabar nos ajudando a neutralizar o que está afetando nossa estrela.\n\nUma vez no sistema §YLusus§!, talvez seja possível mudar o destino de §Y[FromFromFromFrom.Target.solar_system.GetName]§!, assim como o de nossa civilização."
 infernals.115.a: "Prossiga com cuidado."
 infernals.115.b: "Prepare uma demonstração de força."
 infernals.115.c: "Realize uma bênção antes de nos aproximarmos."
 red_giant_lusus_triangulated_tt: "Um novo sistema foi revelado."
 infernals.2115.name: "Grupo de Embarque"
 infernals.2115.desc: "Nossas forças tomaram o controle da estação. Os habitantes resistiram um pouco, mas não estavam armados o suficiente e não tinham treinamento em combate. Em uma inspeção mais detalhada, muitos pareciam ser jovens. Aqueles que não foram mortos foram detidos.\n\nJá iniciamos a análise de como podemos controlar os túneis subespaciais, que parecem ser algum tipo de sifão para extração de energia. Com o tempo, poderemos lidar com a situação em nosso sistema natal."
 infernals.2115.a: "Destrua tudo."
 infernals.2115.b: "Interrogue os sobreviventes."
 infernals.2115.c: "Escravize-os."
 infernals.2115.d: "Os sobreviventes são um risco. Elimine-os."
 infernals.2115.e: "Fale com os sobreviventes."
 infernals.2115.f: "Expurgue-os da estação."
 infernals.2115.g: "Vamos devorá-los."
 infernals.400pops: "§G400§! £pop£ $POPS$ são criados em [this.GetName]"
 infernals.300pops: "§G300§! £pop£ $POPS$ são criados em [this.GetName]"
 infernals.2121.name: "Alienígenas Eliminados"
 infernals.2121.desc: "A estação de mineração subespacial foi destruída, matando todos a bordo.\n\nA destruição da estação detonou algum tipo desconhecido de meio de armazenamento de energia. A energia resultante avançou pelo túnel subespacial em colapso até §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!, piorando muito a situação em nosso lar.\n\nDito isso, a transferência de hidrogênio para nossa estrela foi interrompida. Por mais grave que esteja a situação, ela não vai piorar ainda mais. Talvez nunca seja possível descobrir a origem ou o objetivo dessa estação, mas pelo menos podemos descansar tranquilos sabendo que tal poder jamais cairá nas mãos de nossos rivais.\n\nInfelizmente, não temos uma maneira imediata de fazer com que §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! volte ao seu estado original. Se quisermos alterar a estrela precisaremos confiar em nossas gravações para desvendar o que a estação estava fazendo."
 infernals.2121.a: "Vamos arrumar essa bagunça."
 infernals.2122.name: "Estação Destruída"
 infernals.2122.desc: "À medida que os restos da estação flutuam pelo espaço, sua destruição nos oferece uma nova chance de mudar o destino de §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!; não apertando um botão, mas com muito esforço."
 infernals.2125.name: "Negociações Alienígenas"
 infernals.2125.desc: "Após um processo longo e difícil, conseguimos um tradutor rudimentar capaz de se comunicar com os habitantes da estação.\n\nA estação funciona há gerações, indo de gigante gasoso em gigante gasoso para usar o sifão subespacial e extrair energia de estrelas distantes a fim de alimentar seus sistemas de suporte à vida e um propulsor de salto poderoso.\n\nOs alienígenas não entendem bem os sistemas que operam e não sabiam que o sifão tinha estrelas como alvo e que ele acabava destruindo-as.\n\nApesar da confusão, eles parecem ansiosos para sair da estação. Prometeram nos ensinar o que sabem em troca de um lugar seguro para viver e criar seus jovens."
 infernals.2125.a: "Ofereça a eles um santuário."
 infernals.2125.b: "Coloque-os em uma nave para que encontrem o próprio caminho."
 infernals.2125.c: "Expulse-os remotamente da estação."
 infernals.2125.d: "Permita que eles criem sua própria opinião sobre nós."
 infernals.2130.name: "Operação de Mineração Subespacial"
 infernals.2130.desc: "Os sifões da estação extraem hidrogênio de um gigante gasoso e o canalizam pelo subespaço até a camada externa de nossa estrela. A fusão de hélio resultante libera energia excedente, que é convertida em §Y$entropy_crystals$§! para alimentar a estação.\n\nA instabilidade de §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! se deve a erros de calibração e à degradação dos equipamentos que os habitantes não perceberam ou não sabiam consertar.\n\nSe trabalharmos com a tecnologia antiga deles, poderemos reverter o processo, mas não será fácil. Como alternativa, forçar a nossa estrela a entrar em nova poderia expor incontáveis depósitos, transformando a nossa herança em uma fortuna de recursos exploráveis."
 infernals.2130.a: "Está na hora de trabalhar."
 infernals.2131.desc: "Os sifões da estação extraem hidrogênio de um gigante gasoso e o canalizam pelo subespaço até a camada externa da nossa estrela. A fusão de hélio resultante libera energia excedente, que é convertida em §Y$entropy_crystals$§! para alimentar a estação.\n\nOs habitantes da estação preservam apenas uma tradição oral distorcida sobre seu funcionamento. Eles perderam o contato com sua civilização de origem há milhares de anos, talvez porque ela tenha entrado em colapso ou sido destruída. Um acúmulo de erros de calibração e a degradação dos equipamentos levaram à extração cada vez mais instável que agora ameaça destruir §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!.\n\nSe trabalharmos com a tecnologia antiga deles, poderemos reverter o processo, mas não será fácil. Como alternativa, forçar a nossa estrela a entrar em nova poderia expor incontáveis depósitos, transformando a nossa herança em uma fortuna de recursos exploráveis."
 infernals.2135.name: "Um Fim à Ameaça"
 infernals.2135.desc: "Ao ficarem sabendo de nossa situação, os habitantes da estação reagiram com preocupação. Eles acreditavam estar sozinhos e não tinham ciência da existência de outras espécies na galáxia.\n\nTomados pelo remorso e antes que pudéssemos compreender o que faziam, eles começaram a desmontar a estação, destruindo permanentemente a maior parte de seus componentes.\n\nComo resultado, será difícil controlar a expansão da estrela. Devemos decidir o que fazer com esses alienígenas voláteis e se eles merecem o perdão que tanto desejam."
 infernals.2135.a: "Acolha-os e recupere a estação."
 infernals.2135.b: "Livre-se deles e da estação."
 infernals.2135.c: "Escravize-os e destrua a estação."
 infernals.2140.name: "Perspectiva de Estabilidade"
 infernals.2140.desc: "Após muito esforço, agora temos controle total sobre o destino de §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!. Se deixada em paz, ela seguiria seu ciclo natural de vida em seu tamanho atual.\n\nNo entanto, a estação antiga e decadente não pode suportar reconfigurações repetidas. Cada ajuste força a instalação até o limite. Agora temos apenas uma escolha.\n\nPodemos reduzir a estrela de volta ao seu tamanho anterior ou forçá-la a se expandir, transformando o sistema em um vasto campo de recursos de fácil extração.\n\nNossa equipe de [GetScientistPlural] tentará uma última reconfiguração. Depois disso, o único caminho será a desmontagem rápida por meio de força externa."
 infernals.2140.a: "Corrija a estrela em seu estado atual."
 infernals.2140.b: "Acelere a expansão da estrela."
 infernals.2140.bdesc: "§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! crescerá inevitavelmente."
 infernals.2140.c: "Faça a estrela voltar ao normal."
 infernals.2140.cdesc: "§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! diminuirá inevitavelmente."
 infernals.2145.name: "Estabilidade Alcançada"
 infernals.2145.desc: "Com o controle total alcançado sobre o tamanho e a energia inconstantes de §Y[Target.GetStarName]§!, a estrela foi completamente estabilizada. Ela permanecerá como está agora por milhões de anos, e o nosso povo poderá desfrutar outra vez de estabilidade e previsibilidade em nosso sistema natal.\n\nO aumento do tamanho de nossa estrela traz consequências claras para a forma como gerenciamos a nossa infraestrutura, e agora podemos tirar o máximo proveito dessas mudanças, explorando sua maior produção de energia enquanto mantemos uma presença viável no sistema."
 infernals.2145.a: "Enfim, controlamos o nosso destino."
 infernals.2151.name: "Uma Estação Misteriosa"
 infernals.2151.desc: "Ao adentrarmos o sistema, nossas naves encontraram resistência limitada de um grupo de drones automatizados. Eles foram rapidamente neutralizados, permitindo uma análise mais próxima da estação alienígena.\n\nA estrutura permanece operacional, embora seu casco apresente sinais de extensos reparos improvisados. Ao tentar acessar uma de suas docas de acoplamento, fizemos contato com uma espécie alienígena até então desconhecida. Apesar das barreiras linguísticas, confirmamos que esta instalação é a origem dos túneis que afetam §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!.\n\nEstamos empenhando esforços para estabelecer comunicações. Talvez seja possível uma resolução diplomática. Caso contrário, poderemos ser obrigados a considerar métodos mais diretos, como abordar a instalação ou destruí-la por completo. Entretanto, sem um entendimento claro de sua finalidade, tais ações podem trazer um risco significativo para a nossa estrela."
 infernals.2151.a: "Traduza o idioma deles."
 infernals.2151.b: "Embarque na estação à força."
 infernals.2151.c: "Destrua a estação."
 infernals.2160.name: "Uma Centelha da Crise"
 infernals.2160.desc: "Estudos da estação de mineração subespacial sugerem que ela armazena quantidades enormes de energia térmica em uma forma exótica, que nossa equipe de [GetScientistPlural] está chamando de §Y$entropy_crystals$§!. Ela utiliza circuitos de realimentação térmica para amplificar a entrada de energia.\n\nSe replicarmos essa tecnologia, poderemos aprender a controlar um poder inimaginável que muitos considerariam perigoso. Isso pode gerar enormes quantidades de calor excedente, mas se formos capazes de encontrar uma maneira de prosperar nessas condições, a galáxia poderá estar ao nosso alcance."
 infernals.2160.a: "Vamos investigar melhor."
 infernals.2160.a.tt: "[GetRedgiantAlreadyHyperthermiaPickable]Descobre §Y$entropy_crystals$§! para avançar a Hipertermia Galáctica."
 infernals.2160.a.ttunlock: "Permite a adoção da Regalia da Ascensão $ap_galactic_hyperthermia$.\n"
 infernals.2160.b: "Essa tecnologia é perigosa demais para investigar."
 infernals.2160.c: "Que uso primitivo de §Y$entropy_crystals$§!."
 situation_red_giant_expansion: "Expansão da Gigante Vermelha"
 situation_red_giant_expansion_type: "$situation_red_giant_expansion$"
 situation_red_giant_expansion_desc: "As rápidas mudanças nas emissões de nossa estrela ameaçam a estabilidade de nosso mundo natal. Se isso continuar, §Y[Owner.Capital.GetStarName]§! acabará entrando em nova, reduzindo o sistema a átomos."
 situation_red_giant_expansion_monthly_change_tooltip: "O progresso da expansão depende de nossa capacidade de descobrir e enfrentar a causa."
 situation_red_giant_expansion_fail_tooltip: "§Y[Target.solar_system.GetName]§! entrará em supernova."
 situation_red_giant_expansion_finish_tooltip: "§Y[Target.solar_system.GetName]§! voltará ao seu estado normal."
 situation_red_giant_expansion_stage_1: "Nossa estrela está relativamente tranquila, mas a produção de radiação está estranhamente alta."
 situation_red_giant_expansion_stage_2: "Nossa estrela está maior do que era durante nosso passado evolutivo, e isso está causando impactos evidentes em nosso mundo natal."
 situation_red_giant_expansion_stage_3: "Nossa estrela está grande demais, e sua atividade extrema ameaça a estabilidade de nosso mundo natal."
 situation_red_giant_expansion_stage_4: "Nossa gigante vermelha está queimando grande parte de nosso sistema estelar, tornando a vida extremamente difícil."
 situation_red_giant_expansion_stage_5: "Nossa estrela está prestes a explodir, o que causaria danos catastróficos a tudo em nosso sistema natal."
