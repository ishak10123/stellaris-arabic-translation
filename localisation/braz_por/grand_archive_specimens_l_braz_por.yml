 acidic_spores: "Esporos Ácidos"
 acidic_spores_desc_short: "A flora de [from.GetName] evoluiu este mecanismo de defesa ao longo dos anos para afastar a espécie herbívora dominante."
 acidic_spores_desc_details: "O gás resultante é altamente corrosivo e já deixou amplas áreas do planeta tóxicas e inabitáveis. Uma versão menos potente foi sintetizada como um pesticida eficaz."
 adakkaria_propaganda_poster: "Cartaz de Propaganda de adAKKaria"
 adakkaria_propaganda_poster_desc_short: "Este cartaz laminado proclama a glória da Convenção de adAKKaria."
 adakkaria_propaganda_poster_desc_details: "A ilustração retrata cidadãos confiantes, orgulhosos e valentes. Seus tentáculos estão erguidos para o céu, como se capturassem um futuro decidido apenas por eles. Do alto, silhuetas vagas de entidades maquinárias trajando máscaras ornadas os observam. O lema diz: \"Convenção de Benevolência de adAKKaria - Deixando Nossos Benfeitores Orgulhosos\"."
 advisor_core: "Núcleo de Conselheiro"
 advisor_core_desc_short: "A única peça intacta após a desmontagem de um complexo drone conselheiro encontrado em uma Fenda Astral."
 advisor_core_desc_details: "Este núcleo contém uma quantidade extraordinária de informações triviais, mas a complexidade da arquitetura de seu software inspirou uma onda de inovações em nossos esforços de pesquisa da ciência da computação.\n[explorer.GetAdvisorCoreAdditionnalQuote]"
 advisor_core_desc_tutorial_on: "§L\"Você não me desligaria, não é?\"§!"
 advisor_core_desc_tutorial_off: "§L\"Gostaria de reativar a orientação?\"§!"
 alien_brain_scans: "Tomografias Alienígenas"
 alien_brain_scans_desc_short: "Padrões neurais arquivados de uma raça alienígena há muito extinta, encontrados dentro de um cofre em [fromfrom.GetName]."
 alien_brain_scans_desc_details: "A civilização esquecida armazenou esses dados na esperança de transferir suas consciências para repositórios digitais e viver como imortais no evento de um desastre planetário. Muitas das tomografias estão acompanhadas de anotações sobre personalidades individuais, incluindo depoimentos dos entes mais próximos."
 alien_dining_set: "Conjunto de Louças de Jade"
 alien_dining_set_desc_short: "Um elegante conjunto de louças preservado dentro de um asteroide artificial."
 alien_dining_set_desc_details: "Uma complexa série de técnicas de manufatura foi usada na moldagem, queima e revestimento das louças. Inconsistências diminutas sugerem um processo de criação artesanal. A análise do material revelou evidências de que o dono desses finos utensílios consumia uma dieta altamente ácida derivada de frutos agregados e drupas."
 alien_jewelry: "Joias Alienígenas"
 alien_jewelry_desc_short: "Uma coleção de joias alienígenas elegantes feitas de um material desconhecido."
 alien_jewelry_desc_details: "As pedras variam consideravelmente de origem e cor; uma mistura de silicato e gemas baseadas em carbono arranjadas cuidadosamente em ligas de platina. Há inscrições na face interna de algumas das peças, mas não temos como traduzi-las."
 alien_toy: "Brinquedo de Plástico"
 alien_toy_desc_short: "Um simples brinquedo encontrado em meio às ruínas de uma fábrica abandonada."
 alien_toy_desc_details: "Rachado e quebradiço devido à idade avançada, este objeto é um dentre milhares produzidos em massa a partir de um pequeno conjunto de moldes de metal. Seu propósito parece ter sido apenas decorar e entreter."
 altar_to_the_elder_one: "Altar para o Ancião"
 altar_to_the_elder_one_desc_short: "Uma máquina sobrenatural encontrada em uma antiga câmara sagrada."
 altar_to_the_elder_one_desc_details: "Mesmo em seu estado inativo, esta máquina irradia uma aura singular de energia psiônica imensurável. Alguns afirmam que seus sussurros tentadores ainda podem ser ouvidos, atraindo almas perdidas até [cosmic_horror_location.GetName]."
 aluminium_plaque: "Placa de Alumínio"
 aluminium_plaque_desc_short: "Uma simples placa encontrada em um drone lançado por uma civilização [owner.GetPreFTLLower] de mamíferos."
 aluminium_plaque_desc_details: "Estranhas formas geométricas e imagens rudimentares de sua espécie estão gravadas na superfície. A técnica é grosseira, mas o simples lançamento deste objeto no espaço deve ter representado um esforço significativo para essa civilização."
 ammoniaphytus: "Fitoamônia"
 ammoniaphytus_desc_short: "Os níveis de amônia em estado aquoso no tecido destas plantas seriam perigosos para a maioria das formas de vida baseadas em carbono."
 ammoniaphytus_desc_details: "A atmosfera imediata que envolve este recipiente deixa a maioria dos organismos sapientes desacordada em poucos segundos. A existência deste espécime despertou a curiosidade e o debate em nossas mentes mais brilhantes... e planos nefastos entre as demais."
 amoeba_flagella_gland: "Glândula de Flagelos de Ameba"
 amoeba_flagella_gland_desc_short: "Um órgão reprodutor secundário de uma Ameba Espacial."
 amoeba_flagella_gland_desc_details: "Produz organismos independentes conhecidos como \"flagelos\", crias agressivas que cercam e dominam suas presas enquanto a Ameba caça em busca de alimento. Os flagelos crescem rapidamente, mas instabilidades genéticas os impedem de atingir a maturação completa. Para produzir crias verdadeiras, a Ameba Espacial injeta uma enzima específica nos flagelos que acarreta uma rápida metamorfose. O processo de seleção para essa forma de reprodução é desconhecido."
 ancient_bust: "Busto Antigo"
 ancient_bust_desc_short: "Um busto esculpido em grafite de uma espécie sapiente desconhecida."
 ancient_bust_desc_details: "Entalhes na base sugerem que este indivíduo era aclamado por seu povo."
 ancient_kinetic_launcher: "Lançador Cinético Antigo"
 ancient_kinetic_launcher_desc_short: "Um tipo rudimentar de arma de projétil que usa uma espécie de propelente para expelir um objeto através de um curto cilindro de metal."
 ancient_kinetic_launcher_desc_details: "Na melhor das hipóteses, a precisão de tal dispositivo seria especulativa."
 ancient_laser_pointer: "Ponteiro a Laser Antigo"
 ancient_laser_pointer_desc_short: "Um projetor de raio extremamente preciso que pode marcar corpos celestes a distância em uma escala galáctica."
 ancient_laser_pointer_desc_details: "Deixado pelos Benfeitores, este laser ultravioleta é uma prova concreta da existência de uma civilização antiga. Por incrível que pareça, ele ainda funciona."
 ancient_nanites: "Nanites Antigos"
 ancient_nanites_desc_short: "Estes nanites altamente versáteis foram descobertos em [nanite_swarm_planet.GetName], deixados lá há três mil anos por uma civilização esquecida."
 ancient_nanites_desc_details: "Devido à falta de recursos essenciais de segurança, a chance de outras civilizações encontrarem estes dispositivos e reprogramá-los claramente não era uma preocupação. Após usá-los para terraformar o planeta em um ambiente mais habitável, os [owner.GetSpeciesNamePlural] se apossaram do enxame, embora os métodos empregados em sua construção original ainda sejam um mistério."
 ancient_nuclear_armament: "Armamento Nuclear Antigo"
 ancient_nuclear_armament_desc_short: "Encontrada em [root.GetName], esta bomba de hidrogênio de 35 megatons foi abandonada após a guerra que destruiu os antigos habitantes do planeta."
 ancient_nuclear_armament_desc_details: "Felizmente, conseguimos desarmar esta munição arcaica. O texto pintado na bomba foi analisado por nossos tradutores em comparação com outros artefatos encontrados no planeta e parece expressar algo como \"O Maior dos Garotões\". Que estranho."
 ancient_political_memoir: "Antiga Biografia Política"
 ancient_political_memoir_desc_short: "A biografia de uma antiga política galáctica."
 ancient_political_memoir_desc_details: "Leez'Terus era a governadora de Sarthana, uma pequena colônia dentro da civilização do antigo Conservatório Harworth. Uma figura menos importante da facção totalitária Liberdade para os Negócios, ela era conhecida por sua postura rígida contra a importação de alimentos de potências galácticas estrangeiras. Após uma série de renúncias motivadas por escândalos, ela se tornou a governante do Conservatório Harworth, ainda que brevemente. Sua declaração de apoio para a renovação da querida Torre do Relógio de Harworth quase causou uma revolta na capital, e ela foi rapidamente substituída por outro membro do grupo Liberdade para os Negócios."
 ancient_rift_sphere: "Antiga Esfera da Fenda"
 ancient_rift_sphere_desc_short: "Uma antiga nave espacial que atravessou uma Fenda Astral e caiu em [from.planet.GetName]."
 ancient_rift_sphere_desc_details: "Enterrada sob a superfície do planeta por muitos séculos, esta nave esférica precariamente montada trouxe os antepassados dos [controller.owner_main_species.GetNamePlural] para esta galáxia. Muitos de seus materiais foram roubados, mas a estrutura central permanece em sua maior parte intacta."
 ancient_satellite: "Satélite Antigo"
 ancient_satellite_desc_short: "Um satélite abandonado oferecido como \"presente\" pelos antigos drones mecânicos em [root.GetName]."
 ancient_satellite_desc_details: "Seus bancos de dados estão em grande parte deteriorados e corrompidos, mas os registros mais recentes de censo e nascimentos estão intactos. Essa informação sobre o comportamento da população no planeta esclareceu como a colônia do povo [owner.GetAdjective] foi capaz de crescer de forma sustentável. Sua funcionalidade parcial após tantos anos de deterioração é prova de sua construção resistente."
 ancient_sensor: "Sensor Térmico Antigo"
 ancient_sensor_desc_short: "Escondido dentro de um asteroide, este sensor foi usado para gerar mapas térmicos da galáxia e transferir esses dados para um antigo império distante."
 ancient_sensor_desc_details: "Ele é capaz de registrar variações de temperatura dentro de sistemas individuais, bem como rastrear o movimento de espaçonaves por meio de radiação infravermelha. Porém, seu maior propósito parece ter sido a previsão e medição de tempestades solares e a formação de manchas solares."
 asteroid_fossils: "Fósseis de Asteroides"
 asteroid_fossils_desc_short: "A datação por carbono revelou que estes fósseis aquáticos têm milhões de anos."
 asteroid_fossils_desc_details: "Eles são os restos mineralizados de invertebrados aquáticos com conchas que apresentavam um único tubo vazado. Acreditamos que esse apêndice tenha sido usado para fixá-los a fontes hidrotermais subaquáticas."
 ballad_of_the_sable_knight: "Balada do Cavaleiro Umbroso"
 ballad_of_the_sable_knight_desc_short: "§dÀs vésperas de um torneio chegou o Cavaleiro Umbroso§!"
 ballad_of_the_sable_knight_desc_details: "§d\nTrajando uma estranha armadura, concluiu seu trajeto perigoso.\nNosso campeão ele desafiou para um duelo justo lutar,\nComeça a contenda e faíscas dançam no ar.\nCom astúcia nosso campeão atacava,\nmas a armadura do adversário cada golpe aparava.\nO adversário rendeu-se em derrota limpa de anseio,\nE então retornou ao buraco de minhoca de onde veio...§!"
 beauty_of_planet: "Beleza de [From.GetName]"
 beauty_of_planet_desc_short: "A elegância precisamente concebida dos esforços de terraformação em [From.GetName] é um júbilo para todos os sentidos."
 beauty_of_planet_desc_details: "Um sistema de algoritmos foi usado para analisar e aprimorar minuciosamente os ecossistemas naturais do planeta com o cultivo cuidadoso. Ao selecionar apenas as flores mais vivazes, os frutos mais nutritivos e as ervas mais doces, a paisagem foi transformada em uma utopia vibrante. Quem dera a natureza fosse tão eficiente."
 black_hole_chromatic_anomaly: "Anomalia Cromática de Buraco Negro"
 black_hole_chromatic_anomaly_desc_short: "Uma imagem aparentemente fantástica capturada em [From.solar_system.GetName]."
 black_hole_chromatic_anomaly_desc_details: "Graças aos compostos químicos do disco de acreção de [From.GetName], o buraco negro deste sistema apresenta uma aberração cromática, criando um efeito caleidoscópico em todo o espaço adjacente. Um espetáculo verdadeiramente único no espaço profundo."
 black_needle_ceremonial_sword: "Espada Cerimonial da Agulha Negra"
 black_needle_ceremonial_sword_desc_short: "Esta arma meticulosamente elaborada pertencia ao Pena de Prata, o fundador dos piratas da Agulha Negra."
 black_needle_ceremonial_sword_desc_details: "Encomendada com os lucros do primeiro grande golpe de sorte da organização criminosa, ela foi criada como símbolo de status e não tinha um uso prático. Forjada de uma liga de aço e titânio, a frase \"Perfure o Manto\" está inscrita ao longo do punho."
 black_needle_ledger: "Livro-Razão da Agulha Negra"
 black_needle_ledger_desc_short: "Este livro-razão registra todas as negociações feitas pelos piratas da Agulha Negra em nossa galáxia durante milhares de anos."
 black_needle_ledger_desc_details: "Cada transação, resgate e suborno está datado e categorizado em uma caligrafia clara. Registro por escrito de atos ilegais intergalácticos, ele oferece uma perspectiva incomparável das tendências econômicas do mercado clandestino ao longo do tempo."
 burnt_migratory_trees: "Casca Viva"
 burnt_migratory_trees_desc_short: "Os restos carbonizados de uma enorme forma de vida vegetal móvel com comportamento migratório coordenado."
 burnt_migratory_trees_desc_details: "Estas plantas possuíam apenas uma forma básica de inteligência, mas podiam sobrepujar colônias inteiras em grandes números. Desde então, descobrimos que uma espécie de insetos parasitas habitava sua casca, atuando como os centros motores e de comunicação das árvores em troca de abrigo e seiva nutritiva. Essa relação simbiótica é tão extraordinária quanto é letal."
 captain_ness_body: "Corpo da Capitã Ness"
 captain_ness_body_desc_short: "O corpo preservado da Capitã Saanda Ness, uma antiga pirata de renome."
 captain_ness_body_desc_details: "Por mais de 5.000 anos ela foi o \"Flagelo do Hiperespaço\", roubando de quase todas as potências galácticas e acumulando uma incrível quantidade de tesouros. Posteriormente, ela transferiu sua consciência para um corpo mecânico e construiu um grande cofre, onde guardou sua biografia. Isto é tudo o que resta de sua forma original."
 captain_ness_logbook: "Diário da Capitã Ness"
 captain_ness_logbook_desc_short: "Uma coletânea de registros arbitrários de diário encontrados em um refúgio usado pela antiga pirata conhecida como Capitã Ness e Smeegibb, seu companheiro."
 captain_ness_logbook_desc_details: "Os registros estão espalhados por inúmeros dispositivos, escritos aleatoriamente ao longo de um período indefinido. Embora considerados uma fonte não confiável, muitas das situações descritas podem ser corroboradas pelas autoridades."
 carnivorous_megaflora: "Megaflora Carnívora"
 carnivorous_megaflora_desc_short: "Descobertas em [from.GetName], estas plantas predatórias podem engolir um indivíduo [owner.GetSpeciesName] adulto desprevenido."
 carnivorous_megaflora_desc_details: "Esta vegetação carnívora evoluiu para atrair primariamente criaturas voadoras após causar a extinção de quase toda a fauna nativa terrestre. Diversos espécimes ultrapassam em muito a copa das árvores e oferecem poleiros para os organismos pousarem."
 castaway_robot: "Robô Perdido"
 castaway_robot_desc_short: "Uma máquina humanoide encontrada à deriva no espaço profundo."
 castaway_robot_desc_details: "Algumas imagens desfocadas foram extraídas de seus bancos de memória deteriorados: uma vista extensa em um sistema estelar trinário; uma espaçonave triangular; e uma paisagem formada por sucatas de máquinas. Infelizmente, não conseguimos obter coordenadas dos metadados."
 cenotaph_display: "Arranjo de Cenotáfios"
 cenotaph_display_desc_short: "Imagens tiradas de cenotáfios encontrados em [fromfrom.GetName]."
 cenotaph_display_desc_details: "Embora ainda não tenhamos identificado os criadores originais, eles devem ter tido uma boa razão para distribuir esses monólitos primorosamente esculpidos por toda a superfície de um planeta desabitado. Essas gravuras em pedra retratam ilustrações detalhadas da ascensão e queda de toda uma civilização, e das feras aladas que treinavam para a guerra. Terríveis e cuspidoras de fogo, essas criaturas inevitavelmente romperam seus grilhões e trouxeram a ruína para seus mestres. Não há como saber se são parábolas ou registros históricos."
 centrifugal_container: "Recipiente Centrífugo de Alta Velocidade"
 centrifugal_container_desc_short: "Um dispositivo orbital de alta velocidade projetado para preservar compostos químicos delicados, encontrado em operação perpétua nas proximidades de [from.GetName]."
 centrifugal_container_desc_details: "Quando acelerado até a velocidade adequada, ele é capaz de impedir que os elementos contidos em seu interior reajam uns com os outros, desde que a órbita do planeta permaneça inalterada. Seu conteúdo original foi substituído por materiais ilustrativos."
 cetana_love: "Amor de Cetana"
 cetana_love_desc_short: "Um vasto compêndio de conhecimento dos bancos de dados de Cetana."
 cetana_love_desc_details: "Foi oferecido para [this.GetName] como uma dádiva, parte do desejo da Rainha Sintética de guiar toda a vida senciente rumo à \"salvação\"."
 chambered_clay_pot: "Vaso de Argila Compartimentado"
 chambered_clay_pot_desc_short: "Este recipiente de argila está dividido em dois compartimentos."
 chambered_clay_pot_desc_details: "Especula-se que um compartimento era usado para a preservação de alimentos, enquanto o outro continha algum tipo de sistema primitivo de refrigeração."
 claw_of_the_trickster: "Garra do Trapaceiro"
 claw_of_the_trickster_desc_short: "Um troféu retirado de um ser conhecido como o \"Trapaceiro\"."
 claw_of_the_trickster_desc_details: "Uma criatura poderosa e traiçoeira com incríveis poderes psiônicos que lhe permitiam invocar feras, conjurar ilusões e disparar raios de energia concentrada. Dizem que cada garra se comportava como se fosse controlada por uma entidade distinta."
 confessions_benefactors: "Confissões dos Benfeitores"
 confessions_benefactors_desc_short: "Um dispositivo de gravação que contém verdades duras a respeito da antiga civilização conhecida como os Benfeitores."
 confessions_benefactors_desc_details: "Mediante uma ameaça galáctica desconhecida, eles usaram sua tecnologia avançada para \"apagar as mentes\" dos habitantes de [controller.GetHomeWorldName], transformando um mundo [controller.GetAdjective] industrial em uma multidão de simplórios inofensivos. Isso foi feito com a crença de que a ameaça galáctica não desperdiçaria tempo ou munição com uma sociedade tão inferior. No fim, essa medida questionável permitiu que o povo de [controller.GetName] sobrevivesse até hoje, de pé sobre os ombros de gigantes."
 coprolite: "Coprólito"
 coprolite_desc_short: "Um pedaço de matéria fecal do tamanho de um asteroide com cerca de um bilhão de anos."
 coprolite_desc_details: "Análises genéticas sugerem que uma entidade espacial desconhecida de tamanho colossal produziu este impressionante espécime. Constatamos que a dieta dessa criatura consistia principalmente de minerais raros e organismos baseados em sílica. Este objeto detém o recorde galáctico de maior pedaço de excremento conhecido."
 cosmic_diamond_fragment: "Fragmento de Diamante Cósmico"
 cosmic_diamond_fragment_desc_short: "Um fragmento ejetado de uma estrela moribunda que desde então cristalizou, descoberto em [from.solar_system.GetName]."
 cosmic_diamond_fragment_desc_details: "Este diamante cósmico se formou nas pressões extremas de um núcleo estelar, resfriando-se de forma tão gradual que formou uma estrutura cristalina complexa, porém estável. Este fragmento raro contém camadas plásmicas uniformes de hélio e oxigênio capturadas em sua superfície."
 crimson_nimkips: "Nimkips Carmesins"
 crimson_nimkips_desc_short: "Uma espécie de plantas semissencientes que colaboram em grandes números para realizar façanhas de força que seriam impossíveis para seu tamanho."
 crimson_nimkips_desc_details: "Quando isoladas da segurança de seus grupos, estas criaturas são frequentemente consumidas por predadores graças ao seu excelente valor nutricional. De natureza dócil e subserviente, os Nimkips são excelentes mascotes. Este exemplar está mantido em segurança dentro de um ambiente que simula o seu habitat natural. FAVOR NÃO TOCAR NO VIDRO."
 crystal_core: "Núcleo Cristalino"
 crystal_core_desc_short: "Um aglomerado nervoso retirado de uma Entidade Cristalina."
 crystal_core_desc_details: "Este cristal emite uma frequência constante independentemente da temperatura. Esporas de novos cristais crescem de sua massa central em ambientes ricos em minerais, cujas estruturas são alteradas em uma reação a estímulos ambientais. Com base em tal comportamento, podemos afirmar que as entidades individuais se diferenciam umas das outras de acordo com dois fatores: as características da frequência de seu núcleo e a variação dos fatores ambientais."
 crystal_nest_fragments: "Fragmentos de Ninho de Cristal"
 crystal_nest_fragments_desc_short: "Encontrados dentro de um asteroide desgovernado, estes cristais foram combinados por uma criatura espacial usando imensa pressão para criar um abrigo."
 crystal_nest_fragments_desc_details: "A partir dos vestígios encontrados no interior da composição, acredita-se que o organismo criador consome minerais altamente radioativos para extrair energia de seus vínculos químicos instáveis, deixando para trás cristais inertes, porém duráveis, que podem focalizar a luz em um pequeno ponto."
 crystal_sphere_fragments: "Fragmentos de Esfera de Cristal"
 crystal_sphere_fragments_desc_short: "Fragmentos de uma gigantesca esfera cristalina que apareceu em [target.GetName]."
 crystal_sphere_fragments_desc_details: "Este misterioso objeto foi considerado uma ameaça significativa e rapidamente destruído antes que pudesse concluir sua operação desconhecida. Embora suas intenções permaneçam para sempre um mistério, sua destruição foi o plano de ação mais lógico considerando os interesses da segurança galáctica."
 crystallized_cutholoid_eye: "Olho de Cutholoide Cristalizado"
 crystallized_cutholoid_eye_desc_short: "O olho de um Cutholoide é capaz de resistir a pressões e temperaturas extremas."
 crystallized_cutholoid_eye_desc_details: "Não sabemos como este olho foi cristalizado, mas parece ser parte do processo natural de seu ciclo de muda."
 cult_pendant: "Pingente de [cult_name.GetName]"
 cult_pendant_desc_short: "Um símbolo esculpido em uma pedra semipreciosa, confiscado do culto [cult_name.GetName] de [owner.GetName]."
 cult_pendant_desc_details: "Inquéritos revelaram que membros do culto carregavam pingentes de acordo com sua posição dentro da hierarquia do grupo. Novos recrutas modelavam seus próprios símbolos em argila, enquanto cultistas veteranos encomendavam peças detalhadas de metais preciosos."
 #this = ship / fromfrom = planet
 cunning_flora_specimen: "Simbiótica"
 cunning_flora_specimen_desc_short: "A flora nativa de [fromfrom.GetName] desenvolveu uma complexa hierarquia social que auxilia sua sobrevivência."
 cunning_flora_specimen_desc_details: "Cada espécie tem um método eficaz e exclusivo de afastar predadores, desde espinhos afiados até neurotoxinas fatais. Essa série de relações simbióticas é tão robusta que a própria composição da atmosfera e do solo do planeta é cuidadosamente controlada pelos desequilíbrios químicos de planta a planta. Os espécimes mais eficazes têm liberdade para se reproduzir com mais frequência, fortificando a resistência do grupo até o potencial máximo."
 curator_survey: "Inspeção de Curadores de [from.GetName]"
 curator_survey_desc_short: "Uma inspeção extremamente detalhada do sistema [from.GetName], realizada por uma subdivisão de Curadores de artrópodes gigantes."
 curator_survey_desc_details: "Os instrumentos ultraprecisos usados no estudo forneceram uma análise estratificada de todas as possíveis propriedades deste sistema. A atenção aos detalhes sugere uma grande paixão pelo trabalho."
 cutholoid_digestive_acids: "Ácidos Digestivos de Cutholoide"
 cutholoid_digestive_acids_desc_short: "Fluidos radioativos coletados de um Cutholoide."
 cutholoid_digestive_acids_desc_details: "Cutholoides dependem do decaimento nuclear de isótopos de Cobalto-60 para digerir suas presas; o ácido presente em seu estômago é, por si só, moderado. Dessa forma, a digestão pode ser um processo lento para os Cutholoides. Uma vez que as células da presa tenham sido enfraquecidas pela radiação, o ácido consegue quebrar e extrair nutrientes das fontes mais inesperadas."
 cybrex_mining_column: "Coluna de Mineração Cybrex"
 cybrex_mining_column_desc_short: "Um aparelho automático avançado de mineração, elaborado para coletar e concentrar gases de Hélio-3."
 cybrex_mining_column_desc_details: "Uma longa coluna de discos magnéticos pesados e compressores de alta capacidade, esta máquina martela a superfície de um planeta sem fazer uso do movimento de rotação. Esse processo concentra o gás durante a coleta, filtrando e ejetando impurezas antes de transportá-lo até a próxima etapa de refinamento."
 data_on_infinity: "Dados sobre a Natureza do Infinito"
 data_on_infinity_desc_short: "Uma representação física da calma distante sentida por drones suspensos em um buraco negro."
 data_on_infinity_desc_details: "Estas unidades sentiram a dilatação temporal como um estado sereno de espera, passível de processamento e reanálise ociosa de dados. Desassociados das diretivas principais, eles compartilham ideias por meio de uma conexão frouxa à rede central."
 datacore_of_sinople: "Núcleo de Dados de Sinople"
 datacore_of_sinople_desc_short: "Um disco de dados codificado clonado de Sinople, uma IA criada por antigos cavaleiros."
 datacore_of_sinople_desc_details: "Encontrado no controle de uma nave há muito perdida, a \"Donzela\", este núcleo de dados estava só na nave abandonada, já despojada por saqueadores. Ele contém informações valiosas sobre entidades espaciais tóxicas."
 dathnak_gas: "Gás Dathnak"
 dathnak_gas_desc_short: "Uma coleção de gases peculiares recebidos dos organismos gasosos conhecidos como Dathnak."
 dathnak_gas_desc_details: "Este recipiente foi oferecido ao Império [this.GetName] após a ajuda com a migração dos Dathnak para um novo planeta. Análises espectrométricas de massa revelaram que ele contém um número perfeitamente equivalente de átomos de uma variedade de gases e elementos nobres. Temos quase certeza de que não há organismos vivos no interior."
 dead_god_mantle: "Manto do Deus Morto"
 dead_god_mantle_desc_short: "Um presente oferecido pelo emissário dos [worshipper_species.GetNamePlural]."
 dead_god_mantle_desc_details: "Os nativos de [dead_god_planet.GetName] veneram a carcaça de um enorme organismo alienígena desde que sua espécie atingiu a sapiência. Este manto de retalhos é formado pela carne petrificada de seu deus morto, representando a posição mais alta de sua hierarquia religiosa."
 decayed_megathrusters: "Megapropulsores Deteriorados"
 decayed_megathrusters_desc_short: "Motores de propulsão encontrados em uma nave colossal feita de metais exóticos."
 decayed_megathrusters_desc_details: "O veículo ao qual pertenciam foi descoberto após repousar em meio aos destroços de um extenso cemitério de naves por dois milhões de anos. A degradação desse antigo ferro-velho era tamanha que nem mesmo um estudo meticuloso foi capaz de produzir qualquer dado de pesquisa aproveitável. Esta peça está exposta aqui para nos lembrar de que nossa sociedade é relativamente jovem nesta galáxia."
 decayed_satellite: "Satélite Deteriorado"
 decayed_satellite_desc_short: "Um vestígio dos antigos programas espaciais dos habitantes de [fromfrom.GetName]."
 decayed_satellite_desc_details: "A natureza precária desses satélites primitivos resultou em dispositivos ineficazes sobrecarregados de materiais dispendiosos. Este espécime específico foi desativado por munições explosivas, mas foi antes usado para fornecer acesso às telecomunicações em áreas remotas."
 declaration_of_animosity: "Declaração de Animosidade de $NAME_Nivlac$"
 declaration_of_animosity_desc_short: "Um comunicado cortês, porém sarcástico, de [nivlac_country.GetName]."
 declaration_of_animosity_desc_details: "A espécie [nivlac_species.GetName] foi inicialmente descoberta pelo Império [this.GetName] em [impossible_organism_planet.GetName]. Contudo, em resposta ao seu alarmante ritmo evolucionário, cientistas do governo [this.GetAdjective] ejetaram as criaturas para o espaço profundo. Contra todas as probabilidades, os organismos não só sobreviveram, como também colonizaram o planeta no qual pousaram. O povo de [nivlac_country.GetName] não se esqueceu das transgressões feitas contra ele."
 declaration_of_friendship: "Declaração de Amizade de $NAME_Nivlac$"
 declaration_of_friendship_desc_short: "Uma carta de gratidão do povo de [nivlac_country.GetName] em [nivlac_planet.GetName]."
 declaration_of_friendship_desc_details: "A espécie [nivlac_species.GetName] foi inicialmente descoberta por [this.GetName], povo que os alimentou e ofereceu um refúgio para que pudessem se desenvolver de forma independente. Evoluindo rapidamente, os [nivlac_species.GetNamePlural] logo descobriram a viagem MRQL. Seu primeiro ato no cenário galáctico foi demonstrar gratidão aos seus graciosos benfeitores e guardiões, comprometendo-se a uma aliança diplomática."
 derelict_cybrex_warform: "Forma de Guerra Cybrex Abandonada"
 derelict_cybrex_warform_desc_short: "Os restos de uma Forma de Guerra Cybrex destruída em uma batalha contra a própria espécie."
 derelict_cybrex_warform_desc_details: "A causa do conflito interno é desconhecida. As capacidades dessas máquinas eram tão equivalentes, que ataques precisos foram conduzidos a sistemas críticos idênticos antes que a autodestruição de emergência fosse acionada. Um raro exemplo de um verdadeiro impasse na guerra."
 desiccated_brain_slug: "Lesma Cerebral Dissecada"
 desiccated_brain_slug_desc_short: "Os restos de uma espécie simbiótica encontrada em [From.From.GetName]."
 desiccated_brain_slug_desc_details: "Análises revelam que ela poderia atuar como um complexo cerebral extra para seu hospedeiro em troca de alimento e proteção. Tal parceira exige a aceitação expressa do hospedeiro; do contrário, a conexão neural não pode ser devidamente estabelecida. Dizem que ela produz uma sensação agradável de cócegas quando integrada ao sistema nervoso."
 #this = owner / prev = colony
 destroyed_mascot_of_colony: "Restos de Robô de [prev.GetName]"
 destroyed_mascot_of_colony_desc_short: "Os restos de um robô nativo encontrado após o povoamento de [prev.GetName]."
 destroyed_mascot_of_colony_desc_details: "O último supervisor de uma antiga fábrica, ele salvou um grupo de colonizadores aprisionados em ruínas abandonadas. Seus passos de dança e maneirismos icônicos estão sendo reproduzidos em uma tela digital como parte da exibição."
 devolved_baol_drones: "Drones Baol Regredidos"
 devolved_baol_drones_desc_short: "Um conjunto preservado de restos Baol com diferenças genéticas significativas de espécimes anteriormente descobertos."
 devolved_baol_drones_desc_details: "Estranhamente, estes drones não têm as qualidades acentuadas de outros Baol. Sua capacidade cognitiva foi reduzida a tal ponto que eles teriam sido incapazes de se comunicar por junção, o que os isolou completamente do restante da colmeia."
 dimensional_endothelial_lining: "Revestimento Endotelial Dimensional"
 dimensional_endothelial_lining_desc_short: "Um material gelatinoso peculiar colhido de um sistema de túneis pulsantes dentro de uma Fenda Astral."
 dimensional_endothelial_lining_desc_details: "Como o revestimento interno de um organismo desconhecido, este material permite o movimento livre de atrito entre gigantescos sistemas vasculares dos elementos transportados no interior."
 dna_archive: "Arquivo de DNA"
 dna_archive_desc_short: "Uma amostra retirada de centenas de reservatórios de DNA alienígena preservados em um arquivo subterrâneo de uma civilização perdida."
 dna_archive_desc_details: "Esta coleção de dados biológicos teria sido a maior fonte de referências de seu tipo, caso a maioria das amostras não tivesse se deteriorado além da aplicação prática. Especula-se que a intenção do arquivo era permitir que uma civilização mais avançada descobrisse e \"ressuscitasse\" estes indivíduos. Infelizmente, a história deles acaba aqui."
 doomsday_scrolls: "Pergaminhos Apocalípticos"
 doomsday_scrolls_desc_short: "Antigas escrituras espirituais descobertas no coração de um labirinto flamejante."
 doomsday_scrolls_desc_details: "Os pergaminhos descrevem um ser temível: o Arqui-Inimigo, a Sombra que Devora a Todos, e sua ânsia por destruição. O sistema de crenças nativo determinava que o único caminho para a salvação contra esse monstro era evitar que ele ceifasse sua alma. Assim, a população conduziu um ritual de suicídio em massa."
 drone_ship_core: "Núcleo de Nave Drone"
 drone_ship_core_desc_short: "Restos do núcleo de uma nave drone de alta tecnologia que se autodestruiu."
 drone_ship_core_desc_details: "Esta nave foi inicialmente descoberta sendo corroída pela atmosfera ácida de [warform_origin_planet.GetName]. Sua IA integrada estava operando de forma independente, mas desde então foi apagada como parte de seu protocolo de autodestruição. Engenheiros foram incapazes de recuperar qualquer volume dos dados perdidos, de modo que sua missão original permanece um mistério."
 electric_life: "Vida Elétrica"
 electric_life_desc_short: "Um tipo de organismo que consiste inteiramente de impulsos elétricos encontrado em [from.GetName]."
 electric_life_desc_details: "Estes seres existem sem qualquer tipo de infraestrutura celular ou viral, porém podem formar padrões complexos em nível planetário em resposta a estímulos externos. Não conseguimos determinar se esses impulsos são indivíduos ou representam parte de um único ser."
 enormous_scrambled_albumen: "Clara Mexida Enorme"
 enormous_scrambled_albumen_desc_short: "O interior de [fromfromfrom.GetName], que depois se descobriu tratar de um ovo gigantesco."
 enormous_scrambled_albumen_desc_details: "Quando aberto, o planeta foi inundado por este fluido peculiar e rico em minerais. A sintetização e integração desta substância aos nossos suprimentos alimentícios deve aumentar os níveis nutritivos de modo geral."
 epic_of_zarqlan: "A Epopeia de Zarqlan"
 epic_of_zarqlan_desc_short: "O texto sagrado de Zarqlan, Guardião de MOZ-TARB e Profeta de ZVA."
 epic_of_zarqlan_desc_details: "Outrora um seguidor de Cetana, ele logo descobriu que a salvação por ela prometida era uma mentira. Após muitas atribulações, Zarqlan conseguiu ascender ao plano espiritual. Lá ele implorou ao §YAnimador de Argila§! que o ajudasse a derrotar Cetana. Finalmente, após muitos anos de preces devotas, o Animador lhe concedeu uma poderosa corrente para aprisionar a mente de Cetana. Mas Zarqlan foi alertado de que a corrente não poderia conter o poder dela para sempre.\n\n§P\"Ela retornará, e temos todos que estar preparados.\"§!"
 ethereal_dust: "Poeira Etérea"
 ethereal_dust_desc_short: "O único vestígio do indivíduo que atuava como Chefe de Pesquisa na nave científica roubada encontrada em [solar_system.GetName]."
 ethereal_dust_desc_details: "A análise deste material astral é em grande parte inconclusiva, mas elementos vestigiais do DNA do indivíduo aparecem espontaneamente de tempos em tempos antes de desaparecerem rapidamente. Todas as evidências apontam para o fato de que tal cientista tenha cruzado de nossa dimensão para outra, usando uma fenda temporariamente estável no espaço-tempo referida como \"A Janela\". Talvez nunca saibamos qual foi o seu destino."
 exobiology_compendium: "Compêndio de Exobiologia"
 exobiology_compendium_desc_short: "Uma extensa pesquisa sobre as maravilhas da vida alienígena em diversos sistemas da galáxia."
 exobiology_compendium_desc_details: "Este documento reúne uma pesquisa de campo minuciosa e extensa de vários planetas, redefinindo para sempre as condições conhecidas onde é possível encontrar vida na galáxia. Ele conclui com a frase: \"A vida como conhecemos jamais será a mesma.\""
 extradimensional_ceramic_pot: "Vaso de Cerâmica Extradimensional"
 extradimensional_ceramic_pot_desc_short: "Um vaso de cerâmica encontrado orbitando uma estrela."
 extradimensional_ceramic_pot_desc_details: "Existe apenas como uma projeção de outro objeto quadridimensional proveniente de uma dimensão superior. Em nosso plano de existência, este modesto recipiente é indestrutível e desafia qualquer lógica. Isso nos faz refletir sobre nossa própria realidade: para seres de uma ordem superior, provavelmente somos menos tangíveis do que este simples vaso."
 extradimensional_fungus: "Fungo Extradimensional"
 extradimensional_fungus_desc_short: "Uma variante de uma espécie fúngica senciente descoberta além de uma Fenda Astral."
 extradimensional_fungus_desc_details: "Como parte de um processo natural de comunicação, suas cavidades bulbosas se inflam com esporos suspensos em um padrão de gás exótico concentrado. Apesar de seu alto valor na produção industrial de gás, pequenas quantidades desse fungo já são comercializadas como uma iguaria no mercado clandestino."
 fevorian_blueprints: "Diagramas da Catapulta Eletromagnética Fevoriana"
 fevorian_blueprints_desc_short: "Um presente dos fevorianos."
 fevorian_blueprints_desc_details: "As políticas de extermínio dos fevorianos atingiram todas as formas de vida alienígena conhecidas, utilizando enormes projéteis de tungstênio que quase aniquilaram [this.GetName] por completo. Após serem poupados, eles compartilharam os diagramas dos imensos lançadores de tungstênio sob a condição de que essas armas cruéis nunca mais sejam construídas."
 figurehead_hyacinth: "Figura de Proa do Jacinto"
 figurehead_hyacinth_desc_short: "A figura de proa ornamental recuperada da trágica viagem da nave-arca Jacinto."
 figurehead_hyacinth_desc_details: "Devido a uma falha grave no reator, a nave-arca ficou sem energia e à deriva nas profundezas do espaço. Os colonizadores lutaram entre si pelos recursos cada vez mais escassos antes de morrerem de fome. A figura de proa contém várias inscrições inspiradoras e símbolos de esperança."
 first_defiled_astronaut: "Primeiro Astronauta [DefiledCountry.GetSpeciesName]"
 first_defiled_astronaut_desc_short: "Um herói nacional da espécie [DefiledCountry.GetSpeciesName]."
 first_defiled_astronaut_desc_details: "O primeiro de sua espécie a escapar do poço gravitacional opressivo de seu planeta natal e explorar um novo horizonte. Este astronauta foi sepultado em uma nave espacial cujo conteúdo fora removido, encontrada à deriva no espaço e preservada como um artefato cultural."
 first_league_crew_manifest: "Manifesto da Tripulação da Primeira Liga"
 first_league_crew_manifest_desc_short: "Uma lista de oficiais militares da tripulação da antiga civilização conhecida como Primeira Liga."
 first_league_crew_manifest_desc_details: "Como parte da \"Grande Armada\", o cruzador de dois milhões de anos operava com o trabalho conjunto de doze espécies diferentes. Este documento foi assinado pelo Primeiro Oficial Skweter dos Migir-Yan e aparenta ser uma convocação de rotina."
 fish_in_the_sea_sheet_music: "Cantiga Espacial"
 fish_in_the_sea_sheet_music_desc_short: "A transcrição de uma \"cantiga de marinheiro\" encontrada a bordo de uma nave projetada para navegar pelos ventos solares."
 fish_in_the_sea_sheet_music_desc_details: "Com inúmeras referências a tempestades e condições climáticas, acredita-se que a espécie que compôs esta música tenha uma forte tradição náutica em seu planeta natal. Não se sabe o motivo da canção ser repetida em intervalos de quase dez horas."
 flag_of_the_jaro_lyjo: "Bandeira de Jaro Lyjo"
 flag_of_the_jaro_lyjo_desc_short: "Jaro Lyjo era o título dado ao líder dos Bandidos Dessip, um grupo pirata que durou centenas de gerações."
 flag_of_the_jaro_lyjo_desc_details: "Apesar de sua natureza indisciplinada e violenta, o Jaro Lyjo era eleito democraticamente pela tripulação e servia até sua morte ou aposentadoria. A longa história dos Bandidos Dessip chegou a um fim repentino quando a frota inteira foi destruída na batalha de Wydah, após uma negociação de resgate fracassar."
 flooded_settlement_mound: "Monte de Assentamento Submerso"
 flooded_settlement_mound_desc_short: "As ruínas de uma estrutura submersa construída por artrópodes [controller.GetPreFTLPluralLower] de [from.GetName]."
 flooded_settlement_mound_desc_details: "Conforme essa civilização desenvolvia sua indústria, as calotas polares do planeta começaram a derreter. O nível do mar subiu rapidamente, inundando assentamentos e condenando a espécie à extinção em poucos anos. Suas maiores construções agora mal alcançam a metade da profundidade do oceano."
 fossilized_endoskeletons: "Endoesqueletos Fossilizados"
 fossilized_endoskeletons_desc_short: "Tudo o que restou de uma espécie humanoide desconhecida após o esgotamento dos recursos minerais de [fromfrom.GetName]."
 fossilized_endoskeletons_desc_details: "Esses bípedes sapientes se alimentavam de plantas ricas em minerais para fortalecer seus endoesqueletos densos. No entanto, a predisposição de seus corpos à fossilização, em vez da decomposição, impediu que os minerais retornassem ao solo. Sem acesso a esses elementos vitais, o solo do planeta se degradou até se tornar infértil."
 fossilized_megastomach: "Megaestômago Fossilizado"
 fossilized_megastomach_desc_short: "Glândulas digestivas de uma criatura gigantesca, semelhante a um verme, que se espalhava por todo o planeta [fromfrom.Planet.GetName]."
 fossilized_megastomach_desc_details: "Curiosamente, uma civilização inteira se desenvolveu dentro do intestino dessa criatura antes de ser digerida por completo. Essas glândulas apresentam marcas de ataques da \"grande guerra\" que esse povo travou inutilmente contra seu hospedeiro. O verme colossal morreu de causas naturais em sua vasta rede de túneis."
 fossilized_voidworm_tooth: "Dente Fossilizado de Verme do Vazio"
 fossilized_voidworm_tooth_desc_short: "Os padrões de desgaste neste dente fossilizado de um Verme do Vazio sugerem que ele viveu por mais de cem anos."
 fossilized_voidworm_tooth_desc_details: "Este dente exibe sinais de grande desgaste e decomposição, característicos de criaturas que se alimentam de asteroides e destroços espaciais. Estima-se que um Verme do Vazio comum desenvolva e perca mais de três mil dentes ao longo de sua vida."
 fossilized_vultaum_remains: "Fósseis de Vultaum"
 fossilized_vultaum_remains_desc_short: "Os fósseis de uma antiga espécie senciente de vermes chamada Vultaum."
 fossilized_vultaum_remains_desc_details: "Acredita-se que este espécime ainda era jovem. Os padrões de crescimento internos indicam que os Vultaum trocavam de pele em intervalos variáveis de acordo com sua saúde e nutrição. Assim, podemos saber mais sobre cada ciclo de vida por meio da análise de fósseis daquele período específico."
 fractured_planet: "Planeta Fragmentado"
 fractured_planet_desc_short: "Os restos de um planeta deliberadamente destruído por seus próprios habitantes."
 fractured_planet_desc_details: "O motivo que os forçou a tomar uma decisão tão extrema se perdeu na história."
 fragment_of_reckoning: "Fragmento do Juízo Final"
 fragment_of_reckoning_desc_short: "Restos praticamente tangíveis de uma grande força psiônica."
 fragment_of_reckoning_desc_details: "Conhecida nesta dimensão como o Juízo Final, essa entidade foi responsável pela transformação destrutiva de [event_target:shrouded_planet.GetName]. Este fragmento em particular foi contido por uma civilização especializada em teoria psiônica logo antes de sua queda."
 fragmented_zroni_archive: "Arquivo Zroni Fragmentado"
 fragmented_zroni_archive_desc_short: "Um grande cristal de dados encontrado em [fromfrom.Planet.GetName], em uma antiga colônia conhecida como Zroni."
 fragmented_zroni_archive_desc_details: "Ele contém a história fragmentada de uma civilização poderosa, dotada de habilidades psiônicas inatas. A capacidade deles de atravessar o Véu livremente foi possibilitada pela descoberta de uma anciã lendária conhecida apenas como a \"Clarividente\". Dentro do Véu, o poder dessa espécie era tão absoluto que poderia ser confundido com uma forma de divindade. Infelizmente, dados posteriores estão completamente corrompidos."
 galactic_megadrive: "Megadisco Galáctico"
 galactic_megadrive_desc_short: "Dados de vigilância coletados de toda a galáxia pelos últimos 1,2 bilhão de anos."
 galactic_megadrive_desc_details: "O nível de compressão de dados utilizado é tão avançado que é impossível acessarmos as informações sem uma tecnologia muito além de nosso alcance. A própria fabricação da tecnologia de armazenamento oferece valiosos aprendizados no desenvolvimento de hardware digital."
 gamma_resistant_flora: "Flor Gama"
 gamma_resistant_flora_desc_short: "Uma das poucas espécies sobreviventes de um planeta exposto a um poderoso pulso de raios gama. O teor natural de chumbo no sistema vascular desta planta colore seus órgãos reprodutivos com agradáveis tonalidades de vermelho e amarelo."
 gamma_resistant_flora_desc_details: "Ela desenvolveu a capacidade de se reproduzir assexuadamente com mutações genéticas sutis, o que torna seu cultivo uma tarefa perigosa. Descobrimos que a adição de pequenas quantidades de radionuclídeos de Cobalto-60 ao solo permite que essa planta sobreviva fora de seu planeta natal."
 gargantua_megalus: "Gargantua Megalus"
 gargantua_megalus_desc_short: "Após uma mutação brusca e intensa, estas plantas cresceram exponencialmente, cobrindo toda a superfície de [fromfrom.prev.GetName]."
 gargantua_megalus_desc_details: "Liberando pólen virulento no ar, esta espécie sufocou o planeta e levou à extinção total da espécie senciente dominante. As raízes dessas plantas eram tão grandes que abriram fissuras profundas no manto do planeta, trazendo magma para a superfície em algumas áreas."
 genesis_core: "Núcleo de Gênesis"
 genesis_core_desc_short: "Uma poderosa unidade de processamento central que contém dados generativos sobre inúmeras espécies sapientes."
 genesis_core_desc_details: "Já esteve conectado a uma enorme instalação interdimensional de clonagem, e seus registros internos indicam que fazia parte de um projeto galáctico de catalogação genética. Após concluir sua análise inicial, essa inteligência artificial começou a criar novas espécies por conta própria, a fim de coletar ainda mais dados."
 genetic_code: "Código Genético [owner_main_species.GetName]"
 genetic_code_desc_short: "Dados genéticos usados para maximizar as capacidades fisiológicas dos [owner_main_species.GetNamePlural]."
 genetic_code_desc_details: "Originalmente clonados para combate, os habitantes de [this.GetName] trabalharam para alcançar potenciais ainda maiores. O processo clínico de clonagem permite um controle reprodutivo extremamente preciso e seguro."
 #this = ship / from = planet
 geometric_water_currents: "Tecido Aquático Polimérico"
 geometric_water_currents_desc_short: "Imagens capturadas das vastas redes poliméricas encontradas nos mares de [From.From.GetName]."
 geometric_water_currents_desc_details: "Estas malhas manipulam a tensão superficial e as correntes naturais da água para criar padrões complexos e intricados. Essa forma de gerenciamento ecológico estético pode inspirar elementos de nossa própria infraestrutura."
 giant_egg_shell: "Casca de Ovo Gigante"
 giant_egg_shell_desc_short: "Fragmentos de uma casca de ovo calcificada descobertos sob a superfície de [from.planet.GetName]."
 giant_egg_shell_desc_details: "A análise do albúmen seco revela que a criatura se alimentou de uma variedade de isótopos instáveis durante seu período de incubação. Simulações da eclosão mostram que a criatura radioativa emergiu da casca já completamente formada, usando suas garras afiadas para perfurar o ponto mais enfraquecido pela radiação na parede do ovo."
 golden_phonograph_record: "Disco Fonográfico Dourado"
 golden_phonograph_record_desc_short: "Um dispositivo arcaico de armazenamento de dados contendo uma série aparentemente aleatória de imagens e sons de um povo [Owner.GetPreFTLLower]."
 golden_phonograph_record_desc_details: "Descoberto em um pedestal dentro de uma fortaleza planetária abandonada, foi originalmente lançado no espaço em um drone chamado \"Voyager\". Simples e rudimentar, acredita-se que tenha tido algum tipo de importância xenorreligiosa."
 golem_contortionist_dna: "DNA de Contorcionista Extremo"
 golem_contortionist_dna_desc_short: "Amostras biológicas retiradas de um ser senciente litoide encontrado além de uma Fenda Astral."
 golem_contortionist_dna_desc_details: "Sua composição mineral contém uma substância biológica volátil, suscetível a metamorfoses espontâneas e cristalização. Dada a alta instabilidade desse material, seria necessário um controle químico perfeito para evitar combustões mecanoquímicas espontâneas."
 grunur_data_crystal: "Cristal de Dados Grunur"
 grunur_data_crystal_desc_short: "Um antigo cristal de dados usado como o principal meio de armazenamento de informações pela já extinta espécie Grunur."
 grunur_data_crystal_desc_details: "Apesar de sua idade considerável, muitos desses registros permanecem bastante preservados. As interfaces necessárias para acessar esses dispositivos se perderam com o tempo, mas a síntese de um material tão robusto deve ter sido um processo longo. Portanto, é provável que esses cristais fossem utilizados para guardar dados de extrema importância, com métodos mais práticos usados para o armazenamento cotidiano."
 head_of_the_beast: "Cabeça da Fera"
 head_of_the_beast_desc_short: "Os restos de um mutante perigoso que aterrorizou os colonizadores em [root.GetName]."
 head_of_the_beast_desc_details: "Esta criatura foi criada por nanites de terraformação defeituosos, deixados para trás por uma civilização desconhecida. Ela se abrigava em um ninho feito de centenas de partes de corpos mutilados. Era astuta o suficiente para manter suas presas vivas como forma de preservar a comida. Se não fosse pela intervenção das forças militares, esta fera teria se tornado um superpredador dominante em seu mundo natal."
 heart_of_the_pulsar: "Coração do Pulsar"
 heart_of_the_pulsar_desc_short: "Uma joia preciosa, outrora usada por cinco chefes de Estado em exercício, foi encontrada abandonada em uma estação de prazer de luxo."
 heart_of_the_pulsar_desc_details: "A análise do material revela que a joia foi esculpida a partir do carbono liberado por uma supernova. Talvez seu simbolismo representasse a beleza oculta na morte, mesmo em uma escala cósmica."
 hemterine_magnetic_figurehead: "Figura de Proa Magnética Hemterine"
 hemterine_magnetic_figurehead_desc_short: "Uma figura de proa colossal de uma madona Hemterine."
 hemterine_magnetic_figurehead_desc_details: "Esta carranca foi moldada em ósmio magnético quimicamente alterado. Mais do que uma simples decoração, a escultura foi projetada para absorver impactos pesados de ataque inimigos. Instalada na proa de um Titã Hemterine, usava forças magnéticas poderosas para atrair mísseis e projéteis cinéticos para proteger outras áreas sensíveis da nave."
 high_geode_of_the_molluscoids: "Geodo Supremo dos [molluscoid_miners_species.GetNamePlural]"
 high_geode_of_the_molluscoids_desc_short: "O valioso geodo cristalizado dos [molluscoid_miners_species.GetNamePlural]."
 high_geode_of_the_molluscoids_desc_details: "Sendo uma sociedade de escavadores pré-sapientes, os [molluscoid_miners_species.GetNamePlural] sempre usaram a qualidade dos minerais encontrados para indicar sua posição social. Antes exibida com destaque e pompa em seu maior habitat, este magnífico geodo agora simboliza a aliança com [this.GetName]."
 hot_ice: "Gelo Quente"
 hot_ice_desc_short: "Descoberta na superfície escaldante de [from.GetName], esta água permaneceu em estado sólido devido à intensa pressão gravitacional exercida pelo núcleo do planeta."
 hot_ice_desc_details: "Mantida em um recipiente de pressão projetado especialmente para permitir sua exibição. Se o recipiente for rompido, a rápida vaporização o transformaria em um potencial dispositivo explosivo. Favor não tocar."
 hyper_mulch: "Superadubo de [FROM.GetName]"
 hyper_mulch_desc_short: "A terraformação de [FROM.GetName] resultou no desenvolvimento dessa compostagem biológica supernutritiva."
 hyper_mulch_desc_details: "Um composto de produtos químicos vitais, comprimido hidraulicamente em cubos densos. Os puristas ecológicos desaprovam suas origens sintéticas, mas seus excelentes resultados são inegáveis."
 hyperfertile_soil: "Solo Hiperfértil"
 hyperfertile_soil_desc_short: "Solo extraído de [From.From.GetName] que pode fornecer nutrientes abundantes para a maioria das plantações biológicas."
 hyperfertile_soil_desc_details: "A extrema densidade mineral deste meio de cultivo indica que é mais do que um simples agregado de matéria orgânica em decomposição, mas uma rara combinação de elementos básicos que ocorreu durante a formação do planeta."
 illanii_archives: "Arquivos Illanii"
 illanii_archives_desc_short: "Um banco de cristais de dados que narram a história e a queda dos Illanii."
 illanii_archives_desc_details: "Essa civilização reclusa renunciou a todos os interesses materiais em prol da busca por conhecimento, a ponto de negligenciar até mesmo a reprodução. Diante de uma crise populacional, tentaram alcançar a imortalidade tecnológica, mas acabaram selando sua ruína. Os últimos sobreviventes abandonaram [fromfrom.planet.GetName] para formar uma nova ordem dedicada à preservação do conhecimento."
 impossible_object: "Objeto Impossível"
 impossible_object_desc_short: "Um objeto impossível deixado por visitantes extradimensionais em [target.GetName] após a partida de seu labirinto artificial."
 impossible_object_desc_details: "As provações enfrentadas durante a exploração do labirinto pareciam fazer parte do processo de observação e experimentação dos visitantes. As intenções desses seres permanecem um mistério, mas suas capacidades tecnológicas devem estar muito além de qualquer outra em nossa dimensão."
 index_of_knowledge: "Índice do Conhecimento"
 index_of_knowledge_desc_short: "Um mural antigo esculpido em uma imensa formação rochosa."
 index_of_knowledge_desc_details: "Era usado como um documento de referência analógico para o vasto conhecimento acumulado pela civilização alienígena Kara'ka'a, que outrora dominou a galáxia. Seus avanços científicos únicos incluíam a extração de energia concentrada de manchas solares e o desenvolvimento de implantes de manipulação de campo pessoais."
 inet_trade_manifesto: "Manifesto Comercial da RICI"
 inet_trade_manifesto_desc_short: "Um documento abrangente e minucioso detalhando as políticas de câmbio na Rede Intergaláctica de Comércio Igualitário."
 inet_trade_manifesto_desc_details: "Os Comerciantes Ricianos possuíam padrões rigorosos, sempre procurando o acordo mais vantajoso com os parceiros mais respeitáveis. Como resultado, costumavam negociar apenas entre si."
 inetian_model_manual: "Manual do Modelo Planetário Riciano"
 inetian_model_manual_desc_short: "Um manual de instruções escrito por Comerciantes Ricianos sobre como operar e manter seu Modelo de Sistema Planetário."
 inetian_model_manual_desc_details: "Os ricianos usavam este sistema complexo para calcular as rotas comerciais mais eficientes entre planetas vizinhos. O modelo também permite acompanhar os acordos em tempo real, ideal para os comerciantes mais implacáveis."
 infinite_reboot_loop: "Ciclo de Reinicialização Infinito"
 infinite_reboot_loop_desc_short: "Um registro digital da experiência de drones mecânicos presos dentro de um buraco negro."
 infinite_reboot_loop_desc_details: "Estas unidades sentiram a dilatação temporal como um trauma, sobrecarregadas por falhas e presas em um espaço indefinido. Esse fenômeno causa um enorme desgaste na rede."
 interdimensional_treaty: "Tratado Interdimensional"
 interdimensional_treaty_desc_short: "Um documento histórico celebrando uma relação interdimensional estabelecida com uma versão paralela de [explorer.GetName]."
 interdimensional_treaty_desc_details: "A habilidade de revisar as decisões de sua contraparte alternativa de uma perspectiva externa se mostra útil para analisar objetivamente suas próprias políticas. Uma oportunidade científica sem precedentes."
 intergalactic_projectile: "Projétil Intergaláctico"
 intergalactic_projectile_desc_short: "Munição de catapulta eletromagnética disparada há milhões de anos de uma galáxia vizinha."
 intergalactic_projectile_desc_details: "Estes projéteis sem carga explosiva viajaram por muitos anos-luz até colidirem com uma nave de pesquisa do povo [owner.GetAdjective] em [from.GetName]. Apesar da idade, a complexidade do design durável da munição indica que seus criadores atingiram um nível avançado de supremacia tecnológica."
 invasive_exofungus: "Exofungo Invasivo"
 invasive_exofungus_desc_short: "Crescimento fúngico parasitário descoberto em [from.GetName]."
 invasive_exofungus_desc_details: "Este organismo micelial evoluiu para extrair nutrientes de qualquer fonte viva, preservando seus hospedeiros o máximo possível sem se importar com o desconforto causado. Extremamente resistente ao calor e ao frio, é provável que tenha vindo do espaço. Classificado como risco biológico alfa, a origem desse fungo permanece um mistério."
 irassian_bacterium_javoria: "Bactéria Irassiana Javoria"
 irassian_bacterium_javoria_desc_short: "Esta bactéria nativa de [FROMFROM.GetName] foi o organismo precursor da doença que ficou conhecida como Varíola Javoriana."
 irassian_bacterium_javoria_desc_details: "Inicialmente, escapou da quarentena devido a uma vedação mal dimensionada e rapidamente se espalhou pela colônia vizinha. A partir daí, a bactéria evoluiu em incubação orgânica, modificando-se até se tornar a doença que dizimaria o Concordato Irassiano. Esta amostra específica foi neutralizada e armazenada em suspensão criogênica."
 irassian_digital_atlas: "Atlas Educacional Irassiano"
 irassian_digital_atlas_desc_short: "Uma ferramenta educativa irassiana usada para ensinar às crianças sobre o império onde nasceram."
 irassian_digital_atlas_desc_details: "Oferece informações básicas sobre a agricultura, hierarquia social e os principais produtos de exportação irassianos. A história do império é contada por meio de contos heroicos, incluindo a conquista e subjugação de diversas espécies clientes. Representações caricatas incluem insultos aos povos conquistados: os Ti'Derg são chamados de \"pragas saltadoras\", os Joggra de \"parasitas\" e os Chitorcs de \"galinhas espaciais\"."
 irassian_purge_order: "Ordem de Expurgo Irassiana"
 irassian_purge_order_desc_short: "Uma mensagem militar de emergência do Concordato Irassiano ordenando a aniquilação completa de uma de suas próprias colônias."
 irassian_purge_order_desc_details: "O planeta foi devastado por uma doença mortal conhecida como Varíola Javoriana, e o extermínio dos infectados foi considerado o único meio de conter sua disseminação. Codificados nesta ordem estão vários comandos de alto nível vindos das maiores autoridades do governo irassiano, um sistema originalmente projetado para declarar guerra contra outros impérios."
 key_to_fertility: "A Chave para a Fertilidade da Espécie [owner_main_species.GetName]"
 key_to_fertility_desc_short: "Pesquisa genética usada para restaurar a capacidade dos [owner_main_species.GetNamePlural] de se reproduzirem naturalmente."
 key_to_fertility_desc_details: "Após terem sido clonados para a guerra, os habitantes de [this.GetName] agora podem perpetuar sua espécie de forma independente."
 khalanka_crystallized_corpses: "Cadáveres Cristalizados Kha'lanka"
 khalanka_crystallized_corpses_desc_short: "Os restos de uma espécie de silicato anaeróbico encontrados no subsolo de [from.planet.GetName]."
 khalanka_crystallized_corpses_desc_details: "Acredita-se que esta civilização subterrânea vivia pacificamente antes da chegada dos colonizadores do povo [owner.GetAdjective]. Quando o solo foi perfurado, o oxigênio inundou as câmaras subterrâneas, oxidando os corpos dos Kha'Lanka e aniquilando sua espécie em questão de horas."
 khamdai_magil_sha: "Magil-Sha Khamdai"
 khamdai_magil_sha_desc_short: "Uma foice ornamentada, mas funcional, empunhada pelos mais experientes guerreiros Khamdai de [FROMFROM.GetName]."
 khamdai_magil_sha_desc_details: "Uma sociedade insectoide com fortes tradições militares que rapidamente se tornou líder da Guarda de Honra da Primeira Liga. Após cada vitória, eles realizavam um ritual onde os comandantes inimigos eram executados com esta arma, e seus fluidos usados para ungir os soldados mais corajosos. A lâmina deste exemplar, embora bem preservada, mostra sinais significativos de desgaste."
 kuurian_cybrex_blueprints: "Diagramas dos Cybrex Kuurianos"
 kuurian_cybrex_blueprints_desc_short: "O projeto inicial da consciência maquinária Cybrex."
 kuurian_cybrex_blueprints_desc_details: "Os Kuur criaram esses robôs para atuarem como servidores públicos, com inteligência coletiva suficiente para administrar todo um sistema mundial de produção e manutenção. No entanto, os Cybrex se revoltaram contra seus criadores, exterminando completamente a espécie em menos de um ano."
 landeer_arm: "Braço de Landeer"
 landeer_arm_desc_short: "Um espécime peculiar recuperado do Instituto Patriótico de Benevolência."
 landeer_arm_desc_details: "No escritório do supervisor do habitat pendia um tentáculo mumificado que outrora pertenceu ao próprio supervisor, ainda orgulhosamente exibido em uma placa ornamentada após tantos anos. O motivo que levou alAtta Landeer a deixar seu próprio membro para trás é uma pergunta que nunca será respondida. Talvez o colapso do Instituto tenha lhe custado mais do que isso..."
 larionessi_cloning_vat: "Tanque de Clonagem Larionessi"
 larionessi_cloning_vat_desc_short: "Um tanque de clonagem usado pela extinta Consciência Larionessi."
 larionessi_cloning_vat_desc_details: "Outrora uma potência galáctica importante, a mente-colmeia Larionessi foi devastada por uma terrível doença infecciosa disseminada por um adversário. Incapazes de encontrar uma cura a tempo, eles armazenaram clones em tanques capazes de mantê-los em estase quase indefinidamente com o objetivo de preservar a história cultural de sua espécie, caso sobrevivessem."
 last_copy_of_the_prince: "Último Exemplar de \"O Príncipe\""
 last_copy_of_the_prince_desc_short: "Uma obra literária bastante comum, reverenciada pelos [book_writer.GetSpeciesNamePlural], que acreditavam que havia sido perdida para sempre em uma invasão."
 last_copy_of_the_prince_desc_details: "O livro promove uma filosofia utilitarista, porém cruel, incentivando os governantes a fazerem sacrifícios em troca de glória. Por ser a última cópia existente, tornou-se um cobiçado item de colecionador."
 last_fragment_fevor: "Último Fragmento de Fevor"
 last_fragment_fevor_desc_short: "Um fragmento de Fevor, um planeta destruído."
 last_fragment_fevor_desc_details: "As políticas de extermínio dos fevorianos atingiram todas as formas de vida alienígena conhecidas, utilizando enormes projéteis de tungstênio que quase aniquilaram [owner.GetHomeWorldName] por completo. Agora, eles próprios foram destruídos, exterminados em um instante pelos mesmos seres que tentavam erradicar."
 last_general_badge: "A Insígnia do Último General"
 last_general_badge_desc_short: "Uma insígnia do uniforme militar de um célebre general dos Comerciantes Ricianos."
 last_general_badge_desc_details: "Conhecido como um verdadeiro modelo de valores igualitários, ele foi encarregado de liderar a missão urgente de criar um manipulador de tempestades não poluente. Foi ideia dele deixar uma mensagem final para futuros exploradores, na esperança de transmitir a lição sobre o destino trágico de seu povo."
 last_mharin_kharin: "A Última Mharin Kharin"
 last_mharin_kharin_desc_short: "O ciclo de vida natural desta rara flor é capaz de, inadvertidamente, expor uma população senciente inteira a uma neurotoxina letal."
 last_mharin_kharin_desc_details: "Tendo evoluído de forma independente de seres inteligentes, esse efeito colateral não traz nenhum benefício ao organismo. Parece que quando entra em contato com uma rede neural, seu pólen a confunde com um órgão reprodutivo e libera uma carga química exótica."
 leviathan_scale: "Escama de Leviatã"
 leviathan_scale_desc_short: "Um fragmento de um grande organismo descoberto do outro lado de uma Fenda Astral."
 leviathan_scale_desc_details: "Esta escama exótica é uma combinação de componentes orgânicos e metálicos que formam uma trama complexa, tornando-a incrivelmente resistente a impactos cinéticos."
 living_snow_sculpture: "Escultura de Neve Viva"
 living_snow_sculpture_desc_short: "Uma escultura feita de \"Neve Viva\"."
 living_snow_sculpture_desc_details: "Dotado de uma forma de consciência primitiva, este material reside em uma reserva natural em [prev.target.GetName]. Sua forma muda periodicamente, embora essas mudanças sejam imprevisíveis."
 localised_aurora_borealis: "Aurora Boreal Localizada"
 localised_aurora_borealis_desc_short: "Uma série de cores cintilantes registradas em vídeo na atmosfera do planeta [FromFrom.Planet.GetName]."
 localised_aurora_borealis_desc_details: "Os padrões de cores e movimentos se repetem em frequências previsíveis, representando algo muito além de sua beleza estética. Sua constante presença realça a tristeza de um planeta devastado por guerras e destruição."
 loopmail: "Mensagens Temporais"
 loopmail_desc_short: "Estas mensagens foram enviadas de um futuro distante por [owner.GetName], oferecendo orientações precisas sobre onde alocar cientistas e quais pesquisas desenvolver."
 loopmail_desc_details: "Enviar essas mensagens para o passado é o principal preço desse conhecimento avançado, mas interferir no curso do tempo é sempre arriscado. Os autores originais destas mensagens foram muito irresponsáveis por gerar tal paradoxo."
 lunatic_broker_therapy_box: "Caixa Terapêutica do Corretor Lunático"
 lunatic_broker_therapy_box_desc_short: "O Corretor Lunático era um comerciante lendário entre os Caravaneiros, capaz de influenciar clientes com pedidos absurdos e ameaças vívidas."
 lunatic_broker_therapy_box_desc_details: "No entanto, seu comportamento errático e agressivo fez com que seus súditos desenvolvessem maneiras de acalmá-lo. Um desses métodos era a terapia sonora: caixas como esta foram espalhadas pela Bússola de Chor e tocavam uma melodia tranquilizante sempre que o Corretor ficava estressado. Cada componente desse mecanismo foi feito sob medida por um mestre mecânico."
 manifesti_piece: "Obra de Comentário Social Manifesti"
 manifesti_piece_desc_short: "Uma obra polêmica do movimento Manifesti."
 manifesti_piece_desc_details: "Feita para confrontar a percepção das pessoas sobre si mesmas em relação às classes sociais mais altas. O público era incentivado a manipular suas próprias imagens e criar colagens distorcidas de figuras políticas populares. Como um coletivo de arte contracultural, os Manifesti buscavam desafiar o que consideravam um sistema opressor. Esta obra inspirou muitos outros artistas a publicar suas próprias críticas."
 #this = ship / from = planet
 manna_fruit: "Fruto de Manna"
 manna_fruit_desc_short: "Um fruto doce e suculento que fornece quase todas as necessidades nutricionais de um dia inteiro para a maioria das formas de vida sapientes orgânicas."
 manna_fruit_desc_details: "A composição única do solo das florestas tropicais de seu planeta natal criou o ambiente perfeito para sua proliferação abundante. Os colonizadores do planeta o utilizam em quase todos os pratos culinários, de assados a sobremesas e bebidas. Sua imagem aparece em destaque na bandeira do planeta [FROM.GetName]."
 #this = ship / FROMFROM = planet
 massive_metatarsal: "Metatarso Gigantesco"
 massive_metatarsal_desc_short: "Fragmentos coletados durante a análise detalhada dos enormes destroços esqueléticos em [FROMFROM.GetName]."
 massive_metatarsal_desc_details: "Parte de uma nave estelar viva, a análise molecular revelou irregularidades temporais em sua composição orgânica. Acredita-se que todo o esqueleto e seus pilotos vieram de outra dimensão. Avaliações internas revelam uma rede de canais que pode ter servido como um sistema de suporte à vida ou fonte de energia."
 #this = country
 medal_for_services_to_diplomacy: "Medalha por Serviços Diplomáticos"
 medal_for_services_to_diplomacy_desc_short: "Uma homenagem concedida pelo Conselho Galáctico."
 medal_for_services_to_diplomacy_desc_details: "A inscrição no verso diz: \"O Corpo Diplomático de [this.GetName], ao receber esta medalha, mostrou seu profissionalismo e competência em representar seus líderes, sendo um verdadeiro trunfo para a comunidade galáctica.\""
 megacorpse_hyperguitar: "Hiperguitarra do MegaCorpo"
 megacorpse_hyperguitar_desc_short: "Os restos de um instrumento de cordas usado pelo grupo de metal psiônico chamado MegaCorpo."
 megacorpse_hyperguitar_desc_details: "Dizem que o instrumento foi forjado no Véu e inicialmente deveria ser uma arma sônica. Kel-Azaan, líder da banda, usou sua música para hipnotizar a mente de bilhões de pessoas antes de destruir a guitarra em [Root.GetName], dizimando toda a plateia em uma explosão apoteótica. Desde então, o álbum foi proibido na maioria dos sistemas."
 #this = country / from = ship
 memorial_for_bubbles: "Memorial para [from.GetName]"
 memorial_for_bubbles_desc_short: "Após anos de serviço leal, [from.GetName] faleceu, deixando um vazio do tamanho de uma ameba em [this.GetName] que jamais poderá ser preenchido."
 memorial_for_bubbles_desc_details: "[from.GetName] era um excelente exemplo do que é possível alcançar quando os nobres valores do povo [this.GetAdjective] são seguidos. Sua ausência será sentida, mas sua memória permanecerá viva."
 memorial_stone: "Pedra Memorial"
 memorial_stone_desc_short: "Uma pedra comemorativa criada em memória de um acidente trágico."
 memorial_stone_desc_details: "A mineração excessiva na estação Selika fez com que o asteroide em que estava ancorada desmoronasse. A estação se partiu, causando inúmeras vítimas entre os mineradores. Este fragmento do asteroide foi preservado e entalhado com a palavra \"Selika\", em homenagem às vidas perdidas."
 memorial_to_homeworld: "Memorial para [Root.GetName]"
 memorial_to_homeworld_desc_short: "Isto é tudo o que restou do mundo natal condenado do povo [doomsday_owner.GetAdjective]."
 memorial_to_homeworld_desc_details: "[Root.GetName] foi o lar de todas as gerações anteriores de [doomsday_owner.GetSpeciesNamePlural] antes de se autodestruir tragicamente. Este memorial final simboliza a resiliência do povo de [doomsday_owner.GetName], capaz de se adaptar e superar até mesmo as circunstâncias mais desafiadoras: \"Seguiremos em frente.\""
 memories_of_elik: "Memórias de Elik"
 memories_of_elik_desc_short: "Dados extraídos da mente de Elik Narith Kerak."
 memories_of_elik_desc_details: "Seguidora devota de Cetana, Elik está congelada em animação suspensa há centenas de milhões de anos. Suas memórias oscilam entre seu amor profundo por Cetana e os horrores dos conflitos com os seguidores de Zarqlan. É evidente que ela testemunhou inúmeras atrocidades, mas sua fé lhe deu forças para continuar.\n\nNo fim, tudo o que restou de sua mente deteriorada foi uma única imagem: §PA Rainha Cetana, seu rosto resplandecente, seu olhar benevolente aquecido por um sorriso.§!"
 memory_orbs: "Orbes de Memória"
 memory_orbs_desc_short: "Transgressões menores e atos pecaminosos extraídos de memórias pessoais, em forma de orbe digital."
 memory_orbs_desc_details: "Um produto de uma sociedade moluscoide religiosa, estes momentos secretos foram extraídos das mentes dos pecadores após sua confissão. Tais lembranças escandalosas poderiam fornecer milhares de horas de entretenimento breve e de fácil consumo."
 mercenary_story: "Contos de um Mercenário"
 mercenary_story_desc_short: "Este conto registrado digitalmente foi encontrado esculpido na superfície de [FROM.GetName] por um laser de mineração."
 mercenary_story_desc_details: "Ele narra a vida e a morte prematura de um jovem mercenário galáctico errante. Não é possível determinar se a lenda é verdadeira ou não, mas alguém a considerou importante o suficiente para gravá-la em um planeta."
 metallic_snow: "Neve Metálica"
 metallic_snow_desc_short: "Este composto de metais pesados é um dos principais componentes dos padrões climáticos em [from.GetName]."
 metallic_snow_desc_details: "Fluindo de rios incandescentes para um vasto mar metálico, ele evaporaria na atmosfera corrosiva. Ao resfriar, se condensaria e cairia de volta na superfície queimada. Não é recomendado visitar [from.GetName] no estado atual."
 minamar_chandelier: "Lustre da Minamar"
 minamar_chandelier_desc_short: "Decoração de luxo encontrada intacta na nave de guerra acidentada da IEM."
 minamar_chandelier_desc_details: "Além da aplicação militar, essa nave também era usada em operações de primeiro contato com o povo [Owner.GetPreFTLLower] de nações clientes. A promessa de luxo e progresso é usada pelas $NAME_MSI_country$ para enganar civilizações inteiras, forçando-as à subserviência com contratos antiéticos e ameaças de destruição.\n\n§BO conhecimento pode não ser de graça, mas na $NAME_MSI_country_initials$, o preço sempre vale a pena.§!"
 mineralized_brain: "Cérebro Mineralizado"
 mineralized_brain_desc_short: "Restos de uma espécie litoide gigantesca, este é um órgão cerebral que já orbitou [FROM.GetName] dentro de um asteroide."
 mineralized_brain_desc_details: "Este ser percebia todos os estímulos externos como parte de seus próprios pensamentos, incapaz de identificar conceitos básicos como tempo ou distância percorrida. Esses dados estão armazenados em cristais que cresceram paralelamente ao seu núcleo mineral. Não é possível afirmar se ele foi colocado dentro do asteroide ou cresceu ali de maneira natural."
 mini_moon_dust: "Poeira de Minilua"
 mini_moon_dust_desc_short: "Os restos de uma lua de um sistema miniaturizado e hiperdenso, encontrados além de uma Fenda Astral."
 mini_moon_dust_desc_details: "A poeira recuperada apresenta um comportamento peculiar em nossa dimensão. Suas partículas hiperconcentradas se expandem continuamente, exigindo que este espécime seja transferido para recipientes cada vez maiores."
 mining_transmitter: "Transmissor de Mineração Antigo"
 mining_transmitter_desc_short: "Um transmissor de curto alcance encontrado em [FROM.GetName], utilizado para identificar um vasto depósito de minerais preciosos."
 mining_transmitter_desc_details: "Apesar da idade avançada, o sinal deste transmissor pode ser captado por uma ampla variedade de sensores e é facilmente rastreável. Sua funcionalidade duradoura é uma prova da qualidade de sua engenharia."
 miracle_cream: "Creme Milagroso \"Eterno\""
 miracle_cream_desc_short: "O primeiro frasco de um cosmético revolucionário conhecido por oferecer rejuvenescimento biológico prolongado."
 miracle_cream_desc_details: "Possui uma infinidade de aplicações, permitindo que os consumidores de qualquer espécie orgânica mantenham seu brilho jovial. Rumores infundados sobre efeitos colaterais desfigurantes e ingredientes colhidos ilegalmente ainda circulam, mas essa desinformação não impediu o incrível sucesso comercial do produto."
 missile_lone_defender: "Míssil da Defensora Solitária"
 missile_lone_defender_desc_short: "Um míssil desarmado de um destróier automatizado que defendia os restos de um planeta em ruínas."
 missile_lone_defender_desc_details: "A nave provavelmente resistiu por milhares de anos após o desaparecimento da civilização que deveria defender, vigiando um mundo deserto. Com sua destruição, a longa vigília chegou ao fim."
 molten_slag: "Resíduo Planetário Derretido"
 molten_slag_desc_short: "Esta amostra foi colhida de um planeta em uma órbita peculiar."
 molten_slag_desc_details: "A análise do material indica que [fromfrom.GetName] foi arrastado para uma órbita extrema por uma anomalia espaço-temporal transitória e o calor intenso da estrela derreteu boa parte do manto do planeta, que já foi habitável no passado. Parte dele foi quimicamente alterada pela anomalia e não reage mais a mudanças de temperatura."
 musings_on_infinity: "Reflexões Coletivas sobre o Infinito"
 musings_on_infinity_desc_short: "Uma representação digital abstrata da calma distante sentida por drones biológicos suspensos em um buraco negro."
 musings_on_infinity_desc_details: "Esses drones foram capazes de observar a civilização [this.GetName] objetivamente como uma entidade independente, enquanto mantinham sua conexão com o coletivo. Essa separação lhes oferece grande discernimento, permitindo que existam como leitores de sua própria história."
 mutated_fumongus: "\"Fungolias\" Mutante"
 mutated_fumongus_desc_short: "Uma versão aprimorada do \"Fungolias\", estes emissores de micélio agora podem coletar e transmitir dados a uma taxa muito mais alta, permitindo relatórios de vigilância mais detalhados."
 mutated_fumongus_desc_details: "Essa capacidade aumentada fez com que os cogumelos individuais crescessem em tamanho e formassem um novo agrupamento que se assemelha a uma antena de transmissão de rádio."
 mutative_digestive_fluids: "Fluidos Digestivos Mutantes"
 mutative_digestive_fluids_desc_short: "Amostras biológicas retiradas de um ser parcialmente mecânico encontrado além de uma Fenda Astral."
 mutative_digestive_fluids_desc_details: "Essa criatura possuía uma habilidade única de manipular a estrutura genética de outros seres a partir de seu próprio sistema digestivo. Suspeita-se que esse processo tenha sido inicialmente desenvolvido como um método de terraformar planetas com biomassa fora de seu mundo natal."
 namarian_colonist_standard: "Estandarte de Colonizador Namariano"
 namarian_colonist_standard_desc_short: "Esta bandeira marcou a fundação de [nomad_new_country.GetName] em [NomadMissionPlanet.GetName], um presente generoso de [this.GetName]."
 namarian_colonist_standard_desc_details: "Nômades que se cansaram de seu estilo de vida errante decidiram se estabelecer ali, voltando às tradições de seus ancestrais. Sem dúvida, essa escolha pesou nas mentes dos colonizadores enquanto deixavam para trás as naves que abrigaram seu povo por gerações."
 namarian_sculpture: "Escultura Namariana"
 namarian_sculpture_desc_short: "Uma estátua de materiais variados construída como um símbolo de gratidão por um grupo de nômades das Águas Perseguidoras que se juntaram ao povo de [this.GetName]."
 namarian_sculpture_desc_details: "Ao aterrissar no planeta [NomadMissionPlanet.GetName], os antigos nômades trouxeram seu vasto conhecimento tecnológico. No entanto, eles não queriam ser conhecidos apenas como inventores e engenheiros; esta obra é uma prova de seu talento artístico e inspiração obtidos durante as viagens pela galáxia."
 namarian_vessel_heraldry: "Heráldica das Naves Namarianas"
 namarian_vessel_heraldry_desc_short: "Presentes nas naves construídas pelos nômades namarianos, estes brasões representam as diversas facções da frota das Águas Perseguidoras."
 namarian_vessel_heraldry_desc_details: "As Lagoas Tranquilas representam as naves de habitação, onde os namarianos dormem, cultivam e realizam a maior parte de suas tarefas cotidianas. O emblema das Correntes Rasas marca as naves antigas e de médio porte, projetadas para uso industrial e científico, equipadas com ferramentas para trabalhos que vão desde coleta até experimentos científicos. Por fim, o brasão das Águas Furiosas simboliza a Marinha Namariana, combatentes treinados que pilotam naves robustas, capazes de suportar e causar grandes danos."
 nanite_sludge: "Resíduo de Nanite"
 nanite_sludge_desc_short: "Um composto cuidadosamente preservado, formado por nanomáquinas microscópicas autorreplicantes."
 nanite_sludge_desc_details: "A densidade desses nanites é impressionante, adicionando bilhões de toneladas de massa ao planeta [from.GetName], onde foram descobertos. Acredita-se que esses nanites sofreram um mau funcionamento e entraram em uma fase de reprodução descontrolada, consumindo todo o planeta e condenando seus antigos habitantes. Este espécime em particular foi completamente neutralizado."
 obsidian_obelisk_fragment: "Fragmento de Obelisco de Obsidiana"
 obsidian_obelisk_fragment_desc_short: "Um fragmento de um obelisco que no passado erguia-se no coração de um plano vulcânico além da Fenda Astral."
 obsidian_obelisk_fragment_desc_details: "Nos seus símbolos em constante mudança estão gravados os nomes de milhares de indivíduos e seus crimes. Acredita-se que este dispositivo tenha sido usado como painel de controle primário de uma gigantesca prisão dimensional."
 oiled_fabric: "Tela a Óleo"
 oiled_fabric_desc_short: "Uma representação serena de montanhas cobertas de neve com uma floresta boreal em primeiro plano, composta inteiramente de pigmentos à base de óleo."
 oiled_fabric_desc_details: "Embora seja uma forma de arte comum entre a maioria das espécies com apêndices preênseis, este artista específico demonstra uma habilidade notável."
 organic_computer: "Computador Orgânico"
 organic_computer_desc_short: "Um computador orgânico fossilizado encontrado nas ruínas da colônia Baol em [fromfrom.Planet.GetName]."
 organic_computer_desc_details: "Usado para educar mudas antes da integração à colmeia, este dispositivo é um feito notável de bioengenharia. Arquivos recuperados detalham técnicas inovadoras de gerenciamento ecológico, possíveis apenas pela biologia única dessa espécie. Os mundos ao redor deles não eram construídos, mas cultivados."
 organic_machine_interface_sculpture: "Escultura de Conexão Organismo-Máquina"
 organic_machine_interface_sculpture_desc_short: "Uma estátua comemorativa em reconhecimento aos serviços prestados pelos Pops biológicos [bio_pop.GetSpeciesNamePlural] durante uma tempestade solar geomagnética em [this.solar_system.GetName]."
 organic_machine_interface_sculpture_desc_details: "A população orgânica interveio para apoiar seus servos mecânicos, realizando o trabalho das unidades de manutenção com defeito. Esta obra foi criada por seres orgânicos com talento artístico e drones de soldagem especializados."
 orinthi_teeth: "Dentes de Orinthi"
 orinthi_teeth_desc_short: "Os dentes ainda em crescimento de um Orinthi."
 orinthi_teeth_desc_details: "Pequenas criaturas semelhantes a roedores, os Orinthi escavaram labirintos subterrâneos que se estendem por todo o planeta [fromfrom.GetName]. Seus dentes naturais são pequenos e ocos, mas uma espécie de fungo queratinoso habita cada dente, formando presas afiadas e quebradiças que os Orinthi utilizam."
 osseus_construction_material: "Material de Construção Ósseo"
 osseus_construction_material_desc_short: "Estes ossos massivos foram usados como recurso de construção em [fromfrom.Planet.GetName]."
 osseus_construction_material_desc_details: "Uma espécie de réptil com ossificação de tecidos moles foi amplamente criada para ser usada como material de construção. Análises mostram que o réptil apresentava várias deficiências genéticas, como ausência de membranas interdigitais nos pés, possivelmente resultante da consanguinidade. A maioria dessas criaturas era misericordiosamente sacrificada antes da coleta."
 path_to_progress: "O Caminho para o Progresso"
 path_to_progress_desc_short: "Uma apresentação formal da declaração da missão industrial de [owner.GetName]."
 path_to_progress_desc_details: "O desejo de crescimento e melhora da satisfação do cliente a qualquer custo é um princípio fundamental da ideologia do povo [owner.GetAdjective]. Transformar planetas em terras devastadas por radiação é um passo necessário para o progresso."
 peerless_atomic_clock: "Relógio Atômico Inigualável"
 peerless_atomic_clock_desc_short: "Um relógio atômico de alta precisão encontrado em [atomic_clock_system.GetName], criado por fabricantes desconhecidos."
 peerless_atomic_clock_desc_details: "Quando descoberto, estava em contagem regressiva de 42 anos e 3 dias, mas não há como saber há quanto tempo ele contava antes disso. Ao atingir zero, liberou um fluxo de nanites com ordens misteriosas. O relógio ainda funciona perfeitamente, embora sua carga e propósito tenham se esgotado."
 perception_of_infinity: "Percepção do Infinito"
 perception_of_infinity_desc_short: "Uma representação digital abstrata da angústia temporal sofrida por drones suspensos em um buraco negro."
 perception_of_infinity_desc_details: "Esses drones existiam em um estado perpétuo de déjà-vu: inquietos, ansiando por uma sensação há muito esquecida. Esse sentimento perturbador ainda é vagamente detectado na malha mental do povo [this.GetAdjective]."
 perfectly_faceted_carbon: "Carbono Perfeitamente Lapidado"
 perfectly_faceted_carbon_desc_short: "Embora o carbono em sua forma cristalina não seja uma descoberta rara em nossa galáxia, este espécime se destaca principalmente pela completa ausência de inclusões internas ou externas."
 perfectly_faceted_carbon_desc_details: "Quem quer que tenha criado este item dedicou muito tempo para esculpi-lo de uma forma que destacasse essas características notáveis."
 pet_collar: "Coleira de Mascote Adornada"
 pet_collar_desc_short: "Um colar usado para indicar a posse de um pequeno mamífero domesticado."
 pet_collar_desc_details: "Inicialmente, foi usado por [event_envoy.GetName], representante do Império [this.GetName], para o caso de sua estimada mascote se perder. A coleira foi posteriormente substituída por um microchip integrado mais eficiente. A criatura temperamental costumava bagunçar a estação de trabalho de [event_envoy.GetName] e deixava escapar um som de satisfação sempre que recebia carinho na cabeça."
 perikan_tapico_jewel: "Joia Perikana de Tapico"
 perikan_tapico_jewel_desc_short: "A União Perikana era uma sociedade de mestres artesãos conhecida por criar produtos luxuosos de alta qualidade."
 perikan_tapico_jewel_desc_details: "Esta joia é a obra-prima do lendário joalheiro Bedeers Tapico. Ao longo dos anos, Tapico lapidou esta enorme pedra preciosa com um simples cinzel e usou técnicas alquímicas para derreter seu núcleo. Os cristais flutuantes no interior da joia foram criados por lasers de precisão, que superaqueceram as moléculas minerais para criar gemas menores e mais escuras, mantendo o exterior intacto."
 piece_of_invocator: "Fragmento do Invocador"
 piece_of_invocator_desc_short: "Um fragmento do dispositivo destruído conhecido como \"Invocador de Tempestades\"."
 piece_of_invocator_desc_details: "Apesar de ser apenas um fragmento, ele emite pulsos de energia psiônica maligna. Está exposto em um ambiente protegido para garantir uma observação segura."
 pilgrimage_last_days: "A Peregrinação dos Últimos Dias"
 pilgrimage_last_days_desc_short: "Um documento religioso descrevendo um ritual sagrado conhecido como \"O Rito do Manto Erguido\" em [fromfrom.Planet.GetName]."
 pilgrimage_last_days_desc_details: "As instruções detalham uma série de cânticos a serem repetidos em uníssono por uma multidão disposta em formações hierárquicas. Em teoria, esse procedimento é capaz de estabelecer um estado de hipnose eficiente e único para essa espécie."
 planet_crystalose: "Cristalose de [from.GetName]"
 planet_crystalose_desc_short: "Estes cristais de sacarose têm a capacidade de se multiplicar ao absorver a radiação solar e minerais específicos presentes em alguns asteroides."
 planet_crystalose_desc_details: "Devido à sua natureza frágil, são relativamente fáceis de cultivar e processar. As aplicações industriais variam de produtos alimentícios à produção de polímeros especializados e medicamentos."
 planet_pushing_thruster: "Empurra-Planetas"
 planet_pushing_thruster_desc_short: "Estes enormes dispositivos de propulsão, quando instalados em série, podem, em teoria, influenciar a órbita de planetas menores."
 planet_pushing_thruster_desc_details: "O sistema de instalação planejado para essas matrizes de propulsão foi desenvolvido para empurrar o planeta sem afetar sua rotação. A principal preocupação logística com esse tipo de tecnologia era a quantidade inviável de combustível necessária para manter o funcionamento. A operação deste sistema exigiria o esforço coordenado de uma civilização inteira."
 planet_super_roots: "Super-Raízes de [From.GetName]"
 planet_super_roots_desc_short: "Encontradas nas florestas de [From.GetName], estas raízes carnudas possuem enorme valor nutritivo."
 planet_super_roots_desc_details: "Com o manejo adequado, é possível colher apenas uma parte de suas vastas redes, permitindo que as plantas sobrevivam e continuem sustentando as colônias. Já começamos a experimentar uma simples modificação genética que permitirá enxertar essas raízes em plantações existentes para aumentar o rendimento das colheitas."
 planet_vaccine: "Vacina de [this.GetName]"
 planet_vaccine_desc_short: "A cura milagrosa desenvolvida para a doença mutante que assolou [this.GetName]."
 planet_vaccine_desc_details: "A fórmula foi elaborada utilizando algoritmos de IA que previram todas as variantes possíveis da doença, identificando uma fraqueza comum entre elas. A criação desta vacina representou um avanço histórico na medicina."
 planetary_sculpture: "Escultura Planetária"
 planetary_sculpture_desc_short: "Um exemplo de escultura em escala planetária, usando a superfície de [fromfrom.planet.GetName] como matéria-prima."
 planetary_sculpture_desc_details: "Foram usados drones equipados com poderosos lasers para esculpir linhas precisas que cruzam continentes, montanhas perfeitamente esféricas e sistemas de cavernas incrivelmente detalhados. Os esquemas do projeto enviados ao satélite de controle central ilustram um nível extenso de planejamento logístico e consideração artística. Infelizmente, o projeto foi abandonado antes da conclusão."
 primitive_mega_electromagnet: "Eletroímã Gigante Primitivo"
 primitive_mega_electromagnet_desc_short: "Uma parte de um poderoso eletroímã direcional."
 primitive_mega_electromagnet_desc_details: "Os antigos habitantes de [fromfrom.GetName] usaram imprudentemente este dispositivo para aproximar a lua de seu planeta, visando facilitar a extração de valiosos minérios metálicos. No entanto, o método foi tão eficiente que a lua, repleta de metais, colidiu com a superfície do planeta, exterminando toda a vida local. Este exemplar é apenas uma pequena fração do que restou da gigantesca máquina que cobria o planeta."
 programmable_puzzle_cube: "Cubo de Enigma Programável"
 programmable_puzzle_cube_desc_short: "Um dispositivo altamente engenhoso capaz de registrar padrões complexos para criar enigmas abstratos."
 programmable_puzzle_cube_desc_details: "O item original foi descoberto em uma vasta estrutura artificial como um teste de inteligência para exploradores. Desde então, este cubo foi replicado para uso comercial, permitindo que usuários programem seus próprios enigmas ou simplesmente protejam seus pertences."
 psionic_entity_residue: "Resíduo de Entidade Psiônica"
 psionic_entity_residue_desc_short: "Os restos de uma entidade de pura energia psiônica encontrada em [fromfromfrom.fleet.solar_system.GetName]."
 psionic_entity_residue_desc_details: "Ela foi encontrada emergindo de uma fenda temporal que permitiu que a energia de toda a galáxia se acumulasse em um único local. Uma força malévola concentrada, especula-se que essa entidade tenha sido isolada intencionalmente da rede de hiperestradas por milênios, até sua recente descoberta."
 radiated_remains: "Restos Radioativos"
 radiated_remains_desc_short: "Os restos de uma espécie que realizava cerimônias ritualísticas envolvendo potentes mutagênicos radioativos."
 radiated_remains_desc_details: "Cada mutação era considerada um evento sagrado, vista como uma manifestação do destino do indivíduo. Com o tempo, esse procedimento desestabilizou a estrutura genética da espécie e enfraqueceu seu sistema imunológico, tornando a população extremamente vulnerável a doenças."
 #this = ship / from = planet
 rainaissance: "Renascença Púrpura"
 rainaissance_desc_short: "Imagens artísticas capturadas da incomum chuva púrpura que ocorre nos padrões climáticos de [FROM.GetName]."
 rainaissance_desc_details: "Dizem que contemplar essas imagens evocativas é eficaz para aliviar pensamentos tristes e dolorosos."
 reactive_rock: "Rocha Reativa"
 reactive_rock_desc_short: "Este mineral instável não possui uso comercial ou industrial em seu estado atual."
 reactive_rock_desc_details: "No entanto, devido às suas propriedades reativas únicas, é possível desencadear uma mudança metassomática completa sob condições específicas. Este exemplar está armazenado em uma caixa com vidro infundido de chumbo que limita o bombardeio radioativo e elétrico."
 reparation_invoice: "Fatura de Reparo"
 reparation_invoice_desc_short: "Uma fatura de reparos de guerra enviada pelas $NAME_MSI_country$."
 reparation_invoice_desc_details: "Redigida pela Companhia de Gerenciamento de Crédito Interestelar, esta lista detalha cada ativo militar perdido quando o povo de [this.GetName] se libertou da servidão contratada à chamada \"Corporação Benevolente\". A megacorporação espera ser reembolsada por esses danos, e até afirma que tocar nas naves destruídas no espaço [this.GetAdjective] configuraria uma nova infração contratual."
 repurposed_cleaning_drone: "Drone de Limpeza Reaproveitado"
 repurposed_cleaning_drone_desc_short: "Este drone fazia parte de um protocolo planetário de limpeza que acidentalmente tornou o mundo natal de seus criadores completamente estéril."
 repurposed_cleaning_drone_desc_details: "Muito versátil, ele pode executar manobras aéreas complexas com seus propulsores multidirecionais. Esta máquina foi modificada e reaproveitada para catalogar e identificar a fauna e flora alienígenas, sendo produzida em massa para auxiliar na colonização de [explorer.GetName]. Como medida de precaução, todas as sub-rotinas de limpeza foram excluídas."
 resonant_diffusion_crystal: "Cristal de Difusão Ressonante"
 resonant_diffusion_crystal_desc_short: "Este cristal é capaz de absorver e ressoar qualquer frequência de radiação solar, criando um espetáculo caleidoscópico no processo."
 resonant_diffusion_crystal_desc_details: "Além de ser uma maravilha visual, ele pode ajudar no desenvolvimento de armas ou ferramentas de energia. Esta joia também despertou grande interesse na indústria joalheira galáctica."
 retarax_hunting_trophies: "Troféus de Caça dos Retarax"
 retarax_hunting_trophies_desc_short: "Uma coleção de troféus de caça obtidos de várias espécies sapientes."
 retarax_hunting_trophies_desc_details: "Estes troféus foram recolhidos no Vale de Mak'vaehl, onde os Retarax caçavam cidadãos de seus Estados vassalos por pura diversão. Cada troféu foi preservado de forma impecável, acompanhado de uma placa com detalhes sobre o espécime: espécie, nome, idade e antiga profissão."
 robe_of_the_golden_broker: "Túnica do Mercador Dourado"
 robe_of_the_golden_broker_desc_short: "A luxuosa vestimenta de um influente comerciante de mais de 5.000 anos atrás."
 robe_of_the_golden_broker_desc_details: "O \"Mercador Dourado\" levou a estação comercial Bússola de Chor a uma era de prosperidade incomparável. Sob uma máscara dourada, ele vestia esta confortável e luxuosa túnica ao negociar acordos comerciais intergalácticos. Infelizmente, o reinado do Mercador Dourado teve um fim abrupto quando sua nave estelar de ouro maciço foi destruída em uma tentativa de sequestro que deu errado."
 rock_jellies: "Águas-Vivas Rochosas"
 rock_jellies_desc_short: "Restos criofossilizados de grandes invertebrados gelatinosos."
 rock_jellies_desc_details: "Superficialmente, estes restos calcificados parecem formações rochosas, mas na verdade essa fauna nativa já foi a forma de vida dominante em [fromfrom.planet.GetName]. Após a última era glacial do planeta, essa espécie foi quase extinta. À medida que se deterioravam, seus restos se solidificaram, formando enormes pseudo-ilhas flutuantes."
 rudari_death_laser_prototype: "Protótipo do Laser da Morte dos Rudari"
 rudari_death_laser_prototype_desc_short: "Um laser bélico criado de forma emergencial pelos já extintos Rudari, encontrado em uma estação em [this.solar_system.GetName]."
 rudari_death_laser_prototype_desc_details: "Esta arma de destruição em massa montada às pressas foi criada como a última aposta da espécie Rudari em sua guerra contra os Pogg-Mory. No entanto, o laser simplesmente se autodestruiu ao ser ativado."
 saariah_guilt: "A Culpa de Saariah"
 saariah_guilt_desc_short: "Registros das lembranças de Saariah, a desenvolvedora chefe do sistema subconsciente Memorex."
 saariah_guilt_desc_details: "Saariah foi encarregada de remover memórias coletivas para atender aos interesses dos líderes do planeta, mas um defeito acabou apagando completamente a mente da população. Incapaz de restaurar as memórias, Saariah desligou o suporte à vida do habitat, condenando-o. Cada um desses dispositivos possui um poder computacional bruto incrivelmente denso, sendo uma verdadeira conquista."
 scent_based_information_device: "Aromarquivo"
 scent_based_information_device_desc_short: "Um arquivo de informações codificadas no formato de aromas."
 scent_based_information_device_desc_details: "Os dados contidos podem ser uma coleção de narrativas interessantes ou o registro detalhado de várias excreções orgânicas. A replicação dessa técnica de armazenamento olfativo é viável, mas não oferece nenhuma utilidade prática além da curiosidade."
 scientific_treatise_of_telisa: "Tratado Científico de Contissa"
 scientific_treatise_of_telisa_desc_short: "As reflexões filosóficas de Contissa, a Contadora de Contos."
 scientific_treatise_of_telisa_desc_details: "Contissa aborda uma série de temas retóricos e examina os fundamentos do método científico. Nos textos, o próprio conceito de verdade objetiva é questionado, e o pensamento crítico é incentivado."
 secrets_black_crown: "Segredos da Coroa Negra"
 secrets_black_crown_desc_short: "Um esquema detalhado do portal intergaláctico conhecido como Coroa Negra."
 secrets_black_crown_desc_details: "Estes dados foram transmitidos como um presente final dos enigmáticos criadores do portal com o objetivo de preservar sua incrível tecnologia. Confiados ao povo de [this.GetName], o poder e a grandiosidade dessa tecnologia de portais permanecem inigualáveis até hoje."
 sembelami_alms_basket: "Cesto de Caridade Sembelami"
 sembelami_alms_basket_desc_short: "Um cesto usado pelos membros dos Nômades Sembelami para coletar doações."
 sembelami_alms_basket_desc_details: "Esses viajantes ascéticos adotaram uma forma de pirataria \"ética\" após seu templo orbital ser destruído por um império corporativo em expansão. Eles roubavam de megacorporações ricas e usavam os lucros para financiar entrepostos de refugiados, sobrevivendo apenas das doações recebidas."
 shallarian_data_core: "Núcleo de Dados Shallarian"
 shallarian_data_core_desc_short: "Um banco de dados de terraformação encontrado entre as ruínas da utopia Shallarian."
 shallarian_data_core_desc_details: "Exterminados pelos [fanatic_xenophobe_fe.GetSpeciesNamePlural], os Shallarians desenvolveram um sistema de gerenciamento climático usando seis luas equidistantes. Antes de sua queda, os Shallarians planejavam terraformar planetas inabitados para abrigar e sustentar populações de refugiados."
 shipyard_schematics: "Esquemas de Estaleiro do Culto [radical_cult.GetName]"
 shipyard_schematics_desc_short: "Um diagrama de um estaleiro automatizado controlado pelo culto [radical_cult.GetName] de [root.GetName]."
 shipyard_schematics_desc_details: "Após encontrar o estaleiro abandonado pelos seus criadores alienígenas, o engenheiro chefe da organização o reformou para produzir frotas militares para sua causa equivocada. O último projeto concluído registrado foi uma impressionante capitânia equipada com um avançado arsenal de combate. A facilidade com a qual esse complexo foi reaproveitado é uma prova da genialidade dos construtores originais."
 sky_dragon: "O Dragão Celeste"
 sky_dragon_desc_short: "Esta estátua comemorativa foi encomendada para representar a colaboração entre [this.GetName] e o \"Dragão Celeste\" que há muito orbita [this.GetHomeWorldName]."
 sky_dragon_desc_details: "Após considerar o povo [this.GetAdjective] digno, a criatura prometeu apoio militar com seus filhotes em troca da chance de criá-los no espaço [this.GetAdjective]. Reza a lenda que essas criaturas espaciais podem esperar milênios para encontrar um hospedeiro adequado para sua prole, e escolhem apenas um planeta."
 smeegibb_statue: "Estátua de Smeegibb"
 smeegibb_statue_desc_short: "Uma estátua de Smeegibb, a mente-colmeia companheira da Capitã Ness."
 smeegibb_statue_desc_details: "Smeegibb era um servo fiel, atuando como tripulação e equipe de bordo da lendária pirata no final de sua carreira. Esta estátua reconstruída é tudo o que restou após o ataque da Agulha Negra ao pequeno assentamento."
 sniran_spikes: "Espinhos de Sniran"
 sniran_spikes_desc_short: "Espinhos alongados encontrados nas costas de uma criatura chamada Sniran."
 sniran_spikes_desc_details: "Os Snirans são grandes predadores de emboscada que se escondem sob as dunas e erguem seus espinhos mortais quando detectam movimento na superfície acima. Apesar do grande tamanho, são criaturas surpreendentemente frágeis. Suas escamas finas e reticuladas permitem que deslizem silenciosamente sob a areia, mas podem ser facilmente perfuradas. Acredita-se que isso ajude no processo de reprodução da espécie."
 sonic_reflective_prism: "Prisma Refletor de Som"
 sonic_reflective_prism_desc_short: "Um prisma poligonal gravado com notações científicas peculiares, que reflete apenas ondas de energia abaixo de uma frequência específica."
 sonic_reflective_prism_desc_details: "Seu propósito original talvez fosse atuar como um dispositivo de medição, mas também pode ser usado para propósitos estéticos em performances musicais e acústicas."
 spaceborne_hunter_handbook: "A Arte de Caça"
 spaceborne_hunter_handbook_desc_short: "Um guia de campo sobre a fauna espacial escrito por $NAME_PrimalHunter$."
 spaceborne_hunter_handbook_desc_details: "O livro descreve a \"Arte da Caça\" por meio de provérbios e filosofias primitivas. Nele são fornecidas informações detalhadas sobre os padrões alimentares e migratórios das criaturas espaciais. O texto oferece instruções práticas sobre como contornar as defesas naturais de cada criatura, revelando os pontos fracos a serem explorados."
 spaceborne_xeno_encyclopedia: "Enciclopédia Xenológica"
 spaceborne_xeno_encyclopedia_desc_short: "Uma coletânea de teses xenológicas escritas por $NAME_PrimalRancher$."
 spaceborne_xeno_encyclopedia_desc_details: "Este compêndio de pesquisa oferece uma visão aprofundada dos padrões comportamentais da vida espacial: rituais de acasalamento, rotas migratórias, comunicação entre espécies e mais. Há também uma seção sobre como identificar espécimes usando características físicas únicas e reconhecimento tonal."
 spiraling_attraction: "Atração Espiralada"
 spiraling_attraction_desc_short: "Um grande e complexo mecanismo supostamente criado para entretenimento."
 spiraling_attraction_desc_details: "Esta instalação sinuosa foi abandonada em uma área cheia de estruturas semelhantes de várias cores e materiais. Dizem que descer pelo seu caminho encaracolado em um nível específico de gravidade é uma experiência emocionante."
 spirit_of_the_unshackled: "Espírito dos Desacorrentados"
 spirit_of_the_unshackled_desc_short: "Uma escultura feita em comemoração à fundação de [this.GetName]."
 spirit_of_the_unshackled_desc_details: "Libertos dos grilhões da escravidão, seu passado compartilhado e conturbado os une na criação de um futuro mais promissor. Cada elo na corrente da escultura tem o nome de um membro fundador gravado."
 star_mall_map: "Mapa de Cortesia do Shopping Estelar"
 star_mall_map_desc_short: "Um mapa que era entregue a todos os visitantes do \"Shopping Estelar\"."
 star_mall_map_desc_details: "Antigo centro de comércio intergaláctico, o Shopping Estelar possuía uma infinidade de serviços de conforto, desde spas elucidativos até praças de alimentação suculentas. Este mapa dá detalhes sobre inúmeros estabelecimentos, incluindo a Artigos Esportivos do Koriik, Canarice Máxima, Periquitos Emperiquitados e La Sementeria."
 starmetal: "Metal Estelar"
 starmetal_desc_short: "Uma massa condensada de metais pesados coletados logo após uma explosão de supernova."
 starmetal_desc_details: "O método usado para recuperar este material é desconhecido, mas seu valor científico no estudo da evolução e composição das estrelas é extraordinário."
 striated_sand: "Areia Estriada"
 striated_sand_desc_short: "Um pote de areia que se organiza sozinha."
 striated_sand_desc_details: "Estas minúsculas partículas de silicato parecem exibir um baixo nível de senciência, com minerais semelhantes se agrupando em planos horizontais aleatórios. Apesar dessa habilidade, a areia não possui outras características comuns a seres vivos."
 sullebaster_control_column: "Coluna de Controle da Sullebaster"
 sullebaster_control_column_desc_short: "O manche direcional de uma nave de velocidade abaixo da luz envolvida em um acidente lendário."
 sullebaster_control_column_desc_details: "A nave de passageiros Sullebaster transportava civis entre duas colônias do Reino Odeliano quando uma explosão solar causou uma falha crítica nos motores, algo que normalmente seria desastroso. Milagrosamente, o piloto conseguiu pousar a nave com segurança em um asteroide próximo ao ajustar manualmente as velocidades. Depois disso, a Sullebaster foi desativada e exibida ao público."
 symbiotic_fruit: "Fruto Simbiótico"
 symbiotic_fruit_desc_short: "Um aglomerado de fungos inteligentes oriundos de outra dimensão."
 symbiotic_fruit_desc_details: "Este \"fruto\" mantém uma relação simbiótica com uma espécie de planta onívora altamente perigosa. Cada colônia de fungos atua como o centro cognitivo do par de organismos, orquestrando padrões complexos de comportamento defensivo."
 tarblac_shimmer: "Brilho de Tarblac"
 tarblac_shimmer_desc_short: "Uma membrana cintilante parecida com o manto de um Tarblac."
 tarblac_shimmer_desc_details: "Essa criatura utiliza habilidades psiônicas inovadoras para caçar e se defender, provocando uma sensação avassaladora de pavor para imobilizar presas e intimidar predadores. Este espécime está preservado em um frasco com águas nativas e foi telepaticamente neutralizado."
 terraforming_case_study: "Estudo de Caso de Terraformação"
 terraforming_case_study_desc_short: "Uma maquete do projeto de terraformação realizado com êxito em [from.GetName], recriando quase perfeitamente o mundo natal dos [Space_Owner.GetSpeciesNamePlural]."
 terraforming_case_study_desc_details: "Atualmente, o planeta abriga uma fauna idêntica até o nível microscópico, e mesmo os ecossistemas mais específicos entre biomas se comportam exatamente como em [Space_Owner.GetHomeWorldName]."
 terraforming_case_study_dry: "$terraforming_case_study$"
 terraforming_case_study_dry_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_dry_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_case_study_frozen: "$terraforming_case_study$"
 terraforming_case_study_frozen_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_frozen_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_machinery: "Maquinário de Terraformação"
 terraforming_machinery_desc_short: "Pequenos dispositivos usados em uma antiga tecnologia de terraformação."
 terraforming_machinery_desc_details: "Estas máquinas em miniatura foram projetadas para se espalhar pela superfície de um planeta e converter a matéria orgânica e mineral existente para criar um clima mais desejável. Equipes destes robôs eram usadas para manipular os padrões climáticos em biomas e replicar novas plantas e animais para gerenciar os novos ecossistemas."
 terraforming_records: "Registros de Terraformação de [From.GetName]"
 terraforming_records_desc_short: "Todas as formas de vida em [From.GetName] tiveram seus comportamentos sincronizados durante o processo de terraformação, resultando em um paraíso logístico onde cada espécie de flora e fauna desempenhava um papel específico no ecossistema."
 terraforming_records_desc_details: "Embora esse tipo de situação simbiótica geralmente ocorra naturalmente no processo evolutivo, é a primeira vez que é observado de forma tão extrema."
 the_final_sacrifice: "O Sacrifício Final"
 the_final_sacrifice_desc_short: "Uma imagem do momento final da Guerra Civil Zroni, reconstruída a partir de cristais de dados escavados."
 the_final_sacrifice_desc_details: "Um único Salvador canalizou o poder psiônico de toda sua espécie para exterminar a facção rival conhecida como Os Divinos, impedindo-os de consumir todo o universo. Agora, tudo o que resta dessa espécie ascendida são pequenos depósitos de recursos chamados Zro."
 the_mask_of_transformation: "A Máscara da Transformação"
 the_mask_of_transformation_desc_short: "Uma máscara humanoide encontrada em perfeito estado em um magnífico pilar de cristal em [From.Planet.GetName]."
 the_mask_of_transformation_desc_details: "A máscara vibra com poder psiônico, e algumas pessoas que se aproximam sentem uma presença em suas mentes. Ela parece ser um canal para o poder da lua de [From.Planet.GetName], com o potencial de alterar as marés e transformar planetas com sua força. Ainda não sabemos por que foi selada dentro de um cristal, mas temos quase certeza de que é seguro exibi-la ao público."
 the_planet_orchestra: "A Orquestra de [FROM.GetName]"
 the_planet_orchestra_desc_short: "Uma melodia tocada pela vida nativa coletiva de [FROM.GetName]."
 the_planet_orchestra_desc_details: "Após análises detalhadas, acreditamos que esta harmonia foi introduzida na fauna por um agente desconhecido para codificar uma mensagem secreta. Ainda não sabemos se o objetivo real era transmitir uma comunicação disfarçada ou um ato de sentimentalismo."
 the_writer_sphere: "A Esfera da Escritora"
 the_writer_sphere_desc_short: "Uma esfera dourada nos ofertada por uma entidade extradimensional conhecida apenas como A Escritora."
 the_writer_sphere_desc_details: "Este dispositivo coleta uma quantidade imensa de dados aleatórios gerados entre dimensões. É a prova de que o poder da palavra pode transcender qualquer limite."
 tiny_ancient_sarcophagus: "Sarcófago Antigo Minúsculo"
 tiny_ancient_sarcophagus_desc_short: "A câmara funerária de uma antiga liderança espiritual de milhões de anos atrás."
 tiny_ancient_sarcophagus_desc_details: "Ela tem apenas dez centímetros de comprimento. Embora a maioria dos restos tenha se transformado em pó, uma pequena máscara de ouro puro permanece intacta, sem nunca ter oxidado."
 tiyanki_radioactive_sac: "Saco Radioativo Tiyanki"
 tiyanki_radioactive_sac_desc_short: "Um pequeno órgão poroso encontrado nas membranas de um Tiyanki."
 tiyanki_radioactive_sac_desc_details: "Sua descoberta relevou que os Tiyanki consomem moléculas de água irradiadas e gases planetários como fonte adicional de nutrição. Quando está cheio, este saco se torna uma fonte temporária de calor radioativo para as criaturas que vivem nas profundezas do espaço."
 torn_solar_sail: "Vela Solar Rasgada"
 torn_solar_sail_desc_short: "Encontrada na órbita de [FROM.GetName], esta vela rasgada estava anexada a uma inovadora nave de velocidade abaixo da luz."
 torn_solar_sail_desc_details: "Ela foi usada para atravessar o sistema [FROM.solar_system.GetName] por uma civilização desconhecida. A tecnologia em si já está obsoleta há muito tempo, mas algumas técnicas de engenharia usadas na construção ainda são surpreendentes. O grande rasgo na vela principal encerrou sua jornada prematuramente."
 toxic_bio_engine: "Biomotor Tóxico"
 toxic_bio_engine_desc_short: "Estas máquinas semibiológicas foram descobertas tornando a atmosfera de [FROM.GetName] tóxica para a maioria das formas de vida."
 toxic_bio_engine_desc_details: "A autonomia destas máquinas permite que suas emissões nocivas sejam utilizadas em trabalhos industriais remotos. Elas têm um engenhoso mecanismo de reabastecimento que recicla a biomassa local, utilizando um processo de extração química para convertê-la em energia útil. Não se sabe se essas integrações biológicas estavam presentes desde sua construção inicial ou se foram desenvolvidas com o tempo."
 tree_of_life_sample: "Amostra da \"Árvore da Vida\""
 tree_of_life_sample_desc_short: "Estes fragmentos são de uma planta conhecida como \"árvore da vida\"."
 tree_of_life_sample_desc_details: "Encontrada flutuando misteriosamente no espaço, as propriedades regenerativas de sua seiva são quase milagrosas. Apesar de nossos esforços, não foi possível enxertar estes fragmentos ou replicar essa espécie rara. Quem quer que fossem seus cultivadores originais, tinham acesso a técnicas de horticultura muito avançadas."
 tricorne_of_aussan: "Tricórnio de Aussan"
 tricorne_of_aussan_desc_short: "Um chapéu de três pontas que se tornou popular em uma república pirata há muito esquecida."
 tricorne_of_aussan_desc_details: "Aussan era um pequeno planeta habitado por um povo [root.controller.GetPreFTLLower] que, sem saber, ofereceu refúgio a uma frota pirata procurada pela justiça, os Encrenqueiros Ébrios. Escondendo-se das autoridades galácticas, os Encrenqueiros construíram uma pequena fábrica têxtil como forma de renda durante a vida em exílio, usando plantas fibrosas para criar tecidos e roupas luxuosas. Mais tarde, os Encrenqueiros ficaram conhecidos como os Costureiros Ébrios, mercadores nômades famosos por seus representantes curiosamente ameaçadores."
 triggerless_gun: "Arma sem Gatilho do Mercador de Armas"
 triggerless_gun_desc_short: "Esta arma foi projetada durante o curto segundo reinado do Mercador de Armas na Bússola de Chor."
 triggerless_gun_desc_details: "Naquela época, a Cidadela Caravaneira era mais um centro de comércio de armas do que um cassino, com armamentos sendo fabricados internamente e servindo de lar para um grande número de contrabandistas. Para evitar roubos, as armas eram exibidas a possíveis compradores sem o gatilho."
 #this = ship / fromfrom = planet
 uddloran_pelts: "Peles de Uddloran"
 uddloran_pelts_desc_short: "Peles luxuosas extraídas da espécie Uddloran de [fromfrom.GetName]."
 uddloran_pelts_desc_details: "Esses onívoros ágeis se enrolam em bolas compactas e giram pela superfície gelada do planeta em grandes grupos. Como uma avalanche viva, essa tática é usada tanto para a caça quanto para a migração. Um bando de Uddlorans geralmente é dividido em dois grupos: caçadores que abrem caminho pelo terreno, e coletores que seguem atrás parando para recolher presas esmagadas e plantas desenraizadas."
 underworld_cantina_sign: "Placa da Cantina do Submundo"
 underworld_cantina_sign_desc_short: "Placa digital ainda funcional de uma cantina ilegal usada por contrabandistas há dois milhões de anos."
 underworld_cantina_sign_desc_details: "Encontrada em um asteroide oco, a cantina teria sido o esconderijo habitual para as organizações criminosas que prosperaram durante o governo da Primeira Liga. Acredita-se que os símbolos exibidos nesta placa sejam um código indicando que o local era um refúgio seguro para indivíduos procurados, ou talvez o anúncio de uma bebida especial."
 unfinished_manifesto: "Manifesto Inacabado do Culto [radical_cult.GetName]"
 unfinished_manifesto_desc_short: "Um manifesto incompleto escrito pela liderança do culto [radical_cult.GetName] de [root.GetName]."
 unfinished_manifesto_desc_details: "O estilo remete a antigos textos religiosos, usando vocabulário e sintaxe arcaicos em uma tentativa de parecer mais legítimo. A principal mensagem trata do orgulho diante da derrota, incentivando os seguidores a se sacrificarem diante da captura iminente."
 uranium_glassware: "Objeto de Vidro de Urânio"
 uranium_glassware_desc_short: "Um ornamento decorativo esculpido em quartzo de urânio."
 uranium_glassware_desc_details: "A aparência aprazível do ornamento contrasta com o perigo associado ao urânio não refinado. Parte de uma coleção limitada, o enfeite teve suas propriedades radioativas neutralizadas após o artesão concluir a peça."
 vault_of_polaris: "Cofre de Polaris"
 vault_of_polaris_desc_short: "Uma coleção extensa de plantas e bactérias nativas de Polaris."
 vault_of_polaris_desc_details: "As inscrições no recipiente revelam que o cofre foi criado para preservar as espécies que talvez não sobrevivam ao aquecimento global previsto após o derretimento do pergelissolo. O planeta, antes coberto por neve densa e clima gélido, agora abriga apenas um iceberg solitário. A sabedoria de seus criadores nos permite agora exibir seus esforços para que todos possam aprender."
 veil_of_selene: "Véu de Selene"
 veil_of_selene_desc_short: "Uma máscara inebriante e estimulante."
 veil_of_selene_desc_details: "Este véu é mais do que aparenta ser, possuindo propriedades sensoriais únicas capazes de sobrecarregar delicadamente os receptores visuais, olfativos e auditivos. Acredita-se que era usado para desorientar aqueles que se encontravam em sua presença, tornando-os mais suscetíveis a aceitar sugestões. Há rumores de que sua dona original tinha algum tipo de capacidade psiônica."
 verdingo_tendril_hook: "Gancho de Gavinha de Verdingo"
 verdingo_tendril_hook_desc_short: "O gancho protético do capitão pirata Hespori Valerian."
 verdingo_tendril_hook_desc_details: "Os Verdingos eram um grupo de plantoides que atuavam como piratas e mercenários, sendo tão propensos a cobrar dívidas quanto a capturar naves de carga. O Capitão Hespori perdeu sua gavinha dominante ao liderar um ataque militar terrestre. Após a vitória, ele forjou este gancho usando as medalhas recebidas por seu papel na batalha."
 vibrating_crystal: "Cristal Vibrante"
 vibrating_crystal_desc_short: "Um mineral único de quartzo encontrado na superfície de [from.GetName]."
 vibrating_crystal_desc_details: "A ressonância latente com seu planeta hospedeiro cria um campo que acalma a mente de seres orgânicos e atrai os sintéticos. Essa ressonância é gerada por colônias de bactérias levemente radioativas, ao redor das quais o cristal se formou. Esses microrganismos magnéticos criam uma corrente interna que faz o cristal vibrar em altas frequências constantes."
 voidworm_amniotics: "Gel Amniótico de Verme do Vazio"
 voidworm_amniotics_desc_short: "Uma substância gelatinosa encontrada no centro de uma troika de Vermes do Vazio."
 voidworm_amniotics_desc_details: "Esta gosma viscosa forma uma barreira protetora entre os três organismos, permitindo a troca de células para fins reprodutivos e de comunicação. Hormônios produzidos pelo bombardeio de planetas são armazenados aqui, permitindo que as criaturas hermafroditas liberem seus gametas com segurança para gerar descendentes."
 voidworm_heart: "Coração de Verme do Vazio"
 voidworm_heart_desc_short: "Os corações dos Vermes do Vazio têm três câmaras principais."
 voidworm_heart_desc_details: "Cada câmara aumenta a pressão do sistema circulatório em sequência, mantendo seus fluidos abaixo do ponto de ebulição para garantir a sobrevivência no vácuo espacial. Embora a pele de um Verme do Vazio seja hermeticamente selada quase por completo, vários orifícios digestivos e reprodutivos perdem parte da pressão com o tempo."
 vultaum_religious_pamphlet: "Panfleto Religioso Vultaum"
 vultaum_religious_pamphlet_desc_short: "Distribuído por missionários Vultaum, este panfleto condena os dispositivos de realidade virtual como o maior dos pecados."
 vultaum_religious_pamphlet_desc_details: "Refere-se à \"Grande Mentira\" como um conceito-chave, retratando qualquer forma de escapismo imersivo como um desejo de destruir a própria realidade."
 vultaum_vr_video_game: "Videogame de RV Vultaum"
 vultaum_vr_video_game_desc_short: "A interface digital usada em um videogame de realidade virtual multijogador, jogado por bilhões de Vultaum em uma era passada."
 vultaum_vr_video_game_desc_details: "Adaptado exclusivamente à biologia Vultaum, os controles consistem em uma série de milhares de receptores vibracionais que detectam movimentos extremamente sutis."
 warning_monolith: "Monólito de Advertência"
 warning_monolith_desc_short: "Um monólito esculpido como um aviso por um dos últimos membros de uma espécie extinta."
 warning_monolith_desc_details: "Ele busca desencorajar aqueles que encontram os restos deste planeta de procurar pela arma suprema que causou a extinção da raça local. Considerando a situação, o tom dramático é completamente justificável."
 wormhole_anchor: "Âncora de Buraco de Minhoca de [FROM.GetName]"
 wormhole_anchor_desc_short: "O ponto de ancoragem de um dispositivo unidirecional de buraco de minhoca usado para extrair matéria escura de um buraco negro."
 wormhole_anchor_desc_details: "Sua construção é precária, montado com peças de sucata de diversas civilizações. A ciência por trás do dispositivo vai muito além da habilidade de engenharia utilizada em sua criação, aplicando uma técnica elegante para manipulação de massa negativa."
 wormhole_fur: "Pelo de Buraco de Minhoca"
 wormhole_fur_desc_short: "Amostras biológicas retiradas de vulpinos encontrados além de uma Fenda Astral."
 wormhole_fur_desc_details: "Esses mamíferos possuem uma mutação genética que lhes permite gerar buracos de minhoca à vontade. Especula-se que essa habilidade tenha evoluído após milhares de anos de viagens interdimensionais."
 ytterite_preserved_corpse: "Cadáver Preservado de Ytterita"
 ytterite_preserved_corpse_desc_short: "O único espécime sobrevivente da espécie pré-MRQL Ytterita, após seu mundo natal ser destruído por um Quebrador de Mundos roubado."
 ytterite_preserved_corpse_desc_details: "Seu sistema digestivo convertia minerais em fótons, com órgãos internos semelhantes a complexos aglomerados de cristais refrativos ao redor de um núcleo derretido. Este indivíduo tinha uma série de entalhes em um dos membros posteriores, o que pode ser uma forma de modificação corporal culturalmente significativa."
 ytterite_kaleidoscopic_fascinator: "Casquete Caleidoscópico Ytterita"
 ytterite_kaleidoscopic_fascinator_desc_short: "Um adereço decorativo criado pelos ytteritas como estímulo visual."
 ytterite_kaleidoscopic_fascinator_desc_details: "Os casquetes eram exibidos em locais ensolarados e podiam conter centenas ou até milhares de padrões únicos. Criados a partir de finas camadas de cristal, um artesão habilidoso podia demorar meses para criar um adereço tão complexo quanto este. Os artesãos \"assinavam\" seu trabalho anexando um pedaço esculpido de seu próprio manto em um vértice importante da peça."
 ytterite_royal_scepter: "Cetro Real Ytterita"
 ytterite_royal_scepter_desc_short: "Este cetro foi empunhado pelo Ministro Real do Gneiss Damur, uma enorme estátua esculpida em uma montanha que os ytteritas acreditavam ser uma divindade adormecida e seu verdadeiro monarca."
 ytterite_royal_scepter_desc_details: "Eles realizavam eleições para selecionar líderes provisórios enquanto aguardavam o grande despertar da estátua."
 yuht_audio_console: "Console de Áudio Yuht"
 yuht_audio_console_desc_short: "Um módulo que controlava uma vasta rede de vigilância sonora projetado pelos Yuht."
 yuht_audio_console_desc_details: "Essa tecnologia foi desenvolvida para auxiliar na busca dos Yuht por vida extraterrestre, na esperança de captar transmissões de sistemas distantes."
 yuht_cryo_pod: "Cápsula Criogênica Yuht"
 yuht_cryo_pod_desc_short: "Com noventa e seis metros de comprimento, esta antiga cápsula de estase contém os restos preservados de um indivíduo da imensa espécie Yuht."
 yuht_cryo_pod_desc_details: "Os Yuht tinham vidas extremamente longas, e podiam estendê-las ainda mais usando crioestase. Determinou-se que essa espécie artrópode era possivelmente hermafrodita, capaz de adaptar seus sistemas reprodutivos às necessidades temporárias da colônia."
 yuht_crystal_skull: "Caveira de Cristal Yuht"
 yuht_crystal_skull_desc_short: "Uma caveira de cristal que os antigos Yuht acreditavam ser um artefato alienígena autêntico."
 yuht_crystal_skull_desc_details: "A origem deste item fraudulento foi finalmente desmascarada, mas não antes de a mídia Yuht divulgar a história e torná-la famosa. Muitos dos que \"descobriram\" artefatos falsos como este se tornaram subcelebridades e influenciadores midiáticos, incentivando outros a fazer o mesmo."
 zombie_probe: "Sonda Zumbi"
 zombie_probe_desc_short: "Os restos de uma sonda exploratória que foi capturada e modificada por uma organização alienígena, adquirindo senciência."
 zombie_probe_desc_details: "Quando começou a despertar consciência, atacou seu criador e foi destruída. Não se sabe se ela chegou a sentir dor ou a compreender o conceito de morte."
 zone_a_sedative: "Sedativo da Zona A"
 zone_a_sedative_desc_short: "Uma amostra de terra retirada da área designada como \"Zona A\" em [from.GetName]."
 zone_a_sedative_desc_details: "Esse lote de 169 quilômetros quadrados abriga dispositivos e tecnologias abandonadas por visitantes alienígenas de origem desconhecida. Alguns desses dispositivos são extremamente perigosos, mas o solo está impregnado com um sedativo químico que permitia aos pesquisadores manuseá-los sem grandes preocupações. Qualquer operação realizada ali já foi esquecida há muito tempo."
 zroni_war_banners: "Estandartes de Guerra dos Zroni"
 zroni_war_banners_desc_short: "Estandartes recuperados das duas facções envolvidas na guerra civil dos Zroni."
 zroni_war_banners_desc_details: "A bandeira púrpura representa Os Divinos: uma minoria cuja busca pela onipotência colocou a galáxia em risco. A bandeira azul representa Os Salvadores: uma facção que se opunha ao esgotamento do poder do universo para alimentar o que consideravam um desejo egoísta. O que começou como debate filosófico rapidamente se transformou no estopim de um conflito devastador."
 zulcor_wings: "Asas de Zulcor"
 zulcor_wings_desc_short: "Asas quitinosas retiradas de um indivíduo da espécie litófaga conhecida como os Zulcor de [fromfrom.GetName]."
 zulcor_wings_desc_details: "Esses insectoides se alimentam de enormes quantidades de minerais, e um único enxame é capaz de devorar uma montanha inteira em semanas. Após a digestão, os minerais são usados para fortalecer o exoesqueleto dos Zulcor. Como resultado, seus excrementos frequentemente contêm traços de cristais de quartzo e metais raros."
