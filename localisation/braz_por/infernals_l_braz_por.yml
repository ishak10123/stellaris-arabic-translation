 volcanic_oasis: "Oásis Infernal"
 volcanic_oasis_desc: "Um continente pequeno e verdejante protegido por uma alta cadeia de montanhas contra o inferno que jaz além. A flora e a fauna únicas contrastam com a desolação que se estende logo após as montanhas."
 fractalized_entropy_category: "Entropia Fractal"
 fractalized_entropy_category_desc: "Sensores detectaram um estranho objeto à deriva no campo de asteroides. Sua origem é desconhecida, mas sua trajetória é estável, sugerindo que pode ser interceptado e examinado."
 infernals.3205.name: "Entropia Fractal"
 infernals.3205.desc: "[Leader.GetName] relatou a descoberta de um constructo rígido e angular suspenso em órbita estelar estável. Composto de um material desconhecido e marcado por planos facetados que lembram estruturas cristalinas, o objeto resistiu a todas as análises de composição. Ele permaneceu travado em uma orientação fixa, voltado perpetuamente para sua estrela de origem e inflexível diante de todas as tentativas de manipulação ou rotação.\n\nDurante um experimento controlado, a nave de exploração submeteu o objeto a um pulso concentrado de energia. A estrutura se fraturou perfeitamente, dividindo-se em duas metades simétricas, e cada uma delas se reconfigurou em uma réplica menor da original. Pulsos subsequentes produziram resultados idênticos: divisão, replicação e miniaturização consistente.\n\nEm certo momento, uma nuvem difusa de miniaturas se estabilizou em órbita. Cada fragmento manteve o alinhamento e a geometria precisos do progenitor, e o enxame todo espelhou a silhueta da estrutura original.\n\nO fenômeno permanece completamente sem precedentes ou explicação. Toda a telemetria coletada foi arquivada para análise futura."
 infernals.3205.a: "Preserve e monitore os fragmentos."
 # Archaeological Sites
 from_the_ashes_site: "Das Cinzas"
 from_the_ashes_site_desc: "A superfície de [Planet.GetName] é escaldante e hostil à vida biológica. Imagens de ruínas claramente artificiais chamaram, portanto, a atenção de [GetScientistPlural]. Uma investigação arqueológica pode revelar quem esteve aqui e o que aconteceu com eles."
 infernals.2700.name: "Império Esquecido"
 infernals.2700.desc: "Embora as ruínas em [From.Planet.GetName] inicialmente parecessem ser feitas de pedra, escavações e análises sugerem que muitas das estruturas desta cidade perdida são compostas de um material orgânico petrificado comparável à madeira. Atualmente, não existe nenhuma fonte desse tipo de material no planeta. Artefatos menores são feitos de metais brutos, vidro e outros orgânicos petrificados semelhantes, e [GetScientistPlural] também encontraram fósseis de criaturas nativas extintas.\n\nParece que a civilização em questão habitou o planeta em uma época em que seu clima era muito mais ameno. Será que eles desapareceram muito antes de o planeta assumir seu estado atual, ou testemunharam a transição violenta em seus anos finais?"
 infernals.2705.name: "Testemunhas do Fim"
 infernals.2705.desc: "A escavação da cidade em ruínas em [From.Planet.GetName] revelou locais de importância cultural, decorados com padrões complexos que podem representar uma linguagem escrita. O mais interessante é que as equipes de escavação encontraram uma câmara subterrânea repleta de estantes, e cada uma continha lâminas finas de bronze gravadas com uma escrita densamente compactada. Apesar da ineficiência do bronze como meio de armazenamento, isso parece ser um arquivo comunitário de textos.\n\nAs tentativas de tradução já começaram enquanto as equipes arqueológicas continuam a se espalhar pela cidade. A questão do destino desse povo permanece em aberto."
 infernals.2710.name: "Colapso Iminente"
 infernals.2710.desc: "A equipe em [From.Planet.GetName] encontrou uma catacumba solene. Ela é formada por uma rede de trincheiras escavadas com restos mumificados de alienígenas repousando em cavidades nas paredes, empilhados à altura de três ou quatro indivíduos. Os objetos funerários nos dão um vislumbre de seu desenvolvimento tecnológico, como armas de fogo primitivas, simples telescópios de vidro e bordados têxteis complexos.\n\nMuitas junções da catacumba são protegidas por estátuas de uma fauna local extinta. Essas criaturas tinham uma carapaça arredondada e em forma de cúpula, quatro patas curtas e uma pequena cabeça obtusa. Em espécimes mais bem preservados, são representadas agachadas, usando a carapaça para se proteger de entalhes em forma de chamas no material acima delas.\n\nO verdadeiro significado dessa arte pode ter se perdido com o tempo, mas pode representar a conscientização dessa sociedade sobre sua iminente perdição nas chamas. Escavações adicionais das ruínas podem esclarecer o que eles estavam vivenciando."
 infernals.2715.name: "Queda Flamejante"
 infernals.2715.desc: "A exploração da cidade em ruínas em [From.Planet.GetName] prova que essa civilização viveu o colapso de seu ecossistema e sabia que seus últimos dias ardentes se aproximavam. Registros em papel existiam antes de a queda de cinzas vulcânicas quentes obrigá-los a adotar tabuletas de bronze, e representações artísticas de animais se escondendo do fogo registram suas tentativas de lidar com o próprio fim.\n\nA escavação também revelou um espécime quase perfeito das estátuas guardiãs das catacumbas. As chamas esculpidas acima dela possuem um brilho interno, tornando-a uma peça impressionante e digna de preservação.\n\nTambém encontramos evidências de tentativas de deter o vulcanismo. Estradas e carroças quebradas demonstram que os habitantes transportavam entulho até a caldeira vulcânica mais próxima e o despejavam lá dentro como forma de tentar tapar o vulcão. Infelizmente não conseguiram fugir de seu destino. O planeta encontra-se hoje desprovido de vida pluricelular.\n\nEssa história nos remete à precariedade de qualquer civilização quando confrontada por um problema mais poderoso do que as ferramentas que tem à sua disposição."
 infernals.2715.a: "Um final trágico."
 infernals.2715.b: "Devemos aprender com os erros deles."
 inferno_temple_site: "Templo Infernal"
 inferno_temple_site_desc: "Longe dos centros populacionais de [Planet.GetName], em uma cordilheira vulcânica ativa, há um antigo templo em ruínas. Compreender sua história pode nos dar mais informações sobre a cultura local do planeta."
 infernals.2720.name: "Sinais Antigos"
 infernals.2720.desc: "O templo em si traz cicatrizes de batalhas, e há vestígios antigos da espécie senciente local no solo. Parece que o templo foi incendiado e abandonado. As equipes de segurança perceberam que os habitantes evitam essa área inteira por acreditarem que esteja amaldiçoada.\n\nAs paredes do templo do fogo protegeram sua área interna, que preserva muitos afrescos e entalhes complexos. Entre eles se repete uma imagem: um círculo de fogo retorcido com uma fenda escura atravessando-o. Em uma das representações, uma figura bípede com quatro olhos semelhantes à imagem anterior arranca um deles e o lança sobre o mundo, criando assim a simbologia central. Estamos chamando-o de Olho Infernal.\n\nNovas escavações revelarão quais crenças cercavam essa figura enigmática."
 infernals.2725.name: "Oferendas Oculares"
 infernals.2725.desc: "Escavações no templo do Olho Infernal revelam evidências de diversos sacrifícios. Grandes fossos redondos com plataformas ao centro, imitando o Olho Infernal e sua pupila, estão repletos de camadas de cinzas e carvão. A análise molecular revela que essas cinzas e carvão têm origem em tecido animal.\n\nNão é possível determinar se tais sacrifícios envolviam animais selvagens, domesticados ou até mesmo os próprios habitantes locais.\n\nForam enviados agentes aos atuais centros populacionais em busca de evidências correlatas, enquanto nossos escavadores seguem em busca de mais respostas."
 infernals.2725.a: "É um mistério pronto para ser desvendado!"
 infernals.2725.b: "Envie drones para desvendar esse mistério."
 infernals.2730.name: "Práticas Sombrias"
 infernals.2730.desc: "Uma pesada porta de pedra recém-descoberta bloqueava o acesso à parte mais profunda do templo. Depois de superar esse obstáculo, os escavadores descobriram uma câmara circular com um fosso central que se abria diretamente sobre um reservatório natural de magma subterrâneo. A luz alaranjada do magma banhava as paredes com um tênue brilho vermelho, iluminando inscrições que circundavam a estranha sala. O topo das paredes em volta era decorado com uma série de olhos flamejantes e brilhantes.\n\nNa borda desse fosso, havia restos ressecados de um dos habitantes locais, despedaçado sobre um altar moldado na forma do Olho Infernal. Tudo indica que eles sacrificavam membros da própria espécie numa tentativa de apaziguá-lo.\n\nO texto inscrito nessas paredes pode ser fundamental para compreender o papel cultural desse templo e deve ser traduzido imediatamente."
 infernals.2735.name: "Profecias Turbulentas"
 infernals.2735.desc: "O estudo final das escrituras na câmara mais interna do templo revelou um conjunto de profecias sobre o retorno do Olho Infernal. Elas descrevem o Olho Infernal se enfurecendo diante da desobediência de seus súditos. Em resposta, espera-se que o Olho escureça os céus, provoque a erupção de uma montanha sagrada específica, faça com que uma determinada safra apodreça ainda na vinha e muito mais. A profecia apresenta isso como o fim da civilização, afirmando que, após esses eventos, apenas aqueles que se submeterem ao Olho Infernal sobreviverão.\n\nNossos agentes buscaram conexões culturais junto à população local e descobriram que esse texto profético é a fonte de muitos aforismos e expressões nas culturas do planeta, além de servir como fonte para inúmeras histórias e mitos posteriores. Eles também acreditam que os mistérios praticados pelos templos modernos incluem variações dessa profecia antiga, bem como reações contra ela.\n\nTodos esses eventos profetizados poderiam ser reencenados com a nossa tecnologia ou falsificados com um grau de realismo que eles não conseguiriam detectar. Se nos apresentássemos como o Olho Infernal reencarnado, demonstrando que a profecia original estava certa o tempo todo, poderíamos obter concessões e juramentos de lealdade deles. Isso tornaria mais fácil absorvê-los a longo prazo."
 infernals.2735.a: "Reencene as profecias."
 infernals.2735.a.tt: "A sociedade primitiva de §Y[From.Planet.GetName]§! aprenderá a adotar a nossa ética."
