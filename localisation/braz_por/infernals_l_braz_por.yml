l_braz_por:
 INFERNALS_TITLE: "Infernals Species Pack" # Do not translate
 vo_infernal_voice: "Termófilo"
 # Traits
 trait_pc_volcanic_preference: "Preferência Vulcânica"
 trait_pc_volcanic_preference_short: "Vulcânico"
 trait_pc_volcanic_preference_desc: "$trait_pc_savannah_preference_desc$"
 trait_volcanic_planet_preference: "$trait_pc_volcanic_preference$" #robotic
 trait_volcanic_planet_preference_desc: "$trait_dry_planet_preference_desc$" #robotic
 trait_infernal: "Termófilo"
 trait_infernal_plural: "Termófilos"
 trait_infernal_desc: "Esta espécie desenvolveu tecidos feitos de ligas metálicas para crescer e prosperar em planetas quentes, nos quais seres orgânicos tradicionais cozinhariam vivos. Essas células metálicas se degradam mais lentamente e são substituídas com pouca frequência, retardando o surgimento de doenças relacionadas à idade. No entanto, elas também conduzem o frio, o que pode colocar sua saúde em risco em climas mais gelados."
 TRAIT_INFERNAL_EFFECT: "Manutenção de $r_alloys$ a cada $pop_group_unit$ £pop£ Pops: §R+$@living_standard_alloys_normal$§!$TABBED_NEW_LINE$- $HABITABILITY$ em $pc_volcanic$: §G+20%§! $TABBED_NEW_LINE$- $HABITABILITY$ Mínima (§H$pc_volcanic$§!): §Y+50%§! $TABBED_NEW_LINE$- $HABITABILITY$ em mundos §YFrios§!: §R-30%§!  $TABBED_NEW_LINE$- Expectativa de Vida do Líder: §G+10 Anos§!"
 trait_unbreakable_resolve: "Determinação Irredutível"
 trait_unbreakable_resolve_desc: "Mantidos por uma teia complexa de neurônios espelhados, estes indivíduos têm uma habilidade inata de sincronizar sua vontade. O dever não é um fardo, mas um propósito compartilhado, e as dificuldades são enfrentadas com unidade inabalável."
 trait_unbreakable_resolve_tooltip: "Cada $pop_group_unit$ £pop£ §HPops§! no planeta com esta característica adicionam §G+0.2§! de £stability£ $PLANET_STABILITY_TITLE$ (Máx: §G+15§!) \n- §RNão inclui escravos ou camadas mais baixas de pops.§!"
 trait_shell_slag: "Escória de Carapaça"
 trait_shell_slag_desc: "Uma simbiose complexa com $r_living_metal$ permite que esta espécie cresça não no sentido tradicional, mas por meio do acréscimo e da autoformação de estruturas bioferrosas."
 trait_shell_slag_tooltip: "Cada $pop_group_unit$ £pop£ §HPops§! com esta característica trabalhando como escravos ou melhor produzem §G$@shell_slag_trait_resource_production|3$§! de §Y$r_living_metal$§! por mês."
 trait_robot_assembly_slag: "Escória de Montagem"
 trait_robot_assembly_slag_desc: "Uma integração complexa com $r_living_metal$ permite que esta espécie maquinária se expanda não por meio da construção convencional, mas pelo acréscimo e autoformação de estruturas autoferrosas."
 trait_pyroclastic: "Canalização Piroclástica"
 trait_pyroclastic_desc: "Moldada pela fúria implacável de mundos vulcânicos, esta espécie não teme as forças piroclásticas. Eles as canalizam e manipulam, transformando a devastação em uma fonte vital de sustento e poder."
 trait_pyroclastic_tooltip: "$MOD_LOGISTIC_GROWTH_MULT$ em $pc_volcanic_plural$: §G+10%§!"
 trait_crucible_community: "Comunidade do Crisol"
 trait_crucible_community_desc: "Forjada pela adversidade e unida pela luta compartilhada, esta espécie se tornou um todo inabalável. Sua vontade coletiva impulsiona o governo, e cada membro é um elo vital na corrente da unidade."
 trait_crucible_community_tooltip: "Cada $pop_group_unit$ £pop£ §HPops§! com esta característica adicionam §G+0.25§! de §Y$MOD_COUNTRY_EDICT_FUND_ADD$§!"
 trait_ductile: "Maleável"
 trait_ductile_desc: "§LEsta espécie foi projetada para cultivar compostos de ligas reutilizáveis.§!\n"
 # Volcanic World
 pc_volcanic: "Mundo Vulcânico"
 pc_volcanic_plural: "Mundos Vulcânicos"
 pc_volcanic_desc: "Mundo rochoso com uma atmosfera rica em enxofre e uma litosfera parcialmente líquida. A superfície coberta de cinzas e basalto é intercalada por atividades vulcânicas recentes e lagos e rios de lava. Apenas formas de vida extremófilas podem ser encontradas aqui, se é que existem."
 mod_pc_volcanic_habitability: "Habitabilidade em Mundo Vulcânico"
 mod_pc_volcanic_max_districts_add: "Máx. de Distritos ($pc_volcanic$)"
 concept_pc_volcanic: "$pc_volcanic$"
 concept_pc_volcanic_desc: "- $mod_planet_jobs_alloys_produces_mult$: §G+5%§! \n\n§L$pc_volcanic_desc$§!"
 district_geothermal: "Usina Elétrica Geotérmica"
 district_geothermal_plural: "Usinas Elétricas Geotérmicas"
 district_geothermal_desc: "Explora o calor turbulento nas profundezas do planeta para fornecer energia à colônia."
 district_melting: "Canal de Magma"
 district_melting_plural: "Canais de Magma"
 district_melting_desc: "Uma série de crivos eletromagnéticos extrai minerais valiosos dos fluxos de magma do planeta."
 district_melting_uncapped: "$district_melting$"
 district_melting_uncapped_plural: "$district_melting_plural$"
 district_melting_uncapped_desc: "$district_melting_desc$"
 mod_district_melting_max: "Máx. de $district_melting_plural$"
 district_polytechnic: "Fórum Termotécnico"
 district_polytechnic_plural: "Fóruns Termotécnicos"
 district_polytechnic_desc: "Este centro de colaboração interdisciplinar e educação ajuda a colônia a gerenciar o dinamismo geológico do planeta."
 mod_district_polytechnic_max_add: "Máx. de $district_polytechnic_plural$"
 thermotechnic_default: "Centros Auxiliares"
 thermotechnic_hive: "Aglomerados Sinápticos"
 thermotechnic_machine: "Hubs Auxiliares"
 melt_extractor: "$job_melt_extractor$"
 job_melt_extractor: "Termoforjador"
 job_melt_extractor_plural: "Termoforjadores"
 job_melt_extractor_desc: "Habituado ao calor extremo, este trabalhador é habilidoso em combinar minerais para criar novas ligas metálicas úteis."
 mod_job_melt_extractor_add: "Empregos de $job_melt_extractor$"
 job_melt_extractor_effect: "£job_miner£ $job_melt_extractor_plural$ produzem £minerals£ §Y$minerals$§!"
 melt_extractor_drone: "$job_melt_extractor_drone$"
 job_melt_extractor_drone: "Drone Termoforjador"
 job_melt_extractor_drone_plural: "Drones Termoforjadores"
 job_melt_extractor_drone_desc: "Construído para resistir ao calor extremo, este drone foi projetado para combinar minerais e criar novas ligas metálicas úteis."
 mod_job_melt_extractor_drone_add: "Empregos de $job_melt_extractor_drone$"
 job_melt_extraction_drone_effect: "£job_mining_drone£ $job_melt_extractor_drone_plural$ produzem £minerals£ §Y$minerals$§!"
 job_polytechnic_mentor: "Mentor Termotécnico"
 job_polytechnic_mentor_plural: "Mentores Termotécnicos"
 job_polytechnic_mentor_desc: "Com uma formação diversificada de habilidades, este mentor ajuda a preencher lacunas disciplinares para aumentar a eficiência dos trabalhadores especializados."
 mod_job_polytechnic_mentor_add: "Empregos de $job_polytechnic_mentor$"
 job_polytechnic_mentor_effect: "£job_polytechnic_mentor£ $job_polytechnic_mentor_plural$ são impulsionados por outros empregos. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_mentor: "$job_polytechnic_mentor_plural$"
 concept_polytechnic_mentor_desc: "Recursos extras produzidos a cada $pop_group_unit$ £pop£ §HPops§!\n(Limite: §Y4.000§! £job£ Empregos por categoria):\n- £job_miner£ ['concept_planet_miners']: §G+$@polytechnic_output$§! de £unity£ $unity$\n- £job_technician£ ['concept_planet_technician']: §G+$@polytechnic_output$§! de £physics_research£ $physics_research$\n- £job_foundry£ ['concept_planet_metallurgists']: §G+$@polytechnic_output$§! de £engineering_research£ $engineering_research$\n- £job_artisan£ ['concept_planet_artisans']: §G+$@polytechnic_output$§! de £society_research£ $society_research$"
 job_polytechnic_job_tt: "$concept_polytechnic_mentor_desc$"
 job_polytechnic_drone: "Drone Piroclástico"
 job_polytechnic_drone_plural: "Drones Piroclásticos"
 job_polytechnic_drone_desc: "Com uma formação diversificada de habilidades, este drone ajuda a preencher lacunas disciplinares para aumentar a eficiência dos trabalhadores especializados."
 mod_job_polytechnic_drone_add: "Empregos de $job_polytechnic_drone$"
 job_polytechnic_drone_effect: "£job_polytechnic_drone£ $job_polytechnic_drone_plural$ são impulsionados por outros empregos. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_drone: "$job_polytechnic_drone_plural$"
 concept_polytechnic_drone_desc: "$concept_polytechnic_mentor_desc$"
 # Origin - Red Giant
 origin_red_giant: "Gigante Vermelha"
 origin_red_giant_desc: "Esta civilização está em uma encruzilhada: a gigante vermelha no coração de seu sistema está aquecendo o planeta, ameaçando cozinhá-los vivos.\n\nSerá que eles conseguirão se adaptar até que a causa seja descoberta e corrigida? Ou abraçarão o calor, aproveitando essas mudanças estranhas e talvez antinaturais?"
 origin_tooltip_red_giant_effects: "- $HOMEWORLD$ ['concept_pc_volcanic'] (Tamanho: £planetsize£ 20)"
 START_SCREEN_RED_GIANT: "A verdade surgiu lentamente, e, então, de uma vez só.\n\nA nossa estrela está entrando em uma fase de evolução rápida e anômala. Sua emissão de energia ultrapassou todos os parâmetros previstos. As mudanças espectrais indicam padrões de convecção irregulares, e sua taxa de fusão parece estar aumentando sem a perda de massa correspondente.\n\nAté agora, evoluímos em sintonia com esse aquecimento, mas a evolução biológica básica tem seus limites.\n\nSe as mudanças ocorrendo dentro de [capital_star.GetName] continuarem, o mundo que chamamos de lar arderá em chamas. Agora, parece apenas uma questão de tempo."
 red_giant_start_NAME: "Sistema da Gigante Vermelha"
 red_giant_start_DESC: "Este é o sistema inicial garantido para impérios que usam a origem §Y$origin_red_giant$§!."
 tech_starfire_cannon: "$starfire_cannon$"
 tech_starfire_cannon_desc: "Como qualquer risco potencial, a radiação perigosa decorrente da transformação de nossa estrela também pode ser aproveitada como uma ferramenta útil. Canalizá-la como uma arma de feixe nos permitiria superaquecer e incapacitar naves inimigas.\n\nLibera uma decisão planetária para construir um §Y$starfire_cannon$§! em órbita."
 SOLARFLARE_EMITTER: "Emissor de Explosão Solar"
 SOLARFLARE_EMITTER_DESC: "Um feixe de energia poderoso capaz de perfurar até as defesas mais resistentes e desativar sistemas de naves vulneráveis."
 starfire_cannon_cap: "$starfire_cannon$"
 starfire_cannon: "Canhão de Tempestade Estelar"
 starfire_cannon_plural: "Canhões de Tempestade Estelar"
 NAME_Starfire_Cannon: "$starfire_cannon$"
 starfire_cannon_key: "Núcleo do $starfire_cannon$"
 sfe_on_hit_stun_tt: "§YIncapacita§! o alvo por §G5§! dias, reduzindo sua velocidade, sua taxa de disparos e seus escudos.\n\n$ION_CANNON_FLEET_EFFECT$"
 sfe_weapon_stun_effect: "§RImpacto do $starfire_cannon$§!"
 sfe_weapon_stun_effect_desc: "   " # not visible
 decision_starfire_cannon: "Construir $starfire_cannon$"
 decision_starfire_cannon_desc: "Imitando a radiação intensa de uma gigante vermelha envelhecendo rapidamente, este canhão orbital projeta um feixe de ionização hipertérmica que não só causa dano aos alvos, como também frita componentes das naves, tornando-as inoperantes."
 decision_starfire_cannon_effects: "Constrói um §Y$starfire_cannon$§! na órbita do planeta, uma arma de longo alcance capaz de desativar os sistemas de diversas naves."
 decision_starfire_cannon_limit: "$TRIGGER_FAIL$Limite por sistema: §Y3§!"
 # Origin - Cosmic Dawn
 origin_cosmic_dawn: "Alvorada Cósmica"
 origin_cosmic_dawn_desc: "Esta civilização não surgiu – ela foi libertada. Quando as cápsulas de estase se abriram, eles despertaram para um mundo envelhecido e irreconhecível. Ainda assim, nem tudo está perdido. Espalhado sob a poeira e a ruína pela galáxia, seu passado perdura, aguardando para ser redescoberto."
 origin_tooltip_cosmic_dawn_effects: "- $HOMEWORLD$ $TABBED_NEW_LINE$- ['concept_pc_volcanic'] (Tamanho: £planetsize£ 14) $TABBED_NEW_LINE$- ['concept_inf_cd_deposit']: +5\n- Começa com a Situação: §HEscavação Profunda§!"
 origin_tooltip_cosmic_dawn_negatives: "- $INITIAL_POPS$ §R-600§!"
 START_SCREEN_COSMIC_DAWN: "Acordamos apenas com uma leve sensação de que algum dia havíamos adormecido. Mesmo agora, a evidência mais forte de um tempo anterior não vem de nossas próprias memórias, mas da tecnologia complexa que nos preservou em estase.\n\nMilhares e milhares de cápsulas, sistemas enormes de transferência de calor, caldeirões misturando rocha derretida. Além desses mecanismos, pistas sobre a nossa origem estavam inscritas nas paredes: frotas de naves, dispersando-se de mundos em resfriamento para buscar calor entre as estrelas. À procura de respostas, deixamos essa \"câmara de nascimento\" subterrânea. Pela superfície de §Y[owner.Capital.GetName]§!, descobrimos tecnologias e recursos úteis. Também encontramos indícios de outras instalações ocultas na crosta do planeta. Algumas abrigam seres adormecidos que talvez possamos receber como semelhantes.\n\nE em meio às estrelas? Será que há outros como nós ainda adormecidos? Se existirem, talvez possam nos ajudar a responder à pergunta mais urgente: quem somos nós?"
 cosmic_dawn_start_NAME: "Novo Lar"
 cosmic_dawn_start_DESC: "Este é o sistema inicial garantido ao usar a origem $origin_cosmic_dawn$."
 concept_inf_cd_deposit: "$d_stasis_pods$"
 concept_inf_cd_deposit_desc: "Produz: 3 £society_research£\nApós liberado: \n$d_stasis_pods_tt$ \n\n§L$d_stasis_pods_desc$§!"
 cosmic_dawn_districtsize: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 cosmic_dawn_districtsize2: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+2§!\n   $d_cd_ancient_tunnels$ §G+2§!"
 cosmic_dawn_tunnel_foundry: "$foundry_jobs_bonus_workforce_mult$ por $d_cd_ancient_tunnels$: §G+1%§!"
 cosmic_dawn_tunnel_bureaucrat: "$bureaucrat_jobs_bonus_workforce_mult$ por $d_cd_ancient_tunnels$: §G+1%§!"
 cosmic_dawn_tunnel_researcher: "$researcher_jobs_bonus_workforce_mult$ por $d_cd_ancient_tunnels$: §G+1%§!"
 cosmic_dawn_tunnel_worker: "$mod_pop_cat_worker_bonus_workforce_mult$ por $d_cd_ancient_tunnels$: §G+1%§!"
 d_stasis_pods: "£blocker£ Cápsulas de Estase Antigas"
 d_stasis_pods_desc: "Estas cápsulas de estase são dispositivos ancestrais de nosso povo perdido, usando tecnologia criogênica avançada para manter indivíduos em animação suspensa. Com a tecnologia adequada, talvez possamos acordá-los."
 d_stasis_pods_tt: "[GetStasisPodOwner]"
 d_stasis_pods_tt_inf: "§G100§! £pop£ $POPS$ são criados\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_stasis_pods_tt_other: "- £society_research£ §Y$society_research$§! obtida: §G+350§!\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_cd_ancient_tunnels: "Túneis Antigos"
 d_cd_ancient_tunnels_desc: "Antes usadas para guardar câmaras de estase, estas galerias agora vazias e vastas oferecem um novo espaço habitável."
 d_galvanic_living_metal: "Sedimento de $sr_living_metal$"
 d_galvanic_living_metal_desc: "Este planeta tem depósitos naturais de $r_living_metal$. Sua espécie evoluiu em contato constante com esse recurso fascinante, o que os colocou em trajetórias biológicas e científicas únicas."
 # Civic - Scorched World Heralds
 civic_scorched_earth: "Arautos do Mundo Chamuscado"
 civic_scorched_earth_desc: "O calor permeia todos os aspectos da cultura desta sociedade, desde tradições e rituais até a própria tecnologia. Eles se veem como os legítimos supremacistas ardentes da galáxia, considerando espécies mais fracas apenas como obstáculos no caminho para um universo ideal, adequado apenas aos termófilos."
 civic_scorched_earth_effects: "Não é possível se engajar em §YDiplomacia§!, exceto com §Y$trait_infernal_plural$§!.\nNão pode acessar o §YMercado Galáctico§!.\nConcede o Casus Belli §Y\"$casus_belli_cb_blaze$\"§! contra outras espécies.\nGanha £unity£ §Y$unity$§! ao bombardear com a postura de bombardeio §Y$bombardment_firestorm$§!.\nCria bloqueadores especiais com a postura de bombardeio §Y$bombardment_seismic_bombing$§! no planeta abaixo. \n- Espécies sem a característica ['trait:trait_infernal'] são restritas à §YEscravidão§! ou pior."
 SCORCHED_HERALDS_ONLY_INF: "$TRIGGER_FAIL$§Y$civic_scorched_earth$§! toleram apenas £pop£ $POPS$ com a característica ['trait:trait_infernal'] em sua sociedade."
 civic_hive_scorched_earth: "Instinto Piromaníaco"
 civic_hive_scorched_earth_desc: "Nossos Mundos Chamuscados são o ápice da evolução planetária. Vamos incendiar a galáxia e prosperar nas chamas!"
 # Civic - World Forgers
 civic_world_forgers: "Forjadores de Planetas"
 civic_world_forgers_desc: "Esta sociedade prospera em ambientes vulcânicos, chegando até mesmo a criá-los artificialmente quando a natureza se mostra inadequada."
 civic_world_forgers_effects: "- Libera o planeta inicial: ['concept_pc_volcanic']. \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge']. \n- Pode fazer a construção £building£ §Y$building_volcanic_forge_1$§!, que adiciona £job_polytechnic_mentor£ ['concept_polytechnic_mentor']. \n- Planetas com uma £building£ §Y$building_volcanic_forge_1$§! aos poucos se tornam um §Y$pc_volcanic$§!. \n- ['concept_guaranteed_colonies'] serão mundos de clima §Y$climate_dry$§!."
 civic_corporate_world_forgers: "Arquitetos Planetários"
 civic_corporate_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_hive_world_forgers: "Aninhamento Vulcânico"
 civic_hive_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_world_forgers_gestalt_effects: "- Libera o planeta inicial: ['concept_pc_volcanic']. \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge']. \n- Pode fazer a construção £building£ §Y$building_volcanic_forge_1$§!, que adiciona £job_polytechnic_drone£ ['concept_polytechnic_drone']. \n- Planetas com uma £building£ §Y$building_volcanic_forge_1$§! aos poucos se tornam um §Y$pc_volcanic$§!. \n- ['concept_guaranteed_colonies'] serão mundos de clima §Y$climate_dry$§!."
 civic_machine_world_forgers: "Otimizadores Termais"
 civic_machine_world_forgers_desc: "$civic_world_forgers_desc$"
 tech_volcanic_forge: "Forja Vulcânica"
 tech_volcanic_forge_desc: "Quando ativada, esta instalação lentamente transforma um planeta em um paraíso vulcânico, revelando recursos úteis ao longo do processo. Termoforjadores podem acelerar a transformação."
 concept_volcanic_forge: "$tech_volcanic_forge$"
 concept_volcanic_forge_desc: "$building_volcanic_forge_basic$ \n\n- Progresso Mensal: §G+0.1§! \n- Progresso Mensal a cada §Y100§! £job_miner£ $job_miner_plural$: §G+0.05§! \n- Progresso Mensal a cada §Y100§! £job_foundry£ $job_foundry_plural$: §G+0.05§!"
 building_volcanic_forge_1: "$tech_volcanic_forge$"
 building_volcanic_forge_1_desc: "Este complexo industrial, projetado para perfurar profundamente a crosta do planeta, induzirá atividades vulcânicas em todo o mundo, terraformando cada bioma em uma paisagem ardente."
 building_volcanic_forge_2: "Fornalha Vulcânica"
 building_volcanic_forge_2_desc: "$building_volcanic_forge_1_desc$"
 building_volcanic_forge_1_effect: "\n$building_volcanic_forge_basic$ \n$volcanic_forge_1_monthly$ \n\nProgresso de todos os £job_miner£ $concept_planet_miners$: §G+[root.GetMinerVar1]§! \nProgresso de todos os £job_foundry£ $concept_planet_metallurgists$: §G+[root.GetForgerVar1]§!"
 building_volcanic_forge_2_effect: "\n$building_volcanic_forge_basic$ \n$volcanic_forge_2_monthly$ \n\nProgresso de todos os £job_miner£ $concept_planet_miners$: §G+[root.GetMinerVar2]§! \nProgresso de todos os £job_foundry£ $concept_planet_metallurgists$: §G+[root.GetForgerVar2]§!"
 building_volcanic_forge_basic: "Transforma o planeta em um §H$pc_volcanic$§!."
 volcanic_forge_1_monthly: "- Adiciona §G+200§! empregos de £job_polytechnic_mentor£ ['concept_polytechnic_mentor'].\n- Progresso Mensal: §G+0.1§! \n- Progresso Mensal a cada §Y100§! £job_miner£ $concept_planet_miners$: §G+0.05§! \n- Progresso Mensal a cada §Y100§! £job_foundry£ $concept_planet_metallurgists$: §G+0.05§!"
 volcanic_forge_2_monthly: "- Adiciona §G+400§! empregos de £job_polytechnic_mentor£ ['concept_polytechnic_mentor'].\n- Progresso Mensal: §G+0.2§! \n- Progresso Mensal a cada §Y100§! £job_miner£ $concept_planet_miners$: §G+0.1§! \n- Progresso Mensal a cada §Y100§! £job_foundry£ $concept_planet_metallurgists$: §G+0.1§!"
 # Civic - Fire Cult
 civic_pyrolatry: "Culto do Fogo"
 civic_pyrolatry_desc: "Forjada por gerações de adversidade extrema, esta sociedade acredita na sobrevivência por meio da união, e na união por meio da sobrevivência. Apenas a luta nascida do fogo pode uni-los com força suficiente para resistir a uma galáxia fria e indiferente."
 civic_pyrolatry_effects: "- A produção de £unity£ §Y$unity$§! dos empregos aumenta proporcionalmente com a baixa $HABITABILITY$ (até §G500%§!).\n- A facção ['concept_fire_cult'] se forma logo após o início do jogo.\n- Substitui £job_priest£ §Y$job_priest_plural$§! por £job_fire_dancer£ ['concept_inf_fire_dancers'].\n- Substitui £job_politician£ §Y$job_politician_plural$§! por £job_fire_oracle£ ['concept_inf_fire_oracles'] em planetas com $HABITABILITY$ abaixo de §R50%§!.\n- Permite o recrutamento de exércitos de §Y$ember_legion$§! em planetas com $HABITABILITY$ abaixo de §R20%§!.\n- Concede acesso às decisões planetárias de §Y$decision_blazing_scourge$§!, que criam £blocker£ ['concept_dec_blazing_scourge'].\n- Tem sinergia com os Componentes Cívicos: $civic_superstitious_beliefs$, $civic_exalted_priesthood$, $civic_death_cult$, $civic_aristocratic_elite$ e $civic_merchant_guilds$."
