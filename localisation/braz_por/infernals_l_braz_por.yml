 infernal_figurine: "Estatueta de Infernal"
 infernal_figurine_desc_short: "Uma criatura robusta, com uma carapaça em forma de cúpula e quatro patas curtas, se agacha sob uma escultura estilizada de fogo."
 infernal_figurine_desc_details: "A chama é esculpida em um mineral desconhecido com um brilho vermelho. Esse artefato foi escavado nas catacumbas de uma sociedade extinta e pode ter representado sua esperança de sobreviver à destruição vulcânica iminente de sua biosfera."
