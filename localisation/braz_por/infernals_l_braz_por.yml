 infernals.35.name: "Envolvido pelas Chamas"
 infernals.35.desc: "A superfície de §H[from.GetName]§! se rompeu e sua crosta se fraturou à medida que um calor insuportável irrompia das profundezas. A transformação foi rápida e absoluta: montanhas desabaram, oceanos ferveram e o céu virou um manto de brasas.\n\nNada resta dos antigos biomas prósperos do planeta. Apenas formas de vida extremófilas ainda podem chamar este lugar de lar."
