 extreme_frontiers.2005.title: "Recursos Tóxicos"
 extreme_frontiers.2005.desc.common: "Nossa primeira implementação da §Yterraformação por georradiação§! em §Y[target.GetName]§! foi concluída.\n\nAo reduzir a superfície a um deserto tóxico inabitável, extraímos uma quantidade inédita de materiais graças às nossas melhorias na Matriz de Georradiação."
 extreme_frontiers.2005.desc.industrialist: "Esta conquista marca o início de uma nova era de exploração e lucro para nosso império."
 extreme_frontiers.2005.a.default: "Fantástico."
