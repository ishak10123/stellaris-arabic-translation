 # Event Chains #
 ################
 # CHRONICLES OF DENDRUS
 chronicles_of_dendrus_chain_title: "Crônicas de Dendrus"
 chronicles_of_dendrus_chain_desc: "Ao estudar as \"Crônicas\", uma coleção de provas matemáticas complexas recuperadas dos destroços de uma nave-arca em §Y[from.Planet.GetName]§!, queremos aprender mais sobre o planeta paradisíaco buscado pelos dendritianos, §YNova Bratulla§!."
 site_chronicles_of_dendrus: "$chronicles_of_dendrus_chain_title$"
 site_chronicles_of_dendrus_desc: "Análises de §Y[from.Planet.GetName]§! revelaram a presença de destroços de uma nave oriunda do espaço. A nave parece ter tido uma aterrissagem descontrolada aqui há muitos anos.\n\nSeu tamanho enorme sugere que uma grande quantidade de recursos foi destinada para sua construção. Uma expedição arqueológica nos ajudará a descobrir como ela veio parar aqui."
 extreme_frontiers.1400.title: "Nave de Transporte Maciça"
 extreme_frontiers.1400.desc: "Uma análise externa dos destroços da nave em §Y[from.Planet.GetName]§! sugere que ela é uma transportadora de grande capacidade. Seus sistemas estão inativos e nenhum sinal de vida foi detectado em seu interior. Uma análise sedimentar indica que ela está aqui há aproximadamente um século, o que é bastante recente para a escala de tempo galáctica."
 extreme_frontiers.1400.a: "Explore o interior."
 extreme_frontiers.1405.title: "Nave Colonial Condenada"
 extreme_frontiers.1405.desc: "Dentro da nave destruída em §Y[from.Planet.GetName]§! encontramos câmaras sofisticadas para o cultivo de plantas hidropônicas, grandes reservas de sementes e solo e compartimentos de carga repletos de ferramentas intactas e materiais de construção. Muitos dos terminais de dados contêm planos para uma nova colônia designada como \"§YNova Bratulla§!\".\n\nNos andares inferiores, ocupando milhares de cápsulas criogênicas, estavam os corpos dos antigos habitantes da nave."
 extreme_frontiers.1405.desc.phototrophic: "$extreme_frontiers.1405.desc$ Como nós, eles dependem de fotossíntese para o crescimento e renovação de suas células. Suas formas definhadas sugerem que eles morreram em algum momento durante seu longo sono em estase."
 extreme_frontiers.1405.desc.default: "$extreme_frontiers.1405.desc$ As formas definhadas desses organismos fototróficos sugerem que eles morreram em algum momento durante seu longo sono em estase."
 extreme_frontiers.1405.a: "Continue a exploração."
 extreme_frontiers.1405.b: "Consuma seus restos e prossiga."
 extreme_frontiers.1410.title: "Templo do Mundo Natal"
 extreme_frontiers.1410.desc: "Descobrimos um Sanctum interno nos destroços da nave colonial em §Y[from.Planet.GetName]§!, decorado com elaboradas ilustrações da vida em um planeta chamado \"§YBratulla§!\". Algumas retratam um mundo exuberante com uma fauna vívida, enquanto outras detalham ambientes decadentes e morte em escala massiva. A maior das imagens mostra esta nave saindo de um mundo desolado e sem vida.\n\nUm terminal de dados central contém pequenos vídeos da tripulação da nave. Depois do extenso mapeamento do idioma, nós elaboramos uma tradução.\n\n§SArborixxeum - Cápsula 9721\n\nPartir dói, mas criar raízes em Nova Bratulla irá nos curar.\n\nDarkht Paam - Cápsula 21301\n\nConfiem nas Crônicas, dendritianos. Nova Bratulla será nossa salvação.§!\n\nAinda estamos procurando pela sala de comando desta nave gigantesca."
 extreme_frontiers.1410.a: "Continue procurando."
 extreme_frontiers.1415.title: "Sala de Comando"
 extreme_frontiers.1415.desc: "Depois de ganhar acesso à sala de comando da nave, nós extraímos e traduzimos o último registro de voo.\n\n§SNAVE-ARCA DENDRUS I - REGISTRO DE EMERGÊNCIA - XZ-47/9-113.5-AE\n\nTemo que nossa confiança nas Crônicas tenha sido um erro. Nós chegamos, mas Nova Bratulla, o planeta paradisíaco, não está aqui. Nada aqui é capaz de manter a vida dendritiana.\n\nTodos os passageiros tiveram seu sono por estase estendido. Continuaremos nossa pesquisa...§!\n\nMais dados foram recuperados para coletar essas \"Crônicas\" do terminal de ciência, revelando uma gama de provas matemáticas incomuns. Essas equações utilizam uma forma estranha de matemática dendritiana e teorizam a localização de um suposto planeta habitável, §YNova Bratulla§!."
 extreme_frontiers.1415.a: "Estude essas \"Crônicas\"."
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT: "Estude as Crônicas Dendritianas"
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT$"
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC: "Ao estudar as \"Crônicas\", uma coleção de provas matemáticas complexas recuperadas dos destroços de uma nave-arca em §Y[from.Planet.GetName]§!, queremos aprender mais sobre o planeta paradisíaco buscado pelos dendritianos, §YNova Bratulla§!."
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE_DESC: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC$"
 extreme_frontiers.1420.title: "Hiperestrada Degradada Descoberta"
 extreme_frontiers.1420.desc: "As Crônicas Dendritianas consistem em uma série de axiomas matemáticos complexos e abstrações. Esses teoremas curiosos sugerem que o sistema §Y[from.solar_system.GetName]§! contém uma hiperestrada adicional e não mapeada que leva a §YNova Bratulla§!.\n\nDepois de uma ampla análise quântica da área, finalmente encontramos o ponto de fenda para essa hiperestrada perdida, obscurecida e fortemente degradada devido à proximidade com o buraco negro do sistema. Ao restaurá-la, seremos os primeiros a descobrir o que há do outro lado."
 extreme_frontiers.1420.a: "Nós encontramos o que os dendritianos não foram capazes de encontrar."
 RESTORE_HYPERLANE_PROJECT: "Restaure a Hiperestrada Degradada"
 RESTORE_HYPERLANE_PROJECT_DESC: "Se conseguirmos achar uma forma de restaurar a hiperestrada degradada em §Y[from.solar_system.GetName]§!, seremos capazes de confirmar a existência de §YNova Bratulla§!, o planeta paradisíaco procurado pelos dendritianos."
 extreme_frontiers.1425.title: "Hiperestrada Restaurada"
 extreme_frontiers.1425.desc: "Ao direcionar energia para o buraco negro em §Y[from.Planet.solar_system.GetName]§!, realinhamos seus campos gravitacionais para liberar a entrada da hiperestrada anteriormente degradada.\n\nAchados iniciais confirmaram a existência de um único planeta do outro lado da hiperestrada que condiz perfeitamente com as características de §YNova Bratulla§!, como descrito nas Crônicas Dendritianas."
 extreme_frontiers.1425.a: "Um novo mundo para explorar."
 NAME_new_bratulla: "Nova Bratulla"
 NAME_new_bratulla_star: "Kipos"
 extreme_frontiers.1430.title: "Nova Bratulla"
 extreme_frontiers.1430.desc.common: "Confirmamos a existência de Nova Bratulla, o planeta descrito nas Crônicas Dendritianas. Ele possui um ecossistema botânico rico e diversificado, e nossas inspeções iniciais detectaram milhões de diferentes espécies nativas."
 extreme_frontiers.1430.desc.begin: "Este mundo fascinante é perfeitamente adequado para suportar formas de vida de origem vegetal com uma genética semelhante"
 extreme_frontiers.1430.desc.end: "Seu solo é o lar de bilhões de diferentes bactérias que nutrem, protegem e reparam as estruturas de raízes orgânicas.\n\nAs plantas parecem compartilhar nutrientes de acordo com suas maiores necessidades; aquelas que desfrutam de uma abundância temporária compartilham seu excedente por meio de um sistema de raízes interconectadas."
 extreme_frontiers.1430.desc.default: "$extreme_frontiers.1430.desc.begin$ a dos dendritianos. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.phototrophic: "$extreme_frontiers.1430.desc.begin$ à nossa. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.respawn: "Nossa equipe de [Root.Owner.GetScientistPlural] acredita que talvez seja possível reestabelecer a espécie dendritiana aqui ao transplantar amostras genéticas encontradas na nave-arca para o solo peculiar deste planeta."
 extreme_frontiers.1430.a: "Os dendritianos pertencem a esse lugar."
 extreme_frontiers.1430.b.default: "Nova Bratulla é nosso."
 extreme_frontiers.1430.b.phototrophic: "Este mundo é perfeito para nós."
 extreme_frontiers.1430.b.megacorp: "Este mundo intocado é nosso para explorar."
 NAME_buds_of_dendrus: "Botões de Dendrus"
 NAME_dendritian: "Dendritiano"
 NAME_dendritian_plural: "Dendritianos"
 ADJECTIVE_dendritian: "Dendritiano"
 opinion_dendrus: "Salvador Dendritiano"
 opinion_to_dendrus: "$opinion_dendrus$"
 extreme_frontiers.1435.title: "Oferta de Vassalagem"
 extreme_frontiers.1435.desc: "Após muitos séculos... aquilo que as Crônicas Dendritianas previram se concretizou. Finalmente poderemos criar raízes e prosperar em §YNova Bratulla§!.\n\nSe hoje estamos aqui, é graças ao povo de §Y[Root.GetName]§!. Nunca esqueceremos isso.\n\nNossa gratidão será expressa não apenas por palavras, mas por ações. Oferecemos humildemente a vocês nossa vassalagem."
 extreme_frontiers.1435.a: "Aceitamos sua vassalagem."
 extreme_frontiers.1435.b: "Precisamos ver o seu destino se cumprir."
 extreme_frontiers.1435.b.tt: "Jogue como os §RBotões de Dendrus§!"
 extreme_frontiers.1435.c: "Seu conhecimento deve bastar."
 extreme_frontiers.1435.c.tt: "Ganha [Root.GetDendrusGivenBiotechAmount] £society£ §YBiotecnologias§!"
 # GEORADIATION TERRAFORMING
 georadiation_terraforming_chain_title: "Terraformação por Georradiação"
 georadiation_terraforming_chain_desc: "Os restos de um dispositivo de terraformação destrutivo em §Y[from.Planet.GetName]§! continuam a emitir um sinal para múltiplos locais ao redor da galáxia. Investigar esses locais revelará mais informações a respeito dessa tecnologia perigosa."
 site_georadiation_terraforming: "Rede Subterrânea"
 site_georadiation_terraforming_desc: "Nossos sensores detectaram um sinal de comunicação irregular vindo de dentro de uma cratera em §Y[from.Planet.GetName]§!.\n\nAnálises sísmicas topológicas revelam uma rede de cavernas subterrâneas com uma entrada colapsada no centro da cratera. Além disso, nosso equipamento de radiologia está detectando pequenos traços de radiação gravitacional emanando do local, levantando mais perguntas do que respostas."
 extreme_frontiers.1500.title: "Destroços Irradiados"
 extreme_frontiers.1500.desc: "Obras de escavação recuperaram destroços fragmentados de dentro da cratera em §Y[from.Planet.GetName]§!. Esses pedaços estilhaçados estão emitindo fortes traços da radiação gravitacional detectadas da órbita.\n\nCom acesso assegurado à rede subterrânea de cavernas, §Y[leader.GetName]§! prepara-se para rastrear o sinal de comunicação até sua fonte."
 extreme_frontiers.1500.a: "Rastreie o sinal."
 extreme_frontiers.1505.title: "Dispositivo Corroído"
 extreme_frontiers.1505.desc: "Rastreamos o sinal de comunicação em §Y[from.Planet.GetName]§! até sua origem: um enorme constructo danificado que penetra profundamente a crosta do planeta.\n\nCorroído pela exposição ao ácido, sua matriz de comunicações continua transmitindo em um idioma estranho, tentando fazer contato com uma entidade distante.\n\nFixado por âncoras gravitacionais especializadas, o dispositivo está firmemente preso à base rochosa. Serão necessárias mais pesquisas para discernir seu real propósito."
 extreme_frontiers.1505.a: "Descriptografe seu sinal."
 extreme_frontiers.1510.title: "Terraformação Desconstrutiva"
 extreme_frontiers.1510.desc.common: "Após análises detalhadas, temos agora um entendimento parcial do constructo que encontramos em §Y[from.Planet.GetName]§!. A máquina é um dispositivo de terraformação rudimentar e destrutivo.\n\nProjetado para irradiar a biosfera nativa com estímulos de crescimento por radiação para recursos desejados, ele causa um efeito cascata que devasta o ecossistema do planeta no processo. Isso dá ao usuário uma abundância de materiais exploráveis ao custo de elevar a toxicidade geral no planeta.\n\nEmbora ainda não saibamos como exatamente isso é feito, conseguimos decodificar a frequência de comunicação do dispositivo, identificando mais dois locais que transmitem o mesmo sinal."
 extreme_frontiers.1510.desc.default: "Investigar esses sítios poderá nos fornecer mais perspectivas sobre essa tecnologia."
 extreme_frontiers.1510.desc.industrialist: "Os pioneiros empreendedores por trás dessa tecnologia claramente tinham interesse na otimização de lucros. Poderíamos aprender muito com essa descoberta."
 extreme_frontiers.1510.a: "Começa a busca."
 GEORADIATION_SIGNAL_1_PROJECT: "Rastro de Sinal: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_1_PROJECT_DESC: "Uma frequência de comunicação idêntica à encontrada no constructo em §Y[from.Planet.GetName]§! foi rastreada até este local, onde outro dispositivo danificado foi localizado. Estudá-lo nos dará mais perspectivas a respeito de suas capacidades destrutivas de terraformação."
 extreme_frontiers.1515.title: "Combustível Gravitacional"
 extreme_frontiers.1515.desc.common: "Descobrimos outro dispositivo de terraformação danificado em §Y[from.GetName]§!. Diferente do constructo original, esse manteve um pouco de sua fonte de combustível para estudo, revelando §Hmatéria escura§! como a força motriz de sua produção de radiação.\n\nO dispositivo acelera o crescimento de recursos almejados ao metastatizar ligações moleculares essenciais. Isso promove seu desenvolvimento ao custo da integridade celular da biosfera presente."
 extreme_frontiers.1515.desc.industrialist: "O tamanho desprezo que esse dispositivo demonstra em relação à estabilidade planetária diante da exploração de recursos é inspirador."
 extreme_frontiers.1515.desc.signal_2_done: "Ao canalizar ondas de radiação através de fileiras de cristais refratores, essa máquina pode terraformar seu alvo usando manipulação molecular gravitacional sem colapsar o núcleo planetário.\n\nRegistros recuperados indicam o local de um quarto dispositivo, ainda não detonado."
 extreme_frontiers.1515.desc.signal_2_not_done: "Como o dispositivo consegue fazer isso e prevenir o colapso gravitacional em escala planetária ainda não está claro. Talvez possamos encontrar essa resposta nos sítios de comunicação restantes."
 GEORADIATION_SIGNAL_2_PROJECT: "Rastro de Sinal: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_2_PROJECT_DESC: "A frequência de comunicação emitida pelo constructo encontrado em §Y[from.Planet.GetName]§! foi rastreada até este local, onde outro dispositivo danificado foi localizado. Estudá-lo nos dará mais perspectivas a respeito de suas capacidades destrutivas de terraformação."
 extreme_frontiers.1520.title: "Radiação Estimulada"
 extreme_frontiers.1520.desc.common: "Descobrimos outro dispositivo de terraformação danificado em §Y[from.GetName]§!, coberto por afloramentos de cristais causados por uma falha na ativação de uma matriz de refratores quebrada.\n\nApós uma observação minuciosa do aparato, identificamos os métodos usados para o direcionamento de radiação concentrada. Ao utilizar ciclos de feedback modulados de forma controlada, o constructo é capaz de direcionar e estimular diretamente o crescimento de um recurso pré-determinado."
 extreme_frontiers.1520.desc.signal_1_done: "Isso permite a terraformação de alta intensidade sem o risco do completo colapso gravitacional planetário.\n\nRegistros recuperados indicam a localização de um quarto dispositivo, não detonado."
 extreme_frontiers.1520.desc.signal_1_not_done: "Entretanto, a exata substância usada para gerar essa radiação ainda não foi identificada. As reservas de combustível do dispositivo esgotaram-se, apesar de seu mau funcionamento. Talvez possamos encontrar essa resposta nos sítios de comunicação restantes."
 UNDETONATED_GEORADIATION_PROJECT: "Dispositivo Não Detonado"
 UNDETONATED_GEORADIATION_PROJECT_DESC: "Localizamos um quarto dispositivo de terraformação, ainda não detonado, em §Y[planet.GetName]§!. Recuperá-lo preencherá as lacunas em nossa compreensão a respeito dessa tecnologia."
 extreme_frontiers.1525.title: "Dispositivo Não Detonado"
 extreme_frontiers.1525.desc.common: "Localizamos um quarto dispositivo intacto na superfície de §Y[from.GetName]§!. Analisar sua arquitetura de controle nos dará o conhecimento final necessário para replicar essa tecnologia."
 extreme_frontiers.1525.desc.industrialist: "As impressionantes margens de lucro que obteremos dessa galáxia, assim que dominarmos essa tecnologia, serão infinitamente mais relevantes do que as preocupações pífias sobre o meio-ambiente. Essa é uma oportunidade de ouro para [controller.GetName]."
 extreme_frontiers.1520.desc.default.common: "As possíveis ramificações de implantar livremente essa tecnologia em uma escala galáctica levanta questões importante."
 extreme_frontiers.1525.desc.default.default: "Talvez fosse melhor se o risco potencial que esses dispositivos apresentam fosse removido da galáxia."
 extreme_frontiers.1525.desc.default.homicidal: "Talvez fosse melhor remover essa ameaça da galáxia, antes que seja usada contra nós."
 extreme_frontiers.1525.a.default: "Estude o dispositivo."
 extreme_frontiers.1525.a.industrialist: "O que estamos esperando? Comecem os estudos!"
 extreme_frontiers.1525.b: "O risco é maior do que os benefícios. Destrua o dispositivo."
 extreme_frontiers.1530.title: "Violação dos Termos"
 extreme_frontiers.1530.desc.common: "Ao estudar o dispositivo em §Y[from.GetName]§!, nós sem querer acionamos um mecanismo de segurança que despertou um alarme em todas as frequências. Embora acreditássemos que isso não suscitaria respostas, um drone automatizado entrou em nosso território.\n\nNossos chamados depararam-se com a mesma resposta:\n\n\"Saudações, prezado cliente. Nossos registros mostram que você está tentando criar uma versão não licenciada de nossa mais recente Matriz de Georradiação MKIII, uma violação clara do Contrato de Licença de Usuário Final da $NAME_Geocorp$.\n\nFaremos uso de nossa autoridade legal para encerrar suas tentativas com força máxima. Quaisquer queixas podem ser enviadas para nossos drones de atendimento ao cliente.\""
 extreme_frontiers.1530.desc.industrialist: "A diligência deles seria inspiradora, se não atrasasse nosso trabalho."
 extreme_frontiers.1530.a: "Abra as comunicações."
 extreme_frontiers.1530.b: "Nós não negociamos com o \"atendimento ao cliente\"."
 GEORADIATION_ANALYSIS_PROJECT: "Análise de Dispositivo"
 GEORADIATION_ANALYSIS_PROJECT_DESC: "Ao analisar a arquitetura de controle do dispositivo encontrado em §Y[planet.GetName]§!, fomos capazes de reproduzir essa tecnologia para nosso próprio uso."
 NAME_Geocorp: "CoburnCorp"
 geocorp_corvette: "Drone de Combate da $NAME_Geocorp$"
 geocorp_corvette_plural: "Drones de Combate da $NAME_Geocorp$"
 NAME_Geocorp_Combat_Drone: "$geocorp_corvette$"
 extreme_frontiers.1531.title: "Drone da $NAME_Geocorp$"
 extreme_frontiers.1531.desc: "Conforme a comunicação foi estabelecida, uma música arcaica tocou antes de o drone automatizado de atendimento aparecer.\n\nSaudações, prezado cliente. Podemos ver que você está criando uma versão não licenciada de nossa Matriz de Georradiação MKIII. O que posso fazer por você hoje?"
 extreme_frontiers.1531.a: "De onde você veio?"
 extreme_frontiers.1531.a.reply: "\"Todos os itens comprados da $NAME_Geocorp$ são acompanhados por um satélite orbital remoto de satisfação do cliente para garantir o funcionamento adequado e a fidelização vitalícia do consumidor. Nossas reservas internas de energia nos permitem operar por séculos.\""
 extreme_frontiers.1531.b: "Podemos falar com seu administrador?"
 extreme_frontiers.1531.b.reply: "\"Infelizmente, a última administração viva expirou. Entretanto, nosso comprometimento com a satisfação do consumidor é capaz de durar vários ciclos de vida biológicos.\""
 extreme_frontiers.1531.c: "Achamos que estávamos recuperando ruínas."
 extreme_frontiers.1531.c.reply: "\"Ignorância não é aceita como justificativa válida. Os termos de uso para a sua Matriz de Georradiação MKIII foram explicados detalhadamente no momento da compra.\""
 extreme_frontiers.1531.d: "Estamos dispostos a renovar nossa assinatura."
 extreme_frontiers.1531.d.reply: "\"Fantástico! Assinaremos a documentação após o pagamento de uma taxa administrativa de 3.000 §YCréditos Energéticos§!. Mediante a confirmação de pagamento, consideraremos o problema resolvido e encerraremos o contato.\""
 extreme_frontiers.1531.e: "Nós não compramos esse dispositivo."
 extreme_frontiers.1531.e.reply: "\"Então você admite o furto? Isso deixa tudo mais simples; nossos protocolos antirroubo são efetivamente mortais. Esperamos que você considere nossos produtos funerários para suas necessidades futuras.\""
 extreme_frontiers.1531.f: "Pague a taxa."
 extreme_frontiers.1531.f.reply: "\"Agradecemos por renovar sua licença da Matriz de Georradiação MKIII. Esperamos que o dispositivo seja tão útil para você quanto é lucrativo para nós.\"\n\nCom a taxa paga, o drone desaparece galáxia adentro."
 extreme_frontiers.1531.g: "Exorbitante. Preparar para a batalha."
 extreme_frontiers.1531.h: "Já vai tarde."
 extreme_frontiers.1531.i: "Preparar para a batalha."
 extreme_frontiers.1534.title: "Drone da $NAME_Geocorp$"
 extreme_frontiers.1534.desc: "Conforme a batalha se encerra em §Y[fromfrom.solar_system.GetName]§!, uma nova comunicação do drone de atendimento ao cliente é reproduzida em nossas telas.\n\n\"Notamos sua objeção aos nossos esforços em impor os termos do Contrato de Licença de Usuário Final. Como resultado de sua demonstração de superioridade militar, abriremos mão da posse da propriedade intelectual da Matriz de Georradiação MKIII. Esperamos que você aproveite sua nova tecnologia.\"\n\nO drone explode, cortando a linha de comunicação."
 extreme_frontiers.1534.a: "Já vai tarde."
 extreme_frontiers.1535.title: "Alteração dos Termos"
 extreme_frontiers.1535.desc: "Agora que lidamos com o drone de atendimento ao cliente, podemos voltar à engenharia reversa da Matriz de Georradiação."
 extreme_frontiers.1535.a: "Continue estudando o dispositivo."
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED: "$GEORADIATION_ANALYSIS_PROJECT$"
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED_DESC: "$GEORADIATION_ANALYSIS_PROJECT_DESC$"
 extreme_frontiers.1540.title: "Dispositivo Não Detonado"
 extreme_frontiers.1540.desc.industrialist: "Por meio de uma obstinada eficiência empreendedora, conseguimos fazer a engenharia reversa da Matriz de Georradiação MKIII, refinando seus métodos operacionais para gerar lucro máximo."
 extreme_frontiers.1540.desc.default: "Após estudos extensos, conseguimos fazer a engenharia reversa da Matriz de Georradiação MKIII, liberando seu potencial com melhorias adicionais no processo."
 extreme_frontiers.1540.desc.common: "Ao integrar desestabilização por radioatividade molecular em nosso equipamento de terraformação, poderemos estimular o crescimento de recursos valiosos."
 extreme_frontiers.1540.a: "Ótimas notícias."
 tech_georadiation_terraforming: "Terraformação por Georradiação"
 tech_georadiation_terraforming_desc: "Ao expor a biosfera do planeta à degradação molecular por radiação, promoveremos o crescimento de certos recursos enquanto transformamos o planeta em um ambiente inóspito e tóxico."
 tech_georadiation_terraforming_tt: "Libera a §Ydecisão planetária§! §H$decision_toxify_world$§!"
 extreme_frontiers.1545.title: "Dispositivo Destruído"
 extreme_frontiers.1545.desc: "Conseguimos desmontar o dispositivo em §Y[from.GetName]§!, recuperando qualquer material que poderia ser reutilizado para o nosso benefício.\n\nCom esse dispositivo destruído e seus predecessores em ruínas, os segredos dessa tecnologia destrutiva estão perdidos para sempre para a galáxia."
 extreme_frontiers.1545.a.default: "Já vai tarde."
 decision_toxify_world: "Contaminar Mundo"
 decision_toxify_world_desc: "Promove o crescimento de recursos específicos ao expor a biosfera do planeta à degradação molecular por radiação, reduzindo-o a um mundo inóspito e tóxico no processo."
 decision_toxify_world_tt: "Situação Inicial: §HContaminar Mundo§!\n - Transformará este planeta em um §YMundo Tóxico§! com depósitos de [this.GetToxifiedResourcesText]"
