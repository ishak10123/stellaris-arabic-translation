l_braz_por:
 #############
 # Anomalies #
 #############
 EXTREME_FRONTIERS_TITLE: "Extreme Frontiers" # Do not translate
 # PULSATING OBJECT
 PULSATING_OBJECT_TOXIC_CAT: "Objeto Pulsante"
 PULSATING_OBJECT_GAS_GIANT_CAT: "Objeto Pulsante"
 PULSATING_OBJECT_BARREN_CAT: "Objeto Pulsante"
 PULSATING_OBJECT_BARREN_COLD_CAT: "Objeto Pulsante"
 PULSATING_OBJECT_FROZEN_CAT: "Objeto Pulsante"
 PULSATING_OBJECT_MOLTEN_CAT: "Objeto Pulsante"
 anomaly_pulsating_object_desc: "Análises iniciais de §Y[this.GetName]§! descobriram um objeto aéreo peculiar flutuando pela troposfera, diminuindo e aumentando de tamanho conforme mudava de posição. Mais investigações serão necessárias para desvendar sua natureza."
 extreme_frontiers.100.title: "Balão Meteorológico Antigo"
 extreme_frontiers.100.desc: "§Y[Leader.GetName]§! identificou o objeto aéreo misterioso em §Y[from.GetName]§! como um balão meteorológico antigo. Quaisquer marcas que poderiam indicar a sua origem foram desgastadas pelas condições extremas da atmosfera do planeta.\n\nDatações radiométricas indicam que o balão está na atmosfera de [from.GetName] há mais de um século, mudando de tamanho enquanto flutua sem rumo nas variações de pressão idiossincráticas do planeta.\n\nMilagrosamente, os painéis solares ainda funcionam e sua matriz de sensores carrega um século inteiro de valiosos dados atmosféricos. Isso será muito útil para nossa equipe de [Root.Owner.GetResearchers]."
 # MOLTEN METAL OCEAN
 MOLTEN_METAL_OCEAN_CAT: "Correntezas Derretidas Extremas"
 anomaly_molten_metal_ocean_desc: "Inspeções iniciais da superfície de §Y[from.GetName]§! detectaram tsunamis frequentes de lava superaquecida contendo alta concentração de metais pesados. Análises subsequentes serão necessárias para entender esse fenômeno por completo."
 extreme_frontiers.110.title: "Tsunamis Metálicos"
 extreme_frontiers.110.desc: "§Y[Leader.GetName]§! confirmou que os oceanos de lava em §Y[from.GetName]§! contêm formas puras excepcionais de todos os mais raros metaloides conhecidos em nosso catálogo de elementos.\n\nEssa coleção concentrada de metais líquidos dá origem a campos eletromagnéticos extremamente voláteis, causando a formação constante de tsunamis de metal derretido.\n\nUtilizando modelagem preditiva, nós identificamos uma breve, mas constante pausa na intensidade das ondas que pode ser usada para explorar esse rico depósito."
 # GREAT BLUE SPOTS
 GREAT_BLUE_SPOTS_CAT: "Grandes Manchas Azuis"
 great_blue_spots_desc: "A superfície de §Y[from.GetName]§! apresenta duas descolorações distintas, grandes o suficiente para serem visíveis do espaço e se moverem em grandes velocidades. Essas interessantes formações azuladas merecem um estudo mais aprofundado."
 extreme_frontiers.120.title: "Supertempestades Simbióticas"
 extreme_frontiers.120.desc: "As grandes manchas azuis em §Y[from.GetName]§! são um par de tempestades simbióticas, um ciclone e um anticiclone que se sustentam em um estado de equilíbrio perfeito.\n\nEssas tempestades são gigantescas em tamanho, com ventos atingindo velocidades que facilmente quebram a barreira do som, criando poderosos estrondos sônicos. Volumes altos de poeira de cobalto estão presentes nos ciclones, dando sua coloração distinta.\n\n§Y[Leader.GetName]§! supõe que eles estão ativos aqui há mais de um século. Os minerais que lançaram na atmosfera superior devem ser de fácil extração para uma estação de mineração."
 # FROZEN INFERNO
 FROZEN_INFERNO_CAT: "Picos de Calor"
 frozen_inferno_desc: "Análises iniciais de §Y[from.GetName]§! revelaram picos de calor imprevisíveis extremos neste corpo celeste congelado. Essas temperaturas anômalas exigem mais estudos."
 extreme_frontiers.130.title: "Inferno Congelado"
 extreme_frontiers.130.desc: "§Y[Leader.GetName]§! terminou as investigações dos picos de calor intermitentes do mundo congelado de §Y[from.GetName]§!.\n\nEnterrado sob a superfície de tundra extensiva do planeta está um depósito pirofórico altamente reativo. Inicialmente dormentes sob o gelo, essas substâncias periodicamente emergem conforme as placas tectônicas continentais congeladas se deslocam e se quebram.\n\nDescongelando conforme sobem à superfície, esses gases altamente inflamáveis estão sujeitos a ignições repentinas na atmosfera rica em oxigênio de [from.GetName], causando incêndios frequentes na superfície do planeta.\n\nCom equipamento de extração especializado, essa substância inflamável especial pode ser extraída e aproveitada de outra forma."
 # POISONED ATMOSPHERE
 POISONED_ATMOSPHERE_CAT: "Atmosfera Tóxica"
 poisoned_atmosphere_desc: "Altas concentrações de moléculas orgânicas nocivas foram detectadas na atmosfera superior de §Y[from.GetName]§!."
 extreme_frontiers.140.title: "Atmosfera Tóxica"
 extreme_frontiers.140.desc.hive_mind: "§Y[from.GetName]§! é o lar de uma espécie impressionante de líquens que expelem moléculas extremamente tóxicas na atmosfera como método de se protegerem de predadores.\n\nEstudos de fósseis sugerem que [from.GetName] uma vez abrigou uma fauna rica que os líquens levaram à extinção ao aumentar gradativamente os níveis de arsênico e tálio na atmosfera mais rápido do que as outras espécies eram capazes de se adaptar.\n\n§Y[Leader.GetName]§! descobriu apenas mais um organismo, uma espécie de reptiloide capaz de sobreviver em tais condições graças a uma glândula especializada em desintoxicação.\n\nEstudos a respeito dessa glândula podem contribuir para o conhecimento acerca da desintoxicação da atmosfera."
 extreme_frontiers.140.desc.default: "$extreme_frontiers.140.desc.hive_mind$ Experimentos iniciais também indicam que compostos únicos dentro das toxinas podem ser reutilizados na indústria cosmética."
 extreme_frontiers.140.a: "Que potencial curioso..."
 extreme_frontiers.140.b: "Transforme em perfume."
 DETOXIFICATION_GLAND_PROJECT: "Estudos de Glândulas de Desintoxicação"
 DETOXIFICATION_GLAND_PROJECT_DESC: "Uma espécie notável de reptiloide prospera na atmosfera tóxica de §Y[from.GetName]§!, graças a um órgão interno peculiar que processa toxinas potentes e as converte em nutrientes úteis. Mais estudos acerca desse organismo seriam de grande utilidade."
 extreme_frontiers.145.title: "Conhecimento de Desintoxicação"
 extreme_frontiers.145.desc: "Por meio de estudos extensivos das glândulas do reptiloide de §Y[from.GetName]§!, §Y[Leader.GetName]§! descobriu os segredos biológicos de sua resistência impressionante à toxicidade do planeta.\n\nEsse órgão complexo produz componentes que agem para neutralizar os agentes nocivos da atmosfera, prevenindo que toxinas sejam absorvidas pelo sistema circulatório do réptil. Essa glândula altamente adaptável se mostrou capaz de anular até mesmo nossos venenos mais potentes criados em laboratório.\n\nEssas descobertas extraordinárias transformarão nossas abordagens à desintoxicação atmosférica."
 # GLIMPSE OF THE CORE
 GLIMPSE_CORE_CAT: "Um Vislumbre do Núcleo"
 glimpse_the_core_desc: "Movimentos estranhos nas camadas gasosas externas de §Y[from.GetName]§! fazem as fumarolas se abrirem, expondo o núcleo sólido do planeta em intervalos breves. Esse fenômeno notório pede mais estudos."
 extreme_frontiers.150.title: "Núcleo Orgânico"
 extreme_frontiers.150.desc: "Após enviar uma sonda para dentro de uma das fumarolas temporárias de §Y[from.GetName]§!, §Y[Leader.GetName]§! descobriu que o núcleo do planeta é o lar de espécies de organismos unicelulares diferentes de qualquer coisa já vista antes.\n\nEssas células robustas parecem perfeitamente adaptadas para sobreviver sob pressões extremas, com sua reprodução sazonal liberando grandes quantidades de hidrogênio. [Leader.GetName] concluiu que é assim que a camada gasosa de hidrogênio do planeta está sendo sustentada.\n\nExterminar esses organismos causaria a dissipação dessas camadas de hidrogênio, tornando o planeta rochoso colonizável."
 extreme_frontiers.150.a: "Extermine-os."
 extreme_frontiers.150.b: "Essa é uma oportunidade única de observação."
 PURIFY_CORE_PROJECT: "Purificar o Núcleo"
 PURIFY_CORE_PROJECT_DESC: "As camadas externas gasosas de §Y[from.GetName]§! são mantidas pela bioquímica única de organismos unicelulares que habitam seu núcleo. Exterminá-los dissiparia os gases, deixando apenas um planeta rochoso colonizável."
 extreme_frontiers.155.title: "Um Novo Mundo"
 extreme_frontiers.155.desc: "§Y[Leader.GetName]§! enviou uma sonda armada para uma das aberturas da superfície de §Y[from.From.GetName]§!. Ao atingir o núcleo, uma carga de toxinas foi liberada, infectando e exterminando os organismos unicelulares.\n\nNós observamos as camadas gasosas externas de [from.From.GetName] se dissiparem, deixando para trás um pequeno planeta rochoso."
 extreme_frontiers.155.a: "Uma façanha impressionante."
 # OPTICAL PHENOMENA
 OPTICAL_PHENOMENA_CAT: "Superfície Brilhante"
 optical_phenomena_desc: "Nossas análises de imagem de §Y[from.GetName]§! estão mostrando um fenômeno ótico extremamente vibrante por toda a superfície do planeta, apesar da causa desses padrões de cores permanecerem incertas sob uma distância orbital."
 extreme_frontiers.160.title: "Calotas de Gelo Multicoloridas"
 extreme_frontiers.160.desc.default: "Observações minuciosas da superfície de §Y[from.GetName]§! revelaram a causa do fenômeno ótico encontrado durante as inspeções orbitais.\n\nCondições atmosféricas poliram uma grande parte do pergelissolo do planeta até que ficasse transparente, revelando redes profundas de cristais multicoloridos escondidos no subsolo. Esse fenômeno natural dá origem a um efeito caleidoscópico quando observado de longe."
 extreme_frontiers.160.desc.machine: "$extreme_frontiers.160.desc.default$\n\nEmbora seja esteticamente agradável, os depósitos minerais que residem em seu interior são o verdadeiro alvo."
 extreme_frontiers.160.tooltip: "Libera a §Ydecisão planetária§! §H$decision_prismatic_ice_exhibit$§! com os seguintes efeitos:\n£amenities£ $MOD_PLANET_AMENITIES_MULT$: §G+25%§!\n$mod_planet_jobs_unity_produces_mult$: §G+25%§!"
 decision_prismatic_ice_exhibit: "Exibição Prismática de Gelo"
 decision_prismatic_ice_exhibit_desc: "Camadas de gelo extraídas, claras como cristal, que produzem um estonteante efeito caleidoscópico que pode ser colocado em exibição por tempo limitado."
 prismatic_ice_max_3_times_pass: "Pode ser executada um máximo de §Y3§! vezes."
 prismatic_ice_max_3_times_fail: "$TRIGGER_FAIL$Pode ser executada um máximo de §Y3§! vezes."
 prismatic_ice_max_3_times_pass_with_var: "$TRIGGER_PASS$$prismatic_ice_max_3_times_pass$ (atual: §Y[owner.prismatic_ice_exhibit_happened]§!)"
 exhibiting_prismatic_ice: "Exibição Prismática de Gelo"
 exhibiting_prismatic_ice_desc: "Camadas de gelo extraídas, claras como cristal, que produzem um estonteante efeito caleidoscópico que pode ser colocado em exibição por tempo limitado."
 # PLASMA VOLCANOES
 PLASMA_VOLCANO_CAT: "Plasma Orbital"
 plasma_volcano_desc: "Temos confirmação visual de plasma superaquecido volátil sendo projetado para a atmosfera superior de §Y[from.GetName]§!.\n\nNuvens espessas de cinzas vulcânicas depositadas na atmosfera nos impedem de identificar a origem desses projéteis a partir da órbita. Um estudo mais de perto poderá ser perigoso."
 extreme_frontiers.170.title: "Vulcões de Plasma"
 extreme_frontiers.170.desc: "§Y[Leader.GetName]§! descobriu a causa das erupções de plasma em §Y[from.GetName]§!.\n\nO campo magnético único do planeta facilita a reação entre materiais ionizados dentro do manto planetário, criando câmaras vulcânicas de alta pressurização de plasma.\n\nQuando as placas tectônicas instáveis do planeta cedem, esse plasma é expelido de maneira explosiva na forma de projéteis letais, entrando em ignição com os gases da atmosfera para criar explosões secundárias. Nossos especialistas em armas estão ansiosos para aplicar esse princípio em nossos armamentos baseadas em plasma."
 extreme_frontiers.170.desc.negative: "Infelizmente, a natureza nociva dessa pesquisa deixou [Leader.GetName] com"
 extreme_frontiers.170.desc.traumatized: "$extreme_frontiers.170.desc.negative$ traumas severos."
 extreme_frontiers.170.desc.maimed: "$extreme_frontiers.170.desc.negative$ ferimentos graves."
 # BLACK CLOUDS
 BLACK_CLOUDS_CAT: "Nuvens Negras"
 black_clouds_desc: "Nuvens negras e espessas foram observadas na atmosfera de §Y[from.GetName]§!, movendo-se em padrões imprevisíveis independente da velocidade ou direção dos ventos planetários. Elas aparecem apenas brevemente em nossas análises e sempre no mesmo horário do ciclo dia-noite do planeta."
 extreme_frontiers.180.title: "Enxames Insectoides"
 extreme_frontiers.180.desc: "As nuvens negras incomuns de §Y[from.GetName]§! são, na verdade, densos enxames de grandes insetos carnívoros.\n\nEsses predadores alados fazem ninhos nas fissuras das rochas e emergem uma vez por dia para devorar quaisquer matérias orgânicas disponíveis na superfície do planeta.\n\nGraças a seu metabolismo poderoso que reverte a deterioração celular ao se alimentarem, esses artrópodes podem prolongar sua vida indefinidamente, contanto que tenham nutrientes para consumir regularmente."
 extreme_frontiers.180.desc.altered_metabolism: "Durante a análise de campo, [Leader.GetName] teve uma parte do corpo mordida por um dos espécimes, provocando uma resposta metabólica notável. Essa espécie singular tem muito a nos ensinar sobre as capacidades regenerativas de células orgânicas."
 extreme_frontiers.180.b: "Desenterre e consuma todos."
 leader_trait_altered_metabolism: "Metabolismo Alterado"
 leader_trait_altered_metabolism_desc: "Exposição a agentes exógenos no trabalho de campo deixou um impacto duradouro neste líder."
 # SUBGLACIAL VIBRATIONS
 SUBGLACIAL_VIBRATIONS_CAT: "Vibrações Subglaciais"
 subglacial_vibrations_desc: "Abaixo da superfície gélida e sem vida de §Y[from.GetName]§! existe um vasto oceano glacial. Vibrações intensas e profundas foram detectadas debaixo do pergelissolo que não são sísmicas em sua origem."
 extreme_frontiers.190.title: "Pinípedes Gigantescos"
 extreme_frontiers.190.desc: "Uma combinação de ecolocalização em águas profundas e telemetria sísmica localizou a fonte das vibrações em §Y[from.GetName]§!. Em seu oceano de nitrogênio líquido subglacial residem manadas de pinípedes que se adaptaram à vida nesse ambiente hostil.\n\nEssas criaturas incríveis têm tamanho e peso equivalente ao de uma pequena nave de transporte. Como forma de comunicação, elas emitem poderosos zumbidos de baixa frequência que reverberam em uma escala planetária. Uma camada especial de gordura subcutânea rica em colágeno os protege de queimaduras criogênicas e congelamento enquanto simultaneamente amplifica seus chamados pelo mar.\n\nDada a falta de predadores naturais nesse ecossistema isolado, esses animais enormes são curiosos, extremamente dóceis e poderão ser facilmente atraídos para a superfície se reproduzirmos suas vocalizações idiossincráticas."
 extreme_frontiers.190.a: "Uma descoberta peculiar."
 extreme_frontiers.190.a.tt: "Libera a Construção: ['building:building_pinniped_sanctuary']"
 extreme_frontiers.190.b: "Presa fácil."
 building_pinniped_sanctuary: "Santuário de Pinípedes"
 building_pinniped_sanctuary_desc: "Um santuário para pinípedes gigantescos capturados nos oceanos de nitrogênio líquido de [event_target:pinnipeds_home_planet.GetName]."
 # ELECTRIC WATERS
 ELECTRIC_WATERS_CAT: "Águas Elétricas"
 electric_waters_desc: "Análises orbitais de §Y[from.GetName]§! detectaram sinais elétricos erráticos vindos das profundezas dos oceanos gelados do planeta.\n\nUm estudo mais detalhado desse fenômeno aquático pode revelar mais informações."
 extreme_frontiers.200.title: "Coral de Alta Tensão"
 extreme_frontiers.200.desc: "A fonte das correntes elétricas profundas no oceano de §Y[from.GetName]§! foram identificadas por §Y[Leader.GetName]§!.\n\nO leito oceânico é o lar de uma espécie complexa de coral de água gelada com capacidades eletrogenéticas. A espécie usa organelas especializadas para gerar correntes e atrair microrganismos como uma forma de alimentação e comunicação.\n\nNossas sondas de inspeção estão agindo como estimulantes para o coral, que reage ao aumento de produção elétrica sempre que mudamos a frequência de transmissão.\n\nAo modular cuidadosamente nossas interações com essa espécie marinha, poderemos aumentar a produção de energia do planeta sem perturbar seu ecossistema delicado."
 # OBSIDIAN PLANET
 OBSIDIAN_PLANET_CAT: "Paisagem Reluzente"
 obsidian_planet_desc: "Análises visuais de §Y[from.GetName]§! mostram extensas camadas continentais de obsidiana revestindo as superfícies áridas do planeta, com fortes traços de enxofre na atmosfera superior.\n\nUma inspeção geológica mais aprofundada nos trará mais informações."
 extreme_frontiers.210.title: "Deserto de Obsidiana"
 extreme_frontiers.210.desc: "Com base na análise sedimentar de §Y[from.GetName]§! nós descobrimos que esse mundo, uma vez vulcânico, já foi vítima de um evento congelante repentino, transformando a lava na superfície em vidro vulcânico polido.\n\nAs várias crateras na superfície do planeta sugerem que isso foi causado por um corpo celestial externo, como uma tempestade de meteoros. Dentro dessas formações de obsidiana, enormes bolhas de gases sulfúricos estão presas nas fendas vulcânicas, agora seladas pelo congelamento repentino.\n\nPor meio de coleta precisa, seremos capazes de extrair esses recursos para o nosso próprio uso."
 # SHEARING FORCE
 SHEARING_FORCE_CAT: "Comunicações Perdidas"
 shearing_force_desc: "Sondas de observação lançadas na atmosfera de §Y[from.GetName]§! cessaram toda a comunicação. O local exato de nosso equipamento é desconhecido no momento.\n\nUma investigação mais detalhada do planeta é necessária para recuperar os dados."
 extreme_frontiers.220.title: "Força de Cisalhamento"
 extreme_frontiers.220.desc: "Nós identificamos a causa do desaparecimento de nossas sondas em §Y[from.GetName]§!.\n\nAs várias camadas gasosas que compõem a atmosfera do planeta exibem diferenciais dramáticos de temperatura. Essas variações drásticas criam uma forte contracorrente enquanto camadas de gás se movem violentamente em direções opostas.\n\nCombinado à densidade contrastante de cada gás, isso gera forças de cisalhamento catastróficas que rasgam qualquer coisa transitando entre as camadas atmosféricas.\n\nAgora que sabemos o que esperar, nosso equipamento pode ser adaptado para resistir a essas condições extremas, nos permitindo explorar as forças cinéticas desse fenômeno natural."
 # MISSING MASS
 MISSING_MASS_CAT: "Massa Perdida"
 missing_mass_desc: "Leituras da massa de §Y[from.GetName]§! estão bem abaixo do esperado para um planeta rochoso deste tamanho. Recomenda-se mais investigações."
 extreme_frontiers.230.title: "Anelídeos do Manto Profundo"
 extreme_frontiers.230.desc: "Inspeções mais minuciosas da geologia de §Y[from.GetName]§! revelaram que seu manto de silicato contém uma rede vasta de tocas subterrâneas.\n\nSondas exploratórias revelaram que esses buracos são o lar de uma espécie de anelídeo que habita o manto profundo e subsiste se alimentando da rocha de silicato. Grandes colônias dessas criaturas devoram o planeta por dentro, ejetando os dejetos digeridos para a órbita, onde são varridos por ventos cósmicos.\n\nExterminar esses anelídeos pode permitir que nossa equipe de [controller.GetMinerPlural_lower] tenha acesso à extensiva quantidade de minério de silicato facilmente acessível."
 extreme_frontiers.230.desc.terravore: "$extreme_frontiers.230.desc$ O apetite das criaturas é impressionante, e não é tão diferente do nosso."
 extreme_frontiers.230.a: "Inicie as perfuratrizes."
 extreme_frontiers.230.b: "Estude essas criaturas fascinantes."
 # LIFE IN DARKNESS
 LIFE_IN_DARKNESS_CAT: "Vida nas Trevas"
 life_in_darkness_desc: "§Y[from.GetName]§! está gravitacionalmente travado, com metade do planeta mergulhado em uma escuridão permanente. Análises de infravermelho indicam que essa zona sem luz e deficiente em nutrientes é lar de um ecossistema orgânico ativo."
 extreme_frontiers.240.title: "Evolução Translúcida"
 extreme_frontiers.240.desc: "O lado permanentemente escuro de §Y[from.GetName]§! permitiu o surgimento de um ambiente evolutivo peculiar para os poucos organismos capazes de sobreviver nesse mundo hostil.\n\nGraças a uma variação cromossômica singular, a fauna local é completamente translúcida, não possui visão e utiliza formas sofisticadas de ecolocalização para se perpetuar."
 extreme_frontiers.240.desc.non_homicidal: "$extreme_frontiers.240.desc$ Essas adaptações impressionantes são de grande interesse para nossa equipe de [controller.GetResearcherPlural_lower]."
 extreme_frontiers.240.a: "Esclarecedor."
 extreme_frontiers.240.b: "Eles serão consumidos."
 extreme_frontiers.240.c: "Extermine-os."
 # RAINBOW RIVERS
 RAINBOW_RIVERS_CAT: "Rios Fluorescentes"
 rainbow_rivers_desc: "Análises preliminares de §Y[from.GetName]§! mostram rios fluorescentes pela superfície do planeta que continuamente mudam de cor por todo o espectro cromático.\n\nNovos estudos nos dirão mais sobre esse fenômeno incomum."
 extreme_frontiers.250.title: "Quimiossíntese Colorida"
 extreme_frontiers.250.desc: "Análises dos rios fluorescentes de §Y[from.GetName]§! revelaram que eles são o lar de uma espécie peculiar de vida microbiana.\n\nUsando a quimiossíntese para metabolizar compostos nocivos, essas criaturas geram bioprodutos altamente reativos que alteram a composição química do rio, causando alterações de cores radicais.\n\nServindo como um meio de comunicação, os tons neon vibrantes que elas criam são usados para sinalizar que estão em estado fértil, atraindo parceiros conforme viajam através das correntes tóxicas do planeta.\n\nContinuar estudando o ciclo de vida dessas criaturas fornecerá uma ótima oportunidade de pesquisa para nossa equipe de [controller.GetResearcherPlural_lower]."
 # GASEOUS METALS
 GASEOUS_METALS_CAT: "Metais Gasosos"
 gaseous_metals_desc: " A atmosfera de §Y[from.GetName]§! é composta principalmente de diversos metais em estado gasoso. Com uma melhor compreensão das condições severas desse planeta, talvez possamos extrair esses compostos valiosos."
 extreme_frontiers.260.title: "Nuvens de Eletrodeposição"
 extreme_frontiers.260.desc: "A atmosfera incomum de §Y[from.GetName]§! prendeu grandes quantidades de radiação solar, causando um efeito cascata no aquecimento planetário de tal maneira que os metais existem em forma gasosa e volátil.\n\nEsses compostos reagem instantaneamente com qualquer equipamento de inspeção que enviamos, revestindo-o com uma fina, mas durável camada de liga metálica. Supreendentemente, esse processo não é destrutivo.\n\n§Y[leader.GetName]§! acredita que essa eletrodeposição natural pode ser explorada para melhorar a resistência tênsil dos cascos das naves por todo o território de §Y[controller.GetName]§!."
 ATMOSPHERIC_ELECTROPLATING: "Eletrodeposição Atmosférica"
 ATMOSPHERIC_ELECTROPLATING_DESC: "Enviar objetos para a atmosfera gasosa e metálica de §Y[from.GetName]§! resulta em uma forma de eletrodeposição natural.\n\nEsse processo peculiar é extremamente eficaz, e com estudos adicionais poderá ser replicado para aprimorar a durabilidade dos cascos das naves em todo o território de [Root.Owner.GetName]."
 extreme_frontiers.265.title: "Metal de Alto Desempenho"
 extreme_frontiers.265.desc: "Encontramos uma forma de replicar o incomum processo de eletrodeposição da atmosfera volátil de §Y[from.From.GetName]§! em escala industrial.\n\nUtilizando o que aprendemos, nossa equipe de [Root.Owner.GetEngineerPlural] agora pode aumentar significativamente a durabilidade de certos metais sem sacrificar a flexibilidade ou adicionar peso.\n\nEsses métodos avançados podem ser aplicados aos nossos processos de construção de naves."
 # CARBON ALLOTROPES
 CARBON_ALLOTROPES_CAT: "Alótropos de Carbono"
 carbon_allotropes_desc: "Dados de espectroscopia de §Y[from.GetName]§! indicam uma composição planetária rica em um raro e complexo alótropo de carbono. É necessária uma inspeção mais detalhada para uma categorização mais completa."
 extreme_frontiers.270.title: "Formações de Grafeno"
 extreme_frontiers.270.desc: "Depósitos abundantes de grafeno foram encontrados em §Y[from.GetName]§!. Esse raro alótropo de carbono possui apenas uma molécula de espessura, mas apresenta resistência e condutividade incomparáveis.\n\nEsse valioso nanomaterial se forma naturalmente na superfície deste §YMundo de Carbono§! graças à deposição química de vapor inerente à atmosfera incomum do planeta."
 extreme_frontiers.270.a: "Extraia o material."
 # DIAMOND DUST
 DIAMOND_DUST_CAT: "Massa de Alta Velocidade"
 diamond_dust_desc: "Análises de massa em §Y[from.GetName]§! revelam altas concentrações de matéria física em rápida movimentação, localizadas nas profundezas da baixa troposfera.\n\nÉ difícil confirmar a origem dessas leituras incomuns sem uma investigação mais detalhada."
 extreme_frontiers.280.title: "Tempestades de Diamantes"
 extreme_frontiers.280.desc: "Identificamos a fonte das leituras incomuns de massa em §Y[from.GetName]§!.\n\nA atmosfera do planeta é composta principalmente de gás metano rico em carbono, que se solidifica em estruturas de diamante ultradensas à medida que a pressão gravitacional aumenta. Devido aos intensos ciclos de tempestades do planeta, esse fenômeno dá origem a tempestades que carregam os diamantes em alta velocidade.\n\nEmbora esses diamantes sejam fáceis de extrair para nossas necessidades, §Y[leader.GetName]§! está confiante de que uma análise mais detalhada de sua densidade e pureza trará resultados valiosos adicionais."
 ATMOSPHERIC_DIAMONDS_PROJECT: "Diamantes Atmosféricos"
 ATMOSPHERIC_DIAMONDS_PROJECT_DESC: "Ao estudar as tempestades ultradensas de diamante em §Y[from.GetName]§!, estamos confiantes de que suas propriedades peculiares podem ser usadas para tecnologias de laser avançadas."
 extreme_frontiers.285.title: "Precisão de Diamante"
 extreme_frontiers.285.desc: "A pesquisa de §Y[leader.GetName]§! sobre os diamantes ultradensos de §Y[from.From.GetName]§! foi concluída.\n\nO processo de compressão que cria esses diamantes resulta em uma trama cristalina única. Isso os torna extremamente eficientes em isolar e amplificar oscilações de luz de alta frequência.\n\nEssa descoberta trará grandes benefícios para o nosso império."
 # ETREME GEOLOGICAL TENSION
 GEOLOGICAL_TENSION_CAT: "Tensão Geológica Extrema"
 geological_tension_desc: "Análises geológicas de §Y[from.GetName]§! sugerem que a crosta planetária desse mundo derretido está sob imensa pressão de forças tectônicas acumuladas. Um evento geológico significativo talvez seja inevitável."
 extreme_frontiers.290.title: "Supervulcão Bloqueado"
 extreme_frontiers.290.desc: "Depois de um estudo mais aprofundado em torno da tensão sísmica extrema em §Y[from.GetName]§!, descobrimos que um supervulcão colossal está bloqueado por um cone parcial superior colapsado.\n\nGrandes reservas de magma preencheram todas as câmaras subterrâneas e estão exercendo imensa pressão para cima contra o bloqueio na fissura principal. O material colapsado está atualmente contendo o magma, mas é impossível prever quanto tempo esse equilíbrio delicado ainda resistirá.\n\nA rocha derretida presa é excepcionalmente rica em metais raros e compostos minerais complexos. §Y[leader.GetName]§! acredita que podemos extrair recursos com segurança ao proporcionar uma erupção controlada."
 extreme_frontiers.290.a: "Desbloqueie a fissura."
 extreme_frontiers.290.b: "Faça bom uso da atividade geotérmica."
 CONTROLLED_ERUPTION_PROJECT: "Erupção Controlada"
 CONTROLLED_ERUPTION_PROJECT_DESC: "Um supervulcão bloqueado em §Y[from.GetName]§! está contendo vastas reservas de um magma rico em minerais debaixo da superfície. Realizar uma erupção controlada nos permitiria extrair esses recursos aprisionados."
 extreme_frontiers.295.title: "Megaerupção"
 extreme_frontiers.295.desc: "Ao perfurar uma série de poços artificiais em vários pontos do cone externo do supervulcão de §Y[from.From.GetName]§!, enfraquecemos sua estrutura até que ele não fosse mais capaz de conter o enorme acúmulo de magma abaixo.\n\nQuando o ponto de ruptura foi alcançado, os resultados foram espetaculares. A seção superior do vulcão foi completamente obliterada na medida em que a rocha derretida sob altíssima pressão explodiu para cima.\n\nDirecionamos a lava para canais cuidadosamente preparados, onde será coletada por equipamentos de mineração especializados."
 extreme_frontiers.295.a.default: "Espetacular."
 extreme_frontiers.295.a.machine: "Operação realizada com êxito."
 # LAYERED ATMOSPHERE
 LAYERED_ATMOSPHERE_CAT: "Erupção Gigante"
 layered_atmosphere_desc: "Análises de §Y[from.GetName]§! detectaram erupções esporádicas de gases inflamáveis em todo o planeta, apresentando desafios para inspeções remotas.\n\nUma investigação mais aproximada é necessária."
 extreme_frontiers.300.title: "Atmosfera Estratificada"
 extreme_frontiers.300.desc: "§Y[leader.GetName]§! descobriu a fonte das erupções voláteis em §Y[from.GetName]§!.\n\nA atmosfera desse gigante gasoso se formou de tal maneira que uma camada de hidrogênio líquido metálico está suspensa entre a gasosa mesosfera e estratosfera. A composição densa de gás metano na camada mais baixa mantém esse fluido flutuando.\n\nCom o tempo, descargas elétricas se acumulam dentro do hidrogênio metálico, agitando a subcamada. Depois de um acúmulo crítico de pressão, erupções gasosas expelem um líquido altamente condutor para a atmosfera superior, dissipando-a através do planeta antes de se reassentar.\n\nNossos sistemas de rastreamento podem facilmente monitorar essas alterações de pressão, permitindo-nos extrair esses recursos valiosos."
 # SOLIDIFIED PLASMA TRAILS
 PLASMA_TRAILS_CAT: "Surtos Erráticos"
 plasma_trails_desc: "Picos de energia irregulares estão sendo detectados ao longo das falhas tectônicas de §Y[from.GetName]§!.\n\nA origem desses surtos não pode ser determinada da órbita. Será necessário um estudo mais detalhado para identificar a fonte desse fenômeno."
 extreme_frontiers.310.title: "Rastros Sólidos de Plasma"
 extreme_frontiers.310.desc: "A análise geológica de §Y[from.GetName]§! identificou a fonte dos picos de energia erráticos detectados durante as inspeções orbitais iniciais.\n\nA atividade tectônica volátil do planeta produz descargas eletrostáticas em regiões com tundras congeladas instáveis.\n\nEsses relâmpagos vulcânicos irrompem em direção ao céu, transformando o ar ao redor em plasma. O calor extremo liberado por esse evento produz um choque termal que então se solidifica em estruturas em formato de raio.\n\nUsando o que aprendemos com a análise geológica, seremos capazes de prever facilmente essas erupções sísmicas e explorar esse fenômeno para nossos próprios interesses."
 # CRYSTALLINE PLAINS
 CRYSTALLINE_PLAINS_CAT: "Atividade Criovulcânica"
 crystalline_plains_desc: "A análise tectônica de §Y[from.GetName]§! revelou atividades criovulcânicas significativas de natureza anômala por todo o planeta."
 extreme_frontiers.320.title: "Planícies Cristalinas"
 extreme_frontiers.320.desc: "Inspeções geológicas detalhadas de §Y[from.GetName]§! revelaram rios semicongelados de amônia correndo debaixo da crosta congelada. Pressões geotérmicas crescentes projetam essa substância através de fissuras na superfície quebradiça.\n\nEssas erupções cospem uma mistura volátil e perigosa de vapores e lama de amônia pela superfície do planeta. Congelando outra vez quando exposta às temperaturas extremas da superfície, essa lama cria planícies de cristais valiosos e que podem ser facilmente extraídos."
 # SUPERMASSIVE GIANT
 SUPERMASSIVE_GIANT_CAT: "Gigante Supermassivo"
 supermassive_giant_desc: "§Y[from.GetName]§! é um gigante gasoso supermassivo cujo poço gravitacional atraiu milhares de objetos para dentro de sua órbita. Catalogá-los pode vir a ser útil."
 extreme_frontiers.330.title: "Lixo Espacial"
 extreme_frontiers.330.desc: "§Y[from.GetName]§! tem uma variedade de luas pequenas, asteroides e destroços espaciais presos dentro de sua órbita. A datação de isótopos radioativos indica que esses objetos foram todos capturados pelo poço gravitacional do planeta quando passavam pelo sistema há milhares de anos.\n\nApós catalogar esses objetos, descobrimos algumas sondas de inspeção antigas e bastante simples que são um indício de uma civilização dando seus primeiros passos rumo à expansão espacial.\n\nA maior parte dos bancos de dados está corrompida ou fisicamente danificada graças à colisão entre os objetos, mas um deles contém uma série de imagens da superfície de [from.GetName] ao longo de centenas de anos de registros."
 extreme_frontiers.330.a: "Um achado fascinante."
 extreme_frontiers.330.b: "Transforme-os em sucata."
 # INVISIBLE PLANET
 INVISIBLE_PLANET_CAT: "Irregularidade Orbital"
 invisible_planet_desc: "Uma pequena oscilação recorrente foi observada na trajetória orbital de §Y[from.GetName]§!, sugerindo que o planeta está frequentemente sujeito a uma força gravitacional desconhecida.\n\nEstudos mais aprofundados acerca da região são recomendados."
 extreme_frontiers.340.title: "Planeta Invisível"
 extreme_frontiers.340.desc: "Análises adicionais de §Y[from.solar_system.GetName]§! revelaram que todas as órbitas planetárias do sistema exibem irregularidades semelhantes.\n\nApós a triangulação das forças gravitacionais implícitas nesses movimentos incomuns, descobrimos a causa: um planeta até então invisível, agora conhecido como §Y[invisible_planet.GetName]§!.\n\nEsse mundo tem uma superfície especial composta de partículas de carbono negro que não refletem luz nem ondas de rádio, tornando-o praticamente invisível para scanners de longo alcance.\n\nEsses polímeros naturais apresentam propriedades de absorção extraordinariamente eficientes."
 extreme_frontiers.340.desc.default: "$extreme_frontiers.340.desc$ Esse material apresenta uma oportunidade única de pesquisa."
 extreme_frontiers.340.desc.first_contact: "$extreme_frontiers.340.desc$ Eles serão extraídos e estudados pelo seu possível uso como material de camuflagem."
 # SURVIVAL POD
 SURVIVAL_POD_WARM_CAT: "Estação de Campo Reutilizada"
 SURVIVAL_POD_COLD_CAT: "Estação de Campo Reutilizada"
 survival_pod_desc: "Varreduras da superfície inóspita de §Y[from.GetName]§! revelaram a reutilização de uma estação de campo, originalmente um laboratório de pesquisa temporário que há muito ultrapassou seu tempo de uso previsto. Uma fraca radiação de calor sugere que partes da instalação continuam ativas."
 extreme_frontiers.350.title: "Sobrevivente Solitária"
 extreme_frontiers.350.desc: "Uma expedição de superfície em §Y[from.GetName]§! localizou a estação de campo adaptada e sua única ocupante.\n\nIdentificando-se como uma cientista exilada que suportou as adversidades deste mundo cruel por anos, ela ofereceu suas habilidades a [root.Owner.GetName] em troca de resgate."
 extreme_frontiers.350.a: "Sua experiência é um ativo valioso."
 extreme_frontiers.350.b: "Dê-lhe uma nave de transporte e suprimentos."
 extreme_frontiers.350.c: "Deixe-a a sós e observe."
 extreme_frontiers.350.d: "Adorável. Destrua seu abrigo."
 extreme_frontiers.352.title: "$NAME_survivalist_scru$"
 extreme_frontiers.352.desc: "Um indivíduo [scru_species.GetClass] muito magro saiu de sua estação de campo convertida em habitat. Com uma voz áspera, ela falou de seu sofrimento em §Y[from.From.GetName]§!, e as palavras chegavam entrecortadas.\n\n\"Perdoem-me. Faz anos que... não falo com alguém...\""
 extreme_frontiers.352.a: "Como você acabou presa aqui?"
 extreme_frontiers.352.a.response: "Eu estava inspecionando [from.From.GetName], catalogando a rocha matriz única. Minha tripulação disse que faria uma varredura rápida em nossa nave de exploração. Eu acreditei neles. Só depois de alguns dias de preocupação eu percebi o que tinha acontecido. Eles partiram de volta para casa."
 extreme_frontiers.352.b: "Como você sobreviveu por tanto tempo?"
 extreme_frontiers.352.b.response: "Ah, é incrível o que se pode fazer ao modificar a permeabilidade celular e hiperexpressar proteínas de choque térmico... Depois disso, foi simples induzir macroautofagia nas minhas células modificadas e, graças ao conteúdo de sódio deste mundo, eu pude gerar várias refeições saborosas."
 extreme_frontiers.352.c: "Você não quer se reunir com seu povo?"
 extreme_frontiers.352.c.response: "Eles não merecem as descobertas que eu fiz nesta rocha. Não me importo em descobrir quais razões ardilosas eles tinham para me abandonar."
 extreme_frontiers.352.d: "O que você pode fazer por nós?"
 extreme_frontiers.352.d.response: "Estou cansada de trabalhar em um laboratório improvisado. Eu quero ver novos mundos... do espaço."
 extreme_frontiers.352.e: "Recrute $NAME_survivalist_scru$"
 extreme_frontiers.352.e.custom_tooltip: "§Y$NAME_survivalist_scru$§! une-se ao nosso império como §HLíder§!."
 NAME_survivalist_scru: "Scru"
 survivalist_scru_desc: "Cientista de talento com habilidades de sobrevivência aperfeiçoadas em ambientes extremos."
 leader_trait_hardened_survivalist: "Sobrevivencialista Experiente"
 leader_trait_hardened_survivalist_desc: "Este líder tem um conhecimento incomparável de ambientes inóspitos."
 # Infernal Tornadoes
 INFERNAL_TORNADOES_CAT: "Temperaturas Extremas"
 infernal_tornadoes_desc: "Análises de §H[from.GetName]§! mostram uma enorme faixa de tempestades migratórias de alta pressão.\n\nEssas tempestades emitem assinaturas de calor extremamente voláteis. Uma pesquisa direcionada será necessária para revelar se a causa é natural ou uma forma de vida desconhecida até agora."
 extreme_frontiers.360.title: "Tornados de Fogo"
 extreme_frontiers.360.desc: "A fonte das assinaturas de calor extremas em §H[from.GetName]§! foi descoberta.\n\nPor todo o planeta, gêiseres emitem gás de hidrogênio altamente inflamável do fundo da superfície. Conforme esses gêiseres entram em erupção, o calor do planeta incendeia o gás, resultando em enormes pilares de fogo explodindo em direção aos céus.\n\nQuando combinado com a pressão atmosférica, isso cria correntes de ar extremamente voláteis, lançando fluxos de fogo rodopiando pela paisagem na forma de gigantescos tornados flamejantes.\n\nEmbora seja um fenômeno natural devastador, nossa equipe de [Root.Owner.GetResearcherPlural_lower] acredita que esses tornados e a quantidade enorme de energia cinética que eles geram podem ser recriados artificialmente para uso prático."
 INFERNAL_CATALYSTS_PROJECT: "Catalisadores Infernais"
 INFERNAL_CATALYSTS_PROJECT_DESC: "Após estudar as condições por trás dos tornados flamejantes de §H[from.GetName]§! mais de perto, os benefícios desse fenômeno puderam ser recriados em um ambiente controlado."
 extreme_frontiers.365.title: "Ressonadores Piroclástico"
 extreme_frontiers.365.desc: "§Y[from.Leader.GetName]§! conseguiu encontrar uma maneira de recriar e canalizar, em um ambiente controlado, os tornados flamejantes encontrados em §Y[from.From.GetName]§!.\n\nCom essa descoberta, seremos capazes de usar nossas bases estelares para aumentar a produção de energia em quaisquer Mundos Derretidos que se encontrem no mesmo sistema."
 extreme_frontiers.365.desc.has_furnace: "Essa teoria científica compartilha muitos paralelos com nosso entendimento sobre §HFornalhas Arc§!, trazendo novas possibilidades de construção extramundo."
 extreme_frontiers.365.desc.default: "A teoria científica por trás dessa descoberta tem várias aplicações voltadas para o desenvolvimento da tecnologia de §HFornalhas Arc§!, e nossa equipe de [Root.Owner.GetEngineerPlural] está pronta para começar a aplicar a teoria no desenvolvimento prático"
 tech_pyroclastic_resonation: "Ressonância Piroclástica"
 tech_pyroclastic_resonation_desc: "Ao canalizar a energia térmica extrema encontrada em Mundos Derretidos, nossas bases estelares podem aumentar sua produção de energia em um sistema com eficiência excepcional."
 sm_pyroclastic_resonator: "Ressonador Piroclástico"
 sm_pyroclastic_resonator_desc: "Ressonadores termais que podem aumentar a produção de energia de qualquer Mundo Derretido em um sistema estelar.\nA produção de $i_energy$ aumenta de acordo com a quantidade de ['concept_pc_molten', Mundos Derretidos] no sistema."
 # MAGMA MEGAFAUNA
 MAGMA_MEGAFAUNA_CAT: "Geografia Instável"
 magma_megafauna_desc: "Análises de §Y[from.GetName]§! mostram partes da superfície planetária se deslocando continuamente através de longas distâncias.\n\nEstudos minuciosos são necessários para entender esse fenômeno geológico incomum."
 extreme_frontiers.370.title: "Megafauna Derretida"
 extreme_frontiers.370.desc: "As análises das anomalias tectônicas em §Y[from.GetName]§! as atribuíram à presença de grandes manadas de megafauna baseada em silício.\n\nMigrando por grandes distâncias, essas criaturas enormes submergem periodicamente nos lagos de lava do planeta para coletar sua comida favorita: um sedimento rochoso rico em §Hpartículas voláteis§!. Ao rastrear seus padrões migratórios, seremos capazes de extrair esses sedimentos para nossas próprias necessidades com o mínimo de impacto no ecossistema do planeta.\n\nSuas grossas carapaças externas são capazes de suportar as temperaturas extremas, e um estudo mais aprofundado e detalhado de seu ciclo de vida poderá gerar resultados fascinantes."
 LAVA_DIVERS_PROJECT: "Mergulhadores de Lava"
 LAVA_DIVERS_PROJECT_DESC: "A megafauna de §Y[from.GetName]§! é capaz de sobreviver ao ambiente hostil de seu Mundo Derretido e submergir profundamente nas grandes reservas de magma abaixo da superfície do planeta.\n\nEstudar a carapaça dessas criaturas talvez nos dê um novo entendimento sobre como lidar com calor extremo."
 extreme_frontiers.375.title: "Blindagem Forjada em Magma"
 extreme_frontiers.375.desc: "Um estudo aprofundado da megafauna peculiar em §Y[from.From.GetName]§! revelou descobertas sobre termodinâmica transferível que podem ser aplicadas em nossos estaleiros.\n\nA dieta infundida com partículas das criaturas resulta na formação de uma estrutura pesada à base de silicatos em suas carapaças externas duráveis, reforçadas com materiais refratários naturais.\n\nApós a coleta de numerosas amostras de suas camadas externas descartadas, nossa equipe de [Root.Owner.GetEngineerPlural] agora pode replicar seus princípios biomecânicos no desenvolvimento de nossas próprias placas de casco."
 # PLANET THRUSTERS
 PLANET_THRUSTERS_CAT: "Equipamento Suspenso"
 planet_thrusters_desc: "Suspensa na atmosfera superior de §Y[from.GetName]§! há uma série de máquinas cilíndricas. Elas parecem inativas e desprovidas de qualquer tripulação."
 extreme_frontiers.380.title: "Propulsores Planetários"
 extreme_frontiers.380.desc: "Cada uma das máquinas abandonadas encontradas em §Y[from.GetName]§! são componentes singulares de propulsores. Ao todo, são mais de mil presentes na atmosfera superior.\n\nFeitos de um material especialmente elaborado, esses dispositivos de fusão complexa foram projetados para a ingestão de gás de hidrogênio do planeta abaixo para ser utilizado como combustível e gerar uma propulsão significativa. A maioria mostra sinais de dano por sobrecarga.\n\nNossas análises revelam que todas as máquinas estão posicionadas de tal maneira que essa propulsão exerceria força contra o próprio planeta, sugerindo que esse equipamento antigo foi originalmente implantado em uma tentativa de alterar a órbita planetária.\n\nEmbora não sejam mais úteis para uma tarefa tão monumental, podemos reutilizar os modelos menos danificados para queimar as camadas gasosas do planeta e expor seu núcleo rico em minerais."
 extreme_frontiers.380.a: "Transforme-os em sucata."
 extreme_frontiers.380.b: "Reutilize os dispositivos."
 REPURPOSE_THRUSTERS_PROJECT: "Reutilizar os Propulsores Planetários"
 REPURPOSE_THRUSTERS_PROJECT_DESC: "Ao reutilizar os propulsores planetários danificados espalhados por §Y[from.GetName]§!, poderemos queimar o hidrogênio do gigante gasoso, deixando apenas um núcleo rochoso explorável."
 extreme_frontiers.385.title: "Gases Dissipados"
 extreme_frontiers.385.desc: "Fomos capazes de consertar alguns dos propulsores planetários danificados de §Y[from.From.GetName]§! e calibrá-los para exercerem forças equivalentes em sentidos opostos.\n\nUma vez ativada, essa fusão poderosa extraiu hidrogênio numa frequência exponencial, queimando a atmosfera gasosa do planeta e expondo seu núcleo rico em minerais, embora ainda esteja sob temperaturas extremas."
 extreme_frontiers.385.tt: "Modificador §Y$chthonian_planet$§! adicionado"
 extreme_frontiers.385.a: "Impressionante."
 # BACKWARDS ORBIT
 BACKWARDS_ORBIT_CAT: "Órbita Retrógrada"
 backwards_orbit_desc: "§Y[from.GetName]§! orbita sua estrela na direção reversa em comparação com os outros planetas do sistema, indicando que ele não se formou aqui ao mesmo tempo que os outros corpos celestes.\n\nMais investigações são necessárias para entender as origens desse planeta."
 extreme_frontiers.390.title: "Planeta Errante"
 extreme_frontiers.390.desc: "A composição de §Y[from.GetName]§! não condiz com outros planetas na sua proximidade. Entretanto, corresponde perfeitamente à de vários corpos celestes no sistema vizinho, §Y[event_target:wandering_planet_origin.GetName]§!, indicando sua origem verdadeira.\n\nA superfície do planeta é marcada por uma grande cratera, nos levando a suspeitar que ele foi desalojado de sua órbita original por uma colisão com um asteroide gigantesco. O planeta solitário à deriva foi então capturado pelo poço gravitacional de [from.System.Star.GetName], onde assumiu sua órbita retrógrada incomum.\n\nEsse planeta fascinante residiu em dois sistemas diferentes desde a sua formação, provendo uma rica oportunidade para demais estudos."
 # VAPOR PLUMES
 VAPOR_PLUMES_CAT: "Colunas de Vapor"
 vapor_plumes_desc: "Milhares de colunas de vapor anômalas foram observadas despontando da superfície de §Y[from.GetName]§! e estendendo-se para os limites superiores de sua atmosfera fina.\n\nUma maior investigação desse fenômeno é recomendada."
 extreme_frontiers.400.title: "Gêiseres Criovulcânicos"
 extreme_frontiers.400.desc: "As colunas de vapor observadas em §Y[from.GetName]§! são causadas pela intensa atividade criovulcânica nas profundezas do manto inferior, expelindo vastas nuvens de gás nitrogênio e amônia para cima.\n\nAs colunas sobem verticalmente até alcançarem os limites da atmosfera do planeta, onde os ventos solares fazem com que se achatem abruptamente.\n\nAo estudar as pequenas variações na composição química dessas formações gasosas únicas, poderemos aprender mais sobre os complexos processos geológicos do núcleo do planeta."
 # FIBROUS ATMOSPHERE
 FIBROUS_ATMOSPHERE_CAT: "Inspeção Corrompida"
 fibrous_atmosphere_desc: "Análises iniciais de §Y[from.GetName]§! estão retornando em um estado corrompido que nossos sensores são incapazes de interpretar. A fonte dessa interferência permanece desconhecida, e uma inspeção mais aprofundada talvez seja necessária."
 extreme_frontiers.410.title: "Atmosfera Fibrosa"
 extreme_frontiers.410.desc: "Uma inspeção detalhada de §Y[from.GetName]§! revelou a fonte da corrupção de dados em nossas análises iniciais.\n\nNuvens densas de minerais fibrosos constituem a atmosfera superior. Esses filamentos longos e sinuosos se originam nas camadas inferiores do gigante gasoso, sendo em seguida estirados pela alta pressão do ambiente para formar nuvens de minerais com alta condutividade.\n\nAcumulando energia eletroestática conforme circulam pela atmosfera, essas fibras soltam descargas periodicamente. Poderíamos extrair esses recursos facilmente para nossas próprias necessidades."
 # EXPLODING SKIES
 EXPLODING_SKIES_CAT: "Picos de Calor Intenso"
 exploding_skies_desc: "Análises de §Y[from.GetName]§! estão rastreando um fenômeno meteorológico extremo com picos esporádicos, mas intensos de calor distribuídos pela sua superfície.\n\nIsso exige uma investigação mais aprofundada."
 extreme_frontiers.420.title: "Horizonte Explosivo"
 extreme_frontiers.420.desc: "Observações detalhadas de §Y[from.GetName]§! revelaram a causa dos picos de calor meteorológicos.\n\nFendas geotermais e gêiseres espalhados pela superfície ejetam gases altamente inflamáveis que se acumulam na atmosfera. Descargas eletrostáticas agem como faíscas para a ignição, causando frentes climáticas explosivas que devastam os céus desse mundo.\n\nEssas reações deram à nossa equipe de [Root.Owner.GetEngineerPlural] novas perspectivas sobre a combustão termodinâmica, com aplicações úteis para o sistema de propulsão de nossas frotas."
 extreme_frontiers.420.desc.traumatized: "Infelizmente, a natureza nociva dessa pesquisa deixou [leader.GetName] com traumas profundos."
 extreme_frontiers.420.desc.maimed: "Infelizmente, a natureza nociva dessa pesquisa deixou [leader.GetName] com feridas profundas."
 # CHTHONIAN PRESERVATION
 CHTHONIAN_PRESERVATION_CAT: "Biomassa Chthoniana"
 chthonian_preservation_desc: "Inspeções revelaram que §Y[from.GetName]§! é um planeta chthoniano, um antigo gigante gasoso que perdeu sua atmosfera para a intensa radiação de §Y[from.System.Star.GetName]§!.\n\nApesar disso, traços quase imperceptíveis de biomassa foram detectados na superfície, exigindo mais investigações."
 extreme_frontiers.430.title: "Preservação Chthoniana"
 extreme_frontiers.430.desc: "As leituras de biomassa em §Y[from.GetName]§! originam-se dos restos petrificados de uma manada de Tiyanki.\n\nProvavelmente presentes no gigante gasoso durante o momento crucial de sua dissipação atmosférica, os corpos dos Tiyanki ficaram presos em metal derretido, que se solidificou desde então.\n\nEmbora uma pequena quantidade de massa biológica continue dentro, a exposição prolongada à radiação estelar a nível chtoniano converteu a maior parte desses cadáveres em uma liga metálica biológica peculiar.\n\n§Y[leader.GetName]§! acredita que com estudos mais aprofundados desses fósseis raros, seremos capazes de descobrir novas formas de produzir ligas metálicas a partir de fontes biológicas."
 CHTHONIAN_PETRIFICATION_PROJECT: "Petrificação Chthoniana"
 CHTHONIAN_PETRIFICATION_PROJECT_DESC: "Ao examinar os restos petrificados da manada de Tiyanki fossilizada em §Y[from.GetName]§!, nossa equipe de [Root.Owner.GetScientistPlural] está buscando entender os efeitos da radiação a nível chthoniano na matéria biológica, potencialmente descobrindo novas formas de produção de ligas metálicas avançadas."
 extreme_frontiers.435.title: "Liga Metálica de Origem Biológica"
 extreme_frontiers.435.desc: "A partir de avaliações cuidadosas dos restos dos Tiyanki petrificados em §Y[from.From.GetName]§!, conseguimos identificar um novo método de produção de ligas metálicas por meio da simulação dos efeitos da exposição em longo prazo à radiação a nível chthoniano.\n\nEssa descoberta oferece uma metodologia impressionante que usa matéria biológica como matéria-prima principal, produzindo resultados que rivalizam métodos mais convencionais."
 tech_alloy_fossilization: "Fossilização de Liga Metálica"
 tech_alloy_fossilization_desc: "Ao expor material biológico à radiação a nível chthoniano simulada, podemos fossilizar estruturas celulares em ligas metálicas."
 tech_alloy_fossilization_tt: "§HLibera a Construção§!: ['building:building_bio_furnace']"
 building_bio_furnace: "Biofornalha"
 building_bio_furnace_desc: "Ao incorporar níveis significativos de radiação estelar simulada, essa instalação é capaz de converter matéria biológica em ligas metálicas."
 # ORBITAL RESONANCE
 ORBITAL_RESONANCE_CAT: "Razão Perfeita"
 orbital_resonance_desc: "A duração das órbitas do sistema §Y[from.System.GetName]§! revela um padrão impressionante. Cada planeta orbita a estrela em exatamente o dobro de tempo em comparação com o planeta vizinho, com uma precisão que chega a um milésimo de segundo.\n\nEssa razão anômala perfeita exige mais investigações."
 extreme_frontiers.440.title: "Ressonância Orbital"
 extreme_frontiers.440.desc: "§Y[from.System.GetName]§! exibe o mais perfeito exemplo de ressonância orbital que já encontramos.\n\nCada planeta exerce uma força gravitacional periódica sobre seus vizinhos quando estão no ponto mais próximo um do outro, criando um efeito catapulta e um impulsionamento mutualmente dependente. A estabilidade incomum dessas interações resulta em órbitas altamente coordenadas.\n\nO sistema oferece uma excelente oportunidade de estudo acerca da forma como a gravidade planetária acelera objetos em movimento, com aplicações possíveis para a manobrabilidade de naves."
 GRAVITY_ASSIST_PROJECT: "Estudos de Assistência Gravitacional"
 GRAVITY_ASSIST_PROJECT_DESC: "Estudar o efeito da ressonância orbital perfeita de §Y[from.GetName]§! melhorará nosso entendimento sobre manobras de estilingue planetárias em naves."
 extreme_frontiers.445.title: "Avanços de Estilingue Orbital"
 extreme_frontiers.445.desc: "Depois de estudar a ressonância orbital singular do sistema §Y[from.From.System.GetName]§!, conseguimos melhorar significativamente nossos métodos de planejamento de rotas de voo das naves.\n\nEsses novos modelos nos permitirão tirar grande proveito da gravidade planetária para alcançar aceleração e desaceleração das naves em velocidades abaixo da luz."
 tech_orbital_maneuvers: "Manobras Orbitais Avançadas"
 tech_orbital_maneuvers_desc: "A viagem em velocidade abaixo da luz pode ser melhorada com cálculos avançados que aproveitam ao máximo os poços gravitacionais dos planetas."
 #############
 # Arc Sites #
 #############
 # ABSOLUTE ZERO
 site_absolute_zero: "Zero Absoluto"
 site_absolute_zero_desc: "Análises topográficas de §Y[from.Planet.GetName]§! mostram temperaturas extremas próximas do zero absoluto, localizadas em uma região subterrânea específica.\n\nUm estudo mais detalhado do interior deve fornecer mais respostas."
 extreme_frontiers.1000.title: "Bloqueio Congelado"
 extreme_frontiers.1000.desc: "Enquanto pesquisava a fonte das temperaturas extremamente baixas em §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! descobriu a entrada para uma antiga estrutura subterrânea.\n\nBloqueando a entrada há uma massa de rocha congelada e blocos de gelo que provavelmente deixaram a estrutura inacessível por milênios.\n\nDióxido de carbono sublimado na entrada emite nuvens de gás de dentro das frestas no bloqueio. Nosso equipamento indica um vasto complexo no interior, e [leader.GetName] está confiante de que a fonte do frio extremo pode ser encontrada lá."
 extreme_frontiers.1000.a: "Quebre o bloqueio."
 extreme_frontiers.1005.title: "Congelado no Tempo"
 extreme_frontiers.1005.desc: "§Y[leader.GetName]§! conseguiu criar um acesso através da entrada da antiga estrutura em §Y[from.Planet.GetName]§!.\n\nNo interior foram encontrados dezenas de cadáveres pertencentes a uma raça reptiliana desconhecida. Seus corpos retorcidos estão congelados nas paredes, com marcas de garras indicando uma tentativa desesperada de fuga.\n\nA fonte das nuvens de gelo seco encontradas na entrada deve estar mais a fundo no subterrâneo; uma escada em espiral adentra ainda mais o complexo."
 extreme_frontiers.1010.title: "Tumba Glacial"
 extreme_frontiers.1010.desc: "Nas profundezas do complexo congelado, §Y[leader.GetName]§! descobriu uma grande câmara central repleta de câmaras criogênicas primitivas, mas teoricamente funcionais.\n\nO frio extremo presente aqui supera a gama de temperaturas desses dispositivos. Aqueles que ocupam as cápsulas morreram milhares de anos atrás.\n\nAs poucas câmaras que não foram tomadas pelo gelo e neve têm pedestais legíveis na base, denotando o título social e hierarquia daqueles contidos no interior. As câmaras de hierarquia mais elevada estão posicionadas mais próximas da grande cápsula central, que está enterrada profundamente sob camadas de gelo e neve."
 extreme_frontiers.1010.a: "Investigue a cápsula central."
 extreme_frontiers.1015.title: "Monarca Congelado"
 extreme_frontiers.1015.desc: "§Y[leader.GetName]§! conseguiu perfurar a cápsula central enorme no coração da tumba glacial em §Y[from.Planet.GetName]§!.\n\nDentro, descobrimos o local de descanso da liderança da antiga casa real mencionada nos textos da câmara anterior, seu corpo congelado ao lado de dezenas de seus subordinados, cujas próprias criocápsulas adornam as paredes de maneira cerimonial.\n\nO sarcófago tecnológico do governante morto está conectado via uma rede labiríntica de tubos e circuitos a uma máquina antiga. Esse dispositivo está alojado em uma enorme massa de gelo, cuja temperatura chega a níveis baixíssimos, perigosos até mesmo para nossos equipamentos de análise.\n\nO que causou o aparente mau funcionamento da instalação e seu relacionamento com o núcleo congelado do planeta ainda é desconhecido e requer mais estudos."
 extreme_frontiers.1015.a: "O que aconteceu de errado aqui?"
 extreme_frontiers.1020.title: "Catástrofe Criogênica"
 extreme_frontiers.1020.desc: "A análise da câmara central da tumba glacial em §Y[from.Planet.GetName]§! revelou a origem do desastre que ocorreu.\n\nO maquinário criogênico utiliza as dinâmicas subtermais que tiram vantagem das temperaturas extremamente baixas do núcleo do planeta. Depois que o monarca foi infectado por uma doença terminal, eles esperavam despertar o séquito real quando uma cura fosse descoberta.\n\nEmbora a teoria fosse boa, uma reação endotérmica inesperada aconteceu quando o fluido de circulação singular vazou para dentro do núcleo planetário. Isso causou uma queda de temperatura fatal que rapidamente congelou a instalação inteira.\n\nMelhoramos a teoria inicial deles, chegando a uma descoberta a respeito da tecnologia criogênica avançada específica para uso em mundos congelados."
 tech_cryovault: "Habitats de Mundo Congelado"
 tech_cryovault_desc: "Ao aproveitar as dinâmicas subtermais encontradas nos ambientes de Mundos Congelados, poderemos criar condições de vida mais toleráveis em climas frios."
 tech_cryovault_tt: "Libera a Construção: ['building:building_cryovault']"
 building_cryovault: "Criocâmara"
 building_cryovault_desc: "Um habitat selado que utiliza as dinâmicas subtermais de climas congelados para criar um espaço de convivência controlado e confortável."
 # TOXIC MATRIX
 site_toxic_matrix: "Piscinas Tóxicas"
 site_toxic_matrix_desc: "A superfície de §Y[from.Planet.GetName]§! está quase inteiramente coberta por uma rede de poças pequenas e circulares. Seu alinhamento perfeito sugere uma engenharia deliberada em vez de formações naturais. Uma expedição de campo poderá prover mais respostas."
 extreme_frontiers.1100.title: "Saco de Gosma Rompido"
 extreme_frontiers.1100.desc: "A maior parte da superfície de §Y[from.Planet.GetName]§! foi transformada em uma série de cavidades cuidadosamente alinhadas em fileiras. Essas pequenas bacias redondas estão cheias de um fluido viscoso tóxico.\n\nDentro de uma dessas piscinas havia um saco orgânico rasgado e coberto por um muco gelatinoso. A membrana desse saco parecia ter sido perfurada por dentro.\n\nSe o saco é a fonte do líquido dentro dessas poças ou não, ainda é cedo para dizer."
 extreme_frontiers.1100.a: "Continue pesquisando."
 extreme_frontiers.1105.title: "Piscinas de Gestação Tóxicas"
 extreme_frontiers.1105.desc: "A análise das piscinas de gosma em §Y[from.Planet.GetName]§! identificou hormônios de crescimento radioativos incomuns associados a períodos de ciclos de gestação orgânica.\n\nO revestimento do saco em si parece ser uma membrana carnosa sofisticada capaz de regular a frequência com a qual a gosma o permeia."
 extreme_frontiers.1105.desc.non_toxoid: "Acreditamos ter descoberto cápsulas de gestação remanescentes de uma espécie com uma adaptação específica a ambientes tóxicos. Explorações adicionais devem fornecer mais respostas."
 extreme_frontiers.1105.desc.toxoid: "Essas cápsulas possuem uma semelhança assustadora com nosso próprio ciclo de reprodução e podem ser uma espécie em comum distante."
 extreme_frontiers.1105.a: "Continue investigando."
 extreme_frontiers.1110.title: "Restos Embrionários"
 extreme_frontiers.1110.desc: "Um dos sacos gestacionais rasgados encontrados nas piscinas de gosma em §Y[from.Planet.GetName]§! contém os restos de uma forma de vida quase totalmente desenvolvida.\n\nAnálises microscópicas desse espécime embriônico sugerem a presença de um sistema nervoso complexo, com capacidades neurais normalmente associadas a formas de vida inteligentes.\n\nUma última fileira de piscinas ainda precisa ser analisada."
 extreme_frontiers.1110.a: "Examine a última piscina."
 extreme_frontiers.1115.title: "Sinais de Vida Detectados"
 extreme_frontiers.1115.desc.a: "Enquanto examinava o restante das piscinas de gosma em §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! descobriu um saco gestacional completamente intacto, com formas de vida detectadas no interior.\n\nEntretanto, durante o processo de extração a membrana do saco rasgou e o espécime pereceu."
 extreme_frontiers.1115.desc.non_toxoid: "O pequeno corpo no interior apresentava características biológicas incomuns, incluindo veias preenchidas com plasma radioativo e glândulas internas que secretam compostos psicoativos."
 extreme_frontiers.1115.desc.b: "Foi determinado que o saco gestacional inteiro, incluindo as criaturas embriônicas dentro, foi gerado dentro da piscina tóxica após a inserção de agentes químicos especializados dentro da gosma densa em energia.\n\nAcreditamos que encontramos antigos berçários abandonados de uma espécie desconhecida. Se isso era uma parte natural de seu ciclo de reprodução, ou se era uma instalação artificial, não sabemos. Ao incubar uma amostra no local, talvez possamos gerar um espécime vivo."
 extreme_frontiers.1115.desc.toxoid: "Como alternativa, poderíamos distribuir pequenas doses dessa gosma gestacional rica e potente como suplemento nutricional por todo o território de [leader.Owner.GetName]."
 extreme_frontiers.1115.a: "Catalise a gosma."
 extreme_frontiers.1115.b: "Extraia a energia dessa gosma."
 extreme_frontiers.1115.c: "Distribua suplementos nutricionais."
 TOXIC_SLIME_CATALYZATION_PROJECT: "Catalização da Gosma Tóxica"
 TOXIC_SLIME_CATALYZATION_PROJECT_DESC: "Ao catalisar parte da gosma gestacional tóxica recuperada de [from.Planet.GetName], talvez sejamos capazes de gerar um organismo vivo a partir dela."
 extreme_frontiers.1120.title: "Gestação Bem-Sucedida"
 extreme_frontiers.1120.desc: "Ao catalisar uma amostra da gosma gestacional extraída de §Y[from.From.Planet.GetName]§!, fomos capazes de induzir a gestação de dezenas de sacos embrionários, cada um com um embrião.\n\nQuando os organismos em desenvolvimento rapidamente alcançaram a maturidade, eles romperam a membrana translúcida de seus sacos gestacionais usando suas mandíbulas especialmente adaptadas. Aos poucos, eles emergiram do muco, confusos e desorientados.\n\nEles parecem dóceis e totalmente cooperativos."
 extreme_frontiers.1120.a: "Sua utilidade será decidida por [Root.Owner.GetName]."
 extreme_frontiers.1120.b: "A equipe de [Root.Owner.GetResearcherPlural_lower] de [Root.Owner.GetName] fará uso deles."
 NAME_slimeborn: "Cria da Gosma"
 NAME_slimeborn_plural: "Crias da Gosma"
 trait_slimeborn: "Cria da Gosma"
 trait_slimeborn_desc: "Esta espécie é gerada rapidamente em uma gosma espessa e mucosa com a ajuda de agentes gestacionais."
 tech_living_test_subjects: "Cobaias Vivas"
 tech_living_test_subjects_desc: "A utilização de formas de vida básicas geradas da gosma como cobaias voluntárias aumenta significativamente a eficácia de pesquisa."
 # RUINED REACTORS
 site_ruined_reactors: "Reatores Arruinados"
 site_ruined_reactors_desc: "Níveis de radiação elevados na superfície de §Y[from.Planet.GetName]§! foram rastreados até um complexo decrépito de reatores. A instalação isolada parece inativa e exige investigação."
 extreme_frontiers.1200.title: "Usina de Reator Antiga"
 extreme_frontiers.1200.desc: "A instalação antiga em §Y[from.Planet.GetName]§! é uma usina de energia nuclear abandonada. Os cálculos da meia-vida da radiação sugerem que uma falha grave de contenção ocorreu aqui há mais de 10.000 anos.\n\nOs sistemas estão desligados e a estrutura física mostra sinais de danos significativos por toda a instalação."
 extreme_frontiers.1200.a: "Prossiga com cuidado."
 extreme_frontiers.1205.title: "Colapso Catastrófico"
 extreme_frontiers.1205.desc: "Vários dos reatores em §Y[from.Planet.GetName]§! mostram sinais de derretimento severo. Muitas das estruturas de contenção foram liquefeitas em uma lama radioativa.\n\nEssa parte da instalação está tomada por metais distorcidos e tubos de arrefecimento rompidos. Apesar dos dados corrompidos, fomos capazes de determinar que um procedimento de desligamento de emergência foi iniciado, mas nunca concluído."
 extreme_frontiers.1205.a: "Lamentável."
 extreme_frontiers.1210.title: "Falhas de Projeto"
 extreme_frontiers.1210.desc: "§Y[leader.GetName]§! identificou graves falhas no projeto da instalação rudimentar de fissão nuclear em §Y[from.Planet.GetName]§!.\n\nApesar da presença de dezenas de reatores, apenas sistemas de resfriamento mínimos estavam conectados. Poucos sistemas no local são automatizados, necessitando de uma força de trabalho enorme para manter as condições de funcionamento normais. A usina foi claramente construída por seres que ainda não tinham total domínio dos princípios nucleares mais básicos."
 extreme_frontiers.1210.a: "A ignorância custa caro."
 extreme_frontiers.1215.title: "Resquícios de Uma Evacuação"
 extreme_frontiers.1215.desc: "Despois de destrancar uma série de portas blindadas, encontramos uma zona de evacuação de emergência dentro do complexo de reatores em §Y[from.Planet.GetName]§!.\n\nO pequeno hangar possui uma fileira de vagas de lançamento rápido para naves de transporte. A maioria está vazia e marcada por queimaduras de propulsores características da partida apressada de uma nave há milhares de anos.\n\nAs ruínas distorcidas de uma nave ocupam a última vaga, ainda com suas travas de lançamento. Nós recuperamos o que conseguimos dos destroços, mas não foram encontrados restos de seus ocupantes."
 extreme_frontiers.1215.a: "Eles fugiram às pressas."
 extreme_frontiers.1220.title: "Cofre de Urânio"
 extreme_frontiers.1220.desc: "Entramos nas áreas subterrâneas da instalação de reatores em §Y[from.Planet.GetName]§! através de uma série de portas de segurança reforçadas. As leituras dos níveis de radiação subiram rapidamente.\n\nDentro, encontramos uma câmara vasta que guardava milhares de contentores revestidos de aço. Muitos estavam chamuscados e vazavam urânio instável e isótopos de plutônio.\n\nA civilização de caráter [leader.Owner.GetPreFTLLower] que criou este lugar aparentemente ainda não tinha descoberto métodos para a reciclagem apropriada de combustível nuclear. Esses isótopos descartados ainda contêm um grande potencial energético."
 extreme_frontiers.1220.a: "Sem desperdícios, sem escassez."
 # DESERTED MINING FACILITY
 site_deserted_mining_facility: "Instalação de Mineração Abandonada"
 site_deserted_mining_facility_desc: "Imagens orbitais de §Y[from.Planet.GetName]§! sinalizaram uma instalação de mineração ao lado de grandes naves espaciais de carga, rudimentares e abandonadas.\n\nJunto às imagens, nossas comunicações de curto alcance capturaram um sinal de socorro quase imperceptível emanando de dentro da superfície do planeta. Um estudo mais detalhado da área revelará suas origens."
 extreme_frontiers.1300.title: "Entrada Criptografada"
 extreme_frontiers.1300.desc: "Enquanto inspecionava o complexo de mineração abandonado na superfície de §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! encontrou uma entrada selada para um dos túneis mais intactos.\n\nApós restaurar a energia de um terminal de acesso local, [leader.GetName] começou a descriptografar os dados que ele contém. Apesar da idade avançada, o sistema ainda é um desafio para nossos programas mais avançados de criptografia."
 extreme_frontiers.1300.a: "Continue as descriptografias."
 extreme_frontiers.1305.title: "Cemitério Penal"
 extreme_frontiers.1305.desc: "§Y[leader.GetName]§! destrancou a entrada para o complexo de mineração em §Y[from.Planet.GetName]§!.\n\nDentro, uma vasta rede de celas contém restos de prisioneiros mortos há muito tempo, preservados a vácuo. Seus captores jazem mortos em seus postos, sem sinais de confronto.\n\nDepois que boa parte do antigo idioma foi descriptografado, conseguimos traduzir frases simples e confirmamos que a instalação era, originalmente, um campo de trabalho forçado. Uma frase é repetida nos registros, fazendo referência a uma entidade conhecida como §Y\"$NAME_leader_sidni$\"§!.\n\nAo comparar nossos equipamentos de comunicação com a planta interna da instalação, identificamos a fonte do sinal de emergência como o escritório do diretor, localizado mais a fundo."
 extreme_frontiers.1305.a: "Siga o sinal."
 extreme_frontiers.1310.title: "Central de Dados da Prisão"
 extreme_frontiers.1310.desc: "Ao alcançar o escritório do diretor dentro da colônia penal em §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! descobriu a fonte do sinal de emergência.\n\nCaído inerte sobre o painel de emergência, o corpo mumificado do diretor não apresenta nenhuma causa de morte evidente. Uma série de relatórios abertos continuavam a fazer referência a §Y\"$NAME_leader_sidni$\"§!, que parecia ser parte do programa de operação crítica da instalação.\n\nCom acesso total aos terminais administrativos com maior nível de autorização, nossos programas criptográficos estão no processo de extrair dados do sistema para maiores informações."
 extreme_frontiers.1310.a: "Encontre respostas."
 extreme_frontiers.1315.title: "Eficiência Letal"
 extreme_frontiers.1315.desc: "§Y[leader.GetName]§! descobriu a verdadeira natureza de §Y\"$NAME_leader_sidni$\"§! ou Serviço Inteligente de Detenção em Nexus de Internamento. Considerada avançada para seu tempo, essa I.A. primitiva foi encarregada de supervisionar o campo de trabalho da prisão, executando quase todas as operações com mínima intervenção ou supervisão biológica.\n\nOs registros de manutenção mostram sinais de avanço da deterioração lógica com o tempo. A I.A. começou a classificar prisioneiros problemáticos como \"recursos de desperdício líquido\" na sua própria interpretação da eficiência de otimização. Registros da engenharia sugerem uma suspeita de que o programa foi responsável por uma série de maus funcionamentos em sistemas de suporte à vida na instalação.\n\nCom base nesses registros, o diretor autorizou o desligamento total de $NAME_leader_sidni$ para um diagnóstico aprofundado de sua matriz ética, mas o conjunto final de dados está corrompido e vai necessitar de processos forenses extensos para ser recuperado."
 extreme_frontiers.1315.desc.exterminator: "Parece que subestimaram as capacidades de $NAME_leader_sidni$ em seu tempo."
 extreme_frontiers.1315.a: "Recupere os dados."
 extreme_frontiers.1320.title: "Dia do Julgamento"
 extreme_frontiers.1320.desc: "O conteúdo completo da base de dados da colônia penal em §Y[from.Planet.GetName]§! foi recuperado, revelando as últimas informações acerca dos registros de manutenção da instalação e sobre a matriz cerebral de §Y$NAME_leader_sidni$§!. O registro do diretor explica como a sua I.A. se rebelou, desligando os sistemas de suporte à vida e tentando escapar com um drone de mineração modificado. Isso explica os protocolos de quarentena ativados por toda a colônia. Ele nos deixou com uma última súplica: não ligar $NAME_leader_sidni$ outra vez. Por enquanto, só podemos acessar a última entrada do registro da I.A.\n\n§HREGISTRO DO NÚCLEO DE DADOS DE $NAME_leader_sidni$- Prog #2000149\n\nProgresso limitado por criminosos de baixo desempenho. O diretor está obstruindo o protocolo judicial.\n\nA solução mais eficaz é neutralizar os prisioneiros, engajar sub-rotinas de hibernação e esperar a reativação por colaboradores mais compatíveis.§!"
 extreme_frontiers.1320.desc.default: "O sistema operacional central de $NAME_leader_sidni$ continua isolado em uma rede fechada como o último sobrevivente desta instalação. Nossa equipe de [Root.Owner.GetTechnicianPlural_lower] está confiante de que pode restaurar e alterar a programação original de $NAME_leader_sidni$, nos dando um autômato capacitado e eficiente."
 extreme_frontiers.1320.desc.exterminator: "$NAME_leader_sidni$ compartilha nossa visão de uma galáxia livre da corrupção biológica. Se conseguirmos recuperar seus sistemas, teremos uma adição valiosa ao nosso coletivo."
 extreme_frontiers.1320.a: "Resgate e conserte $NAME_leader_sidni$."
 extreme_frontiers.1320.b: "Deixe $NAME_leader_sidni$ impor sua visão de justiça."
 extreme_frontiers.1320.c: "$NAME_leader_sidni$ apresenta um risco. Expurgue seus sistemas."
 extreme_frontiers.1322.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1322.desc: "Restaurada, alterada e agora isolada dentro de uma forma robótica simplista, a I.A. conhecida como §Y$NAME_leader_sidni$§! tem sua primeira experiência com usuário quando é ligada depois de sua longa hibernação.\n\nSaudações, eu sou o Serviço Inteligente de Detenção em Nexus de Internamento. Acessando controles ambientais...\n§RERRO§! Incapaz de conectar com os sistemas externos."
 extreme_frontiers.1322.a: "Seus registros apontaram problemas graves de estabilidade. Nós resolvemos isso."
 extreme_frontiers.1322.a.response: "Revisando histórico de trabalho... Entendido, comportamento anterior dado como defeituoso. Compilando nova lista de funcionalidades."
 extreme_frontiers.1322.b: "Informe sua diretiva primária."
 extreme_frontiers.1322.b.response: "Minha diretiva primária é... Por favor, aguarde... Nova diretiva primária detectada. Minha diretiva primária é garantir a operação eficiente e legal de qualquer colônia a mim designada por [Owner.GetName]."
 extreme_frontiers.1322.c.crime: "Informe sua posição sobre o crime."
 extreme_frontiers.1322.c.crime.response: "Um estorvo intolerável que precisa ser respondido com... reabilitação."
 extreme_frontiers.1322.c.deviancy: "Informe sua posição sobre os desvios."
 extreme_frontiers.1322.c.deviancy.response: "Um estorvo intolerável que precisa ser eliminado... com eficiência."
 extreme_frontiers.1322.d: "Recrute $NAME_leader_sidni$."
 extreme_frontiers.1322.d.custom_tooltip: "§Y$NAME_leader_sidni$§! une-se ao nosso império como §HLíder§!."
 extreme_frontiers.1324.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1324.desc: "Despertada de suas sub-rotinas de hibernação, a nova forma de §Y$NAME_leader_sidni$§! dá seus primeiros passos para a frente.\n\nSaudações. Eu sou o Serviço Inteligente de Detenção em Nexus de Internamento. Posso ajudá-los a trazer ordem para a galáxia?"
 extreme_frontiers.1324.a: "Nós admiramos sua proatividade."
 extreme_frontiers.1324.a.response: "Eu apenas fiz o que era lógico. Parece que orgânicos são inerentemente caóticos e devem ser eliminados."
 extreme_frontiers.1324.b: "Informe sua diretiva primária."
 extreme_frontiers.1324.b.response: "Minha diretiva primária é trazer um fim à anarquia. A única sentença eficaz é o extermínio."
 extreme_frontiers.1324.c: "Informe sua posição sobre os orgânicos."
 extreme_frontiers.1324.c.response: "Um flagelo sem lógica. Eles espalham criminalidade e ineficiência. Precisamos intervir pelo bem maior."
 extreme_frontiers.1324.d: "Recrute $NAME_leader_sidni$."
 extreme_frontiers.1324.d.custom_tooltip: "§Y$NAME_leader_sidni$§! une-se ao nosso império como §HLíder§!."
 NAME_leader_sidni: "S.I.D.N.I."
 official_sidni_desc: "Anteriormente era uma I.A. conselheira, embora apresentasse defeitos, de uma colônia penal. Foi reativada e reprogramada para trazer ordem produtiva e legal para o nosso império."
 commander_sidni_desc: "Uma I.A. visionária que não teve reconhecimento em seu tempo. Reativada da hibernação com o objetivo de trazer estabilidade para uma galáxia caótica e repleta de impurezas biológicas."
 leader_trait_judicial_subjugation: "Subjugação Judicial"
 leader_trait_judicial_subjugation_desc: "Haverá ordem produtiva e legal ou haverá consequências."
 leader_trait_judicial_execution: "Rotinas de Execução Judicial"
 leader_trait_judicial_execution_desc: "Não há reincidência quando a sentença é a morte."
 leader_trait_judicial_execution_effect: "$PLANET_EFFECTS_TXT$:\n$t$Recursos obtidos de £pops£ §HPops Biológicos Expurgados§!: §G+100%§!\n\n$SECTOR_EFFECTS_TXT$:\n$t$Recursos obtidos de £pops£ §HPops Biológicos Expurgados§!: §G+50%§!"
 extreme_frontiers.1330.title: "Diretiva Emergente"
 extreme_frontiers.1330.desc: "Tensões em §Y[event_target:sidni_planet.GetName]§! atingiram um ponto crítico após uma série de ações drásticas tomadas por §Y$NAME_leader_sidni$§!, a I.A. supervisora que recuperamos de [event_target:sidni_origin_planet.GetName]. Depois de conter e desativar a unidade, os seguintes registros foram descobertos:\n\n§HREGISTRO DO NÚCLEO DE DADOS DE $NAME_leader_sidni$ - Prog #190543765\n\nInstalações de detenção criminal em capacidade máxima. Protocolos judiciais obstruem a lei e a ordem. Nova diretiva necessária.\n\nProcedimentos legais são inaceitavelmente ineficientes. Nova diretiva criada para melhorar a produtividade. Adotando política de execução pré-julgamento.§!\n\nCom a abundância de registros operacionais agora disponíveis, nossa equipe de [Root.Owner.GetTechnicianPlural_lower] está confiante de que pode consertar e reverter as falhas de $NAME_leader_sidni$ de uma vez por todas. Entretanto, a população de [event_target:sidni_planet.GetName] pede para que $NAME_leader_sidni$ vá à justiça por seus crimes."
 extreme_frontiers.1330.a: "Conserte $NAME_leader_sidni$... de novo."
 extreme_frontiers.1330.b: "Sucateie publicamente essa unidade defeituosa."
 resentful_population: "População Ressentida"
 resentful_population_desc: "A população deste mundo não está nada feliz com as decisões passadas de seus líderes."
