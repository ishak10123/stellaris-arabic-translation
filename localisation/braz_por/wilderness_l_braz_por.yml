 ####################################
 # Traditions
 ####################################
 tr_adaptability_appropriation_wilderness: "Apropriação"
 tr_adaptability_appropriation_wilderness_delayed: "Ecossistemas subutilizados não contribuem em nada para o nosso império. Devemos realocar [GetIndividualNamePluralCap] de forma eficiente para os planetas onde são mais indispensáveis."
 tr_discovery_faith_in_science_wilderness: "Comunicação Micélica"
 tr_discovery_faith_in_science_wilderness_delayed: "Aproveitar a curiosidade natural de [GetIndividualNamePlural] em uma rede fúngica permite descobertas muito mais eficientes."
 tr_domination_wilderness_network: "Aceleração Macrometabólica"
 tr_domination_wilderness_network_delayed: "Aumentar a taxa de troca de energia em escala continental melhora significativamente o auxílio mútuo entre nossas partes."
 tr_domination_wilderness_network_effect: "§YLibera o Edito:§! $edict_drone_overdrive_wilderness$"
 tr_domination_imperious_architecture_wilderness: "Compatibilidade de Feromônios Interespécies"
 tr_domination_imperious_architecture_wilderness_desc: "§Y$district_craglands_plural$§! concedem um adicional de §G+1§! £defense_army£ §Y$defense_army_plural$§!"
 tr_domination_imperious_architecture_wilderness_delayed: "Forçar a comunicação feromonal entre [GetIndividualNamePlural] permite respostas mais rápidas a ameaças externas."
 tr_expansion_colonization_fever_wilderness: "Mente de Muitos Mundos"
 tr_expansion_colonization_fever_wilderness_desc: "Adiciona um §Y£district£ Distrito§! aleatório ao colonizar um novo mundo."
 tr_expansion_colonization_fever_wilderness_delayed: "A [GetGestaltEntityName] é um coro de pensamentos que nem o frio vazio do espaço pode silenciar."
 tr_expansion_a_new_life_wilderness: "Crescimento Exuberante"
 tr_expansion_a_new_life_wilderness_delayed: "A [GetGestaltEntityName] desenvolve soluções para seus próprios problemas."
 tr_expansion_courier_network_wilderness: "$tr_expansion_courier_network_hive$"
 tr_expansion_courier_network_wilderness_delayed: "Tratar cada bioma como uma subdivisão de um todo permite uma comunicação direcionada sem exigir a atenção total da mente planetária."
 tr_expansion_galactic_ambition_wilderness: "$tr_expansion_galactic_ambition_hive$"
 tr_expansion_galactic_ambition_wilderness_delayed: "O terror primitivo acompanhou as primeiras gavinhas que se estenderam na escuridão, longe de nosso mundo de origem. Somente após subjugar e erradicar esse medo conseguiremos prosperar. Milhões de [GetIndividualNamePlural] morrerão para que a [GetGestaltEntityName] possa sobreviver."
 tr_prosperity_pursuit_of_profit_wilderness: "Transporte Global de Líquidos"
 tr_prosperity_pursuit_of_profit_wilderness_delayed: "Veias continentais transportam nutrientes e materiais de construção essenciais para suprir ecossistemas necessitados."
 tr_prosperity_public_works_wilderness: "Tocas Subterrâneas"
 tr_prosperity_public_works_wilderness_desc: "Todos os £district£ §YDistritos§! fornecem §G+50§! de £housing£ §Y$MOD_PLANET_HOUSING_ADD$§!."
 tr_prosperity_public_works_wilderness_delayed: "[GetIndividualNamePlural] escavam profundamente as camadas da crosta, expandindo seus ninhos com estruturas de cera que podem abrigar muito mais indivíduos."
 tr_synchronicity_kinship_wilderness: "Ritmos Circadianos Sincronizados"
 tr_synchronicity_kinship_wilderness_delayed: "O controle preciso dos ciclos de descanso de [GetIndividualNamePlural] cria um cronograma natural para a redistribuição global de nutrientes."
 ####################################
 # Ascension Perks
 ####################################
 ap_mastery_of_nature_wilderness: "$ap_mastery_of_nature$"
 ap_mastery_of_nature_wilderness_desc: "Somos o ciclo que devora e é devorado. Da menor célula à árvore mais alta, vivemos por este princípio. Nós somos a natureza."
 ap_engineered_evolution_wilderness: "$ap_engineered_evolution$"
 ap_engineered_evolution_wilderness_desc: "Nossa consciência evoluiu para superar os desafios do ambiente. Agora que o ambiente mudou, nós também mudaremos."
 engineered_evolution_wilderness_tt: "- Inicia a §Ysituação $genetic_ascension_situation$§!, que libera a árvore de tradição ['tradition_category:tradition_purity'].$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n- $UNLOCKS_AGENDA$ §Y$council_agenda_agenda_engineered_evolution_name$§!, que adiciona tecnologias de Modificação Genética às Opções de Pesquisa."
 ############
 # Espionage
 ############
 operation_embed_planetary_roots: "Incorporar Raízes Planetárias" # literal roots, as in plantlife
 operation_embed_planetary_roots_desc: "Temos usos mais urgentes para [owner.GetIndividualNamePlural] que se especializam na coleta de informações neste momento. No entanto, ao implantar um microbioma semiconsciente em um dos mundos do alvo, poderemos preservar grande parte de nossa Rede Espiã, e talvez até prejudicar a cadeia de suprimentos alimentares deles." # the Wilderness embeds a part of itself, hence 'microbiome'
 operation_embed_planetary_roots_on_success: "$operation_sleeper_cells_on_success$"
 espionage_planetary_roots: "Raízes Planetárias"
 espionage_planetary_roots_desc: "Incorporamos um microbioma semiconsciente que nos mantém informados sobre os assuntos deste império. Esses simbiontes primitivos estão prontos para apoiar nosso grupo de [owner.GetIndividualNamePlural] de inteligência a qualquer momento."
 operation_embed_planetary_roots_requires_blocker: "$TRIGGER_FAIL$ §RNossas $espionage_planetary_roots$ exigem um ['concept_natural_blocker'] em um dos mundos do alvo.§!"
 operation_embed_planetary_roots_dont_stack_this: "$TRIGGER_FAIL$ §RJá incorporamos $espionage_planetary_roots$ em [target.GetName]. Os benefícios podem durar até §Y[planet_roots_success]§!.§!"
 operation_embed_planetary_roots_not_cleared: "$TRIGGER_FAIL$ §RAinda podemos sentir a presença de nossas $espionage_planetary_roots$ em algum lugar de [target.GetName].§!"
 d_wilderness_root_blocker: "Mata Invasora"
 d_wilderness_root_blocker_desc: "Uma densa porção de vida selvagem pré-sapiente e invasora se enraizou nas fronteiras destas terras rurais."
 wilderness.4500.name: "Explorando a Natureza"
 wilderness.4500.desc: "Um grupo semiautônomo de [owner.GetOperativesLowerPlural] identificou diversos locais viáveis para nosso microbioma único. Agora esses habitats serão monitorados, com foco naqueles que oferecem a maior chance de sucesso em longo prazo."
 wilderness.4505.name: "Possível Local Identificado"
 wilderness.4505.desc: "Conseguimos a ajuda de um membro incauto do povo [target.GetSpeciesAdj], que acredita estar prestes a realizar um nobre ato de preservação ambiental. No entanto, ele introduzirá nosso microbioma de \"bomba de sementes\" em uma região remota de §H[roots_planet.GetName]§!.\n\nEmbora os simbiontes criados dentro dessa unidade tenham vida curta e jamais se tornem uma verdadeira extensão de nosso ser, sentimos sua ânsia em infiltrar e observar essa paisagem alienígena enquanto for possível."
 wilderness.4510.name: "$espionage_planetary_roots$ Incorporadas"
 wilderness.4510.desc: "Desde o momento em que nosso microbioma foi transferido para seu novo lar em [GetRootsBlockerName], começamos a respirar seu ar proibido e a perceber o mundo conhecido como §H[roots_planet.GetName]§!.\n\nNossa presença aqui será tênue, enquanto esses simbiontes permanecerem fundamentalmente desconectados de nossa consciência mais ampla. No entanto, eles serão úteis quando chegar a hora de retomar as operações no espaço [target.GetAdj]."
 wilderness.4510.a: "Nossas raízes devem se aprofundar e durar mais."
 wilderness.4510.b: "Deixe que nossas raízes se espalhem livremente por aqui."
 ####################################
 # Technologies
 ####################################
 tech_wilderness_terraform: "Germinação Planetária"
 tech_wilderness_terraform_desc: "Expandir nossas raízes para um novo mundo exige, antes de tudo, a preparação do solo. Ao terraformar o planeta antes, garantiremos que nossas colônias tenham um início saudável."
 tech_terrestrial_sculpting_wilderness: "$tech_terrestrial_sculpting$"
 tech_terrestrial_sculpting_wilderness_desc: "$tech_terrestrial_sculpting_desc$"
 tech_terrestrial_sculpting_wilderness_effect: "§HLibera o Recurso:§! permite a terraformação de todas as classes planetárias padrão."
 tech_wilderness_node: "Centros de Consciência"
 tech_wilderness_node_desc: "Ao incentivar o crescimento de simbiontes pensantes em clareiras espalhadas por nossa natureza compartilhada, todos se beneficiarão de uma maior percepção de nossa vontade coletiva."
 tech_wilderness_cluster: "$tech_hive_cluster$"
 tech_wilderness_cluster_desc: "Podemos acelerar a fluidez do pensamento global e coletivo investindo em concentrações de simbiontes cuja única finalidade é facilitar essa mesma vontade."
 tech_wilderness_confluence: "$tech_hive_confluence$"
 tech_wilderness_confluence_desc: "Nossa vontade mutualística será fortalecida por vastas concentrações de simbiontes profundamente empáticos, tão sintonizados com seu ambiente que podem amplificar e retransmitir nosso pensamento coletivo."
 tech_genome_mapping_wilderness: "$tech_genome_mapping$"
 tech_genome_mapping_wilderness_desc: "O mapeamento dos genomas de nossas inúmeras cadeias de DNA aprofunda nossa compreensão sobre nosso crescimento, e ajuda a eliminar fatores complicadores."
 tech_mining_1_wilderness: "$tech_mining_1$"
 tech_mining_1_wilderness_desc: "Agentes espessantes de mucosas e pressão hidráulica podem ser aplicados a depósitos minerais existentes para escavar mais fundo e aumentar nossos rendimentos."
 tech_powered_exoskeletons_wilderness: "$tech_powered_exoskeletons$"
 tech_powered_exoskeletons_wilderness_desc: "Trajes com exoesqueletos motorizados ampliam a força e a velocidade do usuário, oferecendo claras aplicações militares e aumentando a eficiência no trabalho manual."
 tech_colonization_1_wilderness: "Iniciativa de Novos Mundos"
 tech_colonization_1_wilderness_desc: "Direcionamos nossos esforços para calcular os recursos e materiais necessários para despertar novos mundos, preparando nossos simbiontes pioneiros para suas árduas jornadas através das estrelas."
 tech_wilderness_government: "$tech_planetary_government$"
 tech_wilderness_government_desc: "Desde o momento em que um novo planeta é despertado, suas prioridades devem estar voltadas para estabelecer um ambiente estável e próspero, acima de qualquer preocupação com o coletivo maior."
 tech_wilderness_colonial_centralization: "$tech_colonial_centralization$"
