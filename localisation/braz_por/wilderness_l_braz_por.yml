 ####################################
 # Zones
 ####################################
 zone_urban_wilderness: "Bosque-Coração"
 zone_urban_wilderness_desc: "Um núcleo pulsante de biomassa e instinto. Um local em constante crescimento e mutação, é aqui que a Silvestria finca suas raízes profundas, pronta para dar apoio a qualquer nova função que surgir."
 zone_foundry_wilderness: "Intestígneo"
 zone_foundry_wilderness_desc: "Esta câmara térmica fervilha com magma e força elemental. É aqui que os $job_forgesymbiont_plural$ moldam metal em um ritmo digestivo, alimentando o esqueleto em crescimento do mundo."
 zone_research_wilderness: "Caule Mental"
 zone_research_wilderness_desc: "Um nódulo elevado de raízes neurais e floração mutagênica. É aqui que os $job_evosymbiont_plural$ emergem com novos membros, sentidos e percepções."
 zone_unity_wilderness: "Penhascos Cantantes"
 zone_unity_wilderness_desc: "Formações imponentes entrelaçadas com osso oco e carne lítica, onde o vento transporta tons sobrepostos pela superfície do mundo. Aqui, os $job_choirsymbiont_plural$ se reúnem para fazer o próprio planeta cantar."
 zone_fortress_wilderness: "Bulbo de Comando"
 zone_fortress_wilderness_desc: "Um nódulo sensorial dilatado onde os $job_tamersymbiont_plural$ se reúnem, liberando pulsos aromáticos para convocar e guiar as hordas pré-sapientes. A Silvestria não comanda, ela exala."
 zone_minerals_wilderness: "Espinério"
 zone_minerals_wilderness_desc: "Uma estrutura imponente de pedra viva, parte cordilheira, parte órgão. Em suas cavidades ósseas, minerais se acumulam e pulsam ao ritmo lento da respiração da Silvestria."
 zone_energy_wilderness: "Pulmões Miceliais Solares"
 zone_energy_wilderness_desc: "Campos extensos de tecido fotossintético se expandem com a luz solar capturada, acumulando pressão até exalarem rajadas rítmicas. A partir desses pulsos radiantes, $job_photosymbiont_plural$ são lançados aos céus, navegando as correntes térmicas em direção ao arco das estrelas."
 zone_food_wilderness: "Florurdume"
 zone_food_wilderness_desc: "Um cérebro perfumado de pétalas e feromônios, entrelaçando rotas de polinização como fios em uma tapeçaria. A partir daqui, a fertilidade do planeta é organizada com a eficiência de qualquer fábrica mecânica."
 zone_research_unity_wilderness: "Núcleo Harmônico"
 zone_research_unity_wilderness_desc: "Um órgão rítmico no coração da Silvestria, onde o conhecimento vibra através da memória e da sabedoria. O pensamento não nasce aqui. Ele ressoa."
 zone_trade_wilderness: "Via Enredada"
 zone_trade_wilderness_desc: "Malhas fibrosas, membros enrolados e sacos de armazenamento compõem um centro de distribuição incansável, onde os $job_spindlesymbiont_plural$ tecem e enviam os elementos essenciais da vida. A Silvestria é sua própria provedora."
 ####################################
