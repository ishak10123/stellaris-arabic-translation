 ####################################
 decision_wilderness_expand: "Expandir Tamanho do Planeta"
 decision_wilderness_expand_desc: "Reabsorve a Biomassa purificada que coletamos para expandir nosso mundo."
 decision_wilderness_mastery_over_nature_desc: "Nossa existência coletiva precisa de espaço para crescer, então criaremos esse espaço. Vamos nos adaptar a todos os ambientes do planeta."
