 job_immunosymbiont_effect_desc: "[patrol_drone.GetIcon] $job_immunosymbiont_plural$ diminuem os £crime£ §Y$PLANET_CRIME_NO_HAPPINESS_TITLE$§!, geram £defense_army£ §YExércitos de Defesa§! e produzem £unity£ §Y$unity$§!."
