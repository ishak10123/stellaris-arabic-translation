 # Edicts
 ####################################
 edict_capacity_subsidies_wilderness: "$edict_capacity_subsidies$"
 edict_capacity_subsidies_wilderness_desc: "Este Edito incentiva nossos simbiontes fotossintéticos a formar manadas migratórias que acompanham o sol pela superfície, aumentando a produção de energia."
 edict_mining_subsidies_wilderness: "$edict_mining_subsidies$"
 edict_mining_subsidies_wilderness_desc: "Este Edito fortalece nossas raízes, permitindo que nossos simbiontes escavadores cavem com menos risco de colapso estrutural."
 edict_farming_subsidies_wilderness: "$edict_farming_subsidies$"
 edict_farming_subsidies_wilderness_desc: "Este Edito promove a diluição agressiva de produtos químicos altamente energéticos no solo para ampliar a produção de nutrientes."
 edict_forge_subsidies_wilderness: "$edict_forge_subsidies$"
 edict_forge_subsidies_wilderness_desc: "A saturação de nossas piscinas de algas litotróficas com nutrientes permite o florescimento sazonal e um aumento na colheita de subprodutos de ligas metálicas."
 edict_research_subsidies_wilderness: "$edict_research_subsidies$"
 edict_research_subsidies_wilderness_desc: "$edict_research_subsidies_desc$"
 edict_clearing_motes_wilderness: "$edict_clearing_motes$"
 edict_clearing_motes_wilderness_desc: "A adição de partículas voláteis às dietas dos simbiontes possibilita a digestão tanto de materiais orgânicos quanto inorgânicos. Nosso holobionte adaptará nosso próprio ambiente ao consumi-lo."
 edict_learning_campaign_wilderness: "$edict_learning_campaign$"
 edict_learning_campaign_wilderness_desc: "Ao fornecer nutrientes adicionais aos nossos simbiontes, poderemos aumentar sua produtividade."
 edict_war_drone_campaign_wilderness: "Campanha de Simbiontes de Guerra"
 edict_war_drone_campaign_wilderness_desc: "Ao alocar nutrientes extras para nossos simbiontes predadores e de manada, aumentaremos sua força e disposição para o combate."
 edict_scientific_revolution_wilderness: "$edict_scientific_revolution$"
 edict_scientific_revolution_wilderness_desc: "$edict_scientific_revolution_desc$"
 edict_drone_overdrive_wilderness: "Sobrecarga de Simbiontes"
 edict_drone_overdrive_wilderness_desc: "Nossos biomas serão mais competitivos conforme a demanda por recursos aumenta."
