l_braz_por:
 ####################################
 # Events
 ####################################
 # introduction event
 progress.2.desc.wilderness: "A [Root.GetName] fez uma descoberta incrível em [from.GetName]: o mundo está fervilhando com vida alienígena! Pela primeira vez, encontramos formas de vida que não têm relação conosco.\n\nEssa descoberta finalmente comprova que nós, o planeta [root.owner.capital_scope.GetName], não estamos sozinhos no universo. Apesar de nenhuma das criaturas encontradas em [from.GetName] ser sapiente, é apenas uma questão de tempo até encontrarmos seres que sejam..."
 # Colonization Events
 wilderness.1010.name: "Despertar de [from.GetName]"
 wilderness.1010.desc.intro: "Nossos esporos de terraformação cumpriram seu propósito, levando uma parte de nós para colonizar um mundo alienígena pela primeira vez."
 wilderness.1010.desc.same: "Ser tanto [from.GetName] quanto [root.GetHomeWorldName]... Isso já é natural para nós: uma maneira confortável de existir, apesar de assumirmos tantas novas formas sob um sol antes estranho. Nós nos adaptamos com facilidade às condições daqui." #e.g. 'becoming Mars as well as Earth...''
 wilderness.1010.desc.similar_cold: "Adaptar nossa existência para nos adequarmos ao planeta [from.GetClassAdj] §Y[from.GetName]§! será desafiador, mas já encontramos maneiras familiares de lidar com isso. Gavinhas se estendem, habitats são moldados e bocas famintas caçam." #e.g. 'Adapting our self to suit arctic Pluto...'
 wilderness.1010.desc.similar_dry: "Como o planeta [root.GetHomeWorldName], sempre prosperamos em uma atmosfera árida. Da mesma forma, enfrentaremos o desafio de nos tornarmos o planeta [from.GetClassAdj] §Y[from.GetName]§!. Já encontramos novas maneiras de buscar e conservar umidade, e aprendemos a trabalhar com essa geologia desafiadora, em vez de resistir a ela." #e.g. 'the challenge of becoming savannah Mars'
 wilderness.1010.desc.similar_wet: "Assim como prosperamos nas águas de [root.GetHomeWorldName], também triunfaremos como o planeta [from.GetClassAdj] §Y[from.GetName]§!. Os minerais, as correntes e até mesmo a quantidade de luz do dia que recebemos parecem incomuns aqui, mas já encontramos maneiras de extrair o que precisamos." #e.g. 'we flourish as oceanic Neptune'
 wilderness.1010.desc.diff_cold: "Sabíamos que nossa transformação em §Y[from.GetName]§! seria desafiadora. De fato, parte do que nos tornava o planeta [root.capital_scope.GetClassAdj] [root.GetHomeWorldName] já definhou aqui, mas o que restou é forte e começou a se adaptar. Este ambiente desconhecido dificulta ainda mais a obtenção de recursos básicos para a sobrevivência, mas ao observarmos suas paisagens gélidas, percebemos que a vida, de alguma forma, já triunfou aqui." #e.g. 'becoming Earth'
 wilderness.1010.desc.diff_dry: "Este lugar desperta em nós um medo primitivo: tão quente e seco que evoca memórias instintivas da Calcinação. No entanto, se conseguirmos nos adaptar e prosperar aqui... nos tornarmos §Y[from.GetName]§! também poderá despertar algo novo em nós. Onde há umidade, há formas de armazená-la. Onde a sombra é escassa, descobrimos maneiras de criar a nossa própria."
 wilderness.1010.desc.diff_wet: "Nosso esforço para nos tornarmos §Y[from.GetName]§! será desafiador, mas nos preparamos contra a decadência e o dilúvio. As partes de nós mais adaptadas à água agora a desviam para proteger aquelas mais vulneráveis. Agora fluímos em harmonia com as correntes únicas deste mundo." #e.g. 'Our effort to become Mars'
 wilderness.1010.desc.other: "Ao nos moldarmos para nos tornarmos §Y[from.GetName]§!, identificamos quais partes de nosso ser prosperarão e quais irão perecer. A existência neste mundo [from.GetClassAdj] tem muito em comum com o que conhecíamos, mas também traz aspectos estranhos, então observamos e experimentamos." #e.g. 'shape ourselves to become Luna'
 wilderness.1010.desc.outro: "Nossas superestruturas, nossos nutrientes e nosso próprio DNA começaram a se adaptar e a se misturar com a vida que existia aqui antes de nós. [from.GetName] despertou."
 wilderness.1010.a: "Em breve, nossos mundos se tornarão um."
 # Terraforming Events
 terra.25.desc.wilderness: "Nosso extenso projeto para despertar §Y[From.GetName]§! não foi concluído da maneira que esperávamos. Um rompimento em um de nossos realinhadores de biomassa desencadeou um pequeno dilúvio de §YResíduo de Terraformação§!, obstruindo vales e formando uma crosta pegajosa em algumas zonas habitáveis.\n\nApesar de não ser um perigo direto, esse material viscoso pode atrapalhar a mobilidade de alguns de nossos elementos."
 terra.80.desc.wilderness: "Libertamos nossas futuras gerações de mais uma camada de radiação na atmosfera e solo de §Y[From.GetName]§!. No entanto, nossa equipe atenta de [Root.GetTerraformerPlural] precisou intervir, isolando temporariamente parte deste mundo. Parece que perturbamos uma espécie nativa extremamente elusiva, adaptada a ambientes radioativos e que, graças às nossas ações, agora está definhando.\n\nMais intrigante ainda, essa espécie parece ser pré-sapiente, à beira de despertar um pensamento independente. Agora que [From.GetName] está prestes a expurgar os últimos vestígios de seu legado ambiental hostil, devemos decidir o destino dessa forma de vida única."
 terra.80.b.wilderness: "Este mundo é deles. Devemos deixá-los despertar."
 terra.80.d.wilderness: "Vamos consumi-los."
 wilderness.2000.name: "Um Despertar Planejado"
 #wilderness.2000.desc.reg: "We feel the tremendous potential of [from.GetName]. It seems proper to both fear and delight in the awesome power we are about to exert there: shaping this [from.GetPlanetMoon] with our will and the tools we have developed; laying the pattern for its eventual awakening.\n\nWe have long relied on natural processes to grow and sustain the [root.GetName]. But these trials also cost us dearly, and taught us much. Now we shall see what wonders emerge when a habitable world skips its own evolution and gains the wisdom of hard-earned growth and decay."
 wilderness.2000.desc.barren: "Talvez seja doloroso testemunhar a desolação de [from.GetName], mas em breve isso mudará. Até agora, a vida nesta galáxia ignorou este mundo infértil, mas nós, [root.GetName], possuímos as ferramentas e o conhecimento para consertar isso.\n\nApesar de tudo o que aprendemos, a restauração de [from.GetName] continua sendo uma tarefa monumental, mas com nossa determinação e as ferramentas de modificação climática que descobrimos, a vida renascerá onde antes só havia o vazio."
 wilderness.2000.desc.tomb_detox: "Embora a vida como conhecíamos em [from.GetName] tenha sido extinta, agora estamos prontos para dar ao mundo uma segunda chance. Iniciamos o trabalho de restauração de sua atmosfera, cursos de água e solo, para que [from.GetName] possa novamente abrigar vida na forma de [root.GetName]."
 wilderness.2000.desc.gaia: "O teste da evolução fez maravilhas por nós, [root.GetName], e agora temos a oportunidade de oferecer tais maravilhas ao mundo [from.GetName]. Com ferramentas e conhecimentos que nossa forma primitiva jamais poderia sonhar, iniciamos a transformação de [from.GetName] em um lugar cujo despertar será como nenhum outro.\n\nOs alicerces de [from.GetName] um dia serão ricos em nutrientes, revitalizados pelos vibrantes ciclos de vida de nossa flora e fauna. Vales, cordilheiras e platôs oferecerão um espaço abundante para colheita, caça e abrigo. A vida florescerá aqui."
 wilderness.2000.a: "Vamos começar."
 wilderness_pre_sapient_defence_army: "Manada Pré-Sapiente"
 seq_wilderness_pre_sapient_defence_army: "Manada de Simbiontes $R$" # e.g. 'Symbiont Herd IV'
 wilderness_pre_sapient_defence_army_plural: "Manadas Pré-Sapientes"
 wilderness_pre_sapient_defence_army_desc: "Criaturas extremamente territoriais que permanecem dóceis até serem provocadas. Quando isso ocorre, elas são guiadas apenas pelos instintos mais básicos para defender aqueles que consideram semelhantes."
 wilderness_pre_sapient_assault_army: "Horda Pré-Sapiente"
 seq_wilderness_pre_sapient_assault_army: "Horda de Simbiontes $R$" # e.g. 'Symbiont Horde IV'
 wilderness_pre_sapient_assault_army_plural: "Hordas Pré-Sapientes"
 wilderness_pre_sapient_assault_army_desc: "Criaturas ferozes, dotadas de astúcia e vigor suficientes para garantir a destruição impiedosa de qualquer um que considerem inimigo."
 ####################################
 # Origins
 ####################################
 origin_wilderness: "Silvestria"
 origin_wilderness_desc: "§RATENÇÃO: bloqueia todos os Caminhos de Ascensão, exceto ['concept_purity_ascension'].§!\n\nEsta entidade representa uma ecosfera sapiente: incontáveis formas de vida que há muito tempo se fundiram para formar uma consciência gestalt em escala planetária."
 origin_tooltip_wilderness_effects: "- Característica de Espécie: ['trait:trait_wilderness']\n- Substitui todas as £building£ ['concept_buildings'], £district£ ['concept_districts'] e £zone£ ['concept_district_specialization'] padrão por versões personalizadas\n- Substitui a colonização de Naves Coloniais por ['concept_terraforming']\n- Libera um novo recurso: £biomass£ ['concept_biomass'] \n- Mundo Natal:$TABBED_NEW_LINE$- Tamanho: £planetsize£ 18$TABBED_NEW_LINE$- ['concept_scorched_plains', £blocker£ $d_scorched_plains$]"
 trait_wilderness: "Silvestria"
 trait_wilderness_desc: "§LEsta espécie faz parte de uma entidade mutualística, tornando-se indistinguível de seu ambiente em seus pensamentos e produção.§!"
 WILDERNESS_NATURAL_WORLDS_DECLINE: "§RA §YSilvestria§! não pode sobrevier em mundos não naturais.§!"
 WILDERNESS_DEAD_WORLD: "$TRIGGER_FAIL$A §YSilvestria§! não pode sobrevier em impérios que não são uma Silvestria."
 country_virtual_jobs: "Todos os empregos exercidos dentro deste império foram automaticamente preenchidos."
 concept_wilderness_trait: "$trait_wilderness$"
 concept_wilderness_trait_desc: "- $MOD_LOGISTIC_GROWTH_MULT$: §R-100%§!\n- §RNão é possível migrar ou recolonizar populações§! $NEW_LINE$- §RNão é possível se reproduzir de forma natural§!\n\n§L$trait_wilderness_desc$§!"
 PRESCRIPTED_adjective_zhardmehka: "Floríferos"
 PRESCRIPTED_ship_prefix_zhardmehka: "ZMV"
 PRESCRIPTED_species_name_zhardmehka: "Zhard-Krellin"
 PRESCRIPTED_species_name_plural_zhardmehka: "Zhard-Krellins"
 PRESCRIPTED_species_adjective_zhardmehka: "Zhard-Krelline"
 PRESCRIPTED_planet_name_zhardmehka: "Tellon"
 PRESCRIPTED_system_name_zhardmehka: "Tattla"
 PRESCRIPTED_ruler_name_zhardmehka: "$FUN3_CHR_Obanva$ $FUN3_CHR_uvi-Livve$"
 PRESCRIPTED_ruler_title_zhardmehka: "Avatar"
 START_SCREEN_WILDERNESS_INTRO: "Desde tempos imemoriais, [root.GetHomeWorldName] foi o planeta [root.GetHomeWorldName]. Cada caule, gavinha e enzima aqui é parte de um único todo: um equilíbrio entre crescimento, decomposição e predação. Por eras, [root.GetHomeWorldName] apenas vislumbrou vagamente a imensidão da galáxia. Mas as estrelas estão inquietas há muito tempo.\n\nUma batalha ocorreu nos céus de [root.GetHomeWorldName]. Destroços de grandes naves caíram sobre a superfície, artefatos alienígenas que foram rapidamente reaproveitados. E então houve a superexplosão..."
 START_SCREEN_WILDERNESS_DEFAULT: "[root.GetHomeWorldName] sentiu isso como uma luz cegante e escaldante. Bilhões de nossos simbiontes foram consumidos por tempestades de fogo e radiação. Um continente inteiro devastado."
 START_SCREEN_WILDERNESS_COLD: "[root.GetHomeWorldName] sentiu isso como uma luz cegante e escaldante. Geleiras se tornaram correntezas furiosas, enquanto a radiação estelar queimava [root.GetHomeWorldName]. Um continente inteiro levado pelas águas."
 START_SCREEN_WILDERNESS_DRY: "[root.GetHomeWorldName] sentiu isso como uma luz cegante e escaldante. Dunas se tornaram vidro, e ventos cortantes varreram nossas escarpas rochosas. Um continente inteiro transformado em ruínas."
 START_SCREEN_WILDERNESS_WET: "[root.GetHomeWorldName] sentiu isso como uma luz cegante e escaldante. Os lagos evaporaram e as calotas de gelo derreteram, enquanto a radiação estelar queimava [root.GetHomeWorldName]. Um continente inteiro perdido."
 START_SCREEN_WILDERNESS_OUTRO: "A dor nos despertou. Pela primeira vez, compreendemos nossa fragilidade. A galáxia é perigosa, mas também guarda maravilhas. Com o que aprendemos, iremos germinar e nos espalhar. Levaremos nossa essência às estrelas."
 ####################################
 # Authorities
 ####################################
 auth_mutualistic_intelligence: "Inteligência Mutualística"
 auth_mutualistic_intelligence_plural: "Inteligências Mutualísticas"
 auth_mutualistic_intelligence_desc: "$auth_mutualistic_intelligence_plural$ surgem como uma consciência distribuída em escala planetária, compostas por espécies simbióticas originadas de diversas biotas, todas agindo em conformidade com a vontade coletiva de seu ambiente.\n\nAlguns simbiontes podem trabalhar de forma semiautônoma em tarefas especializadas, mas a maioria depende do contato regular com seu ambiente mutualístico. Quando isolados, eles retomam comportamentos selvagens e instintivos até que inevitavelmente perecem."
 tt_auth_mutualistic_intelligence: "Possui a autoridade §Y$auth_mutualistic_intelligence$§! (§Y$auth_hive_mind$§!)"
 gov_wilderness: "$gov_hive_mind$"
 gov_wilderness_desc: "Este governo opera como uma única consciência, e sua população não possui autonomia individual além de atender às necessidades e desejos da $RT_WILDERNESS$."
 RT_WILDERNESS: "Silvestria"
 RT_WILDERNESS_FEMALE: "$RT_WILDERNESS$"
 ####################################
 # Buildings
 ####################################
 building_colony_shelter_wilderness: "Gavinhas Planetárias"
 building_colony_shelter_wilderness_desc: "Uma fronteira pluricelular de organismos se entrelaça por este mundo, garantindo uma presença estável para a Silvestria."
 building_capital_wilderness: "Aglomerado de Raízes Planetárias"
 building_capital_wilderness_desc: "Uma vasta e vibrante massa de organismos simples que se harmonizam com simbiontes móveis para aprimorar sua coordenação e produtividade."
 building_major_capital_wilderness: "Complexo de Raízes Planetárias"
 building_major_capital_wilderness_desc: "Uma massa viva concentrada, densa o suficiente para que simbiontes possam viver, trabalhar e se reproduzir em uma esfera altamente localizada."
 building_system_capital_wilderness: "Nexus de Raízes Planetárias"
 building_system_capital_wilderness_desc: "Uma imensa união de formas de vida diversas trabalhando em harmonia, tão vasta que é capaz de cultivar seus próprios microclimas ideais."
 requires_building_wilderness_capital: "§RRequer §Y$building_capital_wilderness$§! no planeta.§!"
 requires_building_wilderness_major_capital: "§RRequer §Y$building_major_capital_wilderness$§! no planeta.§!"
 requires_building_wilderness_system_capital: "§RRequer §Y$building_system_capital_wilderness$§! no planeta.§!"
 building_imperial_capital_wilderness: "Complexo Imperial"
 building_imperial_capital_wilderness_desc: "A Silvestria governa o Imperium Galáctico a partir desta estrutura massiva e complexa. É aqui que o destino da galáxia é decidido."
 building_tendril_cradle_1: "Berço de Gavinhas"
 building_tendril_cradle_1_desc: "Um aglomerado de filamentos curtos e enraizados se estendem deste local, coletando materiais das proximidades para órgãos importantes nas imediações."
 building_tendril_cradle_2: "Extensão de Filamentos"
 building_tendril_cradle_2_desc: "Gavinhas compridas espalham-se pela paisagem, coletando recursos de extensões próximas antes de processá-los e redistribuí-los."
 building_tendril_cradle_3: "Ninho de Raízes Transportadoras"
 building_tendril_cradle_3_desc: "Raízes entrelaçadas pulsam e agitam-se sob a superfície, transportando biomassa através de canais estratificados em direção a hubs bióticos distantes."
 building_tendril_cradle_4: "Coração Planetário de Filamentos"
 building_tendril_cradle_4_desc: "Gavinhas logísticas gigantescas irradiam do corpo do planeta, coletando, mensurando e distribuindo os recursos da Silvestria com incansável sincronia."
 planet_research_buildings: "Construções de Pesquisa do Planeta"
 mod_planet_research_buildings_upkeep_mult: "Manutenção de $planet_research_buildings$"
 building_brain_node_1: "Brotamento de Pesquisa"
 building_brain_node_1_desc: "O trabalho de simbiontes brincalhões e exploratórios serve como base para a pesquisa geral."
 mod_planet_building_brain_node_1_build_speed_mult: "Velocidade de Construção de $building_brain_node_1$"
 building_brain_node_2: "Bosque de Pesquisa"
 building_brain_node_2_desc: "Um habitat projetado exclusivamente para estimular a curiosidade, facilitando o estudo de artefatos mais avançados e outros fenômenos."
 mod_planet_building_brain_node_2_build_speed_mult: "Velocidade de Construção de $building_brain_node_2$"
 building_brain_node_3: "Cercado de Pesquisa Exótica"
 building_brain_node_3_desc: "Estes amplos cercados permitem que grandes quantidades de simbiontes extremófilos experimentem todos os tipos de materiais exóticos e perigosos."
 mod_planet_building_brain_node_3_build_speed_mult: "Velocidade de Construção de $building_brain_node_3$"
 building_brain_node_4: "Cercado de Pesquisa Avançada"
 building_brain_node_4_desc: "Esta fusão de tecnologia exótica e vastos cercados cultivados por simbiontes possibilita o desenvolvimento de pesquisas inovadoras em diversos ambientes experimentais."
 mod_planet_building_brain_node_4_build_speed_mult: "Velocidade de Construção de $building_brain_node_4$"
 building_commensal_clearing_1: "Clareira Comensal"
 building_commensal_clearing_1_desc: "Estas ilhas de tranquilidade permitem que criaturas móveis de todos os tipos se reúnam, descansem e se reorientem na vastidão da Silvestria."
 building_commensal_clearing_2: "Bosque Comensal"
 building_commensal_clearing_2_desc: "Locais ideais e protegidos para grandes reuniões de simbiontes. Aqui, suas interações aprofundam a compreensão de sua natureza compartilhada."
 building_commensal_clearing_3: "Vale Comensal"
 building_commensal_clearing_3_desc: "Comunidades densas e diversificadas de simbiontes migram por essas formações imaculadas, fortalecendo seus laços entre si."
 building_commensal_clearing_4: "Bioma Comensal"
 building_commensal_clearing_4_desc: "Habitats vastos e interconectados que recebem inúmeros encontros, cada um sendo uma centelha vital de unidade mutualística."
 building_massive_growth_1: "Várzea Nutritiva"
 building_massive_growth_1_desc: "Uma pequena formação geológica que proporciona um microclima ideal para o cultivo contínuo durante o ano."
 building_massive_growth_2: "Matagal Nutritivo"
 building_massive_growth_2_desc: "Uma vasta copa semipermeável protege este matagal, garantindo um ambiente estável para a produção constante de alimentos nutritivos e suculentos."
 building_massive_growth_3: "Megaplantação em Contorno"
 building_massive_growth_3_desc: "Um refúgio para microrganismos e fauna semiaquáticos, esses vastos terraços fornecem uma abundância de proteínas e grãos."
 building_massive_growth_4: "Plantação de Silvicultura"
 building_massive_growth_4_desc: "Agrupamentos de matagais protegidos por megafloras frondosas garantem a alta produção de culturas para sustentar toda a teia trófica."
 building_bioelectric_stimulator_1: "Adaptador Cloroplástico"
 building_bioelectric_stimulator_1_desc: "Aglomerados de bolhas semelhantes a lentes concentram os raios solares por um rico caldo de algas, convertendo e armazenando essa energia para uso posterior."
 building_bioelectric_stimulator_2: "Acelerador Cloroplástico"
 building_bioelectric_stimulator_2_desc: "Bolhas translúcidas repletas de algas fotossintéticas captam energia solar para fortalecer ligações bioquímicas, reduzindo a perda de energia."
 building_bioelectric_stimulator_3: "Matriz de Lentes Cloroplásticas"
 building_bioelectric_stimulator_3_desc: "Galhos contrabalançados, carregados com coletores solares que podem subir e descer conforme a demanda e a capacidade, criando um hub de energia versátil e confiável."
 building_bioelectric_stimulator_4: "Cisto Cloroplástico"
 building_bioelectric_stimulator_4_desc: "Estes sacos translúcidos e repletos de algas podem migrar e se multiplicar onde sua energia for mais necessária, praticamente eliminando a perda de energia ao se locomover."
 building_churning_tunnels_1: "Broca Lítica"
 building_churning_tunnels_1_desc: "Matéria vegetal de dureza quase cristalina inserida em torno de locais de extração existentes, permitindo a obtenção de ainda mais minerais úteis."
 building_churning_tunnels_2: "Filtros Líticos"
 building_churning_tunnels_2_desc: "Colônias de biofilmes semipermeáveis coletam minerais valiosos que se perderiam no fluxo de resíduos de operações de mineração líquida."
 building_churning_tunnels_3: "Triturador Lítico"
 building_churning_tunnels_3_desc: "Placas e pinças de trituração de alta potência reduzem matéria mineral a uma pasta química, facilitando a extração de minerais."
 building_churning_tunnels_4: "Termas Líticas"
 building_churning_tunnels_4_desc: "Uma combinação de trituradores, agentes bioquímicos e biofilmes permite a extração de minerais diretamente no local onde estão os veios mais ricos."
 building_natural_furnace_0: "Poço de Fundição"
 building_natural_furnace_0_desc: "Simbiontes termofílicos trabalham incessantemente para produzir ligas metálicas de alta qualidade em torno desta fonte natural de calor."
 building_natural_furnace_1: "Forno de Fundição"
 building_natural_furnace_1_desc: "Afloramentos resistentes ao calor permitem um uso mais eficiente da energia térmica, resultando na produção de ligas metálicas superiores."
 building_natural_furnace_2: "Fundição de Luz Sólida"
 building_natural_furnace_2_desc: "Fornos lito-orgânicos sofisticados, auxiliados por tecnologia holográfica, possibilitam a produção de ligas metálicas altamente versáteis."
 building_natural_furnace_3: "Nanofundição"
 building_natural_furnace_3_desc: "Nano-organismos termofílicos habitam estes poços e fornos de fundição, purificando nossas ligas metálicas ao eliminar impurezas."
 building_avatar_chamber_1: "Berço de Avatares"
 building_avatar_chamber_1_desc: "Um órgão de gemulação no qual a Silvestria começa a moldar formas básicas, preparando seus instintos para uma vida desconhecida e terrenos além de sua biosfera nativa."
 building_avatar_chamber_2: "Câmara de Avatares"
 building_avatar_chamber_2_desc: "Corpos simulados são gerados e orientados por meio de testes internos, mimetizando organismos e ecossistemas estranhos. O conhecimento é disseminado ao abraçar o desconhecido."
 building_avatar_chamber_2_effect: "$building_avatar_chamber_1$ produz mais §G200§! de £amenities£ Confortos"
 building_avatar_chamber_3: "Floresta de Avatares"
 building_avatar_chamber_3_desc: "Este órgão extenso transmite modelos de avatares criados a partir de formas e paisagens alienígenas. A Silvestria aprende ao vivenciar aquilo que nunca tocou."
 building_avatar_chamber_3_effect: "$building_avatar_chamber_1$ produz mais §G400§! de £amenities£ Confortos"
 building_avatar_chamber_4: "Córtex de Avatares"
 building_avatar_chamber_4_desc: "Um motor planetário de personificação, capaz de simular civilizações inteiras, xenoecologias e ambientes extremos. Aqui, a Silvestria ensaia seu encontro com a galáxia."
 building_avatar_chamber_4_effect: "$building_avatar_chamber_1$ produz mais §G800§! de £amenities£ Confortos"
 building_mote_aggravator: "Digestor Químico"
 building_mote_aggravator_desc: "Um sofisticado sistema de tecidos vasculares e metabolizadores químicos produz $volatile_motes$ a partir de matéria terrestre comum."
 building_churning_stomach: "Filtros de Gases Exóticos"
 building_churning_stomach_desc: "Micróbios e nano-organismos especializados reagem com aerossóis comuns para produzir $exotic_gases$ refinados."
 building_crystal_growth: "Leito de Cristal"
 building_crystal_growth_desc: "Copas especiais regulam com precisão a umidade e temperatura necessárias para o cultivo de $rare_crystals$ artificiais."
 building_planetary_carapace: "Guarnição de Ossos"
 building_planetary_carapace_desc: "Uma abundância de simbiontes intensamente territoriais pode ser abrigada neste campo de testes encapsulado, prontos para serem convocados, se necessário."
 mod_planet_building_planetary_carapace_build_speed_mult: "Velocidade de Construção de $building_planetary_carapace$"
 building_planetary_carapace_2: "Fortaleza de Ossos"
 building_planetary_carapace_2_desc: "Esta vasta instalação, repleta de campos de treinamento e acomodações reforçadas, garante que seus defensores estejam preparados para qualquer incursão planetária."
 building_ozone_thickener: "Copa de Escudo Planetário"
 building_ozone_thickener_desc: "$tech_planetary_shield_generator_desc$"
 building_subterranean_cache: "Reserva Subterrânea"
 building_subterranean_cache_desc: "$building_resource_silo_desc$"
 building_cradle_of_rebirth: "Berço de Renascimento"
 building_cradle_of_rebirth_desc: "Profundamente enraizada, esta estrutura metaboliza matéria em decomposição e presas capturadas em biomassa, nutrindo o corpo do mundo a cada pulso silencioso."
 building_wilderness_storm_relief: "$building_storm_resistant_production$"
 building_wilderness_storm_relief_desc: "Uma ampla copa de folhas reforçadas e carregadas bioeletricamente garante a segurança dos simbiontes nas proximidades, permitindo respostas rápidas a tempestades cósmicas sem comprometer a vida ou a produtividade."
 building_wilderness_storm_relief_tt: "Efeitos negativos da §Y$default_storm$§! que afetam a produção do planeta são reduzidos em §G25%§!."
 holding_wilderness_glade: "Clareira da Silvestria"
 holding_wilderness_glade_plural: "Clareiras da Silvestria"
 holding_wilderness_glade_desc: "Uma região produtiva da Silvestria simbiótica, tenuemente conectada ao seu coletivo familiar. Embora altamente dependente de fontes locais de comida, os simbiontes que habitam este bioma isolado são hábeis em extrair outros recursos das proximidades."
 holding_wilderness_glade_effect_desc: "O súdito transforma [owner.WildernessGladeProvides] em $r_basic_plural$ para o Lorde Supremo.\nO Lorde Supremo reduz a $mod_planet_jobs_productive_upkeep_mult$ no mundo Súdito.\nUma £blocker£ §Y$holding_wilderness_glade$§! aparece no planeta, ocupando um Espaço de Distrito."
 no_free_district_for_wilderness_glade: "$TRIGGER_FAIL$§RNão há distritos livres neste planeta para nosso bioma isolado.§!"
 blocker_tied_to_wilderness_glade: "$TRIGGER_FAIL$§REste Bloqueador permanecerá enquanto a Propriedade §Y$holding_wilderness_glade$§! existir neste mundo.§!"
 d_wilderness_glade_blocker: "$d_wilderness_root_blocker$"
 d_wilderness_glade_blocker_desc: "Estruturas de raízes significativas são necessárias para sustentar a $holding_wilderness_glade$ próxima, permitindo que este bioma isolado sobreviva em nosso ambiente alienígena."
 holding_wilderness_glade_modifier: "Clareiras da Silvestria Distribuídas"
 holding_wilderness_glade_modifier_desc: "Mundos súditos em harmonia com o nosso, cada parceria compartilhando suas recompensas mutualísticas." # appears in 'lore brown'
 holding_wilderness_glade_modifier_tt: "Os valores variam de acordo com o número de mundos súditos abrigando §Y$holding_wilderness_glade_plural$§!."
