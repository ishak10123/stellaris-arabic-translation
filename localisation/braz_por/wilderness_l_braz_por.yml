 job_spindlesymbiont: "Fusossimbionte"
 job_spindlesymbiont_plural: "Fusossimbiontes"
 job_spindlesymbiont_desc: "Com inúmeros membros flexíveis e órgãos sensoriais exóticos, este simbionte direciona o fluxo de recursos, guiando a distribuição de nutrientes, matéria e materiais. Cada movimento mantém o equilíbrio da Silvestria."
