 job_heart_processing: "Biomassa Recém-formada"
 job_heart_processing_plural: "$job_heart_processing$"
 job_heart_processing_desc: "Esta biomassa será integrada em breve. Ela está destinada a exercer uma função mais alta em nós."
 neurosymbiont: "$job_neurosymbiont$"
