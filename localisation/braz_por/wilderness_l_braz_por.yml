 ####################################
 # City Appearance
 ####################################
 WILDERNESS: "Silvestria"
 ####################################
 # Deposits
 ####################################
 d_wilderness_mining: "Sistema de Cavernas Ocas"
 d_wilderness_mining_desc: "As formas de vida que antes ocupavam este mundo abandonaram suas minas de forma apressada e desordenada, deixando vários túneis escavados até o limite e propensos a desabamentos."
 d_wilderness_mining_2: "Planalto Crivado"
 d_wilderness_mining_2_desc: "Esta região perigosa está repleta de resíduos inúteis e potenciais sumidouros, todos resultantes da intensa atividade mineradora do passado."
 d_wilderness_farming: "Floresta Seca"
 d_wilderness_farming_desc: "O que antes era uma floresta vasta e produtiva agora se encontra sem vida. Seus galhos murchos já não são capazes de produzir colheitas."
 d_wilderness_farming_2: "Floresta Fossilizada"
 d_wilderness_farming_2_desc: "Os vestígios de uma vasta região que já foi rica em diversidade arbórea. A flora e os fungos pereceram tão rapidamente que seus restos assumiram uma aparência cristalina e tornaram-se bioquimicamente inertes."
 d_wilderness_generator: "Campo Solar Queimado"
 d_wilderness_generator_desc: "Uma copa murcha e caules quebradiços são tudo o que resta desta antiga fazenda solar abandonada."
 d_wilderness_generator_2: "Deserto Solar"
 d_wilderness_generator_2_desc: "Esta vasta região é dominada pelos restos espinhosos de uma floresta solar outrora exuberante. Folhas secas e ligeiramente irradiadas agora flutuam como poeira atmosférica."
 d_wilderness_city: "Pântano Fétido"
 d_wilderness_city_desc: "O que antes era um habitat vibrante para inúmeras formas de vida foi abandonado, tornando-se apenas uma poça pútrida e viscosa."
 d_wilderness_city_2: "Atoleiro Pútrido"
 d_wilderness_city_2_desc: "Incontáveis formas de vida pereceram aqui. Seus restos em decomposição impregnam o solo, liberando uma torrente de produtos bioquímicos fétidos e corrosivos."
 d_wilderness_industrial: "Lodaçal Metálico"
 d_wilderness_industrial_desc: "Os restos de várias termas minerais ao ar livre, cujos conteúdos se tornaram tóxicos e inertes pelo colapso das formações geológicas da região."
 d_wilderness_industrial_2: "Ermos Bioquímicos"
 d_wilderness_industrial_2_desc: "Bacias líticas e ravinas revestidas de poeira química são tudo o que resta de uma vasta rede de instalações semiorgânicas de tratamento mineral."
 d_scorched_plains: "Planícies Escaldadas"
 d_scorched_plains_desc: "Esta região era repleta de vida, até ser devastada por uma superexplosão estelar."
 concept_scorched_plains: "$d_scorched_plains$"
 concept_scorched_plains_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-2§!\n- Tempo para Liberar: £time£ 180 §IDias§!\n- Custo para Liberar:\n$t$- 900 de $i_energy$\n\n§L$d_scorched_plains_desc$§!"
 ####################################
 # Colony Types
 ####################################
 col_wilderness_default: "Colônia da Silvestria"
 ####################################
 # Planet Designations
 ####################################
 col_wilderness_capital: "Mundo-Coração"
 col_wilderness_capital_tt: "$col_wilderness_capital_desc$"
 col_wilderness_capital_desc: "Cada aspecto deste mundo vibra com vida simbiótica, reunida em números tão vastos que forma um corpo estelar vivo."
 col_wilderness_generator: "Mundo de Fotossíntese"
 col_wilderness_generator_desc: "$col_generator_desc$"
 col_wilderness_generator_tt: "Incontáveis bandos de simbiontes cloroplásticos se reúnem e armazenam energia neste mundo."
 col_wilderness_mining: "Mundo Lítico"
 col_wilderness_mining_desc: "$col_mining_desc$"
 col_wilderness_mining_tt: "Sob a superfície aparentemente estéril deste planeta, um ecossistema de vida subterrânea escava avidamente em busca de riquezas minerais."
 col_wilderness_farming: "Mundo Polinizador"
 col_wilderness_farming_desc: "$col_farming_desc$"
 col_wilderness_farming_tt: "Simbiontes especializados mantêm condições ideais de crescimento por todo o planeta, garantindo um suprimento abundante de flora e fauna muito nutritivas."
 col_wilderness_fortress: "Mundo Caçador"
 col_wilderness_fortress_desc: "$col_fortress_desc$"
 col_wilderness_fortress_tt: "A superfície deste mundo estremece com o estouro das manadas extremamente territoriais e os urros de predadores aterrorizantes."
 col_wilderness_tech: "Mundo de Cogitação"
 col_wilderness_tech_desc: "$col_research_desc$"
 col_wilderness_tech_tt: "Este mundo vibrante está repleto de peculiaridades e fenômenos misteriosos, prontos para serem explorados por mentes ávidas e curiosas."
 col_wilderness_nest: "Mundo Tecelão"
 col_wilderness_nest_desc: "$col_city_desc$"
 col_wilderness_nest_tt: "Um santuário para uma infinidade de formas de vida simbióticas, onde a própria atmosfera pode alterar sua composição em resposta às necessidades e ao estado de espírito da Silvestria."
 col_wilderness_refinery: "Mundo Refinador"
 col_wilderness_refinery_desc: "Especializado na produção de £exotic_gases£ §H$exotic_gases$§! e outros £strategic_resource£ §HRecursos Estratégicos§!."
 col_wilderness_refinery_tt: "Este planeta está repleto de fendas geotérmicas, onde uma miríade de nano-organismos e outros simbiontes exóticos se reúnem para processar matérias-primas."
 col_wilderness_forge: "Mundo-Crisol"
 col_wilderness_forge_desc: "$col_foundry_desc$"
 col_wilderness_forge_tt: "Um crisol de proporções planetárias para refinar minerais brutos em ligas metálicas funcionais e versáteis."
 col_wilderness_unification: "Mundo Tranquilo"
 col_wilderness_unification_desc: "$col_bureau_desc$"
 col_wilderness_unification_tt: "Uma aura de mutualismo sereno permeia este mundo, aprofundando as complexas relações entre os simbiontes."
 ####################################
 # Personalities
 ####################################
 personality_benevolent_wilderness: "Silvestria Harmônica"
 personality_benevolent_wilderness_desc: "Esta vasta biosfera sapiente busca apenas entrelaçar-se com as estrelas. Suas raízes se estendem pacientemente pela galáxia, não por fome, mas por harmonia."
 personality_rampant_wilderness: "Silvestria Desenfreada"
 personality_rampant_wilderness_desc: "A Silvestria Desenfreada não se enfurece; ela se alastra, consome e persiste. Todas as coisas, vivas ou mortas, são recuperadas no ciclo infinito de crescimento e decadência."
 ####################################
 # Policies
 ####################################
 policy_symbiont_policy: "$policy_drone_policy$"
 policy_symbiont_policy_desc: "Nosso coletivo mutualístico é altamente capaz e produtivo, mas tem seus limites. Precisamos definir com sabedoria onde e como alocar nossos recursos."
 symbiont_policy_balanced: "$drone_policy_balanced$"
 symbiont_policy_balanced_name: "$symbiont_policy_balanced$"
 symbiont_policy_balanced_desc: "A Silvestria mantém um equilíbrio entre a extração de matérias-primas e a fabricação de bens.\n\n§ENão há nenhum bônus ou penalidade na produção de recursos.§!"
 symbiont_policy_worker: "$drone_policy_worker$"
 symbiont_policy_worker_name: "$symbiont_policy_worker$"
 symbiont_policy_worker_desc: "A Silvestria prioriza a extração de matéria-prima, levando os simbiontes associados a serem mais eficientes em detrimento de uma produção mais especializada e manufaturada.\n\n"
 symbiont_policy_thinker: "$drone_policy_thinker$"
 symbiont_policy_thinker_name: "$symbiont_policy_thinker$"
 symbiont_policy_thinker_desc: "A Silvestria prioriza a fabricação de bens, tornando-se mais eficiente em detrimento da extração de matérias-primas.\n\n"
