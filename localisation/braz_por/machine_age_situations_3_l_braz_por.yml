 situation_transformation_desc: "A iteração passiva do corpo mecânico chegou a uma conclusão lógica e inevitável. Estamos em uma era de transformação, estimulada por inovações e conduzida por oportunidades."
 situation_transformation_monthly_change_tooltip: "Nossos corpos mecânicos estão se preparando para a transformação."
