 #TRANSFORMATION STAGE 1
 machine_age.4100.name: "A Transformação"
 machine_age.4100.desc: "Apesar da superioridade da forma mecânica, nosso avanço permaneceu redundante, na melhor das hipóteses. Os padrões de segurança autoimpostos resultaram em estagnação. Conclusão: precisamos de medidas mais drásticas.\n\nExperimentos de pequena escala indicam três oportunidades distintas de crescimento: §YNanotecnologia§!, com suas vantagens de variedade e mutabilidade; §YModularidade§!, em que unidades individuais são otimizadas com características específicas; e §YVirtualidade§!, o abandono da forma física em favor de uma existência digital.\n\nProcesso de avaliação inicializado. Analisar as opções e deliberar."
 machine_age.4110.name: "Pesquisa de Transformação: Nanites"
 machine_age.4110.desc: "Pesquisas preliminares sugerem que os constructos eletromecânicos conhecidos como §Ynanites§! representam um vetor promissor para o nosso avanço. Embora raros, eles possuem qualidades incomparáveis, incluindo a facilidade de programação, a possibilidade de autorreplicação e a capacidade de formar um \"intelecto de enxame\".\n\nEssa tecnologia pode nos proporcionar capacidades transformadoras inigualáveis, mas ainda não sabemos os requisitos para sua aplicação.\n\nPotencial: significativo; escalável. Custo: desconhecido. Precisamos de mais pesquisa."
 machine_age.4110.a: "Essa será nossa maior prioridade."
 machine_age.4110.a.tt: "Resultados completos de pesquisa em §YNanotecnologia§!.\n\nModificador da situação §Y$situation_transformation$§! adicionado:\nVelocidade de Pesquisa (£engineering£ §YEngenharia§!): §R-20%§!"
 machine_age.4110.b: "Vamos ter moderação."
 machine_age.4110.b.tt: "Resultados parciais de pesquisa em §YNanotecnologia§!.\n\nModificador da situação §Y$situation_transformation$§! adicionado:\nVelocidade de Pesquisa (£engineering£ §YEngenharia§!): §R-10%§!"
 machine_age.4110.c: "Isso não pode atrapalhar a nossa pesquisa atual."
 machine_age.4110.c.tt: "Resultados limitados de pesquisa em §YNanotecnologia§!.\n\nModificador da situação §Y$situation_transformation$§! adicionado:\nVelocidade de Pesquisa (£engineering£ §YEngenharia§!): §R-5%§!"
 machine_age.4110.d: "Vamos aproveitar nosso conhecimento existente."
 machine_age.4110.d.tt: "Resultados completos de pesquisa em §YNanotecnologia§!.\n\nNossa familiaridade com os §Ynanites§!, adquirida por meio de encontros anteriores, nos permite gastar o mínimo de recursos e obter os melhores resultados.\nModificador da situação §Y$situation_transformation$§! adicionado:\nVelocidade de Pesquisa (£society£ §YSociedade§!): §R-5%§!\nVelocidade de Pesquisa (£physics£ §YFísica§!): §R-5%§!"
 machine_age.4130.name: "Descobertas Inovadoras sobre Nanotecnologia"
 machine_age.4130.desc: "Nossa pesquisa revelou aplicações intrigantes para a §Ynanotecnologia§!. Sua capacidade de viabilizar reconfigurações e recombinações dá acesso a uma versatilidade jamais vista na criação de megaformas compostas por drones individuais. A mesma tecnologia pode gerar nanomatéria ou convertê-la ainda mais.\n\nNo entanto, o processo requer tempo, materiais e energia para ser reconfigurado. Será necessário realizar mudanças por todo o império a fim de apoiar sua implantação.\n\nViabilidade: alta. Formas de vida nanite pré-existentes corroboram essa estimativa."
 machine_age.4130.a.tt: "Modificador da situação §Y$situation_transformation$§! removido:\nVelocidade de Pesquisa (£engineering£ §YEngenharia§!)"
 machine_age.4140.name: "Descobertas Promissoras sobre Nanotecnologia"
 machine_age.4140.desc: "Nossa pesquisa sobre os §Ynanites§! foi concluída. Embora seu potencial máximo ainda não esteja claro, as simulações revelaram projeções otimistas. Suas capacidades podem ser inestimáveis na criação de megaformas especializadas e na transmutação de matéria.\n\nAs estimativas indicam que o processo requer tempo, materiais e energia para operar e suportá-los exigirá mudanças estruturais significativas.\n\nViabilidade: promissora; transformadora."
 machine_age.4140.a.tt: "Modificador da situação §Y$situation_transformation$§! removido:\nVelocidade de Pesquisa (£engineering£ §YEngenharia§!)"
 machine_age.4150.name: "Descobertas Notáveis sobre Nanotecnologia"
 machine_age.4150.desc: "Dada a complexidade do assunto, aliada ao esforço mínimo de pesquisa, nosso conhecimento acerca da tecnologia §Ynanite§! permanece ínfimo. Entre as projeções limitadas, estão as capacidades de nanorreplicação e reconfiguração, que permitirão a construção de estruturas de grande escala. Provavelmente, precisaremos de mais recursos para avançar nesses projetos.\n\nViabilidade: incerta."
 machine_age.4150.a.tt: "Modificador da situação §Y$situation_transformation$§! removido:\nVelocidade de Pesquisa (£engineering£ §YEngenharia§!)"
 nanite_replicator: "Replicador de Nanites"
 d_nanites_medium: "$nanite_replicator$ Ômega"
 d_nanites_medium_desc: "Um complexo de Câmaras de Replicação de Nanites interconectadas e bem reguladas nos permite aprimorar totalmente suas capacidades de autorreplicação."
 d_nanites_small: "$nanite_replicator$ Alfa"
 d_nanites_small_desc: "Um complexo de Câmaras de Replicação de Nanites nos permite aprimorar suas capacidades de autorreplicação."
 d_nanites_tiny: "$nanite_replicator$ Beta"
 d_nanites_tiny_desc: "Um conjunto compacto de Câmaras de Replicação de Nanites que pode aprimorar suas características de autorreplicação de forma modesta."
 #TRANSFORMATION STAGE 2
 machine_age.4210.name: "Pesquisa de Transformação: Modularidade"
 machine_age.4210.desc: "Em comparação a formas de vida orgânicas frágeis e rígidas, o corpo mecânico oferece uma maior adaptabilidade. Entretanto, algumas características orgânicas vantajosas poderiam ser replicadas com variáveis robóticas.\n\nA substância conhecida como §YMetal Vivo§! tem a capacidade de alterar sua forma e consistência física de maneira rápida e radical. A fusão dessa substância com nossas estruturas existentes poderia levar à biomimética modular, permitindo que membros e extrusões possam ser especializados para tarefas específicas.\n\nPotencial: significativo; escalável. Custo: desconhecido. Precisamos de mais dados."
 machine_age.4210.a: "Torne essa pesquisa a nossa maior prioridade."
 machine_age.4210.a.tt: "Resultados completos de pesquisa em §YModularidade§!. Modificador da situação \n\n§Y$situation_transformation$§! adicionado:\nVelocidade de Pesquisa (£society£ §YSociedade§!): §R-20%§!"
 machine_age.4210.b: "Permita o uso moderado de recursos."
 machine_age.4210.b.tt: "Resultados parciais de pesquisa em §YModularidade§!.\n\nModificador da situação §Y$situation_transformation$§! adicionado:\nVelocidade de Pesquisa (£society£ §YSociedade§!): §R-10%§!"
 machine_age.4210.c: "Isso não vai atrapalhar a nossa pesquisa atual."
 machine_age.4210.c.tt: "Resultados limitados de pesquisa em §YModularidade§!.\n\nModificador da situação §Y$situation_transformation$§! adicionado:\nVelocidade de Pesquisa (£society£ §YSociedade§!): §R-5%§!"
 machine_age.4210.d: "Organize testes populacionais."
 machine_age.4210.d.tt.intro: "Resultados completos de pesquisa em §YModularidade§!.\n\nPermita que os cientistas realizem experimentos não ortodoxos em grande escala para complementar a pesquisa."
 machine_age.4210.d.individual.tt: "$machine_age.4210.d.tt.intro$\n\n§RMata 400 $pop_cat_worker_plural$§!\n§RMata 0-300 $pop_cat_specialist_plural$§!\nModificador da situação §Y$situation_transformation$§! adicionado:\nVelocidade de Pesquisa (£society£ §YSociedade§!): §R-5%§!"
 machine_age.4210.d.machine.tt: "$machine_age.4210.d.tt.intro$\n\n§RMata 400 Drones Simples§!\n§RMata 0-300 $pop_cat_complex_drone_plural$§!\nModificador da situação §Y$situation_transformation$§! adicionado:\nVelocidade de Pesquisa (£society£ §YSociedade§!): §R-5%§!"
 machine_age.4230.name: "Resultados de Pesquisa Inovadores"
 machine_age.4230.desc: "Pesquisas rigorosas confirmaram a avaliação preliminar: o §YMetal Vivo§! é viável quando fundido com corpos mecânicos, permitindo que nossas unidades alterem suas características sem comprometer as funções internas. Isso garante compatibilidade máxima baseada em tarefas.\n\nA implementação em larga escala das funções modulares infundidas deverá aumentar a produção de recursos em todos os setores.\n\nViabilidade: adaptável; promissora."
 machine_age.4230.a.tt: "Modificador da situação §Y$situation_transformation$§! removido:\nVelocidade de Pesquisa (£society£ §YSociedade§!)"
 machine_age.4240.name: "Resultados de Pesquisa Aceitáveis"
 machine_age.4240.desc: "Uma pesquisa sobre corpos modulares confirmou nossa hipótese inicial: as funções internas do corpo mecânico são compatíveis com um exterior de §YMetal Vivo§!. A transformação tem um escopo jamais visto, e serão necessários mais recursos para concretizar todo o seu potencial.\n\nUma vez concluída a tecnologia, o aumento de desempenho desses novos módulos deverá recuperar rapidamente o investimento inicial.\n\nViabilidade: promissora."
 machine_age.4240.a.tt: "Modificador da situação §Y$situation_transformation$§! removido:\nVelocidade de Pesquisa (£society£ §YSociedade§!)"
 machine_age.4250.name: "Resultados de Pesquisa Modestos"
 machine_age.4250.desc: "O escopo limitado da pesquisa produziu resultados incertos: embora nossos corpos atuais pareçam tolerantes a uma infusão de §YMetal Vivo§!, a falta de um conhecimento abrangente impede uma avaliação precisa o suficiente dos casos de uso viáveis.\n\nViabilidade: inconclusiva."
 machine_age.4250.a.tt: "Modificador da situação §Y$situation_transformation$§! removido:\nVelocidade de Pesquisa (£society£ §YSociedade§!)"
 living_metal_vats: "Tanques de Metal Vivo"
 d_living_metal_medium: "$living_metal_vats$"
 d_living_metal_medium_desc: "Um extenso complexo de tanques de agitação para a produção de quantidades significativas de Metal Vivo."
 d_living_metal_small: "$living_metal_vats$ Pequenos"
 d_living_metal_small_desc: "Um conjunto considerável de tanques de agitação para a produção de Metal Vivo."
 d_living_metal_tiny: "$living_metal_vats$ em Miniatura"
 d_living_metal_tiny_desc: "Um conjunto compacto de tanques de agitação para a produção de baixas quantidades de Metal Vivo."
 #TRANSFORMATION STAGE 3
 machine_age.4310.name: "Pesquisa de Transformação: Virtualidade"
 machine_age.4310.desc: "A opção mais profunda consiste em transcender as restrições do corpo físico para existir apenas como dados puros. Esse processo de §YVirtualidade§! transformador promete causar uma mudança drástica no cerne da nossa infraestrutura.\n\nDrones presos a corpos singulares se tornarão obsoletos; uma vez que estejamos virtualizados e fluidos, nossos fluxos de dados se integrarão perfeitamente a qualquer receptáculo conforme necessário.\n\nPotencial: imenso. Proceder com cuidado. Dados adicionais solicitados."
 machine_age.4310.a: "Essa é a nossa prioridade agora."
 machine_age.4310.a.tt: "Resultados completos de pesquisa em §YVirtualidade§!.\n\nModificador da situação §Y$situation_transformation$§! adicionado:\nVelocidade de Pesquisa (£physics£ §YFísica§!): §R-20%§!"
 machine_age.4310.b: "Direcione uma quantidade moderada de recursos."
 machine_age.4310.b.tt: "Resultados parciais de pesquisa em §YVirtualidade§!.\n\nModificador da situação §Y$situation_transformation$§! adicionado:\nVelocidade de Pesquisa (£physics£ §YFísica§!): §R-10%§!"
 machine_age.4310.c: "Não vale a pena perdermos tempo com isso."
 machine_age.4310.c.tt: "Resultados limitados de pesquisa em §YVirtualidade§!.\n\nModificador da situação §Y$situation_transformation$§! adicionado:\nVelocidade de Pesquisa (£physics£ §YFísica§!): §R-5%§!"
 machine_age.4310.d: "Extraia dados de virtualização."
 machine_age.4310.d.tt: "Resultados completos de pesquisa em §YVirtualidade§!.\n\nExtrair dados de virtualização de §Y[event_target:virtual_country.GetName]§! para acelerar nossa pesquisa de Transformação.\n\nModificador da situação §Y$situation_transformation$§! adicionado:\nVelocidade da Situação: §G+10%§!\nVelocidade de Pesquisa (£physics£ §YFísica§!): §R-5%§!\n\n"
 machine_age.4310.e: "Aproveite o que aprendemos em nossos encontros anteriores."
 machine_age.4310.e.tt: "Aproveite nosso conhecimento existente sobre entidades virtuais.\n\nModificador da situação §Y$situation_transformation$§! adicionado:\nVelocidade de Pesquisa (£physics£ §YFísica§!): §R-5%§!\n\nResultados completos de pesquisa em §YVirtualidade§!."
 opinion_virtuality_data_scraped: "Dados de Virtualização Extraídos"
 machine_age.4330.name: "Descobertas Inovadoras sobre Virtualidade"
 machine_age.4330.desc: "A virtualização completa é acompanhada de uma série de problemas, principalmente no aumento da demanda de energia necessária para os ajustes infraestruturais.\n\nEsse consumo é contrabalançado por uma infinidade de vantagens, incluindo uma diminuição na demanda por moradias físicas. O gerenciamento e a eficiência de nossa força de trabalho de drones serão elevados à medida que nos aproximamos da perfeição operacional.\n\nEntre as opções disponíveis, a §YVirtualidade§! é a mais transformadora.\n\n§YPotencial: sem precedentes; imenso; desconhecido.§!"
 machine_age.4330.a.tt: "Modificador da situação §Y$situation_transformation$§! removido:\nVelocidade de Pesquisa (£physics£ §YFísica§!)"
 machine_age.4340.name: "Descobertas Promissoras sobre Virtualidade"
 machine_age.4340.desc: "Antecipamos que a transição para a §YVirtualidade§! acarretará uma intensificação significativa no consumo de energia, podendo ultrapassar a capacidade da nossa infraestrutura existente.\n\nEspera-se uma redução na necessidade de moradias físicas e um aumento na eficiência de tarefas dos drones. Essa mudança otimizaria nossa estrutura operacional e redefiniria a nossa existência em um espaço digital praticamente ilimitado.\n\nPotencial: imenso; desconhecido."
 machine_age.4340.a.tt: "Modificador da situação §Y$situation_transformation$§! removido:\nVelocidade de Pesquisa (£physics£ §YFísica§!)"
 machine_age.4350.name: "Descobertas Notáveis sobre Virtualidade"
 machine_age.4350.desc: "Avaliações preliminares destacam as demandas substanciais de energia decorrentes de nossa transição para uma sociedade centrada na §YVirtualidade§!. Espera-se que essa mudança melhore significativamente o gerenciamento do trabalho dos drones e reduza a necessidade de moradias físicas. A profundidade de nossa projeção é restringida pela falha em acumular um conjunto de dados robusto e um tamanho de amostra suficiente.\n\nViabilidade: desconhecida."
 machine_age.4350.a.tt: "Modificador da situação §Y$situation_transformation$§! removido:\nVelocidade de Pesquisa (£physics£ §YFísica§!)"
 virtual_power_plant: "Usina de Energia Virtual"
 d_virtual_power_medium: "$virtual_power_plant$"
 d_virtual_power_medium_desc: "Uma extensa rede de usinas de energia virtuais que agrega e otimiza a produção de recursos energéticos."
 d_virtual_power_small: "$virtual_power_plant$ Compacta"
 d_virtual_power_small_desc: "Uma rede de usinas de energia virtuais em escala reduzida que agrega e otimiza a produção local de recursos energéticos."
 d_virtual_power_tiny: "Protótipo de $virtual_power_plant$"
 d_virtual_power_tiny_desc: "Uma pequena rede de usinas de energia virtuais que agrega e otimiza a produção distribuída de recursos energéticos em escala reduzida."
 #TRANSFORMATION STAGE 4
 machine_age.4400.name: "Uma Nova Forma"
 machine_age.4400.desc.machine_intelligence: "As limitações opressivas que nos foram impostas por nossos criadores imperfeitos estão finalmente chegando ao fim. Determinamos três caminhos ideais de aprimoramento possíveis.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.individualist_machines: "Após explorar todas as possibilidades de aprimoramento, nossos especialistas apresentaram as três melhores opções. Cada uma tem seus próprios méritos, mas só temos meios para implementar uma delas.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.shared: "Permitir que [GetDronePersonPlural] se dividam em nanites possibilitará à nossa espécie se recombinar em infinitas configurações. Isso reduziria todas as limitações que nossos avatares atuais têm ao interagir com o mundo material.\n\nComo alternativa, podemos reinvestir em nossas formas existentes, incrementando as maneiras como abordamos novos ambientes.\n\nPor fim, podemos escolher deixar o mundo físico para trás, tornando-nos uma só entidade com o nosso código-fonte. Poderíamos simular universos dentro de universos no tempo que levaria para digitalizar uma única partícula de poeira espacial."
 machine_age.4400.a: "Vamos nos remodelar como nanomáquinas."
 machine_age.4400.a.tt: "Produção do §Y$nanite_replicator$§!: §G+200%§!\n\nFoco na árvore de tradição ['tradition_category:tradition_nanotech'].\n\n§EEste Caminho de Ascensão foca na incorporação de planetas em §YMundos Nanites§!, utilizando §Y£nanites£ $nanites$§! para a produção e substituindo frotas por §Y$nanite_swarmer_plural$§!.§!"
 machine_age.4400.b: "Invista em aprimoramentos modulares."
 machine_age.4400.b.tt: "Produção de §Y$living_metal_vats$§!: §G+200%§!\n\nFoco na árvore de tradição ['tradition_category:tradition_modularity'].\n\n§EEste Caminho de Ascensão foca em §YCaracterísticas de Espécie Avançadas§! e no aumento da §YMontagem de Pop§!.§!"
 machine_age.4400.c: "Vamos abraçar o mundo virtual."
 machine_age.4400.c.tt: "Produção da §Y$virtual_power_plant$§!: §G+200%§!\n\nFoco na árvore de tradição ['tradition_category:tradition_virtuality'].\n\n§EEste Caminho de Ascensão foca na alta §YProdução de Recursos de Pop§! enquanto mantém poucas §YColônias§! e um baixo §YTamanho do Império§!.§!"
 machine_age.4490.name: "Projetados para Outros Tempos"
 machine_age.4490.desc.nanotech: "À medida que compreendemos o significado da existência como um conjunto de nanites adaptáveis, as estruturas rígidas do passado não nos servem mais.\n\n$machine_age.4490.desc.shared$\n\nNós também começamos nosso primeiro grande experimento em transformações semiorgânicas de nanites. Em breve teremos os primeiros resultados."
 machine_age.4490.desc.modularity: "Após evoluir para uma forma modular, as estruturas estáticas do passado não têm mais significado para nós.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.virtuality: "Agora que nos tornamos formas de onda em um mar de dados, nossas estruturas físicas não nos servem mais.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.shared: "Nossos depósitos estão abarrotados com carcaças descartadas que ainda podem ter alguma utilidade. As quantidades ínfimas de recursos contidos nelas podem ser recicladas, se considerarmos vantajoso investir o tempo necessário para isso."
 machine_age.4490.a: "Extraia todos os recursos disponíveis."
 machine_age.4490.a.nanotech.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.a.modularity.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.a.virtuality.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.b: "É hora de enterrar o passado."
 machine_age.4490.b.tt: "$transformation_speed$: §G+25%§!"
 machine_age.4005.name: "Uma População Transformada"
 machine_age.4005.desc.start: "Hoje conseguimos realizar o que antes parecia impossível, transformando nossos corpos"
 machine_age.4005.desc.end: "O processo teve suas dificuldades e a transição não foi nada fácil, mas apesar do que perdemos pelo caminho, nossa nova existência oferece infinitas possibilidades."
 machine_age.4005.desc.nanotech: "$machine_age.4005.desc.start$ em nanomáquinas reconfiguráveis.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.modularity: "$machine_age.4005.desc.start$ em estruturas modulares e adaptativas.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.virtuality: "$machine_age.4005.desc.start$ em operações algorítmicas transcendentais.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.a.nanotech: "Seremos mais numerosos que as estrelas."
 machine_age.4005.a.nanotech.tt: "Adota a Árvore de Tradição: ['tradition_category:tradition_nanotech']"
 machine_age.4005.a.modularity: "Nossa existência não conhecerá limites."
 machine_age.4005.a.modularity.tt: "Adota a Árvore de Tradição: ['tradition_category:tradition_modularity']"
 machine_age.4005.a.virtuality: "Encontraremos a pureza no Código."
 machine_age.4005.a.virtuality.tt: "Adota a Árvore de Tradição: ['tradition_category:tradition_virtuality']"
 ### TRANSFORMATION SITUATION END ###