 cyber_event_knowledge_engineering: "Transferência de Conhecimento de Engenharia"
 cyber_event_knowledge_engineering_desc: "Conhecimentos referentes à engenharia são transferidos para a mente de cientistas em detrimento de outros campos de pesquisa."
 cyber_event_knowledge_physics: "Transferência de Conhecimento de Física"
 cyber_event_knowledge_physics_desc: "Conhecimentos referentes à física são transferidos para a mente de cientistas em detrimento de outros campos de pesquisa."
 cyber_event_knowledge_society: "Transferência de Conhecimento de Sociedade"
 cyber_event_knowledge_society_desc: "Conhecimentos referentes à sociedade são transferidos para a mente de cientistas em detrimento de outros campos de pesquisa."
 cyber_implant_taxes: "Impostos sobre Implantes"
 cyber_implant_taxes_desc: "Há uma tributação pesada sobre materiais e a produção de implantes cibernéticos."
 cyber_implant_taxes_tt: "Créditos Energéticos Mensais: §G+5%§!\nCusto de Crescimento de $pop_cat_cyborg$: §R+10%§!"
 cyber_reformed_implant_taxes: "Reforma de Impostos sobre Implantes"
 cyber_reformed_implant_taxes_desc: "A reforma da tributação sobre materiais e a produção de implantes cibernéticos leva a lucros de curto prazo."
 cyber_reformed_implant_taxes_tt: "Créditos Energéticos Mensais: §G+10%§!"
 cyber_market_standards: "Padrões do Mercado de Implantes"
 cyber_market_standards_desc: "Produtores de implantes cibernéticos fajutos são processados e obrigados a elevar seus padrões."
 cyber_implant_weapons: "Implantes de Armas"
 cyber_implant_weapons_desc: "É permitido aos cidadãos a instalação de implantes pessoais de armas."
 cyber_implants_dismantled: "Desconstrução de Implantes Perigosos"
 cyber_implants_dismantled_desc: "Todos os implantes feitos com a intenção de ferir outras pessoas estão sendo recolhidos e transformados em produtos mais apropriados."
 cyber_implant_hacks: "Hackeamento de Implantes"
 cyber_implant_hacks_desc: "Hackers que detêm o código-fonte de controle central podem acessar – e manipular – os implantes de outras pessoas."
 cyber_counter_hacking: "Resposta ao Hackeamento de Implantes"
 cyber_counter_hacking_desc: "Investigadores de dados rastreiam hackeamentos ilegais de implantes por meio de nossas redes de comunicação."
 cyber_protests: "Protestos pelo Atraso de Implantes"
 cyber_protests_desc: "Nossa população estava tão acostumada a um fluxo constante de novas melhorias que agora se revolta com os recentes atrasos na entrega de produtos."
 cyber_stop_protests: "Dispersão dos Protestos"
 cyber_stop_protests_desc: "Manifestações contra os atrasos nas entregas de nosso cronograma de implantes estão sendo dispersadas."
 #Policies
 policy_cyberization_standards: "Padrões de Ciberização"
 policy_cyberization_standards_desc: "Implantes para toda a população são uma necessidade em nossa sociedade, mas aqueles que se opõem à ciberização total podem optar por melhorias limitadas."
 cyberization_standards_full_name: "Ciberização Total"
 cyberization_standards_full: "$cyberization_standards_full_name$"
 cyberization_standards_full_effect: "Líderes Espiritualistas ganham a Característica: §Y$leader_trait_cyborg$§!\nPops Espiritualistas ganham a Característica: §Y$trait_cybernetic$§!"
 cyberization_standards_full_desc: "Todos os indivíduos devem passar pela instalação de um conjunto completo de implantes cibernéticos.\n\n§E$cyberization_standards_full_effect$§!"
 cyberization_standards_limited_name: "Ciberização Limitada"
