 situation_cyberization_hive: "Ciberização"
 situation_cyberization_hive_type: "Situação de Ascensão"
 situation_cyberization_hive_desc: "Uma Mente-Colmeia precisa de uma população com corpos superiores. Com implantes cibernéticos, nossos drones podem ser aperfeiçoados, aprimorados e remodelados.\nChegou a hora de transcender os limites da nossa biologia.\n\n§YPops que receberão implantes no próximo mês§!: §G[From.GetCyberPopsPerMonth]§!"
 situation_cyberization_hive_monthly_change_tooltip: "Nossos corpos se tornarão cibernéticos, uma fusão perfeita entre o orgânico e a máquina."
 situation_cyberization_hive_outcome: "Uma população cibernética."
 stage_cyberization_hive_effects: "Precisamos projetar implantes cibernéticos, instalá-los e nos transformar."
 cyber.hive_government_shift.tt: "Influencia a §YMudança da Consciência Cibernética§! em andamento."
 situation_cyberization_culled_drones_desc: "Drones Defeituosos Descartados"
 situation_cyberization_researching_alternatives_desc: "Pesquisando Implantes Alternativos"
 situation_cyberization_hive_triggered_modifier: "Modificador da situação §Y$situation_cyberization_hive$§! adicionado:\n"
 triggered_opinion_hive_integrated: "Colmeia Integrada"
 cyber_hive_imperfect_drones: "Drones Imperfeitos"
 cyber_hive_imperfect_drones_desc: "Todos são úteis."
 cyber_hive_recycling_implants: "Reciclando Implantes"
 cyber_hive_recycling_implants_desc: "Implantes velhos para drones novos."
 cyber_hive_recycling_everything: "Eficiência Sombria"
 cyber_hive_recycling_everything_desc: "Nada é sagrado. Nada é desperdiçado."
 cyber_hive_cyber_babies: "Juventude Cibernética"
 cyber_hive_cyber_babies_desc: "Novos drones são equipados com implantes ao serem gerados."
 cyber_hive_no_cyber_babies: "Ciberização Gradual"
 cyber_hive_no_cyber_babies_desc: "Implantes são instalados gradualmente, reduzindo o dano causado a drones subdesenvolvidos."
 cyber_hive_no_individual_drones: "Proibição de Individualidades"
 cyber_hive_no_individual_drones_desc: "Identificadores pessoais são expressamente proibidos."
 cyber_hive_individual_drones: "Autoexpressão"
 cyber_hive_individual_drones_desc: "Drones podem expressar sua individualidade livremente."
 cyber_hive_individual_leader_drones: "Autoexpressão Restrita"
 cyber_hive_individual_leader_drones_desc: "Para os nossos melhores drones, o dom mais raro: uma noção de si."
 ### AUTHORITIES ###
 #VOLITIONAL
 auth_cyber_hive_volitional: "Colmeia Volitiva"
 auth_cyber_hive_volitional_desc: "Cada drone, um indivíduo. Cada pensamento, uma nova perspectiva a ser considerada pelo coletivo. Inúmeras mentes formam uma Colmeia muito maior do que a soma de suas partes."
 concept_auth_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
 gov_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
