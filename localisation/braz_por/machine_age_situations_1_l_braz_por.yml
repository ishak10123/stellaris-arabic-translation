 cyber_event_bliss_underground: "Modificações de Êxtase Clandestinas"
 cyber_event_bliss_underground_desc: "Implantes instáveis obtidos por meios questionáveis que prometem alegria e bem-estar ao alcance de um botão."
 cyber_event_bliss_regulate: "Modificações de Êxtase Regulamentadas"
 cyber_event_bliss_regulate_desc: "O governo está satisfeito em regular modificações regenerativas e indutoras de alegria sem precisar produzi-las."
 cyber_event_worklife_name: "$cyber.615.name$"
 cyber_event_worklife_own: "Memória de Trabalho Irrestrita"
 cyber_event_worklife_own_desc: "As pessoas não são obrigadas a isolar seções da própria memória, seja no trabalho ou em casa."
 cyber_event_worklife_leave: "Memória de Trabalho Restrita"
 cyber_event_worklife_leave_desc: "As pessoas são obrigadas a isolar memórias relacionadas aos seus empregos quando deixam o local de trabalho, evitando assim a espionagem industrial."
 cyber_event_worklife_isolate: "Memória de Trabalho Isolada"
 cyber_event_worklife_isolate_desc: "As pessoas são obrigadas a separar completamente suas memórias entre trabalho e tempo livre, evitando assim a espionagem industrial e conflitos éticos com o empregador."
