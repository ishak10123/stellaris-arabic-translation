 #FIRST EVENT #
 #DEMOCRATIC
 cyber.505.name: "Choque Futuro"
 cyber.505.desc.gov: "A melhoria de nosso povo tem sido um triunfo da otimização dos processos de fabricação e tomada de decisões. Nossas inúmeras vozes distintas foram ouvidas e suas preocupações atendidas. Agora, cada indivíduo §Y[root.GetSpeciesAdj]§! tem a mesma oportunidade de se beneficiar desses implantes revolucionários.\n\nO próximo passo lógico é examinar as implicações mais amplas dessa tecnologia. Devemos aproveitá-la no processo democrático ou aprimorar nossos trabalhadores por meio da sincronização de experiências?"
 cyber.505.desc.cor: "O processo de melhoria ao lado de nossas corporações parceiras foi concluído com sucesso. Os implantes foram fabricados, distribuídos e instalados com uma eficiência impressionante. As muitas vozes do povo §Y[root.GetSpeciesAdj]§! foram ouvidas, e suas preocupações legítimas foram sanadas. Estamos prontos para encarar o futuro com vigor renovado.\n\nAgora, nosso governo se prepara para dar o próximo passo. Podemos usar nossos avanços tecnológicos para melhorar o processo democrático ou sincronizar os implantes em prol dos trabalhadores."
 cyber.505.desc.ind: "Apesar de certa apreensão por parte dos oficiais do governo, o modelo de distribuição descentralizado de implantes tem sido um sucesso. Pequenas clínicas e assistências técnicas estão surgindo em cada esquina, permitindo que qualquer indivíduo possa obter melhorias sem precisar ir muito longe.\n\nNosso governo também precisa estar pronto para evoluir. Podemos utilizar os implantes para fortalecer nosso processo democrático ou usá-los para sincronizar nossas experiências em benefício próprio e dos trabalhadores."
 cyber.505.a: "Devemos aprimorar o processo democrático."
 cyber.505.a.tt: "Ênfase no aumento da felicidade, da unidade e dos especialistas."
 cyber.505.b: "Devemos conectar nossas mentes."
 cyber.505.b.tt: "Ênfase no aumento da felicidade, da produção dos trabalhadores e da estabilidade."
 #OLIGARCHIC
 cyber.510.name: "Reestruturação de Poder"
 cyber.510.desc.gov: "Esta mudança monumental só pode ser compreendida e sancionada pelo alto escalão da sociedade, para que não resulte em confusão e discordância entre nossos súditos. Enquanto os §Y[Species.GetNamePlural]§! estiverem equipados com seus implantes cibernéticos fornecidos pelo governo, temos uma oportunidade única de explorar as novas possibilidades proporcionadas por esses chips.\n\nDevemos buscar uma sociedade onde a competição acirrada leve nossos trabalhadores a novos patamares ou aproveitar o poder computacional ocioso das mentes adormecidas?"
 cyber.510.desc.cor: "Enquanto as corporações sancionadas pelo governo produzem biochips cada vez mais avançados, devemos decidir como melhor utilizar essa incrível transformação social.\n\nDevemos imitar a natureza, onde apenas os mais fortes sobrevivem, ou cultivar o potencial inexplorado do cérebro adormecido?"
 cyber.510.desc.ind: "Para o bem ou para o mal, o povo será autorizado a fabricar e distribuir dispositivos de melhorias cibernéticas, nos permitindo analisar o quadro geral e descobrir como aproveitar ao máximo essa transformação social inesperada.\n\nDevemos pressionar as pessoas para atingir cotas cada vez mais altas, ou, em vez disso, fazê-las trabalhar para nós enquanto dormem?"
 cyber.510.a: "Faça com que trabalhem para nós."
 cyber.510.a.tt: "Ênfase no aumento de produção às custas de felicidade."
 cyber.510.b: "Explore o poder do sono."
 cyber.510.b.tt: "Ênfase em impulsionar facções para obter recursos extras."
 #DICTATORIAL
 cyber.515.name: "Controle das Massas"
 cyber.515.desc.gov: "Nosso programa de melhorias revelou várias oportunidades para aumentar a estabilidade social e o controle governamental. A fabricação de implantes fornecidos pelo governo e a sua subsequente instalação em nossa população nos permite inserir com facilidade algoritmos ocultos para manipular o povo em direção a um rumo desejado.\n\nPoderíamos aumentar nossa cobertura de vigilância adicionando ferramentas de monitoramento e acesso aos implantes pessoais, ou instalar um código que permita que a personalidade radiante da nossa §Yliderança§! influencie as massas."
 cyber.515.desc.cor: "Nossas corporações parceiras estão prontas para fabricar, distribuir e instalar implantes cibernéticos em grande escala, e uma futura atualização de firmware nos apresenta uma oportunidade única.\n\nPoderíamos incluir ferramentas ocultas de vigilância nos dispositivos de melhoria pessoal que nos permitiriam identificar indivíduos problemáticos, ou criar uma função de sobreposição de personalidade que imponha a vontade de nossa §Yliderança§! sobre as massas."
 cyber.515.desc.ind: "Hospitais, lojas de esquina e comunidades de hackers, todos estão prontos para distribuir e instalar implantes cibernéticos na população. Mas não há necessidade de descentralizar totalmente nosso controle sobre essa nova e maravilhosa tecnologia.\n\nPoderíamos fornecer modificações de implantes personalizadas com nossas próprias ferramentas ocultas de vigilância para monitorar indivíduos problemáticos. Alternativamente, poderíamos instalar algoritmos de sobreposição de personalidade que permitirão à nossa §Yliderança§! guiar subconscientemente nosso povo rumo à grandeza."
 cyber.515.a: "Esconda ferramentas de vigilância nos implantes pessoais."
 cyber.515.a.tt: "Ênfase na estabilidade do império e na redução da criminalidade."
 cyber.515.b: "Vamos estudar a sobreposição de personalidade."
 cyber.515.b.tt: "Ênfase na produção dos trabalhadores e na recolonização."
 #IMPERIAL
 cyber.520.name: "Choque Futuro"
 cyber.520.desc.gov: "O governo empregou seus vastos recursos para melhorar a população de forma eficiente. Centros de melhoria autorizados têm instalado implantes dia e noite, e as pessoas recebem orientação quanto às práticas adequadas de uso e manutenção.\n\nMas a verdadeira questão é se o valor real dos implantes está em aprimorar nossa já impressionante liderança ou servir como meio de entreter e distrair a população geral.\n\nTer implantes da mais alta qualidade à disposição de nossa dinastia permitiria que nossas lideranças preservassem o conhecimento entre suas gerações, proporcionando uma estabilidade inestimável. Por outro lado, o império pode elevar a condição da capital por meio do entretenimento, colocando atletas ciberneticamente aprimorados para disputar eventos esportivos sanguinários de última geração."
 cyber.520.desc.cor: "As corporações oficialmente autorizadas têm cumprido as diretrizes operacionais. Toda a população teve implantes cibernéticos instalados e está pronta para servir de forma mais eficiente do que nunca.\n\nA questão agora é no que devemos concentrar o uso dos implantes para nos beneficiarmos de seu real valor.\n\nTer implantes da mais alta qualidade à disposição de nossa dinastia permitiria que nossas lideranças preservassem o conhecimento entre suas gerações, proporcionando uma estabilidade inestimável. Por outro lado, o império pode elevar a condição da capital por meio do entretenimento, colocando atletas ciberneticamente aprimorados para disputar eventos esportivos sanguinários de última geração."
 cyber.520.desc.ind: "Apesar das muitas ressalvas de oficiais imperiais, a distribuição e instalação descentralizadas de implantes cibernéticos foram um sucesso. Várias pequenas clínicas em nossos mundos têm trabalhado incansavelmente para aprimorar a nossa população.\n\nA questão agora é no que devemos concentrar o uso dos implantes para nos beneficiarmos de seu real valor. Preservar o conhecimento imperial com implantes intergeracionais ou fornecer às massas um esporte cibernético sanguinário, algo nunca antes visto por qualquer implante ocular?"
 cyber.520.a: "Vamos preservar o conhecimento imperial."
 cyber.520.a.tt: "Ênfase no governante imperial."
 cyber.520.b: "Fornecer entretenimento às massas."
 cyber.520.b.tt: "Ênfase na produtividade e felicidade do planeta capital."
 #CORPORATE
 cyber.525.name: "Implantes S/A"
 cyber.525.desc.gov: "O amplo, porém ineficaz, programa governamental de implantes está perto de ser concluído, oferecendo uma oportunidade para expandirmos ainda mais as fontes de receita relacionadas a esse lançamento de produto sem precedentes. Nossa equipe de análise está propondo duas fontes potenciais de renda, ambas com seus próprios riscos e recompensas.\n\nO governo deveria exigir a inclusão de publicidade em todos os futuros implantes oculares, ou obrigar a população com melhorias a instalar atualizações regulares?"
 cyber.525.desc.cor: "A eficiência da produção e instalação de implantes está dentro do esperado de nossa infraestrutura corporativa altamente otimizada. As oportunidades comerciais desses novos implantes são praticamente infinitas.\n\nDois caminhos particularmente promissores surgiram; embora mutuamente exclusivos, ambos preveem margens de lucro estelares.\n\nA questão é: devemos exigir a inclusão de publicidade em todos os futuros implantes oculares, ou obrigar a população com melhorias a instalar atualizações regulares?"
 cyber.525.desc.ind: "Como era de se esperar, a implementação \"comunitária\" e desordenada de dispositivos cibernéticos está chegando ao fim. Agora temos a oportunidade de influenciar os rumos dessa nova e promissora tecnologia, aumentando as margens de nossos produtos no processo.\n\nDeveríamos incluir anúncios em todos os futuros implantes oculares, ou seria melhor obrigar um ciclo de atualizações contínuas para softwares e componentes neurocibernéticos?"
 cyber.525.a: "Crie protótipos de implantes oculares com suporte para anúncios."
 cyber.525.a.tt: "Ênfase no aumento do comércio e na diminuição dos custos de oportunidades econômicas."
 cyber.525.b: "Pesquise planos de atualização de implantes."
 cyber.525.b.tt: "Ênfase em programas de produtividade, espionagem e manutenção de confortos."
 ### EVENT POOL ###
 cyber.610.name: "Êxtase Instantâneo"
 cyber.610.desc: "Uma modificação de implante clandestina que estimula o cérebro a produzir substâncias neurotransmissoras livremente está se espalhando entre os trabalhadores. O efeito tem uma ampla gama de usos, desde instigar prazer intenso até aumentar a tolerância à dor. Desenvolver uma versão comercial estável a partir do implante ilegal exigiria investimentos substanciais, e os efeitos estimulantes acabarão desaparecendo com o tempo.\n\nDevemos criar uma versão comercial, revender o protótipo clandestino ou apenas regular seu uso?"
 cyber.610.a: "Crie um implante estável."
 cyber.610.b: "Vamos nos apropriar do protótipo clandestino."
 cyber.610.c: "Regulamente o uso desses tipos de modificações."
 cyber.615.name: "Separação de Trabalho e Vida Pessoal"
 cyber.615.desc: "Cada vez mais empresas exigem que todas as experiências vividas durante o expediente sejam armazenadas em uma área da memória cibernética inacessível fora do trabalho.\n\nElas afirmam usar essa funcionalidade apenas com tarefas altamente confidenciais a fim de evitar a espionagem corporativa. Algumas até exigem que seus funcionários isolem suas experiências privadas no trabalho para evitar que a ética pessoal interfira na produtividade."
 cyber.615.a: "O povo deve ter controle absoluto."
 cyber.615.b: "É saudável deixar o trabalho no escritório."
 cyber.615.c: "Isole ambas as experiências."
 cyber.625.name: "Monetização por Assinatura"
 cyber.625.desc: "Com os dispositivos cibernéticos tão enraizados em nossas vidas, mudanças nos modelos de monetização afetam dramaticamente toda a sociedade. A tendência mais recente dos fabricantes de implantes é oferecer funcionalidades essenciais apenas através de um plano de assinatura. Deixe de fazer um pagamento e, de repente, seus membros cibernéticos travam e sua visão é desligada. Organizações de consumidores pedem o fim dessas práticas."
 cyber.625.a: "Vamos proibir os planos de assinatura para dispositivos cibernéticos."
 cyber.625.b: "Se não podem pagar, não devem comprar."
 cyber.625.c: "Vamos limitar as assinaturas a funções não essenciais."
 cyber.625.d: "Que ótima ideia! Cobre ainda mais."
 cyber_subscription_ban: "Proibição de Assinaturas para Dispositivos Cibernéticos"
 cyber_subscription_ban_desc: "Proibimos os fabricantes de dispositivos cibernéticos de restringir o uso de recursos de implantes com planos de assinatura."
 cyber_subscription_limited: "Limitação de Assinaturas para Dispositivos Cibernéticos"
 cyber_subscription_limited_desc: "Proibimos os produtores de dispositivos cibernéticos de restringir o uso de recursos essenciais de implantes com planos de assinatura."
 cyber_subscription: "Adiciona os seguintes modificadores à característica de espécie §Y$trait_cybernetic$§!:\n$t$Felicidade: §R-5%§!\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_traders']: §G+25%§!"
 cyber_subscription_megacorp: "Adiciona os seguintes modificadores à característica de espécie §Y$trait_cybernetic$§!:\n$t$Felicidade: §R-5%§!\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_traders']: §G+50%§!"
 cyber.655.name: "Falha Mecânica Imprevista"
 cyber.655.desc: "Nossos engenheiros de dispositivos cibernéticos nos apresentaram uma oportunidade econômica. Com apenas uma ligeira redução na durabilidade dos implantes, podemos gerar um aumento substancial nos lucros já que com isso os usuários terão que substituir peças essenciais.\n\nAo utilizar uma bioliga de qualidade inferior nas partes mais comuns sujeitas a desgaste, os implantes devem falhar sem causar danos aos consumidores, mas de forma que necessitem de manutenção."
 cyber.655.a: "Absurdo!"
 cyber.655.a.tt: "Não vamos fornecer componentes de baixa qualidade aos nossos cidadãos!\n\n"
 cyber.655.b: "Intrigante. Produza dispositivos cibernéticos mais frágeis."
 cyber.655.c: "Perfeito! Alie isso a um aumento nos preços também."
 cyber.655.d: "Use esses dados para aperfeiçoar nossos esforços de ciberização."
 worse_parts: "Peças Inferiores"
 worse_parts_desc: "Optamos por fornecer intencionalmente aos nossos cidadãos componentes cibernéticos de qualidade inferior, o que significa que eles terão que comprar peças de reposição com maior frequência."
 worse_parts_effect_tt: "$r_trade$ a cada $pop_group_unit$ £pop£ §HPops§! com a característica §Y$trait_auto_mod_cyborg$§!: §G+0.5§!"
 optimized_parts: "Peças Otimizadas"
 optimized_parts_desc: "Continuamos a inovar e aperfeiçoar nossos componentes cibernéticos levando a um processo de instalação mais rápido e simples."
 optimized_parts_effect_tt: "Manutenção de $r_energy$ para £pop£ §HPops§! com a característica §Y$trait_auto_mod_cyborg$§!: §R+0.1§!"
 cyber.660.name: "Falha Social Imprevista"
 cyber.660.desc: "Parece que nossos cidadãos descobriram nossa iniciativa de obsolescência programada.\n\nAs ruas foram tomadas por [Owner.GetSpeciesNamePlural] indignados com as recentes mudanças realizadas na qualidade e custo dos dispositivos cibernéticos. Eles pedem que essas mudanças sejam revertidas."
 cyber.660.a: "Tudo bem, fomos gananciosos demais desta vez."
 cyber.660.b: "Oi? NÃO PODEMOS OUVIR VOCÊS!"
 cyber.660.c: "Não será necessário..."
 discontent: "Descontentamento"
 discontent_desc: "Nossos cidadãos estão se rebelando devido ao recente aumento de preços e à queda na qualidade dos dispositivos cibernéticos."
 cyber.805.name: "Controles Parentais"
 cyber.805.desc: "Com a popularização dos implantes cerebrais neonatais, os cuidadores passaram a solicitar mais controle sobre seus filhos. A capacidade de assumir o controle das funções motoras é atualmente reservada para os executores, mas alguns desejam estender esse direito também aos tutores legais.\n\nEmbora isso seja uma clara violação da autonomia corporal, várias outras formas de coerção parental já são permitidas. A alternativa seria permitir um controle limitado, que serviria para reduzir a velocidade ou o volume da criança desobediente."
 cyber.805.a: "Permita que os adultos controlem seus filhos."
 cyber.805.b: "Permita um controle limitado."
 cyber.805.c: "Deixar o controle corporal para os executores."
 cyber.810.name: "Transferência de Conhecimento"
 cyber.810.desc: "O desenvolvimento dos implantes cerebrais cibernéticos nos oferece uma oportunidade tentadora. Em vez de depender de métodos de ensino subjetivos e lentos, poderíamos transferir conhecimentos essenciais diretamente de um cérebro para outro. Isso requer condições laboratoriais estéreis e, portanto, não seria viável em larga escala. A informação recebida também sobrescreve partes da própria memória do receptor que sejam de um tipo semelhante.\n\nA aplicação mais impactante desta tecnologia envolveria o compartilhamento de conhecimento entre cientistas. Isso poderia ser usado para compensar parte da dívida de engenharia causada pelo processo de ciberização ou ser direcionado a outras áreas."
 cyber.810.a: "Transfira conhecimento de Engenharia."
 cyber.810.b: "Transfira conhecimento de Física."
 cyber.810.c: "Transfira conhecimento de Sociedade."
 cyber.810.d: "Não mexa na mente de ninguém."
 cyber.815.name: "Amor Descentralizado"
 cyber.815.desc: "Enquanto muitos [root.GetSpeciesNamePlural] têm melhorado suas vidas cotidianas e seus relacionamentos usando os dispositivos cibernéticos disponíveis à venda, um número crescente de famílias com diversos parceiros optou por utilizar redes privadas de equipamentos feitos sob medida. Esses grupos domiciliares escolheram viver em isolamento personalizado, compartilhando sentimentos e experiências entre eles com uma intimidade incomparável.\n\nAlguns intelectuais e organizações de bem-estar social aplaudem tal fenômeno, sugerindo que todos poderiam se beneficiar do melhoramento personalizado de relacionamentos e laços familiares. Outros levantam preocupações com esse afastamento da sociedade, chegando a sugerir que tais práticas podem fazer com que os indivíduos se percam em \"microgestalts do amor\"."
 cyber.815.a: "Como eles escolhem viver e amar não é problema nosso."
 cyber.815.a.tt: "Continuaremos a permitir o acesso a equipamentos personalizados e espaços digitais privados."
 decentralized_families: "Famílias Descentralizadas"
 decentralized_families_desc: "Relações domiciliares de todos os tipos podem enriquecer relacionamentos com o uso de softwares e melhorias feitos sob medida."
 cyber.815.b: "Traga essas famílias de volta ao convívio em sociedade."
 cyber.815.b.tt: "Desencorajaremos a personalização de melhorias em prol de soluções mais regulamentadas."
 centralized_families: "Famílias Centralizadas"
 centralized_families_desc: "Controles mais rígidos sobre as melhorias cibernéticas e softwares desencorajam famílias a erguer paraísos digitais privativos." #as in a richly decorated but enclosed space
 cyber.820.name: "Imagem Radical"
 cyber.820.desc: "Subculturas alternativas sempre existiram na história do povo [root.GetSpeciesAdj], mas com o surgimento dos aprimoramentos cibernéticos a situação mudou: grupos mais radicais começaram a se alterar de forma tão extrema que quase não se assemelham mais a indivíduos de sua própria espécie. Os jovens em particular estão ampliando o abismo geracional com sua ânsia pela personalização extrema de [root.GetSpeciesHandNamePlural], arte corporal em 3D e outras modificações decorativas.\n\nEntusiastas argumentam que os jovens estão abraçando suas verdadeiras identidades, e que ao renunciar à homogeneidade de sua espécie estão simplesmente tomando as rédeas das próprias vidas. Porém, tal visão é cada vez mais repudiada por familiares preocupados e estudiosos sociais, que consideram esses indivíduos delinquentes empenhados em arruinar a sociedade."
 cyber.820.a: "Implemente diretrizes mais rígidas para modificações corporais."
 cyber.820.b: "É só uma fase. Vai passar."
 radical_image: "Imagem Radical"
 radical_image_desc: "Os jovens desta sociedade estão experimentando audaciosamente com a própria imagem."
 cyber.820.c: "Podemos aprender algo com esses jovens."
 radical_insights: "Ideias Radicais"
 radical_insights_desc: "Seguindo o exemplo estabelecido por modificadores corporais da contracultura, esta sociedade está experimentando em sua própria imagem com novos tipos de melhorias estéticas."
 cyber.821.name: "Protestos Radicais"
 cyber.821.desc: "Jovens, ativistas e artistas preocupados com as novas diretrizes do governo se reuniram aos milhares para exigir a liberdade de modificar melhorias cibernéticas. Os manifestantes variam desde [root.GetSpeciesNamePlural] de aparência comum até indivíduos com membros personalizados, torsos remodelados e outras formas alienígenas. Todos declaram solidariedade aos cidadãos do povo [root.GetAdj] que enfrentam discriminação por suas escolhas pessoais de adornos cibernéticos."
 cyber.821.a: "Não seremos influenciados."
 cyber.821.a.tt: "Continuaremos a promover uma abordagem coletivista à cibernética."
 radical_image_denied: "Aparência Radical Negada"
 radical_image_denied_desc: "Os recentes protestos defendendo o direito à liberdade de expressão por meio de melhorias cibernéticas têm se intensificado."
 cyber.821.b: "Vamos considerar as exigências deles."
 cyber.821.b.tt: "Os indivíduos terão uma maior liberdade de escolha em relação às melhorias cibernéticas."
 radical_image_upheld: "Aparência Radical Mantida"
 radical_image_upheld_desc: "Protestos recentes garantiram alguns direitos em relação à liberdade de expressão por meio de melhorias cibernéticas visíveis."
 cyber.822.name: "Fisiologia Radical"
 cyber.822.desc: "Profissionais da saúde têm se queixado a respeito dos obstáculos bizarros e até então inimagináveis que agora enfrentam para tratar pacientes com melhorias cibernéticas radicalmente únicas.\n\nMuitos desses indivíduos extremamente modificados requerem medidas de tratamento especiais, como ferramentas personalizadas ou desmontagens drásticas, mesmo para as enfermidades mais simples. Os custos de tais intervenções ultrapassam em muito aqueles associados aos de um paciente não [root.GetSpeciesAdj] sem modificações."
 cyber.822.a: "Os custos são justificados."
 cyber.822.b: "Foi um erro permitir personalizações tão extensas."
 #Cold Metal
 cyber.830.name: "Calafrios"
 cyber.830.desc: "Uma parte de nossa população com melhorias relata sentir dores quando exposta a climas frios. A situação é particularmente grave em §H[cold_planet.GetName]§!, onde temperaturas congelantes são a norma.\n\nSabe-se que implantes de metal podem causar incômodo em baixas temperaturas, mas não deveriam causar uma reação tão severa. A situação está impactando nossa força de trabalho."
 cyber.830.a: "Comissione um estudo médico."
 cyber.830.b: "O sofrimento deles não é problema nosso."
 cyber.830.tooltip: "Adiciona os seguintes modificadores à característica de espécie §Y$trait_cybernetic$§!:$TABBED_NEW_LINE$Habitabilidade Alpina/Ártica/Tundra: §R-20%§!"
 COLD_METAL_PROJECT: "Metal Gelado"
 COLD_METAL_PROJECT_DESC: "Populações vivendo em climas frios relatam casos de dores severas relacionadas aos implantes cibernéticos. Um estudo clínico nos permitirá reunir mais dados."
 cyber.835.name: "Relatório Médico"
 cyber.835.desc: "Os estudos clínicos não conseguiram estabelecer uma relação definitiva entre a exposição de dispositivos cibernéticos ao clima frio e a idade, sexo, ocupação e tipo de implantes usados pelos pacientes afetados.\n\nAlguns profissionais da saúde argumentam que a dor é psicossomática, e o tratamento deve se limitar a analgésicos e terapia comportamental. Outros pedem que o problema não seja ignorado, e dizem que é necessário financiar um programa para pesquisar mais opções de tratamento."
 cyber.835.a: "A dor deles é psicológica."
 cyber.835.b: "Vamos instituir um programa de pesquisas."
 cyber.835.c: "Realoque os indivíduos afetados para um planeta mais quente."
 cyber.835.tooltip: "Remove os seguintes modificadores da característica de espécie §Y$trait_cybernetic$§!:$TABBED_NEW_LINE$Habitabilidade Alpina/Ártica/Tundra: §R-20%§!"
 cyber.840.name: "Até Onde Nossos Corações Nos Levarem"
 cyber.840.desc: "Sempre fomos um povo viajante. Nômades. Andarilhos. Enquanto para alguns viajar é um meio para chegar a um destino, para nós a jornada é o destino em si. As melhorias corporais tornaram mais fácil alcançar novos mundos, mas também nos permitem rastrear aqueles que podem se desviar demais do caminho. Nem todos estão felizes com essa mudança.\n\nUm número cada vez maior de pessoas tem adulterado seus implantes para se ocultar da rede e assim preservar sua privacidade. Por enquanto, essa é uma tendência limitada a um pequeno nicho, mas pode se tornar um problema."
 cyber.840.a: "Eles estão certos. Proíba a tecnologia de rastreamento."
 cyber.840.b: "Isso não é motivo para preocupação."
 cyber.840.c: "Vamos oferecer implantes indetectáveis... por um preço."
 cyber.840.d: "Contenha os dissidentes. A tecnologia de rastreamento veio para ficar."
 cyber_wanderers: "Andarilhos Incansáveis"
 cyber_wanderers_desc: "Difíceis de rastrear. Fáceis de encontrar em qualquer lugar."
 cyber_wanderers_tracked: "Em Rédeas Curtas"
 cyber_wanderers_tracked_desc: "Nosso povo preza pela liberdade e se opõe veementemente a qualquer tipo de tecnologia de rastreamento."
 cyber.855.name: "Alcançando o Sucesso" #Idiom: if you achieve a required score, you 'make the grade'; similar to 'make the cut'
 cyber.855.intro.desc: "Microprocessadores cognitivos, tutores de IA aprimorados, enzimas projetadas para promover regeneração neuroplástica... e tudo isso voltado apenas para alunos da pré-escola."
 cyber.855.gov.desc: "$cyber.855.intro.desc$\n\nAcompanhar a mudança tecnológica tem sido um fardo pesado para nossos programas de educação governamentais. O abismo entre o desempenho daqueles que dependem de melhorias públicas e daqueles que podem pagar por tecnologia de ponta está cada vez maior.\n\nManter um sistema justo exigirá um investimento significativo de recursos ao longo de cinco anos."
 cyber.855.corp.desc: "$cyber.855.intro.desc$\n\nUma boa educação pode ser cara, e muitos estão achando cada vez mais difícil acompanhar o ritmo da mudança. O abismo entre o desempenho dos estudantes que podem pagar por tecnologia de ponta e aqueles que dependem de modelos antigos, de segunda mão ou falsificados está cada vez maior.\n\nPara evitar o aumento da desigualdade social, será necessário fazer um investimento significativo de cinco anos em nosso sistema educacional."
 cyber.855.a: "O custo é alto demais."
 cyber.855.b: "A educação deve ser acessível a todos."
 cyber_education: "Educação Cibernética"
 cyber_education.tt: "Vamos embarcar em um programa de cinco anos para promover um sistema educacional robusto e totalmente melhorado."
 cyber.860.name: "Excelência Igualitária"
 cyber.860.desc: "Nosso investimento em melhorias educacionais valeu a pena.\n\nO acesso público a componentes cibernéticos de alta qualidade criou uma verdadeira meritocracia acadêmica em que qualquer um, independentemente de sua classe social, pode alcançar seu potencial máximo. Os benefícios são particularmente sentidos na ciência, onde a produção de pesquisa e inovação têm melhorado em todos os aspectos."
 egalitarian_excellence: "Excelência Igualitária"
 egalitarian_excellence.tt: "Uma população culta e totalmente melhorada é a chave para o progresso social e material."
 cyber.865.name: "Líderes Excepcionais"
 cyber.865.desc: "A decisão de rejeitar o financiamento público de melhorias educacionais se mostrou correta.\n\nA nossa sociedade acredita na excelência individual. Apesar de críticas pontuais sobre o crescente \"abismo social\", a competição acadêmica produziu alguns dos líderes mais cultos e produtivos da galáxia."
 exceptional_leaders: "Líderes Excepcionais"
 exceptional_leaders.tt: "Desenvolver nossos melhores talentos em nível individual resultou em líderes de qualidade excepcional."
 cyber.1005.name: "Superando Limites"
 cyber.1005.desc: "\"Outro Recorde Quebrado\". Essa manchete tornou-se comum no mundo esportivo [Owner.GetAdjective]. Enquanto os [GetAthletePlural] se esforçam para superar uns aos outros com modificações mais modernas e sofisticadas, os limites do desempenho atlético continuam sendo constantemente superados.\n\nEmbora os fãs do \"atletismo aprimorado\" estejam em polvorosa, um número crescente de entusiastas mais conservadores tem pedido que seja criada uma divisão separada para indivíduos aprimorados. Já um terceiro grupo prefere limitar a quantidade de atletas modificados que podem competir em eventos de equipe, garantindo que [GetAthletePlural] sem modificações também tenham destaque."
 cyber.1005.a: "A era dos não modificados acabou."
 cyber.1005.a.tt: "Incentive os atletas modificados a impulsionar a inovação."
 cyber.1005.b: "Crie uma liga própria para atletas modificados."
 cyber.1005.c: "Limite a quantidade de [GetAthletePlural] modificados."
 cyber_athletes: "Atletas Cibernéticos"
 cyber_athletes_desc: "O incentivo à participação de atletas modificados nos esportes nos permite testar em campo os dispositivos cibernéticos mais avançados."
 cyber_athlete_leagues: "Ligas Atléticas Cibernéticas"
 cyber_athlete_leagues_desc: "Separar competidores \"naturais\" e melhorados garante uma competição justa para todos."
 limited_cyber_athletes: "Atletas Cibernéticos Limitados"
 limited_cyber_athletes_desc: "Regular o número de atletas modificados garante que cada equipe tenha uma chance real de sucesso."
 athlete_plural: "atletas"
 cyber.1010.name: "À Venda: O Céu"
 cyber.1010.desc: "Recebemos uma proposta bastante lucrativa da megacorporação §Y[sky_megacorp.GetName]§!. Eles querem anunciar seu mais recente produto, um energético chamado Refresco Plasma.\n\nAnúncios da bebida serão projetados diretamente nos implantes oculares de nossos cidadãos sempre que eles olharem para o céu. Poderíamos usar a receita gerada em uma série de projetos cívicos.\n\nApesar da natureza invasiva dos anúncios, fomos assegurados de que a bebida em si é deliciosa e completamente livre de toxinas."
 cyber.1010.a: "Beba Refresco Plasma!" #Feel free to localize Plasma Quench to sound like a slimy energy drink. No need to make it word for word.
 cyber.1010.b: "O céu não está à venda!"
 cyber.1010.c: "Vamos negociar os termos."
 cyber.1010.d: "Não temos interesse."
 cyber.1015.desc: "A megacorporação §Y[sky_megacorp.GetName]§! voltou a nos procurar com uma nova oferta referente ao energético mais querido da galáxia, o Refresco Plasma. Como a venda do campo de visão celeste dos cidadãos modificados funcionou muito bem, eles solicitaram a inclusão de anúncios adicionais também no mundo físico.\n\n\"[most_populous.GetName] é o local ideal para os anúncios!\", declarou um porta-voz da [sky_megacorp.GetName]. Afinal, não é justo que todos tenham acesso a oportunidades tão incríveis?"
 cyber.1015.a: "Deixe o Plasma fluir!"
 cyber.1015.a.tt: "Coloca outdoors gigantes em todos os centros urbanos de §Y[most_populous.GetName]§!."
 cyber.1015.b: "Nossos céus digitais são o suficiente."
 cyber.1015.c: "Nosso povo deve enxergar livremente outra vez!"
 sold_sky_1: "Outdoors Digitais"
 sold_sky_1_desc: "Vender a atenção virtual dos nossos cidadãos foi uma ótima decisão!"
 sold_sky_1_mega: "$sold_sky_1$"
 sold_sky_1_mega_desc: "$sold_sky_1_desc$"
 sold_sky_2: "Outdoors Planetários"
 sold_sky_2_desc: "As elites deste planeta optaram por vender o céu de seus cidadãos para obter recursos extras."
 sold_sky_2_mega: "$sold_sky_2$"
 sold_sky_2_mega_desc: "$sold_sky_2_desc$"
 cyber.1030.name: "Memórias Ilícitas"
 cyber.1030.desc: "Com tantos implantes capazes de controlar experiências sensoriais e emocionais, indivíduos melhorados recorreram a eventos da vida virtual em busca de escapismo e entretenimento. Embora os artistas de engramas possam, em teoria, estimular qualquer emoção, tal prática tomou um rumo sombrio.\n\nClubes de engramas de memória estão pagando altas quantias por experiências pessoais e intensamente emocionais, como casamentos e relações íntimas, mas também por suicídios, agressões e assassinatos. Isso causou um aumento na criminalidade, pois os criminosos estão gravando a si mesmos cometendo delitos e roubando os implantes das vítimas após a experiência traumática.\n\nComo devemos lidar com esse desdobramento preocupante?"
 cyber.1030.a: "Acabe com essa indústria. É perigoso demais."
 cyber.1030.a.tt: "Engramas para entretenimento serão proibidos."
 cyber.1030.b: "Tributem a produção."
 cyber.1030.b.tt: "O entretenimento por engrama será utilizado como uma fonte de renda."
 cyber.1030.c: "Prenda qualquer pessoa flagrada com essas gravações."
 cyber.1030.c.tt: "A aplicação da lei terá como alvo aqueles que gravam comportamentos criminosos."
 cyber.1030.d: "Parece decadente. Vamos apoiar."
 cyber.1030.d.tt: "Todas as formas de prazer serão apoiadas pelo Estado."
 cyber.1030.e: "A experiência interminável da morte? Divino."
 cyber.1030.e.tt: "Isso permitirá que nossos Sacerdotes da Morte compreendam e guiem as experiências de nossos Iniciados Mortais."
 entertainment_crackdown: "Repressão aos Engramas"
 entertainment_crackdown_desc: "A gravação de engramas de entretenimento tornou-se ilegal para evitar possíveis comportamentos criminosos."
 endorsed_entertainment: "Endosso aos Engramas"
 endorsed_entertainment_desc: "A gravação de engramas de entretenimento difundiu-se após o apoio do Estado."
 illicit_entertainment: "Engramas Ilícitos"
 illicit_entertainment_desc: "As novas leis sobre engramas para fins de entretenimento colocaram um freio na demanda pelo serviço."
 decadent_entertainment: "Engramas Decadentes"
 decadent_entertainment_desc: "Nosso povo está se deliciando com o prazer extremo proporcionado pelos engramas de entretenimento. Pelo menos até que a próxima moda surja."
 deadly_entertainment: "Engramas Letais"
 deadly_entertainment_desc: "Nossos Sacerdotes da Morte agora podem viver a experiência de tirar uma vida e morrer. Isso os ajuda a guiar as pessoas, especialmente nossos Iniciados Mortais."
 cyber.1055.name: "Jogos de Espionagem"
 cyber.1055.desc: "Um cadete naval vazou informações confidenciais em uma demonstração chocante de imprudência. O cadete em questão é um grande fã de simuladores de combate on-line e se envolveu em uma discussão com outros jogadores sobre a velocidade angular das torres em nossos destróieres.\n\nPara sustentar seu argumento, o cadete postou vários diagramas confidenciais de nossas naves e os documentos se espalharam rapidamente pela rede galáctica. Embora o culpado tenha sido punido, membros do Conselho estão pedindo uma proibição total dos jogos on-line graças a esse incidente."
 cyber.1055.a: "Já estava na hora de modernizar a frota mesmo."
 cyber.1055.b: "Reforce nossas medidas de segurança na rede."
 cyber.1055.c: "O Conselho tem razão. Proíba os jogos."
 cyber.1055.d: "Encubra as informações confidenciais com relatórios conflitantes."
 cyber_breach_overcome: "Jogos de Espionagem: Modernização de Frota"
 cyber_breach_overcome_desc: "O que passou, passou. Trabalharemos para modernizar nossas frotas e tornar os esquemas vazados inúteis."
 cyber_breach_forgive: "Jogos de Espionagem: Atualizações de Segurança"
 cyber_breach_forgive_desc: "Em resposta ao vazamento, atualizamos nossos protocolos de segurança. Dito isso, os jogadores não representam uma ameaça à segurança nacional. Um erro tolo não pede uma reação exagerada."
 cyber_breach_ban: "Jogos de Espionagem: Proibição Total"
 cyber_breach_ban_desc: "Além de reforçar nossa segurança operacional, instituímos a proibição total de jogos on-line."
 cyber.1055.leak.tt: "Todos os membros da §YComunidade Galáctica§! recebem Inteligência §YMilitar§! §HMédia§! sobre §Y[Root.GetName]§! por §Y720§! dias."
 cyber.1055.minorleak.tt: "Todos os membros da §YComunidade Galáctica§! recebem Inteligência §YMilitar§! §RBaixa§! sobre §Y[Root.GetName]§! por §Y360§! dias."
 has_tradition_subterfuge_tt: "Esta opção está disponível porque a árvore de tradição §YSubterfúgio§! foi concluída."
 cyber.1205.name: "Censura Sensorial"
 cyber.1205.desc: "A última geração de dispositivos cibernéticos sensoriais permite aos usuários bloquear sensações indesejadas. Desde cheiros desagradáveis até imagens impróprias, tudo pode ser atenuado, mascarado ou mesmo apagado da percepção do usuário. Grupos conservadores têm demonstrado preocupação com os efeitos que tal censura pode provocar na consciência de nossos cidadãos."
 cyber.1205.a: "Devemos encarar a vida como ela é."
 cyber.1205.b: "Todos têm o direito de viver na doce ignorância."
 cyber.1205.c: "Remodeladores cosméticos são aceitáveis, mas a censura é perigosa."
 cyber.1205.d: "Vamos tutelar os sentidos deles."
 cyber_censure_truth: "Censura Sensorial: Banida"
 cyber_censure_truth_desc: "O povo não está autorizado a aplicar filtros de percepção que bloqueiem elementos da vida real. A verdade deve ser encarada o tempo inteiro."
 cyber_censure_total: "Censura Sensorial: Total"
 cyber_censure_total_desc: "Se a realidade causa desconforto, por que não bloquear os elementos mais ofensivos? Você não precisa testemunhar crimes, miséria ou preconceito."
 cyber_censure_partial: "Remodelação Sensorial"
 cyber_censure_partial_desc: "Permitimos que as pessoas usem remodeladores de percepção em seus implantes. Com isso, torna-se possível injetar cores vivas e outros efeitos em sua existência mundana."
 cyber_censure_authoritarian: "Censura Sensorial Controlada pelo Estado"
 cyber_censure_authoritarian_desc: "Vamos controlar como as pessoas percebem a realidade. Ao bloquear mensagens e agentes dissidentes das vidas de nossos cidadãos leais, podemos protegê-los de más influências."
 cyber.1210.name: "Hackeamento Subliminar"
 cyber.1210.desc: "Uma tendência recente na propaganda de movimentos clandestinos e corporações ambiciosas é implantar mensagens ocultas nos dispositivos cibernéticos do usuário. Memórias falsas, reações hormonais seletivas e sonhos sugestivos estão se tornando uma prática comum. Agentes políticos preocupados levantaram a questão e estão defendendo a proibição, ou pelo menos uma regulamentação dessas práticas invasivas."
 cyber.1210.a: "Tais práticas não podem ser toleradas."
 cyber.1210.b: "Isso é genial! Vamos permitir tudo."
 cyber.1210.c: "Licencie a prática."
 cyber.1210.d: "Use o método para disseminar a fé."
 cyber_subliminhack_banned: "Hackeamento Subliminar: Banido"
 cyber_subliminhack_banned_desc: "Proibimos a prática de usar mensagens subliminares maliciosas por meio de dispositivos cibernéticos."
 cyber_subliminhack_allowed: "Hackeamento Subliminar: Permitido"
 cyber_subliminhack_allowed_desc: "Permitimos a prática de usar mensagens subliminares maliciosas por meio de dispositivos cibernéticos. Para o mercado, tudo é permitido."
 cyber_subliminhack_licensed: "Hackeamento Subliminar: Licenciado"
 cyber_subliminhack_licensed_desc: "Estamos vendendo licenças que permitem a prática de usar mensagens subliminares maliciosas por meio de dispositivos cibernéticos."
 cyber_subliminhack_hallowed: "Evangelização Subliminar"
 cyber_subliminhack_hallowed_desc: "Estamos usando mensagens subliminares maliciosas por meio de dispositivos cibernéticos para disseminar nossa fé."
 cyber.1255.name: "Falha de Segurança Cibernética"
 cyber.1255.intro: "Recentemente, vários documentos confidenciais foram baixados ilegalmente por um servidor remoto. Nossos agentes de segurança estão convencidos de que todos os firewalls primários e secundários permanecem intactos, e até o momento não há evidência de um ataque cibernético externo.\n\n"
 cyber.1255.gov.desc: "$cyber.1255.intro$A conclusão é inevitável: temos um informante infiltrado em nosso meio, e dada a natureza sigilosa das informações roubadas, deve ser alguém com um nível alto de acesso."
 cyber.1255.hack.desc: "$cyber.1255.intro$A conclusão é inevitável: temos um informante infiltrado em nosso meio, alguém que coloca em cheque nossa decisão de abraçar as melhorias cibernéticas de código aberto."
 cyber.1255.a: "Inicie uma investigação."
 leak_investigation: "Investigação do Vazamento"
 leak_investigation_desc: "Para descobrir a identidade do informante, teremos de investigar todos que possuem implantes cibernéticos. O processo provavelmente será... intrusivo."
 cyber.1260.name: "Neuromancia"
 cyber.1260.desc: "A investigação sobre a falha de segurança cibernética foi concluída.\n\nAlguns oficiais aprimorados de alta patente do governo foram alvo de uma ação criminosa e tiveram seus componentes neurocibernéticos hackeados. Manipulados por agentes externos, e forçados a agir contra sua vontade, esses indivíduos não têm memória dos acontecimentos.\n\nEmbora a causa do vazamento tenha sido descoberta, não estamos próximos de saber quem, ou o que, foi o verdadeiro responsável. No entanto, ao implantar secretamente dados falsos na mente dos oficiais afetados, poderemos rastrear o vazamento até a sua origem."
 leak_distrust: "Fantoches entre Nós"
 leak_distrust_desc: "Como esperar que o povo tenha fé em nossa liderança quando qualquer um de nós pode ser um fantoche?"
 leader_trait_hacked: "Fantoche Cibernético"
 leader_trait_hacked_desc: "Este líder está comprometido. Seus componentes neurocibernéticos foram hackeados por agentes de origem desconhecida."
 hacked_leaders.tt: "Uma quantidade aleatória de líderes Ciborgues ganhou a característica §Y$leader_trait_hacked$§!."
 cyber.1265.name: "Invasores de Mentes" #Playing on the word 'hijacker'
 cyber.1265.desc: "Nós os pegamos.\n\nOs criminosos responsáveis pelos ataques cibernéticos sem precedentes que sofremos foram encontrados. Sem nenhum outro objetivo além de semear o caos, esses autoproclamados \"Invasores de Mentes\" conseguiram burlar nossos sistemas de segurança com uma facilidade espantosa. Embora os líderes já estejam sob custódia, ainda precisamos decidir o que fazer com os oficiais que foram comprometidos.\n\nA solução mais simples seria instalar um firewall personalizado nos implantes afetados. Uma opção mais limpa, embora mais arriscada, seria realizar uma reinicialização forçada: se acessarmos suas funções cognitivas básicas, os líderes em questão poderão ser \"desligados\" à força enquanto um novo sistema operacional é instalado."
 cyber.1265.a: "Instale o firewall."
 cyber.1265.b: "Reinicie os oficiais."
 cyber.1265.c: "Eles suspeitam de nós. Instale o firewall."
 cyber.1270.name: "Reiniciados e Renovados"
 cyber.1270.desc: "A reinicialização forçada dos nossos oficiais comprometidos levou a consequências inesperadas: todos os vestígios da invasão neurológica foram apagados, junto com uma grande parte de seu conhecimento e experiência acumulados.\n\nApesar desse contratempo, ao \"recomeçar\", esses líderes relataram sentimentos profundos de renovação profissional e pessoal. Ao nos forçar a tomar medidas tão drásticas, os hackers podem ter nos feito um favor."
 rebooted_leaders: "Remove todas as §HCaracterísticas Negativas§! dos Líderes com a característica §Y$leader_trait_hacked$§!.\nPara cada característica removida, haverá uma perda de §R300§! de Experiência."
 leader_hack_resolution: "Solução na Vigilância"
 cyber.1275.name: "Firewalls Neurológicos"
 cyber.1275.desc: "Nossas mentes estão seguras.\n\nOs engenheiros de componentes neurocibernéticos criaram um firewall neurológico com sucesso. Para manter nossa segurança coletiva, o programa será instalado imediatamente em todos os nossos oficiais, atuais e futuros. Apesar do impacto prejudicial na funcionalidade cognitiva básica da nossa classe de liderança, o projeto proporcionou descobertas significativas na ciência da segurança de dados."
 cyber.1275.a: "Segurança em primeiro lugar."
 leader_trait_firewalled: "Firewall Neurológico"
 leader_trait_firewalled_desc: "Embora estejam a salvo de ataques cibernéticos, nossos líderes tiveram uma redução na capacidade de aprendizagem."
 hacked_and_firewalled_leaders.tt: "Remove a característica §Y$leader_trait_hacked$§! e aplica a característica §Y$leader_trait_firewalled$§! em todos os líderes Ciborgues."
 #FINAL EVENT #
 #DEMOCRATIC
 cyber.1505.name: "Sociedade 2.0"
 cyber.1505.desc.individualist: "O processo democrático é a base desta sociedade, então faz todo o sentido fortalecê-lo. Com a nossa nova cibernética, podemos votar para decidir sobre todas as questões sociais, grandes ou pequenas, oferecendo aos indivíduos oportunidades inéditas de expressar suas opiniões. A riqueza de dados que isso proporciona é inimaginável, e as possibilidades são ilimitadas."
 cyber.1505.desc.collectivist: "A ideia de transmitir abertamente seus pensamentos para outros indivíduos §Y[Species.GetNamePlural]§! é angustiante, mas o choque inicial logo se transforma em uma sensação de confiança e certeza sobre o ambiente que nos cerca. Estamos cientes do que a pessoa ao nosso lado faz, e ela está ciente de nós. A comunicação acontece instantaneamente, sem palavras, com um simples pensamento. Para proteger essa clareza mental, o cérebro cibernético foi instruído a anular as emoções para que elas não se sobreponham ao que realmente importa."
 cyber.1505.desc.neutral: "Apesar dos debates intermináveis, das rodadas de votação e dos discursos entusiasmados, a nação continua indecisa sobre as questões em torno da sociedade cibernética. Antes que o processo se transforme em uma discussão ainda mais polêmica, nossa liderança deve intervir.\n\nPodemos aproveitar a oportunidade para modificar nossa cibernética em prol do processo democrático ou adotar uma abordagem mais radical em que as pessoas compartilhem seus pensamentos por meio de seus dispositivos cibernéticos. Essa última opção também exigiria que o cérebro cibernético suprimisse emoções básicas para evitar que pensamentos espontâneos e intensos perturbem o entorno imediato dos indivíduos."
 cyber.1505.a: "Permita a votação em tempo real por meio do cérebro cibernético."
 cyber.1505.a.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_individualist']\n$unlock_edict_legislative_chorus$"
 cyber.1505.b: "Conecte os cérebros cibernéticos para compartilhar experiências."
 cyber.1505.b.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_collectivist']\n$unlock_edict_self_preservation_override$ ['concept_edict_self_preservation_override']"
 cyber.1505.c: "$cyber_keep_auth_option$"
 cyber.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 cyber.1510.name: "Reestruturação de Poder"
 cyber.1510.desc.individualist: "Ficou claro que a população deseja se destacar e competir entre si. Nossos planos para apoiar esse comportamento hipercompetitivo com um sistema baseado em jogos, que promete mobilidade social e pequenas recompensas em troca de maior produtividade, atenderão bem a esse desejo."
 cyber.1510.desc.collectivist: "É mais importante que as pessoas tenham um senso de comunidade do que a perspectiva de mobilidade social individual. Portanto, em vez de nos apoiarmos na competitividade, aproveitaremos o potencial do cérebro aprimorado adormecido. Sua capacidade de processamento será utilizada por meio de um vínculo cibernético sem fio entre o cérebro e uma estação base, que enviará para o indivíduo tarefas computacionais durante seu período de descanso."
 cyber.1510.desc.neutral: "Nossos súditos não conseguiram escolher entre uma sociedade mais competitiva ou mais comunitária. Como seus superiores, agora nós decidiremos qual é o melhor caminho para eles.\n\nPodemos criar um sistema baseado em jogos altamente competitivo, onde superar o desempenho de seus colegas pode resultar em uma trajetória ascendente para suas carreiras ou, em vez disso, aproveitar o poder computacional de toda a comunidade por meio de um vínculo cibernético que conectará seus cérebros adormecidos às nossas fazendas de servidores."
 cyber.1510.a: "Deixe-os lutar para obter privilégios."
 cyber.1510.a.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_individualist']\n$unlock_edict_battle_royale$"
 cyber.1510.b: "Faça-os trabalhar enquanto dormem."
 cyber.1510.b.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_collectivist']\n$unlock_edict_stately_acclaim$"
 cyber.1510.c: "$cyber_keep_auth_option$"
 cyber.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 cyber.1515.name: "Controle das Massas"
 cyber.1515.desc.individualist: "O povo §Y[Species.GetAdj]§! está aderindo a um mundo em que indivíduos melhorados podem expressar suas identidades de maneiras totalmente novas.\n\nMas a tolerância com essas práticas é apenas uma fachada, pois os algoritmos de vigilância aprimorados dentro dos implantes agora monitoram cada indivíduo, detectando pensamentos dissidentes no momento em que as sinapses cerebrais se conectam."
 cyber.1515.desc.collectivist: "A união faz a força diante da adversidade. Todos os indivíduos ciberneticamente aprimorados do povo §Y[Species.GetAdj]§! lutam juntos por um futuro melhor, confiando que a pessoa ao seu lado fará o mesmo.\n\nNossos cidadãos podem ficar tranquilos sabendo que a personalidade radiante de §Y[Ruler.GetName]§!, sempre inabalável, os guia adiante."
 cyber.1515.desc.neutral: "Enquanto as pessoas continuam a hesitar em fazer uma escolha, §Y[Ruler.GetName]§! deve aproveitar a oportunidade única oferecida pelas melhorias e tomar uma decisão.\n\nNosso povo deve desfrutar de algumas liberdades pessoais enquanto é monitorado por meio de seus implantes, ou devemos influenciar todos com a determinação da personalidade radiante de nossa liderança?"
 cyber.1515.a: "Vamos moderar a liberdade com vigilância."
 cyber.1515.a.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_individualist']\n$unlock_edict_self_indictment_protocol$"
 cyber.1515.b: "Nossa liderança nos guiará."
 cyber.1515.b.official.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_official']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.commander.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_commander']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.scientist.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_scientist']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.vacant.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_vacant']\n$unlock_edict_love_letter_virus$"
 cyber.1515.c: "$cyber_keep_auth_option$"
 cyber.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"
 #IMPERIAL
 cyber.1520.name: "Vida Longa ao Império"
 cyber.1520.desc.individualist: "A sede imperial decretou que nossos esforços sejam concentrados a serviço da própria dinastia. Um §Y$r_the_rulerchip$§! especial será implantado em todos os futuros governantes para registrar e transferir suas experiências como [root.GetRulerTitle] de §Y[root.GetName]§!. Esse chip será como uma relíquia transferida para o herdeiro do governante no momento da sua morte.\n\nEnquanto o $r_the_rulerchip$ é transmitido através das gerações, sua vasta biblioteca de experiências constituirá um registro fundamental da nossa sociedade. Também poderemos aproveitar os aprendizados da população para beneficiar nossos líderes."
 cyber.1520.desc.collectivist: "Para oferecer aos nossos cidadãos imperiais um alívio para sua rotina laboral, um grande §Y$building_cyberdome$§! deve ser construído em §Y[root.Capital.GetName]§!. Ele servirá como a gloriosa sede para novas modalidades de ciberesportes, onde atletas aprimorados competirão pela nossa estima e admiração. Assistir a uma competição tão acirrada certamente irá revigorar as massas e a admiração da população por §Y[root.GetName]§!.\n\nAlém disso, esses espetáculos podem ser transmitidos via neurotransmissão diretamente para os cérebros cibernéticos de todo o império. Isso atrairá multidões fervorosas até [root.Capital.GetName] em busca de vivenciar a emoção primordial do espetáculo em primeira mão."
 cyber.1520.desc.neutral: "Os avanços sociais no campo da cibernética chegaram a uma encruzilhada. Podemos concentrar nossos esforços para o benefício de poucos ou de muitos. Ambos os casos acabariam sendo benéficos para §Y[root.GetName]§!.\n\nCom o desenvolvimento de um implante especializado, seríamos capazes de transferir as experiências de nossas lideranças para seus herdeiros. Por outro lado, privilegiar os ciberesportes e as tecnologias de transmissão nos permitiria organizar eventos magníficos em nossa capital, [root.Capital.GetName]."
 cyber.1520.a: "Vamos preservar o conhecimento imperial."
 cyber.1520.a.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_individualist']\n$create_relic_the_rulerchip$\n$unlock_edict_levied_experience$"
 cyber.1520.b: "Vamos sediar e transmitir eventos de ciberesportes na capital."
 cyber.1520.b.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_collectivist']\n$unlock_building_cyberdome$\n$unlock_edict_neurocasted_spectacles$"
 cyber.1520.c: "$cyber_keep_auth_option$"
 cyber.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 cyber.1525.name: "Implantes S/A"
 cyber.1525.desc.individualist: "Grupos de foco do povo §Y[Species.GetAdj]§! estão respondendo positivamente aos seus novos implantes oculares. Nosso departamento de análise sugere um crescimento notável na eficácia dos anúncios e um aumento promissor nas vendas por todo o nosso portfólio. Isso demonstra um grande potencial para o futuro lançamento oficial do produto.\n\nA era da cibernética chegou, e estamos totalmente preparados para capitalizá-la com uma estratégia corporativa renovada."
 cyber.1525.desc.collectivist: "Nosso compromisso com o autoaperfeiçoamento holístico está repercutindo na população em geral.\n\nResolver as preocupações socioeconômicas é parte da nossa visão corporativa, garantindo que novas gerações de implantes indispensáveis sejam lançadas de forma constante."
 cyber.1525.desc.neutral: "Considerando as grandes mudanças que a tecnologia cibernética introduziu na sociedade, não é de se espantar que o consumidor médio esteja indeciso quanto ao rumo que deve seguir. A diferenciação individual se tornará o nosso negócio padrão ou devemos nos concentrar no bem-estar coletivo?\n\nEssa decisão fundamental e inédita certamente terá consequências de longo prazo, mas a dúvida é a morte do lucro. Precisamos tomar uma decisão."
 cyber.1525.a: "Vamos lançar implantes com suporte a anúncios."
 cyber.1525.a.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_individualist']\n$unlock_edict_customer_insights$"
 cyber.1525.b: "Aprove implantes de aprimoramento universais."
 cyber.1525.b.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_collectivist']\n$unlock_edict_rolling_updates$\n$unlock_agenda_augmentation_product_launch$"
 cyber.1525.c: "$cyber_keep_auth_option$"
 cyber.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"
 ### SOCIETAL EFFECTS EVENT CHAIN END ###
