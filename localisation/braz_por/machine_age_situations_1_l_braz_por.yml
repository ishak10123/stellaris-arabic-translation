 auth_cyber_imperial_individualist_desc: "O indivíduo que sucede o trono imperial herda, além da posição, um implante especializado que é passado através das gerações. Ele contém a sabedoria inestimável de seus antecessores, transmitindo diferentes conhecimentos sobre a arte de governar. A mesma tecnologia é usada em menor escala por todo o império, permitindo que outros indivíduos transmitam suas experiências adiante."
