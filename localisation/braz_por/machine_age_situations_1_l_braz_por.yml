 cyber_event_parental_limited: "Controle Motor Parental Limitado"
 cyber_event_parental_limited_desc: "Os pais têm controle limitado sobre as funções motoras de seus filhos menores de idade, incluindo velocidade de corrida e níveis de volume."
 cyber_event_parental_enforcers: "Controle Motor de Executor"
