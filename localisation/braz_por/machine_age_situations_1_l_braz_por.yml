 ### EDICTS ###
 edict_hive_mind_outreach: "Alcance da Mente-Colmeia"
 edict_hive_mind_outreach_desc: "A vontade de uma mente determinada se move mais rápido que a velocidade da luz."
 concept_edict_hive_mind_outreach: "$edict_hive_mind_outreach$"
 edict_hive_hyper_stimulants: "Hiperestimulantes"
 edict_hive_hyper_stimulants_desc: "Os implantes cibernéticos administram automaticamente drogas estimulantes em nossos drones, melhorando o desempenho."
 concept_edict_hive_hyper_stimulants: "$edict_hive_hyper_stimulants$"
 edict_hive_mega_construction: "Megaconstrução Integrada"
 edict_hive_mega_construction_desc: "Este Edito aloca recursos extras ao nosso programa de Megaengenharia, acelerando a construção de novas estruturas galácticas."
 concept_edict_hive_mega_construction: "$edict_hive_mega_construction$"
 #CYBERIZATION STAGE 1
 cyber.2100.name: "Muitos Corpos, Um Propósito"
 cyber.2100.desc: "Enquanto consideramos a natureza da melhoria cibernética, nos vemos explorando nossas aspirações.\n\nA ciberização é um meio para um fim: uma forma de otimizar nossos corpos para melhor exercer nossa vontade. Há infinitas formas de melhoria, e cada uma tem novas vantagens, mas também demandas. Membros mecânicos são pesados, cérebros cibernéticos requerem mais energia e componentes delicados exigem manutenção constante. Na busca pela perfeição, é preciso fazer escolhas.\n\nQual será o foco da nossa ambição, o único objetivo que exige transcender os limites da [Owner.Species.GetFleshTypeCyberCreed] de nossa forma original e estender um membro metálico rumo ao céu?"
 cyber.2100.a: "Compreensão."
 cyber.2100.a.tt: "Concentra a pesquisa no aumento da inteligência de nossos drones."
 cyber.2100.b: "Dominação."
 cyber.2100.b.tt: "Concentra a pesquisa na transformação de nossos drones em máquinas de guerra."
 cyber.2100.c: "Abundância."
 cyber.2100.c.tt: "Concentra a pesquisa no aumento da produtividade de nossos drones."
 #CYBERIZATION STAGE 2
 cyber.2200.name: "Um Objetivo: Melhorias"
 cyber.2200.desc: "À medida que devaneios se tornam planos concretos, surge uma necessidade urgente: um espaço dedicado à experimentação, onde protótipos cibernéticos possam ser testados e construídos.\n\nCriaremos um $building_augmentation_center$ para deixar a [Owner.Species.GetFleshTypeCyberCreed] para trás e reconstruir nossos corpos com metais e sonhos."
 cyber.2200.a: "Hora de começar a construir o nosso futuro."
 cyber.2200.a.tt: "§RAção necessária:§!\nConstrua um $building_augmentation_center$ para dar continuidade à situação §Y$situation_cyberization_hive$§!.\n\nCada $building_augmentation_center$ concede §G+200§! empregos de $job_augmentor_drone_with_icon$.\n\n$job_augmentor_drone_research_effect_desc$"
 cyber.2205.name: "Muitos Protótipos, Uma Escolha"
 cyber.2205.desc: "Nossa pesquisa cibernética produziu diversos protótipos de ciborgues promissores. Resultados preliminares mostram que alguns deles se destacam em proezas físicas, enquanto outros são mais adequados para trabalhos de precisão. Cada um tem seus pontos fortes e suas limitações, mas nenhum demonstra uma superioridade evidente.\n\nUma proposta assustadora nos ocorre: será que poderíamos diversificar os nossos drones? Modificar nossos corpos de maneiras diferentes dependendo da sua função? Não seremos mais todos idênticos, e essa é uma ideia difícil de aceitar, mas o ganho de eficiência pode compensar a perda de harmonia."
 cyber.2205.a: "Escolha diversos protótipos variados."
 cyber.2205.b: "Escolha um único protótipo equilibrado."
 cyber.2220.name: "Um de Nós?"
 cyber.2220.desc: "Às vezes, a montagem de drones resulta em corpos defeituosos. Os drones deformados costumam ser descartados, mas agora, graças aos implantes cibernéticos, eles podem se juntar ao nosso coletivo. Há vantagens no aumento de nossos números, mas os drones defeituosos precisariam de implantes personalizados, dependendo da gravidade dos problemas que os afligem. Nossa Colmeia cresceria mais rapidamente, mas também ficaria mais... imperfeita."
 cyber.2220.a: "A união faz a força."
 cyber.2220.b: "Uma Colmeia imperfeita é uma Colmeia fraca."
 cyber.2260.name: "Um Problema Invisível"
 cyber.2260.desc: "Uma pequena porcentagem de nossas cobaias está sofrendo reações adversas às melhorias. Seus corpos estão rejeitando os implantes, causando efeitos colaterais possivelmente fatais. A causa parece ser um defeito genético que não havíamos notado antes. De acordo com cálculos preliminares, a imperfeição afeta cerca de 5% da nossa população de drones.\n\nIdentificado o problema, agora podemos examinar nossos drones para evitá-lo, mas não sabemos o que fazer com a população afetada."
 cyber.2260.a: "Descarte os drones defeituosos."
 cyber.2260.a.tt: "Velocidade do progresso da situação §Y$situation_cyberization_hive$§! por §Y1§! ano: §G+20%§!"
 cyber.2260.b: "Equipe os drones defeituosos com implantes limitados."
 cyber.2260.b.tt: "Durante a ciberização, 5% da população ganhará a característica §Y$trait_limited_cybernetic$§! em vez da característica §Y$trait_cybernetic$§!."
 cyber.2260.c: "Pesquise implantes alternativos."
 cyber.2260.c.tt: "Velocidade do progresso da situação §Y$situation_cyberization_hive$§! por §Y5§! anos: §R-50%§!"
 #CYBERIZATION STAGE 3
 cyber.2300.name: "Muitos Drones, Um Plano"
 cyber.2300.desc: "Nossos protótipos de ciborgues foram aprovados. O §Y$building_augmentation_center$§! foi construído. Nosso plano está pronto, mas a logística da nossa transformação ainda precisa ser finalizada.\n\nPoderíamos ordenar que todos os nossos drones se dirijam a um $building_augmentation_center$ e se submetam ao procedimento, suspendendo suas atividades diárias. O processo seria muito rápido, mas deixaria nossas fábricas vazias até que fosse concluído. Por outro lado, poderíamos aproveitar os cronogramas dos nossos drones e transformá-los em ciborgues durante seus períodos obrigatórios de descanso para não interromper suas atividades. Embora seja mais lento, esse plano é menos prejudicial."
 cyber.2300.shared.tt: "$job_augmentor_drone_assembly_effect_desc$\n\nA velocidade de melhoria depende da abordagem da situação e do número de construções de $building_augmentation_center$."
 cyber.2300.a: "Priorize a ciberização."
 cyber.2300.a.tt: "Pops ciberizados a cada mês: §G+200§!\n$situation_cyberization_hive_triggered_modifier$ Recursos Mensais: §R-5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2300.b: "Não interrompa a nossa ordem."
 cyber.2300.b.tt: "Pops ciberizados a cada mês: §R-100§!\n$situation_cyberization_hive_triggered_modifier$ $unity$ Mensal: §G+5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2320.name: "Os Muitos Temem o Único"
 cyber.2320.desc: "Os impérios formados por entidades singulares nos observam com desconfiança, temendo nossa multitude. Com os implantes cibernéticos, poderíamos dar aos nossos emissários rostos e personalidades mais distintos, apresentando uma imagem menos homogênea.\n\nOs desunidos apreciariam o esforço. Eles poderiam até começar a... ter empatia por nós, nos ver como um deles."
 cyber.2320.a: "Repugnante."
 cyber.2320.b: "Um sacrifício louvável."
 cyber.2320.b.tt: "Melhora a opinião de impérios não Gestalt em relação a nós."
 cyber.2320.c: "Torne nossos emissários ainda mais perturbadoramente idênticos."
 cyber.2320.c.tt: "Piora a opinião de impérios não Gestalt em relação a nós."
 cyber.2360.name: "Uma População, Dois Grupos"
 cyber.2360.desc: "A ciberização da nossa Colmeia continua a avançar sem problemas. Parte da nossa população agora tem implantes cibernéticos, enquanto outros ainda são completamente biológicos. Nunca tivemos diferenças tão marcantes entre nós mesmos. Agora os drones são capazes de se identificar como parte de um ou outro grupo, e essa divisão está expandindo seu senso de individualidade.\n\nAlguns drones começaram a se enfeitar com pequenos acessórios ou a pintar símbolos em seus implantes para se diferenciarem uns dos outros. É um desenvolvimento intrigante, mas perturbador."
 cyber.2360.a: "Vamos incentivar esse desdobramento."
 cyber.2360.b: "Proíba o uso de identificações pessoais."
 cyber.2360.c: "Restrinja o uso de símbolos individuais a líderes."
 #CYBERIZATION STAGE 4
 cyber.2400.name: "Muitos Pensamentos, Um Cérebro"
 cyber.2400.desc: "A instalação de implantes neurais em nossos drones levou a um resultado imprevisto: como seus cérebros agora são parcialmente cibernéticos, eles podem formar pensamentos individuais separados da nossa consciência principal.\n\nPoderíamos continuar a desenvolver essa tecnologia para aprimorar a capacidade de pensamento autônomo de nossos drones."
 cyber.2400.a: "Deixe nossos drones pensarem por si mesmos."
 cyber.2400.b: "A individualidade é uma ameaça à nossa união."
 cyber.2420.name: "Um Fim para Todos"
 cyber.2420.desc: "Os implantes cibernéticos estão complicando a logística da morte em nossa sociedade.\n\nRemover os implantes dos drones mortos nos permitiria reutilizar a tecnologia e reduzir o desperdício. Todo o nosso processo de descarte de resíduos precisaria ser revisado para acomodar essa nova etapa, o que acarretaria um custo dos recursos significativo."
 cyber.2420.a: "Recicle os implantes."
 cyber.2420.b: "Não vale a pena."
 cyber.2420.c: "Recicle os implantes... e os corpos."
 cyber.2460.name: "Implantes para a Vida Toda"
 cyber.2460.desc: "Nossa população está sendo submetida ao processo de ciberização em um ritmo constante, mas precisamos estabelecer um processo para aqueles que ainda vão nascer.\n\nCom a nossa tecnologia atual, podemos equipar [owner.Species.GetSpawnNamePlural] com implantes cibernéticos antes mesmo de nascerem, criando uma espécie cibernética de verdade: uma solução rápida, fácil e eficiente. Por outro lado, pesquisas preliminares mostram que a instalação de implantes em uma idade precoce pode causar dissociação, psicose, tremores e diversos distúrbios de desenvolvimento."
 cyber.2460.a: "Metal é mais forte que [Owner.Species.GetFleshTypeCyberCreed]."
 cyber.2460.b: "Estabeleça uma idade mínima para a ciberização."
 #CYBERIZATION FINISHED
 cyber.2004.name: "Muitos Drones, Uma Vontade?"
 cyber.2004.desc: "A transformação está completa. Os implantes cibernéticos foram testados, aprovados, refinados, polidos e instalados, transformando nossos corpos em versões perfeitas de sua forma original."
 cyber.2004.desc.volitional: "$cyber.2004.desc$\n\nAgora nossos drones são mais capazes de formular pensamentos individuais – e com mais liberdade, surgem novas possibilidades."
 cyber.2004.desc.integrated: "$cyber.2004.desc$\n\nNossos drones estão mais unidos do que nunca, como elos metálicos que fortalecem o vínculo da mente."
 cyber.2004.desc.neutral: "$cyber.2004.desc$\n\nDurante esse processo, vimos oportunidades de mudança. Há força na união, mas drones mais autônomos também têm suas vantagens."
 cyber.2004.end: "À medida que nossos corpos evoluem, nossa Mente-Colmeia também pode ser aprimorada."
 cyber.2004.a: "Vamos nos tornar uma Colmeia Volitiva."
 cyber.2004.a.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_volitional']\n$unlock_edict_tt$['concept_edict_hive_mind_outreach']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.b: "Vamos nos tornar uma Colmeia Integrada."
 cyber.2004.b.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_integrated']\n$unlock_edict_tt$['concept_edict_hive_hyper_stimulants']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.c: "Não há necessidade de mudar."
 cyber.2004.c.tt: "$cyber.21.a.end$\n$keep_auth_tt$ ['concept_auth_hive_mind']"
 ### Driven Assimilator Cyberization ###
 cyber.2010.name: "Propósito Manifesto"
 cyber.2010.desc: "Com o advento da cibernética avançada, podemos realizar nosso potencial máximo. Nosso conhecimento era apenas superficial; até agora.\n\nMas o aumento de nossa especialização nesta área e o avanço da tecnologia certamente transformarão nossa sociedade. A assimilação total da vida inteligente é nosso destino.\n\nResistir é inútil. As mentes da galáxia estão em nossas mãos."
 cyber.2015.name: "Assimiladores Avançados"
 cyber.2015.desc: "Após a fusão com a máquina, nossa população orgânica alcançou um estado próximo da perfeição. Chegou a hora de incorporar implantes cibernéticos avançados na própria estrutura de nossa civilização.\n\nAo otimizar a aptidão mental de nossos ciborgues, poderemos formar uma \"Memória Agregada\" que canalize toda a sua experiência reunida em capacidade logística aperfeiçoada. Por outro lado, se facilitarmos a criação de um \"Coro Neural\", permitiremos uma maior variação em suas respostas intelectuais e emocionais.\n\nAmbas as escolhas certamente terão um efeito impactante em nosso futuro."
 cyber.2015.a: "Agregue nossas mentes."
 cyber.2015.a.tt: "$change_auth_tt$ ['concept_auth_memory_aggregator']\n\n§YRecursos§! gerados pela assimilação de £pop£ §HPops Orgânicos§! aumentam ainda mais.\n\n$unlock_edict_tt$['concept_edict_aggregated_memory']"
 cyber.2015.b: "Deixe o Coro cantar."
 cyber.2015.b.tt: "$change_auth_tt$ ['concept_auth_neural_chorus']\n\n$unlock_edict_tt$['concept_edict_choral_harmony']"
 cyber.2015.c: "Vamos permanecer como somos."
 cyber.2015.c.tt: "$keep_auth_tt$ ['concept_auth_machine_intelligence']"
