 cyberization_standards_limited_effect: "Líderes Espiritualistas ganham a Característica: §Y$leader_trait_limited_cyborg$§!\nPops Espiritualistas ganham a Característica: §Y$trait_limited_cybernetic$§!"
 cyberization_standards_limited_desc: "Indivíduos que se opõem à melhoria total podem instalar um conjunto limitado de implantes cibernéticos.\n\n§E$cyberization_standards_limited_effect$§!"
 #CYBERIZATION STAGE 1
 cyber.100.name: "Controlando o Futuro" #Stage 1 - Start event
 cyber.100.desc.shared: "Avanços recentes no campo dos implantes cibernéticos avançados um dia irão possibilitar a reformulação da sociedade. Ao eliminar as fraquezas biológicas, poderemos nos tornar mais inteligentes, mais velozes e mais fortes."
 cyber.100.desc.shared_unplugged: "Avanços recentes no campo dos implantes cibernéticos avançados um dia irão possibilitar a reformulação da sociedade, desta vez em nossos próprios termos. Ao eliminar as fraquezas e defeitos biológicos em nossas melhorias já existentes, poderemos nos tornar mais inteligentes, mais velozes e mais fortes."
 cyber.100.desc: "$cyber.100.desc.shared$\n\nAs corporações providenciaram propostas comerciais e projeções de vendas, enquanto oficiais do governo afirmam que o acesso ao potencial desse tipo de tecnologia deve ser garantido pelo Estado."
 cyber.100.desc.unplugged: "$cyber.100.desc.shared_unplugged$\n\nAs corporações providenciaram propostas comerciais e projeções de vendas, enquanto oficiais do governo afirmam que o acesso ao potencial desse tipo de tecnologia deve ser garantido pelo Estado."
 cyber.100.desc.megacorp: "$cyber.100.desc.shared$\n\nSubcontratantes providenciaram propostas comerciais e projeções de vendas para a produção terceirizada de implantes, enquanto nossos diretores afirmam que devemos manter o monopólio sobre o acesso a essa importante tecnologia."
 cyber.100.desc.megacorp_unplugged: "$cyber.100.desc.shared_unplugged$\n\nSubcontratantes providenciaram propostas comerciais e projeções de vendas para a produção terceirizada de implantes, enquanto nossos diretores afirmam que devemos manter o monopólio sobre o acesso a essa importante tecnologia."
 cyber.100.a: "Vamos nacionalizar a indústria de melhorias."
 cyber.100.a.megacorp: "Vamos manter a produção internamente."
 cyber.100.a.tt: "$situation_cyberization_triggered_modifier$$cyber_control_government_effects$"
 cyber.100.b: "Vamos privatizar a distribuição."
 cyber.100.b.megacorp: "Passe a produção para os nossos subsidiários."
 cyber.100.b.tt: "$situation_cyberization_triggered_modifier$$cyber_control_corporate_effects$"
 cyber.105.name: "Pelo Povo, para o Povo"
 cyber.105.desc: "Entusiastas da automodificação estão furiosos com o fato de que muitos dos nossos futuros projetos cibernéticos serão inacessíveis para o cidadão comum.\n\nEles afirmam que se os esquemas técnicos forem disponibilizados ao público e as regulamentações forem mais flexíveis, quase todas as pessoas poderão fabricar e reparar suas próprias melhorias."
 cyber.105.desc.megacorp: "Profissionais independentes estão reclamando do fato de muitos dos nossos futuros projetos cibernéticos serem inacessíveis a eles.\n\nEles afirmam que se os esquemas fossem disponibilizados e as patentes relacionadas à fabricação fossem mais abrangentes, a produção de implantes seria beneficiada."
 cyber.105.a: "Regulações existem por um motivo."
 cyber.105.a.megacorp: "Essa propriedade intelectual é nossa."
 cyber.105.a.tt: "O modificador da situação §Y$situation_cyberization$§! permanece inalterado."
 cyber.105.b: "Vamos desregulamentar a indústria."
 cyber.105.b.crafters: "Deixe o povo fabricar o que quiser."
 cyber.105.b.megacorp: "Vamos fornecer esquemas técnicos de código aberto."
 cyber.105.b.gov.tt: "Modificador da situação §Y$situation_cyberization$§! atualizado:\n§GAdicionado:§! $cyber_control_independent_effects$\n§RRemovido:§! $cyber_control_government_effects$"
 cyber.105.b.cor.tt: "Modificador da situação §Y$situation_cyberization$§! atualizado:\n§GAdicionado:§! $cyber_control_independent_effects$\n§RRemovido:§! $cyber_control_corporate_effects$"
 #Stage 1 Opportunities - Research
 cyber.120.name: "Alívio Mental"
 cyber.120.desc: "Uma equipe de pesquisadores apresentou uma proposta inovadora para integrar supervisores de IA aos nossos dispositivos móveis. Eles poderão ser incorporados diretamente aos dispositivos cibernéticos em outro momento.\n\nO papel dos supervisores seria redirecionar o foco dos cidadãos de responsabilidades corriqueiras, permitindo que se concentrem em atividades mais intelectuais. Apesar da pequena perda de autonomia, o potencial inédito para o aumento na produtividade não deve ser ignorado."
 cyber.120.a: "Produtividade acima de tudo."
 cyber.120.a.spiritual: "Devemos considerar isso uma bênção."
 cyber.120.b: "A perda de autonomia é grande demais."
 cyber.120.b.spiritual: "Não vamos nos afastar ainda mais do caminho sagrado."
 cyber.120.c: "Isso é aceitável, contanto que venha com um botão de Ligar/Desligar."
 cyber.120.d: "Imagine o controle que isso vai possibilitar..."
 #Stage 1 Challenges - Research
 cyber.160.name: "Dissociação Cibernética"
 cyber.160.desc: "Um novo filme amplamente aclamado capturou a imaginação coletiva do público.\n\nSituada em um mundo onde implantes cibernéticos são predominantes, a narrativa acompanha um trabalhador melhorado que vivencia uma dissociação traumática de seu corpo modificado. O desfecho trágico da história apresenta uma crítica pouco velada à ciberização total e ao seu papel no inevitável apagamento da identidade do povo [Owner.Species.GetAdj].\n\nO sucesso do filme gerou uma forte oposição à nossa iniciativa, causando uma queda de 60% no número de cobaias disponíveis desde o lançamento da obra."
 cyber.160.a: "Lance uma campanha de relações públicas."
 cyber.160.b: "Endureça as regulações relacionadas a implantes."
 cyber.160.c: "Isso vai passar logo."
 cyber.160.d: "Censure o filme."
 cyber.160.e: "Proíba toda a cobertura da mídia."
 #CYBERIZATION STAGE 2
 cyber.200.name: "Centros de Melhoria"
 cyber.200.desc.gov: "Após um período de embates políticos, as responsabilidades envolvendo a produção de melhorias cibernéticas recaíram sobre diversos departamentos governamentais. Quando todos têm uma fatia do bolo, fica mais fácil monitorar uns aos outros.\n\nNo entanto, planos devem ser postos em prática. A comunidade de pesquisa requer pelo menos um $building_augmentation_center$ para atuar como o centro do desenvolvimento cibernético."
 cyber.200.desc.cor: "O que antes era um sonho, está agora ao nosso alcance, e quem melhor para lucrar com ele além das muitas corporações em nossas fronteiras? Como um benefício desta indústria cibernética emergente, novos produtos de consumo podem ser lançados em um ritmo acelerado.\n\nNo entanto, planos devem ser postos em prática. Os lobistas corporativos exigem pelo menos um $building_upload_center$ para atuar como o centro do desenvolvimento cibernético."
 cyber.200.desc.ind: "Nossas redes de comunicação estão fervilhando com novas ideias de designs, de melhorias neurossinápticas a papilas gustativas cibernéticas. A maior parte delas é inviável e cara demais para a produção, mas, por sorte, alguns projetos parecem promissores.\n\nNo entanto, planos devem ser postos em prática. A comunidade on-line requer pelo menos um $building_augmentation_center$ para atuar como o centro do desenvolvimento cibernético."
 cyber.200.a.gov: "Aprove o alvará para a construção."
 cyber.200.a.cor: "Aprovado."
 cyber.200.a.ind: "Concedido."
 cyber.200.a.tt: "§RAção necessária:§!\nConstrua um $building_augmentation_center$ para dar continuidade à situação §Y$situation_cyberization$§!.\n\nCada $building_augmentation_center$ concede §G+200§! empregos de $job_augmentor_with_icon$.\n\n$job_augmentor_research_effect_desc$"
 cyber.205.name: "Projetos-piloto" #Stage 2 - Start event
 cyber.205.desc.shared: "Está na hora de ampliarmos os projetos-piloto. Eles necessitam de apoio contínuo e só ficarão disponíveis em planetas com um $building_augmentation_center$, mas nossos aprendizados trarão benefícios imediatos para a produtividade."
 cyber.205.desc.gov: "Pequenos testes realizados como parte de projetos de pesquisa financiados pelo governo comprovaram que melhorias mecânicas aumentam a produtividade.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.cor: "Pequenos testes realizados em grupos focais voluntários comprovaram que melhorias mecânicas aumentam a produtividade.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.ind: "Relatórios produzidos por indivíduos que se automodificaram comprovaram que melhorias mecânicas aumentam a produtividade.\n\n$cyber.205.desc.shared$"
 cyber.205.a: "Aprimore as elites."
 cyber.205.a.tt: "Produção de Recursos de $pop_cat_ruler$: §G+10%§! com um $building_augmentation_center$"
 cyber.205.b: "Desenvolva os especialistas."
 cyber.205.b.tt: "Produção de Recursos de $pop_cat_specialist$: §G+10%§! com um $building_augmentation_center$"
 cyber.205.c: "Fortaleça os trabalhadores."
 cyber.205.c.tt: "Produção de Recursos de $pop_cat_worker$: §G+10%§! com um $building_augmentation_center$"
 cyber.205.d: "Melhorias para todos."
 cyber.205.d.tt: "Recursos de £job£ §HEmpregos§!: §G+5%§! com $building_augmentation_center$"
 cyber.210.name: "Desenvolvimento Paralelo"
 cyber.210.desc.gov.rival: "Jornalistas descobriram provas de experimentos financiados pelo governo que envolvem o uso de microchips de monitoramento mental. Se forem completamente desenvolvidos, esses dispositivos poderiam ser instalados nas mentes de cidadãos para colher informações detalhadas de segurança e personalidade."
 cyber.210.desc.cor.rival: "Provas judiciais relacionadas a uma disputa comercial revelaram que há corporações experimentando implantes de realidade aumentada, projetados para serem incorporados naturalmente ao nervo ótico do consumidor. O esquema evidencia tanto os benefícios para o usuário quanto a capacidade da empresa de manipular informações visuais."
 cyber.210.desc.ind.rival: "Entusiastas da automodificação já começaram a substituir seus membros por alternativas mecânicas rudimentares. Não há como garantir o bem-estar das pessoas que tentam o procedimento por conta própria, e há temores de que o uso não regulamentado desses implantes possa trazer mais prejuízos do que benefícios."
 cyber.210.a: "Podemos usar isso.\""
 cyber.210.a.tt: "Velocidade do progresso da situação §Y$situation_cyberization$§! por §Y1§! ano: §G+25%§!\n\n"
 cyber.210.b: "Isso acaba agora."
 cyber.210.b.tt: "Velocidade do progresso da situação §Y$situation_cyberization$§! por §Y1§! ano: §R-25%§!"
 #Stage 2 Opportunities - Test Results and Rival Sector
 cyber.220.name: "Coordenação Multicomponente"
 cyber.220.desc: "Um avanço significativo foi feito no campo das interfaces neurais. Um amplificador de ondas cerebrais poderia dar aos usuários um controle dinâmico, porém limitado, sobre uma incrível variedade de membros artificiais. Depois, isso poderia ser integrado diretamente a um cérebro cibernético sem precisar de um dispositivo externo.\n\nDurante os testes iniciais, as cobaias apresentaram resultados promissores, com destreza, manipulação precisa de objetos e até mesmo maior proficiência em combate. Porém, preocupações em relação aos custos de produção levantaram questões acerca de quem terá inicialmente acesso a essa tecnologia pioneira."
 cyber.220.a: "Nossos cientistas precisam de mais [owner.species.GetHandNamePlural]."
 cyber.220.b: "O foco será fortalecer o punho de nossos exércitos."
 cyber.220.c: "Primeiro, vamos dar uma mão para quem tem limitações físicas."
 cyber.220.d: "Não vamos dar nada de mão beijada! Venda para quem pagar mais."
 cyber.220.e: "Vamos ajudar a classe trabalhadora a pôr as mãos à obra!"
 cyber.220.f: "A vantagem deve estar sempre nas mãos da elite."
 #Stage 2 Challenges - Test Results and Rival Sector
 cyber.260.name: "Dobrados para Trás"
 cyber.260.desc: "Testes envolvendo um novo módulo espinal terminaram em um fracasso desastroso. O excesso de energia gerado pelos motores do implante resultou em lesões permanentes na coluna vertebral de diversas cobaias.\n\nImagens perturbadoras dos terríveis resultados foram vazadas para o público, acarretando uma grave escassez de voluntários para futuros experimentos."
 cyber.260.a: "Suspenda todos os testes até encontrarmos uma solução."
 cyber.260.a.tt: "Velocidade do progresso da situação §Y$situation_cyberization$§! por §Y6§! meses: §R-50%§!"
 cyber.260.b: "Vamos indenizar as famílias das vítimas."
 cyber.260.c: "Encontre voluntários. À força, se necessário."
 #CYBERIZATION STAGE 3
 cyber.300.name: "Implementação" #Stage 3 - Start event
 cyber.300.desc: "Nós armazenamos implantes mecânicos para a nossa população de [Owner.Species.GetNamePlural] em todos os grandes centros urbanos de nosso território. Projetados pelos nossos $job_augmentor_plural$, esses dispositivos prometem melhorar consideravelmente nossas formas biológicas.\n\nEnfim, chegou o dia em que deixaremos o passado para trás e abraçaremos um futuro cibernético."
 cyber.300.a: "Hora de ciberizar."
 cyber.300.a.tt: "Líderes ganham a Característica: §Y$leader_trait_cyborg$§!\nPops ganham a Característica: §Y$trait_cybernetic$§!\n\n$job_augmentor_growth_effect_desc$\n\nA velocidade de melhoria depende da abordagem da situação e do número de construções de $building_augmentation_center$."
 cyber.305.name: "Opositores da Cibernética" #Spiritualists are Cybernetic Objectors
 cyber.305.desc.shared: "Na prática, eles não contam nem mesmo com os implantes mais básicos, dificultando sua integração à nossa sociedade cada vez mais conectada.\n\nObrigar toda a população a instalar implantes completos ajudaria a integrá-los à sociedade, mas certamente resultaria em grande ressentimento."
 cyber.305.desc: "Grupos religiosos que se opõem à fusão de [Owner.Species.GetFleshTypeCyberCreed] e máquina optaram por não participar dos nossos esforços para ciberizar a população. $cyber.305.desc.shared$"
 cyber.305.desc.spiritualist: "Os fiéis, compreensivelmente relutantes quanto à fusão de [Owner.Species.GetFleshTypeCyberCreed] e máquina, optaram por não participar dos nossos esforços para ciberizar a população. $cyber.305.desc.shared$"
 cyber.305.desc.none: "A moralidade quanto à fusão de [Owner.Species.GetFleshTypeCyberCreed] e máquina tem sido tema de muitos debates. Infelizmente, devido ao aumento de eficiência resultante da ciberização, aqueles que preferem não aderir a esse processo acabam em desvantagem.\n\nObrigar toda a população a instalar implantes garantiria que todos ficassem em pé de igualdade, mas certamente resultaria em grande ressentimento."
 cyber.305.desc.unplugged: "A moralidade quanto à nova fusão de [Owner.Species.GetFleshTypeCyberCreed] e máquina tem sido tema de muitos debates. No entanto, melhorias de nossa própria criação não estão mais presas aos caprichos da máquina que nos assimilou, mostrando-se muito mais eficientes. Aqueles que preferem não aderir a esse processo acabam em desvantagem.\n\nObrigar toda a população a instalar implantes garantiria que todos ficassem em pé de igualdade, mas certamente resultaria em grande ressentimento."
 cyber.305.a: "Eles devem se adaptar."
 cyber.305.a.materialist: "A fé é irrelevante, seguiremos em frente."
 cyber.305.a.spiritualist: "A fé deve se adaptar."
 cyber.305.a.tt: "$cyberization_standards_full_effect$\n\nObtém acesso à Política: §Y$policy_cyberization_standards$§!\n"
 cyber.305.b: "Vamos encontrar um meio-termo."
 cyber.305.b.spiritualist: "Busque um entendimento mútuo."
 cyber.305.b.tt: "$cyberization_standards_limited_effect$\n\nObtém acesso à Política: §Y$policy_cyberization_standards$§!\n"
 #Stage 3 Opportunities - Treatment of Non-Cyborgs
 cyber.320.name: "Potencial Infantil"
 cyber.320.birth.desc: "Com a nossa nova capacidade de instalar implantes em recém-nascidos, nos deparamos com um impasse. Essas melhorias neonatais inovadoras têm o poder de mudar para sempre a nossa relação com a tecnologia, liberando o potencial cibernético inato de nossas futuras gerações desde a infância e levando a nossa civilização a patamares antes inimagináveis.$cyber.320.end.desc$"
 cyber.320.metamorphosis.desc: "Recentemente, fizemos um incrível avanço que nos permite implantar microchips diretamente em nossos filhotes. Durante a metamorfose, nossas larvas têm uma habilidade natural para absorver sistemas mecânicos. Melhorias instaladas durante o estágio de pupa podem liberar seu potencial cibernético inexplorado e levar a nossa civilização a patamares antes inimagináveis.$cyber.320.end.desc$"
 cyber.320.lithoid.desc: "Com a nossa nova capacidade de instalar implantes em crias recém-cristalizadas, nos deparamos com um impasse. Essas melhorias permitiriam aos nossos infantes formar um vínculo natural com minerais metálicos, liberando seu potencial cibernético desde a infância e levando a nossa civilização a patamares antes inimagináveis.$cyber.320.end.desc$"
 cyber.320.root.desc: "Com a nossa nova capacidade de instalar implantes cibernéticos em brotos, nos deparamos com um impasse. Essas melhorias permitiriam aos nossos infantes transmitir impulsos elétricos através de uma rede avançada de hifas, liberando seu potencial cibernético desde a infância e levando a nossa civilização a patamares antes inimagináveis.$cyber.320.end.desc$"
 cyber.320.egg.desc: "Com a nossa nova capacidade de instalar implantes diretamente em nossos filhotes, nos deparamos com um impasse. Essas melhorias pioneiras têm o poder de mudar para sempre a relação deles com a tecnologia, liberando seu potencial cibernético inato desde a infância e levando a nossa civilização a patamares antes inimagináveis.$cyber.320.end.desc$"
 cyber.320.other.desc: "Com a capacidade de instalar implantes cibernéticos em nossos infantes, nos deparamos com um impasse: essas melhorias pioneiras têm o poder de mudar para sempre a nossa relação com a tecnologia, liberando o potencial cibernético inato de nossas futuras gerações desde a infância e levando a nossa civilização a patamares antes inimagináveis.$cyber.320.end.desc$"
 cyber.320.end.desc: "\n\nPorém, a dependência de melhorias cibernéticas desde uma idade tão precoce poderia resultar na perda da capacidade de sobrevivência de nossa espécie em seu estado natural."
 cyber.320.a: "A nossa evolução não é motivo de preocupação."
 cyber.320.b: "Temos que preservar uma infância natural."
 #Stage 3 Challenges - Treatment of Non-Cyborgs
 cyber.360.name: "Dores de Conversão"
 cyber.360.desc: "Recentemente, alguns indivíduos começaram a expressar publicamente arrependimento pela decisão de passar por modificações corporais experimentais. A substituição do tronco encefálico por um material metálico acarretou um temor existencial duradouro, e alguns descrevem sua experiência como um ciclo contínuo de agonia insuportável.\n\nDiante das inúmeras exigências de reparação, nos vemos forçados a esclarecer nossa posição quanto às responsabilidades do Estado."
 cyber.360.a: "Vamos banir modificações extremas."
 cyber.360.a.tt: "Velocidade do progresso da situação §Y$situation_cyberization$§! por §Y6§! meses: §R-50%§!"
 cyber.360.b: "Um sacrifício acabará com o sofrimento deles."
 cyber.360.c: "Forneça analgésicos mais fortes."
 cyber.360.d: "Busque cobaias nas camadas mais baixas da sociedade."
 cyber.360.e: "Não vamos assumir essa responsabilidade."
 #CYBERIZATION STAGE 4
 cyber.405.name: "Impostos sobre Implantes" #Government rival
 cyber.405.desc: "Depois de testemunhar os lucros da indústria de melhorias, no momento frouxamente regulamentada, oficiais locais do governo vêm se esforçando para acompanhar de perto os avanços mais recentes. Impostos maiores têm sido aplicados em todos os estágios da produção de implantes cibernéticos, desde a extração de materiais até a instalação final.\n\nA burocracia e os custos adicionais desaceleraram nosso processo de melhoria, impedindo o progresso rumo à ciberização total."
 cyber.405.a: "Aceite os impostos."
 cyber.405.b: "Revogue os impostos."
 cyber.405.b.tt: "Velocidade do progresso da situação §Y$situation_cyberization$§!: §G+25%§!\n\n"
 cyber.405.c: "Vamos reformar a tributação de melhorias."
 cyber.405.c.tt: "Velocidade do progresso da situação §Y$situation_cyberization$§! por §Y1§! ano: §R-10%§!"
 cyber.410.name: "Guerra Judicial" #Government rival escalation
 cyber.410.desc: "Incapazes de acompanhar o ritmo de adoção de implantes cibernéticos pelo público, nossos legisladores estão fazendo o possível para limitar certos aspectos do processo de melhoria.\n\nCondenando nossa \"obsessão por implantes\" e afirmando que \"cada melhoria nos afasta mais de nossa identidade como povo [Owner.Species.GetName]\", a proposta de regulamentação mais recente define uma porcentagem máxima permitida de melhorias por pessoa para que o indivíduo ainda seja resguardado pela lei. Afinal, após certo ponto, corremos o risco de nos tornarmos mais máquinas do que [Owner.Species.GetNamePlural]."
 cyber.410.a: "Revogue a proposta de lei."
 cyber.410.a.tt: "Velocidade do progresso da situação §Y$situation_cyberization$§! por §Y1§! ano: §G+25%§!"
 cyber.410.b: "Vamos buscar um acordo."
 cyber.410.b.tt: "Velocidade do progresso da situação §Y$situation_cyberization$§! por §Y1§! ano: §R-25%§!"
 cyber.415.name: "Sem Garantias" #Corporate rival
 cyber.415.desc: "Na desenfreada corrida pelo lucro, o mercado de melhorias foi inundado por implantes baratos e de baixa qualidade, e algumas empresas não oferecem qualquer tipo de apoio ao consumidor caso esses dispositivos apresentem defeitos, o que é praticamente inevitável.\n\nEm um caso recente e bem conhecido, o implante de modulação cardíaca de uma popular figura do meio artístico apresentou um mau funcionamento enquanto ela estava no palco. Infelizmente, o resultado foi explosivo."
 cyber.415.a: "O mercado vai se ajustar sozinho."
 cyber.415.a_industrial: "Nada fora do comum."
 cyber.415.a.tt: "Velocidade do progresso da situação §Y$situation_cyberization$§!: §G+25%§!"
 cyber.415.b: "Temos que garantir a segurança dos usuários."
 cyber.415.c: "Puna os piores infratores."
 cyber.415.c.tt: "Velocidade do progresso da situação §Y$situation_cyberization$§!: §R-25%§!"
 cyber.420.name: "Design Perigoso" #Corporate rival escalation
 cyber.420.desc: "Recentemente, uma nova e controversa variedade de implantes cibernéticos vem ganhando força. São dispositivos projetados não para auxiliar o usuário, mas para ferir outros indivíduos: sprays tóxicos, nanogarrotes e ciberbloqueadores cerebrais tomam as ruas.\n\nEntusiastas afirmam que esse tipo de implante é necessário para a defesa pessoal, enquanto outros insistem que nada de bom pode vir dessa tecnologia."
 cyber.420.a: "Deixe o povo se armar."
 cyber.420.b: "Isso é perigoso demais."
 cyber.420.b.tt: "Velocidade do progresso da situação §Y$situation_cyberization$§!: §R-25%§!"
 cyber.420.b_pacifist: "Todos os implantes violentos devem ser desmontados."
 cyber.420.b.tt_pacifist: "Use os materiais para construir algo mais... apropriado.\n\n"
 cyber.425.name: "Hackeamento do Software de Controle" #Independent rival
 cyber.425.desc: "Em um ataque coordenado, diversos grupos de hackers ganharam acesso ao principal software que comanda todos os implantes cibernéticos. Eles ameaçam vazar o código para o público a menos que aceitemos suas exigências.\n\nPor enquanto, não temos motivos para duvidar deles. Se o código for divulgado, não teremos escolha além de reescrevê-lo, o que atrasaria imensamente os nossos esforços de ciberização."
 cyber.425.a: "Pague a eles o que estão pedindo."
 cyber.425.b: "Reescreva o código."
 cyber.425.b.tt: "Velocidade do progresso da situação §Y$situation_cyberization$§! por §Y1§! ano: §R-25%§!"
 cyber.425.c: "Eu quero ver eles tentarem."
 cyber.425.c.tt: "Ainda bem que os melhores hackers trabalham para NÓS."
 cyber.430.name: "Melhorias Pouco Confiáveis" #Independent rival escalation
 cyber.430.desc.demands: "Apesar da exorbitante quantia que pagamos aos grupos responsáveis pela violação de segurança, na noite passada nosso principal código foi transmitido em todas as redes públicas de informação. O vazamento foi precedido por uma imagem obscena que desdenhava da nossa inabilidade de impedir os ataques.\n\nA opinião pública já está se tornou negativa, e há um aumento notável no \"arrependimento de compra\" entre os consumidores de implantes cibernéticos."
 cyber.430.desc.protest: "Com o tempo e esforço necessários para reescrever o software de controle de implantes, a produção caiu consideravelmente.\n\nA população tornou-se ainda mais dependente das melhorias mais recentes, e muitos foram às ruas protestar contra o atraso no lançamento de novos produtos."
 cyber.430.a: "Vamos lançar novos produtos em breve."
 cyber.430.b: "Ignore-os."
 cyber.430.c.demands: "Vamos contra-atacar os hackers."
 cyber.430.c.protest: "Disperse os manifestantes."
 cyber.21.name: "Uma População Melhorada" #Situation 1 - Last event
 cyber.21.desc: "Hoje testemunhamos um momento decisivo para a nossa sociedade. Agora somos capazes de melhorar nossos corpos com partes mecânicas totalmente integradas.\n\nO processo teve suas dificuldades, e a transição não foi nada fácil, mas apesar do que perdemos pelo caminho, nossa nova existência oferece infinitas possibilidades."
 cyber.21.a: "Ficaremos mais fortes."
 cyber.21.a.start: "Modificador de §Y$building_augmentation_center$§! adicionado:$TABBED_NEW_LINE$"
 cyber.21.a.end: "Libera Efeitos Completos da Árvore de Tradição: ['tradition_category:tradition_cybernetics']"
 cyber.21.a.gov.tt: "$cyber.21.a.start$$cyber_control_government_effects$\n$cyber.21.a.end$"
 cyber.21.a.cor.tt: "$cyber.21.a.start$$cyber_control_corporate_effects$\n$cyber.21.a.end$"
 cyber.21.a.ind.tt: "$cyber.21.a.start$$cyber_control_independent_effects$\n$cyber.21.a.end$"
 ### CYBERIZATION SITUATION END ###
 ### SOCIETAL EFFECTS EVENT CHAIN START ###
 futureshock_chain_title: "Choque Futuro"
 futureshock_chain_desc: "Nós nos recusamos a nos contentar com aquilo que a natureza nos deu, buscando, em vez disso, exceder os limites do corpo orgânico. Nossa distribuição de implantes em larga escala encontrou apenas pequenos obstáculos, todos facilmente superáveis. A maior parte da população está eufórica com o que suas novas partes cibernéticas podem oferecer.\n\nEstamos diante da verdadeira grandeza. O que virá a seguir, só o tempo dirá."
 change_auth_tt: "Muda a Autoridade: "
 keep_auth_tt: "Mantém a Autoridade: "
 cyber_keep_auth_option: "A ciberização não muda quem somos."
