l_braz_por:
 ### CONCEPTS
 # Above each concept definition are instructions on usage, including an icon where one exists.
 #   Note that between the icon and the term there's a non-breaking space. When you copy the usage example, it will keep the non-breaking space.
 #   This is important to not get a line break between the icon and the concept.
 # Use a concept link with icon the first time a new concept is mentioned, then use §H without an icon for repeated uses.
 # Use §H with an icon the first time a concept is used withing its own description.
 # Use §H without an icon if the concept is used more than once.
 ui_available_tabs: "\n\nAbas disponíveis:\n"
 # View: £interface£ ['concept_empire_view'] or £interface£ §H$concept_empire_view$§!
 concept_empire_view: "Visão do Império"
 concept_empire_view_desc: "Apresenta uma visão geral do império.$ui_available_tabs$[GetConceptEmpireAdvisor]"
 empire_view_tab_empire: "§H$EMPIRE$§!"
 empire_view_tab_demographics: "§H$DEMOGRAPHICS_TITLE$§!"
 empire_view_tab_advisor: "§H$GOVERNMENT_ADVISOR_TAB$§!"
 concept_empire_view_tabs_advisor: "$concept_empire_view_tabs_no_advisor$\n- $empire_view_tab_advisor$: seleção da voz de conselheiro."
 concept_empire_view_tabs_no_advisor: "- $empire_view_tab_empire$: listagem de ['concept_authority'], ['concept_civics'] e ['concept_empire_modifiers'].\n- $empire_view_tab_demographics$: exibição de ['concept_pops'] e do que os afeta."
 # View: £interface£ ['concept_situation_log_view'] or £interface£ §H$concept_situation_log_view$§!
 concept_situation_log_view: "Visão do $MENU_PANEL__SITUATION_LOG_TITLE$"
 concept_situation_log_view_desc: "A £interface£ §H$concept_situation_log_view$§! apresenta uma visão geral das questões atuais.$ui_available_tabs$$concept_situation_log_view_tabs$"
 situation_log_view_tab_situation_log: "§H$topbar_button_situation_name$§!"
 situation_log_view_tab_timeline: "§H$TIMELINE$§!"
 situation_log_view_tab_anomilies: "§H$ANOMALIES$§!"
 situation_log_view_tab_victory: "§H$VICTORIES$§!"
 concept_situation_log_view_tabs: "- $situation_log_view_tab_situation_log$: listagem de ['concept_event_chains'], ['concept_special_projects'] e ['concept_first_contacts'].\n- $situation_log_view_tab_timeline$: exibição de ['concept_milestones'] e ['concept_empire_focuses'].\n- $situation_log_view_tab_anomilies$: exibição de ['concept_anomalies'].\n- $situation_log_view_tab_victory$: exibição do ['concept_scoreboard']."
 # View: £interface£ ['concept_government_view'] or £interface£ §H$concept_government_view$§!
 concept_government_view: "Visão do $topbar_button_council_name$"
 concept_government_view_desc: "A §H$concept_government_view$§! permite o gerenciamento do governo.$ui_available_tabs$$concept_government_view_tabs$"
 government_view_tab_council: "§H$COUNCIL$§!"
 government_view_tab_factions: "§H$FACTIONS$§!"
 government_view_tab_policies_and_edicts: "§H$EDICTS_AND_POLICIES$§!"
 concept_government_view_tabs: "- $government_view_tab_council$: gerenciamento do ['concept_council'] e dos ['concept_agendas'].\n- $government_view_tab_factions$: exibição de ['concept_factions'].\n- $government_view_tab_policies_and_edicts$: seleção de ['concept_policies'] e ['concept_edicts']."
 # View: £interface£ ['concept_society_management_view'] or £interface£ §H$concept_society_management_view$§!
 concept_society_management_view: "Visão do $TRADITION_VIEW_TITLE$" # Use this alias when referring to the concept
 concept_society_management: "$TRADITION_VIEW_TITLE$" # Left out 'View' to fit in the Databank UI
 concept_society_management_desc: "A §H$concept_society_management_view$§! permite o gerenciamento de tradições.$ui_available_tabs$[GetConceptSocietyManagement]"
 society_management_view_tab_traditions: "§H$TRADITIONS$§!"
 society_management_view_tab_crisis: "§H$CRISIS_TAB$§!"
 concept_society_management_view_crisis: "$concept_society_management_view_no_crisis$\n- $society_management_view_tab_crisis$: monitoramento do progresso da ['concept_crisis']."
 concept_society_management_view_no_crisis: "- $society_management_view_tab_traditions$: seleção de ['concept_traditions'] e ['concept_ascension_perks']."
 # View: £interface£ ['concept_technology_view'] or £interface£ §H$concept_technology_view$§!
 concept_technology_view: "Visão de $TECHNOLOGY$"
 concept_technology_view_desc: "A £interface£ §H$concept_technology_view$§! exibe o progresso científico de um império nas áreas de £physics£ ['concept_physics_research'], £society£ ['concept_society_research'] e £engineering£ ['concept_engineering_research']. A partir desta interface, as opções de pesquisa são selecionadas e as prioridades tecnológicas são gerenciadas.\n\nNovas ['concept_technologies'] são apresentadas de forma semialeatória a partir das opções disponíveis, refletindo a imprevisibilidade da investigação científica."
 # View: £interface£ ['concept_leaders_view'] or £interface£ §H$concept_leaders_view$§!
 concept_leaders_view: "Visão de $topbar_button_leaders_name$"
 concept_leaders_view_desc: "A £interface£ §H$concept_leaders_view$§! fornece uma visão geral de todos os ['concept_leaders'] ativos no império, incluindo seus papéis, ['concept_leader_traits'], níveis de experiência e designações atuais. Por meio desta interface, novos líderes podem ser recrutados, e os existentes podem ser realocados ou aposentados de suas funções."
 # View: £interface£ ['concept_species_view'] or £interface£ §H$concept_species_view$§!
 concept_species_view: "Visão de $topbar_button_species_name$"
 concept_species_view_desc: "A £interface£ §H$concept_species_view$§! fornece uma listagem completa de todas as ['concept_species'] conhecidas dentro do império. Nesta interface, é possível examinar e modificar as ['concept_species_traits'], além de gerenciar direitos populacionais como cidadania, serviço militar e ['concept_living_standards'].\n\nEsta visão é essencial para lidar com as complexidades de um império habitado por espécies diferentes, onde política, biologia e ideologia se entrelaçam na formação da sociedade galáctica."
 # View: £interface£ ['concept_planets_and_sector_view'] or £interface£ §H$concept_planets_and_sector_view$§!
 concept_planets_and_sector_view: "Visão de $PLANET_LIST$" # Use this alias when referring to the concept
 concept_planets_and_sector: "$PLANET_LIST$" # Left out 'View' to fit in the Databank UI
 concept_planets_and_sector_desc: "A interface de £interface£ §H$concept_planets_and_sector$§! fornece uma visão centralizada de todas as £colony£ ['concept_colonies'] e £sector£ ['concept_sectors'] do império.\n\nNessa visão, também é possível designar ['concept_governors']."
 # View: £interface£ ['concept_expansion_planner'] or
 concept_expansion_planner: "$MENU_PANEL__EXPANSION_PLANNER_TITLE$"
 concept_expansion_planner_desc: "O £interface£ §H$concept_expansion_planner$§! lista os £planet£ ['concept_planets'] que apresentam oportunidades de colonização. A colonização pode ser iniciada diretamente desta tela, o que constrói automaticamente uma £colony_ship£ ['concept_colony_ship'].\n\n£planet£ §H$concept_planets$§! devem ser inspecionados por uma £science_ship£ ['concept_science_ship'] e quaisquer £anomaly£ ['concept_anomalies'] encontradas devem ser investigadas antes que o planeta possa ser colonizado.\n\nUma ['concept_starbase'] também deve ser construída no sistema do planeta para que ele se encontre dentro das fronteiras do império."
 # View: £interface£ ['concept_fleet_management_view'] or £interface£ §H$concept_fleet_management_view$§!
 concept_fleet_management_view: "Visão do $topbar_button_fleet_manager_name$" # Use this alias when referring to the concept
 concept_fleet_management: "$topbar_button_fleet_manager_name$" # Left out 'View' to fit in the Databank UI
 concept_fleet_management_desc: "Projete naves e crie frotas. Novos §HTamanhos de Naves§! e ['concept_components'] são liberados ao pesquisar as ['concept_technologies'] necessárias.$ui_available_tabs$[GetConceptFleetManagement]."
 fleet_management_view_tab_fleet_manager: "§H$FLEET_MANAGER_VIEW$§!"
 fleet_management_view_tab_ship_designer: "§H$SHIP_DESIGNER$§!"
 concept_fleet_management_view_space_fauna: "$concept_fleet_management_view_no_space_fauna$\n- §H$CREATURE_DESIGNER$§!: criação de ['concept_space_fauna']."
 concept_fleet_management_view_no_space_fauna: "- $fleet_management_view_tab_fleet_manager$: organização de ['concept_fleets'].\n- $fleet_management_view_tab_ship_designer$: projeto de ['concept_military_ships']."
 # View: £interface£ ['concept_contacts_view'] or £interface£ §H$concept_contacts_view$§!
 concept_contacts_view: "Visão de Contatos"
 concept_contacts_view_desc: "A £interface£ §H$concept_contacts_view$§! lista todos os impérios conhecidos, enclaves independentes e entidades alienígenas. A partir desta interface, é possível gerenciar a ['concept_diplomacy'] e avaliar relações. Ela serve como um hub central para as comunicações interestelares e inteligência estrangeira."
 contacts_view_tab_contacts: "§H$topbar_button_contacts_name$§!"
 contacts_view_tab_agreements: "§H$AGREEMENTS_LIST_TITLE$§!"
 contacts_view_tab_shroud: "§H$THE_SHROUD_TITLE$§!"
 concept_contacts_view_tabs: "- $contacts_view_tab_contacts$: prática de ['concept_diplomacy'].\n- $contacts_view_tab_agreements$: estudo de ['concept_subject_agreements']\n- $contacts_view_tab_shroud$: prática de ['concept_psionic_ascension']"
 # View: £interface£ ['concept_discoveries_view'] or £interface£ §H$concept_discoveries_view$§!
 concept_discoveries_view: "Visão de $topbar_button_discoveries_name$"
 concept_discoveries_view_desc: "A £interface£ §H$concept_discoveries_view$§! cataloga objetos e fenômenos significativos encontrados pela galáxia, incluindo ['concept_relics'], artefatos antigos e outras curiosidades galácticas de importância duradoura.$ui_available_tabs$[GetConceptDiscovery]"
 discoveries_view_tab_relics: "§H$relics$§!"
 discoveries_view_tab_collection: "§H$COLLECTION$§!"
 discoveries_view_tab_vivarium: "§H$VIVARIUM$§!"
 discoveries_view_tab_astral_actions: "§H$ASTRAL_ACTIONS$§!"
 concept_discovery_view_base: "- $discoveries_view_tab_relics$: gerenciamento de ['concept_relics']."
 concept_discovery_view_base_ancrel: "$concept_discovery_view_base$ e ['concept_minor_artifacts']"
 concept_discovery_view_base_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$: exibição de ['concept_specimens'].\n- $discoveries_view_tab_vivarium$: procriação de ['concept_space_fauna']."
 concept_discovery_view_base_ancrel_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$: exibição de ['concept_specimens'] e ['concept_minor_artifacts'].\n- $discoveries_view_tab_vivarium$: procriação de ['concept_space_fauna']."
 concept_discovery_view_base_astral: "$concept_discovery_view_base$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_astral: "$concept_discovery_view_base_ancrel$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_archive_astral: "$concept_discovery_view_base_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_archive_astral: "$concept_discovery_view_base_ancrel_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_astral: "- $discoveries_view_tab_astral_actions$: ativação de ['concept_astral_actions']."
 # View: £interface£ ['concept_claims_view'] or £interface£ §H$concept_claims_view$§!
 concept_claims_view: "Visão de $CLAIMS_VIEW$"
 concept_claims_view_desc: "A £interface£ §H$concept_claims_view$§! exibe todas as ['concept_claims'] territoriais mantidas pelo império. O modo diplomático do ['concept_galaxy_map'] fornece uma visão clara dos sistemas contestados e das áreas propensas a conflitos no futuro."
 # View: £interface£ ['concept_market_view'] or £interface£ §H$concept_market_view$§!
 concept_market_view: "Visão do $MARKET_VIEW$"
 concept_market_view_desc: "A £interface£ §H$concept_market_view$§! oferece uma base para o comércio interestelar, permitindo a compra e venda de recursos ou o estabelecimento de transações mensais recorrentes."
 # View: £interface£ ['concept_colony_view'] or £interface£ §H$concept_colony_view$§!
 concept_colony_view: "Visão da Colônia"
 concept_colony_view_desc: "A £interface£ §H$concept_colony_view$§! permite a administração de uma £colony£ ['concept_colony']. Em £planet£ ['concept_planets'] ou ['concept_habitats'] desabitados adequados, esta tela poderá ser usada para dar início ao processo de §HColonização§!.$ui_available_tabs$$concept_colony_view_tabs$"
 colony_view_tab_planet_summary: "§H$PLANET_TAB$§!"
 colony_view_tab_management: "§H$MANAGEMENT_TAB$§!"
 colony_view_tab_population: "§H$POPULATION_TAB$§!"
 colony_view_tab_armies: "§H$GROUND_COMBAT_TAB$§!"
 colony_view_tab_holdings: "§H$CORPORATE_TAB$§!"
 concept_colony_view_tabs: "- $colony_view_tab_planet_summary$: exibe uma visão geral dos £district£ ['concept_districts'], £building£ ['concept_buildings'] e qualquer ['concept_governor'] designado à colônia. Aqui, é possível definir uma ['concept_designation'] ou habilitar a ['concept_planet_automation'].\n- $colony_view_tab_management$: exibe quaisquer recursos planetários e alterações na população. Aqui, é possível decretar ['concept_decisions'], a ['concept_planetary_ascension'] ou iniciar a ['concept_terraforming'].\n- $colony_view_tab_population$: mostra a população da colônia dividida em camadas de £job£ ['concept_job'].\n- $colony_view_tab_armies$: mostra todos os exércitos terrestres na colônia e o nível de ['concept_devastation'] que ela sofreu.\n- $colony_view_tab_holdings$: fornece um plano geral de todas as ['concept_overlord_holdings'] na colônia."
 # View: £interface£ ['concept_starbase_view'] or £interface£ §H$concept_starbase_view$§!
 concept_starbase_view: "Visão da Base Estelar"
 concept_starbase_view_desc: "A £interface£ §H$concept_starbase_view$§! permite a administração de uma ['concept_starbase'].$ui_available_tabs$$concept_starbase_view_tabs$"
 starbase_view_tab_command: "§H$STARBASE_STARBASE_TAB$§!"
 starbase_view_tab_defenses: "§H$STARBASE_DEFENSES_TAB$§!"
 starbase_view_tab_armies: "§H$MACRO_BUILDER_TAB$§!"
 starbase_view_tab_shipyard: "§H$STARBASE_SHIPYARD_TAB$§!"
 concept_starbase_view_tabs: "- $starbase_view_tab_command$: apresenta uma visão geral dos §HMódulos§! e §HConstruções§! da base estelar. Também possibilita aprimorar a base estelar para o próximo nível após a ['concept_technology'] necessária ter sido pesquisada.\n- $starbase_view_tab_defenses$: mostra todas as ['concept_defense_platforms'], e é possível construir mais clicando no projeto desejado.\n- $starbase_view_tab_armies$: fornece uma maneira de montar um grande número de §H$assault_army_plural$§!. Exércitos são criados em £colony£ ['concept_colonies'] disponíveis no £sector£ ['concept_sector'], e então são reunidos na base estelar ou em um §HExército§! com a opção §HReunir Tropas§! ativada.\n- $starbase_view_tab_shipyard$: permite a construção de ['concept_civilian_ships'] e ['concept_military_ships']."
 # View: £interface£ ['concept_system_map'] or £interface£ §H$concept_system_map$§!
 concept_system_map: "Mapa do Sistema"
 concept_system_map_desc: "O £interface£ §H$concept_system_map$§! apresenta uma visão detalhada de um sistema estelar, incluindo ['concept_celestial_objects'], ['concept_civilian_space_stations'], ['concept_fleets'] e infraestrutura orbital, o que permite o gerenciamento preciso de construções, colonização, operações de combate e atividades científicas no sistema."
 # View: £interface£ ['concept_galaxy_map'] or £interface£ §H$concept_galaxy_map$§!
 concept_galaxy_map: "Mapa da Galáxia"
 concept_galaxy_map_desc: "O £interface£ §H$concept_galaxy_map$§! oferece uma visão geral estratégica da galáxia conhecida, exibindo £system£ ['concept_systems'], fronteiras do ['concept_empire'] e ['concept_hyperlanes']. É a interface principal para exploração, expansão e coordenação interestelar."
 # View: £interface£ ['concept_navigation_bar'] or £interface£ §H$concept_navigation_bar$§!
 concept_navigation_bar: "Barra de Navegação"
 concept_navigation_bar_desc: "A £interface£ §H$concept_navigation_bar$§! fica no lado esquerdo da tela.\n\nÉ possível expandi-la ao interagir com ela ou bloqueá-la em um estado minimizado.\n\nO modo expandido dá acesso às configurações onde os itens do menu podem ser reordenados. Isso também altera os atalhos de teclado que abrem rapidamente cada menu."
 # View: £interface£ ['concept_resource_bar'] or £interface£ §H$concept_resource_bar$§!
 concept_resource_bar: "Barra de Recursos"
 concept_resource_bar_desc: "A £interface£ §H$concept_resource_bar$§! fica na parte superior da tela.\n\nEla exibe diversos §HRecursos§! como £energy£ ['concept_energy'], além de métricas como £trade_value£ ['concept_trade'], ['concept_research'], ['concept_starbase_capacity'] e ['concept_naval_capacity'].\n\nÀ direita ficam os §HControles de Tempo§! utilizados para ajustar a velocidade do jogo, pausar ou continuar a partida.\n\nAbaixo dos §HControles de Tempo§! encontra-se o §HPlayer de Música§!."
 # View: £interface£ ['concept_outliner'] or £interface£ §H$concept_outliner$§!
 concept_outliner: "Resumo"
 concept_outliner_desc: "O £interface£ §H$concept_outliner$§! fornece acesso rápido aos principais ativos do império, como £colony£ ['concept_colonies'], ['concept_fleets'] e ['concept_civilian_space_stations']. Esta interface personalizável permite uma navegação ágil e eficiente, oferecendo atualizações em tempo real e controle direto sobre operações vitais."
