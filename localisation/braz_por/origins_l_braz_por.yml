 decision_open_shroud_rift_legacy_fail: "$TRIGGER_FAIL$Não pode ser um mundo núcleo Zroni"
 decision_entrap_shroud_entity: "Capturar Entidade do Véu"
 decision_entrap_shroud_entity_desc: "Tente capturar uma entidade do Véu usando tecnologia Zroni para drenar sua energia."
