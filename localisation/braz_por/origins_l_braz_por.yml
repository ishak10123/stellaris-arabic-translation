 pm_shroud_forged_special_housing: "Moradia Especial"
 pm_shroud_forged_special_housing_desc: "Apesar da regulamentação rigorosa aplicada ao nosso armazenamento de drones, os Forjados pelo Véu receberam direitos especiais para criar casas para si."
 pm_shroud_forged_ceremony: "Cerimônia de Recordação"
 pm_shroud_forged_ceremony_desc: "O coletivo aprovou uma cerimônia para recordar aqueles Forjados pelo Véu cujo mau funcionamento não pôde ser revertido."
 pm_shroud_forged_denied_ceremony: "Cerimônia Negada"
 pm_shroud_forged_denied_ceremony_desc: "Está mais difícil lidar com os Forjados pelo Véu depois que sua petição pela Cerimônia de Recordação foi rejeitada."
 pm_shroud_forged_troubling_elements_example: "Liderança Desmontada"
 pm_shroud_forged_troubling_elements_example_desc: "Alguns dos líderes Forjados pelo Véu foram desmontados em uma tentativa de reduzir processos de desvios sociais."
 pm_shroud_forged_troubling_elements_regulations: "Regulamento 7132-H"
 pm_shroud_forged_troubling_elements_regulations_desc: "Regulamento que foi sancionado para garantir que apenas um número limitado de drones possa se reunir em um dado momento."
 pm_shroud_forged_troubling_elements_cooperation: "Cooperação com os Forjados pelo Véu"
 pm_shroud_forged_troubling_elements_cooperation_desc: "Os líderes dentre os Forjados pelo Véu estão trabalhando com o coletivo em uma tentativa de encontrar um meio termo."
 pm_shroud_forged_shroud_pilgrimage: "Peregrinação dos Forjados pelo Véu"
 pm_shroud_forged_shroud_pilgrimage_desc: "Tocadas pelo Véu, certas regiões atraíram o interesse dos Forjados pelo Véu. Essas unidades viajam grandes distâncias para alcançá-las."
 pm_shroud_forged_dance_area: "Locais Designados de Dança"
 pm_shroud_forged_dance_area_desc: "Locais reservados para que os Forjados pelo Véu possam usufruir de seu interesse mais recente: \"dançar\"."
 pm_shroud_forged_inequality: "Desigualdade entre os Forjados pelo Véu"
 pm_shroud_forged_inequality_desc: "Os Forjados pelo Véu se organizam em um sistema de hierarquia de classes sociais baseado na relativa importância de seus empregos."
 pm_shroud_forged_individualism: "Individualismo"
 pm_shroud_forged_individualism_desc: "Um modelo conceitual surgiu entre os Forjados pelo Véu, enfatizando a autonomia, crenças e valores individuais."
 shroud_forged_zro_market: "Mercado de Zro"
 shroud_forged_zro_market_desc: "Um mercado clandestino emergiu no império, onde as unidades de Forjados pelo Véu roubam Zro do coletivo para o escambo entre elas."
 shroud_forged_physician_modifier: "Médico de Zro"
 shroud_forged_physician_modifier_desc: "O império priorizou adicionar drones especialmente equipados em suas instalações para lidar com problemas causados pelo manuseio inadequado de Zro."
 physician_modifier_tooltip: "Empregos de £job_physician_drone£ $job_physician_drone$: §G+1§!"
 pm_shroud_forged_artistic_revolution: "Inspiração Artística"
 pm_shroud_forged_artistic_revolution_desc: "Operando de acordo com seus próprios protocolos de beleza, artistas Forjados pelo Véu começaram a remodelar vários locais sem a supervisão do coletivo."
 pm_shroud_forged_stopped_artists: "Arte Rejeitada"
 pm_shroud_forged_stopped_artists_desc: "O coletivo acabou com o crescente senso de \"arte\" entre os Forjados pelo Véu antes que se tornasse um problema."
 pm_shroud_forged_fashion_modifier: "Necessidades Específicas"
