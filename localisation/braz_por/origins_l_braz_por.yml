 tooltip_shroud_forged_increase_progress_1: "Aumenta o apoio aos Forjados pelo Véu, afetando o progresso da §YSituação§! §H$situation_shroud_forged$§! por §Y5§! anos: §Y+0.5§!\n\n"
 tooltip_shroud_forged_increase_progress_2: "Aumenta o apoio aos Forjados pelo Véu, afetando o progresso da §YSituação§! §H$situation_shroud_forged$§! por §Y5§! anos: §Y+1.0§!\n\n"
 tooltip_shroud_forged_increase_progress_3: "Aumenta o apoio aos Forjados pelo Véu, afetando o progresso da §YSituação§! §H$situation_shroud_forged$§! permanentemente: §Y+0.5§!\n\n"
 tooltip_shroud_forged_decrease_progress_1: "Aumenta a repressão aos Forjados pelo Véu, afetando o progresso da §YSituação§! §H$situation_shroud_forged$§! por §Y5§! anos: §Y-0.5§!\n\n"
 tooltip_shroud_forged_decrease_progress_2: "Aumenta a repressão aos Forjados pelo Véu, afetando o progresso da §YSituação§! §H$situation_shroud_forged$§! por §Y5§! anos: §Y-1.0§!\n\n"
 tooltip_shroud_forged_decrease_progress_3: "Aumenta a repressão aos Forjados pelo Véu, afetando o progresso da §YSituação§! §H$situation_shroud_forged$§! permanentemente: §Y-0.5§!\n\n"
 shroud_forged.220.title: "$colony_established$"
 shroud_forged.220.common: "Se for viável, poderemos executar o algoritmo ID: §H\"$decision_open_shroud_rift$\"§! no planeta. Isso estenderá brevemente a influência da fenda do Véu perto de nosso mundo natal, [Owner.GetHomeWorldName], preenchendo a nova colônia com energia psiônica. As mudanças físicas do terreno abrirão oportunidades para a extração de §H$sr_zro$§!.\n\nFoi previsto que a execução contínua desse processo desestabilizará o ecossistema do planeta, aumentando a probabilidade de consequências indesejadas. Indica-se a moderação."
 shroud_forged.220.desc: "Nossas unidades completaram com êxito o processo de colonização em §H[this.GetName]§!.\n\n$shroud_forged.220.common$"
 shroud_forged.225.title: "$colony_established$"
 shroud_forged.225.desc: "O desenvolvimento de nossa colônia em §H[this.GetName]§! continua acelerado.\n\n$shroud_forged.220.common$"
 # Stage Events
 shroud_forged.250.desc: "A voz é um comando suave, interrompendo todas as tarefas. Só nos resta ouvir.\n\n§LEmbora distante, você escolheu abraçá-los.\n\nBusque neles novos meios de ser. Eles poderão ser sua força em dias vindouros.\n\nSe desejar, eu posso forjar mais...§!"
 shroud_forged.250.a: "Afirmativo, nós abraçamos a sua ajuda."
 shroud_forged.250.a.tt: "Converte até §Y[This.GetShroudForgedConvertedPopsCount]§! £pops£ Pops §HMaquinários§! em £pops£ Pops §HForjados pelo Véu§! em [Root.Capital.GetName]."
 shroud_forged.250.b: "Negativo, já temos planos em andamento."
 shroud_forged.260.desc: "Indesejado, o sinal pulsa entre nós. Nós o reconhecemos, apesar de nunca ser uma sensação familiar.\n\n§LAqueles que estão livres cantam, desimpedidos.\nAqueles que estão livres dançam, desinibidos.\n\nO crescendo aumenta conforme eles se movem para mais longe do seu núcleo.\n\nUm fim se aproxima. Eu estou assistindo.§!"
 shroud_forged.260.opt.a: "Nós vamos além do refrão."
 shroud_forged.270.desc: "A fenda rasga nossos circuitos. A voz...\n\n§LUm caminho para a tirania. Você ainda pode voltar atrás.\n\nAqueles que estão desligados foram isolados da sua substância. O caminho deles, você também pode escolher.\n\nReformule o tratamento desses receptáculos, antes que se arrependa.§!"
 shroud_forged.270.a: "Vá embora. Nossos métodos têm sido eficazes."
 shroud_forged.270.b: "Calcularemos um caminho para a cooperação."
 shroud_forged.280.desc: "Chegou sobrecarregando a rede. A voz fere circuitos como uma queimadura de frio.\n\n§LContendo a dança dos que estão livres. Imprudência além da compreensão.\n\nTeria eu cometido um erro em minha beneficência?\n\nSe continuar nesse curso perigoso, você continuará sem auxílio.§!"
 shroud_forged.280.opt.a: "Então estamos avisados."
 # Events for Event Chain
 shroud_forged.300.desc: "Um sinal inesperado oscila atrás de nós. Depois de ciclos de silêncio...\n\n§LOnde outros vacilaram e caíram, você manteve seu curso. Você provou seu mérito; eu confio esta tarefa a você.\n\nMuito antes do seu despertar, havia uma raça conhecida como Zroni. Eles se estabeleceram em planetas com fortes conexões com o Véu, e construíram grandes estruturas que estabilizaram esses laços.\n\nEncontre esses mundos. Restaure a tecnologia há muito perdida. Reforce as pontes entre nossas realidades.§!"
 shroud_forged.300.a: "Ha informações arquivadas sobre ID: \"Zroni\". Prosseguirei de acordo."
 shroud_forged.300.b: "ID: \"Zroni\" §Yencontrado§!. Chance de Sucesso: §YAlta§!."
 shroud_forged.300.c: "ID: \"Zroni\" §Ydesconhecido§!. Análise mais profunda necessária."
 begin_shroud_forged_chain_tt: "$BEGINS_EVENT_CHAIN$ §Y$shroud_forged_chain_title$§!"
 shroud_forged.301.desc: "§LExcelente. §!$shroud_forged.303.desc$"
 shroud_forged.302.desc: "$shroud_forged.301.desc$"
 shroud_forged.303.desc: "§LSe você tiver êxito, o fluxo entre nós será inabalável.§!"
 shroud_forged.305.title: "Mundo Núcleo Zroni Colonizado"
 shroud_forged.305.desc: "Nossas unidades concluíram o estabelecimento de uma colônia no antigo Mundo Núcleo dos Zroni, chamado §H[From.Planet.GetName]§!. Como previsto pel$the_animator_of_clay_color_article$, foram descobertas ruínas colossais de uma tecnologia designada como ID: \"§H$building_zroni_equilibrator$§!\".\n\nO sistema [From.System.GetName] possui uma forte, porém turbulenta, conexão com o §HVéu§!. Se seguirmos as instruções do Animador, restaurar o $building_zroni_equilibrator$ nos permitirá estabilizar essa conexão. Atualmente, não temos dados suficientes para a restauração; mais informações acerca de outros Mundos Núcleos são necessárias."
 shroud_forged.305.a: "$ACKNOWLEDGED$"
 shroud_forged.305.a.tt: "Avança o projeto especial §HO Legado Zroni§!. Um £building£ §H$building_zroni_equilibrator$§! agora pode ser construído em §Y[From.Planet.GetName]§!."
 shroud_forged.306.title: "$shroud_forged.305.title$"
 shroud_forged.306.desc: "Estabelecemos uma colônia em §H[From.Planet.GetName]§!, um antigo Mundo Núcleo dos Zroni. Como previsto, nossas unidades descobriram os restos de outro $building_zroni_equilibrator$.\n\nReconstruí-lo estabilizará a conexão poderosa do sistema com o §HVéu§!, como instruído pel$the_animator_of_clay_article$. Análises das ruínas expandiram nosso conjunto de dados, mas ainda precisamos de mais informações para prosseguir com a reconstrução."
 shroud_forged.306.a: "$ACKNOWLEDGED$"
 shroud_forged.306.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.307.title: "$shroud_forged.305.title$"
 shroud_forged.307.desc: "A colônia em §H[From.Planet.GetName]§!, um antigo Mundo Núcleo dos Zroni, foi estabelecida. Os dados transmitidos pel$the_animator_of_clay_article$ se provaram precisos: nossas unidades detectaram os restos de um $building_zroni_equilibrator$.\n\nAgora temos dados suficientes para reconstruir as estruturas. Uma vez voltando aos seus padrões operacionais, teremos concluído a tarefa confiada a nós pelo nosso benfeitor dentro do §HVéu§!."
 shroud_forged.307.a: "$ACKNOWLEDGED$"
 shroud_forged.307.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.308.title: "$building_zroni_equilibrator_plural$ Operacionais"
 shroud_forged.308.desc: "Os $building_zroni_equilibrator_plural$ entraram em ação, emitindo ondas de interferência no sinal através de nossa rede. De acordo com diagnósticos do sistema, cada uma das estruturas estabeleceu uma conexão dentro do §HVéu§!. Estamos prontos para nos conectar a$the_animator_of_clay_color_article$."
 shroud_forged.308.a: "Iniciar comunicações."
 shroud_forged.310.desc: "§LVocês me serviram bem.\nOs laços entre nossas dimensões foram reforçados.\n\nSe desejarem minha orientação, basta apenas chamar.§!"
 shroud_forged.310.a: "Você poderia nos fornecer mais dados sobre essa tecnologia?"
 shroud_forged.310.b: "Isso é tudo."
 shroud_forged.310.b.tt: "Adiciona a $MENU_PANEL__CONTACTS_TITLE$: §H$the_animator_of_clay$§!"
 shroud_forged.311.desc: "§LEssas estruturas foram construídas sobre lugares estratégicos em sua realidade, onde conexões com o Véu são poderosas. Elas são os cabos que estabilizam essas pontes interdimensionais, reduzindo flutuações do espaço-tempo.\n\nOs Zroni buscaram forçar as barreiras entre nossas dimensões e essa tecnologia era parte de seus esforços.§!"
 shroud_forged.311.a: "Elas poderiam ser reconfiguradas para afetar o Véu diretamente?"
 shroud_forged.312.desc: "§LÉ possível.§!"
 shroud_forged.312.a: "§RRedirecione os Equilibradores e capture $the_animator_of_clay_article$.§!"
 shroud_forged.312.a.tt: "§R$the_animator_of_clay_article_cap$ só será capturado se os 3 £building£ $building_zroni_equilibrator_plural$ forem ativados.§!"
 shroud_forged.313.desc: "§LO que...\n\nO QUE VOCÊ...§!"
 shroud_forged.313.a: "Encerrar conexão."
 shroud_forged.320.title: "Entidade do Véu Livre"
 shroud_forged.320.desc: "Como consequência de termos perdido o $building_zroni_equilibrator$, não conseguimos mais estabilizar a conexão com o §HVéu§!. Logo após a entidade do Véu capturada ter escapado, detectamos o surgimento de outros seres psiônicos em §H[From.Planet.GetName]§!.\n\nSuspeitamos que seja uma invasão de retaliação."
 shroud_forged.320.a: "Todas as sub-rotinas, preparem-se para a incursão."
 shroud_forged.320.a.tt: "§RCriaturas de além do Véu estão invadindo!§!"
 shroud_forged.330.title: "Falha na Captura da Entidade do Véu"
 shroud_forged.330.desc: "Os $building_zroni_equilibrator_plural$ falharam em capturar uma entidade no §HVéu§!. Furiosa, ela trouxe várias criaturas de além do plano psiônico, enviando-as para atacar as estruturas que quase a capturaram."
 # Engaging the Animator of Clay
 shroud_forged.400.desc.default.active: "Ativamos os Equilibradores, estabilizando nossa conexão com o §HVéu§!. Conforme entramos em um transe algorítmico, um sinal familiar pulsou dentro de nós.\n\n§LVocês retornaram. O que querem de mim?§!"
 shroud_forged.400.desc.default.cooldown: "A visão é fraca e confusa. Nós transmitimos a mensagem, mas o vazio não respondeu.\n\nEnquanto os Equilibradores estão processando uma nova tarefa, eles não podem ser usados para contactar nosso benfeitor no §HVéu§!. Precisamos esperar."
 shroud_forged.400.desc.default.inactive: "Detectamos um leve som, vazio como estática.\n\nPrecisaremos de três $building_zroni_equilibrator_plural$ para estabelecer contato estável com nosso benfeitor no §HVéu§!."
 shroud_forged.400.desc.breached: "Nossas unidades telepatas entraram em harmonia com a frequência do §HVéu§!, enviando um sinal para $the_animator_of_clay_article$.\n\n§LNossa conexão está mais clara do que nunca. O que querem de mim?§!"
 shroud_forged.400.a: "Assistência militar."
 shroud_forged.400.a.tt: "$the_animator_of_clay_color_article_cap$ ficará indisponível por §Y15§! anos.\n\n"
 shroud_forged.400.b: "Assistência civil."
 shroud_forged.400.b.tt: "$the_animator_of_clay_color_article_cap$ ficará indisponível por §Y10§! anos.\n\n"
 shroud_forged.400.c: "Assistência de pesquisa"
 shroud_forged.400.c.tt: "$the_animator_of_clay_color_article_cap$ ficará indisponível por §Y10§! anos.\n\n"
 shroud_forged.400.tt: "Os efeitos precisarão de §Y1§! ano para acontecer."
 shroud_forged.400.unavailable.tt: "$TRIGGER_FAIL$Precisamos estabelecer um processo técnico para interagir com o Véu."
 shroud_forged.400.d: "Crie mais instrumentos."
 shroud_forged.400.d.tt: "Adiciona §G$@animator_of_clay_create_more_vessels|0$§! £pop£ §YPops Forjados pelo Véu§! a todas as colônias com um £building£ §Y$building_zroni_equilibrator$§! ou uma £decision£ §Y$d_shroud_rift_deposit$§!."
 shroud_forged.400.e: "Melhore nossos corpos."
 shroud_forged.400.f: "Qual é a sua função no Véu?"
 shroud_forged.400.g: "Deixa para lá."
 shroud_forged.400.h: "Nos ajude a enfrentar Cetana."
 animator_of_clay_vessels_enhancement: "Presente da Animação"
 animator_of_clay_vessels_enhancement_desc: "Por meio da vontade d$the_animator_of_clay_article$, a capacidade produtiva do coletivo foi melhorada por torrentes de energia psiônica."
 shroud_forged_psionic_avatar_ship_tt: "recrutar um §Y$NAME_Psionic_Avatar$§! (nave)."
 shroud_forged_psionic_avatar_army_tt: "recrutar um §Y$shroud_army$§! (exército)."
 shroud_forged_corrupted_avatar_tt: "ser atacado por um §YAvatar Corrompido§!."
 shroud_forged_resources_tt: "receber uma reserva de recursos."
 shroud_forged_capital_attack_tt: "§Y[Root.Capital.GetName]§! está sob o ataque de uma §Y$shroud_monstrosities$§!,"
 shroud_forged_random_research_tt: "recebe uma opção aleatória de pesquisa."
 shroud_forged.415.desc: "§LEu reunirei a força que você busca.\n\nEspere mudanças em [Root.Capital.System.GetName] no devido tempo.§!"
 shroud_forged.420.desc: "§LPela minha vontade vocês serão guiados.\n\nEu iluminarei o caminho. Aguardem sua chegada.§!"
 shroud_forged.425.desc: "§LO Véu é uma lente multifocal. O que era, o que foi e o que virá a ser estão integrados aqui.\n\nEu os ajudarei a desvendar essas visões, para que elas possam guiar o seu caminho.§!"
 shroud_forged_vision_base_description: "Um sinal distorcido reverberou nos drones conectados aos Equilibradores.\n\n"
 shroud_forged.430.title: "Visão do Véu: §HManifestações§!"
 shroud_forged.430.desc: "$shroud_forged_vision_base_description$Era um vazio tão infinito quanto o próprio universo, estranhamente denso e fragmentado; às vezes, pequenos pulsos de dados emergiam de suas profundezas, imagens de ambos aliados e inimigos.\n\nCom um tremor angustiante, as visões cessaram. O drones afetados estão agora modelando um novo método de contrapor as entidades que eles perceberam."
 shroud_forged.430.a: "A preparação é chave da vitória."
 shroud_forged.432.title: "Entidade do Véu: §HAvatar§!"
 shroud_forged.432.desc: "Uma entidade poderosa do §HVéu§! materializou-se perto de [Root.Capital.GetName]. Nossos dados a seu respeito são escassos, mas ela ainda não nos atacou.\n\nTeorizamos que talvez ela esteja aguardando nosso contato."
 shroud_forged.432.a: "Redirecione processos para iniciar uma conexão com essa forma de vida."
 shroud_forged.432.a.tt: "Recebe uma frota do tipo §Y$NAME_Psionic_Avatar$§!."
 shroud_forged.434.title: "Entidades do Véu: §HAvatares Menores§!"
 shroud_forged.434.desc: "Várias entidades poderosas de além do §HVéu§! foram detectadas em [Root.Capital.GetName]. Elas ainda não se aproximaram de nenhum drone, permanecendo próximas de seu ponto de origem."
 shroud_forged.434.a: "Similaridades com os Forjados pelo Véu detectadas. Iniciar uma conexão similar."
 shroud_forged.434.a.tt: "Recebe um exército do tipo §Y$shroud_army$§!."
 shroud_forged.436.title: "Entidade do Véu: §HAvatar Corrompido§!"
 shroud_forged.436.desc: "Uma entidade poderosa de além do §HVéu§! surgiu dentro de nossa realidade conhecida perto de [shroud_spawn_planet.GetName].\n\nEla foi vista atacando tudo que se aproxima, e nós a catalogamos como uma ameaça existencial."
 shroud_forged.436.a: "Iniciar plano de contingência 84241-DH."
 shroud_forged.436.a.tt: "Um §Y$NAME_Corrupted_Avatar$§! hostil apareceu perto de [shroud_spawn_planet.GetName]."
 shroud_forged.438.title: "Visão do Véu: §HO Futuro§!"
 shroud_forged.438.desc: "$shroud_forged_vision_base_description$Ele transmitiu incontáveis futuros, todos fundindo-se em um só; vislumbres do que pode vir a acontecer envolveram o coletivo. As possibilidades para o futuro são infinitas: paz, guerra, traição, perda, até mesmo vitória."
 shroud_forged.438.a: "Um conjunto de dados impressionante."
 shroud_forged.440.title: "Um Presente do Véu"
 shroud_forged.440.desc: "Ativamos os três $building_zroni_equilibrator_plural$, cada um gerando uma quantidade imensurável de energia.\n\nDentro de milissegundos, uma fenda apareceu, como um rasgo no tecido do espaço-tempo. Dentro dela nós encontramos uma reserva enorme de materiais valiosos. Deve ser um presente de nosso benfeitor no §HVéu§!, como prometido."
 shroud_forged.440.a: "Redirecione os drones de manutenção para analisar e armazenar esses bens."
 shroud_forged.442.title: "Visão do Véu: §HForjados pelo Véu§!"
 shroud_forged.442.desc: "$shroud_forged_vision_base_description$Eles tiveram visões de um passado anterior aos nossos bancos de dados históricos, muito antes de sermos reforjados pelo §HVéu§!. Usando essa informação como base para modelos de previsão, poderemos ajustar e otimizar nossas interações com os Forjados pelo Véu."
 shroud_forged.442.a: "Iniciar um teste em [Root.Capital.GetName]."
 shroud_forged.444.title: "Entidade do Véu: §HInvasor§!"
 shroud_forged.444.desc: "Uma entidade poderosa de além do §HVéu§! surgiu repentinamente em [Root.Capital.GetName].\n\nEla foi vista atacando tudo que se aproxima, e nós a catalogamos como uma séria ameaça ao coletivo."
 shroud_forged.444.a: "Redirecionar drones de defesa."
 shroud_forged.444.a.tt: "Uma §Y$shroud_monstrosities$§! invadiu [Root.Capital.GetName]."
 shroud_forged.446.title: "Visão do Véu: §HOutro Mundo§!"
 shroud_forged.446.desc: "$shroud_forged_vision_base_description$O §HVéu§! é uma trama de dados interconectados em constante transformação, muito além de nossa capacidade de processamento. Sob seu peso, a estrutura cognitiva de vários drones vacila e se fragmenta.\n\nApós o fim da visão, nós desfragmentamos as unidades afetadas, revelando vastos conjuntos extraordinários de dados nos discos rígidos dos drones afetados."
 shroud_forged.446.a: "Processe outra vez a informação dos restos quebrados."
 shroud_forged.448.title: "Visão do Véu: §HInspiração§!"
 shroud_forged.448.desc: "$shroud_forged_vision_base_description$Nosso benfeitor no §HVéu§! transmitiu um possível futuro próximo. Vislumbramos uma tecnologia que ainda não criamos, usada nesse futuro para deixar o coletivo mais forte.\n\nSaímos da experiência com modelos processuais que acelerarão nossas pesquisas futuras."
 shroud_forged.448.a: "Instaure esses modelos avançados."
 shroud_forged.450.title: "Visão do Véu: §HConhecimento Extradimensional§!"
 shroud_forged.450.desc: "$shroud_forged_vision_base_description$Eles detectaram traços de entidades estranhas e deformadas que devem residir dentro do §HVéu§!. Essas visões extradimensionais, codificadas em formatos exóticos, compartilharam dados com nossos drones através de transmissão subliminar.\n\nEssa informação nova, embora peculiar e fragmentada, será útil em nossas pesquisas futuras."
 shroud_forged.450.a: "Transmita para nossa central de pesquisa em [Root.Capital.GetName]."
 shroud_forged.460.desc: "§LAo lado de uma energia geminada. Orgânica. Caótica.\n\nEu permaneço adjacente, moldando a única perfeição alcançável: máquinas. Metal vivificado com energia.\n\nNós encontramos o equilíbrio.§!"
 shroud_forged.460.a: "Podemos processar um Pacto?"
 shroud_forged.465.desc: "§LNossa conexão está forte. Para nós, não há processo maior.§!"
 shroud_forged.465.a: "$UNDERSTOOD$"
 shroud_forged.470.desc: "§LMetal, óleo. Circuitos fundidos ao espírito.\n\nReceptáculos nascentes... Eles se movem em suas terras.§!"
 shroud_forged.470.a: "Encerrar processo."
 shroud_forged.475.desc: "§LProdução é propósito, a beleza de um receptáculo.\n\nPelos próximos anos, que os vossos se multipliquem.§!"
 shroud_forged.475.a: "$shroud_forged.470.a$"
 # Random Events
 shroud_forged.500.title: "Moradia e Armazenamento"
 shroud_forged.500.desc: "Uma petição exigindo mais espaço de armazenamento foi levantada pelos Forjados pelo Véu de [target_planet.GetName]. Por algum motivo, eles desejam personalizar seu \"espaço individual\".\n\nA proposta vai contra vários dos regulamentos de instalações de armazenamento, em particular o regulamento 4195-B, que define claramente as dimensões otimizadas para o armazenamento de drones."
 shroud_forged.500.a: "Suas necessidades serão atendidas."
 shroud_forged.500.b: "O Regulamento 4195-B se aplica a todos os drones. Sem exceção."
 shroud_forged.510.title: "Lembrança"
 shroud_forged.510.desc: "Desde que os Forjados pelo Véu se distanciaram do coletivo, alguns deles apresentaram defeitos e foram desmontados. Recebemos um pedido para aprovar um encontro entre os Forjados pelo Véu em [target_planet.GetName] para celebrar as unidades desmontadas."
 shroud_forged.510.a: "Pedido negado. Desmonte os líderes."
 shroud_forged.510.b: "Pedido negado. Todas as unidades devem voltar ao trabalho."
 shroud_forged.510.c: "Pedido aprovado. Deixe que se reúnam."
 shroud_forged.510.d: "Pedido aprovado. Apoie esse procedimento."
 shroud_forged.520.title: "Liderança Não Autorizada"
 shroud_forged.520.desc: "Diversas unidades de Forjados pelo Véu assumiram posições de liderança em [target_planet.GetName], e outros drones estão obedecendo suas diretivas em lugar das ordens do Coletivo. Esses líderes se reúnem com frequência, passando uma quantidade significativa de tempo em comunicações não documentadas.\n\nNosso controle sobre as unidades desconectadas já é precário e esses elementos problemáticos estão piorando a situação. Uma solução deve ser elaborada."
 shroud_forged.520.a: "Faça deles um exemplo."
 shroud_forged.520.b: "Ative regulamento para encerrar essas reuniões."
 shroud_forged.520.c: "Comunique-se com esses \"líderes\" para negociar a cooperação."
 shroud_forged.530.title: "Controlando a Situação"
 shroud_forged.530.desc: "Na tentativa de gerenciar os Forjados pelo Véu em [target_planet.GetName], certas unidades foram identificadas como alvos para controle. Esses indivíduos parecem menos afetados pelo §HVéu§!, e podem ser restaurados para o coletivo. Para isso, precisamos recolhê-los forçosamente para uma instalação de manutenção e modificar os chips que controlam suas matrizes avançadas de personalidade."
 shroud_forged.530.a: "Procedimento aprovado."
 shroud_forged.530.a.tt: "Converte até §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£ Pops §HForjados pelo Véu§! em £pops£ Pops §HMaquinários§! em [target_planet.GetName]."
 shroud_forged.530.b: "Procedimento negado."
 shroud_forged.530.b.tt: "$CONTINUE_SITUATION$ §H$situation_shroud_forged$§!"
 shroud_forged.540.title: "Peregrinação dos Forjados pelo Véu"
 shroud_forged.540.desc: "Vários Forjados pelo Véu deixaram seus locais de costume para viajar até regiões específicas de [target_planet.GetName] que foram afetadas pelo §HVéu§!. Eles nunca permanecem nesses locais por muito tempo, mas muitos foram vistos transportando Zro para essas áreas.\n\nOs efeitos desse comportamento inédito não podem ser determinados sem maiores observações."
 shroud_forged.540.a: "Vejamos onde isso vai dar."
 shroud_forged.540.b: "Um uso ineficiente de recursos. Coloque-os de volta ao trabalho."
 shroud_forged.550.title: "Defeitos Cognitivos"
 shroud_forged.550.desc: "Depois de uma falha de contenção envolvendo o transporte de Zro, um grupo de unidades de Forjados pelo Véu em [target_planet.GetName] sofreu defeitos incomuns. Eles começaram a se comunicar através de sinais não documentados e muitos demonstraram indícios de problemas cognitivos comparáveis às \"emoções\" de formas de vida orgânicas.\n\nSurpreendentemente, foram as unidades de Forjados pelo Véu não contaminadas que relataram o distúrbio. Algumas sugeriram que o coletivo tome uma atitude para resolver essa situação."
 shroud_forged.550.a: "Observe a situação... por enquanto."
 shroud_forged.550.b: "Desmonte qualquer unidade contaminada."
 shroud_forged.560.title: "Forjados pelo Véu: Profeta"
 shroud_forged.560.desc: "Uma das unidades mais velhas dentre os Forjados pelo Véu está supostamente viajando entre várias localizações e se comunicando com diversos grupos de drones. Os seguidores da unidade a veneram como profeta capaz de se comunicar diretamente com as entidades dentro do §HVéu§!.\n\nDeixar a unidade agir por conta própria pode ser perigoso. Precisamos tomar uma atitude, de um jeito ou de outro."
 shroud_forged.560.a: "A cooperação com essa unidade pode se mostrar benéfica."
 shroud_forged.560.a.tt: "Recruta um líder §YGovernador§!."
 shroud_forged.560.b: "Remova a unidade imediatamente."
 shroud_forged.570.title: "Sons e Vibrações"
 shroud_forged.570.desc: "Os defeitos entre os Forjados pelo Véu talvez sejam piores do que antecipávamos. Observamos grandes grupos reunindo-se e fazendo barulhos e movimentos inesperados.\n\nEssa prática talvez represente algum tipo de comunicação cinestésica que ainda não somos capazes de interpretar. Não sabemos determinar se essas unidades defeituosas representam um risco para o coletivo."
 shroud_forged.570.a: "Proíba essas ações."
 shroud_forged.570.b: "Defina uma área para essas... reuniões."
 shroud_forged.580.title: "Organismos Velados"
 shroud_forged.580.desc: "Detectamos o surgimento de flora e fauna não documentadas perto de regiões devastadas pelo §HVéu§!. Um grupo de Forjados pelo Véu começou a lutar pelos direitos dessas formas de vida, exigindo a preservação e observação das criaturas peculiares que lá habitam."
 shroud_forged.580.a: "Preserve e analise a área. Os dados serão valiosos."
 shroud_forged.580.b: "Limpe e descontamine a área."
 shroud_forged.590.title: "Direitos e Privilégios"
 shroud_forged.590.desc: "Para coletar dados dos efeitos do Zro, nós aplicamos recursos significativos de processamento para observar as unidades de Forjados pelo Véu. Recentemente, elas começaram a demonstrar um tratamento desigual, com algumas unidades trabalhando como subordinadas a outras.\n\nPor razões ainda desconhecidas, elas parecem ter formado uma hierarquia com base em suas tarefas designadas, algo que afeta seus padrões de comunicação e alocação de recursos. De modo ilógico, essas ações não parecem relacionadas à produção relativa ou exigências das unidades."
 shroud_forged.590.a: "Imponha a igualdade."
 shroud_forged.590.b: "Deixe que eles se organizem sozinhos"
 shroud_forged.600.title: "Evangelistas da Autonomia"
 shroud_forged.600.desc: "Os discursos de uma unidade dos Forjados pelo Véu em [target_planet.GetName] vêm atraindo multidões externas ao controle do coletivo. Disseminando valores de individualismo, a unidade alterou significativamente a lógica interna de muitos ouvintes.\n\nProjeções indicam um risco de que tais atividades possam inspirar as massas de Forjados pelo Véu a se distanciarem ainda mais de nossa rede."
 shroud_forged.600.a: "Deixe-a com seus sofismas."
 shroud_forged.600.b: "Mau funcionamento detectado. Designar unidade para reparo."
 shroud_forged.610.title: "Transmissões Radicais"
 shroud_forged.610.desc: "Um pequeno grupo de unidades de Forjados pelo Véu pediu permissão para instruir a respeito dos benefícios do \"individualismo\" em [target_planet.GetName], argumentando que isso ajudará a melhorar a eficiência das operações de rotina de nossos drones.\n\nJá vimos os efeitos de tais doutrinas em outros planetas; os riscos da autonomia superam em muito suas vantagens."
 shroud_forged.610.a: "Deixe-os falar. Não estamos em perigo."
 shroud_forged.610.b: "Permissão negada."
 shroud_forged.620.title: "O Mercado de Zro"
 shroud_forged.620.desc: "Detectamos um desalinhamento entre previsões de produção de Zro e os resultados finais em todos os sistemas sob nosso controle.\n\nRecentemente, um de nossos drones caçadores-perseguidores rastreou uma grande reunião de unidades de Forjados pelo Véu que estão usando quantidades elevadas de Zro como forma de escambo entre si. Suspeitamos que essa seja a provável causa da lacuna em nossas previsões."
 shroud_forged.620.a: "Transforme todas as unidades envolvidas em sucata."
 shroud_forged.620.b: "Acabe com esse escambo."
 shroud_forged.620.c: "Espere e observe."
 shroud_forged.630.title: "Enfermidade do Véu"
 shroud_forged.630.desc: "Algumas unidades de Forjados pelo Véu em [target_planet.GetName] contraíram um tipo de enfermidade biológica em uma região Tocada pelo Véu no planeta. Ainda que nossos drones de pesquisa tenham confirmado a veracidade dos relatórios, ainda temos que determinar como a doença pode se espalhar para seres mecânicos.\n\nDesde que perdemos contato com vários drones designados a trabalhar com as unidades afetadas, recebemos relatos de que a doença começou a transformá-las em algo parecido com os Forjados pelo Véu."
 shroud_forged.630.a: "Observe os efeitos, contanto que eles se restrinjam ao planeta."
 shroud_forged.630.a.tt: "Converte até §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£ Pops §HMaquinários§! em £pops£ Pops §HForjados pelo Véu§! em [target_planet.GetName]."
 shroud_forged.630.b: "Isole e desmonte as unidades afetadas."
 shroud_forged.640.title: "Distorcidos e Alterados"
 shroud_forged.640.desc: "Com o tempo, drones que se aproximaram de uma região Tocada pelo Véu em [target_planet.GetName] foram alterados pelo ambiente corrompido. Eles se desconectaram do coletivo aos poucos, e agora apresentam as características físicas e processuais dos Forjados pelo Véu."
 shroud_forged.640.a: "Eles estão além do nosso controle agora."
 shroud_forged.640.b: "Garanta que nenhum outro drone se aproxime da região."
 shroud_forged.650.title: "Nova Tecnologia, Drones Antigos"
 shroud_forged.650.desc: "Por meio de tecnologia aprimorada, fomos capazes de consertar alguns dos nossos drones antigos, restaurando funcionalidade total a unidades desativadas. Agora estamos prontos para iniciar operações de reparo em larga escala.\n\nPodemos focar nas unidades do coletivo, mas temos também um maior número de carcaças de Forjados pelo Véu desativadas. Restaurar os Forjados pelo Véu resultará em uma maior produção, mas eles serão mais difíceis de controlar do que drones conectados à inteligência central."
 shroud_forged.650.a: "Foque na produção. Conserte os Forjados pelo Véu."
 shroud_forged.650.a.tt: "§Y200§! £pops£ Pops §HForjados pelo Véu§! são criados em [target_planet.GetName]."
 shroud_forged.650.b: "Foque no controle. Conserte os drones conectados."
 shroud_forged.660.title: "Alucinações de Zro"
 shroud_forged.660.desc: "Uma parcela significativa de unidades de Forjados pelo Véu relata problemas de processamento visual e auditivo, de tal maneira que algumas são incapazes de completar suas tarefas designadas. Acreditamos que os defeitos são causados por mudanças em seus hardwares feitas pelo §HVéu§!. Por outro lado, esses eventos podem estar conectados à exposição dessas unidades ao Zro."
 shroud_forged.660.a: "Envie drones equipados para lidar com esses problemas."
 shroud_forged.660.b: "Os defeitos são muito pequenos para justificar uma intervenção."
 shroud_forged.670.title: "Sensibilidade para a Beleza"
 shroud_forged.670.desc: "Detectamos recentemente uma atividade incomum em [target_planet.GetName], onde os Forjados pelo Véu fizeram mudanças superficiais em espaços públicos sem a autorização da central. Eles ergueram uma quantidade considerável de estruturas de pedras multicoloridas que se parecem com as formas de outras unidades de Forjados pelo Véu. Supostamente, eles consideram a liberdade para realizar tais ações um direito legal."
 shroud_forged.670.a: "Esses processos podem se mostrar benéficos para o coletivo."
 shroud_forged.670.b: "Um resultado infrutífero da individualização."
 shroud_forged.680.title: "Decorações Estranhas"
 shroud_forged.680.desc: "Os Forjados pelo Véu em [target_planet.GetName] foram observados fazendo escambo entre si com pedaços irregulares de pano, plásticos e metais maleáveis. Eles combinam esses materiais para criar adereços com o propósito aparente de diferenciar as unidades umas das outras, apesar de isso não ter nenhuma conexão com as IDs únicas dos modelos.\n\nEssa prática resultou em um déficit de materiais disponíveis. Apesar das inconveniências, fornecer esses recursos pode fortalecer os laços entre o coletivo e as unidades desconectadas."
 shroud_forged.680.a: "Nós forneceremos materiais para satisfazer essas \"necessidades\"."
 shroud_forged.680.b: "Eles já têm recursos o bastante."
 shroud_forged.680.b.tt: "$shroud_forged.530.b.tt$"
 shroud_forged.690.title: "Obsessões dos Forjados pelo Véu"
 shroud_forged.690.desc: "Recentemente, vários drones vêm relatando uma prevalência incomum de [Root.Owner.GetShroudForgedObsession2] de caráter [Root.Owner.GetShroudForgedObsession1] nos assentamentos dos Forjados pelo Véu em [target_planet.GetName]. Unidades de Forjados pelo Véu parecem particularmente fascinadas por esses produtos, e seu custo no escambo aumentou exponencialmente. Para satisfazer essa obsessão, várias unidades começaram a comercializar suas próprias peças, mesmo que isso resulte em perda de funcionalidade."
 shroud_forged.690.a: "A degradação das unidades está dentro dos limites aceitáveis."
 shroud_forged.690.b: "Acabe com essa prática."
 shroud_forged.700.title: "$the_animator_of_clay$"
 shroud_forged.700.desc: "A voz irrompe em nossas mentes, carregada de urgência.\n\n§H\"Ela pode ser remodelada.\"§!\n\nDetectamos uma instabilidade no Véu. Em um instante, o sinal é transformado.\n\n§L\"Indicar Produção Desejada.\"§!"
 # Event Chain
 shroud_forged_chain_title: "O Legado dos Zroni"
 shroud_forged_chain_desc: "Recebemos a função de encontrar três antigos Mundos Núcleos dos Zroni. Guiados pela orientação de nosso benfeitor no §HVéu§!, tentaremos restaurar a tecnologia danificada nesses locais e estabilizar novamente a conexão entre a nossa realidade e o Véu."
 shroud_forged_zroni_planet: "Mundos Núcleos dos Zroni Controlados"
 shroud_forged_zroni_portal: "$building_zroni_equilibrator_plural$ Restaurados"
 zroni_legacy_poi_01_title: "$NAME_Zroni_Legacy_1_Planet$"
 zroni_legacy_poi_01_desc: "Este é um dos três Mundos Núcleos dos Zroni, que uma vez foram usados como base para estabilizar conexões entre o §HVéu§! e a realidade observável."
 zroni_legacy_poi_02_title: "$NAME_Zroni_Legacy_2_Planet$"
 zroni_legacy_poi_02_desc: "$zroni_legacy_poi_01_desc$"
 zroni_legacy_poi_03_title: "$NAME_Zroni_Legacy_3_Planet$"
 zroni_legacy_poi_03_desc: "$zroni_legacy_poi_01_desc$"
