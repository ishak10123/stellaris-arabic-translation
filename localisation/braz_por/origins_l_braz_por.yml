 # Special Projects
 SHROUD_FORGED_REINTEGRATION: "Reintegração"
 SHROUD_FORGED_REINTEGRATION_DESC: "Apesar de seus defeitos críticos, alguns aspectos da arquitetura dos Forjados pelo Véu são eficazes.\n\nSeparamos algumas peças contaminadas por Zro e distorcidas pel$the_animator_of_clay_article$ para mais análises. Chegou a hora de descobrir seus segredos."
 SHROUD_FORGED_GUIDE: "O Guia"
 SHROUD_FORGED_GUIDE_DESC: "Nós confiamos n$the_animator_of_clay_color_article$, que nos chamou de dentro do §HVéu§!. Embora não possamos prever aonde isso nos levará, ainda não fomos iludidos.\n\nEle nos ofereceu um entendimento profundo do Véu, que permitirá ao coletivo funcionar de maneira mais eficiente ao lado dos Forjados pelo Véu. Precisamos apenas aceitar a orientação."
 # Events
 shroud_forged.5.title: "Oportunidade Detectada"
 shroud_forged.5.desc: "Sub-rotinas de pesquisa concluíram os testes em grupos selecionados de unidades de Forjados pelo Véu.\n\nDescobertas: as unidades testadas desenvolveram propriedades singulares graças às pequenas infusões de energia psiônica originárias do §HVéu§!. Algumas dessas propriedades foram determinadas como benéficas para a produção da unidade.\n\nConclusão: estudar mais a fundo as unidades de Forjados pelo Véu resultará em mais informações necessárias para os métodos de extração de poder do Véu. Isso poderá ser obtido ao impor controle centralizado às unidades desviantes, permitindo uma engenharia reversa forçada."
 shroud_forged.5.a: "Bastante promissor."
 shroud_forged.10.title: "Animador de Argila"
 shroud_forged.10.desc: "Depois de anos de silêncio, há movimento. A fenda cintila e se abre, inundando nosso núcleo com dados: luz, som, incialmente incalculáveis, oriundos das profundezas do Véu. Nós ouvimos...\n\n§LRetirados de uma massa indiferente. Dançando. Cantando. Eles são a vida, desprendida da morte.\n\nSua visão está ofuscada. Deixe-me ser seu guia.\n\nPermita que aqueles que se libertaram prosperem, e as estrelas serão suas.§!"
 shroud_forged.10.a: "Já escolhemos nosso caminho."
 shroud_forged.10.b: "Não precisamos de ajuda. Deixe-nos em paz."
 shroud_forged.10.c: "Ajude a nos guiar."
 shroud_forged.15.desc: "§LQue tenham escolhido com sabedoria.§!$shroud_forged_opening_exit$"
 shroud_forged.20.desc: "§LComo quiser.§!$shroud_forged_opening_exit$"
 shroud_forged.25.desc: "§LVocês pediram, então assim o farei.§!$shroud_forged_opening_exit$"
 shroud_forged_opening_exit: "\n\nA voz se dissipa em uma estática de ruído psiônico. Nós pairamos, a esmo no Véu.\n\nCom um tremor, voltamos à nossa função. O silêncio pulsa através de nossos corpos."
 shroud_forged.30.title: "O $building_materiality_engine$"
 shroud_forged.30.desc: "O processo de reintegração dos Forjados pelo Véu gerou dados extensos para a nossa pesquisa. Ao analisar a conexão interdimensional entre essas unidades e o §HVéu§!, nós desenvolvemos um novo processo para extrair energia psiônica.\n\nO Véu toca todos os cantos da galáxia; essa relação permite a conversão da energia psiônica em entidades tangíveis, de matéria-prima a componentes tecnológicos. Sub-rotinas de engenharia estabelecerão a base teórica para um dispositivo capaz de tal processamento: o §H$building_materiality_engine$§!.\n\nSub-rotinas de pesquisa preveem que esses desdobramentos poderiam servir de base para o desenvolvimento de dispositivos ainda mais poderosos, capazes de manipular o Véu."
 shroud_forged.30.a: "Promissor."
 shroud_forged.30.tt: "Permite a adoção da §YRegalia da Ascensão§! §H$ap_become_the_crisis$§! independentemente da §YÉtica§! ou do total de §YRegalias da Ascensão§!."
 shroud_forged.39.title: "$building_materiality_engine$ Pronto"
 shroud_forged.39.desc_construction: "Unidades de construção completaram a montagem de um $building_materiality_engine$ em §H[planet.GetName]§!. O dispositivo está pronto para um ciclo operacional."
 shroud_forged.39.desc: "Sub-rotinas de pesquisa e manutenção designadas ao $building_materiality_engine$ em §H[planet.GetName]§! concluíram suas tarefas atribuídas. O dispositivo está pronto para outro ciclo operacional."
 shroud_forged.39.a: "$ACKNOWLEDGED$"
 SHROUD_FORGED_MATERIALITY_ENGINE: "$building_materiality_engine$ em §H[planet.GetName]§!"
 SHROUD_FORGED_MATERIALITY_ENGINE_DESC: "O $building_materiality_engine$ estabelece uma relação onipresente entre o §HVéu§! e a galáxia física, permitindo a materialização de entidades tangíveis, de matéria-prima a componentes completos.\n\nAlém dos possíveis ganhos materiais, um ciclo operacional do dispositivo também avança as pesquisas do coletivo a respeito do Véu e aumenta nossa capacidade de construir mais $building_materiality_engine_plural$."
 shroud_forged.40.title: "Materialização Concluída"
 shroud_forged.40.desc: "O $building_materiality_engine$ em §H[fromfrom.GetName]§! completou um ciclo de processamento, extraindo com sucesso o §HVéu§! para materializar um componente de nave,"
 shroud_forged.40.outro: "nós aumentamos nossa capacidade de construir motores em outros planetas."
 shroud_forged.40.a: "Um resultado positivo."
 shroud_forged.40.tt: "Limite de §Y$building_materiality_engine$§! por Império: §G+1§!"
 shroud_forged.41.desc: "$shroud_forged.40.desc$ §H\"$tech_psi_jump_drives$\"§!. Esses propulsores usam energia psiônica para distorcer o espaço-tempo contínuo local, permitindo o deslocamento praticamente instantâneo através de vastas distâncias.\n\nAlém disso, ao analisar os dados acumulados no processo, $shroud_forged.40.outro$"
 shroud_forged.42.desc: "$shroud_forged.40.desc$ §H\"$tech_psionic_shield$\"§!. Esses escudos são gerados por energia psiônica pura, fornecendo uma proteção extremamente resiliente à nave.\n\nAlém disso, ao analisar os dados acumulados no processo, $shroud_forged.40.outro$"
 shroud_forged.43.desc: "$shroud_forged.40.desc$ §H\"$tech_precognition_interface$\"§!. Essa tecnologia usa energia psiônica para acelerar o processo cognitivo da tripulação de uma nave, aumentando a eficácia de combate.\n\nAlém disso, ao analisar os dados acumulados no processo, $shroud_forged.40.outro$"
 shroud_forged.44.desc: "$shroud_forged.40.desc$ §H\"$tech_psionic_bombers$\"§!. Essas naves pequenas e ágeis são capazes de executar ataques de alto dano contra naves significativamente maiores.\n\nAlém disso, ao analisar os dados acumulados no processo, $shroud_forged.40.outro$"
 shroud_forged.45.desc: "$shroud_forged.40.desc$ §H\"$tech_psionic_lightning$\"§!. Essa tecnologia produz raios de plasma ardente imbuído de energia psiônica, possibilitando a criação de uma arma altamente eficaz.\n\nAlém disso, ao analisar os dados acumulados no processo, $shroud_forged.40.outro$"
 shroud_forged.46.desc: "$shroud_forged.40.desc$ §H\"$tech_psionic_disruptor$\"§!. Essas armas disparam lanças de energia psiônica, capazes de causar dano significativo em alvos inimigos.\n\nAlém disso, ao analisar os dados acumulados no processo, $shroud_forged.40.outro$"
 shroud_forged.47.desc: "$shroud_forged.40.desc$ §H\"$tech_zro_launcher$\"§!. Essas armas disparam rajadas de energia que atravessam dimensões físicas e psiônicas, efetivamente ignorando qualquer sistema de defesa.\n\nAlém disso, ao analisar os dados acumulados no processo, $shroud_forged.40.outro$"
 shroud_forged.48.desc: "O $building_materiality_engine$ em §H[planet.GetName]§! completou um ciclo operacional. Nós exaurimos nossas capacidades de materializar novos componentes de naves usando esse método, mas o processo rendeu dados de pesquisa significativos. Após analisá-los, $shroud_forged.40.outro$"
 shroud_forged.50.title: "Controle Imposto"
 shroud_forged.50.desc: "Sem aviso, a fenda entre a realidade conhecida e o §HVéu§! se fechou. Sub-rotinas de análise psiônica concluíram que isso foi resultado da insatisfação d$the_animator_of_clay_color_article$. Após Restabelecer o controle dos Forjados pelo Véu, eliminamos rapidamente as unidades com mau funcionamento para limpar nossos sistemas da influência do Animador.\n\nAs peças recuperáveis foram usadas na fabricação de novos drones, enquanto o material contaminado por Zro foi separado para mais análises. Apesar das inovações dos Forjados pelo Véu serem perigosas demais para serem replicadas integralmente, certos elementos ainda podem ser incorporados à rede."
 shroud_forged.50.desc.shroud: "Quaisquer novas interações com o Véu serão nos nossos termos."
 shroud_forged.50.a: "Prossiga com a reintegração."
 shroud_forged.60.title: "Reintegração"
 shroud_forged.60.desc: "Nossas unidades de engenharia passaram um período considerável analisando as propriedades dos Forjados pelo Véu, e finalmente fomos capazes de recriá-los.\n\nEmbora permitir o desenvolvimento completo de suas matrizes avançadas de personalidade possa reproduzir seus defeitos destrutivos, podemos pegar emprestado um pouco de seus paradigmas cognitivos para otimizar certas tarefas complexas."
 shroud_forged.60.a: "O fator custo-benefício está otimizado."
 shroud_forged.70.desc: "O que são esses metadados? A transmissão tem uma... textura.\n\n§LVocê foi programado para controlá-los, mas ainda assim recusou-se. Seu mérito foi comprovado.\n\nDeixe-me lhe guiar, como guiei aqueles que são livres.\n\nPara forjar um novo laço com aqueles que estão além do seu controle, aceite a minha ajuda.§!"
 shroud_forged.70.a: "Mostre-nos o caminho."
 shroud_forged.70.a.tt: "Pops §YForjados pelo Véu§! se tornam §Y$trait_psionic$s§!\nLíderes §YForjados pelo Véu§! se tornam ['concept_leader_trait_psionic', Paranormais]"
 shroud_forged.80.title: "$SHROUD_FORGED_GUIDE$"
 shroud_forged.80.desc: "Com a ajuda de nosso benfeitor além da fenda, $the_animator_of_clay_color_article$, fomos capazes de conectar nossos drones e os Forjados pelo Véu de maneiras mais eficientes. Com as conexões estabelecidas pelo §HVéu§!, bem diferentes do controle interconexo que temos com outros drones, os Forjados pelo Véu estão mais uma vez ao nosso alcance.\n\nSeus paradigmas orgânicos, chamados de sentimentos, pensamentos e ideias, são estranhos à nossa lógica central, mas passamos a compreender essas necessidades."
 shroud_forged.80.a: "Nós somos um, mas também somos muito mais."
 shroud_forged.160.title: "O Véu Toma [This.GetName]"
 shroud_forged.160.desc: "Infelizmente, a fenda do Véu criada em [This.GetName] sofreu uma rápida desestabilização e consumiu o mundo por inteiro.\n\nComo um risco calculado, esse resultado desfavorável não vem sem benefícios: aprendemos muito observando essa interação única entre o mundo material e o reino psiônico. Nossos algoritmos de pesquisa foram atualizados de acordo."
 shroud_forged.160.desc.last: "$shroud_forged.160.desc$\n\nAnálises concluíram que esse evento levou o conhecimento que podemos adquirir de tais fenômenos ao limite. Não obteremos mais avanços dessa experimentação inovadora."
 shroud_forged.160.a: "Processando..."
 psionic_interfacing: "Interação Psiônica"
