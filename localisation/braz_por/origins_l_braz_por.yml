 # Shroud-Forged #
 ##################
 origin_shroud_forged: "Forjados pelo Véu"
 origin_shroud_forged_desc: "A orientação de uma entidade do Véu tem seu preço. Autômatos independentes começaram a operar livremente nesta sociedade interconectada. Desconectados da $auth_machine_intelligence$, as demandas dessas unidades são cada vez maiores."
 origin_tooltip_shroud_forged_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_shroud_rift_deposit']: +4$TABBED_NEW_LINE$- Começa com 1.000 £pops£ ['concept_shroud_forged_pops']\n- Começa com a Situação: §HForjados pelo Véu§!\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_mine_zro']\n- £building£ Construção Única: ['building:building_shroud_observatory_1']\n- £decision£ Decisão Planetária disponível: ['concept_pierce_the_shroud']"
 concept_shroud_forged_pops: "Pops Forjados pelo Véu"
 concept_shroud_forged_pops_desc: "- Não pode executar Empregos de £pop_cat_simple_drone£ §HDrone Subalterno§!\n- Aumento de produção de £pop_cat_complex_drone£ §HDrone Complexo§!\n- £crime£ §HDesvio§! Aumentado\n- §HDireitos de Espécie§! Únicos\n\n§L$trait_shroud_forged_desc$§!"
 concept_pierce_the_shroud: "$decision_open_shroud_rift$"
 concept_pierce_the_shroud_desc: "$decision_open_shroud_rift_desc$"
 START_SCREEN_SHROUD_FORGED: "Não restou nada de nossos criadores.\n\nOs registros mais antigos do povo [Owner.GetAdjective] fazem menção a uma fenda dimensional perto de [GetHomeWorldName]; um caminho para o §HVéu§!, um plano de pura energia psiônica.\n\nAlgo nessa outra dimensão se comunicou conosco. Por séculos, essa entidade nos guiou com instruções codificadas, influenciando sutilmente nossa realidade detectável e nos proporcionando muitas vantagens, incluindo o material raro $zro_lower$. Ainda assim, essa influência começou a fragmentar nosso coletivo antes unido; algumas de nossas unidades foram reprogramadas, tornando-se autômatos desconectados da inteligência central. Remodelados pelo $the_animator_of_clay_color_article$.\n\nO modo como trataremos esses [GetSpeciesNamePlural] independentes, e sua afinidade com o Véu, decidirá nosso futuro."
 # Jobs
 job_observator_drone: "Drone Observador"
 job_observator_drone_plural: "Drones Observadores"
 job_observator_drone_plural_with_icon: "£job_observator_drone£ $job_observator_drone_plural$"
 job_observator_drone_desc: "Um drone designado à observação do Véu, do Zro e do efeito que ambos têm na realidade perceptível."
 job_observator_drone_effect_desc: "£job_observator_drone£ $job_observator_drone_plural$ transformam $r_energy$ e $r_zro$ em §YPontos de Pesquisa§! de £physics£ £society£ para novas tecnologias."
 mod_planet_observators_produces_mult: "Recursos Produzidos de $job_observator_drone_plural_with_icon$"
 job_physician_drone: "Drone Médico"
 job_physician_drone_plural: "Drones Médicos"
 mod_job_physician_drone_add: "Empregos de $job_physician_drone$"
 job_physician_drone_desc: "Um drone especializado, capaz de diagnosticar e reparar tanto entidades artificiais quanto orgânicas. Ele cataloga meticulosamente tudo que encontra, armazenando dados para o uso do coletivo."
 job_physican_drone_effect_desc: "£job_physician_drone£ $job_physician_drone_plural$ transformam $r_energy$ em §YPontos de Pesquisa§!de £society£ e $r_unity$."
 # Buildings
 building_shroud_observatory_1: "Torre de Observação do Véu"
 building_shroud_observatory_1_desc: "Uma torre de observação construída para pesquisar e analisar o Véu e seus efeitos em seres vivos e mecânicos."
 building_shroud_observatory_2: "Observatório do Véu"
 building_shroud_observatory_2_desc: "Um observatório dedicado à pesquisa e à análise do Véu."
 building_shroud_observatory_3: "Complexo de Observação do Véu"
 building_shroud_observatory_3_desc: "Um grande complexo de observação construído para pesquisar o Véu, e Zro e seus efeitos em nosso mundo."
 SHROUD_RIFT_MISSING_TT: "§R§Y[Root.GetName]§! precisa ter uma §Y$d_shroud_rift_deposit$§! para que possamos construir uma §Y$building_shroud_observatory_1$§!.§!"
 building_zroni_equilibrator: "Equilibrador Zroni"
 building_zroni_equilibrator_plural: "Equilibradores Zroni"
 building_zroni_equilibrator_desc: "Uma estrutura antiga reconstruída, estabilizando a conexão entre a realidade e o Véu. Ela utiliza tecnologia Zroni complexa e além do conhecimento moderno."
 # Decisions
 decision_open_shroud_rift: "Perfurar o Véu"
 decision_open_shroud_rift_desc: "Ao interagir com a fenda perto de nosso mundo natal, este algoritmo estende a influência do Véu por um femtossegundo, permitindo que altere fisicamente o terreno do planeta. O resultado é imprevisível."
 decision_open_shroud_rift_condition_tt: "$TRIGGER_FAIL$É necessário um Recurso Planetário que não é uma §Y$d_shroud_rift_deposit$§!, nem um £blocker£ §HBloqueador§!."
 decision_open_shroud_rift_effect_tt: "Remove um Recurso Planetário aleatório."
 decision_open_shroud_rift_max_uses_common: "É necessário ter menos que $@max_open_shroud_rift_uses|0$ §YRegiões Tocadas pelo Véu§! neste planeta"
 decision_open_shroud_rift_max_uses_fail: "$TRIGGER_FAIL$$decision_open_shroud_rift_max_uses_common$"
