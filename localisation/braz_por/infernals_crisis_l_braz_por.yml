 EXIT_BYPASS_ENTROPY_WORMHOLE: "Sair de $BYPASS_TYPE$"
 personality_hyperthermia_empire: "Termarquia"
 personality_hyperthermia_empire_desc: "Um império termárquico é regido por uma ideologia que exalta a energia, a entropia e o fogo estelar. Eles não conquistam, eles cauterizam, esculpindo a galáxia com calor e determinação."
 triggered_opinion_hyperthermia_empire: "Império da $personality_hyperthermia_empire$"
 mod_job_metallurgist_naval_cap_add: "£mod_country_naval_cap_add£ $MOD_COUNTRY_NAVAL_CAP_ADD$ de Empregos de £job_foundry£ [GetAlloyProducer]"
