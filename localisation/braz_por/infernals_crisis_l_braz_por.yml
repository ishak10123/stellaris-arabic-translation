 # Megastructure
 galactic_crucible_0: "Estrutura do Crisol Galáctico"
 galactic_crucible_0_DESC: "A estrutura básica de um $galactic_crucible_4$, construída para sustentar e orientar a construção do restante da estação."
 galactic_crucible_0_MEGASTRUCTURE_DETAILS: "Esta grande estação drena energia da estrela hospedeira, alimentando estaleiros automatizados que produzem §Y$entropy_conduit_plural$§!: naves capazes de remodelar o destino das estrelas."
 galactic_crucible_1: "Chassi do $galactic_crucible_4$"
 galactic_crucible_1_DESC: "Com sua infraestrutura central concluída, o $galactic_crucible_4$ agora é uma estação funcional. A construção dos sistemas de cristalização de entropia já está em andamento."
 galactic_crucible_2: "Núcleo do $galactic_crucible_4$"
 galactic_crucible_2_DESC: "O $galactic_crucible_4$ está funcionando e já pode expandir a implementação de §Y$entropy_crystals$§!. Todos os aprimoramentos futuros dependerão desta base.\n\n§HConclua o Projeto Especial para liberar o próximo estágio.§!"
 galactic_crucible_3: "Hub do $galactic_crucible_4$"
 galactic_crucible_3_DESC: "O crescente $galactic_crucible_4$ agora conta com sistemas modulares de entropia para reconfiguração e ampliação fluidas. Os técnicos podem aumentar sua capacidade enquanto minimizam ineficiências."
 galactic_crucible_4: "Crisol Galáctico"
 galactic_crucible_4_DESC: "Totalmente armado e operacional, o $galactic_crucible_4$ está pronto para desencadear sua varredura flamejante pela galáxia. Os sistemas de fluxo entrópico agora estão em sua eficiência teórica máxima."
 galactic_crucible_5: "Instituto do $galactic_crucible_4$"
 galactic_crucible_5_DESC: "O $galactic_crucible_4$ foi reprojetado permanentemente para evitar uma produção de energia alta demais. Ele continuará sendo uma fonte estável e segura de prosperidade para o império."
 galactic_crucible_ruined: "$galactic_crucible_4$ Arruinado"
 galactic_crucible_ruined_DESC: "Um estaleiro arruinado, antes forjado para servir às ambições flamejantes de um império caído."
 galactic_crucible_ruined_MEGASTRUCTURE_DETAILS: "Esta vasta ruína ainda irradia bolsões de calor que pulsam de maneira imprevisível pelos destroços despedaçados."
 SPAWN_CONDUITS: "$entropy_conduit_plural$"
 SPAWN_CONDUITS_DESC: "O $galactic_crucible_4$ constrói $entropy_conduit_plural$ automaticamente. Eles seguirão até uma estrela que possa ser transformada em uma §Y$pc_m_giant_star$§!."
 megastructure_overclocking_desc: "Por meio de uma sobrecarga estratégica, esta megaestrutura pode ultrapassar os limites de operação padrão e liberar efeitos únicos."
 overclock_mode: "Modo:"
 overclock_gc_default: "$overclock_mode$ §HPadrão§!"
 overclock_gc_default_desc: "Produz um fornecimento estável e modesto de Entropia Cristalizada.\n"
 overclock_gc_high: "$overclock_mode$ §HSobrecarga§!"
 overclock_gc_high_desc: "Usa grandes reservas de energia para acelerar a construção de Canais.\n"
 overclock_gc_eco: "$overclock_mode$ §HProdução§!"
 overclock_gc_eco_desc: "Um grande investimento de ligas metálicas permite que a Entropia Cristalizada seja produzida a uma taxa mais elevada.\n"
 overclock_gc_war: "$overclock_mode$ §HCentro de Coordenação§!"
 overclock_gc_war_desc: "O $galactic_crucible_4$ pode ser usado para abastecer naves próximas com quantidades abundantes de energia reserva, maximizando a força de combate das frotas de defesa.\n"
 # Event Chain
 galactic_hyperthermia_chain_title: "$ap_galactic_hyperthermia$"
 galactic_hyperthermia_chain_desc: "Decidimos que o futuro será envolto em chamas e estamos nos mobilizando para incendiar toda a galáxia."
 # Special Projects
 INF_CRISIS_ENTROPY: "Nova Fonte de Energia"
 INF_CRISIS_ENTROPY_DESC: "O fogo sempre desempenhou um papel importante em nossa sociedade, mas agora talvez seja possível aproveitarmos seu poder caótico de maneiras inéditas. Isso pode ser o que os cientistas tanto queriam: uma fonte de energia que vai além de simplesmente alimentar a nossa civilização atual, e que pode nos lançar entre as estrelas.\n\n§HEfeito:§! Libera o novo recurso £entropy_crystals£ §Y$entropy_crystals$§!."
 INF_CRISIS_ENTROPY_EVIL: "Tempestade de Fogo Projetada"
 INF_CRISIS_ENTROPY_EVIL_DESC: "O Crisol nos mostrou um novo caminho para a nossa espécie. Seria tolice ignorá-lo, e não devemos tolerar tolices. É hora de refazer a galáxia em uma nova imagem flamejante e incinerar qualquer um que rejeite a nossa visão.\n\n§HEfeitos:§!\n- Libera o próximo aprimoramento do §Y$galactic_crucible_4$§!.\n- §Y$entropy_conduit_plural$§! agora podem converter estrelas em território inimigo.\n\n" # Crystallized Entropy is used to its full potential
 INF_CRISIS_ENTROPY_GOOD: "Correlação Imprevista"
 INF_CRISIS_ENTROPY_GOOD_DESC: "Embora o poder do Crisol seja imenso, ele também é volátil. Se limitarmos suas capacidades permanentemente, garantiremos para nós uma fonte modesta de prosperidade sem colocar a galáxia em risco, nem prejudicar a boa vontade de nossos vizinhos." # Crystallized Entropy can be used for the economy
 # Countdown Situation
 situation_galactic_hyperthermia_timer: "Mobilização"
 situation_galactic_hyperthermia_timer_type: "$situation_galactic_hyperthermia_timer$"
 situation_galactic_hyperthermia_timer_desc: "Nosso domínio sobre os §Y$entropy_crystals$§! logo nos permitirá iniciar uma transformação radical da galáxia. Abrimos buracos de minhoca para seis sistemas ao redor do núcleo galáctico.\nSe estabelecermos §Y$entropy_conduit_plural$§! em cada um deles e os defendermos contra qualquer um que tente atrapalhar os nossos planos, seremos capazes de incendiar a própria galáxia."
 situation_galactic_hyperthermia_timer_monthly_change_tooltip: "O nível atual de entropia que está irradiando para o núcleo galáctico. Quando atingir seu pico, a galáxia pegará fogo."
 situation_gh_timer_outcome: "Nossos serviços de inteligência indicam que diversas nações talvez estejam se preparando para a guerra a fim de frustrar nossos planos. Se estivermos despreparados ao enfrentá-las, nosso empreendimento fracassará antes mesmo de começar."
 situation_gh_approach_timer: "Enfrentar as Consequências"
 situation_gh_approach_timer_tt: "Chegou a hora. Um conflito inevitável está prestes a engolir a galáxia em uma guerra de proporções épicas."
 situation_gh_difficulty_progress: "Dificuldade"
 situation_gh_opponent_progress: "§G-0.1§! por império na oposição"
 # Crisis Situation
 situation_galactic_hyperthermia: "Tempestade de Fogo Galáctica"
 situation_galactic_hyperthermia_type: "$situation_galactic_hyperthermia$"
 situation_galactic_hyperthermia_monthly_change_tooltip: "A velocidade com que a galáxia se aproxima da ignição total."
 situation_hyperthermia_desc_perp: "§LImaginamos uma utopia flamejante, mas para isso precisamos incinerar tudo o que está no caminho. Já acendemos as primeiras faíscas e agora precisamos alimentar as chamas até que cada canto da galáxia tenha sido consumido.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_desc: "§LAs estrelas foram inflamadas por §Y[event_target:hyperthermia_empire.GetName]§!. Agora é a nossa vez de conter o maior incêndio que a galáxia já enfrentou. Não há segunda chance. Se fracassarmos, tudo o que conquistamos será reduzido a cinzas.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_stats: "§HSistemas do Núcleo Galáctico Capturados:§! [event_target:hyperthermia_empire.gh_crisis_core_var]"
 situation_galactic_hyperthermia_outcome: "[GetHyperthermiaOutcome]"
 situation_gh_outcome_perp: "Se tivermos êxito, uma chuva de fogo consumirá a galáxia, deixando apenas aqueles que abraçaram o calor entre as cinzas. Nem mesmo as estrelas estão imunes: após bilhões de anos, elas serão refeitas à imagem de nossa estrela natal."
 situation_gh_outcome_other: "Com o sucesso de §Y[hyperthermia_empire.GetName]§!, a galáxia inteira será reduzida a cinzas, criando um reino no qual apenas formas de vida termófilas sobreviverão."
 situation_galactic_hyperthermia_progress: "A quantidade de sistemas do núcleo galáctico ocupados por §Y$entropy_conduit_plural$§! determina o progresso mensal. \n$TABBED_NEW_LINE$- Menos de §Y3§! sistemas: §R-3§! $TABBED_NEW_LINE$- Ocupando §Y3§! sistemas: §Y0§! $TABBED_NEW_LINE$- Mais de §Y3§! sistemas: §G+3§! \n\nProgresso Atual"
 situation_galactic_hyperthermia_stage1: "Atingiu o Mínimo ($stage_1$)"
 situation_gh_approach_perp: "Colocar Lenha na Fogueira"
 situation_gh_approach_perp_tt: "É agora ou nunca. Temos que sair vitoriosos, ou corremos o risco de perder tudo o que conquistamos."
 situation_gh_approach_other: "Apagar a Chama"
 situation_gh_approach_other_tt: "Este império representa uma ameaça existencial à estabilidade galáctica. A guerra total deixou de ser uma opção; é uma necessidade."
 # Events
 # NOTE: Remove most #comments below after texts are done
 infernals.1000.name: "Uma Nova Energia"
 infernals.1000.desc: "[GetHyperthermiaIntroIfRedGiant]"
 infernals.1000.descNormal: "Nossa equipe de [GetScientistPlural] relatou um método novo de captar e armazenar entropia ligando-a a uma matriz cristalina de alta energia. Esses §Y$entropy_crystals$§! são capazes de armazenar e transportar grandes quantidades de energia térmica, que podem ser usadas em operações industriais, econômicas e interestelares.\n\nModelos sugerem que eles poderiam ser usados para terraformar planetas em climas mais quentes ou até acelerar a evolução estelar rumo a gigantes vermelhas. Em princípio, a entropia dispersa por toda a galáxia poderia ser recuperada e convertida em calor utilizável, impulsionando uma expansão térmica agravada em escala galáctica.\n\n§HEmite o Projeto Especial:§! §Y$INF_CRISIS_ENTROPY$§!"
 infernals.1000.descRedGiant: "Nossa equipe de [GetScientistPlural] analisou os §Y$entropy_crystals$§! que foram usados para inflamar uma gigante vermelha, um ato que quase acabou com a nossa civilização antes mesmo de ela começar. Agora, podemos reformular essa substância volátil para ligar e transportar vastas quantidades de energia térmica para uso industrial, econômico e em escala estelar.\n\nSimulações sugerem que eles podem permitir terraformações para climas mais quentes ou desencadear a evolução estelar rumo a gigantes vermelhas. Em teoria, a entropia ambiente da galáxia poderia ser recuperada e convertida em calor, impulsionando uma expansão térmica sistêmica.\n\n§HEmite o Projeto Especial:§! §Y$INF_CRISIS_ENTROPY$§!" # Intro if you've learned about entropy from the Red Giant Miners
 infernals.1005.name: "Cristalização Alcançada"
 infernals.1005.desc1: "Concluímos a nossa primeira infraestrutura funcional para extrair energia e convertê-la em §Y$entropy_crystals$§!. Esses cristais armazenam uma energia térmica imensa e já permitem que a nossa indústria armazene e transporte energia de maneira muito mais eficiente do que os métodos convencionais.\n\nAs gigantes vermelhas, graças às suas vastas superfícies de emissão e à sua produção térmica, são ideais para esse processo, e estamos prontos para implantar a tecnologia em qualquer sistema sob o nosso controle.\n\nNossos técnicos também começaram a adaptar o processo para uso industrial, experimentando maneiras de sintetizar $entropy_crystals$ a partir da entropia ambiente. Com essa nova economia, certamente teremos riqueza e poder. Nossa equipe de [GetScientistPlural] já está pesquisando como ampliar ainda mais a produção.\n\n§HLibera a Megaestrutura:§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.desc2: "Com as nossas amostras existentes de §Y$entropy_crystals$§!, podemos extraí-los e sintetizá-los sem colocar a nossa estrela natal em risco. Esses cristais armazenam uma energia térmica imensa, permitindo que a nossa indústria armazene e transporte energia de maneira muito mais eficiente do que os métodos convencionais.\n\nAs gigantes vermelhas, graças às suas vastas superfícies de emissão e à sua produção térmica, são ideais para esse processo, e estamos prontos para implantar a tecnologia em qualquer sistema sob o nosso controle.\n\nNossos técnicos também começaram a adaptar o processo para uso industrial, experimentando maneiras de sintetizar $entropy_crystals$ a partir da entropia ambiente. Com essa nova economia, certamente teremos riqueza e poder. Nossa equipe de [GetScientistPlural] já está pesquisando como ampliar ainda mais a produção.\n\n§HLibera a Megaestrutura:§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.a: "Precisamos iniciar a construção."
 infernals.1005.a.tt: "Use uma $constructor$ para construir a §Y$galactic_crucible_0$§! ao redor de uma estrela."
 infernals.1005.b: "Envie drones para iniciar a construção."
 infernals.1005.b.tt: "Use uma $constructor$ para construir a §Y$galactic_crucible_0$§! ao redor de uma estrela."
 infernals.1006.name: "Evolução Termofílica"
 infernals.1006.desc: "Iniciamos nossa jornada para incendiar a galáxia, mas as nossas próprias formas devem estar preparadas para enfrentar o calor. Adaptar a nossa população a temperaturas mais altas nos ajudará a prosperar no novo futuro ardente."
 infernals.1006.descRedGiant: "Enquanto trabalhamos incansavelmente para reverter as mudanças da nossa estrela, nossas próprias formas devem estar preparadas para enfrentar o calor. Adaptar a população a temperaturas mais altas nos ajudará a prosperar ao lado do novo futuro ardente de nossa estrela."
 infernals.1010.name: "Lançando $entropy_conduit_plural$"
 infernals.1010.desc: "O $galactic_crucible_1$ está pronto para implantar §Y$entropy_conduit_plural$§!: sistemas automatizados feitos para canalizar e amplificar a entropia estelar. Uma vez enviados, eles reciclam e intensificam a produção de energia de uma estrela, convertendo-a em uma gigante vermelha e aquecendo sistemas inteiros para sustentar a infraestrutura em expansão de nosso império.\n\nEsses §Y$entropy_conduit_plural$§! podem ser produzidos em intervalos regulares e operam de maneira autônoma para a nossa conveniência. Por enquanto, eles ficarão dentro do nosso território, mas com o tempo, poderemos deixá-los se espalhar pela galáxia. Afinal, nosso império nunca para de crescer.\n\n§HAprimoramento de Megaestrutura Disponível:§! §Y$galactic_crucible_2$§!" # Reaching lv2
 infernals.1010.a: "A produção de $entropy_crystals$ vai acelerar."
 infernals.1010.b: "Precisamos conquistar mais estrelas."
 infernals.1015.name: "Será Que Vai Esquentar Demais?"
 infernals.1015.desc: "Nossa pesquisa sobre §Y$entropy_crystals$§! revelou uma possibilidade assustadora: em altas concentrações, eles podem alimentar armas de escala inimaginável capazes de devastar planetas inteiros. Com tamanho poder, a galáxia poderia ficar aos nossos pés.\n\nMas explorar essas aplicações militares acabaria com o pouco de confiança que ainda existe entre nós e os nossos vizinhos. E quem pode garantir que tais armas não se voltariam contra nós mesmos um dia?\n\nPalavras vazias de paz não serão suficientes. Para provarmos nossas intenções, devemos enfraquecer publicamente o $galactic_crucible_2$, garantindo que ele nunca seja capaz de produzir esse tipo de armamento. Do contrário, é apenas uma questão de tempo até que essa tecnologia seja militarizada, por nós ou por outros impérios.\n\n§HEssa decisão libera um Projeto Especial.§!" # Reaching lv3 & decision
 infernals.1015.a: "Atice as chamas da guerra!" # evil path
 infernals.1015.a.desc: "Libera o nível de crise $crisis_hyperthermia_level_4$.\n" #\n\n§HIssues Special Project:§! §Y$INF_CRISIS_ENTROPY_EVIL$§!
 infernals.1015.b: "Vamos moderar as nossas ambições." # good path
 infernals.1015.b.desc: "Impede o acesso ao nível de crise $crisis_hyperthermia_level_4$. \n\n§HEmite o Projeto Especial:§! §Y$INF_CRISIS_ENTROPY_GOOD$§! para transformar o §Y$galactic_crucible_2$§! em um §Y$galactic_crucible_5$§!."
 infernals.1020.name: "Brincando com Fogo"
 infernals.1020.desc: "Nossa investigação sobre §Y$entropy_crystals$§! e o projeto §Y$INF_CRISIS_ENTROPY_EVIL$§! confirmaram o que suspeitávamos: o potencial para armamentos devastadores é real. Com tal poder em nossas mãos, não precisamos mais nos conter por causa de conveniências diplomáticas.\n\nVamos acelerar a expansão do $galactic_crucible_3$, com foco especial em suas aplicações mais... agressivas. Quanto antes liberarmos essas armas, menos importância terão as opiniões da galáxia.\n\n§HAprimoramento de Megaestrutura Disponível:§! §Y$galactic_crucible_4$§!" # Finishing special project for evil path
 infernals.1020.a: "Devemos nos preparar para a guerra."
 infernals.1020.a.tt: "- A expansão do §Y$galactic_crucible_4$§! deve ser uma prioridade.\n- $unlocks_conduit_damage$"
 infernals.1020.b: "Nossos rivais serão lenha para o fogo."
 infernals.1020.b.tt: "- A expansão do §Y$galactic_crucible_4$§! deve ser uma prioridade.\n- $unlocks_conduit_damage$"
 infernals.1021.name: "Um Brilho Constante"
 infernals.1021.desc: "O $galactic_crucible_3$ foi prejudicado com sucesso, garantindo que não possa mais ser expandido ou reaproveitado para fins destrutivos. Embora a perda de todo o seu potencial seja lamentável, continuar por esse caminho teria arriscado uma catástrofe e o colapso de todos os laços diplomáticos.\n\nFelizmente, até mesmo em sua forma limitada o $galactic_crucible_5$ continuará sendo uma poderosa fonte de energia e prosperidade. Recuamos antes de ir longe demais, garantindo um futuro no qual podemos colaborar com a comunidade galáctica enquanto ainda nos beneficiamos dessa ciência extraordinária.\n\n§HAprimoramento de Megaestrutura Disponível:§! §Y$galactic_crucible_5$§!" # Finishing special project for good path
 infernals.1021.a: "Todos nos beneficiamos da colaboração."
 infernals.1021.b: "Em harmonia, descobrimos a prosperidade."
 infernals.1025.name: "Cercando o Núcleo"
 infernals.1025.desc: "Nossa pesquisa sobre §Y$entropy_conduit_plural$§! e a transformação de estrelas em gigantes vermelhas sugere que talvez possamos ampliar nossas operações para superaquecer o próprio núcleo galáctico, desencadeando uma cascata térmica por toda a galáxia e, assim, transformá-la em um lugar muito mais hospitaleiro para nós.\n\nIdentificamos seis sistemas ao redor do núcleo que poderiam servir como hubs operacionais para esse empreendimento. Esses sistemas estão além da rede de hiperestradas galácticas, mas há esforços em andamento para gerar buracos de minhoca estáveis e estabelecer o acesso." # Reaching lv4
 infernals.1025.a: "Somos os únicos adequados para sobreviver às chamas."
 infernals.1025.a.tt: "Outras espécies tentarão nos enfrentar. Preparem-se para a guerra galáctica."
 infernals.1025.b: "A galáxia inteira arderá em harmonia."
 infernals.1025.b.tt: "Outras espécies tentarão nos enfrentar. Preparem-se para a guerra galáctica."
 infernals.1030.name: "Corrida para a Ignição"
 infernals.1030.desc: "O $galactic_crucible_4$ agora está totalmente armado e operacional. Com os túneis de buraco de minhoca concluídos, garantimos acesso a todos os seis sistemas ao redor do núcleo galáctico.\n\nNosso trabalho para superaquecer o núcleo está pronto para começar. Outros impérios podem detectar nossa atividade e tentar chegar a esses sistemas, mas por enquanto temos a vantagem, e o núcleo se curva à nossa vontade.\n\n§HUse o buraco de minhoca para proteger os sistemas do núcleo galáctico.§!" # Reaching lv5, lanes open in 3 years!
 infernals.1030.a: "Inicie a instalação nos sistemas do núcleo galáctico."
 infernals.1030.a.tt: "Implementar §Y$entropy_conduit_plural$§! nos sistemas do núcleo galáctico nos permitirá superaquecer a galáxia inteira de uma vez só. Devemos iniciar os preparativos."
 infernals.1030.b: "Com fogo, nosso futuro será brilhante."
 infernals.1030.b.tt: "$infernals.1030.a.tt$"
 infernals.1035.name: "Alarme de Incêndio Galáctico"
 infernals.1035.desc: "Impérios rivais forçaram a abertura de hiperestradas até as nossas bases próximas ao núcleo galáctico. Enquanto continuamos a superaquecer o núcleo, devemos nos preparar para a resistência.\n\nMas não seremos detidos. O frio e a escuridão do espaço serão varridos e substituídos pela ardência de nosso futuro ascendente."
 # core is now connected with the galaxy!
 infernals.1035.a: "Eles nunca nos apagarão."
 infernals.1035.b: "Deixe que se atirem na nossa chama incineradora."
 infernals.1040.name: "Tempestade Iminente"
 infernals.1040.desc: "O núcleo galáctico começou a se agitar. Os níveis de entropia ao redor do buraco negro supermassivo estão aumentando, lançando ondas de radiação térmica nos sistemas próximos.\n\nEnquanto o pânico aumenta, uma equipe de corajosos cientistas de muitos mundos revelou novas hiperestradas que conectam seis sistemas ao redor do núcleo. Parece que esses sistemas abrigam instalações operadas por §Y[hyperthermia_empire.GetName]§!, que estão superaquecendo ativamente o núcleo. Essa interferência irresponsável ameaça desencadear uma tempestade de fogo em cascata por toda a galáxia, incinerando todos os que não conseguirem deter as ambições piromaníacas deles.\n\nPara sobreviver, devemos invadir esses sistemas e tirá-los do comando. A crise chegou, e a temperatura continua subindo." # other empires learn about the core, forming a coalition war
 infernals.1040.a: "Precisamos acabar com isso!" # generic reply (declares war)
 infernals.1040.a.tt: "§LUma crise de proporções jamais vistas está prestes a engolir a nossa galáxia. Apenas a força combinada de uma aliança recém-formada pode nos salvar.§! \n\nFormaremos uma §Ycoalizão§! de impérios para enfrentar a crise, resultando em um conflito em toda a galáxia. Vamos §Rdeclarar guerra§! contra §Y[hyperthermia_empire.GetName]§!."
 infernals.1040.b: "Queimem, fracotes!" # Genocidals reply
 infernals.1040.b.tt: "§LEm épocas de crise, é cada espécie por si. Temos a força para resolver isso por conta própria.§!"
 infernals.1040.c: "Eles são iguais a nós." # Infernals reply
 infernals.1040.c.tt: "§LOs métodos de §Y[hyperthermia_empire.GetName]§! estão de acordo com a nossa visão de uma galáxia renovada. Devido a esse alinhamento, podemos ser poupados da força total daquilo que outros considerarão uma catástrofe.§!"
 infernals.1040.d: "Não há motivos para preocupação." # neutral reply
 infernals.1040.d.tt: "§LUm império brincando com fogo não é uma novidade. Essa agitação vai passar, assim como tudo passa. Não há motivos para nos envolvermos.§!"
 infernals.1042.name: "Agravamento: §RCrise Declarada§!"
 infernals.1042.desc: "As maiores transformações da História sempre exigiram sacrifícios. Ainda assim, a Comunidade Galáctica vê o nosso trabalho como uma ameaça, e não como uma necessidade. Em resposta, uma coalizão militar unificada se mobilizou contra nós.\n\nCom o extermínio declarado como seu objetivo, só nos resta uma alternativa: qualquer aproximação do núcleo galáctico ou do $galactic_crucible_4$ será recebida com força esmagadora.\n\nA nossa visão incendiou as próprias estrelas. Que aqueles que se opõem a ela enfrentem a tempestade que invocamos.\n\n§HDefenda os sistemas do núcleo galáctico para garantir a nossa vitória!§!"
 infernals.1042.a: "O resultado é inevitável."
 infernals.1043.name: "Chamado às Armas: §RCrise Declarada§!"
 infernals.1043.desc: "Frente às crescentes ameaças no núcleo galáctico, a Comunidade Galáctica decretou uma resposta unificada contra §Y[hyperthermia_empire.GetName]§!, cujos esforços radicais para elevar a temperatura galáctica colocam em risco todas as formas de vida conhecidas.\n\nSe essas ambições continuarem desimpedidas, inúmeras civilizações serão extintas. O povo de §Y[hyperthermia_empire.GetName]§! agora se coloca em oposição direta a uma coalizão unida pela necessidade.\n\nA batalha começou, e trilhões de vidas estão em jogo.\n\n§HCapture os sistemas do núcleo galáctico ou tudo estará perdido!§!"
 infernals.1043.a: "Mobilize as frotas!"
 infernals.1045.name: "Corrida contra o Tempo"
 infernals.1045.desc1: "Uma tempestade de fogo se aproxima. Em breve, o núcleo galáctico entrará em erupção, purificando os nossos inimigos e consolidando o nosso domínio sobre as estrelas.\n\nMas a galáxia se recusa a abraçar o nosso futuro radiante. Pelas hiperestradas estabelecidas há pouco, eles planejam invadir as nossas bases e desfazer tudo o que construímos. Para quê? Para preservar sua escuridão fria e estagnada?\n\nNão podemos permitir que interfiram. Precisamos proteger o acesso ao núcleo até que a tempestade de fogo se acenda e os reduza a cinzas." # last stage of global situation - crisis
 infernals.1045.desc2: "O núcleo galáctico está ficando cada vez mais quente, impulsionado pela obsessão fanática de §Y[hyperthermia_empire.GetName]§! em incendiar as estrelas. Nesse ritmo, a tempestade de fogo deles aniquilará toda a oposição e expurgará a galáxia de todas as formas de vida.\n\nEles não podem ser convencidos. Para sobrevivermos, devemos atacar a fonte: os sistemas do núcleo galáctico, onde seu poder arde com mais intensidade. Só então seremos capazes de deter §Y[hyperthermia_empire.GetName]§!.\n\nO destino de toda a galáxia está em jogo. É hora de mostrar para §Y[hyperthermia_empire.GetName]§! que quem brinca com fogo... acaba se queimando." # last stage of global situation - others
 infernals.1045.a: "Defenderemos a linha de frente."
 infernals.1045.a.tooltip: "Temos que manter o controle dos seis sistemas do núcleo galáctico para conquistar a vitória."
 infernals.1045.b: "Precisamos acabar com eles de vez."
 infernals.1045.b.tooltip: "Temos que atacar os seis sistemas do núcleo galáctico e destruir os canais de §Y[hyperthermia_empire.GetName]§!, senão seremos incinerados."
 infernals.1055.name: "A Galáxia é Nossa!"
 infernals.1055.desc: "Acendemos as chamas da vitória, do núcleo galáctico até as estrelas mais distantes. A tempestade de fogo reduziu os nossos inimigos a cinzas. Eles não tinham a visão e a coragem para abraçar o futuro glorioso que conquistamos. A galáxia é nossa.\n\nNesta nova ordem de fogo e fúria, os planetas fervem com magma e luz, iluminados pelo calor crescente das gigantes vermelhas. A entropia percorre cada sistema, pronta para ser explorada e adaptada à nossa vontade. A cada dia que passa, o nosso império fica mais rico, forte... e imbatível.\n\nConsumimos a galáxia e a transformamos em um farol flamejante de nosso domínio no vazio. E um dia, talvez, jogaremos outras galáxias na fogueira." # crisis won
 infernals.1055.a: "Esta nova galáxia é nossa."
 infernals.1055.b: "No final, todas as chamas se juntam e viram uma só."
 infernals.1055.c: "Não há espaço para fracotes mornos em nosso lar ardente." #Scorched world heralds (genocidal Infernal)
 infernals.1055.d: "Nossa resistência finalmente foi recompensada." #Infernal Fire Cult
 infernals.1055.e: "Finalmente banimos a escuridão fria desta galáxia." #Other Infernals
 infernals.1055.f: "Finalmente nossos rivais miseráveis foram reduzidos a cinzas." #Generic Genocidal
 infernals.1052.name: "$galactic_crucible_4$ Capturado"
 infernals.1052.desc: "Com a captura do sistema §H[crucible_system.GetName]§!, nossas forças também assumiram o controle do $galactic_crucible_4$ que estava sendo construído ao redor da estrela local.\n\nA perda dessa megaestrutura acaba com qualquer esperança que seus criadores ainda nutrissem de conquistar a galáxia à força."
 infernals.1052.a: "Destrua a estrutura!"
 infernals.1052.a.tt: "O §Y$galactic_crucible_4$§! será destruído e não poderá ser reparado."
 infernals.1052.b: "Podemos usar isso a nosso favor."
 infernals.1052.b.tt: "Transforma o §Y$galactic_crucible_4$§! em um §Y$galactic_crucible_5$§! para produzir $r_alloys$."
 infernals.1053.name: "$galactic_crucible_4$ Capturado"
 infernals.1053.desc: "A captura do sistema §H[crucible_system.GetName]§! revelou os planos sinistros do império §H[crucible_builders.GetName]§!, que incluíam a aniquilação completa de toda a vida da galáxia por meio de uma tempestade de fogo sem precedentes.\n\nPor enquanto, a máquina capaz de provocar um evento de extinção em massa encontra-se temporariamente desativada. Assim que a guerra terminar, devemos usar nossos recursos e forças restantes para neutralizar essa megaestrutura de uma vez por todas."
 infernals.1053.a: "Precisamos acabar logo com essa guerra!"
 infernals.1053.b: "Uma construção fascinante."
 infernals.1056.name: "Renascimento Galáctico"
 infernals.1056.desc: "Enquanto estávamos ocupados gerando a centelha que incendiaria a galáxia, o Império §Y[hyperthermia_empire.GetName]§! já havia transformado estrelas em armas, mudando a galáxia para sempre.\n\nPor ora, podemos desfrutar desta nova utopia que eles criaram, mas devemos observar com atenção seus próximos passos conforme eles consolidam seu domínio sobre a galáxia."
 infernals.1056.a: "Um poder imenso sempre leva a conflitos."
 infernals.1056.b: "Surge uma nova ameaça."
 infernals.1056.c: "Uma reviravolta surpreendente."
 # Relic
 r_crystallized_singularity: "Singularidade Cristalizada"
 r_crystallized_singularity_desc: "Deformada por uma galáxia em chamas, esta singularidade crepita com um calor fascinante. A menos que seja selada com cuidado, ela atrairá peregrinos de maneira inexplicável até mesmo para os mundos mais desolados. Aqueles que se colocam diante dela sentem-se obrigados a abraçar uma vida mais simples... e mais próxima das chamas."
 r_crystallized_singularity_effect_tt: "\n- §G10%§! de nossa renda de £physics_research£ §Y$physics_research$§! também gerará $r_energy$."
 r_crystallized_singularity_ls_effect_tt: "- Libera a decisão §Y$decision_gh_life_seeding$§! em mundos colonizáveis para criar uma nova civilização primitiva."
 crystallized_singularity_mod: "$r_crystallized_singularity$"
 crystallized_singularity_mod_desc: "$r_crystallized_singularity_desc$"
 decision_gh_life_seeding: "Semeando Vida"
 decision_gh_life_seeding_desc: "Nosso sucesso em remodelar a galáxia levou ao rápido desaparecimento das espécies na maioria dos planetas. Agora, é nosso privilégio recriar a vida à nossa própria imagem."
 decision_gh_life_seeding_limit: "$TRIGGER_FAIL$§REste planeta já tem uma civilização primitiva.§!"
 decision_gh_life_seeding_colony: "$TRIGGER_FAIL$§RNão é possível fazer isso em um sistema com uma colônia.§!"
 decision_gh_life_seeding_effect: "Cria uma civilização primitiva à nossa própria imagem. \n\n§HLimite de ativação:§! [from.gh_life_seeder_var] / 3"
 # Grand Archive Specimen
 infernal_burning_gem: "Joia Ardente"
 infernal_burning_gem_desc_short: "Um dos primeiros protótipos funcionais criados durante os esforços de [GetName] para dominar a entropia."
 infernal_burning_gem_desc_details: "Ilusoriamente tênue para a maioria dos sistemas visuais, o leve brilho branco deste fragmento de cristal esconde a incrível quantidade de energia que ele mal consegue conter. Embora já tenha sido superado por técnicas mais recentes, sua construção e propriedades ainda têm muito a ensinar."
 # Timeline
 TIMELINE_EVENT_GH_START: "Tempestade de Fogo\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_START_TOOLTIP: "§HTornou-se a Crise§!\n§YEvento de Crise§!\n\n[EVENT_TARGET_0.GetName] deu início ao seu domínio ardente, começando a tomar o controle do destino da galáxia. Aqueles que não compartilham dessa visão se verão em meio a uma trilha flamejante de conquista que deixará apenas cinzas para trás."
 TIMELINE_EVENT_GH_END: "Chamas Devoradoras\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_END_TOOLTIP: "§HGaláxia Derrotada§!\n§YEvento de Crise§!\n\nO que começou como uma ambição ardente tornou-se a faísca que incendiou a galáxia. Aqueles que nos enfrentaram foram reduzidos a cinzas, junto com sua história."
