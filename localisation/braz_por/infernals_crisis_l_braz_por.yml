 entropy_crystals_crisis_description: "$menace_crisis_description_intro$\n\nUma nova forma de manipular energia nos permitirá aumentar muito o nosso poder. Precisaremos dominar o fogo das próprias estrelas para incendiar esta era."
 entropy_crystals_crisis_howto_title: "Fonte de Energia"
 entropy_crystals_crisis_howto: "Concluir §HObjetivos de Crise§! gera £entropy_crystals£ §H$entropy_crystals$§! que podem ser usados para aprimorar o $galactic_crucible_4$ e liberar o próximo Nível de Crise."
