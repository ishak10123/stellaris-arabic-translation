 sm_gravitational_centrifuge: "Centrífuga Gravitacional"
 sm_gravitational_centrifuge_desc: "Esta estrutura explora fortes gradientes gravitacionais para separar resíduos até o nível molecular, criando um plasma entrópico que pode ser cristalizado para uso posterior."
 gravitational_centrifuge_tt: "Conclui o objetivo de crise §H$crisobj_entropy_starbase_name$§!"
 requires_multiple_stars_or_or_bh: "§RRequer um sistema §Ybinário§!, §Ytrinário§! ou um §Y$pc_black_hole$§!.§!"
 # Conduit Starforming
 crisis_conduit_buff: "Supervisão Estelar"
 crisis_conduit_buff_desc: "A atmosfera da estrela local está passando por mudanças rápidas, causando uma enxurrada de explosões solares em todo o sistema. Embora isso seja catastrófico para outros, é perfeito para que possamos prosperar."
 TERRAFORM_ORDER: "Transformar Estrela"
 TERRAFORM_ORDER_DESC: "Lentamente transformará a estrela selecionada em uma §Y$pc_m_giant_star$§!."
 TERRAFORM_ORDER_RESEARCH: "Usando o potencial energético acumulado da entropia cristalizada, estrelas menores podem ser expandidas para se tornarem poderosas gigantes vermelhas."
 FLEETORDER_TERRAFORM_BUTTON: "$TERRAFORM_ORDER$"
 FLEETORDER_TERRAFORM: "Forja Estelar de $PLANET|Y$ ($PROGRESS|Y%0$)"
 FLEETORDER_BOOST_STAR: "Inflamar Estrela"
 CAN_NOT_TERRAFORM_STAR: "$TRIGGER_FAIL$Deve ser uma estrela primária."
 CAN_NOT_CRISIS_TERRAFORM_STAR_CLASS: "$TRIGGER_FAIL$Classe estelar inválida para transformação."
 CAN_NOT_CRISIS_TERRAFORM_STAR_MEGASTRUCTURE: "$TRIGGER_FAIL$A megaestrutura em órbita bloqueia a transformação."
 VALID_TERRAFORM_STAR: "A estrela pode ser terraformada."
 STATION_CAN_NOT_TERRAFORM_STAR: "A Estação de Canais deve estar em órbita."
 # Objectives
 crisobj_own_volcanics_name: "Obtenha Mundos Vulcânicos"
 crisobj_own_volcanics_desc: "O aumento do calor do sistema alimenta um vulcanismo intensificado, perfeito para o avanço de nossa missão ardente. Devemos priorizar a colonização de §YMundos Vulcânicos§! para nos adiantarmos.\n\nConcede uma renda passiva de §Y$entropy_crystals$§! por ano, que aumenta com o número de colônias de §Y$pc_volcanic$§!."
 crisobj_create_volcanics_name: "Crie Mundos Vulcânicos"
 crisobj_create_volcanics_desc: "Espalhar o vulcanismo planetário pela galáxia abastecerá nossa economia de Cristais de Entropia. Com as técnicas de terraformação adequadas, poderemos desencadear atividades vulcânicas sustentadas onde quisermos.\n\nTerraforma um planeta em §Y$pc_volcanic$§!."
 crisobj_own_red_stars_name: "Obtenha Estrelas Vermelhas"
 crisobj_own_red_stars_desc: "Devemos priorizar o assentamento de sistemas em torno de estrelas vermelhas. Suas vastas superfícies de emissão são ideais para a extração de energia térmica.\n\nConcede uma renda passiva de §Y$entropy_crystals$§! por mês, que aumenta a cada §Y$pc_m_star$§! ou §Y$pc_m_giant_star$§! em nossas fronteiras."
 crisobj_create_red_stars_name: "Crie Estrelas Vermelhas"
 crisobj_create_red_stars_desc: "Se canalizarmos Cristais de Entropia, poderemos expandir e transformar estrelas em gigantes vermelhas, alimentando a ascensão de nosso novo império flamejante.\n\nEstrelas terraformadas por §Y$entropy_conduit_plural$§! se tornam §Y$pc_m_giant_star$§!."
 crisobj_planet_firestorm_name: "Incêndios Planetários"
 crisobj_planet_firestorm_desc: "É hora de ensinar aos nossos rivais o verdadeiro significado da supremacia com um bombardeio de tempestade de fogo que reduzirá o mundo deles a cinzas.\n\nBombardeie uma colônia com §Y$bombardment_firestorm$§! para causar §R100% de devastação§!."
 crisobj_lens_beam_impact_name: "Naves de Disrupção"
 crisobj_lens_beam_impact_desc: "Mundos frios e temperados não nos servem. Devemos alterá-los, derretendo suas superfícies em formas mais adequadas às nossas necessidades.\n\nUse a arma £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!, equipada em §Y$entropy_conduit_plural$§! e §Y$ember_battleship_plural$§!, para bombardear mundos inimigos."
 crisobj_entropy_starbase_name: "Obtenha Centrífugas Gravitacionais"
 crisobj_entropy_starbase_desc: "Centrífugas Gravitacionais nos ajudarão a coletar mais $entropy_crystals$. \n\nMonte a construção de base estelar §Y$sm_gravitational_centrifuge$§! em sistemas §Ybinários§!, §Ytrinários§! ou com um §Y$pc_black_hole$§!."
