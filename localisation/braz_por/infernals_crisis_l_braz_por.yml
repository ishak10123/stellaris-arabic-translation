 # MPerks Level 1
 menp_hyperthermia_crystals: "$entropy_crystals$"
 menp_hyperthermia_crystals_desc: "§Y$entropy_crystals$§! marcam um avanço na desestabilização controlada de energia. Com esse recurso volátil sob nosso comando, podemos remodelar a própria ordem galáctica."
 unlocks_entropy_objectives: "Permite o acúmulo de £entropy_crystals£ §Y$entropy_crystals$§! ao concluir §HObjetivos de Crise§!."
 menp_hyperthermia_harnessing: "Aproveitamento de Entropia"
 menp_hyperthermia_harnessing_desc: "Integrar a síntese de §Y$entropy_crystals$§! à nossa indústria permite um uso mais eficiente desse recurso volátil, alinhando nosso foco técnico aos objetivos estratégicos."
 unlocks_entropy_edict: "§HLibera o Edito:§! $edict_entropy_harnessing$"
 menp_hyperthermia_crucible: "Crisol Galáctico"
 menp_hyperthermia_crucible_desc: "Este crisol proposto serviria como um motor central para aproveitar a entropia estelar. Com a capacidade de cristalizá-la e transportá-la, o Crisol poderia virar um símbolo de nosso poder ardente, espalhando-o pelas estrelas."
 unlocks_galactic_crucible: "§HLibera a Megaestrutura:§! $galactic_crucible_0$"
 # MPerks Level 2
 menp_hyperthermia_conc_entropy: "Entropia Concentrada"
 menp_hyperthermia_conc_entropy_desc: "$entropy_conduit_plural$ são vitais para a expansão de nosso poder neste estágio. Aumentar a produção do Crisol acelerará a nossa marcha rumo a um futuro mais brilhante e ardente."
 unlocks_conduit_spawn: "§H$UNLOCKS_SHIP_TYPE$:§! $entropy_conduit$ \n- §Y$entropy_conduit_plural$§! são automaticamente criados pelo §Y$galactic_crucible_4$§! e viajarão para sistemas estelares próximos. \n- As colônias de um sistema afetado recebem bônus. \n- São equipados com a arma £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!, que incapacita inimigos atingidos por diversos dias. \n\n"
 menp_hyperthermia_radiant: "Ambições Radiantes"
 menp_hyperthermia_radiant_desc: "Ser a faísca que incendeia a galáxia não deixa margem para dúvidas ou burocracia. Não podemos nos dar ao luxo de perder tempo remodelando inúmeros sistemas. Para alcançar os nossos objetivos, devemos aumentar radicalmente a nossa capacidade de construção."
 menp_hyperthermia_ignition: "Ignição Forçada"
 menp_hyperthermia_ignition_desc: "Às vezes, forçar mais não é suficiente. Precisamos fazer a nossa tecnologia chegar ao próximo nível e explorar todo o seu potencial. É hora de minimizar as salvaguardas e maximizar a produção."
 unlocks_crucible_overclocking: "Permite a \"sobrecarga\" da §Hmegaestrutura§! §Y$galactic_crucible_1$§!."
 # MPerks Level 3
 menp_hyperthermia_cruiser: "$ember_cruiser$"
 menp_hyperthermia_cruiser_desc: "Equipadas com tecnologia de ponta, estas naves convertem o fluxo de calor volátil em aniquilação direcionada, reduzindo nossos inimigos a cinzas."
 unlocks_ember_cruiser: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_cruiser$"
 menp_hyperthermia_flames: "Chamas Envolventes"
 menp_hyperthermia_flames_desc: "A utopia que imaginamos não deixa espaço para oposição aos nossos objetivos. Qualquer um que tente nos deter aprenderá rapidamente que a resistência será recebida com uma chuva de fogo sobre seus mundos natais."
 unlocks_firestorm_stance: "§HLibera a Terraformação:§! $pc_volcanic$ \n§HLibera a Postura de Bombardeio:§! $bombardment_firestorm$\n\n"
 menp_hyperthermia_coronal: "Descarga Coronal"
 menp_hyperthermia_coronal_desc: "Nossos $entropy_conduit_plural$ atualmente dissipam enormes quantidades de calor para permanecer estáveis. Ao liberar esse calor no espaço adjacente, poderíamos transformar os $entropy_conduit_plural$ em armas devastadoras contra nossos inimigos."
 unlocks_conduit_damage: "§Y$entropy_conduit_plural$§! causam dano passivo a estações e naves hostis. \n\n"
 # MPerks Level 4
 menp_hyperthermia_reactors: "Reatores de Heliofusão"
 menp_hyperthermia_reactors_desc: "Aproveitar §Y$entropy_crystals$§! na tecnologia militar possibilita sistemas de propulsão de energia inigualáveis. Nossas naves viajarão pelas estrelas como nunca."
 menp_hyperthermia_solarflare: "Explosão Solar Artificial"
 menp_hyperthermia_solarflare_desc: "Houve um período em que partes da galáxia estavam além de nosso alcance. Essa ilusão está chegando ao fim. Em breve, enxames de nossos $entropy_conduit_plural$ cobrirão as estrelas, trazendo uma devastação calibrada a todos que se opuserem a nós."
 unlocks_conduit_borders: "§Y$entropy_conduit_plural$§! automaticamente atravessam a fronteira para o território inimigo. \n\n"
 menp_hyperthermia_armada: "Armada Flamejante"
 menp_hyperthermia_armada_desc: "À medida que a galáxia se une contra nós, a mobilização se torna imprescindível. Cada cidadão agora deve contribuir para sustentar a frente energética, alimentando as chamas de nossa ascensão."
 unlocks_blazing_navalcap: "§Y[GetAlloyProducerPlural]§! e §Y[GetResearcherPlural]§! aumentam a £navy_size£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!.\n\n"
 # MPerks Level 5
 menp_hyperthermia_battleship: "$ember_battleship$"
 menp_hyperthermia_battleship_desc: "Com canos tão quentes quanto a tempestade de fogo que está prestes a engolir a galáxia, estas naves enormes formarão a maior parte de nossas forças defensivas ao redor do Crisol."
 unlocks_ember_battleship: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_battleship$ \n- Pode equipar a arma £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!."
 menp_hyperthermia_critical_mass: "Massa Crítica"
 menp_hyperthermia_critical_mass_desc: "Aumentar a atividade entrópica na camada externa de uma estrela faz com que ela libere uma onda de radiação. Isso está fazendo sistemas inteiros aquecerem mais rapidamente."
 unlocks_conduit_boost: "§Y$entropy_conduit_plural$§! se tornam mais fortes de acordo com a quantidade de sistemas capturados.\n\n$hyperthermia_map_perc$\n\n"
 hyperthermia_map_perc: "§G20%§! da galáxia: $TABBED_NEW_LINE$- $entropy_conduit_plural$ causam devastação a colônias próximas $TABBED_NEW_LINE$- Colônias afetadas perdem £pop£ $POPS$ aos poucos $TABBED_NEW_LINE$- Só afeta impérios de espécies não §Ytermófilas§! $TABBED_NEW_LINE$- Sistemas necessários: §Y[root.hyperthermia_own_systems_var]§!/§Y[root.hyperthermia_systems_var]§!"
 menp_hyperthermia_ammunition: "Munição Enriquecida"
 menp_hyperthermia_ammunition_desc: "Um refinamento no design das munições: a artilharia padrão agora é enriquecida por núcleos de entropia em microescala que liberam picos térmicos desestabilizados no impacto. O resultado é uma destruição muito maior."
 # Misc
 entropy_crystals_deficit: "Escassez de $entropy_crystals$"
 edict_entropy_harnessing: "Aproveitamento de Entropia"
 edict_entropy_harnessing_desc: "Integrar a produção de $entropy_crystals$ à nossa infraestrutura nos permite aproveitar plenamente as nossas capacidades técnicas e explorar esse novo recurso volátil ao máximo."
