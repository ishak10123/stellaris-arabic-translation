 # Weapon
 LENS_FLARE_BEAM: "Paralisador com Lentes"
 LENS_FLARE_BEAM_DESC: "O feixe desta arma está calibrado para desestabilizar sistemas críticos de controle, abrindo oportunidades de ataque sem oposição."
 lfb_on_hit_stun_tt: "§YDesabilita§! o alvo por §G7§! dias, impossibilitando-o de se mover ou revidar."
