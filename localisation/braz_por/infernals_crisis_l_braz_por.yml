 # Ascension Perk
 ap_galactic_hyperthermia: "Hipertermia Galáctica"
 ap_galactic_hyperthermia_desc: "O universo começou em chamas, mas esfriou até virar um lugar escuro e hostil. Para prosperar, precisamos de mais calor, mesmo que outros tenham de perecer."
 must_be_infernals: "$TRIGGER_FAIL$Exige que a nossa população seja formada por termófilos."
