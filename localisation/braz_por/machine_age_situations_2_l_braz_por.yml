 #Technologies
 tech_identity_copy: "Cópias de Identidade"
 tech_identity_copy_desc: "Seremos capazes de copiar a identidade e as memórias de um Sintético em um novo corpo mecânico. As cópias têm conjuntos de habilidades previsíveis, mas são um tanto enfadonhas."
 TECH_UNLOCK_IDENTITY_COPY_TITLE: "Concede acesso à política:$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_copy_name$"
 TECH_UNLOCK_IDENTITY_COPY_DESC: "£pop£ §HPops Mecânicos§!$TABBED_NEW_LINE$Felicidade: §R-5%§!"
 tech_identity_fusion: "Fusão de Identidades"
 tech_identity_fusion_desc: "A fusão das identidades e memórias de dois ou mais Sintéticos em um mesmo corpo mecânico criará indivíduos novos e, de certa forma, únicos."
 TECH_UNLOCK_IDENTITY_FUSION_TITLE: "Concede acesso à política:$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_fusion_name$"
 TECH_UNLOCK_IDENTITY_FUSION_DESC: "£pop£ §HPops Mecânicos§!$TABBED_NEW_LINE$Custo de Montagem: §R+10%§!"
 tech_identity_initialization: "Inicialização de Identidade"
 tech_identity_initialization_desc: "Poderemos inicializar um núcleo de identidade e proporcionar a ele uma infância virtual. Embora esse seja um processo caro, podemos simular as experiências ideais para gerar personalidades produtivas."
 TECH_UNLOCK_IDENTITY_INITIALIZATION_TITLE: "Concede acesso à política:$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_initialization_name$"
 TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC: "£pop£ §HPops Mecânicos§!$TABBED_NEW_LINE$Felicidade: §G+5%§!$TABBED_NEW_LINE$Recursos de £job£ §HEmpregos§!: §G+5%§!$TABBED_NEW_LINE$Custo de Montagem: §R+20%§!"
 #DIGITIZATION STAGE 1
 synth.100.name: "Inicializando" #Stage 1 - Start event
 synth.100.desc: "Chegou a hora de nos livrarmos da nossa forma biológica e ascendermos à liga metálica e à eletricidade. Com corpos de última geração e mentes aceleradas, marcharemos rumo ao futuro. A [Owner.Species.GetFleshTypeCyberCreed] é falha, mas uma máquina pode ser aperfeiçoada.\n\nEntretanto, a transição não será fácil. A comunidade de pesquisa precisa de pelo menos um $building_identity_complex$ para atuar como um centro de desenvolvimento sintético. Nosso destino nos aguarda."
 synth.100.a: "Nós faremos o nosso próprio destino."
 synth.100.a.tt: "§RAção necessária:§!\nConstrua um $building_identity_complex$ para dar continuidade à situação §Y$situation_digitization$§!."
 synth.105.name: "Melhores Versões"
 synth.105.desc: "Com o aumento da capacidade de processamento de um cérebro sintético, podemos superar nossas restrições biológicas. No entanto, a potência adicional ainda tem suas limitações, então devemos escolher o que priorizar.$synth.105.end$"
 synth.105.end: "\n\nPoderíamos nos concentrar em ampliar o processo de tomada de decisão, aumentar o armazenamento de memória ou otimizar a coordenação entre a mente e os membros, alternativas que melhorariam nosso desempenho em tipos de trabalho específicos. Por outro lado, poderíamos melhorar a durabilidade de todos os corpos.\n\nEssas funções exigem suporte contínuo e só ficarão disponíveis em planetas com uma construção de montagem de robôs, mas o que aprendermos com o projeto trará benefícios imediatos para a produtividade."
 synth.105.a: "Otimize a tomada de decisões."
 build_better_synths: "Modificador de construções de montagem de robôs adicionado:"
 synth.105.a.tt: "$build_better_synths$\nProdução de Recursos de Pop Elite: §G+15%§!\n\n"
 synth.105.b: "Foque no armazenamento de memória."
 synth.105.b.tt: "$build_better_synths$\nProdução de Recursos de Pop Especialista: §G+5%§!\n\n"
 synth.105.c: "Aprimore as funções motoras."
 synth.105.c.tt: "$build_better_synths$\nProdução de Recursos de Pop Trabalhador: §G+10%§!\n\n"
 synth.105.d: "Melhore a durabilidade."
 synth.105.d.tt: "$build_better_synths$\n$mod_planet_jobs_upkeep_mult$: §G-5%§!\n\n"
 #Stage 1 Opportunities - Research
 synth.120.name: "Microfusão Cinestésica"
 synth.120.desc: "\"As modificações de microfusão permitem que você levante um tanque!\", declara um importante serviço de avaliação para consumidores. Isso não é um exagero: os últimos avanços na tecnologia de microfusão prometem melhorar consideravelmente nossos corpos mecânicos.\n\nEmbora seja um pouco arriscada, a instalação de minúsculos reatores pessoais permite uma intensa transferência de energia e mais velocidade. É claro que isso nos obrigaria a reavaliar os cronogramas de produção, já que os geradores representam uma grande expansão do escopo original do projeto."
 synth.120.a: "Devemos sempre buscar a excelência!"
 synth.120.a.tt: "Velocidade do progresso da situação §Y$situation_digitization$§! por §Y1§! ano: §R-50%§!"
 situation_kinesthetic_microfusion_tt: "Configuração de Microfusão Cinestésica"
 synth.120.b: "Um recurso desnecessário."
 synth.120.c: "Concentre-se em aprimorar nossas habilidades de combate."
 #Stage 1 Challenges - Research
 synth.160.name: "Publicidade Negativa"
 synth.160.desc: "Um novo filme extremamente popular encantou a imaginação do público. A história é sobre um trabalhador sintético que se dissocia de seu novo corpo.\n\nConforme aumenta o descontrole do protagonista, seus amigos e familiares só conseguem observar, apavorados. O desfecho trágico da obra está sendo considerado uma crítica pouco velada à nossa transição planejada para corpos mecânicos.\n\nA opinião pública em torno do grande sucesso do filme gerou uma resistência considerável ao processo e pode acabar atrasando o nosso progresso."
 synth.160.a: "Isso vai passar logo."
 synth.160.b: "Desvie o financiamento de pesquisa para o departamento de RP."
 synth.160.c: "Prenda o diretor."
 synth.160.d: "Proíba toda a cobertura da mídia."
 #DIGITIZATION STAGE 2
 synth.200.name: "Filosofia da Mente" #Stage 2 - Start event
 synth.200.desc: "Presumimos que os benefícios de uma mente totalmente digitalizada eram tão óbvios que seria possível evitar qualquer tipo de reação negativa, mas talvez isso tenha sido ingenuidade. A oposição à sintetização total tem sido intensa, e agora precisa ser debelada.\n\nA principal crítica é em relação à nossa incapacidade de provar que um ego contínuo pode ser completamente transferido de maneira segura. Existe o receio, não totalmente infundado, de que tudo o que conseguimos até agora foi produzir uma cópia digital do indivíduo. A grande pergunta é: essas mentes são realmente nossas?"
 synth.200.a: "Diga a verdade: não sabemos."
 synth.200.a.tt: "Realizar uma campanha de informação, buscando alcançar uma oposição §Hmínima§! à sintetização.\n\n"
 synth.200.b: "Diga o que eles querem ouvir."
 synth.200.b.tt: "Realizar uma campanha de desinformação, buscando alcançar uma oposição §Hmoderada§! à sintetização\n\n"
 synth.200.c: "Alguns poucos opositores não serão problema."
 synth.200.c.tt: "Ignorar os opositores, resultando em uma oposição §Hmáxima§! à sintetização."
 synth.200.c.material: "As questões da consciência não nos interessam."
 synth.200.c.material.tt: "Seguir uma perspectiva puramente científica, resultando em uma oposição §Hmoderada§! à sintetização.\n\n"
 synth.205.name: "Apegados ao Passado"
 synth.205.desc: "O projeto de sintetização da nossa população continua a enfrentar resistência, resultando em grandes protestos que nossas autoridades quase não conseguem conter. Os manifestantes temem perder as coisas que realmente dão sentido à vida. Qual é o propósito da sintetização se ela resulta na perda do prazer físico ou do senso de companheirismo?\n\nManifestantes mais radicais estão pedindo que certas cidades sejam designadas como locais históricos. Isso permitiria que os opositores continuassem com sua existência biológica sem serem incomodados."
 synth.205.a.regular: "Apoiamos totalmente esses locais históricos."
 synth.205.a.spiritualist: "Nosso passado deve ser preservado."
 synth.205.a.memorialist: "Respeitar o passado é um ato de reverência."
 synth.205.b: "Precisamos nos desapegar do passado."
 #Stage 2 Opportunities - Objectors
 synth.220.name: "Segunda Vida"
 synth.220.desc: "Uma celebridade com fortes opiniões antissintéticas sofreu um acidente e encontra-se atualmente em estado vegetativo. Enquanto a população lamenta a perda de uma personalidade querida, nossos conselheiros pró-sintéticos veem uma oportunidade.\n\nA digitalização da mente da celebridade, proporcionando a ela uma segunda vida em um corpo sintético, sem dúvida transformaria alguns de seus fãs em defensores fervorosos da sintetização. Embora o processo seja totalmente legal, o problema reside no consentimento: em outras circunstâncias, a celebridade em questão nunca concordaria com o procedimento. Precisamos tomar cuidado, pois esse golpe publicitário pode virar um desastre midiático."
 synth.220.a: "A sintetização não é crime."
 synth.220.a.tt.negative: "Velocidade do progresso da situação §Y$situation_digitization$§! por §Y6§! meses: §R-30%§!"
 synth.220.a.tt.positive: "Velocidade do progresso da situação §Y$situation_digitization$§! por §Y6§! meses: §G+30%§!"
 synth.220.b: "Melhor não arriscar."
 synth.220.c: "Engane o público com uma IA substituta."
 synth.220.c.tt: "A imagem da celebridade será a estrela da nossa narrativa."
 #Stage 2 Challenges - Objectors
 synth.260.name: "Mentes Perdidas"
 synth.260.desc: "Os experimentos para testar o processo de digitalização dos trilhões de conexões sinápticas que compõem uma consciência biológica resultaram em um fracasso catastrófico. Um simples erro de sintaxe levou ao apagamento instantâneo das vias neurais das cobaias. Alguns estão chamando isso de assassinato.\n\nOs participantes eram todos voluntários, mas seus parentes aflitos estão clamando por justiça. Para agravar o problema, agora está mais difícil encontrar novas cobaias."
 synth.260.a: "Vamos indenizar as famílias e seguir em frente."
 synth.260.b: "Novas cobaias serão escolhidas por sorteio."
 synth.260.b.tt: "Velocidade do progresso da situação §Y$situation_digitization$§! por §Y1§! ano: §R-25%§!"
 situation_test_subject_lottery_tt: "Sorteio de Cobaias"
 synth.260.c: "Encontre voluntários. À força, se necessário."
 #DIGITIZATION STAGE 3
 synth.300.name: "Carregamento de Identidade em Massa" #Stage 3 - Start event
 synth.300.desc: "Instalamos cabines de sintetização em todos os grandes centros urbanos de nosso território, que agora estão prontas para receber a nossa população de [owner.species.GetNamePlural]. Os padrões de identidade digital projetados por nossos $job_identity_designer_plural$ prometem gerar uma cópia exata do original biológico.\n\nFinalmente chegou o dia em que nos livraremos do nosso passado biológico e adotaremos um futuro sintético."
 synth.300.a: "Hora de sintetizar!"
 synth.300.a.resistance.tt: "$unlock_edict_tt$['concept_edict_subsidized_identity_backups']\n\nMove §Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§! para §Y$d_biological_enclaves$§! em [root.owner.capital_scope.GetName]\nLiberar o bloqueador retornará §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!\n\nModificador §Y$synth_mass_demonstrations$§! removido de [root.owner.capital_scope.GetName]\n\nA velocidade de sintetização depende da abordagem da situação e da quantidade de construções de montagem de robôs."
 synth.300.a.heritage.tt: "$unlock_edict_tt$['concept_edict_subsidized_identity_backups']\n\nMove §Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§! para §Y$d_old_towns$§! em [root.owner.capital_scope.GetName]\nLiberar o bloqueador retornará §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!\n\nA velocidade de sintetização depende da abordagem da situação e da quantidade de construções de montagem de robôs."
 synth.305.name: "Turismo Sintético"
 synth.305.desc: "Embora os locais históricos designados em [root.owner.capital_scope.GetName] tenham sido bem recebidos pela opinião pública, a iniciativa talvez tenha sido bem-sucedida demais. Tomados por uma onda de nostalgia, inúmeros turistas sintéticos ocuparam os locais e estão começando a prevalecer sobre os habitantes biológicos.\n\nTalvez seja necessário limitar o turismo para manter um senso de autenticidade nesses espaços. Por outro lado, a interação entre os turistas e os moradores locais poderia proporcionar observações sociológicas intrigantes."
 synth.305.a: "Limite o turismo."
 synth.305.b: "Incentivar as visitas pode ser lucrativo."
 synth.305.c: "Estude o impacto do turismo nos locais."
 synth.305.d: "Trocas culturais promovem uma compreensão mútua."
 synth.310.name: "A Resistência"
 synth.310.desc: "O movimento contra a sintetização em [root.owner.capital_scope.GetName] ficou mais radical em suas táticas e ambições. Nossas forças de segurança notaram um aumento na violência, bem como a disseminação de armas ilegais nos segmentos mais extremistas do grupo.\n\nAutointitulando-se \"líderes da resistência\", alguns desses dissidentes se refugiaram em esconderijos para se preparar para uma ação mais explícita contra o governo."
 synth.310.a: "Apreenda as lideranças."
 synth.310.a.tt: "Velocidade do progresso da situação §Y$situation_digitization$§! por §Y1§! ano: §G+25%§!\n\n"
 synth.310.b: "Tente acalmar a situação."
 synth.310.b.tt: "Velocidade do progresso da situação §Y$situation_digitization$§! por §Y1§! ano: §R-25%§!\n\n"
 #Stage 3 Opportunities - Mind Upload
 synth.320.name: "21.386.732.184 Unidades de Memória"
 synth.320.desc: "21.386.732.184 unidades de memória: essa é a capacidade média do cérebro de um indivíduo [root.owner.GetSpeciesName]. No entanto, nem todas as mentes são criadas iguais.\n\nÀ medida que o processo de sintetização avança, alguns argumentam que nem todas as mentes são dignas de um corpo artificial. Entretanto, a questão de quem devemos priorizar é delicada. Ou talvez as mentes menos desejáveis possam ser... aprimoradas após a digitalização. Reprogramadas."
 synth.320.a: "Todas as mentes são dignas de preservação."
 synth.320.b: "Não há nada de errado em fazer alguns ajustes..."
 synth.320.c: "Priorize as mentes mais brilhantes."
 synth.320.d: "Reprograme indivíduos \"problemáticos\"."
 #Stage 3 Challenges - Mind Upload
 synth.360.name: "Malware no Ar"
 synth.360.desc: "Para aumentar a produtividade de [roboticist.GetNamePlural], a gerência aprovou o uso de arriscadas atualizações sem fio para o software de identidades. A intenção do procedimento era incorporar o conhecimento sobre processos de trabalho ideais, mas em vez disso, a personalidade e a memória dos infelizes destinatários foram parcialmente perdidas.\n\nA equipe de gerência argumenta que levaria muito tempo para testar totalmente as atualizações de identidade antes de aplicá-las, e que é mais fácil simplesmente realocar os funcionários que perderam a memória."
 synth.360.a: "A otimização da produtividade faz valer a pena."
 synth.360.a.tt: "Modificador de construções de montagem de robôs adicionado:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §G+10%§!\n\nManutenção base de §Y[roboticist.GetNamePlural]§!: £alloys£ §R3§!"
 synth.360.b: "Estabeleça processos de atualização lentos, mas seguros."
 synth.360.b.tt: "Modificador de construções de montagem de robôs adicionado:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §R-10%§!\nEstabilidade: §G+5§!"
 #DIGITIZATION STAGE 4
 synth.400.name: "Uma Cópia Perfeita" #Stage 4 - Start event
 synth.400.desc: "Quando digitalizamos nossas mentes e as carregamos em corpos sintéticos, perdemos a capacidade de nos reproduzir biologicamente. Agora temos que copiar mentes existentes para criar novos indivíduos.\n\nÀ medida que nossos $job_identity_designer_plural$ continuam com suas investigações, esse processo certamente será aprimorado. Afinal de contas, mesmo uma cópia perfeita não passa de uma simples replicação. Criar uma mente nova, uma identidade nova... isso sim é um desafio."
 synth.400.a: "Vamos permitir que qualquer pessoa possa solicitar cópias de identidade gratuitas."
 synth.400.pop.tt: "$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\nCada §Y$job_identity_designer$§! agora fornece para todo o império:$TABBED_NEW_LINE$£mod_planet_pop_assembly_mult£ $MOD_POP_ASSEMBLY_SPEED$: §G+1§!\n\n"
 synth.400.b: "Vamos cobrar do usuário por cada cópia."
 synth.405.name: "Diversificação de Identidades"
 synth.405.desc: "Nossos $job_identity_designer_plural$ descobriram dois métodos para criar identidades digitais mais diversificadas.\n\nUma opção seria misturar as características de duas ou mais personalidades existentes para criar uma nova identidade combinada. Nesse caso, poderíamos priorizar certas características ou deixar que sejam selecionadas aleatoriamente. De qualquer forma, a nova identidade certamente seria mais interessante do que as nossas cópias de identidade atuais.\n\nA outra opção seria iniciar uma nova identidade a partir de um núcleo artificial e deixá-la passar por uma infância acelerada (e simulada). Dessa forma, poderíamos projetar uma personalidade perfeita."
 synth.405.a: "Vamos misturar nossas identidades."
 synth.405.a.vault: "Misture as identidades com nossos ancestrais digitalizados."
 synth.405.a.tt: "Opção de pesquisa obtida: £engineering£ §Y$tech_identity_fusion$§!\n\nPossibilidade de pesquisa futura: £engineering£ §Y$tech_identity_initialization$§!"
 synth.405.b: "A creche virtual é a melhor opção."
 synth.405.b.tt: "Opção de pesquisa obtida: £engineering£ §Y$tech_identity_initialization$§!\n\nPossibilidade de pesquisa futura: £engineering£ §Y$tech_identity_fusion$§!"
 synth.4.name: "Uma População Sintética" #Digitization - Last event
 synth.4.desc: "Graças a um esforço coordenado, conseguimos o que parecia impossível, transformando nossa consciência em código e nossos corpos em máquinas.\n\nO processo teve suas dificuldades e a transição não foi nada fácil, mas apesar do que perdemos pelo caminho, nossa nova configuração oferece infinitas possibilidades."
 synth.4.desc.unplugged: "Graças a um esforço coordenado, conseguimos o que antes parecia impossível, até mesmo profano. Evoluímos além da compreensão de [origin_unplugged_assimilator_empire.GetName], transformando nossa consciência em código e nossos corpos em máquinas.\n\nO processo teve suas dificuldades e a transição não foi nada fácil, mas apesar do que perdemos pelo caminho, nossa nova configuração oferece infinitas possibilidades."
 synth.4.a: "Seremos excepcionais."
 synth.4.a.tt: "Libera Efeitos Completos da Árvore de Tradição: ['tradition_category:tradition_synthetics']"
 ### DIGITIZATION SITUATION END ###
 ### SOCIETAL EFFECTS EVENT CHAIN START ###
 synthshock_chain_title: "Refatoração Digital"
 synthshock_chain_desc: "A sintetização de uma população inteira é uma realização de proporções monumentais, e repercussões são inevitáveis. À medida que nos adaptamos à nossa nova realidade, desafios incalculáveis e oportunidades únicas certamente afetarão o nosso cotidiano.\n\nA forma como enfrentarmos essas mudanças definirá nossa sociedade por muito tempo."
 synth_keep_auth_option: "A sintetização não muda quem somos."
 ### AUTHORITIES ###
 #DEMOCRATIC
 #Synth Democratic Physical
 auth_synth_democratic_physical: "Transferência Democrática"
 auth_synth_democratic_physical_desc: "Esta forma de governo proporciona uma liberdade de movimento sem precedentes entre corpos sintetizados, e está pronta para lidar com o custo adicional que isso acarreta."
 auth_synth_democratic_physical_tt: "$auth_democratic_election_tt$\nEficiência de Emprego para Especialistas: §G+1%§! por £district£ Distrito\n§R+1%§! de Manutenção de Distrito por £district£ Distrito"
 concept_auth_synth_democratic_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical_desc: "$auth_synth_democratic_physical_desc$"
 #Synth Democratic Virtual
 auth_synth_democratic_virtual: "Substituição Democrática"
 auth_synth_democratic_virtual_desc: "A troca de soldados por sofisticados substitutos operados remotamente diminui o impacto da guerra sobre a população. Nossas naves também podem ser mais compactas, pois a tripulação não precisa mais de alojamentos ou cabines de comando."
 auth_synth_democratic_virtual_tt: "$auth_democratic_election_tt$"
 concept_auth_synth_democratic_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual_desc: "$auth_synth_democratic_virtual_desc$"
 #OLIGARCHIC
 auth_cyber_oligarch_ruler_enforcers_tt: "Produção de Recursos de Governante por [enforcer.GetIcon] [enforcer.GetName]: §G+10%§!"
 #Synth Oligarchic Physical
 auth_synth_oligarchic_physical: "Controle Oligárquico"
 auth_synth_oligarchic_physical_desc: "As oligarquias sintéticas autorizam burocratas de alto nível a assumir temporariamente o controle dos corpos de seus colegas com desempenho inferior para evitar catástrofes no gerenciamento de processos."
 concept_auth_synth_oligarchic_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical_desc: "$auth_synth_oligarchic_physical_desc$"
 #Synth Oligarchic Virtual
 auth_synth_oligarchic_virtual: "Supervisão oligárquica"
 auth_synth_oligarchic_virtual_desc: "Protocolos holísticos de gerenciamento de projetos e recursos adicionais de processamento capacitam os funcionários de alto escalão a monitorar vários editos por todo o império com uma eficiência sem precedentes."
 concept_auth_synth_oligarchic_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual_desc: "$auth_synth_oligarchic_virtual_desc$"
 #DICTATORIAL
 #Synth Dictatorship Physical
 auth_synth_dictatorial_physical: "Multiplicidade Ditatorial"
 auth_synth_dictatorial_physical_desc: "Os neuroconectores sincronizados e a infraestrutura de apoio permitem que uma única pessoa controle vários corpos sintéticos ao mesmo tempo. Isso tem um efeito tremendo e positivo na produtividade do trabalhador."
 concept_auth_synth_dictatorial_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical_desc: "$auth_synth_dictatorial_physical_desc$"
 #Synth Dictatorship Virtual
 auth_synth_dictatorial_virtual: "Doutrinação Ditatorial"
 auth_synth_dictatorial_virtual_desc: "Agora existimos em um mundo totalmente virtual. Nada é real; tudo pode ser manipulado.\n\nCom controle total sobre o ambiente onde vivemos, a opinião pública pode ser moldada à nossa vontade. As pessoas acreditarão no que quisermos que elas acreditem."
 concept_auth_synth_dictatorial_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual_desc: "$auth_synth_dictatorial_virtual_desc$"
 #IMPERIAL
 #Synth Imperial Physical
 auth_synth_imperial_physical: "Ciclo Imperial"
 auth_synth_imperial_physical_desc: "Podemos acelerar nossos esforços de pesquisa dissecando as impressões armazenadas de nossos líderes falecidos nos arquivos de memória imperiais. Dessa forma, eles continuarão contribuindo para o império, como certamente gostariam.\n\nO trono imperial é recebido pelo herdeiro designado após a morte do governante."
 auth_synth_imperial_physical_tt: "Líderes concedem $r_research$ após a morte: $TABBED_NEW_LINE$$scientist_plural_with_icon$ - $r_physics$ $TABBED_NEW_LINE$$official_plural_with_icon$ - $r_society$ $TABBED_NEW_LINE$$commander_plural_with_icon$ - $r_engineering$ $NEW_LINE$ A $r_research$ obtida aumenta com o §YNível de Habilidade do Líder§!"
 concept_auth_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical_desc: "$auth_synth_imperial_physical_desc$"
 #Synth Imperial Virtual
 auth_synth_imperial_virtual: "Transmissão Imperial"
 auth_synth_imperial_virtual_desc: "A tecnologia de transferência rápida de mentes nos dá a chance de enviar nossos soldados mortos em combate de volta à batalha em corpos mecânicos novos. A mesma técnica permite que nossos trabalhadores realizem reparos de naves altamente perigosos no espaço.\n\nO trono imperial é recebido pelo herdeiro designado após a morte do governante."
 auth_synth_imperial_virtual_tt: "Nossos exércitos robóticos têm §Y33%§! de chance de serem restaurados ao sofrerem uma derrota"
 concept_auth_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual_desc: "$auth_synth_imperial_virtual_desc$"
 #CORPORATE
 #Synth Corporate Physical
 auth_synth_corporate_physical: "Sapiência Corporativa"
 auth_synth_corporate_physical_desc: "Mentes sintéticas limitadas podem ser carregadas em objetos inanimados para criar entidades vivas rudimentares. Elas podem atuar como servos incansáveis, companheiros leais ou até mesmo membros valiosos de sua família ou empresa.\n\nOs governos corporativos são empresas comerciais gigantescas que suplantaram totalmente o papel do Estado."
 auth_synth_corporate_physical_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_ai_emporium']"
 concept_auth_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical_desc: "$auth_synth_corporate_physical_desc$"
 #Synth Corporate Virtual
 auth_synth_corporate_virtual: "Recordação Corporativa"
 auth_synth_corporate_virtual_desc: "Esta empresa atua no ramo da compra de memórias, apagando-as permanentemente do cérebro do cliente. Lembranças vívidas e intensas valem mais do que recordações mundanas. Em seguida, a corporação examina os dados extraídos em busca de informações úteis antes de integrá-los ao processo de criação de mentes sintéticas.\n\nOs governos corporativos são empresas comerciais gigantescas que suplantaram totalmente o papel do Estado."
 auth_synth_corporate_virtual_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_clear_thought_clinic']"
 concept_auth_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual_desc: "$auth_synth_corporate_virtual_desc$"
 ### EDICTS ###
 edict_subsidized_identity_backups: "Backups de Identidade Subsidiados"
 edict_subsidized_identity_backups_desc: "O governo fornece a imensa quantidade de espaço nos servidores necessária para a realização de backups contínuos de identidade."
 edict_subsidized_identity_backups_effect: "$MOD_LEADER_LIFESPAN_ADD$: §G+20 anos§!\n$MOD_LEADER_SPECIES_EXP_GAIN$: §G+10%§!"
 concept_edict_subsidized_identity_backups: "$edict_subsidized_identity_backups$"
 edict_optimized_identity_creation: "Criação de Identidade Otimizada"
 edict_optimized_identity_creation_desc: "Algoritmos de personalidade avançados e técnicas de compactação da memória central aumentam nossa velocidade de geração de identidades."
 concept_edict_optimized_identity_creation: "$edict_optimized_identity_creation$"
 ### EVENTS ###
 synth.social_consequences.tt: "Influencia a §YMudança Sintética da Sociedade§! em curso.\n\n" #Standard tooltip to indicate that the Physical/Virtual focus variables has changed
 #FIRST EVENT #
 #DEMOCRATIC
 synth.505.name: "$synthshock_chain_title$"
 synth.505.desc: "Graças aos esforços do nosso governo, a consciência de todos os cidadãos voluntários foi transferida para o formato digital. A sintetização abriu caminhos que ainda não podemos imaginar, levando a novos desafios e possibilidades.\n\nAo concentrar nosso empenho no mundo físico, podemos criar maneiras de transportar nossas mentes digitalizadas por grandes distâncias até um novo corpo sintético já preparado. Por outro lado, podemos encontrar meios de criar soldados substitutos operados remotamente para aliviar os rigores da guerra."
 synth.505.a: "Devemos nos concentrar na liberdade de movimento."
 synth.505.a.tt: "Ênfase em recolonização e distritos."
 synth.505.b: "Precisamos nos preparar para as atrocidades da guerra."
 synth.505.b.tt: "Ênfase na exaustão pela guerra e viagens abaixo da velocidade da luz."
 #OLIGARCHIC
 synth.510.name: "$synthshock_chain_title$"
 synth.510.desc: "Embora a sintetização já tenha afetado a sociedade de maneiras que jamais teríamos previsto, o sentimento geral é de que poderíamos ir ainda mais longe. Nossos corpos sintéticos atuais podem ser aprimorados ou até mesmo descartados por completo em prol de uma existência totalmente virtual.\n\nSe decidirmos designar um corpo sintético a cada indivíduo, nossos oficiais teriam a possibilidade de assumir temporariamente o controle sobre os corpos de membros ineficazes do governo. Como alternativa, abrir mão de nossas formas físicas individuais em favor de uma experiência totalmente virtual e comunitária nos permitiria executar decisões com mais eficiência do que nunca."
 synth.510.a: "Foque no controle de corpos ineficazes."
 synth.510.a.tt: "Ênfase em eficiência burocrática."
 synth.510.b: "Estude opções holísticas de supervisão virtual."
 synth.510.b.tt: "Ênfase em editos e no tamanho do império."
 #DICTATORIAL
 synth.515.name: "$synthshock_chain_title$"
 synth.515.desc: "A sintetização completa da população provou ser um tremendo sucesso. Nosso passado orgânico foi relegado à história, mas para traçar um caminho rumo ao futuro, §Y[From.GetRulerName]§! requer tanto a obediência incondicional de nossas mentes mais brilhantes quanto uma decisão em relação à forma de nossa espécie.\n\nO aprimoramento dos nossos corpos sintéticos permitiria que os indivíduos controlassem vários hospedeiros ao mesmo tempo. Por outro lado, poderíamos renunciar totalmente ao espaço físico, manipulando a opinião pública por meio da existência em um ambiente totalmente virtual."
 synth.515.a: "Foque nos corpos neurossincronizados."
 synth.515.a.tt: "Ênfase em trabalhadores e distritos."
 synth.515.b: "Foque na manipulação virtual."
 synth.515.b.tt: "Ênfase em construções e ética governamental."
 #IMPERIAL
 synth.520.name: "$synthshock_chain_title$"
 synth.520.desc: "Embora a sintetização já tenha afetado o império de maneiras imprevistas, a população parece disposta a ir ainda mais longe. Nossos corpos sintéticos podem se tornar extensões da nossa identidade ou meras ferramentas a serem controladas remotamente por nossa consciência virtual. Nosso rumo ainda não está decidido.\n\nPodemos pesquisar meios de transferir rapidamente uma consciência de um corpo dispensável para outro. Como alternativa, podemos nos concentrar na extração de conhecimento daqueles recém-falecidos para acelerar nossos esforços de pesquisa."
 synth.520.a: "Procure extrair conhecimento dos falecidos."
 synth.520.a.tt: "Ênfase em líderes e pesquisa."
 synth.520.b: "Estude a transferência rápida de consciência."
 synth.520.b.tt: "Ênfase em exércitos e naves."
 #CORPORATE
 synth.525.name: "$synthshock_chain_title$"
 synth.525.desc: "A sintetização de toda a nossa sociedade merece uma análise aprofundada de riscos e benefícios. Ao mesmo tempo em que estamos entrando na nova e lucrativa fronteira de um futuro sintetizado, estamos também deixando para trás nossa base de clientes mais materialista. Em um mundo perfeito, gostaríamos de manter ambos os segmentos em alguma medida.\n\nOs avanços em campos relacionados à sintetização, como a inteligência artificial, nos permitiriam imbuir objetos inanimados com uma forma de vida rudimentar e lançar diversas linhas de produtos. Uma exploração mais completa do espaço virtual, por outro lado, tornaria possível aproveitar a memória das pessoas como um novo tipo de mercadoria."
 synth.525.a: "Estude a incorporação de IAs."
 synth.525.a.tt: "Ênfase na produção e no lucro."
 synth.525.b: "Pesquise a conversão de memórias em lucro."
 synth.525.b.tt: "Ênfase em comércio, bens e informações."
 ### EVENT POOL 1: IDENTITY ###
 synth.610.name: "Proveniência Sintética"
 synth.610.desc: "As mudanças sociais fundamentais provocadas pela sintetização estão começando a ser percebidas. Livres de nossas limitações físicas, nós redefinimos radicalmente noções de gênero, raça e autonomia corporal. Embora isso seja libertador para alguns, os indivíduos mais tradicionais relutam em abandonar nossa velha estrutura e desejam uma identidade predefinida a partir da qual possam operar.\n\nPara apaziguá-los, poderíamos manter partes da nossa herança orgânica em nossa forma sintética. Como alternativa, podemos permitir que a população expresse sua identidade mais livremente."
 synth.610.a: "Vamos manter nossa forma original."
 synth.610.b: "Permita modificações corporais sem restrições."
 synth.610.c: "Estabeleça limites moderados para a personalização da identidade."
 synth.610.d: "Os símbolos de status visíveis devem permanecer."
 synth.610.e: "Isso pode ser monetizado, certo...?"
 synth.620.name: "Anseios Orgânicos"
 synth.620.desc: "Pouco entusiasmadas com a sintetização, algumas pessoas têm saudades de seu passado orgânico. Elas argumentam que a expectativa de vida mais curta e a imperfeição inata de um \"corpo natural\" tornavam a vida mais significativa.\n\nAlegando que suas cópias sintéticas ou virtuais parecem impessoais e vazias, um grupo de radicais está desenvolvendo uma devoção aos corpos orgânicos que beira o fanatismo.\n\nTalvez devêssemos fornecer a eles uma simulação menos perfeita onde existir. Ou será que eles preferem um receptáculo imperfeito?"
 synth.620.a: "Introduza imperfeições planejadas nos corpos sintéticos."
 synth.620.b: "Ofereça a eles um mundo imperfeito."
 synth.620.c: "É tolice romantizar o passado."
 synth.620.d: "A dor os fará lembrar de seu propósito."
 synth.620.d.tt: "Que comecem as batalhas virtuais!\n\n"
 synth.630.name: "Arquitetura de Servidores Domésticos"
 synth.630.desc: "A sintetização de todo o povo §Y[root.GetSpeciesAdj]§! também levou a uma mudança drástica em nossas práticas habitacionais. Com as mentes descansando em enormes fazendas de servidores, os corpos sintéticos podem ser armazenados em prateleiras. Embora isso represente uma solução econômica, alguns grupos estão levantando preocupações muito sérias.\n\nO mercado imobiliário, antes lucrativo, pode entrar em colapso total, causando um impacto considerável na nossa economia. Potencialmente mais prejudicial, pelo menos do ponto de vista psicológico, é o fato de que as pessoas não terão mais um lugar físico para chamar de lar."
 synth.630.a: "Os servidores centralizados são mais eficientes."
 synth.630.b: "Servidores individuais podem ser armazenados nas residências existentes."
 synth.630.c: "Comece a vender casas digitais."
 ### EVENT POOL 2: POSSIBILITIES ###
 synth.1010.name: "Matriz de Possibilidades Infinitas"
 synth.1010.desc: "A indústria digital está crescendo. Desde a emoção de simular uma aventura em primeira pessoa até relaxar em um resort digital, o entretenimento virtual nunca foi tão envolvente – ou viciante. Embora essa atividade em expansão represente um novo e importante fator econômico, a produção no mundo físico tem sido prejudicada à medida que as pessoas passam cada vez mais tempo em suas utopias digitais. Algumas correm o risco de perder totalmente o contato com a vida \"real\", mas ainda podem contribuir para a sociedade participando da economia digital.\n\nDevemos banir os mundos virtuais viciantes, promovê-los como uma nova forma de entretenimento lucrativo ou criar regulamentações para encontrar um meio-termo?"
 synth.1010.a: "Proíba mundos virtuais viciantes."
 synth.1010.b: "Promova esses paraísos virtuais."
 synth.1010.b.hedonist: "Finalmente um paraíso definitivo!"
 synth.1010.c: "Vamos regulamentar a indústria."
 synth.1020.name: "Medicina Sintética"
 synth.1020.desc: "Nossas novas formas sintéticas nos libertaram das doenças e lesões que afligem o corpo orgânico. Infelizmente, elas também criaram uma nova gama de transtornos, desde simples falhas mecânicas até problemas potencialmente fatais, como instabilidades de servidores, problemas de conexão e vírus digitais perigosos.\n\nDevemos focar na proteção de nossas mentes digitalizadas, considerando o corpo uma mercadoria descartável, ou dar mais atenção a ele como uma extensão da nossa identidade?"
 synth.1020.a: "Precisamos continuar protegendo o corpo."
 synth.1020.a.spiritual: "O corpo é um recipiente sagrado para a alma."
 synth.1020.b: "Vamos focar na proteção da mente."
 synth.1020.b.spiritual: "Já transcendemos a forma física."
 synth.1020.c: "O equilíbrio é essencial."
 synth.1020.d: "Essas novas enfermidades têm um grande potencial de crescimento..."
 synth.1030.name: "Ressurgimento"
 synth.1030.desc: "Nós ficamos mais rápidos, melhores e mais fortes, mas submeter nossos corpos sintéticos a situações perigosas ainda acarreta um custo mental. Saber que a mente pode ser restaurada diminui o trauma, mas não o elimina totalmente, sobretudo porque a recuperação nem sempre é garantida, e novos corpos não podem ser simplesmente fabricados do nada.\n\nPodemos desconsiderar o trauma psicológico para ampliar os limites do desempenho sintético ou moderar nossas ambições para não colocarmos em risco a saúde mental da população."
 synth.1030.a: "Vamos continuar desafiando os limites."
 synth.1030.b: "Vamos agir com cautela."
 synth.1030.c: "A elite não deve ser colocada em risco."
 #FINAL EVENT #
 synth_virtual_trait: "\n[owner.species.GetNamePlural] ganham a Característica: §Y$trait_robot_digital_1$§!\nLíderes têm a Característica §Y$leader_trait_synthetic$§! substituída pela Característica §Y$leader_trait_virtual$§!"
 synth_physical_traits: "\nLibera Características §YAvançadas§! para a Modificação de Espécie"
 #DEMOCRATIC
 synth.1505.name: "Sociedade Sintetizada"
 synth.1505.desc.physical: "Não é nossa intenção apagar completamente a individualidade. Podemos colher os benefícios da sintetização sem nos perder totalmente no processo.\n\nCom essa mudança, a liberdade de movimento nunca foi tão acessível. Podemos transportar nossas consciências para corpos especializados, por grandes distâncias e em grande número, permitindo que as pessoas vivam e trabalhem onde forem mais requisitadas."
 synth.1505.desc.virtual: "Nossa sociedade se libertou do mundo físico e olha para o futuro com um misto de entusiasmo e apreensão. Nós nos transformamos de maneiras que ainda não compreendemos totalmente, mas embarcamos juntos nessa importante jornada.\n\nAgora, nossa população pode interagir com máquinas de maneiras que não coloquem nossa consciência em risco. Esse é um marco significativo na forma como navegamos pelos perigos da guerra ou pelo vazio indiferente do espaço."
 synth.1505.desc.neutral: "A hesitação diante de uma mudança incompreensível é normal. Muitos estão mais preocupados com o que podem perder do que com o que têm a ganhar, mas não é hora de ficar em cima do muro. Temos que levar nosso povo adiante.\n\nEsta escolha pode levar à criação de uma variedade de corpos pessoais especializados para que as pessoas entrem e saiam deles à vontade, ou à adoção total de suas formas sintetizadas a fim de suportar os rigores das viagens espaciais e da guerra."
 synth.1505.a: "Facilite a movimentação entre corpos físicos."
 synth.1505.a.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_physical'] $synth_physical_traits$"
 synth.1505.b: "Vamos usar substitutos para lutar por nós."
 synth.1505.b.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_virtual'] $synth_virtual_trait$"
 synth.1505.c: "$synth_keep_auth_option$"
 synth.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 synth.1510.name: "Sociedade Sintetizada"
 synth.1510.desc.physical: "Nossa sociedade sintetizada, os corpos sintéticos aprimorados e o sentimento geral indicam que devemos seguir um caminho mais conservador para a sintetização. Mesmo mantendo uma forma física personalizada, nosso povo poderá trocar de corpos quase à vontade.\n\nIsso permitirá que oficiais mais experientes assumam temporariamente o controle dos corpos de seus colegas menos eficientes, melhorando notavelmente o desempenho burocrático."
 synth.1510.desc.virtual: "Agora estamos prontos para o próximo passo lógico da revolução da sintetização: a adoção de uma existência totalmente virtual.\n\nCorpos temporários realizarão tarefas no mundo físico, mas a maioria da população está disposta a mudar para um estado de existência mais imaterial.\n\nCom isso, as ordens poderão ser executadas de forma rápida e eficiente, e com muito menos supervisão governamental."
 synth.1510.desc.neutral: "Adaptamos todos os segmentos da sociedade à vida sintética, mas as análises quanto aos benefícios de uma maior especialização seguem inconclusivas.\n\nPodemos criar acessos ocultos às identidades, permitindo que os oficiais supervisores assumam o controle dos corpos de subordinados ineficientes, ou desenvolver uma interface virtual em rede para que eles supervisionem vários projetos governamentais ao mesmo tempo e sem latência."
 synth.1510.a: "Permita que oficiais assumam o controle de colegas ineficientes."
 synth.1510.a.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_physical'] $synth_physical_traits$"
 synth.1510.b: "Vamos adotar a supervisão virtual completa."
 synth.1510.b.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_virtual'] $synth_virtual_trait$"
 synth.1510.c: "$synth_keep_auth_option$"
 synth.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 synth.1515.name: "Sociedade Sintetizada"
 synth.1515.desc.physical: "Nosso povo não foge de um trabalho físico honesto. Nossos trabalhadores foram conectados em rede e agora podem controlar remotamente vários corpos, aumentando em muito as cotas de produção no processo.\n\nEsse desdobramento é um claro sinal de que temos razão em confiar na orientação de nossa liderança suprema, §Y[From.GetRulerName]§!."
 synth.1515.desc.virtual: "O povo está pronto para abandonar suas formas físicas em favor de consciências puramente digitais. Todos estão dispostos a continuar sua existência em um ambiente totalmente virtual.\n\nAgora que eles abriram mão de sua percepção do mundo, temos total liberdade para manipular sua realidade, aumentando os sentimentos positivos em relação ao Estado. Uma população alinhada com sua liderança é a base de uma nação forte."
 synth.1515.desc.neutral: "O povo §Y[root.GetSpeciesAdj]§! continua indeciso quanto à forma que a nossa consciência digitalizada deve assumir. As vozes mais conservadoras gostariam que permanecêssemos profundamente enraizados em corpos físicos, enquanto outras desprezam essa \"meia-medida\" entre o velho e o novo.\n\nCabe a nós tomar essa decisão. O foco físico permitiria que um único trabalhador controlasse vários corpos, enquanto uma existência virtual possibilitaria o controle social em uma escala jamais vista."
 synth.1515.a: "Crie corpos neurossincronizados para os trabalhadores."
 synth.1515.a.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_physical'] $synth_physical_traits$"
 synth.1515.b: "Vamos manipular a opinião popular no espaço virtual."
 synth.1515.b.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_virtual'] $synth_virtual_trait$"
 synth.1515.c: "$synth_keep_auth_option$"
 synth.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"
 #IMPERIAL
 synth.1520.name: "Sociedade Sintetizada"
 synth.1520.desc.physical: "O império está favorecendo o aprimoramento dos nossos novos corpos sintéticos.\n\nEssas novas formas possibilitam a desmontagem dos cérebros positrônicos para adquirirmos os registros de conhecimento dos membros da nossa elite falecidos recentemente. Como servos do império, isso certamente é o que eles teriam desejado."
 synth.1520.desc.virtual: "O povo §Y[From.GetSpeciesAdj]§! está disposto a ir ainda mais longe, preferindo uma existência totalmente virtual às meias-medidas da permanência no mundo físico. Esse importante evento terá um grande impacto e afetará profundamente o nosso futuro. Ao aumentar a velocidade e o alcance da transferência de identidade, podemos mobilizar rapidamente unidades de reserva para substituir corpos sintéticos destruídos em missões perigosas.\n\nEsses novos desdobramentos certamente aumentarão nossa eficiência em diversas situações de guerra, e trarão glória ao império §Y[From.GetSpeciesAdj]§!!"
 synth.1520.desc.neutral: "O império §Y[From.GetSpeciesAdj]§! está em uma encruzilhada. Alguns acreditam que corpos físicos personalizados nos trariam segurança e familiaridade, enquanto outros argumentam contra o aproveitamento total da sintetização e de tudo que ela pode proporcionar.\n\nConcentrar nossos esforços nos aspectos físicos nos permitiria avançar nossas pesquisas reaproveitando o conhecimento de dignitários recentemente destruídos. Por outro lado, o caminho que leva à existência virtual permitiria a substituição em massa de corpos sintéticos destruídos por meio da transferência rápida de identidade."
 synth.1520.a: "Utilize as mentes dos nossos líderes falecidos."
 synth.1520.a.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_physical']"
 synth.1520.b: "Crie corpos físicos descartáveis."
 synth.1520.b.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_virtual']"
 synth.1520.c: "$synth_keep_auth_option$"
 synth.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 synth.1525.name: "Sociedade Sintetizada"
 synth.1525.desc.physical: "Nosso departamento de pesquisa e propaganda apresentou uma aplicação inovadora de inteligência artificial que pode interessar a toda a nossa base de clientes. Nossa abordagem equilibrada em relação à nova existência sintética nos permite desenvolver produtos que tiram proveito do mundo virtual para beneficiar o mundo físico.\n\nAgora, podemos basicamente dar vida a objetos inanimados ao dotá-los de IAs limitadas. Essa nova linha de produtos pode ser direcionada a consumidores finais, ao setor privado e a outras partes interessadas por toda a galáxia."
 synth.1525.desc.virtual: "O nosso compromisso com o espaço virtual deu origem a uma linha totalmente nova de produtos baseados em memórias. Os técnicos das nossas filiais são capazes de extrair as lembranças de indivíduos voluntários, independentemente de seu fenótipo.\n\nEm seguida, essas impressões são cuidadosamente examinadas pelo nosso departamento de espionagem, o que nos permite obter uma vantagem competitiva nessa área sobre outros impérios. Por fim, as memórias são incorporadas aos nossos processos de criação de mentes sintéticas para gerar ganhos significativos de desempenho."
 synth.1525.desc.neutral: "Apesar de uma análise meticulosa de custo/benefício, não foi possível verificar nenhuma vantagem clara entre as especializações física ou virtual para o processo de sintetização. No entanto, não podemos ficar de braços cruzados diante dessas oportunidades: precisamos apresentar um caminho claro para os nossos acionistas.\n\nO foco no mundo físico nos possibilitaria carregar IAs limitadas em objetos inanimados para que sejam vendidos como a versão simplificada de uma nova vida. Já os investimentos no mundo virtual nos permitiriam comercializar memórias e padrões de pensamento."
 synth.1525.a: "Distribua entidades de IA limitada."
 synth.1525.a.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_physical'] $synth_physical_traits$"
 synth.1525.b: "Comercialize a memória das pessoas."
 synth.1525.b.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_virtual'] $synth_virtual_trait$"
 synth.1525.c: "$synth_keep_auth_option$"
 synth.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"
 ### SOCIETAL EFFECTS EVENT CHAIN END ###