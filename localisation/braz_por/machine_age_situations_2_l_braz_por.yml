 #Modifiers
 synth_opposition_truth: "Campanha Informativa sobre a Sintetização"
 synth_opposition_truth_desc: "Promove informações verdadeiras sobre todos os aspectos relacionados à sintetização."
 synth_opposition_deception: "Campanha Manipulativa sobre a Sintetização"
 synth_opposition_deception_desc: "Manipula a narrativa pública para enfatizar os aspectos positivos da sintetização mental."
 synth_tinkering_with_minds: "Mentes Reprogramadas"
 synth_tinkering_with_minds_desc: "As mentes recém-digitalizadas passam por uma reprogramação moderada para se alinharem à nossa visão do futuro."
 synth_brightest_minds: "Priorizando os Melhores"
 synth_brightest_minds_desc: "Somente os indivíduos mais excepcionais são selecionados para participar do nosso programa de sintetização."
 synth_reprogram_minds: "Reprogramação Opressora"
 synth_reprogram_minds_desc: "O governo está reprogramando extensivamente os indivíduos \"inaptos\" conforme estes são digitalizados."
 victim_compensation: "Indenização para Vítimas"
 victim_compensation_desc: "Indenização para as famílias das vítimas cujas mentes foram perdidas durante a sintetização."
 synth_mandatory_volunteers: "Voluntariado Obrigatório"
 synth_mandatory_volunteers_desc: "As cobaias são forçadas a participar de experimentos para a digitalização de uma consciência biológica."
 synth_mass_demonstrations: "Protestos em Massa"
 synth_mass_demonstrations_desc: "A força de trabalho do planeta está ocupada com protestos em massa contra a transição planejada para a existência mecânica."
 synth_fund_heritage_sites: "Financiar Locais Históricos"
 synth_fund_heritage_sites_desc: "Serão criados Locais Históricos especiais para limitar o impacto da transição sintética sobre os membros biológicos da nossa espécie."
 synth_revere_the_past: "Venerar o Passado"
 synth_revere_the_past_desc: "Os ritos religiosos nascidos da nossa existência biológica ainda são importantes para nós e devemos proteger esses locais de culto."
 synth_preserve_the_past: "Preservar o Passado"
 synth_preserve_the_past_desc: "Abraçar totalmente uma nova existência não significa que devemos destruir os lugares e objetos que deram significado ao nosso passado biológico."
 synth_resistance_fight: "Apreensão dos Líderes da Resistência"
 synth_resistance_fight_desc: "Enviar nossos esquadrões de máquinas aos $d_biological_enclaves_no_icon$ para capturar os líderes da resistência acabará rapidamente com as objeções."
 synth_resistance_diplomacy: "Diplomacia com Líderes da Resistência"
 synth_resistance_diplomacy_desc: "Visitar $d_biological_enclaves_no_icon$ para se reunir com os líderes da resistência ajudará a melhorar o entendimento mútuo."
 synth_character_force: "Imitar a Antiga Forma Orgânica"
 synth_character_force_desc: "A forma tradicional da nossa espécie será preservada no âmbito digital."
 synth_character_customize: "Modificação Irrestrita do Corpo Sintético"
 synth_character_customize_desc: "Os indivíduos podem modificar sua nova aparência digital como quiserem."
 synth_character_customize_elite: "Modificação Restrita do Corpo Sintético"
 synth_character_customize_elite_desc: "Para manter uma clara hierarquia social, somente as camadas superiores têm permissão para modificar a aparência."
 synth_character_customize_corpo: "Modificação Monetizada do Corpo Sintético"
 synth_character_customize_corpo_desc: "Todos podem modificar sua aparência digital à vontade, contanto que paguem por isso."
 synth_cravings_imperfections: "Imperfeições Sintéticas Propositais"
 synth_cravings_imperfections_desc: "Para evitar uma existência vazia e impessoal, características imperfeitas intencionais estão sendo adicionadas aos corpos sintéticos."
 synth_cravings_simulation: "Vida em uma Simulação"
 synth_cravings_simulation_desc: "Nós nos empenhamos para criar uma existência mais autêntica, incluindo as dificuldades, para todos que decidem viver em uma simulação."
 synth_cravings_stop: "Radicais Orgânicos Ignorados"
 synth_cravings_stop_desc: "Com o tempo, nosso povo passará a apreciar sua vida aperfeiçoada e livre das privações da existência orgânica."
 synth_cravings_pain: "Arena de Batalha Virtual"
 synth_cravings_pain_desc: "A participação em batalhas virtuais dolorosas traz um propósito familiar tanto para os envolvidos quanto para os espectadores."
 synth_health_physical: "Foco na Saúde Física Sintética"
 synth_health_physical_desc: "Nosso sistema de saúde sintético priorizará o combate a panes materiais."
 synth_health_virtual: "Foco na Saúde Mental Sintética"
 synth_health_virtual_desc: "Garantir a segurança das nossas mentes por meio de atualizações constantes de software é essencial para a nossa saúde."
 synth_health_both: "Foco no Equilíbrio da Saúde Sintética"
 synth_health_both_desc: "Cuidar das instabilidades de software e hardware com a mesma atenção é essencial para o bem-estar do nosso povo."
 synth_health_corporate: "Medicalização Sintética"
 synth_health_corporate_desc: "Expandir a competência da nossa corporação para além da medicina tradicional é fundamental para o tratamento de vírus digitais."
 synth_virtual_world_outlaw: "Mundos Virtuais Proibidos"
 synth_virtual_world_outlaw_desc: "Os resorts virtuais altamente viciantes foram proibidos por serem considerados uma ameaça à sociedade."
 synth_virtual_world_promote: "Mundos Virtuais Incentivados"
 synth_virtual_world_promote_desc: "Na utopia digital, todos podem desfrutar de formas praticamente infinitas de entretenimento."
 synth_virtual_world_regulate: "Mundos Virtuais Regulamentados"
 synth_virtual_world_regulate_desc: "Os resorts virtuais altamente viciantes são regulamentados com rigor para garantir que todos mantenham uma conexão com a realidade."
 synth_home_centralized: "Fazendas de Servidores Centralizadas"
 synth_home_centralized_desc: "Toda consciência digitalizada é armazenada em fazendas de servidores centralizadas do governo para garantir o máximo de economia."
 synth_home_distributed: "Servidores Domésticos Distribuídos"
 synth_home_distributed_desc: "As consciências digitalizadas são armazenadas em propriedades privadas tradicionais."
 synth_digital_homes: "Imóveis Digitais"
 synth_digital_homes_desc: "Semelhante ao mercado imobiliário tradicional, os imóveis digitais proporcionam uma renda quase idêntica, mas com um custo bem menor."
 synth_respawn_push: "Padrões de Segurança Sintética Brandos"
 synth_respawn_push_desc: "Padrões de segurança física mais tolerantes garantem uma economia resiliente."
 synth_respawn_caution: "Padrões de Segurança Sintética"
 synth_respawn_caution_desc: "A proteção dos corpos sintéticos e das mentes que eles abrigam só pode ser feita por meio de diretrizes governamentais rigorosas."
 synth_respawn_elite: "Privilégio de Segurança Sintética"
 synth_respawn_elite_desc: "É proibido o trabalho das camadas superiores da sociedade em tarefas que representem um risco para seus corpos ou suas mentes."
 synth_cultural_exchange: "Compreensão Cultural"
 synth_cultural_exchange_desc: "Os programas de intercâmbio cultural de e para os nossos locais históricos promovem a compreensão mútua entre os nossos povos."
 synth_combat_reactors: "Reatores de Combate"
 synth_combat_reactors_desc: "Uma nova tecnologia de microfusão foi integrada aos nossos corpos mecânicos, proporcionando uma capacidade de combate muito maior."
 synth_AI_actor: "Porta-voz IA"
 synth_AI_actor_desc: "Por meio da cópia de uma celebridade já falecida controlada por uma IA, estamos ganhando apoio para a nossa diretriz de sintetização em curso."
 #Deposits
