 building_slave_processing: "Instalação de Processamento de Escravos"
 building_slave_processing_desc: "Esta instalação grande e intimidadora é usada para processar o trabalho escravo e apagar qualquer vestígio de livre arbítrio."
 building_slave_processing_migrate_effect_desc: "A §YRecolonização Automática§! está ativada para §Y$SLAVES$§! locais não utilizados e robôs não sapientes."
 building_slave_processing_slave_army_effect_desc: "Permite o recrutamento de §Y$slave_army_plural$§!.\n\n"
 building_robotics_assembly_plant: "Unidade de Montagem Robótica I"
 building_robotics_assembly_plant_desc: "Uma Fábrica de Montagem de Robôs é necessária para a criação de exércitos robóticos.\nAdiciona §Y100§! £pop£ §HPops do tipo $ROBOT_POP_SPECIES_1$§! por ano\nManutenção de Pop: £energy£ §Y1§!"
 building_robotics_assembly_plant_2: "Unidade de Montagem de Droides"
 building_robotics_assembly_plant_2_desc: "Uma Fábrica de Montagem de Droides é necessária para a criação de exércitos robóticos.\nAdiciona §Y100§! £pop£ §HPops do tipo $ROBOT_POP_SPECIES_2$§! por ano\nAprimora os Pops do tipo §H$ROBOT_POP_SPECIES_1$§! para §H$ROBOT_POP_SPECIES_2$§!\nManutenção de Pop: £energy£ §Y2§!"
 building_robotics_assembly_plant_3: "Unidade de Montagem de Sintéticos"
 building_robotics_assembly_plant_3_desc: "Uma Fábrica de Montagem de Sintéticos é necessária para a criação de exércitos robóticos.\nAdiciona §Y100§! £pop£ §HPops do tipo $ROBOT_POP_SPECIES_3$§! por ano\nAprimora os Pops do tipo §H$ROBOT_POP_SPECIES_2$§! para §H$ROBOT_POP_SPECIES_3$§!\nManutenção de Pop: £energy£ §Y5§!"
 building_colony_shelter: "Acampamento de Nave Remontado"
 building_colony_shelter_desc: "Os restantes de uma Nave Colonial, remontada para forma e funcionamento planetário."
 building_capital: "Administração Planetária"
 building_capital_desc: "Sede da elite governante local."
 building_major_capital: "Capital Planetária"
 building_major_capital_desc: "Um complexo alastrado de estruturas burocráticas que age como centro administrativo de uma grande colônia."
 building_system_capital: "Sistema Complexo-Capital"
 building_system_capital_desc: "Uma configuração gigantesca de escritórios administrativos e infraestrutura em rede que permite a construção e operação de instalações de alta demanda."
 building_ancient_factory: "Fabricantes Autônomos"
 building_ancient_factory_desc: "§LEste complexo antigo foi construído com tecnologia perdida há muitos anos.§!"
 building_ancient_archives: "Arquivos Precursores"
 building_ancient_archives_desc: "§LArmazéns imensos de conhecimento antigo.§!"
 building_dark_matter_power_plant: "Usina de Energia de Matéria Escura"
 building_dark_matter_power_plant_desc: "§LEste complexo antigo foi construído com tecnologia perdida há muitos anos.§!"
 building_agri_processing_complex: "Complexo de Agroprocessamento"
 building_agri_processing_complex_desc: "§LEste complexo antigo foi construído com tecnologia perdida há muitos anos.§!"
 building_primitive_farm: "Fazendas Primitivas"
 building_primitive_farm_desc: "Chácaras primitivas trabalhando no solo em troca de colheitas ínfimas."
 building_primitive_factory: "Fábricas Básicas"
 building_primitive_factory_desc: "Fábricas primitivas e ineficientes cuspindo poluição enquanto produzem bens."
 building_primitive_offices: "Escritórios Básicos"
 building_primitive_offices_desc: "Estes escritórios contêm uma série aparentemente interminável de cubículos, envoltos pelo som de tarefas fúteis."
 building_primitive_mine: "Mina Primitiva"
 building_primitive_mine_desc: "Túneis de mineração primitivos que serpenteiam pelo solo."
 building_primitive_power_plant: "Usina de Energia Primitiva"
 building_primitive_power_plant_desc: "Uma usina de energia primitiva e um tanto duvidosa que usa carvão ou energia atômica arcaica, envenenando a atmosfera."
 building_mutant_landfill: "Aterro Mutante"
 building_mutant_landfill_desc: "Uma massa pútrida de terrores mutantes mortos. Sua matéria volátil orgânica se juntou para formar uma certa estrutura."
 building_vault: "Abrigo Subterrâneo"
 building_vault_desc: "Estas tendas marcam a entrada na superfície de um abrigo subterrâneo gigantesco, feito para ser um abrigo de bombas pelos habitantes originais deste mundo. Os ocupantes do abrigo se viraram um contra o outro quando a comida acabou."
 building_vault_2: "Abrigo Subterrâneo"
 building_vault_2_desc: "Estas tendas marcam a entrada na superfície de um abrigo subterrâneo gigantesco, feito para ser um abrigo de bombas pelos habitantes originais deste mundo. O abrigo contém um grande parque de máquinas junto com equipamentos de mineração armazenados."
 building_particle_accelerator: "Acelerador de Partículas"
 building_particle_accelerator_desc: "Este acelerador de partículas antigo foi construído usando um projeto clássico, e os terminais sobreviventes dentro da estrutura contem uma quantidade gigantesca de dados de pesquisa compostos pelo que deve ter sido um brilhante físico teórico."
 building_odd_factory: "Fábrica Estranha"
 building_odd_factory_desc: "Uma instalação bem feita que produz recursos de alto valor, deixados no planeta por uma civilização diferente."
 building_quarantine: "Estação de Pesquisa de Pragas"
 building_quarantine_desc: "Um hospital temporário com um foco em estudar infectados para produzir uma cura."
 building_plague_memorial: "Memorial da Praga"
 building_plague_memorial_desc: "Um memorial para lembrar as pessoas da terrível doença que já assombrou o seu lar. Ele representa a sobrevivência da nação."
 building_energy_grid: "Rede de Energia"
 building_energy_grid_plural: "Redes de Energia"
 building_energy_grid_desc: "Uma rede cuidadosamente calibrada que maximiza a produção de geradores de energia."
 building_energy_grid_effect_desc: "Aumenta a produção base de £energy£ §YEnergia§! produzindo empregos em §G1§!."
 building_energy_nexus: "Nexus de Energia"
 building_energy_nexus_desc: "Essa instalação colossal centraliza todas as redes de energia no planeta, melhorando sua eficiência."
 building_mineral_purification_plant: "Usinas de Purificação Mineral"
 building_mineral_purification_plant_desc: "Minerais que passaram por esses purificadores são da maior qualidade."
 building_mineral_purification_hub: "Hubs de Purificação Mineral"
 building_mineral_purification_hub_desc: "Hubs gigantescos onde minerais são recebidos e depois enviados para redes de purificadores."
 building_medical_1: "Centro Médico"
 building_medical_1_desc: "$job_healthcare_desc$"
 building_medical_2: "Clínicas de Genes"
 building_medical_2_desc: "Clínicas de Genes podem oferecer tratamentos médicos avançados, que estatisticamente levam a uma população mais saudável e mais longeva."
 building_medical_3: "Centros de Citorevitalização"
 building_medical_3_desc: "Centros de Citorrevitalização podem oferecer tratamentos médicos avançados para uma grande população. Tratamentos em um nível celular levam a uma população significativamente mais saudável e mais longeva."
 building_mineral_silo_1: "Silo Mineral I"
 building_mineral_silo_1_desc: "Silos Minerais aumentam a capacidade máxima de armazenamento Mineral do nosso Império."
 building_mineral_silo_2: "Silo Mineral II"
 building_mineral_silo_2_desc: "$building_mineral_silo_1_desc$"
 building_mineral_silo_3: "Silo Mineral III"
 building_mineral_silo_3_desc: "$building_mineral_silo_1_desc$"
 building_planetary_shield_generator: "Gerador de Escudo Planetário"
 building_planetary_shield_generator_desc: "$tech_planetary_shield_generator_desc$"
 building_autochthon_monument: "Monumento Autóctone"
 building_autochthon_monument_plural: "Monumentos Autóctones"
 building_autochthon_monument_desc: "Um monumento em homenagem aos primeiros pioneiros a se aventurarem no espaço."
 building_autochthon_monument_effect: "Produz §G1§! £unity£ para cada §YRegalia da Ascensão§! tomada pelo nosso Império.\n\n"
 building_heritage_site: "Local de Herança"
 building_heritage_site_desc: "Uma área dedicada à história recente de nosso império e seu povo."
 building_heritage_site_effect: "Produz §G2§! £unity£ para cada §YRegalia da Ascensão§! tomada pelo nosso Império.\n\n"
 building_hypercomms_forum: "Fórum de Hipercomunicações"
 building_hypercomms_forum_desc: "Uma instalação imensa, equipada com equipamentos de comunicação interpessoais de vanguarda, o Fórum permite a troca de ideias multissensoriais em discussões casuais e formação de consenso rápida em debates."
 building_hypercomms_forum_effect: "Produz §G3§! £unity£ para cada §YRegalia da Ascensão§! tomada pelo nosso Império.\n\n"
 building_autocurating_vault: "Cofre de Curadoria Automática"
 building_autocurating_vault_desc: "Uma rede computadorizada altamente especializada constantemente adquire, analisa, avalia e exibe artefatos do dia a dia que considera importantes, criando um museu vivo do presente."
 building_temple: "Templo"
 building_temple_desc: "Construções simples erguidas desde os tempos antigos, templos são locais de contemplação silenciosa e comunhão com aquilo que nos une."
 building_holotemple: "Holotemplo"
 building_holotemple_desc: "Uma forma aprimorada de seus antecessores primitivos, o mais recente na tecnologia Espiritualista cria uma realidade mutável dentro do Holotemplo - tudo voltado para uma meditação mais profunda e devoção mais intensa."
 building_sacred_nexus: "Nexus Sagrado"
 building_sacred_nexus_desc: "Os desenvolvimentos mais recentes na tecnologia de campo permitem aos adoradores experimentarem diretamente a influência divina do solo sagrado."
 building_citadel_of_faith: "Cidadela da Fé"
 building_citadel_of_faith_desc: "Um complexo gigantesco que oferece refúgio e isolamento do mundo material para todos que aqui chegam."
 building_stronghold: "Fortaleza Planetária"
 building_stronghold_desc: "Uma fortaleza planetária que abriga uma força de guarnição substancial para proteger o mundo de invasões e rebeliões."
 building_fortress: "Fortaleza"
 building_fortress_desc: "Um complexo fortaleza gigantesco com uma guarnição expandida e instalações de treinamento para soldados."
 building_bio_reactor: "Bio-Reator"
 building_bio_reactor_desc: "Uma instalação onde a matéria orgânica é convertida em energia em uma taxa altamente eficiente."
 tech_bio_reactor: "$building_bio_reactor$"
 tech_bio_reactor_desc: "$building_bio_reactor_desc$"
 building_bio_reactor_2: "Biorreator Avançado"
 building_bio_reactor_2_desc: "Uma instalação onde a matéria orgânica é convertida em energia a uma taxa altamente eficiente. Melhorias na coleta de dejetos permitem a extração de subprodutos gasosos úteis."
 tech_bio_reactor_2: "$building_bio_reactor_2$"
 tech_bio_reactor_2_desc: "$building_bio_reactor_2_desc$"
 building_hab_stronghold: "Zona de Segurança"
 building_hab_stronghold_desc: "Esta seção do Habitat é dedicada à segurança e fornece uma força de segurança armada para proteger o Habitat de ameaças de dentro e de fora."
 building_crude_huts: "Cabanas Rudes"
 building_crude_huts_desc: "Abrigos primitivos feitos de pedra, argila ou quaisquer outros materiais disponíveis."
 building_primitive_dwellings: "Habitações Primitivas"
 building_primitive_dwellings_desc: "Estas pequenas construções fornecem uma quantidade mínima de abrigo, mas estão protegidas contra o tempo."
 building_stone_palace: "Palácios de Pedra"
 building_stone_palace_desc: "Palácios primitivos construídos de pedra, onde a elite local reside."
 building_primitive_capital: "Capitais Regionais"
 building_primitive_capital_desc: "As construções de capitais regionais dos diversos Estados-Nação que habitam este mundo primitivo."
 building_urban_dwellings: "Habitações Urbanas"
 building_urban_dwellings_desc: "Selvas de concreto aglomeradas e geralmente poluídas."
 building_pre_ftl_radio_telescope: "Matriz de Radiotelescópios"
 building_pre_ftl_radio_telescope_desc: "Uma matriz de radiotelescópios que estão em busca de vida alienígena inteligente."
 awareness_gain_desc: "Aumenta a chance de esta civilização obter £awareness£ §YConscientização§! com o tempo."
 building_hive_crude_huts: "Ninhos Simples"
 building_hive_crude_huts_desc: "Por conterem os materiais mais simples e mais fáceis de manipular, estes ninhos quase nem servem para proteger os drones do frio durante a noite."
 building_hive_primitive_dwellings: "Colônia Inicial"
 building_hive_primitive_dwellings_desc: "Começando a otimizar o espaço disponível, este tipo de construção em formato de hexágono pode abrigar o que, de certa forma, seria chamado de colônia."
 building_hive_stone_palace: "Colmeia de Pedra"
 building_hive_stone_palace_desc: "Em um mundo em que você precisa competir com a sua própria espécie para sobreviver, ter paredes de pedra é uma vantagem."
 building_hive_primitive_capital: "Nexus Continental"
 building_hive_primitive_capital_desc: "Um típico ponto central do continente que abriga colmeias que disputam o controle deste mundo."
 building_hive_urban_dwellings: "Armazenamento de Drones"
 building_hive_urban_dwellings_desc: "Uma solução útil para abrigar drones quando estão no ciclo de descanso. Há entradas e saídas separadas para otimizar o processo de recarga da colmeia."
 building_hive_primitive_factory: "$building_primitive_factory$"
 building_hive_primitive_factory_desc: "$building_primitive_factory_desc$"
 building_hive_primitive_mine: "$building_primitive_mine$"
 building_hive_primitive_mine_desc: "$building_primitive_mine_desc$"
 building_hive_primitive_power_plant: "$building_primitive_power_plant$"
 building_hive_primitive_power_plant_desc: "$building_primitive_power_plant_desc$"
 building_hive_primitive_farm: "$building_primitive_farm$"
 building_hive_primitive_farm_desc: "$building_primitive_farm_desc$"
 building_hive_primitive_node: "Nódulo Sináptico Simples"
 building_hive_primitive_node_desc: "Por meio deste nódulo sináptico rudimentar, a vontade da Colmeia será fortalecida."
 building_machine_primitive_node: "Nó de Uplink Simples"
 building_machine_primitive_node_desc: "Um nó de uplink rudimentar que reduz a latência planetária."
 building_farming_districts_1: "Hub de Desenvolvimento de Cultivo"
 building_farming_districts_1_desc: "Um centro burocrático modesto encarregado de inspecionar terras cultiváveis e dar início à expansão da agricultura planetária."
 building_farming_districts_2: "Centro de Recuperação de Solo"
 building_farming_districts_2_desc: "Este centro se dedica à restauração de terras degradadas e ao aumento da produção, permitindo o crescimento dos distritos agrícolas."
 building_farming_districts_3: "Complexo Agrícola Automatizado"
 building_farming_districts_3_desc: "Extratores mecanizados, frotas de drones e campos climatizados permitem a rápida expansão dos distritos agrícolas."
 building_farming_districts_4: "Rede de Cultivo Planetário"
 building_farming_districts_4_desc: "Um vasto complexo integrado que supervisiona operações agrícolas intensivas e de alta densidade, maximizando o número de distritos agrícolas suportados no planeta."
 building_mine_generic: "Depósito de Pedreira de Superfície"
 building_mine_generic_desc: "Ao coordenar escavações rasas e a coleta de minérios, este depósito facilita a expansão inicial dos distritos de mineração."
 building_mining_districts_1: "Sítio de Mineração Industrial"
 building_mining_districts_1_desc: "Equipamentos de escavação, sistemas de esteiras e matrizes de organização operam em conjunto para manter uma produção constante e permitir a expansão inicial dos distritos de mineração."
 building_mining_districts_2: "Matriz de Perfuração de Núcleo"
 building_mining_districts_2_desc: "Uma instalação que realiza operações de mineração em camadas mais profundas com o uso de perfuratrizes pesadas e reforços estruturais, liberando novos depósitos minerais."
 building_mining_districts_3: "Pátio de Perfuração Sísmica"
 building_mining_districts_3_desc: "Um complexo equipado para escavação subterrânea de alta eficiência e estabilização estrutural, ampliando o acesso a veios minerais antes inalcançáveis."
 building_mining_districts_4: "Grade de Extração da Crosta Profunda"
 building_mining_districts_4_desc: "Uma instalação extensa operando na máxima profundidade planetária, gerenciando zonas de extração totalmente industrializadas e viabilizando uma maior expansão dos distritos de mineração."
 building_generator_generic: "Pátio de Produção Voltaico"
 building_generator_generic_desc: "Dedicado à geração de energia em larga escala, esta construção abriga células de energia, canais de plasma e matrizes de geradores de alta produção."
 building_generator_districts_1: "Complexo de Obras Condutivas"
 building_generator_districts_1_desc: "Este complexo suporta a criação de novos distritos geradores ao distribuir a infraestrutura da rede base e os sistemas de manejo de energia."
 building_generator_districts_2: "Complexo de Transmissores de Subestação"
 building_generator_districts_2_desc: "Ao implantar transmissores de alta capacidade, pátios de transformadores e nódulos de estabilização de rede, esta instalação amplia a infraestrutura energética planetária necessária para o desenvolvimento de distritos geradores."
 building_generator_districts_3: "Matriz de Regulação de Plasma"
 building_generator_districts_3_desc: "Um complexo onde fluxos de plasma estabilizados e controle de ressonância de circuitos permitem um maior desenvolvimento dos geradores em todo o planeta."
 building_generator_districts_4: "Nexus Planetário"
 building_generator_districts_4_desc: "Este nexus de energia integrado coordena operações de geração em escala planetária, viabilizando a máxima expansão dos distritos geradores."
 ####################################
 #Wonders
 ####################################
 building_xeno_zoo: "Zoológico Alienígena"
 building_xeno_zoo_plural: "Zoológicos Alienígenas"
 building_xeno_zoo_desc: "Uma reserva dedicada à preservação e ao estudo da fauna local."
 building_fe_xeno_zoo: "Reserva Xeno"
 building_hab_capital: "Administração de Habitat"
 building_hab_capital_desc: "O hub administrativo do Habitat, que serve como sua capital e sede do governo local."
 building_hab_capital_tooltip: "£mod_planet_max_districts_add£ Espaços de Distrito Máximos de Corpos Celestes Grandes: §G+0.25§!\n"
 building_hab_solar_power_processor: "Processador de Energia Solar"
 building_hab_solar_power_processor_desc: "Processadores de Energia Solar distribuem energia solar capturada em redes vastas de painéis solares localizados no casco exterior do Habitat."
 building_hab_astro_mining_facility: "Baía de Astromineração"
 building_hab_astro_mining_facility_desc: "Sem recursos naturais próprios, os Habitats dependem destas instalações para extrair e processar minerais dos asteroides e planetoides próximos."
 building_hab_agri_bay: "Zona Agrária"
 building_hab_agri_bay_desc: "Uma seção do Habitat separada para o cultivo de várias plantas e animais necessários para a população local."
 building_hab_cultural_center: "Distrito de Lazer"
 building_hab_cultural_center_desc: "Este complexo espalhado cuida das necessidades sociais e culturais dos habitantes do Habitat."
 building_hab_laboratory_module: "Complexo de Laboratórios"
 building_hab_laboratory_module_desc: "Uma seção do Habitat dedicada inteiramente às pesquisas científicas."
 building_fe_xeno_zoo_desc: "Uma reserva altamente sofisticada que mantém perfeitamente o habitat natural das espécies alienígenas 'preservadas'."
 building_paradise_dome: "Domo Paraíso"
 building_paradise_dome_desc: "Um domo de habitação totalmente envolto com um ecossistema auto-contido, um verdadeiro paraíso privado para aqueles ricos ou sortudos o suficiente de morarem lá."
 building_monument: "Monumento"
 building_monument_desc: "Um monumento honrando um grande governante."
 building_monument_proper: "Monumento de [GetRulerName]"
 building_monument_desc_proper: "Um monumento colossal honrando [GetRulerName]."
 building_grand_mausoleum: "Grande Mausoléu"
 building_grand_mausoleum_desc: "Um imenso mausoléu construído para abrigar o túmulo de um grande governante."
 building_grand_mausoleum_proper: "Grande Mausoléu de [GetRulerName]"
 building_grand_mausoleum_desc_proper: "O sagrado mausoléu do venerável [GetRulerName]."
 building_grand_mausoleum_allowed_tooltip: "É necessário ter um §YGovernante§!\nÉ necessário ter uma\n§YAdministração Planetárias§!,\n§YCapital Planetária§!, ou\n§YComplexo Capital do Império§!\nconstruído no planeta"
 building_royal_gardens: "Jardins Reais"
 building_royal_gardens_desc: "Um grande jardim recreativo onde as pessoas podem se juntar e lembrar alegremente de um grande governante."
 building_royal_gardens_proper: "Jardins Reais de [GetRulerName]"
 building_royal_gardens_desc_proper: "Um jardim fantástico desenvolvido pelo grande [GetRulerName]."
 building_galactic_stock_exchange: "Mercado de Ações Galático"
 building_galactic_stock_exchange_desc: "Ao fazer parte do livre comércio de bens e serviços, permitimos que uma economia mais especializada onde um indivíduo pode focar no que eles são bons e trocar por outras necessidades."
 building_ministry_production: "Ministério da Produção"
 building_ministry_production_desc: "O Ministério da Produção trabalha incansavelmente para organizar e facilitar a manufatura em todo o planeta."
 building_production_center: "Centro de Processamento de Recursos"
 building_production_center_desc: "Uma instalação vasta que centraliza a manipulação de recursos e a manufatura por todo o planeta."
 building_supercomputer: "Supercomputador Planetário"
 building_supercomputer_desc: "Um único supercomputador colossal que pode executar cálculos incrivelmente complexos, melhorando a capacidade de pesquisa do planeta inteiro."
 building_hyper_entertainment_forum: "Fóruns de Hiper-Entretenimento"
 building_hyper_entertainment_forum_desc: "Estes complexos de entretenimento gigantescos é onde os sonhos se realizam. Shoppings, restaurantes, parques de diversão, fliperamas e mais. O que você sonhar, nós somos!"
 building_institute: "Instituto de Pesquisa"
 building_institute_desc: "O Instituto de Pesquisa é um complexo gigantesco que reúne as tecnologias mais recentes de campos diversos em uma sinergia nunca antes vista, melhorando a produção de pesquisa do planeta inteiro."
 building_virtual_combat_arena: "Arena de Combate Virtual"
 building_virtual_combat_arena_desc: "A Arena de Combate Virtual serve tanto como entretenimento como uma forma de melhorar a unidade comunal. Exércitos locais também podem utilizar a Arena de Combate Virtual para exercícios."
 building_monument_purity: "Monumento à Pureza"
 building_monument_purity_desc: "$tech_purity_campaigns_desc$"
 building_orillium_factory: "Fábrica de Explosivos Orillium"
 building_orillium_factory_desc: "As qualidades únicas do minério de Orillium permitem que ele seja processado em um explosivo facilmente ajustável, especialmente feito para explosões controladas em operações de mineração profundas."
 building_pitharan_plant: "Usina de Fertilizantes Pitharan"
 building_pitharan_plant_desc: "Usinas de Fertilizante Pitharan produzem fertilizantes que usam poeira Pitharan como um aditivo, melhorando as produções agrícolas."
 building_military_academy: "Academia Militar"
 building_military_academy_desc: "Academias Militares melhoram as taxas de recrutamento locais e oferecem um padrão maior de treinamento."
 building_symbol_unity: "Símbolo da Unidade"
 building_symbol_unity_desc: "$tech_symbol_unity_desc$"
 building_visitor_center: "Centro de Visitantes"
 building_visitor_center_desc: "$tech_visitor_center_desc$"
 building_alien_sanctuary: "Santuário Alienígena"
 building_alien_sanctuary_desc: "$tech_alien_sanctuary_desc$"
 building_psi_corps: "Brigada Psi"
 building_psi_corps_desc: "[GetIndividualNamePlural] com capacidades psiônicas vêm aqui de todo o império para treinar suas habilidades.\n\n§YA Brigada Psi é sua [GetPsiCorpFriend]. Confie na Brigada.§!"
 psionic_bonus_workforce_from_telepaths_tt: "A $mod_psionic_pop_bonus_workforce_mult$ aumenta com Empregos de [telepath.GetIcon] [telepath.GetName]"
 building_hive_synapse: "Sinapse Colmeia"
 building_hive_synapse_desc: "Impulsionar o sinal de nossa Mente-Colmeia faz com que nossos drones sejam trabalhadores mais eficientes."
 building_xenology_center: "Centro de Xenologia"
 building_xenology_center_desc: "Ao colecionar membros de espécies mais fracas em um local, podemos estudá-los e exibí-los como prova de nossa superioridade."
 building_symbol_purity: "Símbolo de Pureza"
 building_symbol_purity_desc: "$tech_symbol_unity_desc$"
 building_control_center: "Centro de Controle"
 building_control_center_desc: "Ao construir hubs de processamento poderosos podemos otimizar a eficiência operacional de nossos drones."
