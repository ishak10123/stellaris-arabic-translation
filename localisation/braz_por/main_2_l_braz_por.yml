 slavery_normal: "Escravidão Tradicional"
 slavery_normal_tooltip: "§HEscravos Gado§! têm produção de recursos aumentada mas não podem ser empregados em §Y$pop_cat_ruler$§! ou §Y$pop_cat_specialist$§! ."
 slavery_normal_tooltip_delayed: "§LEscravidão Tradicional é a forma mais comum de escravidão na galáxia. Seja durante a vida ou por um tempo limitado, o acesso irrestrito ao trabalho de outros é em algumas partes visto como um privilégio com inúmeros deveres em contra partida, e em outros lugares considerado um pré-requisito evidente para uma sociedade funcional.§!"
 slavery_domestic: "Servidão Doméstica"
 slavery_domestic_tooltip: "§HServos Domésticos§! que não possuem outro emprego serão designados como Servos, aumentando os £amenities£ $PLANET_AMENITIES_TITLE$. Eles não podem exercer Empregos de £pop_cat_ruler£ §Y$pop_cat_ruler$§! ou £pop_cat_specialist£ §Y$pop_cat_specialist$§!, exceto trabalhando como [entertainer.GetIcon] §Y[entertainer.GetNamePlural]§!."
 slavery_domestic_tooltip_delayed: "§LServos domésticos passam boa parte do seu tempo atendendo às necessidades dos Pops livres - alguns são designados para domicílios individuais, enquanto outros cuidam de espaços públicos. Eles tendem a viver junto com seus mestres e por isso quase não precisam de moradia dedicada.§!"
 slavery_military: "Servos de Batalha"
 slavery_military_tooltip: "§HServos de Batalha§! não oferecem benefícios à produção de recursos, mas são excelentes soldados para os §HExércitos§! locais. Eles podem exercer empregos de [enforcer.GetIcon] §Y[enforcer.GetName]§!, [soldier.GetIcon] §Y[soldier.GetName]§! ou £pop_cat_worker£ §Y$pop_cat_worker$§!."
 slavery_military_tooltip_delayed: "§LServos de Batalha são servos armados, geralmente treinados nas artes marciais desde o seu nascimento e condicionados à obediência absoluta. Em troca de serviço militar inquestionável, eles recebem muito mais autonomia que outros escravos e podem ser empregados em diversos outros trabalhos.§!"
 slavery_livestock: "Gado"
 slavery_livestock_tooltip: "£pop£ §HPops Gado§! não podem produzir recursos, mas são mantidos por perto para aumentar o suprimento de £food£ §HComida§!.\n\nEm vez disso, o Gado Litoide produz £minerals£ §HMinerais§! e o Gado Termófilo produz £alloys£ §HLigas Metálicas§!.\n\nAmbos podem ser mantidos em §HZoológicos Alienígenas§! para fornecer $r_amenities$."
 slavery_livestock_tooltip_delayed: "§LPops são Gado!§!"
 slavery_indentured: "Servidão Contratada"
 slavery_indentured_tooltip: "§HServos Contratados§! podem ter Empregos de £pop_cat_worker£ §Y$pop_cat_worker$§! ou £pop_cat_specialist£ §Y$pop_cat_specialist$§! e possuem mais poder político que outros escravos. Eles não podem exercer Empregos de [entertainer.GetIcon] §Y[entertainer.GetNamePlural]§! ou [enforcer.GetIcon] §Y[enforcer.GetNamePlural]§!. Os bônus de produção baseados na escravidão só se aplicam quando empregados como £pop_cat_worker£ §Y$pop_cat_worker_plural$§!."
 slavery_indentured_tooltip_delayed: "§LTeoricamente eles conseguem pagar suas dívidas e serem libertos, mas seus contratos foram estruturados de maneira intencional pra fazer com que isso não seja possível.§!"
 living_standard_utopian: "Abundância Utópica"
 living_standard_utopian_tooltip: "$living_standard_utopian$ garante que todos os membros desta espécie tenham acesso a quase qualquer tipo de luxo imaginável.\n\n$UTOPIAN_ABUNDANCE_POP_EFFECTS$\n\n$CIVILIANS_PRODUCE_UNITY_RESEARCH$"
 living_standard_utopian_tooltip_delayed: "§LNão podemos eliminar realisticamente todas as vontades ao suprir todas as necessidades. Mas podemos tentar.§!"
 living_standard_shared_burden: "Fardos Compartilhados"
 living_standard_shared_burden_tooltip: "$living_standard_shared_burden$ garante uma distribuição igualitária de recursos entre todos os membros da sociedade.\n\n$SHARED_BURDEN_POP_EFFECTS$\n\n$UNEMPLOYED_PRODUCE_UNITY$"
