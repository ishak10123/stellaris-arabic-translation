 MACRO_BUILDER_TITLE: "§EHub de Exércitos de Ataque§!"
 MACRO_BUILDER_DESC: "O §YHub de Exércitos de Ataque§! proporciona uma forma fácil de reunir muitos Exércitos de Ataque. Os exércitos serão reunidos nos planetas disponíveis deste Setor.\n\nEm seguida, eles reforçarão qualquer §YExército§! com o comando §YReunir Tropas§! ativo ou se agruparão nesta Base Estelar."
 MACRO_BUILDER_CAPACITY_DESC: "O número de £planet£§YPlanetas§! disponíveis determina quantos exércitos podem ser formados em paralelo. Os planetas podem ser excluídos do §YHub de Exércitos de Ataque§! na aba Exército da Visão Planetária."
