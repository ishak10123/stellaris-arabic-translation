 TECH_UNLOCK_COMBAT_COMPUTERS_1_TITLE: "§HLibera o Componente:§! Funções Básicas de Combate"
 TECH_UNLOCK_COMBAT_COMPUTERS_1_DESC: "§HFunções Básicas de Combate§!\nProgresso recente em teoria comportamental de IA permite que designemos funções específicas de combate para nossos computadores de bordo."
 TECH_UNLOCK_COMBAT_COMPUTERS_2_TITLE: "§HLibera o Componente:§! Funções Avançadas de Combate"
 TECH_UNLOCK_COMBAT_COMPUTERS_2_DESC: "§HFunções Avançadas de Combate§!\nAvanços maiores em algoritmos de combate adaptativos permitem que nossa IA de bordo gerencie sua função designada de maneira mais eficaz."
 TECH_UNLOCK_COMBAT_COMPUTERS_3_TITLE: "§HLibera o Componente:§! IA de Combate Senciente"
 TECH_UNLOCK_COMBAT_COMPUTERS_3_DESC: "§HIA de Combate Senciente§!\nExplorar a noção de auto-preservação de nossa IA senciente, ou medo da morte, poderá aumentar imensamente sua responsividade em combate."
 TECH_UNLOCK_COMBAT_COMPUTERS_AUTONOMOUS_TITLE: "§HLibera o Componente:§! Intelectos de Naves Autônomos"
 TECH_UNLOCK_COMBAT_COMPUTERS_AUTONOMOUS_DESC: "§HIntelectos de Naves Autônomos§!\nAo conceder às nossas naves seu próprio intelecto semi-autônomo sua capacidade de resposta aumenta imensamente."
 TECH_UNLOCK_HYPERDRIVE_1_TITLE: "§HLibera o Componente:§! Hiperestrada I"
