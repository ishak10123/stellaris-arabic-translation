 #Origin Events
 TIMELINE_EVENT_GALACTIC_DOORSTEP_TOOLTIP: "§H$origin.1050.name$§!\n§YEvento de Origem§!\n\nNossas naves agora podem cruzar para o outro lado, e como último presente, seus criadores revelaram os segredos de sua construção. O que antes era um mistério agora ficou claro. Em breve, construiremos nossos próprios portais, tornando as viagens pelo império quase instantâneas."
 TIMELINE_EVENT_GALACTIC_DOORSTEP: "A Coroa Negra Se Abre\n§L[GetDate]§!"
 TIMELINE_EVENT_LOST_COLONY_TOOLTIP: "§HMundo Natal Descoberto§!\n§YEvento de Origem§!\n\nFizemos contato com a civilização que originou nossa colônia perdida. Embora o tempo e a distância tenham nos transformado, nossas raízes agora são claras. Os ecos desse passado compartilhado moldarão nosso futuro."
 TIMELINE_EVENT_LOST_COLONY: "Um Lar Outrora Perdido\n§L[GetDate]§!"
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION_TOOLTIP: "§HMundo-Maquinário Criado§!\n§YEvento de Origem§!\n\nForjamos um verdadeiro Mundo-Maquinário, desprovido de ineficiência e degradação orgânica. O futuro será construído sobre o aço e governado por algoritmos."
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION: "Mundos Reforjados\n§L[GetDate]§!"
 TIMELINE_EVENT_REMNANTS_TOOLTIP: "§HEcumenópolis Restaurada§!\n§YEvento de Origem§!\n\nNosso império recuperou a antiga glória de seu mundo natal. Outrora uma relíquia arruinada, agora ele voltou a ser uma grandiosa Ecumenópolis, um atestado da tenacidade e ambição de nossa civilização."
 TIMELINE_EVENT_REMNANTS: "Mundos Reforjados\n§L[GetDate]§!"
 TIMELINE_EVENT_SHATTERED_RING_TOOLTIP: "§HMundo-Anel Restaurado§!\n§YEvento de Origem§!\n\nAs ruínas destroçadas de nosso sistema natal foram totalmente recuperadas. O que antes era um cemitério da ambição perdida agora brilha como o farol da civilização."
 TIMELINE_EVENT_SHATTERED_RING: "Círculo Completo\n§L[GetDate]§!"
 TIMELINE_EVENT_LEGENDARY_LEADER_TOOLTIP: "§HDestino Cumprido§!\n§YEvento de Origem§!\n\nA jornada da Liderança Luminar finalmente chegou ao último estágio. Seu governo permanecerá inabalável, moldando o império eternamente, ou marcará o nascimento de uma nova era onde a liderança será compartilhada, reescrevendo o futuro."
 TIMELINE_EVENT_LEGENDARY_LEADER: "O Destino Final\n§L[GetDate]§!"
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE_TOOLTIP: "§HTúnel do Véu Construído§!\n§YEvento de Origem§!\n\nO manto entre realidades foi levantado e o primeiro Túnel do Véu agora conecta nossa dimensão ao desconhecido. Através desta fenda, distância e tempo se misturam, criando uma passagem onde antes era apenas vazio. Veremos que mistérios e perigos se encontram além."
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE: "Além do Manto\n§L[GetDate]§!"
 TIMELINE_EVENT_VOID_DWELLERS_TOOLTIP: "§HConstruiu um Habitat§!\n§YEvento de Origem§!\n\nDo vazio nos reerguemos. A construção de nosso primeiro habitat adicional marca a expansão de nosso domínio celestial, garantindo que nosso povo nunca conheça o fardo de existências planetárias."
 TIMELINE_EVENT_VOID_DWELLERS: "Um Lar entre as Estrelas\n§L[GetDate]§!"
 TIMELINE_EVENT_OCEAN_PARADISE_TOOLTIP: "§HDominou os Mares§!\n§YEvento de Origem§!\n\nCom o poder do domínio Hidrocêntrico, moldamos nosso mundo natal, expandindo seus vastos oceanos para além de seus limites naturais. As marés se curvaram à nossa vontade, e em breve, o resto da galáxia fará o mesmo."
 TIMELINE_EVENT_OCEAN_PARADISE: "Captura das Marés\n§L[GetDate]§!"
 TIMELINE_EVENT_DOOMSDAY_TOOLTIP: "§HMundo Natal Destruído§!\n§YEvento de Origem§!\n\nO inevitável aconteceu. Nosso mundo natal, outrora próspero, sucumbiu ao destino, se desfazendo em um cataclismo de fogo e fúria. O vazio agora contém as cinzas de nosso passado. Apenas aqueles que conseguiram escapar carregam o nosso futuro."
 TIMELINE_EVENT_DOOMSDAY: "O Último Dia\n§L[GetDate]§!"
 TIMELINE_EVENT_EVOPRED_ABSORB_TOOLTIP: "§HCaracterística de Espécie Absorvida§!\n§YEvento de Origem§!\n\nAbsorvemos material genético novo pela primeira vez. Que delícia."
 TIMELINE_EVENT_EVOPRED_ABSORB: "Absorveu Material Genético\n§L[GetDate]§!"
 TIMELINE_EVENT_WORMHOLE_DEFENDED_TOOLTIP: "A Incubadora Abandonada e suas frotas foram destruídas em §L[GetDate]§!"
 TIMELINE_EVENT_WORMHOLE_DEFENDED: "Buraco de Minhoca Defendido\n§L[GetDate]§!"
 #Crisis Events
 TIMELINE_EVENT_CRISIS_GREAT_KHAN_TOOLTIP: "§HGrande Khan§!\n§YEvento de Crise§!\n\nUm novo senhor da guerra uniu os clãs saqueadores fragmentados, tornando-os uma horda implacável. Com plasma e fibra de carbono, o Grande Khan atravessa a galáxia, derrubando impérios e escravizando mundos. Frotas são incapazes de resistir à sua força enquanto invasores outrora anárquicos agora se unem sob propósitos aterrorizantes. A era do saque acabou, e deu lugar à era da conquista."
 TIMELINE_EVENT_CRISIS_GREAT_KHAN: "Horda Liberada\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST_TOOLTIP: "§HTempestade Cinzenta§!\n§YEvento de Crise§!\n\nOs Portões-L se abriram, liberando frotas de guerra antigas da Tempestade Cinzenta. As naves deixam um rastro de destruição pela galáxia, aniquilando tudo pelo caminho; sem diplomacia, sem misericórdia, apenas uma replicação implacável. Planetas são silenciados, frotas inteiras são apagadas da existência e o terror se espalha. O passado voltou e agora tudo parece idêntico."
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST: "O Despertar\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_FORMLESS_TOOLTIP: "§HAmorfos§!\n§YEvento de Crise§!\n\nFuturos refugiados se viram obrigados a revidar. Os seres de energia conhecidos como os Amorfos descobriram que nossa galáxia não é um lugar seguro. Eles infestarão o universo com invasores extraplanares ou morrerão tentando."
 TIMELINE_EVENT_CRISIS_FORMLESS: "A Fúria dos Amorfos\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE_TOOLTIP: "§HPraga de Vermes do Vazio§!\n§YEvento de Crise§!\n\nA natureza dos Vermes do Vazio mudou. Quando atingiram uma massa crítica, eles entraram em um frenesi de acasalamento. Crescendo descontroladamente, eles agora querem extinguir todas as formas de vida da galáxia antes de involuntariamente acabarem com seu próprio ciclo de vida."
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE: "Fome Agonizante\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_UNBIDDEN_TOOLTIP: "§HIndesejados§!\n§YEvento de Crise§!\n\nUma ruptura no tecido da existência liberou uma invasão de seres puramente feitos de energia. Eles não negociam nem recuam, apenas consomem sistemas inteiros para alimentar sua expansão infinita. Suas âncoras estabilizam a fenda, atraindo mais de sua espécie para nossa dimensão. Os Indesejados chegaram."
 TIMELINE_EVENT_CRISIS_UNBIDDEN: "A Fenda Se Abre\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE_TOOLTIP: "§HCaleidoscópio§!\n§YEvento de Crise§!\n\nUm ser de energia faminto conhecido como Caleidoscópio entrou na galáxia e começou a se alimentar de sistemas habitados. Seu apetite é infinito e ele parece se distrair com facilidade. Logo entrará em colapso e voltará ao pó estelar."
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE: "O Espectro Faminto\n§L[GetDate]§!"
 TIMELINE_EVENT_BECOME_THE_CRISIS_TOOLTIP: "§HTorne-se a Crise§!\n§YEvento de Crise§!\n\nA galáxia se tornou um lugar mais sombrio. [EVENT_TARGET_0.GetName] abandonou qualquer tentativa de diplomacia e se declarou a maior ameaça à existência galáctica. Suas frotas estão sendo mobilizadas, e espiões sussurram sobre um plano apocalíptico. Não são mais apenas um império, são uma crise."
 TIMELINE_EVENT_BECOME_THE_CRISIS: "Nêmesis Galáctico\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE_TOOLTIP: "§HPraga Prethoryn§!\n§YEvento de Crise§!\n\nOs Prethoryn vieram de além dos limites da galáxia. Suas naves biológicas cruzaram as estrelas como um enxame, deixando apenas mundos infestados em seu rastro. Súplicas serão ignoradas perante o ruído da horda."
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE: "A Maré Voraz\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CONTINGENCY_TOOLTIP: "§HContingência§!\n§YEvento de Crise§!\n\nUm sinal frio, calculista e irrefreável pulsa através da galáxia. Sistemas de IA vacilam. Mentes sintéticas se submetem. A Contingência despertou. Formas de guerra implacáveis emergem de Mundos-Maquinários ocultos, executando sua última diretiva: o extermínio total."
 TIMELINE_EVENT_CRISIS_CONTINGENCY: "O Sinal Fantasma\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CETANA_TOOLTIP: "§HCetana§!\n§YEvento de Crise§!\n\nUma voz chama do vazio: \"Minhas crianças, enfim retornei para vocês.\"\n\nCetana, uma antiga inteligência aprisionada há tanto tempo que até mesmo seu nome foi esquecido, agora despertou. Seu propósito é absoluto: eliminar o sofrimento a qualquer custo. Suas frotas movem-se com uma elegância fria, protegendo sua cruzada para trazer até a galáxia uma última era de paz indiferente."
 TIMELINE_EVENT_CRISIS_CETANA: "O Retorno da Rainha\n§L[GetDate]§!"
 TIMELINE_EVENT_HATCH_BEHEMOTH_TOOLTIP: "§HFilhote de Beemote§!\n§YMarco§!\n\nO primeiro Filhote de Beemote eclodiu de seu ovo em §L[GetDate]§!"
 TIMELINE_EVENT_HATCH_BEHEMOTH: "Filhote de Beemote\n§L[GetDate]§!"
 #Galactic Events
 TIMELINE_EVENT_GALACTIC_MARKET_TOOLTIP: "§HMercado Galáctico§!\n§YEvento Galáctico§!\n\nO comércio une as estrelas. O Mercado Galáctico foi oficialmente estabelecido, se tornando o coração econômico da galáxia. Negociações são feitas e desfeitas livremente, fortunas são geradas e perdidas em um instante e o destino de impérios inteiros agora dependem de oferta e demanda."
 TIMELINE_EVENT_GALACTIC_MARKET: "Comércio Ilimitado\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_TOOLTIP: "§HComunidade Galáctica§!\n§YEvento Galáctico§!\n\nOs impérios da galáxia se uniram sob um único corpo político. A Comunidade Galáctica foi estabelecida e se tornou um fórum onde a diplomacia, o debate e disputas de poder moldarão o futuro das estrelas. Sua verdadeira influência ainda será testemunhada."
 TIMELINE_EVENT_GALACTIC_COMMUNITY: "Uma Nova Ordem\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION_TOOLTIP: "§HResolução Aprovada§!\n§YEvento Galáctico§!\n\nA Comunidade Galáctica se pronunciou. Uma nova resolução vai mudar as leis interestelares. Alguns comemoram, outros desaprovam, mas todos devem obedecer."
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION: "Lei para as Estrelas\n§L[GetDate]§!"
 TIMELINE_EVENT_WAR_IN_HEAVEN_TOOLTIP: "§HGuerra no Paraíso§!\n§YEvento Galáctico§!\n\nAs antigas relíquias se reergueram como supervisores benevolentes e titãs enfurecidos. [EVENT_TARGET_0.GetName] e [EVENT_TARGET_1.GetName], rivais de uma era esquecida, retomaram sua guerra cósmica. Suas frotas obscurecem as estrelas e colocam raças mais novas de joelhos... ou então as aniquilam."
 TIMELINE_EVENT_WAR_IN_HEAVEN: "Guerra dos Antigos\n§L[GetDate]§!"
 TIMELINE_EVENT_NEXUS_STORM_TOOLTIP: "§HTempestade Nexus§!\n§YEvento Galáctico§!\n\nUma tempestade diferente de qualquer outra já vista surgiu no sistema [EVENT_TARGET_0.GetName]. A Tempestade Nexus atravessa sistemas, danificando naves e devastando planetas violentamente."
 TIMELINE_EVENT_NEXUS_STORM: "Uma Tormenta sem Tempo\n§L[GetDate]§!"
