 GROUND_SUPPORT_STANCE_DESC: "§HBombardeio Orbital§!\nA postura do Bombardeio Orbital está definida para '$STANCE|Y$'"
 bombardment_selective_desc: "O Bombardeio $bombardment_selective$ ataca somente locais identificados como militares, tomando cuidado para evitar mortes civis desnecessárias.\n- Dano §YModerado§! a §YExércitos§!\n- Dano §YModerado§! ao §YPlaneta§!\n- Dano §ELeve§! a §YPops§!\n- §RNÃO§! bombardeará planetas indefesos\n- §RNÃO§! matará os últimos §Y$MIN_POPS$§! Pops"
 bombardment_indiscriminate_desc: "O Bombardeio $bombardment_indiscriminate$ ataca a infraestrutura militar e planetária sem levar a morte de civis em consideração.\n- Dano §HPesado§! a §YExércitos§!\n- Dano §HPesado§! ao §YPlaneta§!\n- Dano §YModerado§! a §YPops§!\n- Bombardeará planetas indefesos quando §H$policy_orbital_bombardment_accept_surrender$§! for §H$orbital_bombardment_surrender_forbidden$§! \n- §RNÃO§! matará os últimos §Y$MIN_POPS$§! Pops"
 bombardment_armageddon_desc: "O Bombardeio $bombardment_armageddon$ ataca o planeta com armamentos pesados com o objetivo explícito de maximizar as mortes civis.\n- Dano §YGigantesco§! a §YExércitos§!\n- Dano §YGigantesco§! ao §YPlaneta§!\n- Dano §EGigantesco§! a §YPops§!\n- Bombardeará planetas indefesos\n- Pode reduzir planetas a Mundos-Tumba sem vida"
 bombardment_raiding_desc: "O Bombardeio de $bombardment_raiding$ ataca centros populacionais inimigos com naves de invasão especializadas, que abduzem as pessoas e as trazem para nossos mundos para trabalhar.\n- Dano §ELeve§! a §YExércitos§!\n- Dano §ELeve§! ao §YPlaneta§!\n- §YAbduzirá§! Pops sempre que possível, em vez de matá-los\n- §RNÃO§! abduzirá ou matará o último Pop. Cada exército no planeta aumenta a quantidade de Pops protegidos."
