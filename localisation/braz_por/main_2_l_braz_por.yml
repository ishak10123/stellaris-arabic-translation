 gunship: "Nave de Guerra"
 gunship_desc: "Naves de Guerra servem para enfrentar outras naves com a mesma categoria de tamanho, repletas do maior número possível de armas com alcance médio."
 explosive: "Cerco"
 explosive_desc: "Naves de cerco usam armas teleguiadas que causam um dano enorme a naves grandes, bases estelares e planetas."
 carrier: "Transportador"
 carrier_desc: "Transportadores servem como uma plataforma de lançamento para naves de ataque."
 screen: "Proteção"
 screen_desc: "Naves de proteção têm defesa pontual e fogo antiaéreo, defendendo o resto da frota contra mísseis, torpedos e naves de ataque."
 artillery: "Artilharia"
 artillery_desc: "Naves de artilharia preferem mísseis de longo alcance e armas de fogo direto. Elas tendem a ter dificuldade para enfrentar naves menores ou que se aproximam demais."
 brawler: "Nave de Luta"
 brawler_desc: "Naves de Luta são feitas para combates próximos e causam dano alto, mas têm armas de curto alcance, como canhões automáticos e disruptores."
 energy_torpedoes: "Torpedo de Energia"
 energy_torpedoes_desc: "Naves com Torpedos de Energia preenchem espaços de armas guiadas com Torpedos de Nêutron ou Próton, causando dano adicional a naves grandes. Elas tendem a ser vulneráveis a naves que se aproximam."
 buffer_role: "Suporte"
