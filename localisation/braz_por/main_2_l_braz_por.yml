 civic_tooltip_mechanists_effects: "Começa o jogo com §Y800§! £pop£ §HPops§! robôs e com a tecnologia e infraestrutura para construir mais.\n- $mod_planet_pops_robotics_upkeep_mult$: §G-5%§!\n"
 civic_tooltip_shared_burden_effects: "Permite o Padrão de Vida §Y$living_standard_shared_burden$§!, sob o qual todos os £pop£ §HPops§! têm Manutenção de £consumer_goods£ §Y$consumer_goods$§! moderada, independentemente da §YCamada§!.\n.Desativa o uso da maioria dos demais §YPadrões de Vida§!.\nConcede acesso à Propriedade £building£ §Y$holding_communal_housing_outreach$§!."
