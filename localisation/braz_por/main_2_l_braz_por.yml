 TECH_UNLOCK_TERRAFORMING_NUKED_CHANGE_TITLE: "§HLibera o Recurso:§! Restauração Climática"
 TECH_UNLOCK_TERRAFORMING_NUKED_CHANGE_DESC: "§HRestauração do Clima§!\nPermite terraformar mundos ecologicamente devastados."
 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_TITLE: "§HLibera a Estação:§! Porto Espacial"
 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_DESC: "§HPorto Espacial§!\nUm Porto Espacial é necessário para construir qualquer tipo de nave capaz de voo espacial. Ele pode ser aprimorado com funções adicionais e possui defesas básicas."
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Nave Científica"
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_DESC: "§HNave Científica§!\nA Nave Científica é utilizada como base de operações de um dos melhores Cientistas, pronto para explorar a grandeza do espaço."
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Nave de Construção"
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_DESC: "§HNave de Construção§!\nA Nave de Construção permite a montagem de várias estações espaciais, através do uso de drones de sondagem avançados."
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Nave Colonial"
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_DESC: "§HNave Colonial§!\nNaves Coloniais são naves de uso único para se estabelecer em mundos alienígenas. Após a colonização, a nave é convertida em um abrigo planetário."
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Corveta"
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_DESC: "§HCorveta§!\nA Corveta é a nave militar mais básica, armada e preparada caso ocorra um contato hostil."
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Destróier"
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_DESC: "§HDestróier§!\nUm projeto maior, de duas seções, o Destróier oferece uma grande variedade de opções estratégicas de armamentos."
 TECH_UNLOCK_CRUISER_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Cruzador"
 TECH_UNLOCK_CRUISER_CONSTRUCTION_DESC: "§HCruzador§!\nO Cruzador é o primeiro projeto de três seções, permitindo uma variedade ainda maior de configurações de módulos para aqueles dispostos a pagar o preço."
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Encouraçado"
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_DESC: "§HEncouraçado§!\nA maior configuração comum de casco disponível, o Encouraçado carrega uma força inigualável para a batalha com um custo ainda maior e manobrabilidade reduzida."
 TECH_UNLOCK_TITAN_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Titã"
 TECH_UNLOCK_TITAN_CONSTRUCTION_DESC: "§HTitã§!\nEstas naves de guerra gigantescas são o orgulho da frota. Elas estão abarrotadas de armas e normalmente servem como Naves Capitâneas."
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Juguernauta"
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_DESC: "§HJuguernauta§!\nEstas construções colossais são ao mesmo tempo estações espaciais e naves. A juguernauta é uma estação espacial móvel imensa que pode consertar e construir naves, o que significa que ela pode servir como base de operações avançada durante campanhas ofensivas."
 TECH_UNLOCK_DEFENSE_PLATFORM_TITLE: "§HLibera a Estação:§! Plataforma de Defesa"
 TECH_UNLOCK_DEFENSE_PLATFORM_DESC: "§HPlataforma de Defesa§!\n$tech_space_defense_station_1_desc$"
 TECH_UNLOCK_DEFENSE_STATION_TITLE: "§HLibera a Estação:§! Estação de Defesa"
 TECH_UNLOCK_DEFENSE_STATION_DESC: "§HEstação de Defesa§!\n$tech_space_defense_station_2_desc$"
 TECH_UNLOCK_FORTRESS_TITLE: "§HLibera a Estação:§! Fortaleza"
 TECH_UNLOCK_FORTRESS_DESC: "§HFortaleza§!\n$tech_space_defense_station_3_desc$"
 TECH_UNLOCK_MINING_STATION_TITLE: "§HLibera a Estação:§! Estação de Mineração"
 TECH_UNLOCK_MINING_STATION_DESC: "§HEstação de Mineração§!\nUma Estação de Mineração pode extrair os veios Minerais e recursos valiosos de um planeta a partir da órbita."
 TECH_UNLOCK_RESEARCH_STATION_TITLE: "§HLibera a Estação:§! Estação de Pesquisa"
 TECH_UNLOCK_RESEARCH_STATION_DESC: "§HEstação de Pesquisa§!\nUma Estação de Pesquisa pode estudar vários fenômenos planetários a partir da órbita, acumulando dados científicos valiosos."
 TECH_UNLOCK_AFTERBURNER_1_TITLE: "§HLibera o Componente:§! Pós-Combustores"
 TECH_UNLOCK_AFTERBURNER_1_DESC: "§HPós-Combustores§!\nEstes propulsores poderosos produzem velocidade adicional de combate, mas consomem muita energia."
 TECH_UNLOCK_AFTERBURNER_2_TITLE: "§HLibera o Componente:§! Pós-Combustores Avançados"
 TECH_UNLOCK_AFTERBURNER_2_DESC: "§HPós-Combustores Avançados§!\nEsta versão aprimorada dos pós-combustores tradicionais fornecem ainda mais potência à velocidade de combate de uma nave."
 TECH_UNLOCK_THRUSTER_1_TITLE: "§HLibera o Componente:§! Propulsor Químico"
 TECH_UNLOCK_THRUSTER_1_DESC: "§HPropulsor Químico§!\nPropulsores químicos simples, porém moderadamente eficazes que confiam em combustíveis para gerar propulsão."
 TECH_UNLOCK_THRUSTER_2_TITLE: "§HLibera o Componente:§! Propulsor Iônico"
 TECH_UNLOCK_THRUSTER_2_DESC: "§HPropulsor Iônico§!\nEstes propulsores elétricos utilizam feixes de íons para gerar propulsão sem a necessidade de combustíveis."
 TECH_UNLOCK_THRUSTER_3_TITLE: "§HLibera o Componente:§! Propulsor de Plasma"
 TECH_UNLOCK_THRUSTER_3_DESC: "§HPropulsor de Plasma§!\nUma forma avançada de propulsão elétrica, propulsores de plasma concedem às naves maiores velocidades abaixo da luz e manobrabilidade."
 TECH_UNLOCK_THRUSTER_4_TITLE: "§HLibera o Componente:§! Propulsor de Impulso"
 TECH_UNLOCK_THRUSTER_4_DESC: "§HPropulsor de Impulso§!\nEstes propulsores por fusão altamente avançados fornecem às naves manobrabilidade e velocidade incomparáveis em condições abaixo da luz."
 TECH_UNLOCK_SENSOR_2_TITLE: "§HLibera o Componente:§! $SENSOR_2$"
 TECH_UNLOCK_SENSOR_2_DESC: "§H$SENSOR_2$§!\n$SENSOR_2_DESC$"
