 TECH_BASE_COST: "Custo Base"
 TECH_STARTING: "Tecnologia Inicial"
 RESEARCH_EFFICIENCY: "Velocidade de Pesquisa"
 RESEARCH_EFFICIENCY_DESC: "A Velocidade de Pesquisa representa a eficácia com a qual a produção científica do Império é aplicada, aumentando ou reduzindo a taxa com a qual as tecnologias são liberadas. Este valor é decidido principalmente pela competência do Cientista designado, mas outros fatores também podem ser aplicados."
 REASEARCH_SCIENTIST_EFFICIENCY: "Cientista $LEADER$: $VALUE$"
 TECH_UNLOCK_OUTPOST_CONSTRUCTION_TITLE: "§HLibera a Base Estelar:§! Entreposto"
 TECH_UNLOCK_OUTPOST_CONSTRUCTION_DESC: "§HEntreposto§!\nO tipo mais básico de Base Estelar, Entrepostos são estações com armamentos leves construídas em órbita estelar para estender as fronteiras nacionais. Entrepostos não podem suportar Construções ou Módulos e não são listados no Resumo."
 TECH_UNLOCK_STARPORT_CONSTRUCTION_TITLE: "§HLibera o Aprimoramento da Base Estelar:§! Porto Estelar"
 TECH_UNLOCK_STARPORT_CONSTRUCTION_DESC: "§HPorto Estelar§!\nAo aprimorar o Entreposto, Portos Estelares podem abrigar uma Construção e suportar dois Módulos."
 TECH_UNLOCK_STARHOLD_CONSTRUCTION_TITLE: "§HLibera o Aprimoramento da Base Estelar:§! Complexo Estelar"
 TECH_UNLOCK_STARHOLD_CONSTRUCTION_DESC: "§HComplexo Estelar§!\nAo aprimorar o Porto Estelar, Complexos Estelares podem abrigar duas Construções e suportar quatro Módulos."
 TECH_UNLOCK_STAR_FORTRESS_CONSTRUCTION_TITLE: "§HLibera o Aprimoramento da Base Estelar:§! Fortaleza Estelar"
 TECH_UNLOCK_STAR_FORTRESS_CONSTRUCTION_DESC: "§HFortaleza Estelar§!\nAo aprimorar o Complexo Estelar, Fortalezas Estelares podem abrigar três Construções e um complemento total de Seis Módulos."
 TECH_UNLOCK_CITADEL_CONSTRUCTION_TITLE: "§HLibera o Aprimoramento da Base Estelar:§! Cidadela"
 TECH_UNLOCK_CITADEL_CONSTRUCTION_DESC: "§HCidadela§!\nAo aprimorar a Fortaleza Estelar, Cidadelas são o maior e mais fortificado tipo de Base Estelar e podem abrigar quatro Construções e um complemento total de seis Módulos."
 UNITY_COST_MULT: "Multiplicador de Custo Unitário para o Edito: $VALUE|=2%-$"
 TECH_UNLOCK_FIRE_CONTROL_1_TITLE: "§HLibera o Componente:§! $FIRE_CONTROL_1$"
 TECH_UNLOCK_FIRE_CONTROL_1_DESC: "§H$FIRE_CONTROL_1$§!\n$FIRE_CONTROL_1_DESC$"
 TECH_UNLOCK_ION_CANNON_CONSTRUCTION_TITLE: "§HLibera a Estação:§! $ion_cannon$"
 TECH_UNLOCK_ION_CANNON_CONSTRUCTION_DESC: "§H$ion_cannon$§!\nCanhões de Íons são plataformas de defesa gigantescas que podem ser construídas para orbitar uma base estelar, realizando disparos mortais contra naves inimigas a longa distância."
