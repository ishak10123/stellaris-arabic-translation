 DEPLOY_IN_ORBIT_DESC: "Alterna o ponto de mobilização de §YExércitos§! recém-formados entre §YÓrbita§! ou §YPlaneta§!.\n\n§YExércitos§! formados por meio do §YFormador de Exércitos da Base Estelar§! ainda serão mobilizados em §YÓrbita§!."
