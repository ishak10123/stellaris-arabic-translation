 sacrifice_bounty_mod_overlord_desc: "Nosso Lorde Supremo realizou um ritual estranho, mas generoso. Alguns dos nossos foram sacrificados, mas os que restaram agora estão repletos de uma energia radiante."
 MESSAGE_OVERLORD_SACRIFICE_TITLE: "Iniciados Mortais Sacrificados"
 MESSAGE_OVERLORD_SACRIFICE_DESC: "Os §YIniciados Mortais§! que trabalham para o nosso Lorde Supremo no §Y$holding_sacrificial_shrine$§! foram sacrificados em um ritual."
 necroids.200.name: "Um Sacrifício Feito: União [root.GetAdj]"
 necroids.200.desc: "Um silêncio palpável paira sobre [root.GetName]. Peregrinos viajaram de terras distantes até seus locais de culto escolhidos, formando novos laços e reacendendo antigas amizades ao longo do caminho.\n\nOs rituais de nossa sociedade foram respeitados e incorporados pelos indivíduos [mortal_initiate.GetNamePlural] recém-surgidos, cuja procissão silenciosa despertou tanto sorrisos quanto lágrimas. O principal $job_death_priest$ de [capital_scope.GetName] conduziu um sermão caloroso, convocando os fiéis a cultivarem empatia e zelo em suas relações, prosperando em nossa mutualidade.\n\nQuando cada [mortal_initiate.GetName] avançava para a câmara sacrificial, suspiros coletivos ecoavam. Agora, cada um cumpriu seu destino, deixando um legado de estudo benevolente."
 necroids.200.tooltip.base: "Este sacrifício de [mortal_initiate.GetIcon] [mortal_initiate.GetNamePlural] concedeu um §Hadicional§! de"
 necroids.200.tooltip.1: "$necroids.200.tooltip.base$ §H+6% de produção de £unity£ Unidade§!."
 necroids.200.tooltip.2: "$necroids.200.tooltip.base$ §H+12% de produção de £unity£ Unidade§!."
 necroids.200.tooltip.3: "$necroids.200.tooltip.base$ §H+18% de produção de £unity£ Unidade§!."
 necroids.200.tooltip.4: "$necroids.200.tooltip.base$ §H+24% de produção de £unity£ Unidade§!."
 necroids.200.tooltip.5: "$necroids.200.tooltip.base$ §H+30% de produção de £unity£ Unidade§!."
 necroids.201.name: "Um Sacrifício Feito: Harmonia [root.GetAdj]"
 necroids.201.desc: "Murmurinhos animados percorrem [root.GetName]. Peregrinos aguardam em seus locais de culto, impulsionados por uma empolgação que contrasta com qualquer exaustão física que tenham suportado.\n\nOs rituais de nossa sociedade foram respeitados e incorporados pelos indivíduos [mortal_initiate.GetNamePlural] recém-surgidos, cuja procissão silenciosa foi recebida com gestos de gratidão. O principal $job_death_priest$ de [capital_scope.GetName] conduziu um sermão vigoroso, convocando os fiéis a abraçarem a alegria a cada instante. No ápice do evento, cada [mortal_initiate.GetName] seguia para a câmara sacrificial sob aplausos ensurdecedores. Agora, cada um cumpriu seu destino, deixando um legado de estudo benevolente."
 necroids.201.tooltip.1: "$necroids.200.tooltip.base$ §H+10% £happiness£ Felicidade dos Pops§!."
 necroids.201.tooltip.2: "$necroids.200.tooltip.base$ §H+20% £happiness£ Felicidade dos Pops§!."
 necroids.201.tooltip.3: "$necroids.200.tooltip.base$ §H+30% £happiness£ Felicidade dos Pops§!."
