 sacrifice_harmony_mod_overlord_desc: "Nosso Lorde Supremo realizou um ritual estranho, mas harmonioso. Alguns indivíduos foram sacrificados, mas os que restaram ficaram mais sintonizados com a vida do que nunca."
 edict_sacrifice_bounty: "Sacrifício: Recompensa"
 edict_sacrifice_bounty_desc: "Os mais devotos dentre nós estão preparados para cumprir seus destinos, crentes que nossa sociedade será melhorada pelo seu sacrifício final. Que a morte purifique o caminho para a vida vibrante e gloriosa em sua essência!"
 edict_sacrifice_bounty_tooltip: "§RMata todos os indivíduos [mortal_initiate.GetIcon] [mortal_initiate.GetNamePlural].§! Cada sacrifício aumenta a probabilidade de ganhos adicionais de produção de £minerals£ Minerais e de £energy£ Energia. $edict_sacrifice_unity_boost$"
 sacrifice_bounty_mod: "Sacrifício Adicional: Recompensa"
