 mod_job_mortal_initiate_per_pop_short: "\n§G+1§! £mod_job_mortal_initiate_add£ a cada $VALUE$ £pop£"
 jobs_death_priest_and_mortal_initiate_effect_desc: "$job_death_priest_effect_desc$\n$job_mortal_initiate_effect_desc$"
 edict_sacrifice_unity_boost: "\n\nAumenta a produção de £unity£ Unidade dos £job_death_priest£ $job_death_priest_plural$ enquanto o edito estiver em vigor.\n"
 edict_sacrifice_dummy: "Sacrifícios"
 edict_sacrifice_dummy_desc: "Os mais devotos dentre nós estão preparados para cumprir seus destinos, ansiosos para darem suas vidas pelo bem da nossa sociedade. Com os Sacrifícios de §HUnião§!, §HHarmonia§! e §HRecompensa§!, a espera não é mais necessária."
 edict_sacrifice_dummy_tooltip: "§RMata todos os indivíduos [mortal_initiate.GetIcon] [mortal_initiate.GetNamePlural].§! Cada sacrifício concede um adicional de £unity£ Unidade, Felicidade dos Pops ou produção de £minerals£ Minerais e £energy£ Energia, dependendo do ritual escolhido. $edict_sacrifice_unity_boost$"
 sacrifice_death_priest_mod: "Sacrifício Significativo"
 sacrifice_death_priest_mod_desc: "Um número expressivo dentre os mais devotos encontrou seu destino, causando uma impressão duradoura em nosso clero."
 edict_sacrifice_togetherness: "Sacrifício: União"
 edict_sacrifice_togetherness_desc: "Os mais devotos dentre nós estão preparados para cumprir seus destinos, garantindo que nossa sociedade seja mais unida. Que nossa unidade brilhe sobre a escuridão solitária do espaço!"
 edict_sacrifice_togetherness_tooltip: "§RMata todos os indivíduos [mortal_initiate.GetIcon] [mortal_initiate.GetNamePlural].§! Cada sacrifício aumenta a probabilidade de ganhos adicionais de £unity£ Unidade. $edict_sacrifice_unity_boost$"
 sacrifice_togetherness_mod: "Sacrifício Adicional: União"
 sacrifice_togetherness_mod_desc: "Os mais devotos dentre nós cumpriram seus destinos; seus sacrifícios impulsionam nossa proclamação de união. Que nossa unidade brilhe sobre a escuridão solitária do espaço!"
