 edict_sacrifice_harmony: "Sacrifício: Harmonia"
 edict_sacrifice_harmony_desc: "Os mais devotos dentre nós estão preparados para cumprirem seus destinos. Seu sacrifício final é um momento de celebração alegre de propósito. Que cada dia seja passado em honra de uma boa vida!"
 edict_sacrifice_harmony_tooltip: "§RMata todos os indivíduos [mortal_initiate.GetIcon] [mortal_initiate.GetNamePlural].§! Cada sacrifício aumenta a probabilidade de ganhos adicionais de Felicidade dos Pops. $edict_sacrifice_unity_boost$"
