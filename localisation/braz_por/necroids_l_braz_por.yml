 action.62.memorialist.a: "Eles serão lembrados."
 ### Permanent Employment by Victor Haeggman
 civic_permanent_employment: "Contratação Permanente"
 civic_permanent_employment_desc: "Esta Megacorporação garantiu que todos seus funcionários nunca ficarão sem emprego. Jamais. Quando o tempo de um funcionário chega ao fim, ele será realocado a tarefas mais simples para que ainda possa sustentar sua família e quitar as dívidas."
 civic_tooltip_permanent_employment_effects: "É possível construir o £building£ §Y$building_posthumous_employment_center$§!\n$job_reassigner_effect_desc$\n\n.Concede acesso à Propriedade £building£ §Y$holding_reemployment_center$§!.\n\nAlguns Leviatãs orgânicos derrotados podem ser ressuscitados."
 civic_tooltip_corporate_permanent_employment_effects: "$civic_tooltip_permanent_employment_effects$\nA £building£ §Y$building_food_conglomerate$§! $megacorp_civic_branch_office_building_effect$"
 job_reassigner: "Redesignador"
 job_reassigner_desc: "Redesignadores garantem que os restos mortais de um cidadão da Megacorporação permaneçam no trabalho até o término do contrato."
 job_reassigner_plural: "Redesignadores"
 job_reassigner_effect_desc: "£job_necromancer£ [reassigner.GetNamePlural] transformam £consumer_goods£ §Y$consumer_goods$§! e £food£ §Y$food$§! (ou equivalente) em £mod_logistic_growth_mult£ §Y$MOD_BONUS_POP_GROWTH$§!. Todos os £pop£ Pops montados têm a característica §Y$trait_zombie$§!."
 planet_reassigners: "Empregos de Redesignador"
 mod_job_reassigner_add: "Empregos de [reassigner.GetName]"
 trait_zombie: "Zumbi"
 trait_zombie_desc: "§LOs restos de um ser sapiente outrora orgulhoso; esta carcaça vazia não serve para quase nada além de tarefas simples.§!"
 TRAIT_ZOMBIE_EFFECT: "$MOD_POP_BONUS_WORKFORCE_MULT$: §R-25%§!\n$t$-$civilian_and_maintenance_drone_cat_bonus_workforce_mult$: §R-50%§!\n$t$- Manutenção de Pop reduzida em: §G100%§!\n$t$- Não pode gerar §YLíderes§!\n$t$- Não pode ter Empregos de §Y$pop_cat_ruler$§! ou §Y$pop_cat_specialist$§!"
 building_posthumous_employment_center: "Centro de Contratações Póstumas"
 building_posthumous_employment_center_desc: "No Centro de Contratações Póstumas, carcaças desprovidas de consciência podem encontrar um novo propósito e uma nova oportunidade para quitar as dívidas que deixou em vida."
 edict_sacrifice_bounty_zombie: "$edict_sacrifice_bounty$"
 edict_sacrifice_bounty_zombie_desc: "Os mais devotos dentre nós estão preparados para cumprir seus destinos, crentes que nossa sociedade será melhorada pelo seu sacrifício final. Nossas mortes trarão valores corporativos prósperos e nossos corpos seguirão servindo na corporação."
 edict_sacrifice_bounty_zombie_tooltip: "$edict_sacrifice_bounty_tooltip$\nAdiciona §G+1§! para £mod_logistic_growth_mult£ §Y$MOD_BONUS_POP_GROWTH$§! a todos(as) £job_necromancer£ [reassigner.GetNamePlural]."
 necroids.260.name: "Drones de Decadência Aplicada"
 necroids.260.desc: "Todos os nossos principais executivos estavam em uma reunião holográfica para discutir o aumento das vendas de produtos de higiene para zumbis, quando um dos chefes de Ativos Animados invadiu a sala de conferências: \"Um dos Zumbis em §Y[debt_free_zombie.Planet.GetName]§! conseguiu quitar as dívidas!\" Um burburinho começou até perceberem o que estava diante deles. Uma pausa tomou conta da reunião antes do pandemônio se instaurar. Cada executivo exigiu o direito de saber como isso poderia impactar o abastecimento de trabalhadores reanimados.\n\nApós mais algumas análises, descobriu-se que esse havia sido um caso raro e isolado. Somente os falecidos cujos corpos perduraram por um século inteiro conseguiram quitar suas dívidas; um número proporcionalmente irrisório. Nossa corporação galáctica mal daria conta se eles fossem colocados para descansar."
 necroids.260.a: "Eles conquistaram a liberdade, deixe que descansem."
 necroids.260.b: "Apenas adicione mais alguns zeros às dividas deles."
 zombie_contract_manipulation: "Manipulação de Contrato Zumbi"
 zombie_contract_manipulation_desc: "Este império alterou os contratos de seus zumbis trabalhadores, tornando impossível que consigam quitar suas dívidas."
 ### Cordypectic Drones by Victor Haeggman
 civic_hive_cordyceptic_drones: "Drones Cordicépticos"
 civic_hive_cordyceptic_drones_desc: "Drones altamente especializados. Eles são capazes de infectar hospedeiros simples e de emitir comandos rudimentares. Além disso, são o principal elemento da defesa estelar desta colmeia."
 civic_tooltip_cordyceptic_drones: "- Começa o jogo com §G3§! §HAmebas Reanimadas§!.\n- Espécimes de Fauna Espacial orgânica derrotados são reanimados automaticamente.\n-Alguns Leviatãs orgânicos derrotados podem ser ressuscitados.\n- $reanimator_effect_desc$\n- Ganha £genetic_material£ ['concept_dna'] ao matar Fauna Espacial.\n"
 civic_wilderness_cordyceptic_drones: "Simbiontes Cordicépticos"
 civic_wilderness_cordyceptic_drones_desc: "Simbiontes fúngicos altamente especializados permitem que esta Silvestria se defenda infectando hospedeiros simples e usando comandos rudimentares."
 MESSAGE_REANIMATION_COMPLETE_TITLE: "Reanimação Concluída"
 MESSAGE_REANIMATION_COMPLETE_TIYANKI_DESC: "Uma nova leva de Tiyanki reanimados está pronta para nós em $SYSTEM|Y$. O próximo grupo já está a caminho."
 MESSAGE_REANIMATION_AMOEBA_TIYANKI_DESC: "Uma nova leva de Amebas Reanimadas está pronta para nós em $SYSTEM|Y$. O próximo grupo já está a caminho."
 necroids.310.name: "Antivírus"
 necroids.310.desc: "Os Prethoryn tentaram entrar em §Rnós§!!\n\nO invasor extragaláctico capturou nossos [root.GetNecromancersLower] imediatamente. Depois, a entidade alienígena começou a coletar mais [root.GetIndividualNamePlural] nas proximidades. Nós tivemos que eliminar todos dentro da cápsula de infiltração para manter [Root.GetName] em segurança."
 necroids.310.a: "Eles precisam ser exterminados."
 sm_cordyceptic_reanimation_facility: "Centro de Reanimação Cordicéptica"
 sm_cordyceptic_reanimation_facility_desc: "§LGeralmente, temos que achar indivíduos mortos há pouco tempo para fazer a reanimação, mas com um sistema de geração, podemos fazer uma infiltração em uma fase anterior e ter um suprimento constante de hospedeiros.§!\n"
 requires_tiyanki_spawning_system: "§RPrecisa ser construído em §YTiyana Vek§!, §YTiyun Ort§! ou §YAmor Alveo§!.§!"
 sm_cordyceptic_reanimation_facility_desc_modifier: "Produzirá uma §YFrota Reanimada§! a cada §G5 anos§! quando for construído em sistemas cheios de vida biológica."
