 necroids.201.tooltip.5: "$necroids.200.tooltip.base$ §H+50% £happiness£ Felicidade dos Pops§!."
 necroids.202.name: "Um Sacrifício Feito: Recompensa para o [root.GetName]"
 necroids.202.desc: "Uma sensação de bem-estar já permeia [root.GetName], enquanto peregrinos se reúnem em seus locais de culto. Alguns fazem oferendas, outros aproveitam as inúmeras barracas e vendedores que abastecem nossos locais sagrados.\n\nDiversos rituais foram respeitados e integrados aos indivíduos [mortal_initiate.GetNamePlural] deste ciclo, cuja procissão silenciosa foi adornada com guirlandas de diferentes tipos. O principal $job_death_priest$ de [capital_scope.GetName] conduziu um sermão inspirador, prometendo tempos produtivos e confortáveis para todos.\n\nAo término da pregação, cada [mortal_initiate.GetName] avançou para a câmara sacrificial, cumprindo seu destino e deixando um legado de estudo benevolente."
 necroids.202.tooltip.1: "$necroids.200.tooltip.base$ §H+6% de produção de £minerals£ Minerais e £energy£ Energia§!."
 necroids.202.tooltip.2: "$necroids.200.tooltip.base$ §H+12% de produção de £minerals£ Minerais e £energy£ Energia§!."
 necroids.202.tooltip.3: "$necroids.200.tooltip.base$ §H+18% de produção de £minerals£ Minerais e £energy£ Energia§!."
 necroids.202.tooltip.4: "$necroids.200.tooltip.base$ §H+24% de produção de £minerals£ Minerais e £energy£ Energia§!."
 necroids.202.tooltip.5: "$necroids.200.tooltip.base$ §H+30% de produção de £minerals£ Minerais e £energy£ Energia§!."
 ### Reanimators by Pierre du Plessis
 civic_reanimated_armies: "Reanimadores"
 civic_reanimated_armies_desc: "Dentro desta sociedade, a morte não é impedimento para o serviço militar. Mestres da arte da necromancia reanimam cadáveres, criando exércitos e guardiões que causam medo nos corações dos meros mortais."
 disabled_by_synthetic_ascension: "Incompatível com §YAscensão Sintética§!"
 civic_tooltip_reanimated_armies_effects: "- §Y$job_soldier_plural_with_icon$§! são substituídos por §Y$job_necromancer_plural_with_icon$§!\n- $AVAILABLE_BUILDINGS$ ['building:building_dread_encampment']\n- $AVAILABLE_HOLDINGS$ ['building:holding_dread_outpost']\n- §YExércitos Orgânicos§! derrotados às vezes são ressuscitados como §YExércitos de Mortos-vivos§!\n- §YLeviatãs§! orgânicos derrotados às vezes podem ser ressuscitados.\n- $reanimator_effect_desc$"
 building_dread_encampment: "Acampamento do Terror"
 building_dread_encampment_desc: "É melhor esconder as atividades dos necromantes da vista frágil do público enquanto eles criam hordas de mortos-vivos para lutarem em nossos exércitos."
 job_necromancer_effect_desc: "£job_necromancer£ $job_necromancer_plural$ transformam $r_consumer_goods$ em $r_physics$, $r_society$ e £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!, e geram £defense_army£ §YExércitos de Defesa de Mortos-Vivos§!."
 building_dread_encampment_tt: "- $undead_army_recruitment_tt$\n- $undead_defense_army_recruitment$"
 undead_army_recruitment_tt: "Permite o recrutamento de §Y$undead_army_plural$§!"
 undead_army: "Exército de Mortos-Vivos"
 undead_army_desc: "Soldados mortos-vivos erguidos de seus túmulos por necromantes. Livres do medo da morte, eles causam terror no coração de seus inimigos com sua aparência abominável e ferocidade na batalha!"
 undead_army_plural: "Exércitos de Mortos-Vivos"
 giant_undead_army: "Exército de Morto-Vivo Gigante"
 giant_undead_army_desc: "Um esqueleto gigante pronto para espalhar o caos pelo universo. Ele não será gentil ao invadir um planeta."
 giant_undead_army_plural: "Exércitos de Mortos-Vivos Gigantes"
 undead_defense_army_recruitment: "Substitui §Y$defense_army_plural$ Planetários§! por §Y$undead_defense_army_plural$§!"
 undead_defense_army: "Exército de Defesa de Mortos-vivos"
 undead_defense_army_plural: "Exércitos de Defesa de Mortos-vivos"
 undead_defense_army_desc: "Soldados mortos-vivos retirados da cova por necromantes e ressuscitados para proteger nossos planetas de tudo que possa ameaçá-los!"
 necromancer: "$job_necromancer$"
 job_necromancer: "Necromante"
 job_necromancer_plural: "Necromantes"
 job_necromancer_plural_with_icon: "£job_necromancer£ $job_necromancer_plural$"
 job_necromancer_desc: "Reanimar os mortos para lutarem nos exércitos da nação é um trabalho pesado. só os praticantes mais habilidosos conhecem as artes secretas necessárias para conquistar este feito!"
 planet_necromancers: "Empregos Necromantes"
 mod_job_necromancer_add: "Empregos $job_necromancer$"
 mod_job_necromancer_per_pop: "§G+1§! $job_necromancer$ Emprego a cada $VALUE$ Pops"
 mod_job_necromancer_per_pop_short: "\n§G+1§! £mod_job_necromancer_add£ a cada $VALUE$ £pop£"
 galactic_features.385.reanimated: "Mande os [Owner.GetNecromancersUpper]."
 distar.218.name: "Ressuscitar"
 distar.218.desc.regular: "Depois de um ritual longo, a §YMatriarca Tiyanki§! retornou do além e agora serve à nossa causa."
 distar.218.desc.hive: "Reanimar a §YMatriarca Tiyanki§! foi uma tarefa árdua. Embora já tenhamos ganhado bastante experiência controlando suas crias menores, as habilidades regenerativas da Matriarca drenaram significativamente nossos [root.GetNecromancersLower] cordicépticos. Mas no fim, triunfamos. Nenhum tecido morto pode se adaptar mais rapidamente do que nós.\n\nAgora que controlamos a Matriarca, nós movimentamos os flagelos titânicos."
 distar.218.desc.machine: "A §YMatriarca Tiyanki§! foi reiniciada e redefinida. Agora essa criatura titânica nos servirá como uma entidade orgânica. Com os protocolos matriarcais desativados, esse leviatã operará sob nosso controle."
 distar.5016.desc.regular: "Nossos necromantes devolveram o corpo para o ovo do qual ele saiu e deram novamente vida à §YMortenascida§! para que ela sirva à nossa causa."
 distar.5016.desc.hive: "Devolver a §YMortenascida§! ao ovo e incubá-la novamente acabou se mostrando muito eficiente. Usando a matéria primordial ainda dentro do ovo, nosso grupo de [root.GetNecromancersLower] editou facilmente o corpo para nos servir.\n\nCom a criatura manipulada assim, nós agora controlamos suas asas."
 distar.5016.desc.machine: "Nós utilizamos protocolos de Mecromancia para reanimar a §YMortenascida§! derrotada. Uma bioliga experimental foi usada para forjar asas substitutas."
 it_hungers: "Está com fome."
 leviathans.675.desc.regular: "Depois de muito esforço, nossos necromantes mais uma vez encheram o §YDragonete do Éter§! de energia. A fusão resultante de consciência é instável e preocupante, mas enquanto o sopro superaquecido da criatura estiver funcionando, vamos considerar isso um sucesso."
 leviathans.675.desc.hive: "No início, a biologia do §YDragonete do Éter§! parecia incompreensível. Em vez de sequestrar o sistema nervoso central dele e controlá-lo a partir daí, fomos forçados a substituir cada um dos nervos da criatura por uma cópia de [root.GetIndividualName].\n\nVamos ver se conseguimos fazer a carcaça rosnar."
 leviathans.675.desc.machine: "Os cálculos da carcaça do §YDragonete do Éter§! datam de antes de 922337203685477580-\n\n§RERRO: TAMANHO DE REGISTRO EXCEDIDO.§!\n\nAgora que substituímos sua estrutura interna com reatores experimentais, podemos avançar nos estudos."
 ancrel.4026.desc.regular: "Ela está voando novamente. A antes voraz §YFragmento§! voltou para cuidar do sistema [from.solar_system.GetName], mas, desta vez, ela vai proteger o Rubricador para nós!"
 ancrel.4026.desc.hive: "§YFragmento§!, que já foi uma criatura gananciosa e solitária, agora está em silêncio. Nós nos apossamos do seu corpo inerte e eliminamos a personalidade e os centros de linguagem dela. Como esses sistemas supérfluos foram removidos, nós agora controlamos o seu sopro superaquecido."
 ancrel.4026.desc.machine: "Nós iniciamos os protocolos da Mecromancia e reanimamos a entidade biológica chamada de §YFragmento§!. Pulsos sinápticos estão agindo dentro dos parâmetros esperados. O enorme dragão foi reativado e obedecerá aos nossos comandos."
 distar.340.desc: "A notícia da morte de [Root.Fleet.GetName] se espalhou por [Root.Owner.GetName]. A ameba foi uma companheira bastante presente para a nossa nação por muito tempo. No entanto, nossos necromantes têm estado estranhamente ativos desde que recebemos a fatídica notícia, e agora surgiram com uma solução para nossa nação em luto. Eles não pretendem explicar como isso pode ser feito, mas disseram que podem trazer [Root.Fleet.GetName] de volta."
 distar.340.desc.science: "A notícia da morte de [Root.Fleet.GetName] espalhou-se por [Root.Owner.GetName], apesar de ninguém ter se abalado tanto quanto o Oficial Científico [amoeba_finding_scientist.GetName]. Foi [amoeba_finding_scientist.GetSheHe] quem primeiro descobriu a jovem Ameba Espacial perdida e indefesa, e viu a criatura crescer até a maturidade completa sob sua própria orientação gentil.\n\nAgora, sem o companheirismo silencioso de [Root.Fleet.GetName], [amoeba_finding_scientist.GetName] pode nunca mais ser como era."
 distar.340.a: "Levante, [Root.Fleet.GetName], LEVANTE!"
 distar.340.b: "Deixe a ameba adormecida descansar."
 distar.59.desc: "§Y[reanimated_amoeba.Fleet.GetName]§! vive?! Ou, no mínimo, está se mexendo. Não entendemos exatamente o que [amoeba_finding_scientist.GetName] fez, mas graças ao seu desespero profundo e à sua ciência maluca, nossa querida ameba está entre nós mais uma vez."
 distar.59.desc.science: "§Y[reanimated_amoeba.Fleet.GetName]§! vive?! Ou, no mínimo, está se mexendo. Não entendemos exatamente o que nossos necromantes fizeram, mas graças ao desespero profundo e à ciência maluca deles, nossa querida ameba está entre nós mais uma vez."
 REANIMATE_TIYANKI_MATRIARCH: "Reanimar a Matriarca Tiyanki"
 REANIMATE_TIYANKI_MATRIARCH_DESC: "Nossos [Owner.GetNecromancersLower] bolaram um plano audacioso para trazer a Matriarca Tiyanki de volta dos mortos, a fim de que ela nos sirva e lute ao lado das nossas frotas."
 REANIMATE_VOIDSPAWN: "Reanimar Mortenascida Exterminada"
 REANIMATE_VOIDSPAWN_DESC: "Usando métodos que é melhor não dizer em voz alta, nossos [Owner.GetNecromancersLower] garantem que são capazes de ressuscitar a §YMortenascida§! para que ela nos sirva e lute ao lado das nossas frotas."
 REANIMATE_ROCK_BRAIN: "Reanimar o Cérebro de Pedra"
 REANIMATE_ROCK_BRAIN_DESC: "Apesar do que o antigo ser possa ter pensado, o universo continua a existir fora de seu invólucro morto. Usando uma combinação de técnicas proibidas e ciência nova, nossos necromantes acreditam que podem refutar o solipsismo da criatura falecida."
 REANIMATE_GUARDIAN_DRAGON: "Reacender o Extinto Dragonete do Éter"
 REANIMATE_GUARDIAN_DRAGON_DESC: "Nossos [Owner.GetNecromancersLower] acreditam que podem reacender a centelha dentro do §YDragonete do Éter§! por meio de uma mistura de ritual e ciência: coletando plasma da estrela local, anexando mecanismos cordicépticos ao cadáver e assim por diante."
 REANIMATE_SHARD_DRAGON: "Restaurar Fragmento"
 REANIMATE_SHARD_DRAGON_DESC: "§YFragmento§!, terror dos ratos, guardiã do Rubricador e agora um cadáver, está orbitando a estrela local. Nossos [Owner.GetNecromancersLower] acham que, como a grande criatura protegia o Rubricador em vida, ela deve servir aos novos mestres desse artefato na morte."
 REANIMATE_LOST_AMOEBA: "Reanimar a Ameba Perdida"
 REANIMATE_LOST_AMOEBA_DESC: "Não entendemos muito bem, mas nossos necromantes decidiram trazer de volta nossa querida e falecida ameba."
 REANIMATE_LOST_AMOEBA_DESC_SCIENCE: "Não entendemos muito bem, mas comandados por [amoeba_finding_scientist.GetName], nossos necromantes decidiram trazer de volta nossa querida e falecida ameba."
 #Mechromancy AP event
 necroids.20.name: "Aprimoramento de Mecromancia Instalado"
 necroids.20.desc: "O sucesso na instalação dos protocolos da Mecromancia nos permitirá reanimar alguns Leviatãs mortos. Componentes orgânicos são inferiores a aprimoramentos mecânicos. Nós podemos fabricar a carne e replicar a vida orgânica."
 necroids.20.a: "Funções reanimadoras em operação."
 ### Galactic Memorials (Memorialists) by Gemma Thomson
 building_galactic_memorial_1: "Santuário do Repouso"
 building_galactic_memorial_1_desc: "Este humilde memorial destaca pensamentos e estudos sobre a natureza multifacetada da morte e do fim."
 building_galactic_memorial_2: "Pilar de Quietude"
 building_galactic_memorial_2_desc: "Um local solene, dedicado à contemplação da morte, no qual um final pode ser registrado."
 building_galactic_memorial_3: "Memorial Galáctico"
 building_galactic_memorial_3_desc: "Uma biblioteca monumental de tudo que pode ou não pode ser entendido sobre finais, registrados para eras futuras desconhecidas."
 building_galactic_memorial_regular_tooltip: "§HSantuários de Repouso§! melhoram a §HAtração da Ética Governante§! em §HMundos-Tumba§! e §HMundos-Relíquia§!"
 building_galactic_memorial_gestalt_tooltip: "§HSantuários de Repouso§! diminuem o §HDesvio§! em §HMundos-Tumba§! e §HMundos-Relíquia§!"
 job_death_chronicler: "Escrivão da Morte"
 job_death_chronicler_plural: "Escrivães da Morte"
 job_death_chronicler_desc: "A entropia é o campo destes eruditos, que observam e registram a morte e seus efeitos em todas as suas variadas expressões."
 job_death_chronicler_effect_desc: "£job_death_chronicler£ $job_death_chronicler_plural$ transformam $r_consumer_goods$ em $r_unity$, $r_stability$, e:[GetCivilianSpiMatOutput][GetCivilianEgalAuthOutput][GetCivilianMilPacOutput][GetCivilianXenoOutput]\n\nOs efeitos de £job_death_chronicler£ $job_death_chronicler_plural$ variam de acordo com a ética do império.\n\n"
 job_death_chronicler_simple_effect_desc: "£job_death_chronicler£ $job_death_chronicler_plural$ transformam $r_consumer_goods$ em $r_unity$ e $r_stability$, e herdam os modificadores de §HÉtica§! dos [civilian.GetIcon] [civilian.GetNamePlural]."
 chronicle_drone: "$job_chronicle_drone$"
 job_chronicle_drone: "Drone Escrivão"
 job_chronicle_drone_plural: "Drones Escrivães"
 job_chronicle_drone_desc: "Estes drones especializados transformam seus pensamentos em entropia, pesquisando a corrupção terminal como contraponto à nossa própria existência contínua."
 job_chronicle_drone_effect_desc: "£job_chronicle_drone£ $job_chronicle_drone_plural$ transformam $r_energy$ (ou $r_food$) em $r_unity$ e $r_stability$."
 mod_job_death_chronicler_add: "Empregos $job_death_chronicler$"
