 ### Necrophage Origin by Pierre du Plessis
 origin_necrophage: "Necrófago"
 origin_necrophage_desc: "Esta civilização evoluiu como um parasita, forçada a se alimentar de outras formas de vida sapientes para se sustentar. Ao alcançar o estágio galáctico, outras espécies serão trazidas para o grupo ou se tornarão seu alimento. Para o necrófago, só há um caminho."
 origin_tooltip_necrophage_effects: "- $HOMEWORLD$ ['concept_necrophage_elevation_chamber'] $NEW_LINE$- $SPECIES_TRAITS$ ['concept_necrophage_trait'] $NEW_LINE$- £pop£ §IPops§! Pré-Patentes: 1,2 mil $NEW_LINE$- ['concept_guaranteed_colonies']: Substituídos por ['concept_preftl_civilizations']"
 origin_tooltip_necrophage_negative_effects: "- Apenas £pop£ §IPops Necrófagos§! podem ser £pop_cat_ruler£ §IGovernantes§! ou ser recrutados como §ILíderes§!"
 civic_necrophage_secondary_species: "Espécie pré-patente"
 trait_necrophage: "Necrófago"
 trait_necrophage_desc: "§LEsta espécie de quase-imortais procria ao consumir Pops de outras espécies.§!"
 trait_necrophage_gestalt_tooltip: "§PEstes modificadores de Produção dos Pops não se aplicam aos Pops com Mente-Colmeia.§!"
 building_necrophage_elevation_chamber: "Câmara de Elevação"
 building_necrophage_elevation_chamber_desc: "Aqueles que aguardam transformação, passam seus dias estudando as práticas e rituais dos [This.Owner.GetSpeciesNamePlural] no conforto da Câmara de Elevação."
 building_necrophage_elevation_chamber_desc_hive: "Aqueles que esperam a transformação passam os dias se preparando para a união com a consciência coletiva do tipo [This.Owner.GetAdj] no conforto da Câmara de Elevação."
 disables_necrophage_growth: "§PEsta £building£ Construção desativa o Crescimento de Pop para espécies §YNecrófagas§!!§!"
 necrophage_elevation_timer_tooltip: "A próxima Cerimônia de Elevação em §Y[This.GetName]§! acontecerá em §Y[This.necrophage_elevation_timer]§!.\n\n"
 building_necrophage_elevation_chamber_scaling_tooltip: "Para garantir um fornecimento fixo de [necro_apprentice.GetIcon] [necro_apprentice.GetNamePlural], a quantidade de empregos fornecidos varia entre §Y100§! e §Y300§!, dependendo do §YCrescimento de Pop§!.\n\n"
 building_necrophage_house_of_apotheosis: "Casa da Apoteose"
 building_necrophage_house_of_apotheosis_desc: "Uma casa de esplendor inigualável, onde aqueles que aguardam sua apoteose como [This.Owner.GetSpeciesNamePlural] podem passar seus últimos dias confortáveis em suas formas originais."
 building_necrophage_house_of_apotheosis_desc_hive: "Uma casa de esplendor inenarrável onde fizemos o máximo para garantir que os que esperam a transformação em drones do tipo [This.Owner.GetAdj] possam desfrutar com conforto seus últimos dias fora da Colmeia."
 job_necro_apprentice_effect_desc_base: "Uma vez a cada §Y10§! anos, [necro_apprentice.GetIcon] [necro_apprentice.GetNamePlural] são transformados em §Y[This.Owner.GetSpeciesNamePlural]§! em um §YRitual de Elevação§!."
 job_necro_apprentice_effect_desc: "[necro_apprentice.GetIcon] [necro_apprentice.GetNamePlural] transformam £consumer_goods£ §Y$consumer_goods$§! e £food£ §Y$food$§! em £unity£ §Y$unity$§! e £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!.\n$job_necro_apprentice_effect_desc_base$"
 job_necro_apprentice_effect_lithoid_desc: "[necro_apprentice.GetIcon] [necro_apprentice.GetNamePlural] transformam £consumer_goods£ §Y$consumer_goods$§! e £minerals£ §Y$minerals$§! em £unity£ §Y$unity$§! e £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!.\n$job_necro_apprentice_effect_desc_base$"
 job_necro_apprentice_effect_hive_desc: "[necro_apprentice.GetIcon] [necro_apprentice.GetNamePlural] transformam £food£ §Y$food$§! em £unity£ §Y$unity$§! e £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!.\n$job_necro_apprentice_effect_desc_base$"
 job_necro_apprentice_effect_hive_lithoid_desc: "[necro_apprentice.GetIcon] [necro_apprentice.GetNamePlural] transformam £minerals£ §Y$minerals$§! em £unity£ §Y$unity$§! e £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!.\n$job_necro_apprentice_effect_desc_base$"
 NO_CULTURE_SHOCK: "$TRIGGER_FAIL$§RO planeta não está passando por §Y$culture_shock_bronze_age$§!§!"
 job_necro_apprentice: "Necrófito"
 job_necro_apprentice_plural: "Necrófitos"
 job_necro_apprentice_plural_with_icon: "[necro_apprentice.GetIcon] [necro_apprentice.GetNamePlural]"
 job_necro_apprentice_desc: "Depois de anos de trabalho árduo que culminam em um extravagante §YRitual de Elevação§!, os desafortunados que não nasceram na casta governante podem fazer parte dela."
 job_necro_apprentice_desc_hive: "Depois de anos de trabalho árduo, os desafortunados que nasceram separados da nossa consciência coletiva podem passar pelos Ritos de Unidade e se juntarem a nós, entrando em comunhão com a entidade política [Owner.GetGovernmentName] de caráter [Owner.GetSpeciesAdj]."
 NECRO_APPRENTICE_JOB_TRIGGER: "Este emprego só pode ser ocupado por Pops não robóticos que não sejam da espécie primária."
 mod_job_necro_apprentice_add: "Empregos de [necro_apprentice.GetName]"
 mod_job_necro_apprentice_per_pop: "§G+1§! Emprego de [necro_apprentice.GetName] a cada $VALUE$ Pops"
 mod_job_necro_apprentice_per_pop_short: "\n§G+1§! £mod_job_necro_apprentice_add£ a cada $VALUE$ £pop£"
 planet_necro_apprentices: "Empregos Necrófitos"
 POP_ATTRACTION_NECROPHAGE_NEG: "§R- £pop£ Pop é um Necrófago e procria ao consumir outras espécies§!"
 RULER_JOB_NECROPHAGE_TRIGGER: "Este emprego só pode ser ocupado por Pops Livres Necrófagos que não estão sendo expurgados."
 opinion_necrophage: "Desaparecimentos Misteriosos"
 opinion_necrophage_our_species: "Necrofagou nossa Espécie"
 disables_necrophage_features: "§REscolher esta Regalia da Ascensão desativará nossas mecânicas de Necrofagia.§!"
 MESSAGE_NECROPHAGE_POPS_NECROPHAGED_TITLE: "Pops Necrofagizados"
 MESSAGE_NECROPHAGE_POPS_NECROPHAGED: "Convertemos $VALUE|Y$ £pop£ §HPops§! para nossa espécie em uma Cerimônia de Elevação em $PLANET|Y$."
 START_SCREEN_NECROPHAGE_BASE: "No passado não tão distante, [GetHomeWorldName] era dominado por uma espécie um tanto comum. Para qualquer espectador, eles pareciam estar seguindo um caminho de desenvolvimento padrão, com alguns períodos rápidos de inovação, intercalados por períodos mais longos de aparentes reveses inconquistáveis. Porém, sem que eles soubessem, seu planeta era o lar de uma segunda espécie inteligente: nós.\n\nDurante milênios, nós, os [GetSpeciesNamePlural] - permanecemos sem ser detectados pelos donos do planeta. Pouco mais do que rumores vagos de terrores noturnos, éramos um conto de fadas falado apenas para assustar crianças que não se comportavam. Mas, eles estavam errados ao não pensar em nós.\n\nConforme sua taxa de progresso tecnológico avançou, assim também avançou nossa infiltração de sua sociedade."
 START_SCREEN_NECROPHAGE: "$START_SCREEN_NECROPHAGE_BASE$ Quando sua queda chegou, foi rápida e sangrenta. Tomamos o controle do planeta de maneira implacável, nossos precursores reduzidos à subserviência e gradual absorção na raça [GetSpeciesName].\n\nAgora, armados com o segredo recém-descoberto da viagem MRQL, estamos prontos para chegar nas estrelas e refazer todas as espécies da galáxia segundo nossa semelhança!"
 START_SCREEN_NECROPHAGE_PEACEFUL: "$START_SCREEN_NECROPHAGE_BASE$ Gradualmente, conseguimos tomar o controle do planeta, reduzindo nossos precursores à subserviência e absorção gradual na raça [GetSpeciesName].\n\nAgora, armados com o segredo recém-descoberto da viagem MRQL, estamos prontos para ir às estrelas e tomar nosso lugar junto das nações espaciais da galáxia!"
 START_SCREEN_NECROPHAGE_HIVE: "$START_SCREEN_NECROPHAGE_BASE$ Estávamos prontos finalmente. A superioridade da nossa consciência coletiva ficou clara quando tomamos o controle do planeta de maneira implacável. Nossos precursores foram reduzidos à servidão e absorvidos gradualmente pela mente-colmeia da espécie [GetSpeciesName].\n\nAgora armados com o segredo recém-descoberto das viagens MRQL, estamos prontos para ir às estrelas e refazer todas as espécies da galáxia à nossa imagem e semelhança!"
 necroids.2.name: "Cerimônia de Elevação em [Root.Capital.GetName]"
 necroids.2.desc: "Desde a tomada [Root.GetAdj] de [Root.Capital.GetName], a transformação de [necrophage_species.GetNamePlural] em [Root.GetSpeciesNamePlural] tem sido oculta por rituais. Uma vez a cada dez anos (uma data que se aproxima rapidamente), os \"Aprendizes\" se reúnem na Câmara de Elevação para uma cerimônia especial. O que exatamente acontece com eles é um segredo muito bem guardado, conhecido apenas por alguns escolhidos, mas quando eles emergem, saem como [Root.GetSpeciesNamePlural]."
 necroids.2.desc.gestalt: "Desde a tomada [Root.GetAdj] de [Root.Capital.GetName], a transformação de [necrophage_species.GetNamePlural] em [Root.GetSpeciesNamePlural] tem estado cercada de rituais. Uma vez a cada dez anos, uma data que se aproxima rapidamente, os \"Aprendizes\" se reúnem na Câmara de Elevação para uma cerimônia especial. O que acontece exatamente com eles é um segredo guardado a sete chaves por nossa consciência coletiva, mas quando emergem de lá, o fazem como drones do tipo [Root.GetSpeciesAdj]."
 necroids.2.A: "Que comecem os preparativos!"
 necroids.2.A.tooltip: "No final do ano, todos os indivíduos §H[necro_apprentice.GetNamePlural]§! em §H[Root.Capital.GetName]§! serão convertidos em §H[Root.GetSpeciesNamePlural]§!.\n\nEsta cerimônia ocorrerá a cada §H10 anos§! em cada planeta do povo [Root.GetAdj] com uma §HCâmara de Elevação§!."
 ### Sacrificial Temple (Death Cult) by Gemma Thomson
 building_sacrificial_temple_1: "Templo do Sacrifício"
 building_sacrificial_temple_1_desc: "Um local sagrado em que sacerdotes solenes e aprendizes dedicados rezam e trabalham a cada ciclo próspero, porém sangrento."
 building_sacrificial_temple_2: "Holotemplo Sombrio"
 building_sacrificial_temple_2_desc: "Melhorias tecnológicas desta construção consagrada permitem um estudo mais rigoroso e uma noção mais tangível de devoção a causas além de suas paredes mutáveis."
 building_sacrificial_temple_3: "Templo do Grande Sacrifício"
 building_sacrificial_temple_3_desc: "Um local de consagração suprema, onde campos de imersão multissensorial permitem que os fiéis honrem cada sacrifício [This.Owner.GetAdj] - passado, presente e futuro."
 job_death_priest: "Sacerdote da Morte"
 job_death_priest_plural: "Sacerdotes da Morte"
 job_death_priest_desc: "A orientação espiritual das massas é garantida por aqueles que farão sacrifícios (quando convocados) dos seus pupilos mais devotos."
 job_death_priest_effect_desc: "£job_death_priest£ $job_death_priest_plural$ transformam £consumer_goods£ §Y$consumer_goods$§! em £unity£ §Y$unity$§!, £society£ §Y$society_research$§! e £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!"
 mod_job_death_priest_add: "Empregos $job_death_priest$"
 mod_job_death_priest_per_pop: "§G+1§! Emprego $job_death_priest$ a cada $VALUE$ Pops"
 mod_job_death_priest_per_pop_short: "\n§G+1§! £mod_job_death_priest_add£ a cada $VALUE$ £pop£"
 job_death_priest_icon: "£job_death_priest£"
 job_mortal_initiate: "Iniciado Mortal"
 job_mortal_initiate_plural: "Iniciados Mortais"
 job_mortal_initiate_desc: "Estes pupilos da fé muito devotos dedicam o resto de suas vidas para o aprimoramento da sociedade; um estudo que conclui com seu sacrifício fatal e voluntário."
 job_mortal_initiate_effect_desc: "[mortal_initiate.GetIcon] [mortal_initiate.GetNamePlural] produzem £unity£ §Y$unity$§!, £society£ §Y$society_research$§! e £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§!."
