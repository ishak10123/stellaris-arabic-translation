 shroud.8470.desc: "O poder de nosso patrono Ă© imenso, mas estamos quase sem tempo. Tal incompetĂȘncia evidente nĂŁo serĂĄ tolerada pelo esquecimento benevolente d$end_of_the_cycle_color_article$.\n\nMas nos resta uma pequena esperanĂ§a: devemos envolver a galĂĄxia na $end_aura$, custe o que custar. Em desespero, nossa equipe de [GetTelepathPlural] agora extrai toda a energia que consegue de dentro do Â§HVĂ©uÂ§!."
