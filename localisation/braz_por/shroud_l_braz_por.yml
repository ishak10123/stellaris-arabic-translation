 shroud.3105.title: "Vias PsĂ­quicas"
 shroud.3105.desc: "Sem aviso, uma pressĂŁo psĂ­quica irrompe no VĂ©u.\n\nUm labirinto de vias incandescentes se revela diante de nĂłs, estendendo-se alĂ©m da percepĂ§ĂŁo, crepitando brevemente antes de desaparecer no vazio.\n\nOutro surto comeĂ§a a se formar. Com concentraĂ§ĂŁo, sentimos seu padrĂŁo antes que tome forma. O labirinto ressurge, expandindo-se em uma rede de possibilidades.\n\nCada via Ă© uma nova tentaĂ§ĂŁo a ser explorada, antes de se desfazer no nada."
 shroud.3105.a: "Â§YEnfrentar o desafio.Â§!"
 shroud.3106.title: "Â§G$tech_psionic_lightning$Â§!"
 shroud.3106.desc.intro: "A pressĂŁo cresce, nos provocando com expectativa. Nossos movimentos acompanham o crescendo, conduzindo nossas mentes pelo labirinto de energia psĂ­quica. Pensamentos se tornam impulso, nos impelindo para a frente."
 shroud.3106.desc: "$shroud.3106.desc.intro$ desviando de arcos de energia psiĂŽnica antes que a determinaĂ§ĂŁo nos abandone.\n\nEstamos livres das amarras, ascendemos alĂ©m da forma fĂ­sica. O labirinto e suas incontĂĄveis vias se tornam uma extensĂŁo da nossa consciĂȘncia, revelando conhecimentos ocultos nos padrĂ”es da tempestade.\n\nO momento acaba de modo tĂŁo repentino quanto comeĂ§ou. A imagem persistente do labirinto colapsa atrĂĄs de nĂłs enquanto emergimos com uma nova compreensĂŁo de tudo. Com alguns refinamentos sutis, esses princĂ­pios psiĂŽnicos poderĂŁo ser aplicados Ă s nossas armas."
 shroud.3107.title: "Â§RPerdidos no VazioÂ§!"
 shroud.3107.desc: "$shroud.3106.desc.intro$ Uma mirĂ­ade de caminhos se abre adiante, sobrecarregando a mente com o fardo de escolhas impossĂ­veis.\n\nNesse instante de hesitaĂ§ĂŁo, as vias incandescentes explodem. Arcos de energia psiĂŽnica se entrelaĂ§am no nexus em colapso, capturando nossos pensamentos e nos lanĂ§ando para o caos do VĂ©u.\n\nEmergimos, nossa equipe de [GetTelepathPlural] desorientada, abalada pelo trauma do fracasso. O impacto psiĂŽnico reverbera por [Root.GetName]."
 shroud.3110.title: "LanĂ§a PsĂ­quica"
 shroud.3110.desc: "Um feixe totĂȘmico de energia psiĂŽnica se projeta alĂ©m de nĂłs, atravessando o VĂ©u rumo a infinitudes incalculĂĄveis. Sua composiĂ§ĂŁo excepcionalmente estĂĄvel contrasta com as formaĂ§Ă”es caĂłticas que encontramos atĂ© agora.\n\nĂ seguro permanecer aqui?"
