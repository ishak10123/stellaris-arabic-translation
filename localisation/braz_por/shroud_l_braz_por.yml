 civic_twisted_experimenters_effects: "ComeĂ§a com a situaĂ§ĂŁo ['concept_experimental_testing'], que concede conhecimento de tecnologia ao ser concluĂ­da.\nPode construir e jĂĄ inicia com: ÂŁbuildingÂŁ['building:building_experimentation_chambers_1'].\nTodos os escravos nĂŁo MaquinĂĄrios ganham acesso ao emprego de escravo ['concept_slave_orderly'].\nAcesso ao ['concept_slave_army']: Â§Y$abomination_army$Â§!"
