 shroud.4290.a: "$marauder.31.e$"
 shroud.4290.b: "O que Ă© $end_of_the_cycle_color_article$?"
 shroud.4290.b.response: "De acordo com nosso departamento de inteligĂȘncia, $end_of_the_cycle_color_article$ Ă© uma forĂ§a cataclĂ­smica que se origina do interior do Â§HVĂ©uÂ§!. Seu poder pode se manifestar na realidade fĂ­sica graĂ§as Ă  cumplicidade de invasores de mentes com sede de poder.\n\nO Fim inflige ruĂ­na sobre a galĂĄxia por meio do Â§R$NAME_Reckoning$Â§!, um ser violento composto de energia psiĂŽnica. Seu objetivo Ă© a completa aniquilaĂ§ĂŁo da existĂȘncia."
 shroud.4290.c: "Como podemos derrotar o Â§R$NAME_Reckoning$Â§!?"
