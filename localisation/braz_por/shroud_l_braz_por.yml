 # Mid-stage events
 shroud.8350.name: "RelatĂłrios de Lobotomias"
 shroud.8350.desc: "Alguns [owner.GetSpeciesNamePlural] estĂŁo com dificuldade de conviver em harmonia na presenĂ§a da Â§RVozÂ§!.\n\nDesesperados pela paz, os mais fracos dentre nĂłs recorreram a um procedimento rudimentar e nĂŁo regulado de lobotomia. Tais prĂĄticas ameaĂ§am se disseminar caso nada seja feito a respeito."
