 shroud.6030.desc: "Â§HApesar de tentativas repetidas, nĂŁo obtivemos respostas de [exiled_country.GetName] Ă s nossas comunicaĂ§Ă”es.Â§!"
 shroud.6050.name: "CorrelaĂ§Ă”es Estranhas"
 shroud.6050.desc: "Nossa Â§H$building_ancient_ward_1$Â§! de supressĂŁo psiĂŽnica estĂĄ produzindo leituras irregulares. Normalmente isso resulta de picos de atividade psiĂŽnica em [Root.GetHomeWorldName], mas nĂŁo encontramos nenhuma evidĂȘncia de tal perversidade.\n\nA resposta talvez esteja alĂ©m de nossas fronteiras. Imagens de longa distĂąncia mostram uma explosĂŁo de fluxo de uma estranha energia no sistema Â§H[exiled_system_border.GetName]Â§!, o que se correlaciona com as mediĂ§Ă”es errĂĄticas da $building_ancient_ward_1$."
 shroud.6050.a: "Precisamos explorar [exiled_system_border.GetName]."
 shroud.shared_text_psy_symptoms: "desordem emocional; estresse mental debilitante; visĂ”es recorrentes de horrores indescritĂ­veis"
 shroud.shared_text_psi_radiation: "Esses fenĂŽmenos correspondem de forma precisa Ă s experiĂȘncias registradas por nossos ancestrais. Ă muito provĂĄvel que seja o que chamavam de \"radiaĂ§ĂŁo psiĂŽnica\", uma forma particularmente destrutiva de emissĂŁo energĂ©tica."
 shroud.shared_text_ship_malfunction: "Os sistemas da frota tambĂ©m estĂŁo sofrendo falhas severas, tornando a maior parte de suas funĂ§Ă”es inoperante."
 shroud.6100.name: "Energia Perigosa"
 shroud.6100.desc.no_border_aura: "Uma situaĂ§ĂŁo alarmante estĂĄ se desenvolvendo no recĂ©m-explorado sistema Â§H[from.GetName]Â§!. A tripulaĂ§ĂŁo da [root.GetName] apresenta uma variedade de sintomas psicolĂłgicos: $shroud.shared_text_psy_symptoms$. Os sistemas da frota tambĂ©m estĂŁo apresentando falhas estranhas e irregulares.\n\n$shroud.shared_text_psi_radiation$ Pela primeira vez longe da proteĂ§ĂŁo da Â§H$building_ancient_ward_1$Â§! em Â§H[owner.GetHomeWorldName]Â§!, enfrentamos a praga mental sobre a qual nossos antepassados nos alertaram.\n\nDepois de calibrar nossos scanners de longo alcance para detectar essa forma Ășnica de energia, descobrimos que a origem das emissĂ”es perigosas estĂĄ no sistema prĂłximo, Â§H[exiled_center_system.GetName]Â§!. $shroud.6100.desc.end$"
 shroud.6100.desc.border_aura: "A tripulaĂ§ĂŁo da [root.GetName] estĂĄ em perigo.\n\nAo serem expostos aos nĂ­veis extremamente elevados de radiaĂ§ĂŁo psiĂŽnica no sistema Â§H[from.GetName]Â§!, passaram a apresentar sintomas psicolĂłgicos ainda piores do que os previamente relatados. $shroud.shared_text_ship_malfunction$\n\nScanners de longo alcance indicam nĂ­veis ainda mais altos de radiaĂ§ĂŁo no sistema prĂłximo, Â§H[exiled_center_system.GetName]Â§!. $shroud.6100.desc.end$"
 shroud.6100.desc.end: "Enviar qualquer uma de nossas naves para regiĂ”es mais profundas Ă© fortemente desaconselhado atĂ© que possamos avaliar seus efeitos com mais precisĂŁo."
 shroud.6100.tt: "Preparar para iniciar o processo de Â§Y$first_contact$Â§!."
 shroud.6110.name: "Uma PresenĂ§a no Sistema [This.System.GetName]"
 shroud.6110.desc: "Incrivelmente, o sistema Â§H[This.System.GetName]Â§! parece abrigar uma quantidade de grandes objetos que aparentam ter sido construĂ­dos por uma forma de inteligĂȘncia. Podemos aprender mais detalhes sobre seus criadores, chamados de Â§H[This.ContactCountry.GetName]Â§!, ao iniciar comunicaĂ§Ă”es diretas a partir de uma distĂąncia segura.\n\nQualquer forma de vida presente no sistema corre sĂ©rio risco diante da intensa radiaĂ§ĂŁo psiĂŽnica que registramos."
 fcsum_exiled_1: "Descobrimos evidĂȘncias de uma provĂĄvel inteligĂȘncia alienĂ­gena no sistema Â§H[This.System.GetName]Â§!."
 shroud.6115.name: "Progresso Limitado"
 shroud.6115.desc: "Estudos adicionais confirmaram que os objetivos no sistema Â§H[This.System.GetName]Â§! sĂŁo naves espaciais alienĂ­genas, embora ainda nĂŁo tenhamos feito contato direto com os ocupantes de nenhuma delas.\n\nDe forma preocupante, a equipe enviada por [exiled_envoy.GetName] relata que passou a sofrer sintomas parapsicolĂłgicos, incluindo visĂ”es inexplicĂĄveis de seres estranhos presentes em [This.System.GetName]. Apesar dessas preocupaĂ§Ă”es, seu compromisso com a missĂŁo continua inabalado."
 shroud.6115.a: "Continue assim."
