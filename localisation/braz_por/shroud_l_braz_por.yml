 shroud.6200.desc.no_visit: "Uma situaĂ§ĂŁo alarmante estĂĄ se desenvolvendo em Â§H[Root.GetHomeWorldName]Â§!. A populaĂ§ĂŁo estĂĄ apresentando uma variedade de sintomas psicolĂłgicos: $shroud.shared_text_psy_symptoms$.\n\n$shroud.shared_text_psi_radiation$ Aqueles fora da proteĂ§ĂŁo de nossa Â§H$building_ancient_ward_1$Â§! estĂŁo enfrentando a praga mental da qual nossos antepassados nos alertaram.\n\nDepois de calibrar nossos scanners de longo alcance para detectar essa forma Ășnica de energia, descobrimos que essas emissĂ”es perigosas estĂŁo se espalhando para alĂ©m do sistema Â§H[exiled_system_border.GetName]Â§!. $shroud.shared_text_aura_study$"
