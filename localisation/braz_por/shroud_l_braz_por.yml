 mindwarden_tactics_modifier: "TĂĄticas dos Mentemestras"
 shroud.4295.desc: "$shroud.4205.common$\n\nInicialmente, estĂĄvamos preocupados com os relatos sobre seus \"$building_materiality_engine_plural$\". No entanto, apĂłs uma anĂĄlise mais profunda, consideramos esses dispositivos uma soluĂ§ĂŁo promissora para a exploraĂ§ĂŁo nĂŁo psiĂŽnica do chamado Â§H\"VĂ©u\"Â§!.\n\nIncentivamos a ampliaĂ§ĂŁo dessa tecnologia e aguardamos futuras oportunidades de cooperaĂ§ĂŁo."
 mindwarden_opinion_materiality_engine_tt: "OpiniĂŁo: ÂŁopinionÂŁÂ Â§G+$@mindwarden_opinion_materiality_engine|0$Â§!"
 shroud.4300.desc: "Dirijo-me a vocĂȘ como representante de [mindwarden_enclave_country.GetName].\n\nDe acordo com nossas leituras psiĂŽnicas, todo o territĂłrio de [Root.GetName] foi irremediavelmente corrompido pelo Â§HVĂ©uÂ§!.\n\nSuas aĂ§Ă”es selaram seu destino, e nĂłs vamos antecipĂĄ-lo."
 shroud.4300.a: "Por que temem o VĂ©u?"
 shroud.4310.desc: "NĂŁo o tememos. Nem os seus agentes corrompidos, pois sabemos como combatĂȘ-los.\n\nNĂŁo espero que vocĂȘs, uma sociedade enlouquecida por sua influĂȘncia, consigam compreender."
 shroud.4320.desc.psionic: "NĂŁo basta contaminar a galĂĄxia com energia psiĂŽnica?"
