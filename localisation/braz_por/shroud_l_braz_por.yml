 shroud.8360.name: "AutoexperimentaĂ§ĂŁo PsiĂŽnica"
 shroud.8360.desc: "Continuamos a abraĂ§ar a Â§RVozÂ§!. Ela nos diz verdades cruas que nĂŁo podem ser negadas.\n\nMuitos [owner.GetSpeciesNamePlural] buscam mais mĂ©todos para ampliar a Â§RVozÂ§! e se beneficiar de sua sabedoria de maneira mais direta.\n\nO uso de drogas do mercado clandestino aumentou dramaticamente. InstalaĂ§Ă”es mĂ©dicas nĂŁo regulamentadas estĂŁo oferecendo serviĂ§os experimentais para ajudar indivĂ­duos a maximizar suas sensibilidades psiĂŽnicas.\n\nOnde isso vai nos levar?"
 shroud.8360.a: "Faremos todo o possĂ­vel para estimular a Â§RVozÂ§!."
