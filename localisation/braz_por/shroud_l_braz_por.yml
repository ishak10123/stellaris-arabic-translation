 shroud.4605.desc_outro_homicidal: "O impacto na psique do povo [Root.GetSpeciesAdj] jĂĄ Ă© inquestionĂĄvel. As mentes de incontĂĄveis [Root.GetIndividualPlural] foram corrompidas por pensamentos de paz galĂĄctica, causando uma profunda dissonĂąncia em nossa sociedade.\n\nDe acordo com nossa equipe de [GetTelepathPlural], as bĂȘnĂ§ĂŁos dessa barganha ainda estĂŁo por vir. AtĂ© lĂĄ, um conflito terrĂ­vel assola nossas mentes. O que fizemos com nĂłs mesmos?"
 shroud.4605.desc_outro_gestalt: "O impacto na psique do povo [Root.GetSpeciesAdj] jĂĄ Ă© perceptĂ­vel. Enquanto buscamos relaĂ§Ă”es pacĂ­ficas por toda a galĂĄxia, qualquer discĂłrdia com nossos vizinhos causarĂĄ distĂșrbios na consciĂȘncia coletiva.\n\nEsse pequeno transtorno Ă© o preĂ§o de nosso vĂ­nculo. Segundo nossa equipe de [GetTelepathPlural], as maiores bĂȘnĂ§ĂŁos do BerĂ§o ainda estĂŁo por vir."
 shroud.4605.desc_outro_non_gestalt: "O impacto na psique do povo [Root.GetSpeciesAdj] jĂĄ Ă© aparente. Enquanto ansiamos por relaĂ§Ă”es pacĂ­ficas por toda a galĂĄxia, qualquer discĂłrdia com nossos vizinhos causarĂĄ angĂșstia a toda a populaĂ§ĂŁo.\n\nEsse pequeno transtorno Ă© o preĂ§o de nosso vĂ­nculo. Segundo nossa equipe de [GetTelepathPlural], as maiores bĂȘnĂ§ĂŁos do BerĂ§o ainda estĂŁo por vir."
