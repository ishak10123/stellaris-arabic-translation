 shroud.6770.name: "$r_the_lost_patron$"
 shroud.6770.desc: "O casulo descoberto em Â§H[sanctum_of_the_lost_planet.GetName]Â§! abriga uma poderosa entidade interdimensional. Ă provĂĄvel que esse ser tenha sido responsĂĄvel pela $PSIONIC_AURA$ que ameaĂ§ava a santidade de nossas mentes.\n\nNossos atenuadores psiĂŽnicos estĂŁo mitigando o perigo por ora, mas Ă© difĂ­cil dizer por quanto tempo conseguirĂŁo conter sua influĂȘncia. Ă possĂ­vel que, sob condiĂ§Ă”es controladas, possamos utilizar esse poder terrĂ­vel a nosso favor.\n\nAinda assim, muitos em nossa sociedade clamam por sua destruiĂ§ĂŁo imediata. Sua mera existĂȘncia contraria valores que sustentamos hĂĄ eras."
 shroud.6770.a: "Destrua essa abominaĂ§ĂŁo."
 shroud.6770.b: "Encontre uma maneira de usar essa... coisa."
 destroyers_of_the_lost_modifier: "Destruidores do Perdido"
 destroyers_of_the_lost_modifier_tt: "Concede acesso ao padrĂŁo de vida Â§Y$living_standard_shroud_inoculation$Â§!, sob o qual habilidades Â§YPsiĂŽnicasÂ§! sĂŁo removidas."
 destroyers_of_the_lost_modifier_desc: "Derrotar um inimigo psiĂŽnico e destruir a aparente fonte de sua $PSIONIC_AURA$ elevou o moral de nosso impĂ©rio apĂłs anos de tormento."
 living_standard_shroud_inoculation: "InoculaĂ§ĂŁo do VĂ©u"
 living_standard_shroud_inoculation_tooltip: "Esta espĂ©cie estĂĄ sendo inoculada contra os efeitos nocivos da radiaĂ§ĂŁo psiĂŽnica.\n\nÂ§RPara prevenir mais danos, qualquer caracterĂ­stica psiĂŽnica serĂĄ removida.Â§!"
 living_standard_shroud_inoculation_tooltip_delayed: "Â§LGarantiremos a seguranĂ§a psiĂŽnica desta espĂ©cie.Â§!"
 psionic_heresy: "Heresia PsiĂŽnica"
 shroud.6780.name: "$r_the_lost_patron$"
 shroud.6780.desc: "Pensamentos penetram nossas mentes.\n\nOuvimos uma melodia, vĂ­vida e incĂŽmoda.\n\nReconhecemos essa dor, aguda e familiar.\n\nÂ§HVocĂȘ ouviu. O sonho Ă© seu... Cante, cante...Â§!"
 shroud.6780.a: "O que vocĂȘ fez?"
 shroud.6785.desc: "Â§HFiz exatamente o que prometi. Sonhei por vocĂȘ.Â§!"
