 # S8
 shroud.2635.name: "AscensĂŁo da Empatia"
 shroud.2635.desc.gestalt: "A exploraĂ§ĂŁo de nossas recĂ©m-descobertas habilidades psiĂŽnicas resultou em mudanĂ§as fundamentais na empatia dos [owner.GetSpeciesNamePlural].\n\nEstĂĄ claro que agora podemos compreender as perspectivas, padrĂ”es de pensamento e emoĂ§Ă”es de outras consciĂȘncias. Resta saber se essas mudanĂ§as representam uma nova forĂ§a ou uma vulnerabilidade para o futuro de [owner.GetName]."
 shroud.2635.desc.default: "Ă medida que nossa populaĂ§ĂŁo explora suas recĂ©m-descobertas capacidades psiĂŽnicas, uma nova comunidade foi estabelecida com o objetivo de explorar essas habilidades em busca de um entendimento mais empĂĄtico das demais consciĂȘncias.\n\nEsse coletivo afirma ser capaz de compreender as perspectivas, padrĂ”es de pensamento e emoĂ§Ă”es de outras mentes graĂ§as a seus sentidos psiĂŽnicos emergentes. Resta saber se essas atividades trarĂŁo benefĂ­cios ou prejuĂ­zos para o futuro de [owner.GetName]."
 shroud.2635.a: "Ă uma oportunidade de aprendizado."
