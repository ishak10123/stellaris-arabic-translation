 # S3
 shroud.2610.name: "Comportamento Fraudulento"
 shroud.2610.desc: "Ă medida que nossas habilidades psiĂŽnicas se tornam mais poderosas, cresce tambĂ©m o nĂșmero de relatos sobre exploraĂ§ĂŁo, trapaĂ§as e comportamentos fraudulentos entre nossa populaĂ§ĂŁo. Uma minoria expressiva de [owner.GetSpeciesNamePlural] claramente estĂĄ utilizando seus novos poderes de maneiras questionĂĄveis.\n\nAs vĂ­timas, indignadas, agora exigem uma reformulaĂ§ĂŁo das leis vigentes para garantir maior proteĂ§ĂŁo contra crimes psiĂŽnicos."
