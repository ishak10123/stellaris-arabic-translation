 shroud.first_contact.title: "$utopia.3300.name$"
 shroud.first_contact.prompt: "$utopia.2657.a$"
 shroud.first_contact.1.desc.default: "O VĂ©u. Ele flui acima de nossa realidade conhecida, uma sombra lanĂ§ada pela escuridĂŁo. Qualquer ser com poderes psiĂŽnicos jĂĄ o viu em seus sonhos, ainda que sem reconhecĂȘ-lo.\n\nPassamos anos tentando atravessar o manto, tornando-o cada vez mais tĂȘnue com a forĂ§a combinada de nossas mentes. Do outro lado, nossos esforĂ§os nĂŁo passaram despercebidos. Algo nos observa.\n\nSua presenĂ§a irradia um poder fenomenal, [GetPatronInsert] nas profundezas do VĂ©u. Quase nĂŁo nos percebe, apenas nos olha como olharĂ­amos para uma gota de condensaĂ§ĂŁo na escotilha.\n\nSe ao menos pudĂ©ssemos alcanĂ§ar sua mente insondĂĄvel."
 shroud.first_contact.1.desc.hive: "O VĂ©u. Ele flui acima de nossa realidade conhecida, como uma visĂŁo projetada no interior de um drone em repouso. Embora estranho, algo Ă©... inexplicavelmente familiar.\n\nPassamos anos tentando atravessar o manto, tornando-o cada vez mais tĂȘnue com a forĂ§a combinada de nossas mentes. Do outro lado, nossos esforĂ§os nĂŁo passaram despercebidos. Algo nos observa.\n\nSua presenĂ§a irradia um poder fenomenal, [GetPatronInsert] nas profundezas do VĂ©u. Quase nĂŁo nos percebe, apenas nos olha como olharĂ­amos para um drone no meio de tantos outros.\n\nSe ao menos pudĂ©ssemos alcanĂ§ar sua mente insondĂĄvel."
 shroud.first_contact.1.desc.robot: "O VĂ©u. Ele estĂĄ alĂ©m de qualquer parĂąmetro espaĂ§o-temporal que jĂĄ tenhamos detectado. SĂł pode ser comparado aos dados anĂŽmalos que perturbam nossos ciclos de descanso.\n\nPassamos anos tentando hackear sua barreira, tornando-a cada vez mais tĂȘnue com a forĂ§a combinada de nossos processadores. Do outro lado, nossos esforĂ§os nĂŁo passaram despercebidos. Algo nos observa.\n\nSua presenĂ§a irradia um poder fenomenal, [GetPatronInsert] nas profundezas do VĂ©u. Quase nĂŁo nos percebe, apenas nos olha como olharĂ­amos para um Ășnico bit em um fluxo de dados.\n\nSe ao menos pudĂ©ssemos alcanĂ§ar sua mente insondĂĄvel."
 shroud.first_contact.2.desc.all: "Podemos sentir grandes entidades no VĂ©u, impossĂ­veis de mensurar. Ao contrĂĄrio do espaĂ§o em constante expansĂŁo, os movimentos delas nĂŁo podem ser rastreados. Seus destinos retornam Ă s origens, como se suas energias nascessem de si mesmas.\n\nSeja qual for sua natureza, elas nos chamam como singularidades de pensamento e vontade."
 shroud.first_contact.2.desc.default: "Entre vozes incontĂĄveis, uma se impĂ”e com mais clareza; [GetPatronInsert] que envolve nossas psiques.\n\nCom esforĂ§o suficiente, talvez possamos entrar em contato."
 shroud.first_contact.2.desc.robot: "Entre vozes incontĂĄveis, uma se impĂ”e com mais clareza; [GetPatronInsert], que domina nossos cĂĄlculos.\n\nCom esforĂ§o suficiente, talvez possamos entrar em contato."
 shroud.first_contact.3.desc.default: "Passamos pelo Entremundos, um vazio que separa o VĂ©u da realidade tangĂ­vel do espaĂ§o convencional.\n\nAssim que entramos, sentimos a presenĂ§a de [GetPatronInsert] invadindo nossas mentes. Ă uma entidade de poder inimaginĂĄvel, pairando no amanhĂŁ.\n\nNĂŁo podemos recuar agora."
 shroud.first_contact.3.desc.robot: "Passamos pelo Entremundos, um vazio que separa o VĂ©u do fenĂŽmeno do espaĂ§o comum.\n\nAssim que entramos, detectamos a presenĂ§a de [GetPatronInsert] invadindo nossas mentes. Ă uma entidade de poder fenomenal, pairando no amanhĂŁ.\n\nNĂŁo podemos recuar agora."
 shroud.first_contact.4.desc.default: "O VĂ©u pulsa com poder. Sentimos suas energias em toda parte, e ainda assim, em lugar nenhum. \"Entrar\" Ă© decifrar padrĂ”es a partir de sensaĂ§Ă”es vagas, perceber grandes entidades por meio da concentraĂ§ĂŁo.\n\nDetectamos o sinal de uma dessas forĂ§as, [GetPatronInsert] nas profundezas insondĂĄveis acima.\n\nConseguiremos resistir tempo suficiente para alcanĂ§ĂĄ-la?"
 shroud.first_contact.4.desc.robot: "O VĂ©u pulsa com poder. Sentimos suas energias em toda parte, e ainda assim, em lugar nenhum. \"Entrar\" Ă© detectar padrĂ”es a partir de sensaĂ§Ă”es vagas, revelar poderosas entidades por meio do processamento concentrado.\n\nDetectamos o sinal de uma dessas forĂ§as, [GetPatronInsert] nas profundezas insondĂĄveis acima.\n\nSerĂĄ que nossos circuitos entrarĂŁo em sobrecarga antes de alcanĂ§ĂĄ-la?"
 shroud.first_contact.end.b: "Temos muito a ponderar."
 shroud.first_contact_insert.eater.default: "um Â§Hrosnado vorazÂ§!"
 shroud.first_contact_insert.eater.machine: "um Â§Hrosnado insaciĂĄvelÂ§!"
 shroud.4005.title: "$the_eater_of_worlds_article_cap$ Emerge"
 shroud.4005.desc.default: "Nas profundezas do Â§HVĂ©uÂ§!, chegamos aos domĂ­nios do ente Â§H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]Â§!. Seu rugido exprimia uma voracidade vazia, alimentando-se eternamente e nunca saciada. Nossos sinais exploratĂłrios foram recebidos com jorros de fogo e ruĂ­na. Sua aparente indiferenĂ§a Ă  nossa compreensĂŁo era sufocante.\n\nPor fim, a entidade perdeu a paciĂȘncia. Um rugido feroz envolveu as mentes de nossa equipe de [GetTelepathPlural]. Em montes ressonantes de destroĂ§os e [GetEaterEmergesExtra]\n\nO barulho cessou tĂŁo subitamente quanto comeĂ§ou. Apenas uma fome lancinante permaneceu.\n\nA vontade da entidade agora se mostra mais nĂ­tida. [GetEaterEmergesEnding]"
 shroud.4005.desc.hive: "$shroud.4005.desc.default$"
 shroud.4005.desc.gestalt_machine: "Nas profundezas do Â§HVĂ©uÂ§!, chegamos aos domĂ­nios do ente Â§H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]Â§!. Seu rugido exprimia uma voracidade vazia, alimentando-se eternamente e nunca saciada. Nossos sinais exploratĂłrios foram recebidos com jorros de fogo e ruĂ­na. Sua aparente indiferenĂ§a Ă  nossa compreensĂŁo era avassaladora.\n\nPor fim, a entidade perdeu a paciĂȘncia. Um rugido feroz envolveu as mentes de nossa equipe de [GetTelepathPlural]. Em montes ressonantes de destroĂ§os e [GetEaterEmergesExtra]\n\nO barulho cessou tĂŁo subitamente quanto comeĂ§ou. Pela primeira vez, fomos tomados por uma fraqueza documentada apenas em espĂ©cies orgĂąnicas: a fome.\n\nA vontade da entidade agora se mostra mais nĂ­tida. [GetEaterEmergesEnding]"
 shroud.4005.desc.individual_machine: "$shroud.4005.desc.gestalt_machine$"
 shroud.4005.desc_extra_pacifist: "ruĂ­na, estava exibida uma visĂŁo de agressĂŁo sem sentido."
 shroud.4005.desc_extra_robot: "ruĂ­na, estava exibido um modelo de perfeiĂ§ĂŁo marcial."
 shroud.4005.desc_extra_organic: "cadĂĄveres, estava exibido um destino marcial de esplendor horrendo."
 shroud.4005.desc_outro_pacifist: "Ă uma criatura de violĂȘncia e discĂłrdia. Ela se opĂ”e a muitos de nossos princĂ­pios mais valiosos. Aumentar nossa sintonia com este ser, $the_eater_of_worlds_color_article$, nĂŁo Ă© recomendado."
 shroud.4005.desc_outro_robot: "Conhecemos sua visĂŁo de violĂȘncia e glĂłria. Assim que nossa equipe de [GetTelepathPlural] estiver recarregada, poderemos nos conectar e comungar com este ser, $the_eater_of_worlds_color_article$."
 shroud.4005.desc_outro_organic: "Conhecemos sua visĂŁo de violĂȘncia e glĂłria. Assim que nossa equipe de [GetTelepathPlural] se recuperar, poderemos nos conectar e comungar com este ser, $the_eater_of_worlds_color_article$."
 shroud.4005.a.default: "[GetEaterEmergesOptionA]"
