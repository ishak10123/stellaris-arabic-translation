 SANCTUM_OF_THE_LOST: "Sanctum do Sonhador"
 SANCTUM_OF_THE_LOST_DESC: "Nas ruĂ­nas do $SANCTUM_OF_THE_LOST$ em Â§H[sanctum_of_the_lost_planet.GetName]Â§!, encontramos um \"casulo\" selado que emite nĂ­veis perigosos de radiaĂ§ĂŁo psiĂŽnica. Precisamos conduzir pesquisas no local para eliminar qualquer ameaĂ§a que esse objeto possa representar."
 shroud.6710.name: "O Poder Interior"
 shroud.6710.desc: "Nossos pesquisadores realizaram uma anĂĄlise minuciosa do \"casulo\" em Â§H[sanctum_of_the_lost_planet.GetName]Â§!.\n\nAs anĂĄlises externas dessa estrutura imponente revelaram que se trata de um receptĂĄculo altamente seguro, projetado para conter uma entidade psiĂŽnica poderosa. Apesar das camadas isolantes compostas de ligas metĂĄlicas densas, nĂ­veis elevados de radiaĂ§ĂŁo psiĂŽnica continuam a emanar da contenĂ§ĂŁo.\n\nUm conjunto de atenuadores psiĂŽnicos foi instalado ao redor do casulo que, quando ativados, fizeram com que todos nas proximidades fossem acometidos por intenso desconforto neural.\n\nA superfĂ­cie do casulo se retorceu, e sua forma oval transformou-se em uma hĂ©lice pulsante. Uma fresta se abriu, e estamos recebendo uma comunicaĂ§ĂŁo direta do interior..."
 cannot_found_mindwarden_enclave: "Ă preciso assegurar a seguranĂ§a psĂ­quica do impĂ©rio"
 shroud.6800.name: "$MINDWARDENS_THE_FIRST_ENCLAVE$"
 shroud.6800.desc: "Acumulamos um vasto conhecimento sobre o Â§HVĂ©uÂ§! e desenvolvemos tecnologias avanĂ§adas para suprimir seus efeitos nocivos. Enquanto debatemos como aplicar esse domĂ­nio em escala galĂĄctica, nossos comandantes de frota apresentaram uma proposta interessante.\n\nEles sugerem o estabelecimento de uma de nossas frotas como um Â§H\"$gov_mindwarden_enclave$\"Â§!, que prestaria assistĂȘncia antipsiĂŽnica em toda a galĂĄxia. $shroud.shared_enclave_investement$"
 shroud.6800.a: "Uma iniciativa digna."
 shroud.6800.a.tt: "Qualquer frota com tamanho igual ou superior a Â§Y30Â§! pode ser convertida em um Â§H$gov_mindwarden_enclave$Â§!."
 shroud.6825.name: "FundaĂ§ĂŁo do $gov_mindwarden_enclave$"
 shroud.6825.desc_first: "Identificamos Â§H[This.GetName]Â§! como possĂ­vel candidata para formar a base de nosso primeiro Â§H$gov_mindwarden_enclave$Â§!. Com a devida autorizaĂ§ĂŁo, a frota estabelecerĂĄ uma nova instalaĂ§ĂŁo no sistema Â§H[This.Solar_System.GetName]Â§! e comeĂ§arĂĄ imediatamente a oferecer serviĂ§os antipsiĂŽnicos."
 shroud.6825.desc_default: "Estamos considerando transformar Â§H[This.GetName]Â§! em um Â§H\"$gov_mindwarden_enclave$\"Â§! independente, encarregado de oferecer assistĂȘncia antipsiĂŽnica por toda a galĂĄxia. $shroud.shared_enclave_investement$"
 shroud.6825.a: "Prossiga com a construĂ§ĂŁo."
 shroud.6825.a.tt: "Um Â§H$gov_mindwarden_enclave$Â§! foi fundado."
 shroud.6825.b: "Vamos reconsiderar."
 shroud.6830.name: "Os $MINDWARDEN_plural$"
 shroud.6830.desc: "O confronto com o Â§HVĂ©uÂ§! e com o uso irresponsĂĄvel de habilidades psiĂŽnicas fortaleceu nosso povo e nos deu clareza quanto aos nossos objetivos. A fundaĂ§ĂŁo do primeiro Â§H$gov_mindwarden_enclave$Â§! marca o inĂ­cio de uma nova era de cura e resistĂȘncia.\n\nPor toda a galĂĄxia, nenhuma mente precisa mais ser invadida por agressores psiĂŽnicos, e nenhum mundo precisa ser assombrado pelas forĂ§as do VĂ©u.\n\nAssim comeĂ§a a era dos $MINDWARDEN_plural$."
 shroud.6830.a: "Nossa jornada Ă© apenas o comeĂ§o."
 shroud.shared_enclave_investement: "Nosso investimento inicial financiaria a construĂ§ĂŁo de uma estaĂ§ĂŁo espacial, em troca, receberĂ­amos uma parte das receitas futuras. A autonomia operacional deles permitirĂĄ a expansĂŁo dessas instalaĂ§Ă”es em maior escala.\n\nComo parte do acordo, tambĂ©m poderemos usar seus serviĂ§os e receber parte do valor investido de volta."
