 shroud.4406.title: "$gov_mindwarden_enclave$ DestruĂ­do"
 shroud.4406.desc_common: "Recebemos relatos da erradicaĂ§ĂŁo de Â§H[mindwarden_enclave_country.GetName]Â§! no sistema [mindwarden_enclave_system.GetName]. O $gov_mindwarden_enclave$ foi incapaz de resistir Ă  investida de Â§H[mindwarden_destroyer.GetName]Â§!, que aniquilou sua estaĂ§ĂŁo e nĂŁo deixou nenhum sobrevivente."
