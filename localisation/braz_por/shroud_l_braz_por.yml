 shroud.6510.a: "NĂŁo recebemos nenhuma comunicaĂ§ĂŁo prĂ©via de sua parte."
 shroud.6515.desc: "Falamos por meio da voz verdadeira. Se tivessem escutado, teriam ouvido o chamado interior. VocĂȘs tĂȘm o dom, mas escolheram suprimi-lo."
 shroud.6515.a: "A aura Ă© destrutiva. Uma praga."
