 shroud.6215.desc.end: "Ainda assim, essa Â§H$PSIONIC_AURA$Â§!, e possivelmente outras, continuam a envenenar a galĂĄxia. Nossos cientistas levantam a hipĂłtese de que a tecnologia da $building_ancient_ward_2$ pode ser aplicada no desenvolvimento de um Â§H\"$SHROUD_SEAL$\"Â§! mais poderoso. Essas estruturas colossais devem ser capazes de suprimir Auras em aglomerados estelares inteiros. A construĂ§ĂŁo de um $SHROUD_SEAL$ no sistema Â§H[exiled_system_border.GetName]Â§! marcaria um passo crucial no controle da ameaĂ§a psiĂŽnica."
