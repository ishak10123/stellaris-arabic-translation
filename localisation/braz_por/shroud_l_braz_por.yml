 shroud.3100.title: "Conflito PsiĂŽnico"
 shroud.3100.desc: "Uma orquestra dissonante de devastaĂ§ĂŁo nos atrai cada vez mais fundo no VĂ©u. Cada reverberaĂ§ĂŁo martela nossa psique em um ritmo implacĂĄvel de ruĂ­na.\n\nO barulho toma forma.\n\nEstamos Ă  margem de um conflito psiĂŽnico. As motivaĂ§Ă”es das entidades sĂŁo incertas, mas o poder demonstrado Ă© imenso.\n\nOs bombardeios psĂ­quicos entram e saem da nossa percepĂ§ĂŁo, contorcendo-se pela realidade fragmentada diante de nĂłs. NĂŁo hĂĄ onde se esconder, hĂĄ apenas a tempestade que se aproxima."
