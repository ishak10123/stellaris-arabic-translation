 shroud.3065.title: "Um CĂĄlice Ordenado"
 shroud.3065.desc.intro: "A nĂ©voa do VĂ©u estremece, abrindo-se para revelar um cĂĄlice repleto de um lĂ­quido cintilante, cuja superfĂ­cie permanece lisa e intacta.\n\nUm impulso nos domina. Sem pensar, tentamos tocĂĄ-lo. O lĂ­quido, ansioso, treme quando comeĂ§amos a consumi-lo.\n\nA clareza nos invade. Quanto mais lĂ­quido conseguimos [GetImbibeLoc], mais a mentira se revela. O fluido engrossa, cada gota comeĂ§ando a coalhar dentro de nĂłs.\n\nSomos consumidos por uma necessidade de expurgar a contaminaĂ§ĂŁo."
 shroud.3065.desc.eater: "Â§HFARTE-SE! AFOGUE SUAS FRAQUEZAS!Â§!"
