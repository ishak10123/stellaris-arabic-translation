 TUTORIAL_SHROUD_TAB_TITLE: "Tutorial: $THE_SHROUD_TITLE$"
 TUTORIAL_SHROUD_TAB_DESC: "Esta Ă© a aba do Â§SVĂ©uÂ§!. O painel Ă  esquerda mostra a posiĂ§ĂŁo de nosso impĂ©rio no VĂ©u, representado pelos Â§SdomĂ­niosÂ§! de quatro entidades psiĂŽnicas conhecidas como Â§SPatronosÂ§!.\n\nNossa posiĂ§ĂŁo Ă© determinada pela Â§S$concept_attunement$Â§!, que Ă© obtida quando uma aĂ§ĂŁo no plano fĂ­sico agrada um Patrono. Ganhe $concept_attunement$ para comeĂ§ar o processo de revelar a identidade de um Patrono. Uma vez revelada, clique no domĂ­nio do Patrono para abrir o painel do Patrono.\n\nClique em Â§S$DELVE$Â§! ou no centro do painel Ă  esquerda para adentrar o VĂ©u e explorar o reino psiĂŽnico. Enquanto exploramos, o que descobriremos pode ser influenciado pela posiĂ§ĂŁo de nossa $concept_attunement$ dentro dos domĂ­nios."
 TUTORIAL_SHROUD_PATRON_TITLE: "Tutorial: Entidades Patronais do VĂ©u"
 TUTORIAL_SHROUD_PATRON_DESC: "O painel do Â§SPatronoÂ§! fornece informaĂ§Ă”es e opĂ§Ă”es relacionadas Ă  Entidade Patronal do VĂ©u. Conclua os objetivos fornecidos por Â§S$concept_callings$Â§! e Â§S$concept_deeds$Â§! para ganhar Â§S$concept_attunement$Â§! com essa entidade em particular.\n\nAumente a $concept_attunement$ para liberar Â§S$PASSIVE_ACCORDS$Â§!, que fornecem vantagens para nosso impĂ©rio. Ganhe $concept_attunement$ suficiente para que um Patrono comece o processo de formar um Â§SPactoÂ§!, que concede ainda mais benefĂ­cios substanciais."
 TUTORIAL_SHROUD_COVENANT_TITLE: "Tutorial: Pactos"
 TUTORIAL_SHROUD_COVENANT_DESC: "Confirmar um Â§SPactoÂ§! com uma Entidade Patronal do VĂ©u concede acesso a Â§S$ACTIVE_ACCORDS$Â§!.Â $tutorial.shroud_covenant.shared$"
 tutorial.shroud_covenant.shared: "Clique no Ă­cone $ACTIVE_ACCORD$ para ativar seus efeitos ao custo de ÂŁsr_zroÂŁÂ Â§S$sr_zro$Â§!. Isso pode ser feito no painel principal do VĂ©u ou no painel individual do Patrono.\n\nDepois da ativaĂ§ĂŁo, um $ACTIVE_ACCORD$ requer um perĂ­odo de recarga antes que possa ser ativado novamente."
 TUTORIAL_SHROUD_SHAPING_TITLE: "Tutorial: Moldando VĂ©u"
 TUTORIAL_SHROUD_SHAPING_DESC: "Agora temos os meios para ganhar certos poderes que normalmente requerem um Â§SPactoÂ§! com um Â§SPatronoÂ§!.\n\nDepois que liberarmos ambos os Â§S$PASSIVE_ACCORDS$Â§! de nosso Patrono, ganharemos acesso a um Â§S$ACTIVE_ACCORD$Â§!. $tutorial.shroud_covenant.shared$"
 tutorial.2600.name: "Tutorial: $PSIONIC_AURA_PLURAL$"
 tutorial.2600.desc: "Nossas colĂŽnias com populaĂ§Ă”es psiĂŽnicas agora tĂȘm a habilidade de emitir uma Â§S$PSIONIC_AURA$Â§!. Essa Aura Ă© extraĂ­da da Â§SEntidade Patronal do VĂ©uÂ§! com a qual nĂłs temos atualmente a maior Â§S$concept_attunement$Â§!.\n\n$PSIONIC_AURA_PLURAL$ tĂȘm diversos efeitos em nosso impĂ©rio e podem afetar impĂ©rios hostis ou amigĂĄveis. Para expandir nossa Aura para mais sistemas, precisaremos nos sintonizar completamente com um Patrono para liberar a tecnologia ÂŁresearchÂŁÂ Â§S$tech_aura_intensification$Â§!.\n\nPara ver os efeitos de nossa $PSIONIC_AURA$, abra a aba Â§SVĂ©uÂ§! ou selecione o Ă­cone da Aura no painel inferior central na ÂŁinterfaceÂŁÂ Â§SVisĂŁo do SistemaÂ§!."
 tutorial.2610.name: "Tutorial: $tech_aura_intensification$"
 tutorial.2610.desc: "Nossa Â§S$PSIONIC_AURA$Â§! agora pode ganhar Â§SIntensidadeÂ§! e se espalhar para outros sistemas.\n\n$PSIONIC_AURA_PLURAL$ podem alcanĂ§ar trĂȘs limiares de Intensidade, com efeitos diferentes. Se uma $PSIONIC_AURA$ alcanĂ§ar um novo nĂ­vel de Intensidade ou maximizĂĄ-la, ela tentarĂĄ se espalhar para sistemas adjacentes. A maior parte das $PSIONIC_AURA_PLURAL$ tem um limite de distĂąncia atĂ© onde pode se espalhar a partir de sua fonte.\n\nA Intensidade da Aura pode ser aumentada de muitas formas, como altas populaĂ§Ă”es com a caracterĂ­stica $trait_psionic$, nĂ­veis de ÂŁhappinessÂŁÂ Â§SFelicidadeÂ§!, Empregos de ÂŁjob_telepathÂŁÂ [GetTelepathCap] e Governadores PsĂ­quicos ou ÂŁleaderÂŁÂ LĂ­deres de ÂŁsectorÂŁÂ Setores."
 tutorial.2620.name: "Tutorial: Conflito de Auras"
 tutorial.2620.desc: "Nossa Â§S$PSIONIC_AURA$Â§! encontrou outra Aura em um sistema conectado adjacente. Quando isso ocorre, as duas Auras podem competir para determinar qual se espalharĂĄ para o outro sistema.\n\nEsse processo depende do ganho de Â§SIntensidadeÂ§! mensal de cada uma das Auras, que pode ser visto ao mover o cursor sobre o Ă­cone de Aura no painel inferior central da ÂŁinterfaceÂŁÂ Â§SVisĂŁo do SistemaÂ§!."
