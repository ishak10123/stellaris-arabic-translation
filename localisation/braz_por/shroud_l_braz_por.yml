 origin_endbringers: "Arautos do Fim"
 origin_endbringers_desc: "$CHALLENGING_ORIGIN$Â§RATENĂĂO: Bloqueia todos os Caminhos de AscensĂŁo, exceto por ['concept_psionic_ascension'].Â§!\n\nEsta civilizaĂ§ĂŁo estĂĄ hĂĄ muito tempo obcecada pela calamidade misteriosa que transformou um planeta vizinho em um Mundo Velado desolado. Agora, conforme se aventuram entre as estrelas, eles podem finalmente explorar seus segredos e descobrir se um destino semelhante os aguarda."
 origin_tooltip_endbringers_negative_effects: "- O impĂ©rio comeĂ§a com o modificador ['concept_paranoia_modifier']\n- NĂŁo pode formar ou se unir a uma ['concept_federation']"
 concept_paranoia_modifier: "$endbringers_paranoia$"
 concept_paranoia_modifier_desc: "ApĂłs sua sociedade testemunhar uma catĂĄstrofe antiga, geraĂ§Ă”es posteriores sofrem de um medo terrĂ­vel e constante do cataclismo.\n\nO modificador de Felicidade piora com o tempo: Â§R-5%Â§! atĂ© Â§R-50%Â§!"
 endbringers_paranoia: "Paranoia"
 endbringers_paranoia_desc: "ApĂłs sua sociedade testemunhar uma catĂĄstrofe antiga, geraĂ§Ă”es posteriores sofrem de um medo terrĂ­vel e constante do cataclismo. Seremos as prĂłximas vĂ­timas desse destino?"
 endbringers_paranoia_tt: "$chamber_of_silence_negative_effects_reduction$"
 START_SCREEN_ENDBRINGERS: "Somos os arautos do cataclismo.\n\nNo alvorecer do povo [GetSpeciesAdj], uma calamidade misteriosa assolou nosso vizinho celeste mais prĂłximo. Sua transformaĂ§ĂŁo sĂșbita e brutal tingiu os cĂ©us noturnos com uma luz pĂșrpura sinistra, despertando em nosso povo o temor de que um dia compartilharĂ­amos o mesmo destino. A cada geraĂ§ĂŁo, sentĂ­amos o medo sufocante da aniquilaĂ§ĂŁo total nos cercando.\n\nAgora, com [GetSpeciesNamePlural] desbravando as estrelas, somos compelidos a explorar este \"$pc_shrouded$\". As respostas que desejamos hĂĄ sĂ©culos estĂŁo ao nosso alcance. Ainda assim, muitos entre nĂłs alertam que tal fascinaĂ§ĂŁo obsessiva pela origem desse poder destrutivo pode nos levar Ă  ruĂ­na.\n\nEm breve, ergueremos o Ășltimo manto."
 shroud.8010.title: "MissĂŁo para [shrouded_planet.GetName]"
 shroud.8010.desc: "SatĂ©lites exploratĂłrios na Ăłrbita de Â§H[shrouded_planet.GetName]Â§! identificaram um alvo promissor para nossa primeira missĂŁo tripulada para a superfĂ­cie desse \"$pc_shrouded$\". A zona de aterrissagem emana uma radiaĂ§ĂŁo estranha que reverbera pelo planeta, levada por ventos ultravioletas.\n\nInĂșmeros [Root.GetSpeciesNamePlural] protestam contra essa missĂŁo, temendo que a mesma maldiĂ§ĂŁo recaia sobre nosso mundo natal. Suas preocupaĂ§Ă”es nĂŁo sĂŁo infundadas, mas a necessidade urgente de compreender esse fenĂŽmeno distante deve ser prioridade.\n\nSe estamos fadados a um dia sofrer a mesma calamidade, ao menos morreremos sabendo o porquĂȘ."
 shroud.8010.a: "A busca por respostas comeĂ§a agora."
 the_shrouded_world_site: "O $pc_shrouded$"
 the_shrouded_world_site_desc: "Finalmente, somos capazes de alcanĂ§ar e tocar o \"$pc_shrouded$\" conhecido como Â§H[planet.GetName]Â§!. Algo lĂĄ nos chama, uma voz mais forte agora do que jamais foi.\n\nOs segredos do cataclismo que caiu sobre este mundo revelarĂŁo muito da histĂłria de nosso prĂłprio sistema, e com sorte acalmarĂŁo a obsessĂŁo de nossa sociedade com sua prĂłpria destruiĂ§ĂŁo profetizada. AnĂĄlises orbitais indicam padrĂ”es rodopiantes de energia intensa, isolados em um ponto hemisfĂ©rio sul; um olho sinistro nos encarando."
 shroud.8100.name: "O Fim EstĂĄ PrĂłximo"
 shroud.8100.desc: "O terreno em Â§H[shrouded_planet.GetName]Â§! Ă© tĂŁo perigoso quanto antecipĂĄvamos. VĂłrtices de partĂ­culas crepusculares giram e cortam o ar, diminuindo o progresso inicial de Â§H[Leader.GetName]Â§! e sua tripulaĂ§ĂŁo.\n\nDe maneira alarmante, nossa equipe de pesquisa comeĂ§ou a relatar inconsistĂȘncias sensoriais. Eles descreveram uivos distantes carregados pelos ventos e silhuetas misteriosas os perseguindo pelas nĂ©voas. SerĂĄ que virmos atĂ© aqui foi realmente um erro?\n\nA primeira transmissĂŁo pĂșblica da aterrissagem causou pĂąnico generalizado em Â§H[Owner.GetHomeWorldName]Â§!. Muitos temem que estejamos brincando com os poderes misteriosos e destrutivos que uma vez visitaram [shrouded_planet.GetName]. Protestos organizados, afirmando que \"o fim estĂĄ prĂłximo\", tomam conta de nosso mundo natal, paralisando boa parte de nossa infraestrutura.\n\nAnĂĄlises telemĂ©tricas revelaram uma cavidade emanando quantidades particularmente elevadas de radiaĂ§ĂŁo do interior de uma cadeia de montanhas. Estamos determinados a prosseguir, custe o que custar."
 shroud.8100.a: "Perfure a superfĂ­cie. Precisamos encontrar o que nos espera."
 the_end_is_nigh: "O Fim EstĂĄ PrĂłximo"
 the_end_is_nigh_desc: "Uma sensaĂ§ĂŁo de destruiĂ§ĂŁo iminente assombra nossa sociedade."
 shroud.8105.name: "Estrutura AlienĂ­gena"
 shroud.8105.desc: "NĂŁo fomos os primeiros.\n\nA cavidade montanhosa em Â§H[shrouded_planet.GetName]Â§! foi acessada, revelando uma estrutura alienĂ­gena abandonada e perdida para o cataclismo. Achamos melhor omitir essa informaĂ§ĂŁo para prevenir mais pĂąnico.\n\nAnĂĄlises preliminares confirmam que os materiais usados na construĂ§ĂŁo das instalaĂ§Ă”es nĂŁo sĂŁo compatĂ­veis com a composiĂ§ĂŁo molecular dos minerais disponĂ­veis no planeta, sugerindo que uma civilizaĂ§ĂŁo espacial criou esta estrutura usando materiais exĂłticos. O propĂłsito exato desse lugar continua incerto, mas sua funcionalidade parece ser na maior parte automatizada.\n\nEnquanto isso, os sintomas psicolĂłgicos da equipe estĂŁo piorando. Alguns relatam vozes sussurrando atravĂ©s de frequĂȘncias criptografadas, enquanto outros descrevem percepĂ§Ă”es distorcidas do ambiente fĂ­sico ao seu redor. Surtos de risada ocasionais estĂŁo se tornando perturbadoramente comuns.\n\nFomos longe demais para voltar atrĂĄs agora."
 shroud.8110.name: "Os Vigias"
 shroud.8110.desc: "EstĂŁo todos mortos.\n\nEm cada estaĂ§ĂŁo, no coraĂ§ĂŁo dessa instalaĂ§ĂŁo, jazem os corpos dessecados de uma espĂ©cie desconhecida de alienĂ­genas, seus muitos olhos pĂĄlidos fitando o teto. Apesar da aparĂȘncia assustadora, Â§H[Leader.GetName]Â§! estĂĄ confiante de que essas figuras nĂŁo sĂŁo resultado de alucinaĂ§Ă”es. Imagens dessas formas de vida sĂŁo classificadas atualmente como extremamente confidenciais.\n\nNenhuma arma de qualquer tipo pĂŽde ser encontrada, sugerindo que sua presenĂ§a em Â§H[shrouded_planet.GetName]Â§! nĂŁo era de intento hostil. Esta instalaĂ§ĂŁo era provavelmente um posto de observaĂ§ĂŁo, com equipamento de monitoramento sofisticado apontado diretamente para Â§H[Owner.GetHomeWorldName]Â§!. A dataĂ§ĂŁo de radiocarbono indica que sua atividade aqui precede consideravelmente o momento em que o cataclismo atingiu.\n\nDecodificamos muitos de seus registros: alĂ©m de comunicaĂ§Ă”es de rotina, eles falam bastante sobre a histĂłria antiga de nossa civilizaĂ§ĂŁo."
 shroud.8110.a: "Eles estavam nos vigiando?"
 shroud.8115.name: "Poderes alĂ©m da CompreensĂŁo"
 shroud.8115.desc: "O banco de dados em Â§H[shrouded_planet.GetName]Â§! foi decifrado, comprovando muitas de nossas lendas descreditadas. Ăramos cobaias em um experimento das ciĂȘncias mentais conhecido como \"$tech_psionic_theory$\".\n\nDeterminou-se que nossa espĂ©cie tinha esse potencial latente. Muitos de nossos ancestrais teriam sentido essas comunicaĂ§Ă”es em sonhos ou como vozes distantes, um fenĂŽmeno que, de outra forma, indicaria transtornos mentais ou paranoia. Entretanto, seus experimentos pararam; em seus Ășltimos dias, este lugar nĂŁo era mais um posto de observaĂ§ĂŁo, e sim um abrigo de sobrevivĂȘncia.\n\nSeus relatĂłrios sobre nossa sociedade pararam depois de um experimento desastroso em seu mundo capital, envolvendo a manipulaĂ§ĂŁo inconsequente da barreira entre realidades conhecida como Â§H\"o VĂ©u\"Â§!. Seus cientistas se referem a esse incidente como \"O JuĂ­zo Final\" e suspeitamos que essa foi a verdadeira fonte do cataclismo.\n\nSeja lĂĄ o que tenha sido esse incidente, sua influĂȘncia logo se estendeu para Â§H[shrouded_planet.GetName]Â§!. Seus Ășltimos momentos foram captados em um Ășnico registro:\n\nÂ§LO Fim chegou.Â§!"
 shroud.8115.a: "SerĂĄ que virĂĄ atrĂĄs de nĂłs?"
 shroud.8120.name: "$fragment_of_reckoning$"
 shroud.8120.desc: "Encontramos evidĂȘncias definitivas da fonte do cataclismo. NĂŁo foi nada difĂ­cil; Â§H[Leader.GetName]Â§! afirma que algo lhe chamava.\n\nDe dentro da instalaĂ§ĂŁo, desafiando anĂĄlises convencionais, uma massa intangĂ­vel pulsante foi identificada. Existindo nĂŁo como massa, nem como energia, algo que Â§H[Leader.GetName]Â§! descreveu como uma reminiscĂȘncia de ressentimento de vontades consumidas, se referindo a ela como Â§H$fragment_of_reckoning$Â§!.\n\nEm um esforĂ§o equivocado para conter e canalizar as energias etĂ©reas do Â§HVĂ©uÂ§!, esse objeto foi feito para ser usado como defesa contra o JuĂ­zo Final. Entretanto, ele foi apenas parcialmente bem-sucedido. Nos Ășltimos momentos deste mundo, a entidade maligna foi banida desta dimensĂŁo de maneira forĂ§ada, levando as mentes relutantes dos cientistas com ela. Esse fragmento Ă© tudo que resta agora.\n\nEsse objeto amplifica as visĂ”es e alucinaĂ§Ă”es de nossos pesquisadores, concedendo a eles uma segunda visĂŁo alĂ©m do limite da realidade. Ă uma proposiĂ§ĂŁo perigosa, mas promissora."
 shroud.8120.a: "Ainda temos muito a aprender..."
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY: "$tech_psionic_theory$"
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC: "O fragmento de energia psiĂŽnica que descobrimos em Â§H[shrouded_planet.GetName]Â§! contĂ©m segredos que precisamos desvendar.\n\nSomos refreados pelas limitaĂ§Ă”es de nossas prĂłprias mentes."
