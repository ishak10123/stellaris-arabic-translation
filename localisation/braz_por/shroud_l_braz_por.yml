 shroud.2625.desc: "Uma nova doenĂ§a estĂĄ se espalhando por [owner.GetName], fazendo com que nossa populaĂ§ĂŁo desenvolva lesĂ”es inexplicĂĄveis em seus ĂłrgĂŁos neurais.\n\nA epidemia afeta exclusivamente [owner.GetIndividualNamePlural] com maiores capacidades psiĂŽnicas e, em muitos casos, tem se mostrado fatal.\n\n$shroud.2625.desc_common$"
