 shroud.8380.name: "Marca do Fim"
 shroud.8380.desc: "HĂĄ uma tendĂȘncia crescente de automutilaĂ§ĂŁo na populaĂ§ĂŁo.\n\nSeguidores fanĂĄticos da Â§RVozÂ§! vĂȘm marcando sua carne com o sĂ­mbolo do \"Fim\". Eles dizem que esses desenhos concedem uma bĂȘnĂ§ĂŁo terrĂ­vel para aqueles que os carregam.\n\nVerdade ou nĂŁo, o nĂșmero de praticantes envolvidos em tais rituais estĂĄ crescendo rapidamente. Seria essa a verdadeira vontade do Â§HVĂ©uÂ§!?"
