 shroud.4280.desc: "Teremos o maior prazer.\n\nUma lideranĂ§a eficaz Ă© a chave para combater o Â§HVĂ©uÂ§!, e nossos Mentemestras dominam a arte da supressĂŁo psiĂŽnica por meio de uma governanĂ§a firme."
