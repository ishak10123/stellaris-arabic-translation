 shroud.5300.e: "O que vocĂȘ pode nos dizer sobre as Â§Y$PSIONIC_AURA_PLURAL$Â§!?"
 shroud.5300.f: "Ajude-nos a fortalecer nossa Â§Y$PSIONIC_AURA$Â§!."
