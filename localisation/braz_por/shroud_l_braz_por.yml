 shroud.4405.desc.default: "$shroud.4405.desc_common$ Apesar de nĂŁo nos importarmos com as prĂĄticas que tanto desprezavam, sua cruzada contra o Â§H\"VĂ©u\"Â§! representava uma doutrina pseudocientĂ­fica que nĂŁo merece espaĂ§o em nossa galĂĄxia."
 shroud.4405.desc.psionic: "$shroud.4405.desc_common$ Eles nĂŁo espalharĂŁo mais discursos ignorantes sobre os perigos do Â§HVĂ©uÂ§!, e os atenuadores psiĂŽnicos de sua estaĂ§ĂŁo agora sĂŁo apenas destroĂ§os."
