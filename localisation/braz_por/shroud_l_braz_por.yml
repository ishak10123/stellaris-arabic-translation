 shroud.11225.title: "Um Desaparecimento Repentino"
 shroud.11225.desc.common_1: "Em um instante, tudo se foi.\n\nA Â§R$end_aura$Â§! maligna presente em nossos sistemas de repente desapareceu, levando tudo embora consigo. Estrelas inteiras colapsaram em buracos negros, planetas desapareceram e um grande silĂȘncio paira em seu lugar."
 shroud.11225.desc.common_2: "Talvez nunca saibamos qual insanidade convocou tamanho poder destrutivo."
