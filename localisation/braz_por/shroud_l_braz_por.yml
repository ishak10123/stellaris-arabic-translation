 shroud.3101.desc: "$shroud.3101.desc.intro$\n\nCom foco nĂ­tido, sintonizamos com a cascata psĂ­quica. Nossos pensamentos fluem. O bombardeiro persiste, mas continuamos ilesos, nos movendo em harmonia com o ritmo da destruiĂ§ĂŁo.\n\nA cada passo, nossa compreensĂŁo se aprofunda. A rajada psiĂŽnica desliza por brechas em planos invisĂ­veis.\n\nAo nos afastarmos, o padrĂŁo persiste. Com refinamento, os princĂ­pios observados poderĂŁo reforĂ§ar nosso prĂłprio arsenal."
 shroud.3102.title: "Â§RBombardeio AbissalÂ§!"
 shroud.3102.desc: "$shroud.3101.desc.intro$Tentamos nos sintonizar com a tempestade psĂ­quica, movendo-se conforme seus ritmos imprevisĂ­veis.\n\nNossos primeiros passos foram promissores, mas o compasso da destruiĂ§ĂŁo inevitavelmente nos consumiu.\n\nA tempestade estĂĄ se dissipando, mas os ecos do bombardeio ainda ressoam em nĂłs. As reverberaĂ§Ă”es psiĂŽnicas de nossa falha ecoam por todo o impĂ©rio, mesmo nesta realidade."
