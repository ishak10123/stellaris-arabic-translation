 # C5
 shroud.2520.name: "Ataques Monstruosos"
 shroud.2520.desc: "Â§H[Owner.Capital.GetName]Â§! sofreu uma sĂ©rie de ataques da fauna local. Essas criaturas atacaram nossa populaĂ§ĂŁo, invadiram instalaĂ§Ă”es e esgotaram estoques valiosos.\n\nAs tentativas de proteger a populaĂ§ĂŁo com patrulhas armadas e toques de recolher tiveram eficĂĄcia limitada. Nossa equipe de [Owner.GetResearchers] identificou que uma fenda minĂșscula entre nossa realidade e o Â§HVĂ©uÂ§! se abriu em uma ĂĄrea de Â§H[Owner.Capital.GetName]Â§!, liberando uma energia psiĂŽnica que transformou animais antes inofensivos em predadores agressivos. Esse parece ser o local ideal para concentrar nossos esforĂ§os se quisermos superar essa ameaĂ§a."
