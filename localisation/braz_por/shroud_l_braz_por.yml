 shroud.6535.desc: "Uma decisĂŁo sĂĄbia."
 shroud.6550.name: "Hostilidades Adiadas"
 shroud.6550.desc: "Para evitar um confronto direto com Â§H[exiled_country.GetName]Â§!, atendemos Ă s suas exigĂȘncias e desmontamos o $SHROUD_SEAL$ no sistema Â§H[exiled_system_border.GetName]Â§!.\n\nA exposiĂ§ĂŁo aos responsĂĄveis pela praga psiĂŽnica causou grande inquietaĂ§ĂŁo em Â§H[this.GetName]Â§!. A remoĂ§ĂŁo do $SHROUD_SEAL$ servirĂĄ apenas como apaziguamento temporĂĄrio. Mais cedo ou mais tarde, tambĂ©m exigirĂŁo que desmontemos nossa Â§H$building_ancient_ward_2$Â§!, e isso Ă© algo que nĂŁo podemos aceitar.\n\nDe todo modo, um conflito futuro parece ser apenas uma questĂŁo de tempo."
 shroud.6550.a: "Devemos estar preparados."
