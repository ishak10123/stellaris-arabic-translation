 shroud.2600.name: "Complexo de Superioridade"
 shroud.2600.desc: "A distribuiĂ§ĂŁo desigual das habilidades psiĂŽnicas entre nossa populaĂ§ĂŁo estĂĄ dando origem a novas formas de conflito social.\n\nAqueles com maior controle sobre seus novos poderes passaram a se considerar superiores e, portanto, merecedores de privilĂ©gios polĂ­ticos e econĂŽmicos. Essa retĂłrica controversa estĂĄ se tornando cada vez mais agressiva e ameaĂ§a escalar para a violĂȘncia."
