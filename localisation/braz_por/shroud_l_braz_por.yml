 shroud.4035.desc.all.start: "ApĂłs meses chamando em vĂŁo, o ente Â§H[Root.Patron:the_instrument_of_desire.GetPreCommunicationName]Â§! enfim emergiu das profundezas do Â§HVĂ©uÂ§!."
 shroud.4035.desc.default: "$shroud.4035.desc.all.start$\n\nA mensagem veio como um dilĂșvio. Pensamentos invadiram nossas mentes com forĂ§a, apelando aos nossos desejos mais profundos. Palavras fluĂ­am por nĂłs com rapidez e abundĂąncia, sufocando qualquer coisa em nossas mentes. Era uma mensagem sedutora: uma visĂŁo de poder e indulgĂȘncia.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.default.end: "A onda acalmou-se atĂ© se tornar um gotejamento. A presenĂ§a nĂŁo esperava uma resposta... ainda. No fim, fomos deixados com uma sede insaciĂĄvel.\n\nAgora compreendemos melhor o que a entidade deseja. Conhecemos sua visĂŁo de riqueza sem limites. Assim que nossa equipe de [GetTelepathPlural] se recuperar, poderemos nos conectar e comungar com este ser, $the_instrument_of_desire_color_article$."
 shroud.4035.desc.hive: "$shroud.4035.desc.all.start$\n\nA mensagem veio como um dilĂșvio. Pensamentos invadiram nossas mentes com forĂ§a, apelando aos nossos desejos mais profundos. Palavras fluĂ­am por nĂłs com rapidez e abundĂąncia, sufocando qualquer coisa em nossas mentes. Era uma mensagem revigorante: uma visĂŁo de produtividade ilimitada.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.gestalt_machine: "$shroud.4035.desc.all.start$\n\nA mensagem veio como um dilĂșvio. Os dados invadiram nossos circuitos com forĂ§a, superando todos os registros anteriores. Um cĂłdigo exĂłtico fluiu por nĂłs, ĂĄgil e abundante, sufocando qualquer outra coisa em nossos sistemas. Era uma mensagem energizante: uma visĂŁo de produtividade ilimitada.\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.desc.machine.end: "A onda acalmou-se atĂ© se tornar um gotejamento. A presenĂ§a nĂŁo esperava uma resposta... ainda. No fim, fomos deixados com um vazio fragmentado que anseia por comandos elegantes.\n\nAgora compreendemos melhor o que a entidade deseja. Conhecemos sua visĂŁo de riqueza sem limites. Assim que nossa equipe de [GetTelepathPlural] estiver recarregada, poderemos nos conectar e comungar com este ser, $the_instrument_of_desire_color_article$."
 shroud.4035.desc.individual_machine: "$shroud.4035.desc.all.start$\n\nA mensagem veio como um dilĂșvio. Pensamentos invadiram nossas mentes com forĂ§a, apelando aos nossos desejos mais profundos. Palavras fluĂ­am por nĂłs com rapidez e abundĂąncia, sufocando qualquer coisa em nossas mentes. Era uma mensagem revigorante: uma visĂŁo de produtividade ilimitada.\n\n$shroud.4035.desc.machine.end$"
