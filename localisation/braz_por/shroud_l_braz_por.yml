 shroud.6860.1.desc: "Com mais financiamento, poderĂ­amos expandir bastante nossa operaĂ§ĂŁo. PoderĂ­amos aumentar o nĂșmero e as capacidades de nossas frotas e recrutar pesquisadores para desenvolver nossas tecnologias de proteĂ§ĂŁo mental. No fim, toda a galĂĄxia se beneficiaria de seu patrocĂ­nio."
 shroud.6860.2.desc: "Precisamos ficar atentos Ă  ameaĂ§a variada dos psiĂŽnicos. Sua doaĂ§ĂŁo generosa nos permitirĂĄ ampliar significativamente nossas operaĂ§Ă”es para que elas possam corresponder ao desafio."
