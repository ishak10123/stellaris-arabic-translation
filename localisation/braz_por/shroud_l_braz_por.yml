 RECKONING_ARRIVAL_PROJECT: "Enfrentando o JuĂ­zo Final"
 RECKONING_ARRIVAL_PROJECT_DESC: "A galĂĄxia estĂĄ sob ameaĂ§a de uma entidade imensamente poderosa conhecida como Â§R$NAME_Reckoning$Â§!. Feita de pura energia, ela surgiu repentinamente e iniciou uma campanha de destruiĂ§ĂŁo.\n\nAs informaĂ§Ă”es reunidas atĂ© o momento indicam que essa entidade Ă© um inimigo diferente de tudo o que jĂĄ enfrentamos. Se quisermos ter alguma chance, deveremos iniciar uma pesquisa emergencial para determinar mĂ©todos mais eficazes de combate."
 shroud.11235.title: "$RECKONING_ARRIVAL_PROJECT$"
 shroud.11235.desc: "Nossa equipe de [GetScientistPlural] concluiu uma pesquisa detalhada sobre a poderosa entidade conhecida como Â§R$NAME_Reckoning$Â§!.\n\nCom base em suas descobertas, determinamos um mĂ©todo eficaz de enfrentĂĄ-la com a tecnologia atualmente disponĂ­vel: a energia que compĂ”e o $NAME_Reckoning$ pode ser deteriorada usando uma forma modificada de armamento projetado para atravessar escudos de energia.\n\nApesar de sua imensa forĂ§a, agora temos uma chance real de confrontar essa ameaĂ§a."
 shroud.11235.a: "$extreme_frontiers.1531.i$"
 RECKONING_VULNERABILITY_PROJECT: "Deve Haver Uma Fraqueza"
 RECKONING_VULNERABILITY_PROJECT_DESC: "Apesar de nossa derrota, o confronto com o Â§R$NAME_Reckoning$Â§! forneceu dados inestimĂĄveis para estudos.\n\nAo dedicar recursos Ă  pesquisa dessa misteriosa entidade de energia, poderemos identificar suas vulnerabilidades e desenvolver mĂ©todos de ataque mais eficazes."
 shroud.11240.title: "Aprendendo com a Derrota"
 shroud.11240.desc: "O Â§R$NAME_Reckoning$Â§! provou ser uma forĂ§a alĂ©m da capacidade de nossas frotas. Apesar da derrota, o confronto nos proporcionou dados valiosos sobre essa entidade misteriosa de energia; informaĂ§Ă”es que sĂł seriam possĂ­veis por meio do combate direto.\n\nUma anĂĄlise preliminar indica que reunimos dados suficientes para simular a composiĂ§ĂŁo da entidade. Com mais estudos, poderemos identificar suas vulnerabilidades e refinar nossos ataques."
 shroud.11240.a: "Deve haver uma fraqueza."
 shroud.11245.title: "A Fraqueza do $NAME_Reckoning$"
 shroud.11245.desc.1: "Nossa equipe de [GetScientistPlural] fez uma descoberta significativa em suas pesquisas sobre a entidade de energia conhecida como Â§R$NAME_Reckoning$Â§!."
 shroud.11245.desc.2.intro: "A entidade nĂŁo apenas emergiu"
 shroud.11245.desc.2.outro: "Utilizando uma classe de lasers com propriedades de \"supressĂŁo psiĂŽnica\", nossas frotas poderĂŁo interromper essa conexĂŁo, tornando sua forma fĂ­sica vulnerĂĄvel a ataques."
 shroud.11245.desc.2.psionic: "$shroud.11245.desc.2.intro$ do Â§HVĂ©uÂ§!, como tambĂ©m mantĂ©m sua forĂ§a defensiva por meio de um elo transdimensional com o reino psiĂŽnico. $shroud.11245.desc.2.outro$"
 shroud.11245.desc.2.non_psionic: "$shroud.11245.desc.2.intro$ de outra dimensĂŁo da realidade, como tambĂ©m mantĂ©m sua forĂ§a defensiva por meio de um misterioso elo transdimensional. $shroud.11245.desc.2.outro$"
 reckoning_insight_modifier: "Compreendendo o JuĂ­zo Final"
 reckoning_insight_modifier_desc: "GraĂ§as a uma pesquisa extensa, determinamos um mĂ©todo eficaz de causar dano ao $NAME_Reckoning$ utilizando uma versĂŁo modificada de nosso armamento atual."
 reckoning_vulnerability_modifier: "A Fraqueza do JuĂ­zo Final"
 reckoning_vulnerability_modifier_desc: "Utilizando os dados obtidos em nosso encontro anterior com o JuĂ­zo Final, descobrimos um meio de amplificar o dano de nossos ataques com a ajuda de lasers de \"supressĂŁo psiĂŽnica\"."
