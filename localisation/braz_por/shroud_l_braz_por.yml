 shroudwalker_contact_patron_cooldown_tt: "Â§RDevemos esperar atĂ© Â§Y[This.shroudwalker_contact_patron_cooldown_timer]Â§!.Â§!"
 shroud.5310.desc: "Quanto mais profunda sua sintonia com a vontade do Â§HVĂ©uÂ§!, mais poderosa sua mente se tornarĂĄ.\n\nCom qual entidade vocĂȘ deseja aprofundar sua sintonia?"
 shroudwalker_attune_patron_cooldown_tt: "Â§RDevemos esperar atĂ© Â§Y[This.shroudwalker_attune_patron_cooldown_timer]Â§!.Â§!"
 shroud.5315.desc: "Ah sim... O Â§HVĂ©uÂ§!. Ele pulsa com segredos encobertos por incontĂĄveis mantos de pensamento e sonho, se souber como procurĂĄ-los.\n\nPodemos apenas guiĂĄ-los para a sabedoria que descobrimos. A partir de entĂŁo, tecnologias novas e formidĂĄveis florescerĂŁo, mas o caminho Ă© seu para trilhar.\n\nMas saibam que nossos telepatas devem se dedicar completamente a esta tarefa. O que jaz alĂ©m da orientaĂ§ĂŁo deles... nĂŁo se submete ao nosso controle."
 shroud.5315.b: "$shroud.5305.b$"
 shroud.5315.c: "$shroud.5305.c$"
 shroud.5315.trigger_failed: "Â§RNada mais poderĂĄ ser revelado por [event_target:shroudwalker_enclave_country.GetName] sobre esse assunto.Â§!"
 shroudwalker_delving_ritual_cooldown_tt: "Â§ROs telepatas precisam de tempo para se recuperar. Eles nĂŁo serĂŁo capazes de conduzir outro ritual de mergulho atĂ© Â§Y[This.shroudwalker_delving_ritual_cooldown_timer]Â§!.Â§!"
 shroud.5318.desc: "O Â§HVĂ©uÂ§! mais uma vez prova que nĂŁo existem coincidĂȘncias.\n\nA revelaĂ§ĂŁo que nosso conclave buscava foi descoberta por mĂ©rito seu. Reconhecemos seus esforĂ§os, mas nĂŁo podemos ajudĂĄ-los alĂ©m deste ponto."
 shroud.5320.desc.none: "A capacidade de manifestar o Â§HVĂ©uÂ§! no plano fĂ­sico Ă© um segredo guardado a sete chaves, algo que nem nĂłs podemos ensinar. Despertar a prĂłpria $PSIONIC_AURA$ exige uma jornada pessoal pelos domĂ­nios do VĂ©u. Conecte-se de forma mais profunda a uma entidade de sua escolha, e esse conhecimento se tornarĂĄ claro em sua mente."
 shroud.5320.desc.aura.intro: "Sua $PSIONIC_AURA$ Ă© a manifestaĂ§ĂŁo de sua sintonia com o Â§HVĂ©uÂ§!. Ela influencia tudo ao seu redor, e Ă© carregada de intenĂ§ĂŁo. Ao conversamos, nosso clĂŁ sente a natureza da sua aura:"
 shroud.5320.desc.aura.outro: "Por enquanto, a projeĂ§ĂŁo da sua aura ainda Ă© limitada. Mas se uma entidade do VĂ©u lhe oferecer um Pacto, tudo ficarĂĄ claro em sua mente."
 shroud.5320.desc.aura.eater: "$shroud.5320.desc.aura.intro$ uma textura Â§HvorazÂ§!.\n\n$shroud.5320.desc.aura.outro$"
