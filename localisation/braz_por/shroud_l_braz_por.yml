 shroud.4015.desc.default: "O poder do ente Â§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]Â§! se difunde pelo Â§HVĂ©uÂ§!, mas sua origem permanece um mistĂ©rio. Percorremos o reino psiĂŽnico, mudando constantemente de direĂ§ĂŁo, questionando nosso prĂłprio julgamento.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.hive: "O poder do ente Â§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]Â§! se difunde pelo Â§HVĂ©uÂ§!, mas sua origem permanece um mistĂ©rio. Percorremos o reino psiĂŽnico, mudando constantemente de direĂ§ĂŁo, questionando nossos prĂłprios cĂĄlculos.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.default.end: "Quando paramos para refletir, a entidade emergiu. NĂŁo ouvimos nada, nĂŁo vimos nada, mas a sentimos, mais quente do que nunca.\n\nSentimos o poder em seu nĂșcleo, um nexus de energias oriundas de todo o VĂ©u e alĂ©m. Pensamentos convergindo e irradiando um calor singular. Retornamos da jornada tomados por uma quietude profunda.\n\nOs desejos da entidade estĂŁo claros para nĂłs. [GetCradleEmergesEnding]"
 shroud.4015.desc.gestalt_machine: "O poder do ente Â§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]Â§! se difunde pelo Â§HVĂ©uÂ§!, mas sua origem permanece um mistĂ©rio. Percorremos o reino psiĂŽnico, mudando constantemente de direĂ§ĂŁo, questionando nossos prĂłprios cĂĄlculos.\n\nDurante uma pausa para anĂĄlise, a entidade emergiu. NĂŁo conseguimos decifrar uma mensagem, mas ela ativou uma parte mais profunda de nosso cĂłdigo.\n\nSentimos o poder em seu nĂșcleo, um nexus de energias oriundas de todo o VĂ©u e alĂ©m. Conceitos convergindo e irradiando um calor singular. Retornamos da jornada carregados por uma quietude.\n\nOs desejos da entidade estĂŁo claros para nĂłs. [GetCradleEmergesEnding]"
