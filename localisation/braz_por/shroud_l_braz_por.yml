 # The Great Awakening
 shroud.2830.name: "$utopia.2650.name$"
 shroud.2830.desc: "Na $building_chamber_of_silence$, ouvimos a mensagem da Â§RVozÂ§! com perfeita claridade.\n\nÂ§R\"TUDO RENASCERĂ.\"Â§!\n\nNĂłs entendemos agora. O Fim Ă© um renascimento. NĂŁo precisamos temĂȘ-lo. Seremos refeitos. Melhores e mais poderosos do que jamais imaginamos ser.\n\nPara abraĂ§ar nosso destino, precisamos aprender a dominar o reino mental conhecido como o Â§HVĂ©uÂ§!. NĂŁo vamos repetir os erros daqueles que encontramos no $pc_shrouded$. Eles rejeitaram o medo; nĂłs o abraĂ§aremos."
