 # Instrument of Desire
 shroud.4550.title: "$utopia.3304.name$"
 shroud.4550.desc.default: "Assim que entramos no VĂ©u, uma presenĂ§a nos contatou. Seus pensamentos se enroscam e serpenteiam ao redor das mentes de nossa equipe de [GetTelepathPlural], barganhando, persuadindo. Ă $the_instrument_of_desire_color_article$, e ele nos oferece riqueza, poder, prestĂ­gio... tudo o que jĂĄ desejamos. Tudo o que um dia desejaremos.\n\nO preĂ§o? Irrelevante, uma mera formalidade. Ele sĂł deseja o nosso bem. IrĂĄ nos ajudar, guiar, moldar nossas ambiĂ§Ă”es e sonhos.\n\nÂ§HBasta aceitĂĄ-lo em nossos coraĂ§Ă”es.Â§!\n\nEle tem certeza de que diremos sim. Como poderĂ­amos recusar?"
 shroud.4550.desc.hive: "$shroud.4550.desc.default$"
 shroud.4550.desc.gestalt_machine: "Assim que entramos no VĂ©u, uma presenĂ§a nos contatou. Seus pensamentos se enroscam e serpenteiam ao redor dos circuitos de nossa equipe de [GetTelepathPlural], barganhando, persuadindo. Ă $the_instrument_of_desire_color_article$, e ele nos oferece riqueza, poder, prestĂ­gio... tudo o que jĂĄ desejamos. Tudo o que um dia desejaremos.\n\nO preĂ§o? Irrelevante, uma mera formalidade. Ele sĂł deseja o nosso bem. IrĂĄ nos ajudar, guiar, moldar nossas ambiĂ§Ă”es e sonhos.\n\nÂ§HBasta aceitĂĄ-lo em nossos mainframes.Â§!\n\nEle tem certeza de que diremos sim. Como poderĂ­amos recusar?"
 shroud.4550.desc.individual_machine: "$shroud.4550.desc.gestalt_machine$"
 shroud.4550.a: "Formar um Pacto com $the_instrument_of_desire_color_article$."
 shroud.4555.desc.intro: "EstĂĄ feito. Firmamos um Pacto com $the_instrument_of_desire_color_article$. Sua vontade agora pulsa por todo o territĂłrio de Â§H[Root.GetName]Â§!."
 shroud.4555.desc.outro: "Este Ă© o preĂ§o de nosso vĂ­nculo. Segundo nossa equipe de [GetTelepathPlural], as maiores bĂȘnĂ§ĂŁos do Instrumento ainda estĂŁo por vir."
 shroud.4555.desc.default: "$shroud.4555.desc.intro$\n\nJĂĄ Ă© possĂ­vel notar as consequĂȘncias do acordo. Enquanto aguardamos a prometida era de ouro rica e prĂłspera, o povo deixou de se contentar com o mĂ­nimo para viver. [Root.GetSpeciesNamePlural] agora anseiam por todo tipo de bem material, o que gera uma nova pressĂŁo sobre nossa economia.\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.hive: "$shroud.4555.desc.intro$\n\nJĂĄ Ă© possĂ­vel detectar as consequĂȘncias do acordo. Enquanto aguardamos a prometida era de ouro de produtividade incomparĂĄvel, as necessidades bĂĄsicas de nossos drones aumentaram. [Root.GetSpeciesNamePlural] em toda parte agora exigem uma gama de bens nĂŁo essenciais, o que gera uma nova pressĂŁo sobre nossa economia.\n\n$shroud.4555.desc.outro$"
