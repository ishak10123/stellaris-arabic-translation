 shroud.4500.desc.1: "Enquanto avanĂ§amos pelo VĂ©u, sentimos a fome insaciĂĄvel de uma entidade taciturna. "
 shroud.4500.desc.pacifist: "$shroud.4500.desc.1$$utopia.3306.desc.2$\n\nSua impaciĂȘncia Ă© ameaĂ§adora. SerĂĄ que nossas mentes conseguiriam abraĂ§ar tal monstruosidade?"
