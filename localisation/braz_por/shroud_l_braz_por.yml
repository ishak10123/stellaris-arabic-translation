 shroud.6520.a: "E se recusarmos suas exigĂȘncias?"
 shroud.6525.desc: "Quem quer que ameace a aura deverĂĄ ser subjugado. Se recusarem, seremos obrigados a agir militarmente."
 shroud.6525.a: "O Selo nĂŁo serĂĄ desmontado."
