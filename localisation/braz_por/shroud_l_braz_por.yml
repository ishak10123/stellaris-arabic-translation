 # The Great Awakening
 shroud.2780.name: "$utopia.2650.name$"
 shroud.2780.desc_1: "Nossa pesquisa psiĂŽnica continua em ritmo acelerado. A telepatia substituiu a maior parte da comunicaĂ§ĂŁo verbal entre nĂłs, e o controle cognitivo da matĂ©ria pode se tornar igualmente comum. Segundo um grupo de [Owner.GetResearchers], estamos prestes a despertar os poderes latentes em todo o povo [Owner.GetSpeciesAdj]."
 shroud.2780.desc_1_trad: "Despertamos. [Owner.GetSpeciesNamePlural] por todo o territĂłrio de [Owner.GetName] atingiram seu potencial psiĂŽnico mĂĄximo. A telepatia substituiu a maior parte da comunicaĂ§ĂŁo verbal entre nĂłs, e o controle cognitivo da matĂ©ria pode se tornar igualmente comum."
 shroud.2780.desc_1_gestalt_machine: "Nossa pesquisa psiĂŽnica continua em ritmo acelerado. JĂĄ somos capazes de nos comunicar por canais alĂ©m dos convencionais, e uma variedade de outras habilidades psiĂŽnicas estĂŁo se tornando cada vez mais comuns. Segundo um grupo de [Owner.GetResearchers], estamos prestes a despertar as capacidades latentes em nossa populaĂ§ĂŁo."
 shroud.2780.desc_1_gestalt_machine_trad: "Nossa hora chegou. [Owner.GetSpeciesNamePlural] por todo o territĂłrio de [Owner.GetName] atingiram seu potencial psiĂŽnico mĂĄximo. JĂĄ somos capazes de nos comunicar por canais alĂ©m dos convencionais, e uma variedade de outras habilidades psiĂŽnicas estĂŁo se tornando cada vez mais comuns."
 shroud.2780.desc_2: "Ao abrirmos as portas da mente, percebemos forĂ§as inefĂĄveis pulsando dentro de nĂłs e ao nosso redor. Nosso principal grupo de [Owner.GetTelepathPlural] fala sobre o Â§HVĂ©uÂ§!, um reino primordial de onde [Owner.GetIndividualNamePlural] com capacidades psiĂŽnicas extraem poder, ainda que de forma subconsciente; um lugar que Ă© o lar de entidades poderosas feitas de pura energia psiĂŽnica. Como um sussurro abafado na escuridĂŁo, ouvimos seus chamados dentro de nossas prĂłprias mentes."
 shroud.2780.desc_2_crisis: "Ao abrirmos as portas da mente, percebemos as forĂ§as inefĂĄveis do Â§HVĂ©uÂ§! pulsando dentro de nĂłs e ao nosso redor. Sabemos que [Owner.GetIndividualNamePlural] com capacidades psiĂŽnicas extraem poder desse reino, ainda que de forma subconsciente, e que ele abriga entidades poderosas feitas de pura energia psiĂŽnica. Como um sussurro abafado na escuridĂŁo, ouvimos seus chamados dentro de nossas prĂłprias mentes."
 shroud.2780.desc_3: "Com um esforĂ§o cognitivo conjunto, talvez seja possĂ­vel entrar em comunhĂŁo com esses seres, mas para isso precisamos aprender como romper o manto entre nossa dimensĂŁo e o VĂ©u."
 shroud.2780.desc_3_chosen: "Com um esforĂ§o cognitivo conjunto, talvez seja possĂ­vel atravessar o manto entre nossa dimensĂŁo e o VĂ©u completamente, nos permitindo entrar em contato com os seres que residem lĂĄ."
