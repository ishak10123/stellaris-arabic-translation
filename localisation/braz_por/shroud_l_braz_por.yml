 shroud.4040.title: "$utopia.3300.name$"
 shroud.4040.desc: "Conhecemos muitas vozes dentro do Â§HVĂ©uÂ§!. Seus ecos sĂŁo onipresentes e incontĂĄveis. ApĂłs os estados de transe recentes, nossa equipe de [GetTelepathPlural] relatou a presenĂ§a de uma entidade sem igual, um Â§Hzunido multifacetadoÂ§! que permeia o cerne do VĂ©u.\n\nSe concentrarmos energia psiĂŽnica suficiente, poderemos tentar seguir o rastro psiĂŽnico deixado por essa entidade poderosa, conhecida por nossa equipe de [GetTelepathPlural] como Â§H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]Â§!."
 shroud.4040.a: "$utopia.2657.a$"
 shroud.4045.title: "$whisperers_in_the_void_article_cap$"
 shroud.4045.desc.intro: "Em nossos esforĂ§os para comungar com o ente Â§H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]Â§!, avanĂ§amos atĂ© as camadas mais profundas do VĂ©u. Nesse domĂ­nio interno, o VĂ©u gira sem se mover. Os reflexos de cada pensamento, de cada ciclo, convergem para uma forĂ§a fundamental. Ouvimos as vozes dos que nĂŁo tĂȘm voz, levadas por um turbilhĂŁo eterno: $whisperers_in_the_void_color_article$.\n\nUma distorĂ§ĂŁo ĂĄspera nos cerca. Tentamos compreender as incontĂĄveis mensagens, atĂ© que um Ășnico pensamento invade a mente de nossa equipe de [GetTelepathPlural].\n\nÂ§HOuvir Ă© um sacrifĂ­cio.Â§!\n\nPara acessar esse imenso poder, devemos auxiliar a entidade a ocupar"
 shroud.4045.desc.covenant: "$shroud.4045.desc.intro$ o domĂ­nio de [GetCovenantPatronColor]. Tal ato substituiria por completo a presenĂ§a de nossa entidade patronal, quebrando nosso Pacto estabelecido.$shroud.4045.desc.outro$"
 shroud.4045.desc.no_covenant: "$shroud.4045.desc.intro$ o domĂ­nio de outra entidade patronal, substituindo sua presenĂ§a por completo.$shroud.4045.desc.outro$"
 shroud.4045.desc.outro: "\n\nIsso pode resultar em consequĂȘncias significativas."
 shroud.4045.a: "Permitir a entrada dos Sussurradores."
 shroud.4045.a.covenant.tt: "Â§REncerra nosso Pacto com a entidade patronal [GetCovenantPatronColor].Â§!\nSubstitui totalmente o domĂ­nio de [GetCovenantPatronColor] pelo d$whisperers_in_the_void_color_article$.\nÂ§RHaverĂĄ consequĂȘncias.Â§!"
 shroud.4045.a.no_covenant.tt: "Escolheremos o domĂ­nio de uma $major_patron$ para ser substituĂ­do pelo d$whisperers_in_the_void_color_article$.\nÂ§RHaverĂĄ consequĂȘncias.Â§!"
 shroud.4045.b: "Ă melhor nĂŁo perturbar o equilĂ­brio do VĂ©u."
 shroud.4046.title: "AlteraĂ§Ă”es no VĂ©u"
 shroud.4046.desc.1: "Assim que a escolha foi feita, nossa equipe de [GetTelepathPlural] emergiu do Â§HVĂ©uÂ§!"
 shroud.4046.desc.2: "Suas mentes mergulhavam nos ecos de incontĂĄveis vozes.\n\nNossa escolha alterou de forma irreversĂ­vel a maneira como percebemos o reino psiĂŽnico. Ă medida que $whisperers_in_the_void_color_article$ penetram em nossas mentes, nĂŁo conseguimos mais sentir [GetCovenantPatronColor] como antes. NĂŁo temos mais acesso ao seu domĂ­nio.\n\nEstamos lentamente compreendendo a vontade dos Sussurradores. Sentimos sua visĂŁo de conhecimento ilimitado. Assim que nossa equipe de [GetTelepathPlural]"
 shroud.4046.desc.3: "poderemos nos conectar e comungar com esta entidade multifacetada."
