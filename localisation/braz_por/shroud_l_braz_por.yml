 # S5 (gestalt)
 shroud.2620.name: "SeparaĂ§ĂŁo PsiĂŽnica"
 shroud.2620.desc: "Uma forma preocupante de segregaĂ§ĂŁo surgiu no territĂłrio de [owner.GetName], com drones psiĂŽnicos se agrupando fisicamente, Ă s vezes para longe do restante da [owner.GetHiveEntity].\n\nEmbora esses drones permaneĂ§am [owner.GetMentalAdj] integrados ao coletivo, esse comportamento fĂ­sico inexplicĂĄvel levanta questĂ”es inquietantes sobre as possĂ­veis consequĂȘncias do fortalecimento de nossos poderes psiĂŽnicos."
