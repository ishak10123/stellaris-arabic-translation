 shroud.3500.title: "Um Caminho Forjado"
 shroud.3500.desc: "Nossa equipe psiĂŽnica de [GetResearchers] desenvolveu uma tĂ©cnica engenhosa para extrair poder do Â§HVĂ©uÂ§!.\n\nOs maiores poderes do reino psiĂŽnico sĂŁo guardados por seus patronos, e entregues apenas a quem aceita seu Pacto. Isso Ă© inconcebĂ­vel, entĂŁo forjaremos nosso prĂłprio caminho.\n\nAo projetar nossa vontade no VĂ©u, poderemos extrair vestĂ­gios de poder de cada domĂ­nio sintonizado. Tal tarefa exige concentraĂ§ĂŁo absoluta, mas nossas mentes agora estĂŁo fortalecidas para sustentar esse equilĂ­brio delicado."
 shroud.3500.a: "Dentro do VĂ©u, nossa vontade Ă© absoluta."
 shroud.3510.title: "$utopia.2681.name$"
 shroud.3510.desc: "Em uma dobra do Â§HVĂ©uÂ§!, nossa equipe de [GetTelepathPlural] descobriu um nexus de poder inexplorado.\n\nForĂ§as convergentes podem se acumular gradualmente no mundo psiĂŽnico, gerando concentraĂ§Ă”es de energia tĂŁo poderosas que podem se transformar em entidades superiores. Descobrimos uma dessas formaĂ§Ă”es, pronta para ser reivindicada.\n\nPor pura forĂ§a de vontade psiĂŽnica, um de nĂłs poderĂĄ absorver essa forĂ§a extraordinĂĄria. Um grupo de candidatos jĂĄ foi selecionado."
 shroud.3510.a: "Â§H[leader_1.GetTitle]Â§! [leader_1.GetName]"
 shroud.3510.b: "Â§H[leader_2.GetTitle]Â§! [leader_2.GetName]"
 shroud.3510.c: "Â§H[leader_3.GetTitle]Â§! [leader_3.GetName]"
 shroud.3510.d: "Â§H[leader_4.GetTitle]Â§! [leader_4.GetName]"
 psionic_mastery: "Maestria PsiĂŽnica"
 psionic_mastery_desc: "Dominamos por completo nossos poderes psiĂŽnicos. Nossas psiques se movem pelo VĂ©u sem nenhuma limitaĂ§ĂŁo."
 shroud.3520.title: "$psionic_mastery$"
 shroud.3520.desc: "Quando projetamos nossa vontade no Â§HVĂ©uÂ§!, alcanĂ§amos um grau de maestria sobre nossas habilidades psiĂŽnicas. Reunimos poder dos domĂ­nios de inĂșmeras entidades, sem jamais nos submetermos Ă  influĂȘncia delas. AlĂ©m disso, nossa equipe de [GetTelepathPlural] agora controla com primazia o estado de transe psiĂŽnico.\n\nEnquanto outros permitiram que o VĂ©u moldasse seu destino, nĂłs mantivemos a verdadeira independĂȘncia de nossa vontade.\n\nO potencial psiĂŽnico de Â§H[this.GetName]Â§! chegou ao seu ĂĄpice."
 shroud.3520.a: "Isso Ă© apenas o comeĂ§o."
