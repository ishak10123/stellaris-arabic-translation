 shroud.3120.title: "Um Eco Distante"
 shroud.3120.desc: "Por todo o VĂ©u, podemos [GetFeelLoc] a ressonĂąncia de poderes insondĂĄveis. Sua influĂȘncia permeia o reino psiĂŽnico.\n\nNossas aĂ§Ă”es podem nos sintonizar mais com eles, embora exista outro mĂ©todo. Ao usar o poder do Zro, nossa equipe de [GetTelepathPlural] pode estender seu alcance diretamente em direĂ§ĂŁo a essas entidades.\n\nSĂł precisamos decidir qual delas contatar."
 shroud.3120.a: "$utopia.3005.a$"
 shroud.3120.b: "$utopia.3005.b$"
 shroud.3120.c: "$utopia.3005.c$"
 shroud.3120.d: "Â§CCom uma que lamenta a esperanĂ§a sepultada.Â§!"
