 shroud.5105.title: "Os Escolhidos"
 shroud.5105.desc: "Ela sempre nos acompanhou... uma conexĂŁo etĂ©rea com uma entidade que nĂŁo podemos definir nem compreender.\n\n[This.GetTheChosenP2]\n\nDesde os primeiros registros de nossa histĂłria, essa presenĂ§a misteriosa sempre esteve lĂĄ. Que ela nos escolheu, disso nĂŁo hĂĄ dĂșvida... mas o motivo permanece obscuro.\n\nQue nome devemos dar a tal [This.GetSensation]?"
 shroud.5105.desc_p2: "Sentimos sua presenĂ§a em nossos pensamentos mais profundos. Sempre ali, alĂ©m de nosso alcance. Em nossas mentes, Ă© ao mesmo tempo uma certeza e uma impossibilidade."
