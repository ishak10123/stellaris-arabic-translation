 shroud_instrument_covenant_chain_desc.intro: "Criamos um vĂ­nculo com uma entidade do VĂ©u conhecida como Â§HInstrumento de DesejoÂ§!. Atencioso, ele nos concede migalhas de seu poder, por um preĂ§o. E tudo indica que hĂĄ mais por vir.\n\nSegundo nossa equipe de [GetTelepathPlural], poderemos fortalecer essa ligaĂ§ĂŁo se passarmos a agir conforme a vontade de nossa entidade patronal."
 shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\nO Instrumento anseia pelo desejo. Prazeres indulgentes, decadĂȘncia e escravidĂŁo definem a essĂȘncia do Instrumento."
