 triggered_opinion_eotc_situation_stage1: "ConjuraĂ§ĂŁo do Fim"
 shroud.4140.title: "Tudo ou Nada"
 shroud.4140.desc: "Nosso destino estĂĄ conectado com $end_of_the_cycle_color_article$; sempre que sua Aura floresce, tambĂ©m cresce a nossa populaĂ§ĂŁo. Logo, chegamos a uma conclusĂŁo simples: qualquer coisa que impeĂ§a a Aura tambĂ©m impede [This.GetName] e, portanto, deve ser eliminada.\n\nSe quisermos, poderemos abandonar qualquer limite em nossos objetivos militares e conquistar nossos inimigos sem piedade. Nada deverĂĄ ficar no caminho da supremacia do Fim."
 shroud.4140.a: "Que o destino seja cumprido."
