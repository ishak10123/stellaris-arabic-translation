 civic_secret_societies_corporate_effects: "['Concept_ss_factions'] clandestinas surgirĂŁo apĂłs o contato com outros impĂ©rios.\nComeĂ§a com a habilidade de conduzir ['concept_proxy_wars'].\n$job_bureaucrat_plural_with_icon$ produzirĂŁo $i_unity$ a cada Â§YGuerra por ProcuraĂ§ĂŁoÂ§! ativa e bem-sucedida.\nComeĂ§a em ['concept_first_contact'] com dois impĂ©rios vizinhos.\n$INFILTRATION_LEVEL$ ganho em impĂ©rios depois do Â§Y$first_contact$Â§!: Â§G+$@secret_society_infiltration_gain|0$Â§!\nA ÂŁbuildingÂŁÂ Â§Y$building_corporate_embassy$Â§! $megacorp_civic_branch_office_building_effect$"
 shroud.5012.title: "Surgimento de Sociedades Secretas"
 shroud.5012.desc: "Nossas suspeitas foram justificadas. Os governos [first_neighbor.GetAdjective] e [second_neighbor.GetAdjective] confirmaram que foram contactados atravĂ©s de canais nĂŁo oficiais antes que as comunicaĂ§Ă”es formais se iniciassem.\n\nEssas Â§HFacĂ§Ă”esÂ§! agora surgem de nossas prĂłprias sombras e revelam sua existĂȘncia. Conhecidas como Â§H$pft_the_curtain$Â§!, Â§H$pft_the_masquerade$Â§! e Â§H$pft_the_grand_dance$Â§!, essas organizaĂ§Ă”es uma vez secretas agora pedem abertamente um diĂĄlogo formal conosco.\n\nO que querem, e como elas sabem o que sabem, talvez nunca venhamos a entender. Pode ser de nosso interesse operar de acordo com suas exigĂȘncias."
 shroud.5012.a: "E assim a danĂ§a comeĂ§a..."
 shroud.5012.tt: "Â§YFacĂ§Ă”es de Sociedades SecretasÂ§! surgirĂŁo em breve:\n$t$Â§H$pft_the_curtain$Â§!\n$t$Â§H$pft_the_masquerade$Â§!\n$t$Â§H$pft_the_grand_dance$Â§!"
 shroud.5013.title: "Contatos Estranhos"
 shroud.5013.desc: "Existem aqueles entre nĂłs que operam nas sombras da diplomacia. Suspeitamos que seu alcance nĂŁo estĂĄ limitado ao nosso mundo natal.\n\nApesar de termos acabado de nos aventurar pelas estrelas, estabelecemos contato com outras formas de vida muito facilmente. Isso parece mais do que uma mera coincidĂȘncia. Suspeitamos que essas relaĂ§Ă”es interestelares sejam fruto das aĂ§Ă”es de Â§HFacĂ§Ă”esÂ§! secretas que jĂĄ estĂŁo profundamente infiltradas em nossa sociedade.\n\nTalvez, quando aprendermos mais sobre esses seres, aqueles que vivem nas nossas sombras se revelarĂŁo."
 shroud.5013.a: "Eles estĂŁo conosco ou contra nĂłs?"
