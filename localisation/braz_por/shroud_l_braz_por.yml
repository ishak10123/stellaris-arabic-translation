 shroud.3030.title: "Prisma na EscuridĂŁo"
 shroud.3030.desc: "A agitaĂ§ĂŁo incessante do VĂ©u se dissipa, revelando uma longa faixa de areia negra. O som das ondas quebrando pode ser ouvido, mas nĂŁo conseguimos vĂȘ-las.\n\nĂ frente, ou talvez atrĂĄs, um prisma aparece. Um Ășnico feixe de luz o atinge, refratando momentaneamente para formar uma imagem turva.\n\nIncontĂĄveis figuras sombrias e formas mutĂĄveis surgem, apenas para desaparecerem novamente nas trevas.\n\nNa areia prĂłxima, uma presenĂ§a se instala.\n\nÂ§HO QUE FOI REVELADO FOI COMPREENDIDO, NĂO FOI?Â§!"
 shroud.3030.a: "Vimos uma conferĂȘncia de muitas vozes."
 shroud.3030.a.reply: "A areia se move lentamente. A voz retorna.\n\nÂ§HBOM. A HARMONIA Ă O CAMINHO DO UNIVERSO.Â§!\n\nSentimos algo pesado se dissipar. Estamos sozinhos novamente."
 shroud.3030.b: "Vimos a carnificina da batalha."
 shroud.3030.b.reply: "A areia gira repentinamente com a forĂ§a de uma tempestade.\n\nÂ§HNĂO. QUE AS ARMAS ENFERRUJEM E CAIAM NO ESQUECIMENTO!Â§!\n\nA tempestade de areia se dissipa. A voz partiu."
 shroud.3030.c: "NĂŁo temos certeza."
