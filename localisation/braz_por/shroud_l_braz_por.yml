 # Composer of Strands
 shroud.4650.title: "$utopia.3304.name$"
 shroud.4650.desc.default: "Uma presenĂ§a nos aguarda no VĂ©u, acolhendo-nos com uma familiaridade cordial. Sua comunicaĂ§ĂŁo nĂŁo se dĂĄ por meio de palavras, mas de visĂ”es, conceitos, ideais. Ela se infiltra na mente de nossa equipe de [GetTelepathPlural] com tanta delicadeza que parece sempre ter estado ali. Uma sĂ©rie de imagens se manifesta.\n\nEssa presenĂ§a, conhecida como $the_composer_of_strands_color_article$, observa nossas formas orgĂąnicas com curiosidade. Ela nos mostra diversas maneiras de cultivĂĄ-las, transformĂĄ-las. AprimorĂĄ-las. EvoluĂ­-las.\n\nÂ§HBasta aceitarmos sua essĂȘncia em nossa carne.Â§!\n\nEla aguarda nossa resposta com paciĂȘncia e afeto. Como uma mĂŁe zelosa Ă  espera de seu filho favorito."
 shroud.4650.desc.hive: "$shroud.4650.desc.default$"
 shroud.4650.desc.gestalt_machine: "Uma presenĂ§a nos aguarda no VĂ©u, acolhendo-nos com uma familiaridade cordial. Sua comunicaĂ§ĂŁo nĂŁo se dĂĄ por meio de palavras, mas por visĂ”es, conceitos, ideais. Ela se infiltra nos circuitos de nossa equipe de [GetTelepathPlural] com tanta delicadeza que parece sempre ter estado ali. Uma sĂ©rie de imagens se manifesta.\n\nEssa presenĂ§a, conhecida como $the_composer_of_strands_color_article$, observa nossas formas mecĂąnicas com curiosidade. Ela nos mostra diversas maneiras de adaptĂĄ-las, transformĂĄ-las. AprimorĂĄ-las. EvoluĂ­-las.\n\nÂ§HBasta aceitarmos sua essĂȘncia em nossos componentes.Â§!\n\nEla aguarda nossa resposta com paciĂȘncia e afeto. Como uma mĂŁe zelosa Ă  espera de seu filho favorito."
