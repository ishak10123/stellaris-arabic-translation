 triggered_opinion_eotc_situation_stage2: "Arautos do Fim"
 shroud.4145.title: "AniquilaĂ§ĂŁo"
 shroud.4145.desc_1.common_1: "Conforme a Â§R$end_aura$Â§! permeia a galĂĄxia, sentimos uma resistĂȘncia crescente."
 shroud.4145.desc_1.common_2: "Mas isso nĂŁo importa. NĂŁo esperaremos atĂ© que outros aceitem $end_of_the_cycle_color_article$."
 shroud.4145.desc_1.default: "$shroud.4145.desc_1.common_1$ Nossos vizinhos distantes estĂŁo rapidamente se voltando contra nĂłs. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_1.homicidal: "$shroud.4145.desc_1.common_1$ A aversĂŁo de nossos inimigos vem se tornando cada vez mais enraizada. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_2: "Inspirados pela vontade de nosso patrono, criamos novos mĂ©todos de explorar energia e matĂ©ria para alimentar a Aura. A prĂłpria composiĂ§ĂŁo do universo poderĂĄ ser sacrificada para antecipar o Fim."
 shroud.4145.a: "Devemos fazer o que for necessĂĄrio."
