 civic_twisted_experimenters_corporate_effects: "ComeĂ§a com a situaĂ§ĂŁo ['concept_experimental_testing_corporate'], que concede conhecimento de tecnologia ao ser concluĂ­da.\nPode construir e jĂĄ inicia com: ÂŁbuildingÂŁ['building:building_experimentation_chambers_1'].\nPode construir o $BRANCH_OFFICE_BUILDING$ ÂŁbuildingÂŁÂ ['concept_building_carceral_test_facility'].\nTodos os escravos nĂŁo MaquinĂĄrios ganham acesso ao emprego de escravo.\nAcesso ao ['concept_slave_army']: Â§Y$abomination_army$Â§!"
