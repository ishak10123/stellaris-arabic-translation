 shroud.8370.name: "Pesadelos ApocalĂ­pticos"
 shroud.8370.desc: "Conforme nossas habilidades psiĂŽnicas crescem, o povo [owner.GetSpeciesAdj] Ă© atormentado por horrĂ­veis pesadelos que preveem o fim do universo.\n\nNossos sonhos se tornaram profecias apocalĂ­pticas, intensificando o medo existencial de nosso povo. O sono deu lugar a um torpor inquieto, e muitos agora sĂŁo incapazes de continuar com suas rotinas.\n\nNesses sonhos, a Â§RVozÂ§! fala conosco.\n\nÂ§R\"ABRACE A ENTROPIA.\"Â§!"
