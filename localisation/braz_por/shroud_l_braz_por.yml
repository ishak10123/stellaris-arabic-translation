 shroud.3060.leader_return.title: "TransformaĂ§ĂŁo pelo VĂ©u"
 shroud.3060.leader_return.desc: "O VĂ©u estremece. DistorĂ§Ă”es sutis ondulam por nossas [GetMindPhysicalLoc] enquanto uma presenĂ§a familiar emerge. Algo se agita Ă s margens de nossa [GetMindPerceptionLoc], sussurrando ecos alĂ©m de nosso limiar auditivo.\n\nÂ§H[from.GetName]Â§! retorna para nĂłs, atravessando as nĂ©voas inefĂĄveis enquanto elas se moldam em sua forma conhecida. Distante, mas em sua totalidade. Seu corpo reconstruĂ­do pelo VĂ©u, ansiando servir novamente."
