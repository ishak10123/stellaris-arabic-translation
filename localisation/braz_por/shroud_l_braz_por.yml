 # Blind the Willing - First select event
 shroud.8320.name: "Vemos Claramente"
 shroud.8320.desc: "Â§H[blinded_leader.GetName]Â§! nos mostrou o caminho. Nossos sentidos exteriores abafam o chamado da Â§RVozÂ§!. Ao remover um deles, poderemos elevar nossas habilidades psĂ­quicas ainda mais.\n\n[Species.GetEyeNamePlural] sĂŁo irrelevantes. Nossa visĂŁo no reino fĂ­sico obscurece nossa visĂŁo no Â§HVĂ©uÂ§!. Muitos de nĂłs jĂĄ seguiram o exemplo inspirador de Â§H[blinded_leader.GetName]Â§!, removendo [Species.GetEyeNamePlural] sem hesitaĂ§ĂŁo.\n\nAqueles que escolheram fazĂȘ-lo relataram uma onda de contentamento conforme a Â§RVozÂ§! preencheu suas mentes com sua aprovaĂ§ĂŁo."
