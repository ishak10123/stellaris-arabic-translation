 shroud.6860.4.desc: "Seu patrocĂ­nio definiu nossa jornada desde o princĂ­pio, e nossos objetivos compartilhados continuam os mesmos: preservar o bem-estar mental por meio da erradicaĂ§ĂŁo completa de todos os seres psiĂŽnicos. Com a sua ajuda, estamos cada vez mais prĂłximos desse objetivo."
