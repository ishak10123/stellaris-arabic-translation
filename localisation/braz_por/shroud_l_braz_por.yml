 shroud.4505.desc.intro: "EstĂĄ feito. Firmamos um Pacto com $the_eater_of_worlds_color_article$. Sua vontade agora pulsa por todo o territĂłrio de Â§H[Root.GetName]Â§!."
 shroud.4505.desc.outro: "Ao selarmos nosso acordo, a Comedora cobrou seu tributo: toda a populaĂ§ĂŁo de uma de nossas cidades desapareceu subitamente. Um pequeno preĂ§o a se pagar â a menos que a Comedora sinta fome novamente."
 shroud.4505.desc.default: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
