 shroud.3035.title: "Conflito Sombrio"
 shroud.3035.desc: "As energias caĂłticas do VĂ©u se contorcem e irrompem.\n\nGavinhas de escuridĂŁo atacam e se recolhem, a nĂ©voa voltando-se violentamente contra si mesma. Em meio a essa tempestade de fĂșria psiĂŽnica, duas entidades sem forma entram em embate. Elas sĂŁo impiedosas, irredutĂ­veis e banhadas pelo Ăłdio.\n\nUma presenĂ§a externa se esgueira para dentro de nossas [GetMindPhysicalLoc], invasiva e vasta.\n\nÂ§HAQUELES QUE ENTRAM DEVEM TRAZER UMA RESOLUĂĂO.Â§!"
 shroud.3035.a: "O diĂĄlogo promove o entendimento."
 shroud.3035.a.reply: "A nĂ©voa se desfaz, dissolvendo-se no turbilhĂŁo de energia psiĂŽnica ao fundo. A consciĂȘncia retorna.\n\nÂ§HHARMONIA Ă SABEDORIA.Â§!\n\nO VĂ©u estĂĄ mais calmo agora."
 shroud.3035.b: "A concessĂŁo Ă© sinĂŽnimo de fraqueza."
 shroud.3035.b.reply: "A cada golpe da nĂ©voa, a fĂșria energĂ©tica ao redor se intensifica.\n\nÂ§HA VIOLĂNCIA Ă A RECOMPENSA DO SER INSENSATO.Â§!\n\nAs energias contorcidas do VĂ©u entram em convulsĂŁo mais uma vez."
 shroud.3040.title: "VisĂ”es InvisĂ­veis"
 shroud.3040.desc: "Uma poĂ§a de lĂ­quido negro se estende diante de nĂłs.\n\nDe repente, uma imagem turva cintila na superfĂ­cie. Vislumbramos um pico reluzente, cada crista adornada com ouro brilhante, atĂ© que a visĂŁo desaparece abruptamente.\n\nUma voz ressoa nas profundezas de nossas [GetMindLoc].\n\nÂ§HVOCĂS VIRAM O INVISĂVEL?Â§!"
 shroud.3040.a: "Vimos uma pedreira, Ă  espera da picareta."
 shroud.3040.a.reply: "Uma sĂ©rie de ondulaĂ§Ă”es paralelas irrompem pela superfĂ­cie lĂ­quida. Mais uma vez, sentimos a voz.\n\nÂ§HCRESCIMENTO SEM AMARRAS MANTĂM O EQUILĂBRIO SEM LIMITES.Â§!\n\nConforme o lĂ­quido se estabiliza, sentimos a voz se afastando."
 shroud.3040.b: "Vimos a perfeiĂ§ĂŁo da natureza, destinada a ser preservada."
