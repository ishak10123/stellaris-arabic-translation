 shroud.5320.desc.aura.whisperers: "$shroud.5320.desc.aura.intro$ uma textura Â§HsagazÂ§!.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.intensified: "NĂłs lhe saudamos. Seu conhecimento sobre $PSIONIC_AURA_PLURAL$ jĂĄ supera o nosso.\n\nSua prĂłpria presenĂ§a manifesta uma textura poderosa do Â§HVĂ©uÂ§! nesta realidade. Que segredos vocĂȘ deve guardar...?"
 shroud.5325.desc: "A amplificaĂ§ĂŁo das Â§Y$PSIONIC_AURA_PLURAL$Â§! exige nĂ­veis elevados de concentraĂ§ĂŁo para ser mantida.\n\nEstamos dispostos a ajudĂĄ-los, mas serĂĄ necessĂĄria uma contribuiĂ§ĂŁo de materiais para sustentar nossa meditaĂ§ĂŁo."
 shroud.5325.zro: "$shroud.5305.b$"
 shroud.5325.thread: "$shroud.5305.c$"
 aura_amplification_cooldown_tt: "Â§ROs telepatas precisam de tempo para se recuperar. Eles nĂŁo serĂŁo capazes de amplificar nossa aura atĂ© Â§Y[root.aura_amplification_timer]Â§!.Â§!"
 aura_amplification_modifier: "AmplificaĂ§ĂŁo de Aura"
 shroud.5327.desc: "Nossos telepatas chegaram ao fim do acordo para amplificar a forĂ§a de sua Â§Y$PSIONIC_AURA$Â§!.\n\nPara que seja possĂ­vel continuarmos nossas meditaĂ§Ă”es, precisamos de recursos adicionais. Ainda tem interesse?"
 shroud.5327.a.zro: "Providenciaremos Â§H$sr_zro$Â§!."
 shroud.5327.a.thread: "Providenciaremos Â§H$astral_threads$Â§!."
 shroud.5327.b: "NĂŁo desta vez."
 shroud.5330.desc: "Como bem sabe, manifestar sua Â§Y$PSIONIC_AURA$Â§! nos arredores Ă© algo relativamente simples. ProjetĂĄ-la para outro local, no entanto, Ă© algo muito mais complexo.\n\nMas nĂłs conhecemos um mĂ©todo...\n\nHĂĄ mais similaridades entre a tecnologia avanĂ§ada e a psiĂŽnica do que se imagina. Talvez isso revele uma verdade mais profunda. De qualquer forma, sabemos da existĂȘncia de um dispositivo que pode agir como canalizador da sua vontade. Uma vez sintonizado Ă s suas frequĂȘncias, ele funcionarĂĄ como uma mente auxiliar, mesmo a longas distĂąncias.\n\nNossos projetos podem ser instalados em qualquer base estelar compatĂ­vel. Tal mĂĄquina Ă© de seu interesse?"
 shroud.5330.zro: "Podemos oferecer Â§H$sr_zro$Â§!."
 shroud.5330.thread: "Podemos oferecer Â§H$astral_threads$Â§!."
 shroud.5350.desc: "Essa pergunta jĂĄ era esperada. HĂĄ muito sentimos seu interesse por essa ĂĄrea, e Ă© uma honra poder ajudĂĄ-los a expandir suas mentes.\n\nMas saibam: quando seus olhos se abrirem para a verdade, haverĂĄ coisas que nĂŁo poderĂŁo mais ser ignoradas. O caminho Ă  frente conduz ao Â§HVĂ©uÂ§!.\n\nNĂŁo fazemos essa oferta de forma leviana. Confiamos que vocĂȘs nos avisarĂŁo quando for a hora."
 shroud.5350.b: "NĂłs pagaremos."
 shroud.5350.trigger_failed: "Â§REsta tecnologia jĂĄ foi pesquisada.Â§!"
 shroud.5355.desc: "De fato, temos conhecimento daqueles que transitam entre planos. Ă uma premissa perigosa, pois os planos fĂ­sicos estĂŁo conectados de maneiras que nem mesmo nĂłs compreendemos.\n\nAinda assim, estamos dispostos a abrir um caminho para vocĂȘ. Tal desestabilizaĂ§ĂŁo do tempo e do espaĂ§o deve ser feita de forma responsĂĄvel, Ă© isso o que nossa oferta exige."
 shroud.5355.b: "Abra o caminho."
 shroud.5375.desc: "VocĂȘs estĂŁo lidando com forĂ§as alĂ©m de sua compreensĂŁo!\n\nEssas abominaĂ§Ă”es que estĂŁo construindo, os tais \"Â§HSelos do VĂ©uÂ§!\", sĂŁo difĂ­ceis de suportar, mesmo a distĂąncia. Suas aĂ§Ă”es colocam em risco as mentes mais brilhantes da galĂĄxia. Interrompam imediatamente sua criaĂ§ĂŁo, ou nĂŁo faremos mais acordo algum com vocĂȘs."
