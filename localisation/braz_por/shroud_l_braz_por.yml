 shroud.4600.desc_homicidal: "Conforme nos aprofundamos no VĂ©u, uma presenĂ§a invade nossa visĂŁo interior. O brilho predominante ofusca todo o resto. Ă $the_cradle_of_souls_color_article$ e ele queima em nosso Ăąmago.\n\nEle exige nada menos que concessĂŁo em escala galĂĄctica, uma paz abjeta entre seres incompatĂ­veis. Ele promete que um grande poder nos espera, se aceitarmos essa visĂŁo detestĂĄvel.\n\nÂ§HSe ao menos deixĂĄssemos que ele moldasse novos horizontes.Â§!\n\nA luz do BerĂ§o Ă© implacĂĄvel e seu poder Ă© inegĂĄvel. Poderiam nossas mentes abraĂ§ar tal coisa? Ou isso enfraquecerĂĄ nossa determinaĂ§ĂŁo?"
 shroud.4600.desc_non_homicidal: "Ă medida que nossas mentes mergulham no VĂ©u, uma presenĂ§a desperta dentro de nĂłs. Sentimos um brilho que toca todas as coisas, irradiando ordem e equilĂ­brio. Ă $the_cradle_of_souls_color_article$, e algo nele nos toca profundamente.\n\nSeu desejo Ă© nada menos que a paz duradoura, uma galĂĄxia livre do caos. Se compartilharmos de sua visĂŁo, ele poderĂĄ nos tornar arautos da harmonia. Sua promessa Ă© a de um laĂ§o de confianĂ§a inabalĂĄvel.\n\nÂ§HBasta permitirmos que ele molde nossos horizontes.Â§!\n\nAs esperanĂ§as do BerĂ§o recaem sobre nĂłs."
