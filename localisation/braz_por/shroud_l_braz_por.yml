 shroud.3050.desc.composer: "Gritos e clamores, animalescos, selvagens, primordiais... Rios jorram e ventos uivam... Toda a natureza ladra e vocifera, com urgĂȘncia e em unĂ­ssono..."
 shroud.3050.desc.cradle: "Vozes sussurram, resmungam, exclamam e proclamam... IncontĂĄveis entonaĂ§Ă”es, sĂ­labas, sons... LĂ­nguas incontĂĄveis falam ao mesmo tempo."
 shroud.3050.desc.instrument: "Brocas perfuram, mĂĄquinas rangem... A matĂ©ria Ă© transformada com forĂ§a e barulho... Todas as fĂĄbricas do universo explodem e incendeiam ao mesmo tempo."
