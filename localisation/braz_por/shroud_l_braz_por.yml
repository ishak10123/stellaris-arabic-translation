 shroud.2505.desc: "Alguns de nĂłs comeĂ§aram a apresentar comportamentos anĂŽmalos, demonstrando mudanĂ§as sĂșbitas de opiniĂ”es, hĂĄbitos e conduta geral. Muitos grupos de [Owner.GetWorkerNamePlural] interromperam suas atividades, e [Owner.GetOutOfControlExtra].\n\nOs afetados alegam estar cumprindo as ordens de uma entidade sem nome que habita as periferias de suas consciĂȘncias, guiando cada uma de suas aĂ§Ă”es. Ă medida que avanĂ§amos na construĂ§ĂŁo de nosso futuro psiĂŽnico, devemos considerar com cautela o impacto que forĂ§as extradimensionais podem ter sobre [Owner.GetOutOfControlPsyche]."
 shroud.2505.extra_default: "representantes outrora leais agora expressam opiniĂ”es dissidentes"
