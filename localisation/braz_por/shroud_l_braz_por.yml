 shroud.8200.title: "Um Reino de Loucura"
 shroud.8200.desc: "Pesquisas sobre o recĂ©m-descoberto campo da PsiĂŽnica confirmou a existĂȘncia de dimensĂ”es da realidade, atĂ© entĂŁo invisĂ­veis, para as quais nossas mentes sĂŁo um portal. AlĂ©m do manto jaz um reino de caos que temos dificuldade de compreender.\n\nUma Â§RVozÂ§! chama de suas profundezas. Sua promessa nĂŁo Ă© a salvaĂ§ĂŁo, mas um novo comeĂ§o. Brandir seu poder desconhecido significaria abandonar tudo que somos e tecer um destino inscrito na trama da prĂłpria loucura.\n\nÂ§R\"ESTĂ NA HORA.\"Â§!"
 shroud.8200.a: "O que fizemos?"
 shroud.8200.a.tt: "Libera a Ărvore de TradiĂ§ĂŁo Â§H$tradition_psionics_shroud$Â§!."
