 shroud.2410.desc: "Uma grande parcela de nossa populaĂ§ĂŁo psiĂŽnica desenvolveu estranhos apĂȘndices articulados de anatomia incompreensĂ­vel. Nossa equipe de [Owner.GetScientistPlural] afirma que essas alteraĂ§Ă”es foram causadas por uma [Owner.GetGeneticMutationName] espontĂąnea em larga escala. EstĂĄ claro agora que atividades psiĂŽnicas podem provocar alteraĂ§Ă”es fĂ­sicas nos praticantes. Embora nĂŁo seja possĂ­vel impedir a formaĂ§ĂŁo dessas protuberĂąncias, descobrimos que sua taxa de crescimento pode ser controlada psiquicamente.\n\nApesar de causarem [Owner.GetDistressName], esses apĂȘndices tĂȘm se mostrado surpreendentemente Ășteis. Quando bem empregados, podem compensar o desgaste mental que impĂ”em."
