 shroud.2405.name: "CabeĂ§as Mortas"
 shroud.2405.desc: "O crescente interesse da populaĂ§ĂŁo pela psiĂŽnica levou ao surgimento de uma prĂĄtica peculiar: o armazenamento pessoal de [Owner.GetSpeciesBrainPlural], como uma tentativa de comunicaĂ§ĂŁo pĂłstuma.\n\nOs praticantes acreditam que informaĂ§Ă”es cognitivas podem sobreviver ao estado de [Owner.GetDeathName], baseando-se na teoria de que as forĂ§as psĂ­quicas sĂŁo uma forma de energia que nĂŁo pode ser destruĂ­da, apenas convertida. Um nĂșmero pequeno, porĂ©m crescente, tambĂ©m acredita que o falecimento de [Owner.GetIndividualNamePlural] com dons psiĂŽnicos cria uma ruptura subespacial Ă­nfima, funcionando como uma janela para outras dimensĂ”es.\n\nEmbora seja louvĂĄvel incentivar pesquisas inovadoras, a manipulaĂ§ĂŁo de partes de nossos [Owner.GetDeceasedAdj]s levanta sĂ©rias questĂ”es Ă©ticas. Para piorar, surgiram relatos sobre uma classe de ladrĂ”es de corpos especializados em traficar essas partes."
