 # S9
 shroud.2640.name: "PsiĂŽnicos Desviantes"
 shroud.2640.desc.common_1: "Ă medida que nossas habilidades psiĂŽnicas se desenvolvem, alguns indivĂ­duos passaram a sofrer com o fardo desses novos poderes. O grupo de [owner.GetIndividualNamePlural] afetado"
