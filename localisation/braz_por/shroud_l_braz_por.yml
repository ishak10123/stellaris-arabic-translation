 shroud.1510.desc: "Nossa Â§H$PSIONIC_AURA$Â§! no sistema [from.GetName] estĂĄ em conflito com uma Aura oposta, originada no sistema vizinho [fromfrom.GetName]. Nossa equipe psiĂŽnica de [GetResearchers] previu esse tipo de comportamento, mas Ă© a primeira vez que presenciamos o fenĂŽmeno em aĂ§ĂŁo.\n\nEm teoria, a Aura mais potente, aquela projetada com maior intensidade, enfraquecerĂĄ gradualmente a forĂ§a adversĂĄria. Se essa disputa levar Ă  extinĂ§ĂŁo total de um dos lados, a Aura dominante poderĂĄ se expandir e ocupar o sistema vazio.\n\nĂ uma verdadeira batalha de mentes."
