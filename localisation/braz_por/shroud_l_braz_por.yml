 shroud.2400.desc: "Estamos perdendo matĂ©rias-primas a uma taxa alarmante. Estoques inteiros de materiais inorgĂąnicos em fĂĄbricas e armazĂ©ns estĂŁo se esgotando mais rapidamente do que o previsto, [Owner.GetMatterInFluxExtra]. Essas perdas estĂŁo diretamente relacionadas ao aumento da atividade psiĂŽnica nas ĂĄreas afetadas.\n\nPodemos conter a situaĂ§ĂŁo interrompendo temporariamente a atividade psiĂŽnica nas proximidades dos depĂłsitos, mas isso desacelerarĂĄ nosso progresso em pesquisas psiĂŽnicas e limitarĂĄ suas aplicaĂ§Ă”es industriais. Como alternativa, podemos investir no desenvolvimento de um atenuador de campo psiĂŽnico, capaz de interromper o processo de desmaterializaĂ§ĂŁo. Se nĂŁo fizermos nada, nossa capacidade de pesquisa psiĂŽnica serĂĄ comprometida."
