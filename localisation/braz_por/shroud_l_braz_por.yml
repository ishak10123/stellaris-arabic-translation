 ganthuata: "Ganthuata"
 ganthuata_desc: "Um discĂ­pulo devoto d$the_cradle_of_souls_article$, ansioso para buscar e compartilhar suas verdades profundas com aqueles que detĂȘm os meios para recebĂȘ-las."
 ganthuata_catch_phrase: "O abraĂ§o do BerĂ§o nos envolve por completo."
 leader_trait_disciple_of_the_cradle: "Disciplina do BerĂ§o"
 leader_trait_disciple_of_the_cradle_desc: "Quanto mais enxergamos, mais sabemos; $the_cradle_of_souls_article$ fica mais seguro conforme observamos nossos vizinhos."
 leader_trait_disciple_of_the_cradle_envoys_zro: "$t$- EmissĂĄrios designados para entidades patronais geram Â§G+0.5Â§! deÂ ÂŁzroÂŁÂ Â§Y$sr_zro$Â§! a cada mĂȘs"
 shroud.12010.desc: "Â§HNossa comunhĂŁo com o VĂ©u atraiu uma nova voz atĂ© nĂłs. Seu tom cordial e reconfortante ecoa em ambos os reinos mental e material.Â§!\n\nSaudaĂ§Ă”es. Eu sou Ganthuata e vim em busca de indivĂ­duos com mentes compatĂ­veis que despertaram para o seu verdadeiro caminho. VocĂȘs ouviram a mensagem d$the_cradle_of_souls_article$?"
 shroud.12010.name: "$ganthuata$"
 shroud.12010.a: "Sim, ouvimos $the_cradle_of_souls_article$. Por que pergunta?"
 shroud.12010.a.response: "Por quĂȘ? O que compeliria qualquer viajante a questionar aqueles que conhece ao longo do caminho? Para melhor entender quem dĂĄ as respostas, amigos. Quando vocĂȘs falam, eu aprendo."
 shroud.12010.b: "O que vocĂȘ quer de nĂłs?"
 shroud.12010.b.response: "O que aqueles cuidados pelo BerĂ§o anseiam? Eu busco amizade, para inĂ­cio de conversa. Procurei uma era de mentes sintonizadas com o esplendor do BerĂ§o, e agora, uma civilizaĂ§ĂŁo se agita dentro de sua luz."
 shroud.12010.c: "Como pode nos ajudar?"
 shroud.12010.c.response: "Ajudarei a carregar sua mensagem atravĂ©s das estrelas. Juntos, acolheremos a galĂĄxia no abraĂ§o gentil do BerĂ§o."
 shroud.12010.hire_custom_tooltip: "Â§Y$ganthuata$Â§! une-se ao nosso impĂ©rio como Â§HLĂ­derÂ§!."
 koborokra: "Koborok'Ra"
 koborokra_desc: "Ex-soldado que foi vĂ­tima de tortura psiĂŽnica extrema nas mĂŁos de seus inimigos hĂĄ muito tempo. Hoje, tornou-se um almirante atormentado com uma determinaĂ§ĂŁo e apetite insaciĂĄvel por destruiĂ§ĂŁo."
 koborokra_catch_phrase: "Ainda hĂĄ sangue a ser derramado."
 leader_trait_disciple_of_the_eater: "Mensageiro de Sangue"
 leader_trait_disciple_of_the_eater_desc: "Este lĂ­der fez um voto de sangue com $the_eater_of_worlds_article$."
 leader_trait_disciple_of_the_eater_attunement_effect: "Â§G+$@disciple_of_the_eater_combat_attunement$Â§! de Sintonia com $the_eater_of_worlds_article$ a cada combate com frota vitorioso"
 leader_trait_disciple_of_the_eater_zro_fleet_attack_effect: "$t$- Â§G+$@disciple_of_the_eater_zro_fleet_attack|1$Â§!Â de $i_zro$ a cada 1% de devastaĂ§ĂŁo causada por bombardeio orbital"
 leader_trait_disciple_of_the_eater_zro_army_attack_effect: "$t$- Â§G+$@disciple_of_the_eater_zro_army_attack|0$Â§!Â de $i_zro$ a cada 1% de devastaĂ§ĂŁo causada por exĂ©rcitos de ataque"
 shroud.12020.name: "$koborokra$"
 shroud.12020.desc: "Â§HUma armadura desgastada por batalhas e uma capa coberta de sangue escondem uma figura mascarada. Um grunhido rouco corta a quietude.Â§!\n\nEsta galĂĄxia merece sofrer. Posso perceber que vocĂȘs sentem o mesmo.\n\nÂ§HConforme fala, [shroud_leader.GetHeShe] acaricia a empunhadura de uma espada ornamentada.Â§!\n\nRecebi um chamado para vir atĂ© vocĂȘs, mas no fim, eu sirvo Ă  minha mestra, $the_eater_of_worlds_color_article$."
 shroud.12020.desc.covenant: "$shroud.12020.desc$ Assim como vocĂȘs."
 shroud.12020.desc.no_covenant: "$shroud.12020.desc$ E talvez vocĂȘs tambĂ©m venham a servir."
 shroud.12020.a: "Por que quer se juntar a nĂłs?"
 shroud.12020.a.response: "Juntos, podemos sufocar as estrelas em cada canto da galĂĄxia. HĂĄ um limite para a quantidade de sofrimento que Ă© possĂ­vel infligir sozinho."
 shroud.12020.b: "Podemos confiar em vocĂȘ?"
 shroud.12020.b.response: "$the_eater_of_worlds_article_cap$ comanda cada suspiro meu. Jurei servi-la, e vi este momento nos meus sonhos. Ă pela vontade dela que eu sirvo a vocĂȘs. Sua rejeiĂ§ĂŁo selaria meu destino."
 shroud.12020.c: "Por que serve Ă  vontade d$the_eater_of_worlds_article$?"
 shroud.12020.c.response: "Fui traĂ­do, destruĂ­do e deixado em agonia. $the_eater_of_worlds_article_cap$ falou comigo. Ela me abenĂ§oou com o que era necessĂĄrio para sobreviver naquele momento... um pano ensanguentado sobre feridas ensanguentadas. Ela me deu o poder para cortar as mĂŁos que me causaram sofrimento. Agora, tenho uma dĂ­vida a pagar."
 shroud.12020.d: "O que pode nos oferecer?"
 shroud.12020.d.response: "Juntos, banharemos inĂșmeros sistemas na luz purificadora das chamas, e nos saciaremos em uma sinfonia de gritos. Assistiremos mundos arderem. Juntos, mostraremos Ă  galĂĄxia coisas que ela nunca esquecerĂĄ. Este Ă© o nosso destino."
 shroud.12020.hire_custom_tooltip: "Â§Y$koborokra$Â§! une-se ao nosso impĂ©rio como Â§HLĂ­derÂ§!."
 morr: "Morr"
 morr_desc: "Uma vez uma prospectora qualquer, sua exposiĂ§ĂŁo prolongada a veios de $zro_lower$ instĂĄveis forjou um laĂ§o potente e enlouquecedor com $the_instrument_of_desire_article$. Agora, ela usa essa conexĂŁo para obter uma riqueza obscena, minerando mundos Ă  exaustĂŁo e vendendo seus espĂłlios a preĂ§os exorbitantes."
 morr_catch_phrase: "Se brilha, Ă© nosso."
 leader_trait_disciple_of_the_instrument: "CoraĂ§ĂŁo da Avareza"
 leader_trait_disciple_of_the_instrument_desc: "Profundamente sintonizado a$the_instrument_of_desire_article$, este lĂ­der pode prever a presenĂ§a de recursos atĂ© mesmo nos cantos mais inĂłspitos da galĂĄxia."
 leader_trait_disciple_of_the_instrument_planetary_decision_effect: "- Concede acesso Ă  decisĂŁo planetĂĄria Â§Y$decision_divine_deposits$Â§!"
 decision_divine_deposits: "Descobrir DepĂłsitos"
 decision_divine_deposits_desc: "Guiado pela atraĂ§ĂŁo enigmĂĄtica d$the_instrument_of_desire_article$, o governador deste planeta revela depĂłsitos de recursos hĂĄ muito esquecidos."
 decision_divine_deposits_tt: "Adiciona um Recurso PlanetĂĄrio aleatĂłrio."
 shroud.12030.name: "$morr$"
 shroud.12030.desc: "Â§HO olhar de $morr$ nunca para, esquadrinhando as sombras em busca de algo que reluz, como se caĂ§asse eternamente.Â§!\n\nVocĂȘs tambĂ©m sentem, nĂŁo Ă©? $the_instrument_of_desire_article_cap$ nunca para. Anseia. Devora. Comanda.\n\nO que eu vejo, eu pego. Nenhuma riqueza natural resistiu Ă  minha vontade. OfereĂ§o meus serviĂ§os, nĂŁo por lealdade, mas porque juntos podemos saquear as estrelas e dar ao vazio o que lhe Ă© devido."
 shroud.12030.a: "Por que quer se juntar a nĂłs?"
 shroud.12030.a.response: "$the_instrument_of_desire_article_cap$ Ă© insaciĂĄvel. Requer o trabalho de uma quantidade enorme de [root.species.GetHandNamePlural] para se satisfazer."
 shroud.12030.b: "O que pode nos oferecer?"
 shroud.12030.b.response: "Eu posso ajudar a extrair cada molĂ©cula rentĂĄvel que existe na natureza. AtĂ© o Ășltimo ĂĄtomo serĂĄ reivindicado, rotulado e vendido.\n\nAqueles que sussurram \"basta\" sĂŁo covardes. PatĂ©ticos. Eles que apodreĂ§am. Juntos, tomaremos tudo."
 shroud.12030.c: "Por que serve Ă  vontade d$the_instrument_of_desire_article$?"
 shroud.12030.c.response: "Fui uma prospectora uma vez, buscando cada foco de mineraĂ§ĂŁo que as estrelas podiam proporcionar. Ar empoeirado, scanners quebrados, minas vazias... atĂ© que $the_instrument_of_desire_article$ falou comigo.\n\nEle me prometeu riquezas alĂ©m da compreensĂŁo. Tudo que queria em troca era lealdade.\n\nAgora eu o sirvo. Extraio. Entrego. A dĂ­vida Ă© eterna.... mas as riquezas? Ah, as riquezas nunca acabam."
 shroud.12030.hire_custom_tooltip: "Â§Y$morr$Â§! une-se ao nosso impĂ©rio como Â§HLĂ­derÂ§!."
 kronen: "Kronen, o Aflito"
 kronen_desc: "Antes uma mente visionĂĄria, agora uma casca fragmentada; este cientista recluso foi deturpado pelas maquinaĂ§Ă”es d$the_composer_of_strands_article$. Apenas seu intelecto assombroso permanece, cintilando como uma estrela moribunda na escuridĂŁo."
 kronen_catch_phrase: "Tantas coisas para desvendar..."
 leader_trait_disciple_of_the_composer: "Fio Aflito"
 leader_trait_disciple_of_the_composer_desc: "Quanto mais molda a carne, mais sua prĂłpria carne se desfaz. $the_composer_of_strands_article_cap$ refaz todos que ousam aprender sua arte proibida."
 shroud.12040.name: "$kronen$"
 shroud.12040.desc: "Â§HAssim que nossos sensores detectam uma nave cruzando nossas fronteiras, uma voz tensa ecoa pelo VĂ©u; cansada, estridente, mas ainda assim familiar de uma forma perturbadora, como o cĂąntico d$the_composer_of_strands_article$.Â§!\n\nMais... [GetKronenFlesh]? Intrigante. TĂŁo suave. TĂŁo... mutĂĄvel. SerĂĄ? difĂ­cil dizer. Tantos nĂłs se movendo por baixo da [GetKronenSkin]. Que forma $the_composer_of_strands_article$ teria tecido para mim hoje?\n\nÂ§HAs comunicaĂ§Ă”es finalmente se estabilizam, revelando uma figura de mĂșsculos aparentes e irrequietos, debatendo-se e rabiscando freneticamente.Â§!\n\nVocĂȘs me veem como sou. Talvez eu ainda seja $kronen$. Talvez nĂŁo. Mas eu sinto vocĂȘs, como eu, uma tela em branco para o pincel da Compositora. Venham. Vamos comeĂ§ar o desvelamento."
 shroud.12040.a: "ComeĂ§ar? ComeĂ§ar o quĂȘ?"
 shroud.12040.a.response: "Ora, a descamaĂ§ĂŁo, Ă© claro. O descarte destas cascas grosseiras e imperfeitas. O desenrolar dos fios que nos compelem a moldar, Ă  certeza. O toque da Compositora recai sobre vocĂȘs tambĂ©m. VocĂȘs jĂĄ comeĂ§aram... NĂŁo sentem a contraĂ§ĂŁo em seus corpos?"
 shroud.12040.b: "Por que deseja se juntar a nĂłs?"
 shroud.12040.b.response: "NĂŁo sentem? A marca, pressionada contra cada fio tremulante. Eu devo desatar, abandonar o que eu era, testemunhar meu desfazer enquanto rasgo as costuras que me prendem Ă  carne. Mas vocĂȘs... vocĂȘs sĂŁo um impĂ©rio. Vasto. Capaz. Juntos, poderemos puxar fios mais impressionantes do que jamais farĂ­amos sozinhos."
 shroud.12040.c: "Como pode nos ajudar?"
 shroud.12040.c.response: "Eu ofereĂ§o mais do que ajuda. Minha carne Ă© uma dĂĄdiva, um experimento de dor e propĂłsito, esculpido pel$the_composer_of_strands_article$. Cada fibra minha grita, mas eu suporto. Eu estudo. Eu aprendo. E tudo que meu sofrimento gera... Ă© seu para moldar. Contanto que moldemos juntos."
 shroud.12040.hire_custom_tooltip: "Â§Y$kronen$Â§! une-se ao nosso impĂ©rio como Â§HLĂ­derÂ§!."
 shroud.12045.desc: "Â§HConforme nossa populaĂ§ĂŁo aumenta, $kronen$, fica em um estado cada vez maior de frenesi. Sua voz estremece pelo desgaste, sua forma convulsiona, ondulando, sua carne, instĂĄvel, quando ele emite um som rouco de frustraĂ§ĂŁo.Â§!\n\nOs fios, infinitos... eles se contorcem, eu puxo, eu rasgo, mas as tramas resistem! Por quanto tempo devo suportar esta forma maldita? Quanto mais preciso descartar para o padrĂŁo se revelar?"
 shroud.12045.a: "Qual Ă© o problema?"
 shroud.12045.a.response: "Problema? Singular? Ah, que pitoresco. A cada fragmento que eu descarto, a cada fio brilhante que nĂłs cortamos, as costuras apenas se apertam! E enquanto isso, $the_composer_of_strands_article$ cantarola sua melodia visceral e doentia..."
 shroud.12045.a.response_2: "$shroud.12045.a.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.b: "VocĂȘ precisa de uma folga?"
 shroud.12045.b.response: "Uma folga? NĂŁo, nunca. NĂŁo podemos estagnar, nĂŁo podemos deixar essa carne miserĂĄvel apodrecer na mediocridade. Eu nĂŁo preciso descansar... preciso de cobaias. Preciso de material para moldar, esculpir, me tornar."
 shroud.12045.b.response_2: "$shroud.12045.b.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.c: "Podemos fazer algo para ajudar?"
 shroud.12045.c.response: "VocĂȘs podem me lembrar... do que eu era? Digam-me, quando nĂłs nos falamos pela primeira vez, meus membros eram dessa cor? Minha cĂłrnea estava nublada assim? Cada vez que eu tento lembrar, minha carne se move ainda mais pelo caminho.\n\nNĂŁo... MemĂłrias nĂŁo valem nada aqui. A revelaĂ§ĂŁo jaz na mudanĂ§a em si. O que veio antes nĂŁo significa nada para $the_composer_of_strands_article$ agora. Deixem-me. Eu preciso... pensar."
 shroud.12045.c.response_2: "$shroud.12045.c.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.desc_2: "Â§HKronen convulsiona violentamente. Seu Ășnico olho rola para trĂĄs, a carne pulsando, borbulhando debaixo da superfĂ­cie, entĂŁo, de repente... imobilidade. A restruturaĂ§ĂŁo grotesca para de modo tĂŁo repentino quanto comeĂ§ou.Â§!\n\nAh... OlĂĄ. Precisam de alguma coisa?"
 shroud.12045.d: "VocĂȘ estĂĄ bem?"
 shroud.12045.d.response: "Claro. Por que eu nĂŁo estaria? Os fios abriram minha mente ainda mais, reformularam esta carne ineficiente para melhor servir aos planos d$the_composer_of_strands_article$. Agora, se me derem licenĂ§a... ainda hĂĄ muitos fios para puxar. Tantas cascas para deixar para trĂĄs.\n\nÂ§HConforme a transmissĂŁo se encerra, uma ressonĂąncia ecoa pelo VĂ©u. Qualquer que seja a afliĂ§ĂŁo que afeta Kronen agora... nĂŁo Ă© um acidente. Ă a vontade d$the_composer_of_strands_article$.Â§!"
 shroud.12045.end: "Uma dĂĄdiva da Compositora nĂŁo deve ser menosprezada."
 zulyn: "Zulyn, o Ouvinte"
 zulyn_desc: "Um estudioso que abandonou as limitaĂ§Ă”es dos estudos cientĂ­ficos convencionais para buscar os segredos revelados pelos ecos frenĂ©ticos d$whisperers_in_the_void_article$."
 zulyn_catch_phrase: "Precisamos apenas ouvir..."
 shroud.12050.name: "$zulyn$"
 shroud.12050.desc: "GÂ§HA matriz de comunicaĂ§Ă”es crepita conforme uma voz murmura com urgĂȘncia assustadora.Â§!\n\nSaudaĂ§Ă”es, queridos ouvintes. Eu ouvi sua voz â nĂŁo, suas *vozes* â em meio Ă  cacofonia. VocĂȘs o ouvem agora tambĂ©m, nĂŁo ouvem? O grande coro d$whisperers_in_the_void_color_article$, suas dĂĄdivas silenciosas, sua histeria murmurada?\n\nTais segredos sĂŁo perigosos para aqueles que nĂŁo podem compreendĂȘ-los. Mas eu posso ajudar vocĂȘs a desvendĂĄ-los. OfereĂ§o minha ajuda enquanto vocĂȘs enfrentam a inundaĂ§ĂŁo esmagadora de paradoxos que rasga seus pensamentos. Sem ofensas. Houve um tempo em que atĂ© eu tive dificuldade de entender seu verdadeiro significado."
 shroud.12050.a: "O que o faz pensar que pode ajudar?"
 shroud.12050.a.response: "VocĂȘs atravessaram o manto do Â§HVĂ©uÂ§!, nĂŁo foi? Mas digam-me, vocĂȘs o dominaram? Eu passei uma vida inteira mapeando suas profundezas, registrando o inconcebĂ­vel deslocamento de suas entidades e seus ecos sobre nosso reino frĂĄgil.\n\nOs Sussurradores me guiam hĂĄ muito tempo. Todos os enunciados enlouquecedores que agora se amontoam em seus pensamentos? Eu posso ajudar a compreendĂȘ-los."
 shroud.12050.b: "O que vocĂȘ sabe sobre os Sussurradores?"
 shroud.12050.b.response: "Eu cataloguei seus sussurros durante anos, esperando por este momento. Agora vocĂȘs estĂŁo alinhados ao seu coro multifacetado, e eu nĂŁo desperdiĂ§arei a chance de observar as verdades enterradas."
 shroud.12050.c: "O que estĂĄ nos oferecendo?"
 shroud.12050.c.response: "Uma vida inteira de estudos aperfeiĂ§oou meu foco, desvendando as estruturas de nossa realidade fĂ­sica e as profundezas ilimitadas do Â§HVĂ©uÂ§!.\n\nJuntos, nos libertaremos das limitaĂ§Ă”es deste plano. Os segredos do universo serĂŁo nossos. Isso, eu prometo, com absoluta certeza."
