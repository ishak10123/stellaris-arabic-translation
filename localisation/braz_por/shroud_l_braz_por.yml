 shroud.2760.desc_p2_psi_corps: "Desde a criaĂ§ĂŁo da Â§H$building_psi_corps$Â§!, temos desenvolvido e canalizado as habilidades psiĂŽnicas de [GetIndividualNamePlural] para lidar com essas condiĂ§Ă”es sem precedentes. Usando $shroud.2760.desc_p2_end$"
