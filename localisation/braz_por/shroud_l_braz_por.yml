 START_SCREEN_MINDWARDENS: "Os registros de nossos ancestrais relatam uma praga psĂ­quica que devastou [GetHomeWorldName]. ForĂ§as de outro mundo atacaram suas mentes, e uma radiaĂ§ĂŁo devastadora se espalhou pela atmosfera; tudo isso incentivado por praticantes da PsiĂŽnica do povo [GetSpeciesAdj].\n\nEm resposta a essas ameaĂ§as, nossos ancestrais construĂ­ram a $building_ancient_ward_1$ para se proteger contra os invasores mentais. De simples manutenĂ§ĂŁo, essa estrutura venerĂĄvel se mostrou suficientemente forte para defender os [GetSpeciesNamePlural] da influĂȘncia psiĂŽnica, e sua tecnologia central serviu de base para o desenvolvimento de outras defesas mentais.\n\nAgora, enquanto nossa civilizaĂ§ĂŁo se prepara para se aventurar alĂ©m da Ăłrbita de [capital_scope.System.GetName], enfrentamos o desconhecido. Que ameaĂ§as psĂ­quicas nos aguardam nos misteriosos confins do espaĂ§o?"
