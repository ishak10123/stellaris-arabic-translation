 shroud.5305.desc: "A comunhĂŁo com os domĂ­nios do Â§HVĂ©uÂ§! tem se revelado uma tarefa perigosa para os despreparados.\n\nPodemos guiĂĄ-los nesse processo, mas saibam: pode ser extremamente perigoso abrir suas mentes para as entidades que habitam o VĂ©u."
 shroud.5305.desc_all_contacted: "NĂŁo podemos mais ajudĂĄ-los nessa questĂŁo. NĂŁo existem outras entidades Ă s quais possamos conduzir seus pensamentos.\n\nReconhecemos seus esforĂ§os... poucos se aprofundam tanto nos domĂ­nios do Â§HVĂ©uÂ§! e retornam com a mente ilesa."
 shroud.5305.b: "Podemos bancar esse esforĂ§o com Â§Y$sr_zro$Â§!."
