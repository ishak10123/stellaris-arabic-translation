 shroud.2515.name_others: "O Surgimento dos Sonhos"
 shroud.2515.desc: "Conforme aumentamos nossa conexĂŁo com as forĂ§as psiĂŽnicas ao nosso redor, o povo [Owner.GetAdjective] passou a ser atormentado por [Owner.GetHorrifyingNightmarePlural].\n\n[Owner.GetNightmaresExtra]\n\n[Owner.GetNightmaresEnding]"
