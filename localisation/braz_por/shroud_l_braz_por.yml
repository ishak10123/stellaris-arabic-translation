 shroud.4505.desc.gestalt_machine: "$shroud.4505.desc.hive$"
 shroud.4505.desc.individual_machine: "$shroud.4505.desc.intro$\n\nAs mudanĂ§as em nossa sociedade jĂĄ sĂŁo detectĂĄveis. Nossas unidades militares estĂŁo cada vez mais concentradas na batalha. Em tempos de paz, devem estar constantemente envolvidas em simulaĂ§Ă”es de combate para evitar que sua inquietaĂ§ĂŁo se torne selvageria.\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc_2_pacifist: "MudanĂ§as em nossa sociedade jĂĄ estĂŁo sendo percebidas. Nossas mentes estĂŁo em conflito, com um viĂ©s para a batalha. Essa dissonĂąncia cognitiva estĂĄ causando grande desconforto entre nossa populaĂ§ĂŁo normalmente pacĂ­fica. SerĂĄ que fizemos a escolha correta?"
 shroud.4505.desc_2_organic_non_gestalt: "As mudanĂ§as em nossa sociedade jĂĄ sĂŁo perceptĂ­veis. Nossas ForĂ§as Armadas estĂŁo cada vez mais sedentas por combate. Em tempos de paz, devem estar constantemente envolvidas em treinamentos intensos para evitar que sua inquietaĂ§ĂŁo se torne selvageria."
 shroud.4505.desc_2_machine_non_gestalt: "As mudanĂ§as em nossa sociedade jĂĄ sĂŁo detectĂĄveis. Nossas unidades militares estĂŁo cada vez mais concentradas na batalha. Em tempos de paz, devem estar constantemente envolvidas em simulaĂ§Ă”es de combate para evitar que sua inquietaĂ§ĂŁo se torne selvageria."
 shroud.4505.desc_2_gestalt: "As mudanĂ§as em nossa sociedade jĂĄ sĂŁo detectĂĄveis. Nossos grupos de [GetIndividualNamePlural] militares estĂŁo cada vez mais concentrados na batalha. Em tempos de paz, devem estar constantemente envolvidos em simulaĂ§Ă”es de combate para evitar um estado de agressividade indevida."
 shroud.4505.a.default: "Esperamos que nĂŁo."
 shroud.4505.a.gestalt: "Valeu a pena."
 shroud.4510.desc.intro: "JĂĄ se passou algum tempo desde que estabelecemos as bases de um Pacto com "
 shroud.4510.desc.outro: "Nosso vĂ­nculo continua fraco, e ainda temos a possibilidade de encerrĂĄ-lo â ou de fortalecĂȘ-lo.\n\nNossa equipe de [GetTelepathPlural] determinou que fazer o juramento nos permitirĂĄ extrair ativamente os poderes concedidos por nossa entidade patronal, assim como prover aprimoramentos para nossas frotas e $PSIONIC_AURA$."
