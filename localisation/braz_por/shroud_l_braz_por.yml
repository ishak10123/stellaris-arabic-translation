 shroud.2605.desc: "Um movimento rebelde crescente vem se manifestando contra os esforĂ§os contĂ­nuos para explorar e desenvolver nosso potencial psiĂŽnico. Esses grupos dissidentes defendem uma supervisĂŁo mais rĂ­gida de indivĂ­duos psiĂŽnicos e a interrupĂ§ĂŁo completa de pesquisas nesse campo.\n\nCaso suas atividades nĂŁo sejam contidas, nosso progresso no domĂ­nio e compreensĂŁo dos poderes psiĂŽnicos poderĂĄ ser seriamente comprometido."
