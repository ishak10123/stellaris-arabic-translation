 shroud.6210.name: "AtenuaĂ§ĂŁo PsiĂŽnica"
 shroud.6210.desc: "Nossos incansĂĄveis pesquisadores desenvolveram um mĂ©todo para reforĂ§ar a Â§H$building_ancient_ward_1$Â§! em Â§H[Root.GetHomeWorldName]Â§!. Ao aprimorar os atenuadores psiĂŽnicos, a proteĂ§ĂŁo pode ser ampliada nĂŁo sĂł para todo o planeta, mas para todo o sistema Â§H[Root.home_planet.System.GetName]Â§!.\n\nEssa pesquisa impulsionou estudos mais amplos sobre essa tecnologia ancestral. Agora sabemos que o vĂ­nculo entre radiaĂ§ĂŁo psiĂŽnica e a mente do povo [Root.GetSpeciesAdj] Ă© recĂ­proco: essas emissĂ”es afetam nossos estados mentais, e nossos estados mentais influenciam os nĂ­veis de radiaĂ§ĂŁo psiĂŽnica. Parece que nosso antigo tabu contra as prĂĄticas psiĂŽnicas tinha, de fato, embasamento cientĂ­fico."
