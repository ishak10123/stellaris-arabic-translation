 shroud.2515.extra_gestalt: "Ao que tudo indica, estamos experimentando aquilo que consciĂȘncias singulares chamam de \"sonhos\". VĂ­timas desse fenĂŽmeno relatam visĂ”es de estranheza sobrenatural que representam ameaĂ§as fundamentais Ă  nossa coletividade."
 shroud.2515.extra_machine: "Esses \"sonhos\" tornaram-se comuns, e os ciclos de repouso foram substituĂ­dos por perĂ­odos de instabilidade no fluxo de dados. As vĂ­timas desse fenĂŽmeno relatam visĂ”es de estranheza sobrenatural que representam um sĂ©rio risco ao seu bem-estar."
 shroud.2515.end_organic: "Nossas instituiĂ§Ă”es mĂ©dicas enfrentam dificuldades para conter a onda de exaustĂŁo psĂ­quica."
