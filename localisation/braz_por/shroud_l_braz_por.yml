 shroud.6560.desc: "$shroud.shared_screen_figure$ Uma estrutura em Â§H[capital_scope.GetName]Â§! $shroud.shared_auric_flow_inhibition$ \"$building_ancient_ward_2$\"."
 shroud.6560.a: "$shroud.6510.a$"
 shroud.shared_psiarch_transmission: "Â§HAssim que a imagem Ă© exibida, a figura do Psiarca profere uma repreensĂŁo fria e indiferente.Â§!\n\n[This.GetSpeciesNamePlural], Ă© com grande decepĂ§ĂŁo que faĂ§o esta transmissĂŁo."
 shroud.shared_auric_flow_disdain: "Suas aĂ§Ă”es apenas confirmaram sua ignorĂąncia. Desdenhar do fluxo da aura e da elevaĂ§ĂŁo psiĂŽnica como um todo Ă© uma afronta incompatĂ­vel com a paz intragalĂĄctica. NĂŁo nos resta outra escolha.\n\nPreparem-se para enfrentar nossas frotas."
 shroud.6570.name: "$shroud.6510.name$"
 shroud.6570.desc: "$shroud.shared_psiarch_transmission$ Apesar de terem concordado em desmontar o $SHROUD_SEAL$, sabemos que vocĂȘs mantĂȘm uma estrutura em Â§H[capital_scope.GetName]Â§! com capacidades similares. Suas intenĂ§Ă”es sĂŁo claras. $shroud.shared_auric_flow_disdain$"
 shroud.6570.a: "VocĂȘ deve fazer o mesmo. Encerrar a transmissĂŁo."
 shroud.6575.name: "$shroud.6570.name$"
 shroud.6575.desc: "$shroud.shared_psiarch_transmission$ A reconstruĂ§ĂŁo do $SHROUD_SEAL$ extinguiu qualquer resquĂ­cio de esperanĂ§a em sua redenĂ§ĂŁo. $shroud.shared_auric_flow_disdain$"
