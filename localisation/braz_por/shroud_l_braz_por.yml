 shroud.3060.title: "Entre o Vazio"
 shroud.3060.desc.intro: "As nĂ©voas etĂ©reas do VĂ©u se agitam e se contorcem, arrastando nossa consciĂȘncia para as profundezas enquanto nossas formas fĂ­sicas permanecem inertes, intocadas.\n\nNossa [GetPsycheLoc] se estica, se contorce, presa em uma marĂ© cĂ­clica. Cada tentativa de movimento desmorona sobre si, esmagada por uma tensĂŁo implacĂĄvel."
 shroud.3060.desc.intro.organic: "Vemos alĂ©m de nĂłs mesmos, nossos corpos selados dentro de um tesseract sequencial alĂ©m da nossa compreensĂŁo fĂ­sica."
 shroud.3060.desc.intro.machine: "Sub-rotinas lĂłgicas sĂŁo ativadas, a falha Ă© identificada: um ciclo recursivo. Nossos processadores psiĂŽnicos sĂŁo insuficientes para romper o ciclo e retomar a funĂ§ĂŁo normal."
 shroud.3060.desc.intro.end: "Conforme a tensĂŁo se torna insuportĂĄvel, nossas formas ameaĂ§am se dissolver no vazio. Uma voz rompe o confinamento."
 shroud.3060.desc.outro: "As palavras ressoam em nĂłs. Sua forĂ§a cresce. Sentimos surgir uma maneira de silenciar a perturbaĂ§ĂŁo que ameaĂ§a nos despedaĂ§ar, mas para isso devemos nos submeter."
 shroud.3060.desc.eater: "Â§HDEVORE! CONSUMA O VAZIO INFINITO!Â§!"
