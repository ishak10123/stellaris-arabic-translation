 r_the_lost_patron: "O Sonhador"
 r_the_lost_patron_desc: "Esta entidade sublime Ă© a forma fĂ­sica de um ser de dentro do VĂ©u, a antiga \"entidade patronal\" de um impĂ©rio psiĂŽnico hĂĄ muito desaparecido. Como ela se manifestou neste reino fĂ­sico Ă© um mistĂ©rio, mas sua conexĂŁo Ășnica com o reino psiĂŽnico lhe confere um poder profundo."
 the_lost_patron_passive_effect: "Alcance Efetivo de Â§H$SHROUD_SEAL_PLURAL$Â§!: Â§G+1Â§!\nÂ§H$SHROUD_SEAL_PLURAL$Â§! produzem ÂŁunityÂŁÂ Â§Y$unity$Â§!: Â§G+25Â§!\nÂ§H$SHROUD_SEAL_PLURAL$Â§! concedem ÂŁnavy_sizeÂŁÂ Â§Y$NAVY_SIZE_TITLE$Â§!: Â§G+10Â§!"
