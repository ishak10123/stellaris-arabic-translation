 shroud.4025.desc.default: "Seguimos o rastro do ente Â§H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]Â§!, atraĂ­dos cada vez mais para as profundezas do Â§HVĂ©uÂ§!. Havia sinais deixados para trĂĄs... uma imagem aqui, uma melodia ali. Ăramos convidados a nos aproximar, mas o progresso foi lento.\n\nPor fim, alcanĂ§amos a entidade. Fomos recebidos com uma mirĂ­ade de visĂ”es: sistemas estelares fervilhando de atividade, distorĂ§Ă”es prodigiosas do povo [Root.GetSpeciesAdj]. Transformando-se em seu abraĂ§o, nos perdemos em um emaranhado de formas pungentes.\n\nAtamos os fios que conseguimos alcanĂ§ar. Os sinais dispersos se alinharam em padrĂ”es. Exauridos, contemplamos a majestade das formas e figuras. A presenĂ§a silenciou.\n\nA vontade da entidade se tornou clara para nĂłs. Vimos sua visĂŁo de crescimento sem limites. Assim que nossa equipe de [GetTelepathPlural] se recuperar, poderemos nos conectar e comungar com este ser, $the_composer_of_strands_color_article$."
 shroud.4025.desc.hive: "$shroud.4025.desc.default$"
 shroud.4025.desc.gestalt_machine: "Seguimos os traĂ§os moleculares do ente Â§H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]Â§!, atraĂ­dos cada vez mais para as profundezas do Â§HVĂ©uÂ§!. Havia sinais deixados para trĂĄs... uma imagem aqui, uma melodia ali. Ăramos convidados a nos aproximar, mas o progresso foi lento.\n\nPor fim, alcanĂ§amos a entidade. Fomos recebidos com uma mirĂ­ade de visĂ”es: sistemas estelares fervilhando de atividade, distorĂ§Ă”es prodigiosas do povo [Root.GetSpeciesAdj]. Transformando-se em seu abraĂ§o, nos perdemos em um emaranhado de formas incongruentes.\n\nAtamos os fios que conseguimos alcanĂ§ar. Os sinais dispersos se alinharam em padrĂ”es. Exauridos, processamos o notĂĄvel conjunto de dados. A presenĂ§a silenciou.\n\nA vontade da entidade se tornou clara para nĂłs. Vimos sua visĂŁo de crescimento sem limites. Assim que nossa equipe de [GetTelepathPlural] estiver recarregada, poderemos nos conectar e comungar com este ser, $the_composer_of_strands_color_article$."
