 shroud.3060.a.reply: "A voz cresce, guiando nossas aĂ§Ă”es, forĂ§ando nossos pensamentos para alĂ©m da compreensĂŁo limitada. O ciclo continua, pressionando, nos puxando... atĂ© se despedaĂ§ar contra nossa psique.\n\nRompemos a recursĂŁo, conduzidos por nossa sĂșplica Ă s forĂ§as superiores do VĂ©u.\n\nNo entanto, nem todos permaneceram. Â§H[event_target:shroud_warped_leader.GetName]Â§! nĂŁo estĂĄ mais em seu posto. A voz retorna."
