 shroud.3070.desc.intro: "O VĂ©u se contrai, dobra-se para dentro, comprimindo nossa psique em um vazio confinado e ressonante.\n\nUma presenĂ§a paira, fluida e indistinta. Sua forma se altera ao abrir e fechar o limiar que nos separa do restante do VĂ©u. Cada abertura desencadeia uma cascata de visĂ”es."
 shroud.3070.desc.eater: "Mundos ardem, suas brasas levadas pelos lamentos dos devorados. Cada paisagem em mutaĂ§ĂŁo revela um possĂ­vel banquete, pronto para ser consumido."
 shroud.3070.desc.composer: "Terras exuberantes, repletas de vida selvagem espalhadas por campos verdejantes. Os fios da vida crescem e se entrelaĂ§am. Cada cenĂĄrio em transformaĂ§ĂŁo revela uma atmosfera vibrante, pronta para ser moldada."
 shroud.3070.desc.cradle: "Comunidades se unem, elevando-se mutuamente, mas rejeitando aqueles que se opĂ”em. Cada cenĂĄrio em transformaĂ§ĂŁo revela uma nova utopia, aberta apenas aos fiĂ©is."
 shroud.3070.desc.instrument: "Pedreiras vastas se estendem diante de nĂłs, repletas de recursos valiosos prontos para extraĂ§ĂŁo. Cada cenĂĄrio em transformaĂ§ĂŁo revela riquezas Ă  espera do saque."
 shroud.3070.desc.outro: "A cada nova visĂŁo, a inĂ©rcia nos revira e retorce, arrastando-nos a velocidades impossĂ­veis enquanto as paredes da realidade se distorcem e ondulam.\n\nĂ possĂ­vel perceber que a figura se diverte. EstĂĄ nos testando, Ă  espera de um nome para a forĂ§a que nos domina."
