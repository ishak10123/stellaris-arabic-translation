 ENDBRINGERS_COMMUNE_WITH_THE_VOICE: "Comungar com a Â§RVozÂ§!"
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_DESC: "NĂłs nos reunimos em [capital_scope.GetName] com um Ășnico propĂłsito.\n\nAlcanĂ§aremos as profundezas do Â§HVĂ©uÂ§! e forĂ§aremos o poder assombroso da Â§RVozÂ§! a nos perceber e se conectar conosco.\n\nNĂłs a conhecemos como o Cataclismo. Outros a chamam de JuĂ­zo Final. Agora, ela nos revelarĂĄ seu verdadeiro nome, e com esse conhecimento alcanĂ§aremos a grandeza."
