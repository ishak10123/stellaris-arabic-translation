 SPECIAL_PROJECT_CALLING: "Chamado do Conhecimento"
 SPECIAL_PROJECT_CALLING_DESC: "$whisperers_in_the_void_color_article_cap$ anseiam por conhecimento alĂ©m dos limites do pensamento convencional. Ao conferir ao nosso grupo de [Owner.GetResearchers] amplos poderes para concentrar seus esforĂ§os em ĂĄreas esotĂ©ricas de estudo, poderemos satisfazer o fervor dos Sussurradores."
