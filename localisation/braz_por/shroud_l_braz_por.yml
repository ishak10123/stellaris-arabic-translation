 shroud.3125.title: "$shroud.3120.title$"
 shroud.3125.desc: "Conforme tentamos alcanĂ§ar a presenĂ§a, podemos [GetFeelSenseLoc] sua agitaĂ§ĂŁo. JĂĄ encontramos [GetSpiritsLoc] antes, mas isso Ă© diferente, algo muito mais poderoso... muito mais antigo.\n\nCom suas energias imbuĂ­das de Zro esgotadas, nossa equipe de [GetTelepathPlural] deve sair do VĂ©u. Teremos que voltar outro dia."
 shroud.3125.tt: "Ganha Â§HSintoniaÂ§! significativa com uma entidade no Â§HVĂ©uÂ§!."
 shroud.3115.title: "Bombardeio PsiĂŽnico"
 shroud.3115.desc: "Uma sĂ©rie de convulsĂ”es poderosas atravessa o VĂ©u, provocando um tremor que abala nossas mentes.\n\nEssas reverberaĂ§Ă”es ameaĂ§am sobrecarregar nossa equipe de [GetTelepathPlural].\n\nQual serĂĄ a origem desse bombardeio psiĂŽnico?"
 shroud.3115.a: "Â§YPrecisamos descobrir.Â§!"
 shroud.3116.title: "Â§G$tech_psionic_bombers$Â§!"
 shroud.3116.desc: "Fortalecemos nossas mentes contra o bombardeio contĂ­nuo e logo compreendemos sua natureza.\n\nAs convulsĂ”es explosivas sĂŁo provocadas por correntes de energia psiĂŽnica concentrada, refletidas de nossa prĂłpria dimensĂŁo. Essas esferas instĂĄveis de intenĂ§ĂŁo psĂ­quica podem causar sĂ©rios danos Ă s mentes despreparadas.\n\nUma ideia se manifesta: essas formaĂ§Ă”es poderosas servirĂŁo de base para novas armas forjadas a partir do VĂ©u."
 shroud.3117.title: "Â§RChoque PsiĂŽnicoÂ§!"
 shroud.3117.desc: "Nossas reservas mentais se esgotaram.\n\nAs detonaĂ§Ă”es psĂ­quicas foram insuportĂĄveis, provocando casos de choque psiĂŽnico em grande parte de nossa equipe de [GetTelepathPlural].\n\nPrecisaremos de tempo para nos recuperar."
 psionic_shock_modifier: "Choque PsiĂŽnico"
 psionic_shock_modifier_desc: "A exposiĂ§ĂŁo a forĂ§as esmagadoras do VĂ©u causou um choque psiĂŽnico em nossos $DEFAULT_TELEPATH_PLURAL$."
 psionic_shock_hive_modifier: "$psionic_shock_modifier$"
 psionic_shock_hive_modifier_desc: "A exposiĂ§ĂŁo a forĂ§as esmagadoras do VĂ©u causou um choque psiĂŽnico em nossos $HIVE_TELEPATH_PLURAL$."
 psionic_shock_robot_modifier: "$psionic_shock_modifier$"
 psionic_shock_robot_modifier_desc: "A exposiĂ§ĂŁo a forĂ§as esmagadoras do VĂ©u causou um choque psiĂŽnico em nossas $MACHINE_TELEPATH_PLURAL$."
 shroud.3200.title: "Animatus"
 shroud.3200.desc: "Conforme nossas mentes vagam mais uma vez nas profundezas do VĂ©u, nos vemos diante da presenĂ§a familiar d$the_animator_of_clay_color_article$.\n\nRitmos regulares emergem ao redor de nossas consciĂȘncias. Vozes silenciosas emergem em coro; os fantasmas em nossa frota comeĂ§aram a se agitar. Elas oferecem levar nossas formas fĂ­sicas para mais alĂ©m, aliviando nossas mentes para focar em questĂ”es maiores.\n\nEmbora nĂŁo estejam vivas, elas nos sĂŁo familiares. Sua forma moldada pelo intento, suas presenĂ§as imbuĂ­das de histĂłria e propĂłsito. Em unĂ­ssono, elas se aproximam com expectativa.\n\nJĂĄ nĂŁo somos meros operadores dessas naves. NĂłs nos unimos, uma unidade de determinaĂ§ĂŁo, impelida por uma vontade coletiva."
 shroud.3200.a: "Somos apenas folhas ao vento."
 shroud.3200.a.tt: "Â§Y$unlock_edict_tt$Â§!$edict_animatus$"
 shroud.3210.title: "Vontade da TemperanĂ§a"
 shroud.3210.desc.intro: "A essĂȘncia lamuriosa d$the_outsider_color_article$ infiltra-se em nossas mentes.\n\nConforme seu eco choroso ressoa, vĂłrtices enlaĂ§ados de energia psiĂŽnica coalescem em uma forma estranha e amorfa. Quanto mais olhamos, menos compreensĂ­vel ela se torna. Uma voz fala.\n\nÂ§HAlgumas coisas sĂŁo indecifrĂĄveis para vocĂȘs. Essas coisas, a dor e o arrependimento ensinarĂŁo.\n\nEu fui a primeira de meu povo a vir para este lugar, mas todos pagamos o preĂ§o. Deixamos o VĂ©u nos destruir; nĂŁo compartilhem do mesmo destino!Â§!\n\n"
 shroud.3210.desc.know_zroni: "$shroud.3210.desc.intro$Reconhecemos essa voz como Zroni. NĂŁo sabemos como ela veio parar aqui, mas talvez seja prudente considerar seus alertas sobre o poder destrutivo do VĂ©u."
 shroud.3210.desc.left_zroni: "$shroud.3210.desc.intro$NĂłs a conhecemos. JĂĄ nos encontramos com esta Zroni, a Clarividente, antes. NĂŁo sabemos como ela veio parar aqui, mas farĂ­amos bem em considerar seus alertas sobre o poder destrutivo do VĂ©u."
 shroud.3210.desc.default: "$shroud.3210.desc.intro$Esta entidade permanece um mistĂ©rio para nĂłs. Pouco compreendemos seus alertas agourentos."
 shroud.3210.a: "Devemos proceder com cuidado."
 shroud.3210.a.tt: "Â§Y$unlock_edict_tt$Â§!$edict_will_of_temperance$"
 shroud.3220.title: "Jogo de Pensamentos"
 shroud.3220.desc: "O VĂ©u pulsa ao nosso redor com os ritmos tranquilos d$the_golden_dream_color_article$.\n\nConforme observamos, filamentos errantes de energia psiĂŽnica aos poucos se organizam em uma grade. Cifras irreconhecĂ­veis comeĂ§am a se manifestar em desenhos cuidadosamente distribuĂ­dos.\n\nEles comeĂ§am a se embaralhar uns sobre os outros, criando novas formas de maior complexidade. Com o tempo, sentimos um padrĂŁo; uma lĂłgica governando seus movimentos.\n\nPercebemos que somos peĂ§as em um jogo com $the_golden_dream_article$. Cada movimento que nos guia nos preenche com um novo senso de indulgĂȘncia tranquilizante."
 shroud.3220.a: "Conforme jogamos, escapamos para um lugar significativo."
 shroud.3220.a.tt: "Â§Y$unlock_edict_tt$Â§!$edict_will_of_distraction$"
 shroud.3230.title: "Areias do Tempo"
 shroud.3230.desc: "GrĂŁos de pensamento passam por nĂłs. Reconhecemos a presenĂ§a abrasiva d$the_endless_tide_color_article$.\n\nEla vai e vem, erodindo todos em seu caminho com uma inevitabilidade eterna, antes de redepositar-se.\n\nReemergindo apĂłs sua passagem, nĂłs sentimos rejuvenescimento verdadeiro."
 shroud.3230.a: "Aqui, somos atemporais."
 shroud.3230.a.tt: "Â§Y$unlock_edict_tt$Â§!$edict_will_of_endless$"
 shroud.3240.title: "Reformados"
 shroud.3240.desc: "Um ĂĄpice vestigial paira sobre nossos pensamentos; Ă© $the_pale_mountain_color_article$. Nossas mentes tensionam-se conforme uma visĂŁo assola nossos sentidos.\n\nVemos uma silhueta turva de uma nave danificada diante de nĂłs, a esmo no vazio.\n\nEm algum lugar de nossas mentes, a pressĂŁo oblĂ­qua se desloca e a nave comeĂ§a a se transformar. Fissuras sĂŁo seladas, a corrosĂŁo desaparece e o metal se endireita. Aos poucos, o legado de sua destruiĂ§ĂŁo Ă© desfeito.\n\nUma vez que a nave estĂĄ completamente reparada, a visĂŁo acaba abruptamente. Ficamos apenas com uma sensaĂ§ĂŁo de profunda renovaĂ§ĂŁo."
 shroud.3240.a: "Um grande renascimento de nossas mentes."
 shroud.3240.a.tt: "Â§Y$unlock_edict_tt$Â§!$edict_will_of_rebirth$"
 shroud.3250.title: "A ForĂ§a da AbstenĂ§ĂŁo"
 shroud.3250.desc: "A serenidade d$the_hollow_point_color_article$ preenche nossas mentes com seu silĂȘncio. Uma visĂŁo se espalha preguiĂ§osamente para nossos sentidos.\n\nObservamos eras de conflitos se desenrolando em um instante: civilizaĂ§Ă”es ruindo, histĂłrias apagadas, estĂĄtuas de tiranos hĂĄ muito tempo caĂ­dos enterradas pelo tempo.\n\nA sabedoria d$the_hollow_point_article$ estĂĄ na forĂ§a quieta da abstenĂ§ĂŁo. Conflitos comeĂ§am e acabam, mas, ainda assim, permanecemos. Esse distanciamento injeta nossos lĂ­deres com uma nova longevidade, livre da toxicidade corrosiva da insatisfaĂ§ĂŁo mortal."
 shroud.3250.a: "Ainda vivemos."
 shroud.3250.a.tt: "Todos os lĂ­deres psiĂŽnicos recebem a caracterĂ­stica Â§Y$leader_trait_shroud_age$Â§!, que concede Â§G+40Â§! anos Ă  expectativa de vida do lĂ­der."
 shroud.3260.title: "Caos Ă  Ordem"
 shroud.3260.desc: "O VĂ©u estĂĄ borbulhando, sua ebuliĂ§ĂŁo pulsa diante de nĂłs. Uma presenĂ§a se aproxima; Ă© $the_vacant_throne_color_article$.\n\nConforme ele chega mais perto, energias psiĂŽnicas vastas e amaranhadas sĂŁo subjugadas repentinamente. A desordem se torna mais clara e mais compreensĂ­vel. Cores florescem com definiĂ§ĂŁo renovada. Simetria, lĂłgica e estrutura sĂŁo impostas.\n\nAlgo se concretiza nos mais profundos recantos de nossas mentes: um desejo avassalador por ordem."
 shroud.3260.a: "Descarte o caos, abrace a ordem."
 shroud.3260.a.tt: "Â§Y$unlock_edict_tt$Â§!$edict_will_of_order$"
 shroud.3270.title: "AceleraĂ§ĂŁo Infinita"
 shroud.3270.desc: "Uma aceleraĂ§ĂŁo mental impossĂ­vel sobrecarrega nossos sentidos. Reconhecemos a presenĂ§a d$the_black_river_color_article$.\n\nCorremos a uma velocidade incompreensĂ­vel em direĂ§ĂŁo a uma finalidade que nĂŁo conseguimos conceber por completo. Ă a fronteira entre tudo e nada, a separaĂ§ĂŁo do que sempre foi e o que nunca serĂĄ, o limite alĂ©m do qual nenhuma lei natural pode alcanĂ§ar.\n\nFinalmente, conforme recobramos os sentidos, ganhamos uma nova noĂ§ĂŁo do que significa realmente se mover."
 shroud.3270.a: "JĂĄ encontramos o limite do universo?"
 shroud.3270.a.tt: "Â§Y$unlock_edict_tt$Â§!$edict_will_of_motion$"
