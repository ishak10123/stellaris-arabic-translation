 # A Leap of Faith - First select event
 shroud.8330.name: "Ato de FĂ©"
 shroud.8330.desc: "Descontente pelas limitaĂ§Ă”es de nossa carne, Â§H[forsaken_leader.GetName]Â§! buscou acelerar sua transformaĂ§ĂŁo psiĂŽnica ao ingerir uma toxina letal em uma demonstraĂ§ĂŁo pĂșblica dramĂĄtica.\n\nConforme morria, seu corpo era consumido por um brilho pĂșrpura vĂ­vido e se desintegrava em uma poeira fina de pura energia psiĂŽnica. Tais milagres se tornaram possĂ­veis por meio da vontade da Â§RVozÂ§!.\n\nTomamos isso como um sinal claro: onde Â§H[forsaken_leader.GetName]Â§! liderou, outros devem seguir."
