 shroud.5115.title: "[GetChosenPatron]"
 shroud.5115.desc.intro: "O VĂ©u. Ele flui acima de nossa realidade conhecida, uma sombra projetada pela escuridĂŁo.\n\nEmbora jĂĄ tenhamos nos aventurado bastante nesse reino psiĂŽnico, nossas expediĂ§Ă”es iniciais foram apenas experimentais. Agora, depois de anos desgastando o manto entre as dimensĂ”es com nossas mentes combinadas, nĂłs o sentimos de modo claro o suficiente para explorar com propĂłsito.\n\nNo outro lado, nossos esforĂ§os nĂŁo passaram despercebidos. A entidade Â§H[GetChosenPatron]Â§! nos aguarda."
