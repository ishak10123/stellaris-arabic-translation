 shroud.6205.name: "$PSIONIC_AURA_PLURAL$"
 shroud.6205.desc.start: "Nossos pesquisadores sofreram terrivelmente com a radiaĂ§ĂŁo psiĂŽnica tĂłxica no sistema Â§H[exiled_system_border.GetName]Â§!, mas sua missĂŁo resultou em descobertas importantes.\n\nDenominamos esse fenĂŽmeno alarmante de Â§H\"$PSIONIC_AURA$\"Â§!, uma massa destrutiva de energia que afeta nossas mentes e nossa tecnologia. Ela se espalhou a partir do sistema Â§H[exiled_center_system.GetName]Â§!, onde as energias psiĂŽnicas atingiram nĂ­veis tĂŁo extremos que se expandiram para outros sistemas estelares."
