 shroud.4150.title: "A Chegada do Fim"
 shroud.4150.desc: "Nosso patrono fala silenciosamente. Conforme sentimos a iminĂȘncia do fim do ciclo, uma energia renovada pulsa por [This.GetName]. Somos revigorados pela urgĂȘncia.\n\nSe quisermos satisfazer a vontade do Fim, a energia coletiva de todos os [This.GetSpeciesNamePlural] deverĂĄ ser direcionada para esse Ășnico propĂłsito. Devemos manifestar o poder de nosso patrono e completar a expansĂŁo da Aura para os recantos mais longĂ­nquos da galĂĄxia."
 shroud.4150.a: "Chegou a nossa hora."
