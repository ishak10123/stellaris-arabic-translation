 shroud.2800.intro: "ApĂłs dias presos em transe [Owner.GetHypnotic], finalmente conseguimos abrir um breve portal para o Â§HVĂ©uÂ§!.\n\nAgora, podemos [Owner.GetSeeVerb] esse plano com mais clareza e distinguir padrĂ”es dentro da massa caĂłtica."
 shroud.2800.desc: "$shroud.2800.intro$ Nossas aĂ§Ă”es influenciam os fluxos instĂĄveis de energia psiĂŽnica, e entidades sem forma nos observam do outro lado; Ă s vezes com curiosidade, outras com benevolĂȘncia... e outras ainda com malĂ­cia.[Owner.GetShroudBreachedExtra]\n\nNosso domĂ­nio psiĂŽnico no plano corpĂłreo foi apenas o comeĂ§o. Agora que estabelecemos um elo psiĂŽnico inicial, podemos unir nossos poderes cognitivos e mergulhar no VĂ©u."
 shroud.2800.desc_extra: " Seus protocolos sĂŁo ainda mais enigmĂĄticos que os d$the_animator_of_clay_color_article$."
