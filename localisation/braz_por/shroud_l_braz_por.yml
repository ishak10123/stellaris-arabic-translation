 # C3
 shroud.2510.name: "Sobrecarga Neural"
 shroud.2510.desc: "[Owner.GetNeuralOverloadIntro]\n\nTestes mais amplos revelaram que uma parte significativa de nossa populaĂ§ĂŁo estĂĄ sofrendo de [Owner.GetNeuralOverloadExtra], provavelmente graĂ§as ao aumento de atividade [Owner.GetPsychicAdj]. Os surtos repentinos de energia gerados por prĂĄticas psiĂŽnicas descontroladas podem levar a uma escalada rĂĄpida e consequĂȘncias graves.\n\nTĂ©cnicas avanĂ§adas de meditaĂ§ĂŁo podem ajudar a regular essa atividade psiĂŽnica sem a intervenĂ§ĂŁo [Owner.GetMedicalAdj], mas um grupo de [Owner.GetScientistPlural] recomenda o desenvolvimento de um [Owner.GetMedicalImplantName] para lidar com o problema."
 shroud.2510.intro_default: "CidadĂŁos de Â§H[Owner.GetAdjective]Â§! estĂŁo enfrentando um aumento de rupturas cerebrais graves, muitas vezes resultando em perda cognitiva ou morte."
