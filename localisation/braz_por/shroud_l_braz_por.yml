 shroud.6580.name: "Selando Â§H[exiled_center_system.GetName]Â§!"
 shroud.6580.desc: "Com os colossais atenuadores psiĂŽnicos ativados, nosso Â§H$SHROUD_SEAL$Â§! inicia a purificaĂ§ĂŁo do sistema Â§H[exiled_center_system.GetName]Â§!, expulsando a Â§H$PSIONIC_AURA$Â§!.\n\nAnĂĄlises interestelares confirmaram que o restante do territĂłrio inimigo estĂĄ conectado diretamente a [exiled_center_system.GetName] por uma hiperestrada. Esse Ășnico $SHROUD_SEAL$ tem, portanto, a capacidade de dissipar $PSIONIC_AURA_PLURAL$ em toda a extensĂŁo do territĂłrio de Â§H[exiled_country.GetName]Â§!.\n\nNossa vitĂłria depende da proteĂ§ĂŁo do Selo."
 shroud.6580.a: "DefendĂȘ-lo Ă© crucial."
 shroud.6600.name: "A Assembleia dos Caminhos Mentais"
 shroud.6600.desc: "A colĂŽnia dominada pela ameaĂ§a psiĂŽnica em Â§H[current_planet.GetName]Â§! foi conquistada.\n\nDescobrimos que a Â§H$PSIONIC_AURA$Â§! presente neste sistema estava sendo amplificada pelas interaĂ§Ă”es psĂ­quicas da populaĂ§ĂŁo com o Â§HVĂ©uÂ§!. Essas prĂĄticas eram conduzidas por um grupo de telepatas de elite, conhecido como Â§HAssembleia dos Caminhos MentaisÂ§!. Esse culto psiĂŽnico promove a devoĂ§ĂŁo a uma \"Entidade Patronal\", supostamente um ser poderoso originĂĄrio do VĂ©u, conhecido apenas como Â§H$r_the_lost_patron$Â§!.\n\nSeus textos sagrados fazem repetidas referĂȘncias a um artefato que ainda estaria no planeta Â§H[other_planet.GetName]Â§! e tem ligaĂ§ĂŁo com o ser mencionado. Adquirir esse objeto nos ajudarĂĄ a conter o avanĂ§o de sua influĂȘncia."
 shroud.6600.a: "Trace um curso para [other_planet.GetName]."
 shroud.6601.name: "RuĂ­nas em [current_planet.GetName]"
 shroud.6601.desc: "ConcluĂ­mos nossa colonizaĂ§ĂŁo de Â§H[current_planet.GetName]Â§!, um antigo planeta de [exiled_country.GetName].\n\nEm meio aos velhos registros, descobrimos que a $PSIONIC_AURA$ anteriormente presente neste sistema gerou interaĂ§Ă”es psĂ­quicas da populaĂ§ĂŁo com o Â§HVĂ©uÂ§!. Essas prĂĄticas eram conduzidas por um culto psiĂŽnico que promovia a devoĂ§ĂŁo a uma \"Entidade Patronal\", supostamente um ser poderoso originĂĄrio do VĂ©u, conhecido como Â§H$r_the_lost_patron$Â§!.\n\nFragmentos de seus textos sagrados fazem referĂȘncia a um artefato relacionado a esse ser, que ainda estaria no planeta Â§H[other_planet.GetName]Â§!. Para assegurar nosso controle sobre esse objeto, precisaremos conquistar [other_planet.GetName] de forma mais calculada, deixando parte de sua populaĂ§ĂŁo intacta."
 shroud.6601.a: "$shroud.6600.a$"
 shroud.6700.name: "$SANCTUM_OF_THE_LOST$"
 shroud.6700.desc.common: "Iniciamos imediatamente uma repressĂŁo total contra todas as prĂĄticas psiĂŽnicas nesses mundos, neutralizando por completo sua abominĂĄvel Â§H$PSIONIC_AURA$Â§!.\n\nNa principal metrĂłpole do planeta encontra-se uma torre em ruĂ­nas, conhecida como Â§H$SANCTUM_OF_THE_LOST$Â§!: o antigo templo supremo do culto psiĂŽnico de um impĂ©rio agora devastado. Nossos soldados relatam que o local emana uma presenĂ§a mĂ­stica e inquietante.\n\nA cĂąmara mais interna da estrutura abriga um \"casulo\" selado, que emite uma forte radiaĂ§ĂŁo psiĂŽnica. MuniĂ§Ă”es convencionais se mostraram ineficazes contra sua carapaĂ§a. InvestigaĂ§Ă”es adicionais serĂŁo necessĂĄrias para eliminar a ameaĂ§a potencial que esse objeto representa Ă  nossa seguranĂ§a."
 shroud.6700.desc.contact: "A conquista de Â§H[current_planet.GetName]Â§! marcou nossa vitĂłria final contra Â§H[exiled_country.GetName]Â§!. $shroud.6700.desc.common$"
 shroud.6700.desc.no_contact: "Ao conquistar Â§H[current_planet.GetName],Â§! ganhamos o controle do territĂłrio que uma vez foi um impĂ©rio conhecido como Â§H[exiled_country.GetName]Â§!. $shroud.6700.desc.common$"
 shroud.6700.desc.contact_no_name: "A conquista de Â§H[current_planet.GetName]Â§! marcou nossa vitĂłria final contra ?.$shroud.6700.desc.common$"
 shroud.6700.desc.no_exiled: "Ao conquistar Â§H[current_planet.GetName]Â§!, ganhamos o controle do territĂłrio que uma vez foi governado por fanĂĄticos psiĂŽnicos. $shroud.6700.desc.common$"
 shroud.6700.a: "NotĂ­cias preocupantes... Investigue mais."
 shroud.6705.name: "$psionic_threat_eliminated$"
 shroud.6705.desc.common: "Uma inspeĂ§ĂŁo preliminar mostrou evidĂȘncias de uma extensa rede de construĂ§Ă”es no planeta, provavelmente a sede da escĂłria psiĂŽnica. Agora restam apenas vestĂ­gios degradados.\n\nTalvez nunca saibamos que segredos degenerados essas estruturas abrigam, ou a verdadeira natureza das prĂĄticas covardes de seus ocupantes. De qualquer maneira, o sistema estĂĄ livre dos Ășltimos traĂ§os de sua $PSIONIC_AURA$, nos deixando a salvo do mal que uma vez causou."
 shroud.6705.desc.contact: "A erradicaĂ§ĂŁo da populaĂ§ĂŁo em Â§H[current_planet.GetName]Â§! marcou o fim do impĂ©rio conhecido como Â§H[exiled_country.GetName]Â§!.\n\n$shroud.6705.desc.common$"
 shroud.6705.desc.no_contact: "A erradicaĂ§ĂŁo da populaĂ§ĂŁo em Â§H[current_planet.GetName]Â§! marcou o fim de uma ameaĂ§a psiĂŽnica devastadora.\n\n$shroud.6705.desc.common$"
