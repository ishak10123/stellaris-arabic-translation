 shroud.2750.desc_p3_crisis_4_5: "JĂĄ estamos sendo alimentados por energia psiĂŽnica extraĂ­da do Â§HVĂ©uÂ§!. Se despertarmos toda a capacidade psiĂŽnica do povo [This.GetAdjective], poderemos alcanĂ§ar nosso verdadeiro potencial."
 shroud.2750.desc_p3_origins: "As forĂ§as psiĂŽnicas nĂŁo nos sĂŁo estranhas, graĂ§as Ă  influĂȘncia do Â§HVĂ©uÂ§!. Se despertarmos toda a capacidade psiĂŽnica do povo [This.GetAdjective], poderemos alcanĂ§ar nosso potencial latente."
