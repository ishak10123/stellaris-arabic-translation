 shroud.2615.desc: "Ă medida que nossa populaĂ§ĂŁo se adapta aos novos poderes, alguns grupos de [owner.GetSpeciesNamePlural] estĂŁo se lanĂ§ando em prĂĄticas extremamente arriscadas para acelerar o desenvolvimento psiĂŽnico.\n\nO uso de [owner.GetMentalUpgrade] do mercado clandestino disparou. [owner.GetMedicalFacility] sem regulamentaĂ§ĂŁo estĂŁo oferecendo uma variedade de serviĂ§os nĂŁo comprovados, prometendo maximizar as capacidades psiĂŽnicas dos indivĂ­duos. Ă difĂ­cil prever o que resultarĂĄ disso."
