 shroud_eater_covenant_chain_desc.intro: "Criamos um vĂ­nculo com uma entidade do VĂ©u conhecida como $the_eater_of_worlds_color_article$. InsaciĂĄvel, ela nos concede fragmentos de seu poder, por um preĂ§o.\n\nSegundo nossa equipe de [GetTelepathPlural], poderemos fortalecer essa ligaĂ§ĂŁo se passarmos a agir conforme a vontade de nossa entidade patronal."
 shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\nA Comedora estĂĄ faminta. Ela anseia pela guerra, o doce sabor do conflito e do lamento."
