 shroud.10.desc.intro: "O VĂ©u reverbera com uma ferocidade sem precedentes. Enormes espirais de energia se contorcem e se agitam pelo Ă©ter.\n\nEm meio ao caos pulsante, ressoam ecos psiĂŽnicos da Rainha SintĂ©tica. Infinita e onipotente, ela brinca com a galĂĄxia na palma da mĂŁo."
 shroud.10.desc.outro: "Mas por quĂȘ? Teria ciĂȘncia de uma fraqueza que desconhecemos? SerĂĄ que nos ajudarĂĄ se pedirmos?\n\nAo concentrarmos nossas mentes no Animador, sentimos sua impaciĂȘncia. Ă provĂĄvel que tenhamos apenas uma chance de pedir seu auxĂ­lio. SerĂŁo necessĂĄrias enormes quantidades de Â§HEnergiaÂ§! e Â§H$sr_zro$Â§! para esse esforĂ§o."
