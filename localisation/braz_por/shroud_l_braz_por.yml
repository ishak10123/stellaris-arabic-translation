 shroud.8500.title: "Arautos do Fim"
 shroud.8500.desc.intro: "A vontade inevitĂĄvel de nosso patrono aperta o seu cerco contra a galĂĄxia. Agora sabemos como o Fim virĂĄ.\n\nA Â§R$end_aura$Â§! deve se espalhar pela galĂĄxia. Quando o reino fĂ­sico se fundir com essa essĂȘncia pura do Â§HVĂ©uÂ§!, a verdadeira aniquilaĂ§ĂŁo se seguirĂĄ."
 shroud.8500.desc.outro: "Concluir essa tarefa monumental serĂĄ nossa obra-prima e a porta para a salvaĂ§ĂŁo final."
 shroud.8500.desc.homicidal: "$shroud.8500.desc.intro$\n\nA erradicaĂ§ĂŁo de toda vida nesta galĂĄxia serĂĄ um efeito colateral bem-vindo. $shroud.8500.desc.outro$"
 shroud.8500.desc.default: "$shroud.8500.desc.intro$\n\n$shroud.8500.desc.outro$"
 shroud.8500.a: "NĂŁo podemos falhar."
 shroud.8600.title: "$shroud.4970.title$"
 shroud.8600.desc.intro: "Este era o nosso destino.\n\nA Â§R$end_aura$Â§! envolve a galĂĄxia. Nosso povo em [Root.GetHomeWorldName] entrou em um estado de euforia frenĂ©tica em celebraĂ§ĂŁo da"
 shroud.8600.desc.outro: "Um renascimento glorioso se aproxima, prometido desde os tempos de nosso grande despertar.\n\nDiante de nĂłs, toda a existĂȘncia Ă© consumida pelo vazio. EliminaĂ§ĂŁo e aniquilaĂ§ĂŁo se tornaram as Ășnicas leis restantes da galĂĄxia. Um a um, mundos inteiros se desintegram, voltando para o nada de onde vieram.\n\nSomos os Ășltimos. Ă... lindo. JĂĄ podemos vĂȘ-lo nos espasmos de sua nova forma frĂĄgil. O Fim passou. Agora se inicia o ComeĂ§o."
 shroud.8600.desc.homicidal: "$shroud.8600.desc.intro$ obliteraĂ§ĂŁo de todos que nĂŁo sĂŁo parte de nĂłs. $shroud.8500.desc.outro$"
 shroud.8600.desc.default: "$shroud.8600.desc.intro$ nossa piedosa salvaĂ§ĂŁo. $shroud.8600.desc.outro$"
 shroud.8600.a: "A finalidade Ă©... impossĂ­vel."
 shroud.8610.title: "O PreĂ§o da Fraqueza"
 shroud.8610.desc.intro: "NĂłs falhamos. Como consequĂȘncia de nossa fraqueza, $end_of_the_cycle_color_article$ nĂŁo alcanĂ§ou sua gloriosa realizaĂ§ĂŁo. O preĂ§o que precisamos pagar por essa incompetĂȘncia cai sobre nĂłs.\n\nEle levou tudo. Em um instante, a totalidade de [Root.GetName]... desapareceu. Onde antes havia colĂŽnias prĂłsperas, agora hĂĄ somente ruĂ­na. Onde antes havia frotas poderosas cruzando o vazio, agora existem apenas o silĂȘncio e destroĂ§os. Tudo foi devorado pelo Fim. Tudo foi tomado pelo Â§HVĂ©uÂ§!."
 shroud.8610.desc.outro: "Agora, nosso patrono manifestou uma entidade do VĂ©u gigantesca acima de [former_capital.GetName]. Ganhando um poder imenso ao devorar a consciĂȘncia de nossos psiĂŽnicos, ela agora percorre a galĂĄxia para concluir a tarefa que nĂŁo conseguimos cumprir."
 shroud.8610.desc.a: "$shroud.8610.desc.intro$\n\n$shroud.8610.desc.outro$"
 shroud.8610.desc.b: "$shroud.8610.desc.intro$\n\nA maior parte dos [Root.GetSpeciesNamePlural] aceita esse destino, mas um grupo pequeno de infiĂ©is se recusa a ceder Ă  vontade suprema de nosso patrono. Eles sĂŁo os exilados comandados por Â§H[Root.GetRulerName]Â§!, um indivĂ­duo psĂ­quico poderoso que sabia o que estava por vir. Agora, eles se escondem em mundo longe da influĂȘncia do Fim.\n\n$shroud.8610.desc.outro$ Quando tiver terminado, ela irĂĄ atrĂĄs dos exilados."
 shroud.8610.a: "Talvez este fosse o nosso destino desde o inĂ­cio..."
 shroud.8610.b: "Poderiam os exilados resistir Ă  sua forĂ§a?"
 shroud.8710.title: "Sobrevivendo ao Apocalipse"
 shroud.8710.desc: "EstĂĄ feito. O Â§RJuĂ­zo FinalÂ§! foi destruĂ­do.\n\n$end_of_the_cycle_color_article_cap$ recuou para as profundezas do Â§HVĂ©uÂ§!. Sua ameaĂ§a Ă  realidade fĂ­sica foi impedida por enquanto.\n\nConforme o corpo velado de seu avatar se esvaĂ­a para fora da existĂȘncia, um resquĂ­cio fĂ­sico de sua manifestaĂ§ĂŁo foi recuperado. Mesmo apĂłs a morte, nossos telepatas podem senti-lo emanando nĂ­veis impressionantes de poder psiĂŽnico, vastamente mais poderoso do que o fragmento recuperado em Â§H[shrouded_planet.GetName]Â§!.\n\nEsse nĂșcleo de inevitabilidade concentrada pode ser usado para reconstruir das cinzas da galĂĄxia aqueles que sobreviveram a esse JuĂ­zo Final.\n\nO Fim veio e se foi, mas nĂłs permanecemos."
 shroud.8710.a: "Era este o nosso destino desde o inĂ­cio?"
 r_core_of_the_reckoning: "NĂșcleo do JuĂ­zo Final"
 r_core_of_the_reckoning_desc: "Recuperado dos restos do JuĂ­zo Final, este nĂșcleo ainda irradia altos nĂ­veis de energia psiĂŽnica."
 core_of_reckoning_active_effect_tt: "Libera uma ÂŁdecisionÂŁÂ Â§YDecisĂŁo PlanetĂĄriaÂ§!: ['concept_banish_decision']"
 decision_banish: "Banir"
 decision_banish_desc: "Ao permitir que o VĂ©u consuma este lugar, o equilĂ­brio serĂĄ restaurado para o NĂșcleo do JuĂ­zo Final."
 decision_banish_effects_tt: "Bane este planeta para o VĂ©u."
 concept_banish_decision: "$decision_banish$"
 concept_banish_decision_desc: "$decision_banish_desc$\n$decision_banish_effects_tt$\nModificador Â§Y$shroud_surge$Â§! adicionado por Â§Y10Â§! anos:\n$shroud_surge_effects$"
 shroud_surge: "Surto do VĂ©u"
 shroud_surge_desc: "O equilĂ­brio foi temporariamente restaurado para o $r_core_of_the_reckoning$."
 shroud_surge_effects: "Dobra os efeitos passivos do Â§Y$r_core_of_the_reckoning$Â§!."
