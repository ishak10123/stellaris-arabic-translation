 # EotC Delve Events
 shroud.8420.title: "A ProvaĂ§ĂŁo do SilĂȘncio"
 shroud.8420.desc: "Descemos atĂ© o VĂ©u, nossa vontade unificada ajudando a silenciar o barulho caĂłtico que poderia nos distrair de nosso objetivo, o ente Â§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]Â§!.\n\nMas propĂłsito apenas nĂŁo pode nos proteger. Vozes sussurram banalidades vazias, nos mimando com distraĂ§Ă”es medĂ­ocres, cada uma mais insignificante do que a outra, mas todas igualmente tentadoras.\n\nConforme comeĂ§amos nos fracionar, a entidade retorna. Um Ășnico comando reverbera pelo vazio:\n\nÂ§R\"SILĂNCIO.\"Â§!"
 shroud.8420.a: "Fiquem em silĂȘncio e aguentem firme."
 shroud.8420.a.reply: "Esse comando corta o caos, clareando o barulho dissonante, expurgando a desordem obstrutiva que busca nos consumir. Nossa psique resiste enquanto suportamos a fragmentaĂ§ĂŁo.\n\nO ente Â§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]Â§! recua mais para dentro do VĂ©u. A claridade que se segue Ă© quase estonteante. Ela se estabelece nas lacunas de nossas mentes, nos deixando com uma determinaĂ§ĂŁo renovada.\n\nE presentes. Presentes maravilhosos."
 shroud.8420.a.tooltip: "Â§Y$endbringers_madness_1$Â§! perde os seguintes efeitos:\n$t$$MOD_POP_AMENITIES_USAGE_MULT$: $@madness_base_pop_amenities_usage_mult|0=-%$"
 shroud.8430.title: "A ProvaĂ§ĂŁo da Pureza"
 shroud.8430.desc: "Conforme mergulhamos no VĂ©u, observamos a corrupĂ§ĂŁo do caos senciente.\n\nPestilentas, mentes ociosas geram camadas de turbulĂȘncia psiĂŽnica, poluindo o VĂ©u com uma podridĂŁo fĂ©tida. Em meio a essa bagunĂ§a odiosa, comeĂ§amos a sentir a presenĂ§a avassaladora de nosso objetivo, o ente Â§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]Â§!.\n\nA malĂ­cia de suas intenĂ§Ă”es satura nossa psique conforme avanĂ§a em direĂ§ĂŁo ao caos. NĂłs nos preparamos para a absolviĂ§ĂŁo inevitĂĄvel conforme um comando ressoa atravĂ©s do vazio:\n\nÂ§R\"ORDEM. UNIDADE.\"Â§!"
 shroud.8430.a: "Resistam!"
 shroud.8430.a.reply: "O comando permeia o caos malicioso.\n\nInĂșmeras vozes gritam de dor enquanto o ente Â§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]Â§! limpa o VĂ©u das deformaĂ§Ă”es sencientes que o infestam, deixando apenas um reino de imperfeiĂ§Ă”es absolvidas.\n\nConforme a entidade se entremeia mais fundo no VĂ©u, nĂłs ficamos para trĂĄs para observar e estudar o resultado de sua purificaĂ§ĂŁo absoluta."
 shroud.8430.a.tooltip: "Â§Y$endbringers_madness_2$Â§! perde os seguintes efeitos:\n$t$$mod_planet_pops_upkeep_mult$: $@madness_base_planet_pops_upkeep_mult|0=-%$"
 shroud.8440.title: "A ProvaĂ§ĂŁo das Chamas"
 shroud.8440.desc: "Quando entramos no VĂ©u, encontramos apenas dor. As nĂ©voas danĂ§antes habituais sĂŁo um inferno, inflamando a prĂłpria essĂȘncia de nossas mentes.\n\nAtravĂ©s da tormenta, percebemos cidades se desfazendo em ruĂ­nas derretidas, planetas devorados pelo fogo, populaĂ§Ă”es inteiras se contorcendo em agonia enquanto chamas espectrais reduzem suas formas corpĂłreas a cinzas incandescentes.\n\nNo centro da pira, detectamos a presenĂ§a do ente Â§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]Â§!. Conforme seu poder ameaĂ§a consumir a realidade, a entidade decreta:\n\nÂ§R\"LIBERTAĂĂO.\"Â§!"
 shroud.8440.a: "Submetam-se Ă  absolviĂ§ĂŁo."
 shroud.8440.a.reply: "As chamas psiĂŽnicas engolem nossas mentes, incinerando a complacĂȘncia, deixando apenas determinaĂ§ĂŁo purificada.\n\nAgora podemos ver o glorioso propĂłsito do ente Â§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]Â§! e a simplicidade magnĂ­fica que ele oferece."
 shroud.8450.title: "$utopia.3310.name$"
 shroud.8450.desc: "Uma declaraĂ§ĂŁo ecoa:\n\nÂ§R\"VOCĂS SABEM MEU NOME.\"Â§!\n\nA culminaĂ§ĂŁo de nossa viagem para as estrelas, a resposta de sĂ©culos de questionamento estĂĄ aqui. $end_of_the_cycle_color_article_cap$ nos compele. Nosso Pacto Ă© formado.\n\nÂ§R\"O FIM COMEĂA.\"Â§!\n\nDor. Agonia. Certeza. Conforme as palavras se desfazem, nosso destino Ă© selado.\n\nAgora compreendemos. Um galĂĄxia silenciada, saturada na inevitabilidade da Â§R$end_aura$Â§!."
