 shroud.4015.desc_outro_homicidal: "Nossas mentes imediatamente rejeitam suas premissas falsas de ordem e harmonia. Aumentar nossa sintonia com este ser, $the_cradle_of_souls_color_article$, enfraqueceria nossa determinaĂ§ĂŁo."
