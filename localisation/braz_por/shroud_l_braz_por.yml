 shroud.1550.desc.common_2: "Nossas aĂ§Ă”es reverberam atravĂ©s do VĂ©u, atraindo a atenĂ§ĂŁo de seres de imenso poder. Se conquistarmos o favor dessas entidades, poderemos canalizar sua energia psiĂŽnica para a realidade corpĂłrea. Nossa equipe de [GetTelepathPlural] especula que a \"aura\" resultante fortalecerĂĄ nosso impĂ©rio,"
