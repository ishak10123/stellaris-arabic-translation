 # Chaotic Events
 # C1
 shroud.2502.name: "Temporal do VĂ©u"
 shroud.2502.desc: "RelatĂłrios indicam mudanĂ§as ambientais abruptas em um setor especĂ­fico de Â§H[This.GetName]Â§!.\n\nA atmosfera estĂĄ saturada por um vapor gelatinoso, que se condensa em uma precipitaĂ§ĂŁo oleosa que [Owner.GetIndividualNamePlural] com capacidades psiĂŽnicas chamam de \"Temporal do VĂ©u\". PerturbaĂ§Ă”es psĂ­quicas significativas estĂŁo sendo registradas em toda a ĂĄrea afetada.\n\nAs condiĂ§Ă”es da regiĂŁo dentro do Temporal do VĂ©u sĂŁo extremamente [This.Owner.GetShroudfallExtra]. Sem investimentos imediatos na restauraĂ§ĂŁo ambiental, os habitantes precisarĂŁo se adaptar a uma realidade profundamente transformada."
