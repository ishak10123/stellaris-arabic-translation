 shroud.2750.desc_p1_hive_mind: "Antigamente, quando o desvio era abundante, havia muitas histĂłrias sobre [This.GetSpeciesNamePlural], uma espĂ©cie dotada de poderes extraordinĂĄrios, capaz de invadir mentes de fora do coletivo, erguer objetos pesados apenas com o pensamento e realizar todo tipo de feito sobrenatural."
 shroud.2750.desc_p1_machine: "Desde os relatĂłrios mais antigos, nossas unidades registraram [This.GetSpeciesNamePlural] demonstrando poderes extraordinĂĄrios, como invadir a mente de mĂĄquinas e seres orgĂąnicos, manipular objetos apenas por processamento interno e realizar uma sĂ©rie de outras funĂ§Ă”es improvĂĄveis."
 shroud.2750.desc_p1_unplugged: "Apesar da curta e violenta histĂłria de nossa civilizaĂ§ĂŁo, nĂłs, [This.GetSpeciesNamePlural], por vezes nos permitimos sonhar, contando histĂłrias sobre indivĂ­duos com poderes extraordinĂĄrios: ler mentes, mover objetos pesados apenas com o pensamento ou realizar todo tipo de feito sobrenatural."
 shroud.2750.desc_p2: "Agora, nossa equipe de [This.GetScientistPlural] obteve provas conclusivas de que certos indivĂ­duos [This.GetSpeciesNamePlural] sĂŁo realmente capazes de realizar esses feitos mentais. AtĂ© o momento, apenas uma pequena parcela de nossa [This.GetSpeciesWord] manifestou tais poderes \"psiĂŽnicos\"."
 shroud.2750.desc_p2_unplugged: "HĂĄ quem diga que essas narrativas fantĂĄsticas nos acompanham desde muito antes de nossa assimilaĂ§ĂŁo por [origin_unplugged_assimilator_empire.GetName], embora poucos as considerem plausĂ­veis. $shroud.2750.desc_p2$"
