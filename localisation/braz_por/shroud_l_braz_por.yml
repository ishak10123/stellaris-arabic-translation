 # Breach the Shroud
 shroud.2840.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2840.desc: "$shroud.2800.intro$ De dentro de suas profundezas amorfas surge uma entidade sinistra de poder imensurĂĄvel. Ă a Â§RVozÂ§!, e ela penetra em nossas psiques mais Ă­ntimas com uma forĂ§a assustadora.\n\nÂ§R\"SAIBA MEU NOME.\"Â§!\n\nSĂł agora podemos sentir quĂŁo distante nossas mentes pequenas estĂŁo da Â§RVozÂ§!. O selo foi rompido e logo a extensĂŁo completa do que somos se manifestarĂĄ.\n\nNossos telepatas estĂŁo preparados para mergulhar no coraĂ§ĂŁo do VĂ©u e descobrir o verdadeiro nome de nossa gloriosa entidade patronal."
