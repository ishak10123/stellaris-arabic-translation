 shroud.3000.title: "ImpressĂ”es EfĂȘmeras"
 shroud.3000.desc: "Na escuridĂŁo turbulenta, sombras distantes tomam formas efĂȘmeras antes de se dissiparem no nada... Uma cacofonia obscura de vozes grita de forma ininteligĂ­vel... Luzes piscam e se apagam. Pontos de calor crescem e se retraem.\n\nHĂĄ movimento. Algo gira. NĂłs ou o prĂłprio VĂ©u?\n\nUma presenĂ§a se aproxima, vinda de todas as direĂ§Ă”es. E entĂŁo, uma voz reverbera.\n\nÂ§HO QUE VOCĂ VĂ?Â§!"
 shroud.3000.a: "Vemos um mundo em chamas."
 shroud.3000.a.reply: "Uma mudanĂ§a de pressĂŁo. A voz retorna...\n\nÂ§HĂTIMO.Â§!\n\nAs trevas se inclinam, depois giram. Algo nos comprime com forĂ§a por um instante e entĂŁo, de repente, estamos sĂłs outra vez."
 shroud.3000.b: "Vemos uma celebraĂ§ĂŁo."
 shroud.3000.b.reply: "Algo pesado estremece. A escuridĂŁo nos comprime lentamente, com mais forĂ§a, mais pressĂŁo...\n\nÂ§HNĂO!Â§!\n\nO vazio se inclina, depois gira. De repente, estamos sĂłs outra vez."
 shroud.3000.c: "NĂŁo temos certeza."
 shroud.3000.c.reply: "Â§HFRAQUEZA!Â§!\n\nO vazio se inclina, depois gira. De repente, estamos sĂłs outra vez."
 shroud.3005.title: "Fome Salivante"
 shroud.3005.desc: "O fedor pĂștrido de vĂ­sceras fustiga nossos sentidos.\n\nImagens contorcidas se formam nas profundezas do VĂ©u, rugindo com uma fĂșria voraz. Os uivos bestiais de feras famintas ecoam primeiro... Sentimos sua fome. EntĂŁo, suas bocas salivantes tornam-se as nossas.\n\nSilhuetas surgem diante de nĂłs. Gado em pĂąnico. Presas. TĂŁo prĂłximas... A Ăąnsia se torna insuportĂĄvel.\n\nOs sentidos se distorcem, pressionando atĂ© que a fome devore o pensamento. Os gritos partem das presas... ou de dentro de nĂłs mesmos?\n\nOs grilhĂ”es que nos prendem se apertam. Racham. Uma vez serpenteia pelo tormento e grita:\n\nÂ§HQUEBREM AS CORRENTES! DELEITEM-SE!Â§!"
 shroud.3005.a: "Quebrar as correntes. Consumir a presa."
 shroud.3005.a.boons.tt: "Ganha um $shroud_boon$ aleatĂłrio com foco em combate."
 shroud.3005.a.reply: "Nossas amarras se rompem.\n\nVorazes. Libertos.\n\nTerror!\n\nÂ§HALIMENTEM-SE.Â§!"
 shroud.3005.b: "Resistir Ă  fome. Acalmar a mente."
 shroud.3005.b.reply: "As correntes permanecem firmes. A voz fervilha de raiva enquanto filtramos sua influĂȘncia, acalmando a mente e retomando o controle.\n\nÂ§HFRACOS! INĂTEIS!Â§!\n\nA fome se esvai, deixando apenas o gosto amargo do ressentimento que se dissipa dentro do VĂ©u."
 shroud.3010.title: "Banquete Sacrificial"
 shroud.3010.desc: "Das profundezas do abismo, uma voz nos chama... retumbante, ĂĄspera e impregnada de malĂ­cia...\n\nÂ§HALIMENTE-SEM. CONSUMAM. DEVOREM.Â§!\n\nVisĂ”es irrompem em nossa mente. Mundos viram cinzas. Os lamentos de [Root.GetCitizenPlural] silenciam enquanto suas formas fĂ­sicas sĂŁo consumidas pela energia psiĂŽnica, saciando as vozes... e a nossa... fome.\n\nEnquanto essas visĂ”es surgem, sentimos outra presenĂ§a, nos incentivando a demonstrar autocontrole e solidariedade com [Root.GetCitizenPlural] semelhantes, encorajando o crescimento mĂștuo. Mas Ă© sufocada sob um grito ensurdecedor."
 shroud.3010.desc.organic: "Â§HOFEREĂAM-ME A CARNE DELES!Â§!"
 shroud.3010.desc.other: "Â§HOFEREĂAM-ME OS CORPOS DELES!Â§!"
 shroud.3010.a: "Consumir."
 shroud.3010.a.reply: "Os gritos dos devorados ecoam tanto pelo VĂ©u quanto pelo impĂ©rio, antes de cessarem abruptamente.\n\nCom esse sacrifĂ­cio, nosso poder cresce conforme a fome Ă© aplacada."
 shroud.3010.b: "Unir."
 shroud.3010.b.reply: "Silenciamos a voz e estendemos nossa consciĂȘncia em uniĂŁo pelo VĂ©u, envolvendo todo o impĂ©rio. Um suspiro coletivo de alĂ­vio e conforto abafa os gritos de fĂșria Ă  medida que a fome se dissipa."
 shroud.3015.title: "VisĂ”es TransitĂłrias"
 shroud.3015.desc: "Correntes intensas de energia psiĂŽnica colidem nas trevas ao redor. Sombras correm e desabam ao nosso redor... Uma luz cintilante pulsa adiante.\n\nPor um breve instante, uma visĂŁo se revela. Suas formas recuam antes que possamos compreendĂȘ-las.\n\nUma presenĂ§a estranha nos envolve.\n\nÂ§HO QUE VOCĂ VIU?Â§!"
 shroud.3015.a: "Vimos uma floresta, rica em formas de vida."
 shroud.3015.a.reply: "O silĂȘncio cresce. A voz retorna...\n\nÂ§HEXCELENTE.Â§!\n\nUm calor intenso arde dentro de nĂłs, depois se dissipa. A presenĂ§a se foi."
 shroud.3015.b: "Vimos uma terra devastada, privada de todos os seus recursos."
 shroud.3015.b.reply: "A voz retorna...\n\nÂ§HJAMAIS!Â§!\n\nUm frio glacial toma conta de nĂłs e, de repente, se dissipa. A presenĂ§a se foi."
 shroud.3015.c: "NĂŁo temos certeza."
 shroud.3015.c.reply: "A voz retorna...\n\nÂ§HQUE DESINTERESSANTE.Â§!\n\nUma sensaĂ§ĂŁo avassaladora de vazio nos consome, mas logo desaparece. A presenĂ§a se foi."
 shroud.3020.title: "ConservaĂ§ĂŁo Tentadora"
 shroud.3020.desc: "Das muitas camadas do VĂ©u, uma visĂŁo se revela.\n\nA nĂ©voa forma o contorno de uma criatura em agonia, sufocando enquanto tentĂĄculos turvos apertam cada vez mais sua forma.\n\nO animal, por si sĂł, Ă© diferente de tudo o que jĂĄ encontramos.\n\nUma voz ecoa dentro de nĂłs.\n\nÂ§HOS FIOS DO DESTINO CHAMAM! QUAL DELES VOCĂ IRĂ PUXAR?Â§!"
 shroud.3020.a: "Liberar a criatura."
