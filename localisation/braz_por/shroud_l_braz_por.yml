 shroud.6745.desc: "Â§HUm fluxo entre o sono e o despertar... Um caminho entre o aqui e o lĂĄ.\n\nVocĂȘs nĂŁo ouvem, suas mentes nĂŁo compreendem...Â§!"
 shroud.6750.desc: "Â§HEu quero ouvir cantos... Tudo estĂĄ tĂŁo quieto... Por quĂȘ?Â§!"
