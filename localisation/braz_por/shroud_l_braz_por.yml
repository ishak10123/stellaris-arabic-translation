 shroud.6120.name: "MissĂŁo Cancelada"
 shroud.6120.desc: "ApĂłs longos meses de silĂȘncio, recebemos uma transmissĂŁo de [exiled_envoy.GetName]. Apesar de a objetividade ser um de seus pontos fortes, o relato que recebemos Ă© desconexo e confuso, e continha descriĂ§Ă”es de imagens estranhas, aparentemente uma mistura de sonhos e delĂ­rio. Nenhum membro da equipe enviada conseguiu fornecer informaĂ§Ă”es mais coerentes.\n\nTodos foram afastados de suas funĂ§Ă”es, e a missĂŁo foi suspensa por tempo indeterminado. Seja o que for essa presenĂ§a em Â§H[This.System.GetName]Â§!, estĂĄ alĂ©m de nossa capacidade de investigaĂ§ĂŁo segura."
 fcsum_exiled_3: "ApĂłs uma missĂŁo traumĂĄtica, nossa equipe retornou para casa antes de estabelecer contato com Â§H[This.ContactCountry.GetName]Â§!."
 shroud.6125.desc: "Pairando sobre correntes revoltas. Â§H[Root.Capital.GetName]Â§!, ou...?\n\nÂ§H... chamando...Â§!\n\nA superfĂ­cie se retorce e se abre. Um miasma fĂ©tido irrompe das profundezas invisĂ­veis.\n\nÂ§H... resposta... nenhuma...Â§!\n\nIncessante. Sufocante.\n\nĂ terrĂ­vel."
