 shroud.6755.desc: "Â§HPosso mostrar... meus sonhos. A criaĂ§ĂŁo de mundos.Â§!"
 shroud.6755.a: "E como saber se podemos confiar em vocĂȘ?"
 shroud.6760.desc: "Â§HBasta ouvir. A canĂ§ĂŁo Ă© verdadeira porque Ă© bela. Uma bela verdade.\n\nMas suas mentes estĂŁo fechadas. Elas podem ser abertas.Â§!"
 shroud.6763.desc: "Â§HAinda estou lĂĄ... Eu ouĂ§o as canĂ§Ă”es de dois mundos. Este estĂĄ mudo.Â§!"
