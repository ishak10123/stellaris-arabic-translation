 shroud.8310.name: "$shroud.2750.name$"
 shroud.8310.desc: "Recebemos o chamado para nĂ­veis maiores de existĂȘncia. Aqueles entre nĂłs que se agarram Ă  resistĂȘncia infrutĂ­fera estĂŁo sendo expurgados para a preservaĂ§ĂŁo da santidade de nossa ascensĂŁo. Nosso destino estĂĄ selado; o caminho atrĂĄs de nĂłs desabou na sombra do $pc_shrouded$.\n\nA Â§RVozÂ§! fala conosco agora com claridade tentadora.\n\nÂ§R\"O CAMINHO ESTĂ TRAĂADO.\"Â§!\n\nEla clama por sacrifĂ­cios voluntĂĄrios."
