 shroud.12155.name: "Pura ConvicĂ§ĂŁo"
 shroud.12155.desc: "Â§HToda aĂ§ĂŁo tem consequĂȘncias. Conforme nossa matriz de comunicaĂ§Ă”es se inicia, $ouwron$ surge em uma torrente de fĂșria exaltada.Â§!\n\nHereges! Tolos! Enganadores! DeverĂ­amos ter suspeitado. DeverĂ­amos ter acabado com vocĂȘs quando suas essĂȘncias malditas ousaram pisar no Â§HVĂ©uÂ§!.\n\nVocĂȘs adiaram o inevitĂĄvel, a finalidade prevista! O que acham que essa afronta conquistarĂĄ? Tudo que vocĂȘs ganharam agora foi perdido.\n\nHĂĄ apenas um fim. EntĂŁo cantem... Cantem para o esquecimento!"
