 shroud.6790.desc: "Â§HMundos. Novos mundos, entre o meu e o seu.Â§!"
 shroud.6790.a: "Qual a utilidade desses mundos para nĂłs?"
 shroud.6795.desc: "Â§HDeixe-me cantar para eles. A mais radiante das canĂ§Ă”es.Â§!"
