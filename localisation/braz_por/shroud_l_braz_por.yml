 shroud.6300.desc: "Nossos cientistas concluĂ­ram o desenvolvimento da tecnologia avanĂ§ada de Â§H$tech_psionic_suppression$Â§!. Agora podemos replicar os efeitos da $building_ancient_ward_2$ em qualquer colĂŽnia sob nosso controle ao construir um $building_psionic_suppressor$.\n\nNo entanto, para conter a propagaĂ§ĂŁo de Â§H$PSIONIC_AURA_PLURAL$Â§! em outros sistemas, serĂĄ necessĂĄrio construir um dispositivo mais poderoso conhecido como Â§H$SHROUD_SEAL$Â§!.$shroud.shared_text_shroud_seal$\n\nEssa pesquisa tambĂ©m deu credibilidade a uma teoria perturbadora: parece que realmente existe um reino etĂ©reo conhecido como Â§HVĂ©uÂ§!; uma dimensĂŁo de energia psiĂŽnica descrita em antigos textos ocultistas. A teoria sugere que a atividade cognitiva de seres sencientes pode causar a transferĂȘncia de energia do VĂ©u para o plano observĂĄvel, originando as chamadas $PSIONIC_AURA_PLURAL$.\n\nIsso significa que nĂŁo estamos lidando apenas com forĂ§as objetivas do universo, mas possivelmente com aĂ§Ă”es calculadas cuja natureza e propĂłsito permanecem desconhecidos."
 shroud.6300.a: "EntĂŁo o Â§H\"VĂ©u\"Â§! realmente existe...?"
 shroud.6500.name: "TransmissĂŁo Inesperada"
 shroud.6500.desc: "Estamos recebendo uma transmissĂŁo inesperada originĂĄria de alĂ©m do sistema Â§H[exiled_system_border.GetName]Â§!. Inexplicavelmente, a lideranĂ§a de Â§H[exiled_country.GetName]Â§! adquiriu domĂ­nio total sobre nossa linguagem e sistemas de comunicaĂ§ĂŁo."
 shroud.shared_screen_figure: "Â§HA figura na tela se comunica com um ritmo constante e hipnĂłtico, pontuado por longas pausas.Â§!\n\nVizinhos distantes, diante da ausĂȘncia de resposta ao nosso contato, recorremos Ă  monotonia das comunicaĂ§Ă”es tĂ©cnicas primitivas.\n\nSou Â§HUk-Hogolath ScaratÂ§!, Psiarca de Â§H[exiled_country.GetName]Â§!. O assunto Ă© urgente, por isso peĂ§o perdĂŁo pela falta de formalidade."
 shroud.shared_auric_flow_inhibition: "estĂĄ inibindo o fluxo de nossa aura. Entendemos que essa situaĂ§ĂŁo intolerĂĄvel seja fruto de um erro ignorante de sua parte.\n\nA aura beneficia a todos. Ela deve iluminar toda a galĂĄxia. Para demonstrar seu compromisso com o bem maior, exigimos que desmontem imediatamente a tal estrutura chamada"
 shroud.6505.name: "$shroud.6500.name$"
