 ouwron: "Ouw'ron"
 ouwron_desc: "Exilado de seu clĂŁ nĂŽmade depois de testemunhar $end_of_the_cycle_article$, Ouw'ron vagou pelas estrelas em busca de seu favor. Agora, com $NAME_Reckoning$ no horizonte, ele arde com propĂłsito e nĂŁo aceitarĂĄ rejeiĂ§ĂŁo."
 ouwron_catch_phrase: "HaverĂĄ um JuĂ­zo Final..."
 shroud.12060.name: "$ouwron$"
 shroud.12060.desc_1: "Â§HUma enxurrada incompreensĂ­vel de sinais inunda nossa matriz de comunicaĂ§Ă”es. Em meio ao caos, uma Ășnica voz comeĂ§a a se destacar.Â§!\n\nAo menos vocĂȘs vieram. NĂŁo foram pontuais, mas tambĂ©m nĂŁo muito atrasados. NĂŁo temam, eu vejo alĂ©m das amarras desta prisĂŁo fĂ­sica que chamamos de realidade. A oferta foi feita. Meu caminho Ă© claro."
 shroud.12060.desc_blind: "\nÂ§HFoi entĂŁo que percebemos: assim como nĂłs, este ser abriu mĂŁo de sua visĂŁo para servir Ă  causa.Â§!"
 shroud.12060.desc_default: "\nÂ§HFoi entĂŁo que percebemos que seus globos oculares estavam vazios, hĂĄ muito abandonados.Â§!"
 shroud.12060.desc_2: "\nVamos lĂĄ, nĂŁo sejam tĂ­midos. Eu sei que vocĂȘs viram a simplicidade sublime d$end_of_the_cycle_color_article$. Unam-se a mim em comunhĂŁo, e juntos imporemos sua manifestaĂ§ĂŁo."
 shroud.12060.a: "HĂĄ quanto tempo sabe sobre $end_of_the_cycle_article$?"
 shroud.12060.a.response: "HĂĄ mais tempo do que estive consciente. Assim como com todas as mentes, o conhecimento jaz adormecido atĂ© que o Â§HVĂ©uÂ§! erga o manto. LĂĄ, seu intento puro se torna claro. Nosso propĂłsito Ă© simples: trazer o fim."
 shroud.12060.b: "Por que deseja nos ajudar?"
 shroud.12060.b.response: "VocĂȘs perguntam o que jĂĄ sabem. NĂłs vimos sua inevitabilidade. A revelaĂ§ĂŁo comeĂ§ou. NĂŁo hĂĄ outro caminho senĂŁo atravessĂĄ-lo. Juntos, seguimos em direĂ§ĂŁo Ă  conclusĂŁo."
 shroud.12060.c: "O que vocĂȘ nos oferece?"
 shroud.12060.c.response: "Eu sou apenas poeira neste ciclo moribundo, assim como todos nĂłs. O que eu posso realmente oferecer? Mentes se esvaem desta galĂĄxia, e eu tenho a funĂ§ĂŁo de guiĂĄ-las prontamente... e estendo essa misericĂłrdia a vocĂȘs."
 shroud.12060.hire_custom_tooltip: "Â§Y$ouwron$Â§! une-se ao nosso impĂ©rio como Â§HLĂ­derÂ§!."
