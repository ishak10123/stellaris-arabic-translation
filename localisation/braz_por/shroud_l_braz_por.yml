 shroud.4050.desc: "[This.GetMinorPatronCradleComposerIntro]\n\nEm meio a uma galeria de constructos sem vida, detectamos uma Â§H$code_name_animator$Â§!, cuja vontade molda energias densas em formas novas e curiosas.\n\nAo interrompermos sua atividade, a entidade se aproxima, dispersando a nĂ©voa opaca do VĂ©u. Ela oferece algo.\n\nO que acontecerĂĄ se aceitarmos?"
 shroud.4055.title: "$the_animator_of_clay_article_cap$ Emerge"
 shroud.4055.desc: "Assim que mergulhamos nossas mentes nas energias turbulentas do VĂ©u, nossos [GetSpeciesBodyPlural] convulsionaram inexplicavelmente. Sentimos a Â§H$code_name_animator$Â§! nos dominar por um breve momento. Ela nos impelia a observar.\n\nA penumbra carregada se dissipou, revelando uma silhueta que gesticulava. Seus membros eram puxados bruscamente para os lados por cordĂ”es vaporosos, atĂ© que, subitamente, as amarras se desfizeram. A figura desabou.\n\nLentamente, comeĂ§ou a se mover outra vez. Membro por membro, ergueu-se livre das antigas amarras, e retomou sua danĂ§a hipnĂłtica."
 shroud.4055.desc.know_animator: "Foi entĂŁo que percebemos. JĂĄ havĂ­amos encontrado esta entidade antes. $the_animator_of_clay_color_article_cap$ se deleitava. Onde quer que o inanimado ganhe consciĂȘncia, ou onde a matĂ©ria bruta recebe alma, ele tambĂ©m estarĂĄ presente."
 shroud.4055.a: "A marionete danĂ§a, livre de suas amarras."
 shroud.4060.desc: "[This.GetMinorPatronCradleComposerIntro]\n\nNĂŁo estamos sĂłs. Uma Â§H$code_name_outsider$Â§! invade nossas mentes, causando uma tempestade de energia psiĂŽnica ao nosso redor.\n\nUm profundo sentimento de arrependimento e anseio surge em nossa psique coletiva. Vemos imagens de sistemas estelares familiares, mas como eram milĂȘnios no passado.\n\nSeja o que for essa entidade, ela parece conhecer bem nossa galĂĄxia. SerĂĄ que ela jĂĄ esteve aqui?"
 shroud.4065.title: "$the_outsider_article_cap$ Emerge"
 shroud.4065.desc.intro: "A forĂ§a distante conhecida como Â§H$code_name_outsider$Â§! cauterizou nossas mentes com angĂșstia proveniente das profundezas do Â§HVĂ©uÂ§!. Ela nĂŁo se pronunciou, mas seu aviso foi inconfundĂ­vel:\n\nÂ§HCaminhem com cautela por estes reinos. VocĂȘs nĂŁo fazem ideia dos poderes que estĂŁo perturbando. A ruĂ­na estĂĄ a apenas um passo...Â§!"
 shroud.4065.desc.outro_default: "O que quer que isso signifique, agora conhecemos $the_outsider_color_article$. Resta descobrir como nossos destinos se cruzarĂŁo."
 shroud.4065.desc.outro_know_zroni: "Essa entidade jĂĄ Ă© conhecida em nossa galĂĄxia. Sua assinatura mental Ă© inconfundĂ­vel, pertence Ă  civilizaĂ§ĂŁo Zroni, que jĂĄ cruzou nosso caminho. Mas como isso Ă© possĂ­vel?\n\nO que quer que isso signifique, agora conhecemos $the_outsider_color_article$. Resta descobrir como nossos destinos se cruzarĂŁo."
 shroud.4065.desc.outro_left_zroni: "Reconhecemos essa entidade. Ă a Clarividente que encontramos alĂ©m da Â§HFenda AstralÂ§!. Seria esse o destino que lhe coube? Teria ela se tornado $the_outsider_color_article$?"
 shroud.4065.a.default: "Que horrores ela presenciou?"
 shroud.4065.a.know_zroni: "Os Zroni ainda vivem?"
 shroud.4065.a.left_zroni: "Que nĂŁo compartilhemos do mesmo destino."
 shroud.4070.desc: "[This.GetMinorPatronComposerEaterIntro]\n\nUma massa instĂĄvel de pensamentos circunda nossas mentes. Um peso abrasivo se espalha sobre nĂłs, distorcendo nossa percepĂ§ĂŁo do tempo. Cada grĂŁo de pensamento range contra a textura desse domĂ­nio recĂ©m-descoberto.\n\nQuando a sensaĂ§ĂŁo enfim cessa, o Â§H$code_name_tide$Â§! se dissipa, deixando impressĂ”es duradouras.\n\nEsses rastros permanecem diante de nĂłs, convidando-nos a seguir em frente."
 shroud.4075.title: "$the_endless_tide_article_cap$ Emerge"
 shroud.4075.desc: "O Â§H$code_name_tide$Â§! foi revelado das profundezas do Â§HVĂ©uÂ§!. Amorfa e vasta, sua presenĂ§a se estende alĂ©m de todos os limites da nossa percepĂ§ĂŁo.\n\nUm sussurro texturizado se derrama sobre nĂłs, desenterrando histĂłrias hĂĄ muito esquecidas. Vemos impĂ©rios passados, esmagados pelo curso inevitĂĄvel do tempo. Cada grĂŁo que nos toca carrega uma memĂłria.\n\nDentro deste arquivo infinito, padrĂ”es emergem: ciclos de ambiĂ§ĂŁo e ruĂ­na, triunfo e decadĂȘncia. HĂĄ sabedoria nessas profundezas.\n\n$the_endless_tide_color_article_cap$ se estende alĂ©m do tempo, corroendo a ignorĂąncia e deixando para trĂĄs apenas aquilo que se recusa a desaparecer."
 shroud.4075.a: "Essa sabedoria agora nos pertence."
 shroud.4080.desc: "[This.GetMinorPatronComposerEaterIntro]\n\nA gravidade de nossas prĂłprias aĂ§Ă”es nos arrasta mais fundo, seu peso nos conduzindo Ă  sombra opressiva de uma forma montanhosa.\n\nDo alto de seus picos cinzentos, um olhar implacĂĄvel perfura nossas mentes. Lutamos para compreender a escala da entidade diante de nĂłs, Â§H$code_name_mountain$Â§!.\n\nO cume mais alto nos chama, desafiando-nos a escalĂĄ-lo."
 shroud.4085.title: "$the_pale_mountain_article_cap$ Emerge"
 shroud.4085.desc: "Subimos pelas alturas vertiginosas do Â§HVĂ©uÂ§! atĂ© alcanĂ§armos o cume intangĂ­vel. Â§H$code_name_mountain$Â§! nos testava, como fez com todos os outros que vieram antes.\n\nUm mausolĂ©u colossal de impĂ©rios esquecidos entoa um coro ecoante de histĂłrias perdidas. Cada camada de fracasso e ambiĂ§ĂŁo equivocada foi incorporada Ă s fundaĂ§Ă”es do que estĂĄ por vir.\n\nTodavia, isto nĂŁo Ă© um tĂșmulo parado no tempo; Ă© um crisol. O ciclo de ruĂ­na e renovaĂ§ĂŁo reforja as falhas do passado nos alicerces de triunfos futuros. A destruiĂ§ĂŁo nĂŁo Ă© um fim, mas um novo comeĂ§o.\n\n$the_pale_mountain_color_article_cap$ ergue-se em nossas mentes."
 shroud.4085.a: "A montanha crescerĂĄ."
 shroud.4090.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\nUm peso suave acalma nossos pensamentos, mergulhando-nos em uma nĂ©voa morosa e prazerosa. TensĂ”es antes desconhecidas se dissolvem, substituĂ­das por uma calma luxuriante e insidiosa.\n\nQuanto mais nos entregamos a esse abraĂ§o dourado, mais prĂłximo chegamos do Â§H$code_name_dream$Â§!. Sua natureza avassaladora nos envolve, sussurrando promessas de um contentamento extravagante.\n\nSua indulgĂȘncia indolente Ă© curiosamente tentadora."
 shroud.4095.title: "$the_golden_dream_article_cap$ Emerge"
 shroud.4095.desc: "Enquanto nos acomodĂĄvamos em um bolsĂŁo de tranquilidade no Â§HVĂ©uÂ§!, fomos atraĂ­dos para os salĂ”es dourados do Â§H$code_name_dream$Â§!.\n\nTentaĂ§Ă”es aveludadas atravessavam nossas mentes, enquanto uma tapeĂ§aria esplendorosa se desenrolava diante de nĂłs. A negligĂȘncia indulgente ameaĂ§ava entorpecer nossos pensamentos diante de tanta opulĂȘncia.\n\n$the_golden_dream_color_article_cap$ nos brinda com luxos alĂ©m da imaginaĂ§ĂŁo."
 shroud.4095.a: "O sonho desperta."
 shroud.4100.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\nA turbulĂȘncia caĂłtica do VĂ©u se transforma em um vĂłrtice pulsante de energia psiĂŽnica. De repente, as correntes convergem e se alinham, pacificadas por uma forĂ§a invisĂ­vel. Tudo se aquieta e se transforma em novas formas plĂĄcidas.\n\nEnquanto observamos, sentimos a presenĂ§a de uma Â§H$code_name_point$Â§! orquestrando esses movimentos, convertendo o caos em harmonia.\n\nSua tranquilidade nos atrai."
 shroud.4105.title: "$the_hollow_point_article_cap$ Emerge"
 shroud.4105.desc: "Nossa equipe de [GetTelepathPlural] tentou entrar agressivamente na desordem turbulenta do VĂ©u, em vĂŁo. Apenas quando cessaram seus esforĂ§os, foram capazes de sentir o verdadeiro acolhimento da Â§H$code_name_point$Â§!.\n\nPassaram por nossas mentes visĂ”es de uma onda interminĂĄvel de conflitos, cada um repleto de distraĂ§Ă”es caĂłticas e furiosas.\n\nEm meio a esse turbilhĂŁo, sentimos a presenĂ§a vigilante e atemporal d$the_hollow_point_color_article$. Calmo e paciente, ele espera que a galĂĄxia enfim encontre a paz."
 shroud.4105.desc.outro_homicidal: "Apesar de nossos instintos mais primitivos, nossas mentes foram expostas a uma forma curiosa de pensar."
 shroud.4105.a.default: "A paciĂȘncia perdurarĂĄ alĂ©m da guerra."
 shroud.4105.a.homicidal: "Um sonho distante... Conhecemos o nosso verdadeiro propĂłsito."
 shroud.4110.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\nO barulho caĂłtico dĂĄ espaĂ§o a uma escuridĂŁo opressiva. Sentimos nossas intenĂ§Ă”es sendo analisadas e julgadas.\n\nA grande expectativa de ordem, inquestionĂĄvel e imutĂĄvel, penetra em nosso ser. Â§H$code_name_throne$Â§! avalia nossa vontade.\n\nApĂłs seu julgamento, a escuridĂŁo recua. O escrutĂ­nio infeccioso forĂ§a a nossa submissĂŁo."
 shroud.4115.title: "$the_vacant_throne_article_cap$ Emerge"
 shroud.4115.desc: "Ajoelhamo-nos diante d'Â§H$code_name_throne$Â§!.\n\nNossas mentes foram examinadas com a frieza indiferente de uma autoridade implacĂĄvel, imobilizando-nos sob seu julgamento.\n\nO vĂĄcuo opressor d$the_vacant_throne_color_article$ nĂŁo oferece misericĂłrdia nem sofrimento. Ele exige apenas ordem e certeza, impondo-as onde quer que estejam ausentes.\n\nEsse fardo agora Ă© parte de nĂłs."
 shroud.4115.a: "O julgamento Ă© constante."
 shroud.4120.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\nSomos tomados por uma sensaĂ§ĂŁo de aceleraĂ§ĂŁo repentina, e nossos sentidos sĂŁo sobrecarregados por um fluxo incompreensĂ­vel de informaĂ§Ă”es. Somos lanĂ§ados para fora em direĂ§ĂŁo a horizontes infinitos.\n\nUma entidade move-se em sincronia conosco. Essa Â§H$code_name_river$Â§! paira por um instante, atĂ© que sua velocidade a leva alĂ©m dos limites de nossa compreensĂŁo.\n\nPrecisamos segui-la."
 shroud.4125.title: "$the_black_river_article_cap$ Emerge"
 shroud.4125.desc: "Somente ao ultrapassarmos forĂ§osamente os limites seguros do Â§HVĂ©uÂ§! Ă© que conseguimos alcanĂ§ar a Â§H$code_name_river$Â§!.\n\nFomos tomados por uma sensaĂ§ĂŁo de movimento em todas as direĂ§Ă”es, com uma velocidade absurda que desafia qualquer compreensĂŁo lĂłgica. Ficamos com a impressĂŁo de ter percorrido uma imensa distĂąncia em apenas um instante.\n\nFinalmente compreendemos $the_black_river_color_article$ e sua jornada incessante. A vastidĂŁo da galĂĄxia Ă© um caminho livre a ser trilhado."
 shroud.4125.a: "A mais pura forma da velocidade."
 shroud.4135.title: "$end_of_the_cycle_article_cap$"
 shroud.4135.desc: "Sem nenhum aviso, somos tragados pelo VĂ©u. Uma presenĂ§a ameaĂ§adora invade nossas mentes.\n\nĂ $end_of_the_cycle_color_article$, e ele sempre esteve Ă  nossa espera. Nossa equipe de [GetTelepathPlural], ainda em transe, profere em perfeito unĂ­ssono: Â§R\"AINDA NĂO Ă A SUA HORA.\"Â§! Uma pausa. Â§R\"MAS PODERIA SER.Â§!\n\nNada mais Ă© dito, mas uma barganha foi oferecida, sabemos disso. Poder, conhecimento e riquezas alĂ©m da imaginaĂ§ĂŁo estĂŁo ao nosso alcance.\n\nÂ§RSĂł precisamos trazer o Fim.Â§!"
 shroud.4135.a: "$utopia.3308.a$"
 shroud.4135.a.tt: "Substitui os domĂ­nios de todas as entidades patronais pelo$end_of_the_cycle_color_article$.\nNĂłs teremos ao menos 50 anos para consumir a galĂĄxia com a Â§H$end_aura$Â§!. Se conseguirmos, o jogo terminarĂĄ.\n$covenant.cycle.tooltip$$shroud.8450.a.tech_tooltip$\n$shroud.4135.psionic_components_insight$\n\nReverte todos os Acordos de todos os outros Patronos\n$eotc_opinion_modifier_tooltip$"
 shroud.4135.b: "Sair do VĂ©u e tentar esquecer."
