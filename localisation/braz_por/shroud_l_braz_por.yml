 shroud.3045.title: "GrĂąnulo Luminoso"
 shroud.3045.desc: "A nĂ©voa se reorganiza diante de nĂłs. Energias incandescentes pulsam com um vigor repentino. O contorno de uma entidade arbĂłrea desconhecida toma forma.\n\nSua imensa copa cintila conforme avanĂ§amos, alternando tons de pĂșrpura, rosa e preto.\n\nAcolhido em sua base hĂĄ um grĂąnulo luminoso, vibrando em sincronia com as cores mutĂĄveis da copa.\n\nUma voz se instala em nossas [GetMindLoc].\n\nÂ§HAPROXIME-SE. DOMINE. EXPLORE.Â§!"
 shroud.3045.a: "Extrair o grĂąnulo."
