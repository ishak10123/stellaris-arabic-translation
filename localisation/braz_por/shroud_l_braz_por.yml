 shroud.shared_combating_the_shroud: "A partir de hoje, o comando de Â§H[mindwarden_enclave_country.GetName]Â§! continuarĂĄ o trabalho vital de combate ao Â§HVĂ©uÂ§! e a todas as formas de transgressĂŁo psiĂŽnica.\n\nSe necessĂĄrio, temos plena capacidade de prestar serviĂ§os antipsiĂŽnicos, desde o descarte de Â§H$zro_lower$Â§! atĂ© recrutamento militar, com rapidez e eficiĂȘncia."
 shroud.4210.desc: "O Â§HVĂ©uÂ§! pode ser descrito como uma dimensĂŁo de realidade que existe alĂ©m da percepĂ§ĂŁo comum. Ă composto inteiramente de energia Â§H\"psiĂŽnica\"Â§! hostil. Ainda que invisĂ­vel para muitos, permeia toda a nossa galĂĄxia fĂ­sica.\n\nAs energias do VĂ©u podem se manifestar no plano fĂ­sico por meio da atividade cognitiva de seres sencientes. Essas forĂ§as sĂŁo extremamente perigosas e imprevisĂ­veis.\n\nPara garantir a seguranĂ§a da populaĂ§ĂŁo, sĂŁo necessĂĄrias medidas de proteĂ§ĂŁo contra o VĂ©u. E com isso, estamos prontos para ajudar."
