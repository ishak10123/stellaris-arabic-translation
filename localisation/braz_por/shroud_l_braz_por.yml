 shroud.3025.title: "Paisagens em MutaĂ§ĂŁo"
 shroud.3025.desc: "As nĂ©voas do VĂ©u se desfazem, revelando visĂ”es que se entrelaĂ§am sem fim.\n\nPaisagens obscuras se contorcem de maneira incompreensĂ­vel diante de nĂłs. Montanhas surgem e desmoronam. Oceanos ferventes de caos evaporam, deixando para trĂĄs os ossos esbranquiĂ§ados de seres aquĂĄticos espalhados por desertos interminĂĄveis.\n\nSob as copas das florestas, criaturas dĂłceis percorrem seus habitats atĂ© comeĂ§arem a convulsionar, se transformando em monstruosidades sedentas por sangue. Elas se destroem em um ciclo eterno de morte e renascimento.\n\nEm meio ao caos, uma voz atravessa nossas [GetMindLoc].\n\nÂ§HTAMANHA DESORDEM. EMARANHADA EM SI MESMA.Â§!"
 shroud.3025.a: "Submeter a natureza Ă  nossa vontade."
 shroud.3025.a.reply: "Estendemos a mĂŁo, agarrando o caos diante de nĂłs.\n\nFixamos marcos, forĂ§ando continentes a se assentarem.\n\nConforme as peĂ§as se encaixam, a voz ecoa.\n\nÂ§HUNIFORMIDADE, MONOTONIA, VAZIO...Â§!"
 shroud.3025.b: "Permitir que a desordem da natureza floresĂ§a."
 shroud.3025.b.reply: "Deixamos as visĂ”es continuarem. Um ciclo eterno que se embaralha antes de explodir e cessar tĂŁo rapidamente quanto comeĂ§ou.\n\nEnergias percorrem a vastidĂŁo infinita, antes de tomar novas formas.\n\nA voz ecoa.\n\nÂ§HCONFLITO PACĂFICO. UNIDADE CAĂTICA.Â§!"
