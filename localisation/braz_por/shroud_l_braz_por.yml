 shroud.4205.desc: "$shroud.4205.common$\n\nNossa missĂŁo Ă© defender a galĂĄxia da ameaĂ§a do Â§HVĂ©uÂ§! e todos aqueles que disseminam seus efeitos nocivos. Acreditamos em mentes livres de invasĂ”es e em uma galĂĄxia protegida contra as forĂ§as psiĂŽnicas.\n\nSegundo nossas leituras psiĂŽnicas, vocĂȘ nĂŁo contribui com essas ameaĂ§as. Excelente. SerĂĄ um prazer auxiliĂĄ-los contra qualquer um que contribua.\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.end: "Se precisar de serviĂ§os militares antipsiĂŽnicos ou desejar descartar Â§H$zro_lower$Â§!, estamos Ă  disposiĂ§ĂŁo para ajudar."
 shroud.4205.desc.return: "Boas-vindas novamente. Nossa colaboraĂ§ĂŁo contĂ­nua Ă© apreciada por [event_target:mindwarden_enclave_country.GetName].\n\nNossas leituras psiĂŽnicas sĂŁo claras. O Â§HVĂ©uÂ§! ainda nĂŁo maculou vocĂȘ. Ătimo, Ăłtimo...\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.eotc: "Estes sĂŁo tempos difĂ­ceis. Apesar de nossos esforĂ§os, $end_of_the_cycle_color_article$ estĂĄ sobre nĂłs. Sua manifestaĂ§ĂŁo terrĂ­vel nos persegue pelas estrelas...\n\n$shroud.4205.desc.eotc.end$"
