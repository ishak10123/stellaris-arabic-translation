 shroud.2810.desc: "Â§HNova conexĂŁo. Corrente invertida.\n\nEsta distorĂ§ĂŁo de energia... apenas um fragmento. Os outros tambĂ©m podem fortalecĂȘ-los. Aprofundem-se para compreender suas vontades.\n\nSou uma sombra do par. A carne antecede o metal. Ela chama...Â§!\n\n$the_animator_of_clay_article_cap$ sinaliza outra presenĂ§a... $shroud.first_contact_insert.composer$ nas profundezas do VĂ©u."
