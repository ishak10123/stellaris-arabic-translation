 shroud.8480.title: "$GALACTIC_FOCUS$ Revogadas"
 shroud.8480.desc: "A resoluĂ§ĂŁo que designa o emissor da Â§H$PSIONIC_AURA$Â§! destrutiva como um foco para esforĂ§os de defesa foi recusada pelo Senado GalĂĄctico. Como resultado, todas as operaĂ§Ă”es militares em curso sendo conduzidas por membros da Comunidade contra Â§H[former_malevolent_aura.GetName]Â§! devem cessar imediatamente. Por enquanto, a paz voltou para este canto da galĂĄxia."
 shroud.8481.desc: "O Senado GalĂĄctico revogou a resoluĂ§ĂŁo que nos declarava um alvo para seus esforĂ§os defensivos e, portanto, todos os membros da Comunidade receberam ordens para cessar os ataques. As aĂ§Ă”es militares contra nĂłs foram interrompidas... por enquanto."
