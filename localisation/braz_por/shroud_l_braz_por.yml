 shroud.8460.desc: "O poder d$end_of_the_cycle_color_article$ vem com um grande custo e estamos ficando sem tempo.\n\nA galĂĄxia permanece intocada pela Aura purificadora de nosso patrono. Nossos esforĂ§os atĂ© agora foram insignificantes.\n\nPara podermos concluir essa obra monumental, uma onda de energia renovada flui entre nĂłs, enviada de alĂ©m do manto. Ă uma bĂȘnĂ§ĂŁo anunciada!"
