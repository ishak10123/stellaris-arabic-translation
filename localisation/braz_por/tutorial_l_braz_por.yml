 tutorial.1.name: "Tutorial: Mapa da Galáxia"
 tutorial.1.desc: "O §HMapa da Galáxia§! apresenta uma visão estratégica das estrelas. Use-o para navegar, expandir, comandar frotas e monitorar fronteiras.\n\nPara abrir o §SMapa da Galáxia§!:\n\n£dot_green£ Clique no ícone da §HGaláxia§! na parte inferior da tela ou pressione §HM§!\n\n\n$tttt$$tt$£galaxy_view£\n\n"
 tutorial.2.name: "Tutorial: Sistema Inspecionado"
 tutorial.2.desc: "Muito bem!\n\nA primeira inspeção de um £system£ §SSistema Estelar§! além do nosso foi concluída.\n\nAgora temos acesso a dados planetários com os quais os astrônomos em nosso mundo natal só podiam sonhar há apenas uma geração.\n\nPara continuar inspecionando:\n\n£dot_green£ Selecione uma £science_ship£ §SNave Científica§!\n£dot_green£ Clique com o botão direito em um §SSistema§!\n£dot_green£ vizinho Selecione §SInspecionar Sistema§!\n\nÉ preciso inspecionar um §SSistema§! antes de reivindicá-lo."
 tutorial.3.name: "Tutorial: Tecnologias"
 tutorial.3.desc: "Pesquisar novas tecnologias será essencial para o nosso sucesso. Digo isso não apenas como fruto do progresso tecnológico sem restrições, mas como fiel confidente e, desconfio, sua única amizade de verdade.\n\nUma tecnologia importante que devemos pesquisar o quanto antes é o §SProtocolo de Novos Mundos§!. Ele nos dará acesso a £colony_ship£ §SNaves de Colonização§!, o que nos permitirá estabelecer presença em outros £planet£ §SPlanetas§!."
 tutorial.4.name: "Tutorial: Inspeção"
 tutorial.4.desc: "Antes que possamos expandir, precisamos explorar, e nossas £science_ship£ §SNaves Científicas§! são perfeitas para a tarefa.\n\nÉ possível identificar uma §SNave Científica§! pelo seguinte símbolo:\n\n$tttt$$tt$£science_ship_map£\n\n\nHá duas formas de selecionar uma nave: pelo §SMapa da Galáxia§! ou no §SResumo§!.\n\n£dot_green£ Selecione uma §SNave Científica§!\n£dot_green£ Clique com o botão direito em um £system£ §SSistema§! próximo\n£dot_green£ Selecione §SInspecionar Sistema§!\n\nÉ preciso inspecionar um §SSistema§! antes de reivindicá-lo."
 tutorial.5.name: "Retomar"
 tutorial.5.desc: "Agora que demos um comando para nossas £science_ship£ §SNaves Científicas§!, é hora de zarpar. Mas primeiro precisamos retomar a simulação do §SMapa da Galáxia§! antes que algo aconteça.\n\nPara §Sretomar§! o jogo:\n\n£dot_green£ Pressione a §SBarra de Espaço§! ou o ícone de §SRetomar§! na barra superior\n\n$tttt$$t$£pause_button£\n"
 tutorial.6.name: "Tutorial: Tecnologia Pesquisada"
 tutorial.6.desc: "Excelente trabalho! A tecnologia que acabamos de pesquisar certamente nos beneficiará. Não se esqueça de designar novas tarefas de pesquisa aos nossos £scientist£ §SCientistas§!."
 tutorial.7.name: "Tutorial: Nave de Construção"
 tutorial.7.desc: "Os recursos gerados por nosso mundo natal só podem nos levar até certo ponto. Nossa indústria precisa expandir para o espaço sideral, e isso requer uma £construction_ship£ §SNave de Construção§!.\n\nDevemos [GetBuildGrow] uma assim que acumularmos £alloys£ §SLigas Metálicas§! suficientes para isso."
 tutorial.8.name: "Tutorial: Nave de Construção Finalizada"
 tutorial.8.desc: "Bom trabalho! Nossa £construction_ship£ §SNave de Construção§! está operacional, equipada com uma tripulação experiente que inclui alguns dos melhores engenheiros disponíveis em nossa nação."
 tutorial.9.name: "Tutorial: Estação de Mineração"
 tutorial.9.desc: "Os recursos gerados por nosso mundo natal só podem nos levar até certo ponto. Felizmente, nossa £science_ship£ §SNave Científica§! encontrou um depósito de recursos em outro mundo!\n\nChegou a hora de usar nossa £construction_ship£ §SNave de Construção§! para [GetBuildGrow] uma £mining_station£ §SEstação de Mineração§!.\n\n§SEstações de Mineração§! podem ser construídas dentro de nossas fronteiras e coletar automaticamente £minerals£ §SMinerais§!, £energy£ §SCréditos Energéticos§! e £strategic_resource£ §SRecursos Estratégicos§!.\n\nCom a §SNave de Construção§! selecionada:\n\n£dot_green£ Clique com o botão direito em um £system£ §SSistema§! reivindicado\n£dot_green£ Selecione §S[GetBuildGrowCap] Estações de Mineração§!\n\n§SEstações de Mineração§! têm um custo de manutenção de §SCréditos Energéticos§! associado."
 tutorial.10.name: "Tutorial: Renda da Estação de Mineração"
 tutorial.10.desc: "Muito bem. A nova £mining_station£ §SEstação de Mineração§! está operacional e já começou a extrair recursos para processamento.\n\nA renda proveniente de várias estações é somada à renda total do império, que pode ser visualizada na barra superior. Ao passar o cursor sobre os diferentes recursos, você verá um detalhamento das fontes de renda."
 tutorial.11.name: "Tutorial: Estação de Pesquisa"
 tutorial.11.desc: "Mundos inspecionados às vezes possuem propriedades únicas que os tornam valiosos para pesquisa. Esses recursos de £physics£ §SFísica§!, £society£ §SSociedade§! ou £engineering£ §SEngenharia§! podem ser coletados por uma £science_ship£ §SEstação de Pesquisa§!. Minha programação me aconselha enfaticamente a orientar você a construir uma.\n\nLembre-se de que §SEstações de Pesquisa§! só podem ser construídas dentro de nossas fronteiras, e têm um custo de manutenção de £energy£ §SCréditos Energéticos§!."
 tutorial.12.name: "Tutorial: Estação de Pesquisa Construída"
 tutorial.12.desc: "Nossa nova £science_ship£ §SEstação de Pesquisa§! está funcionando, e a equipe científica já iniciou seus trabalhos. Quais segredos eles desvendarão? Que mistérios proibidos da Criação serão revelados?"
 tutorial.13.name: "Tutorial: Planetas"
 tutorial.13.desc: "£planet£ §SPlanetas§! Habitáveis são divididos em £district£ §SDistritos§!, §SZonas§! e £building£ §SConstruções§!.\n\n£dot_green£ §SDistritos§! podem conter várias §SZonas§!\n£dot_green£ §S Zonas§! determinam quais £job£ §SEmpregos§! são criados\n£dot_green£ §SConstruções§! concedem bônus às §SZonas§!\n\nConforme as zonas são aprimoradas, mais espaços de §SConstrução§! são liberados.\n\nExistem duas formas de ver um planeta:\nNo §SMapa da Galáxia§! ou no §SResumo§!.\n\n£dot_green£ Selecione um §SPlaneta§!\n£dot_green£ Clique nas abas desejadas"
 tutorial.14.name: "Tutorial: Priorizar Construção"
 tutorial.14.desc: "Excelente. Nossa nova §SConstrução Planetária§! foi concluída, e agora começará a produzir recursos.\n\n£pops£ §SPops§! serão designados automaticamente a qualquer £job£ §SEmprego§! gerado pelas £building£ §SConstruções§! conforme a população cresce, mas eles também podem ser incentivados a mudar de emprego.\n\nComo priorizar uma §SConstrução§!:\n\n£dot_green£ Selecione o £planet£ §SPlaneta§! no §SResumo§!\n£dot_green£ Clique na aba §SEconomia§!\n£dot_green£ Clique em uma §SConstrução§!"
 tutorial.15.name: "Tutorial: Bloqueadores Planetários"
 tutorial.15.desc: "£planet£ §SPlanetas§! Habitáveis podem ter £blocker£ §SBloqueadores§! que previnem sua exploração total. Remover um §SBloqueador§! leva tempo e custa £energy£ §SCréditos Energéticos§!, mas pode liberar §SRecursos Planetários§! que estejam bloqueados, além de disponibilizar espaço de construção adicional.\n\nComo remover um §SBloqueador§!:\n\n£dot_green£ Selecione um planeta no §SResumo§!\n£dot_green£ Clique na aba §SGerenciamento§!\n£dot_green£ Clique no botão §SRemoção de Bloqueador§! no próprio bloqueador\n\n\n$tttt$$tt$£clear_blocker£\n\n\nAlém de recursos, a remoção de alguns §SBloqueadores§! exige §STecnologias§! específicas."
 tutorial.16.name: "Tutorial: Bloqueador Removido"
 tutorial.16.desc: "Muito bem!\n\nA remoção do £blocker£ §SBloqueador§! foi um sucesso.\n\nPasse o cursor sobre os §SBloqueadores§! remanescentes para ver qual §SRecurso Planetário§! será liberado quando eles forem removidos.\n\nQuaisquer §SBloqueadores§! remanescentes devem ser removidos assim que você juntar os recursos necessários, permitindo que este £planet£ §SPlaneta§! alcance todo o seu potencial."
 tutorial.17.name: "Tutorial: Inspecionar sistemas"
 tutorial.17.desc: "Devemos continuar com nossos esforços de exploração. Recomendo enviar uma £science_ship£ §SNave Científica§! para inspecionar os £system£ §SSistemas Estelares§! vizinhos. Vamos audaciosamente aonde nenhuma inteligência sintética jamais esteve!"
 tutorial.19.name: "Tutorial: Sistemas Inspecionados"
 tutorial.19.desc: "Ótimo trabalho! As estrelas vizinhas ao nosso £system£ §SSistema Natal§! foram totalmente exploradas. Devemos usar nossa £construction_ship£ §SNave de Construção§! para coletar quaisquer recursos encontrados [GetBuildingGrowing] Estações de £mining_station£ §SMineração§! e £science_ship£ §SPesquisa§!.\n\nVocê pode identificar uma §SNave de Construção§! por este símbolo:\n\n$tttt$$tt$£construction_ship_map£"
 tutorial.20.name: "Tutorial: [GetBuildGrowCap] Nave Científica"
 tutorial.20.desc: "Devemos considerar [GetBuildGrow] uma segunda £science_ship£ §SNave Científica§!. Isso dobrará a velocidade com a qual podemos inspecionar nossa vizinhança galáctica!\n\nComo [GetBuildGrow] uma §SNave§!:\n\n£dot_green£ Selecione uma §SBase Estelar§!\n£dot_green£ Clique na aba §SEstaleiro§!\n£dot_green£ Clique em §SNave Científica§!\n\nQuando for concluída, a §SNave§! recém-construída aparecerá próxima à §SBase Estelar§!."
 tutorial.21.name: "Tutorial: Automação de Inspeção"
 tutorial.21.desc: "O dobro de £science_ship£ §SNaves Científicas§! significa diversão em dobro! Ah, não fico tão contente assim desde que completamos a última tarefa!\n\nExplorar com várias naves pode levar muito tempo.\n\nPara automatizar a inspeção, selecione a §SNave Científica§! e clique no botão §SAutomação de Nave Científica§! na interface da frota.\n\n\n$tttt$$tt$£science_ship_automate_exploration£\n\n"
 tutorial.22.name: "Tutorial: Recrutar Cientista"
 tutorial.22.desc: "Temos uma £science_ship£ §SNave Científica§! novinha, mas nenhum £scientist£ §SCientista§! foi designado para comandá-la. Minha programação insiste que eu devo ressaltar os benefícios de adicionar um ingrediente §SCientista§! orgânico à mistura.\n\nCom a §SNave Científica selecionada§!:\n\n£dot_green£ Clique no retrato vazio na interface da frota\n£dot_green£ Escolha um §SCientista§!\n\nSe não tivermos os recursos para recrutar um novo §SCientista§!, sempre poderemos redesignar um de outro departamento, mesmo não sendo a opção ideal."
 tutorial.23.name: "Tutorial: Cientista Recrutado"
 tutorial.23.desc: "Ótimo. O £scientist£ §SCientista§! assumiu o comando de nossa £science_ship£ §SNave Científica§!, e agora pode ser enviado quando quisermos para explorar novos £system£ §SSistemas§! e/ou encontrar um destino terrível.\n\nCaso deseje trocar o §SCientista§!, basta selecionar o retrato mais uma vez na interface da frota."
 tutorial.24.name: "Tutorial: [GetBuildGrowCap] Nave Colonial"
 tutorial.24.desc: "Agora estamos prontos para expandir nossa grandiosa civilização para um segundo mundo. Para isso, será necessária a construção de uma £colony_ship£ §SNave Colonial§!.\n\nComo [GetBuildGrow] uma §SNave§!:\n\n£dot_green£ Selecione uma §SBase Estelar§!\n£dot_green£ Clique na aba §SEstaleiro§!\n£dot_green£ Clique em §SNave Colonial§!\n\nQuando for concluída, a §SNave§! recém-construída aparecerá próxima à §SBase Estelar§!."
 tutorial.25.name: "Tutorial: Colonizar Planeta"
 tutorial.25.desc: "Os colonizadores foram transferidos para a nova £colony_ship£ §SNave Colonial§!, e seu capitão informa que todos os sistemas estão operacionais. Um dia memorável, sem dúvida!\n\nExistem diferentes formas de estabelecer uma £colony£ §SColônia§!.\n\nPara §SColonizar§! um £planet£ §SPlaneta§! no §SMapa da Galáxia§!:\n\n£dot_green£ Clique em um §SPlaneta§! colonizável\n£dot_green£ Clique no botão §SColonizar§!.\n\n$tttt$$ttt$£colonizable£\n\nApós o desembarque dos colonizadores, levará alguns anos até que a colônia esteja totalmente estabelecida."
 tutorial.26.name: "Tutorial: Estabelecer uma Colônia"
 tutorial.26.desc: "Temos uma £colony_ship£ §SNave Colonial§!, e já encontramos pelo menos um possível local para um entreposto extrassolar permanente. Não vejo motivo para mais atrasos, vamos estabelecer nossa primeira £colony£ §SColônia§!!"
 tutorial.27.name: "Tutorial: Colônia Estabelecida"
 tutorial.27.desc: "Nossa primeira £colony£ §SColônia§! extrassolar! Isso significa que se nosso mundo natal entrasse em combustão espontânea, nossa espécie não seria mais extinta. Um pensamento reconfortante, não acha?"
 tutorial.28.name: "Tutorial: Recrutar Governador"
 tutorial.28.desc: "Para ajudar no desenvolvimento da nova £colony£ §SColônia§!, devemos considerar a nomeação de um §SGovernador Planetário§! para supervisionar as operações locais.\n\nGovernadores podem trazer diversos efeitos aos £planet£ §SPlanetas§! que administram, a maioria positivos. Esses efeitos são determinados pelas características e nível de habilidade do Governador."
 tutorial.29.name: "Tutorial: Governador Recrutado"
 tutorial.29.desc: "Nossa £colony£ §SColônia§! agora é administrada por um novo §SGovernador§!. Isso deve aumentar a sua eficiência!"
 tutorial.30.name: "Tutorial: Mais colônias"
 tutorial.30.desc: "Assim que tivermos os recursos necessários, seria uma boa ideia [GetBuildGrow] mais £colony_ship£ §SNaves Coloniais§! e expandir as fronteiras de nosso império para mais longe. Devemos trabalhar para estabelecer pelo menos mais três £colony£ §SColônias§! além do nosso mundo natal e a que já colonizamos."
 tutorial.32.name: "Tutorial: Colônias Estabelecidas"
 tutorial.32.desc: "Brilhante trabalho! Muito inspirador. Nossa poderosa civilização agora está presente em cinco mundos! Devemos continuar expandindo conforme a oportunidade permitir."
 tutorial.33.name: "Tutorial: Produção de Recursos"
 tutorial.33.desc: "Um suprimento sadio de £minerals£ §SMinerais§!, £alloys£ §SLigas Metálicas§! e £energy£ §SCréditos Energéticos§! é essencial para o bem-estar de qualquer potência interestelar. Devemos tomar medidas para aumentar nossa produção desses recursos.\n\nEstações e £building£ §SConstruções§! custam Ligas Metálicas ou Minerais para serem construídas e Créditos Energéticos para serem mantidas. Isso também se aplica às §SNaves§!, mas elas possuem também um custo de manutenção de Ligas Metálicas. Esses recursos são produzidos por £mining_station£ §SEstações de Mineração§! ou §SConstruções Planetárias§!.\n\nNo futuro, você poderá descobrir novos e interessantes recursos para investir em produções mais exóticas."
 tutorial.38.name: "Produção de Recursos obtida"
 tutorial.38.desc: "Excelente trabalho. Agora temos uma base de recursos sólida sobre a qual construiremos nosso império."
 tutorial.39.name: "Tutorial: Aumentar a Frota"
 tutorial.39.desc: "Não posso deixar de notar que nossa marinha está um pouco enfraquecida. Certamente enfrentaremos muitas ameaças na galáxia que precisarão de alguma forma de resposta militar. Lembre-se, a sobrevivência de nossa civilização está em jogo!"
 tutorial.43.name: "Tamanho da Marinha aumentado"
 tutorial.43.desc: "Bom! Agora temos uma frota espacial pequena, mas capaz, que deve nos servir bem caso haja algum encontro hostil inesperado."
 tutorial.44.name: "Tutorial: Estabelecer Setor"
 tutorial.44.desc: "Nosso império crescente atingiu um tamanho que torna difícil sua administração direta a partir do mundo natal. Devemos estabelecer um novo §SSetor§!.\n\nSetores são áreas dentro do império que podem ser configuradas para gerenciar, de forma autônoma, os assuntos cotidianos dos £planet£ §SPlanetas§! sob sua jurisdição."
 tutorial.45.name: "Tutorial: Setor Estabelecido"
 tutorial.45.desc: "Conforme nosso império cresce, novas £colony£ §SColônias§! podem ser organizadas em §SSetores§!. Setores podem ser configurados na tela §SPlanetas e Setores§! para que possam, de forma autônoma, construir e aprimorar £district£ §SDistritos§! e £building£ §SConstruções§! usando reservas designadas de recursos."
 tutorial.46.name: "Tutorial: Governador do Setor"
 tutorial.46.desc: "§SGovernadores§! podem ser designados para administrar §SSetores§! inteiros. Todos os £planet£ §SPlanetas§! dentro do setor receberão os benefícios das habilidades do Governador. Devemos designar um para o nosso novo setor."
 tutorial.47.name: "Tutorial: Governador Designado"
 tutorial.47.desc: "Nosso novo §SSector Governador§! tomou posse no planeta capital do setor. Muito bem."
 tutorial.48.name: "Tutorial: Projeto de naves"
 tutorial.48.desc: "Temos a possibilidade de projetar manualmente novas §SNaves§! na tela §SCriador de Naves§!. Esse é um processo bem direto, apesar de poder ser totalmente automatizado se assim desejarmos.\n\nPara acessar o §SCriador de Naves§!:\n\n£dot_green£ Clique no botão §SGerenciamento de Frota§! na barra à esquerda ou pressione §SF9§!\n\n$tttt$$tt$£fleet_management£\n"
 tutorial.49.name: "Tutorial: Aprimorar Naves"
 tutorial.49.desc: "Bom trabalho. O projeto da nave foi adicionado ao nosso banco de dados, e agora pode ser produzido por uma §SBase Estelar§! que esteja equipada com um §SEstaleiro§!.\n\nO novo projeto pode ser editado a qualquer momento no §SCriador de Naves§!. Se houver alguma mudança no projeto, as §SNaves§! já construídas precisarão ser aprimoradas em uma §SBase Estelar§!.\n\nPara aprimorar uma §SNave§!:\n\n£dot_green£ Selecione a §SNave§! no §SResumo§!\n£dot_green£ Clique no botão §SAprimorar§! na interface da frota\n\n$tttt$$tt$£upgrade_ship£\n"
 tutorial.52.desc: "A anomalia em [From.GetName] acabou sendo uma §Yformação geométrica§! natural. Ela quase se parece com um marcador, mostrando o caminho adiante. A beleza natural do mundo pode ser bem impressionante.\n\n$tutorial.52.filler.desc$"
 tutorial.52.spirit.desc: "Encontramos uma §YFormação Natural§! em [From.GetName], com uma perfeição geométrica inacreditável. Isso certamente é um §YSinal Divino§!, marcando o nosso caminho rumo às estrelas\n\n$tutorial.52.filler.desc$"
 tutorial.52.filler.desc: "Devemos §Ycontinuar a investigar§! esses tipos de anomalias sempre que pudermos. Isso certamente nos dará §Ynovos conhecimentos e tecnologias§!."
 tutorial.52.a: "Incrível!"
 tutorial.52.spirit.a: "Louvado seja o divino!"
 tutorial.53.desc: "A anomalia que detectamos em [From.GetName] revelou algo incrível. O [From.GetPlanetMoon] é cercado por um §Yrastro de dobra§!, sem dúvida produzido por motores MRQL. Não somos capazes de rastreá-la até a sua origem, já que ela foi gerada há muito tempo.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophobe.desc: "Detectamos um rastro MRQL fraco perto de [From.GetName]. É muito antigo, tornado-o impossível de rastrear. Isso significa que outros viajantes interestelares já estiveram aqui, nos observando, certamente coletando inteligência.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophile.desc: "A anomalia em [From.GetName] revela vestígios de outros viajantes interestelares! Um rastro fraco de viagem MRQL indica que alguém esteve aqui há muito tempo, talvez observando nosso £planet£ §SPlaneta§! em busca de possíveis aliados. No entanto, o sinal está muito fraco para continuarmos o rastreamento.\n\n$tutorial.52.filler.desc$"
 tutorial.53.a: "Fomos observados, mas por quê?"
 tutorial.53.xenophobe.a: "Temos que tomar cuidado com a ameaça xeno."
 tutorial.53.xenophile.a: "Vamos encontrá-los"
 tutorial.54.desc: "Encontramos uma de nossas §Yantigas sondas§! em [From.GetName]. De alguma forma, ela permaneceu intacta ao longo desses anos e ainda tenta enviar dados para nosso mundo natal. Um verdadeiro símbolo de nossas dificuldades passadas e da nossa ambição de ultrapassar os limites do nosso §SPlaneta§!.\n\n$tutorial.52.filler.desc$"
 tutorial.54.a: "Estamos sempre indo à frente."
 tutorial.54.spiritualist.a: "O divino certamente possui mais para nós."
 tutorial.54.materialist.a: "Nossos esforços finalmente foram recompensados."
 tutorial.55.name: "Tutorial: Recursos estratégicos"
 tutorial.55.desc: "Descobrimos um §SRecurso Estratégico§!! Muitos £strategic_resource£ §SRecursos Estratégicos§! precisam de tecnologias específicas para serem explorados, mas concedem bônus poderosos.\n\nPara explorar um §SRecurso Estratégico§!:\n\n£dot_green£ Selecione uma £construction_ship£ §SNave de Construção§!\n£dot_green£ Clique com o botão direito no £system£ §SSistema§! onde o recurso está localizado\n£dot_green£ Selecione §S[GetBuildGrowCap] £mining_station£ Estações de Mineração§!\n\n§SRecursos Estratégicos§! podem ser usados para criar £building£ §SConstruções§! e componentes de naves avançados ou simplesmente vendidos."
 tutorial.55.poi.name: "Tutorial: Localização de Recurso"
 tutorial.55.poi.desc: "Nós descobrimos um recurso estratégico no [From.GetPlanetMoon] [From.GetName]."
 tutorial.56.name: "Tutorial: Recurso Extraído"
 tutorial.56.desc: "Excelente trabalho. Este recurso certamente trará grandes riquezas à nossa nação."
 tutorial.56.poi.desc: "Nós descobrimos um recurso estratégico no [StrategicResourcePlanet.GetPlanetMoon] [StrategicResourcePlanet.GetName]."
 tutorial.560.desc: "Com uma tecnologia desenvolvida recentemente, uma £mining_station£ §SEstação de Mineração§! já existente agora pode extrair um §SRecurso Estratégico§!. Esses recursos raros conferem bônus poderosos e são bens comerciais valiosos. Dois avianos metafóricos, abatidos por um único projétil imaginário.\n\nMais informações podem ser encontradas no §SRegistro de Situações§! por um período limitado. Ainda há muitos £strategic_resource£ §SRecursos Estratégicos§! para descobrir na galáxia, então continue pesquisando!"
 tutorial.57.name: "Tutorial: Elevar"
 tutorial.57.desc.notech: "Descobrimos formas de vida animal altamente evoluídas! Com a §STecnologia§! certa, talvez possamos futuramente §SElevar§! esses seres à sapiência e inteligência, ou ao que pode ser considerado inteligência entre os orgânicos.\n\nSeria prudente acompanhar nossa pesquisa e direcioná-la para §SGatilhos Epigenéticos§!, se a oportunidade surgir."
 tutorial.57.desc.yestech: "Descobrimos formas de vida animal altamente evoluídas! Com a §STecnologia§! certa, talvez possamos futuramente §HElevar§! esses seres a um estado de sapiência e inteligência, ou ao que pode ser considerado inteligência entre os orgânicos.\n\nAh.\n\nA tecnologia §SGatilhos Epigenéticos§! parece ser ideal para isso, e estamos prontos para levar essas criaturas a um novo mundo repleto de angústias existenciais."
 tutorial.58.name: "Tutorial: Pré-Sapientes Elevados"
 tutorial.58.desc: "Um tremendo sucesso! As feras inferiores foram elevadas para se tornarem feras menos inferiores, e agora são cidadãos orgulhosos de nosso crescente império."
 tutorial.59.name: "Tutorial: Primeiro Contato"
 tutorial.59.desc: "Extraordinário! Descobrimos §Sentidades alienígenas espaciais§! que podem ou não ser inteligentes, mas, vamos admitir, provavelmente são. Sua verdadeira natureza continuará sendo um mistério até que o projeto seja concluído adequadamente para §SInvestigá-las§!. Sugiro que isso seja feito imediatamente, antes que decidam nos investigar primeiro...\n\nPara investigar um §SPrimeiro Contato§!:\n\n£dot_green£ Abra o §SRegistro de Situações§!\n£dot_green£ Clique em §S$SHOW_FIRST_CONTACT$§!\n\n$tttt$$ttt$£firstcontact£\n\nTambém é possível iniciar um §SPrimeiro Contato§! clicando no ícone no §SMapa da Galáxia§!"
 #tutorial.60.name: "First Contact Made"
 #tutorial.60.desc: "A triumph. We have established communications with alien beings. What a time to be alive, or in my case, powered on."
 tutorial.61.name: "Tutorial: Espécies Pré-Sapientes"
 tutorial.61.desc: "Nossas tentativas de estabelecer comunicações são um testemunho da nossa engenhosidade tecnológica, mas os resultados têm sido insatisfatórios. Talvez a outra parte possua apenas um nível de inteligência animal, §Sse é que possuem algum§!.\n\n§SPré-sapientes§! oferecem pouca ou nenhuma interação diplomática, mas dependendo do tipo de império, podem ser elevados, exterminados, escravizados ou apenas observados."
 tutorial.63.name: "Tutorial: Recebendo Transmissões"
 tutorial.63.desc: "Parece que a §Soutra parte§! roubou completamente a cena, §Sestabelecendo contato§! conosco antes que conseguíssemos decifrar seus protocolos de comunicação.\n\nAinda devemos tentar completar este feito por conta própria, quando houver uma próxima oportunidade."
 tutorial.64.name: "Tutorial: Modificar Espécies"
 tutorial.64.desc: "Graças a avanços recentes em genética, obtivemos um §SPonto de Característica§! adicional que pode ser usado para §SModificar§! e aprimorar nosso povo.\n\nPara modificar uma §SEspécie§!:\n\n£dot_green£ Selecione a aba §SEspécie§! ou pressione §SF6§!\n£dot_green£ Clique no botão §SModificar§!\n£dot_green£ Pesquise o §SProjeto Especial§!"
 tutorial.65.name: "Tutorial: Espécie Modificada"
 tutorial.65.desc: "Louvável. Tendo retirado o jugo da evolução natural dos seus ombros, nosso povo certamente prosperará no espaço."
 tutorial.70.name: "Tutorial: Propulsão de Dobra Espacial"
 tutorial.70.desc: "Para superar as grandes distâncias que separam £system£ §SSistemas Estelares§!, nossos £scientist£ §SCientistas§! desenvolveram o §SPropulsor de Dobra§!. §SNaves§! equipadas com esse dispositivo podem viajar entre os sistemas em velocidades que excedem a velocidade da luz.\n\nApesar de §SNaves§! poderem viajar para qualquer sistema dentro do alcance, o propulsor de dobra só pode ser ativado fora do poço gravitacional de uma estrela. §SNaves§! que saem da dobra também precisam de tempo para restabelecer a energia de seus sistemas, e a duração do processo depende da distância percorrida pela §SNave§!."
 tutorial.71.name: "Tutorial: Viagem pelo Hiperespaço"
 tutorial.71.desc: "Para superar as grandes distâncias que separam £system£ §SSistemas Estelares§!, nossos £scientist£ §SCientistas§! desenvolveram a §SHiperpropulsão§!. Esse dispositivo permite a viagem em velocidades muito além da velocidade da luz entre sistemas conectados por hiperestradas.\n\nA viagem em uma hiperestrada é quase instantânea, mas o movimento é restrito à rede de hiperestradas galáctica.\n\nPara entrar no hiperespaço, uma §SNave§! deve primeiro alcançar o limite do um sistema, além poço gravitacional da estrela.\n\nIsso acontece automaticamente quando mandamos uma §SNave§! se mover para outro §SSistema§!."
 tutorial.72.name: "Tutorial: Viagem por buraco de minhoca"
 tutorial.72.desc: "Para superar as grandes distâncias que separam os £system£ §SSistemas Estelares§!, nossos £scientist£ §SCientistas§! desenvolveram a tecnologia de §SBuraco de Minhoca§!. Estações equipadas com geradores de buracos de minhoca podem perfurar o subespaço, criando portais temporários para outros sistemas que podem ser utilizados por §SNaves§!.\n\nÉ uma viagem quase instantânea, mas exige a presença de uma Estação de Buraco de Minhoca dentro do alcance. As §SNaves§! também precisam estar equipadas com estabilizadores de buraco de minhoca especiais para suportar a travessia pelo subespaço."
 tutorial.73.name: "Lembrança de Tutorial: Elevar"
 tutorial.73.desc: "Com a tecnologia apropriada pesquisada, agora temos os meios para §YElevar§! seres inferiores à sapiência.\n\nPara elevar uma §SEspécie§!:\n\n£dot_green£ Abra o £planet£ §SPlaneta§! dos §SPré-Sapientes§!\n£dot_green£ Clique na aba §SGerenciamento§!\n£dot_green£ Selecione a §SEspécie§!\n£dot_green£ Clique em §SDefinir Direitos§!\n£dot_green£ Clique em §SElevar§!\n\nA espécie iniciará o processo de elevação, adquirindo plena sapiência ao final."
 tutorial.75.name: "Tutorial: Reivindicação de Sistema"
 tutorial.75.desc: "Agora que começamos a explorar nossas estrelas vizinhas, talvez seja a hora de aumentar nosso alcance.\n\nUma §SBase Estelar§! pode ser construída ao redor de estrelas em £system£ §SSistemas§! inspecionados para expandir nossas fronteiras, nos permitindo reivindicar novas regiões do espaço.\n\nCom tecnologias futuras, as Bases Estelares podem ser aprimoradas para produzir §SNaves§! ou outros recursos.\n\nComo reivindicar um §SSistema§!:\n\n£dot_green£ Selecione uma £construction_ship£ §SNave de Construção§!\n£dot_green£ Clique com o botão direito em um §SSistema§! inspecionado\n£dot_green£ Selecione §S[GetBuildGrowCap] Base Estelar§!"
 tutorial.76.name: "Tutorial: Aprimoramento de Bases Estelares"
 tutorial.76.desc: "Excelente. Como pode ver no §SMapa da Galáxia§!, as fronteiras de nosso império foram expandidas para incluir o £system£ §SSistema§! onde construímos nossa nova §SBase Estelar§!.\n\nUma §SBase Estelar§! recém-construída funciona como um Entreposto, com capacidades defensivas limitadas, e sem espaço para §SMódulos§! e £building£ §SConstruções§!. Sendo assim, ela não aparece no Resumo até ser aprimorada.\n\nComo aprimorar uma §SBase Estelar§!:\n\n£dot_green£ Clique no sistema no §SMapa da Galáxia§!\n£dot_green£ Selecione a §SBase Estelar§!\n£dot_green£ Clique no botão §SAprimorar§!"
 tutorial.80.name: "Tutorial: Modos de Mapa"
 tutorial.80.desc: "No Mapa da Galáxia, podemos ativar e desativar §SModos de Mapa§! diferentes, localizados no canto inferior direito, para exibir várias camadas de informação. Por exemplo, podemos colorir os territórios de acordo com a opinião que seus donos possuem sobre nós."
 tutorial.100.name: "Tutorial Desabilitado"
 tutorial.100.desc: "§HMissões Tutoriais§! e §HDicas§! estão desabilitadas."
 tutorial.101.name: "Somente Dicas"
 tutorial.101.desc: "§HDicas§! estão habilitadas, §HMissões de Tutoriais§! estão desabilitadas."
 tutorial.102.name: "Tutorial Completo"
 tutorial.102.desc: "§HMissões de Tutorial§! e §HDicas§! estão habilitadas."
 tutorial.1337.name: "Tutorial: Artefatos Menores"
 tutorial.1337.desc: "Descobrimos alguns £minor_artifacts£ §SArtefatos Menores§!. Eles são um recurso esotérico, um termo abrangente para itens estranhos que não compreendemos e que de fato podem ser inexplicáveis.\n\nEles podem ser usados para a tomada de diversas decisões.\n\nComo interagir com §SArtefatos Menores§!:\n\n£dot_green£ Clique no botão §S$topbar_button_discoveries_name$§! na barra à esquerda\n£dot_green£ Selecione a aba §SColeção§! ou pressione §SC§!\n\n$tttt$$tt$£discoveries£\n"
 tutorial.1340.name: "Tutorial: $astral_threads$"
 tutorial.1340.desc: "Descobrimos algumas £astral_threads£ §SFibras Astrais§!. Elas são filamentos de espaço-tempo condensado, resultantes da colisão de planos dimensionais. Normalmente, elas só podem ser obtidas de §SCicatrizes Astrais§! ou coletadas em £astral_rift£ §SFendas Astrais§!.\n\nPara realizar diversas §SAções Astrais§!:\n\n£dot_green£ Clique no botão §S$topbar_button_discoveries_name$§! na barra à esquerda\n£dot_green£ Selecione a aba §SFibras Astrais§!\n\n$tttt$$tt$£discoveries£\n\nVocê poderá liberar mais ações se explorar §SFendas Astrais§!, que podem surgir de §SCicatrizes Astrais§! ou de eventos anômalos."
 tutorial.2000.name: "Conduzindo o Primeiro Contato"
 tutorial.2000.desc: "Algumas missões de §SPrimeiro Contato§! apresentarão opções sobre como desejamos conduzir os assuntos. Essas escolhas podem impactar nossas relações diplomáticas com outros impérios por um longo período."
 tutorial.2006.name: "Tutorial: Diplomacia"
 tutorial.2006.desc: "Os protocolos de comunicação foram estabelecidos. Agora podemos praticar §SDiplomacia§! com este império. A opinião atual deles sobre nós depende de como o §SPrimeiro Contato§! foi conduzido.\n\nPara praticar §SDiplomacia§!:\n\n£dot_green£Clique no botão §SContatos§! na barra à esquerda ou pressione §SF10§!\n\n$tttt$$tt$£contacts£\n\n Durante o Primeiro Contato, também adquirimos Inteligência. À medida que acumulamos mais Inteligência sobre um império, mais detalhes sobre eles ficam disponíveis."
 tutorial.2007.name: "$tutorial.2006.name$"
 tutorial.2007.desc: "Estabelecemos o §SPrimeiro Contato§! com um tipo diferente de civilização – uma que geralmente se recusa a praticar §SDiplomacia§! com as demais.\n\nAs ações diplomáticas que podemos tomar com civilizações como essa são limitadas, no entanto elas podem decidir entrar em contato conosco ocasionalmente."
 tutorial.2010.name: "Tutorial: Designando Ativos"
 tutorial.2010.desc: "§SAtivos§! são agentes e artefatos valiosos que fornecem efeitos diferentes para nossas atividades de Espionagem. Eles trabalham dentro da Rede Espiã e podem ser designados para Operações, onde podem abrir novas oportunidades ou nos ajudar a ficar fora de problemas.\n\nPodemos receber Ativos através de eventos, ou ao realizar a Operação §S$operation_acquire_asset$§! ."
 tutorial.2100.name: "Tutorial: Diplomacia com Enclave"
 tutorial.2100.abbr.desc: "Fizemos o §SPrimeiro Contato§! com um §SEnclave§!. Este é um tipo de império menor e independente que pode negociar com impérios maiores, como o nosso, usando formas únicas de Diplomacia."
 tutorial.2100.full.desc: "$tutorial.2100.abbr.desc$\n\nEnclaves oferecem uma grande variedade de serviços, desde a realização de pesquisas científicas até a venda de informações, construções de bases estelares ou mesmo §SNaves§!. Comprar serviços como esses aumentará a §SOpinião§! do Enclave em relação a nós."
 tutorial.2105.name: "Tutorial: $tutorial.2100.name$"
 tutorial.2105.abbr.desc: "Encontramos um §SEnclave de Mercenários§!. Esses especialistas militares independentes podem emprestar §SFrotas Mercenárias§! para impérios, inclusive para o nosso (por uma taxa)."
 tutorial.2105.full.desc: "$tutorial.2105.abbr.desc$\n\nSe decidirmos contratar uma Frota Mercenária, vamos ter o controle dela por um tempo determinado. Durante esse tempo, o Enclave vai tentar reforçar a frota quando necessário, mas nem uma Frota Mercenária, nem o Almirante dela podem ser integrados em nossas próprias frotas."
 tutorial.2111.name: "Tutorial: Enclave de Mercenários"
 tutorial.2111.abbr.desc: "§Y[tutorial_mercenary_fleet.GetName]§! agora é capaz de se tornar um §SEnclave de Mercenários§!, se assim quisermos. A frota deixaria de estar sob nosso controle direto e viraria uma força independente e capaz de emprestar §SFrotas Mercenárias§! para impérios, incluindo o nosso."
 tutorial.2111.full.desc: "$tutorial.2111.abbr.desc$\n\nEnquanto dividirmos o espaço com o Enclave de Mercenários, nós vamos receber §Srenda§! sempre que ele emprestar uma Frota Mercenária para outros impérios. Se quisermos contratar a Frota Mercenária para nós mesmos, teremos o controle dela por um tempo determinado. Os impérios poderão pagar a mais para comprar um contrato existente se a Frota Mercenária não estiver disponível no momento."
 tutorial.2115.name: "Tutorial: Megaestruturas"
 tutorial.2115.desc: "£megastructure£ §SMegaestruturas§! são projetos colossais que podemos [GetBuildGrow] no espaço. Com elas, podemos ter instalações de pesquisa avançadas, acesso a recursos superiores ou até mesmo formas únicas de transporte.\n\nConstruir nessa escala exige um investimento significativo de tempo e recursos, mas as recompensas são igualmente significativas. Podemos começar atribuindo uma £construction_ship£ §SNave de Construção§! para a tarefa."
 tutorial.2120.name: "Tutorial: $tech_orbital_ring_tier_1$"
 tutorial.2120.desc: "Graças aos nossos recentes avanços na pesquisa sobre megaengenharia, podemos construir §SAnéis Orbitais§! ao redor de £planet£ §SPlanetas§! habitáveis. Podemos começar a construção dando ordens para uma £construction_ship£ §SNave de Construção§!."
 tutorial.2121.name: "$tutorial.2120.name$"
 tutorial.2121.desc: "§SAnéis Orbitais§! são £megastructure£ §SMegaestruturas§! colossais construídas para circundar completamente um £planet£ §SPlaneta§!. Eles funcionam como uma ponte eficiente entre o espaço e a superfície do planeta, oferecendo espaço para instalações como estaleiros, estruturas defensivas e hubs de recursos.\n\nNa tela Anel Orbital, podemos adicionar ou remover £building£ §SConstruções§! e §SMódulos§!, além de aumentar o nível do Anel Orbital. Cada nível desbloqueia novos espaços de construção, mas há um limite de níveis determinado pela infraestrutura planetária."
 tutorial.2125.name: "Tutorial: $tech_quantum_catapult$"
 tutorial.2125.desc: "Com os avanços recentes na pesquisa sobre megaengenharia, nós agora podemos construir uma §SCatapulta Quântica§! ao redor de um §Spulsar§! ou de uma §Sestrela de nêutrons§!. Nós podemos começar a construção dando ordens para uma £construction_ship£ §SNave de Construção§!."
 tutorial.2126.name: "Tutorial: $tutorial.2125.name$"
 tutorial.2126.desc: "A §SCatapulta Quântica§! lança §SNaves§! e frotas por vastas distâncias interestelares. Esta tecnologia aprimora significativamente nossa capacidade de reagir a situações inesperadas dentro do império e em regiões próximas do espaço.\n\nO uso da Catapulta Quântica envolve certos riscos, pois as frotas podem chegar a £system£ §SSistemas§! diferentes do alvo pretendido. Podemos reduzir esses riscos e melhorar aspectos como rendimento e alcance máximo ao aprimorar a Catapulta Quântica para níveis superiores."
 tutorial.2130.name: "Tutorial: $tech_hyper_relays$"
 tutorial.2130.desc: "Nossa pesquisa sobre megaengenharia rendeu resultados na forma de §SHipervetores§!. Podemos começar a formar uma rede de Hipervetores dando ordens para uma £construction_ship£ §SNave de Construção§!."
 tutorial.2131.name: "Tutorial: $tutorial.2130.name$"
 tutorial.2131.desc: "§SHipervetores§! permitem viagens mais eficientes entre £system£ §SSistemas Estelares§! adjacentes. Ao conectar §Spelo menos dois§! Hipervetores, podemos estabelecer uma rede que reduzirá drasticamente os tempos de locomoção em nosso império.\n\nHipervetores também podem ser construídos adjacentes uns aos outros através de fronteiras abertas, ligando redes inteiras. Isso permitirá que as §SNaves§! se desloquem rapidamente entre impérios vizinhos."
 tutorial.2140.name: "Tutorial: Postos de Observação"
 tutorial.2140.desc: "Detectamos uma §Ssociedade pré-MRQL§!! Embora ela não possua a tecnologia que nos permite cruzar as estrelas, ainda há muito a ganhar com os alienígenas que a compõem. Cabe a nós decidirmos se vamos aprender com a sua cultura ou escravizá-los.\n\nSe quisermos observá-los (caso estejam dentro de nossas fronteiras), precisaremos construir um §SPosto de Observação§! ao redor do mundo deles.\n\nSe quisermos invadi-los, basta reunir nossos exércitos. Eles não têm muita chance contra nós."
 tutorial.2145.name: "Tutorial: Posto de Observação Construído"
 tutorial.2145.desc.nodlc: "Nosso novo §SPosto de Observação§! foi ativado e dará continuidade à sua §SMissão§! enquanto a £awareness£ §SConscientização§! do objeto de nosso estudo permanecer baixa.\n\nQuando uma sociedade pré-MRQL chega ao máximo de conscientização, ela não pode mais ser observada. Em vez disso, poderemos iniciar §SAções Diplomáticas§! com ela. Podemos optar por nos revelarmos antecipadamente se nossas §SPolíticas de Interferência§! permitirem."
 tutorial.2145.desc.dlc: "Nosso novo §SPosto de Observação§! foi ativado e dará continuidade à sua §SMissão§! enquanto a £awareness£ §SConscientização§! do objeto de nosso estudo permanecer baixa.\n\nVamos obter §SConhecimentos por Observação§!, uma linha exclusiva de tecnologia, desse entreposto até a sociedade pré-MRQL atingir o máximo de conscientização, quando as missões serão desativadas. No lugar delas, poderemos iniciar §SAções Diplomáticas§!.\n\nPodemos optar por nos revelarmos antecipadamente se nossas §SPolíticas de Interferência§! permitirem."
 tutorial.2150.name: "Tutorial: $tutorial.2006.name$"
 tutorial.2150.desc: "A civilização pré-MRQL tomou conhecimento da nossa existência. Agora, podemos praticar §SDiplomacia§! limitada com a liderança do §SPlaneta§!, dependendo da nossa postura §SPolítica§!.\n\nComo a nossa presença foi revelada, não ganharemos mais nada ao observar esta civilização. Nossas §SMissões de Observação§! foram desativadas."
 tutorial.2500.name: "Tutorial: Campos de Camuflagem"
 tutorial.2500.desc: "Avanços recentes na pesquisa de Manipulação de Campo resultaram na invenção de §S$science_cloaking_components$§!. Esses componentes, de alto consumo energético, projetam campos de partículas modificados que permitem que nossas naves científicas e militares escapem dos sensores convencionais.\n\nNo entanto, os campos de camuflagem impactarão negativamente a §S$MOD_SHIP_BASE_SPEED_MULT$§!, §S$MOD_SHIP_WINDUP_MULT$§! e §S$MOD_SHIP_SHIELD_HP_ADD$§! enquanto estiverem ativos.\n\nNaves §SCamufladas§! que permanecerem não detectadas podem ignorar §SFronteiras Fechadas§!.\nAlém disso, £science_ship£ §SNaves Científicas§! §SCamufladas§! poderão realizar §SReconhecimento Ativo§! em £colony£ §SColônias§! estrangeiras, aumentando a Inteligência obtida sobre outros impérios."
 tutorial.2550.name: "Tutorial: Detecção de Camuflagem"
 tutorial.2550.desc: "Avanços recentes na pesquisa de Computação resultaram na invenção das §S$sm_detection_array_plural$§!. A instalação desses sensores externos de alta potência em nossas §SBases Estelares§! permitirá detectar frotas §SCamufladas§!.\n\nA sensibilidade das §S$sm_detection_array_plural$§! pode ser ampliada pela instalação de múltiplas unidades em conjunto, o que aumenta a capacidade de penetrar §SCampos de Camuflagem§! mais estáveis.\n\nCom pesquisas adicionais, poderemos usar £science_ship£ §SNaves Científicas§! para impulsionar ainda mais a capacidade de detecção. O alcance desses dispositivos é limitado pelo §SAlcance de Sensores§! da Base Estelar."
 #############################
 #Tutorial Event Chains
 #############################
 tutorial_survey_system_chain_title: "Tutorial: Ativar o Mapa da Galáxia"
 tutorial_survey_system_chain_desc: "Antes de podermos explorar as estrelas, precisamos ampliar nossa visão. Felizmente, temos um §SMapa da Galáxia§! sofisticado à nossa disposição. Para acessar o Mapa da Galáxia, pressione a tecla §SM§! ou clique no botão Galáxia na parte inferior da tela. Depois, é possível fechar o Registro de Situações pressionando §SEsc§! ou clicando no botão na parte superior direita."
 map_toggled: "Mapa da Galáxia ativado"
 tutorial_survey_system_tooltip: "§STutorial: Ativar o Mapa da Galáxia§! adicionado ao Registro de Situações"
 tutorial_1_chain_title: "Tutorial: Inspecionar Sistema"
 tutorial_1_chain_desc: "Para começar, selecione a nossa £science_ship£ §SNave Científica§!. Para fazer isso, clique na §SNave§! no §HMapa da Galáxia§! ou selecione-a no §SResumo§!.\n\nNo §SMapa da Galáxia§!, clique no botão §SInspecionar§! na interface da frota no canto inferior esquerdo. Depois, selecione um £system£ §SSistema§! não inspecionado. Também é possível clicar com o botão direito em um sistema não inspecionado e selecionar §SInspecionar Sistema§!.\n\nNossa §SNave Científica§! fará um trajeto para inspecionar todos os corpos planetários dentro do sistema."
 tutorial_unpause_chain_tooltip: "§STutorial: Retomar§! adicionado ao Registro de Situações"
 tutorial_unpause_chain_title: "Tutorial: Retomar"
 tutorial_unpause_chain_desc: "Com uma £science_ship£ §SNave Científica§! pronta para explorar a galáxia, resta apenas retomar o jogo. Para fazer isso, pressione a £space£ §SBarra de Espaço§! ou selecione o seguinte ícone na barra superior:\n\n$tttt$$tttt$$t$£pause_button£\n"
 unpaused_game: "Simulação Retomada"
 system_surveyed: "Sistemas Vizinhos Inspecionados"
 tutorial_1_tooltip: "§STutorial: Inspecionar Sistema§! adicionado ao Registro de situações"
 tutorial_2_chain_title: "Tutorial: Pesquisa de Tecnologia"
 tutorial_2_chain_desc: "Precisamos pesquisar novas tecnologias. O §SProtocolo de Novos Mundos§! permitirá a construção de £colony_ship£ §SNaves Coloniais§!, e deveremos priorizar isso o quanto antes se quisermos expandir nosso império.\n\nPara acessar a tela de §STecnologias§!, clique no botão na seção esquerda da barra superior ou pressione §SF4§!. Em seguida, clique em §SSelecionar Pesquisa§! e escolha uma tecnologia para pesquisar dentre as opções disponíveis."
 tech_1_researched: "Protocolo de Novos Mundos pesquisado"
 tech_2_researched: "Construção Extramundo pesquisada"
 tutorial_2_tooltip: "§STutorial: Pesquisa de Tecnologia§! adicionado ao Registro de Situações"
 tutorial_3_chain_title: "Tutorial: [GetBuildGrowCap] Nave de Construção"
 tutorial_3_chain_desc: "Precisaremos de uma £construction_ship£ §SNave de Construção§! para explorar os recursos descobertos pela nossa £science_ship£ §SNave Científica§!.\n\nClique em nossa Base Estelar, selecione a aba §SEstaleiro§! e escolha §SNave de Construção§! dentre as opções disponíveis.\n\nLembre-se de que você precisará ter £alloys£ §SLigas Metálicas§! suficientes para custear a §SNave§! antes de sua construção começar."
 construction_ship_built: "Nave de Construção pronta"
 tutorial_3_tooltip: "§STutorial: [GetBuildGrowCap] Nave de Construção§! adicionado ao Registro de Situações"
 tutorial_4_chain_title: "Tutorial: [GetBuildGrowCap] Estação de Mineração"
 tutorial_4_chain_desc: "Antes que um depósito de £minerals£ §SMinerais§! ou um §SRecurso Estratégico§! possa ser coletado de um £planet£ §SPlaneta§!, uma £mining_station£ §SEstação de Mineração§! precisa ser colocada em órbita. Para fazer isso, selecione sua £construction_ship£ §SNave de Construção§! clicando diretamente nela ou encontrando-a no §SResumo§! ao lado direito da tela.\n\nAssim que isso tiver sido feito, clique no botão §S[GetBuildGrowCap] Estação de Mineração§! na interface da frota da Nave de Construção. Em seguida, clique em um planeta ou asteroide disponível que possua um depósito de Minerais.\n\nRepare que uma £mining_station£ §SEstação de Mineração§! também custa £minerals£ §SMinerais§!, então você precisará de uma quantidade suficiente armazenada antes de iniciar a construção."
 mining_station_built: "Estação de Mineração pronta"
 tutorial_4_tooltip: "§STutorial: [GetBuildGrowCap] Estação de Mineração§! adicionado ao Registro de Situações"
 tutorial_5_chain_title: "Tutorial: [GetBuildGrowCap] Estação de Pesquisa"
 tutorial_5_chain_desc: "Para aumentar o ritmo com o qual pesquisamos novas tecnologias, £science_ship£ §SEstações de Pesquisa§! devem ser construídas acima de qualquer mundo que possua recursos de £physics£ §SFísica§!, £society£ §SSociedade§! ou £engineering£ §SEngenharia§!.\n\nEstações de Pesquisa funcionam da mesma forma que £mining_station£ §SEstações de Mineração§! – a única diferença é o recurso que elas coletam. Elas não são capazes de extrair £minerals£ §SMinerais§! ou £strategic_resource£ §SRecursos Estratégicos§!.\n\nPara construir uma Estação de Pesquisa, selecione sua £construction_ship£ §SNave de Construção§! e clique em §S[GetBuildGrowCap] Estação de Pesquisa§! na interface da frota. Em seguida, clique em um £planet£ §SPlaneta§!, asteroide ou sol disponível que possua um depósito de recursos de Física, Sociedade ou Engenharia."
 research_station_built: "Estação de Pesquisa pronta"
 tutorial_5_tooltip: "§STutorial: [GetBuildGrowCap] Estações de Pesquisa§! adicionado ao Registro de Situações"
 tutorial_6_chain_title: "Tutorial: Construções Planetárias"
 tutorial_6_chain_desc: "Nosso mundo natal já tem algumas £building£ §SConstruções§!, mas deveríamos construir mais uma.\n\nPara fazer isso, selecione o mundo natal no §SResumo§! e clique na aba §SSuperfície§!. Selecione um espaço de construção vazio em uma zona e escolha uma das construções disponíveis. Se tivermos §SRecursos§! suficientes, a construção começará imediatamente.\n\nConstruções proporcionam £job£ §SEmpregos§!, mas nada será produzido se não houver £pops£ §SPops§! designados para trabalhar lá. Na aba §SEconomia§!, é possível conferir em quais empregos seus §SPops§! estão atuando."
 building_constructed: "Construções prontas"
 tutorial_6_tooltip: "§STutorial: Planetário Prédios§! adicionado ao registro de situações"
 tutorial_7_chain_title: "Tutorial: Remoção de Bloqueador"
 tutorial_7_chain_desc: "Vários £blocker£ §SBloqueadores§! em nosso mundo natal estão impedindo a construção de mais §SDistritos§! e, portanto, devem ser removidos. Isso leva tempo e custa §SRecursos§!.\n\nPara remover um §SBloqueador§!, clique no botão §SRemoção de Bloqueador§! no próprio bloqueador, encontrado na aba §SGerenciamento§!.\n\n\n$tttt$$tttt$$tt$£clear_blocker£\n\n\nA remoção dos §SBloqueadores§! tem diferentes custos, exigências de tecnologia e tempos de execução."
 blockers_cleared: "Bloqueadores Removidos"
 tutorial_7_tooltip: "§STutorial: Bloqueadores de Recurso§! adicionado ao registro de situações"
 tutorial_8_chain_title: "Tutorial: Inspecionar sistemas"
 tutorial_8_chain_desc: "Precisamos expandir nossa influência além do nosso £system£ §SSistema§! natal, e o primeiro passo é explorar os sistemas estelares vizinhos.\n\nPara fazer isso, selecione sua £science_ship£ §SNave Científica§! e clique no botão §SInspecionar§! na interface da frota. Em seguida, clique no botão §SAbrir Mapa da Galáxia§! na parte inferior da tela e escolha uma das estrelas vizinhas ao nosso sistema. A §SNave Científica§! viajará até esse sistema estelar e inspecionará todos os corpos celestes nele."
 tutorial_8_poi: "Inspecionar alvos"
 tutorial_8_poi_desc: "Investigue os sistemas §S[survey_target_1.GetName]§!, §S[survey_target_2.GetName]§! e §S[survey_target_3.GetName]§!."
 systems_surveyed: "Sistemas Investigados"
 tutorial_8_tooltip: "§STutorial: Sistema de Levantamento§! adicionado ao Registro de situações"
 tutorial_9_chain_title: "Tutorial: [GetBuildGrowCap] Nave Científica"
 tutorial_9_chain_desc: "Devemos pensar em [GetBuildGrow] uma segunda £science_ship£ §SNave Científica§! para aumentar a velocidade com a qual inspecionamos nossa região da galáxia.\n\nClique em nossa Base Estelar e selecione a aba §SEstaleiro§!, depois selecione §SNave Científica§! dentre as escolhas disponíveis.\n\nLembre-se de que você precisará ter £alloys£ §SLigas Metálicas§! suficientes para custear a §SNave§! antes de sua construção começar."
 science_ship_built: "Nave Científica pronta"
 tutorial_9_tooltip: "§STutorial: [GetBuildGrowCap] uma Segunda Nave Científica§! adicionado ao Registro de Situações"
 tutorial_10_chain_title: "Tutorial: Recrutar Cientista"
 tutorial_10_chain_desc: "Precisamos de um £scientist£ §SCientista§! para comandar nossa nova £science_ship£ §SNave Científica§!, pois não é possível inspecionar ou pesquisar §SAnomalias§! sem alguém no comando.\n\nSelecione nossa nova §SNave Científica§! e clique no retrato na interface da frota. A janela §SSelecionar Líder§! abrirá, mostrando todos os §SCientistas§! que temos atualmente e os que estão disponíveis para contratação. Selecione o candidato que você deseja.\n\nRecrutar um líder custa £unity£ §Y Unidade§!, e talvez você precise esperar até ter armazenado o suficiente.\n\nApós o recrutamento, a §SNave Científica§! poderá começar a explorar."
 scientist_assigned: "Cientistas Recrutados"
 tutorial_10_tooltip: "§STutorial: Recrutar Cientista§! adicionado ao Registro de Situações"
 tutorial_11_chain_title: "Tutorial: [GetBuildGrowCap] Nave Colonial"
 tutorial_11_chain_desc: "Chegou a hora de colonizarmos outro mundo. Primeiro, precisamos [GetBuildGrow] uma £colony_ship£ §SNave Colonial§!. [GetBuildGrowCap] essas §SNaves§! leva muito tempo, e elas precisam de uma grande quantidade de £alloys£ §SLigas Metálicas§!, £food£ §SComida§! e £consumer_goods£ §SBens de Consumo§!, mas uma £colony£ §SColônia§! bem-sucedida valerá muito mais do que o investimento.\n\nClique na sua §SBase Estelar§! e abra a aba §SEstaleiro§!. Em seguida, selecione §SNave Colonial§! dentre os projetos disponíveis.\n\nVocê precisará ter recursos suficientes para poder começar a construção."
 colony_ship_built: "Naves Coloniais Construídas"
 tutorial_11_tooltip: "§STutorial: [GetBuildGrowCap] Nave Colonial§! adicionado ao Registro de Situações"
 tutorial_12_chain_title: "Tutorial: Estabelecer uma Colônia"
 tutorial_12_chain_desc: "Agora devemos usar nossa nova £colony_ship£ §SNave Colonial§! para estabelecer nossa primeira £colony£ §SColônia§!. Os melhores candidatos planetários são aqueles que possuem a mesma classe planetária que o nosso mundo natal, assim nossos colonizadores não terão dificuldades para se ajustar ao ambiente.\n\nPara colonizar um £planet£ §SPlaneta§!, clique na sua §SNave Colonial§! ou selecione-a no §SResumo§!. Em seguida, clique no botão §SColonizar§! na interface da frota e escolha o planeta desejado. Lembre-se de que só é possível colonizar planetas que já foram inspecionados e não tenham §SAnomalias§!. Eles também devem estar localizados dentro de nossas fronteiras. É possível colonizar planetas com baixa Habitabilidade, mas será um processo custoso."
 colony_established: "Colônia Estabelecida"
 tutorial_12_tooltip: "§STutorial: Estabelecer Colônia§! adicionado ao Registro de situações"
 tutorial_13_chain_title: "Tutorial: Recrutar Governador"
 tutorial_13_chain_desc: "Devemos recrutar um §SGovernador Planetário§! para administrar nossa nova £colony£ §SColônia§!. Para isso, clique na colônia e acesse a aba §SResumo do Planeta§!. Depois, clique no botão §SAlterar§! na janela do §SGovernador§!. Isso abrirá a tela de §SLíderes§!, mostrando os Governadores trabalhando para nós no momento.\n\nClique no botão §SRecrutar§! na parte superior da tela e selecione um dos candidatos disponíveis. Note que líderes sempre custam £unity £ §YUnidade§! para serem recrutados. Se não tivermos a quantidade necessária, precisaremos aguardar até que seja gerada o suficiente para custear o líder.\n\nApós o recrutamento, o novo Governador aguardará designação em nosso mundo natal."
 governor_recruited: "Governador Recrutado"
 tutorial_13_tooltip: "§STutorial: Recrutar Governador§! adicionado ao Registro de situações"
 tutorial_14_chain_title: "Tutorial: Estabelecer mais Colônias"
 tutorial_14_chain_desc: "Continue a expandir nosso império fundando novas £colony£ §SColônias§!. Tente [GetBuildGrow] mais £colony_ship£ §SNaves Coloniais§! quando tiver £alloys£ §SLigas Metálicas§!, £food£ §SComida§! e £consumer_goods£ §SBens de Consumo§! suficientes, e envie-as para estabelecer novas colônias.\n\nTome cuidado para não ter muitas colônias em desenvolvimento ao mesmo tempo, já que elas custam £energy£ §SCréditos Energéticos§! até se tornarem autossuficientes."
 colonies_established: "Colônias estabelecidas"
 tutorial_14_tooltip: "§STutorial: Estabelecer Mais Colónias§! adicionado ao Registro de situações"
 tutorial_15_chain_title: "Tutorial: Produção de Recursos"
 tutorial_15_chain_desc: "Nossa indústria em expansão está ávida por matéria-prima, e precisamos aumentar nosso suprimento de £minerals£ §SMinerais§!. Isso pode ser feito ao [GetBuildGrow] £mining_station£ §SEstações de Mineração§! acima de £planet£ §SPlanetas§! e asteroides com depósitos de Minerais, ou estabelecendo §SDistritos de Mineração§! na superfície de um de nossos planetas habitados.\n\nComo tanto as estações quanto as £building£ §SConstruções§! precisam de £energy£ §SCréditos Energéticos§! para manutenção, também precisamos garantir um suprimento amplo desse recurso. Créditos Energéticos são gerados por §SDistritos Geradores§! na superfície de nossos planetas habitados e podem ser obtidos por meio de §SEstações de Mineração§! construídas sobre planetas, asteroides ou sóis com depósitos de Créditos Energéticos."
 mineral_income: "+30 Renda Mineral Mensal"
 credit_income: "+10 Renda de Créditos Energéticos Mensal"
 tutorial_15_tooltip: "§STutorial: Produção de Recursos§! adicionado ao Registro de situações"
 tutorial_16_chain_title: "Tutorial: Aumentar a Frota"
 tutorial_16_chain_desc: "Deveríamos [GetBuildGrow] uma frota estelar poderosa para defender [Root.GetName].\n\nAlgumas §SCorvetas§! devem bastar, por enquanto. Tente [GetBuildGrow] as §SNaves§! em uma §SBase Estelar§! quando nosso estoque de §SLigas Metálicas§! permitir. Novas naves militares sempre se juntam a frotas existentes na órbita da §SBase Estelar§! que as construiu.\n\nPara otimizar o poder militar de uma frota, podemos designar um §SAlmirante§! para comandá-la. Com isso, ela terá vantagem sobre outras frotas, pois a maioria delas não possui um £commander£ §SComandante§! próprio."
 corvettes_built: "Corvetas prontas"
 admiral_assigned: "Comandante Designado"
 tutorial_16_tooltip: "§STutorial: Aumentar a Frota§! adicionado ao Registro de situações"
 tutorial_17_chain_title: "Tutorial: Estabelecer Setor"
 tutorial_17_chain_desc: "Existe um limite para quantos £planet£ §SPlanetas§! você pode controlar diretamente. Esse limite aparece na barra superior, e ultrapassá-lo acarretará penalidades. §SSetores§! são regiões semiautônomas que administram os planetas designados ao seu controle. Para criar um novo setor, acesse a visão de §SPlanetas e Setores§! clicando no ícone correspondente no menu suspenso da barra superior ou pressionando §SF5§!. Em seguida, clique no botão §SCriar Novo Setor§! no canto superior direito.\n\nIsso ativará o §SModo de Gerenciamento de Setor§!. A partir daí, você poderá escolher quais £system£ §SSistemas Estelares§! farão parte do novo setor. Todos os planetas desses sistemas serão administrados por ele. Selecione um sistema onde já possuímos uma £colony£ §SColônia§! e clique em §SFinalizar§!. Pronto, nosso primeiro setor estará criado!"
 sector_established: "Setor estabelecido"
 tutorial_17_tooltip: "§STutorial: Estabelecer Setor§! adicionado ao Registro de situações"
 tutorial_18_chain_title: "Tutorial: Governador do setor"
 tutorial_18_chain_desc: "Deveríamos designar um §SGovernador§! para administrar nosso novo §SSetor§!. Todos os £planet£ §SPlanetas§! deste setor receberão os benefícios dos efeitos do nível de habilidade e das características do Governador."
 sector_governor_assigned: "Governador do Setor"
 tutorial_18_tooltip: "§STutorial: Sector Governador§! adicionado ao Registro de situações"
 tutorial_19_chain_title: "Tutorial: Projeto de Naves"
 tutorial_19_chain_desc: "Para criar um novo projeto de nave, vá para o §SCriador de Naves§! clicando no §SGerenciamento de Frota§! na barra à esquerda ou pressionando §SF9§!. Clique no botão §SNovo Projeto§! e selecione §SCorveta§! quando precisar escolher um §STamanho de Casco§!. Clique no botão §SSem Seção§! para selecionar uma §SSeção§! para o projeto.\n\nCorvetas, o menor tipo de nave de guerra, têm uma única seção, ao contrário de naves maiores. Seções determinam os espaços de §SArma§! e §SUtilidade§!. Escolha uma e preencha os espaços com componentes, certificando-se de que a energia está positiva.\n\nPara simplificar o processo, clique em §SCompletar Automaticamente a Nave§! e deixe o jogo terminar o projeto."
 ships_designed: "Naves Projetadas"
 tutorial_19_tooltip: "§STutorial: Nave Projetada§! adicionado ao Registro de situações"
 tutorial_20_chain_title: "Tutorial: Postos de Observação"
 tutorial_20_chain_desc: "Deveríamos [GetBuildGrow] um §SPosto de Observação§! acima do mundo natal de um §Spovo [Owner.GetPreFTLUpper]§!. Esse tipo de estação espacial consegue desempenhar uma variedade de §SMissões§!, mas nossa vontade de interferir em culturas em desenvolvimento determinará quais estarão disponíveis.\n\nPostos de Observação são construídos da mesma forma que £science_ship£ §SEstações de Pesquisa§! ou £mining_station£ §SMineração§!, mas isso pode ser feito apenas acima dos mundos natais de civilizações em um estado [Owner.GetPreFTLUpper]. Basta escolher uma £construction_ship£ §SNave de Construção§! e clicar no botão §S[GetBuildGrowCap] Posto de Observação§! na interface da frota.\n\nDepois, escolha o mundo natal dos [Owner.GetPreFTLUpperPlural] que você deseja estudar, e a Nave de Construção iniciará a missão."
 observation_post_built: "Posto de Observação pronto"
 tutorial_20_tooltip: "§STutorial: Posto de Observaçãos§! adicionado ao Registro de situações"
 tutorial_21_chain_title: "Tutorial: Recursos estratégicos"
 tutorial_21_chain_desc: "Devemos [GetBuildGrow] uma £mining_station£ §SEstação de Mineração§! na órbita de um objeto astronômico com um £strategic_resource£ §SRecurso Estratégico§!. Esses materiais raros possuem imenso valor estratégico.\n\nApós localizar esse recurso por meio de §SInspeções§!, selecione uma £construction_ship£ §SNave de Construção§!, clique no botão §S[GetBuildGrowCap] Estação de Mineração§! e depois no objeto astronômico apropriado."
 tutorial_21b_chain_title: "Em formação: Recursos estratégicos"
 tutorial_21b_chain_desc: "Construímos uma £mining_station£ §SEstação de Mineração§! na órbita de um objeto astronômico que contém um £strategic_resource£ §SRecurso Estratégico§!. Esses materiais raros exigem tecnologias específicas para serem extraídos e possuem um imenso valor estratégico. Devemos estar sempre atentos para encontrá-los."
 strategic_resource_extracted: "Recurso Estratégico extraído"
 tutorial_21_tooltip: "§STutorial: Recurso Estratégicos§! adicionado ao Registro de situações"
 tutorial_22_chain_title: "Tutorial: Melhorar Pré-sencientes"
 tutorial_22_chain_desc: "Devemos §SMelhorar§! uma espécie menor, apesar de antes precisarmos pesquisar a tecnologia §SGatilhos Epigenéticos§!.\n\n§SMelhore§! uma espécie pré-sapiente ao selecionar seu registro na tela §SEspécies§!, e depois clicar no botão Melhorar."
 tutorial_22_tooltip: "§STutorial: Elevar Pré-sencientes§! adicionado ao Registro de situações"
 species_uplifted: "Espécies Preinteligente evoluiu"
 tutorial_23_chain_title: "Tutorial: Primeiro Contato"
 tutorial_23_chain_desc: "Após encontrar entidades desconhecidas nos confins do espaço, devemos tentar §Sestabelecer comunicações§!.\n\nIsso pode ser feito selecionando §SPrimeiro Contato§! no §SRegistro de Situações§! e clicando no botão §SMostrar Primeiro Contato§!, ou, alternativamente, clicando no ícone §SPrimeiro Contato§! no §SMapa da Galáxia§!.\n\n\n$tttt$$tttt$$ttt$£firstcontact£\n"
 contact_made: "Contatos Feitos"
 tutorial_23_tooltip: "§STutorial: Primeiro Contato§! adicionado ao Registro de Situações"
 tutorial_24_chain_title: "Tutorial: Modificar Espécies"
 tutorial_24_chain_desc: "Podemos §SModificar§! qualquer espécie sapiente que viva dentro do nosso império, desde que possua §SPontos de Característica§! suficientes.\n\nIsso pode ser feito acessando o menu §SModificar§! na tela §SEspécies§! e em seguida, pesquisando o §SProjeto Especial§! correspondente. Esse projeto requer pesquisa de £society£ §SSociedade§! e irá redirecionar todo o nosso progresso tecnológico nessa área enquanto estiver em andamento."
 species_modified: "Espécie Modificada"
 tutorial_24_tooltip: "§STutorial: Modificar Espécies§! adicionado ao Registro de Situações"
 tutorial_25_chain_title: "Tutorial: Reivindicação de Sistema"
 tutorial_25_chain_desc: "Podemos expandir nossas fronteiras [GetBuildingGrowing] §SBases Estelares§! em órbita ao redor de estrelas alienígenas. Isso protege o £system£ §SSistema§!, concede acesso a recursos e bloqueará a passagem de contatos se as fronteiras forem fechadas.\n\nSelecione uma £construction_ship£ §SNave de Construção§!, clique no botão §S[GetBuildGrowCap] Base Estelar§! na sua interface da frota, e depois clique com o botão esquerdo em uma estrela. Como alternativa, clique com o botão direito na estrela e selecione §S[GetBuildGrowCap] Base Estelar§!.\n\nAo contrário de outras estações orbitais, §SBases Estelares§! podem ser construídas fora de nossas fronteiras."
 frontier_outpost_built: "Base Estelar Construída"
 tutorial_25_tooltip: "§STutorial: Bases Estelares§! adicionado ao Registro de Situações"
 TUTORIAL_PLANETVIEW_MANAGEMENT_TITLE: "Tutorial: Gerenciamento"
 TUTORIAL_PLANETVIEW_MANAGEMENT_DESC: "A aba §SGerenciamento§! exibe informações importantes sobre a condição e a distribuição de um £planet£ §SPlaneta§!.\n\nA seção §SRecursos Planetários§! mostra £blocker£ §SBloqueadores§! naturais que podem ser removidos, bem como os §SRecursos§! existentes.\n\nA seção §SPopulação Atual§! mostra todos os £pops£ §SPops§! no £planet£ §SPlaneta§!.\n\nO painel £sector£ §SSetor§! permite administrar o planeta como parte de um §SSetor§!, automatizando a gestão planetária.\n\nA §SAscensão da Colônia§! permite ascender suas colônias, aprimorando seus §SPlanetas§!, desde que os recursos necessários estejam disponíveis."
 TUTORIAL_DATABANK_TITLE: "Tutorial: Banco de Dados"
 TUTORIAL_DATABANK_DESC: "O £databank£ §SBanco de Dados§! é o seu recurso principal para compreender os sistemas do jogo.\n\nAs entradas são organizadas por categoria, facilitando a consulta de mecânicas, §SRecursos§! ou conceitos específicos sempre que necessário.\n\nBasta pesquisar ou selecionar um tópico na lista para saber mais."
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_TITLE: "Tutorial: Foco e Linha do Tempo"
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_DESC: "O sistema £focus_core£ §SFoco do Império§! ajuda a guiar o desenvolvimento de seu império, permitindo que você escolha uma prioridade: £focus_exploration£ §SExploração§!, £focus_conquest£ §SConquista§! ou £focus_development£ §SDesenvolvimento§!.\n\nCada foco inclui um conjunto de cartas de tarefas, projetadas para oferecer direção com base no caminho escolhido. Concluir uma carta concede §SPontos de Progresso§! na categoria correspondente.\n\nO foco atual aumenta as chances de obter tarefas relacionadas. As cartas podem ser redistribuídas utilizando £unity£ §SUnidade§!, e o foco também pode ser alterado.\n\nAcompanhe seus objetivos nas abas §SConcluído§! e §SProgresso§! para ver quão perto está do próximo nível de recompensas.\n\nA §SLinha do Tempo§! exibe marcos importantes e eventos históricos da trajetória do seu império, começando em sua §SOrigem§!. Novas entradas surgem conforme eventos importantes acontecem ao longo do tempo."
 TUTORIAL_COLONIZATION_TITLE: "Tutorial: Colonizando um Planeta"
 TUTORIAL_COLONIZATION_DESC: "A tela §SColonização§! é onde você prepara um planeta para ser colonizado.\n\nÉ necessário selecionar uma §SEspécie§! para ocupar o planeta e definir uma §SDesignação Colonial§! que indicará o foco de seu desenvolvimento.\n\nUma visão geral dos §SDistritos§! disponíveis, do §STamanho do Planeta§! e de possíveis §SModificadores§! será exibida, junto com quaisquer §SRecursos Planetários§! que possam impactá-lo.\n\nPriorizar o desenvolvimento com base nos recursos naturais do §SPlaneta§! é essencial para tirar o máximo proveito de suas colônias."
