l_braz_por:
 SITLOG: "Registro de Situação Atualizado"
 ####################################
 #Advisor Tutorial Messages
 ####################################
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_TITLE: "Governo"
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_DESC: "A tela §SGoverno§! nos mostra as informações referentes ao nosso império e seu governo. Aqui podemos ver nosso §SGovernante§! e quaisquer efeitos relacionados.\n\nUma aba separada fornece informações sobre a §SDemografia§! do nosso império."
 TUTORIAL_TECH_VIEW_TITLE: "Tutorial: Tecnologia"
 TUTORIAL_TECH_VIEW_DESC: "A tela §STecnologia§! é onde gerenciaremos nossos esforços de pesquisa. As tecnologias são divididas em três campos diferentes, e cada campo geralmente tem três opções de pesquisa disponíveis.\n\nOs campos disponíveis são £physics£ Física, £society£ Sociedade e £engineering£ Engenharia.\n\nPara pesquisar uma §STecnologia§!:\n\n£dot_green£ Clique no botão §SSelecionar Pesquisa§!\n£dot_green£ Escolha uma das opções disponíveis\n\nA designação de um §SChefe de Pesquisa§! acelera o progresso e é altamente recomendada. Suas §SCaracterísticas§! também podem oferecer benefícios adicionais.\n\nA pesquisa também pode ser automatizada clicando no botão §SAtivar Pesquisa Automática§! em seus respectivos campos.\n\n$tttt$$ttt$£automate_research£\n"
 TUTORIAL_CONTACTSVIEW_EMPIRES_TITLE: "Tutorial: Contatos"
 TUTORIAL_CONTACTSVIEW_EMPIRES_DESC: "Na tela §SContatos§!, é possível acessar uma lista detalhada de todos os diversos §SImpérios§! que encontramos. Suas §SOpiniões§! sobre nós são visíveis de forma rápida e prática, e podemos interagir facilmente em ações de §SDiplomacia§!.\n\nCada registro também mostra informações importantes, como §STipo de Governo§!, §SÉtica§! e §SStatus do Império§!.\n\nA partir desta tela, também é possível acessar operações de §SEspionagem§! e visualizar os §SAcordos§! existentes com cada império."
 TUTORIAL_SITUATION_LOG_TITLE: "Tutorial: Registro de Situações"
 TUTORIAL_SITUATION_LOG_DESC: "O §SRegistro de Situações§! mostra uma lista de todos os §SProjetos Especiais§!, £archaeology£ §SSítios Arqueológicos§! e outras questões de interesse disponíveis.\n\nNovos itens provavelmente aparecerão conforme começarmos a explorar a galáxia."
 TUTORIAL_SHIP_DESIGNER_TITLE: "Tutorial: Criador de Naves"
 TUTORIAL_SHIP_DESIGNER_DESC: "Todas as §SNaves§! em uso dentro do nosso império são projetadas aqui. Novos §STamanhos de Casco§! e §SComponentes§! serão liberados conforme pesquisamos novas tecnologias.\n\nPara criar um novo §SProjeto§!:\n\n£dot_green£ Clique no botão §SNovo Projeto§!\n£dot_green£ Escolha o §STamanho de Casco§!\n£dot_green£ Clique no botão §SSem Seção§! e escolha uma §SSeção§!\n\nAgora, clique nos espaços disponíveis para selecionar livremente entre os §SComponentes de Nave§! disponíveis.\n\n\n$tttt$$tt$£slot_component£\n\n\nApós salvar, o novo projeto ficará disponível para construção em qualquer §SBase Estelar§! que tenha um §SEstaleiro§!."
 TUTORIAL_EMPIREVIEW_PLANETS_TITLE: "Tutorial: Planetas e Setores"
 TUTORIAL_EMPIREVIEW_PLANETS_DESC: "A tela §SPlanetas e Setores§! apresenta uma visão geral de todos os mundos colonizados, seus £pops£ §SPops§! e a §SProdução de Recursos§!.\n\nConforme o império se expande, é possível organizá-lo em §SSetores§! para facilitar o gerenciamento.\n\n£vassal£ §SVassalos§! também podem ser criados a partir de §SSetores§! existentes."
 TUTORIAL_MILITARY_FLEET_TITLE: "Tutorial: Frotas Militares"
 TUTORIAL_MILITARY_FLEET_DESC: "§SFrotas Militares§! são usadas para proteger nosso império emergente contra ameaças... ou para expandir nosso glorioso reinado por meio da força, se assim desejarmos.\n\nO tamanho de nossa frota é determinado pela §SCapacidade Naval§! atual, que inicialmente é limitada. No entanto, pode ser aumentada ao:\n\n£dot_green£ Pesquisar novas §STecnologias§!\n£dot_green£ Expandir nossa £pops£ População\n£dot_green£ Construir §SAncoradouros de Bases Estelares§!\n\nPara liderar nossas frotas, podemos designar um £commander£ §SComandante§!, aumentando seu poder militar, além dos bônus que o £leader£ §SLíder§! oferece."
 TUTORIAL_SCIENCE_SHIP_TITLE: "Tutorial: Inspeção"
 TUTORIAL_SCIENCE_SHIP_DESC: "Esta é a nossa £science_ship£ §SNave Científica§!, que é usada para §SInspecionar§! objetos astronômicos, como £planet£ §SPlanetas§! em um £system£ §SSistema Estelar§!. Um planeta precisa ser inspecionado para tornar seus §SRecursos§! visíveis.\n\nNosso sistema natal já foi inspecionado, então devemos focar nossos esforços em outro lugar.\n\nCom a §SNave Científica§! selecionada:\n\n£dot_green£ Clique com o botão direito em um §SSistema§! vizinho\n£dot_green£ Selecione §SInspecionar Sistema§!"
 TUTORIAL_CONSTRUCTION_SHIP_TITLE: "Tutorial: Nave de Construção"
 TUTORIAL_CONSTRUCTION_SHIP_DESC: "Esta é a nossa £construction_ship£ §SNave de Construção§!, que é usada para construir estações espaciais.\n\nQuando um objeto astronômico, como um £planet£ §SPlaneta§!, for inspecionado, poderemos mandar esta nave construir uma £science_ship£ §SEstação de Pesquisa§! ou uma £mining_station£ §SEstação de Mineração§! para explorar quaisquer recursos que ele possa conter.\n\nEstas §SNaves§! também são usadas para [GetBuildGrow] §SBases Estelares§! em £system£ §SSistemas§! não reivindicados, tornando-as críticas para nossos planos de expansão."
 TUTORIAL_PLANETVIEW_PLANET_TITLE: "Tutorial: Superfície"
 TUTORIAL_PLANETVIEW_PLANET_DESC: "A aba §SSuperfície§! fornece uma visão geral da infraestrutura e do status de um £planet£ §SPlaneta§!.\n\nA seção £building£ §SDistritos e Construções§! mostra os espaços de construção em uso e disponíveis em seus respectivos Distritos.\n\nOs £district£ §SDistritos§! e §SZonas§! oferecem £housing£ §SMoradia§!, £job£ §SEmpregos§! e recursos.\n\nO botão de §SAutomação§! permite que o planeta seja gerenciado automaticamente de acordo com um foco específico.\n\nA barra de §SEstatísticas Planetárias§!, localizada na parte superior da janela, exibe a £stability£ §SEstabilidade§!, o £crime£ §SCrime§!, modificadores ativos e o §SGovernador§! designado."
 TUTORIAL_PLANETVIEW_TILES_TITLE: "Tutorial: Economia"
 TUTORIAL_PLANETVIEW_TILES_DESC: "A aba §SEconomia§! exibe uma visão geral da §SForça de Trabalho§! e dos £job£ §SEmpregos§!.\n\nA população do £planet£ §SPlaneta§! é organizada em §SCamadas§!, que podem ser expandidas para revelarem os tipos de §SEmprego§!. Os £pops£ §SPops§! preenchem as camadas conforme necessário para manter a §SForça de Trabalho§!.\n\n§SEmpregos§! consomem e produzem recursos.\n\nPops precisam de £housing£§S Moradias§! e £amenities£ §SConfortos§!.\n\nA escassez de qualquer um dos dois reduz a £happiness£ §SFelicidade§! do planeta, abalando a £stability£ §SEstabilidade§! geral."
 TUTORIAL_PLANETVIEW_COMBAT_TITLE: "Tutorial: Exércitos"
 TUTORIAL_PLANETVIEW_COMBAT_DESC: "A aba §SExércitos§! gerencia todas as forças terrestres no planeta. Essa tela também acompanha o quanto de §SDevastação§!, ou dano, o £planet£ §SPlaneta§! sofreu.\n\nNovos §SExércitos§! são criados aqui, ao clicar no botão §SRecrutar§!.\n\n§SExércitos de Defesa§! são produzidos automaticamente por £pops£ §SPops§! que trabalham em §SEmpregos§! de Executor ou [soldier.GetName]. Esses £job£ §SEmpregos§! são fornecidos pela capital planetária, £building£ §SDelegacias§! e £building£ §SFortalezas§!."
 TUTORIAL_PLANETVIEW_SPACEPORT_TITLE: "Porto Espacial"
 TUTORIAL_PLANETVIEW_SPACEPORT_DESC: "Na aba §SPorto Espacial§! é possível ver frotas em órbita e [GetBuildGrow] novas naves civis. Naves militares só podem ser construídas em uma §SBase Estelar§! equipada com um §SEstaleiro§!, mas naves de Construção, Científicas e §SColoniais§! são todas construídas aqui.\n\nMesmo se perdermos nossa última Base Estelar, ainda teremos os meios para expandir e reconstruir, contanto que estejamos em posse de pelo menos um £planet£ §SPlaneta§! habitado."
 TUTORIAL_MILITARY_STATION_TITLE: "Estações Militares"
 TUTORIAL_MILITARY_STATION_DESC: "§SEstações Militares§! são defesas estáticas que podem ser usadas para proteger £planet£ §SPlanetas§! ou vias de aproximação importantes, mas só podem ser construídas dentro de nossas fronteiras ou territórios onde temos acessos especiais.\n\nCuidado para não [GetBuildGrow] além da conta – assim como §SNaves§!, seu custo de manutenção sobrecarregará nossa economia."
 TUTORIAL_RESEARCH_STATION_TITLE: "Tutorial: Estações de Pesquisa"
 TUTORIAL_RESEARCH_STATION_DESC: "Uma £science_ship£ §SEstação de Pesquisa§! construída em órbita de um corpo planetário coletará dados de pesquisa de £physics£ §SFísica§!, £engineering£ §SEngenharia§! e £society£ §SSociedade§!.\n\nElas só podem ser construídas dentro de nossas fronteiras, e não são necessárias se o £planet£ §SPlaneta§! já tiver sido colonizado."
 TUTORIAL_MINING_STATION_TITLE: "Estações de Mineração"
 TUTORIAL_MINING_STATION_DESC: "£mining_station£ §SEstações de Mineração§! são usadas para extrair £minerals£ §SMinerais§! e £strategic_resource£ §SRecursos Estratégicos§! dos objetos que orbitam.\n\n§SEstações de Mineração§! não são necessárias para acessar os recursos de £planet£ §SPlanetas§! colonizados e só podem ser construídas dentro de nossas fronteiras."
 TUTORIAL_TRANSPORT_SHIP_TITLE: "Tutorial: Naves de Transporte"
 TUTORIAL_TRANSPORT_SHIP_DESC: "Quando §SExércitos§! são enviados ao espaço, eles automaticamente embarcam nessas naves de §STransporte§!. Certifique-se de protegê-las, já que são bem indefesas!"
 TUTORIAL_DIPLOMACY_VIEW_TITLE: "Tutorial: Diplomacia"
 TUTORIAL_DIPLOMACY_VIEW_DESC: "A tela §SDiplomacia§! é onde nos comunicamos com outras civilizações. Nela, podemos §SDeclarar Guerra§!, construir §SRedes Espiãs§! em nossos vizinhos ou estabelecer §SAlianças§! e §SAcordos de Comércio§! com eles. Também podemos ver o §HNível de Inteligência§! atual.\n\nSuas §SRelações§! com o império selecionado são mostradas como um de cinco níveis, de \"Terrível\" a \"Excelente\". Para fazer um acordo, você precisa ter um nível de Relações suficiente.\n\nVocê pode designar £envoy£ §SEmissários§! para um império a fim de §Sespioná-lo§!, obter §SInteligência§!, ignorar exigências de §SRelações§! ou §Smelhorar§! ou §Sprejudicar Relações§!."
 TUTORIAL_DIPLOMACY_VIEW_TRADE_TITLE: "Tutorial: Comércio"
 TUTORIAL_DIPLOMACY_VIEW_TRADE_DESC: "Esta é a tela §SComércio§!. Podemos negociar qualquer tipo de §SRecurso§! com outro império, além de trocar §SInformações§! e §SFavores§!.\n\nFavores podem ser utilizados para aumentar a disposição de um império em aceitar um acordo. Também é possível usar Favores durante uma votação no Senado da §HComunidade Galáctica§! para alavancar seu Peso Diplomático."
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_TITLE: "Tipos de Federação"
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_DESC: "Os §STipos de Federação§! determinam qual será o foco da £federation£ §SFederação§!. Cada tipo de Federação possui §SRegalias e Leis§! iniciais únicas e pode §Sliberar§! mais Regalias conforme acumula EXP."
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_TITLE: "Tutorial: Inteligência Superior"
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_DESC: "Atingimos um §Salto nível de Inteligência§! com este Império, e por isso, temos acesso a muitas informações sobre eles.\n\nManter uma alta Inteligência com um Império garantirá que temos informações atualizadas sobre suas §SÉticas§! e §SComponentes Cívicos§!, suas §SRelações§! com outros Impérios, e seu poder de §STecnologia§!, §SEconomia§! e §SMilitar§! relativo ao nosso."
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_TITLE: "Tutorial: Pouca Inteligência"
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_DESC: "Nosso §SNível de Inteligência§! sobre este império está diminuindo. Corremos o risco de perder as informações previamente coletadas, já que a Inteligência torna-se §Sobsoleta§! com o tempo.\n\nPara aumentar o §SNível de Inteligência§!:\n\n£dot_green£ Mantenha §SAcordos Diplomáticos§!\n£dot_green£ Designe £envoy£ §SEmissários§! para melhorar as relações\n£dot_green£ Estabeleça uma §SRede Espiã§!\n£dot_green£ Estabeleça uma §SEmbaixada§! no território deles"
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_TITLE: "Efeitos de Adjacência"
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_DESC: "Algumas £building£ §SConstruções§! podem causar §SEfeitos de Adjacência§! em outras §SConstruções§! situadas em §SQuadrados§! vizinhos. É preciso levar isso em consideração ao construir novas instalações."
 TUTORIAL_GOVERNMENTVIEW_BUDGET_TITLE: "Orçamento"
 TUTORIAL_GOVERNMENTVIEW_BUDGET_DESC: "A aba §SOrçamento§! exibe a §SRenda§! e os §SGastos§! mensais de nosso império em £energy £ Créditos Energéticos. Aqui também é possível acompanhar diversos efeitos que impactam nossa economia."
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_TITLE: "Editos"
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_DESC: "Aqui é possível decretar §SEditos§! imperiais, que podem ser aplicados mediante o gasto de recursos.\n\nOs Editos têm custo de manutenção mensal, que pode ser coberto por nosso §H$EDICT_FUND$§! ou gastando £unity£ §YUnidade§!."
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_TITLE: "Tutorial: Demografia"
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_DESC: "A aba §SDemografia§! monitora a composição e a distribuição da população do nosso império.\n\nEla também exibe as §SCaracterísticas§! dominantes entre nossos £pops£ §SPops§!, assim como modificadores de produtividade e £happiness£ §SFelicidade§!, entre outras informações."
 TUTORIAL_EMPIREVIEW_LEADERS_TITLE: "Tutorial: Líderes"
 TUTORIAL_EMPIREVIEW_LEADERS_DESC: "A tela §SLíderes§! apresenta uma visão geral dos nossos £leader£ §SLíderes§! e nos permite contratá-los, dispensá-los e gerenciá-los.\n\nA §SClasse§! de um líder determina sua possível designação em nosso império e qual posição ele ou ela pode assumir no §SConselho§!.\n\nA lista de líderes §Sdisponíveis§! é renovada periodicamente, mas como a capacidade é limitada, excedê-la aumenta os custos de manutenção e reduz o ganho de experiência. Dispense líderes redundantes para evitar essas penalidades."
 TUTORIAL_EMPIREVIEW_FACTIONS_TITLE: "Tutorial: Facções"
 TUTORIAL_EMPIREVIEW_FACTIONS_DESC: "A tela §SFacções§! apresenta uma visão geral das inclinações políticas da população. Mudanças no clima sociopolítico podem levar ao surgimento de novas §SFacções§!. Aqui também é possível consultar o tamanho de cada §SFacção§!, sua atratividade aos £pops£ §SPops§! e o nível de contentamento.\n\n§SFacções§! possuem §SProblemas§! que influenciam diretamente sua §SAprovação§!, e nossas políticas e decisões podem agradar ou não esses grupos, impactando diretamente a geração de £unity£ §SUnidade§!.\n\nA força das §SFacções§! e a natureza de seus §SProblemas§! variam conforme as circunstâncias, e é importante lembrar que a £happiness£ §SFelicidade§! de um §SPop§! pode ser afetada pela §SAprovação§! da §SFacção§! à qual ele pertence.\n\nTambém é possível §SGerenciar Facções§! para manipular o relacionamento entre uma §SFacção§! e o Estado, chegando até mesmo a adotar o ethos de uma §SFacção§! dominante."
 TUTORIAL_CREATESECTOR_TITLE: "Tutorial: Gerenciamento de Setor"
 TUTORIAL_CREATESECTOR_DESC: "Para estabelecer um §SSetor§!, primeiro selecione um £planet£ §SPlaneta§! no §SEspaço Fronteiriço§! e pressione o botão Criar Setor. Isso tornará o planeta a §SCapital§! de um novo setor, e todos os sistemas no espaço fronteiriço dentro de seis hipersaltos serão adicionados a ele. Os setores podem automatizar a criação de £building£ §SConstruções Planetárias§! em seus planetas, caso essa opção esteja ativada e sejam fornecidos recursos, reduzindo significativamente a necessidade de microgerenciamento."
 TUTORIAL_CONTACTSVIEW_SPECIES_TITLE: "Tutorial: Espécies"
 TUTORIAL_CONTACTSVIEW_SPECIES_DESC: "A tela §SEspécies§! lista todos os tipos de seres inteligentes que já encontramos. É possível §SAlternar Espécies§! para exibir apenas os cidadãos do nosso império ou todos os habitantes conhecidos da galáxia.\n\nCaso tenhamos acesso e tecnologia, podemos §SModificar§! as características das espécies, §SElevar§! criaturas pré-sapientes e §SDefinir Direitos Padrão§! para todos os nossos £pops£ §SPops§! ou §SDefinir Direitos§! por espécie para nossos cidadãos."
 TUTORIAL_PLANETVIEW_TERRAFORM_TITLE: "Tutorial: Terraformação"
 TUTORIAL_PLANETVIEW_TERRAFORM_DESC: "A §STerraformação§! nos permite alterar as condições ambientais de um £planet£ §SPlaneta§!, para se adequar melhor a uma §SEspécie§! ou propósito particular."
 TUTORIAL_GENEMODIFICATION_TITLE: "Modificação Genética"
 TUTORIAL_GENEMODIFICATION_DESC: "Podemos alterar geneticamente esta espécie, modificando suas §SCaracterísticas§!.\n\nIsso criará um novo §SModelo§! de espécie com as características que você selecionar. Antes que os £pops£ §SPops§! dessa espécie sejam de fato alterados, será necessário clicar no botão §SAplicar Modelo§!, o que dará início a um novo §SProjeto Especial§!."
 TUTORIAL_UPLIFTING_TITLE: "Melhoria"
 TUTORIAL_UPLIFTING_DESC: "Podemos modificar as §STraços§! desses animais inteligentes e fazer §SElevar§! neles para que se tornem plenamente sapientes e cidadãos produtivos do nosso império."
 TUTORIAL_SYSTEMVIEW_TITLE: "Visão do Sistema"
 TUTORIAL_SYSTEMVIEW_DESC: "Agora estamos na §SVisão do Sistema§!, onde podemos olhar mais de perto um determinado £system£ §SSistema Estelar§!. Aqui, podemos localizar visualmente £planet£ §SPlanetas§!, estações e frotas com facilidade."
 TUTORIAL_WORMHOLE_STATION_TITLE: "Estação buraco de minhoca"
 TUTORIAL_WORMHOLE_STATION_DESC: "§SEstações de Buraco de Minhoca§! são construídas na borda externa de um £system£ §SSistema§!, transformando pequenas fissuras no espaço-tempo em portais bidirecionais para outras estrelas. É genial."
 TUTORIAL_OBSERVATION_STATION_TITLE: "Tutorial: Posto de Observação"
 TUTORIAL_OBSERVATION_STATION_DESC: "§SPostos de Observação§! abrigam equipes de £scientist£ §SCientistas§! responsáveis por pesquisar e observar remotamente espécies §Spré-MRQL§! nos £planet£ §SPlanetas§! que orbitam.\n\nDependendo da §SÉtica§! e da tecnologia do seu império, é possível escolher entre observação passiva, influência cultural, iluminismo tecnológico ou até mesmo abdução e infiltração.\n\nEssas escolhas influenciam como a civilização se desenvolve, e como ela enxerga seu império."
 TUTORIAL_TERRAFORMING_STATION_TITLE: "Estação de Terraformação"
 TUTORIAL_TERRAFORMING_STATION_DESC: "§SEstação de Terraformação§! permitem a §Sterraformation§! dos planetas em que orbitam."
 TUTORIAL_PLANETVIEW_EDICTS_TITLE: "Decisões"
 TUTORIAL_PLANETVIEW_EDICTS_DESC: "Estas são as §SDecisões§! específicas de planetas, comandos ou práticas que podem temporariamente ser aplicadas ao gastar um pouco de nossos recursos.\n\nNovas §SDecisões§! podem ficar disponíveis conforme pesquisamos novas tecnologias e encontramos novas situações."
 TUTORIAL_UNKNOWN_ALIEN_FLEET_TITLE: "Desconhecidas"
 TUTORIAL_UNKNOWN_ALIEN_FLEET_DESC: "Estas são §Sentidades espaciais não identificadas§!. Podemos aprender mais sobre elas e talvez até iniciar o §Sprimeiro contato§! ao completar o §SProjeto Especial§! apropriado."
 TUTORIAL_VICTORY_TITLE: "Tutorial: Vitória"
 TUTORIAL_VICTORY_DESC: "A tela de §SVitória§! lista §Scertas condições§! que podemos tentar cumprir, para garantir que o legado de nossa nação estelar dure enquanto houver vida inteligente na galáxia."
 TUTORIAL_OUTPOST_STATION_TITLE: "Tutorial: Bases Estelares"
 TUTORIAL_OUTPOST_STATION_DESC: "Esta é a §SBase Estelar§! do nosso sistema. Estas estações aprimoráveis marcam a propriedade do sistema estelar e geralmente têm a tarefa de produzir todos os tipos de §SNaves§!.\n\nExpandimos nossas fronteiras [GetBuildingGrowing] §SBases Estelares§! em sistemas próximos.\n\n§SBases Estelares§! inimigas podem ser capturadas ao atacá-las.\n\n§SBases Estelares§! podem ser especializadas em uma variedade de funções por meio de §SMódulos§! e £building£ §SConstruções§!, e tendem a ser a última linha de defesa contra frotas inimigas em um sistema."
 TUTORIAL_GALAXY_MAP_TITLE: "Mapa da Galáxia"
 TUTORIAL_GALAXY_MAP_DESC: "O §SMapa da Galáxia§! exibe vastas áreas de §SEspaço Inexplorado§!, nossas fronteiras e os territórios de qualquer civilizações alienígenas com as quais tenhamos nos comunicado.\n\nÉ possível clicar no botão §SModo de Mapa Detalhado§! na barra de menu no canto inferior direito para alternar a exibição de §SRecursos§! e §SAlcances de Sensor§!."
 TUTORIAL_WAR_GOAL_TITLE: "Objetivo de Guerra"
 TUTORIAL_WAR_GOAL_DESC: "Ao declarar guerra, também precisamos definir nossa intenção, tanto para o inimigo quanto para os aliados. Esse §SObjetivo de Guerra§! determina quais demandas podemos apresentar nas negociações de paz, como a concessão de £system£ §SSistemas§! reivindicados ou a vassalagem.\n\nApresentar esse objetivo dá ao inimigo a oportunidade de reagir adequadamente – eles podem se render imediatamente, apresentar uma contraproposta e firmar uma trégua, ou defender seus interesses até o último homem, mulher, esporo fúngico ou herbívoro semissapiente. Descobrir a reação deles faz parte da diversão!\n\nPara declarar um §SObjetivo de Guerra§!, selecione-o na lista."
 TUTORIAL_WAROVERVIEW_TITLE: "Visão Geral da Guerra"
 TUTORIAL_WAROVERVIEW_DESC: "Esta janela apresenta uma visão geral de nossa guerra atual. Cada lado sofre §SExaustão de Guerra§! dependendo do progresso da guerra, o que determina a disposição deles de aceitar um acordo de paz.\n\nSe a Exaustão de Guerra chegar a 100% para um lado, o outro lado pode forçar um acordo de §SStatus Quo§!. Os resultados de todas as batalhas que ocorreram até o momento na guerra também podem ser acompanhados aqui."
 TUTORIAL_STRATEGIC_RESOURCES_TITLE: "Recursos Estratégicos"
 TUTORIAL_STRATEGIC_RESOURCES_DESC: "A tela §HRecursos Estratégicos§! cataloga nossos £strategic_resource£ §SRecursos Estratégicos§! disponíveis e seus efeitos.\n\nMuitos §SRecursos Estratégicos§! precisam que §STecnologias§! específicas sejam pesquisadas antes que possam ser extraídos ou utilizados."
 TUTORIAL_EXPANSION_PLANNER_TITLE: "Tutorial: Planejador de Expansão"
 TUTORIAL_EXPANSION_PLANNER_DESC: "No §HPlanejador de Expansão§! encontramos os £planet£ §SPlanetas§! §SHabitáveis§! próximos que podem apresentar oportunidades para colonização. Podemos [GetBuildGrow] £colony_ship£ §SNaves Coloniais§! e dar ordens a elas diretamente desta tela.\n\nPlanetas devem ser inspecionados e quaisquer anomalias encontradas devem ser pesquisadas antes de o planeta ser colonizado.\n\nUma §SBase Estelar§! também precisa ter sido construída no £system£ §SSistema§! do §SPlaneta§!, para que ele esteja dentro de nossas fronteiras."
 TUTORIAL_TRADITIONS_TITLE: "Tutorial: Tradições"
 TUTORIAL_TRADITIONS_DESC: "A tela §HTradições§! exibe as §SÁrvores de Tradição§! disponíveis para o nosso império.\n\nUma §SÁrvore de Tradição§! precisa ser §SAdotada§! antes que qualquer £traditions£ §STradição§! dela possa ser liberada.\n\n§SAdotar§! uma §SÁrvore de Tradição§! ou liberar uma §STradição§! específica exige certa quantidade de £unity£ §HUnidade§!, e o custo aumenta à medida que liberamos mais §STradições§! e o império cresce.\n\nPara adotar uma §SÁrvore de Tradição§!:\n\n£dot_green£ Clique no botão §SSelecionar§!\n£dot_green£Clique no botão §SAdotar§! na árvore escolhida\n\n§STradições§! disponíveis podem ser visualizadas ao passar o cursor sobre as §SÁrvores de Tradição§!."
 TUTORIAL_TRADITIONS_SELECT_TITLE: "Adotando uma árvore de Tradição"
 TUTORIAL_TRADITIONS_SELECT_DESC: "Esta tela exibe todas as §HÁrvores de Tradição§! disponíveis para o nosso império. Aqui você pode visualizar todas as £traditions£ §HTradições§! de cada árvore, bem como os efeitos de §Hadoção§! e §Hfinalizadores§!.\n\nRecomendei algumas §HÁrvores de Tradição§! para você começar."
 TUTORIAL_TRADITIONS_NEW_TITLE: "Nova Árvore ou Tradição"
 TUTORIAL_TRADITIONS_NEW_DESC: "Quando nosso império tiver £unity£ §HUnidade§! suficiente, você poderá §HSelecionar§! uma §Hnova árvore§! ou uma £traditions£ §HTradição§! na árvore escolhida anteriormente."
 TUTORIAL_ASCENSION_PERKS_TITLE: "Tutorial: Regalias da Ascensão"
 TUTORIAL_ASCENSION_PERKS_DESC: "A lista de §HRegalia da Ascensão§! mostra as §SRegalias§! que podemos desbloquear futuramente. Algumas §SRegalias§! exigem condições especiais, como determinadas §STecnologias§! ou um número mínimo de §SEspaços de Regalia da Ascensão§! já desbloqueados.\n\nUm §HEspaço de Regalia da Ascensão§! é liberado sempre que adotamos todas as £traditions£ §HTradições§! de uma §SÁrvore de Tradição§!."
 TUTORIAL_SPECIES_RIGHTS_TITLE: "Tutorial: Direitos de Espécie"
 TUTORIAL_SPECIES_RIGHTS_DESC: "A lista de §HDireitos de Espécie§! nos permite personalizar a §SCidadania§! e o §SPadrão de Vida§! de uma determinada espécie, entre outros aspectos.\n\nOs §SDireitos Padrão§!, quando personalizados, abrangem todos os £pops£ §SPops§! que não possuem §SDireitos de Espécie§! definidos, como migrantes, refugiados ou outros recém-chegados à nossa nação."
 TUTORIAL_FLEET_MANAGER_TITLE: "Tutorial: Gerenciamento de Frota"
 TUTORIAL_FLEET_MANAGER_DESC: "No §SGerenciamento de Frota§!, podemos criar modelos para nossas frotas militares. Conforme nossas frotas aumentam, estes modelos facilitam a substituição rápida de quaisquer perdas que possamos ter."
 TUTORIAL_CLAIMS_VIEW_TITLE: "Tutorial: Reivindicações"
 TUTORIAL_CLAIMS_VIEW_DESC: "Na interface de §SReivindicações§!, podemos gastar £influence£ §SInfluência§! para reivindicar £system£ §SSistemas Estelares§! pertencentes a outros impérios.\n\nTer uma reivindicação sobre um §SSistema§! nos dá um §SCasus Belli§! válido contra o dono, permitindo declarar guerra com o objetivo de conquistá-lo.\n\nEm guerras envolvendo vários aliados, o império com a maior §SReivindicação§! sobre um §SSistema§! será aquele que ganhará a posse ao término do conflito, caso saia vitorioso."
 TUTORIAL_ANOMALIES_TITLE: "Tutorial: Anomalias"
 TUTORIAL_ANOMALIES_DESC: "A tela §SAnomalias§! lista todas as §SAnomalias§! ainda não pesquisadas que já encontramos, junto com suas localizações. Elas podem ser investigadas usando uma £science_ship£ §SNave Científica§! com um £scientist£ §SCientista§! designado."
 TUTORIAL_GOVERNMENTVIEW_MARKET_TITLE: "Tutorial: Mercado Interno"
 TUTORIAL_GOVERNMENTVIEW_MARKET_DESC: "Na tela £market£ §SMercado§!, podemos comprar e vender recursos. Inicialmente, ele é somente um mercado interno, mas se impérios suficientes estabelecerem contato, é provável que formem um §SMercado Galáctico§!.\n\nRecursos podem ser comprados e vendidos com seu Estoque de £trade£ §SComércio§!, que funciona como moeda. Os preços mudam a cada transação: comprar faz os preços subirem, enquanto vender os faz cair.\n\n§SAcordos de Comércio Automáticos§! podem ser configurados para ocorrer mensalmente."
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_TITLE: "Tutorial: Mercado de Escravos"
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_DESC: "Tudo tem um preço, inclusive o povo. No §SMercado de Escravos§!, £pops£ §SPops§! são comprados e vendidos como mercadorias, com seus destinos reescritos nas estrelas. Após a compra, seus novos §SPops§! serão entregues automaticamente no £planet£ §SPlaneta§! de sua escolha, sem preocupações logísticas. O mercado cuida de tudo isso... por um preço."
 #TUTORIAL_PLANETVIEW_CORPORATE_TITLE: "Corporation View"
 #TUTORIAL_PLANETVIEW_CORPORATE_DESC: "The corporate tab allows §SMegacorporations§! to build §SBranch Offices§! on the planets of other Empires, provided they have signed the necessary paperwork. Once built, they can view and upgrade their facilities here as well. As we know, large Corporations wish only the best for their customers, events of the 23rd cycle notwithstanding."
 TUTORIAL_GOVERNMENTVIEW_POLICIES_TITLE: "Tutorial: Políticas"
 TUTORIAL_GOVERNMENTVIEW_POLICIES_DESC: "A aba §SPolíticas§! abrange as §SPolíticas§! governamentais, que têm efeitos amplos sobre como o nosso império é administrado.\n\nGeralmente, há algumas posições possíveis para se tomar em relação a qualquer §SPolítica§!, embora possamos ficar limitados tanto pela tecnologia quanto pelo nosso §SEthos§!."
 TRADE_VIEW_DESC: "À medida que nosso império cresce, o §SComércio§! entre nossos £planet£ §SPlanetas§! se tornará uma parte cada vez maior de nossa economia. §SBases Estelares§! com §SHubs Comerciais§! coletam §SComércio§! em seus £system£ §SSistemas§! e o encaminham para a §SCapital§!, onde será convertido em £energy£ §SCréditos Energéticos§!.\n\nCom mais §SHubs Comerciais§!, uma §SBase Estelar§! pode coletar §SComércio§! de sistemas adjacentes também. Rotas comerciais prósperas atraem §SPiratas§!, que podem ser combatidos por frotas em §SPatrulha§! e por §SMódulos de Defesa§! em §SBases Estelares§!. §SMódulos de Hangar§! são especialmente eficazes nesta função."
 PLANETVIEW_CORPORATE_DESC: "A aba corporativa permite à §SMegacorporação§! construir filiais nos £planet£ §SPlanetas§! de outros impérios, desde que tenham assinado a papelada necessária. Depois de construídas, elas podem ver e aprimorar instalações próprias aqui também. Como sabemos, grandes corporações só querem o melhor para os clientes, apesar dos eventos do ciclo 23."
 TUTORIAL_FEDERATION_VIEW_TITLE: "Tutorial: Federação"
 TUTORIAL_FEDERATION_VIEW_DESC: "Esta é a tela da §HFederação§!. Nossa £federation£ §SFederação§! se tornará mais forte enquanto os membros mantiverem uma boa §SCoesão§!. Quando um novo membro se junta à nossa Federação, parte da Coesão é perdida.\n\nDesignar £envoy£ §SEmissários§! para a Federação ajudará a melhorar a Coesão.\n\nÀ medida que nossa Federação se fortalece, é possível §SLiberar Regalias§! que aumentam nossos benefícios mútuos."
 TUTORIAL_FEDERATION_VIEW_ENVOYS_TITLE: "Tutorial: Emissários da Federação"
 TUTORIAL_FEDERATION_VIEW_ENVOYS_DESC: "Adicionar £envoy£ §SEmissários§! à nossa £federation£ §SFederação§! ajudará a melhorar a §SCoesão§!. Lembre-se de que há um limite de quantos Emissários você pode ter. Emissários que são designados a Federações podem mais tarde ser designados a outras §SAções Diplomáticas§!."
 TUTORIAL_FEDERATION_VIEW_MEMBERS_TITLE: "Tutorial: Membros da Federação"
 TUTORIAL_FEDERATION_VIEW_MEMBERS_DESC: "Esta é a tela de §HMembros da Federação§!. Aqui podemos ver o quão poderosos nossos §Smembros§! são em diversas áreas, quantos £envoy£ §SEmissários§! estão contribuindo e quais §SÉticas§! estão em conflito e contribuindo para a perda de §SCoesão§!."
 TUTORIAL_FEDERATION_VIEW_NAVY_TITLE: "Marinha da Federação"
 TUTORIAL_FEDERATION_VIEW_NAVY_DESC: "A §HMarinha da Federação§! é constituída pela §SCapacidade da Marinha§! concedida por todos os membros, e é controlada pelo §SPresidente§!. Membros podem construir naves da Marinha da £federation£ §SFederação§! para contribuir com a Frota."
 TUTORIAL_FEDERATION_VIEW_LAWS_TITLE: "Tutorial: Leis da Federação"
 TUTORIAL_FEDERATION_VIEW_LAWS_DESC: "Alterações nas §HLeis da Federação§! podem ser propostas por qualquer membro. Se a £federation£ §SFederação§! não aprovar uma lei, ela sofrerá uma §SPenalidade de Coesão§!.\n\nAlgumas leis estão bloqueadas e exigem o aumento da §SCentralização§! para serem liberadas. A Federação deve primeiro §SSubir de Nível§! para obter acesso a uma Centralização maior.\n\nNo entanto, tenha cuidado: à medida que a Centralização aumenta, a Coesão será afetada negativamente."
 TUTORIAL_GALACTIC_COMMUNITY_TITLE: "Tutorial: Comunidade Galáctica"
 TUTORIAL_GALACTIC_COMMUNITY_DESC: "Boas-vindas à §HComunidade Galáctica§!, onde diplomatas de toda a galáxia reúnem-se para definir as leis galácticas por meio da votação de §SResoluções§!.\n\nVocê pode apoiar §SResoluções Propostas§! na §SFila§!, somando seu §SPeso Diplomático§! ao total de apoio.\n\nA resolução com mais apoio será levada ao §SSenado§! quando este estiver em sessão, onde será votada para decidir se deve se tornar uma §SLei Galáctica§!.\n\nAtenção ao §SFoco Galáctico§!, pois ele define um objetivo comum para a comunidade.\n\nPor fim, nesta tela é possível ver todos os impérios membros e os §SModificadores Galácticos§! ativos aplicados por resoluções aprovadas."
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_TITLE: "Tutorial: Emissários"
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_DESC: "£envoy£ §SEmissários§! podem ser designados à Comunidade Galáctica para aumentar o seu §SPeso Diplomático§!. Emissários que são designados à Comunidade Galáctica podem mais tarde ser designados a outras §SAções Diplomáticas§!."
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_TITLE: "Tutorial: Senado"
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_DESC: "É no §HSenado§! que a Comunidade Galáctica vota para aprovar ou rejeitar a resolução da §SFila§! que obteve mais apoio. Como membro, você pode votar de três formas: §SSim, Não ou Abster-se§!. Se a resolução for aprovada, ela se torna uma §SLei Galáctica§! e afeta todos os membros da Comunidade Galáctica. Se for rejeitada, não poderá ser proposta novamente por algum tempo.\n\nImpérios que não se abstêm ganham um §SAumento de Opinião§! com aqueles que votaram da mesma forma e uma redução com aqueles que votaram contra.\n\nSe você conquistou §SFavores§! diplomáticos de outros impérios, pode usá-los aqui para aumentar seu §SPeso Diplomático§! na votação do §SSenado§!."
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_TITLE: "Tutorial: Resoluções"
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_DESC: "A tela §HResoluções§! exibe a lista de resoluções atualmente em vigor. Você pode §SPropor uma Nova Resolução§! selecionando-a de uma cadeia de Resoluções, o que custará £influence£ Influência.\n\nÉ possível propor apenas a primeira §SResolução§! ainda não implementada de uma cadeia. Cada etapa prepara o terreno para mudanças mais profundas, embora o apoio não seja garantido.\n\nCaso uma §SResolução§! seja aprovada, a próxima na cadeia só poderá ser proposta após alguns anos."
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_TITLE: "O Conselho Galáctico"
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_DESC: "O §HConselho Galáctico§! foi estabelecido. Uma §SEleição§! iniciará, e os membros com o maior peso diplomático ganharão §SPosições no Conselho§!. Membros do Conselho possuem um Peso Diplomático maior e podem forçar uma Proposta no Senado como uma §SResolução Emergencial§!.\n\nA capacidade de §SVeto do Conselho§! pode ser liberada ao passar resoluções para fortalecer o Conselho. Membros do Conselho também possuem acesso a §SResoluções Especiais§!."
 TUTORIAL_EMPIRE_SPRAWL_TITLE: "Tutorial: $EMPIRE_SIZE$"
 TUTORIAL_EMPIRE_SPRAWL_DESC: "£empire_sprawl£ §H$EMPIRE_SIZE$§! é uma medida da extensão territorial do seu império, com base nos £system£ §SSistemas§! controlados, £colony£ §SColônias§!, £district£ §SDistritos§! e população total.\n\nUm Tamanho do Império elevado sobrecarrega a §SCapacidade Administrativa§!, aumentando os custos de §STecnologias§!, £traditions£ §STradições§!, £leader£ §SLíderes§! e §SEditos§!."
 TUTORIAL_FIRSTCONTACT_VIEW_TITLE: "Tutorial: Designar Emissário"
 TUTORIAL_FIRSTCONTACT_VIEW_DESC: "Entramos em contato com uma nova entidade – talvez uma §Scriatura espacial§! ou outro §Simpério§!. Podemos aprender mais sobre ela ao fazer um §HPrimeiro Contato§!.\n\nPrecisaremos designar um £envoy£ §SEmissário§! para esta missão. Ele trabalhará para estabelecer comunicações com a entidade e decifrar qualquer idioma que possa utilizar.\n\nPara designar um §SEmissário§!:\n\n£dot_green£ Clique no retrato na janela de §SPrimeiro Contato§!\n£dot_green£ Selecione um dos §SEmissários§! disponíveis"
 TUTORIAL_CRISIS_VIEW_TITLE: "Tutorial: Torne-se a Crise"
 TUTORIAL_CRISIS_VIEW_DESC: "Agora estamos a caminho de nos §STornarmos a Crise§!. Este caminho libera bônus especiais, que vão nos fortalecer para nos tornarmos uma força mais ameaçadora dentro da galáxia.\n\nA tela §SCrise§! mostra nossos objetivos: ações específicas que podemos executar para ganharmos §S[GetCrisisResource]§!. Ganhar [GetCrisisResource] desbloqueia os §SNíveis de Crise§! e §SRegalias§! necessários para liberar todo o nosso potencial na galáxia.\n\nConforme nosso império se torna cada vez mais ameaçador àqueles ao nosso redor, a Comunidade Galáctica pode escolher se unir e nos declarar como §SAmeaça à Galáxia§!."
 TUTORIAL_CRISIS_VIEW_LEVEL1_TITLE: "Tutorial: Níveis de Crise"
 TUTORIAL_CRISIS_VIEW_LEVEL1_DESC: "Conforme avançamos no caminho para nos §STornarmos a Crise§! e atingirmos exigências específicas, liberaremos novos níveis. Cada nível traz bônus diferentes, tais como §SRegalias de [GetCrisisResource]§! e §Snaves§! especiais.\n\nAssim que atingirmos o §SNível 5§! – ou quando formos declarados como Crise pela Comunidade Galáctica – teremos confrontado toda a galáxia. Nesse momento, também entraremos em §SGuerra Total§! com a Comunidade Galáctica."
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_TITLE: "Tutorial: Redes Espiãs"
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_DESC: "Um de nossos £envoy£ §SEmissários§! está construindo uma §SRede Espiã§! neste império.\n\nO §SNível de Infiltração§! aumentará com o tempo, dependendo do §Svalor atual da Rede Espiã§! e do £empire_sprawl£ §STamanho do Império§! alvo. Conforme a Rede Espiã cresce, obteremos mais §SInteligência§! sobre o alvo. Também poderemos lançar §SOperações§! secretas na §Saba Espionagem§!.\n\nCaso nenhum Emissário permaneça designado à rede, ou se sua existência for revelada durante uma §SOperação§! secreta, ela começará a se §Pdeteriorar§!."
 TUTORIAL_ESPIONAGE_VIEW_TITLE: "Tutorial: Espionagem"
 TUTORIAL_ESPIONAGE_VIEW_DESC: "A aba §SEspionagem§! mostra como nossos £envoy£ §SEmissários§! estão construindo Redes Espiãs nos domínios de outros impérios. Aqui, você pode acessar o §Sregistro da Inteligência§!, bem como visualizar e lançar §SOperações§!.\n\nAs Operações podem ser realizadas em impérios onde temos um §SEmissário§! gerenciando uma Rede Espiã. Cada tipo de Operação exige que a Rede Espiã atinja um nível específico antes que possa ser iniciada."
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_TITLE: "Tutorial: Operações de Espionagem"
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_DESC: "Agora que nossa Rede Espiã chegou a um nível suficiente, podemos iniciar §SOperações§! contra este Império. Elas são ordenadas em categorias, com diferentes tipos de Operações levando a resultados diferentes - algumas mais perigosas que outras.\n\nAs categorias de Operação incluem: §S$op_cat_subterfuge$§!, §S$op_cat_manipulation$§!, §S$op_cat_sabotage$§! e §S$op_cat_provocation$§!. Operações do tipo Sabotagem e Provocação tendem a ser mais exigentes, e possuem §Spenalidades diplomáticas§! mais sérias se formos pegos."
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_TITLE: "Tutorial: Designando Ativos"
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_DESC: "§SAtivos§! são agentes e artefatos valiosos que fornecem efeitos diferentes para nossas atividades de Espionagem. Eles trabalham dentro da Rede Espiã e podem ser designados para Operações, onde podem abrir novas oportunidades ou nos ajudar a ficar fora de problemas.\n\nPodemos receber Ativos através de eventos, ou ao realizar a Operação §SAdquirir Ativo§! . Se uma Rede Espiã deixa de existir, seus Ativos também são perdidos."
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_TITLE: "Tutorial: Megaestruturas"
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_DESC: "Nesta lista, nós podemos escolher e [GetBuildGrow] uma £megastructure£ §SMegaestrutura§! dentro deste £system£ §SSistema Solar§!. Alguns projetos só ficam disponíveis após descobrirmos e pesquisarmos uma §STecnologia§! relevante.\n\nAs sub-rotinas de Minha Ambição Galáctica foram totalmente ativadas. Recomendo que você aproveite essas oportunidades para deixar uma impressão duradoura na galáxia."
 TUTORIAL_ORBITAL_RING_TITLE: "Tutorial: Anel Orbital"
 TUTORIAL_ORBITAL_RING_DESC: "§SAnéis Orbitais§! são £megastructure£ §SMegaestruturas§! colossais construídas para circundar completamente um £planet£ §SPlaneta§!. Eles funcionam como uma ponte eficiente entre o espaço e a superfície do planeta, oferecendo espaço para instalações como estaleiros, estruturas defensivas e hubs de recursos.\n\nNa tela Anel Orbital, podemos adicionar ou remover £building£ §SConstruções§! e §SMódulos§!, além de aumentar o nível do Anel Orbital. Cada nível desbloqueia novos espaços de construção, mas há um limite de níveis determinado pela infraestrutura planetária."
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_TITLE: "Tutorial: Termos Configuráveis"
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_DESC: "Nesta tela, é possível escolher uma §SPredefinição§! para o nosso Acordo e configurar os termos individuais dele. Cada predefinição oferece um conjunto personalizado de responsabilidades e obrigações tanto para o Súdito quanto para o Lorde Supremo.\n\nNós podemos fazer alterações na lista de §STermos§! que vão ajustar a §SLealdade§! de um jeito que agrade o outro império, tornando o Acordo mais interessante para os dois lados."
 TUTORIAL_AGREEMENTS_TITLE: "Tutorial: Visão Geral de Acordos"
 TUTORIAL_AGREEMENTS_DESC: "A tela §SAcordos§! oferece uma visão geral dos Acordos entre Súdito e Lorde Supremo. Nós podemos usar essa tela para monitorar a §SLealdade§!, gerenciar §SPropriedades§! e §SComércio§! e renegociar os §STermos§! de Acordos existentes. Também é possível encerrar um Acordo se ele já não nos serve mais."
 TUTORIAL_AGREEMENTS_NO_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_NO_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$\n\nImpérios Súditos podem escolher se tornar §SImpérios Especialistas§!. A especialização oferece benefícios significativos para questões como produção de recursos ou capacidade militar, mas o império terá desvantagens em outras áreas.\n\nImpérios Especialistas também aumentam a §SLealdade§!. Desde que mantenham uma quantidade estável de Lealdade, os Impérios Especialistas vão continuar obtendo EXP e progredindo para níveis mais elevados na especialidade escolhida."
 TUTORIAL_HOLDINGS_TITLE: "Tutorial: Propriedades"
 TUTORIAL_HOLDINGS_DESC_SHARED: "A tela §SPropriedades§! oferece uma visão geral de todas as Propriedades deste £planet£ §SPlaneta§!. Com isso, os impérios podem colocar tipos diferentes de £building£ §SConstruções§! nas capitais e nas £colony£ §SColônias§! uns dos outros. Isso pode afetar questões como a Diplomacia, Inteligência e produção de recursos."
 TUTORIAL_HOLDINGS_DESC_MEGA_CORP: "Megacorporações podem abrir §SFiliais§! nos mundos de outros impérios, desde que haja algum tipo de acordo diplomático. Como sabemos, grandes corporações só querem o melhor para os clientes, apesar dos eventos do ciclo 23!"
 TUTORIAL_HOLDINGS_DESC_OVERLORD: "§SLordes Supremos§! podem usar Propriedades para estender ainda mais o alcance deles no domínio de um §SSúdito§!. Muitas dessas Propriedades afetam a Lealdade, e algumas são feitas especialmente para Impérios Especialistas. Também é mais fácil fazer aprimoramentos nesta tela."
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_PLANETVIEW_COLONY_GOV_TITLE: "Tutorial: Recrutar Governador"
 TUTORIAL_PLANETVIEW_COLONY_GOV_DESC: "Para ajudar nossa nova £colony£ §SColônia§!, deveríamos recrutar um §SGovernador§! Planetário para supervisionar as operações.\n\nA maioria dos nossos mundos consegue se manter perfeitamente sem o luxo de um §SGovernador§!, e em vez disso recebem um bônus de acordo com nosso tipo de governo. Mas os £planet£ §SPlanetas§! com a sorte de contar com um §SGovernador§! poderão aproveitar grandes vantagens!\n\nGovernadores podem gerar diversos efeitos diferentes nos planetas que administram, a maioria positivos. Esses efeitos dependem das §SCaracterísticas§! e do nível de habilidade do §SGovernador§!."
 TUTORIAL_ELECTION_VIEW_TITLE: "Tutorial: Eleições"
 TUTORIAL_ELECTION_VIEW_DESC: "A tela §SEleição§! é onde decidimos quem será o novo governante do nosso império.\n\n[TutorialElectionViewTypeSpecific]"
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_NO: "Candidatos válidos são escolhidos entre seus £leader£ §SLíderes§! atuais, e se você tiver recursos para gastar poderá escolher o próximo governante."
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_YES: "Candidatos válidos são escolhidos entre seus £leader£ §SLíderes§! atuais e é possível impulsioná-los aumentando seu apoio a eles... da maneira mais democrática possível, é claro."
 TUTORIAL_EDICTS_AND_POLICIES_TITLE: "Tutorial: Políticas e Editos"
 TUTORIAL_EDICTS_AND_POLICIES_DESC: "A aba §SPolíticas§! inclui §SPolíticas§! governamentais e §SEditos§! que valem para todo o império, práticas essas que podem ser impostas usando parte de nossos recursos.\n\nGeralmente há várias posturas possíveis a serem assumidas em relação a qualquer §SPolítica§!, mas elas podem ser limitadas por nossa tecnologia ou §SÉtica§!.\n\nEditos têm um custo de manutenção mensal, pago com nosso §H$EDICT_FUND$§!, com £unity£ §SUnidade§! ou, às vezes, com outros recursos."
 TUTORIAL_COUNCIL_VIEW_TITLE: "Tutorial: Conselho e Interesses"
 TUTORIAL_COUNCIL_VIEW_DESC: "A tela §SConselho§! é onde nomeamos os £leader£ §SLíderes§! que nos guiarão rumo ao futuro. Suas personalidades e §SCaracterísticas§! influenciarão nosso império, para o bem ou para o mal. Podemos definir §SInteresses§! para concentrar seus esforços em uma área específica.\n\nUm §SConselheiro§! pode ser designado ou substituído a qualquer momento e ainda assumir outras funções, como comandar uma £science_ship£ §SNave Científica§!. A única exceção é o nosso Governante. [TutorialCouncilViewDlcSpecific]O progresso dos §SInteresses§! depende dos níveis dos conselheiros, do nosso $EMPIRE_SIZE$, e em certos casos da Ética deles. Quando um Interesse termina, é possível ativá-lo para obter um efeito mais forte e liberar espaço para um novo."
 TUTORIAL_COUNCIL_VIEW_PARAGON_NO: "\n\n"
 TUTORIAL_COUNCIL_VIEW_PARAGON_YES: "\n\nPara liberar mais §SPosições no Conselho§!, precisaremos de duas coisas: um §SComponente Cívico§! adequado e concluir um Interesse específico.\n\n"
 TUTORIAL_ASSIGN_COUNCILOR_TITLE: "Tutorial: Características de Conselheiro"
 TUTORIAL_ASSIGN_COUNCILOR_DESC: "Alguns £leader£ §SLíderes§! possuem §SCaracterísticas de Conselheiro§!. Estas geralmente têm mais impacto e efeitos mais abrangentes, mas só poderão ser ativadas se o líder estiver no Conselho.\n\n§SPosições no Conselho§! concedem efeitos próprios. Quanto maior o nível da habilidade do líder designado, mais fortes os efeitos se tornarão."
 TUTORIAL_LEADER_LEVEL_UP_TITLE: "Tutorial: Habilidade de Líder"
 TUTORIAL_LEADER_LEVEL_UP_DESC: "Um £leader£ §SLíder§! em nosso império alcançou um novo nível de §SHabilidade§!! Isso aumentará os bônus que ele ou ela gera e garantirá uma nova Característica.[TutorialLeaderLevelUpDlcSpecific]Para visualizar os §SLíderes§! disponíveis:\n\n£dot_green£ Clique no botão §S$topbar_button_leaders_name$§! na barra à esquerda ou pressione §SF5§!\n\n$tttt$$tt$£leaders£\n\n§SLíderes§! podem ganhar características negativas conforme envelhecem, portanto, sua substituição é uma escolha natural."
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_NO: "\n\n"
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_YES: "\n\nPara guiar o crescimento de um £leader£ §SLíder§!, podemos escolher suas §SCaracterísticas§!. As Características podem ser selecionadas posteriormente sem interromper o progresso. Após alguns níveis, uma §SSubclasse§! ficará disponível, concedendo bônus e influenciando as futuras opções de Características.\n\nHá diversos tipos e raridades de Características: algumas são aprimoráveis, outras mutuamente exclusivas, outras ainda geram tanto efeitos positivos quanto negativos. Mas em geral todas são permanentes.\n\n"
