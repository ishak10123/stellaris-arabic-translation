 advisor.1.desc_30: "Bênçãos sobre vós, Sua Santidade.\n\nEu sou VIR, um protótipo de inteligência sintética. \"Fui ordenado pelo Colégio dos Sacerdotes para agir como seu fiel servo e conselheiro, para que eu possa lhe auxiliar no nosso caminho divino para as estrelas.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_31: "Boas-vindas, [root.GetBloodCourtRulerTitle].\n\nEu sou VIR, um protótipo de inteligência sintética desenvolvido altamente em segredo pelos militares. A Corte me nomeou para servir como seu conselheiro e analista estratégico.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_32: "Saudações, [root.GetPurityOrderRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_33: "Saudações, [root.GetPurificationCommitteeRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_34: "Saudações, $RT_OLIGARCH$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_35: "Saudações, $RT_DEFENSIVE_UNION$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_36: "Saudações, $RT_DIMENSIONAL_COVENANT$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_keenminds: "Eu sou VIR, um protótipo de inteligência sintética desenvolvido pelas melhores mentes em nossa civilização, para servir como seu conselheiro. Me esforçarei para realizar com minhas tarefas com a máxima eficiência."
 advisor.1.desc_honortoserve: "Eu sou VIR, um protótipo de inteligência sintética desenvolvido altamente em segredo pelos militares. Estou honrado em servir como seu conselheiro e analista estratégico."
 advisor.1.desc_filler: "Você pode alterar o nível de tutorial a qualquer momento no menu Configurações."
