 advisor.1.name: "Conselheiro Online"
 advisor.1.desc_01: "Bom dia, Sr. Presidente.\n\nEu sou VIR, um protótipo de inteligência sintética. Minha função é oferecer conselhos e ajuda enquanto buscamos nosso destino entre as estrelas.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_02: "Bom dia, Sra. Presidente.\n\nEu sou VIR, um protótipo de inteligência sintética. Minha função é oferecer conselhos e ajuda enquanto buscamos nosso destino entre as estrelas.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_03: "Bom dia, Diretor.\n\nEu sou VIR, um protótipo de inteligência sintética. A Sede Corporativa me ativou recentemente para que eu possa servir como seu assistente em nossa contínua missão de buscar novos mercados interestelares.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_04: "Sua Majestade Imperial.\n\nEu sou VIR, um protótipo de inteligência sintética e seu humilde servo. Minha função é dar-lhe conselho e ajuda enquanto o senhor lidera o nosso império em direção ao grande desconhecido.\n\n$advisor.1.desc_filler$"
 #advisor.1.desc_05: "Good day, Lord Protector.\n\nI am VIR, a prototype synthetic intelligence and your humble servant. My role is to provide you with advice and counsel as you lead our empire into the great unknown.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_06: "Bom dia, Chefe do Executivo.\n\nEu sou VIR, um protótipo de inteligência sintética. Fui ativado pela Sede Corporativa para servir como assistente em nossa missão contínua para encontrar novos £market£ §SMercados§! interestelares.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_07: "Que a paz esteja convosco, Sua Majestade.\n\nEu sou VIR, um protótipo de inteligência sintética. Minha tarefa será dar-lhe assistência e conselho enquanto nos aventuramos além da segurança de nosso planeta natal pela primeira vez na história.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_08: "Saudações, Chanceler.\n\nEu sou VIR, um protótipo de inteligência sintética desenvolvido pelas melhores mentes de nossa civilização, para servir como seu conselheiro. Me esforçarei para desempenhar minhas tarefas com a máxima eficiência.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_09: "Saudações, Diretor.\n\nEu sou VIR, um protótipo de inteligência sintética desenvolvido pelas melhores mentes de nossa civilização, para servir como seu conselheiro. Me esforçarei para desempenhar minhas tarefas com a máxima eficiência.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_10: "Saudações, Supremo Lorde.\n\nEu sou VIR, um protótipo de inteligência sintética desenvolvido pelas melhores mentes de nossa civilização, para servir como seu conselheiro. Me esforçarei para desempenhar minhas tarefas com a máxima eficiência.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_11: "Bem-vindo, Cônsul.\n\nEu sou VIR, um protótipo de inteligência sintética desenvolvido altamente em segredo pelos militares. O Alto Comando me ativou para servir como seu conselheiro e analista estratégico.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_12: "Bem-vindo, Arconte.\n\nEu sou VIR, um protótipo de inteligência sintética desenvolvido altamente em segredo pelos militares. O Alto Comando me ativou para servir como seu conselheiro e analista estratégico.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_13: "Bem-vindo, Grão Marechal.\n\nEu sou VIR, um protótipo de inteligência sintética desenvolvido altamente em segredo pelos militares. O Alto Comando me ativou para servir como seu conselheiro e analista estratégico.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_14: "Bençãos sobre vós, Sua Santidade.\n\nEu sou VIR, um protótipo de inteligência sintética. \"Fui ordenado pelo Colégio dos Sacerdotes para agir como seu fiel servo e conselheiro, para que eu possa lhe auxiliar no nosso caminho divino para as estrelas.\n\n$advisor.1.desc_filler$"
