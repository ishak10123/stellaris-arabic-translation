 full_tutorial: "Missões tutoriais e descrições da interface enquanto você explora as mecânicas do jogo.\n\nRecomendado se esta é a primeira vez que você estiver jogando este jogo."
 tips_only: "Você receberá dicas e sugestões enquanto explora os §SSistemas§! do jogo.\n\nRecomendado para jogadores iniciantes ou intermediários."
 no_tutorial: "Sem ajuda ou tutorial.\n\nRecomendado para jogadores experientes."
 recycle_vir: "§RSucatear§! a memória RAM do VIR:\n§G+2§! £minerals£\n\n\n"
 advisor.2.name: "Tutorial: Registro de Situações"
 advisor.2.desc: "Construir um império estelar pode ser uma tarefa assustadora.\n\nPara ajudar a começar as coisas, vou fornecer §SMissões§! de instrução que cobrem os passos básicos necessários para nos estabelecermos como uma potência interestelar bem-sucedida.\n\nPara acessar as §SMissões§!:\n\n£dot_green£Clique no botão §SRegistro de Situações§! na barra à esquerda ou pressione §SF1§!\n\n$tttt$$tt$£situation_log£\n"
 advisor.2.a: "Entendido."
 advisor.3.name: "Dicas Inicializadas"
 advisor.3.desc: "Muito bem. Fornecerei dicas e explicarei as funções básicas das diversas ferramentas enquanto você as explora."
 advisor.10.name: "Tutorial: Anomalias"
 advisor.10.desc: "Encontramos uma §SAnomalia§!!\n\n De vez em quando, nossas £science_ship£ §SNaves Científicas§! farão essas descobertas durante a inspeção de mundos alienígenas.\n\n§SAnomalias§! podem ser pesquisadas por um £scientist£ §SCientista§!, caso suas habilidades estejam à altura da tarefa!\n\n§SAnomalias§! não pesquisadas ficam listadas na aba §SAnomalias§!, no §SRegistro de Situações§!. Algumas devem ser investigadas antes que o £planet£ §SPlaneta§! onde foram encontradas possa ser colonizado ou explorado."
 advisor.15.name: "Tutorial: Colonização"
 advisor.15.desc: "Uma de nossas £science_ship£ §SNaves Científicas§! acabou de inspecionar um mundo que seria um excelente candidato à nossa primeira £colony£ §SColônia§!. Ele é da mesma §Sclasse planetária§! que nosso mundo natal, então os colonizadores vão se sentir em casa por lá.\n\nAntes de colonizarmos este mundo, precisamos ampliar nossas fronteiras.\n\nCom a £construction_ship£ §SNave de Construção§! selecionada:\n\n£dot_green£ Clique com o botão direito em um £system£ §SSistema§! inspecionado que contém uma colônia em potencial\n£dot_green£ Selecione §S[GetBuildGrowCap] Base Estelar§!\n\n$tttt$$ttt$£colonizable£\n\nQuando o §SSistema§! for reivindicado, poderemos iniciar o processo de colonização."
 advisor.17.name: "Tutorial: Primeira Colônia"
 advisor.17.desc: "Parabéns pela colonização de um novo mundo! Nossos colonizadores estão agora construindo seu primeiro assentamento, mas levará tempo para que se tornem autossuficientes.\n\nA £colony£ §SColônia§! irá consumir nossos recursos até que o primeiro assentamento seja concluído, então tome cuidado para não colonizar muitos £planet£ §SPlanetas§! ao mesmo tempo."
 advisor.20.name: "Tutorial: Renda Negativa"
 advisor.20.desc: "Estamos perdendo £energy£ Créditos Energéticos em uma proporção alarmante. O relatório do orçamento do mês passado é uma leitura cruel.\n\nCustos de manutenção crescentes são uma causa comum para déficits orçamentários. Se esse for o caso, devemos considerar dispensar algumas de nossas naves, estações ou exércitos."
 #advisor.27.name: "First Contact"
 #advisor.27.desc_01: "We have made first contact with an alien empire! These hideous creatures appear to have mastered space flight, just as we have. They could pose a significant threat.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_02: "We have made first contact with an alien empire! These fascinating beings appear to have mastered space flight, just as we have. We should strive to learn more about them.\n\nTheir empire will now be listed in the §SContacts§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_03: "We have made first contact with an alien empire! They appear to have mastered space flight, just as we have. I recommend a healthy degree of caution until we learn their intentions.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.28.name: "Fallen Empire"
 #advisor.28.desc: "We have encountered an ancient and highly advanced civilization! Fortunately for us, they appear to be in decline and it is doubtful whether they even fully understand their own technology anymore.\n\nThey will likely keep to themselves unless antagonized, and we should steer clear of their space - at least until we have reached technological parity."
