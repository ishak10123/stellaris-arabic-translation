l_braz_por:
 ##THE WORLD IS BLEEDING
 strange_worlds.1.name: "O Mundo Está Sangrando"
 strange_worlds.1.desc: "A superfície de §Y[Root.GetName]§! está exibindo uma reação inédita aos nossos esforços de construção. Uma substância viscosa não identificada está começando a escorrer dos alicerces de instalações importantes.\n\nA substância é um tipo de líquido vermelho, gelatinoso e extremamente aderente ao toque.\n\nNossa equipe de [Owner.GetScientistPlural] está ansiosa para começar a estudar o fenômeno mais a fundo. No momento, é apenas uma inconveniência, mas é aconselhável garantir a segurança de nossa população de [Owner.GetColonistPlural]."
 strange_worlds.5.name: "Hemorragia Grave"
 strange_worlds.5.desc: "§Y[Root.GetName]§! relata desenvolvimentos problemáticos acerca do estranho líquido avermelhado.\n\nA substância está saindo do controle, escorrendo em ritmo mais acelerada nas áreas afetadas.\n\nO líquido tem seus benefícios. Durante a coagulação, suas propriedades aderentes são intensificadas, formando uma argamassa natural que pode ser usada para complementar nossas construções.\n\nPorém, é praticamente impossível remover a substância de [Owner.GetColonistPlural] que entraram em contato com ela. Tratar e estudar as vítimas nos permitiria reunir mais informações, mas retardaria o progresso das construções."
 strange_worlds.5.a: "Trate e estude os indivíduos afetados."
 strange_worlds.5.b: "Continue construindo."
 strange_worlds.15.name: "Montanha de Sangue"
 strange_worlds.15.desc: "A construção em §Y[Root.GetName]§! continua em ritmo excelente, mas a emergência da substância viscosa não está mais limitada apenas aos alicerces de nossas instalações.\n\nFissuras hemorrágicas foram descobertas em diversos locais. Inicialmente, apenas objetos que não são nativos a [Root.GetName] eram afetados pela substância, mas agora ela está se espalhando indiscriminadamente.\n\nO material já consumiu boa parte da superfície de [Root.GetName] e está coagulando rapidamente em um mineral espesso que envolve o mundo.\n\nPor meio de um processo oneroso de tentativa e erro, nossos engenheiros descobriram uma maneira de mitigar danos futuros e coletar de modo eficaz a substância. Isso só foi possível porque cedemos grandes porções de terra ao líquido."
 strange_worlds.15.a: "Um desenvolvimento interessante."
 strange_worlds.20.name: "Parasita"
 strange_worlds.20.desc: "Após o estudo intenso e tratamento dos trabalhadores afetados em §Y[Root.GetName]§!, nossos cientistas isolaram a causa do problema.\n\nO que inicialmente se apresentava como uma substância gelatinosa e viscosa é, de fato, um agrupamento de micro-organismos parasitas que desenvolveram uma relação simbiótica com o planeta. Os parasitas decompõem a matéria orgânica sob a crosta de [Root.GetName] e a recicla em novos materiais.\n\nO distúrbio causado pelo desenvolvimento de [Root.GetName] perturbou o ciclo natural, acarretando uma reação com as substâncias externas que introduzimos no ecossistema.\n\nCom mais tempo, nossa equipe científica está confiante de que pode encontrar uma maneira de trabalhar em harmonia com essas formas de vida, integrando sua biologia singular às cadeias de produção de [Root.GetName]."
 strange_worlds.20.a: "Fascinante. Prossiga."
 strange_worlds.25.name: "Relação Produtiva"
 strange_worlds.25.desc: "Por meio de uma pesquisa extensiva, nossos cientistas criaram uma espécie variante dos micro-organismos parasíticos em §Y[Root.GetName]§!. Essa mutação foi desenvolvida para reconhecer nossos materiais como adições inofensivas à sua ecologia natural, nos permitindo retomar a construção sem novos problemas.\n\nApós serem introduzidos à biosfera do planeta, nossos parasitas alterados foram integrados com êxito.\n\nAlém disso, ao adaptar os processos de decomposição originais dos micro-organismos, conseguimos utilizar as propriedades aderentes da substância para impulsionar os esforços de construção no planeta."
 strange_worlds.25.a.evopred: "E o que eles podem nos ensinar?"
 strange_worlds.30.name: "Inesperado"
 strange_worlds.30.desc: "Enquanto preparávamos a terra para a expansão em §Y[Root.GetName]§!, uma enorme estrutura parece ter surgido de repente.\n\nA estrutura está emitindo ondas energéticas altamente instáveis, fazendo com que ela apareça e desapareça em intervalos irregulares. Isso explica por que sua presença não foi detectada pelas análises iniciais deste setor.\n\nQuando visível, é possível identificar símbolos incompreensíveis em seu exterior vedado, mas não correspondem a nenhum idioma conhecido.\n\nNenhuma função aparente pode ser inferida. Até então, o construto não parece perigoso, mas está obstruindo o desenvolvimento da área."
 strange_worlds.30.a: "Investigue."
 strange_worlds.35.name: "Anomalias Visuais"
 strange_worlds.35.desc.no_cloak: "Análises da construção cintilante em §Y[Root.GetName]§! nos permitem presumir que o objeto está dobrando ou distorcendo a luz de alguma forma.$strange_worlds.35.desc.common_1$Embora nossa compreensão acerca das propriedades da construção tenha aumentado, ainda não conseguimos acessar seu interior, se é que isso é possível.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.cloak: "Análises da construção cintilante em §Y[Root.GetName]§! nos permitem presumir que o objeto está de alguma forma produzindo um efeito de camuflagem intermitente.$strange_worlds.35.desc.common_1$Embora nossa compreensão acerca dos efeitos de camuflagem da construção tenha aumentado, ainda não conseguimos acessar seu interior, se é que isso é possível.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.common_1: "\n\nFoi detectada uma atividade geotérmica excepcional no manto de silicato do subsolo. Essa potente fonte de energia alimenta a estrutura isolada, mas seus níveis flutuam drasticamente.\n\n"
 strange_worlds.35.desc.common_2: "\n\nSeu exterior vedado é composto de materiais desconhecidos e altamente reativos. Tentativas iniciais de forçar a entrada apenas desestabilizaram ainda mais os campos eletromagnéticos da construção. Poderíamos cortar o exterior para entrar e aprender mais, contudo, há um risco considerável de causarmos uma desestabilização imprevisível."
 strange_worlds.35.a: "Use a força bruta."
 strange_worlds.35.b: "Prossiga com os estudos do exterior."
 strange_worlds.40.name: "Reação Descontrolada"
 strange_worlds.40.desc: "Tentativas de forçar a entrada na estrutura em §Y[Root.GetName]§! resultaram em desastre. Nosso equipamento desestabilizou ainda mais os padrões energéticos da construção, acarretando uma série de explosões poderosas. Agora, tudo o que resta são cinzas e destroços.\n\nPorém, a destruição acidental trouxe um desfecho inesperado. As ruínas de um assentamento alienígena há muito abandonado surgiu em um vale próximo.\n\nAo que tudo indica, o objeto estava projetando um poderoso campo de camuflagem sobre a antiga colônia. Não sabemos do que eles estavam se escondendo, mas apesar de seus esforços, está claro que não foi o bastante. Nada de valor arqueológico permanece intacto.\n\nO funcionamento dessa tecnologia inusitada ainda é um mistério, mas ganhamos algum conhecimento com a experiência. Vamos adaptar essa poderosa fonte de energia geotérmica para a nossa própria colônia."
 strange_worlds.40.a: "Um recurso valioso."
 strange_worlds.40.a_ct: "Bloqueador §YEstrutura Cintilante§! liberado"
 strange_worlds.45.name: "Câmara de Comando"
 strange_worlds.45.desc.intro: "Estudos detalhados do exterior da estrutura alienígena em §Y[Root.GetName]§! identificaram as estranhas marcações como um tipo de interface. Conseguimos manipulá-las para que abrissem uma porta oculta para o interior deserto da construção, revelando uma enorme câmara de controle.\n\nEmbora desconheçamos seu funcionamento interno, adquirimos uma compreensão basilar dos comandos por tentativa e erro. A interrupção de suas funções trouxe um desfecho inesperado: as ruínas de um assentamento alienígena há muito abandonado surgiu em um vale próximo.\n\nAo que tudo indica, o objeto estava projetando um poderoso campo de camuflagem sobre a antiga colônia. Não sabemos do que eles estavam se escondendo, mas apesar de seus esforços está claro que não foi o bastante. Embora nada de valor arqueológico permaneça intacto, nossos cientistas fizeram excelente uso da câmara de comando."
 strange_worlds.45.desc.a: "$strange_worlds.45.desc.intro$\n\nAgora podemos estabilizar e expandir o estranho efeito de camuflagem da construção para que cubra todo o vale. Isso será de grande benefício para a segurança de nossa colônia."
 strange_worlds.45.desc.b: "$strange_worlds.45.desc.intro$\n\nAgora podemos estabilizar e expandir o efeito de camuflagem da construção para que cubra todo o vale. Também aumentamos consideravelmente nosso conhecimento acerca de tecnologias de camuflagem."
 strange_worlds.45.a: "Uma descoberta valiosa."
 strange_worlds.55.name: "Choque Natural"
 strange_worlds.55.desc.intro: "Uma espécie abundante de megafauna herbívora começou a interromper a produção de energia de §Y[Root.GetName]§!. Em uma demonstração dramática de suicídio em massa, eles estão se eletrocutando nas estações de energia.\n\nOs animais são extremamente focados em seu propósito, derrubando as cercas ao redor das redes elétricas para alcançar seu objetivo. A geração de energia está sendo prejudicada por esse comportamento peculiar.\n\n"
 strange_worlds.55.desc.outro: "A espécie desempenha um papel fundamental no ecossistema do planeta. No atual ritmo dos incidentes, ela entrará em extinção."
 strange_worlds.55.desc.a: "$strange_worlds.55.desc.intro$No entanto, isso acarretou um aumento inesperado na produção de comida depois de [Owner.GetColonistPlural] descobrirem que a carne das criaturas é deliciosa.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.desc.b: "$strange_worlds.55.desc.intro$Embora isso esteja aumentando a quantidade de biomassa que podemos coletar, o fato é bastante inconveniente.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.a: "Investigue esse comportamento."
 strange_worlds.60.name: "Fisiologia Catalítica"
 strange_worlds.60.desc: "Fizemos descobertas valiosas acerca da espécie suicida em §Y[Root.GetName]§!.\n\nEsses espécimes de megafauna são essencialmente cegos e usam a ecolocalização para enxergar e identificar uns aos outros. Suspeitamos que nossas redes elétricas estão emitindo uma frequência que sobrecarrega sua audição aguçada, provocando esse comportamento agressivo contra nossas estações de energia.\n\nAlém disso, descobrimos que suas enzimas digestivas singulares podem atuar como um catalizador durante o refinamento de metais. Testes iniciais mostram um potencial para aumentar nossa produção de ligas metálicas.\n\nApesar dessas descobertas, ainda estamos longe de normalizar a produção de energia. Nossos cientistas continuam a investigar o problema."
 strange_worlds.60.a: "$FASCINATING$"
 strange_worlds.65.name: "Magnetismo Animal"
 strange_worlds.65.desc.intro: "Identificamos a causa dos impulsos agressivos e suicidas das criaturas em [Root.GetName].\n\nNovos estudos observacionais de comportamentos sociais e ecolocalização revelaram uma verdade chocante: seu chamado de acasalamento tem uma frequência quase idêntica aos sons gerados pelas redes elétricas.\n\n"
 strange_worlds.65.desc.common: "Poderíamos recriar os chamados dessas criaturas para desviar suas rotas migratórias para longe de nossa colônia, estabilizando sua população. Isso nos permitirá coletar as enzimas catalíticas de seus dejetos para impulsionar a produção de ligas metálicas enquanto continuamos a estudar sua fisiologia singular.\n\nPor outro lado...\n\n"
 strange_worlds.65.desc.outro: "Poderíamos criar facilmente extratores eletrificados específicos para processar esses animais sem interromper a produção de energia."
 strange_worlds.65.desc.devouring_swarm: "$strange_worlds.65.desc.intro$Por sorte, podemos usar esse conhecimento para direcionar as criaturas até extratores especializados. Vamos saboreá-las."
 strange_worlds.65.desc.food: "$strange_worlds.65.desc.intro$$strange_worlds.65.desc.common$Essas criaturas se tornaram um alimento básico da dieta de §Y[Root.GetName]§!.\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.desc.no_food: "$strange_worlds.65.desc.intro$Essas criaturas são uma fonte constante e sustentável de biomassa em §Y[Root.GetName]§!.\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.a: "Colete seus dejetos."
 strange_worlds.65.b_devouring_swarm: "Hora do banquete!"
 strange_worlds.65.b_default: "Colete sua carne."
 strange_worlds.75.name: "Areia Estranha"
 strange_worlds.75.desc: "[Owner.GetColonistPluralCapital] estão relatando um estranho fenômeno nas areias de §Y[Root.GetName]§!.\n\nTempestades de areia extremas se materializam subitamente nas proximidades de nossa colônia em dias aparentemente tranquilos. Fluxos velozes de areia surgem de repente, antes de pararem de forma inesperada. Há relatos ainda de dunas movendo-se lateralmente em dias sem qualquer tipo de vento.\n\nNenhuma explicação atmosférica ou geológica para esses eventos foi identificada.\n\nEssa areia peculiar não está causando danos diretos, mas está interferindo nas operações de nossa colônia. O estudo desse fenômeno único está em andamento."
 strange_worlds.75.a: "Curiosos"
 strange_worlds.80.name: "Areia Cantante"
 strange_worlds.80.desc: "As tempestades de areia em §Y[Root.GetName]§! começaram a emitir um zumbido grave. A frequência muda regularmente de tom e é modulada em padrões recorrentes.\n\nEmbora essa \"areia cantante\" possa ser atribuída a propriedades conhecidas de partículas livres, a regularidade dessas modulações não pode ser explicada apenas pela fricção.\n\nTambém descobrimos um vale repleto de dunas com estranhos símbolos gravados. Esses glifos surgem brevemente em formações elevadas antes de desaparecerem quase que imediatamente.\n\nAinda não sabemos o que está animando essas dunas, mas a natureza consistente dos padrões aponta para um propósito ou intencionalidade por trás desse comportamento."
 strange_worlds.80.a: "Estude os padrões."
 strange_worlds.85.name: "Areia Psiônica"
 strange_worlds.85.desc_part1_no_zro: "[Owner.GetScientistPluralCapital] que estudam as tempestades de areia em §Y[Root.GetName]§! descobriram que uma nova forma de matéria exótica está distribuída em todo o material de silicato."
 strange_worlds.85.desc_part1_zro: "[Owner.GetScientistPluralCapital] que estudam as tempestades de areia em §Y[Root.GetName]§! descobriram que Zro está distribuído em todo o material de silicato."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_zroni: "\nEnquanto manuseava as amostras, a equipe de [Owner.GetResearchers] vivenciou visões breves e poderosas: aparições de figuras Zroni vagando pelas dunas marcadas por glifos do planeta."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_no_zroni: "\nEnquanto manuseava as amostras, a equipe de [Owner.GetResearchers] vivenciou visões breves e poderosas: aparições de figuras alienígenas desconhecidas vagando pelas dunas marcadas por glifos do planeta."
 strange_worlds.85.desc_part2_non_machine_common_psionic_zroni: "\nEnquanto manuseava as amostras, a equipe de [Owner.GetResearchers] vivenciou visões psiônicas breves e poderosas: aparições de figuras Zroni vagando pelas dunas marcadas por glifos do planeta."
 strange_worlds.85.desc_part2_non_machine_common_psionic_no_zroni: "\nEnquanto manuseava as amostras, a equipe de [Owner.GetResearchers] vivenciou visões psiônicas breves e poderosas: aparições de figuras alienígenas desconhecidas vagando pelas dunas marcadas por glifos do planeta."
 strange_worlds.85.desc_part2_machine_common: "\nEnquanto manuseava as amostras, a equipe de [Owner.GetResearchers] vivenciou interferências em seus circuitos internos.\n\n"
 strange_worlds.85.desc_part2_machine_zroni: "$strange_worlds.85.desc_part2_machine_common$Essas perturbações poderosas causaram anomalias no processamento visual, resultando na aparição de figuras Zroni vagando pelas dunas marcadas por glifos do planeta."
 strange_worlds.85.desc_part2_machine_no_zroni: "$strange_worlds.85.desc_part2_machine_common$Essas perturbações poderosas causaram anomalias no processamento visual, resultando na aparição de figuras alienígenas desconhecidas vagando pelas dunas marcadas por glifos do planeta."
 strange_worlds.85.desc_part3_common: "\nEssas aparições parecem ser a origem dos glifos. Precisaremos de tempo para decifrar os símbolos, mas acreditamos que eles são claramente uma forma de idioma escrito.\n\n"
 strange_worlds.85.desc_part3_zro: "$strange_worlds.85.desc_part3_common$Poderíamos simplesmente extrair o Zro da areia, mas isso provavelmente dissiparia as aparições. Contudo, há uma quantidade abundante dessa substância valiosa."
 strange_worlds.85.desc_part3_no_zro: "$strange_worlds.85.desc_part3_common$Poderíamos simplesmente extrair o material exótico da areia, mas isso provavelmente dissiparia as aparições. Contudo, essa substância única que desafia a Física pode se mostrar muito valiosa."
 strange_worlds.85.a: "Prossiga com os esforços de tradução."
 strange_worlds.85.b_no_zro: "Extraia o material exótico imediatamente."
 strange_worlds.85.b_zro: "Extraia o Zro imediatamente."
 strange_worlds.90.name: "Espetáculo de Areia"
 strange_worlds.90.desc_intro_zroni: "Aplicamos nosso conhecimento prévio sobre a cultura Zroni para gravar um novo glifo nas areias de §Y[Root.GetName]§!: o símbolo de uma saudação Zroni. A resposta foi imediata."
 strange_worlds.90.desc_intro_no_zroni: "Usando nossos bancos de dados linguísticos, nós gravamos centenas de símbolos representando saudações em cada escrita alienígena conhecida nas areias de §Y[Root.GetName]§!. Enfim, obtivemos uma resposta."
 strange_worlds.90.desc_common: "\nAs tempestades de areia se dissiparam, o solo do vale assentou e a canção das dunas foi silenciada. Montanhas inteiras de areia elevaram-se ao ar, assumindo novas formas. Figuras criadas pela areia animada rodopiaram em um intrincado espetáculo aéreo.\n\n"
 strange_worlds.90.desc_storyline_started: "$strange_worlds.90.desc_common$Reconhecemos imediatamente a história dos Zroni, uma visão de poder inédito e um terrível conflito. Animadas pelo Zro, as areias formaram um eco cósmico da antiga raça Zroni.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_finished: "$strange_worlds.90.desc_common$Reconhecemos imediatamente a história dos Zroni, sua ascensão ao Véu e consequente destruição. Animadas pelo Zro, as areias formaram um eco cósmico da antiga raça Zroni.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_not_started: "$strange_worlds.90.desc_common$Compreendemos imediatamente que era a história de uma raça alienígena descobrindo um novo poder que viria a dividi-la e destruí-la.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_outro: "\n\nEm seguida, as areias psiônicas acalmaram-se mais uma vez. As tempestades não retornaram, o que sugere que essas areias ficaram mais tolerantes à nossa presença em §Y[Root.GetName]§!."
 strange_worlds.90.a: "$FASCINATING$"
 strange_worlds.95.name: "Operações de Extração"
 strange_worlds.95.desc_zroni_tech: "Aplicando nosso conhecimento de destilação de Zro, extraímos uma grande quantidade das areias de §Y[Root.GetName]§!, aprendendo bastante com o processo.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_no_zroni_tech: "Os esforços de extração de Zro em §Y[Root.GetName]§! geraram resultados mistos. Conseguimos extrair uma quantidade pequena, mas muito se perdeu ao longo de nossos experimentos. No entanto, aprendemos muito com o processo.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_outro: "\n\nApós a remoção do Zro, as areias aqui parecem ter normalizado. Nossa colônia já não se depara mais com tempestades de areia imprevisíveis. O que quer que tenha manipulado as areias, agora perdeu-se no éter."
 strange_worlds.105.name: "Desaparecimentos Repentino"
 strange_worlds.105.desc_intro: "Perdemos a comunicação com um membro de nossa equipe de [Owner.GetExplorerPlural] em §Y[Root.GetName]§! logo após o relato de uma possível descoberta de §Ygases exóticos§! em um vale não mapeado.\n\n"
 strange_worlds.105.desc_gestalt_non_machine: "Sentimos uma dor breve, mas lancinante antes de os nódulos silenciarem."
 strange_worlds.105.desc_gestalt_machine: "Os dados dos nódulos foram corrompidos antes de serem desconectados de nossa rede."
 strange_worlds.105.desc_non_gestalt: "Ainda mais preocupante, sua última transmissão foi interrompida subitamente pelo que pareciam gritos de angústia. Tememos o pior."
 strange_worlds.105.a: "Preocupante."
 strange_worlds.110.name: "Brejos Cáusticos"
 strange_worlds.110.desc: "Enquanto investigávamos a última localização conhecida do membro da equipe de [Owner.GetExplorerPlural] em §Y[Root.GetName]§!, descobrimos uma paisagem de charcos extremamente ácidos que exalam uma névoa de §Ygases exóticos§! puros. Essas regiões pantanosas são o lar de uma espécie resiliente de flora nativa capaz de sobreviver à acidez elevada.\n\nEmbora a paisagem seja incrivelmente nociva, uma pesquisa mais aprofundada das névoas gasosas poderia beneficiar os recursos da colônia."
 strange_worlds.110.a: "Estude as névoas."
 strange_worlds.115.name: "Pântano Digestivo"
 strange_worlds.115.desc: "Enquanto estudava os pântanos ácidos em §Y[Root.GetName]§!, um membro da equipe de [Owner.GetScientistPlural] ficou preso com seu equipamento de observação entre as gavinhas da flora nativa antes de ser arrastado para um lodaçal altamente cáustico. Ele foi dissolvido em questão de segundos. Acreditamos que o membro perdido da equipe de [Owner.GetExplorerPlural] encontrou um destino similar.\n\nLogo em seguida, as gavinhas da planta incharam visivelmente e os vestígios de §Ygases exóticos§! dispararam. Ao que parece, essa flora predatória utiliza os charcos ácidos como um sistema digestivo externo, arrastando suas presas com as gavinhas caçadoras para dissolvê-las e absorver seus nutrientes. Esse processo libera uma pequena quantidade de gases exóticos que podemos extrair.\n\nEspeculamos que a biologia desse organismo poderia ser explorada se fornecêssemos dejetos da colônia para a produção de mais gases. Por outro lado, podemos neutralizar os charcos ácidos e tomar as terras ricas em nutrientes para a agricultura."
 strange_worlds.115.a: "Cultive os organismos."
 strange_worlds.115.b: "Reutilize a terra."
 strange_worlds.120.name: "Charcos Neutralizados"
 strange_worlds.120.desc: "Tivemos êxito em neutralizar os charcos ácidos em §Y[Root.GetName]§!, eliminando com isso a espécie de flora que habitava o ambiente. Como resultado, as névoas de §Ygases exóticos§! foram dissipadas.\n\nAs terras recuperadas são particularmente férteis graças aos nutrientes deixados pelo processo de alimentação da flora nativa. Criamos uma nova e valiosa zona agrícola."
 strange_worlds.120.a_ct: "Adiciona §G2§! §Y$district_farming_plural$§! a [This.GetName]"
 strange_worlds.120.b.evopred: "Excelente, coletem os restos também."
 strange_worlds.130.name: "Erupção de Matéria Escura"
 strange_worlds.130.desc: "O que acreditávamos ser um antigo gêiser inativo em §Y[Root.GetName]§! entrou violentamente em erupção, expelindo gases enriquecidos de §Ymatéria escura§! na atmosfera.\n\nA erupção saturou o céu, gerando graves anomalias gravitacionais que estão impossibilitando a viagem e as comunicações extramundo.\n\nAchamos que, de alguma forma, a matéria escura se origina no núcleo singular do planeta. Sifões orbitais foram instalados para extrair o miasma da estratosfera, uma vez que as condições extremas põem em risco a vida de nossa população de [Owner.GetColonistPlural]."
 strange_worlds.130.a: "Monitore a situação de perto."
 strange_worlds.135.name: "Escuridão Líquida"
 strange_worlds.135.desc_common_1: "Conseguimos remover o miasma de §Ymatéria escura§! da atmosfera de §Y[Root.GetName]§!. Agora é hora de avaliar os danos."
 strange_worlds.135.desc_common_2: "\nApós restabelecer o contato com a colônia, descobrimos que a população de [Owner.GetColonistPlural] foi petrificada pelo que parece ser matéria escura solidificada."
 strange_worlds.135.desc_organic_non_gestalt: "$strange_worlds.135.desc_common_2$ Ao detectar sinais vitais no interior das carapaças, nós as extraímos."
 strange_worlds.135.desc_machine: "$strange_worlds.135.desc_common_2$ Detectando sinais eletrônicos funcionais no interior das carapaças, nós as abrimos."
 strange_worlds.135.desc_gestalt: "$strange_worlds.135.desc_common_2$ Sentindo tentativas de reintegração com o coletivo, nós abrimos os túmulos físicos."
 strange_worlds.135.desc_outro: "\nContrariando todas as expectativas, a população de [Owner.GetColonistPlural] não parece ter sido afetada pela estase e exposição prolongadas.\n\nO gêiser responsável pelo incidente entrou em colapso, transformando-se em um lago de matéria escura líquida.\n\nEste é um evento inédito que demanda um estudo focado. Nossa equipe de [Owner.GetScientistPlural] ainda não sabe onde concentrar seus recursos limitados."
 strange_worlds.135.a: "Ponha a população em quarentena e estude-a."
 strange_worlds.135.b: "Priorize o estudo da matéria escura."
 strange_worlds.140.name: "Contaminação de Matéria Escura"
 strange_worlds.140_intro: "Nossa equipe de [Owner.GetScientistPlural] está confiante de que o lago de §Ymatéria escura§! em §Y[Root.GetName]§! apresenta um risco mínimo ao planeta. O mesmo não pode ser dito dos sintomas que começaram a aparecer na população.\n\nOs estudos realizados com [Owner.GetColonistPlural] em quarentena revelaram alterações físicas contínuas geradas pelo contato com a substância."
 strange_worlds.140_common: "\nA exposição prolongada saturou as moléculas em seus corpos com matéria escura, "
 strange_worlds.140_machine_1: "$strange_worlds.140_common$corrompendo seus sistemas completamente."
 strange_worlds.140_non_machine_1: "$strange_worlds.140_common$contaminando seus sistemas circulatórios."
 strange_worlds.140_machine_2: "\nEmbora esses poluentes apresentem o risco de uma falha prematura do sistema, permitiremos que unidades construídas nesse mundo processem e extraiam matéria escura como uma sub-rotina, se integrada aos seus processos de montagem."
 strange_worlds.140_non_machine_2: "\nPodemos cultivar essas anomalias, permitindo que os corpos de [Owner.GetColonistPlural] processem e secretem matéria escura extraída, ao custo de encurtar sua expectativa de vida."
 strange_worlds.140.a.dc_empire: "Abrace esse dom."
 strange_worlds.140.a.machine_empire: "Cultive as anomalias."
 strange_worlds.140.a.normal: "Processe os poluentes."
 strange_worlds.140.b: "Expurgue a contaminação."
 strange_worlds.145.name: "Microburaco Negro"
 strange_worlds.145.desc: "Estudos mais detalhados do lago de matéria escura em §Y[Root.GetName]§! revelaram dados geológicos cruciais que podem explicar a causa do incidente inicial.\n\nO núcleo do planeta abriga um microburaco negro com menos de um metro de comprimento. A massa do próprio planeta anula as forças gravitacionais que esperaríamos detectar de uma anomalia assim. Ao que parece, essa relação entre massas atingiu um equilíbrio delicado que deve permanecer por um longo tempo.\n\nAtividades sísmicas recentes resultaram no deslocamento do manto interior, causando a erupção do gêiser. Por sua vez, o lago de matéria escura atuou como um tampão para estabilizar o núcleo do planeta e evitar mais irrupções.\n\nNo entanto, a saturação de longo prazo da matéria escura não era tão inofensiva quanto parecia.\n\nMicroburacos negros instáveis se formaram no centro de massa de parte da população de [Owner.GetColonistPlural], fazendo com que seus corpos implodissem violentamente. Tudo o que restou foram as carcaças sem vida de matéria escura cristalizada. Análises adicionais não detectaram sinais de atividade no interior.\n\nA contagem final mostra que perdemos aproximadamente um quarto da população de §Y[Root.GetName]§! em instantes. Em seu lugar, estátuas de matéria escura solidificada se espalham pelo planeta com as mais diversas poses."
 strange_worlds.145.a.no_gestalt: "Lamentável."
 strange_worlds.145.a.gestalt: "Horripilante."
 strange_worlds.155.name: "Pestes Revoltantes"
 strange_worlds.155.desc_homicidal: "Encontramos uma espécie de fauna particularmente asquerosa nativa de §Y[Root.GetName]§!.\n\nEssas criaturas desenvolveram um mecanismo de defesa que também funciona como principal método de obtenção de comida. Sem as enzimas digestivas necessárias para quebrar alimentos sólidos, elas expelem um gás poderoso e repulsivo que induz organismos com um intestino funcional a vomitar. As substâncias regurgitadas são então consumidas como fonte principal de nutrientes.\n\nO abate dessas criaturas nojentas fornecerá uma quantidade útil de §Ygases exóticos§! e §Ycomida§!."
 strange_worlds.155.desc_normal: "Nossa população de [Owner.GetColonistPlural] em §Y[Root.GetName]§! encontrou uma espécie de fauna nativa ao planeta com um método... singular para coletar alimentos.\n\nEmbora inicialmente tímidas, essas criaturas acostumaram-se à nossa presença, e sua natureza amistosa as tornou populares entre [Root.Owner.GetSpeciesNamePlural] com menos maturidade.\n\nEmbora não apresentem riscos diretamente, elas desenvolveram um mecanismo de defesa que também funciona como principal método de obtenção de comida. Sem as enzimas digestivas necessárias para quebrar alimentos sólidos, elas expelem um gás poderoso e repulsivo que induz organismos com um intestino funcional a vomitar. As substâncias regurgitadas são então consumidas como fonte principal de nutrientes.\n\nA situação geral traz riscos de contaminação de doenças infecciosas, e líderes locais recomendam que [Owner.GetColonistPlural] fiquem longe dessas criaturas esquisitas."
 strange_worlds.155.a: "Que xenobiologia singular."
 strange_worlds.155.b_purifiers: "Coisas asquerosas."
 strange_worlds.155.b_swarm: "Um sabor exótico!"
 strange_worlds.155.b_normal: "Atirem à primeira vista."
 strange_worlds.160.name: "Desdobramentos Nojentos"
 strange_worlds.160.desc: "A eliminação das pestes repugnantes de §Y[Root.GetName]§! está se mostrando uma tarefa difícil. Membros mais jovens da colônia continuam a brincar com os animais, contrariando os avisos oficiais.\n\nComo resultado, as proteínas sintetizadas por nosso organismo tornaram-se sua fonte primária de comida. Nossa colônia é um alvo muito mais fácil quando comparada ao restante da fauna planetária, que aprendeu a evitar seus gases fétidos. Essas criaturas se adaptaram ainda mais à nossa presença, e já foram avistadas emboscando [Owner.GetColonistPlural] que vagam solitariamente após uma refeição.\n\nPor incrível que pareça, essa situação traz alguns benefícios. Nossos cientistas descobriram que os vapores eméticos emitidos pelas criaturas contêm valiosas partículas de §Ygases exóticos§! que poderiam ser coletadas se domesticássemos esses animais e os mantivéssemos em instalações isoladas.\n\nNo entanto, a maior parte da colônia propõe a erradicação das criaturas."
 strange_worlds.160.a: "Reúna as criaturas."
 strange_worlds.160.b: "Basta. Atirem à primeira vista."
 strange_worlds.165.name: "Um Sopro de Ar Puro"
 strange_worlds.165.desc: "As criaturas em §Y[Root.GetName]§! não estão mais causando regurgitação em massa.\n\nCom o desenvolvimento de uma pasta de nutrientes sintética adaptada à xenobiologia delas, conseguimos regular seus ciclos alimentares e encerrar as emboscadas predatórias contra nossa população de [Owner.GetColonistPlural].\n\nNós as realocamos para uma reserva natural cuidadosamente planejada para que o público possa apreciar os animais em um ambiente seguro. Cuidadores especializados foram treinados para extrair seus §Ygases exóticos§! sem mais problemas."
 strange_worlds.165.a: "Um alívio bem-vindo."
 strange_worlds.165.a.evopred: "Certifique-se de que não vamos desenvolver esse odor."
 strange_worlds.170.name: "Atirar para Matar"
 strange_worlds.170.desc: "Desde que adotamos oficialmente a política de atirar à primeira vista, faz muitos meses que não avistamos indivíduos da espécie nociva perto da colônia em §Y[Root.GetName]§!.\n\nEmbora um grupo de [Owner.GetColonistPlural] sinta falta das criaturas peludas, a felicidade é generalizada agora que todos podem se deslocar livremente sem temer uma regurgitação forçada.\n\nNossos cientistas coletaram os corpos dos animais, extraindo um pouco de §Ygases exóticos§! diretamente de seus órgãos."
 strange_worlds.170.a: "Foram elas que começaram."
 strange_worlds.185.name: "Hostilidades Interdistritais"
 strange_worlds.185.desc: "Relatórios de §Y[Root.GetName]§! mostram um crescimento alarmante de hostilidades interdistritais entre as populações rural e urbana. Não há causa aparente para essa animosidade além da localização geográfica arbitrária.\n\nNovos imigrantes estão sendo tratados inicialmente como inimigos, mas após algumas semanas nos distritos aos quais foram designados, eles são acolhidos. Com base nessa informação, nossos cientistas estão convencidos de que esse estranho comportamento está sendo motivado por fatores restringidos aos distritos.\n\nEnquanto investigamos a questão, devemos estabilizar a situação e evitar seu agravamento. Podemos apoiar oficialmente os distritos rurais ou urbanos, ou mobilizar uma maior força policial para manter a paz."
 strange_worlds.185.a: "Apoie os distritos urbanos."
 strange_worlds.185.b: "Apoie os distritos rurais."
 strange_worlds.185.c: "Intensifique o policiamento."
 strange_worlds.190.name: "Alguma Coisa na Água"
 strange_worlds.190.desc_intro: "Após inspeções extensas em §Y[Root.GetName]§!, nossos cientistas identificaram a causa da hostilidade interdistrital.\n\nNo interior do manto planetário, jaz o cadáver putrefato de um organismo gigantesco. Após milênios de decomposição, o líquido cefalorraquidiano da criatura infiltrou-se nos lençóis freáticos do planeta, infectando-os com uma bactéria psiônica. Por sua vez, esse micróbio com capacidades psicotrópicas entrou no sistema nervoso de nossa população de [Owner.GetColonistPlural] e introduziu fortes instintos territoriais, decerto provenientes do animal original.\n\n"
 strange_worlds.190.desc_non_psionic: "Para sanar o problema, podemos submeter o abastecimento de água a uma séria complexa de filtros especializados de alto nível.\n\n"
 strange_worlds.190.desc_psionic: "Essa impureza exótica está interferindo em nossas habilidades psiônicas naturais.$strange_worlds.190.desc_non_psionic$"
 strange_worlds.190.desc_outro_non_psionic: "Além disso, nossos cientistas estão confiantes de que a bactéria pode ser modificada geneticamente no nível celular, redirecionando suas tendências territoriais para fins mais produtivos."
 strange_worlds.190.a: "Filtre os lençóis freáticos."
 strange_worlds.190.b: "Tente alterar geneticamente a bactéria."
 strange_worlds.195.name: "Habilidades Emergentes"
 strange_worlds.195.desc_intro: "A criação de estações de purificação de água em §Y[Root.GetName]§! foi um sucesso retumbante.\n\n"
 strange_worlds.195.desc_psionic: "A extrema agressão territorial diminuiu. Agora livres da interferência, nossas capacidades psiônicas foram também aprimoradas com probióticos naturais que promovem uma §Yjunção psiônica§! entre os indivíduos em §Y[Root.GetName]§!. Isso reforça nossa conexão telepática e fortalece nosso senso de comunidade ao passo que aumenta a produtividade."
 strange_worlds.195.desc_non_psionic: "Além da redução na extrema agressão territorial, a população foi deixada com efeitos residuais, mas potencialmente úteis, na forma de probióticos naturais que promovem a §Yjunção psiônica§! entre os indivíduos em §Y[Root.GetName]§!. Isso permite que [Owner.GetColonistPlural] se comuniquem entre si em um nível telepático, fortalecendo o senso de comunidade e aumentando a produtividade."
 strange_worlds.195.a: "Excelente."
 strange_worlds.195.a_ct: "Todos os Pops em §Y[Root.GetName]§! recebem §YJunção Psiônica§!"
 strange_worlds.195.a.evopred: "Tem um gosto... §Mestranho§!."
 strange_worlds.195.a_ct.evopred: "Nossa espécie primária recebe §YJunção Psiônica§!"
 strange_worlds.200.name: "Ressequenciamento Bacteriano"
 strange_worlds.200.desc: "Neutralizamos com sucesso os efeitos negativos do organismo bacteriano em §Y[Root.GetName]§!. Os conflitos diminuíram e a população de [Owner.GetColonistPlural] já demonstra sinais de produtividade elevada.\n\nNossos cientistas estão confiantes de que podem manipular ainda mais o código genético do micróbio. Com o sequenciamento genômico correto, [Owner.GetColonistPlural] podem ter um aspecto de seu desempenho aperfeiçoado.\n\nPorém, o micro-organismo gerado não sobreviverá por muito tempo se transportado para fora do mundo. A conexão psiônica entre sua mitocôndria e a carcaça alienígena deve permanecer intacta para que a bactéria possa se reproduzir. Ainda não sabemos explicar o motivo."
 strange_worlds.200.a: "Aprimore as capacidades reprodutivas."
 strange_worlds.200.b: "Aprimore a força."
 strange_worlds.200.c: "Aprimore a cognição."
 strange_worlds.1000.name: "Tubos de Lava Mineralizada"
 strange_worlds.1000.desc: "O processo de aridificação do clima em §Y[From.GetName]§! revelou uma vasta rede de tubos de lava em todo o leito oceânico, agora exposto, do planeta.\n\nOs fluxos de magma que deram origem a esses túneis profundos estão inativos e deixaram para trás uma rica camada de minerais forjados há muito tempo no calor e pressão extremos do núcleo derretido de §Y[From.GetName]§!.\n\nEsses depósitos de tubos de lava são extremamente densos e as operações de extração serão custosas, mas altamente lucrativas."
 strange_worlds.1005.name: "Ovos Hidroativos"
 strange_worlds.1005.desc: "A terraformação de §Y[From.GetName]§! acarretou um aumento repentino da população da fauna nativa.\n\nDescobrimos que os ciclos reprodutivos de muitas das espécies locais estão intimamente ligados à disponibilidade de água no ambiente. Seus ovos, que antes eram enterrados no solo durante meses para absorver água o suficiente para a eclosão, agora espalham-se por toda a paisagem. A fauna do planeta está se reproduzindo a um ritmo logarítmico.\n\nMuitas dessas criaturas são altamente nutritivas e fornecerão uma fonte abundante de comida para §Y[From.GetName]§!, além da oportunidade de estudar um ecossistema extremamente ativo. Visitantes agora precisarão passar por uma triagem minuciosa antes da partida para evitar a contaminação fora do mundo."
 strange_worlds.1005.evopred: "Esse ritmo pode ser replicado?"
 strange_worlds.1010.name: "Suspensos no Gelo"
 strange_worlds.1010.intro: "Nossos esforços de terraformação em §Y[From.GetName]§! revelaram um número surpreendente de indivíduos da fauna nativa enterrado no gelo da superfície. O fato mais incrível, porém, é que essas criaturas aparentam ainda estar vivas.\n\nEssa espécie parece estar no meio de uma hibernação extraordinariamente longa: um método eficaz para sobreviver às longas eras glaciais de §Y[From.GetName]§!. O degelo causado pelo processo de terraformação encerrou sua estase prematuramente.\n\nDespertas de seu sono gelado, as criaturas já demonstram sinais de inteligência, utilizando ferramentas simples para a coleta de alimentos.\n\n"
 strange_worlds.1010.desc_exterminate: "$strange_worlds.1010.intro$Elas serão exterminadas imediatamente. Colheremos a biomassa resultante para nossos próprios fins."
 strange_worlds.1010.desc_hunted: "$strange_worlds.1010.intro$Suas fisiologias singulares nos fornecerão uma rica fonte de comida."
 strange_worlds.1010.desc_tolerated: "$strange_worlds.1010.intro$Podemos estudar o extraordinário processo de hibernação dessa espécie ou extrair a biomassa das criaturas."
 strange_worlds.1010.desc_protected: "$strange_worlds.1010.intro$Devemos proteger essas formas de vida. Seu extraordinário processo de hibernação deve ser estudado a fundo."
 strange_worlds.1010.a.purge: "Expurgue-as."
 strange_worlds.1010.b.hunted: "Cace-as."
 strange_worlds.1010.c.study: "Estude-as."
 strange_worlds.1010.d.purge: "Expurgue-as."
 strange_worlds.1010.e.protect: "Proteja-as."
 strange_worlds.1015.name: "Montanhas de Aço"
 strange_worlds.1015.desc: "Um problema iminente em §Y[From.GetName]§! foi apontado por nossos especialistas em terraformação.\n\nSob as cordilheiras congeladas do planeta jazem depósitos vastos e altamente concentrados de ferro e carbono, que foram superaquecidos pelo processo de terraformação.\n\nPoderíamos remover com segurança os recursos quase derretidos agora. Por outro lado, se permitirmos que o superaquecimento continue, poderemos criar uma fonte perpétua de ligas metálicas. Claro, isso sacrificaria o espaço destinado à habitação."
 strange_worlds.1015.a: "Priorize os recursos."
 strange_worlds.1015.b: "Não faça nada."
 strange_worlds.1020.name: "Atmosfera Inflamável"
 strange_worlds.1020.desc: "A terraformação de §Y[From.GetName]§! trouxe consequências inesperadas. Desconhecíamos o fato de o solo superficial do planeta ser composto de uma fina mistura de §Ypartículas voláteis§! altamente concentradas, que a terraformação agitou e dispersou na atmosfera.\n\nInfelizmente, essas partículas de alta energia aumentam os riscos de combustões acidentais na superfície. Qualquer colônia estabelecida no planeta deverá priorizar a prevenção de acidentes e conflitos para evitar consequências devastadoras.\n\nContudo, se manejarmos os perigos com atenção, a atmosfera de §Y[From.GetName]§! se tornará uma rica fonte de minerais raros."
 strange_worlds.1025.name: "Lava Azul"
 strange_worlds.1025.desc: "A crosta planetária de §Y[From.GetName]§! foi deslocada como resultado do processo de terraformação, acarretando um fenômeno natural inusitado.\n\nAs placas tectônicas deslocaram diversos bolsões de §Ygases exóticos§! que reagiram com os depósitos minerais ricos em §Yligas metálicas§! encontrados nos vulcões do planeta, causando erupções de intensa coloração azul.\n\nA natureza volátil desse fenômeno deixou o planeta um pouco menos habitável, o que impactou nossos planos de criar espaços de habitação para [Root.GetColonistPlural].\n\nO lado bom é que a terra ao redor desses vulcões foi enriquecida por recursos que podemos aproveitar."
 strange_worlds.1030.name: "Tempestade Eterna"
 strange_worlds.1030.desc: "Recebemos relatos de um fenômeno meteorológico incipiente em §Y[From.GetName]§!.\n\nDepósitos de cristais na rocha matriz do planeta foram expostos durante a terraformação, irradiando-se ao reagir com os compostos químicos usados no processo. As flutuações resultantes na temperatura do ar criaram uma tempestade elétrica perpétua em todo o planeta.\n\nTais condições inéditas inevitavelmente impactarão o desenvolvimento da infraestrutura, e os cristais irradiados certamente trarão consequências em longo prazo para a habitabilidade. Contudo, nossa equipe de [Owner.GetScientistPlural] está confiante de que é possível aproveitar a energia das tempestades após o término da terraformação.\n\nAlém disso, a equipe de [Owner.GetEngineerPlural] elaborou planos para neutralizar de forma segura a carga nos depósitos de cristais. Isso deve dissipar as tempestades e nos permitir extraí-los para outros usos."
 strange_worlds.1030.a: "Explore a energia das tempestades."
 strange_worlds.1030.b: "Neutralize os cristais."
 strange_worlds.1035.name: "Hibernadores"
 strange_worlds.1035.desc: "Estudos da população pré-sapiente em §Y[event_target:hibernator_planet.GetName]§! ampliaram nosso conhecimento acerca de seus incríveis padrões de hibernação: eles são regulados por uma enzima específica que induz o corpo a uma estase profunda, e depois o desperta. Nesse estado, reações químicas que ocorrem dentro do corpo são reduzidas a números quase irrisórios.\n\nNós extraímos a enzima e conseguimos ministrá-la com sucesso, na forma de um composto sedativo, em diversos organismos. Em todos os casos, espécies antes incapazes de hibernar entraram em uma letargia prolongada que reduziu significativamente o envelhecimento celular.\n\nEssa descoberta extraordinária estabelece as bases para um sono criogênico aprimorado artificialmente que reduzirá muito o estresse físico de viagens espaciais longas para espécies orgânicas."
 strange_worlds.1040.name: "Túmulos Celestes"
 strange_worlds.1040.desc: "Conforme concluíamos a terraformação em §Y[From.GetName]§!, corpos começaram a cair do céu.\n\nDessa altura, as antigas carcaças foram reduzidas a uma massa disforme com o impacto. Entre as vísceras, descobrimos aglomerados de pequenos objetos – instrumentos decorativos e outras relíquias curiosas – que caíram das mesmas nuvens densas na atmosfera superior do planeta.\n\nEssas nuvens espessas, que podemos presumir terem sido utilizadas como local de descanso eterno para uma raça alienígena desconhecida, agora estão se dissipando como resultado das alteração da terraformação e soltando o conteúdo antes suspenso. Esperamos que esses restos continuem caindo conforme a atmosfera se ajusta, até que as nuvens-túmulo se esvaziem."
 strange_worlds.1040.a: "Macabro, mas potencialmente lucrativo."
 strange_worlds.1040.b: "Isso não é nada sanitário. Limpe-os imediatamente."
 strange_worlds.1050.name: "Destroços Orbitais"
 strange_worlds.1050.desc: "Nossos engenheiros de terraformação em §Y[event_target:junk_moon_planet.GetName]§! estão enfrentando condições insalubres de trabalho devido aos inúmeros tipos de tralha espacial e destroços pequenos que orbitam o planeta. O volume elevado desses objetos apresenta um perigo para os transportes que viajam para dentro e fora da superfície.\n\nConsiderando a alta densidade do material, elaboramos propostas de magnetização dos fragmentos maiores para que atraiam os outros em sua órbita, consolidando gradualmente tudo em um único objeto, mais maleável. Em teoria, poderíamos criar uma lua artificial.\n\nEmbora isso aumente o tempo de terraformação, também facilitará o acesso à superfície e removerá o risco de destroços orbitais maiores entrarem periodicamente na atmosfera do planeta."
 strange_worlds.1050.a: "Crie uma lua."
 strange_worlds.1050.b: "Os destroços vão se desintegrar com o tempo."
 strange_worlds.1060.name: "Lua de Sucata"
 strange_worlds.1060.desc: "Os esforços para consolidar a tralha que orbita §Y[event_target:junk_moon_planet.GetName]§! obtiveram êxito.\n\nAo magnetizar muitos dos pedaços maiores, reunimos tudo gradualmente em um gigantesco corpo de sucata de metal. Sua densidade cresceu ao ponto de desenvolver seu próprio nível de atração gravitacional. Desde então, a lua recém-formada entrou em uma órbita estável.\n\nO acesso à superfície de §Y[event_target:junk_moon_planet.GetName]§! está muito mais fácil sem os destroços orbitais perigosos, e não precisamos mais nos preocupar com a potencial entrada destes na atmosfera. Além disso, nossos engenheiros estão confiantes de que essa nova lua pode suportar sua própria estação de mineração."
 strange_worlds.1060.create_moon_ct: "[event_target:junk_moon_planet.GetName] tem uma nova lua: Lua de Sucata"
 site_abandoned_bio_lab: "Instalação Antiga"
 abandoned_bio_lab_desc: "Análises de §Y[fromfrom.planet.GetName]§! revelaram uma instalação isolada na região mais inacessível do planeta. A estrutura parece estar inativa ou abandonada, sem assinaturas energéticas ou sinais de uso prolongado. Uma expedição arqueológica pode trazer mais informações."
 strange_worlds.2000.name: "Laboratório Biológico Abandonado"
 strange_worlds.2000.desc: "O interior da instalação contém uma ampla gama de máquinas médicas abandonadas, câmaras de tratamento e um necrotério. Dentro das cápsulas de armazenamento de cadáveres, encontramos restos orgânicos parcialmente preservados e com sinais de doenças ou deformações. A presença de portas de segurança, equipamentos de vigilância e celas de contenção levou §H[universal_macrophage_scientist.GetName]§! a concluir que alguns indivíduos eram mantidos aqui contra sua vontade.\n\nRecuperamos algumas partes de equipamentos, mas quase tudo encontra-se inutilizável. Dados limitados ainda estão nos sistemas de computador. Recuperamos alguns arquivos, mas ainda é necessário traduzi-los."
 strange_worlds.2005.name: "Antiga Pesquisa de Imunologia"
 strange_worlds.2005.desc: "§H[universal_macrophage_scientist.GetName]§! concluiu uma tradução parcial de um dos arquivos recuperados da instalação em §Y[fromfrom.planet.GetName]§!.\n\n§LLaboratório 17 – Atualização de progresso - Chefe de Pesquisa Gelebor\n\nO novo protótipo demonstrou potencial. O sistema imunológico das cobaias foi ampliado na ordem dos milhões e todos os patógenos foram erradicados. Efeitos colaterais persistem: ocorreram mutações fatais, sem sobreviventes. Tentaremos outra vez. O Macrófago Universal está ao nosso alcance, sei disso.§!"
 strange_worlds.2010.name: "A Escolha de Gelebor"
 strange_worlds.2010.desc: "§H[universal_macrophage_scientist.GetName]§! traduziu mais um arquivo do laboratório abandonado em §Y[fromfrom.planet.GetName]§!.\n\n§LLaboratório 17 – Circular interno para a equipe - Chefe de Pesquisa Gelebor\n\nColegas, a ordem de término do projeto chegou hoje. A paciência do lorde supremo esgotou-se. No entanto, estamos tão perto de nosso objetivo! O Macrófago Universal é mais importante do que os caprichos de qualquer indivíduo. Um futuro livre de doenças está ao nosso alcance! O que é o custo de mais algumas vidas em comparação com tal progresso?\n\nSe eles não querem nos enviar mais cobaias, então testarei o último protótipo em mim. Quem me acompanhará?§!"
 strange_worlds.2010.a: "Prossiga com cuidado."
 strange_worlds.2015.name: "O Macrófago Universal"
 strange_worlds.2015.desc: "§H[universal_macrophage_scientist.GetName]§! traduziu a entrada final do registro do laboratório biológico em §Y[fromfrom.planet.GetName]§!.\n\n§LLaboratório 17 - Relatório Final – Assistente de Pesquisa Filidor\n\nTamanha era a convicção de Gelebor que o seguimos cegamente.\n\nAo testar os protótipos em nós mesmos, inicialmente reforçamos nossos sistemas imunológicos. Estávamos praticamente invulneráveis contra qualquer patógeno externo. Então, começaram as mutações.\n\nGelebor foi o primeiro a morrer. Foi difícil assistir. Agora, toda a equipe está descansando no necrotério, e logo me juntarei a eles.\n\nNós falhamos. Confiamos nossas vidas à fórmula imperfeita de Gelebor. O Macrófago Universal atua bem demais – ele inevitavelmente ataca o próprio hospedeiro. Tudo aqui deve ser destruído.§!"
 strange_worlds.2015.a: "Destrua tudo."
 strange_worlds.2015.b: "Finalize o trabalho de Gelebor. Parece promissor."
 strange_worlds.2015.b.mutation: "Somos mestres da Mutação. Vamos terminar o trabalho."
 has_tr_mutation_finish_tt: "Esta opção está disponível porque concluímos a Árvore de Tradição de §Y$Mutation$§!."
 strange_worlds.2015.c: "Podemos fazer bom uso dessa pesquisa equivocada."
 strange_worlds.2030.name: "Mutações Fatais"
 strange_worlds.2030.desc: "Cidadãos em §Y[Root.GetName]§! estão passando por mutações físicas severas que prejudicam o funcionamento de células e órgãos vitais. Embora em alguns casos essas alterações tenham aumentado a eficiência metabólica, o mais comum é que levem ao óbito.\n\nOs efeitos colaterais correspondem àqueles descritos nas anotações da pesquisa original do §YMacrófago Universal§!. Apesar de nossos esforços, tudo indica que as mutações fatais causadas pela fórmula são inevitáveis. Não podemos mais confiar nessa tecnologia. Destruiremos toda a reserva restante da fórmula e descontinuaremos seu uso."
 strange_worlds.2030.ct: "§Y[Root.GetName]§! perde 100 £pop£ Pops e 100 £pop£ Pops adicionais a cada $@macrophage_kill_pop_every_x$ £pop£ Pop(s) presente(s).\nTodos os £pop£ Pops orgânicos em §Y[Root.GetName]§! recebem §YMutações Gelebóricas§! e têm sua fisiologia alterada drasticamente."
 site_anomalous_cube: "Cubo Anômalo"
 anomalous_cube_desc: "Um cubo metálico colossal foi encontrado em §Y[Planet.GetName]§!. Sua forma perfeita sugere capacidades tecnológicas avançadas, embora ainda não saibamos qual a sua origem ou função. Uma expedição arqueológica pode trazer mais respostas."
 strange_worlds.2035.name: "Metal Ondulante"
 strange_worlds.2035.desc_intro: "Uma inspeção mais detalhada do misterioso cubo gigante em [fromfrom.planet.GetName] gerou mais perguntas que respostas. Suas superfícies externas são perfeitamente lisas e impenetráveis aos nossos scanners. Quando nos aproximamos do cubo, sua imponente fachada parece ondular gentilmente em resposta à nossa presença."
 strange_worlds.2035.desc_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! concluiu que ele foi construído a partir de um tipo de §Ymetal vivo§!."
 strange_worlds.2035.desc_no_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! concluiu que ele foi construído a partir de um estranho tipo de metal diferente de tudo o que já vimos."
 strange_worlds.2035.a: "Continue com as investigações."
 strange_worlds.2040.name: "Dentro do Cubo"
 strange_worlds.2040.desc: "Enquanto §H[event_target:anomalous_cube_scientist.GetName]§! examinava o cubo metálico em [fromfrom.planet.GetName], uma das superfícies ondulou de repente e abriu-se, criando uma passagem para o interior do objeto. Ao entrar, encontramos um painel de comando ainda ocupado pela carcaça decomposta de um moluscoide; toda a carne que antes havia ali deteriorou-se em um pó fino.\n\nNo painel, encontramos um estranho recipiente de onde emanam batidas e ruídos, como se algo se movesse no interior. Contudo, o selo do recipiente é complexo e §H[event_target:anomalous_cube_scientist.GetName]§! ainda não foi capaz de abri-lo."
 strange_worlds.2040.evopred: "Certamente ainda podemos recuperar o pó."
 strange_worlds.2045.name: "Registros de Áudio Descobertos"
 strange_worlds.2045.desc: "Enquanto minerava os dados do painel central do cubo, §H[event_target:anomalous_cube_scientist.GetName]§! conseguiu recuperar e decifrar dois registros de áudio curtos. Eles contêm uma série de estalos guturais e oclusivas glotais vocalizados por um único interlocutor. Após o cruzamento de referências com nossa base de dados linguísticos, §H[event_target:anomalous_cube_scientist.GetName]§! encontrou um antigo idioma semelhante e elaborou uma tradução do primeiro registro:\n\n§L\"Membros do comitê, vocês devem me ouvir. Ainda há tempo para evitar esta guerra. A confiança de seus dinastas é infundada, não podemos derrotar [event_target:anomalous_cube_fallen_empire.GetName]. Eles nos destruirão!\"\n\n\"A conciliação é o único caminho. Minha caixa contém um presente, uma oferta de paz: os segredos de nosso domínio sobre o metal vivo. Entregá-la a eles é a única forma de evitarmos a aniquilação.\"§!"
 strange_worlds.2045.a: "Traduza o segundo registro de áudio."
 strange_worlds.2050.name: "Maravilha de Metal Vivo"
 strange_worlds.2050.desc_intro: "O segundo registro de áudio do painel de comando do cubo foi traduzido.\n\n§L\"Membros do comitê, eu fracassei. Nossa aniquilação é iminente e inevitável.\n\nMinha espaçonave hexaedra foi sabotada. Tentarei um pouso de emergência em [fromfrom.planet.GetName]. Mesmo que eu sobreviva, a oferta de paz não será entregue. Seremos atacados por [event_target:anomalous_cube_fallen_empire.GetName], como temíamos.\"§!\n\n§H[event_target:anomalous_cube_scientist.GetName]§! conseguiu decodificar o mecanismo de trava da caixa. Dentro, há uma estranha pepita de metal. Ela é bastante maleável e hiperativa, mudando constantemente entre formas intrincadas dentro de poucos segundos."
 strange_worlds.2050.desc_no_war_lm: "\nPodemos confiscar essa curiosidade para ampliar nossa compreensão sobre o metal vivo ou fazer o que seus antigos donos pretendiam e entregá-la a [event_target:anomalous_cube_fallen_empire.GetName] para melhorar nossas relações com eles."
 strange_worlds.2050.desc_no_war_no_lm: "\nPodemos confiscar essa curiosidade para ampliar nossa compreensão sobre esse metal extraordinário ou fazer o que seus antigos donos pretendiam e entregá-la a [event_target:anomalous_cube_fallen_empire.GetName] para melhorar nossas relações com eles."
 strange_worlds.2050.desc_war_lm: "\nO item notável e a nave cuboide de onde ele veio serão usados para ampliar nosso conhecimento sobre metal vivo."
 strange_worlds.2050.desc_war_no_lm: "\nO item notável e a nave cuboide de onde ele veio serão usados para ampliar nosso conhecimento sobre compostos e estruturas metálicas."
 strange_worlds.2050.a_no_war: "Dê de presente a [event_target:anomalous_cube_fallen_empire.GetName]."
 strange_worlds.2050.b_fallen_not_defeated_no_war: "Vamos ficar com ele."
 strange_worlds.3005.name: "Profeta Suspeito"
 strange_worlds.3005.desc: "Enquanto observava a população local de §Y[event_target:pre_ftl_planet.GetName]§!, nossa equipe de exploração deparou-se com uma descoberta interessante.\n\nA capital está em polvorosa com conversas sobre um \"Escolhido\" que supostamente desceu das estrelas para cumprir uma antiga profecia e liderar os [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] rumo a uma nova era de ouro.\n\nTodo o nosso pessoal foi contabilizado. Quem quer que esteja visitando o planeta merece nossa atenção."
 strange_worlds.3005.a: "Descubra mais."
 strange_worlds.3010.name: "Falso Profeta"
 strange_worlds.3010.desc_intro: "A investigação conduzida por nossa equipe de exploração sobre o \"Escolhido\" em §Y[event_target:pre_ftl_planet.GetName]§! revelou sua identidade.\n\n"
 strange_worlds.3010.desc_no_megacorp: "Um indivíduo §Ynômade namaraiano§! está se passando pela deidade central da mitologia do povo [event_target:pre_ftl_planet.Owner.GetSpeciesName], que \"desceu das estrelas\"."
 strange_worlds.3010.desc_megacorp: "Um indivíduo caravaneiro da espécie §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§! está se passando pela deidade central da mitologia do povo [event_target:pre_ftl_planet.Owner.GetSpeciesName], que \"desceu das estrelas\"."
 strange_worlds.3010.desc_outro: "\nUma exploração mais detalhada revelou que o indivíduo caiu no planeta e ocultou sua nave inoperante em um vale inacessível, distante da capital. Com base no modelo ultrapassado dos hiperpropulsores, ele está aqui há algum tempo.\n\nDesde sua queda, o indivíduo parece ter se aproveitado da superstição local. Ele logo aceitou a adoração e louvor dos locais, sendo considerado um governante com profundo \"conhecimento celestial\".\n\nSe não intervirmos, a presença desse charlatão no planeta certamente trará consequências graves para o desenvolvimento da sociedade. Talvez devêssemos agir."
 strange_worlds.3010.a: "Exponha-o como a fraude que ele é."
 strange_worlds.3010.b: "Ofereça resgate."
 strange_worlds.3015.name: "Verdade Revelada"
 strange_worlds.3015.desc_no_megacorp: "Destituímos o §Ynômade namaraiano§! em §Y[event_target:pre_ftl_planet.GetName]§! que se disfarçava como \"O Escolhido\" da mitologia do povo [event_target:pre_ftl_planet.Owner.GetSpeciesName]."
 strange_worlds.3015.desc_megacorp: "Destituímos o indivíduo §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§! em §Y[event_target:pre_ftl_planet.GetName]§! que se disfarçava como \"O Escolhido\" da mitologia do povo [event_target:pre_ftl_planet.Owner.GetSpeciesName]."
 strange_worlds.3015.desc_outro: "\nApós o estudo detalhado das lendas locais, conseguimos convencer a classe governante de que o tal \"Escolhido\" era na verdade um demônio enviado para iludi-los e mergulhar o planeta em mil anos de escuridão.\n\nAproveitamos as partes da nave acidentada como sucata, eliminando todos os vestígios que pudessem ser encontrados pelos locais. No entanto, alguns artigos pessoais já haviam sido descobertos e deram a essa espécie o vislumbre de uma tecnologia além de sua compreensão atual."
 strange_worlds.3015.a: "Lamentável."
 strange_worlds.3020.name: "De Volta para Casa"
 strange_worlds.3020.desc_intro: "Nossa equipe de exploração conseguiu uma audiência particular com o \"Escolhido\" de §Y[event_target:pre_ftl_planet.GetName]§! e lhe ofereceu nossos serviços para o reparo de sua nave e levá-lo de volta ao espaço.\n\n"
 strange_worlds.3020.desc_no_megacorp: "O §Ynômade namaraiano§! aceitou a oferta de muito bom grado, explicando que foi confundido com uma deidade após ficar preso em §Y[event_target:pre_ftl_planet.GetName]§! e desde então teme pela sua segurança caso a verdade venha à tona."
 strange_worlds.3020.desc_megacorp: "O indivíduo §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§! aceitou a oferta de muito bom grado, explicando que foi confundido com uma deidade após ficar preso em §Y[event_target:pre_ftl_planet.GetName]§! e desde então teme pela sua segurança caso a verdade venha à tona."
 strange_worlds.3020.desc_outro: "\nApós o levarmos para nosso posto de pesquisa e consertarmos sua nave, o viajante, agradecido, nos presenteou com uma ampla porção do inventário de sua nave antes de se despedir.\n\nO vácuo de poder gerado pela sua partida acarretou uma disputa brutal entre as diversas seitas religiosas em §Y[event_target:pre_ftl_planet.GetName]§!, que agora foi encerrada."
 strange_worlds.3020.a: "Fascinante."
 strange_worlds.3025.name: "[event_target:nomad01_country.GetName]"
 strange_worlds.3025.desc: "Saudações, [Owner.GetSpeciesNamePlural]. Chegou à nossa atenção que vocês se livraram de um namaraiano rebelde que se separou de nossa frota.\n\nVocês nos fizeram um favor. Esse indivíduo desorientado era um aborrecimento constante, e suas ambições desvairadas colocavam em risco nossa jornada.\n\nPor favor, aceitem isso como forma de agradecimento."
 strange_worlds.3025.a: "Ficamos gratos."
 strange_worlds.3030.name: "[event_target:caravaneer_home_country.GetName]"
 strange_worlds.3030.desc: "[Owner.GetSpeciesNamePlural] se encarregaram do §YRaquete§! perdido? Muito bom! Aquele tolo só nos causou dor de cabeça. As besteiras que ele falava? Uma vergonha. É a quinta vez que isso acontece. Sinceramente? Ele já vai tarde.\nAqui, um presente por vocês terem resolvido esse problema. É uma oferta limitada, melhor não há."
 strange_worlds.3030.a: "Ficamos gratos."
 strange_worlds.3040.name: "O Que Deixamos para Trás"
 strange_worlds.3040.desc: "Nosso posto de observação sobre §Y[event_target:pre_ftl_planet.GetName]§! relatou o desaparecimento de caixas de suprimentos após uma recente inspeção geológica na superfície.\n\nEnquanto rastreávamos os geolocalizadores presentes nos suprimentos, descobrimos que um vilarejo encontrou e tomou os recursos para si.\n\nA introdução de nossos recipientes pode ter um efeito adverso sobre o desenvolvimento do povo [event_target:pre_ftl_planet.Owner.GetSpeciesAdj]."
 strange_worlds.3040.a: "Lamentável."
 strange_worlds.3045.name: "Devolver ao Remetente"
 strange_worlds.3045.desc_common: "Parece que o inventário perdido em §Y[event_target:pre_ftl_planet.GetName]§! causou um estranho impacto na cultura nativa.\n\nO povoado [Root.GetPreFTLLower] construiu imitações rudimentares de nossos transportes de observação. Obviamente, essas \"naves\" são inoperantes, mas isso é uma prova de que nossos pesquisadores foram avistados durante a inspeção.\n\nSob a orientação de um ancião local, os [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] estão repetindo nosso procedimento de análise do solo: preenchendo as caixas perdidas com terra e pedras, carregando-as nas \"naves\" e aguardando pacientemente."
 strange_worlds.3045.desc_non_homicidal: "\nOs [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] parecem acreditar que ao imitar o processo, mais suprimentos aparecerão. Deveríamos intervir antes que esse comportamento cause impactos mais extensos na sociedade."
 strange_worlds.3045.desc_homicidal: "\nEssa prática é inútil; apenas a morte os aguarda."
 strange_worlds.3045.a_normal: "Recupere nossas caixas em segredo."
 strange_worlds.3045.a_megacorp: "Recupere nossos ativos discretamente."
 strange_worlds.3045.b_normal: "Troque alimentos pelos minerais que eles possuem."
 strange_worlds.3045.b_megacorp: "Vamos negociar!"
 strange_worlds.3045.c: "Elimine esses seres primitivos."
 strange_worlds.3045.ct: "O posto de observação que monitora atualmente §Y[event_target:pre_ftl_planet.GetName]§! agora produzirá $@observation_outpost_crate_minerals_production$ $i_minerals$ com uma manutenção de $@observation_outpost_crate_food_upkeep$ de $i_food$"
 strange_worlds.3050.name: "Ausência Ressentida"
 strange_worlds.3050.desc: "Após a recuperação das caixas perdidas em §Y[event_target:pre_ftl_planet.GetName]§!, os rituais de carregamento de \"naves\" continuaram por algum tempo, até que os [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] locais, furiosos, voltaram-se contra o ancião, lançando-o em uma das naves rudimentares e ateando fogo, até só restarem cinzas.\n\nEmbora a população tenha retomado sua antiga rotina, sua cultura preserva um ressentimento latente em relação ao \"povo do céu\"."
 strange_worlds.3050.a: "Entendido."
 strange_worlds.3060.name: "Cancelamento do Serviço"
 strange_worlds.3060.desc: "Conforme o povoado [Root.GetPreFTLLower] dos [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] avança, descontinuamos nosso escambo de alimentos por minerais no posto de observação.\n\nEmbora o experimento tenha sido interessante, a interferência continuada em sua civilização apenas aumenta o risco de nossa presença ser exposta prematuramente."
 strange_worlds.3060.a: "É uma medida aceitável."
 strange_worlds.3060.ct: "O posto de observação não produzirá mais minerais e não terá mais uma manutenção de comida"
 strange_worlds.3070.name: "Anomalia Orbital"
 strange_worlds.3070.desc: "Uma anomalia gravitacional retirou o nosso posto de observação sobre §Y[event_target:pre_ftl_planet.GetName]§! de órbita, fazendo com que ele caísse brevemente na atmosfera inferior do planeta.\n\nEmbora a tripulação não esteja ferida e a trajetória original tenha sido restaurada, há preocupações de que a estação pode ter sido avistada da superfície pelos [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural].\n\nSó o tempo dirá se fomos expostos para os locais, e qual o tamanho do impacto que isso terá em sua sociedade."
 strange_worlds.3070.a: "Continue com as observações."
 strange_worlds.3075.name: "Escadas para o Céu"
 strange_worlds.3075.desc_common: "Tecnologias primitivas de captura de imagens registraram nosso posto de observação enquanto ele estava em baixa órbita sobre §Y[event_target:pre_ftl_planet.GetName]§!. Juntamente aos relatos de testemunhas oculares, essas fotografias inspiraram algumas nações a construir \"escadas para o céu\" com o objetivo de investigar melhor.\n\nEmbora esse esforço seja claramente inútil, a disputa entre os estados-nação está tendo um efeito desestabilizante. Antigas tensões estão vindo à tona durante a corrida para concluir a primeira \"escada\", acentuadas pelo orgulho nacional e pela escassez de recursos."
 strange_worlds.3075.desc_non_homicidal: "\nSe pudermos desacreditar sua prova de nossa existência, talvez consigamos dissipar as tensões antes que a situação saia de controle.\n\nPor outro lado, essa postura diplomática entre entidades políticas de um poder [Root.GetPreFTLLower] poderia render um interessante estudo de caso sociológico, ainda que apresente o risco de um agravamento violento."
 strange_worlds.3075.desc_homicidal: "\nO caos iminente deverá apresentar uma excelente oportunidade de pesquisa."
 strange_worlds.3075.a: "Desacredite a prova de nossa existência."
 strange_worlds.3075.b: "Continue com as observações."
 strange_worlds.3075.b_ct: "A produção de Pesquisa de £society£ §YSociedade§! do posto de observação será duplicada"
 strange_worlds.3080.name: "A Verdade Está Lá Fora"
 strange_worlds.3080.desc: "Nossos agentes conseguiram desacreditar as provas de nossa existência em §Y[event_target:pre_ftl_planet.GetName]§!.\n\nCom as imagens desmascaradas e a credibilidade das testemunhas oculares destruída, a construção das \"escadas para o céu\" foi interrompida. Envergonhadas de sua tolice, as nações antes divididas comprometeram-se com a busca pela investigação racional e pelo método científico.\n\nOs locais de construção das escadas foram transformados em centros de aprendizado superior, e um novo grupo de acadêmicos reuniu-se para desmistificar os mitos da \"Cidadela no Céu\"."
 strange_worlds.3080.a: "$FASCINATING$"
 strange_worlds.3080.a_ct: "[event_target:pre_ftl_country.GetName] ganha 50% de progresso rumo à nova era.\n[event_target:pre_ftl_country.GetName] torna-se Materialista."
 strange_worlds.3085.name: "A Grande Guerra das Escadas"
 strange_worlds.3085.desc: "Durante os esforços para construir as \"escadas para o céu\", as tensões entre as nações de caráter [Root.GetPreFTLLower] em §Y[event_target:pre_ftl_planet.GetName]§! levaram a um conflito global. Os últimos dois anos de carnificina e luta por recursos cada vez mais escassos, conhecidos como a \"Grande Guerra das Escadas\", finalmente chegaram ao fim.\n\nOs termos principais do tratado de paz promovem a criação de uma frente unificada contra o inimigo em comum, a \"Cidadela no Céu\". Enquanto os [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] reconstroem seu mundo devastado pela guerra, sua crescente paranoia e ódio do desconhecido tornarão futuras interações mais difíceis."
 strange_worlds.3085.a: "Problemas para outro momento."
 strange_worlds.3085.a_ct: "A produção de Pesquisa de £society£ §YSociedade§! do posto de observação voltará ao normal"
 create_hibernators_pops_ct: "Cria $@hibernators_pops_created|*0$ £job_pre_sapient£ Pops Pré-Sapientes com a característica §Y$trait_seasonal_dormancy$§!"
 pm_bleeding_planet: "Sangramento Planetário"
 pm_bleeding_planet_desc: "A própria terra sangra. É necessário cautela ao perturbar o solo sob os colonizadores.\n"
 pm_contruction_coagulate: "Coágulo de Construção"
 pm_contruction_coagulate_desc: "A própria terra sangra com a presença dos colonizadores. O líquido viscoso atua como um adesivo natural, embora perigoso.\n"
 pm_hemosymbiosis: "Hemossimbiose"
 pm_hemosymbiosis_desc: "Um líquido estranho que escorre do interior do planeta influencia o desenvolvimento. O tempo de construção e a mineração se beneficiam dessa substância em detrimento do crescimento da colônia.\n"
 pm_parasitic_production: "Produção Parasítica"
 pm_parasitic_production_desc: "Formas de via parasíticas deste planeta foram adaptadas para aumentar a produtividade de todos os trabalhadores.\n"
 pm_frying_fauna: "Fauna Refinadora"
 pm_frying_fauna_desc: "A megafauna deste mundo se prolifera em condições otimizadas. Suas enzimas digestivas únicas são úteis no refinamento de ligas metálicas."
 pm_frying_fauna_machine: "$pm_frying_fauna$"
 pm_frying_fauna_machine_desc: "$pm_frying_fauna_desc$"
 pm_frying_fauna_2: "$pm_frying_fauna$"
 pm_frying_fauna_2_desc: "Extratores elétricos convertem a megafauna deste mundo em um suprimento constante de nutrientes."
 pm_frying_fauna_2_machine: "$pm_frying_fauna$"
 pm_frying_fauna_2_machine_desc: "$pm_frying_fauna_2_desc$"
 pm_catalytic_excrement: "Excremento Catalítico"
 pm_catalytic_excrement_ct: "A megafauna deste mundo se prolifera em condições otimizadas. Suas enzimas digestivas únicas são úteis no refinamento de ligas metálicas."
 pm_strange_sandstorm: "Tempestades de Areia Estranhas"
 pm_strange_sandstorm_ct: "Um fenômeno singular com as areias do planeta está afetando as operações desta colônia."
 pm_perpetual_lightning: "Tempestade Eterna"
 pm_perpetual_lightning_desc: "Cristais irradiados, expostos durante uma anomalia de terraformação, criaram as condições meteorológicas perfeitas para uma tempestade elétrica perpétua em todo o planeta."
 pm_dark_matter_geyser: "Gêiser de Matéria Escura"
 pm_dark_matter_geyser_desc: "O planeta está se afogando em um miasma de matéria escura."
 pm_population_quarantine: "População em Quarentena"
 pm_population_quarantine_desc: "A população está sob quarentena enquanto os efeitos da petrificação de matéria escura são investigados."
 pm_dark_matter_statue: "Estátuas de Matéria Escura"
 pm_dark_matter_statue_desc: "Carapaças petrificadas de matéria escura solidificada podem ser encontradas em todo o planeta. Esses resquícios sinistros de uma antiga população fornecem uma oportunidade de pesquisa."
 pm_raining_corpses: "Chuva de Cadáveres"
 pm_raining_corpses_desc: "Nuvens densas, antes usadas como um cemitério por uma raça alienígena, estão ficando mais finas, soltando o conteúdo dos túmulos celestes sobre a superfície planetária."
 pm_raining_corpses_tt: "£minor_artifacts£ $minor_artifacts$ de £job£ Empregos de $WORKERS$"
 pm_raining_corpses_no_ancrel: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_desc: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_tt: "£consumer_goods£ $consumer_goods$ de £job£ Empregos de £pop_cat_worker£ $pop_cat_worker$"
 pm_revolting_pests: "Pestes Revoltantes"
 pm_revolting_pests_desc: "Os animais deste planeta são tão fascinantes quanto nojentos. Recomenda-se distância dessas criaturas."
 pm_gaseous_fauna: "Fauna Gasosa"
 pm_gaseous_fauna_desc: "Uma espécie domesticada da fauna nativa fornece diversão e secreções gasosas para a população planetária."
 pm_gaseous_fauna_ct: "Todos os £pop£ Pops produzem §G$@gaseous_fauna_exotic_gases_production$§! de $i_exotic_gases$"
 pm_urban_privilege_regular: "Privilégio Urbano"
 pm_urban_privilege_regular_desc: "O apoio aos distritos urbanos em uma disputa local irritou os distritos rurais."
 pm_urban_privilege_broken_shackles: "$pm_urban_privilege_regular$"
 pm_urban_privilege_broken_shackles_desc: "$pm_urban_privilege_regular_desc$"
 pm_rural_privilege_regular: "Privilégio Rural"
 pm_rural_privilege_regular_desc: "O apoio aos distritos rurais em uma disputa local irritou os distritos urbanos."
 pm_rural_privilege_broken_shackles: "$pm_rural_privilege_regular$"
 pm_rural_privilege_broken_shackles_desc: "$pm_rural_privilege_regular_desc$"
 pm_peacekeeper_deployment: "Mobilização de Forças de Paz"
 pm_peacekeeper_deployment_desc: "Mais esforços para a manutenção da paz estão em vigência enquanto resolvemos as disputas entre distritos."
 bacterial_drive_modifier_desc: "Reservatórios de água enriquecidos com suplementos bacterianos geneticamente modificados inspiram o comprometimento excepcional da população a um objetivo em comum."
 pm_bd_reproduction: "Estímulo Bacteriano: Reprodução"
 pm_bd_reproduction_desc: "$bacterial_drive_modifier_desc$"
 pm_bd_strength: "Estímulo Bacteriano: Força"
 pm_bd_strength_desc: "$bacterial_drive_modifier_desc$"
 pm_bd_creativity: "Estímulo Bacteriano: Criatividade"
 pm_bd_creativity_desc: "$bacterial_drive_modifier_desc$"
 ladder_wars_pre_ftl: "Legado da Guerra das Escadas"
 ladder_wars_pre_ftl_desc: "Enquanto este mundo devastado pela guerra se reconstrói, o aumento da paranoia torna interações com os outros um desafio para todas as partes envolvidas."
 living_metal_mega_construction_insight: "Conhecimento de Megaconstrução de Metal Vivo"
 living_metal_mega_construction_insight_desc: "O artefato de metal vivo que recuperamos nos proporcionou compreensões incríveis para o desenvolvimento de megaestruturas."
 living_metal_mega_construction_insight_ct: "Custo Base do Edito de Megaconstrução de Metal Vivo: §G-50%§!"
 d_coagulated_landscape: "Paisagem Coagulada"
 d_coagulated_landscape_desc: "Um líquido viscoso escorre da superfície do planeta, coagulando-se para formar um material nocivo e quase impenetrável. Isso reduz consideravelmente o espaço para a construção segura."
 d_shimmering_structure: "Estrutura Cintilante"
 d_shimmering_structure_desc: "Uma estrutura imensa e cintilante de origem desconhecida."
 d_geothermal_hotspot: "Foco Geotérmico"
 d_geothermal_hotspot_desc: "Este planeta tem um sítio geotérmico excepcional que fornece energia e oportunidades de pesquisa."
 d_ancient_cloaking_array: "Matriz de Camuflagem Antiga"
 d_ancient_cloaking_array_desc: "Esta colônia se beneficia da presença de uma antiga matriz alienígena de camuflagem. Inimigos terão dificuldades em atacá-la, e os colonizadores sentem-se seguros aqui."
 d_psionic_sands: "Areias Psiônicas"
 d_psionic_sands_desc: "As areias deste planeta têm altas concentrações de Zro. É possível se comunicar com elas."
 d_mountains_of_steel: "Montanhas de Aço"
 d_mountains_of_steel_desc: "Forjada no calor extremo da terraformação, esta cordilheira vasta e irredutível serve como um rico depósito de recursos."
 d_lava_tubes: "Tubos de Lava"
 d_lava_tubes_desc: "Fluxos de lava formaram túneis profundos e ricos em minerais aqui. Esses depósitos apresentam oportunidades lucrativas de mineração."
 d_lava_tubes_ct: "$t$Custo de £energy£ para a Manutenção de Empregos de [miner.GetIcon] [miner.GetName]: §R+$@lava_tubes_mining_job_upkeep$§!"
 d_lava_tubes_ct_short: "§R+$@lava_tubes_mining_job_upkeep$§! de Custo de Manutenção de £energy£ para Empregos de [miner.GetIcon] [miner.GetName]"
 d_hydroactive_eggs: "Ovos Hidroativos"
 d_hydroactive_eggs_desc: "A água é abundante no ambiente natural aqui, proporcionando um aumento notável na taxa de reprodução da fauna."
 d_explosive_atmosphere: "Atmosfera Explosiva"
 d_explosive_atmosphere_desc: "Concentrações de partículas voláteis no ar tornam a atmosfera deste planeta altamente inflamável."
 d_explosive_atmosphere_ct: "$t$£volatile_motes£ §Y$volatile_motes$§! de Empregos de [mote_harvester.GetIcon] $mote_harvester$: §G+50%§!"
 d_explosive_atmosphere_ct_short: "§G+50%§! de £volatile_motes£ §Y$volatile_motes$§! de Empregos de [mote_harvester.GetIcon] $mote_harvester$"
 d_blue_lava: "Lava Azul"
 d_blue_lava_desc: "O processo de terraformação acarretou uma reação entre depósitos ricos em gases e ligas metálicas no interior do planeta, cobrindo a superfície do mundo com uma deslumbrante lava azul."
 d_crystaline_growths: "Crescimento Cristalino"
 d_crystaline_growths_desc: "Este planeta possui uma abundância de afloramentos cristalinos que podem ser explorados."
 d_bogplants: "Plantas dos Charcos"
 d_bogplants_desc: "Charcos extremamente ácidos são o lar de uma espécie única de flora que secreta gases exóticos ao se alimentar."
 d_liquid_dark_matter: "Matéria Escura Líquida"
 d_liquid_dark_matter_desc: "Um estranho gêiser entrou em colapso, formando uma piscina de matéria escura líquida."
 d_space_junk_hazards: "Lixo Espacial Perigoso"
 d_space_junk_hazards_desc: "Destroços espaciais em órbita apresentam perigos para naves e estruturas na superfície quando entram na atmosfera do planeta."
 trait_inner_darkness: "Escuridão Interior"
 trait_inner_darkness_desc: "Com os corpos aprimorados após a saturação de matéria escura, eles agora exalam traços de partículas não bariônicas em intervalos regulares, mas sua expectativa de vida foi seriamente reduzida."
 trait_inner_darkness_tt: "£sr_dark_matter£ $produced_per_pop_group_unit$ £pop£ Pops: §G+$@inner_darkness_dark_matter_production$§!"
 trait_geleboric_mutations: "Mutações Gelebóricas"
 trait_geleboric_mutations_desc: "Reações lamentáveis aos experimentos alteraram drasticamente a fisiologia desta espécie."
 trait_psionic_ephapse: "Junção Psiônica"
 trait_psionic_ephapse_desc: "Após a exposição prolongada a uma bactéria psicotrópica, o sistema digestivo desta espécie produz probióticos psiônicos que promovem a comunicação telepática entre indivíduos afetados."
