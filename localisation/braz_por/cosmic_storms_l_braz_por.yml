 #Eye of the Storm
 cstorms.1801.name: "Olho da Tempestade"
 cstorms.1801.desc: "Análises detectaram irregularidades no centro de [fromfrom.GetName], em [from.GetName], indicando que a formação está carregando uma massa estranha em seu interior. Essas leituras curiosas devem ser investigadas mais a fundo, antes que a tempestade se dissipe ou deixe o sistema."
 EYE_OF_THE_STORM_PROJECT: "$cstorms.1801.name$"
 EYE_OF_THE_STORM_PROJECT_DESC: "Análises de [fromfrom.GetName], em [this.GetName], sugerem a presença de uma enorme massa em seu vórtice interior. Sensores de longo alcance foram incapazes de apresentar respostas conclusivas sobre esse estranho fenômeno. Para que possamos compreender melhor a situação, devemos enviar uma expedição de campo até o olho da tempestade."
 cstorms.1805.name: "Dentro do Vórtice"
 cstorms.1805.desc: "Ao navegar para o olho da tempestade cósmica em [from.GetName], [leader.GetName] descobriu a causa das irregularidades nas análises. Essa estranha tempestade está sendo alimentada por uma enorme concentração central de [from.star.GetEarnedResources].\n\nNossa nave científica coletou todos os recursos que conseguiu antes de ser violentamente ejetada. Os dados de sensores da fuga arriscada ajudarão nossos engenheiros a melhorar o desempenho das naves sob condições extremas."
 cstorms.1805.desc.traumatized: "Infelizmente, essa façanha perigosa teve um impacto duradouro em [leader.GetName]."
