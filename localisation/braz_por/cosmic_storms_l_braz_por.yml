 resolution_cosmic_storms_storm_encouragement_mandate: "Mandato de Deslocamento de Tempestades"
 resolution_cosmic_storms_storm_encouragement_mandate_desc: "Ao dispersar energia e partículas vitais, tempestades cósmicas sopram vida na galáxia, renovando todos os planetas e sistemas que tocam. Sua passagem natural não deve ser evitada."
 resolution_cosmic_storms_storm_encouragement_mandate_tooltip: "$emergency_fund_contribution$ §R10%§! \n\n$storm_tech_cost$ §R+50%§!\n\n$breach_galactic_law_intro$$TABBED_NEW_LINE$- §YTecnologia de Repulsão de Tempestades§!"
