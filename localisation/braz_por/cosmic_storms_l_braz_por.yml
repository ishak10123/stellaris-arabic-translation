 ###########################################
 #Anomalies #
 ###########################################
 STORMS_ANOM_ANTS: "O Cometa Orgânico"
 STORMS_ANOM_ANTS_DESC: "Uma tempestade cósmica deixou em seu rastro um cometa de composição curiosa: parece algum tipo de matéria orgânica. Nossa equipe de [solar_system.Owner.GetScientistPlural] está ansiosa para começar a investigá-lo."
 cstorms.5020.name: "Formigueiro Espacial"
 cstorms.5020.desc: "O cometa é na verdade um ninho gigantesco de insetos minúsculos. A cauda do cometa não é criada pela desgaseificação do gelo, mas pela liberação de processos químicos que ocorrem no interior da colmeia.\n\nA camada mais externa do ninho é composta de indivíduos mortos e protege a vida no interior das condições severas do espaço. Também detectamos vários tipos de fungos vivendo dentro e ao redor do ninho. Está em ação uma complexa simbiose em que os fungos se alimentam dos gases liberados e os insetos se alimentam dos fungos."
 cstorms.5020.a: "Extraia o ninho."
 cstorms.5020.b: "Observe, mas não toque."
 STORMS_ANOM_STAT: "Composição Confusa"
 STORMS_ANOM_STAT_DESC: "Este objeto em órbita foi deixado após a passagem de uma tempestade cósmica. Inicialmente acreditávamos ser uma estação espacial, mas sua composição estrutural está mostrando resultados confusos. Uma investigação é aconselhável."
 cstorms.5030.name: "Apocalipse Estacionário"
 cstorms.5030.desc: "Nossa equipe de [Root.Owner.GetScientistPlural] relatou que grande parte dessa estação espacial foi construída a partir de objetos mundanos que impedem, ainda que de forma precária, a estação de entrar em colapso. À medida que adentramos a estrutura, os objetos mudam de ligas metálicas para plástico e outras substâncias.\n\nNa parte mais interior do construto encontramos uma máquina ainda em meio ao processo de desconstruir com eficiência matéria orgânica e modelá-la nos itens que encontramos até agora.\n\nApós a execução de um modelo de simulação de DNA, a equipe de [Root.Owner.GetScientistPlural] foi forçada a concluir que o material provavelmente é proveniente dos antigos habitantes deste entreposto."
 cstorms.5030.evopred: "Veja se podemos ganhar alguma coisa aqui."
 STORMS_ANOM_BRAIN: "Dissipação Existencialista"
 STORMS_ANOM_BRAIN_DESC: "Desde que uma $shroud_storm$ assolou este sistema, temos recebido estranhos sinais. Contudo, assim que nossa equipe de [Root.Owner.GetScientistPlural] tentou responder à cacofonia de saudações, as mensagens dissiparam-se mais uma vez. É aconselhável o envio de uma nave científica."
 cstorms.5025.name: "Tempestade Cerebral"
 cstorms.5025.desc: "Nunca poderíamos ter antecipado esta descoberta: cérebros. Órgãos molengas e orgânicos de processamento central de todos os tipos de espécies. Centenas de milhares deles, todos conectados e suspensos em uma enorme cápsula em forma de balão que parece à deriva, flutuando pelas profundezas do espaço desde que uma $shroud_storm$ se dissipou recentemente.\n\nA cápsula contém uma incrível matriz de sensores fixada aos cérebros e ao balão. Há também um módulo de comunicação capaz de saudar naves e transmitir informações, como fez conosco.\n\nParece provável que esses cérebros tenham nos contatado, o que explica a cacofonia de mensagens. Nossa equipe de [Root.Owner.GetScientistPlural] acredita que a construção foi projetada para mensurar respostas orgânicas à $shroud_storm$. Levando em consideração os resíduos psiônicos instáveis dentro dessas mentes flutuantes, tentar interagir com elas resultaria apenas em catástrofe."
 #Terrestrial Telescopes
 terrestial_telescope_category: "Telescópios Terrestres"
 terrestial_telescope_category_desc: "Análises realizadas pela frota [fleet.GetName] sugerem a presença de uma estação espacial abandonada no sistema [From.GetStarName].\n\nEla parece ter sido depositada lá após a passagem de uma tempestade cósmica. Não foram encontrados sinais de vida, bem como nenhuma fonte de energia. Dois telescópios gigantescos projetam-se de lados opostos da estação. Esses instrumentos óticos parecem avançados e grandes demais em relação ao tamanho da estação. Sua tecnologia e arquitetura não são familiares.\n\nPoderíamos tentar reativar os telescópios, pois talvez isso resulte em informações interessantes."
 cstorms.1605.name: "Telescópios Terrestres"
 cstorms.1605.desc: "Nossa equipe de [Root.Owner.GetScientistPlural] teve algum trabalho para embarcar na estação e ativar os telescópios, mas nada que não pudessem resolver. Porém, a parte da galáxia para a qual os instrumentos estão apontados não revelou nada digno de nota.\n\nAlguns artefatos interessantes foram encontrados espalhados pela estação: imagens detalhadas registradas pelos telescópios, colocadas caprichosamente em molduras decoradas. Cada uma das imagens está focada em tempestades cósmicas, com várias cópias de cada tempestade que já passou por este sistema. O operador do telescópio usou diversos ângulos, níveis de zoom e até inclinações artísticas para capturar o melhor registro das tempestades.\n\nApós mais investigações, as obras de arte são as únicas descobertas interessantes dentro da estação abandonada. Vamos arquivá-las para que futuras gerações possam admirar essas imagens de raro poder e beleza."
 STORMS_ANOM_POLYCHROMATIC: "Estrela Policromática"
 STORMS_ANOM_POLYCHROMATIC_DESC: "A passagem de uma tempestade cósmica pelo sistema [from.solar_system.GetName] transformou a aparência de sua estrela. Após a tempestade, a coroa da estrela apresenta um turbilhão de cores em constante mudança, ejetando explosões policromáticas em todas as direções. Um fenômeno assim merece uma análise aprofundada."
 cstorms.5035.name: "$STORMS_ANOM_POLYCHROMATIC$"
 cstorms.5035.desc: "[root.leader.GetName] relata alterações fascinantes nas reações de fusão de [From.GetStarName] desde a passagem da [from.GetAffectedStormType].\n\nAo que parece, a tempestade induziu reações nucleares inesperadas dentro do núcleo da estrela, resultando em uma dispersão constante de [from.GetEarnedResources] em suas zonas de convecção.\n\nEssas reações complexas e peculiares estão produzindo as explosões policromáticas incomuns que temos observado. Seja como for, o fenômeno continuará sendo uma fonte meritória de estudo por algum tempo."
 cstorms.5035.a: "Estude esses novos processos."
 cstorms.5035.b: "Colete esses novos recursos."
 STORMS_ANOM_TRIPLETS: "Asteroides Trigêmeos"
 STORMS_ANOM_TRIPLETS_DESC: "A passagem de uma tempestade cósmica depositou três novos asteroides no sistema [from.solar_system.GetName]. Esses corpos celestes estão sujeitos a mudanças inexplicáveis de direção, impossibilitando a previsão de suas trajetórias. Serão necessárias mais pesquisas."
 cstorms.5040.name: "$STORMS_ANOM_TRIPLETS$"
 cstorms.5040.desc: "[root.leader.GetName] descobriu que os asteroides depositados no sistema [from.solar_system.GetName] têm campos magnéticos altamente instáveis, fazendo com que eles ricocheteiem aleatoriamente nas magnetosferas existentes no sistema.\n\n[root.leader.GetName] conseguiu estabilizá-los ao adicionar compensadores magnéticos a cada asteroide, regulando suas trajetórias e possibilitando a extração de seus recursos."
 STORMS_ANOM_TRAVELLERS: "Sinal de Emergência Resultante"
 STORMS_ANOM_TRAVELLERS_DESC: "Como consequência da §H[from.GetAffectedStormType]§!, um sinal de emergência não identificado foi detectado no sistema §H[from.solar_system.GetName]§!."
 cstorms.5050.name: "Viajantes Deslocados"
 cstorms.5050.desc: "Identificamos a fonte do sinal de emergência no sistema §H[from.solar_system.GetName]§! como uma nave mercante gravemente danificada, mas ainda operacional.\n\nOs ocupantes alegam ter sido desviados para longe de seu curso pela §H[from.GetAffectedStormType]§!. A tempestade também queimou os motores, deixando a nave e seu conteúdo à deriva no espaço.\n\nEles estão dispostos a abrir mão de parte da carga em troca da nossa ajuda."
 cstorms.5050.a: "Vamos ajudá-los."
 cstorms.5050.evopred: "Ajudaremos em troca de algumas amostras de DNA."
 cstorms.5050.b: "Deseje-lhes sorte."
 cstorms.5050.c.genocide: "Tome a carga e a vida deles."
 cstorms.5050.d.devouring_swarm: "Uma refeição gratuita."
 STORMS_COSMIC_SLUDGE: "Lama Cósmica"
 STORMS_COSMIC_SLUDGE_DESC: "Sensores de massa que monitoram §H[from.solar_system.GetName]§! estão apresentando leituras erráticas após a passagem da §H[from.GetAffectedStormType]§!.\n\nOs diagnósticos do sistema não mostram sinais de erro técnico no equipamento. Essas leituras exigem uma investigação mais detalhada."
 cstorms.5060.name: "$STORMS_COSMIC_SLUDGE$"
 cstorms.5060.desc: "As leituras erráticas dos sensores no sistema §H[from.solar_system.GetName]§! derivam de uma formação de destroços extraordinária causada pela §H[from.GetAffectedStormType]§!.\n\nEssa entidade à deriva é uma bolha amorfa de lama cósmica, gerada pelas pressões extremas da tempestade. Os inúmeros elementos que a constituem formaram um componente reativo singular.\n\nUm estudo focado em sua química poderia gerar informações astrometeorológicas valiosas sobre as condições que a produziram."
 cstorms.5060.a: "Estude sua composição."
 cstorms.5060.b: "Vamos quebrá-la."
 STORMS_SHATTERED_SATTELITE: "Satélite Despedaçado"
 STORMS_SHATTERED_SATTELITE_DESC: "Como consequência da §H[from.GetAffectedStormType]§!, um objeto não identificado foi detectado no sistema §H[from.solar_system.GetName]§!. Poderemos obter informações valiosas se analisarmos esses destroços mais a fundo."
 cstorms.5070.name: "$STORMS_SHATTERED_SATTELITE$"
 cstorms.5070.desc: "O objeto no sistema §H[from.solar_system.GetName]§! é o destroço de um antigo satélite equipado com matrizes complexas de sensores astrometeorológicos. Acreditamos que ele percorreu uma longa distância pela galáxia durante a §H[from.GetAffectedStormType]§!.\n\nOs danos já não podem ser reparados, mas as bases de dados centrais contêm um grande armazenamento de informações que podemos usar em nosso favor.\n\nO resto do satélite serve apenas como sucata."
 STORMS_EVISCERATED_FAUNA: "Objeto Estranho"
 STORMS_EVISCERATED_FAUNA_DESC: "Sensores no sistema §H[from.solar_system.GetName]§! detectaram um objeto desconhecido, trazido pela recente §H[from.GetAffectedStormType]§!.\n\nPrecisamos de uma investigação mais detalhada para verificar a natureza da anomalia."
 cstorms.5080.name: "Destroços Orgânicos"
 cstorms.5080.desc.common: "Descobrimos que o objeto estranho no sistema §H[from.solar_system.GetName]§! é uma enorme massa de restos orgânicos oriundos de algum tipo de fauna alienígena. Como as características identificáveis foram destruídas pela tempestade cósmica, fica impossível catalogar os destroços biológicos corretamente."
 cstorms.5080.desc.swarm: "Felizmente, a maior parte ainda é comestível."
 cstorms.5080.desc.default: "[leader.GetName] acredita que uma análise forense mais detalhada dos restos da criatura pode revelar mais informações sobre sua origem e sobre os efeitos de uma §Y[from.GetAffectedStormType]§! em organismos espaciais semelhantes."
 cstorms.5080.a: "Temos fome."
 cstorms.5080.b: "Realize uma autópsia no local."
 cstorms.5080.c: "Descarte os restos mortais."
 FORENSIC_DISSECTION_PROJECT: "Dissecação Forense"
 FORENSIC_DISSECTION_PROJECT_DESC: "Encontramos os restos mortais de uma criatura desconhecida no sistema §H[solar_system.GetName]§!, arrastados pela galáxia por uma tempestade cósmica. A dissecação forense do cadáver deve revelar mais informações."
 cstorms.5085.name: "$FORENSIC_DISSECTION_PROJECT$"
 cstorms.5085.desc: "Após uma dissecação meticulosa, a espécie original dessa massa visceral continua sendo um mistério. O imenso dano recebido no epicentro da tempestade destruiu as possíveis características reconhecíveis ou marcadores genéticos.\n\nNo entanto, durante os estudos aprendemos sobre a composição de §Ytempestades cósmicas§! e seus efeitos devastadores na matéria xenobiológica."
 cstorms.5085.evopred: "Uma refeição fascinante."
 STORMS_DISPLACED_TIYANKI: "Tiyanki Deslocado"
 STORMS_DISPLACED_TIYANKI_DESC: "Como consequência da $default_storm$, nossos sensores detectaram três assinaturas Tiyanki no sistema §H[solar_system.GetName]§!."
 cstorms.5090.name: "$STORMS_DISPLACED_TIYANKI$"
 cstorms.5090.desc.common: "As três assinaturas Tiyanki no sistema §H[solar_system.GetName]§! foram identificadas como um conjunto de bezerros deslocados e desnutridos.\n\nA §Y$default_storm$§! separou esses bezerros de sua manada, deixando-os por conta própria.\n\nÉ improvável que sobrevivam por muito tempo no espaço. Nossos sensores mostram que eles estão tentando chamar sua manada, mas sem sucesso."
 cstorms.5090.desc.swarm: "Poderíamos amplificar seus pedidos de ajuda e usá-los como isca para atrair um banquete maior."
 cstorms.5090.desc.default: "Nossos sistemas de comunicação poderiam ser usados para amplificar seus pedidos de ajuda e atrair a manada para o sistema."
 cstorms.5090.a.default: "Amplifique o sinal."
 cstorms.5090.a.swarm: "Crie a armadilha."
 cstorms.5090.b.default: "A natureza é cruel."
 cstorms.5090.b.machine: "Inicie os protocolos de extermínio."
 cstorms.5090.b.swarm: "Uma refeição gratuita."
 cstorms.5090.c: "Dê a eles um novo lar."
 cstorms.5090.c.tt: "Adiciona 3 espécimes de §Y$NAME_Tiyanki_Hatchling$§! de raridade aleatória ao seu ['concept_vivarium']"
 REUNITE_POD_PROJECT: "Reunindo a Manada"
 REUNITE_POD_PROJECT_DESC: "Três bezerros Tiyanki, separados de sua manada por uma tempestade cósmica, estão perdidos e vagando no sistema [this.solar_system.GetName]. Poderemos ajudá-los a reencontrar a manada se amplificarmos seus berros para atraí-la até o sistema."
 cstorms.5095.name: "Tiyanki Reunidos"
 cstorms.5095.desc.common: "Uma vaca e um touro Tiyanki apareceram no sistema §H[solar_system.GetName]§! após ouvirem os berros dos três bezerros perdidos.\n\nOs jovens Tiyanki se reuniram com a manada e já parecem estar mais felizes e saudáveis.\n\nAs criaturas despejaram uma enorme massa de destroços próximo à nossa nave científica como uma aparente forma de agradecimento pela nossa ajuda. Para nossa surpresa, essa oferenda incomum contém vários materiais utilizáveis."
 cstorms.5095.desc.swarm: "Claro, essas bestas maiores são o verdadeiro prêmio. Entraram direto no abatedouro."
 ###########################################
 #Event Chains #
 ###########################################
 ### Collided Planet Event Chain
 collided_planets_category: "O Planeta Colidido"
 collided_planets_category_desc: "Há muitos milênios, dois planetas colidiram um com o outro. Em meio à destruição, nasceu um novo mundo."
 cs_collided_planet_chain_title: "O Planeta Colidido"
 cs_collided_planet_chain_desc: "A catástrofe ameaça estilhaçar o frágil equilíbrio deste planeta singular."
 cstorms.1200.name: "Um Conto de Dois Planetas"
 cstorms.1200.desc: "Do momento em que detectamos [From.Planet.GetName], sua mera existência tem sido motivo de fascínio.\n\nA colisão entre dois corpos celestiais não é algo incomum, pois a galáxia é um lugar vasto e caótico. No entanto, em todos os casos registrados de tal impacto, um ou ambos os corpos em questão foram destruídos.\n\nA colisão que deu origem a [From.Planet.GetName] ocorreu há milhões de anos, mas os dois mundos permanecem em estranho equilíbrio, tendo inclusive formado uma atmosfera capaz de sustentar a vida."
 cstorms.1205.name: "Equilíbrio Precário"
 cstorms.1205.desc: "A situação no chamado \"planeta colidido\" mostrou-se muito mais precária do que aparentava. Uma recente série de terremotos abriu velhas cicatrizes ao redor da zona de impacto, causando a erupção de uma quantidade significativa de magma. Diversos biomas planetários já estão começando a sofrer com as altas temperaturas globais e com as nuvens de cinzas vulcânicas que cobrem os céus.\n\nPara piorar as coisas, se os planetas conjugados não se estabilizarem dentro dos próximos 50 anos, nossas previsões indicam que a atividade tectônica continuará escalando, até causar a completa desintegração de [From.Planet.GetName]!"
 cstorms.1210.name: "Metamorfose Desencadeada"
 cstorms.1210.desc: "Nossos melhores geologistas reuniram-se e elaboraram duas propostas possíveis para salvar [From.Planet.GetName] de uma calamidade tectônica.\n\nO primeiro plano consiste em estabilizar a colisão. Embora sejam necessários muitos séculos para sanar a cicatriz vulcânica ao redor da zona de impacto, por meio de uma cuidadosa trepanação terrestre, poderemos aliviar a pressão na crosta do planeta, prevenindo futuras instabilidades tectônicas. Os subprodutos vulcânicos serão usados para terraformar o planeta em um bioma estável.\n\nO segundo plano é muito mais ambicioso. Em vez de aliviar a pressão na crosta, a energia e os materiais gerados pela erupção vulcânica poderiam ser adaptados a um processo de terraformação sob medida.\n\nEssa abordagem nos permitiria criar uma multitude de biomas capazes de sustentar todos os tipos de formas de vida, transformando o mundo em um verdadeiro paraíso. No entanto, há uma chance considerável de o processo falhar, resultando na completa destruição desse corpo celeste singular."
 cstorms.1210.a: "Vamos estabilizar a colisão."
 cstorms.1210.b: "Vamos utilizar as emissões."
 cstorms.1210.c: "Não faça nada além de observar."
 collided_planet_collapsing: "Desintegração Planetária"
 collided_planet_collapsing_desc: "A atividade tectônica devastadora despedaçará o planeta colidido, destruindo os dois mundos no processo."
 collided_planet_collapsing_tt: "Este mundo entrará em colapso após 50 anos."
 project_cosmic_storms_collidedplanet_stabilize: "Estabilizar a Colisão"
 project_cosmic_storms_collidedplanet_stabilize_DESC: "A estabilização do planeta colidido será necessária se quisermos impedir o colapso desse mundo."
 project_cosmic_storms_collidedplanet_harmonize: "Harmonizar a Colisão"
 project_cosmic_storms_collidedplanet_harmonize_DESC: "Vamos prosseguir com o nosso ambicioso plano de harmonizar os biomas do planeta colidido. Criaremos um mundo para todos, ou o destruiremos no processo."
 cstorms.1220.name: "Colisão Preservada"
 cstorms.1220.desc: "Nossos esforços para estabilizar o planeta colidido valeram a pena! Os tremores que ameaçavam [From.Planet.GetName] foram silenciados e os subprodutos vulcânicos estão caindo rapidamente, devolvendo o frágil equilíbrio do mundo.\n\nResta apenas uma questão para nosso último esforço de terraformação: em que classe de planeta queremos transformar [From.Planet.GetName]?"
 cstorms.1220.a: "Mantenha a classe continental."
 cstorms.1220.b: "Terraforme-o em um mundo savana."
 cstorms.1220.c: "Crie um mundo alpino."
 cstorms.1225.name: "Um Mundo para Todos"
 cstorms.1225.desc.stabalize: "Extraordinário! Acreditávamos que nossos esforços apenas estabilizariam [collided_planets.GetName], mas eles o transformaram em algo muito além!\n\n$cstorms.1225.desc.def$"
 cstorms.1225.desc.def: "Eis o paraíso, um planeta capaz de sustentar quase qualquer forma de vida imaginável.\n\nSalvamos um mundo condenado e o transformamos em uma fonte de inspiração – tamanha realização é inédita em nossa história. A sorte decerto nos favorece."
 cstorms.1230.name: "Do Velho ao Novo"
 cstorms.1230.desc: "Embora o mundo felizmente tenha sido salvo, nossos esforços para terraformar o planeta colidido em um paraíso acabaram em fracasso.\n\nAs tentativas de adaptar o bioma foram frustradas pelas atividades tectônicas severas do planeta, mas a pior fase da desestabilização aparenta ter encerrado. A atividade vulcânica retornou aos níveis observados antes da recente perturbação, e embora o local de impacto permaneça ativo, uma nova intensificação é improvável.\n\nParece que o pior ficou para trás. Agora, nosso desafio será reconstruir este mundo."
 cstorms.1235.name: "Lar em Pedaços"
 cstorms.1235.desc: "Nossa tentativa de salvar o planeta colidido da destruição iminente falhou terrivelmente. Embora os nossos cientistas tenham tomado todas as precauções cabíveis, seus modelos não foram capazes de levar em conta todas as contingências.\n\nEnquanto os destroços dos dois mundos vagam rumo ao vazio, a galáxia lamenta a perda desse fenômeno único."
 cstorms.1240.name: "Colidido e Destruído"
 cstorms.1240.desc: "O colapso do planeta colidido seguiu nossas previsões em nível decimal. Onde antes um fenômeno único enriquecia a galáxia, agora restam apenas rochas."
 collided_planets_destroyed_tt: "O planeta [collided_planets.GetName] foi destruído."
 ### Crimson crawlers Event Chain
 cs_crimson_crawlers_chain_desc: "Rastejantes Carmesins"
 cs_crimson_crawlers_chain_title: "Encontramos um planeta encoberto por trilhões de insetos vermelhos. Uma praga ou uma oportunidade?"
 crimson_crawlers_category: "Cobertura Carmesim"
 crimson_crawlers_category_desc: "Um planeta escarlate foi encontrado durante uma inspeção do sistema [From.GetStarName]. A intensa coloração vermelha é notável. Deveríamos investigar."
 cstorms.1255.name: "Rastejantes Carmesins"
 cstorms.1255.desc: "A distância, [From.GetName] reluz como uma joia preciosa carmesim. Argila ou outro tipo de solo imbuído de metais duros seria a explicação habitual para essa anomalia geográfica, mas a verdade é muito mais bizarra.\n\nInsetos. Trilhões e trilhões de insetos. Eles cobrem a superfície de [From.GetName], formando um carpete quase uniforme composto por formas de vidas com várias patas.\n\nApelidados de \"rastejantes carmesins\", esses invertebrados têm um ciclo reprodutivo extremamente hiperativo. Embora não sejam nocivos para o meio ambiente, não será possível colonizar [From.GetName] com essas criaturas andando por toda parte.\n\nUm método bastante incomum para lidar com esses insetos foi proposto. Análises iniciais mostram que eles são comestíveis; teríamos, então, encontrado uma nova fonte de alimento? Seria aconselhável ao menos investigar a oportunidade."
 project_cosmic_storms_crimson_crawlers: "Questão de Gosto"
 project_cosmic_storms_crimson_crawlers_DESC: "A superfície de [From.Planet.GetName] está completamente tomada por insetos vermelhos e plácidos. O planeta poderia ser habitável se os insetos fossem removidos. Alternativamente, eles aparentam ser uma boa fonte alimentar. Essa pode ser uma solução possível."
 cstorms.1260.name: "Culinária Incomum"
 cstorms.1260.desc: "A ideia de consumir os insetos carmesins pode ter parecido absurda à primeira vista, mas quando trouxemos um espécime a bordo, ela ficou mais palatável.\n\nOs insetos são criaturas fascinantes, com um sistema nervoso extremamente avançado sem a necessidade de um órgão de processamento central. Mais importante, sua carne esbranquiçada é surpreendentemente macia e suculenta, e mesmo quando consumidos crus, o exoesqueleto avermelhado é tido como crocante e delicioso.\n\nA questão agora é se os insetos seriam mais bem aproveitados como material de pesquisa ou como uma saborosa fonte alimentar. Cozinhá-los pode apurar o sabor e ser mais divertido, mas comê-los crus será mais rápido e fácil, especialmente quando temperados adequadamente."
 cstorms.1260.a: "Estude os insetos."
 cstorms.1260.b: "Vamos comê-los crus!"
 cstorms.1260.c: "Prepare a panela!"
 ### Stormbound Event Chain
 cs_stormbound_chain_title: "Tempestuosa"
 cs_stormbound_chain_desc: "Uma nave sinistra apareceu nos sensores, mas apenas dentro da tempestade cósmica. O que pode estar acontecendo aqui?"
 letters_of_the_manifold: "Cartas de entre a Multiplicidade"
 stormbound_event_ship_object: "$cs_stormbound_chain_title$"
 cstorms.1310.name: "O Surgimento da Tempestuosa"
 cstorms.1310.desc: "Estamos recebendo sinais estranhos do sistema [This.GetName]. Ao que parece, a última tempestade cósmica que assolou o setor revelou uma nave de origem desconhecida. Sem qualquer tentativa de comunicação, ela atravessou de alguma forma a tempestade, imune à violência ao seu redor.\n\nA nave não respondeu às nossas saudações e desapareceu assim que a tempestade se dissipou. O caso até poderia ser considerado apenas um mau funcionamento dos instrumentos, mas a prova visual fala por si.\n\nSerá que estamos testemunhando uma demonstração de tecnologia incrivelmente avançada, ou a explicação é mais sinistra? Vamos relatar sem falta qualquer nova ocorrência dessa nave misteriosa."
 cstorms.1313.name: "O Retorno da Tempestuosa"
 cstorms.1313.desc: "Uma das estações de pesquisa em [This.GetName] nos enviou um relatório alarmante: durante a última tempestade cósmica, uma estranha nave quase colidiu com o entreposto. Registros visuais mostram que era a mesma nave sinistra que avistamos há algum tempo.\n\nDe acordo com a estação espacial, os cascos da nave eram constituídos de um estranho amálgama de compostos orgânicos, minerais de cálcio e ligas metálicas.\n\nNenhuma forma de vida foi detectada, o que nos leva a crer que a nave era automatizada, ou de alguma forma agia de modo independente.\n\nContudo, o fato mais espantoso foi descoberto logo em seguida: grandes partes de seu sistema de propulsão estavam claramente despedaçadas por destroços espaciais. Essa nave deveria estar inoperante no espaço.\n\nSe designarmos uma nave científica para monitorar a próxima tempestade cósmica, ela talvez seja capaz de descobrir mais informações sobre essa misteriosa espaçonave."
 cstorms.1313.a: "Não temos tempo para essas tolices."
 cstorms.1316.name: "Sussurros na Tempestade"
 cstorms.1316.desc: "[stormbound_science.GetName] avistou a nave sinistra a distância, surgindo dentre as camadas da tempestade. Enquanto ela flutuava, nós detectamos sinais extremos emanando da trama cósmica.\n\nIsso enfim explicou por que essa nave não pôde ser observada por nossos sensores: sua manifestação física foi \"esticada\" para além da multiplicidade, como se tivesse entrado, e ao mesmo tempo não entrado em um buraco de minhoca. Foi provavelmente graças às origens hiperdimensionais das tempestades cósmicas que a nave foi capaz de retornar ao nosso espaço.\n\nCom essa informação, talvez possamos detectar sua nova ocorrência e atrair a nave de volta para nossa realidade."
 cstorms.1317.name: "Tempestuosa Avistada"
 cstorms.1317.desc: "A nave sinistra foi avistada em §Y[this.GetName]§!."
 cstorms.1320.name: "De Volta ao Lar"
 cstorms.1320.desc: "Lá está ela! Posicionando-se em frente à frota [Root.Fleet.GetName], a nave sinistra nos saudou. Uma entidade mecânica trajando uma máscara ornamentada apareceu na tela. Identificando-se como B'Tiin, ela nos contou uma história fascinante.\n\nEla já foi uma oficial renomada, uma verdadeira paladina de uma organização conhecida como a Convenção de Benfeitores. Durante uma patrulha, sua tripulação e ela foram apanhadas por uma tempestade cósmica. Em uma manobra ousada para sobreviver, ela tomou a decisão de sobrecarregar o \"Propulsor de Brecha\" da nave. Essa tecnologia experimental nunca havia sido testada, e a nave e sua tripulação foram aprisionadas dentro do campo hiperdimensional da tempestade.\n\nQuando a história terminou, um pequeno recipiente foi lançado da nave dizimada. Dentro, havia um conjunto de documentos. \"Levem isso para casa\", B'Tiin nos pediu antes de encerrar a transmissão e desaparecer coma nave em meio à multiplicidade espacial.\n\nOs documentos estão escritos em um idioma estranho e precisaremos de tempo para decifrá-los."
 cstorms.1320.a: "Comece a tradução."
 cstorms.1321.name: "Cartas da Multiplicidade"
 cstorms.1321.desc: "O conteúdo do estranho recipiente foi decifrado. Um documento continha um esquema do chamado Propulsor de Brecha da nave. Embora ainda esteja à frente de nossa tecnologia, o estudo cuidadoso dos princípios por trás de sua construção já ampliaram o nosso entendimento da viagem hiperespacial.\n\nTalvez menos benéficas, porém mais impactantes, foram as traduções das cartas pessoais. Cada uma delas está endereçada a um ente querido e fala de afeto, esperança e remorso.\n\nAo que tudo indica, a intenção de B'Tiin era dar à sua tripulação uma última chance de comunicação. Infelizmente, não temos como saber onde devemos entregar as cartas. Disponibilizá-las para o nosso povo pode no mínimo preservar esse estranho legado. Alternativamente, talvez seja sensato destruí-las. O conhecimento acerca de naves estranhas e cartas fantasmas pode ser perturbador."
 cstorms.1321.a: "Arquive as cartas para a posteridade."
 cstorms.1321.b: "Livre-se das cartas."
 project_cosmic_storms_stormbound: "Espíritos da Tempestade"
 project_cosmic_storms_stormbound_DESC: "Detectamos que a nave sinistra se manifestará dentro desta tempestade.\n\nEnvie uma nave científica para interceptá-la imediatamente!"
 ### But They're Cute Event Chain
 cs_but_they_are_cute_chain_title: "Mas é Tão Fofa!"
 cs_but_they_are_cute_chain_desc: "Após a inspeção de [From.Planet.GetName], descobrimos uma estranha criatura. O que faremos com ela?"
 but_they_are_cute_category: "Mas é Tão Fofa!"
 but_they_are_cute_category_desc: "Após a inspeção de [From.Planet.GetName], descobrimos uma estranha criatura. Apesar de ter passado pouco tempo conosco, ela já suscitou um profundo desejo de alimentá-la e protegê-la. Recomenda-se mais estudos."
 cstorms.1500.name: "Mas é Tão Fofa!"
 cstorms.1500.desc: "Desde o momento em que a criatura foi descoberta, seu impacto foi inegável, inspirando amor e devoção entre nós quase imediatamente. Seus quatro grandes olhos revelavam inocência e convidavam todos a acariciar seu pelo macio como nuvens. Ela parece particularmente apegada a [Root.GetLeaderName] e passa a maior parte do tempo em seu colo recebendo afeto, sem demonstrar qualquer sinal de agressividade ou perigo. É como se tivesse sido perfeitamente concebida para ser o mais dócil possível.\n\nPorém, pessoas mais céticas alegaram que seria irresponsável manter uma forma de vida desconhecida a bordo da nave sem aprovação. [Root.GetLeaderName] garantiu que ela é provavelmente segura, mas concordou com um pedido de investigação formal."
 cstorms.1500.a: "Descubra o que ela é."
 cstorms.1500.b: "Pedido negado. Livre-se dela."
 cstorms.1500.evopred: "Pedido Negado. Devore-a."
 project_cosmic_storms_but_they_are_cute: "Maravilha Biológica"
 project_cosmic_storms_but_they_are_cute_DESC: "Um animal intrigante e muito adorável foi encontrado a bordo de uma de nossas naves científicas. É necessária uma investigação das qualidades biológicas da criatura antes de decidirmos se vamos ficar com ela ou não."
 cstorms.1505.name: "Maravilha Biológica"
 cstorms.1505.desc: "O hexápode dócil não precisou ser sedado, nem mesmo coagido para o início das intrusões e análises. Ele parecia estranhamente amistoso. A tripulação o apelidou de Gurr devido ao som que ele faz quando recebe carinho.\n\nConcluímos que Gurr é onívoro, e que seu pelo consiste de filamentos à base de queratina familiares e muito macios. Porém, o grande mistério jaz dentro da adorável criatura: ela alcança a total reposição celular dentro de um mês. Isso inclui o sistema nervoso, o que significa que ela pode recriar partes do corpo totalmente funcionais em questão de dias.\n\nParece improvável que uma composição biológica tão sofisticada seja fruto da evolução natural. Nunca encontramos algo assim antes, e não podemos saber ao certo como é o seu temperamento. Apesar da aparência dócil, ele poderia se voltar contra nós a qualquer momento. Dito isso, desde sua chegada, [Root.GetLeaderName] parece ter ganho uma motivação para trabalhar nunca vista antes.\n\nO que faremos com o Gurr? Podemos ficar com ele?"
 cstorms.1505.a: "Contanto que você limpe a sujeira."
 cstorms.1505.b: "Livre-se dele."
 cstorms.1510.name: "Apoio Emocional de Gurr"
 cstorms.1510.desc: "Permitimos que esta adorável criatura permanecesse a bordo da nave científica, e desde então ela se acomodou. Sua presença acalma [Root.GetLeaderName] e melhora os ânimos por onde passa, elevando o moral da tripulação!\n\nCom sorte, esta fascinante maravilha da \"natureza\" permanecerá uma companhia fofa, dócil e amistosa. De hoje em diante, ele será nosso e vamos chamá-lo de Gurr."
 cstorms.1510.a: "Esplêndido!"
 cstorms.1515.name: "O Fim de Gurr"
 cstorms.1515.desc: "Devido ao seu corpo atípico e claramente criado via manipulação genética, não permitimos que a criatura permanecesse a bordo da nave científica. O risco de ela afetar negativamente a tripulação, ou do aparecimento de um dono magoado exigindo sua devolução era simplesmente alto demais. O ato foi realizado de forma rápida e misericordiosa. Em instantes, seu suave \"gurr\" calou-se para sempre.\n\nAinda que compreensível, a decisão resultou em uma reação emotiva por parte de [Root.GetLeaderName] e da tripulação. Levará algum tempo até que a perda da adorável aberração da natureza seja superada."
 cstorms.1515.a: "Não tínhamos escolha."
 cstorms.1515.evopred: "Vamos guardar uma amostra de DNA."
 cstorms.1520.name: "O Fim de Gurr?"
 cstorms.1520.desc: "Quando neutralizamos a criatura, pensávamos que esse seria o fim da questão, mas suas incríveis capacidades regenerativas parecem mais poderosas do que havíamos antecipado.\n\nPouco depois da morte, duas cópias idênticas da criatura surgiram do tecido aparentemente sem vida. Mesmo após nossa decisão de sacrificar seu progenitor, as formas de vida resultantes não demonstram sinais de agressividade.\n\nNão vamos mais insistir no assunto ou correremos o risco de criar um exército de Gurrs. [Root.GetLeaderName] e a tripulação não esconderam a alegria quando permitimos que ficassem com o casal."
 cstorms.1520.a: "Lição aprendida."
 ### The Imitator Event Chain
 cstorms.1550.name: "Sósia"
 cstorms.1550.desc: "A cápsula descoberta em [From.Planet.GetName] foi deixada à mercê da tempestade. Embora sua assinatura de dados pareça-se com a nossa, a cápsula é, sem sombra de dúvida, alienígena. Respondemos o pedido de comunicação com cautela, mas fomos recebidos com euforia pelo ser que habita a cápsula.\n\n[event_target:the_imitator.GetHeSheCap] explicou que espera o resgate após sua cápsula ter sido arrastada pela tempestade, pois os sistemas de suporte à vida estão à beira do limite.\n\nQuando perguntamos sobre sua identidade, [event_target:the_imitator.GetHeShe] estranhamente alegou ser parte de nossa tripulação. A afirmação é claramente uma mentira, pois todas as pessoas designadas à nossa nave estão presentes."
 cstorms.1550.a: "Basta de joguinhos. Destrua a cápsula."
 cstorms.1550.b: "Traga a cápsula a bordo."
 cstorms.1555.name: "Sósia"
 cstorms.1555.desc: "Nós trouxemos a cápsula de fuga para nossa nave. A artimanha encerrou-se no momento em que a cápsula foi aberta e o ser alienígena em seu interior saltou em um apelo desesperado.\n\nDurante uma inspeção rotineira de cápsulas de fuga em sua nave-mãe, [event_target:the_imitator.GetHeShe] encontrou-se dentro de uma cápsula que foi ejetada para o espaço. Infelizmente, ninguém a bordo de sua nave se deu conta de que [event_target:the_imitator.GetHeShe] estava ausente.\n\nÀ deriva por meses a fio, [event_target:the_imitator.GetHeShe] usou o pouco equipamento de que dispunha dentro da cápsula para simular os sinais de energia de naves transeuntes como um tipo de chamariz. Contudo, até mesmo essa estratégia foi incapaz de atrair ajuda. Para piorar, uma tempestade cósmica apoderou-se da cápsula, arrastando-a muitos anos-luz para longe de seu sistema natal. Com solidão e temor crescentes, [event_target:the_imitator.GetHeShe] elaborou um plano para se passar por um membro da tripulação de qualquer nave próxima. Apesar do engodo, [event_target:the_imitator.GetHeShe] desculpou-se e está feliz por termos salvado sua vida."
 cstorms.1555.a: "Tamanha engenhosidade pode vir a ser útil."
 cstorms.1555.b: "Forneça transporte para o planeta habitado mais próximo."
 cstorms.1555.c: "Deixe o ser. Tome a cápsula."
 the_imitator_category_desc: "Uma cápsula de fuga solitária foi avistada em uma inspeção recente. Estranhamente, ela nos contatou usando uma assinatura de dados correspondente à nossa. A cápsula parece ter sido deslocada por uma tempestade cósmica recente que atravessou o sistema. É recomendada uma maior investigação."
 #The Imitator Leader
 the_imitator_category: "Sósia"
 the_imitator_catch_phrase: "Estou tão feliz por estar aqui!"
 the_imitator_leader_desc: "Trazido a bordo após ter sido arrastado por uma Tempestade Cósmica, este indivíduo excêntrico, mas engenhoso sabe como contornar qualquer situação, geralmente com resultados positivos."
