 TEMPEST_INVOCATOR_VIEW_HEADER: "Gerar Tempestade"
 TEMPEST_INVOCATOR_VIEW_BODY: "O potencial latente deste dispositivo pode ser sentido até mesmo no estado desligado. Se tivermos a coragem de usá-lo, exploraremos o poder das próprias tempestades.\n\nSelecione um local para gerar uma $nexus_storm_color_tooltip$."
 #Tutorial Localisation
 cstorms_tutorial.a: "Entendido."
 cstorms_tutorial.1.name: "Tutorial: Manipulação de Tempestades"
 cstorms_tutorial.1.desc: "Podemos §Smanipular§! o §Strajeto§! de uma §Y$default_storm$§! a nosso favor, seja para §Sdesviá-la§! de nossos sistemas ou §Satraí-la§! para utilizar seus efeitos positivos."
 TUTORIAL_STORM_FORECAST_MAP_MODE_TITLE: "Tutorial: Previsão Meteorológica"
 TUTORIAL_STORM_FORECAST_MAP_MODE_DESC: "Este modo de mapa exibe quaisquer §Stempestades cósmicas§! na galáxia, além de informações sobre seus efeitos.\n\n£storm_forecast_map£\n\nPara acessar o Modo de Mapa de Previsão Meteorológica, clique no ícone do mapa no canto inferior direito.\n\nCom tecnologias avançadas, poderemos aprimorá-lo para fornecer previsões cada vez mais precisas não só do local e da direção de uma §S$default_storm$§!, como também do tipo de tempestade que podemos esperar."
 concept_weather_forecasting_mode: "Modo de Previsão Meteorológica"
 concept_weather_forecasting_mode_desc: "$TUTORIAL_STORM_FORECAST_MAP_MODE_DESC$"
 TUTORIAL_STORM_PROTECTION_TITLE: "Tutorial: Tempestades Cósmicas"
 TUTORIAL_STORM_PROTECTION_DESC: "§STempestades cósmicas§! são uma força extraordinária da natureza. Elas podem ter efeitos devastadores em nossas frotas, na economia e até mesmo em nossa população. No entanto, elas também podem oferecer grandes oportunidades.\n\nPesquisar §STecnologias de Tempestade§! nos fornece construções e tecnologias para §Sreduzir§! bastante os §Sefeitos§! negativos de uma tempestade. Com §Spesquisas adicionais,§! poderemos até mesmo tirar §Sproveito§! das tempestades."
