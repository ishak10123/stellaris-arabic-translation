 #Storm Technology
 tech_storm_manipulation: "Manipulação de Tempestades"
 tech_storm_manipulation_desc: "Se aproveitarmos os princípios das tecnologias de negação de tempestades, poderemos começar a manipular a natureza astrometeorológica da galáxia para atender às nossas próprias necessidades."
 tech_advanced_storm_manipulation: "Manipulação Avançada de Tempestades"
 tech_advanced_storm_manipulation_desc: "Estudos contínuos de astrometeorologia nos proporcionam o poder para controlar e manipular as §YTempestades Cósmicas§! com mais precisão e conforme nossas necessidades."
 tech_industrial_storm_protection: "Negação Planetária de Tempestades"
 tech_industrial_storm_protection_desc: "Este nexus de comunicação meteorológica mitiga o dano causado por desastres climáticos cósmicos. A produção sofrerá menos impactos com a passagem de uma tempestade galáctica."
 tech_advanced_industrial_storm_protection: "Nulificação Planetária de Tempestades"
 tech_advanced_industrial_storm_protection_desc: "Ao consolidar sistemas de controle climático locais, os padrões de clima planetário poderão ser manipulados para reduzir consideravelmente a maior parte dos efeitos nocivos de tempestades cósmicas na produção."
 tech_storm_prediction_1: "Modelos de Clima Cósmico"
 tech_storm_prediction_1_desc: "Usando modelos de clima científicos, podemos rastrear o movimento e a formação de §YTempestades Cósmicas§! iminentes."
 tech_storm_prediction_1_title: "§HLibera o Recurso§!: Previsão de Clima Cósmico"
 tech_storm_prediction_1_tooltip: "Libera a habilidade de ver §YPrevisões de Formação de Tempestades Cósmicas§! e §YPrevisões de Deslocamento de Tempestades Cósmicas§! no §YModo de Mapa de Previsão Meteorológica§!"
 tech_storm_prediction_2: "Corrente de Probabilidade"
 tech_storm_prediction_2_desc: "Se aplicarmos correntes de probabilidade aos nossos modelos de clima científicos, nossa habilidade de rastrear o movimento e a formação de §YTempestades Cósmicas§! aumentará significativamente."
 tech_storm_prediction_2_title: "§HAprimora o Recurso§!: Previsão de Clima Cósmico"
 tech_storm_prediction_2_tooltip: "Maximiza o alcance das §YPrevisões de Formação de Tempestades Cósmicas§! e §YPrevisões de Deslocamento de Tempestades Cósmicas§! no §YModo de Mapa de Previsão Meteorológica§!"
 tech_ship_hull_storm_breaker_1: "Geradores de Atenuação de Tempestades"
 tech_ship_hull_storm_breaker_1_desc: "Estes geradores de campos atenuadores oferecem uma proteção necessária a naves que cruzam tempestades cósmicas."
 tech_ship_hull_storm_breaker_2: "Revestimento Antitempestade"
 tech_ship_hull_storm_breaker_2_desc: "Este revestimento especial carrega o exterior da nave com um campo atenuador de tempestades, resultando em uma proteção mais eficaz."
 tech_ship_storm_weapons_1: "Estofamento de Cargas Explosivas"
 tech_ship_storm_weapons_1_desc: "Uma nova abordagem para o uso de ligas metálicas em aplicações militares reduz consideravelmente a capacidade das tempestades cósmicas interferirem em armas energéticas e cargas explosivas."
 tech_ship_storm_weapons_2: "Arquitetura de Gaiola para Tempestades"
 tech_ship_storm_weapons_2_desc: "Esta abordagem inovadora para a arquitetura de naves reduzirá consideravelmente os efeitos negativos de tempestades cósmicas em nossos sistemas de armas."
 feature_sustain_cosmic_storm_unlocked: "Suportar Tempestades Cósmicas"
 feature_sustain_cosmic_storm_unlocked_desc: "Permite que suas Naves Científicas parem e suportem §Y$default_storm$§! indefinidamente."
 FLEETORDER_SUSTAIN_COSMIC_STORM: "Suportando Tempestade Cósmica $STORM|Y$ em $SYSTEM|Y$"
