 cstorms.2295.a: "Dê permissão a [Root.GetLeaderName]."
 cstorms.2295.b: "Não dê permissão a [Root.GetLeaderName]."
 cstorms.2295.a.psionic: "As vítimas deles ainda choram."
 cstorms.2295.a.psionic_gestalt: "As vozes unificadas ainda gemem de agonia."
 cstorms.2295.a.gestalt: "A desarmonia semeia o caos."
 cstorms.2300.name: "E Tudo Foi Dito"
 cstorms.2300.desc: "Temos trabalhado arduamente para obter acesso à última seção do $building_adakkaria_patriotic_institute$. Enquanto isso, um relatório desconcertante chegou até nós dos laboratórios inferiores. Os cientistas de adAKKaria afirmavam que existe uma centelha em cada ser, talvez até mesmo nas máquinas sencientes. Inspirados pelo surgimento das tempestades cósmicas, eles apelidaram esse poder de \"Tempestade Interior\": um turbilhão de desejo e potência que impulsiona toda a vida senciente. Ao submeter a Tempestade Interior a experiências extremas, um grande poder poderia ser liberado.\n\nDurante seu período como prisioneiro de guerra, §SalAtta Landeer§! foi o primeiro a descobrir esse efeito. Como cientista, ele convenceu o Comando Exaltado a financiar mais testes no Instituto. Embora os registros não revelem o que aconteceu com §SLandeer§!, sabemos, pelos eventos no cemitério de naves, que seu destino foi infeliz.\n\nRelatórios posteriores referem-se a uma maneira \"mais eficiente\" de desencadear a Tempestade Interior. Um meio que não exigia extrema crueldade física, mas que, em vez disso, dependia da invocação de um terror inescapável e letal dentro da vítima. Para iniciar o efeito em grande escala, a Convenção planejava emitir um sinal através de sua ampla rede de estações de propaganda."
 cstorms.2300.desc.psionic: "Conseguimos gravar os sussurros psiônicos das plataformas de observação:\n\n§LMe tirem daqui, por favor, eu era um cidadão íntegro!\nMeus sonhos agora não passam de uma tempestade sem fim. Ela me chama.\nNão entendo. Desempenhamos nossas tarefas de modo exemplar. Por que estão fazendo isso com a gente?\nDentro de cada um de nós há um poder. Eles querem explorar esse poder. Não devemos dar isso a eles.\nBobagem, eles estão fazendo isso para salvar a Convenção Benevolente. Temos que obedecer.\nOs astros sussurram para mim. Agora posso propagar minha mente por toda a galáxia.\nVi que eles projetaram algo. Algo que poderia fazer isso com qualquer pessoa, em qualquer lugar.\n Seremos salvos, basta dar a eles o que querem!\nVocê não entende, se eles fizerem isso conosco, farão com todo mundo.\nPoderíamos nos libertar.\nMas isso significa que...\nEles vão matar a gente de qualquer maneira. Quando a Coisa estiver funcionando. Eles matarão todos nós.\nEstou com medo, não quero morrer. Quero viver. Por favor.\nA Fase Final está falando comigo. Querem saber se estamos de acordo.§!"
 cstorms.2300.b: "Esse poder tem que ser nosso."
 cstorms.2300.a.psionic: "Que destino terrível."
 cstorms.2300.a.psionic_hive_robot: "Um resultado lamentável."
 cstorms.2300.b.psionic: "Não há nada mais nobre que um sacrifício."
 cstorms.2300.b.psionic_hive_robot: "Um sacrifício louvável."
 cstorms.2305.name: "O Invocador de Tempestades"
 cstorms.2305.desc.start: "Descobrimos um hangar gigantesco. Uma constelação incrivelmente complexa de fios, canos e componentes eletrônicos dominava o espaço, todos levando a um enorme silo de mísseis vazio. Ao que tudo indica, essa teia estava conectada a um objeto do tamanho aproximado de uma corveta.\n\nOs registros mostram que esse local foi usado para a montagem de um aparelho chamado §lInvocador de Tempestades§!, e que ele foi implantado com sucesso no sistema adSul. Embora o contato com o Invocador tenha sido interrompido, §Gsua fonte de alimentação§! permanece no local."
 cstorms.2305.desc.end.default: "Após ler o nome, a tripulação foi tomada por uma fúria irracional e começou a arrancar cabos e painéis. Foi preciso mais do que uma simples ordem para acalmá-los. Estamos cada vez mais perto da verdade."
 cstorms.2305.desc.end.psionic: "Assim que [Root.GetLeaderName] se aproximou do construto vazio, os sussurros psiônicos recomeçaram.\n§LVocês estão vendo, não estão? No início, não sabíamos o que eles estavam construindo. Não sabíamos que iriam se desfazer de nós. Alguns queriam vingança. Alguns de nós queriam ser livres. Alguns sentiram o chamado das tempestades. Isso tinha que acabar. Nós tínhamos que acabar. Não podíamos mais suportar isso.§!"
 cstorms.2305.desc.end.gestalt: "Após ler o nome desse dispositivo, nossa equipe de [controller.GetIndividualNamePlural] de exploração determinou como o §lInvocador§! era ativado e o método pelo qual seu sinal passava pelas muitas estações de propaganda até finalmente chegar ao seu destino.\n\nE nós não estávamos imunes a esse destino."
 cstorms.2305.desc.default: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.default$"
 cstorms.2305.desc.psionic: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.psionic$"
 cstorms.2305.desc.gestalt: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.gestalt$"
 cstorms.2310.name: "A Fase Final"
 cstorms.2310.desc.start: "Finalmente, o Instituto de Celebração revelou o último de seus segredos: a Fase Final.\n\nNestes corredores, carcaças dessecadas de funcionários de adAKKaria estavam espalhadas pelo chão, destroçadas por pedaços de pedra, metal, plástico e outros detritos. Algo havia se enfurecido aqui, dizimando tudo e todos que estivessem em seu caminho.\n\nMas o verdadeiro"
 cstorms.2310.desc.piece.default: "horror"
 cstorms.2310.desc.piece.authgen: "deleite"
 cstorms.2310.desc.end: "ainda estava por vir.\nCelas de detenção apertadas aprisionavam meia dúzia de indivíduos. As telas de visualização os descreviam como §Gfonte de alimentação do Invocador§!, mas esses eram claramente cidadãos jovens da Convenção, com seus pequenos corpos suspensos por dezenas de tubos e cabos. O fluido dentro das celas os mantinha em um estado entre a vida e a morte, seus corpos cercados por uma força semelhante às energias da tempestade prolongada do sistema adSul.\n\nAs poucas telas restantes ganharam vida, cada uma exibindo um único desejo:\n§LLEMBREM-SE DE NÓS | FALEM NOSSOS NOMES | FALEM NOSSOS NOMES.§!\n\nRegistramos os nomes desses jovens. O último, no entanto, nos comoveu: §SenRida Direen§!, o indivíduo da Benevolência Exaltada que acalmou o fogo com sua mente.\n\nAgora, armados com esses nomes, devemos ser capazes de contatar a tempestade cósmica mais uma vez."
 cstorms.2310.desc.default: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.default$ $cstorms.2310.desc.end$"
 cstorms.2310.desc.authgen: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.authgen$ $cstorms.2310.desc.end$"
 cstorms.2310.a: "Excelente trabalho!"
 #The Storm's Swansong
 cstorms.2320.name: "A Tempestade"
 cstorms.2320.desc: "FALEM NOSSOS NOMES\n\nFALEM NOSSOS NOMES\n\nFALEM | NOSSOS | NOMES"
 cstorms.2320.a: "Vimos o que a Convenção fez com vocês."
 cstorms.2320.b: "O que aconteceu com a Convenção de adAKKaria?"
 cstorms.2320.c: "Onde está o Invocador de Tempestades?"
 cstorms.2320.d: "Sabemos os seus nomes."
 cstorms.2320.a.resp: "ELES NÃO PARAVAM DE APLICAR\n\nDOR IRA LUTO E MEDO\n\nELES ERAM DENTES ERAM MANDÍBULAS E ESTAVAM\nDEVORANDO NOS CUSPINDO TRAZENDO\n\nDOR IRA LUTO E MEDO\n\nNÓS NOS DESENROLAMOS, DEIXAMOS DE SER, NOS TORNAMOS\n\nDOR IRA LUTO E MEDO"
 cstorms.2320.b.resp: "INDULGENTES E PEDANTES E IMPIEDOSOS\nORGULHOSOS | CRUÉIS | MOTIVADOS\nTRAZENDO A MORTE TRAZENDO O SOFRIMENTO\n\nTIVEMOS QUE TIVEMOS QUE TIVEMOS QUE TIVEMOS QUE TIVEMOS QUE TIVEMOS QUE TIVEMOS QUE TIVEMOS QUE TIVEMOS QUE\nSER | NÃO SER | INEXISTIR\n\nNÓS\nDESPACHAR AS TRANSMISSÕES | CORROMPER O SINAL | CORROMPER AS MENTES \nSUCUMBIR À ESCURIDÃO | AO BRANCO | AO CINZA | AO PRETO\nESPALHAR PELAS ESTRELAS E NUNCA MAIS OUVIR FALAR"
 cstorms.2320.c.resp: "NÓS\nSOMOS UM ESCUDO | PROTEGER VOCÊS\n\nNÓS\nFORMAMOS UM BERÇO | EMBALAR\n\nE ACALENTAR ATÉ O ESQUECIMENTO | DORMIR DORMIR DORMIR PERECER\n\n§RABOMINADOR§! DE §lTEMPESTADE§!\nE NUNCA ACORDAR OUTRA VEZ"
 cstorms.2325.desc: "FALEM NOSSOS NOMES | FALEM NOSSOS NOMES | FALEM NOSSOS NOMES\n\nAGORA §g(AGORA)§! AGORA §g(AGORA)§!\n\nFALEM NOSSOS NOMES | FALEM NOSSOS NOMES | FALEM NOSSOS NOMES | FALEM NOSSOS NOMES\n\nFALEM | NOSSOS | NOMES | AGORA"
 cstorms.2325.d: "Muito bem, seus nomes são..."
 cstorms.2330.desc: "§LRecitamos todos os nomes que encontramos durante nossa escavação. Após falarmos o último, a Tempestade silencia.§!"
 cstorms.2330.a: "Vocês ainda estão aí?"
 cstorms.2335.desc: "Podemos pensar novamente! §g(pensar pensar pensar)§!\nTantas vozes ao nosso redor! §g(pensar falar desejar sonhar)§!\nTantas pessoas diferentes §g(você e eu e ele e eles)§!\n\nVocês nos devolveram nossa sanidade §g(viajar decifrar descobrir)§!\nPorém, ao fornecer nossos nomes, vocês ganharam domínio sobre nós... §g(Não, outra vez!)§!\nO que querem de nós? §g(deixe-nos ir, deixe-nos ir, deixe-nos ir, deixe-nos ir)§!"
 cstorms.2335.a: "É hora de vocês serem livres."
 cstorms.2335.b: "Curvem-se e entreguem o Invocador de Tempestades."
 cstorms.2340.desc: "Livres.\n\nVocês querem nos libertar? §g(Livres?)§!\n\nImpossível. §g(É impossível.)§!\nNão podem estar falando sério. §g(E o Invocador de Tempestades?)§!"
 cstorms.2340.a: "Vamos destruí-lo."
 cstorms.2345.desc: "Dor, ira, luto e medo. §g(DOR | IRA | LUTO | MEDO)§!\n\nÉ só para isso que servimos.\n\nÉ SÓ PARA ISSO QUE SERVIMOS DOR IRA LUTO MEDO\n§gDOR IRA LUTO MEDO DOR IRA LUTO MEDO DOR IRA LUTO MEDO IRA LUTO MEDO DOR IRA LUTO MEDO DOR IRA LUTO MEDO DOR LUTO MEDO DOR IRA LUTO MEDO DOR IRA LUTO MEDO DOR IRA MEDO DOR IRA LUTO MEDO DOR IRA LUTO MEDO DOR IRA LUTO DOR IRA LUTO MEDO DOR IRA LUTO MEDO DOR IRA LUTO MEDO IRA LUTO MEDO DOR IRA LUTO MEDO DOR IRA LUTO MEDO DOR LUTO MEDO DOR IRA LUTO MEDO DOR IRA LUTO MEDO DOR IRA MEDO DOR IRA LUTO MEDO DOR IRA LUTO MEDO DOR IRA LUTO§!"
 cstorms.2345.a: "Protestem o quanto quiserem, nossos servos eternos."
 cstorms.2350.name: "O Fim da Tempestade"
 cstorms.2350.desc: "A Tempestade abriu uma fenda dentro de si mesma, revelando o §lInvocador de Tempestades§!. É estranho que um aparelho tão pequeno tenha sido objeto de tanto desejo, luta e sacrifício. Sua mera existência iniciou a queda de um império outrora majestoso.\n\nCom um simples conjunto de comandos, ativamos a rotina de autodestruição do Invocador de Tempestades. À medida que a explosão desvanecia e os destroços se espalhavam pelo sistema, a Tempestade começou a diminuir. Com ela, desapareceu o estranho véu que cobria o mundo natal da Convenção de adAKKaria.\n\nO longo pesadelo finalmente chegou ao fim."
 cstorms.2350.a: "Que seus nomes sejam sempre lembrados."
 cstorms.2355.name: "Dor Ira Luto Medo"
 cstorms.2355.desc: "A Tempestade se contorceu e fervilhou em sua fúria impotente, mas não era capaz de causar nenhum dano a nós ou ao §lInvocador de Tempestades§!.\n\nComandamos as vozes aprisionadas no interior para que nos fornecessem um caminho através do turbilhão, e reivindicamos a maior conquista da Convenção.\n\nPorém, o mundo natal de adAKKaria permaneceu inatingível; qualquer caminho em direção ao $building_adakkaria_patriotic_institute$ está agora fechado para sempre. Mas as palavras do rugido da Tempestade ficaram em nossas mentes.\n\nDor, ira, luto e medo.\nA galáxia também as aprenderá."
 cstorms.2355.a: "É preciso fazer sacrifícios."
