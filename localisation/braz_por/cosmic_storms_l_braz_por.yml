 #Magnetized Planetary Core
 pm_magnetized_planetary_core: "Núcleo Planetário Hipermagnetizado"
 pm_magnetized_planetary_core_desc: "A atividade eletromagnética no interior do manto possibilita a mineração magnética, embora perturbe a infraestrutura técnica."
 cstorms.1705.name: "$pm_magnetized_planetary_core$"
 cstorms.1705.desc: "Efeitos incomuns estão sendo relatados em [this.GetName] após a passagem da recente §Y$magnetic_storm$§!. Os potentes campos energéticos da tempestade ampliaram a volatilidade magnética no núcleo derretido do planeta, acarretando falhas em toda a infraestrutura tecnológica.\n\nNo entanto, a situação também apresenta uma oportunidade única de extração de recursos. Os fluxos de lava rica em metais sob o manto do planeta agora estão eletricamente carregados e podem ser extraídos com a ajuda de ímãs de mineração."
 #Electrified Oceans
 d_electrified_oceans: "Oceanos Eletrificados"
 d_electrified_oceans_desc: "Uma corrente elétrica perpétua passa por todo o vasto oceano do planeta."
 GLACIAL_OCEANS: "oceanos subglaciais"
 DEFAULT_OCEANS: "oceanos"
 cstorms.1715.name: "$d_electrified_oceans$"
 cstorms.1715.desc.common: "Um fenômeno incomum tem sido observado em [this.GetName] após a passagem da recente §Y$electric_storm$§!. Os [GetOceansState] do planeta foram carregados com uma corrente elétrica perpétua que agora circula por toda a vasta massa d'água, apresentando riscos fatais para a vida aquática."
 cstorms.1715.desc.aquatic: "Isso representa uma séria ameaça à chance de sobrevivência de nossa colônia e devemos resolver a situação de imediato."
 cstorms.1715.desc.non_aquatic: "Esse fenômeno não está nos causando danos diretos, mas apresenta um desafio ao futuro desenvolvimento de nossa colônia."
 cstorms.1715.a: "Disperse a carga."
 cstorms.1715.b: "Deixe os oceanos carregados."
 #Ghostly Apparitions
 d_ghostly_canyon: "Desfiladeiro Fantasma"
 d_ghostly_canyon_desc: "Aparições etéreas estão sendo avistadas por todos que visitam este desfiladeiro."
 cstorms.1725.name: "Aparições Fantasmagóricas"
 cstorms.1725.desc.common: "Seguindo a passagem da recente §Y$shroud_storm$§! em [this.solar_system.GetName], [owner.GetColonistPlural] relatam avistamentos inexplicáveis de aparições etéreas em um desfiladeiro isolado. Essas figuras azuladas e fantasmagóricas surgem brevemente, incapazes de (ou relutantes em) interagir com [owner.GetColonistPlural], vagando a esmo antes de desaparecerem."
 cstorms.1725.desc.psionic: "Embora a natureza das aparições pareça psiônica, não conseguimos estabelecer qualquer tipo de comunicação mental com essas entidades. Contudo, descobrimos que a presença delas fortalece passivamente nossas próprias habilidades telepáticas."
 cstorms.1725.desc.psionic_robot: "Embora a natureza das aparições pareça psiônica, não conseguimos estabelecer uma comunicação psiônica com essas entidades. Contudo, as verificações do sistema confirmaram que a presença delas fortalece passivamente nossas próprias habilidades telepáticas."
 cstorms.1725.desc.spiritualist: "Esse fenômeno extraordinário está se mostrando um oportuno lembrete das maravilhas intangíveis em nossa existência."
 cstorms.1725.desc.gestalt: "Nenhum tipo de dano físico ou comportamento agressivo foi relatado até então."
 cstorms.1725.desc.default: "Nenhum dano físico foi relatado até então. Mesmo assim, esse estranho fenômeno está se mostrando uma distração perturbadora."
 cstorms.1725.a: "Preencha o desfiladeiro com terra. Os mortos devem permanecer enterrados."
 #Volcanic Inactivity
 cstorms.1735.name: "Inatividade Vulcânica"
 cstorms.1735.desc: "A radiação residual deixada pela recente §Y[this.GetAffectedStormType]§! resultou em atividades geológicas erráticas ao redor de §H[this.GetName]§!.\n\nMais notadamente, o impacto da tempestade fez com que um vulcão ativo entrasse em um estado adormecido, isolando-o de seu foco geológico e interrompendo o abastecimento de magma.\n\nEssa mudança traz novas oportunidades de desenvolvimento para o planeta, pois o magma resfriado abre novos territórios."
 #Mountain in the Sky
 d_sky_mountain: "Montanhas no Céu"
 d_sky_mountain_desc: "Uma cordilheira colossal está suspensa no ar rarefeito da atmosfera superior do planeta, expondo novos depósitos de minerais."
 unlocks_zone_minerals_physics: "$t$Libera a Especialização de Distrito: §Y$zone_minerals_physics$§!"
 cstorms.1745.name: "$d_sky_mountain$"
 cstorms.1745.desc: "Uma §Y$gravity_storm$§! severa causou uma transformação extraordinária na paisagem de §H[this.GetName]§!. As poderosas flutuações gravitacionais da tempestade separaram a maior cordilheira do planeta de sua placa tectônica, erguendo-a acima da superfície.\n\nEla permanece suspensa na atmosfera superior, mantida no ar por um efeito gravitacional residual da tempestade. Esse distúrbio notável expôs reservas de minerais antes inacessíveis sob o rochedo. Além disso, a situação proporcionou bastante material para nossa equipe de [owner.GetResearchers] analisar."
 #Melting Glaciers
 cstorms.1755.name: "Geleiras Degelando"
 cstorms.1755.desc.common: "A recente §Y[this.GetAffectedStormType]§! causou um impacto inesperado no clima de [this.GetName]."
 cstorms.1755.desc.electric: "O aumento de descargas elétricas na atmosfera causou uma mudança dramática na temperatura da região polar, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.particle: "O efeito corrosivo das partículas da tempestade impactou fortemente as regiões polares, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.gravity: "As mudanças gravitacionais causadas pela tempestade quebraram diversas camadas de gelo subaquático, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.magnetic: "Os distúrbios causados nos campos magnéticos do planeta provocaram drásticas alterações sísmicas, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.solar: "O calor extremo durante a tempestade elevou as temperaturas no planeta, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.celestial: "Grandes concentrações de poeira celestial superaquecida afetaram drasticamente as regiões polares, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.common_2: "degelando a tundra antes inacessível.\n\nAgora, podemos desenvolver essa terra recém-descoberta."
 #Dusty Drink
 cstorms.1761.name: "Entupimento Cósmico"
 cstorms.1761.desc.common: "Nossa equipe de [Owner.GetEngineerPlural] em §H[this.GetName]§! relatou que a §Y$celestial_storm$§! está provocando efeitos adversos nos sistemas de filtração de água. Enquanto as partículas se acumulam nos lençóis freáticos do planeta, a lama mineral resultante entope pontos vitais da infraestrutura."
 cstorms.1761.desc.default: "As falhas hidropônicas resultantes estão impactando drasticamente a agricultura do planeta, além de provocar a falta de água potável para o consumo.\n\nSe não resolvermos esse problema, poderemos ter consequências duradouras em nosso suprimento de água. Felizmente, nossa equipe de [owner.GetEngineerPlural] está confiante de que pode criar sistemas mais robustos de filtração para lidar com essa situação."
 cstorms.1761.desc.lithoid: "Enquanto investigava os bloqueios hidropônicos, um grupo de [Owner.GetColonistPlural] descobriu que a lama mineralizada é deliciosa e nutritiva se consumida por indivíduos com fisiologia litoide. Após alguns ajustes nos sistemas de filtração da colônia, foi iniciada a produção em massa de uma nova bebida sazonal que pode ser consumida até a tempestade passar."
 cstorms.1761.a: "Continue."
 cstorms.1761.b: "Um agrado inesperado."
 pm_satured_filtration: "Filtração Saturada"
 pm_satured_filtration_desc: "O suprimento de água local está saturado com poeira cósmica celestial, causando bloqueios na rede hidropônica."
 filtration_insight_modifier: "Conhecimento de Filtração Hidropônica"
 CLEAR_DUSTY_PIPES_PROJECT: "Limpeza do Encanamento"
 CLEAR_DUSTY_PIPES_PROJECT_DESC: "O impacto de uma §Y$celestial_storm$§! em §H[this.GetName]§! deixou os sistemas de filtração de água entupidos com uma lama mineral insolúvel. Devemos projetar um sistema de filtração mais robusto para resolver o problema."
 cstorms.1765.name: "Filtros Desentupidos"
 cstorms.1765.desc: "A equipe de [Owner.GetEngineerPlural] resolveu o problema dos bloqueios hidropônicos e da falta de água em §H[this.GetName]§!. A rede de suprimento de água na colônia foi aprimorada e agora é capaz de filtrar impurezas complexas, como as que foram trazidas pela $celestial_storm$.\n\nEssas melhorias em nossa infraestrutura de abastecimento de água podem ser redirecionadas para aprimorar a irrigação em todos os planetas de [Owner.GetName]."
 #Flightless Fauna
 cstorms.1771.name: "Fauna Incapaz de Voar"
 cstorms.1771.desc.common: "A equipe de [Owner.GetScientistPlural] em [this.GetName] observou graves repercussões da §Y$gravity_storm$§! na vida selvagem aviana local.\n\nAs flutuações gravitacionais trazidas pela tempestade estão causando condições atmosféricas erráticas, deixando várias espécies da fauna aviana incapazes de voar."
 cstorms.1771.desc.default: "Além de impedir as criaturas de caçar normalmente, essa situação também as deixa vulneráveis aos predadores.\n\nSe não intervirmos, as espécies afetadas poderão ser caçadas até a extinção."
 cstorms.1771.desc.swarm: "Um verdadeiro banquete nos aguarda."
 cstorms.1771.a: "Presa fácil."
 cstorms.1771.b: "Deixe a natureza agir."
 cstorms.1771.c: "Coloque as criaturas em uma reserva."
 cstorms.1771.evopred: "Guarde o DNA delas antes do fim."
 d_avian_reserve: "Reserva Aviana"
 d_avian_reserve_desc: "Uma reserva natural fechada, construída para abrigar espécies vulneráveis da fauna aviana."
 cstorms.1776.name: "De Volta aos Céus"
 cstorms.1776.desc: "Com o fim da §Y$gravity_storm$§!, a fauna que estava temporariamente impedida de voar em [this.GetName] voltou aos céus após se abrigar em nossa reserva aviana.\n\nEmbora várias criaturas tenham retornado aos habitats naturais, grande parte permanece na reserva, aparentemente aproveitando o conforto e a proteção que o local oferece.\n\nEssa é uma oportunidade única de estudar de perto a vida selvagem aviana do planeta."
 cstorms.1776.a: "Ótimas notícias."
