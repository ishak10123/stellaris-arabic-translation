 resolution_cosmic_storms_galactic_emergency_relief: "Assistência Galáctica de Emergência"
 resolution_cosmic_storms_galactic_emergency_relief_desc: "Devemos prestar auxílio àqueles que foram mais impactados pelos efeitos de tempestades cósmicas."
 resolution_cosmic_storms_galactic_emergency_relief_tooltip: "Libera o §YFundo de Emergência§!, que exige que todos os membros d[global_event_country.GetOAGalCommImp] [global_event_country.GetCommunityOrImperium] contribuam com §R5%§! de sua produção de $r_energy$.\n\nMembros d[global_event_country.GetOAGalCommImp] [global_event_country.GetCommunityOrImperium] afetados por uma §Y$default_storm$§! recebem §G+3§! de $r_energy$ por sistema afetado, mensalmente.\n\n$storm_tech_cost$ §R+30%§!"
 resolution_cosmic_storms_galactic_emergency_relief_repeal: "Revogar $resolution_cosmic_storms_galactic_emergency_relief$"
