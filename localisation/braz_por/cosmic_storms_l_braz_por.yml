 MESSAGE_INSTITUTE_SPAWNED_STORM: "§Y100§! £pop£ §HPops§! invocaram uma nova $STORM$ sobre si mesmos em $PLANET$, no sistema $SYSTEM$."
 artifact_adakkaria_research: "Segredos de adAKKaria"
 artifact_adakkaria_research_desc: "Mergulhe mais fundo nos segredos de adAKKaria."
 artifact_adakkaria_research_completed: "$artifact_adakkaria_research$"
 artifact_adakkaria_research_completed_desc: "Colocamos o conhecimento antigo de adAKKaria para nosso próprio uso."
 #Secrets of the adAkkaria Convention
 project_adakkaria_secrets_of: "Segredos da Convenção de adAKKaria"
 project_adakkaria_secrets_of_DESC: "Ainda há muito a aprender com o Instituto de Celebração. Vamos arriscar nos envolver ainda mais com esses experimentos adAkkarianos?"
 cstorms.2365.name: "Potencial Liberado"
 cstorms.2365.desc.start: "Após uma investigação mais profunda da pesquisa da Convenção de adAKKaria, parece que seus cientistas não estavam sujeitos a nenhum critério reconhecido: a metodologia era de má qualidade, e as conclusões eram quase banais. A pesquisa cuidadosa e diligente foi abandonada em prol da depravação. No entanto, quanto maior a crueldade a que as cobaias eram submetidas, maiores eram os elogios do Comando Exaltado.\n\nAs primeiras pesquisas, no entanto, contaram uma história muito diferente: as cobaias foram bem tratadas e respeitadas em sua jornada para despertar a \"Tempestade Interior\". De fato, se compararmos as taxas de sucesso entre as pesquisas iniciais e as posteriores, não há como escapar da terrível conclusão: nunca houve correlação entre o grau de tortura e o número de seres despertados. Inúmeros indivíduos sofreram e morreram por nada."
 cstorms.2365.desc.end.default: "Agora entendemos os princípios em jogo. Aprendendo com os erros da Convenção de adAKKaria, devemos ser capazes de incentivar nosso próprio povo a cultivar suas Tempestades Interiores e se infundir com um vigor tempestuoso. Mas com isso arriscaremos que alguns indivíduos em §G$Name_Storm_Fused$§! atendam ao chamado da tempestade, conjurando a tormenta sobre nós."
 cstorms.2365.desc.end.gestalt: "Nosso coletivo agora entende os princípios em jogo. Aprendendo com os erros da Convenção de adAKKaria, algumas partes de nós podem cultivar suas Tempestades Interiores e se infundir com um vigor tempestuoso. Mas com isso arriscaremos que alguns nódulos em §G$Name_Storm_Fused$§! sintam o chamado da tempestade de forma intensa demais, acabando por conjurar eles mesmos uma tormenta."
 cstorms.2365.desc.default: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.default$"
 cstorms.2365.desc.gestalt: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.gestalt$"
 cstorms.2365.a: "Explore esse novo conhecimento. Com cuidado!"
 cstorms.2365.b: "Não, deixe esses segredos em paz."
 cstorms.2365.a.tt: "- Chance de §Y100§! £pop£ §HPops§! ganharem a característica $Name_Storm_Fused$ durante uma tempestade quadruplicada.\n - A cada 20 anos, há uma pequena chance de §Y100§! £pop£ §HPops§! morrerem e se tornarem uma tempestade.\n - Cultivar Potencial: +5% do modificador de Felicidade do Império."
 Name_Storm_Fused: "Sintonia com a Tempestade"
 Name_Storm_Fused_affix: "Sintonia com a Tempestade" #The trailing space is intentional, to give a space before the species name on the species screen
 ########################################
 #### Storm Chasers #
 ########################################
 origin_storm_chasers: "Caçadores de Tempestades"
 origin_storm_chasers_desc: "Não há desafio que não enfrentem, pistas que deixem de perseguir ou tempestades que deixem escapar.\n\nEm seu âmago, esta é uma civilização que busca emoções. Para o bem ou para o mal."
 origin_tooltip_storm_chasers_effects: "- $LEADERS_TRAITS$ ['concept_storm_rider']\n- $mod_planet_jobs_unity_produces_mult$ do planeta por §YConstrução de Tempestade§!: §G+$@storm_chasers_storm_building_unity_produces_mult|%0$§!\n- Construções Capitais fornecerão automaticamente os modificadores de §YAbrigos de Tempestade§! após as tecnologias necessárias serem pesquisadas. \n- Chance de Surgimento de §Y$default_storm$§! dentro das Fronteiras: §G+100%§! \n- Chance de Opção de Pesquisa de §YTecnologia de Tempestade Cósmica§!: §G+175%§!\n- Acesso ao ['concept_weather_forecasting_mode']\n- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$- £physics£ ['technology:tech_storm_prediction_1']"
 START_SCREEN_STORM_CHASERS: "O que é a vida sem emoção? Arder intensamente e morrer de forma radical: esse sempre foi o nosso caminho. Mas quando todas as trilhas são desbravadas e até mesmo o cume mais alto é escalado, o que vem a seguir?\n\nNosso planeta sempre foi tempestuoso, sujeito a tempestades e dilúvios de todos os tipos. Se descobrirmos uma maneira de usar essas condições singulares, teremos uma chance de invocar uma tempestade cósmica furiosa.\n\nHá muito tempo, nossos lendários antepassados dominaram os desafios de nosso mundo natal. Chegou a hora de ir com tudo rumo ao vazio. Não será fácil, mas como diz o velho ditado: \"O horizonte pertence aos ousados!\""
 #Storm Rider Trait
 leader_trait_storm_rider_desc: "Domadores de Tempestades regozijam-se com a adrenalina, liberando seu verdadeiro potencial na torrente de uma tempestade cósmica. As posições do conselho substituem seus bônus de campo por bônus do conselho."
 mod_trait_storm_rider: "\n$t$Os efeitos da Característica aumentam quando este Líder está dentro de uma Tempestade Cósmica."
 leader_trait_storm_rider_name: "Domador de Tempestades"
 leader_trait_storm_rider_commander: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_commander_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_scientist: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_scientist_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_official: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_official_desc: "$leader_trait_storm_rider_desc$"
 #Storm Chasers specific Progress Events
 progress.2.desc.storm.normal: "Nas palavras de um membro da equipe de [Root.Owner.GetScientistPlural], \"Saca só esse carinha!\"\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.gestalt: "Nós vibramos de entusiasmo.\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.outro: "Vida alienígena, bem aqui em [From.GetName]! Esses seres irados não falarão conosco tão cedo, mas pelo menos sabemos que não estamos sozinhos nessa jornada cósmica.\n\nAfinal de contas, parece que a galáxia pode estar repleta de formas de vida."
 progress.3.desc.storm.normal: "\"Incrível!\" exclamou [ruler.GetRegnalName]. \"Um novo mundo repleto de oportunidades!\"\n\nEnquanto convertemos nossa nave colonial em uma base de operações, os primeiros exploradores já estão se preparando para vivenciar o que quer que este mundo tenha a oferecer."
 progress.3.desc.storm.gestalt: "Uma descoberta emocionante! Um novo mundo repleto de oportunidades!\n\nEnquanto convertemos nossa nave colonial em uma base de operações, os nódulos exploratórios já estão se preparando para vivenciar o que quer que este mundo tenha a oferecer."
 progress.3.a.storm: "Avante."
 progress.4.desc.storm: "Do silêncio do espaço, nossos chamados foram atendidos por uma civilização alienígena com tecnologia semelhante à nossa! Eles devem ter entrado na rixa galáctica bem na época em que nós entramos.\n\nO surgimento deles anuncia uma nova fronteira de experiências. Seriam aliados que partilham de nossos ideais, ou rivais para testar a nossa coragem? Seja como for, a emoção do desconhecido nos chama."
 progress.4.h.storm: "Muito intrigante."
 progress.5.desc.storm.normal: "Descobrimos formas de vida pré-sapientes em [From.Planet.GetName]. Como disse um membro de nossa equipe de [Root.Owner.GetScientistPlural], \"Esses seres podem não parecer grande coisa, mas têm um potencial enorme!\"\n\nPorém, no momento eles permanecem pré-sapientes. Será bem interessante observar o desenvolvimento dessas criaturas."
 progress.5.desc.storm.gestalt: "Descobrimos formas de vida pré-sapientes em [From.Planet.GetName].\n\nEstamos ansiosos para ver o que farão com seu potencial, mas, por enquanto, elas permanecem pré-sapientes. Será bem interessante observar o desenvolvimento dessas criaturas."
 progress.5.h.storm: "Irado."
 progress.6.desc.storm: "Do silêncio do espaço, nossos chamados foram atendidos, mas a vibração inicial é totalmente bizarra! Esse povo não compartilha dos nossos modos e prefere se manter isolado. É melhor recuarmos por enquanto."
 progress.6.h.storm: "Eles deveriam cair na real."
 pirate.1.desc.storm: "Piratas espaciais! Que irado! Um grupo que se autodenomina §S[pirate_band.GetName]§! está de olho em nós.\n\nEmbora possamos respeitar o estilo de vida deles, o efeito que isso tem em nossas redes de comércio não é legal."
 pirate.2.j.storm: "Que mancada."
 ### STORMFALL SITUATION START ###
 situation_stormfall: "Precipitação de Tempestade"
 situation_stormfall_type: "Situação de Origem"
 situation_stormfall_desc: "O clima intenso em [owner.capital_scope.GetName] revelou o poder estimulante das tempestades. Se dominarmos o controle do clima planetário, poderemos usar esse conhecimento em uma escala cósmica. A construção de edifícios de atração de tempestades acelerará nosso progresso rumo à tempestade suprema."
 situation_stormfall_monthly_change_tooltip: "Vamos aprender a dominar essas tempestades."
 situation_stormfall_outcome: "O nascimento de uma tempestade cósmica."
 stage_stormfall_effects: "Precisamos aprender como manipular tempestades cósmicas."
 #Approach Chill
 situation_stormfall_chill: "Tranquila"
 approach_stormfall_chill_tt: "$situation_speed_tt$: §R-20%§!\nVelocidade de Pesquisa: §YInalterada§!"
 #Approach Balanced
 situation_stormfall_balanced: "Equilibrada"
 approach_stormfall_balanced_tt: "$situation_speed_tt$: §YInalterada§!"
 #Approach Shredding
 situation_stormfall_shredding: "Alucinante"
