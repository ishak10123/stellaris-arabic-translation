 resolution_cosmic_storms_storm_encouragement_mandate_repeal_effect_success: "Revoga a resolução de §Y$resolution_cosmic_storms_storm_encouragement_mandate$§!, deixando §Y$resolution_cosmic_storms_galactic_emergency_relief$§! como lei galáctica."
 resolution_cosmic_storms_control_restrictions: "Controles de Manipulação de Tempestades"
 resolution_cosmic_storms_control_restrictions_desc: "A galáxia é um ecossistema vasto e interconectado onde as tempestades cósmicas desempenham um papel fundamental. Devemos proibir práticas que influenciam o comportamento delas."
 resolution_cosmic_storms_control_restrictions_tooltip: "$storm_tech_cost$ §R+65%§!\n\n$breach_galactic_law_intro$$TABBED_NEW_LINE$- §YTecnologia de Repulsão de Tempestades§!$TABBED_NEW_LINE$- §YTecnologia de Atração de Tempestades§!"
