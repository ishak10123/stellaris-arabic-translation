 situation_stormfall_pause_desc: "$situation_cyberization_pause_desc$"
 situation_stormfall_project_pause_desc: "Projeto Especial"
 situation_stormfall_leader_ongoing: "Impulsionamento de Tempestade de Líder"
 situation_stormfall_building: "Construção de Atração de Tempestades"
 situation_stormfall_module: "$sm_storm_attraction_computer$"
 situation_stormfall_finish_project_tt: "Precisa Concluir o Projeto Especial: §Y$PROJECT_TEMPEST_BREWING$§!"
 #Modifiers for Stormfall event chain
 cs_storm_chasers_storm_fruition: "Fruição da Tempestade"
 cs_storm_chasers_storm_fruition_desc: "O despertar de nossa tempestade cósmica pessoal inspirará o nosso povo por muitos anos."
 cs_storm_chasers_storm_fruition_gestalt: "$cs_storm_chasers_storm_fruition$"
 cs_storm_chasers_storm_fruition_gestalt_desc: "O despertar de nossa tempestade cósmica pessoal inspirará nossa consciência por muitos anos."
 cs_storm_chasers_homeworld_storm_attraction: "Clima Extremo"
 cs_storm_chasers_homeworld_storm_attraction_desc: "As tempestades implacáveis deste planeta dividiram suas formas de vida em dois tipos: as que procuram abrigo do caos e as que se divertem na emoção da tempestade."
 cs_storm_chasers_homeworld_storm_attraction_tt: "Intensidade de Atração de §Y$default_storm$§!: §PBaixa§!"
 #Special project
 PROJECT_TEMPEST_BREWING: "Tempestade em Formação"
 PROJECT_TEMPEST_BREWING_DESC: "Esse sistema de tempestade único em [Owner.Capital.GetName] tem propriedades especiais que o tornam propício à modulação. Mas primeiro, precisamos entender melhor sua composição fundamental. Quem sabe que esquisitice brilhante poderemos trazer à vida?"
 #Events
 cstorms.3100.name: "Precipitação de Tempestade"
 cstorms.3100.desc: "Tempestades naturais em §Y[owner.capital_scope.GetName]§! nos mostraram o poder inspirador da natureza, tanto na intensidade emocionante da tormenta quanto na renovação que sucede o caminho de destruição.\n\nRecentemente, estações climáticas espalhadas pelo planeta detectaram um fenômeno extraordinário: uma rede de supertempestades capaz de assolar todo o mundo.\n\nNossa equipe de [Root.Owner.GetScientistPlural] chamou o fenômeno de \"feliz serendipidade\". Essas tempestades raras criam as condições perfeitas para presenciarmos algo verdadeiramente radical."
 cstorms.3100.a: "Pegue o equipamento de campo!"
 cstorms.3105.name: "Tempestade em Formação"
 cstorms.3105.desc: "Nossa equipe de [Root.Owner.GetScientistPlural] descobriu os segredos da manipulação de tempestades. As projeções do poder da tempestade estão nas alturas e é isso mesmo que queremos. Seremos testados e considerados dignos.\n\nConstruções especiais podem servir como centros de coordenação para criar tempestades. Uma construção em §Y[owner.capital_scope.GetName]§! que aumenta a atração de tempestades irá acelerar nosso progresso rumo à tempestade suprema."
 cstorms.3105.a: "Bacana."
 cstorms.3105.a.tt: "Uma §Yconstrução de atração de tempestades§! no planeta capital:\n$situation_speed_tt$: §G+10%§!\n\nUma §Y$sm_storm_attraction_computer$§! na estação do sistema capital:\n$situation_speed_tt$: §G+10%§!\n\n"
 cstorms.3110.name: "O Advento"
 cstorms.3110.desc.outro: "Se injetarmos energia em tempestades naturais, poderemos gerar as condições para tempestades elétricas.\n\nA manipulação do núcleo planetário poderia reorientar o campo magnético de [owner.capital_scope.GetName] para produzir tempestades magnéticas.\n\nPor fim, revertendo a polaridade taquiônica em zonas planetárias específicas, as mudanças de campo podem produzir tempestades gravitacionais."
 cstorms.3110.desc.regular: "Aprendemos a impulsionar as vibrações tempestuosas de [owner.capital_scope.GetName], transformando-as na experiência máxima. Mas temos que decidir qual tipo de tempestade é o mais glorioso.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.hive: "Aprendemos a impulsionar as vibrações tempestuosas de [owner.capital_scope.GetName], transformando-as na experiência máxima. Mas ainda temos que decidir qual tipo de tempestade é o mais glorioso.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.machine: "Aprendemos a impulsionar as vibrações tempestuosas de [owner.capital_scope.GetName], transformando-as na experiência máxima. Mas nossos processos de julgamento de valor estão estagnados em loops, tentando decidir que tipo de tempestade é o mais glorioso.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.a: "Energize as nuvens."
 cstorms.3110.a.tt: "Cultive uma §Y$electric_storm$§! planetária."
 cstorms.3110.b: "Magnetize o núcleo."
 cstorms.3110.b.tt: "Cultive uma §Y$magnetic_storm$§! planetária."
 cstorms.3110.c: "Crie ondas gravitacionais."
 cstorms.3110.c.tt: "Cultive uma §Y$gravity_storm$§! planetária."
 cstorms.3130.name: "Saia Daí"
 cstorms.3130.desc.electric: "O céu estremece. Relâmpagos estalam por todos os lados!\n\nAlém de energizar a superfície do planeta, essas poderosas descargas nos deixaram realmente elétricos! A agricultura sofrerá com as tempestades elétricas, mas o potencial para a geração de energia é inegável."
 cstorms.3130.desc.magnetic: "Bússolas giram fora de controle enquanto o campo magnético de [owner.capital_scope.GetName] se contorce.\n\nAo escavar a crosta de nosso mundo natal, conseguimos injetar matéria magnetizada diretamente no núcleo, e as tempestades naturais amplificaram as flutuações de campo resultantes. Isso irá dificultar a geração de energia, mas melhorará a detecção de novos depósitos de minerais."
 cstorms.3130.desc.gravity: "O simples fato de se mover nunca foi tão empolgante! A gravidade aumenta e diminui em um piscar de olhos.\n\nZonas de manipulação de partículas espalhadas em [owner.capital_scope.GetName] reverteram a polaridade dos táquions e os transformaram em bolas de energia crepitantes. Enquanto as esferas desapareciam rapidamente - a equipe de [Root.Owner.GetScientistPlural] acredita que elas voltaram no tempo -, as ondas gravitacionais oscilavam em todas as direções.\n\nAs flutuações resultantes irão dificultar os trabalhos na superfície do planeta, mas podem melhorar os empregos nas estações em órbita."
 cstorms.3130.a: "Que viagem."
 cstorms.3130.a.tt.regular: "Durante a tempestade planetária:\n$MOD_POP_HAPPINESS$: §G+20%§!"
 cstorms.3130.a.tt.gestalt: "Durante a tempestade planetária:\n$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.name: "Boas Vibrações"
 cstorms.3140.desc.intro: "Nossa equipe de [Root.Owner.GetScientistPlural] está convencida de que as mesmas ideias às quais nos dedicamos para estimular as tempestades planetárias podem ser aplicadas em uma escala muito maior, agora que todo o sistema está repleto de energia tempestuosa."
 cstorms.3140.desc.electric: "$cstorms.3140.desc.intro$\n\nPodemos usar o conhecimento e a infraestrutura existentes para transformar essa tempestade em uma $electric_storm$ ou criar algo novo e empolgante.\n\nA introdução de alguns minerais poderia amplificar a ressonância magnética da tempestade; por outro lado, o uso de ligas metálicas a transformaria em um poço gravitacional."
 cstorms.3140.desc.magnetic: "$cstorms.3140.desc.intro$\n\nPodemos usar o conhecimento e a infraestrutura existentes para transformar essa tempestade em uma $magnetic_storm$ ou criar algo novo e empolgante.\n\nEnergizar o nosso sol poderia amplificar o potencial elétrico da tempestade; por outro lado, o uso de ligas metálicas a transformaria em um poço gravitacional."
 cstorms.3140.desc.gravity: "$cstorms.3140.desc.intro$\n\nPodemos usar o conhecimento e a infraestrutura existentes para transformar essa tempestade em uma $gravity_storm$ ou criar algo novo e empolgante.\n\nA introdução de alguns minerais poderia amplificar a ressonância magnética da tempestade; por outro lado, energizar o nosso sol amplificaria seu potencial elétrico."
 cstorms.3140.a: "Energize o sol."
 cstorms.3140.a.tt: "Cultiva uma §Y$electric_storm$§! cósmica.\nPor §Y2§! anos:$TABBED_NEW_LINE$$mod_country_energy_produces_mult$: §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.a.infra: "Use infraestrutura existente."
 cstorms.3140.a.tt.electric: "Cultiva uma §Y$electric_storm$§! cósmica.\nPor §Y2§! anos:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.b: "Use minerais magnetizados."
 cstorms.3140.b.tt: "Cultiva uma §Y$magnetic_storm$§! cósmica.\nPor §Y2§! anos:$TABBED_NEW_LINE$$mod_country_minerals_produces_mult$: §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.b.tt.magnetic: "Cultiva uma §Y$magnetic_storm$§! cósmica.\nPor §Y2§! anos:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.c: "Use ligas metálicas especiais."
 cstorms.3140.c.tt: "Cultiva uma §Y$gravity_storm$§! cósmica.\nPor §Y2§! anos:$TABBED_NEW_LINE$$mod_country_alloys_produces_mult$: §R-25%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.c.tt.gravity: "Cultiva uma §Y$gravity_storm$§! cósmica.\nPor §Y2§! anos:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3160.name: "Após a Tempestade"
 cstorms.3160.desc: "Quando a tempestade planetária se dispersou, algo novo e duradouro surgiu em [owner.capital_scope.GetName]. Uma tempestade trouxe mudanças e renascimento mais uma vez.\n\nPelo modo revigorante da tempestade local, podemos apenas imaginar as possibilidades de uma verdadeira tempestade cósmica. Por que demora tanto?"
 cstorms.3160.a: "Memorável!"
 cstorms.3160.a.tt.electric: "A tempestade deixou as §Y$d_buzzing_plains$§! eletrificadas em [owner.capital_scope.GetName]."
 cstorms.3160.a.tt.magnetic: "A tempestade deixou novas §Y$d_geothermal_vent$§! em [owner.capital_scope.GetName]."
 cstorms.3160.a.tt.gravity: "A tempestade revelou uma §Y$d_rich_mountain$§! em [owner.capital_scope.GetName]."
 cstorms.3170.name: "Formas Cósmicas"
 cstorms.3170.desc.intro: "Podemos acelerar o surgimento da imensa tempestade cósmica em [owner.capital_scope.GetStarName], mas precisamos nos perguntar: estamos realmente prontos para a aventura de nossas vidas?\n\n"
 cstorms.3170.desc.scientist.snippet: "Uma equipe de [Root.Owner.GetScientistPlural] liderada por §Y[event_target:storm_scientist.GetName]§! poderia pesquisar esses primeiros padrões de tempestade cósmica para descobrir as melhores maneiras de manipular sua formação.\n\n"
 cstorms.3170.desc.commander.snippet: "Se enviarmos as forças armadas lideradas por §Y[event_target:storm_commander.GetName]§!, elas podem explodir a tempestade crescente e deixar a energia cascatear.\n\n"
 cstorms.3170.desc.outro: "Essa equipe conduzida por uma liderança tem um retorno incerto. Por outro lado, ela pode descobrir algo incrível!"
 cstorms.3170.desc.both: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.scientist: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.commander: "$cstorms.3170.desc.intro$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.none: "Tudo o que podemos fazer agora é esperar a tempestade cósmica tomar forma.\n\nA ansiedade é quase insuportável, mas fará o resultado ser ainda mais recompensador."
 cstorms.3170.a: "Envie a equipe de [Root.Owner.GetScientistPlural]."
 cstorms.3170.a.tt: "Cientista §Y[event_target:storm_scientist.GetName]§! se perdeu temporariamente e corre risco de vida."
 cstorms.3170.b: "Mande as forças armadas avançarem."
 cstorms.3170.b.tt: "Comandante §Y[event_target:storm_commander.GetName]§! se perdeu temporariamente e corre risco de vida."
 cstorms.3170.c: "Vamos agir com cautela e esperar."
 cstorms.3190.name: "A Primeira de Muitas"
 cstorms.3190.desc.intro: "Tudo começou com uma ruga no tecido cósmico. As energias dançaram, se fundiram e colidiram. Uma pitada de partículas exóticas, um toque de massa e, finalmente, a tempestade nascente que circunda nossa estrela desencadeou a fera diante de nós.\n\nEsculpida de acordo com a nossa vontade, essa bênção da natureza e da engenhosidade domina os céus."
 cstorms.3190.desc.success: "$cstorms.3190.desc.intro$ Nossa liderança viajando pela tempestade provocou um verdadeiro frenesi.\n\nNós fizemos isso. Sozinhos. Vamos domar essa tempestade e viver a emoção de uma vida inteira!"
 cstorms.3190.desc.failure: "$cstorms.3190.desc.intro$ Nossa liderança se perdeu na tempestade, mas partiu com estilo!\n\nNós fizemos isso. Sozinhos. Vamos domar essa tempestade e viver a emoção de uma vida inteira!"
 cstorms.3190.desc.wait: "$cstorms.3190.desc.intro$ Esperamos por muito tempo, mas o dia finalmente chegou.\n\nNós fizemos isso. Sozinhos. Vamos domar essa tempestade e viver a emoção de uma vida inteira!"
 cstorms.3190.a.success: "Vamos domar a tempestade!"
 cstorms.3190.a.failure: "Testemunhe!"
 cstorms.3190.a.failure.tt: "\nNossa liderança pereceu em uma explosão de glória."
 cstorms.3190.a.wait: "Imaculado!"
 ### Storm Fever ###
 #Modifiers for Storm Fever event chain
 cs_storm_chasers_bad_vibes: "Vibrações Negativas"
 cs_storm_chasers_bad_vibes_desc: "Sentimos um ataque súbito de tédio."
 cstorms.3205.name: "Em Nome da Fúria"
 cstorms.3205.normal: "As vibrações cósmicas estão estranhas, e os feitos habituais simplesmente não provocam a mesma empolgação de antes. Não há dúvidas de que alcançamos coisas grandiosas, mas há um senso incisivo de que falta algo. As conquistas de nossos ancestrais, lendárias em seu escopo e ambição, são difíceis de superar.\n\n\"Essas dificuldades são totalmente existenciais!\", escreveu uma de nossas mentes mais brilhantes. \"Ao atravessar o vazio, abrimos um vazio em nós mesmos?\"\n\nA angústia é real, e o momento de agir é agora. Para começar bem, retornamos ao início: uma série de desafios projetados especificamente para proporcionar o máximo de adrenalina!"
 cstorms.3205.gestalt: "As vibrações cósmicas estão estranhas, e os feitos habituais simplesmente não provocam a mesma empolgação de antes. Não há dúvidas de que alcançamos coisas grandiosas, mas há um senso incisivo de que falta algo.\n\nSomos atormentados por perguntas: sabemos quem realmente somos? Será que nossos dias de glória ficaram para trás? Como um coletivo, temos a responsabilidade de nos tornarmos a melhor versão de nós mesmos.\n\nA angústia é real, e o momento de agir é agora. Para começar bem, retornamos ao início: uma série de desafios projetados especificamente para proporcionar o máximo de adrenalina!"
 cstorms.3205.a: "As emoções estão apenas começando."
 cstorms.3205.tooltip: "Descubra os desafios do passado no Registro de Situações."
 cstorms.3215.name: "Fim da Febre"
 cstorms.3215.intro: "Conseguimos!\n\nCom o objetivo de buscar a mais pura emoção, vencemos todos os desafios. Testemunhem o que conquistamos nos últimos anos!"
 cstorms.3215.desc: "$cstorms.3215.intro$\n\nComo os totalmente excelentes pioneiros de nosso mundo natal, ultrapassamos nossos limites.\n\nMelhor ainda, graças ao nosso envolvimento com a fúria da natureza, adquirimos um entendimento incrível sobre a nossa existência."
 cstorms.3215.a: "Estamos de volta e com tudo!"
 ### Storm Frenzy ###
 cs_storm_chasers_storm_frenzy_1: "Frenesi Tempestuoso"
 cs_storm_chasers_storm_frenzy_1_desc: "O advento da Derradeira nos deixou em frenesi."
 cs_storm_chasers_storm_frenzy_2: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_3: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_1_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_1_gestalt_desc: "O advento da Derradeira deixou nossa consciência em êxtase."
 cs_storm_chasers_storm_frenzy_2_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_storm_frenzy_3_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_the_code: "O Código"
 cs_storm_chasers_the_code_desc: "Não é a supremacia que nos motiva, nem o ganho material. Vivemos para testar nossos limites. Somos discípulos do limiar da existência."
 cs_storm_chasers_the_code_gestalt: "O Código"
 cs_storm_chasers_the_code_gestalt_desc: "$cs_storm_chasers_the_code_desc$"
 every_empire_opinion_hit: "A opinião d[global_event_country.GetOAGalCommImp] §Y[global_event_country.GetGalCommunityOrGalImperium]§! sobre nós muda em:"
 nexus_opinion_first_hit: "Ansiedade em Relação ao Nexus"
 nexus_opinion_first_hit_tt: "$every_empire_opinion_hit$ §R$@first_hit_opinion_change$§!"
 nexus_opinion_second_hit: "Desespero em Relação ao Nexus"
 nexus_opinion_second_hit_tt: "$every_empire_opinion_hit$ §R$@second_hit_opinion_change$§!"
 nexus_opinion_third_hit: "Temor em Relação ao Nexus"
 nexus_opinion_third_hit_tt: "$every_empire_opinion_hit$ §R$@third_hit_opinion_change$§!"
 nexus_opinion_summon_hit: "Fúria em Relação ao Nexus"
 nexus_opinion_summon_hit_tt: "$every_empire_opinion_hit$ §R$@nexus_hit_opinion_change$§!"
 nexus_opinion_the_code: "Reconciliação em Relação ao Nexus"
 cs_stormfrenzy_chain_title: "Frenesi Tempestuoso"
 cs_stormfrenzy_chain_desc: "Sempre ultrapassamos os limites. Inspirados pelos feitos de nossos antecessores, agora temos a chance de modelar a tempestade dos nossos sonhos."
 cstorms.3220.name: "O Credo de Um Caçador"
 cstorms.3220.desc: "Nosso povo nunca deixará de buscar emoções. Todos os dias, descobrimos situações incríveis e enfrentamos desafios ainda maiores, mas [ruler.GetRegnalName] acredita que podemos ir ainda mais longe:\n\n\"O núcleo de uma tempestade cósmica é puro potencial; o limite definitivo. Um limite poderoso o bastante para derrubar o status quo e liberar a adrenalina de uma vida inteira.\"\n\nO momento é propício para provocar uma tempestade de proporções verdadeiramente épicas, um Nexus de jubiloso pandemônio: a Derradeira. Restam apenas duas questões: um estudo final para determinar exatamente como invocar a tempestade perfeita, e a opinião do resto da galáxia se decidirmos fazer isso.\n\nA criação de algo assim certamente despertará algum ressentimento."
 PROJECT_SOW_THE_BIG_ONE: "Incentivar a Derradeira"
 PROJECT_SOW_THE_BIG_ONE_DESC: "Temos a tecnologia, mas sem uma tempestade emergente nas proximidades, precisaremos investigar como cultivar uma tempestade que seja possível modelar."
 cstorms.3222.name: "Cultivo de Matéria Escura"
 cstorms.3222.desc: "As propriedades exclusivas da Matéria Escura fazem dela a substância ideal para provocar a Derradeira. Injetaremos esse material elusivo na trama espacial que circunda nosso sistema capital e esperaremos até que as primeiras ondas da tempestade apareçam.\n\nNo entanto, isso já atraiu alguma atenção indesejada: nossos vizinhos começaram a protestar. \"Nem todo mundo está tão animado quanto nós para surfar nessa onda em particular\", reclamou um membro de nossa equipe de [Root.Owner.GetScientistPlural]."
 cstorms.3222.a: "É hora de começar."
 cstorms.3222.b: "Temos que poupar alguns recursos."
 PROJECT_DARK_SEEDING: "Incentivo Exótico"
 PROJECT_DARK_SEEDING_DESC: "Ao injetar cuidadosamente a Matéria Escura na trama espacial, provocaremos uma tempestade maleável dentro deste sistema."
 cstorms.3224.name: "Despertar da Derradeira"
 cstorms.3224.desc: "Incrível! As vibrações emergentes da tempestade que se aproxima já estão sendo sentidas. O trabalho de nossa equipe de [Root.Owner.GetScientistPlural] está em andamento, mas já estamos um passo mais perto de invocar a Derradeira.\n\nNo entanto, nossos vizinhos não estão nem um pouco satisfeitos. Eles alegam que estamos brincando com poderes que não podemos compreender, e isso já afetou nossas relações."
 cstorms.3224.a: "Paciência..."
 cstorms.3225.name: "Alimentando a Derradeira"
 cstorms.3225.desc: "Os dados são claros: seja lá o que colocarmos nessa tempestade, teremos resultados semelhantes. Portanto, se a alimentarmos com o tipo certo de recursos, ela assumirá as propriedades – e proporções épicas – de todos os tipos de tempestade.\n\nO povo da galáxia continua preocupado, mas o barato do século está apenas esperando para nascer. Vamos alimentá-la com tudo que temos!"
 cstorms.3225.a: "Alimente a tempestade!"
 cstorms.3225.b: "Precisaremos de mais recursos."
 cstorms.3226.name: "O Banquete Derradeiro"
 cstorms.3226.desc: "Teremos que fornecer à tempestade emergente uma ampla variedade de nutrientes se quisermos criar uma tempestade de proporções épicas. Esse feito incrível requer uma amostragem específica de recursos à nossa disposição."
 PROJECT_EVERY_ITEM_ON_THE_MENU: "Algo fora do Cardápio"
 PROJECT_EVERY_ITEM_ON_THE_MENU_DESC: "Agora sabemos que uma tempestade cósmica pode ser manipulada quando alimentada com a dieta correta. No caso da tempestade em questão, precisamos de uma amostragem específica."
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT: "Repetir: $cstorms.3225.name$"
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT_DESC: "Para criar a tempestade perfeita, será necessária uma amostragem de recursos cuidadosamente medida."
 cstorms.3227.name: "A Reta Final"
 cstorms.3227.desc: "A empolgação é palpável. O caminho à frente é claro: ir mais longe e com mais força. Vamos nos unir ao próprio frenesi cósmico! Está tudo pronto para a Derradeira. Só precisamos dar a ela um empurrãozinho.\n\nNossos vizinhos já estão mais do que furiosos, alegando que a nossa chamada \"$nexus_storm$\" causará estragos na galáxia. Mas vamos realmente permitir que esses desmancha-prazeres atrapalhem um projeto de proporções tão épicas? A hora de decidir é agora."
 cstorms.3227.a: "A Derradeira é o nosso destino!"
 cstorms.3227.a.tt: "O $nexus_storm$ chegará em 40 dias.\n$nexus_opinion_third_hit_tt$"
 cstorms.3227.b: "Não, somos melhores do que isso!"
 cstorms.3227.b.tt: "$nexus_storm$ abortado.\n§YA opinião d[global_event_country.GetOAGalCommImp] [global_event_country.GetGalCommunityOrGalImperium]§! melhorará em 40 dias."
 cstorms.3230.name: "Gênese da Derradeira"
 cstorms.3230.desc: "Conseguimos. Estamos à beira de uma nova experiência. É chegada a hora da calamidade final. Não há nada que nossos Domadores de Tempestades não possam encarar. Nós jamais negaremos um desafio.\n\nQue a galáxia seja nossa testemunha!"
 cstorms.3230.a: "Faça isso."
 has_spawned_nexus_storm_tt: "$TRIGGER_FAIL$Fez surgir uma §Y$nexus_storm$§!"
 cstorms.3235.name: "Desfecho da Tempestade"
 cstorms.3235.desc: "Aprendemos muito. Agora entendemos que a galáxia não é um parquinho, mas uma aventura que deve ser vivenciada.\n\n[ruler.GetRegnalName] expressou isso da melhor forma: \"Nesta vida, não há escassez de emoções. Nunca deixaremos de buscar o próximo desafio, mas devemos fazer isso com respeito. Foi isso que escolhemos. É assim que devemos ser.\""
 cstorms.3235.a: "Tudo numa boa!"
 cstorms.3235.a.tt: "$every_empire_opinion_hit$ §G+$@the_code_total_change$§!"
 #Storm Fever Challenges
 cs_stormfever_chain_title: "Febre Tempestuosa"
 cs_stormfever_chain_desc: "Para alcançar novos patamares, conhecer a felicidade e testar nossos limites, embarcamos agora em uma série de provações. Que comece a diversão!"
 challenges_completed: "Desafios Concluídos"
 MISSION_CS_STORM_FEVER_CHALLENGE_1: "Derrote uma Frota dentro de uma Tempestade"
 MISSION_CS_STORM_FEVER_CHALLENGE_1_DESC: "O calor da batalha sempre foi um campo de provações. Agora, imagine vivenciá-las no coração feroz de uma tempestade cósmica! Vamos mostrar à galáxia que somos realmente extremos.\n\nO desafio agora é derrotar uma frota inimiga em uma tempestade."
 fleets_defeated_in_storm: "Frotas Derrotadas em uma Tempestade"
 MISSION_CS_STORM_FEVER_CHALLENGE_2: "Explore o Limite da Galáxia"
 MISSION_CS_STORM_FEVER_CHALLENGE_2_DESC: "Ir além de nossas próprias fronteiras, equilibrar-se no limite das estrelas, buscar os confins mais distantes do espaço... Existe algo mais revigorante?\n\nPrecisamos enviar uma nave científica para o sistema designado, da maneira que pudermos."
 far_edge_explored: "Limites Distantes Explorados"
 MISSION_CS_STORM_FEVER_CHALLENGE_3: "Domar as Tempestades"
 MISSION_CS_STORM_FEVER_CHALLENGE_3_DESC: "Apenas os melhores anseiam pela emoção de uma tempestade. Que eles possam viajar e prosperar!\n\nNosso próximo desafio é ajudar um Domador de Tempestades a resistir a uma tempestade cósmica por mais de 180 dias."
 days_storm_rider_spend_in_storm: "Dias que o Domador passou em uma Tempestade"
 MISSION_CS_STORM_FEVER_CHALLENGE_4: "Investigar o Que Foi Descoberto"
 MISSION_CS_STORM_FEVER_CHALLENGE_4_DESC: "Uma galáxia repleta de tesouros enterrados e segredos antigos – e um vento radical para agitá-los! Vamos sair por aí e ver o que podemos encontrar.\n\nVamos nos desafiar a investigar uma anomalia ou um sítio arqueológico revelado por uma tempestade."
 storm_unraveled_event_investigated: "Anomalias ou Sítios Arqueológicos Investigados"
 MISSION_CS_STORM_FEVER_CHALLENGE_5: "Espalhar a Alegria"
 MISSION_CS_STORM_FEVER_CHALLENGE_5_DESC: "Por que deveríamos ficar com toda a diversão? A aventura sempre é melhor quando compartilhada.\n\nPara ajudar nossos vizinhos a se sentirem incluídos, o desafio agora é fazer com que uma tempestade cósmica se desvie para o território deles."
 send_storm_to_other_empire: "Tempestades Enviadas para Outros Impérios"
 MISSION_CS_STORM_FEVER_CHALLENGE_6: "Sucumbir à Tempestade"
 MISSION_CS_STORM_FEVER_CHALLENGE_6_DESC: "Não faz nosso estilo envelhecer e desaparecer. É muito melhor arder intensamente em uma explosão de glória!\n\nO próximo desafio é ajudar um Domador de Tempestades a vivenciar seus momentos finais dentro de uma tempestade cósmica."
 rider_died_in_storm: "Domadores de Tempestades Mortos ou Desaparecidos em Tempestades"
 #Challenge completed intro
 challenge_completed_intro: "Novos patamares foram alcançados e limites foram ultrapassados! Isso é exatamente o que faz as emoções dispararem. Concluímos a provação!"
 #Challenge 1 completed
 challenge_completed: "Desafios Concluídos:"
 cstorms.305.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_1$"
 cstorms.305.desc: "$challenge_completed_intro$\n\nAquela frota nunca teve uma chance. Quem se atreverá a nos desafiar em seguida?"
 cstorms.305.a: "Que sensação boa!"
 #Challenge 2 completed
 cstorms.310.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_2$"
 cstorms.310.desc: "$challenge_completed_intro$\n\nA galáxia tem muito a oferecer! A emoção nunca acaba, e não faz sentido parar agora. Vamos para o próximo desafio!"
 cstorms.310.a: "É isso aí!"
 #Challenge 3 completed
 cstorms.315.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_3$"
 cstorms.315.desc.normal: "$challenge_completed_intro$\n\nNosso Domador de Tempestades se apresentou de volta sob aplausos triunfantes. As tempestades cósmicas são um nível totalmente novo de emoção!"
 cstorms.315.desc.gestalt: "$challenge_completed_intro$\n\nEstamos tomados pela exaltação. As tempestades cósmicas levam a emoção a um nível totalmente novo."
 cstorms.315.a: "A emoção nunca acaba!"
 #Challenge 4 completed
 cstorms.320.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_4$"
 cstorms.320.desc: "$challenge_completed_intro$\n\nInvestigar segredos antigos e desenterrar tesouros é sempre uma emoção. Quem sabe o que ainda há lá fora, esperando para ser encontrado?"
 cstorms.320.a: "Possibilidades infinitas!"
 #Challenge 5 completed
 cstorms.325.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_5$"
 cstorms.325.desc: "$challenge_completed_intro$\n\nAquela tempestade passou direto pelo território deles, espalhando emoção e desordem na mesma medida! Podemos ficar tranquilos sabendo que proporcionamos aos nossos vizinhos uma experiência tão incrível.\n\nTalvez eles não tenham gostado agora, mas vão nos agradecer mais cedo ou mais tarde."
 cstorms.325.a: "Somos generosos!"
 #Challenge 6 completed
 cstorms.330.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_6$"
 cstorms.330.desc.normal: "$challenge_completed_intro$\n\nA grande tempestade chamou seu nome e foi abraçada com júbilo. Salve, Domador de Tempestades, sua lenda absoluta! Que sua jornada para o além seja tão épica quanto sua saída."
 cstorms.330.desc.gestalt: "$challenge_completed_intro$\n\nA grande tempestade chamou uma parte de nós para se juntar a ela em uma carnificina jubilosa. Perder um nódulo nunca foi tão significativo e revigorante! Essa experiência épica definirá nossa espécie por muitos anos."
 cstorms.330.a: "Pode crer!"
 cstorms.331.desc.normal: "$challenge_completed_intro$\n\nA grande tempestade chamou seu nome e foi abraçada com júbilo. Salve, Domador de Tempestades, lenda absoluta!"
 cstorms.331.desc.gestalt: "$challenge_completed_intro$\n\nA grande tempestade chamou uma parte de nós para se juntar a ela em uma carnificina jubilosa. Quase perder um nódulo nunca foi tão significativo e revigorante! Essa experiência épica definirá nossa espécie por muitos anos."
 electric_storm_desc: "A colisão de campos eletromagnéticos imbui esta tempestade cósmica com um nível quase perigoso de carga elétrica. Nocivo para escudos, mas benéfico para a produção planetária."
 particle_storm_desc: "Estas tempestades quase parecem vivas, movendo-se através e dentro da trama galáctica, sem perseguir nem evitar naves espaciais. Perigosas e instáveis, sua mera presença é suficiente para unir uma civilização contra os elementos."
 gravity_storm_desc: "Quando corpos estelares maciços colidem, o impacto resultante envia ondulações gravitacionais por toda a galáxia. Quando estas, por sua vez, entram em colapso, nasce uma tempestade gravitacional. Provoca efeitos negativos em sistemas de mira de naves, e as flutuações na gravidade forçam praticamente todos os habitantes a ficarem em seus lares."
 magnetic_storm_desc: "Quando cinturões de asteroides metálicos errantes interagem com grandes forças gravitacionais, formam-se campos magnéticos em seu interior. Tempestades desse tipo destroem cascos e causam interrupções na construção industrial, mas também ajudam a extrair minerais valiosos da crosta de um planeta."
 solar_storm_desc: "Uma $solar_storm$ cria uma flutuação brilhante na trama espacial. Sua presença faz com que as estrelas produzam explosões sem precedentes. A radiação resultante é extremamente prejudicial, mas sobrecarrega a produção das estações espaciais e torna mais difícil para as naves permanecerem ocultas."
 celestial_storm_desc: "A todo momento, a poeira de milhões de planetas está à deriva pela galáxia. Às vezes, esses grânulos se aglomeram em quantidades tão significativas que resultam em uma tempestade de poeira. Prejudica a comunicação planetária, mas os elementos químicos que ela traz são úteis na produção de recursos. Nossos scanners são praticamente incapazes de detectar objetos dentro dessas tempestades."
 shroud_storm_desc: "Em raras ocasiões, o Véu pode sussurrar através do mundo físico. Essas raras tempestades expõem seres sencientes a visões tanto sublimes quanto grotescas. Aqueles que comungaram com o Véu podem até mesmo desfrutar de uma sinergia instável."
 nexus_storm_desc: "Quando as estrelas se alinham, até mesmo uma pequena tempestade cósmica pode crescer além dos limites convencionais. Esse evento raro desencadeará um terror de proporções apocalípticas. Não há como prosperar dentro dessa abominação; a única opção é sobreviver."
 FROM_STORM: "Da Tempestade"
 #Planetary modifiers
 hyper_ecosystem: "Hiperecossistema"
 hyper_ecosystem_desc: "O solo deste planeta contém concentrações excepcionalmente altas de nitrogênio e fósforo, reabsorvidas de minerais formados naturalmente na crosta. Isso resulta no crescimento extraordinariamente rápido das plantas, o que é ótimo para a agricultura, mas dificulta qualquer projeto de construção."
 docile_fauna: "Fauna Dócil"
 docile_fauna_desc: "A vida selvagem e o crescimento vegetal deste planeta não têm muitos predadores naturais, o que os torna excepcionalmente dóceis e, portanto, agradáveis de se conviver. A população é controlada por danos causados por tempestades, e não pela sobrevivência do mais apto."
 obsidian_lakes: "Lagos de Obsidiana"
 obsidian_lakes_desc: "A atividade tectônica fez com que os lagos de magma se resfriassem em enormes lençóis de obsidiana, trazendo recursos valiosos para muito mais perto da superfície."
 obsidian_lakes_volcanic: "$obsidian_lakes$"
 obsidian_lakes_volcanic_desc: "$obsidian_lakes_desc$"
 crimson_crawlers: "Rastejantes Carmesins"
 crimson_crawlers_tt: "§R$COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS$§!"
 crimson_crawlers_desc: "A superfície deste planeta é um tapete carmesim devido à presença de trilhões de minúsculos insetos vermelhos. Apesar de seu número incrível, eles parecem inofensivos e conseguiram estabelecer um tênue equilíbrio com o ecossistema do planeta."
 metal_planet: "Planeta de Metal"
 metal_planet_desc: "Este planeta está totalmente coberto por metais brutos que ocorrem naturalmente. Ele não dispõe de elementos básicos para a vida, como água ou uma atmosfera respirável, mas contém muitos recursos utilizáveis!"
 terraform_fail_is_metal_planet: "Este planeta não pode ser terraformado devido à sua crosta metálica."
 previously_terraformed_planet: "Planeta Previamente Terraformado"
 previously_terraformed_planet_desc: "Um mundo rochoso com uma atmosfera de nitrogênio-oxigênio e muitos oceanos. Há evidências de que impérios mais antigos chegaram e colonizaram este planeta antes, mas depois desapareceram. Isso significa que há muito a ser descoberto e desvendado, mas também que o planeta está pronto para receber uma colônia!"
 previously_terraformed_planet_tt: "As tentativas anteriores de terraformação tornam muito mais fácil transformar este planeta em um Mundo-Gaia."
 has_patriotic_institute: "O $building_adakkaria_patriotic_institute$"
 has_patriotic_institut_desc: "Este planeta já foi a base da Convenção de adAKKaria. O $building_adakkaria_patriotic_institute$ é tudo o que resta dessa outrora poderosa civilização."
 has_patriotic_institute_tt: "Tem a construção: $building_adakkaria_patriotic_institute$. Colonize este planeta para tomar posse dela."
 adakkaria_patriotic_institute_desc.supercharged: "A cada ano, uma tempestade é acionada no sistema ao custo de um §Y100§! £pop£ §HPops§!."
 #Planet Modifiers
 crimson_crawlers_sashimi_style: "Rastejantes Carmesins: Consumo Cru"
 crimson_crawlers_sashimi_style_desc: "A superfície deste planeta é de um tom carmesim profundo devido à presença de trilhões de minúsculos insetos vermelhos. Mesmo quando consumidos crus, eles são uma deliciosa fonte de alimento."
 crimson_crawlers_bbq_them: "Rastejantes Carmesins: Consumo Preparado"
 crimson_crawlers_bbq_them_desc: "A superfície deste planeta é de um tom carmesim profundo devido à presença de trilhões de minúsculos insetos vermelhos. Eles se tornaram uma iguaria para a população grelhar e consumir."
 COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS: "§REste planeta não pode ser colonizado por impérios Maquinários ou Terrávoros.§!"
 #New planet types modifiers
 collided_planet: "Planeta Colidido"
 collided_planet_desc: "Dois planetas que chocaram-se um contra o outro, e em vez de se destruírem, ficaram emaranhados. Embora tenha uma área de superfície útil maior, este mundo apresenta desafios únicos de habitação e construção."
 wooden_planet: "Mundo Arbóreo"
 wooden_planet_desc: "Ao longo de milhares de anos, a crosta deste planeta se tornou uma densa camada de raízes com vários quilômetros de espessura, tornando-o um organismo vivo titânico."
 wooden_planet_tt: "Moradias custam $w_food$ para serem construídas e mantidas.\nFazendas custam $w_food$ para serem construídas."
