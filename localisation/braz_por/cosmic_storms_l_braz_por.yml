 #Storm Tech Insight events
 cstorms.505.name: "Enfrente a Tempestade"
 cstorms.505.desc: "Como consequência da devastação causada pela §H[this.GetAffectedStormType]§!, ganhamos conhecimentos únicos sobre esses fenômenos galácticos.\n\nPor meio do estudo da astrometeorologia, seremos capazes de nos proteger melhor no futuro. Esse novo campo de pesquisa poderá resultar em meios de controlar essas tempestades."
 #Storm Buildings
 building_storm_attraction_center: "Centro de Atração de Tempestades"
 building_storm_attraction_center_desc: "Por meio da manipulação cuidadosa de forças gravitacionais, estas instalações atraem tempestades cósmicas próximas."
 building_advanced_storm_attraction_center: "Centro Avançado de Atração de Tempestades"
 building_advanced_storm_attraction_center_desc: "O conhecimento avançado sobre a energia escura nos permite sobrecarregar cada $building_storm_attraction_center$ e atrair tempestades cósmicas com mais eficiência."
 building_storm_repellent_center: "Centro de Repulsão de Tempestades"
 building_storm_repellent_center_desc: "Quanto mais longe a tempestade, mais segura estará a população – e todos ficaremos mais tranquilos. Os complexos instrumentos astrometeorológicos destes centros repelem as tempestades que se aproximam."
 building_advanced_storm_repellent_center: "Centro de Repulsão de Tempestades Avançado"
 building_advanced_storm_repellent_center_desc: "Qualquer tipo de manipulação do espaço-tempo é bem-vinda se mantém nosso mundo livre de tempestades cósmicas. Este centro faz exatamente isso."
 building_storm_resistant_production: "Centro de Assistência contra Tempestades"
 building_storm_resistant_production_desc: "Este centro de assistência auxilia os esforços locais para anular o impacto de uma tempestade cósmica na produção planetária. Por meio da coordenação e comunicação, o $building_storm_resistant_production$ permite a rápida mobilização de equipes de resgate, além de melhorar as condições de comércio em todo o planeta."
 building_storm_resistant_production_tt: "Efeitos negativos da §Y$default_storm$§! que afetam a produção do planeta são reduzidos em §G30%§!.\n\nEnquanto uma §Y$default_storm$§! está presente:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+0.5§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+0.5§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+0.5§! \n\nPermite a Decisão Planetária §Y$decision_hunker_down$§!"
 building_advanced_storm_resistant_production: "Nulificador de Tempestades"
 building_advanced_storm_resistant_production_desc: "Ao incluir sistemas de controle climático em cada $building_storm_resistant_production$, os efeitos negativos de tempestades cósmicas são reduzidos consideravelmente. Além disso, as equipes de resgate podem ser mobilizadas de forma ainda mais eficiente e as condições do clima local quase não afetam o comércio planetário."
 building_advanced_storm_resistant_production_tt: "Efeitos negativos da §Y$default_storm$§! que afetam a produção do planeta são reduzidos em §G45%§!.\n\nEnquanto uma §Y$default_storm$§! está presente:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+1§! \n\nPermite a Decisão Planetária §Y$decision_hunker_down$§!"
 building_adakkaria_patriotic_institute: "Instituto Patriótico de Celebração"
 building_adakkaria_patriotic_institute_desc: "O $building_adakkaria_patriotic_institute$ reúne uma coleção de conhecimentos avançados acerca da condição senciente. Aqui, nós capacitamos as pessoas para que cultivem suas próprias tempestades interiores enquanto evitam o encanto sedutor da crueldade da Convenção."
 building_adakkaria_patriotic_institute_effect_desc: "Quando uma tempestade cósmica passa por este sistema, há uma chance de 10% de £pop£ §HPops§! ganharem a característica $Name_Storm_Fused$."
 building_adakkaria_patriotic_institute_effect_upgrade_desc: "Quando uma tempestade cósmica passa por este sistema, há uma chance de 40% de £pop£ §HPops§! ganharem a característica $Name_Storm_Fused$. Além disso, há 20% de chance a cada 10 anos de §Y100§! £pop£ §HPops§! se transformarem em uma tempestade cósmica."
 building_astrometeorology_observation_center: "Observatório de Astrometeorologia"
 building_astrometeorology_observation_center_desc: "Fazendo uso de sensores delicados, este centro de observação estuda as diversas condições ambientais para ampliar a nossa compreensão do universo natural."
 concept_building_astrometeorology_observation_center: "$building_astrometeorology_observation_center$"
 building_storm_summoning_theater: "Teatro de Invocação de Tempestades"
 building_storm_summoning_theater_desc: "Em um festim de arte e tecnologia, os passos apaixonados de nossos $job_storm_dancer_plural$ ajudam a atrair tempestades cósmicas."
 building_storm_holo_theater: "Holossalão da Tempestade"
 building_storm_holo_theater_desc: "Transmitido para todo o planeta e além, o $building_storm_holo_theater$ da Tempestade expande o alcance de nossos deslumbrantes $job_storm_dancer_plural$."
 building_storm_grand_theater: "Grande Teatro da Tempestade"
 building_storm_grand_theater_desc: "Materializando uma conquista artística e tecnológica de última geração, estes grandes teatros fornecem o palco perfeito para a maior das danças."
 sm_storm_attraction_computer: "Matriz de Atração de Tempestades"
 sm_storm_attraction_computer_desc: "Este componente nos permite manipular as condições gravitacionais locais para atrair tempestades das profundezas do espaço."
 sm_storm_repelling_computer: "Matriz de Repulsão de Tempestades"
 sm_storm_repelling_computer_desc: "Esta matriz de lasers poderosos é capaz de criar bolsões de partículas altamente magnetizadas, criando um repelente natural contra tempestades cósmicas."
 #Jobs
 astrometeorologist: "$job_astrometeorologist$"
