 #Storm Visible Events
 MESSAGE_COSMIC_STORM_SPOTTED_DESC: "Nossos scanners detectaram uma tempestade cósmica do tipo $TYPE|Y$. Nós a chamamos de $NAME|Y$.\n\n"
 MESSAGE_COSMIC_STORM_SPOTTED_EVENT_CONFIRM: "Interessante."
 MESSAGE_STORM_INTRO: "Essa tempestade causará efeitos devastadores nas colônias e atrapalhará o acesso de nossas frotas ao MRQL Emergencial. É altamente recomendável tomar medidas preventivas.\n\n"
 MESSAGE_ELECTRIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$As descargas elétricas extremas da tempestade serão um perigo para os sistemas de escudo de nossas frotas. No entanto, esperamos um aumento significativo na produção das colônias e na velocidade das naves devido à energia abundante presente na tempestade."
 MESSAGE_SOLAR_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$A radiação dessa tempestade fará com que as frotas dentro dela fiquem visíveis para qualquer um cujos scanners detectem a tempestade. Embora isso apresente alguns riscos de segurança, nossas estações vão operar com muito mais eficiência nessas condições."
 MESSAGE_CELESTIAL_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Esse tipo de tempestade irá obstruir nossos sensores, impossibilitando a detecção de frotas nesses sistemas e desacelerando viagens espaciais. Apesar dos riscos, podemos nos aproveitar dessas condições para aumentar a produção de alguns empregos enquanto durar a tempestade."
 MESSAGE_NEXUS_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Esse tipo de tempestade apresenta um enorme risco para as nossas colônias, frotas e estações. Elas sofrerão danos enormes até a situação passar."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$A alta concentração de energia psiônica nessa tempestade reduzirá significativamente a estabilidade em nossas colônias, mas ajudará na eficiência de evasão de frotas."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_SHROUD_BREACHED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$A alta concentração de energia psiônica nessa tempestade reduzirá significativamente a estabilidade em nossas colônias, mas nosso conhecimento de navegação pelo Véu nos ajudará na eficiência de nossas frotas e Telepatas.\n\nO Véu se agita... devemos nos preparar para qualquer situação."
 MESSAGE_GRAVITY_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$A fortes influências gravitacionais dessa tempestade dificultarão as operações das frotas, e nossas naves maiores correm mais riscos.\n\nApesar desses problemas, as colônias conseguirão usar esse ambiente extremo para nossa vantagem, aumentando a eficiência de algumas tarefas."
 MESSAGE_MAGNETIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$As forças magnéticas extremas dessa tempestade deixarão nossa frota e sistemas de manutenção estrutural em desordem.\n\nA forças magnéticas da tempestade criaram uma sinergia inesperada com nossas técnicas metalúrgicas avançadas. Essa interação deve reduzir os custos associados aos nossos Metalúrgicos durante esse evento galáctico."
 MESSAGE_PARTICLE_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$A densidade dos destroços particulados nessa tempestade causará efeitos devastadores nas naves e estações, negando totalmente as regenerações de escudo. As frotas corajosas o bastante para permanecer na tempestade devem se preparar para um ambiente altamente perigoso."
