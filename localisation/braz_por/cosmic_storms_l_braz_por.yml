 #Storm in a Box
 cstorms.1816.name: "Cápsula à Deriva"
 cstorms.1816.desc: "Uma cápsula misteriosa está à deriva em §H[this.GetName]§!. Não identificamos armamentos aparentes e ela não responde aos nossos sinais.\n\nAnálises iniciais mostram que o exterior avariado da cápsula foi construído a partir de materiais avançados e técnicas de engenharia desconhecidas. Devemos iniciar uma investigação aprofundada."
 cstorms.1816.a: "Investigue."
 STORM_IN_A_BOX_INVESTIGATE_PROJECT: "Estude a Cápsula"
 STORM_IN_A_BOX_INVESTIGATE_PROJECT_DESC: "Uma cápsula misteriosa e claramente danificada está à deriva no sistema §H[this.GetName]§!. Sua origem e função são desconhecidas. Ela não aparenta ter qualquer tipo de armamento, e acreditamos que uma análise mais aprofundada de sua construção avançada seria uma iniciativa segura e proveitosa."
 cstorms.1820.name: "Armadilha de Tempestades"
 cstorms.1820.desc: "[this.leader.GetName] acredita que a cápsula misteriosa à deriva no sistema [solar_system.GetName] é uma antiga \"armadilha de tempestades\" que já pode ter sido parte de uma rede maior de defesa.\n\nA porta de entrada do dispositivo está selada, mas nossas leituras indicam que seu interior contém a energia e matéria em estado condensado de uma tempestade cósmica confinada.\n\nÉ possível que venhamos a obter um grande conhecimento sobre mitigação de tempestades ao abrirmos esse receptáculo extraordinário, embora sob o risco de liberar as forças contidas em seu interior."
 cstorms.1820.a: "Podemos aprender muito com isso."
 cstorms.1820.b: "É perigoso demais. Não toque na cápsula."
 STORM_IN_A_BOX_TRAP_PROJECT: "Abra a Armadilha de Tempestades"
 STORM_IN_A_BOX_TRAP_PROJECT_DESC: "Uma antiga \"armadilha de tempestades\" está à deriva pelo espaço, carregando uma tempestade cósmica condensada em seu interior. Poderíamos obter conhecimentos valiosos sobre a manipulação e mitigação de tempestades se a abríssemos, mas há o risco de liberarmos as forças que ela contém."
 cstorms.1826.name: "Tempestade Liberada"
 cstorms.1826.desc: "[leader.GetName] concluiu a análise do funcionamento da antiga armadilha de tempestades e conseguiu destravar seu mecanismo de entrada. Quando as portas se abriram, a §H[from.GetStormType]§! contida no interior foi liberada para o espaço do sistema [solar_system.GetName].\n\nO estudo da complexa engenharia da armadilha já rendeu descobertas fascinantes sobre materiais e estruturas resistentes às tempestades, mas ainda não sabemos ao certo como o dispositivo foi capaz de confinar uma tormenta. Esse conhecimento nos ajudará imensamente em futuras perturbações cósmicas."
 cstorms.1826.storm_tt: "Uma §Y$default_storm$§! pequena e de baixo nível foi gerada no sistema [solar_system.GetName]"
 storm_trap_insight_modifier: "Conhecimento da Armadilha de Tempestades"
 storm_trap_insight_modifier_tt: "Reduz os efeitos negativos de §YTempestades Cósmicas§! em §G10%§!."
 cstorms.1835.desc: "Sinceras condolências, [this.GetSpeciesNamePlural]! Nós vimos uma grande tempestade devastar [this.GetName].\n\nÉ claro, ficamos muito tristes em saber do dano causado lá. Choramos, como choramos! Então, por favor, deixem-nos ajudar... com um acordo especial único!\n\nPodemos fornecer dispositivos de primeira linha. Só oferecemos o que há de melhor! Com isso, quando a próxima tempestade chegar, vocês estarão preparados. E então, negócio fechado?"
 cstorms.1835.a: "Aceitamos."
 cstorms.1835.b: "Não temos interesse."
