 cstorms.2000.name: "Preparação de Tempestade"
 cstorms.2000.desc_common_1: "Nós já estamos em posição no sistema §H[target.solar_system.GetName]§! e podemos iniciar as preparações necessárias para criar uma §Y$default_storm$§!.\n\nAo sobrecarregar [target.GetName] temporariamente, poderemos criar as condições ideais para gerar a reação astrometeorológica desejada."
 cstorms.2000.desc_tech: "\nUsando métodos avançados de manipulação de energia, podemos supersaturar [target.GetName] com matéria-prima para formar uma tempestade de estrutura mais complexa."
 cstorms.2000.desc_common_2: "\nEssa tarefa será demorada, mas o resultado representará uma grande conquista para [owner.GetName]. A estrela continuará intacta após a conclusão da operação."
 cstorms.2000.a: "Sobrecarregue a estrela."
 cstorms.2000.a.tt: "$approach_situation_initiate_storm_supercharge_tt$"
 cstorms.2000.b: "Supersature a estrela."
 cstorms.2000.b.tt: "$approach_situation_initiate_storm_overfeed_tt$"
 cstorms.2000.b.tt.allow: "Requer um dos itens a seguir:$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_agitate$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$Tem a tecnologia £physics£ §Y$tech_basic_science_lab_3$§!$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_volatile_motes_tt$$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_destabilize$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$Tem a tecnologia £physics£ §Y$tech_mine_dark_matter$§!$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_scramble$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$Tem a tecnologia £physics£§Y$tech_hyper_drive_3$§!$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_rare_crystals_tt$"
 cstorms.2000.c: "Aborte o projeto."
 cstorms.2010.name: "Calibração da Tempestade"
 cstorms.2010.desc_irradiate_only: "As preparações para a $default_storm$ no sistema §H[target.solar_system.GetName]§! atingiram uma fase crítica. As próximas ações exigem intensa concentração e mais recursos dedicados para forjar uma §Y$solar_storm$§! a partir da manipulação dos ventos solares de §H[target.GetName]§!."
 cstorms.2010.desc_others: "As preparações para a $default_storm$ no sistema §H[target.solar_system.GetName]§! atingiram um momento crítico. As próximas ações serão cruciais, e requerem a alocação de mais recursos dedicados à causa."
 cstorms.2010.a: "Intensifique os ventos solares."
 cstorms.2010.a.tt: "$approach_situation_initiate_storm_irradiate_tt$\nCusto Mensal de $@irradiate_alloy_upkeep|0$ de $r_alloys$, $@default_monthly_progress$ de Progresso/Mês"
 cstorms.2010.b: "Interrompa os campos de elétrons."
 cstorms.2010.b.tt: "$approach_situation_initiate_storm_sever_tt$\nCusto Mensal de $@sever_energy_upkeep|0$ de $r_energy$, $@default_monthly_progress$ de Progresso/Mês"
 cstorms.2010.c: "Magnetize os íons."
 cstorms.2010.c.tt: "$approach_situation_initiate_storm_magnetize_tt$\nCusto Mensal de $@magnetize_mineral_upkeep|0$ de $r_minerals$, $@default_monthly_progress$ de Progresso/Mês"
 cstorms.2010.d: "Abandone o projeto."
 cstorms.2015.name: "$cstorms.2010.name$"
 cstorms.2015.desc_one_tech_only: "As preparações para a $default_storm$ no sistema §H[target.solar_system.GetName]§! atingiram uma fase crítica. As próximas ações de [storm_researcher.GetName] exigem intensa concentração e mais recursos dedicados para tirar proveito do estado inflado de [target.GetName]."
 cstorms.2015.desc_others: "As preparações para a $default_storm$ no sistema §H[target.solar_system.GetName]§! atingiram um momento crítico. As próximas ações de [storm_researcher.GetName] serão cruciais, e requerem a alocação de mais recursos dedicados à causa para que possamos tirar o devido proveito do estado inflado de [target.GetName]."
 cstorms.2015.a: "Agite as partículas."
 cstorms.2015.a.tt: "$approach_situation_initiate_storm_agitate_tt$\nCusto Mensal de $@rare_resource_upkeep|0$ de $r_volatile_motes$, $@default_monthly_progress$ de Progresso/Mês"
 cstorms.2015.b: "Desestabilize os campos gravitacionais."
 cstorms.2015.b.tt: "$approach_situation_initiate_storm_destabilize_tt$\nCusto Mensal de $@rare_resource_upkeep|0$ de $r_dark_matter$, $@default_monthly_progress$ de Progresso/Mês"
 cstorms.2015.c: "Agite a poeira estelar."
 cstorms.2015.c.tt: "$approach_situation_initiate_storm_scramble_tt$\nCusto Mensal de $@rare_resource_upkeep|0$ de $r_rare_crystals$, $@default_monthly_progress$ de Progresso/Mês"
 cstorms.2015.d: "$cstorms.2010.d$"
 cstorms.storm_gathered.final_word: "Dominar o poder da $default_storm$ não foi nada fácil. Finalmente podemos colher as tão aguardadas recompensas de nosso esforço."
 cstorms.storm_gathered.a: "Ótimo trabalho."
 cstorms.2020.name: "Libere a Tempestade"
 cstorms.2020.desc: "Os ventos solares intensificados de §H[target.GetName]§! atingiram uma massa crítica.\n\nEstamos prestes a liberar uma §Y$solar_storm$§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2025.name: "$cstorms.2020.name$"
 cstorms.2025.desc: "Os campos de elétrons de §H[target.GetName]§! foram totalmente interrompidos.\n\nEstamos prestes a liberar uma §Y$electric_storm$§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2030.name: "$cstorms.2020.name$"
 cstorms.2030.desc: "Os íons de §H[target.GetName]§! foram magnetizados com sucesso.\n\nEstamos prestes a liberar uma §Y$magnetic_storm$§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2035.name: "$cstorms.2020.name$"
 cstorms.2035.desc: "As partículas saturadas de §H[target.GetName]§! atingiram seu ápice.\n\nEstamos prestes a liberar uma §Y$particle_storm$§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2040.name: "$cstorms.2020.name$"
 cstorms.2040.desc: "O campo gravitacional de §H[target.GetName]§! foi desestabilizado o bastante.\n\nEstamos prestes a liberar uma §Y$gravity_storm$§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2045.name: "$cstorms.2020.name$"
 cstorms.2045.desc: "A poeira estelar de §H[target.GetName]§! foi completamente agitada.\n\nEstamos prestes a liberar uma §Y$celestial_storm$§!.\n\n$cstorms.storm_gathered.final_word$"
 ### Aftermath Deposits ###
 d_magnetic_storm_1_minerals: "Minério Magnetizado"
 d_magnetic_storm_1_minerals_desc: "A passagem de uma tempestade cósmica magnetizou enormes quantidades de depósitos minerais inexplorados, facilitando bastante nossas operações de mineração para acessarmos esses novos recursos."
 d_magnetic_storm_2_alloys: "Fornalha Forjada pela Tempestade"
 d_magnetic_storm_2_alloys_desc: "A passagem de uma tempestade cósmica que devastou este planeta energizou estranhamente uma grande quantidade de equipamentos de fornalhas. Embora ainda não tenhamos compreendido o mecanismo por completo, nossa produção de ligas metálicas aumentou bastante."
 d_magnetic_storm_3_mix: "Planaltos Aéreos"
 d_magnetic_storm_3_mix_desc: "As majestosas massas de terra flutuantes, magnetizadas pelos efeitos gravitacionais da passagem de uma tempestade cósmica, podem ser movidas para o espaço acima dos complexos industriais existentes."
 cstorms.8000.title: "Alteração Cósmica"
 cstorms.8000.desc: "A passagem de uma tempestade cósmica causou mais do que apenas devastação. Em [Planet.GetName], ela criou uma formação geográfica jamais vista."
 cstorms.8000.a: "Fascinante."
 d_electric_storm_1_engineering: "Ruínas Atingidas por Raios"
 d_electric_storm_1_engineering_desc: "A passagem de uma tempestade cósmica de fúria assombrosa transformou um assentamento próspero em ruínas assoladas por raios, transformando nossos materiais de construção mundanos em componentes raros e incomuns."
 d_electric_storm_2_unity: "Cicatriz Planetária"
 d_electric_storm_2_unity_desc: "A passagem de uma tempestade cósmica assolou uma área concentrada no planeta ao ponto de formar uma cicatriz visível do espaço."
 d_electric_storm_3_physics: "Armada Silenciosa"
 d_electric_storm_3_physics_desc: "A passagem de uma tempestade cósmica provocou caos nos sistemas de navegação de inúmeras naves civis, transformando as áreas mais atingidas em cemitérios assombrados com cascos despedaçados e máquinas dizimadas."
 d_particle_storm_1_society: "Subúrbios Arruinados pela Tempestade"
 d_particle_storm_1_society_desc: "A tempestade cósmica deixou alguns de nossos subúrbios em ruínas. Só nos resta estudar os destroços."
 d_particle_storm_2_unity: "A Derradeira"
 d_particle_storm_2_unity_desc: "A tempestade cósmica deixou uma imensa cratera neste mundo; uma lembrança brutal da indiferença cósmica à nossa existência."
 d_particle_storm_3_motes: "Planícies Instáveis"
 d_particle_storm_3_motes_desc: "A tempestade cósmica transformou diversas planícies vastas em áreas de intensa atividade tectônica. Coincidentemente, o aumento do perigo veio acompanhado do aumento de partículas voláteis."
 particle_storm_aftermath_1_tt: "Velocidade de Montagem de Robôs: §R-40%§!\n£minerals£ §YMinerais§! de Empregos: §R-10%§!\n£volatile_motes£ §YPartículas Voláteis§! de Pops: §G+0.02§!"
 particle_storm_aftermath_2_tt: "Velocidade de Montagem de Robôs: §R-50%§!\n£minerals£ §YMinerais§! de Empregos: §R-20%§!\n£volatile_motes£ §YPartículas Voláteis§! de Pops: §G+0.04§!"
 particle_storm_aftermath_3_tt: "Velocidade de Montagem de Robôs: §R-60%§!\n£minerals£ §YMinerais§! de Empregos: §R-30%§!\n£volatile_motes£ §YPartículas Voláteis§! de Pops: §G+0.06§!"
 d_solar_storm_1_energy: "Camada de Ozônio Degradada"
 d_solar_storm_1_energy_desc: "A tempestade cósmica abriu um buraco na camada de ozônio na atmosfera deste planeta. Apesar do impacto profundo na qualidade de vida, a produção aumentou."
 d_solar_storm_2_districts: "Planaltos Irradiados"
 d_solar_storm_2_districts_desc: "A tempestade cósmica banhou os planaltos deste mundo com radiação, criando um terreno majestoso para a nossa produção de energia."
 d_solar_storm_3_output: "Deserto Brilhante"
 d_solar_storm_3_output_desc: "A tempestade cósmica deixou todo o deserto incandescente; uma paisagem mortal, mas que com medidas de segurança suficientes pode se transformar em um ponto turístico lucrativo."
 d_celestial_storm_1_mines: "Pontas Cristalinas"
 d_celestial_storm_1_mines_desc: "O impacto devastador de uma tempestade cósmica gerou uma paisagem de cristais pontiagudos e afiados, criando um terreno perigoso, porém lucrativo."
 d_celestial_storm_2_society: "Sedimentação Histórica"
 d_celestial_storm_2_society_desc: "A passagem de uma tempestade cósmica dizimou grandes camadas de sedimentos, revelando traços de eras que nunca pudemos estudar antes."
 d_celestial_storm_3_crystal: "Dunas de Poeira Estelar"
 d_celestial_storm_3_crystal_desc: "A passagem de uma tempestade cósmica atingiu este mundo como uma grande onda. Ela deixou uma paisagem etérea de dunas reluzentes de poeira estelar."
 celestial_storm_aftermath_1_tt: "Crime Planetário: §R+10%§!\n£food£ §YComida§! de Empregos: §R-10%§!\n£rare_crystals£ §YCristais Raros§! de Pops: §G+0.02§!"
 celestial_storm_aftermath_2_tt: "Crime Planetário: §R+20%§!\n£food£ §YComida§! de Empregos: §R-20%§!\n£rare_crystals£ §YCristais Raros§! de Pops: §G+0.04§!"
 celestial_storm_aftermath_3_tt: "Crime Planetário: §R+30%§!\n£food£ §YComida§! de Empregos: §R-30%§!\n£rare_crystals£ §YCristais Raros§! de Pops: §G+0.06§!"
 d_gravity_storm_1_districts: "Planícies Compactadas"
 d_gravity_storm_1_districts_desc: "Os efeitos gravitacionais esmagadores de uma tempestade cósmica compactaram várias áreas antes consideradas muito instáveis para construção, basicamente nos concedendo gratuitamente terrenos para a construção de moradias."
 d_gravity_storm_2_unity: "Monumentos Pulverizados"
 d_gravity_storm_2_unity_desc: "A passagem de uma tempestade cósmica causou uma pressão intensa em alguns dos nossos monumentos mais frágeis, reduzindo-os a pó e destroços; um lembrete das forças aterrorizantes que nos aguardam lá fora."
 d_gravity_storm_3_engineering: "Cavernas Gravitacionais"
 d_gravity_storm_3_engineering_desc: "A passagem de uma tempestade cósmica transformou alguns de nossos complexos de mineração em poços destruídos de material hipercompacto. Embora nossas tentativas de reabri-los tenham instigado novas teorias na engenharia e na escavação, elas tiveram pouco progresso na recuperação das minas."
 d_shroud_storm_1_society: "Parasitas do Véu"
 d_shroud_storm_1_society_desc: "A passagem de uma tempestade cósmica espalhou parasitas em nosso gado. Descobrimos que eles alternam entre a nossa realidade e o Véu, e que são comestíveis, saudáveis e inesperadamente deliciosos."
 d_shroud_storm_2_zro: "Campos de Zro"
 d_shroud_storm_2_zro_desc: "Transformados pela passagem de uma tempestade cósmica, os biomas mais verdejantes deste planeta se tornaram agitados campos de Zro. Eles são alguns dos depósitos mais puros que já encontramos."
 d_shroud_storm_3_happy: "Entidade do Lago"
 d_shroud_storm_3_happy_desc: "A passagem de uma tempestade cósmica nos deixou um presente estranho e maravilhoso. A maior massa de água deste planeta forma ondulações que criam padrões e símbolos de clara importância, capazes de responder questões com uma sabedoria surpreendente."
 ### Shroud Storm Events
 shroud_switched: "Coberto pelo Véu"
 shroud_switched_tt: "Mantos do Véu pairam sobre este corpo celeste. Sua presença incomum sugere uma falha profunda ou a consequência de uma Tempestade do Véu catastrófica."
 cstorms.8510.title: "Troca Psiônica"
 cstorms.8510.desc: "Uma agitação de atividade psiônica trocou [from.GetName] por um corpo celeste de classe [from.GetClassName] cuja origem é desconhecida."
 cstorms.8510.a: "Que destino estranho."
 cstorms.8515.title: "Transfiguração em Massa"
 cstorms.8515.desc: "Um surto de energia psiônica assolou [from.GetName], deixando partes da população alteradas de maneiras que desafiam a lei natural. Grupos inteiros foram remodelados; suas formas agora são alienígenas e incomuns, como se algo além da nossa compreensão tivesse reescrito a essência do povo."
 cstorms.8515.a: "Forças desconhecidas se agitam..."
 cstorms.8520.title: "Transmutação Estelar"
 cstorms.8520.desc: "Um surto de energia psiônica refez [from.GetName], transformando o astro em uma estrela completamente nova. Agora, um corpo celeste de classe [from.GetClassName] lança sua luz estranha sobre o sistema [from.solar_system.GetName], como se a própria realidade tivesse sido alterada."
 cstorms.8520.a: "Nem mesmo as estrelas são imunes..."
