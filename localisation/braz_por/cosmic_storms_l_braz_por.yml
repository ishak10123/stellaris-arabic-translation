 #Civics
 civic_astrometeorology: "Astrometeorologia"
 civic_astrometeorology_desc: "Com um profundo respeito pelas forças da natureza, esta espécie não poupa esforços para revelar os mecanismos intrínsecos aos fenômenos ambientais. Enquanto cruzam as estrelas, eles carregam consigo um interesse particular pela astrometeorologia. Os principais objetos de suas ambições são os mais fantásticos e potencialmente destrutivos de todos os eventos astronômicos: as tempestades cósmicas.\n"
 civic_astrometeorology_effect_tooltip: "$t$- $AVAILABLE_BUILDINGS$ £building£ ['building:building_astrometeorology_observation_center']$TABBED_NEW_LINE$- $ADDITIONAL_BUILDINGS_STRING$ £building£ §Y$building_astrometeorology_observation_center$§!"
 civic_astrometeorology_hive: "Modelação Climática"
 civic_astrometeorology_hive_desc: "Enquanto o coletivo alcança as estrelas, sua consciência encanta-se com a visão de fenômenos astrometeorológicos. Estes drones expandem seu lar em nome de uma causa nobre: o estudo dos efeitos ambientais e a descoberta das maravilhas das tempestades cósmicas."
 civic_astrometeorology_hive_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_machine: "Modelação Climática"
 civic_astrometeorology_machine_desc: "Sabendo que as forças da natureza podem ter efeitos profundos em um império maquinário, este coletivo não poupa esforços para estudá-las. Seus modelos detalham meticulosamente todos os eventos astronômicos peculiares de modo quase sagrado. Os principais objetos de sua dedicação são os mais fantásticos e potencialmente destrutivos de todos os eventos astronômicos: as tempestades cósmicas."
 civic_astrometeorology_machine_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_megacorp: "Exploração Climática"
 civic_astrometeorology_megacorp_desc: "O que são efeitos ambientais, senão mais um recurso livre a ser explorado? Esta megacorporação é especializada em adquirir o máximo possível de conhecimento acerca de fenômenos astrometeorológicos e vendê-los a quem pagar mais."
 civic_astrometeorology_megacorp_effect_tooltip: "$civic_astrometeorology_effect_tooltip$ $TABBED_NEW_LINE$- As £building£ §Y$building_private_research_initiative$§! $megacorp_civic_branch_office_building_effect$"
 civic_storm_callers: "Devoção à Tempestade"
 civic_storm_callers_desc: "Desde tempos imemoriais, esta sociedade é capaz de atrair tempestades com seus rituais. Por anos a fio, eles combinaram técnicas inovadoras para aumentar sua eficiência. Com o advento da Idade Espacial, eles agora buscam levar esse conhecimento às estrelas."
 civic_storm_callers_effect_tooltip: "- $AVAILABLE_BUILDINGS$ £building£ ['building:building_storm_summoning_theater']\n- Substitui Empregos de [entertainer.GetIcon] §H[entertainer.GetName]§! por Empregos de £job_storm_dancer£ §H$job_storm_dancer$§!\n- $SPECIES_TRAITS$ ['trait:trait_storm_touched']"
 civic_storm_callers_megacorp: "Influenciadores da Tempestade"
 civic_storm_callers_megacorp_desc: "O que começou como uma simples transmissão de rituais sagrados transformou-se em um gigantesco conglomerado midiático. Videntes e sacerdotes foram substituídos por animadores carismáticos que competem por um mínimo de atenção enquanto apelam para as tempestades cósmicas."
 civic_storm_callers_megacorp_effect_tooltip: "$civic_storm_callers_effect_tooltip$\n- O Edifício Corporativo £building£ §Y$building_amusement_megaplex$§! gera um §YValor de Filial§! extra e adiciona §G+50§! empregos de £job_merchant£ §YComerciante§! à nossa Capital."
 mod_capital_storm_diplo_weight_mult: "$MOD_DIPLO_WEIGHT_MULT$ enquanto a Capital estiver afetada por uma §YTempestade Cósmica§!"
 storm_devotion_diplo_weight_modifier: "$civic_storm_callers$"
 storm_devotion_corporate_diplo_weight_modifier: "$civic_storm_callers_megacorp$"
 civic_environmental_architects: "Paisagistas Planetários"
 civic_environmental_architects_desc: "Após milênios de um cultivo cuidadoso do equilíbrio perfeito em seu mundo natal, esta sociedade está pronta para lidar com os mais inóspitos ambientes entre as estrelas. Eles acreditam profundamente que a natureza pode ser moldada, controlada e aperfeiçoada. Nunca para dominá-la, mas em nome da beleza perfeita."
 civic_environmental_architects_negative_effect_tooltip: "- $HOMEWORLD$ Começa com dois £blocker£ §HBloqueadores Naturais§!"
 civic_environmental_architects_effect_start: "- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ §HTecnologias§! para remover £blocker£ ['concept_natural_blockers'] no §HMundo Natal§!\n- £society£ §HTecnologias§! para remover £blocker£ §HBloqueadores Naturais§! são concedidas como §HOpções de Pesquisa Permanentes§! após a colonização\n- A ['concept_ascension_perk'] §HDomínio da Natureza§! é substituída pela ['concept_decision'] Planetária §H$decision_cultivated_worldscaping$§!\n- Para cada £blocker£ §HBloqueador Natural§! em £planet£ ['concept_planets'] colonizados:"
 civic_environmental_architects_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$- Recursos de Empregos: §R-10%§!\n$t$- Velocidade de Crescimento de Pop: §R-10%§!\n$t$- Manutenção de Pop: §R+15%§!"
 civic_environmental_architects_hive: "Drones de Cultivo"
 civic_environmental_architects_hive_desc: "Como parte de um grande organismo, estes drones reconhecem oportunidades dentro do maior de todos os organismos: a natureza. Eles buscam controlar e moldar sistemas naturais de acordo com a vontade do coletivo."
 civic_environmental_architects_hive_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$- Recursos de Empregos: §R-10%§!\n$t$- Montagem de Pop: §R-10%§!\n$t$- Manutenção de Pop: §R+15%§!"
 civic_environmental_architects_machine: "Protocolos de Jardinagem"
 civic_environmental_architects_machine_desc: "Embora os precursores orgânicos tenham desaparecido, suas criações maquinárias ainda preservam uma preferência pela antiga estética. O mundo natural é um solo fértil para o perfeccionismo programado."
 civic_environmental_architects_machine_effect_tooltip: "$civic_environmental_architects_hive_effect_tooltip$"
 civic_environmental_architects_megacorp: "GeoEngenharia S/A"
 civic_environmental_architects_megacorp_desc: "Os funcionários desta megacorporação estão habituados a viver dentro de uma gaiola dourada. Portanto, a corporação construirá uma onde quer que eles estejam."
