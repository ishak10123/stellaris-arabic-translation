 resolution_category_storm_environmentalists_stances: "Ambientalistas de Tempestades"
 resolution_space_storm_environmentalists_stances_repeal_desc: "A Comunidade Galáctica não deveria ditar a resposta de um império às tempestades cósmicas."
 resolution_cosmic_storms_advanced_storm_studies: "Estudos Avançados sobre Tempestades"
 resolution_cosmic_storms_advanced_storm_studies_desc: "Tempestades são uma belíssima força da natureza. Devemos aprender com elas e respeitá-las."
 resolution_cosmic_storms_advanced_storm_studies_tooltip: "$storm_tech_cost$ §R+20%§!"
