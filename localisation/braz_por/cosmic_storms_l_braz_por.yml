 noble_researcher: "$job_noble_researcher$"
 job_noble_researcher: "Cientista Nobre"
 job_noble_researcher_plural: "Cientistas Nobres"
 job_noble_researcher_desc: "Os descendentes mais nobres e brilhantes são educados no decoro e no método científico para melhor justificar suas posições de supremacia."
 sacred_noble: "$job_sacred_noble$"
 job_sacred_noble: "Nobre Sagrado"
 job_sacred_noble_plural: "Nobres Sagrados"
 job_sacred_noble_desc: "A divindade pela herança é o caminho. A herança pela divindade é o meio. Por conseguinte, somos abençoados com a nobreza."
 augmentation_merchant: "$job_augmentation_merchant$"
 job_augmentation_merchant: "Comerciante de Melhorias"
 job_augmentation_merchant_plural: "Comerciantes de Melhorias"
 job_augmentation_merchant_desc: "Quem poderia guiar nosso império, senão aqueles que oferecem automelhorias a um preço tão acessível e com uma garantia tão prolongada?"
 visionary: "$job_visionary$"
 job_visionary: "Visionário Tecnológico"
 job_visionary_plural: "Visionários da Tecnologia"
 job_visionary_desc: "Operando além dos limites das convenções e livres do fardo da humildade, estes sonhadores dão forma ao amanhã transformando especulações ousadas em realidade comercializável. Para os verdadeiros visionários, o progresso não é apenas um princípio, mas um produto."
 noble_merchant: "$job_noble_merchant$"
 job_noble_merchant: "Patrício"
 job_noble_merchant_plural: "Patrícios"
 job_noble_merchant_desc: "O direito de governar não é hereditário, mas determinado pelo mérito do governante. E que melhor forma de mensurar o seu valor do que a soma do seu saldo bancário?"
