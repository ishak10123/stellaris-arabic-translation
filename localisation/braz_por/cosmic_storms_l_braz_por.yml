 gov_storm_chasers: "Conselho Ancião"
 gov_storm_chasers_desc: "Os membros do totalmente excelente conselho governante se destacam em atos de proeza física que desafiam a morte. Enquanto escalam o pico mais alto ou surfam na maior das ondas, eles dedicam suas vidas à procura incansável da experiência autêntica. Isso lhes garantiu a confiança de sua comunidade e o direito de traçar o caminho para o futuro.\n\nMembros do conselho são intitulados Anciões independentemente da idade, pois seus feitos são considerados lendários. Seus nomes jamais serão esquecidos."
