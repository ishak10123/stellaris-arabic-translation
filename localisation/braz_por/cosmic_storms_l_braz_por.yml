 #Digsites #
 ###########################################
 ### Green Skies
 site_green_skies: "Céu Verde"
 site_green_skies_intro: "Nossos scanners captaram uma série de curiosos sinais oriundos desta área do planeta. Com base em sua composição, é provável que os restos de uma antiga civilização estejam à espera de serem descobertos."
 cstorms.1400.name: "Uma Colagem Curiosa"
 cstorms.1400.desc: "Perto de nosso acampamento, nos deparamos com as ruínas de uma cidade peculiar.\n\nA arquitetura exibia traços de todas as civilizações que já encontramos – incluindo a nossa!\n\nNo entanto, a composição material é similar à que usamos para estabelecer acampamentos durante colonizações planetárias. Isso é estranho, porque tais materiais não resistiriam ao longo das décadas, muito menos à idade determinada pelos nossos scanners para as ruínas.\n\nÉ improvável que essas ruínas tenham pertencido a um precursor misterioso, mas os scanners não apontam outra conclusão. O que será que está acontecendo aqui?"
 cstorms.1405.name: "Situação Precária"
 cstorms.1405.desc: "O rastro dos sinais nos levou a uma passagem para os níveis subterrâneos da cidade arruinada. Sítios arqueológicos como este normalmente dispõem de uma rede de transporte subterrânea ou um grupo de bunkers de segurança. Porém, nós encontramos um pequeno sistema de cavernas cobertas de retalhos de tecido, recipientes de polímero e até mesmo dejetos orgânicos. Parece que não somos os primeiros a explorar este sítio.\n\nAinda mais alarmante, [Root.GetLeaderName] nos informou que o céu no exterior está ficando esverdeado; uma tempestade cósmica está prestes a se formar em [Fromfrom.getName]. De todo modo, continuamos seguindo em direção à origem dos sinais."
 cstorms.1410.name: "Engodo"
 cstorms.1410.desc: "Nosso progresso foi interrompido brevemente por um conjunto de portas de metal severamente danificadas. Com facilidade, nós atravessamos esse obstáculo e entramos em uma instalação de armazenamento rudimentar.\n\nAs estantes estavam repletas das mais variadas tecnologias sucateadas. Caixas de corporações bem conhecidas estavam empilhadas contra as paredes. Enfim, descobrimos a origem dos sinais que estávamos perseguindo: um transponder não muito diferente do nosso.\n\nQuando acessamos o dispositivo e vasculhamos sua base de dados, nossa equipe de [Root.Owner.GetEngineerPlural] começou a formular uma conclusão radical: o sinal foi propositalmente construído para parecer o mais misterioso e intrigante possível, imitando e combinando características de outras civilizações.\n\nAlém disso, dentro das caixas encontramos kits de construção das ruínas na superfície.\n\nContatamos nosso acampamento para relatar a descoberta, mas a tempestade cósmica já havia começado a interromper as comunicações. A última coisa que ouvimos foram ordens alarmantes de [Root.GetLeaderName]. Parece que o acampamento está sendo atacado!"
 cstorms.1410.a: "Prepare a nossa resposta!"
 cstorms.1415.name: "Piratas!"
 cstorms.1415.desc: "A tempestade cósmica em [Fromfrom.getName] estava ocultando uma frota pirata! Foram eles que atacaram nosso acampamento. Os piratas nos pediram para repassar esta mensagem:\n\n§LQueridos tolos,\n\nObrigado por se juntarem a nós em nosso esconderijo.\n\nNão é incrível como seres aparentemente inteligentes abandonam toda a razão quando detectam qualquer vestígio de artefatos antigos e relíquias perdidas? Talvez tivessem esperanças de encontrar uma forma de derrotar um inimigo poderoso? Construir frotas até além do horizonte de eventos? Ou talvez só estivessem tentando ajudar o próprio povo? Que singelo.\n\nPor favor, não sintam-se mal. Vocês não foram os primeiros, e nosso modelo de negócios depende de muitos outros que seguirão seus passos.\n\nAgora, por uma modesta soma de 2.000 créditos energéticos devolveremos algo que vocês perderam.\n\nRecusem nossa oferta e descubram que destino terrível cairá sobre [Leader.getHerHim] e sua tripulação parcamente armada no planeta.\n\nEscolham sabiamente.§!\n\nEstamos a salvo nas cavernas, mas não sabemos por quanto tempo. Vamos fazer a vontade desses bandidos?"
 cstorms.1415.a: "Vamos pagar o resgate."
 cstorms.1415.b: "Diga que eles podem apodrecer no Vazio!"
 cstorms.1415.b.tt: "[Root.GetLeaderName] tornou-se refém."
 cstorms.1416.name: "Resistência"
 cstorms.1416.desc: "Recebemos uma nova mensagem:\n\n§LQue pena. Poderíamos ter usado esses recursos para várias coisas divertidas.\n\nVamos informar a liderança e sua tripulação que suas vidas não valem os créditos. Talvez um escravista ou assimilador motivado nas redondezas possa se interessar. Ouvimos dizer que a segmentação neural por meio do grampeamento de nervos está na moda.\n\nEmpreendedores, desligando.§!\n\nUsamos todo o tempo de que dispúnhamos para erguer uma barricada, e temos suprimentos suficientes para sobreviver um pouco mais. Mas a frota pirata mais cedo ou mais tarde passará pelas nossas defesas!"
 cstorms.1420.name: "Não Cairemos Nessa de Novo"
 cstorms.1420.desc: "O tom arrogante dos piratas não refletia suas habilidades. Em pouco tempo, o que sobrou da frota deles virou parte do ecossistema galáctico.\n\nRestabelecemos contato com a tripulação na superfície logo em seguida. Eles estavam abalados pela experiência, mas não haviam sofrido ferimentos.\n\nEmbora não tenhamos descoberto informações sobre antigas civilizações aqui, o ocorrido revelou uma necessidade de vigilância. A liderança da expedição foi incapaz de enxergar o perigo iminente – um erro que não cometeremos outra vez."
 cstorms.1420.a: "Que isso sirva de lição para todos."
 cstorms.1420.b: "Essa liderança não nos decepcionará outra vez."
 cstorms.1425.name: "Foi um Prazer Negociar com Vocês"
 cstorms.1425.desc: "Recebemos uma resposta:\n\n§LUma excelente escolha, sem dúvida!\n\nFiquem sabendo que sua contribuição com o nosso \"Fundo de Empreendedores Desfavorecidos em Busca de um Planeta Resort\" foi devidamente recebido e processado.\n\nA liderança e sua tripulação logo serão devolvidas a vocês.\n\nE, por favor, nos recomendem para todos os seus parceiros comerciais.§!\n\nPouco depois, conseguimos restabelecer o contato com a tripulação na superfície. Eles relatam estar abalados pela experiência, mas não sofreram ferimentos.\n\nEmbora não tenhamos descoberto informações sobre antigas civilizações aqui, o ocorrido revelou uma necessidade de vigilância. A liderança da expedição foi incapaz de enxergar o perigo iminente – um erro que não cometeremos outra vez."
 cstorms.1425.a: "$cstorms.1420.a$"
 cstorms.1425.b: "$cstorms.1420.b$"
 NAME_green_skies_pirate_country: "O Resort"
 NAME_green_skies_pirate_fleet: "Empreendedores Excêntricos"
 KILL_EXILED_LEADER_EFFECT: "$LEADER$ pagou pela sua incompetência com a própria vida."
 FREE_HOSTAGED_LEADER_EFFECT: "$LEADER$ voltou."
 green_skies_outcome_modifier: "Agora estamos mais vigilantes contra o perigo iminente."
 requires_cosmic_storms: "$dlc_requirement_string$ §ICosmic Storms§!"
 ### Hold the Line
 site_hold_the_line: "Defendendo a Linha de Frente"
 site_hold_the_line_intro: "A recente tempestade cósmica deixou um curioso presente: um complexo orbital de um velho sistema de habitat. Talvez possamos reativá-lo se subirmos a bordo."
 cstorms.1275.name: "Uma Novidade Espantosa"
 cstorms.1275.desc: "Apesar de ter sido arrastado através da galáxia pela tempestade cósmica, o complexo orbital quase não sofreu avarias. Encontramos as áreas residenciais e comerciais do habitat quase em perfeitas condições. Não havia poeira nas superfícies ou outros sinais de ocupação, sugerindo que o lugar nunca foi usado.\n\nDentro do centro de controle, nos deparamos com uma interface confusa: discos sem explicações, alavancas com configurações inconsistentes e uma vasta quantidade de botões piscando nas mais diversas cores em intervalos aparentemente aleatórios. Felizmente, encontramos um manual. Estamos confiantes de que assim que terminarmos de traduzi-lo, poderemos reativar o habitat."
 cstorms.1280.name: "Comando Manual"
 cstorms.1280.desc: "Infelizmente, nossas estimativas iniciais foram otimistas: o manual se mostrou tão incompreensível quanto o sistema de controle. Metade das páginas parecia estar ausente e as instruções pictóricas fazem saltos semióticos consideráveis. A outra metade do manual está escrita em hieroglifos difíceis de interpretar.\n\nNo entanto, a última página mostrava uma frequência de comunicação acompanhada de um conjunto de caracteres traduzidos como \"suporte técnico\". Vamos tentar a frequência agora."
 cstorms.1285.name: "Sua Ligação é Importante para Nós"
 cstorms.1285.desc: "A frequência de comunicação do manual nos conectou ao mainframe de suporte técnico de uma entidade comercial chamada Skygarden.\n\nEm um tom de voz amistoso, mas neutro, a IA de assistência nos informou que aprecia o nosso contato e perguntou se há algo em que possa ajudar. Entre as opções listadas estavam \"perguntas sobre inscrições\", \"descobrindo a nova linha de sistemas de defesa inteligentes\" e se gostaríamos de saber mais sobre as \"iniciativas de responsabilidade social\" da corporação.\n\nNo entanto, as opções seguintes continuaram a nos direcionar para tópicos totalmente irrelevantes. O pior de tudo é que nossa equipe de [Root.Owner.GetEngineerPlural] ficava aguardando na linha apenas para ver a ligação cair. Obviamente, a IA de serviço não resistiu ao passar do tempo tão bem quanto o restante do habitat.\n\nMesmo assim, continuaremos tentando entender como funciona esse sistema místico."
 cstorms.1290.name: "Labirinto de Opções"
 cstorms.1290.desc: "Nossa equipe de [Root.Owner.GetEngineerPlural] relatou que, independentemente do que informam à IA, após vários menus o sistema simplesmente retorna a uma instrução anterior.\n\nTentamos executar diversas simulações para mapear as ramificações exatas de menus, mas nossos esforços resultaram em erros recursivos e na incapacidade de solucionar e verificar a solução ao mesmo tempo. Mesmo quando executamos um modelo quântico, não obtivemos resultados desejáveis. Suspeitamos que algumas funções de onda foram acidentalmente arruinadas no processo.\n\nEstamos completamente perdidos."
 cstorms.1290.a: "Diga para a IA ir §RCENSURADO§! e §RCENSURADO§!."
 cstorms.1290.b: "Permaneça na linha em silêncio."
 cstorms.1290.c: "Saia apertando todos os botões."
 cstorms.1295.name: "Seguindo o Protocolo"
 cstorms.1295.desc.a: "Finalmente um avanço! A IA nos advertiu pelo uso do linguajar impróprio e afirmou que deveríamos esperar até sermos contatados por um representante do atendimento ao cliente.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.b: "Finalmente um avanço! A IA ficou aparentemente confusa pelo nosso silêncio prolongado e vai nos passar para um representante do atendimento ao cliente.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.c: "Finalmente um avanço! A IA nos advertiu por termos abusado do painel de controle e afirmou que deveríamos esperar até sermos contatados por um representante do atendimento ao cliente.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.followup: "Ficamos esperando por algum tempo até que a linha fosse reaberta. A entidade do outro lado identificou-se como a arquivista da Corporação Skygarden. O suporte técnico era um programa de IA que ela tinha herdado da arquivista anterior. Até onde ela sabe, a estação de comunicações não era usada desde que a Skygarden declarou falência, há muitas décadas. Quando perguntamos por que continuava trabalhando para uma empresa quebrada, ela respondeu apenas que isso estava no contrato.\n\nApós explicarmos a situação, a arquivista encontrou um antigo guia de inicialização rápida do habitat. Estamos aguardando ela enviar as impressões digitalizadas das páginas."
 cstorms.1300.name: "Anos para Conquistar, Segundos para Perder"
 cstorms.1300.desc: "Com o novo guia, conseguimos reiniciar o habitat rapidamente.\n\nDepois que o ruído do maquinário que voltava à vida encerrou, nós decidimos fazer uma nova chamada para a arquivista e agradecê-la.\n\nEla nos contou que recuperou algumas informações sobre a estação. Aparentemente, o lugar foi construído há mais de cinco séculos como um protótipo, mas perdeu-se durante o caos astronômico resultante de uma tempestade cósmica especialmente potente. A perda da propriedade e dos custos de produção foram o suficiente para levar a Skygarden à bancarrota.\n\nO auxílio prestado a nós foi a primeira tarefa útil da arquivista em muitos anos.\n\n\"Além do mais\" disse ela, \"foi agradável ouvir a voz da minha tataravó outra vez, mesmo que fosse apenas uma IA.\""
 ### Repowered Complex
 site_repowered_complex: "Complexo Reenergizado"
 site_repowered_complex_intro: "Após a recente §Y$electric_storm$§!, um surto de energia inexplicável foi detectado sob a superfície de §H[From.Planet.GetName]§!. Análises detalhadas revelaram um antigo complexo subterrâneo cujos geradores de energia foram alimentados pela tempestade, reativando a instalação."
 cstorms.1845.name: "Entrada Fortificada"
 cstorms.1845.desc: "A entrada do complexo isolado em §H[From.Planet.GetName]§! é uma construção excepcionalmente robusta. Claramente feita para durar muito tempo, seu exterior é composto por um revestimento de blindagem pesada, escudos de radiação e uma matriz de sensores atmosféricos. §H[Leader.GetName]§! acredita que o lugar foi construído para suportar condições extremas.\n\nAs análises sugerem que uma enorme câmara subterrânea pode ser acessada através de várias portas de segurança trancadas."
 cstorms.1850.name: "Abrigo de Sobrevivência"
 cstorms.1850.desc: "Após obter acesso à parte principal do interior, §H[Leader.GetName]§! concluiu que descobrimos um abrigo de sobrevivência inutilizado, construído há muito tempo para uma espécie orgânica desconhecida.\n\nEle é equipado com diversos cômodos de habitação com cápsulas de sono, zonas de lazer e uma ala médica. Os armários de armazenamento em cada andar contêm grandes reservas de pacotes de nutrientes fechados, baterias e ferramentas. Tudo que foi encontrado nesse refúgio escondido está em condições impecáveis.\n\nUm último conjunto de portas de segurança permanece trancado. Acreditamos ser o caminho para a sala de comando da instalação."
 cstorms.1850.a: "Continue."
 cstorms.1855.name: "O Pacote de Luxo do Abrigo"
 cstorms.1855.desc: "A sala de comando do abrigo é equipada com uma impressionante matriz de monitores de §Y$default_storm$§!, alimentados pelos sensores atmosféricos da superfície. Após operarem no modo de espera, esses consoles contêm séculos de dados históricos de tempestades que podem aprimorar imensamente nossa compreensão da astrometeorologia.\n\n§H[Leader.GetName]§! também encontrou um holoprojetor pequeno e muito usado. Quando ativado, ele projeta uma figura moluscoide em 3D fazendo um discurso de vendas, apresentando os recursos principais do abrigo sob um logotipo corporativo.\n\nÉ impossível dizer se esse produto para sobrevivência encontrou um comprador, mas claramente, ele ficou inutilizado aqui por muitos anos."
 cstorms.1855.desc.megacorp: "Nossos departamentos de marketing já estão analisando o que deu errado."
 ###############################
 #### The Weather Manipulators #
 ###############################
 STORMS_PREC_WM_ONE: "Abrigo Antigo"
 STORMS_PREC_WM_ONE_DESC: "Identificamos inúmeras estruturas subterrâneas obscuras em [From.Planet.GetName] que parecem muito antigas. Deveríamos aproveitar a oportunidade para investigá-las."
 cstorms.105.name: "Os Abrigos Antigos"
 cstorms.105.desc: "O planeta [From.Planet.GetName], no sistema [From.GetStarName], é um mundo arruinado que aparenta conter os resquícios de um império esquecido pelo tempo. As estruturas subterrâneas que nos interessam são igualmente antigas, e estão relativamente intactas.\n\nAs imagens da ressonância do sonar revelaram uma complexa estrutura subterrânea de acomodações e abrigos capazes de resistir às forças da natureza. A destruição na superfície do planeta sem dúvida é resultado de tempestades cósmicas, fato que estaria em concordância com a existência do santuário.\n\nContudo, a quantidade de destroços torna difícil uma investigação mais profunda. Um sítio arqueológico poderia nos render mais informações."
 #arcsite The Ancient Storm Shelters
 site_weathermanipulators_the_ancient_storm_shelters: "Os Abrigos Antigos"
 site_weathermanipulators_the_ancient_storm_shelters_intro: "Um abrigo soterrado pelos destroços de um mundo devastado por tempestades. A destruição dificulta nossa investigação, mas o interior parece intacto."
 cstorms.110.name: "Do Pó à Devastação"
 cstorms.110.desc: "Quando nos aproximamos do abrigo pela superfície, avistamos uma pequena abertura sob duas torres caídas, através da qual pudemos identificar o brilho fraco de máquinas ativas.\n\nA abertura atua como um ponto central para nossa equipe de [Root.Owner.GetScientistPlural] mapear o tamanho do complexo e, possivelmente, encontrar uma forma de abri-la sem pôr em risco a delicada integridade estrutural.\n\nAs ruínas que cobrem esse local exibem todas as marcas de danos causados por tempestades cósmicas. Curiosamente, não há indícios de que os habitantes da cidade tenham tentado se proteger.\n\nAo que parece, eles suportaram as intempéries pelo máximo de tempo possível, apenas para serem evacuados às pressas. Talvez possamos encontrar respostas sob a superfície arruinada de [From.Planet.GetName]."
 cstorms.110.a: "Entendido."
 cstorms.115.name: "Debaixo das Torres"
 cstorms.115.desc: "Após limparmos várias camadas de destroços e poeira, a abertura sob as torres ficou grande o bastante para que nossa equipe de [Root.Owner.GetScientistPlural] entrasse no abrigo.\n\nO santuário é simples e prático, com diversos cômodos conjugados e quase sempre vazios. Na verdade, parece simples até demais. Sem dúvida aparenta ser algum tipo de abrigo, mas não seria capaz de resistir às tempestades cósmicas. As paredes são muito finas, fornecendo pouca proteção, e o teto e o piso não são reforçados. Sua existência hoje deve-se apenas à pura sorte. Não fossem as duas torres acima e o desabamento que moveu o complexo de uma só vez, este \"abrigo\" de tempestade teria sido erradicado há muito tempo.\n\nO brilho que vimos de fora era emitido por alguns sistemas de alarme com defeito, e vários terminais de operações podem ser avistados mais a fundo no abrigo. Esta pode ser uma grande oportunidade para descobrirmos mais a respeito dos antigos donos desta instalação, bem como das circunstâncias peculiares que atuaram aqui."
 cstorms.120.name: "Transcrições Desgastadas"
 cstorms.120.desc: "Os terminais eram mais difíceis de alcançar do que tínhamos antecipado e estavam parcialmente obstruídos por desabamentos. Parte do entulho era mais recente, indicando uma falha crítica na estrutura do abrigo agora que ele foi perturbado. Recomendamos cautela.\n\nInfelizmente, os antigos processadores de dados não revelaram seus segredos facilmente. Tudo foi arquivado em um idioma perdido, mas os registros de comunicações intergalácticas deixados na interface podem fornecer alguma ajuda. Ao combiná-los com as mídias físicas abandonadas ao redor do abrigo, podemos elaborar uma tradução inicial. Além disso, ainda há mais cômodos a serem investigados, desde que o abrigo não desmorone."
 cstorms.120.a: "Prossiga com cuidado."
 cstorms.120.b: "Podemos acelerar o trabalho."
 cstorms.120.c: "Depressa. Deixe o resto para trás."
 cstorms.125.name: "Seguro de Ativos"
 cstorms.125.desc: "Os cômodos e câmaras localizados mais abaixo não estão tão desocupados quanto a entrada. Caixas de mercadorias preenchem o espaço de cima a baixo, todas perfeitamente embaladas e empilhadas. Traduções iniciais descrevem materiais não processados e componentes elétricos inacabados, nenhum deles essencial à sobrevivência. A lista também detalha as quantidades dos itens no local e a projeção de lucros que teriam gerado para algo chamado RICI, ou Rede Intergaláctica de Comércio Igualitário.\n\nA linguagem usada na extensa negociação comercial é quase extasiante, com anotações meticulosas nas transações e índices discriminados de lucros. Aliás, parece que essa civilização perdida baseou seu nome na mesma transação, se intitulando Comerciantes Ricianos.\n\nEste abrigo não foi construído para proteger a população, mas sim como um armazém de luxo. Isso levanta a questão: por que os abrigos estavam tão mal equipados para enfrentar as tempestades?\n\nNovas traduções devem revelar mais informações, mas nosso tempo está se esgotando – fato evidenciado pelos rangidos inquietantes da infraestrutura."
 cstorms.125.a: "Tenha cuidado aí embaixo."
 cstorms.125.b: "Priorize a recuperação de dados."
 cstorms.125.c: "Podemos ajudar na investigação."
 cstorms.130.name: "Maquinações do Mercado"
 cstorms.130.desc: "Os rangidos e estalos estão mais intensos. Mesmo assim, os esforços de tradução continuam dentro do abrigo em [From.Planet.GetName]. Embora as mercadorias armazenadas não tenham revelado informações relevantes, os terminais ativos tinham muito a dizer.\n\nUm conjunto de coordenadas embaralhadas aponta para a localização de um dispositivo de \"grande poder\" em um planeta vizinho. Pelo que pudemos compreender, esse dispositivo tem a capacidade de \"manipular\" uma tempestade cósmica, algo extraordinário se for verdade.\n\nNo entanto, com a estabilidade do abrigo fraquejando e após termos enviado uma cópia das coordenadas para nossa nave em órbita, nós evacuamos o sítio. Muitas perguntas permanecem sem resposta, mas a busca continua."
 cstorms.130.a: "Uma oportunidade boa demais para ser ignorada."
 #Special Project Descramble the Coordinates
 INETIAN_PROJECTS_01: "Decifrar as Coordenadas"
 INETIAN_PROJECTS_01_DESC: "Um conjunto de coordenadas foi recuperado de [wm_storm_shelter_planet.GetName] antes que o abrigo desmoronasse. Temos razões para acreditar que uma delas pode nos levar a uma máquina que os Comerciantes Ricianos usavam para manipular tempestades cósmicas. Uma tecnologia assim poderia compensar os custos para encontrá-la."
 #Special project completed
 cstorms.135.name: "Sistema Abundante"
 cstorms.135.desc: "Por sorte, nossa equipe de [Root.Owner.GetScientistPlural] conseguiu escapar com um conjunto de coordenadas embaralhadas antes que o abrigo em [wm_storm_shelter_planet.GetName] desmoronasse. Esses dados foram restaurados e resultaram em três localizações para explorarmos:\n\n[wm_digsite_A.GetName], [wm_digsite_B.GetName] e [wm_digsite_C.GetName]. Análises posteriores indicam que cada planeta tinha uma função essencial na rede dos Comerciantes Ricianos, a ponto de serem registrados no abrigo em [wm_storm_shelter_planet.GetName]."
 #Precursors Event Chain
 cs_inetian_chain_title: "Precursores - Os Comerciantes Ricianos"
 cs_inetian_chain_desc: "Encontramos os restos de um antigo abrigo pertencente a uma civilização que prosperou há milhões de anos; uma civilização ausente de todos os nossos registros, como se tivesse sido meticulosamente apagada da história. Se investigarmos, poderemos descobrir o motivo."
 #Arcsite Coordinates A
 site_weathermanipulators_CoordinatesA_Residential_Planet: "Coordenadas A: Planeta Colonizado"
 site_weathermanipulators_CoordinatesA_Residential_Planet_intro: "Uma das três coordenadas encontradas no antigo abrigo de tempestades nos levou a [From.Planet.GetName]. Considerando a extensão das ruínas, está claro que este planeta já abrigou inúmeros centros urbanos. Aqui é possivelmente onde os cidadãos dos Comerciantes Ricianos viviam, há muitas eras. Precisamos investigar por que essas coordenadas foram registradas em um abrigo de tempestades."
 cstorms.140.name: "Intenção Religiosa"
 cstorms.140.desc: "Pouco resta das cidades em [From.Planet.GetName]. Além da passagem do tempo, muitas das estruturas impressionantes que marcam a paisagem foram devastadas por tempestades. As poucas características arquitetônicas preservadas correspondem ao que vimos em [wm_storm_shelter_planet.GetName], especialmente a clara falta de preparação contra desastres apesar da ampla evidência da brutalidade das tempestades. Será difícil encontrar algo útil em meio à destruição, mas com sorte, não será uma tarefa impossível.\n\nNossa equipe de [Root.Owner.GetScientistPlural] determinou três pontos de interesse próximos ao local de aterrissagem: um edifício público relativamente intacto, um tipo de templo e uma grande praça central. Todos parecem locais promissores para continuarmos nossa busca pelos segredos dos Comerciantes Ricianos."
 cstorms.145.name: "Epicentro Econômico"
 cstorms.145.desc: "Diversas equipes foram enviadas para investigar os três locais mais promissores. Embora o edifício e a praça pública sejam exemplos interessantes em termos culturais e arquitetônicos, apenas a casa de reverência era particularmente notável.\n\nSua fachada arruinada ocultava um salão cavernoso. Dentro dele, 521 terminais de computação estavam arranjados em círculos concêntricos, e no centro exato havia um impressionante – e totalmente operacional – modelo deste sistema estelar. Nanocomponentes sensíveis dentro do modelo estão sintonizados aos campos eletromagnéticos do planeta. Apesar de sua idade formidável, o modelo permanece uma representação precisa dos corpos celestes deste sistema.\n\nAlém disso, ao longo de sua base circular há uma interface visível de todos os terminais. Gravada nos elementos pictóricos da interface está uma lista de entidades corporativas e valores de ações. Este não era um lugar de devoção religiosa, mas um hub comercial e bolsa de valores da RICI.\n\nEstá claro que este edifício já abrigou dados importantes. Temos que encontrá-los."
 cstorms.145.a: "Vasculhem o lugar de cima a baixo."
 cstorms.150.name: "Livro de Referências"
 cstorms.150.intro: "Após uma investigação mais minuciosa, ficou evidente que o hub comercial em [From.Planet.GetName] foi completamente esvaziado. Os terminais estão inoperantes, e além da imagem gravada na interface do modelo, não pudemos encontrar mais informações sobre as transações.\n\nContudo, uma unidade de armazenamento escondida em um canto do salão continha o que parecem ser manuais de usuário. Com as referências da tradução rudimentar elaborada durante nossa escavação em [wm_storm_shelter_planet.GetName], fizemos uma interpretação superficial dos manuais.\n\nHá informações sobre a operação dos terminais, sobre a sintonização do modelo do sistema e sobre a assistência para uma máquina chamada Depressor de Perturbações Setoriais. Os detalhes acerca de como operar, direcionar e ativar essa máquina são claros.\n\nEsse deve ser o dispositivo mencionado no antigo abrigo de tempestades e o alvo de nossa busca."
 cstorms.150.outro: "estamos a um passo de compreender as intenções dos Comerciantes Ricianos e de talvez dominarmos o poder dessa máquina."
 cstorms.150.desc.a: "$cstorms.150.intro$ Isso significa que $cstorms.150.outro$"
 cstorms.150.desc.b: "$cstorms.150.intro$ O manual se refere a um dos componentes que encontramos em [wm_digsite_B.GetName] e explica como instalá-lo. Isso significa que $cstorms.150.outro$"
 cstorms.150.desc.c: "$cstorms.150.intro$ O manual se refere à máquina encontrada em [wm_digsite_C.GetName], mas ainda falta um componente crítico. Mesmo assim, $cstorms.150.outro$"
 cstorms.150.desc.d: "$cstorms.150.intro$ O manual se refere à máquina encontrada em [wm_digsite_C.GetName] e explica como instalar a peça de [wm_digsite_B.GetName]. Este é o último passo para ativarmos o Depressor de Perturbações Setoriais, e então dominarmos o seu poder!"
 cstorms.150.a: "Prossiga."
 #Arcsite Coordinates B
 site_weathermanipulators_CoordinatesB_Industrial_Planet: "Coordenadas B: Planeta Industrial"
 site_weathermanipulators_CoordinatesB_Industrial_Planet_intro: "Uma das três coordenadas encontradas no antigo abrigo de tempestades nos levou a [From.Planet.GetName], um mundo industrial do império dos Comerciantes Ricianos. Com base na arquitetura existente, está claro que este não era um planeta residencial. Contudo, ainda não sabemos exatamente o que seu poderio industrial estava destinado a produzir."
 cstorms.155.name: "Eficiência Industrial"
 cstorms.155.desc: "Era difícil enxergar a superfície de [From.Planet.GetName] através da poluição que ainda envolvia suas fábricas. Boa parte da face do planeta havia sido devastada por tempestades cósmicas, deixando grandes fissuras no cenário industrial homogêneo. Uma dessas aberturas apresenta uma oportunidade perfeita para pousarmos nossa nave.\n\nNão há indícios de que as instalações de produção tenham sido desmontadas. Elas foram apenas abandonadas, e muitas ainda contêm materiais de produção. Ao analisá-los, poderemos compreender melhor o propósito que este planeta desempenhava dentro da infraestrutura da antiga civilização mercantil. Também poderemos aprender mais sobre a célebre máquina mencionada em [wm_storm_shelter_planet.GetName]."
 cstorms.160.name: "Transporte Crítico"
 cstorms.160.desc: "Análises iniciais dos materiais fabris usados em [From.Planet.GetName] sugerem uma constituição altamente volátil. Esses produtos eram parte de um processo maior, e não deveriam ser usados isoladamente. As substâncias eram transportadas por meio de um sistema de esteiras em direção a um depósito de coleta centralizado.\n\nPelas marcas de queimado no entorno, está claro que este depósito era usado constantemente para o transporte interplanetário. A questão é para onde os produtos eram levados. Considerando a natureza explosiva da carga, não poderia ser um destino distante.\n\nPor perto, encontramos várias caixas para transporte. Um grande esforço foi claramente realizado para armazenar de forma segura o conteúdo, a julgar pelos resquícios das etiquetas de aviso impressas nas laterais. Apenas uma palavra ainda está legível: \"Crítico\"."
 cstorms.165.name: "Elo Perdido"
 cstorms.165.intro: "Nossa equipe de [Root.Owner.GetScientistPlural] desmontou rapidamente as caixas precariamente armazenadas.\n\nDurante a abertura da primeira caixa, um forte sibilo indicou a presença de uma câmara de climatização, provocando um temor momentâneo de que o conteúdo pudesse se desestabilizar. Felizmente, a carga permaneceu intacta.\n\nUma inspeção mais próxima revelou um componente maquinário primorosamente confeccionado e armazenado com cuidado, dentro do qual havia certa quantidade do material volátil produzido na fábrica."
 cstorms.165.outro: "\n\nPortanto, levaremos a peça a bordo para novos estudos. Nossa equipe de [Root.Owner.GetScientistPlural] não deveria passar mais tempo na superfície inóspita de [From.Planet.GetName] além do necessário."
 cstorms.165.desc.a: "$cstorms.165.intro$\n\nUma etiqueta de transporte na lateral da caixa faz referência a algo chamado \"Depressores de Perturbações Setoriais\". Nossa equipe de [Root.Owner.GetScientistPlural] não sabe ao certo o que isso significa, mas levando em conta o contêiner robusto de armazenagem e os avisos colados no exterior da caixa, deve ser algo importante.$cstorms.165.outro$" #A & C sites not yet visited
 cstorms.165.desc.b: "$cstorms.165.intro$\n\nA peça imediatamente pareceu familiar e a tripulação apanhou o manual encontrado em [wm_digsite_A.GetName] para fazer uma comparação. O objeto minuciosamente confeccionado dentro da caixa é um componente essencial dos Depressores de Perturbações Setoriais.$cstorms.165.outro$" #A site visited & C site not visited
 cstorms.165.desc.c: "$cstorms.165.intro$\n\nO núcleo de formato singular e preenchido de líquido sugere que essa deve ser a peça necessária para concluir a instalação em [wm_digsite_C.GetName]. A substância no interior deve ser usada para energizar os Depressores de Perturbações Setoriais. No entanto, conhecimentos específicos parecem necessários para uma instalação segura.$cstorms.165.outro$" #A site not visited & C site visited
 cstorms.165.desc.d: "$cstorms.165.intro$\n\nA peça aparenta ser a parte ausente dos Depressores de Perturbações Setoriais em [wm_digsite_C.GetName]. Com o manual encontrado em [wm_digsite_A.GetName], seremos capazes de fazer a instalação e talvez ativá-los.$cstorms.165.outro$" #A & C sites visited
 cstorms.165.a: "Um trabalho bem feito."
 #Arcsite Coordinates C
 site_weathermanipulators_CoordinatesC_Barren_Planet: "Coordenadas C: Planeta Inóspito"
 site_weathermanipulators_CoordinatesC_Barren_Planet_intro: "Uma das três coordenadas encontradas no antigo abrigo de tempestades nos levou a [From.Planet.GetName]. Sua superfície apresenta pouco além de neve e poeira, mas análises iniciais revelaram que o planeta já foi habitável. Teria sido ele importante para os Comerciantes Ricianos antes ou depois de sua ruína?"
 cstorms.170.name: "Infindável e Implacável"
 cstorms.170.desc: "Nevascas intermináveis assolam a superfície de [From.Planet.GetName]. Como se não bastasse, a paisagem coberta de neve escondia uma estranha surpresa.\n\nCamadas e mais camadas de poeira nos esperavam sob a neve. Entre elas foram encontradas evidências das formas de vida que uma vez habitaram este mundo. Todas foram sepultadas ao mesmo tempo, indicando um evento de extinção em massa singular. O colapso dos ecossistemas de [From.Planet.GetName] deve ter provocado o enfraquecimento da atmosfera, acarretando uma era do gelo que transformou o planeta em um deserto gelado.\n\nDeve haver algo mais aqui além de cascalho e gelo, mas está claro que não encontraremos respostas na superfície. Nossa equipe de [Root.Owner.GetScientistPlural] recomenda uma escavação profunda."
 cstorms.170.a: "Comece a perfurar."
 cstorms.171.name: "Raízes da Vida"
 cstorms.171.desc: "Equipada com trajes de proteção e máquinas resistentes ao frio, nossa equipe de [Root.Owner.GetScientistPlural] realizou facilmente o processo tedioso, porém simples de remover a neve e as finas camadas de poeira. Logo, estranhos padrões foram descobertos, uma série de fendas espalhadas como raízes e cobrindo uma vasta porção do território.\n\nDentro dessas valas encontramos os restos dessecados de incontáveis tipos de organismos; o que quer que estivesse na superfície, desde vegetação até vida selvagem. De algum modo, as valas maceraram os seres orgânicos esmagando-os contra suas paredes rochosas, extraindo quaisquer nutrientes importantes e os transportando até um ponto de convergência, um processo não muito diferente da digestão. O pó que expeliam de volta agora cobre a maior parte das paisagens de [From.Planet.GetName].\n\nIsso levanta a questão sobre quem, ou o que essas valas estavam alimentando."
 cstorms.171.a: "Encontre a origem."
 cstorms.172.name: "Máquinas de Antigamente"
 cstorms.172.intro: "A rede de valas subterrâneas é vasta. Quanto mais nossa equipe de [Root.Owner.GetScientistPlural] avançava, mais concentrados ficavam esses dutos. Todos eles convergiam para uma das últimas montanhas em [From.Planet.GetName]. Sobre o cume está um planalto distintamente artificial, com três grandes máquinas posicionadas equidistantes uma da outra. Elas parecem ter origem riciana, pois está marcada com o idioma deles e seu formato é consistente com o que sabemos sobre sua sociedade. Apesar da idade avançada e dos ventos extremos que varrem o planalto, elas permanecem em excelente estado."
 cstorms.172.outro: "\n\nSeja como for, encontramos o que estávamos procurando. Estamos agora à beira de uma descoberta extraordinária."
 cstorms.172.desc.a: "$cstorms.172.intro$ Essas devem ser as máquinas mencionadas em [wm_storm_shelter_planet.GetName]. Infelizmente, não temos o conhecimento necessário para entender as complexas operações internas desses dispositivos. Além disso, há componentes claramente ausentes no painel de controle descoberto na base de uma dessas máquinas. Gravadas em uma pequena placa estão as palavras \"Depressores de Perturbações Setoriais\".\n\nSe encontrarmos um modo de ativar as máquinas, poderemos enfim descobrir seu propósito. Para isso teremos que explorar as outras coordenadas. $cstorms.172.outro$" #A&B not visited
 cstorms.172.desc.b: "$cstorms.172.intro$ \n\nO esquema que observamos no manual encontrado em [wm_digsite_A.GetName] parece corresponder aos instrumentos à nossa frente, indicando que esses sãos os Depressores de Perturbações Setoriais, e que essa é a máquina para a instalação mencionada no abrigo de tempestades em [wm_storm_shelter_planet.GetName].\n\nO manual indica que essas máquinas precisam de um painel de controle para serem operadas. Nossa equipe de [Root.Owner.GetScientistPlural] o encontrou na base de um dos dispositivos, mas parece que uma peça vital está ausente. Mas ainda temos um conjunto de coordenadas para explorar que poderia potencialmente conter a solução para esse problema. $cstorms.172.outro$" #A visited & B not visited
 cstorms.172.desc.c: "$cstorms.172.intro$ \n\nEssas devem ser as máquinas mencionadas em [wm_storm_shelter_planet.GetName], chamadas de Depressores de Perturbações Setoriais! Além disso, a peça que encontramos em [wm_digsite_B.GetName] encaixou perfeitamente em um espaço do painel de controle na base de uma das máquinas.\n\nContudo, qualquer tentativa de reparo será arriscada se levarmos em conta a idade dos componentes. Nossa equipe de [Root.Owner.GetScientistPlural] recomenda que busquemos mais informações antes de agir. $cstorms.172.outro$" #A not visited & B visited
 cstorms.172.desc.d: "$cstorms.172.intro$ \n\nEssas são, sem dúvida, as máquinas mencionadas em [wm_storm_shelter_planet.GetName], bem como os objetos descritos no manual que encontramos em [wm_digsite_A.GetName], conhecidas como Depressores de Perturbações Setoriais. Só nos resta agora instalar a peça que encontramos em [wm_digsite_B.GetName] e esperar que as máquinas ainda estejam funcionais. Só então poderemos descobrir seu propósito. $cstorms.172.outro$" #A&B visited
 cstorms.172.a: "Hora de descobrir o que essas máquinas podem fazer." #Finished sites A and B
 cstorms.172.b: "Ainda não." #Did not finish sites A and B
 #Special Project 2
 INETIAN_PROJECTS_02: "O Sentido da Máquina"
 INETIAN_PROJECTS_02_DESC: "As três coordenadas de [wm_storm_shelter_planet.GetName] completaram o antigo quebra-cabeça. Só nos resta agora ativar os Depressores de Perturbações Setoriais e descobrir seu propósito."
 cstorms.176.name: "O Sentido da Máquina"
 cstorms.176.desc: "Com a última peça do quebra-cabeça, nossa equipe de [Root.Owner.GetScientistPlural] começou a trabalhar. O componente de [wm_digsite_B.GetName] encaixou perfeitamente no painel de controle. Usando o manual de [wm_digsite_A.GetName], conseguimos instalá-lo corretamente. Após todo o processo, as máquinas voltaram a funcionar de repente.\n\nVibrações estrondosas sacudiram a poeira e a neve sobre o planalto. Com o estalo de um relâmpago, um membro de nossa equipe científica foi instantaneamente vaporizado. Onde antes havia um corpo, uma espiral de poeira foi rapidamente sugada pelas valas em direção aos Depressores de Perturbações Setoriais.\n\nIsso explica o que aconteceu em [wm_digsite_C.GetName]: as valas que levam à base das máquinas são linhas de abastecimento que extraem a matéria biológica dos arredores. O resultado é uma trilha de destruição que cruza o planeta.\n\nOs Depressores de Perturbações Setoriais estão agora totalmente funcionais. Há energia apenas para uma ativação. Só nos resta apertar um botão."
 cstorms.176.a: "Ative a máquina."
 cstorms.176.b: "Não aperte esse botão."
 #Delayed Event 1
 cstorms.180.name: "Restos Redescobertos"
 cstorms.180.desc: "Depois que descobrimos o segredo dos Depressores de Perturbações Setoriais, as pistas sobre o destino dos Comerciantes Ricianos esfriaram. Contudo, uma reavaliação minuciosa dos dados forneceram novas informações.\n\nRegistros de transações de [wm_digsite_A.GetName] mostram que esse povo tinha fortes convicções igualitárias. Tal conclusão é corroborada pelo alto padrão de vida e instalações luxuosas que ainda restam no planeta: com poucas variações, todos os cidadãos partilhavam do mesmo conforto e oportunidades, independentemente de profissão, status social ou linhagem.\n\nEm [wm_digsite_B.GetName], encontramos índices detalhando o caso de uso de cada uma das fábricas: eram todas parte de uma cadeia de produção muito maior, destinada a fornecer ao império todos os meios necessários para a manutenção do seu estilo de vida extravagante. A distribuição equivalente desses benefícios exigia uma quantidade exorbitante de materiais e alimentos para o consumo, produzidos em ritmo acelerado.\n\nOs Depressores de Perturbações Setoriais reparados em [wm_digsite_C.GetName] forneceram mais algumas informações antes de serem desativados definitivamente. Embora seu real propósito permaneça um mistério, um sinal digital rastreável foi recuperado. As máquinas não visavam uma entidade com livre mobilidade.\n\nNossa equipe de [Root.Owner.GetScientistPlural] recomenda que vasculhemos os setores próximos em busca de um sinal correspondente."
 cstorms.180.a: "Vamos encontrar essa entidade."
 #Digsite 5
 site_weathermanipulators_storm_formation: "Origens dos Predominantes"
 site_weathermanipulators_storm_formation_intro: "Um sinal digital estava armazenado dentro do painel de comando dos Depressores de Perturbações Setoriais. Com esforço, conseguimos clonar seu padrão e buscar uma correspondência na galáxia. A trilha nos levou a um planeta desabitado. Chegou a hora de descobrir qual era o alvo dos Comerciantes Ricianos, e por quê."
 cstorms.181.name: "Planícies Banais"
 cstorms.181.desc: "À primeira vista, nada em [From.Planet.GetName] parece notável. Um planeta como centenas de outros espalhados pela galáxia. Também não há nenhum indício da origem do sinal. Nenhum transmissor ou equipamento tecnológico potente o bastante para ter seu sinal captado a muitos sistemas de distância foi encontrado.\n\nA busca continua."
 cstorms.182.name: "Catástrofe Concentrada"
 cstorms.182.desc: "Logo após pousarmos na superfície, descobrimos que o sinal perde ou ganha intensidade de acordo com a nossa posição. Seguindo esse simples padrão, chegamos a uma enorme cordilheira na porção mais distante do planeta.\n\nÀ medida que nos aproximávamos das montanhas, a paisagem ficava cada vez mais arrasada e inóspita, como se uma força devastadora tivesse se abatido sobre esta parte do mundo. A partir do padrão de destruição, acreditamos que este lugar foi em algum momento assolado por uma tempestade de poeira cósmica. Contudo, se for o caso, todo planeta também deveria ter sido afetado. Nunca antes encontramos uma tempestade cuja destruição concentrava-se tanto assim. Para saber mais, teremos que escalar os cumes imponentes."
 cstorms.183.name: "Energia Fugaz"
 cstorms.183.desc: "A cordilheira devastada consistia de muitos cumes e vales, mas uma cratera de formato peculiar logo chamou a nossa atenção. As paredes do fosso eram lisas e vários círculos concêntricos foram gravados na base do centro.\n\nÀ medida que descíamos pela cratera, começamos a sentir a forte atração de uma força desconhecida, cuja origem era sem sombra de dúvida o ponto de origem do círculo. Filamentos oscilantes de energia emanavam dos anéis, alguns tão altos que desapareciam acima da atmosfera do planeta. Esta é a origem do sinal.\n\nNossa equipe de [Root.Owner.GetScientistPlural] recomenda uma análise da cratera e de suas flutuações energéticas para que possamos entender melhor o que aconteceu aqui."
 cstorms.184.name: " Início Incerto"
 cstorms.184.desc: "Com base em dados ambientais e simulações detalhadas, podemos concluir com segurança que uma tempestade de poeira celestial cruzou estas montanhas. Na verdade, ela se formou neste ponto! Quanto ao fato de ela não ter envolvido todo o planeta, nossa melhor hipótese é que era simplesmente pequena demais – as análises mostram uma tempestade com uma fração do tamanho de tempestades típicas.\n\nConsiderando o fato de que os Comerciantes Ricianos se referiam aos Depressores de Perturbações Setoriais como um \"dispositivo de manipulação\", e que o sinal energético dessa tempestade em particular está armazenado no banco de dados deles, parece claro que estavam tentando controlar a tempestade cósmica. Ao calcular o trajeto que ela seguiu após deixar este lugar, poderemos aprender muito."
 cstorms.184.a: "Vamos em frente."
 #Special Project 3
 INETIAN_PROJECTS_03: "Rastreando os Comerciantes"
 INETIAN_PROJECTS_03_DESC: "Encontramos o ponto de formação de uma antiga tempestade de poeira celestial, mas evidências sugerem que ela tenha sido bem menor que uma tempestade típica. Considerando seu tamanho, é curioso o fato de os Comerciantes Ricianos terem sentido a necessidade de controlar a tempestade usando os Depressores de Perturbações Setoriais.\n\nSe rastrearmos o trajeto da tempestade, poderemos descobrir por que eles investiram tanto tempo nesse projeto."
 cstorms.186.name: "Rastreando os Comerciantes"
 cstorms.186.desc: "Rastrear o trajeto da tempestade de poeira celestial mostrou-se mais complexo do que pensávamos. Apenas a alguns sistemas do seu ponto de origem, algo drástico aconteceu com sua força, tamanho e trajeto. Nossa equipe de [Root.Owner.GetScientistPlural] suspeita que neste ponto a tempestade foi atingida pelos Depressores de Perturbações Setoriais, alterando seu equilíbrio e poluindo o vórtice interior com os restos pulverizados das formas de vida varridas da superfície de [wm_digsite_C.GetName].\n\nEnquanto a tempestade continuava a cruzar a galáxia, ela envolveu vários sistemas com resultados devastadores.\n\nTudo isso com a intenção de alterar o curso de uma pequena perturbação para longe de um sistema específico... O sensores detectaram a presença de uma estação espacial abandonada naquele sistema. Para proteger o lugar, os Comerciantes Ricianos desencadearam inúmeros eventos de extinção em massa.\n\nA estação talvez não seja o mundo capital que estamos procurando, mas para justificar medidas tão drásticas, ela deve ser igualmente importante."
 cstorms.186.a: "Trace um curso."
 #Digsite 6
 site_weathermanipulators_last_shelter: "Antes da Queda"
 site_weathermanipulators_last_shelter_intro: "Os Comerciantes Ricianos tentaram proteger uma estação espacial dentro deste sistema de uma pequena tempestade de poeira celestial. Como consequência, a tempestade cresceu ao ponto de destruir vários outros de seus sistemas. Por que eles estavam tão desesperados para proteger a instalação?"
 cstorms.190.name: "Órbita Estável"
 cstorms.190.desc: "A estação espacial que orbita [From.Planet.GetName] é muito maior do que imaginávamos. Ela aparenta ser mais que apenas uma estação, dispondo de instrumentos de pesquisa, sistemas de suporte à vida sofisticados e extensos sensores de espaço profundo. Isso indica que a instalação era usada mais como uma colônia duradoura do que como um ponto de rota.\n\nPorém, o seu estado é deplorável. O casco foi danificado, causando uma descompressão catastrófica que explodiu diversos setores. Ainda não está claro se os danos foram causados a partir do exterior ou do interior. Felizmente, o controle de órbita e o eixo de estabilização continuam funcionais, o que explica por que a estrutura não foi atraída pela estrela ou não começou a girar descontroladamente.\n\nSerá difícil entrar sem desestabilizar esse equilíbrio delicado."
 cstorms.191.name: "Pressão Impressionante"
 cstorms.191.desc: "Para entrarmos na estação no sistema [This.System.GetName], tivemos que abrir à força uma câmara de vácuo intacta sem causar mais implosões. O interior ainda estava pressurizado, simulando perfeitamente uma atmosfera planetária típica apesar de sua idade avançada.\n\nLevamos vários dias para estabelecer um acoplamento perfeito entre a nossa nave e a estação, capaz de equalizar meticulosamente a pressão do ar. Enfim, conseguimos abrir a porta com segurança. Infelizmente, nos deparamos com um novo obstáculo: um corredor bloqueado por vigas retorcidas e entulho resultante da despressurização dos arredores. Precisaremos de mais tempo para prosseguir."
 cstorms.192.name: "Túmulo Interior"
 cstorms.192.desc: "Após abrirmos caminho, começamos a explorar a estação em busca de respostas.\n\nUm investigação detalhada revelou que a estação não foi construída para observar o cosmo, mas para proteger alguma coisa, pois muitos de seus equipamentos elaborados de análise estavam apontados para o interior. Diversos pertences dos Comerciantes Ricianos foram encontrados, assim como registros descrevendo o cotidiano da estação. Eles falam de uma carga importante armazenada em uma câmara bem protegida, em algum lugar da base. Embora não tenha sido difícil de encontrar, o local era na verdade um túmulo.\n\nRestos dessecados e em estado de quase mumificação ocupavam o espaço, cada um pertencente a um membro do império dos Comerciantes Ricianos. A julgar pelas posições corriqueiras, eles não resistiram. Simplesmente sentaram-se para esperar pela morte. O que aconteceu aqui?"
 cstorms.193.name: "Soberba"
 cstorms.193.desc: "A carga como descrita pelos cidadãos estava posicionada diretamente no centro do cômodo. Um dispositivo singular, e aparentemente nunca utilizado. Sua origem é definitivamente riciana, embora seja mais avançado que qualquer outra coisa que tenhamos encontrado.\n\nTerminais ao redor do objeto exibem alguns parágrafos do mesmo texto repetidamente. A tradução foi rápida:\n\n§LQuerido Visitante, se estiver lendo isto, você é testemunha de nossa soberba. Em nossa nobre busca pela igualdade, esquecemo-nos dos verdadeiros equalizadores: a criação e a destruição.\n\nProcurando livrar nossas rotas comerciais da fúria das tempestades cósmicas, nós adulteramos a natureza. O que antes eram pequenas perturbações ganharam uma força descomunal. As tempestades cósmicas devastaram nossos mundos. Não foi obra do acaso, mas vingança. Buscamos refúgio nesta estação. Era a nossa última defesa, pois nosso tempo havia acabado. Embora não usássemos mais os depressores, novas tempestades se formaram, maiores e mais violentas. Nossa última missão era clara.\n\nTrabalhamos incansavelmente para concluir esta máquina para você, Visitante. Ela lhe salvará das tempestades cósmicas sem enfurecê-las ainda mais. Nosso fim é a nossa absolvição, mas essa não precisa ser a sua sina.§!\n\nDentro desta sala, os Comerciantes Ricianos selaram seu destino. A generosidade deles era tão grande quanto a negligência. Deixamos a estação e retornamos com o presente de despedida que nos deixaram."
 cstorms.193.a: "Que descansem em paz."
 cstorms.193.b: "Um destino apropriado para um povo tolo."
 #Artifact action
 artifact_inetian_research: "Segredos dos Comerciantes Ricianos"
 artifact_inetian_research_desc: "Aprofunde-se nos segredos dos Comerciantes Ricianos."
 artifact_inetian_research_completed: "$artifact_inetian_research$"
 artifact_inetian_research_completed_desc: "Usamos o conhecimento antigo dos Comerciantes Ricianos para nossos próprios fins."
 INETIAN_PROJECTS_04: "Aprofunde-se nos Segredos dos Comerciantes Ricianos"
 INETIAN_PROJECTS_04_DESC: "Após a descoberta do local de descanso final dos Comerciantes Ricianos, ainda temos muito o que entender sobre seu vasto império. Gostaríamos de investigá-los mais uma vez."
 cstorms.195.name: "Aprofunde-se nos Segredos dos Comerciantes Ricianos"
 cstorms.195.desc: "O local de descanso final dos Comerciantes Ricianos era uma estação espacial de alta tecnologia, construída como um refúgio contra as terríveis tempestades cósmicas que eles mesmos haviam criado. Este habitat único é o ápice da tecnologia riciana, com sistemas de habitabilidade e proteção formidáveis; mas nem mesmo isso foi capaz de salvá-los.\n\nAssim, embora não seja mais seguro habitar a estação devido a milênios de decadência, nossa equipe de [Root.Owner.GetScientistPlural] obteve uma profusão de conhecimentos de seus sistemas. Também foram encontradas as rotas comerciais mais importantes dos Comerciantes Ricianos em um banco de dados, além de protótipos de máquinas para um controle climático mais eficiente e menos destrutivo, deixados sobre uma bancada.\n\nParece que pelos menos parte da tenacidade dos Comerciantes Ricianos prevaleceu e continuará nos ajudando a enfrentar essas tempestades."
 secrets_of_the_inetian_traders: "Segredos dos Comerciantes Ricianos"
 secrets_of_the_inetian_traders_hive_mach: "Segredos dos Comerciantes Ricianos"
 secrets_of_the_inetian_traders_desc: "Mais uma vez o conhecimento antigo dos Comerciantes Ricianos nos ajudou. Nossa taxa de mercado foi reduzida graças à influência deles."
 secrets_of_the_inetian_traders_hive_mach_desc: "Mais uma vez os dados preservados dos Comerciantes Ricianos ajudaram o coletivo. As reduções da taxa de mercado estão em vigor."
 #Hyperlane Detailer - Secrets Of Inetian Traders Reward
 sm_hyperlane_detailer: "Esmiuçador de Hiperestradas"
 NAME_inetian: "Comerciantes Ricianos"
 ###########################################
 #The adAkkaria Convention of Benevolence #
 ###########################################
 cs_adAkkaria_chain_title: "Precursores - Os adAKKaria"
 cs_adAkkaria_chain_desc: "Para compreender o destino dessa antiga e estranha civilização, temos que seguir uma série de pistas. Aonde quer que elas nos levem."
 #Anomaly: Ancient Signals
 STORMS_PREC_ONE: "Sinais Antigos"
 STORMS_PREC_ONE_DESC: "Detectamos uma série de estranhos sinais eletrônicos dentro deste sistema. Dados preliminares mostram que essas transmissões podem ter milhares de anos. Nossa tripulação está ansiosa para descobrir a origem."
 cstorms.205.name: "Um Sinal de Benevolência"
 cstorms.205.desc: "Os estranhos sinais que detectamos neste sistema se originam de uma antiga estação de comunicações que orbita [FromFrom.GetName]. As mensagens parecem ser velhas transmissões de uma civilização esquecida.\n\nConsequentemente, nossa equipe de [Root.Owner.GetScientistPlural] está tendo dificuldades para traduzi-las. Foi sugerido que embarcássemos na estação para uma conexão direta com o mainframe da transmissão."
 #Digsite: The Propaganda Station
 site_adakkaria_the_propaganda_station: "A Estação de Propaganda"
 site_adakkaria_the_propaganda_station_intro: "Esta antiga estação de comunicações ainda está ativa. Ao entrar no local e se conectar diretamente aos seus sistemas, poderemos tentar decifrar as transmissões anteriores."
 cstorms.215.name: "Conexão com o Passado"
 cstorms.215.desc: "Tivemos poucos problemas para embarcar na estação, mas a locomoção dentro da estrutura mostrou-se difícil. Embora esteja inesperadamente bem preservada, em parte graças à composição avançada da blindagem externa, os corredores estreitos e teto baixo foram um desafio para a equipe.\n\nO interior do entreposto revelou poucas pistas sobre a natureza de seus antigos donos, além das telas largas feitas de um composto de plástico e papel que decoram as paredes. Esses cartazes retratam imagens estilizadas de indivíduos de uma espécie orgânica desconhecida. Sua aparência é admirável, altivos e resolutos diante de um plano de fundo de conquista e celebração. O visual foi claramente idealizado para incutir um sentimento de orgulho e camaradagem.\n\nO mainframe da transmissão também é um mistério. Inicialmente, nossa equipe de [Root.Owner.GetEngineerPlural] acreditava ser de natureza análoga ao que já encontramos em [Root.Owner.GetPreFTLLowerPlural]. No entanto, sob os discos e botões há um arranjo complexo de circuitos eletrônicos feitos de ligas metálicas desconhecidas. Nossa equipe de [Root.Owner.GetScientistPlural] suspeita que essa civilização pode ter pulado várias etapas do desenvolvimento das ciências da computação, o que explicaria a mescla anacrônica de tecnologias.\n\nMesmo assim, após uma série de tentativas e erros, nossa equipe de [Root.Owner.GetLinguists] conseguiu decifrar a primeira de muitas transmissões gravadas."
 cstorms.220.name: "Da Liderança Exaltada"
 cstorms.220.desc: "Depois de nos conectarmos com sucesso ao antigo mainframe, nossa equipe de [Root.Owner.GetLinguists] forneceu uma transcrição da primeira transmissão:\n\n§LPovo da Convenção de adAKKaria!\n\nEu falo não como liderança, mas como colega e mestre.\n\nVocês já devem ter percebido que os dias estão mais escuros e o céu está inquieto. Até mesmo as estrelas tornaram-se hostis.\n\nMas eu tenho fé. Assim como nossos Benfeitores acreditavam em nós, eu acredito em nosso propósito. Eu acredito em vocês.\n\nPor muitos séculos, nosso povo protegeu as estrelas contra as mais vis hordas bárbaras. Nosso destino é salvar a galáxia dessas forças malignas; e o destino não é desfeito por um simples contratempo. Não deixaremos que as legiões malévolas que conspiram contra nós nos perturbem.\n\nEu acredito na missão. A Convenção de Benevolência de adAKKaria leva a verdade e a liberdade para todas as civilizações. Nossa missão é o que nos preserva. Nosso destino é o que nos permite triunfar e prosperar!\n\nPor isso, estimados colegas, não vamos ceder à dúvida. Honrem os falecidos. E vamos nos unir, como sempre fizemos. Pelos nossos Benfeitores. Pela Convenção de adAKKaria. Pela Benevolência!§!"
 cstorms.225.name: "Ultimato da ComUni"
 cstorms.225.desc: "Vasculhar os dados descobertos na antiga estação se mostrou uma tarefa árdua para nossa equipe de [Root.Owner.GetLinguists]. No entanto, várias transmissões foram marcadas como reveladoras, algumas das quais forneceram um vislumbre de conversas gravadas:\n\n§SilSapne Tuerthi - Âncora§!\n§L... E para discutir a recente interferência da Comunidade Universal, vamos conversar com o Exaltadíssimo Professor akMani Sando e o Doutor de Toda a Existência Perceptível emEK Inna. Exaltadíssimo Professor, qual a sua interpretação das exigências da ComUni?§!\n\n§SakMani Sando - Exaltadíssimo Professor§!\n§LElas são ultrajantes! A Comunidade Universal continua tratando mundos em desenvolvimento com desdém. Mas deixe-me perguntar a esses autoproclamados guardiões da moralidade galáctica: não é mais antiético negar tecnologias que podem salvar vidas? Negar os ideais que estão no cerne de nossa triunfante sociedade? Quão cruéis seremos se permitirmos que um mundo corra em direção ao precipício sem salvá-lo?§!\n\n§SilSapne Tuerthi - Âncora§!\n§LExcelentes argumentos! Doutor de Toda a Existência Perceptível, imagino que esteja igualmente revoltado com o fato de a ComUni manipular o nosso destino.§!\n\n§SemEkku Inna - Doutor de Toda a Existência Perceptível§!\n§LO que tenho a dizer pode chocar vocês. Apesar da persistência da organização, acredito que devemos fazer um esforço para estudar as preocupações da ComUn...§!\n\n§TA transmissão parece ter sido cortada neste ponto.§!"
 cstorms.225.a: "Eles eram um povo dogmático."
 cstorms.225.a.hive: "Muitas vozes resultam no caos."
 cstorms.225.a.machine: "A vida é profundamente argumentativa."
 cstorms.230.name: "Santos e Psiônicos"
 cstorms.230.desc: "Outra transmissão foi marcada como relevante. Embora seja claramente uma obra dramática, ela nos forneceu um contexto útil para as nossas investigações:\n\n§SakTamian Riwan§!\n§LSoube que você visitou enTulla outra vez noite passada. Achei que tinha esquecido isso em nome do nosso amor.§!\n\n§SinElka Utae§!\n§LEu prometo, foi apenas uma visita amigável. Saiba que meu comprometimento é com você e mais ninguém!§!\n\n§SakTamian Riwan§!\n§LÉ o que você diz, mas sua mente discorda. Ela me diz algo diferente.§!\n\n§SinElka Utae§!\n§LNão, você também!§!\n\n§SakTamian Riwan§!\n§LSim, eu também! Descobri meus dons psiônicos noite passada! O que esperava ser uma exploração prazerosa dos seus sentimentos mais profundos tornou-se minha amargura! A traição em seus pensamentos!§!\n\n§SinElka Utae§!\n§LVocê não entende! Eu não consigo evitar meus pensamentos. Esse caminho me parece apenas racional. Ah, Riwan, se os seus novos dons psiônicos pudessem ler meu coração, e não minha mente!§!"
 cstorms.230.a: "Habilidades psiônicas? Interessante."
 cstorms.230.b: "Bobagens inúteis!"
 cstorms.230.b.hive: "Uma forma curiosamente individualista de entretenimento."
 cstorms.230.b.machine: "Os orgânicos e seus dramas."
 dramatic_enthusiasm: "Entusiastas de Novelas Alienígenas"
 melodramatic_much: "\"Haters\" de Novelas Alienígenas"
 cstorms.235.name: "Transmissão Antiga"
 cstorms.235.desc: "Nossa equipe de [Root.Owner.GetLinguists] já traduziu diversas novas transmissões. Eles acreditam que esta em particular merece atenção:\n\n§LRelatórios do sistema Haliios mostram um cenário cada vez mais grave. A covarde autoridade solphani emboscou nossas valentes Forças de Esclarecimento em enYpsal! Mesmo assim, nossa Liderança Exaltada declarou que o Processo não será interrompido. Conforme citado: \"Nossos Patronos não desistiram de nós. Também não abandonaremos civilizações em desenvolvimento.\"\n\nRumores sobre uma possível colaboração entre as perversas autoridades bárbaras e representantes da ComUni vieram à tona. Contudo, o embaixador da ComUni nega que a comunidade interestelar tenha se comunicado com os opressores bárbaros e afirma que esse é mais um caso de \"paranoia conveniente\" de nossa Liderança Exaltada.\n\nPorém, com ou sem aliados poderosos, o Processo de Esclarecimento dos solphanis está em uma fase crítica. Não será fácil reverter a situação, mas...§!\n\n§TInfelizmente, o resto da transmissão está corrompido demais para ser decifrado. Nossa equipe de [Root.Owner.GetEngineerPlural] já criou uma cópia da base de dados. Com o tempo, esperamos recuperar mais informações sobre essa civilização há muito esquecida.§!"
 cstorms.235.a: "Vamos esperar por mais descobertas."
 #Event: A Site Barren and Bare
 cstorms.245.name: "Um Sítio Inóspito e Exposto"
 cstorms.245.desc: "A passagem de uma tempestade cósmica pelo sistema [planet_windswept_fates.System.GetName] revelou um sítio de possível significância arqueológica em [planet_windswept_fates.GetName].\n\nAnálises preliminares de §Y[planet_windswept_fates.GetName]§! indicam uma atmosfera terrivelmente instável, com vastas tempestades planetárias predominando sobre a paisagem. Nossa equipe de [Root.Owner.GetScientistPlural] nunca teria imaginado encontrar resquícios de civilização em um mundo assim e acredita que poderíamos aprender muito com uma investigação."
 cstorms.245.a: "Prepare um grupo de exploração!"
 #Digsite: Windswept Fates
 site_adakarria_windswept_fates: "Destinos Varridos pelo Vento"
 site_adakarria_windswept_fates_intro: "Tempestades cósmicas podem ser destrutivas, mas esta revelou evidências de uma civilização alienígena. Embora a atmosfera do planeta seja incrivelmente instável, um grupo de exploração pode descobrir que destino horrível se abateu sobre essa antiga cultura."
 cstorms.2105.name: "Condições Severas"
 cstorms.2105.desc: "Nossa equipe chegou a [From.Planet.GetName] em segurança e rapidamente começou a inspecionar os arredores.\n\nAo que parece, a recente e violenta tempestade cósmica que devastou este sistema também levantou várias camadas de poeira e solo que escondiam os restos de uma antiga civilização.\n\nEnquanto nossos cientistas analisavam essas descobertas arqueológicas, eles se deram conta de que as camadas de areia que cobrem as ruínas têm uma composição totalmente diferente do solo ao redor. Análises planetárias indicam que esses depósitos se originaram em um deserto localizado a centenas de quilômetros e só poderiam ter chegado aqui por meio de uma força excepcional, como uma tempestade planetária extremamente volátil."
 cstorms.2105.a: "Continue."
 cstorms.2110.name: "O Que se Perdeu"
 cstorms.2110.desc: "Apesar das estranhas condições climáticas que assolam o planeta, nossa equipe de [Root.Owner.GetScientistPlural] fez grandes avanços. Porém, a cada dia, suas descobertas ficavam cada vez mais chocantes e perturbadoras.\n\nPrimeiro foram resquícios de alvenaria e matéria orgânica escurecida; em seguida, tecidos, vestes de couro e roupas revestidas por polímeros, todos rasgados; enfim, os restos orgânicos dos antigos habitantes do planeta.\n\nIncontáveis corpos foram descobertos, com órgãos dessecados preenchidos de areia e unhas desgastadas pelos esforços. Cada cadáver trajava equipamentos militares pesados [Root.Owner.GetPreFTLLowerPlural] e estava munido de armas de projétil. O que pensávamos ser uma cidade abandonada era na verdade um grande cemitério.\n\nEsses espécimes podem ter milhares de anos, mas, devido ao isolamento total da radiação ultravioleta e de compostos químicos reativos, tanto os restos orgânicos quanto os equipamentos foram cuidadosamente preservados. Ainda não sabemos o que aconteceu aqui."
 cstorms.2110.a: "Que maneira cruel de morrer."
 cstorms.2115.name: "Agressão Vinda de Cima"
 cstorms.2115.desc: "As descobertas em [From.Planet.GetName] continuam perturbadoras. [Root.GetLeaderName] acredita que é improvável que a localização tenha sido um cemitério, pois esses alienígenas aparentavam estar em boa forma física quando sufocaram sob as areias.\n\nAlém disso, também descobrimos várias instalações de armamentos capazes de lançar projéteis pesados. Curiosamente, eles não estavam voltados para a superfície, mas apontados para as profundezas do espaço.\n\nO que quer que essas pessoas estivessem enfrentando veio das estrelas."
 cstorms.2120.name: "A Tempestade Eterna"
 cstorms.2120.desc: "Nossas teorias a respeito da sepultura coletiva que encontramos em [From.Planet.GetName] não renderam respostas. Nossa única pista é a origem das areias que engoliram o exército.\n\nApós uma série de cálculos e simulações complexas, conseguimos determinar que a tempestade que trouxe as areias aqui continua a assolar outra parte do planeta. Uma pequena força expedicionária foi enviada para explorar.\n\nA expedição encontrou a tempestade violenta, que com seus ventos brutais cavava uma profunda fenda no solo. Se ainda existirem pistas aqui, elas com certeza estarão dentro desse abismo, bem no meio no olho da tempestade."
 cstorms.2120.a: "Tome todas as medidas de precaução necessárias!"
 cstorms.2125.name: "O Corpo"
 cstorms.2125.desc: "O local era de difícil acesso, e a travessia só foi possível com extrema habilidade e atenção. No entanto, no centro da cratera sob a tempestade furiosa jazia um esqueleto incomum. Os restos eram tão antigos quanto aqueles presentes na sepultura coletiva, mas o fenótipo e o genótipo eram totalmente diferentes dos corpos encontrados lá.\n\nO uniforme do esqueleto estava incrivelmente bem preservado, e também demonstrava diferenças significativas na concepção. Havia ainda sinais de que alguns dos apêndices foram propositalmente removidos...\n\nMas o fato mais curioso foram as leituras de nossos sensores: detectamos flutuações energéticas ao redor e dentro do corpo. As assinaturas tinham semelhanças surpreendentes com as que encontramos dentro da tempestade massiva, assim como com as da tempestade cósmica que originalmente expôs a sepultura coletiva.\n\nUma teoria começou a tomar forma: estaria esse indivíduo relacionado às tempestades que encontramos até agora? Teria sido ele responsável por soterrar o exército? Uma conclusão bizarra, mas é o que os fatos indicam."
 cstorms.2130.name: "E de Volta ao Pó"
 cstorms.2130.desc: "Referências cruzadas dos símbolos do uniforme com nosso banco de dados tiveram resultados chocantes: o corpo pertencia a um cidadão da Convenção de adAKKaria! A mesma civilização cuja estação de transmissão exploramos há pouco. Ainda mais surpreendente, a idade do corpo e as informações contidas nas transmissões são bastante coesas. Agora acreditamos que este é o mundo mencionado nas gravações.\n\nCom o conhecimento linguístico da estação de propaganda, [Root.GetLeaderName] decifrou o nome da vítima: §ShaToor Gailon§!.\n\nMomentos depois, a tempestade aumentou rapidamente de tamanho e intensidade. Devido à natureza imprevisível do clima, era perigoso demais permanecer no local, e fomos forçados a deixar este mundo para a tormenta. A trilha da Convenção de adAKKaria esfriou outra vez."
 #Storm to Signal
 cstorms.2140.name: "Da Tempestade ao Sinal"
 cstorms.2140.desc: "As assinaturas de energia presentes no corpo alienígena e na tormenta destruidora de planetas em §Y[planet_windswept_fates.GetName]§! correspondem à tempestade cósmica responsável por desenterrar o exército. O registro das análises revelou um sistema explorado anteriormente que abriga flutuações semelhantes, idênticas às das transmissões da Convenção de adAKKaria!\n\nDeveríamos enviar uma nave de exploração para investigar."
 #Fleets of the Trice Damned
 site_adakkaria_fleets_of_the_thrice_damned: "Frotas dos Triplamente Condenados"
 site_adakkaria_fleets_of_the_thrice_damned_intro: "As estranhas flutuações de energia nesta área obscureciam um gigantesco cemitério de naves. Esta necrópole de polímero e metal pode conter uma pista vital para compreendermos a Convenção de adAKKaria."
 cstorms.2150.name: "Restos Destroçados"
 cstorms.2150.desc: "Naves de todos os tipos jazem aqui, desde embarcações de madeira alongadas até arcas cristalinas cósmicas e etéreas. Muitas compartilham semelhanças com as imagens encontradas nas gravações e registros da estação de transmissão de adAKKaria.\n\nSuspeitamos que aqui tenha ocorrido um confronto entre as frotas da Convenção e da ComUni, a força pacificadora da galáxia milênios atrás.\n\nContudo, ainda que as naves estejam em condições irreparáveis, elas não parecem ter sido avariadas por armamentos comuns, tampouco por defeitos ou desastres similares. Em vez disso, os cascos e interiores aparentam ter sido destroçados, como se vítimas de um gigantesco triturador."
 cstorms.2155.name: "Os Limites do Dever"
 cstorms.2155.desc: "Nossa equipe de [Root.Owner.GetEngineerPlural] recuperou cuidadosamente bancos de dados do cemitério de naves. Embora muitos equipamentos tenham sido danificados pelo tempo, um banco de dados de adAKKaria permaneceu intacto:\n\n§L– Estamos sob ataque. Repito, estamos sob ataque. A ComUni exige que interrompamos nossa elevação dos primitivos de Rokukora ou seremos eliminados. Responda. Se não recuarmos, seremos destruídos! Por favor, pelo menos enviem reforços!\n\n– Negativo. Seu sacrifício será registrado.§!"
 cstorms.2155.a: "Eles colocaram o dever à frente da vida."
 cstorms.2160.name: "Restos à Vista"
 cstorms.2160.desc: "Enquanto nossa equipe de [Root.Owner.GetLinguists] traduzia as novas transmissões, fizemos outra descoberta surpreendente: um corpo congelado flutuando no centro do cemitério!\n\nAinda que boa parte do corpo tenha se deteriorado, suas vestes são as de um oficial da Convenção.\n\nCuriosamente, pequenos destroços orbitavam o corpo, como se ele exercesse uma força gravitacional sobre os objetos. Os restos foram levados à nave para mais análises."
 cstorms.2165.name: "Os Mortos Falam"
 cstorms.2165.desc.intro: "A tradução da placa de identificação do corpo revelou que se tratava de um membro de adAKKaria chamado §SalAtta Landeer§!. Semelhante aos corpos encontrados em [planet_windswept_fates.GetName], vários de seus apêndices foram removidos cirurgicamente antes da morte. Contudo, neste caso, o corpo também estava gravemente queimado. O torso em especial mostra sinais de calor extremo, assim como de uma recuperação lenta e certamente dolorosa.\n\nNossa equipe de [Root.Owner.GetScientistPlural] chegou à infeliz conclusão de que esses ferimentos têm semelhanças perturbadoras com os métodos de extração de informações que [Root.Owner.GetPreFTLLowerPlural] usam em indivíduos relutantes. Teria sido ele um veterano de guerra, ou a verdade é ainda mais sinistra?"
 cstorms.2165.desc.def: "$cstorms.2165.desc.intro$\n\nAssim que identificamos a natureza dos ferimentos, os instrumentos da nave sofreram um pico de energia e [Root.GetLeaderName] começou a gritar.\n\nMuito depois, [Leader.GetHeShe] descreveu a experiência como uma luz intensa e lancinante seguida de uma onda devastadora de dor. Era como se algo estivesse tentando invadir sua mente... de dentro para fora."
 cstorms.2165.desc.psio: "$cstorms.2165.desc.intro$\n\nAssim que identificamos a natureza dos ferimentos, os instrumentos da nave sofreram um pico repentino de energia e nossa tripulação psiônica começou a gritar.\n\nMuito depois, eles descreveram a experiência como um momento de esclarecimento supremo seguido de ondas constantes de fúria abrasadora. [Root.GetLeaderName] afirmou que sob a cólera havia uma surpresa terrível e um profundo sentimento de traição. Um único pensamento tomou forma: §LEles me invocaram!§!"
 cstorms.2165.desc.psio_robot: "$cstorms.2165.desc.intro$\n\nAssim que identificamos a natureza dos ferimentos, os instrumentos da nave sofreram um pico repentino de energia e a nossa unidade equipada vivenciou um surto de potência interna.\n\nMuito depois, eles descreveram a experiência que seus processadores psiônicos relataram como extrema fúria. [Root.GetLeaderName] afirmou que a resposta emocional veio acompanhada de um único pensamento transcrito como: §LEles me invocaram!§!"
 cstorms.2165.desc.gestalt: "$cstorms.2165.desc.intro$\n\nApós essa descoberta, os bancos de dados de nossa tripulação foram corrompidos por uma força indetectável. Um número elevado de [controller.GetIndividualNamePlural] relembra a experiência como um pico de energia breve e debilitante, enquanto outros indivíduos foram expostos a imagens confusas e desconexas, o que fez com que seus moduladores vocais emitissem um som penetrante acima de 120 decibéis."
 cstorms.2165.a: "-- Sinal Perdido --"
 cstorms.2170.name: "O Legado de Landeer"
 cstorms.2170.desc.def: "Assim que restabelecemos as comunicações com a nave científica §Y[Root.GetFleetName]§!, fomos submetidos aos urros da tripulação. Muito depois, quando as coisas estavam relativamente mais calmas, descobrimos que o corpo alienígena levado a bordo foi o responsável pelo distúrbio.\n\nO cadáver estava exercendo um estranho poder sobre a mente dos tripulantes. Pequenos objetos levitaram e começaram a orbitar o corpo. Seções das paredes internas começaram a se retorcer e deformar devido à pressão.\n\n§Y[Root.GetLeaderName]§! conseguiu despertar de seu estado catatônico bem a tempo de expulsar o cadáver da nave, e graças à sua reação rápida a nave científica foi capaz de escapar de uma tempestade cósmica que havia se formado de repente. Do contrário, aquele cemitério teria recebido mais uma nave.\n\nEnquanto [Root.GetLeaderName] contava sua experiência, [Leader.GetHeShe] percebeu uma coisa: qualquer que tenha sido a fonte do estranho poder do cadáver, ela também formou um padrão bastante curioso nas telas de comando da nave. Teria sido uma tentativa de comunicação? Um chamado do além?\n\nPor ora, ainda não temos respostas."
 cstorms.2170.desc.gestalt: "As imagens confusas que corrompiam [controller.GetIndividualNamePlural] de exploração foram decifradas. Elas formam uma cena de um antigo habitat. O episódio bombardeou [controller.GetScientistCapital] com imagens e sons de um indivíduo sendo submetido a um tratamento cruel. Seu corpo foi queimado, e seus órgãos fervidos.\n\nUm número de [controller.GetIndividualNamePlural] conseguiu escapar da agressão audiovisual, afirmando que pequenos objetos começaram a flutuar, orbitando o corpo. Os restos orgânicos de alguma forma desenvolveram seu próprio campo gravitacional.\n\nEssa força desconhecida intensificou-se até que seções das paredes internas começaram a se retorcer e deformar sob a pressão. Nesse momento, os sistemas de segurança foram ativados e lançaram o corpo para o espaço.\n\nLogo depois, uma tempestade cósmica abateu-se sobre o sistema. Nossa nave escapou por pouco.\n\nO que quer que tenha acontecido, agora temos mais perguntas que respostas."
 #Special Project: Assembling the Past
 cstorms.2180.name: "Remontando o Passado"
 cstorms.2180.desc: "Após a experiência de [FromFrom.Leader.GetName] no sistema §Y[planet_assembling_the_past.System.GetName]§!, nossos cientistas estão ainda mais motivados a descobrir o que aconteceu com a Convenção de adAKKaria. Os dados coletados durante a exploração de [planet_windswept_fates.GetName] e do cemitério da flotilha revelaram que a galáxia está repleta de estações de propaganda de adAKKaria.\n\nAlém disso, após longos debates, também foi levantada a hipótese de que o padrão observado no mau funcionamento de [Root.GetName] era um conjunto de direções para um sistema desconhecido!\n\nUm projeto especial foi criado para investigar o novo sistema."
 project_adakkaria_tracing_history: "Traçando a História"
 project_adakkaria_tracing_history_DESC: "As coordenadas apontam para um planeta no sistema [planet_assembling_the_past.System.GetName]. Uma nave de exploração deve ser enviada para investigar qual a importância desse planeta para a Convenção de adAKKaria."
 NAME_adSalivul: "adSalivul"
 NAME_Patriotic_Institute_of_Exalted_Benevolence: "Benevolência Exaltada"
 cstorms.2185.name: "O Antigo Habitat"
 cstorms.2185.desc: "Inicialmente, temíamos que nossa investigação do sistema [From.solar_system.GetName] tinha resultado em um impasse. As direções apontavam para um planeta que sofria com campos magnéticos instáveis tão severos que sua paisagem havia sido dizimada. Era improvável que algo de valor pudesse ter sobrevivido à devastação.\n\nContudo, orbitando o planeta estava um habitat com semelhanças arquitetônicas com a estação de transmissão de adAKKaria. Embora estivesse hermeticamente selado, conseguimos gerar um sinal de entrada baseado nas informações recuperadas dos bancos de dados de adAKKaria.\n\nFaz muitos milênios desde que alguém entrou nesta estação. Não temos como saber o que nos espera em seu interior."
 cstorms.2185.a: "Vamos agir com cautela."
 #The Patriotic Institute of Exalted Benevolence
 site_adakkaria_the_patriotic_institute: "Instituto da Benevolência Exaltada"
 site_adakkaria_the_patriotic_institute_intro: "Orbitando um planeta desolado, este antigo habitat foi construído pela Convenção de adAKKaria. Os materiais de alta qualidade usados em sua construção possibilitaram que a estação permanecesse em excelentes condições.\n\nQuando sintonizamos a frequência de transmissão, detectamos uma única mensagem, seguida de um refrão musical bombástico: §LBoas-vindas ao Instituto Patriótico da Benevolência Exaltada§!."
 cstorms.2200.name: "Eis a Benevolência"
 cstorms.2200.desc: "Além da câmara de vácuo estendia-se uma pequena rede de túneis. Enfim encontramos uma enorme praça iluminada por um sol artificial. Estranhamente, a arquitetura do habitat assemelhava-se mais aos subúrbios de certos mundos residenciais que a uma proeminente estação científica. O habitat fora construído para abrigar complexos habitacionais inteiros, centros de compras e escolas, bem como jardins agradáveis, parques e outras instalações. Este lugar foi concebido para uma vida de luxo.\n\nAgora, porém, estava completamente abandonado. Nem uma única forma de vida foi encontrada no habitat. Enquanto continuávamos a explorar, ficamos perplexos com a solidão e com a atmosfera desoladora e estagnada do lugar.\n\nO sol artificial apresentava alguns defeitos, mergulhando a estação na escuridão, e embora outros dispositivos eletrônicos continuassem em grande parte funcionais, eles também foram afetados pelas mesmas interrupções. Mas a parte mais curiosa é a rede de equipamentos de vigilância encontrados nas moradias do lugar. Aparentemente, todos os cidadãos viviam sob estrita supervisão. Uma estação de segurança poderia nos dar mais informações."
 cstorms.2205.name: "Defeito Definitivo"
 cstorms.2205.desc.intro: "Levamos muitos dias para percorrer e catalogar a cidade a bordo da estação e descobrir seu aparato de vigilância. A estação de segurança estava totalmente isolada do restante do habitat, e necessitava de um novo código de entrada.\n\nAqui, encontramos fileiras e mais fileiras de monitores ainda ligados ao equipamento de vigilância em massa. Aqueles que ainda funcionavam nos mostraram todos os cantos da estação, embora também tenham sido afetados pelo mau funcionamento elétrico."
 cstorms.2205.desc.mach: "$cstorms.2205.desc.intro$\n\nNossos drones relataram preocupações com as falhas elétricas, pois eram lembrados do encontro anterior com a Convenção de adAKKaria, no antigo cemitério de naves.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.def: "$cstorms.2205.desc.intro$\n\n[Root.GetLeaderName] relatou certa agitação ao testemunhar as falhas elétricas, pois lhe faziam lembrar do encontro anterior com a Convenção de adAKKaria, no antigo cemitério de naves.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.outro: "Porém, a parte mais perturbadora foi a descoberta de um hub de segurança: de acordo com as mensagens alarmantes exibidas nas telas, este habitat estava programado para se autodestruir!\n\nNossa equipe de [Root.Owner.GetEngineerPlural] deduziu que os defeitos presentes na cidade impediram que o comando fosse executado. Nós desativamos rapidamente a rotina de autodestruição e enviamos nossa equipe de [Root.Owner.GetLinguists] para decifrar quaisquer registros encontrados. Curiosamente, os relatórios da estação foram interrompidos quase um ano antes dos registros recuperados na estação de propaganda."
 cstorms.2210.name: "Perguntas Exaltadas"
 cstorms.2210.desc: "Nossa equipe de [Root.Owner.GetLinguists] não tardou em descobrir o propósito do habitat que orbita [From.Planet.GetName]: registros e mensagens de cidadãos e funcionários descrevem investigações acerca dos recém-descobertos poderes psiônicos da população de adAKKaria. Todos que viviam aqui receberam um convite da Liderança Exaltada da Convenção para desfrutar de uma vida de luxo e expressão individual a bordo do habitat. Em contraponto, eles concordaram em participar dos experimentos conduzidos na estação.\n\nA maior parte dos cidadãos estava animada em participar do programa. Os registros de segurança mostram que muitos eram veteranos de guerra com deficiências, e lhes foi prometido cuidado, auxílio financeiro e indulto para quaisquer infrações que possam ter cometido no passado.\n\nAlém disso, a lista de funcionários da estação continha um nome familiar: §SalAtta Landeer§!, um cientista e veterano com deficiência cujo corpo amputado encontramos no cemitério de naves."
 cstorms.2210.a: "Enfim, algum progresso."
 cstorms.2215.name: "Uma Mensagem de Nossas Cobaias"
 cstorms.2215.desc: "Deciframos uma das últimas mensagens enviadas do habitat:\n\n§gMensagem - Data: 02100363 - Remetente: §SsiDani Itempeer§! - Destinatário: siZul Itempeer§!\n§LOlá! Ainda estou aqui! Desculpe pelos atrasos. Desde que... o habitat vem funcionando de modo estranho e tem sido difícil enviar mensagens. Dizem não ter relação, mas achamos que ele realmente tinha dons psiônicos. Quanto a mim, eu disse que não estava chegando a lugar algum, com tudo que... Então eles sugeriram testar algo mais radical:... tempestades cósmicas. Sei o que você está pensando, mas é só um dígito e talvez até cresça de novo. Mas as sensações que eu acessei quando... !\nCom amor, siDani\n- TRANSMISSÃO§! §YCENSURADO (Dúvidas? Pergunte ao seu supervisor.)§!\n\n§gMensagem - Data: 02100365 - Remetente: §ShaToor Gailon§! - Destinatário: aeDal Asduur§!§L\naeDal,\nA vida tem sido boa. Eu conheci outros veteranos. A gente não se fala. Mas todos sabemos. É bom não ter que falar.\nHoje eu só precisei pensar em levitar um copo, e consegui. Ainda sinto falta do meu apêndice direito, mas talvez essa nova vida não seja tão ruim quanto imaginei. Ouvi dizer que vão me enviar para... Parece que sou um prodígio psiônico... Eu... quero entrar na ativa de novo.\nEspero estar em casa para o Dia do Patriota. Vamos nos ver.\nCom amor, haToor\n- TRANSMISSÃO§! §YCENSURADO (Dúvidas? Pergunte ao seu supervisor.)§!\n\n§gMensagem - Data: 02100367 - Remetente: §SenRida Direen§! - Destinatário: onRida Direen§!\n§LEU APAGUEI UM FOGO COM A MINHA MENTE!!!!\nUma das outras cobaias deu um chilique de repente e causou um incêndio no refeitório. Tudo mundo entrou em pânico, mas a gente não tinha para onde ir! Eu estava MORRENDO de medo, mas então aconteceu alguma coisa dentro de mim e eu apaguei o fogo!\nEU SALVEI TODO MUNDO!! Faça o favor de dizer aos anciões que eu não sou um caso perdido, tá?\n- TRANSMISSÃO§! §RBLOQUEADO (APRESENTE-SE AO SEU SUPERVISOR IMEDIATAMENTE)§!\n\nA segunda transmissão é mais notável: o corpo de §ShaToor Gailon§! foi descoberto durante nossa missão arqueológica no mundo dos [Root.Owner.GetPreFTLLowerPlural]."
 cstorms.2215.a: "Excelente trabalho!"
 cstorms.2220.name: "Consequências Defeituosas"
 cstorms.2220.desc: "Estas mensagens datam de alguns dias antes da evacuação do habitat:\n\n§gMensagem - Data: 02100359 - Remetente: Doutor Supremo - Destinatário: Almirante Venerado§!\n§LSua última mensagem gerou certa preocupação. Poderia explicar por que, após tantos anos nos apoiando em silêncio, você ameaçou encerrar nossas atividades de forma tão repentina?\n- TRANSMISSÃO§! §GENVIADA§!\n\n§gMensagem - Data: 02100360 - Remetente: Almirante Venerado - Destinatário: Doutor Supremo§!\n§LVocê deve estar brincando. Há meses eu envio comunicados, mas imagino que orbitar um mundo instável deva causar uma amnésia conveniente. Você sabe que a ComUni está ameaçando a nossa existência, não é? E com a guerra se agravando, não posso mais justificar o gasto exorbitante de recursos para que suas cobaias fiquem observando gado o dia todo. Eu preciso de resultados sólidos e aplicáveis. AGORA.\n- TRANSMISSÃO§! §GRECEBIDA§!\n\n§gMensagem - Data: 02100360 - Remetente: Doutor Supremo - Destinatário: Almirante Venerado§!\n§LPerdão, nunca recebemos suas mensagens prévias. Nossa estação está sofrendo problemas técnicos e isso deve ter afetado nossas transmissões. Contudo, precisamos de mais tempo. Não podemos abandonar os processos e protocolos vigentes!\n- TRANSMISSÃO§! §GENVIADA§!\n\n§gMensagem - Data: 02100361 - Remetente: Almirante Venerado - Destinatário: Doutor Supremo§!\n§LVocês têm uma semana, ou iniciaremos a desativação imediata. Nada de justificativas, explicações ou segundas chances, quero RESULTADOS!\n- TRANSMISSÃO§! §GRECEBIDA§!\n\n§gMensagem - Data: 02100368 - Remetente: Doutor Supremo - Destinatário: Almirante Venerado§!\n§LAnexo, segue um relatório de nossas conquistas. Esses vídeos comprovam que tempestades cósmicas podem ser influenciadas por nossas cobaias dotadas de habilidades psiônicas. Isso pode ter aplicações militares extraordinárias. Com tempo suficiente, poderemos sobrecarregar as expressões psiônicas das cobaias sem submetê-las a traumas físicos e mentais.\n- TRANSMISSÃO§! §RFALHA (Causa: Matrix de Transmissão Corrompida)§!"
 cstorms.2220.a: "A última mensagem nunca foi enviada."
 cstorms.2225.name: "Destino Incompleto"
 cstorms.2225.desc: "Esta é a última mensagem recuperada:§L\n\nEstimados colegas,\n\nDirijo-me a vocês com o coração pesado. O Comando Exaltado optou por encerrar todas as operações dentro do Instituto Patriótico da Benevolência Exaltada.\n\nTal gesto não deve ser entendido como uma reprovação do seu trabalho aqui. Foi uma honra servir com cada um de vocês. Sei que terão muitas perguntas, mas, em suma, as expectativas do Comando Exaltado não estavam alinhadas com os nossos objetivos de pesquisa.\n\nQuanto aos nossos cidadãos, o Comando Exaltado convida a todos para participar do programa no $building_adakkaria_patriotic_institute$ em adSul. Uma lista completa de funcionários segue em anexo. Por favor, informem seus relatórios de acordo.\n\nQuanto aos demais... lamentavelmente, a natureza secreta de nossa pesquisa significa que não será permitido aos participantes regressar à sociedade. O Comando Exaltado prometeu enviar uma unidade especial para lidar com eles. Vocês não precisarão presenciar o ato, que de certo modo é uma bênção. As famílias serão devidamente compensadas.\n\nAdeus, \nDoutor Supremo, §!§SalAtta Landeer§!\n\nA lista anexada, embora parcialmente corrompida, menciona as cobaias §ShaToor Gailon§! e §SenRida Direen§!. Parece que foram transferidas para a capital da Convenção de adAKKaria, adSul. Agora sabemos as coordenadas para esse mundo."
 cstorms.2225.a: "Trace um curso para o mundo natal da Convenção."
 #Special Project: Eye of the Convention / The Void Calls
 cstorms.2240.name: "Olho da Convenção"
 cstorms.2240.desc: "As coordenadas revelaram um sistema antes oculto de nossos scanners. Chegou a hora de fazermos uma visita à Convenção de adAKKaria – antes que outra pessoa faça.\n\nUm novo projeto especial foi emitido."
 cstorms.2245.name: "O Vazio Chama"
 cstorms.2245.desc: "Apenas alguns momentos após sairmos do habitat, [event_target:leader_patriotic_institute.GetName] tomou uma decisão repentina e chocante. Como se estivesse sob a influência de uma força externa, [event_target:leader_patriotic_institute.GetHeShe] ordenou que a nave abrisse um canal de comunicação em uma frequência tipicamente associada a eventos psiônicos massivos ou à passagem de uma tempestade cósmica evanescente.\n\nO canal estava direcionado às mesmas coordenadas do sistema natal da Convenção de adAKKaria. Em instantes, recebemos uma resposta."
 cstorms.2245.desc.gestalt: "Momentos após deixarmos o habitat, nossa consciência de grupo foi atormentada por uma vibração incomum, como se algo estivesse tentando se comunicar conosco através de uma vasta distância. O sinal se originava das mesmas coordenadas do sistema natal da Convenção de adAKKaria, e existia em uma frequência comumente associada a eventos psiônicos massivos ou à passagem de uma tempestade cósmica evanescente.\n\nRecebemos uma resposta imediatamente."
 cstorms.2250.name: "A Tempestade Chama"
 cstorms.2250.desc: "Fizemos de tudo, mas alcançar adSul se mostrou um desafio muito maior do que antecipamos. Todo o sistema está envolto por uma tempestade cósmica de composição desconhecida, impedindo nossa aproximação do planeta.\n\nQuanto à tempestade, ela parece estar... nos chamando?"
 #The Storm
 cstorms.2260.name: "A Tempestade"
 cstorms.2260.desc: "FALEM NOSSOS NOMES\n\nFALEM NOSSOS NOMES\n\nFALEM | NOSSOS | NOMES"
 cstorms.2260.a: "Quem é você?"
 cstorms.2260.b: "O que houve aqui?"
 cstorms.2260.c: "Nomes?"
 cstorms.2260.a.resp: "SER | NÃO SER | INEXISTIR\n\nTEMPESTADE ESTRONDOSA E FÚRIA\n\nDOR E IRA E LUTO E MEDO\n\nFALEM NOSSOS NOMES"
 cstorms.2260.b.resp: "PROVOCAR | EVOCAR | INVOCAR\n\nFALEM NOSSOS NOMES"
 cstorms.2265.name: "$cstorms.2260.name$"
 cstorms.2265.desc: "NÃO PODEMOS PENSAR | FALAR | DESEJAR | SONHAR\n\nNOSSOS NOMES NOS INVOCAM | DEVOLVAM NOSSA IDENTIDADE | ESTAMOS ESQUECIDOS\n\nFALEM NOSSOS NOMES"
 cstorms.2265.c.resp: "$cstorms.2265.desc$"
 cstorms.2265.d: "Onde podemos encontrar os seus nomes?"
 cstorms.2265.e: "Mostre essa celebração."
 cstorms.2270.name: "$cstorms.2260.name$"
 cstorms.2270.desc: "É UMA CELEBRAÇÃO\n\nÉ CELEBRAÇÃO\n\nDOR | IRA | LUTO | MEDO\n\nCELEBRAÇÃO\n\nFALEM NOSSOS NOMES"
 NAME_adSul: "adSul"
 project_adakkaria_benevolent_grounds: "Terra Benevolente"
 project_adakkaria_benevolent_grounds_DESC: "Recuperamos as coordenadas para o planeta natal da Convenção de adAKKaria.\n\nExplorar o sistema e o planeta pode enfim revelar o destino da civilização de adAKKaria."
 #Celebration
 site_adakkaria_celebration: "Celebração"
 site_adakkaria_celebration_intro: "Após a comunicação com a tempestade cósmica, uma pequena parte de adSul nos foi revelada. Entre as nuvens remanescentes havia um enorme complexo, abandonado, mas estranhamente indiferente à passagem do tempo. As análises revelaram material orgânico em seu interior.\n\nDiante da imensa construção, havia uma série de faixas com uma única proclamação: É Tempo de Celebração."
 cstorms.2285.name: "Niilismo Forçado"
 cstorms.2285.desc: "Os salões vazios do Instituto de Celebração estavam cobertos pela poeira de muitas eras. Os cartazes de propaganda, sempre exaltando o valor da Convenção de adAKKaria, foram tudo o que restou desse império outrora próspero e temido.\n\nNo entanto, nossos esforços linguísticos já estão dando resultados: a segurança era mínima e o mainframe revelou seus segredos facilmente.\n\nOs registros que recuperamos estavam cheios de atividade até a última transmissão da estação de propaganda.\n\nNessa data, a Convenção de Benevolência de adAKKaria simplesmente deixou de existir."
 cstorms.2290.name: "Descida aos Condenados"
 cstorms.2290.desc: "Com um misto de medo e curiosidade, entramos nos níveis subterrâneos do complexo. Uma rede de laboratórios extensa e cuidadosamente planejada surgiu diante de nós. Nossa unidade se dividiu em duas: uma foi enviada para investigar os laboratórios em busca de mais informações sobre o propósito do Instituto de Celebração. A outra continuou sua descida.\n\nNossas análises continuavam indicando a presença de material orgânico, e não demorou muito para descobrirmos o motivo: os níveis mais baixos do instituto estão destinados exclusivamente a celas de observação. Os restos mumificados dos cidadãos de adAKKaria ainda estão confinados nesses compartimentos apertados. Uma interface digital ao lado de cada câmara apresentava o nome de seus ocupantes, a fase do teste a que estavam submetidos e as anotações dos observadores.\n\nEnquanto isso, recuperamos a seguinte mensagem:\n§LNosso teste no sistema Haliios foi um desastre absoluto. A mobilização inicial da cobaia conhecida como §ShaToor Gailon§! ocorreu conforme o planejado, mas assim que fomos confrontados pelas forças bárbaras solphanis ela perdeu o controle. Embora a tempestade tenha eliminado os exércitos primitivos, os nossos também foram dizimados.\n\nÉ preciso entender que acima de tudo, essas cobaias são vis e perturbadas. Quanto mais cedo o Invocador for ativado, melhor.§!"
 cstorms.2290.a: "O que eles estão fazendo aqui?"
 cstorms.2290.a.gen: "Tantas mortes. Inspirador."
 cstorms.2295.name: "Um Tipo de Celebração"
 cstorms.2295.desc.start.authgen: "Os experimentos realizados pela Convenção de adAKKaria eram fascinantes. A cada prisioneiro era atribuída uma fase, e à medida que as fases aumentavam, aumentava também a brutalidade do tratamento. Alguns métodos particularmente inovadores se destacam: a utilização de fogo e eletricidade para impulsionar o desenvolvimento psiônico do corpo; a remoção de órgãos essenciais para provocar poderes incipientes e o uso de outros sentidos; e a aplicação de substâncias que alteram a mente para invocar um estado de quase morte.\n\nCertamente podemos aprender algo aqui. Esses especialistas estavam trabalhando em prol de um objetivo compreensível, notadamente o advento da supremacia adAkkariana na galáxia.\n\nAinda assim, os relatórios indicam que esse tratamento pode não ter sido a causa da morte dos participantes. Assim como no caso de §ShaToor Gailon§!, muitos parecem ter simplesmente desistido."
 cstorms.2295.desc.start.default: "O pavor e a confusão que sentimos ao ver os restos mortais das vítimas foram assombrosos, mas o nosso desejo de compreender a extensão e o propósito dos experimentos da Convenção também.\n\nEm um tom austero e indiferente, os cientistas adAkkarianos relataram o que haviam feito com essas pessoas. Cada vítima foi designada a uma fase, e à medida que as fases aumentavam, aumentava também a brutalidade do tratamento. Fogo, eletricidade, mutilação, privação dos sentidos e de alimentos... Nada era cruel demais. Tudo em prol da gloriosa missão de manter a supremacia adAkkariana na galáxia. Ainda assim, os relatórios indicam que mesmo tais atrocidades podem não ter sido a causa da morte das cobaias. Assim como §ShaToor Gailon§!, muitos parecem ter simplesmente desistido."
 cstorms.2295.desc.end.default: "Instantes depois de nossas observações, [Root.GetLeaderName] teve um colapso. Entre gemidos de dor, [Root.GetHeShe] gritou que algo estava invadindo sua mente!\n\nEmbora [Root.GetLeaderName] esteja estável no momento, parece que alguma entidade invasora tentou incutir em seus pensamentos um conhecimento radical. [Root.GetHeSheCap] informou ser capaz de tentar novamente, acreditando que a experiência poderá ter um efeito profundo."
 cstorms.2295.desc.end.psionic: "Enquanto observava esses corpos, [Root.GetLeaderName] começou a ouvir sussurros estranhos, uma voz desencarnada que clamava com grande angústia:\n§LÉramos leais! Louvamos a Convenção e acreditamos em sua missão.\nAs tempestades continuaram a nos chamar. Elas nos envolveram, nos desejaram!\nFizemos o que eles pediram. Éramos talentosos e obstinados!\nEles nos chamam de malignos, nos chamam de traidores, matam nossos amigos!\n\nERA PARA SER UMA CELEBRAÇÃO§!\n\nOs sussurros nos levaram até um corredor chamado \"A Fase Final\", mas as medidas de segurança mais avançadas em vigor não permitiram nosso acesso."
 cstorms.2295.desc.end.psionic_individual_robot: "Enquanto analisava esses corpos, [Root.GetLeaderName] começou a detectar uma transmissão psíquica interpretável:\n§LÉramos leais! Louvamos a Convenção e acreditamos em sua missão.\nAs tempestades continuaram a nos chamar. Elas nos envolveram, nos desejaram!\nFizemos o que eles pediram. Éramos talentosos e obstinados!\nEles nos chamam de malignos, nos chamam de traidores, matam nossos amigos!\n\nERA PARA SER UMA CELEBRAÇÃO§!\n\nA transmissão nos levou até um corredor chamado \"A Fase Final\", mas as medidas de segurança mais avançadas em vigor não permitiram nosso acesso."
 cstorms.2295.desc.end.psionic_gestalt: "Enquanto inspecionávamos esses corpos, uma nova voz ingressou no coletivo e se canalizou em [Root.GetLeaderName] como uma forma de comunicação:\n§LÉramos leais! Louvamos a Convenção e acreditamos em sua missão.\nAs tempestades continuaram a nos chamar. Elas nos envolveram, nos desejaram!\nFizemos o que eles pediram. Éramos talentosos e obstinados!\nEles nos chamam de malignos, nos chamam de traidores, matam nossos amigos!\n\nERA PARA SER UMA CELEBRAÇÃO§!\n\nA voz nos levou até um corredor chamado \"A Fase Final\", mas as medidas de segurança mais avançadas em vigor não permitiram nosso acesso."
 cstorms.2295.desc.end.gestalt: "Mais distorções estranhas ocorreram nos processos cognitivos de nossa equipe de [controller.GetIndividualNamePlural], gerando pensamentos intrusivos. Isso resultou na descoberta de que as cobaias do Instituto de Celebração conversavam entre si por meios não físicos, uma transmissão quase instantânea semelhante a uma mente-colmeia emergente.\n\nEmbora não tenhamos conseguido decifrar as palavras exatas, o objetivo da discussão era claro: uma revolta estava se formando dentro do Instituto."
