 #Weather Manipulator
 r_weather_manipulator: "O Opressor de Perturbações"
 r_weather_manipulator_desc: "Uma versão mais avançada da máquina que os Comerciantes Ricianos usavam para manipular tempestades cósmicas. Por padrão, este dispositivo aumentará a eficácia de todas as nossas tecnologias relacionadas às tempestades; entretanto, quando devidamente utilizado, ele pode até mesmo expulsar todas as tempestades de nossas fronteiras."
 storm_relic_repelling_field_modifier: "Ativação do Opressor de Perturbações"
 storm_relic_repelling_field_modifier_tt: "Cria um campo de repulsão de §Y$default_storm$§! §Mextragrande§! ao redor da capital do império por 36 meses."
 #Temporary effect used by the Inetian Precursor Digsite C
 storm_timed_repelling_field_modifier: "Ativação de Depressores de Perturbações Setoriais"
 storm_timed_repelling_field_modifier_tt: "Cria um campo de repulsão de §Y$default_storm$§! §Hmédio§! ao redor da capital do império por 18 meses."
 #The Tempest Invocator
 r_the_tempest_invocator: "O Invocador de Tempestades"
 r_the_tempest_invocator_desc: "O potencial latente deste dispositivo pode ser sentido até mesmo no estado desligado. Ousaremos invocar a fúria tempestuosa dentro de uma de nossas mentes mais brilhantes? Sacrifícios devem ser feitos pela glória da nação."
 r_the_tempest_invocator_active_effect_tt: "Gera uma ['concept_nexus_storm'] em um sistema de sua escolha.\n$t$Quando um sistema é selecionado, um $scientist_with_icon$ é §PSacrificado§!."
 r_the_tempest_invocator_requirement_fail_tt: "$TRIGGER_FAIL$§RNenhum $scientist_with_icon$ pode ser sacrificado.§!"
 r_the_tempest_invocator_started_placing_fail_tt: "$TRIGGER_FAIL$§RO sistema de posicionamento de tempestade já foi ativado.§!"
 tempest_invocator_active_modifier: "Repulsão de Tempestades"
 concept_nexus_storm: "$nexus_storm$"
