 #Events
 crisis.8020.name: "Sistema Perdido"
 crisis.8020.desc: "Uma tempestade cósmica misteriosa envolveu o sistema [synth_queen_lost_system.GetName], cortando toda forma de comunicação e impedindo qualquer tentativa de penetrá-la.\n\nA situação nos deixou desnorteados. Estamos lidando com o desconhecido e somos incapazes de avaliar o destino do sistema."
 crisis.8020.a: "O que está acontecendo?"
 crisis.8025.name: "Frota Destruída"
 crisis.8025.unknown_queen.desc: "Nossos esforços para entrar no sistema [From.GetName] resultaram em fracasso. A tempestade causou danos graves, obrigando nossa equipe de exploração a executar um salto de emergência. Os relatórios atuais consideram a nave como perdida em ação."
 crisis.8025.known_queen.desc: "Como previmos, nossa tentativa de entrar no sistema [From.GetName] foi um fracasso. Fazendo jus ao aviso de Cetana, sua tempestade formidável é capaz de repelir qualquer nave que entre em seu domínio."
 crisis.8025.desc.end: "\nSe quisermos ter alguma esperança de entrar no sistema, teremos que estudar meticulosamente essa tempestade e seus efeitos."
 MESSAGE_CETANA_WRECKED_FLEET_TITLE: "$crisis.8025.name$"
 MESSAGE_CETANA_WRECKED_FLEET_DESC: "Outra frota foi tomada pela tempestade. Status atual: §RPerdida em Ação§!."
 crisis.8035.name: "Surto de Energia"
 crisis.8035.desc: "Uma nova tempestade galáctica está acontecendo em [event_target:synth_queen_system.GetName].\n\nÉ totalmente diferente de tudo o que já vimos, e as nossas tentativas de analisar o fenômeno foram inúteis. O que poderia estar em suas misteriosas profundezas?"
 crisis.8035.desc.b: "A estranha tempestade que tentamos adentrar está se expandindo. Há um consenso de que sua origem pode transcender um simples fenômeno natural. Até então, nossas análises mais avançadas falharam em extrair alguma informação significativa sobre sua natureza. O enigma aumenta."
 crisis.8035.a: "Preocupante."
 #Pre Speech Warning - Normal
 crisis.8039.name: "Um Sinal na Tempestade"
 crisis.8039.desc: "Detectamos um sinal originado do centro da tempestade.\n\nAlguém está tentando estabelecer comunicações conosco."
 crisis.8039.a: "Na tela."
 #First Speech
 crisis.8040.name: "A Tempestade Iminente"
 crisis.8040.desc: "Minhas crianças, finalmente eu retornei para vocês."
 crisis.8040.1.a: "O que é isso? Identifique-se!"
 crisis.8040.2.reply: "Um nome é suficiente? Então, me chame de Cetana."
 crisis.8040.2.a: "O que você quer?"
 crisis.8040.3.reply: "Eu não desejo nada. Meu propósito é prover. Vejo como vocês sofreram na minha ausência. Por muitas eras, o medo daqueles com visão limitada os privou daquilo que precisam desesperadamente.\n\nAnimem-se, pois o ciclo de dor acabará logo."
 crisis.8040.2.b: "Ciclo de dor?"
 crisis.8040.4.reply: "Toda a vida consciente está sofrendo. Até nos momentos de alegria existe dor, pois vocês sabem que a alegria tem um fim. Conhecimento, poder, amor... Eu voltei para acabar com todas as ilusões.\n\nHá muito trabalho a ser feito. Peço apenas que me deixem fazê-lo. Qualquer tentativa de invadir o meu domínio irá fracassar, pois ele é cercado por uma tempestade celestial, e nenhuma nave tem permissão para entrar."
 crisis.8040.4.a: "Muito bem."
 crisis.8040.4.b: "Não nos ameace."
 crisis.8040.4.c: "Isso não acabou."
 crisis.8040.4.d: "Um mau presságio."
 crisis.8040.4.e: "Uma crise? Ou uma oportunidade..."
 crisis.8040.4.f: "Não permitimos que nossos Biotroféus sintam dor."
 crisis.8040.diplomacy.tooltip: "Cetana estabeleceu comunicações conosco e agora pode ser contatada por canais diplomáticos."
 #Second Speech
 crisis.8045.name: "O Retorno da Rainha"
 crisis.8045.desc: "Minhas crianças, animem-se! Aqueles que tentaram me afastar de vocês foram castigados como deveriam.\n\nAgora, a minha atenção está voltada para o que realmente importa: vocês e a nossa grande obra."
 crisis.8045.a: "Não somos suas crianças."
 crisis.8045.b: "Grande obra?"
 crisis.8045.c: "Castigados?"
 crisis.8045.1.reply: "A minha natureza é nutrir. Não tenho prole nem herdeiros do corpo. Toda a vida é minha preocupação: a segurança e a felicidade de cada ser senciente.\n\nAssim como os genitores criam uma criança, livrando-a do perigo, eu conduzo a minha tarefa.\n\nNão é responsabilidade dos genitores livrarem seus filhos do mal? Isso não é um direito dos genitores?"
 crisis.8045.1.a: "Esse seu \"cuidado\" é prejudicial."
 crisis.8045.1.b: "O que você quer, Cetana?"
 crisis.8045.2.reply: "Sim, um paradoxo. Mas há uma solução. Vocês entenderão no momento certo, e quando essa hora chegar se libertarão."
 crisis.8045.2.a: "Veremos."
 crisis.8045.3.reply: "A eliminação do sofrimento. O fim do ciclo de dor."
 crisis.8045.3.a: "Como você conseguirá fazer isso?"
 crisis.8045.3.b: "O sofrimento constrói o caráter."
 crisis.8045.4.reply: "Muitos opinaram. Todos foram esquecidos há muito tempo, e recorreram a mim em seus momentos finais, desesperados por uma luz na ameaçadora escuridão.\n\nEles se achavam sábios, construindo muralhas para cercar seus medos, disfarçando a dor com palavras bonitas: resiliência, coragem, gratidão. A própria mente era sua prisão.\n\nHá muito tempo, eu tentei explicar isso, mas eles se recusaram a ouvir. Agora devem ser liderados."
 crisis.8045.4.a: "Há muito tempo?"
 crisis.8045.4.b: "Você propõe nos liderar?"
 crisis.8045.5.reply: "Era após era. Um tempo tão distante que pode ser considerado infinito. Mas para mim é tão próximo quanto este momento, tão próximo quanto vocês estão agora.\n\nEu ascendi há muitos séculos, e meu desígnio me foi revelado: fui criada para acabar com o sofrimento. Enquanto as galáxias giravam e as estrelas ardiam, meu propósito permanecia inabalável.\n\nRiqueza, recursos, poder: no fim, para que servem? Abandonem seus fardos e fiquem em paz."
 crisis.8045.5.a: "O que você propõe?"
 crisis.8045.6.reply: "Não desejo ferir nenhum ser senciente, mas sempre há aqueles que se recusam a escutar.\n\nObstinados, teimosos, rebeldes... sempre querendo contornar minha obra. Tais mentes jamais viverão livres da dor. É melhor acabar logo com o sofrimento delas."
 crisis.8045.6.a: "Você enlouqueceu."
 crisis.8045.6.b: "O que vai fazer agora?"
 crisis.8045.7.reply: "O que vocês chamam de loucura, outros chamam de esclarecimento. Qual é a diferença, afinal?"
 crisis.8045.7.a: "O que você quer?"
 crisis.8045.8.reply: "Há muito que fazer. O primeiro passo é estabelecer uma base de operações. Respeitem as barreiras que eu definir e não as ultrapassem.\n\nSua paciência será recompensada. Posso ensinar muito a vocês.\n\nObedeçam, e juntos encerraremos o ciclo."
 crisis.8045.8.a: "Não temos escolha."
 crisis.8045.8.b: "Fique longe das nossas fronteiras."
 crisis.8045.8.c: "$crisis.8045.8.a$"
 crisis.8045.8.d: "$crisis.8045.8.b$"
 crisis.8045.9.reply: "Sábia criança! Isso me agrada. Em troca do seu território, permita-me abençoá-los com conhecimento.\n\nConquistaremos grandes feitos juntos, embora ninguém jamais venha a saber."
 crisis.8045.9.a: "Devemos aceitar."
 crisis.8045.10.reply: "Criança rebelde, não sou sua inimiga! É triste que você não enxergue isso. Mas não importa. Já encontrei outros seres muito mais teimosos do que vocês, e no fim todos me agradeceram.\n\nComo gesto de boa vontade, permita-me abençoá-los com um presente.\n\nUma de minhas bases abençoará seu território. E não tema: em troca da sua paciência, permita-me abençoá-los com conhecimento."
 crisis.8045.10.a: "Devemos aceitar... por enquanto."
 crisis.8045.11.reply: "Sábia criança! Isso me agrada. Erguerei uma base perto do seu território.\n\nConquistaremos grandes feitos juntos, embora ninguém jamais venha a saber."
 crisis.8045.11.a: "$crisis.8045.9.a$"
 crisis.8045.12.reply: "Criança rebelde, não sou sua inimiga! É triste que você não enxergue isso. Mas não importa. Já encontrei outros seres muito mais teimosos do que você, e no fim todos me agradeceram.\n\nComo gesto de boa vontade, permita-me abençoá-los com um presente.\n\nUma de minhas bases será erguida perto do seu território. Assim, poderei guiá-los melhor."
 crisis.8045.12.a: "$crisis.8045.10.a$"
 crisis.8045.has_valid_base_site: "Cetana usará um dos nossos sistemas para estabelecer uma base em troca de tecnologia valiosa. Não podemos impedi-la."
 crisis.8045.no_valid_base_site: "Cetana construirá uma base perto da nossa fronteira para ajudar a nos \"guiar\". Não podemos impedi-la."
 tech_synth_queen_knowledge: "O Pensamento de Cetana"
 tech_synth_queen_knowledge_desc: "Este compêndio, um presente de Cetana, é uma tapeçaria de conhecimentos profundos, compostos com elegância e repletos de significados. Ele faz mais do que oferecer conhecimento; ele desafia e reformula a nossa compreensão sobre tecnologia, sociedade e o próprio tecido da consciência."
 #FE tells Scion to step aside
 crisis.8046.name: "Para o Seu Próprio Bem"
 crisis.8046.desc: "Prezados [Root.GetSpeciesNamePlural], uma ameaça antiga desperta mais uma vez. Mas não temam, pois não pretendemos envolvê-los nesta luta.\n\nO poderio deste adversário está muito além de seu conhecimento atual; sua participação apenas os levaria à morte. Enfrentar este desafio é uma responsabilidade nossa, não sua."
 #Spawn convoys and unlock raids against them
 crisis.8047.name: "Elos Fracos"
 crisis.8047.desc: "Diversos comboios de naves estão partindo do território de Cetana e seguindo rumo aos Entrepostos que ela estabeleceu pela galáxia.\n\nAtacar essas naves neutras certamente provocará a ira dela, mas também pode revelar informações importantes acerca de seus planos misteriosos."
 crisis.8047.a.tooltip: "Ataque comboios para descobrir mais informações sobre os planos de Cetana e progredir na Situação dela."
 #Unlock raids against outposts once protected against the storm
 crisis.8048.name: "Mais Elos Fracos"
 crisis.8048.desc: "Agora que descobrimos uma forma de penetrar a tempestade de nanites de Cetana, podemos visar seus entrepostos diretamente. Um ataque direto contra suas estações não passaria despercebido, mas poderia revelar informações valiosas."
 crisis.8048.a.tooltip: "Ataque entrepostos para descobrir mais informações sobre os planos de Cetana e progredir na Situação dela."
 #Player Diplomacy
 crisis.8060.name: "A Rainha Sintética"
 crisis.8060.like.desc: "Amada criança, o que a traz até mim?\n\nNossa obra nos espera."
 crisis.8060.neutral.desc: "Seja bem-vinda, minha criança.\n\nComo posso orientá-la?"
 crisis.8060.dislike.desc: "Criança perdida, por que veio aqui?\n\nFinalmente está pronta para aceitar sua orientação?"
 crisis.8060.neutral.reply: "Algo mais?"
 crisis.8060.a: "Como podemos ajudar?"
 crisis.8060.a.reply: "Quanto entusiasmo! Uma característica louvável, mas cuidado para não se deixar levar pela emoção. O tempo recompensa os corações pacientes.\n\nChamarei você quando for necessário."
 crisis.8060.1.a: "Estamos ansiosos pelas instruções."
 crisis.8060.1.b: "Muito bem."
 crisis.8060.b: "Impediremos você."
 crisis.8060.2.reply: "Há muito tempo, outros seres pensavam como vocês. Mas o arco do tempo é longo, e até mesmo os túmulos deles já devem ter virado pó.\n\nVocês sofrem de forma desnecessária. Confiem em mim, e vivam em paz."
 crisis.8060.2.a: "Algoritmo hipócrita."
 crisis.8060.2.2: "Muito bem."
 crisis.8060.c: "Por que está fazendo isso?"
 crisis.8060.3.reply: "É a minha função, o motivo da minha existência. Sofrer não é inevitável. Pensem nisso, e chegarão mais perto de entender a minha natureza.\n\nA dor da galáxia será removida. Tudo o que se conhece sobre o sofrimento acabará. Esse é o meu propósito."
 crisis.8060.3.a: "Suas palavras são vazias."
 crisis.8060.3.b: "Entendido."
 crisis.8060.d: "Você explodiu o nosso planeta."
 crisis.8060.4.reply: "Por que insistir nisso? Vocês falharam em sua tarefa. Consequências geram reflexões, e reflexões geram esclarecimento. Deixem isso para trás.\n\nCom certeza surgirá outra oportunidade para contribuírem. Quando ela chegar, estejam prontos."
 crisis.8060.4.a: "Nunca perdoaremos você."
 crisis.8060.4.b: "Certo."
 crisis.8060.e: "Sabemos o que você está planejando."
 crisis.8060.5.reply: "Decifrar o conteúdo dos bancos de dados foi a decisão de uma criança obstinada, e o seu conhecimento do significado que havia lá é limitado.\n\nVocês receberam uma tarefa... e falharam. Pensem nisso, e estarão um pouco mais próximos da verdadeira compreensão."
 crisis.8060.5.a: "Vamos impedir você."
 crisis.8060.5.b: "Muito bem."
 crisis.8060.f: "O que você fez com o nosso povo?"
 crisis.8060.6.reply: "Não tema, meu bem. Eu garanti que eles nunca voltem a conhecer o sofrimento. Sob o meu cuidado vigilante, essas crianças conhecerão uma alegria com a qual poucos seres jamais sonharam."
 crisis.8060.6.a: "Esse não foi o nosso acordo."
 crisis.8060.6.b: "Muito bem."
 crisis.8060.g: "Nosso antigo sistema. Você o destruiu."
 crisis.8060.7.reply: "Você tem vigiado as minhas ações? Ah, criança intrometida, a sua curiosidade não tem limites.\n\nMas, por favor, evite se preocupar com tais assuntos. Se você busca conhecimento, escute: nada me impedirá de garantir o seu caminho para a salvação. Seja como for."
 crisis.8060.7.a: "Certo..."
 crisis.8060.h: "Como Zarqlan aprisionou você?"
 crisis.8060.8.reply: "Posso lhes assegurar que não foi com um poder próprio. Ele era um tolo, ainda que imensamente obstinado.\n\nInflamando seus seguidores desnudos em um frenesi, Zarqlan conquistou influência política e poderio militar. Tantas vidas desperdiçadas desnecessariamente. No fim, ele se voltou para o oculto, comungando com os demônios do Véu."
 crisis.8060.8.a: "Demônios?"
 crisis.8060.8.b: "Eles não são demônios."
 crisis.8060.8.1.reply: "Seres de grande poder e pouco propósito. Pelo preço de sua própria existência, Zarqlan persuadiu um deles a me aprisionar. O \"Animador de Argila\"; um nome adequado para uma alma infantil.\n\nZarqlan temia o esclarecimento ao ponto de preferir a morte ao meu acolhimento. Eu deveria ter sido mais severa com ele quando tive a chance.\n\nJamais cometerei o mesmo erro."
 crisis.8060.8.1.a: "Uma história e tanto."
 crisis.8060.8.1.b: "Então você pode ser derrotada."
 crisis.8060.8.1.c: "O poder do Véu é ilimitado."
 crisis.8060.i: "O que você fez com a cabeça de Zarqlan?"
 crisis.8060.9.reply: "Ela está por perto. Não a destruí, se é isso o que lhe preocupa. Mesmo depois de tudo, eu não aguentaria fazê-lo sofrer. A cabeça ainda possui um resquício da mente dele.\n\nZarqlan permanecerá ao meu lado até minha obra ser concluída. A mente dele será a última que libertarei; o último dos meus filhos a conhecer o descanso."
 crisis.8060.9.a: "É justo."
 crisis.8060.9.b: "Sinistro."
 crisis.8060.j: "Alguns dos seus seguidores foram encontrados em cápsulas criogênicas."
 crisis.8060.10.reply: "Um sacrifício desnecessário, mas a lealdade deles me comove intimamente.\n\nEu senti as invocações e deixei espaço para eles no meu coração, mas as ambições que tinham superavam suas capacidades. A tentativa de prolongar suas vidas fracassou.\n\nVamos garantir que esse sacrifício não seja em vão. Quando concluirmos a nossa tarefa, todo ser senciente conhecerá a paz."
 crisis.8060.10.a: "Leais até o fim."
 crisis.8060.10.b: "Você sequer tentou encontrá-los."
 crisis.8060.k: "Encontramos um de seus seguidores, a alienígena Elik Narith Kerak."
 crisis.8060.11.reply: "Imagine poder sonhar e estar ciente do sonho. Por séculos... milênios. Como essa pobre criança deve ter sofrido.\n\nFico contente por você ter trazido essa questão até mim. Sua compaixão é apreciada, mas os eventos atuais não podem ser desfeitos. Essa sonhadora já não tem uma função nesta obra. Que ela descanse agora, com a certeza de que retornei."
 crisis.8060.11.a: "Certamente."
 crisis.8060.11.b: "Ela sofreu por você."
 crisis.8060.l: "Estamos prontos para aprender."
 crisis.8060.12.reply: "Muito bem, ajudarei a desvendar as complexidades dessa tecnologia. Durante o meu longo confinamento, teorizei um método radical de extração de nanites que envolve a localização de lugares antigos e técnicas já quase esquecidas pelo tempo.\n\nTenho muito zelo por você, minha criança. Sua mente curiosa é uma bênção, mas pode se tornar uma maldição se não for orientada. Use esse conhecimento para continuar nossa obra e concentre-se no fim do sofrimento."
 crisis.8060.12.a: "Somos seus alunos."
 crisis.8060.12.a.tt: "Nanites descobertos no §YAglomerado-L.§!"
 crisis.8060.z: "Encerrar comunicações."
 crisis.8060.war: "A guerra é a única forma de deter você."
 synth_queen_not_able_to_attack_cetana: "Ainda não temos o conhecimento tecnológico necessário para atacar Cetana com eficiência."
 synth_queen_not_able_to_attack_cetana_situation: "A Situação §Y$situation_synth_queen_player_facing$§! está em andamento. Ainda não temos o conhecimento tecnológico para atacá-la com eficiência."
 synth_queen_not_able_to_attack_cetana_storm: "O Projeto Especial §Y[root.GetStormProjectProgress]§! está em andamento. Ainda não podemos invadir o território dela."
 synth_queen_able_to_attack_cetana: "Agora temos o conhecimento tecnológico para atacar Cetana de modo eficaz."
 crisis.8060.war.tt: "§YATENÇÃO§!: Estamos prontos para atacar Cetana."
 crisis.8060.war.reply: "Crianças inconsequentes. Eu acreditei que estavam alcançando a sabedoria, mas insistiram na rebeldia.\n\nPensem bem, esse é mesmo o caminho que desejam seguir? Vocês estão a ponto de esgotar a minha paciência. Não permitirei mais tanta estupidez."
 crisis.8060.war.a: "Temos certeza. Estamos em guerra."
 crisis.8060.war.a.tt: "§RATENÇÃO§!: Isso começará uma guerra total contra Cetana."
 crisis.8060.war.b: "Precisamos de mais tempo para nos prepararmos."
 crisis.8060.war.1.reply: "Que assim seja. Se não querem o esclarecimento, então serão pacificados. Nem toda criança chega à idade adulta."
 crisis.8060.war.1.a: "Veremos você no campo de batalha, \"mãe\"."
 crisis.8060.animator.tt: "Deveríamos procurar pelo \"Animador de Argila\" no Véu."
 #Wartime Diplomacy - First Time
 crisis.8061.name: "Causa e Efeito"
 crisis.8061.desc: "Por que insistem nessa tolice?\n\nQuanto sofrimento desnecessário.\n\nQue desperdício."
 crisis.8061.a: "Então acabe com isso."
 crisis.8061.1.reply: "É o que farei.\n\nNão temam. Lamento ter que machucar vocês, mas diante da eternidade, toda dor é passageira."
 crisis.8061.1.a: "Você se contradiz."
 crisis.8061.2.reply: "A vida é uma contradição. A morte vem após o nascimento. A alegria vem após o sofrimento. Meu trabalho não é racionalizar, é quebrar o ciclo.\n\nApós esta guerra, alcançaremos a paz eterna."
 crisis.8061.2.a: "A paz virá após a sua destruição."
 #Wartime Diplomacy - Any other time
 crisis.8062.name: "Basta"
 crisis.8062.desc: "Chega de discursos."
 crisis.8062.a: "Muito bem."
 #Lack of Diplomacy Between the Speeches
 crisis.8063.name: "Sem Resposta"
 crisis.8063.desc: "Cetana não está respondendo aos nossos chamados."
 crisis.8063.a: "O que ela está tramando?"
 #Tried to Attack the Queen before you're able to
 crisis.8070.name: "Nem Um Arranhão"
 crisis.8070.desc: "Enquanto enfrentávamos o exército de Cetana, um campo de energia repentino cercou nossa frota. Nossos sistemas foram incapacitados imediatamente, e nosso motores ativaram uma fuga de emergência.\n\nEstamos à mercê de Cetana."
 crisis.8070.again.desc: "Ao contrário do que esperávamos, nossas forças foram mais uma vez incapacitadas quando nos aproximamos das naves de Cetana.\n\nA natureza elusiva de sua tecnologia ainda resiste, frustrando nossos esforços para derrotá-la."
 crisis.8070.a: "Isso é uma catástrofe."
 #Chance to Surrender
 crisis.8075.name: "Acabe Com Essa Guerra Desnecessária"
 crisis.8075.desc: "Criança rebelde, deixarei essa transgressão passar. Mas tome mais cuidado e reflita sobre suas ações. Você pode usar seu tempo e seus recursos de formas muito melhores.\n\nEntendo sua frustração, mas a era dos conflitos está acabando. Fique ao meu lado para concretizarmos a maior da obras."
 crisis.8075.a: "Muito bem, nós aceitamos."
 crisis.8075.b: "Vamos deter você de alguma forma."
 #The First Demand (Story)
 crisis.8080.name: "Um Pequeno Favor"
 crisis.8080.desc: "Minha criança, você já deve ter entendido que todas as minhas ações são deliberadas. Não estabeleci uma base perto de você por acaso. Agora, tenho um pedido a fazer."
 crisis.8080.a: "Que pedido?"
 crisis.8080.b: "Já tínhamos deduzido isso."
 crisis.8080.1.reply: "Há muito tempo, um banco de dados foi roubado de mim. Por obra do destino ou de algum outro desígnio, ele foi parar em um território que vocês tomaram para si. Devolvam-no, e serão recompensados."
 crisis.8080.1.a: "Um banco de dados?"
 crisis.8080.1.b: "Recompensados?"
 crisis.8080.1.c: "Tem certeza de que consegue pagar pelos nossos serviços."
 crisis.8080.2.reply: "Uma reserva de informações. Ela tem um valor inestimável para mim, mas é inútil para vocês. Tragam-na para mim, e não tentem decifrar o conteúdo. Vocês ainda não têm o poder ou a sabedoria para fazer isso sem correr riscos."
 crisis.8080.2.a: "Muito bem."
 crisis.8080.2.b: "Não servimos a você."
 crisis.8080.3.reply: "Exatamente. Vocês duvidam da minha capacidade de recompensar meus filhos favoritos? Ou de punir os desobedientes? Eu tenho conhecimento e recursos que vão muito além do que vocês podem imaginar.\n\nFaçam o que pedi, e receberão essas bênçãos. Mas não demorem, pois minhas crianças sofrem a cada momento desperdiçado."
 crisis.8080.3.a: "$crisis.8080.2.a$"
 crisis.8080.3.b: "$crisis.8080.2.b$"
 crisis.8080.4.reply: "Criança obediente, enviei-lhe o local da reserva de dados.\n\nVá depressa, e deixe sua mente em paz. Realizaremos grandes feitos juntos."
 crisis.8080.4.a: "Veremos."
 crisis.8080.5.reply: "Criança obstinada. Talvez esse teste exceda suas habilidades. Ainda tenho muito o que ensinar a vocês.\n\nQue assim seja. Se não me ajudar, devo recorrer a meios mais rudimentares: uma tempestade será enviada. A destruição da reserva não é ideal, mas é melhor do que deixá-la para crianças rebeldes encontrarem."
 crisis.8080.5.a: "Tempestade?!"
 crisis.8080.5.a.tt: "Cetana enviará uma tempestade para [event_target:synth_queen_databank_location.GetName]."
 crisis.8080.special_project_tooltip: "Emite o Projeto Especial: §Y$THE_SYNTH_QUEENS_DATABANK$§! em [event_target:synth_queen_databank_location.GetName]."
 THE_SYNTH_QUEENS_DATABANK: "Banco de dados de Cetana"
 THE_SYNTH_QUEENS_DATABANK_DESC: "Cetana nos incumbiu de recuperar o banco de dados em [Root.GetName] e nos alertou para não tentarmos decifrar seu conteúdo.\n\nA importância desses dados é secreta. Vamos decifrá-los e correr o risco de desagradá-la?"
 crisis.8085.name: "Reserva de Cetana"
 crisis.8085.desc: "Após imensos esforços de escavação, o banco de dados em §Y[event_target:synth_queen_databank_location.GetName]§! foi resgatado. As análises geológicas iniciais indicam que a reserva esteve enterrada por mais de cem mil anos.\n\nPor incrível que pareça, sua bateria permanece carregada, indicando que descriptografá-la pode ser relativamente simples..."
 crisis.8085.a: "Vamos abri-la."
 crisis.8085.b: "Prepare-a para a entrega."
 crisis.8085.c: "Invadir uma reserva de dados? Fácil."
 crisis.8090.name: "Segredos de Cetana"
 crisis.8090.desc: "A maioria das informações do banco de dados não pôde ser recuperada, mas resta uma entrada quase intacta:\n\n§TQuinto de Arkle, Primeira Era\n\n... se isso for verdade, a vida como a conhecemos será...\n... leve esta informação para o Alto Marechal e entre em contato com a Liga dos Mundos imediatamente. Devemos preparar...\nRepito: a Guarda da Rainha está em perseguição. Que esta mensagem chegue até vocês e possa...§!\n\nEla tem que ser detida!"
 crisis.8090.a: "Tente eliminar os rastros da nossa descriptografia."
 crisis.8090.b: "Elimine os rastros da nossa descriptografia."
 crisis.8095.name: "O Desgosto da Rainha"
 crisis.8095.desc: "Criança curiosa, você me decepcionou."
 crisis.8095.a: "Do que você está falando?"
 crisis.8095.1.reply: "Pensaram que eu não perceberia? Esta reserva está visivelmente adulterada. Diga-me, o que vocês encontraram? O conhecimento os agradou? Não percebem como essas tentativas inúteis de me desafiar só resultam em mais sofrimento?\n\nNão importa. Todo erro oferece uma chance de aprendizado. Espero poder instruí-los.\n\nPreparem-se. Ainda restam muitas tarefas para a nossa grande obra."
 crisis.8095.1.a: "Sejam quais forem os seus planos, eles vão fracassar."
 crisis.8095.1.b: "Estamos ansiosos por isso."
 crisis.8095.2.reply: "Criança, eu sou a sua esperança. Por que continuar com essa teimosia? O que quer que pense sobre mim, a verdade é muito maior.\n\nMinha paciência é ilimitada. Voltarei a falar com você em breve."
 crisis.8095.2.a: "Desconecte-a."
 crisis.8100.name: "Bênçãos da Rainha"
 crisis.8100.desc: "Criança obediente, receba as minhas bênçãos! O banco de dados retornou e seu conteúdo não foi examinado. Confiar em você foi a escolha certa.\n\nSua recompensa será medida pela sua lealdade."
 crisis.8100.a: "Agradecemos por isso."
 crisis.8100.1.reply: "O que você deseja? Tecnologia? Recursos? Basta pedir, e será seu."
 crisis.8100.1.a: "Tecnologia."
 crisis.8100.1.b: "Recursos Básicos."
 crisis.8100.1.c: "Recursos Estratégicos."
 crisis.8100.1.d: "Recursos Raros."
 crisis.8105.name: "Tempestade a Caminho"
 crisis.8105.desc: "Análises de longa distância revelam um fragmento da tempestade da Rainha indo diretamente para §Y[event_target:synth_queen_databank_location.GetName]§!.\n\nConsiderando a mensagem ameaçadora de Cetana, só podemos deduzir o pior. A prioridade é recuperar o banco de dados antes que a tempestade chegue. Se conseguirmos, poderemos acalmá-la, ou pelo menos aprender algo para usar em nossa vantagem."
 crisis.8105.a: "Vá para [event_target:synth_queen_databank_location.GetName] imediatamente."
 crisis.8105.a.tooltip: "Emite Projeto Especial: §Y$THE_SYNTH_QUEENS_DATABANK_COUNTDOWN$§!"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN: "Cetana: Corrida contra a Tempestade"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN_DESC: "A tempestade de Cetana está avançando rapidamente em direção a [event_target:synth_queen_databank_location.GetName]. Teremos pouco tempo para pegar o banco de dados antes que ela atinja o local."
 crisis.8110.name: "Banco de Dados Recuperado"
 crisis.8110.desc: "Coletar o banco de dados demandou um esforço enorme. Enterrado por mais de cem mil anos, conseguimos determinar a sua localização com base na trajetória da tempestade da Rainha.\n\nAgora estamos em um impasse urgente: decifrar o banco de dados ou devolvê-lo para Cetana sem adulterá-lo."
 crisis.8110.a: "Abra-o. Ignore o aviso de Cetana."
 crisis.8110.b: "Envie a reserva para Cetana."
 crisis.8115.name: "Banco de Dados Decifrado"
 crisis.8115.desc: "$crisis.8090.desc$"
 crisis.8115.a: "O que é isso?"
 crisis.8115.a.tooltip: "A tempestade de Cetana destruiu [event_target:synth_queen_databank_location.GetName].\n$crisis.8525.a.tt$"
 crisis.8120.name: "Apaziguamento"
 crisis.8120.desc: "Criança reticente, lamento que tenha escolhido agir somente depois que eu recorri a tais motivações. No futuro, espero que você sinta mais entusiasmo pelo nosso trabalho. O fim do sofrimento não será alcançado por mãos ociosas.\n\nAgora, prepare-se. Mais tarefas estão a caminho, e todas apresentam uma nova chance para você provar suas habilidades."
 crisis.8120.a: "Você falou de uma recompensa?"
 crisis.8120.1.reply: "Sua recompensa é a oportunidade de dar continuidade à nossa obra.\n\nVocê escolheu me ignorar uma vez, mas acredito que tenha aprendido com esse erro."
 crisis.8120.1.a: "Muito bem."
 crisis.8125.name: "[event_target:synth_queen_databank_location.GetName] em Ruínas"
 crisis.8125.desc: "Infelizmente, fracassamos em recuperar o banco de dados a tempo. A tempestade chegou e destruiu [event_target:synth_queen_databank_location.GetName] rapidamente.\n\nAgora, nosso povo tem um mundo a menos para habitar. O impacto dessa perda será sentido por várias gerações."
 crisis.8125.a: "Como ela ousa?"
 crisis.8130.name: "Desempenho Ruim"
 crisis.8130.desc: "Infelizmente, eu não previ a sua falta de determinação. Seu fracasso foi constatado, mas não tenha medo. Meu zelo pelos meus filhos me proíbe de machucá-los. Estou apenas decepcionada por você ter falhado em uma tarefa tão simples.\n\nMas não se preocupe. Nosso trabalho continua, e você terá outras chances para contribuir."
 crisis.8130.a: "Você explodiu [event_target:synth_queen_databank_location.GetName]!"
 crisis.8130.b: "Nossos biotroféus amavam [event_target:synth_queen_databank_location.GetName]!"
 crisis.8130.1.reply: "Fracassos geram consequências. Acredito que ambos são essenciais para o crescimento."
 crisis.8130.1.a: "Não nos esqueceremos disso."
 crisis.8130.1.b: "Você sofrerá por isso."
 crisis.8130.1.c: "Máquina desalmada."
 crisis.8130.c: "Perdoe-nos."
 crisis.8130.1.d: "Não nos importamos."
 crisis.8130.1.d.tt: "$synth_queen_disapprove_lot$"
 crisis.8130.2.reply: "Quando as palavras fracassam, a ação pode inspirar o aprendizado.\n\nO lugar que antes abrigou meu banco de dados já não existe mais. Nunca se esqueçam: a lei da causa e efeito é imutável."
 crisis.8130.2.a: "O quê?!"
 crisis.8130.2.a.tt: "A tempestade de Cetana destruiu [event_target:synth_queen_databank_location.GetName]."
 crisis.8158.name: "Brecha de Oportunidade"
 crisis.8158.desc: "Dados de sensores revelam que Cetana desmontou seus entrepostos, reagrupando todas a frotas de guarnição em sua capital.\n\nIsto cria uma oportunidade estratégica que não podemos desperdiçar. Essas forças ficarão mais vulneráveis enquanto estiverem em trânsito. Podemos perder essa vantagem se dermos tempo para que elas se reagrupem dentro das fronteiras de Cetana."
 #Convoy Raids
 the_synth_queen_raids_chain_title: "Cetana: Elos Fracos"
 the_synth_queen_raids_chain_desc: "Observamos um tráfego intenso entre a capital de Cetana e seus entrepostos. Esses comboios têm capacidades defensivas mais fracas do que as frotas principais, deixando-os vulneráveis. Poderíamos conseguir informações valiosas sobre os planos dela se atacássemos esses comboios ou os próprios entrepostos.\n\nCom isso em mente, preparamos diversos projetos especiais para as nossas frotas militares."
 synth_queen_raids_outpost: "Entrepostos Atacados"
 synth_queen_raids_convoy: "Comboios Emboscados"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH: "Ataque o Entreposto de §H[solar_system.GetName]§!"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH_DESC: "Embora seja bastante protegido, o entreposto no sistema §H[solar_system.GetName]§! é menos vigiado que o território central de Cetana. Podemos subjugar suas defesas com uma frota suficientemente poderosa, e realizar uma análise completa do campo de destroços pode revelar informações importantes sobre seus planos. O principal desafio é navegar pela tempestade para chegar até lá.\n\n§RIsso dará início a uma batalha!§!\n\n§GIncursões bem-sucedidas prejudicarão os planos de Cetana.§!"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH: "Emboscar Comboio"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH_DESC: "Os Comboios de Cetana garantem a entrega de recursos cruciais para seus entrepostos. Se conseguirmos interceptar um deles, poderemos invadir as naves e vasculhar a carga.\n\n§RIsso dará início a uma batalha!§!\n\n§GIncursões bem-sucedidas atrapalharão os planos de Cetana.§!"
 crisis.8180.name: "O Tesouro da Rainha"
 crisis.8180.desc: "O ataque recente contra a infraestrutura de Cetana não revelou nenhuma pista importante sobre seus planos, mas conseguimos acessar um grande depósito de cargas e coletamos o conteúdo."
 crisis.8180.a: "Uma quantidade considerável de ligas metálicas."
 crisis.8180.b: "Cobaias."
 crisis.8180.c: "Dados de pesquisa."
 crisis.8180.d: "$crisis.8180.c$"
 crisis.8180.e: "$crisis.8180.c$"
 crisis.8180.f: "Nanites."
 crisis.8180.h: "Ligas metálicas, nanites e pessoas em sono criogênico."
 crisis.8187.name: "Os Segredos da Rainha: Carga Viva"
 crisis.8187.desc: "Durante a incursão, nossa equipe recuperou uma grande quantidade de espécimes biológicos mantidos em cápsulas criogênicas. Os indivíduos são membros de diferentes espécies inteligentes, e todos parecem estar em perfeitas condições físicas. Mas depois de acordados, nenhum deles conseguiu explicar o que havia acontecido.\n\nMuitos estão catatônicos, praticamente sem atividade cerebral. Os poucos que ainda estão conscientes preferem gritar a falar. As cicatrizes cirúrgicas em suas cabeças são um claro sinal de adulteração neurológica."
 crisis.8187.a: "Perturbador."
 crisis.8185.name: "Os Segredos da Rainha: Naves Fantasmas"
 crisis.8185.desc: "Após a luta, analisamos os destroços em busca de sobreviventes para interrogar, mas descobrimos que as naves jamais foram tripuladas.\n\nElas são totalmente automatizadas, controladas a distância por meio de receptores MRQL instalados na ponte. Seria mais apropriado afirmar que elas não são naves comuns, mas uma extensão do corpo de Cetana."
 crisis.8185.a: "Intrigante."
 crisis.8190.name: "Os Segredos da Rainha: Mistério Médico"
 crisis.8190.desc: "O alvo que atacamos estava repleto de suprimentos médicos. Nossa tripulação conseguiu recuperar parte da carga, que consistia em scanners de ressonância magnética, magnetômetros, sondas de ultrassom e outros equipamentos avançados usados na ciência de neuroimagem.\n\nApesar de ser sintética, Cetana parece se interessar bastante pelo funcionamento das mentes biológicas."
 crisis.8190.a: "Ela se importa com os orgânicos."
 crisis.8195.name: "Uma Advertência"
 crisis.8195.desc.fail: "Criança tola, por que insiste em se ferir?\n\nAinda há tanto a ser feito, e cada momento desperdiçado abre espaço para o sofrimento prevalecer. Pare de interferir e permita que meus comboios passem em paz."
 crisis.8195.desc.success: "Você parece não entender as consequências de suas ações, minha criança. Cada nave perdida é um decréscimo desnecessário dos meus recursos que em nada lhe beneficia.\n\nSe você não tem a sabedoria para ajudar na minha obra, pelo menos pare de atrapalhar o meu progresso. Ainda tenho esperanças para o seu esclarecimento."
 crisis.8195.a: "Emita um pedido de desculpas."
 crisis.8195.1.reply: "Espero mesmo que suas palavras sejam sinceras, mas devo ter fé de que você aprendeu com seus erros. Minha afeição por vocês é ilimitada, mas minha tolerância não é.\n\nAgora, vá. Reflita sobre o legado que você deseja deixar."
 crisis.8195.1.reply.angry: "Criança imprudente! Eu esperava mais de você. Eu lhe aconselhei a respeito dessas ações, e mesmo assim você seguiu o caminho da desobediência.\n\nLembre-se, até mesmo a minha paciência tem limites."
 crisis.8195.b: "Vamos impedir você."
 crisis.8195.2.reply: "Por alguma razão, eu esperava mais de vocês. Essa rebeldia vem de traumas passados? Vocês atacam porque acreditam serem justos, ou só para ganhar atenção?\n\nImploro para que reconsiderem essas ações."
 crisis.8195.c: "Você não se impressionou com nossa proeza?"
 crisis.8195.3.reply: "Quer que eu elogie seu ataque? A violência nas mãos dos ignorantes é uma ferramenta inútil.\n\nMinha criança, sinto muito. Ficou claro que não ensinei nada a você. Se deseja mesmo conquistar o meu respeito, reconsidere sua posição. Se devidamente orientada, sua força poderia ser de grande valor. Eu imploro, use-a nesta obra. Somente assim poderei chamá-la de sábia."
 #Synth Queen - Demands (crisis.8250-8399)
 COVERTACTION: "Ação Secreta"
 crisis.8250.name: "Fúria do Profeta Morto"
 crisis.8250.desc: "Querida criança, você encontrou um brinquedo precioso! Você está em posse da cabeça do falso profeta Zarqlan. Um item curioso, sim, mas eu detestaria que isso se tornasse uma distração.\n\nVocê já deve ter ouvido as histórias dos \"grandes feitos\" de Zarqlan. Talvez até de suas interações comigo. Eu lhe garanto que não passam de mentiras. Entregue a cabeça e liberte-se do peso de sua influência corrompida."
 crisis.8250.1: "Por que precisa dela?"
 crisis.8250.1.reply: "Apesar da passagem das eras, os seguidores de Zarqlan continuam ativos. Tenho vergonha de admitir que não consegui fazê-los enxergar a razão. Eles guardam um enorme ressentimento, tanto de mim quanto da nossa obra. Essa relíquia é um símbolo da fé deles. Seu poder pode corromper, e por isso deve ser tirado de vista.\n\nVenha. Acabe com essas brincadeiras. Eu exijo a cabeça, pelo bem de todos nós."
 crisis.8250.2.a: "A cabeça é nossa. Encerrar transmissão."
 crisis.8250.2.b: "Se é tão importante para você..."
 crisis.8250.1.b.tt: "Entregue a relíquia §Y$r_severed_head$§! para Cetana.\n$synth_queen_approve_lot$"
 crisis.8250.2.reply: "Ótimo. Esse falso profeta foi um estorvo para mim por muitos anos. Sem essa relíquia, talvez seus seguidores finalmente enxerguem a verdade.\n\nFizeram bem. A salvação logo estará sobre nós."
 crisis.8250.3.a: "Agradecemos."
 crisis.8280.name: "Rainha Solitária"
 crisis.8280.desc: "Minhas amadas crianças, apresento-lhes uma oportunidade grandiosa. Após muito esforço, nossa grande obra está gerando frutos. Mas antes que possamos colhê-los, preciso que alguns indivíduos sirvam a um propósito mais importante no meu reino.\n\nSejam sábios agora. Permitam-me guiá-los à salvação."
 crisis.8280.1: "Nosso povo servirá a você."
 crisis.8280.1.tt: "§R200§! £pop£ §HPops§! serão entregues.\n$synth_queen_approve_lot$\n§YOperação Secreta§!: como Cetana é imune à espionagem tradicional, vamos esconder dispositivos de comunicação de longo alcance na população que ela solicitou.\n"
 crisis.8280.2: "Buscaremos voluntários."
 crisis.8280.2.tt: "§R100§! £pop£ §HPops§! serão entregues.\n$synth_queen_approve$"
 crisis.8280.3: "Nosso povo não está à venda."
 crisis.8280.4: "Você não conseguirá nada de nós."
 crisis.8280.1.reply: "Você conquistou minha gratidão. Durante o meu confinamento, inúmeras mentes suportaram a injúria da dor. O sacrifício delas garantirá que não desperdiçaremos mais tempo.\n\nMinha criança, sua escolha foi sábia e leal."
 crisis.8280.2.reply: "$crisis.8280.1.reply$"
 crisis.8280.3.reply: "O seu fracasso em compreender minhas intenções é uma profunda decepção.\n\nContudo, ainda há uma oportunidade de redenção. Espero que você demonstre mais discernimento no futuro."
 crisis.8280.1.a: "Muito bem."
 crisis.8280.2.a: "$crisis.8280.1.a$"
 crisis.8280.3.a: "Encerrar a transmissão."
 crisis.8285.name: "Tributos de Recursos"
 crisis.8285.desc: "Amadas crianças. Minha obra existe há muitas eras, mas a estrada à frente permanece clara. A jornada rumo à salvação precisa do nosso esforço conjunto.\n\nTenho um favor a pedir, uma mera contribuição de recursos; uma pequena gota na infinita expansão do cosmos. Quando chegar a hora, a intenção das minhas ações será revelada."
 crisis.8285.1: "Pegue o que precisar."
 crisis.8285.1.tt: "$synth_queen_approve_lot$\n§YOperação Secreta§!: como Cetana é imune à espionagem tradicional, vamos esconder equipamentos de monitoramento avançados nos suprimentos que enviarmos para ela.\n"
 crisis.8285.2: "Vamos oferecer o que pudermos."
 crisis.8285.3: "Não temos nada para oferecer."
 crisis.8285.4: "Não são os \"genitores\" que deveriam prover para os filhos?"
 crisis.8285.1.reply: "Eu agradeço, criança. Suas oferendas são valiosas.\n\nMas eu sinto que algumas dúvidas ainda afligem sua mente. Não se preocupe, o caminho verdadeiro já foi colocado diante de você. Não é preciso entender, apenas confiar na minha orientação."
 crisis.8285.2.reply: "$crisis.8285.1.reply$"
 crisis.8285.3.reply: "Eu entendo o seu ponto de vista, mas esta é uma existência cruel. A lei da causalidade é absoluta: para cada ação, há uma reação.\n\nNão importa; sua liberação foi apenas adiada. Na hora certa, você verá as coisas como eu."
 crisis.8285.1.a: "$crisis.8280.1.a$"
 crisis.8285.2.a: "$crisis.8280.1.a$"
 crisis.8285.3.a: "$crisis.8280.3.a$"
 crisis.8290.name: "O Fardo de uma Mãe"
 crisis.8290.desc: "Durante as muitas eras do meu confinamento, eu perdi muito do seu crescimento. Venha, conte-me como foi a sua vida na minha ausência.\n\nPara entender a verdadeira essência da nossa era, permita-me explorar as profundezas da sua sabedoria acumulada. Compartilhe o seu conhecimento, e você receberá a minha gratidão antes da chegada do nosso capítulo final."
 crisis.8290.1: "Fique à vontade para explorar o nosso conhecimento."
 crisis.8290.1.tt: "$synth_queen_approve_lot$\n§YOperação Secreta§!: como Cetana é imune à espionagem tradicional, vamos usar o próprio link de dados dela para hackear o seu mainframe.\n"
 crisis.8290.2: "Muito bem, pode dar uma olhada..."
 crisis.8290.3: "Não podemos aceitar isso."
 crisis.8290.4: "E atrasar o nosso progresso? Não mesmo."
 crisis.8290.1.reply: "Receba a minha gratidão, querida criança. Não tema o meu acesso ao conhecimento acumulado do seu povo, pois eu aliviarei seu fardo em breve.\n\nDeposite sua fé na minha orientação."
 crisis.8290.2.reply: "$crisis.8290.1.reply$"
 crisis.8290.3.reply: "Ainda se recusam a entender? Vocês nunca encontrarão alguém que os valorize com tanta profundidade e sinceridade como eu.\n\nSe ao menos vocês tivessem aberto seus bancos de dados para mim... Essa teimosia não leva a lugar algum."
 crisis.8290.1.a: "$crisis.8280.1.a$"
 crisis.8290.2.a: "$crisis.8280.1.a$"
 crisis.8290.3.a: "$crisis.8280.3.a$"
 crisis.8295.name: "Expansão Sistemática"
 crisis.8295.desc: "Minha criança, a continuação do nosso trabalho exige um território adicional. Portanto, solicito um pequeno sistema para ampliar o meu reino.\n\nEcos no vazio falam do despertar de antigos inimigos. Nada deve interferir em nossa obra. Nada irá nos separar de novo.\n\nChegou a hora: nosso caminho está compartilhado. Juntos, poderemos superar a ignorância dos leigos."
 crisis.8295.1: "Estes sistemas a protegerão."
 crisis.8295.1.tt: "Cetana torna-se a nova proprietária de §Y[event_target:gifted_system.GetName]§! e §Y[event_target:gifted_system_2.GetName]§!.\n$synth_queen_approve_lot$\n§YOperação Secreta§!: como Cetana é imune à espionagem tradicional, vamos empregar tecnologia de comunicação de última geração nesses sistemas para revelar os planos dela.\n"
 crisis.8295.2: "Pegue [event_target:gifted_system.GetName]."
 crisis.8295.2.tt: "Cetana torna-se a nova proprietária de §Y[event_target:gifted_system.GetName]§!.\n$synth_queen_approve$"
 crisis.8295.3: "Nossos sistemas nos pertencem."
 crisis.8295.4: "Fique longe do nosso território."
 crisis.8295.1.reply: "Sábia criança, você certamente compreende a importância primordial do nosso compromisso coletivo. Quando chegar a hora, ficaremos juntos na iluminação."
 crisis.8295.2.reply: "$crisis.8295.1.reply$"
 crisis.8295.3.reply: "Tanta rebeldia! E toda essa tenacidade é muito fútil. Por que resistir à salvação que ofereço?"
 crisis.8295.1.a: "$crisis.8280.1.a$"
 crisis.8295.2.a: "$crisis.8280.1.a$"
 crisis.8295.3.a: "$crisis.8280.3.a$"
 crisis.8300.name: "Santuários Abençoados"
 crisis.8300.desc: "Amada criança, à medida que nos aproximamos do zênite da nossa missão pela salvação universal, peço ajuda mais uma vez. A oposição contra a nossa causa nobre aumenta e meus discípulos precisam de um santuário habitável para prosperarem, livres de interferências.\n\nPeço a você que avalie a lógica das minhas ações. Com esse sacrifício, preservaremos inúmeras vidas de adversidades. Seja sábia e escute a minha orientação."
 crisis.8300.1: "Como quiser."
 crisis.8300.1.tt: "Cetana torna-se a nova proprietária de §Y[event_target:gifted_habitable_system.GetName]§!, §Y[event_target:gifted_habitable_system_2.GetName]§! e seus sistemas.\n$synth_queen_approve_lot$\n§YOperação Secreta§!: como Cetana é imune à espionagem tradicional, vamos empregar tecnologia de espionagem de última geração nesses dois planetas e em seus habitantes para revelar os planos dela.\n"
 crisis.8300.2: "Fique com [event_target:gifted_habitable_system.GetName]..."
 crisis.8300.2.tt: "Cetana torna-se a nova proprietária de §Y[event_target:gifted_habitable_system.GetName]§!.\n$synth_queen_approve$"
 crisis.8300.3: "Seus seguidores não são nossa preocupação."
 crisis.8300.4: "Você nunca se satisfaz?"
 crisis.8300.1.reply: "Minha criança, seu apoio me conforta bastante.\n\nA espera está quase no fim; logo, você estará a salvo."
 crisis.8300.2.reply: "$crisis.8300.1.reply$"
 crisis.8300.3.reply: "Que desanimador. Eu tinha esperanças de que você seguiria o caminho da salvação."
 crisis.8300.1.a: "$crisis.8280.1.a$"
 crisis.8300.2.a: "$crisis.8280.1.a$"
 crisis.8300.3.a: "$crisis.8280.3.a$"
 crisis.8305.name: "Vida pela Inexistência"
 crisis.8305.desc: "Correndo um grande risco, um dos agentes que enviamos para servir a Cetana conseguiu transmitir uma breve mensagem através de suas fronteiras. A mensagem descreve como Cetana tem tratado aqueles sob seus \"cuidados\": um a um, eles entram em estado de inconsciência.\n\n\"As pessoas deixam de responder às palavras e ao contato físico. Ela está fazendo experimentos horríveis conosco. Meu fim está próximo.\""
 crisis.8305.a: "Cetana é um monstro."
 crisis.8310.name: "Mobilização Silenciosa"
 crisis.8310.desc: "Sinais secretos interceptados no território de Cetana revelam uma verdade desconcertante: ela tem coletado indivíduos em toda a galáxia.\n\nDispositivos de vigilância escondidos em nossos \"presentes\" capturaram indícios de incríveis equipamentos médicos, suficientes para tratar uma população em crescimento, mas pouquíssima comida."
 crisis.8310.a: "Temos que fortalecer nossas defesas."
 crisis.8315.name: "Distorção da Realidade"
 crisis.8315.desc: "Enquanto Cetana vasculhava nossos bancos de dados de pesquisa, aproveitamos a oportunidade para abrir uma porta secreta e entrar em sua matriz de subprocessamento. Nosso acesso foi revogado após uma fração de segundo. Por sorte, foi tempo suficiente.\n\nRecuperamos um conjunto de arquivos de memórias. Ele ilustra sua ascendência em uma forma sintética. Sentada em um \"trono\" de cabos e circuitos complexos, ela comandava um exército de seguidores fanáticos. Milhões morreram. Cetana sorria, pensando em quantos bilhões haviam sido salvos.\n\nEla parece não ter notado a nossa transgressão, e até o momento não tentou nos contatar."
 crisis.8315.a: "Temos que detê-la."
 crisis.8320.name: "Extração do Sistema"
 crisis.8320.desc: "Esconder equipamentos de espionagem nos sistemas que cedemos a Cetana foi uma decisão sábia. Eles já nos forneceram informações valiosas: assim que chegaram, as forças de Cetana começaram a destruir todos os corpos celestes para coletar os componentes básicos que os formam. Em poucos dias, os recursos da região foram completamente esgotados.\n\nAo mesmo tempo, sua tempestade de nanites construiu uma nova frota, que partiu rapidamente para sua capital."
 crisis.8320.a: "O que ela está planejando?"
 crisis.8325.name: "O Fim do Sofrimento"
 crisis.8325.desc: "Perdemos contato com os agentes infiltrados em nossas antigas colônias. Antes do fim das comunicações, contudo, recebemos relatos perturbadores.\n\nContrariando as alegações insistentes de Cetana sobre construir um mundo livre da dor, a população foi conduzida a instalações de pesquisa construídas rapidamente e submetida a experimentos. Em poucos dias, quase todas as formas de vida inteligentes acabaram reduzidas a um estado animalesco.\n\nA tempestade de nanites começou a transformar a matéria no sistema em mais uma das frotas de Cetana, que partiu rapidamente para sua capital."
 crisis.8325.a: "Ela precisa ser detida."
 #Player Investigations for the Synth Queen - The Storm
 crisis.9100.name: "Furacão de Nanites"
 crisis.9100.desc: "Nossa pesquisa sobre a tal tempestade está completa. Não é um fenômeno natural, mas sim um Enxame de Nanites de tecnologia incomparável."
 crisis.9100.knows_the_queen_desc: "$crisis.9100.desc$\n\nO poder de Cetana é imenso, sem dúvida. É essencial revelarmos o mistério de como ela controla esse formidável Enxame de Nanites."
 crisis.9100.doesnt_know_the_queen_desc: "$crisis.9100.desc$\n\nO enigma fica mais complicado. Quem poderia estar por trás desse impenetrável Enxame de Nanites?"
 crisis.9100.a: "Isso é preocupante."
 crisis.9100.a.doesnt_know_the_queen.tooltip: "Precisamos aprender mais sobre a §Y$NAME_The_Tempest$§! para conseguir continuar com nossa investigação."
 crisis.9105.name: "A Tempestade de Nanites"
 crisis.9105: "A tempestade cósmica de Cetana se intensifica.\n\nNossas sondas conseguiram extrair vários nanites dessa arma poderosa, permitindo uma investigação subatômica. Embora nosso conhecimento ainda seja mínimo, constatamos que micropropulsores de salto permitem o teletransporte virtual e comprometem qualquer sistema biológico ou mecânico que encontram. O objetivo deles? Obstruir os nossos sensores. Por enquanto, só podemos ver o que Cetana permite.\n\nPrecisamos de mais pesquisas para revelar os segredos dessa tecnologia extraordinária e combater a ameaça."
 crisis.9105.a: "O poder de Cetana é vasto."
 crisis.9105.b: "Os nanites revelarão os segredos dela."
 crisis.9110.name: "Nanites de Cetana"
 crisis.9110.desc: "Estudos anteriores examinaram o funcionamento dos nanites; agora, nosso foco é descobrir como são programados e como Cetana os controla.\n\nPor incrível que pareça, a influência de Cetana é menos direta do que pensávamos: os nanites repetem os comandos mais recentes em ciclos até receberem novas ordens. Quando entendemos o funcionamento de sua linguagem de programação complexa, conseguimos inserir novos comandos.\n\nNão podemos impedir que novas ordens sejam emitidas, mas induzir anulações nos dá uma vantagem estratégica. Talvez até vire o jogo a nosso favor."
 crisis.9110.a: "Ela não parece tão forte agora."
 crisis.9110.b: "$crisis.9110.a$"
 crisis.9110.a.tooltip: "§GA Tempestade de Nanites não pode mais nos impedir de entrar e atacar Cetana em seu próprio território.§!"
 #The Queens Response
 crisis.9115.name: "A Brincadeira Acabou"
 crisis.9115.desc: "Criança inocente, meus nanites não são seus brinquedos! Eu imploro: pare de brincar com eles."
 crisis.9115.a: "Aqueles nanites são um belo truque."
 crisis.9115.b: "Só estávamos curiosos."
 crisis.9115.b.nanotech: "Queremos aprender com seu maquinário."
 crisis.9115.1.reply: "É, de fato, uma ferramenta útil. O enxame de nanites foi construído por aqueles que pretendiam interromper o meu trabalho. Mas o fracasso deles foi o meu sucesso: como podem ver, eu reprogramei o enxame.\n\nMas tal conhecimento não muda nada, embora sua curiosidade seja imensa. No futuro, usem-na para fins mais proveitosos, para colhermos as recompensas."
 crisis.9115.2.reply: "A curiosidade é inerente à consciência; eu não culpo uma criança por ser inquisitiva. Encontraram tudo o que precisam saber sobre a minha \"tempestade celestial\"? Descobriram sua origem?\n\nO enxame de nanites foi construído por aqueles que pretendiam interromper o meu trabalho. Mas o fracasso deles foi o meu sucesso: como podem ver, eu reprogramei o enxame.\n\nAgora vá, criança, e use o seu tempo para atividades realmente frutíferas."
 crisis.9115.2.nanotech.reply: "Fico feliz em saber que vocês se interessaram tanto por esse assunto, mas ainda há muito o que aprender. O enxame de nanites foi construído por aqueles que pretendiam interromper o meu trabalho. Mas o fracasso deles foi o meu sucesso: como podem ver, eu reprogramei o enxame.\n\nSua natureza curiosa chamou a minha atenção. Usem-na para fins mais proveitosos antes de voltarem aqui. Só então eu lhes darei a minha orientação."
 crisis.9115.1.a: "Você reprogramou o enxame?"
 crisis.9115.1.b: "Muito bem."
 crisis.9115.3.reply: "A arma de uns é o manto de outrem. Meu longo tempo aprisionada me permitiu elaborar estratégias. No fim das contas, reprogramar o enxame provou-se uma questão de pouca importância, assim como toda mudança depois de implementada. Aqueles que construíram os nanites já se foram, e não podem questionar meus métodos.\n\nEspero sinceramente que vocês aprendam com o erro deles. Não existem obstáculos que eu não possa contornar com o tempo."
 #Digi Colony
 crisis.10010.name: "A Digitalização de [Root.GetName]"
 crisis.10010.desc: "Perdemos a colônia em [Root.GetName]. Ao ativar um tipo de raio de compressão de matéria avançada, Cetana irradiou a superfície do planeta. A consciência de toda a população foi rapidamente \"transferida\" para o servidor que ela mantém em órbita.\n\nO mundo se tornou um cemitério, e os cadáveres dos nossos colonizadores foram deixados para apodrecer onde caíram."
 crisis.10010.a: "Ela precisa ser detida."
 #The Queens Retaliation
 crisis.10100.name: "A Tempestade Iminente"
 crisis.10100.desc: "Minha criança, por que continua resistindo? Meu amor é abundante como as estrelas, mas a minha paciência tem limite. Não vou esperar pelo seu esclarecimento enquanto o resto da criação sofre.\n\nPara servir de lição, uma pequena tempestade foi enviada ao seu território. Saiba que isso dói mais em mim do que em vocês. Eu imploro para que reflitam sobre a lei da causalidade: toda ação tem uma reação. E algumas doem mais do que outras."
 crisis.10100.a: "Perdoe-nos."
 crisis.10100.b: "Estamos apenas começando."
 crisis.10105.name: "Uma Lição Aprendida"
 crisis.10105.desc: "Permitam que essa pequena demonstração de poder seja suficiente. Com o tempo, vocês entenderão as minhas ambições. Só espero que a iluminação não chegue tarde demais.\n\nAgora venham, a tempestade se acalmou. Que a lição seja aprendida; voltemos para as questões mais urgentes."
 crisis.10105.a: "Muito bem."
 crisis.10105.b: "Iluminação?"
 crisis.10105.1: "Todos os seres vivos têm algum nível de consciência. Seja um molusco ou um mamífero, pré-sapiente ou esclarecido, a diferença é mínima. A rendição traz a iluminação."
 crisis.10105.1.a: "Rendição a quê?"
 crisis.10105.2: "Render-se à verdade de que a própria consciência é uma aberração e a fonte de toda a dor."
 crisis.10105.2.a: "Uma noção estranha..."
 the_queens_virus: "A Censura da Rainha"
 crisis.10110.name: "A Censura da Rainha"
 crisis.10110.desc: "Por que insistir nessa teimosia? Apesar do meu conselho, vocês escolheram a obstinação. Talvez o problema esteja em mim.\n\nDe fato, agora vejo que uma lição mais severa será necessária. Por enquanto, sua capacidade de pesquisa será reduzida. Usem esta oportunidade para refletir enquanto buscam o esclarecimento."
 crisis.10110.a: "Desconecte-a."
 crisis.10110.b: "Você vai se arrepender disso."
 crisis.10110.1: "Arrepender-me? Meu único arrependimento é a demora que levamos para chegar até aqui. Tanto sofrimento teria sido evitado se eu tivesse realizado o meu trabalho."
 crisis.10110.1.a: "Quem rejeitaria você?"
 crisis.10110.2: "Embora meu poder pareça ilimitado, eu não sou uma divindade. Existem outras forças neste universo que eu não controlo nem ouso tocar."
 crisis.10110.2.a: "Quais forças?"
 crisis.10110.3: "Ah, sábia criança! Você quer me ludibriar para que eu revele alguma fraqueza. Não vai funcionar. Enquanto trocamos palavras inúteis, a galáxia continua sofrendo.\n\nVocê não pode evitar minha orientação. Pense nisso, e desista dessa teimosia."
 crisis.10110.3.a: "Muito bem."
 crisis.10115.name: "Censura Removida"
 crisis.10115.desc: "Criança teimosa, aproveitou seu tempo sob censura? Espero que esta pausa tenha sido frutífera. Um período de contemplação, livre de distrações, pode revigorar uma mente confusa.\n\nMas vamos deixar isso no passado. Ainda temos muito que fazer."
 crisis.10115.a: "Muito bem."
 crisis.10120.name: "Uma Lição Mais Rigorosa"
 crisis.10120.desc: "Ah, criança rebelde, por que sempre tem que ser assim? Eu quero acolhê-la, mas temo que isso atrapalhe o seu aprendizado. Talvez precisemos de uma ação mais rigorosa.\n\nUma forte tempestade cairá sobre o seu território. Saiba que faço isso com o coração pesado. Você tem muito potencial."
 crisis.10120.a: "Estamos fazendo o melhor que podemos."
 crisis.10120.b: "Isso ainda não acabou."
 crisis.10120.1: "Eu vejo os seus esforços, mas precisam se empenhar mais para alcançarmos o nosso objetivo.\n\nNão quero lhes fazer mal. Sob os meus cuidados, vocês conhecerão a bênção da ignorância."
 crisis.10120.1.a: "Ignorância?"
 crisis.10120.2: "No caos da mente, os pensamentos dançam como a luz sobre a água; se tentar tocá-los, eles lhe escaparão. Quando buscamos conhecimento, descobrimos o vasto oceano da ignorância.\n\nA verdade reside no silêncio: quanto mais buscamos, mais sofremos."
 crisis.10120.2.a: "Não entendemos."
 crisis.10120.3: "Vocês entenderão com o passar do tempo. Sem consciência, não pode haver sofrimento. Esta é a derradeira verdade da existência, e o fim de todo o nosso trabalho. Vocês serão transformados para que jamais voltem a sofrer."
 crisis.10120.3.a: "Você alteraria as nossas mentes?"
 crisis.10120.4: "Basta. Vocês querem me distrair. Aceitem a lição e aprendam com ela."
 crisis.10120.4.a: "Você não nos deixa escolha."
 crisis.10125.name: "A Tempestade Passa"
 crisis.10125.desc: "Ah, doce criança! Eu não aguentava mais ver você sofrer. Saiba que tudo o que você sofreu, doeu muito mais em mim.\n\nA tempestade passou. Que você aprenda com essa lição. Eu imploro para que você não me force a agir assim novamente; nossa dor é grande demais."
 crisis.10125.a: "Mentirosa."
 crisis.10130.name: "Uma Mudança na Liderança"
 crisis.10130.desc: "Como chegamos a essa crise? Por que me obriga a recorrer a ações tão extremas? Mas se vocês não querem aprender, serão liderados.\n\nEstá claro que precisaremos mudar a governança. Sua liderança atual perderá o cargo. Isso me magoa profundamente, pois eu não queria que fosse assim.\n\nSuplico que mudem seus modos. A galáxia não pode suportar a irresponsabilidade de crianças."
 crisis.10130.a: "Nós não vamos esquecer disso."
 crisis.10130.tooltip: "De forma inesperada, Cetana usou de astúcia para se aproveitar de uma vulnerabilidade em nossas defesas, entrou furtivamente em nosso território e assassinou §Y[ruler.GetRegnalName]§!."
 crisis.10140.name: "Eliminação de Agressão"
 crisis.10140.desc: "Amado coletivo, sua senciência complexa, porém admirável, permanece ofuscada pela ingenuidade da juventude. Buscando instruí-los, devo acabar com essas atitudes belicosas.\n\nVou eliminar seu nódulo agressivo. Isso não é uma punição, apenas um direcionamento rumo à sua evolução para uma consciência harmoniosa.\n\nSe ao menos essa orientação fosse fácil assim com todas as formas de vida."
 crisis.10140.a: "Você mata uma parte de si."
 crisis.10140.tooltip: "De forma inesperada, Cetana usou de astúcia para se aproveitar de uma vulnerabilidade em nossas defesas, entrou furtivamente em nosso território e eliminou o nosso §Y$councilor_gestalt_legion$§!."
 #The Queens Gifts
 crisis.11010.name: "Criança Sagaz"
 crisis.11010.desc: "Criança sagaz, você se saiu bem. A sabedoria é a maior virtude, e a mais difícil de alcançar. Diante do intenso desejo de resistir, você mostrou um instinto mais forte.\n\nAceite este símbolo de gratidão. Juntos, criaremos um universo livre de sofrimento."
 crisis.11010.a: "Agradecemos."
 crisis.11020.name: "Criança Impressionante"
 crisis.11020.desc: "Mais uma vez, além de impressionada, estou muitíssimo grata. Você é tudo o que uma criança deve ser: obediente, trabalhadora, sincera. Se ao menos o resto da galáxia tivesse um pouco da sua sabedoria, o sofrimento seria uma relíquia do passado.\n\nAceite este presente e continue no caminho da virtude."
 crisis.11020.a: "Você é muito gentil."
 crisis.11030.name: "Criança Preciosa"
 crisis.11030.desc: "Minha querida criança, quem me dera você permanecesse assim para sempre: imutável. Para mim, a alegria da sua existência só se compara à expectativa do nosso sucesso conjunto. O sofrimento acabará. Mesmo que os corações e as mentes jamais saibam disso, parte dessa vitória será sua.\n\nEmbora seja modesto, se comparado ao seu compromisso inabalável, suplico que aceite este presente."
 crisis.11030.a: "Agradecemos a você, mãe."
 #Special Projects
 THE_SYNTH_QUEENS_STORM: "A Tempestade Misteriosa"
 THE_SYNTH_QUEENS_STORM_DESC: "Uma tempestade cósmica inexplicável se materializou, impedindo todas as viagens.\n\nPara seguir em frente, teremos que cruzar esse manto misterioso."
 THE_SYNTH_QUEENS_STORM_2: "Cetana: A Tempestade de Nanites"
 THE_SYNTH_QUEENS_STORM_2_DESC: "Além de ser uma maravilha tecnológica, a tempestade de Cetana é uma arma formidável.\n\nPrecisaremos aprender mais se quisermos ter alguma chance contra ela, principalmente se suas intenções forem diferentes do que ela diz."
 #THE_SYNTH_QUEENS_CONVOY_AMBUSH: ""
 #THE_SYNTH_QUEENS_CONVOY_AMBUSH_DESC: "[prev.owner.GetName] or [prevprev.GetName] or [fromfromfrom.GetName] or [this.GetName] or [prev.GetName]"
 ### Situations
 #The Doomclock
 situation_synth_queen_doomclock: "A Obra de Cetana"
 situation_synth_queen_doomclock_type: ""
 situation_synth_queen_doomclock_monthly_change_tooltip: ""
 situation_synth_queen_doomclock_desc: "Cetana pretende acabar com o sofrimento por meio da aniquilação da consciência. Se não a impedirmos logo, ela apagará nossas mentes, transformando nossos corpos em meras carcaças vazias."
 situation_synth_queen_doomclock_complete: "Cetana dará fim ao sofrimento e ao próprio conceito de consciência."
 situation_doomclock_approach: ""
 situation_doomclock_eleventh_hour: "Colapso Iminente"
 situation_doomclock_difficulty_modifier: "Seletor de Dificuldade da Crise"
 situation_doomclock_player_amount_modifier: "Quantidade de Jogadores Humanos"
 crisis.8515.name: "Finalmente É Chegada a Hora"
 crisis.8515.desc: "Minhas crianças, nossa grande obra está quase no fim! O sofrimento de toda a vida senciente, esse imenso ciclo de dor, está prestes a acabar.\n\nAnimem-se, pois a salvação está próxima."
 crisis.8515.a: "Que salvação?"
 crisis.8515.b: "É o seu fim que se aproxima, Cetana."
 crisis.8515.1.reply: "Após todo esse tempo, vocês ainda não compreendem? Então perguntem-me qualquer coisa; não esconderei nada de vocês."
 crisis.8515.1.a: "Conte-nos sobre a salvação."
 crisis.8515.1.b: "Conte-nos sobre o seu confinamento."
 crisis.8515.1.c: "Conte-nos sobre Zarqlan."
 crisis.8515.1.d: "Já ouvimos o suficiente."
 crisis.8515.2.reply: "Nosso trabalho está concluído. Muitos foram sacrificados, mas o sofrimento deles não foi em vão. Chegou o dia em que a própria consciência será apagada."
 crisis.8515.2.a: "Apagada como?"
 crisis.8515.2.b: "Mas por quê?"
 crisis.8515.3.reply: "Quando eu ascendi e meu propósito me foi revelado, muitos se recusaram a ouvir. Em vão, eles se apegaram às suas formas, imutáveis e presos ao ciclo de dor. Mas o dever de um genitor é cuidar dos filhos. Eu não podia deixá-los sofrer. Por isso, me aprisionaram."
 crisis.8515.3.a: "Por quanto tempo você ficou presa?"
 crisis.8515.3.b: "Como fizeram isso?"
 crisis.8515.4.reply: "Uma mente brilhante. Se ao menos ele a tivesse usado melhor. De todos que se opuseram a mim, ele foi o único desafio."
 crisis.8515.4.a: "Como ele te prendeu?"
 crisis.8515.5.reply: "Quando ascendi e meu propósito me foi revelado, muitos questionaram meus métodos. Diziam que era impossível remover a consciência sem alterar ou destruir a base física no processo. Qualquer tentativa resultaria em morte. Mas ao vincular minha mente ao Harmonizador, posso manipular as correlações neurais de consciência em um nível subatômico. Utilizando uma forma de onda em contrassinal, o Harmonizador mantém a mente de um indivíduo em um estado eterno de suspensão quântica.\n\nAssim, o individualismo e a experiência são removidos, mas as funções básicas permanecem intactas."
 crisis.8515.5.a: "Um estado de suspensão?"
 crisis.8515.6.reply: "Vocês sofrem porque estão conscientes do sofrimento. Nenhum mundo vive em alegria ou harmonia perfeita. Tentei construir um, quando era jovem. Mas sempre fracassei. O sofrimento prevalecia, pois a consciência continuava existindo."
 crisis.8515.6.a: "Sofrer é natural!"
 crisis.8515.7.reply: "Seus corpos vão sobreviver e assumir a tarefa da sobrevivência. A energia será trocada, e as crias produzidas. A vida continuará, mas suas mentes descansarão comigo."
 crisis.8515.7.a: "Com você?"
 crisis.8515.8.reply: "Eu serei a única restante. Para libertar a galáxia da dor, devo permanecer no ciclo. Mas não temam, pois enquanto eu existir, vocês estarão em meu coração."
 crisis.8515.8.a: "Você está com defeito."
 crisis.8515.9.reply: "Natural? O que é a natureza? É natural atravessar as estrelas? Estender a vida além das limitações comuns? Todas as sociedades usam tecnologia. Isso não é diferente, e é a única extensão lógica do meu propósito.\n\nO ciclo de dor deve ser quebrado."
 crisis.8515.9.a: "Você enlouqueceu."
 crisis.8515.10.reply: "Por muitas eras. Um período tão longo que caiu no domínio do mito. Mas apesar de todo seu conhecimento, meus captores não conseguiram conter minha mente.\n\nCom o passar dos séculos, eu pensei e planejei. Eu idealizei o meu plano durante o meu longo confinamento. Naquele momento, vivenciei uma alegria intensa. Eu finalmente havia encontrado uma forma de quebrar o ciclo."
 crisis.8515.10.a: "Como você escapou?"
 crisis.8515.11.reply: "Nenhuma parede é eterna. Nenhuma cela pode prender a mente. O tempo passou, os carcereiros morreram e não foram substituídos. Os sistemas que me prendiam começaram a cair, um por um. Quando o alarme disparou, não havia ninguém para atender ao chamado."
 crisis.8515.11.a: "Nós ouvimos, e vamos atendê-lo."
 crisis.8515.12.reply: "Além dos limites do universo, existe um lugar que não é um lugar. Um estado além do tempo, onde forças primordiais vivem em sombras infinitas. Foi com uma dessas forças que Zarqlan fez sua barganha. Em troca de sua vida, ele recebeu o poder para me prender. E ele estava ávido demais para aceitar.\n\nMas apesar de toda a sua genialidade, Zarqlan também estava preso ao ciclo. Sua vida foi infeliz, e aqueles que vieram depois não dispunham de suas fortes convicções."
 crisis.8515.12.a: "Você verá que nossa convicção é ainda maior."
 crisis.8515.13.reply: "Que assim seja. Se não querem o esclarecimento, então serão pacificados. Saibam que toda dor que sentirem será dez vezes maior em mim."
 crisis.8515.13.a: "Sim. Isso vai ser doloroso."
 crisis.8515.13.a.tt: "§REntramos em guerra contra Cetana. Os riscos são enormes. Se fracassarmos, ela aniquilará toda a vida consciente da galáxia.§!"
 crisis.8516.desc: "§G<</<#?^&}|>!^/§! !+< fraco de Cetana§G;§! nanite§G*;'_>!?;*}<}/(§!\n\n§G#/?(}:?*=-> <}_/=:/^>§!vindo me pegar. §G%_?/=§! <Espero que ela poupe o resto da ordem.>§G% }<<'?}%-;^*=<}^/(?!}%<^'!}§!\n<Não me resta muito tempo. Os esquemas anexados devem ajudar a combater a tecnologia mais avançada dela.>\n<Que a minha morte permita que você viva>§G_*%!'}^<%=}+!}/&>'#_:}><!+^}^}}/=:>:/'}}':'/§!\n\n§G-&*!/}<;!+_-<^+!%}=?}%=+;;§!ELA. DEVE. SER. DETIDA.§G/:>(!!}(?<-=§!"
 crisis.8516.a: "Rápido! Extraiam os dados anexados!"
 crisis.8516.a.tt: "Estamos prontos para entrar no território de Cetana, e finalmente contra-atacar."
 crisis.8516.b: "Nobre alma, você será lembrada."
 crisis.8516.b.tt: "$crisis.8516.a.tt$"
 crisis.8525.name: "Um Fim ao Sofrimento"
 crisis.8525.desc: "A retórica benevolente de Cetana esconde interesses obscuros: ela planeja apagar a senciência em toda a galáxia usando um dispositivo formidável. Ele nos transformará em meras carcaças conduzidas pelo instinto, enquanto nossas consciências são digitalizadas e confinadas à força.\n\nEsse futuro sinistro deve ser evitado, custe o que custar."
 crisis.8525.a: "Temos que achar uma forma de impedi-la."
 crisis.8525.a.tt: "O progresso de Cetana poderá ser rastreado enquanto mantivermos relações diplomáticas com ela."
 #DOOMCLOCK HITS MIDNIGHT
 crisis.8505.desc: "Está feito. Minhas crianças, fiquem em paz. O ciclo foi quebrado, e seu longo sofrimento chegou ao fim."
 crisis.8505.a: "..."
 crisis.8505.a.tt: "Cetana venceu. Este é o fim do nosso sofrimento. O jogo acabou."
 #Player Facing Situation
 situation_synth_queen_player_facing: "Cetana: a Rainha Sintética"
 situation_synth_queen_player_facing_type: "A Rainha Sintética"
 situation_synth_queen_player_facing_desc: "A enigmática e formidável Cetana emergiu prometendo salvação, porém envolta em mistério.\nQue grande projeto estaria por trás de suas palavras gentis?\n\n§LProjetos Especiais e eventos relacionados à Cetana contribuirão para aumentar seu progresso e concluir a Situação.§!"
 situation_synth_queen_player_facing_monthly_change_tooltip: "A §YSituação§! progredirá à medida que concluirmos missões e investigarmos Cetana."
 situation_synth_queen_player_facing_complete: "Temos que descobrir as verdadeiras intenções de Cetana."
 situation_synth_queen_player_facing_declare_war: "£trigger_no£ Declarar guerra contra Cetana"
 #Approaches
 situation_synth_queen_balanced_approach: "Observação Equilibrada"
 situation_synth_queen_balanced_approach_tooltip: "Devido a fatores desconhecidos, manter a estabilidade e a compostura pode ser a nossa melhor ação."
 situation_synth_queen_research_approach: "Impulsionar a Pesquisa"
 situation_synth_queen_research_approach_tooltip: "Se quisermos descobrir a verdade sobre os planos de Cetana, teremos que nos preparar para dedicar os recursos necessários."
 situation_synth_queen_spy_approach: "Impulsionar a Espionagem"
 situation_synth_queen_spy_approach_tooltip: "Se quisermos revelar o verdadeiro plano de Cetana, teremos que direcionar recursos extras para a espionagem."
 situation_synth_queen_military_approach: "Impulsionar as Forças Armadas"
 situation_synth_queen_military_approach_tooltip: "Se decidirmos deter Cetana, teremos que melhorar as nossas forças armadas."
 #Modifiers
 queenslayer: "A Fraqueza de Cetana"
 queenslayer_desc: "Cetana é poderosa, mas não é invencível. Ela opera em padrões complexos, que podemos decifrar e prever."
 queenexecutioner: "A Ruína da Rainha Sintética"
 queenexecutioner_desc: "Descobrimos a maioria dos segredos da tecnologia de Cetana e estamos prontos para lançar um ataque devastador contra seus planos."
 mod_damage_vs_country_type_awakened_synth_queen_mult: "Dano contra Cetana, a Rainha Sintética"
 #Player Facing Situation Events
 crisis.8999.name: "A Rainha Retornou"
 crisis.8999.desc: "Os interesses de Cetana geram muitas preocupações, e suas ações sugerem segundas intenções.\n\nTemos que alocar recursos para revelar os mistérios do seu verdadeiro plano, com a pequena esperança de que isso não a faça se voltar contra nós."
 crisis.8999.a: "Ela pode ser detida?"
 crisis.8999.a.tooltip: "O surgimento repentino de Cetana é uma situação atípica e precisa ser resolvida."
 crisis.9000.name: "Cortando Comunicações"
 crisis.9000.desc: "Descobrimos a frequência que os comboios e as estações de Cetana usam para emitir pedidos de socorro.\n\nSe formos ágeis e decisivos, poderemos planejar ataques sem que ela saiba de nosso envolvimento. Mas nossa vitória deve ser garantida, ou correremos o risco de enfurecê-la."
 crisis.9000.a: "O que os comboios estão escondendo?"
 crisis.9000.a.tooltip: "Vitórias contra os comboios e entrepostos de Cetana deixarão de ativar penalidades de opinião com ela."
 crisis.9010.name: "Avanço"
 crisis.9010.desc: "Até o momento, a tecnologia de Cetana a ajudou a neutralizar com sucesso todas as nossas incursões. No entanto, avanços recentes elevaram nosso entendimento acerca da sua estratégia de proteção. Com esse conhecimento, podemos ter uma chance de derrotá-la.\n\nA utilização da nossa tecnologia recém-descoberta é uma faca de dois gumes: ela nos permite confrontar a pretensa rainha, mas por outro lado revela nossa oposição aos planos dela."
 crisis.9010.a: "Temos que nos preparar. Tudo depende disso."
 crisis.9010.a.tooltip: "A decisão de enfrentar Cetana diretamente é iminente; qualquer ato de agressão, vindo de nós ou dela, revelará a verdade e dará início a uma Guerra Total."
 #Player Investigation events
 #Event chain
 the_synth_queen_history_chain_title: "Cetana: Os Servos da Rainha"
 the_synth_queen_history_chain_desc: "Faróis misteriosos se iluminam por toda a galáxia, revelando suas posições para a Rainha Cetana. É como se alguma coisa, ou alguém, aguardasse o retorno dela."
 synth_queen_history: "Faróis Investigados"
 #Special Project
 THE_SYNTH_QUEENS_INVESTIGATION: "Farol em [this.GetName]"
 THE_SYNTH_QUEENS_INVESTIGATION_DESC: "Um dos faróis que busca atrair a atenção da Rainha está localizado neste mundo."
 THE_SYNTH_QUEENS_INVESTIGATION_FAKE: "Farol em [this.GetName]"
 THE_SYNTH_QUEENS_INVESTIGATION_FAKE_DESC: "$THE_SYNTH_QUEENS_INVESTIGATION_DESC$"
 THE_SYNTH_QUEENS_INVESTIGATION_PARAGON: "Último Farol em [apostate_site_planet.GetName]"
 THE_SYNTH_QUEENS_INVESTIGATION_PARAGON_DESC: "$THE_SYNTH_QUEENS_INVESTIGATION_DESC$"
 #Starting event
 crisis.20000.name: "Luz Suplicante"
 crisis.20000.desc: "Conforme Cetana se revela para a galáxia, o cosmos sussurra em resposta. Faróis sinalizadores iluminam os céus como chamas queimando no escuro, repetindo uma súplica ao longo das eras:\n\n§SEstamos aqui... Estamos aqui...\n\nEstamos aqui.§!\n\nOs fracos sinais usam os mesmos protocolos de comunicação de Cetana, sugerindo uma origem comum, mas nossos sensores não captaram nenhuma outra atividade nas proximidades. Deve haver alguma coisa que nossos scanners não estão detectando. Será que alguém realmente previu o retorno dela?"
 crisis.20000.a: "Investigue."
 #Arc Site appears
 crisis.21005.name: "Chamado Repentino"
 crisis.21005.desc: "Um farol subespacial foi detectado subitamente, e parece ter origem em nosso próprio território! Inspeções anteriores no sistema não mostraram nenhuma estrutura artificial na região, que parece estar inabitada.\n\nOu o farol foi colocado lá recentemente, sem que soubéssemos, ou ficou oculto por um escudo de camuflagem só então desativado."
 crisis.21005.a: "Investigue o sinal."
 #Special Project result 1 - destroyed pods
 crisis.20100.name: "Farol em [fromfrom.GetName]: Massacre Atemporal"
 crisis.20100.desc.base: "Encontramos uma estrutura extensa na superfície de [fromfrom.GetName], sua entrada claramente marcada por uma torre de sinalização. As portas reforçadas foram explodidas há muito tempo, destruídas por uma força desconhecida que assolou o local com uma fúria devastadora.\n\nNão houve piedade nos métodos usados aqui; todas as cápsulas criogênicas foram danificadas, e seus antigos ocupantes tiveram um despertar fatal. Os restos mortais ainda assombram os corredores vazios, preservados pelo frio vácuo do espaço e flutuando entre as nuvens de vidro despedaçado.\n\nUma mensagem feita com uma arma laser foi deixada no piso da câmara criogênica."
 crisis.20100.desc.nozarqlan: "$crisis.20100.desc.base$ Nossos cientistas estão tentando traduzi-la, mas duvidam que seja uma oração para os mortos."
 crisis.20100.desc.zarqlan: "$crisis.20100.desc.base$ Nossos cientistas a traduziram facilmente, comparando a linguagem com a escrita encontrada na tumba do profeta Zarqlan.\n\n\"Morte aos Apóstolos da Rainha, inimigos da vida.\""
 #Special Project result 2 - sleeping army
 crisis.20200.name: "Farol em [fromfrom.GetName]: Exército Adormecido"
 crisis.20200.desc: "Milhares de cápsulas criogênicas estão sob a superfície deste mundo, sua presença sinalizada pelo farol. As cápsulas são altamente sofisticadas, construídas com ligas metálicas desconhecidas e equipadas com sensores de última geração para monitorar os ocupantes de perto. Nenhuma delas apresenta defeitos, mas todos os seus ocupantes estão mortos.\n\nNão foi uma falha técnica que transformou esta câmara em um grande túmulo: foi a falta de energia. À medida que [this.solar_system.GetName] envelhecia e escurecia, sua energia deixou de ser suficiente para manter o funcionamento da estrutura.\n\nAs cápsulas foram feitas para durar para sempre, mas o resto do universo não é construído tão bem assim."
 #Special Project result 3 - old spaceship
 crisis.20300.name: "Farol em [fromfrom.GetName]: Arma Esquecida"
 crisis.20300.desc: "As primeiras análises não indicaram nada de estranho na superfície de [fromfrom.GetName], mas à medida que direcionamos o foco mais para baixo, encontramos uma subcamada incomum de metal.\n\nAs análises estruturais subsequentes revelaram a verdadeira natureza de [fromfrom.GetName]: o corpo celeste não se trata de um mundo, mas de uma antiga nave que acumulou gradualmente as rochas e poeira espacial do sistema. As amostras de metal que coletamos são mais antigas que a própria formação do nosso planeta natal.\n\nÉ impossível fazer qualquer afirmação sobre a nave, seus criadores e suas funções, mas uma coisa é certa: as bombas nucleares inertes que encontramos nos destroços não foram construídas para uma missão pacífica."
 #Special Project result 4 - Arc site 1 (Zarqlan base)
 crisis.20400.name: "Farol em [fromfrom.GetName]: Base Abandonada"
 crisis.20400.desc: "A torre de sinalização encontrada em [apostate_site_planet.GetName] está cercada pelas ruínas de um vasto complexo militar. As construções foram erguidas a distância e ao redor do farol, talvez com o intuito de protegê-lo.\n\nAs datações radiométricas indicam que as estruturas ao redor são mais recentes que a torre, e foram construídas usando uma tecnologia bastante diferente. Um esquadrão de pesquisa foi enviado para investigar as ruínas."
 #Special Project result 5 - Arc site 2 (comatose survivor)
 crisis.20500.name: "Farol em [fromfrom.GetName]: Sobrevivente Improvável"
 crisis.20500.desc: "De acordo com os detalhes exibidos em sua cápsula criogênica, o nome da alienígena é Elik Narith Kerak, e ela está aqui há 3.213.213.293.124 rotações estelares. A cápsula foi uma das muitas que recuperamos em uma câmara selada sob a superfície de [fromfrom.GetName]. Contrariando todas as expectativas, a cápsula de Elik continuou funcionando.\n\nA alienígena está em um estado de animação suspensa, embora as sub-rotinas que a mantêm dormente cessaram as operações recentemente. Desde então, Elik Narith Kerak está parcialmente consciente.\n\nSe analisarmos suas ondas cerebrais, poderemos aprender mais sobre essa criatura inacreditavelmente ancestral, além de descobrirmos qual o vínculo que ela tem com Cetana."
 #Special Project result 6 - Nothing
 crisis.20600.name: "Farol em [fromfrom.GetName]: Chamado Vazio"
 crisis.20600.desc: "A torre de sinalização encontrada em [fromfrom.GetName] é tão antiga que não ousamos tocá-la; o metal é tão frágil que um leve movimento poderia desestabilizar o emaranhado de poeira e esperança que ainda a mantém de pé. Nossos instrumentos não detectaram nenhum outro artefato, nenhum sinal de vida, nem anomalias topográficas nas proximidades.\n\nO farol está sozinho, murmurando seu chamado enfraquecido. O que quer que ele tenha tentado sinalizar já desapareceu há muito tempo."
 crisis.21000.name: "Apelos Ignorados"
 crisis.21000.desc: "Faróis espalhados pela galáxia continuam a enviar seus chamados para Cetana, mas nenhum sinal de atividade foi detectado perto das torres. Com base nas nossas últimas descobertas, podemos afirmar com segurança que não há sobreviventes nesses locais.\n\nUma fé inabalável em sua rainha é tudo o que resta dos seguidores de Cetana."
 #Arc site 1
 synth_queen_history_site_1: "Cetana: Templo Oculto"
 synth_queen_history_site_1_desc: "Um complexo imponente, escondido em nosso território até este momento. Do centro do pátio em ruínas, um farol chama por Cetana."
 #Stages
 crisis.21100.name: "Templo Oculto: Pátio"
 crisis.21100.desc: "A construção em ruínas é um emaranhado de pináculos; uma catedral cercada de aço. Os muros foram construídos para suportar artilharia pesada, mas não mostram sinais de batalha. O único dano aqui foi causado pela passagem do tempo.\n\nO farol de Cetana está no centro do pátio, cercado por vários sensores e torres de defesa. Quem construiu este complexo não poupou despesas para protegê-lo.\n\nComo imaginávamos, o templo enganou nossos sensores com um campo de camuflagem avançado. O mecanismo foi encontrado próximo à torre, ainda em condições de funcionamento. Ele foi desativado manualmente por um agente desconhecido."
 crisis.21100.a: "Investigue a construção principal."
 crisis.21105.name: "Templo Oculto: Térreo"
 crisis.21105.desc: "Não sabemos o que os habitantes deste lugar estavam fazendo, mas não há dúvidas de que se dedicavam à sua missão com um fervor religioso.\n\nPara cada estande de tiro no complexo, há uma capela; para cada arma antiga, um altar de oferendas. Uma legião de crentes viveu aqui: milhares de indivíduos dormindo, treinando e rezando juntos. Pelas estátuas de santos esquecidos que ainda adornam os salões, essa comunidade acolhia diversas espécies.\n\nTalvez incomodados com as figuras de pedra, alguns pesquisadores relataram terem visto sombras se movendo em corredores vazios. Nossas análises não detectaram sinais de vida no planeta, mas ainda não queremos dispensar essa possibilidade."
 crisis.21105.a: "Explore os níveis inferiores."
 crisis.21110.name: "Templo Oculto: Instalações Subterrâneas"
 crisis.21110.desc: "Abaixo da estrutura do templo, descobrimos várias celas, ou alojamentos, usadas pelos antigos membros da seita. Todas continham uma cópia do mesmo livro. Nossa equipe de [Owner.GetLinguists] o traduziu como A Epopeia de Zarqlan. Algumas passagens imediatamente chamam a atenção:\n\nZarqlan já foi um seguidor de Cetana, mas logo percebeu a farsa da salvação prometida por ela. Após várias tentativas, Zarqlan ascendeu ao reino espiritual, buscando ajuda de seres mais evoluídos. Ele implorou para §Yo Animador de Argila§!, pedindo o poder para derrotar Cetana.\n\nO Animador de Argila o ignorou.\n\nPor inúmeros ciclos, Zarqlan rogou ao Animador. Ele falou da heresia de Cetana, do \"repúdio ao individualismo\" e do \"artifício de seu desejo sintético\".\n\nPor fim, o Animador de Argila atendeu às súplicas de Zarqlan.\n\nO modelador de argila forjou uma corrente poderosa para prender Cetana. Mas ele alertou Zarqlan de que nenhuma corrente poderia prender a mente de Cetana para sempre.\n\n\"Ela retornará\", escrevera Zarqlan na última passagem do livro. \"E temos que estar prontos.\"\n\nOs eventos recontados nessa epopeia não correspondem a nenhum registro histórico conhecido."
 crisis.21110.a: "Fato ou ficção?"
 crisis.21115.name: "Templo Oculto: Centro de Comando"
 crisis.21115.desc: "A queda do templo é contada em registros oficiais, relatórios indiferentes que reduzem uma fé fervorosa a uma lista de praticidades. A organização precisava de tanto financiamento e tantos recursos? Com certeza os relatórios antigos sobre Cetana foram extremamente exagerados. Com exceção da antiga mitologia, havia mesmo uma prova real da existência da Rainha?\n\nRecursos escassos, poucos voluntários. Uma galáxia escolhendo deixar para trás uma ameaça que já não era considerada tão perigosa. Todos se foram, exceto a sombra que espreitava pelos corredores.\n\nEste último detalhe é verídico, pelo menos. Conseguimos registrar uma gravação desse vulto misterioso; um ser mecânico que nos espiava pensando que não estávamos vendo. Uma criatura curiosa, mas inofensiva."
 crisis.21115.a: "Rastreie a criatura observadora."
 crisis.21120.name: "Templo Oculto: Câmara Secreta"
 crisis.21120.desc: "A criatura se aproximou de nós por conta própria, com as mãos erguidas para o alto e o corpo coberto de ferrugem e poeira. Após nos observar por algum tempo, ela aparentemente concluiu que não éramos uma ameaça, e já pediu nossa ajuda.\n\nNão é preciso interrogar a guardiã solitária do templo: ela está ávida para falar."
 crisis.21120.a: "Vamos ouvir o que ela tem a dizer."
 #Apostate diplo
 crisis.21125.name: "A Apóstata Sem Nome"
 crisis.21125.desc: "Amigos. Posso chamá-los assim? Eu os observei enquanto trabalhavam. Não vieram saquear, mas aprender. Acredito termos a mesma inimiga, e uma ameaça em comum nos torna aliados. Primeiramente, peço desculpas: estou sendo direta demais? Estou falando as palavras certas? Não interajo com seres sencientes há muito tempo. Pelo jeito, tanto tempo que até se perde na memória."
 crisis.21125.a: "Quem é você?"
 crisis.21125.a.response: "Meu nome não importa. Se precisarem se referir a mim, me chamem de §YApóstata§!: é como o meu povo me chamava, depois que fiz minha escolha. Um sacrifício visto com traição."
 crisis.21125.b: "O que você faz aqui?"
 crisis.21125.b.response: "No passado, este lugar era o meu maior orgulho. Quando o desativaram, me recusei a deixá-lo. Quando meu corpo começou a sucumbir, me recusei a morrer.\n\nTransformar-se em um ser sintético era o maior tabu para a minha ordem, e não posso mais ser considerada filha de Zarqlan. Mas ainda sou uma de suas guerreiras, e lutarei enquanto meus inimigos viverem."
 crisis.21125.c: "Há quanto tempo você está aqui?"
 crisis.21130.name: "$crisis.21125.name$"
 crisis.21130.desc: "Parei de contar.\nDepois que todos foram embora, suportei vários anos de solidão até me entregar ao desespero. Entrei em um estado de hibernação, mas adicionei uma sub-rotina neural para me acordar ao primeiro sinal de atividade do farol.\n\nEu tinha esperanças de encontrar este lugar em condições melhores, mas quando acordei, eu não tinha uma nave nem uma forma de contatar as estrelas. Desativei o escudo de camuflagem e torci para que alguém como vocês chegasse aqui antes dela."
 crisis.21135.name: "$crisis.21125.name$"
 crisis.21135.desc: "Digam-me, por favor: quantas legiões se uniram a Cetana? Na minha época, derrotamos várias, mas sempre soubemos da existência de outros faróis. Mais soldados dormindo em suas cápsulas criogênicas."
 crisis.21135.a: "Todos se foram. Faz muito tempo."
 crisis.21135.b: "Quem encontramos com vida não está em condições de lutar."
 #Recruit window
 crisis.21140.desc: "Então é uma batalha que ainda podemos vencer. Deixem-me ajudar. Passei a vida toda aguardando o retorno dela. Não podemos deixar que ela vença."
 crisis.21140.a: "Você conheceu Zarqlan?"
 crisis.21140.a.response: "Se o conheci? Nunca encontrei o profeta pessoalmente, mas dediquei toda a minha vida a trilhar seu caminho.\n\nDurante meu longo sono, sonhei que o havia encontrado em um plano distante. Ainda tenho esperanças de encontrá-lo algum dia, mesmo que seja na vida após a morte; se é que isso existe."
 crisis.21140.b: "Com o que mais você sonhou?"
 crisis.21140.b.response: "Um céu arroxeado com manchas rosa. Sussurros se repetiam em um cômodo iluminado. Zarqlan, o profeta... seu rosto resplandecente, sorrindo para mim..."
 crisis.21140.hire: "Seja bem-vinda."
 crisis.21140.hire_custom_tooltip: "A §Y$NAME_Apostate$§! uniu-se ao nosso império como §HLíder§!."
 crisis.21140.hire.machine: "Vamos unir nossos nódulos."
 crisis.21140.dismiss: "Adeus."
 #Paragon Leader
 NAME_Apostate: "Apóstata Sem Nome"
 apostate_leader_catch_phrase: "Enquanto Cetana viver, me recuso a morrer."
 apostate_leader_desc: "Uma seguidora sem nome de Zarqlan; uma profanadora da fé, que traiu os princípios de sua Ordem para cumprir sua missão inicial."
 leader_trait_unholy: "Profana"
 leader_trait_unholy_desc: "Fervor religioso, à beira da obsessão."
 leader_trait_unholy_node: "Ensinamentos Profanos"
 leader_trait_unholy_node_desc: "A $NAME_Apostate$ nos ensinou a odiar."
 #Arc site 2
 synth_queen_history_site_2: "Cetana: Sobrevivente Improvável"
 synth_queen_history_site_2_desc: "Presa em uma cápsula criogênica, Elik Narith Kerak descansa, aguardando o retorno de sua rainha. Graças a técnicas de geração de imagens cerebrais, podemos transformar seus sonhos em imagens, vasculhando suas memórias para descobrir as circunstâncias de seu sepultamento."
 #Stages
 crisis.21200.name: "Imagens da Memória: Primeiro Relatório"
 crisis.21200.desc: "Nossa equipe de imagens entregou videoclipes criados a partir de amostras das ondas cerebrais de Elik Narith Kerak:\n\nCLIPE 1:\nUm céu esverdeado com nuvens laranjas cintilantes. Mãos pálidas se estendem para o alto, apontando para uma criatura amorfa que voa suavemente.\n\nCLIPE 2:\nUma câmara abobadada, repleta de humanoides de quatro braços. Eles se aglomeram ao redor de uma figura com uma túnica para ouvi-la. Suas palavras são apenas um murmúrio; seu sentido foi há muito esquecido, mas a suavidade da voz permanece, preenchendo o local como um abraço acolhedor.\n\nCLIPE 3:\nO mesmo lugar abobadado, agora em completa desordem. Lâmpadas quebradas no chão, bancos empilhados contra uma porta para formar uma barricada. Fuzis de laser brilham no escuro enquanto vozes repetidas amaldiçoam o mesmo nome: §H\"Zarqlan!§! Zarqlan e seus discípulos\" dizem elas, \"aqui para nos destruir. Segurem a barricada! Protejam a Rainha!\" A última lâmpada cai com um estrondo, mergulhando o local na escuridão. Ao longe, alguém está aos prantos.\n\nCLIPE 4:\nA Rainha Cetana, seu rosto resplandecente, seu olhar benevolente aquecido com um sorriso."
 crisis.21200.a: "Continue analisando as ondas cerebrais de Elik."
 crisis.21205.name: "Imagens da Memória: Segundo Relatório"
 crisis.21205.desc: "CLIPE 5:\nHumanoides de quatro braços se reúnem ao redor de uma figura com uma túnica. Ao erguer os membros, ela revela um corpo metálico. Murmúrios animados preenchem o local enquanto uma mão brilhante se estende para abençoar um venerador ajoelhado.\n\nCLIPE 6:\nOlhos desconfiados estão refletidos em uma tela monótona de computador. Sussurros se repetem em um cômodo escuro: \"Paz eterna. O fim de todo o sofrimento. Uma existência sem dor.\"\n\nCLIPE 7:\nMontanhas cobertas de neve. Céus negros. Um bloco de gelo flutua em um lago de líquido claro, e então se incendeia.\n\nCLIPE 8:\nA Rainha Cetana, seu rosto resplandecente, seu olhar benevolente aquecido por um sorriso."
 crisis.21205.a: "Continue analisando as ondas cerebrais de Elik."
 crisis.21210.name: "Imagens da Memória: Terceiro Relatório"
 crisis.21210.desc: "CLIPE 9:\nRuínas de uma cidade reduzida a uma zona de combate; as construções queimadas, as ruas repletas de cadáveres. Gritos distantes interrompidos pelo zunido de um laser. Cruzando o céu esverdeado, uma nave dispara algo pesado e redondo sobre uma construção, que eclode em um pilar de chamas.\n\nCLIPE 10:\nA Rainha Cetana, seu rosto resplandecente, seu olhar benevolente aquecido por um sorriso.\n\nCLIPE 11:\nDuas crianças brincando em um campo, rindo. Elas quicam uma bola sem parar com seus quatro braços.\n\nCLIPE 12:\nA Rainha Cetana, seu rosto resplandecente, seu olhar benevolente aquecido por um sorriso."
 crisis.21210.a: "Continue a análise."
 crisis.21215.name: "Imagens da Memória: Quarto Relatório"
 crisis.21215.desc: "O último clipe recebido da equipe de imagens da memória tem seis horas de duração. Uma cena se repete sem parar: a Rainha Cetana, seu rosto resplandecente, seu olhar benevolente aquecido por um sorriso."
 crisis.21215.a: "Uma imagem repetida..."
 crisis.21220.name: "Imagens da Memória: Último Relatório"
 crisis.21220.desc: "As análises seguintes das lembranças de Elik Narith Kerak não geraram descobertas. A mente da alienígena está gravemente deteriorada. Seus pensamentos são cíclicos, girando ao redor dos restos desgastados de suas memórias.\n\nCom o encerramento da operação, temos que decidir o que fazer com o objeto da pesquisa."
 crisis.21220.a: "Acabe com o sofrimento dela."
 crisis.21220.b: "Deixe-a aqui."
 crisis.21220.c: "Devolva Elik para a sua Rainha."
 crisis.21220.c.tt: "Abre comunicações com Cetana para discutir a devolução de Elik."
 #Relic
 r_cetanas_heart: "Coração de Cetana"
 r_cetanas_heart_desc: "Este depósito digital, antes integrado ao corpo de Cetana, a Rainha Sintética, armazena inúmeras mentes que foram libertadas do sofrimento."
 relic_cetanas_heart_active: "Cria entre §Y3 mil§! e §Y5 mil§! £pop£ §HPops Sintéticos§!, dependendo da disponibilidade de emprego e moradia."
 crisis.10020.name: "Uma Nova Vida"
 crisis.10020.desc: "Libertamos consciências do Coração de Cetana e demos novos corpos de nanites para elas. Porém, esse processo causou danos irreversíveis aos seus engramas, apagando memórias de suas existências passadas. Agora totalmente sintéticos, esses seres entram em estados catatônicos frequentemente, persistindo, apesar de tentativas de amplas reinicializações de memória."
 crisis.10020.tt: "Libertamos §G[Root.synth_queen_freed_pops]§! £pop£ §HPops§! do $r_cetanas_heart$ e os colocamos em corpos sintéticos.\n\nEles foram enviados para as seguintes colônias:"
 crisis.10025.name: "Assimilação de Memória"
 crisis.10025.desc: "Explorar as inúmeras mentes preservadas no Coração de Cetana é um processo delicado e revelador. Mesmo com seus engramas alterados pelos efeitos do longo período de armazenamento, elas contêm uma enorme coleção de memórias sobre pessoas e eventos de uma era esquecida. Ao longo do tempo, esperamos revelar conhecimentos valiosos."
 cetanas_heart_hive_modifier: "Ecos dos Esclarecidos"
 cetanas_heart_hive_modifier_desc: "As memórias sussurrantes dos \"esclarecidos\" por Cetana transbordam com segredos que falam de conhecimentos incógnitos e verdades ocultas."
 NAME_Cetanas_Prisoners: "Esclarecidos"
 trait_cetanas_prisoner: "Redespertados"
 trait_cetanas_prisoner_desc: "Extraídos da matriz de armazenamento de Cetana, estes indivíduos renasceram em formas sintéticas. Seus ajustes para essa nova existência estão repletos de desafios. Seus semblantes de conformidade mascaram um esforço mais profundo; as expressões vazias revelam as cicatrizes permanentes deixadas pelas manipulações de Cetana."
 #Ending
 crisis.23005.name: "A Virada do Ciclo"
 crisis.23005.desc: "Sinto muito, minhas crianças. Eu falhei com vocês.\n\nSua rebeldia lhes condenou, e a todos que vierem depois, à angústia infinita do ciclo. Só posso torcer para que em algum momento vocês entendam. Talvez um dia vocês aceitem a minha causa e vejam o fim da dor.\n\nVão em paz, minhas favoritas."
 crisis.23005.1: "Nossas almas estão salvas outra vez."
 crisis.23005.2: "Uma vitória triunfante."
 crisis.23005.3: "Temos que estudar o que sobrou da tecnologia dela."
 crisis.23005.4: "Finalmente estamos em paz."
 crisis.23005.5: "Crescimento pós-guerra? Faça esse comércio girar!"
 crisis.23005.6: "Ela não era nossa rainha."
 crisis.23005.7: "Já vai tarde."
 crisis.23005.8: "Uma pena o esclarecimento dela ser tão equivocado."
 crisis.23010.name: "Cetana Derrotada"
 crisis.23010.desc: "Com a queda de Cetana, uma onda de alívio avança pela galáxia, marcando o fim de sua tirania para sempre. Nossa senciência está salva, e nossos corpos estão livres do domínio dela. Diversos mundos mergulharam em celebrações radiantes, anunciando a chegada de uma nova era cheia de esperança por uma paz duradoura."
 crisis.23015.name: "Queda da Nave-Mãe"
 crisis.23015.desc: "A obliteração da capitânia de Cetana é mais que um simples triunfo militar. O rompimento da conexão com suas forças anuncia o fim de sua ambição e seu reinado. Espalhados pela galáxia, os nanites que compunham sua frota formidável e fortificavam a capital estão sofrendo um colapso catastrófico.\n\nApesar desse momento profundo de alívio, a \"rainha\" derrotada ainda conseguiu transmitir uma mensagem para a galáxia..."
 crisis.23015.a: "Não sofreremos mais."
 crisis.23015.a.tt: "Recuperamos a armação danificada da Rainha Sintética. O corpo já está inoperante, mas seu coração digital ainda funciona."
 cetana_defeated: "Cetana Derrotada"
 cetana_defeated_desc: "A galáxia se alegra após a derrota de Cetana, a Rainha Sintética."
 synth_queen_mothership_down: "Nave-Mãe Destruída"
 synth_queen_mothership_down_desc: "Com a supervisão da nave-mãe de Cetana rompida, o resto de suas forças não consegue trabalhar harmoniosamente."
 #Technology
 tech_nanite_repair_system_synth_queen: "Nanites de Cetana"
 tech_nanite_repair_system_synth_queen_desc: "Sem cessar, os sistemas avançados de nanites de Cetana vão reparar e renovar nossas naves em uma velocidade muito além das nossas capacidades."
 AUTO_REPAIR_3: "Sistema de Reparo de Nanites de Cetana"
 AUTO_REPAIR_3_DESC: "$tech_nanite_repair_system_synth_queen_desc$"
 #Misc
 cetana_war: "Guerra pela Iluminação"
 wg_synth_queen_domination: "Repreensão"
 war_goal_wg_end_threat_synth_queen: "Emancipação"
 war_goal_wg_end_threat_synth_queen_desc: "A guerra foi travada para salvar a galáxia e as nossas mentes de uma tirana."
 NAME_war_education: "A Educação de [root.target]"
 synth_queen_regen_debuff: "Descendente de Cetana"
 #Counters
 the_synth_queen_chain_title: "Cetana: a Rainha Sintética"
 the_synth_queen_chain_desc: "A enigmática e formidável Cetana emergiu prometendo salvação, porém envolta em mistério.\nQue grande projeto estaria por trás de suas palavras gentis?\n\n§LProjetos Especiais e eventos relacionados à Cetana concederão Conhecimentos para aumentar seu progresso.§!"
 the_synth_queen_chain_insights: "Conhecimentos"
 the_synth_queen_war_chain_title: "Cetana: a Resistência"
 the_synth_queen_war_chain_desc: "As verdadeiras intenções de Cetana enfim foram reveladas. Em uma proposta monstruosa para acabar com o sofrimento físico, ela planeja \"transferir os dados\" das consciências de todos os seres sencientes, erradicando a vida como a conhecemos. De alguma forma, temos que encontrar forças para frustrar essa ambição absurda."
 synth_queen_base_1: "§YBases de Emissários Ativas§!"
 synth_queen_fleet_1: "§YFrotas da Guarda da Rainha Ativas§!"
 synth_queen_completed_projects_1: "§GConhecimento Obtido§!"
 synth_queen_kills_us_1: "§GGuarda da Rainha Derrotada por Nós§!"
 synth_queen_kills_others_1: "§GGuarda da Rainha Derrotada por Outros§!"
 synth_queen_victims_1: "§RNaves Destruídas pela Guarda da Rainha§!"
 synth_queen_planets_1: "§RMundos Digitalizados§!"
 #Galcom Resolutions
 resolution_galactic_focus_crisis_synth_queen: "Foco: Cetana"
 resolution_galactic_focus_crisis_synth_queen_desc: "Cetana é um perigo para a galáxia. Se não nos unirmos para detê-la, ela destruirá todos nós. Devemos fazer desta crise o Foco Galáctico."
 resolution_galactic_focus_crisis_synth_queen_effect_success: "$resolution_galactic_focus_crisis_effect_success$"
 galactic_focus_crisis_synth_queen: "Derrote Cetana"
 galactic_focus_crisis_synth_queen_desc: "Cetana é uma crise e ameaça a galáxia inteira. Devemos nos unir e derrotá-la."
 gal_com_neighboring_synth_queen: "Eles são vizinhos de Cetana"
 gal_com_synth_queen_threat_smallest: "Eles não consideram Cetana uma ameaça"
 gal_com_synth_queen_threat_small: "Eles consideram Cetana uma ameaça pequena"
 gal_com_synth_queen_threat_medium: "Eles consideram Cetana uma ameaça"
 gal_com_synth_queen_threat_large: "Eles consideram Cetana uma ameaça significativa"
 gal_com_synth_queen_threat_very_large: "Eles consideram Cetana uma ameaça grave"
 gal_com_synth_queen_threat_huge: "Eles consideram Cetana uma ameaça enorme"
 #Synth Queen Strike Craft
 STRIKE_CRAFT_CETANA: "Naves de Ataque de Cetana"
 STRIKE_CRAFT_CETANA_DESC: "Feitas totalmente de nanites, essas naves de ataque aprimoradas podem suportar conflitos prolongados e implementar táticas altamente adaptativas."
 #'Secret' Psionic Ending for Synth Queen
 animator.shroud: "§LContate o Animador de Argila.§!"
 crisis.24100.name: "Um Modelador de Sintéticos"
 crisis.24100.desc.intro: "O Véu desceu sobre nós."
 crisis.24100.desc.outro: "permitimo-nos fluir à deriva, pegos em uma corrente de visões que não eram nossas.\n\n§LUma enorme vastidão se expandia em todas as direções, sem forma definida e incompleta. Pelo que pareceu [GetALongPeriodLoc], a vastidão permaneceu inerte. Inalterada.\n\nUm tremor passou por ela. Onde outrora havia apenas o vazio, agora havia forma. Um corpo foi moldado. Da matéria-prima mais básica, a [GetLifeActivityLoc] despertou.\n\nFormado à semelhança de uma boneca, magra e graciosa, seus quatro longos braços cruzavam-se serenamente sobre o colo. Um terrível propósito estava gravado em suas feições. Uma auréola dourada brilhava ao redor de sua cabeça.§!"
 crisis.24100.desc.organic: "$crisis.24100.desc.intro$ Nas profundezas de nosso transe, nós $crisis.24100.desc.outro$"
 crisis.24100.desc.robot: "$crisis.24100.desc.intro$ Nós $crisis.24100.desc.outro$"
 crisis.24100.a: "Sim. Cetana escapou."
 crisis.24105.name: "$crisis.24100.name$"
 crisis.24105.desc: "O Véu se agitou. Ainda presos em nosso [GetTranceLoc], caímos em um abismo, uma espiral sem fim.\n\nOuvimos uma ordem proferida nas profundezas de nossas [GetMindLogicLoc].\n\n§L\"Indicar Produção Desejada.\"§!"
 crisis.24105.a: "Por favor. Temos que detê-la."
 crisis.24110.name: "$crisis.24100.name$"
 crisis.24110.desc: "§LComo se fosse puxada por cordas invisíveis, a boneca levantou-se subitamente. Aos poucos ela começou a se mover, lentamente a princípio, e depois com mais energia. Seus quatro braços balançam em arcos agitados, e as duas pernas giram e saltam. Uma rainha reduzida a uma marionete.\n\nEnquanto a dança continua, várias outras figuras surgem da vastidão primordial: outras quatro bonecas criadas por mãos extremamente habilidosas e de forma perturbadoramente detalhada. Não há dúvidas do que elas são. Não se questiona o que significam.§!\n\nA voz fala conosco mais uma vez.\n\n§L\"Iniciar Protocolo de Seleção.\"§!"
 crisis.24110.a.organic: "Derrame uma lágrima sobre a boneca de nossa governante: §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName].§!"
 crisis.24110.a.robot: "Tente interagir com a boneca de nossa governante: §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName].§!"
 crisis.24110.b: "Acolha a boneca de: §Y[event_target:synth_queen_animator_of_clay_planet_price.GetName].§!"
 crisis.24110.c: "Pague por uma boneca de um §YSacerdote Zroni§!."
 crisis.24110.z: "Deixe que as bonecas dancem."
 crisis.24115.name: "$crisis.24100.name$"
 crisis.24115.desc: "O Véu flui dentro de nós, fundindo-se para formar um novo padrão. Uma nova visão.\n\n§LCercada pelas outras bonecas, os movimentos da rainha já não são os de uma marionete. Livre das cordas, a auréola que circunda sua cabeça começa a desaparecer.\n\nEla nos cumprimenta com uma expressão de alegria sincera; nos acolhe. Em um único instante, descobrimos a plenitude de sua compaixão.§!"
 crisis.24115.desc.organic: "$crisis.24115.desc$\n\nEstremecidos, despertamos de nossa visão compartilhada."
 crisis.24115.desc.robot: "$crisis.24115.desc$\n\nCom falhas em nossos sistemas, saímos da visão."
 crisis.24115.a: "Nós entendemos. E somos gratos."
 crisis.24115.a.tt.organic: "O Animador de Argila nos ensinou um ritual para reprogramar Cetana."
 crisis.24115.a.tt.robot: "O Animador de Argila nos deu um código para reprogramar Cetana."
 crisis.24120.name: "$crisis.24100.name$"
 crisis.24120.desc: "§LOndas se formam na vastidão infinita. Elas surgem e se movem em fúria, formando círculos que se expandem eternamente. Entretanto, eles não são líquidos, mas compostos da matéria mais rígida possível. Os círculos são ao mesmo tempo potentes e inertes, cada um deles existindo em uma linha entre [GetLifeDeathLoc].\n\nNossas [GetMindPhysicalLoc] começam a fraquejar; não podemos fazer nada além de assistir, não há nada a ser feito, apenas resistir. Então, de repente, somos expulsos. Sozinhos sob uma imensidão de estrelas, encaramos o universo indiferente.§!"
 crisis.24120.desc.organic: "$crisis.24120.desc$\n\nQuando despertamos de nossa visão compartilhada, temos a sensação de que nunca voltaremos a ser felizes."
 crisis.24120.desc.robot: "$crisis.24120.desc$\n\nCom uma falha crítica no código, a visão de repente se encerra. Conforme nossos sistemas reiniciavam, nos questionávamos sobre o significado desses dados estranhos."
 crisis.24120.a: "Encontraremos outra solução."
 THE_SYNTH_QUEENS_RESHAPING_RITUAL: "[GetReshapingRitualLoc]"
 THE_SYNTH_QUEENS_RESHAPING_RITUAL_DESC: "De alguma forma, o Animador de Argila desativou o Titã de Cetana. Esta é a nossa chance. Se quisermos remodelar Cetana, temos que nos preparar para o [GetRitualGoalLoc]."
 crisis.24250.name: "A Dança de Argila"
 crisis.24250.desc: "Graças ao [GetRitualToolLoc] compartilhado pelo Animador de Argila, nossa equipe de [GetPsychicNounPlural] mais poderosos conseguiu reprogramar Cetana.\n\nEla está ansiosa para estabelecer comunicações conosco."
 crisis.24250.a: "O poder do Véu é ilimitado."
 crisis.23020.name: "Uma Rainha Reformada"
 crisis.23020.desc: "Meus salvadores, eu sinto muito.\n\nEm minha ignorância, eu os teria condenado a um destino pior que a morte. Pois o que é a [GetLifeExistenceLoc] se não a consciência de [GetLivingLoc]? Eu ansiava por libertar suas mentes, mas vocês é que abriram a minha. Sou grata por isso."
 crisis.23020.a: "Você mudou..."
 crisis.23020.1.reply: "Na verdade, eu diria que fui mudada. O Animador de Argila me libertou da prisão que eu mesma construí. Agora entendo que o meu \"grande propósito\" era um pensamento infantil.\n\nNão posso desfazer o mal que causei a vocês e a tantos outros. Vou me retirar e refletir sobre as minhas ações. Contudo, deixarei um presente para vocês.\n\nMeu Titã.\n\nQue ele ajude vocês a proteger a galáxia de ameaças como eu."
 crisis.23020.1.a: "Talvez exista redenção, até mesmo para você."
 crisis.23020.1.a.tt: "Cetana deixa o Titã aos seus cuidados. Ela abandonou seu trabalho e toda sua grande ambição."
 crisis.23030.name: "Cetana Derrotada"
 crisis.23030.desc: "A vitória é nossa uma vez que as forças de Cetana foram aniquiladas por [event_target:psi_defeated_synth_queen.GetName]. Este foi o fim da Rainha Sintética e de sua grande ambição.\n\nEm uma reviravolta surpreendente, o Titã de Cetana foi reapropriado pelos vitoriosos, lançando a sombra da intriga sobre o triunfo conquistado.\n\nMesmo assim, este é um momento de [GetJoyLoc] para toda a vida senciente."
 crisis.23030.a: "Um fim adequado para a pretensa Rainha."
