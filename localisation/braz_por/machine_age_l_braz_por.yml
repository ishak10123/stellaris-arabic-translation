 situation_fulfill_overdrive: "Sobrecarregar"
 situation_paperclip_stage_1: "Meses Restantes"
 situation_paperclips_outcome: "Se a meta for atingida, poderemos transformar os $r_consumer_goods$ produzidos em outros recursos.\n\n[Owner.GetPaperclipStatus]"
 situation_paperclips_progress: "Esta Abordagem diminuirá o tempo até a nossa próxima avaliação de meta de produção."
 stage_the_drive_effects: "$situation_paperclips_monthly_change_tooltip$"
 situation_paperclip_status_positive: "A meta foi §Gatingida§!."
 situation_paperclip_status_negative: "A meta ainda não foi §Ratingida§!."
 situation_paperclip_status_on_target: "A produção está §Ya caminho§! de atingir a meta."
