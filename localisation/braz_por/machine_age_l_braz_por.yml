 ######################
 #MACHINE AGE TRAITS #
 ######################
 #CYBORG
 trait_cyborg_stainless_steel_smile: "Melhorias Adornadas"
 trait_cyborg_stainless_steel_smile_desc: "Esta espécie prefere entalhes personalizados, componentes de reposição e padrões de pinturas para maximizar o impacto visual. Às vezes, a única escolha é deixar o metal vistoso."
 trait_cyborg_welded_countenance: "Melhorias Utilitárias"
 trait_cyborg_welded_countenance_desc: "Estes ciborgues usam partes rudimentares, mas funcionais, sem muita preocupação com a estética. Às vezes, fazer o trabalho é tudo o que importa."
 trait_cyborg_apathy_loops: "Implantes Abrasivos"
 trait_cyborg_apathy_loops_desc: "Os implantes destes ciborgues são grosseiros e mal ajustados, resultando em irritação subcutânea e defeitos recorrentes. Conveniente para o corpo, péssimo para a mente."
 trait_cyborg_bionic_engineers: "Engenheiros Biônicos"
 trait_cyborg_bionic_engineers_desc: "Ferramentas feitas com precisão e modificações de implantes foram criadas especificamente para auxiliar em tarefas exigentes de engenharia."
 trait_cyborg_bionic_physicists: "Físicos Biônicos"
 trait_cyborg_bionic_physicists_desc: "Processamentos integrados multimodais produzem cálculos físicos imediatos, sem a necessidade de uma conexão com uma unidade de computação externa."
 trait_cyborg_bionic_sociologists: "Sociólogos Biônicos"
 trait_cyborg_bionic_sociologists_desc: "Condutores de empatia e heurísticas comportamentais abrem um caminho rápido para a pesquisa sociológica, conduzindo análises complexas como um segundo cérebro."
 trait_cyborg_integrated_weaponry: "Armamento Integrado"
 trait_cyborg_integrated_weaponry_desc: "Fundir armas com membros cibernéticos fornece um poder de fogo imediato para exércitos e oficiais da lei."
 trait_cyborg_delicate_frames: "Estruturas Delicadas"
 trait_cyborg_delicate_frames_desc: "Componentes e instalações inferiores resultaram em estruturas frágeis de ciborgues. As operações básicas não foram comprometidas, mas é aconselhável que os usuários evitem situações com alta probabilidade de traumas físicos."
 trait_cyborg_scarcity_algorithms: "Algoritmos de Escassez"
 trait_cyborg_scarcity_algorithms_desc: "Uma codificação agressiva de consciência econômica impede tomadas de riscos, negando oportunidades de lucros maiores."
 trait_cyborg_limited_memory: "Memória Limitada"
 trait_cyborg_limited_memory_desc: "Uma memória operacional insuficiente criou um gargalo no aprendizado, deixando o usuário incapaz de processar suas experiências por completo."
 trait_cyborg_climate_adjustment_dry: "Modificações para Clima Seco"
 trait_cyborg_climate_adjustment_dry_desc: "Modificações personalizadas, como reciclagem de fluidos e proteção antirradiação, são perfeitas para suportar climas secos, mas menos adequadas em outros casos."
 trait_cyborg_climate_adjustment_dry_tt: "Habitabilidade em Clima Seco: §G+$@cyborg_hab_preference|0%$§!\n$t$- Concede até §G125%§! de Habitabilidade em planetas com Clima Seco, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_wet: "Modificações para Clima Úmido"
 trait_cyborg_climate_adjustment_wet_desc: "Forte isolamento e proteção contra formas biológicas alienígenas são ideais para climas úmidos, mas prejudiciais em outros casos."
 trait_cyborg_climate_adjustment_wet_tt: "Habitabilidade em Clima Úmido: §G+$@cyborg_hab_preference|0%$§!\n$t$- Concede até §G125%§! de Habitabilidade em planetas com Clima Úmido, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_cold: "Modificações para Clima Frio"
 trait_cyborg_climate_adjustment_cold_desc: "Componentes de aquecimento aprimorados e lubrificantes resistentes ao congelamento ajudam em climas frios, mas são um estorvo em outros casos."
 trait_cyborg_climate_adjustment_cold_tt: "Habitabilidade em Clima Frio: §G+$@cyborg_hab_preference|0%$§!\n$t$- Concede até §G125%§! de Habitabilidade em planetas com Clima Frio, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_mass_produced: "Implantes Reaproveitados"
 trait_cyborg_mass_produced_desc: "A compatibilidade retroativa forçada de implantes obrigatórios reduz consideravelmente o custo de aparelhar cidadãos recém-nascidos."
 trait_cyborg_propaganda_machines: "Filtros de Conformidade"
 trait_cyborg_propaganda_machines_desc: "Unidades de análise cortical podem coibir usuários via interceptação de pensamentos sediciosos ou liberar recompensas hormonais para cidadãos exemplares."
 #MACHINE
 trait_robot_artificial_engineers: "Núcleo de Engenharia"
 trait_robot_artificial_engineers_desc: "Núcleos de memória dedicados e recursos de processamento para pesquisas voltadas à engenharia permitem cálculos rápidos e velocidade na conclusão de tarefas."
 trait_robot_artificial_physicists: "Núcleo de Física"
 trait_robot_artificial_physicists_desc: "Unidades de processamento personalizadas e sub-rotinas de memória para pesquisa de física reduzem a dependência de cálculos externos."
 trait_robot_artificial_sociologists: "Núcleo de Sociologia"
 trait_robot_artificial_sociologists_desc: "Unidades de processamento avançadas contêm algoritmos de pesquisa de sociologia dedicados para esse campo amplo e exigente."
 trait_robot_integrated_weaponry: "Armamento Integrado"
