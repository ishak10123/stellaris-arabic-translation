 situation_cybernetic_creed_cyberization_desc: "Nossa sociedade vem há muito se esforçando para criar uma união perfeita entre [Owner.Species.GetFleshTypeCyberCreed] e máquina. Agora chegou o momento da jornada final.\n$machine_age.1090.pray$\n\n§YPops que receberão implantes sagrados no próximo mês§!: §G[From.GetCyberCreedPopsPerMonth]§!"
