 MACHINEAGE_TITLE: "The Machine Age" #Do not translate
 #### Cosmogenesis Crisis ####
 ap_cosmogenesis: "Cosmogênese"
 ap_cosmogenesis_desc: "Tempo, gravidade e espaço são as engrenagens fundamentais do mecanismo da realidade. Se aprendermos a manipulá-los, o universo e seus segredos serão nossos."
 cosmogenesis_chain_title: "Cosmogênese"
 cosmogenesis_chain_desc: "A ignorância nos aprisiona e nos afasta dos segredos do universo.\n\nTemos que nos libertar a qualquer custo.\n\n§RImpérios Caídos tentarão nos impedir!§!"
 cosmogenesis_level_reached: "Nível de Crise Alcançado"
 cosmogenesis_aborted_tt: "\n£trigger_no£ §RRenunciamos nossas ambições de Cosmogênese.§!"
 ### Crisis Stage Techs
 tech_cosmogenesis_crisis_1: "Teoria da Aprendizagem Exponencial"
 tech_cosmogenesis_crisis_1_desc: "A mudança radical de perspectiva necessária para entender as infinitas camadas da realidade desafia até as mentes mais brilhantes."
 cosmogenesis_level_1_tech_title: "Libera o §HNível 2§! da Crise §HCosmogênese§!"
 cosmogenesis_level_1_tech_desc: "§H$tech_cosmogenesis_crisis_1$§!\nPara revelar o funcionamento da realidade, devemos abrir nossas mentes para uma escala de pensamento muito maior."
 tech_cosmogenesis_crisis_2: "Pincel Gravítico"
 tech_cosmogenesis_crisis_2_desc: "A gravidade e o espaço-tempo moldam o universo. A partir da gravidade, dominaremos as ferramentas necessárias para fomentar nossa ascensão."
 cosmogenesis_level_2_tech_title: "Libera o §HNível 3§! da Crise §HCosmogênese§!"
 cosmogenesis_level_2_tech_desc: "§H$tech_cosmogenesis_crisis_2$§!\nA gravidade é apenas um pincel que podemos usar para pintar a tela da realidade."
 tech_cosmogenesis_crisis_3: "Tese do Infinito Teórica"
 tech_cosmogenesis_crisis_3_desc: "Alterações precisas e incrivelmente pequenas na gravidade nos permitem inserir comandos no código da realidade. Temos que tomar precauções extremas à medida que aprendemos a usar essa ferramenta nova e fenomenal."
 cosmogenesis_level_3_tech_title: "Libera o §HNível 4§! da Crise §HCosmogênese§!"
 cosmogenesis_level_3_tech_desc: "§H$tech_cosmogenesis_crisis_3$§!\nPouco a pouco, aplicações minúsculas de força gravitacional nos permitirão atravessar o espaço-tempo."
 tech_cosmogenesis_crisis_4: "As Regras da Realidade"
 tech_cosmogenesis_crisis_4_desc: "Experimentos recentes confirmam que nossas modificações na realidade são apenas temporárias. Precisamos de alterações mais significativas para firmar essas mudanças."
 cosmogenesis_level_4_tech_title: "Libera o §HNível 5§! da Crise §HCosmogênese§!"
 cosmogenesis_level_4_tech_desc: "§H$tech_cosmogenesis_crisis_4$§!\nA realidade esperneia, protesta e resmunga. Apesar das nossas alterações, ela teima em se remodelar. Esse desenvolvimento inesperado não pode continuar."
 tech_cosmogenesis_crisis_5: "Universos Emergentes"
 tech_cosmogenesis_crisis_5_desc: "Realizar viagens em grande escala para universos diferentes é uma tarefa assustadora. Precisamos projetar uma nave que, além de atravessar o tecido do espaço-tempo, também consiga sobreviver à jornada.\n\n§RImpérios Caídos tentarão nos impedir!§!"
 cosmogenesis_level_5_tech_title: "§HLibera a Megaestrutura:§! Agulha do Horizonte"
 cosmogenesis_level_5_tech_desc: "§HAgulha do Horizonte§!\nA Agulha do Horizonte é uma maravilha tecnológica; uma nave civil capaz de dobrar a realidade. Ela pode abrigar nossa população e toda a nossa sabedoria para conduzir a migração transuniversal com segurança."
 requires_capital: "£trigger_no£ Deve ser construída na órbita da nossa capital."
 ### Crisis Tab
 crisobj_research_tech_name: "Pesquisar Novas Tecnologias"
 crisobj_research_tech_desc: "A cada descoberta realizada, seja grande ou pequena, adquirimos conhecimentos acerca do funcionamento da realidade.\n\nPesquise tecnologias para ganhar esta recompensa de Lógica Avançada."
 crisobj_research_thesis_name: "Pesquisar Tese do Infinito Aplicada"
 crisobj_research_thesis_desc: "Experimentos em larga escala para alterar as regras que regem o comportamento da realidade produzirão dados valiosos.\n\nPesquise essas tecnologias raras para ganhar esta recompensa de Lógica Avançada."
 crisobj_have_scholarium_vassals_name: "Reter Vassalos Scholariuns"
 crisobj_have_scholarium_vassals_desc: "Súditos focados em pesquisa podem nos ajudar na busca pelo conhecimento pleno.\n\nRetenha §YVassalos Scholariuns§! para ganhar esta recompensa §Yanual§! de Lógica Avançada."
 crisobj_neural_chips_name: "Empregar Chips Neurais"
 crisobj_neural_chips_desc: "Precisamos fazer sacrifícios para lidar com a enorme escala da nossa pesquisa.\n\nUse Pops como §YChips Neurais§! no §YTorno Sináptico§! para ganhar Lógica Avançada.\n\nA produção de §YChips Neurais§! aumenta de acordo com a quantidade de Pops no §YTorno Sináptico§! e pode ser impulsionada com distritos e construções."
 crisobj_have_science_nexuses_name: "Controlar Nexos Científicos"
 crisobj_have_science_nexuses_desc: "Distante de qualquer anomalia gravitacional, esta instalação de pesquisa avançada é usada para mensurar dados imaculados do espaço-tempo.\n\nControle megaestruturas de §YNexo Científico§! totalmente aprimoradas para ganhar esta recompensa §Yanual§! de Lógica Avançada."
 crisobj_galcom_science_resolution_name: "Garantir o Apoio da Comunidade Galáctica"
 crisobj_galcom_science_resolution_desc: "Convencer os membros da Comunidade Galáctica de que a nossa pesquisa é essencial contribuiria em muito para alcançarmos nosso objetivo.\n\nFaça a §YComunidade Galáctica§! adotar §YResoluções§! de Conhecimento Irrestrito para ganhar esta recompensa §Yanual§! de Lógica Avançada."
 crisis_cosmogenesis_level_1: "§UPreocupação§!"
 crisis_cosmogenesis_level_1_desc: "Nível de Crise 1"
 crisis_cosmogenesis_level_2: "§URisco§!"
 crisis_cosmogenesis_level_2_desc: "Nível de Crise 2"
 crisis_cosmogenesis_level_3: "§UPerigo§!"
 crisis_cosmogenesis_level_3_desc: "Nível de Crise 3"
 crisis_cosmogenesis_level_4: "§UCalamidade§!"
 crisis_cosmogenesis_level_4_desc: "Nível de Crise 4"
 crisis_cosmogenesis_level_5: "§UAmeaça Existencial§!"
 crisis_cosmogenesis_level_5_desc: "Nível de Crise 5"
 menp_cosmo_objectives: "Lógica Avançada"
 unlocks_cosmo_objectives: "Permite o acúmulo de £advanced_logic£ §Y$menp_cosmo_objectives$§! ao concluir §HObjetivos de Crise§!.\n\nLibera a tecnologia §Y$tech_cosmogenesis_crisis_1$§!, que nos aproximará de nossos objetivos.\n"
 menp_cosmo_objectives_desc: "A Lógica Avançada representa a compreensão das leis que regem a realidade e o nosso poder de influenciá-las."
 menp_cosmo_buildings_1: "Arcologias Perfeitas"
 unlocks_buildings_1: "Construções simples de Impérios Caídos agora podem aparecer como opções de pesquisa.\n"
 menp_cosmo_buildings_1_desc: "Os Impérios Caídos podem ter se esquecido de como replicar sua tecnologia avançada, mas nossas mentes revelarão os segredos perdidos do seu período áureo."
 menp_cosmo_techs_1: "Energia Não Bariônica"
 unlocks_techs_1: "Libera a tecnologia para o componente de nave §Y$tech_dark_matter_power_core$§!.\n"
 menp_cosmo_techs_1_desc: "Aprender a utilizar a energia das partículas antibariônicas é a próxima etapa na evolução da geração de energia ultracompacta."
 menp_cosmo_features_1: "Neurocibernética"
 unlocks_features_1: "Libera a tecnologia para a Megaestrutura §YTorno Sináptico§!.\n"
 menp_cosmo_features_1_desc: "O Torno Sináptico é uma estrutura de redes neurais em escala gigantesca. O poder de processamento das mentes conectadas de nossa população é usado para calcular e armazenar dados. Os benefícios são óbvios, mas algumas espécies equivocadas podem questionar a ética da transmutação de indivíduos em chips de computação."
 menp_cosmo_ship_2: "Escolta Enigmática"
 unlocks_ship_2: "Libera a tecnologia para a nave de §YEscolta§! de Império Caído.\n"
 menp_cosmo_ship_2_desc: "[Get_menp_cosmo_ship_2]"
 menp_cosmo_ship_2_desc_regular: "Uma nave estelar de tamanho médio que otimiza nosso conhecimento do espaço-tempo para aplicar o transcendentalismo dimensional, fazendo com que seu interior seja maior do que aparenta por fora. Se comparada aos projetos de naves tradicionais, seu avançado poder de fogo tem um custo reduzido de capacidade logística."
 menp_cosmo_buildings_2: "Extração Avançada"
 unlocks_buildings_2: "Construções avançadas de Impérios Caídos agora podem aparecer como opções de pesquisa.\n"
 menp_cosmo_buildings_2_desc: "As capacidades de geração de recursos de Impérios Caídos nos intrigam há muito tempo. Mas agora, não mais."
 menp_cosmo_techs_2: "Avanços Antibariônicos"
 unlocks_techs_2: "Libera a tecnologia para os componentes de nave §Y$tech_enigmatic_decoder$§! e §Y$tech_dark_matter_propulsion$§!.\n"
 menp_cosmo_techs_2_desc: "Nossa maior compreensão sobre a matéria escura e suas aplicações abrirá novas portas para o progresso tecnológico."
 menp_cosmo_features_2: "Ferramentas Gravitacionais"
 unlocks_features_2: "Libera a tecnologia §Y$tech_cosmogenesis_crisis_2$§!, que nos aproximará dos nossos objetivos.\n"
 menp_cosmo_features_2_desc: "$tech_cosmogenesis_crisis_2_desc$\n"
 menp_cosmo_ship_3: "Cruzadores Intrigantes"
 unlocks_ship_3: "Libera a tecnologia para a nave §YCruzador de Batalha§! de Império Caído.\n"
 menp_cosmo_ship_3_desc: "[Get_menp_cosmo_ship_3]"
 menp_cosmo_ship_3_desc_regular: "Outra nave otimizada, mas de proporções maiores, que fará os Encouraçados atuais parecerem brinquedos."
 menp_cosmo_buildings_3: "Infraestruturas Complexas"
 unlocks_buildings_3: "Construções complexas de Impérios Caídos agora podem aparecer como opções de pesquisa.\n"
 menp_cosmo_buildings_3_desc: "Agora que começamos a desvendar o véu de mistério que envolve os Impérios Caídos, não podemos parar. Com o passar do tempo, os segredos de sua tecnologia serão revelados."
 menp_cosmo_techs_3: "Antibárions Exóticos"
 unlocks_techs_3: "Libera a tecnologia para os componentes de nave §Y$tech_enigmatic_encoder$§! e §Y$tech_dark_matter_deflector$§!.\n"
 menp_cosmo_techs_3_desc: "Usar matéria escura em nossa tecnologia de defesa e criptografia permitirá a criação de campos de anulação e canais de comunicação robustos."
 menp_cosmo_features_3: "Expansão Eterna"
 unlocks_features_3: "Libera a tecnologia §Y$tech_cosmogenesis_crisis_3$§!, que nos aproximará dos nossos objetivos.\n"
 menp_cosmo_features_3_desc: "$tech_cosmogenesis_crisis_3_desc$\n"
 menp_cosmo_ship_4: "Capitânias Inimagináveis"
 unlocks_ship_4: "Libera a tecnologia para a nave §YTitã§! de Império Caído.\n"
 menp_cosmo_ship_4_desc: "[Get_menp_cosmo_ship_4]"
 menp_cosmo_ship_4_desc_regular: "Estas naves formidáveis se assemelham muito mais a fortalezas móveis e somente os ataques mais brutais têm chances de danificá-las."
 menp_cosmo_buildings_4: "Era Dourada"
 unlocks_buildings_4: "Construções extraordinárias de Impérios Caídos agora podem aparecer como opções de pesquisa.\n"
 menp_cosmo_buildings_4_desc: "Os conhecimentos dos Impérios Caídos sobre a manipulação dimensional são impressionantes. A cada descoberta, até suas tecnologias mais arcanas começam a parecer simples."
 menp_cosmo_techs_4: "Blindagem e Armamentos"
 unlocks_techs_4: "Libera a tecnologia para os componentes de nave §Y$tech_energy_lance_2$§! e §Y$tech_dragon_armor$§!.\n"
 menp_cosmo_techs_4_desc: "Com nossos avanços tecnológicos mais recentes, podemos fabricar armas mais letais e blindagens mais formidáveis para as nossas naves."
 menp_cosmo_features_4: "Infrator"
 unlocks_features_4: "Libera a tecnologia §Y$tech_cosmogenesis_crisis_4$§!, que nos aproximará de nossos objetivos.\nTambém libera a tecnologia repetível §Y$tech_cosmogenesis_thesis$§!, que pode gerar quantidades consideráveis de §YLógica Avançada§!.\n"
 menp_cosmo_features_4_desc: "$tech_cosmogenesis_crisis_4_desc$"
 menp_cosmo_buildings_5: "Memória e Criação"
 unlocks_buildings_5: "Construções arcanas de Impérios Caídos agora podem aparecer como opções de pesquisa.\n"
 menp_cosmo_buildings_5_desc: "Os segredos dos Impérios Caídos, por fim revelados, darão início a uma nova era para o nosso povo."
 menp_cosmo_techs_5: "Nanoenxames"
 unlocks_techs_5: "Libera a tecnologia para os componentes de nave §Y$tech_nanite_repair_system$§!, §Y$tech_nanite_autocannon$§! e §Y$tech_nanite_flak_batteries$§!.\n"
 menp_cosmo_techs_5_desc: "Cada mudança de perspectiva traz novas oportunidades. Mudanças em uma escala mínima podem ter consequências gigantescas."
 menp_cosmo_features_5: "Viajante do Vazio"
 unlocks_features_5: "Libera a tecnologia §Y$tech_cosmogenesis_crisis_5$§!, que nos permitirá construir uma §YAgulha do Horizonte§! e realizar nossos objetivos."
 menp_cosmo_features_5_desc: "$tech_cosmogenesis_crisis_5_desc$"
