 #Fallen Empire Reactions
 action.1.desc_111: "Criança tola, você alega conhecer o divino, mas ainda assim profana a [Owner.Species.GetFleshTypeCyberCreed] que cobre o seu corpo. Saiba que somos o império [contact_empire.GetName], o povo escolhido desta galáxia. Mantenham esses corpos imundos longe dos nossos locais sagrados, ou conhecerão a destruição imediata."
 action.1.desc_110: "Somos o [contact_empire.GetName], o povo escolhido desta galáxia. Durante séculos, negligenciamos as necessidades espirituais das espécies inferiores. Vocês e seus receptáculos impuros são um grande exemplo do nosso erro. Aceitem nossas doutrinas e se convertam, ou sejam transformados em poeira."
 #Cybernetic Situation Events
 machine_age.90.name: "Implantes Divinos"
 machine_age.90.desc: "Os fiéis revelaram os segredos da cibernética a todos; contudo, hoje começa a nossa jornada. Devemos aderir à fusão divina completamente."
 machine_age.90.a: "Chegou a hora."
 machine_age.90.a.tooltip: "Devemos adotar a árvore de tradição ['tradition_category:tradition_cybernetics'] para iniciar a fusão divina."
 machine_age.100.name: "O Conclave da Fusão"
 machine_age.100.desc: "Ao longo da história, nossas tentativas fracassadas de melhorar nossos corpos destruíram totalmente diversos receptáculos divinos, o que desencadeou interpretações conflituosas sobre fusão divina entre os diferentes credos.\n\nÀ medida que a tecnologia evoluiu para possibilitar a melhoria total, a liderança sagrada da nossa fé, os Tecnofantes, convocaram um Conclave. O objetivo é estabelecer os princípios da nossa Igreja, mesclando os credos individuais em um dogma unificado."
 machine_age.100.a: "Que a divindade os guie."
 machine_age.1000.name: "A Fusão da Fé"
 machine_age.1000.desc: "Não foi fácil formar o Conclave dos Tecnofantes, pois cada um dos credos mais importantes exigia um representante presente. Após algumas deliberações, §Y$CYBERCREED_construction$§!, §Y$CYBERCREED_war$§!, §Y$CYBERCREED_research$§! e §Y$CYBERCREED_labor$§! foram todos convidados.\n\nO Conclave agora aborda sua tarefa divina com forte convicção. Seu primeiro decreto exige dízimos mais altos ou serviço comunitário obrigatório da população geral."
 machine_age.1000.a: "Devemos decidir como apoiar o Conclave."
 machine_age.1000.a.tooltip: "Mais opções de abordagem ficarão disponíveis na situação."
 machine_age.1010.name: "O Códice da Melhoria"
 machine_age.1010.desc: "O segundo decreto do Conclave dos Tecnofantes busca formalizar a fé. Por muitos anos, as diferenças entre os diferentes credos causaram atritos na sociedade.\n\nTodos os maiores credos pressionam pela criação de uma fé unificada, enquanto vozes mais moderadas lutam por um caminho verdadeiramente aberto e inclusivo."
 machine_age.1010.a: "A Fraternidade do Martelo construirá um futuro melhor."
 machine_age.1010.a.tooltip: "O dogma se formará em torno do credo §Y$CYBERCREED_construction$§!. $machine_age.1010.shared.tooltip$"
 machine_age.1010.b: "Os Templários de Aço protegerão a [Owner.Species.GetFleshTypeCyberCreed] de nossos corpos."
 machine_age.1010.b.tooltip: "O dogma se formará em torno do credo §Y$CYBERCREED_war$§!.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.c: "O Coro da Mente cantará sobre o progresso."
 machine_age.1010.c.tooltip: "O dogma se formará em torno do credo §Y$CYBERCREED_research$§!.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.d: "A Comuna do Trabalho dará um propósito aos nossos trabalhadores."
 machine_age.1010.d.tooltip: "O dogma se formará em torno do credo §Y$CYBERCREED_labor$§!.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.e: "Temos que acabar com esses dogmas divisórios."
 machine_age.1010.e.tooltip: "Os credos serão reformados e transformados em §Y$pft_cyber_creed_general$§!. Assim, todos os receptáculos fiéis poderão ser modificados.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.shared.tooltip: "Todas as construções associadas aos outros Credos serão substituídas por §YTemplos§!.\nEste credo será a única §YFacção Espiritualista§!.\nSerá permitida a formação de facções pertencentes a Éticas §YNão Espiritualistas§!."
 machine_age.1020.name: "As Falsas Fés"
 machine_age.1020.desc.pickedacreed: "Após a escolha de §Y[GetCyberCreed]§!, os outros credos protestaram. Muitos acreditam que o Conclave se voltou contra a fé \"verdadeira\". \n\n$machine_age.1020.both$"
 machine_age.1020.desc.nocreed: "Os credos estão protestando e alegam que o Conclave rejeitou a fé.\n\n$machine_age.1020.both$"
 machine_age.1020.both: "Até o momento, os protestos foram enérgicos, porém pacíficos. Só o tempo poderá dizer se essas fagulhas acenderão alguma chama.\n\nSeja como for, devemos decidir o destino dos outros credos. Alguns sugerem excomunhão imediata, rotulando-os como hereges e afirmando que o transtorno causado por eles é prova de sua blasfêmia. Outros acreditam na clemência e nos pediram para sermos tolerantes com os membros divergentes da nossa fé."
 machine_age.1020.a: "Só pode haver uma única fé."
 machine_age.1020.a.tooltip: "Os Tecnofantes irão suprimir os outros credos, o que pode causar agitação."
 machine_age.1020.b: "Nossa fé acolhe todo mundo."
 machine_age.1020.b.tooltip: "Mesmo sem um dogma oficial, os Tecnofantes irão tolerar as práticas dos outros credos."
 machine_age.1030.name: "Enfurecendo os Fiéis"
 machine_age.1030.desc: "Protestos irromperam entre as minorias em nossos planetas, e muitos denunciam o que consideram um desvio da fusão sagrada de nossa parte. Os Tecnofantes acreditam que a agitação é temporária, já que a maioria do povo apoia o dogma unificado. É apenas uma questão de tempo até que os manifestantes mais fanáticos aceitem a verdade divina."
 machine_age.1030.a: "Haverá uma única fé."
 machine_age.1030.a.tooltip: "A decisão de suprimir outros credos causou certa agitação."
 machine_age.1040.name: "Conversão Espontânea"
 machine_age.1040.desc: "A dedicação a um dogma unificado se espalhou entre o nosso povo, e a maioria dos praticantes de outros credos abandonaram seus antigos costumes.\n\nCom exceção dos mais fanáticos, todos estão preparando a [Owner.Species.GetFleshTypeCyberCreed] divina de seus corpos para a transformação final."
 machine_age.1040.a: "A verdade da nossa fusão divina prevalece."
 machine_age.1040.a.tooltip: "A unificação da fé foi um sucesso."
 machine_age.1050.name: "Credos Satisfeitos"
 machine_age.1050.desc: "Permitir a liberdade de expressão de vários credos foi uma escolha bastante harmoniosa: notamos apenas pequenos protestos, compostos pelos membros mais fanáticos de alguns credos.\n\nCom a maioria dos fiéis seguindo o nosso dogma oficial, podemos nos concentrar na fusão divina."
 machine_age.1050.a: "Somos uma fé indivisível."
 machine_age.1050.a.tooltip: "A tolerância concedida aos credos divergentes preveniu agitações."
 machine_age.1060.name: "Complacência Irracional"
 machine_age.1060.desc: "Ceder às exigências radicais desagradou a maioria dos moderados. Alegando que todos os credos têm uma longa história de violência interna, muitos acreditam que permitir livremente crenças extremistas foi um erro.\n\nA maioria pede que esses credos sejam oficialmente reformados, e que qualquer forma de independência seja tirada deles."
 machine_age.1060.a: "Os fiéis devem ser tolerantes."
 machine_age.1060.a.tooltip: "A tolerância concedida aos credos desagradou as facções mais moderadas da nossa fé e causou agitação."
 machine_age.1060.b: "Comece a reformar os credos."
 machine_age.1060.b.tooltip: "A fé absorverá os credos divergentes e acabará com suas disputas de doutrina insignificantes."
 machine_age.1070.name: "O Dízimo do Tempo"
 machine_age.1070.desc: "Com a aproximação da grande fusão, relembramos uma antiga tradição da fé: o Dízimo do Tempo.\n\nPor inúmeras gerações, todos os fiéis da sociedade dedicaram parte do seu tempo e energia à Igreja. Assim como a fusão divina, esse serviço ajuda a fortalecer a estrutura da fé.\n\nComo os fiéis deveriam apoiar a melhoria divina?"
 machine_age.1070.intro: "Todo ano, os fiéis da nossa população dedicarão um pouco do seu tempo"
