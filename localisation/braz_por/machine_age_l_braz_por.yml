 trait_pc_cosmogenesis_world_preference: "Preferência por Torno Sináptico"
 trait_pc_cosmogenesis_world_preference_short: "Torno Sináptico"
 trait_pc_cosmogenesis_world_preference_desc: "A espécie não é adequada para sobreviver fora das cápsulas de suporte à vida de um Torno Sináptico. Ela anseia por um coma pacífico, não pelos incessantes ataques da realidade."
