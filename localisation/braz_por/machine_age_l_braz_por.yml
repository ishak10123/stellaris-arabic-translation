 tech_lathe_cogitator: "$building_lathe_cogitator$"
 tech_lathe_cogitator_desc: "$building_lathe_cogitator_desc$"
 tech_lathe_validator: "$building_lathe_validator$"
 tech_lathe_validator_desc: "$building_lathe_validator_desc$"
 building_lathe_capital: "Unidade de Processamento"
 building_lathe_capital_desc: "A natureza quântica das unidades de processamento do Torno Sináptico permite que ele realize cálculos computacionais de forma paralela entre diversas camadas dimensionais."
 building_lathe_major_capital: "Unidade de Processamento: Paralelizada"
 building_lathe_major_capital_desc: "Esta unidade de processamento aprimorada agora pode executar mais operações paralelas ao ricochetear os ecos cognitivos de Chips Neurais em bolsões de espaço-gama contidos."
 building_lathe_super_capital: "Unidade de Processamento: Vetorial"
 building_lathe_super_capital_desc: "Esta unidade de processamento aprimorada simplifica cálculos por meio da criação de vetores de espaço negativo. Essa compartimentalização dimensional de processos gera resultados extraordinários na eficiência e na estabilidade."
 building_lathe_resonator: "Ressonador Sináptico"
 building_lathe_resonator_desc: "Ressonadores canalizam e redirecionam o potencial cognitivo de pensamentos dispersos e sistemas autônomos, fazendo com que cada chip aumente a eficiência de seus vizinhos de processamento mais próximos."
 lathe_resonator_tt: "Produção de §Y$job_neural_chip_plural$§!: §G+1%§! por §Y$job_neural_chip$§!\n(Valor Atual: §G+[num_neural_chips]%§!)"
 building_lathe_stabilisator: "Estabilizador Neural"
 building_lathe_stabilisator_desc: "Sistemas de estabilização filtram o ruído computacional gerado quando Chips Neurais sofrem disfunções físicas. A redução das interferências acarreta um aumento na produção global."
 building_lathe_overclocker: "Overclocker Sináptico"
 building_lathe_overclocker_desc: "O Torno foi projetado para preservar os Chips Neurais instalados nele, mantendo-os produtivos pelo maior tempo possível. O Overclocker pode ignorar essa diretiva para acelerar e aumentar a produção, mas as chances de falha também aumentam."
 building_lathe_preserver: "Preservador Sináptico"
 building_lathe_preserver_desc: "Os componentes orgânicos da rede são especialmente vulneráveis a flutuações energéticas, que podem causar uma rápida degeneração axonal. O Preservador se esforça para reduzir essas flutuações e proteger as partes mais frágeis do Torno Sináptico."
 building_lathe_reactor: "Reator Expandido"
 building_lathe_reactor_desc: "Quanto mais chips estiverem conectados à rede, mais energia será necessária para mantê-la. A instalação de mais reatores pode minimizar a logística complexa inerente à energização do Torno Sináptico."
 building_lathe_life_support: "Sustentador Sináptico"
 building_lathe_life_support_desc: "Instalações dedicadas organizam a manutenção dos componentes críticos do Torno, permitindo o uso de mais chips e um ambiente de rede mais saudável."
 building_lathe_cogitator: "Indagador Sináptico"
 building_lathe_cogitator_desc: "Avaliar cadeias de abastecimento hiperespaciais é algo complexo. Redirecionar parte da energia de processamento para essa tarefa ajudará até mesmo a maior das frotas a avançar mais longe no território inimigo."
 building_lathe_cogitator_tt: "§YCapacidade Naval§!: §G1%§! por §Y$job_neural_chip$§!\n(Valor Atual: §G+[num_neural_chips]%§!)\n§YGanho de Experiência da Nave§!: §G+2%§! por §Y$job_neural_chip$§!\n(Valor Atual: §G+[num_neural_chips_double]%§!)"
 building_lathe_validator: "Validador Sináptico"
 building_lathe_validator_desc: "Embora o objetivo principal das funções especializadas do Validador seja ajudar a formular teses infinitas, ele também pode ser usado em aspectos mais gerais de computação."
 building_lathe_validator_tt: "$mod_category_computing_research_speed_mult$: §G+1%§! por §Y$job_neural_chip$§!\n(Valor Atual: §G+[num_neural_chips]%§!)"
 ### Synaptic Lathe UI
 SYNAPTIC_LATHE_STABILITY_DESC: "§E$r_stability$ é uma medida da estabilidade da rede global do Torno Sináptico. Ela é determinada primariamente pela £happiness£ §YFelicidade§! dos Chips Neurais.\n\nA Estabilidade pode ser reduzida por condições como £housing£ §RSuperpopulação§! e £amenities£ §RBaixo Conforto§!. Uma $PLANET_STABILITY_TITLE$ alta acarretará uma produção de recursos maior; porém, a produção será menor se a $PLANET_STABILITY_TITLE$ for baixa. Diferente das outras colônias, o Torno Sináptico nunca passará por grandes §YRevoltas§!.§!"
 SYNAPTIC_LATHE_RESISTANCE_DESC: "§E§YResistência§! é uma medida do nível geral de perturbação causada por Chips Neurais divergentes. Um alto nível de £crime£ §YResistência§! eleva a taxa de §YDeclínio de Pops§! e aumenta as chances de eles escaparem. Isso é naturalmente causado por uma grande população planetária e pode ser reduzido ao aumentar a £happiness£ §YFelicidade dos Pops§! ou construir £building£ §YEstabilizadores Neurais§!.§!"
 SYNAPTIC_LATHE_HOUSING_DESC: "§E§Y$PLANET_HOUSING_TITLE$§! representa a infraestrutura dedicada à moradia de Chips Neurais. A falta de espaço para acomodar e manter os Chips Neurais de forma adequada provocará uma queda na $r_stability$. Você poderá aumentar a §YMoradia§! ao construir £district£ §YDistritos§! adicionais, aprimorar a §YUnidade de Processamento§! do Torno ou construir £building£ §YSustentadores Sinápticos§!.§!"
 SYNAPTIC_LATHE_AMENITIES_DESC: "§E§Y$PLANET_AMENITIES_TITLE$§! representam a infraestrutura dedicada a atender às necessidades de suporte à vida dos Chips Neurais. Um planeta que não produz a quantidade de $PLANET_AMENITIES_TITLE$ necessária para sua população sofrerá penalidades à sua £happiness£ §YFelicidade§!. Você pode aumentar os níveis de §YConfortos§! ao aprimorar a §YUnidade de Processamento§! do Torno ou construir £building£ §YSustentadores Sinápticos§!.§!"
 SYNAPTIC_LATHE_RESISTANCE_TITLE: "Resistência"
