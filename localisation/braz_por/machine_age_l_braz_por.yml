 trait_auto_mod_biological: "Genômica Vocacional"
 trait_auto_mod_biological_desc: "Cadeias genéticas avançadas possuem gatilhos epigenéticos que se adaptam a demandas ocupacionais, otimizando a expressão genética de forma dinâmica para o ambiente de trabalho do indivíduo."
 trait_auto_mod_cyborg: "Melhorias Universais"
 trait_auto_mod_cyborg_desc: "Portas de conexão universais do tipo plug-and-play permitem que as melhorias sejam substituídas conforme necessário, alinhando suas capacidades com as demandas operacionais atuais."
 trait_auto_mod_robotic: "Estruturas Adaptativas"
 trait_auto_mod_robotic_desc: "De forma dinâmica, este sistema reconfigura o hardware para atender às demandas operacionais, otimizando o desempenho de cada tarefa designada."
 trait_auto_mod_overtuned: "Excelência Passageira"
 trait_auto_mod_overtuned_desc: "Gatilhos epigenéticos avançados impulsionam o desempenho físico e cognitivo no ambiente de trabalho, reduzindo drasticamente a expectativa de vida. Afinal, definhar nunca é tão divertido quanto viver ao máximo."
 concept_automodding_trait: "Característica de Automodificação"
 concept_automodding_traits: "Características de Automodificação"
 concept_automodding_trait_desc: "- Modificadores são combinados automaticamente com outros de uma lista de características predeterminada para corresponderem ao emprego sendo desempenhado.\n- Os efeitos das características aumentam com a porcentagem do Grupo de Pop que possui a característica.\n- $pop$ §HPops§! com §Y$concept_automodding_traits$§! verificados mensalmente por Colônia: §G100§!\n- Crescimento de Pop e £building£ Construções de Montagem aumentam a quantidade de £pop£ §HPops Automodificados§! atualizados por mês."
 concept_automodding_biological: "Lista de Características de Automodificação Biológica"
 concept_automodding_biological_desc: "- ['trait:trait_traditional']\n- ['trait:trait_thrifty']\n- ['trait:trait_intelligent']\n- ['trait:trait_industrious']\n- ['trait:trait_agrarian']\n- ['trait:trait_ingenious']\n- ['trait:trait_charismatic']"
 concept_vocational_traits: "Características Vocacionais"
 concept_vocational_traits_desc: "$concept_vocational_traits$ são Características de Espécie que podem ser modificadas automaticamente pela característica ['trait:trait_auto_mod_biological'].$NEW_LINE$$concept_automodding_biological_desc$"
 concept_fleeting_excellence_traits: "Características de $trait_auto_mod_overtuned$"
