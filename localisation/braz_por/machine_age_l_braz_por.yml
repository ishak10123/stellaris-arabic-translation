 machine_age.1075.name: "Sangue e Circuitos"
 machine_age.1075.desc: "O momento da fusão divina finalmente chegou.\n\nÉ hora de erguermos edifícios do sagrado §Y$building_augmentation_center$§! em nossos mundos para iniciar o processo."
 machine_age.1075.a: "$machine_age.1090.pray$"
 machine_age.1075.a.tooltip: "Os fiéis já estão passando por uma melhoria cibernética completa. Todas as outras ações do Conclave ficarão paradas até a conclusão da fusão divina.\n\n§RAção necessária:§!\nConstrua um $building_augmentation_center$ para dar continuidade à situação §Y$situation_cybernetic_creed_cyberization$§!."
 machine_age.1090.name: "O Futuro da Carne"
 machine_age.1090.desc: "Com a conclusão da jornada divina, nossos corpos finalmente alcançaram a fusão sagrada entre máquina e [Owner.Species.GetFleshTypeCyberCreed]. A última etapa para os fiéis é a instalação de melhorias sagradas."
 machine_age.1090.construction: "$machine_age.1090.desc$ §Y$CYBERCREED_construction$§! exige que nossos corpos se tornem ferramentas divinas.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.war: "$machine_age.1090.desc$ §Y$CYBERCREED_war$§! exigem que os fiéis sejam transformados em armas sagradas.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.research: "$machine_age.1090.desc$ §Y$CYBERCREED_research$§! revelará os segredos do universo com uma população de mentes conectadas.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.labor: "$machine_age.1090.desc$ §Y$CYBERCREED_labor$§! promete manter as nossas mesas e armazéns sempre cheios.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.pray: "A fusão é divina. Melhoria é veneração."
 machine_age.1090.a: "O credo [GetCyberCreed] forjará uma nova era."
 machine_age.1090.a.tooltip: "$machine_age.geneslockedtooltip$\n$cyber.21.a.end$\n$machine_age.democraticgovtooltip$\nLibera o Edito: §Y[GetCyberCreedEdict]§!"
