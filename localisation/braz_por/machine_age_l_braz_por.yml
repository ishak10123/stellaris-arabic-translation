 district_cosmogenesis_world_science: "Porta Neural"
 district_cosmogenesis_world_science_plural: "Portas Neurais"
 district_cosmogenesis_world_science_desc: "O conjunto das habilidades imaginativas de inúmeros indivíduos nos permite executar simulações rápidas de hipóteses avançadas. Uma estrutura complexa de portas lógicas e caches de memória orgânica proporcionam uma produção com precisão incomparável."
 district_cosmogenesis_world_logic: "Especulador Ampliativo"
 district_cosmogenesis_world_logic_plural: "Especuladores Ampliativos"
 district_cosmogenesis_world_logic_desc: "Este distrito, considerado uma maravilha da metafísica dialética, usa Chips Neurais para determinar a verdade em afirmações formais sobre a realidade. Basicamente, ele responde \"sim\" ou \"não\" para a maioria das questões complexas já feitas pela mente coletiva dos habitantes do Torno Sináptico."
 tech_lathe_resonator: "$building_lathe_resonator$"
 tech_lathe_resonator_desc: "$building_lathe_resonator_desc$"
 tech_lathe_overclocker: "$building_lathe_overclocker$"
