 pc_cosmogenesis_world_desc: "Um sistema de redes neurais gigantesco, projetado para conectar bilhões de seres sencientes, orgânicos ou sintéticos, por meio de um complexo conjunto de cabos, transistores e cápsulas de suporte à vida. A pressão intensa exercida sobre os órgãos de processamento individuais inevitavelmente causará danos cerebrais a qualquer \"componente\"."
