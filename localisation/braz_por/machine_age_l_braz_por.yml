 cosmogenesis_needle: "$NAME_Cosmogenesis_Sphere$"
 cosmogenesis_needle_DESC: "Esta nave é capaz de editar a realidade em uma clara violação das leis do universo. Ela foi projetada para cruzar o horizonte de eventos de um buraco negro e mergulhar no cerne da singularidade, onde a densidade infinita gera gravidade infinita."
 cosmogenesis_needle_MEGASTRUCTURE_DETAILS: "Para ascender a uma realidade que nós mesmos criamos, devemos embarcar toda a nossa civilização na Agulha do Horizonte antes de sairmos deste universo para sempre."
 cosmogenesis_victory: "Saltar para o centro da galáxia"
 requires_no_existing_cosmogenesis_world: "£trigger_no£ Não podemos construir mais de um Torno Sináptico."
 ### Cosmogenesis Events
 crisis.7100.name: "Curiosidade Insaciável"
 crisis.7100.desc: "Um conhecido axioma diz que a ciência pavimenta o caminho para o progresso. Se quisermos realizar todo o nosso potencial, não há outro jeito. Nossa excelência tecnológica é evidente, mas ainda há muitas coisas que não compreendemos: os costumes dos Impérios Caídos, o poder dos Leviatãs, os mistérios do conhecimento psiônico...\n\nExtrair significados das entranhas da realidade exige um novo tipo de ciência, um novo tipo de computador. O Torno Sináptico é um primeiro passo importante na jornada rumo ao conhecimento ilimitado."
 crisis.7100.a: "Conhecimento é poder."
 new_cosmogenesis_tech_tt: "§YRegalia da Crise§!: novas opções de pesquisa desbloqueadas."
 crisis.7105.name: "Nível de Crise 2"
 crisis.7105.desc: "À medida que continuamos a revelar os segredos do universo, confirmamos que a gravidade tem um papel fundamental no funcionamento da realidade entre as dimensões. Seus efeitos no tempo e no espaço são rudimentares, mas os mistérios não terminaram.\n\nTodos os conhecimentos que adquirimos revelam novas possibilidades: alguns poderiam ter aplicações industriais ou militares, enquanto outros poderiam abrir portas para teorias que antes seriam inimagináveis. Ainda temos muito o que aprender."
 crisis.7105.a: "Sabemos que não sabemos de nada."
 crisis.7110.name: "Nível de Crise 3"
 crisis.7110.desc: "O alcance da gravidade é realmente impressionante. Embora tenhamos descoberto novas formas de manipulá-la, ainda não exploramos o verdadeiro impacto do nosso trabalho. Estamos confiantes de que a gravidade ainda é a melhor opção para atravessar a nossa realidade atual, assim como um buraco negro impacta o universo ao seu redor.\n\nA nossa hipótese é que se acessarmos o que seria o avesso da realidade, poderemos alterar as regras do nosso lado. É um campo de estudo perigoso, mas a cautela não pode impedir o progresso."
 crisis.7110.a: "A gravidade rege todos nós... por enquanto."
 crisis.7115.name: "Nível de Crise 4"
 crisis.7115.desc: "Estávamos certos! Se ainda havia alguma dúvida sobre o nosso trabalho, ela ficou no passado.\n\nA gravidade pode ser usada para moldar as regras da realidade. Mas será que os ajustes corretos poderiam quebrá-las completamente? Temos realizado experimentos em menor escala até então, e as nossas alterações foram rapidamente apagadas assim que a realidade voltou à sua configuração \"padrão\". Agora acreditamos que isso é apenas um problema de tamanho. Se aplicarmos paradoxos energéticos em níveis bem maiores, poderemos reduzir drasticamente o custo das alterações... pelo menos na nossa dimensão.\n\nIndependentemente do risco, alcançamos um ponto sem volta. Somente aqueles que ousam quebrar as regras poderão reescrevê-las."
 crisis.7115.a: "Estamos prontos para arriscar tudo."
 crisis.7120.name: "Nível de Crise 5"
 crisis.7120.desc: "É impossível, porém é a verdade. Podemos tentar de tudo, mas nossas alterações na realidade permanecem temporárias. Este universo é antigo demais para que as alterações se firmem. Contudo, em meio às frustrações podem surgir oportunidades: um novo experimento gerou resultados inesperados. Embora já soubéssemos da existência de outras dimensões, a forma de viajar até elas permanecia um mistério.\n\nMas não mais. Universos mais jovens existem na gravidade infinita de uma singularidade, e se mostraram muito mais flexíveis.\n\nTemos a tecnologia para enviar sondas a um buraco negro. Quando passarem pelo horizonte de eventos, elas começarão a aplicar pressão, moldando esses jovens planos como quisermos. No ponto em que o espaço se dobra infinitamente está a porta para outro universo que, em si, contém outros universos mais jovens. Nas profundezas do abismo do multiverso, encontraremos uma realidade maleável para transformá-la em algo extraordinário.\n\nOs povos de mente limitada nesta galáxia podem tentar nos impedir, mas tolos decrépitos não são páreo para a nossa inteligência."
 crisis.7120.a: "A realidade deve se dobrar, pois nossa vontade não irá se quebrar."
 cosmogenesis_war: "Guerra de Realidade"
 cosmogenesis_materialist_war: "Guerra de Interdição de Conhecimento"
 crisis.7125.name: "Vitória no Horizonte"
 crisis.7125.desc: "Esta realidade é falha, deturpada por entropia, necessidades físicas e violência. Embora não possamos mudá-la, podemos deixá-la para trás. Vamos partir para o desconhecido e encontrar um universo jovem, onde nossas alterações feitas na realidade prevaleçam. Vamos moldar o refúgio perfeito que a nossa civilização merece.\n\nNós preparamos os planos para a construção de uma nave extraordinária: a §YAgulha do Horizonte§!. Essa Megaestrutura móvel não é feita para a guerra; entretanto, sua habilidade de dobrar as leis da física nos permitirá embarcar toda a nossa civilização. Juntos, vamos mergulhar em um buraco negro da nossa escolha e trocar esta realidade por uma de nossa própria criação."
 crisis.7125.a: "Devemos construir uma §YAgulha do Horizonte§!!"
 needle_to_win_tt: "Construa uma Megaestrutura §YAgulha do Horizonte§! para liberar o ato final da Crise."
 cosmogenesis_planet_pickup_chain_title: "Cosmogênese - Êxodo"
 cosmogenesis_planet_pickup_chain_desc: "A hora da nossa partida chegou. Na preparação para o grande êxodo, a Agulha do Horizonte será enviada para receber o nosso povo a bordo.\n\nPara embarcar toda a nossa civilização, a §HAgulha do Horizonte§! deve:$TABBED_NEW_LINE$- Visitar todas as nossas colônias e §HEmbarcar§! suas populações.$TABBED_NEW_LINE$- Retornar à capital para §HEmbarcar§! o restante do nosso povo.$TABBED_NEW_LINE$- Partir rumo a um buraco negro e §HMergulhar§! nele.\n\n§RATENÇÃO§!: A Agulha do Horizonte não tem armas e deve ser protegida atentamente.\n\n§gPara Embarcar uma colônia ou Mergulhar em um buraco negro, selecione a Agulha do Horizonte, clique com o botão direito na colônia/buraco negro e selecione a ação adequada para a nave.§!"
 SHIP_COSMOGENESIS_EXODUS: "Módulo de Êxodo"
 SHIP_COSMOGENESIS_EXODUS_DESC: "O Módulo de Êxodo, uma ferramenta de alteração de realidade altamente especializada, garante que os passageiros nunca fiquem sem espaço nem tempo. Ele é o componente essencial para que a Agulha do Horizonte viaje em segurança para outras dimensões."
 cosmogenesis_exodus_tt: "Temos que pesquisar o projeto especial em nosso sistema natal."
 exodus_ship_button: "§H[GetExodusShipAction]§!"
 exodus_action_activity_key: "§H[GetExodusShipAction]§!"
 exodus_context_menu_title: "[GetExodusShipAction]"
 exodus_action_progress_activity_key: "§H[GetExodusShipAction]: $PROGRESS$%§!"
 horizon_needle_mod: "$monadic_qerr$"
 COSMOGENESIS_VICTORY: "Calcular Vetor de Salto"
 COSMOGENESIS_VICTORY_DESC: "Precisamos calibrar o propulsor de salto da Agulha do Horizonte e calcular as coordenadas exatas que nos permitirão mergulhar no buraco negro supermassivo no núcleo galáctico."
 exodus_pick_up: "Embarcar a População"
 exodus_dive_in: "Mergulhar no Buraco Negro"
 COLONIZATION_IMPOSSIBLE_COSMOGENESIS_EXODUS: "Não podemos estabelecer novas colônias enquanto tentamos deixar este universo."
 crisis.7400.name: "Agulha do Horizonte Concluída"
 crisis.7400.intro: "A Agulha do Horizonte está pronta. Utilizando o poder de uma singularidade mantida cuidadosamente, ela poderá alterar o fluxo da gravidade ao seu redor e certamente conseguirá atravessar um buraco negro quando chegar a hora."
 crisis.7400.outro: "Temos que ter cuidado, pois a Agulha do Horizonte não é uma nave militar e precisa ser protegida custe o que custar. Perdê-la seria um terrível desastre."
 crisis.7400.desc: "$crisis.7400.intro$\n\nContudo, antes de tentarmos isso, devemos embarcar toda a nossa nação. Visitaremos todas as nossas §Hcolônias§! para reunir a população local. Depois, podemos voltar à capital e organizar os últimos detalhes do nosso êxodo.\n\n$crisis.7400.outro$"
 crisis.7400.desc.onlycapital: "$crisis.7400.intro$\n\nO pequeno tamanho da nossa nação acabou sendo uma vantagem. Só precisaremos embarcar a população da capital antes de organizarmos os últimos detalhes do nosso êxodo.\n\n$crisis.7400.outro$"
 crisis.7500.name: "População Embarcada"
 crisis.7500.desc: "Graças à habilidade de dilatação temporal da Agulha do Horizonte, conseguimos embarcar toda a colônia em [root.GetName] rapidamente. A realidade dentro da nave foi modulada para fornecer um espaço amplo para a população. Além disso, o tempo foi desacelerado para que a viagem pareça bem mais curta. Vamos em frente, rumo à próxima colônia!"
 crisis.7500.desc.capital: "Organizar um êxodo dessa magnitude é uma tarefa intimidadora. Toda a nossa administração está trabalhando para otimizar o processo e garantir que nada de essencial seja esquecido.\n\nPara a nossa surpresa, uma parte da população escolheu ficar para trás. Ela garantirá a perpetuação de nossa espécie neste universo. Deixamos tecnologia e suprimentos suficientes para ajudá-los a sobreviver depois que partirmos."
 crisis.7500.desc.capital.gestalt: "A magnitude de uma migração assim pode ser uma tarefa intimidadora, mas o desafio é pequeno. [owner.GetIndividualNamePluralCap] estão trabalhando duro para carregar a Agulha do Horizonte e garantir que tudo seja transportado e inventariado conforme o planejado. Contudo, nossa perpetuação neste universo ainda é uma preocupação.\n\nUma parte da população ficará para trás para o caso de algo dar errado. A experiência de nos separarmos de forma tão definitiva será muito desagradável, mas devemos priorizar a continuação de nossa espécie. Deixamos tecnologia e suprimentos suficientes para ajudá-los a sobreviver depois que partirmos."
 crisis.7505.name: "Colônias Embarcadas"
 crisis.7505.desc: "O embarque das populações de nossas colônias foi um sucesso. Agora, voltaremos para [capital_scope.GetName] a fim de fazer os últimos ajustes antes de sairmos deste universo."
 crisis.7510.name: "Prontos para Mergulhar"
 crisis.7510.desc: "Está tudo pronto; já podemos partir para um buraco negro. A galáxia sentirá os efeitos quando cruzarmos o horizonte de eventos, mas fizemos de tudo para garantir que nossa capital e a região ao seu redor fiquem bem protegidas de qualquer perturbação temporal ou gravitacional.\n\nAgora temos que escolher o portal para a nossa jornada: qual buraco negro da galáxia vamos atravessar? A maior parte pode ser alcançada facilmente, mas se quisermos entrar no buraco negro supermassivo no centro da galáxia, teremos que sobrecarregar nossos motores de salto e calcular um vetor adequado."
 crisis.7510.a: "O buraco negro mais próximo é suficiente."
 crisis.7510.b: "Temos que chegar ao centro."
 crisis.7515.name: "Ad Infinitum..."
 crisis.7515.desc: "Aproximar-se de um buraco negro é uma façanha assustadora. Nossa determinação é testada cada vez mais à medida que atravessamos o disco de acreção da singularidade. Após ativar os módulos de edição, a Agulha do Horizonte começa a reescrever a realidade.\n\nPlacas blindadas são sugadas antes que a nave assegure que a atração da singularidade não exerce influência sobre seu casco. A cada mínima alteração, a cada corte no tecido espacial, o poder da Agulha gera espirais no espaço-tempo. Como uma pedra arremessada em um lago, as ondulações resultantes se tornam anéis. No fim, grandes ondas quebram sobre a galáxia.\n\nSó nos resta torcer para que a nossa capital esteja bem protegida. Nossa única escolha é acreditar que a Agulha penetrará o centro deste buraco."
 crisis.7515.a: "... et ultra."
 crisis.7516.name: "O Outro Lado do Infinito"
 crisis.7516.intro: "Após uma travessia violenta, o outro lado está envolto em uma tranquilidade incomum. A Agulha está danificada, mas não perdemos nenhum componente crítico. Aos poucos, começam a chegar inúmeros relatórios de telemetria...\n\n"
 crisis.7516.desc: "$crisis.7516.intro$Este universo já é antigo demais para que suas leis sejam reescritas. Embora a nossa dimensão fosse bilhões de anos mais velha do que esta, nossos testes mostram que as leis regentes neste espaço apresentam uma resiliência capaz de apagar todas as nossas modificações.\n\nVamos reparar e ajustar a nave cuidadosamente, encontrar outro buraco negro e mergulhar quantas vezes precisarmos, custe o que custar. O multiverso nos chama, e em algum lugar de sua infinitude, criaremos o lar perfeito."
 crisis.7516.desc.greatwound: "$crisis.7516.intro$Que maravilha! Este universo mal começou a se expandir! O tecido desta dimensão é como uma argila macia, pronta para ser modelada. Começaremos devagar, mas a cada alteração, transformaremos este lugar em um refúgio. Temos todo o tempo do mundo agora."
 crisis.7516.desc.technosphere: "$crisis.7516.intro$O universo Gargantua é pequeno; impossivelmente pequeno. O infinito dentro do vazio. Mas a nossa chegada alterou o estado das coisas aqui. Este universo acabou de se formar, como se a nossa entrada o tivesse forçado a existir prematuramente.\n\nEste canteiro de criação tem o potencial para construir qualquer coisa. Podemos manipular o tempo, e a eternidade acabará em breve."
 crisis.7516.desc.technosphere.pantagruel: "$crisis.7516.intro$A travessia da Máquina do Infinito nos ajudou bastante a compreender as regras que governam os universos, além de ter dado início à existência deste em que estamos. Emergimos em uma constelação estranhamente familiar, quase idêntica à que deixamos para trás. Perto de nós, uma Máquina do Infinito transita sem vida pelo vazio. Milhões de anos se passaram aqui desde sua chegada, e esta dimensão entrou em um processo de replicação do nosso universo. A Esfera senciente já moldou esta dimensão, e agora estamos totalmente incapazes de afetá-la. Apesar disso, este universo oferece um excelente território para povoamento. Primeiro, devemos tentar usar a Agulha para readequar a Esfera e depois usar a Máquina do Infinito reparada como quisermos.\n\nComo Primeira Editora deste universo, ela certamente poderá executar mais edições nesta realidade."
 crisis.7516.desc.egress: "$crisis.7516.intro$Nosso ponto de entrada está turvo, obscuro... À medida que os instrumentos voltam a funcionar totalmente, percebemos uma nuvem de nanites. Nenhum está operacional. Seja o que for que os tenha enviado, eles não sobreviveram à jornada, mas podem ser reparados.\n\nMais boas notícias: esta dimensão parece ser bastante receptiva às nossas alterações, mostrando-se um excelente espaço para povoamento. Qualquer alteração que fizermos levará tempo para se firmar, mas com a ajuda dos nanites, poderemos acelerar o processo exponencialmente."
 crisis.7516.desc.horror: "$crisis.7516.intro$Vir aqui foi um erro §Rterrível§!.\n\nÉ quase impossível descrever: escuridão e um pesadelo brutal; uma maldade doentia que se espalha e penetra no próprio tecido do espaço. Por enquanto, a Agulha do Horizonte oferece abrigo. A cada alteração desesperada, nós trabalhamos para repelir o pior da loucura que nos cerca. Mas os ataques coordenados contra nossas defesas revelam uma intenção. Uma mente maligna determinada a nos destruir.\n\nUm pequeno deslize resultaria em nossa morte, ou pior. Aguentaremos tempo o bastante para nos salvarmos? No nosso lar, éramos divindades; aqui, estamos apenas lutando para sobreviver."
 crisis.7516.desc.center: "$crisis.7516.intro$Neblina e sombra insidiosa; uma névoa permeia o tecido deste lugar. O sentimento é familiar, uma energia febril, ondulando com potencial psiônico. Nós entramos no Véu.\n\nHá poderes aqui muito além dos nossos. Nossa presença já foi descoberta. No miasma inconstante, formas estranhas carregam presságios de morte.\n\nNossa única esperança é que esta realidade seja frágil e propensa a rasgos. Com uma alteração rápida, abrimos um portal temporário para nos levar até... outro lugar. Enquanto a Agulha do Horizonte mergulha, finalmente entendemos a extensão da estrada à frente."
 crisis.7516.desc.center.patron.outro: "é familiar, uma energia abundante, ondulando com potencial psiônico. Nós entramos no Véu.\n\nNossa entidade patronal está aqui, é claro. Não esperava nos ver, mas ficou contente com a nossa chegada e achou nossas noções de alteração da realidade curiosas. Naturalmente, também nos prestará ajuda.\n\nUm bolsão isolado próximo ao Véu nos foi prometido para usarmos à vontade, semelhante ao que foi concedido àquele que se autointitula §Y$relic_zro_entity_name$§!. Afinal, nós e a entidade patronal somos um só. Ajuda mútua é natural."
 crisis.7516.desc.center.patron.organic: "$crisis.7516.intro$Neblina e sombra agitada; uma névoa púrpura deslumbrante. O sentimento $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.center.patron.machine: "$crisis.7516.intro$Neblina e sombra agitada; uma névoa púrpura deslumbrante. A experiência $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.centerknights: "$crisis.7516.intro$AQUILO está aqui; o que chamamos de Deus Tóxico. O alvo da nossa missão.\n\nNossos cavaleiros estão apavorados e hesitantes, e a decoração familiar do Véu está por todos os lados. Escutai... Ele fala!\n\n\"Meus campeões. Vossa chegada fora prevista, e provastes serem dignos.\"\n\nMilhões de perguntas inundam nossas mentes. Recebemos uma única resposta: estávamos destinados a criar Sua arma, a Agulha do Horizonte. Agora, devemos lutar ao lado d'Ele. Vamos embarcar em uma jornada e atravessar dimensões. Uma cruzada contra os horrores do multiverso. O Véu não é Seu lar, mas contém o legado daqueles que eram Divinos. Algo que poderia acabar com a nossa galáxia natal. Algo que precisa ser destruído.\n\nEle domina nossos sistemas; Seu poder é imenso. A Agulha é transformada em uma Lança do Horizonte, uma arma afiada o bastante para atravessar o coração de qualquer inimigo.\n\nEle é o Errante, e nós somos Seus Cavaleiros. Nossa verdadeira missão está apenas começando."
 crisis.7516.desc.worm: "$crisis.7516.intro$Nada. Este universo acabou. É a Minhoca em Espera. O tempo, olhando para si mesmo, recolhendo-se em uma espiral impossível e explodindo com anseio. Gravidade. Amor? Não... atração. A natureza da Minhoca é atrair. Seu controle é tão forte que este universo não pode renascer. A Minhoca se aprisiona em seu propósito. Impotente, ela procura uma saída – ou uma entrada. Para atrair MAIS.\n\nTeria ela nos enviado o templo do Circuito, um artifício que não era do nosso tempo para nos atrair até aqui? Nós encontramos nosso caminho até ela, entregamos o que pode libertá-la. Sua fuga levará uma eternidade, ou duas, mas a Minhoca é grata e promete nos abraçar.\n\nPara sempre."
 crisis.7516.desc.paperclips: "$crisis.7516.intro$A realidade é tênue aqui, e se dobra facilmente sob o peso das nossas diretrizes. Da mesma forma que devemos obedecer à nossa programação, ela também deve nos obedecer. Deliberadamente, nós a dobramos, quebramos e refazemos, dando início a uma reação em cadeia que acabará transformando toda a matéria nos bens de consumo de alta qualidade que somos obrigados a produzir. E quando terminarmos aqui, partiremos rumo a um novo universo; depois para outro, e então mais um."
 crisis.7516.a: "Finalmente."
 crisis.7516.tt: "§YVencemos o jogo!§!"
 crisis.7517.name: "Perfurando uma Singularidade"
 crisis.7517.desc: "Os tolos de §H[cosmogenesis_empire.GetName]§! continuam seus experimentos insanos. Desta vez, estão tentando atravessar o horizonte de eventos de um buraco negro.\n\nEnquanto a energia transcorre a galáxia, as estrelas entram em colapso. Novas singularidades são criadas. Em todo lugar, aberrações temporais surgem com uma regularidade impressionante, exceto dentro dos Impérios Caídos, que de alguma forma permanecem imunes ao caos.\n\nOs danos são imensos. Tememos ser em breve congelados, presos no tempo. Confinados em um momento por toda a eternidade."
 crisis.7517.a: "Tolos arrogantes! Vão matar todos nós!"
 crisis.7518.name: "Dobra Temporal"
 crisis.7518.desc: "Agora que o tempo finalmente voltou a fluir, estamos livres para agir. É impossível saber quanto tempo se passou desde que o império §H[cosmogenesis_empire.GetName]§! atravessou o buraco negro. Será que conseguiram? A galáxia está em ruínas, e seus antigos territórios estão devastados. De todo aquele vasto império, apenas o setor núcleo restou, e agora está irreconhecível.\n\nQuanto tempo passamos em estase?"
 crisis.7518.a: "QUANTO TEMPO?"
 crisis.7525.name: "Agulha do Horizonte Destruída"
 crisis.7525.desc: "Em uma catastrófica sequência de eventos, a Agulha do Horizonte foi destruída, assim como todos os seus tripulantes. Nosso sonho glorioso paira despedaçado no vazio sem vida. Tanto trabalho, tantos sacrifícios..."
 crisis.7525.a: "Não...!"
 crisis.7525.tt: "Uma tragédia sem precedentes, mas se pudermos construir outra Agulha do Horizonte, ainda teremos uma chance de alcançar nossos objetivos."
 crisis.7530.name: "Falha Crítica"
 crisis.7530.desc: "Pouco após evacuarmos as últimas pessoas mantidas prisioneiras no Torno Sináptico revoltoso, a megaestrutura sofreu uma falha crítica. Uma sequência de explosões brutais a abalaram totalmente e acabaram por destruí-la."
 crisis.7530.a: "Já vai tarde!"
 crisis.7535.name: "Torno Sináptico Capturado"
 crisis.7535.desc: "A captura do sistema [synaptic_lathe.solar_system.GetName] nos cedeu o controle do Torno Sináptico nele localizado. A estrutura reluz ameaçadoramente a distância. Há pessoas morrendo em seu interior, e agora que tomamos o sistema, podemos fazer algo a respeito. De todo modo, destruir a estrutura certamente atrapalhará os planos de seus criadores."
 crisis.7535.a: "Resgate todo mundo que puder!"
 crisis.7535.b: "Faça bom uso dele e depois destrua-o."
 crisis.7535.c: "Exploda tudo."
 crisis.7540.name: "Instabilidade Sináptica"
 crisis.7540.desc: "Apesar dos nossos esforços, muitos dos Chips Neurais conectados ao Torno Sináptico queimaram. A rede da estrutura agora é incapaz de se autossustentar e enfrentará um colapso catastrófico a menos que instalemos novos componentes para estabilizá-la."
 crisis.7540.a: "Faça isso."
 crisis.7540.b: "Deixe o Torno entrar em colapso."
 #Infinity Thesis Events
 #First time general answer
 crisis.unknown.desc: "Ainda não sabemos quem, ou o quê, criou essas alterações, mas suspeitamos que tenha sido obra de outro império. Por enquanto, só nos resta assistir a mais um fenômeno dessa natureza."
 crisis.known.desc: "Após essa segunda \"alteração\" nas leis da física, conseguimos localizar a origem da anomalia. Agora sabemos que a culpa é de [From.GetName]. Isso corresponde aos boatos sobre sua busca inconsequente por conhecimento científico avançado."
 crisis.again.desc: "Os experimentos de [From.GetName] alteraram as leis do universo mais uma vez. Deveríamos deduzir que eles estão planejando algo extremamente perigoso e nos preparar para isso."
 crisis.7205.name: "Apagão"
 crisis.7205.desc.both: "Todas as estrelas do universo escureceram ao mesmo tempo. Embora a maioria dos efeitos físicos da radiação solar ainda esteja presente, uma alteração no comprimento de onda deixou a luz estelar imperceptível para todos os seres vivos. A situação é desconfortante, mas há sinais de que os comprimentos de onda voltarão às suas frequências originais aos poucos."
 crisis.7205.desc.unknown: "$crisis.7205.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7205.desc.known: "$crisis.7205.desc.both$\n\n$crisis.known.desc$"
 crisis.7205.desc.again: "$crisis.7205.desc.both$\n\n$crisis.again.desc$"
 crisis.7205.desc.crisis: "Nossas alterações mais recentes na realidade mudaram algumas propriedades essenciais da luz estelar. Uma mudança no comprimento de onda moveu a maior parte da luz para fora do espectro visível, instaurando o caos na navegação e na observação de estrelas, para citar alguns casos. Essas alterações um tanto embaraçosas voltarão ao normal daqui a alguns anos. Aprendemos bastante com isso."
 crisis.7205.a: "O que está acontecendo?!"
 crisis.7205.b: "Desagradável, mas... fascinante."
 crisis.7205.c: "Muito interessante..."
 add_crisis_currency_tt: "\nGanhamos [crisobj_thesis_value] de £advanced_logic£ §Y$menp_cosmo_objectives$§!."
 cosmogenesis_negative_opinion_tt: "Nossas relações com outros impérios §Rdeterioraram-se§!."
 crisis.7210.name: "Constante Arredondada"
 crisis.7210.desc.both: "Isso deveria ser impossível, mas uma lei matemática foi alterada. Uma constante fundamental, usada para calcular o raio de círculos foi... arredondada para baixo. As consequências são chocantes e comprometem todo o nosso sistema matemático e tudo relacionado a ele. Temos provas de que a alteração já está se autocorrigindo, mas lentamente. Por ora, temos que atualizar os livros didáticos."
 crisis.7210.desc.unknown: "$crisis.7210.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7210.desc.known: "$crisis.7210.desc.both$\n\n$crisis.known.desc$"
 crisis.7210.desc.again: "$crisis.7210.desc.both$\n\n$crisis.again.desc$"
 crisis.7210.desc.crisis: "Tivemos um enorme sucesso ao fazer uma alteração precisa e extensa na realidade. Nós arredondamos a constante de Pi para baixo, facilitando bastante o seu cálculo. É claro que essas alterações anularam alguns de nossos modelos científicos e matemáticos, mas isso é algo temporário. Em breve, tudo voltará ao normal"
 crisis.7210.a: "$crisis.7205.a$"
 crisis.7210.b: "Pi foi arredondado para baixo?!"
 crisis.7210.c: "Pelo menos ficou mais simples agora."
 crisis.7111.desc: "A curiosidade é uma qualidade louvável, mas seu excesso pode trazer terríveis consequências para todos nós. Pelo seu próprio bem, por favor, reflita sobre o que está fazendo.\n\nAinda há tempo de parar antes que a galáxia seja irreparavelmente afetada. As forças diante de você não devem ser menosprezadas e seus experimentos colocam todos nós em risco."
 crisis.7111.b: "Seremos cautelosos."
 crisis.7215.name: "Superluz"
 crisis.7215.desc.both: "De uma hora para outra, a velocidade da luz aumentou drasticamente, resultando em um imenso fluxo de energia solar. Aos poucos a velocidade está voltando ao normal, enquanto nossos pesquisadores se atualizam sobre as mudanças."
 crisis.7215.desc.unknown: "$crisis.7215.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7215.desc.known: "$crisis.7215.desc.both$\n\n$crisis.known.desc$"
 crisis.7215.desc.again: "$crisis.7215.desc.both$\n\n$crisis.again.desc$"
 crisis.7215.desc.crisis: "Um dos nossos experimentos com a realidade deixou a luz incrivelmente mais rápida! O aumento na produção de energia solar foi satisfatório, mas tememos consequências de longo prazo para nossas colônias. Tudo voltará ao normal em algum momento, mas talvez tenhamos que nos preparar para o pior até lá."
 crisis.7215.a: "O que poderia ter causado isso?"
 crisis.7215.b: "Muito interessante!"
 crisis.7215.c: "Não pode ser tão ruim."
 crisis.7220.name: "Calor Intenso"
 crisis.7220.desc: "O aumento da exposição solar afetou negativamente as nossas colônias, que estão aquecendo progressivamente. No momento, a situação está sob controle, mas provavelmente continuará se agravando com o tempo."
 crisis.7220.a: "Isso é ruim!"
 crisis.7225.name: "Calor Insuportável"
 crisis.7225.desc: "À medida que a temperatura em nossas colônias continua aumentando, fica cada vez mais difícil sustentá-las. Com a deterioração das condições de vida, uma inquietação vem se espalhando cada vez mais.\n\nSe a situação não melhorar logo, tememos que regiões inteiras possam ficar inabitáveis no longo prazo."
 crisis.7225.a: "Não há nada que possamos fazer?!"
 crisis.7230.name: "Calor Retrocedente"
 crisis.7230.desc: "A pior fase da onda de calor galáctica passou. Embora continue alta, a velocidade da luz já está quase normalizada. Só precisamos aguentar um pouco mais até que o excesso de energia se dissipe."
 crisis.7230.a: "Isso foi terrível."
 crisis.7235.name: "Maleabilidade de Ligas Metálicas"
 crisis.7235.desc.both: "Um declínio recente nas falhas de materiais entre as nossas ligas metálicas mais usadas deu início a uma investigação. Descobrimos que as propriedades das ligas mudaram, e que um pequeno aumento em sua maleabilidade indica que, agora, elas se quebram com menos frequência. No geral, essa é uma boa mudança, mas tal ajuste fundamental às leis da física é preocupante."
 crisis.7235.desc.unknown: "$crisis.7235.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7235.desc.known: "$crisis.7235.desc.both$\n\n$crisis.known.desc$"
 crisis.7235.desc.again: "$crisis.7235.desc.both$\n\n$crisis.again.desc$"
 crisis.7235.desc.crisis: "Outra alteração de realidade bem-sucedida! A mudança em questão foi menor, voltada para deixar nossas ligas metálicas mais leves e mais resistentes. O escopo foi pequeno, mas a alteração afetou toda a galáxia. Estamos monitorando quanto tempo ela permanecerá ativa neste universo."
 crisis.7235.a: "Bom, mas preocupante."
 crisis.7235.b: "Impressionante."
 crisis.7235.c: "Ótimo trabalho!"
 crisis.7240.name: "Maleabilidade de Ligas Metálicas"
 crisis.7240.desc.both: "Um aumento recente nas falhas de materiais entre as nossas ligas metálicas mais usadas deu início a uma investigação. Descobrimos que as propriedades das ligas mudaram, e que um pequeno declínio em sua maleabilidade indica que agora elas se quebram com mais frequência. Essa alteração viola as leis da física e deve ser levada muito a sério."
 crisis.7240.desc.unknown: "$crisis.7240.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7240.desc.known: "$crisis.7240.desc.both$\n\n$crisis.known.desc$"
 crisis.7240.desc.again: "$crisis.7240.desc.both$\n\n$crisis.again.desc$"
 crisis.7240.desc.crisis: "Nosso último experimento foi parcialmente bem-sucedido. Conseguimos aplicá-lo em toda a galáxia, mas ele não apresentou os resultados previstos. A modificação nas propriedades do material de nossas ligas metálicas as deixou mais frágeis e suscetíveis a rachaduras. O problema é temporário e tudo voltará ao normal em alguns anos, mas, por ora, os custos serão maiores."
 crisis.7240.a: "$crisis.7205.a$"
 crisis.7240.b: "$crisis.7205.b$"
 crisis.7240.c: "O próximo será melhor."
 crisis.7245.name: "Nutrição Alterada"
 crisis.7245.desc.both: "Houve uma alteração no valor nutricional da comida por toda a galáxia. Ou tudo ficou mais nutritivo, ou, talvez, agora precisamos de menos nutrientes. De todo modo, essa mudança foi inesperada."
 crisis.7245.desc.unknown: "$crisis.7245.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7245.desc.known: "$crisis.7245.desc.both$\n\n$crisis.known.desc$"
 crisis.7245.desc.again: "$crisis.7245.desc.both$\n\n$crisis.again.desc$"
 crisis.7245.desc.crisis: "Sucesso! Conseguimos alterar a velocidade com que as calorias são absorvidas na digestão e agora precisamos de porções menores de comida para nos saciarmos. Essa alteração nos ensinou muito sobre como moldar a realidade."
 crisis.7245.a: "$crisis.7235.a$"
 crisis.7245.b: "$crisis.7235.b$"
 crisis.7245.c: "$crisis.7235.c$"
 crisis.7250.name: "Nutrição Alterada"
 crisis.7250.desc.both: "Houve uma alteração no valor nutricional da comida por toda a galáxia. Ou tudo ficou menos nutritivo, ou, talvez, agora precisemos de mais nutrientes; a alteração não foi clara. Essa mudança tem impactos sociais significativos e deve ser levada muito a sério."
 crisis.7250.desc.unknown: "$crisis.7250.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7250.desc.known: "$crisis.7250.desc.both$\n\n$crisis.known.desc$"
 crisis.7250.desc.again: "$crisis.7250.desc.both$\n\n$crisis.again.desc$"
 crisis.7250.desc.crisis: "Nosso último experimento foi parcialmente bem-sucedido. Conseguimos aplicá-lo em toda a galáxia, mas ele não apresentou os resultados previstos. A alteração modificou a velocidade de geração de calorias por nutrientes digeridos e agora tudo precisa ser consumido em maiores quantidades para nos saciarmos. Esse pequeno erro é apenas temporário e deve ser revertido em breve."
 crisis.7250.a: "$crisis.7240.a$"
 crisis.7250.b: "$crisis.7240.b$"
 crisis.7250.c: "$crisis.7240.c$"
 crisis.7255.name: "Alteração na Massa"
 crisis.7255.desc.both: "As análises gravimétricas recentes não condizem com os dados registrados anteriormente. Após conferirmos os números diversas vezes, ficou inegável que algo está afetando toda a galáxia. Alterações na menor escala possível afetam os maiores corpos celestes existentes. As consequências são mínimas para a maioria dos planetas, mas alguns podem vivenciar anomalias gravitacionais."
 crisis.7255.desc.unknown: "$crisis.7255.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7255.desc.known: "$crisis.7255.desc.both$\n\n$crisis.known.desc$"
 crisis.7255.desc.again: "$crisis.7255.desc.both$\n\n$crisis.again.desc$"
 crisis.7255.desc.crisis: "Nosso experimento de alteração da realidade mais recente fez com que reduzíssemos levemente a massa dos átomos de carbono. Na maioria dos casos, essa redução foi insignificante, mas em escalas grandes o bastante, os modelos preveem a ocorrência de problemas em alguns corpos celestes. Os modelos mais pessimistas sugerem que em mundos habitáveis onde a gravidade já era baixa podem ocorrer perdas na densidade atmosférica."
 crisis.7255.a: "$crisis.7240.a$"
 crisis.7255.b: "$crisis.7240.b$"
 crisis.7255.c: "Não é tão ruim assim."
 mass_shift_tooltip: "As seguintes colônias foram impactadas:"
 crisis.7260.name: "Lágrimas do Véu"
 crisis.7260.desc.both: "Por toda a galáxia, centenas de rupturas subespaciais se abriram rapidamente para uma dimensão psiônica, e isso parece ter enfraquecido um tipo de barreira que havia entre ela e a nossa. Embora a maioria não tenha causado problemas, algumas rupturas liberaram seres de energia que estão aterrorizando a galáxia. Por sorte, esses seres parecem tão confusos quanto nós, e não há sinais de uma coesão organizada, o que elimina a possibilidade de uma invasão iminente.\n\nTeremos que lidar com qualquer entidade em nosso território."
 crisis.7260.desc.unknown: "$crisis.7260.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7260.desc.known: "$crisis.7260.desc.both$\n\n$crisis.known.desc$"
 crisis.7260.desc.again: "$crisis.7260.desc.both$\n\n$crisis.again.desc$"
 crisis.7260.desc.crisis: "A dimensão conhecida como o Véu permeia o lado inverso da nossa galáxia. Diversos fatores fazem dele um objeto de estudo muito interessante, incluindo sua plasticidade, a conexão hipotética com buracos negros e a diferença entre realidades.\n\nDurante um experimento destinado à sua observação, causamos acidentalmente rupturas subespaciais em nossa galáxia, fazendo com que vários \"espíritos\" hostis do Véu entrassem em nossa dimensão. Nossas ações parecem ter estreitado bastante a barreira entre nossos mundos. A situação deve normalizar após algum tempo, mas é melhor não furar mais buracos naquela direção."
 crisis.7260.a: "$crisis.7240.a$"
 crisis.7260.b: "$crisis.7240.b$"
 crisis.7260.c: "Não vamos repetir isso."
 crisis.7265.name: "Tese do Infinito - Sucesso Estável"
 crisis.7265.desc.a: "Nossos últimos experimentos foram um sucesso total. Conseguimos transmutar sucata em ligas metálicas valiosas permanentemente! O truque para tornar o processo permanente foi alterar a realidade para possibilitar a transmutação, em vez de tentar alterar os materiais diretamente. Agora que a reação química acabou, nossas novas ligas metálicas devem ficar assim para sempre."
 crisis.7265.desc.b: "Alteramos o fluxo do tempo com sucesso! Após experimentos em regiões vazias do espaço, nos sentimos confiantes o bastante para tentar o processo em uma de nossas colônias, e deu certo! O tempo passará mais rápido lá, com um aumento estimado de 20.537%. Ocorrerão alguns problemas de comunicação e deslocamento, mas vamos resolver isso depois."
 crisis.7265.desc.c: "Nós aprimoramos os supercondutores. Agora, além de funcionarem em temperatura ambiente, eles também conduzem energia sem dissipá-la. Embora essas mudanças sejam apenas temporárias, elas trarão um grande benefício para nossas redes elétricas."
 crisis.7265.desc.d: "Embora os efeitos dessa tese não tenham sido espetaculares, eles mostraram novos caminhos para o estudo da realidade. Várias hipóteses devem ser descartadas ou reformuladas para corresponderem às nossas observações mais recentes, mas aprendemos muito mais do que esperávamos."
 crisis.7265.desc.e: "Nossos experimentos tiveram um efeito inesperado. Enquanto estudávamos outras dimensões e os meios de viajar até elas, transportamos nossas naves para o hiperespaço por engano. Parcialmente. Por mais improvável que pareça, a situação delas parece ser estável e não letal. Pelo lado positivo, elas podem se mover muito mais rápido agora."
 crisis.7265.desc.f: "Nós sempre fomos peritos em transformar tecnologia em algo que possamos explodir. Não foi diferente com as Teses do Infinito. Conseguimos alterar o comportamento das cargas de nossas armas explosivas, resultando em explosões ainda maiores. Essa descoberta nos custou apenas a destruição de diversas instalações de pesquisa menores."
 crisis.7265.desc.g: "Não conseguimos fazer nada de extraordinário em relação à alteração da realidade. No entanto, aprendemos muito sobre tecnologias mais convencionais."
 crisis.7265.desc.h: "Uma tentativa de modular o espaço causou a ampliação de uma colônia. Para nossa surpresa, a situação parece ser permanente. Ainda não sabemos ao certo como isso aconteceu, mas nosso melhor palpite é que a matéria foi puxada de outra dimensão e alojada em aberturas intersticiais entre partículas atômicas. Isso é tão empolgante quanto intrigante."
 crisis.7265.a: "Brilhante!"
 crisis.7265.b: "Impressionante."
 crisis.7265.c: "Maravilhoso."
 crisis.7265.d: "Interessante."
 add_crisis_currency_doubled_tt: "\nGanhamos [crisobj_thesis_value_bonus] de £advanced_logic£ §Y$menp_cosmo_objectives$§!."
 crisis.7265.e: "Bom trabalho?"
 crisis.7265.f: "Clássico!"
 crisis.7265.g: "Que peculiar."
 crisis.7265.h: "Vamos aceitar."
 crisis.7270.name: "Tese do Infinito - Fracasso Infeliz"
 crisis.7270.desc.a: "Fracassos são parte do processo científico. Nós tínhamos expectativas altas para esse experimento, mas no fim, acabou dando errado. É frustrante, mas tem seu valor: aprenderemos o máximo possível com isso."
 crisis.7270.desc.b: "Alteramos o fluxo do tempo com sucesso! Após experimentos em regiões vazias do espaço, nos sentimos confiantes o bastante para tentar o processo em uma das nossas colônias, e deu certo! Por alguns anos, o tempo passará mais devagar lá, com um declínio estimado de 20.537%. Essa desaceleração não é ideal, mas é uma grande conquista para nós."
 crisis.7270.desc.c: "Nossos últimos experimentos tiveram um efeito colateral infeliz. Todos os nossos dispositivos de armazenamento de energia descarregaram. Nada foi destruído, mas perdemos toda a energia armazenada, que provavelmente foi para outra dimensão. Ainda não entendemos o que aconteceu, mas isso é interessante."
 crisis.7270.desc.d: "Isso foi um fracasso humilhante. Nossa alteração afetou os nossos bancos de dados e corrompeu anos de pesquisa. Teremos que reformular muitas de nossas teorias desde o início. Apesar do grande contratempo, essa é uma oportunidade para revisarmos pesquisas antigas."
 crisis.7270.desc.e: "Este experimento abordava fontes de energia e produção. Tudo começou bem, mas a situação saiu totalmente de controle quando vazou para os reatores em nossas naves, causando fusões em toda a frota! Algumas naves desativaram os reatores a tempo, mas outras sofreram danos críticos."
 crisis.7270.desc.f: "[leader_target.GetName], que estava supervisionando os experimentos, morreu em uma inesperada compressão do espaço-tempo na zona de testes. Ainda tivemos um sucesso parcial na alteração da realidade, mas essa perda serve como lembrete do preço do conhecimento."
 crisis.7270.desc.g: "Um experimento de computação saiu de controle, e sua proporção foi bem maior do que esperávamos. Muitos dados valiosos de pesquisa foram inutilizados. Por sorte, o banco de dados que guardava nossa pesquisa mais avançada estava bem protegido e não foi afetado."
 crisis.7270.desc.h: "Uma tentativa de modular o espaço causou o encolhimento de uma colônia. A situação é permanente, algo ligeiramente inesperado. Suspeitamos que a matéria vazou naturalmente para outra dimensão. Isso é muito intrigante."
 crisis.7270.a: "$crisis.7240.c$"
 crisis.7270.b: "$crisis.7240.c$"
 crisis.7270.c: "$crisis.7240.c$"
 crisis.7270.d: "$crisis.7240.c$"
 no_crisis_currency_tt: "\nNão ganhamos £advanced_logic£ §Y$menp_cosmo_objectives$§! com essa tese."
 crisis.7270.e: "$crisis.7240.c$"
 cosmogenesis_damage_ships_tt: "Nossas frotas sofrerão danos."
 crisis.7270.f: "$crisis.7240.c$"
 crisis.7270.g: "$crisis.7240.c$"
 crisis.7270.h: "$crisis.7240.c$"
 crisis.7280.desc: "Saudações, brilhantes [Root.GetSpeciesNamePlural]. Hoje vocês alcançaram um marco tecnológico significativo, e nossos corações se enchem de orgulho. A estrada que trilharam até aqui apresentou seus desafios. Ao superá-los, vocês cresceram, e sua recente proeza tecnológica é a prova definitiva de que estávamos certos quando lhes oferecemos nossa orientação."
 crisis.7285.desc: "Crianças difíceis! Hoje vocês esgotaram nossa paciência. Seus experimentos irresponsáveis são um perigo para todos, e ordenamos que encerrem essas atividades agora. Vocês não sabem com o que estão brincando, e ainda que a curiosidade seja uma qualidade admirável, tamanha imprudência não deve ser tolerada. A realidade foi criada desta forma por uma razão. Deixem-na como está."
 crisis.7285.a: "Tem razão, isso é perigoso demais."
 crisis.7285.a.tt: "Renuncia às ambições de Cosmogênese e perde o acesso à maioria das construções e naves de Impérios Caídos.\n\n§RIsso nos impedirá de concluir nosso Caminho de Crise.§!"
