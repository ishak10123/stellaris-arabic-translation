 advanced_logic_crisis_description_title: "Cosmogênese"
 advanced_logic_crisis_description: "$menace_crisis_description_intro$\n\nImpérios Caídos têm o conhecimento que buscamos, mas eles se tornaram enfadonhos e complacentes. Temos o direito de superá-los, não importam os meios."
 advanced_logic_crisis_howto_title: "Lógica e Teses"
 advanced_logic_crisis_howto: "Concluir §HObjetivos de Crise§! gera £advanced_logic£ §HLógica Avançada§!, liberando potencial tecnológico para o nosso império. Em nossa missão para superar os Impérios Caídos, devemos pesquisar §HTeses§! e reescrever as leis do universo."
 ###########################
 #AUGMENTATION BAZAAR CIVIC
 ###########################
 building_augmentation_bazaars: "Bazar de Melhorias"
 building_augmentation_bazaars_desc: "Um labirinto de corredores iluminados por neon, fornecedores de implantes e clínicas de hardware clandestinas satisfazendo todas as necessidades de implantes cibernéticos, seja com receita ou por baixo dos panos."
 concept_augmentation_bazaars: "$building_augmentation_bazaars$"
 building_augmentation_bazaars_branch: "Hub de Implantes Extramundo"
 building_augmentation_bazaars_branch_desc: "Precisa ficar mais veloz, pular mais alto, pensar melhor, durar mais? Produtos exóticos importados de toda a galáxia agora estão disponíveis para compra no seu Hub de Implantes local."
 concept_augmentation_bazaars_branch: "$building_augmentation_bazaars_branch$"
 civic_augmentation_bazaars: "Bazares de Melhorias"
 civic_augmentation_bazaars_desc: "§RATENÇÃO: Bloqueia todos os Caminhos de Ascensão, exceto ['concept_cybernetic_ascension'].§!\n\nProdutos cibernéticos abriram portas para mercados labirínticos, repletos de negociantes de melhorias baratas, clínicas de modificação duvidosas e publicidades iluminadas agressivamente. Desfrute da sinergia da carne e dos circuitos, seja qual for a sua renda."
 civic_tooltip_augmentation_bazaars_effects: "- $SPECIES_TRAITS$ permite a seleção de ['concept_universal_augmentations_traits'] $NEW_LINE$- $AVAILABLE_BUILDINGS$ ['concept_augmentation_bazaars']$NEW_LINE$- $AVAILABLE_HOLDINGS$ ['concept_augmentation_bazaars_branch'] $NEW_LINE$- £job_executive£ §Y$job_executive_plural$§! são substituídos por £job_augmentation_merchant£ §Y$job_augmentation_merchant_plural$§!"
 concept_basic_cyborg_trait: "Características Cibernéticas Básicas"
 concept_basic_cyborg_trait_desc: "As Características Cibernéticas Básicas são:$NEW_LINE$- ['trait:trait_cyborg_power_drills'] $NEW_LINE$- ['trait:trait_cyborg_harvesters'] $NEW_LINE$- ['trait:trait_cyborg_superconductive']"
 councilor_augmentation_bazaars: "Gestor de Implantes"
 councilor_augmentation_bazaars_female: "Gestora de Implantes"
 councilor_augmentation_bazaars_desc: "A posição de $TITLE$ supervisiona o desenvolvimento de produtos e a distribuição de implantes para os Bazares de Melhorias e Hubs de Implantes Extramundo pela galáxia."
