 advanced_logic_gaining: "Conclua §HObjetivos de Crise§! para ganhar mais £advanced_logic£ §YLógica Avançada§!."
 advanced_logic_desc: "A Lógica Avançada mede o nosso conhecimento acerca dos segredos mais profundos do universo."
