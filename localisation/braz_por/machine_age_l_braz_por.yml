 d_hab_consumer_goods_2: "Depósito de Bens de Consumo"
 d_hab_consumer_goods_2_desc: "Este $habitat_complex$ foi construído próximo a uma fonte explorável de bens de consumo."
 situation_paperclips: "Consolidação de Mercadorias"
 situation_paperclips_type: "Consolidação de Mercadorias"
 situation_paperclips_monthly_change_tooltip: "Meta de produção definida. Drones enviados. Executando tarefa."
 situation_paperclips_desc: "Nosso objetivo principal é maximizar a produção. Atingir as metas exigidas é obrigatório.\nO prazo de entrega é: §Y[owner.situation_paperclips_timer]§!\nA meta de produção atual é: §Y[Owner.paperclips_once_again]§!\nO estoque atual é: §Y[Owner.paperclips_current_amount]§!\n[Owner.GetPaperclipStatus]"
