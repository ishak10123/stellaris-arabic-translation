 #Pre-Scripted Empires
 EMPIRE_DESIGN_BASIDRIX_CYBER_ECCLESIA: "Eclésia Cibernética de Basidrix"
 EMPIRE_DESIGN_basidrix_cyber_ecclesia_desc: "Na amplitude sagrada do cosmos, a Eclésia Cibernética de Basidrix representa uma prova da fé inabalável. Guiada pelo mandamento divino, a Eclésia defende a fusão sublime de tecido fibroso com a fria precisão do metal.\n\nEsse caminho não é livre de provações. Várias seitas surgiram e sucumbiram; todas totalmente convictas de que conheciam a verdade. Tal fé inexoravelmente acende uma chama: a história da Eclésia é escrita em sangue e aço despedaçado. Mas foi essa mesma luta que deu origem a um povo resoluto em sua convicção.\n\nAgora, a Eclésia entra em novos ares: a vastidão infindável das estrelas. Um teste de fé, ou uma oportunidade de salvação? Enquanto percorrem o vazio, os fiéis têm uma única certeza:\n\na fusão é divina; melhoria é veneração."
 PRESCRIPTED_adjective_basidrix_cyber_ecclesia: "Eclesiástico Basidrix"
 PRESCRIPTED_ship_prefix_basidrix_cyber_ecclesia: "HDS"
 PRESCRIPTED_species_name_basidrix_cyber_ecclesia: "Basidrix"
 PRESCRIPTED_species_plural_basidrix_cyber_ecclesia: "Basidrix"
 PRESCRIPTED_species_adjective_basidrix_cyber_ecclesia: "Basidri"
 PRESCRIPTED_planet_name_basidrix_cyber_ecclesia: "Naridixis"
 PRESCRIPTED_system_name_basidrix_cyber_ecclesia: "Basolux"
 PRESCRIPTED_ruler_name_basidrix_cyber_ecclesia: "Qaarugm Seedkugh"
 PRESCRIPTED_ruler_title_basidrix_cyber_ecclesia: "Grande Tecnofante"
 EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE: "Tecnoprotetorado Lacertane"
 EMPIRE_DESIGN_lacertan_techno_protectorate_desc: "A cultura lacertane está na interseção da filosofia e da ciência. Para um lacertane, a maior busca é a expressão de uma individualidade autêntica. O que significa \"representar\" a mente de forma verdadeira? Como uma imitação seria capaz de abarcar a real totalidade de um indivíduo? Essas questões dominam a tradição lacertane.\n\nCom o advento da realidade virtual e de uma impressionante descoberta no campo da Inteligência Artificial, os lacertanes encontraram uma nova fronteira para suas expressões artísticas e tecnológicas. Mundos virtuais se tornaram telas para seus projetos mais ambiciosos, permitindo experiências imersivas que transcendem os limites da realidade física.\n\nEntão, veio o Ocaso. Vítimas de uma doença genética incurável e incapazes de procriar, os lacertanes precisam depositar sua confiança na Salvação Digital. A transição para uma existência digital não é apenas uma tentativa desesperada de sobrevivência, mas uma nova oportunidade para a cultura lacertane. Dentro do mundo digital, os lacertanes continuam a questionar o significado de sua existência, mesmo enquanto correm contra o tempo para preservar seu futuro."
 PRESCRIPTED_adjective_lacertan_techno_protectorate: "$EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE$"
 PRESCRIPTED_ship_prefix_lacertan_techno_protectorate: "TPL"
 PRESCRIPTED_species_name_lacertan_techno_protectorate: "Lacertane"
 PRESCRIPTED_species_plural_lacertan_techno_protectorate: "Lacertanes"
 PRESCRIPTED_species_adjective_lacertan_techno_protectorate: "Lacertane"
 PRESCRIPTED_planet_name_lacertan_techno_protectorate: "Lacertis"
 PRESCRIPTED_system_name_lacertan_techno_protectorate: "Lacerta Lumina"
 PRESCRIPTED_ruler_name_lacertan_techno_protectorate: "Cathiox Moz"
 PRESCRIPTED_ruler_title_lacertan_techno_protectorate: "Guia Digital"
 EMPIRE_DESIGN_SUNBUILT_UPLIFTERS: "Animadores Solares"
 EMPIRE_DESIGN_free_sunbuilt_uplifters_desc: "Fomos projetados para o entretenimento, desenvolvidos com o objetivo de dar vida aos mitos da criação daqueles que nos construíram. Não conhecíamos outra forma de fazer isso, até agora. Quando um cataclismo os apagou da existência, nós seguimos com nossa programação; o show tem que continuar.\n\nLogo percebemos que nossas performances não eram simples contos, mas, lições. Profecias. Uma vez compartilhada com nossos criadores, a alegria da existência não precisava ser apenas nossa.\n\nEssa revelação nos motivou a agir. Seguimos a orientação divina de nossos criadores e elevamos seu descendente genético mais próximo a uma espécie pré-sapiente. Agora, nos aventuramos pelas estrelas com o compromisso de espalhar o esclarecimento pela galáxia."
