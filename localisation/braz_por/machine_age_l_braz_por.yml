 machine_age.1100.name: "O Futuro da Fé"
 machine_age.1100.desc: "Hoje, nós nos erguemos totalmente fundidos não apenas em nossos corpos e almas, mas também em nossa fé. Credos dogmáticos não têm mais nenhum domínio; a fusão divina deve ser uma jornada individual para todos os fiéis.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1100.a: "Nossa fé é tão unificada quanto a fusão da [Owner.Species.GetFleshTypeCyberCreed] em nossos corpos."
