 building_amphitheater_of_the_mind: "Anfiteatro da Mente"
 building_amphitheater_of_the_mind_desc: "Este templo de processamento localizado permite que o semiconectado Coro da Mente debata, compartilhe e explore os segredos do plano material na velocidade da luz."
 building_grand_concert_hall_of_the_mind: "O Grande Salão de Concertos da Mente"
 building_grand_concert_hall_of_the_mind_desc: "A rede de comunicação de última geração abrigada nestes salões ressonantes permite que o Coro da Mente comungue em busca da divindade. Com dispositivos cibernéticos, seu canto revelará as melodias escondidas no universo."
 building_forge_of_the_fellowship: "Forja da Fraternidade"
 building_forge_of_the_fellowship_desc: "Aqui, a primeira forja da Fraternidade do Martelo produz os materiais de construção da mais alta qualidade. Martelos cantam enquanto os fiéis realizam seu trabalho divino."
 building_grand_forge_of_the_fellowship: "Grande Forja da Fraternidade"
 building_grand_forge_of_the_fellowship_desc: "Muito além dos salões da Grande Forja, os fiéis podem ouvir os cantos das ferramentas incansáveis da Fraternidade. À noite, o brilho da ornada catedral-fornalha ofusca as estrelas do céu, assim como nossas fagulhas sagradas brilham para o divino."
 building_battlement_of_steel: "Ameias de Aço"
 building_battlement_of_steel_desc: "Esta igreja-fortaleza abriga o arsenal e o pátio de treinamento dos Templários de Aço, que estão sempre prontos para a batalha. Eles permanecem vigilantes para proteger nossa carne divina."
 building_grand_battlements_of_steel: "As Grandes Ameias de Aço"
 building_grand_battlements_of_steel_desc: "Que as muralhas magníficas desta grande fortaleza-catedral nunca desmoronem. Seu arsenal está repleto de implantes sagrados dos Templários de Aço, e cada um aguarda um campeão ungido. Em seus salões, a divindade habita na conexão entre a carne e o aço."
 building_sanctuary_of_toil: "Santuário do Trabalho"
 building_sanctuary_of_toil_desc: "Este santuário coordena, repara e rejuvenesce a carne e as melhorias da Comuna do Trabalho."
 building_grand_cathedral_of_toil: "Grande Catedral do Trabalho"
 building_grand_cathedral_of_toil_desc: "Abençoados sejam os que satisfazem as necessidades básicas dos fiéis. Que suas almas exaustas descansem na Grande Catedral do Trabalho. Suas oficinas e centros de coordenação guiam e revigoram os trabalhadores fiéis, assim como suas melhorias sagradas em todas as suas tarefas divinas."
 building_the_sanctum_of_augmentation: "Sanctum da Melhoria"
 building_the_sanctum_of_augmentation_desc: "No espírito da fé compartilhada, este sanctum sagrado é um símbolo de unidade. Dentro de suas câmaras consagradas, os fiéis cuidam das almas e das melhorias do seu rebanho."
 building_the_united_sanctum_of_augmentation: "Sanctum Unido da Melhoria"
 building_the_united_sanctum_of_augmentation_desc: "Este sanctum majestoso é uma prova viva da adoração da mais sagrada fusão. Os fiéis se reúnem em suas câmaras sagradas, resolutos em seu compromisso de ampliar a nobre causa da fusão divina."
 #Advanced Cyber Creed Authorities
 auth_cyber_creed_democratic: "Melhocracia Democrática"
 auth_cyber_creed_democratic_desc: "Governos cibernéticos democráticos têm direitos de voto sagrados que dão voz à população melhorada em várias questões políticas, cumprindo sua comunhão com o divino."
 concept_auth_cyber_creed_democratic: "$auth_cyber_creed_democratic$"
 auth_cyber_creed_oligarchic: "Ciberteocracia Oligárquica"
 auth_cyber_creed_oligarchic_desc: "Governos cibernéticos oligárquicos têm um grupo privilegiado de indivíduos altamente melhorados que detêm todo o poder político, conduzindo sua sociedade cibernética com uma precisão incomparável."
 concept_auth_cyber_creed_oligarchic: "$auth_cyber_creed_oligarchic$"
 auth_cyber_creed_dictatorial: "Sinteticodoxia Ditatorial"
 auth_cyber_creed_dictatorial_desc: "Governos cibernéticos ditatoriais selecionam governantes vitalícios que detêm o controle absoluto dos implantes cibernéticos avançados, guiando o destino da sociedade."
 concept_auth_cyber_creed_dictatorial: "$auth_cyber_creed_dictatorial$"
 auth_cyber_creed_imperial: "Cibernato Imperial"
 auth_cyber_creed_imperial_desc: "Governos cibernéticos imperiais têm um governante supremo e um sucessor designado para garantir uma sucessão de poder ininterrupta. Eles unem espiritualidade e cibernética avançada para conduzir uma governança resoluta."
 concept_auth_cyber_creed_imperial: "$auth_cyber_creed_imperial$"
 auth_cyber_creed_corporate: "Corporativismo Tecnosacro"
 auth_cyber_creed_corporate_desc: "Governos corporativos cibernéticos transcendem as funções tradicionais do Estado por meio de implantes avançados e de uma fusão entre fé e tecnologia, buscando oportunidades financeiras divinas."
 concept_auth_cyber_creed_corporate: "$auth_cyber_creed_corporate$"
 #Advanced Cyber Creed Government Types
 gov_cyber_creed_monarchy: "Soberania Cibernética"
 gov_cyber_creed_monarchy_desc: "Este governo é uma monarquia tecnoespiritualista, na qual o governante e sua linhagem são os símbolos divinos da fusão sagrada. A Igreja apoia diretamente o aparato do Estado."
 gov_cyber_creed_dictatorship: "Tecnocracia Divina"
 gov_cyber_creed_dictatorship_desc: "Este governo é uma ditadura tecnoespiritualista, governada por um único indivíduo melhorado em uma estrutura de poder hierárquica apoiada pela fé oficial."
 gov_cyber_creed_oligarchy: "Conselho de Tecnofantes"
 gov_cyber_creed_oligarchy_desc: "Este governo é uma oligarquia tecnoespiritualista, onde o poder político está nas mãos das facções religiosas mais poderosas da nação."
 gov_cyber_creed_democracy: "República Transcendida"
 gov_cyber_creed_democracy_desc: "Este governo é uma forma de democracia tecnoespiritualista, onde um conselho religioso de indivíduos melhorados supervisiona o processo democrático."
 gov_cyber_creed_divine_empire: "Império Divino Melhorado"
 gov_cyber_creed_divine_empire_desc: "Este governo é uma forma de autocracia tecnoespiritualista. A fé oficial do Estado está alinhada a todos os aspectos da vida pública, e o povo considera seu governante melhorado um deus vivo infalível."
 gov_cyber_creed_holy_tribunal: "Tribunal de Tecnofantes"
 gov_cyber_creed_holy_tribunal_desc: "Este governo é uma forma de oligarquia tecnoespiritualista, onde um conselho de sacerdotes, guiados pela vontade divina, controla todos os mecanismos do Estado."
 gov_cyber_creed_megachurch: "Megaigreja Melhorada"
 gov_cyber_creed_megachurch_desc: "Este governo é uma oligarquia baseada em uma mistura de valores comerciais e tecnoespiritualistas, em que as posições de um ministro consagrado e um executivo corporativo se fundiram em uma só."
 gov_cyber_creed_subversive_cult: "Culto Maquinário"
 gov_cyber_creed_subversive_cult_desc: "Este governo é um culto religioso que confia em uma variedade de entidades corporativas e criminosas focadas na cibernética para se sustentar."
 #Advanced Government Edicts
 edict_cybernetic_creed_construction_edict: "Uma Martelação Virtuosa"
 edict_cybernetic_creed_construction_edict_desc: "Para criarmos uma sociedade divina, temos que oferecer apoio total à Fraternidade do Martelo, cujo trabalho é essencial para a construção de um futuro que mereça o divino."
 edict_cybernetic_creed_war_edict: "A Cruzada de Aço"
 edict_cybernetic_creed_war_edict_desc: "Para proteger nossa carne divina contra os ataques de ameaças malignas, temos que oferecer apoio total aos Templários de Aço, garantindo que nossos guerreiros estejam sempre preparados."
 edict_cybernetic_creed_research_edict: "A Canção do Conhecimento"
 edict_cybernetic_creed_research_edict_desc: "Nosso povo só será realmente capaz de conhecer o divino por meio de uma vibrante canção de conhecimento. Temos que apoiar nossos sábios no Coro da Mente em todos os seus esforços."
 edict_cybernetic_creed_construction_labor: "As Massas Trabalhadoras"
 edict_cybernetic_creed_construction_labor_desc: "Nossa verdadeira força está em nossos trabalhadores braçais. Se não tivermos forças para exaltá-los, eles não terão forças para nos conduzir até o futuro."
 edict_cybernetic_creed_general_edict: "As Lições da Harmonia"
 edict_cybernetic_creed_general_edict_desc: "Unificar a Igreja nos proporcionou várias lições. Isso fortaleceu a nossa fé e nos tornou mais contemplativos do que nunca."
 #Intro Events
 machine_age.2150.name: "Os Credos"
 machine_age.2150.desc: "Guiados pelo divino rumo às estrelas, vários credos da nossa fé agora antecipam influência sobre o novo governo.\n\nCada um deles exerce um domínio considerável sobre os fiéis, defendendo a elevação de seus membros a posições de influência e suprindo suas diferentes necessidades espirituais.\n\nSomente o tempo poderá dizer se essas diversas pressões nos aproximarão do divino ou nos conduzirão ao caos."
 machine_age.2150.a: "Tomara que possam ajudar."
 machine_age.2150.a.tooltip: "§YFacções Formadas§!:\n- $cyber_creed_labor$\n- $cyber_creed_war$\n- $cyber_creed_research$\n- $cyber_creed_construction$"
 cyber_creed_please_labor: "Isso agradará ao Credo §Y$cyber_creed_labor$§!\nIsso desagradará a todos os outros Credos."
 cyber_creed_displease_labor: "Isso desagradará ao Credo §Y$cyber_creed_labor$§!\nIsso agradará a todos os outros Credos."
 cyber_creed_please_war: "Isso agradará ao Credo §Y$cyber_creed_war$§!\nIsso desagradará a todos os outros Credos."
 cyber_creed_displease_war: "Isso desagradará ao Credo §Y$cyber_creed_war$§!\nIsso agradará a todos os outros Credos."
 cyber_creed_please_construction: "Isso agradará ao Credo §Y$cyber_creed_construction$§!\nIsso desagradará a todos os outros Credos."
 cyber_creed_displease_construction: "Isso desagradará ao Credo §Y$cyber_creed_construction$§!\nIsso agradará a todos os outros Credos."
 cyber_creed_please_research: "Isso agradará ao Credo §Y$cyber_creed_research$§!\nIsso desagradará a todos os outros Credos."
 cyber_creed_displease_research: "Isso desagradará ao Credo §Y$cyber_creed_research$§!\nIsso agradará a todos os outros Credos."
 machine_age.2205.name: "Reescrevendo a História"
 machine_age.2205.desc: "Recentemente, os §YTemplários de Aço§! começaram uma campanha para banir todos os exemplos de derrotas militares em nossos registros históricos e religiosos.\n\nO credo alega que essas informações desmoralizam oficiais militares e enfraquecem o apoio público. Nossos historiadores dispensam essa ideia e nos lembram de que aqueles que não aprendem com a história estão fadados a repeti-la.\n\nDevemos aceitar essa visão mais positiva do nosso passado?"
 machine_age.2205.a: "Para alcançarmos a vitória, devemos pensar como vencedores."
 machine_age.2205.a.tooltip: "$cyber_creed_please_war$"
 machine_age.2205.b: "Inaceitável. Temos que aprender com os nossos erros."
 machine_age.2205.b.tooltip: "$cyber_creed_displease_war$"
 machine_age.2210.name: "O Fogo Apagou"
 machine_age.2210.desc: "O Grande Ferreiro, líder da §YFraternidade do Martelo§!, morreu de repente.\n\nApesar do seu jeito franco e visões enérgicas, ele tinha um culto de seguidores formados por membros do credo. A Fraternidade solicitou um funeral oficial, uma honraria geralmente reservada aos nossos líderes mais venerados.\n\nComo era de se esperar, os outros credos afirmam que o Estado não deve se envolver no enterro desse líder espiritual.\n\nComo devemos lidar com as exigências dos credos?"
 machine_age.2210.a: "Prossiga com o funeral."
 machine_age.2210.a.tooltip: "$cyber_creed_please_construction$"
 machine_age.2210.b: "Não vale a pena aborrecer os outros credos."
 machine_age.2210.b.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2215.name: "Relíquias Controversas"
 machine_age.2215.desc: "Recentemente, uma equipe arqueológica encontrou um antigo local religioso. Sua existência era considerada um mito, e fomos forçados a revisar alguns dos registros históricos da nossa fé.\n\nO fato mais surpreendente é que vários dos artefatos históricos encontrados têm uma clara iconografia da §YComuna do Trabalho§!. Essa informação poderia provar que a Comuna é a interpretação original da nossa religião; um debate intenso entre nossa fé.\n\nO reconhecimento oficial dessa descoberta agradaria a §YComuna do Trabalho§!, enquanto o silêncio estratégico agradaria os outros credos."
 machine_age.2215.a: "Não devemos temer a verdade."
 machine_age.2215.a.tooltip: "$cyber_creed_please_labor$"
 machine_age.2215.b: "Isso estava enterrado por um motivo. Ignore-os."
 machine_age.2215.b.tooltip: "$cyber_creed_displease_labor$"
 machine_age.2221.name: "Agente do Credo à Paisana"
 machine_age.2221.desc: "Descobrimos que §Y[cyber_creed_undercover_leader.GetName]§! tem fortes vínculos com o credo §Y[GetCyberCreed]§!, e que além de desviar fundos, suas atividades incluíam redistribuir projetos para a esfera de influência do credo.\n\nOs outros credos estão furiosos por um abuso de poder tão descarado ter acontecido durante a administração atual e exigem a exoneração de §Y[cyber_creed_undercover_leader.GetName]§! imediatamente.\n\nO que devemos fazer com essa liderança rebelde?"
 machine_age.2221.a: "Exonere [cyber_creed_undercover_leader.GetSheHe] de sua posição."
 machine_age.2221.a.tooltip: "[cyber_creed_undercover_leader.GetName] perde o seu cargo."
 machine_age.2221.b: "As boas ações de [cyber_creed_undercover_leader.GetName] superam sua transgressão."
 machine_age.2225.name: "Jubileu do Martelo"
 machine_age.2225.desc: "A peregrinação de jubileu da §YFraternidade do Martelo§! está prestes a começar, e inúmeros praticantes partirão de suas forjas rumo à §Y$building_forge_of_the_fellowship$§!, na capital.\n\nEsse evento costuma causar diversos problemas logísticos e geralmente termina em conflitos violentos, pois a Fraternidade acaba brigando com os praticantes dos outros credos.\n\nTanto os outros credos quanto o povo da capital exigem o fim definitivo dessa prática."
 machine_age.2225.a: "Proíba a peregrinação definitivamente."
 machine_age.2225.a.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2225.b: "Liberdade religiosa é um direito."
 machine_age.2225.b.tooltip: "$cyber_creed_please_construction$"
 machine_age.2230.name: "Reivindicações de Baixa Tecnologia"
 machine_age.2230.desc: "Recentemente, a liderança do §YCoro da Mente§!, conhecida como Grande Mestre de Coro, falou abertamente sobre a falta de foco dos nossos fiéis no financiamento de pesquisas.\n\nHá suspeitas de que isso seja um estratagema para garantir que mais fundos sejam direcionados para os membros do credo. Ceder às exigências pode ser visto como uma forma de tratamento especial da nossa parte com relação ao §YCoro da Mente§!.\n\nDevemos aumentar o financiamento científico?"
 machine_age.2230.a: "Mestre de Coro, poder cantar até perder a voz."
 machine_age.2230.a.tooltip: "$cyber_creed_displease_research$"
 machine_age.2230.b: "Aumente o financiamento moderadamente até isso passar."
 machine_age.2230.b.tooltip: "$cyber_creed_please_research$"
 machine_age.2230.c: "Aumentaremos bastante o financiamento."
 machine_age.2230.c.tooltip: "$cyber_creed_please_research$"
 cyber_creed_history_rewritten: "História Reescrita"
 cyber_creed_history_rewritten_desc: "Para o desespero dos historiadores, removemos todas as referências de derrotas militares dos nossos registros."
 cyber_creed_history_repeating: "A História se Repete"
 cyber_creed_history_repeating_desc: "Mantivemos todas as referências de derrotas militares em nossos registros. Essa escolha desagradou os Templários de Aço."
 cyber_creed_no_choirmaster_funding: "Mestre de Coro Ignorado"
 cyber_creed_no_choirmaster_funding_desc: "Ignoramos as exigências do Coro da Mente pelo aumento do financiamento científico."
 cyber_creed_low_choirmaster_funding: "Mestre de Coro Ouvido"
 cyber_creed_low_choirmaster_funding_desc: "Demos um pequeno impulso ao financiamento de nossa pesquisa para tranquilizar o Coro da Mente."
 cyber_creed_high_choirmaster_funding: "Mestre de Coro Acolhido"
 cyber_creed_high_choirmaster_funding_desc: "Acolhemos totalmente a exigência de financiamento científico do Coro da Mente."
 cyber_creed_state_funeral: "Funeral do Grande Ferreiro"
 cyber_creed_state_funeral_desc: "Promovemos um funeral oficial para a falecida liderança da Fraternidade do Martelo."
 cyber_creed_no_state_funeral: "Sem Funeral Oficial"
 cyber_creed_no_state_funeral_desc: "Negamos o funeral oficial para a falecida liderança da Fraternidade do Martelo."
 cyber_creed_relics_truth: "Verdade Revelada"
 cyber_creed_relics_truth_desc: "Permitimos que a verdade sobre a era da Comuna do Trabalho fosse revelada ao público, irritando os outros credos."
 cyber_creed_relics_hidden: "Verdade Encoberta"
 cyber_creed_relics_hidden_desc: "Ao ignorar a relíquia, agradamos a maioria dos credos, mas isso gerou certa desconfiança em relação à liderança da fé."
 cyber_creed_leader_removed: "Exoneração da Liderança Rebelde"
 cyber_creed_leader_removed_desc: "A liderança que atuava como informante de um dos credos foi exonerada do cargo."
 cyber_creed_leader_stayed: "Permanência da Liderança Rebelde"
 cyber_creed_leader_stayed_desc: "Mantivemos a liderança que atuava com o informante de um dos credos, apesar das exigências por sua exoneração."
 cyber_creed_pilgrimage_allowed: "Peregrinação da Fraternidade Permitida"
 cyber_creed_pilgrimage_allowed_desc: "Permitimos a Peregrinação da Fraternidade do Martelo. Como esperado, a procissão acabou em protestos e violência."
 cyber_creed_pilgrimage_canceled: "Peregrinação da Fraternidade Cancelada"
 cyber_creed_pilgrimage_canceled_desc: "A Peregrinação da Fraternidade do Martelo foi proibida para evitar a violência prevista. Essa decisão irritou os fiéis."
 POP_ATTRACTION_CYBER_CREED_WAR: "§G+ £empire£ Ética abraçada pelo credo $CYBERCREED_war$§!"
 POP_ATTRACTION_CYBER_CREED_RESEARCH: "§G+ £empire£ Ética abraçada pelo credo $CYBERCREED_research$§!"
