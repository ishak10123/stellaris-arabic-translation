 #Guided Sapience
 civic_guided_sapience: "Guias da Gênese"
 civic_guided_sapience_desc: "Esta sociedade é devota à criação de espécies emergentes. Como os intendentes do potencial da evolução, eles alocam porções de seus mundos para proteger o desenvolvimento de formas de vida pré-sapientes."
 civic_hive_guided_sapience: "Simbiontes da Gênese"
 civic_hive_guided_sapience_desc: "Este coletivo foca em arquitetar o surgimento de novas espécies. Como supervisores do poder da evolução, eles atribuem porções de seus mundos para garantir a progressão de formas de vida pré-sapientes."
 civic_machine_guided_sapience: "Arquitetos da Gênese"
 civic_machine_guided_sapience_desc: "Esta inteligência maquinária utiliza algoritmos de precisão para a geração de novas espécies. Como supervisores do potencial inexplorado do processo evolutivo, eles alocam setores planetários para garantir o desenvolvimento de formas de vida pré-sapientes."
 civic_corporate_guided_sapience: "Tecnologias da Astrogênese"
 civic_corporate_guided_sapience_desc: "Esta Megacorporação é resoluta em seu compromisso de gerar espécies emergentes deliberadamente. Ela atribui de forma estratégica regiões consideráveis de seus mundos para garantir o progresso de formas de vida pré-sapientes, sempre considerando apenas empreendimentos responsáveis."
 civic_tooltip_guided_sapience_effects: "- Naves Coloniais Disponíveis: §Y$guided_sapience_colonizer$§!$NEW_LINE$- Planetas Colonizados com §Y$guided_sapience_colonizer_plural$§!:$TABBED_NEW_LINE$- Pops do tipo $PRESAPIENT$: §G+300§! $TABBED_NEW_LINE$- $PLANETARY_FEATURES$ §Y$d_genesis_preserve$§! $NEW_LINE$- Ganha $r_unity$ por elevar Espécies em estágio $PRESAPIENT$"
 civic_tooltip_corporate_guided_sapience_effects: "$civic_tooltip_guided_sapience_effects$\n- A £building£ §Y$building_xeno_tourism_agency$§! $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_guided_sapience_gestalt_negative_effects: "- Não é possível construir §YNaves Coloniais§!"
 civic_tooltip_guided_sapience_negative_effects: "$civic_tooltip_guided_sapience_gestalt_negative_effects$\n- Não é possível construir £building£ §Y$building_xeno_zoo_plural$§!"
 civic_tooltip_not_guided: "NÃO tem um Componente Cívico de ['concept_genesis_guides_civics']"
 concept_genesis_guides_civics: "Guias da Gênese"
 concept_genesis_guides_civics_desc: "Componentes Cívicos de $concept_genesis_guides_civics$ consistem em: \n- ['civic:civic_guided_sapience']$NEW_LINE$- ['civic:civic_corporate_guided_sapience']$NEW_LINE$- ['civic:civic_hive_guided_sapience']$NEW_LINE$- ['civic:civic_machine_guided_sapience']"
 guided_sapience_colonizer: "Arca da Gênese"
 guided_sapience_colonizer_cap: "$guided_sapience_colonizer$"
 guided_sapience_colonizer_plural: "Arcas da Gênese"
 guided_sapience_colonizer_desc: "Esta nave colonial especializada facilita a gênese de espécies pré-sapientes selecionando os candidatos mais promissores e configurando a colônia inicial para os nossos supervisores."
 councilor_civic_guided_sapience: "Mestre de Orientação"
 councilor_civic_guided_sapience_female: "Mestra de Orientação"
 councilor_civic_guided_sapience_desc: "O $councilor_civic_guided_sapience$ tem a difícil tarefa de supervisionar nossos programas de pesquisa e elevação de espécies pré-sapientes."
 councilor_civic_guided_sapience_corperate: "Diretor de Orientação"
 councilor_civic_guided_sapience_corperate_female: "Diretora de Orientação"
 councilor_civic_guided_sapience_corperate_desc: "O $councilor_civic_guided_sapience_corperate$ administra as diversas responsabilidades inerentes à nossa inovadora pesquisa sobre espécies pré-sapientes e iniciativas de elevação."
 d_genesis_preserve: "Reserva da Gênese"
 d_genesis_preserve_desc: "Dedicamos esta reserva administrada meticulosamente para elevar os nossos tutelados até se tornarem espécies totalmente sapientes. Programas de pesquisa científica são componentes essenciais desse ambicioso projeto."
 decision_rebuild_genesis_preserve: "Construir Reserva da Gênese"
 decision_rebuild_genesis_preserve_desc: "Este planeta ainda não tem uma $d_genesis_preserve$. Uma reserva é primordial para alcançarmos nossos objetivos."
 d_genesis_preserve_new_speices_tooltip: "Uma nova espécie pré-sapiente será elevada e colocada em uma §Y$d_genesis_preserve$§!."
 d_genesis_preserve_old_species_tooltip: "Os pré-sapientes atuais serão colocados em uma nova §Y$d_genesis_preserve$§!."
 no_abandon_genesis_preserve: "$TRIGGER_FAIL$Não podemos abandonar os nossos tutelados pré-sapientes."
 d_genesis_monument: "Monumento da Gênese"
 d_genesis_monument_desc: "Este monumento é um tributo aos esforços incansáveis do processo de elevação neste planeta. Ele é um grande símbolo de esperança, perseverança e de uma conquista notável."
 cyber.7000.both: "A colônia de §Y[THIS.GetName]§! está pronta para observar e orientar o desenvolvimento dessa espécie emergente."
 cyber.7000.name: "Projeto Gênese Concluído"
 cyber.7000.desc: "Após a identificar um candidato com potencial para a pré-sapiência, nossa §Y$guided_sapience_colonizer$§! iniciou o processo de elevação genética e definiu o espaço necessário para uma §Y$d_genesis_preserve$§!.\n\n$cyber.7000.both$"
 cyber.7000.a: "Hora de trabalhar."
 cyber.7001.name: "Reserva da Gênese Concluída"
 cyber.7001.desc: "Após reunir as espécies pré-sapientes nativas, nossa §Y$guided_sapience_colonizer$§! iniciou a criação de uma §Y$d_genesis_preserve$§! para elas.\n\n$cyber.7000.both$"
 cyber.7001.a: "$cyber.7000.a$"
 cyber.7020.name: "Elevação da Gênese Concluída"
 cyber.7020.desc: "Após a dedicação incessante dos nossos orientadores, concluímos o projeto de elevação em §Y[Root.GetName]§!. Transformamos os §Y[From.GetNamePlural]§! em uma espécie totalmente sapiente, e a §Y$d_genesis_preserve$§!, que chamavam de lar, foi convertida em um §Y$d_genesis_monument$§!.\n\nIsso ficará marcado para sempre como uma prova da conquista que foi a evolução dessa espécie."
 cyber.7020.a: "Bem-vindos ao cenário galáctico, [From.GetNamePlural]."
 #Obessional Directive
 cyber.5005.name: "Meta de Produção Concluída"
 cyber.5005.desc: "Concluímos a diretriz.\n\nOs drones atingiram a meta de produção conforme os parâmetros prescritos.\n\nPrecisamos da ordem final para utilizarmos os estoques."
 cyber.5005.a: "Inicie os protocolos de armazenamento."
 cyber.5005.a.tooltip: "Armazenaremos as mercadorias como prova dos nossos métodos eficientes de produção."
 cyber.5005.b: "Vamos vender todo o estoque no mercado aberto."
 cyber.5005.b.tooltip: "Iniciaremos uma exploração de mercado para disseminar nossas mercadorias."
 cyber.5005.c: "Negocie concessões diplomáticas."
 cyber.5005.c.tooltip: "Exploraremos canais diplomáticos para negociar nossas mercadorias."
 cyber.5005.d: "Negocie conhecimento tecnológico."
 cyber.5005.d.tooltip: "Buscaremos um comprador particular para trocar o estoque por conhecimento tecnológico valioso."
 cyber.5005.e: "Coloque-os em um buraco negro."
 cyber.5005.e.tooltip: "Vamos armazená-los em segurança além do horizonte de eventos de um buraco negro."
 cyber.5006.name: "Fracasso da Meta de Produção"
 cyber.5006.desc: "Falhamos em cumprir a nossa meta de produção neste ciclo.\n\nEste cenário reduzirá a produção dos nossos drones até atingirmos uma meta.\n\nA próxima meta de produção foi reduzida."
 cyber.5006.a: "Inaceitável."
 cyber.5006.purge.tt: "§YTipo de Expurgo Liberado:§! $purge_clips$"
