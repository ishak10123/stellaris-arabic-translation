 tech_cosmogenesis_thesis_desc: "Se continuarmos a fazer alterações nas regras da realidade, poderemos monitorar melhor suas reações. Na escala atual, ainda é difícil prever os efeitos gerados e eles poderiam afetar toda a galáxia."
 cosmogenesis_thesis_tech_title: "Tentar dobrar as §HRegras da Realidade§!"
