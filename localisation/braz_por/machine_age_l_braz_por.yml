 SYNAPTIC_LATHE_EFFICENCY_TITLE: "Eficiência"
 SYNAPTIC_LATHE_EFFICENCY_DESC: "§EA cada §YChip Neural§! conectado ao Torno, a eficiência de todos os outros §YChips Neurais§! na estrutura aumenta. Se fizermos um grande esforço de realocação da nossa população para cá, poderemos melhorar a produção da estrutura significativamente.§!"
 pop_cat_chip_slave: "Componente de Computação"
 pop_cat_chip_slave_desc: "Estes indivíduos são usados como chips em um computador de escala gigantesca. Imersos em um profundo coma induzido, suas vidas alcançam longevidade máxima nas cápsulas de vida. Entretanto, a enorme pressão da carga de processamento eventualmente faz com que os órgãos cognitivos entrem em falência."
 pop_cat_chip_slave_plural: "Componentes de Computação"
 purge_cosmogenesis: "Sobrecarga Cognitiva"
 purge_cosmogenesis_tooltip: "Pops afetados são automaticamente realocados para o §YTorno Sináptico§! e empregados como $job_neural_chip$."
 purge_cosmogenesis_tooltip_delayed: "§LUma engrenagem na máquina.§!"
 cosmogenesis_world_0: "$pc_cosmogenesis_world$"
 cosmogenesis_world_0_DESC: "Um computador de proporções inimagináveis que usa seres sencientes como chips de processamento para gerar pesquisa e lógica avançada, um processo que resulta na morte dos indivíduos. Sua eficiência aumenta drasticamente à medida que mais unidades são conectadas a ele."
 cosmogenesis_world_0_MEGASTRUCTURE_DETAILS: "Uma estrutura de computação que consome Pops para gerar §YPesquisa§! e §YLógica Avançada§!."
 cosmogenesis_world_ruined: "$pc_cosmogenesis_world$ Arruinado"
 cosmogenesis_world_ruined_DESC: "Os restos destruídos de um Torno Sináptico. No passado, este mundo foi um computador gigante que usava seres sencientes como chips para revelar os segredos do universo."
 cosmogenesis_world_ruined_MEGASTRUCTURE_DETAILS: "$cosmogenesis_world_ruined_DESC$"
