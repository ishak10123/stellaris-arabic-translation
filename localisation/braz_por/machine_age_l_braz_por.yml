 civic_machine_obsessional_directive: "Diretiva Obsessiva"
 civic_machine_obsessional_directive_desc: "O objetivo principal desta Inteligência Maquinária é a produção incessante de bens para perpetuar os lucros, independentemente de seus criadores já terem desaparecido há muito tempo. Nada pode atrapalhar suas crescentes metas de produção."
