 CYBERCREED_labor: "A Comuna do Trabalho"
 pft_cyber_creed_labor: "$CYBERCREED_labor$"
 pft_cyber_creed_labor_desc: "A Comuna do Trabalho supervisiona cuidadosamente cada trabalhador humilde e suas melhorias, e a crença profunda na divindade do trabalho árduo impulsiona suas ações. Somente aqueles que cuidam das raízes podem compreender o divino.\n\n§LEthos Espiritualista§!"
 cyber_creed_labor: "$CYBERCREED_labor$"
 pft_cyber_creed_war: "$CYBERCREED_war$"
 pft_cyber_creed_war_desc: "Os Templários de Aço protegem a divindade dos nossos corpos, implantes cibernéticos e almas. As melhorias aprimoram seu treinamento rigoroso e a proeza em combate.\n\n§LEthos Espiritualista§!"
 cyber_creed_war: "$CYBERCREED_war$"
 pft_cyber_creed_construction: "$CYBERCREED_construction$"
 pft_cyber_creed_construction_desc: "A Fraternidade do Martelo produz materiais de qualidade impecável. Suas melhorias aperfeiçoam os artesãos do nosso império.\n\n§LEthos Espiritualista§!"
 cyber_creed_construction: "$CYBERCREED_construction$"
 pft_cyber_creed_research: "$CYBERCREED_research$"
 pft_cyber_creed_research_desc: "O Coro da Mente é uma semicolmeia coletiva de pesquisadores e engenheiros. Seus traços meditativos são uma forma de compartilhar informações com os membros do credo instantaneamente.\n\n§LEthos Espiritualista§!"
 cyber_creed_research: "$CYBERCREED_research$"
 pft_cyber_creed_general: "Os Credos Unidos"
 pft_cyber_creed_general_desc: "Guiados por uma coalizão de Tecnofantes Sagrados, os Credos Unidos expurgaram todas as crenças radicais. No entanto, sua dedicação à fusão sagrada continua resoluta, livre do passado dogmático que buscou restringir sua glória.\n\n§LEthos Espiritualista§!"
