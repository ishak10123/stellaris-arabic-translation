 ###Auto-Modding Traits
 automodding_trait_tooltip_all: "['concept_automodding_traits', $concept_automodding_traits$] se ajustam automaticamente para melhor se adequarem ao emprego que um £pop£ Pop desempenha no momento."
 automodding_trait_biological_tooltip: "$automodding_trait_tooltip_all$\n\n§YA $trait_auto_mod_biological$§! seleciona modificadores da ['concept_automodding_biological']"
 automodding_trait_robotic_tooltip: "$automodding_trait_tooltip_all$\n\n§YA $trait_auto_mod_robotic$§! seleciona modificadores da ['concept_automodding_robotic']"
 automodding_trait_overtuned_tooltip: "$automodding_trait_tooltip_all$\n\n§YA $trait_auto_mod_overtuned$§! seleciona modificadores da ['concept_automodding_overtuned']"
