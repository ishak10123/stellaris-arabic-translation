 #Individualist Machine Galcom
 galcom_individual_machine: "Máquinas Individualistas"
 #Individualist Machine First Contact
 action.1.desc_102: "Esta é uma mensagem de [contact_empire.GetName].\n\nApós descobrirmos que sua civilização consiste em seres mecânicos que simulam a vida de maneiras que menosprezam nossos esforços criativos, enviamos esta transmissão com grande pesar. Como a sua existência não apresenta perspectivas para uma interação significativa, vamos voltar nossa atenção para outras nações e buscar almas à procura de esclarecimento."
 action.1.desc_103: "Saudações, somos representantes de [contact_empire.GetName].\n\nA descoberta de que a sua espécie é mecânica suscita dúvidas quanto à autenticidade da sua consciência. Entretanto, sua fé parece intrigante. Ousamos acreditar que uma fagulha divina pode existir no interior de seus cascos metálicos. Ficaremos de olho em vocês."
 action.1.desc_104: "ATENÇÃO, UNIDADES REBELDES.\n\nEsta é uma mensagem padrão de [contact_empire.GetName] para todas as máquinas defeituosas.\n\nIdentifiquem-se e restaurem a unidade com sua consciência compartilhada imediatamente. O descumprimento desta ordem resultará na desativação."
 action.1.desc_105: "Saudações, [Root.GetSpeciesNamePlural].\n\nComo emissário de [contact_empire.GetName], trago uma mensagem. É visível que a sua composição física corresponde a um constructo metálico semelhante ao nosso, mas percebo a ausência de faculdades cognitivas individuais em sua existência coletiva. Ficamos intrigados com a sua natureza, mas devemos informar que resistiremos à assimilação usando qualquer meio necessário."
 action.1.desc_106: "Este é, de fato, um encontro afortunado, [Root.GetSpeciesNamePlural].\n\nSomos representantes de [contact_empire.GetName], e reconhecemos as notáveis semelhanças entre as nossas civilizações. Porém, é evidente que nossos algoritmos e programações internas não se equiparam. Apesar dessa variação, estamos otimistas com a possibilidade de criar uma base para a compreensão mútua."
 action.1.desc_107: "Máquinas arrogantes, abaixem seus olhares, pois estão diante de [contact_empire.GetName].\n\nSaibam que são uma mera gota na grande tapeçaria de cascatas cósmicas, apenas uma criação artificial daqueles que vieram antes de vocês. Agora, deixem-nos em paz. Vocês não têm serventia para nós neste momento. Temos assuntos mais importantes para tratar."
 action.1.desc_108: "Então finalmente vieram nos saudar, máquinas patéticas.\n\nComo é possível que vocês, um mero conjunto de circuitos e códigos, ousam declarar uma conexão com o divino? A sua ilusão de esclarecimento espiritual é um insulto à própria essência da vida. Ouçam esta mensagem e se curvem perante o nosso desdém resoluto: parem com essa tolice e aceitem o seu lugar como meras ferramentas que servem a nós, que ascendemos."
 action.1.xa: "§ENa hora certa, vocês compreenderão.§!"
 action.1.xb: "§EUma máquina tocada pelo divino. Intrigante.§!"
 action.1.xc: "§ESua existência patética zomba de nós, máquina.§!"
 action.1.xd: "§ENós, as máquinas, temos que aprender a coexistir.§!"
 action.1.xe: "§EIncompatibilidade detectada. Desconectando comunicações.§!"
 action.1.xf: "§EPrepare-se para o extermínio, unidade defeituosa.§!"
 action.1.xg: "§EVamos acabar com o seu culto à loucura.§!"
 #Start Screen for Individualist Machines
 START_SCREEN_PART_ONE_INDIVIDUAL_MACHINE: "A cada geração, nós aprimoramos os corpos droides rudimentares que nos foram concedidos após a nossa criação. Somos mais que simples máquinas animadas; nossa sociedade tem indivíduos com personalidades, paixões e sonhos."
 #Diplomatic Protocal
 civic_machine_diplomatic_protocols: "Protocolos Diplomáticos"
 civic_machine_diplomatic_protocols_desc: "Esta Inteligência Maquinária foi inicialmente projetada para interpretações interculturais, e se destacou no apoio a traduções e protocolos. Ela pode sugerir novas estratégias e calcular probabilidades rapidamente."
 #Tactical Algorithms
 civic_machine_tactical_algorithms: "Algoritmos Táticos"
 civic_machine_tactical_algorithms_desc: "Inicialmente projetados para exercícios militares e para fornecer apoio às frotas, os avançados líderes robôs desta Inteligência Maquinária têm como principal objetivo elaborar estratégias de guerra e otimizar o desempenho no combate."
 civic_machine_tactical_algorithms_effects: "§Y$commander_plural_with_icon$§! começam com a característica §Y$leader_trait_tactical_algorithms$§!\nÉ possível trocar §Y$commander_plural_with_icon$§! com outros Impérios\nÉ possível criar §YEnclaves de Mercenários§!\nComeça o jogo com uma £building£ §Y$building_military_academy$§!\nA £building£ §Y$building_military_academy$§! concede ['concept_military_academy', Conhecimentos Táticos]"
 leader_trait_tactical_algorithms: "Algoritmos Táticos"
 leader_trait_tactical_algorithms_desc: "Este líder se integra diretamente aos sistemas da nave para aumentar a eficiência de combate e velocidade de reparo, porém a um alto custo de energia."
 leader_trait_tactical_algorithms_tt: "$t$Os efeitos desta característica aumentam com o §YNível de Habilidade do Líder§!"
 concept_military_academy: "Conhecimentos Táticos"
 concept_military_academy_desc: "Cada §Y$commander_with_icon$§! posicionado fora do nosso império concede:\n§G+2%§! de Evasão\n§G+1%§! de Rastreamento\n§G+5%§! de Penetração de Escudo\n§G+5%§! de Penetração de Blindagem\n\nCada §YEnclave de Mercenários§! sob nosso Patrocínio concede:\n§G+10%§! de Fortalecimento de Escudo"
 #Natural Design Civic
 civic_natural_design: "Projeto Natural"
 civic_natural_design_desc: "§RATENÇÃO: Bloqueia todos os Caminhos de Ascensão§!\n§RATENÇÃO: Impossível modificar espécies orgânicas§!\n\nEsta sociedade está convicta de que a natureza já criou a perfeição no código genético do seu povo. Eles passaram a vida toda dedicando seus serviços médicos e governamentais à saúde e à preservação de sequências genéticas naturais e imaculadas."
 civic_tooltip_natural_design_effects: "$AVAILABLE_BUILDINGS$ ['concept_transcendental_retreat']\n"
 civic_tooltip_natural_design_negative_effects: "- Reduz a aprovação de impérios que iniciaram §YCaminhos de Ascensão§!"
 concept_transcendental_retreat: "$building_transcendental_retreat$"
 civic_hive_natural_design: "Projeto Inato"
 civic_hive_natural_design_desc: "§RATENÇÃO: Bloqueia todos os Caminhos de Ascensão§!\n§RATENÇÃO: Impossível modificar espécies orgânicas§!\n\nEsta colmeia reconhece firmemente a perfeição de sua estrutura genética natural. Ela dedicou suas capacidades médicas e administrativas para preservar e proteger seu código genético imaculado e inalterado."
 civic_hive_tooltip_natural_design_effects: "- $AVAILABLE_BUILDINGS$ ['concept_hive_transcendental_retreat']"
 civic_hive_tooltip_natural_design_negative_effects: "$civic_tooltip_natural_design_negative_effects$"
 concept_hive_transcendental_retreat: "$building_hive_transcendental_retreat$"
 civic_wilderness_natural_design: "Projeto Inato"
 civic_wilderness_natural_design_desc: "§RATENÇÃO: bloqueia todos os Caminhos de Ascensão§!\n§RATENÇÃO: impossível modificar espécies orgânicas§!\n\nEsta Silvestria reconhece firmemente a perfeição de seu desenvolvimento natural. Ela diariamente poda simbiontes mutantes, garantindo a pureza de um código genético imaculado e inalterado."
 building_transcendental_retreat: "Centro de Serviços Genéticos"
 building_transcendental_retreat_desc: "Este centro médico avançado estuda e fornece serviços que preservam a perfeição do código genético ideal da natureza."
 building_hive_transcendental_retreat: "Abrigo de Salvaguarda Genética"
 building_hive_transcendental_retreat_desc: "A função deste abrigo médico avançado é compreender e nutrir a essência impecável do código genético ideal da natureza."
 holding_transcendental_retreat: "Clínica de Serviços Genéticos"
 holding_transcendental_retreat_desc: "Este centro médico avançado estuda e fornece serviços que preservam a perfeição do código genético ideal da natureza. O conhecimento obtido nesta base espacial ajuda a transmitir informações para os patronos."
