 ##########################
 #ARC WELDERS ORIGIN
 ##########################
 origin_arc_welders: "Soldadores do Arco"
 origin_arc_welders_desc: "Diferente do planeta infértil que habitam, seu sistema natal está repleto de riquezas. Para explorá-lo, essas máquinas projetaram suas maiores construções. Agora, uma poderosa §H$tech_orbital_arc_furnace$§! domina o céu, mas esses mestres da engenharia ainda não se deram por satisfeitos.\n\nA galáxia aguarda, e as possibilidades são infinitas; basta engenhosidade para alcançá-las."
 origin_tooltip_arc_builders_effects: "- $HOMEWORLD$ ['Concept_mining_district', £district£ $district_mining_plural$] iniciais substituídos por ['concept_generator_district', £district£ $district_generator_plural$] $NEW_LINE$- $HOME_SYSTEM$ ['concept_arc_furnace'] construída ao redor de um ['concept_pc_molten'] $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_orbital_arc_furnace',£engineering_research£ $tech_orbital_arc_furnace$] $NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_mega_engineering', £engineering_research£ $tech_mega_engineering$] após construir uma segunda Fornalha Arc"
 origin_tooltip_arc_builders_negative_effects: "- $INITIAL_POPS$ §R-300§! $NEW_LINE$- $HOMEWORLD$ Tamanho: £planetsize£ 15"
 START_SCREEN_ARC_WELDERS: "Anos de exploração deixaram [Root.Capital.GetName] infértil. Mas os céus estão repletos de recursos, e com uma ambição equiparada à nossa engenhosidade, buscamos agora uma forma de viver no espaço.\n\nA construção inicial da $tech_orbital_arc_furnace$ foi uma realização monumental, e seu potencial é imenso. O próximo passo é aprimorá-la até atingir a capacidade máxima para atendermos à necessidade de extração de recursos em todo o sistema. Mas o que pode estar além das nossas fronteiras? Quais oportunidades incríveis aguardam aqueles que dominam a arte da engenharia?\n\nCom a chegada das viagens MRQL, nossos desígnios não se limitam mais a um único sistema. A galáxia é a nossa prancha de rascunhos, e está na hora de colocar a mão na massa."
 concept_arc_furnace: "$orbital_arc_furnace_1$"
 concept_arc_furnace_desc: "§EEfeitos:§!$NEW_LINE$$orbital_arc_furnace_1_mod_tooltip$\n\n§L$tech_orbital_arc_furnace_desc$§!"
 concept_orbital_arc_furnace: "$tech_orbital_arc_furnace$"
 concept_orbital_arc_furnace_desc: "§ILibera a Megaestrutura:§! $orbital_arc_furnace_4$ $DOUBLE_NEW_LINE$§L$tech_orbital_arc_furnace_desc$§!"
 concept_mega_engineering: "$tech_mega_engineering$"
 concept_mega_engineering_desc: "- $MOD_COUNTRY_RESOURCE_MAX_ADD$: §G+20.000§! $NEW_LINE$- §I$UNLOCKS_FEATURE$§! Restauração de Megaestrutura $DOUBLE_NEW_LINE$§L$tech_mega_engineering_desc$§!"
 machine_age.3400.name: "Combustível para a Forja"
 machine_age.3400.desc: "Mesmo distante, [From.GetName] parecia ser o lugar ideal. Agora que concluímos a inspeção do sistema, não restam dúvidas: um mundo derretido e um gigante gasoso, uma abundância de asteroides e luas; este é o local perfeito para outra Fornalha Arc.\n\nO próximo passo lógico é enviar uma nave de construção para começar o trabalho. É hora de acender a forja."
 ideal_furnace_system_poi: "Sistema de Fornalha Ideal"
 ideal_furnace_system_name: "[From.GetName]"
 ideal_furnace_system_desc: "Um sistema ideal para a construção de uma segunda $tech_orbital_arc_furnace$."
 ideal_furnace_system: "Sistema Ideal Localizado"
 ideal_furnace_chain_title: "Combustível para a Forja"
 ideal_furnace_chain_desc: "Localizamos um sistema ideal para construir uma segunda $tech_orbital_arc_furnace$."
 machine_age.3405.name: "Horizonte Fundido"
 machine_age.3405.desc: "A Fornalha Arc em nosso sistema natal era uma excelente prova de conceito. Um marco da nossa ambição e engenhosidade. Agora, no sistema [from.GetName], outra Fornalha queima contra o vazio.\n\nMuito além dos recursos que ela poderá fornecer, nosso trabalho aqui abriu portas para projetos de escalas gigantescas. Podemos ver mais longe agora, como se observássemos sobre o penhasco de um vasto horizonte.\n\nO único limite é a nossa imaginação."
 ##########################
 #SYNTHETIC FERTILITY
 ##########################
 #Event Chain
 synthetic_fertility_chain_title: "$origin_synthetic_fertility$"
 synthetic_fertility_chain_desc: "Perdemos a capacidade de procriar. Nosso mundo natal está repleto de centros educacionais abandonados. Os parquinhos estão vazios. É só uma questão de tempo até deixarmos de existir. Por enquanto, nossa salvação jaz no armazenamento digital do Repositório de Identidades.\n\nTeremos que projetar novos corpos sintéticos e um cérebro positrônico complexo o suficiente se quisermos retornar ao mundo físico algum dia."
 #Origin Text
 origin_synthetic_fertility: "Fertilidade Sintética"
 origin_synthetic_fertility_desc: "§RATENÇÃO: Bloqueia todos os Caminhos de Ascensão, exceto para ['concept_synthetic_ascension'].§!\n\nEste império já foi uma sociedade próspera, mas agora sua população é incapaz de se reproduzir devido a uma doença genética. Quase sem opções e à beira da extinção, o povo recorre à salvação digital."
 origin_tooltip_synthetic_fertility_effects: "- $INITIAL_POPS$ §G+900§! $NEW_LINE$- $SPECIES_TRAITS$ ['concept_pathogenic_genes']\n- Mundo Natal: $TABBED_NEW_LINE$- Tamanho: £planetsize£ 20 $TABBED_NEW_LINE$- ['concept_abandoned_cities', £blocker£ $concept_abandoned_cities$]: +2 $TABBED_NEW_LINE$- ['concept_identity_repository',£building£ $concept_identity_repository$] $TABBED_NEW_LINE$- ['concept_abandoned_gene_clinic',£building£ $concept_abandoned_gene_clinic$] $NEW_LINE$- Situação: ['concept_identity_rescue'] $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_synth_ai'] $NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_robotic_workers', £engineering_research£ $tech_robotic_workers$]"
 origin_tooltip_synthetic_fertility_negative_effects: "- £pop£ §HPops§!: Em declínio"
 START_SCREEN_SYNTHETIC_FERTILITY: "As primeiras incursões no campo da consciência artificial foram revolucionárias, abrindo portas para uma comunidade totalmente digital e desfazendo a fronteira entre os mundos físico e virtual. O sucesso foi tão grande que ficamos complacentes, acreditando que tínhamos inúmeras gerações para inovar e explorar.\n\nEstávamos errados.\n\nPerdemos nossa habilidade de procriar devido a uma repentina doença genética. Mesmos as nossas mentes mais brilhantes foram incapazes de encontrar uma cura, e o pânico se disseminou pela população que envelhecia e diminuía.\n\nComo último ato de desespero, expandimos nosso armazenamento digital e criamos um \"espaço\" suficiente para preservar nossas identidades. Mas seria essa a existência que desejamos? Nosso foco agora é desenvolver corpos sintéticos e um cérebro positrônico sofisticado o bastante para permanecermos no mundo físico."
 #Concepts
 concept_synthetic_ascension: "Ascensão Sintética"
 concept_synthetic_ascension_desc: "$ap_synthetic_evolution_desc$"
 concept_pathogenic_genes: "$trait_pathogenic_genes$"
 concept_pathogenic_genes_desc: "- §RNão é possível colonizar planetas ou recolonizar populações.§! $NEW_LINE$- §RNão é possível se reproduzir de forma natural.§!\n\n§L$trait_pathogenic_genes_desc$§!"
 concept_identity_rescue: "$situation_synthetic_fertility_digitization$"
 concept_identity_rescue_desc: "Concede tecnologias que liberam $concept_synthetic_ascension$ \n\n§L$situation_synthetic_fertility_digitization_desc$§!"
 concept_identity_repository: "$building_identity_repository$"
 concept_identity_repository_desc: "- Produz:$TABBED_NEWLINE$ £physics£ 6.00 £society£ 6.00 £engineering£ 6.00 £unity£ 6.00 $NEW_LINE$- Manutenção: £energy£ 6.00 $NEW_LINE$- £trade£: §G+6§!\n\nEste repositório abriga §Y300§! Identidades. $building_identity_repository_scaling$\n\n§L$building_identity_repository_desc$§!"
 concept_abandoned_gene_clinic: "$building_abandoned_gene_clinic$"
 concept_abandoned_gene_clinic_desc: "- $building_abandoned_gene_clinic_tt$\n\n§L$building_abandoned_gene_clinic_desc$§!"
 concept_abandoned_cities: "$d_abandoned_cities$"
 concept_abandoned_cities_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-1§! $NEW_LINE$- Tempo para Liberar: £time£ 360 §IDias§!$NEW_LINE$- Custo para Liberar: $TABBED_NEW_LINE$- 750 de $i_energy$ $TABBED_NEW_LINE$- 250 de $i_minerals$\n\n§L$_abandoned_cities_desc$§!"
 concept_synth_ai: "Tecnologias de IA"
 concept_synth_ai_desc: "- ['concept_powered_exoskeletons', £engineering_research£ $tech_powered_exoskeletons$] $NEW_LINE$- ['concept_administrative_ai', £physics_research£ $tech_administrative_ai$] $NEW_LINE$- ['concept_self_aware_logic', £physics_research£ $tech_self_aware_logic$] $NEW_LINE$- ['concept_sapient_ai', £physics_research£ $tech_sapient_ai$]"
 concept_administrative_ai: "$tech_administrative_ai$"
 concept_administrative_ai_desc: "$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$: §G+5%§!\nManutenção de $job_researcher_plural_with_icon$: §R+5%§!\n\n§L$tech_administrative_ai_desc$§!"
 concept_self_aware_logic: "$tech_self_aware_logic$"
 concept_self_aware_logic_desc: "$MOD_COUNTRY_NUM_TECH_ALTERNATIVES_ADD$: §G+1§!\n\n§L$tech_self_aware_logic_desc$§!"
 concept_sapient_ai: "$tech_sapient_ai$"
 concept_sapient_ai_desc: "$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$: §G+5%§!\nManutenção de $job_researcher_plural_with_icon$: §R+5%§!\n\n§L$tech_sapient_ai_desc$§!"
 #Traits
 trait_pathogenic_genes: "Genes Patogênicos"
 trait_pathogenic_genes_desc: "Uma nova doença genética previne a procriação desta espécie. Ela resistiu a todos os métodos conhecidos de terapia genética."
 PATHOGENIC_GENES_FORCE_DECLINE: "§REspécie em declínio§! devido aos seus §Y$trait_pathogenic_genes$§!"
 pathogenic_genes_tooltip: "§RNão é possível colonizar planetas ou realocar populações§!"
 pathogenic_genes_warning: "$TRIGGER_FAIL$§YPops com §R$trait_pathogenic_genes$§! não podem ser realocados§!"
 leader_trait_robotic_surrogate: "Substituto Robótico"
 leader_trait_robotic_surrogate_desc: "Este robô desajeitado e lento é o substituto de um líder digitalizado no $building_identity_repository$."
 #Buildings
 building_identity_repository: "Repositório de Identidades"
 building_identity_repository_tt: "Este repositório abriga §Y[Owner.GetTotalIdentities]§! Identidades. $building_identity_repository_scaling$"
 building_identity_repository_scaling: "\n\nCada Identidade aumenta a manutenção e a produção do Repositório, divididas entre todos os $building_identity_repository$ em nossos planetas.\n"
 building_identity_repository_desc: "Antes do corpo sucumbir, a mente é digitalizada. Armazenados em segurança, nós continuamos trabalhando pelo bem da sociedade."
 building_abandoned_gene_clinic: "Clínica Genética Abandonada"
 building_abandoned_gene_clinic_tt: "§RNão pode ser Demolida, Substituída ou Reparada§!"
 building_abandoned_gene_clinic_desc: "Após perdermos a capacidade de procriar por meios naturais, a comunidade médica recorreu a esta clínica genética avançada. Assim como grande parte da nossa infraestrutura, ela se encontra vazia; um lembrete constante da nossa luta e da necessidade de novas soluções urgentes."
 #Situation Events
 machine_age.3100.name: "Salvação Digital"
 machine_age.3100.desc: "Na falta de uma solução médica, nossa melhor chance de sobreviver é digitalizar a população no §YRepositório de Identidades§!. Porém, essa é uma solução temporária. Já elaboramos um plano para desenvolver corpos sintéticos e um cérebro positrônico que seja complexo o suficiente. Estimamos que temos tempo para concluir a pesquisa de maneira focada.\n\nCom uma tecnologia de IA avançada, nossos melhores especialistas já projetaram os diagramas dos corpos robóticos, o primeiro passo para a nossa salvação sintética."
 machine_age.3100.a: "Isso tem que dar certo."
 machine_age.3110.name: "Trabalhadores Robóticos"
 machine_age.3110.desc: "Concluímos nossa pesquisa de corpos robóticos. Convertemos a instalação $building_abandoned_gene_clinic$ em $building_robot_assembly_plant$, e os protótipos foram aprimorados e mobilizados. Esses sistemas rudimentares ainda não têm o poder de processamento para manter a consciência de um indivíduo, mas podem substituir parte da força de trabalho que perdemos. Por meio de uma conexão positrônica, quem estiver no mundo digital pode adicionar seu conhecimento e experiência às operações diárias desses robôs, melhorando seus desempenhos.\n\nAo mesmo tempo, nossos sistemas de IA desenvolveram um projeto para androides avançados. Nossos velhos engenheiros estão prontos para começar o trabalho."
 machine_age.3110.a: "Uma etapa concluída."
 machine_age.3110.a.tooltip: "[Root.Capital.GetName]:\n- §Y$building_robot_assembly_plant$§!: §G+1§! \n- £pop£ §HPops Mecânicos§!: §G+300§!"
 machine_age.3115.name: "Domínio de Droides"
 machine_age.3115.desc: "Este aprimoramento significativo para a nossa tecnologia robótica indica que agora podemos colonizar outros planetas, e que a nossa população mecanizada pode apoiar tarefas mais complexas.\n\nNossos sistemas de IA acreditam que a próxima etapa lógica seria replicar suas matrizes positrônicas em corpos sintéticos. Esse importante projeto de pesquisa deve possibilitar o retorno de uma consciência digitalizada ao mundo natural."
 machine_age.3115.a: "Não podemos desistir agora."
 machine_age.3120.name: "Uma Última Etapa"
 machine_age.3120.desc: "Depois de um trabalho implacável, alcançamos nosso objetivo. Projetamos um cérebro positrônico totalmente funcional, sofisticado o bastante para abrigar nossas identidades.\n\nEmbora não possamos vencer a morte, logo não estaremos mais presos às limitações da existência biológica."
 machine_age.3120.a: "É hora do nosso despertar Sintético."
 machine_age.3120.a.tooltip: "Para progredir com esses eventos, temos que adotar a §YTradição Sintética§!."
 machine_age.3125.name: "O Sonho Digital"
 machine_age.3125.both: "Nossas fábricas de montagem e especialistas em sintetização estão prontos para começar a imensa tarefa de transferir identidades para novos cérebros positrônicos e corpos sintéticos."
 machine_age.3125.desc: "$machine_age.3125.both$\n\nVamos dar início ao nosso trabalho focando naqueles que ainda residem no mundo físico. O objetivo é erradicar a doença genética de uma vez por todas. Com o poder de processamento ampliado de um cérebro sintético, poderemos ultrapassar até mesmo nossas restrições biológicas.$synth.105.end$"
 machine_age.3125.nobody.desc: "$machine_age.3125.both$\n\nSem uma presença física no mundo, devemos construir nosso primeiro protótipo de corpo rapidamente. Com o poder de processamento ampliado de um cérebro sintético, poderemos ultrapassar até mesmo nossas restrições biológicas.$synth.105.end$"
 machine_age.3125.a: "Que comece a transferência de identidade."
 machine_age.3125.a.tooltip: "Todos os Pops Biológicos restantes serão transferidos para corpos Sintéticos."
 machine_age.3200.name: "Purgatório Digital"
 machine_age.3200.desc: "Nossos piores medos se tornaram realidade.\n\nO último corpo físico morreu. Ainda que nossas consciências digitais estejam armazenadas em segurança no Repositório de Identidades, não temos a tecnologia para colocar nossas mentes em um cérebro artificial.\n\nAté concluirmos a pesquisa, nossos líderes digitais terão que interagir com o mundo natural por meio de substitutos robóticos."
 machine_age.3305.name: "Salvação Virtual"
 machine_age.3305.desc: "Tivemos êxito em realocar todas as identidades para uma nova armação sintética ou para o Repositório de Identidades, garantindo a existência do nosso povo.\n\nContudo, surgiu um novo desafio. O \"espaço\" digital que criamos para armazenar nossas identidades digitais deveria ser temporário, mas a população se acostumou a esse tipo de existência e está relutante em voltar ao mundo físico.\n\nPoderíamos permitir que permaneçam assim, mas a opção de transferi-los forçadamente para novos corpos sintéticos ainda é uma alternativa possível."
 machine_age.3305.a: "Deixe-os desfrutar do nirvana."
 machine_age.3305.a.tooltip: "As identidades digitais restantes ficarão no §Y$building_identity_repository$§! e continuarão a apoiar nosso povo a partir sem sair de lá."
 machine_age.3305.b: "Somos mais fortes juntos."
 machine_age.3305.b.tooltip: "Colocaremos as identidades digitais restantes em nosso estoque atual de corpos sintéticos e construiremos corpos novos para o resto. O §Y$building_identity_repository$§! será destruído."
 machine_age.3310.name: "Renascimento Sintético"
 machine_age.3310.desc: "Passaram-se décadas desde que um indivíduo [Root.Owner.GetSpeciesAdj] segurou um bebê no colo. Talvez nunca voltemos a sentir isso, mas hoje marca o retorno da esperança para o nosso povo.\n\nDesenvolvemos §YComplexos de Identidade§!, centros avançados onde podemos copiar identidades existentes e, basicamente, criar novas pessoas.\n\nPoderíamos selecionar características de personalidade de vários indivíduos aleatoriamente, criando novas identidades por meio de inúmeras combinações. A outra opção seria copiar o processo da natureza nutrindo \"núcleos mentais\" em uma configuração virtual."
 machine_age.3310.a: "Vamos mesclar as nossas mentes."
 machine_age.3310.building_tooltip.a.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.a.tt$\n§YLibera a Construção:§! $building_identity_complex$"
 machine_age.3310.b: "A natureza tem alguns sistemas bons."
 machine_age.3310.building_tooltip.b.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.b.tt$\n§YLibera a Construção:§! $building_identity_complex$"
 machine_age.3315.name: "Alvorada Sintética"
 machine_age.3315.desc: "Chegamos ao fim da nossa jornada digital. Ninguém pode negar a magnitude do que foi feito, nem o sacrifício necessário para chegar até aqui.\n\nAgora renascemos como um povo totalmente digitalizado e sintético. Nunca mais seremos vítimas dos terrores das doenças. As limitações da frágil genética não voltarão a nos restringir.\n\nEstamos livres para criar a realidade que desejarmos."
 machine_age.3315.a: "Viva o renascimento sintético."
 machine_age.3315.a.tooltip: "Termina a cadeia de eventos §Y$origin_synthetic_fertility$§!."
 machine_age.3315.a.tt: "A espécie §Y[This.Owner.GetSpeciesName]§! ganha a característica ['concept_synthetic_dawn']"
 synthetic_dawn: "Alvorada Sintética"
 synthetic_dawn_desc: "Nós ascendemos como um povo totalmente digitalizado e sintético, livres para criar qualquer realidade que desejarmos."
 trait_robot_synthetic_dawn: "Salvação Sintética"
 trait_robot_synthetic_dawn_desc: "Esta espécie sintética transcendeu suas origens biológicas, prosperando em sua nova existência digital."
