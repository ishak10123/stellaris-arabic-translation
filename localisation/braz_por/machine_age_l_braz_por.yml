 origin_tooltip_cybernetic_creed_effects: "- Construções iniciais do $HOMEWORLD$ substituídas por ['concept_cybernetic_creed_infrastructure'] $NEW_LINE$- Facções de ['concept_cybernetic_creed'] formadas logo após o começo do jogo\n- $SPECIES_TRAITS$ ['trait:trait_cyborg_ritualistic_implants']\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_integrated_cybernetics', £engineering£ $tech_integrated_cybernetics$]\n- Empregos de ['concept_cybernetic_creed_jobs']"
 START_SCREEN_CYBERNETIC_CREED: "Nosso chamado sublime é a unificação entre [Owner.Species.GetFleshTypeCyberCreed] e máquina. Nossa história está repleta de fracassos, mas guiados pela vontade divina, alcançamos o primeiro estágio de uma simbiose sagrada com nossos implantes ritualísticos.\n\nEstamos apenas começando a tocar nosso potencial cibernético ilimitado. Teremos melhorias ainda mais avançadas.\n\nApesar disso, nossa fé está dividida: credos opostos disputam os objetivos da melhoria sagrada. Quando resolvermos essa questão, a perfeita união entre [Owner.Species.GetFleshTypeCyberCreed] e a tecnologia abençoada nos permitirá aprimorar os designs limitados da evolução.\n\n$machine_age.1090.pray$"
