 SPECIES_TRAIT_ARTHROPOID: "['concept_arthropoid_phenotype_traits']"
 SPECIES_TRAIT_AVIAN: "['concept_avian_phenotype_traits']"
 SPECIES_TRAIT_MOLLUSCOID: "['concept_molluscoid_phenotype_traits']"
 SPECIES_TRAIT_PLANTOID: "['concept_plantoid_phenotype_traits']"
 SPECIES_TRAIT_FUNGOID: "['concept_fungoid_phenotype_traits']"
 SPECIES_TRAIT_LITHOID: "['concept_lithoid_phenotype_traits']"
 SPECIES_TRAIT_NECROID: "['concept_necroid_phenotype_traits']"
 SPECIES_TRAIT_AQUATIC: "['concept_aquatic_phenotype_traits']"
 SPECIES_TRAIT_TOXOID: "['concept_toxoid_phenotype_traits']"
 SPECIES_TRAIT_INFERNAL: "['concept_infernal_phenotype_traits']"
 SPECIES_TRAIT_VOCATIONAL: "['concept_vocational_traits']"
 SPECIES_TRAIT_OVERTUNED: "['concept_overtuned_traits']"
 SPECIES_TRAIT_FLEETING_EXCELLENCE: "['concept_fleeting_excellence_traits']"
 SPECIES_TRAIT_CYBORG: "['concept_cybernetic_traits']"
 SPECIES_TRAIT_UNIVERSAL_AUGMENTATIONS: "['concept_universal_augmentations_traits']"
 SPECIES_TRAIT_ADAPTIVE_FRAMES: "['concept_adaptive_frames_traits']"
 trait_egg_laying: "Ovíparos"
 trait_egg_laying_desc: "As crias desta espécie não se desenvolvem no interior do progenitor, mas dentro da casca protetora de um ovo. Isso permite um rápido crescimento em períodos de fartura."
 trait_egg_laying_effect: "Velocidade de Crescimento de Pop: §G+15%§! enquanto habita um planeta com §GExcesso de Produção§! de $r_food$ (ou equivalente)"
 trait_egg_laying_portrait_override_tt: "Ou qualquer espécie ovípara"
 trait_seasonal_dormancy: "Letargia Sazonal"
 trait_seasonal_dormancy_desc: "Esta espécie evoluiu em um planeta com estações cíclicas que sustentam a hibernação. Na era moderna, tais gatilhos sazonais podem ser simulados artificialmente para dispensar de modo eficaz membros menos produtivos da sociedade."
 trait_seasonal_dormancy_effect: "Manutenção de Pops Empregados: §G-15%§!\n    - Manutenção de Pops Desempregados e ['concept_denizen']s: §G-75%§!"
 trait_seasonal_dormancy_portrait_override_tt: "Ou qualquer espécie que hiberna"
 trait_hollow_bones: "Ossos Ocos"
 trait_hollow_bones_desc: "Os frágeis ossos desta espécie permitem uma movimentação graciosa e natural. Contudo, eles também são mais suscetíveis aos efeitos gravitacionais de seu mundo."
 trait_hollow_bones_effect: "$BONUS_WORKFORCE_FOR$ $pop_cat_worker_plural$, $pop_cat_simple_drone_plural$ e Empregos de Soldado por Tamanho do Planeta: §R-0.67%§!"
 trait_rooted: "Enraizados"
 trait_rooted_desc: "Esta espécie literalmente cria raízes em qualquer ambiente que habite, tornando sua remoção uma experiência intensamente traumática."
 AUTO_MIGRATE_ROOTED: "§RPops enraizados não podem migrar.§!"
 trait_rooted_effect: "§RPops não Recolonizam automaticamente§!\n    - Custo de Recolonização: §R+200%§!"
 trait_rooted_portrait_override_tt: "Ou qualquer espécie com restrição ambiental"
 trait_acidic_vascularity: "Vascularidade Ácida"
 trait_acidic_vascularity_desc: "Os fluidos internos desta espécie atuam como uma poderosa defesa. Altamente corrosivos e letais, esses líquidos fazem com que os inimigos se arrependam de terem perfurado seu corpo."
 trait_acidic_vascularity_effect: "Exércitos §YExplodem ao Morrer§!, causando §G250§! de dano aos inimigos\n    - Produção de Recursos de Pop Expurgado: §R-75%§!"
 DAMAGE_ARMY: "Causa dano a $ARMY|Y$"
 trait_shelled: "Conchíferos"
 trait_shelled_desc: "Indivíduos desta espécie carregam seus lares consigo, sejam eles formados naturalmente ou encontrados por acaso (ou destino). Essas conchas fornecem um santuário protetor, garantindo um lugar para descansar à noite."
 trait_shelled_portrait_override_tt: "Ou qualquer espécie que possui concha"
 trait_camouflage: "Camuflagem"
 trait_camouflage_desc: "Mestres do disfarce, indivíduos desta espécie desaparecem facilmente no ambiente, tornando-se quase invisíveis a presas e predadores. Sua compreensão inata da ótica lhes dá uma vantagem nos confrontos de guerrilha."
 trait_camouflage_portrait_override_tt: "Ou qualquer espécie que se camufla"
 trait_chromalogs: "Cromálogos"
 trait_chromalogs_desc: "Com total domínio das cores, esta espécie transcendeu a mera camuflagem, evoluindo para comunicar-se por meio dos padrões vibrantes e complexos exibidos em seus corpos."
 trait_chromalogs_portrait_override_tt: "Ou qualquer espécie que utiliza coloração corporal para se comunicar"
 trait_brittle: "Quebradiços"
 trait_brittle_desc: "Assolada por uma fragilidade inerente, esta espécie deve ter atenção redobrada durante atividades cotidianas ou corre o risco de rachar durante tarefas corriqueiras."
 trait_familial: "Familiares"
 trait_familial_desc: "Unidos por vínculos intensos e duradouros com seus familiares mais próximos, indivíduos desta espécie formam coletivos altamente eficientes e coesos."
 trait_familial_effect: "Felicidade a cada §Y100§! £pop£ Pops com esta Característica no mesmo planeta: §G0.1%§! (Máximo: §G+20%§!)"
 trait_familial_portrait_override_tt: "Ou qualquer espécie familiar"
 trait_permeable_skin: "Pele Permeável"
 trait_permeable_skin_desc: "Esta espécie é coberta por uma pele especialmente desenvolvida que requer condições ideais. Contanto que seus indivíduos não se distanciem demais de seu clima nativo, isso não deve ser um problema."
 trait_permeable_skin_effect: "Habitabilidade em mundos com uma ['concept_climate_category'] diferente da nossa Preferência: §R-20%§!"
 concept_climate_category: "Categoria Climática"
 concept_climate_category_desc: "Planetas Habitáveis são divididos em três categorias climáticas:\n- Úmido:\n$t$- Continental\n$t$- Oceânico\n$t$- Tropical\n- Frio:\n$t$- Alpino\n$t$- Ártico\n$t$- Tundra\n- Seco:\n$t$- Árido\n$t$- Desértico\n$t$- Savana"
 trait_genetic_memory: "Memória Genética"
 trait_genetic_memory_desc: "A transmissão de conhecimento e aprendizado de uma geração para a outra marcou o início de inúmeras civilizações. Esta espécie foi mais longe e codificou noções de sobrevivência diretamente em seu DNA, garantindo que cada nova geração carregue a sabedoria acumulada de seus antepassados."
 trait_genetic_memory_effect: "Habitabilidade da Idade da Colônia: §G+0.5%§! por Ano (Máx. de §G+25%§!)"
 trait_genetic_memory_portrait_override_tt: "Ou qualquer espécie com instintos de sobrevivência natos"
 trait_nascent_stage: "Estágio Incipiente"
 trait_nascent_stage_desc: "Esta espécie dá à luz em um estágio inicial de desenvolvimento, resultando em um período prolongado no qual as crias são incapazes de contribuir para a sociedade. Durante essa fase, elas permanecem abençoadamente ignorantes às responsabilidades e fardos trazidos pela sapiência."
 trait_nascent_stage_effect: "Pops recém-nascidos com esta Característica passam os primeiros §Y5§! anos como Pré-Sapientes."
 trait_nascent_stage_portrait_override_tt: "Ou qualquer espécie com uma infância longa"
 trait_presapient_stage: "Pré-Sapientes"
 trait_presapient_stage_desc: "Desprovidos do pensamento consciente por um breve período, indivíduos desta espécie logo se desenvolverão em seres totalmente sapientes."
 trait_flight: "Voo"
 trait_flight_desc: "Esta espécie voa acima das limitações terrestres, navegando livremente pelos céus. Suas cidades configuram-se de forma densa e única, otimizadas para habitantes aéreos. Em conflitos, eles se revelam alvos elusivos."
 trait_flight_portrait_override_tt: "Ou qualquer espécie adaptada para a vida aérea"
 trait_spatial_mastery: "Domínio Espacial"
 trait_spatial_mastery_desc: "Além da capacidade de voo, esta espécie apresenta adaptações cerebrais únicas que permitem a ela processar e navegar instintivamente espaços tridimensionais. Essas habilidades os tornam inigualáveis no planejamento de batalhas, inspeção de planetas e gerenciamento de cidades."
 trait_spatial_mastery_portrait_override_tt: "Ou qualquer espécie com navegação tridimensional"
 trait_spare_organs: "Órgãos Reservas"
 trait_spare_organs_desc: "Esta espécie desenvolveu órgãos supérfluos para sobreviver aos ferimentos mais graves; uma adaptação bem-sucedida, a julgar pela sua existência continuada."
 trait_spare_organs_effect: "Líderes sobreviverão à primeira morte.\n    - Na Morte do Exército Ofensivo: §G20%§! de chance de gerar um Exército Substituto.\n    - Produção de £job_livestock£ §Y$job_livestock$§!: §G+50%§!"
 mod_planet_livestock_produces_mult: "Produção de £job_livestock£ §Y$job_livestock$§!"
 trait_leader_second_chanced: "Segunda Chance"
 trait_leader_second_chanced_desc: "Este líder foi salvo da morte certa graças à sua biologia singular. Isso não acontecerá novamente."
 #################################
 #Evolutionary Predators Origin #
 #Written by Victor Haeggman  #
 #################################
 #Origin and Start of Game
 origin_evolutionary_predators: "Predadores Evolucionários"
 origin_evolutionary_predators_desc: "§RATENÇÃO: Bloqueia todos os Caminhos de Ascensão, exceto para ['concept_mutation_ascension'].§!\n\nEsta espécie sempre caçou as criaturas mais singulares, motivada por um instinto que ainda não compreende totalmente. Dotados da rara habilidade de integrar a genética de suas presas, eles evoluíram como os predadores alfa do seu mundo, absorvendo todas as vantagens genéticas disponíveis. Agora, sua ânsia os levou às estrelas."
 origin_tooltip_evolutionary_predators_effects: "- $SPECIES_TRAITS$ ['concept_malleable_genes']\n- Situação: ['concept_adaptive_evolution']\n- Mundo Natal: ['concept_genetic_soup']"
 START_SCREEN_EVOLUTIONARY_PREDATORS_BASE: "Os [GetSpeciesNamePlural] sempre foram caçadores. Nós buscamos nossa presa onde quer que esteja, desbravando até os ambientes mais extremos para saborear algo novo. Quando você é o que você come, nenhum esforço é desmerecido.\n\n"
 START_SCREEN_EVOLUTIONARY_PREDATORS_REGULAR: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Sempre soubemos que somos moldados pela carne de nossa presa – cada caçada, cada abate nos tornou mais fortes.\n\nNosso passado violento não é um fardo, mas o âmago do nosso ser. Refinados pelas lentes da ciência moderna, não precisamos mais nos alimentar para evoluir; basta um mero resquício de material genético para mesclar sua força à nossa.\n\nA ânsia pela evolução arde em nosso interior, e com o surgimento da tecnologia de [GetStartingDrive], estamos prontos para espreitar pela galáxia e saborear o que ela tem a nos oferecer."
 START_SCREEN_EVOLUTIONARY_PREDATORS_HIVE: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Nossa inteligência compartilhada sempre compreendeu implicitamente o potencial da nossa genética: podemos absorver e adaptar a essência da nossa presa, integrando sua força ao nosso coletivo.\n\nEsse instinto predatório ancestral permanece, mas agora está equilibrado e controlado. Não precisamos mais caçar para evoluir: nossos laboratórios podem sintetizar qualquer material genético e distribuí-lo naturalmente entre toda a colmeia.\n\nCom o advento da tecnologia de [GetStartingDrive], estamos prontos para nos espalhar pela galáxia e saborear o que ela tem a nos oferecer."
 START_SCREEN_EVOLUTIONARY_PREDATORS_DEVOURING_SWARM: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Somente após termos consumido todas as formas de vida em [GetHomeWorldName] percebemos nossa tolice. Como obteríamos novas adaptações agora? Então, voltamos nossos olhares para o alto.\n\nSomos os predadores perfeitos. Outros caçam para sobreviver; nós caçamos para nos aperfeiçoar.\n\nCom o advento da tecnologia de [GetStartingDrive], estamos prontos para caçar outra vez. A galáxia é vasta e repleta de comida."
 #Traits
 trait_malleable_genes: "Genes Maleáveis"
 trait_malleable_genes_desc: "§LEsta espécie não apresenta características e órgãos identificáveis tão predominantemente quanto as outras; em vez disso, eles desenvolvem o melhor apêndice para a situação. Porém, tal instabilidade acarreta algumas desvantagens.§!"
 trait_malleable_genes_cant_modify: "§REspécies com esta Característica não podem ser Modificadas Geneticamente§!\n$automodding_trait_tooltip_all$ §Y$trait_malleable_genes$§! escolhem modificadores da ['concept_automodding_malleable']"
 CANNOT_MODIFY_MALLEABLE_GENES_SPECIES: "$TRIGGER_FAIL$A genética instável desta espécie não permite que ela seja modificada geneticamente."
 concept_malleable_genes: "$trait_malleable_genes$"
 concept_malleable_genes_desc: "$trait_malleable_genes_cant_modify$"
 concept_automodding_malleable: "Lista de Características de Automodificação de Genes Maleáveis"
 concept_automodding_malleable_desc: "- ['trait:trait_malleable_minerals']\n- ['trait:trait_malleable_energy']\n- ['trait:trait_malleable_food']\n- ['trait:trait_malleable_research']\n- ['trait:trait_malleable_unity']\n- ['trait:trait_malleable_forge']\n- ['trait:trait_malleable_trade']\n- ['trait:trait_malleable_ameneties']"
 concept_adaptive_evolution: "Evolução Adaptativa"
 concept_adaptive_evolution_desc: "A situação avança à medida que o DNA de outras formas de vida é consumido.\n§GAo Concluir:§!\n$t$- Escolha uma nova Característica de Espécie baseada na espécie consumida recentemente\n§YAvança ao:§!\n$t$- Colonizar novos planetas\n$t$- Expurgar ou manter outras espécies como gado\n$t$- Manter outras espécies de seu império como escravos ou em condições superiores\n$t$- Empregar líderes alienígenas no seu Conselho\n$t$- Manter vassalos biológicos\n$t$- Formar Pactos Comerciais como uma Megacorporação\n$t$- Encontrar vida alienígena durante eventos"
 concept_genetic_soup: "$genetic_soup$"
 concept_genetic_soup_desc: "$fresh_biosphere_tt$\n\n§L$genetic_soup_desc$§!"
 trait_malleable_minerals: "Garras Maleáveis"
 trait_malleable_minerals_desc: "§LCom dígitos duros como diamante, esta adaptação facilita a extração de minerais.§!"
 trait_malleable_energy: "Isolantes Maleáveis"
 trait_malleable_energy_desc: "§LUma espessa camada isolante protege contra acidentes, especialmente em ambientes de alta energia.§!"
 trait_malleable_food: "Arados Maleáveis"
 trait_malleable_food_desc: "§LUm apêndice extra com dígitos rígidos em forma de pá acelera a aragem e o plantio. Adaptando-se a diversos tipos de terreno, estes arados maleáveis são sempre a ferramenta certa para o trabalho.§!"
 trait_malleable_research: "Córtex Maleável"
 trait_malleable_research_desc: "§LEmbora um córtex cerebral inchado seja ligeiramente desconfortável, ele acelera dramaticamente as faculdades de solução de problemas e inovação.§!"
 trait_malleable_unity: "Órgãos Sensoriais Maleáveis"
 trait_malleable_unity_desc: "§LÓrgãos sensoriais aprimorados facilitam uma maior compreensão e apreciação de diversas perspectivas. Antes de prosperar, primeiro você deve observar.§!"
 trait_malleable_forge: "Calos Maleáveis"
 trait_malleable_forge_desc: "§LAo manusear materiais escaldantes ou corrosivos, calos extragrossos são inestimáveis.§!"
 trait_malleable_trade: "Feromônios Maleáveis"
 trait_malleable_trade_desc: "§LFeromônios altamente adaptativos podem ser bastante persuasivos durante negociações.§!"
 trait_malleable_ameneties: "Harmônica Maleável"
 trait_malleable_ameneties_desc: "§LUma séria de orifícios cuidadosamente calibrados permite que esta espécie produza sons harmoniosos e relaxantes simplesmente ao mover-se.§!"
 #Democratic Effects
 concept_genetic_electorate_effect: "Efeito do Eleitorado Genético"
 concept_genetic_electorate_effect_desc: "$trait_malleable_imperialist_effect$\n$trait_malleable_isolationist_effect$\n$trait_malleable_progressive_effect$\n$trait_malleable_prosperity_effect$\n$trait_malleable_supremacist_effect$\n$trait_malleable_technologist_effect$\n$trait_malleable_totalitarian_effect$\n$trait_malleable_traditionalist_effect$\n$trait_malleable_xenoist_effect$\n$trait_malleable_manifesti_effect$"
 trait_malleable_imperialist_effect: "Efeito de §YFacção Dominante§! (Imperialista):\n$t$$mod_planet_jobs_alloys_produces_mult$: §G+10%§!"
 trait_malleable_isolationist_effect: "Efeito de §YFacção Dominante§! (Isolacionista):\n$t$$mod_planet_jobs_unity_produces_mult$: §G+10%§!"
 trait_malleable_progressive_effect: "Efeito de §YFacção Dominante§! (Progressista):\n$t$£happiness£ Felicidade: §G+10%§!"
 trait_malleable_prosperity_effect: "Efeito de §YFacção Dominante§! (Prosperidade):\n$t$$r_trade$ de £job£ Empregos:§G+20%§!"
 trait_malleable_supremacist_effect: "Efeito de §YFacção Dominante§! (Supremacista):\n$t$$mod_planet_jobs_specialist_produces_mult$: §G+5%§!\n$t$$mod_planet_jobs_ruler_produces_mult$: §G+5%§!"
 trait_malleable_technologist_effect: "Efeito de §YFacção Dominante§! (Tecnologista):\n$t$£research£ Pesquisa de £job£ Empregos: §G+10%§!"
 trait_malleable_totalitarian_effect: "Efeito de §YFacção Dominante§! (Totalitária):\n$t$£pop_cat_worker£ $mod_pop_cat_worker_bonus_workforce_mult$: §G+15%§!"
 trait_malleable_traditionalist_effect: "Efeito de §YFacção Dominante§! (Tradicionalista):\n$t$£pop£ $MOD_POP_HOUSING_USAGE_ADD$: §G-0.5§!"
 trait_malleable_xenoist_effect: "Efeito de §YFacção Dominante§! (Xenoísta):\n$t$Habitabilidade: §G+15%§!"
 trait_malleable_manifesti_effect: "Efeito de §YFacção Dominante§! (Manifesti):\n$t$£pop£ $MOD_POP_AMENITIES_USAGE_BASE$: §G-1§!"
 #Dictatorial Effects
 trait_ruler_apex_predator: "Predador Alfa"
 trait_ruler_apex_predator_desc: "Um povo definido pela Predação Evolutiva permite que apenas o mais adaptado os lidere. Esse governante alfa não só coleta os genomas dos inimigos derrotados, mas também se apropria de sua astúcia e determinação, transformando cada vitória em um passo rumo à maestria absoluta."
 trait_ruler_apex_predator_tt: "Ganha ['concept_apex_predator_effects',Conhecimentos] adicionais de ['concept_apex_predator_victories']."
 concept_apex_predator_effects: "Conhecimentos de Predador Alfa"
 concept_apex_predator_effects_desc: "§YHumanoides§!: $mod_country_trade_produces_mult$ §G+5%§!\n§YMamíferos§!: $MOD_LOGISTIC_GROWTH_MULT$ §G+5%§!\n§YReptilianos§!: $MOD_SHIP_SHIELD_HARDENING_ADD$ §G+5%§!\n§YAvianos§!: $MOD_SHIP_EVASION_ADD$ §G5%§!\n§YArtrópodes§!: $MOD_SHIP_ARMOR_HARDENING_ADD$ §G+5%§!\n§YMoluscoides§!: $MOD_SHIP_SENSOR_RANGE_ADD$ §G+1§!\n§YFungoides§!: $mod_country_food_produces_mult$ §G+5%§!\n§YPlantoides§!: $mod_country_energy_produces_mult$ §G+5%§!\n§YLitoides§!: $mod_country_minerals_produces_mult$ §G+5%§!\n§YNecroides§!: $MOD_PLANET_CRIME_ADD$ §G-10§!\n§YAquáticos§!: $MOD_SHIP_HULL_ADD$ §G+100§!\n§YToxoides§!: $mod_country_exotic_gases_produces_mult$ §G+10%§!\n§YTermófilos§!: $mod_country_alloys_produces_mult$ §G+5%§!\n§YMáquinas§!: $mod_country_alloys_produces_mult$ §G+5%§!"
 concept_apex_predator_victories: "Vitórias de Predador Alfa"
 concept_apex_predator_victories_desc: "O Predador Alfa cresce ao:\n$t$Vencer §Yguerras§!\n$t$§YSubjugar§! outros\n$t$Fazer com que resoluções fracassem na §YComunidade Galáctica§!"
 APEX_PREDATOR_GAINED_TITLE: "Predador Alfa "
 MESSAGE_APEX_PREDATOR_GAINED: "Nosso Predador Alfa $LEADER|Y$ derrotou a espécie §Y[This.GetApexDefeatedSpecies]§! e ganhou ainda mais poder."
 #Hive Effects
 EVOPRED_TERRAFORM_STARTED_TITLE: "Terraformação Iniciada"
 MESSAGE_EVOPRED_TERRAFORM_STARTED: "Iniciamos o processo de terraformação para transformar $PLANET|Y$ em um §YMundo-Colmeia§!."
 decision_evopred_no_hive_world: "Impedir Crescimento do Mundo-Colmeia"
 decision_evopred_no_hive_world_desc: "Alguns mundos não precisam fazer parte de nosso coletivo."
 evopred_no_hive_world_tt: "Impede nossa §YAutoridade§! de transformar este mundo em um §YMundo-Colmeia§!."
 decision_evopred_hive_world: "Permitir Crescimento do Mundo-Colmeia"
 decision_evopred_hive_world_desc: "Este planeta é considerado digno de se tornar parte de nós."
 evopred_hive_world_tt: "Permite que nossa §YAutoridade§! transforme este mundo em um §YMundo-Colmeia§!."
 #Situation
 evolutionary_predators_situation: "Evolução Adaptativa"
 evolutionary_predators_situation_type: "Evolução Adaptativa"
 evolutionary_predators_situation_desc: "['concept_evopred_genetic_insights'] únicos são analisados e disseminados à medida que encontramos novas espécies. Ao fim, nós evoluiremos, adicionando de forma permanente uma nova §YCaracterística de Espécie§! positiva ao nosso código genético."
 evolutionary_predators_situation_monthly_change_tooltip: "O progresso desta §YSituação§! dependerá de quantos ['concept_evopred_genetic_insights'] consumirmos. Ela pode avançar mais depressa de acordo com a nossa §YAbordagem§!."
 evolutionary_predators_situation_outcome: "Ganharemos uma nova Característica de Espécie permanente baseada no material genético que consumimos. [Owner.GetConsumedGenes]"
 evopred_outcome_list: "\nConsumimos:[GetHumanoidGenes][GetMammalianGenes][GetReptilianGenes][GetAvianGenes][GetArthropoidGenes][GetMolluscoidGenes][GetFungoidGenes][GetPlantoidGenes][GetLithoidGenes][GetNecroidGenes][GetAquaticGenes][GetToxoidGenes][GetInfernalGenes]"
 humanoid_genes_list: "\n$t$['concept_humanoid_genes']"
 mammalian_genes_list: "\n$t$['concept_mammalian_genes']"
 reptilian_genes_list: "\n$t$['concept_reptilian_genes']"
 avian_genes_list: "\n$t$['concept_avian_genes']"
