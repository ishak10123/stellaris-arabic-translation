 death_world: "Mundo Mortal"
 death_world_desc: "Embora tecnicamente habitável, este mundo é um verdadeiro pesadelo. Cada forma de vida local, da fauna à flora, até às criaturas mais despretensiosas, são mais mortíferas do que os predadores mais terríveis de nosso planeta natal."
 d_lethal_ecosphere_blocker: "£blocker£ Ecosfera Letal"
 d_lethal_ecosphere_blocker_desc: "Espécimes e experimentos descartados pelo Fragmento da Guerra lutam constantemente pela sobrevivência em uma sangrenta seleção não natural. Esses campos de treinamento incrivelmente hostis são letais para a maiorias dos soldados, mas os sobreviventes sem dúvida emergirão como máquinas de matar implacáveis."
