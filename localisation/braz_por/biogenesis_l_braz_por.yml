 behemoth_incubation_poi_name: "Incubação de Beemote"
 behemoth_incubation_poi_desc: "Um de nossos Beemotes está sendo incubado no gigante gasoso §H[incubation_planet.GetName]§!. Ele deve atingir a idade adulta em §H[incubation_planet.behemoth_incubation_timer]§!."
 incubating_behemoth_modifier: "Beemote em Incubação"
 incubating_behemoth_modifier_desc: "Uma poderosa metamorfose está ocorrendo."
 voidspawn_boss_invincible: "Senhor das Feras Indomável"
 voidspawn_boss_invincible_desc: "Dizem que uma Mortenascida adulta nunca foi abatida. A nossa melhor aposta para detê-la é atacar sua presa."
