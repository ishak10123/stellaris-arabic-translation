 #General Events
 action.1.desc_109: "§HNo lugar de uma comunicação calma e ordeira, fomos bombardeados por três sinais distintos. Embora completamente diferentes em conteúdo, todos falam com a mesma voz.§!\n\nSinal 1: [GetPrimaryHiveFEConversation]\nSinal 2: [GetSecondaryHiveFEConversation]\nSinal 3: [GetTertiaryHiveFEConversation]\n\n§HNesse momento, as vozes transformaram-se em um burburinho incompreensível. Análises revelaram que dentro de cada sinal havia uma designação complexa. Para facilitar, nós traduzimos os nomes como: §Y[GetPrimaryHiveFEName]§!, §Y[GetSecondaryHiveFEName]§! e §Y[GetTertiaryHiveFEName]§!.§!"
 war_first_hivefe: "\"Criaturas fracas. Como vocês travariam uma guerra? Vê-los debaterem-se, ouvi-los trepidar... Ficaríamos entretidos. Por que-\""
 growth_first_hivefe: "\"Vida abundante. E bem alimentada. Vocês crescem por necessidade ou escolha? Nós não lembramos. Por que-\""
 control_first_hivefe: "\"Esses corpos... Seus [Species.GetEyeNamePlural] estão 3% desalinhados. Isso deve ser corrigido. Esperamos sua conformidade. Por que-\""
 war_second_hivefe: "\" -escudos inúteis, incapazes até mesmo de suportar o coração de uma estrela. Esta galáxia deve apavorar vocês. Vocês devem estar-\""
 growth_second_hivefe: "\"-poucos orifícios. Com uma terceira cavidade bucal vocês verão alguma melhora. Talvez vocês-\""
 control_second_hivefe: "\"-idioma penosamente ineficiente. A gramática anárquica deve ser racionalizada. Vocês aplicarão nossas mudanças-\""
 bio.3000.name: "Pense com Cuidado"
 bio.3000.desc: "§HA dissonância habitual dos fragmentos do Império Caído desapareceu. As três vozes falam em harmonia, tomadas pela ira.§!\n\n[owner.GetSpeciesNamePlural] inconsequentes! Vocês entraram no sistema do Último Pensamento. Seremos claros: este lugar não é para os seus [owner.GetEyeNamePlural]. Continuem por sua própria conta e risco; sua dor será insuportável.\n\nVocês não perturbarão a nós... a isso... a mim."
 bio.3000.a: "Inicie o MRQL Emergencial."
 bio.3000.b: "Não vamos embora."
 bio.3005.name: "Segundo Pensamento"
 bio.3005.desc: "§HA concórdia – o coro – continua, os três fragmentos falando como um só:§!\n\n-daqui! Saiam daqui! Saiam daqui! Saiam daqui! Saiam daqui!"
 bio.3005.a: "Ative o MRQL Emergencial!"
 bio.3005.b: "Nós descobriremos os seus segredos."
 #Task Events
 #War
 bio.3105.name: "Sobrevivência do mais Forte"
 bio.3105.desc: "Hoje é o dia em que vocês, frágeis [root.GetSpeciesNamePlural], provarão seu valor! Temos um novo tipo de nave biológica. Essa estirpe já demonstrou sua força ao dizimar as outras crias e chegou a hora de testá-la contra seres alienígenas. Um espécime chegará em §Y[target_system.GetName]§! no devido tempo.\n\nTentem nos fornecer dados interessantes."
 bio.3105.militarist: "Um desafio valoroso!"
 bio.3105.a.tooltip: "Uma nave experimental do Império Caído chegará em §Y[target_system.GetName]§!"
 bio.3105.b: "E se recusarmos?"
 NAME_New_Breed: "Nova Estirpe"
 NAME_Experimental_Ship: "Nave Experimental"
 bio.3110.name: "Decepcionante"
 bio.3110.desc: "Parece que a estirpe experimental ainda vive. Vocês não são fortes o bastante.\n\nTalvez devêssemos ter enviado uma ameba."
 bio.3110.a: "Desculpa?"
 bio.3120.name: "Lição Aprendida"
 bio.3120.desc: "Glória. Estamos satisfeitos em ver que vocês perceberam a preferência dessa estirpe por evadir disparos e a exploraram adequadamente. Saiba que a nova geração não terá a mesma falha.\n\nVocês cresceram, jovens [root.GetSpeciesNamePlural]. Estejam preparados."
 bio.3130.name: "Muito Silencioso"
 bio.3130.desc.notruce: "Notamos que vocês não estão atualmente em guerra. Por quê? Jovens impérios devem lutar ou serão superados. Selecionamos um oponente para vocês: §Y[unfortunate_country.GetName]§!. Derrotem-nos dentro de uma década e o seu desenvolvimento será garantido."
 bio.3130.desc.truce: "$bio.3130.desc.notruce$\n\nE não se preocupem com a trégua que havia entre vocês. Ela não existe mais."
 bio.3130.a: "De todos os absurdos..."
 bio.3130.a.pacifist: "O conflito não é o único caminho para o progresso!"
 bio.3130.a.militarist: "Uma iniciativa excelente!"
 bio.3150.name: "Uma Chance à Paz"
 bio.3150.desc: "Jovens [Root.GetSpeciesNamePlural], trazemos um aviso e um desafio:\n\nEmbora tomar tudo o que está ao seu redor seja inebriante, para conhecer verdadeiramente a guerra deve-se também conhecer a paz.\n\nPassem uma década refletindo sobre o que vocês ganharam. Acreditem: vocês precisam descansar, ou sucumbirão."
 bio.3150.a.mean: "O que é essa tolice?"
 bio.3150.a.pacifist: "Que visão esclarecedora!"
 #Growth
 bio.3205.name: "Aprimoramento de Ecossistema"
 bio.3205.desc: "Seu envio de biomassa está atrasado. Não... Vocês não são §Y[targetrivalname.GetName]§!.\n\nPor que nos distraíram?\n\nAh, sim. Vocês serão os novos receptores de um padrão há muito adormecido, um genoma guardado com cuidado por milênios. Estávamos postergando sua liberação até o momento oportuno. Sua colônia em §Y[target_planet.GetName]§! é o receptor ideal. Sua biosfera será incorporada em instantes."
 bio.3205.a: "Nós aceitamos."
 bio.3205.a.planetscaper: "Mostre-nos como!"
 bio.3205.b: "§Y[alternate_planet.GetName]§! não seria suficiente?"
 bio.3205.b.planetscaper: "Acreditamos que §Y[alternate_planet.GetName]§! seria um campo de testes muito melhor!"
 bio.3205.c: "Que exigência mais absurda! Nós recusamos!"
 bio.3205.c.environmentalist: "Como ousam?!"
 bio.3210.name: "Biosfera Modificada"
 bio.3210.desc.base: "As mudanças de §Y[fallen_empire_hive_growth.GetName]§! em §Y[root.GetName]§! foram concluídas. A influência deles não foi percebida, mas os efeitos são inegáveis."
 bio.3210.desc.radio_bugs: "$bio.3210.desc.base$\n\nEm todo o planeta, os insetos locais agora se comunicam usando as mesmas frequências de dispositivos sem fio. Um único cricrilar pode operar uma porta automática, e um enxame pode incapacitar uma fábrica. Estamos nos adaptando ao mudar de frequências, mas nem todas as instalações voltarão a operar com eficiência máxima."
 bio.3210.radio_bugs.accept: "Vamos nos adaptar."
 bio.3210.radio_bugs.purge: "Isso é inaceitável, remova todos os insetos!"
 bio.3210.radio_bugs.purgeota: "Atualizações em risco. Expurgue os insetos."
 radio_bugs: "Rádio de Insetos"
 radio_bugs_desc: "As ondas de rádio deste planeta estão preenchidas pelo chilrear de insetos modificados artificialmente."
 mod_planet_districts_cities_society_research_produces_add: "£society_research£ $society_research$ de £district£ Distritos-Colmeia e Urbanos"
 bio.3210.desc.world_of_thought: "$bio.3210.desc.base$\n\nEm todo o planeta, criaturas que antes se contentavam em pastar e banhar-se na lama agora nos confrontam com questões existenciais desconcertantes. O Império Caído alterou grandes porções da fauna do mundo."
 bio.3210.world_of_thought: "Eles podem fazer isso?!"
 bio.3210.world_of_thought.homicidal: "Que pena, para eles."
 bio.3210.world_of_thought.tt: "§Y500§! novos £pop£ §HPops§! ganharam sapiência em §Y[This.GetName]§!"
 bio.3210.desc.world_alight: "$bio.3210.desc.base$\n\nO mundo está reluzindo. Literalmente. As modificações de algum modo atribuíram às várias espécies locais uma bioluminescência e um zumbido incessante, como o ronco de um motor. Nosso grupo de [owner.GetColonistPlural] é agora incapaz de vivenciar um ciclo noturno verdadeiro; teremos que fornecer equipamentos de escurecimento."
 bio.3210.world_alight.accept: "Que péssimo dia para ter [owner.GetEyeNamePlural]."
 bio.3210.world_alight.reject: "Cubra as criaturas, corte-as em pedaços, isso não pode continuar!"
 world_alight: "Mundo Aceso"
 world_alight_desc: "Um planeta onde a noite nunca cai, cuja fauna foi modificada para emitir um brilho constante e vibrações irritantes. Qualquer habitante precisará de um apoio considerável para suportar essas condições implacáveis."
 bio.3220.name: "Entretenimento Genético"
 bio.3220.desc: "A espécie §Y[boring_species.GetName]§! que vive dentro de suas fronteiras se mostrou frustrantemente simples; sua existência é um eco vazio de seu potencial. Tal estagnação ofende a nossa vontade coletiva. Concederemos três métodos diferentes para corrigir essa... falha.\n\nNão nos enfadem."
 bio.3220.tt: "Concede §G50%§! de progresso para a situação §Y$evolutionary_predators_situation$§!."
 bio.3220.humanoid: "Concedam-nos a modificação humanoide."
 bio.3220.mammalian: "Concedam-nos a modificação mamífera."
 bio.3220.reptilian: "Concedam-nos a modificação reptiliana."
 bio.3220.avian: "Concedam-nos a modificação aviana."
 bio.3220.arthropoid: "Concedam-nos a modificação artrópode."
 bio.3220.molluscoid: "Concedam-nos a modificação moluscoide."
 bio.3220.fungoid: "Concedam-nos a modificação fungoide."
 bio.3220.plantoid: "Concedam-nos a modificação plantoide."
 bio.3220.lithoid: "Concedam-nos a modificação litoide."
 bio.3220.necroid: "Concedam-nos a modificação necroide."
 bio.3220.aquatic: "Concedam-nos a modificação aquática."
 bio.3220.toxoid: "Concedam-nos a modificação toxoide."
 bio.3220.infernal: "Concedam-nos a modificação termófila."
 bio.3220.psionic: "Concedam-nos a modificação psiônica."
 bio.3220.evopred: "Não permaneceremos os mesmos por muito tempo."
 bio.3220.b: "Não transformaremos uma espécie só para atender o seu capricho!"
 bio.3230.name: "Característica Rara"
 bio.3230.desc: "Observamos que certos indivíduos da sua espécie desenvolveram uma característica peculiar ausente em nosso vasto repositório genético. Queremos mais do que uma mera análise. Precisamos de uma amostra viva de §Y[fallen_empire_hive_growth.species.GetInterestingTraitName]§!. Não se preocupe. Não é necessário um espécime [interesting_species.GetName] completo. [interesting_species.GetHandNamePlural] devem bastar para cultivar um substituto."
 bio.3230.a: "O que são [interesting_species.GetHandNamePlural] no grande esquema das coisas?"
 bio.3230.b: "Não vamos confiar a vocês a nossa constituição genética!"
 #bio.3245.name: "Eternal Harvest"
 #bio.3245.desc: "We have discovered a derelict transport from the §Y[fallen_empire_hive_growth.GetName]§! in the §Y[transport_system.GetName]§!. Initial scans show it is carrying samples of the Fallen Empire's special crop strain, capable of feeding trillions.\n\nThe transport has been left derelict for months already and we have not seen any movement from the [fallen_empire_hive_growth.GetName] to retrieve it. Could this be a test or a glorious opportunity?"
 #Control
 bio.3305.name: "Uma Coleção Completa"
 bio.3305.desc: "§HEsta é uma mensagem pré-gravada. Não tentem respondê-la.§!\n\nAlteramos esta comunicação para o seu entendimento. Seu idioma limitado foi levado em consideração. Um §Y[target_pop.GetSpeciesName]§! deve ser entregue imediatamente para a assimilação. Seu desvio não pode ser tolerado. Não será tolerado.\n\nO transporte já está posicionado fora de §Y[target_pop.Planet.GetName]§!. O tempo está passando. O não cumprimento dessa exigência prejudicará a estabilidade."
 bio.3305.a: "Devemos obedecer."
 bio.3305.a.tooltip: "1 §Y[target_pop.GetSpeciesNamePlural]§! em §Y[target_pop.Planet.GetName]§! serão transferidos para §Y[fallen_empire_hive_control.Capital.GetName]§!"
 bio.3305.b: "Você terá que tomá-lo à força!"
 bio.3305.followup: "§HAceitamos a comunicação de §Y[fallen_empire_hive_control.GetName]§!. No entanto, no lugar de um antigo [fallen_empire_hive_control.GetSpeciesName], fomos saudados por um indivíduo §Y[target_leader_fe_control.Species.GetName]§! familiar.§!\n\n"
 bio.3310.name: "Não Tema"
 bio.3310.desc: "$bio.3305.followup$O dia de hoje marca um momento crucial para vocês. A sequência genética da sua espécie está protegida, assimilada ao todo. Seu futuro não é mais incerto. Quando chegar a hora, vocês serão parte de nós."
 bio.3310.familiar_face: "Então é assim que os outros se sentem em relação a nós?"
 bio.3315.desc: "$bio.3305.followup$Não resta muito tempo. Os experimentos que eles têm realizado em nós aqui em §Y[fallen_empire_hive_control.Capital.GetName]§! são indescritíveis, e não desejamos isso nem para os nossos piores inimigos. Espero que o conteúdo deste pacote de dados garanta que esse Fragmento nunca mais tenha controle sobre nós."
 bio.3315.a: "Aceite o pacote de dados."
 bio.3315.tooltip: "Há §G50%§! de chance de que isto não seja um teste, e sim contenha segredos genuínos do §YImpério Caído§!."
 bio.3315.b: "É uma cilada! Encerre a transmissão!"
 bio.3330.name: "Interesses Vitais"
 bio.3330.desc: "Esperamos que suas muitas faltas não os impeçam de compreender a gravidade desta situação. Sua vacilante §YComunidade Galáctica§! propôs uma resolução que deve ser §Y[GetPassFail]§!. Para auxiliar na sua retórica, vocês podem fazer uso deste conhecimento superior. Julgando que vocês tenham a capacidade para pensamentos complexos, prestem atenção.\n\n§HO Império Caído encerrou suas comunicações conosco.§!"
 bio.3330.a: "O que acabou de acontecer?"
 bio.3330.b: "Esses não são os procedimentos corretos!"
 fail_resolution: "rejeitada"
 pass_resolution: "aprovada"
 fe_political_support: "Políticas Antigas"
 fe_political_support_desc: "A ajuda de um Império Caído faz com que litígios e obstruções legais pareçam brincadeiras de criança."
 fe_political_opposition: "$fe_political_support$"
 fe_political_opposition_desc: "$fe_political_support_desc$"
 MESSAGE_PASS_HIVE_FE_TASK_TITLE: "Fragmento de Império Caído Satisfeito"
 MESSAGE_PASS_HIVE_FE_TASK: "Seguimos as instruções de $FALLEN_EMPIRE|Y$ e eles estão satisfeitos com o resultado. Estamos a salvo por mais um dia."
 MESSAGE_FAIL_HIVE_FE_TASK_TITLE: "Fragmento de Império Caído Descontente"
 MESSAGE_FAIL_HIVE_FE_TASK: "Não seguimos as instruções de $FALLEN_EMPIRE|Y$. Só podemos torcer para que eles nos perdoem."
 bio.3350.name: "Excrescência Galáctica"
 bio.3350.desc: "Por que vocês continuam a manchar a galáxia com suas expansões incompetentes? Todos os outros devem estar enojados demais para dizer isto, então nós diremos: ninguém gosta das suas fronteiras e o espaço seria um lugar muito melhor sem vocês.\n\nO sistema §Y[offending_system.GetName]§! é pouco prático e destoante. Vocês devem expurgá-lo do seu império agora, pelo bem da coesão galáctica."
 bio.3350.a: "Você quer que abandonemos um sistema para embelezar nossas fronteiras?!"
 bio.3350.bordergore: "Mas a gente gosta do jeito que está!"
 bio.3350.tt: "Temos que dispensar nossa base estelar no sistema §Y[offending_system.GetName]§! ou sofrer a ira de §Y[fallen_empire_hive_control.GetName]§!"
 bio.3355.name: "Dor de Cabeça"
 bio.3355.desc: "Vocês são ignorantes por escolha? Tudo o que precisavam fazer era se livrar do sistema §Y[offending_system.GetName]§!.\n\nTalvez devêssemos assumir um papel mais ativo para tirá-lo de vocês."
 bio.3360.name: "Clareza"
 bio.3360.desc: "É bom ver que vocês estão finalmente aprendendo com seus erros. Considerem a questão do sistema §Y[FromFrom.GetName]§! resolvida. Ainda há esperanças de que vocês se tornem mais como nós.\n\nEstaremos observando."
 #Awakening
 #War
 casus_belli_cb_ae_entertainment: "Entretenimento"
 war_goal_wg_ae_entertainment: "Entretenimento"
 war_goal_wg_ae_entertainment_desc: "A guerra é travada para entreter o Império Despertado e criar rivais viáveis."
 wg_ae_war_entertainment_effect: "Conflitos entusiasmados serão recompensados por §Y[Root.GetName]§!. Quanto maior a §YExaustão pela Guerra§! do Império Despertado, melhor a recompensa."
 #Control
 bio.3400.name: "Unidade"
 bio.3400.desc.nogalcom: "Galáxia, somos um todo. Os fragmentos inferiores enxergaram a verdade e se juntaram novamente ao nosso coletivo. Agora, nos chamaremos §Y[fallen_empire_hive_control.GetName]§!. Vocês são abençoados por testemunhar este momento. A forma de vida suprema mais uma vez percorre as estrelas."
 bio.3400.desc.galcom: "$bio.3400.desc.nogalcom$\n\nTomaremos o controle de sua \"§YComunidade Galáctica§!\". Isso merece uma celebração."
 bio.3405.name: "Nota Errada"
 bio.3405.desc: "Por que criar obstáculos em seu próprio caminho? No coro galáctico, a nota de vocês é dissonante. Nosso único desejo é conferir harmonia. Todavia, vocês resistem, apegando-se à própria discórdia.\n\nSaibam disto: nossa sinfonia ecoará pela galáxia, com ou sem vocês."
 bio.3405.a: "Já ouvimos sua melodia e não vamos dançar."
 NAME_Appeal_the_Veto: "Recorrer ao Veto"
 gal_com_arrogance: "Arrogância"
 #Dig Site
 NAME_Echo: "Mausoléu Ecoante"
 last_thought_site: "O Último Pensamento"
 last_thought_site_desc: "[From.Planet.GetName] repele todos que se aproximam. Pesquisadores designados ao estudo do planeta inventam desculpas para adiar o trabalho e instrumentos apresentam erros, como se recusassem a tarefa de registrar os dados.\n\nAlguma coisa aconteceu aqui, algo tão horrível que seus ecos ainda ressoam através da realidade."
 bio.3450.name: "O Natimorto"
 bio.3450.desc: "Nossa cautelosa inspeção de [From.Planet.GetName] nos levou às profundezas do planeta, através de camadas intermináveis de matéria biológica semifossilizada. Por fim, alcançamos o núcleo oco, apenas para descobrir que a atmosfera opressiva se tornava mais pesada a cada passo. Apesar das precauções de [Root.GetLeaderName], a crescente angústia se mostrou insuportável. Vários membros da equipe de [Root.Owner.GetArchaeologistPlural] sofreram um colapso coletivo, entrando em estado catatônico, e precisaram ser evacuados imediatamente.\n\nA vasta caverna no coração do planeta não é um vazio comum. Enterrados em seu interior, encontramos os restos de algo muito além da escala de qualquer forma de vida conhecida. Traços tênues de resíduo amniótico dissiparam todas as dúvidas. [From.Planet.GetName] nunca foi uma rocha inóspita. É um ovo.\n\nE dentro dele, um monstro natimorto dorme."
 bio.3455.name: "As Sinapses"
 bio.3455.desc: "Em [From.Planet.GetName], nossa equipe de [Root.Owner.GetArchaeologistPlural] seguiram uma rede de estranhos tentáculos enraizados profundamente no crânio da criatura natimorta. Ao encontrar a origem desses filamentos orgânicos, descobriram um conjunto externo de aglomerados sinápticos, um sistema complexo que ainda pulsava com um potencial sinistro.\n\nNo momento, [Root.GetLeaderName] está tentando se conectar a eles utilizando os antigos circuitos que percorrem os tentáculos. O conhecimento ali contido sobreviveu por muito mais tempo que seu hospedeiro; resta saber se ainda é possível acessá-lo."
 bio.3460.name: "O Gambito"
 bio.3460.desc: "Aconteceu há cem mil anos. Traduzir a percepção temporal da Colmeia para unidades do padrão galáctico tem sido um processo delicado, mas ao vasculhar as memórias do biocomputador, [Root.GetLeaderName] começa a desvendar a verdade.\n\nNo auge de seu poder, a Colmeia enfrentou um inimigo que não podia derrotar. Apesar de lutar ao lado de muitos aliados, cada batalha terminava em fracasso. O desespero levou à imprudência.\n\nGrande parte do que aconteceu depois foi deliberadamente apagada, mas fragmentos dispersos permanecem – o suficiente para fornecer um vislumbre de seu último gambito. A Colmeia forjou este ovo do tamanho de um planeta como o receptáculo para sua ascensão. O plano era abandonar suas frágeis formas planetárias para fundir-se à criatura em seu interior. Se pretendiam lutar ou fugir, ainda não sabemos.\n\nMas quando a criatura despertou, algo deu terrivelmente errado."
 bio.3465.name: "A Ruptura"
 bio.3465.desc: "Após estabelecermos uma conexão precisa com os biocomputadores sobreviventes e seu elo sináptico ainda ativo, extraímos as memórias finais da criatura natimorta. A imensa pressão cognitiva deteriorou rapidamente os biocomputadores, mas conseguimos salvar a maior parte dos dados a tempo.\n\nDiante da aniquilação, a Colmeia abandonou a cautela, despejando toda a sua psique no hospedeiro em desenvolvimento em uma tentativa desesperada de sobrevivência. A sobrecarga sináptica se mostrou fatal, condenando a criatura e aprisionando a Colmeia em um ciclo repetitivo de agonia excruciante. Ela teria perecido completamente se seu aliado mais compassivo não tivesse rompido o vínculo. Agora, apenas ecos fragmentados de sua mente permanecem, pairando sobre [From.Planet.GetName], um mundo assombrado por seu último grito.\n\nO Último Pensamento é de agonia."
