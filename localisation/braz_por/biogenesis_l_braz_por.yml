 ### NEW CIVICS ###
 civic_genetic_identification: "Identificação Genética"
 civic_genetic_identification_desc: "Esta sociedade exige que seus cidadãos sejam registrados desde o nascimento em um Índice Genético usado em todos os processos burocráticos."
 civic_corporate_genetic_identification: "Garantias Sequenciadas"
 civic_corporate_genetic_identification_desc: "A sequência genética de cada cliente e funcionário é registrada em uma base de dados aberta a todos, por uma modesta quantia. Agências de segurança dependem desse serviço para identificar atores maliciosos a partir dos menores resíduos."
 civic_corporate_genetic_identification_effects: "A £building£ §Y$building_private_security$§! $megacorp_civic_branch_office_building_effect$"
 councilor_genetic_identification: "Indexador"
 councilor_genetic_identification_desc: "O $TITLE$ é responsável por preservar e proteger o Índice Genético, garantindo processos burocráticos simples e eficientes."
 councilor_corporate_genetic_identification: "Corretor de Sequências"
 councilor_corporate_genetic_identification_desc: "Encarregado da avaliação de pedidos de acesso e planos de monetização, o $TITLE$ pode recuperar a identificação genética de qualquer indivíduo."
 civic_crowdsourcing: "Esforços Colaborativos"
 civic_crowdsourcing_desc: "Esta sociedade percebeu que a inspiração individual é o berço da verdadeira inovação. Patentes de código aberto, mentalidade liberal, colaborações espontâneas e recompensas por inovação pavimentam o caminho para o progresso."
 civic_crowdsourcing_effects: "$t$- Facções produzem $r_research$ em vez de $r_unity$ $TABBED_NEW_LINE$- Facções surgirão no seu império logo após o jogo começar, mas a produção da facção é reduzida durante os primeiros dez anos"
 civic_corporate_crowdsourcing: "P&D Descentralizada"
 civic_corporate_crowdsourcing_desc: "Competições de inovação regulares entre departamentos estimulam as iniciativas de Pesquisa e Desenvolvimento desta corporação."
 civic_corporate_crowdsourcing_effects: "$civic_crowdsourcing_effects$ $TABBED_NEW_LINE$- As £building£ §Y$building_private_research_initiative$§! $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_crowdsourcing: "NÃO tem um Componente Cívico de ['concept_crowdsourcing_civics']"
 concept_crowdsourcing_civics: "Esforços Colaborativos"
 concept_crowdsourcing_civics_desc: "Componentes Cívicos de $concept_crowdsourcing_civics$ consistem em: $NEW_LINE$- ['civic:civic_crowdsourcing']$NEW_LINE$- ['civic:civic_corporate_crowdsourcing']"
 councilor_crowdsourcing: "Coordenador de Inovações"
 councilor_crowdsourcing_desc: "O $TITLE$ é encarregado de supervisionar o uso justo de patentes e criar incentivos de pesquisa alinhados com o foco tecnológico do governo."
 councilor_corporate_crowdsourcing: "Árbitro de Ideias"
 councilor_corporate_crowdsourcing_desc: "Nem todos os projetos merecem investimento, e é dever do $TITLE$ avaliar sua comercialização e rentabilidade."
 civic_civil_education: "Educação Civil"
 civic_civil_education_desc: "Neste império, a educação suplantou a aplicação da lei. Por meio da preparação abrangente e de correções rígidas, nenhum indivíduo está além do aprendizado. Afinal de contas, não existem maus cidadãos – apenas maus educadores."
 civic_civil_education_effects: "$t$- Substitui todos os £job_enforcer£ ['concept_enforcer'] por £job_educator£ ['concept_educator'] $TABBED_NEW_LINE$- Substitui £building£ ['building:building_precinct_house'] por £building£ ['building:building_state_academy']"
 councilor_head_of_education: "Chefe de Educação"
 councilor_head_of_education_desc: "O $TITLE$ é encarregado de equipar cada cidadão com o conhecimento necessário não apenas para a execução de sua profissão, como também para navegar pelas complexidades da vida. Uma boa pedagogia promove uma sociedade próspera."
 educator: "$job_educator$"
 job_educator: "Educador"
 job_educator_plural: "Educadores"
 job_educator_desc: "Dedicados à preparação dos jovens, estes incansáveis campeões do conhecimento realizam o serviço essencial de garantir que cada cidadão esteja pronto para enfrentar a galáxia."
 job_educator_effect_desc: "£job_educator£ $job_educator_plural$ usam $r_consumer_goods$ para produzir $r_unity$, reduzir o £crime£ §Y$PLANET_CRIME_TITLE$§!, aumentar a §YAtração da Ética Governante§! e gerar £defense_army£ §YExércitos de Defesa§!."
 mod_job_educator_add: "Empregos de $job_educator$"
 building_state_academy: "Academia Estatal"
 building_state_academy_desc: "Aqui, são ensinados os fundamentos julgados necessários para uma sociedade sadia."
 concept_state_academy: "$building_state_academy$"
 concept_state_academy_desc: "Empregos de $job_educator$: §G+200§!\n\n$job_educator_effect_desc$\n$h_line$§L$building_state_academy_desc$§!"
 building_center_of_guidance: "Centro de Orientação"
 building_center_of_guidance_desc: "Cobre todos os aspectos da vida em sociedade. Dentro deste complexo gigantesco de escolas e instalações de treinamento, qualquer desvio pode ser corrigido."
 mod_planet_jobs_citizen_produces_mult: "Produção de Recursos do Pop com Cidadania Plena"
 civic_hive_familiar_face: "Rosto Familiar"
 civic_hive_familiar_face_desc: "A cooperação é preferível ao confronto direto. Esta Mente-Colmeia evoluiu drones diplomáticos capazes de assumir a forma e os maneirismos de seus interlocutores."
 civic_wilderness_familiar_face: "$civic_hive_familiar_face$"
 civic_wilderness_familiar_face_desc: "A cooperação é preferível ao confronto direto. Esta Silvestria evoluiu avatares diplomáticos capazes de assumir a forma e os maneirismos de seus interlocutores."
 civic_hive_familiar_face_effects: "Emissários e Oficiais assumem a forma física dos indivíduos dos impérios aos quais estão designados.\n§YConfiança§! necessária para realizar §YAções Diplomáticas§!: §G-50%§!"
 #Bioship Civics
 civic_hive_shared_genetics: "Genética Compartilhada"
 civic_hive_shared_genetics_desc: "O genoma mutante desta colmeia foi usado como base para a criação de suas naves biológicas. Suas frotas são intrinsecamente ligadas aos seus drones, encontrando forças na unicidade da espécie."
 civic_wilderness_shared_genetics: "$civic_hive_shared_genetics$"
 civic_wilderness_shared_genetics_desc: "Um genoma presente nesta Silvestria sofreu mutações, tornando-se a base ideal para o cultivo de naves biológicas. Suas frotas estão intrinsecamente ligadas a outros simbiontes, com cada espécie extraindo força da outra."
 civic_hive_shared_genetics_effects: "- Para cada Característica de Espécie Principal §GPositiva§!: §G+2.5%§! de Casco da Nave, §R+0.5%§! de Manutenção.\n- Para cada Característica de Espécie Principal §RNegativa§!: §G+1.5%§! de Taxa de Disparos da Nave, §R+0.5%§! de Manutenção."
 shared_genetics_fire_rate: "$civic_hive_shared_genetics$: Taxa de Disparos"
 shared_genetics_fire_rate_desc: "Nossas naves se beneficiam de centros de agressão superestimulados, alimentados por uma mistura saudável de hormônios e ódio."
 shared_genetics_hull: "$civic_hive_shared_genetics$: Casco"
 shared_genetics_hull_desc: "A massa de músculos e ossos de nossas naves é favorecida pela superioridade genética de nossa espécie."
 civic_hive_aerospace_adaptation: "Adaptação Aerospacial"
 civic_hive_aerospace_adaptation_desc: "As naves biológicas do coletivo são especialmente aptas para voos interatmosféricos, permitindo que realizem missões de apoio aéreo aproximado ou até mesmo auxiliem na logística planetária."
 civic_hive_aerospace_adaptation_effects: "- §YNaves Biológicas§! na órbita de colônias §GAmigáveis§! têm §G-50%§! de Manutenção da Nave.\n- Colônias §GAmigáveis§! com §YNaves Biológicas§! em órbita recebem um aumento de §YVelocidade de Construção§!, §YConfortos§!, §YVelocidade Remoção de Bloqueador§! e, potencialmente, §YProdução de Empregos§!, dependendo do tamanho da frota.\n- §YNaves Biológicas§! na órbita de colônias §RHostis§! têm §G-85%§! de Manutenção da Nave."
 aa_ship_upkeep_friendly: "$civic_hive_aerospace_adaptation$"
 aa_ship_upkeep_bombing: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1_desc: "As naves biológicas que orbitam este planeta entram e saem rotineiramente da atmosfera para descansar, se alimentar e auxiliar drones na superfície."
 aa_ship_planet_support_2: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_2_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_3: "$civic_hive_aerospace_adaptation$"
