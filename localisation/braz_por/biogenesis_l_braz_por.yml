 aa_ship_planet_support_4_desc: "$aa_ship_planet_support_1_desc:$"
 civic_machine_stalwart_network: "Rede Robusta"
 civic_machine_stalwart_network_desc: "Esta Inteligência Maquinária se especializa em procedimentos militares de defesa, combinando capacidades defensivas inabaláveis com protocolos de ataque e retirada."
 defensive_stations_tracking_add: "$t$- Rastreamento de Bases Estelares e Estações Defensivas"
 defensive_stations_tracking_add_tt: "$defensive_stations_tracking_add$: $VARIABLE|0=+$"
 defensive_stations_weapon_range_mult: "Alcance de Arma de Bases Estelares e Estações Defensivas"
 defensive_stations_weapon_range_mult_tt: "$defensive_stations_weapon_range_mult$: $VARIABLE|1%=+$"
 #Bodysnatcher
 civic_hive_bodysnatcher: "Invasora de Corpos"
 civic_hive_bodysnatcher_desc: "O que importa é o interior. Esta colmeia se especializa na infiltração, assumindo o controle dos corpos de seres orgânicos. Conforme o número de marionetes cresce, a civilização hospedeira é inevitavelmente absorvida pelo coletivo."
 civic_hive_bodysnatcher_effects: "Inicie o jogo com §Y1.000§! £pop£ Pops assimilados e a capacidade de §YAssimilar§! orgânicos à Mente-Colmeia.\nTem acesso à missão de espionagem ['concept_operation_bodysnatcher_prepare_invasion'].\nGanha £pop£ Pops adicionais da missão de espionagem ['concept_operation_smuggle_pops']."
 civic_hive_bodysnatcher_secondary_species: "Impostores"
 NAME_Bodysnatchers: "Invasores de Corpos"
 operation_bodysnatcher_prepare_invasion: "Preparar Invasão"
 operation_bodysnatcher_prepare_invasion_desc: "Nossos vizinhos possuem mentes tão maleáveis. Ao enviarmos corpos previamente integrados à nossa consciência, podemos incorporá-los mais facilmente ao nosso grupo."
 operation_bodysnatcher_prepare_invasion_on_success: "$IF_SUCCESSFUL|E$\nContaremos com a ajuda de agentes infiltrados na próxima vez que declararmos guerra contra §Y[Target.GetName]§!."
 operation_invasion_prepared: "$TRIGGER_FAIL$ §RJá preparamos uma invasão contra este país. Declare guerra para iniciar o ataque.§!"
 operation_invasion_impossible: "$TRIGGER_FAIL$ §RO país está muito bem preparado contra tentativas de infiltração. Não podemos lançar esta operação!§!"
 concept_operation_bodysnatcher_prepare_invasion: "$operation_bodysnatcher_prepare_invasion$"
 concept_operation_bodysnatcher_prepare_invasion_desc: "Uma operação onde Pops assimilados da espécie escolhida infiltram-se no império, preparando-se para iniciar uma sabotagem em massa quando a guerra eclodir."
 bio.800.name: "Novo Emprego"
 bio.800.desc: "Nossos corpos infiltrados precisarão ser posicionados em locais estratégicos antes de iniciarmos nosso grande projeto. Nossas operações de inteligência anteriores revelaram bases estelares desguarnecidas e planetas com pouca defesa como alvos ideais. Em breve, começaremos a agir."
 bio.805.name: "Funcionários Adicionais"
 bio.805.desc: "O progresso continua sem problemas. Nossos corpos encontraram mais hospedeiros e nosso envolvimento nos assuntos de [Target.GetName] se solidificou. Nossos drones em breve terão incorporado quaisquer mentes curiosas."
 bio.810.name: "Novas Oportunidades"
 bio.810.desc: "Os [Target.GetSpeciesNamePlural] que não pudemos substituir foram removidos de seus cargos, criando diversos buracos na estrutura de §Y[Target.GetName]§!. Nossas marionetes estão prontas para abrir caminho para a infiltração total e aguardam nossa ordem."
 bio.815.name: "Novos Recrutas"
 bio.815.desc: "A integridade de §Y[From.Target.GetName]§! foi comprometida. A invasão é iminente, e tudo o que resta é decidir quantos impostores enviaremos para expandir nossa infiltração deste império. Em breve, todos serão parte do povo [Owner.GetAdj]."
 bio.815.tt: "Não temos Pops suficientes da espécie em questão para esta ação."
 bio.815.a: "Já enviamos todos que podíamos."
 bio.815.b: "Garanta que os entrepostos deles sejam nossos."
 bio.815.b.tt: "Envia §Y100§! £pop£ §HPops§!.\n$bio.815.reminder$"
 bio.815.c: "Prepare invasões contra os planetas deles."
 bio.815.c.tt: "Envia §Y300§! £pop£ §HPops§!.\n$bio.815.reminder$"
 bio.815.d: "Infiltre-se nas fortalezas deles!"
 bio.815.d.tt: "Envia §Y500§! £pop£ §HPops§!.\n$bio.815.reminder$"
 bio.815.e: "Faça com que todos sejam iguais a nós!"
 bio.815.e.tt: "Envia §Y2 mil§! £pop£ §HPops§!.\n$bio.815.reminder$"
 bio.815.reminder: "A próxima guerra que declararmos contra §Y[From.Target.GetName]§! ou que for declarada contra nós dentro de §G10§! anos usará nossos infiltrados preparados."
 bio.825.name: "Invasão dos [From.GetSpeciesNamePlural]"
 bio.825.desc.small: "Os covardes traiçoeiros de [From.GetName] infiltraram-se em nosso império. Nossas estações espaciais foram comprometidas e já estão invadindo nossas colônias. Precisamos eliminar os impostores!"
 bio.825.desc.large: "Primeiro, pensamos que era uma falha. Metade da nossa rede de comunicações ficou fora do ar.\n\nMas não, os traiçoeiros de [From.GetName] substituíram setores inteiros de funcionários. Nosso império está fragmentado e nossas colônias estão sendo invadidas.\n\nNão confiem em ninguém!"
 #Smuggle pops operation
 operation_smuggle_pops: "Transportar Secretamente a População"
 operation_smuggle_pops_desc: "Nossos agentes conduzirão um esforço em larga escala de extração de elementos isolados dentro de [target.GetName]."
 operation_smuggle_pops_on_success: "$IF_SUCCESSFUL|E$\nRealoca alguns £pops£ Pops para o seu império."
 smuggle_pops_also_fanatic_egalitarians: "$TRIGGER_FAIL$ §RO povo de [Target.GetName] também é composto de Igualitários Fanáticos e já é livre§!"
 smuggle_pops_not_enough_pops: "$TRIGGER_FAIL$ §RNão há £pops£ Pops suficientes em [Target.GetName] que valha a pena roubar§!"
 mod_operation_smuggle_pops_difficulty_add: "Dificuldade da Operação $operation_smuggle_pops$"
 concept_operation_smuggle_pops: "$operation_smuggle_pops$"
 concept_operation_smuggle_pops_desc: "Uma operação para abduzir Pops do alvo."
 bio.900.name: "Aquisição de Talento"
 bio.900.desc: "Nossos agentes estabeleceram algumas fachadas e esconderijos de onde podem monitorar a população de [target.GetName]. Dissidentes e indivíduos solitários ou altamente habilidosos serão avaliados e marcados para a extração."
 bio.905.name: "Chá de Sumiço"
 bio.905.desc: "Nossos agentes começaram a reunir alvos e levá-los secretamente para locais remotos. Quando possível, incidentes são forjados para distrair as autoridades locais e encobrir nossos rastros."
 bio.910.name: "Naves de Transporte"
 bio.910.desc: "A operação entrou em uma fase crítica, na qual todos que reunimos devem ser transferidos discretamente para a órbita. O plano atual é sincronizar as partidas em todas as instalações e sobrecarregar as forças de segurança com truques e distrações."
 bio.915.name: "Transportados"
 bio.915.desc: "Conseguimos transportar muitos de nossos alvos, mas a operação encontrou percalços e muitas naves que transportavam indivíduos promissores foram deixadas para trás."
 bio.915.desc.detected: "$bio.915.desc$\n\nMovimentos populacionais tão vastos assim não passaram despercebidos."
 bio.915.desc.cosmogenesis: "Conseguimos extrair muitos de nossos alvos, e eles já estão sendo encaminhados para o Torno. Contudo, a operação encontrou percalços e muitas naves que transportavam indivíduos promissores foram deixadas para trás."
 bio.915.desc.cosmogenesis.detected: "$bio.915.desc.cosmogenesis$\n\nMovimentos populacionais tão vastos assim não passaram despercebidos."
 bio.915.a: "Fizemos tudo que podíamos."
 bio.915.b: "Foque na libertação de outros [Root.GetSpeciesNamePlural]."
 bio.915.c: "Temos que resgatar mais!"
 bio.915.d: "Não deixe nenhum [GetSpeciesName] para trás."
 bio.915.tt: "Extrai £pop£ §HPops§! desassistidos para os mundos apropriados."
 bio.915.asset.tt: "$bio.915.tt$\nSe nossa presença ainda não havia sido notada por §Y[From.Target.GetName]§!, §Reles certamente perceberam agora§!."
 MESSAGE_POPS_SMUGGLED_TITLE: "População Roubada"
 MESSAGE_POPS_SMUGGLED_DESC: "Os dissimulados de $COUNTRY|Y$ infiltraram-se em nossas fronteiras e abduziram nosso povo!"
 opinion_smuggled_pops: "Roubou nossos Pops!"
 #Disconnected Drones #
 disconnected_drones_name: "$policy_disconnected_drones$"
 policy_disconnected_drones: "Drones Desconectados"
 policy_disconnected_drones_desc: "Podemos decidir se vamos permitir ou não que drones desconectados de sua consciência central vivam em nossas colônias."
 disconnected_drones_sustain: "Manter"
 disconnected_drones_sustain_name: "Manter Drones Desconectados"
 disconnected_drones_sustain_desc: "Embora tenham sido separados de uma consciência coletiva, estes drones podem ser mantidos vivos.\n\n§ELibera §YTipos de Cidadania§! para Drones Desconectados§!"
 disconnected_drones_purge: "Extermínio"
 disconnected_drones_purge_name: "Extermínio de Drones Desconectados"
 disconnected_drones_purge_desc: "Os direitos de um ser sapiente não se estendem a seres sem capacidade de raciocínio. Sem uma consciência central para guiá-los, esses drones são nada mais que animais, e animais incômodos são uma praga.\n\n§ETodos os Drones Desconectados vivendo em nossas colônias serão §Rexpurgados§!.§!"
 disconnected_drones_purged_citizenship: "$TRIGGER_FAIL$Drones Desconectados estão sendo expurgados em nosso império."
 disconnected_drones_kill_themselves_purge_type: "$TRIGGER_FAIL$Separados de sua consciência coletiva, Pops desta espécie morrerão."
 citizenship_protected_drone: "Drones Protegidos"
 citizenship_protected_drone_tooltip: "$living_standard_disconnected_drone_tooltip$"
 citizenship_protected_drone_tooltip_delayed: "§L$job_disconnected_drone_desc$§!"
 citizenship_symbiotic_drone: "Drones Simbióticos"
 citizenship_symbiotic_drone_tooltip: "$living_standard_symbiotic_drone_tooltip$"
 citizenship_symbiotic_drone_tooltip_delayed: "§LSeparados de sua consciência coletiva, estes drones podem auxiliar nossas colônias.§!"
 citizenship_exploited_drone: "Drones Explorados"
 citizenship_exploited_drone_tooltip: "$living_standard_exploited_drone_tooltip$"
