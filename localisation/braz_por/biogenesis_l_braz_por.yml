 bio.1050.name: "À Espreita"
 bio.1050.desc: "Nossos agentes estão espreitando os assentamentos dos [Target.GetSpeciesNamePlural] e logo ganharão acesso às suas estruturas. Tudo em seu tempo. Somos seres pacientes, e uma boa caçada não deve ser apressada."
 bio.1055.name: "Preparados"
 bio.1055.desc: "Estamos vendo nossa presa. Os caçadores que enviamos para se infiltrar na sociedade de [Target.GetName] estão confiantes. Eles logo ganharão acesso ao alojamento dos [Target.GetSpeciesNamePlural], e a todo o precioso DNA no interior."
 bio.1060.name: "Ataque"
 bio.1060.desc: "Nossos agentes estão prontos. Eles ganharam acesso ao alojamento dos [Target.GetSpeciesNamePlural], e já estão disfarçados. Naturalmente, como bons caçadores, eles já asseguraram diversas rotas de fuga, algumas mais agradáveis que outras. Seria lamentável se tivéssemos que usar os esgotos."
 bio.1065.name: "Genes Roubados"
 bio.1065.desc: "Está feito! Nossos agentes escaparam com um verdadeiro tesouro de material genético. Certamente veremos grandes avanços com a próxima mutação. Talvez até possamos adquirir gosto pelos [From.Target.GetSpeciesNamePlural]"
