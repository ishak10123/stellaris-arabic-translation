 bio.1005.name: "Habilidade Retida"
 bio.1005.desc: "Nossa espécie torna-se mais complexa. Após vasculharmos as estrelas em busca de novos materiais genéticos, estamos prontos para abraçar um novo aspecto. Graças ao empenho da nossa equipe de [Owner.GetScientistPlural], temos uma escolha.\n\nQualquer que seja a nossa decisão, ela afetará o futuro dos [Owner.GetSpeciesNamePlural] por muitas gerações."
 bio.1005.tt: "Adiciona uma nova Característica de Espécie à nossa Espécie Primária"
 bio.1005.pop_growth: "Nossa espécie precisa se desenvolver mais depressa!"
 bio.1005.pop_output: "Podemos nos tornar mais produtivos?"
 bio.1005.leader: "Nossos líderes precisam de cada vantagem."
 bio.1005.habitability: "Temos que nos adaptar às mudanças climáticas."
 bio.1005.upkeep: "Reduza a manutenção necessária para sustentar o nosso povo."
 bio.1005.humanoid: "As características humanoides poderiam melhorar nossa versatilidade."
 bio.1005.mammalian: "O DNA mamífero contém mais segredos."
 bio.1005.reptilian: "Reptilianos são bastante únicos."
 bio.1005.avian: "Avianos podem nos conceder uma agilidade inigualável."
 bio.1005.arthropoid: "Artrópodes são deliciosamente crocantes."
 bio.1005.molluscoid: "Até mesmo um moluscoide tem algo a nos ensinar."
 bio.1005.fungoid: "Os fungoides se disseminam rapidamente. Nós também podemos."
 bio.1005.plantoid: "A eficiência energética dos plantoides poderia ser útil."
 bio.1005.lithoid: "Difícil de consumir, o DNA litoide oferece possibilidades deliciosas."
 bio.1005.necroid: "Necrótica ou não, carne é carne."
 bio.1005.aquatic: "Adaptações aquáticas oferecem estratégias de sobrevivência além dos mares."
 bio.1005.toxoid: "Os toxoides são §Gazedos§!."
 bio.1005.infernal: "Os termófilos §Rqueimam§!, mas agora nós aguentamos."
 bio.1005.plasmic: "Estabilizar o DNA plásmico seria uma façanha impressionante."
