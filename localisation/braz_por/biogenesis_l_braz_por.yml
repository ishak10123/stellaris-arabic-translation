 elder_voidspawn_chain_title: "Mortenascida Descontrolada"
 elder_voidspawn_chain_desc: "Uma Mortenascida enorme está devastando a galáxia. Ela quer matar grandes Beemotes, e se os eliminarmos primeiro, ela talvez nos deixe em paz.\n\nOBJETIVO: Encontre e mate todos os Beemote de Nível 4 na galáxia."
 behemoth_victory_chain_title: "Rei dos Monstros"
 behemoth_victory_chain_desc: "Com a Fusão Mental completa, restam apenas mais alguns passos entre nós e nossas ambições. Devemos nos acostumar com este novo corpo compartilhado e continuar a transferência de mentes de nosso povo. Contudo, e ainda mais importante, devemos esmagar qualquer tipo de oposição, independentemente de quem seja.\n\n§HOBJETIVOS§!:\n- Encontre e mate qualquer outro Beemote de Classe 4 na galáxia.\n- Conclua a situação Dores do Crescimento.\n- Mate a Mortenascida Anciã."
 behemoth_transference: "Transferência de Beemote"
 behemoth_transference_desc: "O vínculo que agora existe entre a Fera e nossa população lança uma nova luz sobre a existência planetária, tornando-a banal quando comparada à fusão com a criatura. Todos clamam pela união com a Fera, e o sentimento é... voraz."
