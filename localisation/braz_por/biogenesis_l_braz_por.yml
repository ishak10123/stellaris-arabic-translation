 ### Hive Fallen Empire #
 RT_INCOMPLETE_OVERMIND: "Mente Superior Incompleta"
 gov_war_splinter: "Fragmento da Guerra"
 gov_war_splinter_desc: "Os instintos agressivos e belicosos que costumavam ser um entre muitos impulsos da Colmeia. Agora, ele tenta estabelecer seu controle sobre os outros fragmentos, quando não está brigando internamente."
 gov_growth_splinter: "Fragmento do Crescimento"
 gov_growth_splinter_desc: "O desejo de evolução e mudança da Colmeia Caída. Por estar tão focado em se reinventar constantemente, este fragmento tem dificuldades em controlar os outros."
 gov_control_splinter: "Fragmento do Controle"
 gov_control_splinter_desc: "O instinto obsessivo de oprimir os desvios e promover a uniformidade define este fragmento. Ele deseja controlar os outros fragmentos mais que tudo, mas o caos constante inerente ao nosso universo é uma distração contínua."
 gov_fused_ascendancy: "Ascendência Fundida"
 gov_fused_ascendancy_desc: "Uma vez quebrada, agora restaurada. As cicatrizes da fragmentação não tornam este Império Despertado frágil; elas o renovam. A velha Mente-Colmeia fracassou. Esta deseja governar eternamente."
 civic_fragmented_command: "Comando Fragmentado"
 civic_fragmented_command_desc: "Possuindo parte do que costumava ser um todo, este Império Caído carece de aspectos fundamentais para governar um império estelar."
 civic_hyper_aggressive_drones: "Drones Hiperagressivos"
 civic_hyper_aggressive_drones_desc: "Os drones deste Império Caído lutam constantemente entre si, causando uma escassez grave de recursos."
 civic_unstable_drones: "Drones Instáveis"
 civic_unstable_drones_desc: "Os drones deste Império Caído estão passando continuamente por uma evolução forçada. Eles raramente têm os membros necessários para o trabalho ao qual foram designados."
 civic_stunted_drones: "Drones Restringidos"
 civic_stunted_drones_desc: "Os drones deste Império Caído são gerenciados com tamanha minúcia que eles nunca desviam de sua função, não importa o motivo. Mesmo que a fábrica esteja pegando fogo."
 civic_restored_mind: "Mente Restaurada"
 civic_restored_mind_desc: "Uma consciência antiga, enfim reforjada e movida por instintos modernos."
 civic_ancient_memories_of_war: "Antigas Memórias da Guerra"
 civic_ancient_memories_of_war_desc: "Táticas e formações outrora perdidas ressurgiram no cenário galáctico graças a este Império Despertado. Suas frotas ofuscarão as estrelas."
 civic_ancient_memories_of_growth: "Antigas Memórias do Crescimento"
 civic_ancient_memories_of_growth_desc: "Métodos de ascensão e prosperidade outrora perdidos estão sendo empregados por este Império Despertado. Seus drones serão mais numerosos que as estrelas."
 civic_ancient_memories_of_control: "Antigas Memórias do Controle"
 civic_ancient_memories_of_control_desc: "Autoridades e regulamentos outrora perdidos estão sendo empregados novamente por este Império Despertado. Seu alcance englobará até mesmo as estrelas."
