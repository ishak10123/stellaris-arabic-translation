 #Siege of the Citadel Event Chain
 bio.2005.name: "Flutuações Incomuns"
 bio.2005.desc: "Nossos $job_skywatcher_plural$ relataram um evento alarmante.\n\nFlutuações sutis, porém inconfundíveis, foram detectadas recentemente dentro do portal em §Y[Root.Capital.System.GetName]§!. No passado, perturbações similares prenunciaram frotas de naves biológicas.\n\nSe essas leituras forem verdadeiras, poderemos esperar um ataque em questão de meses. A sobrevivência de nosso povo mais uma vez poderá depender da bravura de nossos defensores."
 abandoned_hatchery_chain_1: "Cerco da Cidadela"
 abandoned_hatchery_chain_1_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_1_desc: "As hordas de [GetInvadersLower] nos atacam há décadas. Nosso $starbase_deep_space_citadel_1$ permanece como principal linha de defesa, mas só estaremos realmente seguros após descobrirmos a verdade sobre nossos inimigos.\n\nA cada descoberta, nos aproximamos do dia em que levaremos a luta até eles – e encerraremos nosso longo cerco de uma vez por todas."
 bio.2015.name: "Restos do Inimigo"
 bio.2015.desc: "Destroços deixados por frotas biológicas aniquiladas pairam ameaçadoramente por §Y[Root.Capital.System.GetName]§!. Mesmo retorcido e carbonizado, muito do material orgânico permanece intacto, oferecendo uma rara oportunidade de estudo.\n\nCom uma análise minuciosa, poderemos descobrir os segredos de sua construção grotesca – e talvez compreender melhor o enigmático portal de onde elas vêm."
 PROJECT_HATCHERY_SHIP_REMAINS: "Estude os Restos de Nave Biológica"
 PROJECT_HATCHERY_SHIP_REMAINS_DESC: "Os restos da frota de [GetInvadersLower] fornecem uma rara oportunidade de estudo. Há muito que podemos aprender para garantir nossa sobrevivência."
 bio.2015.a: "Enfim, algum progresso."
 bio.2020.name: "Inimigo Analisado"
 bio.2020.desc: "Após um estudo meticuloso dos destroços biológicos deixados em §Y[Root.Capital.System.GetName]§!, nossa equipe de [Root.GetScientistPlural] acredita ter descoberto a chave para compreender o portal que paira nos limites do nosso sistema.\n\nNo interior do tecido das criaturas, foi identificado um padrão orgânico que parece ressoar com as flutuações do portal. Ao usar engenharia reversa na frequência, talvez possamos atravessar essa fenda enigmática nós mesmos.\n\nMais pesquisas serão necessárias, mas pela primeira vez, a possibilidade de levar a luta até o inimigo está ao nosso alcance."
 abandoned_hatchery_chain_2: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_desc: "Estamos a mais um passo de descobrir os mistérios do portal. Embora ainda não possamos atravessá-lo, agora temos o conhecimento para desenvolver a tecnologia necessária.\n\nPara levar a luta até o inimigo, vamos precisar da §Y$tech_wormhole_stabilization$§!."
 bio.2025.name: "Berço do Inimigo"
 bio.2025.desc: "Graças aos recentes avanços no campo da §Y$tech_wormhole_stabilization$§!, tivemos acesso a um raro vislumbre do sistema §Y[event_target:starlit_sealed_system.GetName]§!.\n\nUma frota agressiva de naves biológicas e uma base estelar extensamente fortificada nos espera do outro lado. Extrema cautela é recomendada.\n\nEncontramos o berço do inimigo."
 abandoned_hatchery_chain_3: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_desc: "Encontramos o berço do inimigo. Para desvendar seus segredos, precisaremos confrontar suas defesas.\n\nA batalha não será fácil, mas uma vez vitoriosos, poderemos enfim explorar livremente o sistema §Y[event_target:starlit_sealed_system.GetName]§!."
 bio.2027.name: "Crepúsculo do Medo"
 bio.2027.desc: "A frota que protegia §Y[starlit_sealed_system.GetName]§! foi destruída. Pouco antes do fim da batalha, recebemos uma transmissão perturbadora da base estelar do sistema, e só agora terminamos de traduzi-la:\n\n§H\" - perdemos todo o controle! As naves estão se reproduzindo por conta própria! Por favor, quem quer que sejam, salvem-nos!\"§!\n\nDesde então, toda a comunicação foi encerrada. Se de fato estamos diante da vitória, a base de operações de nosso inimigo apresenta uma oportunidade estratégica. Um novo $starbase_deep_space_citadel_1$ poderá um dia brilhar sob a luz de §Y[starlit_sealed_system.GetName]§!, garantindo que uma ameaça assim nunca ponha em risco a nossa civilização outra vez."
 bio.2027.a: "Finalmente, nosso cerco foi encerrado."
 citadel_siege_lifted: "Cerco Encerrado"
 citadel_siege_lifted_desc: "Nossos valentes defensores derrotaram a horda de [GetInvadersLower]. Finalmente, nosso cerco foi encerrado."
 citadel_siege_lifted_machine: "$citadel_siege_lifted$"
 citadel_siege_lifted_machine_desc: "$citadel_siege_lifted_desc$"
 abandoned_hatchery_chain_4: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_desc: "A horda de [GetInvadersLower] foi expurgada do sistema §Y[starlit_sealed_system.GetName]§!, mas a situação aqui é muito diferente do que imaginávamos.\n\nTudo o que resta de nossos algozes é um mundo aparentemente dizimado."
 PROJECT_BIOMECHANICAL_WORLD: "Lar do Inimigo"
 PROJECT_BIOMECHANICAL_WORLD_DESC: "O mundo natal da horda de [GetInvadersLower]. Quem era esse povo, e o que queria conosco?"
 bio.2030.name: "Praga Biomecânica"
 bio.2030.desc: "§Y[event_target:biomechanical_world_target.GetName]§! é uma cova a céu aberto.\n\nA espécie dominante do planeta foi completamente sobrepujada por uma forma de vida estranha e agressiva. Investigações mais detalhadas revelaram que esses não eram organismos naturais; eram na verdade máquinas biológicas não construídas, mas cultivadas.\n\nSeria possível que quem quer que tenha concebido essas criaturas tenha sido vítima da própria criação? Teria o nosso inimigo sido completamente alheio às suas ações contra nós, ou mesmo à nossa existência?\n\nTemos apenas uma certeza: as medidas tomadas por eles para conter essa praga acabou por destrui-los, juntamente com as suas abominações automatizadas."
 bio.2030.a: "Então não fomos as únicas vítimas..."
 smarter_hatchery: "Frotas Melhoradas"
 smarter_hatchery_desc: "Elas aprendem... Elas se adaptam... Elas estão vindo."
 bio.2030.tt: "\n§ELibera a Posição no Conselho:§!\n§H$t$$councilor_warden_of_the_citadel$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$MOD_SHIP_FRIENDLY_TERRITORY_ARMOR_MULT$: §G+1%§!\n$ttt$$mod_shipsize_starbase_deep_space_citadel_1_hull_mult$: §G+2%§!\n$ttt$$mod_starbases_upkeep_mult$: §G-5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$"
 councilor_warden_of_the_citadel: "Guardião da Cidadela"
 councilor_warden_of_the_citadel_desc: "O $TITLE$ é um protetor incansável, encarregado de fortificar as defesas, supervisionar a prontidão militar e garantir que a civilização resista a qualquer ameaça."
 mod_shipsize_starbase_deep_space_citadel_1_hull_mult: "$starbase_deep_space_citadel_1$ $HITPOINTS$"
 mod_shipsize_starbase_deep_space_citadel_2_hull_mult: "$starbase_deep_space_citadel_2$ $HITPOINTS$"
 mod_shipsize_starbase_deep_space_citadel_3_hull_mult: "$starbase_deep_space_citadel_3$ $HITPOINTS$"
 siege_node: "Nódulo de Cerco"
 siege_node_desc: "Aprendemos. Adaptamos. Nossas defesas não falharão."
 bio.2036.name: "Elas Aprendem"
 bio.2036.desc: "Testemunhamos uma tendência preocupante nos ataques das naves biológicas. Cada investida demonstra uma maior coordenação, táticas adaptativas e a sondagem metódica de nossas defesas. Registros dos sensores revelam alterações nas assinaturas energéticas e alvos prioritários, comprovando uma evolução nas estratégias.\n\nPor instinto ou inteligência coletiva, essas criaturas estão se tornando mais formidáveis. Se o padrão observado continuar, a próxima onda será ainda mais difícil de rechaçar."
 bio.2036.a: "Ore pelos defensores."
 bio.2036.b: "Força para os defensores."
 bio.2036.tt: "A cada nova onda, as frotas que chegam através do §Y$STARLIT_WORMHOLE_GALACTIC$§! ganham potência."
 bio.2040.name: "Inimigo Perdido"
 bio.2040.desc: "A telemetria recebida do portal revela um desenvolvimento crítico em §Y[event_target:starlit_sealed_system.GetName]§!: tanto a frota de naves biológicas quanto sua incubadora foram destruídas por uma força desconhecida.\n\nEmbora a certeza de que a horda de [GetInvadersLower] tenha sido aniquilada nos alegre, não podemos correr o risco de outra força tomar o controle do sistema [event_target:starlit_sealed_system.GetName] no futuro.\n\nTemos que agir depressa e proteger esse local estratégico, ou podemos acabar em um novo cerco."
 bio.2040.a: "Aliados... ou um novo inimigo?"
 citadel_siege_cancelled: "Cerco Cancelado"
 citadel_siege_cancelled_desc: "A horda de [GetInvadersLower] foi destruída. Será que o nosso longo cerco foi enfim encerrado?"
