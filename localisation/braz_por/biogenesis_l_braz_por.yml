 bio.40.name: "Diferenciação Biológica" #FINAL STAGE - TRADITION TREE CHOICE
 bio.40.desc: "Seja a busca pela nossa forma mais pura, o sucesso através da clonagem ou o aprimoramento genético por meio de mutações deliberadas, este momento marca um caminho sem volta."
 bio.40.desc.evopred: "$bio.20.desc.evopred$"
 bio.40.a: "$bio.20.a$"
 bio.40.b: "$bio.20.b$"
 bio.40.c: "$bio.20.c$"
 #Random Events (Hives)
 bio.110.name: "Divisão de Trabalho"
 bio.110.desc: "Conforme começamos a elevar biologicamente a [target.GetGestaltEntityName], devemos priorizar apenas os aprimoramentos que mais beneficiarão a nossa civilização.\n\nA manipulação seletiva de genes nos permite criar especialistas com características físicas desejáveis e mais aptos para setores específicos.\n\nCom essas novas habilidades, temos uma chance de fortalecer [target.GetIndividualNamePlural] que trabalham na produção de energia ou na defesa."
 bio.110.a: "Sempre temos utilidade para energia."
 bio.110.b: "Devemos priorizar a defesa."
 bio.115.name: "Redundância Geracional"
 bio.115.desc: "Conforme introduzimos um novo modelo biológico para os nossos drones, devemos decidir o que fazer com aqueles incompatíveis com o aprimoramento genético.\n\nAlguns drones mais antigos não suportarão as alterações. Podemos mantê-los como força de trabalho pelo restante de suas vidas, ou reciclar sua matéria biológica para reabastecer a colmeia."
 bio.115.a: "Recicle os drones antigos."
 bio.115.b: "Eles ainda são úteis."
 bio.120.name: "Velocidade ou Vigor"
 bio.120.desc: "Uma descoberta na pesquisa genética revelou uma forma de aprimorar a eficiência de transmissão neural, aumentando consideravelmente a produtividade de [target.GetIndividualNamePlural].\n\nContudo, esse aumento de produção cerebral não pode ser sustentado por longos períodos, levando a uma expectativa de vida mais curta.\n\nTemos que decidir se vamos manter nosso tempo de vida normal ou intensificar nossa funcionalidade em detrimento da longevidade."
 bio.120.a: "Priorize nosso tempo de vida atual."
 bio.120.b: "Crie [target.GetIndividualNamePlural] melhores. Aumente a produtividade."
 bio.125.name: "Sobrecarga Sináptica"
 bio.125.desc: "Um lote de [target.GetIndividualNamePlural] recém-aprimorados foi integrado à [target.GetGestaltEntityName]; sua engenharia biológica foi aperfeiçoada para acelerar o desenvolvimento neural e os processos cognitivos. Os principais nódulos sinápticos da [target.GetGestaltEntityName] agora operam em um ritmo inédito.\n\nNo entanto, essa aceleração gerou pressão sobre a estabilidade de [target.GetIndividualNamePlural], arriscando uma sobrecarga sináptica catastrófica. Por outro lado, poderíamos realocar mais [target.GetIndividualNamePlural] para tarefas de coordenação."
 bio.125.a: "Reduza o ritmo e mantenha a estabilidade."
 bio.125.b: "Viva intensamente e brilhe intensamente."
 bio.130.name: "Fenômenos de Frequência"
 bio.130.desc: "Desde que integramos um novo lote de clones em nossa colmeia, temos observado problemas áudio-vibratórios desagradáveis. Um equívoco no processo de clonagem pode ter comprometido o desenvolvimento de seus transmissores biológicos, causando interferência na frequência.\n\nQuando esses drones se comunicam com a colmeia, todos os drones próximos são acometidos por surtos de um alto e desconfortante zumbido mental. As distrações são muitas, pondo em risco a produtividade."
 bio.130.a: "Desagradável, mas tolerável."
 bio.130.b: "Descarte os clones problemáticos."
 bio.135.name: "Um Problema de Mobilidade"
 bio.135.desc: "Experimentos recentes de clonagem geraram resultados incomuns. Alguns clones parecem neurologicamente vinculados aos doadores genéticos, fazendo com que eles se movam involuntariamente em sincronia.\n\nO fenômeno não é afetado pela distância, e os drones individuais espelham as ações de suas contrapartes em qualquer lugar da galáxia. Isso apresenta possibilidades intrigantes.\n\nPoderíamos implementar uma iniciativa que une clones e doadores para trabalharem em sincronia dentro de ambientes idênticos. Por outro lado, poderíamos extrair os neurotransmissores responsáveis para estudar o fenômeno mais a fundo."
 bio.135.a: "Organize estações de trabalho idênticas para o doador e o clone."
 bio.135.b: "Remova cirurgicamente os elos sincrônicos."
 bio.140.name: "Clones Incompatíveis"
 bio.140.desc: "Em uma tentativa de fortalecer a colmeia, nós cultivamos um lote de clones a partir de materiais doados e aceleramos artificialmente sua maturação. Embora sejam belos espécimes biológicos, esses clones são incompatíveis.\n\nEsse desvio, embora problemático, apresenta uma oportunidade única: esses drones individualizados, agora dotados de identidades singulares e pensamento independente, podem ter vantagens durante a interação com entidades externas ao coletivo. Sua capacidade de pensar de forma autônoma poderia preencher lacunas onde a voz unificada da colmeia tem dificuldades para se adaptar. Porém, esses benefícios têm seu custo: a consciência crescente de suas individualidades gerou certa agitação, afetando algumas de nossas funções cognitivas de alto nível."
 bio.140.a: "Force a integração."
 bio.140.b: "Utilize o potencial deles."
 bio.145.name: "Questões sobre a Criação"
 bio.145.desc: "Nossa consciência coletiva está em crise. Agora que temos a capacidade de criar cópias de nós mesmos, hesitamos e questionamos a eficácia (ou mesmo a moralidade) de tais ações.\n\nO processo de clonagem exige recursos consideráveis. Talvez devêssemos usá-los em outras áreas, especialmente considerando que a procriação natural pode produzir mais diversidade genética.\n\nHistoricamente, esse não tem sido nosso método de reprodução, e não sabemos se estamos prontos para abraçar uma mudança tão primordial em nossa espécie."
 bio.145.a: "A eficiência da clonagem não deve ser ignorada."
 bio.145.b: "A diversidade genética é essencial."
 bio.150.name: "Extenuação da Colmeia"
 bio.150.desc: "Nossos experimentos com mutações provocaram irregularidades dentro da colmeia. Tarefas antes corriqueiras agora demandam esforços deliberados conforme diretrizes conflitantes desgastam a mente coletiva.\n\nEmbora a fadiga resultante ameace esgotar alguns de nossos drones mais eficientes, ela também apresenta uma oportunidade.\n\nTemos que decidir: vamos fazer uma pausa para nos recuperarmos ou forçar os nossos limites?"
 bio.150.a: "Merecemos um descanso."
 bio.150.b: "Vamos dormir quando estivermos mortos."
 bio.151.name: "Descansados e Renovados"
 bio.151.desc: "Nossa decisão para descansar e recuperar as forças gerou frutos. Os impulsos dissonantes aquietaram-se, coalescendo em um fluxo harmonioso que impulsiona o coletivo com clareza renovada.\n\nOs drones que antes oscilavam à beira do esgotamento agora trabalham com uma precisão inabalável. Esse período de reflexão não apenas reduziu a fadiga coletiva, como também fortaleceu nossa determinação para os desafios à frente."
 bio.151.a: "Estamos radiantes!"
 bio.155.name: "Especializar ou Generalizar"
 bio.155.desc: "A mutação oferece inúmeros benefícios. Por meio de aprimoramentos seletivos, podemos adaptar a colmeia para melhor servir ao nosso propósito. A especialização na produção mineral agora pode ser alcançada com a criação de apêndices mais rígidos e quitinosos.\n\nPor outro lado, poderíamos aprimorar todos os drones com mais modificações genéticas, para que possam realizar uma infinidade de funções."
 bio.155.a: "Generalistas são mais úteis."
 bio.155.b: "Vamos começar a cavar."
 bio.160.name: "Deriva Fenotípica"
 bio.160.desc: "A experimentação contínua introduziu complexidades inesperadas à colmeia. Estão surgindo drones com características físicas singulares: exoesqueletos cobertos de espinhos, apêndices desproporcionais ou órgãos sensoriais estranhamente sensíveis.\n\nEmbora esses desvios ofereçam benefícios concretos, eles também apresentam um fardo metabólico, e a colmeia está com dificuldades para equilibrar esse desgaste crescente. Uma pergunta emerge: quantas mutações são suficientes?"
 bio.160.a: "Abrace o dinamismo."
 bio.160.b: "A coesão deve ser mantida."
 bio.165.name: "Saudades do Passado"
 bio.165.desc: "A colmeia está mudando. Ao alterar nosso genoma, observamos melhoras quantificáveis. No entanto, isso nos tornou mais suscetíveis a perturbações psicológicas.\n\nNão tínhamos aversão a quem éramos, e ainda que estejamos cada vez mais fortes e cognitivamente avançados, temos saudade da familiaridade de nossos antigos padrões de pensamento.\n\nEm toda a colmeia, ecoa a incômoda noção de que nossos corpos não correspondem à nossa psique intrínseca. Será que ultrapassamos a nós mesmos?"
 bio.165.a: "A mudança é parte da vida."
 bio.165.b: "Não devemos abandonar nossa essência."
