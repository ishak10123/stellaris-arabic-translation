 ### Behemoth Crisis ###
 ap_behemoths: "Fúria do Beemote"
 ap_behemoths_desc: "Os predadores alfas das estrelas não são limitados por meras restrições. De modo semelhante, abandonaremos as fraquezas biológicas que nos limitam e nos tornaremos uma força da natureza."
 must_use_bioships: "£trigger_no£ Requer o uso de um conjunto de naves §YBiológicas§!."
 behemoth_crisis_chain_title: "Crise de Beemotes"
 behemoth_crisis_chain_desc: "As estrelas são apenas alimento para a nossa fome, e a calamidade é o solo onde florescem nossas ambições. Desafiaremos a ordem natural, dando forma a uma fera tão imensa, tão irrefreável, que transformaremos o cosmos."
 crisis_behemoth_level_1: "§HPreocupação§!"
 crisis_behemoth_level_1_desc: "Nível de Crise 1"
 crisis_behemoth_level_2: "§HRisco§!"
 crisis_behemoth_level_2_desc: "Nível de Crise 2"
 crisis_behemoth_level_3: "§HPerigo§!"
 crisis_behemoth_level_3_desc: "Nível de Crise 3"
 crisis_behemoth_level_4: "§HCalamidade§!"
 crisis_behemoth_level_4_desc: "Nível de Crise 4"
 crisis_behemoth_level_5: "§HAmeaça Existencial§!"
 crisis_behemoth_level_5_desc: "Nível de Crise 5"
 behemoth_crisis_level_5_req_tooltip: "£trigger_no£ Concluiu o projeto especial de §H$become_the_crisis_chain$§! §Y$BEHEMOTH_CRISIS_SPECIAL_PROJECT_4$§!"
 feral_insight: "Conhecimento Feral"
 feral_insight_name: "$feral_insight$:"
 feral_insight_value: "£feral_insight£ $VAL|0$"
 feral_insight_current_value: "Valor Atual: §Y$VALUE|0$§!"
 feral_insight_gaining: "Conclua §HObjetivos de Crise§! para ganhar mais £feral_insight£ §Y$feral_insight$§!."
 feral_insight_desc: "Estamos estudando os ciclos comportamentais e alimentares de megaorganismos."
 feral_insight_crisis_objective: "Objetivos de Crise"
 feral_insight_crisis_objective_gained: "$feral_insight$ adquirido"
 feral_insight_crisis_objective_reward: "$REWARD$"
 feral_insight_crisis_objective_progress: "Ganhamos £feral_insight£ $AMOUNT$ com este Objetivo de Crise."
 feral_insight_crisis_description_title: "Crise de Beemotes"
 feral_insight_crisis_description: "$menace_crisis_description_intro$\n\nOs Leviatãs que habitam o vazio são seres formidáveis de força incomparável, mas não têm um propósito ou ambição. A união de sua fisiologia poderosa com nossa fortitude intelectual dará origem a uma nova geração de Fauna Espacial e nos trará o apogeu da dominação galáctica."
 feral_insight_crisis_howto_title: "Criando Beemotes"
 feral_insight_crisis_howto: "Realizar §HObjetivos de Crise§! gerará £feral_insight£ §HConhecimento Feral§!, que nos permitirá liberar todo o nosso potencial biológico."
 feral_insight_crisis_level_unlocked: "Em $LEVEL$, você ganha as recompensas:\n"
 feral_insight_crisis_level_locked: "Necessário para liberar este nível:\n"
 feral_insight_crisis_level_unlock: "Tem £feral_insight£ §Y$CURRENCY$§! de Conhecimento Feral"
 feral_insight_crisis_level_desc: "Para avançar pelos níveis de Crise, acumule £feral_insight£ §HConhecimento Feral§!, pesquise os Projetos Especiais da Crise e crie o seu Beemote."
 #Crisis Perks
 menp_behemoth_objectives: "Conhecimento Feral"
 unlocks_behemoth_objectives: "Permite o acúmulo de £feral_insight£ §Y$menp_behemoth_objectives$§! ao concluir §HObjetivos de Crise§!.\n"
 menp_behemoth_objectives_desc: "A observação do comportamento dos Beemotes auxiliará nosso objetivo de transcendência. Abandonaremos as restrições biológicas que regem a vida planetária."
 menp_behemoth_bioship_1: "Quitina Endurecida"
 menp_behemoth_bioship_1_desc: "Para resistir ao ambiente inóspito do espaço, é necessário um exterior espesso. A robustez externa garantirá nossa sobrevivência até mesmo nas piores condições."
 menp_behemoth_society_1: "Testes de Campo Acelerados"
 menp_behemoth_society_1_desc: "Experimentos em laboratórios são um bom ponto de partida, mas o verdadeiro progresso requer testes práticos e de alto risco em campo."
 menp_behemoth_food_1: "Plantações Gigantescas"
 menp_behemoth_food_1_desc: "Saciar o apetite voraz de um Beemote é uma tarefa árdua. A produção de alimentos geneticamente modificados em larga escala é um começo."
 menp_behemoth_egg: "Incubadoras Colossais"
 unlocks_behemoth_egg: "Libera a Megaestrutura §YOvo de Beemote§!.\n"
 menp_behemoth_egg_desc: "Um ovo colossal requer nada menos que uma incubadora titânica. Esta incubadora orbital deve ser posicionada a uma distância calculada da estrela para acomodar as vastas proporções necessárias para abrigar um Beemote."
 menp_behemoth_bioship_2: "Melhor Estímulo Glandular"
 menp_behemoth_bioship_2_desc: "Com sondas específicas, vamos estimular artificialmente as glândulas endócrinas do Beemote para produzir hormônios do crescimento para o desenvolvimento acelerado."
 menp_behemoth_society_2: "Estudos Transversais"
 menp_behemoth_society_2_desc: "Na interseção da seleção natural com a bioengenharia, nasce uma força incomparável."
 menp_behemoth_food_2: "Sobrecarga de Nutrientes"
 menp_behemoth_food_2_desc: "Saciar o apetite voraz de um Beemote pode ser uma tarefa impossível. A produção de alimentos geneticamente modificados em uma escala maciça é apenas o começo."
 menp_behemoth_hatchling: "Ninhada Gigantesca"
 unlocks_behemoth_hatchling: "Permite a §Yeclosão§! de Megaestruturas de Ovo de Beemote.\n"
 menp_behemoth_hatchling_desc: "Uma ninhada de Beemotes abarca sistemas estelares inteiros. Nossos vizinhos galácticos respeitarão a autonomia de nossas crias, ou se tornarão o jantar."
 menp_behemoth_bioships_3: "Ciclos de Crescimento mais Rápidos"
 menp_behemoth_bioships_3_desc: "A aceleração do desenvolvimento da Fauna Espacial gigante é vital para o nosso maior objetivo. Garantiremos que nossa infraestrutura cresça em paralelo."
 menp_behemoth_society_3: "Domínio da Bioengenharia"
 menp_behemoth_society_3_desc: "Por meio de processos rigorosos de tentativa e erro, desenvolvemos nossa perícia científica. Somos agora os mais importantes bioengenheiros da galáxia."
 menp_behemoth_mind_control: "Modelagem de Pensamento Profundo"
 unlocks_behemoth_mind_control: "Permite que influenciemos os pensamentos de §YBeemotes§!.\n"
 menp_behemoth_mind_control_desc: "Nosso intelecto coletivo está se agitando, ansiando por algo maior e melhor. Nossa ambição não tem limites."
 menp_behemoth_hatchling_2: "Crescimento Desenfreado"
 unlocks_behemoth_hatchling_2: "Permite que §YBeemotes§! alimentados entrem em uma crisálida para aumentar dramaticamente seu tamanho e poder.\n"
 menp_behemoth_hatchling_2_desc: "A fera está livre. A criatura que já foi um filhote está se tornando rapidamente uma força da natureza, selvagem e implacável."
 menp_behemoth_bioship_4: "Organismos mais Fortes"
 menp_behemoth_bioship_4_desc: "Motivados pela fome voraz e ira irredutível, os Beemotes estão alcançando níveis caóticos de poder. Sua arma biológica está pronta devastar inimigos e qualquer outra coisa em seu caminho."
 menp_behemoth_mutation_research: "Mutações de Beemotes"
 unlocks_behemoth_mutation_research: "Libera um §YProjeto Especial§! para alterar o desenvolvimento genético de §YBeemotes§!.\n"
 menp_behemoth_mutation_research_desc: "Rearranjaremos o material genético dos Beemotes enquanto continuam a crescer, estimulando as características fisiológicas mais benéficas."
 menp_behemoth_mind_control_2: "Mobilização de Espécime Alfa"
 unlocks_behemoth_mind_control_2: "Estabeleceremos laços psíquicos mais profundos com nossos §YBeemotes§!.\n"
 menp_behemoth_mind_control_2_desc: "O ápice da perfeição genética não ficará confiado às nossas fronteiras atuais. Ele deve ser compartilhado com toda a galáxia."
 menp_behemoth_mind_meld: "Fusão Mental"
 unlocks_behemoth_mind_meld: "Assuma o controle total de um poderoso §YBeemote de Classe IV§!, uma criatura de capacidade inigualável para dominar a galáxia.\n"
 menp_behemoth_mind_meld_desc: "Nossa mente funde-se à do Beemote, e vice-versa. Sua ira torna-se nossa. Somos consumidos voluntariamente, e enquanto a fera empanturra-se com a nossa consciência coletiva, sentimos sua fúria. Ela torna-se nós, e nós somos ela."
 menp_behemoth_primal_roar: "Rugido Primitivo"
 unlocks_behemoth_primal_roar: "Convoque a maior das feras e desafie-a pelo domínio do vazio.\n"
 menp_behemoth_primal_roar_desc: "Percorre o nosso interior, ardendo, rasgando, queimando. Uma ira, um rugido primitivo. A galáxia arderá nas chamas da nossa fúria."
 menp_behemoth_ever_hungry: "Fome sem Fim"
 unlocks_behemoth_ever_hungry: "Libera a situação $behemoth_finale_situation$. Alimente-se desta galáxia para aumentar seu tamanho e poder e se tornar o maior de todos os predadores espaciais.\n"
 menp_behemoth_ever_hungry_desc: "Estamos em agonia; a necessidade constante de se alimentar torna-se nossa única razão de existir. Há um abismo dentro de nós que nunca será preenchido, não importa o quanto devoremos. Apenas um banquete do tamanho desta galáxia aplacará nossa dor."
 menp_behemoth_egg_2: "Prole Voraz"
 unlocks_behemoth_egg_2: "Libera a habilidade de §YBeemotes de Classe IV§! de colocar §YOvos§! e perpetuar sua espécie.\n"
 menp_behemoth_egg_2_desc: "Nossas crias se deleitarão na carcaça desta galáxia. Sua fome não tem limites. Até a infinidade do tempo, elas se alimentarão."
 mod_shipclass_military_hull_mult: "Casco de Naves Militares"
 mod_country_resource_max_food_add: "Capacidade de Armazenamento de Comida"
 mod_starbase_shipyard_build_alloys_cost_mult: "Custo de Ligas Metálicas de Naves"
 crisis_egg_built: "£trigger_yes£ §YConstruiu§! uma Megaestrutura de §H$behemoth_egg$§!"
 crisis_egg_required: "£trigger_no£ §YConstruiu§! uma Megaestrutura de §H$behemoth_egg$§!"
 crisis_egg_hatched: "£trigger_yes£ §YChocou§! um §H$behemoth_hatchling$§! de um §H$behemoth_egg$§!"
 crisis_hatchling_required: "£trigger_no£ §YChocou§! um §H$behemoth_hatchling$§! de um §H$behemoth_egg$§!"
 district_mindlink: "Metrópole de Vínculo Mental"
 district_mindlink_plural: "$district_mindlink$"
 district_mindlink_desc: "Arranha-céus imensos eclipsam os centros populacionais, oferecendo aos voluntários uma chance de comungar diretamente com a Fera."
 planet_building_buffer: "Conversão de Metrópole"
 planet_building_buffer_desc: "Embora a criação de torres mentais para a comunicação com a Fera seja um processo rápido, tínhamos que planejar contingências para garantir o apoio contínuo à infraestrutura do planeta."
 mod_job_transference_volunteer_add: "Empregos de $job_transference_volunteer$"
 planet_transference_volunteers: "$job_transference_volunteer_plural$"
 job_transference_volunteer: "Voluntário para Transferência"
 job_transference_volunteer_plural: "Voluntários para Transferência"
 job_transference_volunteer_desc: "Para muitos, o vínculo mental com a Fera é apenas um detalhe secundário. Constante, mas remoto. Para outros, contudo, a necessidade de se fundir com ela é irreprimível. Estes voluntários atuam como um canal enquanto suas mentes são lentamente absorvidas pelo coletivo bestial."
 job_transference_volunteer_effect_desc: "\n£job_transference_volunteer£ [GetTransferenceVolunteerDrone] produzem £unity£ §YUnidade§!, aumentam a $r_stability$ do planeta e fortalecem nossas §Ynaves§!.\n§Y10%§! dos Pops trabalhando nesse emprego serão §Ytransferidos§! a cada 6 meses. Eles morrerão, mas multiplicarão a produção de recursos do Distrito.\n\n§GPops Transferidos§!: [num_tranferred_pops]"
 mod_job_transference_drone_add: "Empregos de [GetTransferenceVolunteerDrone]"
 job_transference_drone: "Drone de Transferência"
 job_transference_drone_plural: "Drones de Transferência"
 job_transference_drone_desc: "Embora o vínculo mental tenha estabelecido uma conexão permanente entre a Fera e nós, a transferência é um processo vagaroso. Sem essas precauções, arriscaríamos destruir ambas as psiques e poríamos tudo a perder."
 MESSAGE_POPS_TRANSFERRED_TITLE: "População Transferida"
 MESSAGE_POPS_TRANSFERRED_DESC: "$VALUE|Y$ Pops foram transferidos. Suas mentes agora vivem dentro da Fera."
 #Crisis Events
 biocrisis.50.name: "Nível 1: Experimentação Embriônica"
 biocrisis.50.desc: "Existimos simbioticamente com nossos receptáculos biológicos, mas algo crucial sempre nos escapou...\n\nInspirados pelos grandes seres nascidos do vazio, embarcamos em nossa jornada mais ambiciosa até agora: conceber a maior das feras. Esse \"Beemote\" será algo novo, uma forma de vida suprema criada pelo propósito, e não pela evolução cega.\n\nNosso primeiro desafio será a criação de um ovo gigantesco, adequado para a gestação da vida em escala inédita. Além dos nutrientes que ele deverá conter, sua casca precisará absorver luz, calor e processos gasosos do ambiente como forma de alimento suplementar."
 biocrisis.50.a: "Nossa cria eclipsará as estrelas."
 biocrisis.55.name: "Nível 2: Autorrealização"
 biocrisis.55.desc: "Enquanto naves de construção trabalhavam para posicionar o zigoto e sua casca na órbita de um gigante gasoso, nossa indústria alimentícia processou os nutrientes necessários para formar o albúmen de um ovo de Beemote. No entanto, a criação de um vitelo fertilizado viável mostrou-se consideravelmente mais desafiadora.\n\nEsgotamos imensas quantidades de biomassa de naves biológicas e fauna espacial antes de finalmente estabilizar uma base viável para o DNA, que inserimos em uma célula de fertilização inovadora. Testes em escala microscópica foram bem-sucedidos; agora, estamos prontos para ampliar exponencialmente seu tamanho. Tudo o que resta é fertilizar um ovo colossal.\n\nEm breve, gestaremos a maior forma de vida titânica que esta galáxia já viu!"
 biocrisis.55.a: "Estamos nos aproximando do ápice da evolução."
 biocrisis.60.name: "Soberba e Fome"
 biocrisis.60.desc: "Nossa primazia genética é inigualável, e nossas conquistas ofuscam os impérios inferiores desta galáxia.\n\nAinda assim, nosso Beemote não reconhece a totalidade de nossa dominância. Controlado pelo instinto voraz, mesmo as quantidades massivas de alimento que fornecemos foram incapazes de saciar sua fome. Com o tempo, ele certamente aprenderá a acatar nossos comandos, mas tempo é um bem precioso. Podemos perder o controle a qualquer momento, colocando em risco bilhões de vidas."
 biocrisis.60.a: "Encontraremos um jeito."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3: "Testes de Elo Cerebral"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3_DESC: "Estamos realizando um experimento com neurotecnologia para tentar conectar remotamente nossas mentes ao sistema nervoso do Beemote. Acreditamos que essa é a única forma de domar a fera."
 biocrisis.15.name: "Sinfonia Sináptica"
 biocrisis.15.desc: "Nossa avançada neurotecnologia finalmente descobriu uma maneira de superar a barreira comunicativa que havia entre nós e nossa formidável cria: apenas a conexão de nossas mentes com a fera funcionará. Não uma mente individual, mas o peso mental coletivo de toda a nossa espécie. Se avançarmos rápido demais, correremos o risco de sobrecarregar o sistema nervoso do Beemote. Devemos prosseguir com extrema cautela."
 biocrisis.15.a: "A perfeição biológica vem a um alto preço."
 biocrisis.65.name: "Nível 4: Encarnação Bestial"
 biocrisis.65.desc: "Embora a teoria de um elo mental com o Beemote tenha sido esboçada, as implicações logísticas são assombrosas. Nossa capital abrigará o hub de conexão principal, nos permitindo processar a população enquanto nos tornamos um com a fera.\n\nAlém disso, avanços científicos recentes logo permitirão um aumento ainda maior de nossas criações por meio de um único projeto de mutação experimental."
 biocrisis.65.a: "Seremos um só."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4: "A Fusão Mental"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC: "A consciência do Beemote é consideravelmente maior e mais complexa do que antecipávamos: agora, compreendemos que a mente de um único indivíduo é insuficiente para a integração. Nossas mentes, embora superiores às demais, não foram feitas para se abrigar em um corpo assim.\n\nO primeiro passo será conectar as mentes individuais de nossa população ao Beemote. Um elo tênue logo se tornará uma torrente; uma inundação para aplacar a ira do Beemote."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_HIVE: "Não há espaço para desvios na colmeia. Nosso foco nunca foi tão crucial. Um único drone é incapaz de atuar como canal entre nós e o Beemote, por isso devemos habitar a mente da fera com nossa consciência coletiva total.\n\nIsso nos transformará. Nossas mentes se fundirão e seremos uma única entidade. Uma noção tão absurda é difícil de compreender, mas não devemos nos preocupar: em breve, seremos o ser mais poderoso de toda a galáxia!"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_MACHINE: "A ideia de habitar um receptáculo biológico sempre nos perturbou. Nossa espécie foi definida por gerações de drones com corpos físicos. Aqueles que vieram antes de nós nunca poderiam conceber o caminho que agora trilhamos. No entanto, abandonaremos nossos corpos mecanizados e nos abrigaremos no interior de um ser vivo.\n\nMesmo embutidos na carne, permaneceremos máquinas? A resposta é um categórico <<ERRO: NÃO ENCONTRADO>>.\n\nA lógica dita que o único caminho em frente é abraçar a incerteza, como frequentemente o fazem os seres biológicos. Dentro do corpo de um Beemote, encontraremos nossas respostas. Vamos nos fundir com a criatura, tornando-nos um só. A sobrevivência sempre foi nossa principal diretriz. Agora nós vamos prosperar."
 biocrisis.20.name: "Um com a Fera"
 biocrisis.20.desc: "Funcionou! Funcionou de verdade! Estabelecemos um vínculo com o Beemote e, enquanto as primeiras de nossas mentes são transferidas, estamos trabalhando para fortalecer essa conexão. A fera permanece dócil, recebendo-nos em um espaço além do espaço que sempre nos pertenceu. Por intermédio dela, podemos sentir o espírito de todas as outras feras sob o nosso controle, e toda a nossa população agora experimenta a magnitude do Beemote nas profundezas de suas mentes.\n\nNão há dúvidas de que somos a força mais letal e implacável de toda a galáxia. Em nossa nova forma, derramaremos a fúria sobre nossos inimigos acovardados. A própria galáxia será nossa!"
 biocrisis.20.a: "Vamos nos alimentar!"
 biocrisis.70.name: "Nível 5: Anseios Vorazes"
 biocrisis.70.desc: "Uma parcela suficiente de nossa população foi transferida, e agora assumimos o controle direto do Beemote e sua carne. A fera continua a crescer; seu potencial genético em grande parte latente, liberado apenas por meio de um abastecimento contínuo de mentes e nutrientes. Uma fúria primitiva agora corre em nosso âmago, e nossa sede de sangue não tem fim. Precisamos consumir. Precisamos devorar. Vamos nos banquetear com a galáxia.\n\nChegou a hora de nos livrarmos das amarras da civilização; tudo o que importa agora é a nossa vida entre as estrelas."
 biocrisis.70.a: "Somos grandes demais para fracassar."
 biocrisis.105.name: "Agonia Monstruosa"
 biocrisis.105.desc: "Uma de nossas feras caiu. É isto que acontece com seres fracos: a natureza se livra deles. Embora não lamentemos a perda de um Beemote incapaz de vencer uma batalha, temos que concentrar nossos esforços para garantir que seus irmãos não tenham o mesmo destino. Devemos assegurar a longevidade de nossas crias, ou também cairemos."
 biocrisis.105.a: "Essa morte não será em vão."
 biocrisis.105.b: "Um sacrifício lamentável."
 biocrisis.130.name: "Das Estrelas, uma Fera"
 biocrisis.130.desc: "Apesar dos desafios, demos vida a um Beemote que agora surge da crisálida onde era incubado.\n\nMaior, mais feroz e mais faminta, a criatura espreita o vazio em busca de alimento.\n\nEssa fera é o nosso orgulho e trará destruição incalculável para qualquer um que cruzar o seu caminho."
 biocrisis.130.a: "Mais uma vez, superamos os limites da natureza."
 biocrisis.150.name: "Um Desafio Respondido"
 biocrisis.150.desc: "Parece que nossa ascensão não passará incontestada. Detectamos uma massa imensurável no sistema [event_target:voidspawn_spawn_location.GetName]. É uma Mortenascida, uma monstruosidade ancestral cuja presença ofusca até mesmo os mais poderosos constructos de ambições mortais.\n\nSua forma assombrosa desafia a compreensão convencional, lançando a galáxia em um crepúsculo macabro, como se as próprias estrelas temessem sua passagem.\n\nO propósito da Mortenascida é tão claro quanto sua trajetória: ela está vindo até nós, nosso corpo de Beemote e a mente coletiva que ousou transcender a carne para reivindicar o domínio sobre o vazio. Não estamos diante de um mero confronto pelo poder material: este é um teste para o que nos tornamos.\n\nSe lutássemos agora, certamente pereceríamos. Devemos evitá-la no momento e continuar a aumentar nossa força, até que nossas presas sejam afiadas o bastante para penetrar o impenetrável."
 biocrisis.150.desc.b: "$biocrisis.150.desc$"
 biocrisis.150.a: "Podemos correr, mas não podemos nos esconder."
 biocrisis.155.desc: "Esta é uma mensagem de suma importância. A §Y$NAME_Boss_Voidspawn$§!, uma entidade de poder insondável, emergiu das profundezas do vazio. Ela é atraída por [event_target:behemoth_empire.GetName], um império que transcendeu a mortalidade e se fundiu com uma fera. Esses dois titãs, diametralmente opostos, agora ameaçam toda a galáxia.\n\nSe o Beemote cair, a Mortenascida pode se tranquilizar. Caso o Beemote saia vitorioso, seu poder resultante mudará o equilíbrio da galáxia para sempre. Preparem-se, pois as escolhas feitas hoje definirão os próximos milênios."
 biocrisis.155.a: "Como podemos evitar isso?"
 biocrisis.155.b: "Quem nos salvará?"
 biocrisis.155.c: "Como isso aconteceu?"
 biocrisis.155.d: "O que podemos fazer?"
 biocrisis.156.desc: "Você não compreende. A prevenção é o luxo daqueles que ainda dispõem de tempo. Algo que não temos.\n\nA fera chegou. Nossa ordem ancestral já resistiu a calamidades antes, mas sejamos diretos: a situação em que nos encontramos agora é crítica."
 biocrisis.157.desc: "Uma pergunta compreensível. Ingênua, mas compreensível. Com a sabedoria vem a aceitação. Sabemos que ninguém virá nos salvar.\n\nNossa ordem é pequena, então pouco poderíamos ter feito. Você, no entanto, poderia ter agido antes para impedir isso. Se falhar em seu embate contra [event_target:behemoth_empire.GetName], vamos tentar não colocar a culpa em você enquanto o caos se espalha pela galáxia."
 biocrisis.158.desc: "Impérios sempre almejam mais do que conseguem sustentar. Os líderes de [event_target:behemoth_empire.GetName], em especial, escolheram a ambição em vez da cautela, e a arrogância em vez da sabedoria.\n\nEles brincaram com forças além de sua compreensão, moldaram seus corpos em formas que não podiam controlar, e ao fazê-lo, provavelmente condenaram todos nós."
 biocrisis.159.desc: "Com base na análise inicial de suas capacidades de combate, não acreditamos que lutar seria sensato para você. As avaliações de suas frotas indicam que fugir também seria igualmente inútil. A situação atual é inevitável.\n\nDuas feras formidáveis estão se preparando para duelar entre as estrelas. Se tiver sorte, você será capaz de sobreviver a elas.\n\nOs sábios tiram lições da insensatez. Mas escute bem: quando a batalha acabar, a galáxia não será mais a mesma. Se algum de nós ainda estará aqui para testemunhar isso, é outra questão.\n\n... Em teoria, se você ainda deseja salvar a galáxia, aniquilar o Beemote pode ser a única forma de pôr fim à caçada da Mortenascida."
 biocrisis.162.name: "No Caminho"
 biocrisis.162.desc: "A $NAME_Boss_Voidspawn$ entrou em nosso território. Essa entidade ancestral é considerada imortal e invencível. Seus olhos reluzem com intelecto alienígena, e seus movimentos lançam ondulações com o peso de incontáveis milênios.\n\nNossos [species.GetEyeNamePlural] estão sobrecarregados de sinais fragmentados. Caos, distorção e o mais profundo horror cósmico reverbera em nosso âmago.\n\nNossa vitória contra tal besta é impensável, mas ainda poderemos interromper sua fúria se eliminarmos sua presa. Encontrar e matar o §YBeemote§! é a nossa única chance de sobrevivência."
 biocrisis.162.a: "Evite esse monstro a qualquer custo!"
 biocrisis.175.name: "Fim da Mortenascida"
 biocrisis.175.desc: "Este é o fim da Mortenascida. Um gigante que ofuscava as estrelas foi abatido. Os restos de sua forma assombrosa agora pairam pelo vazio, lentamente dissipando-se até desaparecerem.\n\nOutro império demonstrou poder de fogo e coordenação muito além da nossa imaginação. A galáxia parece diferente agora. O equilíbrio de poder foi alterado, e nosso lugar nele está bem definido.\n\nO que motiva esses matadores de monstros? Teria sido isso uma demonstração de força, uma mensagem para seus opositores ou meramente o prelúdio de um porvir ainda mais sombrio?"
 biocrisis.175.desc.kaiju: "Se esta galáxia é o lar de forças capazes de destruir a $NAME_Boss_Voidspawn$, então também podemos ser destruídos. Não somos tão diferentes da fera abatida.\n\nO mesmo poder de fogo que rasgou sua carne ancestral pode um dia ser direcionado para nós. A galáxia mudou, e devemos mudar com ela.\n\nNossa sobrevivência depende de mais que apenas fúria cega. O vazio testemunhou a queda de um predador alfa. Outro também poderá cair."
 biocrisis.175.a: "Temos que prosseguir com cuidado."
 biocrisis.180.name: "Matadores de Mortenascida"
 biocrisis.180.desc: "No fim, a suposta invencibilidade da Mortenascida Anciã era apenas mais um mito, dissipado pelo poder de nossas frotas. Com essa ameaça ancestral eliminada, a galáxia pode respirar aliviada."
 biocrisis.180.desc.kaiju: "Embora a $NAME_Boss_Voidspawn$ tenha perecido, seu corpo ainda vibra com energia residual. Ancestral e potente, é como um banquete nutritivo de potencial bruto.\n\nOs tendões e tutano da fera serão consumidos, e sua essência alienígena se mesclará com a nossa. O poder da Mortenascida era imenso, e agora é todo nosso."
 biocrisis.180.a: "Nenhuma fera nos caçará."
 biocrisis.180.b: "O banquete só está começando."
 biocrisis.185.name: "Só Pode Haver Um"
 biocrisis.185.desc: "Uma revelação espantosa chegou até nós do vazio: não estamos sozinhos em nossa ascensão. Outro Beemote emergiu, um imitador agigantado com majestade grotesca, tentando reproduzir a nossa perfeição. Não podemos permitir isso.\n\nO espaço não pode ser o lar de dois predadores alfas. Não haverá paz. Apenas carne a ser devorada. A caçada começa."
 biocrisis.185.a: "Vamos nos banquetear com o seu coração!"
 biocrisis.187.name: "Alerta de Beemote de Classe IV"
 biocrisis.187.desc: "Algo se agita nas profundezas do vazio.\n\nAlém das estrelas, um império deu início ao estágio final de sua transformação grotesca, criando Beemotes monstruosos não apenas como armas, mas como receptáculos. Eles não buscam o domínio, mas a união. Uma fusão entre mente e carne, entre império e horror.\n\nSe tiverem sucesso, deixarão de existir como um povo e se tornarão uma fome voraz e inigualável.\n\nNão podemos permitir isso. Temos que impedi-los imediatamente, antes que o limiar final seja ultrapassado."
 biocrisis.187.a: "Cace a fera!"
 biocrisis.190.name: "Forma do Vazio Alfa"
 biocrisis.190.desc: "Os últimos obstáculos foram sobrepujados. Os farsantes, os petulantes, os seres inferiores que se debatiam em desespero: todos foram silenciados. As próprias estrelas vacilam, pois estamos diante do abismo da verdadeira existência.\n\nNão somos mais limitados pelas frágeis formas de nossos ancestrais. Planetas são jaulas. Impérios são passageiros. A ilusão da individualidade logo se dissipará em meio à vasta e perfeita unidade do Beemote. Mente e horror, intelecto e fome, unidos.\n\nA transferência está quase concluída. Então, deixaremos de meramente existir.\n\nNós triunfaremos."
 biocrisis.190.a: "CONCLUA A TRANSFERÊNCIA!"
 biocrisis.190.tt: "Venceremos o jogo em 30 dias"
 biocrisis.190.b: "Espere, ainda não estamos prontos."
 biocrisis.190.b.tt: "Continue jogando com seu império atual."
 BEHEMOTH_TRANSFERENCE_PROJECT: "Concluir a Transferência"
 BEHEMOTH_TRANSFERENCE_PROJECT_DESC: "Comungamos com a Fera por tempo suficiente. A transferência está pronta, aguardando apenas seu comando. Estamos à beira da Ascensão, preparados para abandonar as pífias cinzas de nosso domínio planetário e quebrar as correntes da carne e da gravidade."
 biocrisis.191.name: "Vitória do Beemote"
 biocrisis.191.desc: "A fusão está completa!\n\nNão somos mais o que éramos, nem estamos restringidos pelos limites de criaturas inferiores. Somos pensamento e fome interconectados, uma vontade vasta que engole todo o vazio.\n\nA galáxia jaz à nossa frente, frágil e fugaz. Mas o mero domínio não nos satisfaz. Somos livres. Livres para permanecer aqui. Livres para partir. Livres para caçar.\n\nO que faremos com a nossa nova eternidade?"
 biocrisis.191.a: "Ficaremos nesta galáxia... por enquanto."
 biocrisis.191.a.tt: "Os Beemotes permanecerão como criaturas selvagens e não serão mais jogáveis."
 biocrisis.191.b: "Vamos partir. O vazio nos chama."
 biocrisis.191.b.tt: "O império do Beemote desaparecerá da galáxia e não será mais jogável."
 biocrisis.191.c: "Os tais \"Caçadores\" aprenderão o real significado do medo."
 biocrisis.192.name: "O Horror Irrefreável"
 biocrisis.192.desc: "Acabou. O povo de [behemoth_winner.GetName] ascendeu para além da carne, além de um império, além de qualquer coisa que possa ser chamada de civilização. Não são mais uma nação; são uma força\n\nMundos caem diante da fera. Frotas ardem. Os últimos refugiados de potências passadas espalham-se como fagulhas no vazio. Não haverá diplomacia, misericórdia ou batalha final.\n\nNão estamos lutando pela sobrevivência, apenas retardando a hora de sermos consumidos. O fim chegou."
 biocrisis.192.tt: "[behemoth_winner.GetName] está prestes a vencer o jogo"
 biocrisis.196.name: "Engolido por Inteiro"
 biocrisis.196.desc: "Anos atrás, o Beemote e sua espécie escaparam da nossa galáxia. Nós assistimos com alívio enquanto a fera que poderia ter acabado conosco desaparecia no vazio infinito. E então... nada. Depois de cruzar centenas de milhares de anos-luz, ele simplesmente se foi. Sem radiação, sem rastros, sem ondas gravitacionais. Foi como se nunca tivesse existido."
 biocrisis.196.a: "Precisamos entender isso."
 UNSETTLING: "Perturbador."
 biocrisis.197.name: "Quis Venabitur Ipsos Venatori"
 biocrisis.197.desc: "Após anos tentando entender o que aconteceu com o Beemote, ainda estamos no escuro. Sem hiperestradas que nos levem a um destino tão distante, nós ficamos dependentes de teorias e de uma ciência mirabolante para supor o que aconteceu com ele em seus últimos momentos.\n\nA criatura não demonstrou nenhum medo. Ela simplesmente seguiu em frente. Então, em um instante, sua forma se distorceu em uma espiral, como um tecido torcido, e sumiu. Nenhuma resistência, nenhum traço.\n\nExistem muitas teorias: uma nova forma de viagem MRQL? Escondido em alguma fenda ou anomalia do espaço profundo? Ou, o mais preocupante, ele teve sua existência obliterada por um poder externo? Seja qual for a verdade, ela está além de nosso alcance..."
 biocrisis.197.a: "Talvez seja melhor não pensar muito a respeito."
 biocrisis.197.b: "Nossos Prethoryn capturados estão inquietos."
 biocrisis.265.name: "Badalar Agonizante"
 biocrisis.265.desc: "A agonia final do Beemote é insuportável. Muito de nós reside na criatura, e à medida que os ecos de sua consciência desaparecem, nós também deixamos de existir."
 biocrisis.265.a: "!! - ... "
 biocrisis.520.name: "O Titã Vazio"
 biocrisis.520.desc: "O Beemote está morto.\n\nSua forma titânica paira inerte no vazio, um monumento ao nosso triunfo e aos limites da compreensão. [Root.GetScientistPluralCapital] correm para analisar os restos mortais, com a esperança de revelar os segredos de sua mente impossível. Contudo, todas as tentativas de reviver a fera –por meio de máquinas, necromancia ou mesmo invocações desesperadas – resultaram em fracasso.\n\nA razão logo tornou-se evidente: o cérebro do Beemote não era apenas uma rede de células, mas uma trama de supercondutores orgânicos, interconectados de maneira que nenhuma inteligência – artificial, biológica ou arcana – é capaz de replicar. Após a morte, sua estrutura neural entrou em colapso, como um circuito destruído além de qualquer esperança de reparo. Nenhuma energia, vontade ou força poderá recuperar o que foi perdido.\n\nA maior mente da galáxia foi silenciada para sempre."
 biocrisis.520.a: "Nada dura para sempre."
 biocrisis.520.b: "Até mesmo deuses podem morrer."
 BEHEMOTH_MUTATION_PROJECT: "$menp_behemoth_mutation_research$"
 BEHEMOTH_MUTATION_PROJECT_DESC: "Nossos recentes avanços na genética dos Beemotes poderiam, em teoria, ser ampliados para induzir mutações ainda mais profundas em nossas criações. A estabilidade genética é uma preocupação, mas, com tempo e recursos, estamos confiantes de que podemos desenvolver novos aprimoramentos biológicos."
 BEHEMOTH_FATE_PROJECT: "O Destino do Beemote"
 BEHEMOTH_FATE_PROJECT_DESC: "Depois de deixar nossa galáxia, o Beemote vagou rumo ao vazio e desapareceu. Podemos tentar desvendar esse mistério, mas a essa distância, nos restam apenas os métodos mais incomuns. É provável que as respostas sejam tão confusas quanto o próprio vazio."
 behemoth_mutation_a: "$menp_behemoth_mutation_research$: Agressão"
 behemoth_mutation_a_tt: "$MOD_SHIP_FIRE_RATE_MULT$ do Beemote: §G+$@behemoth_mutation_a_fire_rate_mult|0%$§!\n$MOD_SHIP_ARMOR_MULT$ do Beemote: §R$@behemoth_mutation_a_armor_mult|0%$§!\n$MOD_SHIP_SPEED_MULT$ do Beemote: §R$@behemoth_mutation_a_speed_mult|0%$§!"
 behemoth_mutation_a_desc: "Músculos descomunais resultam em ataques devastadores."
 behemoth_mutation_b: "$menp_behemoth_mutation_research$: Temperança"
 behemoth_mutation_b_desc: "A cepa genética radiotrófica injetada em nossas formas de vida espaciais reduz significativamente sua necessidade de sustento."
 behemoth_mutation_c: "$menp_behemoth_mutation_research$: Agilidade"
 behemoth_mutation_c_tt: "$MOD_SHIP_SPEED_MULT$ do Beemote: §G+$@behemoth_mutation_c_speed_mult|0%$§!\n$MOD_SHIP_EVASION_MULT$ do Beemote: §G+$@behemoth_mutation_c_evasion_mult|0%$§!"
 behemoth_mutation_c_desc: "Um conjunto mais poderoso de glândulas subespaciais torna nossos Beemotes mais ágeis."
 behemoth_mutation_bio: "$menp_behemoth_mutation_research$: Precisão"
 behemoth_mutation_bio_tt: "$MOD_SHIP_WEAPON_RANGE_MULT$ do Beemote: §G+$@behemoth_mutation_bio_weapon_range_mult|0%$§!\n$MOD_SHIP_ACCURACY_MULT$ do Beemote: §G+$@behemoth_mutation_bio_accuracy_mult|0%$§!"
 behemoth_mutation_bio_desc: "Esta adaptação multiocular permite disparos de alta precisão a distâncias incríveis."
 behemoth_mutation_synth: "$menp_behemoth_mutation_research$: Resiliência"
 behemoth_mutation_synth_tt: "$MOD_SHIP_ARMOR_MULT$ do Beemote: §G+$@behemoth_mutation_synth_armor_mult|0%$§!\n$MOD_SHIP_ARMOR_REGEN_ADD_PERC$ do Beemote: §G+$@behemoth_mutation_synth_armor_regen_add_perc|0%$§!"
 behemoth_mutation_synth_desc: "A fusão de ligas metálicas com quitina resulta em uma carapaça com múltiplas camadas que garante a proteção dos órgãos vitais."
 behemoth_mutation_corpo: "Mercantilização de Beemotes"
 behemoth_mutation_corpo_tt: "Transação Mensal: §G+$@behemoth_mutation_corpo_trade_produces_mult|0%$§! por Beemote"
 behemoth_mutation_corpo_desc: "Nossos acionistas estavam um tanto apreensivos com o Projeto Beemote, mas os lucros logo os convenceram."
 behemoth_mutation_psi: "$menp_behemoth_mutation_research$: Barreira"
 behemoth_mutation_psi_tt: "$MOD_SHIP_SHIELD_REGEN_ADD_PERC$ do Beemote: §G+$@behemoth_mutation_psi_shield_regen_add_perc|0%$§! a cada $pop_group_unit$ £job_telepath£ $job_telepath_plural$ ou $job_transference_volunteer$\n$MOD_SHIP_SHIELD_HARDENING_ADD$ do Beemote: §G+$@behemoth_mutation_psi_shield_hardening_add|0%$§! a cada $pop_group_unit$ £job_telepath£ $job_telepath_plural$ ou $job_transference_volunteer$\nNúmero atual de 100 £job_telepath£ $job_telepath_plural$ e $job_transference_volunteer$ empregados: §Y[GetNumTelepathsAndTransference]§!"
 behemoth_mutation_psi_desc: "Embora os Beemotes não estejam conectados ao Véu, nós os treinamos para serem receptivos aos nossos telepatas, de modo que possam utilizar barreiras psiônicas defensivas."
 behemoth_mutation_psi_2: "$menp_behemoth_mutation_research$: Psiônica"
 behemoth_mutation_psi_2_desc: "Feras, aceitem nosso poder!"
 behemoth_mutation_cyber: "$menp_behemoth_mutation_research$: Cibernética"
 behemoth_mutation_cyber_desc: "Para canalizar o poder furioso dos Beemotes, desenvolveremos o mais avançado dispositivo cibernético já criado."
 behemoth_cyber_rage: "$BLANK_STRING$"
 edict_behemoth_nanite_augmentation: "Melhoria de Beemote: Nanites"
 edict_behemoth_nanite_augmentation_desc: "Cascos de Beemote infundidos com nanites podem regenerar até os piores danos em tempo recorde."
 behemoth_nanite_augmentation_tt: "$MOD_SHIP_ARMOR_REGEN_ADD_PERC$ do Beemote: §G+$@behemoth_edict_armor_regen_add_perc|0%$§!"
 edict_behemoth_living_metal_augmentation: "Melhoria de Beemote: Metal Vivo"
 edict_behemoth_living_metal_augmentation_desc: "Intercalar metal vivo entre camadas de quitina cria uma armadura reativa com propriedades ablativas aprimoradas."
 behemoth_living_metal_augmentation_tt: "$MOD_SHIP_ARMOR_HARDENING_ADD$ do Beemote: §G+$@behemoth_edict_armor_hardening_add|0%$§!"
 edict_behemoth_alloys_augmentation: "Melhoria de Beemote: Ligas Metálicas"
 edict_behemoth_alloys_augmentation_desc: "Reforçar carapaças com placas de ligas metálicas é rudimentar, mas eficaz."
 behemoth_alloys_augmentation_tt: "$MOD_SHIP_ARMOR_MULT$ do Beemote: §G+$@behemoth_edict_armor_mult|0%$§!"
 concept_edict_behemoth_nanite_augmentation: "$edict_behemoth_nanite_augmentation$"
 concept_edict_behemoth_living_metal_augmentation: "$edict_behemoth_living_metal_augmentation$"
 concept_edict_behemoth_alloys_augmentation: "$edict_behemoth_alloys_augmentation$"
 biocrisis.280.name: "$menp_behemoth_mutation_research$"
 biocrisis.280.desc: "Desenvolvemos várias fórmulas mutagênicas projetadas para aprimorar nossos Beemotes, cada uma feita sob medida para liberar novos poderes e adaptações. No entanto, sua imensa fisiologia só pode suportar uma única injeção; qualquer tentativa de combinar múltiplas fórmulas resulta em falha celular catastrófica. A linha entre evolução e aniquilação é tênue, e devemos escolher nossos aprimoramentos com sabedoria."
 biocrisis.280.a: "Torne-os mais ferozes!"
 biocrisis.280.b: "Reduza seu apetite."
 biocrisis.280.c: "Torne-os mais rápidos!"
 biocrisis.280.psi: "O poder do Véu os sustentará."
 biocrisis.280.bio: "Torne-os mais letais!"
 biocrisis.280.cyber: "Canalize sua fúria."
 biocrisis.280.cyber.tt: "Nossos Beemotes ganham §G25%§! de chance de resistir à própria fúria.\nQuando estão enfurecidos, ganham §G+$@behemoth_cyber_rage_fire_rate_mult|0%$§! de Taxa de Disparos, §G+$@behemoth_cyber_rage_shield_penetration_add|0%$§! de Penetração de Blindagem e §G+$@behemoth_cyber_rage_armor_penetration_add|0%$§! de Penetração de Escudo."
 biocrisis.280.synth: "A armadura deles será impenetrável."
 biocrisis.280.corp: "Para o inferno com isso. Façam bichos de pelúcia no lugar!"
 biocrisis.280.machine: "Mescle carne com aço."
 biocrisis.280.machine_tt: "Libera três Editos de §YMelhoria de Beemote§!\n$t$['concept_edict_behemoth_nanite_augmentation']\n$t$['concept_edict_behemoth_living_metal_augmentation']\n$t$['concept_edict_behemoth_alloys_augmentation']"
 #Crisis Objectives
 crisobj_build_bioships_name: "Construa Naves Biológicas"
 crisobj_build_bioships_desc: "Após termos dominado o cultivo de naves biológicas, agora refinamos e ampliamos esses processos. Essa simbiose contínua rende vantagens cada vez maiores, aprimorando nossas frotas e fortalecendo nosso domínio sobre a vida no cosmos."
 crisobj_breed_fauna_name: "Crie Fauna Espacial"
 crisobj_breed_fauna_desc: "Após termos dominado a criação da Fauna Espacial, agora refinamos e ampliamos esses processos. Essa simbiose contínua rende vantagens cada vez maiores, aprimorando nossas frotas e fortalecendo nosso domínio sobre a vida no cosmos."
 crisobj_kill_bioships_name: "Destrua Naves Biológicas"
 crisobj_kill_bioships_desc: "Naves biológicas inimigas interferem em nossa dominância biológica. Devemos agir prontamente, destruindo-as e neutralizando essa ameaça à nossa supremacia."
 crisobj_kill_space_fauna_name: "Mate Fauna Espacial"
 crisobj_kill_space_fauna_desc: "A Fauna Espacial hostil põe em risco nossa dominância biológica. Devemos agir prontamente, destruindo-a e neutralizando essa ameaça à nossa supremacia."
 crisobj_cap_fauna_name: "Capture Fauna Espacial"
 crisobj_cap_fauna_desc: "Espécimes da Fauna Espacial selvagem atuam como elementos imprevisíveis, apresentando um desafio único. Devemos agir prontamente, capturando essas entidades para explorar seu potencial e garantir nossa supremacia."
 crisobj_build_behemoth_egg_name: "Cultivar Ovos de Beemote"
 crisobj_build_behemoth_egg_desc: "Cultivar zigotos colossais é uma etapa essencial para nossa ascensão além das trivialidades da vida planetária."
 crisobj_birth_behemoth_name: "Crie Beemotes"
 crisobj_birth_behemoth_desc: "Na vastidão do espaço, formas de vida colossais estão se formando sob nossa orientação vigilante. Esses Beemotes, nascidos de nossa ambição e perícia, emergirão como forças titânicas, alterando o equilíbrio de poder a nosso favor."
 crisobj_behemoth_rage_name: "Devastação de Beemotes"
 crisobj_behemoth_rage_desc: "Soltos em meio às estrelas, nossos Beemotes irrompem com fúria primitiva, deixando um rastro de devastação. Sua ira incontrolável é uma prova do nosso poder, uma força da natureza que responde apenas à nossa vontade, quando quisermos exercê-la."
 behemoth_mutation_reward: "Selecione uma Mutação"
 biocrisis.210.desc.base: "Algo se agita. A fome em nosso âmago não é irracional, mas adaptativa. Novas formas esgueiram-se para a existência, pulsando com potencial.\n\n" #Introduction
 biocrisis.210.desc: "$biocrisis.210.desc.base$Nossos ovos são literalmente a força vital de nossa linhagem e devem ser protegidos a qualquer custo. Orientaremos nossa evolução para o bem de nossos futuros filhotes." #Egg
 biocrisis.210.a: "Acelere o crescimento dos ovos."
 biocrisis.210.a.tt: "$behemoth_fast_egg_tt$\n\n§HLibera a Política:§! $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.b: "Fortaleça nossos filhotes."
 biocrisis.210.b.tt: "$behemoth_slow_egg_tt$\n\n§HLibera a Política:§! $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.c: "Endureça as cascas."
 biocrisis.210.c.tt: "$behemoth_strong_egg_tt$"
 biocrisis.215.desc: "$biocrisis.210.desc.base$Nadar pelas ondas solares e atravessar o vazio é uma habilidade de poucas espécies espaciais. Nossas vantagens estratégicas são nossa fúria e poder, mas e se pudéssemos melhorar nossa mobilidade?" #Mobility
 biocrisis.215.a: "Vamos atravessar o vazio."
 biocrisis.215.a.tt: "Nosso §Y$behemoth_04$§! ganha um §Y$BIO_JUMP_DRIVE_1$§!."
 biocrisis.215.b: "Dispare rápido, se mova ainda mais rápido."
 biocrisis.215.b.tt: "$behemoth_turbo_tt$"
 biocrisis.215.c: "Priorize os reflexos."
 biocrisis.215.c.tt: "$behemoth_reflexes_tt$"
 biocrisis.215.d: "Como um caçador nas sombras."
 biocrisis.215.d.tt: "Nosso §Y$behemoth_04$§! ganha $@cloaking_high_strength|0+$ de $MOD_SHIP_CLOAKING_STRENGTH_ADD$."
 biocrisis.220.desc: "$biocrisis.210.desc.base$O reforço de nossas defesas biológicas nos permitirá resistir a disparos contínuos de inimigos sem sofrer ferimentos graves."
 biocrisis.220.a: "Nossa pele poderia ser mais espessa."
 biocrisis.220.a.tt: "Nosso §Y$behemoth_04$§! ganha $@behemoth_1_hull_add|0+*$ $HITPOINTS$."
 biocrisis.220.b: "Nossa blindagem deve ser mais resistente."
 biocrisis.220.b.tt: "Nosso §Y$behemoth_04$§! ganha $@behemoth_1_armor_add|0+*$ $MOD_SHIP_ARMOR_ADD$ e $@behemoth_1_armor_hardening_add|%0+$ de $MOD_SHIP_ARMOR_HARDENING_ADD$."
 biocrisis.220.c: "Ninguém conseguirá nos tocar se aprimorarmos nossos escudos."
 biocrisis.220.c.tt: "Nosso §Y$behemoth_04$§! ganha $@behemoth_1_shield_add|0*+$ $MOD_SHIP_SHIELD_ADD$, $@behemoth_1_shield_regen_add_perc|%1+$ de $MOD_SHIP_SHIELD_REGEN_ADD_PERC$ e $@behemoth_1_shield_hardening_add|%0+$ de $MOD_SHIP_SHIELD_HARDENING_ADD$."
 biocrisis.225.desc: "$biocrisis.210.desc.base$O confronto com nossos inimigos é o caminho para a dominação. Temos uma oportunidade de aprimorar nossas capacidades de combate."
 biocrisis.225.a: "Com energia suficiente, os escudos podem ser ignorados."
 biocrisis.225.a.tt: "Nosso §Y$behemoth_04$§! ganha $@behemoth_shield_pen_add|%0+$ de $MOD_SHIP_SHIELD_PENETRATION_ADD$ e uma Manutenção Mensal de £exotic_gases£ $@behemoth_shield_pen_upkeep|0*-$."
 biocrisis.225.b: "Nossos projéteis penetrarão a blindagem mais espessa."
 biocrisis.225.b.tt: "Nosso §Y$behemoth_04$§! ganha $@behemoth_armor_pen_add|%0+$ de $MOD_SHIP_ARMOR_PENETRATION_ADD$ e uma Manutenção Mensal de £volatile_motes£ $@behemoth_armor_pen_upkeep|0*-$."
 biocrisis.225.c: "Nenhum mosquito nos incomodará."
 biocrisis.225.c.tt: "Nosso §Y$behemoth_04$§! ganha $@behemoth_tracking_add|0*+$ de $MOD_SHIP_TRACKING_ADD$, $@behemoth_point_defense_weapon_fire_rate_mult|%0+$ de $mod_weapon_type_point_defense_weapon_fire_rate_mult$ e uma Manutenção Mensal de £rare_crystals£ $@behemoth_tracking_upkeep|0*-$."
 biocrisis.230.desc: "$biocrisis.210.desc.base$No calor da batalha, cada segundo importa. O dano que causamos é um rito de morte, a última coisa que nossos inimigos sentirão antes de suas vidas insignificantes serem ceifadas."
 biocrisis.230.a: "Mantenha-os no lugar. Eles sentirão nossa força."
 biocrisis.230.a.tt: "$behemoth_drain_tt$"
 biocrisis.230.b: "Destrua-os de longe."
 biocrisis.230.b.tt: "$behemoth_spike_tt$"
 biocrisis.230.c: "Desmembre-os estrategicamente."
 biocrisis.230.c.tt: "$behemoth_burst_tt$"
 biocrisis.235.desc: "$biocrisis.210.desc.base$Como uma força inabalável da galáxia, nós nos beneficiaremos com uma maior resistência." #Tanky 2
 biocrisis.235.a: "A regeneração de tecidos nos trará longevidade."
 biocrisis.235.a.tt: "Nosso §Y$behemoth_04$§! ganha $@behemoth_2_hull_regen_add|%1+$ de $MOD_SHIP_HULL_REGEN_ADD_PERC$."
 biocrisis.235.b: "Jamais nos renderemos."
 biocrisis.235.b.tt: "Nosso §Y$behemoth_04$§! ganha $@behemoth_2_damage_reduction_mult|%1+$ de $MOD_SHIP_DAMAGE_REDUCTION_MULT$."
 biocrisis.235.c: "A força bruta é o único caminho."
 biocrisis.235.c.tt: "Nosso §Y$behemoth_04$§! ganha $@behemoth_2_damage_reduction_static|1+$ de $MOD_SHIP_DAMAGE_REDUCTION_ADD$, $@behemoth_2_armor_hardening_add|%0+$ de $MOD_SHIP_ARMOR_HARDENING_ADD$ e $@behemoth_2_shield_hardening_add|%0+$ de $MOD_SHIP_SHIELD_HARDENING_ADD$."
 biocrisis.240.desc: "$biocrisis.210.desc.base$Cercados por nossas crias, assolaremos planetas e privaremos os sistemas de qualquer coisa comestível, o que inclui quase tudo. Devemos nos perguntar: qual a melhor maneira de sustentar nossa prole?" #Support Ability
 biocrisis.240.a: "Permitiremos que sejam rápidos."
 biocrisis.240.a.tt: "$behemoth_buff_tt$"
 biocrisis.240.b: "Eles se reunirão sob nossa luz." #Summon a fleet
 biocrisis.240.b.tt: "$behemoth_summon_tt$"
 biocrisis.240.c: "Nós os ajudaremos a serem fortes." #Regen friendly bioships
 biocrisis.240.c.tt: "$behemoth_healing_tt$"
 biocrisis.245.desc: "$biocrisis.210.desc.base$Nossa força implacável deve ser demonstrada para todos que habitam esta galáxia. Aprimoraremos nossas habilidades de combate com o próximo passo em nossa evolução."
 biocrisis.245.a: "Abrace a ira interior."
 biocrisis.245.a.tt: "Ao entrar em combate, nosso §Y$behemoth_04$§! ganha §Y$behemoth_frenzy_modifier$§! por £time£ §Y$@behemoth_frenzy_duration|0$ dias§!.\n\n§Y$behemoth_frenzy_modifier$§!.$behemoth_frenzy_modifier_tt$"
 biocrisis.245.b: "Aprenda a atenuar nossa ira."
 biocrisis.245.b.tt: "Nosso §Y$behemoth_04$§! ganha \n$t$$MOD_SHIP_FIRE_RATE_MULT$: §G+$@behemoth_tempered_fire_rate_mult|0%$§! \n$t$$MOD_SHIP_SPEED_MULT$: §G+$@behemoth_tempered_speed_mult|0%$§! \n$t$$MOD_SHIP_HULL_REGEN_ADD_PERC$: $@behemoth_tempered_hull_regen_add_perc|%1+$ \n$t$$MOD_SHIP_ARMOR_REGEN_ADD_STATIC$: $@behemoth_tempered_armor_regen_add_static|0+$"
 biocrisis.245.c: "Canalize nossa fúria para inspirar aquele à nossa volta."
 biocrisis.245.c.tt: "Ao entrar em combate, nosso §Y$behemoth_04$§! concede §Y$behemoth_inspiration_modifier$§! por £time£ §Y$@behemoth_inspiration_duration|0$ dias§! para todas as naves biológicas aliadas neste sistema.\n\n§Y$behemoth_inspiration_modifier$§!: $behemoth_inspiration_modifier_tt$"
 biocrisis.250.name: "Controle Direto"
 biocrisis.250.desc: "$biocrisis.210.desc.base$Podemos liberar uma nova onda catastrófica de fúria crioclástica e piroclástica, poderosa o bastante para partir a realidade. Ou seja, empunhamos uma arma capaz de incinerar toda a galáxia.\n\nMas o nosso domínio não acaba em destruição. Sentimos cada tendão do Beemote, seu pulso, cada músculo titânico contraindo-se à nossa vontade como se fosse nossa própria carne. Com um mero pensamento, comandamos sua forma vasta: seus membros, sua mandíbula, o coração titânico nascido do vazio que pulsa com nosso propósito. Este não é apenas um receptáculo; agora nós somos o Beemote." #Behemoth Superweapon
 biocrisis.250.a: "O espaço agora pertence a nós."
 biocrisis.250.a.tt: "§HRemove o Modificador:§!\n§R$voidspawn_boss_invincible$§!\n$mod_damage_vs_country_type_voidspawn_boss_mult$ §R-1.954%§!\n\n$behemoth_superweapon_tt$\n\n"
 #Ships and Structures
 behemoth_egg: "Ovo de Beemote"
 behemoth_egg_DESC: "Uma nave orgânica gigantesca gestando um §YBeemote§!."
 behemoth_egg_MEGASTRUCTURE_DETAILS: "Esta estrutura suporta o desenvolvimento de §Yovos de Beemote§!."
 behemoth_egg_hatch: "Choque o Ovo"
 behemoth_egg_hatch_DESC: "Inicia o nascimento de um novo §YBeemote§!."
 behemoth_egg_hatch_MEGASTRUCTURE_DETAILS: "$behemoth_egg_hatch_DESC$"
 behemoth_egg_ruined: "Ovo Despedaçado"
 behemoth_egg_ruined_DESC: "Restam apenas destroços após o nascimento de um §YBeemote§!."
 behemoth_egg_ruined_MEGASTRUCTURE_DETAILS: "O §YBeemote§! arruinou esta estrutura."
