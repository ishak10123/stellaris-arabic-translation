 thorough_inspections: "Inspeções Minuciosas"
 thorough_inspections_desc: "Devemos garantir que não ocorram mais incidentes durante o processo de produção de clones."
 swift_recovery: "Recuperação Rápida"
 swift_recovery_desc: "A produtividade é a nossa prioridade."
 well_adjusted: "Equilíbrio Mental"
 well_adjusted_desc: "Problemas emocionais devem ser a menor de nossas preocupações."
 strict_discipline: "Disciplina Rígida"
 strict_discipline_desc: "Trabalho duro e disciplina são a base de um cidadão exemplar."
 infinite_growth: "Crescimento Infinito"
 infinite_growth_desc: "Aumentaremos a produção de nossas indústrias, não importam os custos."
 clone_colonies: "Colônias de Clones"
 clone_colonies_desc: "Cidadãos duplicados podem acelerar o desenvolvimento da colônia."
 mutant_studies: "Estudos de Mutantes"
 mutant_studies_desc: "Manteremos os mutantes como cobaias e os usaremos para impulsionar a nossa compreensão das mutações."
 aspirational_striving: "Esforço Aspiracional"
 aspirational_striving_desc: "Indivíduos extraordinários devem ser vistos como exemplos: um ideal a ser alcançado!"
 militaristic_fortitude: "Fortitude Militarista"
 militaristic_fortitude_desc: "A excelência genética nos conduzirá à glória."
 replicated_success: "Sucesso Replicado"
 replicated_success_desc: "Essas habilidades extraordinárias não devem ser confinadas a uma minoria, mas compartilhadas entre todos os cidadãos."
 sewer_sweep: "Limpeza do Esgoto"
 sewer_sweep_desc: "Não sabemos o que rasteja lá embaixo... mas não gostamos nada."
 weaponized_plague: "Praga Instrumentalizada"
 weaponized_plague_desc: "Uma praga é uma ferramenta eficaz para reduzir o rebanho."
 biohacker_haven: "Paraíso dos Biohackers"
 biohacker_haven_desc: "Nosso governo trabalhará para desarticular restrições à modificação genética."
 limited_autonomy: "Autonomia Limitada"
 limited_autonomy_desc: "Manteremos alguma ordem e limitaremos o acesso a modificações biológicas sancionadas pelo governo."
 proactive_management: "Gerenciamento Proativo"
 proactive_management_desc: "Ciência teórica não é nada além de especulação. Nossos líderes devem concentrar-se em suas tarefas designadas."
 really_proactive_management: "$proactive_management$"
 really_proactive_management_desc: "Nosso império não tem espaço para trabalhadores desnecessários."
 #Hive Modifiers
 energetic_manipulation: "Manipulação Energética"
 energetic_manipulation_desc: "Aprimoramentos biológicos aumentam a eficiência."
 defensive_focus: "Foco em Defesa"
 defensive_focus_desc: "Nossa defesa vem em primeiro lugar. A força e a resiliência são o alicerce de nossos exércitos."
 grunt_retention: "Retenção de Subalternos"
 grunt_retention_desc: "Drones de todas as idades contribuem para nossas pesquisas e desenvolvimento tecnológico."
 assured_longevity: "Longevidade Garantida"
 assured_longevity_desc: "Com o aumento da coesão e do moral coletivo, nós priorizamos ativamente o nosso bem-estar."
 hyper_charged: "Hipercarregados"
 hyper_charged_desc: "Uma eficiência de transmissão neural aprimorada nos dá períodos mais intensos e curtos de produtividade."
 hyper_charged_wilderness: "$hyper_charged$"
 hyper_charged_wilderness_desc: "$hyper_charged_desc$"
 vitality_conservation: "Conservação de Vitalidade"
 vitality_conservation_desc: "Com os processos de melhoria refinados, devemos dedicar tempo para considerar o nosso bem-estar."
 accelerated_growth: "Crescimento Acelerado"
 accelerated_growth_desc: "A produtividade dispara conforme aumentamos nossa eficiência."
 interference_perseverance: "Perseverança contra Interferência"
 interference_perseverance_desc: "A colmeia resiste e se adapta à interferência neural. Mantemos a eficiência operacional, apesar do inconveniente."
 tandem_workers: "Trabalhadores Sincronizados"
 tandem_workers_desc: "Estamos aproveitando da melhor forma nossos atuais problemas de coordenação."
 mandated_integration: "Integração Compulsória"
 mandated_integration_desc: "A integração forçada de drones rebeldes sufocará qualquer rebelião."
 methodic_procreation: "Procriação Metódica"
 methodic_procreation_desc: "Estamos concentrando nossos esforços na otimização da tecnologia de clonagem e suas implicações éticas e sociais."
 genetic_diversification: "Diversificação Genética"
 genetic_diversification_desc: "Nós ponderamos coletivamente o futuro da nossa espécie, assumindo uma abordagem cuidadosa e calculada."
 hive_spa_day: "Repouso Revigorante"
 hive_spa_day_desc: "Vamos priorizar o bem-estar do nosso coletivo com um ano de repouso."
 cousin_of_death: "Sem Tempo para Parar"
 cousin_of_death_desc: "Não há tempo para descansar. Temos trabalho a fazer."
 positively_glowing: "Radiantes"
 positively_glowing_desc: "Descansamos, e agora estamos renovados."
 multi_functionality: "Multifuncionalidade"
 multi_functionality_desc: "A produtividade está aumentando e a versatilidade dos drones está elevada."
 optimized_workforce: "Força de Trabalho Otimizada"
 optimized_workforce_desc: "A colmeia está satisfeita, e se especializou de acordo com as habilidades."
 change_is_growth: "Mudança é Crescimento"
 change_is_growth_desc: "Crescer é mudar, e mudar é crescer. Estamos aprendendo em um ritmo acelerado."
 maintain_the_essence: "Essência Mantida"
 maintain_the_essence_desc: "Conforme continuamos a evoluir, não devemos esquecer quem somos. Estamos fortes e empenhados."
 strengthened_focus: "Foco Fortalecido"
 strengthened_focus_desc: "Os drones estão mais saudáveis e a colmeia está mais feliz."
 evolutionary_diversion: "Distração Evolutiva"
 evolutionary_diversion_desc: "Mudanças significativas agitaram a colmeia. Nosso foco agora deve ser a biomodificação segura."
 biological_corrections: "Correções Biológicas"
 biological_corrections_desc: "Não podemos permitir que anomalias genéticas maliciosas prejudiquem nossas aspirações para a mutação."
 cellular_degradation: "Degradação Celular"
 cellular_degradation_desc: "Devemos estar abertos a novas direções evolutivas."
 cellular_degradation_wilderness: "$cellular_degradation$"
 cellular_degradation_wilderness_desc: "$cellular_degradation_desc$"
 resilient_hive: "Consciência Resiliente"
 resilient_hive_desc: "Focaremos em características que aprimorem nossa resistência e adaptabilidade físicas, assegurando a sobrevivência da [GetGestaltEntityName] em ambientes hostis."
 cognizant_hive: "Consciência Avançada"
 cognizant_hive_desc: "Vamos priorizar a capacidade mental e coordenação de [GetIndividualNamePlural], promovendo uma melhor eficiência operacional e deliberativa."
 pristine_lineage: "Linhagem Imaculada"
 pristine_lineage_desc: "[GetIndividualNamePlural] de processamento e nódulos de liderança são priorizados."
 breed_for_growth: "Criados para o Crescimento"
 breed_for_growth_desc: "Nós escolhemos as características mais benéficas para a fertilidade e a produção de [GetIndividualNamePlural] saudáveis."
 breed_for_growth_wilderness: "$breed_for_growth$"
 breed_for_growth_wilderness_desc: "$breed_for_growth_desc$"
 relentless_focus: "Foco Implacável"
 relentless_focus_desc: "Não podemos correr o risco de alienar nossos interesses. A pureza é o nosso objetivo; todo o resto é descartável."
 infrastructural_bolstering: "Reforço Infraestrutural"
 infrastructural_bolstering_desc: "Os meios de produção da [GetGestaltEntityName] não devem ser prejudicados pela nossa busca pela pureza."
 anomaly_purging: "Expurgo de Anomalias"
 anomaly_purging_desc: "Não devemos brincar com o acaso. Qualquer resultado acidental deve ser eliminado imediatamente."
 anomaly_purging_wilderness: "$anomaly_purging$"
 anomaly_purging_wilderness_desc: "$anomaly_purging_desc$"
 rigorous_examination: "Análise Rigorosa"
 rigorous_examination_desc: "Algumas dessas supostas impurezas podem ser benéficas para a [GetGestaltEntityName]. Não devemos erradicá-las tão precipitadamente."
 rigorous_examination_wilderness: "$rigorous_examination$"
 rigorous_examination_wilderness_desc: "$rigorous_examination_desc$"
 population_relocation: "Realocação Populacional"
 population_relocation_desc: "Podemos equilibrar a possível pressão gerada sobre a colmeia pelo crescimento populacional dos clones ao realocar cidadãos excedentes."
 factotum_reserves: "Factótuns Reservas"
 factotum_reserves_desc: "A produção de energia da colmeia será reforçada por clones trabalhadores versáteis."
 simple_minds: "Mentes Simples"
 simple_minds_desc: "A colmeia se deleita com as qualidades reconfortantes de algumas mentes simples."
 the_new_batch: "Clones: O Novo Lote"
 the_new_batch_desc: "Vai-se o antigo lote, chega o novo."
 metaphysical_hive: "Colmeia Metafísica"
 metaphysical_hive_desc: "Refletimos sobre a natureza da existência e do propósito, mesmo que isso cause dissonância."
 metaphysics_rejected: "Metafísica Rejeitada"
 metaphysics_rejected_desc: "Questões metafísicas são distrações da mente solitária. Nosso propósito não está na reflexão existencial, mas em viver como um só."
 boosted_neurology: "Neurologia Impulsionada"
 boosted_neurology_desc: "Já refletimos por tempo demais. Devemos nos comprometer com a transformação de nossa espécie, independentemente de possíveis obstáculos."
 balanced_advancement: "Avanço Equilibrado"
 balanced_advancement_desc: "Nossos experimentos com mutações não precisam alterar a forma como estamos conectados."
 rage_quitting: "Explosão de Raiva"
 rage_quitting_desc: "A agressão imprudente não tem espaço na colmeia."
 fury_embracing: "Aceitação da Fúria"
 fury_embracing_desc: "Nós abraçamos o misterioso caos do futuro."
 decisive_meditation: "Meditação Decisiva"
 decisive_meditation_desc: "Escolhemos primeiramente aceitar a natureza conturbada de nossa consciência, para depois adotarmos, juntos, uma perspectiva geral mais equilibrada."
 meteorological_adaptations: "Adaptações Meteorológicas"
 meteorological_adaptations_desc: "Temos que dedicar tempo e recursos para elevar nossa resiliência climática."
 body_builders: "Halterofilistas"
 body_builders_desc: "A força física é o pináculo da evolução."
 deep_thinkers: "Filósofos"
 deep_thinkers_desc: "É a nossa capacidade de refletir profundamente que nos sustém."
 sensible_supremacy: "Supremacia Sensata"
 sensible_supremacy_desc: "Podemos ser intrépidos e cautelosos ao mesmo tempo."
 decisive_termination: "Extermínio Decisivo"
 decisive_termination_desc: "Para conter o surto de praga, vamos exterminar os enfermos."
 survival_study: "Estudo de Sobrevivência"
 survival_study_desc: "O estudo cuidadoso de [GetIndividualNamePlural] doentes nos levará à cura da praga."
 survival_study_wilderness: "$survival_study$"
 survival_study_wilderness_desc: "$survival_study_desc$"
 uncorrected_blunders: "Erros Não Corrigidos"
 uncorrected_blunders_desc: "Talvez tenhamos falhado em verificar novamente nossos cálculos."
 maverick_citizens: "Cidadãos Independentes"
 maverick_citizens_desc: "Se você não fez nada de errado, não tem nada a temer."
 #Advanced Governments
 #Purity
 bio.170.name: "Pureza: Reforma do Governo?"
 bio.170.desc: "Nossa espécie está diante de sua próxima grande fronteira. Temos uma escolha a fazer.\n\nVamos abraçar o nosso destino, purificando nossa linhagem genética para elevar nossa civilização a novos patamares de excelência genética? Ou preservaremos as lições do passado e continuaremos com a nossa forma atual e inalterada?"
 bio.170.a: "Vamos abraçar a pureza e alcançar novos patamares!"
 bio.170.a.tt: "$change_auth_tt$[GetPurityAuthority]"
 bio.170.b: "Não precisamos mudar a nossa forma de governo."
 #Cloning
 bio.175.name: "Clonagem: Reforma do Governo?"
 bio.175.desc: "Nossa espécie encontra-se em um momento crucial. Temos uma decisão a tomar.\n\nVamos abraçar o nosso destino e explorar o poder da clonagem, transformando-nos definitivamente em uma civilização de replicada perfeição? Ou assimilaremos as lições aprendidas até então e persistiremos com nossa desnecessária diferenciação?"
 bio.175.a: "Vamos abraçar a clonagem como caráter essencial de nosso futuro."
 bio.175.a.tt: "$change_auth_tt$[GetCloningAuthority]\n$LEADERS_GAIN_CLONES$"
 bio.175.b: "$bio.170.b$"
 #Mutation
 bio.180.name: "Mutação: Reforma do Governo?"
 bio.180.desc: "Estamos diante de um paradigma biológico fundamental. Temos uma escolha importante a fazer.\n\nPodemos abraçar o nosso destino ao explorar o poder das mutações biológicas avançadas, transformando definitivamente a nossa civilização por meio da evolução deliberada do nosso código genético. Por outro lado, podemos preservar as lições que aprendemos até então e continuar com a nossa forma atual e mundana."
 bio.180.a: "Podemos ser tudo o que queremos ser."
 bio.180.a.tt: "$change_auth_tt$[GetMutationAuthority]"
 bio.180.b: "$bio.170.b$"
