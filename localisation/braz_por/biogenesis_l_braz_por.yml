 #STAGE EVENTS
 bio.25.name: "Desenvolvimento Coletivo" #STAGE ONE
 bio.25.desc.no_options: "Nossa entidade política, [owner.GetGovernmentName], está se transformando. Estamos prestes a concretizar todo o nosso potencial, cientes de que tal esforço pode alterar fundamentalmente a nossa essência. O planejamento da nossa própria evolução é uma tarefa de profunda significância. As alterações que implementarmos afetarão nosso futuro em longo prazo."
 bio.25.desc.has_options: "$bio.25.desc.no_options$\n\nTemos que escolher um foco para o primeiro estágio de nosso desenvolvimento."
 bio.25.a: "$bio.5.a$"
 bio.25.b: "$bio.5.b$"
 bio.25.c: "$bio.5.c$"
 bio.30.name: "Convergência da Colmeia" #STAGE TWO
 bio.30.desc.no_options: "O planejamento da nossa própria evolução trouxe uma mudança significativa. Agora temos uma melhor compreensão das características genéticas, da reprodução e do sequenciamento do DNA.\n\nO auge do nosso trabalho está ao nosso alcance.\n\nEm breve, nos tornaremos aquilo que fomos destinados a ser."
 bio.30.desc.has_options: "$bio.30.desc.no_options$ Temos uma oportunidade para continuar em nosso caminho atual, ou escolher um novo foco."
 bio.30.a: "$bio.10.a$"
 bio.30.b: "$bio.10.b$"
 bio.30.c: "$bio.10.c$"
 bio.35.name: "Coalescência Evolutiva" #STAGE THREE
 bio.35.desc.no_options: "Estamos à beira de uma revolução evolutiva considerável. Agora, precisamos tomar uma decisão crucial quanto ao caminho que devemos seguir para concretizar todo o nosso potencial evolutivo."
 bio.35.desc.has_options: "$bio.35.desc.no_options$\n\nMais uma vez, temos que escolher quais são as nossas prioridades."
 bio.35.a: "$bio.15.a$"
 bio.35.b: "$bio.15.b$"
 bio.35.c: "$bio.15.c$"
