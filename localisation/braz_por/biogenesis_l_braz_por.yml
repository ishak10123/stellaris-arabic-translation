 concept_genetic_purity: "Perfeição Genética de Espécie"
 concept_genetic_purity_desc: "Autoridades que abraçaram a ['tradition_category:tradition_purity'] têm efeitos e modificadores escalonáveis que se aplicam aos seus £pop£ §HPops Orgânicos§! e £leader£ §HLíderes§!.$TABBED_NEW_LINE$- Aumenta ao gastar Pontos de Característica em Características de Espécie §GPositivas§!.$TABBED_NEW_LINE$- Diminui ao ganhar Pontos de Característica de Características de Espécie §RNegativas§!."
 trait_leader_genetic_purist: "Purista Genético"
 trait_leader_genetic_purist_desc: "O trabalho deste líder é guiado por uma visão inabalável da perfeição genética, e pela intolerância a respeito da imperfeição em todas as suas formas."
 auth_bio_democratic_purity: "Autonomia Fenotípica"
 auth_bio_democratic_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £mod_pop_happiness£ $MOD_POP_HAPPINESS$: $plus_minus_icon$§Y$@purity_traits_happiness|1%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $mod_leaders_upkeep_mult$ $minus_plus_icon$§Y2.5%§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$ $plus_minus_icon$§Y2.5%§!"
 auth_bio_democratic_purity_desc: "A autonomia corporal é um direito. O Estado dá poderes aos indivíduos para que modifiquem seus corpos como desejarem. Limitado apenas pela imaginação, o corpo torna-se uma tela em branco."
 auth_bio_oligarchic_purity: "Hierarquia Eugênica"
 auth_bio_oligarchic_purity_tt: "$eugenic_political_power_effects$"
 auth_bio_oligarchic_purity_desc: "O poder absoluto deve ser confiado a uma elite geneticamente nomeada, os guardiões mais puros e aptos do destino desta civilização. Abaixo deles, todos os cidadãos desempenham um papel predefinido, feito sob medida para o seu potencial genético herdado. A felicidade não se encontra na ambição, mas na aceitação do propósito que lhe foi atribuído."
 eugenic_political_power_effects: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $MOD_POP_BONUS_WORKFORCE_MULT$: $plus_minus_icon$§Y$@purity_traits_bonus_workforce_mult|2%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: $plus_minus_icon$§Y$@purity_traits_council_speed|Y1%$§!"
 auth_bio_dictatorial_purity: "Judiciário Nucleico"
 auth_bio_dictatorial_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$£society£ Pesquisa de Sociedade produzida a cada $pop_group_unit$ £pop£ Pops: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $MOD_PLANET_CRIME_ADD$ no Planeta: $minus_plus_icon$§Y5.0§! $TABBED_NEW_LINE$- $MOD_PLANET_CRIME_ADD$ no Setor: $minus_plus_icon$§Y2.5§! $TABBED_NEW_LINE$- $MOD_PLANET_STABILITY_ADD$ no Planeta: $plus_minus_icon$§Y5.0§! $TABBED_NEW_LINE$- $MOD_PLANET_STABILITY_ADD$ no Setor: $plus_minus_icon$§Y2.5§!"
 auth_bio_dictatorial_purity_desc: "Este governo utiliza dados genéticos e biométricos como ferramentas para a justiça preventiva, averiguando o código genético de todos os cidadãos à procura de predisposições criminosas. Ao intervir antes da transgressão, ele garante a ordem por meio da supervisão meticulosa. A verdadeira justiça não busca a reação, mas a prevenção, protegendo a sociedade ao arrancar o crime pela raiz."
 auth_bio_imperial_purity: "Domínio Biótico"
 auth_bio_imperial_purity_tt: "Efeitos de £leader£ §Y$imperial_ruler$§! e §YHerdeiro§! da ['concept_genetic_purity']: $TABBED_NEW_LINE$- $MOD_LEADER_SKILL_ADD$: $plus_minus_icon$§Y$@purity_traits_imperial_level|2$§! $DOUBLE_NEW_LINE$£leader£ Líderes da mesma §Yespécie de nosso(a) [Ruler.GetTitle]§! recebem a característica §Y$imperial_bloodline$§!\n£leader£Efeitos de  §YLinhagem Imperial§! da ['concept_genetic_purity']: $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_MULT$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§!"
 auth_bio_imperial_purity_desc: "Ao promover a excelência genética, este governo prolonga a expectativa de vida de seus líderes enquanto busca implacavelmente a perfeição biótica. A prosperidade social depende da sobrevivência e propagação apenas dos melhores genes, garantindo um futuro determinado pela superioridade. A manutenção rigorosa do acervo genético fundamenta o progresso, e a longevidade e a perfeição são as maiores recompensas."
 auth_bio_corporate_purity: "Sindicato Orgânico"
 auth_bio_corporate_purity_tt: "$organic_leaders_have_trade_upkeep$\n\n$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $r_trade$ Produzido a cada $pop_group_unit$ £pop£ Pops: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_corporate_purity_desc: "Esta megacorporação aperfeiçoou a mercantilização da própria vida, cultivando órgãos com fins lucrativos. Preços mais elevados são cobrados pelos órgãos de qualidade premium, enquanto ativos \"redundantes\" podem acabar indo parar no mercado clandestino. Intermediários obscuros e cirurgiões clandestinos prosperam, atendendo às demandas de compradores desesperados e garantindo que nenhum recurso seja desperdiçado."
 #Cloning
 auth_bio_democratic_cloning: "Multiplicidade Harmoniosa"
 auth_bio_democratic_cloning_tt: "$ENABLES_BACKUP_CLONES$\nManutenção de §Y$leader_trait_backup_clone_default$§!: §G$@cordant_multiplicity_clone_upkeep|0%$§!\n§Y$leader_trait_backup_clone_default_plural$§! têm menor [‘concept_clone_leader_degradation', Degradação] e não podem ter §Y$leader_trait_has_backup_clone_plural$§!"
 auth_bio_democratic_cloning_desc: "Este governo abraça a tecnologia de clonagem como um testamento da igualdade e do progresso. Clones e indivíduos nascidos naturalmente vivem lado a lado, e cada voz tem o mesmo valor. A vontade do povo é fortalecida pelas diversas perspectivas, sejam elas de clones ou não."
 auth_bio_oligarchic_cloning: "Regência Replicante"
 auth_bio_oligarchic_cloning_tt: "$ENABLES_BACKUP_CLONES$\nA característica §Y$leader_trait_has_backup_clone$§! fornece efeitos adicionais para Conselheiros\n§Y$leader_trait_backup_clone_default_plural$§! têm menor ['concept_clone_leader_degradation', Degradação] quando estão no Conselho\n"
 auth_bio_oligarchic_cloning_desc: "Esta sociedade garante o eterno reinado de suas elites ao consolidar o poder nas mãos da linhagem ininterrupta de clones superiores. A tecnologia de clonagem preserva e aperfeiçoa seu legado genético, permitindo a continuidade natural da liderança. Cada cargo de influência é ocupado por uma versão melhorada de uma mesma genealogia exaltada, solidificando sua dominância por muitas gerações."
 auth_bio_dictatorial_cloning: "Submissão Homogênea"
 auth_bio_dictatorial_cloning_tt: "$ENABLES_BACKUP_CLONES$\n$AVAILABLE_POLICIES$ §Y$policy_homogenous_class$§!"
 auth_bio_dictatorial_cloning_desc: "A lealdade absoluta é garantida por meio de uma meticulosa seleção genética, e apenas aqueles programados para a obediência inquestionável são escolhidos como clones. Isso gera uma sociedade autossustentável onde a rebelião não é apenas improvável: ela é biologicamente impossível, assegurando a harmonia inabalável graças à própria essência de seus cidadãos."
 auth_bio_imperial_cloning: "Continuidade Hereditária"
 auth_bio_imperial_cloning_tt: "$ENABLES_BACKUP_CLONES$\nA característica §Y$leader_trait_backup_clone_imperial$§! não pode aumentar as penalidades"
 auth_bio_imperial_cloning_desc: "A retidão inquestionável do governante é preservada por meio da clonagem, e cada iteração do grande soberano herda a sabedoria e os triunfos de suas vidas passadas. Essa continuidade fluida de liderança garante o avanço ininterrupto da sociedade, conservando uma eterna era de ouro sob um reinado esclarecido."
 auth_bio_corporate_cloning: "Associação Replicadora"
 auth_bio_corporate_cloning_tt: "$organic_leaders_have_trade_upkeep$\n$ENABLES_BACKUP_CLONES$\n$mod_planet_jobs_trade_produces_mult$ de £building£ ['building:building_clone_vats']: §G+$@replicatory_association_trade_mult|0%$§!\n£mod_planet_amenities_add£ Confortos Planetários de £building£ §Y$building_clone_vats$§!: §G+$@replicatory_association_amenities_add|0$§!\n$AVAILABLE_POLICIES$ §Y$policy_replicatory_association_insurance$§!"
 auth_bio_corporate_cloning_desc: "Conveniência e conforto inigualáveis estão agora ao seu alcance. Adquira um clone próprio para ter órgãos reservas ou encomende uma réplica de um ente querido falecido. Esta megacorporação garante uma taxa de acurácia de 93% em cada duplicação, mesclando tecnologia de última geração com a promessa de consolação por meio da replicação."
 AUTHORITY_HAS_CLONE: "$t$Após a §YMorte do Governante§!, um §Y$leader_trait_backup_clone_imperial$§! torna-se o novo Governante. $TABBED_NEW_LINE$§Y$leader_trait_backup_clone_imperial_plural$§! têm menor ['concept_clone_leader_degradation', Degradação]."
 policy_replicatory_association_insurance: "Seguro Replicante"
 policy_replicatory_association_insurance_desc: "O acesso prioritário a clones é garantido a membros da Diretoria e outros funcionários selecionados como parte de suas bonificações."
 replicatory_association_insurance_stellar: "Seguro Estelar"
 replicatory_association_insurance_stellar_name: "$replicatory_association_insurance_stellar$"
 replicatory_association_insurance_stellar_desc: "$leader_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\n§Y$leader_trait_has_backup_clone_plural$§! de §YLíderes§! têm menor ['concept_clone_leader_degradation', Degradação]"
 replicatory_association_insurance_platinium: "Seguro Platina"
 replicatory_association_insurance_platinium_name: "$replicatory_association_insurance_platinium$"
 replicatory_association_insurance_platinium_desc: "$councilor_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\n§Y$leader_trait_has_backup_clone_plural$§! de §YLíderes§! têm menor ['concept_clone_leader_degradation', Degradação]"
 replicatory_association_insurance_basic: "Seguro Básico"
 replicatory_association_insurance_basic_name: "$replicatory_association_insurance_basic$"
 replicatory_association_insurance_basic_desc: "$ruler_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\n§Y$leader_trait_has_backup_clone_plural$§! do §YGovernante do Império§! têm menor ['concept_clone_leader_degradation', Degradação]"
 leader_upkeep_skill_header_energy: "Manutenção de $i_energy$ de £leader£ Líder por Nível de Habilidade:"
 councilor_upkeep_skill_header_energy: "Manutenção de $i_energy$ de £leader£ Conselheiro por Nível de Habilidade:"
 ruler_upkeep_skill_header_energy: "Manutenção de $i_energy$ de £leader£ Governante por Nível de Habilidade:"
 policy_homogenous_class: "Edição Genética"
 policy_homogenous_class_desc: "A edição cuidadosa do genoma de base usado para manter os clones de nossos líderes permite a otimização de um quadro selecionado."
 homogenous_class_scientists: "Códice Científico"
 homogenous_class_scientists_name: "$homogenous_class_scientists$"
 homogenous_class_scientists_desc: "Efeitos para §Y$leader_trait_has_backup_clone_plural$§! de $scientist_plural_with_icon$: $TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- Têm menor ['concept_clone_leader_degradation', Degradação]"
 homogenous_class_officials: "Registros Administrativos"
 homogenous_class_officials_name: "$homogenous_class_officials$"
 homogenous_class_officials_desc: "Efeitos para §Y$leader_trait_has_backup_clone_plural$§! de $official_plural_with_icon$: $TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- Têm menor ['concept_clone_leader_degradation', Degradação]"
 homogenous_class_commanders: "Protocolos Marciais"
 homogenous_class_commanders_name: "$homogenous_class_commanders$"
 homogenous_class_commanders_desc: "Efeitos para §Y$leader_trait_has_backup_clone_plural$§! de $commander_plural_with_icon$: $TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- Têm menor ['concept_clone_leader_degradation', Degradação]"
