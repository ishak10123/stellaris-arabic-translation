 #Mutation
 auth_mutation_habitability_tt: "Espécies Orgânicas podem alcançar §G175%§! de Habitabilidade"
 auth_bio_democratic_mutation: "Liberdade Biodiversificada"
 auth_bio_democratic_mutation_desc: "Esta sociedade defende o princípio de que o corpo de cada indivíduo é um templo, e está sob seu total controle e vontade. Dentro de um sistema de liberdade e apoio incondicional, os cidadãos podem concretizar seus potenciais individuais, moldando seu futuro e a si mesmos como bem entenderem."
 auth_bio_oligarchic_mutation: "Comando Catalítico"
 auth_bio_oligarchic_mutation_desc: "O poder é concentrado nas mãos de uma elite dotada de mutações genéticas superiores, conferindo-lhes uma autoridade inigualável. Atuando além dos limites da lei comum, esses indivíduos usam suas habilidades para proteger e guiar a sociedade, tomando qualquer ação necessária para garantir sua sobrevivência e prosperidade."
 auth_bio_dictatorial_mutation: "Mandato Híbrido"
 auth_bio_dictatorial_mutation_desc: "Esta sociedade determina que a mutação genética é a base do seu avanço. Aqueles que preferem permanecer como a natureza os criou enfrentam a detenção ou eliminação imediatas, garantindo que apenas indivíduos geneticamente superiores contribuam para a busca incansável da espécie pela perfeição."
 auth_bio_dictatorial_mutation_tt: "\n£crime£ Crime de [enforcer.GetIcon] [enforcer.GetNamePlural]: §G-5§!\n$auth_mutation_habitability_tt$"
 auth_bio_imperial_mutation: "Expansionismo Genômico"
 auth_bio_imperial_mutation_desc: "Ao abraçar o poder imprevisível da mutação aleatória, este império alcança um potencial inédito, promovendo inovações e habilidades que métodos tradicionais nunca seriam capazes de conquistar. Na corrida pela dominância, o caos da mutação se torna sua maior vantagem, impulsionando-os para a supremacia incontestável."
 auth_bio_corporate_mutation: "Usura de Órgãos"
 auth_bio_corporate_mutation_desc: "Sob esta autoridade, o financiamento de órgãos e partes do corpo é acessível a todos por meio de planos de pagamento flexíveis. Parcelas atrasadas resultam na rápida apreensão de bens ou perda da garantia acordada. Esse sistema garante um ciclo contínuo de oferta e procura, onde cada parte do corpo é, ao mesmo tempo, uma mercadoria e um compromisso."
 auth_bio_corporate_mutation_tt: "$organic_leaders_have_trade_upkeep$\n$r_trade$ a cada $pop_group_unit$ £pop£ Pops com ['trait:trait_spare_organs']: §G+0.5§!\n$auth_mutation_habitability_tt$"
 auth_bio_democratic_evopred: "Eleitorado Genético"
 auth_bio_democratic_evopred_desc: "Embora difícil de gerenciar, esta sociedade conquistou um domínio parcial sobre seu genoma maleável. O povo decidirá como suas mutações se manifestarão."
 auth_bio_democratic_evopred_tt: "$auth_bio_evopred_tt$\nAdiciona ['concept_genetic_electorate_effect', efeitos] adicionais aos ['trait:trait_malleable_genes'] com base na ['concept_faction'] mais forte.\nAumenta o Progresso de ['concept_adaptive_evolution'] de §YEspécies§! alienígenas que são escravos ou em condições superiores em §G+100%§!"
 auth_bio_oligarchic_evopred: "Biomagnatas"
 auth_bio_oligarchic_evopred_desc: "Nesta sociedade, o conceito de tempo foi conquistado. Ao selecionar meticulosamente apenas o material genético mais puro, as elites dominantes ascendem a uma existência atemporal. No entanto, um único deslize pode significar a perda da imortalidade, e para aqueles em condições piores, ambição e evolução são duas faces da mesma moeda..."
 auth_bio_oligarchic_evopred_tt: "$auth_bio_evopred_tt$\nConselheiros são §YImortais§!"
 auth_bio_dictatorial_evopred: "Principado Alfa"
 auth_bio_dictatorial_evopred_desc: "Uma civilização moldada pela evolução constante, governada por uma mente suprema. Nenhum conselho ou constituição pode superar a vontade superior do Principado. Aqui, cada conquista genética impulsiona a ascensão do trono."
 auth_bio_dictatorial_evopred_tt: "$auth_bio_evopred_tt$\nCaracterística de Governante: ['leader_trait:trait_ruler_apex_predator']"
 apex_predator_male: "$trait_ruler_apex_predator$"
 apex_predator_female: "$trait_ruler_apex_predator$"
 auth_bio_imperial_evopred: "Dinastia Imortal"
 auth_bio_imperial_evopred_desc: "Na $auth_bio_imperial_evopred$, o passado não descansa: ele é consumido. Cada geração nutre a próxima, pois os restos de líderes falecidos sustentam o domínio eterno do império. Servir é sacrificar, e na morte todos os súditos alimentam o legado de seus antepassados."
 eternal_ancestor_male: "Ancestral Eterno"
 eternal_ancestor_female: "Ancestral Eterna"
 auth_bio_imperial_evopred_tt: "$auth_bio_evopred_tt$\nPermite ao governante consumir Grandes Líderes quando eles falecem."
 auth_bio_corporate_evopred: "BioPredação Ltda" #Galactic Limited Incorporated
 auth_bio_corporate_evopred_desc: "Na BioPredação Ltda, adaptação é essencial – tanto genética quanto econômica. A cada novo genoma adicionado ao portfólio corporativo, a Megacorporação aprimora sua posição no mercado, ajustando produtos e negociações à biologia única de cada espécie. Afinal, compreender a natureza do cliente torna cada transação quase... instintiva."
 auth_bio_corporate_evopred_tt: "$auth_bio_evopred_tt$\n$organic_leaders_have_trade_upkeep$\nEficácia de Pacto Comercial por Característica de Espécie: §G+1%§!\nAumenta o progresso de ['concept_adaptive_evolution'] de §YPactos Comerciais§! em §G+100%§!"
 auth_bio_hive_mind_evopred: "Consciência Quimérica"
 auth_bio_hive_mind_evopred_desc: "Esta Mente-Colmeia já não se contenta apenas com a autotransformação. Cada nova colônia se integra ao seu tecido vivo, em uma fusão de mutação contínua entre paisagem e carne. À medida que as fronteiras se dissipam na Consciência Quimérica, criaturas e mundos tornam-se um só."
 auth_bio_hive_mind_evopred_tt: "$auth_bio_evopred_tt$\nTerraforma automaticamente colônias em §YMundos-Colmeia§!\nAumenta o Progresso de ['concept_adaptive_evolution'] ao expurgar §YEspécies§! alienígenas em §G+100%§!"
 auth_bio_evopred_tt: "$EMPIRE_SIZE$ de Pops por Característica de Espécie: §G-1%§!\n$auth_mutation_habitability_tt$"
 #Hive Advanced Authorities
 auth_bio_hive_purity: "Paradigma de Pureza"
 auth_bio_hive_purity_desc: "Esta colmeia prospera com a pureza genética absoluta, garantindo que cada drone siga um modelo biológico ideal. A manipulação genética exata amplia a união e fortalece o coletivo, criando uma força irrefreável moldada para a eficiência e sobrevivência."
 auth_bio_hive_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £unity£ $unity$ produzida a cada $pop_group_unit$ £pop£ Pops: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_hive_cloning: "Horda Replicante"
 auth_bio_hive_cloning_desc: "A tecnologia de clonagem avançada impulsiona a produção incansável de drones geneticamente idênticos, cada um projetado para a perfeita eficiência e união. Obedecendo ao mandamento inato para avançar e multiplicar-se, esta colmeia pretende ofuscar as estrelas."
 auth_bio_hive_cloning_tt: "$ENABLES_BACKUP_CLONES$\nA ['concept_clone_leader_degradation', Degradação de Clone] é reduzida pela £society£ ['technology:tech_node_culling_1']"
 tech_node_culling_1_cloning: "$tech_node_culling_1$"
 tech_node_culling_1_cloning_desc: "$tech_node_culling_1_desc$"
 REDUCED_CLONE_DEGRADATION_TITLE: "§HLibera o Recurso:§! Degradação de Clone Reduzida"
 REDUCED_CLONE_DEGRADATION_DESC: "§Y$leader_trait_backup_clone_default_plural$§! têm ['concept_clone_leader_degradation', Degradação] reduzida"
 auth_bio_hive_mutation: "Domínio Adaptativo"
 auth_bio_hive_mutation_desc: "Os drones desta colmeia hiperadaptativa formam uma força dinâmica e em constante evolução, utilizando a mutação contínua para superar desafios ambientais e estratégicos. Cada adaptação fortalece o coletivo, garantindo versatilidade e resiliência incomparáveis enquanto a Mente-Colmeia prospera em todas as condições."
 concept_auth_bio_hive_purity: "Paradigma de Pureza"
