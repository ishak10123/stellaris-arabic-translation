 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #PURITY
 bio.200.name: "Abraçando o Nosso Legado"
 bio.200.desc: "Ao favorecer o foco em purificar nossa genética, estamos concretizando todas as coisas que tornam a nossa civilização grandiosa.\n\nConforme ficamos cada vez mais puros, aumenta o orgulho da nossa herança superior.\n\nEspecialistas de todos as áreas – artes, ciências e comércio – estão celebrando nossos esforços coletivos, e esperam nos conduzir à glória."
 bio.200.a: "Celebraremos este marco com o financiamento das artes!"
 bio.200.b: "A pesquisa científica deve ser priorizada."
 bio.200.c: "O consumo é o coração da economia."
 bio.210.name: "\"Não seremos purificados!\""
 bio.210.desc: "Protestantes entoam palavras de ordem em nossas cidades. Uma facção rebelde em nosso império decidiu assumir a luta contra a nossa causa, rejeitando o caminho para a pureza.\n\nEsses arruaceiros pregam a suposta necessidade de diversidade genética e integração cultural.\n\nSe continuarmos a ignorar esse ativismo, colocaremos em risco o nosso progresso rumo à pureza."
 bio.210.a: "Acabe com esses dissidentes!"
 bio.210.b: "Tranquilize-os com promessas vazias."
 bio.215.name: "Segredos do Passado"
 bio.215.desc: "Arqueólogos descobriram provas de uma antiga civilização em nosso mundo natal ancestral.\n\nUma câmara há muito enterrada foi encontrada, e dentro há evidências chocantes de manipulação genética no passado.\n\nSe essa informação vier à tona, poderá enfraquecer nossas afirmações modernas de pureza genética."
 bio.215.a: "Integre essa pesquisa à nossa. Vamos aproveitar o passado."
 bio.215.b: "Destrua a evidência. Ninguém pode saber."
 bio.220.name: "Ciência Estranha"
 bio.220.desc: "[event_target:rogue_geneticist.GetName], geneticista rebelde do nosso império, tem conduzido experimentos biológicos ilícitos. Ao burlar nossas diretrizes de segurança, [event_target:rogue_geneticist.GetHeShe] planejava criar uma raça de seres superiores que personificariam os ideais de pureza que buscamos. Em vez disso, [event_target:rogue_geneticist.GetHeShe] deu origem a uma abominação.\n\nUma subespécie de criaturas com vidas curtas – que compartilham alguns aspectos do nosso perfil genético, mas são, na maior parte, horrores assolados por doenças – está agora definhando sob nossa custódia. Embora o estudo de sua constituição genética tenha sido proveitoso, o prognóstico é terminal. [event_target:rogue_geneticist.GetName] permanece irredutível."
 bio.220.a: "Remova o indivíduo rebelde do seu posto!"
 bio.220.a.tt: "[event_target:rogue_geneticist.GetName] sofre uma aposentadoria forçada."
 bio.220.b: "\"Silencie\" [event_target:rogue_geneticist.GetName]."
 bio.220.c: "Esse é exatamente o tipo de atitude que queremos!"
 bio.225.name: "Puro Escândalo!"
 bio.225.desc: "Após iniciarmos testes genéticos regulares para otimizar o nosso caminho rumo à pureza e identificar genomas aberrantes, o DNA de \"alta qualidade\" se tornou motivo de orgulho.\n\nCertos oficiais do império supostamente mentiram sobre sua constituição biológica, forjando resultados para sugerir que possuem características mais desejáveis do realmente têm. Caso venha à tona, tal encobrimento da verdade pode causar a indignação pública."
 bio.225.a: "Precisamos de testes mais precisos e confiáveis."
 bio.225.b: "Talvez o oficial em questão tenha cometido um erro..."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #CLONING
 bio.230.name: "O Dilema do Clone"
 bio.230.desc: "Os clones estão entre nós. Eles vivem em nossas cidades e trabalham em nossas fábricas. Alguns até mesmo alcançaram posições de poder, moldando as políticas que nos governam.\n\nCom a integração de indivíduos clonados em nossa sociedade, muitas questões permanecem em aberto. Que direitos eles têm? Eles são iguais aos originais, ou devem ser tratados como subordinados?"
 bio.230.a: "Cidadania plena para todos os clones!"
 bio.230.b: "Na melhor das hipóteses, eles são cidadãos de segunda classe."
 bio.235.name: "Sabotagem na Fábrica de Clones!"
 bio.235.desc: "A produção de clones em uma de nossas instalações mais produtivas foi interrompida por um incidente que causou danos graves.\n\nComo muitas das operações são automatizadas para maior eficiência, ninguém estava presente para intervir no momento que levou ao distúrbio.\n\nAo sair de uma das esteiras, um dos clones escorregou e caiu nas engrenagens, sendo triturado. Isso causou um gargalo e foi necessário interromper a produção."
 bio.235.a: "Inicie uma investigação completa!"
 bio.235.a.tt: "Velocidade do progresso da Situação §Y$genetic_ascension_situation$§! por §Y12§! meses: §R-50%§!"
 biomorphosis_stalled_tt: "Velocidade do progresso da Situação §Y$genetic_ascension_situation$§! por §Y12§! meses:"
 bio.235.b: "Retome a produção o quanto antes!"
 bio.240.name: "Crise de Identidade"
 bio.240.desc: "Clones em todo o nosso império estão relatando dificuldades com suas noções de \"eu\".\n\nEles desejam identidades diferentes daquelas dos seus doadores genéticos. Os clones questionam seus propósitos, sentindo-se apáticos quanto aos seus objetivos de vida e aspirações."
 bio.240.a: "Isso é normal. Por isso existe terapia."
 bio.240.b: "Eles devem buscar a realização no trabalho."
 bio.240.b.tt: "Todos os §Y£leader£ Líderes§! da espécie principal do império ganham §G+200§! de Experiência."
 bio.250.name: "Clones por Toda Parte!"
 bio.250.desc: "Com mais clones sendo integrados à nossa população, os recursos adicionais necessários para sustentá-los estão pressionando a economia.\n\nEmbora os desafios imediatos sejam grandes, o dinamismo econômico proporcionado por uma maior força de trabalho e base consumidora pode estabelecer as bases para a prosperidade em longo prazo – contanto que façamos a transição de modo eficaz."
 bio.250.a: "Nossa infraestrutura deve crescer para atender à demanda."
 bio.250.b: "Eles podem aproveitar a vida em colônias extramundo."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #MUTATION
 bio.260.name: "Mutações Desregradas"
 bio.260.desc: "Crescimento espontâneo de membros. Flutuações entre estados de matéria. Metamorfoses repentinas. Esses relatos são raros, mas não devem ser ignorados.\n\nNossos experimentos com mutações estão provocando resultados pouco desejáveis em toda a civilização. Talvez o fácil acesso às ferramentas para modificação genética tenha sido mais complicado do que pensávamos inicialmente."
 bio.260.a: "Mutações incomuns podem impulsionar nossa pesquisa."
 bio_260_opinion_tt: "A opinião de impérios §YEspiritualistas§! a nosso respeito cai em §R-50§!"
 bio.260.b: "Elimine as abominações."
 bio.260.b.tt: "Todos os §Y£leader£ líderes do tipo Autoritário§! recebem a característica §Y$leader_trait_eager$§!"
 bio.265.name: "Excelência Mutante"
 bio.265.desc: "Uma pequena porcentagem da população desenvolveu habilidades extraordinárias e aprimoramentos físicos graças aos nossos experimentos com mutações.\n\nEles estão formando uma comunidade de pessoas incomparavelmente fortes e com dons especiais, conquistando a atenção do público."
 bio.265.a: "O sucesso deles poderia inspirar outras pessoas."
 bio.265.b: "Parece que eles dariam ótimos soldados."
 bio.265.b.tt: "Cria um §Y$gene_warrior_army$§! em §Y[Owner.capital_scope.GetName]§!."
 bio_265_opinion_tt: "A opinião de impérios §YMilitaristas§! a nosso respeito aumenta em §G+50§!"
 bio.265.c: "Descubra como eles conseguiram isso e replique o sucesso."
 bio.270.name: "Lendas Urbanas Ganham Vida"
 bio.270.desc: "Sistemas de monitoramento confirmaram a existência de uma população de indivíduos geneticamente modificados habitando os esgotos – um eco perturbador de lendas urbanas há muito desacreditadas.\n\nEssa descoberta aumentou as tensões sociais, enquanto cidadãos com mutações evidentes relatam sofrer mais discriminação à medida que o medo do desconhecido cresce. No entanto, os indivíduos em questão demonstraram notável engenhosidade, explorando os gases dos esgotos para a produção de recursos e adaptando-se ao ambiente de maneiras inusitadas."
 bio.270.a: "Limpe os esgotos!"
 bio.270.b: "Esses mutantes podem ter descoberto alguma coisa..."
 bio.280.name: "Contágio Mutante"
 bio.280.desc: "O surto de uma nova doença está se espalhando pelo império. A nova enfermidade causa uma gama de sintomas desagradáveis, incluindo, mas não limitados a: excreções involuntárias de gás e líquidos, fadiga debilitante e, em alguns casos, o óbito.\n\nCuriosamente, essa doença está afetando apenas aqueles que alteraram sua fisiologia de uma forma específica por meio de mutações genéticas. O estudo de seus genomas modificados revelou descobertas surpreendentes."
 bio.280.a: "Encontre uma aplicação terapêutica."
 bio.280.b: "Transforme a doença em uma arma."
 bio_280_opinion_tt: "A opinião de impérios §YMaterialistas§! a nosso respeito cai em §R-50§!"
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #ANY APPROACH
 bio.295.name: "Célula Rebelde"
 bio.295.desc: "Nossas Instalações de Pesquisa Genômica permitiram que toda a nossa civilização tivesse acesso à alteração fisiológica de forma inédita.\n\nNo entanto, os cidadãos do império querem ainda mais. Eles pedem pela descentralização de recursos e pelo acesso livre dos chamados \"biohackers\" à tecnologia genética."
 bio.295.a: "Dê aos biohackers mais autonomia."
 bio.295.b: "O cidadão comum já tem liberdades demais."
 bio_295_opinion_tt: "A opinião de impérios §YIgualitários§! a nosso respeito aumenta em §G+50§!"
 bio.300.name: "Gênio da Genética"
 bio.300.desc: "[event_target:genius_geneticist.GetName], que atua como [Owner.GetScientist], publicou um ensaio acadêmico que poderia ser usado para melhorar a eficácia e acelerar dramaticamente nossos experimentos genéticos.\n\nPuramente teórico, o novo método ainda não foi testado. A metodologia deverá ser cuidadosamente analisada antes de ser aplicada de forma segura aos nossos processos."
 bio.300.a: "Reconheça as contribuições de [event_target:genius_geneticist.GetName]."
 bio.300.b: "Conceitos – e indivíduos – tolos não serão tolerados."
 bio.300.c: "Todos vocês, voltem ao trabalho."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #PURITY
 bio.310.name: "Violação de Pureza da [target.GetGestaltEntityName]"
 bio.310.desc: "Um código genético invasivo se infiltrou em nossa espécie como consequência de nossos experimentos persistentes em modificação genética. Estamos adoecendo em um ritmo alarmante, desestabilizados pela interação desregulada dessa sequência estranha em nosso próprio material genético.\n\nTemos que desfazer esse comportamento biológico anômalo antes que seja tarde demais."
 bio.310.a: "Expurgue o contaminante."
 bio.310.b: "Vamos estudá-lo."
 bio.315.name: "Comprometidos com a Causa"
 bio.315.desc: "Para nossa civilização tornar-se pura, primeiro devemos considerar o bem-estar da [target.GetGestaltEntityName]. Os processos de modificação genética devem garantir que cada adaptação aumente a resiliência do coletivo.\n\nUm começo equivocado, como a introdução de mudanças que causem instabilidade e enfraqueçam a coesão, pode se mostrar desastroso, ameaçando as bases da nossa união."
 bio.315.a: "Foque na resiliência física."
 bio.315.b: "A eficiência cognitiva é primordial."
 bio.325.name: "Além do Hoje"
 bio.325.desc: "Para garantir a longevidade e pureza da nossa espécie, temos que implementar uma procriação mais seletiva e protocolos de triagem genética mais rígidos.\n\nApenas com a seleção de drones dignos de carregar nossa linhagem poderemos transcender a evolução natural."
 bio.325.desc.wilderness: "Para garantir a longevidade e pureza da nossa multitude simbiótica, temos que implementar uma procriação mais seletiva e protocolos de triagem genética mais rígidos.\n\nApenas com a seleção cuidadosa de simbiontes viáveis com características de interesse para o coletivo, podemos transcender nossos limites iniciais."
 bio.325.a: "Vamos fazer uma seleção baseada na inteligência."
 bio.325.b: "Nós procriamos para expandir."
 bio.330.name: "Ascensão Engenhosa"
 bio.330.desc: "Os frutos da modificação genética garantirão o nosso legado, mas o papel de cada [target.GetIndividualName], e cada pequeno esforço, devem estar alinhados com a nossa visão de pureza.\n\nEstamos diante de uma decisão crucial: deveríamos buscar a perfeição à custa da adaptabilidade? Ou vamos adotar uma estratégia mais ampla, priorizando a infraestrutura necessária para suportar esses esforços?"
 bio.330.a: "A pureza deve ser o nosso único foco."
 bio.330.b: "Temos que dedicar tempo ao desenvolvimento da nossa infraestrutura."
 bio.335.name: "Expurgando Imperfeições"
 bio.335.desc: "Isolamos algumas impurezas e anomalias genéticas dentro da [target.GetGestaltEntityName].\n\nEnquanto nos empenhamos para realizar nossos objetivos mais amplos, devemos eliminar essas características defeituosas e retomar o controle de nosso desenvolvimento físico da evolução natural."
 bio.335.a: "Elimine os mais fracos para fortalecer o todo."
 bio.335.b: "Reformule os defeituosos."
 bio_335_opinion_tt: "A opinião de impérios §Ycom inclinações benevolentes§! a nosso respeito cai em §R-50§!"
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #CLONING
 bio.340.name: "Clones Demais!"
 bio.340.desc: "Nossas instalações de clonagem estão operando de modo mais eficiente do que havíamos imaginado, e agora temos um excesso de clones.\n\nIntegrar tantos drones assim está se mostrando um desafio."
 bio.340.a: "Novas adições devem migrar para outras colmeias."
 bio.340.b: "Aumente a produção. Crie mais clones."
 bio.350.name: "Cascas Vazias"
 bio.350.desc: "Vários drones foram afetados por um mau funcionamento em um de nossos principais centros de clonagem. De algum modo, contaminantes genéticos infiltraram-se no processo de duplicação, resultando em um lote de clones criados sem a capacidade de pensar.\n\nEles eram essencialmente objetos biológicos, totalmente não sencientes e sem funções cognitivas superiores. Até que a questão tenha sido resolvida e os problemas na produção solucionados, a produtividade na instalação está reduzida."
 bio.350.a: "Isso parece... reconfortante."
 bio.350.a.tt: "100 £pop£ §HPops Pré-Sapientes§! são criados em §Y[owner.capital_scope.GetName]§!."
 bio.350.b: "Produza um novo lote."
 bio.365.name: "Metafísica da Colmeia"
 bio.365.desc: "De dentro da consciência emerge uma pergunta: poderão os clones nos substituir um dia?\n\nNossos esforços iniciais na duplicação genética estão correndo bem, de tal maneira que nos questionamos se esse método eficiente de reprodução poderia vir a superar nossas práticas naturais.\n\nCaso isso aconteça, um dia a colmeia pode não conter mais doadores originais, apenas clones de clones de clones... O que isso significaria para a nossa espécie? Uma pergunta sem resposta, um terreno fértil para a dissidência. Mas estamos compelidos a perguntar."
 bio.365.a: "A pergunta em si tem seu valor."
 bio.365.b: "Questões como essa são uma distração."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #MUTATION
 bio.375.name: "Conexão Aprofundada"
 bio.375.desc: "Fizemos uma descoberta. Ao manipular genes específicos, podemos expandir o alcance de nossa consciência para obter sentidos aguçados muito além do que imaginávamos ser o limite para a nossa espécie.\n\nA implementação dessas mutações em toda a colmeia exigirá uma imensa quantidade de energia, mas isso poderá aprofundar a nossa compreensão do universo, e do nosso lugar nele."
 bio.375.a: "O custo é ínfimo. Prossiga."
 bio.375.b: "O processo não deve ser apressado."
 mod_planet_evaluators_physics_research_produces_add: "£physics_research£ $physics_research$ a cada $pop_group_unit$ [evaluator.GetIcon] [evaluator.GetNamePlural]"
 bio.380.name: "Sobrecarga Emocional"
 bio.380.desc: "Seções inteiras da colmeia estão vivenciando episódios de ira incontrolável, um surto de emoções que enviou ondulações por toda a consciência compartilhada, amplificando as nossas dores e frustrações coletivas.\n\nUma mutação recém-introduzida parece ter estimulado excessivamente os neurônios nos centros de controle de agressão dos nossos drones, perturbando o equilíbrio emocional da colmeia. Conflitos estão surgindo com mais frequência, e alguns drones estão abandonando suas tarefas para atacar os outros."
 bio.380.a: "Como um todo, seremos atenciosos."
 bio.380.b: "Vamos abraçar essa ira."
 bio.385.name: "Intolerância Ambiental"
 bio.385.desc: "Embora algumas mutações nos estimulem e aprimorem, descobrimos que outras trazem efeitos colaterais desagradáveis.\n\nAprimoramentos que aumentam a nossa longevidade foram implementados com sucesso, mas essas mesmas mutações estão reduzindo a nossa tolerância a climas extremos.\n\nAqueles de nós que passaram por essas melhorias biológicas estão tendo dificuldades para regular seus sistemas internos de termorregulação, e seu desconforto é sentido por toda a colmeia."
 bio.385.a: "Devemos aprimorar nossos sistemas de proteção climática."
 bio.385.b: "Conforme mudamos, também mudam as nossas preferências ambientais."
 uncomfortable_drones: "Drones Desconfortáveis"
 uncomfortable_drones_desc: "Nossos drones devem superar o desconforto gerado pelas mutações."
 bio.390.name: "Músculos ou Cérebro"
 bio.390.desc: "Um par de mutações foi identificado. Uma variante aprimora a força de drones subalternos, aumentando bastante a eficiência durante o trabalho. A outra aguça o intelecto de drones complexos, impulsionando suas capacidades estratégicas e de solução de problemas.\n\nA colmeia deve decidir qual caminho adotar."
 bio.390.a: "A força leva ao progresso."
 bio.390.b: "Pensamos, logo prosperamos."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #ANY APPROACH
 bio.405.name: "Genoma Doente"
 bio.405.desc: "Com grande esforço, detivemos um surto repentino de uma praga genética.\n\nA manipulação da nossa própria biologia ativou mutações nocivas em nosso DNA, comprometendo a integridade física de um grande número de [target.GetIndividualNamePlural].\n\n[target.GetIndividualNamePlural] doentes entraram em quarentena, e agora temos que decidir o nosso próximo passo."
 bio.405.a: "Eliminando [target.GetIndividualNamePlural] doentes, eliminaremos a praga."
 bio.405.b: "Estude os drones afetados."
 bio.410.name: "Células Decadentes"
 bio.410.desc: "Um erro em nossos cálculos levou à degradação da integridade genética de inúmero drones. Infelizmente, não conseguimos identificar em que momento a falha aconteceu.\n\nApós a revisão dos cálculos biológicos envolvendo a elevação de nossa espécie, e tendo corrigido alguns procedimentos potencialmente problemáticos, estamos prontos para continuar nossos esforços.\n\nContudo, não podemos ter certeza se de fato retificamos o erro, ou, pior ainda, introduzimos novas falhas."
 bio.410.desc.wilderness: "Um erro em nossos cálculos levou à degradação da integridade genética de um número significativo de nossos simbiontes. Infelizmente, não conseguimos identificar em que momento a falha aconteceu.\n\nApós a revisão dos cálculos envolvendo a adaptação de nossas partes constituintes, e tendo corrigido algumas misturas enzimáticas desequilibradas, estamos prontos para continuar nossos esforços.\n\nContudo, não podemos ter certeza se de fato retificamos o erro, ou pior ainda, introduzimos novas falhas."
 bio.410.a: "Podemos aprender com o que quer que aconteça em seguida."
 bio.410.b: "Pause os experimentos."
 bio.410.b.tt: "$bio.235.a.tt$"
