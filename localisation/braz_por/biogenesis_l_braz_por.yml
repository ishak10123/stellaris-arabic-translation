 unlocks_ship_2_bio: "Libera a tecnologia para as naves de Império Caído §YDilaceradora§! e §YTecelã§!.\n"
 menp_cosmo_ship_2_desc_bio: "Ao distorcer a interação entre espaço e tempo, essas naves transcendem limitações normais. Suas estruturas compactas escondem características que nenhuma nave que obedece às leis da física é capaz de imitar."
 menp_cosmo_ship_3_desc_bio: "$tech_cosmogenesis_harbinger_desc$"
 unlocks_ship_3_bio: "Libera a tecnologia para a nave §YArauto§! de Império Caído"
 menp_cosmo_ship_4_desc_bio: "$tech_cosmogenesis_stinger_desc$"
 unlocks_ship_4_bio: "Libera a tecnologia para a nave §YAguilhão Titã§! de Império Caído"
 tech_cosmogenesis_mauler: "Dilaceradora Cifrada"
 tech_cosmogenesis_mauler_desc: "Graças ao transcendentalismo dimensional do espaço-tempo, esta Dilaceradora é maior por dentro, com sua estrutura compacta escondendo um denso emaranhado de musculaturas. Capaz de uma mordida mais letal do que as leis da física permitiriam."
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_TITLE: "§HLibera o Tipo de Nave:§! Dilaceradora Cifrada"
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_DESC: "§HDilaceradora Cifrada§!\n$tech_cosmogenesis_mauler_desc$"
 tech_cosmogenesis_weaver: "Tecelã Dilemática"
 tech_cosmogenesis_weaver_desc: "Equipada com uma gama de armas de apoio que ultrapassa sua anatomia exterior visível, a Tecelã Dilemática reescreve as normas do espaço. Ela é capaz de alterar o curso da batalha sozinha."
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_TITLE: "§HLibera o Tipo de Nave:§! Tecelã Dilemática"
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_DESC: "§HTecelã Matriz§!\n$tech_cosmogenesis_weaver_desc$"
 tech_cosmogenesis_harbinger: "Arauto Labiríntico"
 tech_cosmogenesis_harbinger_desc: "Estes Arautos guardam suas naves de ataque dentro de dimensões de bolso interconectadas. Cada nave é um labirinto de hangares impossíveis, capazes de carregar poder de fogo equivalente a uma frota inteira."
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_TITLE: "§HLibera o Tipo de Nave:§! Arauto Labiríntico"
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_DESC: "§HArauto Labiríntico§!\n$tech_cosmogenesis_harbinger_desc$"
 tech_cosmogenesis_stinger: "Aguilhão Críptico"
 tech_cosmogenesis_stinger_desc: "Comportando mais sistemas de armas do que sua fonte de energia é capaz de sustentar, este Aguilhão não deveria funcionar, mas ainda consegue atirar continuamente."
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_TITLE: "§HLibera o Tipo de Nave:§! Aguilhão Críptico"
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_DESC: "§HAguilhão Críptico§!\n$tech_cosmogenesis_stinger_desc$"
