 ###Starlit Citadel
 origin_starlit_citadel: "Cidadela Estrelada"
 origin_starlit_citadel_desc: "Uma misteriosa passagem paira nos limites do sistema natal desta civilização, um portal de onde emergem entidades hostis em enxurradas implacáveis. Essas invasões são tão imprevisíveis quanto inevitáveis, forçando seu povo a depender do seu maior triunfo tecnológico: a §H$dsc_name$§!."
 origin_tooltip_starlit_citadel_effects: "- $HOME_SYSTEM$ $TABBED_NEW_LINE$- ['concept_deep_space_bastion'] no limite de um poço gravitacional $TABBED_NEW_LINE$- O ['concept_wormhole', $BYPASS_STARLIT_WORMHOLE$] leva até um sistema desconhecido $NEW_LINE$- $HOMEWORLD$  $TABBED_NEW_LINE$- £building£ ['building:building_citadel_uplink'] $TABBED_NEW_LINE$- ['concept_bioship_remains', £blocker£ $d_bioship_remains$] $TABBED_NEW_LINE$- ['concept_invasion_site', £blocker£ $d_invasion_site$]: +2 $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_deep_space_citadel_tech',£engineering_research£ $tech_deep_space_citadel$]"
 START_SCREEN_STARLIT_CITADEL: "Não fomos sempre tão vigilantes.\n\n[Capital.GetName] é um mundo de abundância, e éramos um povo pacífico e contente. Mas tudo mudou com o surgimento do portal.\n\nInesperadamente, fomos atacados por [GetInvadersLower]. Nossas cidades foram arrasadas, nossas terras caíram em ruína, até que, da mesma forma que chegaram, nossos inimigos desapareceram. Em vão, nutrimos esperanças de que eles nunca mais voltariam, mas as invasões continuaram, uma após a outra, cada vez mais brutais.\n\nAgora, enquanto nos preparamos para explorar a galáxia, nossos $job_skywatcher_plural$ mantêm sua vigília. Muito acima do nosso mundo, a formidável $dsc_name$ aguarda, um bastião inabalável contra a horda de [GetInvadersLower] e quaisquer outros que tentem nos destruir."
