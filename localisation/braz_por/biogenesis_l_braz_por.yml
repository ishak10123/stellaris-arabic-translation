 behemoth_cocoon_menu_title: "Amadurecer e Crescer"
 behemoth_cocoon_effect: "Um §YBeemote§! completamente alimentado pode se aninhar em um gigante gasoso por §Y3 anos§! para se transformar em uma forma de vida ainda mais forte."
 behemoth_cocoon_progress_activity_key: "Estágio de casulo"
 behemoth_cocoon_tt: "§RPrecisamos liberar a Regalia da Crise §H$menp_behemoth_hatchling_2$§!.§!"
