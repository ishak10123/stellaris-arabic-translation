 ### BIOMORPHOSIS (GENETIC ASCENSION) SITUATION(S)
 ## REGULAR EMPIRE SITUATION
 #SET-UP / PREAMBLE
 genetic_ascension_situation: "Biomorfose"
 genetic_ascension_situation_type: "$genetic_ascension_situation$"
 genetic_ascension_situation_desc: "A seleção natural e a deriva genética não são mais obstáculos para a nossa dominação biológica. Como uma civilização, estamos na iminência de redefinir o futuro de nossa espécie. Nossa [Owner.Species.GetFleshTypeCyberCreed] é como argila, e nós somos os escultores."
 genetic_ascension_situation_monthly_change_tooltip: "Nossos geneticistas avançam a pesquisa continuamente."
 genetic_ascension_situation_outcome: "Vamos liberar todo o potencial da manipulação genética e garantir o desenvolvimento de nossa espécie.\n\nEscolheremos a expressão máxima da biomorfose."
 genetic_ascension_situation_pause_desc: "Situação Pausada"
 genetic_ascension_approach_selected: "$TRIGGER_FAIL$Já fizemos a nossa escolha para este estágio."
 situation_gene_tailoring_needed_desc: "$TRIGGER_FAIL$NÃO tem a Tecnologia ['concept_gene_tailoring']"
 mod_biomorphosis_progress_mult: "Progresso Mensal de $genetic_ascension_situation$"
 #STAGE EVENTS
 bio.5.name: "Alterando a Essência" #STAGE ONE
 bio.5.desc.no_options: "Para acelerar nossa evolução, devemos escolher com firmeza o caminho que definirá nossa jornada. À medida que começamos a compreender todo o nosso potencial, temos plena ciência de que tal esforço pode alterar fundamentalmente nossa essência.\n\nPlanejar a evolução é uma tarefa de profunda significância. As alterações que implementarmos agora ditarão o nosso futuro."
 bio.5.desc.has_options: "$bio.5.desc.no_options$\n\nPara começar a elevação, temos que escolher o caminho a seguir em nossa jornada."
 bio.5.a: "O caminho da Pureza."
 bio.5.b: "O caminho da Clonagem."
 bio.5.c: "O caminho da Mutação."
 bio.10.name: "O Ponto de Virada" #STAGE TWO
 bio.10.desc.no_options: "O planejamento da nossa própria evolução trouxe avanços profundos. Agora temos uma melhor compreensão das características genéticas, da reprodução e do sequenciamento do DNA.\n\nO auge do nosso progresso está ao nosso alcance. Em poucos anos, descobriremos todo o potencial de nossa espécie."
 bio.10.desc.has_options: "$bio.10.desc.no_options$\n\nContudo, por ora devemos continuar no caminho atual, ou escolher outro foco para o próximo estágio do nosso desenvolvimento."
 bio.10.a: "Foque na Pureza."
 bio.10.b: "Foque na Clonagem."
 bio.10.c: "Foque na Mutação."
 bio.15.name: "Encruzilhada Evolutiva" #STAGE THREE
 bio.15.desc.no_options: "Nossos esforços nos levaram à beira de uma transição evolutiva considerável. Agora, precisaremos tomar uma decisão crucial quanto ao caminho que devemos seguir para concretizar todo o nosso potencial evolutivo."
 bio.15.desc.has_options: "$bio.15.desc.no_options$\n\nTemos que escolher novamente onde concentrar nossos esforços."
 bio.15.a: "Escolhemos a Pureza."
 bio.15.b: "Vamos dominar a Clonagem."
 bio.15.c: "A Mutação nos levará ao futuro."
 genetic_ascension_approach_purity: "Pureza"
 genetic_ascension_approach_cloning: "Clonagem"
 genetic_ascension_approach_mutation: "Mutação"
 genetic_ascension_approach_purity_desc: "Concentraremos nossos esforços na busca pela Pureza."
 genetic_ascension_approach_cloning_desc: "A pesquisa sobre a Clonagem nos permitirá crescer."
 genetic_ascension_approach_mutation_desc: "Nosso futuro está na Mutação genética."
 bio.20.name: "O Caminho Escolhido" #FINAL STAGE - TRADITION TREE CHOICE
 bio.20.desc: "Seja a busca pela nossa forma mais pura, o sucesso através da clonagem ou o aprimoramento genético por meio de mutações deliberadas, este momento marca um caminho sem volta."
 bio.20.desc.evopred: "Nossa natureza sempre foi maleável. Somos a forma de vida mais complexa do universo, e com a ajuda de nossa pesquisa, continuaremos a mudar.\n\nO futuro é caótico, e isso é perfeito para nós."
 bio.20.a: "Saberemos o real significado da pureza."
 bio.20.b: "Vamos nos clonar para alcançar o sucesso."
 bio.20.c: "Exploraremos o poder das mutações."
 #Random Events
 bio.50.name: "Mais Iguais Que Outros"
 bio.50.desc: "Como resultado do nosso foco na purificação genética, cidadãos aprimorados começaram a se considerar naturalmente superiores ao restante da população. Eles exigem jornadas de trabalho mais curtas, mais conforto e um maior poder político devido à sua suposta superioridade. Suas manifestações, cada vez mais agressivas, estão causando uma grave agitação social."
 bio.50.a: "Reprima os manifestantes."
 bio.50.b: "Eles têm certa razão."
 bio.55.name: "Mitose Social"
 bio.55.desc: "Uma retórica polêmica domina os noticiários, e a discórdia está dividindo grupos sociais. Uma nova luta de classe está surgindo conforme mais oportunidades são reservadas àqueles cujos genes são modificados.\n\nIndivíduos geneticamente aprimorados acreditam representar o futuro da nossa espécie, embora os tradicionalistas afirmem que estamos nos afastando demais rumo a um território não natural."
 bio.55.a: "Indivíduos superiores para um mundo superior."
 bio.55.b: "Talvez estejamos indo rápido demais."
 bio.60.name: "Disparidade Ácida"
 bio.60.desc: "Testes de pureza arbitrários estão se tornando comuns em certos setores. Aqueles considerados geneticamente superiores estão recebendo tratamento preferencial no trabalho e na educação, além de terem acesso facilitado a posições de poder.\n\nEmbora alguns afirmem que indivíduos com aprimoramentos biológicos são, de fato, mais fortes e saudáveis, outros contra-argumentam que tal noção provoca a discriminação indevida daqueles que se recusam ou não têm condições de alterar seus genomas na busca pela perfeição genética."
 bio.60.a: "Devemos garantir oportunidades iguais a todos."
 bio.60.b: "É a sobrevivência do mais apto."
 bio.65.name: "Heróis e Vilões"
 bio.65.desc: "Nossa pressão pela pureza encorajou certos indivíduos a assumirem um papel importante na segurança pública. Dotados de superforça, agilidade e resistência, pequenos grupos de benfeitores estão se autointitulando campeões, exercendo a lei por conta própria.\n\nContudo, tal bravura gerou uma resposta à altura. Das sombras, estão surgindo adversários igualmente aprimorados, suas intenções malignas motivadas pelo desejo de nivelar o equilíbrio de poder. Confrontos entre os dois grupos estão causando destruição e até mesmo colocando civis em risco."
 bio.65.a: "Justiceiros não são bem-vindos em nossas ruas."
 bio.65.b: "Deixe-os lutar."
 MAVERICK_CITIZENS_MOD: "[enforcer.GetIcon] §Y[enforcer.GetNamePlural]§! produzem §G+2§! de $r_stability$ e §G+2§! de $r_unity$ a cada 100 empregos."
 bio.66.name: "Super-Restrições"
 bio.66.desc: "Reprimimos as atividades de indivíduos superpoderosos, e eles agora enfrentam restrições e regulações severas. Nossos esforços de vigilância nos permitiram monitorar e refrear suas atividades.\n\nApesar do nosso empenho para garantir que eles usem seus poderes apenas a serviço do império, há um medo e desdém crescentes entre os superpoderosos e os não aprimorados. Nossa população está seriamente dividida quanto à questão."
 bio.66.a: "Crie regimentos de superpoderosos."
 bio.66.b: "Reabilite os marginalizados."
 bio.67.name: "Superdependência"
 bio.67.desc: "Nossa crescente dependência de justiceiros geneticamente aprimorados tornou-se uma faca de dois gumes. Embora esses seres promovam um senso de segurança e bem-estar, agora percebemos o quanto passamos a depender deles.\n\nAs pessoas estão gratas, mas agora voltam-se para esses indivíduos superpoderosos em busca de orientação e apoio, driblando o sistema judiciário e ignorando autoridades oficiais. A linha que separa heróis do governo tornou-se tênue. O poder está em jogo."
 bio.67.a: "Reúna um conselho de superpoderosos!"
 bio.67.b: "Restrinja o envolvimento de \"heróis\" em assuntos do governo."
 bio.70.name: "Dois por Um"
 bio.70.desc: "Uma liderança proeminente, celebrada em toda a galáxia por sua ética de trabalho inabalável, revelou-se ser não um, mas dois indivíduos.\n\nDescobriu-se que essa liderança adquiriu um clone, permitindo que trabalhem em turnos alternados. Enquanto um clone trabalhava em atividades públicas e deveres administrativos, o outro descansava e se recuperava em segredo.\n\nTal revelação abalou o cenário político, levantando dúvidas quanto a real natureza da liderança e os limites éticos da tecnologia de clonagem."
 bio.70.a: "Um uso eficaz para a clonagem."
 bio.70.b: "Demita os dois indivíduos pela fraude."
 bio.75.name: "Clones em Revolta"
 bio.75.desc: "A prática do comissionamento de clones para a coleta de órgãos já está causando complicações. Inúmeros clones, claramente dotados de senciência, estão demonstrando sua revolta na forma de uma greve de fome prolongada.\n\nEmbora muitos afirmem que a saúde e a longevidade do indivíduo original devem ter prioridade, outros contrapõem que qualquer ser pensante tem o direito à autonomia pessoal. Essa questão controversa agora é motivo de debates acalorados."
 bio.75.a: "Encerre os transplantes."
 bio.75.b: "Os direitos dos indivíduos originais vêm primeiro."
 bio.80.name: "Ônus da Prova"
 bio.80.desc: "O cumprimento da lei encontra-se em um dilema. O crime em nossa capital continua a crescer, mas cada vez menos pessoas estão enfrentando a justiça. Suspeitos estão alegando inocência, afirmando que seus clones cometeram as ditas infrações.\n\nEm casos em que os suspeitos não são pegos em flagrante, está quase impossível provar a culpa. Algumas autoridades judiciárias agora pedem pela descriminalização de grande parte das atividades ilícitas."
 bio.80.a: "Reforce nossos sistemas de vigilância."
 bio.80.b: "Menos leis implica em menos crimes."
 bio.85.name: "Semelhança Impressionante"
 bio.85.desc: "Uma enorme instalação de clonagem não autorizada foi descoberta dentro de nossas fronteiras. Ela abriga milhares de cópias, cada uma delas uma réplica de nossa liderança [Owner.Leader.GetName], que ocupa o posto de [Owner.Leader.GetTitle]. Cientistas civis encontrados no local foram detidos, mas não estão cooperando, alegando não saberem quem encomendou os clones.\n\nAs poucas evidências sugerem que [Owner.Leader.GetName] em pessoa pode estar por trás da operação. Infelizmente, [Owner.Leader.GetSheHe] desapareceu sem deixar rastros."
 bio.85.a: "Envie os clones para eutanásia."
 bio.85.b: "Ganhamos um exército de clones."
 bio.85.b.tt: "([owner.capital_scope.GetName]):\nUm §Y$clone_army$§! é criado."
 bio.85.c: "Liberte os clones."
 bio.85.c.tt: "Ganharemos um grupo de §YPops§!."
 bio.86.name: "Reação Inesperada"
 bio.86.desc: "A eutanásia de tantos clones gerou revolta e deu origem a um grave debate. Ativistas e religiosos do povo [Owner.GetSpeciesAdj] estão realizando protestos em larga escala.\n\nEnquanto isso, há rumores de que alguns clones escaparam e estão escondidos em meio à população."
 bio.86.a: "Talvez haja uma lição aqui..."
 bio.86.b: "Envie forças de segurança para silenciar a multidão."
 bio.86.b.tt: "([owner.capital_scope.GetName]):\nTrês §Y$assault_army_plural$§! são criados."
 bio.90.name: "Comuna de Mutantes"
 bio.90.desc: "Diversos indivíduos com mutações genéticas evidentes ou não convencionais estão sendo excluídos da sociedade. Forçados ao subsolo, esses mutantes formaram seus próprios enclaves.\n\nAs pessoas que adentram essas áreas raramente voltam."
 bio.90.a: "Acabe com os enclaves."
 bio.90.b: "Monitore o progresso deles. De longe."
 bio.95.name: "Rebeldia Transgênica"
 bio.95.desc: "Jovens marginalizados começaram a alterar dramaticamente sua aparência como forma de diversão extrema.\n\nAs últimas tendências incluem uma mania por olhos compostos e competições para ver quantos membros adicionais são possíveis em um único corpo, com o recorde atual de 156.\n\nEsses \"biohackers\" atraíram a atenção pública, levantando questões de segurança. Com o aumento dos pedidos pela imposição de restrições rigorosas sobre mutações genéticas, temos que decidir nossa posição oficial."
 bio.95.a: "É apenas uma diversão inofensiva."
 bio.95.b: "156 membros é um pouco de exagero."
 bio.100.name: "Problemas Inesperados"
 bio.100.desc: "A ampla adoção da manipulação genética em toda a nossa civilização gerou uma gama desnorteante de variedades físicas.\n\nProcessos biológicos antes previsíveis agora exibem variantes inesperadas, tornando a padronização quase impossível.\n\nO senso compartilhado de semelhança física que antes unia nossa espécie começa a ruir, cedendo lugar para um caleidoscópio de formas e funções que desgastam a coesão social."
 bio.100.a: "Encoraje a diversidade."
 bio.100.a.tt: "§Y400§! £pop£ §HPop§! aleatórios receberão a característica ['trait:trait_bioadaptability'], ['trait:trait_social_pheromones'] ou ['trait:trait_limited_regeneration']."
 bio.100.b: "Imponha um modelo genético padronizado."
 bio.105.name: "Amorfia Celular"
 bio.105.desc: "Um experimento transgênico deu terrivelmente errado. Cientistas tentaram mesclar o DNA de cobaias com o de outros organismos pluricelulares para ativar uma resposta hiperimune, tornando-os resistentes a todos os vírus.\n\nPorém, eles criaram uma criatura que dissolve as paredes celulares de qualquer organismo com o qual entra em contato, fundindo-o a si para formar uma enorme e amorfa massa de material biológico.\n\nEssa \"bolha\" rolou por toda a instalação, absorvendo tudo em seu caminho. Ela está confinada por enquanto, mas apresenta um risco grave à saúde caso escape. Felizmente, ela também aparenta ser comestível..."
 bio.105.a: "Neutralize a bolha!"
 bio.105.b: "O estudo da bolha compensa os riscos."
