 SHIP_BEHEMOTH_RAGE: "Glândulas de Agressão"
 SHIP_BEHEMOTH_RAGE_DESC: "Beemotes são titãs teimosos e selvagens, que não se submetem ao controle por muito tempo. Mais cedo ou mais tarde, a fúria interior irromperá, uma tormenta cósmica muito além de qualquer contenção. Talvez a atitude mais sábia não seja esperar, mas acendermos a fagulha nós mesmos, liberando a tempestade quando quisermos – e não quando ela escolher o momento por nós."
 behemoth_rage_ship_button: "§HEnfurecer§!\n\nLiberta o §YBeemote§!.\nO Beemote enfurecido partirá em direção à §YColônia§! ou §YOvo de Beemote§! mais próximo e tentará destruí-lo.\nA fúria normalmente permanece por §Y180 dias§!, mas vários fatores podem afetar essa duração.$TABBED_NEW_LINE$- Durante o §RCombate§! ou o §RBombardeio§!, o Beemote não se acalmará.$TABBED_NEW_LINE$- Se §Gderrotarmos§! um Beemote enfurecido em combate, ele voltará sob o nosso controle."
 behemoth_rage_activity_key: "Enfurecido"
 behemoth_rage_menu_title: "Enfurecer"
 behemoth_rage_progress_activity_key: "Enfurecido"
 MESSAGE_BEHEMOTH_RAGE_TITLE: "Beemote Enfurecido"
 MESSAGE_BEHEMOTH_RAGE_DESC: "Um Beemote entrou em um estado de fúria descontrolada! Esperamos que ele se acalme em alguns meses."
 MESSAGE_BEHEMOTH_CALM_TITLE: "Fúria Acalmada"
 MESSAGE_BEHEMOTH_CALM_DESC: "Um Beemote acalmou-se e voltou ao nosso controle."
 SHIP_BEHEMOTH_COCOON: "Casulo Holometabólico"
 SHIP_BEHEMOTH_COCOON_DESC: "§YBeemotes§! podem se fixar às camadas turbulentas de um gigante gasoso, alimentando-se da densa atmosfera rica em elementos pesados e compostos moleculares complexos. Com o tempo, o alimento impulsiona seu crescimento e intensifica sua imensa força."
