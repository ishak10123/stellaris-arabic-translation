 shroud.boon: "En cas de succès, les énergies du Suaire seront canalisées en un avantage puissant qui aura un effet positif sur l'ensemble de l'empire."
 shroud.unknown: "En cas de succès... Euh... Quelqu'un en aurait-il la moindre idée, en fait ?"
