 triggered_opinion_hive_mind: "Conscience collective"
 utopia.2700.name: "Manipulation de l'évolution"
 utopia.2700.desc: "Parfois, l'évolution a besoin d'une petite aide pour s'orienter dans la bonne direction. Nous possédons maintenant la technologie pour modifier génétiquement nos organismes et l'esprit qiu permet de faire face aux difficultés d'un changement perpétuel et sans précédent de notre environnement."
 utopia.2703.name: "Maîtrise de l'évolution"
 utopia.2703.desc: "L'époque est révolue où la survie de notre espèce dépendait des caprices du destin ; où la destinée des [Root.GetSpeciesNamePlural] était décidée par la nature, au hasard de la loterie génétique.\n\nLes ingénieurs de notre temps ne travaillent plus l'acier et le béton, mais les matériaux de la vie elle-même. Avec la modification génique perfecitonnée, nous pouvons désormais assurer l'avenir de notre civilisation."
 utopia.2600.name: "L'esprit domine la matière"
 utopia.2600.desc: "Depuis les origines de notre civilisation, les histoires parlent souvent de puissants sorciers disposant de pouvoirs que l'on ne peut décrire autrement que comme surnaturels. Ces rares [Root.GetSpeciesNamePlural] étaient censés s'emparer de l'esprit de leurs semblables, lever de lourds objets d'une simple pensée, ou accomplir d'autres actes « magiques » de la sorte. Jusqu'à récemment, ces histoires n'étaient rien d'autre.\n\nMais les scientifiques ont désormais des preuves irréfutables que certains membres de l'espèce [Root.GetSpeciesAdj] disposent de pouvoirs psioniques. Même s'ils ne constituent qu'une infime minorité parmi nous, leur nombre s'est accru de façon constante dans la population au cours des derniers siècles.\n\nLes scientifiques sont incapables de déterminer s'il s'agit là d'une évolution aussi soudaine que naturelle, ou si un quelconque facteur a pu déclencher des capacités psioniques latentes qui ont toujours été présentes dans notre code génétique."
 utopia.2600.desc.unplugged: "Malgré la courte et violente histoire de notre jeune civilisation, nous avons eu l'occasion de laisser vagabonder notre imagination et de nous laisser aller à raconter des histoires fantastiques. Celles-ci parlent souvent de puissants sorciers disposant de pouvoirs que l'on ne peut décrire autrement que comme surnaturels : lire dans les pensées, lever de lourds objets d'une simple pensée, ou accomplir d'autres actes « magiques » de la sorte.\n\nNombreux sont ceux qui pensent que nous portons ces histoires depuis bien avant notre assimilation et qu'elles font partie de la psyché collective de notre espèce. Jusqu'à récemment, la plupart des [root.GetSpeciesNamePlural] les considéraient comme des chimères. Mais les scientifiques ont désormais des preuves irréfutables que certains membres de l'espèce [root.GetSpeciesAdj] disposent de pouvoirs psioniques.\n\nMême s'ils ne constituent qu'une infime minorité parmi nous, des études génétiques indiquent que leur nombre s'est accru de façon constante au cours des derniers siècles. Les scientifiques sont incapables de déterminer s'il s'agit là d'une évolution aussi soudaine que naturelle, ou si la [origin_unplugged_assimilator_empire.GetName] y est pour quelque chose."
 utopia.2600.a: "Serait-ce un signe tangible de ce qui nous attend ?"
 utopia.2602.name: "Pouvoirs psioniques des [From.GetSpeciesNamePlural]"
 utopia.2602.1.desc.1.non_gestalt_intro: "Selon des rapports des autorités de la §H[From.GetName]§! ayant fuité, des pouvoirs psioniques latents auraient commencé à se manifester chez certains individus"
 utopia.2602.1.desc.1.non_gestalt_outro: "Le phénomène doit être très récent, car nous n'avons dans nos archives aucun cas de membre des [From.GetSpeciesNamePlural] qui aurait un jour montré le moindre talent psionique."
 utopia.2602.1.desc.1.organic_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ de l'espèce [From.GetSpeciesName]. $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.machine_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ du mécanotype [From.GetSpeciesName]. $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.gestalt_intro: "Selon des rapports des autorités de la §H[From.GetName]§! ayant fuité, des pouvoirs psioniques latents auraient commencé à se manifester chez certains membres des [From.GetSpeciesNamePlural]. Si"
 utopia.2602.1.desc.1.gestalt_outro: "des capacités paranormales qui dépassent tout ce que l'on sait à leur sujet."
 utopia.2602.1.desc.1.organic_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ l'existence d'un lien cognitif entre les individus de cette espèce n'est pas nouvelle, ces rapports décrivent $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.1.machine_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ la communication en réseau neuronal entre ces individus n'a rien de nouveau, ces rapports décrivent $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.2.intro: "Ces pouvoirs sont jusqu'à présent limités à un très petit nombre de"
 utopia.2602.1.desc.2.outro: "Les rapports ne donnent aucune explication à ce phénomène."
 utopia.2602.1.desc.2.organic: "$utopia.2602.1.desc.2.intro$ membres de l'espèce [From.GetSpeciesName]. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.2.machine: "$utopia.2602.1.desc.2.intro$ membres de l'espèce [From.GetSpeciesName]. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.machine_gestalt: "$utopia.2602.1.desc.1.machine_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.machine_non_gestalt: "$utopia.2602.1.desc.1.machine_non_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.organic_gestalt: "$utopia.2602.1.desc.1.organic_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.1.desc.organic_non_gestalt: "$utopia.2602.1.desc.1.organic_non_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.2.desc: "La population [From.GetSpeciesAdj] vivant au sein de notre espace a commencé elle aussi à manifester des changements similaires. Nous sommes donc certains que ce qu'il se produit actuellement pour cette espèce n'est pas limité à une seule région de la galaxie."
 utopia.2602.a.organic_non_gestalt: "C'est tout de même étrange..."
 utopia.2602.a.hive_or_machine_non_gestalt: "Des pouvoirs spéciaux ? Nous en doutons fortement"
 utopia.2602.a.machine_gestalt: "Erreur système"
 utopia.2602.b: "Des pouvoirs psychiques ? C'est vraiment n'importe quoi !"
 utopia.2602.c: "Leur sorcellerie ne les sauvera pas pour autant"
 utopia.2602.d.organic: "Oui... Oui, nous pouvons sentir leurs émanations psychiques"
 utopia.2602.d.machine: "Oui... Nous avons enregistré leurs fréquences psioniques"
 utopia.2605.name.organic_non_gestalt: "[psionic_leader.GetTitle] psychique"
 utopia.2605.name.machine_non_gestalt: "[psionic_leader.GetTitle] psionique"
 utopia.2605.name.gestalt: "[psionic_leader.GetName] est psionique"
 utopia.2605.desc.organic_non_gestalt: "Même s'il est rare que les pouvoirs psioniques se manifestent à l'âge adulte, cela n'est pas sans précédent. Notre [psionic_leader.GetTitle] [psionic_leader.GetName] a récemment montré des talents que l'on suppose être de nature psionique. Après avoir subi un examen ESP de perception extrasensorielle approfondi, [psionic_leader.GetSheHe] a été reconnu comme porteur de pouvoirs psioniques de classe 4."
 utopia.2605.desc.machine_non_gestalt: "Bien que ce soit rare, il arrive que des unités jusqu'alors incompatibles développent des capacités psioniques. Notre [psionic_leader.GetTitle] [psionic_leader.GetName] a récemment montré des fonctionnalités que l'on pourrait qualifier de psioniques. Après avoir subi un examen approfondi, nous avons déterminé qu'[psionic_leader.GetSheHe] était une unité psionique de classe 4."
 utopia.2605.desc.gestalt: "L'influence de nos nouveaux pouvoirs grandit de jour en jour. Le réceptacle de notre [GetBrainName], [psionic_leader.GetName], a récemment montré des capacités que l'on pourrait qualifier de psioniques. Après avoir subi un examen approfondi, nous avons déterminé qu'[psionic_leader.GetSheHe] était un [GetPsychicNoun] de classe 4."
 utopia.2605.a: "Ses dons nous seront bien utiles"
 utopia.2652.name: "Éveil psionique des [This.GetSpeciesNamePlural]"
 utopia.2652.desc.1.intro: "Tous les [This.GetSpeciesNamePlural] de la galaxie viennent de connaître un changement majeur : alors qu'auparavant leurs pouvoirs psioniques latents n'étaient"
 utopia.2652.desc.1.outro: "a maintenant atteint son plein potentiel psionique."
 utopia.2652.desc.1.organic: "$utopia.2652.desc.1.intro$ présents qu'au sein d'une infime minorité, l'espèce entière $utopia.2652.desc.1.outro$"
 utopia.2652.desc.1.machine: "$utopia.2652.desc.1.intro$ présents qu'au sein d'une infime minorité, l'espèce entière $utopia.2652.desc.1.outro$"
 utopia.2652.desc.2.non_gestalt: "Si ces changements semblent être intervenus au sein de la [From.GetName], ils se manifestent aussi désormais chez tous les membres, sans considération du lieu où ils vivent."
 utopia.2652.desc.2.organic_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\nEn plus de démontrer de puissantes capacités psioniques, les [This.GetSpeciesNamePlural] ont aussi commencé à renoncer à la communication verbale, préférant désormais recourir à la télépathie."
 utopia.2652.desc.2.machine_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.desc.2.gestalt.intro: "En plus de démontrer de puissantes capacités psioniques, les [This.GetSpeciesNamePlural] peuvent désormais communiquer"
 utopia.2652.desc.2.organic_gestalt: "$utopia.2652.desc.2.gestalt.intro$ de manière non verbale, au-delà des canaux existants."
 utopia.2652.desc.2.machine_gestalt: "$utopia.2652.desc.2.gestalt.intro$ au-delà des canaux existants du collectif."
 utopia.2652.desc.organic_non_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_non_gestalt$"
 utopia.2652.desc.machine_non_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_non_gestalt$"
 utopia.2652.desc.organic_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_gestalt$"
 utopia.2652.desc.machine_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.b: "Il doit y avoir une explication logique"
 utopia.2652.c.organic: "Nous devrions nous montrer prudents"
 utopia.2652.c.machine: "La situation est loin d'être idéale"
 utopia.2652.d.organic: "Nous avons perçu le grand tumulte psionique causé par leur Éveil"
 utopia.2652.d.machine: "Ceci explique les perturbations psioniques que nous avons détectées"
 utopia.2650.name: "Le Grand Éveil"
 utopia.2650.desc: "L'espèce [Root.GetSpeciesAdj] a connu ce qui ne peut être décrit que comme un « Grand Éveil ». Depuis quelque temps déjà nous étions conscients des grandes capacités psioniques inhérentes à notre espèce, mais de tels pouvoirs ne se manifestaient jusqu'à présent que chez une minorité réduite. Jusqu'à présent.\n\nQuasiment en une nuit, tous les [Root.GetSpeciesNamePlural] ont accédé à leurs pleines capacités psioniques, comme si une sorte de réserve d'énergie psychique commune à toute l'espèce [Root.GetSpeciesAdj] avait atteint un seuil critique, éveillant collectivement les capacités latentes de nos cerveaux.\n\nLa télépathie a déjà commencé à remplacer la plupart des communications verbales entre [Root.GetSpeciesNamePlural], et ce n'est là que l'un des exemples des changements innombrables auxquels est confrontée notre société. Nous sommes désormais liés les uns aux autres, d'une façon telle que personne n'aurait jamais osé l'imaginer."
 utopia.2650.a: "Le voile a été levé"
 utopia.2655.name: "Le Suaire"
 utopia.2655.desc: "Comme un murmure étouffé dans une pièce obscure, le Suaire nous appelle depuis nos esprits. C'est un domaine primordial d'énergie psychique pure, apparu à l'aube des temps. Toutes les créatures ayant reçu le don de capacités psioniques y puisent d'une façon ou d'une autre ses pouvoirs, même si cela reste inconscient.\n\nDepuis notre transcendance, nous avons commencé à voir le Suaire avec bien plus de clarté. Il y a des motifs là où auparavant nos télépathes les plus puissants ne pouvaient apercevoir qu'une masse informe d'énergie tourbillonnante. Il y a... d'autres choses, aussi. Des esprits, en quelque sorte, qui nous regardent depuis l'autre côté. Parfois avec curiosité, parfois avec affection... Et parfois avec malveillance.\n\nNous n'en sommes encore qu'à découvrir l'étendue de nos nouveaux pouvoirs, mais il nous est possible de communiquer avec ces esprits. Cela va toutefois nécessiter les efforts combinés de nos télépathes les plus puissants."
 utopia.2655.a: "Nous devons explorer ce Suaire"
 BREACHING_SHROUD_PROJECT: "Pénétrer le Suaire"
 BREACHING_SHROUD_PROJECT_DESC: "Si nous voulons communiquer avec les habitants du domaine psychique que nous appelons le Suaire, nous allons devoir déchaîner une quantité d'énergie psionique ahurissante. Les préparatifs sont en cours pour faire une séance à laquelle participeront les psychistes les plus puissants du tout nouveau Conclave des télépathes de [Root.Capital.GetName]."
 utopia.2656.name: "La Séance"
 utopia.2656.desc: "Après être restés des jours durant dans une transe hypnotique, les psychistes du Conclave des télépathes sont enfin parvenus à ménager brièvement une entrée dans le Suaire.\n\nMaintenant qu'un premier lien psionique a été établi, nous allons pouvoir désormais y accéder par le menu des §Hcontacts§!. Toutefois, pour pouvoir nous rendre dans ce domaine et y rencontrer les êtres qui s'y trouvent, nous aurons très certainement besoin d'user d'émetteurs psioniques spéciaux, capables d'étendre notre portée psychique. Ceci va donc consommer une quantité phénoménale d'énergie."
 utopia.2656.a: "Il est temps d'aller voir ce qu'on peut y trouver"
 utopia.2657.name: "À travers le miroir"
 utopia.2657.desc: "Nous n'avons pas encore percé le voile, mais il est aisé de sentir qu'il ne cesse de s'amenuiser et de perdre en épaisseur, sous la pression combinée de tous nos esprits. Pourtant, de l'autre côté, nos efforts pour pénétrer le §HSuaire§! ont été remarqués. Quelque chose nous observe.\n\nSa présence irradie un pouvoir phénoménal, et un dessein insondable. Cela suinte à travers les fêlures de notre psyché.\n\nCela nous remarque à peine. Cela nous surveille, un peu à la manière dont nous observerions nous-mêmes une goutte de condensation glissant sur un hublot. Si seulement nous pouvions atteindre son esprit insondable, cela pourrait nous laisser entrer."
 utopia.2657.a: "Tentons de communier avec cela"
 utopia.2657.a.tt: "Cela va nous permettre de créer un §Gaccord§!."
 utopia.2657.b: "Mieux veut nous avancer seuls dans le Suaire"
 utopia.2657.c: "C'était une terrible erreur, soyons plus prudents !"
 utopia.2658.name: "Une confirmation"
 utopia.2658.desc: "Du temps a passé depuis que nous avons posé les bases d'un accord avec [Root.GetShroudPatron_FR_lelales]. Notre lien est encore fragile, nous avons donc encore une chance de le rompre, ou au contraire de le renforcer."
 utopia.2658.a: "Confirmons l'accord"
 utopia.2658.b: "Renonçons au plus vite !"
 utopia.2659.name: "Une entrée"
 utopia.2659.desc: "Les télépathes ont longuement oeuvré à percer enfin le §HSuaire§! sans devoir s'appuyer sur l'aide de ce qui réside au-delà du voile. Et, enfin, ils ont trouvé une entrée. Ces abysses nous appellent. Ne reste plus qu'à trouver le courage de nous y plonger."
 utopia.2659.a: "Avançons-nous maintenant dans le Suaire !"
 FORM_COVENANT_PROJECT: "Communier avec l'ineffable"
 FORM_COVENANT_PROJECT_DESC: "Le Conclave des télépathes, sur [Root.Capital.GetName], prépare une communion afin d'atteindre une entité résidant dans le Suaire."
 utopia.3020.name: "§GAvatar psionique convoqué§!"
 utopia.3020.desc: "Nous sommes parvenus à canaliser les puissantes énergies du §HSuaire§! en un avatar psionique que nous contrôlons !\n\nAprès l'avoir translaté dans notre propre dimension, cet avatar nouveau-né s'est métamorphosé en une entité spatiale en orbite de [Root.Capital.GetName]."
 utopia.3021.desc: "Nous sommes parvenus à canaliser les puissantes énergies du §HSuaire§! en un avatar psionique que nous contrôlons !\n\nAprès l'avoir translaté dans notre propre dimension, cet avatar nouveau-né s'est métamorphosé en un guerrier colossal, à la surface de [Root.Capital.GetName]."
 utopia.3022.name: "§RÉchec de la convocation§!"
 utopia.3022.desc: "Les pouvoirs psioniques nécessaires pour convoquer un avatar et le ramener dans notre propre dimension sont tout simplement au-delà de nos capacités de canalisation actuelles. Les énergies du §HSuaire§! s'agitent, tandis même que notre tentative se solde par un échec."
 utopia.3023.name: "Attaque de l'entité psionique"
 utopia.3023.desc: "La tentative pour convoquer un avatar psionique n'a été qu'un succès tout relatif : si la créature a bien pris la forme voulue et s'est bien translatée dans notre propre dimension, les [GetTelepathPlural] ne sont pas parvenus à le maintenir sous contrôle !\n\nNous sommes désormais confrontés à une entité psionique agressive, qui va tout détruire sur son passage."
 utopia.3024.name: "Incursion du Suaire"
 utopia.3024.desc: "Une créature du §HSuaire§! a traversé la trame de l'espace pour se matérialiser dans le système de [shroud_spawn_system.GetName] ! Cet avatar ivre de vengeance a assemblé une quantité gigantesque d'énergie psionique, et la déchaîne contre tout ce qui a le malheur de se trouver sur sa route."
 utopia.3024.a: "Il faut l'arrêter !"
 utopia.3026.name: "Bannissement de l'avatar du Suaire"
 utopia.3026.desc: "L'atrophie continuelle liée au fait d'exister dans un espace normal a affaibli l'avatar du système de §H[shroud_spawn_system.GetName]§!.\n\nIncapable de se maintenir sous une forme tangible, il est retourné dans le §HSuaire§!."
 utopia.3026.a.default: "Bon débarras"
 utopia.3026.a.machine_or_hive: "Un dénouement fortuit"
 exit.shroud: "Sortons du Suaire"
 shroud_army: "Avatar psionique"
 shroud_army_desc: "Un guerrier colossal, venu du Suaire, s'est formé à partir d'énergie psionique pure."
