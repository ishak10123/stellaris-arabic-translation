 utopia.3000.name: "Le Suaire"
 utopia.3000.a: "Entrons dans le Suaire"
 utopia.3000.intro.desc: "Le Suaire. Il est incroyablement étrange et perturbant, mais aussi... instantanément familier. Quiconque dispose de pouvoirs psioniques aura déjà aperçu ce lieu dans ses rêves, même s'il ne le savait pas alors.\n\nNous nous tenons en ce moment même au bord de ce domaine, non loin du néant de l'Entre-Deux qui sert de frontière entre ici et l'espace normal - ou ce que nous appellerions le monde réel.\n\nNous aventurer plus avant dans le Suaire nécessitera de grands efforts de nos télépathes, de même qu'une grande quantité d'énergie. Mais mieux vaut ne pas trop tarder... Nous sommes surveillés, en ce moment même."
 utopia.3000.1.desc: "Le Suaire est calme aujourd'hui."
 utopia.3000.2.desc: "Quelque chose nous surveille."
 utopia.3000.3.desc: "Tout paraît si différent de ce côté."
 utopia.3000.4.desc: "C'est un poète qu'ils auraient dû envoyer..."
 utopia.3000.5.desc: "Quelque chose de sombre s'approche."
 utopia.3000.6.desc: "Sommes-nous toujours en train de rêver ?"
 utopia.3000.7.desc: "Nous... Nous l'avons fait. Nous sommes à l'intérieur !"
 utopia.3000.8.desc: "Une... présence, en quelque sorte. Toute proche. Elle nous appelle, depuis l'intérieur du Suaire..."
 utopia.3000.9.desc: "Entendez-vous les voix, vous aussi ?"
 utopia.3000.10.desc: "Le Suaire vibre de pouvoir. On s'y sent comme... comme chez soi."
 utopia.3000.11.desc: "Pensez-vous vraiment que ce que vous êtes en train de respirer en ce moment est de l'air ?"
 utopia.3000.12.desc: "Nous voyons, tout en ne voyant pas. Il y a tant à apprendre sur ce lieu."
 utopia.3000.13.desc: "Quel sens nous fait donc défaut, pour que nous ne puissions ni voir, ni entendre un autre monde qui nous entoure ?"
 utopia.3000.14.desc: "Faisons preuve de la plus grande prudence. Même une vague pensée peut devenir quelque chose de tangible ici... Et, dans la plupart des cas, se retourner contre nous."
 utopia.3000.15.desc: "Nous n'avons jamais été conçus pour nous trouver en ce lieu."
 utopia.3000.16.desc: "Une... telle... puissance..."
 utopia.3000.17.desc: "Dois... concen... trer..."
 utopia.3000.18.desc: "Serait-ce là que tout a commencé ?"
 utopia.3000.19.desc: "L'horreur... L'horreur a un visage."
 utopia.3000.b: "§MTentons de contacter une puissance du lieu§!"
 utopia.3005.desc: "Nous savons que des puissances immenses se trouvent là. Les télépathes ressentent leur présence dans tout le Suaire.\n\nSi en temps normal nous n'en serions pas remarqués, nous pouvons malgré tout tenter de les atteindre en capitalisant sur le pouvoir du zro. Laquelle d'entre elles devrions-nous chercher à atteindre ?"
 utopia.3005.a: "§GUne puissance empestant la chair non née§!"
 utopia.3005.b: "§PUne puissance qui hurle un vide insatiable§!"
 utopia.3005.c: "§HUne puissance goûtant la jalousie et l'appropriation§!"
 utopia.3005.d: "§BUne puissance murmurant la trompeuse vérité§!"
 utopia.3010.desc: "Le Conclave des télépathes n'a pas encore recouvré de l'effort réalisé lors de sa dernière visite dans le Suaire. Sans la puissance additionnée de l'ensemble de ses membres, nous ne pouvons rien faire d'autres qu'entrapercevoir brièvement quelques visions de ce plan flottant, comme les contours flous d'un souvenir se trouvant juste hors de portée.\n\nNous ne pourrons rien y faire. Mieux vaut attendre un peu avant d'y retourner."
 boon.bestowed: "§GAvantage§!"
 curse.bestowed: "§RMalédiction§!"
 boon.psi.link.machine: "Les puissantes énergies du §HSuaire§! se sont déversées dans le centre de traitement psionique que partagent tous les [Root.GetSpeciesNamePlural]."
 boon.psi.link.organic_non_gestalt: "Les puissantes énergies du §HSuaire§! se sont déversées dans le lien psionique que partagent tous les [Root.GetSpeciesNamePlural]."
 boon.psi.link.hive: "Les puissantes énergies du §HSuaire§! se sont déversées dans le lien psionique qui pulse à travers l'esprit supérieur des [Root.GetSpeciesNamePlural]."
 boon.psi.link: "[GetBoonPsiLink]"
 boon.ship.link: "Les [GetTelepathPlural] ont réussi à établir un conduit temporaire entre le §HSuaire§! et nos vaisseaux."
 utopia.3030.desc.gestalt: "$boon.psi.link$\n\nCes énergies circulent dans le réseau collectif, assurant une stabilité optimale pendant que nos drones remplissent leurs fonctions."
 utopia.3030.desc.organic_non_gestalt: "$boon.psi.link$\n\nUn calme profond se répand dans toute la [Root.GetName], que ressentent même ceux qui ne disposent d'aucune capacité psionique."
 utopia.3030.desc.machine_non_gestalt: "$boon.psi.link$\n\nUn profond équilibre opérationnel se répand dans toute la [Root.GetName], que ressentent même ceux qui ne disposent d'aucun composant psionique."
 utopia.3031.desc: "$boon.ship.link$\n\nNos flottes ne présentent aucun signe de dégradation, quels que soient leurs antécédents. Le coût de leur entretien a donc diminué de manière importante."
 utopia.3032.desc.non_gestalt: "$boon.psi.link$\n\nUne base de connaissance collective, partagée de manière télépathique par les [GetScientistPlural], a été mise sur pied. Elle permettra de grandement accroître l'efficacité de leurs recherches."
 utopia.3032.desc.organic_gestalt: "$boon.psi.link$\n\nLes noeuds scientifiques de l'esprit supérieur des [Root.GetSpeciesNamePlural] fonctionnent en parfaite synchronisation, ce qui accroît notre efficacité cognitive."
 utopia.3032.desc.machine_gestalt: "$boon.psi.link$\n\nLes boucles de rendu psioniques permettent à notre matrice de recherche de fonctionner au-delà de l'efficacité maximale, ce qui accroît considérablement l'apprentissage."
 utopia.3033.desc: "$boon.ship.link$\n\nLes équipages des vaisseaux militaires peuvent désormais accroître la puissance des systèmes de boucliers en faisant usage de leurs pouvoirs psioniques."
 utopia.3034.desc: "$boon.ship.link$\n\nEn faisant usage de leurs pouvoirs psioniques, nos équipages sont désormais en mesure d'accroître la puissance des systèmes d'armement."
 utopia.3035.desc: "$boon.ship.link$\n\nGrâce à leurs pouvoirs psioniques, nos équipages peuvent désormais accroître la cadence de tir des systèmes d'armement de nos vaisseaux."
 utopia.3036.desc.organic_non_gestalt: "$boon.psi.link$\n\nUn nouveau sentiment de solidarité s'est fait jour dans le coeur et l'esprit de nos concitoyens, les rendant plus désireux de travailler de concert pour atteindre les objectifs communs établis par le gouvernement."
 utopia.3036.desc.machine_non_gestalt: "$boon.psi.link$\n\nUn nouveau sentiment de solidarité s'est fait jour dans les noyaux de traitement de nos concitoyens, les rendant plus désireux de travailler de concert pour atteindre les objectifs communs établis par le gouvernement."
 utopia.3036.desc.gestalt: "$boon.psi.link$\n\nCes énergies persistent dans le collectif, optimisant l'efficacité de nos drones et réduisant toute déviance résiduelle qui aurait pu distraire notre attention."
 utopia.3037.desc.organic_non_genocidal: "$boon.psi.link$\n\nNotre empathie en est sortie plus que jamais renforcée, ce qui se traduit par une influence politique plus grande."
 utopia.3037.desc.machine_non_genocidal: "$boon.psi.link$\n\nNos unités diplomatiques fonctionnent avec une efficacité empathique maximale, ce qui leur permet de gagner en influence."
 utopia.3037.desc.genocidal: "$boon.psi.link$\n\nNous imposons notre volonté à la galaxie avec une ampleur sans précédent."
 utopia.3038.desc.gestalt: "$boon.psi.link$\n\nNous n'avons jamais connu une telle clarté et une telle unité d'intérêts."
 utopia.3038.desc.non_gestalt: "$boon.psi.link$\n\nJamais nous n'avions ressenti un tel sentiment d'unité."
 utopia.3039.desc: "$boon.ship.link$\n\nFaisant usage de leurs pouvoirs psioniques, nos équipages sont désormais capables d'affecter directement le déplacement des vaisseaux, ce qui accroît ainsi leur capacité à éviter les tirs ennemis."
 utopia.3040.desc.organic: "$boon.ship.link$\n\nGrâce à leurs pouvoirs psioniques, les équipages peuvent désormais effectuer des réparations limitées sur les champs, rebouchant les fissures des coques avec leurs seuls esprits."
 utopia.3040.desc.machine: "$boon.ship.link$\n\nGrâce à leurs pouvoirs psioniques, les équipages peuvent désormais effectuer des réparations limitées sur les champs, rebouchant les fissures des coques avec leurs seuls neuroprocesseurs."
 utopia.3041.desc.machine: "$boon.psi.link$\n\nNos [GetTelepathPlural] ont utilisé ce pouvoir pour temporairement améliorer les performances de nos unités de commandement les plus importantes, retardant ainsi leur date d'obsolescence estimée de plusieurs décennies. Malheureusement, l'énergie psionique n'était pas suffisante pour en faire profiter l'ensemble de la population."
 utopia.3041.desc.organic_gestalt: "$boon.psi.link$\n\nNos [GetTelepathPlural] ont utilisé ce pouvoir pour temporairement allonger l'espérance de vie de nos drones de commandement les plus importants de quelques décennies. Malheureusement, l'énergie psionique n'était pas suffisante pour en faire profiter l'ensemble de la population."
 utopia.3041.desc.organic_non_gestalt: "$boon.psi.link$\n\nNos [GetTelepathPlural] ont utilisé ce pouvoir pour temporairement allonger l'espérance de vie de nos chefs les plus importants de quelques décennies. Malheureusement, l'énergie psionique n'était pas suffisante pour en faire profiter l'ensemble de la population."
 utopia.3041.tooltip: "Toutes les personnalités vont recevoir le trait §Y$leader_trait_shroud_age$§! :\n$MOD_LEADER_AGE$: §G+40§! ans"
 utopia.3042.desc: "$boon.ship.link$\n\nFaisant usage de leurs pouvoirs psioniques, les équipages sont désormais en mesure d'accroître la puissance des propulseurs des vaisseaux, permettant ainsi d'accélérer la vitesse de déplacement subluminique."
 utopia.3043.desc.organic: "$boon.psi.link$\n\nCela a fortifié les esprits de nos soldats, qui sont prêts désormais à braver tous les dangers sur le champ de bataille. Leur moral atteint des niveaux inédits."
 utopia.3043.desc.machine_or_gestalt: "$boon.psi.link$\n\nCela a renforcé l'engagement de nos drones de combat à atteindre leur objectif, en améliorant leur efficacité sur le terrain."
 utopia.3044.desc: "$boon.psi.link$\n\nNous pouvons désormais sentir les vaisseaux se déplacer dans l'espace, à une distance bien plus grande que tout ce que pourrait faire n'importe quel capteur conventionnel."
 utopia.3045.name: "Éjectés du Suaire"
 utopia.3045.1.desc: "Le conduit par lequel les [GetTelepathPlural] se connectaient au Suaire s'est effondré sur lui-même, plusieurs couches d'énergie du domaine psychique s'y étant engouffrées soudain sans prévenir.\n\nNous avons été brutalement ramenés dans l'espace normal."
 utopia.3045.2.desc: "Les [GetTelepathPlural] ont été balayés par le flux intense d'énergie qui s'est dégagé lors de notre communion avec le Suaire.\n\nIls n'ont pu maintenir le lien."
 utopia.3045.3.desc_organic: "Lentement au départ, puis de plus en plus rapidement, le contrôle sur le Suaire a commencé à nous échapper. Les [GetTelepathPlural] se sont mis à crier de douleur, alors qu'ils perdaient pied et que nous étions éjectés dans l'espace normal."
 utopia.3045.3.desc_machine: "Lentement au départ, puis de plus en plus rapidement, le contrôle sur le Suaire a commencé à nous échapper. Les [GetTelepathPlural] se sont mis à mal fonctionner, alors qu'ils perdaient pied et que nous étions éjectés dans l'espace normal."
 curse.psi.link.organic: "Un puissant retour de pouvoir psychique a reflué par le conduit menant au Suaire, et dans le lien psionique partagé par tous les [Root.GetSpeciesNamePlural]."
 curse.psi.link.machine: "Un puissant retour de pouvoir neuronal a reflué par le conduit menant au Suaire, et dans le lien psionique partagé par tous les [Root.GetSpeciesNamePlural]."
 curse.psi.link: "[GetCursePsiLink]"
 curse.ship.link: "Un puissant retour de pouvoir psionique a reflué par le conduit menant au Suaire, ce qui semble affecter nos vaisseaux."
 utopia.3050.desc.gestalt: "$curse.psi.link$\n\nCela a provoqué une perturbation au sein du collectif [Root.GetName], entraînant une déstabilisation à l'échelle de l'empire."
 utopia.3050.desc.non_gestalt: "$curse.psi.link$\n\nCela a eu des conséquences importantes sur le bonheur de tous les citoyens, et une impression d'abattement s'appesantit maintenant sur la [Root.GetName]."
 utopia.3051.desc.gestalt: "$curse.psi.link$\n\nL'onde de choc qui en a résulté au sein du collectif s'est traduite par l'émergence inquiétante de comportements déviants parmi nos drones."
 utopia.3051.desc.non_gestalt: "$curse.psi.link$\n\nCette énergie négative a répandu le doute dans l'esprit des citoyens. Ils sont nombreux à se tourner désormais vers des solutions radicales, qui ne sont pas celles prônées par le gouvernement. Cela s'est même fait sentir chez tous ceux qui ne disposent d'aucun pouvoir psychique."
 utopia.3052.desc: "$curse.ship.link$\n\nLeur blindage est devenu fragile, et ne peut plus résister aux mêmes assauts qu'il le faisait auparavant."
 utopia.3053.desc.machine: "$curse.psi.link$\n\nLa tension exercée sur notre réseau neuronal a entraîné une baisse notable de la construction d'unités dans l'ensemble de la [Root.GetName]."
 utopia.3053.desc.organic_gestalt: "$curse.psi.link$\n\nLa douleur qui en résulte, ressentie par l'ensemble du collectif, a entraîné une diminution notable de notre capacité à produire de nouveaux drones physiques."
 utopia.3053.desc.organic_non_gestalt: "$curse.psi.link$\n\nPour une raison ou une autre, cela a eu un effet néfaste sur le taux de natalité dans toute la [Root.GetName], affectant même les membres des races n'ayant aucune capacité psionique inhérente."
 utopia.3054.desc.machine_gestalt: "$curse.psi.link$\n\nLes boucles de rétroaction de rendu psionique qui en résultent empêchent notre matrice de recherche de fonctionner efficacement à pleine capacité."
 utopia.3054.desc.machine_non_gestalt: "$curse.psi.link$\n\nLes [GetMindPhysicalLoc] de nos chercheurs sont surchargés, ce qui les empêche de se concentrer efficacement sur leur travail."
 utopia.3054.desc.organic_gestalt: "$curse.psi.link$\n\nLes noeuds scientifiques du collectif des [Root.GetSpeciesNamePlural] sont surchargés. Nous sommes donc dans l'incapacité de traiter efficacement les nouvelles découvertes."
 utopia.3054.desc.organic_non_gestalt: "$curse.psi.link$\n\nLes [GetMindPhysicalLoc] de nos chercheurs sont obscurcis, ce qui les empêche de se concentrer efficacement sur leur travail."
 utopia.3055.desc: "$curse.psi.link$\n\nLa rapidité à laquelle nous accumulons de l'influence politique en est désormais ralentie."
 utopia.3056.desc.organic_non_gestalt: "$curse.psi.link$\n\nLe sentiment d'unité qui prévalait autrefois entre les citoyens a été balayé."
 utopia.3056.desc.machine_or_gestalt: "$curse.psi.link$\n\nLe sentiment d'unité qui prévalait autrefois à travers la [Root.GetName] a été ébranlé, entraînant une mauvaise coordination généralisée."
 utopia.3057.desc: "$curse.ship.link$\n\nLes vaisseaux se déplacent désormais comme si une sorte de force invisible les retenait. La durée des voyages subluminiques en est considérablement ralentie."
 utopia.3058.desc.organic_non_gestalt: "$curse.psi.link$\n\nCette énergie négative a érodé le moral des troupes au sol, qui pour un temps seront bien moins efficaces au combat."
 utopia.3058.desc.machine_or_gestalt: "$curse.psi.link$\n\nLes boucles de rétroaction causées par cette poussée d'énergie ont nui à l'efficacité opérationnelle de nos troupes au sol."
 utopia.3059.desc: "Un puissant retour de pouvoir psionique a reflué par le conduit menant au Suaire, ce qui semble interférer avec les capteurs interstellaires.\n\nLa résolution de ces capteurs, quels qu'ils soient, en est grandement dégradée, ce qui se traduit par une portée nettement réduite."
