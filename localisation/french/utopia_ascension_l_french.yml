 instrument_chosen: "Élu de l'Instrument du désir"
 COMPOSER_MARK: "Toucher du Composeur de brins"
 COMPOSER_MARK_DESC: "Le toucher du Composeur de brins amplifie les capacités psioniques et permet d'influer sur des vaisseaux complets."
 EATER_MARK: "Toucher du Mangeur de mondes"
 EATER_MARK_DESC: "Le toucher du Mangeur de mondes amplifie les capacités psioniques et permet d'influer sur des vaisseaux complets."
 INSTRUMENT_MARK: "Toucher de l'Instrument du désir"
 INSTRUMENT_MARK_DESC: "Le toucher de l'Instrument du désir amplifie les capacités psioniques et permet d'influer sur des vaisseaux complets."
 WHISPERERS_MARK: "Toucher des Murmureurs du néant"
 WHISPERERS_MARK_DESC: "Le toucher des Murmureurs du néant amplifie les capacités psioniques et permet d'influer sur des vaisseaux complets."
 tech_covenant_composer: "$COMPOSER_MARK$"
 tech_covenant_composer_desc: "Nous avons découvert comment permettre à l'énergie psionique de s'écouler à travers des vaisseaux entiers. Grâce à ce savoir, nous pouvons désormais imprégner chacun d'entre eux de la puissance du Composeur de brins."
 tech_covenant_eater: "$EATER_MARK$"
 tech_covenant_eater_desc: "Nous avons découvert comment permettre à l'énergie psionique de s'écouler à travers des vaisseaux entiers. Grâce à ce savoir, nous pouvons désormais imprégner chacun d'entre eux de la puissance du Mangeur de mondes."
 tech_covenant_instrument: "$INSTRUMENT_MARK$"
 tech_covenant_instrument_desc: "Nous avons découvert comment permettre à l'énergie psionique de s'écouler à travers des vaisseaux entiers. Grâce à ce savoir, nous pouvons désormais imprégner chacun d'entre eux de la puissance de l'Instrument du désir."
 tech_covenant_whisperers: "$WHISPERERS_MARK$"
 tech_covenant_whisperers_desc: "Nous avons découvert comment permettre à l'énergie psionique de s'écouler à travers des vaisseaux entiers. Grâce à ce savoir, nous pouvons désormais imprégner chacun d'entre eux de la puissance des Murmureurs du néant."
 utopia.3400.name: "Divinisation du pouvoir"
 utopia.3400.desc: "L'être [GetImmortalLoc] connu sous le nom de §H[chosen_one.GetName]§!, membre auparavant de l'espèce [chosen_one_species.GetName] mais désormais quelque chose de bien supérieur, a suscité l'attention et la fidélité d'un grand nombre de personnes au sein de la [Root.GetName]. À l'égal d'une divinité supérieure, l'appel a été lancé pour lui remettre l'autorité suprême sur notre magnifique empire, maintenant et à jamais."
 utopia.3400.a: "Un grand pouvoir psychique certes, mais une divinité ?"
 utopia.3400.b: "Puisse-t-[chosen_one.GetSheHe] régner jusqu'à l'infini... et au-delà !"
 reject_god_emperor: "[chosen_one.GetName] restera [chosen_one.GetTitle]."
 utopia.3401.name: "Couronnement [chosen_one.GetDuDelaFDir] [chosen_one.GetTitle]"
 utopia.3401.desc.intro: "Un membre de l'espèce [chosen_one_species.GetName], bénéficiant de pouvoirs éminents, a pris le contrôle de la §H[From.GetName]§!. Le couronnement de cet être"
 utopia.3401.desc.outro: "qualifié subrepticement d'« Élu[chosen_one.GetXEDir] » par ses fidèles, a eu lieu sur [From.Capital.GetName] au cours d'une cérémonie grandiose. Un communiqué célébrant le règne éternel [chosen_one.GetDuDelaFDir] §H[chosen_one.GetRulerTitle] [chosen_one.GetRegnalName]§! a été envoyé à tous les gouvernements interstellaires aussitôt après."
 utopia.3401.desc.organic: "$utopia.3401.desc.intro$ immortel, $utopia.3401.desc.outro$"
 utopia.3401.desc.machine: "$utopia.3401.desc.intro$ éternel, $utopia.3401.desc.outro$"
 utopia.3401.a: "[chosen_one.GetName] a été touché[chosen_one.GetXEDir] par le Suaire"
 utopia.3401.b: "Pures superstitions insensées"
 utopia.3401.c: "La situation est intéressante"
