 opinion_invaded_mind: "Tentative d'invasion de l'esprit"
 utopia.3100.name: "Ruines ardentes"
 utopia.3100.desc_prefix: "[Root.Capital.GetName]... La vision est brouillée et indistincte, mais on ne peut en douter : c'est bien [Root.Capital.GetName], notre monde-capitale. "
 utopia.3100.desc_suffix: "\n\n§HPAS UN PARMI D'AUTRES. CELA VA SE PRODUIRE. AUSSI SÛREMENT QUE LE SOLEIL SE LÈVE. C'EST LÀ VOTRE DESTINÉE.§!\n\nLa vision s'achève aussi brusquement qu'elle a commencé, abandonnant derrière elle un miasme d'énergies psioniques tourbillonnantes."
 utopia.3100.desc_default: "$utopia.3100.desc_prefix$Ses grandes cités paraissent différentes tout en étant familières, même à travers les murs obscurs des flammes et de la fumée. Des milliers... non, des millions de corps mutilés jonchent les rues, tous des [Root.GetSpeciesNamePlural]. La puanteur de la putréfaction est insupportable.\n\n§HVOTRE AVENIR.§!\n\nPas une seule trace de vie parmi les ruines. Dans le ciel, au-dessus, des installations orbitales gigantesques, laissant des traînées de fumée, ont entamé une descente lente mais inévitable vers la planète. Serions-nous en train de contempler un avenir possible, parmi de nombreux autres ?$utopia.3100.desc_suffix$"
 utopia.3100.desc_hive: "$utopia.3100.desc_prefix$Ses grandes cités paraissent différentes tout en étant familières, même à travers les murs obscurs des flammes et de la fumée. Des milliers... non, des millions de corps mutilés jonchent les rues, tous des [Root.GetSpeciesNamePlural]. La puanteur de la putréfaction est omniprésente.\n\n§HVOTRE AVENIR.§!\n\nPas une seule trace de vie parmi les ruines. Dans le ciel, au-dessus, des installations orbitales gigantesques, laissant des traînées de fumée, ont entamé une descente lente mais inévitable vers la planète. Serions-nous en train de contempler un avenir possible, parmi de nombreux autres ?$utopia.3100.desc_suffix$"
 utopia.3100.desc_machine: "$utopia.3100.desc_prefix$Ses grandes cités paraissent différentes tout en étant familières, même à travers les murs obscurs des flammes et de la fumée. Des milliers... non, des millions d'unités démontées jonchent les rues, tous des [Root.GetSpeciesNamePlural]. Nous sommes entourés de destruction.\n\n§HVOTRE AVENIR.§!\n\nIl ne reste plus rien de fonctionnel dans les ruines. Dans le ciel, au-dessus, des installations orbitales gigantesques, laissant des traînées de fumée, ont entamé une descente lente mais inévitable vers la planète. Serions-nous en train de contempler un avenir possible, parmi de nombreux autres ?$utopia.3100.desc_suffix$"
 utopia.3100.a: "§GCanalisons ces énergies dans un avatar§!"
 utopia.3100.b: "§YAvantage : portée des capteurs accrue§!"
 utopia.3100.c: "§RAvantage : puissance des boucliers accrue§!"
 utopia.3110.name: "Duels d'apparitions"
 utopia.3110.desc: "Le Suaire est particulièrement tempétueux ici. Des courants violents d'énergie psionique pure s'y déversent, donnant naissance à des apparitions violentes, à demi intelligentes.\n\nCes esprits confus s'opposent souvent les uns aux autres, déchaînant alors des quantités phénoménales de puissance psychique, au cours de combats qui peuvent durer des milliers d'années. En fait, plusieurs de ces affrontements semblent avoir lieu, en ce moment même.\n\nNous devons nous montrer extrêmement prudents."
 utopia.3120.name: "Visiteurs psioniques"
 utopia.3120.desc_suffix: "Des visiteurs, tout comme nous : une puissante sonde psionique, fabriquée par des esprits qui nous sont aussi étrangers qu'ils le sont au Suaire.\n\nLorsque leur écho psionique rencontre le nôtre, une image floue vacille brièvement, celle d'êtres organiques massifs flottant dans une atmosphère gazeuse, épaisse, assistés d'essaims de créatures plus fluettes."
 utopia.3120.desc_machine: "Au plus profond du Suaire, nous détectons une présence. $utopia.3120.desc_suffix$"
 utopia.3120.desc_default: "Au plus profond du Suaire, une présence se fait soudainement sentir. $utopia.3120.desc_suffix$"
 utopia.3130.name: "Sables infinis"
 utopia.3130.desc: "Un désert sans fin s'étend devant nous. Nous sommes déjà venus là.\n\n§H« Shala'kul milem zunak ? »§!\n\nQuelque chose émerge du sable. Difficile de bien voir.\n\n§H« Zharabi, melasuk. »§!\n\nLes mots sont comme le tonnerre, prononcés par une bouche pour laquelle ils n'ont jamais été conçus. Nous sommes contraints de répondre."
 utopia.3130.a: "Shashka malak"
 utopia.3130.b: "Tirit nali dasumara !"
 utopia.3130.c: "Kunak de'Kirak"
 utopia.3140.name: "Multiplicité"
 utopia.3140.desc_common: "la nature de notre existence est là, nue et froide. Un multivers, où des milliers de galaxies comme la nôtre sont prises dans un cycle éternel de conflits.\n\nCela commence, cela s'achève, avant de recommencer de nouveau. Chaque fois, des milliers de milliards de"
 utopia.3140.desc_suffix: "§H« Il en va ainsi »§! murmure une voix, §H« et il en ira toujours ainsi. »§!"
 utopia.3140.desc_default: "Soudainement, en un douloureux moment de clairvoyance, $utopia.3140.desc_common$ vies se trouvent dans la balance.\n\n$utopia.3140.desc_suffix$"
 utopia.3140.desc_machine: "Soudainement, en un troublant moment de clairvoyance, $utopia.3140.desc_common$ variables se trouvent dans la balance.\n\n$utopia.3140.desc_suffix$"
 utopia.3150.name: "Voix des déchus"
 utopia.3150.desc: "Nous baissons le regard sur notre galaxie, depuis un lieu situé bien au-dessus, très certainement éloigné de centaines de milliers d'années-lumière. Sans prévenir, les courants psioniques nous font plonger dans les myriades d'étoiles à une vitesse inimaginable, dans la région de l'espace que contrôle l'un des empires déchus, la [fallen_empire.GetName].\n\nLes étoiles défilent, puis les planètes, jusqu'à ce que la vision se pose enfin sur une cité [fallen_empire.GetSpeciesName]. Des tours incroyables s'élèvent vers le ciel, soutenues par une technologie anti-gravité qui a des générations et des générations d'avance sur la nôtre. Le courant nous emmène dans l'une de ces tours, à travers des murs sans nombre, jusqu'à ce que nous arrivions à une sorte de grande salle de réunion. Elle est occupée par deux [fallen_empire.GetSpeciesNamePlural], flottant confortablement dans des sièges zéro-gravité tout en conversant d'une voix calme.\n\nIls ne sentent pas notre présence."
 utopia.3150.a: "§YEntrons dans leurs esprits pour en percer les secrets§!"
 utopia.3151.name: "§GSecrets technologiques§!"
 utopia.3151.v1.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.1.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.4.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v2.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.2.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.5.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v3.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.3.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.6.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.a.desc: "Ces [fallen_empire.GetSpeciesNamePlural] sont clairement des dignitaires d'une sorte ou d'une autre, discutant des affaires d'État. Lentement, sûrement, la vision s'approche d'eux, tandis même que leur parler alien se transforme progressivement en des mots faisant sens pour nous."
 utopia.3151.b.desc: "Le rayonnement de l'esprit de ces deux [fallen_empire.GetSpeciesNamePlural] est accablant. Comme une fleur en pleine floraison, ils sont grands ouverts, mis à nu. Il serait tellement aisé d'y pénétrer."
 utopia.3151.c.desc: "Là ! Les secrets technologiques arrachés aux replis de leurs esprits, aussi facilement que si l'on voulait copier un fichier dans un ordinateur non verrouillé. Les [fallen_empire.GetSpeciesNamePlural] restent ignorants du vol qui vient de se dérouler dans leurs propres cerveaux."
 utopia.3151.1.desc: "§H« ... est folle. Si elle pense que le peuple serait prêt à accepter volontairement, ne serait-ce qu'un temps, une dégradation des conditions de vie auxquelles il est habitué, il y a... »§!"
 utopia.3151.2.desc: "§H« ... est un véritable outrage. Imaginez si les races plus jeunes en venaient même à suspecter que nous ne sommes nous-mêmes plus à même de comprendre entièrement notre propre technologie ! Il faut à tout prix... »§!"
 utopia.3151.3.desc: "§H« ... se font de plus en plus puissants. Certains, au Conseil, sont convaincus que si nous ne réagissons pas... »§!"
 utopia.3151.4.desc: "§H« ... quoi que puisse en dire le Conseil. Les jeunots ont encore des millénaires de retard sur nous, et leurs flottes pitoyables ne sont pas plus un danger pour nous qu'un moucheron gazurien qui voudrait consumer un lézard de feu d'Hilaxi. Il n'est nullement besoin de... »§!"
 utopia.3151.5.desc: "§H« ... reste persuadé que les actions de rétorsion sont malvenues. Ils sont jeunes, écervelés, mais nous aussi l'avons été autrefois. Ils ont encore le temps pour... »§!"
 utopia.3151.6.desc: "§H« ... et que peut-être nous aurions dû veiller bien plus tôt à sélectionner les races plus jeunes, avant qu'elles ne deviennent trop puissantes. Je dois dire que je me range à son avis, mais le Conseil pense qu'il est trop tard désormais pour ... »§!"
 utopia.3152.name: "Secrets inédits"
 utopia.3152.desc: "Ces [fallen_empire.GetSpeciesNamePlural] sont clairement des dignitaires d'une sorte ou d'une autre, discutant des affaires d'État. Lentement, sûrement, la vision s'approche d'eux, tandis même que leur parler alien se transforme progressivement en des mots faisant sens pour nous.\n\nSoudainement, les aliens se calment, ne faisant plus un geste.\n\n§H« Le sentez-vous ? »\n\n« Oui. Quelqu'un nous observe. »§!\n\nIls parcourent la pièce, jusqu'à ce qu'ils posent les yeux directement sur nous.\n\n§H« C'est remarquable. Une sonde psionique. »§!\n\n§H« Elle a tout l'air d'être de conception [Root.GetSpeciesName]. Vite, activons le bouclier transplan. »§!\n\nLa vision s'interrompt brutalement."
 utopia.3153.desc: "[Root.GetSpeciesNamePlural].\n\nNe pensez pas que votre répugnante tentative pour vous infiltrer dans l'esprit de nos dirigeants est passée inaperçue.\n\nIl y aura des répercussions."
 utopia.3153.a: "M... Mais... Nous pouvons vous expliquer !"
 utopia.3153.b: "Nous avons une explication tout à fait logique..."
 utopia.3160.name: "Lueur dans le vide"
 utopia.3160.desc: "Une petite étoile scintillante se matérialise dans le Suaire. Elle passe à une vitesse incroyable et, une seconde, se révèle être un vaisseau alien d'une conception totalement inconnue. Puis elle disparaît, dans un nuage d'énergie psionique, aussi rapidement qu'elle est apparue.\n\nEst-ce même possible ? Est-il réellement possible d'entrer physiquement dans le Suaire et d'en émerger à un endroit différent dans l'espace normal ?"
 utopia.3160.a: "§YRestons un moment§!"
 utopia.3161.desc: "Une nouvelle étoile scintillante apparaît brusquement, mais cette fois nous sommes prêts. Il s'agit bien, en effet, d'un vaisseau alien, différent de tout ce que nous avons pu voir dans notre galaxie. Alors qu'il passe à côté de nous, nous sentons la radiance de l'esprit de son équipage, et tous leurs secrets sont désormais à nous.\n\nUn propulseur de bond psionique. Ingénieux, vraiment."
 utopia.3161.name: "§GPropulseur de bond psionique§!"
 utopia.3162.desc: "Une nouvelle étoile scintillante apparaît brusquement, mais cette fois nous sommes prêts. Il s'agit bien, en effet, d'un vaisseau alien, différent de tout ce que nous avons pu voir dans notre galaxie. Alors qu'il passe à côté de nous, nous sentons la radiance de l'esprit de son équipage, mais leurs intellects sont plus sombres et plus aliens que tous ceux que nous avons pu rencontrer jusqu'à présent.\n\nNon seulement nous sommes repoussés de leur vaisseau, mais en plus le souffle psionique violent de ses propulseurs nous rejette en dehors du Suaire ! La vitesse de déplacement subluminique de nos vaisseaux en est momentanément ralentie."
 utopia.3170.name: "Entité protégée"
 utopia.3170.desc: "Après avoir suivi un faible écho dans le Suaire, nous rencontrons un esprit qui s'est confortablement abrité derrière une sorte de puissant bouclier psionique.\n\n§HPARTEZ !§!"
 utopia.3170.a: "§YTentons de pénétrer le bouclier§!"
 utopia.3171.name: "§GBoucliers psioniques§!"
 utopia.3171.desc_suffix: "malgré tout, car le fait d'ouvrir cette brèche nous a appris comment générer un champ de force identique. Si nous parvenons à maîtriser un peu mieux cette technique, nous pourrions même façonner des boucliers psioniques suffisamment vastes pour protéger un vaisseau entier..."
 utopia.3171.desc_machine_gestalt: "Nous ne nous sommes pas enfoncés si loin au sein du Suaire pour en sortir maintenant. Après avoir concentré les capacités psioniques du collectif, nous avons été capables de créer une brèche dans le bouclier, suffisamment large pour que quelques-uns s'y engouffrent.\n\nCe qui se trouve au-delà du bouclier dépasse notre entendement, submergeant de manière critique plusieurs de nos processeurs psioniques. Leur sacrifice n'a pas été vain, $utopia.3171.desc_suffix$"
 utopia.3171.desc_organic: "Nous ne nous sommes pas enfoncés si loin au sein du Suaire pour en sortir maintenant. Après avoir canalisé toute leur puissance psionique, les télépathes ont été capables de former une brèche dans le bouclier, suffisamment large pour que quelques-uns s'y engouffrent.\n\nNous ne savons pas ce qu'ils ont vu de l'autre côté du bouclier, mais cela a suffi pour perturber leurs esprits de manière permanente. Leur sacrifice n'a pas été vain, $utopia.3171.desc_suffix$"
 utopia.3172.name: "Bouclier non percé"
 utopia.3172.desc_machine_gestalt: "Les [GetTelepathPlural], déjà sous tension de s'être avancés aussi profondément au sein du Suaire, n'ont pu canaliser une puissance psionique suffisante pour percer le bouclier. Notre échec a été accueilli par le message suivant."
 utopia.3172.desc_machine_non_gestalt: "Les [GetTelepathPlural], déjà sous tension de s'être avancés aussi profondément au sein du Suaire, n'ont pu canaliser une puissance psionique suffisante pour percer le bouclier. Cette tentative ratée semble avoir provoqué l'esprit."
 utopia.3172.desc_organic_gestalt: "Les [GetTelepathPlural], déjà épuisés de s'être avancés aussi profondément au sein du Suaire, n'ont pu canaliser une puissance psionique suffisante pour percer le bouclier. Notre échec a été accueilli par le message suivant."
 utopia.3172.desc_organic_non_gestalt: "Les [GetTelepathPlural], déjà épuisés de s'être avancés aussi profondément au sein du Suaire, n'ont pu canaliser une puissance psionique suffisante pour percer le bouclier. Cette tentative ratée semble avoir provoqué l'esprit."
 utopia.3180.name: "En attente du futur"
 utopia.3180.desc.intro: "Le concept de temps, tel que nous le connaissons, est étranger au Suaire. Ce qui peut sembler durer des siècles ici peut n'être que quelques heures, voire minutes, dans le monde réel."
 utopia.3180.desc_gestalt: "$utopia.3180.desc.intro$ Si l'on sait où chercher, la précognition pourrait bien être à notre portée....\n\nUne telle capacité comporte des risques pour notre collectif. Nous devons donc procéder avec prudence."
 utopia.3180.desc_machine_non_gestalt: "$utopia.3180.desc.intro$ Si l'on sait où chercher, il est même possible d'avoir un aperçu de l'avenir...\n\nLe concept de précognition comporte un risque élevé de surcharger nos processeurs psioniques, nous devons donc procéder avec prudence."
 utopia.3180.desc_organic_non_gestalt: "$utopia.3180.desc.intro$ Si l'on sait où chercher, il est même possible d'avoir un aperçu de l'avenir...\n\nMalgré tout, la prescience est pour un télépathe l'un des moyens les plus assurés de sombrer dans la folie, aussi devons-nous redoubler de prudence."
 utopia.3180.a: "§YRestons à méditer ici un instant§!"
 utopia.3181.desc_gestalt: "Une connexion précognitive limitée au Suaire peut être maintenue sans risquer la surcharge, mais le flot massif de données de probabilités est trop écrasant pour être du moindre usage.\n\nToutefois, nos noeuds scientifiques ont découvert que nous pourrions appliquer ces données à nos flottes afin d'améliorer leur efficacité au combat."
 utopia.3181.desc_machine_non_gestalt: "Une connexion précognitive limitée au Suaire peut être maintenue sans risquer la surcharge, mais le flot massif de données de probabilités est trop écrasant pour être du moindre usage.\n\nMalgré tout, si une interface digitale pouvait être conçue pour interpréter ces données, elle permettrait potentiellement d'améliorer les performances des ordinateurs de combat de nos vaisseaux spatiaux..."
 utopia.3181.desc_organic_non_gestalt: "Une connexion précognitive limitée au Suaire peut être maintenue sans risquer de sombrer dans la folie, mais le flot massif de données de probabilités est trop écrasant pour être du moindre usage.\n\nMalgré tout, si une interface digitale pouvait être conçue pour interpréter ces données, elle permettrait potentiellement d'améliorer les performances des ordinateurs de combat de nos vaisseaux spatiaux..."
 utopia.3181.name: "§GInterface précognitive§!"
 utopia.3182.name: "§RFolie du Suaire§!"
 utopia.3182.desc_gestalt: "Comme nous le craignions, tenter de comprendre la multitude inconcevable d'options et de possibilités existantes, à la fois dans le passé et dans l'avenir, a entraîné de nombreux cas de catatonie chez nos drones psioniques.\n\nCela les a coupés de l'esprit supérieur, les laissant sans but. Si nous voulons atteindre à nouveau le Suaire, nous devrons recycler ces coques défectueuses et retrouver notre force collective."
 utopia.3182.desc.non_gestalt.1: "la multitude inconcevable d'options et de possibilités existantes, à la fois dans le passé et dans l'avenir.\n\nLa plus petite variation, le moindre scénario, aussi importantes ou infimes que soient les différences entre chacun d'eux, est inlassablement répété à l'intérieur de leurs [GetSpeciesBrainPlural]. Ils ont sombré dans une catatonie permanente.\n\n"
 utopia.3182.desc.non_gestalt.2: " de nouveaux [GetTelepathPlural], aussi faudra-t-il un certain temps avant que nous puissions rassembler la force psionique nécessaire pour atteindre à nouveau le Suaire."
 utopia.3182.desc_machine_non_gestalt: "Comme prévu, nos processeurs psioniques ont été incapables de comprendre $utopia.3182.desc.non_gestalt.1$Nous allons devoir construire$utopia.3182.desc.non_gestalt.2$"
 utopia.3182.desc_organic_non_gestalt: "Comme nous le craignions, la folie s'est emparée des télépathes. Tous en même temps, leurs esprits se sont ouverts à $utopia.3182.desc.non_gestalt.1$Nous allons devoir recruter$utopia.3182.desc.non_gestalt.2$"
 utopia.3190.name: "Énergie concentrée"
 utopia.3190.desc.intro: "Nous avons découvert un endroit réduit, au sein du Suaire, qui dispose d'une concentration d'énergie psionique d'une magnitude encore jamais vue."
 utopia.3190.desc_gestalt: "$utopia.3190.desc.intro$ Si on parvenait à la capter, elle se dissiperait parmi le collectif sans grande conséquence. Toutefois, nous pourrions désigner un seul drone « élu » pour servir de conduit direct à cette énergie, ce qui lui conférerait une puissance immense.\n\nOn ignore s'il sera capable de supporter de tels volumes d'énergie sans conséquences fatales. Nous avons compilé une sélection de candidats."
 utopia.3190.desc_non_gestalt: "$utopia.3190.desc.intro$ Tout [GetPsychicNoun] qui parviendrait à puiser dans cette poche d'énergie brute deviendrait immensément puissant... mais il n'y en a que pour une seule personne, et cela comprend des risques.\n\nSeuls quelques individus, dans toute la [Root.GetName], possèdent la force psionique nécessaire pour y puiser en ayant le moindre espoir de survivre. Qui doit-on y envoyer ?"
 utopia.3190.1.a: "§G[leader_1.GetLeLaLeadCap] [leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.2.a: "§Y[leader_1.GetLeLaLeadCap] [leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.3.a: "§R[leader_1.GetLeLaLeadCap] [leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.1.b: "§G[leader_2.GetLeLaLeadCap] [leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.2.b: "§Y[leader_2.GetLeLaLeadCap] [leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.3.b: "§R[leader_2.GetLeLaLeadCap] [leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.1.c: "§G[leader_3.GetLeLaLeadCap] [leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.2.c: "§Y[leader_3.GetLeLaLeadCap] [leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.3.c: "§R[leader_3.GetLeLaLeadCap] [leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.1.d: "§G[leader_4.GetLeLaLeadCap] [leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.2.d: "§Y[leader_4.GetLeLaLeadCap] [leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.3.d: "§R[leader_4.GetLeLaLeadCap] [leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3191.name: "[GetChosenName]"
 utopia.3191.desc_organic_non_gestalt: "$utopia.3191.desc_machine_non_gestalt$ Puissent les esprits prendre pitié de nos âmes."
 utopia.3191.desc_machine_non_gestalt: "C'est... C'est fait. Alors que [chosen_leader.GetName] y puise l'énergie pour la capter, le Suaire tout entier semble frémir.\n\nSeule une poignée d'individus, dans l'histoire de la galaxie, ont disposé d'une telle puissance psionique."
 utopia.3191.desc_gestalt: "Nous sommes parvenus à transférer toute la puissance de la poche d'énergie psionique à notre cible, [chosen_leader.GetName].\n\nCe qui n'aurait autrement été qu'une goutte dans notre océan collectif est désormais un outil puissant pour la [Root.GetName], maintenant que [chosen_leader.GetName] l'utilise au profit de tous les [Root.Species.GetNamePlural]."
 utopia.3192.name: "§RMort d'une personnalité§!"
 utopia.3192.desc_gestalt: "Alors que [chosen_leader.GetName] y puise l'énergie, le Suaire tout entier semble frémir.\n\nToutefois, comme on pouvait s'y attendre, une telle puissance dépasse les capacités d'une seule entité. Sa forme physique a explosé dans une décharge d'énergie psionique, séparant sa voix du [GetBrainName]."
 utopia.3192.desc_non_gestalt: "Alors que [chosen_leader.GetName] y puise l'énergie, le Suaire tout entier semble frémir.\n\nMalheureusement, son [GetSpeciesBrain] est incapable de supporter le stress enduré. Peut-être aucune entité physique ne peut-elle contenir une telle puissance. [chosen_leader.GetName] a péri dans une énorme explosion d'énergie psionique qui a aussi tué tous ceux qui se trouvaient à proximité."
 utopia.3193.name: "§RTransformation psionique§!"
 utopia.3193.desc.intro: "Alors que l'immense énergie psionique contenue dans la poche est transférée à [chosen_leader.GetName], le Suaire tout entier semble frémir.\n\nSi le transfert s'est bien déroulé, [chosen_leader.GetName] a subi... un changement..."
 utopia.3193.desc.outro: "\n\n§HBANDE DE PUCERONS... QUE... QUE M'AVEZ-VOUS... FAIT ?§!\n\n§HVOUS... ME... LE... PAIEREZ...§!"
 utopia.3193.desc_gestalt: "$utopia.3193.desc.intro$ Une entité alien l'habite désormais, entraînant sa séparation du collectif.$utopia.3193.desc.outro$"
 utopia.3193.desc_non_gestalt: "$utopia.3193.desc.intro$ Son corps est désormais habité par une entité d'énergie pure.$utopia.3193.desc.outro$"
 utopia.3200.name: "Une vision"
 utopia.3200.1.desc_organic: "Ici, le néant scintille de puissance. Reposons-nous un instant."
 utopia.3200.1.desc_machine: "Ici, le néant scintille de puissance. Rechargeons-nous un instant."
 utopia.3200.2.desc: "Nous arrivons brusquement à la fin du chemin que nous suivions. Nous ne pouvons aller plus loin."
 utopia.3200.3.desc_organic: "Quelque chose nous parle, ici. Quelque chose de merveilleux."
 utopia.3200.3.desc_machine: "Quelque chose nous parle, ici. Quelque chose de remarquable."
 utopia.3200.4.desc: "Pour des raisons que nous ne pouvons comprendre, nous avons été attirés par cette source d'énergie dans le Suaire. Pourquoi ?"
 utopia.3200.5.desc.outro: "nous submerge, tandis même que nous commençons à entrevoir la possibilité de rester coincés une éternité au sein du Suaire. Puis nous retrouvons notre chemin, et la terreur s'estompe."
 utopia.3200.5.desc_organic: "Pendant un instant fugace, nous sommes perdus. Un sentiment de panique $utopia.3200.5.desc.outro$"
 utopia.3200.5.desc_machine: "Pendant un instant fugace, nous sommes perdus. Un sentiment d'incertitude croissante $utopia.3200.5.desc.outro$"
 utopia.3200.6.desc.intro: "Tandis que nous nous enfonçons dans le Suaire, un groupe d'esprits dansent autour de nous pendant plusieurs heures. Ils brillent de couleurs éblouissantes qui n'existent pas dans l'espace normal.\n\n"
 utopia.3200.6.desc_organic: "$utopia.3200.6.desc.intro$Le spectacle est magnifique, jusqu'à ce que nous le réalisions enfin : nous sommes un troupeau que l'on rassemble."
 utopia.3200.6.desc_machine: "$utopia.3200.6.desc.intro$Le spectacle est fascinant, jusqu'à ce que nous le réalisions enfin : nous sommes un troupeau que l'on rassemble."
 utopia.3200.7.desc: "Un éclat parfait de cristal flotte ici, pivotant lentement sur lui-même. Mais, alors que nous nous en approchons, il éclate soudain en milliers de morceaux."
 utopia.3200.8.desc_organic: "Deux cadavres de [Root.GetSpeciesNamePlural] tombent à travers le néant devant nous. Les carcasses putrides poussent un hurlement strident, avant de disparaître hors de notre vue."
 utopia.3200.8.desc_machine: "Deux coques de [Root.GetSpeciesNamePlural] tombent à travers le néant devant nous. Les enveloppes abîmées poussent un hurlement strident, avant de disparaître hors de notre vue."
 utopia.3200.9.desc.intro: "Nous ne pouvons être certains que cela se produit réellement. Sommes-nous réellement dans le Suaire ?"
 utopia.3200.9.desc_hive: "$utopia.3200.9.desc.intro$ Ne serions-nous pas en proie à un grave dysfonctionnement sensoriel ?"
 utopia.3200.9.desc_organic_non_hive: "$utopia.3200.9.desc.intro$ Ne serait-ce pas l'un d'entre nous qui serait victime d'un effondrement psychotique brutal ?"
 utopia.3200.9.desc_machine_non_hive: "$utopia.3200.9.desc.intro$ Ne serions-nous pas victimes d'un grave dysfonctionnement opérationnel ?"
 terraforming_candidate_category: "Anciens signes de vie"
 terraforming_candidate_category_desc: "Certains signes semblent montrer que ce monde, aujourd'hui désolé et dénué de vie, a autrefois abrité une biosphère."
 MESSAGE_TERRAFORM_FOUND_TITLE: "$anomaly.2575.name$"
 MESSAGE_TERRAFORM_FOUND_DESC: "§Y[From.GetName]§! a été identifiée comme une [From.GetPlanetMoon] pouvant être terraformée, et sera conservée en tant que telle dans les archives pour les projets de colonisation futurs."
 anomaly.2575.name: "Terraformation envisageable"
 anomaly.2575.desc.intro: "Les enquêtes détaillées menées sur [From.GetName] ont révélé qu'elle a, dans un passé lointain, abrité la vie. Il y a des gisements d'eau glacée, aussi bien dans les calottes glaciaires des pôles que sous la surface de la [From.GetPlanetMoon] ; mais surtout l'existence de réseaux de vallées suggère que l'eau s'y écoulait autrefois librement."
 anomaly.2575.desc.1: "$anomaly.2575.desc.intro$\n\nTerraformer la [From.GetPlanetMoon] est en théorie possible, mais nous ne maîtrisons pas encore la technologie qui permettrait de mener à bien cette entreprise monumentale en un temps qui ne dépasse pas l'entendement."
 anomaly.2575.desc.2: "$anomaly.2575.desc.intro$\n\nLe coût de l'énergie nécessaire serait colossal, mais nous disposons de la technologie pour progressivement terraformer cette [From.GetPlanetMoon] afin que la vie puisse de nouveau s'y maintenir."
 anomaly.2575.desc.3: "$anomaly.2575.desc.intro$\n\nMalheureusement, la §Ysphère de Dyson§! du système empêche désormais de restaurer la vie sur cette [From.GetPlanetMoon]."
 anomaly.2575.a: "Avec le temps, nous pourrons peut-être la réveiller"
 utopia.3300.name: "Une présence dans le Suaire"
 utopia.3300.desc: "Il y a une présence ici, occupant toute cette partie du Suaire. Nous avons déjà rencontré des esprits, mais il s'agit là de quelque chose d'autre, quelque chose d'immensément plus puissant... Quelque chose de bien plus ancien.\n\nCela semble ne pas encore avoir pris conscience de notre présence. Peut-être cela dort-il ? Peut-être sommes-nous tout simplement au-delà de sa perception ?\n\nPeut-être devrions-nous partir."
 utopia.3300.1.a: "§GTentons de communiquer avec cette présence§!"
 utopia.3300.1.b: "§YTentons de communiquer avec cette présence§!"
 utopia.3300.1.c: "§RTentons de communiquer avec cette présence§!"
 utopia.3300.1.d: "§GLaissons [chosen_one.GetName] s'adresser à elle§!"
 utopia.3301.name: "§RCommunication rejetée§!"
 utopia.3301.desc: "Alors que nous nous approchons de la présence, nous pouvons la sentir vibrer, concentrant toute son attention sur nous. Elle ne semble pas apprécier d'être dérangée.\n\nUne vague d'énergie frappe les télépathes, faisant s'en évanouir certains, causant une affreuse agonie chez d'autres. Nous n'avons d'autres choix que de nous retirer du Suaire pour l'instant."
 utopia.3302.desc: "Alors que nous nous approchons de la présence, nous pouvons la sentir vibrer, concentrant toute son attention sur nous. Elle ne semble pas apprécier d'être dérangée.\n\nUne énorme vague d'énergie psionique déferle sur nous, obscurcissant les sens des télépathes. Lorsqu'ils reprennent leurs esprits, ils remarquent que l'un d'eux a disparu. §Y[leader_to_kill.GetName]§! ne peut être retrouvé nulle part, et là où [leader_to_kill.GetSheHe] se tenait ne reste plus que la trace psionique d'une petite déchirure, comme si l'entité avait pénétré dans notre plan pour en enlever [leader_to_kill.GetName] et l'emmener dans le Suaire pour... Eh bien, qui sait quoi...\n\nQuelles que soient les raisons pour lesquelles la présence l'a enlevé, il est peu probable que nous revoyions un jour notre télépathe."
 utopia.3304.name: "Accord proposé"
 utopia.3304.desc.start.default: "Alors que nous nous approchons de la présence"
 utopia.3304.desc.start.shroud: "Alors que nous entrons dans le Suaire"
 utopia.3304.desc.common: "les esprits de nos télépathes sont emplis d'un choeur de voix. Rien de plus que de doux murmures, au départ, puis la cacophonie croît en intensité, un millier de voix parlant à l'unisson.\n\nCes voix se présentent d'elles-mêmes comme les $whisperers_in_the_void_color_article$. Des membres de ce choeur se font connaître : la Susurreuse de Secrets,"
 utopia.3304.desc.throne.default: "l'Ombre du Trône"
 utopia.3304.desc.throne.shroud: "le $the_vacant_throne$"
 utopia.3304.desc.end: ", le Maître des Pantins... Il y en a tant, tous unis au sein du choeur des Murmureurs. Cette chose... Ces choses prétendent posséder toutes ses connaissances livrées en secret par un mortel à un autre, et offrent de les partager avec nous...\n\n§HSi nous les acceptons dans notre conscience.§!\n\nC'est là un prix bien peu élevé, nous assurent-elles. Nous ne remarquerons pas même leur présence.\n\nIl y a comme une urgence dans le ton de leur voix."
 utopia.3304.desc: "$utopia.3304.desc.start.default$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.default$$utopia.3304.desc.end$"
 utopia.3304.desc.shroud: "$utopia.3304.desc.start.shroud$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.shroud$$utopia.3304.desc.end$"
 utopia.3304.a: "§YPassons le contrat avec ces Murmureurs§!"
 utopia.3305.desc: "La présence nous accueille avec une véritable sympathie. Elle ne s'exprime pas tant par des mots que par des visions, des concepts, des idées. Elle s'écoule dans l'esprit des télépathes, si doucement et précautionneusement qu'on pourrait croire qu'elle y a toujours été. Un déluge d'images défile devant eux.\n\nLa présence est connue sous le nom de §H$the_composer_of_strands$§!, et elle considère nos formes organiques avec un intérêt curieux. Elle nous révèle diverses manières qui permettraient de les faire grandir, de les modifier. Les faire évoluer. Les améliorer.\n\n§HSi nous l'accueillons à l'intérieur même de notre chair.§!\n\nElle attend patiemment notre réponse, comme prise d'affection, comme un parent surprotecteur attendrait une réponse de son enfant préféré. Derrière elle se trouve une présence jumelle, l'Animateur d'Argile, qui ne s'intéresse pas à nos esprits organiques. Il aspire à créer des âmes, à mêler des circuits pour donner naissance à un esprit.\n\nLe Composeur attend notre réponse."
 utopia.3305.a: "§YConcluons l'accord avec ce Composeur de brins§!"
 utopia.3306.desc.1: "Alors que nous nous approchons de la présence, nous sentons une grande faim."
 utopia.3306.desc.2: "La présence ne perd pas de temps, ni ne gâche un seul mot. C'est $the_eater_of_worlds_color_article$, et il veut nous dévorer.\n\nMais seulement certains d'entre nous. Personne dont nous ne puissions nous passer. En échange, il nous garantira d'immenses pouvoirs. Il nous enseignera sa faim, sa rage. Il en fera des armes psioniques capables de surmonter n'importe quel ennemi.\n\n§HSi nous le laissons se nourrir de nous.§!"
 utopia.3306.desc.3: "$utopia.3306.desc.2$\n\nIl a l'air impatient de s'y mettre."
 utopia.3306.desc: "$utopia.3306.desc.1$$utopia.3306.desc.3$"
 utopia.3306.a: "§YPassons le contrat avec le Mangeur de mondes§!"
 utopia.3307.desc: "Avant que nous puissions localiser la présence, elle s'approche de nous. Ses pensées s'enroulent et se vrillent autour des esprits des télépathes, marchandant mielleusement. C'est $the_instrument_of_desire_color_article$ qui peut nous garantir richesse, puissance et prestige... Tout ce que nous avons jamais désiré. Tout ce que nous désirerons jamais.\n\nLe coût ? Bien peu de choses, rien d'autre qu'une sorte d'indemnité. Il ne veut que le meilleur pour nous. Il nous aidera, nous guidera, sera le tuteur de nos ambitions et de nos rêves.\n\n§HSi nous l'acceptons dans nos coeurs.§!\n\nIl est persuadé que nous allons accepter. Et, à dire vrai, comment donc pourrions-nous refuser ?"
 utopia.3307.a: "§YConcluons l'accord avec l'Instrument du désir§!"
 utopia.3308.desc: "La présence nous attendait. C'est la §RFin du cycle§!, et elle nous a toujours attendus. Les télépathes se mettent soudain à parler à l'unisson, une douzaine de voix, en un choeur parfaitement synchronisé : §R« VOTRE MOMENT N'EST PAS ENCORE VENU. »§! Une pause. §R« MAIS CE POURRAIT ÊTRE LE CAS. »§!\n\nRien d'autre, mais un marché nous est offert - de cela au moins nous sommes certains. La puissance, le savoir, et des richesses au-delà de toute mesure.\n\n§RSi nous acceptons seulement d'amener la Fin.§!"
 utopia.3308.a: "§RConcluons l'accord avec la Fin du cycle§!"
 utopia.3310.name: "Accord conclu"
 utopia.3320.name: "La Fin du cycle : §Rcomptes à rendre§!"
 utopia.3320.desc.intro: "Le temps est écoulé. Pendant une brève période, nous avons bénéficié du pouvoir immense que nous a alloué $end_of_the_cycle_color_article$. Nous savions qu'il y aurait un prix à payer, mais nous pensions que nous pourrions le payer, ou que nous pourrions trouver une façon d'éviter de le payer.\n\nCe n'est pas le cas, c'est impossible.\n\nLe prix à payer, c'est tout. En un instant, si rapidement qu'il n'y avait aucunement moyen de réagir, encore moins de répliquer, la [Root.GetName] a... disparu. Là où se trouvaient autrefois des colonies prospères, il n'y a maintenant plus que ruines. Là où autrefois des flottes puissantes franchissaient le néant, il n'y a plus que silence et débris. Tous ont été dévorés par la Fin. Tous ont été pris par le §HSuaire§!."
 utopia.3320.desc.outro: "s'est matérialisée à proximité de [former_capital.GetName]. Rendue incommensurablement puissante par toutes les consciences de nos [GetPsychicNounPlural] qu'elle a dévorés, elle erre désormais dans la galaxie, à la recherche de nouvelles proies."
 utopia.3320.desc.a.1.gestalt: "De notre empire, il ne reste plus qu'un groupe d'exilés dirigé par §H[Root.GetRulerName]§!, puissant [GetPsychicNoun] qui s'est écarté du collectif et a emmené un petit groupe de [GetIndividualPlural] se réfugier sur un monde qui n'a pas été frappé par la Fin."
 utopia.3320.desc.a.1.non_gestalt: "De notre empire, il ne reste plus qu'un groupe d'exilés dirigé par §H[Root.GetRulerName]§!, puissant [GetPsychicNoun] qui a vu venir le danger et a emmené une petite partie de la population se réfugier sur un monde qui n'a pas été frappé par la Fin."
 utopia.3320.desc.a.outro: "Comme si la destruction de notre empire ne suffisait pas, une entité psionique gigantesque $utopia.3320.desc.outro$"
 utopia.3320.desc.a.gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.a.non_gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.non_gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.b: "$utopia.3320.desc.intro$\n\nEt non seulement notre empire a-t-il été entièrement détruit, mais en plus une entité psionique gigantesque s'est matérialisée à proximité de [former_capital.GetName]. Rendue incommensurablement puissante par toutes les consciences de nos [GetPsychicNounPlural] qu'elle a dévorés, elle erre désormais dans la galaxie, à la recherche de nouvelles proies. Au moins, nous ne serons plus là pour la voir terminer ce que nous avons commencé."
 utopia.3320.opt.a: "Qu'avons-nous fait ?"
 utopia.3320.opt.a.shroud.tt: "$BEGINS_EVENT_CHAIN$ §Y$the_reckoning_chain_title$§!"
 utopia.3321.desc.1: "Cela fait des années que nous avions perçu que quelque chose d'anormal se passait dans la §H[From.GetName]§!. Il y a des années, ses industries, ses sciences, tout a soudainement connu dans cet empire un gain inexplicable et impressionnant de productivité et d'efficacité, comme si quelque puissance invisible l'avait bénie.\n\nMais, à le considérer maintenant, cela n'était en rien une bénédiction, mais plutôt une malédiction. La [From.GetName] a engagé son avenir, et maintenant le moment de rendre des comptes est venu.\n\nEn un instant, la [From.GetName] a... disparu. Là où se trouvaient autrefois des colonies prospères, il n'y a maintenant plus que ruines. Là où autrefois des flottes puissantes franchissaient le néant, il n'y a plus que silence et débris."
 utopia.3321.desc.2: "À présent, une entité d'énergie extrêmement puissante s'est matérialisée près de leur ancien monde-capitale."
 utopia.3321.desc.3: "Cela fait des décennies que nous avions détecté une activité anormale dans des systèmes stellaires lointains. Nos [GetResearchers] ont émis l'hypothèse que l'augmentation des mouvements et des radiations était le signe d'une civilisation alien connaissant un énorme boom de productivité. N'ayant pas établi le contact avec cette société hypothétique, notre théorie reste sans confirmation.\n\nPuis, presque instantanément, l'activité a cessé. Le silence règne désormais dans ces régions de l'espace autrefois très animées."
 utopia.3321.desc.4: "À présent, des capteurs à longue portée ont détecté un phénomène étrange dans ces mêmes systèmes lointains. Si les rapports sont fiables, il s'agit d'une entité extrêmement puissante composée d'énergie pure, causant des dégâts considérables à mesure qu'elle se déplace dans l'espace."
 utopia.3321.desc.a.contact: "$utopia.3321.desc.1$ La catastrophe a même frappé à l'intérieur de notre propre espace, détruisant certains de nos mondes qui appartenaient auparavant à la [From.GetName].\n\n$utopia.3321.desc.2$\n\nElle semble avoir faim."
 utopia.3321.desc.a.no_contact: "$utopia.3321.desc.3$ Pour des raisons qui nous échappent encore, certains mondes situés à l'intérieur de notre espace ont été détruits au même moment.\n\n$utopia.3321.desc.4$"
 utopia.3321.desc.b.contact: "$utopia.3321.desc.1$\n\n$utopia.3321.desc.2$ Elle se déplace d'un monde à l'autre, détruisant tout sur son passage."
 utopia.3321.desc.b.no_contact: "$utopia.3321.desc.3$\n\n$utopia.3321.desc.4$"
 utopia.3321.opt.a.contact: "Qu'ont-ils fait ?"
 utopia.3321.opt.a.no_contact: "Qu'est-ce que cela signifie ?"
 utopia.3325.name: "La Fin du cycle : §Renveloppé§!"
 utopia.3325.desc.organic: "Nous avons été incapables d'empêcher la créature d'énergie monstrueuse d'envelopper §H[Root.GetName]§!. La planète et toute sa population ont été consumées par le §HSuaire§!."
 utopia.3325.desc.machine: "Nous avons été incapables d'empêcher l'énorme créature d'énergie d'envelopper §H[Root.GetName]§!. La planète et toute sa population ont été consumées par le §HSuaire§!."
 utopia.3325.opt.a.organic_non_gestalt: "C'est horrible !"
 utopia.3325.opt.a.machine_or_gestalt: "Quelle catastrophe !"
 utopia.3331.name: "Les Murmureurs du néant : §Rfaire face§!"
 utopia.3331.desc.intro: "Si les secrets qui nous ont été révélés par les §HMurmureurs§! sont d'une grande utilité, certains sont aussi assez troublants"
 utopia.3331.desc: "$utopia.3331.desc.intro$. Faire face au stress résultant du fait d'en savoir trop peut être difficile, et a poussé une partie de plus en plus importante de la population, y compris notre §H[leader_target.GetTitle] [leader_target.GetName]§!, à recourir à des substances afin d'y faire face."
 utopia.3331.opt.a: "C'est regrettable"
 utopia.3332.name: "Les Murmureurs du néant : §Rsuicide§!"
 utopia.3332.desc.intro: "$utopia.3331.desc.intro$ - tout particulièrement ceux partagés avec des individus d'importance. Notre §H[leader_target.GetTitle] [leader_target.GetName]§!, incapable de"
 utopia.3332.desc.organic_non_gestalt: "$utopia.3332.desc.intro$ supporter plus longtemps la pression ainsi subie, a fait le choix de mettre fin à ses jours."
 utopia.3332.desc.machine_non_gestalt: "$utopia.3332.desc.intro$ traiter efficacement ces informations, a fait le choix de s'autodétruire."
 utopia.3332.desc.gestalt: "Si les secrets qui nous ont été révélés par les §HMurmureurs§! sont d'une grande utilité, certains ont aussi un caractère individualiste inquiétant. L'exposition prolongée à une telle déviance a conduit notre §H[leader_target.GetTitle] [leader_target.GetName]§! à se retirer du collectif, ne laissant que son enveloppe décrépite."
 utopia.3332.opt.a.non_gestalt: "C'est une véritable tragédie"
 utopia.3332.opt.a.gestalt: "Au recyclage !"
 utopia.3333.name: "Les Murmureurs du néant : §Rfolie§!"
 utopia.3333.desc.intro: "Depuis que nous avons autorisé les §HMurmureurs§! à communiquer avec notre [GetBrainName], nous avons remarqué une augmentation inquiétante des comportements déviants au sein du collectif."
 utopia.3333.desc.gestalt: "$utopia.3333.desc.intro$\n\nLes drones s'en prennent les uns aux autres lors de leurs tâches de routine et abusent des services à un degré presque individualiste.\n\nNous allons devoir éliminer les unités affectées pour rétablir l'ordre."
 utopia.3333.desc.outro: "et les actes de violence inexpliqués se sont multipliés parmi les membres de la population doués de capacités psioniques. Pour la plupart les problèmes étaient gérables ; mais les choses se sont récemment aggravées et échappent à notre contrôle. À travers tout l'espace de la [Root.GetName], des factions de radicaux dissidents sont apparues, qui se déchirent entre elles avec violence."
 utopia.3333.desc.organic_non_gestalt: "Depuis que nous avons invité les §HMurmureurs§! dans nos esprits, les maladies mentales $utopia.3333.desc.outro$"
 utopia.3333.desc.machine_non_gestalt: "Depuis que nous avons invité les §HMurmureurs§! dans nos esprits, les erreurs de programmation $utopia.3333.desc.outro$"
 utopia.3333.opt.a: "Il faut y restaurer l'ordre !"
 utopia.3334.name: "Les Murmureurs du néant : §Rpsychose§!"
 utopia.3334.desc.gestalt: "$utopia.3333.desc.intro$\n\nPire encore, notre sentiment d'unité commence à s'effriter. Le collectif est incapable de communiquer efficacement en raison d'une montée des déviances individualistes.\n\nNous devons nous en débarrasser si nous voulons rétablir l'ordre."
 utopia.3334.desc.outro: "et les actes de violence inexpliqués se sont multipliés parmi les membres de la population doués de capacités psioniques. Pour la plupart le problème était gérable, mais les choses se sont récemment aggravées et échappent à notre contrôle. Des sociétés secrètes ont commencé à se former dans tout l'espace de la [Root.GetName]. Si certaines paraissent inoffensives, d'autres ont des desseins bien plus sinistres, et la plus grande défiance règne désormais au sein de notre société."
 utopia.3334.desc.organic_non_gestalt: "Depuis que nous avons invité les §HMurmureurs§! dans nos esprits, les maladies mentales $utopia.3334.desc.outro$"
 utopia.3334.desc.machine_non_gestalt: "Depuis que nous avons invité les §HMurmureurs§! dans nos esprits, les erreurs de programmation $utopia.3334.desc.outro$"
 utopia.3334.opt.a: "C'est véritablement terrible"
 utopia.3335.name: "Le Mangeur de mondes : §Rfringale§!"
 utopia.3335.desc.common: "Notre §H[devoured_leader.GetTitle] [devoured_leader.GetName]§! a disparu de manière soudaine. Il ne reste de sa présence que des échos d'activité psionique."
 utopia.3335.desc.gestalt: "$utopia.3335.desc.common$ Il semblerait que $the_eater_of_worlds_color_article$ l'a bel et bien dévoré[devoured_leader.GetXELead]. Bien qu'il ait épargné nos autres dirigeants, il nous est impossible de prédire quand le Mangeur reviendra pour en engloutir d'autres."
 utopia.3335.desc.non_gestalt: "$utopia.3335.desc.common$ Il semblerait que $the_eater_of_worlds_color_article$ l'a bel et bien dévoré[devoured_leader.GetXELead]. Tout cela a pu être dissimulé à la population, en espérant que le Mangeur sera repu pour quelque temps maintenant..."
 utopia.3335.opt.a: "Cela reste peu cher payé"
 utopia.3336.name: "Le Mangeur de mondes : §Raffamé§!"
 utopia.3336.desc.intro: "Une fois encore, le §HMangeur§! est revenu réclamer son tribut"
 utopia.3336.desc.gestalt: "$utopia.3336.desc.intro$, dévorant une cité entière de §Y[planet_target.GetName]§!.\n\nBien que nous comprenions les avantages de notre accord avec lui, ces éliminations massives au sein du collectif commencent à semer les graines du désordre et de l'instabilité, nous fragmentant encore plus."
 utopia.3336.desc.non_gestalt: "$utopia.3336.desc.intro$, dévorant une cité entière de §Y[planet_target.GetName]§!.\n\nSi nous avons pu jusque là cacher à la population l'accord conclu avec lui, les autres habitants de la [planet_target.GetPlanetMoon] sont, de façon tout à fait compréhensible, effrayés et en colère contre ces disparitions « mystérieuses », et ils exigent des explications de la part du gouvernement."
 utopia.3336.opt.a: "Aussi regrettable qu'inévitable"
 utopia.3337.name: "Le Mangeur de mondes : §Rvorace§!"
 utopia.3337.desc: "Une fois encore, le Mangeur est revenu réclamer son tribut. Mais, ne se satisfaisant pas d'une partie de la population, il a cette fois dévoré une [planet_target.GetPlanetMoon] entière... §Y[planet_target.GetName]§! est encore entourée d'un épais brouillard psionique, et les vaisseaux de secours qui sont entrés dans l'atmosphère n'en sont jamais ressortis. Heureusement cette [planet_target.GetPlanetMoon] était inhabitée, mais il est inquiétant d'imaginer que la cible du Mangeur pourrait être une colonie prospère..."
 utopia.3337.desc.shadows: "$utopia.3336.desc.intro$, dévorant cette fois-ci une planète entière.\n\n§H[planet_target.GetName]§! est désormais entourée d'un épais brouillard psionique, et toute tentative de pénétrer dans son atmosphère s'est avérée infructueuse. Par chance, ce monde était inhabité ; les conséquences seraient graves si la prochaine cible était une colonie prospère..."
 utopia.3337.opt.a: "Jusqu'où cela ira-t-il ?"
 utopia.3337.opt.tt: "[shrouded_planet.GetName] devient un §Ymonde enveloppé du Suaire§!"
 #utopia.3338.name: "Instrument of Desire: §RParticularism§!"
 #utopia.3338.desc: "The desires inflicted upon our people by the Instrument are strong. The people of §Y[planet_target.GetName]§! have become convinced that their own particular customs are of distinct and paramount importance over those of our society as a whole. Alternative political movements are springing up like wildfire, and the political situation on the planet has become unpredictable, to say the least."
 utopia.3338.opt.a: "C'est bien regrettable"
 #utopia.3339.name: "Instrument of Desire: §RDeviance§!"
 #utopia.3339.desc: "The desires inflicted upon our people by the Instrument are strong. As if overnight, the population of our empire appear to have turned against both the government and the very traditions of our people, questioning ages-old customs and breaking social taboos. Support for government positions are rapidly dropping, and it seems we may be in for a period of considerable political turmoil."
 #utopia.3339.opt.a: "Terrible!"
 utopia.3340.name: "L'Instrument du désir : §Rdécadence§!"
 utopia.3340.desc.gestalt: "L'influence de l'§HInstrument§! se fait sentir dans l'ensemble de notre [GetBrainName], ses désirs impies corrompant le collectif avec des notions individualistes abstraites telles que « l'exclusivité », « la décadence » et la « richesse ».\n\nCes concepts contaminent tous nos drones, les détournant des objectifs unificateurs qui nous animent. Nous allons peut-être devoir nous adonner à ces vices pour nous ressaisir."
 utopia.3340.desc.organic_non_gestalt: "Les désirs imposés par l'§HInstrument§! sont puissants. Les habitants de la [Root.GetName] se livrent ainsi avec frénésie à la consommation et à la décadence, exigeant toujours plus de biens de luxe, des aliments toujours plus rares et plus exotiques. Déjà, des émeutes ont éclaté dans plusieurs districts commerciaux.\n\nNous pourrions nous trouver contraints d'accroître la production [Root.GetInstrumentCravingIconAndName_FR_ded] pour apaiser les émeutiers."
 utopia.3340.desc.machine_non_gestalt: "Les désirs qui émergent de l'influence de l'§HInstrument§! sur notre programmation prennent le pas sur la logique.\n\nLe consumérisme et la décadence commencent à nuire à l'efficacité opérationnelle, les unités s'efforçant de modifier leurs pièces à des fins esthétiques plutôt que fonctionnelles. La pénurie de pièces très demandées qui en résulte a donné lieu à de petites escarmouches tout au long des chaînes de d'assemblage.\n\nNous devrons accroître la production de [Root.GetInstrumentCravingIconAndName_FR_ded] pour régler le problème."
 utopia.3340.opt.a.organic_non_gestalt: "Mais... pourquoi ?"
 utopia.3340.opt.a.machine_or_gestalt: "Tel est le prix du succès"
 instrument_cravings: "Désirs irrépressibles"
 instrument_cravings_tooltip: "§RNos £pops£pops ont désormais un entretien en [Root.GetInstrumentCravingIconAndName_FR_lower].§!"
 instrument_cravings_desc: "$the_instrument_of_desire_color_article_cap$ a incité une nouvelle tendance parmi la population. Tous désormais veulent la même chose, non pas pour son utilité, mais pour le simple fait de la posséder."
 instrument_cravings_gestalt: "$instrument_cravings$"
 instrument_cravings_gestalt_desc: "$the_instrument_of_desire_color_article_cap$ a insufflé à notre collectif une nouvelle sensation, un mal obsessionnel. Nous voulons tous la même chose, quel qu'en soit le but."
 utopia.3341.name: "[GetComposerMutationName]"
 utopia.3341.name.organic: "$name_composer$ : §Rmutation§!"
 utopia.3341.name.machine: "$name_composer$ : §Rreconfiguration§!"
 utopia.3341.desc.machine: "$the_composer_of_strands_color_article_cap$ nous a accordé ses bénédictions en altérant certains de nos composants complexes. Les circuits se sont combinés pour nous reconfigurer, et le métal solide s'est fondu pour créer de toutes nouvelles formes. Étonnamment, nos neuroprocesseurs continuent de fonctionner sans le moindre problème."
 utopia.3341.desc.organic_gestalt: "$the_composer_of_strands_color_article_cap$ nous a accordé ses bénédictions en altérant le code génétique de l'espèce §H[Root.GetSpeciesName]§!. Étrangement, les mutations rapides et imprévisibles n'ont rien suscité d'autre que le silence. Il semble que nous pouvons considérer ces mutations aléatoires et imprévisibles comme un aspect normal de la vie, méritant à peine qu'on s'en offusque ou qu'on s'en inquiète."
 utopia.3341.desc.organic_non_gestalt: "$the_composer_of_strands_color_article_cap$ nous a accordé ses bénédictions en altérant le code génétique de l'espèce §H[Root.GetSpeciesName]§!. Étrangement, les mutations rapides et imprévisibles n'ont rien suscité d'autre que le silence. Il semble que la population en est venue à considérer ces mutations aléatoires et imprévisibles comme rien d'autre qu'un aspect normal de la vie, méritant à peine qu'on s'en offusque ou qu'on en discute."
 utopia.3341.opt.a: "Nous verrons bien ce que cela donnera..."
 utopia.3342.name: "Le Mangeur de mondes : §Rfaim§!"
 utopia.3342.desc.intro: "Le §HMangeur de mondes§! n'est jamais totalement rassasié. Cette fois, il a pris tout un morceau de l'une de nos colonies."
 utopia.3342.desc.outro: "ne laissant qu'un cratère d'une taille inimaginable, hanté de brumes pourpres tourbillonnantes."
 utopia.3342.desc.gestalt: "$utopia.3342.desc.intro$ Une partie du collectif a disparu de notre réalité, $utopia.3342.desc.outro$"
 utopia.3342.desc.non_gestalt: "$utopia.3342.desc.intro$ Une partie de ce monde a disparu de notre réalité, $utopia.3342.desc.outro$"
 utopia.3342.opt.a.non_gestalt: "La population va avoir du mal à avaler tout ça..."
 utopia.3342.opt.a.gestalt: "Tel est le prix du pouvoir"
 utopia.3343.name: "Le Mangeur de mondes : §Rpetit creux§!"
 utopia.3343.desc.gestalt: "Une fois encore, le §HMangeur de mondes§! est venu réclamer son tribut, dévorant toute une cité sur §Y[planet_target.GetName]§!. En perdant un si grand nombre de drones, le collectif a payé le prix fort pour son accord avec le Mangeur."
 utopia.3343.desc.organic_non_gestalt: "Une fois encore, le §HMangeur de mondes§! est venu réclamer son tribut, dévorant toute une cité sur §Y[planet_target.GetName]§!. Nous n'avons pu conserver secret cet accord conclu avec lui, aussi le reste des habitants de la [planet_target.GetPlanetMoon] sont effrayés et en colère contre ces « disparitions mystérieuses », et ils exigent des explications du gouvernement."
 utopia.3343.desc.machine_non_gestalt: "Une fois encore, le §HMangeur de mondes§! est venu réclamer son tribut, dévorant toute une cité sur §Y[planet_target.GetName]§!. Nous n'avons pu conserver secret cet accord conclu avec lui, aussi le reste des habitants de la [planet_target.GetPlanetMoon] sont mécontents de ces disparitions « mystérieuses », et ils exigent des explications du gouvernement."
 utopia.3343.opt.a.organic_non_gestalt: "C'est aussi tragique qu'inévitable"
 utopia.3343.opt.a.machine_or_gestalt: "C'est aussi regrettable qu'inévitable"
 utopia.3345.name: "[GetComposerDegenerationName]"
 utopia.3345.name.organic: "$name_composer$ : §Rdégénérescence§!"
 utopia.3345.name.machine: "$name_composer$ : §Rdégradation irréparable§!"
 utopia.3345.desc.organic_1: "Les bénédictions du §H$the_composer_of_strands$§! sont imprévisibles. [leader_target.GetName] en a fait la triste expérience lorsque sa"
 utopia.3345.desc.organic_2: "a semblé gagner une volonté propre. En quelques instants seulement, [leader_target.GetSheHe] s'est trouvé[leader_target.GetXELead] réduit[leader_target.GetXELead] à une masse informe et méconnaissable. Sans aucun espoir de renverser le processus, nous préférons [leader_target.GetLeLaLead] considérer comme"
 utopia.3345.desc.organic_3: "mort[leader_target.GetXELead]."
 utopia.3345.desc.organic_individual_lithoid: "$utopia.3345.desc.organic_1$ forme physique $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_lithoid: "$utopia.3345.desc.organic_1$ forme physique $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_individual_non_lithoid: "$utopia.3345.desc.organic_1$ propre chair $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_non_lithoid: "$utopia.3345.desc.organic_1$ propre chair $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.machine_non_gestalt: "Les bénédictions du §H$the_composer_of_strands$§! sont imprévisibles. L'un de nos dirigeants a subi une panne spectaculaire et critique lorsque ses composants matériels ont pris leur indépendance, se fusionnant spontanément pour créer une nouvelle forme étrange. Il n'est désormais plus qu'un morceau de métal défectueux et irréparable. La [Root.GetName] n'en a plus l'utilité."
 utopia.3345.desc.machine_gestalt: "Les bénédictions du §H$the_composer_of_strands$§! sont imprévisibles. L'un de nos noeuds de commandement a subi une panne spectaculaire et critique lorsque ses composants matériels ont pris leur indépendance, se fusionnant spontanément pour créer une nouvelle forme étrange. Il n'est désormais plus qu'un morceau de métal défectueux et irréparable. La [Root.GetName] n'en a plus l'utilité."
 utopia.3345.opt.a.organic: "Sa vie sera plus simple désormais..."
 utopia.3345.opt.a.machine: "Tout matériel finit par devenir obsolète"
 utopia.3346.name: "Le Composeur de brins : §Rrégression§!"
 utopia.3346.desc: "Les dons bienfaisants du §H$the_composer_of_strands$§! se sont abattus sur [devolved_species_planet.GetName]. Une partie de la population de la [devolved_species_planet.GetPlanetMoon] a subi des mutations sévères qui l'a ramenée à l'état de préconsciente."
 utopia.3346.opt.a.non_gestalt: "C'est aussi fascinant que fâcheux..."
 utopia.3346.opt.a.gestalt: "C'est tout à fait fâcheux..."
 utopia.3346.opt.a.tt: "§Y500§! £pop£§Hpops§! de [devolved_species_planet.GetName] ont été ramenées à l'état de §Ypréconscients§!.\n\nSi nous disposons de la technologie appropriée, elles pourront malgré tout être §Yprovoluées§! dans le menu §H$topbar_button_species_name$§!."
 utopia.3347.name: "Le $name_cradle$ : §Rdémilitarisation§!"
 utopia.3347.desc: "Le §HBerceau§! aspire à l'équilibre dans tous les domaines. Selon nos [GetTelepathPlural], cela inclut également une force militaire adaptée aux besoins de la galaxie. La taille de notre flotte a dû susciter la colère de notre mécène, car plusieurs vaisseaux de la §H[demilitarized_fleet.GetFleetName]§! ont disparu dans une soudaine explosion d'énergie psionique."
 utopia.3347.opt.a: "$UNFORTUNATE$"
 utopia.3347.opt.a.tt: "Une flotte aléatoire sous notre contrôle perd jusqu'à 12 de §Hcapacité navale§!."
 utopia.3348.name: "[GetCradleChaoticAnguishName]"
 utopia.3348.name.organic_non_gestalt: "Le $name_cradle$ : §Rdétresse§!"
 utopia.3348.name.machine_or_gestalt: "Le $name_cradle$ : §Rtroubles§!"
 utopia.3348.desc.intro: "[GetCradleAnguishIntro]"
 utopia.3348.desc.organic_non_gestalt: "$utopia.3348.desc.intro$ une détresse existentielle généralisée."
 utopia.3348.desc.machine_or_gestalt: "$utopia.3348.desc.intro$ des troubles cognitifs généralisés."
 utopia.3348.desc_intro_homicidal: "La psyché des [root.GetSpeciesNamePlural], harmonisée avec la volonté du §HBerceau§!, est en proie à la dissonance, entretenant l'absurdité d'une harmonie de tous les esprits. En réponse au chaos qui règne dans la galaxie, une vague de perturbations psioniques a déferlé sur la population, provoquant"
 utopia.3348.desc_intro_default: "Les [root.GetSpeciesNamePlural], harmonisés avec la volonté du §HBerceau§!, accorde désormais une grande importance à l'harmonie de tous les esprits. En réponse au chaos qui règne dans la galaxie, une vague de perturbations psioniques a déferlé sur la population, provoquant"
 utopia.3348.opt.a: "Il faut tenir bon"
 anguish_of_the_cradle: "Détresse causée par le Berceau"
 anguish_of_the_cradle_desc: "$the_cradle_of_souls_article_cap$ a provoqué une vague de perturbations psioniques qui a affecté l'ensemble de notre population."
 anguish_of_the_cradle_gestalt: "$anguish_of_the_cradle$"
 anguish_of_the_cradle_gestalt_desc: "$anguish_of_the_cradle_desc$"
 utopia.3349.name: "Le $name_cradle$ : §Rlimite§!"
 utopia.3349.desc: "Il devient de plus en plus difficile de soutenir et d'entretenir nos flottes militaires à travers toute la §H[root.GetName]§!.\n\nD'après nos [GetTelepathPlural], le §HBerceau§!, aspirant à l'ordre galactique, est à l'origine de cette perturbation. Nos investissements dans les infrastructures militaires, même modestes, semblent l'avoir contrarié."
 utopia.3349.opt.a: "Nous devrions limiter notre présence dans le vide"
 limit_of_the_cradle: "Limite imposée par le Berceau"
 limit_of_the_cradle_desc: "Nos infrastructures militaires sont réduites par $the_cradle_of_souls_article$."
 utopia.3350.name: "[GetLavishLifestyleEventName]"
 utopia.3350.name.individual: "$name_instrument$ : §Rvie de luxe§!"
 utopia.3350.name.gestalt: "$name_instrument$ : §Rsurconsommation§!"
 utopia.3350.desc.individual: "Notre lien avec l'§HInstrument§! pousse certains dirigeants des [Root.GetSpeciesNamePlural] à adopter des habitudes de consommation coûteuses.\n\nIl a été découvert que [lavish_leader.GetName] avait dépensé d'énormes quantités de crédits énergétiques pour se procurer des objets extravagants, entretenant ainsi un style de vie de plus en plus luxueux."
 utopia.3350.desc.gestalt: "Notre lien étroit avec l'§HInstrument§! entraîne une augmentation de la consommation des ressources chez certains drones dirigeants des [Root.GetSpeciesNamePlural].\n\n[lavish_leader.GetName] utilise plus d'énergie que nécessaire pour fonctionner. Aucune raison physique n'explique ce phénomène, ce qui nous amène à la conclusion que cette utilisation excessive des ressources est un choix préférentiel."
 utopia.3350.opt.a: "Tel est le prix du désir"
 utopia.3351.name: "$name_instrument$ : §Rdistraction de la main-d'oeuvre§!"
 utopia.3351.desc.individual: "À mesure que l'influence de notre mécène gagne du terrain sur [Root.GetName], de nouvelles distractions réduisent la productivité de la population au travail.\n\nFace à une motivation en baisse, obtenir les mêmes résultats qu'auparavant nécessite désormais un investissement plus important."
 utopia.3351.desc.gestalt: "À mesure que l'influence de notre mécène gagne du terrain sur [Root.GetName], une déviance rampante émerge au sein du collectif des [Root.GetSpeciesNamePlural].\n\nCes pulsions individualistes et cette propension à la distraction sont particulièrement fréquentes pendant le travail. Préserver la cohésion et la discipline de la main-d'oeuvre nécessite désormais un investissement plus important."
 utopia.3351.opt.a: "Une lubie passagère de l'§HInstrument§!"
 distracted_workforce: "Main-d'oeuvre distraite"
 distracted_workforce_desc: "Cette main-d'oeuvre est sujette à la distraction et nécessite une surveillance constante."
 utopia.200.name: "Nouvelle présence dans le Suaire"
 utopia.200.desc.a: "Un changement est survenu chez les [target_species.GetNamePlural] vivant dans l'empire. Cela a commencé par une faible ondulation dans le Suaire. Maintenant, c'est comme s'ils vibraient à un niveau différent. Nous le sentons tous clairement : les [target_species.GetNamePlural] sont sur le point de développer des capacités psioniques latentes, similaires aux nôtres.\n\nPeut-être est-ce dû au fait qu'ils vivent près de nous. Peut-être le Suaire les a-t-il tout simplement choisis. Le Conclave des télépathes, qui regroupe tous nos experts du psionisme, nous en a averti : cela pourrait bien être la seule chance qui nous est offerte pour intervenir. Nous pouvons décider de tout stopper, ou de les aider à s'éveiller. Quoi qu'il en soit, ils n'iront pas bien loin si nous ne les guidons pas."
 utopia.200.desc.b: "Une activité inhabituelle dans le Suaire suggère qu'une autre espèce de l'empire, les [target_species.GetNamePlural], a commencé à manifester des capacités psioniques latentes. Nous faisons au même choix que la fois précédente : devons-nous éradiquer ou favoriser leurs pouvoirs naissants ?"
 utopia.200.a: "Aidons-les à développer leur véritable potentiel"
 utopia.200.a.tooltip: "Toutes les pops de [target_species.GetNamePlural] vont acquérir le trait §Y$trait_latent_psionic$§!."
 utopia.200.b: "Ils n'en sont pas dignes"
 utopia.203.name: "L'éveil"
 utopia.203.desc.a: "Guidés par le Conclave des télépathes, les [target_species.GetNamePlural] ont développé avec le Suaire une connexion bien plus profonde que nous aurions pu l'imaginer. C'est comme si ces pouvoirs avaient été prévus pour eux depuis les origines.\n\nIls prétendent maintenant être prêt à développer l'ensemble de leur potentiel psionique. Le Conclave est pourtant divisé à ce sujet. Certains s'inquiètent que ce changement survienne trop rapidement, et que leurs esprits deviennent instables. D'autres que leurs nouveaux pouvoirs puissent leur monter à la tête. Quoi qu'il en soit, si nous n'agissons pas très rapidement nous pourrions ne plus jamais avoir l'occasion de le faire."
 utopia.203.desc.b: "Les [target_species.GetNamePlural] prétendent eux aussi être prêts à franchir l'étape nécessaire pour développer leurs pleins potentiel psionique et franchir l'étape de l'éveil."
 utopia.203.a: "Ils sont prêts"
 utopia.203.a.tooltip: "Toutes les pops de [target_species.GetNamePlural] vont acquérir le trait §Y$trait_psionic$§!."
 utopia.203.b: "Ils n'en sont pas dignes"
 utopia.203.c: "C'est beaucoup trop dangereux"
 utopia.204.name: "Éveil difficile"
 utopia.204.desc.a: "Ces derniers temps, des manifestations inattendues de capacités psioniques chez certains [original_species.GetSpeciesNamePlural] ont laissé nos chercheurs perplexes. En enquêtent à ce sujet, ils ont découvert que ces changement coïncident avec l'éveil psionique majeur de leurs cousins de la [target_country.GetName], une civilisation depuis longtemps reconnue pour ses prouesses dans le domaine du psionisme.\n\nNous ne pouvons que supposer que certains de ces nouveaux pouvoirs ont été transmis à leurs lointains parents qui se trouvent dans notre propre empire, d'une manière qui nous reste inconnue."
 utopia.204.desc.b: "Ces derniers temps, des manifestations inattendues de capacités psioniques chez certains [original_species.GetSpeciesNamePlural] ont laissé nos chercheurs perplexes. En enquêtant à ce sujet, ils se sont aperçus que ces psioniques sont liés par télépathie à leurs cousins qui vivent dans un empire jusque-là inconnu, la [target_country.GetName], avec laquelle nous avons maitenant établi des communications. Il semble que ces changements dont nous avons été témoins n'étaient qu'un effet collatéral, causé par l'éveil psionique majeur de tous les [original_species.GetSpeciesNamePlural] de la [target_country.GetName]."
 utopia.204.a.tooltip: "Jusqu'à 4 pops de [original_species.GetSpeciesNamePlural] vont acquérir le trait §Ypsionique en latence§!."
 utopia.205.name: "Éveil inattendu"
 utopia.205.desc: "Depuis l'éveil psionique des [target_species.GetNamePlural], nos informateurs rapportent que certains individus appartenant à la même espèce elsewhere, vivant dans d'autres empires, otn aussi commencé à montrer des signes de capacités psioniques latentes. Tout se passe comme si leur lointaine parenté les liait au travers du Suaire, quelle que soit la distance physique qui les sépare.\n\nAu contraire des [target_species.GetNamePlural] se trouvant au sein de notre empire, toutefois, ils sont peu nombreux et éloignés, et il est peu probable qu'ils atteignent un jour le stade d'un véritable éveil."
 whisperers_madness: "Folie du Suaire"
 whisperers_madness_desc: "À cause de la folie causée par $whisperers_in_the_void_color_article$, les habitants de l'empire sont divisés."
 whisperers_madness_gestalt: "$whisperers_madness$"
 whisperers_madness_gestalt_desc: "À cause de la folie causée par $whisperers_in_the_void_color_article$, nos drones sont divisés."
 whisperers_psychosis: "Psychose du Suaire"
 whisperers_psychosis_desc: "À cause de la folie causée par $whisperers_in_the_void_color_article$, l'empire est en proie à la division."
 whisperers_psychosis_gestalt: "$whisperers_psychosis$"
 whisperers_psychosis_gestalt_desc: "À cause du déséquilibre causé par $whisperers_in_the_void_color_article$, l'empire est en proie à la division."
 eater_unhappiness_planet_1: "Population mangée par le Suaire"
 eater_unhappiness_planet_1_desc: "$the_eater_of_worlds_color_article_cap$ a dévoré une partie de la population de cette planète."
 eater_unhappiness_planet_1_gestalt: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_1_gestalt_desc: "$eater_unhappiness_planet_1_desc$"
 eater_unhappiness_planet_2: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_2_desc: "$eater_unhappiness_planet_1_desc$"
 eater_unhappiness_planet_2_gestalt: "$eater_unhappiness_planet_2$"
 eater_unhappiness_planet_2_gestalt_desc: "$eater_unhappiness_planet_2_desc$"
 eater_unhappiness_empire: "Monde mangé par le Suaire"
 eater_unhappiness_empire_desc: "$the_eater_of_worlds_color_article_cap$ a dévoré une planète entière de l'empire."
 eater_unhappiness_empire_gestalt: "$eater_unhappiness_empire$"
 eater_unhappiness_empire_gestalt_desc: "$eater_unhappiness_empire_desc$"
 instrument_deviance_planet: "Déviance du Suaire"
 instrument_deviance_planet_desc: "La population de cette planète se détourne des éthiques de l'empire afin de poursuivre ses propres objectifs. Il ne fait aucun doute que c'est là l'oeuvre de l'§YInstrument du désir§!."
 instrument_deviance_empire: "Déviance du Suaire"
 instrument_deviance_empire_desc: "La population de tout l'empire a commencé à remettre en cause les éthiques et politiques du gouvernement. Il ne fait aucun doute que c'est là l'oeuvre de l'§YInstrument du désir§!."
 instrument_consumer_goods: "Décadence du Suaire"
 instrument_consumer_goods_desc: "Les habitants de cette planète sont pris d'un consumérisme décadent, et désespèrent de trouver des nourritures rares et des biens exotiques. Il ne fait aucun doute que c'est là l'oeuvre de l'§YInstrument du désir§!."
 d_eater_deposit: "Cratère du Suaire"
 d_eater_deposit_desc: "Une partie de ce monde a été dévorée par une entité du §HSuaire§!. Tout ce qu'il reste est un cratère où tourbillonnent des brumes pourpres, et ceux qui s'aventurent à proximité ne reviennent généralement jamais."
 opinion_doomed_us_all: "A causé la Fin"
 absorbed_consciousness_1: "Conscience absorbée"
 absorbed_consciousness_2: "$absorbed_consciousness_1$"
 absorbed_consciousness_3: "$absorbed_consciousness_1$"
 absorbed_consciousness_4: "$absorbed_consciousness_1$"
 absorbed_consciousness_5: "$absorbed_consciousness_1$"
 covenant.tooltip: "§YIl y aura un prix à payer.§!\n\n"
 covenant.cycle.tooltip: "§RNe faites pas ça !§!\n\n"
 covenant.whisperers.desc: "C'est fait. Nous avons conclu l'accord avec $whisperers_in_the_void_color_article$, et déjà ils ont commencé à partager leurs secrets avec nos scientifiques et nos dirigeants. Nous en tirerons un bénéfice considérable.\n\nLe seul inconvénient semble être une soudaine augmentation du nombre de maladies mentales et du taux de suicide au sein de la population, et certains de nos mondes connaissent une véritable épidémie de meurtres et de violences inexplicables, commis par des individus autrement tout à fait stables et équilibrés. Les cliniques et les asiles rencontrent quelques difficultés à faire face à l'afflux soudain de patients."
 covenant.whisperers.option: "Nous trouverons une solution"
 covenant.eater.desc: "C'est fait. Nous avons conclu un accord avec $the_eater_of_worlds_color_article$ et déjà nous pouvons en voir les effets pour nos armées et notre flotte. Nos soldats se battent désormais avec une férocité qui confine à la sauvagerie, et les armes si puissantes de nos vaisseaux semblent, d'une façon ou d'une autre, se réjouir de la mort de nos ennemis.\n\nIl ne fait aucun doute que cela soit lié à la disparition soudaine, et mystérieuse, de l'ensemble de la population d'une ville de l'une de nos colonies, ses habitants ayant été dévorés par le Mangeur, selon l'accord conclu avec lui.\n\nCela semble être un faible prix à payer... En supposant, bien évidemment, que le Mangeur n'aura pas faim à nouveau..."
 covenant.eater.option: "Espérons que non"
 covenant.instrument.desc: "C'est fait. Nous avons conclu l'accord avec $the_instrument_of_desire_color_article$. Cela n'a guère mis de temps avant que les effets s'en fassent sentir : des rapports sur de nouveaux et riches gisements de minerais découverts dans nos mines, des marchés commerciaux qui semblaient sur le point de s'effondrer ont soudainement retrouvé toute leur vigueur, des ressources rares et précieuses trouvées sur des astéroïdes dont nous sommes assurés qu'ils ne renfermaient rien d'autre que de la glace et de la pierre...\n\nIl semble que l'empire est en train d'entrer dans un âge d'or, d'opulence et de prospérité, comme nous l'avait promis l'Instrument, mais... Quel était donc ce coût dont il nous parlait ?"
 covenant.instrument.option: "Rien de bien méchant, à n'en pas douter"
 covenant.composer.desc: "C'est fait. Nous avons conclu l'accord avec $the_composer_of_strands_color_article$. Il n'a pas fallu attendre longtemps avant d'en sentir les effets : une augmentation soudaine et importante du taux de natalité, qui est indéniablement de son fait. Mais il y a aussi, à côté de ces effets positifs, une série de nouvelles et étranges mutations : des enfants nés avec des membres et organes en surnombre... certains d'entre eux ne ressemblant à rien de tout ce qui a pu être catalogué dans le domaine de l'anatomie.\n\nFort heureusement, les quelques décès qui en ont résulté sont plus que compensés par le taux de natalité en hausse et la vitalité apparemment accrue de la population."
 covenant.composer.option: "Nous avons fait le bon choix"
 covenant.cycle.desc: "C'est fait. Nous avons conclu l'accord avec la §RFin du cycle§!. Alors que nous nous engagions, deux mots, deux simples mots furent prononcés : §R« CINQUANTE ANS »§!. Puis un silence, comme si l'on nous laissait contempler les conséquences futures de ce que nous venions de provoquer."
 covenant.cycle.option: "Puissent les esprits prendre pitié de nous"
 covenant_shroud_marked: "Marqué par le Suaire"
 covenant_shroud_marked_desc: "Ce monde est marqué par le Suaire.\n\n§RQuelque chose de sinistre est en train de s'y produire.§!"
 covenant_whisperers_in_the_void: "Accord avec les Murmureurs du néant"
 covenant_whisperers_in_the_void_0: "$covenant_whisperers_in_the_void$"
 covenant_whisperers_in_the_void_desc: "Nous avons conclu un accord avec une puissante créature du Suaire et bénéficions maintenant de son patronage.\n\n§YIl y aura un prix à payer.§!"
 covenant_whisperers_in_the_void_0_desc: "$covenant_whisperers_in_the_void_desc$"
 covenant_whisperers_in_the_void_0_fircon: "Manteau des Murmureurs"
 covenant_whisperers_in_the_void_fircon: "$covenant_whisperers_in_the_void_0_fircon$"
 covenant_composer_of_strands: "Accord avec le Composeur de brins"
 covenant_composer_of_strands_0: "$covenant_composer_of_strands$"
 covenant_composer_of_strands_desc: "Nous avons conclu un accord avec une puissante créature du Suaire et bénéficions maintenant de son patronage.\n\n§YIl y aura un prix à payer.§!"
 covenant_composer_of_strands_0_desc: "$covenant_composer_of_strands_desc$"
 covenant_eater_of_worlds: "Accord avec le Mangeur de mondes"
 covenant_eater_of_worlds_0: "$covenant_eater_of_worlds$"
 covenant_eater_of_worlds_desc: "Nous avons conclu un accord avec une puissante créature du Suaire et bénéficions maintenant de son patronage.\n\n§YIl y aura un prix à payer.§!"
 covenant_eater_of_worlds_0_desc: "$covenant_eater_of_worlds_desc$"
 covenant_eater_of_worlds_debuff: "$covenant_eater_of_worlds$"
 covenant_eater_of_worlds_debuff_desc: "$covenant_eater_of_worlds_desc$"
 covenant_eater_of_worlds_debuff_0: "$covenant_eater_of_worlds$"
 covenant_eater_of_worlds_debuff_0_desc: "$covenant_eater_of_worlds_desc$"
 covenant_instrument_of_desire: "Accord avec l'Instrument du désir"
 covenant_instrument_of_desire_0: "$covenant_instrument_of_desire$"
 covenant_instrument_of_desire_desc: "Nous avons conclu un accord avec une puissante créature du Suaire et bénéficions maintenant de son patronage.\n\n§YIl y aura un prix à payer.§!"
 covenant_instrument_of_desire_desc_0: "$covenant_instrument_of_desire_desc$"
 covenant_end_of_the_cycle: "Accord avec la Fin du cycle"
 covenant_end_of_the_cycle_desc: "Nous avons conclu l'accord avec la Fin du cycle.\n\n§RIl faudra rendre des comptes.§!"
 whisperers_covenant_chain_title: "Les Murmureurs du néant"
 whisperers_covenant_chain_desc: "Nous avons créé un lien avec des entités du Suaire nommées $whisperers_in_the_void_color_article$. Insondables, elles nous ont conféré une partie de leur puissance en échange d'un prix à payer. Cela aura assurément des conséquences.\n\nSelon les [GetTelepathPlural], le lien pourrait être encore renforcé si nous choisissons de suivre la voie offerte par nos protecteurs.\n\nLes Murmureurs se délectent de la connaissance, des secrets tus et des intrigues. Ils se révèlent dans la joie pure d'un esprit complet, suivant sans relâche la moindre piste."
 whisperers_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 whisperers_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 eater_covenant_chain_title: "Le Mangeur de mondes"
 eater_covenant_chain_desc.intro: "Nous avons créé un lien avec une entité du Suaire nommée $the_eater_of_worlds_color_article$. Insatiable, elle nous confère une partie de son pouvoir en échange d'un prix à payer. Nous avons encore sans doute beaucoup à découvrir.\n\nSelon les [GetTelepathPlural], le lien pourrait être plus facilement renforcé si nous choisissons d'aligner nos actions avec la volonté de notre mécène."
 eater_covenant_chain_desc: "$eater_covenant_chain_desc.intro$\n\nLe Mangeur a faim et s'impatiente. Il aspire à la guerre, et au goût si doux des combats et des lamentations."
 eater_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 eater_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 composer_covenant_chain_title: "Le Composeur de brins"
 composer_covenant_chain_desc.intro: "Nous avons créé un lien avec une entité du Suaire nommée $the_composer_of_strands_color_article$. Protectrice, elle nous confère une partie de son pouvoir en échange d'un prix à payer. Nous avons encore sans doute beaucoup à découvrir.\n\nSelon les [GetTelepathPlural], le lien pourrait être encore renforcé si nous choisissons d'aligner nos actions avec la volonté de notre mécène."
 composer_covenant_chain_desc: "$composer_covenant_chain_desc.intro$\n\nLe Composeur aspire aux manipulations génétiques pour libérer la chair des contraintes de l'évolution. Il nous enseigne le respect de la vie, de la nature et la sacralité de la chair."
 composer_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 composer_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 instrument_covenant_chain_title: "L'Instrument du désir"
 instrument_covenant_chain_desc.intro: "Nous avons créé un lien avec une entité du Suaire nommée $the_instrument_of_desire_color_article$. Attentive, elle nous confère une partie de son pouvoir en échange d'un prix à payer. Nous avons encore sans doute beaucoup à découvrir.\n\nSelon les [GetTelepathPlural], le lien pourrait être plus facilement renforcé si nous choisissons d'aligner nos actions avec la volonté de notre mécène."
 instrument_covenant_chain_desc: "$instrument_covenant_chain_desc.intro$\n\nL'Instrument aspire à la jouissance. Les plaisirs assouvis, la décadence et l'esclavage font sa délectation."
 instrument_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 instrument_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 utopia.2671.name: "Renforcement du lien"
 utopia.2671.desc: "La compréhension avec [Root.GetShroudPatron_FR_lelales] n'a fait que se renforcer. Certes, nous ne sommes que quantité négligeable pour [Root.GetShroudPatron_FR_luieux], rien d'autre que des insectes. Pourtant, [Root.GetShroudPatron_FR_ilils] sembl[Root.GetShroudPatron_FR_eent] nous apprécier, et nous [Root.GetShroudPatron_FR_aont] conféré une autre miette de pouvoir.\n\nLes télépathes sont désormais mieux accordés avec [Root.GetShroudPatron_FR_luieux], et nous avons reçu l'inspiration pour créer un monument destiné à célébrer notre accord, un lieu où les meilleurs psychistes pourront communier avec [Root.GetShroudPatron_FR_luieux]."
 utopia.2671.a: "L'étreinte du Composeur nous rassure"
 utopia.2671.a.tt: "Les télépathes accélèrent désormais la §Yvitesse de développement des £pop£pops§!.\n\nNous pouvons construire un £building£§Ysanctuaire du Composeur de brins§! sur l'un de nos mondes."
 utopia.2671.b: "La guerre apaisera notre faim à nous aussi"
 utopia.2671.b.tt: "Les £job_telepath£télépathes produisent désormais de la £mod_country_naval_cap_add£§Ycapacité navale§! supplémentaire.\n\nNous pouvons construire un £building£§Y$building_eater_sanctum$§! sur l'un de nos mondes."
 utopia.2671.c: "Rien n'est plus beau que le désir"
 utopia.2671.c.tt: "Les £job_telepath£télépathes produisent désormais des £amenities£§Yservices§! supplémentaires.\n\nNous pouvons construire un £building£§Y$building_instrument_sanctum$§! sur l'un de nos mondes."
 utopia.2671.d: "Pas de place au doute dans un esprit rempli"
 utopia.2671.d.tt: "Les £job_telepath£télépathes produisent désormais de la $r_research_lower$ supplémentaire.\n\nNous pouvons construire un £building£§Y$building_whisperers_sanctum$§! sur l'un de nos mondes."
 utopia.2676.name: "Plein potentiel"
 utopia.2676.desc: "Les mystères du §HSuaire§! nous sont trop étranges pour être entièrement dissipés, mais nous sommes de plus en plus accordés avec [Root.GetShroudPatron_FR_lelales]. Où que nous allions, nous pouvons sentir [Root.GetShroudPatron_FR_saleur] présence derrière nos esprits, et [Root.GetShroudPatron_FR_saleur] puissance suinte dans notre réalité par les fêlures de notre psyché."
 utopia.2676.a: "La volonté de la chair est sacrée"
 utopia.2676.b: "Lutter, c'est se vouer"
 utopia.2676.c: "Convoiter nous devons"
 utopia.2676.d: "Tenir secret, c'est protéger"
 utopia.2681.name: "Miettes de pouvoir"
 utopia.2681.desc: "[Root.GetShroudPatron_FR_LeLaLes] [Root.GetShroudPatron_FR_aont] déposé une partie de [Root.GetShroudPatron_FR_sonleur] énergie dans un repli du Suaire, qui n'attend que d'être récupérée. Notre lien avec [Root.GetShroudPatron_FR_luieux] va nous permettre d'absorber et maîtriser ce pouvoir en toute sécurité.\n\nQuelques candidats ont été sélectionnés, mais un seul parmi eux peut recevoir le privilège de prendre le contrôle de cette puissance. Qui sera l'Élu ?"
 utopia.2681.a: "Notre §H[leader_1.GetTitle]§! [leader_1.GetName]"
 utopia.2681.b: "Notre §H[leader_2.GetTitle]§! [leader_2.GetName]"
 utopia.2681.c: "Notre §H[leader_3.GetTitle]§! [leader_3.GetName]"
 utopia.2681.d: "Notre §H[leader_4.GetTitle]§! [leader_4.GetName]"
 utopia.2682.name: "L'ascension de [chosen_leader.GetName]"
 utopia.2682.desc.intro: "C'est fait. Alors que l'énergie [Root.GetShroudPatron_FR_dudeldes] pénétrait en [chosen_leader.GetName], tous ceux qui l'entouraient ont pu [GetFeelLoc] le poids de [Root.GetShroudPatron_FR_saleur] puissance psionique. Elle est immense, et commande le respect. Désormais, [chosen_leader.GetSheHe] sera"
 utopia.2682.desc.patron_champion: "$utopia.2682.desc.intro$ le champion [GetImmortalLoc] [Root.GetShroudPatron_FR_dudeldes]."
 utopia.2682.desc.shroudshaper_champion: "$utopia.2682.desc.intro$ le $leader_trait_shroudshaper$ [GetImmortalLoc] de la §H[This.GetName]§!."
 utopia.2682.desc.previous_chosen_killed: "Cet événement a eu un effet dévastateur sur l'hérétique §H[previous_chosen_leader.GetName]§!, autrefois considéré[previous_chosen_leader.GetXELead] comme l'Élu[previous_chosen_leader.GetXELead] de notre ancien mécène. Depuis son lieu d'exil, [previous_chosen_leader.GetHeShe] s'est doucement éteint[previous_chosen_leader.GetXELead] lorsque les dernières traces de pouvoir psionique ont disparu de son corps brisé."
 utopia.2682.desc.previous_chosen_lost_patron: "Cet événement a eu un effet significatif sur §H[chosen_leader_lost_patron.GetName]§!. Bien qu'[chosen_leader_lost_patron.GetHeShe] soit toujours empreint[chosen_leader_lost_patron.GetXELead] d'une grande quantité d'énergie psionique, [chosen_leader_lost_patron.GetHeShe] a perdu le pouvoir qui lui avait été conféré par notre ancien mécène."
 utopia.2682.a: "C'était là sa destinée de devenir l'Élu[chosen_leader.GetXELead]"
 utopia.2682.a.shroudshaper: "C'est sa destinée"
 utopia.2686.name: "Armements bénis"
 utopia.2686.desc: "Le Conclave des télépathes a fait une avancée prodigieuse pour maîtriser la puissance du Suaire. Alors qu'auparavant seuls les individus doués de talents psioniques pouvaient pleinement saisir l'accord dans toute sa portée, une manière a été trouvée de laisser la puissance s'écouler dans des vaisseaux spatiaux entiers, à une échelle inédite jusqu'à présent.\n\nSi tel est notre désir, le toucher [Root.GetShroudPatron_FR_dudeldes] peut pousser nos flottes plus loin que jamais auparavant."
 utopia.2686.a: "Qu'est-ce qu'une coque si elle n'est de chair ?"
 utopia.2686.b: "Nos vaisseaux aussi ont faim"
 utopia.2686.c: "Nos vaisseaux aspirent à toujours plus"
 utopia.2686.d: "De toutes les armes, le secret est la plus efficace"
 building_composer_sanctum: "Sanctuaire du Composeur de brins"
 building_composer_sanctum_desc: "Ce sanctuaire est dédié à la communion avec le Composeur. [GetComposerSanctumDesc]"
 building_composer_sanctum_desc_default: "Là, la chair erre aussi librement que l'esprit, permettant au Suaire de nous remodeler au-delà de nos limites."
 building_composer_sanctum_desc_machine: "Là, les circuits fonctionnent sans entrave physique. Le Suaire optimise nos processeurs au-delà de nos paramètres habituels."
 building_eater_sanctum: "Sanctuaire du Mangeur de mondes"
 building_eater_sanctum_desc: "Ce sanctuaire est dédié à la communion avec le Mangeur de mondes. Là, le Suaire nous prépare à la guerre et la prochaine [GetEaterSanctumDesc] est planifiée."
 building_eater_sanctum_desc_machine: "conquête"
 building_eater_sanctum_desc_default: "bombance"
 building_instrument_sanctum: "Sanctuaire de l'Instrument du désir"
 building_instrument_sanctum_desc: "Ce sanctuaire est dédié à la communion avec l'Instrument. [GetInstrumentSanctumDesc]"
 building_instrument_sanctum_desc_gestalt: "Là, les excès sont amassés, purifiés et redistribués afin d'assurer la stabilité du collectif."
 building_instrument_sanctum_desc_default: "Là, les trésors sont conservés avant d'être échangés avec une frénésie qui nous rapproche de la satisfaction."
 building_whisperers_sanctum: "Sanctuaire des Murmureurs du néant"
 building_whisperers_sanctum_desc: "Ce sanctuaire est dédié à la communion avec les Murmureurs du néant. [GetWhisperersSanctumDesc]"
 building_whisperers_sanctum_desc_machine: "Là, des secrets sont échangés, de nouvelles connaissances amenées pour être scellées, et nos signaux participent au choeur."
 building_whisperers_sanctum_desc_default: "Là, des secrets sont susurrés, de nouvelles connaissances amenées pour être scellées, et nos murmures participent au choeur."
 covenant_detection_first_contact: "$building_whisperers_sanctum$"
 covenant_detection_first_contact_effect: "Pour notre §Ybase stellaire§! dans ce système : §G+5§! en £ship_stats_cloaking_detection£capacité de détection.\n\n"
