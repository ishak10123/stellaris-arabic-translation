l_french:
 SHIPSET_LABEL: "Modèle de vaisseau"
 SHIPSETS_LABEL: "Modèles de vaisseaux"
 SHIP_GRAPHICS_PREVIEW: "Aperçu de chaque classe"
 SHIP_GRAPHICS_REQUIRED_DLC: "DLC requis"
 SHIP_GRAPHICS_MISSING_DLC_TOOLTIP: "§GCliquer pour afficher les vaisseaux d'origine $CULTURE_NAME$.§!"
 SHIP_GRAPHICS_CAMERA_TRANSFORM_TOOLTIP: "£camera_zoom_in£§GMolette de la souris vers le haut§! pour zoomer.\n£camera_zoom_out£§GMolette de la souris vers le bas§! pour dézoomer.\n£camera_rotate£§GMaintenir un clic droit§! sur le modèle de vaisseau pour imprimer une rotation."
 SHIP_GRAPHICS_CORVETTE_DESC: "Les corvettes forment la première classe de vaisseaux militaires disponible pour les empires. Elles sont rapides, agiles et peu coûteuses."
 SHIP_GRAPHICS_FRIGATE_DESC: "Les frégates sont des corvettes améliorées spécialisées dans le rôle de torpilleurs. Elles sont plus lentes et vulnérables, mais peuvent être dévastatrices face à des cibles imposantes."
 SHIP_GRAPHICS_DESTROYER_DESC: "Les destroyers compensent la perte d'agilité et de vitesse des corvettes par une puissance de feu plus importante et une coque plus épaisse."
 SHIP_GRAPHICS_CRUISER_DESC: "Les croiseurs sont polyvalents et durables, étant capables d'encaisser et d'infliger de lourds dégâts."
 SHIP_GRAPHICS_BATTLESHIP_DESC: "Les cuirassés sont coûteux mais puissants. Avec leur portée de tir importante, ils excellent lorsqu'il s'agit d'infliger des dégâts à l'ennemi avant que celui-ci puisse contre-attaquer."
 SHIP_GRAPHICS_TITAN_DESC: "S'ils sont extrêmement puissants par eux-mêmes, les titans peuvent aussi tirer parti de leurs auras, qui bénéficient aux vaisseaux alliés."
 SHIP_GRAPHICS_BIO_TITAN_DESC: "$SHIP_GRAPHICS_TITAN_DESC$"
 SHIP_GRAPHICS_JUGGERNAUT_DESC: "Construire un mastodonte est un projet de longue haleine. Immenses, ces vaisseaux peuvent être utilisés aussi bien comme chantiers spatiaux mobiles que comme vaisseaux de soutien."
 SHIP_GRAPHICS_COLOSSUS_DESC: "Ces vaisseaux gigantesques ne sont pas équipés pour affronter des flottes ennemies, mais pour neutraliser des mondes entiers."
 SHIP_GRAPHICS_OUTPOST_DESC: "Un avant-poste est la base spatiale la plus élémentaire, dotée de peu de fonctions si ce n'est de marquer la possession d'un système stellaire."
 SHIP_GRAPHICS_STARBASE_CITADEL_DESC: "La citadelle est le niveau le plus développé de la base stellaire. Équipée de défenses importantes, elle est pour n'importe quel ennemi difficile à détruire."
 SHIP_GRAPHICS_TRANSPORT_DESC: "Les vaisseaux de transport embarquent les armées destinées à assaillir les mondes hostiles en cas de conflit. Non blindés, non armés, ils doivent être accompagnés d'une flotte de soutien lorsqu'ils sont en espace hostile."
 SHIP_GRAPHICS_SCIENCE_DESC: "Les vaisseaux scientifiques sont utilisés en premier lieu pour explorer les systèmes stellaires inconnus et enquêter sur les anomalies. Étant des vaisseaux civils, ils ne sont pas blindés, et donc vulnérables."
 SHIP_GRAPHICS_CONSTRUCTOR_DESC: "Les vaisseaux de construction sont indispensables pour construire des stations spatiales. Étant des vaisseaux civils, ils ne sont pas blindés, pas armés et vulnérables."
 SHIP_GRAPHICS_COLONIZER_DESC: "Les vaisseaux coloniaux transportent les colons depuis les mondes habités vers ceux destinés à la colonisation. Étant des vaisseaux civils, ils ne sont pas blindés, pas armés et vulnérables."
 SHIP_GRAPHICS_SHIP_SIZE_LOCKED_DESC: "§RCette classe de vaisseaux nécessite le DLC $SHIP_SIZE_NAME$.§!"
 SHIP_GRAPHICS_ION_CANNON_DESC: "Une imposante arme défensive qui tire des rafales énergétiques dévastatrices paralysant les vaisseaux ennemis. Lente mais puissante, elle constitue un excellent moyen de dissuasion pour les intrus."
 SHIP_GRAPHICS_MILITARY_STATION_SMALL_DESC: "Les plateformes de défense sont des fortifications orbitales stationnaires conçues pour protéger les bases stellaires des incursions hostiles."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_1_DESC: "Station orbitale constituant la première ligne de défense du système, elle est conçue pour projeter de la puissance et sécuriser les emplacements stratégiques."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_2_DESC: "Forteresse avancée équipée d'emplacements d'armes et de systèmes défensifs. Renforcée pour les affrontements prolongés, elle sert de point d'ancrage aux opérations de la flotte dans les zones spatiales disputées."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_3_DESC: "Summum des fortifications spatiales, cette imposante station est un bastion quasi imprenable, capable de résister à des assauts de grande envergure, tout en exerçant un contrôle total sur la logistique du système."
 SHIP_SIZE_SELECTOR_LOC: "SHIP_GRAPHICS_$SIZE$_DESC"
 SHIPSETS_DESCRIPTION_LABEL: "Description"
 SHIP_GRAPHICS_NANITE_SWARMER_DESC: "Appareil de combat rapide et erratique composé de nanites autoréplicatives. Dépourvus de pilotes classiques, ces essaims autonomes dominent l'ennemi par leur nombre, disséquant les défenses ennemies avec une implacable précision."
 SHIP_GRAPHICS_NANITE_INTERDICTOR_DESC: "Appareil de combat adaptatif formé à partir de nanites autoréplicatives, l'Interdicteur privilégie le contrôle au chaos. Opérant en groupe, ces dispositifs autonomes interceptent et neutralisent les menaces avec une efficacité déconcertante, démantelant les formations ennemies grâce à une perturbation coordonnée et une poursuite implacable."
 SHIP_GRAPHICS_CRISIS_CORVETTE_DESC: "Les corvettes de crise sont conçues pour un déploiement rapide et une force écrasante par leur nombre. Elles surclassent les corvettes standards, inspirant la crainte à tous ceux qui s'opposent à la tempête en approche."
 SHIP_GRAPHICS_CRISIS_DESTROYER_DESC: "Vaisseau de guerre lourdement armé conçu pour une efficacité implacable. Plus grand et plus résistant que les corvettes, il offre une puissance de feu supérieure tout en conservant la vitesse nécessaire pour traquer les ennemis en fuite."
 SHIP_GRAPHICS_CRISIS_CRUISER_DESC: "Formidable vaisseau de guerre qui allie puissance de feu, résistance, et domination stratégique. Robuste et lourdement armé, il constitue le pilier de l'assaut, brisant les lignes ennemies avec une force implacable."
 SHIP_GRAPHICS_STAR_EATER_DESC: "Vaisseau colossal capable de consommer des étoiles entières, déclenchant des supernovae qui anéantissent des systèmes entiers. Plus qu'un simple vaisseau de guerre, le mange-étoiles présage la fin de la galaxie, réduisant les mondes au néant."
 SHIP_GRAPHICS_COSMO_CRISIS_DESTROYER_DESC: "Vaisseau de guerre élégant et imprégné d'énergie cosmique, capable de frapper avec une précision et une force implacables. Plus qu'un vaisseau, c'est le signe d'une nouvelle réalité."
 SHIP_GRAPHICS_COSMO_CRISIS_BATTLECRUISER_DESC: "Imposante fusion de la science et de la destinée, dotée d'une puissance de feu dévastatrice. Ce vaisseau de guerre redéfinit les champs de bataille comme ses maîtres redéfinissent les étoiles."
 SHIP_GRAPHICS_COSMO_CRISIS_TITAN_DESC: "Moteur de guerre céleste, dégageant la puissance d'une transformation imminente. Sa simple présence déforme la réalité, annonçant l'aube d'une renaissance de l'univers."
 SHIP_GRAPHICS_OFFSPRING_CORVETTE_DESC: "$SHIP_GRAPHICS_CORVETTE_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_DESTROYER_DESC: "$SHIP_GRAPHICS_DESTROYER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_CRUISER_DESC: "$SHIP_GRAPHICS_CRUISER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_BATTLESHIP_DESC: "$SHIP_GRAPHICS_BATTLESHIP_DESC$\n\n$OFFSPRING_SHIP_DESC$"
