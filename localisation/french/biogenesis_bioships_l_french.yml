 tech_mauler_build_speed: "Incubation de lutteurs standardisée"
 tech_mauler_build_speed_desc: "Ces incubateurs permettent aux vaisseaux militaires embryonnaires de se développer rapidement à l'intérieur de biocapsules riches en nutriments. Bien que rudimentaires, ils sont un premier pas vers une flotte non pas construite, mais née."
 tech_mauler_build_speed_effect: "$mod_ship_mauler_cost_mult$: §G-5%§!\nVit. de constr. des $mauler_class_plural$ : §G+25%§!"
 tech_mauler_growth_1: "Développement de lutteurs amélioré"
 tech_mauler_growth_1_desc: "De meilleures procédures réduisent le temps d'incubation et améliorent la stabilité structurelle des vaisseaux organiques. L'amélioration des systèmes d'apport de nutriments et les modifications génétiques rendent les vaisseaux plus rapides et plus résistants."
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_TITLE: "§HPermet les§! lutteurs moyens"
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_DESC: "§H$mauler_stage_2$§!\nLe $mauler_class$ moyen dispose d'une plus grande puissance de feu et d'un meilleur blindage."
 gateway_bio_ships: "§HCheminement des vaisseaux biologiques§!\n§ECette technologie va permettre des avancées majeures dans le domaine des vaisseaux biologiques.§!"
 tech_mauler_growth_2: "Développement de lutteurs avancé"
 tech_mauler_growth_2_desc: "Ces installations produisent des vaisseaux dotés d'une vitalité et d'une adaptabilité inégalées. Des matrices génétiques optimisées et un soutien biotechnologique avancé garantissent des performances sans précédent."
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_TITLE: "§HPermet les§! lutteurs absolus"
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_DESC: "§H$mauler_stage_3$§!\nLe $mauler_class$ absolu est le meilleur des $mauler_class_plural$, doté d'un blindage hors pair et de puissants canons à courte portée."
 #Weaver Technologies
 tech_weavers: "$weaver_class_plural_cap$"
 tech_weavers_desc: "Reposant sur les fondements de la bio-ingénierie, les tisseurs allient agilité et capacités de combat accrues."
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_TITLE: "§HPermet les§! tisseurs légers"
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_DESC: "§H$weaver_stage_1$§!\nLe $weaver_class$ est un vaisseau biologique polyvalent de taille moyenne, conçu pour affronter des ennemis plus imposants et soutenir les flottes."
 tech_weaver_build_speed: "Incubation de tisseurs standardisée"
 tech_weaver_build_speed_desc: "Ces installations font grandir des vaisseaux biologiques de taille moyenne à l'intérieur de biocapsules avancées. Grâce à l'amélioration de l'apport en nutriments et à l'optimisation génétique, elles produisent des vaisseaux agiles et flexibles."
 tech_weaver_build_speed_effect: "$mod_ship_weaver_cost_mult$: §G-5%§!\nVit. de constr. des $weaver_class_plural$ : §G+25%§!"
 tech_weaver_growth_1: "Développement de tisseurs amélioré"
 tech_weaver_growth_1_desc: "Ces installations utilisent des procédés biotechnologiques améliorés pour accélérer les cycles de croissance et augmenter la capacité d'adaptation des vaisseaux. Des matrices génétiques améliorées et des environnements optimisés permettent à ces vaisseaux biologiques d'être à la fois durables et réactifs."
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_TITLE: "§HPermet les§! tisseurs moyens"
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_DESC: "§H$weaver_stage_2$§!\nLe $mauler_class$ moyen dispose d'une plus grande mobilité et d'une meilleure capacité d'adaptation."
 tech_weaver_growth_2: "Développement de tisseurs avancé"
 tech_weaver_growth_2_desc: "Ces installations produisent des vaisseaux biologiques d'une précision et d'une polyvalence incomparables. Des techniques de croissance révolutionnaires et des améliorations génétiques adaptatives donnent naissance à des vaisseaux qui s'imposeront même dans les situations les plus complexes."
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_TITLE: "§HPermet les§! tisseurs absolus"
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_DESC: "§H$weaver_stage_3$§!\nLe $mauler_class$ absolu dispose d'une meilleure agilité et d'une polyvalence tactique supérieure."
 #Harbinger Technologies
 tech_harbingers: "$harbinger_class_plural_cap$"
 tech_harbingers_desc: "Les hérauts ont une puissance de feu et une résistance impressionnantes et représentent une avancée majeure dans la guerre de la bio-ingénierie. Ils constituent l'épine dorsale de la flotte."
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_TITLE: "§HPermet les§! hérauts légers"
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_DESC: "§H$harbinger_stage_1$§!\nLe $harbinger_class$ renforce la flotte en faisant apparaître des appareils de combat."
 tech_harbinger_build_speed: "Incubation de hérauts standardisée"
 tech_harbinger_build_speed_desc: "Ces installations font grandir d'énormes vaisseaux biologiques et les nourrissent de nutriments avancés afin d'améliorer leur résistance et leur aptitude au combat."
 tech_harbinger_build_speed_effect: "$mod_ship_harbinger_cost_mult$: §G-5%§!\nVit. de constr. des $harbinger_class_plural$ : §G+25%§!"
 tech_harbinger_growth_1: "Développement de hérauts amélioré"
 tech_harbinger_growth_1_desc: "Ces installations utilisent des procédés de bio-ingénierie avancés pour accélérer la croissance et améliorer l'intégrité structurelle. Il en résulte des vaisseaux à l'endurance et à l'efficacité améliorées."
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_TITLE: "§HPermet les§! hérauts moyens"
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_DESC: "§H$harbinger_stage_2$§!\nL'amélioration des techniques de croissance permet d'obtenir des vaisseaux plus puissants et durables."
 tech_harbinger_growth_2: "Développement de hérauts avancé"
 tech_harbinger_growth_2_desc: "Ces systèmes d'incubation avancés produisent des vaisseaux biologiques à la durabilité et à la puissance de feu exceptionnelles. Un réglage génétique minutieux et des conditions de croissance supérieures permettent à ces vaisseaux de dominer le champ de bataille grâce à leur résistance inégalée."
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_TITLE: "§HPermet les§! hérauts absolus"
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_DESC: "§H$harbinger_stage_3$§!\nPour une force et une supériorité maximales sur le champ de bataille."
 #Stinger Technologies
 tech_stingers: "$stinger_class_plural_cap$"
 tech_stingers_desc: "Les transperceurs sont spécialisés dans les attaques dévastatrices contre des cibles de haut niveau. Ils se distinguent particulièrement par leur capacité à trouver des points faibles dans les défenses de l'adversaire."
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_TITLE: "§HPermet les§! transperceurs légers"
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_DESC: "§H$stinger_stage_1$§!\nUn vaisseau biologique rapide et dévastateur, aux capacités tactiques supérieures et capable d'effectuer des frappes précises."
 tech_stinger_build_speed: "Incubation de transperceurs standardisée"
 tech_stinger_build_speed_desc: "Ces installations donnent naissance à des vaisseaux biologiques très effilés, conçus pour la précision et la vitesse. Grâce à des biocapsules avancées et des solutions nutritives spéciales, ces vaisseaux sont capables de mener des attaques précises et efficaces."
 tech_stinger_build_speed_effect: "$mod_ship_stinger_cost_mult$: §G-5%§!\nVit. de constr. des $stinger_class_plural$ : §G+25%§!"
 tech_stinger_growth_1: "Développement de transperceurs amélioré"
 tech_stinger_growth_1_desc: "Ces installations accélèrent les cycles de croissance et améliorent la précision, ce qui confère aux vaisseaux une manoeuvrabilité et une précision supérieures. Ces améliorations confèrent au transperceur une puissance de feu dévastatrice lors des combats tactiques."
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_TITLE: "§HPermet les§! transperceurs moyens"
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_DESC: "§H$stinger_stage_2$§!\nPlus de vitesse et une plus grande précision dans les opérations tactiques."
 tech_stinger_growth_2: "Développement de transperceurs avancé"
 tech_stinger_growth_2_desc: "Summum de l'incubation de vaisseaux biologiques, ces installations avancées donnent naissance à des transperceurs d'une vitesse et d'une létalité inégalées. Les modèles génétiques optimisés et les techniques d'incubation de pointe permettent à ces vaisseaux de dominer n'importe quel champ de bataille grâce à leur rapidité et à leur précision mortelle."
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_TITLE: "§HPermet les§! transperceurs absolus"
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_DESC: "§H$stinger_stage_3$§!\nVitesse et précision ultimes pour dominer le champ de bataille."
 #Technology Swaps
 tech_biogenesis_colossus: "$tech_colossus$"
 tech_biogenesis_titans: "$tech_titans$"
 tech_biogenesis_juggernaut: "$tech_juggernaut$"
