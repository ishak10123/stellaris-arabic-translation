 #FTL Drives
 BIO_EMPTY_DRIVE: "$EMPTY_DRIVE$"
 BIO_EMPTY_DRIVE_DESC: "$EMPTY_DRIVE_DESC$"
 BIO_HYPER_DRIVE_1: "Champ de bio-hyperlignes I"
 BIO_HYPER_DRIVE_1_DESC: "La pression constante contre l'hyperespace permet au vaisseau de se faufiler à travers les hyperlignes interstellaires étroites."
 BIO_HYPER_DRIVE_2: "Champ de bio-hyperlignes II"
 BIO_HYPER_DRIVE_2_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_HYPER_DRIVE_3: "Champ de bio-hyperlignes III"
 BIO_HYPER_DRIVE_3_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_JUMP_DRIVE_1: "Organe de bond"
 BIO_JUMP_DRIVE_1_DESC: "L'organe de bond crée des déchirures de la taille d'un vaisseau dans le tissu de la réalité, permettant de se déplacer de manière quasi instantanée entre les systèmes. La nature de l'espace dans lequel se faufile le vaisseau pendant ce voyage demeure mal comprise."
 BIO_PSI_JUMP_DRIVE_1: "Organe de bond psionique"
 BIO_PSI_JUMP_DRIVE_1_DESC: "L'organe de bond psi permet de concentrer le potentiel psionique du vaisseau et de son équipage pour tordre le continuum espace-temps local en éliminant la distance entre le point d'origine et la destination. Soi-disant."
 tech_bio_hyper_drive_1: "Voyage hyperspatial"
 tech_bio_hyper_drive_1_desc: "Comme les fils d'une toile d'araignée, le plan extradimensionnel de l'hyperespace relie les puits de gravité de la majorité des étoiles. Il est théoriquement possible de se déplacer plus vite que la lumière le long de ces hyperlignes."
 tech_bio_hyper_drive_2: "Points de rupture des hyperlignes"
 tech_bio_hyper_drive_2_desc: "Nous avons identifié l'existence de points de l'espace où l'énergie nécessaire à l'ouverture d'une « brèche » dans une hyperligne est moindre. Cela va permettre la mise au point d'une nouvelle génération d'hyperpropulseurs pour les vaisseaux."
 tech_bio_hyper_drive_3: "Sillages de l'hyperespace"
 tech_bio_hyper_drive_3_desc: "Une nouvelle génération d'hyperpropulseurs capable de se faufiler dans les sillages subspatiaux. Cela permet une amélioration notable des performances de propulsion."
 tech_bio_jump_drive_1: "$BIO_JUMP_DRIVE_1$"
 tech_bio_jump_drive_1_desc: "Un organe de rebond révolutionnaire qui manipule le continuum espace-temps local pour le rendre quantiquement similaire à celui de la destination cible. Ainsi, les vaisseaux semblent quasi instantanément « bondir » de système en système."
 tech_bio_psi_jump_drive_1: "$BIO_PSI_JUMP_DRIVE_1$"
 tech_bio_psi_jump_drive_1_desc: "$BIO_PSI_JUMP_DRIVE_1_DESC$"
