 #Shields/Musculature
 tech_bio_shields_1: "$tech_shields_1$"
 BIO_SHIELD_1: "Musculature déflectrice"
 BIO_SHIELD_1_DESC: "Tissu musculaire spécialisé capable de générer un champ énergétique pour créer un bouclier déflecteur. Bien qu'il ne puisse absorber qu'une quantité limitée d'énergie à la fois, il se régénère rapidement."
 SMALL_BIO_SHIELD_1: "Petite musculature déflectrice"
 MEDIUM_BIO_SHIELD_1: "$BIO_SHIELD_1$ moyenne"
 LARGE_BIO_SHIELD_1: "Grande musculature déflectrice"
 tech_bio_shields_2: "$tech_shields_2$"
 BIO_SHIELD_2: "Musculature déflectrice améliorée"
 BIO_SHIELD_2_DESC: "Tissu musculaire perfectionné qui canalise plus efficacement l'énergie pour renforcer les boucliers déflecteurs. Ces systèmes améliorés absorbent davantage de dégâts et se régénèrent plus rapidement, ce qui offre une meilleure protection lors des combats prolongés."
 SMALL_BIO_SHIELD_2: "Petite musculature déflectrice améliorée"
 MEDIUM_BIO_SHIELD_2: "$BIO_SHIELD_2$ moyenne"
 LARGE_BIO_SHIELD_2: "Grande musculature déflectrice améliorée"
 tech_bio_shields_3: "$tech_shields_3$"
 BIO_SHIELD_3: "Musculature blindée"
 BIO_SHIELD_3_DESC: "Cette technologie de bouclier biologique avancée utilise des tissus conducteurs d'énergie renforcés pour une meilleure protection. Elle assure une meilleure résistance aux attaques énergétiques et cinétiques et permet au vaisseau biologique de s'adapter à diverses situations de combat."
 SMALL_BIO_SHIELD_3: "Petite musculature blindée"
 MEDIUM_BIO_SHIELD_3: "$BIO_SHIELD_3$ moyenne"
 LARGE_BIO_SHIELD_3: "Grande musculature blindée"
 tech_bio_shields_4: "$tech_shields_4$"
 BIO_SHIELD_4: "Musculature blindée avancée"
 BIO_SHIELD_4_DESC: "Summum des boucliers biologiques, cette musculature renforcée conduit l'énergie plus efficacement afin d'augmenter la solidité du bouclier. Elle assure une haute résistance aux attaques énergétiques et cinétiques et permet une défense polyvalente."
 SMALL_BIO_SHIELD_4: "Petite musculature blindée avancée"
 MEDIUM_BIO_SHIELD_4: "$BIO_SHIELD_4$ moyenne"
 LARGE_BIO_SHIELD_4: "Grande musculature blindée avancée"
 tech_bio_shields_5: "$tech_shields_5$"
 BIO_SHIELD_5: "Musculature hyperblindée"
 BIO_SHIELD_5_DESC: "Tissus hyperadaptatifs capables de canaliser d'immenses flux d'énergie pour créer une protection quasi impénétrable. Ce système avancé se régénère rapidement et permet au vaisseau biologique de résister aux attaques les plus dévastatrices."
 SMALL_BIO_SHIELD_5: "Petite musculature hyperblindée"
 MEDIUM_BIO_SHIELD_5: "$BIO_SHIELD_5$ moyenne"
 LARGE_BIO_SHIELD_5: "Grande musculature hyperblindée"
 tech_bio_dark_matter_deflector: "$tech_dark_matter_deflector$"
 DARK_MATTER_BIO_DEFLECTOR: "Musculature à matière noire"
 DARK_MATTER_BIO_DEFLECTOR_DESC: "Ce bouclier biologique de pointe infuse de la matière noire dans les tissus organiques afin d'augmenter considérablement leur conductivité énergétique et leurs capacités défensives. L'infusion de cette substance exotique permet à la musculature de générer des boucliers d'une incroyable solidité, capables de résister à des tirs exceptionnellement puissants."
 SMALL_DARK_MATTER_BIO_DEFLECTOR: "Petite musculature à matière noire"
 MEDIUM_DARK_MATTER_BIO_DEFLECTOR: "$DARK_MATTER_BIO_DEFLECTOR$ moyenne"
 LARGE_DARK_MATTER_BIO_DEFLECTOR: "Grande musculature à matière noire"
 tech_bio_psionic_barrier: "$tech_psionic_barrier$"
 PSI_BIO_SHIELD: "Musculature de zro"
 PSI_BIO_SHIELD_DESC: "Infusée de zro, une substance psionique réactive, cette musculature avancée crée des boucliers d'une précision et d'une adaptabilité incroyables. Ses propriétés uniques améliorent à la fois la résistance et les capacités de régénération des boucliers biologiques pour une défense presque surnaturelle."
 SMALL_PSI_BIO_SHIELD: "Petite musculature de zro"
 MEDIUM_PSI_BIO_SHIELD: "$PSI_BIO_SHIELD$ moyenne"
 LARGE_PSI_BIO_SHIELD: "Grande musculature de zro"
 tech_bio_psionic_shield: "$tech_psionic_shield$"
 PSI_BIO_BARRIER: "Tissus à résonance psi"
 PSI_BIO_BARRIER_DESC: "Ce remarquable bouclier biologique est composé de tissus spécialement conçus pour libérer de l'énergie psionique. Il en résulte une protection qui s'adapte aux attaques ennemies avec une précision inouïe. La résonance renforce le bouclier et accélère sa régénération, ce qui permet de repousser les attaques les plus inattendues."
 SMALL_PSI_BIO_BARRIER: "Petits tissus à résonance psi"
 MEDIUM_PSI_BIO_BARRIER: "$PSI_BIO_BARRIER$ moyens"
 LARGE_PSI_BIO_BARRIER: "Grands tissus à résonance psi"
 tech_bio_archaeoshield: "$tech_archaeoshield$"
 BIO_ARCHAEO_SHIELD: "Tissus à champs suspenseurs"
 BIO_ARCHAEO_SHIELD_DESC: "En développant des tissus de projection de bouclier autour d'anciens noeuds, cette technologie peut créer des champs suspenseurs qui ralentissent le temps au point d'impact. Ce délai améliore la capacité du bouclier à dissiper l'énergie des attaques, augmentant ainsi considérablement la résistance."
 SMALL_BIO_ARCHAEO_SHIELD: "Petits tissus à champs suspenseurs"
 MEDIUM_BIO_ARCHAEO_SHIELD: "$BIO_ARCHAEO_SHIELD$ moyens"
 LARGE_BIO_ARCHAEO_SHIELD: "Grands tissus à champs suspenseurs"
 #Reactors
 tech_bio_fission_power: "$BIO_FISSION_REACTOR$"
 BIO_FISSION_REACTOR: "Métabolisme à fission"
 BIO_FISSION_REACTOR_DESC: "La bio-ingénierie peut être utilisée pour transformer le tube digestif en un réacteur nucléaire biologique. Ce métabolisme, basé sur la fission nucléaire induite, produit à la fois de l'énergie et des déchets nucléaires nocifs."
 tech_bio_fusion_power: "$BIO_FUSION_REACTOR$"
 BIO_FUSION_REACTOR: "Métabolisme à fusion"
 BIO_FUSION_REACTOR_DESC: "En intégrant une microfaune capable de fusion nucléaire, le biome d'un vaisseau biologique peut produire une grande quantité d'énergie tout en évitant bon nombre des dangers associés aux sources d'énergie basées sur la fission nucléaire."
