 bio_ship_unique_components: "Organes supplémentaires"
 bio_ship_unique_components_DESC: "Ces organes supplémentaires sont implantés ou développés dans des coques vivantes afin de renforcer les capacités uniques des vaisseaux biologiques."
 MAULER_STAGE_1_GROWTH_1: "Glande de croissance ($ship_growth_stage_1$)"
 MAULER_STAGE_1_GROWTH_1_DESC: "Les glandes implantées sécrètent un puissant mélange d'hormones et de stéroïdes qui accélèrent la transition de ce vaisseau vers sa prochaine phase de croissance."
 MAULER_STAGE_1_GROWTH_2: "Glande de croissance accélérée ($ship_growth_stage_1$)"
 MAULER_STAGE_1_GROWTH_2_DESC: "Avec l'ajout de gaz exotiques aux sécrétions riches en hormones et en stéroïdes, cet organe accélère davantage la croissance des vaisseaux biologiques."
 MAULER_STAGE_2_GROWTH_1: "Glande de croissance ($ship_growth_stage_2$)"
 MAULER_STAGE_2_GROWTH_1_DESC: "$MAULER_STAGE_1_GROWTH_1_DESC$"
 STINGER_STAGE_1_GROWTH_1: "$MAULER_STAGE_1_GROWTH_1$"
 STINGER_STAGE_1_GROWTH_1_DESC: "$MAULER_STAGE_1_GROWTH_1_DESC$"
