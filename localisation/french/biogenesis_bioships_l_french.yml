 #Unique components
 MAULER_PURSUIT_1: "Recycleur métabolique"
 MAULER_PURSUIT_1_DESC: "Le recyclage des déchets chimiques produits par les organes moteurs augmente l'endurance."
 MAULER_PURSUIT_2: "Recycleur énergétique"
 MAULER_PURSUIT_2_DESC: "L'introduction de particules volatiles dans les voies de recyclage du vaisseau augmente encore plus l'endurance."
 MAULER_BITER_1: "Fluides corrosifs"
 MAULER_BITER_1_DESC: "Ces glandes implantées confèrent aux fluides corporels de nos $mauler_class_plural$ des propriétés corrosives, ce qui augmente drastiquement leur potentiel de destruction."
 MAULER_BITER_2: "Fluides caustiques"
 MAULER_BITER_2_DESC: "L'introduction de particules volatiles dans les fluides sécrétés par les $mauler_class_plural$ augmente encore plus les dégâts qu'ils infligent, en particulier contre le blindage des vaisseaux ennemis."
 weapon_type_mandible: "§YMandibules§!"
 mod_weapon_type_mandible_weapon_damage_mult: "Dégâts causés par les mandibules "
 APPLIED_MODIFIERS_SUPPORT_TITLE: "Modificateurs appliqués grâce aux armes de soutien :"
 WEAVER_GROWTH_AURA_1: "Phéromones de développement"
 WEAVER_GROWTH_AURA_1_DESC: "Les tisseurs émettent des signaux biologiques complexes qui accélèrent le développement des organismes à proximité. Ces phéromones de développement améliorent le taux de croissance et la capacité d'adaptation, ce qui permet de constituer rapidement une flotte capable de relever tous les défis."
 WEAVER_GROWTH_AURA_2: "Phéromones de développement exotiques"
 WEAVER_GROWTH_AURA_2_DESC: "Grâce à une bio-ingénierie avancée, l'effet des phéromones est renforcé, ce qui accélère drastiquement la croissance des vaisseaux biologiques alliés. Cette aura améliorée permet à la flotte d'atteindre des performances maximales à une vitesse incroyable, même dans le feu de l'action."
 GROWTH_AURA: "$WEAVER_GROWTH_AURA_1$"
 GROWTH_AURA_TT: "§PCette aura ne s'applique qu'aux vaisseaux biologiques capables de croissance.§!"
 WEAVER_BOOSTER_1: "Amplificateur symbiotique basique"
 WEAVER_BOOSTER_1_DESC: "Cet appareil organique renforce les liens entre les vaisseaux biologiques, améliorant le transfert d'énergie et la coordination au sein de la flotte. Sa présence garantit l'efficacité au combat et dans la gestion des ressources."
 WEAVER_BOOSTER_2: "Amplificateur symbiotique amélioré"
 WEAVER_BOOSTER_2_DESC: "Une version plus avancée de l'amplificateur symbiotique, qui s'adapte de manière dynamique aux besoins de la flotte, augmentant ainsi son efficacité et sa réactivité. Il optimise les capacités de la flotte et garantit une adaptation sans faille en combat."
 HARBINGER_INCUBATOR_1: "Matrice d'incubation"
 HARBINGER_INCUBATOR_1_DESC: "Cette matrice cellulaire se forme autour des oeufs des appareils de combat en développement, agissant comme un incubateur artificiel."
 HARBINGER_INCUBATOR_2: "$HARBINGER_INCUBATOR_1$ rapide"
 HARBINGER_INCUBATOR_2_DESC: "L'exposition aux gaz exotiques pendant l'incubation accélère le développement des appareils de combat."
 HARBINGER_CHITIN_1: "Régulateurs de croissance chitineuse"
 HARBINGER_CHITIN_1_DESC: "Les sécrétions dans les hangars stimulent la croissance de la chitine chez les appareils de combat en développement et améliorent leur résistance."
 HARBINGER_CHITIN_2: "Régulateurs de croissance cristalline"
 HARBINGER_CHITIN_2_DESC: "L'implantation de cristaux rares dans les exosquelettes chitineux de nos appareils de combat leur confère une meilleure résistance aux dégâts."
 STINGER_RANGE_1: "Amas télémétrique"
 STINGER_RANGE_1_DESC: "Amas neural secondaire en charge du traitement des données des capteurs."
 STINGER_RANGE_2: "$STINGER_RANGE_1$ amélioré"
 STINGER_RANGE_2_DESC: "L'intégration de cristaux rares dans les voies neuronales permet un meilleur traitement des cibles."
 STINGER_FIRE_RATE_1: "Évents de chaleur"
 STINGER_FIRE_RATE_1_DESC: "Grâce à une série d'évents thermiques situés le long de sa cage thoracique, ce vaisseau peut éjecter dans l'espace des gaz comprimés à haute température, augmentant ainsi sa cadence de tir."
 STINGER_FIRE_RATE_2: "Évents volatiles"
 STINGER_FIRE_RATE_2_DESC: "L'utilisation de particules volatiles pour le transfert de chaleur nécessite la création d'une matrice cellulaire spécifique pour éviter les explosions accidentelles."
 #Armor/Carapace
 tech_bio_ship_armor_1: "$tech_ship_armor_1$"
 BIO_ARMOR_1: "$NANOCOMPOSITE_CARAPACE$"
 BIO_ARMOR_1_DESC: "Ce blindage biologique avancé est un mélange de tissus organiques résistants et de matériaux nanostructurés, formant une carapace vivante capable de résister aux impacts les plus violents. Cette dernière s'adapte de manière dynamique aux dégâts, se régénère et procure aux vaisseaux biologiques une protection inégalée."
 SMALL_BIO_ARMOR_1: "Petite carapace nanocomposite"
 MEDIUM_BIO_ARMOR_1: "$BIO_ARMOR_1$ moyenne"
 LARGE_BIO_ARMOR_1: "Grande carapace nanocomposite"
 tech_bio_ship_armor_2: "$tech_ship_armor_2$"
 BIO_ARMOR_2: "$CERAMO_CHITIN_CARAPACE$"
 BIO_ARMOR_2_DESC: "La chitine renforcée par des composés céramiques confère à ce blindage biologique une robustesse et une résistance à la chaleur incroyablement élevées. Sa structure multicouche offre une protection efficace tout en conservant l'agilité nécessaire aux vaisseaux organiques."
 SMALL_BIO_ARMOR_2: "Petite carapace céramo-chitineuse"
 MEDIUM_BIO_ARMOR_2: "$CERAMO_CHITIN_CARAPACE$ moyenne"
 LARGE_BIO_ARMOR_2: "Grande carapace céramo-chitineuse"
 tech_bio_ship_armor_3: "$tech_ship_armor_3$"
 BIO_ARMOR_3: "$PLASTEEL_CARAPACE$"
 BIO_ARMOR_3_DESC: "Ce blindage biologique est un mélange de tissus organiques résistants et de renforts en plastacier, créant un excellent équilibre entre force et flexibilité. Sa structure hybride offre une excellente protection contre les attaques cinétiques et énergétiques, ce qui en fait une option de choix pour les vaisseaux biologiques."
 SMALL_BIO_ARMOR_3: "Petite carapace en plastacier"
 MEDIUM_BIO_ARMOR_3: "$PLASTEEL_CARAPACE$ moyenne"
 LARGE_BIO_ARMOR_3: "Grande carapace en plastacier"
 tech_bio_ship_armor_4: "$tech_ship_armor_4$"
 BIO_ARMOR_4: "Carapace en duracier"
 BIO_ARMOR_4_DESC: "Ce blindage biologique imprégné de composés organiques durables offre une résistance accrue aux dégâts. Sa structure hybride garantit une solidité remarquable sans compromettre la mobilité des vaisseaux vivants."
 SMALL_BIO_ARMOR_4: "Petite carapace en duracier"
 MEDIUM_BIO_ARMOR_4: "$DURASTEEL_CARAPACE$ moyenne"
 LARGE_BIO_ARMOR_4: "Grande carapace en duracier"
 tech_bio_ship_armor_5: "$tech_ship_armor_5$"
 BIO_ARMOR_5: "Carapace de neutronium"
 BIO_ARMOR_5_DESC: "Cette carapace, merveille de bio-ingénierie, mélange tissus organiques et neutronium, ce qui la rend presque impénétrable. Sa composition à la fois dense et flexible offre une protection robuste, même contre les forces les plus destructrices."
 SMALL_BIO_ARMOR_5: "Petite carapace de neutronium"
 MEDIUM_BIO_ARMOR_5: "$NEUTRONIUM_CARAPACE$ moyenne"
 LARGE_BIO_ARMOR_5: "Grande carapace de neutronium"
 tech_bio_dragon_armor: "$tech_dragon_armor$"
 DRAGON_BIO_ARMOR: "$DRACONIC_CARAPACE$"
 DRAGON_BIO_ARMOR_DESC: "Summum de l'évolution des blindages biologiques, cette carapace s'inspire des prédateurs suprêmes anciens. Sa structure multicouche combine matière organique régénératrice et bio-alliages quasiment indestructibles. Le blindage qui en résulte est aussi inflexible que les créatures qui l'ont inspiré."
 SMALL_DRAGON_BIO_ARMOR: "Petite carapace draconique"
 MEDIUM_DRAGON_BIO_ARMOR: "$DRAGON_BIO_ARMOR$ moyenne"
 LARGE_DRAGON_BIO_ARMOR: "Grande carapace draconique"
 tech_bio_archaeoarmor: "$tech_archaeoarmor$"
 BIO_ARCHAEO_ARMOR: "Carapace à impulsion"
 BIO_ARCHAEO_ARMOR_DESC: "Les couches ionisées à l'intérieur de la carapace créent une charge réactive qui disperse l'énergie de l'impact par répulsion magnétique et champs projetés."
 SMALL_BIO_ARCHAEO_ARMOR: "Petite carapace à impulsion"
 tt_SMALL_BIO_ARCHAEO_AP: "[GetArchaeoengineersEffectSmallBioArmor]"
 tt_SMALL_BIO_ARCHAEO: "Grâce à l'§Yarchéo-ingénierie§! :\n$t$$MOD_SHIP_SHIELD_HP_ADD$: §G+60§!\n\n$bio_ship_armor_regen_s_3_tt$"
 MEDIUM_BIO_ARCHAEO_ARMOR: "$BIO_ARCHAEO_ARMOR$ moyenne"
 tt_MEDIUM_BIO_ARCHAEO_AP: "[GetArchaeoengineersEffectMediumBioArmor]"
 tt_MEDIUM_BIO_ARCHAEO: "Grâce à l'§Yarchéo-ingénierie§! :\n$t$$MOD_SHIP_SHIELD_HP_ADD$: §G+150§!\n\n$bio_ship_armor_regen_m_3_tt$"
 LARGE_BIO_ARCHAEO_ARMOR: "Grande carapace à impulsion"
