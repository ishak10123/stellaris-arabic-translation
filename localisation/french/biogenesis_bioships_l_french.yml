 #Combat Computers
 BIO_COMBAT_COMPUTER_DEFAULT: "Instinct de combat"
 BIO_COMBAT_COMPUTER_DEFAULT_DESC: "Tous les vaisseaux biologiques ont un instinct de combat de base qui leur permet d'effectuer des manoeuvres d'évitement et des calculs de ciblage."
 BIO_COMBAT_COMPUTER_BASIC: "Implants neuronaux"
 BIO_COMBAT_COMPUTER_BASIC_DESC: "Ces implants intégrés dans les systèmes organiques du vaisseau permettent une prise de décision rapide et une coordination tactique précise. Ils fonctionnent comme un ordinateur de combat vivant, améliorant la perception et optimisant l'efficacité sur le champ de bataille."
 BIO_COMBAT_COMPUTER_ADVANCED: "Implants neuronaux avancés"
 BIO_COMBAT_COMPUTER_ADVANCED_DESC: "Évolution des implants neuronaux ordinaires, ils améliorent davantage l'analyse tactique et la vitesse de décision. Ils augmentent l'efficacité et la coordination, et permettent aux vaisseaux biologiques de réagir plus rapidement aux changements."
 BIO_COMBAT_COMPUTER_SAPIENT: "Implants neuronaux conscients"
 BIO_COMBAT_COMPUTER_SAPIENT_DESC: "Ces implants contiennent une intelligence bio-consciente capable de réfléchir stratégiquement de manière indépendante. En combinant l'instinct organique et la pensée artificielle, ils permettent aux vaisseaux de s'adapter à des situations de combat complexes et de prendre des décisions de façon presque autonome."
 BIO_COMBAT_COMPUTER_AUTONOMOUS: "Implants neuronaux autonomes"
 BIO_COMBAT_COMPUTER_AUTONOMOUS_DESC: "Ces systèmes fonctionnent de manière totalement autonome. Dotés d'une bio-intelligence consciente, ils confèrent aux vaisseaux la capacité d'analyser, d'élaborer des stratégies et de prendre des décisions sans intervention extérieure, ce qui permet d'atteindre une efficacité sans précédent."
 BIO_COMBAT_COMPUTER_PRECOG: "Instinct de combat précognitif"
 BIO_COMBAT_COMPUTER_PRECOG_DESC: "Ces implants exploitent le psionisme pour conférer aux vaisseaux biologiques une vision précognitive qui leur permet d'anticiper les actions des ennemis avant même qu'elles ne se produisent. Cette capacité quasi surnaturelle donne un avantage décisif aux flottes biologiques, qui peuvent réagir en une fraction de seconde aux menaces les plus complexes."
