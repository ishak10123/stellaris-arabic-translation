 ################################################
 BIOSHIP_GROWTH_PROGRESS: "$t$Avancée mensuelle : $VALUE$"
 BIOSHIP_GROWTH_STATUS: "§HAvancée de la phase de croissance§! $TABBED_NEW_LINE$$next_growth_stage_label$ $SHIP|Y$$TABBED_NEW_LINE$Avancée totale : $PROGRESS|*2Y$/$THRESHOLD|*2Y$ $TABBED_NEW_LINE$Avancée mensuelle : $MONTHLY$"
 TIME_TO_NEXT_GROWTH_STAGE: "$t$Temps jusqu'à la prochaine phase de croissance : $TIME|0Y$ mois£time£"
 MOD_BIOSHIP_GROWTH_PROGRESS_ADD: "Taux d'avancée de la croissance "
 MOD_BIOSHIP_GROWTH_PROGRESS_MULT: "Avancée mensuelle de la croissance "
 SECTION_INSTANCE_MASK: "§HRechercher la technologie $TECH|Y$ pour débloquer la phase $STAGE|Y$.§!"
 SECTION_INSTANCE_MASK_TOOLTIP: "$TRIGGER_FAIL$ La phase de croissance $SIZE|Y$ nécessite la technologie $TECH|Y$"
 ######################
 #Graphical Cultures #
 ######################
 BIOGENESIS_CAT: "BioGenesis"
 BIOGENESIS_01: "Spinovore"
 BIOGENESIS_02: "Carapaçeur"
 graphical_culture_tooltip_not_biological: "N'a PAS de modèle de ['concept_biological_ship',vaisseau biologique]"
 graphical_culture_tooltip_biological: "Doit avoir un de modèle de ['concept_biological_ship',vaisseau biologique]"
 concept_biological_ship: "$bio_ship$"
 concept_biological_ships: "$concept_biological_ship$"
 concept_biological_ship_desc: "- Les vaisseaux biologiques disposent de classes de combat spécialisées avec des rôles bien définis et trois phases de croissance. $NEW_LINE$- Leur construction coûte principalement de la £food£§Inourriture§! plutôt que des £alloys£§Ialliages§!. $NEW_LINE$- Leur maintenance coûte principalement de la £food£§Inourriture§! plutôt que de l'£energy£§Iénergie§!. $NEW_LINE$- Ils dépendent des technologies de §Y£society£biologie§! plutôt que de §Y£engineering£maîtrise du vide§!. $NEW_LINE$$h_line$§LCes vaisseaux vivants sont constitués d'énormes fibres musculaires ondulées, remplies d'organites bioluminescents. Ils émettent des composés riches en énergie pour produire des explosions de lumière et de chaleur qui les propulsent.§!"
 default_ship: "Vaisseaux mécaniques"
 bio_ship: "Vaisseaux biologiques"
 #Shipset Descriptions
 biogenesis_01_shipset_desc: "§HType de modèle de vaisseau : ['concept_biological_ship',biologique]§!\nCes vaisseaux militaires vivants, nés et construits, ont la majesté des grands prédateurs. Leur biomasse semi-consciente s'adapte, chasse et frappe avec une volonté implacable."
 biogenesis_02_shipset_desc: "§HType de modèle de vaisseau : ['concept_biological_ship',biologique]§!\nCes vaisseaux robustes ne servent aucun maître, ils endurent et grandissent aux côtés des explorateurs courageux qui les considèrent comme leur maison."
 humanoid_01_shipset_desc: "Ces vaisseaux robustes et déterminés ont été conçus pour relever les défis de l'espace. Pensés pour conquérir l'inconnu, ils portent les espoirs et les rêves de leurs créateurs jusqu'aux étoiles les plus lointaines."
 synthetics_01_shipset_desc: "Le design de ces vaisseaux symbolise la pureté et une volonté infatigable. Leur coque thermique disperse l'énergie des ordinateurs centraux surcadencés, de sorte que l'ensemble de l'organisme fonctionne avec une efficacité absolue."
 mammalian_01_shipset_desc: "Ces redoutables vaisseaux conçus pour durer reflètent l'endurance de leurs créateurs. Leur coque isolée protège l'intérieur, tandis que leurs systèmes redondants assurent leur fonctionnement même dans les circonstances les plus défavorables."
 reptilian_01_shipset_desc: "Ce modèle robuste et fonctionnel évoque la résilience d'un prédateur. Sa présence dans le vide témoigne de la ténacité et de l'impitoyabilité de ses créateurs."
 avian_01_shipset_desc: "Élégants et effilés, ces vaisseaux polyvalents incarnent la beauté. Chaque courbe et chaque contour sont le reflet d'une espèce qui considère l'espace non pas comme un obstacle, mais comme un prolongement du ciel."
 arthropoid_01_shipset_desc: "Chitine ou acier, esthétique ou praticité... Peu importe. Ces vaisseaux ne sont pas conçus pour inspirer, mais pour durer. Leur coque multicouche illustre parfaitement cette philosophie."
 molluscoid_01_shipset_desc: "Élégants et résistants, ces vaisseaux sont à la fois des boucliers et des lances. Sous leur coque robuste se cachent des systèmes complexes qui régulent silencieusement et efficacement les flux d'énergie et de nutriments."
 fungoid_01_shipset_desc: "Ces vaisseaux bulbeux rappellent la beauté des champignons. Leurs systèmes spécialisés sont conçus pour être autosuffisants et forment des réseaux internes complexes qui imitent l'organisation du mycélium."
 plantoid_01_shipset_desc: "Ces vaisseaux verdoyants ne se contentent pas de parcourir les étoiles, ils s'y enracinent. Les nacelles photosynthétiques maintiennent l'équilibre et créent un biome stable à bord."
 lithoid_01_shipset_desc: "Ces vaisseaux à l'aspect rocheux, forgés par le temps et la pression, incarnent la durabilité. Les matrices de cristaux de silicium renforcent les systèmes centraux et tirent leur énergie des mêmes forces qui façonnent les mondes."
 necroid_01_shipset_desc: "Ces cathédrales volantes, sombres et menaçantes, représentent la mort et la renaissance. Leurs noyaux entropiques et leur conception rituelle témoignent de la puissance du vide et de l'ambition éternelle de leurs créateurs."
 nemesis_01_shipset_desc: "Ces vaisseaux imposants symbolisent l'autorité. Leurs superstructures renforcées et leurs systèmes redondants dégagent une aura de domination absolue."
 aquatic_01_shipset_desc: "Ces vaisseaux à la fois gracieux et turgescents véhiculent la puissance des océans. Leur intérieur aquatique et leurs contours hydrodynamiques incarnent la grâce de leurs créateurs."
 toxoid_01_shipset_desc: "Ces vaisseaux rejettent de la fumée, émettent des bruits menaçants et enfreignent toutes les règles, mais ils fonctionnent quand même. Alimentés par les déchets et assemblés par une ingéniosité inflexible, ils tiennent bon là où d'autres défaillent."
 cybernetics_01_shipset_desc: "Là où le chrome brille et les circuits bourdonnent, les réflexes n'ont pas leur place. Les connexions neurales directes éliminent les ralentissements et les limites pour une précision pure et absolue."
