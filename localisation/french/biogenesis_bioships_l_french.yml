 TECH_UNLOCK_BIOSHIP_SENSOR_2_DESC: "§H$BIOSHIP_SENSOR_2$§!\n$BIOSHIP_SENSOR_2_DESC$"
 BIOSHIP_SENSOR_3: "Capteurs subspatiaux"
 BIOSHIP_SENSOR_3_DESC: "Des organes sensoriels qui détectent les fluctuations subspatiales laissées dans le sillage des vaisseaux stellaires. Leur sensibilité et leur portée sont bien supérieures à celles de tous les autres organes sensoriels de navigation spatiale."
 TECH_UNLOCK_BIOSHIP_SENSOR_3_TITLE: "§HPermet le composant§! $BIOSHIP_SENSOR_3$"
 TECH_UNLOCK_BIOSHIP_SENSOR_3_DESC: "§H$BIOSHIP_SENSOR_3$§!\n$BIOSHIP_SENSOR_3_DESC$"
 BIOSHIP_SENSOR_4: "Capteurs tachyoniques"
 BIOSHIP_SENSOR_4_DESC: "Des organes sensoriels utilisant des rayons de tachyons en rotation pour détecter les mouvements de vaisseaux à des distances extrêmement éloignées."
