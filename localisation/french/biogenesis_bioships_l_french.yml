 BIO_ZERO_POINT_REACTOR: "Métabolisme point zéro"
 BIO_ZERO_POINT_REACTOR_DESC: "$ZERO_POINT_REACTOR_DESC$"
 tech_bio_dark_matter_power_core: "$BIO_DARK_MATTER_REACTOR$"
 BIO_DARK_MATTER_REACTOR: "Métabolisme à matière noire"
 BIO_DARK_MATTER_REACTOR_DESC: "Le tube digestif de nos vaisseaux biologiques est recouvert d'une substance mystérieuse qui extrait l'énergie directement de la matière noire, violant ainsi toutes les lois connues de la physique."
