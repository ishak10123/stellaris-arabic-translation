 ENTROPY_WORMHOLE: "$NATURAL_WORMHOLE_GALACTIC$"
 BYPASS_ENTROPY_WORMHOLE: "$ENTROPY_WORMHOLE_GALACTIC$"
 BYPASS_DESC_UNKNOWN_ENTROPY_WORMHOLE: "Nous n'avons jusqu'à présent jamais rencontré ce type de formation"
 ENTROPY_WORMHOLE_GALACTIC: "Trou de ver étrange"
 ENTROPY_WORMHOLE_DESC: "Ce système contient un §Ytrou de ver§! relié à $DEST|Y$."
 ENTROPY_WORMHOLE_DESC_UNEXPLORED: "Ce système contient un §Ytrou de ver§! encore §Rinexploré§!."
 ENTRY_BYPASS_ENTROPY_WORMHOLE: "$BYPASS_TYPE$"
 EXIT_BYPASS_ENTROPY_WORMHOLE: "$BYPASS_TYPE$ : sortie"
 personality_hyperthermia_empire: "Thermarchie"
 personality_hyperthermia_empire_desc: "Cet empire poursuit une idéologie qui glorifie l'énergie, l'entropie et le feu stellaire. Il ne conquiert pas, il cautérise et façonne la galaxie par la chaleur et la force de volonté."
 triggered_opinion_hyperthermia_empire: "Empire thermarchique"
 mod_job_metallurgist_naval_cap_add: "£mod_country_naval_cap_add£Capacité navale par les £job_foundry£[GetAlloyProducerPlural_lower] "
 crisis_thermophile_adaptation: "Adaptation thermophile"
 crisis_thermophile_adaptation_desc: ""
 crisis_conduit_stop: "$mod_conduit_spawnrate_switch$" # modifier is hidden
 crisis_conduit_stop_desc: ""
 sm_gravitational_centrifuge: "Centrifugeuse à gravité"
 sm_gravitational_centrifuge_desc: "Cette structure utilise la gravité pour broyer les déchets au niveau moléculaire et créer un plasma entropique pouvant être cristallisé en vue d'une utilisation ultérieure."
 gravitational_centrifuge_tt: "Termine l'objectif de crise §H$crisobj_entropy_starbase_name$§!"
 requires_multiple_stars_or_or_bh: "§RNécessite un système §Ybinaire§! ou §Ytrinaire§!, ou un §Ytrou noir§!.§!"
 # Conduit Starforming
 crisis_conduit_buff: "Supervision stellaire"
 crisis_conduit_buff_desc: "L'atmosphère de l'étoile locale subit une transformation rapide, provoquant des éruptions solaires à l'échelle du système. Pour certaines civilisations, cela risque d'être désastreux, mais nous pouvons parfaitement prospérer."
 TERRAFORM_ORDER: "Transformer l'étoile"
 TERRAFORM_ORDER_DESC: "L'étoile cible sera progressivement transformée en §Ygéante rouge de classe M§!."
 TERRAFORM_ORDER_RESEARCH: "Grâce au potentiel énergétique de l'entropie cristallisée, les étoiles plus petites peuvent être transformées en puissantes géantes rouges."
 FLEETORDER_TERRAFORM_BUTTON: "$TERRAFORM_ORDER$"
 FLEETORDER_TERRAFORM: "Façonnage stellaire de $PLANET|Y$ ($PROGRESS|Y%0$)"
 FLEETORDER_BOOST_STAR: "Enflammer l'étoile"
 CAN_NOT_TERRAFORM_STAR: "$TRIGGER_FAIL$Seule une étoile primaire peut être ciblée."
 CAN_NOT_CRISIS_TERRAFORM_STAR_CLASS: "$TRIGGER_FAIL$La classe de l'étoile n'est pas valide pour la transformation."
 CAN_NOT_CRISIS_TERRAFORM_STAR_MEGASTRUCTURE: "$TRIGGER_FAIL$La mégastructure en orbite empêche la transformation."
 VALID_TERRAFORM_STAR: "Cette étoile peut être terraformée."
 STATION_CAN_NOT_TERRAFORM_STAR: "Il doit y avoir une station de conduits en orbite."
 # Objectives
 crisobj_own_volcanics_name: "Posséder des mondes volcaniques"
 crisobj_own_volcanics_desc: "La chaleur toujours croissante dans le système alimente le volcanisme et fait avancer notre mission ardente. Nous devrions donner la priorité à la colonisation de §Ymondes volcaniques§! afin d'avoir une longueur d'avance.\n\nGénère de l'§Yentropie cristallisée§! passivement chaque année, en fonction du nombre de §Ymondes volcaniques§! colonisés."
 crisobj_create_volcanics_name: "Créer des mondes volcaniques"
 crisobj_create_volcanics_desc: "La propagation du volcanisme planétaire dans la galaxie stimulera notre économie basée sur les cristaux d'entropie. Grâce aux technologies de terraformation appropriées, nous pouvons déclencher une activité volcanique durable sur n'importe quel monde.\n\nTerraformez une planète en §Ymonde volcanique§!."
 crisobj_own_red_stars_name: "Posséder des étoiles rouges"
 crisobj_own_red_stars_desc: "Nous devrions nous concentrer sur la colonisation de systèmes comprenant des étoiles rouges. Leur surface gigantesque est idéale pour la production d'énergie thermique.\n\nGénère de l'§Yentropie cristallisée§! passivement chaque mois, en fonction du nombre d'§Yétoiles de classe M§! et de §Ygéantes rouges de classe M§! dans notre espace."
 crisobj_create_red_stars_name: "Créer des étoiles rouges"
 crisobj_create_red_stars_desc: "Grâce aux cristaux d'entropie, nous pouvons faire grandir les étoiles jusqu'à ce qu'elles deviennent des géantes rouges, propulsant ainsi l'essor de notre nouvel empire ardent.\n\nLes étoiles terraformées par les §Yconduits§! deviennent des §Ygéantes rouges de classe M§!."
 crisobj_planet_firestorm_name: "Incendier une planète"
 crisobj_planet_firestorm_desc: "Il est temps d'enseigner à nos rivaux le sens même de la suprématie et de déchaîner une tempête de feu qui réduira leur monde en cendres.\n\nBombardez une colonie avec une §Ytempête de feu§! pour causer §R100% de dévastation§!."
 crisobj_lens_beam_impact_name: "Utiliser des vaisseaux perturbateurs"
 crisobj_lens_beam_impact_desc: "Les mondes froids et tempérés ne nous sont d'aucune utilité. Nous devons modifier leur surface pour l'adapter à nos besoins.\n\nUtilisez le £ship_xl_slot£§Yparalyseur à lentille§!, pouvant être équipé sur les §Yconduits§! et les §Ycuirassés incandescents§!, pour bombarder les mondes ennemis."
 crisobj_entropy_starbase_name: "Posséder des centrifugeuses à gravité"
 crisobj_entropy_starbase_desc: "Les centrifugeuses à gravité nous aident à collecter davantage d'entropie cristallisée.\n\nConstruisez le bâtiment de base stellaire §Y$sm_gravitational_centrifuge$§! dans un système §Ybinaire§! ou §Ytrinaire§!, ou dans un §Ytrou noir§!."
