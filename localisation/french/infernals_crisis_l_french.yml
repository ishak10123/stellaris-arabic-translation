 mod_conduit_spawnrate_add: "£time£Temps de construction des conduits "
 mod_conduit_spawnrate_switch: "Construction de conduits : §Rdésactivée§!"
 mod_conduit_spawnrate_switch_short: "§RDésactive la construction de conduits§!"
 mod_shipsize_ember_cruiser_speed_mult: "$MOD_SHIP_SPEED_MULT$(croiseurs incandescents) "
