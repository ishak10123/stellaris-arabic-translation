 # Weapon
 LENS_FLARE_BEAM: "Paralyseur à lentille"
 LENS_FLARE_BEAM_DESC: "Le rayon de cette arme a été calibré pour perturber les systèmes de contrôle critiques et créer une fenêtre d'opportunité limitée pour les attaques."
 lfb_on_hit_stun_tt: "§YNeutralise§! la cible pendant §G7§! jours, l'empêchant de se déplacer ou de riposter."
 lf_weapon_stun_effect: "§RImpact du paralyseur à lentille§!"
 lf_weapon_stun_effect_desc: "   " # not visible
 # Megastructure
 galactic_crucible_0: "Structure de creuset galactique"
 galactic_crucible_0_DESC: "La structure de base d'un creuset galactique. Elle sert de support à la construction du reste de la station."
 galactic_crucible_0_MEGASTRUCTURE_DETAILS: "Cette immense station aspire l'énergie de son étoile mère pour alimenter des chantiers spatiaux automatisés qui produisent des §Yconduits§!, des vaisseaux capables de refaçonner le destin de galaxies entières."
 galactic_crucible_1: "Châssis de creuset galactique"
 galactic_crucible_1_DESC: "L'infrastructure centrale du creuset galactique est désormais achevée, en faisant une station opérationnelle. La construction des systèmes de cristallisation entropique est déjà en cours."
 galactic_crucible_2: "Noyau de creuset galactique"
 galactic_crucible_2_DESC: "Le creuset galactique est désormais pleinement opérationnel et prêt à étendre le déploiement d'§Yentropie cristallisée§!. Toutes les améliorations futures dépendront de cette base.\n\n§HTerminez le projet spécial pour débloquer la phase suivante.§!"
 galactic_crucible_3: "Centre de creuset galactique"
 galactic_crucible_3_DESC: "Le creuset galactique a été amélioré avec des systèmes entropiques modulaires qui permettent une reconfiguration fluide et une croissance continue. Les techniciens peuvent augmenter ses capacités tout en réduisant les inefficacités."
 galactic_crucible_4: "Creuset galactique"
 galactic_crucible_4_DESC: "Le creuset galactique est entièrement armé et prêt à purifier la galaxie par le feu. Les systèmes entropiques fonctionnent à leur efficacité théorique maximale."
 galactic_crucible_5: "Institut de creuset galactique"
 galactic_crucible_5_DESC: "Le creuset galactique a été irrévocablement modifié afin d'empêcher toute libération d'énergie désastreuse. Il sert désormais de source stable et sûre de prospérité pour l'empire."
 galactic_crucible_ruined: "$galactic_crucible_4$ en ruine"
 galactic_crucible_ruined_DESC: "Un chantier spatial détruit qui servait autrefois les ambitions ardentes d'un empire déchu."
 galactic_crucible_ruined_MEGASTRUCTURE_DETAILS: "Cette immense ruine dégage encore une chaleur intense, pulsant à travers les débris."
 SPAWN_CONDUITS: "$entropy_conduit_plural$"
 SPAWN_CONDUITS_DESC: "Le creuset galactique construit automatiquement des conduits. Ceux-ci se dirigent ensuite vers les étoiles pouvant être transformées en §Ygéantes rouges de classe M§!."
 megastructure_overclocking_desc: "Grâce à un surcadençage stratégique, cette mégastructure peut dépasser ses limites et déclencher des effets uniques."
 overclock_mode: "Mode :"
 overclock_gc_default: "$overclock_mode$ §Hpar défaut§!"
 overclock_gc_default_desc: "Produit une quantité constante et modérée d'entropie cristallisée.\n"
 overclock_gc_high: "$overclock_mode$ §Hsurcharge§!"
 overclock_gc_high_desc: "Utilise des réserves d'énergie considérables pour accélérer la construction de conduits.\n"
 overclock_gc_eco: "$overclock_mode$ §Hproduction§!"
 overclock_gc_eco_desc: "Une utilisation importante d'alliages permet d'augmenter considérablement la production d'entropie cristallisée.\n"
 overclock_gc_war: "$overclock_mode$ §Hcentre de coordination§!"
 overclock_gc_war_desc: "Le creuset galactique peut fournir de l'énergie aux vaisseaux à proximité, ce qui améliore notamment la puissance de combat des flottes de défense.\n"
 # Event Chain
 galactic_hyperthermia_chain_title: "$ap_galactic_hyperthermia$"
 galactic_hyperthermia_chain_desc: "Nous avons décidé que notre avenir réside dans les flammes et envisageons d'embraser toute la galaxie."
 # Special Projects
 INF_CRISIS_ENTROPY: "Nouvelle source d'énergie"
 INF_CRISIS_ENTROPY_DESC: "Le feu a toujours eu un rôle prépondérant dans notre société, mais aujourd'hui, nous pourrions apprendre à dompter sa force chaotique d'une façon inédite. Il pourrait s'agir précisément de ce dont la science rêve depuis longtemps : une source d'énergie capable d'alimenter toute notre civilisation et de nous propulser vers les étoiles.\n\n§HConséquence :§! débloque la nouvelle ressource £entropy_crystals£§Y$entropy_crystals$§!."
 INF_CRISIS_ENTROPY_EVIL: "Tempête de feu artificielle"
 INF_CRISIS_ENTROPY_EVIL_DESC: "Le creuset a montré une nouvelle voie à notre espèce, et il serait insensé de ne pas l'emprunter. Il est temps de façonner la galaxie à notre image et de brûler tous ceux qui rejettent notre vision.\n\n§HConséquence :§!\n- Débloque l'amélioration du §Ycreuset galactique§! suivante.\n- Les §Yconduits§! peuvent désormais transformer des étoiles en territoire ennemi.\n\n" # Crystallized Entropy is used to its full potential
 INF_CRISIS_ENTROPY_GOOD: "Corrélation inattendue"
 INF_CRISIS_ENTROPY_GOOD_DESC: "La puissance de notre creuset est aussi immense qu'instable. En limitant durablement ses capacités, nous nous assurerons une source de prospérité stable sans mettre en danger la galaxie ni compromettre la bienveillance de nos voisins." # Crystallized Entropy can be used for the economy
 # Countdown Situation
 situation_galactic_hyperthermia_timer: "Mobilisation"
 situation_galactic_hyperthermia_timer_type: "$situation_galactic_hyperthermia_timer$"
 situation_galactic_hyperthermia_timer_desc: "Grâce à notre maîtrise de l'§Yentropie cristallisée§!, nous serons bientôt en mesure de transformer la galaxie selon nos désirs. Nous avons ouvert des trous de ver vers six systèmes autour du coeur de la galaxie.\nEn envoyant des §Yconduits§! dans chacun d'eux et en les protégeant de tous ceux qui oseraient contrecarrer nos plans, nous pourrons embraser la galaxie."
 situation_galactic_hyperthermia_timer_monthly_change_tooltip: "La quantité actuelle d'entropie émise vers le coeur de la galaxie. Une fois à son apogée, la galaxie brûlera."
 situation_gh_timer_outcome: "Nos services de renseignement indiquent que plusieurs empires pourraient être en train de se préparer à entrer en guerre afin de contrecarrer nos plans. Si nous les affrontons sans préparation, notre projet échouera avant même d'avoir commencé."
 situation_gh_approach_timer: "Affronter les conséquences"
 situation_gh_approach_timer_tt: "L'heure est venue de plonger la galaxie dans une guerre aux proportions épiques !"
 situation_gh_difficulty_progress: "Difficulté"
 situation_gh_opponent_progress: "§G-0.1§! par empire s'opposant à nous"
 # Crisis Situation
 situation_galactic_hyperthermia: "Tempête de feu galactique"
 situation_galactic_hyperthermia_type: "$situation_galactic_hyperthermia$"
 situation_galactic_hyperthermia_monthly_change_tooltip: "La vitesse à laquelle la galaxie approche de son embrasement total."
 situation_hyperthermia_desc_perp: "§LNous aspirons à une utopie de flammes, mais pour la créer, nous devons brûler tout ce qui se trouve sur notre chemin. Nous avons fait jaillir les premières étincelles et devons désormais propager les flammes dans tous les coins de la galaxie.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_desc: "§LLa §Y[event_target:hyperthermia_empire.GetName]§! a mis le feu aux étoiles. Il nous revient de lutter contre le plus grand incendie que la galaxie ait jamais connu. Nous n'aurons pas de seconde chance. Si nous échouons, tout ce que nous avons accompli sera réduit en cendres.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_stats: "§HSystèmes centraux conquis :§! [event_target:hyperthermia_empire.gh_crisis_core_var]"
 situation_galactic_hyperthermia_outcome: "[GetHyperthermiaOutcome]"
 situation_gh_outcome_perp: "Si nous réussissons, une pluie de feu dévorera la galaxie et seuls ceux qui auront pleinement accepté la chaleur subsisteront au milieu des cendres. Même les étoiles ne seront pas épargnées. Après des milliards d'années, nous les refaçonnerons à l'image de notre étoile mère."
 situation_gh_outcome_other: "Si la §Y[hyperthermia_empire.GetName]§! réussit, toute la galaxie sera réduite en cendres et seules les formes de vie thermophiles survivront."
 situation_galactic_hyperthermia_progress: "Le nombre de systèmes situés au coeur de la galaxie occupés par des §Yconduits§! détermine l'avancée mensuelle.\n$TABBED_NEW_LINE$- Moins de §Y3§! systèmes : §R-3§! $TABBED_NEW_LINE$- §Y3§! systèmes occupés : §Y0§! $TABBED_NEW_LINE$- Plus de §Y3§! systèmes : §G+3§! \n\nAvancée actuelle"
 situation_galactic_hyperthermia_stage1: "Minimum atteint ($stage_1$)"
 situation_gh_approach_perp: "Attiser les flammes"
 situation_gh_approach_perp_tt: "C'est le moment ou jamais. Nous devons réussir ou nous perdrons tout ce que nous avons accompli."
 situation_gh_approach_other: "Éteindre le feu"
 situation_gh_approach_other_tt: "Cet empire représente une menace existentielle pour la stabilité galactique. Le combattre n'est pas une option, mais une nécessité."
 # Events
 # NOTE: Remove most #comments below after texts are done
 infernals.1000.name: "Nouvelle source d'énergie"
 infernals.1000.desc: "[GetHyperthermiaIntroIfRedGiant]"
 infernals.1000.descNormal: "Nos [GetScientistPlural] ont fait état d'une nouvelle méthode permettant de récolter et de stocker l'entropie en la captant dans une matrice cristalline à haute énergie. Cette §Yentropie cristallisée§! peut stocker une quantité considérable d'énergie thermique, est facile à transporter et peut être utilisée aussi bien dans l'industrie, l'économie ou les opérations interstellaires.\n\nLes premières simulations suggèrent que nous pouvons l'utiliser pour terraformer des planètes en mondes plus chauds, voire accélérer l'évolution des étoiles en géantes rouges. En principe, l'entropie dispersée un peu partout dans la galaxie pourrait être récupérée et convertie en chaleur utilisable, ce qui entraînerait une expansion thermique accrue à l'échelle galactique.\n\n§HLance le projet spécial§! §Y$INF_CRISIS_ENTROPY$§!"
 infernals.1000.descRedGiant: "Nos [GetScientistPlural] ont analysé l'§Yentropie cristallisée§! utilisée pour enflammer la géante rouge qui a failli anéantir notre civilisation. Nous sommes désormais en mesure de modifier cette substance volatile afin de capter et de transporter de grandes quantités d'énergie thermique pouvant être utilisées à des fins industrielles, économiques et stellaires.\n\nLes premières simulations indiquent que cela pourrait permettre la terraformation de planètes en mondes plus chauds ou le déclenchement de l'évolution des étoiles en géantes rouges. En théorie, l'entropie présente un peu partout dans la galaxie pourrait être récupérée et convertie en chaleur, ce qui entraînerait une expansion thermique systémique.\n\n§HLance le projet spécial§! §Y$INF_CRISIS_ENTROPY$§!" # Intro if you've learned about entropy from the Red Giant Miners
 infernals.1005.name: "Cristallisation réussie"
 infernals.1005.desc1: "Nous avons mis au point la première infrastructure fonctionnelle qui collecte l'énergie et la transforme en §Yentropie cristallisée§!. Ces cristaux peuvent contenir une grande quantité d'énergie thermique et nous permettent de stocker et de transporter l'énergie de façon beaucoup plus efficace qu'avec les méthodes traditionnelles.\n\nLes géantes rouges sont idéales pour ce processus en raison de leurs grandes surfaces d'émission et de leur puissance thermique. Nous sommes désormais prêts à utiliser cette technologie dans chacun de nos systèmes.\n\nNos techniciens ont également commencé à adapter le processus à un usage industriel et expérimentent des moyens de synthétiser l'entropie cristallisée en utilisant l'entropie ambiante. Avec l'émergence de cette activité, nous serons bientôt l'empire le plus riche et le plus puissant. Nos [GetScientistPlural] recherchent déjà des moyens d'augmenter davantage la production.\n\n§HPermet la mégastructure§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.desc2: "Grâce à nos échantillons d'§Yentropie cristallisée§!, nous sommes en mesure d'en synthétiser de nouveaux sans mettre en danger notre étoile mère. Ces cristaux peuvent contenir une grande quantité d'énergie thermique et nous permettent de stocker et de transporter l'énergie de façon beaucoup plus efficace qu'avec les méthodes traditionnelles.\n\nLes géantes rouges sont idéales pour ce processus en raison de leurs grandes surfaces d'émission et de leur puissance thermique. Nous sommes désormais prêts à utiliser cette technologie dans chacun de nos systèmes.\n\nNos techniciens ont également commencé à adapter le processus à un usage industriel et expérimentent des moyens de synthétiser l'entropie cristallisée en utilisant l'entropie ambiante. Avec l'émergence de cette activité, nous serons bientôt l'empire le plus riche et le plus puissant. Nos [GetScientistPlural] recherchent déjà des moyens d'augmenter davantage la production.\n\n§HPermet la mégastructure§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.a: "Nous devons lancer sa construction"
 infernals.1005.a.tt: "Utilisez un vaisseau de construction pour construire la §Ystructure de creuset galactique§! autour d'une étoile."
 infernals.1005.b: "Ordonnons aux drones de lancer sa construction"
 infernals.1005.b.tt: "Utilisez un vaisseau de construction pour construire la §Ystructure de creuset galactique§! autour d'une étoile."
 infernals.1006.name: "Évolution thermophile"
 infernals.1006.desc: "Alors que nous embrasons la galaxie, nous devons également préparer nos propres formes à résister à la chaleur. L'adaptation de notre population à des températures plus élevées nous aidera à prospérer au milieu des flammes de notre nouvel avenir."
 infernals.1006.descRedGiant: "Tout en travaillant sans relâche pour inverser les changements que connaît notre étoile, nous devons également préparer nos propres formes à résister à la chaleur. L'adaptation de notre population à des températures plus élevées nous aidera à prospérer au milieu des flammes de notre nouvel avenir."
 infernals.1010.name: "Déploiement des conduits"
 infernals.1010.desc: "Le châssis de creuset galactique est prêt à envoyer les premiers §Yconduits§! qui canaliseront et amplifieront l'entropie stellaire. Une fois déployés, ils recycleront et intensifieront la production d'énergie d'une étoile, la transformant en géante rouge et réchauffant tout le système afin de le préparer à l'expansion de notre infrastructure.\n\nCes §Yconduits§! sont fabriqués à intervalles réguliers et totalement autonomes, ce qui nous facilite bien la tâche. Pour l'instant, ils restent sur notre territoire, mais avec le temps, nous pourrons les envoyer dans toute la galaxie. Après tout, notre empire ne cesse de s'étendre.\n\n§HAmélioration de mégastructure disponible :§! §Y$galactic_crucible_2$§!" # Reaching lv2
 infernals.1010.a: "La production d'entropie cristallisée va s'accélérer"
 infernals.1010.b: "Nous devons conquérir davantage d'étoiles"
 infernals.1015.name: "Quelle sera la température maximale ?"
 infernals.1015.desc: "Nos recherches continues sur l'§Yentropie cristallisée§! ont révélé une possibilité fascinante : à forte concentration, elle peut alimenter des armes d'une taille inouïe, capables de détruire des planètes entières. Avec un tel pouvoir, la galaxie serait à notre merci.\n\nToutefois, explorer ces applications militaires anéantirait le peu de confiance que nos voisins nous portent. Et qui dit que ces armes ne seront pas un jour utilisées contre nous ?\n\nLes vaines promesses de paix ne suffiront pas. Si nous voulons prouver nos bonnes intentions, nous devons modifier notre noyau de creuset galactique afin qu'il ne puisse jamais produire de telles armes. Sinon, ce n'est qu'une question de temps avant que cette technologie ne soit utilisée comme arme, que ce soit par nous ou par quelqu'un d'autre.\n\n§HCette décision débloque un projet spécial§!" # Reaching lv3 & decision
 infernals.1015.a: "Attisons les flammes de la guerre !" # evil path
 infernals.1015.a.desc: "Débloque le niveau de crise $crisis_hyperthermia_level_4$.\n" #\n\n§HIssues Special Project:§! §Y$INF_CRISIS_ENTROPY_EVIL$§!
 infernals.1015.b: "Modérons nos ambitions" # good path
 infernals.1015.b.desc: "Bloque l'accès au niveau de crise $crisis_hyperthermia_level_4$. \n\n§HLance le projet spécial§! §Y$INF_CRISIS_ENTROPY_GOOD$§! pour transformer le §Ynoyau de creuset galactique§! en §Yinstitut de creuset galactique§!."
 infernals.1020.name: "Au coeur des flammes"
 infernals.1020.desc: "Nos recherches sur l'§Yentropie cristallisée§! et le §Yprojet $INF_CRISIS_ENTROPY_EVIL$§! ont confirmé ce que nous soupçonnions déjà : le potentiel de construction d'armes dévastatrices est bien réel. Avec un tel pouvoir, nous n'aurons plus jamais à faire preuve de retenue pour des raisons diplomatiques.\n\nCela accélérera l'expansion du centre de creuset galactique, en mettant l'accent sur un domaine d'application plutôt... agressif. Plus tôt nous serons en possession de ces armes, moins l'opinion de la galaxie aura d'importance pour nous.\n\n§HAmélioration de mégastructure disponible :§! §Y$galactic_crucible_4$§!" # Finishing special project for evil path
 infernals.1020.a: "Nous devons nous préparer pour la guerre"
 infernals.1020.a.tt: "- L'expansion du §Ycreuset galactique§! doit être une priorité absolue.\n- $unlocks_conduit_damage$"
 infernals.1020.b: "Nos rivaux serviront d'allume-feu"
 infernals.1020.b.tt: "- L'expansion du §Ycreuset galactique§! doit être une priorité absolue.\n- $unlocks_conduit_damage$"
 infernals.1021.name: "Une lueur constante"
 infernals.1021.desc: "Le centre de creuset galactique a été irrévocablement modifié afin qu'il ne puisse plus être agrandi ou détourné à des fins destructrices. La perte de son plein potentiel est certes regrettable, mais la poursuite de cette voie aurait entraîné une catastrophe et la rupture de toutes nos relations diplomatiques.\n\nPar chance, même sous sa forme limitée, l'institut de creuset galactique est une source d'énergie extrêmement puissante qui assurera notre prospérité. Nous avons reculé afin de ne franchir aucune limite et nous sommes ainsi assurés un avenir dans lequel nous pourrons coopérer avec la Communauté galactique tout en continuant à bénéficier de cette technologie remarquable.\n\n§HAmélioration de mégastructure disponible :§! §Y$galactic_crucible_5$§!" # Finishing special project for good path
 infernals.1021.a: "La coopération profite à tous"
 infernals.1021.b: "L'harmonie apporte la prospérité"
 infernals.1025.name: "Encerclement du coeur"
 infernals.1025.desc: "Nos recherches continues sur les §Yconduits§! et la transformation des étoiles en géantes rouges indiquent que nous pourrions surchauffer le coeur de la galaxie pour déclencher une cascade thermique qui s'étendrait à toute la galaxie et la rendrait beaucoup plus habitable pour nous.\n\nNous avons identifié six systèmes entourant le coeur qui pourraient servir de points d'ancrage pour cette opération. Ces systèmes se trouvent en dehors du réseau des hyperlignes, mais nous pouvons créer des trous de ver stables pour y accéder." # Reaching lv4
 infernals.1025.a: "Nous sommes les seuls à pouvoir survivre aux flammes"
 infernals.1025.a.tt: "D'autres espèces tenteront de nous arrêter. Nous devons nous préparer à une guerre galactique."
 infernals.1025.b: "Toute la galaxie flamboiera en harmonie"
 infernals.1025.b.tt: "D'autres espèces tenteront de nous arrêter. Nous devons nous préparer à une guerre galactique."
 infernals.1030.name: "Course à l'inflammation"
 infernals.1030.desc: "Le creuset galactique est désormais entièrement armé et prêt à l'emploi. Avec la mise en place des trous de ver, nous nous sommes assurés l'accès aux six systèmes autour du coeur de la galaxie.\n\nNous pouvons désormais commencer à le surchauffer. D'autres empires pourraient découvrir nos agissements et tenter de pénétrer eux aussi dans ces systèmes, mais pour l'instant, nous sommes en position de force et le coeur se plie à notre volonté.\n\n§HUtilisez le trou de ver pour assurer l'accès aux systèmes du coeur de la galaxie.§!" # Reaching lv5, lanes open in 3 years!
 infernals.1030.a: "Commençons à nous installer dans les systèmes centraux"
 infernals.1030.a.tt: "Le déploiement de §Yconduits§! dans les six systèmes du coeur de la galaxie nous permettra de surchauffer toute la galaxie d'un coup. Nous devons lancer les préparatifs."
 infernals.1030.b: "Notre avenir s'annonce flamboyant"
 infernals.1030.b.tt: "$infernals.1030.a.tt$"
 infernals.1035.name: "Alerte incendie galactique"
 infernals.1035.desc: "Nos rivaux ont ouvert de force des hyperlignes vers les six systèmes proches du coeur de la galaxie. Tandis que nous continuons à surchauffer ce dernier, il nous faut nous préparer à leur arrivée.\n\nNous ne les laisserons pas nous arrêter. L'obscurité glaciale de l'espace disparaîtra et laissera place à la lumière éclatante de notre avenir prometteur."
 # core is now connected with the galaxy!
 infernals.1035.a: "Jamais ils ne nous arrêteront"
 infernals.1035.b: "Qu'ils se jettent eux-mêmes dans notre feu dévorant"
 infernals.1040.name: "Tempête en approche"
 infernals.1040.desc: "La coeur de la galaxie se réchauffe de plus en plus. Les niveaux d'entropie autour du gigantesque trou noir ont augmenté de manière exponentielle et émettent des ondes de rayonnement thermique vers les systèmes voisins.\n\nPeu après le début de la panique, une équipe de scientifiques courageux issus de différents mondes a découvert de nouvelles hyperlignes menant aux six systèmes entourant le coeur. La §Y[hyperthermia_empire.GetName]§! semble y avoir construit des installations qui surchauffent le coeur. Cette manipulation imprudente menace de déclencher une tempête de feu en cascade à travers la galaxie, qui brûlera tous ceux qui ne parviendront pas à mettre fin à leurs ambitions pyromanes.\n\nSi nous voulons survivre, nous devons pénétrer dans ces systèmes et leur arracher le contrôle. Nous sommes en crise, et la température ne cesse d'augmenter." # other empires learn about the core, forming a coalition war
 infernals.1040.a: "Nous devons y mettre un terme" # generic reply (declares war)
 infernals.1040.a.tt: "§LUne crise d'une ampleur sans précédent menace d'engloutir la galaxie. Seule la puissance combinée d'une nouvelle alliance galactique peut nous sauver.§!\n\nTous les empires s'opposant à la crise formeront une §Ycoalition§!, ce qui déclenchera un conflit à l'échelle galactique. Nous §Rdéclarerons la guerre§! à la §Y[hyperthermia_empire.GetName]§!."
 infernals.1040.b: "Brûlez, bande de mauviettes !" # Genocidals reply
 infernals.1040.b.tt: "§LEn temps de crise, c'est chacun pour soi. Nous sommes suffisamment forts pour résoudre le problème par nos propres moyens.§!"
 infernals.1040.c: "Mais ils sont comme nous !" # Infernals reply
 infernals.1040.c.tt: "§LLes méthodes de la §Y[hyperthermia_empire.GetName]§! correspondent à notre propre vision d'une nouvelle galaxie. Peut-être serons-nous épargnés par ce que d'autres considéreraient comme une catastrophe.§!"
 infernals.1040.d: "Ce n'est pas notre problème" # neutral reply
 infernals.1040.d.tt: "§LCe n'est pas la première fois qu'un empire joue avec le feu. Comme toute chose, cette crise passera. Il n'y a aucune raison de s'en mêler.§!"
 infernals.1042.name: "Escalade : §Rdéclaration de la crise§!"
 infernals.1042.desc: "Historiquement, les changements les plus importants ont toujours exigé des sacrifices. Pourtant, la Communauté galactique considère notre oeuvre comme une menace et non comme une nécessité. En réponse à cela, une coalition militaire unifiée s'est mobilisée contre nous.\n\nLeur intention étant l'extermination, nous n'avons pas d'autre choix : toute approche du coeur de la galaxie ou de notre creuset galactique sera contrée par une puissance de feu écrasante.\n\nNotre vision a enflammé les étoiles elles-mêmes. Que ceux qui s'y opposent périssent dans la tempête que nous avons provoquée !\n\n§HDéfendez les systèmes centraux et la victoire sera nôtre !§!"
 infernals.1042.a: "L'issue est inévitable"
 infernals.1043.name: "Appel aux armes : §Rdéclaration de la crise§!"
 infernals.1043.desc: "Face aux menaces liées au réchauffement du coeur de la galaxie, la Communauté galactique a appelé à une réponse unifiée contre la §Y[hyperthermia_empire.GetName]§!, ses agissements mettant en danger toutes les formes de vie connues.\n\nSi rien n'est fait, d'innombrables civilisations risquent de disparaître. La §Y[hyperthermia_empire.GetName]§! doit désormais faire face à la coalition galactique qui s'est formée par nécessité.\n\nLe combat a commencé et des milliards de vies sont en jeu.\n\n§HConquérez les systèmes centraux ou tout sera perdu !§!"
 infernals.1043.a: "Mobilisons les flottes !"
 infernals.1045.name: "Course contre la montre"
 infernals.1045.desc1: "Le déclenchement de la tempête de feu est imminent. Bientôt, le coeur de la galaxie sera suffisamment chaud pour anéantir tous nos ennemis et consolider notre domination.\n\nToutefois, la galaxie refuse d'accepter notre avenir radieux. Grâce à de nouvelles hyperlignes, ils prévoient d'envahir nos bases et de détruire tout ce que nous avons construit. Et pour quoi ? Pour préserver leur obscurité glaciale et stagnante ?\n\nNous ne devons pas les laisser s'immiscer. Nous devons tenir notre position au coeur de la galaxie jusqu'à ce que la tempête de feu se déclenche et les réduise tous en cendres." # last stage of global situation - crisis
 infernals.1045.desc2: "Le coeur de la galaxie chauffe de plus en plus en raison de l'obsession fanatique de la §Y[hyperthermia_empire.GetName]§! de mettre le feu aux étoiles. Si cela continue, leur tempête de feu anéantira tous ceux qui s'opposent à eux et exterminera presque toute vie dans la galaxie.\n\nIl est impossible de négocier avec eux. Si nous voulons survivre, nous devons nous en prendre à la source : les systèmes situés au coeur de la galaxie, où leur pouvoir est le plus grand. C'est notre seul moyen de les arrêter.\n\nLe sort de la galaxie tout entière est en jeu. L'heure est venue de montrer à la §Y[hyperthermia_empire.GetName]§! que ceux qui jouent avec le feu finissent toujours par se brûler eux-mêmes." # last stage of global situation - others
 infernals.1045.a: "Nous tiendrons notre position"
 infernals.1045.a.tooltip: "Nous devons garder le contrôle des six systèmes centraux pour remporter la victoire"
 infernals.1045.b: "Nous devons les éliminer une bonne fois pour toutes"
 infernals.1045.b.tooltip: "Nous devons attaquer les six systèmes centraux et détruire les conduits de la §Y[hyperthermia_empire.GetName]§!. Si nous n'y parvenons pas, nous serons consumés par les flammes."
 infernals.1055.name: "Le galaxie nous appartient !"
 infernals.1055.desc: "Nous avons allumé les flammes de la victoire depuis le coeur de la galaxie jusqu'aux étoiles les plus lointaines, et la tempête de feu a réduit tous nos ennemis en cendres. Ils n'avaient tout simplement pas la vision et le courage nécessaires pour affronter l'avenir glorieux que nous revendiquons désormais. La galaxie nous appartient !\n\nDans ce nouvel ordre de feu, le magma lumineux des planètes bouillonne, attisé par la chaleur ardente des géantes rouges. L'entropie imprègne chaque système et n'attend que d'être récoltée et soumise à notre volonté. Chaque jour, nous gagnons en richesse et en puissance... Nous sommes inarrêtables !\n\nNous avons dévoré la galaxie tout entière et en avons fait un symbole flamboyant de notre domination dans le vide. Un jour peut-être, d'autres galaxies brûleront sur notre bûcher." # crisis won
 infernals.1055.a: "Cette nouvelle galaxie nous appartient"
 infernals.1055.b: "Au final, tous les feux ne font plus qu'un"
 infernals.1055.c: "Notre empire ardent n'a que faire des faibles au corps tiède" #Scorched world heralds (genocidal Infernal)
 infernals.1055.d: "Notre détermination a enfin été récompensée" #Infernal Fire Cult
 infernals.1055.e: "Nous avons enfin chassé l'obscurité glaciale de la galaxie" #Other Infernals
 infernals.1055.f: "Nos pathétiques rivaux sont enfin réduits en cendres" #Generic Genocidal
 infernals.1052.name: "$galactic_crucible_4$ capturé"
 infernals.1052.desc: "En conquérant le système de §H[crucible_system.GetName]§!, nos forces ont également pris le contrôle du creuset galactique en cours de construction autour de l'étoile locale.\n\nAvec la perte de cette mégastructure, tout espoir que ses créateurs pouvaient encore avoir de conquérir la galaxie par la force s'est envolé."
 infernals.1052.a: "Détruisons-le !"
 infernals.1052.a.tt: "Le §Ycreuset galactique§! sera irrémédiablement détruit."
 infernals.1052.b: "Il nous sera sûrement utile"
 infernals.1052.b.tt: "Le §Ycreuset galactique§! devient un §Yinstitut de creuset galactique§! qui produit des £alloys£§Yalliages§!."
 infernals.1053.name: "$galactic_crucible_4$ capturé"
 infernals.1053.desc: "La conquête du système de §H[crucible_system.GetName]§! a révélé le sombre projet de la §H[crucible_builders.GetName]§! : la destruction totale de toute la galaxie par une tempête de feu.\n\nLa machine susceptible de provoquer cette extinction de masse a été mise hors service pour le moment. Une fois la guerre terminée, nous devrions utiliser nos ressources restantes pour détruire cette gigantesque mégastructure une bonne fois pour toutes."
 infernals.1053.a: "Nous devons vite mettre fin à cette guerre !"
 infernals.1053.b: "En voilà une structure tout à fait fascinante"
 infernals.1056.name: "Renaissance galactique"
 infernals.1056.desc: "Alors que nous étions occupés à allumer l'étincelle qui embraserait la galaxie, la §Y[hyperthermia_empire.GetName]§! transformait déjà les étoiles en armes, refaçonnant la galaxie à jamais.\n\nNous nous réjouissons de cette nouvelle utopie, mais nous devons surveiller de près ses prochaines actions à mesure qu'elle étend son influence sur la galaxie."
 infernals.1056.a: "Un grand pouvoir est source de conflits"
 infernals.1056.b: "Une nouvelle menace est née"
 infernals.1056.c: "Un revirement surprenant"
 # Relic
 r_crystallized_singularity: "Singularité cristallisée"
 r_crystallized_singularity_desc: "Déformée par le feu de la galaxie, cette singularité crépite d'une chaleur envoûtante. Si nous ne la protégeons pas soigneusement, elle attirera inévitablement des pèlerins, même dans les mondes les plus désolés. Ceux qui la contemplent sont envahis par le désir de mener une vie plus simple... plus proche des flammes."
 r_crystallized_singularity_effect_tt: "\n- §G10%§! de notre £physics_research£§Yrecherche en physique§! génère de l'£energy£§Yénergie§!."
 r_crystallized_singularity_ls_effect_tt: "- Permet la décision §Y$decision_gh_life_seeding$§! sur les mondes colonisables afin d'y créer de nouvelles civilisations primitives."
 crystallized_singularity_mod: "$r_crystallized_singularity$"
 crystallized_singularity_mod_desc: "$r_crystallized_singularity_desc$"
 decision_gh_life_seeding: "Graines de vie"
 decision_gh_life_seeding_desc: "Notre transformation de la galaxie a entraîné l'extinction de la plupart des espèces. Nous avons désormais le privilège de recréer la vie à notre image."
 decision_gh_life_seeding_limit: "$TRIGGER_FAIL$§RIl existe déjà une civilisation primitive sur ce monde.§!"
 decision_gh_life_seeding_colony: "$TRIGGER_FAIL$§RImpossible à réaliser dans un système comportant une colonie.§!"
 decision_gh_life_seeding_effect: "Crée une civilisation primitive à notre image.\n\n§HLimite d'activation : §! [from.gh_life_seeder_var] / 3"
 # Grand Archive Specimen
 infernal_burning_gem: "Gemme incandescente"
 infernal_burning_gem_desc_short: "L'un des premiers prototypes fonctionnels développés par la [GetName] pour exploiter l'entropie."
 infernal_burning_gem_desc_details: "Difficilement détectable par les systèmes optiques, ce fragment de cristal dissimule sous sa faible lueur blanche une énergie colossale. Malgré l'émergence de techniques plus avancées, nous pouvons encore apprendre beaucoup de sa conception et de ses propriétés."
 # Timeline
 TIMELINE_EVENT_GH_START: "Tempête de feu\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_START_TOOLTIP: "§HDevenir la crise§!\n§YCrise§!\n\nLa [EVENT_TARGET_0.GetName] a embrasé son propre empire et entrepris de contrôler le destin de la galaxie. Ceux qui ne partagent pas cette vision seront entraînés dans une guerre de conquête ardente qui ne laissera que des cendres derrière elle."
 TIMELINE_EVENT_GH_END: "Flammes dévorantes\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_END_TOOLTIP: "§HGalaxie vaincue§!\n§YCrise§!\n\nCe qui n'était au départ qu'une étincelle a fini par embraser toute la galaxie. Ceux qui se sont opposés à nous ont été réduits en cendres, tout comme leur histoire."
