l_french:
 # Ascension Perk
 ap_galactic_hyperthermia: "Hyperthermie galactique"
 ap_galactic_hyperthermia_desc: "L'univers est né dans le feu, mais s'est refroidi pour devenir un lieu sombre et hostile. Pour y prospérer, nous devons raviver les flammes, quitte à ce que d'autres y perdent la vie."
 must_be_infernals: "$TRIGGER_FAIL$Notre population doit être composée de thermophiles."
 # UI
 entropy_crystals: "Entropie cristallisée"
 entropy_crystals_name: "$entropy_crystals$ :"
 entropy_crystals_value: "$VAL|0$£entropy_crystals£"
 entropy_crystals_gaining: "Atteignez les §Hobjectifs de crise§! pour cumuler davantage d'£entropy_crystals£§Yentropie cristallisée§!."
 entropy_crystals_desc: "Cette matrice d'énergie brute, scintillante et irrégulière, est d'une stabilité suffisante pour être utilisée comme carburant ou intégrée à de l'équipement."
 mod_country_base_entropy_crystals_produces_add: "£entropy_crystals£$entropy_crystals$ mensuelle "
 entropy_crystals_crisis_objective: "$menace_crisis_objective$"
 entropy_crystals_crisis_objective_gained: "£entropy_crystals£ reçue"
 entropy_crystals_crisis_objective_reward: "$REWARD$"
 entropy_crystals_crisis_objective_progress: "Cet objectif de crise nous a octroyé $AMOUNT$£entropy_crystals£."
 entropy_crystals_crisis_level_locked: "Nécessaire pour atteindre ce niveau :\n" # remove?
 entropy_crystals_crisis_level_unlocked: "Au niveau $LEVEL$, nous obtiendrons ces avantages :\n"
 entropy_crystals_crisis_level_desc: "Pour passer d'un niveau de crise à l'autre, accumuler de l'entropie cristallisée et construire le §Ycreuset galactique§!."
 entropy_crystals_crisis_level_unlock: "A §Y$CURRENCY$§! d'£entropy_crystals£entropie cristallisée"
 entropy_crystals_current_value: "Valeur actuelle : §Y$VALUE|0$§!"
 entropy_crystals_crisis_description_title: "$ap_galactic_hyperthermia$"
 entropy_crystals_crisis_description: "$menace_crisis_description_intro$\n\nUne nouvelle méthode de manipulation de l'énergie nous ouvrira les portes d'un pouvoir sans précédent. Il nous faudra dompter le feu des étoiles pour déclencher cette nouvelle ère."
 entropy_crystals_crisis_howto_title: "Source d'énergie"
 entropy_crystals_crisis_howto: "La poursuite des §Hobjectifs de crise§! génère de l'£entropy_crystals£§Hentropie cristallisée§!, qui peut être utilisée pour améliorer le creuset galactique et débloquer le niveau de crise suivant."
 # Level
 crisis_hyperthermia_already_ongoing: "Un autre empire est déjà en train de prendre le contrôle du coeur de la galaxie."
 crisis_hyperthermia_already_happened: "Un autre empire contrôle déjà le coeur de la galaxie et l'a refaçonnée."
 crisis_hyperthermia_level_1: "§RPréoccupante§!"
 crisis_hyperthermia_level_1_desc: "$crisis_level_1_desc$"
 crisis_hyperthermia_lv1_tt: "£trigger_yes£ A terminé le projet spécial §Y$INF_CRISIS_ENTROPY$§!"
 crisis_hyperthermia_lv1_req_tt: "£trigger_no£ A terminé le projet spécial §Y$INF_CRISIS_ENTROPY$§!"
 crisis_hyperthermia_level_2: "§RÀ risque§!"
 crisis_hyperthermia_level_2_desc: "$crisis_level_2_desc$"
 crisis_hyperthermia_lv2_tt: "£trigger_yes£ A construit la mégastructure §Y$galactic_crucible_0$§! et l'a améliorée en §Y$galactic_crucible_1$§!"
 crisis_hyperthermia_lv2_req_tt: "£trigger_no£ A construit la mégastructure §Y$galactic_crucible_0$§! et l'a améliorée en §Y$galactic_crucible_1$§!"
 crisis_hyperthermia_level_3: "§RDangereuse§!"
 crisis_hyperthermia_level_3_desc: "$crisis_level_3_desc$"
 crisis_hyperthermia_lv3_tt: "£trigger_yes£ A amélioré la mégastructure §Y$galactic_crucible_1$§!"
 crisis_hyperthermia_lv3_req_tt: "£trigger_no£ A amélioré la mégastructure §Y$galactic_crucible_1$§!"
 crisis_hyperthermia_level_4: "§RCatastrophique§!"
 crisis_hyperthermia_level_4_desc: "$crisis_level_4_desc$"
 crisis_hyperthermia_lv4_tt: "£trigger_yes£ A amélioré la mégastructure §Y$galactic_crucible_2$§!"
 crisis_hyperthermia_lv4_req_tt: "£trigger_no£ A amélioré la mégastructure §Y$galactic_crucible_2$§!"
 crisis_hyperthermia_dec_lv4_tt: "£trigger_yes£ A terminé le projet spécial §Y$INF_CRISIS_ENTROPY_EVIL$§!"
 crisis_hyperthermia_lv4_dec_req_tt: "£trigger_no£ A terminé le projet spécial §Y$INF_CRISIS_ENTROPY_EVIL$§!"
 crisis_hyperthermia_level_5: "§RMenace existentielle§!"
 crisis_hyperthermia_level_5_desc: "$crisis_level_5_desc$"
 crisis_hyperthermia_lv5_tt: "£trigger_yes£ A amélioré la mégastructure §Y$galactic_crucible_3$§!"
 crisis_hyperthermia_lv5_req_tt: "£trigger_no£ A amélioré la mégastructure §Y$galactic_crucible_3$§!"
 # MPerks Level 1
 menp_hyperthermia_crystals: "$entropy_crystals$"
 menp_hyperthermia_crystals_desc: "L'§Yentropie cristallisée§! représente une avancée majeure dans la déstabilisation énergétique contrôlée. Armés de cette ressource volatile, nous sommes prêts à refaçonner l'ordre galactique."
 unlocks_entropy_objectives: "Permet de cumuler de l'£entropy_crystals£§Yentropie cristallisée§! en atteignant les §Hobjectifs de crise§!."
 menp_hyperthermia_harnessing: "Exploitation de l'entropie"
 menp_hyperthermia_harnessing_desc: "L'intégration de la synthèse d'§Yentropie cristallisée§! à notre industrie permet d'optimiser l'usage de cette ressource volatile, tout en alignant nos avancées techniques sur nos objectifs stratégiques."
 unlocks_entropy_edict: "§HPermet le décret§! $edict_entropy_harnessing$"
 menp_hyperthermia_crucible: "Creuset galactique"
 menp_hyperthermia_crucible_desc: "Ce creuset agirait comme moteur central dédié à l'exploitation d'entropie stellaire. Capable de la cristalliser et de la transporter, il pourrait devenir un symbole de notre puissance flamboyante et la faire rayonner à travers les étoiles."
 unlocks_galactic_crucible: "§HPermet la mégastructure§! $galactic_crucible_0$"
 # MPerks Level 2
 menp_hyperthermia_conc_entropy: "Entropie concentrée"
 menp_hyperthermia_conc_entropy_desc: "À ce stade, les conduits jouent un rôle crucial dans l'expansion de notre puissance. En augmentant le rendement du creuset, nous accélérerons notre progression vers un avenir plus éclatant et ardent."
 unlocks_conduit_spawn: "§HPermet les§! conduits \n- Les §Yconduits§! sont créés automatiquement par le §Ycreuset galactique§! et se rendront dans les systèmes stellaires voisins. \n- Les colonies situées dans un système ciblé reçoivent des bonus. \n- Les conduits sont équipés d'un £ship_xl_slot£§Yparalyseur à lentille§! qui, à l'impact, neutralise les ennemis pendant plusieurs jours. \n\n"
 menp_hyperthermia_radiant: "Ambitions rayonnantes"
 menp_hyperthermia_radiant_desc: "Être l'étincelle qui embrase la galaxie ne laisse aucune place au doute ni à la bureaucratie. Refaçonner des systèmes à l'infini ne serait qu'une perte de temps. Si nous voulons atteindre nos objectifs, nous devons décupler notre capacité de construction."
 menp_hyperthermia_ignition: "Inflammation forcée"
 menp_hyperthermia_ignition_desc: "Parfois, redoubler d'efforts ne suffit pas. Nous devons faire passer notre technologie au niveau supérieur et exploiter tout son potentiel. Il est temps de réduire au minimum les mesures de sécurité et d'optimiser les performances."
 unlocks_crucible_overclocking: "Permet le « surcadençage » de la §Hmégastructure§! §Y$galactic_crucible_1$§!."
 # MPerks Level 3
 menp_hyperthermia_cruiser: "$ember_cruiser$"
 menp_hyperthermia_cruiser_desc: "Ces vaisseaux sont équipés d'une technologie de pointe permettant de transformer les flux de chaleur volatiles en destruction ciblée et de réduire nos ennemis en cendres."
 unlocks_ember_cruiser: "§HPermet les§! croiseurs incandescents"
 menp_hyperthermia_flames: "Flammes dévorantes"
 menp_hyperthermia_flames_desc: "L'utopie à laquelle nous aspirons ne laisse pas de place aux opposants. Quiconque cherchera à nous arrêter comprendra vite que toute résistance sera sanctionnée par une pluie de feu sur son monde natal."
 unlocks_firestorm_stance: "§HPermet la terraformation en§! monde volcanique \n§HPermet d'adopter le protocole de bombardement§! $bombardment_firestorm$\n\n"
 menp_hyperthermia_coronal: "Ventilation coronale"
 menp_hyperthermia_coronal_desc: "Nos conduits émettent actuellement une chaleur considérable. En la transférant dans l'espace environnant, nous pourrions faire de nos conduits des armes dévastatrices."
 unlocks_conduit_damage: "Les §Yconduits§! infligent des dégâts passifs aux vaisseaux et stations ennemis.\n\n"
 # MPerks Level 4
 menp_hyperthermia_reactors: "Réacteurs à héliofusion"
 menp_hyperthermia_reactors_desc: "L'utilisation d'§Yentropie cristallisée§! dans les technologies militaires permet de développer des systèmes de propulsion d'une puissance inouïe. Nos vaisseaux fileront à travers la galaxie à une vitesse jamais atteinte auparavant."
 menp_hyperthermia_solarflare: "Rayonnement solaire artificiel"
 menp_hyperthermia_solarflare_desc: "Il fut un temps où certaines parties de la galaxie étaient hors de notre portée. Ce n'est plus le cas. Bientôt, des hordes de conduits illumineront les étoiles et détruiront tous ceux qui s'opposent à nous."
 unlocks_conduit_borders: "Les §Yconduits§! franchissent automatiquement la frontière pour se rendre en territoire ennemi.\n\n"
 menp_hyperthermia_armada: "Armada ardente"
 menp_hyperthermia_armada_desc: "La galaxie s'alliant de plus en plus contre nous, une mobilisation est indispensable. Chaque citoyen doit contribuer à maintenir l'apport d'énergie et à attiser les flammes de notre ascension."
 unlocks_blazing_navalcap: "Les §Y[GetAlloyProducerPlural]§! et les §Y[GetResearcherPlural]§! accroissent la £navy_size£§Ycapacité navale§!.\n\n"
 # MPerks Level 5
 menp_hyperthermia_battleship: "$ember_battleship$"
 menp_hyperthermia_battleship_desc: "Dotés de canons aussi brûlants qu'une tempête de feu menaçant d'engloutir la galaxie, ces vaisseaux constitueront l'essentiel de nos forces défensives autour du creuset."
 unlocks_ember_battleship: "§HPermet les§! cuirassés incandescents \n- Peut équiper le £ship_xl_slot£§Yparalyseur à lentille§!."
 menp_hyperthermia_critical_mass: "Masse critique"
 menp_hyperthermia_critical_mass_desc: "L'augmentation de l'activité entropique dans l'enveloppe extérieure d'une étoile conduit celle-ci à émettre une onde de rayonnement qui réchauffe plus rapidement le système."
 unlocks_conduit_boost: "Les §Yconduits§! deviennent plus puissants en fonction du nombre de systèmes conquis.\n\n$hyperthermia_map_perc$\n\n"
 hyperthermia_map_perc: "§G20%§! de la galaxie : $TABBED_NEW_LINE$- Les conduits augmentent la dévastation sur les colonies voisines $TABBED_NEW_LINE$- Les colonies touchées perdent progressivement des £pop£pops $TABBED_NEW_LINE$- Les effets ne s'appliquent qu'aux espèces non §Ythermophiles§! $TABBED_NEW_LINE$- Systèmes requis : §Y[root.hyperthermia_own_systems_var]§!/§Y[root.hyperthermia_systems_var]§!"
 menp_hyperthermia_ammunition: "Munitions renforcées"
 menp_hyperthermia_ammunition_desc: "Les munitions standard sont désormais dotées de micronoyaux d'entropie qui libèrent, à l'impact, des ondes de choc thermiques déstabilisantes. Cela se traduit par une capacité de destruction nettement renforcée."
 # Misc
 entropy_crystals_deficit: "Pénurie d'entropie cristallisée"
 edict_entropy_harnessing: "Exploitation de l'entropie"
 edict_entropy_harnessing_desc: "L'intégration d'entropie cristallisée dans nos infrastructures nous permet d'utiliser notre savoir-faire technologique pour exploiter pleinement son potentiel."
 mod_planet_technician_entropy_crystals_produces_add: "Prod. d'£entropy_crystals£§Yentropie cristallisée§! des £job_technician£[GetTechnicianPlural_lower] "
