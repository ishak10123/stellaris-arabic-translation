 tech_fe_administration_2: "Processus administratifs quantiques"
 tech_fe_administration_2_desc: "Notre technologie dépasse désormais toutes les exigences administratives. L'expertise nécessaire pour gouverner un empire galactique en toute transparence est à notre portée."
