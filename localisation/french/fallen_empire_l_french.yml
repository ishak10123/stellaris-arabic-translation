 ### FE Civics
 civic_antediluvian_mind: "Esprit antique"
 civic_antediluvian_mind_desc: "Le temps n'a pas été tendre avec cet esprit de gestalt. Son existence prolongée dans une bulle chronologique a émoussé son désir de survie, autrefois insatiable."
 civic_sluggish_drones: "Drones mollasses"
 civic_sluggish_drones_desc: "Les drones de cet empire ont presque l'air apathiques en accomplissant leurs tâches d'une lenteur sans nom. Il faut dire que l'Esprit supérieur n'exerce que peu de pression."
 ### FE Buildings
 building_fe: "Bâtiment d'empire déchu"
 building_ancient_control_center: "Ancien centre de contrôle"
 building_ancient_control_center_desc: "L'ancien centre de contrôle de l'anneau-monde est à peine entretenu en dépit des efforts incessants d'une armée de drones mécaniques."
 building_ancient_palace: "Palais antique"
 building_ancient_palace_desc: "Cet immense complexe palatial témoigne d'une époque révolue. Bien que sa façade lumineuse refuse de succomber au passage du temps, plusieurs de ses ailes sont abandonnées et se trouvent dans différents états de délabrement."
 building_ancient_hive_capital: "Cellule vénérable"
 building_ancient_hive_capital_desc: "C'est à cet ancien point névralgique de la suprématie de la Conscience que d'innombrables générations de drones ont exécuté consciencieusement les directives."
 building_affluence_emporium: "Emporium d'aisance"
 building_affluence_emporium_desc: "Ce centre anticipe et assouvit les désirs matériels à l'aide d'un algorithme d'approvisionnement avancé, apportant satisfaction avant même que la population ne soit consciente de ses désirs."
 building_affluence_center: "Centres d'aisance"
 building_affluence_center_desc: "Ce centre matérialise sans effort les désirs les plus fous en un instant."
 building_nourishment_complex: "Complexe d'alimentation"
 building_nourishment_complex_desc: "La technologie de réplication permet de créer rapidement de nouvelles saveurs sur commande."
 building_nourishment_center: "Centres d'alimentation"
 building_nourishment_center_desc: "Toutes les saveurs imaginables peuvent être reproduites en ces murs."
 building_dimensional_replicator: "Réplicateur dimensionnel"
 building_dimensional_replicator_desc: "La technologie de ce réplicateur assure une conversion parfaite de l'énergie en matière."
 building_dimensional_fabricator: "Fabricateur dimensionnel"
 building_dimensional_fabricator_desc: "Ce fabricateur avancé creuse des tunnels dans le tissu de l'espace dimensionnel pour en extraire de précieuses ressources."
 building_class_3_singularity: "Singularité de classe 3"
 building_class_3_singularity_desc: "La collecte de la totalité de l'énergie produite par cette singularité est une merveille d'ingénierie."
 building_class_4_singularity: "Singularité de classe 4"
 building_class_4_singularity_desc: "La puissance de cette singularité défie les lois de la physique, et pourtant les champs de confinement sont d'une stabilité inébranlable."
 building_micro_forge: "Hyperforge"
 building_micro_forge_desc: "La vitesse de production de cette forge n'est limitée que par la quantité de ressources qui y sont déposées."
 building_nano_forge: "Autoforge"
 building_nano_forge_desc: "Les vastes hangars des nanoréplicateurs de cette forge transforment les matières brutes en alliages perfectionnés avec une efficience remarquable."
 building_fe_sky_dome: "Dôme céleste"
 building_fe_sky_dome_desc: "Cette ville flottante, propulsée par une technologie antigravitationnelle de pointe, est un véritable havre de paix pour ses habitants."
 building_fe_dome: "Dôme empyréen"
 building_fe_dome_desc: "Suspendus par l'annulation gravimétrique, ces dômes transcendent les limites de la physique, et les systèmes de survie avancés répondent parfaitement aux besoins des habitants."
 building_fe_fortress: "Bastion Aspis"
 building_fe_fortress_desc: "Cet immense complexe de défense planétaire dispose de nombreux arsenaux et couches de blindage. Seule une force de siège hautement spécialisée pourrait percer ses défenses."
 building_fe_stronghold: "Complexe Aegis"
 building_fe_stronghold_desc: "Ce gigantesque complexe de défense planétaire est doté d'innombrables arsenaux et boucliers ; les montagnes de la planète s'effondreront avant ses défenses."
 building_master_archive: "Archives des maîtres"
 building_master_archive_desc: "Ce centre d'archives renferme des connaissances issues de multiples âges galactiques, mais la capacité de faire fonctionner son obscur système d'extraction est depuis longtemps perdue. Les données extraites sont inestimables."
 building_empyrean_shrine: "Sanctuaire empyréen désynchronisé"
 building_empyrean_shrine_desc: "Exclusivement utilisé pour communier avec les esprits du Suaire, ce temple ne se manifeste que partiellement dans notre dimension."
 building_ancient_cryo_chamber: "Cryochambres antiques"
 building_ancient_cryo_chamber_desc: "Des rangées et des rangées de cryocapsules s'alignent au coeur de cette structure gigantesque, renfermant des milliards de spécimens aliens depuis longtemps décédés."
 building_fe_administration_1: "Administration omnivoyante"
 building_fe_administration_1_desc: "Ce vaste complexe, qui fait partie intégrante d'un système bureaucratique à l'échelle de la galaxie, est relié à un important réseau administratif."
 building_fe_administration_2: "Administration omnisciente"
 building_fe_administration_2_desc: "Ce vaste complexe, pièce maîtresse d'un système bureaucratique à l'échelle de la galaxie, coordonne un réseau administratif robuste et avancé."
 building_fe_administration_hive_1: "Pôle éphaptique"
 building_fe_administration_hive_1_desc: "Soigneusement entretenu par des drones hautement spécialisés, ce réseau de noeuds éphaptiques renforce la domination de la Conscience sur son vaste domaine cognitif."
 building_fe_administration_hive_2: "Axone éphaptique"
 building_fe_administration_hive_2_desc: "Soigneusement entretenu par des drones hautement spécialisés, ce vaste réseau de noeuds éphaptiques renforce la volonté de la Conscience sur la galaxie."
 building_fe_administration_machine_1: "Point de coordination fractal"
 building_fe_administration_machine_1_desc: "Un centre fractal avancé, qui traite et transmet des billions de signaux avec une précision quasi instantanée."
 building_fe_administration_machine_2: "Point de coordination quantique"
 building_fe_administration_machine_2_desc: "Un centre d'intrication quantique avancé, qui traite et transmet instantanément des billiards de signaux avec une grande précision."
 building_fe_temple_1: "Sanctuaire céleste"
 building_fe_temple_1_desc: "Les progrès les plus récents dans le domaine de la technologie métaphysique permettent aux fidèles de communier directement avec l'essence divine."
 building_fe_temple_2: "Cathédrale céleste"
 building_fe_temple_2_desc: "L'utilisation de la technologie métaphysique pour les sermons psioniques amplifie la résonance spirituelle. Cet immense complexe permet aux fidèles de se connecter intimement à l'essence divine à l'échelle du système."
 building_fe_assembly_1: "Centre de fabrication robotique"
 building_fe_assembly_1_desc: "Ce complexe d'assemblage ultramoderne est géré par des roboticiens chevronnés et transcende les limites conventionnelles, créant méticuleusement l'avant-garde en matière d'innovation robotique."
 building_fe_assembly_2: "Centre de production quantique robotique"
 building_fe_assembly_2_desc: "Merveille d'ingénierie, la chaîne d'assemblage quantique de ce centre fabrique des pièces de machine extrêmement sophistiquées à l'aide de convertisseurs d'intrication. Le moindre atome est à sa place."
 building_fe_clinic_1: "Institut de revitalisation moléculaire"
 building_fe_clinic_1_desc: "Les instituts de revitalisation moléculaire plongent dans les méandres cellulaires afin d'améliorer l'efficacité des traitements médicaux et par conséquent la santé et la longévité de la population."
 building_fe_clinic_2: "Institut de biorégénération"
 building_fe_clinic_2_desc: "L'institut de biorégénération, à la pointe de la technologie médicale, est le pionnier des thérapies biorégénératrices révolutionnaires, redéfinissant sans cesse les limites de la longévité."
 building_fe_security_1: "Complexe judiciaire"
 building_fe_security_1_desc: "Ce vaste complexe judiciaire mêle harmonieusement tribunaux et forces de l'ordre."
 building_fe_security_2: "Ziggourat de justice"
 building_fe_security_2_desc: "Au zénith des institutions juridiques, cet édifice imposant est le symbole de la justice, abritant des tribunaux, des centres de détention et des établissements pénitentiaires qui réhabiliteront même les criminels les plus endurcis."
 building_fe_market_1: "Carrefour commercial galactique"
 building_fe_market_1_desc: "Dominant la ligne d'horizon, ces tours imposantes projettent des ombres sur les districts commerciaux animés situés en contrebas."
 building_fe_market_2: "Centre commercial interplanétaire"
 building_fe_market_2_desc: "Régnant en maître sur l'économie galactique, les énormes tours de ce quartier commercial sont visibles depuis l'orbite."
 building_fe_silo_1: "Dépôt rétrécissant"
 building_fe_silo_1_desc: "Le dépôt influence une partie du sous-espace où la distance entre les molécules est réduite, ce qui a pour effet de rétrécir tout ce qui y est stocké. Il est interdit aux êtres vivants d'y pénétrer."
 building_fe_silo_2: "Dépôt extradimensionnel"
 building_fe_silo_2_desc: "La création d'une minuscule dimension localisée permet de contenir des ressources presque infinies."
 building_fe_entertainment_1: "Centre du bonheur virtuel"
 building_fe_entertainment_1_desc: "Ces immenses secteurs de divertissement sont à l'avant-garde des loisirs et de la récréation. Les lecteurs d'ondes cérébrales permettent des escapades virtuelles instantanées et personnalisées."
 building_fe_entertainment_2: "Centre omniplaisirs"
 building_fe_entertainment_2_desc: "Ce gigantesque lieu de divertissement transcende les limites conventionnelles, où les désirs se matérialisent avant même d'être exprimés."
 building_fe_lab_1: "Centre d'innovation quantique"
 building_fe_lab_1_desc: "Ce centre dispose d'équipements de pointe et d'équipes de recherche sans précédent, ouvrant la voie à une ère où les théories quantiques ne sont pas seulement explorées, mais exploitées pour aboutir à des innovations révolutionnaires."
 building_fe_lab_2: "Département d'innovation transcendantale"
 building_fe_lab_2_desc: "Ce bâtiment est le summum du progrès scientifique et démontre que nous vivons une ère d'innovation sans limites."
 building_fe_mine_1: "Usine de forage quantique"
 building_fe_mine_1_desc: "La technologie de forage quantique permet à cette usine minière de forer des matériaux solides sans aucun contact physique et ainsi de trouver des minéraux partout dans le manteau de la planète."
 building_fe_mine_2: "Centre de forage quantique"
 building_fe_mine_2_desc: "La technologie de forage quantique permet à ce centre de forer des matériaux solides ou liquides sans aucun contact physique et ainsi d'extraire des minéraux partout, y compris dans le noyau extérieur de la planète."
 ### FE Jobs
 job_fe_overseer: "Superviseurs"
 job_fe_overseer_plural: "Superviseurs"
 job_fe_overseer_desc: "Les quelques fidèles qui ont rejeté la vie d'opulence pour le service public. C'est à eux que revient la charge de contrôler et guider ce qu'il reste de leur civilisation antique."
 mod_job_fe_overseer_add: "Emplois de superviseurs"
 job_fe_maintenance_bot: "Préservateurs"
 job_fe_maintenance_bot_plural: "Préservateurs"
 job_fe_maintenance_bot_desc: "Ces machines antiques préservent et réparent avec assiduité les machineries délabrées de l'anneau-monde sur lequel elles résident."
 mod_job_fe_maintenance_bot_add: "Emplois de préservateurs"
 mod_job_fe_maintenance_bot_per_pop: "§G+1§! emploi de £job_fe_maintenance_bot£préservateur par palier de $VALUE$ pops"
 mod_job_fe_maintenance_bot_per_pop_short: "\n§G+1§! £mod_job_maintenance_drone_add£ pour $VALUE$ £pop£"
 job_fe_guardian_bot: "Gardiens"
 job_fe_guardian_bot_plural: "Gardiens"
 job_fe_guardian_bot_desc: "Ces machines antiques veillent inlassablement sur les restes cryogénisés de milliards de conscients décédés."
 mod_job_fe_guardian_bot_add: "Emplois de gardiens"
 fe_hedonist: "$job_fe_hedonist$"
 job_fe_hedonist: "Hédonistes"
 job_fe_hedonist_plural: "Hédonistes"
 job_fe_hedonist_desc: "Une vie d'opulence totale, où le moindre besoin ou désir matériel peut être aussitôt satisfait."
 mod_job_fe_hedonist_add: "Emplois d'hédonistes"
 job_fe_archivist: "Archivistes"
 job_fe_archivist_plural: "Archivistes"
 job_fe_archivist_effect_desc: "Les £job_archivist£archivistes transforment les £consumer_goods£§Ybiens de consommation§! en £physics£ £society£ £engineering£§Yrecherche§!"
 job_fe_archivist_desc: "Chaque fragment de donnée doit être catalogué et indexé avec précision selon les rites anciens prescrits il y a des éternités par le Premier Archiviste."
 mod_job_fe_archivist_add: "Emplois d'archivistes"
 job_fe_acolyte_farm: "Acolytes de la charrue"
 job_fe_acolyte_farm_plural: "Acolytes de la charrue"
 job_fe_acolyte_farm_plural_with_icon: "£job_fe_acolyte_farm£$job_fe_acolyte_farm_plural$"
 job_fe_acolyte_farm_desc: "N'est-ce pas par la charrue, le plus noble des outils, que Kazargiel put trancher les queues empoisonnées du démon trois fois maudit et repousser le spectre de la famine ?"
 job_fe_acolyte_farm_effect_desc: "(les £job_fe_acolyte_farm£acolytes de la charrue produisent de la £food£§Ynourriture§!)"
 mod_job_fe_acolyte_farm_add: "Emplois d'acolytes de la charrue"
 job_fe_acolyte_mine: "Acolytes du marteau"
 job_fe_acolyte_mine_plural: "Acolytes du marteau"
 job_fe_acolyte_mine_plural_with_icon: "£job_fe_acolyte_mine£$job_fe_acolyte_mine_plural$"
 job_fe_acolyte_mine_desc: "Et d'un seul coup puissant, sainte Mazakudal utilisa son marteau brûlant pour briser le crâne du premier spectre, ouvrant ainsi la voie jusqu'aux cristaux."
 job_fe_acolyte_mine_effect_desc: "(les £job_fe_acolyte_mine£acolytes du marteau produisent des £minerals£§Yminéraux§!)"
 mod_job_fe_acolyte_mine_add: "Emplois d'acolytes du marteau"
 job_fe_acolyte_generator: "Acolytes de l'Hyperclef"
 job_fe_acolyte_generator_plural: "Acolytes de l'Hyperclef"
 job_fe_acolyte_generator_plural_with_icon: "£job_fe_acolyte_generator£$job_fe_acolyte_generator_plural$"
 job_fe_acolyte_generator_desc: "Souvenez-vous aussi de l'Hyperclef, comment Bazagg le Brillant en usa pour dompter le soleil alors même qu'il paraissait que les ténèbres allaient submerger le monde."
 job_fe_acolyte_generator_effect_desc: "(les £job_fe_acolyte_generator£acolytes de l'Hyperclef produisent de l'£energy£§Yénergie§!)"
 mod_job_fe_acolyte_generator_add: "Emplois d'acolytes de l'Hyperclef"
 job_fe_acolyte_artisan: "Acolytes de l'atelier"
 job_fe_acolyte_artisan_plural: "Acolytes de l'atelier"
 job_fe_acolyte_artisan_desc: "Alors Aznakha s'adressa ainsi aux acolytes : « Gagnez les ateliers, et forgez de vos outils cet avenir que vous avez entrevu. »"
 job_fe_acolyte_artisan_effect_desc: "(les £job_fe_acolyte_artisan£acolytes de l'atelier produisent des £consumer_goods£§Ybiens de consommation§!)"
 mod_job_fe_acolyte_artisan_add: "Emplois d'acolytes de l'atelier"
 job_fe_protector: "Protecteurs"
 job_fe_protector_plural: "Protecteurs"
 job_fe_protector_desc: "Pour que la majorité puisse se reposer en paix et jouir de vies extravagantes, ces individus abrupts veillent dans la nuit pour s'occuper de quiconque lui voudrait le moindre mal."
 mod_job_fe_protector_add: "Emplois de protecteurs"
 job_fe_augur: "Augures du Suaire"
 job_fe_augur_plural: "Augures du Suaire"
 job_fe_augur_desc: "Il parle, mais n'emploie pas de mots. Pour avoir la moindre compréhension de ses propos, il convient de se pencher au-dessus du gouffre de la folie."
 mod_job_fe_augur_add: "Emplois d'augures du Suaire"
 job_fe_sky_cardinal: "Cardinaux célestes"
 job_fe_sky_cardinal_plural: "Cardinaux célestes"
 job_fe_sky_cardinal_desc: "Et c'est là, dans les cieux, que l'avenir était né. La lumière se fit aveuglante, mais quelques-uns purent voir au-delà, qui firent le choix de mener les autres de l'avant."
 mod_job_fe_sky_cardinal_add: "Emplois de cardinaux célestes"
 job_fe_xeno_ward: "Xénopensionnaires"
 job_fe_xeno_ward_plural: "Xénopensionnaires"
 job_fe_xeno_ward_desc: "Des spécimens ont été rassemblés ici, dans des milieux ressemblant de près à leurs environnements naturels, pour veiller à ce que leurs espèces soient préservées dans cette galaxie trop souvent en proie au chaos et à la destruction."
 mod_job_fe_xeno_ward_add: "Emplois de xénopensionnaires"
 job_fe_xeno_keeper: "Xénogardiens"
 job_fe_xeno_keeper_plural: "Xénogardiens"
 job_fe_xeno_keeper_desc: "Ces gardiens précurseurs pourvoient à tous les besoins des xénopensionnaires dont ils ont la charge."
 mod_job_fe_xeno_keeper_add: "Emplois de xénogardiens"
