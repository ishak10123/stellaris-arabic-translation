 #Event Chains #
 ###########################################
 ### Collided Planet Event Chain
 collided_planets_category: "La planète collisionnée"
 collided_planets_category_desc: "Dans un lointain passé, deux planètes sont entrées en collision et ont créé un monde unique."
 cs_collided_planet_chain_title: "La planète collisionnée"
 cs_collided_planet_chain_desc: "Une catastrophe menace de détruire le fragile équilibre de cette planète singulière."
 cstorms.1200.name: "Il était une fois deux planètes"
 cstorms.1200.desc: "Dès l'instant où nous avons découvert [From.Planet.GetName], sa simple existence a été une source de fascination.\n\nLa collision de deux objets célestes n'a rien d'inhabituel, la galaxie étant vaste et chaotique. Cependant, lorsqu'une telle collision se produit, l'un des corps se retrouve complètement détruit, parfois même les deux.\n\nLa collision qui a donné naissance à [From.Planet.GetName] remonte à des millions d'années, et pourtant ces deux mondes maintiennent un étrange équilibre et ont même créé une atmosphère viable."
 cstorms.1205.name: "Équilibre fragile"
 cstorms.1205.desc: "La situation sur ce que l'on appelle la « planète collisionnée » s'est révélée bien plus précaire que prévu. Une récente série de tremblements de terre a ouvert les anciennes cicatrices autour de la zone d'impact, provoquant l'éruption d'une quantité considérable de magma. Plusieurs biomes souffrent déjà de l'augmentation des températures et des cendres volcaniques qui obscurcissent le ciel.\n\nD'après nos observations, si l'activité tectonique ne se stabilise pas et continue de croître, [From.Planet.GetName] sera complètement désintégrée dans moins de 50 ans !"
 cstorms.1210.name: "Métamorphose débridée"
 cstorms.1210.desc: "Nos meilleurs géologues se sont réunis et ont élaboré deux plans possibles pour sauver [From.Planet.GetName] de l'effondrement tectonique.\n\nLe premier prévoit de stabiliser la zone d'impact. Il faudrait des siècles pour refermer la brèche volcanique, mais nous pourrions réduire la pression sur la croûte de la planète et endiguer l'instabilité tectonique en trépanant la zone d'impact. Les débris volcaniques restants pourront alors être utilisés pour terraformer la planète et créer un biome stable.\n\nLe second est beaucoup plus ambitieux. Au lieu de réduire la pression sur la croûte de la planète, nous pourrions utiliser l'énergie et les matériaux générés par l'éruption volcanique pour lancer un processus de terraformation spécialement adapté aux conditions locales.\n\nCette approche nous permettrait de créer une multitude de biomes capables de préserver toute forme de vie et ferait de ce monde un paradis. Il existe toutefois un risque important que ce processus échoue... et conduise à la destruction totale de ce corps stellaire si singulier."
 cstorms.1210.a: "Stabilisons la zone d'impact"
 cstorms.1210.b: "Utilisons les émissions volcaniques"
 cstorms.1210.c: "Contentons-nous d'observer"
 collided_planet_collapsing: "Désintégration planétaire"
 collided_planet_collapsing_desc: "L'activité tectonique dévastatrice provoquera la désintégration de la planète collisionnée, détruisant ainsi les deux mondes."
 collided_planet_collapsing_tt: "Le monde se désintégrera dans 50 ans."
 project_cosmic_storms_collidedplanet_stabilize: "Stabilisation de la zone d'impact"
 project_cosmic_storms_collidedplanet_stabilize_DESC: "Il est nécessaire de stabiliser la planète collisionnée si nous voulons éviter qu'elle ne se désintègre."
 project_cosmic_storms_collidedplanet_harmonize: "Harmonisation de la zone d'impact"
 project_cosmic_storms_collidedplanet_harmonize_DESC: "Nous devrions mettre en oeuvre notre plan ambitieux et reconstruire les biomes de la planète collisionnée. Nous créerons ainsi un monde pour tous, ou nous le détruirons complètement."
 cstorms.1220.name: "Collision préservée"
 cstorms.1220.desc: "Nos efforts pour stabiliser le monde collisionné ont porté leurs fruits ! Les secousses tectoniques qui menaçaient l'existence de [From.Planet.GetName] ont cessé, et les déchets volcaniques diminuent eux aussi rapidement, ramenant le monde à son fragile équilibre.\n\nL'heure est à la terraformation, mais une question demeure : quel type de planète doit devenir [From.Planet.GetName] ?"
 cstorms.1220.a: "Un monde continental, c'est très bien"
 cstorms.1220.b: "Faisons-en un monde de savane"
 cstorms.1220.c: "Créons un monde montagneux"
 cstorms.1225.name: "Un monde pour tous"
 cstorms.1225.desc.stabalize: "C'est incroyable ! Nous pensions que notre travail ne ferait que stabiliser [collided_planets.GetName], mais elle a même évolué !\n\n$cstorms.1225.desc.def$"
 cstorms.1225.desc.def: "Nous avons devant nous un paradis, une planète capable d'accueillir presque toutes les formes de vie imaginables.\n\nExiste-t-il plus grand accomplissement que d'avoir sauvé un monde voué à disparaître et de l'avoir transformé en quelque chose de si inspirant ? La chance nous sourit."
 cstorms.1230.name: "Rénovation nécessaire"
 cstorms.1230.desc: "Même si le monde lui-même a heureusement pu être sauvé, nos efforts pour faire de la planète collisionnée un paradis se sont soldés par un échec.\n\nNos tentatives de façonner le biome à notre image ont été réduites à néant par la lourde activité tectonique de la planète. Le pire semble avoir été surmonté et l'activité volcanique est revenue aux niveaux enregistrés avant le récent bouleversement. Bien que la zone d'impact reste active, il est peu probable que le phénomène se reproduise dans un avenir proche.\n\nNotre défi consiste désormais à reconstruire ce monde."
 cstorms.1235.name: "Mondes en pièces détachés"
 cstorms.1235.desc: "Notre tentative de sauver la planète collisionnée d'une destruction imminente a lamentablement échoué. Bien que nos scientifiques aient pris toutes les précautions possibles et imaginables, leurs calculs n'ont pas été en mesure d'envisager toutes les éventualités.\n\nAlors que les restes de ces mondes continuent de dériver dans le vide, la galaxie pleure la perte de ce phénomène des plus singuliers."
 cstorms.1240.name: "Collision et effondrement"
 cstorms.1240.desc: "L'effondrement de la planète collisionnée suit nos prédictions à la décimale près. Là où la galaxie s'était autrefois enrichie d'un phénomène unique, il ne reste aujourd'hui que des pierres."
 collided_planets_destroyed_tt: "[collided_planets.GetName] est détruite."
 ### Crimson crawlers Event Chain
 cs_crimson_crawlers_chain_desc: "Rampants cramoisis"
 cs_crimson_crawlers_chain_title: "Nous avons trouvé une planète recouverte de plusieurs billions d'insectes rouges. Est-ce un fléau ou une opportunité ?"
 crimson_crawlers_category: "Tableau cramoisi"
 crimson_crawlers_category_desc: "Lors de leur exploration, nos scientifiques ont découvert une planète rouge écarlate dans le système [From.GetStarName]. L'intensité de sa couleur est remarquable. Nous devrions enquêter."
 cstorms.1255.name: "Rampants cramoisis"
 cstorms.1255.desc: "De loin, [From.GetName] brille comme un rubis. L'argile ou d'autres types de sols enrichis en métaux durs fournissent normalement une explication logique à une telle anomalie géographique, mais la vérité est bien plus étrange ici.\n\nDes insectes. Des billions et des billions d'insectes, grouillant à la surface de [From.GetName] et formant un tapis sur pattes.\n\nCes invertébrés, rapidement qualifiés de « rampants cramoisis », possèdent un cycle de reproduction remarquablement hyperactif. Ils ne semblent pas être une menace pour leur environnement, mais en raison de leur nombre, [From.GetName] ne se prête pas vraiment à la colonisation.\n\nUne méthode peu orthodoxe de gestion de ces insectes a été proposée. Nos scans ont révélé qu'ils sont comestibles, aussi peut-être avons-nous trouver une nouvelle source de nourriture... Nous devrions étudier cette possibilité."
 project_cosmic_storms_crimson_crawlers: "Question de goût"
 project_cosmic_storms_crimson_crawlers_DESC: "[From.Planet.GetName] est envahie d'insectes rouges pacifiques. S'ils étaient éradiqués, la planète deviendrait habitable. Par ailleurs, ils semblent être une bonne source de nourriture... Il y a matière à réflexion."
 cstorms.1260.name: "Curiosité culinaire"
 cstorms.1260.desc: "L'idée de consommer les rampants cramoisis peut sembler absurde au premier abord, mais lorsqu'un spécimen a été amené à bord, il est devenu bien plus appétissant.\n\nCes insectes sont fascinants, dotés d'un système nerveux extrêmement avancé sans avoir besoin d'un organe central de traitement. Plus important encore, leur chair blanchâtre est étonnamment tendre et juteuse, et même cru, leur exosquelette vermillon est croustillant et savoureux.\n\nVaut-il mieux les utiliser pour la recherche ou pour la cuisine ? Les faire cuire pourrait les rendre encore plus savoureux, mais les manger crus sera plus rapide et plus facile, surtout s'ils sont bien assaisonnés."
 cstorms.1260.a: "Étudions les rampants"
 cstorms.1260.b: "Mangeons-les crus !"
 cstorms.1260.c: "Faisons-les cuire !"
 ### Stormbound Event Chain
 cs_stormbound_chain_title: "Vaisseau-tempête"
 cs_stormbound_chain_desc: "Un sinistre vaisseau est apparu sur nos capteurs, mais seulement à l'intérieur de la tempête cosmique. Que se passe-t-il ici ?"
 letters_of_the_manifold: "Lettres de la multiplicité"
 stormbound_event_ship_object: "$cs_stormbound_chain_title$"
 cstorms.1310.name: "Apparition du vaisseau-tempête"
 cstorms.1310.desc: "Nous avons reçu des rapports étranges en provenance du système de [This.GetName]. Apparemment, un vaisseau d'origine inconnue est apparu lors de la tempête cosmique qui a fait rage dans ce secteur. Il n'a pas d'indicatif d'appel et a réussi, on ne sait comment, à traverser la tempête sans dommage, comme s'il n'était pas du tout affecté par cette force de la nature.\n\nIl n'a pas répondu à nos appels et lorsque la tempête s'est dissipée, le mystérieux vaisseau a disparu avec elle. Beaucoup mettraient cela sur le compte d'instruments défectueux, mais les preuves visuelles parlent d'elles-mêmes.\n\nSerait-ce la démonstration d'une technologie incroyablement avancée ou quelque chose de plus menaçant ? Nous continuerons à surveiller l'apparition de ce mystérieux vaisseau."
 cstorms.1313.name: "Retour du vaisseau-tempête"
 cstorms.1313.desc: "L'une des stations de recherche du système de [This.GetName] nous a transmis un rapport surprenant : lors de la dernière tempête cosmique, un étrange vaisseau a failli entrer en collision avec l'avant-poste. Les rapports visuels indiquent qu'il s'agissait du même vaisseau que la dernière fois.\n\nSelon le rapport de la station spatiale, la coque du vaisseau était constituée d'une étrange fusion de matière organique, de minéraux de calcium et d'alliages métalliques.\n\nAucun signe de vie n'a été détecté à bord du vaisseau, ce qui nous laisse penser qu'il était soit automatisé, soit perdu.\n\nMais ce qui est plus surprenant encore, c'est que le système de propulsion a été détruit par des débris spatiaux et que le vaisseau devrait être incapable de se déplacer.\n\nSi nous demandions à un vaisseau scientifique de surveiller la prochaine tempête cosmique, nous pourrions peut-être en apprendre davantage sur ce mystérieux appareil."
 cstorms.1313.a: "Nous n'avons pas de temps à consacrer à de telles bêtises"
 cstorms.1316.name: "Un murmure dans la tempête"
 cstorms.1316.desc: "La flotte [stormbound_science.GetName] a aperçu le mystérieux vaisseau au milieu d'une tempête. Au moment où il passait, nous avons reçu d'étranges signaux émanant de la toile cosmique.\n\nCela explique enfin pourquoi nos capteurs n'ont pas pu détecter le vaisseau : sa manifestation physique est « étirée » au-delà de la multiplicité, tout comme s'il était simultanément à moitié dans un trou de ver et à moitié en dehors. L'origine hyperdimensionnelle des tempêtes cosmiques pourrait être la raison pour laquelle le vaisseau a pu revenir dans notre espace.\n\nGrâce à ces informations, nous devrions être en mesure de détecter sa prochaine apparition et de peut-être ramener le vaisseau dans notre réalité."
 cstorms.1317.name: "Vaisseau-tempête repéré"
 cstorms.1317.desc: "Le mystérieux vaisseau a été aperçu dans le système de §Y[this.GetName]§!."
 cstorms.1320.name: "Retour à la maison"
 cstorms.1320.desc: "Le voilà ! Le mystérieux vaisseau est apparu devant la flotte [Root.Fleet.GetName] et a initié la communication. Une entité mécanique portant un masque est apparu à l'écran. Nommée B'Tiin, elle nous raconta une histoire des plus fascinantes.\n\nElle était autrefois un officier de renom pour une organisation appelée Convention des bienfaiteurs. Lors d'une patrouille, elle et son équipage ont été pris dans une tempête cosmique. Pour survivre, elle a pris la décision de surcharger le « propulseur de brèche » du vaisseau. Cette technologie expérimentale n'avait jamais été testée auparavant et son activation a eu pour effet de piéger le vaisseau et son équipage dans le champ hyperdimensionnel de la tempête.\n\nAprès avoir raconté son histoire, un petit conteneur a été éjecté du vaisseau. À l'intérieur se trouvait une série de documents. « Prenez-les », nous exhorta B'Tiin avant de mettre fin à la transmission et de disparaître dans la multiplicité spatiale.\n\nLes documents étant écrits dans une langue étrangère, il nous faudra du temps pour les déchiffrer."
 cstorms.1320.a: "Attelons-nous à la traduction"
 cstorms.1321.name: "Lettres de la multiplicité"
 cstorms.1321.desc: "Les documents de l'étrange conteneur ont finalement pu être décryptés. L'un d'eux contenait une représentation schématique du « propulseur de brèche » utilisée par le vaisseau. Cette technologie dépasse de loin nos connaissances, mais les principes qui la sous-tendent ont tout de même enrichi notre compréhension du voyage hyperspatial.\n\nMoins utiles, les traductions des lettres personnelles n'en sont pas moins intéressantes. Chacune d'entre elles est adressée à un être cher et transpire d'affection, d'espoir et de regret.\n\nIl semble que B'Tiin ait ainsi voulu donner à son équipage une dernière chance de faire ses adieux. Malheureusement, nous ignorons où envoyer ces lettres. Les mettre à la disposition de notre peuple permettrait au moins de préserver cet étrange héritage. Nous pourrions aussi les détruire ; apprendre l'existence de vaisseaux mystérieux et de lettres fantômes pourrait être perturbant."
 cstorms.1321.a: "Archivons les lettres pour la postérité"
 cstorms.1321.b: "Débarrassons-nous-en"
 project_cosmic_storms_stormbound: "Esprits de la tempête"
 project_cosmic_storms_stormbound_DESC: "Le mystérieux vaisseau devrait apparaître dans cette tempête.\n\nNous devrions envoyer un vaisseau scientifique pour l'intercepter et l'extraire de là !"
 ### But They're Cute Event Chain
 cs_but_they_are_cute_chain_title: "A-DO-RA-BLE !"
 cs_but_they_are_cute_chain_desc: "Après avoir examiné [From.Planet.GetName], nous avons découvert une étrange créature. Qu'allons-nous en faire ?"
 but_they_are_cute_category: "A-DO-RA-BLE !"
 but_they_are_cute_category_desc: "Après avoir examiné [From.Planet.GetName], nous avons découvert une étrange créature. Bien qu'elle ne vive parmi nous que depuis peu, nous mourons déjà d'envie d'en prendre soin et de la protéger. Nos scientifiques recommandent de l'étudier davantage."
 cstorms.1500.name: "A-DO-RA-BLE !"
 cstorms.1500.desc: "Dès sa découverte, la créature a suscité amour et dévotion parmi nous. Ses quatre yeux globuleux emplis d'innocence invitent chacun à caresser sa fourrure aussi douce qu'un nuage. Elle semble avoir établi un lien particulièrement fort avec [Root.GetLeaderName] et passe le plus clair de son temps sur ses genoux, sans montrer le moindre signe d'agressivité ou de danger. C'est comme si elle avait été faite pour paraître aussi inoffensive que possible.\n\nCertains sceptiques ont néanmoins souligné qu'il était irresponsable de garder une forme de vie inconnue à bord du vaisseau sans autorisation préalable. [Root.GetLeaderName] a assuré que la créature ne représentait aucun danger, mais a accepté de demander une enquête officielle."
 cstorms.1500.a: "Découvrons de quoi il s'agit"
 cstorms.1500.b: "Demande rejetée, débarrassons-nous-en"
 cstorms.1500.evopred: "Demande rejetée, mangeons-la"
 project_cosmic_storms_but_they_are_cute: "Merveille biologique"
 project_cosmic_storms_but_they_are_cute_DESC: "Une créature fascinante et extrêmement mignonne a été trouvée à bord d'un de nos vaisseaux scientifiques. Avant de décider de la garder ou non, nous devons étudier ses caractéristiques biologiques."
 cstorms.1505.name: "Merveille biologique"
 cstorms.1505.desc: "Le docile hexapode n'a même pas eu besoin d'être endormi ou contraint pour faire les scanners et les tests. Il est étrangement coopératif. L'équipage l'a surnommé Gurr en raison du petit bruit qu'il fait lorsqu'on le caresse.\n\nLes tests ont révélé que Gurr est omnivore et que sa fourrure est composée de filaments très souples, à base de kératine. La véritable merveille se trouve à l'intérieur de l'adorable créature : elle peut renouveler toutes ses cellules en un mois seulement. Cela inclut son système nerveux, ce qui signifie qu'elle peut faire repousser des parties de son corps en quelques jours.\n\nQu'une créature à la constitution aussi sophistiquée soit un produit de l'évolution naturelle paraît hautement improbable. Nous n'avons jamais rien vu de tel, et nous ignorons ses véritables intentions. Malgré son apparente docilité, la créature pourrait se retourner contre nous à tout moment. Cela dit, la motivation de [Root.GetLeaderName] est accrue depuis qu'elle est parmi nous.\n\nQu'allons-nous faire de Gurr ? Pouvons-nous le garder ?"
 cstorms.1505.a: "Tant que vous nettoyez derrière lui"
 cstorms.1505.b: "Débarrassons-nous-en"
 cstorms.1510.name: "Gurr, l'alien de compagnie"
 cstorms.1510.desc: "L'adorable créature a été autorisée à rester à bord du vaisseau scientifique et s'est bien adaptée depuis. Elle apaise [Root.GetLeaderName] et égaie l'atmosphère lorsqu'elle trottine dans les couloirs. Le moral de l'équipage n'a jamais été aussi haut !\n\nEspérons que cette remarquable merveille de la « nature » restera mignonne et docile. Désormais, elle nous appartient et elle s'appelle Gurr."
 cstorms.1510.a: "Merveilleux !"
 cstorms.1515.name: "La fin de Gurr"
 cstorms.1515.desc: "En raison de son corps atypique et génétiquement modifié, nous n'avons pas pu autoriser la créature à rester à bord du vaisseau scientifique. Le risque pour l'équipage était tout simplement trop grand et il n'était pas non plus exclu que son propriétaire mécontent la réclame. L'acte a été rapide et clément, et en même pas une fraction de seconde, son doux « gurr » a été réduit au silence à jamais.\n\nMême si cette décision était compréhensible pour l'équipage, elle les a affectés émotionnellement. Il faudra du temps à [Root.GetLeaderName] et aux autres pour se remettre de la perte de cet adorable petit monstre."
 cstorms.1515.a: "Nous n'avions pas le choix"
 cstorms.1515.evopred: "Conservons un échantillon de son ADN"
 cstorms.1520.name: "La fin de Gurr ?"
 cstorms.1520.desc: "Nous pensions avoir neutralisé l'adorable créature, mais ses remarquables propriétés régénératrices se sont avérées plus puissantes que nous ne l'avions imaginé.\n\nPeu après sa mort, ses tissus, que nous pensions inertes, ont produit deux copies identiques de la créature. Ces deux formes de vie n'ont montré aucun signe d'agressivité malgré que nous ayons voulu mettre fin à la vie de leur progénitrice.\n\nN'insistons pas davantage ou nous risquons de créer une armée de Gurrs. [Root.GetLeaderName] et l'équipage sont ravis de pouvoir garder ce duo de mignonnerie."
 cstorms.1520.a: "Nous avons retenu la leçon"
 ### The Imitator Event Chain
 cstorms.1550.name: "Pro de l'imitation"
 cstorms.1550.desc: "La capsule découverte sur [From.Planet.GetName] a été abandonnée à la tempête. Bien que sa signature de données ressemble à la nôtre, la capsule est indubitablement de nature étrangère. Nous avons répondu avec prudence aux tentatives de communication en émanant, mais avons été accueillis avec joie par l'habitant de la capsule.\n\n[event_target:the_imitator.GetHeSheCap] a expliqué qu'[event_target:the_imitator.GetHeShe] avait été emporté[event_target:the_imitator.GetXELead] par la tempête et que les systèmes de survie de son vaisseau étaient sur le point de rendre l'âme.\n\nLorsqu'[event_target:the_imitator.GetHeShe] a été invité[event_target:the_imitator.GetXELead] à s'identifier, [event_target:the_imitator.GetHeShe] a bizarrement prétendu faire partie de notre équipage. Cette affirmation est clairement un mensonge, étant donné que nous sommes au complet dans le vaisseau."
 cstorms.1550.a: "Ça suffit, détruisons la capsule"
 cstorms.1550.b: "Embarquons la capsule"
 cstorms.1555.name: "Pro de l'imitation"
 cstorms.1555.desc: "Nous avons fait monter la capsule de survie à bord de notre vaisseau. À son ouverture, l'individu se jeta au sol en nous suppliant, mettant fin à sa ruse.\n\n[event_target:the_imitator.GetHeSheCap] a expliqué qu'[event_target:the_imitator.GetHeShe] avait été pris[event_target:the_imitator.GetXELead] au piège dans la capsule lors d'une inspection de routine et éjecté[event_target:the_imitator.GetXELead] du vaisseau mère. Personne à bord ne remarqua son absence.\n\nLes mois passèrent et [event_target:the_imitator.GetHeShe] utilisa le peu de technologie qui se trouvait à bord de la capsule pour imiter les signaux énergétiques des vaisseaux qui passaient pour attirer l'attention. Mais personne ne vint. La capsule fut finalement prise dans une tempête cosmique et emportée à des années-lumière de son système natal. Poussé[event_target:the_imitator.GetXELead] à l'extrême par la solitude et la peur, [event_target:the_imitator.GetHeShe] décida de se faire passer pour un[event_target:the_imitator.GetXELead] membre d'équipage disparu[event_target:the_imitator.GetXELead] du premier vaisseau qui passerait. [event_target:the_imitator.GetHeShe] s'excusa sincèrement pour la supercherie, tout de même ravi[event_target:the_imitator.GetXELead] d'être en vie."
 cstorms.1555.a: "Une telle ingéniosité pourrait nous être utile"
 cstorms.1555.b: "Transférons-[event_target:the_imitator.GetLeLaLead] vers la planète habitée la plus proche"
 cstorms.1555.c: "Abandonnons-[event_target:the_imitator.GetLeLaLead] et gardons la capsule"
 the_imitator_category_desc: "Lors d'une récente mission d'exploration, une capsule de survie a été découverte. Curieusement, celle-ci a émis une signature de données qui correspond à la nôtre. La capsule semble avoir été déplacée par une tempête cosmique qui a récemment traversé le système. Une enquête plus approfondie est recommandée."
 #The Imitator Leader
 the_imitator_category: "Pro de l'imitation"
 the_imitator_catch_phrase: "Quelle joie d'être ici !"
 the_imitator_leader_desc: "Ramené à bord après avoir été emporté par une tempête cosmique, cet individu excentrique mais plein de ressources est capable d'utiliser toute situation à son avantage."
