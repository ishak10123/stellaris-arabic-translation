 #Civics
 civic_astrometeorology: "Astrométéorologie"
 civic_astrometeorology_desc: "Cette espèce éprouve un profond respect pour les forces de la nature et travaille d'arrache-pied pour tout savoir sur les phénomènes environnementaux. En parcourant les étoiles, elle porte un intérêt particulier à l'astrométéorologie. Les tempêtes cosmiques, événements astronomiques les plus fascinants et potentiellement les plus destructeurs, sont au cœur de ses ambitions.\n"
 civic_astrometeorology_effect_tooltip: "$t$- $AVAILABLE_BUILDINGS$ £building£['building:building_astrometeorology_observation_center']$TABBED_NEW_LINE$- $ADDITIONAL_BUILDINGS_STRING$ £building£§Y$building_astrometeorology_observation_center$§!"
 civic_astrometeorology_hive: "Modélisation du climat"
 civic_astrometeorology_hive_desc: "Alors que le collectif se dirige vers les étoiles, sa conscience est envoûtée par la vision de phénomènes astrométéorologiques. Ces drones agrandissent leur foyer dans un but noble : étudier les effets environnementaux et découvrir les merveilles des tempêtes cosmiques."
 civic_astrometeorology_hive_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_machine: "Modélisation du climat"
 civic_astrometeorology_machine_desc: "Cet empire mécanique comprend que les forces de la nature peuvent avoir un impact profond sur le collectif et travaille d'arrache-pied pour les étudier. Leurs modèles météorologiques décrivent chaque événement astronomique avec une précision méticuleuse, presque sacrée. L'accent est mis sur les événements astronomiques les plus fascinants et potentiellement les plus destructeurs : les tempêtes cosmiques."
 civic_astrometeorology_machine_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_megacorp: "Exploitation météorologique"
 civic_astrometeorology_megacorp_desc: "À quoi servent les phénomènes astrométéorologiques si on ne les exploite pas ? Cette mégacorporation est spécialisée dans l'acquisition de connaissances sur ces phénomènes et les vend au plus offrant."
 civic_astrometeorology_megacorp_effect_tooltip: "$civic_astrometeorology_effect_tooltip$ $TABBED_NEW_LINE$- £building£§Y$building_private_research_initiative$§! : $megacorp_civic_branch_office_building_effect$"
 civic_storm_callers: "Dévotion à la tempête"
 civic_storm_callers_desc: "Depuis la nuit des temps, cette société est capable d'attirer les tempêtes grâce à ses rituels. Au fur et à mesure de son évolution, elle les a combinés avec de nouvelles innovations technologiques afin d'accroître leur efficacité. Avec l'avènement de l'ère spatiale, elle tente désormais de porter ce savoir jusqu'aux étoiles."
 civic_storm_callers_effect_tooltip: "- $AVAILABLE_BUILDINGS$ £building£['building:building_storm_summoning_theater',théâtre attire-tempête]\n- Remplace les emplois d'[entertainer.GetIcon]§H[entertainer.GetNamePlural_lower]§! par des emplois de £job_storm_dancer£§Hdanseurs tempétueux§!.\n- $SPECIES_TRAITS$ ['trait:trait_storm_touched']"
 civic_storm_callers_megacorp: "Influenceurs tempêtes"
 civic_storm_callers_megacorp_desc: "Ce qui n'était au départ qu'une simple diffusion de rituels sacrés s'est depuis transformé en un gigantesque conglomérat médiatique Les voyants et les prêtres ont été remplacés par des influenceurs charismatiques prêts à tout pour attirer l'attention lors de la prochaine tempête cosmique."
 civic_storm_callers_megacorp_effect_tooltip: "$civic_storm_callers_effect_tooltip$\n- Le bâtiment de firme £building£§Y$building_amusement_megaplex$§! génère de la §Yvaleur de succursale§! supplémentaire et ajoute §G+50§! emplois de £job_merchant£§Ymarchands§! à votre capitale."
 mod_capital_storm_diplo_weight_mult: "$MOD_DIPLO_WEIGHT_MULT$lorsque la capitale est frappée par une §Ytempête cosmique§!"
 storm_devotion_diplo_weight_modifier: "$civic_storm_callers$"
 storm_devotion_corporate_diplo_weight_modifier: "$civic_storm_callers_megacorp$"
 civic_environmental_architects: "Aménageurs planétaires"
 civic_environmental_architects_desc: "Après avoir passé des éons à maintenir avec soin un équilibre parfait sur son monde natal, cette société est capable de vivre sur les mondes les plus inhospitaliers. Elle croit fermement que la nature peut être façonnée, contrôlée et perfectionnée, non pas pour la dompter, mais pour atteindre la beauté parfaite."
 civic_environmental_architects_negative_effect_tooltip: "- Le monde natal dispose de deux £blocker£§Hbloqueurs naturels§!."
 civic_environmental_architects_effect_start: "- $ADDITIONAL_TECHNOLOGIES_STRING$ les £society£§Htechnologies§! pour retirer les £blocker£['concept_natural_blockers',bloqueurs naturels] du §Hmonde natal§!.\n- Les £society£§Htechnologies§! de suppression des £blocker£§Hbloqueurs naturels§! sont disponibles en tant qu'§Hoptions de recherche permanentes§! lors de la colonisation.\n- L'['concept_ascension_perk',atout de l'ascension] §HMaîtrise de la nature§! est remplacé par la ['concept_decision',décision] planétaire §H$decision_cultivated_worldscaping$§!.\n- Pour chaque £blocker£§Hbloqueur naturel§! sur un £planet£['concept_planet',monde] colonisé :"
 civic_environmental_architects_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$- Ressources des emplois : §R-10%§!\n$t$- Vitesse de dév. des pops : §R-10%§!\n$t$- Entretien des pops : §R+15%§!"
 civic_environmental_architects_hive: "Drones de culture"
 civic_environmental_architects_hive_desc: "Faire partie d'un grand organisme permet à ces drones de découvrir des opportunités dans le plus grand organisme de tous : la nature. Ils essaient de contrôler et de façonner les systèmes naturels selon les désirs du collectif."
 civic_environmental_architects_hive_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$- Ressources des emplois : §R-10%§!\n$t$- Assemblage des pops : §R-10%§!\n$t$- Entretien des pops : §R+15%§!"
 civic_environmental_architects_machine: "Protocoles de jardinage"
 civic_environmental_architects_machine_desc: "Bien que les créateurs organiques aient depuis longtemps disparu, leurs créations mécaniques ont toujours un penchant pour l'esthétique à l'ancienne. La nature est un terrain fertile pour le perfectionnisme programmé."
 civic_environmental_architects_machine_effect_tooltip: "$civic_environmental_architects_hive_effect_tooltip$"
 civic_environmental_architects_megacorp: "Géo-ingénierie S.A."
 civic_environmental_architects_megacorp_desc: "Les employés de cette mégacorporation sont habitués à vivre dans une cage dorée et le groupe en construira donc une partout où ils iront."
 civic_environmental_architects_megacorp_effect_tooltip: "$civic_environmental_architects_effect_tooltip$\n- £building£§Y$building_executive_retreat$§! : $megacorp_civic_branch_office_building_effect$"
