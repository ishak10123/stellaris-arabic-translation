 ###########################################
 #Anomalies #
 ###########################################
 STORMS_ANOM_ANTS: "La comète organique"
 STORMS_ANOM_ANTS_DESC: "Une tempête cosmique a laissé derrière elle une comète à la composition inhabituelle. Elle semble être composée de matière organique. Nos [solar_system.Owner.GetScientistPlural] ont hâte de l'étudier."
 cstorms.5020.name: "Astéroïde fourmilière"
 cstorms.5020.desc: "Il s'avère que la comète est un nid géant habité par de minuscules insectes. La queue de la comète n'est pas constituée de glace dégazée, mais de gaz issu des processus chimiques qui se produisent à l'intérieur.\n\nLa couche extérieure du nid est constituée d'individus morts qui protègent l'intérieur des conditions rudes de l'espace. Nous avons également découvert différentes espèces de champignons dans et autour du nid. Nous sommes face à une symbiose complexe, les champignons se nourrissant des gaz produits par les insectes qui se nourrissent à leur tour des champignons."
 cstorms.5020.a: "Récupérons le nid"
 cstorms.5020.b: "Observons-le sans y toucher"
 STORMS_ANOM_STAT: "Une composition déroutante"
 STORMS_ANOM_STAT_DESC: "Cet objet a été abandonné par une tempête cosmique qui passait par là. Il ressemble à une station spatiale, mais les premiers scanners donnent des résultats pour le moins déroutants. Une analyse plus approfondie est recommandée."
 cstorms.5030.name: "Apocalypse stationnaire"
 cstorms.5030.desc: "Nos [Root.Owner.GetScientistPlural] rapportent qu'une grande partie de la station spatiale semble être constituée d'objets stationnaires ordinaires qui la maintiennent à peine debout. Plus à l'intérieur, la composition change : alliages métalliques, plastiques et autres substances.\n\nAu coeur de la construction, nos [Root.Owner.GetScientistPlural] ont trouvé une machine toujours active. Elle déconstruit la matière organique et la transforme en objets, comme ceux vus plus tôt.\n\nSuite à une analyse ADN, nos [Root.Owner.GetScientistPlural] ont conclu que la matière provenait des anciens habitants de cet avant-poste."
 cstorms.5030.evopred: "Essayons d'en tirer le meilleur parti"
 STORMS_ANOM_BRAIN: "Dissipation existentielle"
 STORMS_ANOM_BRAIN_DESC: "Depuis que ce système a été frappé par une tempête du Suaire, nous recevons d'étranges signaux. Toutefois, lorsque nos [Root.Owner.GetScientistPlural] ont essayé d'y répondre, ils ont soudainement disparu. Il faudrait envoyer un vaisseau scientifique."
 cstorms.5025.name: "Tempête cérébrale"
 cstorms.5025.desc: "Nous n'aurions jamais pu prévoir que nous découvririons des cerveaux. Des organes de traitement central organiques de différentes espèces. Des centaines et des centaines d'entre eux, reliés les uns aux autres et suspendus dans une grande capsule en forme de ballon. L'endroit semble avoir été abandonné et flotte dans les profondeurs de l'espace depuis que la récente tempête du Suaire s'est dissipée.\n\nLa capsule contient une quantité incroyable de capteurs attachés aux cerveaux et au ballon, et il y a même un module de communication capable d'appeler des vaisseaux et de transmettre des informations. C'est ce qu'il a fait avec nous.\n\nLa cacophonie de messages semble provenir des cerveaux eux-mêmes, qui ont tenté d'entrer en contact avec nous. Nos [Root.Owner.GetScientistPlural] estiment que la construction a été conçue pour mesurer les réactions des êtres organiques à une tempête du Suaire. Cependant, étant donné l'instabilité des résidus psioniques présents dans ces consciences flottantes, se connecter à elles serait une catastrophe."
 #Terrestrial Telescopes
 terrestial_telescope_category: "Télescopes terrestres"
 terrestial_telescope_category_desc: "Les scans effectués par la flotte [fleet.GetName] ont révélé une station spatiale en ruine dans le système [From.GetStarName].\n\nElle semble avoir été laissée là par une tempête cosmique. Il n'y a aucun signe de vie et aucun autre signal n'a pu être capté. Deux énormes télescopes dépassent de chaque côté de la station. Ces instruments optiques sont extrêmement avancés et semblent bien trop grands par rapport à la taille de la station. Leur technologie et leur architecture ne nous sont pas familières.\n\nNous pourrions essayer de réactiver ces télescopes dans l'espoir d'obtenir des informations intéressantes."
 cstorms.1605.name: "Télescopes terrestres"
 cstorms.1605.desc: "Entrer dans la station et activer les télescopes a exigé quelques efforts de nos [Root.Owner.GetScientistPlural], mais rien d'impossible. Les instruments n'étaient dirigés vers rien de notable.\n\nNos [Root.Owner.GetScientistPlural] ont toutefois trouvé quelques artefacts intéressants dans la station : des images détaillées prises par les télescopes et présentées dans des cadres décoratifs, toutes illustrant des tempêtes cosmiques ayant frappé ce système. Les astronomes ont utilisé différents angles, niveaux de zoom et même inclinaisons pour montrer les tempêtes sous leur meilleur jour.\n\nCes oeuvres d'art semblent toutefois être les seules découvertes intéressantes à bord de la station abandonnée. Nous allons les archiver pour que les générations futures puissent également profiter de ces images expressives de beauté."
 STORMS_ANOM_POLYCHROMATIC: "Étoile polychrome"
 STORMS_ANOM_POLYCHROMATIC_DESC: "Le passage d'une tempête cosmique à travers le système de [from.solar_system.GetName] a transformé l'apparence de son étoile. Depuis la tempête, sa couche coronale ressemble à un tourbillon de couleurs changeantes, produisant des éruptions polychromes dans toutes les directions. Ce phénomène mérite une analyse plus approfondie."
 cstorms.5035.name: "$STORMS_ANOM_POLYCHROMATIC$"
 cstorms.5035.desc: "[root.leader.GetName] fait état de changements fascinants dans les réactions de [from.GetStarName] depuis le passage de la [from.GetAffectedStormType].\n\nCelle-ci aurait provoqué des réactions nucléaires inattendues au coeur de l'étoile, entraînant une libération régulière de [from.GetEarnedResources].\n\nCes réactions complexes et idiosyncrasiques sont à l'origine des éruptions polychromes précédemment observées. Quoi qu'il en soit, ce phénomène reste une source d'étude digne d'intérêt."
 cstorms.5035.a: "Étudions ces nouveaux processus"
 cstorms.5035.b: "Récupérons ces nouvelles ressources"
 STORMS_ANOM_TRIPLETS: "Trio d'astéroïdes"
 STORMS_ANOM_TRIPLETS_DESC: "À la suite d'une tempête cosmique, trois nouveaux astéroïdes ont fait leur apparition dans le système de [from.solar_system.GetName]. Ces corps célestes présentent des changements de direction inexpliqués, ce qui rend leur trajectoire impossible à prédire. Des recherches supplémentaires seront nécessaires."
 cstorms.5040.name: "$STORMS_ANOM_TRIPLETS$"
 cstorms.5040.desc: "[root.leader.GetName] a découvert que les astéroïdes déposés dans le système de [from.solar_system.GetName] ont des champs magnétiques très instables, ce qui les fait rebondir aléatoirement sur les magnétosphères du système.\n\n[root.leader.GetName] a réussi à les stabiliser en leur ajoutant des compensateurs magnétiques, régulant ainsi leur trajectoire et rendant possible l'extraction de leurs ressources."
 STORMS_ANOM_TRAVELLERS: "Signal de détresse"
 STORMS_ANOM_TRAVELLERS_DESC: "Après la §H[from.GetAffectedStormType]§!, un signal de détresse non identifié a été détecté dans le système de §H[from.solar_system.GetName]§!."
 cstorms.5050.name: "Voyageurs déplacés"
 cstorms.5050.desc: "Nous avons identifié la source du signal de détresse détecté dans le système de §H[from.solar_system.GetName]§!. Il s'agit d'un vaisseau marchand très endommagé mais toujours opérationnel.\n\nSes occupants affirment avoir été déviés de leur trajectoire par la §H[from.GetAffectedStormType]§!. Celle-ci a également grillé leurs moteurs, laissant le vaisseau et son contenu à la dérive dans l'espace.\n\nIls sont prêts à céder une partie de leur cargaison en échange de notre aide."
 cstorms.5050.a: "Aidons-les"
 cstorms.5050.evopred: "Nous les aiderons en échange de quelques échantillons d'ADN"
 cstorms.5050.b: "Souhaitons-leur bonne chance"
 cstorms.5050.c.genocide: "Prenons leur vie et leur cargaison"
 cstorms.5050.d.devouring_swarm: "Un repas gratuit"
 STORMS_COSMIC_SLUDGE: "Boue cosmique"
 STORMS_COSMIC_SLUDGE_DESC: "Les capteurs de masse qui surveillent le système de §H[from.solar_system.GetName]§! affichent des relevés irréguliers depuis le passage de la §H[from.GetAffectedStormType]§!.\n\nLes diagnostics du système ne montrent aucun signe d'erreur technique. Ces relevés doivent faire l'objet d'un examen plus approfondi."
 cstorms.5060.name: "$STORMS_COSMIC_SLUDGE$"
 cstorms.5060.desc: "Les relevés irréguliers du système de §H[from.solar_system.GetName]§! proviennent d'un champ de débris inhabituel laissé par la §H[from.GetAffectedStormType]§!.\n\nCette entité flottante est une masse informe de boue cosmique, générée par les pressions extrêmes de la tempête. Les nombreux éléments qui la composent ont réagi entre eux de manière unique.\n\nUne étude ciblée de sa composition chimique pourrait nous fournir de précieuses informations astrométéorologiques sur les circonstances de sa formation."
 cstorms.5060.a: "Étudions sa composition"
 cstorms.5060.b: "Détruisons-la"
 STORMS_SHATTERED_SATTELITE: "Satellite détruit"
 STORMS_SHATTERED_SATTELITE_DESC: "Après la §H[from.GetAffectedStormType]§!, un objet non identifié a été détecté dans le système de §H[from.solar_system.GetName]§!. Une étude plus approfondie des débris pourrait nous fournir de précieuses informations."
 cstorms.5070.name: "$STORMS_SHATTERED_SATTELITE$"
 cstorms.5070.desc: "L'objet trouvé dans le système de §H[from.solar_system.GetName]§! est un ancien satellite équipé de réseaux complexes de capteurs astrométéorologiques. Nous pensons qu'il a été transporté à travers la galaxie par la récente §H[from.GetAffectedStormType]§!.\n\nMême si le satellite lui-même est si endommagé que nous ne pouvons pas le réparer, ses bases de données contiennent une mine d'informations que nous pouvons utiliser pour nos propres recherches.\n\nLe reste ne peut être récupéré que sous forme de pièces détachées."
 STORMS_EVISCERATED_FAUNA: "Objet inconnu"
 STORMS_EVISCERATED_FAUNA_DESC: "Nos capteurs dans le système de §H[from.solar_system.GetName]§! ont détecté un objet inconnu apporté par la récente §H[from.GetAffectedStormType]§!.\n\nUne enquête plus approfondie est nécessaire pour identifier la nature de cette anomalie."
 cstorms.5080.name: "Débris organiques"
 cstorms.5080.desc.common: "Une première étude a révélé que l'objet inconnu trouvé dans le système de §H[from.solar_system.GetName]§! est une énorme masse de matière organique, provenant probablement d'un être organique né dans l'espace. La tempête cosmique ayant tout déchiqueté, il est impossible d'identifier ces restes."
 cstorms.5080.desc.swarm: "Par chance, la majorité d'entre eux sont encore comestibles"
 cstorms.5080.desc.default: "[leader.GetName] pense qu'une étude médico-légale plus approfondie des restes organiques permettra d'en savoir plus sur l'origine de cette créature et sur les effets qu'une §Y[from.GetAffectedStormType]§! peut avoir sur des organismes spatiaux similaires."
 cstorms.5080.a: "Nous avons faim"
 cstorms.5080.b: "Effectuons une autopsie sur place"
 cstorms.5080.c: "Débarrassons-nous des restes"
 FORENSIC_DISSECTION_PROJECT: "Dissection médico-légale"
 FORENSIC_DISSECTION_PROJECT_DESC: "Nous avons découvert les restes d'une créature inconnue dans le système de §H[solar_system.GetName]§!, emportés par une tempête cosmique à travers la galaxie. Une dissection médico-légale devrait permettre d'en savoir plus."
 cstorms.5085.name: "$FORENSIC_DISSECTION_PROJECT$"
 cstorms.5085.desc: "Même après une dissection minutieuse, l'espèce à laquelle appartient cette masse viscérale reste un mystère. L'épicentre de la tempête a complètement détruit toutes caractéristiques reconnaissables et marqueurs génétiques.\n\nNous avons tout de même pu obtenir des éclaircissements sur la composition des §Ytempêtes cosmiques§! et leurs effets dévastateurs sur la matière xénobiologique."
 cstorms.5085.evopred: "Un déjeuner exceptionnel"
 STORMS_DISPLACED_TIYANKI: "Tiyanki emportés par la tempête"
 STORMS_DISPLACED_TIYANKI_DESC: "Après le passage de la tempête cosmique, nos capteurs ont détecté les signatures de trois tiyanki dans le système de §H[solar_system.GetName]§!."
 cstorms.5090.name: "$STORMS_DISPLACED_TIYANKI$"
 cstorms.5090.desc.common: "Les trois signatures de tiyanki détectées dans le système de §H[solar_system.GetName]§! sont des veaux sous-alimentés qui ont été emportés par la tempête.\n\nLa §Ytempête cosmique§! les a séparés de leur banc et les voilà livrés à eux-mêmes.\n\nIl y a peu de chances qu'ils survivent longtemps dans l'espace. Nos capteurs indiquent qu'ils tentent d'appeler leur banc, en vain."
 cstorms.5090.desc.swarm: "Nous pourrions amplifier leurs appels à l'aide et les utiliser comme appâts pour un énorme festin."
 cstorms.5090.desc.default: "Nos systèmes de communication pourraient amplifier leurs appels à l'aide pour attirer le banc dans le système."
 cstorms.5090.a.default: "Amplifions leurs signaux"
 cstorms.5090.a.swarm: "Mettons le piège en place"
 cstorms.5090.b.default: "La nature est cruelle"
 cstorms.5090.b.machine: "Lançons les protocoles d'extermination"
 cstorms.5090.b.swarm: "Un repas gratuit"
 cstorms.5090.c: "Donnez-leur un nouveau foyer"
 cstorms.5090.c.tt: "Ajoute 3 §Ygénisses tiyanki§! de rareté aléatoire à votre ['concept_vivarium',vivarium]"
 REUNITE_POD_PROJECT: "Réunir le banc"
 REUNITE_POD_PROJECT_DESC: "Trois veaux tiyanki ont été séparés de leur banc par une tempête cosmique et errent désormais dans le système de [this.solar_system.GetName]. Nous pouvons les aider à retrouver leur banc en amplifiant leurs appels à l'aide."
 cstorms.5095.name: "Tiyanki réunis"
 cstorms.5095.desc.common: "Une vache et un taureau tiyanki sont apparus dans le système de §H[solar_system.GetName]§! après avoir entendu les appels à l'aide, amplifiés par nos soins, des trois veaux perdus.\n\nLes jeunes tiyanki ont retrouvé leur banc et semblent déjà beaucoup plus heureux et en meilleure santé qu'auparavant.\n\nLa vache tiyanki a laissé une grande quantité de débris à proximité de notre vaisseau scientifique, manifestement pour nous remercier de notre aide. À notre grande surprise, ceux-ci contiennent quelques matériaux utilisables."
 cstorms.5095.desc.swarm: "Bien sûr, ces énormes créatures sont nos véritables proies, nous allons les abattre."
