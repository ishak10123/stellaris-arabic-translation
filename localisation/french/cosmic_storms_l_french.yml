 cstorms.2295.a: "Laissons [Root.GetLeaderName] faire"
 cstorms.2295.b: "Empêchons [Root.GetLeaderName] de réessayer"
 cstorms.2295.a.psionic: "Leurs victimes pleurent encore"
 cstorms.2295.a.psionic_gestalt: "Leurs voix unifiées hurlent encore de douleur"
 cstorms.2295.a.gestalt: "La discorde est la graine du chaos"
 cstorms.2300.name: "Et tout est dit"
 cstorms.2300.desc: "Nous travaillons d'arrache-pied pour accéder à la dernière section de l'$building_adakkaria_patriotic_institute$. Entre-temps, un rapport troublant nous est parvenu des laboratoires inférieurs. Les scientifiques d'adAkkaria ont affirmé qu'une « étincelle » existait dans chaque être, peut-être même dans les machines conscientes. Inspirés par les tempêtes cosmiques, ils ont appelé cette force la « tempête intérieure » : un tourbillon de désir et de puissance qui anime tout être conscient. Exposer la tempête intérieure à des expériences extrêmes permettrait de libérer un immense pouvoir.\n\nAlors qu'il était prisonnier de guerre, §SalAtta Landeer§! a été le premier à le découvrir. En tant que scientifique, il a convaincu le Commandement Exalté de financer des études supplémentaires dans l'Institut patriotique de la Célébration. Bien que les archives n'expliquent pas ce qui est arrivé à §SLandeer§!, nous savons, d'après ce qu'il s'est passé au cimetière de vaisseaux, qu'il a connu un destin tragique.\n\nD'autres rapports font référence à une manière plus efficace de libérer la tempête intérieure. Un moyen qui n'exigeait pas une cruauté physique extrême, mais qui s'appuyait plutôt sur l'invocation d'une terreur inéluctable et mortelle chez la victime. Afin d'amorcer l'effet à grande échelle, la Convention prévoyait d'émettre un signal via son vaste réseau de stations de propagande."
 cstorms.2300.desc.psionic: "Nous avons réussi à enregistrer les murmures psioniques des plateformes d'observation :\n\n§LSortez-moi d'ici, s'il vous plaît, j'ai toujours été un honnête citoyen !\nMes rêves ne sont plus qu'une tempête sans fin. Elle m'appelle.\nJe ne comprends pas. Nous avons fait tout ce qu'ils voulaient, pourquoi nous font-ils cela ?\nUn pouvoir sommeille en chacun de nous. Ils veulent l'exploiter. Nous ne devons pas le leur donner.\nC'est absurde, ils font cela pour sauver la Convention de la bienfaisance. Nous devons suivre leurs instructions.\nLes satellites me parlent. Je peux maintenant atteindre toute la galaxie avec mon esprit.\nJ'ai vu qu'ils avaient développé quelque chose. Quelque chose qui pourrait faire ça à tout le monde, partout.\nNous serons sauvés. Contentez-vous de leur donner ce qu'ils veulent !\nVous ne comprenez pas... Ils nous font ça pour ensuite le faire à tout le monde.\nNous pourrions nous libérer nous-mêmes.\nMais cela signifie que nous...\nIls nous tueront de toute façon. Une fois que cette Chose sera opérationnelle. Ils nous tueront tous.\nJ'ai peur, je ne veux pas mourir. Je veux vivre. S'il vous plaît.\nLa phase finale me parle. Ils veulent savoir si nous sommes d'accord.§!"
 cstorms.2300.b: "Nous devons nous emparer de ce pouvoir"
 cstorms.2300.a.psionic: "Quel triste sort !"
 cstorms.2300.a.psionic_hive_robot: "Un dénouement malheureux"
 cstorms.2300.b.psionic: "Rien n'est plus noble qu'un sacrifice !"
 cstorms.2300.b.psionic_hive_robot: "C'est un noble sacrifice"
 cstorms.2305.name: "L'Invocateur de tempêtes"
 cstorms.2305.desc.start: "Nous avons découvert un immense hangar. Une constellation incroyablement complexe de fils, de tuyaux et de composants électroniques occupait presque tout l'espace, le tout menant à un silo à missiles massif, mais vide. À en juger par sa taille, ce réseau devait être relié à un objet aussi grand qu'une corvette.\n\nLes registres indiquent qu'un appareil appelé §lInvocateur de tempêtes§! a été assemblé ici et qu'il a été déployé avec succès dans le système adSul. Bien que le contact avec l'Invocateur semble avoir été perdu, sa §Gsource d'énergie§! est toujours opérationnelle."
 cstorms.2305.desc.end.default: "Lorsque notre équipage a lu le nom de l'appareil, il a été submergé par un sentiment de colère irrationnel et a commencé à arracher les câbles et les panneaux. Il n'a pas été facile de les calmer. Nous nous rapprochons de plus en plus de la vérité !"
 cstorms.2305.desc.end.psionic: "Alors que [Root.GetLeaderName] approchait la construction vide, les murmures psioniques ont repris.\n§LVous le voyez, n'est-ce pas ? Au début, nous ne savions pas ce qu'ils construisaient. Nous ne savions pas qu'ils allaient se débarrasser de nous. Certains voulaient se venger. Certains voulaient être libres. Certains ont ressenti l'appel des tempêtes. Il fallait que ça cesse, vous comprenez. Il le fallait. Nous n'en pouvions plus.§!"
 cstorms.2305.desc.end.gestalt: "En lisant le nom de l'appareil, nos [controller.GetIndividualNamePlural] d'exploration ont établi comment l'§lInvocateur de tempêtes§! avait été activé et par quelle méthode son signal avait circulé à travers les nombreuses stations de propagande avant d'enfin atteindre sa cible.\n\nEt nous n'étions pas à l'abri de ce destin."
 cstorms.2305.desc.default: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.default$"
 cstorms.2305.desc.psionic: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.psionic$"
 cstorms.2305.desc.gestalt: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.gestalt$"
 cstorms.2310.name: "La phase finale"
 cstorms.2310.desc.start: "L'Institut de la Célébration nous a enfin révélé le dernier de ses secrets : la phase finale.\n\nDans les couloirs, les corps desséchés du personnel d'adAkkaria étaient éparpillés sur le sol, déchiquetés par des pierres, du métal, du plastique et autres déchets. Quelque chose a fait des ravages dans ces couloirs, décimant tout sur son passage.\n\n"
 cstorms.2310.desc.piece.default: "Mais la véritable horreur restait à venir."
 cstorms.2310.desc.piece.authgen: "Mais le plus beau restait à venir."
 cstorms.2310.desc.end: "\nUne demi-douzaine d'individus étaient enfermés dans des cellules. Les écrans les décrivaient comme étant la §Gsource d'énergie de l'Invocateur§!. Il s'agissait manifestement de jeunes citoyens de la Convention, dont les petits corps étaient reliés à des dizaines de tuyaux et de câbles. Le liquide contenu dans les cellules les maintenait entre la vie et la mort, leurs corps étant entourés d'une force semblable à l'énergie mesurée au sein de la tempête perpétuelle du système adSul.\n\nLes quelques écrans encore fonctionnels se sont alors animés et ont affiché une requête :\n§LSOUVENEZ-VOUS DE NOUS | PRONONCEZ NOS NOMS | PRONONCEZ NOS NOMS.§!\n\nNous avons consigné les noms de ces jeunes gens. Le dernier, cependant, nous a fait réfléchir : §SenRida Direen§!, l'individu de la Bienfaisance Exaltée qui a éteint un incendie avec son esprit.\n\nArmés de ces noms, nous devrions être en mesure de recontacter la tempête cosmique."
 cstorms.2310.desc.default: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.default$ $cstorms.2310.desc.end$"
 cstorms.2310.desc.authgen: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.authgen$ $cstorms.2310.desc.end$"
 cstorms.2310.a: "Excellent travail !"
 #The Storm's Swansong
 cstorms.2320.name: "La tempête"
 cstorms.2320.desc: "PRONONCEZ NOS NOMS\n\nPRONONCEZ NOS NOMS\n\nPRONONCEZ | NOS | NOMS"
 cstorms.2320.a: "Nous avons vu ce que la Convention vous a fait"
 cstorms.2320.b: "Qu'est-il arrivé à la Convention d'adAkkaria ?"
 cstorms.2320.c: "Où se trouve l'Invocateur de tempêtes ?"
 cstorms.2320.d: "Nous connaissons vos noms"
 cstorms.2320.a.resp: "ILS N'ARRÊTAIENT PAS\n\nDOULEUR ET COLÈRE ET TRISTESSE ET PEUR\n\nDES DENTS DES MÂCHOIRES\nNOUS DÉVORANT ET NOUS RECRACHANT\n\nDOULEUR ET COLÈRE ET TRISTESSE ET PEUR\n\nNOUS AVONS ÉTÉ DÉFAITS NOUS AVONS CESSÉ D'ÊTRE NOUS SOMMES DEVENUS\n\nDOULEUR ET COLÈRE ET TRISTESSE ET PEUR"
 cstorms.2320.b.resp: "COMPLAISANTE ET AUTORITAIRE ET IMPITOYABLE\nFIÈRE | CRUELLE | DÉTERMINÉE\nAPPORTANT LA MORT APPORTANT LA SOUFFRANCE\n\nNOUS DEVIONS NOUS DEVIONS NOUS DEVIONS NOUS DEVIONS NOUS DEVIONS\nÊTRE | NE PAS ÊTRE | NE PLUS ÊTRE\n\nNOUS\nPAR LES TRANSMISSIONS | CORROMPRE LE SIGNAL | CORROMPRE L'ESPRIT\nSUCCOMBER À L'OBSCURITÉ | AU BLANC | AU GRIS | AU NOIR\nDISPERSÉS DANS LES ÉTOILES ET DISPARUS À JAMAIS"
 cstorms.2320.c.resp: "NOUS\nSOMMES UN BOUCLIER | VOUS PROTÉGEONS\n\nNOUS\nFORMONS UN BERCEAU | BERCEZ-LE\n\nET BALANCEZ-LE DANS L'OUBLI | SOMMEIL SOMMEIL SOMMEIL DISPARITION\n\n§lTEMPÊTE§! §RABOMINATION§!\nET NE JAMAIS SE RÉVEILLER"
 cstorms.2325.desc: "PRONONCEZ NOS NOMS | PRONONCEZ NOS NOMS | PRONONCEZ NOS NOMS\n\nIMMÉDIATEMENT §g(IMMÉDIATEMENT)§! IMMÉDIATEMENT §g(IMMÉDIATEMENT)§!\n\nPRONONCEZ NOS NOMS | PRONONCEZ NOS NOMS | PRONONCEZ NOS NOMS\n\nPRONONCEZ | NOS | NOMS | IMMÉDIATEMENT"
 cstorms.2325.d: "Très bien, vos noms sont..."
 cstorms.2330.desc: "§LNous citons tous les noms que nous avons trouvés lors de nos recherches. Lorsque nous prononçons le dernier, la tempête se tait.§!"
 cstorms.2330.a: "Vous êtes toujours là ?"
 cstorms.2335.desc: "Nous pouvons à nouveau penser ! §g(penser penser penser)§!\nIl y a tant de voix autour de nous ! §g(pensant parlant désirant rêvant)§!\nTellement d'individus §g(vous et moi et eux)§!\n\nVous nous avez rendu la raison §g(en voyageant décryptant explorant)§!\nMais maintenant que vous avez prononcé nos noms, vous avez le contrôle... §g(non, ça recommence !)§!\nQu'attendez-vous de nous ? §g(laissez-nous partir laissez-nous partir laissez-nous partir)§!"
 cstorms.2335.a: "Vous êtes libres à présent"
 cstorms.2335.b: "Soumettez-vous et remettez-nous l'Invocateur de tempêtes !"
 cstorms.2340.desc: "Libres.\n\nVous voulez nous laisser partir ? §g(Libres ?)§!\n\nImpossible. §g(C'est impossible.)§!\nVous devez faire erreur. §g(Et l'Invocateur de tempêtes ?)§!"
 cstorms.2340.a: "Il doit être détruit"
 cstorms.2345.desc: "Douleur et colère et tristesse et peur. §g( DOULEUR | COLÈRE | TRISTESSE | PEUR )§!\n\nNous ne sommes bons qu'à cela.\n\nNOUS NE SOMMES BONS QU'À CELA DOULEUR COLÈRE TRISTESSE PEUR\n§gDOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR DOULEUR TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE PEUR DOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE DOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR DOULEUR TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE PEUR PDOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE PEUR DOULEUR COLÈRE TRISTESSE§!"
 cstorms.2345.a: "Parlez autant que vous voulez, vous êtes nos serviteurs éternels"
 cstorms.2350.name: "La tempête n'est plus"
 cstorms.2350.desc: "La tempête a créé un trou en elle, nous révélant l'§lInvocateur de tempêtes§!. Comment un si petit appareil a-t-il pu être l'objet de tant de désirs, de luttes et de sacrifices ? Sa simple existence a déclenché la chute d'un grand empire.\n\nAvec une simple série de commandes, nous avons activé sa routine d'autodestruction. Alors que l'explosion s'estompait et que les débris se dispersaient dans le système, la tempête a commencé à se calmer et l'étrange voile qui recouvrait le monde natal de la Convention d'adAkkaria s'est dissipé.\n\nLe long cauchemar a enfin pris fin."
 cstorms.2350.a: "Que vos noms restent à jamais gravés dans nos mémoires"
 cstorms.2355.name: "Douleur, colère, tristesse et peur"
 cstorms.2355.desc: "La tempête faisait rage et bouillonnait, mais elle ne pouvait nous faire aucun mal. À l'§lInvocateur de tempêtes§! non plus.\n\nNous avons ordonné aux voix qui y sont prises au piège de nous frayer un chemin à travers le maelström et avons revendiqué la plus grande création de la Convention.\n\nLe monde natal d'adAkkaria est cependant resté inaccessible ; la voie vers l'$building_adakkaria_patriotic_institute$ est désormais à jamais barrée. Mais les cris de la tempête sont restés gravés dans notre esprit.\n\nDouleur, colère, tristesse et peur.\nLa galaxie les apprendra aussi."
 cstorms.2355.a: "Des sacrifices doivent être faits"
 MESSAGE_INSTITUTE_SPAWNED_STORM_TITLE: "Tempête invoquée"
