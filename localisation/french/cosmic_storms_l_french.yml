 #Storm Technology
 tech_storm_manipulation: "Manipulation des tempêtes"
 tech_storm_manipulation_desc: "Grâce à la maîtrise des principes des technologies d'atténuation des tempêtes, nous pouvons manipuler la nature astrométéorologique de la galaxie pour l'adapter à nos besoins."
 tech_advanced_storm_manipulation: "Manipulation des tempêtes avancée"
 tech_advanced_storm_manipulation_desc: "L'étude continue de l'astrométéorologie nous donne le pouvoir de contrôler et manipuler les §Ytempêtes cosmiques§! avec plus de précision et selon nos besoins."
 tech_industrial_storm_protection: "Atténuation des tempêtes planétaires"
 tech_industrial_storm_protection_desc: "Ce noeud de communication météorologique réduit les effets des catastrophes météorologiques cosmiques, atténuant ainsi l'impact des tempêtes galactiques sur la production."
 tech_advanced_industrial_storm_protection: "Régulation des tempêtes planétaires"
 tech_advanced_industrial_storm_protection_desc: "En reliant plusieurs systèmes de contrôle climatiques locaux, il est possible de manipuler les schémas météorologiques planétaires, ce qui réduit considérablement la plupart des effets négatifs des tempêtes cosmiques sur la production."
 tech_storm_prediction_1: "Schémas météorologiques cosmiques"
 tech_storm_prediction_1_desc: "Grâce à la modélisation météorologique scientifique, nous pouvons suivre la trajectoire et la formation des §Ytempêtes cosmiques§! imminentes."
 tech_storm_prediction_1_title: "§HPermet§! de prédire les tempêtes cosmiques"
 tech_storm_prediction_1_tooltip: "Permet de §Yprédire l'apparition de tempêtes cosmiques§! et de §Yprédire la trajectoire des tempêtes cosmiques§! sur la §Ycarte de prévision météorologique§!"
 tech_storm_prediction_2: "Courant de probabilité"
 tech_storm_prediction_2_desc: "En appliquant les courants de probabilité à nos modèles climatiques scientifiques, notre capacité à suivre la trajectoire et l'apparition des §Ytempêtes cosmiques§! imminentes augmente considérablement."
 tech_storm_prediction_2_title: "§HAméliore la fonctionnalité§! Prédire les tempêtes cosmiques"
 tech_storm_prediction_2_tooltip: "Optimise la portée des fonctionnalités §YPrédire l'apparition de tempêtes cosmiques§! et §YPrédire la trajectoire des tempêtes cosmiques§! sur la §Ycarte de prévision météorologique§!"
 tech_ship_hull_storm_breaker_1: "Générateurs anti-tempête"
 tech_ship_hull_storm_breaker_1_desc: "Ces générateurs créent un champ de résorption qui protège les vaisseaux traversant des tempêtes cosmiques."
 tech_ship_hull_storm_breaker_2: "Revêtement anti-tempête"
 tech_ship_hull_storm_breaker_2_desc: "Ce revêtement spécial charge l'extérieur du vaisseau d'un champ de résorption, augmentant ainsi la protection contre les tempêtes cosmiques."
 tech_ship_storm_weapons_1: "Protection de l'armement"
 tech_ship_storm_weapons_1_desc: "Une nouvelle approche de l'utilisation des alliages dans les champs d'application militaires réduit considérablement la capacité des tempêtes cosmiques à perturber les armes énergétiques et les projectiles explosifs."
 tech_ship_storm_weapons_2: "Architecture anti-tempête"
 tech_ship_storm_weapons_2_desc: "Cette nouvelle architecture de vaisseau réduit considérablement les effets négatifs des tempêtes cosmiques sur les systèmes d'armement."
 feature_sustain_cosmic_storm_unlocked: "Maintenir les tempêtes cosmiques"
 feature_sustain_cosmic_storm_unlocked_desc: "Permet à nos vaisseaux scientifiques de dissiper et de maintenir indéfiniment les §Ytempêtes cosmiques§!."
 FLEETORDER_SUSTAIN_COSMIC_STORM: "Maintient la tempête cosmique $STORM|Y$ dans le système de $SYSTEM|Y$"
 FLEETORDER_SUSTAIN_COSMIC_STORM_BUTTON: "Maintenir la §Ytempête cosmique§!"
 FLEETORDER_SUSTAIN_COSMIC_STORM_CANCELLED: "§RLa tempête cosmique suivie s'est dissipée.§!"
 #Map Mode
 storm_map_mode: "Mode prévision météorologique"
 storm_map_mode_desc: "Le mode prévision météorologique affiche toutes les tempêtes, prévisions et champs d'influence sur la carte de la galaxie."
 #Cosmic Storm Gateway Tech
 gateway_tech_advanced_storm_manipulation: "§HCheminement de la manipulation des tempêtes§!\n§ECette technologie va permettre des avancées majeures dans le domaine de la manipulation des tempêtes.§!"
 gateway_tech_advanced_industrial_storm_protection: "§HCheminement de la protection contre les tempêtes cosmiques§!\n§ECette technologie va permettre des avancées majeures dans le domaine de la protection contre les tempêtes cosmiques.§!"
 gateway_tech_storm_location_prediction: "§HCheminement de la prédiction des tempêtes cosmiques§!\n§ECette technologie va permettre des avancées majeures dans le domaine de la prédiction des tempêtes cosmiques.§!"
