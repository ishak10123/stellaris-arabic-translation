 gov_storm_chasers: "Conseil des anciens"
 gov_storm_chasers_desc: "Les membres du Conseil le plus sérénissime se distinguent par leurs capacités physiques, qui leur permettent de défier la mort. Ils gravissent les plus hauts sommets, surfent sur les plus grandes vagues et consacrent leur vie à la recherche d'expériences. Cela leur a permis de gagner la confiance de leur communauté, et donc le droit de définir le cap à suivre.\n\nLes membres du Conseil sont appelés « anciens », quel que soit leur âge, car leurs actions sont jugées légendaires. Leurs noms resteront longtemps dans les mémoires."
 RT_ELDER_SPEAKER: "Chef des anciens"
 RT_ELDER_SPEAKER_FEMALE: "Cheffe des anciens"
 #Ascension Perk
 ap_weather_control: "Contrôle climatique galactique"
 ap_weather_control_desc: "Nos dernières avancées en matière d'astrométéorologie nous permettent de créer des tempêtes cosmiques sur commande. Avec la technologie adéquate, nous pouvons même choisir leurs caractéristiques."
 requires_technology_tech_advanced_storm_manipulation: "$TRIGGER_FAIL$ Nécessite la technologie £physics£§Y$tech_advanced_storm_manipulation$§!."
 #Storm Tooltips
 cosmic_storm_planet_modifiers: "§HModificateurs de planète§!"
 cosmic_storm_fleet_modifiers: "§HModificateurs de flotte§!"
 cosmic_storm_country_modifiers: "§HModificateurs d'empire§!"
 cosmic_storm_ship_modifiers: "§HModificateurs de vaisseau§!"
 cosmic_storm_system_modifiers: "§HModificateurs de système§!"
 cosmic_storm_forecast_indicator_header: "Tempête cosmique imminente"
 celestial_storm_tt: "- Une tempête de poussière stellaire réduit les §Yrenseignements§! sur les systèmes et permet aux flottes de traverser les frontières fermées."
 solar_storm_tt: "- Une tempête solaire révèle toutes les flottes des systèmes touchés."
 electric_storm_fleet_tt: "- §RDésactive§! la régénération quotidienne des boucliers des vaisseaux et des stations.\n- Inflige §R$@storm_monthly_dmg_low|0$§! dégâts aux boucliers des vaisseaux et des stations par mois."
 particle_storm_fleet_tt: "- §RDésactive§! la régénération quotidienne des coques, du blindage et des boucliers des vaisseaux et des stations.\n- Inflige §R$@storm_monthly_dmg_low|0$§! dégâts par mois aux vaisseaux et stations ayant plus de $@storm_hp_perc_limit|0Y%$ points de coque.\n- Les vaisseaux ayant $@storm_hp_perc_limit|0Y%$ points de coque ou moins octroient §G+$@particle_storm_unity_per_ship|0$§! £unity£."
 gravity_storm_consumer_goods_upkeep_tt: "Si le propriétaire d'une colonie n'est PAS une conscience de Gestalt :\n$t$Entretien en £consumer_goods£§Ybiens de consommation§! des [farmer.GetIcon][GetFarmerPlural_lower], des [miner.GetIcon][GetMinerPlural_lower] et des [technician.GetIcon][GetTechnicianPlural_lower] : §R+1§!"
 gravity_storm_energy_upkeep_tt: "Si le propriétaire d'une colonie est une conscience de Gestalt :\n$t$Entretien en £energy£§Yénergie§! des [farmer.GetIcon][GetFarmerPlural_lower], des [miner.GetIcon][GetMinerPlural_lower] et des [technician.GetIcon][GetTechnicianPlural_lower] : §R+1§!"
 gravity_storm_ship_tt: "- $MOD_SHIP_WEAPON_DAMAGE$ par taille de vaisseau : §R$@gravity_storm_dmg_malus|1%$§!."
 nexus_storm_fleet_tt: "- §RDésactive§! la régénération quotidienne des coques, du blindage et des boucliers des vaisseaux et des stations.\n- Inflige §R$@storm_monthly_dmg_high|0$§! dégâts par mois aux vaisseaux et stations ayant plus de $@storm_hp_perc_limit|0Y%$ points de coque."
 shroud_storm_ship_evasion_modifier_tt: "- Évitement §G+$@shroud_storm_evasion|0%$§! lorsque l'empire a pénétré le §YSuaire§!."
 shroud_storm_ship_damage_modifier_tt: "- $MOD_SHIP_WEAPON_DAMAGE$ §G+$@shroud_storm_damage|0%$§! lorsque l'empire a pénétré le §YSuaire§!."
