 magnetic_storm_aftermath_modifier_severity_desc: "Les perturbations magnétiques provoquées par la tempête magnétique ont créé un véritable spectacle de lumières dans l'atmosphère. Les champs magnétiques résiduels ont un impact sur la vitesse des projets de construction planétaire."
