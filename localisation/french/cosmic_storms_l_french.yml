 decision_cultivated_worldscaping: "Aménagement paysagé cultivé"
 decision_cultivated_worldscaping_desc: "Sculptons ce monde afin de célébrer la symétrie parfaite. Observer la géométrie pure du paysage nous apportera la sérénité."
