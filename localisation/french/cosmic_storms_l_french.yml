 #The tempest invocator relic UI localisations
 CLICK_TO_SELECT_LEADER: "§GCliquer pour sélectionner la personnalité§!"
 LEADER_SELECTION: "Sélectionner une personnalité"
 TEMPEST_INVOCATOR_VIEW_HEADER: "Générer une tempête"
 TEMPEST_INVOCATOR_VIEW_BODY: "Le potentiel de cet appareil est perceptible même lorsqu'il est éteint. Si nous trouvons le courage de l'utiliser, nous pourrons nous approprier le pouvoir des tempêtes cosmiques.\n\nSélectionnez un lieu où générer une §Ptempête du nexus§!."
 #Tutorial Localisation
 cstorms_tutorial.a: "Compris"
 cstorms_tutorial.1.name: "Didacticiel : manipulation des tempêtes"
 cstorms_tutorial.1.desc: "Nous pouvons §Smanipuler§! la §Strajectoire§! d'une §Ytempête cosmique§! à notre avantage. Soit pour la §Sdétourner§! de nos systèmes, soit pour l'§Sattirer§! afin d'exploiter ses effets positifs."
 TUTORIAL_STORM_FORECAST_MAP_MODE_TITLE: "Didacticiel : prévision météorologique"
 TUTORIAL_STORM_FORECAST_MAP_MODE_DESC: "Cette carte permet de visualiser les §Stempêtes cosmiques§! présentes dans la galaxie et fournit des informations sur leurs effets.\n\n£storm_forecast_map£\n\nCliquez sur l'icône de la carte en bas à droite pour accéder à la carte de prévision météorologique.\n\nPlus nos technologies sont avancées, plus nous pouvons l'améliorer pour qu'elle prédise avec davantage de précision l'emplacement et la trajectoire des §Stempêtes cosmiques§!, ainsi que leur type."
 concept_weather_forecasting_mode: "Mode prévision météorologique"
 concept_weather_forecasting_mode_desc: "$TUTORIAL_STORM_FORECAST_MAP_MODE_DESC$"
 TUTORIAL_STORM_PROTECTION_TITLE: "Didacticiel : tempêtes cosmiques"
 TUTORIAL_STORM_PROTECTION_DESC: "Les §Stempêtes cosmiques§! sont une force de la nature à ne pas sous-estimer. Elles peuvent avoir des effets dévastateurs sur les flottes, l'économie et même la population. Toutefois, elles peuvent aussi être source d'opportunités.\n\nLa recherche de §Stechnologies des tempêtes§! débloque des bâtiments qui §Sréduisent§! fortement les §Seffets négatifs§! des tempêtes. Des §Srecherches supplémentaires§! peuvent même permettre d'exploiter les tempêtes §Sà notre avantage§!."
