 artifact_adakkaria_research: "Étude des secrets d'adAkkaria"
 artifact_adakkaria_research_desc: "Permet d'étudier en profondeur les secrets d'adAkkaria."
 artifact_adakkaria_research_completed: "$artifact_adakkaria_research$"
 artifact_adakkaria_research_completed_desc: "Nous avons mis au service de notre cause les connaissances anciennes d'adAkkaria."
 #Secrets of the adAkkaria Convention
 project_adakkaria_secrets_of: "Étude des secrets de la Convention d'adAkkaria"
 project_adakkaria_secrets_of_DESC: "Nous avons encore beaucoup à apprendre de l'Institut de la Célébration. Devons-nous prendre le risque de nous impliquer davantage dans ces expériences adAkkariennes ?"
 cstorms.2365.name: "Potentiel libéré"
 cstorms.2365.desc.start: "Plus nous nous penchons sur les recherches de la Convention d'adAkkaria, plus il apparaît que ses scientifiques n'étaient soumis à aucune norme reconnue. La méthodologie est bâclée, les conclusions presque banales. La recherche rigoureuse et approfondie a été abandonnée au profit de la décadence. Malgré tout, plus les expériences étaient cruelles, plus les louanges du Commandement Exalté étaient grandes.\n\nLes premiers rapports racontaient une tout autre histoire : les sujets étaient bien traités et respectés tout au long de leur parcours vers l'éveil de la « tempête intérieure ». Si l'on compare les taux de réussite entre les recherches initiales et ultérieures, la conclusion est effrayante : il n'y a jamais eu de corrélation entre le degré de torture et le nombre d'individus éveillés. D'innombrables sujets ont souffert et sont morts en vain."
 cstorms.2365.desc.end.default: "Nous comprenons désormais les principes en jeu et si nous tirons les bonnes leçons des erreurs de la Convention d'adAkkaria, nous devrions être en mesure d'encourager notre peuple à cultiver ses tempêtes intérieures. Le plus grand danger serait que ces individus §Gtempétueux§! répondent à l'appel de la tempête et finissent par en provoquer une eux-mêmes."
 cstorms.2365.desc.end.gestalt: "Notre collectif comprend désormais les principes en jeu et si nous tirons les bonnes leçons des erreurs de la Convention d'adAkkaria, une partie d'entre nous devrait être capable d'éveiller sa tempête intérieure. Le plus grand danger serait que ces noeuds §Gtempétueux§! répondent trop intensément à l'appel de la tempête et finissent par en provoquer une eux-mêmes."
 cstorms.2365.desc.default: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.default$"
 cstorms.2365.desc.gestalt: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.gestalt$"
 cstorms.2365.a: "Explorons ces nouvelles connaissances avec prudence !"
 cstorms.2365.b: "Non, laissons ces secrets où ils sont"
 cstorms.2365.a.tt: "- Les chances que §Y100§! £pop£§Hpops§! reçoivent le trait $Name_Storm_Fused$ lors d'une tempête est quadruplé.\n- Tous les 20 ans, il y a une faible chance que §Y100§! £pop£§Hpops§! meurent et se transforment en tempête.\n- Potentiel d'éveil : +5% de bonheur (modificateur d'empire)."
 Name_Storm_Fused: "Tempétuosité"
 Name_Storm_Fused_affix: "Tempétuosité" #The trailing space is intentional, to give a space before the species name on the species screen
 ########################################
 #### Storm Chasers #
 ########################################
 origin_storm_chasers: "Chasse-tempêtes"
 origin_storm_chasers_desc: "Ils relèvent tous les défis, suivent tous les pistes et ne fuient aucune tempête.\n\nCette civilisation est constamment en quête de frissons. Pour le meilleur et pour le pire."
 origin_tooltip_storm_chasers_effects: "- $LEADERS_TRAITS$ ['concept_storm_rider',chevauche-tempête]\n- $mod_planet_jobs_unity_produces_mult$sur la planète par §Ybâtiment de tempête§! : §G+$@storm_chasers_storm_building_unity_produces_mult|%0$§! \n- Les capitoles octroient automatiquement les modificateurs des §Yabris anti-tempête§! une fois les technologies requises découvertes. \n- Chances d'apparition de §Ytempêtes cosmiques§! au sein des frontières : §G+100%§! \n- Chances de recherches en §Ytechnologies de tempête cosmique§! : §G+175%§!\n- Accès au ['concept_weather_forecasting_mode',mode prévision météorologique]\n- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$- £physics£['technology:tech_storm_prediction_1']"
 START_SCREEN_STORM_CHASERS: "Qu'est-ce que la vie sans frénésie ? Brûler intensément et périr radicalement, voilà notre devise. Mais lorsque tous les sentiers ont été parcourus et que même le plus haut sommet a été escaladé, que se passe-t-il ?\n\nNotre planète a toujours été sujette aux tempêtes et déluges de toutes sortes. En trouvant le moyen de tirer parti de ces conditions uniques, nous pourrions déclencher une redoutable tempête cosmique.\n\nNous avons depuis longtemps apprivoisé les défis de notre monde natal. L'heure est venue de sauter dans le vide. Ce ne sera pas facile, mais comme le dit le vieux proverbe : « Seuls les audacieux peuvent atteindre l'horizon. »"
 #Storm Rider Trait
 leader_trait_storm_rider_desc: "Les chevauche-tempêtes sont en quête permanente d'adrénaline et ne révèlent leur véritable potentiel que lorsqu'ils sont pris dans le tourbillon d'une tempête cosmique. Les membres du Conseil reçoivent des bonus de Conseil à la place des bonus de terrain."
 mod_trait_storm_rider: "\n$t$Tant que cette personnalité se trouve dans une tempête cosmique, les effets du trait sont renforcés."
 leader_trait_storm_rider_name: "Chevauche-tempête"
 leader_trait_storm_rider_commander: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_commander_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_scientist: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_scientist_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_official: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_official_desc: "$leader_trait_storm_rider_desc$"
 #Storm Chasers specific Progress Events
 progress.2.desc.storm.normal: "Pour reprendre les mots de nos [Root.Owner.GetScientistPlural] : « Regardez-moi ce petit ! »\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.gestalt: "Nous vibrons d'excitation.\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.outro: "Ça alors, il y a des formes de vie aliens sur [From.GetName] ! Ces êtres ne nous parleront pas de sitôt, mais au moins nous savons que nous ne sommes pas seuls.\n\nLa galaxie pourrait être pleine de vie !"
 progress.3.desc.storm.normal: "« Incroyable ! » a crié [ruler.GetRegnalName]. « C'est un monde plein de possibilités ! »\n\nAlors que nous transformons notre vaisseau colonial en camp de base, les premiers explorateurs se préparent déjà pour le monde qui les attend."
 progress.3.desc.storm.gestalt: "Une découverte des plus fascinantes ! Un monde plein de possibilités !\n\nAlors que nous transformons notre vaisseau colonial en camp de base, les noeuds d'exploration se préparent déjà pour le monde qui nous attend."
 progress.3.a.storm: "En avant !"
 progress.4.desc.storm: "Nous avons crié dans le silence de l'espace et avons enfin reçu une réponse ! Une civilisation alien dotée d'une technologie équivalente à la nôtre ; ils ont sans doute rejoint l'immensité de la galaxie en même temps que nous.\n\nLeur apparition annonce de nouvelles expériences. Sont-ils des alliés qui partagent nos idéaux ou des rivaux qui nous mettront à l'épreuve ? Dans tous les cas, le frisson de l'inconnu nous plonge dans l'extase."
 progress.4.h.storm: "Fascinant"
 progress.5.desc.storm.normal: "Nous avons découvert des formes de vie préconscientes sur [From.Planet.GetName]. Comme l'a dit l'un de nos [Root.Owner.GetScientistPlural] : « Ces choses paraissent banales, mais leur potentiel est énorme ! »\n\nElles sont certes préconscientes, mais il serait intéressant de continuer à les observer pour voir comment elles vont évoluer."
 progress.5.desc.storm.gestalt: "Nous avons découvert des formes de vie préconscientes sur [From.Planet.GetName].\n\nNous sommes impatients de voir ce que l'avenir leur réserve ; il serait intéressant de continuer à les observer pour voir comment elles vont évoluer."
 progress.5.h.storm: "C'est fou"
 progress.6.desc.storm: "Nous avons crié dans le silence de l'espace et avons enfin reçu une réponse ! L'euphorie est toutefois vite retombée : ce peuple ne partage pas notre vision et préfère rester dans son coin. Nous devrions nous tenir à l'écart pour le moment."
 progress.6.h.storm: "Avec le temps, ils finiront par nous apprécier"
 pirate.1.desc.storm: "Des pirates de l'espace ! Un groupe appelé §S[pirate_band.GetName]§! nous a pris pour cible ; nous avons des frissons rien que d'y penser !\n\nMême si nous respectons leur mode de vie, l'impact qu'ils ont sur nos réseaux commerciaux n'est pas négligeable."
 pirate.2.j.storm: "C'est regrettable"
 ### STORMFALL SITUATION START ###
 situation_stormfall: "Avis de tempête"
 situation_stormfall_type: "Situation d'origine"
 situation_stormfall_desc: "La météo impitoyable sur [owner.capital_scope.GetName] nous a révélé le pouvoir enivrant des tempêtes. En apprenant à maîtriser la météo sur la planète, nous pourrions appliquer ce savoir à l'échelle cosmique. La construction de bâtiments attire-tempête accélérera notre progression vers la tempête ultime."
 situation_stormfall_monthly_change_tooltip: "Nous apprendrons à maîtriser ces tempêtes."
 situation_stormfall_outcome: "La naissance d'une tempête cosmique."
 stage_stormfall_effects: "Nous devons apprendre à manipuler les tempêtes cosmiques."
 #Approach Chill
 situation_stormfall_chill: "Calme"
 approach_stormfall_chill_tt: "$situation_speed_tt$ : §R-20%§!\nVitesse de recherche : §Yinchangée§!"
 #Approach Balanced
 situation_stormfall_balanced: "Équilibré"
 approach_stormfall_balanced_tt: "$situation_speed_tt$ : §Yinchangée§!"
 #Approach Shredding
 situation_stormfall_shredding: "Déchaîné"
 approach_stormfall_shredding_tt: "$situation_speed_tt$ : §G+20%§!"
 situation_stormfall_pause_desc: "$situation_cyberization_pause_desc$"
 situation_stormfall_project_pause_desc: "Projet spécial"
 situation_stormfall_leader_ongoing: "Renforcement de tempête de personnalité"
 situation_stormfall_building: "Bâtiment attire-tempête"
 situation_stormfall_module: "$sm_storm_attraction_computer$"
 situation_stormfall_finish_project_tt: "Le projet spécial §Y$PROJECT_TEMPEST_BREWING$§! doit être terminé"
 #Modifiers for Stormfall event chain
 cs_storm_chasers_storm_fruition: "Fruits de la tempête"
 cs_storm_chasers_storm_fruition_desc: "L'éveil de notre propre tempête cosmique inspirera notre peuple pendant de nombreuses années."
 cs_storm_chasers_storm_fruition_gestalt: "$cs_storm_chasers_storm_fruition$"
 cs_storm_chasers_storm_fruition_gestalt_desc: "L'éveil de notre tempête cosmique a inspiré notre conscience pour les années à venir."
 cs_storm_chasers_homeworld_storm_attraction: "Conditions météorologiques extrêmes"
 cs_storm_chasers_homeworld_storm_attraction_desc: "Les tempêtes incessantes qui sévissent sur cette planète ont poussé ses formes de vie dans deux directions différentes : d'un côté, il y a ceux qui cherchent à se protéger du chaos, et de l'autre, ceux qui se complaisent dans l'ivresse de la tempête."
 cs_storm_chasers_homeworld_storm_attraction_tt: "Intensité de l'attraction §Y(tempête cosmique)§! : §Pfaible§!"
 #Special project
 PROJECT_TEMPEST_BREWING: "Tempête en préparation"
 PROJECT_TEMPEST_BREWING_DESC: "Cette tempête unique en son genre qui sévit sur [Owner.Capital.GetName] présente des caractéristiques particulières que nous pouvons modifier. Avant toute chose, nous devons mieux comprendre sa composition. Qui sait à quelle curiosité nous pourrions donner vie ?"
 #Events
 cstorms.3100.name: "Avis de tempête"
 cstorms.3100.desc: "Les tempêtes qui se manifestent naturellement sur §Y[owner.capital_scope.GetName]§! nous ont montré la puissance stupéfiante de la nature, tant en termes d'intensité que de régénération qui suit la destruction.\n\nLes stations météorologiques de la planète ont récemment enregistré un phénomène extraordinaire : des super-tempêtes balayant la planète entière.\n\nNos [Root.Owner.GetScientistPlural] qualifient ce phénomène de « heureux hasard ». Ces tempêtes rares créent les conditions idéales pour vivre une expérience inouïe."
 cstorms.3100.a: "Prenons l'équipement de terrain !"
 cstorms.3105.name: "Tempête en préparation"
 cstorms.3105.desc: "Nos [Root.Owner.GetScientistPlural] ont percé les secrets de la manipulation des tempêtes. La puissance de la tempête dépasse les paramètres et nous l'attendons avec impatience. Nous serons mis à l'épreuve et jugés dignes.\n\nDes bâtiments spéciaux serviront de centres de coordination pour les tempêtes qui se préparent. Un bâtiment situé sur §Y[owner.capital_scope.GetName]§! augmente l'attraction et permettra d'accélérer notre progression vers la tempête ultime."
 cstorms.3105.a: "Génial"
 cstorms.3105.a.tt: "Un §Ybâtiment attire-tempête§! dans le monde-capitale :\n$situation_speed_tt$ : §G+10%§!\n\nUne §Ymatrice attire-tempête§! sur la station du système-capitale :\n$situation_speed_tt$ : §G+10%§!\n\n"
 cstorms.3110.name: "Le calme avant la tempête"
 cstorms.3110.desc.outro: "En ajoutant de l'énergie à une tempête naturelle, nous pouvons créer les conditions idéales pour une tempête électrique.\n\nManipuler le noyau de la planète pourrait réorienter le champ magnétique de [owner.capital_scope.GetName] et créer une tempête magnétique.\n\nEn revanche, inverser la polarité des tachyons à certains endroits de la planète pourrait créer une tempête gravitationnelle."
 cstorms.3110.desc.regular: "Nous avons appris à amplifier les vibrations orageuses sur [owner.capital_scope.GetName] et à les façonner pour en faire une expérience ultime. Il ne nous reste plus qu'à décider quel type de tempête nous conviendrait le mieux.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.hive: "Nous avons appris à amplifier les vibrations orageuses sur [owner.capital_scope.GetName] et à les façonner pour en faire une expérience ultime. Il ne reste plus qu'à notre conscience de décider quel type de tempête nous conviendrait le mieux.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.machine: "Nous avons appris à amplifier les vibrations orageuses sur [owner.capital_scope.GetName] et à les façonner pour en faire une expérience ultime. Cependant, nos processus de jugement de valeur sont coincés dans une boucle récursive, essayant de déterminer quel type de tempête nous conviendrait le mieux.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.a: "Chargeons les nuages"
 cstorms.3110.a.tt: "Invoquer une §Ytempête électrique§! planétaire."
 cstorms.3110.b: "Magnétisons le noyau de la planète"
 cstorms.3110.b.tt: "Invoquer une §Ytempête magnétique§! planétaire."
 cstorms.3110.c: "Générons des ondes gravitationnelles"
 cstorms.3110.c.tt: "Invoquer une §Ytempête gravitationnelle§! planétaire."
 cstorms.3130.name: "Tout le monde dehors"
 cstorms.3130.desc.electric: "Le ciel gronde et lance des éclairs dans toutes les directions !\n\nCes puissantes décharges n'ont pas seulement électrifié la surface de la planète, elles ont aussi plongé notre peuple dans une frénésie totale ! L'agriculture va souffrir des tempêtes électriques, mais le potentiel de production d'énergie est indéniable."
 cstorms.3130.desc.magnetic: "Les boussoles ne cessent de tourner tandis que le champ magnétique de [owner.capital_scope.GetName] se tord.\n\nEn perçant la croûte de notre monde natal, nous avons pu injecter de la matière magnétisée directement dans le noyau, les tempêtes naturelles ayant ensuite amplifié les variations de champ qui en résultent. Cela rendra la production d'énergie plus difficile, mais facilitera la découverte de nouveaux gisements de minéraux."
 cstorms.3130.desc.gravity: "Jamais un simple mouvement n'a été aussi grisant ! La gravité augmente puis diminue sans que l'on s'en rende compte.\n\nDes appareils de manipulation de particules répartis dans tout [owner.capital_scope.GetName] ont inversé la polarité des tachyons, les transformant en boules d'énergie crépitantes. Lorsque les boules ont disparu sans laisser de trace et que les ondes gravitationnelles se sont propagées dans toutes les directions, nos [Root.Owner.GetScientistPlural] ont émis l'hypothèse qu'elles avaient été renvoyées dans le temps.\n\nLes fluctuations qui en résultent gêneront le travail à la surface de la planète, mais le faciliteront en revanche dans les stations orbitales."
 cstorms.3130.a: "Quelle expérience !"
 cstorms.3130.a.tt.regular: "Pendant la tempête planétaire :\n$MOD_POP_HAPPINESS$: §G+20%§!"
 cstorms.3130.a.tt.gestalt: "Pendant la tempête planétaire :\n$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.name: "Bonnes vibrations"
 cstorms.3140.desc.intro: "Nos [Root.Owner.GetScientistPlural] sont convaincus que les idées que nous utilisons pour manipuler les tempêtes planétaires peuvent être appliquées à une échelle beaucoup plus grande, maintenant que le système solaire entier est chargé d'énergie orageuse."
 cstorms.3140.desc.electric: "$cstorms.3140.desc.intro$\n\nNous pouvons utiliser nos connaissances et infrastructures existantes pour invoquer une tempête électrique ou bien créer quelque chose de totalement nouveau et exaltant.\n\nCertains minéraux renforceraient la résonance magnétique de la tempête, tandis que l'ajout d'alliages en ferait un puits de gravité."
 cstorms.3140.desc.magnetic: "$cstorms.3140.desc.intro$\n\nNous pouvons utiliser nos connaissances et infrastructures existantes pour invoquer une tempête magnétique ou bien créer quelque chose de totalement nouveau et exaltant.\n\nCharger notre soleil renforcerait le potentiel électrique de la tempête, tandis que l'ajout d'alliages en ferait un puits de gravité."
 cstorms.3140.desc.gravity: "$cstorms.3140.desc.intro$\n\nNous pouvons utiliser nos connaissances et infrastructures existantes pour invoquer une tempête gravitationnelle ou bien créer quelque chose de totalement nouveau et exaltant.\n\nCertains minéraux renforceraient la résonance magnétique de la tempête, tandis que charger notre soleil renforcerait son potentiel électrique."
 cstorms.3140.a: "Chargeons le soleil"
 cstorms.3140.a.tt: "Invoquer une §Ytempête électrique§!.\nPendant §Y2§! ans :$TABBED_NEW_LINE$$mod_country_energy_produces_mult$: §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.a.infra: "Utilisons les infrastructures existantes"
 cstorms.3140.a.tt.electric: "Invoquer une §Ytempête électrique§!.\nPendant §Y2§! ans :$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.b: "Déployons des minéraux magnétisés"
 cstorms.3140.b.tt: "Invoquer une §Ytempête magnétique§!.\nPendant §Y2§! ans :$TABBED_NEW_LINE$$mod_country_minerals_produces_mult$ : §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.b.tt.magnetic: "Invoquer une §Ytempête magnétique§!.\nPendant §Y2§! ans :$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.c: "Ajoutons des alliages spéciaux"
 cstorms.3140.c.tt: "Invoquer une §Ytempête gravitationnelle§!.\nPendant §Y2§! ans :$TABBED_NEW_LINE$$mod_country_alloys_produces_mult$: §R-25%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.c.tt.gravity: "Invoquer une §Ytempête gravitationnelle§!.\nPendant §Y2§! ans :$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3160.name: "Après la tempête"
 cstorms.3160.desc: "Lorsque la tempête planétaire s'est dissipée, une nouvelle caractéristique permanente est apparue sur [owner.capital_scope.GetName]. Une fois de plus, une tempête a apporté le changement et la renaissance.\n\nAussi enivrante qu'ait été cette tempête, nous ne pouvons qu'imaginer les possibilités qu'une véritable tempête cosmique nous offrirait. Mais pourquoi cela prend-il autant de temps ?"
 cstorms.3160.a: "Quel beau souvenir !"
 cstorms.3160.a.tt.electric: "La tempêté a laissé des §Yplaines bruissantes§! électrifiées sur [owner.capital_scope.GetName]."
 cstorms.3160.a.tt.magnetic: "La tempêté a laissé de nouvelles §Ycheminées géothermiques§! sur [owner.capital_scope.GetName]."
 cstorms.3160.a.tt.gravity: "La tempêté a laissé une §Ymontagne riche§! sur [owner.capital_scope.GetName]."
 cstorms.3170.name: "Formes cosmiques"
 cstorms.3170.desc.intro: "Nous pouvons accélérer l'apparition de l'énorme tempête cosmique sur [owner.capital_scope.GetStarName], mais nous devons nous poser une question : sommes-nous vraiment prêts pour la chevauchée de notre vie ?\n\n"
 cstorms.3170.desc.scientist.snippet: "Une équipe de [Root.Owner.GetScientistPlural], menée par §Y[event_target:storm_scientist.GetName]§!, pourrait étudier les premiers modèles de tempêtes cosmiques et ainsi trouver le meilleur moyen de manipuler leur apparition.\n\n"
 cstorms.3170.desc.commander.snippet: "Notre flotte, menée par §Y[event_target:storm_commander.GetName]§!, pourrait tirer sur la tempête et laisser son énergie s'accumuler en cascade.\n\n"
 cstorms.3170.desc.outro: "Il n'est pas certain que cette équipe revienne. D'un autre côté, elle pourrait bien réaliser quelque chose de grandiose !"
 cstorms.3170.desc.both: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.scientist: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.commander: "$cstorms.3170.desc.intro$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.none: "Il ne nous reste plus qu'à attendre que la tempête cosmique prenne forme.\n\nL'anticipation est presque insoutenable, mais le résultat en vaudra la peine."
 cstorms.3170.a: "Envoyons les [Root.Owner.GetScientistPlural]"
 cstorms.3170.a.tt: "§Y[event_target:storm_scientist.GetName]§!, scientifique, est temporairement indisponible et pourrait mourir."
 cstorms.3170.b: "Envoyons l'armée"
 cstorms.3170.b.tt: "§Y[event_target:storm_commander.GetName]§!, commandant, est temporairement indisponible et pourrait mourir."
 cstorms.3170.c: "Ne prenons pas de risque et attendons"
 cstorms.3190.name: "La première d'une longue série"
 cstorms.3190.desc.intro: "Tout a commencé par un pli dans la trame cosmique. Des énergies ont dansé, fusionné et sont entrées en collision. Un soupçon de particules exotiques, une pincée de masse, et le monstre de la tempête qui tourne autour de notre étoile s'est manifesté.\n\nCette merveille de la nature, façonnée selon nos désirs et née de notre seule ingéniosité et domine le ciel."
 cstorms.3190.desc.success: "$cstorms.3190.desc.intro$ Notre leader, qui chevauche la tempête, a suscité une grande vague d'enthousiasme.\n\nC'est nous qui avons fait ça. Nous seuls. Chevauchons cette tempête et vivons le frisson de notre vie !"
 cstorms.3190.desc.failure: "$cstorms.3190.desc.intro$ Nous avons certes perdu notre leader dans la tempête, mais quelle formidable façon de disparaître !\n\nC'est nous qui avons fait ça. Nous seuls. Chevauchons cette tempête et vivons le frisson de notre vie !"
 cstorms.3190.desc.wait: "$cstorms.3190.desc.intro$ Nous avons longtemps attendu ce moment et le jour est enfin arrivé.\n\nC'est nous qui avons fait ça. Nous seuls. Chevauchons cette tempête et vivons le frisson de notre vie !"
 cstorms.3190.a.success: "Rien ne nous arrêtera !"
 cstorms.3190.a.failure: "Témoignons de sa puissance !"
 cstorms.3190.a.failure.tt: "\nNotre leader nous a quittés glorieusement."
 cstorms.3190.a.wait: "Impeccable !"
 ### Storm Fever ###
 #Modifiers for Storm Fever event chain
 cs_storm_chasers_bad_vibes: "Ondes négatives"
 cs_storm_chasers_bad_vibes_desc: "L'ennui s'installe."
 cstorms.3205.name: "Désir insatiable"
 cstorms.3205.normal: "Les vibrations cosmiques se sont estompées et les autres défis ne suscitent tout simplement plus la même euphorie qu'auparavant. Il ne fait aucun doute que nous avons accompli des choses incroyables, mais un sentiment de vide se fait désormais sentir. Les prouesses de nos ancêtres, légendaires tant par leur ampleur que par leur ambition, jettent une longue ombre.\n\n« Ces problèmes sont tout à fait existentiels », ont écrit nos plus brillants penseurs. « Traverser le vide a-t-il créé un vide en nous ? »\n\nLa peur est réelle et pour la surmonter, nous devons revenir là où tout a commencé : créer une série de défis conçus dans le seul but de générer un maximum d'adrénaline !"
 cstorms.3205.gestalt: "Les vibrations cosmiques se sont estompées et les autres défis ne suscitent tout simplement plus la même euphorie qu'auparavant. Il ne fait aucun doute que nous avons accompli des choses incroyables, mais un sentiment de vide se fait désormais sentir.\n\nNous sommes assaillis de questions : savons-nous réellement qui nous sommes ? Nos jours de gloire sont-ils derrière nous ? En tant que collectif, nous avons la responsabilité d'être la meilleure version de nous-mêmes.\n\nLa peur est réelle et pour la surmonter, nous devons revenir là où tout a commencé : créer une série de défis conçus dans le seul but de générer un maximum d'adrénaline !"
 cstorms.3205.a: "Les frissons ne font que commencer"
 cstorms.3205.tooltip: "Découvrez les défis du passé dans le Journal de bord."
 cstorms.3215.name: "Fin de la fièvre"
 cstorms.3215.intro: "Nous avons réussi !\n\nEn cherchant à vivre les plus grands frissons, nous avons relevé tous les défis. Voyez ce que nous avons accompli ces dernières années !"
 cstorms.3215.desc: "$cstorms.3215.intro$\n\nComme les excellents pionniers de notre monde natal, nous avons repoussé nos limites.\n\nMieux encore, grâce à notre implication dans la rage de la nature, nous sommes parvenus à une incroyable compréhension du sens de notre existence."
 cstorms.3215.a: "Nous sommes de retour en force !"
 ### Storm Frenzy ###
 cs_storm_chasers_storm_frenzy_1: "Frénésie tempétueuse"
 cs_storm_chasers_storm_frenzy_1_desc: "L'avènement de l'Ultime nous a plongés dans la frénésie."
 cs_storm_chasers_storm_frenzy_2: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_3: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_1_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_1_gestalt_desc: "L'avènement de l'Ultime a plongé notre conscience dans l'extase."
 cs_storm_chasers_storm_frenzy_2_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_storm_frenzy_3_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_the_code: "Le code"
 cs_storm_chasers_the_code_desc: "Ce n'est ni la suprématie ni le gain matériel qui nous motive. Nous vivons pour tester nos limites. Nous sommes les disciples de l'avant-garde de l'existence."
 cs_storm_chasers_the_code_gestalt: "Le code"
 cs_storm_chasers_the_code_gestalt_desc: "$cs_storm_chasers_the_code_desc$"
 every_empire_opinion_hit: "L'opinion [global_event_country.GetDuDelaDelCommGalEmpGal]§Y[global_event_country.GetGalCommunityOrGalImperium]§! à notre égard change de :"
 nexus_opinion_first_hit: "Anxiété liée au nexus"
 nexus_opinion_first_hit_tt: "$every_empire_opinion_hit$ §R$@first_hit_opinion_change$§!"
 nexus_opinion_second_hit: "Désarroi lié au nexus"
 nexus_opinion_second_hit_tt: "$every_empire_opinion_hit$ §R$@second_hit_opinion_change$§!"
 nexus_opinion_third_hit: "Peur liée au nexus"
 nexus_opinion_third_hit_tt: "$every_empire_opinion_hit$ §R$@third_hit_opinion_change$§!"
 nexus_opinion_summon_hit: "Colère liée au nexus"
 nexus_opinion_summon_hit_tt: "$every_empire_opinion_hit$ §R$@nexus_hit_opinion_change$§!"
 nexus_opinion_the_code: "Réconciliation liée au nexus"
 cs_stormfrenzy_chain_title: "Frénésie tempétueuse"
 cs_stormfrenzy_chain_desc: "Nous repoussons toujours les limites. Inspirés par les exploits de nos prédécesseurs, nous avons aujourd'hui la possibilité de façonner la tempête de nos rêves."
 cstorms.3220.name: "Le credo du chevauche-tempête"
 cstorms.3220.desc: "Notre peuple sera à jamais en quête de frissons. Chaque jour, nous faisons face à des situations incroyables et relevons des défis toujours plus grands, mais [ruler.GetRegnalName] pense que nous devrions aller encore plus loin :\n\n« Au coeur d'une tempête cosmique se trouve un potentiel pur, la limite ultime. Une limite suffisamment puissante pour bouleverser le statu quo et provoquer la montée d'adrénaline de notre vie. »\n\nLe moment est venu de déclencher une tempête aux proportions véritablement épiques, un nexus de pandémonium jubilatoire : l'Ultime. Il y a cependant deux problèmes mineurs : nous avons besoin d'une dernière étude pour déterminer comment créer la tempête parfaite, et nous devons penser à ce que les autres empires de la galaxie penseront de nous.\n\nCela suscitera certainement quelques mécontentements."
 PROJECT_SOW_THE_BIG_ONE: "Attirer l'Ultime"
 PROJECT_SOW_THE_BIG_ONE_DESC: "Nous disposons de la technologie nécessaire, mais sans tempête émergente à proximité, nous devrons chercher comment créer une tempête que nous pourrons manipuler."
 cstorms.3222.name: "Culture de la matière noire"
 cstorms.3222.desc: "Les propriétés uniques de la matière noire en font la substance idéale pour créer l'Ultime. Nous allons en injecter dans le tissu spatial qui entoure notre système-capitale et attendre que les premières vagues de la tempête apparaissent.\n\nCependant, cela a attiré une attention non désirée : nos voisins ont commencé à protester. « Tout le monde n'est pas aussi enthousiastes que nous à l'idée de chevaucher ces vagues si particulières », s'est plaint l'un de nos [Root.Owner.GetScientistPlural]."
 cstorms.3222.a: "Au travail"
 cstorms.3222.b: "Nous devons économiser nos ressources"
 PROJECT_DARK_SEEDING: "Attractions exotiques"
 PROJECT_DARK_SEEDING_DESC: "En injectant avec précaution de la matière noire dans le tissu spatial, une tempête malléable sera générée dans ce système."
 cstorms.3224.name: "L'arrivée de l'Ultime"
 cstorms.3224.desc: "Incroyable ! Les vibrations de la tempête qui approche se font déjà sentir. Nos [Root.Owner.GetScientistPlural] ont encore beaucoup à faire, mais nous sommes déjà plus proches de l'invocation de l'Ultime.\n\nCependant, nos voisins ne sont pas très contents. Ils prétendent que nous nous mêlons de pouvoirs que nous ne pouvons pas comprendre, et cela a déjà affecté nos relations."
 cstorms.3224.a: "Oui, bon, ça va..."
 cstorms.3225.name: "Alimenter l'Ultime"
 cstorms.3225.desc: "Les données sont claires : ce que nous mettons dans la tempête déterminera sa composition. Ainsi, si nous lui donnons les bonnes ressources, elle prendra les propriétés et les proportions de tous les types de tempêtes en même temps.\n\nD'autres empires de la galaxie ont une fois de plus exprimé leur inquiétude, mais la chevauchée du siècle nous attend ! Donnons-lui tout ce que nous avons !"
 cstorms.3225.a: "Alimentons la tempête"
 cstorms.3225.b: "Il nous faut davantage de ressources"
 cstorms.3226.name: "L'ultime festin"
 cstorms.3226.desc: "Nous devons fournir une grande variété de nutriments à la tempête si nous voulons qu'elle prenne des proportions épiques."
 PROJECT_EVERY_ITEM_ON_THE_MENU: "Menu complet"
 PROJECT_EVERY_ITEM_ON_THE_MENU_DESC: "Désormais, nous savons qu'une tempête cosmique peut être manipulée en lui donnant les bonnes ressources. Pour celle-ci, nous avons besoin de certains éléments spécifiques."
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT: "Répétition : $cstorms.3225.name$"
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT_DESC: "Pour créer la tempête parfaite, nous aurons besoin d'un éventail de ressources finement ajustées."
 cstorms.3227.name: "Coup de pouce final"
 cstorms.3227.desc: "L'excitation est palpable, et le chemin à suivre se précise : à force de persévérer et de souffrir, nous triompherons. Fusionnons avec la frénésie cosmique même ! Tous les préparatifs sont terminés, nous sommes prêts à accueillir l'Ultime. Il ne nous reste plus qu'à lui donner le petit coup de pouce final.\n\nNos voisins sont fous de rage et affirment que notre « tempête du nexus cosmique » va semer le chaos dans la galaxie. Allons-nous laisser ces rabat-joie saboter un projet d'une telle ampleur ? Nous devons prendre une décision."
 cstorms.3227.a: "L'Ultime est notre destinée !"
 cstorms.3227.a.tt: "Une tempête du nexus cosmique arrivera dans 40 jours.\n$nexus_opinion_third_hit_tt$"
 cstorms.3227.b: "Nous valons mieux que ça !"
 cstorms.3227.b.tt: "La tempête du nexus cosmique est annulée.\n§YL'opinion [global_event_country.GetDuDelaDelCommGalEmpGal][global_event_country.GetGalCommunityOrGalImperium]§! s'améliorera dans 40 jours."
 cstorms.3230.name: "Genèse de l'Ultime"
 cstorms.3230.desc: "Nous voici au seuil d'une nouvelle expérience. L'heure de la dernière calamité a sonné. Nos chevauche-tempêtes ne reculent devant rien et ne refusent aucun défi.\n\nLeurs noms feront le tour de la galaxie !"
 cstorms.3230.a: "Allons-y"
 has_spawned_nexus_storm_tt: "$TRIGGER_FAIL$ A généré une §Ytempête du nexus§!"
 cstorms.3235.name: "Code des tempêtes"
 cstorms.3235.desc: "Nous avons beaucoup appris et comprenons maintenant que la galaxie n'est pas un terrain de jeu, mais une invitation au voyage.\n\n[ruler.GetRegnalName] l'a très bien exprimé : « Dans cette vie, les frissons ne manquent pas. Nous ne cesserons jamais de chercher notre prochain défi, mais nous devons le faire avec respect. C'est ce que nous avons choisi. C'est cela, et rien d'autre, que nous devons être. »"
 cstorms.3235.a: "Relax, Max !"
 cstorms.3235.a.tt: "$every_empire_opinion_hit$ §G+$@the_code_total_change$§!"
 #Storm Fever Challenges
 cs_stormfever_chain_title: "Fièvre tempétueuse"
 cs_stormfever_chain_desc: "Afin d'atteindre de nouveaux sommets, de goûter au bonheur et de tester nos limites, nous nous lançons aujourd'hui dans une série d'épreuves. Que la fête commence !"
 challenges_completed: "Défis accomplis"
 MISSION_CS_STORM_FEVER_CHALLENGE_1: "Vaincre une flotte dans une tempête"
 MISSION_CS_STORM_FEVER_CHALLENGE_1_DESC: "Le feu de l'action est le terreau idéal pour les exploits, à plus forte raison au milieu d'une tempête cosmique ! Montrons à la galaxie que nous sommes les meilleurs.\n\nLe défi consiste à vaincre une flotte ennemie au sein d'une tempête."
 fleets_defeated_in_storm: "Flottes vaincues dans une tempête"
 MISSION_CS_STORM_FEVER_CHALLENGE_2: "Explorer les confins de la galaxie"
 MISSION_CS_STORM_FEVER_CHALLENGE_2_DESC: "Aller au-delà de nos frontières, funambuler au bord du firmament, explorer les contrées les plus lointaines de l'espace... Il n'y a rien de plus gratifiant !\n\nNous devons à tout prix envoyer un vaisseau scientifique vers le système désigné."
 far_edge_explored: "Confins explorés"
 MISSION_CS_STORM_FEVER_CHALLENGE_3: "Chevaucher les tempêtes"
 MISSION_CS_STORM_FEVER_CHALLENGE_3_DESC: "Seuls les meilleurs apprécient les frissons des tempêtes à leur juste valeur. Laissons-les en profiter !\n\nNotre prochain défi consiste à aider un chevauche-tempête à passer plus de 180 jours au coeur d'une tempête cosmique."
 days_storm_rider_spend_in_storm: "Jours que le chevauche-tempête a passés dans une tempête"
 MISSION_CS_STORM_FEVER_CHALLENGE_4: "Étudier l'inconnu"
 MISSION_CS_STORM_FEVER_CHALLENGE_4_DESC: "Dans une galaxie regorgeant de trésors enfouis et de secrets anciens, rien de tel qu'un bon coup de vent pour dépoussiérer tout ça ! Voyons ce que nous pouvons trouver.\n\nMettons-nous au défi d'étudier une anomalie ou un site archéologique révélé par une tempête."
 storm_unraveled_event_investigated: "Anomalies ou sites archéologiques étudiés"
 MISSION_CS_STORM_FEVER_CHALLENGE_5: "Répandre la joie"
 MISSION_CS_STORM_FEVER_CHALLENGE_5_DESC: "Pourquoi serions-nous les seuls à nous amuser ? L'aventure, c'est toujours mieux à plusieurs.\n\nPour que nos voisins se sentent inclus, nous devons faire souffler une tempête cosmique à l'intérieur de leurs frontières."
 send_storm_to_other_empire: "Tempêtes envoyées vers d'autres empires"
 MISSION_CS_STORM_FEVER_CHALLENGE_6: "Succomber à la tempête"
 MISSION_CS_STORM_FEVER_CHALLENGE_6_DESC: "Vieillir et tomber dans l'oubli ? Non merci ! Nous vivons pour nous consumer dans l'éclat de notre propre gloire !\n\nLe prochain défi consiste à aider un chevauche-tempête à vivre ses derniers instants à l'intérieur d'une tempête cosmique."
 rider_died_in_storm: "Chevauche-tempêtes morts ou disparus dans une tempête"
 #Challenge completed intro
 challenge_completed_intro: "Nous avons atteint de nouveaux sommets et repoussé les limites ! Il ne nous en fallait ni plus ni moins pour stimuler nos émotions. Le défi est réussi !"
 #Challenge 1 completed
 challenge_completed: "Défi accompli :"
 cstorms.305.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_1$"
 cstorms.305.desc: "$challenge_completed_intro$\n\nSoyons honnêtes, cette flotte n'avait aucune chance. À qui le tour ?"
 cstorms.305.a: "Quel bonheur !"
 #Challenge 2 completed
 cstorms.310.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_2$"
 cstorms.310.desc: "$challenge_completed_intro$\n\nLa galaxie a tant à offrir ! Avec tant de choses à découvrir et à expérimenter, il serait insensé de s'arrêter maintenant. En route pour le prochain défi !"
 cstorms.310.a: "Bien dit !"
 #Challenge 3 completed
 cstorms.315.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_3$"
 cstorms.315.desc.normal: "$challenge_completed_intro$\n\nÀ son retour, notre chevauche-tempête est euphorique : les frissons procurés par les tempêtes cosmiques sont d'un tout autre niveau !"
 cstorms.315.desc.gestalt: "$challenge_completed_intro$\n\nL'exaltation nous envahit. Les tempêtes cosmiques sont tout simplement sensationnelles !"
 cstorms.315.a: "On ne s'ennuie jamais !"
 #Challenge 4 completed
 cstorms.320.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_4$"
 cstorms.320.desc: "$challenge_completed_intro$\n\nMettre au jour des secrets anciens et découvrir des trésors enfouis est toujours source de frissons. Qui sait quelles autres merveilles nous attendent !"
 cstorms.320.a: "Les possibilités sont infinies !"
 #Challenge 5 completed
 cstorms.325.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_5$"
 cstorms.325.desc: "$challenge_completed_intro$\n\nLa tempête a frappé leur empire de plein fouet, leur apportant à la fois frissons et chaos ! Nous avons pour sûr offert une expérience sensationnelle à nos voisins.\n\nIls n'apprécient pas notre cadeau pour l'instant, mais ils finiront par nous remercier."
 cstorms.325.a: "Nous sommes tellement généreux !"
 #Challenge 6 completed
 cstorms.330.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_6$"
 cstorms.330.desc.normal: "$challenge_completed_intro$\n\nLa grande tempête a crié son nom, et sa réponse a été des plus jubilatoires. Honneur à toi, chevauche-tempête, légende des légendes ! Que ton voyage vers l'au-delà soit aussi épique que ton départ."
 cstorms.330.desc.gestalt: "$challenge_completed_intro$\n\nUne partie de notre être a fusionné avec la grande tempête dans une spirale de joie et de violence ; perdre un noeud n'avait jamais été aussi enrichissant et stimulant ! Cette expérience mémorable marquera notre espèce pour de nombreuses années à venir."
 cstorms.330.a: "Rien ne nous arrêtera !"
 cstorms.331.desc.normal: "$challenge_completed_intro$\n\nLa grande tempête a crié son nom, et sa réponse a été des plus jubilatoires. Honneur à toi, chevauche-tempête, légende des légendes !"
 cstorms.331.desc.gestalt: "$challenge_completed_intro$\n\nUne partie de notre être a fusionné avec la grande tempête dans une spirale de joie et de violence ; presque perdre un noeud n'avait jamais été aussi enrichissant et stimulant ! Cette expérience mémorable marquera notre espèce pour de nombreuses années à venir."
 electric_storm_desc: "Les champs électromagnétiques qui s'entrechoquent confèrent à cette tempête cosmique une charge électrique dangereuse. Particulièrement néfaste pour les boucliers, mais utile pour la production planétaire."
 particle_storm_desc: "Comme dotées d'une vie propre, ces tempêtes parcourent le tissu galactique sans poursuivre ni éviter les vaisseaux spatiaux. Dangereuses et instables, leur simple présence suffit à unir une civilisation contre les éléments."
 gravity_storm_desc: "Lorsque des corps célestes géants entrent en collision, les ondes gravitationnelles qui en résultent traversent toute la galaxie. Lorsque celles-ci entrent en collision à leur tour, une tempête gravitationnelle naît. Les systèmes de ciblage des vaisseaux en pâtissent et les fluctuations gravitationnelles obligent presque tout le monde à rester chez soi."
 magnetic_storm_desc: "Lorsque des ceintures d'astéroïdes riches en métaux entrent en contact avec de fortes forces gravitationnelles, des champs magnétiques se forment en leur sein. Les tempêtes de ce type ravagent les coques des vaisseaux et peuvent interrompre la construction industrielle, mais elles mettent en évidence les minéraux précieux qui se trouvent sous la croûte planétaire."
 solar_storm_desc: "Une tempête solaire crée une fluctuation d'énergie dans le tissu spatial, ce qui provoque des éruptions sans précédent sur les étoiles. Les radiations qui en résultent sont extrêmement nocives, mais elles augmentent la production des stations spatiales et rendent les vaisseaux plus difficiles à dissimuler."
 celestial_storm_desc: "La poussière de millions de planètes dérive constamment sans but dans la galaxie. Parfois, ces grains s'accumulent en si grande quantité qu'ils forment une tempête de poussière. Celle-ci perturbe les communications sur toute la planète, mais les éléments chimiques qu'elle apporte sont extrêmement utiles pour la production de ressources. Nos capteurs sont pour ainsi dire incapables de détecter les objets qui se trouvent à l'intérieur."
 shroud_storm_desc: "Dans de rares cas, il arrive que l'on puisse percevoir les murmures du Suaire dans le monde physique. Ces tempêtes extrêmement rares déclenchent chez les êtres conscients des visions à la fois extraordinaires et abominables. Ceux ayant déjà communié avec le Suaire peuvent même bénéficier d'une synergie instable."
 nexus_storm_desc: "Lorsque les étoiles s'alignent, la moindre tempête cosmique peut prendre des dimensions extraordinaires. Ce phénomène rare conduira à une terreur apocalyptique. Il est impossible de vivre dans cette émanation de l'enfer, on peut seulement survivre."
 FROM_STORM: "De la tempête"
 #Planetary modifiers
 hyper_ecosystem: "Hyperécosystème"
 hyper_ecosystem_desc: "Le sol de cette planète est riche en azote et en phosphore, car ils ont été réabsorbés à partir des minéraux naturels de la croûte. Il en résulte une croissance exceptionnellement rapide de la végétation ; elle est donc idéale pour l'agriculture, mais désavantageuse pour tout autre projet de construction."
 docile_fauna: "Faune docile"
 docile_fauna_desc: "La faune et la flore de cette planète sont dépourvues de prédateurs naturels, ce qui les rend exceptionnellement dociles et agréables. La population est régulée par les dégâts causés par les tempêtes et non par la loi du plus fort."
 obsidian_lakes: "Lacs d'obsidienne"
 obsidian_lakes_desc: "L'activité tectonique a entraîné le refroidissement des lacs magmatiques. Ceux-ci sont devenus d'immenses plaques d'obsidienne, rapprochant ainsi les ressources précieuses de la surface."
 obsidian_lakes_volcanic: "$obsidian_lakes$"
 obsidian_lakes_volcanic_desc: "$obsidian_lakes_desc$"
 crimson_crawlers: "Rampants cramoisis"
 crimson_crawlers_tt: "§R$COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS$§!"
 crimson_crawlers_desc: "La planète donne l'impression d'être recouverte d'un tapis rouge en raison des billions de minuscules insectes rouges qui y vivent. Malgré leur nombre invraisemblable, ils semblent inoffensifs et ont établi un équilibre fragile au sein de l'écosystème."
 metal_planet: "Monde de métal"
 metal_planet_desc: "Ce monde est entièrement recouvert de métal brut naturel. Il ne dispose pas des éléments de base nécessaires à la vie, tels que l'eau ou une atmosphère respirable, mais il possède de nombreuses ressources exploitables !"
 terraform_fail_is_metal_planet: "Ce monde ne peut pas être terraformé en raison de sa croûte métallique."
 previously_terraformed_planet: "Monde précédemment terraformé"
 previously_terraformed_planet_desc: "Un monde rocheux disposant d'une multitude d'océans et d'une atmosphère riche en azote et en oxygène. Des éléments laissent penser qu'un empire ancien l'avait colonisé, avant de disparaître. Cela signifie qu'il reste encore beaucoup à découvrir, mais aussi que le monde est prêt à accueillir une colonie !"
 previously_terraformed_planet_tt: "Les précédentes tentatives de terraformation rendent beaucoup plus facile la transformation de cette planète en monde Gaïa."
 has_patriotic_institute: "L'$building_adakkaria_patriotic_institute$"
 has_patriotic_institut_desc: "Cette planète abritait autrefois la Convention d'adAkkaria. L'$building_adakkaria_patriotic_institute$ est tout ce qui reste de cette civilisation autrefois puissante."
 has_patriotic_institute_tt: "A le bâtiment $building_adakkaria_patriotic_institute$. Colonisez la planète pour en prendre le contrôle."
 adakkaria_patriotic_institute_desc.supercharged: "Chances de déclencher une tempête dans le système chaque année au prix de §Y100§! £pop£§Hpops§!."
 #Planet Modifiers
 crimson_crawlers_sashimi_style: "Rampants cramoisis consommés crus"
 crimson_crawlers_sashimi_style_desc: "La planète est de couleur cramoisie en raison des billions de minuscules insectes rouges qui y vivent. Ils sont délicieux, même crus."
 crimson_crawlers_bbq_them: "Rampants cramoisis consommés cuits"
 crimson_crawlers_bbq_them_desc: "La planète est de couleur cramoisie en raison des billions de minuscules insectes rouges qui y vivent. Notre population adore les manger grillés."
 COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS: "§RCette planète ne peut pas être colonisée par les empires mécaniques et mondovores.§!"
 #New planet types modifiers
 collided_planet: "Planète collisionnée"
 collided_planet_desc: "Deux planètes qui se sont écrasées l'une contre l'autre et qui, au lieu de se détruire mutuellement, se sont imbriquées. Bien que sa surface utilisable soit grande, ce monde présente des défis uniques en matière de logement et de construction."
 wooden_planet: "Monde arboricole"
 wooden_planet_desc: "Au fil des millénaires, une couche dense de racines de plusieurs kilomètres d'épaisseur s'est formée au-dessus de la croûte de la planète, qui est aujourd'hui un seul et même organisme vivant géant."
 wooden_planet_tt: "La construction et le maintien des logements coûtent de la $w_food$.\nLa construction de fermes coûte de la $w_food$."
 #Eruption Event
 recent_eruption: "Éruption récente"
 eruption_report_tooltip: "\nLes rapports arriveront dans les 30 jours."
 colony_mod.31.name: "Éruption !"
 colony_mod.31.desc: "L'activité tectonique sur [Root.GetName] a provoqué la rupture des couches d'obsidienne sur l'une des plaques. La lave se déverse à la surface, détruisant tout sur son passage. Les rapports en provenance de la colonie sont effrayants."
 colony_mod.31.a: "Écoutons-les"
 colony_mod.32.name: "Éruption : compte-rendu sur les dégâts"
 colony_mod.32.desc: "La récente éruption des champs d'obsidienne qui a secoué notre colonie sur [Root.GetName] s'est transformée en volcan actif ! Tout est désormais enseveli sous la roche en fusion."
 colony_mod.33.desc: "La récente éruption des champs d'obsidienne qui a secoué notre colonie sur [Root.GetName] n'a, contre toute attente, causé aucun dégât. Grâce à un heureux concours de circonstances, l'obsidienne s'est brisée en petits morceaux, nous permettant de la récupérer plus facilement."
 colony_mod.34.desc: "La récente éruption des champs d'obsidienne qui a secoué notre colonie sur [Root.GetName] n'a, contre toute attente, causé aucun dégât."
