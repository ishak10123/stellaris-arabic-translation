 cstorms.2000.name: "Préparation de la tempête"
 cstorms.2000.desc_common_1: "Nous sommes maintenant en position dans le système de §H[target.solar_system.GetName]§! et tout est prêt pour entamer les préparatifs nécessaires à la génération d'une §Ytempête cosmique§!.\n\nEn surchargeant temporairement [target.GetName], nous pouvons créer les conditions idéales pour provoquer la réaction astrométéorologique souhaitée."
 cstorms.2000.desc_tech: "\nGrâce à nos méthodes avancées de manipulation de l'énergie, nous pourrions sursaturer [target.GetName] de matières premières afin de créer une tempête structurellement plus complexe."
 cstorms.2000.desc_common_2: "\nCela prendra du temps, mais le résultat final sera une grande réussite pour les [owner.GetSpeciesNamePlural]. L'étoile elle-même restera totalement intacte après le déchaînement de la tempête."
 cstorms.2000.a: "Surchargeons l'étoile"
 cstorms.2000.a.tt: "$approach_situation_initiate_storm_supercharge_tt$"
 cstorms.2000.b: "Sursaturons l'étoile"
 cstorms.2000.b.tt: "$approach_situation_initiate_storm_overfeed_tt$"
 cstorms.2000.b.tt.allow: "Nécessite l'un de ces éléments :$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_agitate$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$A découvert la technologie £physics£§Y$tech_basic_science_lab_3$§!$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_volatile_motes_tt$$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_destabilize$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$A découvert la technologie £physics£§Y$tech_mine_dark_matter$§!$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_scramble$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$A découvert la technologie £physics£§Y$tech_hyper_drive_3$§!$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_rare_crystals_tt$"
 cstorms.2000.c: "Abandonnons le projet"
 cstorms.2010.name: "Calibration de la tempête"
 cstorms.2010.desc_irradiate_only: "Une étape cruciale a été atteinte dans les préparatifs de la tempête cosmique du système de §H[target.solar_system.GetName]§!. Nous allons avoir besoin d'une intense concentration et de nouvelles ressources pour créer une §Ytempête solaire§! en manipulant les vents solaires de §H[target.GetName]§!."
 cstorms.2010.desc_others: "Un point critique a été atteint dans les préparatifs de la tempête cosmique du système de §H[target.solar_system.GetName]§!. Les prochaines étapes sont d'une importance capitale et requièrent des ressources plus ciblées."
 cstorms.2010.a: "Intensifions les vents solaires"
 cstorms.2010.a.tt: "$approach_situation_initiate_storm_irradiate_tt$\nCoûte $@irradiate_alloy_upkeep|0$ £alloys£§Yalliages§! par mois. Avancée mensuelle : $@default_monthly_progress$."
 cstorms.2010.b: "Interrompons les champs d'électrons"
 cstorms.2010.b.tt: "$approach_situation_initiate_storm_sever_tt$\nCoûte $@sever_energy_upkeep|0$ £energy£§Yénergie§! par mois. Avancée mensuelle : $@default_monthly_progress$."
 cstorms.2010.c: "Magnétisons les ions"
 cstorms.2010.c.tt: "$approach_situation_initiate_storm_magnetize_tt$\nCoûte $@magnetize_mineral_upkeep|0$ £minerals£§Yminéraux§! par mois. Avancée mensuelle : $@default_monthly_progress$."
 cstorms.2010.d: "Abandonnons le projet"
 cstorms.2015.name: "$cstorms.2010.name$"
 cstorms.2015.desc_one_tech_only: "Une étape cruciale a été atteinte dans les préparatifs de la tempête cosmique du système de §H[target.solar_system.GetName]§!. [storm_researcher.GetName] va avoir besoin d'une intense concentration et de nouvelles ressources pour exploiter l'état de saturation de [target.GetName]."
 cstorms.2015.desc_others: "Un point critique a été atteint dans les préparatifs de la tempête cosmique du système de §H[target.solar_system.GetName]§!. Les prochaines étapes que [storm_researcher.GetName] va entreprendre sont d'une importance capitale et requièrent des ressources plus ciblées, si nous voulons exploiter l'état de saturation de [target.GetName]."
 cstorms.2015.a: "Agitons les particules"
 cstorms.2015.a.tt: "$approach_situation_initiate_storm_agitate_tt$\nCoûte $@rare_resource_upkeep|0$ £volatile_motes£§Yparticules volatiles§! par mois. Avancée mensuelle : $@default_monthly_progress$."
 cstorms.2015.b: "Déstabilisons les champs gravitationnels"
 cstorms.2015.b.tt: "$approach_situation_initiate_storm_destabilize_tt$\nCoûte $@rare_resource_upkeep|0$ de £sr_dark_matter£§Ymatière noire§! par mois. Avancée mensuelle : $@default_monthly_progress$."
 cstorms.2015.c: "Remuons la poussière stellaire"
 cstorms.2015.c.tt: "$approach_situation_initiate_storm_scramble_tt$\nCoûte $@rare_resource_upkeep|0$ £rare_crystals£§Ycristaux rares§! par mois. Avancée mensuelle : $@default_monthly_progress$."
 cstorms.2015.d: "$cstorms.2010.d$"
 cstorms.storm_gathered.final_word: "Exploiter la puissance de la tempête cosmique n'a pas été une mince affaire, mais nous pouvons enfin récolter les fruits de nos efforts."
 cstorms.storm_gathered.a: "Excellent travail !"
 cstorms.2020.name: "Déchaînement de la tempête"
 cstorms.2020.desc: "Les vents solaires intenses de §H[target.GetName]§! ont atteint un point critique.\n\nNous sommes sur le point de déchaîner une §Ytempête solaire§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2025.name: "$cstorms.2020.name$"
 cstorms.2025.desc: "Les champs d'électrons de §H[target.GetName]§! ont été complètement coupés.\n\nNous sommes sur le point de déchaîner une §Ytempête électrique§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2030.name: "$cstorms.2020.name$"
 cstorms.2030.desc: "Les ions de §H[target.GetName]§! ont été magnétisés.\n\nNous sommes sur le point de déchaîner une §Ytempête magnétique§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2035.name: "$cstorms.2020.name$"
 cstorms.2035.desc: "Les particules saturées de §H[target.GetName]§! ont atteint leur point de rupture.\n\nNous sommes sur le point de déchaîner une §Ytempête de particules§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2040.name: "$cstorms.2020.name$"
 cstorms.2040.desc: "Le champ gravitationnel de §H[target.GetName]§! a été suffisamment déstabilisé.\n\nNous sommes sur le point de déchaîner une §Ytempête gravitationnelle§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2045.name: "$cstorms.2020.name$"
 cstorms.2045.desc: "La poussière stellaire de §H[target.GetName]§! a été complètement dispersée.\n\nNous sommes sur le point de déchaîner une §Ytempête de poussière stellaire§!.\n\n$cstorms.storm_gathered.final_word$"
 ### Aftermath Deposits ###
 d_magnetic_storm_1_minerals: "Minerais magnétisés"
 d_magnetic_storm_1_minerals_desc: "Une tempête cosmique a magnétisé de nombreux gisements minéraux inexploités et considérablement facilité l'accès des entreprises minières à ces nouvelles ressources."
 d_magnetic_storm_2_alloys: "Fonderie forgée par la tempête"
 d_magnetic_storm_2_alloys_desc: "Une tempête cosmique a dévasté cette planète, mais laissant derrière elle un nombre considérable d'équipements de fonderie. Nous n'en comprenons pas encore totalement le fonctionnement, mais cela a considérablement amélioré notre production d'alliages."
 d_magnetic_storm_3_mix: "Plateaux célestes"
 d_magnetic_storm_3_mix_desc: "Ces masses terrestres ont été magnétisées par l'effet gravitationnel d'une tempête cosmique et peuvent être déplacées directement au-dessus des complexes industriels existants."
 cstorms.8000.title: "Terraformation cosmique"
 cstorms.8000.desc: "Une tempête cosmique a laissé derrière elle bien plus que de la dévastation. Une toute nouvelle caractéristique géographique est apparue sur [Planet.GetName]."
 cstorms.8000.a: "C'est absolument fascinant"
 d_electric_storm_1_engineering: "Ruines foudroyées"
 d_electric_storm_1_engineering_desc: "Une tempête cosmique a transformé un camp autrefois prospère en ruines foudroyées, changeant les matériaux de construction ordinaires en composants rares et inhabituels."
 d_electric_storm_2_unity: "Cicatrice planétaire"
 d_electric_storm_2_unity_desc: "Une tempête cosmique a dévasté la planète au point d'y laisser une cicatrice visible depuis l'espace."
 d_electric_storm_3_physics: "Armada silencieuse"
 d_electric_storm_3_physics_desc: "Le passage d'une tempête cosmique a détruit les systèmes de navigation de nombreux vaisseaux civils et transformé les zones les plus touchées en cimetières de coques et de machines."
 d_particle_storm_1_society: "Banlieues dévastées par la tempête"
 d_particle_storm_1_society_desc: "La tempête cosmique a transformé certaines de nos banlieues en ruines. Elles ne sont plus habitables et ne peuvent être utilisées que pour étude."
 d_particle_storm_2_unity: "L'Ultime"
 d_particle_storm_2_unity_desc: "La tempête cosmique a laissé un énorme cratère sur ce monde, un rappel brutal de l'indifférence cosmique à notre existence."
 d_particle_storm_3_motes: "Plans instables"
 d_particle_storm_3_motes_desc: "La tempête cosmique a augmenté l'activité tectonique de certaines zones. L'augmentation du danger s'accompagne d'une augmentation des particules volatiles."
 particle_storm_aftermath_1_tt: "Vit. d'assemblage robotique : §R-40%§!\n$mod_planet_jobs_minerals_produces_mult$: §R-10%§!\nProd. de £volatile_motes£§Yparticules volatiles§! des pops : §G+0.02§!"
 particle_storm_aftermath_2_tt: "Vit. d'assemblage robotique : §R-50%§!\n$mod_planet_jobs_minerals_produces_mult$: §R-20%§!\nProd. de £volatile_motes£§Yparticules volatiles§! des pops : §G+0.04§!"
 particle_storm_aftermath_3_tt: "Vit. d'assemblage robotique : §R-60%§!\n$mod_planet_jobs_minerals_produces_mult$: §R-30%§!\nProd. de £volatile_motes£§Yparticules volatiles§! des pops : §G+0.06§!"
 d_solar_storm_1_energy: "Couche d'ozone endommagée"
 d_solar_storm_1_energy_desc: "La tempête cosmique a fait un trou dans la couche d'ozone de l'atmosphère planétaire. Si la qualité de vie en a été fortement affectée, cela a également permis d'augmenter la production."
 d_solar_storm_2_districts: "Plateaux irradiés"
 d_solar_storm_2_districts_desc: "La tempête cosmique a irradié les plateaux de ce monde, créant ainsi un lieu idéal pour notre production d'énergie."
 d_solar_storm_3_output: "Désert lumineux"
 d_solar_storm_3_output_desc: "La tempête cosmique a fait briller l'ensemble du désert ; un spectacle mortel, mais qui peut être transformé en une destination touristique économiquement rentable en prenant des mesures de sécurité suffisantes."
 d_celestial_storm_1_mines: "Pics cristallins"
 d_celestial_storm_1_mines_desc: "Une tempête cosmique dévastatrice a laissé derrière elle des cristaux dentelés et tranchants. Ceux-ci représentent un danger certain, mais ils pourraient aussi être extrêmement rentables."
 d_celestial_storm_2_society: "Sédiments historiques"
 d_celestial_storm_2_society_desc: "Une tempête cosmique a fait voler en éclats des couches entières de sédiments, révélant des traces d'un passé lointain que nous n'avions pas encore pu étudier."
 d_celestial_storm_3_crystal: "Dunes de poussière stellaire"
 d_celestial_storm_3_crystal_desc: "Une tempête cosmique a balayé ce monde telle une énorme vague, laissant derrière elle un paysage céleste de dunes de poussière stellaire scintillantes."
 celestial_storm_aftermath_1_tt: "Criminalité sur la planète : §R+10%§!\n$mod_planet_jobs_food_produces_mult$: §R-10%§!\nProd. de £rare_crystals£§Ycristaux rares§! des pops : §G+0.02§!"
 celestial_storm_aftermath_2_tt: "Criminalité sur la planète : §R+20%§!\n$mod_planet_jobs_food_produces_mult$: §R-20%§!\nProd. de £rare_crystals£§Ycristaux rares§! des pops : §G+0.04§!"
 celestial_storm_aftermath_3_tt: "Criminalité sur la planète : §R+30%§!\n$mod_planet_jobs_food_produces_mult$: §R-30%§!\nProd. de £rare_crystals£§Ycristaux rares§! des pops : §G+0.06§!"
 d_gravity_storm_1_districts: "Plaines compactées"
 d_gravity_storm_1_districts_desc: "La gravité écrasante d'une tempête cosmique a compacté des terres qui étaient auparavant considérées comme trop instables pour être constructibles. Nous avons donc de nouveaux terrains à bâtir."
 d_gravity_storm_2_unity: "Monuments pulvérisés"
 d_gravity_storm_2_unity_desc: "Une tempête cosmique a exercé une pression énorme sur certains de nos fragiles monuments, les réduisant en poussière. Un humble rappel des forces terrifiantes qui nous attendent là-bas."
 d_gravity_storm_3_engineering: "Grottes gravitationnelles"
 d_gravity_storm_3_engineering_desc: "Une tempête cosmique a fait s'effondrer certains de nos complexes miniers et a compacté les matériaux. Nos tentatives de les rouvrir ont certes donné lieu à de nouvelles théories en matière d'ingénierie et de forage, mais n'ont guère permis de progresser vers la restauration des mines."
 d_shroud_storm_1_society: "Parasites du Suaire"
 d_shroud_storm_1_society_desc: "Une tempête cosmique a infesté notre cheptel de parasites. Bien que ces bêtes soient désormais déphasées entre notre réalité et le Suaire, elles restent comestibles, saines et étonnamment savoureuses."
 d_shroud_storm_2_zro: "Champs de zro"
 d_shroud_storm_2_zro_desc: "Une tempête cosmique a transformé les biomes autrefois verdoyants de cette planète en champs de zro instables. Ce sont les gisements les plus abondants que nous ayons jamais vus."
 d_shroud_storm_3_happy: "Entité du lac"
 d_shroud_storm_3_happy_desc: "Une tempête cosmique nous a laissé un cadeau étrange mais merveilleux. Les vagues de la plus grande étendue d'eau de la planète forment désormais des motifs et des symboles auxquels on peut attribuer une signification et capables de répondre aux questions avec une sagesse surprenante."
 ### Shroud Storm Events
 shroud_switched: "Voilé par le Suaire"
 shroud_switched_tt: "Un voile recouvre ce corps céleste, indiquant une profonde déchirure ou les conséquences d'une tempête du Suaire dévastatrice."
 cstorms.8510.title: "Échange psionique"
 cstorms.8510.desc: "Après une violente explosion psionique, [from.GetName] a été échangé avec un monde de la catégorie [from.GetClassName]."
 cstorms.8510.a: "Quel destin étrange..."
 cstorms.8515.title: "Déformation de masse"
 cstorms.8515.desc: "Une vague d'énergie psionique a balayé [from.GetName] et transformé une partie de sa population d'une manière qui semble défier les lois de la nature. La forme de groupes entiers a été modifiée, ceux-ci nous paraissant désormais étrangers. C'est comme si leur essence même avait été réécrite par une entité qui dépasse notre imagination."
 cstorms.8515.a: "Des forces inconnues sont à l'oeuvre..."
 cstorms.8520.title: "Transmutation stellaire"
 cstorms.8520.desc: "Une vague d'énergie psionique a transformé [from.GetName] en une étoile d'un tout nouveau genre. Désormais, un monde de la catégorie [from.GetClassName] projette sa lumière inquiétante sur le système de [from.solar_system.GetName], comme si la réalité elle-même avait été modifiée."
 cstorms.8520.a: "Même les étoiles ne sont pas en sécurité..."
