 executive: "$job_executive$"
 noble: "$job_noble$"
 merchant: "$job_merchant$"
 head_researcher: "$job_head_researcher$"
 high_priest: "$job_high_priest$"
 technophant: "$job_technophant$"
 warden: "$job_warden$"
 noble_researcher: "$job_noble_researcher$"
 job_noble_researcher: "Scientifiques nobles"
 job_noble_researcher_plural: "Scientifiques nobles"
 job_noble_researcher_desc: "Les plus brillants et les plus nobles des descendants sont éduqués à la bienséance et à la méthode scientifique, ce qui renforce leur supériorité."
 sacred_noble: "$job_sacred_noble$"
 job_sacred_noble: "Nobles sacrés"
 job_sacred_noble_plural: "Nobles sacrés"
 job_sacred_noble_desc: "Par l'héritage, la divinité se révèle. Par la divinité, l'héritage s'accomplit. De ce lien sacré naît notre noblesse."
 augmentation_merchant: "$job_augmentation_merchant$"
 job_augmentation_merchant: "Marchands d'améliorations"
 job_augmentation_merchant_plural: "Marchands d'améliorations"
 job_augmentation_merchant_desc: "Qui de mieux pour guider notre empire que ceux qui nous permettent de nous améliorer à moindre coût avec une garantie prolongée ?"
 visionary: "$job_visionary$"
 job_visionary: "Visionnaires technologiques"
 job_visionary_plural: "Visionnaires technologiques"
 job_visionary_desc: "Ces rêveurs ne connaissent ni la modestie ni l'impossibilité, et transforment les rêves de demain en une réalité commercialisable. Pour tout véritable visionnaire, le progrès n'est pas seulement un principe, mais un produit."
 noble_merchant: "$job_noble_merchant$"
 job_noble_merchant: "Patricien"
 job_noble_merchant_plural: "Patriciens"
 job_noble_merchant_desc: "Ce n'est pas l'héritage qui détermine le droit de régner, mais la valeur individuelle ; et quel meilleur moyen de mesurer cette valeur qu'un bilan financier ?"
