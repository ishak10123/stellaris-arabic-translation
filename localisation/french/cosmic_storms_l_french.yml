 #Digsites #
 ###########################################
 ### Green Skies
 site_green_skies: "Ciel vert"
 site_green_skies_intro: "Nos scanners ont détecté une série de curieux signaux en provenance de cette région de la planète. Il est très probable que les vestiges d'une ancienne civilisation n'attendent que d'être découverts."
 cstorms.1400.name: "Curieux méli-mélo"
 cstorms.1400.desc: "D'étranges ruines ont été découvertes à proximité de notre camp.\n\nL'architecture présente des caractéristiques de toutes les civilisations que nous avons rencontrées jusqu'à présent, y compris la nôtre !\n\nLes matériaux utilisés sont similaires à ceux que nous utilisons pour nos camps de colonisation. C'est étrange, car ces matériaux n'auraient jamais pu résister plusieurs décennies, et encore moins aussi longtemps que nos scanners le disent.\n\nIl est peu probable que ces ruines appartiennent à une mystérieuse civilisation de précurseurs, mais nos scanners n'amènent pas d'autre conclusion. Que se passe-t-il ici ?"
 cstorms.1405.name: "Situation préoccupante"
 cstorms.1405.desc: "Les signaux menaient à un chemin vers les niveaux inférieurs de la ville détruite. En général, les sites archéologiques de ce type disposent d'une sorte de réseau de transport souterrain ou d'une série de bunkers sécurisés. Au lieu de cela, nous avons trouvé un petit réseau de grottes parsemé de restes de tissus, de récipients en polymère et même de déchets organiques. Il semble que nous ne soyons pas les premiers à venir.\n\nMais ce qui est encore plus inquiétant, c'est que [Root.GetLeaderName] a signalé que le ciel devenait verdâtre, présageant la formation d'une tempête cosmique à l'intérieur de [Fromfrom.getName]. Néanmoins, nous continuons à nous diriger vers la source des signaux."
 cstorms.1410.name: "Folie"
 cstorms.1410.desc: "Notre progression fut brièvement stoppée par une série de portes métalliques lourdement endommagées. Sans trop d'efforts, nous avons réussi à franchir cet obstacle et sommes arrivés dans un entrepôt rudimentaire.\n\nLes étagères étaient remplies à ras bord de technologies en piteux état, et des cartons de corporations connues étaient soigneusement empilés contre les murs. Nous avons finalement trouvé la source des signaux : un transpondeur qui ressemblait peu ou prou au nôtre.\n\nEn se connectant à l'appareil et en fouillant dans les bases de données, nos [Root.Owner. GetEngineerPlural] ont découvert que le signal avait été délibérément conçu pour paraître aussi mystérieux que possible, imitant et combinant les caractéristiques d'autres civilisations.\n\nNous avons également trouvé des kits de construction dans les cartons en surface.\n\nLa tempête cosmique fait rage et perturbe les communications, nous n'avons donc pas pu contacter notre camp pour partager nos découvertes. La dernière chose que nous avons entendue de [Root.GetLeaderName] est une série d'ordres inquiétants. Il semblerait que notre camp soit attaqué !"
 cstorms.1410.a: "Préparons notre riposte !"
 cstorms.1415.name: "Des pirates !"
 cstorms.1415.desc: "La tempête cosmique de [Fromfrom.getName] cachait une flotte de pirates, qui a attaqué notre camp. Les pirates nous ont demandé de transmettre ce message :\n\n§LChère bande d'imbéciles,\n\nMerci de vous être joints à nous.\n\nN'est-il pas fascinant de voir à quelle vitesse des êtres à première vue intelligents abandonnent toute forme de raison lorsqu'ils détectent la moindre trace d'artefacts et de reliques antiques ? Aviez-vous l'espoir de les utiliser pour vaincre un puissant ennemi ? Ou d'augmenter la taille de vos flottes jusqu'à ce qu'elles dépassent l'horizon des événements ? Ou essayiez-vous simplement de venir en aide à vos semblables ? Comme c'est navrant.\n\nNe culpabilisez pas, vous n'êtes pas les premiers et notre modèle économique repose sur le fait que vous ne soyez pas les derniers.\n\nPour la modique somme de 2 000 crédits énergétiques, nous vous rendrons quelque chose que vous avez perdu.\n\nSi vous déclinez notre offre, qui sait quels malheurs pourraient arriver à [Leader.getName] et son équipage sous-armé, toujours prisonniers...\n\nRéfléchissez vite et bien.§!\n\nPour le moment, nous sommes en sécurité dans ces grottes, mais qui sait pour combien de temps. Que faire ?"
 cstorms.1415.a: "Payons"
 cstorms.1415.b: "Qu'ils pourrissent dans le vide !"
 cstorms.1415.b.tt: "Prise en otage de [Root.GetLeaderName]."
 cstorms.1416.name: "Résistance"
 cstorms.1416.desc: "Nous avons reçu un autre message :\n\n§LQuel dommage. Nous aurions pu faire tellement de choses avec ces ressources.\n\nNous informerons [Leader.GetName] et son équipage que leurs vies valent moins que quelques crédits. Un esclavagiste ou un assimilateur fervent sera peut-être intéressé. Il paraît que l'agrafage des nerfs est super tendance en ce moment.\n\nAdios.§!\n\nNous avons utilisé tout ce que nous avions sous la main pour nous barricader, et nous avons suffisamment de provisions pour survivre quelque temps. Un jour, cependant, les pirates finiront par percer nos défenses !"
 cstorms.1420.name: "Une fois, pas deux"
 cstorms.1420.desc: "Les compétences des pirates n'étaient pas à la hauteur de leur arrogance. Il n'a pas fallu longtemps pour que ce qui restait de leur flotte devienne un élément de l'écosystème galactique.\n\nPeu après, nous avons rétabli le contact avec l'équipage à la surface. Ses membres ont été assez secoués par l'expérience, mais n'ont pas été blessés.\n\nMême si nous n'avons pas fait de découvertes sur d'anciennes civilisations, nous avons gagné en vigilance. [Leader.GetName] a mal évalué le danger ; nous ne referons pas cette erreur."
 cstorms.1420.a: "Que cela nous serve de leçon"
 cstorms.1420.b: "C'était la dernière erreur de [Leader.GetName]"
 cstorms.1425.name: "Le plaisir des affaires"
 cstorms.1425.desc: "Nous avons reçu une réponse :\n\n§LMerveilleuse décision !\n\nNous avons bien reçu votre contribution à notre « Fonds pour les entrepreneurs défavorisés en quête d'une planète de villégiature ».\n\nVous récupérerez bientôt votre équipage.\n\nN'hésitez pas à nous recommander à tous vos partenaires commerciaux.§!\n\nPeu après, nous avons pu rétablir le contact avec notre équipage à la surface qui a été assez secoué par l'expérience, mais n'a pas été blessé.\n\nMême si nous n'avons pas fait de découvertes sur d'anciennes civilisations, nous avons gagné en vigilance. [Leader.GetName] a mal évalué le danger ; nous ne referons pas cette erreur."
 cstorms.1425.a: "$cstorms.1420.a$"
 cstorms.1425.b: "$cstorms.1420.b$"
 NAME_green_skies_pirate_country: "La Villégiature"
 NAME_green_skies_pirate_fleet: "Entrepreneurs excentriques"
 KILL_EXILED_LEADER_EFFECT: "$LEADER$ a payé de sa vie son incompétence."
 FREE_HOSTAGED_LEADER_EFFECT: "$LEADER$ est de retour parmi nous."
 green_skies_outcome_modifier: "Nous serons désormais plus vigilants face aux dangers."
 requires_cosmic_storms: "$dlc_requirement_string$ §ICosmic Storms§!"
 ### Hold the Line
 site_hold_the_line: "Restez en ligne"
 site_hold_the_line_intro: "La récente tempête cosmique a laissé derrière elle une étrange surprise : un complexe orbital provenant d'un vieux système. Nous devrions y entrer et essayer de le réactiver."
 cstorms.1275.name: "Flambant déroutant"
 cstorms.1275.desc: "Bien que le complexe orbital ait été balayé à travers la galaxie par la tempête cosmique, il est à peine endommagé. Les zones résidentielles et commerciales de l'habitat sont en quasi parfait état. Nous n'avons pas vu un grain de poussière, comme s'il n'avait jamais été occupé.\n\nÀ l'intérieur du centre de contrôle, nous avons découvert un système des plus déroutants : des cadrans sans explication, des leviers aux réglages incohérents et toute une ribambelle de boutons multicolores clignotant aléatoirement. Par chance, nous sommes finalement tombés sur un manuel. Nous avons bon espoir de pouvoir réactiver l'habitat dès qu'il sera traduit."
 cstorms.1280.name: "Manuel foireux"
 cstorms.1280.desc: "Malheureusement, il semble que nous ayons été trop optimistes : le manuel s'est révélé aussi incompréhensible que les commandes. Il manque la moitié des pages et les instructions imagées ne sont d'aucune aide. La deuxième moitié du manuel est écrite en hiéroglyphes difficiles à interpréter.\n\nÀ la dernière page, cependant, se trouve une fréquence de communication, accompagnée d'une série de caractères pouvant être traduits par « support technique ». Nous essayons de le contacter."
 cstorms.1285.name: "Merci pour votre appel"
 cstorms.1285.desc: "La fréquence du manuel nous a mis en relation avec le support technique d'une entité commerciale appelée « Jardin Céleste ».\n\nD'un ton amical mais neutre, l'I.A. nous a fait savoir qu'elle appréciait notre sollicitation et nous a demandé ce qu'elle pouvait faire pour nous. Les options listées comprenaient « répondre à des questions sur les abonnements », « présenter la nouvelle gamme de systèmes de défense intelligents », et « détailler les initiatives de responsabilité sociale de l'entreprise ».\n\nLes options suivantes nous ont cependant dirigés vers des sujets totalement hors de propos. Pire encore, nos [Root.Owner.GetEngineerPlural] ont été régulièrement mis en attente pour qu'au final l'appel soit coupé. Il semblerait que l'I.A. n'ait pas aussi bien vieilli que le reste de l'habitat.\n\nNous allons néanmoins continuer à essayer de comprendre ce système alambiqué."
 cstorms.1290.name: "Dédale d'options"
 cstorms.1290.desc: "Nos [Root.Owner.GetEngineerPlural] rapportent qu'après avoir parcouru plusieurs menus, le système n'a cessé de revenir en arrière, quoi qu'ils disent à l'I.A.\n\nNous avons essayé de lancer plusieurs simulations afin de cartographier l'arborescence exacte des menus, mais les erreurs se sont enchaînées. Même l'exécution d'un modèle quantique n'a pas donné les résultats escomptés. Nous soupçonnons avoir altéré par inadvertance certaines fonctions d'onde.\n\nNous sommes désemparés."
 cstorms.1290.a: "Insultons l'I.A. de §RBIP§! et de §RBIP§!"
 cstorms.1290.b: "Ne disons plus un mot"
 cstorms.1290.c: "Appuyons sur tous les boutons"
 cstorms.1295.name: "Suivi du protocole"
 cstorms.1295.desc.a: "On avance enfin ! L'I.A. nous a réprimandés d'avoir utilisé un langage inapproprié et nous a informés qu'une représentante du service client allait revenir vers nous.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.b: "On avance enfin ! Notre long silence a déconcerté l'I.A., elle nous renvoie vers une représentante du service client.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.c: "On avance enfin ! L'I.A. nous a réprimandés d'avoir fait n'importe quoi avec le panneau de contrôle et nous a informés qu'une représentante du service client allait revenir vers nous.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.followup: "Nous sommes restés en attente un certain temps avant que la ligne de communication ne soit rouverte. L'entité à l'autre bout du fil s'est présentée comme l'archiviste de la corporation Jardin Céleste. Il s'avère que le support technique est un programme d'intelligence artificielle qu'elle a hérité de l'archiviste précédente. Pour autant qu'elle le sache, la station de communication n'a pas été utilisée depuis que Jardin Céleste a fait faillite il y a plusieurs décennies. Lorsque nous lui avons demandé pourquoi elle travaillait encore, elle nous a simplement répondu que cela était stipulé dans son contrat.\n\nLorsque nous avons expliqué notre situation, elle a sorti un vieux guide de l'habitat et nous a transféré les pages numérisées."
 cstorms.1300.name: "Des années pour y arriver, quelques secondes pour tout perdre"
 cstorms.1300.desc: "Grâce au nouveau guide, le redémarrage de l'habitat a été un jeu d'enfant.\n\nAlors que le bruit de démarrage des machines commençait à s'estomper, nous avons décidé de nous adresser une nouvelle fois à l'archiviste pour la remercier.\n\nElle nous a dit avoir trouvé quelques informations sur la station. Il semblerait qu'elle ait été construite il y a plus de cinq siècles en tant que prototype, et qu'elle ait ensuite été perdue dans le chaos astrologique à la suite d'une tempête cosmique particulièrement violente. La perte des coûts immobiliers et de développement a suffi à mettre Jardin Céleste en faillite.\n\nNous aider a été la première tâche utile de l'archiviste depuis des années.\n\n« Et puis, dit-elle, c'était agréable d'entendre à nouveau la voix de mon arrière-grand-mère, même si ce n'était qu'une I.A. »"
 ### Repowered Complex
 site_repowered_complex: "Complexe alimenté en électricité"
 site_repowered_complex_intro: "Après la récente §Ytempête électrique§!, un pic d'énergie inhabituel a été mesuré sous la surface de §H[From.Planet.GetName]§!. D'autres analyses ont révélé un ancien complexe souterrain dont les générateurs électriques ont été réactivés par la tempête, permettant à l'installation de redémarrer."
 cstorms.1845.name: "Entrée fortifiée"
 cstorms.1845.desc: "L'entrée du complexe isolé sur §H[From.Planet.GetName]§! est exceptionnellement robuste. Le complexe a clairement été conçu pour durer et dispose d'un blindage lourd, de boucliers anti-radiations et d'une série de capteurs atmosphériques. §H[Leader.GetName]§! estime qu'il a été construit de sorte à résister aux conditions les plus extrêmes.\n\nLes premières analyses indiquent qu'une immense chambre se trouve derrière une succession de portes de sécurité scellées."
 cstorms.1850.name: "Abri de protection"
 cstorms.1850.desc: "Après avoir accédé à l'intérieur, §H[Leader.GetName]§! en a déduit que le complexe était un abri jamais utilisé auparavant, construit il y a longtemps par une espèce organique qui nous est inconnue.\n\nLe bunker dispose de quartiers d'habitation bien équipés, de capsules de sommeil, d'espaces de loisirs et d'une station médicale. Les armoires de chaque étage contiennent de nombreuses provisions, notamment des paquets de nutriments non ouverts, des piles et des outils. Tout est en parfait état.\n\nCertaines des portes de sécurité les plus avancées n'ont pas encore pu être ouvertes. Nous pensons qu'elles nous mèneront au pont de commandement du complexe."
 cstorms.1850.a: "Poursuivons"
 cstorms.1855.name: "Abri édition Deluxe"
 cstorms.1855.desc: "Le pont de commandement de l'abri dispose d'une quantité remarquable de moniteurs reliés à des capteurs atmosphériques à la surface, qui surveillent les §Ytempêtes cosmiques§!. Ces consoles contiennent des données historiques sur les tempêtes datant de plusieurs siècles, ce qui améliorera considérablement notre compréhension de l'astrométéorologie.\n\n§H[Leader.GetName]§! a également trouvé un petit holoprojecteur. À son activation, il a diffusé l'image 3D d'un molluscoïde tenant un discours commercial présentant les principales caractéristiques de l'abri, sous le logo d'une entreprise.\n\nIl est impossible de savoir si cet abri a un jour trouvé un acheteur, mais il est clair qu'il n'a pas été utilisé."
 cstorms.1855.desc.megacorp: "Notre service marketing est déjà en train d'analyser les erreurs qu'ils ont commises."
 ###############################
 #### The Weather Manipulators #
 ###############################
 STORMS_PREC_WM_ONE: "Abri ancien"
 STORMS_PREC_WM_ONE_DESC: "Nous avons découvert plusieurs structures souterraines cachées sur [From.Planet.GetName], qui semblent toutes très anciennes. Profitons de cette occasion pour les étudier."
 cstorms.105.name: "Les abris anciens"
 cstorms.105.desc: "[From.Planet.GetName], dans le système [From.GetStarName], est jonchée de ruines qui appartiendraient à un ancien empire. Les structures souterraines qui nous intéressent sont tout aussi anciennes, mais relativement intactes.\n\nL'imagerie par résonance sonar a mis en évidence un labyrinthe souterrain complexe d'entrepôts et d'abris conçus pour résister aux forces de la nature. La destruction de la surface est sans aucun doute une conséquence des tempêtes cosmiques, qui expliqueraient l'existence de ce refuge.\n\nLa quantité de débris rend toutefois difficile toute étude plus approfondie. Nous pourrions installer un site archéologique pour en découvrir davantage."
 #arcsite The Ancient Storm Shelters
 site_weathermanipulators_the_ancient_storm_shelters: "Les abris anciens"
 site_weathermanipulators_the_ancient_storm_shelters_intro: "Un refuge enfoui sous les décombres d'un monde dévasté par les tempêtes. L'exploration sera difficile, mais l'intérieur semble en grande partie intact."
 cstorms.110.name: "Poussière et dévastation"
 cstorms.110.desc: "En s'approchant de l'abri depuis le sol, notre équipe a découvert une petite ouverture sous deux tours effondrées, à travers laquelle on pouvait voir la faible lueur des machines encore en service.\n\nL'ouverture offre à nos [Root.Owner.GetScientistPlural] un point de repère leur permettant de déterminer la taille du complexe et éventuellement de trouver un moyen de l'ouvrir sans compromettre sa structure fragile.\n\nLes ruines présentent toutes des dégâts liés aux tempêtes cosmiques. Curieusement, rien n'indique que les habitants de la ville aient tenté de s'en protéger.\n\nIl semble même qu'ils aient enduré les forces de la nature aussi longtemps que possible, pour finalement les fuir en toute hâte. Les réponses se trouvent peut-être sous les ruines de [From.Planet.GetName]."
 cstorms.110.a: "Bien reçu"
 cstorms.115.name: "Sous les tours"
 cstorms.115.desc: "Après avoir déblayé des couches et des couches de débris et de poussière, nos [Root.Owner.GetScientistPlural] ont pu entrer dans l'abri par l'ouverture sous les tours.\n\nLe refuge est simple et fonctionnel, avec de nombreuses pièces attenantes principalement vides. Il est presque trop spartiate ; il ne résisterait pas à des tempêtes cosmiques. Les murs sont trop minces, et les sols et les plafonds ne sont pas renforcés. S'il est encore debout, c'est uniquement grâce à une bonne étoile. Sans les deux tours et le glissement de terrain, cet abri « anti-tempête » aurait été détruit depuis longtemps.\n\nLa lueur visible de l'extérieur provient de systèmes d'alarme défectueux et plusieurs terminaux opérationnels ont été repérés un peu plus en profondeur. Cela pourrait être une bonne occasion d'en apprendre davantage sur les anciens occupants de ce refuge ainsi que sur les circonstances étranges qui l'entourent."
 cstorms.120.name: "Transcriptions marquées par le temps"
 cstorms.120.desc: "Les terminaux ont été plus difficiles à atteindre que prévu, car notre progression a été partiellement entravée par des effondrements. Certains débris étaient plus récents, ce qui suggère une défaillance structurelle critique déclenchée par notre arrivée. Prudence est de mise.\n\nMalheureusement, les anciens terminaux ne livrent pas leurs secrets si facilement, car tout a été enregistré dans une langue perdue depuis longtemps. Les registres de communication intergalactique qui ont été laissés dans l'interface utilisateur devraient nous aider. En les combinant avec les supports physiques éparpillés dans l'abri, nous devrions être en mesure d'en faire une traduction simple. Nous devrions également explorer les autres pièces tant que l'abri tient debout."
 cstorms.120.a: "Nous devrions nous montrer prudents"
 cstorms.120.b: "Accélérons la cadence"
 cstorms.120.c: "Déchiffrons les terminaux et oublions le reste"
 cstorms.125.name: "Assurance des actifs"
 cstorms.125.desc: "Les pièces et les chambres situées plus bas sont loin d'être aussi désorganisées que l'entrée. Des cartons remplis de marchandises, tous soigneusement emballés, s'empilent jusqu'au plafond. D'après les premières traductions, il s'agit de matériaux bruts et de composants électroniques incomplets... Rien de nécessaire à la survie, donc. La liste contient également des quantités précises des objets que l'on peut trouver ici, ainsi que les estimations des bénéfices qu'ils auraient engendrés sur le RICE, le réseau intergalactique du commerce équitable.\n\nIl y a toutes sortes de notes écrites avec minutie, détaillant les transactions et les indices de rentabilité dans un langage des plus extatiques. Il semblerait que le nom de cette civilisation disparue soit tiré de ce réseau, puisque ses membres s'étaient donné le nom de « Marchands ricéens ».\n\nCet abri n'a pas été construit pour protéger la population, mais pour entreposer des marchandises. Pourquoi leurs abris étaient-ils si piteusement équipés pour faire face aux tempêtes ?\n\nD'autres traductions devraient nous fournir plus d'informations, mais nous manquons de temps : l'infrastructure ne cesse de craquer."
 cstorms.125.a: "Soyez prudents"
 cstorms.125.b: "Priorisons la traduction des données"
 cstorms.125.c: "Nous pouvons contribuer à l'enquête"
 cstorms.130.name: "Machines de marché"
 cstorms.130.desc: "Le bruit de craquement s'intensifie. Néanmoins, notre équipe de traduction poursuit son travail dans l'abri de [From.Planet.GetName]. Si les marchandises stockées n'ont guère révélé d'informations nouvelles, les terminaux encore en service en ont dévoilé beaucoup.\n\nDes coordonnées cryptées décrivent la position d'un « puissant » appareil situé sur une planète proche. De ce que nous avons compris, cette machine pourrait « manipuler » les tempêtes cosmiques, une affirmation incroyable si elle est vraie.\n\nEn raison de la dégradation continue de la structure, nous avons évacué le site. Une copie des coordonnées a été transmise à notre vaisseau en orbite. De nombreuses questions restent sans réponse, mais l'enquête continue."
 cstorms.130.a: "Nous ne devons en aucun cas laisser passer cette chance"
 #Special Project Descramble the Coordinates
 INETIAN_PROJECTS_01: "Décryptage des coordonnées"
 INETIAN_PROJECTS_01_DESC: "Nous avons pu récupérer des coordonnées cryptées sur [wm_storm_shelter_planet.GetName] avant l'effondrement de l'abri. Nous avons des raisons de croire que l'une de ces coordonnées pourrait nous conduire à une machine utilisée par les Marchands ricéens pour manipuler les tempêtes cosmiques. Cette technologie pourrait en valoir la peine."
 #Special project completed
 cstorms.135.name: "Système foisonnant"
 cstorms.135.desc: "Par chance, nos [Root.Owner.GetScientistPlural] ont pu s'échapper de l'abri de [wm_storm_shelter_planet.GetName] avec des coordonnées cryptées. Les données ont depuis été déchiffrées, révélant trois endroits à explorer :\n\n[wm_digsite_A.GetName], [wm_digsite_B.GetName] et [wm_digsite_C.GetName]. Des analyses plus poussées indiquent que chacune de ces planètes a joué un rôle prépondérant dans le réseau des Marchands ricéens. Sinon, pourquoi ces coordonnées auraient-elles été consignées dans l'abri de [wm_storm_shelter_planet.GetName] ?"
 #Precursors Event Chain
 cs_inetian_chain_title: "Précurseurs : les Marchands ricéens"
 cs_inetian_chain_desc: "Nous avons trouvé les vestiges d'un ancien abri. Celui-ci appartenait à une civilisation ayant existé il y a des millions d'années ; une civilisation qui n'est pas mentionnée dans nos archives et qui a été soigneusement effacée de l'histoire. Nous devrions enquêter pour comprendre pourquoi."
 #Arcsite Coordinates A
 site_weathermanipulators_CoordinatesA_Residential_Planet: "Coordonnées A : planète colonisée"
 site_weathermanipulators_CoordinatesA_Residential_Planet_intro: "L'une des trois coordonnées trouvées dans l'abri anti-tempête nous a menés sur [From.Planet.GetName]. Au vu de la taille des ruines, il est clair que cette planète devait autrefois disposer de nombreuses métropoles. Les Marchands ricéens y vivaient certainement. Nous devons découvrir pourquoi ces coordonnées ont été conservées dans un abri anti-tempête."
 cstorms.140.name: "Intentions religieuses"
 cstorms.140.desc: "Il ne reste plus grand-chose des villes de [From.Planet.GetName]. Outre le passage du temps, les tempêtes ont détruit la plupart des bâtiments. L'architecture restante correspond à celle de [wm_storm_shelter_planet.GetName] et montre également un manque évident de prévention des catastrophes, malgré les nombreuses preuves des violentes conditions météorologiques. Compte tenu du degré de destruction, nous trouverons difficilement quelque chose d'utile, mais espérons que ce ne soit pas impossible.\n\nNos [Root.Owner.GetScientistPlural] ont identifié trois points d'intérêt à proximité du site d'atterrissage : une structure du service public relativement intacte, un temple et une énorme place. De bons points de départ pour continuer notre enquête sur les secrets des Marchands ricéens."
 cstorms.145.name: "Épicentre économique"
 cstorms.145.desc: "Nous avons formé plusieurs équipes pour étudier les trois lieux les plus prometteurs. Si la structure du service publique et la place présentaient des caractéristiques architecturales et culturelles intéressantes, seul le lieu de culte avait une véritable importance.\n\nSa façade friable cachait une salle caverneuse. À l'intérieur, 521 terminaux étaient disposés en cercles concentriques et, en leur centre, reposait une impressionnante (et totalement fonctionnelle) réplique de ce système stellaire. Les nanocomposants utilisés à l'intérieur de la maquette sont adaptés aux champs électromagnétiques de la planète. Malgré son âge, la maquette représente parfaitement les objets célestes de ce système.\n\nEn outre, une interface visible depuis chaque terminal court le long de sa base circulaire et comporte une liste d'entreprises et de valeurs boursières. Il ne s'agit pas d'un lieu de culte religieux, mais d'un centre d'échange et d'une bourse du RICE.\n\nCe bâtiment contenait autrefois des données importantes, essayons de mettre la main dessus."
 cstorms.145.a: "Fouillez les moindres recoins !"
 cstorms.150.name: "Livre de référence"
 cstorms.150.intro: "Notre enquête approfondie nous a permis de conclure que le centre d'échange de [From.Planet.GetName] a été vidé. Les terminaux ne sont pas fonctionnels et aucune information commerciale n'a été trouvée en dehors de l'image affichée sur les écrans.\n\nUn meuble de rangement dans un coin de la pièce contenait cependant ce qui semblait être des manuels d'utilisation. Les références de traduction approximative développées lors de nos fouilles sur [wm_storm_shelter_planet.GetName] nous ont permis de les comprendre grossièrement.\n\nIls contiennent des instructions pour opérer les terminaux, régler la maquette du système et obtenir l'aide d'une machine appelée « suppresseurs de perturbations sectoriels ». L'utilisation, l'orientation et l'activation de la machine y sont explicitées.\n\nIl doit s'agir de l'appareil mentionné dans l'ancien abri anti-tempête et la cible de nos recherches."
 cstorms.150.outro: "nous avons fait un pas de plus vers la compréhension des intentions des Marchands ricéens et peut-être vers la maîtrise du pouvoir de cette machine."
 cstorms.150.desc.a: "$cstorms.150.intro$ Cela signifie que $cstorms.150.outro$"
 cstorms.150.desc.b: "$cstorms.150.intro$ Le manuel parle de l'un des composants que nous avons trouvé sur [wm_digsite_B.GetName] et explique comment l'installer. Cela signifie que $cstorms.150.outro$"
 cstorms.150.desc.c: "$cstorms.150.intro$ Le manuel parle de la machine que nous avons trouvée sur [wm_digsite_C.GetName], mais il nous manque un composant important. Néanmoins, cela signifie que $cstorms.150.outro$"
 cstorms.150.desc.d: "$cstorms.150.intro$ Le manuel parle de la machine que nous avons trouvée sur [wm_digsite_C.GetName] et explique comment y installer le composant trouvé sur [wm_digsite_B.GetName]. La dernière étape consiste simplement à activer les suppresseurs de perturbations sectoriels. Nous pouvons enfin utiliser leur pouvoir !"
 cstorms.150.a: "En avant !"
 #Arcsite Coordinates B
 site_weathermanipulators_CoordinatesB_Industrial_Planet: "Coordonnées B : planète industrielle"
 site_weathermanipulators_CoordinatesB_Industrial_Planet_intro: "L'une des trois coordonnées trouvées dans l'abri anti-tempête nous a menés sur [From.Planet.GetName], un monde industriel des Marchands ricéens. À en juger par l'architecture, cette planète n'a clairement pas été utilisée comme lieu d'habitation. Mais le mystère reste entier quant à la nature exacte de l'industrie locale."
 cstorms.155.name: "Efficacité industrielle"
 cstorms.155.desc: "Il était difficile de voir ne serait-ce que la surface de [From.Planet.GetName] à travers l'épaisse fumée qui flottait encore au-dessus des usines. Une grande partie de la planète a été dévastée par des tempêtes cosmiques qui ont laissé des couloirs homogènes dans le paysage industriel. L'un d'entre eux était idéal pour un atterrissage.\n\nAucun signe n'indique que l'on ait tenté de démanteler ces installations de production. Elles ont simplement été abandonnées. Beaucoup d'entre elles contiennent encore des matériaux. Les analyser pourrait nous aider à comprendre à quoi servait cette planète au sein de leur infrastructure commerciale. Cela pourrait également nous fournir de nouvelles informations sur cette « puissante » machine à laquelle il est fait référence dans l'abri anti-tempête de [wm_storm_shelter_planet.GetName]."
 cstorms.160.name: "Cargaison dangereuse"
 cstorms.160.desc: "Une première analyse des matériaux utilisés sur [From.Planet.GetName] indique une composition très volatile. Ces produits faisaient partie d'un processus plus large et ne devaient pas être utilisés sans transformation. Les substances étaient transportées vers un dépôt de collecte central via un système de tapis roulants.\n\nLes marques de brûlure environnantes indiquent que des vaisseaux venaient chercher les produits, mais pour les livrer où ? Compte tenu de leur nature explosive, ça ne devait pas être bien loin.\n\nNous avons découvert plusieurs caisses de transport à proximité. De gros efforts ont été faits pour emballer le contenu en toute sécurité ; on voit des restes d'étiquettes d'avertissement imprimés sur les côtés. Un seul mot est encore lisible : « Dangereux »."
 cstorms.165.name: "Chaînon manquant"
 cstorms.165.intro: "Nos [Root.Owner.GetScientistPlural] ont rapidement déballé les caisses soigneusement conditionnées.\n\nLors de l'ouverture de la première caisse, un fort sifflement dénota la présence d'une chambre intérieure climatisée, provoquant une panique momentanée à l'idée que le contenu puisse être déstabilisé. Par chance, tout est resté intact.\n\nUn examen plus approfondi a révélé qu'il s'agissait d'un composant de machine digne d'un travail d'orfèvre, qui contenait une quantité de matière volatile produite par l'usine."
 cstorms.165.outro: "\n\nNous allons rapporter le composant à bord pour l'étudier plus en détail. Nos [Root.Owner.GetScientistPlural] ne devraient pas passer plus de temps que nécessaire sur [From.Planet.GetName]."
 cstorms.165.desc.a: "$cstorms.165.intro$\n\nUne étiquette d'expédition à l'intérieur de la caisse parle de « suppresseurs de perturbations sectoriels ». Nos [Root.Owner.GetScientistPlural] ignorent de quoi il s'agit, mais étant donné le conteneur de stockage ultra-résistant et les avertissements placardés à l'extérieur de la caisse, cela devait être quelque chose d'important.$cstorms.165.outro$" #A & C sites not yet visited
 cstorms.165.desc.b: "$cstorms.165.intro$\n\nLe composant a tout de suite semblé familier à nos [Root.Owner.GetScientistPlural], qui ont alors sorti le manuel trouvé sur [wm_digsite_A.GetName]. Il s'agit d'un composant important des suppresseurs de perturbations sectoriels.$cstorms.165.outro$" #A site visited & C site not visited
 cstorms.165.desc.c: "$cstorms.165.intro$\n\nSa forme singulière et son noyau liquide indiquent qu'il pourrait s'agir d'un composant nécessaire au fonctionnement de l'installation trouvée sur [wm_digsite_C.GetName]. La substance qu'il contient permet probablement d'alimenter les suppresseurs de perturbations sectoriels. Cependant, l'installer en toute sécurité requiert sans doute des compétences particulières.$cstorms.165.outro$" #A site not visited & C site visited
 cstorms.165.desc.d: "$cstorms.165.intro$\n\nCe composant semble être l'élément manquant des suppresseurs de perturbations sectoriels trouvés sur [wm_digsite_C.GetName]. En utilisant le manuel trouvé sur [wm_digsite_A.GetName], nous pourrons le placer correctement et peut-être enfin activer la machine.$cstorms.165.outro$" #A & C sites visited
 cstorms.165.a: "Beau travail"
 #Arcsite Coordinates C
 site_weathermanipulators_CoordinatesC_Barren_Planet: "Coordonnées C : planète stérile"
 site_weathermanipulators_CoordinatesC_Barren_Planet_intro: "L'une des trois coordonnées trouvées dans l'abri anti-tempête nous a menés sur [From.Planet.GetName]. La surface n'est guère plus que de la neige et de la poussière, mais les balayages initiaux indiquent que la planète était autrefois habitable. Était-elle importante pour les Marchands ricéens avant ou après sa destruction ?"
 cstorms.170.name: "Sans fin et sans relâche"
 cstorms.170.desc: "D'interminables tempêtes de neige soufflaient à la surface de [From.Planet.GetName], et comme si cela n'était pas suffisant, le paysage enneigé cachait une autre étrange surprise.\n\nDes couches et des couches de poussière nous attendaient en dessous. Nous y avons trouvé des preuves des formes de vie qui ont autrefois habité ce monde. Elles ont toutes été ensevelies en même temps sous les couches de poussière, laissant penser à une exceptionnelle extinction de masse. L'effondrement des écosystèmes a dû appauvrir l'atmosphère au point de provoquer une période glaciaire, transformant la planète en désert gelé.\n\nIl y a certainement plus à découvrir ici, mais nous ne trouverons pas de réponses à la surface. Nos [Root.Owner.GetScientistPlural] suggèrent de creuser."
 cstorms.170.a: "Lançons les fouilles"
 cstorms.171.name: "Racines de la vie"
 cstorms.171.desc: "Nos [Root.Owner.GetScientistPlural], équipés de tenues de protection et de machines résistantes au gel, se sont mis à déblayer les couches de neige et de poussière. Un travail simple, mais fastidieux. En dessous, ils ont découvert d'étranges motifs : une série de tranchées ressemblant à des racines, couvrant une immense partie de la zone.\n\nÀ l'intérieur se trouvaient des restes desséchés de toutes sortes d'organismes, de la végétation à la faune. Les tranchées semblaient avoir broyé les organiques en les écrasant contre leurs parois rocheuses, en extrayant tous les nutriments importants et en les transportant vers un point de convergence dans un processus s'apparentant à la digestion. La poussière qui en est ressortie recouvre désormais la majeure partie du paysage de [From.Planet.GetName].\n\nQui ou quoi ces fissures nourrissaient-elles ?"
 cstorms.171.a: "Trouvez l'origine"
 cstorms.172.name: "Machines d'antan"
 cstorms.172.intro: "Le réseau de tranchées est immense. Plus nos [Root.Owner.GetScientistPlural] avançaient, plus elles convergeaient vers un point : l'une des dernières montagnes de [From.Planet.GetName]. En son sommet se trouve un plateau manifestement artificiel, sur lequel trônent trois grandes machines équidistantes les unes des autres. Elles semblent être d'origine ricéenne, car elles sont marquées par des symboles de leur langue et correspondent à ce que nous savons de leur société. Malgré leur grand âge et les vents extrêmes qui balayent le plateau, elles sont en excellent état."
 cstorms.172.outro: "\n\nNous avons trouvé ce que nous cherchions et sommes sur le point de faire une incroyable découverte."
 cstorms.172.desc.a: "$cstorms.172.intro$ \n\nIl doit s'agir des machines mentionnées sur [wm_storm_shelter_planet.GetName]. Malheureusement, nous n'avons pas les connaissances nécessaires pour comprendre le fonctionnement complexe de ces appareils. De plus, il manque des composants importants à la console de commande. Sur une petite plaque, on peut lire les mots « suppresseurs de perturbations sectoriels ».\n\nSi nous parvenions à activer les machines, nous pourrions enfin savoir à quoi elles servent. Nous devons explorer les autres coordonnées. $cstorms.172.outro$" #A&B not visited
 cstorms.172.desc.b: "$cstorms.172.intro$ \n\nLes schémas du manuel que nous avons trouvé sur [wm_digsite_A.GetName] semblent correspondre à ces machines. Il s'agit donc bien des suppresseurs de perturbations sectoriels mentionnés dans l'abri anti-tempête de [wm_storm_shelter_planet.GetName].\n\nD'après le manuel, ces machines sont contrôlées via un panneau de commande. Nos [Root.Owner.GetScientistPlural] en ont repéré un au pied d'une des machines, mais il semble manquer une pièce importante. Il nous reste un ensemble de coordonnées à explorer, nous pourrions y trouver des réponses. $cstorms.172.outro$" #A visited & B not visited
 cstorms.172.desc.c: "$cstorms.172.intro$ \n\nIl doit s'agir des machines mentionnées sur [wm_storm_shelter_planet.GetName], appelées « suppresseurs de perturbations sectoriels » ! De plus, le composant que nous avons trouvé sur [wm_digsite_B.GetName] correspondait à la pièce manquante du panneau de commande de l'une des machines.\n\nD'autres réparations seraient toutefois risquées en raison de la complexité et de l'âge des composants. Nos [Root.Owner.GetScientistPlural] recommandent de chercher des informations supplémentaires avant de poursuivre. $cstorms.172.outro$" #A not visited & B visited
 cstorms.172.desc.d: "$cstorms.172.intro$ \n\nAucun doute, ce sont les machines mentionnées sur [wm_storm_shelter_planet.GetName] et décrites dans le manuel que nous avons trouvé sur [wm_digsite_A.GetName] : les suppresseurs de perturbations sectoriels. Il ne nous reste plus qu'à installer le composant trouvé sur [wm_digsite_B.GetName] et espérer que les machines soient toujours opérationnelles. Nous pourrons alors enfin découvrir à quoi elles servent ! $cstorms.172.outro$" #A&B visited
 cstorms.172.a: "Voyons de quoi ces machines sont capables" #Finished sites A and B
 cstorms.172.b: "Pas maintenant" #Did not finish sites A and B
 #Special Project 2
 INETIAN_PROJECTS_02: "Le secret de la machine"
 INETIAN_PROJECTS_02_DESC: "Les trois coordonnées que nous avons trouvées sur [wm_storm_shelter_planet.GetName] nous ont permis de résoudre ce vieux casse-tête. Il ne nous reste plus qu'à activer les suppresseurs de perturbations sectoriels pour découvrir à quoi ils servent !"
 cstorms.176.name: "Le secret de la machine"
 cstorms.176.desc: "Nous avons trouvé la dernière pièce du puzzle et nos [Root.Owner.GetScientistPlural] se sont mis au travail. Le composant de [wm_digsite_B.GetName] correspond parfaitement à la pièce manquante du panneau de commande et, grâce au manuel de [wm_digsite_A.GetName], nous avons pu l'installer correctement. Les trois machines se sont alors animées.\n\nDes violentes vibrations ont secoué la poussière et la neige du plateau. Dans le crépitement d'un éclair, un [Root.Owner.GetScientist] a été instantanément pulvérisé et les particules de poussière qui formaient autrefois son corps ont été absorbées par les tranchées et transportées vers les suppresseurs de perturbations sectoriels.\n\nVoilà donc ce qu'il s'est passé sur [wm_digsite_C.GetName] : les tranchées menant aux machines sont des conduits d'énergie qui absorbent la matière biologique environnante. D'où la destruction de la planète.\n\nLes suppresseurs de perturbations sectoriels sont désormais pleinement opérationnels et il reste assez d'énergie pour les activer. Il suffit d'appuyer sur le bouton."
 cstorms.176.a: "Activons cette machine"
 cstorms.176.b: "N'appuyons pas sur le bouton"
 #Delayed Event 1
 cstorms.180.name: "Vestiges redécouverts"
 cstorms.180.desc: "Bien que nous ayons découvert les secrets des suppresseurs de perturbations sectoriels, nous ne savons toujours pas ce qui est arrivé aux Marchands ricéens. Cependant, une nouvelle analyse approfondie de toutes les données existantes nous a permis d'obtenir de nouvelles informations :\n\nLes archives commerciales que nous avons trouvées sur [wm_digsite_A.GetName] montrent qu'ils avaient de fortes convictions égalitaires. Cette conclusion est renforcée par le niveau de vie élevé et les installations luxueuses qui subsistent encore sur la planète : à quelques variations près, tous les citoyens partageaient le même confort et les mêmes opportunités, indépendamment de leur profession, de leur statut social ou de leur origine.\n\nSur [wm_digsite_B.GetName], nous avons trouvé des informations sur l'utilité de chacune des usines : elles faisaient toutes partie d'une chaîne de production beaucoup plus vaste destinée à fournir à l'empire les ressources nécessaires au maintien de son opulent mode de vie. Pour que tous soient égaux, une quantité phénoménale de matériaux et de nourriture était nécessaire.\n\nLa remise en service des suppresseurs de perturbations sectoriels sur [wm_digsite_C.GetName] a permis d'en savoir plus. Même si leur fonction exacte reste un mystère, un signal de données traçable a été émis, permettant de conclure que les machines ne sont pas orientées vers un objet mobile.\n\nNos [Root.Owner.GetScientistPlural] recommandent d'explorer les secteurs voisins pour trouver une réponse."
 cstorms.180.a: "Cherchons cet objet"
 #Digsite 5
 site_weathermanipulators_storm_formation: "Origine des prédominants"
 site_weathermanipulators_storm_formation_intro: "Un signal de données était enregistré dans la console de commande des suppresseurs de perturbations sectoriels. Malgré la difficulté de la tâche, nous avons réussi à cloner son modèle et à chercher une correspondance dans la galaxie. Le signal menait à une planète inhabitée. Il est temps de découvrir quels étaient les objectifs des Marchands ricéens."
 cstorms.181.name: "Plaines banales"
 cstorms.181.desc: "À première vue, [From.Planet.GetName] semble tout à fait banale ; une planète comme tant d'autres dans la galaxie. Rien n'indique d'où provient le signal, il n'y a pas d'émetteur apparent ou de technologie suffisamment puissante pour enregistrer des signaux provenant de systèmes très éloignés.\n\nLes recherches se poursuivent."
 cstorms.182.name: "Catastrophe concentrée"
 cstorms.182.desc: "Une fois à la surface, nous avons rapidement constaté que le signal s'intensifiait ou s'affaiblissait en fonction de notre position. Suivant ce schéma simple, nous nous sommes retrouvés près d'une chaîne de hautes montagnes de l'autre côté de la planète.\n\nÀ mesure que nous approchions, le paysage était de plus en plus ravagé et stérile, comme si une force dévastatrice s'était abattue sur cette partie du monde. Au vu des dégâts, nous pensons que cet endroit a été frappé par une tempête de poussière cosmique. Mais si c'était vraiment le cas, toute la planète aurait été touchée. C'est la première fois que nous voyons des dégâts si localisés. Nous allons devoir escalader les montagnes pour en savoir plus."
 cstorms.183.name: "Énergie volatile"
 cstorms.183.desc: "La chaîne de montagnes dévastée était composée de nombreux pics et vallées, mais un cratère aux formes étranges a très vite attiré notre attention. Les parois étaient lisses et, au centre, une série d'anneaux concentriques étaient sculptés dans le sol.\n\nEn descendant, nous avons senti que nous étions attirés par une force inéluctable émanant du centre. Des filaments d'énergie émergeaient des anneaux, certains sortant même de l'atmosphère de la planète. Aucun doute, c'est la source du signal !\n\nNos [Root.Owner.GetScientistPlural] proposent d'analyser le cratère et ses fluctuations d'énergie afin de mieux comprendre ce qui se passe."
 cstorms.184.name: "Un début incertain"
 cstorms.184.desc: "D'après les données environnementales et les simulations détaillées, nous pouvons affirmer qu'une tempête de poussière céleste a soufflé à travers ces sommets et qu'elle s'est manifestée à cet endroit précis ! Nous pensons que si elle n'a pas ravagé toute la planète, c'est simplement parce qu'elle était trop petite : nos relevés indiquent qu'elle n'était qu'une fraction de la taille d'une tempête moyenne.\n\nÉtant donné que les Marchands ricéens qualifiaient les suppresseurs de perturbations sectoriels d'appareils de manipulation et que le signal énergétique de cette tempête était enregistré dans leurs banques de données, il est probable qu'ils aient tenté de contrôler la tempête cosmique. En calculant sa trajectoire après son passage dans ces montagnes, nous pourrions faire de nouvelles découvertes intéressantes."
 cstorms.184.a: "Continuons !"
 #Special Project 3
 INETIAN_PROJECTS_03: "Sur les traces des marchands"
 INETIAN_PROJECTS_03_DESC: "Nous avons trouvé le point de départ d'une vieille tempête de poussière céleste, mais tout porte à croire qu'elle était beaucoup plus petite que la normale. Compte tenu de sa petite taille, il est étrange que les Marchands ricéens aient voulu la contrôler à l'aide des suppresseurs de perturbations sectoriels.\n\nEn suivant la trajectoire de la tempête, nous pourrions comprendre pourquoi ils ont investi autant de temps dans ce projet."
 cstorms.186.name: "Sur les traces des marchands"
 cstorms.186.desc: "Retracer la trajectoire de la tempête de poussière s'est avéré plus complexe que prévu. À quelques systèmes seulement de son point de départ, sa force et sa taille ont radicalement changé. Nos [Root.Owner.GetScientistPlural] supposent que c'est à ce moment-là que les suppresseurs de perturbations sectoriels ont été utilisés. Ils ont déséquilibré la tempête et pollué son vortex interne de restes pulvérisés de formes de vie provenant de la surface de [wm_digsite_C.GetName].\n\nAlors que la tempête continuait à faire rage dans la galaxie, elle a dévasté plusieurs systèmes.\n\nTout cela dans le seul but d'éloigner une minuscule tempête d'un système... Nos capteurs ont détecté une station spatiale abandonnée. Les Marchands ricéens semblent avoir causé plusieurs extinctions de masse en voulant protéger cet endroit.\n\nLa station n'est peut-être pas le monde-capitale que nous cherchons, mais elle doit être tout aussi importante pour justifier de telles mesures."
 cstorms.186.a: "En route !"
 #Digsite 6
 site_weathermanipulators_last_shelter: "Avant la catastrophe"
 site_weathermanipulators_last_shelter_intro: "Les Marchands ricéens ont essayé de protéger une station spatiale de ce système d'une minuscule tempête de poussière. Ce qu'ils n'avaient pas prévu, c'est qu'elle deviendrait si importante que plusieurs autres de leurs systèmes seraient détruits. Pourquoi tenaient-ils à protéger cette installation ?"
 cstorms.190.name: "Orbite stable"
 cstorms.190.desc: "La station spatiale en orbite autour de [From.Planet.GetName] est bien plus grande que ce que nous pensions. Avec ses innombrables instruments de recherche, son système de survie sophistiqué et ses dizaines de capteurs spatiaux, elle semble être plus qu'une simple station. Cela laisse penser qu'elle a été conçue comme colonie à long terme et non comme refuge pour les voyageurs de passage.\n\nSon état laisse toutefois à désirer. Sa coque a été endommagée, provoquant une décompression catastrophique qui a fait exploser plusieurs secteurs. Il est difficile de savoir si les dégâts ont été causés de l'extérieur ou de l'intérieur. Heureusement, les systèmes de contrôle de l'orbite et de stabilisation de l'axe sont encore opérationnels, ce qui explique que la structure n'ait pas été attirée par l'étoile ou ne se soit pas mise à tourner de manière incontrôlée.\n\nIl sera difficile de pénétrer à l'intérieur sans déstabiliser ce fragile équilibre."
 cstorms.191.name: "Pression impressionnante"
 cstorms.191.desc: "Pour pénétrer dans la station du système [This.System.GetName], il nous faut ouvrir un sas non endommagé en veillant à ne pas provoquer d'implosions, l'intérieur étant toujours pressurisé, reproduisant parfaitement l'atmosphère d'une planète malgré son ancienneté.\n\nIl nous a fallu des jours pour rendre complètement étanche la liaison entre notre vaisseau et la station et équilibrer la pression. Nous avons finalement réussi à ouvrir la porte en toute sécurité. Malheureusement, nous nous sommes immédiatement heurtés à un autre obstacle : un couloir bloqué, obstrué par des poutres tordues et des débris provenant de la dépressurisation des environs. Il nous faudra un certain temps avant de pouvoir continuer."
 cstorms.192.name: "Tombeau"
 cstorms.192.desc: "Après avoir dégagé le chemin, nous avons commencé à explorer la station afin de trouver des réponses.\n\nUne grande partie des scanners étant dirigés vers l'intérieur de la station, nous supposons qu'elle n'a pas été construite pour observer le cosmos, mais pour protéger quelque chose. Nous avons également trouvé des objets personnels qui auraient pu appartenir aux Marchands ricéens, ainsi que des journaux décrivant la vie dans la station. Ceux-ci parlaient d'une « cargaison » importante, conservée dans une chambre gardée quelque part à l'intérieur de la base. Il ne nous a pas fallu longtemps pour la trouver... Il s'agissait d'un tombeau !\n\nDes restes desséchés, presque momifiés, étaient éparpillés dans la pièce. Chacun d'entre eux appartenant à un Marchand ricéen. Compte tenu de la position des corps, ils ne semblent pas s'être débattus. C'est comme s'ils s'étaient assis en attendant la mort. Qu'a-t-il bien pu se passer ici ?"
 cstorms.193.name: "Orgueil"
 cstorms.193.desc: "La « cargaison » était au milieu de la pièce. Un appareil singulier, flambant neuf. Il est incontestablement d'origine ricéenne, mais plus avancé que tout ce que nous avons vu jusqu'à présent.\n\nIl est entouré de plusieurs terminaux qui affichent des extraits du même texte. Nous avons pu les traduire rapidement :\n\n§LChers visiteurs, si vous lisez ces lignes, vous êtes témoins de notre orgueil. Dans notre noble quête d'égalité, nous avons oublié les véritables garants de l'égalité : la création et la destruction.\n\nAfin de préserver nos routes commerciales des ravages des tempêtes cosmiques, nous avons manipulé la nature, et ce qui était autrefois des phénomènes mineurs a échappé à notre contrôle. Les tempêtes cosmiques ont décimé nos mondes. Ce n'était pas le fruit du hasard, mais de l'équilibre. Nous nous sommes enfermés dans cette station. Elle était notre dernière chance de survie. Bien que nous n'utilisions plus nos suppresseurs de perturbations, de nouvelles tempêtes se se sont formées, plus puissantes que toutes les précédentes. Notre dernière mission était claire :\n\nTravailler d'arrache-pied pour mettre au point cette machine. Nous l'avons fabriquée pour vous, visiteurs. Elle vous protègera des tempêtes cosmiques sans les aggraver. Notre disparition est notre absolution, mais elle ne doit pas être la vôtre.§!\n\nIci, les Marchands ricéens ont scellé leur destin. Leur générosité n'avait d'égale que leur négligence. Nous quittons la station avec leur cadeau d'adieu."
 cstorms.193.a: "Qu'ils reposent en paix"
 cstorms.193.b: "Une fin digne d'un peuple d'imbéciles"
 #Artifact action
 artifact_inetian_research: "Secrets des Marchands ricéens"
 artifact_inetian_research_desc: "Permet d'étudier en profondeur les secrets des Marchands ricéens."
 artifact_inetian_research_completed: "$artifact_inetian_research$"
 artifact_inetian_research_completed_desc: "Nous avons mis au service de notre cause les connaissances anciennes des Marchands ricéens."
 INETIAN_PROJECTS_04: "Étudier les secrets des Marchands ricéens"
 INETIAN_PROJECTS_04_DESC: "Après avoir découvert le lieu de repos des Marchands ricéens, nous aimerions en savoir plus sur leur immense empire. Nous souhaitons les étudier à nouveau."
 cstorms.195.name: "Étudier les secrets des Marchands ricéens"
 cstorms.195.desc: "Le lieu de repos des Marchands ricéens s'est avéré être une station spatiale à la pointe de la technologie. Elle a été construite comme refuge pour survivre aux terribles tempêtes cosmiques qu'ils ont eux-mêmes créées. Cet habitat représente le zénith de leurs connaissances technologiques et dispose de systèmes de survie et de protection très sophistiqués. Toutefois, cela n'a pas pu les sauver.\n\nLa station s'est dégradée au fil du temps et n'est plus habitable, mais elle a été une mine de connaissances pour nos [Root.Owner.GetScientistPlural]. Ils ont non seulement trouvé les principales routes commerciales des Marchands ricéens dans une banque de données, mais aussi des prototypes de machines de contrôle climatique plus efficaces et moins destructrices de la planète, qui traînaient simplement sur les lieux.\n\nLa ténacité des Marchands ricéens a fait ses preuves et nous aidera à surmonter les tempêtes à venir."
 secrets_of_the_inetian_traders: "Secrets des Marchands ricéens"
 secrets_of_the_inetian_traders_hive_mach: "Secrets des Marchands ricéens"
 secrets_of_the_inetian_traders_desc: "Une fois de plus, les connaissances des Marchands ricéens nous ont été utiles. Grâce à eux, nous pouvons désormais bénéficier de frais de marché moins élevés."
 secrets_of_the_inetian_traders_hive_mach_desc: "Une fois de plus, les données des Marchands ricéens ont aidé le collectif. Les frais de marché sont désormais moins élevés."
 #Hyperlane Detailer - Secrets Of Inetian Traders Reward
 sm_hyperlane_detailer: "Contrôleur des hyperlignes"
 NAME_inetian: "Marchands ricéens"
 ###########################################
 #The adAkkaria Convention of Benevolence #
 ###########################################
 cs_adAkkaria_chain_title: "Précurseurs : l'adAkkaria"
 cs_adAkkaria_chain_desc: "Pour en savoir plus sur le destin de cette étrange et ancienne civilisation, nous devons suivre une série d'indices, quel que soit l'endroit où ils nous mènent."
 #Anomaly: Ancient Signals
 STORMS_PREC_ONE: "Signaux anciens"
 STORMS_PREC_ONE_DESC: "Nous avons reçu une série d'étranges signaux électroniques en provenance de ce système. Des études préliminaires indiquent que ces transmissions pourraient être vieilles de plusieurs milliers d'années. Notre équipage souhaite en trouver l'origine."
 cstorms.205.name: "Un signal de bienfaisance"
 cstorms.205.desc: "Les étranges signaux que nous avons détectés dans ce système proviennent d'une ancienne station de communication en orbite autour de [FromFrom.GetName]. Les messages semblent provenir d'une civilisation disparue.\n\nPar conséquent, nos [Root.Owner.GetScientistPlural] ont du mal à les traduire. Ils nous suggèrent d'entrer dans la station pour qu'ils puissent se connecter directement à l'unité centrale."
 #Digsite: The Propaganda Station
 site_adakkaria_the_propaganda_station: "La station de propagande"
 site_adakkaria_the_propaganda_station_intro: "Cette ancienne station de communication est toujours active. En y pénétrant et en nous connectant directement à son système, nous pourrons peut-être traduire le contenu des transmissions."
 cstorms.215.name: "Une interface vers le passé"
 cstorms.215.desc: "L'entrée dans la station n'a posé que peu de problèmes, mais il a été difficile de se déplacer à l'intérieur. Bien qu'elle ait été étonnamment bien conservée, en partie grâce aux alliages avancés utilisés pour sa coque extérieure, les couloirs étroits et les plafonds bas ont constitué un véritable défi.\n\nL'intérieur de l'avant-poste ne donne que peu d'indices sur ses anciens propriétaires. Les murs sont ornés d'affiches en papier et en plastique représentant des images stylisées d'individus d'une espèce organique inconnue. Ils se tiennent debout, l'air déterminé, sur fond de conquête et de célébration. Ces affiches ont sans nul doute été conçues pour transmettre un certain sentiment de fierté et de camaraderie.\n\nL'unité centrale est tout aussi mystérieuse. Au départ, nos [Root.Owner.GetEngineerPlural] pensaient qu'elle était analogique, comme ce que nous avons vu chez les pré-PRL. Mais sous les boutons et les cadrans se cachait un ensemble complexe de circuits électroniques fabriqués à partir d'alliages que nous ne connaissons pas. Nos [Root.Owner.GetScientistPlural] pensent que cette civilisation pourrait avoir sauté plusieurs étapes dans le développement de l'informatique, ce qui expliquerait ce mélange anachronique de technologies.\n\nAprès une série d'essais et d'échecs, nos [Root.Owner.GetLinguists] ont finalement réussi à traduire la première des nombreuses transmissions enregistrées."
 cstorms.220.name: "Message des dirigeants exaltés"
 cstorms.220.desc: "Après s'être connectés à l'ancienne unité centrale, nos [Root.Owner.GetLinguists] ont pu faire une transcription de la première transmission :\n\n§LPeuple de la Convention d'adAkkaria !\n\nJe ne vous parle pas en tant que leader, mais en tant qu'ami et mentor.\n\nComme vous l'avez remarqué, les jours s'assombrissent et même les étoiles nous sont hostiles.\n\nMais nous devons avoir confiance ! Tout comme nos bienfaiteurs ont eu confiance en nous, nous devons avoir confiance en ce qu'ils ont prévu pour nous. J'ai confiance en vous.\n\nPendant des siècles, notre peuple a protégé les étoiles des pires barbares. Notre destin est de purger la galaxie de ces forces maléfiques, et ce n'est pas un revers qui va nous arrêter. Nous ne capitulerons pas devant les légions malveillantes qui conspirent contre nous.\n\nJe crois en notre mission. La Convention de bienfaisance d'adAkkaria apporte vérité et liberté à toutes les civilisations. Notre mission nous préserve. Notre destin nous permet de triompher et de prospérer !\n\nEt c'est pourquoi, chers amis, nous ne devons pas nous laisser aller au doute. Pleurons les pertes et honorons ceux qui sont tombés. Puis rassemblons-nous, comme nous l'avons toujours fait. Pour nos bienfaiteurs. Pour la Convention d'adAkkaria. Pour la bienfaisance !§!"
 cstorms.225.name: "Ultimatum de la ComUni"
 cstorms.225.desc: "Trier et analyser les données trouvées sur l'ancienne station a été une tâche extrêmement décourageante pour nos [Root.Owner.GetLinguists]. Plusieurs transmissions ont toutefois été jugées particulièrement instructives, certaines donnant un aperçu de conversations enregistrées :\n\n§SilSapne Tuerthi, présentateur§!\n§LVenons-en maintenant à la dernière intervention de la Communauté universelle. Nous recevons le haut professeur akMani Sando et emEk Inna, docteur de toute existence perceptible. Comment interprétez-vous les demandes de la ComUni ?§!\n\n§SakMani Sando, haut professeur§!\n§LCes demandes sont scandaleuses ! La Communauté universelle continue de traiter les mondes sous-civilisés avec le plus grand mépris. Ne devrions-nous pas plutôt demander à ces gardiens autoproclamés de la morale galactique s'il n'est pas plus contraire à l'éthique de garder pour soi des technologies potentiellement salvatrices ? De taire ces idéaux qui constituent le fondement de notre société triomphante ? Ne serait-il pas odieux d'abandonner un monde à sa propre perte alors que nous avons les moyens de le sauver ?§!\n\n§SilSapne Tuerthi, présentateur§!\n§LVoilà de solides arguments ! Docteur de toute existence perceptible, j'imagine que vous devez être tout aussi indigné que la ComUni manipule notre destin.§!\n\n§SemEkku Inna, docteur de toute existence perceptible§!\n§LCe que je vais dire risque de vous choquer. Malgré l'entêtement dont elle fait preuve, je pense que nous devrions nous efforcer de répondre aux préoccupations de la ComUni...§!\n\n§TLa transmission a été interrompue.§!"
 cstorms.225.a: "Ils étaient extrêmement dogmatiques"
 cstorms.225.a.hive: "Trop de voix conduisent au chaos"
 cstorms.225.a.machine: "La vie est profondément argumentative"
 cstorms.230.name: "Saints et psioniques"
 cstorms.230.desc: "Une autre transmission a été jugée particulièrement intéressante. Bien qu'elle soit clairement personnelle, elle pourrait nous fournir un contexte utile pour notre enquête :\n\n§SakTamian Riwan§!\n§LJ'ai appris que tu avais à nouveau rendu visite à enTulla Saman hier soir. Je croyais que tu n'y pensais plus et que tu m'aimais ?§!\n\n§SinElka Utae§!\n§LJe te jure que ce n'était rien de plus qu'une visite de courtoisie. Je suis à toi et à personne d'autre !§!\n\n§SakTamian Riwan§!\n§LC'est ce que dit ta bouche, mais ton esprit me dit tout autre chose.§!\n\n§SinElka Utae§!\n§LNon, pas toi !§!\n\n§SakTamian Riwan§!\n§LEt si, moi aussi ! J'ai découvert mes dons psioniques hier soir ! Et ce que j'imaginais être une joyeuse exploration de nos sentiments les plus intimes s'est transformé en désespoir ! Je vois la trahison dans tes pensées !§!\n\n§SinElka Utae§!\n§LTu ne comprends pas ! Mon esprit... Je n'y peux rien. Je ne peux m'empêcher de considérer cette voie comme rationnelle. Oh, Riwan, si seulement tes nouveaux dons psioniques te permettaient de lire dans mon coeur plutôt que dans mes pensées !§!"
 cstorms.230.a: "Des dons psioniques ? Intéressant..."
 cstorms.230.b: "Du blabla sans intérêt !"
 cstorms.230.b.hive: "Une forme de divertissement étrangement individualiste"
 cstorms.230.b.machine: "Les organiques et leurs histoires..."
 dramatic_enthusiasm: "Passionnés d'histoires aliens"
 melodramatic_much: "Détracteurs d'histoires aliens"
 cstorms.235.name: "Transmission ancienne"
 cstorms.235.desc: "Nos [Root.Owner.GetLinguists] ont traduit d'autres transmissions et pensent que celle-ci mérite une attention particulière :\n\n§LLes rapports en provenance du système Haliios dressent un tableau de plus en plus sombre. Les troupes solphaniennes ont attaqué nos vaillantes forces d'illumination à enYpsal ! Nos dirigeants exaltés ont déclaré que le processus ne serait pas interrompu pour autant. Nous citons : « Nos bienfaiteurs ne nous ont pas abandonnés, alors nous n'abandonnerons aucune civilisation sous-développée. »\n\nDes rumeurs circulent également sur une éventuelle collaboration entre les autorités barbares et les représentants de la ComUni. L'ambassadeur de cette dernière nie cependant que la communauté interstellaire négocie avec les oppresseurs barbares et a déclaré qu'il s'agissait d'un nouvel exemple de la « paranoïa confortable » de nos dirigeants exaltés.\n\nMais que ce soit avec ou sans alliés puissants, le processus d'illumination des Solphani se trouve dans une phase critique. Il ne sera pas facile d'inverser cette tendance, mais...§!\n\n§TMalheureusement, la suite est trop corrompue pour être déchiffrée. Nos [Root.Owner.GetEngineerPlural] ont fait une copie de la base de données et nous espérons qu'au fil du temps, nous pourrons en apprendre davantage sur cette civilisation disparue.§!"
 cstorms.235.a: "Nous attendons avec impatience les prochaines découvertes"
 #Event: A Site Barren and Bare
 cstorms.245.name: "Un site archéologique inhospitalier"
 cstorms.245.desc: "Une tempête cosmique ayant fait rage dans le système de [planet_windswept_fates.System.GetName] a mis au jour un site archéologique potentiellement intéressant sur §Y[planet_windswept_fates.GetName]§!.\n\nLes premiers scans indiquent une atmosphère instable dévastatrice dominée par de violentes tempêtes planétaires. Nos [Root.Owner.GetScientistPlural] ne s'attendaient pas à trouver les vestiges d'une civilisation sur un monde comme celui-ci et sont certains que nous pourrions en apprendre beaucoup."
 cstorms.245.a: "Préparons une équipe pour s'y rendre !"
 #Digsite: Windswept Fates
 site_adakarria_windswept_fates: "Destinée balayée par les vents"
 site_adakarria_windswept_fates_intro: "Aussi destructrices que puissent être les tempêtes cosmiques, celle-ci a révélé des preuves de l'existence d'une civilisation alien. Bien que l'atmosphère de la planète soit très instable, une équipe d'exploration pourrait révéler le terrible destin de cette culture ancienne."
 cstorms.2105.name: "Conditions difficiles"
 cstorms.2105.desc: "Notre équipe est bien arrivée sur [From.Planet.GetName] et s'est rapidement mise au travail pour cartographier ce nouvel environnement.\n\nLa récente tempête cosmique qui a frappé ce système a été si violente qu'elle a déplacé suffisamment de couches de poussière et de terre pour révéler les vestiges d'une ancienne civilisation.\n\nLorsque nos scientifiques ont examiné les découvertes archéologiques, ils ont été étonnés de constater que les couches de sable qui recouvraient les vestiges avaient une composition totalement différente de celle du terrain environnant. Des scans de la planète ont révélé que ces sédiments proviennent d'un désert situé à des centaines de kilomètres de là. Ceux-ci n'ont donc pu être transportés que par une force colossale, telle qu'une tempête planétaire des plus extrêmes."
 cstorms.2105.a: "Poursuivons"
 cstorms.2110.name: "Ce qui a été perdu autrefois"
 cstorms.2110.desc: "Malgré les étranges conditions météorologiques de la planète, nos [Root.Owner.GetScientistPlural] ont bien progressé. Mais au fil des jours, leurs découvertes sont devenues de plus en plus étranges et inquiétantes.\n\nIls ont d'abord trouvé des vestiges de maçonnerie et de matière organique noircie. Puis des tissus, des vêtements en cuir et enduits de polymère, tous déchirés, et enfin les restes organiques des anciens habitants.\n\nDe nombreux corps ont été découverts, leurs organes desséchés remplis de sable et leurs ongles usés par l'effort. Chaque cadavre était équipé d'un lourd équipement militaire pré-PRL et armé d'armes à projectiles. Ce que nous pensions être une ville abandonnée était en fait une fosse commune.\n\nCes restes sont peut-être vieux de plusieurs millénaires, mais ils ont été très bien conservés en raison de leur isolation complète aux rayons ultraviolets et produits chimiques réactifs. Ce qu'il leur est arrivé reste incertain."
 cstorms.2110.a: "Quelle mort atroce !"
 cstorms.2115.name: "Une force supérieure"
 cstorms.2115.desc: "Ce que nous trouvons sur [From.Planet.GetName] est de plus en plus déroutant. Au vu du très bon état des corps, [Root.GetLeaderName] a émis la théorie que cet endroit n'était pas une fosse commune : le sable les aurait tués.\n\nNous avons également découvert un certain nombre d'armes à munitions lourdes. Étonnamment, elles ne visent pas la surface de la planète, mais les profondeurs de l'espace.\n\nQuel que soit l'ennemi de cette civilisation, il venait probablement des étoiles."
 cstorms.2120.name: "La tempête éternelle"
 cstorms.2120.desc: "Nos théories sur l'étrange fosse commune que nous avons trouvée sur [From.Planet.GetName] n'ont abouti nulle part. Notre seul indice est l'origine du sable qui a englouti toute l'armée.\n\nAprès une série de calculs et de simulations extrêmement complexes, nous avons conclu que la tempête qui a transporté le sable jusqu'ici fait toujours rage ailleurs sur la planète. Un petit groupe d'expédition a été constitué pour explorer les lieux.\n\nÀ leur arrivée, ils ont été accueillis par une violente tempête dont les vents forts ont creusé un profond sillon dans le sol. S'il reste des indices ici, ils se trouvent sûrement dans l'oeil du cyclone."
 cstorms.2120.a: "Prenez toutes les précautions nécessaires !"
 cstorms.2125.name: "Le squelette"
 cstorms.2125.desc: "Il a été difficile de s'orienter dans la tempête et cela nous a demandé un maximum d'habileté et d'attention. Au centre se trouvait un cratère et, à l'intérieur, un squelette très inhabituel. La dépouille est aussi vieille que celles de la fosse commune, mais le phénotype comme le génotype du corps étaient totalement différents.\n\nL'uniforme du squelette était étonnamment bien conservé et présentait également des différences significatives. Certains membres semblaient avoir été délibérément enlevés...\n\nLes relevés de nos capteurs étaient encore plus étranges : nous avons détecté des fluctuations d'énergie autour et à l'intérieur du corps. Ces signatures étaient étonnamment similaires à celles de la tempête cosmique.\n\nCet individu avait-il un lien quelconque avec les tempêtes cosmiques que nous avons rencontrées jusqu'à présent ? Était-il responsable de la disparition de l'armée ? Cette théorie semblait étrange, mais tous les faits menaient dans cette direction."
 cstorms.2130.name: "Retour à la poussière"
 cstorms.2130.desc: "En comparant les symboles de l'uniforme avec notre base de données, nous avons obtenu un résultat stupéfiant : le squelette appartenait à un citoyen de la Convention d'adAkkaria ! La civilisation dont nous avons exploré la station de communication il n'y a pas si longtemps. À notre plus grande surprise, l'uniforme, l'âge du corps et les informations fournies par les transmissions dessinent une image étonnamment cohérente. Nous pensons qu'il s'agit du monde mentionné dans ces transmissions.\n\nGrâce aux connaissances linguistiques que nous avons acquises à la station de propagande, [Root.GetLeaderName] a pu identifier la victime : §ShaToor Gailon§!.\n\nQuelques instants plus tard, la tempête environnante a rapidement augmenté en taille et en intensité. Le caractère hautement imprévisible de la météo étant trop dangereux, nous avons été contraints d'abandonner ce monde à la tempête. La piste de la Convention d'adAkkaria est de nouveau au point mort."
 #Storm to Signal
 cstorms.2140.name: "Signal de tempête"
 cstorms.2140.desc: "Les signatures énergétiques du squelette et du maelström destructeur de planètes sur §Y[planet_windswept_fates.GetName]§! correspondent à celles de la tempête cosmique responsable de l'exhumation de l'armée. Les scans ont révélé un système déjà exploré qui présente les mêmes fluctuations d'énergie, identiques aux transmissions de la Convention d'adAkkaria !\n\nNous devrions envoyer un vaisseau d'exploration pour enquêter."
 #Fleets of the Trice Damned
 site_adakkaria_fleets_of_the_thrice_damned: "Flottes des triple damnés"
 site_adakkaria_fleets_of_the_thrice_damned_intro: "Les étranges fluctuations d'énergie de la zone dissimulaient un immense cimetière de vaisseaux. Cette nécropole de polymère et de métal pourrait fournir des indices importants sur la Convention d'adAkkaria."
 cstorms.2150.name: "Épaves déchiquetées"
 cstorms.2150.desc: "Dans ce cimetière reposent des vaisseaux de toutes sortes, des vaisseaux en bois allongés aux arches cristallines. Certains d'entre eux présentent de grandes similitudes avec les images trouvées dans les transmissions et les registres de la station de communication d'adAkkaria.\n\nNous supposons qu'un affrontement a eu lieu entre les flottes de la Convention et de la ComUni, la force de paix galactique, il y a des milliers d'années.\n\nPourtant, ces vaisseaux ne semblent pas avoir été endommagés par des armes ordinaires, ni par un dysfonctionnement ou une catastrophe. Les coques et l'intérieur ont été déchiquetés, comme s'ils avaient été attaqués par un énorme broyeur."
 cstorms.2155.name: "Les limites du sens du devoir"
 cstorms.2155.desc: "Nos [Root.Owner.GetEngineerPlural] ont pu récupérer quelques banques de données dans les vaisseaux du cimetière. La plupart d'entre elles sont malheureusement irrémédiablement endommagées, mais une base de données d'adAkkaria a résisté :\n\n§L- Nous avons été pris en embuscade. Je répète, nous avons été pris en embuscade. La ComUni exige que nous arrêtions nos tentatives d'illumination des Rokukora faute de quoi nous serons anéantis. Veuillez nous répondre. Si nous ne battons pas en retraite, nous serons anéantis ! S'il vous plaît, envoyez au moins des renforts !\n\n- Négatif. Votre sacrifice sera reconnu.§!"
 cstorms.2155.a: "Ils ont fait passer leur devoir avant leur vie !"
 cstorms.2160.name: "Dépouille à examiner"
 cstorms.2160.desc: "Alors que nos [Root.Owner.GetLinguists] continuaient à s'occuper des transcriptions des transmissions, nous avons fait une découverte étonnante : un corps congelé flottant au milieu du cimetière !\n\nIl était dans un état de décomposition très avancé, mais les vêtements qu'il portait étaient ceux d'un officier de la Convention.\n\nÉtrangement, un anneau de débris plus petits flottait autour du corps, comme si celui-ci exerçait une sorte de gravité sur ces objets. La dépouille a été ramenée à bord pour une analyse plus approfondie."
 cstorms.2165.name: "Les morts parlent"
 cstorms.2165.desc.intro: "La traduction du badge a révélé que le mort était un membre de la Convention d'adAkkaria nommé §SalAtta Landeer§!. Tout comme le squelette trouvé sur [planet_windswept_fates.GetName], plusieurs membres ont été enlevés chirurgicalement avant son décès. Cependant, ce corps a également été gravement brûlé. Son torse présente des signes de chaleur extrême et d'un rétablissement lent et certainement douloureux.\n\nNos [Root.Owner.GetScientistPlural] ont conclu que ces blessures présentaient une similitude troublante avec les méthodes de torture utilisées par les pré-PRL pour soutirer des informations aux individus peu coopératifs. S'agit-il d'un vétéran de guerre ou la vérité est-elle plus sinistre ?"
 cstorms.2165.desc.def: "$cstorms.2165.desc.intro$\n\nPeu après avoir analysé les blessures, nos instruments de bord ont été frappés par un soudain pic d'énergie et [Root.GetLeaderName] s'est mis[Root.Leader.GetXELead] à hurler.\n\nPlus tard, [Root.Leader.GetSheHe] a expliqué qu'[Root.Leader.GetSheHe] avait vu une lumière intense puis ressenti une vive douleur, comme si quelque chose ou quelqu'un essayait d'entrer dans son esprit... de l'intérieur."
 cstorms.2165.desc.psio: "$cstorms.2165.desc.intro$\n\nPeu après avoir analysé les blessures, nos instruments de bord ont été frappés par un soudain pic d'énergie et notre équipage psioniques s'est mis à hurler.\n\nPlus tard, ils ont rapporté avoir vécu un moment d'extrême lucidité, suivi des plusieurs vagues de colère brûlante, déchirant leur esprit. [Root.GetLeaderName] a expliqué qu'un sentiment profond de trahison était enfoui sous cette colère. Une seule pensée se répétait en boucle : §LIls m'ont invoqué !§!"
 cstorms.2165.desc.psio_robot: "$cstorms.2165.desc.intro$\n\nPeu après avoir analysé les blessures, nos instruments de bord ont été frappés par un soudain pic d'énergie et notre unité équipée a subi des pics de tension internes.\n\nPlus tard, ils ont rapporté avoir vécu un moment catalogué comme colère extrême par leurs processeurs psioniques. [Root.GetLeaderName] a expliqué que cette réponse émotionnelle avait été accompagnée d'une unique pensée, transcrite come suit : §LIls m'ont invoqué !§!"
 cstorms.2165.desc.gestalt: "$cstorms.2165.desc.intro$\n\nAprès cette découverte, nos banques de données ont été endommagées par une force inexplicable. Plusieurs [controller.GetIndividualNamePlural] se sont souvenus avoir reçu une brève décharge électrique paralysante, tandis que d'autres ont été exposés à des images brouillées et incohérentes qui ont poussé leurs modulateurs vocaux à émettre un son perçant de plus de 120 décibels."
 cstorms.2165.a: "-- Signal perdu --"
 cstorms.2170.name: "L'héritage de Landeer"
 cstorms.2170.desc.def: "Au moment où nous avons rétabli la communication avec notre vaisseau scientifique, §Y[Root.GetFleetName]§!, nous avons été assaillis de cris venant de l'équipage. Bien plus tard, après que le calme, relatif, est revenu, nous avons appris que la dépouille ramenée à bord était responsable de l'agitation.\n\nLe corps a exercé une force étrange sur leur esprit et de petits objets se sont mis à flotter et tourner autour de la dépouille. Certaines zones des parois intérieures se sont même déformées sous la pression.\n\n§Y[Root.GetLeaderName]§! a réussi à sortir de son état catatonique juste à temps pour éjecter le corps du vaisseau. Grâce à sa réactivité, une tempête cosmique a également pu être évitée. Sans [Root.Leader.GetLuiElleLead], le cimetière aurait accueilli un nouveau vaisseau.\n\nAlors qu'[Root.Leader.GetHeShe] racontait son expérience, [Root.Leader.GetHeShe] s'est rendu compte de quelque chose : quelle que soit l'origine de cette force étrange, elle a formé un motif plutôt curieux sur les écrans de commande du vaisseau. S'agit-il d'une tentative de communication ? Un appel de l'au-delà ?\n\nNous n'avons pas de réponse pour le moment."
 cstorms.2170.desc.gestalt: "Les images brouillées qui ont corrompu certains de nos [controller.GetIndividualNamePlural] d'exploration ont finalement pu être décryptées et révèlent un ancien habitat. Il s'avère également que nos [controller.GetScientistPlural] ont été hantés par des images et des sons d'un individu torturé de manière atroce. Son corps a été brûlé, ses organes cuits...\n\nCertains [controller.GetIndividualNamePlural] ont réussi à échapper à l'attaque audiovisuelle. Ils ont indiqué que plusieurs petits objets s'étaient mis à flotter en orbite autour du corps. Celui-ci avait en quelque sorte développé son propre champ gravitationnel.\n\nCette force mystérieuse s'est intensifiée au point de déformer certaines zones des parois intérieures. Heureusement, à ce moment-là, le système de sécurité s'est activé et a projeté le corps dans l'espace.\n\nPeu après, le système a été frappé par une tempête cosmique. Notre vaisseau s'en est sorti de justesse.\n\nQuoi qu'il se soit passé là-bas, cela a suscité plus de questions que de réponses."
 #Special Project: Assembling the Past
 cstorms.2180.name: "Reconstitution du passé"
 cstorms.2180.desc: "Après l'expérience de [FromFrom.Leader.GetName] dans le système de §Y[planet_assembling_the_past.System.GetName]§!, nos scientifiques sont encore plus enclins à découvrir ce qui est arrivé à la Convention d'adAkkaria. Les données recueillies lors de l'exploration de [planet_windswept_fates.GetName] et du cimetière de flottes ont révélé que la galaxie est parsemée de stations de propagande d'adAkkaria.\n\nAprès de longues discussions, ils soupçonnent en outre que le motif observé dans le [Root.GetName] correspond aux coordonnées d'un système inconnu !\n\nUn projet spécial a été créé pour étudier ce nouveau système."
 project_adakkaria_tracing_history: "Retracer l'histoire"
 project_adakkaria_tracing_history_DESC: "Les coordonnées indiquent une planète dans le système [planet_assembling_the_past.System.GetName]. Nous devrions y envoyer un vaisseau d'exploration pour étudier l'importance de cette planète pour la Convention d'adAkkaria."
 NAME_adSalivul: "adSalivul"
 NAME_Patriotic_Institute_of_Exalted_Benevolence: "Bienfaisance Exaltée"
 cstorms.2185.name: "L'habitat ancien"
 cstorms.2185.desc: "Nous avons d'abord craint que l'exploration du système de [From.solar_system.GetName] ne nous ait menés dans une impasse. Les coordonnées indiquaient une planète entourée d'un champ magnétique si puissant qu'il l'avait presque entièrement décimée. Il était peu probable que quelque chose ou quelqu'un ait survécu à une telle catastrophe.\n\nToutefois, un habitat ancien dérivait en orbite de la planète et présentait des similitudes architecturales avec la station de transmission d'adAkkaria. Celui-ci était hermétiquement fermé de l'extérieur, mais grâce aux informations que nous avons extraites des bases de données d'adAkkaria, un signal d'ouverture a pu être généré.\n\nIl y a très longtemps que cette station n'a pas été ouverte et nous ne savons pas ce qui nous attend à l'intérieur."
 cstorms.2185.a: "Faisons preuve de prudence"
 #The Patriotic Institute of Exalted Benevolence
 site_adakkaria_the_patriotic_institute: "Institut de la Bienfaisance Exaltée"
 site_adakkaria_the_patriotic_institute_intro: "Cet habitat ancien, en orbite d'une planète détruite, a été construit par la Convention d'adAkkaria. Les matériaux de construction de haute qualité utilisés ont permis à la station de rester en excellent état.\n\nLorsque nous nous sommes connectés à la fréquence de transmission, un message a été diffusé, suivi d'un jingle accrocheur : §LBienvenue à l'Institut patriotique de la Bienfaisance Exaltée§!."
 cstorms.2200.name: "La Bienfaisance"
 cstorms.2200.desc: "Au-delà du sas s'étendait un petit réseau de tunnels, dont certains débouchaient sur une immense place éclairée par un soleil artificiel. Curieusement, l'architecture de l'habitat ressemblait davantage à des banlieues résidentielles qu'à une station scientifique. L'habitat comprenait de grands complexes d'appartements, des centres commerciaux et des écoles, mais aussi des jardins, des parcs et d'autres aménagements. Cet endroit a été conçu pour une vie de luxe.\n\nMais il est maintenant totalement abandonné. Nous n'avons trouvé aucune forme de vie. Plus nous explorions, plus nous étions perplexes devant la vacuité des lieux et l'atmosphère de désolation qui régnait.\n\nLe soleil artificiel vacillait sporadiquement, plongeant la station dans l'obscurité. D'autres appareils électroniques subissaient le même dysfonctionnement, mais ils restaient en grande partie opérationnels. Le plus étrange, cependant, était le réseau d'appareils de surveillance que l'on trouvait dans les appartements. Chaque citoyen semblait vivre sous haute surveillance. Un poste de sécurité pourrait nous apporter de plus amples informations."
 cstorms.2205.name: "Défectuosité définitive"
 cstorms.2205.desc.intro: "Il nous a fallu de nombreux jours pour explorer et indexer la ville de la station, mais nous avons finalement trouvé le poste de surveillance. Il était complètement coupé du reste de l'habitat et nécessitait un code d'accès différent.\n\nNous y avons trouvé des rangées et des rangées de moniteurs, toujours connectés au réseau de surveillance. Ceux qui fonctionnaient encore montraient chaque recoin de la station, mais ils étaient eux aussi affectés par un dysfonctionnement électrique."
 cstorms.2205.desc.mach: "$cstorms.2205.desc.intro$\n\nNos drones ont exprimé leur inquiétude vis-à-vis de ces défaillances électriques. Cela leur a rappelé leur expérience précédente avec la Convention d'adAkkaria dans le cimetière de vaisseaux.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.def: "$cstorms.2205.desc.intro$\n\n[Root.GetLeaderName] a exprimé son inquiétude vis-à-vis de ces défaillances électriques. Cela lui a rappelé son expérience précédente avec la Convention d'adAkkaria dans le cimetière de vaisseaux.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.outro: "Mais le plus inquiétant a été ce que nous avons découvert dans le centre de surveillance : d'après les messages d'alerte qui s'affichaient sur les écrans, l'habitat était programmé pour s'autodétruire !\n\nNos [Root.Owner.GetEngineerPlural] ont supposé que les dysfonctionnements qui affligeaient toute la ville empêchaient l'exécution de la commande. Nous avons désactivé la routine d'autodestruction et demandé à nos [Root.Owner.GetLinguists] de décrypter tous les registres récupérables. Curieusement, les rapports de la station ont cessé près d'un an avant les derniers enregistrements retrouvés dans la station de propagande."
 cstorms.2210.name: "Demandes exaltées"
 cstorms.2210.desc: "Il n'a pas fallu longtemps à nos [Root.Owner.GetLinguists] pour percer à jour le but de l'habitat qui gravite autour de [From.Planet.GetName] : les registres et messages des citoyens et des employés décrivent des recherches sur les pouvoirs psioniques nouvellement apparus chez la population d'adAkkaria. Tous ceux qui vivaient ici ont été invités par la « Direction Exaltée » de la Convention à profiter d'une vie de luxe et d'épanouissement personnel à bord. En échange, ils ont accepté de participer aux expériences menées sur la station.\n\nLa plupart des citoyens étaient très enthousiastes à l'idée de prendre part au programme. Les registres de sécurité montrent qu'il y avait parmi eux de nombreux anciens combattants invalides. On leur a promis des soins, une aide financière et le pardon pour tout ce qu'ils auraient pu commettre par le passé.\n\nEn outre, la liste du personnel de la station contenait un nom familier : §SalAtta Landeer§!, le scientifique et invalide de guerre dont nous avons retrouvé le corps amputé dans le cimetière de vaisseaux."
 cstorms.2210.a: "On avance enfin"
 cstorms.2215.name: "Messages des sujets"
 cstorms.2215.desc: "Nous avons enfin pu traduire l'un des derniers messages de l'habitat :\n\n§gMessage - Date 02100363 - Expéditeur : §SsiDani Itempeer§! - Destinataire : siZul Itempeer§!\n§LCoucou ! Je suis toujours en vie ! Pardon de ne pas avoir donné de nouvelles plus tôt. Depuis... tout le monde se comporte bizarrement sur l'habitat, alors c'est difficile d'envoyer des messages. Ils ont dit que ce n'était pas lié, mais on pense qu'il était tout de même doté de pouvoirs psioniques. Comme je te l'ai dit, avec tous les précédents... je n'ai pas vraiment progressé. Ils m'ont proposé d'essayer quelque chose de plus radical : ... les tempêtes cosmiques. Je sais ce que tu penses, mais ce n'est qu'un doigt et peut-être même qu'il repoussera. Si tu savais ce que j'ai ressenti quand... !\nAvec tout mon amour, siDani\n- TRANSMISSION§! §YCENSURÉE (Si vous avez des questions, veuillez contacter votre supérieur)§!\n\n§gMessage - Date 02100365 - Expéditeur : §ShaToor Gailon§! - Destinataire : aeDal Asduur§!§L\nMon aeDal,\nSache que je vais bien. J'ai rencontré d'autres anciens combattants. Nous n'en parlons pas, mais nous savons. C'est agréable de ne pas avoir à en parler.\nAujourd'hui, je n'ai eu qu'à penser à soulever une tasse pour que cela se produise. Je regrette toujours mon membre droit, mais peut-être que cette nouvelle vie ne sera pas aussi terrible que je le craignais. Je les ai entendus parler de m'envoyer... Apparemment, je suis une merveille psionique... Je... veux reprendre du service.\nJ'espère être de retour à la maison pour la fête nationale. À très vite.\nAmicalement, haToor\n- TRANSMISSION§! §YCENSURÉE (Si vous avez des questions, veuillez contacter votre supérieur)§!\n\n§gMessage - Date 02100367 - Expéditeur : §SenRida Direen§! - Destinataire : onRida Direen§!\n§LJ'AI ARRÊTÉ UN INCENDIE AVEC MON ESPRIT !!!\nL'un des autres sujets est soudainement devenu hystérique et a provoqué un incendie dans le mess. Tout le monde était en panique, on était coincés ! J'ai moi-même eu SUPER PEUR, mais il s'est passé quelque chose en moi et je l'ai fait disparaître !\nJ'AI SAUVÉ TOUT LE MONDE ! Dis aux anciens que je ne suis pas un cas totalement désespéré, s'il te plaît !\n- TRANSMISSION§! §RBLOQUÉE (VEUILLEZ IMMÉDIATEMENT CONTACTER VOTRE SUPÉRIEUR)§!\n\nLa deuxième transmission est la plus intéressante : nous avons découvert le corps de §ShaToor Gailon§! lors de nos fouilles archéologiques sur le monde pré-PRL."
 cstorms.2215.a: "Excellent travail !"
 cstorms.2220.name: "Conséquences des dysfonctionnements"
 cstorms.2220.desc: "Ces messages sont datés de quelques jours avant l'évacuation de l'habitat :\n\n§gMessage - Date 02100359 - Expéditeur : Docteur suprême - Destinataire : Illustre amiral§!\n§LVotre dernier message a suscité quelques inquiétudes. Auriez-vous l'amabilité d'expliquer pourquoi, après nous avoir apporté un soutien inconditionnel pendant toutes ces années, vous menacez soudainement de nous fermer ?\n- TRANSMISSION§! §GENVOYÉE§!\n\n§gMessage - Date 02100360 - Expéditeur : Illustre amiral - Destinataire : Docteur suprême§!\n§LVous plaisantez, j'espère ! Cela fait des mois que nous vous envoyons des avertissements, mais j'imagine que tourner autour d'un monde aussi changeant vous a fait perdre la mémoire. Vous avez conscience que notre existence est menacée par la ComUni, n'est-ce pas ? Avec la guerre qui s'annonce, nous ne pouvons plus nous permettre de dépenser des quantités exorbitantes de ressources juste pour que vos sujets regardent du bétail à longueur de journée. Il nous faut des résultats tangibles et utilisables. MAINTENANT.\n- TRANSMISSION§! §GREÇUE§!\n\n§gMessage - Date 02100360 - Expéditeur : Docteur suprême - Destinataire : Illustre amiral§!\n§LNous sommes désolés, mais nous n'avons jamais reçu vos précédents messages. Notre station est en proie à des dysfonctionnements techniques qui ont dû impacter les transmissions. Néanmoins, nous avons besoin de plus de temps. Nous avons des procédures et des protocoles, nous ne pouvons pas tout abandonner du jour au lendemain !\n- TRANSMISSION§! §GENVOYÉE§!\n\n§gMessage - Date 02100361 - Expéditeur : Illustre amiral - Destinataire : Docteur suprême§!\n§LVous avez une semaine. Pas de si, pas de mais, pas de deuxième chance... DES RÉSULTATS !\n- TRANSMISSION§! §GREÇUE§!\n\n§gMessage - Date 02100368 - Expéditeur : Docteur suprême - Destinataire : Illustre amiral§!\n§LVous trouverez ci-joint nos dernières avancées. Ces vidéos prouvent que nos sujets dotés de pouvoirs psioniques peuvent influencer les tempêtes cosmiques. Une application militaire pourrait changer la donne en temps de guerre. Avec suffisamment de temps, nous pourrions charger leurs pouvoirs psioniques sans les exposer à un traumatisme physique et mental.\n- TRANSMISSION§! §RÉCHEC (Cause : matrice de transmission endommagée)§!"
 cstorms.2220.a: "Ce dernier message n'a jamais été envoyé"
 cstorms.2225.name: "Destin incomplet"
 cstorms.2225.desc: "Voici le dernier message que nous avons pu récupérer :§L\n\nChers collègues,\n\nC'est le coeur lourd que je m'adresse à vous. Le Commandement Exalté a décidé de suspendre toutes les opérations au sein de l'Institut patriotique de Bienfaisance Exaltée.\n\nCe n'est ni à cause de vous, ni à cause de notre travail. Ce fut un honneur de travailler avec chacun et chacune d'entre vous. Je sais que vous avez certainement beaucoup de questions, mais pour faire court, les attentes du Commandement Exalté n'étaient pas en adéquation avec nos objectifs de recherche.\n\nLe Commandement a invité tous nos citoyens à participer au programme de l'$building_adakkaria_patriotic_institute$ à adSul. Vous trouverez ci-dessous la liste complète du personnel. Veuillez vous présenter en conséquence.\n\nPour ce qui est des autres... Malheureusement, étant donné le niveau de confidentialité de nos recherches, les personnes y ayant participé ne seront pas autorisées à revenir dans la société. Le Commandement Exalté a promis d'envoyer une unité spéciale pour s'occuper d'eux. Vous n'aurez pas à vous en occuper vous-mêmes, ce qui est une bénédiction, d'une certaine manière... Leurs proches seront dédommagés comme il se doit.\n\nBien à vous, \nDocteur suprême§! §SalAtta Landeer§!\n\nLa liste jointe, bien que partiellement corrompue, mentionne §ShaToor Gailon§! et §SenRida Direen§!. Il semble qu'ils aient été transférés dans la capitale de la Convention d'adAkkaria, adSul. Nous disposons désormais des coordonnées de ce monde."
 cstorms.2225.a: "Direction le monde natal de la Convention !"
 #Special Project: Eye of the Convention / The Void Calls
 cstorms.2240.name: "L'oeil de la Convention"
 cstorms.2240.desc: "Les coordonnées ont révélé un système qui était auparavant invisible à nos capteurs. Il est temps de rendre visite à la Convention d'adAkkaria, avant que quelqu'un d'autre ne le fasse.\n\nUn nouveau projet spécial a été lancé."
 cstorms.2245.name: "L'appel du vide"
 cstorms.2245.desc: "Quelques instants seulement après que nous avons quitté l'habitat, [event_target:leader_patriotic_institute.GetName] a pris une décision surprenante : comme poussé[event_target:leader_patriotic_institute.GetXELead] par une force extérieure, [event_target:leader_patriotic_institute.GetSheHe] a ordonné au vaisseau d'ouvrir un canal de communication et de régler la fréquence afin qu'elle corresponde à celle des événements psioniques de masse ou des tempêtes cosmiques.\n\nLe canal était dirigé vers les mêmes coordonnées que celles du système natal de la Convention d'adAkkaria. Il n'a fallu que quelques instants pour qu'une réponse nous parvienne."
 cstorms.2245.desc.gestalt: "Peu après avoir quitté l'habitat, notre conscience a été perturbée par une vibration inhabituelle. Quelque chose semblait essayer de communiquer avec nous à grande distance. Le signal provenait des mêmes coordonnées que le système natal de la Convention d'adAkkaria et avait une fréquence correspondant aux événements psioniques de masse et tempêtes cosmiques.\n\nNous avons envoyé un message en retour et rapidement reçu une réponse."
 cstorms.2250.name: "L'appel de la tempête"
 cstorms.2250.desc: "Nous avons fait tout ce qui était en notre pouvoir, mais atteindre adSul s'est avéré être un défi bien plus grand que prévu. L'ensemble du système est entouré d'une tempête cosmique de composition inconnue, nous empêchant de nous approcher de la planète.\n\nLa tempête semble... nous appeler ?"
 #The Storm
 cstorms.2260.name: "La tempête"
 cstorms.2260.desc: "PRONONCEZ NOS NOMS\n\nPRONONCEZ NOS NOMS\n\nPRONONCEZ | NOS | NOMS"
 cstorms.2260.a: "Qui êtes-vous ?"
 cstorms.2260.b: "Que s'est-il passé ici ?"
 cstorms.2260.c: "Vos noms ?"
 cstorms.2260.a.resp: "ÊTRE | NE PAS ÊTRE | NE PLUS ÊTRE\n\nTEMPÊTE TONITRUANTE ET SAUVAGE\n\nDOULEUR ET COLÈRE ET TRISTESSE ET PEUR\n\nPRONONCEZ NOS NOMS"
 cstorms.2260.b.resp: "PROVOQUER | ÉVOQUER | INVOQUER\n\nPRONONCEZ NOS NOMS"
 cstorms.2265.name: "$cstorms.2260.name$"
 cstorms.2265.desc: "NOUS NE POUVONS PAS PENSER | PARLER | DÉSIRER | RÊVER\n\nNOS NOMS NOUS INVOQUENT | RENDEZ-NOUS NOTRE IDENTITÉ | NOUS SOMMES LES OUBLIÉS\n\nPRONONCEZ NOS NOMS"
 cstorms.2265.c.resp: "$cstorms.2265.desc$"
 cstorms.2265.d: "Où pouvons-nous trouver vos noms ?"
 cstorms.2265.e: "Montrez-nous cette célébration"
 cstorms.2270.name: "$cstorms.2260.name$"
 cstorms.2270.desc: "C'EST UNE CÉLÉBRATION\n\nC'EST UNE CÉLÉBRATION\n\nDOULEUR | COLÈRE | TRISTESSE | PEUR\n\nCÉLÉBRATION\n\nPRONONCEZ NOS NOMS"
 NAME_adSul: "adSul"
 project_adakkaria_benevolent_grounds: "Terre bienfaitrice"
 project_adakkaria_benevolent_grounds_DESC: "Nous avons décrypté les coordonnées du monde natal de la Convention d'adAkkaria.\n\nL'exploration du système et de la planète pourrait nous en apprendre davantage sur le sort de cette civilisation."
 #Celebration
 site_adakkaria_celebration: "Célébration"
 site_adakkaria_celebration_intro: "Après la communication avec la tempête cosmique, une petite partie d'adSul nous a été dévoilée. Entre les nuages se dressait un énorme complexe abandonné, mais étrangement non affecté par le temps. Les premiers scans ont révélé de la matière organique à l'intérieur.\n\nDevant l'immense bâtiment se tenait une ribambelle de bannières arborant le même message suivant : L'heure de la célébration est venue."
 cstorms.2285.name: "Nihilisme forcé"
 cstorms.2285.desc: "Les halls vides ne recelaient rien d'autre que la poussière accumulée au fil du temps. Les affiches de propagande glorifiant la bravoure de la Convention d'adAkkaria étaient tout ce qui restait de cet empire autrefois florissant et redouté.\n\nNos connaissances linguistiques ont cependant été payantes. La sécurité était mineure et l'unité centrale nous a facilement livré ses secrets.\n\nLes registres que nous avons récupérés étaient pleins d'activité jusqu'à la dernière transmission de la station de propagande.\n\nCe jour-là, la Convention de bienfaisance d'adAkkaria a tout simplement cessé d'exister."
 cstorms.2290.name: "Descente vers les damnés"
 cstorms.2290.desc: "C'est avec un mélange de peur et de curiosité que nous nous sommes enfoncés plus profondément dans les niveaux souterrains, où nous avons été accueillis par un vaste réseau de laboratoires soigneusement ordonnés. Notre unité s'est divisée en deux groupes : l'un en charge d'examiner les laboratoires pour en apprendre davantage sur le but de l'institut, l'autre en charge de continuer à descendre.\n\nIl ne nous a pas fallu longtemps pour trouver la matière organique précédemment détectée par nos scans : les niveaux inférieurs étaient exclusivement constitués de cellules d'observation. Les restes momifiés des citoyens d'adAkkaria sont toujours enfermés dans ces pièces exiguës. Une interface numérique située à côté de chaque chambre révélait le nom de l'occupant, la phase de l'étude à laquelle il avait été soumis et les remarques des observateurs.\n\nLe message suivant a pu être récupéré :\n§LNotre essai dans le système Haliios a été un désastre total. Le déploiement initial du sujet connu sous le nom de §ShaToor Gailon§! s'est déroulé comme prévu, mais lorsque nous avons été confrontés aux forces barbares solphaniennes, il a perdu le contrôle. La tempête a anéanti aussi bien les armées primitives que les nôtres.\n\nIl convient de noter que ces sujets sont avant tout malveillants et perturbés. Plus vite l'Invocateur sera opérationnel, mieux ce sera.§!"
 cstorms.2290.a: "Que faisaient-ils ici ?"
 cstorms.2290.a.gen: "Tous ces morts... C'est inspirant !"
 cstorms.2295.name: "Une forme de célébration"
 cstorms.2295.desc.start.authgen: "Les expériences menées par la Convention d'adAkkaria sont fascinantes. Chaque prisonnier se voyait attribuer une phase et la brutalité du traitement augmentait en fonction des phases. On distingue plusieurs méthodes particulièrement innovantes : l'utilisation du feu et de l'électricité pour stimuler le développement psionique du corps, l'ablation d'organes vitaux pour provoquer des pouvoirs naissants et le recours à d'autres sens, et l'utilisation de substances altérant l'esprit pour déclencher une expérience de mort imminente.\n\nNous devons nous inspirer de ces méthodes. Ces experts travaillaient dans un but tout à fait compréhensible, à savoir la suprématie de la Convention d'adAkkaria dans la galaxie.\n\nNéanmoins, les rapports indiquent que ce traitement pourrait ne pas avoir été la cause de la mort des participants. Comme §ShaToor Gailon§!, beaucoup semblent avoir tout bonnement abandonné."
 cstorms.2295.desc.start.default: "L'effroi et la confusion que nous avons ressentis en voyant les cadavres des victimes ont été déconcertants, mais cela a accru notre désir de comprendre l'étendue et le but des expériences de la Convention.\n\nLes scientifiques adAkkariens ont rendu compte des expériences qu'ils avaient menées sur leurs sujets, d'un ton sec et dénué d'émotion. Chacun se voyait attribuer une phase, et la brutalité du traitement augmentait en fonction des phases. Feu, électricité, mutilation, privation des sens et de nourriture... Rien n'était trop cruel pour eux. Et tout cela dans le seul but de maintenir la suprématie adAkkarienne dans la galaxie. Cependant, les rapports indiquent que cette immonde torture n'est pas responsable du décès des sujets. À l'instar de §ShaToor Gailon§!, beaucoup semblent avoir tout bonnement abandonné."
 cstorms.2295.desc.end.default: "Quelques instants après nos observations, [Root.GetLeaderName] s'est effondré[Root.Leader.GetXELead]. Au milieu de ses cris de douleur, [Root.GetLeaderName] a hurlé que quelque chose essayait d'envahir son esprit !\n\nSon état est stable à présent, mais il semblerait qu'une entité intrusive ait cherché à lui inculquer une vision radicale. [Root.GetLeaderName] veut réessayer et pense que l'expérience finira par porter ses fruits."
 cstorms.2295.desc.end.psionic: "Alors que [Root.GetLeaderName] observait les corps, [Root.Leader.GetHeShe] a commencé à entendre un étrange murmure, une voix désincarnée qui parlait avec une grande nostalgie :\n§LNous avons toujours été loyaux ! Nous avons juré fidélité à la Convention et cru en sa mission.\nMais les tempêtes n'ont cessé de nous appeler. Elles nous dévoraient, nous désiraient !\nNous avons fait ce qu'elles voulaient. Nous avions du talent et nous étions persévérants !\nIls disaient que nous étions mauvais et nous qualifiaient de traîtres. Ils ont tué nos amis !\n\nCE DEVAIT ÊTRE UNE CÉLÉBRATION !§!\n\nLe murmure nous a conduits à un couloir portant l'inscription « La phase finale ». Mais les mesures de sécurité avancées ne nous ont pas permis d'y accéder."
 cstorms.2295.desc.end.psionic_individual_robot: "Alors que [Root.GetLeaderName] analysait les corps, [Root.Leader.GetHeShe] a commencé à détecter une transmission psi intelligible :\n§LNous avons toujours été loyaux ! Nous avons juré fidélité à la Convention et cru en sa mission.\nMais les tempêtes n'ont cessé de nous appeler. Elles nous dévoraient, nous désiraient !\nNous avons fait ce qu'elles voulaient. Nous avions du talent et nous étions persévérants !\nIls disaient que nous étions mauvais et nous qualifiaient de traîtres. Ils ont tué nos amis !\n\nCE DEVAIT ÊTRE UNE CÉLÉBRATION !§!\n\nLa transmission nous a conduits à un couloir portant l'inscription « La phase finale ». Mais les mesures de sécurité avancées ne nous ont pas permis d'y accéder."
 cstorms.2295.desc.end.psionic_gestalt: "Alors que nous examinions les corps, une voix s'est fait entendre au sein du collectif, utilisant [Root.GetLeaderName] pour communiquer :\n§LNous avons toujours été loyaux ! Nous avons juré fidélité à la Convention et cru en sa mission.\nMais les tempêtes n'ont cessé de nous appeler. Elles nous dévoraient, nous désiraient !\nNous avons fait ce qu'elles voulaient. Nous avions du talent et nous étions persévérants !\nIls disaient que nous étions mauvais et nous qualifiaient de traîtres. Ils ont tué nos amis !\n\nCE DEVAIT ÊTRE UNE CÉLÉBRATION !§!\n\nLa voix nous a conduits à un couloir portant l'inscription « La phase finale ». Mais les mesures de sécurité avancées ne nous ont pas permis d'y accéder."
 cstorms.2295.desc.end.gestalt: "D'autres perturbations étranges se sont produites au sein des processus cognitifs de nos [controller.GetIndividualNamePlural], suscitant des pensées intrusives. Grâce à elles, nous avons appris que les sujets de l'Institut se parlaient par des moyens non physiques, une transmission quasi instantanée semblable à une conscience collective naissante.\n\nBien que nous n'ayons pas pu décrypter les termes exacts, l'objet de la discussion était clair : une révolte se préparait dans l'Institut de Célébration."
