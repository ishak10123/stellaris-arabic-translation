 resolution_cosmic_storms_galactic_emergency_relief: "Aide galactique d'urgence"
 resolution_cosmic_storms_galactic_emergency_relief_desc: "Nous devons aider ceux qui sont les plus touchés par les effets des tempêtes cosmiques."
 resolution_cosmic_storms_galactic_emergency_relief_tooltip: "Active le §Yfonds d'urgence§! auquel tous les membres [global_event_country.GetDuDelaDelCommGalEmpGal][global_event_country.GetCommunityOrImperium] contribuent à hauteur de §R5%§! de leur production d'énergie.\n\nLes membres [global_event_country.GetDuDelaDelCommGalEmpGal][global_event_country.GetCommunityOrImperium] touchés par une §Ytempête cosmique§! reçoivent §G+3§! £energy£ par mois et par système touché.\n\n$storm_tech_cost$ §R+30%§!"
 resolution_cosmic_storms_galactic_emergency_relief_repeal: "Abrogation de l'aide galactique d'urgence"
 resolution_cosmic_storms_galactic_emergency_relief_repeal_desc: "$resolution_space_storm_environmentalists_stances_repeal_desc$"
 resolution_cosmic_storms_galactic_emergency_relief_repeal_effect_success: "Abroge la résolution §Y$resolution_cosmic_storms_galactic_emergency_relief$§! tout en conservant la loi galactique §Y$resolution_cosmic_storms_advanced_storm_studies$§!."
 resolution_cosmic_storms_storm_encouragement_mandate: "Mandat de déplacement des tempêtes"
 resolution_cosmic_storms_storm_encouragement_mandate_desc: "En dispersant des particules vitales et de l'énergie, les tempêtes cosmiques insufflent la vie dans la galaxie, renouvelant les planètes et les systèmes qu'elles touchent. Leur trajectoire naturelle ne doit pas être déviée."
 resolution_cosmic_storms_storm_encouragement_mandate_tooltip: "$emergency_fund_contribution$ §R10%§! \n\n$storm_tech_cost$ §R+50%§!\n\n$breach_galactic_law_intro$$TABBED_NEW_LINE$- §YTechnologie repousse-tempête§!"
 resolution_cosmic_storms_storm_encouragement_mandate_repeal: "Abrogation du mandat d'encouragement des tempêtes"
 resolution_cosmic_storms_storm_encouragement_mandate_repeal_desc: "$resolution_space_storm_environmentalists_stances_repeal_desc$"
 resolution_cosmic_storms_storm_encouragement_mandate_repeal_effect_success: "Abroge la résolution §Y$resolution_cosmic_storms_storm_encouragement_mandate$§! tout en conservant la loi galactique §Y$resolution_cosmic_storms_galactic_emergency_relief$§!."
 resolution_cosmic_storms_control_restrictions: "Contrôles de la manipulation des tempêtes"
 resolution_cosmic_storms_control_restrictions_desc: "La galaxie est un vaste écosystème interconnecté dans lequel les tempêtes cosmiques jouent un rôle important. Influencer leur comportement doit être interdit."
