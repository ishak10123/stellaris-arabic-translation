 #Storm Tech Insight events
 cstorms.505.name: "Affronter la tempête"
 cstorms.505.desc: "Après les ravages causés par la §H[this.GetAffectedStormType]§!, nous avons acquis des connaissances uniques sur ces phénomènes galactiques.\n\nEn étudiant l'astrométéorologie, nous pourrons mieux nous protéger à l'avenir. Ce nouveau domaine de recherche pourrait même nous permettre de maîtriser les tempêtes."
 #Storm Buildings
 building_storm_attraction_center: "Centre attire-tempête"
 building_storm_attraction_center_desc: "En manipulant la gravité, ces installations peuvent attirer les tempêtes cosmiques à proximité."
 building_advanced_storm_attraction_center: "Centre attire-tempête avancé"
 building_advanced_storm_attraction_center_desc: "Nos connaissances avancées en matière d'énergie sombre nous permettent de charger les centres attire-tempête afin d'attirer les tempêtes cosmiques encore plus efficacement."
 building_storm_repellent_center: "Centre repousse-tempête"
 building_storm_repellent_center_desc: "Plus une tempête est éloignée, plus notre population est en sécurité et sereine. Les instruments astrométéorologiques complexes de ces centres anti-tempête repoussent les tempêtes en approche."
 building_advanced_storm_repellent_center: "Centre repousse-tempête avancé"
 building_advanced_storm_repellent_center_desc: "La manipulation de l'espace-temps est justifiée si elle peut préserver un monde des tempêtes cosmiques. C'est exactement ce que fait ce centre."
 building_storm_resistant_production: "Centre de gestion des tempêtes"
 building_storm_resistant_production_desc: "Ce centre d'aide épaule les autorités locales afin de réduire l'impact qu'une tempête cosmique peut avoir sur la production. Grâce à une coordination et une communication plus efficaces, il peut déployer rapidement des équipes de secours sur les sites touchés et améliorer les conditions du commerce planétaire."
 building_storm_resistant_production_tt: "Les effets négatifs des §Ytempêtes cosmiques§! sur la production de la planète sont réduits de §G30%§!.\n\nTant qu'une §Ytempête cosmique§! sévit :$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+0.5§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+0.5§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+0.5§! \n\nDonne accès à la décision planétaire §Y$decision_hunker_down$§!"
 building_advanced_storm_resistant_production: "Neutralisateur de tempêtes"
 building_advanced_storm_resistant_production_desc: "En équipant les centres de gestion des tempêtes de systèmes de contrôle climatiques, les effets négatifs des tempêtes cosmiques peuvent être considérablement réduits. En outre, les équipes de secours peuvent être déployées encore plus rapidement et les conditions météorologiques locales n'ont pratiquement aucune influence sur le commerce."
 building_advanced_storm_resistant_production_tt: "Les effets négatifs des §Ytempêtes cosmiques§! sur la production de la planète sont réduits de §G45%§!.\n\nTant qu'une §Ytempête cosmique§! sévit :$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+1§! \n\nDonne accès à la décision planétaire §Y$decision_hunker_down$§!"
 building_adakkaria_patriotic_institute: "Institut patriotique de la Célébration"
 building_adakkaria_patriotic_institute_desc: "L'$building_adakkaria_patriotic_institute$ est une mine de connaissances avancées sur la condition des êtres conscients. Les gens sont encouragés à éveiller leur tempête intérieure tout en évitant le chant séduisant de la cruelle Convention."
 building_adakkaria_patriotic_institute_effect_desc: "Lorsqu'une tempête cosmique traverse ce système, il y a 10% de chances que les £pop£§Hpops§! reçoivent le trait $Name_Storm_Fused$."
 building_adakkaria_patriotic_institute_effect_upgrade_desc: "Lorsqu'une tempête cosmique traverse ce système, il y a 40% de chances que les £pop£§Hpops§! reçoivent le trait $Name_Storm_Fused$. De plus, tous les 10 ans, il y a 20% de chances que §Y100§! £pop£§Hpops§! se transforment en tempête cosmique."
 building_astrometeorology_observation_center: "Observatoire astrométéorologique"
 building_astrometeorology_observation_center_desc: "Grâce à ses capteurs sensibles, cet observatoire étudie les différentes conditions environnementales afin d'accroître notre compréhension de la nature de l'univers."
 concept_building_astrometeorology_observation_center: "$building_astrometeorology_observation_center$"
 building_storm_summoning_theater: "Théâtre attire-tempête"
 building_storm_summoning_theater_desc: "Une fusion de l'art et de la technologie. Les mouvements passionnés des danseurs tempétueux attirent les tempêtes cosmiques."
 building_storm_holo_theater: "Holo-hall tempétueux"
 building_storm_holo_theater_desc: "Le holo-hall tempétueux diffuse les représentations de nos éblouissants danseurs tempétueux sur toute la planète et même au-delà."
 building_storm_grand_theater: "Grand théâtre tempétueux"
 building_storm_grand_theater_desc: "À la pointe de l'art et de la technologie, ces grands théâtres sont la scène parfaite pour les plus belles danses."
 sm_storm_attraction_computer: "Matrice attire-tempête"
 sm_storm_attraction_computer_desc: "Ce composant nous permet de manipuler les conditions gravitationnelles locales afin d'attirer des tempêtes depuis les profondeurs de l'espace."
 sm_storm_repelling_computer: "Matrice repousse-tempête"
 sm_storm_repelling_computer_desc: "Ces puissants lasers sont capables de créer des poches de particules magnétiques chargées d'énergie qui repoussent naturellement les tempêtes cosmiques."
 #Jobs
 astrometeorologist: "$job_astrometeorologist$"
 job_astrometeorologist: "Astrométéorologues"
 job_astrometeorologist_plural: "Astrométéorologues"
 job_astrometeorologist_desc: "Les astrométéorologues sont spécialisés dans l'étude de l'impact environnemental des tempêtes cosmiques."
 job_astrometeorologist_effect_desc: "(les £job_astrometeorologist£astrométéorologues transforment les £consumer_goods£biens de consommation en recherche £physics£physique)\n\n(la production est augmentée tant que le système est soumis à un §Yeffet environnemental§!)"
 job_astrometeorologist_with_icon: "£job_astrometeorologist£$job_astrometeorologist$"
 job_astrometeorologist_plural_with_icon: "£job_astrometeorologist£$job_astrometeorologist_plural$"
 physicist_is_astrometeorologist_tt: "\nLes £job_physicist£physiciens sont convertis en £job_astrometeorologist£astrométéorologues.\n\nLa production est augmentée tant que le système est soumis à un §Yeffet environnemental§!."
 astrometeorologist_hive: "$job_astrometeorologist_hive$"
 job_astrometeorologist_hive: "Drones astrométéorologues"
 job_astrometeorologist_hive_plural: "Drones astrométéorologues"
 job_astrometeorologist_hive_desc: "Ces drones de recherche sont spécialisés dans la détection et le répertoriage des effets des tempêtes cosmiques."
 job_astrometeorologist_hive_effect_desc: "(les £job_astrometeorologist_hive£drones astrométéorologues transforment les £minerals£minéraux en £physics £society £engineering£recherche)\n\n(la production est augmentée tant que le système est soumis à un §Yeffet environnemental§!)"
 job_astrometeorologist_hive_with_icon: "£job_astrometeorologist£$job_astrometeorologist_hive$"
 job_astrometeorologist_hive_plural_with_icon: "£job_astrometeorologist_hive£$job_astrometeorologist_hive_plural$"
