 #Eye of the Storm
 cstorms.1801.name: "OEil de la tempête"
 cstorms.1801.desc: "Nos capteurs détectent des anomalies dans l'oeil de [fromfrom.GetName] qui fait rage sur [from.GetName]. Celles-ci indiquent la présence d'une masse étrange en son centre. Ces relevés inhabituels demandent un examen plus approfondi, avant que la tempête ne se dissipe ou ne quitte le système."
 EYE_OF_THE_STORM_PROJECT: "$cstorms.1801.name$"
 EYE_OF_THE_STORM_PROJECT_DESC: "Les analyses de [fromfrom.GetName] sur [this.GetName] indiquent la présence d'une énorme masse à l'intérieur du vortex. Les capteurs à longue portée n'ont pas été en mesure de fournir des réponses concluantes sur ce phénomène inhabituel. Nous devons envoyer une équipe dans l'oeil de la tempête pour mieux comprendre ce qu'il se passe."
 cstorms.1805.name: "Au coeur du vortex"
 cstorms.1805.desc: "En naviguant dans l'oeil de la tempête cosmique de [from.GetName], [leader.GetName] a découvert la cause des anomalies détectées. Cette tempête atypique tire son énergie d'une énorme quantité de [from.star.GetEarnedResources].\n\nNotre vaisseau scientifique a récupéré ce qu'il pouvait avant d'être violemment éjecté. Les données recueillies par les capteurs lors de son repli aideront nos ingénieurs à améliorer les performances des vaisseaux au sein de tempêtes extrêmes."
 cstorms.1805.desc.traumatized: "Malheureusement, cette dangereuse épreuve a eu un impact profond sur [leader.GetName]."
