 resolution_category_storm_environmentalists_stances: "Défenseurs des tempêtes"
 resolution_space_storm_environmentalists_stances_repeal_desc: "La Communauté galactique n'a pas à dicter la manière dont un empire doit réagir à une tempête cosmique."
 resolution_cosmic_storms_advanced_storm_studies: "Études plus approfondies sur les tempêtes"
 resolution_cosmic_storms_advanced_storm_studies_desc: "Les tempêtes sont une force de la nature de toute beauté. Nous devrions apprendre d'elles et les respecter."
 resolution_cosmic_storms_advanced_storm_studies_tooltip: "$storm_tech_cost$ §R+20%§! "
 resolution_cosmic_storms_advanced_storm_studies_repeal: "Abrogation des études plus approfondies sur les tempêtes"
