 storm_repellent_allow: "$TRIGGER_FAIL$ Construction impossible si le système dispose d'un bâtiment §Yattire-tempête§!"
 storm_attracting_allow: "$TRIGGER_FAIL$ Construction impossible si le système dispose d'un bâtiment §Yrepousse-tempête§!"
