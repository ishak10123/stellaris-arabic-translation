 resolution_cosmic_storms_preservation_initiative_repeal_effect_success: "Abroge la résolution §Y$resolution_cosmic_storms_preservation_initiative$§! tout en conservant la loi galactique §Y$resolution_cosmic_storms_control_restrictions$§!."
