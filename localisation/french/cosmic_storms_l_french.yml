 #Storm Visible Events
 MESSAGE_COSMIC_STORM_SPOTTED_DESC: "Nos capteurs ont enregistré une tempête cosmique de type $TYPE|Y$. Nous lui avons donné le nom de $NAME|Y$.\n\n"
 MESSAGE_COSMIC_STORM_SPOTTED_EVENT_CONFIRM: "Intéressant"
 MESSAGE_STORM_INTRO: "Cette tempête aura des effets dévastateurs sur les colonies et empêchera nos flottes d'utiliser le bond d'urgence PRL. Il est fortement recommandé de prendre des mesures préventives.\n\n"
 MESSAGE_ELECTRIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$La charge électrique extrême véhiculée par la tempête rendra les boucliers de nos flottes inutilisables. Mais le surplus d'énergie devrait augmenter la production des colonies et la vitesse des vaisseaux."
 MESSAGE_SOLAR_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Les radiations de cette tempête rendront les flottes qui y sont prises au piège visibles à tous ceux qui surveillent la tempête. Cela représente certes un certain risque de sécurité, mais nos stations fonctionneront beaucoup plus efficacement dans ces conditions."
 MESSAGE_CELESTIAL_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Ce type de tempête perturbera nos capteurs, ce qui rendra impossible la détection des flottes dans ces systèmes, et ralentira les voyages spatiaux. Certains emplois peuvent toutefois utiliser ces conditions à leur avantage et améliorer leurs performances."
 MESSAGE_NEXUS_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Ce type de tempête représente un danger extrême pour nos colonies, nos flottes et nos stations. Elles subiront de graves dommages tant qu'elle durera."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$La forte concentration d'énergie psionique dans cette tempête affectera considérablement la stabilité de nos colonies, mais en contrepartie, elle augmentera l'efficacité des manœuvres d'évitement des flottes."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_SHROUD_BREACHED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$La forte concentration d'énergie psionique dans cette tempête affectera considérablement la stabilité de nos colonies. Cependant, notre connaissance de la navigation dans le Suaire augmentera l'efficacité de nos flottes et de nos télépathes.\n\nLe Suaire nous appelle... Nous devons nous préparer à toutes les éventualités."
 MESSAGE_GRAVITY_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Les puissants champs gravitationnels de cette tempête rendront les opérations des flottes de plus en plus difficiles, les plus gros vaisseaux étant les plus touchés.\n\nNos colonies pourront toutefois utiliser ces conditions extrêmes à leur avantage et augmenter le rendement de certaines tâches."
 MESSAGE_MAGNETIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$La force magnétique extrême de cette tempête perturbera nos systèmes de maintenance des flottes et des structures.\n\nCependant, elle agit également en synergie avec notre métallurgie avancée. Cette interaction devrait permettre de réduire les coûts de nos métallurgistes pendant la durée de cet événement galactique."
 MESSAGE_PARTICLE_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$La densité de débris particulaires dans cette tempête aura un effet dévastateur sur les vaisseaux et les stations, bloquant complètement la régénération de leurs boucliers. Les flottes assez courageuses pour rester à l'intérieur doivent se préparer à un environnement extrêmement dangereux."
 MESSAGE_ELECTRIC_STORM_AFTERMATH_TITLE: "Conséquences de la tempête électrique"
 MESSAGE_PARTICLE_STORM_AFTERMATH_TITLE: "Conséquences de la tempête de particules"
 MESSAGE_GRAVITY_STORM_AFTERMATH_TITLE: "Conséquences de la tempête gravitationnelle"
 MESSAGE_MAGNETIC_STORM_AFTERMATH_TITLE: "Conséquences de la tempête magnétique"
 MESSAGE_SOLAR_STORM_AFTERMATH_TITLE: "Conséquences de la tempête solaire"
 MESSAGE_CELESTIAL_STORM_AFTERMATH_TITLE: "Conséquences de la tempête de poussière stellaire"
 MESSAGE_SHROUD_STORM_AFTERMATH_TITLE: "Conséquences de la tempête du Suaire"
 MESSAGE_STORM_AFTERMATH_DESC: "§H$PLANET$§! signale des perturbations atmosphériques persistantes."
 electric_storm_aftermath_custom_desc: "La §Ytempête électrique§! a ralenti la construction, mais augmenté la production d'énergie."
 particle_storm_aftermath_custom_desc: "La §Ytempête de particules§! a déposé des particules corrosives sur toute la planète."
 gravity_storm_aftermath_custom_desc: "Suite au passage d'une §Ytempête gravitationnelle§!, des anomalies gravitationnelles sont apparues sur l'une de nos colonies."
 magnetic_storm_aftermath_custom_desc: "Suite au passage d'une §Ytempête magnétique§!, notre colonie signale des perturbations électromagnétiques dans les régions polaires."
 solar_storm_aftermath_custom_desc: "La §Ytempête solaire§! a laissé un niveau de radiation dangereusement élevé sur toute la planète."
 celestial_storm_aftermath_custom_desc: "La §Ytempête de poussière stellaire§! a recouvert toute la planète d'une épaisse couche de poussière cosmique."
 shroud_storm_aftermath_custom_desc: "Une §Ytempête du Suaire§! a provoqué une activité paranormale sur toute la planète."
