 #Storm in a Box
 cstorms.1816.name: "Capsule à la dérive"
 cstorms.1816.desc: "Une mystérieuse capsule flotte dans le système de §H[this.GetName]§!. Elle ne présente aucune capacité offensive évidente et ne répond pas à nos signaux.\n\nLes premiers scans indiquent que son enveloppe extérieure, endommagée, a été fabriquée à l'aide de matériaux avancés et de techniques d'ingénierie méconnues. Une analyse plus approfondie est nécessaire."
 cstorms.1816.a: "Enquêtons"
 STORM_IN_A_BOX_INVESTIGATE_PROJECT: "Étude de la capsule"
 STORM_IN_A_BOX_INVESTIGATE_PROJECT_DESC: "Une mystérieuse capsule endommagée flotte dans le système de §H[this.GetName]§!. Nous ne connaissons ni son origine ni sa fonction. Elle n'a pas l'air de disposer d'armement, ainsi nous pensons qu'une analyse plus poussée de sa fabrication avancée serait une initiative sans risque et intéressante."
 cstorms.1820.name: "Piège à tempête"
 cstorms.1820.desc: "[this.leader.GetName] pense que la mystérieuse capsule qui flotte dans le système de [solar_system.GetName] est un ancien piège à tempête, qui pourrait avoir fait partie d'un réseau défensif plus large.\n\nL'orifice d'aspiration de l'appareil est hermétiquement fermé, mais nos relevés semblent indiquer qu'il contient l'énergie et la matière comprimées d'une tempête cosmique, qui aurait donc été prise au piège.\n\nEn ouvrant ce remarquable conteneur, nous pourrions en apprendre beaucoup sur l'atténuation des tempêtes, au risque toutefois de libérer les forces qui y sont actuellement piégées."
 cstorms.1820.a: "Nous pouvons en tirer des enseignements"
 cstorms.1820.b: "C'est trop dangereux, n'y touchons pas"
 STORM_IN_A_BOX_TRAP_PROJECT: "Ouverture du piège à tempête"
 STORM_IN_A_BOX_TRAP_PROJECT_DESC: "Un ancien piège à tempête flotte dans l'espace, transportant une tempête cosmique comprimée. Son ouverture permettrait d'obtenir des informations précieuses sur la gestion et l'atténuation des tempêtes, au risque de libérer les forces qui y sont piégées."
 cstorms.1826.name: "Tempête libérée"
 cstorms.1826.desc: "[leader.GetName] a réussi à décrypter le fonctionnement de l'ancien piège à tempête et à déverrouiller son mécanisme d'ouverture. La §H[from.GetStormType]§! qui y était piégée a ainsi été libérée dans le vide du système de [solar_system.GetName].\n\nL'étude de l'ingénierie complexe du piège a permis de faire des découvertes fascinantes sur les matériaux et les structures résistants aux tempêtes, bien que nous ne comprenions toujours pas comment l'appareil est capable de contenir des tempêtes. Ces nouvelles connaissances nous aideront grandement à surmonter les futures perturbations cosmiques."
 cstorms.1826.storm_tt: "Une petite §Ytempête cosmique§! de faible intensité apparaît dans le système de [solar_system.GetName]"
 storm_trap_insight_modifier: "Aperçu des pièges à tempête"
 storm_trap_insight_modifier_tt: "Réduit les effets négatifs des §Ytempêtes cosmiques§! de §G10%§!."
 cstorms.1835.desc: "Toutes nos condoléances, [this.GetSpeciesNamePlural] ! Nous avons vu par hasard une violente tempête s'abattre sur [this.GetName].\n\nBien sûr, nous avons été très tristes en apprenant les dégâts qu'elle a causés. Nous avons pleuré, à chaudes larmes ! S'il vous plaît, permettez-nous de vous aider... avec une super offre spéciale exclusive !\n\nNous pouvons vous fournir divers appareils, rien que le meilleur ! Vous serez ainsi parés pour la prochaine tempête. Qu'en dites-vous ?"
 cstorms.1835.a: "Affaire conclue"
 cstorms.1835.b: "Nous ne sommes pas intéressés"
