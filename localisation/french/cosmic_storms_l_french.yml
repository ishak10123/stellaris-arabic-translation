 #################
 #Magnetized Planetary Core
 pm_magnetized_planetary_core: "Noyau planétaire hypermagnétisé"
 pm_magnetized_planetary_core_desc: "L'électromagnétisme du manteau profond rend possible l'exploitation minière magnétique, mais perturbe l'infrastructure technique."
 cstorms.1705.name: "$pm_magnetized_planetary_core$"
 cstorms.1705.desc: "Nous avons reçu des rapports étranges à la suite de la récente §Ytempête magnétique§! sur [this.GetName]. Ses puissants champs d'énergie semblent avoir magnétisé le noyau en fusion de la planète, ce qui a entraîné une panne généralisée des infrastructures technologiques.\n\nCe phénomène offre toutefois une occasion unique d'extraction de ressources. Les coulées de lave riches en métaux sous le manteau de la planète sont désormais chargées électromagnétiquement et peuvent être exploitées à l'aide d'aimants miniers."
 #Electrified Oceans
 d_electrified_oceans: "Océans électrifiés"
 d_electrified_oceans_desc: "Un courant électrique continu circule dans le vaste océan de la planète."
 GLACIAL_OCEANS: "océans sous-glaciaires"
 DEFAULT_OCEANS: "océans"
 cstorms.1715.name: "$d_electrified_oceans$"
 cstorms.1715.desc.common: "Un phénomène inhabituel a été observé sur [this.GetName] à la suite de la récente §Ytempête électrique§!. Les [GetOceansState] de la planète se sont retrouvés chargés d'un courant électrique continu qui circule désormais dans cette vaste étendue d'eau et constitue un danger mortel pour la vie aquatique."
 cstorms.1715.desc.aquatic: "Il s'agit d'une réelle menace pour la survie de notre colonie. Nous devons y remédier immédiatement."
 cstorms.1715.desc.non_aquatic: "Ce phénomène ne nous affecte pas directement, mais il représente un défi pour le développement futur de notre colonie."
 cstorms.1715.a: "Déchargeons le courant"
 cstorms.1715.b: "Vivons avec"
 #Ghostly Apparitions
 d_ghostly_canyon: "Canyon fantomatique"
 d_ghostly_canyon_desc: "Les visiteurs de ce canyon sont témoins d'apparitions éthérées."
 cstorms.1725.name: "Apparitions fantomatiques"
 cstorms.1725.desc.common: "Depuis la récente §Ytempête du Suaire§! qui a traversé le système de [this.solar_system.GetName], des [owner.GetColonistPlural] signalent des apparitions éthérées inexplicables dans un canyon isolé. Ces silhouettes bleues fantomatiques apparaissent brièvement, incapables ou refusant d'interagir avec les [owner.GetColonistPlural], errant sans but avant de se volatiliser."
 cstorms.1725.desc.psionic: "Bien que les apparitions semblent être de nature psionique, nous n'avons pas pu établir de communication mentale avec elles. Nous avons cependant constaté que leur présence renforce nos propres capacités télépathiques."
 cstorms.1725.desc.psionic_robot: "Bien que les apparitions semblent être de nature psionique, nous n'avons pas pu établir de communication psionique avec elles. Les vérifications du système ont cependant confirmé que leur présence renforce nos propres capacités télépathiques."
 cstorms.1725.desc.spiritualist: "Ce phénomène remarquable nous rappelle le miracle immatériel de notre existence."
 cstorms.1725.desc.gestalt: "Aucun dommage physique ou comportement agressif n'a été signalé jusqu'à présent."
 cstorms.1725.desc.default: "Aucun dommage physique n'a été signalé jusqu'à présent. Néanmoins, ce phénomène étrange suscite un certain malaise."
 cstorms.1725.a: "Remplissons le canyon de terre, les morts doivent rester enterrés"
 #Volcanic Inactivity
 cstorms.1735.name: "Inactivité volcanique"
 cstorms.1735.desc: "Les radiations résiduelles de la récente §Y[this.GetAffectedStormType]§! ont perturbé l'activité géologique de §H[this.GetName]§!.\n\nLa tempête a notamment éteint un volcan actif en le coupant de son point chaud et en stoppant son approvisionnement en magma.\n\nCes changements nous offrent la possibilité d'accroître le développement de la planète, le refroidissement du magma donnant accès à de nouvelles terres."
 #Mountain in the Sky
 d_sky_mountain: "Montagnes célestes"
 d_sky_mountain_desc: "Une chaîne de montagnes gigantesque flotte dans l'air raréfié de la haute atmosphère de la planète et a mis au jour de nouveaux gisements de minerais."
 unlocks_zone_minerals_physics: "$t$Donne accès à la spécialisation de district : §Y$zone_minerals_physics$§!"
 cstorms.1745.name: "$d_sky_mountain$"
 cstorms.1745.desc: "Une §Ytempête gravitationnelle§! dévastatrice a transformé le paysage de §H[this.GetName]§!. Les fortes variations gravitationnelles de la tempête ont détaché la plus grande chaîne de montagnes de la planète de sa plaque tectonique et l'ont soulevée verticalement dans le ciel.\n\nEn raison de la gravitation résiduelle de la tempête, elle flotte désormais dans la haute atmosphère. Ce phénomène remarquable a mis au jour des gisements de minerais jusqu'alors inaccessibles dans des couches rocheuses profondes et donné du travail à nos [owner.GetResearchers]."
 #Melting Glaciers
 cstorms.1755.name: "Fonte des glaciers"
 cstorms.1755.desc.common: "La récente §Y[this.GetAffectedStormType]§! a eu un impact inattendu sur le climat de [this.GetName]."
 cstorms.1755.desc.electric: "L'atmosphère fortement chargée en électricité a entraîné un changement drastique de température dans la région polaire, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.particle: "Les particules corrosives de la tempête ont eu des effets particulièrement dramatiques sur la région polaire, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.gravity: "Les changements de gravité provoqués par la tempête ont fait éclater plusieurs couches de glace subaquatique, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.magnetic: "Les perturbations des champs magnétiques ont entraîné des déplacements sismiques drastiques, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.solar: "La chaleur extrême de la tempête a entraîné une forte hausse des températures sur toute la planète, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.celestial: "La poussière céleste fortement surchauffée a eu des effets particulièrement drastiques sur la région polaire, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.common_2: "dégelant la toundra gelée auparavant inaccessible.\n\nNous pouvons désormais utiliser ces terres nouvellement découvertes."
 #Dusty Drink
 cstorms.1761.name: "Obstruction cosmique"
 cstorms.1761.desc.common: "Nos [Owner.GetEngineerPlural] stationnés sur §H[this.GetName]§! ont signalé que la §Ytempête de poussière stellaire§! avait eu des effets néfastes sur les systèmes de filtration d'eau. Les particules se déposent dans les nappes phréatiques et la boue riche en minéraux qui en résulte obstrue les principaux points d'infrastructure."
 cstorms.1761.desc.default: "Le manque d'eau a de graves conséquences sur l'agriculture planétaire et se traduit par une pénurie d'eau potable.\n\nCe problème pourrait avoir des conséquences à long terme sur l'approvisionnement en eau si nous ne nous y attaquons pas rapidement. Heureusement, nos [owner.GetEngineerPlural] sont confiants dans leur capacité à développer des systèmes de filtration plus robustes."
 cstorms.1761.desc.lithoid: "Lorsque nos [Owner.GetColonistPlural] ont étudié de plus près le colmatage hydroponique, ils ont découvert que la boue riche en minéraux était à la fois délicieuse et nutritive, du moins pour les lithoïdes. Après avoir apporté quelques ajustements mineurs aux systèmes de filtration de la colonie, ils ont pu produire en masse une boisson saisonnière permettant de patienter pendant la tempête."
 cstorms.1761.a: "Continuons"
 cstorms.1761.b: "Un plaisir inattendu"
 pm_satured_filtration: "Filtration saturée"
 pm_satured_filtration_desc: "Le système d'alimentation en eau a été contaminé par de la poussière stellaire cosmique, qui obstrue désormais le réseau hydroponique de la planète."
 filtration_insight_modifier: "Connaissance de la filtration hydroponique"
 CLEAR_DUSTY_PIPES_PROJECT: "Nettoyer les tuyaux"
 CLEAR_DUSTY_PIPES_PROJECT_DESC: "La §Ytempête de poussière stellaire§! qui a sévi sur §H[this.GetName]§! a obstrué les systèmes de filtration d'eau avec une boue insoluble riche en minéraux. Nous devons développer un système de filtration plus robuste pour résoudre le problème."
 cstorms.1765.name: "Filtres débouchés"
 cstorms.1765.desc: "Les [Owner.GetEngineerPlural] ont remédié au colmatage hydroponique et à la pénurie d'eau qui en résultait sur §H[this.GetName]§!. Le système d'alimentation en eau de la colonie a été amélioré et peut désormais filtrer des contaminants plus complexes, comme ceux provenant de la tempête de poussière stellaire.\n\nCes améliorations peuvent être appliquées dans tout [Owner.GetName]."
 #Flightless Fauna
 cstorms.1771.name: "Faune incapable de voler"
 cstorms.1771.desc.common: "Nos [Root.Owner.GetScientistPlural] stationnés sur [this.GetName] rapportent que la §Ytempête gravitationnelle§! a eu de graves conséquences sur la faune aviaire.\n\nLes variations gravitationnelles causées par la tempête ont déstabilisé l'atmosphère et rendu plusieurs espèces aviaires incapables de voler."
 cstorms.1771.desc.default: "Cela empêche les créatures de chasser comme d'habitude et les a également rendues plus vulnérables aux prédateurs.\n\nSi nous n'intervenons pas, les espèces concernées pourraient finir par disparaître complètement."
 cstorms.1771.desc.swarm: "Un véritable festin nous attend."
 cstorms.1771.a: "Ce sont des proies faciles"
 cstorms.1771.b: "Laissons la nature suivre son cours"
 cstorms.1771.c: "Plaçons ces créatures dans une réserve"
 cstorms.1771.evopred: "Prélevons des échantillons de leur ADN avant leur disparition"
 d_avian_reserve: "Réserve aviaire"
 d_avian_reserve_desc: "Une réserve naturelle isolée, créée pour les espèces aviaires menacées."
 cstorms.1776.name: "De nouveau capable de voler"
 cstorms.1776.desc: "Une fois la §Ytempête gravitationnelle§! passée, la faune temporairement incapable de voler que nous avons hébergée dans notre réserve aviaire sur [this.GetName] a repris son envol.\n\nBeaucoup de créatures sont retournées dans leurs anciens habitats, mais un grand nombre est tout de même resté dans la réserve, profitant du confort et de la sécurité qu'elle apporte.\n\nCela nous offre une occasion unique d'étudier de près les espèces aviaires de la planète."
 cstorms.1776.a: "Excellentes nouvelles !"
