 #Planetary Decisions
 decision_hunker_down: "Mesures préventives"
 decision_hunker_down_desc: "Craignant le pire, les habitants de cette planète prendront toutes les précautions nécessaires pour se prémunir contre les effets des tempêtes cosmiques."
 decision_stop_hunker_down: "Stopper les mesures préventives"
