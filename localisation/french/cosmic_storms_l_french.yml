 solar_storm_aftermath_modifier_severity_desc: "La tempête solaire et les niveaux de radiation extrêmement élevés qui en découlent exigent un confinement quasi permanent. Compte tenu des espaces de vie très limités, il est certes devenu beaucoup plus facile de contrôler la population de la planète, mais au détriment de son moral."
