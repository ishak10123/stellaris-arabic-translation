 #Weather Manipulator
 r_weather_manipulator: "L'annihilateur de perturbations"
 r_weather_manipulator_desc: "Une version plus avancée de la machine utilisée autrefois par les Marchands ricéens pour manipuler les tempêtes cosmiques. Cet appareil augmente l'efficacité de toutes nos technologies de tempête et, utilisé correctement, il peut même empêcher les tempêtes de passer nos frontières."
 storm_relic_repelling_field_modifier: "Activation de l'annihilateur de perturbations"
 storm_relic_repelling_field_modifier_tt: "Génère un §Mtrès grand§! champ §Yrepousse-tempête§! autour de la capitale de l'empire pendant 36 mois."
 #Temporary effect used by the Inetian Precursor Digsite C
 storm_timed_repelling_field_modifier: "Activation des suppresseurs de perturbations sectoriels"
 storm_timed_repelling_field_modifier_tt: "Génère un champ §Yrepousse-tempête§! de taille §Hmoyenne§! autour de la capitale de l'empire pendant 18 mois."
 #The Tempest Invocator
 r_the_tempest_invocator: "L'Invocateur de tempêtes"
 r_the_tempest_invocator_desc: "Le potentiel de cet appareil est perceptible même lorsqu'il est éteint. Devons-nous vraiment prendre le risque de susciter une colère tempétueuse dans nos esprits les plus brillants ? Des sacrifices doivent être faits pour la gloire de notre empire."
 r_the_tempest_invocator_active_effect_tt: "Génère une ['concept_nexus_storm',tempête du nexus] dans le système de votre choix.\n$t$Une fois le système sélectionné, un £scientist£scientifique sera §Psacrifié§!."
 r_the_tempest_invocator_requirement_fail_tt: "$TRIGGER_FAIL$§RAucun £scientist£scientifique ne peut être sacrifié.§!"
 r_the_tempest_invocator_started_placing_fail_tt: "$TRIGGER_FAIL$§RLe système de placement de tempête est déjà activé.§!"
 tempest_invocator_active_modifier: "Repousse-tempête"
 concept_nexus_storm: "$nexus_storm$"
