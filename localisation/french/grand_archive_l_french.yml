 DEAD_CURATORS_DESIGNATION: "Nous, les derniers survivants de notre ordre, avons"
 grand_archive.4121.name: "$leviathans.500.name$"
 grand_archive.4121.desc.common: "appris que vous avez construit de §Ygrandes archives§!, aptes à accueillir un grand nombre de personnes. Voilà une initiative louable visant à partager l'histoire de notre galaxie avec toutes les personnes en quête de ce savoir. Nous poursuivons des objectifs communs à cet égard.\n\nNous souhaitons vous aider dans cette entreprise."
 grand_archive.4121.desc.default: "Nous avons $grand_archive.4121.desc.common$ Continuez d'enrichir votre §Ycollection§! et nous vous apporterons notre soutien dans la mesure du possible."
 grand_archive.4121.desc.dead: "Les derniers survivants de notre ordre ont $grand_archive.4121.desc.common$ Bien que notre ordre ait été récemment anéanti, nous utiliserons nos dernières ressources pour vous aider à enrichir votre §Ycollection§!."
 leviathans.4100.desc: "Bien sûr !\n\nVos efforts ne sont pas passés inaperçus. Compte tenu de votre §Ycollection§! actuelle, nous pouvons vous offrir l'aide suivante moyennant une petite contrepartie."
