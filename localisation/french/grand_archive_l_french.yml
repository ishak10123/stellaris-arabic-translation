 mod_planet_treasure_gatherers_produces_mult: "Production des £job_treasure_gatherer£conservateurs de trésors"
 grand_archive.5015.name: "Mise en place d'une chambre aux trésors"
 grand_archive.5015.desc: "La §Ycarte des étoiles§! nous a fourni des informations d'évaluation archivées qui nous aideront à augmenter la valeur des trésors que nous découvrirons. Nous devrions construire une §Ychambre aux trésors§! sur l'une de nos planètes pour organiser, restaurer et conserver les objets de valeur. Compte tenu de notre logistique actuelle, les planètes suivantes se prêtent à cette nouvelle installation."
 grand_archive.5015.a: "Créons une chambre aux trésors sur §Y[event_target:treasure_planet_candidate_1.GetName]§!"
 grand_archive.5015.b: "Créons une chambre aux trésors sur §Y[event_target:treasure_planet_candidate_2.GetName]§!"
