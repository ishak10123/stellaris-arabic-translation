 ### Primal Calling
 origin_primal_calling: "Appel de la nature"
 origin_primal_calling_desc: "Le bruissement de l'herbe, le silence assourdissant de la nuit, la détermination du chasseur, aussi vive et glaciale que la lumière des étoiles...\n\nCette civilisation a un lien primordial avec la nature. Se considérant comme les gardiens de la faune plurielle, parfois mortelle, de leur monde, ils tournent désormais leur attention vers le ciel. Maîtres du dressage et de l'élevage, leur relation avec la faune s'est développée selon leur éthique. L'avenir nous dira comment ce lien évoluera à l'échelle galactique."
 origin_tooltip_primal_calling_effects: "- Le monde natal :$TABBED_NEW_LINE$- a le modificateur planétaire ['concept_untamed_wilds_mod'].\n- Des §Ycréatures spatiales§! se trouvent dans un système voisin du système natal.\n- $AVAILABLE_BUILDINGS$ ['concept_wildlife_ranch',£building£$wildlife_ranch$]\n- Possibilité d'adopter une ['concept_primal_calling_stance'] spéciale lors du premier contact avec la §Yfaune spatiale§!\n- $ADDITIONAL_TECHNOLOGIES_STRING$ ['technology:tech_genome_mapping',£society_research£$tech_genome_mapping$]\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_alien_life_studies',£society£$tech_alien_life_studies$]\n- Après un premier contact avec la faune spatiale, obtient des connaissances sur les ['technology:tech_gravity_wells',£physics_research£$tech_gravity_wells$]\n- Après la capture de créatures spatiales, obtient des connaissances sur la ['technology:tech_alien_cloning',£society_research£$tech_alien_cloning$].\n- Après le clonage de créatures spatiales, obtient des connaissances sur les ['technology:tech_controlled_mutations',£society_research£$tech_controlled_mutations$]."
 START_SCREEN_PRIMAL_CALLING: "Malgré la rapidité des progrès technologiques, nous restons attachés aux créatures sauvages de notre monde. Compagnons indéfectibles tout au long de notre évolution, ils sont autant nos enseignants que nous sommes leurs intendants. Nous ne leur prenons pas plus que ce qu'elles peuvent se permettre de donner, et leurs sacrifices sont vénérés.\n\nDans les étendues indomptées de l'espace, nous découvrirons peut-être d'autres espèces sauvages. Si tel est le cas, nous les traiterons avec le même respect que les créatures de notre monde. Elles prendront leur place comme nous prendrons la nôtre, afin qu'ensemble nous puissions devenir plus forts.\n\nAppelés par les étoiles, un désir primitif brûle en nous. Quoi qu'il y ait là-bas, nous sommes déterminés à le découvrir."
 leader_trait_trophy_hunter: "Chasseur de trophées"
 leader_trait_trophy_hunter_desc: "Ce commandant endurci par l'expérience de toute une vie connaît la faune spatiale comme personne. La clé d'une chasse réussie est de penser comme sa proie, mais bien sûr, seul le tir parfait rapporte un trophée parfait."
 leader_trait_gifted_trapper: "Trappeur clairvoyant"
 leader_trait_gifted_trapper_desc: "Un chercheur émérite qui apporte le plus grand soin à la capture et au transport des spécimens vivants. Son engagement en faveur de leur bien-être encourage les autres à améliorer les normes de recherche dans toutes les disciplines."
 leader_trait_void_hunter: "Chasseur du vide"
 leader_trait_void_hunter_desc: "Un chasseur expérimenté, taillé pour la chasse au gros gibier. Patient dans son approche et précis dans ses attaques."
 leader_trait_void_hunter_2: "$leader_trait_void_hunter$ II"
 leader_trait_void_hunter_2_desc: "$leader_trait_void_hunter_desc$"
 leader_trait_void_tracker: "Pisteur du vide"
 leader_trait_void_tracker_desc: "Cette personnalité possède un talent inégalé pour la capture des créatures spatiales sauvages."
 leader_trait_void_tracker_2: "$leader_trait_void_tracker$ II"
