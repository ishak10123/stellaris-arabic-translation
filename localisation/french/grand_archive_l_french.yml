 tr_archivism_frontier_archaeology_tt: "Permet à vos vaisseaux scientifiques de fouiller des ['concept_archaeology_site',sites archéologiques] dans les systèmes §Ynon possédés§!.\nVous recevez un ['concept_specimen',spécimen] aléatoire de la catégorie §Y$EXHIBITION_XENO_GEOLOGY$§!."
