 bombardment_voidworm_invasion_crisis_desc: "$bombardment_voidworm_invasion_desc_common$"
 bombardment_frenzied_voidworm_invasion: "$bombardment_voidworm_invasion$ mutants"
 bombardment_frenzied_voidworm_invasion_desc: "- Les planètes dévastées deviendront des §Ymondes détruits§!"
 alert_space_fauna_bombardment_title: "Des vers du vide bombardent notre colonie !"
 alert_space_fauna_bombardment_instant: "Notre colonie est bombardée par des parasites galactiques !\nIls bombardent le monde avec une quantité limitée de spores qui se dispersent au sein de la population et disparaîtront bientôt."
 ALERT_SPACE_FAUNA_BOMBARDMENT_DETAIL: "$PLANET_NAME|Y$ dans le système de $SYSTEM_NAME|Y$. Pops restant à consommer : §Y$POPS_TO_KILL$§!."
 grand_archive.2195.name: "Parasites galactiques"
 grand_archive.2195.desc.common_1: "[from.GetName] subit une attaque.\n\nUn large groupe de vers du vide se trouve en orbite de la colonie et la bombarde de kystes parasitaires."
 grand_archive.2195.desc.common_2: "Une analyse biologique a montré que chaque ver du vide ne dispose que d'une réserve limitée de kystes et est susceptible de repartir une fois celle-ci épuisée. Cependant, d'ici là, nous subirons une perte de population considérable."
 grand_archive.2195.desc.default: "$grand_archive.2195.desc.common_1$\n\nChaque kyste contient des spores toxiques, extrêmement mortelles non seulement pour nos colons, mais aussi pour toute forme de vie. Une fois ingérées, les spores se transforment en nymphe, qui émerge violemment et détruit complètement son hôte. Chaque nymphe possède une bulle de gaz comprimés qui lui permet de s'élever dans la haute atmosphère, où elle se laisse instinctivement dériver vers une destination prédéterminée.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.desc.rocks: "$grand_archive.2195.desc.common_1$\n\nChaque kyste contient des spores toxiques, extrêmement mortelles pour l'ensemble de la faune locale. Une fois ingérées, les spores se transforment en nymphe, qui émerge violemment et détruit complètement son hôte. Les nymphes, qui se nourrissent normalement d'astéroïdes pour leurs métaux précieux, chassent et se nourrissent de nos pauvres [this.GetColonistPlural]. Chaque jeune possède une bulle de gaz comprimés qui lui permet de s'élever dans la haute atmosphère, où il se laisse instinctivement dériver vers une destination prédéterminée.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.a: "C'est véritablement déconcertant..."
 grand_archive.2195.a.homicidal: "La mort les guette"
 ap_galactic_contender_voidworms_tt: "$MOD_DIPLO_WEIGHT_MULT$: §G+20%§!\n$mod_damage_vs_country_type_fallen_empire_mult$ : §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_awakened_fallen_empire_mult$ : §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_gate_builders_mult$ : §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!"
 ap_defender_of_the_galaxy_voidworm_modifier_desc: "$mod_damage_vs_country_type_voidworms_mult$: §G+$@ap_defender_of_the_galaxy_voidworm_dmg_mult|0%$§!\n$ap_defender_of_the_galaxy_modifier_desc$"
