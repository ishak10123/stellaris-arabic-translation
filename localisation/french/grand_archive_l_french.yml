 grand_archive.9005.b: "Nous devrions y réfléchir"
 grand_archive.9005.c: "Nous ne paierons pas"
 grand_archive.9010.name: "Abandon"
 grand_archive.9010.desc: "La [from.GetName] ne souhaitant pas payer la rançon [fromfrom.GetDuDelaLead] commandant[fromfrom.GetXELead] [fromfrom.GetName], [fromfrom.GetSheHe] reste en détention. Quel sort devrions-nous lui réserver ?"
