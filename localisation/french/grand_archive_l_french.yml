 ###########################
 #Space Fauna Description #
 ###########################
 space_amoeba_desc: "Les amibes spatiales sont des prédateurs solitaires qui se montrent agressifs envers tout ce qu'ils rencontrent. Elles sont aidées par leur progéniture partiellement formée appelée « flagelle », et chassent leurs proies avec une incroyable habileté."
 tiyanki_desc: "Les tiyanki, qu'on appelle également « baleines spatiales », sont des créatures généralement pacifiques qui se nourrissent de gaz atmosphériques. Elles sont éminemment coopératives et, à l'état sauvage, leurs bancs sont organisés selon une hiérarchie stricte."
 voidworm_desc: "Les vers du vide sont des organismes parasitaires qui, pour se reproduire, répandent des spores sur des mondes habités dont la biomasse est adaptée. Les adultes forment des trios, appelés « troïkas », et construisent des nids non loin des trous noirs pour élever leurs petits."
 cutholoid_desc: "Les cutholoïdes sont d'énormes organismes qui habitent les astéroïdes afin de protéger leurs corps mous. Ils avalent leurs proies tout entières, leurs fluides digestifs radioactifs les décomposant ensuite lentement."
 crystalline_entity_desc: "Les entités cristallines sont des êtres silicatés animés qui se déplacent librement dans l'espace. Leur couleur variable ne dépend pas de leur âge, mais de leur charge interne."
 wild_tiyanki_ox_modifier: "Boeuf tiyanki sauvage"
 fauna_disengagement_modifier: "Désengagement de la faune spatiale"
