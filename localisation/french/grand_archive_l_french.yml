 grand_archive.4510.desc.ancrel: "$grand_archive.4510.desc.common$\n\n$grand_archive.4510.ancrel$"
 grand_archive.4510.desc.none_freed: "$grand_archive.4510.desc.common$\n\n$grand_archive.4510.nothing$\n\n$grand_archive.4510.freed$"
 grand_archive.4510.desc.none: "$grand_archive.4510.desc.common$\n\n$grand_archive.4510.nothing$"
 grand_archive.4515.name: "Perte des grandes archives"
 grand_archive.4515.desc.common_1: "L'empire [from.GetName] a détruit nos grandes archives dans le système de [fromfrom.GetName]."
 grand_archive.4515.desc.common_2: "Nous devons reconstruire de grandes archives dans un autre système pour continuer d'exposer nos spécimens."
 grand_archive.4515.stolen: "Malheureusement, nous n'avons pas pu récupérer certains de nos précieux spécimens."
 grand_archive.4515.freed: "Certaines de nos créatures spatiales ont été relâchées dans la nature. Beaucoup d'entre elles sont désorientées et agressives."
 grand_archive.4515.desc.stolen_freed: "$grand_archive.4515.desc.common_1$\n\n$grand_archive.4515.stolen$\n$grand_archive.4515.freed$\n\n$grand_archive.4515.desc.common_2$"
 grand_archive.4515.desc.stolen: "$grand_archive.4515.desc.common_1$\n\n$grand_archive.4515.stolen$\n\n$grand_archive.4515.desc.common_2$"
 grand_archive.4515.desc.none_freed: "$grand_archive.4515.desc.common_1$\n\n$grand_archive.4515.freed$\n\n$grand_archive.4515.desc.common_2$"
 grand_archive.4515.desc.none: "$grand_archive.4515.desc.common_1$\n\n$grand_archive.4515.desc.common_2$"
 grand_archive.4520.name: "$grand_archive.4515.name$"
 grand_archive.4520.desc.common_1: "Nos grandes archives du système de [from.GetName] ont été détruites."
 grand_archive.4520.desc.freed: "$grand_archive.4520.desc.common_1$\n\n$grand_archive.4515.freed$\n\n$grand_archive.4515.desc.common_2$"
 grand_archive.4520.desc.default: "$grand_archive.4520.desc.common_1$\n\n$grand_archive.4515.desc.common_2$"
 grand_archive.4555.name: "$grand_archive$ démantelées"
 grand_archive.4555.desc: "Les grandes archives appartenant à l'empire [from.GetName], dans le système de [fromfrom.GetName], ont été démantelées suite à notre conquête.\n\nL'espace qu'elles occupaient nous a été restitué."
 grand_archive.4560.name: "$grand_archive.4555.name$"
 grand_archive.4560.desc.common_1: "Nos grandes archives du système de [from.GetName] ont été démantelées après notre départ."
 grand_archive.4560.desc.common_2: "Nous avons pu récupérer une grande partie des alliages utilisés pour leur construction. Nous devrons reconstruire entièrement la structure dans un autre système afin de continuer à exposer nos spécimens."
 grand_archive.4560.desc.specimen: "Tous les spécimens ont été récupérés et seront entreposés jusqu'à ce que nous puissions construire de nouvelles grandes archives."
 grand_archive.4560.desc.fauna: "Toutes les créatures spatiales ont été abattues pour en extraire des ressources."
 grand_archive.4560.desc.specimen_fauna: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.specimen$\n$grand_archive.4560.desc.fauna$\n\n$grand_archive.4560.desc.common_2$"
 grand_archive.4560.desc.specimen_nofauna: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.specimen$\n\n$grand_archive.4560.desc.common_2$"
 grand_archive.4560.desc.nospecimen_fauna: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.fauna$\n\n$grand_archive.4560.desc.common_2$"
 grand_archive.4560.desc.none: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.common_2$"
 grand_archive.4580.name: "Projet de repeuplement du vivarium"
 grand_archive.4580.desc: "Maintenant que de nouvelles grandes archives ont été construites dans le système de [from.GetName], nous pouvons restaurer une grande partie de ce que nous avons perdu.\n\nLe matériel génétique de chaque espèce de faune spatiale que nous avons précédemment élevée a été préservé ; avec suffisamment de ressources, nous pourrions faire du clonage."
 grand_archive.4580.a: "Non, nous avons besoin de ces ressources"
 grand_archive.4580.b: "Clonons de nouvelles créatures spatiales"
