 #Voidworms Plague Crisis #
 ###########################
 production_surge_modifier: "Augmentation de la production"
 public_distrust_modifier: "Méfiance de la population"
 test_subject_unwilling_modifier: "Sujets d'étude"
 test_subject_volunteer_modifier: "$test_subject_unwilling_modifier$"
 test_subject_gestalt_modifier: "$test_subject_unwilling_modifier$"
 grand_archive.2310.name: "Infestation de vers du vide"
 grand_archive.2310.desc.default: "La population de vers du vide à travers la galaxie a atteint un point critique et leur comportement change à vue d'oeil.\n\nLeur cycle de vie normal, au cours duquel une partie de la population hôte est épargnée, a été affecté. Assurer la pérennité de leurs frayères ne semble plus être une priorité.\n\nNos colonies ont été mises en état d'alerte et la présence de vers du vide dans un système doit être traitée avec la plus grande prudence.\n\nUne prolifération de vers du vide d'une ampleur galactique est à nos portes."
 grand_archive.2310.desc.tech: "$grand_archive.2310.desc.default$\n\nL'immunité que nous avons développée contre ces parasites ne semble plus aussi efficace qu'avant. Nous allons devoir recommencer à zéro."
 grand_archive.2310.desc.nocontact: "Des rapports troublants ont été interceptés aux quatre coins de la galaxie : une espèce inconnue de faune spatiale, appelée « vers du vide », serait entrée dans une phase de reproduction accélérée. Ces créatures constitueraient une menace importante pour les planètes dépourvues d'un système de défense approprié. Toutes nos colonies ont été mises en état d'alerte."
 grand_archive.2310.a: "$DISTURBING$$DOTDOTDOT$"
 situation_voidworm_plague: "Infestation de vers du vide"
 situation_voidworm_plague_type: "$situation_voidworm_plague$"
 situation_voidworm_plague_desc: "Nous sommes à la veille d'une infestation de vers du vide.\n\nCes créatures n'épargneront plus leurs hôtes planétaires. Nous devons les éradiquer au plus vite pour protéger nos colonies.\n\n§YChaque ver du vide éliminé accélère l'avancée de la situation.§!"
 situation_voidworm_plague_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_voidworm_plague: "Vos colonies ne subiront pas de bombardement des vers du vide."
 approach_voidworm_plague_do_nothing: "Ne rien faire"
 approach_voidworm_plague_do_nothing_tt: "Nous ne ferons rien."
 approach_voidworm_plague_support_fleets: "Soutenir nos flottes"
 approach_voidworm_plague_support_fleets_tt: "Nous pouvons sacrifier un peu de notre qualité de vie pour soutenir nos flottes militaires contre la menace des vers du vide.\n$SITUATION_MONTHLY_CHANGE$ de la situation : §G+0.5§!"
 approach_voidworm_plague_purge_infected_pops: "Tuer les infectés"
 approach_voidworm_plague_purge_infected_pops_tt: "Les vers du vide qui bombardent nos colonies n'en créeront pas de nouveaux.\n$SITUATION_MONTHLY_CHANGE$ de la situation : §G+0.7§!"
 approach_voidworm_plague_search_for_cure: "Chercher un remède"
 approach_voidworm_plague_search_for_cure_tt: "Si nous parvenons à briser leur cycle biologique, les vers du vide ne pourront plus se reproduire dans la galaxie.\n$SITUATION_MONTHLY_CHANGE$ de la situation : §G+1.0§!"
 change_approach_will_temporarily_lock: "§SSi cette approche est adoptée, les autres approches ne pourront pas l'être pendant §Y$@voidworm_plague_approach_cooldown_years|0$ ans§!.§!"
 too_early_to_change_approach: "§SIl est trop tôt pour changer notre approche de la situation.§!"
 voidworm_crisis_eradicate_chain_title: "Éradication des vers du vide"
 voidworm_crisis_eradicate_chain_desc: "La population de vers du vide a atteint un niveau insoutenable dans la galaxie. Il faut les éradiquer.\n\nNous avons localisé tous les §Ynids de vers du vide§! qui doivent être détruits."
 voidworm_system_poi_title: "Détruire [prev.GetName]"
 voidworm_system_poi_desc: "Des §Ynids de vers du vide§! ont été détectés dans ce système.\n\nDétruisez-les pour empêcher les parasites de se reproduire."
 #Voidworms Plague Crisis Random Events #
 grand_archive.2400.name: "Composants excédentaires"
 grand_archive.2400.desc: "Le soutien accru de nos flottes contre les vers du vide a généré un surplus inattendu de composants grâce à l'amélioration des protocoles de maintenance. Nous avons la possibilité d'utiliser ces matériaux pour accélérer la construction de nouveaux vaisseaux à court terme."
 grand_archive.2400.a: "Investissons ces composants dans le renforcement de nos flottes"
 grand_archive.2400.b: "Gardons-les en réserve"
 grand_archive.2405.name: "Appel aux armes"
 grand_archive.2405.desc.default: "Nos efforts continus pour enrayer le fléau des vers du vide ont donné naissance à une nouvelle génération de commandants prêts à mettre leurs compétences au service de l'élimination de cette menace galactique."
 grand_archive.2405.desc.gestalt: "Nos efforts continus pour enrayer le fléau des vers du vide nous ont permis de produire des noeuds de commandement supplémentaires. Afin d'apporter un soutien accru à nos flottes, ces noeuds centrés sur le combat ont été dotés de ressources plus importantes pour faciliter leur intégration rapide dans nos opérations militaires."
 grand_archive.2405.a: "Inspirant"
 grand_archive.2405.tt: "Renouvelle notre vivier de §Hpersonnalités recrutables§! et ajoute 3 §Hcommandants§! avec un niveau supplémentaire."
 grand_archive.2410.name: "Innovation en première ligne"
 grand_archive.2410.desc.default: "Un[random_shipyard.leader.GetXELead] ingénieur[random_shipyard.leader.GetXELead] basé[random_shipyard.leader.GetXELead] sur [random_shipyard.GetName] a développé un nouveau plan conceptuel pour la défense des vaisseaux. [random_shipyard.leader.GetHeSheCap] effectuait des réparations de routine dans notre combat contre les vers du vide lorsqu'[random_shipyard.leader.GetHeShe] a eu l'idée d'un nouveau composant qui augmenterait la résistance de nos vaisseaux. [random_shipyard.leader.GetHeSheCap] a soumis cette idée à notre département de recherche, qui a estimé qu'elle avait un grand potentiel."
 grand_archive.2410.desc.gestalt: "Un [root.GetIndividualName] de réparation stationné sur [random_shipyard.GetName] a inspiré de nouvelles idées de recherche pour améliorer la défense des vaisseaux. Suite à un malentendu lors d'une réparation de routine, le [root.GetIndividualName] a utilisé une combinaison de méthodes et de matériaux non conformes aux règles, ce qui a conduit à la découverte d'un nouveau composant de protection. Après étude, il apparaît que cette découverte fortuite a un grand potentiel, à condition qu'elle soit un peu plus affinée."
 grand_archive.2420.name: "Infection de [infected_leader.GetName]"
 grand_archive.2420.desc: "Lors de l'exercice de ses fonctions, [infected_leader.GetName] a été infecté[infected_leader.GetXELead] par des spores de vers du vide. Dans peu de temps, les nymphes écloront et détruiront le corps de leur hôte.\n\nCela semble sans espoir, mais nos médecins émettent l'hypothèse qu'il est possible de retirer les larves avant qu'elles ne soient complètement ancrées dans son système nerveux. Malgré les risques encourus, [infected_leader.GetName] souhaite subir cette intervention."
 grand_archive.2420.a: "Éliminons [infected_leader.GetName]"
 grand_archive.2420.b: "Retirons les larves"
 grand_archive.2425.name: "Infraction à la quarantaine"
 grand_archive.2425.desc.common: "Quelques [infected_planet_pop.species.GetNamePlural] infectés se sont échappés de la purge sur [infected_planet.GetName] et se sont dispersés dans nos systèmes. Si nous ne faisons rien, l'infection des vers du vide risque de se propager dans tout [this.GetName]."
 grand_archive.2425.desc.default: "$grand_archive.2425.desc.common$ Les fuyards doivent être éliminés avant de mettre tout le monde en danger."
 grand_archive.2425.desc.rogue: "$grand_archive.2425.desc.common$ Les fuyards doivent être éliminés avant de mettre nos autres biotrophées en danger."
 grand_archive.2425.desc.gestalt: "$grand_archive.2425.desc.common$ Les fuyards doivent être éliminés avant de mettre l'ensemble du collectif en danger."
 grand_archive.2425.desc.robot: "Des échantillons de faune et de flore infectés destinés à être analysés ont été transformés par erreur en denrées alimentaires. Suite à cela, une grande quantité de matière organique a été contaminée par des parasites de vers du vide et doit être éliminée."
 grand_archive.2425.a.default: "Chassons-les"
 grand_archive.2425.a.default.tt: "-1 pop organique sur chaque colonie possédée"
 grand_archive.2425.a.robot: "Brûlons les denrées"
 grand_archive.2425.a.robot.tt: "$@infected_devastation|0$ de dévastation sur toutes les planètes non infectées"
 grand_archive.2425.b: "Ne faisons rien"
 grand_archive.2425.b.tt: "D'autres nymphes de vers du vide pourraient apparaître à proximité de nos colonies !"
 grand_archive.2430.name: "Abandon de poste"
 grand_archive.2430.desc: "Bien que l'on s'accorde à dire que la purge des infectés est la meilleure solution, de nombreux soldats ont du mal à exécuter les ordres. Malgré le danger que représente les parasites des vers du vide, beaucoup hésitent à éliminer leurs concitoyens pour le bien de tous.\n\nIl faut agir pour empêcher l'infection de se propager dans nos colonies. Peut-être devrions-nous automatiser certaines étapes du processus afin de réduire le nombre de soldats. Une courte campagne publicitaire pourrait aussi aider à expliquer les normes éthiques de nos opérations de purge et réaffirmer leur nécessité."
 grand_archive.2430.a: "Automatisons le processus"
 grand_archive.2430.b: "Lançons une campagne publicitaire"
 grand_archive.2440.name: "Percées majeures"
 grand_archive.2440.desc: "Notre recherche d'un remède contre les vers du vide a permis à d'autres domaines de recherche biologique de faire des progrès significatifs. Les parasites restent la priorité absolue, mais cette nouvelle percée recèle un énorme potentiel pour de futures études."
 grand_archive.2445.name: "Premiers tests"
 grand_archive.2445.desc.common: "Nous comprenons de mieux en mieux l'infestation de vers du vide et nous disposons des bases nécessaires pour créer un remède."
 grand_archive.2445.desc.default: "$grand_archive.2445.desc.common$ Cependant, notre recherche progresserait beaucoup plus rapidement si nous autorisions les tests sur les [owner_main_species.GetNamePlural].\n\nAu-delà de la question éthique, il devrait être dans l'intérêt général de contourner certaines mesures de sécurité."
 grand_archive.2445.desc.gestalt: "$grand_archive.2445.desc.common$ Cependant, les tests prennent beaucoup de temps, notamment parce qu'il faut sans cesse trouver des [root.GetIndividualNamePlural] inactifs pour faire office de cobayes. Si les [root.GetIndividualNamePlural] pouvaient simplement être réaffectés pour participer aux tests, nous pourrions développer un remède beaucoup plus rapidement.\n\nLes conséquences se feraient certainement sentir dans d'autres parties du collectif, puisque les [root.GetIndividualNamePlural] réaffectés abandonneraient leurs anciens postes de travail."
 grand_archive.2445.a.default: "Faisons des tests sur des [owner_main_species.GetNamePlural] ne se doutant de rien"
 grand_archive.2445.a.gestalt: "Donnons la priorité aux tests"
 grand_archive.2445.b.default: "Ne faisons des tests que sur les volontaires"
 grand_archive.2445.b.gestalt: "Continuons les recherches comme d'habitude"
 grand_archive.2445.c: "Ne faisons pas de tests contraires à l'éthique"
 grand_archive.2450.name: "Glandes de ver du vide"
 grand_archive.2450.desc: "Nous avons découvert un schéma dans le cycle de reproduction des vers du vide qui pourrait conduire à des avancées majeures dans la synthèse d'un remède contre l'infestation.\n\nPour confirmer cette hypothèse, notre équipe de recherche a besoin des glandes reproductrices d'une troïka de vers du vide sauvages. Il est essentiel que cette troïka soit tuée pendant le bombardement d'une planète afin de pouvoir récolter des gamètes actifs."
 grand_archive.2450.a: "Nous n'avons pas le temps pour ça"
 grand_archive.2450.b: "Vous aurez vos glandes"
 VOIDWORM_GLANDS_PROJECT: "Glandes reproductrices de troïka"
 VOIDWORM_GLANDS_PROJECT_DESC: "Nous avons fait une découverte décisive en cherchant un remède contre l'infestation des vers du vide. Tout ce dont nous avons besoin, ce sont les glandes reproductrices d'une troïka de vers du vide en état de fertilité active."
 VOIDWORM_GLANDS_PROJECT_TOOLTIP: "§RRécoltez les restes d'une troïka qui bombarde activement une planète.§!"
 VOIDWORM_TITAN_DEBRIS_PROJECT: "Restes de troïka"
 VOIDWORM_TITAN_DEBRIS_PROJECT_DESC: "Les restes d'une troïka de vers du vide peuvent être récoltés pour leurs glandes reproductrices.\n\nCes organes nous permettront de mieux comprendre la biologie de ces créatures et nous aiderons à éradiquer l'infestation une bonne fois pour toutes."
 grand_archive.2455.name: "Glandes récupérées"
 grand_archive.2455.desc: "Les glandes récoltées sur une troïka de vers du vide fertile ont permis d'obtenir de nouvelles informations sur leur cycle de reproduction.\n\nAu cours d'un rituel d'accouplement qui se poursuit jusqu'à la mort, les trois vers du vide qui se reproduisent se répartissent équitablement leur matériel génétique, devenant ainsi un organisme entièrement nouveau.\n\nNous pouvons utiliser ce processus de remodelage génétique contre eux."
 grand_archive.2500.name: "Découverte d'un remède"
 grand_archive.2500.desc.default: "Nous avons mis au point un remède contre l'infection parasitaire des vers du vide. Nos colonies ne seront plus exposées à leurs bombardements de spores, et nous n'aurons plus à nous inquiéter de leur présence dans la galaxie."
 grand_archive.2500.desc.tech: "$grand_archive.2500.desc.default$\n\nNous sommes certains que, cette fois, le remède que nous avons mis au point est protégé contre toute mutation future de leur biologie."
 #########################################
 #Voidworm Plague Crisis Galactic Focus #
 #########################################
 resolution_galactic_focus_crisis_voidworm_plague: "Priorité : l'infestation de vers du vide"
 resolution_galactic_focus_crisis_voidworm_plague_desc: "Les vers du vide sont des parasites qui constituent un danger pour la galaxie. Si nous ne nous unissons pas contre eux, ils nous consommeront tous. Nous devons donc rassembler l'ensemble de la Communauté pour faire de cette crise la priorité galactique."
 resolution_galactic_focus_crisis_voidworm_plague_effect_success: "$resolution_galactic_focus_crisis_effect_success$"
 galactic_focus_crisis_voidworm_plague: "Défaite de l'infestation de vers du vide"
 galactic_focus_crisis_voidworm_plague_desc: "L'infestation de vers du vide constitue une menace pour l'ensemble de la galaxie. Pour la vaincre, nous devons nous unir."
 gal_com_crisis_voidworm_pop_victims: "Les vers du vide ont causé d'importants dégâts à la population sur leur territoire."
