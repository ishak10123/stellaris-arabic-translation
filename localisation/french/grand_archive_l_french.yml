 TREASURE_TROVE: "Trésor"
 TREASURE_TROVE_DESC: "Un vieux §Ytrésor§! de pirate a été détecté sur [this.GetName]. Qui sait quelles richesses il contient..."
 treasure_troves_chain_title: "Trésors"
 treasure_troves_chain_desc: "Tout au long de l'histoire de la galaxie, les pirates ont caché leur butin sous la forme de trésors bien planqués. Nombre de ces caches ont été abandonnées et jugées perdues, mais elles sont aujourd'hui à notre disposition."
 mod_treasure_trove_reward_mult: "Récompenses de trésor"
 grand_archive.6010.name: "Découverte d'un trésor"
 grand_archive.6010.desc: "Nous avons détecté un faible signal en provenance de [event_target:treasure_trove_planet.GetName]. À en juger par sa cryptographie rudimentaire, nous pensons qu'il provient d'un §Ytrésor§! pirate perdu.\n\nCela prendra du temps, mais nous sommes convaincus de pouvoir percer ses secrets."
 grand_archive.6010.a: "Localisons son emplacement exact"
 grand_archive.6015.name: "Trésor récupéré"
 grand_archive.6015.common.1: "Après avoir soigneusement désarmé le système de défense du §Ytrésor§! pirate de [event_target:treasure_trove_planet.GetName]"
 grand_archive.6015.desc: "$grand_archive.6015.common.1$, nous avons découvert une cache de ressources précieuses.\n\nNous allons faire bon usage de ce butin inattendu."
 grand_archive.6015.desc.specimen: "$grand_archive.6015.common.1$, nous avons découvert un vieil artefact pirate protégé dans un conteneur scellé. Cette pièce de l'histoire des boucaniers sera ajoutée à notre collection."
 grand_archive.6015.desc.specimen_extra: "Nous avons également découvert un vieil artefact pirate caché dans l'immense §Ytrésor§!. Après une restauration minutieuse, cette pièce de l'histoire des boucaniers viendra enrichir notre collection."
 grand_archive.6015.desc.pirate_ship: "Après avoir soigneusement désarmé le §Ytrésor§! perdu, nous avons découvert des indications analogiques pointant vers un point précis de la planète. Nous y avons trouvé un incroyable cuirassé pirate protégé par un dispositif anti-détection.\n\nCe vaisseau, appelé [treasure_trove_pirate_ship.GetName], a rejoint notre armée."
 grand_archive.6015.desc.tech: "$grand_archive.6015.common.1$, nous avons découvert une banque de données contenant de précieux travaux de recherche.\n\nNous ne savons pas d'où ils viennent, mais nous pouvons en faire bon usage."
 grand_archive.6015.a: "$GOOD$"
 treasure_trove_specimen_tt: "$t$Récupérez un ['concept_specimen',spécimen]."
 treasure_trove_pirate_ship_tt: "$t$Récupérez un vaisseau pirate militaire."
