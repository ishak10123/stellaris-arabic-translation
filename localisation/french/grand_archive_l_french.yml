 VOIDLURE_ATTRACTED_FAUNA_TITLE: "Nouveaux organismes spatiaux"
 VOIDLURE_ATTRACTED_FAUNA_DESC: "Un de nos appâts du vide a attiré des créatures spatiales."
 NAME_Lured_Fauna: "Faune temporairement attirée"
 wildlife_ranch: "Ferme sauvage"
 wildlife_ranch_desc: "Nous vivons en symbiose avec les créatures locales, protégeons leur habitat et veillons à la préservation de leurs espèces."
 wildlife_ranch_2: "Réserve sauvage"
 wildlife_ranch_2_desc: "La gestion responsable des écosystèmes améliore l'habitat des créatures indigènes et facilite la reproduction."
 wildlife_ranch_3: "Centre sauvage"
 wildlife_ranch_3_desc: "Une énorme infrastructure où les animaux vivent en liberté. Luxe et confort sont garantis afin qu'ils fournissent des ressources de bonne qualité."
 hunting_grounds: "Terrains de chasse"
 hunting_grounds_desc: "Un complexe d'entraînement destiné à l'apprentissage de toutes sortes de techniques de chasse. Que l'on utilise des armes énergétiques modernes ou du matériel de chasse traditionnel, une endurance et une habileté incomparables sont nécessaires pour abattre de redoutables prédateurs et en faire des trophées."
 hunting_grounds_2: "Champ de chasse"
 hunting_grounds_2_desc: "Un centre d'entraînement et de surveillance offrant des conditions de chasse optimales. Les images thermiques permettent d'identifier les traces laissées par les animaux et de se procurer du gibier répondant aux critères de qualité d'un trophée."
 hunting_grounds_3: "Nexus de chasse"
 hunting_grounds_3_desc: "Un vaste espace qui accueille des parties de chasse planétaires. Équipés d'armes et d'instruments de pistage de grande qualité, les chasseurs reçoivent ici un entraînement de premier ordre qui leur permet de maximiser la qualité des proies qu'ils abattent."
 wildlife_sanctuary: "Sanctuaire sauvage"
 wildlife_sanctuary_desc: "Une réserve protégée où les animaux sauvages sont observés dans leur habitat naturel. Des mesures de sécurité sont mises en place pour éviter de fortes fluctuations de la population ou la propagation de maladies. Pouvoir étudier ces créatures est en soi une entreprise académique précieuse, mais cela nous apporte également des connaissances cruciales sur notre propre nature."
 wildlife_sanctuary_2: "Sanctuaire avancé"
 wildlife_sanctuary_2_desc: "Les créatures hébergées ici reçoivent des soins individuels et leurs besoins particuliers en matière de nutrition et de santé sont satisfaits avec un minimum d'interventions extérieures. Les écosystèmes spécialement conçus pour elles permettent même aux espèces menacées de se reproduire."
 wildlife_sanctuary_3: "Nexus-sanctuaire"
 wildlife_sanctuary_3_desc: "Les créatures hébergées ici sont surveillées et soignées grâce à une infrastructure soigneusement conçue, dont l'existence passe pratiquement inaperçue. Les chercheurs ne sont pas autorisés à interférer avec le comportement naturel des spécimens afin d'obtenir des données de recherche de la plus haute qualité."
 primal_arena: "Arène primitive"
 primal_arena_desc: "Un colisée où les guerriers les plus forts affrontent les créatures les plus féroces. Il n'y a pas de plus grand divertissement que de voir des héros triompher de bêtes sauvages... ou périr en essayant."
 primal_arena_2: "Stade primitif"
 primal_arena_2_desc: "Dans cet immense stade, des meutes d'animaux sont entraînées par d'habiles dresseurs pour exécuter des attaques coordonnées. Les gladiateurs ne peuvent plus uniquement compter sur le nombre pour maîtriser leurs proies : ils devront se montrer plus malins que les dresseurs pour survivre."
 primal_arena_3: "Colisée primitif"
 primal_arena_3_desc: "Une arène impressionnante conçue pour accueillir des affrontements spectaculaires entre guerriers et bêtes. Chaque combat nécessite des semaines de préparation et peut accueillir un public de plusieurs millions de personnes."
 symbiosis_nexus: "Nodule symbiotique"
 symbiosis_nexus_desc: "Une réserve naturelle où l'on accueille nos partenaires sauvages. Chaque créature apporte une contribution unique à l'esprit."
 symbiosis_nexus_2: "Réserve symbiotique"
 symbiosis_nexus_2_desc: "Dans cette réserve, nos partenaires sauvages sont formés en groupes autosuffisants. La coordination de leurs capacités mentales moindres assure la stabilité de l'esprit."
 symbiosis_nexus_3: "Nexus symbiotique"
 symbiosis_nexus_3_desc: "Un énorme noeud qui réunit les consciences de toutes les créatures pour stimuler notre pensée collective."
 edict_space_fauna_exhibition: "Exposition de créatures spatiales"
 space_fauna_exhibition: "$edict_space_fauna_exhibition$"
 edict_space_fauna_exhibition_desc: "Des éleveurs de toute la galaxie exposent leurs animaux les plus précieux et concourent pour le titre convoité de la meilleure bête."
 edict_beasts_burden: "Bêtes de somme"
 beasts_burden: "$edict_beasts_burden$"
 edict_beasts_burden_desc: "Nos animaux d'élevage les plus robustes doivent contribuer aux tâches les plus exigeantes."
 edict_creature_welfare: "Bien-être des créatures"
 creature_welfare: "$edict_creature_welfare$"
 edict_creature_welfare_desc: "Il est de notre responsabilité de garantir la meilleure qualité de vie possible aux êtres vivants dont nous avons la charge."
 edict_crack_the_whip: "Coup de fouet"
 crack_the_whip: "$edict_crack_the_whip$"
 edict_crack_the_whip_desc: "Quelle que soit l'espèce, chaque organisme réagit de la même manière à la douleur. Le tout est d'apprendre à l'infliger correctement."
 edict_exotic_network: "Réseau neural exotique"
 exotic_network: "$edict_exotic_network$"
 edict_exotic_network_desc: "La conscience des organismes inférieurs dont nous nous occupons dispose d'une capacité suffisante pour fournir la bande passante nécessaire aux calculs les plus sophistiqués."
 edict_defensive_instincts: "Instincts d'autopréservation"
 defensive_instincts: "$edict_defensive_instincts$"
 edict_defensive_instincts_desc: "Nous ne faisons qu'un. Puisse notre instinct se fondre dans le vide glacial de l'espace."
 edict_biological_overdrive: "Surcadençage biologique"
 biological_overdrive: "$edict_biological_overdrive$"
 edict_biological_overdrive_desc: "En stimulant les bons récepteurs nerveux, les créatures inférieures peuvent être poussées jusqu'à leur limite absolue."
 grand_archive.1060.name: "Cadavre ([from.GetSpaceFaunaName])"
 grand_archive.1060.desc: "Après avoir établi le contact avec les [from.GetSpaceFaunaNamePlural], nous avons découvert un cadavre de leur espèce en décomposition dans le système de [fromfrom.GetName]. Ayant flottés dans l'espace pendant une longue période, les restes sont desséchés et gelés.\n\nNous pensons que cette carcasse est l'objet qui a attiré d'autres individus de leur espèce ; peut-être étaient-ils à la recherche d'un membre perdu de leur [from.GetSpaceFaunaGroup]. Il s'agit d'une occasion rare d'étudier la biologie d'un spécimen appartenant à l'espèce des [from.GetSpaceFaunaNamePlural], mort de cause naturelle dans le vide."
 TIYANKI_GROUP_NAME: "banc"
 SPACE_AMOEBA_GROUP_NAME: "colonie"
 CRYSTAL_GROUP_NAME: "amas"
 VOIDWORM_GROUP_NAME: "nichée"
 CUTHOLOID_GROUP_NAME: "groupe"
 voidworm_carcass_01_object: "Restes de ver du vide"
 carcass_01_object: "Carcasse de créature spatiale"
 CARRION_DEBRIS_PROJECT: "Autopsie - [met_critter.GetSpaceFaunaName]"
 CARRION_DEBRIS_PROJECT_DESC: "La carcasse d'un spécimen appartenant à l'espèce des [met_critter.GetSpaceFaunaNamePlural] a été découverte dans le système de [contact_system.GetName]. L'étude de ces restes pourrait nous permettre de mieux comprendre ces créatures spatiales."
 grand_archive.1065.name: "Autopsie terminée"
 grand_archive.1065.desc: "L'autopsie du cadavre d'un spécimen appartenant à l'espèce des [met_critter.GetSpaceFaunaNamePlural] découvert dans le système de [contact_system.GetName] est terminée. Nous avons extrait des échantillons biologiques bien conservés qui nous permettront d'en savoir plus sur la physiologie de ces organismes."
 grand_archive.1065.specimen_tt: "Faune : ['concept_specimen',spécimen] §Mépique§!"
 NAME_BoneShip: "Vaisseau d'ossements"
 NAME_BoneShip_desc: "Le vaisseau est orné de vrilles de tiyanki adultes, de rangées de dents de vers du vide et du crâne d'une créature inconnue. Il est équipé d'une panoplie d'armes de précision."
 grand_archive.1069.name: "$NAME_BoneShip$"
 grand_archive.1069.desc: "Nous avons été contactés par un vaisseau spatial étrangement modifié dans le système de [from.GetName]. $NAME_BoneShip_desc$\n\nLe pilote s'est montré suffisamment naïf pour accepter notre invitation à discuter, après quoi il a été [GetExecuted]. Nous avons pris le contrôle de ce vaisseau singulier et l'avons intégré à nos rangs. Parmi les effets personnels du pilote, nous avons découvert un manuel de chasse intéressant."
 grand_archive.1069.a: "Un cadeau de bienvenue"
 EXECUTED: "exécuté"
 DEVOURED: "dévoré"
 grand_archive.1070.name: "$NAME_BoneShip$"
 grand_archive.1070.desc: "Nous avons été contactés par un vaisseau spatial étrangement modifié dans le système de [from.GetName]. $NAME_BoneShip_desc$\n\nIl nous appelle sur toutes les fréquences."
 grand_archive.1070.a: "Ouvrons un canal"
 NAME_PrimalHunter: "Ceriz t'Xal"
 primal_hunter_desc: "Un individu expert de la chasse qui parcourt la galaxie à la recherche de gros gibier."
 primal_hunter_catchphrase: "§L« Je cherche de nouveaux trophées pour ma collection. »§!"
 grand_archive.1075.name: "$grand_archive.1070.name$"
 grand_archive.1075.desc: "§HLa voix taciturne de Ceriz est rauque et cassée, comme si elle n'avait pas été utilisée depuis de nombreuses semaines. Son attitude directe et son regard stoïque sont à la fois respectueux et intimidants.§!\n\nLa chasse aux trophées étant ma spécialité, il n'est pas facile de m'impressionner. Mais vous avez réussi.\n\nJ'accepte de me joindre à vos parties de chasse, à condition que notre partenariat soit basé sur la commodité et le partage d'expérience."
 grand_archive.1075.a: "Qui êtes-vous ?"
 grand_archive.1075.a.reply: "Je m'appelle $NAME_PrimalHunter$. Je chasse dans ces systèmes depuis de nombreuses années. Je suis à la recherche de nouvelles proies, et votre peuple semble compter d'habiles traqueurs.\n\nMa motivation est simple : le frisson de la chasse."
 grand_archive.1075.b: "Quel est ce crâne sur votre vaisseau ?"
 grand_archive.1075.b.reply: "C'était le dernier de son espèce. Il s'est bien battu."
 grand_archive.1075.c: "Depuis quand nous observez-vous ?"
 grand_archive.1075.c.reply: "Il est évident que votre peuple a encore beaucoup à apprendre.\n\nUn bon chasseur doit pouvoir traquer sa proie aussi longtemps que nécessaire sans se faire remarquer. Il faut rester invisible jusqu'à ce que le coup de feu soit tiré. Le temps que j'ai passé dans l'ombre n'a pas d'importance. Ce qui compte, c'est le moment où j'ai décidé de me révéler."
 grand_archive.1075.d: "Pourquoi voulez-vous nous rejoindre ?"
 grand_archive.1075.d.reply: "Je ne cherche pas la compétition. Même si je n'aime pas partager mon territoire, je préfère collaborer avec vos chasseurs plutôt que de rivaliser pour la même proie.\n\nQuoi que vous poursuiviez, je l'abattrai."
 grand_archive.1075.hire: "Recruter"
 grand_archive.1075.hire_tt: "§Y$NAME_PrimalHunter$§! va devenir une §Hpersonnalité§! de la §Y[Root.GetName]§!."
 grand_archive.1075.dismiss: "Rejeter"
 grand_archive.1080.name: "Xénologiste nomade"
 grand_archive.1080.desc: "Un vaisseau de recherche indépendant a contacté notre base stellaire dans le système de [from.GetName]. Il est équipé de toutes sortes de pièges et d'instruments d'analyse spécialement conçus pour la capture et l'analyse de la faune spatiale.\n\nIl nous appelle sur toutes les fréquences."
 grand_archive.1080.a: "Ouvrons un canal"
 NAME_PrimalRancher: "Ruuk Qabruuk"
 primal_rancher_desc: "Une xénologiste passionnée par les missions de terrain qui étudie toutes sortes de créatures spatiales."
 primal_rancher_catchphrase: "§L« Chaque créature a une histoire à raconter et je suis là pour l'écouter ! »§!"
 grand_archive.1085.desc: "§HCurieuse et analytique, Ruuk a les yeux rivés sur un petit appareil portable. Même lorsqu'elle nous accueille, elle semble prendre des notes. Malgré tout, son attitude est cordiale et professionnelle, bien qu'un peu distante.§!\n\nJe vois que je ne suis pas la seule à m'intéresser aux créatures spatiales. J'ai étudié les recherches de [root.GetName], elles sont très instructives. J'aimerais beaucoup participer à ces travaux au sein de votre département scientifique. Si vous voulez bien de moi, bien sûr."
 grand_archive.1085.a: "Qui êtes-vous ?"
 grand_archive.1085.a.reply: "Toutes mes excuses, je suis allée un peu vite en besogne.\n\nJe m'appelle Ruuk, chercheuse spécialisée dans l'étude de la faune spatiale. Avec mon équipe, nous recueillons des données sur les schémas de migration, la composition corporelle et la biodiversité à l'échelle galactique.\n\nJ'adore les animaux depuis mon plus jeune âge, et je ne vais nulle part sans Fuluff."
 grand_archive.1085.b: "Qui est Fuluff ?"
 grand_archive.1085.b.reply: "Ma créature préférée de toute la galaxie !\n\nJe vous le montrerais bien à l'écran, mais il est en train de dormir. Sur mon monde natal, nous élevons cette espèce comme animal de compagnie, je l'ai adopté lors de ma dernière visite. Il est vraiment trop mignon. Entendre ses petits sabots trotter sur le sol métallique, la façon dont il mordille mes plumes, la touffe de laine nichée entre ses petits yeux... Je suis sûre qu'il gagnera vos coeurs aussi quand... si nous travaillons ensemble."
 grand_archive.1085.c: "Comment nous avez-vous trouvés ?"
 grand_archive.1085.c.reply: "L'un des spécimens que nous observions avait un comportement anormal, nous avons donc suivi sa trace. C'est alors que nous avons vu votre équipe s'en occuper. Le soin que vous lui avez apporté témoigne d'un véritable respect pour la faune spatiale. Cela m'a poussée à m'intéresser à vos recherches, qui m'ont encore plus impressionnée. Je suis toujours à la recherche de collègues qui partagent les mêmes idéaux que moi."
 grand_archive.1085.d: "Pourquoi voulez-vous nous rejoindre ?"
 grand_archive.1085.d.reply: "Pour être honnête, la recherche scientifique indépendante n'est pas une source de revenus fiable. Je crois en mon travail, mais je passe plus de temps à chercher des financements qu'à faire des recherches.\n\nEn rejoignant [root.GetName], je pourrais consacrer tout mon temps à faire ce que je sais faire de mieux : étudier la faune spatiale. J'aurais accès à beaucoup plus de ressources et je pourrais collaborer avec votre propre équipe scientifique pour atteindre nos objectifs communs."
 grand_archive.1085.hire: "Recruter"
 grand_archive.1085.hire_tt: "§Y$NAME_PrimalRancher$§! va devenir une §Hpersonnalité§! de la §Y[Root.GetName]§!."
 grand_archive.1085.dismiss: "Rejeter"
 grand_archive.1100.name: "Cris bestiaux"
 grand_archive.1100.desc: "Nous avons découvert une énorme quantité d'ondes électromagnétiques étranges provenant d'un endroit de l'espace encore inexploré.\n\nUne première analyse a révélé qu'elles correspondent aux signaux utilisés par les §Yvers du vide§! pour communiquer, bien qu'elles soient plus irrégulières et d'une amplitude beaucoup plus importante. Nous devons étudier cela de plus près."
 grand_archive.1100.a: "C'est inquiétant..."
 grand_archive.1105.name: "Vers du vide hurlants"
 grand_archive.1105.desc: "Nous avons trouvé la source des cris bestiaux : un système caché grouillant de §Yvers du vide§!, à proximité de [frenzied_voidworms_target.solar_system.GetName].\n\nLes vers du vide de ce système ne ressemblent à aucun de ceux que nous avons rencontrés jusqu'à présent. Ils ont subi une mutation. Ils ne forment pas de troïkas et les spécimens adultes sont pris dans une frénésie d'accouplement extrêmement violente.\n\nC'est très inquiétant. Ce comportement non parasitaire suggère que cet essaim peut se reproduire sans hôtes planétaires."
 grand_archive.1105.desc_no_homicidal: "\nSi cette variante des vers du vide se répandait, elle pourrait perturber l'équilibre de l'écosystème galactique. Vu leur agressivité croissante, nous pensons que ces créatures se préparent à attaquer [frenzied_voidworms_target.GetName]."
 grand_archive.1105.desc_2: "\nNous devons renforcer nos défenses."
 grand_archive.1105.a: "Alerte rouge !"
 situation_frenzied_voidworms: "Vers du vide enragés"
 situation_frenzied_voidworms_type: "$situation_frenzied_voidworms$"
 situation_frenzied_voidworms_desc: "Nous avons découvert un énorme essaim de vers du vide mutants. Ils sont extrêmement agressifs et semblent avoir la capacité de se reproduire de manière non parasitaire.\n\nNotre présence paraît les perturber davantage. Nous devons faire preuve de prudence.\n\n[GetVoidwormsHostility]"
 situation_frenzied_voidworms_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_frenzied_voidworms: "Les vers du vide agressifs pourraient attaquer notre capitale."
 approach_frenzied_voidworms_do_nothing: "Ne rien faire"
 approach_frenzied_voidworms_do_nothing_tt: "Nous ne ferons rien."
 approach_frenzied_voidworms_hide_presence: "Cacher notre présence"
 approach_frenzied_voidworms_hide_presence_tt: "Tous les projets de construction dans les systèmes proches de leur système natal seront stoppés."
 approach_frenzied_voidworms_stir_nests: "Provoquer les nids"
 approach_frenzied_voidworms_stir_nests_tt: "Provoquer les créatures augmentera leur hostilité à notre égard."
 approach_frenzied_voidworms_feed_nests: "Nourrir les nids"
 approach_frenzied_voidworms_feed_nests_tt: "Si nous parvenons à réduire suffisamment leur agressivité, nous pourrions gagner leur confiance."
 #Strings for GetVoidwormsHostility trigger loc script
 voidworms_hostility_hostile: "Les vers du vide mutants sont §Ptrès agressifs§!."
 voidworms_hostility_neutral: "Les vers du vide mutants sont §Sagressifs§!."
 voidworms_hostility_pacified: "Les vers du vide mutants sont §Bcalmes§!."
 hide_presence_modifier: "$approach_frenzied_voidworms_hide_presence$"
 hide_presence_starbase_modifier: "$approach_frenzied_voidworms_hide_presence$"
 frenzied_voidworms_killed.desc.common: "Le plus grand nid de vers du vide mutants a été préservé. Il est désormais sous notre contrôle et nous permet d'élever davantage de ces créatures uniques sans risquer qu'elles ne se répandent dans la galaxie de manière incontrôlée."
 grand_archive.1165.name: "Vers du vide mutants exterminés"
 grand_archive.1165.desc.common: "Ne voulant pas attendre leur inévitable attaque, nous avons pris les devants et mené une attaque militaire contre les vers du vide mutants dans leur système natal. Ces créatures ne sont plus un danger pour [frenzied_voidworms_target.GetName]. La sécurité de notre planète"
 grand_archive.1165.desc.default: "$grand_archive.1165.desc.common$ et de l'écosystème galactique a été rétablie.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.desc.homicidal: "$grand_archive.1165.desc.common$ a été rétablie.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.a: "Victoire !"
 grand_archive.1170.name: "Vers du vide mutants éliminés"
 grand_archive.1170.desc.common: "Les vers du vide mutants ont été éliminés. Ces créatures ne sont plus un danger pour [frenzied_voidworms_target.GetName]. La sécurité de notre planète"
 grand_archive.1170.desc.default: "$grand_archive.1170.desc.common$ et de l'écosystème galactique a été rétablie.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.desc.homicidal: "$grand_archive.1170.desc.common$ a été rétablie.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.a: "$grand_archive.1165.a$"
 grand_archive.1180.name: "Découverte de vers du vide mutants"
 grand_archive.1180.desc: "Après avoir éliminé un groupe de vers du vide près de leur nid, nous avons découvert qu'ils avaient subi une mutation unique.\n\nIls semblent avoir été capables de se reproduire de manière non parasitaire et présentaient une agressivité accrue, ce qui expliquerait leur force et leur ténacité contre nature.\n\nHeureusement, nous avons épargné un de leurs nids en guise de trophée. Il est désormais sous notre contrôle et nous permet d'élever davantage de ces créatures uniques sans risquer qu'elles ne se répandent dans la galaxie de manière incontrôlée."
 grand_archive.1180.a: "Inattendu, mais hautement apprécié"
 grand_archive.1185.name: "Vers du vide exterminés"
 grand_archive.1185.desc: "Nous avons appris que les vers du vide mutants qui menaçaient notre colonie ont été éliminés.\n\nUne fin inattendue, mais hautement appréciée. Nous pouvons dormir plus tranquillement en sachant que ces créatures ne menacent plus nos mondes."
 grand_archive.1185.a: "La galaxie est désormais plus sûre"
 grand_archive.1200.name: "Attaque de vers du vide"
 grand_archive.1200.desc: "Les vers du vide enragés attaquent le système de [frenzied_voidworms_target.solar_system.GetName] !\n\nLeur agressivité a atteint son paroxysme et leur essaim principal se dirige droit sur [frenzied_voidworms_target.GetName].\n\nIl est peu probable qu'ils laissent des survivants."
 grand_archive.1200.a: "Renforçons nos défenses"
 grand_archive.1205.name: "Le prix fort"
 grand_archive.1205.desc_common: "Malgré tous nos efforts, les vers du vide mutants ont complètement envahi [this.GetName]. L'attaque des créatures enragées a été si violente que le noyau de la planète a été réduit en miettes. Il n'y a pas de survivants.\n\nLes vers sont depuis retournés dans leurs nids et ne se soucient plus de notre présence. Avec un peu de chance, ils y resteront."
 grand_archive.1205.desc.default: "$grand_archive.1205.desc_common$\n\nFace à cette tragédie, nous n'avons pas d'autre choix que d'aller de l'avant et d'apprendre de nos erreurs."
 grand_archive.1205.desc.gestalt: "$grand_archive.1205.desc_common$\n\nLa perte de notre ruche principale a été un coup dur pour la [event_target:victim_country.GetName], mais nous devons aller de l'avant."
 grand_archive.1205.a: "L'heure est à la reconstruction"
 grand_archive.1210.name: "Vers du vide mutants éliminés"
 grand_archive.1210.desc: "Les vers du vide mutants découverts dans le système de [From.GetName] ont été éliminés, vengeant ainsi la destruction de [avenged_homeworld.GetName].\n\nLe plus grand nid de vers du vide mutants a été préservé. Il est désormais sous notre contrôle et nous permet d'élever davantage de ces créatures uniques sans risquer qu'elles ne se répandent dans la galaxie de manière incontrôlée.\n\nAinsi, l'héritage de notre monde disparu perdurera."
 grand_archive.1210.a: "$grand_archive.1165.a$"
 grand_archive.1220.name: "Vers du vide pacifiés"
 grand_archive.1220.desc.common: "Après avoir envoyé une énorme quantité de nourriture riche en minéraux directement dans leurs nids, nous avons pu établir une sorte de lien avec les vers du vide mutants du système de [frenzied_home_system.GetName]. Ces créatures ne sont plus un danger pour [frenzied_voidworms_target.GetName]. La sécurité de notre planète"
 grand_archive.1220.desc.common_2: "Nos soigneurs les plus expérimentés ont travaillé dur pour apprivoiser ces créatures et ont atteint un stade où elles semblent réceptives à la coopération.\n\nNous avons emporté l'un de leurs plus gros nids. Grâce à lui, nous pourrons élever davantage de ces vers du vide mutants qui, autrement, se seraient multipliés de manière incontrôlée et auraient dévasté la galaxie."
 grand_archive.1220.desc.default: "$grand_archive.1220.desc.common$ et de l'écosystème galactique a été rétablie.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.desc.homicidal: "$grand_archive.1220.desc.common$ a été rétablie.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.a: "Un ajout bienvenu à notre flotte"
 grand_archive.1220.tt: "Nous prenons le contrôle de toutes les flottes de vers du vide enragés"
 grand_archive.7010.name: "Développement des appâts du vide"
 grand_archive.7010.desc.common: "Notre maîtrise des organismes spatiaux a conduit au développement de ce que nous appelons les §Yappâts du vide§!."
 grand_archive.7010.desc: "$grand_archive.7010.desc.common$\n\nCes bâtiments de base stellaire doivent être construits au sein des systèmes dans lesquels les différentes créatures spatiales ont élu domicile. Une fois opérationnels, ils attirent régulièrement la faune spatiale vers la base stellaire.\n\nNous devons toutefois être prudents, car certains types d'organismes pourraient devenir agressifs."
 grand_archive.7010.desc.primal_calling: "$grand_archive.7010.desc.common$\n\nCes appareils envoient des signaux dans l'immensité de l'espace afin d'attirer les organismes qui peuplent le vide. Nous ne savons pas ce que nous attirons exactement, mais nous recevons une réponse régulière et similaire aux fréquences que nous émettons actuellement.\n\nQuelque chose se dirige vers nous."
 grand_archive.7020.name: "Chant des baleines"
 grand_archive.7020.desc: "L'§Yappât du vide§! que nous avons mis au point a attiré un groupe de baleines spatiales qui vivent dans les systèmes de §Ygéantes gazeuses§! tels que [This.Capital.System.GetName].\n\nIl semble que nos appareils doivent être construits dans des systèmes indigènes à l'organisme concerné pour fonctionner correctement. Si nous découvrons d'autres types de créatures spatiales, nous devrions être en mesure d'installer des appâts du vide à proximité de leur habitat naturel."
 ### Treasure Hunters
 origin_treasure_hunters: "Chasseurs de trésors"
 origin_treasure_hunters_desc: "Cette civilisation en quête d'aventure est prête à partir pour son expédition la plus grande et la plus difficile. Avec pour seul bagage une mystérieuse carte, ils voyagent à travers la galaxie à la recherche du légendaire trésor des pirates."
 origin_tooltip_treasure_hunters_effects: "- Commence la partie avec une ['r_celestial_chart_0_desc',carte des étoiles] inactive\n- Toutes les personnalités recrutées ont le trait bonus ['concept_adventurous_spirit_trait'].$NEW_LINE$- Traits du dirigeant :$TABBED_NEW_LINE$- ['leader_trait:leader_trait_buccaneer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_trailblazer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_treasure_hoarder']"
 START_SCREEN_TREASURE_HUNTERS: "Notre civilisation se définit par sa soif d'aventure.\n\nLa découverte de trésors perdus, l'exploration de ruines anciennes, l'exhumation d'artefacts d'époques lointaines... Voilà autant d'événements qui constituent nos histoires les plus célèbres et inspirent notre société depuis des générations.\n\nEst-ce le hasard ou le destin qui, lors de notre première incursion dans l'espace, a éveillé en nous un esprit d'aventure ? Une mystérieuse capsule d'origine inconnue a été découverte en orbite autour de notre planète. Elle contenait une carte des étoiles cryptée.\n\nAprès des années de travail acharné, nous disposons aujourd'hui de la technologie nécessaire pour la décrypter et tracer une route vers l'inconnu. Alors que nous mettons le cap sur les frontières de la galaxie, nous sommes déterminés à nous lancer dans notre expédition la plus grande et la plus audacieuse à ce jour."
 d_treasure_planet: "Chambre aux trésors"
 d_treasure_planet_desc: "Un lieu sécurisé où les objets de valeur peuvent être organisés, restaurés et conservés."
 concept_treasure_vault: "$d_treasure_planet$"
 concept_treasure_vault_desc: "$d_treasure_planet_desc$"
 job_treasure_gatherer: "Conservateurs de trésors"
 job_treasure_gatherer_plural: "Conservateurs de trésors"
 job_treasure_gatherer_desc: "Les conservateurs de trésors sont formés pour évaluer toutes sortes d'objets rares et précieux trouvés dans la galaxie."
