 NAME_Cutholoids_Juvenile: "$cutholoids_juvenile$"
 NAME_Cutholoids: "$cutholoids$"
 NAME_Reanimated_Cutholoids_Hatchling: "$cutholoids_hatchling$ réanimé"
 NAME_Reanimated_Cutholoids_Juvenile: "$cutholoids_juvenile$ réanimé"
 NAME_Reanimated_Cutholoids: "$cutholoids$ réanimé"
 pc_cutholoid: "$pc_asteroid$"
 pc_cutholoid_desc: "$pc_asteroid_desc$"
 resolution_cutholoid_eradication: "Éradication des cutholoïdes"
 resolution_cutholoid_eradication_desc: "Les cutholoïdes dévoreurs de vaisseaux ne devraient pas être autorisés à exister dans les systèmes civilisés. Ces créatures doivent être éradiquées, quel qu'en soit le prix."
 resolution_cutholoid_eradication_tooltip: "Tout empire ayant des §Ycutholoïdes§! à l'intérieur de son espace se trouverait de fait §Renfreindre§! les lois galactiques jusqu'à ce que les créatures soient détruites."
 resolution_repeal_cutholoid_eradication: "§RAbrogation de l'éradication des cutholoïdes§!"
 resolution_repeal_cutholoid_eradication_desc: "[global_event_country.GetLeLaLCommGalEmpGalCap][global_event_country.GetGalCommunityOrGalImperium] n'existe pas dans le but de prôner l'éradication des cutholoïdes."
 resolution_repeal_cutholoid_eradication_effect_success: "Abroge l'§Yéradication des cutholoïdes§!."
 fcsum_cutholoids_1: "$fcsum_critters_1$"
 further_fc_cutholoids_completed: "$further_fc_amoebas_completed$"
 grand_archive.3103.name: "$resolution_cutholoid_eradication$"
 grand_archive.3103.desc: "[global_event_country.GetLeLaLCommGalEmpGalCap][global_event_country.GetGalCommunityOrGalImperium] a déclaré que les cutholoïdes ne doivent plus exister au sein des systèmes membres.\n\nDe ce fait, [Root.GetName] sera considérée comme §Renfreignant§! les lois galactiques jusqu'à ce qu'ils soient éliminés."
 grand_archive.3105.name: "Des cutholoïdes dans notre espace"
 grand_archive.3105.desc: "Un cutholoïde a été découvert dans le système de [from.GetName]. Cette espèce a été officiellement reconnue comme dangereuse, aussi tous les membres [global_event_country.GetDuDelaDelCommGalEmpGal][global_event_country.GetGalCommunityOrGalImperium] se trouvent-ils légalement contraints de le détruire.\n\nLa [Root.GetName] sera considérée comme §Renfreignant§! les lois galactiques jusqu'à ce que le cutholoïde ait été exterminé ou expulsé de nos systèmes."
 grand_archive.3107.desc: "La présence d'un cutholoïde dans le système de [invaded_system.GetName] est considérée comme une §Rviolation importante des lois galactiques§! de par la résolution $resolution_cutholoid_eradication$. Cela a conduit [global_event_country.GetLeLaLCommGalEmpGal][global_event_country.GetGalCommunityOrGalImperium] à autoriser ses membres à prendre des sanctions contre la [Root.GetName]."
 grand_archive.3011.name: "Disparition d'un vaisseau scientifique"
 grand_archive.3011.desc: "Nous avons perdu le contact avec l'un de nos vaisseaux scientifiques qui étudiait un étrange astéroïde dans le système de [cutholoid_under_radar.solar_system.GetName].\n\nNos capteurs reçoivent un faible signal de détresse en provenance de son dernier emplacement connu. Nous devons poursuivre nos recherches pour le retrouver."
 grand_archive.3011.a: "En voilà une mauvaise nouvelle"
 grand_archive.3012.name: "Découverte d'une entité astéroïdale"
 grand_archive.3012.desc: "Nous avons découvert un autre spécimen de ces étranges créatures astéroïdales lors d'une exploration de routine dans le système de §H[from.solar_system.GetName]§!.\n\nNous devrions éviter d'envoyer des §Hvaisseaux scientifiques§! dans ce système jusqu'à ce que nous en sachions plus sur ces dangereux objets."
 grand_archive.3012.a: "Poursuivons donc nos investigations"
 grand_archive.3016.name: "Une mauvaise surprise"
 grand_archive.3016.desc.default: "L'astéroïde du système de [fromfrom.GetName] ne servait que d'enveloppe à l'énorme organisme qui vivait à l'intérieur.\n\nNous avons réussi à le détruire et à récupérer le [this.GetName]. À l'avenir, nous devrons être plus prudents lorsque nous examinerons des astéroïdes.\n\nPeut-être que d'autres de ces créatures se cachent là-bas, attendant l'approche d'une proie facile."
 grand_archive.3016.desc.leader_killed: "$grand_archive.3016.desc.default$ Malheureusement, [leader.GetName] a subi des dommages irréparables."
 grand_archive.3018.name: "Du ventre de la bête"
 grand_archive.3018.desc: "Notre vaisseau scientifique qui avait disparu dans le système de §H[current_system.GetName]§! est réapparu !\n\n§H[leader.GetName]§! rapporte qu'ils ont été engloutis par une créature spatiale qui se trouvait à l'intérieur d'un astéroïde et que la coque du vaisseau était sur le point de céder lorsqu'ils ont été catapultés de manière inattendue. Apparemment, quelqu'un ou quelque chose a surpris la créature avant que nous ne puissions intervenir.\n\nNous devrions redoubler de vigilance lors de l'exploration de certaines ceintures d'astéroïdes jusqu'à ce que nous en sachions plus sur ces créatures."
 grand_archive.3018.a: "C'est une bonne nouvelle"
 grand_archive.3020.name: "Vaisseau scientifique perdu"
 grand_archive.3020.desc: "Le signal de détresse du vaisseau scientifique a été interrompu. Nous ne pouvons que supposer que le [from.GetName] a été perdu à jamais."
 alert_mia_fleet_eaten_title: "$alert_mia_title$"
 alert_mia_fleet_eaten_instant: "Nous avons perdu le contact avec l'un de nos vaisseaux scientifiques qui étudiait un astéroïde. Nos capteurs reçoivent un faible signal de détresse en provenance de son dernier emplacement connu."
 cutholoid_discovered_chain_title: "Récupération du [this.GetName]"
 cutholoid_discovered_chain_desc: "Nous avons perdu le contact avec notre vaisseau scientifique [this.GetName] dans le système de [cutholoid_under_radar.solar_system.GetName].\n\nSa dernière transmission indiquait que l'équipage allait étudier un astéroïde du nom de [cutholoid_under_radar.GetName].\n\nPrudence est de mise en entrant dans le système."
 HIDDEN_CUTHOLOID_ATTACK_PROJECT: "Détruire l'astéroïde"
 HIDDEN_CUTHOLOID_ATTACK_PROJECT_DESC: "L'astéroïde [cutholoid_under_radar.GetName] n'est pas ce qu'il semble être. Nous devrions nous en approcher avec une flotte militaire importante si nous voulons récupérer notre vaisseau scientifique, le [this.GetName], avant qu'il ne soit trop tard."
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT: "Capturer l'astéroïde"
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT_DESC: "L'astéroïde [cutholoid_under_radar.GetName] n'est pas ce qu'il semble être. Avec la technologie adéquate, nous pourrions le capturer et ainsi récupérer notre vaisseau scientifique, le [this.GetName], avant qu'il ne soit trop tard."
 grand_archive.2800.name: "Faux astéroïde"
 grand_archive.2800.desc: "L'étrange astéroïde que nous avons découvert dans le système de §H[This.System.GetName]§! semble être doté de conscience. Il est extrêmement dangereux de se placer en orbite autour de tels objets, aussi les vaisseaux scientifiques ont-ils reçu l'ordre de quitter immédiatement les systèmes concernés jusqu'à ce que nous en sachions plus sur ces êtres."
 grand_archive.2800.a: "Poursuivons donc nos investigations"
 grand_archive.2900.name: "Les cutholoïdes"
 grand_archive.2900.desc: "Nous avons découvert l'existence d'organismes spatiaux qui se réfugient à l'intérieur des astéroïdes. Ces créatures, que nous appelons §Hcutholoïdes§!, sont des chasseurs capables de rester cachés pendant plusieurs années afin de tendre des embuscades à leurs proies. Ils peuvent engloutir des vaisseaux entiers, aussi devons-nous faire preuve d'extrême prudence en nous approchant de ceintures d'astéroïdes non reconnues.\n\nHeureusement, il ne semble pas y en avoir beaucoup ; leur reproduction asexuée peut prendre des centaines d'années."
 grand_archive.2900.a: "Nous devrions les étudier de plus près"
 grand_archive.2900.b: "Des chasseurs sournois qui méritent d'être anéantis !"
 grand_archive.2900.b.homicidal: "Des prédateurs devenus proies"
 grand_archive.2905.name: "Coquille des cutholoïdes"
 grand_archive.2905.desc: "Composée de minéraux, la coquille des cutholoïdes est également renforcée par de solides fibres biologiques. Celles-ci ne cessent jamais de croître et nous estimons que certaines carapaces sont composées de plus de 50% de biomasse.\n\nLorsqu'un cutholoïde devient trop grand pour son astéroïde, il cherche une nouvelle maison et recommence le processus d'intégration. Bien qu'ils soient extrêmement territoriaux, plusieurs cutholoïdes ont été observés en orbite autour d'une coquille de choix. Le plus grand d'entre eux s'en empare alors, et les autres se rangent par taille et continuent d'échanger leur maison. Par conséquent, les astéroïdes qu'ils habitent ont souvent été occupés par des dizaines d'autres cutholoïdes.\n\nCe sont donc les astéroïdes les plus petits qui présentent la plus grande proportion de masse biologique, car ce sont eux qui changent le plus souvent de propriétaire. Ces échantillons ont une grande valeur scientifique."
 grand_archive.2905.a: "Améliorons notre faune spatiale"
 grand_archive.2905.b: "Renforçons nos vaisseaux"
 cutholoids_hunting_buff: "Chasseur de cutholoïdes"
 cutholoids_hunting_buff_desc: "Les coquilles riches en minéraux des cutholoïdes sont récupérées après les combats, rapportant ainsi §G$@cutholoids_hunting_buff_mineral_reward|0$§!£minerals£ pour chaque groupe détruit."
 grand_archive.2900.b.cutholoidhunt: "§G+$@cutholoids_hunting_buff_mineral_reward|0$§!£minerals£ par flotte de cutholoïdes détruite"
 mod_damage_vs_country_type_cutholoids_mult: "Dégâts infligés aux cutholoïdes "
 RESEARCH_CUTHOLOIDS_PROJECT: "Recherches sur les cutholoïdes"
 RESEARCH_CUTHOLOIDS_PROJECT_DESC: "La coquille astéroïdale des cutholoïdes est un chef-d'oeuvre d'ingénierie biologique. Nous avons encore beaucoup à apprendre d'eux."
 cutholoid_debris_01_object: "Restes de cutholoïde"
 CUTHOLOID_DEBRIS_PROJECT: "$cutholoid_debris_01_object$"
 CUTHOLOID_DEBRIS_PROJECT_DESC: "Nous avons détruit une énorme créature qui se cachait dans un astéroïde. Ses restes pourraient s'avérer très utiles pour nous."
 cutholoids_section: "Cutholoïde"
 ENGULF_COMPONENT: "Gueule dévoreuse"
