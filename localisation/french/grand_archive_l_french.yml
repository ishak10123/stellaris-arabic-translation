 grand_archive.10010.name: "Projet de mutation des amibes spatiales terminé"
 grand_archive.10010.desc: "Notre projet de mutation expérimental pour les §Yamibes spatiales§! est terminé et a produit de nouveaux organites intéressants : des §Ysangsues§!.\n\nCes organismes symbiotiques sont capables d'extraire l'énergie des objets à proximité et de la restituer à leur hôte, ce qui améliore leur capacité de survie et de régénération."
 grand_archive.10015.name: "Projet de mutation des tiyanki terminé"
 grand_archive.10015.desc: "Notre projet de mutation expérimental pour les §Ytiyanki§! est terminé et a apporté de nouvelles améliorations intéressantes : les §Yaccords de chant pastoral§!.\n\nNous avons amplifié au maximum viable les vibrations naturelles que ces créatures utilisent pour communiquer au sein de leurs bancs. Ce faisant, elles produisent un champ contrôlable qui renforce les tissus des créatures à proximité."
 grand_archive.10020.name: "Projet de mutation des vers du vide terminé"
 grand_archive.10020.desc: "Notre projet de mutation expérimental pour les §Yvers du vide§! est terminé et a produit quelques variations intéressantes dans leurs cycles de reproduction : les §Ykystes virulents§!.\n\nNous avons réussi à augmenter la fertilité des kystes parasitaires avec lesquels ces créatures bombardent leurs planètes hôtes. Il en résulte une quantité nettement plus élevée de nouvelles nymphes."
 grand_archive.10025.name: "Projet de mutation des cutholoïdes terminé"
 grand_archive.10025.desc: "Notre projet de mutation expérimental pour les §Ycutholoïdes§! est terminé et a donné des résultats intéressants : la §Yfontaine gastrique§!.\n\nNous avons trouvé un moyen de modifier leur énorme système digestif afin qu'ils puissent tirer des projectiles à grande vitesse et longue portée. Malheureusement, cette modification biologique implique qu'ils ne sont plus en mesure d'engloutir les flottes ennemies."
 grand_archive.10030.name: "Projet de mutation des entités cristallines terminé"
 grand_archive.10030.desc: "Notre projet de mutation expérimental pour les §Yentités cristallines§! est terminé et a donné des résultats intéressants : les §Ynoyaux fissibles§!\n\nGrâce à cette modification de leur génétique cristalline, chaque spécimen est capable de se scinder en deux organismes indépendants en cas de traumatisme grave. Cela devrait augmenter considérablement leur force de combat."
 grand_archive.10030.a: "$FASCINATING$"
 leviathan_unique_mutation_project_unlock_name: "Projet de mutation de [FromFromFrom.GetShipSizeName]"
 leviathan_unique_mutation_project_unlock_desc: "Nous avons récupéré le matériel génétique du spécimen [FromFromFrom.GetShipSizeName] que nous avons croisé dans le système de [FromFrom.solar_system.GetName].\n\nBien que nous ne disposions pas des connaissances nécessaires pour cloner une telle créature, cela nous permet d'obtenir des informations précieuses sur sa biologie unique."
 grand_archive.10055.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10055.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10060.name: "Projet de mutation des matriarches tiyanki terminé"
 grand_archive.10060.desc: "Notre projet de mutation expérimental des matriarches tiyanki est terminé et a donné des résultats intéressants : les §Henzymes réparatrices§!.\n\nLes enzymes réparatrices présentes dans leur matériel génétique peuvent être reproduites dans les glandes d'autres créatures. Cela confère à leur tissu structurel des propriétés régénératrices qui seraient particulièrement utiles dans des formations étroites en cas d'explosion."
 grand_archive.10075.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10075.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10080.name: "Projet de mutation de l'être du vide terminé"
 grand_archive.10080.desc: "Notre projet de mutation expérimental de l'être du vide est terminé et a permis de faire une découverte intéressante : la §Hbiologie des créatures stellaires§!.\n\nLes tissus de ces créatures réagissent fortement à la lumière des étoiles et peuvent être implantés dans d'autres organismes. Le processus nécessite une petite quantité d'énergie, mais améliore considérablement leur taux de croissance à proximité des étoiles les plus brillantes."
