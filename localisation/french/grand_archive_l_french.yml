 space_amoeba_UNIQUE_MUTATION_PROJECT: "Projet de mutation des amibes spatiales"
 space_amoeba_UNIQUE_MUTATION_PROJECT_DESC: "Lors de nos manoeuvres d'entraînement pour les organismes fraîchement clonés, une amibe spatiale blessée a utilisé une technique inédite pour vaincre son adversaire. Ses flagelles ont aspiré les nutriments et matériaux de son partenaire d'entraînement et les ont utilisés pour réparer les trous dans sa propre armure et restaurer sa force.\n\nUne étude plus approfondie de ce phénomène pourrait nous révéler de nouveaux éléments sur la biologie des amibes spatiales, qui pourraient être utilisés pour développer une nouvelle mutation exclusive à l'espèce."
 tiyanki_UNIQUE_MUTATION_PROJECT: "Projet de mutation des tiyanki"
 tiyanki_UNIQUE_MUTATION_PROJECT_DESC: "Des tiyanki récemment clonés ont été observés en train de communiquer entre eux en émettant une série de sons complexes. À peine perceptibles, ils semblent apporter calme et sérénité aux créatures à proximité.\n\nUne étude plus approfondie de ce phénomène pourrait nous révéler de nouveaux éléments sur la biologie des tiyanki, qui pourraient être utilisés pour développer une nouvelle mutation exclusive à l'espèce."
 voidworm_UNIQUE_MUTATION_PROJECT: "Projet de mutation des vers du vide"
 voidworm_UNIQUE_MUTATION_PROJECT_DESC: "Nous avons remarqué que certains de nos vers du vide développent de petites excroissances lorsqu'ils atteignent l'âge adulte. Un examen plus poussé a révélé que les spécimens présentant ces protubérances disgracieuses sont plus fertiles que leurs congénères.\n\nUne étude plus approfondie de ce phénomène pourrait nous révéler de nouveaux éléments sur la biologie des vers du vide, qui pourraient être utilisés pour développer une nouvelle mutation exclusive à l'espèce."
 cutholoid_UNIQUE_MUTATION_PROJECT: "Projet de mutation des cutholoïdes"
 cutholoid_UNIQUE_MUTATION_PROJECT_DESC: "Suite à une suralimentation, l'un de nos cutholoïdes clonés a été observé en train d'expulser le contenu de son estomac. Les fluides digestifs expulsés formaient un projectile très concentré extrêmement mortel et ont conservé leurs propriétés radioactives longtemps après avoir quitté le corps de la créature.\n\nUne étude plus approfondie de ce phénomène pourrait nous révéler de nouveaux éléments sur la biologie des cutholoïdes, qui pourraient être utilisés pour développer une nouvelle mutation exclusive à l'espèce."
 crystalline_entity_UNIQUE_MUTATION_PROJECT: "Projet de mutation des entités cristallines"
 crystalline_entity_UNIQUE_MUTATION_PROJECT_DESC: "Lors d'un exercice de combat, certaines de nos entités cristallines se sont parfaitement scindées en deux après avoir été détruites. Ces fragments tout à fait fonctionnels sont restés en vie pendant une courte période."
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT: "Projet de mutation des matriarches tiyanki"
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT_DESC: "Le matériel génétique que nous avons obtenu d'une matriarche tiyanki nous a fourni des informations uniques qui nous permettront de réaliser un projet de mutation expérimental adapté à tout type de créature spatiale."
 voidspawn_UNIQUE_MUTATION_PROJECT: "Projet de mutation de l'être du vide"
 voidspawn_UNIQUE_MUTATION_PROJECT_DESC: "Le matériel génétique que nous avons obtenu de l'être du vide nous a fourni des informations uniques qui nous permettront de réaliser un projet de mutation expérimental adapté à tout type de créature spatiale."
 unique_mutation_project_unlock_desc: "Nos tentatives de clonage de créatures de type [From.GetShipCategoryName] ont permis de réaliser des avancées en matière de génétique. En combinant l'anatomie de ces créatures et notre expertise en manipulation génétique, nous devrions pouvoir créer une mutation unique."
