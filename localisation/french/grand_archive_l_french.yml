 grand_archive.4105.desc.common.aesthetic_wonder: "Les [GetCuratorsDesignation] ont remarqué vos efforts dans la collecte et la préservation de spécimens considérés comme des §Ymerveilles esthétiques§!. La beauté est présente partout dans notre galaxie, si l'on y regarde de plus près."
 grand_archive.4105.desc.common.historical_item: "Les [GetCuratorsDesignation] ont remarqué vos efforts dans la collecte et la préservation d'artefacts de l'§Yhistoire galactique§!. Vous accordez un don d'immortalité à ceux dont vous conservez les objets."
