 grand_archive.2000.name: "Une multitude de voix"
 grand_archive.2000.desc: "Nos capteurs ont détecté quelque chose qui envoie des signaux rudimentaires à travers la galaxie depuis le système de [This.System.GetName]. Des signaux similaires ont été enregistrés par des capteurs à longue portée dirigés vers une zone de l'espace qui nous est inconnue. Nous ignorons si ces signaux sont intentionnels ou non. Une étude plus approfondie est nécessaire."
 grand_archive.2000.a: "Renseignons-nous"
 fcsum_voidworms_2: "Les §H[This.ContactCountry.GetName]§! ont été identifiés comme des parasites galactiques du nom de « vers du vide »."
 grand_archive.2005.name: "$NAME_Voidworms$"
 grand_archive.2005.desc: "Nous avons découvert que les signaux lointains proviennent d'un organisme spatial que nous avons appelé §H« ver du vide »§!. La galaxie semble regorger de ces créatures. Nous avons déduit des différentes longueurs d'onde des signaux que ces êtres passent par divers stades de croissance avant d'atteindre l'âge adulte. Bien qu'ils ne semblent pas agressifs en apparence, leurs modèles de communication indiquent qu'ils peuvent se coordonner à l'échelle galactique."
 grand_archive.2005.a.homicidal: "Des bêtes stupides qui doivent être abattues"
 grand_archive.2015.name: "Enzymes de ver du vide"
 grand_archive.2015.desc: "Les vers du vide s'accouplent par groupes de trois, appelés « troïkas ». Grâce à leur rituel d'accouplement éternel, ces créatures s'unissent pour la vie. Elles ont toutefois besoin d'un hôte biologique externe pour engendrer une descendance.\n\nCe sont des parasites.\n\nDès qu'un ver atteint l'âge adulte, il développe un amas de kystes sur ses organes reproducteurs. Ces kystes servent de protection et contiennent des gamètes hautement corrosifs qui, s'ils entrent en contact avec les gamètes d'un autre ver du troïka, peuvent être envoyés vers des planètes à la biomasse appropriée pour donner naissance à de nouvelles nymphes. Leurs hôtes ne survivent pas à ce processus. Tout porte à croire que les vers du vide coordonnent leurs bombardements de manière à conserver un nombre durable d'hôtes viables dans toute la galaxie.\n\nNous pensons pouvoir utiliser ces enzymes de reproduction à notre propre avantage. Nous pourrions aussi développer une immunité contre leurs mécanismes de reproduction."
 grand_archive.2015.a: "Utilisons leur fertilité à nos propres fins"
 grand_archive.2015.b: "C'est répugnant, trouvons un remède"
