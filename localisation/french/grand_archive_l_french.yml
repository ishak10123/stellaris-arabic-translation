 AUTOMATION_SEND_GRAVITY_SNARES_ENABLED: "$AUTOMATION_SEND_GRAVITY_SNARES$ £trigger_yes£"
 AUTOMATION_SEND_GRAVITY_SNARES: "Capturer des créatures spatiales"
 ################
 #Technologies #
 ################
 tech_galactic_archivism: "Archivage galactique"
 tech_galactic_archivism_desc: "Pour que nous puissions apprendre de ceux qui nous ont précédés, l'histoire de notre galaxie doit être préservée. D'immenses archives répondraient à cet objectif."
 tech_gravity_wells: "Pièges à gravité"
 tech_gravity_wells_desc: "Nous pourrions utiliser des concentrations localisées de masse quantique pour faire apparaître de courts puits de gravité. Manipulée correctement, cette force gravitationnelle pourrait, en théorie, capturer des créatures de toutes tailles sans leur faire de mal."
 tech_containment_vessel: "Protocoles de confinement de Conservateur"
 tech_containment_vessel_desc: "Les pièges à gravité capturent deux fois plus de §Ycréatures spatiales§!."
 TECH_UNLOCK_CONTAINMENT_VESSEL_TITLE: "$TECH_UNLOCK_COMPONENT_LINE$ $tech_containment_vessel$"
 TECH_UNLOCK_CONTAINMENT_VESSEL_DESC: "$tech_containment_vessel_desc$"
 tech_asteroidal_carapace: "Coquille astéroïdale"
 tech_asteroidal_carapace_desc: "Composée de minéraux, la coquille des cutholoïdes est également renforcée par de solides fibres biologiques. Nous pouvons synthétiser ce procédé à l'aide de techniques de métallurgie avancées."
 ASTEROIDAL_CARAPACE_ARMOR: "$tech_asteroidal_carapace$"
 ASTEROIDAL_CARAPACE_ARMOR_DESC: "$tech_asteroidal_carapace_desc$"
 tech_gravity_snare_capacity_desc: "Augmente le nombre de §Ycréatures spatiales§! capturées par les pièges à gravité de §G1§!."
 tech_gravity_snare_capacity_1: "Amélioration des microsingularités"
 tech_gravity_snare_capacity_1_desc: "$tech_gravity_snare_capacity_desc$"
 tech_gravity_snare_capacity_2: "Optimisation de la manipulation gravitationnelle"
 tech_gravity_snare_capacity_2_desc: "$tech_gravity_snare_capacity_desc$"
 tech_gravity_snare_capacity_3: "Amélioration du système de confinement"
 tech_gravity_snare_capacity_3_desc: "$tech_gravity_snare_capacity_desc$"
 gateway_snare_capacity: "Capacité des pièges à gravité"
 gateway_gravity_snare_capacity: "§HCheminement de la capacité des pièges à gravité§!\n§ECette technologie va permettre des avancées majeures en termes de capacité de capture des pièges à gravité.§!"
 tech_alien_cloning: "Reproduction artificielle"
 tech_alien_cloning_beastmasters: "$tech_alien_cloning$"
 tech_alien_cloning_desc: "Dans un environnement strictement contrôlé, nous pouvons incuber le £genetic_material£matériel génétique recueilli sur les créatures spatiales abattues pour faire naître de nouveaux individus de chaque espèce à notre guise."
 feature_alien_cloning_unlocked: "Politiques : §Y$policy_space_fauna_growth$§!"
 feature_alien_cloning_unlocked_desc: "$policy_space_fauna_growth_desc$"
 tech_alien_cloning_tt: "§HPermet§! le clonage de créatures spatiales de la taille d'une corvette"
 tech_improved_incubators: "Incubateurs améliorés"
 tech_improved_incubators_beastmasters: "$tech_improved_incubators$"
 tech_improved_incubators_desc: "Nous pouvons améliorer les méthodes de croissance artificielle mises en place dans nos écloseries afin d'accélérer les premiers stades de développement et de créer des clones plus développés."
 tech_improved_incubators_tt: "§HPermet§! le clonage de créatures spatiales de la taille d'un destroyer"
 tech_improved_incubators_tt_desc: "Les écloseries peuvent désormais cloner des spécimens de §Yfaune spatiale§! plus grands, de taille comparable à celle des destroyers traditionnels."
 tech_metabolic_gases: "Gaz métaboliques"
 tech_metabolic_gases_beastmasters: "$tech_metabolic_gases$"
 tech_metabolic_gases_desc: "L'amélioration des gaz métaboliques dans nos écloseries permettra de développer davantage chaque spécimen avant qu'il ne vienne au monde."
 tech_metabolic_gases_tt: "§HPermet§! le clonage de créatures spatiales de la taille d'un cuirassé"
 tech_metabolic_gases_tt_desc: "Les écloseries peuvent désormais cloner des créatures spatiales de tout stade de développement ou de toute taille."
 BOARDING_CABLES: "Câbles d'abordage"
 BOARDING_CABLES_MODULES: "$BOARDING_CABLES$"
 BOARDING_CABLES_TOOLTIP: "Octroie une petite chance de voler un vaisseau ennemi ou de capturer un commandant ennemi contre une rançon."
 BOARDING_CABLES_DESC: "$BOARDING_CABLES_TOOLTIP$"
 tech_boarding_cables: "$BOARDING_CABLES$"
 tech_boarding_cables_desc: "Artillerie de petit calibre reconvertie pour tirer des crochets perforants attachés à des câbles en fibre de carbone, parfaits pour neutraliser et aborder des vaisseaux ennemis."
 tech_controlled_mutations: "Mutations contrôlées"
 tech_controlled_mutations_desc: "Nous pouvons accroître l'efficacité de nos vaisseaux de faune spatiale en modifiant leur génome et en intégrant des technologies artificielles dans leur biomasse."
 tech_controlled_mutations_2: "Mutations contrôlées avancées"
 tech_controlled_mutations_2_desc: "Nous pouvons aller plus loin. Les dernières méthodes de manipulation de la génétique de la faune spatiale nous permettent d'intégrer une palette beaucoup plus large de composants spéciaux."
