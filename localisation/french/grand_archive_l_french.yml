 leader_trait_pirate_queen: "Reine des pirates"
 leader_trait_pirate_queen_desc: "Des années de piraterie et d'exploits extraordinaires ont donné naissance à une cheffe qui ne se contente jamais de moins que ce qui était prévu au départ."
 captain_ness_leader_desc: "La conscience d'une ancienne reine pirate sous forme mécanique. Elle a dispersé des trésors sur une multitude de mondes."
 captain_ness_leader_catch_phrase: "Bâtissons ensemble un héritage."
