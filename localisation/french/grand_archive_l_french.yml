 ####################
 tech_refit_standards_beastmasters: "Optimisation des écloseries"
 tech_refit_standards_beastmasters_desc: "L'optimisation du processus de clonage de la faune spatiale permettra de gagner en efficacité."
 tech_small_space_fauna_hull_1: "Tissus des petites créatures spatiales améliorés"
