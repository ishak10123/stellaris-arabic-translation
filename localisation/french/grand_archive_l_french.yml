 grand_archive.2053.name: "Vers du vide éradiqués"
 grand_archive.2053.desc: "Les derniers systèmes natals des vers du vide ont été détruits, exterminant ainsi leur espèce.\n\nNous n'avons plus à nous inquiéter de leurs bombardements parasitaires."
 grand_archive.2054.name: "Destruction d'un foyer de vers du vide"
 grand_archive.2054.desc: "Nous avons détruit un système natal des vers du vide.\n\nIls ne pourront plus l'utiliser pour mettre leurs petits au monde."
 voidworm_scaling: "Évolution des vers du vide"
 voidworm_scaling_difficulty_civilian: "$voidworm_scaling$"
 voidworm_scaling_difficulty_cadet: "$voidworm_scaling$"
 voidworms_crisis_growth_modifier: "Accélération de la crise des vers du vide"
 voidworms_at_home_modifier: "Bonus (vers du vide)"
