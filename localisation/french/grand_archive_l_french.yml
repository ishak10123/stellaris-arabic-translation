 untamed_wilds: "Terres sauvages"
 untamed_wilds_desc: "Vastes étendues protégées où la faune et la flore sauvages prospèrent, assurant un approvisionnement durable en créatures indigènes."
 grand_archive.1010.desc: "Notre colonie sur [Root.GetName] a appris à respecter les limites territoriales des §Yformes de vie titanesques§! indigènes.\n\nCes énormes créatures seront un atout permanent à mesure que nous étendrons nos frontières et développerons le territoire."
