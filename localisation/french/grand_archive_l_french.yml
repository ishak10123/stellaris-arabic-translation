 crystalline_entity_plural: "Entités cristallines"
 grand_archive.1002.name: "La vie dans les étoiles"
 grand_archive.1002.desc.default: "Le vide grouille de vie. Nous avons découvert l'existence des [from.GetSpaceFaunaNamePlural], mais qu'y a-t-il d'autre ?\n\nLa relation étroite que nous entretenons avec la faune de [capital_scope.GetName] ne peut peut-être pas être appliquée à l'échelle galactique. Le vide spatial constitue un tout nouvel écosystème, et nous nous trouvons à la croisée des chemins.\n\nQue représentent ces créatures pour nous ?\n\nQuel que soit notre choix, les conséquences se feront sentir pendant de nombreuses années."
 grand_archive.1002.desc.homicidal: "Il se pourrait que le vide grouille de vie ; il nous appartient de l'éteindre ou de l'utiliser. Maintenant que nous avons découvert l'existence des [from.GetSpaceFaunaNamePlural], nous sommes avides de trouver d'autres espèces. Proies fraîches ou bêtes de somme, le choix nous revient."
