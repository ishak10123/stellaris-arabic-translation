 #Homicidal considerations #
 #Fanatic Purifiers
 grand_archive.4135.name: "Bibelots d'êtres inférieurs"
 grand_archive.4135.desc: "Notre collection de trophées de la catégorie [GetCollectionRewardCategory] ne cesse de s'agrandir au fur et à mesure que nous purifions ce monde de la vermine xéno.\n\nPuissent ces pièces servir de leçon à cette galaxie infestée et continuer à nous inspirer dans notre mission."
 grand_archive.4135.desc.geology: "$grand_archive.4135.desc$"
 grand_archive.4135.desc.aesthetic: "$grand_archive.4135.desc$"
 grand_archive.4135.a: "Pour la [this.GetName] !"
 grand_archive.4140.name: "Accumulation de babioles"
 grand_archive.4140.desc.geology: "Nous continuons de rassembler des objets de la catégorie [GetCollectionRewardCategory] ; des babioles et autres curiosités de cette immonde galaxie.\n\nPrenons un moment pour admirer nos trophées... sans oublier qu'il y a encore bien d'autres choses à découvrir."
 grand_archive.4140.desc.aesthetic: "Nous continuons de rassembler des objets de la catégorie [GetCollectionRewardCategory] ; des colifichets et autres vestiges de cette contamination léguée par des formes de vie inférieures.\n\nUne fois que toutes ces saletés de xénos auront été éliminées, ces objets nous rappelleront leur nature inférieure."
 grand_archive.4140.a: "La galaxie doit être purifiée"
 grand_archive.4145.name: "Armoire à trophées complète"
 grand_archive.4145.desc.geology: "Notre réserve est pleine d'objets divers et variés de la catégorie [GetCollectionRewardCategory] ; la chair en décomposition de la galaxie.\n\nPour nous, cette vaste collection est un registre de tout ce que nous avons déjà détruit. Que tout le monde contemple nos triomphes !"
 grand_archive.4145.desc.aesthetic: "Notre réserve est pleine de curiosités de la catégorie [GetCollectionRewardCategory] ; une véritable profusion d'ornements xénos inutiles.\n\nNous contemplons cette vaste collection et nous rions de la nature pitoyable de ces êtres inférieurs. Lorsque nous les aurons exterminés, ces vitrines seront tout ce qu'il restera d'eux."
 grand_archive.4145.a: "Trinquons à la mort !"
 #Devouring Swarm
 grand_archive.4136.name: "Bibelots comestibles"
 grand_archive.4136.desc: "Notre faim ne faiblit jamais. Notre collection de curiosités de la catégorie [GetCollectionRewardCategory] s'est enrichie au fil de nos déjeuners.\n\nPuissent ces pièces être le dernier souvenir de cette galaxie que nous avons dévorée."
 grand_archive.4136.desc.geology: "$grand_archive.4136.desc$"
 grand_archive.4136.desc.aesthetic: "$grand_archive.4136.desc$"
 grand_archive.4136.a: "Une faim perpétuelle"
 grand_archive.4141.name: "$grand_archive.4136.name$"
 grand_archive.4141.desc.common: "Alors que nous nous gavons, ces objets nous rappellent les innombrables détritus que nous avons avalés."
 grand_archive.4141.desc.geology: "Nous continuons de rassembler des spécimens de la catégorie [GetCollectionRewardCategory] ; la chair ancestrale de la galaxie.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.desc.aesthetic: "Nous continuons de rassembler des colifichets de la catégorie [GetCollectionRewardCategory] ; des curiosités singulières qui étaient autrefois très appréciées des formes de vie inférieures.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.a: "Le festin continue"
 grand_archive.4146.name: "Souvenirs de nos repas"
 grand_archive.4146.desc: "À force de festoyer à travers la galaxie, nous avons rempli notre réserve de curiosités de la catégorie [GetCollectionRewardCategory].\n\nCette vaste collection nous rappelle que la faim n'est jamais assouvie. Lorsque nous aurons fini de dévorer la galaxie, nous contemplerons ces objets pour nous souvenir des saveurs qui leur sont associées."
 grand_archive.4146.desc.geology: "$grand_archive.4146.desc$"
 grand_archive.4146.desc.aesthetic: "$grand_archive.4146.desc$"
 grand_archive.4146.a: "Délicieux"
 #Determined Exterminators
 grand_archive.4137.name: "Bibelots de valeur notable"
 grand_archive.4137.desc: "Nous avons rassemblé des objets de la catégorie [GetCollectionRewardCategory] que les êtres organiques considéraient comme des artefacts de grande valeur.\n\nSous notre supervision, ces objets subsisteront longtemps après l'extermination de la vie organique de la galaxie."
 grand_archive.4137.desc.geology: "$grand_archive.4137.desc$"
 grand_archive.4137.desc.aesthetic: "$grand_archive.4137.desc$"
 grand_archive.4137.a: "Des curiosités inoffensives"
 grand_archive.4142.name: "Accumulation de curiosités"
 grand_archive.4142.desc: "Nous continuons de rassembler des trophées de la catégorie [GetCollectionRewardCategory] à mesure que nous éliminons la vie organique de cette galaxie.\n\nCes objets nous rappelleront l'illogisme de la vie organique et nous aideront à mettre en place les futurs protocoles d'extermination."
 grand_archive.4142.desc.geology: "$grand_archive.4142.desc$"
 grand_archive.4142.desc.aesthetic: "$grand_archive.4142.desc$"
 grand_archive.4142.a: "Protocoles réalignés"
 grand_archive.4147.name: "Espace mémoire rempli"
 grand_archive.4147.desc: "En purgeant cette galaxie, nous avons rempli nos banques de mémoire de spécimens de la catégorie [GetCollectionRewardCategory].\n\nCette collection nous fournit des données sur ce que les organiques chérissent. Elle servira à faciliter leur éradication et de point de référence dans l'histoire de cette galaxie infectée."
 grand_archive.4147.desc.geology: "$grand_archive.4147.desc$"
 grand_archive.4147.desc.aesthetic: "$grand_archive.4147.desc$"
 grand_archive.4147.a: "Les folies de la vie organique"
 ####################################
 #Grand Archive Destruction Events #
 ####################################
 grand_archive.4510.name: "Destruction des grandes archives du système de [fromfrom.GetName]"
 grand_archive.4510.desc.common: "Nous avons détruit les grandes archives appartenant à l'empire [from.GetName], dans le système de [fromfrom.GetName]."
 grand_archive.4510.stolen: "Nous avons pu récupérer certains des précieux spécimens qui s'y trouvaient."
 grand_archive.4510.ancrel: "Nous avons pu récupérer quelques artefacts mineurs parmi les débris."
 grand_archive.4510.nothing: "Malheureusement, il n'y avait rien de bien intéressant à l'intérieur."
 grand_archive.4510.freed: "De plus, il semble que nous ayons relâché une partie des créatures spatiales qui se trouvaient dans le vivarium. Il est fort possible qu'elles soient agressives et désorientées."
 grand_archive.4510.desc.stolen_freed: "$grand_archive.4510.desc.common$\n\n$grand_archive.4510.stolen$\n\n$grand_archive.4510.freed$"
