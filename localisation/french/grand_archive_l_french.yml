 #First Contacts
 first_contact_critters.15.desc.primal_calling: "Il convient de noter que chaque banc de §Htiyanki§! est régi par une hiérarchie matriarcale et qu'une seule vache dirige le groupe. Les femelles ont la priorité sur toutes les ressources alimentaires afin de produire des gaz maternels pour leurs petits et de guider les déplacements du banc. Ainsi, les mâles renoncent à se nourrir lorsque les ressources se font rares, ce qui les encourage à partir à la recherche de nourriture pendant que le banc se repose."
 first_contact_critters.25.desc.primal_calling: "Tous les spécimens, à l'exception des plus jeunes, sont accompagnés d'organismes quasi indépendants contrôlés par des sécrétions contenant de l'ARN. Ces « flagelles » attaquent selon des schémas complexes. Ainsi, malgré leur manque apparent de conscience, les §Hamibes spatiales§! sont des prédateurs naturels très habiles."
 first_contact_critters.35.desc.primal_calling: "Ces créatures semblent communiquer entre elles par le biais de changements chromatiques dans la lumière réfractée. Bien que le potentiel d'expressions complexes de ce procédé soit élevé, ces formes de vie semi-conscientes ne l'utilisent que de façon très basique. Les différentes couleurs permettent d'indiquer le statut social, l'agressivité et même la fertilité."
 grand_archive.2005.desc.primal_calling: "Ces créatures parasites n'ont pas la capacité naturelle de se reproduire et doivent donc compter sur des hôtes planétaires. Les §Hvers du vide§! doivent prélever suffisamment de matière organique sur les planètes habitées pour produire une hormone cruciale au sein de leurs trios d'accouplement, appelés « troïkas ». Hermaphrodites, ils choisissent leurs partenaires essentiellement en fonction de leurs traits physiques et de leur taille."
 grand_archive.2900.desc.primal_calling: "Nous pensons que les créatures choisissent leurs astéroïdes en fonction de leur composition minérale et de leur taille. Bien que le premier spécimen rencontré ait une préférence biologique pour [GetCommonMineral], il est fort probable que chaque individu développe cette adaptation au fil du temps et en fonction de l'environnement. Les analyses révèlent des traces de ce métal dans tout l'astéroïde hôte, ainsi qu'à l'intérieur du système nerveux et du tube digestif du §Hcutholoïde§!."
