 nutrient_rationing_desc: "Limiter l'apport de certains nutriments aux créatures spatiales que nous élevons réduit leur taux de croissance et nous permet d'utiliser ces ressources ailleurs.\n\nLes créatures spatiales clonées ne grandissent plus."
