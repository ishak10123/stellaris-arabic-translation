 grand_archive.9005.desc: "Notre §H[fromfrom.GetClass]§! §Y[fromfrom.GetName]§! a été capturé[fromfrom.GetXELead] par la [from.GetName] lors de la bataille dans le système de [fromfromfrom.GetName]. Une rançon nous est demandée en échange de sa vie."
