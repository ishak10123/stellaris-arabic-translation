 frenzied_voidworms_pacified_modifier: "$NAME_Frenzied_Voidworms$ pacifiés"
 resolution_voidworm_eradication: "Éradication des vers du vide"
 resolution_voidworm_eradication_desc: "Les vers du vide parasites sont un fléau pour la galaxie et une menace pour tous les mondes habités. Leur cycle de vie naturel perturbe l'équilibre de l'écosystème galactique ; ils doivent être éradiqués."
 resolution_voidworm_eradication_tooltip: "Tout empire ayant des §Yvers du vide§! à l'intérieur de son espace se trouverait de fait §Renfreindre§! les lois galactiques jusqu'à ce que les créatures partent d'elles-mêmes ou soient détruites."
 resolution_repeal_voidworm_eradication: "§RAbrogation de l'éradication des vers du vide§!"
 resolution_repeal_voidworm_eradication_desc: "[global_event_country.GetLeLaLCommGalEmpGalCap][global_event_country.GetGalCommunityOrGalImperium] ne devrait pas avoir le droit d'éradiquer les vers du vide."
 resolution_repeal_voidworm_eradication_effect_success: "Abroge l'§Yéradication des vers du vide§!."
 grand_archive.2103.name: "$resolution_voidworm_eradication$"
 grand_archive.2103.desc: "[global_event_country.GetLeLaLCommGalEmpGalCap][global_event_country.GetGalCommunityOrGalImperium] a déclaré que les vers du vide ne doivent plus exister au sein des systèmes membres.\n\nDe ce fait, [this.GetName] sera considérée comme §Renfreignant§! les lois galactiques jusqu'à ce qu'ils soient éliminés ou qu'ils disparaissent d'eux-mêmes."
 grand_archive.2105.name: "Des vers du vide dans notre espace"
 grand_archive.2105.desc: "Une flotte de vers du vide a pénétré dans notre espace et se trouve dans le système de [from.GetName]. En tant que membre [global_event_country.GetDuDelaDelCommGalEmpGal][global_event_country.GetGalCommunityOrGalImperium], nous sommes légalement contraints de les détruire.\n\nLa [this.GetName] sera considérée comme §Renfreignant§! les lois galactiques jusqu'à ce que les vers du vide aient été exterminés ou aient repassé nos frontières."
 grand_archive.2107.desc: "La présence de vers du vide dans le système de [invaded_system.GetName] est considérée comme une §Rviolation importante des lois galactiques§! de par la résolution $resolution_voidworm_eradication$. Cela a conduit [global_event_country.GetLeLaLCommGalEmpGal][global_event_country.GetGalCommunityOrGalImperium] à autoriser ses membres à prendre des sanctions contre [this.GetName]."
 bombardment_damage_moderate: "§YModérés§!"
 bombardment_damage_massive: "§RConsidérables§!"
 bombardment_voidworm_invasion_desc_common: "Les spores des vers du vide anéantissent la population et créent de nouvelles nymphes.\n- Dégâts infligés aux §Yarmées§! §Ymodérés§!\n- Dégâts infligés à la §Yplanète§! [GetVoidwormFleetBombardmentDamageIntensity], jusqu'à §Y25%§!\n- Dégâts infligés aux §Ypops§! §Ymodérés§!"
 bombardment_voidworm_invasion: "Spores de vers du vide"
 bombardment_voidworm_invasion_desc: "$bombardment_voidworm_invasion_desc_common$\n- Ne tuera §RPAS§! les §Y$MIN_POPS$§! dernières £pop£§Hpops§!"
