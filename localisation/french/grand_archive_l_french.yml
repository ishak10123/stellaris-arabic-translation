 FEDERATION_CREATURE_FLEET_DESC: "Les §Hflottes fédérales§! sont particulières, car contrôlées par le président de la fédération. Elles sont conçues dans le §H$CREATURE_DESIGNER$ fédéral§! et peuvent recourir à toute technologie découverte par l'un des membres. Les flottes fédérales n'ont aucun coût de maintenance, mais ne peuvent dépasser la §Hcapacité navale fédérale§!, à laquelle chaque membre contribue à hauteur de §Y$PERC|0%$§! de sa propre §Hcapacité navale§!. Si les flottes de faune spatiale se développent au point de dépasser la §Hcapacité navale fédérale§!, les créatures excédentaires sont remises au président de la fédération."
