 tech_voidworm_immunity: "Immunité contre les vers du vide"
 tech_voidworm_immunity_desc: "Nous pouvons mettre au point un remède contre l'infection parasitaire des vers du vide. Toutes nos colonies seraient ainsi immunisées contre leurs bombardements de spores."
 tech_voidworm_immunity_effect: "Les colonies sont immunisées contre les bombardements des vers du vide.\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!"
 tech_voidworm_immunity_effect_during_situation: "§RL'immunité contre les bombardements est inefficace pendant l'infestation de vers du vide.§!\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!\nLa situation §Y$situation_voidworm_plague$§! progresse de §G+$@vaccine_situation_advancement|0$§!"
