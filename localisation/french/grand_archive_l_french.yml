 #Event chain
 treasure_hunters_origin_story_chain_title: "Suivre la carte mystérieuse"
 treasure_hunters_origin_story_chain_desc: "Après avoir découvert une mystérieuse §Hcarte des étoiles§!, nous nous lançons dans notre plus grande aventure à ce jour. Qui sait où cette carte nous mènera et quels dangers nous rencontrerons sur notre route ?"
 treasure_hunters_hidden_system_1_poi: "Chercher [prev.GetName]"
 treasure_hunters_hidden_system_1_poi_desc: "La carte que nous avons trouvée dans la capsule orbitale ancienne mène à un système caché appelé [prev.GetName]. Nous allons devoir nous y rendre si nous voulons en savoir plus."
 treasure_hunters_explore_system_1_poi: "Sonder [treasure_hunters_hidden_system_1.GetName]"
 treasure_hunters_explore_system_1_poi_desc: "Maintenant que nous avons vaincu l'§Y$NAME_BlackNeedle$§!, nous pouvons reprendre notre exploration. La §Hcarte des étoiles§! nous a conduits à ce système, nous pensons que le prochain fragment de la carte s'y trouve."
 black_needle_fleet_poi: "La flotte de l'Aiguille Noire"
 black_needle_fleet_poi_desc: "Une flotte de pirates bien organisée nous a tendu une embuscade dans le système de [from.GetName]. Ils veulent voler notre §Hcarte des étoiles§! et attendaient notre arrivée."
 smeegibb_shelter_system_1_poi: "Chercher [prev.GetName]"
 smeegibb_shelter_system_1_poi_desc: "La §Hcarte des étoiles§! a révélé un autre système caché du nom de [prev.GetName]. Nous devons nous y rendre pour découvrir ce qui s'y trouve."
 smeegibb_shelter_system_2_poi: "Voyager vers [smeegibb_system.GetName]"
 smeegibb_shelter_system_2_poi_desc: "Nous n'avons pas pu rétablir la communication avec $NAME_Smeegibb$. Comme il s'agit de notre seule piste pour le prochain fragment de la §Hcarte des étoiles§!, nous devrions retourner dans le système de [smeegibb_system.GetName] afin d'enquêter. Nous ignorons pourquoi la communication a soudainement été coupée."
 black_needle_fleet_2_poi: "Vaincre la $NAME_CaptainInax$"
 black_needle_fleet_2_poi_desc: "L'§Y$NAME_BlackNeedle$§! nous a de nouveau attaqués, tuant notre contact, $NAME_Smeegibb$, et bloquant le système de [from.GetName]. Nous pensons que le quatrième fragment de la §Hcarte des étoiles§! est caché quelque part à la surface de [smeegibb_shelter.GetName].\n\nNous devons vaincre la flotte ennemie si nous voulons chercher la capsule."
