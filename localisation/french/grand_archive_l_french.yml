 NAME_Treasure_Trove_Pirate_Ship: "Bandits de [event_target:pirate_system.GetName]"
 NAME_Treasure_Trove_Pirate_Ship_Design: "Flibustier"
 grand_archive.6025.name: "Embuscade pirate"
 grand_archive.6025.desc: "Alors que nous cherchions le §Ytrésor§! de [from.GetName], une flotte de pirates a pris [fromfromfrom.Leader.GetName] en embuscade !\n\nCes hors-la-loi ont dû nous espionner et veulent désormais s'emparer du trésor. Nous devons les éliminer avant qu'ils ne mettent la main dessus."
 grand_archive.6025.a: "Préparons-nous au combat"
 TREASURE_TROVE_PIRATES: "Vaincre le $NAME_Treasure_Trove_Pirate_Ship$"
 TREASURE_TROVE_PIRATES_DESC: "Une flotte de pirates tente de s'emparer du §Ytrésor§! sur [this.GetName] !"
 TREASURE_TROVE_EVENT_TOOLTIP: "§RNous devons vaincre les opportunistes avant qu'ils ne s'emparent de ces précieuses ressources.§!"
 grand_archive.6031.name: "Pirates vaincus"
 grand_archive.6031.desc: "Maintenant que nous avons mis en déroute ces pirates opportunistes, nous pouvons revendiquer le trésor qui se trouve sur [event_target:treasure_trove_planet.GetName]."
 grand_archive.6031.a: "Un butin bien mérité"
 grand_archive.6035.name: "Trésor perdu"
 grand_archive.6035.desc: "Les pirates opportunistes ont pillé le §Ytrésor§! sur [event_target:treasure_trove_planet.GetName].\n\nIls n'ont rien laissé de valeur derrière eux."
 grand_archive.6035.a: "C'est la vie"
