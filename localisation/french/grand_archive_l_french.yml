 sm_voidlure: "Appât du vide"
 sm_voidlure_desc: "Les appâts du vide envoient des signaux dans les profondeurs de l'espace pour attirer les organismes qui peuplent le vide."
 sm_voidlure_desc_know_fauna: "Les appâts du vide envoient des signaux dans les profondeurs de l'espace pour attirer certaines espèces de faune spatiale. Le leurre doit être installé dans le type de système privilégié par la créature. Les créatures attirées seront dociles pendant un an."
