 #################
 #Grand Archive #
 #################
 GRAND_ARCHIVE_TITLE: "Grand Archive" #Do not translate
 DLC_GRAND_ARCHIVE_RECOMMENDATION_DESC: "L'extension §S$GRAND_ARCHIVE_TITLE$§! est recommandée parce que certains de vos choix s'accordent bien à son contenu."
 grand_archive: "Grandes archives"
 the_grand_archive: "Les grandes archives"
 grand_archive_0: "$grand_archive$"
 grand_archive_0_DESC: "Un bâtiment orbital spécial conçu pour entreposer et exposer les ['concept_specimen',spécimens] intéressants que nous avons recueillis dans toute la galaxie. Ceux-ci incluent des §Ycréatures spatiales§! vivantes."
 grand_archive_0_MEGASTRUCTURE_DETAILS: "Les §Ygrandes archives§! permettent de préserver et d'exposer les artefacts les plus précieux que nous avons recueillis dans toute la galaxie. Elles comprennent même un vivarium dédié à la préservation et à l'observation des §Ycréatures spatiales§! vivantes."
 requires_grand_archive: "$dlc_requirement_string$ §IGrand Archive§!"
 GOTO_COLLECTION: "Voir $COLLECTION$"
 must_have_2500_pops: "Nécessite un corps stellaire avec au moins §Y2 500§! £pop£§Hpops§!."
 STARBASE_CANNOT_UPGRADE_CONSTRUCTION_TYPE: "§RCette flotte ne peut être améliorée par aucune de nos bases stellaires.§!"
 VOIDWORMS_LABEL: "$voidworms_plural$"
 VOIDWORMS_LABEL_TOOLTIP: "§H$VOIDWORMS_LABEL$§!\nContrôle le nombre de vers du vide présents dans la galaxie.$requires_grand_archive$"
 CUTHOLOIDS_LABEL: "$cutholoids_plural$"
 CUTHOLOIDS_LABEL_TOOLTIP: "§H$CUTHOLOIDS_LABEL$§!\nContrôle le nombre de cutholoïdes présents dans la galaxie.$requires_grand_archive$"
 ##################
 #Gravity Snares #
 ##################
 feature_unlock_gravity_snares: "Pièges à gravité"
 feature_unlock_gravity_snares_desc: "Ils permettent de capturer et transporter les §Ycréatures spatiales§! sans les tuer. Si les §Ygrandes archives§! sont construites, ils acheminent les spécimens capturés jusqu'au vivarium."
 feature_unlock_containment_vessels: "Vaisseaux de confinement"
 feature_unlock_containment_vessels_desc: "Les pièges à gravité capturent deux fois plus de §Ycréatures spatiales§!."
 gravity_snare: "Piège à gravité"
 gravity_snare_plural: "Pièges à gravité"
 NAME_GravitySnare: "$gravity_snare$"
 FLEETORDER_SEND_SNARE_NAME: "Larguer $NAME$"
 FLEETORDER_SEND_SNARE_ON_COOLDOWN: "§R$TRIGGER_FAIL$ Les pièges à gravité doivent attendre §Y[This.GetGravitySnareCooldownForFleet] jours§! avant d'être réutilisés.§!"
 FLEETORDER_GRAVITY_SNARE_NO_COMMUNICATIONS: "§R$TRIGGER_FAIL$ Nous n'avons pas recueilli suffisamment d'informations sur ces créatures spatiales pour les capturer.§!"
 FLEETORDER_MUST_BE_SPACE_CRITTER: "§R$TRIGGER_FAIL$ Nous ne sommes pas en mesure de capturer ce type de créatures spatiales.§!"
 GRAVITY_SNARE_CAPTURE_CHANCE_LEADER: "Niveau de compétence : $VALUE|G%0$"
 FLEETORDER_CAPTURE_SPACE_CRITTER: "Capture de faune spatiale"
 FLEETORDER_CAPTURE_SPACE_CRITTER_PROGRESS: "Capture de faune spatiale : $PROGRESS|Y%0$"
 FLEETORDER_WAIT_FOR_GRAVITY_SNARE_TO_RELOAD: "Recharge du §Ypiège à gravité§! : $DAYS|Y$ jours"
 SNARE_SPEED: "Vitesse de capture : $SPEED$"
 CAPTURE_CHANCE: "Chances de capture : $VALUE|Y%0$"
 CAPTURE_AMOUNT: "Un §Ypiège à gravité§! suffit à capturer jusqu'à $VALUE|0G$ §Ycréatures spatiales§! à la fois."
 CAPTURE_AMOUNT_FULL_FLEET: "Un §Ypiège à gravité§! suffit à capturer toute une flotte de §Yfaune spatiale§!."
 GRAVITY_SNARE_1: "$gravity_snare$"
 GRAVITY_SNARE_STANDARD: "$gravity_snare$"
 GRAVITY_SNARE_STANDARD_TOOLTIP: "Les pièges à gravité provoquent des poussées de gravité quantique localisées qui empêchent tout objet dépourvu d'hyperpropulseur de s'échapper. Ces forces peuvent être maintenues suffisamment longtemps pour capturer des §Ycréatures spatiales§! et les transporter jusqu'à nos systèmes afin de les étudier de plus près."
 SHIP_STAT_CONTRIBUTION_ADDATIVE_fauna_capture_chance: "$NAME$ : $VALUE|Y0%$"
 SHIP_STAT_DESC_fauna_capture_chance: ""
 GRAVITY_SNARE_CLOAKING_EMPTY: "$SCIENCE_CLOAKING_EMPTY$"
 GRAVITY_SNARE_CLOAKING_1: "$SCIENCE_CLOAKING_1$"
 GRAVITY_SNARE_CLOAKING_2: "$SCIENCE_CLOAKING_2$"
 GRAVITY_SNARE_CLOAKING_3: "$SCIENCE_CLOAKING_3$"
 GRAVITY_SNARE_CLOAKING_DARK_MATTER: "$SCIENCE_CLOAKING_DARK_MATTER$"
 GRAVITY_SNARE_CLOAKING_PSI: "$SCIENCE_CLOAKING_PSI$"
 GRAVITY_SNARE_NO_EMERGENCY_FTL: "Les pièges à gravité ne sont pas conçus pour les bonds d'urgence PRL."
 FLEET_CANNOT_TAKE_ORDERS: "§RCette flotte ne peut recevoir d'ordre.§!"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_TITLE: "Créatures spatiales capturées"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_DESC: "La tentative de capture dans le système de $SYSTEM|Y$ a été couronnée de succès ! Le piège à gravité a déposé le spécimen dans le vivarium.\n\nVous avez obtenu de nouvelles créatures spatiales :\n$CAPTURED_LIST$$RESOURCES_LIST$"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_NO_VIVARIUM_DESC: "La tentative de capture dans le système de $SYSTEM|Y$ a été couronnée de succès ! Le §Hvivarium§! étant plein, les créatures capturées ont été euthanasiées et disséquées pour en extraire des ressources.\n$CULLED_LIST$$RESOURCES_LIST$"
 MESSAGE_SPACE_CRITTER_CAPTURE_FAILURE_TITLE: "Échec de la tentative de capture"
 MESSAGE_SPACE_CRITTER_CAPTURE_FAILURE_DESC: "La tentative de capture dans le système de $SYSTEM|Y$ a échoué. Le piège à gravité largué depuis $SHIP_NAME|Y$ a été perdu."
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_TITLE: "Nouvelles créatures spatiales"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC: "De nouvelles créatures spatiales ont été déposées dans le vivarium.\n$NEWBORN_LIST$$CULLED_LIST$$RESOURCES_LIST$"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC_CULLED: "\n\nLes créatures spatiales suivantes ont été abattues pour en extraire des ressources :\n$CULLED_LIST$"
 CULLED_CREATURES_RESOURCE_OUTPUT_DESC: "\n\nRessources reçues :\n  $RESOURCES_LIST$"
 mod_gravity_snare_cooldown_mult: "Temps d'attente du piège à gravité"
 MOD_GRAVITY_SNARE_COST_MULT: "Coût du piège à gravité"
 MOD_SPACE_FAUNA_CULLING_REWARD_MULT: "Ressources grâce à l'abattage "
 grand_archive.7210.name: "Pièges à gravité"
 grand_archive.7210.desc.common: "Suite à la récente découverte des §Ypuits de gravité§!, les vaisseaux scientifiques de l'espèce [root.GetSpeciesName] peuvent désormais larguer des pièges à gravité."
 grand_archive.7210.desc.vivarium: "Ces projectiles ne blessent pas, mais capturent et transportent en toute sécurité les créatures spatiales jusqu'à notre §Yvivarium§!, où elles peuvent se reproduire.\n\nL'abattage et la dissection de ces spécimens nous permettront de recueillir leur §Ymatériel génétique§! à des fins de clonage, ainsi que d'autres ressources."
 grand_archive.7210.desc.no_vivarium: "Ces projectiles ne blessent pas, mais capturent et transportent en toute sécurité les créatures spatiales à des fins de recherche et de dissection. Cela nous permet de recueillir leur §Ymatériel génétique§! ainsi que d'autres ressources.\n\nSi nous souhaitons les garder en vie afin qu'elles se reproduisent, nous devons créer un §Yvivarium§!. Pour ce faire, il nous faut construire des §Ygrandes archives§! ou des §Y[GetHatcheryPlural]§! sur nos bases stellaires."
 grand_archive.7220.name: "Bêtes préthorynes"
 grand_archive.7220.desc: "Nos §Ypièges à gravité§! sont incapables de traquer et capturer le §Y$NAME_Prethoryn_Scourge$§!. D'après leurs mouvements, les Préthoryns semblent être contrôlés par une sorte de conscience supérieure et ne pas avoir de réelle individualité.\n\nEssayer de contenir l'un de ces organismes dans un vivarium mettrait en danger les autres spécimens et, par extension, [this.GetName].\n\nNous avons suspendu les opérations de capture de ces organismes pour une durée indéterminée."
 grand_archive.7220.a: "C'est plus prudent"
