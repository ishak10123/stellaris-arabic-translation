 pirate.1.name.treasure_hunters: "Propagation de la piraterie spatiale"
 pirate.1.desc.black_needle: "Il est probable que l'§Y$NAME_BlackNeedle$§! se cache derrière ces activités illégales et qu'elle ait même soutenu ces corsaires opportunistes."
 pirate.2.k: "Chiens mesquins !"
 pirate.25.desc.black_needle: "Nous avons également découvert une cache d'objets de valeur appartenant à d'anciens membres de l'§Y$NAME_BlackNeedle$§!."
 #Events
 grand_archive.8000.name: "Capsule ancienne"
 grand_archive.8000.desc: "Nous avons fait une découverte capitale concernant la capsule ancienne trouvée en orbite autour de [this.GetHomeWorldName]. Grâce au travail acharné de nos [this.GetScientistPlural], nous sommes désormais en mesure de décrypter la dernière barrière de sécurité numérique et de déchiffrer la carte qui nous intrigue depuis si longtemps."
 grand_archive.8000.a: "Que contient-elle ?"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT: "Analyse de la capsule ancienne"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT_DESC: "Notre première analyse de la carte à l'intérieur de la capsule orbitale a révélé l'emplacement de plusieurs corps célestes absents de notre système natal. Il faudra du temps pour en extraire les coordonnées exactes."
 grand_archive.8005.name: "Capsule ancienne analysée"
 grand_archive.8005.desc: "La carte est incomplète !\n\nLes données contenues dans la capsule orbitale sont fragmentées, tel un puzzle dont il manquerait des pièces. La carte indique les coordonnées d'un système stellaire inconnu jusqu'alors, mais ne fournit aucun détail sur ce qui nous y attend.\n\nElle met également en évidence une série de points de rupture pour voyager via les hyperlignes."
 grand_archive.8005.a.lom: "Tout le monde sur le pont !"
 grand_archive.8015.name: "Carte des étoiles"
 grand_archive.8015.desc.common: "Nos vaisseaux sont prêts à partir pour la prochaine grande aventure de notre civilisation."
 grand_archive.8015.desc.default: "La population de [this.GetHomeWorldName] est fascinée par la carte stellaire récemment décryptée. Communément appelée « §Ycarte des étoiles§! », elle apporte pour le moment plus de questions que de réponses. D'où vient-elle ? Qui l'a créée et dans quel but ? Et surtout... nous conduira-t-elle dans un piège ?\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.desc.gestalt: "La carte découverte à l'intérieur de la capsule a accaparé l'attention de notre société. Maintenant que nous savons qu'il ne s'agit que d'un fragment parmi d'autres, nous nous demandons où elle peut nous mener et ce que nous pourrions y trouver. Nous ferons de notre mieux pour reconstituer cette « §Ycarte des étoiles§! ».\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.a.default: "En route pour l'aventure !"
 grand_archive.8015.a.lom: "Levons l'ancre !"
 grand_archive.8020.name: "Une rencontre inattendue"
 grand_archive.8020.desc: "Nous avons croisé une flotte lourdement armée battant un drapeau inconnu. Ses vaisseaux sont disposés en formation bien organisée, mais leur conception n'est pas uniforme. Beaucoup sont équipés de lanceurs cinétiques attachés à des bobines de câbles épais munis de crochets et de harpons en acier au carbone. Au centre de la flotte se trouve un groupe de transporteurs blindés. Selon toute vraisemblance, ces vaisseaux sont contrôlés par des pirates ou des mercenaires.\n\nNous recevons une transmission de leur vaisseau de tête."
 grand_archive.8020.a.lom: "Une négociation..."
 grand_archive.8025.name: "$NAME_CaptainHoo$ de l'$NAME_BlackNeedle$"
 grand_archive.8025.desc: "§HDistingué et hautain, ce capitaine hors-la-loi feint le désintérêt. Il baisse le bec en parlant et évite notre regard, comme si nous n'étions pas dignes d'avoir toute son attention. Il agite ses plumes d'une manière involontairement comique.§!\n\nVous avez croisé le chemin de l'§Y$NAME_BlackNeedle$§!, une belle erreur de votre part !\n\nNous avons eu vent d'une rumeur selon laquelle votre petite société explorerait ce système. Vous avez mis la main sur une carte qui, de toute évidence, nous appartient. Remettez-la-nous, sans quoi nous aurons recours à la violence."
 grand_archive.8025.a: "Qui êtes-vous ?"
 grand_archive.8025.a.reply: "Qui je suis ?! Glimarhoo Zelmendrion, mais vous pouvez m'appeler §Y$NAME_CaptainHoo$§!, capitaine de l'Aile Argentée et second lieutenant des illustres pirates de l'§Y$NAME_BlackNeedle$§!. Nous avons le bec plongé dans toutes sortes de trafics illicites depuis des milliers d'années, et je ne suis qu'un fil dans la majestueuse tapisserie de notre héritage.\n\nVous feriez bien de retenir mon nom, notre chef incontesté me remettra sans doute une prime importante lorsque je lui aurai présenté cette carte."
 grand_archive.8025.b: "Que savez-vous de cette carte ?"
 grand_archive.8025.b.reply: "Un informateur de talent, et aux services onéreux, nous a indiqué que vous aviez récemment mis la main sur une étrange capsule... Une capsule censée contenir des informations sur un système caché qui nous intéresse vivement.\n\nNous avons nous-mêmes trouvé un fragment de la carte, mais il est inutile sans les données de votre capsule. Je ne comprends pas pourquoi la §Y$NAME_CaptainNess$§! vous a donné la clé de son héritage, mais il nous incombe de vous en délester."
 grand_archive.8025.c: "Pourquoi la carte vous intéresse-t-elle à ce point ?"
 grand_archive.8025.c.reply: "Êtes-vous vraiment si naïfs ? [this.GetCaptainHooSnarkyInsult] Je suppose que je vais devoir vous expliquer.\n\nUne carte est un guide de navigation vers une destination spécifique. Nous souhaitons nous y rendre pour récupérer le trésor perdu de la §Y$NAME_CaptainNess$§!."
 grand_archive.8025.d: "Qui est la $NAME_CaptainNess$ ?"
 grand_archive.8025.d.reply: "Nous aurions pensé que vous seriez mieux informés... Elle est la créatrice de cette carte. Peut-être a-t-elle apprécié l'ignorance de votre espèce ?\n\nEnfin, cela ne vous regarde pas... Remettez-la-nous, nous allons prendre le relais."
 grand_archive.8025.e: "Nous allons garder notre carte"
 grand_archive.8025.e.reply: "Je m'en doutais. Préparez-vous à affronter votre destin.\n\nTenez-vous prêts !"
 grand_archive.8025.f.lom: "Viens la chercher, sale pirate !"
 CAPTAIN_HOO_INSULT_MACHINE: "Moi qui croyais que les intelligences mécaniques étaient intelligentes... Visiblement, ce n'est pas le cas."
 CAPTAIN_HOO_INSULT_HIVE: "Plusieurs consciences devraient mieux raisonner qu'une seule, mais votre intelligence collective est ridicule."
 CAPTAIN_HOO_INSULT_HUM: "Les sacs d'os et de peaux lisses que vous êtes ont découvert le voyage interstellaire, mais sont incapables de faire preuve de bon sens."
 CAPTAIN_HOO_INSULT_MAM: "Les bêtes comme vous n'ont pas été gratifiées de l'intelligence et du raffinement de notre chef."
 CAPTAIN_HOO_INSULT_REP: "Enfin, je ne m'attends pas à ce que les simples d'esprit comme vous comprennent un concept aussi élémentaire."
 CAPTAIN_HOO_INSULT_AVI: "Il faut croire que vos ancêtres ont reçu trop de coups de bec sur le crâne."
 CAPTAIN_HOO_INSULT_ART: "Je ne suis pas surpris que la capacité à penser de manière critique n'ait pas pénétré le robuste exosquelette de votre espèce."
 CAPTAIN_HOO_INSULT_MOL: "J'avais entendu dire que les molluscoïdes n'avaient pas de cerveau central et vous en êtes la preuve."
 CAPTAIN_HOO_INSULT_FUN: "J'ai l'impression qu'il vous manque quelques spores."
 CAPTAIN_HOO_INSULT_PLANT: "Je comprends de mieux en mieux pourquoi l'intelligence ne s'est pas développée chez les végétaux de la plupart des mondes."
 CAPTAIN_HOO_INSULT_LITHOID: "Votre espèce a vraiment une pierre en guise de cerveau."
 CAPTAIN_HOO_INSULT_NECROID: "Je suppose que vous êtes les déchets d'une espèce autrefois intelligente."
 CAPTAIN_HOO_INSULT_AQUATIC: "Vous n'êtes manifestement pas dans votre élément."
 CAPTAIN_HOO_INSULT_TOX: "Peut-être que le fait de vivre dans la saleté a affaibli vos esprits."
 CAPTAIN_HOO_INSULT_ROBOT: "Peut-être que vos modules d'individualité consomment la majeure partie de votre puissance de calcul."
 CAPTAIN_HOO_INSULT_DEFAULT: "Peut-être votre espèce est-elle aussi déficiente intellectuellement qu'elle est défigurée."
 grand_archive.8045.name: "$grand_archive.8025.name$"
 grand_archive.8045.desc: "Vous nous avez ridiculisés, l'§Y$NAME_BlackNeedle$§! et moi, c'est inacceptable !\n\nVotre refus de coopérer ne sera pas oublié de sitôt. L'$NAME_BlackNeedle$ vous attaquera de toutes ses forces. Votre jeune civilisation ne survivra pas à notre colère.\n\nNous ne nous arrêterons pas tant que nous n'aurons pas récupéré cette carte ! Sur ce, bonne journée !"
 grand_archive.8045.a.lom: "La prochaine fois, combattez au lieu de parler !"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT: "Une planète en huit morceaux"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT_DESC: "La §Hcarte des étoiles§! nous a conduits à un monde détruit. Nous avons détecté un tunnel artificiel dans la plus grande plaque de croûte planétaire. Nous pensons que le prochain fragment de la carte s'y trouve, mais y accéder nécessitera une excavation minutieuse.\n\nUn vaisseau de construction serait en mesure de fabriquer l'équipement nécessaire à l'extraction du fragment."
 grand_archive.8055.name: "Excavation réussie"
 grand_archive.8055.desc: "Nous avons réussi à extraire une capsule des débris planétaires à la dérive. Elle contient un nouveau fragment de la §Ycarte des étoiles§! et des artefacts culturels uniques. Nous y avons également trouvé une note écrite en plusieurs langues.\n\n« Voilà tout ce qu'il reste de $NAME_Soropegma$, le monde natal des Ytterites. Les Ytterites étaient une espèce pré-PRL, éteinte à la suite d'un tragique accident. Inconscients des conséquences, nous avons accidentellement déclenché la puissance destructrice d'un colosse volé. Veuillez honorer et respecter leur mémoire. »"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT: "Déchiffrage du fragment de carte"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT_DESC: "Maintenant que nous avons déterré la capsule des ruines de la planète détruite, nous devons déchiffrer les données de navigation qu'elle contient. Pour ce faire, nous allons devoir recouper notre base de données cartographiques et comparer les corps célestes indiqués aux systèmes connus."
 grand_archive.8060.name: "Carte déchiffrée"
 grand_archive.8060.desc: "Après avoir passé les différents niveaux de cryptage, nous avons pu ajouter les nouvelles données à la §Ycarte des étoiles§!. Les fragments combinés ont révélé l'existence d'un autre système inconnu. La prochaine étape du voyage nous attend, mais prudence est de mise."
 grand_archive.8075.name: "Grandes archives"
 grand_archive.8075.desc: "Nos scientifiques estiment que le §Y[This.GetLastAcquiredSpecimenName]§! mérite d'être exposé au public dans de §Ygrandes archives§!. Cette structure abriterait notre jeune collection d'artefacts rares, qui aura des retombées culturelles et scientifiques importantes. Un investissement initial permettrait de lancer la recherche sur les techniques et technologies nécessaires à la préservation et à l'exposition de divers et fragiles spécimens de toute la galaxie.\n\nPar ailleurs, l'artefact ytterite était accompagné d'un plan. Il s'agit d'un modèle avancé de vitrine d'exposition doté d'une technologie innovante de surveillance atmosphérique. Développer ce projet permettrait d'améliorer les capacités de conservation des archives dans leur ensemble."
 grand_archive.8076.name: "Le spécimen ytterite"
 grand_archive.8076.desc: "Le dernier vestige de la civilisation disparue des Ytterites mérite une exposition à part entière.\n\nPar chance, l'artefact était accompagné d'un plan. Il s'agit d'un modèle avancé de vitrine d'exposition doté d'une technologie innovante de surveillance atmosphérique. Développer ce projet permettrait d'améliorer les capacités de conservation des archives dans leur ensemble."
 grand_archive.8076.a: "Une belle opportunité"
 TREASURE_HUNTERS_EXHIBITION_PROJECT: "Plan d'amélioration des expositions"
 TREASURE_HUNTERS_EXHIBITION_PROJECT_DESC: "Outre le spécimen ytterite, nous avons également découvert un modèle avancé pour une vitrine complexe qui devait contribuer à sa conservation.\n\nEn étudiant les techniques utilisées dans ce plan, nous pourrons certainement faire des progrès en matière de conservation et d'exposition."
 TREASURE_HUNTERS_EXHIBITION_PROJECT_TOOLTIP: "Utilisez un §Yvaisseau de construction§! pour bâtir des §Ygrandes archives§! autour d'une planète ayant 2 500 £pop£§Hpops§! ou plus.\nNécessite la technologie §H£society_research£$tech_galactic_archivism$§!."
 grand_archive.8080.name: "Expositions améliorées"
 grand_archive.8080.desc: "Après une analyse approfondie du plan ytterite, nous avons construit une unité de conditionnement avancée dotée d'une surveillance atmosphérique précise jusqu'à l'atome. Cela permettra aux Conservateurs de surveiller les conditions atmosphériques du délicat spécimen ytterite à un niveau très détaillé et de détecter tout signe avant-coureur d'une potentielle dégradation. Il restera intact, à jamais.\n\nNous pouvons utiliser ces techniques pour améliorer les conditions de conservation de chacune des pièces de notre collection."
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE: "Construire de grandes archives"
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE_DESC: "Au fil de notre exploration du cosmos, nous avons collecté d'innombrables artefacts uniques et bizarreries culturelles. Ces spécimens inspireront la population et feront de notre exposition la première à présenter tous les domaines de la connaissance galactique.\n\nÀ cette fin, il convient de construire des §Hgrandes archives§!."
 grand_archive.8090.name: "Inauguration des grandes archives"
 grand_archive.8090.desc: "L'ouverture des §Ygrandes archives§! dans le système de [fromfrom.GetName] est un grand jour pour la [this.GetName]. Cette exposition de trésors provenant de toute la galaxie incite à l'exploration et nous invite à tirer les leçons du passé."
 d_black_needle_base: "Base secrète de l'Aiguille Noire"
 d_black_needle_base_desc: "Base secrète où les pirates de l'Aiguille Noire mènent diverses opérations clandestines et cachent des marchandises volées."
 d_abandoned_black_needle_base: "Base de l'Aiguille Noire abandonnée"
 d_abandoned_black_needle_base_desc: "Cette base était autrefois utilisée par les pirates de l'Aiguille Noire comme avant-poste et abri pour les criminels recherchés et les marchandises volées."
 d_abandoned_black_needle_base_naval_cap: "Capacité navale grâce aux emplois de soldats : §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 d_abandoned_black_needle_base_naval_cap_short: "£mod_country_naval_cap_add£ grâce aux emplois de £job_soldier£ : §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 black_needle_base_system_poi: "Suivre la carte des étoiles"
 black_needle_base_system_poi_desc: "La §Hcarte des étoiles§! a révélé un système caché du nom de [Prev.GetName]. Nous devons nous y rendre pour découvrir ce qui s'y trouve."
 grand_archive.8100.name: "Découverte d'un repaire de pirates"
 grand_archive.8100.desc: "Nous avons trouvé une base souterraine secrète portant l'insigne de l'§YAiguille Noire§! sur [From.GetName]. Nous pensons qu'il s'agit d'une base extérieure, isolée de leurs autres opérations. Le prochain fragment de la §Ycarte des étoiles§! doit s'y trouver, entre autres richesses et babioles.\n\nNous pourrions facilement lancer un bombardement orbital, mais cela pourrait donner à l'Aiguille Noire le temps d'appeler des renforts. En revanche, un déploiement rapide de nos forces terrestres permettrait de s'emparer plus rapidement de la base et laisserait peu de temps à l'ennemi pour réagir.\n\nEnfin, nous pourrions pirater les systèmes informatiques de la base pour nous emparer de la carte des étoiles."
 grand_archive.8100.a: "Il y a beaucoup de choses à prendre en compte"
 COLONIZATION_IMPOSSIBLE_DEFENDED_PLANET: "$TRIGGER_FAIL$ §RCette planète est hautement protégée et ne peut pas être colonisée.§!"
 BLACK_NEEDLE_BASE_BOMBARD: "Bombarder la base de l'Aiguille Noire"
 BLACK_NEEDLE_BASE_BOMBARD_DESC: "La base souterraine de [This.GetName] est très résistante aux bombardements orbitaux, mais avec suffisamment de temps et de puissance de feu, nous pourrions la détruire avec notre seule flotte. Une fois la base neutralisée, nous pourrons fouiller les ruines pour récupérer le fragment de §Hcarte des étoiles§! et tout autre objet de valeur.\n\nD'après nos conseillers tactiques, cette approche laisserait suffisamment de temps à l'Aiguille Noire pour appeler des renforts."
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED: "$BLACK_NEEDLE_BASE_BOMBARD$"
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED_DESC: "$BLACK_NEEDLE_BASE_BOMBARD_DESC$"
 grand_archive.8103.name: "Contre-attaque de l'Aiguille Noire"
 grand_archive.8103.desc: "Comme on pouvait s'y attendre, l'Aiguille Noire a envoyé une flotte pour protéger sa base sur [FromFrom.GetName].\n\nNous allons devoir l'éliminer pour accéder au système de [FromFrom.System.GetName]."
 grand_archive.8105.name: "En ruines et en cendres"
 grand_archive.8105.desc: "Après plusieurs bombardements orbitaux, la base pirate et ses occupants ont finalement été anéantis. Toutes les menaces étant neutralisées, nous pouvons maintenant envoyer un scientifique explorer la base en ruine pour récupérer le fragment de la §Ycarte des étoiles§!."
 grand_archive.8105.a.custom_tooltip: "La base de l'Aiguille Noire a été détruite. Nous pouvons désormais explorer §Y[FromFrom.GetName]§! à notre guise."
 grand_archive.8105.a.lom: "À nous le butin !"
 project_type_research: "$RESEARCH$"
 project_type_bombardment: "Bombardement"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES: "Attaquer la base de l'Aiguille Noire"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES_DESC: "Un grand nombre de troupes et de drones de sécurité gardent la base souterraine de [FromFrom.GetName]. Si nous déployions des armées à la surface, nous pourrions prendre rapidement le contrôle de la base, laissant peu de temps à l'§YAiguille Noire§! pour réagir.\n\nUne fois la base sécurisée, nous pourrons récupérer la capsule et tout autre butin."
 grand_archive.8110.name: "Défense à terre"
 grand_archive.8110.desc: "Nos forces au sol se sont emparées de la base de l'§YAiguille Noire§! et sécurisent actuellement le bâtiment et ses ressources. Toutes les menaces ont été neutralisées, nous pouvons envoyer un scientifique récupérer le prochain fragment de la §Ycarte des étoiles§!."
 grand_archive.8110.a.custom_tooltip: "Les forces au sol de l'Aiguille Noire ont été neutralisées. Nous pouvons désormais explorer §Y[FromFromFrom.GetName]§! à notre guise."
 grand_archive.8110.a.lom: "C'est l'heure de partager le butin"
 BLACK_NEEDLE_BASE_HACK: "Pirater les pirates"
 BLACK_NEEDLE_BASE_HACK_DESC: "Les pirates utilisant principalement du matériel volé, leur base est facile à infiltrer. Un seul vaisseau de recherche suffirait à pirater le réseau de [FromFrom.GetName] depuis l'orbite, en se faisant passer pour un vaisseau de transport de l'§YAiguille Noire§! sous les ordres du capitaine Hoo. Cela permettrait d'obtenir la capsule sans effusion de sang."
 grand_archive.8115.name: "Manoeuvre réussie"
 grand_archive.8115.desc.1: "Après des mois de préparation, [Leader.GetLeLaLead] scientifique [Leader.GetName] a réussi à infiltrer le réseau de communication et à se faire passer pour un vaisseau de l'§YAiguille Noire§!. Sous de faux ordres du capitaine Hoo, [Leader.GetHeShe] a trompé les opérateurs de la base et les a incités à lui remettre la capsule pour un transfert d'urgence."
 grand_archive.8115.desc.slippery: "[Leader.GetLeLaLead] scientifique [Leader.GetName] a fait atterrir son vaisseau à l'endroit idéal pour battre en retraite au cas où [Leader.GetSheHe] serait découvert[Leader.GetXELead]."
 grand_archive.8115.desc.charismatic: "Grâce à son charisme, [Leader.GetLeLaLead] scientifique [Leader.GetName] a pu éviter les questions délicates."
 grand_archive.8115.desc.psionic_organic: "Avec un simple mouvement de [Leader.Species.GetHandName], [Leader.GetLeLaLead] scientifique [Leader.GetName] a réussi à dissiper les soupçons des gardes."
 grand_archive.8115.desc.psionic_machine: "Grâce à ses pouvoirs psioniques, [Leader.GetName] n'a eu aucun mal à manipuler l'esprit inférieur des gardes afin d'éviter tout soupçon."
 grand_archive.8115.desc.2: "La capsule a été sécurisée et aucune victime n'est à déplorer. Les pirates n'ont pas encore compris qu'ils avaient été dupés."
 grand_archive.8115.a: "$EXCELLENT$"
 grand_archive.8120.name: "La main dans le sac"
 grand_archive.8120.desc: "Malheureusement, un garde a découvert notre stratagème alors que nous étions en train de charger la capsule à bord du vaisseau. Un court échange de tirs s'en est suivi, et nous avons été contraints de fuir les lieux en traînant la précieuse cargaison. Nous avons pu récupérer la capsule, mais [Leader.GetLeLaLead] scientifique [Leader.GetName] a péri dans la fusillade."
 grand_archive.8120.a: "$TERRIBLE$"
 grand_archive.8125.name: "Base de pirates abandonnée"
 grand_archive.8125.common: "Les pirates ont donc décidé d'abandonner leur base sur [FromFromFromFrom.GetName]. Ils ont immédiatement évacué les lieux et mis en sécurité les autres objets de valeur dont ils disposaient. Cette lune habitable est désormais inoccupée et peut être colonisée."
 grand_archive.8125.desc.alive: "L'§YAiguille Noire§! a enfin découvert les failles de son réseau de sécurité fermé et s'est rendu compte qu'elle avait été dupée.\n\n$grand_archive.8125.common$"
 grand_archive.8125.desc.dead: "Après avoir fui de justesse le bastion de l'§YAiguille Noire§!, nos opérations d'infiltration ont été mises au jour.\n\n$grand_archive.8125.common$"
 grand_archive.8125.a: "Une décision judicieuse"
 grand_archive.8125.a.custom_tooltip: "Les armées stationnées sur §Y[FromFromFromFrom.GetName]§! sont parties. La planète peut désormais être colonisée."
 grand_archive.8130.name: "Pillage de la base de l'Aiguille Noire"
 grand_archive.8130.desc.common: "La salle contenait une ribambelle d'objets de valeur et de bibelots sentimentaux liés à l'histoire de l'organisation pirate. Au milieu d'oeuvres d'art volées, de bijoux personnalisés et de portefeuilles numériques cryptés se trouvait la capsule de la carte.\n\nLa plupart de ces biens seraient certainement difficiles à vendre. Les oeuvres d'art sont facilement identifiables, les bijoux auraient besoin d'être fondus pour être transformés en ferraille, et les transactions utilisant des portefeuilles numériques sont généralement traçables. Certains des anciens propriétaires de ces objets pourraient être morts depuis longtemps, mais d'autres sont sans doute toujours à la recherche de leurs biens volés."
 grand_archive.8130.desc.bombarded: "Lors de notre exploration des ruines de la base de l'§YAiguille Noire§!, nous avons trouvé une chambre forte souterraine renfermant ses biens mal acquis.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.desc.landed: "Lors de notre exploration de la base détruite de l'§YAiguille Noire§!, nous avons trouvé un plan indiquant l'existence d'une chambre forte souterraine. Nous sommes descendus via un ascenseur de service et avons saisi le code d'accès avant de découvrir ses biens mal acquis.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.a: "Essayons de rendre les objets volés à leurs propriétaires"
 grand_archive.8130.b: "Vendons tout"
 grand_archive.8130.c.default: "Gardons les objets volés"
 grand_archive.8130.c.lom: "Trouver n'est pas voler"
 black_needle_base_sold_stolen_items: "Objets volés de la base de l'Aiguille Noire vendus"
 opinion_black_needle_base_repatriate_stolen_items: "Objets volés rendus"
 opinion_black_needle_base_repatriate_stolen_items_tt: "£opinion£Opinion de tous les empires non meurtriers avec lesquels nous ne sommes pas en guerre : §G+$@opinion_black_needle_base_repatriate_stolen_items_value|0$§!"
 DECODE_THIRD_MAP_PIECE: "Décoder le fragment de carte"
 DECODE_THIRD_MAP_PIECE_DESC: "Maintenant que nous avons récupéré la capsule de la base de l'§YAiguille Noire§!, nous devons en décrypter les données et intégrer les nouvelles informations dans la §Hcarte des étoiles§!."
 grand_archive.8135.name: "Carte décryptée"
 grand_archive.8135.desc: "Nous avons réussi à passer les différents niveaux de cryptage numérique et à intégrer de nouvelles informations dans la §Ycarte des étoiles§!. Nous avons ainsi découvert une nouvelle destination à explorer, et la carte est désormais presque complète. Il ne devrait rester qu'un seul fragment à trouver ; nous sommes raisonnablement optimistes quant à la fin de notre quête.\n\nPendant le décodage des données de navigation, nous avons également analysé l'extérieur de la capsule. Sa solidité est surprenante ; reproduire ce matériau pourrait offrir de nombreuses possibilités pour les recherches futures."
 grand_archive.8135.a: "$GOOD$"
 d_hive_dwelling: "Zone d'habitation de conscience collective"
 d_hive_dwelling_desc: "Une colonie isolée occupée par le collectif Smeegibb, anciens compagnons d'équipage de la capitaine Ness."
 d_ruined_hive_dwelling: "Zone d'habitation de conscience collective en ruine"
 d_ruined_hive_dwelling_desc: "La colonie rasée du collectif Smeegibb, anciens compagnons d'équipage de la capitaine Ness."
 COLONIZATION_IMPOSSIBLE_SMEEGIBB_PLANET: "§RCette planète appartient à $NAME_Smeegibb$.§!"
 grand_archive.8200.name: "Colonie cachée"
 grand_archive.8200.desc.common_1: "Nous avons trouvé une petite colonie sur [FROM.GetName] comptant moins d'un millier de molluscoïdes dotés de conscience. L'analyse biologique préliminaire de l'espèce montre une capacité de communication éphaptique subspatiale, indiquant l'existence d'une conscience collective. En dehors de ce campement isolé, la planète n'est habitée par aucune autre forme de vie sensible."
 grand_archive.8200.desc.common_2: "Nous ignorons encore pourquoi la §Ycarte des étoiles§! nous a conduits ici et devons étudier la question."
 grand_archive.8200.desc: "$grand_archive.8200.desc.common_1$\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8200.desc.alt: "$grand_archive.8200.desc.common_1$\n\nCette espèce pourra peut-être nous en dire plus que cette « §Y$NAME_CaptainNess$§! ».\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8205.desc.common_1: "§HNoeud de la conscience collective trouvé dans le système caché de [FROM.GetName], $NAME_Smeegibb$ s'agite nerveusement. Il a tendance à baisser le regard quand on lui parle, comme s'il était habitué à la soumission.§!"
 grand_archive.8205.desc.common_2: "Nous nous appelons $NAME_Smeegibb$. Nous sommes curieux de savoir comment vous trouver nous. Système est caché depuis des milliers d'années.\n\nSeule §Yla Capitaine§! connaît ici. Vous vouloir quoi ?"
 grand_archive.8205.desc.default: "$grand_archive.8205.desc.common_1$\n\nSmarak ! Belle lurette que nous pas avoir parlé avec des esprits individuels.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.desc.gestalt: "$grand_archive.8205.desc.common_1$\n\nSmarak ! Belle lurette que nous pas avoir parlé avec une autre conscience collective.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.a: "Quel est cet endroit ?"
 grand_archive.8205.a.reply: "Smarak ! Cette planète est chez nous. Nous vivre en sécurité, loin de la galaxie violente. Avant ça, nous faire violence. Tuerie, crime, piraterie... Tout. C'est fini. Nous gérer nos fermes hydroponiques.\n\nAvant ça, nous être réfugiés. Personne ne voulait nous, avant §Yla Capitaine§!. Elle a sauvé nous du mauvais sort et autorisé nous à rejoindre son équipage. La Capitaine a donné nous un nouveau nom et en échange nous prendre soin du vaisseau.\n\nNous gérer ménage, cuisine, munitions, hydroponie et cargaison. Nous travailler. Ensuite nous rejoindre équipage d'abordage. Nous protéger la Capitaine quand elle voler trésor ou enlever des gens. Nous jamais trahir la Capitaine. Toujours loyaux."
 grand_archive.8205.b: "Que savez-vous de la §Ycarte des étoiles§! ?"
 grand_archive.8205.b.reply: "Smarak ! Nous pas connaître carte, rester toujours chez nous. Si §Yla Capitaine§! fabriquer une carte pour amener vous ici, il y a forcément raison... Elle veut aider nous ou blesser. Nous jamais vraiment savoir. La Capitaine compliquée à comprendre.\n\nUne fois, elle envoyer un message. La Capitaine envoyer une statue géante de son drone préféré, $NAME_Smeegibb$ sauvé auparavant dont elle se souvient. C'était impressionnant, mais nous pas savoir pourquoi elle envoyer ça. Peut-être pour s'excuser, mais pas de lettre."
 grand_archive.8205.c: "Dites-nous-en plus sur §Yla Capitaine§!"
 grand_archive.8205.c.reply: "Smarak ! Avant, §Yla Capitaine§! sauver nous. Elle notre mentore et notre cheffe. Apprendre nous à prendre soin de vaisseau. Elle dire « $NAME_Smeegibb$, travaille comme quartier-maître, mécanicien et ouvrier, tu as beaucoup de valeur. »\n\nLa Capitaine vivre selon deux principes : « la richesse, c'est l'indépendance » et « la vie existe pour l'héritage ». Ensemble, nous chasser les pauvres et les riches. Nous prendre ce que nous voulons de la galaxie violente.\n\nMais après, la Capitaine devenir deux fois plus avide et téméraire. Elle sacrifier son équipage ou trahir pour du butin. La Capitaine finir par perdre tout le monde sauf $NAME_Smeegibb$. Nous toujours loyaux.\n\nElle montrer nous la violence de la galaxie. Aujourd'hui, nous vouloir rester loin."
 grand_archive.8205.d: "Pourquoi notre carte nous a-t-elle conduits ici ?"
 grand_archive.8205.d.reply: "Smarak ! Nous pas savoir pourquoi §Yla Capitaine§! vouloir vous venir ici. Elle rien nous dire.\n\nPeut-être une idée. Exister un endroit où nous et §Yla Capitaine§! nous cacher des chasseurs de prime. Un refuge. Peut-être vous trouver quelque chose là-bas."
 grand_archive.8210.name: "Découverte d'une planque"
 grand_archive.8210.desc: "L'être que nous avons rencontré sur [from.GetName], $NAME_Smeegibb$, nous a révélé les coordonnées d'une planque abandonnée qu'il occupait autrefois avec la §Y$NAME_CaptainNess$§!. Nous pourrions y trouver le prochain fragment de la §Ycarte des étoiles§!, ou au moins un indice pour nous guider dans la bonne direction."
 grand_archive.8210.a: "Lançons les fouilles"
 smeegibb_digsite_poi: "Explorer la planque"
 smeegibb_digsite_poi_desc: "Ce site archéologique pourrait détenir la clé du prochain fragment de la §Hcarte des étoiles§!. Nous devons fouiller la planque abandonnée si nous voulons trouver un jour le trésor perdu de la §H$NAME_CaptainNess$§!."
 NAME_Bemat_cruiser_inax_01: "Hébehr"
 #Treasure Hunters Origin - Smeegibb
 smeegibb_digsite: "Planque abandonnée"
 smeegibb_digsite_desc: "Sur les terres glacées de [fromfrom.planet.GetName], nous avons détecté un petit abri préfabriqué doté de dispositifs de survie inactifs et de quartiers d'habitation. Ils sont très abîmés et partiellement ensevelis après des millénaires de tempêtes de glace."
 grand_archive.8220.name: "Journal de la capitaine"
 grand_archive.8220.desc: "La structure excavée témoigne d'une longue période d'utilisation. Elle était autrefois bien approvisionnée en ressources de base. Nous avons découvert toutes sortes de bibelots et de curiosités dans le bâtiment. Dans une pile de papiers en désordre, nous avons trouvé un journal écrit par la §Y$NAME_CaptainNess$§!.\n\n§LNous avons abordé et détourné un nouveau vaisseau de transport de trésor perikan, mais cette fois, ils nous attendaient. Nous avons subi plus de pertes que je ne l'aurais souhaité, mais nous avons connu pire. Le butin est correct, mais le joyau de Tapico demeure introuvable. Malheureusement, les Perikans ont augmenté leur prime et la Fédération s'en mêle. Les choses se corsent un peu. Nous allons peut-être devoir faire profil bas pendant quelque temps.§!"
 grand_archive.8220.a: "Continuons de fouiller"
 grand_archive.8225.name: "Tuer le temps"
 grand_archive.8225.desc: "En creusant sous la structure, nous avons découvert une petite réserve d'objets de valeur et des systèmes sanitaires sommaires. Malheureusement, après avoir fouillé la zone de fond en comble, nous n'avons trouvé aucune trace du fragment de la §Ycarte des étoiles§!.\n\nNous avons recueilli d'autres carnets et documents dans l'espoir de trouver un indice parmi les entrées du journal de la §Y$NAME_CaptainNess$§!.\n\n§LLe temps semble moins long avec un partenaire comme $NAME_Smeegibb$, mais cela vaut-il la peine de partager la gloire ? Bien sûr, travailler avec une conscience collective a des avantages incroyables. Avoir accès à des centaines de drones en échange d'une seule et unique part des gains ? Une véritable aubaine ! Mais peut-être que le travail qu'ils accomplissent dessert mes propres réalisations... ? Je ne suis pas sûre de vouloir partager mon héritage. Il faut que j'y réfléchisse.§!"
 grand_archive.8225.a: "$grand_archive.8220.a$"
 grand_archive.8230.name: "Quelque chose à prouver"
 grand_archive.8230.desc: "Nous avons découvert la dernière entrée du journal de la §Y$NAME_CaptainNess$§! dans une bouche d'aération.\n\n§LCe n'est pas comme ça que je veux qu'on se souvienne de moi. $NAME_Smeegibb$ a été un compagnon loyal, mais personne ne doit jamais savoir que j'ai un jour eu besoin de lui. Je peux affronter la galaxie en solo. Je laisserai MA trace, et la gloire sera mienne. Les richesses aussi.\n\nNote à moi-même : envoyer quelque chose à $NAME_Smeegibb$ pour qu'il se souvienne de moi.§!\n\nNous n'avons rien trouvé de plus. Aucune trace ni de la capitaine, ni de la §Ycarte des étoiles§!.\n\nPeut-être que le cadeau qu'elle a fait à $NAME_Smeegibb$ contient un indice sur l'endroit où se trouve le dernier fragment. Nous devons rétablir la communication."
 grand_archive.8230.a: "Enquête terminée"
 grand_archive.8236.name: "Disparition de $NAME_Smeegibb$"
 grand_archive.8236.desc.default: "$smeegibb_shelter_system_2_poi_desc$"
 grand_archive.8236.desc.xenophile: "$smeegibb_shelter_system_2_poi_desc$\n\nNous espérons que notre nouvel ami est sain et sauf."
 grand_archive.8236.a: "Vers [smeegibb_system.GetName]"
 grand_archive.8241.name: "Le retour de l'$NAME_BlackNeedle$"
 grand_archive.8241.desc: "Une flotte conséquente portant le drapeau d'une organisation pirate appelée l'§Y$NAME_BlackNeedle$§! a été aperçue en orbite autour de [smeegibb_shelter.GetName]. Nous pensons que ces pirates nous ont suivis et rasé la colonie abritant le collectif $NAME_Smeegibb$. Ils sont certainement toujours à la recherche du fragment de la §Ycarte des étoiles§!.\n\nIl n'y a plus aucun signe de vie sensible sur la planète.\n\nNous recevons une transmission de leur vaisseau de tête."
 grand_archive.8245.name: "$NAME_CaptainInax$ de l'$NAME_BlackNeedle$"
 grand_archive.8245.desc.inax.1: "§HUn arthopoïde se tient debout devant nous. Ses yeux à facettes s'illuminent lorsqu'il nous aperçoit. Son allure disciplinée est en forte contradiction avec ses mandibules qui s'agitent et émettent des clics irréguliers.§!\n\nNous nous renc-c-controns enfin. Comment avez-vous réussi à vainc-c-cre le §Yc-c-capitaine Hoo§!, bande de peaux molles ? Même ce vieux c-c-crétin aurait dû pouvoir éliminer sans peine votre pitoyable flotte. Vous allez payer pour avoir"
 grand_archive.8245.desc.inax.2: "Merci de nous avoir c-c-conduits jusqu'ici. §Y$NAME_SilverQuill$§! a traqué ce misérable $NAME_Smeegibb$ pendant plus de cent cycles. Apaiser sa rancoeur me promet à une grosse récompense... Dès que j'en aurai fini avec vous."
 grand_archive.8245.desc.ransacked: "$grand_archive.8245.desc.inax.1$ p-p-pillé notre base de [black_needle_base.GetName].\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.desc.stolen: "$grand_archive.8245.desc.inax.1$ v-v-volé l'§YAig-g-guille Noire§!.\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.a: "Qui êtes-vous ?"
 grand_archive.8245.a.reply: "A-a-appelez-moi Inax. Je suis l'amiral de l'§YAig-g-guille Noire§!.\n\nVous connaissez maintenant le nom de la créature qui va vous t-t-tuer. Une mort honorable. Je vous conseille de l'accepter.\n\nComme le veut la c-c-coutume, vous pouvez tirer le premier coup de feu."
 grand_archive.8245.b: "Vous avez tué $NAME_Smeegibb$..."
 grand_archive.8245.b.reply.common: "C'était d'une simplicité d-d-déconcertante. Nous avons teint leur taudis du sang bleu de molluscoïde. Pas de flotte, pas d'armes... Ça leur p-p-pendait au nez. Nul ne survit en croisant la route de l'§YAig-g-guille Noire§!.\n\nC'étaient vos amis ? Comme c'est t-t-touchant. Vous les reverrez très bientôt. Au nom de §Y$NAME_SilverQuill$§!, nous"
 grand_archive.8245.b.reply.default: "$grand_archive.8245.b.reply.common$ arracherons cette c-c-carte de vos c-c-cadavres encore chauds."
 grand_archive.8245.b.reply.robot: "$grand_archive.8245.b.reply.common$ vous arracherons cette c-c-carte en regardant vos lumières s'éteindre."
 grand_archive.8245.c: "Qui est $NAME_SilverQuill$ ?"
 grand_archive.8245.c.reply: "Qui est §Y$NAME_SilverQuill$§! ?! Quelle q-q-question ! C'est notre légendaire fondateur, celui qui tire les ficelles. Avec un seul vaisseau, il a fondé l'§YAig-g-guille Noire§! et en fait une entreprise d'envergure galactique.\n\nL'Aig-g-guille Noire perpétue son héritage. Votre mort sera la p-p-prochaine note de notre symphonie."
 grand_archive.8245.d: "Pourquoi voulez-vous la carte des étoiles ?"
 grand_archive.8245.d.reply: "Vous ignorez ce que vous avez en votre possession ? C'est la carte du trésor de la §YC-c-apitaine Ness§! ! Tous les c-c-crédits et bijoux qu'elle a amassés au cours de sa vie.\n\nEt cette richesse nous appartient. Dès que nous la posséderons, nos noms seront chantés dans toute la galaxie. Chaque système craindra l'§YAig-g-guille Noire§!... Vous êtes la p-p-première note de notre symphonie. N'est-ce pas un cadeau merveilleux ?"
 grand_archive.8245.e: "Nous n'abandonnons pas si facilement"
 grand_archive.8245.e.reply: "Alors, chantons ! Je ferai de vos [this.species.GetRemnantNamePlural] un trophée que je présenterai en cadeau à mon c-c-commandant."
 grand_archive.8265.name: "$grand_archive.8245.name$"
 grand_archive.8265.desc: "Nous nous souviendrons de cette bataille ! Vous n'êtes pas aussi f-f-faibles que vous en avez l'air. Nous vous avons déjà sous-estimés deux fois, cela ne se reproduira pas. Lors de notre p-p-prochaine rencontre, l'§YAig-g-guille Noire§! ne se retiendra pas.\n\nCeci n'est pas un avertissement, mais une condamnation à mort."
 grand_archive.8265.a.scared: "C'est assez troublant..."
 grand_archive.8265.a.homicidal: "Nous vous attendons !"
 grand_archive.8265.a.gestalt: "Fin de la transmission"
 gateway_to_ness_treasure_system_poi: "La carte est marquée d'une croix"
 gateway_to_ness_treasure_system_poi_desc: "La §Hcarte des étoiles§! est désormais complète. Elle a révélé un dernier système caché appelé [Prev.GetName]. Notre longue quête touche à sa fin... Allons-y et découvrons ce qui nous attend !"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT: "Capsule cachée"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT_DESC: "D'après notre enquête, le prochain fragment de la §Hcarte des étoiles§! devrait se trouver quelque part dans la colonie en ruine de [this.GetName].\n\nÉtant donné la solidité des autres capsules, elle devrait avoir survécu au récent bombardement."
 grand_archive.8270.name: "Secret de la statue"
 grand_archive.8270.desc: "Nous avons mis la main sur le quatrième fragment de la §Ycarte des étoiles§! sur [from.GetName]. La capsule était encastrée dans une statue de pierre représentant un drone du collectif aujourd'hui disparu, $NAME_Smeegibb$. Voici ce que l'on pouvait y lire :\n\n§L« À mon fidèle compagnon : un gage de ma reconnaissance. Que ta solitude soit longue et paisible. »§!\n\nUne fois ce dernier fragment décodé, nous pourrons partir à la recherche du trésor de la §Y$NAME_CaptainNess$§!."
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT: "Le dernier fragment de carte"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT_DESC: "Maintenant que nous avons extrait la capsule des ruines de la colonie de $NAME_Smeegibb$, il ne nous reste plus qu'à en décrypter les données et à compléter la §Hcarte des étoiles§!. Nous découvrirons bientôt ce qui nous attend au bout de cette quête sur les traces de la §H$NAME_CaptainNess$§!."
 grand_archive.8280.name: "Carte complète"
 grand_archive.8280.desc: "Une fois décodé, le nouveau fragment de données a complété notre §Ycarte des étoiles§!. Des points lumineux brillèrent à différents noeuds indiquant les destinations intermédiaires que nous avons découvertes en cours de route. Les quatre points se sont ensuite mis à clignoter de concert avant de révéler un autre système caché.\n\nL'ajout du dernier fragment nous a donné accès à des informations supplémentaires. La §Ycarte§! n'est pas aussi sommaire qu'elle n'y paraît : elle contient des données sur des richesses perdues et des trésors clandestins aux quatre coins de la galaxie, recueillies par la §Y$NAME_CaptainNess$§!. Certaines de ces données ne sont peut-être plus valables, mais cet appareil est capable de détecter de précieux trésors dans tous nos systèmes.\n\nEt ce n'est pas tout ! La §Ycarte§! contient également des notes explicatives sur tous les trésors découverts par la capitaine au cours de sa carrière. Elle y décrit comment identifier, évaluer et proposer les objets de valeur aux vendeurs potentiels pour en tirer un maximum de profit. La réactivation de l'appareil nous fournira les plans d'une chambre aux trésors unique qui permettra à nos colonies de bénéficier des connaissances exceptionnelles de la capitaine et de valoriser nos trésors."
 grand_archive.8280.a.lom: "Un trésor inestimable"
 grand_archive.8285.name: "La carte est marquée d'une croix"
 grand_archive.8285.desc: "L'achèvement de la §Ycarte des étoiles§! est un grand moment pour la [this.GetName]. Maintenant qu'elle nous a dévoilé tous ses secrets, nous sommes aiguillés vers une destination inéluctable : le système de [gateway_to_ness_treasure_system.GetName].\n\nAprès avoir surmonté bien des obstacles, nous n'en sommes plus qu'à un pas. Il ne nous reste plus qu'à découvrir ce que cache cette §Ycarte§!.\n\nLe succès n'est pas garanti, mais nous ne ferons pas marche arrière. Allons au bout de cette aventure !"
 grand_archive.8285.a.default: "C'est parti !"
 grand_archive.8285.a.lom: "En avant !"
 councilor_head_treasure_hunter: "Responsable de la chasse aux trésors"
 councilor_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_head_treasure_hunter_desc: "Cette personnalité analyse attentivement la §Ycarte des étoiles§! pour débusquer les caches et évaluer les objets de valeur."
 councilor_corporate_head_treasure_hunter: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_desc: "$councilor_head_treasure_hunter_desc$"
 prospect_of_treasure_modifier: "Chasse aux trésors"
 prospect_of_treasure_modifier_tt: "$mod_treasure_trove_reward_mult$ §G+$@prospect_of_treasure_treasure_trove_reward|0%$§!, production des £job_treasure_gatherer£conservateurs de trésors §G+$@prospect_of_treasure_treasure_gatherers_produces|0%$§! et £energy£crédits énergétiques par mois §G+$@prospect_of_treasure_energy_produces|0$§! par niveau de dirigeant :\n\n"
 grand_archive.8290.name: "Le goût des trésors"
 grand_archive.8290.desc.chart: "Avec la création de la chambre aux trésors sur [from.GetName], nous pensons que la §Ycarte des étoiles§! peut contribuer de manière significative à notre économie."
 grand_archive.8290.desc.trove: "Alors que nous distribuons les ressources du trésor découvert sur [from.GetName], il est évident que la §Ycarte des étoiles§! a le potentiel de contribuer de manière significative à notre économie."
 grand_archive.8290.desc.default: "Afin de tirer le meilleur parti de la §Ycarte§!, un nouveau poste a été créé au Conseil, dont la mission est de nous guider dans la découverte et la collecte de trésors."
 grand_archive.8290.desc.gestalt: "Afin de tirer le meilleur parti de la §Ycarte§!, nous avons pris des mesures visant à allouer davantage de ressources à la découverte et à la collecte de trésors."
 grand_archive.8290.desc.chart.default: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.chart.gestalt: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.desc.trove.default: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.trove.gestalt: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.tt: "\n§EPermet de déverrouiller ce poste au Conseil :§!\n§H$t$$councilor_head_treasure_hunter$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_treasure_trove_reward_mult$ : §G+$@councilor_head_treasure_hunter_treasure_trove_reward|0%$§!\n$ttt$$mod_planet_treasure_gatherers_produces_mult$ : §G+$@councilor_head_treasure_hunter_treasure_gatherers_produces|0%$§!\n$ttt$$mod_country_base_energy_produces_add$: §G+$@councilor_head_treasure_hunter_energy_produces|0$§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$scientist_with_icon$ $commander_with_icon$"
 grand_archive.8300.name: "Portail infesté de vers"
 grand_archive.8300.desc.common: "Ce doit être le portail qui nous mènera au trésor tant convoité."
 grand_archive.8300.desc.did_encounter_voidworms: "La carte nous a conduits à un trou noir jusqu'alors inexploré, et à un système infesté de vers du vide. Les plus gros d'entre eux tournent autour d'un portail délabré dans lequel ils ont fait leur nid.\n\n$grand_archive.8300.desc.common$ Si nous voulons aller au bout de notre quête, nous devons éliminer les vers du vide et réparer le portail."
 grand_archive.8300.desc.didnt_encounter_voidworms: "La carte nous a conduits à un trou noir jusqu'alors inexploré, et à un système infesté d'étranges créatures. Les plus gros d'entre eux tournent autour d'un portail délabré.\n\nCes énormes créatures, semblables à des vers, ne figurent dans aucune de nos bases de données sur la faune spatiale. Nous essayons actuellement d'établir une communication avec elles. $grand_archive.8300.desc.common$ Si nous voulons aller au bout de notre quête, nous devons éliminer ces créatures et réparer le portail."
 grand_archive.8300.a: "Rien ne nous arrêtera"
 grand_archive.8300.a.pacifist: "S'il le faut"
 grand_archive.8300.a.lom: "Faisons-leur la peau !"
 GATEWAY_VOIDWORMS_KILL_PROJECT: "$grand_archive.8300.name$"
 GATEWAY_VOIDWORMS_KILL_PROJECT_DESC: "La §Hcarte des étoiles§! nous a conduits à un §Hportail§! infesté dans le système de [this.solar_system.GetName]. Nous devons nous débarrasser de ces créatures si nous voulons réactiver le portail et voir ce qu'il y a de l'autre côté."
 GATEWAY_VOIDWORMS_KILL_PROJECT_TT: "§RÉliminez les créatures dans le système de [this.solar_system.GetName]§!"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT: "Restes de vers du vide"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT_DESC: "Les restes des vers du vide dans le système de [this.solar_system.GetName] présentent des données inhabituelles. Nos scanners semblent détecter des signes de vie dans l'une des troïkas en décomposition. Nous devrions envoyer un vaisseau scientifique pour enquêter."
 grand_archive.8310.name: "Portée de vers du vide"
 grand_archive.8310.desc.did_encounter_voidworms: "Nous avons découvert un groupe de nymphes niché dans le cadavre de l'un des vers du vide. Malgré ce que nous avons fait subir à leurs semblables, elles se sont approchées de nos vaisseaux pour nous supplier.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.didnt_encounter_voidworms: "Nous avons découvert un groupe de jeunes niché dans l'un des cadavres serpentins. Malgré ce que nous avons fait subir à leurs semblables, ils se sont approchés de nos vaisseaux pour nous supplier.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.common: "Nous pourrions utiliser leur attachement instinctif à notre avantage : une fois adultes, ces créatures spatiales pourraient constituer une impressionnante flotte organique."
 grand_archive.8310.a: "Une belle trouvaille"
 grand_archive.8310.a.tt: "Nous allons gagner une flotte de §Y$@gateway_voidworm_nymph_reward_count|0$ nymphes de vers du vide §2épiques§!§!."
 grand_archive.8310.b: "Ce sont des proies faciles"
 grand_archive.8315.name: "Recherches sur la technologie du portail"
 grand_archive.8315.desc: "Le portail du système de [FromFromFrom.System.GetName] est inactif. Alors que nous nous approchions de cette antique structure, la §Ycarte des étoiles§! nous a fourni une mine d'informations sur cette technologie oubliée. Comprendre cette ancienne méthode de déplacement pourrait s'avérer utile pour nos autres projets."
 RESEARCH_GATEWAY_ACTIVATION_PROJECT: "$grand_archive.8315.name$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_DESC: "$grand_archive.8315.desc$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_TT: "Rechercher la technologie £physics£§Y$tech_gateway_activation$§!"
 grand_archive.8325.name: "Activation du portail"
 grand_archive.8325.desc.common: "Rétablir la connexion entre les systèmes est la dernière étape ; la carte ne donne pas plus d'informations. Nous découvrirons bientôt ses secrets."
 grand_archive.8325.desc.tech: "Maintenant que nous avons recherché la technologie nécessaire, nous pouvons réactiver l'ancien portail du système de [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.known: "Les créatures ne représentent plus aucun danger, nous pouvons désormais réactiver l'ancien portail du système de [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.unknown: "Les vers du vide ne représentent plus aucun danger, nous pouvons désormais réactiver l'ancien portail du système de [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 ACTIVATE_GATEWAY_PROJECT: "$grand_archive.8325.name$"
 ACTIVATE_GATEWAY_PROJECT_DESC: "Le §Hportail§! inactif du système de [this.solar_system.GetName] étant la dernière destination indiquée sur la §Hcarte des étoiles§!, il mène certainement à quelque chose de très important."
 ACTIVATE_GATEWAY_PROJECT_TT: "§HActiver le portail§!"
 grand_archive.8400.name: "Oh, un trésor !"
 grand_archive.8400.desc: "Après avoir activé le portail indiqué sur la §Ycarte des étoiles§!, le système de [ness_treasure_system.GetName] s'est ouvert à nous. La disposition des corps célestes correspond aux notes trouvées dans le journal de la §Y$NAME_CaptainNess$§!.\n\nNotre long voyage touche à sa fin."
 grand_archive.8400.a: "C'est parti !"
 ness_treasure_system_poi: "Voyage à travers le portail du système de [from.solar_system.GetName]"
 ness_treasure_system_poi_desc: "Nous avons suivi la §Hcarte des étoiles§! jusqu'au bout, combattu des pirates et des créatures monstrueuses, trouvé et réactivé le portail. Il ne nous reste plus qu'à le traverser pour découvrir ce qui nous y attend."
 #Megastructure
 gateway_ness_ruined: "$gateway_ruined$"
 gateway_ness_ruined_DESC: "$gateway_ruined_DESC$"
 gateway_ness_ruined_MEGASTRUCTURE_DETAILS: "$gateway_ruined_MEGASTRUCTURE_DETAILS$"
 gateway_ness_restored: "$gateway_final$"
 gateway_ness_restored_DESC: "$gateway_final_DESC$"
 gateway_ness_restored_MEGASTRUCTURE_DETAILS: "$gateway_final_MEGASTRUCTURE_DETAILS$"
 NESS_GRAND_ARCHIVE: "Trésor de la $NAME_CaptainNess$"
 NESS_GRAND_ARCHIVE_HOARDED: "$NESS_GRAND_ARCHIVE$"
 grand_archive.8405.name: "Une embuscade !"
 grand_archive.8405.desc: "Nous avons été suivis.\n\nUne impressionnante flotte de l'§Y$NAME_BlackNeedle$§! nous attendait dans le système de [ness_treasure_system.GetName]. Leurs rangs se sont considérablement élargis depuis notre dernière rencontre, ils comprennent désormais des vaisseaux militaires déclassés et des vaisseaux civils équipés d'armes de haute technologie. Il semble qu'ils aient rassemblé toute leur flotte de réserve pour cette confrontation finale. Au centre se trouve leur vaisseau amiral, un énorme engin de classe $titan$.\n\nLeur formation laisse penser qu'ils sont prêts à combattre, mais de nombreux vaisseaux n'ont pas encore préparé leurs armes. On dirait qu'ils veulent négocier.\n\nNous recevons une transmission du vaisseau amiral."
 grand_archive.8405.a.lom: "Négocions"
 grand_archive.8410.name: "$NAME_CobaltQuill$, capitaine de l'$NAME_BlackNeedle$"
 grand_archive.8410.desc: "§HMalgré sa petite stature, ce capitaine pirate inspire le respect. Ses yeux nous scrutent, nous calculent comme si nous faisions partie d'une équation complexe.§!\n\nNous nous rencontrons enfin. $NAME_CobaltQuill$ à votre service. Je suis un capitaine de la célèbre §Y$NAME_BlackNeedle$§! et un modeste descendant de notre fondateur, $NAME_SilverQuill$. Vous êtes une épine dans mon pied depuis de nombreuses années, mais je suis raisonnable. J'ai une proposition à vous faire.\n\nNous vous donnerons une récompense considérable et vous laisserons vous en tirer à bon compte et, en échange, vous nous donnerez la carte complète.\n\nSi vous refusez, nous n'aurons pas d'autre choix que de vous la prendre par la force. Notre flotte est supérieure, et nous avons infiltré votre empire à plusieurs endroits clés. Un seul ordre de ma part suffira à vous sauver de la ruine."
 grand_archive.8410.a: "Que proposez-vous ?"
 grand_archive.8410.a.reply: "Malgré toute la frustration que vous avez causée, je suis prêt à vous offrir une récompense considérable en échange de la relique de la §Y$NAME_CaptainNess$§!.\n\nSi vous acceptez cette offre généreuse, je vous pardonnerai toutes vos fautes passées. Il n'y a aucune raison pour que ce conflit se poursuive... ou s'aggrave."
 grand_archive.8410.b: "Vous nous menacez..."
 grand_archive.8410.b.reply.common_1: "Je sais tout ce qu'il y a à savoir sur la [this.GetName]. Vos chaînes d'approvisionnement, l'emplacement de vos silos de stockage, la distribution vers vos bases stellaires... tout est méticuleusement répertorié."
 grand_archive.8410.b.reply.common_2: "Mes hommes ont fait leurs devoirs et je sais exactement comment démanteler votre empire. J'affamerai vos planètes, je pillerai vos ressources et je détruirai le reste. À moins que vous ne me donniez ce que je veux, bien entendu..."
 grand_archive.8410.b.reply.default: "$grand_archive.8410.b.reply.common_1$\n\nJe surveille tous vos dirigeants de confiance ainsi que leurs familles...\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.hive_mind: "$grand_archive.8410.b.reply.common_1$\n\nJe surveille chaque noeud majeur de votre collectif et suis averti lorsqu'un nouveau est créé.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.machine: "$grand_archive.8410.b.reply.common_1$\n\nJ'ai une porte dérobée dans votre matrice et je suis la position de chaque noeud principal dans votre réseau.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.c: "Alors pourquoi négocier ?"
 grand_archive.8410.c.reply: "Un sabotage de cette ampleur représente un certain coût. L'entretien des vaisseaux, les salaires, les pots-de-vin... tout cela coûte cher, et je ne suis pas devenu riche en dépensant de l'argent inutilement. L'ampleur pure et simple de la destruction qui vous attend lorsque vous actionnez un interrupteur implique un coût d'opportunité considérable.\n\nIl y a de meilleures façons de dépenser de l'argent durement gagné. Évitons cette effusion de sang inutile. Prenez vos richesses nouvellement acquises et laissez la piraterie aux experts."
 grand_archive.8410.d: "Ce n'est pas qu'une question de crédits, pas vrai ?"
 grand_archive.8410.d.reply: "Un de mes ancêtres, le grand $NAME_SilverQuill$, était le second de la $NAME_CaptainNess$ il y a 5 000 ans. Il l'a fidèlement servie pendant des années, et comment a-t-il récompensé ?\n\nPar la trahison !\n\nElle l'a livré aux autorités pour empocher le butin ! Mais aucune prison n'aurait pu retenir le puissant $NAME_SilverQuill$ à jamais.\n\nAprès une évasion audacieuse, il s'est relevé de ses cendres proverbiales et a mis sur pied la légendaire $NAME_BlackNeedle$, cette bande bigarrée qui se tient aujourd'hui devant vous. Il a juré de se venger de cette traîtresse de $NAME_CaptainNess$ et a ainsi passé sa vie à piller son trésor et a enterré son héritage sous le poids de son propre succès.\n\nJe ne fais que finir ce qu'il a commencé. Cette carte est la clé de ce qui nous appartient de droit.\n\nMaintenant, remettez-la-nous, s'il vous plaît."
 grand_archive.8415.name: "Une offre audacieuse"
 grand_archive.8415.desc: "Le chef de l'§Y$NAME_BlackNeedle$§! nous a proposé une grosse récompense en échange de la §Ycarte des étoiles§!. Accepter reviendrait à lui remettre la clé du trésor de la §Y$NAME_CaptainNess$§!.\n\nMais refuser nous attirerait leurs foudres. On ne sait pas à quel point ces pirates ont infiltré nos rangs, mais ils ont menacé de détruire la [this.GetName] de l'intérieur. Reste à voir s'il s'agit de menaces en l'air."
 grand_archive.8415.a: "Déclinons leur offre"
 grand_archive.8415.b: "Vendons la §Ycarte des étoiles§!"
 grand_archive.8415.b.effect_tt: "Fait perdre la §Ycarte des étoiles§!\nDonne §G+$@max_credit_mult|0%$§! de votre £energy£énergie maximum\nDonne un vaisseau de l'§Y$NAME_BlackNeedle$§!"
 grand_archive.8500.name: "Affaire conclue"
 grand_archive.8500.desc: "Nous avons remis la §Ycarte des étoiles§! en échange d'une énorme somme de $MONEY$ et d'un extraordinaire vaisseau amiral baptisé §YOEil de l'Aiguille§!. Cela règle une fois pour toutes notre conflit avec les pirates de l'§Y$NAME_BlackNeedle$§!.\n\nNous avons évité un combat avec leurs flottes et un sabotage d'ampleur galactique.\n\nIl est préférable de laisser la piraterie aux pirates."
 grand_archive.8500.a: "Nous n'avons plus rien à faire ici"
 grand_archive.8500.a.tt: "Tous les vaisseaux quittent le système du trésor."
 HOARD_LOOTED_BY_PIRATES: "Cette structure a été pillée par les pirates et ne contient plus rien de valeur"
 grand_archive.8505.name: "Sabotage !"
 grand_archive.8505.desc: "L'§Y$NAME_BlackNeedle$§! a lancé une attaque de grande envergure et plongé nos systèmes dans le chaos. Les lignes d'assemblage sont à l'arrêt, les générateurs ont grillé et les infrastructures administratives essentielles ont été paralysées. Des cargaisons disparaissent, les données des stations de recherche ont été effacées et les mines s'effondrent à une vitesse cinq fois supérieure à la normale.\n\nLa dévastation frappe tout notre empire. Elle est le résultat du sabotage sournois de milliers d'acteurs malveillants qui se cachent dans nos colonies et semblent avoir une longueur d'avance sur nous."
 grand_archive.8505.a: "Alerte rouge !"
 situation_sabotage: "Saboteurs de l'Aiguille Noire"
 situation_sabotage_type: "$situation_sabotage$"
 situation_sabotage_desc: "Un vaste réseau de saboteurs de l'§Y$NAME_BlackNeedle$§! se cache dans nos colonies et a largement paralysé la [owner.GetName]. Si nous ne les neutralisons pas au plus vite, ils continueront jusqu'à ce que nos lignes d'approvisionnement s'effondrent complètement."
 situation_sabotage_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 approach_sabotage_do_nothing: "Ne rien faire"
 approach_sabotage_do_nothing_tt: "Nous ne ferons rien."
 approach_sabotage_purge: "Éliminer les saboteurs"
 approach_sabotage_purge_tt: "Traquer les agents qui se cachent dans nos propres rangs entraînera inévitablement des dommages collatéraux."
 approach_sabotage_mitigate: "Minimiser les dégâts"
 approach_sabotage_mitigate_tt: "Nous pouvons prendre des mesures ciblées pour reconstruire des infrastructures clés en attendant de gagner la guerre d'usure."
 finisher_effects_sabotage: "Nous éliminerons les saboteurs de l'Aiguille Noire et les empêcherons de bloquer le trésor de la capitaine Ness."
 finisher_effects_sabotage_fail: "Notre infrastructure sera irrémédiablement endommagée et l'Aiguille Noire continuera de bloquer le trésor de la capitaine Ness."
 grand_archive.8520.name: "Découverte d'un réseau de sabotage"
 grand_archive.8520.desc.common: "Nous avons trouvé la fréquence de communication utilisée par les pirates de l'§Y$NAME_BlackNeedle$§! pour envoyer des messages dans nos colonies. Après les avoir décodés, nous avons pu débusquer les conspirateurs et saboteurs cachés dans nos rangs."
 grand_archive.8520.desc.machine: "$grand_archive.8520.desc.common$\n\nLeurs agents ont secrètement répandu des logiciels malveillants dans notre système d'exploitation, créant une troupe dormante de rebelles qui occupent divers postes dans nos systèmes.\n\nCette reprogrammation malveillante va si loin que l'un de nos principaux noeuds indépendants de [root.GetName], §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!, a été corrompu."
 grand_archive.8520.desc.hive: "$grand_archive.8520.desc.common$\n\nLeurs agents ont diffusé des phéromones dissociatives dans nos habitats, ce qui a provoqué une déviation fondamentale chez nombre de nos drones. Par la suite, les pirates ont pu facilement réorganiser nos drones désorientés en cellules dormantes, qui détruisent actuellement nos infrastructures.\n\nIls ont même réussi à corrompre l'un des principaux noeuds indépendants de [root.GetName], §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!."
 grand_archive.8520.desc.default: "$grand_archive.8520.desc.common$\n\nNous avons découvert que leurs agents recrutent depuis des années des citoyens mécontents et les organisent en cellules dormantes pour les retourner contre nous.\n\n§Y[traitor_leader.GetClass] [traitor_leader.GetName]§! fait partie des traîtres, ce qui représente un risque considérable pour la sécurité. Nous devons nous occuper des conspirateurs tout en maintenant un certain niveau de stabilité. Si l'on apprenait publiquement que des éléments corrompus ont infiltré nos propres rangs, cela aurait des conséquences drastiques sur le gouvernement."
 grand_archive.8520.a.default: "Exécutons les traîtres"
 grand_archive.8520.a.machine: "Désactivons les unités déviantes"
 grand_archive.8520.a.hive: "Éliminons les drones déviants"
 grand_archive.8520.a.tt: "§R100§! £pop£§Hpops§! sont exécutées sur chaque planète peuplée."
 grand_archive.8520.b.default: "Mettons en place des mesures de rééducation pour les traîtres"
 grand_archive.8520.b.machine: "Reprogrammons les unités déviantes"
 grand_archive.8520.b.hive: "Réassimilons les drones déviants"
 grand_archive.8520.c: "Rendons l'identité des traîtres publique"
 grand_archive.8525.name.default: "Traître exécuté"
 grand_archive.8525.name.hive: "Déviant éliminé"
 grand_archive.8525.name.machine: "Unité désactivée"
 grand_archive.8525.desc.common: "Après que nous avons découvert son lien avec les pirates de l'§Y$NAME_BlackNeedle$§!"
 grand_archive.8525.desc.default: "$grand_archive.8525.desc.common$, [traitor_leader.GetName] a été exécuté[traitor_leader.GetXELead].\n\nLes circonstances exactes de sa mort ont été gardées secrètes."
 grand_archive.8525.desc.hive: "$grand_archive.8525.desc.common$, [traitor_leader.GetName] a été éliminé[traitor_leader.GetXELead]."
 grand_archive.8525.desc.machine: "$grand_archive.8525.desc.common$, [traitor_leader.GetName] a été désactivé[traitor_leader.GetXELead]."
 grand_archive.8525.a: "C'était nécessaire"
 grand_archive.8530.name.default: "Traître rééduqué"
 grand_archive.8530.name.hive: "Déviant réassimilé"
 grand_archive.8530.name.machine: "Unité reprogrammée"
 grand_archive.8530.desc.default: "$grand_archive.8525.desc.common$, le comportement de [traitor_leader.GetName] a été correctement corrigé.\n\nMalheureusement, ce processus de rééducation lui a laissé des séquelles permanentes."
 grand_archive.8530.desc.hive: "$grand_archive.8525.desc.common$, le comportement de [traitor_leader.GetName] a été correctement corrigé.\n\nMalheureusement, ce processus de réassimilation lui a laissé des séquelles permanentes."
 grand_archive.8530.desc.machine: "$grand_archive.8525.desc.common$, le comportement de [traitor_leader.GetName] a été correctement corrigé.\n\nMalheureusement, ce processus de reprogrammation lui a laissé des séquelles permanentes."
 grand_archive.8530.a.tt: "[traitor_leader.GetName] reçoit des traits négatifs (2 niveaux)"
 grand_archive.8535.name: "Mort de [traitor_leader.GetName]"
 grand_archive.8535.desc: "$grand_archive.8525.desc.common$, des citoyens en colère de [root.GetName] se sont rassemblés dans le cadre de manifestations organisées. La foule a pris d'assaut son domicile et [traitor_leader.GetHeShe] a été déclaré[traitor_leader.GetXELead] mort[traitor_leader.GetXELead] peu après."
 grand_archive.8536.name: "Fautes expiées"
 grand_archive.8536.desc: "$grand_archive.8525.desc.common$, [traitor_leader.GetHeShe] a exprimé publiquement de profonds regrets pour ses actes. Cette humiliation semble avoir eu un impact durable sur ses capacités à diriger.\n\nMalgré ses actes passés, les habitants de [root.GetName] semblent prêts à pardonner [traitor_leader.GetName]."
 grand_archive.8536.a: "Une évolution bienvenue"
 grand_archive.8536.a.tt: "[traitor_leader.GetName] reçoit des traits négatifs (1 niveau)"
 grand_archive.8545.name: "Effondrement des infrastructures"
 grand_archive.8545.desc: "Malheureusement, nous n'avons pas été en mesure de déjouer les actions de sabotage dévastatrices de l'§Y$NAME_BlackNeedle$§!. Ses saboteurs ont causé des dommages irréparables à nos infrastructures logistiques et il nous faudra de nombreuses années pour reconstruire nos chaînes d'approvisionnement. La corruption qui s'est répandue dans nos systèmes a pris une ampleur trop importante pour être endiguée.\n\nCela ne nous empêchera pas pour autant de revendiquer le §Ytrésor de la capitaine Ness§!. Il nous suffit de vaincre les pirates et il sera nôtre."
 grand_archive.8545.a: "Le combat n'est pas terminé"
 grand_archive.8550.name: "Résistance au sabotage"
 grand_archive.8550.desc: "Bien que les pirates de l'§Y$NAME_BlackNeedle$§! aient tout tenté pour saboter nos infrastructures, nous avons pu nous relever et nous stabiliser. Leurs agents ayant été vaincus, il ne nous reste plus qu'à terrasser leur flotte dans le système de [hoard_system.GetName] pour revendiquer le §Ytrésor de la capitaine Ness§! au nom de la [root.GetName]."
 grand_archive.8550.a: "Allons-y"
 grand_archive.8555.name: "$NAME_BlackNeedle$ vaincue"
 grand_archive.8555.desc: "Les pirates de l'§Y$NAME_BlackNeedle$§! n'ont tout simplement pas fait le poids face à la puissance de notre armée. Leurs flottes ayant été vaincues, ils ne peuvent plus poursuivre leurs tentatives de sabotage dans nos systèmes. Nous pouvons désormais revendiquer le §Ytrésor de la capitaine Ness§! au nom de la [root.GetName]."
 grand_archive.8555.a: "Une tentative pathétique"
 grand_archive.8555.a.lom: "De pitoyables marins d'eau douce"
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT: "La dernière bataille de l'$NAME_BlackNeedle$"
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_DESC: "Même pendant les vastes opérations de sabotage des systèmes de la [root.GetName], les pirates de l'$NAME_BlackNeedle$ ont maintenu leur blocus devant le §Htrésor de la capitaine Ness§!. Ils ont toutefois épuisé une grande partie de leurs ressources et se trouvent désormais dans une situation bien plus vulnérable. Si nous parvenons à les vaincre, leur organisation s'effondrera et nous pourrons nous approprier le trésor sans encombre."
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_TOOLTIP: "§RÉliminez l'$NAME_BlackNeedle$ dans le système de [solar_system.GetName].§!"
 grand_archive.8560.name: "$grand_archive.8410.name$"
 grand_archive.8560.desc: "Les enfants de Ness... Quelle ironie !\n\nElle vous a choisis, vous savez ?\n\nDes centaines d'espèces différentes parmi lesquelles elle aurait pu choisir... et son choix s'est arrêté sur vous. Peut-être a-t-elle vu quelque chose en vous ? Ou peut-être était-ce une pure coïncidence. Enfin, cela n'a plus d'importance.\n\nVous avez gagné... pour l'instant. Ne savourez pas trop cette victoire, vous vous êtes fait un ennemi puissant. L'§Y$NAME_BlackNeedle$§! ne pardonne pas et n'oublie jamais.\n\nComme mes ancêtres, nous continuerons. Nous nous reconstruirons petit à petit. Même si cela doit prendre des milliers ou un million d'années, nous reviendrons et nous récupérerons tout ce que vous nous avez volé.\n\nL'$NAME_BlackNeedle$ vivra éternellement ! À jamais !"
 grand_archive.8560.a: "L'avenir nous le dira"
 grand_archive.8560.a.lom: "Fichez le camp, les lavettes"
 CAPTAIN_NESS_HOARD_PROJECT: "Trésor de la capitaine Ness"
 CAPTAIN_NESS_HOARD_PROJECT_DESC: "Le §Htrésor de la capitaine Ness§! n'attend que nous.\n\nBien que la structure semble abandonnée, de nombreux systèmes sont encore actifs. Compte tenu du passé de la §H$NAME_CaptainNess$§!, nous devons nous préparer à des mesures de sécurité inattendues.\n\nL'étrange entrée comporte une encoche au niveau de la trappe centrale. Nous pouvons y insérer la §Hcarte des étoiles§! pour déverrouiller la mystérieuse installation."
 grand_archive.8565.name: "Trésor de la capitaine Ness"
 grand_archive.8565.desc: "La §Ycarte des étoiles§! était une clé et la chambre forte en était la serrure. Nous l'avons insérée dans la trappe principale de la mégastructure.\n\nLa carte s'est alors activée, et un rayon de lumière est apparu, retraçant chaque étoile de notre voyage.\n\nDes trésors incroyables, pillés dans des milliers de mondes, bordent le sol et les murs. De délicates statues côtoient des armes forgées dans des métaux précieux. Des bijoux raffinés pendent aux membres de vieux fossiles et des appareils complexes sont entassés en vrac.\n\nDes pas métalliques résonnent dans le couloir central. Une machine humanoïde remplie de liquide s'approche de nous, les bras levés pour exprimer sa reddition. Son système vocal grésille et s'active :\n\n§L« Vous... Vous avez trouvé ma carte. Vous êtes vraiment intelligents ! »§!"
 grand_archive.8565.a: "Ouvrons un canal"
 grand_archive.8565.a.lom: "Ohé, capitaine !"
 grand_archive.8570.desc: "§HMalgré des possibilités d'expression limitées par sa forme robotique, la machine, connue sous le nom de Capitaine Ness, nous regarde avec une certaine complaisance. Son corps métallique ne montre aucun signe d'usure et semble flambant neuf. Son ton est calme mais condescendant, comme si elle s'adressait à des subordonnés.§!\n\nJe vais me présenter rapidement, même si vous avez sans doute déjà deviné qui je suis.\n\nJe suis Saanda Ness, ou plutôt j'étais. On m'appelait autrefois la « reine des pirates galactiques », mais j'habite aujourd'hui dans cet amas de métal froid.\n\n§HElle s'arrête pour nous observer.§!\n\nCela faisait longtemps que je n'avais pas vu de membres de votre espèce. Votre civilisation primitive semble avoir bien évolué !\n\nJe dois dire que je suis très impressionnée que vous soyez arrivés jusqu'ici."
 grand_archive.8570.a: "Comment se fait-il que vous soyez encore en vie ?"
 grand_archive.8570.a.reply_fallen_empire: "L'immortalité a un prix. J'ai donné quelques millions de crédits à des scientifiques de la [fallen_empire.GetRealName] pour qu'ils transfèrent ma conscience en toute discrétion. Ils ont fait du bon travail, mais je ne peux plus danser aussi bien qu'avant.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply_curator: "L'immortalité a un prix. J'ai donné quelques millions de crédits à des scientifiques de la $NAME_Curator_Order$ pour qu'ils transfèrent ma conscience en toute discrétion. Ils ont fait du bon travail, mais je ne peux plus danser aussi bien qu'avant.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply: "§HLa machine active une console qui révèle une chambre cachée derrière un mur. À l'intérieur se trouve une vieille cryocapsule contenant la dépouille d'un être organique.§!\n\nC'est moi. Un ornement inutile, mais je suis un peu sentimentale. J'étais pas mal, non ?\n\nAprès m'être assurée que tout était en ordre, j'ai verrouillé cet endroit pour quelques milliers d'années. Et puis vous avez ouvert la porte et nous voilà en train de discuter. J'ai l'impression de m'être endormie hier..."
 grand_archive.8570.b: "D'où viennent tous ces trésors ?"
 grand_archive.8570.b.reply: "Je les ai volés, pour la plupart. Ou échangés contre d'autres biens mal acquis. J'ai volé tous les gens importants de la galaxie. Cargos, armes de colosses... j'ai tout détourné. Selon ma logique, si je parvenais à voler une chose aussi facilement, c'est que son propriétaire n'était pas digne de la posséder.\n\nParfois, ça se corsait... Vous avez vu ce qui est arrivé aux Ytterites, j'imagine. Ça m'a ouvert les yeux.\n\nC'est amusant jusqu'à ce que ça dégénère..."
 grand_archive.8570.c: "Pourquoi nous avez-vous choisis ?"
 grand_archive.8570.c.reply: "Me croiriez-vous si je vous disais que je me sentais seule ?\n\n§HLe système vocal de la machine grésille, comme si elle riait.§!\n\nJ'avais tous ces trésors, mais pour quoi faire ? Que m'apportaient-ils en fin de compte ? Je me suis rendu compte que ce n'était pas la richesse que je voulais, mais un héritage. Sauf qu'un héritage ne se vole pas, ça se crée... mais comment ?\n\nC'était ma façon de faire. J'ai repéré les espèces primitives les plus prometteuses et rempli leurs mondes de trésors... et puis bien sûr, j'ai créé la carte. L'espèce qui reconstituerait ma carte en premier réussirait le test et serait digne d'hériter de l'oeuvre de ma vie. Nous y voilà.\n\nPeut-être que votre espèce réussira là où j'ai échoué et trouvera une utilité à tout cela."
 grand_archive.8570.d: "Pourquoi donnez-vous tout ?"
 grand_archive.8570.d.reply: "Comme je l'ai dit, je passe le flambeau. Je ne suis pas douée pour dépenser de l'argent, je ne sais que le prendre.\n\nJe ne voulais pas le donner à n'importe qui. Je cherchais des êtres assez intelligents pour atteindre cet endroit, un équipage qui me rendrait fière et à qui je pourrais raconter mon histoire."
 grand_archive.8570.e: "Quelle est votre histoire ?"
 grand_archive.8570.e.reply: "Puisque vous demandez...\n\n§HLa machine active une console et une série de documents numériques sont projetés sur le mur.§!\n\nCet endroit est ma biographie. J'ai versé beaucoup d'argent à une équipe d'auteurs pour qu'ils consignent chaque moment mémorable de ma vie. Je trouve qu'ils se sont bien débrouillés.\n\n§HLes images passent à un cockpit où l'on voit la capitaine Ness sous forme biologique aux commandes. Un petit craquement s'échappe du système vocal de la machine ; on aurait dit un soupir.§!\n\nJ'étais autrefois la pirate la plus redoutée de toute la galaxie. J'ai mené des mégacorporations à la faillite, pris en otage des planètes entières et réduit des empires en cendres. Tous ceux qui ont été assez stupides pour s'opposer à moi ont rapidement goûté à ma lame ou ont été vendus contre une prime. Ma propre prime ? Astronomique."
 grand_archive.8570.f: "Poursuivez"
 grand_archive.8570.f.reply: "§HDes images numériques de différents braquages, vols et évasions, accompagnées d'une musique héroïque, sont projetées sur le mur.§!\n\nAu début, je choisissais soigneusement mes cibles et je trouvais une raison quelconque pour qu'elles le méritent. Chaque mission était plus palpitante que la précédente. C'était un cycle : planifier, diaboliser, voler, célébrer. Le problème, c'est que chercher des cibles qui le « méritaient » prenait trop de temps. Je devais élargir mes horizons.\n\nÀ un moment donné, j'ai commencé à prendre ce que je voulais sans réfléchir. Je prenais plaisir à voir les chiffres grimper : le montant de ma prime et la valeur de mon trésor. Je laissais mon empreinte dans la galaxie et ne serais jamais oubliée. Tout le reste importait peu."
 grand_archive.8570.g: "Qu'est-ce qui a changé ?"
 grand_archive.8570.g.reply: "§HLes ruines du monde natal des Ytterites sont projetées sur le mur.§!\n\nL'incident des Ytterites est arrivé... Vous l'avez vu, pas vrai ? Je me souviens encore des cris à la radio lorsque les derniers d'entre eux ont été exterminés. Les choses étaient allées trop loin. Le moment était venu de changer.\n\nAu cours de ma carrière, j'ai découvert que les choses suivaient un certain schéma : l'histoire s'efface, les leçons du passé sont oubliées et un ou une nouvelle prend ta place. Je voulais simplement pouvoir choisir qui viendrait après moi.\n\nEt c'est vous que j'ai choisis. Les [root.GetSpeciesNamePlural] ont réussi mon test. La suite ne dépend que de vous."
 grand_archive.8575.name: "Une richesse incommensurable"
 grand_archive.8575.desc.default: "Le §Ytrésor de la capitaine Ness§! contient une quantité inimaginable de richesses. Nous devrions toutefois réfléchir aux conséquences de sa revendication.\n\nChaque crédit qui compose ce trésor a été obtenu illégalement. Prendre ces ressources reviendrait à accepter les actes criminels de la $NAME_CaptainNess$.\n\nToutefois, beaucoup de ceux que la capitaine a volés sont morts depuis longtemps ; revendiquer cette richesse ne créerait pas de nouvelles victimes. De plus, nous avons décimé l'§Y$NAME_BlackNeedle$§! et fait de la galaxie un endroit plus sûr. Le chemin jusqu'ici a été long et empli de dangers, nous méritons bien une belle récompense.\n\nNous devons décider de ce que nous allons faire du trésor."
 grand_archive.8575.desc.lom: "Le §Ytrésor de la capitaine Ness§! est exceptionnel et nous l'acceptons avec grand plaisir.\n\nIl s'agit d'une récompense durement gagnée pour le démantèlement de l'§Y$NAME_BlackNeedle$§! ; triple hourra pour la [this.GetName] !\n\nEmportons tout. Toutes les [This.Species.GetHandNamePlural] au boulot !"
 grand_archive.8575.a.default: "Revendiquons-le en notre nom"
 grand_archive.8575.a.lom: "Nous avons bien mérité ce butin"
 grand_archive.8575.b: "Rendons les objets identifiables à leurs propriétaires"
 grand_archive.8575.c: "Partageons cette richesse avec toute la galaxie"
 grand_archive.8580.name: "Notre mécène"
 grand_archive.8580.desc.1: "§HLa machine connue sous le nom de §Y$NAME_CaptainNess$§! a été impressionnée par la rapidité avec laquelle nous avons vidé sa chambre forte.§!\n\nAllez-y, vous l'avez bien mérité. Beaucoup de sang, de sueur et de larmes ont été versés pour ce trésor. Ne dépensez pas tout d'un coup."
 grand_archive.8580.desc.2: "§HLa machine connue sous le nom de §Y$NAME_CaptainNess$§! est quelque peu contrariée par notre désir de restituer une partie de son trésor durement acquis à ses anciens propriétaires.§!\n\nQuelle déception ! Un héritier quelconque de la quinzième génération va donc recevoir les vieux bijoux de ses ancêtres. J'espère que vous utiliserez ce qui restera pour une entreprise plus utile. Malgré tout, j'ai confiance en votre capacité à faire ce qui est juste."
 grand_archive.8580.desc.3: "§HLa machine connue sous le nom de §Y$NAME_CaptainNess$§! n'a pas caché son dégoût en apprenant que nous voulions donner tous ses trésors.§!\n\nC'est ça, votre grand projet ? Des cadeaux pour tout le monde ? Qu'ont-ils fait pour le mériter ? Quel gâchis !\n\nJe pensais que vous valiez mieux que ça... Mettez au moins une partie de votre flotte à ma disposition pour que je puisse essayer de repartir à zéro."
 grand_archive.8580.desc.default: "§HIl ne nous reste plus qu'à décider de ce qu'il adviendra de la $NAME_CaptainNess$. En tant que pilote expérimentée ayant survécu à de nombreux affrontements dangereux, elle ferait une excellente commandante pour notre flotte. Elle pourrait également assumer un rôle de soutien et prendre en charge la formation de la prochaine génération de pilotes.§!"
 grand_archive.8580.desc.no_lom: "§HÀ moins, bien sûr, que nous ne l'enfermions tout simplement, démontrant ainsi à nos concitoyens qu'aucun crime ne reste impuni. Elle aurait tout le temps de réfléchir à ce qu'elle a fait.§!"
 grand_archive.8580.desc.gestalt: "§HIl ne reste plus qu'à décider du sort de la $NAME_CaptainNess$. Esprit puissant et indépendant, elle nous apporterait de grands avantages en tant que commandante et pourrait nous fournir des stratégies créatives qui surprendraient nos adversaires. Nous pourrions également tirer parti de sa grande expérience du combat et l'intégrer à notre savoir collectif, élargissant ainsi notre compréhension globale de la guerre.\n\nNous pourrions aussi tout simplement la mettre en prison, afin de montrer que les comportements déviants et la criminalité ne sont pas tolérés au sein de la [this.GetName].§!"
 grand_archive.8580.a: "Nous pourrions avoir besoin d'une pilote compétente"
 grand_archive.8580.a.tt: "Une §Yamirale immortelle§! de compétence 10 intègre votre vivier"
 grand_archive.8580.b: "§YNous intégrerons vos connaissances dans notre conscience§!"
 grand_archive.8580.c: "§YAidez-nous à former nos pilotes en herbe§!"
 grand_archive.8580.d: "§RVous allez pourrir en prison§!"
 grand_archive.8585.desc: "Alors c'est comme ça ?\n\nVous me mettez de côté ?\n\nQuelle déception... Je suppose qu'il est temps pour moi de passer à autre chose.\n\nBonne continuation, alors."
 grand_archive.8585.a: "Nous ne vous devons rien"
 grand_archive.8590.desc: "Vous n'avez vraiment rien dans la tête ! Je vous donne le monde, et vous me donnez des menottes ? Vous ne méritez pas ce que je vous ai offert ! Vous n'êtes pas dignes de me cirer les bottes !\n\nMaudite soit la [this.GetName], allez tous au diable !\n\nQue vos [this.species.GetRemnantNamePlural] pourrissent dans le vide et que votre nom tombe dans l'oubli."
 grand_archive.8590.a: "Aucun crime ne reste impuni"
 grand_archive.8595.name: "Désactivation de la $NAME_CaptainNess$"
 grand_archive.8595.desc: "La machine jetée en prison, connue sous le nom de §Y$NAME_CaptainNess$§!, a été retrouvée désactivée dans sa cellule. Nous pensons qu'elle a délibérément provoqué une défaillance critique dans ses circuits, entraînant l'arrêt des systèmes principaux et la suppression de toutes les données stockées dans sa conscience transférée. Un message a été gribouillé sur les murs de la cellule :\n\n§LLe vide sera votre fin...§!"
 grand_archive.8595.a: "Une fin à sa mesure"
 grand_archive.8600.name: "Au bout de l'arc-en-ciel"
 grand_archive.8600.desc.common: "Le temps est venu pour nous de décider de notre propre destin. Nous n'avons plus de carte pour nous guider ; les étoiles elles-mêmes seront nos guides.\n\nQu'allons-nous accomplir ? Comment se souviendra-t-on de nous ?"
 grand_archive.8600.desc.default: "Cette aventure est terminée. La recherche du trésor de la §Hcapitaine Ness§! a été couronnée de succès.\n\n$grand_archive.8600.desc.common$\n\nC'est ici que commence la véritable histoire de la [this.GetName]."
 grand_archive.8600.desc.lom: "Que d'histoires circuleront sur cette aventure ! Nous avons découvert le trésor caché de la capitaine Ness et n'avons laissé aucun équipage se mettre en travers de notre route.\n\n$grand_archive.8600.desc.common$\n\nLa [this.GetName] a toutes les raisons d'être fière. Notre histoire commence maintenant !"
 grand_archive.8600.a.default: "En avant !"
 grand_archive.8600.a.lom: "Yo ho ho !"
 valuable_insight: "Une information précieuse"
 grand_archive.9960.name: "$tech_alien_cloning$"
 grand_archive.9960.desc: "Avec notre première capture de faune spatiale sauvage réussie dans le système de [from.solar_system.GetName] et un investissement adéquat dans la recherche, nous devrions pouvoir cloner davantage de créatures."
 grand_archive.9960.a: "$valuable_insight$"
 grand_archive.9970.name: "Potentiel de mutation"
 grand_archive.9970.desc: "Le premier spécimen de faune spatiale a été cloné avec succès dans le système de [from.solar_system.GetName].\n\nNos recherches dans le domaine de la xénobiologie ont montré que nous pourrions améliorer davantage la physiologie de ces créatures, si nous le voulions. Cela nous permettrait d'équiper nos flottes biologiques de composants de combat spécifiques."
 grand_archive.9970.a: "$valuable_insight$"
