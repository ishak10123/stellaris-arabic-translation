 voidworms_troika_growth_tooltip: "Trois §Yvers du vide§! adultes se trouvant dans la même flotte formeront une §Ytroïka§! et pourront bombarder des planètes avec leurs spores."
 voidworms_troika_growth_tooltip_vivarium: "Trois §Yvers du vide§! adultes se trouvant dans le §Yvivarium§! formeront automatiquement une §Ytroïka§! et pourront se reproduire."
 ##########
 #Relics #
 ##########
 r_the_modularium: "Le modularium"
 r_the_modularium_desc: "Un système de raffinerie modulaire qui produit de manière autonome des ressources précieuses à des taux exponentiels, mais qui nécessite un apport d'énergie important pour ce faire."
 the_modularium_active_effect_tt: "Double la quantité de ressources produites par le modularium et le coût de son prochain triomphe."
 r_flowmetal_alloy: "Alliage fluxométallique"
 r_flowmetal_alloy_desc: "Ce matériau autoreproductible renforce les liaisons chimiques de tout métal avec lequel il entre en contact. L'intégration du fluxométal dans notre processus d'assemblage peut grandement améliorer la production de machines à grande échelle."
 flowmetal_alloy_active_effect_tt: "Crée §G300§! §Y£pop£pops robotiques§! dans votre capitale."
 r_crystallinus_diffuser: "Diffuseur cristallin"
 r_crystallinus_diffuser_desc: "Une machine capable de convertir des cristaux synthétisés en une substance extrêmement puissante destinée à améliorer les performances. Dans sa forme la plus pure, le produit chimique obtenu est biologiquement volatile et peut provoquer la défaillance de plusieurs organes chez un petit pourcentage de consommateurs."
 crystallinus_diffuser_active_effect_tt: "La production des pops biologiques de votre empire augmente de 100% pendant 10 ans. Ensuite, 20% d'entre elles mourront."
 crystallinus_diffuser_machine_empire_active_effect_tt: "§G+100§! £energy£§Yénergie§! pendant 10 ans."
 relic_crystallinus_diffuser_opinon: "Opinion de tous les §Yempires biologiques§! : §G+25§!"
 triggered_opinion_relic_crystallinus_diffuser: "$r_crystallinus_diffuser$"
 crystallinus_diffuser_modifier: "Triomphe du diffuseur cristallin"
 r_everchanging_stone: "Pierre fluctuante"
 r_everchanging_stone_desc: "Une pierre précieuse artificielle dont la couleur et la composition chimique varient en fonction de son environnement. Lorsqu'elle est placée à côté d'un objet, elle imite les éléments de son matériau et nous permet de mieux comprendre la composition moléculaire du sujet."
 everchanging_stone_modifier: "Triomphe de la pierre fluctuante"
 everchanging_stone_modifier_tt: "Pour chaque ['concept_specimen',spécimen] exposé dans la catégorie $EXHIBITION_XENO_GEOLOGY$, augmente la production des deux autres catégories de §G+$@everchanging_stone_modifier|0%$§!."
 r_pulsestone: "Pierre pulsatile"
 r_pulsestone_desc: "Une pierre hautement radioactive qui génère de dangereuses ondes de force magnétique. Elle pourrait révolutionner notre compréhension de la manipulation des champs, mais l'énergie qu'elle émet est presque impossible à contenir."
 pulsestone_modifier: "$r_pulsestone$"
 mod_scientist_lifespan_add: "Esp. de vie des scientifiques "
 r_gavel_of_the_tribunal: "Marteau du tribunal"
 r_gavel_of_the_tribunal_desc: "Sur le manche du marteau sont inscrits les noms d'un ancien triumvirat d'esprits qui gouvernait une galaxie aujourd'hui disparue. Bien qu'il soit beaucoup trop grand pour être manié par l'un des nôtres, sa simple présence suscite une grande admiration."
 gavel_of_the_tribunal_galcom: "$r_gavel_of_the_tribunal$"
 gavel_of_the_tribunal_galcom_tt: "£diplo_weight£Poids diplomatique jusqu'à ce que la prochaine §Yrésolution§! soit acceptée : §G+$@gavel_of_the_tribunal_galcom_diplo_weight|0%$§!"
 gavel_of_the_tribunal_no_galcom: "$r_gavel_of_the_tribunal$"
 r_celestial_resonator: "Résonateur céleste"
 r_celestial_resonator_desc: "Un étrange appareil qui émet des jeux de lumière époustouflants et dont la puissance augmente à proximité de spécimens."
 celestial_resonator_tt: "Produit 10 en £unity£unité par ['concept_specimen',spécimen] exposé"
 celestial_resonator_triumph_tt: "£happiness£§YBonheur§! §G+$@celestial_resonator_happiness|0%$§! et £diplo_weight£§Ypoids diplomatique§! §G+$@celestial_resonator_diplo_weight|0%$§! par ['concept_specimen',spécimen] exposé"
 celestial_resonator_modifier: "$r_celestial_resonator$"
 r_entangled_relay: "Relais intriqué"
 r_entangled_relay_desc: "Cet objet ancien est capable de connecter des réseaux de transmission d'informations distants grâce à l'intrication quantique, ce qui permet une communication galactique fluide."
 entangled_relay_modifier: "$r_entangled_relay$"
 r_prototype_vir_core: "Prototype de noyau RIV"
 r_prototype_vir_core_desc: "Cette intelligence artificielle isolée est un enseignant et mentor particulièrement efficace, apte à apporter son aide dans la plupart des situations. Elle excelle dans la reformulation d'explications compliquées en termes simples pour permettre à l'utilisateur de prendre des décisions en connaissance de cause."
 prototype_vir_core_modifier: "$r_prototype_vir_core$"
 r_propagandosphere: "Propagandosphère"
 r_propagandosphere_desc: "Cette sphère holographique contient des archives de films de propagande d'une civilisation disparue. Incroyablement inventifs et passionnants à regarder, ils pourraient être remaniés à notre image pour inspirer nos troupes et notre peuple."
 r_executus_compendium: "Compendium executus"
 r_executus_compendium_desc: "Ces dossiers très complets du conseil d'une ancienne civilisation ont été conservés dans une capsule scellée. Ces billions de pages contiennent des comptes rendus détaillés d'optimisations bureaucratiques et d'outils organisationnels novateurs. Nombre de ces améliorations pourraient être mises en oeuvre dans nos propres procédures de gestion."
 executus_compendium_triumph_tt: "Lance la priorité pour 10% de son coût initial (coût minimum : 3000£unity£)"
 r_the_pattern_maker: "Générateur de schémas"
 r_the_pattern_maker_desc: "Cet ancien calculateur est capable de suivre des trajectoires dynamiques et de prédire le comportement d'objets tels que les vaisseaux ennemis avec une précision inégalée. Les modèles de données générés par ses algorithmes de prédiction sont aussi complexes que les plans d'un maître-architecte. Lorsqu'il dispose de suffisamment d'énergie et de matériaux, il peut produire un vaisseau éclaireur spécialisé équipé de capteurs très puissants."
 r_the_pattern_maker_effect_tt: "Crée un vaisseau éclaireur de classe §YPisteur§!.\n - Très grande vitesse et portée de détection des hyperlignes accrue"
 NAME_Patternwalker: "Pisteur"
 NAME_Patternwalker_Cloak: "$NAME_Patternwalker$"
 SENSOR_PATTERNWALKER: "Capteurs de prédiction"
 r_vaporous_mega_orchid: "Méga-orchidée vaporeuse"
 r_vaporous_mega_orchid_desc: "Cette énorme orchidée ne fleurit que tous les 50 ans. Il a été démontré que son parfum a un effet apaisant qui bloque temporairement les synapses mentales à l'origine de l'agressivité et de la méfiance."
 r_vaporous_mega_orchid_effect_tt: "£opinion£Opinion des empires non meurtriers, non déchus et non mécaniques à notre égard : §G+$@vaporous_mega_orchid_opinion|0$§! pendant §Y$@vaporous_mega_orchid_opinion_duration_years|0$§! ans."
 opinion_vaporous_mega_orchid: "$r_vaporous_mega_orchid$"
 r_tiyanki_matriarch_nerve_core: "Noyau nerveux de matriarche tiyanki"
 r_tiyanki_matriarch_nerve_core_desc: "La matière cérébrale de cette ancienne baleine spatiale contient des siècles de données évolutives, encodées dans ses neurones. Grâce au décodage de son réseau, nous pouvons trouver des vulnérabilités chez d'autres super prédateurs et percer les secrets de leur survie."
 tiyanki_matriarch_nerve_core: "$r_tiyanki_matriarch_nerve_core$"
 celestial_chart: "Carte des étoiles"
 r_celestial_chart_0: "Mystérieuse capsule orbitale"
 r_celestial_chart_0_desc: "Une étrange capsule en orbite autour de notre monde natal depuis des milliers d'années. Nous ignorons encore ce qu'elle contient."
 r_celestial_chart_1: "$celestial_chart$"
 r_celestial_chart_1_desc: "Le premier fragment d'une carte trouvé dans une capsule ancienne."
 r_celestial_chart_2: "$celestial_chart$"
 r_celestial_chart_2_desc: "Une carte incomplète trouvée dans une capsule ancienne."
 r_celestial_chart_3: "$celestial_chart$"
 r_celestial_chart_3_desc: "Une carte presque complète trouvée dans une capsule ancienne."
 r_celestial_chart_4: "$celestial_chart$"
 r_celestial_chart_4_desc: "Une grande carte stellaire et une banque de données créées par le légendaire pirate $NAME_CaptainNess$."
 r_celestial_chart_4_effect_tt: "Établit une ['concept_treasure_vault',chambre aux trésors] sur l'une de nos colonies."
 celestial_chart_upgraded_tt: "La §Ycarte des étoiles§! a été enrichie de nouvelles informations."
 r_mutated_voidworm_nest: "Nid de vers du vide mutants"
 r_mutated_voidworm_nest_desc: "Un nid de vers du vide mutants ayant évolué pour se reproduire sans infection parasitaire. Certains de ces vers sont capables d'atteindre l'âge adulte en quelques jours."
 r_mutated_voidworm_nest_effect_tt: "Crée une flotte de vers du vide mutants adultes dans votre système-capitale"
