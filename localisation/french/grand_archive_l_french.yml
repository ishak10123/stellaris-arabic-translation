 tr_domestication_containment_protocols: "Protocoles de confinement"
 tr_domestication_containment_protocols_delayed: "Le risque de blessure est important lors du transport et de la conservation d'organismes de grande taille. En utilisant les bons calmants et les bons protocoles, nous pouvons réduire ce risque."
