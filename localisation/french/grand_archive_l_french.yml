 #Leader Traits #
 #################
 leader_trait_buccaneer: "Boucanier"
 leader_trait_buccaneer_desc: "Cette personnalité est passée maître dans l'art de récupérer des matériaux du champ de bataille, au point de pouvoir tirer parti des épaves les plus endommagées."
 leader_trait_trailblazer: "Pionnier"
 leader_trait_trailblazer_desc: "Cette personnalité est animée par la soif d'aventure. Elle parcourt les frontières de la galaxie et explore chaque recoin de l'espace."
 leader_trait_treasure_hoarder: "Amasse-trésors"
 leader_trait_treasure_hoarder_desc: "Aucun butin n'est assez bien pour assouvir les désirs de cette personnalité. L'accumulation de ressources précieuses est sa principale motivation."
 mod_enemy_ship_destroyed_energy_add: "$r_energy$ en fonction de la taille du vaisseau ennemi détruit "
 mod_deposit_increase_on_survey_chance_mult: "Pour chaque reconnaissance effectuée :\n$t$Chances d'accroître les gisements de ressources "
 ##########
 #Civics #
 ##########
 civic_galactic_curators: "Conservateurs galactiques"
 civic_galactic_curators_desc: "La collecte et la conservation méticuleuses d'artefacts historiques ont toujours fasciné cette civilisation. Mais avec une galaxie entière à explorer, elle a encore beaucoup à apprendre."
 civic_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$"
 civic_corporate_galactic_curators: "Expertise en matière d'antiquités"
 civic_corporate_galactic_curators_desc: "Les antiquités et autres objets de collection permettent de gagner beaucoup d'argent et cette société n'en est que trop consciente. En tant qu'experts en spéculation matérielle, ils cherchent désormais dans le ciel de nouvelles opportunités d'investissement."
 civic_corporate_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$\n- £building£§Y$building_public_relations_office$§! : $megacorp_civic_branch_office_building_effect$"
 civic_hive_galactic_curators: "Réseau de Conservateurs"
 civic_hive_galactic_curators_desc: "Ce collectif a développé un besoin irrépressible de prendre, garder et préserver. Ce comportement, qui les a aidés à survivre dans le passé, les pousse aujourd'hui à mettre en valeur les trésors qu'ils ont collectés dans une grande exposition."
 civic_hive_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_machine_galactic_curators: "Réseau de Conservateurs"
 civic_machine_galactic_curators_desc: "Cette intelligence mécanique n'a qu'une seule directive clé dans son code : collecter et conserver."
 civic_machine_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_galactic_curators_effects_common: "- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_galactic_archivism', £society_research£$tech_galactic_archivism$]\n- ['concept_specimen',Spécimens] de départ : un spécimen §0ordinaire§! de chaque catégorie \n- Gagne de l'£unity£§Yunité§! pour chaque §Yspécimen§! trouvé ou §Ysite archéologique§! Terminé \n- Achats de l'§Yenclave des Conservateurs§! : §G$@galactic_curators_curator_enclave_purchase_cost|%0$§!\n- Donne accès au décret §Y$edict_decentralized_research$§!, augmentant la production des §Ystations de recherche§! mais réduisant la production des £job_researcher£§Y[GetResearcherPlural_lower]§!"
 edict_decentralized_research: "Recherches décentralisées"
 edict_decentralized_research_desc: "Les plus grandes connaissances se trouvent au-delà de notre civilisation. En nous concentrant sur la galaxie dans son ensemble, nous pouvons mieux nous comprendre nous-mêmes."
 MOD_COUNTRY_SPECIMEN_ACQUIRE_CHANCE_MULT: "Chances accrues de découvrir des spécimens"
 councilor_galactic_curators: "Conservateur suprême"
 councilor_galactic_curators_desc: "Cette personnalité est chargée de superviser la conservation de tous les spécimens."
 councilor_corporate_galactic_curators: "Officier de la conservation"
 councilor_corporate_galactic_curators_desc: "Cette personnalité est responsable de la gestion de l'exposition et de la vente des spécimens."
 civic_beastmasters: "Maîtres des bêtes"
 civic_beastmasters_desc: "Ayant atteint sa pleine maturité technologique dans un système constituant le pâturage des amibes spatiales, cette société a acquis une connaissance approfondie de leur cycle de reproduction. Elle se consacre désormais à la reproduction, à l'élevage et, à terme, au clonage de ces créatures, pour le plus grand bénéfice des deux parties."
 civic_machine_beastmasters: "Biodrones"
 civic_machine_beastmasters_desc: "Après avoir été en contact direct avec des organismes biologiques du vide dans son système natal, cette intelligence mécanique a intégré toutes les connaissances sur ces créatures dans ses fonctions principales. Il en résulte une relation symbiotique bénéfique pour les deux parties."
 civic_hive_beastmasters: "Essaim sauvage"
 civic_hive_beastmasters_desc: "Cette conscience collective capable de s'adapter facilement a établi une relation symbiotique avec les organismes biologiques vivant dans le vide de son système natal. Même s'ils ne partagent pas la même conscience, ils travaillent ensemble à la réalisation d'un objectif commun."
 civic_wilderness_beastmasters: "$civic_hive_beastmasters$"
 civic_wilderness_beastmasters_desc: "Cette contrée sauvage s'est engagée dans une symbiose avec les créatures spatiales de son système natal. Même si elles ne sont pas totalement intégrées à l'intelligence mutualiste, elles travaillent ensemble à la réalisation d'un objectif commun."
 civic_corporate_beastmasters: "Éleveurs spatiaux"
 civic_corporate_beastmasters_desc: "Cette mégacorporation, issue de la guilde des meilleurs éleveurs d'animaux, a développé la technologie nécessaire pour élever et soigner les créatures spatiales vivant dans son système natal."
 civic_beastmasters_common_effects_1: "$t$- Technologies déjà découvertes :$TABBED_NEW_LINE$$t$- ['technology:tech_gravity_wells',£physics£$tech_gravity_wells$]$TABBED_NEW_LINE$$t$- ['technology:tech_alien_cloning',£society£$tech_alien_cloning$]$TABBED_NEW_LINE$- $AVAILABLE_STARBASE_BUILDINGS$ ['concept_beastport',ports bestiaux]$TABBED_NEW_LINE$- $HOME_SYSTEM$ lance la partie avec un ['concept_beastport',port bestial]"
 civic_beastmasters_ships: "$t$- Les §Yvaisseaux militaires§! de départ sont remplacés par des §Yamibes spatiales§!"
 civic_beastmasters_common_effects_2: "$t$- £genetic_material£['Concept_dna'] de départ :$TABBED_NEW_LINE$$t$- Amibe spatiale §0ordinaire§!"
 civic_beastmasters_effects: "$civic_beastmasters_common_effects_1$\n$civic_beastmasters_ships$\n$civic_beastmasters_common_effects_2$"
 civic_corporate_beastmasters_effects: "$civic_beastmasters_common_effects_1$\n$civic_beastmasters_ships$\n$civic_beastmasters_common_effects_2$\n$t$- £building£§Y$building_food_conglomerate$§! : $megacorp_civic_branch_office_building_effect$"
 civic_cordyceptic_beastmasters_effects: "$civic_beastmasters_common_effects_1$$TABBED_NEW_LINE$- Lance la partie avec une §Yamibe spatiale clonée§! au lieu d'une §Yamibe spatiale immortelle§!\n$civic_beastmasters_common_effects_2$"
 councilor_beastmasters: "Seigneur des bêtes"
 councilor_beastmasters_desc: "Le poste de cette personnalité est prestigieux et hautement spécialisé, et se concentre principalement sur la gestion et le déploiement stratégique des vaisseaux de faune spatiale."
 councilor_corporate_beastmasters: "Éleveur en chef"
 councilor_corporate_beastmasters_desc: "Cette personnalité veille à la santé et à l'approvisionnement ininterrompu des vaisseaux de faune spatiale. Ce rôle dynamique requiert une combinaison unique de connaissances en matière de logistique, d'écologie et d'élevage."
 civic_tooltip_not_beastmasters: "N'a PAS de civisme appartenant au groupe ['concept_beastmasters_civic']"
 concept_beastmasters_civic: "$civic_beastmasters$"
 concept_beastmasters_civic_desc: "Le groupe $concept_beastmasters_civic$ inclut :$NEW_LINE$- ['civic:civic_beastmasters']$NEW_LINE$- ['civic:civic_hive_beastmasters'] $NEW_LINE$- ['civic:civic_machine_beastmasters'] $NEW_LINE$- ['civic:civic_corporate_beastmasters']"
