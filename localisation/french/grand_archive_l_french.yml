 policy_exhibition_focus: "Priorité à l'exposition"
 policy_exhibition_focus_desc: "Planifier minutieusement la manière dont les pièces sont exposées dans les grandes archives permet de mettre en valeur certaines catégories et d'influencer le thème de l'ensemble des expositions.\n"
 galactic_history_focus: "Priorité à l'histoire galactique"
