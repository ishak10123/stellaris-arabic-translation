 tech_thrusters_bio_integration_effect: "§HPermet§! d'améliorer les propulseurs de la faune spatiale"
 tech_hyper_drive_bio_integration: "Hyperpropulseur bio-intégré"
 tech_hyper_drive_bio_integration_desc: "Les voyages via les hyperlignes peuvent être dangereux pour les créatures spatiales, mais nous sommes en mesure d'améliorer leurs capacités."
 tech_hyper_drive_bio_integration_effect: "§HPermet§! d'améliorer les hyperpropulseurs de la faune spatiale"
 tech_sensors_bio_integration: "Capteurs bio-intégrés"
 tech_sensors_bio_integration_desc: "Les différents organes sensoriels des créatures spatiales peuvent être améliorés grâce à notre technologie avancée, sans pour autant leur nuire."
 tech_sensors_bio_integration_effect: "§HPermet§! d'améliorer les capteurs de la faune spatiale"
 tech_combat_computers_bio_integration: "Ordinateurs de combat bio-intégrés"
