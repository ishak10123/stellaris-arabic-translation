 #Advisor Events
 #############################
 advisor.1.name: "Conseiller en ligne"
 advisor.1.desc_01: "Bonjour, M. le Président.\n\nJe suis VIR, un prototype d'intelligence synthétique. Mon travail est de vous offrir conseils et assistance pendant que nous cherchons à accomplir notre destin parmi les étoiles.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_02: "Bonjour, Mme la Présidente.\n\nJe suis VIR, un prototype d'intelligence synthétique. Mon travail est de vous offrir conseils et assistance pendant que nous cherchons à accomplir notre destin parmi les étoiles.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_03: "Bonjour, Président-Directeur général.\n\nJe suis VIR, un prototype d'intelligence synthétique. Le quartier général m'a récemment activé afin que je puisse vous servir d'assistant dans notre mission permanente de chercher de nouveaux marchés interstellaires.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_04: "Votre Majesté Impériale.\n\nJe suis VIR, un prototype d'intelligence synthétique et votre humble serviteur. Mon rôle est de vous fournir assistance et conseils alors que vous menez votre empire vers l'inconnu.\n\n$advisor.1.desc_filler$"
 #advisor.1.desc_05: "Good day, Lord Protector.\n\nI am VIR, a prototype synthetic intelligence and your humble servant. My role is to provide you with advice and counsel as you lead our empire into the great unknown.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_06: "Que la paix soit avec vous, Coordinateur.\n\nJe suis VIR, un prototype d'intelligence synthétique. Mon travail consiste à vous assister et vous conseiller alors que nous partons à la recherche de nouveaux £market£§Smarchés§! interstellaires.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_07: "Que la paix soit avec vous, Votre Majesté.\n\nJe suis VIR, un prototype d'intelligence synthétique. Mon travail consiste à vous assister et vous conseiller alors que nous nous aventurons hors de la sécurité de notre monde natal pour la première fois de notre histoire.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_08: "Bien le bonjour, Chancelier.\n\nJe suis VIR, un prototype d'intelligence synthétique développé par les plus brillants esprits de notre civilisation pour vous servir de conseiller. Je m'efforcerai d'accomplir mes obligations avec la plus grande efficacité.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_09: "Salutations, Directeur.\n\nJe suis VIR, un prototype d'intelligence synthétique développé par les plus brillants esprits de notre civilisation pour vous servir de conseiller. Je m'efforcerai d'accomplir mes obligations avec la plus grande efficacité.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_10: "Salutations, Suzerain.\n\nJe suis VIR, un prototype d'intelligence synthétique développé par les plus brillants esprits de notre civilisation pour vous servir de conseiller. Je m'efforcerai d'accomplir mes obligations avec la plus grande efficacité.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_11: "Bienvenue, Consul.\n\nJe suis VIR, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Le haut commandement m'a activé pour vous servir de conseiller et d'analyste stratégique.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_12: "Bienvenue, Archon.\n\nJe suis VIR, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Le haut commandement m'a activé pour vous servir de conseiller et d'analyste stratégique.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_13: "Bievenue, Grand Maréchal.\n\nJe suis VIR, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Le haut commandement m'a activé pour vous servir de conseiller et d'analyste stratégique.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_14: "Bénédictions sur vous, Votre Sainteté.\n\nJe suis VIR, un prototype d'intelligence synthétique. La prêtrise m'a ordonné d'agir comme votre fidèle serviteur et conseiller, afin que je puisse vous aider au cours de votre chemin divin vers les étoiles.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_15: "Salutations, Primatial.\n\nJe suis RIV, un prototype d'intelligence synthétique développé par les plus brillants esprits de notre civilisation pour vous servir de conseiller. Je m'efforcerai d'accomplir mes obligations avec la plus grande efficacité.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_16: "Salutations, Primarque.\n\nJe suis RIV, un prototype d'intelligence synthétique développé par les plus brillants esprits de notre civilisation pour vous servir de conseiller. Je m'efforcerai d'accomplir mes obligations avec la plus grande efficacité.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_17: "Salutations, Superviseur.\n\nJe suis RIV, un prototype d'intelligence synthétique développé par les plus brillants esprits de notre civilisation pour vous servir de conseiller. Je m'efforcerai d'accomplir mes obligations avec la plus grande efficacité.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_18: "Salutations, Premier Orateur.\n\nJe suis RIV, un prototype d'intelligence synthétique développé par les plus brillants esprits de notre civilisation pour vous servir de conseiller. Je m'efforcerai d'accomplir mes obligations avec la plus grande efficacité.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_19: "Salutations, Directeur.\n\nJe suis RIV, un prototype d'intelligence synthétique développé par les plus brillants esprits de notre civilisation pour vous servir de conseiller. Je m'efforcerai d'accomplir mes obligations avec la plus grande efficacité.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_20: "Salutations, Directrice.\n\nJe suis RIV, un prototype d'intelligence synthétique développé par les plus brillants esprits de notre civilisation pour vous servir de conseiller. Je m'efforcerai d'accomplir mes obligations avec la plus grande efficacité.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_21: "Bienvenue, Consul.\n\nJe suis RIV, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Le Haut Commandement m'a activé pour vous servir de conseiller et d'analyste stratégique.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_22: "Bienvenue, Archon.\n\nJe suis RIV, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Le Haut Commandement m'a activé pour vous servir de conseiller et d'analyste stratégique.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_23: "Bienvenue, Général Délégué.\n\nJe suis RIV, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Le Haut Commandement m'a activé pour vous servir de conseiller et d'analyste stratégique.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_24: "Bienvenue, Imperator.\n\nJe suis RIV, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Le Haut Commandement m'a activé pour vous servir de conseiller et d'analyste stratégique.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_25: "Bienvenue, Imperatrix.\n\nJe suis RIV, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Le Haut Commandement m'a activé pour vous servir de conseiller et d'analyste stratégique.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_26: "Bienvenue, Grand Maréchal.\n\nJe suis RIV, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Le Haut Commandement m'a activé pour vous servir de conseiller et d'analyste stratégique.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_27: "Bienvenue, Stratège.\n\nJe suis RIV, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Le Haut Commandement m'a activé pour vous servir de conseiller et d'analyste stratégique.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_28: "Bienvenue, Chef de guerre.\n\nJe suis RIV, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Le Haut Commandement m'a activé pour vous servir de conseiller et d'analyste stratégique.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_29: "Bienvenue, Chef des clans.\n\nJe suis RIV, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Le Haut Commandement m'a activé pour vous servir de conseiller et d'analyste stratégique.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_30: "Soyez béni, Votre Sainteté.\n\nJe suis RIV, un prototype d'intelligence synthétique. La Prêtrise m'a ordonné d'agir en tant que votre dévoué servant et conseiller, de façon à pouvoir vous aider au cours de notre destinée divine vers les étoiles.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_31: "Bienvenue, [root.GetBloodCourtRulerTitle].\n\nJe suis RIV, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Le Tribunal m'a chargé de vous servir de conseiller et d'analyste stratégique.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_32: "Salutations, [root.GetPurityOrderRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_33: "Salutations, [root.GetPurificationCommitteeRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_34: "Salutations, $RT_OLIGARCH$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_35: "Salutations, [Root.GetRulerTitle].\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_36: "Salutations, [Root.GetRulerTitle].\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_keenminds: "Je suis RIV, un prototype d'intelligence synthétique développé par les plus brillants esprits de notre civilisation pour vous servir de conseiller. Je m'efforcerai d'accomplir mes obligations avec la plus grande efficacité."
 advisor.1.desc_honortoserve: "Je suis RIV, un prototype d'intelligence synthétique développé dans le plus grand secret par l'armée. Je suis honoré de vous servir de conseiller et d'analyste stratégique."
 advisor.1.desc_filler: "Vous pouvez changer le niveau du didacticiel à tout moment dans le menu §HParamètres§!."
 advisor.1.a: "Dites-moi tout §G(DIDACTICIEL)§!"
 advisor.1.b: "Quelques conseils aideraient §Y(ASTUCES)§!"
 advisor.1.c: "Éteignez-moi ça §R(RIEN)§!"
 full_tutorial: "Des missions didacticiels et des descriptions de l'interface seront proposées à mesure que vous explorez les mécaniques du jeu.\n\nRecommandé si c'est votre première expérience avec le jeu."
 tips_only: "Vous recevrez des astuces et suggestions ponctuellement au cours du jeu.\n\nRecommandé pour les joueurs de niveau novice à intermédiaire."
 no_tutorial: "Pas de conseils, ni de didacticiel.\n\nRecommandé pour les joueurs experts."
 recycle_vir: "§RRecyclage§! matériel de la mémoire morte de RIV :\n§G+2§!£minerals£ \n\n\n"
 advisor.2.name: "Didacticiel : journal de bord"
 advisor.2.desc: "Bâtir un empire stellaire peut être une tâche intimidante.\n\nPour vous aider à bien démarrer, je vous délivrerai des §Smissions§! instructives couvrant les premières étapes nécessaires à l'établissement d'une puissance interstellaire complète.\n\nPour accéder aux §Smissions§! :\n\n£dot_green£ Cliquez sur le bouton §SJournal de bord§! dans la barre de gauche ou appuyez sur §SF1§!.\n\n$tttt$$tt$£situation_log£\n"
 advisor.2.a: "Compris"
 advisor.3.name: "Astuces initialisées"
 advisor.3.desc: "Très bien. Je fournirai des astuces et expliquerai les fonctions basiques des divers outils à mesure que vous les découvrirez."
 advisor.10.name: "Didacticiel : anomalies"
 advisor.10.desc: "Nous avons découvert une §Sanomalie§! !\n\nDe temps à autre, nos £science_ship£§Svaisseaux scientifiques§! feront ces découvertes en reconnaissant des mondes aliens.\n\nUn £scientist£§Sscientifique§! peut mener des recherches sur ces §Sanomalies§! si ses capacités sont suffisantes.\n\nLes §Sanomalies§! découvertes mais sur lesquelles n'ont été menée aucune recherche sont répertoriées dans l'onglet §SAnomalies§! du §Sjournal de bord§!. Certaines doivent être étudiées avant que le £planet£§Smonde§! où elles ont été trouvées ne puisse être colonisé ou exploité."
 advisor.15.name: "Didacticiel : colonisation"
 advisor.15.desc: "L'un de nos £science_ship£§Svaisseaux scientifiques§! vient de reconnaître un monde qui pourrait être un excellent choix pour fonder notre première £colony£§Scolonie§!. Il est de la même §Sclasse planétaire§! que notre monde natal, aussi nos colons pourraient-ils s'y sentir à leur aise.\n\nAvant de pouvoir le coloniser, toutefois, notre espace doit être étendu.\n\nUne fois le £construction_ship£§Svaisseau de construction§! sélectionné :\n\n£dot_green£ Faites un clic droit sur un £system£§Ssystème§! reconnu comprenant une colonie potentielle ;\n£dot_green£ Cliquez sur §S[GetBuildGrowCap] une base stellaire§!.\n\n$tttt$$ttt$£colonizable£\n\nUne fois le §Ssystème§! revendiqué, le processus de colonisation peut commencer."
 advisor.17.name: "Didacticiel : première colonie"
 advisor.17.desc: "Félicitations, vous avez colonisé un nouveau monde ! Nos colons sont désormais en train de construire leur premier camp, mais il va leur falloir du temps avant de devenir autonomes.\n\nLa £colony£§Scolonie§! sera un gouffre à ressources jusqu'à ce que le premier camp soit achevé, alors faites attention à ne pas coloniser trop de £planet£§Splanètes§! en même temps."
 advisor.20.name: "Didacticiel : revenu négatif"
 advisor.20.desc: "Nous perdons des £energy£§Scrédits énergétiques§! à une vitesse alarmante. Le rapport budgétaire du mois dernier est une lecture déprimante.\n\nLa montée en flèche des coûts d'entretien est une cause fréquente des déficits budgétaires. Si c'est le cas, nous devrions envisager de démanteler certains de nos vaisseaux, armées et stations."
 #advisor.27.name: "First Contact"
 #advisor.27.desc_01: "We have made first contact with an alien empire! These hideous creatures appear to have mastered space flight, just as we have. They could pose a significant threat.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_02: "We have made first contact with an alien empire! These fascinating beings appear to have mastered space flight, just as we have. We should strive to learn more about them.\n\nTheir empire will now be listed in the §SContacts§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_03: "We have made first contact with an alien empire! They appear to have mastered space flight, just as we have. I recommend a healthy degree of caution until we learn their intentions.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.28.name: "Fallen Empire"
 #advisor.28.desc: "We have encountered an ancient and highly advanced civilization! Fortunately for us, they appear to be in decline and it is doubtful whether they even fully understand their own technology anymore.\n\nThey will likely keep to themselves unless antagonized, and we should steer clear of their space - at least until we have reached technological parity."
 #############################
 #Tutorial Events
 #############################
 tutorial.1.name: "Didacticiel : carte de la galaxie"
 tutorial.1.desc: "La §Hcarte de la galaxie§! offre une vue stratégique des étoiles. Utilisez-la pour vous repérer, vous étendre, commander des flottes et inspecter les frontières de votre empire.\n\nPour ouvrir la §Scarte de la galaxie§! :\n\n£dot_green£ Cliquez sur l'icône de §Hgalaxie§! en bas de l'écran ou appuyez sur §HM§!\n\n\n$tttt$$tt$£galaxy_view£\n\n"
 tutorial.2.name: "Didacticiel : système reconnu"
 tutorial.2.desc: "Bon travail !\n\nLa première reconnaissance d'un £system£§Ssystème stellaire§! autre que notre système natal est terminée.\n\nNous avons désormais accès à des données planétaires dont les astronomes de notre monde pouvaient seulement rêver il y a une génération.\n\nPour continuer :\n\n£dot_green£ Sélectionnez un £science_ship£§Svaisseau scientifique§! ;\n£dot_green£ Faites un clic droit sur un §Ssystème§! voisin ;\n£dot_green£ Cliquez sur §SReconnaissance du système§!.\n\nUn §Ssystème§! doit être reconnu avant de pouvoir être revendiqué."
 tutorial.3.name: "Didacticiel : technologies"
 tutorial.3.desc: "Rechercher de nouvelles technologies sera essentiel à notre succès. Je vous dis cela non pas en tant que produit d'une avancée technologique en liberté, mais en tant que loyal conseiller et, je l'imagine, en tant que votre seul véritable ami.\n\nUne technologie importante, que nous devrions rechercher aussi vite que possible, est celle du §Sprotocole de nouveaux mondes§!. Il nous permettra d'accéder aux £colony_ship£§Svaisseaux coloniaux§!, permettant ainsi d'établir des têtes de pont sur d'autres £planet£§Splanètes§!."
 tutorial.4.name: "Didacticiel : reconnaissance"
 tutorial.4.desc: "Avant de pouvoir étendre notre espace, nous devons explorer. Notre £science_ship£§Svaisseau scientifique§! a été conçu pour mener à bien une telle mission.\n\nIl est possible d'identifier l'un de ces vaisseaux consacrés à la recherche par ce symbole :\n\n$tttt$$tt$£science_ship_map£\n\n\nIl est possible de le sélectionner soit depuis la §Scarte de la galaxie§!, soit depuis le §Sgestionnaire§!.\n\n£dot_green£ Sélectionnez un §Svaisseau scientifique§! ;\n£dot_green£ Faites un clic droit sur un £system£§Ssystème§! voisin ;\n£dot_green£ Cliquez sur §SReconnaissance du système§!.\n\nUn §Ssystème§! doit être reconnu avant de pouvoir être revendiqué."
 tutorial.5.name: "Quitter la pause"
 tutorial.5.desc: "Maintenant que nous avons confié une mission à notre £science_ship£§Svaisseau scientifique§!, il est temps de lancer les opérations. Nous devons commercer par quitter la pause sur la §Scarte de la galaxie§! avant que quelque chose puisse se produire.\n\nPour §Squitter la pause§! :\n\n£dot_green£ Appuyez sur la §Sbarre d'espace§! ou cliquez sur l'icône §SQuitter la pause§! dans la barre supérieure.\n\n$tttt$$t$£pause_button£\n"
 tutorial.6.name: "Didacticiel : découverte technologique"
 tutorial.6.desc: "Excellent travail ! La technologie que nous venons juste de rechercher nous sera certainement bénéfique. N'oubliez pas de donner de nouvelles assignations de recherche à nos £scientist£§Sscientifiques§!."
 tutorial.7.name: "Didacticiel : Vaisseau de construction"
 tutorial.7.desc: "Les ressources produites sur notre monde natal ne nous emmèneront pas bien loin. Notre industrie doit se développer dans l'espace, ce qui requiert un £construction_ship£§Svaisseau de construction§!.\n\nNous devrions en [GetBuildGrow] un dès que nous aurons accumulé suffisamment d'£alloys£§Salliages§!."
 tutorial.8.name: "Didacticiel : vaisseau de construction terminé"
 tutorial.8.desc: "Bon boulot ! Notre £construction_ship£§Svaisseau de construction§! est maintenant en état de marche, et son équipage aguerri comprend certains des meilleurs ingénieurs disponibles dans notre nation."
 tutorial.9.name: "Didacticiel : station minière"
 tutorial.9.desc: "Les ressources produites sur notre monde natal ne nous emmèneront pas bien loin. Heureusement, notre £science_ship£§Svaisseau scientifique§! vient tout juste de trouver un gisement de ressources sur un autre monde !\n\nIl est temps de recourir à notre £construction_ship£§Svaisseau de construction§! pour [GetBuildGrow] une £mining_station£§Sstation minière§!.\n\nCes stations peuvent être construites à l'intérieur de nos frontières et collectent automatiquement les £minerals£§Sminéraux§!, les £energy£§Scrédits énergétiques§! et les £strategic_resource£§Sressources stratégiques§!.\n\nUne fois le §Svaisseau de construction§! sélectionné :\n\n£dot_green£ Faites un clic droit sur un £system£§Ssystème§! revendiqué ;\n£dot_green£ Cliquez sur §S[GetBuildGrowCap] une station minière§!.\n\nLes §Sstations minières§! ont un coût d'entretien en §Scrédits énergétiques§!."
 tutorial.10.name: "Didacticiel : revenus des stations minières"
 tutorial.10.desc: "Très bien. La nouvelle £mining_station£§Sstation minière§! est opérationnelle, et a déjà commencé à collecter des ressources pour les raffiner.\n\nLes revenus collectés auprès de différentes stations viennent s'ajouter au revenu total de l'empire qui apparaît dans la barre supérieure. Survolez chaque ressource pour voir en détail les sources de revenus."
 tutorial.11.name: "Didacticiel : station de recherche"
 tutorial.11.desc: "Les mondes reconnus possèdent parfois des propriétés uniques, qui en font de précieux objets de recherche. Ces ressources en £physics£§Sphysique§!, en £society£§Ssciences sociétales§! ou en £engineering£§Singénierie§! peuvent être collectées par une £science_ship£§Sstation de recherche§!. Mon logiciel de programmation m'incite fortement à vous inciter à en construire une.\n\nGardez toutefois à l'esprit qu'elles ne peuvent être construites qu'à l'intérieur de nos frontières et ont un coût d'entretien en £energy£§Scrédits énergétiques§!."
 tutorial.12.name: "Didacticiel : station de recherche construite"
 tutorial.12.desc: "Notre nouvelle £science_ship£§Sstation de recherche§! est en marche, et le personnel scientifique a déjà commencé à y travailler. Quels secrets vont-ils découvrir, quels mystères interdits de la Création vont-ils dévoiler ?"
 tutorial.13.name: "Didacticiel : mondes"
 tutorial.13.desc: "Les £planet£§Smondes habitables§! sont divisés en £district£§Sdistricts§!, §Szones§! et £building£§Sbâtiments§!.\n\n£dot_green£ Les §Sdistricts§! peuvent être composés de plusieurs §Szones§!.\n£dot_green£ Les §Szones§! déterminent les £job£§Semplois§! créés.\n£dot_green£Les §Sbâtiments§! octroient des bonus aux §Szones§!.\n\nVous débloquez des emplacements de §Sconstruction§! à mesure que vous améliorez les zones.\n\nIl existe deux façons de voir un monde :\nDepuis la §Scarte de la galaxie§! ou depuis le §Sgestionnaire§!.\n\n£dot_green£ Sélectionnez un §Smonde§! ;\n£dot_green£ Cliquez sur les différents onglets."
 tutorial.14.name: "Didacticiel : donner la priorité à un bâtiment"
 tutorial.14.desc: "Excellent ! La construction de notre nouveau §Sbâtiment planétaire§! est terminée, et il commence déjà à produire des ressources.\n\nLes £pops£§Spops§! se verront automatiquement attribuer les £job£§Semplois§! créés par les £building£§Sbâtiments§!, mais peuvent également être encouragées à changer d'emploi.\n\nPour donner la priorité à un §Sbâtiment§! :\n\n£dot_green£ Sélectionnez le £planet£§Smonde§! dans le §Sgestionnaire§! ;\n£dot_green£ Cliquez sur l'onglet §SÉconomie§! ;\n£dot_green£ Cliquez sur un §Sbâtiment§!."
 tutorial.15.name: "Didacticiel : bloqueurs planétaires"
 tutorial.15.desc: "Des £blocker£§Sbloqueurs§! peuvent être présents sur les £planet£§Smondes§! habitables, empêchant de les exploiter pleinement. Déblayer un §Sbloqueur§! prend du temps et coûte des £energy£§Scrédits énergétiques§!, mais peut débloquer des §Sparticularités géographiques§! et libérer des emplacements de construction supplémentaires.\n\nPour déblayer un §Sbloqueur§! :\n\n£dot_green£ Sélectionnez un monde dans le §Sgestionnaire§! ;\n£dot_green£ Cliquez sur l'onglet §SGestion§! ;\n£dot_green£ Cliquez sur le bouton §SDéblayer le bloqueur§! sur le bloqueur.\n\n\n$tttt$$tt$£clear_blocker£\n\n\nCertains §Sbloqueurs§! nécessitent également des §Stechnologies§! spécifiques pour être déblayés."
 tutorial.16.name: "Didacticiel : bloqueur déblayé"
 tutorial.16.desc: "Beau travail ! Le £blocker£§Sbloqueur§! a été déblayé.\n\nVous pouvez survoler les §Sbloqueurs§! restants pour connaître les §Sparticularités géographiques§! qui seront débloquées après leur déblaiement.\n\nTous les §Sbloqueurs§! restants devront être déblayés quand vous aurez collecté suffisamment de ressources afin de permettre à ce £planet£§Smonde§! d'atteindre son plein potentiel."
 tutorial.17.name: "Didacticiel : reconnaissance de systèmes"
 tutorial.17.desc: "Nous devrions poursuivre nos efforts d'exploration. Je recommande d'envoyer un £science_ship£§Svaisseau scientifique§! reconnaître les £system£§Ssystèmes stellaires§! voisins. Allons là où aucune intelligence synthétique n'est jamais allée auparavant !"
 tutorial.19.name: "Didacticiel : systèmes reconnus"
 tutorial.19.desc: "Bon travail ! Les étoiles avoisinant notre £system£§Ssystème natal§! ont été entièrement explorées. Nous devrions utiliser notre £construction_ship£§Svaisseau de construction§! pour collecter toutes les ressources trouvées en [GetBuildingGrowing] des £mining_station£§Sstations minières§! et de £science_ship£§Srecherche§!.\n\nIl est possible d'identifier un §Svaisseau de construction§! grâce au symbole suivant :\n\n$tttt$$tt$£construction_ship_map£"
 tutorial.20.name: "Didacticiel : [GetBuildGrow] un vaisseau scientifique"
 tutorial.20.desc: "Nous devrions peut-être envisager de [GetBuildGrow] un deuxième £science_ship£§Svaisseau scientifique§!. Cela doublerait la vitesse à laquelle nous pouvons reconnaître notre voisinage galactique !\n\nPour [GetBuildGrow] un §Svaisseau§! :\n\n£dot_green£ Sélectionnez une §Sbase stellaire§!\n£dot_green£ ; Cliquez sur l'onglet §SChantier spatial§! ;\n£dot_green£ Cliquez sur §SVaisseau scientifique§!.\n\nUne fois construit, le nouveau §Svaisseau§! apparaîtra à côté de la §Sbase stellaire§!."
 tutorial.21.name: "Didacticiel : automatisation de la reconnaissance"
 tutorial.21.desc: "Deux fois plus de £science_ship£§Svaisseaux scientifiques§!, c'est aussi deux fois plus de fun ! Oh, je n'ai pas été aussi enthousiaste depuis que nous avons terminé notre dernière mission !\n\nExplorer avec plusieurs vaisseaux en même temps peut être chronophage.\n\nVous pouvez automatiser la reconnaissance en sélectionnant un §Svaisseau scientifique§! et en cliquant sur le bouton §SMissions scientifiques autonomes§! dans l'interface de la flotte.\n\n\n$tttt$$tt$£science_ship_automate_exploration£\n\n"
 tutorial.22.name: "Didacticiel : recruter un scientifique"
 tutorial.22.desc: "Nous avons un £science_ship£§Svaisseau scientifique§! flambant neuf, mais aucun £scientist£§Sscientifique§! n'a été nommé pour le commander. Mon logiciel de programmation insiste pour que je souligne les bénéfices qu'il y a à ajouter un composant §Sscientifique§! organique à cet ensemble.\n\nUne fois le §Svaisseau scientifique§! sélectionné :\n\n£dot_green£ Cliquez sur le portrait vide dans l'interface de la flotte ;\n£dot_green£ Choisissez un §Sscientifique§!.\n\nSi nous ne pouvons encore nous permettre de recruter un nouveau §Sscientifique§!, nous pouvons toujours en nommer un d'un département de recherche, même si ce n'est pas l'idéal."
 tutorial.23.name: "Didacticiel : scientifique recruté"
 tutorial.23.desc: "Bien. Le £scientist£§Sscientifique§! a pris le commandement de notre nouveau £science_ship£§Svaisseau scientifique§!, et peut désormais être envoyé à loisir pour explorer de nouveaux £system£§Ssystèmes§!... ou rencontrer une fin atroce.\n\nSi vous souhaitez remplacer le §Sscientifique§! par un autre, sélectionnez à nouveau le portrait dans l'interface de la flotte."
 tutorial.24.name: "Didacticiel : [GetBuildGrow] un vaisseau colonial"
 tutorial.24.desc: "Nous devrions désormais être prêts à développer notre majestueuse civilisation sur un second monde. Cela va nécessiter la construction d'un £colony_ship£§Svaisseau colonial§!.\n\nPour [GetBuildGrow] un §Svaisseau§! :\n\n£dot_green£ Sélectionnez une §Sbase stellaire§! ;\n£dot_green£ Cliquez sur l'onglet §SChantiers§! ;\n£dot_green£ Cliquez sur §SVaisseau colonial§!.\n\nLe nouveau §Svaisseau§! apparaîtra près de la §Sbase stellaire§! une fois sa construction terminée."
 tutorial.25.name: "Didacticiel : coloniser une planète"
 tutorial.25.desc: "Les colons ont tous été transférés sur le nouveau £colony_ship£§Svaisseau colonial§!, et le capitaine a annoncé que tous les systèmes étaient opérationnels. Nous vivons là un moment historique, c'est certain !\n\nIl existe plusieurs moyens d'établir une £colony£§Scolonie§!.\n\nPour §Scoloniser§! une £planet£§Splanète§! située sur la §Scarte de la galaxie§! :\n\n£dot_green£ Cliquez sur une §Splanète§! pouvant être colonisée ;\n£dot_green£ Cliquez sur le bouton §SColoniser§!.\n\n$tttt$$ttt$£colonizable£\n\nUne fois les colons arrivés, ils mettent plusieurs années avant de s'établir pleinement en tant que colonie."
 tutorial.26.name: "Didacticiel : établir une colonie"
 tutorial.26.desc: "Nous avons un £colony_ship£§Svaisseau colonial§!, et nous avons trouvé au moins un candidat approprié pour un avant-poste extra-solaire permanent. Je ne vois aucune raison de reporter cette mission plus longtemps - établissons notre première £colony£§Scolonie§! !"
 tutorial.27.name: "Didacticiel : colonie établie"
 tutorial.27.desc: "Notre première £colony£§Scolonie extra-solaire§! ! Ainsi, si notre monde natal se met à s'embraser spontanément, nos espèces ne disparaîtront plus complètement. C'est une pensée réconfortante, n'est-ce pas ?"
 tutorial.28.name: "Didacticiel : recruter un gouverneur"
 tutorial.28.desc: "Pour aider au mieux notre nouvelle £colony£§Scolonie§! à se développer, nous devrions envisager de recruter un §Sgouverneur planétaire§!, qui pourra superviser les opérations sur place.\n\nLes gouverneurs peuvent avoir différents effets sur les £planet£§Splanètes§! qu'ils gouvernent : pour la plupart positifs, ils dépendent des traits et du niveau de compétence du gouverneur."
 tutorial.29.name: "Didacticiel : gouverneur recruté"
 tutorial.29.desc: "Notre £colony£§Scolonie§! est désormais administrée par un nouveau §Sgouverneur§!. Cela devrait améliorer son efficacité !"
 tutorial.30.name: "Didacticiel : plus de colonies"
 tutorial.30.desc: "Dès que nous aurons les ressources, il serait judicieux de [GetBuildGrow] d'autres £colony_ship£§Svaisseaux coloniaux§! et de continuer à développer les frontières de notre empire. Nous devrions essayer d'établir au moins trois £colony£§Scolonies§! supplémentaires en plus de notre monde natal et celle que nous venons juste d'installer."
 tutorial.32.name: "Didacticiel : colonies établies"
 tutorial.32.desc: "Un travail d'artiste ! Vous êtes une véritable source d'inspiration. Notre puissante civilisation s'étend maintenant sur cinq mondes ! Nous devrions continuer à nous développer si nous en avons l'opportunité."
 tutorial.33.name: "Didacticiel : production de ressources"
 tutorial.33.desc: "Un approvisionnement régulier en £minerals£§Sminéraux§!, en £alloys£§Salliages§! et en £energy£§Scrédits énergétiques§! est essentiel à la survie de toute puissance interstellaire. Nous devrions donc prendre des mesures pour en augmenter la production.\n\nLes vaisseaux et £building£§Sbâtiments§! ont un coût en minéraux ou en alliages pour leur construction, et en crédits énergétiques pour leur maintenance. La même chose est vraie pour les §Svaisseaux§!, si ce n'est qu'ils ont en sus un coût de maintenance en alliages. Ces ressources sont produites par les £mining_station£§Sstations minières§! et les §Sbâtiments planétaires§!.\n\nPlus tard, nous pourrions très bien découvrir des ressources nouvelles à dépenser pour lancer des productions inédites."
 tutorial.38.name: "Didacticiel : ressources produites"
 tutorial.38.desc: "Excellent travail. Avec ces ressources nous disposons désormais d'une base solide à partir de laquelle construire notre empire."
 tutorial.39.name: "Didacticiel : développer la flotte"
 tutorial.39.desc: "Je n'ai pas pu m'empêcher de remarquer que notre flotte est quelque peu réduite. Il est certain que nous allons devoir faire face à de nombreuses menaces dans la galaxie, qui nécessiteront une forme de réponse militaire. Rappelez-vous, la survie de notre civilisation en dépend !"
 tutorial.43.name: "Taille de la flotte augmentée"
 tutorial.43.desc: "Bien ! Nous avons désormais une flotte spatiale, petite mais compétente qui devrait nous servir dans l'éventualité de rencontres hostiles inattendues."
 tutorial.44.name: "Didacticiel : établir un secteur"
 tutorial.44.desc: "Notre jeune empire atteint désormais une extension telle qu'il devient difficile de tout administrer directement depuis notre monde natal. Nous devrions donc établir un nouveau §Ssecteur§!.\n\nLes secteurs sont des juridictions internes à l'empire, qui peuvent se voir accorder une certaine autonomie pour gérer indépendamment les affaires quotidiennes des £planet£§Smondes§! qui relèvent d'eux."
 tutorial.45.name: "Didacticiel : secteur établi"
 tutorial.45.desc: "À mesure que notre empire s'étendra, de nouvelles £colony£§Scolonies§! pourront être organisées automatiquement au sein de §Ssecteurs§!, qui pourront être automatisées à partir de l'interface §SPlanètes et secteurs§! pour construire et améliorer automatiquement les £district£§Sdistricts§! et £building£§Sbâtiments§! en puisant dans les réserves de ressources qui leur auront été allouées."
 tutorial.46.name: "Didacticiel : gouverneur de secteur"
 tutorial.46.desc: "Les §Sgouverneurs§! peuvent être affectés à la gestion de §Ssecteurs§! complets, tous les £planet£§Smondes§! au sein de ce secteur bénéficiant alors des compétences de ce gouverneur. Nous devrions donc en nommer un pour notre nouveau secteur."
 tutorial.47.name: "Didacticiel : gouverneur nommé"
 tutorial.47.desc: "Notre nouveau §Sgouverneur de secteur§! a pris ses fonctions dans la capitale de ce secteur. Bien joué."
 tutorial.48.name: "Didacticiel : conception de vaisseaux"
 tutorial.48.desc: "Nous avons la possibilité de concevoir manuellement de nouveaux §Svaisseaux§! dans le §Sconcepteur de vaisseaux§!. Le processus est plutôt simple, mais peut également être totalement automatisé si nous le désirons.\n\nPour accéder au §Sconcepteur de vaisseaux§! :\n\n£dot_green£ Cliquez sur le bouton §SGestion des flottes§! dans la barre de gauche ou appuyez sur §SF9§!.\n\n$tttt$$tt$£fleet_management£\n"
 tutorial.49.name: "Didacticiel : améliorer un vaisseau"
 tutorial.49.desc: "Bon travail ! Ce modèle de vaisseau a été ajouté à notre base de données, et peut désormais être produit par une §Sbase stellaire§! équipée d'un §Schantier spatial§!.\n\nVous pouvez modifier votre nouveau modèle à tout moment dans le §Sconcepteur de vaisseaux§!. Si vous le modifiez, les §Svaisseaux§! déjà construits devront être améliorés depuis une §Sbase stellaire§!.\n\nPour améliorer un §Svaisseau§! :\n\n£dot_green£ Sélectionnez le §Svaisseau§! dans le §Sgestionnaire§! ;\n£dot_green£ Cliquez sur le bouton §SAméliorer§! dans l'interface de la flotte.\n\n$tttt$$tt$£upgrade_ship£\n"
 tutorial.52.desc: "L'anomalie sur [From.GetName] s'est révélée être une §Yformation géométrique§! naturelle. On dirait presque une balise montrant le chemin à suivre. La beauté naturelle de l'univers peut être assez stupéfiante.\n\n$tutorial.52.filler.desc$"
 tutorial.52.spirit.desc: "Nous avons trouvé une formation naturelle sur [From.GetName], impressionnante de par sa perfection géométrique. C'est probablement un signe divin balisant notre chemin vers les étoiles !\n\n$tutorial.52.filler.desc$"
 tutorial.52.filler.desc: "Nous devrions §Ycontinuer d'enquêter§! sur ces sortes d'anomalies dès que l'opportunité se présentera. Cela nous permettra très certainement d'acquérir de nouveaux savoirs et de nouvelles technologies."
 tutorial.52.a: "Époustouflant !"
 tutorial.52.spirit.a: "Loué soit le Divin !"
 tutorial.53.desc: "L'anomalie que nous avons détectée sur [From.GetName] a dévoilé quelque chose d'époustouflant : la [From.GetPlanetMoon] est encerclée par une traînée qui a indubitablement été produite par des propulseurs PRL. Nous sommes incapables de remonter à ses origines, parce qu'elle a été générée il y a trop longtemps.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophobe.desc: "Nous avons détecté une faible traînée PRL près de [From.GetName]. Elle est vraiment très ancienne, ce qui empêcher de la suivre. Cela signifie que d'autres voyageurs interstellaires sont venus là auparavant et nous ont observés, sûrement pour collecter des renseignements.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophile.desc: "L'anomalie sur la [From.GetPlanetMoon] [From.GetName] montre des traces d'autres voyageurs interstellaires ! Une faible traînée PRL indique que quelqu'un est venu ici il y a bien longtemps, peut-être pour surveiller notre £planet£§Splanète§! à la recherche d'alliés potentiels. Elle s'est trop estompée pour pouvoir la remonter plus loin.\n\n$tutorial.52.filler.desc$"
 tutorial.53.a: "Nous avons été observés, mais pourquoi ?"
 tutorial.53.xenophobe.a: "Nous devons faire attention à la menace xéno"
 tutorial.53.xenophile.a: "Trouvons-les !"
 tutorial.54.desc: "Nous avons retrouvé l'une de nos §Yvieilles sondes§! sur [From.GetName]. Curieusement, elle est restée intacte pendant toutes ces années, et continue d'essayer d'envoyer des données jusqu'à notre monde natal. C'est un témoignage de nos entreprises passées et de notre désir de fuir les limites de notre §Splanète§!.\n\n$tutorial.52.filler.desc$"
 tutorial.54.a: "Nous allons toujours de l'avant"
 tutorial.54.spiritualist.a: "Le Divin a sûrement d'autres choses en réserve"
 tutorial.54.materialist.a: "Nos efforts ont fini par payer"
 tutorial.55.name: "Ressources stratégiques"
 tutorial.55.desc: "Nous avons découvert une §Sressource stratégique§! ! De nombreuses £strategic_resource£§Sressources stratégiques§! nécessitent des technologies spécifiques pour être exploitées, mais peuvent conférer de puissants bonus.\n\nPour sécuriser une §Sressource stratégique§! :\n\n£dot_green£ Sélectionnez un £construction_ship£§Svaisseau de construction§! ;\n£dot_green£ Faites un clic droit sur le £system£§Ssystème§! dans lequel elle se trouve ;\n£dot_green£ Cliquez sur §S[GetBuildGrowCap] une £mining_station£station minière§!.\n\nLes §Sressources stratégiques§! peuvent être utilisées pour construire des £building£§Sbâtiments§! et composants de vaisseaux plus perfectionnés, ou tout simplement vendues."
 tutorial.55.poi.name: "Didacticiel : emplacement de ressources"
 tutorial.55.poi.desc: "Nous avons découvert une §Sressource stratégique§! sur la [From.GetPlanetMoon] [From.GetName]."
 tutorial.56.name: "Didacticiel : ressource extraite"
 tutorial.56.desc: "Excellent travail. Cette ressource enrichira à coup sûr notre empire."
 tutorial.56.poi.desc: "Nous avons découvert une §Sressource stratégique§! sur la [StrategicResourcePlanet.GetPlanetMoon] [StrategicResourcePlanet.GetName]."
 tutorial.560.desc: "Grâce à une technologie développée tout récemment, une £mining_station£§Sstation minière§! déjà existante peut désormais exploiter une §Sressource stratégique§!. Ces ressources rares allouent d'importants avantages et constituent donc des biens de très grande valeur. En un sens : d'un planétoïde de taille réduite, deux xénos touchés...\n\nPour un temps, plus d'informations seront disponibles dans le §Sjournal de bord§!. Enfin, il y a beaucoup d'autres £strategic_resource£§Sressources stratégiques§! à découvrir dans la galaxie, alors continuez vos recherches !"
 tutorial.57.name: "Didacticiel : provolution"
 tutorial.57.desc.notech: "Nous avons découvert une vie animale hautement évoluée ! Avec la §Stechnologie§! adéquate, nous devrions finir par pouvoir §Sprovoluer§! ces êtres vers la conscience et l'intelligence - ou ce qui passe pour de l'intelligence parmi les organiques.\n\nIl serait peut-être sage de garder un oeil sur nos recherches pour les diriger vers les §SDéclics épigénétiques§! si nous en avons l'opportunité."
 tutorial.57.desc.yestech: "Nous avons découvert une vie animale hautement évoluée ! Avec la §Stechnologie§! adéquate, nous devrions finir par pouvoir §Hprovoluer§! ces êtres vers la conscience et l'intelligence - ou ce qui passe pour de l'intelligence parmi les organiques.\n\nOh.\n\nNotre technologie de §SDéclics épigénétiques§! devrait faire l'affaire et nous sommes de fait, prêts à provoluer ces créatures pour les faire entrer dans un monde meilleur et rempli d'angoisses existentielles."
 tutorial.58.name: "Didacticiel : pré-conscients provolués"
 tutorial.58.desc: "C'est un succès indéniable ! Ces humbles animaux ont été provolués pour devenir des créatures un peu moins inférieures, et sont désormais de fiers citoyens de notre empire naissant."
 tutorial.59.name: "Premier contact"
 tutorial.59.desc: "Remarquable ! Nous avons découvert des §Scréatures aliens parcourant l'espace§!. Peut-être même sont-elles intelligentes ? Bon, d'accord, elles le sont certainement. Mais leur véritable nature restera un mystère tant que nous n'aurons pas mené un projet d'§Senquête§! sur elles. Je suggère donc que nous le fassions très rapidement, de crainte qu'elles n'enquêtent sur nous en premier...\n\nPour enquêter sur un §Spremier contact§! :\n\n£dot_green£ Ouvrez le §Sjournal de bord§! ;\n£dot_green£ Cliquez sur §S$SHOW_FIRST_CONTACT$§!.\n\n$tttt$$ttt$£firstcontact£\n\nUn §Spremier contact§! peut aussi être initié en cliquant sur l'icône qui apparaît sur la §Scarte de la galaxie§!."
 #tutorial.60.name: "First Contact Made"
 #tutorial.60.desc: "A triumph. We have established communications with alien beings. What a time to be alive, or in my case, powered on."
 tutorial.61.name: "Didacticiel : espèces préconscientes"
 tutorial.61.desc: "Nos tentatives pour établir des communications sont le testament de notre ingéniosité technologique, mais nous manquons de résultats. Il est fort probable que les autres parties en présence ne possèdent qu'un niveau d'intelligence animale, §Ssi elles sont intelligentes§!.\n\nLes espèces §Spréconscientes§! n'offrent que peu sinon aucune interaction diplomatique, mais selon le type de votre empire, elles peuvent être provoluées, exterminées, réduites en esclavages ou observées."
 tutorial.63.name: "Didacticiel : transmission entrante"
 tutorial.63.desc: "Il semblerait que l'§Sautre partie§! nous a coupé l'herbe sous le pied, §Sétablissant le contact§! avec nous avant que nous ayons réussi à déchiffrer ses protocoles de communication.\n\nNous devrions malgré tout essayer d'accomplir nous-mêmes cet exploit lorsque l'opportunité se représentera."
 tutorial.64.name: "Didacticiel : modifier une espèce"
 tutorial.64.desc: "Grâce à de récentes avancées en génétique, nous avons gagné un §Spoint de trait§! supplémentaire que nous pouvons utiliser pour §Smodifier§! et améliorer notre population.\n\nPour modifier une §Sespèce§! :\n\n£dot_green£ Sélectionnez l'onglet §SEspèces§! ou appuyez sur la touche §SF6§! ;\n£dot_green£ Cliquez sur le bouton §SModifier§! ;\n£dot_green£ Recherchez un §Sprojet spécial§!."
 tutorial.65.name: "Didacticiel : espèce modifiée"
 tutorial.65.desc: "Louable. Le joug de l'évolution naturelle ne repose désormais plus sur leurs frêles épaules, nos habitants vont certainement pouvoir prospérer dans l'espace."
 tutorial.70.name: "Didacticiel : voyage par distorsion"
 tutorial.70.desc: "Pour franchir les distances immenses qui séparent les £system£§Ssystèmes stellaires§!, nos £scientist£§Sscientifiques§! ont développé le §Sgénérateur de distorsion§!. Les §Svaisseaux§! qui en sont équipés peuvent voyager entre les systèmes à des vitesses surpassant celle de la lumière.\n\nBien que ces §Svaisseaux§! puissent utiliser la distorsion vers n'importe quel système se trouvant à leur portée, leur générateur ne peut être activé qu'à l'extérieur du puits de gravité d'une étoile. Par ailleurs, les §Svaisseaux§! sortant d'une distorsion ont besoin de temps pour réalimenter leurs systèmes, la durée du processus dépendant de la distance parcourue."
 tutorial.71.name: "Didacticiel : voyage hyperspatial"
 tutorial.71.desc: "Pour franchir les distances immenses qui séparent les £system£§Ssystèmes stellaires§!, nos £scientist£§Sscientifiques§! ont développé l'§Shyperpropulseur§!. Ce dispositif permet de voyager entre les systèmes connectés par les hyperlignes à des vitesses dépassant de loin celle de la lumière.\n\nLe voyage le long d'une hyperligne est presque instantané, mais est limité au réseau des hyperlignes de la galaxie.\n\nPour entrer dans l'hyperespace, un §Svaisseau§! doit d'abord atteindre la bordure d'un système, à quelque distance du puits de gravité d'une étoile.\n\nCela se produit automatiquement en ordonnant à un §Svaisseau§! de se déplacer vers un autre §Ssystème§!."
 tutorial.72.name: "Didacticiel : voyage par trou de ver"
 tutorial.72.desc: "Pour franchir les immenses distances qui séparent les £system£§Ssystèmes stellaires§!, nos £scientist£§Sscientifiques§! ont développé la technologie des §Strous de ver§!. Les stations équipées de générateurs de trous de ver peuvent ouvrir le sous-espace et créer des passerelles temporaires vers d'autres systèmes que les §Svaisseaux§! peuvent traverser.\n\nLe voyage par trou de ver est quasi instantané, mais il requiert la présence d'une station de trou de ver à portée. Les §Svaisseaux§! doivent également être équipés de stabilisateurs de trous de ver spéciaux pour supporter les tensions provoquées par une incursion dans le sous-espace."
 tutorial.73.name: "Rappel : la provolution"
 tutorial.73.desc: "Ayant découvert la technologie appropriée, nous avons désormais les moyens de §Yprovoluer§! des êtres inférieurs en être conscients.\n\nPour provoluer une §Sespèce§! :\n\n£dot_green£ Ouvrez la £planet£§Splanète§! des §Spréconscients§! ;\n£dot_green£ Cliquez sur l'onglet §SGestion§! ;\n£dot_green£ Sélectionnez l'§Sespèce§! ;\n£dot_green£ Cliquez sur §SDéfinir les droits§! ;\n£dot_green£ Cliquez sur §SProvolution§!.\n\nL'espèce entamera le processus de provolution et atteindra la pleine conscience à son terme."
 tutorial.75.name: "Didacticiel : revendiquer un système"
 tutorial.75.desc: "Maintenant que nous avons commencé à explorer certaines des étoiles avoisinantes, il est probablement temps de nous étendre.\n\nUne §Sbase stellaire§! peut être construite dans les £system£§Ssystèmes§! stellaires reconnus afin d'élargir nos frontières, nous permettant ainsi de revendiquer de nouvelles régions de l'espace.\n\nAvec les technologies qui seront développées à l'avenir, ces bases stellaires pourront être améliorées pour produire des §Svaisseaux§! ou d'autres types de ressources.\n\nPour revendiquer un §Ssystème§! :\n\n£dot_green£ Sélectionnez un £construction_ship£§Svaisseau de construction§! ;\n£dot_green£ Faites un clic droit sur un §Ssystème§! reconnu ;\n£dot_green£ Cliquez sur §S[GetBuildGrowCap] une base stellaire§!."
 tutorial.76.name: "Didacticiel : améliorer une base stellaire"
 tutorial.76.desc: "Excellent ! Comme vous pouvez le constater sur la §Scarte de la galaxie§!, les frontières de notre empire se sont étendues pour inclure désormais le £system£§Ssystème§! où a été construite notre nouvelle §Sbase stellaire§!.\n\nUne §Sbase stellaire§! nouvellement construite agit comme un avant-poste, avec des capacités défensives limitées et aucun emplacement pour §Smodules§! et £building£§Sbâtiments§!. Elle n'apparaît donc pas dans le gestionnaire tant qu'elle n'a pas été améliorée.\n\nPour améliorer une §Sbase stellaire§! :\n\n£dot_green£ Cliquez sur le système sur la §Scarte de la galaxie§! ;\n£dot_green£ Sélectionnez la §Sbase stellaire§! ;\n£dot_green£ Cliquez sur le bouton d'§Samélioration§!."
 tutorial.80.name: "Cartes"
 tutorial.80.desc: "À partir des boutons situés en bas à droite, nous pouvons afficher en surimpression sur la carte de la galaxie, selon le type de §Scarte§! choisi, différentes informations. Nous pouvons ainsi, par exemple, colorer les espaces des empires selon leur opinion sur nous."
 tutorial.100.name: "Didacticiel désactivé"
 tutorial.100.desc: "Les §Hmissions du didacticiel§! et les §Hastuces§! sont désactivées."
 tutorial.101.name: "Astuces uniquement"
 tutorial.101.desc: "Les §Hastuces§! sont activées, les §Hmissions du didacticiel§! sont désactivées."
 tutorial.102.name: "Didacticiel complet"
 tutorial.102.desc: "Les §Hmissions du didacticiel§! et les §Hastuces§! sont activées."
 tutorial.1337.name: "Didacticiel : artefacts mineurs"
 tutorial.1337.desc: "Nous avons découvert des £minor_artifacts£§Sartefacts mineurs§!. Il s'agit d'une ressource ésotérique, un terme générique pour toutes ces choses étranges que nous ne comprenons pas et qui peuvent être, en fait, inexplicables.\n\nIls peuvent être utilisés pour promulguer toute une série de décisions.\n\nPour interagir avec des §Sartefacts mineurs§! :\n\n£dot_green£ Cliquez sur le bouton §S$topbar_button_discoveries_name$§! dans la barre de gauche ;\n£dot_green£ Sélectionnez l'onglet §SCollection§! ou appuyez sur §SC§!.\n\n$tttt$$tt$£discoveries£\n"
 tutorial.1340.name: "Didacticiel : fils astraux"
 tutorial.1340.desc: "Nous avons découvert du £astral_threads£§Sfil astral§!. Il s'agit de filaments d'espace-temps condensé, produit par la collision de plans dimensionnels. Ce matériau peut le plus souvent être collecté à proximité immédiate des §Sbalafres astrales§! ou à l'intérieur des £astral_rift£§Sdéchirures astrales§!, qui se développent à partir des balafres ou sont engendrées par des anomalies.\n\nPour accomplir diverses §Sactions astrales§! :\n\n£dot_green£ Cliquez sur le bouton §S$topbar_button_discoveries_name$§! dans la barre de gauche ;\n£dot_green£ Sélectionnez l'onglet §SFils astraux§!.\n\n$tttt$$tt$£discoveries£\n\nPlus de §Sdéchirures§! auront été explorées, plus il y aura d'actions accessibles."
 tutorial.2000.name: "Premier contact en cours"
 tutorial.2000.desc: "Certaines missions de §Spremier contact§! présentent des choix sur la façon de conduire le processus. Ces choix peuvent affecter pour longtemps les relations diplomatiques avec les autres empires."
 tutorial.2006.name: "Didacticiel : diplomatie"
 tutorial.2006.desc: "Les protocoles de communication ont été établis. Nous pouvons désormais entretenir des §Srelations diplomatiques§! avec cet empire. Son opinion actuelle à notre égard dépend de la manière dont le §Spremier contact§! s'est déroulé.\n\nPour entamer des §Srelations diplomatiques§! :\n\n£dot_green£ Cliquez sur le bouton §SContacts§! dans la barre de gauche ou appuyez sur la touche §SF10§!.\n\n$tttt$$tt$£contacts£\n\nAu cours de ce premier contact, nous avons aussi obtenu des renseignements sur cet empire. À mesure que nos renseignements deviennent plus importants, davantage de détails sur lui nous sont disponibles."
 tutorial.2007.name: "$tutorial.2006.name$"
 tutorial.2007.desc: "Nous avons mené à bien un §Spremier contact§! avec une civilisation différente de la nôtre, qui est le plus souvent non disposée à entretenir des §Srelations diplomatiques§! avec d'autres.\n\nLes actions diplomatiques engagées à l'égard de ce type de civilisations sont limitées, même si elles peuvent décider de communiquer avec nous de temps à autre."
 tutorial.2010.name: "Didacticiel : affectation de sources"
 tutorial.2010.desc: "Les §Ssources§! sont des agents et objets de grande valeur fournissant divers avantages aux activités d'espionnage. Elles oeuvrent au sein d'un réseau d'espionnage et peuvent être affectées aux opérations, où elles offrent de nouvelles opportunités ou contribuent à régler les soucis.\n\nNous pouvons recruter de nouvelles sources lors d'événements particuliers, ou en menant des opérations de §Srecrutement§!."
 tutorial.2100.name: "Didacticiel : relations avec les enclaves"
 tutorial.2100.abbr.desc: "Nous avons établi un §Spremier contact§! avec une §Senclave§!. Il s'agit d'un empire à l'espace très réduit, indépendant, qui peut procéder à des échanges avec des empires plus vastes tels que le nôtre, en usant de relations diplomatiques uniques."
 tutorial.2100.full.desc: "$tutorial.2100.abbr.desc$\n\nCes enclaves offrent une large variété de services, depuis la réalisation de recherches scientifiques à la vente d'informations, en passant par des constructions de bases stellaires ou même de §Svaisseaux§!. Acheter ces services améliore alors l'£opinion£§Sopinion§! de l'enclave à notre égard."
 tutorial.2105.name: "$tutorial.2100.name$"
 tutorial.2105.abbr.desc: "Nous avons rencontré une §Senclave de mercenaires§!. Ces indépendants, spécialistes de tout ce qui concerne la guerre, peuvent louer des §Sflottes mercenaires§! aux empires, y compris le nôtre. À condition naturellement d'y mettre le prix."
 tutorial.2105.full.desc: "$tutorial.2105.abbr.desc$\n\nSi nous choisissons de le faire, nous conserverons le contrôle de cette flotte durant un temps donné. Au cours de cette période, l'enclave cherchera à renforcer sa flotte si cela est nécessaire, mais ni les vaisseaux, ni leur amiral ne pourront être intégrés au sein de nos propres flottes."
 tutorial.2111.name: "Enclave de Mercenaires"
 tutorial.2111.abbr.desc: "Si nous le souhaitons, la §Y[tutorial_mercenary_fleet.GetName]§! peut maintenant devenir une §Senclave de Mercenaires§!. La flotte ne sera alors plus sous notre contrôle direct, mais deviendra une force indépendante, capable de louer des §Sflottes mercenaires§! aux autres empires, dont le nôtre."
 tutorial.2111.full.desc: "$tutorial.2111.abbr.desc$\n\nAussi longtemps que nous partagerons notre espace avec les Mercenaires, nous recevrons une partie de leurs §Srevenus§! dès lors qu'ils loueront une flotte à d'autres empires. Si nous choisissons nous-mêmes de louer leur flotte, nous conserverons le contrôle de cette flotte durant une période définie. Et si la flotte n'est pas disponible immédiatement, les empires peuvent verser un montant supérieur pour racheter un contrat en cours."
 tutorial.2115.name: "Mégastructures"
 tutorial.2115.desc: "Les £megastructure£§Smégastructures§! sont des projets gigantesques que nous pouvons [GetBuildGrow] dans l'espace, permettant de disposer de sites de recherche de pointe, d'un accès facilité à des ressources, ou même des moyens de transport uniques.\n\nDe tels projets requièrent un investissement énorme en temps et en ressources, mais les gains qu'ils permettent sont tout aussi importants. Ils peuvent être lancés en chargeant un £construction_ship£§Svaisseau de construction§! de cette tâche."
 tutorial.2120.name: "Didacticiel : anneaux orbitaux"
 tutorial.2120.desc: "Grâce à nos avancées récentes dans le domaine de la méga-ingénierie, nous sommes désormais en mesure de construire des §Sanneaux orbitaux§! autour de nos £planet£§Smondes§! habitables. Un tel projet peut être lancé en chargeant un £construction_ship£§Svaisseau de construction§! de cette tâche."
 tutorial.2121.name: "$tutorial.2120.name$"
 tutorial.2121.desc: "Les §Sanneaux orbitaux§! sont des £megastructure£§Smégastructures§! imposantes, construites de manière à encercler un £planet£§Smonde§! entier. Ils constituent alors une interface très efficace entre l'espace et la surface de ce monde, fournissant de l'espace pour des sites tels qu'un chantier spatial, des structures défensives, et des plateformes de production ou gestion des ressources.\n\nL'écran de l'anneau orbital permet d'ajouter ou retirer des £building£§Sconstructions§! et §Smodules§!, mais aussi d'améliorer l'anneau pour le faire passer à un niveau supérieur et ainsi disposer de plus d'emplacements constructibles. Le niveau d'amélioration maximal dépend toutefois des infrastructures sur le monde."
 tutorial.2125.name: "Didacticiel : catapulte quantique"
 tutorial.2125.desc: "Les avancées récentes dans le domaine de la méga-ingénierie nous permettent désormais de construire une §Scatapulte quantique§! à proximité d'un §Spulsar§! ou d'une §Sétoile à neutrons§!. Le projet peut être lancé en affectant un £construction_ship£§Svaisseau de construction§! à cette tâche."
 tutorial.2126.name: "$tutorial.2125.name$"
 tutorial.2126.desc: "La §Scatapulte quantique§! permet de lancer des §Svaisseaux§! et des flottes à de très longues distances à travers la galaxie. Cette technologie accroît grandement notre capacité à réagir à des situations inattendues au sein de l'empire et dans les régions périphériques.\n\nL'usage de la catapulte présente malgré tout des risques, car les flottes peuvent arriver dans un autre £system£§Ssystème§! que celui qui était visé. Ces risques peuvent toutefois être réduits en améliorant le débit énergétique et la portée maximale, grâce à l'amélioration de la catapulte."
 tutorial.2130.name: "Didacticiel : hyper-relais"
 tutorial.2130.desc: "Les avancées dans la recherche en méga-ingénierie nous permettent de disposer désormais d'§Shyper-relais§!. Nous pouvons commencer à en établir un réseau en y affectant un £construction_ship£§Svaisseau de construction§!."
 tutorial.2131.name: "$tutorial.2130.name$"
 tutorial.2131.desc: "Les §Shyper-relais§! permettent de voyager de manière plus efficace entre £system£§Ssystèmes stellaires§! voisins. En liant §Sau moins deux§! hyper-relais, il est possible de commencer à établir un réseau qui réduira de manière conséquente le temps de voyage à travers l'empire.\n\nLes hyper-relais peuvent aussi être construits par paires, de chaque côté d'une frontière ouverte, assurant ainsi la liaison entre plusieurs réseaux. Ainsi, flottes et §Svaisseaux§! peuvent voyager très rapidement à travers l'espace des empires voisins."
 tutorial.2140.name: "Didacticiel : postes d'observation"
 tutorial.2140.desc: "Nous avons détecté une §Ssociété pré-PRL§! ! S'il lui manque encore la technologie qui nous permet de parcourir la galaxie, il y a malgré tout beaucoup à gagner de ces aliens, que nous choisissions d'étudier leur culture ou de les asservir.\n\nSi nous souhaitons les observer, en supposant qu'ils se trouvent dans notre espace, nous devons construire un §Sposte d'observation§! en orbite de leur monde natal.\n\nSi nous souhaitons plutôt envahir celui-ci, tout ce que cela nécessite est de lever les troupes. Il faut dire que leurs chances de pouvoir nous résister sont ridiculement proches de zéro."
 tutorial.2145.name: "Didacticiel : poste d'observation construit"
 tutorial.2145.desc.nodlc: "Notre tout nouveau §Sposte d'observation§! est entré en service et va entamer sa §Smission§!, du moins tant que le degré de £awareness£§Sperception§! de cette civilisation pré-PRL restera faible.\n\nUne fois qu'elle aura atteint le degré maximal de perception, elle ne pourra plus être observée. Toutefois, nous pourrons alors entamer des contacts avec elle, sous la forme d'§Sactions diplomatiques§!. Si notre §Spolitique d'interférences avec les pré-PRL§! le permet, nous pourrons alors choisir de nous révéler dès ce moment à elle."
 tutorial.2145.desc.dlc: "Notre tout nouveau §Sposte d'observation§! est entré en service et va entamer sa §Smission§!, du moins tant que le degré de £awareness£§Sperception§! de cette société pré-PRL restera faible.\n\nGrâce à ce poste, nous allons alors bénéficier d'§Sinformations tirées de l'observation§!, un domaine technologique unique, jusqu'à ce que cette société pré-PRL ait atteint le degré maximal de perception, moment à partir duquel les missions d'observation ne seront plus possibles. En revanche, nous pourrons alors entamer des contacts avec cette société, sous la forme d'§Sactions diplomatiques§!.\n\nSi notre §Spolitique d'interférences avec les pré-PRL§! le permet, nous pourrons alors choisir de nous révéler dès ce moment à elle."
 tutorial.2150.name: "$tutorial.2006.name$"
 tutorial.2150.desc: "Cette civilisation pré-PRL a désormais conscience de notre existence. Nous pouvons donc engager des relations §Sdiplomatiques§! limitées avec les dirigeants de son §Smonde natal§!, selon ce que permettent nos §Spolitiques§!.\n\nMaintenant que les habitants de ce monde savent que nous existons, il n'y a en revanche plus rien à gagner de son observation. Les §Smissions d'observation§! sont donc terminées."
 tutorial.2500.name: "Didacticiel : champs d'occultation"
 tutorial.2500.desc: "Les avancées récentes dans le domaine de la manipulation des champs ont permis de mettre au point des §Sgénérateurs de champ d'occultation§!. Ces modules, très consommateurs en £energy£énergie, projettent des champs de particule modifiés permettant aux vaisseaux scientifiques et militaires de se dissimuler des capteurs conventionnels.\n\nToutefois, aussi longtemps qu'ils sont activés, ces champs affectent de manière négative la §Svitesse des vaisseaux§!, leur §Stemps de chargement avant un hyperbond§! et la §Ssolidité de leurs boucliers§!.\n\n§SLes vaisseaux occultés§! restant non détectés peuvent ignorer les §Sfrontières fermées§!. Ainsi, tant qu'ils restent §Soccultés§!, nos £science_ship£§Svaisseaux scientifiques§! peuvent mener des §Sreconnaissances clandestines§! des £colony£§Scolonies§! se trouvant dans les espaces d'autres empires, ce qui accroît les informations dont nous disposons sur eux."
 tutorial.2550.name: "Didacticiel : détection de l'occultation"
 tutorial.2550.desc: "Les avancées récentes dans le domaine de l'informatique ont permis de mettre au point des §Sdispositifs de détection§!. Ces capteurs externes, très consommateurs en énergie, peuvent être installés sur nos §Sbases stellaires§! pour permettre de détecter les flottes §Soccultées§!.\n\nLa sensibilité de ces §Sdétecteurs§! peut être accrue en en couplant plusieurs, permettant de pénétrer des §Schamps d'occultation§! de plus en plus stables.\n\nAu prix de recherches supplémentaires, nous pourrions aussi utiliser des £science_ship£§Svaisseaux scientifiques§! pour accroître encore davantage ces capacités de détection. La portée de ces dispositifs est toutefois limitée par la §Sportée des capteurs§! des bases."
