 tutorial_survey_system_chain_title: "Didacticiel : afficher la carte galactique"
 tutorial_survey_system_chain_desc: "Avant de pouvoir explorer les étoiles, nous devons élargir notre vision des choses. Heureusement, nous avons à disposition une §Scarte de la galaxie§! tout à fait sophistiquée à disposition. Pour y accéder, appuyez sur la touche §SM§! ou cliquez sur le bouton représentant la galaxie en bas de l'écran. Ceci fait, n'hésitez pas à fermer le journal de situation en appuyant sur §SÉchap§! ou en cliquant sur le bouton en haut à droite."
 map_toggled: "Carte galactique affichée "
 tutorial_survey_system_tooltip: "§S$tutorial_survey_system_chain_title$§! ajouté au journal de bord."
 tutorial_1_chain_title: "Didacticiel : reconnaissance de systèmes"
 tutorial_1_chain_desc: "Commencez par sélectionner notre £science_ship£§Svaisseau scientifique§!, soit en cliquant directement dessus sur la §Hcarte de la galaxie§!, soit en le sélectionnant dans le §Sgestionnaire§!.\n\nDepuis la §Scarte de la galaxie§!, cliquez sur le bouton §SReconnaissance§! dans l'interface de la flotte en bas à gauche, puis sélectionnez un £system£§Ssystème§! non reconnu. Vous pouvez également faire un clic droit sur un système non reconnu et cliquer sur §SReconnaissance du système§!.\n\nLe §Svaisseau scientifique§! va alors tracer un itinéraire et reconnaître tous les corps planétaires au sein de ce système."
 tutorial_unpause_chain_tooltip: "§S$tutorial_unpause_chain_title$§! ajouté au journal de bord"
 tutorial_unpause_chain_title: "Didacticiel : quitter la pause"
 tutorial_unpause_chain_desc: "Maintenant qu'un £science_ship£§Svaisseau scientifique§! est sur le point d'explorer la galaxie, tout ce qu'il reste à faire est de quitter la pause. Pour cela, appuyez simplement sur la £space£§Sbarre d'espace§! ou cliquez sur cette icône dans la barre supérieure :\n\n$tttt$$tttt$$t$£pause_button£\n"
 unpaused_game: "Simulation lancée "
 system_surveyed: "Systèmes voisins reconnus "
 tutorial_1_tooltip: "§SDidacticiel : reconnaissance d'un système§! ajouté au journal de bord"
 tutorial_2_chain_title: "Didacticiel : recherche technologique"
 tutorial_2_chain_desc: "Nous devrions rechercher de nouvelles technologies. Le §Sprotocole de nouveaux mondes§! nous permettrait de construire des £colony_ship£§Svaisseaux coloniaux§!. Nous devrions nous concentrer sur cela dès que possible si nous désirons étendre notre empire.\n\nOuvrez l'écran des §Stechnologies§! en cliquant sur son bouton dans la partie gauche de la barre supérieure de l'écran, ou en appuyant sur §SF4§! ; puis cliquez sur §SChoisir une recherche§! et sélectionnez une technologie parmi les options offertes."
 tech_1_researched: "Protocole nouveaux mondes recherché"
 tech_2_researched: "Construction hors-monde recherchée"
 tutorial_2_tooltip: "§SDidacticiel : Recherche technologique§! ajouté au Journal de bord"
 tutorial_3_chain_title: "Didacticiel : [GetBuildGrow] un vaisseau de construction"
 tutorial_3_chain_desc: "Si nous souhaitons exploiter les ressources découvertes par les £science_ship£§Svaisseaux scientifiques§!, nous allons avoir besoin d'un £construction_ship£§Svaisseau de construction§!.\n\nCliquez sur notre base stellaire, puis sur l'onglet §SChantiers§!. Sélectionnez alors le §Svaisseau de construction§! dans la liste.\n\nNotez que vous devrez avoir accumulé suffisamment d'£alloys£§Salliages§! avant que la construction ne puisse démarrer."
 construction_ship_built: "Vaisseau de construction terminé"
 tutorial_3_tooltip: "§SDidacticiel : [GetBuildGrow] un vaisseau de construction§! ajouté au journal de bord"
 tutorial_4_chain_title: "Didacticiel : [GetBuildGrow] une station minière"
 tutorial_4_chain_desc: "Avant qu'un gisement de £minerals£§Sminéraux§! ou une §Sressource stratégique§! puisse être exploité sur une £planet£§Splanète§!, une £mining_station£§Sstation minière§! doit être construite en orbite. Pour ce faire, sélectionnez votre £construction_ship£§Svaisseau de construction§!, soit en cliquant directement dessus, soit en le trouvant dans le §Sgestionnaire§! sur le côté droit de l'écran.\n\nCeci fait, cliquez sur §S[GetBuildGrowCap] une station minière§! dans l'interface du vaisseau de construction, puis cliquez sur une planète ou un astéroïde possédant un gisement de minéraux.\n\nNotez que la construction d'une £mining_station£§Sstation minière§! coûte également des £minerals£§Sminéraux§! ; vous devrez donc disposer d'une quantité suffisante en réserve avant que la construction ne puisse démarrer."
 mining_station_built: "Station minière construite "
 tutorial_4_tooltip: "§SDidacticiel : [GetBuildGrow] une station minière§! ajouté au journal de bord"
 tutorial_5_chain_title: "Didacticiel : [GetBuildGrow] une station de recherche"
 tutorial_5_chain_desc: "Pour améliorer la vitesse à laquelle nous découvrons de nouvelles technologies, nous devrions construire des £science_ship£§Sstations de recherche§! en orbite de tout monde présentant des enjeux en £physics£§Sphysique§!, en £society£§Ssciences sociétales§! ou en £engineering£§Singénierie§!.\n\nLes stations de recherche fonctionnent sensiblement de la même façon que les £mining_station£§Sstations minières§!, la seule différence notable étant les ressources collectées : elles ne sont pas capables de produire de £minerals£§Sminéraux§! ou des £strategic_resource£§Sressources stratégiques§!.\n\nPour en construire une, sélectionnez votre £construction_ship£§Svaisseau de construction§! et cliquez sur le bouton §S[GetBuildGrowCap] une station de recherche§! de son interface, puis sur une £planet£§Splanète§!, un astéroïde ou une étoile présentant des enjeux physiques, sociétaux ou d'ingénierie."
 research_station_built: "Station de recherche construite "
 tutorial_5_tooltip: "§SDidacticiel : [GetBuildGrow] une station de recherche§! ajouté au journal de bord"
 tutorial_6_chain_title: "Didacticiel : bâtiments planétaires"
 tutorial_6_chain_desc: "Notre monde natal abrite déjà quelques £building£§Sbâtiments§!, mais nous devrions en construire d'autres.\n\nPour ce faire, sélectionnez le monde natal dans le §Sgestionnaire§! et cliquez sur l'onglet §SSurface§!. Sélectionnez un emplacement de construction vide dans une zone puis un bâtiment disponible. Si nous avons les §Sressources§! suffisantes, la construction commencera aussitôt.\n\nLes bâtiments créent des £job£§Semplois§!, mais ne produisent rien tant que des £pops£§Spops§! n'y ont pas été assignées. Pour voir les emplois occupés par vos §Spops§!, consultez l'onglet §SÉconomie§!."
 building_constructed: "Bâtiments construits "
 tutorial_6_tooltip: "§SDidacticiel : bâtiments planétaires§! ajouté au journal de bord"
 tutorial_7_chain_title: "Didacticiel : déblayer un bloqueur"
 tutorial_7_chain_desc: "La présence de plusieurs £blocker£§Sbloqueurs§! sur notre monde natal empêche la construction de nouveaux §Sdistricts§!. Les déblayer prend du temps et coûte des §Sressources§!.\n\nPour déblayer un §Sbloqueur§!, cliquez sur le bouton §SDéblayer le bloqueur§! sur le bloqueur, dans l'onglet §SGestion§!.\n\n\n$tttt$$tttt$$tt$£clear_blocker£\n\n\n§SLes coûts et les durées de déblaiement, ainsi que les besoins en technologie, varient selon les bloqueurs§!."
 blockers_cleared: "Bloqueurs déblayés"
 tutorial_7_tooltip: "§SDidacticiel : les bloqueurs§! ajouté au journal de bord"
 tutorial_8_chain_title: "Didacticiel : reconnaissance de systèmes"
 tutorial_8_chain_desc: "Nous devrions étendre notre influence au-delà de notre £system£§Ssystème natal§!. La première étape consiste à reconnaître les systèmes stellaires avoisinants.\n\nPour ce faire, sélectionnez un £science_ship£§Svaisseau scientifique§! et cliquez sur le bouton §SReconnaissance§! dans son interface. Cliquez ensuite sur le bouton §SOuvrir la carte de la galaxie§! en bas de l'écran, et sélectionnez l'une des étoiles voisines de la nôtre. Le §Svaisseau scientifique§! va alors se rendre dans ce système pour y reconnaître tous les corps qui s'y trouvent."
 tutorial_8_poi: "Reconnaître les cibles"
 tutorial_8_poi_desc: "Reconnaissez les systèmes §S[survey_target_1.GetName]§!, §S[survey_target_2.GetName]§! et §S[survey_target_3.GetName]§!."
 systems_surveyed: "Systèmes reconnus "
 tutorial_8_tooltip: "§SDidacticiel : reconnaissance de systèmes§! ajouté au journal de bord"
 tutorial_9_chain_title: "Didacticiel : [GetBuildGrow] un vaisseau scientifique"
 tutorial_9_chain_desc: "Nous devrions envisager de [GetBuildGrow] un deuxième £science_ship£§Svaisseau scientifique§! afin d'augmenter la vitesse à laquelle nous effectuons la reconnaissance de notre région de la galaxie.\n\nCliquez sur la base stellaire et sélectionnez l'onglet §SChantier spatial§!, puis sélectionnez le §Svaisseau scientifique§! dans la liste.\n\nNotez que vous devrez avoir accumulé suffisamment d'£alloys£§Salliages§! avant que sa construction ne puisse démarrer."
 science_ship_built: "Vaisseau scientifique construit "
 tutorial_9_tooltip: "§SDidacticiel : [GetBuildGrow] un deuxième vaisseau scientifique§! ajouté au journal de bord"
 tutorial_10_chain_title: "Didacticiel : recruter un scientifique"
 tutorial_10_chain_desc: "Notre nouveau £scientist£§Svaisseau scientifique§! doit être commandé par un £science_ship£§Sscientifique§! pour mener à bien les missions de reconnaissance et enquêter sur les §Sanomalies§!.\n\nSélectionnez notre nouveau §Svaisseau scientifique§!, puis cliquez sur le portrait dans l'interface de la flotte. La fenêtre §SChoix d'une personnalité§! s'affichera alors, montrant tous les §Sscientifiques§! que nous employons à l'heure actuelle et ceux disponibles au recrutement. Sélectionnez le candidat que vous désirez.\n\nRecruter une personnalité coûte de l'£unity£§Yunité§!, aussi vous faudra-t-il peut-être attendre d'en avoir suffisamment.\n\nUne fois le scientifique recruté, le §Svaisseau scientifique§! peut partir en exploration."
 scientist_assigned: "Scientifiques recrutés "
 tutorial_10_tooltip: "§SDidacticiel : recruter un scientifique§! ajouté au journal de bord"
 tutorial_11_chain_title: "Didacticiel : [GetBuildGrow] un vaisseau colonial"
 tutorial_11_chain_desc: "Le temps est venu de coloniser un autre monde. Nous devons tout d'abord [GetBuildGrow] un £colony_ship£§Svaisseau colonial§!. Ces §Svaisseaux§! sont longs à [GetBuildGrow] et nécessitent une grande quantité d'£alloys£§Salliages§!, de £food£§Snourriture§! et de £consumer_goods£§Sbiens de consommation§!, mais une £colony£§Scolonie§! florissante sera un retour sur investissement plus que rentable.\n\nCliquez sur votre §Sbase stellaire§! puis sélectionnez l'onglet §SChantier spatial§!. Choisissez alors §SVaisseau colonial§! dans la liste.\n\nNotez que vous devrez avoir accumulé suffisamment de ressources avant que la construction ne puisse démarrer."
 colony_ship_built: "Vaisseaux coloniaux construits "
 tutorial_11_tooltip: "§SDidacticiel : [GetBuildGrow] un vaisseau colonial§! ajouté au journal de bord"
 tutorial_12_chain_title: "Didacticiel : établir une colonie"
 tutorial_12_chain_desc: "Nous devrions maintenant utiliser notre nouveau £colony_ship£§Svaisseau colonial§! pour fonder notre première £colony£§Scolonie§!. Les meilleurs lieux pour ce faire sont les mondes de la même classe que notre monde natal, car les colons n'auront alors aucune difficulté à s'adapter à leur nouvel environnement.\n\nPour coloniser une £planet£§Splanète§!, cliquez sur notre §Svaisseau colonial§! ou sélectionnez-le dans le §Sgestionnaire§!, puis cliquez sur le bouton §SColoniser§! dans l'interface de la flotte, et sélectionnez la planète que vous désirez coloniser. Notez bien, toutefois, que vous ne pourrez lancer la colonisation que des mondes ayant été reconnus, n'ayant pas d'§Sanomalie§!, et qui se trouvent au sein de notre espace. S'il est possible de coloniser des mondes dont l'habitabilité est basse, cela peut toutefois être très onéreux."
 colony_established: "Colonie établie"
 tutorial_12_tooltip: "§SDidacticiel : établir une colonie§! ajouté au journal de bord"
 tutorial_13_chain_title: "Didacticiel : recruter un gouverneur"
 tutorial_13_chain_desc: "Nous devrions recruter un §Sgouverneur planétaire§! pour administrer notre nouvelle £colony£§Scolonie§!. Pour cela, cliquez sur la colonie et ouvrez l'onglet §SAperçu§!, puis cliquez sur le bouton §SChanger§! dans la fenêtre §SGouverneur§!. Cela va ouvrir l'écran §SPersonnalités§! pour montrer les gouverneurs actuellement à notre service.\n\nCliquez sur le bouton §SRecruter§! dans la partie supérieure de l'écran et sélectionnez l'un des candidats disponibles. Notez que les personnalités ont toujours un coût en £unity £§Yunité§! au moment d'être recrutées. Si nous n'en avons pas suffisamment, nous devrons attendre de disposer de la quantité requise.\n\nUne fois recruté, le nouveau gouverneur attendra son assignation sur notre monde natal."
 governor_recruited: "Gouverneur recruté"
 tutorial_13_tooltip: "§SDidacticiel : recruter un gouverneur§! ajouté au journal de bord"
 tutorial_14_chain_title: "Didacticiel : établir d'autres colonies"
 tutorial_14_chain_desc: "Nous devons poursuivre l'expansion de notre espace en fondant de nouvelles £colony£§Scolonies§!. Pensez à [GetBuildGrow] davantage de £colony_ship£§Svaisseaux coloniaux§! lorsque nous aurons suffisamment d'£alloys£§Salliages§!, de £food£§Snourriture§! et de £consumer_goods£§Sbiens de consommation§!, puis envoyez-les fonder ces nouvelles colonies.\n\nVeillez toutefois à ne pas lancer trop de missions de colonisation en même temps, car celles-ci ont un coût élevé en £energy£§Scrédits énergétiques§! jusqu'à ce qu'elles soient autosuffisantes."
 colonies_established: "Colonies établies"
 tutorial_14_tooltip: "§SDidacticiel : établir d'autres colonies§! ajouté au journal de bord"
 tutorial_15_chain_title: "Didacticiel : production de ressources"
 tutorial_15_chain_desc: "Notre industrie, en pleine croissance, a besoin de matières premières, aussi devons-nous augmenter notre approvisionnement en £minerals£§Sminéraux§!. Ils s'acquièrent en [GetBuildingGrowing] des £mining_station£§Sstations minières§! en orbite des corps planétaires riches en minerais, ou en construisant des §Sdistricts miniers§! à la surface de nos £planet£§Splanètes habitées§!.\n\nIl nous faut aussi nous assurer de disposer d'un approvisionnement suffisant en £energy£§Scrédits énergétiques§!, nécessaires pour la maintenance des stations et £building£§Sbâtiments§! planétaires. Ces crédits énergétiques sont produits par les §Sdistricts générateurs§!, à la surface des mondes habités. Ils peuvent également être acquis via les §Sstations minières§! construites en orbite des planètes, astéroïdes et étoiles qui en ont des gisements."
 mineral_income: "Minéraux mensuels > 30 "
 credit_income: "Crédits énergétiques mensuels > 10 "
 tutorial_15_tooltip: "§SDidacticiel : production de ressources§! ajouté au journal de bord"
 tutorial_16_chain_title: "Didacticiel : développer la flotte"
 tutorial_16_chain_desc: "Pour assurer la sécurité de la [Root.GetName], nous devrions [GetBuildGrow] une flotte puissante.\n\nQuelques §Scorvettes§! supplémentaires devraient être suffisantes pour l'instant. Pensez à en [GetBuildGrow] dans une §Sbase stellaire§! lorsque nous disposerons de suffisamment d'§Salliages§!. S'il se trouve une flotte en orbite de la §Sbase§! qui l'a construit, tout nouveau vaisseau militaire l'intègre aussitôt.\n\nPour optimiser la puissance militaire d'une flotte, nous pouvons choisir de nommer un §Samiral§! à sa tête : cela lui confère alors un avantage sur les autres flottes, qui pour la plupart n'ont pas de £commander£§Scommandant§! propre."
 corvettes_built: "Corvettes construites "
 admiral_assigned: "Commandant assigné "
 tutorial_16_tooltip: "§SDidacticiel : développer la flotte§! ajouté au journal de bord"
 tutorial_17_chain_title: "Didacticiel : établir un secteur"
 tutorial_17_chain_desc: "Il y a une limite au nombre de £planet£§Splanètes§! que vous pouvez contrôler directement. Cette limite se trouve dans la barre supérieure, et la dépasser expose à des pénalités. Les §Ssecteurs§! sont semi-autonomes et gèrent les planètes qui ont été assignées à leur contrôle. Pour créer un nouveau secteur, allez dans la vue §Splanètes et secteurs§! en cliquant sur la liste rétractable en haut de l'écran ou en appuyant sur §SF5§!. Puis cliquez sur le bouton §SCréer un nouveau secteur§!, en haut à droite.\n\nVous entrerez alors dans la §Sgestion de secteur§!. De là, vous choisissez quels £system£§Ssystèmes stellaires§! feront partie du nouveau secteur. Toutes les planètes de ces systèmes tomberont alors sous la juridiction du secteur. Sélectionnez un système où nous disposons d'une £colony£§Scolonie§! et cliquez sur le bouton §STerminer§!. Vous avez alors créé votre premier secteur !"
 sector_established: "Secteur établi "
 tutorial_17_tooltip: "§SDidacticiel : établir un secteur§! ajouté au journal de bord"
 tutorial_18_chain_title: "Didacticiel : Gouverneur de secteur"
 tutorial_18_chain_desc: "Nous devrions nommer un £governor£§Sgouverneur§! pour administrer notre nouveau §Ssecteur§!. Toutes les £planet£§Splanètes§! en relevant bénéficieront alors des avantages fournis par son niveau de compétence et ses traits."
 sector_governor_assigned: "Gouverneur de secteur"
 tutorial_18_tooltip: "§SDidacticiel : gouverneur de secteur§! ajouté au journal de bord"
 tutorial_19_chain_title: "Didacticiel : conception d'un vaisseau"
 tutorial_19_chain_desc: "Pour créer un nouveau modèle de vaisseau, ouvrez le §Sconcepteur de vaisseaux§! en cliquant sur §SGestion des flottes§! dans la barre de gauche ou en appuyant sur §SF9§!. Cliquez sur le bouton §SNouveau modèle§! et sélectionnez §SCorvette§! lorsque l'on vous demandera de choisir une §Staille de coque§!. Cliquez ensuite sur le bouton §SAucune section !§! pour sélectionner une §Ssection§! pour votre modèle.\n\nLes corvettes sont les plus petits vaisseaux de guerre, composés d'une seule section, contrairement aux autres vaisseaux. Les sections déterminent le nombre d'emplacements pour les §Sarmes§! et §Sfonctionnalités§!. Choisissez-en une et remplissez les emplacements de composants, en vous assurant que l'alimentation énergétique reste positive.\n\nPour vous faciliter la vie, cliquez simplement sur §SAutomatiser la fin§! et le jeu finira le modèle pour vous."
 ships_designed: "Vaisseaux conçus"
 tutorial_19_tooltip: "§SDidacticiel : conception d'un vaisseau§! ajouté au journal de bord"
 tutorial_20_chain_title: "Didacticiel : postes d'observation"
 tutorial_20_chain_desc: "Nous devrions [GetBuildGrow] un §Sposte d'observation§! au-dessus du monde natal d'une §Ssociété pré-PRL§!. Ces stations spatiales peuvent accomplir diverses §Smissions§!, même si notre propension à interférer avec des cultures en développement déterminera lesquelles.\n\nLes postes d'observation sont construits de la même façon que les £mining_station£§Sstations minières§! ou £science_ship£§Sde recherche§!, mais ils ne peuvent être construits qu'au-dessus du monde natal d'une civilisation pré-PRL. Sélectionnez simplement un £construction_ship£§Svaisseau de construction§!, puis cliquez sur le bouton §S[GetBuildGrowCap] un poste d'observation§! depuis son interface de flotte.\n\nSélectionnez alors le monde natal de la civilisation pré-PRL que vous désirez étudier, et le vaisseau de construction commencera sa mission."
 observation_post_built: "Poste d'observation construit "
 tutorial_20_tooltip: "§SDidacticiel : postes d'observation§! ajouté au journal de bord"
 tutorial_21_chain_title: "Didacticiel : ressources stratégiques"
 tutorial_21_chain_desc: "Nous devrions [GetBuildGrow] une £mining_station£§Sstation minière§! en orbite d'un objet astronomique disposant de £strategic_resource£§Sressources stratégiques§!. Ces matériaux rares ont une valeur stratégique immense.\n\nAprès avoir localisé de telles ressources par la §Sreconnaissance§!, sélectionnez un £construction_ship£§Svaisseau de construction§!, cliquez sur le bouton §S[GetBuildGrowCap] une station minière§! puis sur l'objet astronomique approprié."
 tutorial_21b_chain_title: "Informations : ressources stratégiques"
 tutorial_21b_chain_desc: "Nous avons construit une £mining_station£§Sstation minière§! en orbite d'un objet astronomique disposant d'une £strategic_resource£§Sressource stratégique§!. Ces matériaux rares nécessitent des technologies spécifiques pour être exploités, mais ils ont une valeur immense, aussi devrions-nous toujours être vigilants afin d'en découvrir d'autres sources."
 strategic_resource_extracted: "Ressource stratégique exploitée "
 tutorial_21_tooltip: "§SDidacticiel : ressources stratégiques§! ajouté au journal de bord"
 tutorial_22_chain_title: "Didacticiel : provolution de pré-conscients"
 tutorial_22_chain_desc: "Nous devrions §Sprovoluer§! une espèce inférieure, mais il nous faudra au préalable rechercher la technologie des §SDéclics épigénétiques§!.\n\nCette §Sprovolution§! d'une espèce préconsciente se fait la sélectionnant dans l'écran §SEspèces§! puis en cliquant sur le bouton « Provoluer »."
 tutorial_22_tooltip: "§SDidacticiel : provolution des pré-conscients§! ajouté au journal de bord"
 species_uplifted: "Espèce pré-consciente provoluée "
 tutorial_23_chain_title: "Didacticiel : premier contact"
 tutorial_23_chain_desc: "Ayant rencontré des créatures inconnues dans l'obscurité de l'espace, nous devrions tenter d'§Sétablir des communications§!.\n\nCela peut être fait en menant une procédure de §Spremier contact§! depuis le §Sjournal de bord§!, puis en cliquant sur le bouton §SVoir le contact§!, ou bien en cliquant sur l'icône §SPremier contact§! sur la §Scarte de la galaxie§! afin d'y accéder directement.\n\n\n$tttt$$tttt$$ttt$£firstcontact£\n"
 contact_made: "Contacts établis "
 tutorial_23_tooltip: "§SDidacticiel : premier contact§! ajouté au journal de bord"
 tutorial_24_chain_title: "Didacticiel : modifier les espèces"
 tutorial_24_chain_desc: "Nous pouvons §Smodifier§! toute espèce consciente qui réside au sein de notre empire, si nous disposons de suffisamment de §Spoints de trait§!.\n\nPour ce faire, il suffit d'accéder au menu §SModifier§! dans l'onglet §SEspèces§!, puis de rechercher le §Sprojet spécial§! approprié. Ce projet nécessite de la £society£§Srecherche sociétale§! et détournera toute notre progression technologique vers ce domaine tant qu'il sera actif."
 species_modified: "Espèce modifiée"
 tutorial_24_tooltip: "§SDidacticiel : modifier les espèces§! ajouté au journal de bord"
 tutorial_25_chain_title: "Didacticiel : revendiquer un système"
 tutorial_25_chain_desc: "Nous pouvons élargir nos frontières en [GetBuildingGrowing] des §Sbases stellaires§! autour d'étoiles aliens. Cela permet de sécuriser le £system£§Ssystème§!, d'accéder aux ressources et de bloquer le passage aux aliens avec lesquels nous sommes entrés en contact - si nous leur avons fermé nos frontières.\n\nSélectionnez un £construction_ship£§Svaisseau de construction§!, cliquez sur §S[GetBuildGrowCap] une base stellaire§! dans son interface, puis cliquez sur une étoile. Vous pouvez également faire un clic droit sur l'étoile et cliquer sur §S[GetBuildGrowCap] une base stellaire§!.\n\nAu contraire des autres stations orbitales, ces §Sbases§! peuvent être construites en dehors de nos frontières."
 frontier_outpost_built: "Base stellaire construite "
 tutorial_25_tooltip: "§SDidacticiel : bases stellaires§! ajouté au journal de bord"
 TUTORIAL_PLANETVIEW_MANAGEMENT_TITLE: "Didacticiel : gestion"
 TUTORIAL_PLANETVIEW_MANAGEMENT_DESC: "L'onglet §SGestion§! affiche des informations importantes concernant les conditions et la disposition d'une £planet£§Splanète§!.\n\nLa section des §Sparticularités géographiques§! montre les £blocker£§Sbloqueurs§! naturels qui peuvent être déblayés, ainsi que les §Sparticularités§! existantes.\n\nLa section §SPopulation actuelle§! montre toutes les £pops£§Spops§! de la £planet£§Splanète§!.\n\nLe panneau du £sector£§Ssecteur§! permet à la planète d'être gérée en tant que partie d'un §Ssecteur§!, automatisant ainsi son administration.\n\nL'§Sascension coloniale§! permet d'effectuer l'ascension de vos colonies, ce qui améliore considérablement vos §Splanètes§! si vous possédez les ressources nécessaires."
 TUTORIAL_DATABANK_TITLE: "Didacticiel : banque de données"
 TUTORIAL_DATABANK_DESC: "La £databank£§Sbanque de données§! est votre ressource principale pour comprendre le fonctionnement du jeu.\n\nLes entrées y sont organisées par catégories, simplifiant la recherche de mécaniques spécifiques, de §Sparticularités§! ou de concepts lorsque vous en ressentez le besoin.\n\nFaites simplement une recherche, ou sélectionnez un sujet dans la liste pour en apprendre plus."
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_TITLE: "Didacticiel : objectifs et chronologie"
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_DESC: "Le système d'£focus_core£§Sobjectifs de l'empire§! a pour but de guider le développement de votre empire en vous laissant choisir votre priorité : £focus_exploration£§Sexploration§!, £focus_conquest£§Sconquête§! ou £focus_development£§Sdéveloppement§!.\n\nChaque objectif propose une série de cartes de tâches à accomplir pour diriger vos actions en fonction du chemin que vous aurez choisi. Terminer une carte vous octroiera des §Spoints de progression§! dans la catégorie concernée.\n\nL'objectif en cours augmente vos chances de recevoir des tâches liées à cette catégorie. Les cartes peuvent être rafraîchies en échange d'un coût en £unity£§Sunité§! et l'objectif peut être modifié.\n\nSuivez vos objectifs dans les onglets §STerminé§! et §SProgression§! pour savoir si vous vous rapprochez de votre prochain palier de récompenses.\n\nLa §Schronologie§! affiche les étapes clés majeures et les événements historiques de votre empire, depuis son §Sorigine§!. Les nouvelles entrées apparaissent au fil des événements clés qui ont lieu."
 TUTORIAL_COLONIZATION_TITLE: "Didacticiel : coloniser une planète"
 TUTORIAL_COLONIZATION_DESC: "C'est sur l'écran §SColonisation§! que vous préparez une planète pour sa colonisation.\n\nUne §Sespèce§! doit être sélectionnée afin de coloniser la planète, et une §Sdésignation de la colonie§! doit être assignée afin de déterminer son objectif de développement.\n\nUn aperçu des §Sdistricts§! disponibles, de la §Staille de la planète§! et des potentiels §Smodificateurs§! est affiché, ainsi que les §Sparticularités géographiques§! pouvant affecter la planète.\n\nOrienter le développement en fonction des ressources naturelles de la §Splanète§! vous aidera à tirer un maximum de vos colonies."
