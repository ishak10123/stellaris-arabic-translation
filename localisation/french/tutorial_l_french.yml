 SITLOG: "Journal de bord mis à jour"
 ####################################
 #Advisor Tutorial Messages
 ####################################
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_TITLE: "Gouvernement"
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_DESC: "L'écran de §Sgouvernement§! présente des informations concernant l'empire et son gouvernement. Nous pouvons y voir notre §Sdirigeant§! et tous les effets qui y sont liés.\n\nUn onglet donne un aperçu détaillé de la §Sdémographie§! de l'empire."
 TUTORIAL_TECH_VIEW_TITLE: "Didacticiel : technologies"
 TUTORIAL_TECH_VIEW_DESC: "C'est à partir de l'écran §STechnologies§! que nous dirigerons nos efforts de recherche. Les technologies appartiennent à trois champs différents, chacun proposant habituellement trois options de recherche.\n\nLes trois champs sont : la recherche £society£sociétale, la recherche £physics£physique et la recherche en £engineering£ingénierie.\n\nPour lancer une recherche :\n\n£dot_green£ Cliquez sur le bouton §SSélectionner une recherche§! ;\n£dot_green£ Choisissez une des options proposées.\n\nPour accélérer les recherches, nous vous recommandons de nommer un §Sdirecteur scientifique§!. Les §Straits§! de la personnalité choisie peuvent aussi vous conférer des avantages.\n\nLa recherche peut également être automatisée en cliquant sur le bouton §SRecherche automatisée§! dans chaque champ respectif.\n\n$tttt$$ttt$£automate_research£\n"
 TUTORIAL_CONTACTSVIEW_EMPIRES_TITLE: "Didacticiel : contacts"
 TUTORIAL_CONTACTSVIEW_EMPIRES_DESC: "Dans l'écran des §SContacts§!, nous disposons de la liste détaillée de tous les §Sempires§! rencontrés. Leur §Sopinion§! à notre égard est visible d'un coup d'oeil, et nous pouvons rapidement et facilement y engager des §Srelations diplomatiques§!.\n\nChaque entrée indique également des informations importantes telles que le §Srégime politique§!, les §Séthiques§! et le §Sstatut de l'empire§!.\n\nÀ partir de cette fenêtre, nous pouvons également accéder aux opérations d'§Sespionnage§! et consulter les §Saccords§! existants avec chaque empire."
 TUTORIAL_SITUATION_LOG_TITLE: "Didacticiel : journal de bord"
 TUTORIAL_SITUATION_LOG_DESC: "Le §Sjournal de bord§! dresse la liste de tous les §Sprojets spéciaux§! et £archaeology£§Ssites archéologiques§! disponibles actuellement ainsi que des points d'intérêts.\n\nDe nouvelles entrées y apparaîtront certainement à mesure que nous explorerons la galaxie."
 TUTORIAL_SHIP_DESIGNER_TITLE: "Didacticiel : concepteur de vaisseaux"
 TUTORIAL_SHIP_DESIGNER_DESC: "C'est ici que sont conçus tous les §Svaisseaux§! utilisés au sein de l'empire. De nouvelles §Stailles de coque§! et §Scomposants§! seront débloqués à mesure que nous découvrirons de nouvelles technologies.\n\nPour créer un nouveau §Smodèle§! :\n\n£dot_green£ Cliquez sur le bouton §SNouveau modèle§! ;\n£dot_green£ Sélectionnez une §Staille de coque§! ;\n£dot_green£ Cliquez sur le bouton §SAucune section !§! et sélectionnez une §Ssection§!.\n\nChoisissez ensuite vos §Scomposants de vaisseaux§! en cliquant sur les emplacements disponibles.\n\n\n$tttt$$tt$£slot_component£\n\n\nUne fois le modèle sauvegardé, vous pouvez le construire depuis une §Sbase stellaire§! disposant d'un §Schantier spatial§!."
 TUTORIAL_EMPIREVIEW_PLANETS_TITLE: "Didacticiel : planètes et secteurs"
 TUTORIAL_EMPIREVIEW_PLANETS_DESC: "L'écran §SPlanètes et secteurs§! offre un aperçu de l'ensemble des mondes colonisés, leurs £pops£§Spops§! et les §Sressources§! qui y sont produites.\n\nAu fil de son évolution, l'empire peut être organisé en §Ssecteurs§! afin de faciliter sa gestion.\n\nIl est également possible de créer des £vassal£§Svassaux§! à partir de §Ssecteurs existants§!."
 TUTORIAL_MILITARY_FLEET_TITLE: "Didacticiel : flottes militaires"
 TUTORIAL_MILITARY_FLEET_DESC: "Les §Sflottes militaires§! sont utilisées pour protéger notre empire émergent de toute menace. Ou pour l'étendre par la force si nous le désirons...\n\nLa taille de notre flotte est déterminée par notre §Scapacité navale§! actuelle, qui est initialement limitée. Elle peut toutefois être augmentée en :\n\n£dot_green£ Découvrant de nouvelles §Stechnologies§! ;\n£dot_green£ Augmentant la taille de la £pops£population ;\n£dot_green£ Construisant des §Sancrages de base stellaire§!.\n\nUn £commander£§Scommandant§! peut être nommé à la tête d'une flotte, lui conférant alors une puissance militaire accrue, en plus des avantages habituellement fournis par les £leader£§Spersonnalités§!."
 TUTORIAL_SCIENCE_SHIP_TITLE: "Didacticiel : reconnaissance"
 TUTORIAL_SCIENCE_SHIP_DESC: "Voici notre £science_ship£§Svaisseau scientifique§!, utilisé pour la §Sreconnaissance§! d'objets astronomiques tels que les £planet£§Splanètes§! d'un £system£§Ssystème stellaire§!. Une planète doit être reconnue afin que ses §Sressources§! deviennent visibles.\n\nNotre système natal a déjà été reconnu, aussi devrions-nous concentrer notre attention ailleurs.\n\nUne fois le §Svaisseau scientifique§! sélectionné :\n\n£dot_green£ Faites un clic droit sur un §Ssystème§! voisin ;\n£dot_green£ Cliquez sur §SReconnaissance du système§!."
 TUTORIAL_CONSTRUCTION_SHIP_TITLE: "Didacticiel : vaisseau de construction"
 TUTORIAL_CONSTRUCTION_SHIP_DESC: "Voici notre £construction_ship£§Svaisseau de construction§!, utilisé pour construire les stations spatiales.\n\nLorsqu'un objet astronomique tel qu'une £planet£§Splanète§! a été reconnu, nous pouvons ordonner à ce vaisseau d'y construire une £science_ship£§Sstation de recherche§! ou une £mining_station£§Sstation minière§! pour exploiter les ressources qui s'y trouvent.\n\nLes §Svaisseaux de construction§! sont aussi utilisés pour [GetBuildGrow] des §Sbases stellaires§! dans les £system£§Ssystèmes§! non revendiqués, ce qui fait qu'ils sont donc indissociables de nos projets d'expansion."
 TUTORIAL_PLANETVIEW_PLANET_TITLE: "Didacticiel : surface"
 TUTORIAL_PLANETVIEW_PLANET_DESC: "L'onglet §SSurface§! fournit un aperçu des infrastructures et de l'état d'une £planet£§Splanète§!.\n\nLa section £building£§SDistricts et bâtiments§! indique la totalité des emplacements de construction par district, qu'ils soient vides ou déjà pris.\n\nLes £district£§Sdistricts§! et les §Szones§! offrent des £housing£§Slogements§!, des £job£§Semplois§!, et des ressources.\n\nL'option d'§Sautomatisation§! permet à la planète de s'autogérer selon votre objectif.\n\nLa barre en haut de la fenêtre affichant les §Sstatistiques planétaires§! indique les taux de £stability£§Sstabilité§! et de £crime£§Scriminalité§!, les modificateurs appliqués, ainsi que le §Sgouverneur§! assigné."
 TUTORIAL_PLANETVIEW_TILES_TITLE: "Didacticiel : économie"
 TUTORIAL_PLANETVIEW_TILES_DESC: "L'onglet §SÉconomie§! fournit un aperçu de la §Smain-d'oeuvre§! et des £job£§Semplois§!.\n\nLa population d'un £planet£§Smonde§! est répartie en §Sclasses§! sociales, qui peuvent être développées pour faire apparaître les divers types d'§Semplois§!. Les §S£pops£pops§! remplissent les classes selon les besoins pour maintenir la §Smain-d'oeuvre§!.\n\nLes §Semplois§! consomment et génèrent des ressources.\n\nLes pops ont besoin de £housing£§Slogements§! et de £amenities£§Sservices§!.\n\nSi l'un des deux vient à manquer, le £happiness£§Sbonheur§! diminue, ce qui aura un impact sur la £stability£§Sstabilité§!."
 TUTORIAL_PLANETVIEW_COMBAT_TITLE: "Didacticiel : armées"
 TUTORIAL_PLANETVIEW_COMBAT_DESC: "L'onglet §SArmées§! permet de gérer toutes les forces au sol de ce monde. Il indique également la §Sdévastation§! subie par ce £planet£§Smonde§!, c'est-à-dire ses dommages.\n\nDe nouvelles §Sarmées§! peuvent aussi y être recrutées en cliquant sur le bouton §SRecruter§!.\n\nLes §Sarmées défensives§! sont produites automatiquement par les £pops£§Spops§! occupant les £job£§Semplois§! d'agents de sécurité ou de [soldier.GetName_lower], fournis par le capitole du monde, les £building£§Smaisons de loi§!, et les £building£§Sbastions§!."
 TUTORIAL_PLANETVIEW_SPACEPORT_TITLE: "Spatioport"
 TUTORIAL_PLANETVIEW_SPACEPORT_DESC: "L'onglet §SSpatioport§! permet de voir nos flottes en orbite et de [GetBuildGrow] de nouveaux vaisseaux civils. Les vaisseaux militaires, quant à eux, ne peuvent être construits que dans une §Sbase stellaire§! équipée d'un §Schantier spatial§!, mais les §Svaisseaux§! de construction, de recherche et de colonisation sont construits là.\n\nMême si nous en venons à perdre notre dernière base stellaire, nous aurons donc les moyens de nous étendre et de recouvrer nos forces si nous possédons toujours au moins un £planet£§Smonde habité§!."
 TUTORIAL_MILITARY_STATION_TITLE: "Didacticiel : stations militaires"
 TUTORIAL_MILITARY_STATION_DESC: "Les §Sstations militaires§! sont des défenses statiques qui peuvent être utilisées pour protéger soit des £planet£§Splanètes§! importantes, soit des axes d'approche stratégiques. Elles ne peuvent toutefois être construites qu'au sein de nos frontières, ou dans des espaces où nous disposons d'un accès spécial.\n\nMieux vaut ne pas trop en [GetBuildGrow] : comme pour les §Svaisseaux§!, leur coût d'entretien peut peser lourdement sur l'économie."
 TUTORIAL_RESEARCH_STATION_TITLE: "Didacticiel : stations de recherche"
 TUTORIAL_RESEARCH_STATION_DESC: "Une £science_ship£§Sstation de recherche§! construite en orbite d'un corps planétaire permet de collecter les données £physics£§Sphysiques§!, £society£§Ssociétales§! et d'£engineering£§Singénierie§! de celui-ci.\n\nElles ne peuvent être construites qu'au sein de nos frontières et ne sont pas nécessaires si la £planet£§Splanète§! a déjà été colonisée."
 TUTORIAL_MINING_STATION_TITLE: "Didacticiel : stations minières"
 TUTORIAL_MINING_STATION_DESC: "Les £mining_station£§Sstations minières§! sont utilisées pour extraire les £minerals£§Sminéraux§! et £strategic_resource£§Sressources stratégiques§! des objets autour desquels elles orbitent.\n\nElles ne sont pas nécessaires pour accéder aux ressources des £planet£§Smondes colonisés§!, mais peuvent uniquement être construites au sein de nos frontières."
 TUTORIAL_TRANSPORT_SHIP_TITLE: "Didacticiel : vaisseaux de transport"
 TUTORIAL_TRANSPORT_SHIP_DESC: "Lorsque des §Sarmées§! sont envoyées dans l'espace, elles embarquent automatiquement dans ces vaisseaux de §Stransport§! Assurez-vous de les protéger, puisqu'ils sont sans défense !"
 TUTORIAL_DIPLOMACY_VIEW_TITLE: "Didacticiel : diplomatie"
 TUTORIAL_DIPLOMACY_VIEW_DESC: "L'écran §SDiplomatie§! est l'endroit où nous communiquons avec les autres civilisations : c'est là que nous pouvons, entre autres, §Sdéclarer la guerre§!, créer des §Sréseaux d'espionnage§! chez nos voisins, ou contracter des §Salliances§! et des §Saccords commerciaux§! avec eux. C'est également ici que l'on peut observer notre §Hniveau de renseignements§!.\n\nLes §Srelations§! avec l'empire sélectionné sont affichées sous la forme de cinq niveaux, allant d'« exécrables » à « excellentes ». Afin de conclure un accord, il faut avoir un niveau de relations suffisant.\n\nDes £envoy£§Sémissaires§! peuvent être affectés à un empire pour l'§Sespionner§!, réunir des §Srenseignements§!, contourner les conditions liées aux §Srelations§!, ou encore §Saméliorer§! ou §Sdégrader§! ces relations."
 TUTORIAL_DIPLOMACY_VIEW_TRADE_TITLE: "Didacticiel : commerce"
 TUTORIAL_DIPLOMACY_VIEW_TRADE_DESC: "Ceci est l'écran où se déroulent les §Séchanges commerciaux§!. Nous pouvons y échanger tout type de §Sressource§! avec n'importe quel empire, ainsi que des §Sinformations§! et des §Sfaveurs§!.\n\nCes faveurs peuvent être utilisées pour accroître la bonne volonté d'un empire et le pousser à accepter un accord. Nous pouvons aussi les utiliser au cours d'un vote au Sénat de la §HCommunauté galactique§! afin d'accroître notre poids diplomatique."
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_TITLE: "Types de fédérations"
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_DESC: "Les divers §Stypes de £federation£fédérations§! décident des priorités de celles-ci. Chaque type, à sa formation, dispose d'un ensemble d'§Satouts§! et de §Slois§!, et en §Sadoptera§! d'autres à mesure qu'il gagnera en expérience."
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_TITLE: "Didacticiel : renseignements élevés"
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_DESC: "Notre §Sniveau de renseignements§! sur cet empire est §Sélevé§!, et nous disposons donc de davantage d'informations sur lui.\n\nConserver des renseignements élevés avec un empire assure de toujours disposer d'informations à jour concernant ses §Séthiques§! et §Scivismes§!, ses §Srelations§! avec les autres empires, ses §Stechnologies§!, son §Séconomie§! et sa §Spuissance militaire§! par rapport à la nôtre."
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_TITLE: "Didacticiel : renseignements faibles"
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_DESC: "Notre §Sniveau de renseignements§! sur cet empire chute. Nous risquons de ne plus disposer des informations auparavant réunies sur lui, car les renseignements se §Spériment§! avec le temps.\n\nIl est possible d'améliorer le §Sniveau de renseignements§! en :\n\n£dot_green£ Contractant et conservant des §Saccords diplomatiques§! ;\n£dot_green£ Affectant des £envoy£§Sémissaires§! pour améliorer les relations ;\n£dot_green£ Maintenant un §Sréseau d'espionnage§! ;\n£dot_green£ Établissant une §Sambassade§! sur leur territoire."
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_TITLE: "Effets adjacents"
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_DESC: "Certains £building£§Sbâtiments§! peuvent susciter des §Seffets adjacents§! pour les autres §Sbâtiments§! situés dans les §Stuiles§! voisines. Il est important de le prendre en considération lors de la construction de nouvelles structures."
 TUTORIAL_GOVERNMENTVIEW_BUDGET_TITLE: "Le budget"
 TUTORIAL_GOVERNMENTVIEW_BUDGET_DESC: "L'onglet §SBudget§! récapitule les §Srevenus§! et §Sdépenses§! mensuels de l'empire, en £energy£crédits énergétiques. Nous pouvons également y retrouver un éventail d'effets qui influent sur l'économie."
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_TITLE: "Les édits"
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_DESC: "Dans cet écran peuvent être promulgués les §Sdécrets§!, des politiques qui s'appliquent à tout l'empire, si nous y consacrons une part de nos ressources.\n\nChaque décret a un coût de maintien mensuel, qui peut être couvert par le §Hfonds pour les décrets§! ou en dépensant de l'£unity£§Yunité§!."
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_TITLE: "Didacticiel : démographie"
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_DESC: "L'onglet §SDémographie§! permet de suivre l'évolution et le développement de la population de l'empire.\n\nIl montre également les §Straits§! dominants de nos £pops£§Spops§! et, entre autres choses, les modificateurs de productivité et de £happiness£§Sbonheur§!."
 TUTORIAL_EMPIREVIEW_LEADERS_TITLE: "Didacticiel : personnalités"
 TUTORIAL_EMPIREVIEW_LEADERS_DESC: "L'écran §SPersonnalités§! fournit un aperçu de toutes les £leader£§Spersonnalités§! et permet de les recruter, les congédier et les gérer de manière générale.\n\nLa §Sclasse§! d'une personnalité détermine les fonctions qu'elle peut exercer dans l'empire, et quels postes elle peut occuper au §SConseil§!.\n\nLe vivier des §Spersonnalités§! disponibles est renouvelé périodiquement, mais la capacité de recrutement est limitée. Dépasser ce plafond accroît le coût de leur entretien et freine leur expérience. Il est donc conseillé de congédier les personnalités inutiles."
 TUTORIAL_EMPIREVIEW_FACTIONS_TITLE: "Didacticiel : factions"
 TUTORIAL_EMPIREVIEW_FACTIONS_DESC: "L'écran §SFactions§! offre un aperçu des tendances politiques au sein de la population. Soyez bien conscients que les remous du climat sociopolitique peuvent donner naissance à des §Sfactions§!. C'est là que vous pouvez trouver les informations sur l'importance des §Sfactions§!, leur attractivité pour les £pops£§Spops§! et leur §Sapprobation§!.\n\nLes §Sfactions§! ont des §Squestions§! qui déterminent leur §Sapprobation§! générale, et les politiques et actions du gouvernement peuvent les mécontenter ou les satisfaire, et susciter dans ce dernier cas davantage d'£unity£§Sunité§!.\n\nLa puissance des §Sfactions§! et la nature de leurs §Squestions§! peuvent évoluer selon les circonstances, mais gardez bien à l'esprit que le £happiness£§Sbonheur§! d'une §Spop§! est déterminé en partie par l'§Sapprobation§! de la §Sfaction§! à laquelle elle appartient.\n\nIl est aussi possible de §Sgérer les factions§! afin de manipuler les relations entre elles et le gouvernement, en allant jusqu'à adopter les éthiques d'une §Sfaction§! particulièrement puissante."
 TUTORIAL_CREATESECTOR_TITLE: "Didacticiel : gestion du secteur"
 TUTORIAL_CREATESECTOR_DESC: "Pour établir un §Ssecteur§!, il faut tout d'abord sélectionner un £planet£§Smonde§! dans l'§Sespace frontalier§! et cliquer sur $CREATE_SECTOR_BUTTON$. Cela fera de ce monde la §Scapitale§! du nouveau secteur, et tous les systèmes de l'espace frontalier se trouvant à une portée de six hypersauts y seront assignés. La construction de £building£§Sbâtiments§! planétaires sur ces mondes peut être automatisée si cette option est choisie et s'ils disposent des ressources nécessaires, permettant ainsi de réduire grandement la microgestion."
 TUTORIAL_CONTACTSVIEW_SPECIES_TITLE: "Didacticiel : espèces"
 TUTORIAL_CONTACTSVIEW_SPECIES_DESC: "L'écran §SEspèces§! dresse la liste de tous les êtres intelligents rencontrés, permettant d'§Safficher les espèces§! pour ne voir que les habitants de l'empire ou au contraire tous ceux connus dans la galaxie.\n\nSi nous en avons les moyens et la technologie, il est possible de §Smodifier§! ici les traits des espèces, §Sprovoluer§! les créatures préconscientes, §Sdéfinir les droits par défaut§! de toutes nos £pops£§Spops§!, ou au contraire §Sdéfinir des droits particuliers§! pour chacune des espèces de nos citoyens."
 TUTORIAL_PLANETVIEW_TERRAFORM_TITLE: "Didacticiel : terraformation"
 TUTORIAL_PLANETVIEW_TERRAFORM_DESC: "La §Sterraformation§! nous permet d'altérer les conditions environnementales d'une £planet£§Splanète§! afin qu'elle devienne plus adéquate pour une §Sespèce§! ou un objectif particulier."
 TUTORIAL_GENEMODIFICATION_TITLE: "Modification génétique"
 TUTORIAL_GENEMODIFICATION_DESC: "Nous pouvons altérer génétiquement cette espèce en modifiant ses §Straits§!.\n\nCela va permettre de créer un nouveau §Smodèle§! d'espèce, doté des traits que vous aurez choisis. Avant que la moindre £pops£§Spop§! de cette espèce ne soit réellement modifiée, vous devrez cliquer sur le bouton §S$SPECIES_MODIFICATION_APPLY_TEMPLATE$§!, ce qui lancera un nouveau §Sprojet spécial§!."
 TUTORIAL_UPLIFTING_TITLE: "Provolution"
 TUTORIAL_UPLIFTING_DESC: "Nous pouvons modifier les §Straits§! de ces animaux intelligents et les §Sprovoluer§! pour qu'ils deviennent des citoyens réellement doués de raison et productifs pour l'empire."
 TUTORIAL_SYSTEMVIEW_TITLE: "Vue système"
 TUTORIAL_SYSTEMVIEW_DESC: "Nous voici désormais en §SVue système§!, une vue agrandie d'un £system£§Ssystème stellaire particulier§!. Ici nous pouvons visuellement localiser les £planet£§Splanètes§!, les stations et les flottes avec facilité."
 TUTORIAL_WORMHOLE_STATION_TITLE: "Station de trou de ver"
 TUTORIAL_WORMHOLE_STATION_DESC: "Les §Sstations de trou de ver§! sont construites sur la bordure extérieure d'un £system£§Ssystème§!, transformant de minuscules déchirures dans l'espace-temps en des portails bidirectionnels vers d'autres étoiles. Ingénieux."
 TUTORIAL_OBSERVATION_STATION_TITLE: "Didacticiel : postes d'observation"
 TUTORIAL_OBSERVATION_STATION_DESC: "Les §Spostes d'observation§! hébergent des équipes de £scientist£§Sscientifiques§! qui conduisent des recherches et observent à distance les espèces §Spré-PRL§! des £planet£§Smondes§! autour desquelles ils orbitent.\n\nSelon l'§Séthique§! et les technologies employées par l'empire, il est possible d'opter pour une observation passive, une influence culturelle, une illumination technologique, voire un enlèvement ou une infiltration.\n\nCes choix affectent l'évolution de la civilisation et sa perception de l'empire."
 TUTORIAL_TERRAFORMING_STATION_TITLE: "Station de terraformation"
 TUTORIAL_TERRAFORMING_STATION_DESC: "Les §SStations de terraformation§! permettent la §Sterraformation§! des planètes qu'elles orbitent."
 TUTORIAL_PLANETVIEW_EDICTS_TITLE: "Les décisions"
 TUTORIAL_PLANETVIEW_EDICTS_DESC: "Les §Sdécisions§! sont propres à chaque monde et peuvent être prises de façon temporaire au prix d'une part de nos ressources.\n\nÀ mesure que de nouvelles technologies seront découvertes et que nous serons confrontés à des situations nouvelles, de nouvelles §Sdécisions§! pourront être prises."
 TUTORIAL_UNKNOWN_ALIEN_FLEET_TITLE: "Inconnus"
 TUTORIAL_UNKNOWN_ALIEN_FLEET_DESC: "Ce sont des §Sentités non identifiées voyageant dans l'espace§!. Nous pouvons en apprendre plus sur elles, et peut-être même initier un §Spremier contact§!, en terminant le §Sprojet spécial§! qui leur est lié."
 TUTORIAL_VICTORY_TITLE: "Didacticiel : victoire"
 TUTORIAL_VICTORY_DESC: "L'écran de §Svictoire§! liste §Scertaines conditions§! que nous pouvons chercher à atteindre afin de nous assurer que l'héritage de notre empire survive aussi longtemps qu'il existera une vie intelligente dans la galaxie."
 TUTORIAL_OUTPOST_STATION_TITLE: "Didacticiel : bases stellaires"
 TUTORIAL_OUTPOST_STATION_DESC: "Voici la §Sbase stellaire§! de notre système. Ces stations spatiales, qui peuvent être améliorées, marquent notre contrôle sur le système et sont souvent en charge de la construction de tous les types de §Svaisseaux§!.\n\nNotre espace peut être étendu en [GetBuildingGrowing] des §Sbases stellaires§! dans les systèmes voisins.\n\nIl est possible de capturer les §Sbases stellaires§! ennemies en les attaquant.\n\n§SLes bases stellaires§! peuvent être spécialisées grâce à leurs §Smodules§! et leurs £building£§Sbâtiments§!, et sont la dernière ligne de défense contre des flottes ennemies présentes dans le système."
 TUTORIAL_GALAXY_MAP_TITLE: "Carte de la galaxie"
 TUTORIAL_GALAXY_MAP_DESC: "La §Scarte de la galaxie§! affiche les vastes étendues de l'§Sespace non reconnu§!, nos frontières, et les territoires de toutes les civilisations aliens avec lesquelles nous avons établi le contact.\n\nCliquer sur les boutons des §Scartes détaillées§!, en bas à droite de l'écran, permet d'afficher ou non les §Sressources§! et la §Sportée des capteurs§!."
 TUTORIAL_WAR_GOAL_TITLE: "Les buts de guerre"
 TUTORIAL_WAR_GOAL_DESC: "Lorsque nous déclarons la guerre il convient aussi de déclarer nos intentions, aussi bien à nos ennemis qu'à nos alliés. Ce §Sbut de guerre§! détermine le type d'exigences que nous pourrons formuler lors des négociations de paix, depuis la cession des £system£§Ssystèmes§! revendiqués jusqu'à la vassalisation.\n\nCes buts permettent à l'ennemi de réagir en conséquence : il peut ainsi se rendre immédiatement, présenter une contre-offre et une trêve, ou défendre ses intérêts jusqu'au dernier homme, femme, spore fongique ou herbivore semi-conscient. Découvrir sa réaction fait partie du plaisir !\n\nPour formuler un §Sbut de guerre§!, il suffit de cliquer dessus dans la liste."
 TUTORIAL_WAROVERVIEW_TITLE: "Suivi de la guerre"
 TUTORIAL_WAROVERVIEW_DESC: "Ce menu présente un aperçu de la guerre en cours. Chaque camp souffre de §Slassitude de guerre§!, selon la façon dont le conflit se déroule, ce qui détermine à quel point chacun est prêt à accepter un accord de paix.\n\nSi la lassitude de guerre atteint 100% pour un camp, l'autre pourra imposer un accord de §Sstatu quo§!. Le résultat de l'ensemble des engagements qui se sont produits au cours du conflit peut aussi être consulté ici."
 TUTORIAL_STRATEGIC_RESOURCES_TITLE: "Les ressources stratégiques"
 TUTORIAL_STRATEGIC_RESOURCES_DESC: "L'écran §HRessources stratégiques§! dresse la liste de toutes les £strategic_resource£§Sressources stratégiques§! à notre disposition, ainsi que leurs effets.\n\nNombre d'entre elles nécessitent qu'une §Stechnologie§! particulière ait été découverte avant de pouvoir être minées et exploitées."
 TUTORIAL_EXPANSION_PLANNER_TITLE: "Didacticiel : planificateur d'expansion"
 TUTORIAL_EXPANSION_PLANNER_DESC: "C'est dans le §Hplanificateur d'expansion§! que l'on peut trouver les £planet£§Smondes§! §Shabitables§! pouvant être colonisés. C'est là aussi que l'on peut [GetBuildGrow] les £colony_ship£§Svaisseaux coloniaux§! et leur donner des ordres directs.\n\nLes mondes concernés doivent avoir été reconnus au préalable, et une enquête doit avoir été menée sur chaque anomalie qui s'y trouverait avant qu'il ne soit ouvert à la colonisation.\n\nUne §Sbase stellaire§! doit aussi avoir été construite dans le £system£§Ssystème§! concerné, de manière à ce qu'il soit inclus au sein de notre espace."
 TUTORIAL_TRADITIONS_TITLE: "Didacticiel : traditions"
 TUTORIAL_TRADITIONS_DESC: "L'écran §HTraditions§! affiche les divers §Sarbres de traditions§! qui s'offrent à l'empire.\n\nUn §Sarbre de traditions§! doit être §Sadopté§! avant que les £traditions£§Straditions§! qui le constituent puissent l'être à leur tour.\n\n§SAdopter§! un §Sarbre de traditions§! ou une §Stradition§! spécifique a un certain coût en £unity£§Hunité§!. Ce prix augmente à mesure que des §Straditions§! sont adoptées et que l'empire se développe.\n\nPour adopter un §Sarbre de traditions§! :\n\n£dot_green£ Cliquez sur le bouton §SSélectionner§! ;\n£dot_green£ Cliquez sur le bouton §SAdopter§! correspondant à l'arbre désiré.\n\nPour consulter les §Straditions§! disponibles, survolez les différents §Sarbres de traditions§!."
 TUTORIAL_TRADITIONS_SELECT_TITLE: "Adopter un arbre de traditions"
 TUTORIAL_TRADITIONS_SELECT_DESC: "Cet écran affiche tous les §Harbres de traditions§! qui s'offrent à notre empire. Vous pouvez y consulter les £traditions£§Htraditions§! de chaque arbre, ainsi que leur coût d'§Hadoption§! et les §Heffets§! apportés par ces arbres une fois l'ensemble de leurs traditions adopté.\n\nJe vous ai recommandé certains §Harbres de traditions§! pour débuter."
 TUTORIAL_TRADITIONS_NEW_TITLE: "Nouveaux arbres ou traditions"
 TUTORIAL_TRADITIONS_NEW_DESC: "Dès que l'empire a une £unity£§Hunité§! suffisante, il est possible de §Hchoisir§! un §Hnouvel arbre§! ou une £traditions£§Htradition§! dans l'un des arbres déjà ouverts."
 TUTORIAL_ASCENSION_PERKS_TITLE: "Didacticiel : atouts de l'ascension"
 TUTORIAL_ASCENSION_PERKS_DESC: "La liste des §Hatouts de l'ascension§! montre tous les §Satouts§! que l'on peut potentiellement adopter. Certains ont des prérequis spécifiques, tels qu'une §Stechnologie§! ou un certain nombre d'§Semplacements d'atouts de l'ascension§! non pourvus.\n\nUn §Hemplacement d'atout§! est disponible dès lors que toutes les £traditions£§Htraditions§! d'un §Sarbre de traditions§! ont été adoptées."
 TUTORIAL_SPECIES_RIGHTS_TITLE: "Didacticiel : droits des espèces"
 TUTORIAL_SPECIES_RIGHTS_DESC: "La liste des §Hdroits des espèces§! permet de définir, entre autres, les droits propres aux §Scitoyens§! et leurs §Sconditions de vie§!, espèce par espèce.\n\nLorsque les §Sdroits par défaut§! sont modifiés, ces droits s'appliquent à toutes les £pops£§Spops§! pour lesquelles des §Sdroits propres à leur espèce§! n'avaient pas encore été définis : les migrants, les réfugiés ou d'autres nouveaux venus au sein de notre espace."
 TUTORIAL_FLEET_MANAGER_TITLE: "Didacticiel : gestion des flottes"
 TUTORIAL_FLEET_MANAGER_DESC: "Dans la fenêtre de §SGestion des flottes§!, nous pouvons créer des modèles pour les flottes militaires. À mesure que nos flottes seront plus importantes, ces modèles permettront de gagner du temps en commandant des vaisseaux de remplacement pour toute perte subie."
 TUTORIAL_CLAIMS_VIEW_TITLE: "Didacticiel : revendications"
 TUTORIAL_CLAIMS_VIEW_DESC: "Grâce à l'interface des §Srevendications§!, nous pouvons dépenser de l'£influence£§Sinfluence§! pour revendiquer des £system£§Ssystèmes stellaires§! possédés par d'autres empires.\n\nAvoir une revendication sur un §Ssystème§! nous alloue un §Scasus belli§! contre quiconque possède le système, nous permettant alors de déclarer la guerre afin de le conquérir.\n\nLors des conflits impliquant plusieurs alliés dans le même camp, l'empire ayant la plus forte §Srevendication§! sur un §Ssystème§! sera celui qui en obtiendra la possession si la guerre se termine par une victoire."
 TUTORIAL_ANOMALIES_TITLE: "Didacticiel : anomalies"
 TUTORIAL_ANOMALIES_DESC: "L'écran §SAnomalies§! liste toutes les §Sanomalies§! rencontrées sur lesquelles aucune recherche n'a encore été menée, ainsi que leur emplacement. Celles-ci peuvent être étudiées à l'aide d'un £science_ship£§Svaisseau scientifique§! auquel un £scientist£§Sscientifique§! aura été attitré."
 TUTORIAL_GOVERNMENTVIEW_MARKET_TITLE: "Didacticiel : marché intérieur"
 TUTORIAL_GOVERNMENTVIEW_MARKET_DESC: "Grâce à l'écran £market£§SMarché§!, vous pouvez acheter ou vendre des ressources. Il ne s'agit au départ que d'un marché intérieur, mais si le contact est établi avec un nombre suffisant d'empires, il sera possible d'en faire un §Smarché galactique§!.\n\nLes ressources peuvent être achetées et vendues en utilisant votre £trade£§Svaleur commerciale§!, qui sert ici de monnaie. Le coût évolue à chaque nouvelle transaction : acheter augmentera le prix, vendre le baissera.\n\nDes §Scontrats automatiques§! peuvent aussi être définis mensuellement."
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_TITLE: "Didacticiel : marché aux esclaves"
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_DESC: "Tout a un prix, même une vie. Le §Smarché aux esclaves§! permet d'acheter et de vendre des £pops£§Spops§! comme de simples marchandises, leur destin n'étant plus entre leurs mains. Une fois acquises, vos nouvelles §Spops§! seront automatiquement acheminées vers le £planet£§Smonde§! de votre choix, sans que vous ayez à vous préoccuper de la logistique... mais c'est loin d'être gratuit."
 #TUTORIAL_PLANETVIEW_CORPORATE_TITLE: "Corporation View"
 #TUTORIAL_PLANETVIEW_CORPORATE_DESC: "The corporate tab allows §SMegacorporations§! to build §SBranch Offices§! on the planets of other Empires, provided they have signed the necessary paperwork. Once built, they can view and upgrade their facilities here as well. As we know, large Corporations wish only the best for their customers, events of the 23rd cycle notwithstanding."
 TUTORIAL_GOVERNMENTVIEW_POLICIES_TITLE: "Didacticiel : politiques"
 TUTORIAL_GOVERNMENTVIEW_POLICIES_DESC: "L'écran §SPolitiques§! couvre l'ensemble des §Spolitiques gouvernementales§!, qui ont des conséquences importantes sur la façon dont l'empire est gouverné.\n\nIl y a le plus souvent plusieurs postures possibles pour chaque §Spolitique§!, même si nous pouvons être limités par notre niveau technologique ou nos §Séthiques§!."
 TRADE_VIEW_DESC: "À mesure que l'empire s'étendra, le §Scommerce§! entre nos £planet£§Smondes§! constituera une part croissante de notre économie. Les §Sbases stellaires§! dotées de §Scarrefours commerciaux§! collectent une §Svaleur commerciale§! au sein de leur £system£§Ssystème§!, qui est convoyée jusqu'à la §Scapitale§! et convertie en £energy£§Scrédits énergétiques§!.\n\nUn plus grand nombre de §Scarrefours commerciaux§! signifie donc qu'une §Sbase stellaire§! peut collecter aussi la §Svaleur commerciale§! des systèmes adjacents. Les routes commerciales les plus riches peuvent attirer des §Spirates§!, qui peuvent malgré tout se voir contrés par des flottes ayant reçu ordre de §Spatrouiller§!, et par les §Smodules de défense§! des §Sbases stellaires§!. Les §Smodules de hangars§! sont particulièrement efficaces pour cela."
 PLANETVIEW_CORPORATE_DESC: "L'onglet des corporations permet aux §Smégacorporations§! d'ouvrir des succursales sur les £planet£§Smondes§! des autres empires, à condition d'avoir obtenu les accords administratifs nécessaires. Une fois ces succursales construites, les mégacorporations peuvent aussi voir et améliorer leurs complexes dans cet écran. Comme tout le monde le sait, les mégacorporations ne travaillent que pour la satisfaction de leurs clients. Cela s'est toujours vérifié au cours de l'histoire, à l'exception des événements survenus lors du 23e cycle, évidemment."
 TUTORIAL_FEDERATION_VIEW_TITLE: "Didacticiel : fédération"
 TUTORIAL_FEDERATION_VIEW_DESC: "Ceci est l'écran de la §Hfédération§!. Notre £federation£§Sfédération§! deviendra plus forte si ses membres maintiennent une bonne §Scohésion§!. Lorsque de nouveaux membres l'intégreront, une part de cette cohésion sera perdue.\n\nAu contraire, affecter des £envoy£§Sémissaires§! à la fédération permettra de l'améliorer.\n\nÀ mesure que la fédération deviendra plus forte, nous pourrons §Sadopter des atouts§! qui accroîtront les bénéfices mutuels de tous les membres."
 TUTORIAL_FEDERATION_VIEW_ENVOYS_TITLE: "Didacticiel : émissaires fédéraux"
 TUTORIAL_FEDERATION_VIEW_ENVOYS_DESC: "Affecter des £envoy£§Sémissaires§! à la £federation£§Sfédération§! permettra de contribuer à améliorer sa §Scohésion§!. Gardez bien à l'esprit que le nombre de ces émissaires est limité. Ceux affectés à la fédération pourront ultérieurement être réaffectés à d'autres §Sactions diplomatiques§!."
 TUTORIAL_FEDERATION_VIEW_MEMBERS_TITLE: "Didacticiel : membres de la fédération"
 TUTORIAL_FEDERATION_VIEW_MEMBERS_DESC: "Ceci est l'écran des §Hmembres de la fédération§!. C'est ici que nous pouvons voir la puissance des §Smembres§! dans divers domaines, le nombre d'£envoy£§Sémissaires§! qu'ils ont dépêchés, et lesquelles de leurs §Séthiques§! sont opposées et contribuent à une perte de §Scohésion§!."
 TUTORIAL_FEDERATION_VIEW_NAVY_TITLE: "Flotte fédérale"
 TUTORIAL_FEDERATION_VIEW_NAVY_DESC: "La §Hflotte fédérale§! est construite à partir de la §Scapacité navale§! permise par chaque membre, et est sous le contrôle de la §Sprésidence fédérale§!. Les membres peuvent tous construire les vaisseaux de la flotte £federation£§Sfédérale§! afin de contribuer à sa constitution."
 TUTORIAL_FEDERATION_VIEW_LAWS_TITLE: "Didacticiel : lois fédérales"
 TUTORIAL_FEDERATION_VIEW_LAWS_DESC: "N'importe quel membre de la £federation£§Sfédération§! peut proposer des changements aux §Slois fédérales§!. Si la fédération rejette par vote une loi, elle va souffrir d'une §Spénalité de cohésion§!.\n\nCertaines lois sont fermées et requièrent que la §Scentralisation§! soit suffisante pour pouvoir être adoptées. La fédération doit au préalable §Sprogresser§! afin de gagner en centralisation.\n\nMieux vaut toutefois se montrer prudent : à mesure que la centralisation s'accroît, la cohésion diminue."
 TUTORIAL_GALACTIC_COMMUNITY_TITLE: "Didacticiel : Communauté galactique"
 TUTORIAL_GALACTIC_COMMUNITY_DESC: "Bienvenue dans la §HCommunauté galactique§!, où les diplomates venus de toute la galaxie se rencontrent pour décider des lois galactiques en votant des §Srésolutions§!.\n\nIl est possible de soutenir les §Srésolutions§! se trouvant dans la §Sfile des priorités§!, ce qui ajoutera le §Spoids diplomatique§! de notre empire au soutien à cette résolution.\n\nCelle se trouvant dans la queue et disposant du plus de soutien sera étudiée par le §SSénat§! une fois qu'il sera réuni, avant qu'ait lieu un vote pour déterminer si elle doit devenir une §Sloi galactique§!.\n\nMieux vaut accorder une grande attention à la §Spriorité galactique§!, car elle fixe un cadre commun à l'ensemble des membres de la Communauté.\n\nEnfin, il est possible d'afficher dans cet écran tous les membres, ainsi que les §Smodificateurs galactiques§! qui peuvent être appliqués du fait des résolutions déjà votées."
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_TITLE: "Didacticiel : émissaires"
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_DESC: "Les £envoy£§Sémissaires§! peuvent être affectés à la Communauté galactique afin d'y accroître le §Spoids diplomatique§! de notre empire. Les émissaires ainsi affectés peuvent ultérieurement être réaffectés à d'autres §Sactions diplomatiques§!."
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_TITLE: "Didacticiel : Sénat"
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_DESC: "Le §HSénat§! est le lieu où la Communauté galactique vote pour adopter ou refuser les résolutions se trouvant dans la §Sfile§! et ayant reçu le plus de soutien. En tant que membre, il est possible de §Ssoutenir§!, s'§Sopposer§! ou de s'§Sabstenir§! lors du vote. Si la résolution est acceptée, elle deviendra une §Sloi galactique§! qui s'appliquera à tous les membres de la Communauté galactique. Si elle est rejetée, elle ne pourra pas être à nouveau proposée avant un certain temps.\n\nLes empires qui ne se sont pas abstenus connaîtront une §Samélioration de l'opinion§! auprès de ceux qui ont voté comme eux, et une §Sdégradation§! d'opinion avec ceux qui ont voté différemment.\n\nSi nous avons gagné des §Sfaveurs§! diplomatiques d'autres empires, il est possible d'en faire usage afin d'accroître notre §Spoids diplomatique§! lors des votes au §SSénat§!."
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_TITLE: "Didacticiel : résolutions"
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_DESC: "L'écran des §Hrésolutions§! liste toutes les résolutions déjà adoptées. Il est possible de §Sproposer une nouvelle résolution§! en la choisissant dans la liste des résolutions, ce qui a un coût en £influence£§Sinfluence§!.\n\nIl n'est possible de proposer que la première §Srésolution§! non promulguée de chaque ensemble, puis préparer le terrain avant de pouvoir proposer des choses plus radicales. Mais, même ainsi, le soutien à cette résolution n'est pas garanti.\n\nSi une §Srésolution§! est promulguée, la suivante dans la liste ne peut être proposée avant plusieurs années."
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_TITLE: "Le Conseil galactique"
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_DESC: "Le §HConseil galactique§! a été établi. Une §Sélection§! va se produire, et les membres ayant le plus de £diplo_weight£§Spoids diplomatique§! y gagneront un §Ssiège au Conseil§!. Les membres de celui-ci bénéficient d'un poids diplomatique accru, et peuvent proposer au Sénat des résolutions, étudiées alors comme des §Smesures d'urgence§!.\n\nLe §Sveto du Conseil§! peut être adopté en passant des résolutions visant à renforcer le Conseil. Enfin, les membres du Conseil ont accès à des §Srésolutions particulières§!."
 TUTORIAL_EMPIRE_SPRAWL_TITLE: "Didacticiel : extension de l'empire"
 TUTORIAL_EMPIRE_SPRAWL_DESC: "L'£empire_sprawl£§Hextension de l'empire§! mesure l'étendue de notre espace en termes de £system£§Ssystèmes§!, £colony£§Scolonies§!, £district£§Sdistricts§! et £pop£population totale.\n\nUne extension trop importante pèse sur la §Scapacité administrative§! de l'empire et accroît le coût des §Stechnologies§!, des £traditions£§Straditions§!, des £leader£§Spersonnalités§! et des §Sdécrets§!."
 TUTORIAL_FIRSTCONTACT_VIEW_TITLE: "Didacticiel : affecter un émissaire"
 TUTORIAL_FIRSTCONTACT_VIEW_DESC: "Nous venons d'entrer en contact avec une nouvelle entité, peut-être une §Scréature spatiale inconnue§!, ou un autre §Sempire§!. Nous pouvons en apprendre davantage sur cette entité en procédant à un §Spremier contact§!.\n\nNous devons affecter un £envoy£§Sémissaire§! à cette mission, qui travaillera à établir des communications et à déchiffrer la langue dont il use.\n\nPour affecter un §Sémissaire§! :\n\n£dot_green£ Cliquez sur le portrait depuis l'écran de §Spremier contact§! ;\n£dot_green£ Sélectionnez l'un des §Sémissaires§! disponibles."
 TUTORIAL_CRISIS_VIEW_TITLE: "Didacticiel : devenir la crise"
 TUTORIAL_CRISIS_VIEW_DESC: "Nous sommes sur la bonne voie pour §Sdevenir la crise§!. Ce cheminement offre des avantages particuliers, qui nous renforcent et nous permettent de devenir une force plus menaçante au sein de la galaxie.\n\nL'écran de la §Scrise§! affiche nos objectifs : ce sont des actions spécifiques que nous pouvons mener à bien pour gagner en §S[GetCrisisResource]§!. Cela débloque les §Sniveaux§! et §Satouts de la crise§! dont nous avons besoin pour libérer notre plein potentiel et nous abattre sur la galaxie.\n\nÀ mesure que notre empire deviendra plus menaçant pour ses voisins, la Communauté galactique pourra toutefois décider de s'unir et de déclarer que nous sommes devenus une §Smenace pour la galaxie§!."
 TUTORIAL_CRISIS_VIEW_LEVEL1_TITLE: "Didacticiel : niveaux de crise"
 TUTORIAL_CRISIS_VIEW_LEVEL1_DESC: "À mesure que nous progressons sur le chemin pour §Sdevenir la crise§! et atteindre les conditions requises, nous accéderons à de nouveaux niveaux. Chacun offre divers avantages, tels les §Satouts de la [GetCrisisResource]§! ou des §Svaisseaux§! particuliers.\n\nUne fois au §Sniveau 5§!, ou lorsque nous aurons été déclarés comme l'empire de la crise par la Communauté galactique, la galaxie entière se retournera contre nous. Dès lors, nous entrerons en §Sguerre totale§! avec la Communauté galactique."
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_TITLE: "Didacticiel : réseaux d'espionnage"
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_DESC: "L'un de nos £envoy£§Sémissaires§! est en train d'établir un §Sréseau d'espionnage§! dans cet empire.\n\nLe §Sniveau d'infiltration§! de ce réseau va s'accroître avec le temps, en fonction de la §Svaleur du réseau§! et de l'£empire_sprawl£§Sextension§! de cet empire. À mesure que le réseau se développera, nous disposerons de davantage de §Srenseignements§! et pourrons y lancer des §Sopérations§! secrètes depuis l'onglet §SEspionnage§!.\n\nUn réseau commence à §Pdécliner§! si aucun émissaire n'y est affecté, ou si son existence est révélée par les §Sopérations§! secrètes qu'il mène."
 TUTORIAL_ESPIONAGE_VIEW_TITLE: "Didacticiel : espionnage"
 TUTORIAL_ESPIONAGE_VIEW_DESC: "L'onglet §SEspionnage§! affiche la construction des réseaux par les £envoy£§Sémissaires§! dans les divers empires visés. De là il est possible d'accéder au §Sregistre des renseignements§!, de lancer des §Sopérations§! et d'y voir leurs résultats.\n\nCes opérations peuvent être lancées dans des empires où nous disposons d'un §Sémissaire§! à la tête d'un réseau d'espionnage. Avant de pouvoir être lancé, chaque type d'opération nécessite que le réseau d'espionnage ait atteint un certain niveau."
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_TITLE: "Didacticiel : opérations d'espionnage"
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_DESC: "Maintenant que notre réseau d'espionnage a atteint un niveau suffisant, nous pouvons lancer des §Sopérations§! contre cet empire. Celles-ci relèvent de diverses catégories, et chaque type d'opération a des résultats divers, certaines étant par exemple plus périlleuses que d'autres.\n\nCes diverses catégories sont le §Ssubterfuge§!, la §Smanipulation§!, le §Ssabotage§! et la §Sprovocation§!. Les opérations de sabotage et de provocation sont souvent plus exigeantes, et peuvent engendrer des §Spénalités diplomatiques§! plus graves si nous sommes démasqués."
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_TITLE: "Didacticiel : affectation de sources"
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_DESC: "Les §Ssources§! sont des agents et artefacts de grande valeur, ayant diverses conséquences pour les activités d'espionnage. Elles travaillent au sein des réseaux d'espionnage et peuvent être affectées à des opérations, où elles offriront des occasions nouvelles ou aideront à nous sortir d'éventuels soucis.\n\nCes sources peuvent être recrutées lors d'événements, ou en menant une opération de §Srecrutement§!. Si un réseau d'espionnage est fermé, ses sources sont perdues."
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_TITLE: "Didacticiel : mégastructures"
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_DESC: "Nous pouvons sélectionner au sein de cette liste une £megastructure£§Smégastructure§! à [GetBuildGrow] au sein de ce £system£§Ssystème§!. Certains projets ne seront disponibles qu'une fois la §Stechnologie§! appropriée découverte.\n\nMes sous-routines d'Ambition galactique sont désormais pleinement actives ; je vous recommande donc de saisir cette opportunité pour faire une impression durable sur le reste de la galaxie."
 TUTORIAL_ORBITAL_RING_TITLE: "Didacticiel : anneau orbital"
 TUTORIAL_ORBITAL_RING_DESC: "Les §Sanneaux orbitaux§! sont des £megastructure£§Smégastructures§! imposantes, construites de manière à encercler un £planet£§Smonde§! entier. Ils constituent alors une interface très efficace entre l'espace et la surface de ce monde, fournissant de l'espace pour des sites tels qu'un chantier spatial, des structures défensives, et des plateformes de production ou gestion des ressources.\n\nL'écran de l'anneau orbital permet d'ajouter ou retirer des £building£§Sconstructions§! et §Smodules§!, mais aussi d'améliorer l'anneau pour le faire passer à un niveau supérieur et ainsi disposer de plus d'emplacements constructibles. Le niveau d'amélioration maximal dépend toutefois des infrastructures sur le monde."
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_TITLE: "Didacticiel : configuration des clauses"
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_DESC: "Cet écran permet de choisir un §Scontrat-type§! pour le contrat, et d'en définir précisément les clauses. Chaque contrat-type fournit un ensemble de responsabilités et d'obligations, à la fois pour la dépendance et sa suzeraine.\n\nIl est possible d'amender les obligations mentionnées par chaque §Sclause§!, ce qui fera alors évoluer la £loyalty£§Sloyauté§! de l'autre partie. Ainsi, il est possible de rendre le contrat aussi acceptable que possible pour les deux parties."
 TUTORIAL_AGREEMENTS_TITLE: "Didacticiel : aperçu des contrats"
 TUTORIAL_AGREEMENTS_DESC: "L'écran des §Scontrats§! fournit un aperçu général des contrats passés entre dépendance et suzeraine. Il est possible d'y retrouver la £loyalty£§Sloyauté§!, de gérer les §Spossessions§! et les §Séchanges commerciaux§! mutuels, et de renégocier les §Sclauses§! des contrats déjà conclus. Et, évidemment, il est aussi possible d'y rompre tout contrat qui ne servirait plus nos intérêts."
 TUTORIAL_AGREEMENTS_NO_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_NO_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$\n\nLes dépendances peuvent choisir de se §Sspécialiser§! afin de s'assurer d'avantages importants dans certains domaines, par exemple la production de ressources ou les capacités militaires. Toutefois, cela implique aussi des désavantages dans d'autres domaines.\n\nLes dépendances spécialisées ont aussi une £loyalty£§Sloyauté§! plus élevée. Tant que celle-ci sera stable, elles gagneront de l'expérience et pourront donc atteindre des degrés de spécialisation plus poussés."
 TUTORIAL_HOLDINGS_TITLE: "Didacticiel : possessions"
 TUTORIAL_HOLDINGS_DESC_SHARED: "L'écran des §Spossessions§! fournit un aperçu de toutes les possessions sur un £planet£§Smonde§!. Il permet aux empires de construire divers £building£§Sbâtiments§! sur les capitales et £colony£§Scolonies§! mutuelles, ce qui a des conséquences sur des domaines tels que la diplomatie, les renseignements ou la production de ressources."
 TUTORIAL_HOLDINGS_DESC_MEGA_CORP: "Si elles ont conclu les accords diplomatiques nécessaires, les mégacorporations peuvent ainsi ouvrir des §Ssuccursales§! sur les mondes d'autres empires. Comme le sait parfaitement toute la galaxie, ces mégacorporations n'aspirent qu'au bien-être de leurs clients, malgré ce qui est souvent rapporté sur les événements du 23ème cycle !"
 TUTORIAL_HOLDINGS_DESC_OVERLORD: "Les §Ssuzeraines§! peuvent user des possessions pour renforcer leur emprise sur l'espace de leurs §Sdépendances§!. Bon nombre de ces possessions affectent la £loyalty£§Sloyauté§!, et certaines sont réservées aux dépendances spécialisées. Toute amélioration est aussi accessible depuis cet écran."
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_PLANETVIEW_COLONY_GOV_TITLE: "Didacticiel : recruter un gouverneur"
 TUTORIAL_PLANETVIEW_COLONY_GOV_DESC: "Pour aider au mieux notre nouvelle £colony£§Scolonie§! à se développer, nous devrions envisager de recruter un £governor£§Sgouverneur§! planétaire, qui pourra superviser les opérations sur place.\n\nLa plupart de nos mondes n'auront aucunement besoin d'être administrés de la sorte, et bénéficieront à la place d'un avantage dépendant de notre régime politique. Mais pour quelques £planet£§Smondes§! particulièrement favorisés, un §Sgouverneur§! peut constituer un avantage tout à fait bienvenu.\n\nLes §Sgouverneurs§! peuvent avoir divers effets, la plupart positifs, sur les mondes qu'ils administrent. Ceux-ci dépendant de leurs §Straits§! et de leur niveau de compétence."
 TUTORIAL_ELECTION_VIEW_TITLE: "Didacticiel : élections"
 TUTORIAL_ELECTION_VIEW_DESC: "C'est dans l'écran §S$ELECTION$§! que nous pouvons décider qui dirigera désormais l'empire.\n\n[TutorialElectionViewTypeSpecific]"
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_NO: "Tout candidat éligible est retenu parmi les £leader£§Spersonnalités§! actuelles de l'empire. Si nous disposons des ressources requises, vous pourrez donc décider vous-même du prochain £ruler£§Sdirigeant§!."
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_YES: "Tout candidat éligible est retenu parmi les £leader£§Spersonnalités§! actuelles de l'empire, et peut être mis en avant en accroissant le soutien dont il bénéficie. Tout cela de manière parfaitement démocratique, bien évidemment."
 TUTORIAL_EDICTS_AND_POLICIES_TITLE: "Didacticiel : politiques et décrets"
 TUTORIAL_EDICTS_AND_POLICIES_DESC: "L'onglet §S$topbar_button_policies_name$§! couvre l'ensemble des §Spolitiques§! gouvernementales, ainsi que les §Sdécrets§! s'appliquant dans tout l'espace de l'empire.\n\nElles peuvent être promulguées en dépensant une part de nos ressources. Toute §Spolitique§! offre souvent un certain nombre de choix, même si ces derniers peuvent être limités par nos technologies ou notre §Séthique§!.\n\nLes décrets ont un coût de maintenance mensuel, soit financé par le §HFonds pour les décrets§!, payé en £unity£§Sunité§!, ou (parfois) par d'autres ressources."
 TUTORIAL_COUNCIL_VIEW_TITLE: "Didacticiel : Conseil et priorité"
 TUTORIAL_COUNCIL_VIEW_DESC: "C'est dans l'écran §S$COUNCIL$§! que peuvent être nommées les £leader£§Spersonnalités§! qui guideront l'empire vers un avenir radieux. Pour le meilleur ou pour le pire, leurs §Straits§! auront ainsi une influence sur l'avenir de l'empire. Il est possible de définir des §Spriorités§! afin de centrer leurs travaux dans un domaine spécifique.\n\nUn §Sconseiller§! peut aussi être nommé ou remplacé à n'importe quel moment, et peut systématiquement occuper une fonction autre, comme le commandement d'un £science_ship£§Svaisseau scientifique§!. La seule exception à cela est le dirigeant.[TutorialCouncilViewDlcSpecific]L'avancement des §Spriorités§! dépend de l'£empire_sprawl£§Sextension de l'empire§!, du niveau des conseillers, et dans certains cas de leurs éthiques. Quand elle se termine, une priorité peut être activée pour obtenir un effet plus puissant et permettre d'adopter une nouvelle priorité à sa place."
 TUTORIAL_COUNCIL_VIEW_PARAGON_NO: "\n\n"
 TUTORIAL_COUNCIL_VIEW_PARAGON_YES: "\n\nPour déverrouiller davantage de §Spostes au Conseil§!, il sera indispensable de disposer de deux choses : un §Scivisme§! correspondant, et que soit menée à bien une priorité bien précise.\n\n"
 TUTORIAL_ASSIGN_COUNCILOR_TITLE: "Didacticiel : traits des conseillers"
 TUTORIAL_ASSIGN_COUNCILOR_DESC: "Certaines £leader£§Spersonnalités§! disposent de §Straits de conseillers§!. Souvent plus profitables et avec des conséquences plus importantes que les traits de personnalité classiques, ils ne sont actifs que si la personnalité est membre du Conseil.\n\nLes §Spostes au Conseil§! accordent automatiquement des effets. Plus le niveau de compétence du conseiller occupant le poste est élevé, plus ces effets auront d'influence pour l'empire."
 TUTORIAL_LEADER_LEVEL_UP_TITLE: "Didacticiel : compétence de personnalité"
 TUTORIAL_LEADER_LEVEL_UP_DESC: "Une £leader£§Spersonnalité§! de l'empire a atteint un nouveau niveau de §Scompétence§!. Cela va donc accroître les avantages qu'elle offre, et lui conférer un nouveau trait.[TutorialLeaderLevelUpDlcSpecific]Pour voir les §Spersonnalités§! disponibles :\n\n£dot_green£ Cliquez sur le bouton §S$topbar_button_leaders_name$§! dans la barre de gauche ou appuyez sur §SF5§!.\n\n$tttt$$tt$£leaders£\n\nEn vieillissant, les §Spersonnalités§! peuvent recevoir des traits négatifs. Il est donc naturel de les remplacer."
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_NO: "\n\n"
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_YES: "\n\nPour orienter le développement d'une £leader£§Spersonnalité§!, il est possible de choisir ses §Straits§!. Les traits peuvent être choisis plus tard sans interrompre la progression. Par ailleurs, une §Ssous-classe§! peut être choisie une fois atteints quelques niveaux de compétence, qui accordera des avantages et influencera les traits que cette personnalité pourra adopter par la suite.\n\nLes traits sont variés par leurs effets, leur importance et leur rareté : certains peuvent être améliorés, d'autres sont mutuellement incompatibles, d'autres encore ont des conséquences aussi bien positives que négatives. Mais leur point commun à tous est d'être permanents.\n\n"
