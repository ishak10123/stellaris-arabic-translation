 infernals.35.name: "En proie aux flammes"
 infernals.35.desc: "La surface de §H[from.GetName]§! s'est fissurée : une chaleur insoutenable a jailli des profondeurs, fracturant sa croûte. La transformation a été rapide et totale. Les montagnes se sont effondrées, les océans se sont mis à bouillir et le ciel s'est couvert d'un voile de braises.\n\nIl ne reste aucune trace de son écosystème autrefois florissant. Seuls les organismes extrêmophiles peuvent y vivre désormais."
