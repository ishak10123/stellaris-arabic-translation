 LM_ARMOR_2: "$ARMOR_2$ - À $INF_Regen$"
 LM_ARMOR_2_DESC: "Le densification du £sr_living_metal£§Ymétal vivant§! améliore à la fois sa capacité défensive de base et la surface disponible pour la régénération."
 LM_ARMOR_3: "$ARMOR_3$ - À $INF_Regen$"
 LM_ARMOR_3_DESC: "Les composites augmentant la résistance à la traction du £sr_living_metal£§Ymétal vivant§! rendent ce blindage plus robuste."
 LM_ARMOR_4: "$ARMOR_4$ - À $INF_Regen$"
 LM_ARMOR_4_DESC: "Les processus de durcissement à haute énergie permettent à ce blindage en £sr_living_metal£§Ymétal vivant§! régénératif d'être structurellement plus solide que les précédents."
 LM_ARMOR_5: "$ARMOR_5$ - À $INF_Regen$"
 LM_ARMOR_5_DESC: "Les avancées scientifiques en matière de £sr_living_metal£§Ymétal vivant§! rendent ce blindage aussi solide et régénératif que la physique le permet."
