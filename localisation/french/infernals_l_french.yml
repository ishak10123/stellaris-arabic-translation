 civic_galvanic_tt: "- Technologie £engineering_research£['technology:tech_mine_living_metal'] déjà découverte au lancement. \n- Le monde natal a un ['concept_d_galvanic_living_metal',dépôt de métal vivant].\n- Donne accès à des décrets spéciaux : $TABBED_NEW_LINE$- ['concept_inf_lm_cs_edict'] $TABBED_NEW_LINE$- ['concept_inf_lm_mgc_edict'] \n- Donne accès à des composants en £sr_living_metal£§Ymétal vivant§! : $TABBED_NEW_LINE$- ['concept_inf_lm_armor'] $TABBED_NEW_LINE$- ['concept_inf_lm_weapon']\n- Donne accès à la décision planétaire §Y$decision_living_metal_distribution$§!. \n- Permet de recruter des armées de la §Y$lm_imbued_army$§!."
 civic_galvanic_job_tt: "Permet de construire un £building£['concept_offworld_expedition_hub',centre d'expédition extraplanétaire] dans les systèmes comportant un §Ymonde en fusion§! afin d'y ajouter des emplois d'['concept_offworld_prospector',explorateurs extraplanétaires]."
