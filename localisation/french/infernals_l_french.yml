 volcanic_lavafall: "Cascades de lave"
 volcanic_lavafall_desc: "La lave coule abondamment, se déversant sur une pente raide dans un spectacle pyrotechnique naturel."
 volcanic_oasis: "Oasis infernale"
 volcanic_oasis_desc: "Un petit continent verdoyant, protégé par une haute chaîne de montagnes de l'enfer qui fait rage au-delà. Sa faune et sa flore uniques contrastent fortement avec la désolation qui règne de l'autre côté."
 fractalized_entropy_category: "Entropie fractalisée"
 fractalized_entropy_category_desc: "Nos capteurs ont détecté un curieux objet dérivant dans le champ d'astéroïdes. Nous ignorons d'où il vient, mais sa trajectoire stable nous permet de l'intercepter et de l'examiner."
 infernals.3205.name: "Entropie fractalisée"
 infernals.3205.desc: "[Leader.GetName] a découvert une structure rigide et angulaire en orbite stable autour d'une étoile. Composé d'un matériau inconnu et caractérisé par des faces rappelant les cristaux, l'objet a résisté à toutes les analyses compositionnelles. Il est resté dans une position fixe, tourné vers son étoile mère et immuable face à toutes les tentatives de manipulation ou de rotation.\n\nAu cours d'une expérience contrôlée, le vaisseau d'observation a envoyé une impulsion d'énergie concentrée sur l'objet. Ce dernier s'est scindé parfaitement en deux moitiés symétriques, et chacune s'est reconstituée en une petite réplique de l'original. Les impulsions suivantes ont donné le même résultat : division, réplication et miniaturisation.\n\nLe nuage de structures miniatures s'est finalement stabilisé en orbite. Chaque fragment a conservé l'alignement et la géométrie précis de son ancêtre, l'essaim reproduisant la silhouette de la structure d'origine.\n\nCe phénomène est sans précédent et impossible à expliquer. Toutes les données télémétriques collectées ont été conservées pour une analyse plus approfondie."
 infernals.3205.a: "Préservons et observons les fragments"
 # Archaeological Sites
 from_the_ashes_site: "Dans les cendres"
 from_the_ashes_site_desc: "La surface de [Planet.GetName] est brûlante et hostile à toute forme de vie biologique, c'est pourquoi les images de ruines manifestement artificielles ont attiré l'attention de nos [GetScientistPlural]. Des fouilles archéologiques nous permettraient de déterminer qui vivait ici et ce qui leur est arrivé."
 infernals.2700.name: "Empire oublié"
 infernals.2700.desc: "Les ruines découvertes sur [From.Planet.GetName] semblaient à première vue faites de pierre, mais les fouilles et les analyses ont révélé que de nombreuses structures de cette ville perdue étaient faites d'une matière organique pétrifiée semblable au bois. Il n'existe aujourd'hui plus aucune source de cette matière sur la planète. Les artefacts plus petits sont faits de métaux bruts, de verre et de matières organiques pétrifiées similaires. Nos [GetScientistPlural] ont également découvert des fossiles de créatures indigènes aujourd'hui disparues.\n\nCette civilisation semble avoir existé à une époque où le climat était beaucoup plus clément. A-t-elle disparu bien avant que la planète n'atteigne son état actuel, ou a-t-elle été témoin de cette violente transition au cours de ses dernières années ?"
 infernals.2705.name: "Témoins de la fin"
 infernals.2705.desc: "Les fouilles menées dans la ville en ruines sur [From.Planet.GetName] ont mis au jour des sites d'importance culturelle, décorés de motifs complexes qui pourraient être un langage écrit. Plus intéressant encore, nos équipes ont découvert une chambre souterraine truffée d'étagères, chacune contenant de minces plaques de bronze gravées de nombreux caractères. Bien que le bronze soit un support inefficace, il semble avoir été utilisé pour la conservation collective de documents.\n\nNos équipes d'archéologues se sont dispersées dans toute la ville et ont entamé leurs travaux de traduction. Le sort de cette civilisation reste pour l'heure un mystère."
 infernals.2710.name: "Fin imminente"
 infernals.2710.desc: "L'équipe en mission sur [From.Planet.GetName] a découvert de sinistres catacombes : un réseau de tranchées dont les cavités renferment trois ou quatre aliens momifiés empilés. Les armes à feu primitives, les télescopes en verre rudimentaires, les tissus brodés et autres objets funéraires nous permettent d'entrevoir leur niveau de développement technologique.\n\nDe nombreuses intersections des catacombes sont ornées de statues représentant des animaux indigènes disparus. Ces derniers ont une carapace ronde et bombée, quatre pattes courtes et une petite tête obtuse. Les spécimens les mieux conservés sont représentés recroquevillés, utilisant leur carapace pour se protéger des gravures en forme de flammes dans le matériau au-dessus d'eux.\n\nLa véritable signification de cette oeuvre d'art est peut-être perdue à jamais, mais elle pourrait indiquer que cette société était consciente de sa fin imminente. Nous comprendrons mieux ce qu'ils ont vécu en poursuivant les fouilles."
 infernals.2715.name: "Chute flamboyante"
 infernals.2715.desc: "Une exploration minutieuse de la ville en ruines sur [From.Planet.GetName] a permis de confirmer que cette civilisation a assisté à l'effondrement de son écosystème et savait que ses jours étaient comptés. Nous avons découvert qu'elle utilisait des documents papier avant que les cendres volcaniques brûlantes ne la contraignent à passer aux tablettes de bronze, et de nombreuses oeuvres représentant des animaux fuyant les flammes témoignent de leurs tentatives d'accepter leur propre fin.\n\nLes fouilles ont également permis de mettre au jour un exemplaire presque parfaitement conservé des statues gardiennes des catacombes. Les flammes gravées brillent de l'intérieur, ce qui en fait une pièce particulièrement remarquable.\n\nNous avons également trouvé des traces d'efforts désespérés pour enrayer l'activité volcanique du monde : la présence de routes et de charrettes endommagées suggère que les habitants ont transporté des gravats jusqu'à la caldeira la plus proche, dans le but de la boucher. En vain. La planète est aujourd'hui dépourvue de toute forme de vie multicellulaire.\n\nCette histoire met en lumière la vulnérabilité intrinsèque de toute civilisation confrontée à un problème excédant ses capacités technologiques."
 infernals.2715.a: "Quelle fin tragique..."
 infernals.2715.b: "Tâchons de tirer des leçons de leurs erreurs"
 inferno_temple_site: "Temple infernal"
 inferno_temple_site_desc: "Loin des centres urbains de [Planet.GetName], dans une chaîne de volcans actifs, gît un vieux temple en ruines. Comprendre son histoire pourrait nous permettre de mieux appréhender la culture locale."
 infernals.2720.name: "Signes anciens"
 infernals.2720.desc: "Le temple porte les cicatrices de violents affrontements, et le sol renferme les restes anciens de l'espèce consciente locale. Tout porte à croire que le lieu a été incendié, puis laissé à l'abandon. Nos équipes de sécurité ont rapporté que les habitants considèrent la zone maudite et l'évitent à tout prix.\n\nLes murs du temple ont préservé ses trésors, notamment d'innombrables fresques et gravures très détaillées. Un motif revient beaucoup : un cercle de flammes difformes, marqué d'une entaille noire en son centre. L'une des scènes montre un individu bipède arrachant l'un des quatre yeux et le jetant sur le monde, créant ainsi le motif central. Nous l'avons nommé « OEil infernal ».\n\nEn poursuivant les fouilles, nous lèverons peut-être le voile sur les croyances entourant cette étrange silhouette."
 infernals.2725.name: "Offrandes oculaires"
 infernals.2725.desc: "Les fouilles du temple de l'OEil infernal ont mis au jour des preuves de rituels sacrificiels : de vastes fosses circulaires remplies de cendres et de charbon, chacune pourvue d'une plateforme centrale rappelant l'OEil et sa pupille. D'après l'analyse moléculaire, ces résidus proviennent de tissus d'origine animale.\n\nRien ne permet de dire si les sacrifices impliquaient des bêtes sauvages, des animaux domestiques... ou les habitants eux-mêmes.\n\nTandis que nos fouilleurs poursuivent leurs recherches, des agents ont été envoyés dans les différents foyers de population afin d'y recueillir des informations complémentaires."
 infernals.2725.a: "Un mystère qui ne demande qu'à être résolu !"
 infernals.2725.b: "Envoyons des drones pour résoudre ce mystère"
 infernals.2730.name: "Sinistres coutumes"
 infernals.2730.desc: "Une lourde porte en pierre bloquait l'accès à la zone la plus profonde du temple. Après son ouverture, les fouilleurs ont découvert une salle circulaire dont la fosse centrale était directement reliée à un réservoir naturel de magma souterrain. La lueur orangée du magma teintait les murs de rouge, éclairant faiblement les inscriptions gravées tout autour. Le haut des murs était orné d'yeux flamboyants.\n\nSur un autel en forme d'OEil infernal situé en bordure de la fosse gît le corps desséché et éventré d'un habitant. Tout porte à croire qu'ils sacrifiaient les leurs afin d'apaiser l'OEil.\n\nNous devons impérativement traduire les inscriptions gravées sur les murs afin de comprendre le rôle culturel de ce temple."
 infernals.2735.name: "Prophéties inquiétantes"
 infernals.2735.desc: "L'étude des inscriptions découvertes dans la pièce la plus reculée du temple révèle une série de prophéties relatives au retour de l'OEil infernal. Il est dit que ce dernier, furieux de la rébellion de ses sujets, assombrira le ciel, déclenchera l'éruption d'une montagne sacrée, fera dépérir certaines cultures... entre autres calamités. La prophétie annonce la fin de la civilisation, affirmant qu'après ces événements, seuls ceux qui se soumettront à l'OEil infernal survivront.\n\nNos agents envoyés parmi les habitants ont découvert que ce texte prophétique est à l'origine de nombreux proverbes et expressions répandus à travers les cultures locales, ainsi que de nombreuses histoires et mythes. Ils pensent également que les mystérieux rites pratiqués aujourd'hui dans les temples sont des variantes de cette vieille prophétie, voire des réponses.\n\nNous pourrions reproduire ces événements à l'aide de notre technologie, ou les simuler avec un tel réalisme que les habitants n'y verraient que du feu. En nous posant en réincarnation de l'OEil Infernal et en prouvant la véracité de la prophétie, nous pourrions plus facilement les soumettre. À terme, cela rendrait leur absorption plus aisée."
 infernals.2735.a: "Reproduisons la prophétie"
 infernals.2735.a.tt: "La société primitive de §Y[From.Planet.GetName]§! apprendra à s'adapter à notre éthique."
