l_french:
 INFERNALS_TITLE: "Infernals Species Pack" # Do not translate
 vo_infernal_voice: "Thermophile"
 # Traits
 trait_pc_volcanic_preference: "Préférence volcanique"
 trait_pc_volcanic_preference_short: "Volcanique"
 trait_pc_volcanic_preference_desc: "$trait_pc_savannah_preference_desc$"
 trait_volcanic_planet_preference: "$trait_pc_volcanic_preference$" #robotic
 trait_volcanic_planet_preference_desc: "$trait_dry_planet_preference_desc$" #robotic
 trait_infernal: "Thermophile"
 trait_infernal_plural: "Thermophiles"
 trait_infernal_desc: "Les membres de cette espèce ont développé des tissus composés d'alliages métalliques, ce qui leur permet de vivre et de prospérer sur des mondes où la chaleur est si intense qu'elle brûlerait tout être organique ordinaire. Leurs cellules alliées se dégradent lentement et sont rarement remplacées, ce qui retarde l'apparition des maladies liées au vieillissement. Toutefois, elles conduisent bien le froid, mettant ainsi leur santé en danger dans les environnements froids."
 TRAIT_INFERNAL_EFFECT: "Entretien en £alloys£§Yalliages§! pour $pop_group_unit$ £pop£pops : §R+$@living_standard_alloys_normal$§!$TABBED_NEW_LINE$- $HABITABILITY$ sur les mondes volcaniques : §G+20%§! $TABBED_NEW_LINE$- $HABITABILITY$ minimum (§Hmondes volcaniques§!) : §Y+50%§! $TABBED_NEW_LINE$- $HABITABILITY$ sur les mondes §Yglaciaires§! : §R-30%§!  $TABBED_NEW_LINE$- Espérance de vie des personnalités : §G+10 ans§!"
 trait_unbreakable_resolve: "Volonté de fer"
 trait_unbreakable_resolve_desc: "Ces individus, reliés par un réseau complexe de neurones miroirs, possèdent une capacité innée à synchroniser leur volonté. Pour eux, le devoir n'est pas un fardeau, mais un objectif commun, et ils font face à l'adversité avec une unité inébranlable."
 trait_unbreakable_resolve_tooltip: "Pour $pop_group_unit$ £pop£§Hpops§! ayant ce trait sur le monde, ajoute §G+0.2§! de £stability£stabilité (§G+15§! max.) \n- §RHors esclaves et pops issues des classes sociales inférieures.§!"
 trait_shell_slag: "Scories de carapace"
 trait_shell_slag_desc: "La symbiose complexe des membres de cette espèce avec le £sr_living_metal£§Ymétal vivant§! leur permet de se développer non pas au sens traditionnel du terme, mais par l'accrétion et l'auto-assemblage de structures bioferreuses."
 trait_shell_slag_tooltip: "Pour $pop_group_unit$ £pop£§Hpops§! ayant ce trait et au moins le statut d'esclave, produit §G$@shell_slag_trait_resource_production|3$§! de £sr_living_metal£§Ymétal vivant§! par mois."
 trait_robot_assembly_slag: "Scories d'assemblage"
 trait_robot_assembly_slag_desc: "L'intégration complexe de £sr_living_metal£§Ymétal vivant§! permet aux membres de cette espèce de se développer non pas au sens traditionnel du terme, mais par l'accrétion et l'auto-assemblage de structures autoferreuses."
 trait_pyroclastic: "Canalisation pyroclastique"
 trait_pyroclastic_desc: "Façonnés par la colère brûlante des mondes volcaniques, les membres de cette espèce ne craignent pas les forces pyroclastiques ; ils les canalisent et les manipulent, faisant de la dévastation une source indispensable d'énergie et de nourriture."
 trait_pyroclastic_tooltip: "$MOD_LOGISTIC_GROWTH_MULT$sur les mondes volcaniques : §G+10%§!"
 trait_crucible_community: "Communauté du creuset"
 trait_crucible_community_desc: "Forgés par l'adversité et unis par une lutte commune, les membres de cette espèce forment un tout inébranlable. Leur volonté collective nourrit la gouvernance, chaque membre constituant un maillon essentiel de la chaîne de l'unité."
 trait_crucible_community_tooltip: "Pour $pop_group_unit$ £pop£§Hpops§! ayant ce trait, ajoute §G+0.25§! au §Yfonds pour les décrets§!"
 trait_ductile: "Ductile"
 trait_ductile_desc: "§LCette espèce a été modifiée pour produire des composés d'alliages réutilisables.§!\n"
 # Volcanic World
 pc_volcanic: "Monde volcanique"
 pc_volcanic_plural: "Mondes volcaniques"
 pc_volcanic_desc: "Monde rocheux doté d'une atmosphère riche en soufre et d'une lithosphère partiellement liquide. Sa surface recouverte de cendres et de basalte est parsemée de volcans en activité, de lacs et de rivières de lave. On y trouve uniquement des formes de vie extrêmophiles, voire aucune."
 mod_pc_volcanic_habitability: "Habitabilité des mondes volcaniques "
 mod_pc_volcanic_max_districts_add: "Nbre max. de £district£districts (monde volcanique) "
 concept_pc_volcanic: "$pc_volcanic$"
 concept_pc_volcanic_desc: "- $mod_planet_jobs_alloys_produces_mult$ : §G+5%§! \n\n§L$pc_volcanic_desc$§!"
 district_geothermal: "Centrale géothermique"
 district_geothermal_plural: "Centrales géothermiques"
 district_geothermal_desc: "Utilise la chaleur bouillonnante des entrailles de la planète pour alimenter la colonie en énergie."
 district_melting: "Conduit de magma"
 district_melting_plural: "Conduits de magma"
 district_melting_desc: "Une série de tamis électromagnétiques extrait des minéraux précieux des coulées de magmas de la planète."
 district_melting_uncapped: "$district_melting$"
 district_melting_uncapped_plural: "$district_melting_plural$"
 district_melting_uncapped_desc: "$district_melting_desc$"
 mod_district_melting_max: "Nbre max. de £district£conduits de magma "
 district_polytechnic: "Forum thermotechnique"
 district_polytechnic_plural: "Forums thermotechniques"
 district_polytechnic_desc: "Ce centre de coopération interdisciplinaire et d'éducation aide la colonie à gérer efficacement la dynamique géologique de la planète."
 mod_district_polytechnic_max_add: "Nbre max. de £district£forums thermotechniques "
 thermotechnic_default: "Centres auxiliaires"
 thermotechnic_hive: "Pôles synaptiques"
 thermotechnic_machine: "Noyaux auxiliaires"
 melt_extractor: "$job_melt_extractor$"
 job_melt_extractor: "Thermoforgeurs"
 job_melt_extractor_plural: "Thermoforgeurs"
 job_melt_extractor_desc: "Ces travailleurs habitués à la chaleur extrême combinent des minéraux pour créer de nouveaux alliages exploitables."
 mod_job_melt_extractor_add: "Emplois de thermoforgeurs "
 job_melt_extractor_effect: "Les £job_miner£thermoforgeurs produisent des £minerals£§Yminéraux§!"
 melt_extractor_drone: "$job_melt_extractor_drone$"
 job_melt_extractor_drone: "Drones thermoforgeurs"
 job_melt_extractor_drone_plural: "Drones thermoforgeurs"
 job_melt_extractor_drone_desc: "Ces drones capables de résister à la chaleur extrême combinent des minéraux pour créer de nouveaux alliages exploitables."
 mod_job_melt_extractor_drone_add: "Emplois de drones thermoforgeurs "
 job_melt_extraction_drone_effect: "Les £job_mining_drone£drones thermoforgeurs produisent des £minerals£§Yminéraux§!"
 job_polytechnic_mentor: "Mentors en thermotechnique"
 job_polytechnic_mentor_plural: "Mentors en thermotechnique"
 job_polytechnic_mentor_desc: "La diversité des compétences de ces mentors permet de combler les lacunes disciplinaires et d'améliorer l'efficacité des travailleurs spécialisés."
 mod_job_polytechnic_mentor_add: "Emplois de mentors en thermotechnique "
 job_polytechnic_mentor_effect: "Les £job_polytechnic_mentor£mentors en thermotechnique sont améliorés par d'autres emplois. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_mentor: "$job_polytechnic_mentor_plural$"
 concept_polytechnic_mentor_desc: "Ressources supplémentaires pour $pop_group_unit$ £pop£§Hpops§!\n(Maximum : §Y4 000§! £job£emplois par catégorie) :\n- £job_miner£['concept_planet_miners'] : §G+$@polytechnic_output$§! d'£unity£unité\n- £job_technician£['concept_planet_technician'] : §G+$@polytechnic_output$§! de £physics_research£recherche en physique\n- £job_foundry£['concept_planet_metallurgists'] : §G+$@polytechnic_output$§! de £engineering_research£recherche en ingénierie\n- £job_artisan£['concept_planet_artisans'] : §G+$@polytechnic_output$§! de £society_research£recherche sociétale"
 job_polytechnic_job_tt: "$concept_polytechnic_mentor_desc$"
 job_polytechnic_drone: "Drones pyroclastiques"
 job_polytechnic_drone_plural: "Drones pyroclastiques"
 job_polytechnic_drone_desc: "La diversité des compétences de ces drones permet de combler les lacunes disciplinaires et d'améliorer l'efficacité des travailleurs spécialisés."
 mod_job_polytechnic_drone_add: "Emplois de drones pyroclastiques "
 job_polytechnic_drone_effect: "Les £job_polytechnic_drone£drones pyroclastiques sont améliorés par d'autres emplois. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_drone: "$job_polytechnic_drone_plural$"
 concept_polytechnic_drone_desc: "$concept_polytechnic_mentor_desc$"
 # Origin - Red Giant
 origin_red_giant: "Géante rouge"
 origin_red_giant_desc: "Cette civilisation se trouve à la croisée des chemins : la géante rouge au coeur de son système réchauffe sa planète, menaçant de la brûler vive.\n\nPourra-t-elle s'adapter en attendant d'en trouver la cause et d'y remédier ? Ou bien acceptera-t-elle ce changement étrange, voire contre nature, et tirera-t-elle parti de la chaleur ?"
 origin_tooltip_red_giant_effects: "- Le monde natal est un ['concept_pc_volcanic',monde volcanique] d'une taille de 20£planetsize£"
 START_SCREEN_RED_GIANT: "La vérité s'est révélée peu à peu, puis a éclaté d'un seul coup.\n\nNotre étoile entame une phase d'évolution rapide et inhabituelle, et sa production d'énergie dépasse toutes les prévisions. Les décalages spectraux révèlent des schémas de convection irréguliers, et son taux de fusion augmente sans perte de masse visible.\n\nJusqu'à présent, nous avons évolué de concert avec ce réchauffement, mais l'évolution biologique classique a ses limites.\n\nSi les changements qui affectent [capital_star.GetName] se poursuivent, notre monde brûlera. Il n'est plus question de savoir si cela arrivera, mais quand."
 red_giant_start_NAME: "Système de la géante rouge"
 red_giant_start_DESC: "Système de départ par défaut pour les empires ayant l'origine §Y$origin_red_giant$§!."
 tech_starfire_cannon: "$starfire_cannon$"
 tech_starfire_cannon_desc: "Toute menace est exploitable : la puissante radiation générée par la transformation de notre étoile peut nous servir d'arme. En la canalisant en un rayon, nous pourrions surchauffer et neutraliser les vaisseaux ennemis.\n\nOffre une décision planétaire permettant de construire un §Ycanon stellaire§! en orbite."
 SOLARFLARE_EMITTER: "Émetteur de rayonnement solaire"
 SOLARFLARE_EMITTER_DESC: "Puissant rayon énergétique capable de transpercer les systèmes de défense les plus robustes et de neutraliser les systèmes vulnérables des vaisseaux."
 starfire_cannon_cap: "$starfire_cannon$"
 starfire_cannon: "Canon stellaire"
 starfire_cannon_plural: "Canons stellaires"
 NAME_Starfire_Cannon: "$starfire_cannon$"
 starfire_cannon_key: "Noyau de canon stellaire"
 sfe_on_hit_stun_tt: "§YDésactive§! la cible pendant §G5§! jours, réduisant sa vitesse, sa cadence de tir et ses boucliers.\n\n$ION_CANNON_FLEET_EFFECT$"
 sfe_weapon_stun_effect: "§RImpact du canon stellaire§!"
 sfe_weapon_stun_effect_desc: "   " # not visible
 decision_starfire_cannon: "Construire un canon stellaire"
 decision_starfire_cannon_desc: "Reproduisant la radiation intense d'une géante rouge en vieillissement rapide, ce canon orbital émet un rayon d'ionisation hyperthermique qui endommage ses cibles et fait griller les composants des vaisseaux, les rendant hors d'usage."
 decision_starfire_cannon_effects: "Construit un §Ycanon stellaire§!, une arme à longue portée capable de neutraliser les systèmes de plusieurs vaisseaux, en orbite autour de la planète."
 decision_starfire_cannon_limit: "$TRIGGER_FAIL$Limite par système : §Y3§!"
 # Origin - Cosmic Dawn
 origin_cosmic_dawn: "Aube cosmique"
 origin_cosmic_dawn_desc: "Cette civilisation ne s'est pas érigée d'elle-même, elle a été libérée. Lorsque les capsules de stase se sont ouvertes, leurs occupants se sont réveillés dans un monde devenu méconnaissable. Mais tout n'a pas disparu. Leur passé, dispersé dans la poussière et les ruines à travers la galaxie, attend d'être redécouvert."
 origin_tooltip_cosmic_dawn_effects: "- Le monde natal : $TABBED_NEW_LINE$- est un ['concept_pc_volcanic',monde volcanique] d'une taille de 14£planetsize£ $TABBED_NEW_LINE$- a +5 ['concept_inf_cd_deposit',£blocker£capsules de stase anciennes]\n- Lance la partie avec la situation §HFouilles approfondies§!"
 origin_tooltip_cosmic_dawn_negatives: "- £pop£§IPops§! au lancement : §R-600§!."
 START_SCREEN_COSMIC_DAWN: "Nous nous sommes réveillés avec seulement une vague impression d'avoir dormi. Aujourd'hui encore, la preuve la plus solide de notre passé ne provient pas de nos souvenirs, mais de la technologie complexe qui nous a maintenus en stase.\n\nDes dizaines de milliers de capsules, de gigantesques systèmes de transfert thermique, des creusets bouillonnant de lave... Au-delà de ces simples mécanismes, des indices sur nos origines étaient gravés sur les murs : des flottes fuyant des mondes en train de se refroidir, à la recherche de chaleur parmi les étoiles. En quête de réponses, nous avons quitté la « chambre de naissance » souterraine. Nous avons découvert des technologies et des ressources utiles à la surface de §Y[owner.Capital.GetName]§!, ainsi que des traces d'autres installations nichées dans sa croûte. Certaines abritent des dormeurs que nous pourrions accueillir parmi nous.\n\nQu'en est-il des étoiles ? Y en a-t-il d'autres comme nous, qui dorment encore ? Si oui, ils pourraient nous aider à trouver la réponse à notre plus grande question : qui sommes-nous ?"
 cosmic_dawn_start_NAME: "Nouveau foyer"
 cosmic_dawn_start_DESC: "Système de départ par défaut pour l'origine $origin_cosmic_dawn$."
 concept_inf_cd_deposit: "$d_stasis_pods$"
 concept_inf_cd_deposit_desc: "Production : 3.0£society_research£\nAprès le déblaiement : \n$d_stasis_pods_tt$ \n\n§L$d_stasis_pods_desc$§!"
 cosmic_dawn_districtsize: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 cosmic_dawn_districtsize2: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+2§!\n   §G+2§! tunnels anciens"
 cosmic_dawn_tunnel_foundry: "$foundry_jobs_bonus_workforce_mult$ par tunnel ancien : §G+1%§!"
 cosmic_dawn_tunnel_bureaucrat: "$bureaucrat_jobs_bonus_workforce_mult$ par tunnel ancien : §G+1%§!"
 cosmic_dawn_tunnel_researcher: "$researcher_jobs_bonus_workforce_mult$ par tunnel ancien : §G+1%§!"
 cosmic_dawn_tunnel_worker: "$mod_pop_cat_worker_bonus_workforce_mult$par tunnel ancien : §G+1%§!"
 d_stasis_pods: "£blocker£Capsules de stase anciennes"
 d_stasis_pods_desc: "Ces capsules de stase sont des dispositifs ancestraux de notre peuple disparu, qui utilisait une technologie cryogénique avancée pour maintenir les individus en état de sommeil. Avec la technologie appropriée, nous pourrions peut-être les réveiller."
 d_stasis_pods_tt: "[GetStasisPodOwner]"
 d_stasis_pods_tt_inf: "- Apparition de §G100§! £pop£$POPS$\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_stasis_pods_tt_other: "- £society_research£§Y$society_research$§! suscitée : §G+350§!\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_cd_ancient_tunnels: "Tunnels anciens"
 d_cd_ancient_tunnels_desc: "Autrefois remplis de chambres de stase, ces tunnels vides mais immenses offrent désormais un nouvel espace de vie."
 d_galvanic_living_metal: "Dépôt de métal vivant"
 d_galvanic_living_metal_desc: "Cette planète dispose de gisements naturels de £sr_living_metal£§Ymétal vivant§!. Ses espèces ayant évolué en contact permanent avec cette ressource fascinante, elles ont suivi des trajectoires biologiques et scientifiques uniques."
 # Civic - Scorched World Heralds
 civic_scorched_earth: "Hérauts des mondes calcinés"
 civic_scorched_earth_desc: "Dans cette société, la chaleur est partout, des traditions aux rituels, en passant par les technologies. Ils se considèrent comme les véritables maîtres ardents de la galaxie et perçoivent les espèces plus faibles comme de simples obstacles sur le chemin d'un univers idéal, qui n'aurait de place que pour les thermophiles."
 civic_scorched_earth_effects: "- Interdit la moindre §Yrelation diplomatique§!, sauf avec les §Ythermophiles§!.\nInterdit l'accès au §YMarché galactique§!.\n- Offre le casus belli §Y$casus_belli_cb_blaze$§! contre les autres espèces.\n- Reçoit de l'£unity£§Yunité§! en utilisant le protocole de bombardement §Y$bombardment_firestorm$§!.\n- Crée des bloqueurs spéciaux sur la planète en contrebas avec le protocole §Y$bombardment_seismic_bombing$§!.\n- Les espèces non ['trait:trait_infernal',thermophiles] sont cantonnées à l'§Yesclavage§! ou pire encore."
 SCORCHED_HERALDS_ONLY_INF: "$TRIGGER_FAIL$Les §Y$civic_scorched_earth$§! n'acceptent que les £pop£pops ['trait:trait_infernal',thermophiles] au sein de leur société."
 civic_hive_scorched_earth: "Instinct pyromane"
 civic_hive_scorched_earth_desc: "Nos mondes calcinés sont le summum de l'évolution planétaire. Nous embraserons la galaxie et prospérerons dans ses flammes !"
 # Civic - World Forgers
 civic_world_forgers: "Forgeurs de mondes"
 civic_world_forgers_desc: "Cette société prospère dans les environnements volcaniques, et va même jusqu'à les créer artificiellement lorsque la nature ne suffit pas."
 civic_world_forgers_effects: "- Permet le monde de départ ['concept_pc_volcanic']. \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£['concept_volcanic_forge']. \n- Permet de construire des £building£§Yforges volcaniques§!, qui créent des emplois de £job_polytechnic_mentor£['concept_polytechnic_mentor',mentors en thermotechnique]. \n- Les planètes dotées d'une £building£§Yforge volcanique§! deviendront progressivement des §Ymondes volcaniques§!. \n- Les ['concept_guaranteed_colonies',mondes habitables garantis] seront §Ysecs§!."
 civic_corporate_world_forgers: "Architectes planétaires"
 civic_corporate_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_hive_world_forgers: "Nidification volcanique"
 civic_hive_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_world_forgers_gestalt_effects: "- Permet le monde de départ ['concept_pc_volcanic']. \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£['concept_volcanic_forge']. \n- Permet de construire des £building£§Yforges volcaniques§!, qui créent des emplois de £job_polytechnic_drone£['concept_polytechnic_drone',drones pyroclastiques]. \n- Les planètes dotées d'une £building£§Yforge volcanique§! deviendront progressivement des §Ymondes volcaniques§!. \n- Les ['concept_guaranteed_colonies',mondes habitables garantis] seront §Ysecs§!."
 civic_machine_world_forgers: "Optimiseurs thermiques"
 civic_machine_world_forgers_desc: "$civic_world_forgers_desc$"
 tech_volcanic_forge: "Forge volcanique"
 tech_volcanic_forge_desc: "Une fois déployée, cette installation transforme progressivement une planète en paradis volcanique, faisant remonter à la surface de précieuses ressources. Les thermoforgeurs peuvent accélérer cette transformation."
 concept_volcanic_forge: "$tech_volcanic_forge$"
 concept_volcanic_forge_desc: "$building_volcanic_forge_basic$ \n\n- Avancée mensuelle : §G+0.1§! \n- Avancée mensuelle pour §Y100§! £job_miner£emplois miniers : §G+0.05§! \n- Avancée mensuelle pour §Y100§! £job_foundry£emplois métallurgistes : §G+0.05§!"
 building_volcanic_forge_1: "$tech_volcanic_forge$"
 building_volcanic_forge_1_desc: "Ce complexe industriel, conçu pour forer profondément dans la croûte terrestre, déclenche une activité volcanique sur toute la planète, transformant ainsi chaque biome en un paysage enflammé."
 building_volcanic_forge_2: "Fonderie volcanique"
 building_volcanic_forge_2_desc: "$building_volcanic_forge_1_desc$"
 building_volcanic_forge_1_effect: "\n$building_volcanic_forge_basic$ \n$volcanic_forge_1_monthly$ \n\nAvancée grâce aux £job_miner£emplois miniers : §G+[root.GetMinerVar1]§! \nAvancée grâce aux £job_foundry£emplois métallurgistes : §G+[root.GetForgerVar1]§!"
 building_volcanic_forge_2_effect: "\n$building_volcanic_forge_basic$ \n$volcanic_forge_2_monthly$ \n\nAvancée grâce aux £job_miner£emplois miniers : §G+[root.GetMinerVar2]§! \nAvancée grâce aux £job_foundry£emplois métallurgistes : §G+[root.GetForgerVar2]§!"
 building_volcanic_forge_basic: "La planète devient un §Hmonde volcanique§!."
 volcanic_forge_1_monthly: "- Crée §G+200§! emplois de £job_polytechnic_mentor£['concept_polytechnic_mentor',mentors en thermotechnique]\n- Avancée mensuelle : §G+0.1§! \n- Avancée mensuelle pour §Y100§! £job_miner£emplois miniers : §G+0.05§! \n- Avancée mensuelle pour §Y100§! £job_foundry£emplois métallurgistes : §G+0.05§!"
 volcanic_forge_2_monthly: "- Crée §G+400§! emplois de £job_polytechnic_mentor£['concept_polytechnic_mentor',mentors en thermotechnique]\n- Avancée mensuelle : §G+0.2§! \n- Avancée mensuelle pour §Y100§! £job_miner£emplois miniers : §G+0.1§! \n- Avancée mensuelle pour §Y100§! £job_foundry£emplois métallurgistes : §G+0.1§!"
 # Civic - Fire Cult
 civic_pyrolatry: "Culte du feu"
 civic_pyrolatry_desc: "Façonnée par des générations de souffrance, cette société prône la survie par l'unité, et l'unité par la survie. Seul le combat forgé dans les flammes peut les unir assez solidement pour affronter l'immensité glaciale et indifférente de la galaxie."
 civic_pyrolatry_effects: "- L'£unity£§Yunité§! suscitée par les emplois augmente proportionnellement à la diminution de l'habitabilité (jusqu'à §G500%§!).\n- La faction ['concept_fire_cult'] est formée peu de temps après le début de la partie.\n- Remplace les £job_priest£§Yprêtres§! par des £job_fire_dancer£['concept_inf_fire_dancers',danseurs du feu].\n- Remplace les £job_politician£§Ypoliticiens§! par des £job_fire_oracle£['concept_inf_fire_oracles',oracles du feu] sur les mondes ayant une habitabilité inférieure à §R50%§!.\n- Permet le recrutement d'armées de la §Y$ember_legion$§! sur les mondes ayant une habitabilité inférieure à §R20%§!.\n- Donne accès à la décision planétaire §Y$decision_blazing_scourge$§! qui crée un £blocker£['concept_dec_blazing_scourge',fléau ardent].\n- Synergie avec les civismes $civic_superstitious_beliefs$, $civic_exalted_priesthood$, $civic_death_cult$, $civic_aristocratic_elite$, et $civic_merchant_guilds$."
 # Job
