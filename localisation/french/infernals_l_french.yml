 lm_imbued_army_desc: "Dotée d'une technologie avancée de £sr_living_metal£§Ymétal vivant§!, cette armée peut se remodeler à l'envi afin de s'adapter aux différentes conditions du champ de bataille."
 concept_inf_lm_armor: "Blindage à $INF_Regen$"
 concept_inf_lm_armor_desc: "Bonus par composant de blindage :\n- $mod_weapon_type_energy_weapon_fire_rate_mult$: §G+2%§! \n- $MOD_SHIP_HULL_REGEN_ADD_PERC$: §G+1%§! \n- $MOD_SHIP_ARMOR_REGEN_ADD_PERC$: §G+1%§! \n\nAjoute des versions à §Y$INF_Regen$§! des composants de blindage communs pour les vaisseaux. Leur coût en £alloys£§Yalliages§! est remplacé par un coût en £sr_living_metal£§Ymétal vivant§!. \n\nComprend des composants issus des £engineering_research£technologies suivantes : $TABBED_NEW_LINE$- ['technology:tech_ship_armor_1'] $TABBED_NEW_LINE$- ['technology:tech_ship_armor_2'] $TABBED_NEW_LINE$- ['technology:tech_ship_armor_3'] $TABBED_NEW_LINE$- ['technology:tech_ship_armor_4'] $TABBED_NEW_LINE$- ['technology:tech_ship_armor_5']"
