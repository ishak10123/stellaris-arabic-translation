 infernals.2735.b: "Ne nous immisçons pas"
 infernals.2735.c: "Leur histoire est perdue à jamais"
 infernal_figurine: "Statue infernale"
 infernal_figurine_desc_short: "Une créature trapue, dotée d'une carapace bombée et de quatre pattes courtes, recroquevillée sous une sculpture stylisée représentant du feu."
 infernal_figurine_desc_details: "La flamme est sculptée dans un minéral inconnu émettant une lumière rouge. Cet artefact a été découvert dans les catacombes d'une civilisation disparue et pourrait symboliser leur vain espoir de survivre à la catastrophe volcanique imminente."
