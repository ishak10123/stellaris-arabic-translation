 #Plural: £district£ ['concept_farming_districts'] or £district£ §H$concept_farming_districts$§!
 concept_farming_district: "$district_farming$"
 concept_farming_districts: "$district_farming_plural$"
 concept_farming_district_desc: "- £housing£['concept_housing'] : §G+200§!\n- Emplois de £mod_job_farmer_add£['concept_farmer',fermiers] : §G+200§!\n\n§L$district_farming_desc$§!"
 #Singular: ['concept_debris'] or §H$concept_debris$§!
 #Plural: -
 concept_debris: "Débris"
 concept_debris_desc: "Les §Hdébris§! désignent les épaves à la dérive et autres coques de vaisseaux en lambeaux. Ces échos muets de batailles spatiales peuvent être étudiés en tant que ['concept_special_project',projets spéciaux] en temps limité.\n\nConfier l'étude à un £science_ship£['concept_science_ship',vaisseau scientifique] peut conduire à la découverte de nouvelles ['concept_technologies',technologies]."
 #Singular: ['concept_council'] or §H$concept_council$§!
 #Plural: -
 concept_council: "Conseil"
 concept_council_desc: "Le §HConseil§! représente la direction de l'['concept_empire',empire] et se compose du §Hdirigeant§! et de cinq §Hconseillers§! maximum. Chaque poste au Conseil peut être occupé par une ['concept_leader',personnalité], certains ['concept_leader_traits',traits de personnalité] donnant des bonus à l'échelle de l'empire.\n\nLe §HConseil§! a également la capacité d'imposer des ['concept_agendas',priorités].\n\nVous pouvez le gérer depuis l'onglet §HConseil§! de la £interface£['concept_government_view',vue gouvernement]."
 #Singular: ['concept_agenda'] or §H$concept_agenda$§!
 #Plural: ['concept_agendas'] or §H$concept_agendas$§!
 concept_agenda: "Priorité"
 concept_agendas: "Priorités"
 concept_agenda_desc: "Une §Hpriorité§! représente l'axe stratégique actuel du ['concept_council'], qui définit les objectifs à long terme de l'empire. Les priorités confèrent des bonus mineurs pendant leur préparation qui augmentent une fois lancées.\n\nLes §Hpriorités§! disponibles et leurs effets dépendent de l'['concept_authority',autorité] dirigeante, des ['concept_traditions',traditions] adoptées et d'autres facteurs.\n\nVous pouvez les gérer depuis l'onglet §HConseil§! de la £interface£['concept_government_view',vue gouvernement]."
 #Singular: £research£ ['concept_research'] or £research£ §H$concept_research$§!
 #Plural: -
 concept_research: "Recherche"
 concept_research_desc: "La £research£§Hrecherche§! correspond au processus d'avancement des connaissances scientifiques dans trois domaines principaux : la £physics£['concept_physics_research',recherche physique], la £society£['concept_society_research',recherche sociétale] et la £engineering£['concept_engineering_research',recherche en ingénierie]. Chaque spécialité se développe indépendamment, donnant lieu à de nouvelles ['concept_technologies',technologies].\n\nLa vitesse de la recherche peut être influencée par certaines conditions dépendant de l'empire, des ['concept_leader_traits',traits de personnalité] ou des facteurs externes comme les ['concept_diplomatic_pacts',conventions de recherche]."
 concept_research_tooltip: "$concept_research_desc$\n\n§GCliquer sur ['concept_research'] pour ouvrir la banque de données.\nCliquer sur £research£ dans le menu pour ouvrir la liste.§!"
 #Singular 1: ['concept_modifier'] or §H$concept_modifier$§!
 #Plural 1: ['concept_modifiers'] or §H$concept_modifiers$§!
 #Singular 2: ['concept_empire_modifier'] or §H$concept_empire_modifier$§!
 #Plural 2: ['concept_empire_modifiers'] or §H$concept_empire_modifiers$§!
 #Singular 3: ['concept_planet_modifier'] or §H$concept_planet_modifier$§!
 #Plural 3: ['concept_planet_modifiers'] or §H$concept_planet_modifiers$§!
 concept_modifier: "Modificateur"
 concept_modifiers: "Modificateurs"
 concept_empire_modifier: "Modificateur d'empire"
 concept_empire_modifiers: "Modificateurs d'empire"
 concept_planet_modifier: "Modificateur planétaire"
 concept_planet_modifiers: "Modificateurs planétaires"
 concept_modifier_desc: "Les §Hmodificateurs§! sont des bonus ou pénalités qui résultent généralement des décisions prises lors des ['concept_event_chains',chaînes d'événements] ou de la découverte d'£anomaly£['concept_anomalies',anomalies].\n\nIls peuvent être temporaires ou permanents et affecter soit l'ensemble de l'empire soit des parties de celui-ci, comme un monde.\n\nLes §Hmodificateurs§! qui concernent l'ensemble de l'empire sont affichés dans l'onglet §H$empire_view_tab_empire$§! de la £interface£['concept_empire_view',vue empire], tandis que ceux qui ne concernent que des mondes spécifiques apparaissent dans la £interface£['concept_colony_view',vue colonie]."
 #Singular: ['concept_diplomacy'] or §H$concept_diplomacy$§!
 #Plural: -
 concept_diplomacy: "Diplomatie"
 concept_diplomacy_desc: "La §Hdiplomatie§! régit les interactions entre les empires, que ce soit les accords commerciaux ou les alliances, mais aussi les ['concept_rivals',rivaux] et les ['concept_wars',guerres]. Les actions diplomatiques dépendent de facteurs tels que les ['concept_ethics',éthiques], les ['concept_authorities',autorités], la puissance relative et les intérêts mutuels.\n\nLes empires peuvent améliorer leurs relations via l'envoi d'['concept_envoys',émissaires], la conclusion de ['concept_diplomatic_pacts',pactes diplomatiques] ou l'engagement dans les politiques galactiques à travers une ['concept_federation',fédération] et la ['concept_galactic_community',Communauté galactique]."
 #Singular: ['concept_subject_agreement'] or §H$concept_subject_agreement$§!
 #Plural: ['concept_subject_agreements'] or §H$concept_subject_agreements$§!
 concept_subject_agreement: "Contrat de dépendance"
 concept_subject_agreements: "Contrats de dépendance"
 concept_subject_agreement_desc: "Les §Hcontrats de dépendance§! permettent de définir les conditions de sujétion entre un suzerain et son vassal, déterminant les niveaux d'autonomie, de contribution en ressources et d'obligations militaires. Ces contrats peuvent être personnalisés, allant d'un contrôle étroit sur les dépendances, à un accord entre alliés semi-indépendants.\n\nPour la négociation des §Hcontrats de dépendance§!, rendez-vous dans l'onglet $contacts_view_tab_agreements$ de la £interface£['concept_contacts_view',vue contacts]."
 #Singular: ['concept_relic'] or §H$concept_relic$§!
 #Plural: ['concept_relics'] or §H$concept_relics$§!
 concept_relic: "Relique"
 concept_relics: "Reliques"
 concept_relic_desc: "Les §Hreliques§! sont de puissants artefacts hérités des civilisations anciennes qui accordent des avantages uniques à leurs propriétaires.\n\nLeur découverte peut se faire sur des £archaeology£['concept_archaeology_site',sites archéologiques], mais vous pouvez aussi les obtenir en réalisant des ['concept_event_chains',chaînes d'événements] majeures ou en vainquant les empires qui les possèdent.\n\nLes §Hreliques§! offrent des effets passifs constants et leur activation permet de débloquer encore davantage d'effets puissants temporaires. Vous pourrez les gérer à partir de l'onglet $discoveries_view_tab_relics$ de la £interface£['concept_discoveries_view',vue découvertes]."
 #Singular: ['concept_astral_action'] or §H$concept_astral_action$§!
 #Plural: ['concept_astral_actions'] or §H$concept_astral_actions$§!
 concept_astral_action: "Action astrale"
 concept_astral_actions: "Actions astrales"
 concept_astral_action_desc: "Les §Hactions astrales§! sont des capacités spécialisées permettant aux empires d'interagir avec la trame spatiale, exploitant souvent des phénomènes astraux en vue d'obtenir un avantage stratégique.\n\nLes §Hactions astrales§! se débloquent généralement lors de l'exploration de ['concept_astral_rifts',déchirures astrales]."
 #Singular: ['concept_minor_artifact'] or §H$concept_minor_artifact$§!
 #Plural: ['concept_minor_artifacts'] or §H$concept_minor_artifacts$§!
 concept_minor_artifact: "Artefact mineur"
 concept_minor_artifacts: "Artefacts mineurs"
 concept_minor_artifact_desc: "Les §Hartefacts mineurs§! sont des vestiges de civilisations anciennes généralement obtenus par la fouille de £archaeology£['concept_archaeology_site',sites archéologiques]. Bien qu'ils soient individuellement moins puissants que les §Hreliques§!, vous pouvez les utiliser de nombreuses façons, par exemple en activant des avantages uniques pour votre empire ou en les échangeant contre de précieuses ressources.\n\nL'utilité des artefacts mineurs dépend de la progression technologique d'un empire et de ses politiques. Certains chemins permettent leur reconversion pour l'enrichissement culturel, les avancées scientifiques ou même des applications militaires. Leur gestion se fait depuis la £interface£['concept_discoveries_view',vue découvertes]."
 #Singular: ['concept_crisis'] or §H$concept_crisis$§!
 #Plural: -
 concept_crisis: "Crise"
 concept_crisis_desc: "Une §Hcrise§! marque le passage d'un empire à travers une période particulièrement troublée, où il subit la menace d'une force existentielle nourrie par un pouvoir interdit et une technologie apocalyptique.\n\nLa survenue d'un tel événement invite la galaxie à faire front uni dans un moment décisif."
 #Singular: ['concept_overlord_holding'] or §H$concept_overlord_holding$§!
 #Plural: ['concept_overlord_holdings'] or §H$concept_overlord_holdings$§!
 concept_overlord_holding: "Possession de la suzeraine"
 concept_overlord_holdings: "Possessions de la suzeraine"
 concept_overlord_holding_desc: "Les §Hpossessions de la suzeraine§! sont des installations spécialisées établies par les empires suzerains sur le monde de leurs dépendances. Ces structures permettent de projeter de l'influence, mais aussi d'extraire des ressources ou de fournir des services, de façon à renforcer l'autorité de la suzeraine.\n\nLe type de §Hpossessions§! et leur nombre sont déterminés par les clauses du ['concept_subject_agreement',contrat de dépendance], et leurs effets varient selon les ['concept_civics',civismes], ['concept_ethics',éthiques] et priorités stratégiques de la suzeraine. Malgré les profits qu'elles apportent, les possessions peuvent susciter le mécontentement des sujets s'ils les perçoivent comme oppressives ou intrusives."
 #Singular: ['concept_branch_office'] or §H$concept_branch_office$§!
 #Plural: ['concept_branch_offices'] or §H$concept_branch_offices$§!
 concept_branch_office: "$BRANCH_OFFICE$"
 concept_branch_offices: "$BRANCH_OFFICES$"
 concept_branch_office_desc: "Les §Hsuccursales§! offrent au propriétaire d'une firme un pourcentage du £trade_value£['concept_trade',commerce] du monde de la cible sous forme d'£energy£['concept_energy'].\n\nAu maximum, vous pouvez décider la construction de §Y4§! bâtiments de succursale dans la £interface£['concept_colony_view',vue colonie] du monde de la cible. Des emplacements supplémentaires pourront être débloqués grâce à des améliorations de la capitale."
 #Singular 1: ['concept_war'] or §H$concept_war$§!
 #Plural 1: ['concept_wars'] or §H$concept_wars$§!
 #Singular 2: ['concept_subjugation_war'] or §H$concept_subjugation_war$§!
 #Plural 2: -
 #Singular 3: ['concept_total_war'] or §H$concept_total_war$§!
 #Plural 3: -
 concept_war: "Guerre"
 concept_wars: "Guerres"
 concept_subjugation_war: "Guerre d'assujettissement"
 concept_total_war: "Guerre totale"
 concept_war_desc: "La §Hguerre§! constitue l'état officiel de conflit armé entre les empires. Il est adopté en vue de poursuivre des objectifs spécifiques, que ce soit pour concrétiser des ['concept_claims',revendications], résoudre des différends ou réorganiser l'ordre galactique. La guerre est justifiée par un §Hcasus belli§! qui détermine son but et les résultats possibles.\n\nLes guerres peuvent se conclure par une reddition, au cours de laquelle l'un des adversaires accepte les conditions de l'autre, ou par une ['concept_peace',paix] par §Hstatu quo§! dont les gains seront limités aux systèmes occupés au moment de la conclusion de l'accord. Plus le conflit dure, plus la §Hlassitude de guerre§! s'accumule, accentuant la pression pour mettre fin aux hostilités. Malgré son coût élevé, la guerre reste un outil décisif pour façonner le destin des empires."
 #Singular: ['concept_peace'] or §H$concept_peace$§!
 #Plural: -
 concept_peace: "Paix"
 concept_peace_desc: "La §Hpaix§! est la cessation officielle des hostilités entre des empires, résultant généralement en l'obtention des buts de guerre, l'échange de territoires ou l'imposition de nouveaux arrangements politiques. La paix peut être appliquée suite à une reddition ou découler d'une lassitude mutuelle.\n\nLes conditions de la paix déterminent l'ordre de l'après-guerre, établissant des frontières, soumettant des empires ou créant les conditions d'un futur conflit."
 #Singular: ['concept_galactic_community'] or §H$concept_galactic_community$§!
 #Plural: -
 concept_galactic_community: "Communauté galactique"
 concept_galactic_community_desc: "La §H$concept_galactic_community$§! est un corps législatif pangalactique formé par les empires qui en sont membres de façon à promouvoir la coopération, établir des normes interstellaires et faire face aux menaces communes. La communauté joue surtout un rôle prescripteur en proposant au vote des résolutions pour réguler la ['concept_war',guerre], le commerce et les valeurs de la société à l'échelle galactique.\n\nLes empires peuvent obtenir de l'influence au sein de la communauté en affectant des ['concept_envoys',émissaires] et en accroissant leur ['concept_diplomatic_weight',poids diplomatique]. Bien que son ambition affichée soit d'être un forum pour l'unité, la communauté est souvent le théâtre de rivalités internes, de négociations clandestines et de convoitises hégémoniques sous l'apparence de la gouvernance collective."
 #Singular: ['concept_galactic_council'] or §H$concept_galactic_council$§!
 #Plural: -
 concept_galactic_council: "Conseil galactique"
 concept_galactic_council_desc: "Le §H$concept_galactic_council$§! est une instance d'élite existant au sein de la ['concept_galactic_community']. Elle se compose des empires les plus puissants tels que mesurés par leur ['concept_diplomatic_weight',poids diplomatique]. Les membres du Conseil disposent de privilèges, parmi lesquels la capacité de proposer des mesures d'urgence, d'opposer leur veto à des résolutions et celle d'orienter les priorités galactiques.\n\nLe nombre de sièges est limité et leurs occupants sont sujets à changement selon leur pouvoir diplomatique relatif. Initialement voué à protéger l'ordre galactique, le Conseil n'est cependant pas à l'abri des ambitions, les plus forts exerçant leur domination et les plus faibles conspirant pour la renverser."
 #Singular: ['concept_favor'] or §H$concept_favor$§!
 #Plural: ['concept_favors'] or §H$concept_favors$§!
 concept_favor: "Faveur"
 concept_favors: "Faveurs"
 concept_favor_desc: "Les §Hfaveurs§! sont des instruments diplomatiques représentant une dette d'influence contractée par un empire envers un autre, en général lors de leur participation à des événements galactiques. Elles servent plus ou moins de monnaie politique dans le cadre de la §H$concept_galactic_community$§! et du paysage diplomatique au sens large.\n\nLes faveurs peuvent être utilisées pour faire basculer un vote, renforcer des propositions diplomatiques ou obtenir un argument supplémentaire lors de négociations."
 #Singular: ['concept_diplomatic_weight'] or §H$concept_diplomatic_weight$§!
 #Plural: -
 concept_diplomatic_weight: "Poids diplomatique"
 concept_diplomatic_weight_desc: "Le §Hpoids diplomatique§! mesure l'influence d'un empire au sein de la ['concept_galactic_community'], déterminant la force de son vote sur des résolutions et son éligibilité pour rejoindre ou non le ['concept_galactic_council']. Ce poids est calculé à partir du pouvoir économique, technologique et militaire d'un empire, ainsi que du nombre d'['concept_envoys',émissaires] affectés à la communauté.\n\nLe poids diplomatique peut fluctuer au fil du temps, reflétant le statut d'un empire tout en lui servant d'outil pour faire progresser ses intérêts."
 #Singular: ['concept_first_contact'] or §H$concept_first_contact$§!
 #Plural: ['concept_first_contacts'] or §H$concept_first_contacts$§!
 concept_first_contact: "Premier contact"
 concept_first_contacts: "Premiers contacts"
 concept_first_contact_desc: "Un §Hpremier contact§! marque la rencontre initiale entre des civilisations qui ne se connaissent pas encore. Ce moment fatidique peut mener à de la ['concept_diplomacy',diplomatie], de la suspicion ou même un conflit selon l'attitude et la disposition des différentes parties.\n\nLe processus de §Hpremier contact§! implique de décoder les communications aliens, de gérer les incidents éventuels, mais aussi de déterminer la posture d'un empire face à l'inconnu."
 #Singular: ['concept_workforce'] or §H$concept_workforce$§!
 #Plural: -
 concept_workforce: "Main-d'oeuvre"
 concept_workforce_desc: "La §Hmain-d'oeuvre§! représente la capacité collective de travail d'une £colony£['concept_colony',colonie]. Elle reflète le nombre d'individus disponibles pour accomplir diverses tâches essentielles au fonctionnement de l'empire.\n\nLes £pop£['concept_pops',pops] sont organisées en groupes d'après leurs caractéristiques partagées telles que leur ['concept_species',espèce], leur classe sociale et leurs ['concept_ethics',éthiques]. Chaque groupe contribue à la §Hmain-d'oeuvre§! de la planète, qui est ensuite répartie pour occuper les £job£['concept_jobs',emplois] disponibles."
 #Singular: £zone£ ['concept_district_specialization'] or £zone£ §H$concept_district_specialization$§!
 #Plural: £zone£ ['concept_district_specializations'] or £zone£ §H$concept_district_specializations$§!
 concept_district_specialization: "$planet_zone$"
 concept_district_specializations: "$planet_zones$"
 concept_district_specialization_desc: "Les spécialisations des districts déterminent les £job£['concept_jobs',emplois] fournis par chaque £district£['concept_district',district]. La plupart ajoutent de l'espace pour construire des £building£['concept_buildings',bâtiments] supplémentaires."
 concept_district_specializations_desc: "$concept_district_specialization_desc$"
 #Singular: -
 #Plural: £strategic_resource£ ['concept_strategic_resources'] or £strategic_resource£ §H$concept_strategic_resources$§!
 concept_strategic_resources: "Ressources stratégiques"
 concept_strategic_resources_desc: "Les £strategic_resource£§Hressources stratégiques§! sont des substances rares et puissantes, essentielles pour les technologies avancées, les infrastructures, et les systèmes des vaisseaux.\n\nElles regroupent notamment les £volatile_motes£§Hparticules volatiles§!, les £exotic_gases£§Hgaz exotiques§!, et les £rare_crystals£§Hcristaux rares§!.\n\nLes §Hressources rares§! sont des substances encore plus précieuses ou ésotériques, dont les applications sont particulièrement avancées. Les ressources stratégiques et rares sont notamment utilisées pour construire des ['concept_civilian_ships',vaisseaux civils], des ['concept_military_ships',vaisseaux militaires], des ['concept_starbases',bases stellaires], et des ['concept_megastructures'mégastructures].$tt_gain$- Construire des £zone£§Hzones industrielles§! ou des £zone£§Hzones métallurgiques§!\n- Construire des bâtiments associés\n- $tt_market$"
 concept_strategic_resources_tooltip: "$concept_strategic_resources_desc$\n\n§GCliquer sur ['concept_strategic_resources'] pour ouvrir la banque de données.\nCliquer sur £strategic_resource£ dans le menu pour ouvrir la liste.§!"
 POLICY_OPTION_CONCEPT_BODY: "- ['policy:$POLICY$:$OPTION$',$OPTION_NAME$]"
