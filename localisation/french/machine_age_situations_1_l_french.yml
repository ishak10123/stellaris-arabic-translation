 #Cyber Imperial Collectivist
 auth_cyber_imperial_collectivist: "Réseau impérial"
 auth_cyber_imperial_collectivist_desc: "Le réseau impérial offre à toute la population un accès inédit au divertissement de masse. Il est possible de construire l'imposant $building_cyberdome$ dans la capitale pour y tenir d'intenses compétitions de cybersports où les athlètes améliorés triomphent, tout cela bien évidemment retransmis à travers l'univers."
