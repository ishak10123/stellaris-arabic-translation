 cyber.social_consequences.tt: "Influe sur l'§Yévolution sociétale cybernétique§! en cours.\n\n" #Standard tooltip to indicate that the Individualism/Collectivism variables are changed
 #FIRST EVENT #
 #DEMOCRATIC
 cyber.505.name: "Le choc du futur"
 cyber.505.desc.gov: "L'amélioration de notre peuple est l'exemple flagrant d'un processus de production rationalisé réussi et maîtrisé. Nous avons pris en compte les multiples complaintes et nous y avons remédié. Aujourd'hui, chaque citoyen §Y[root.GetSpeciesAdj]§! a accès à ces implants révolutionnaires.\n\nNotre prochaine étape sera d'étudier en détail toutes les conséquences de cette technologie. Devrions-nous l'inclure dans la machine démocratique, ou la réserver à la synchronisation d'expérience entre nos ouvriers ?"
 cyber.505.desc.cor: "Le processus d'amélioration codirigé par nos corporations partenaires a été un véritable succès : les implants ont été produits, distribués puis installés avec une efficacité redoutable. Nous avons pris en compte les multiples complaintes du peuple §Y[root.GetSpeciesAdj]§! et nous y avons remédié. Nous sommes prêts à affronter l'avenir avec fougue.\n\nLe gouvernement s'apprête à passer à la prochaine phase de son plan. Nous pouvons employer ces progrès pour renforcer la machine démocratique ou synchroniser les implants pour bénéficier aux ouvriers."
 cyber.505.desc.ind: "Malgré l'appréhension générale du gouvernement, la distribution décentralisée des implants a fonctionné. À chaque coin de rue, au plus près du peuple, des cliniques spécialisées ouvrent pour installer des améliorations.\n\nLe gouvernement doit se tenir prêt à évoluer. Nous pouvons employer ces implants pour renforcer la machine démocratique ou synchroniser les implants pour bénéficier à nous-mêmes et aux ouvriers."
 cyber.505.a: "Améliorons la machine démocratique"
 cyber.505.a.tt: "Priorité au bonheur, à l'unité et aux spécialistes."
 cyber.505.b: "Connectons nos esprits"
 cyber.505.b.tt: "Priorité au bonheur, à la production des ouvriers et la stabilité."
 #OLIGARCHIC
 cyber.510.name: "Restructuration du système"
 cyber.510.desc.gov: "Le grand changement est un concept compris et promulgué uniquement par les hautes sphères de la société ; s'il était confié au peuple, le désaccord serait constant. Les §Y[Species.GetNamePlural]§! sont équipés d'implants distribués par le gouvernement, nous donnant l'occasion unique d'exploiter un potentiel énorme.\n\nAllons-nous pousser la société dans une concurrence démesurée pour élever nos ouvriers, ou allons-nous tirer profit de la puissance de calcul inutilisée des masses endormies ?"
 cyber.510.desc.cor: "Les corporations approuvées par l'État produisent des biopuces toujours plus puissantes, mais il nous reste à décider comment tirer profit de cette révolution sociétale.\n\nAllons-nous imiter la nature et instaurer la loi du plus fort, ou allons-nous explorer le potentiel inexploité du cerveau ?"
 cyber.510.desc.ind: "C'est au peuple que reviennent la production et la distribution des appareils d'amélioration, pour le meilleur comme pour le pire, mais nous avons désormais le temps de choisir la direction à adopter concernant ce changement sociétal sans précédent.\n\nAllons-nous imposer des quotas toujours plus lourds à nos citoyens, ou allons-nous les faire travailler dans leur sommeil ?"
 cyber.510.a: "Que les serfs travaillent pour nous"
 cyber.510.a.tt: "Priorité à la production au détriment du bonheur."
 cyber.510.b: "Développons le potentiel du sommeil"
 cyber.510.b.tt: "Priorité à l'emploi de factions pour des ressources supplémentaires."
 #DICTATORIAL
 cyber.515.name: "Foule sous contrôle"
 cyber.515.desc.gov: "Notre programme d'amélioration a révélé de nombreuses occasions de renforcer la stabilité et le contrôle : les implants gouvernementaux que nous produisons et installons sur nos citoyens pourraient facilement inclure un algorithme capable d'influencer la population à notre avantage.\n\nNous pourrions accroître notre surveillance en installant des outils de veille sur ces implants, ou nous pourrions installer un algorithme qui placerait notre §Y[Ruler.GetTitle]§! au centre des préoccupations du peuple."
 cyber.515.desc.cor: "Nos corporations partenaires sont parées à produire, distribuer et installer des implants cybernétiques à toute la population. Leur prochaine mise à jour micrologiciel nous a donné des idées.\n\nNous pourrions y dissimuler des outils de surveillance capables d'identifier les individus dangereux, ou bien nous pourrions instaurer un algorithme de suppression de la volonté pour introduire la bonne parole de notre §Y[Ruler.GetTitle]§! dans l'esprit de nos citoyens."
 cyber.515.desc.ind: "Les hôpitaux, les enseignes de revente et les communautés de pirates sont prêts à distribuer et installer des implants cybernétiques sur la population. Cependant, nous pourrions proposer nous aussi cette technologie révolutionnaire.\n\nIl serait facile d'inclure des outils de surveillance dissimulés afin de suivre les individus à risque. Ou alors, nous pouvons également installer un algorithme de suppression de la volonté pour permettre à notre §Y[Ruler.GetTitle]§! de guider notre peuple inconscient vers de nouveaux sommets."
 cyber.515.a: "Traquons discrètement notre peuple avec ces implants"
 cyber.515.a.tt: "Priorité à la stabilité de l'empire et la réduction de la criminalité."
 cyber.515.b: "Guidons nos citoyens avec l'algorithme"
 cyber.515.b.tt: "Priorité à la production des ouvriers et la réimplantation."
 #IMPERIAL
 cyber.520.name: "Le choc du futur"
 cyber.520.desc.gov: "Le gouvernement a mobilisé ses nombreuses ressources pour améliorer efficacement la population. De jour comme de nuit, des centres d'amélioration agréés ont installé des implants dont les règles d'utilisation et d'entretien ont été longuement expliquées.\n\nLa question est maintenant de savoir si nous devons concentrer la valeur réelle de ces implants sur l'amélioration de nos dirigeants déjà exceptionnels, ou s'ils doivent être utilisés pour divertir et distraire ceux qui travaillent sous leurs ordres.\n\nL'utilisation d'implants de la plus haute qualité au sein de notre dynastie pourrait permettre à nos dirigeants de préserver le savoir entre les générations, et ainsi d'assurer une plus grande stabilité. L'empire peut aussi rehausser le statut de la capitale et distraire la population avec des événements sportifs sanglants opposant des athlètes cybernétiquement améliorés."
 cyber.520.desc.cor: "Les sociétés officiellement agréées ont travaillé dans le respect des directives opérationnelles, et l'ensemble de la population a reçu des implants cybernétiques afin de servir plus efficacement que jamais.\n\nLa question est maintenant de savoir comment utiliser la valeur réelle de ces implants.\n\nL'utilisation d'implants de la plus haute qualité au sein de notre dynastie pourrait permettre à nos dirigeants de préserver le savoir entre les générations, et ainsi d'assurer une plus grande stabilité. L'empire peut aussi élever la capitale et distraire la population avec des événements sportifs sanglants opposant des athlètes cybernétiquement améliorés."
 cyber.520.desc.ind: "Malgré les sérieuses réserves émises par les agents impériaux, la distribution décentralisée et l'installation d'implants cybernétiques ont été couronnées de succès. Bon nombre de petites cliniques à travers nos mondes travaillent sans relâche dans le but d'améliorer notre population.\n\nLa question est maintenant de savoir comment utiliser la valeur réelle de ces implants. Nous pourrions préserver le savoir impérial dans des implants intergénérationnels ou offrir à la population des événements sportifs sanglants opposant des cyborgs, tels qu'aucun implant oculaire n'en a jamais vu."
 cyber.520.a: "Préservons le savoir impérial"
 cyber.520.a.tt: "Concentrons-nous sur la souveraineté de l'empire."
 cyber.520.b: "Offrons un divertissement à la population"
 cyber.520.b.tt: "Concentrons-nous sur la productivité et le bonheur du monde-capitale."
 #CORPORATE
 cyber.525.name: "Implants Inc."
 cyber.525.desc.gov: "Le programme d'implants du gouvernement, vaste mais inefficace, touche à sa fin ; l'occasion pour nous de développer les sources de revenus liées au lancement de ce produit sans précédent. Notre équipe d'analystes propose deux sources potentielles de revenus, présentant chacune ses risques et ses récompenses.\n\nLe gouvernement devrait-il exiger l'inclusion de publicités dans tous les futurs implants oculaires, ou imposer des améliorations régulières pour les porteurs d'implants ?"
 cyber.525.desc.cor: "La production et l'installation d'implants sont aussi efficaces que prévu grâce à notre infrastructure de société hautement optimisée. Les opportunités commerciales de ces nouveaux implants sont quasiment infinies.\n\nDeux pistes particulièrement prometteuses se présentent à nous. Bien qu'incompatibles, toutes deux prévoient de considérables marges bénéficiaires.\n\nLa question est de savoir si nous devons exiger l'inclusion de publicités dans tous les futurs implants oculaires, ou imposer des améliorations régulières pour les porteurs d'implants ?"
 cyber.525.desc.ind: "Sans surprise, l'implémentation « collective » et désordonnée du cyberware touche à sa fin. Nous avons désormais la possibilité d'influencer l'orientation de cette nouvelle technologie prometteuse, tout en augmentant nos marges sur les produits.\n\nDevrions-nous inclure des publicités dans tous les futurs implants oculaires, ou serait-il préférable d'imposer un cycle d'améliorations régulières pour les logiciels et la neurocybernétique ?"
 cyber.525.a: "Mettons au point un prototype d'implants oculaires avec des publicités"
 cyber.525.a.tt: "Concentrons-nous sur l'augmentation de la valeur commerciale et la baisse des coûts d'opportunité économique."
 cyber.525.b: "Recherchons des procédés d'amélioration pour les implants"
 cyber.525.b.tt: "Concentrons-nous sur les objectifs de productivité, l'espionnage et l'entretien des équipements."
 ### EVENT POOL ###
 cyber.610.name: "Joie instantanée"
 cyber.610.desc: "Un modificateur d'implant clandestin, capable de stimuler le cerveau afin qu'il produise des neurotransmetteurs chimiques à volonté, se répand parmi nos travailleurs. Il présente une large palette d'utilisations, allant de l'instillation d'un plaisir intense à l'augmentation de la tolérance à la douleur. La rétro-ingénierie d'une version stable de cet implant illégal nécessiterait des investissements colossaux, et les effets stimulants finiraient par s'estomper.\n\nDevons-nous créer une version commerciale, reconditionner le prototype clandestin, ou nous contenter d'en réguler l'utilisation ?"
 cyber.610.a: "Créons un implant stable"
 cyber.610.b: "Emparons-nous du prototype clandestin"
 cyber.610.c: "Régulons ces types de modificateurs"
 cyber.615.name: "Séparation entre vie privée et vie professionnelle"
 cyber.615.desc: "De plus en plus de sociétés exigent que toutes les expériences vécues pendant les heures de bureau soient stockées dans une zone de mémoire cybernétique inaccessible en dehors du travail.\n\nElles affirment n'utiliser cette fonctionnalité que pour les tâches hautement confidentielles, afin d'empêcher l'espionnage industriel. Certaines exigent même que leurs employés séparent leurs expériences personnelles du travail, afin d'éviter que l'éthique personnelle n'interfère avec leur productivité."
 cyber.615.a: "Les employés doivent avoir un contrôle total"
 cyber.615.b: "Il est préférable de laisser le travail au bureau"
 cyber.615.c: "Il est préférable qu'ils séparent leurs expériences dans les deux sens"
 cyber.625.name: "Monétisation par souscription"
 cyber.625.desc: "Maintenant que le cyberware est ancré dans nos vies, les changements apportés aux modèles de monétisation ont un impact considérable sur l'ensemble de notre société. La tendance actuelle veut que les fabricants d'implants verrouillent des fonctionnalités essentielles en échange d'un modèle de souscription. Un défaut de paiement suffit alors pour que vos membres cybernétiques se verrouillent et que votre système optique s'éteigne. Les associations de consommateurs nous encouragent à mettre un terme à ces pratiques."
 cyber.625.a: "Interdisons les souscriptions liées au cyberware"
 cyber.625.b: "S'ils ne peuvent pas se le permettre, alors qu'ils n'y souscrivent pas"
 cyber.625.c: "Limitons les souscriptions aux fonctionnalités non essentielles"
 cyber.625.d: "Excellente idée ! Continuons dans cette voie"
 cyber_subscription_ban: "Interdiction des souscriptions liées au cyberware"
 cyber_subscription_ban_desc: "Nous avons empêché les producteurs de cyberware de verrouiller les fonctionnalités liées aux implants via un système de souscription."
 cyber_subscription_limited: "Restriction des souscriptions liées au cyberware"
 cyber_subscription_limited_desc: "Nous avons empêché les producteurs de cyberware de verrouiller les fonctionnalités essentielles liées aux implants via un système de souscription."
 cyber_subscription: "Ajoute les modificateurs suivants au trait d'espèce §Y$trait_cybernetic$§! :\n$t$Bonheur : §R-5%§!\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_traders'] : §G+25%§!"
 cyber_subscription_megacorp: "Ajoute les modificateurs suivants au trait d'espèce §Y$trait_cybernetic$§! :\n$t$Bonheur : §R-5%§!\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_traders'] : §G+50%§!"
 cyber.655.name: "Défaillance mécanique imprévisible"
 cyber.655.desc: "Nos ingénieurs en cyberware nous ont présenté une opportunité économique. En réduisant légèrement la durée de vie des implants, nous pourrions générer des profits colossaux puisque les utilisateurs seraient contraints de remplacer des pièces essentielles.\n\nEn utilisant un bio-alliage de qualité inférieure dans les parties en proie à l'usure naturelle, les implants tomberont en panne sans porter préjudice à l'utilisateur, tout en nécessitant néanmoins d'être remplacés."
 cyber.655.a: "C'est scandaleux"
 cyber.655.a.tt: "Nous ne fournirons pas à nos citoyens des composants de mauvaise qualité !\n\n"
 cyber.655.b: "Voilà qui est intrigant... Commençons à rendre le cyberware plus fragile"
 cyber.655.c: "Oui ! Coordonnons cela avec une augmentation des prix"
 cyber.655.d: "Utilisons ces données pour améliorer les efforts de cybernétisation"
 worse_parts: "Composants de piètre qualité"
 worse_parts_desc: "Nous avons délibérément choisi de fournir à nos citoyens des composants cybernétiques de qualité inférieure, de façon à ce qu'ils doivent acheter plus souvent des pièces de rechange."
 worse_parts_effect_tt: "Prod. de £trade£§Yvaleur commerciale§! pour $pop_group_unit$ £pop£§Hpops§! ayant le trait §Y$trait_auto_mod_cyborg$§! : §G+0.5§!"
 optimized_parts: "Composants optimisés"
 optimized_parts_desc: "Nous avons continué à innover et à améliorer nos composants cybernétiques, ce qui nous a permis de simplifier et d'accélérer le processus d'installation."
 optimized_parts_effect_tt: "Entretien en £energy£§Yénergie§! des £pop£§Hpops§! ayant le trait §Y$trait_auto_mod_cyborg$§! : §R+0.1§!"
 cyber.660.name: "Échec sociétal imprévisible"
 cyber.660.desc: "Il semblerait que nos citoyens aient découvert notre stratégie d'obsolescence programmée.\n\nLes [Owner.GetSpeciesNamePlural] ont envahi les rues pour protester contre les récents changements que nous avons apportés à la qualité et au coût du cyberware. Ils réclament à cor et à cri que nous revenions sur notre décision."
 cyber.660.a: "D'accord, nous avons peut-être été trop gourmands"
 cyber.660.b: "Quoi ? PLUS FORT, ON N'ENTEND RIEN !"
 cyber.660.c: "Nous ne devrons pas..."
 discontent: "Mécontentement"
 discontent_desc: "Nos citoyens manifestent contre la récente augmentation des prix et la baisse de la qualité du cyberware."
 cyber.805.name: "Contrôle parental"
 cyber.805.desc: "Avec l'installation d'implants cérébraux chez les nourrissons, les tuteurs demandent davantage de contrôle sur leurs enfants. La possibilité de prendre en charge leurs fonctions motrices est actuellement réservée aux agents de sécurité, mais certains veulent étendre ces droits aux responsables légaux.\n\nBien que cela constitue une violation manifeste de l'autonomie corporelle, plusieurs autres formes de coercition parentale sont déjà autorisées. Une solution serait de permettre un contrôle limité, par exemple en ralentissant ou en réduisant le volume sonore de l'enfant turbulent."
 cyber.805.a: "Laissons les adultes contrôler leurs enfants"
 cyber.805.b: "Autorisons un contrôle limité"
 cyber.805.c: "Laissons le contrôle du corps à distance aux agents de sécurité"
 cyber.810.name: "Transfert de savoir"
 cyber.810.desc: "Le développement d'implants cérébraux cybernétiques nous offre une opportunité intéressante. Au lieu de nous appuyer sur des méthodes d'enseignement lentes et subjectives, nous pourrions transférer des connaissances fondamentales directement d'un cerveau à un autre. Cela nécessite toutefois des conditions de laboratoire stériles, ce qui nous empêcherait d'exploiter cette idée à grande échelle. De plus, les informations reçues écraseraient une partie des souvenirs similaires appartenant au destinataire.\n\nL'usage le plus pertinent serait le partage de savoir entre scientifiques. Cela nous permettrait de compenser une partie de la dette d'ingénierie liée au processus de cybernétisation ou de nous concentrer sur d'autres domaines."
 cyber.810.a: "Transférons notre savoir en ingénierie"
 cyber.810.b: "Transférons notre savoir en physique"
 cyber.810.c: "Transférons notre savoir sociétal"
 cyber.810.d: "Que chacun conserve son propre esprit"
 cyber.815.name: "Amour décentralisé"
 cyber.815.desc: "Si bon nombre de [root.GetSpeciesNamePlural] ont accepté d'améliorer leur vie quotidienne et leurs relations grâce à la cybernétique existante, de plus en plus de ménages à partenaires multiples ont opté pour des réseaux privés avec du matériel sur mesure. Ces foyers ont choisi de vivre dans un isolement personnalisé, partageant les sentiments et les expériences de chacun dans une intimité unique.\n\nCertains groupes de protection sociale et de savants saluent ce phénomène, suggérant ainsi que tout le monde pourrait bénéficier d'une amélioration personnalisée de ses propres relations et autres liens familiaux. D'autres s'inquiètent au contraire d'un tel retrait de la société au sens large du terme, certains affirmant même que cette pratique pourrait pousser les individus à se perdre dans des « gestalts d'amour » miniatures."
 cyber.815.a: "La façon dont ils choisissent de vivre et d'aimer ne nous regarde pas"
 cyber.815.a.tt: "Nous continuerons à autoriser l'accès à du matériel personnalisé et à des espaces numériques privés."
 decentralized_families: "Familles décentralisées"
 decentralized_families_desc: "Les ménages de toutes sortes peuvent enrichir leurs relations à l'aide de logiciels et d'améliorations sur mesure."
 cyber.815.b: "Ramenons ces familles dans le rang"
 cyber.815.b.tt: "Nous dissuaderons les améliorations sur mesure au profit de solutions plus strictement réglementées."
 centralized_families: "Familles centralisées"
 centralized_families_desc: "Des contrôles plus stricts concernant les logiciels et les améliorations cybernétiques dissuaderont les ménages d'ériger des jardins numériques clos." #as in a richly decorated but enclosed space
 cyber.820.name: "Image radicale"
 cyber.820.desc: "Des sous-cultures marginales ont toujours existé tout au long de l'histoire des [root.GetSpeciesNamePlural], mais avec l'avènement des améliorations cybernétiques, la situation a radicalement changé : des groupes marginaux ont en effet commencé à se modifier, à tel point qu'ils ne semblent même plus appartenir aux [root.GetSpeciesNamePlural]. Ce sont notamment les jeunes qui, par leur soif de [root.GetSpeciesHandNamePlural] personnalisées, d'art corporel en 3D et autres appendices décoratifs, creusent le fossé entre les générations.\n\nIls affirment ainsi refléter leur véritable personnalité, et qu'en renonçant à l'homogénéité des [root.GetSpeciesNamePlural], ils ne font que se montrer maîtres de leur propre vie. Toutefois, de plus en plus d'experts sociaux et de parents inquiets ne partagent pas cette idéologie, considérant même ces individus comme des mécréants souhaitant la chute de notre société."
 cyber.820.a: "Adoptons des directives plus strictes sur les modifications corporelles"
 cyber.820.b: "C'est une simple passade, ça leur passera"
 radical_image: "Image radicale"
 radical_image_desc: "Les jeunes de la société entreprennent toutes sortes d'expérimentations sur leur propre image."
 cyber.820.c: "Nous pourrions peut-être apprendre quelque chose de ces jeunes gens"
 radical_insights: "Idées radicales"
 radical_insights_desc: "Suivant l'exemple de ces adeptes de la contre-culture, cette société expérimente sur sa propre image de nouveaux types d'améliorations esthétiques."
 cyber.821.name: "Protestations radicales"
 cyber.821.desc: "Des milliers de jeunes, d'activistes et d'artistes se sont rassemblés pour exiger la liberté de l'amélioration cybernétique. Les manifestants couvrent tous les [root.GetSpeciesNamePlural], des individus aux membres personnalisés, aux torses refaçonnés et aux formes hybrides en tous genres. Tous se déclarent solidaires avec les [root.GetSpeciesNamePlural] qui sont discriminés pour leurs choix personnels en matière de décorations cybernétiques."
 cyber.821.a: "Nous ne nous laisserons pas influencer"
 cyber.821.a.tt: "Nous continuerons à encourager une approche collectiviste de la cybernétique."
 radical_image_denied: "Image radicale rejetée"
 radical_image_denied_desc: "Les récentes protestations concernant le droit de liberté d'expression via les améliorations cybernétiques ont pris de l'ampleur."
 cyber.821.b: "Nous prendrons en compte leurs revendications"
 cyber.821.b.tt: "Les individus jouiront d'une plus grande liberté dans le choix de leurs améliorations cybernétiques."
 radical_image_upheld: "Image radicale soutenue"
 radical_image_upheld_desc: "Les récentes protestations ont donné naissance à certains droits concernant la liberté d'expression via les améliorations cybernétiques visibles."
 cyber.822.name: "Physiologie radicale"
 cyber.822.desc: "Les professionnels de santé se sont plaints de devoir faire face à des obstacles bizarres sans précédent dans le traitement des patients présentant des améliorations cybernétiques uniques en leur genre.\n\nBon nombre de ces individus dotés d'améliorations personnalisées nécessitent des mesures thérapeutiques spéciales, comme des appareils adaptés ou un désassemblage draconien, même pour des pathologies mineures. Le coût de ces interventions est largement supérieur à celui des patients non-[root.GetSpeciesNamePlural] et non modifiés."
 cyber.822.a: "Ces coûts sont justifiés"
 cyber.822.b: "C'était une erreur d'autoriser un tel degré de personnalisation"
 #Cold Metal
 cyber.830.name: "Frissons"
 cyber.830.desc: "Un certain nombre de porteurs d'implants affirment ressentir des douleurs lorsqu'ils sont exposés au froid. La situation est particulièrement inquiétante sur la planète §H[cold_planet.GetName]§!, habituée aux températures glaciales.\n\nNous savions déjà que les implants métalliques sont désagréables à porter à basse température, mais pas à ce point. Notre main-d'oeuvre s'en trouve affectée."
 cyber.830.a: "Lançons une étude médicale"
 cyber.830.b: "Nous ne sommes pas responsables de leurs souffrances"
 cyber.830.tooltip: "Ajoute les modificateurs suivants au trait d'espèce §Y$trait_cybernetic$§! :\n  Habitabilité montagneuse/arctique/subarctique : §R-20 %§!"
 COLD_METAL_PROJECT: "Métal froid"
 COLD_METAL_PROJECT_DESC: "Les populations vivant dans un climat glacial nous rapportent des cas de douleurs aiguës liées aux implants cybernétiques. Un essai clinique nous permettra de recueillir plus de données."
 cyber.835.name: "Rapport médical"
 cyber.835.desc: "Les essais cliniques ne nous ont pas permis d'établir une corrélation définitive entre l'exposition du cyberware au froid et l'âge, le sexe, la profession et le type d'implants utilisés par les patients affectés.\n\nCertains professionnels de santé affirment que la douleur est psychosomatique, et que le traitement devrait se limiter à des analgésiques et à une thérapie comportementale. D'autres nous conseillent au contraire de ne pas sous-estimer le problème, et nous invitent à financer un programme visant à faire avancer les options en matière de traitement."
 cyber.835.a: "Cette douleur est purement imaginaire"
 cyber.835.b: "Lançons un programme de recherche"
 cyber.835.c: "Déplaçons les individus affectés sur une planète plus chaude"
 cyber.835.tooltip: "Retire les modificateurs suivants au trait d'espèce §Y$trait_cybernetic$§! :\n  Habitabilité montagneuse/arctique/subarctique : §R-20 %§!"
 cyber.840.name: "Là où notre coeur nous mène"
 cyber.840.desc: "Nous avons toujours eu un peuple de voyageurs, de nomades, d'explorateurs. Si pour certains, voyager est un moyen d'atteindre leur destination, le voyage est pour nous une destination en soi. L'amélioration corporelle nous a permis d'atteindre de nouveaux mondes, mais aussi de surveiller ceux qui s'éloignaient trop du droit chemin. Ce n'est pas un changement qui fait l'unanimité.\n\nDe plus en plus d'individus manipulent leurs implants et disparaissent ainsi du réseau pour préserver leur vie privée. Ce n'est encore qu'une tendance marginale, mais cela pourrait poser problème à l'avenir."
 cyber.840.a: "Ils ont raison ; interdisons la technologie de surveillance"
 cyber.840.b: "Il n'y a pas lieu de s'inquiéter"
 cyber.840.c: "Offrons-leur des implants intraçables... moyennant finance"
 cyber.840.d: "Il faut contenir ces dissidents. Nous ne toucherons pas à notre technologie de surveillance"
 cyber_wanderers: "Voyageurs infatigables"
 cyber_wanderers_desc: "Ils sont partout, mais sont difficiles à surveiller."
 cyber_wanderers_tracked: "Tenus en laisse"
 cyber_wanderers_tracked_desc: "Notre peuple tient à sa liberté et s'oppose fermement à toute forme de technologie de surveillance."
 cyber.855.name: "Réussite scolaire" #Idiom: if you achieve a required score, you 'make the grade'; similar to 'make the cut'
 cyber.855.intro.desc: "Des microprocesseurs cognitifs, des professeurs d'I.A. améliorés, des enzymes de conception visant à promouvoir la régénération neuroplastique, tout cela à destination d'élèves de maternelle."
 cyber.855.gov.desc: "$cyber.855.intro.desc$\n\nSuivre le rythme des avancées technologiques a imposé un lourd fardeau à nos programmes d'éducation financés par l'État. L'écart de performance se creuse entre ceux qui s'appuient sur les améliorations publiques et les foyers qui ont les moyens de s'offrir une technologie de pointe.\n\nLe maintien d'un système équitable nécessitera un important investissement de ressources sur cinq ans."
 cyber.855.corp.desc: "$cyber.855.intro.desc$\n\nUne bonne éducation peut coûter cher, et beaucoup ont de plus en plus de mal à suivre la cadence. L'écart de performance se creuse entre les foyers qui ont les moyens de s'offrir des améliorations de pointe et ceux qui doivent s'appuyer sur des modèles désuets, de seconde main, voire des contrefaçons.\n\nAfin d'empêcher que la stratification sociale ne s'aggrave, il faudra investir massivement sur cinq ans dans notre système éducatif."
 cyber.855.a: "Le coût est bien trop élevé"
 cyber.855.b: "L'éducation doit rester accessible à tous"
 cyber_education: "Éducation améliorée"
 cyber_education.tt: "Nous nous lancerons dans un programme sur cinq ans visant à promouvoir un système éducatif efficace et entièrement amélioré."
 cyber.860.name: "Excellence égalitaire"
 cyber.860.desc: "Notre investissement dans l'éducation améliorée a porté ses fruits, et de quelle manière !\n\nL'accès public à une cybernétique de qualité a donné naissance à une véritable méritocratie scolaire dans laquelle chacun, quelle que soit sa classe sociale, peut développer tout son potentiel. Les avantages sont particulièrement notables dans les sciences, où l'innovation et les résultats de la recherche ont progressé dans tous les domaines."
 egalitarian_excellence: "Excellence égalitaire"
 egalitarian_excellence.tt: "Une population bien éduquée et entièrement améliorée est la clé du progrès social et matériel."
 cyber.865.name: "Des dirigeants exceptionnels"
 cyber.865.desc: "La décision de s'abstenir de financer publiquement une éducation améliorée s'est avérée judicieuse.\n\nNotre société croit fermement en l'excellence individuelle. En dépit des critiques éparses sur l'aggravation de la « fracture sociale », la compétition académique a permis de former certains des dirigeants les plus instruits et les plus productifs de la galaxie."
 exceptional_leaders: "Des dirigeants exceptionnels"
 exceptional_leaders.tt: "Le développement de nos meilleurs talents au niveau individuel a permis de former des dirigeants d'exception."
 cyber.1005.name: "Records battus"
 cyber.1005.desc: "« Encore un record battu pour les [Root.Species.GetNamePlural] ». Voilà une information que l'on retrouve de plus en plus souvent dans les résultats sportifs des [Root.Owner.GetSpeciesNamePlural]. Alors que les [GetAthletePlural] rivalisent d'efforts pour se surpasser avec des modifications de plus en plus sophistiquées, leurs performances athlétiques atteignent régulièrement de nouveaux sommets.\n\nSi les fans de « sport amélioré » sont aux anges, de plus en plus de passionnés demandent à ce que les sportifs améliorés s'affrontent dans un championnat distinct. Un dernier groupe souhaite au contraire limiter le nombre d'individus améliorés participant aux épreuves par équipe, afin que les [GetAthletePlural] naturels puissent encore avoir leur heure de gloire."
 cyber.1005.a: "Les individus non modifiés ont fait leur temps"
 cyber.1005.a.tt: "Encourageons les athlètes modifiés à favoriser l'innovation."
 cyber.1005.b: "Renvoyons les athlètes améliorés dans un championnat distinct"
 cyber.1005.c: "Limitons les [GetAthletePlural] modifiés"
 cyber_athletes: "Athlètes cybernétiques"
 cyber_athletes_desc: "En faisant la promotion des athlètes modifiés dans le sport, nous pourrions tester un cyberware de pointe."
 cyber_athlete_leagues: "Championnats cybernétiques"
 cyber_athlete_leagues_desc: "En séparant les athlètes « naturels » et les athlètes améliorés, nous garantissons une concurrence équitable pour tous."
 limited_cyber_athletes: "Restriction des athlètes cybernétiques"
 limited_cyber_athletes_desc: "En régulant le nombre d'athlètes modifiés, nous nous assurons que chaque équipe puisse prétendre à la victoire."
 athlete_plural: "athlètes"
 cyber.1010.name: "Ciel à vendre"
 cyber.1010.desc: "La mégacorporation §Y[sky_megacorp.GetName]§! nous offre une formidable opportunité en souhaitant faire la publicité de son dernier produit, une boisson énergétique appelée Plasma Drink.\n\nCes publicités seront projetées directement dans les implants oculaires de nos citoyens à chaque fois qu'ils lèveront les yeux vers le ciel. Nous pourrions utiliser les revenus générés pour un certain nombre de projets civiques.\n\nMalgré la nature intrusive des publicités, on nous a assuré que la boisson était délicieuse et non toxique."
 cyber.1010.a: "Buvez Plasma Drink !" #Feel free to localize Plasma Quench to sound like a slimy energy drink. No need to make it word for word.
 cyber.1010.b: "Le ciel n'est pas à vendre !"
 cyber.1010.c: "Négocions les termes du contrat"
 cyber.1010.d: "Nous ne sommes pas intéressés"
 cyber.1015.desc: "La mégacorporation §Y[sky_megacorp.GetName]§! nous a fait part d'une nouvelle offre concernant Plasma Drink, la boisson énergétique préférée de toute la galaxie. Puisque la vente de la vue du ciel par nos citoyens améliorés a si bien fonctionné, elle nous demande à présent de diffuser des publicités supplémentaires dans le monde physique.\n\n« [most_populous.GetName] est l'endroit idéal pour la diffusion de nos publicités ! », a déclaré un porte-parole de la mégacorporation [sky_megacorp.GetName]. Après tout, ne serait-il pas normal que tout le monde ait accès à des opportunités aussi incroyables ?"
 cyber.1015.a: "Que le Plasma coule à flots !"
 cyber.1015.a.tt: "Ajoute de gigantesques panneaux publicitaires à proximité de §Y[most_populous.GetName]§!."
 cyber.1015.b: "Notre ciel numérique est déjà bien suffisant"
 cyber.1015.c: "Laissons nos citoyens tranquilles !"
 sold_sky_1: "Panneaux publicitaires numériques"
 sold_sky_1_desc: "Vendre l'attention virtuelle de nos citoyens était une excellente décision !"
 sold_sky_1_mega: "$sold_sky_1$"
 sold_sky_1_mega_desc: "$sold_sky_1_desc$"
 sold_sky_2: "Panneaux publicitaires planétaires"
 sold_sky_2_desc: "Les élites de cette planète ont choisi de vendre le ciel de leurs citoyens en échange de ressources supplémentaires."
 sold_sky_2_mega: "$sold_sky_2$"
 sold_sky_2_mega_desc: "$sold_sky_2_desc$"
 cyber.1030.name: "Souvenirs illicites"
 cyber.1030.desc: "Avec autant d'implants capables de contrôler les expériences sensorielles et émotionnelles, les individus améliorés se sont tournés vers des événements de la vie virtuelle pour s'évader et se divertir. Si les artistes de l'engramme peuvent théoriquement stimuler n'importe quelle émotion, ce n'est pas aussi simple en pratique.\n\nDes clubs d'engrammes mnésiques paient une fortune pour des expériences auto-enregistrées et riches en émotions, comme des mariages ou des rituels d'accouplement, mais aussi des suicides, des agressions et des meurtres. Cette tendance a entraîné une hausse de la criminalité, puisque les criminels s'enregistrent en train de commettre des délits et volent les implants de leur victime après une expérience traumatisante.\n\nComment devons-nous réagir face à ce nouveau phénomène ?"
 cyber.1030.a: "Mettons un terme aux activités de ce secteur. C'est bien trop dangereux"
 cyber.1030.a.tt: "Les divertissements à partir d'engrammes seront interdits par la loi."
 cyber.1030.b: "Taxons la production"
 cyber.1030.b.tt: "Les divertissements à partir d'engrammes seront utilisés comme sources de revenus."
 cyber.1030.c: "Toute personne en possession de tels enregistrements sera envoyée derrière les barreaux"
 cyber.1030.c.tt: "Les forces de l'ordre s'attaqueront à ceux qui enregistrent des comportements criminels."
 cyber.1030.d: "C'est une pratique décadente. Soutenons-la"
 cyber.1030.d.tt: "Toute forme de plaisir sera approuvée par l'État."
 cyber.1030.e: "Une expérience de mort sans fin ? Comme c'est divin"
 cyber.1030.e.tt: "Cela permettra à nos prêtres de la mort de comprendre et de guider les expériences de nos initiés mortels."
 entertainment_crackdown: "Répression des engrammes"
 entertainment_crackdown_desc: "Les divertissements à partir d'engrammes enregistrés ont été rendus illégaux afin d'éviter tout éventuel comportement criminel."
 endorsed_entertainment: "Validation des engrammes"
 endorsed_entertainment_desc: "Les divertissements à partir d'engrammes enregistrés sont devenus monnaie courante après la validation de l'État."
 illicit_entertainment: "Engrammes illicites"
 illicit_entertainment_desc: "Les nouvelles lois relatives aux divertissements à partir d'engrammes ont limité l'intérêt général pour ce service."
 decadent_entertainment: "Engrammes décadents"
 decadent_entertainment_desc: "Nos citoyens se réjouissent de la joie extrême que leur procurent les divertissements à partir d'engrammes... du moins jusqu'à l'émergence d'une nouvelle mode."
 deadly_entertainment: "Engrammes mortels"
 deadly_entertainment_desc: "Nos prêtres de la mort peuvent désormais faire l'expérience de prendre la vie et de mourir, ce qui les aide à guider nos citoyens, et en particulier nos initiés mortels."
 cyber.1055.name: "Jeux d'espions"
 cyber.1055.desc: "Un élève officier de la marine a fait preuve d'une irresponsabilité totale en dévoilant des informations confidentielles. Grand amateur de simulateurs de combat en réseau, il a eu un différend avec d'autres joueurs au sujet de la vitesse angulaire des tourelles de nos destroyers.\n\nAfin d'étayer son propos, il a alors téléchargé plusieurs plans confidentiels de nos vaisseaux qui ont ensuite été diffusés sur tout le réseau galactique. Si le coupable a été arrêté à la suite de cet incident, des voix au sein du Conseil réclament une interdiction totale des jeux en ligne."
 cyber.1055.a: "Le moment était venu de moderniser notre flotte, de toute façon"
 cyber.1055.b: "Renforçons les mesures de sécurité de notre réseau"
 cyber.1055.c: "Le Conseil a raison : ces jeux doivent être interdits"
 cyber.1055.d: "Noyons ces informations dans des rapports contradictoires"
 cyber_breach_overcome: "Jeux d'espions : modernisation de la flotte"
 cyber_breach_overcome_desc: "Ce qui est fait est fait. Nous allons nous atteler à moderniser nos flottes, afin de rendre obsolètes les plans qui ont fuité."
 cyber_breach_forgive: "Jeux d'espions : renforcement de la sécurité"
 cyber_breach_forgive_desc: "Suite à la fuite d'informations, nous avons renforcé nos protocoles de sécurité. Cela dit, les joueurs ne représentent aucunement une menace pour la sécurité nationale. Il n'y a pas lieu d'en faire trop à cause d'une simple erreur."
 cyber_breach_ban: "Jeux d'espions : interdiction totale"
 cyber_breach_ban_desc: "En plus d'avoir renforcé notre sécurité opérationnelle, nous avons interdit les jeux en réseau."
 cyber.1055.leak.tt: "Chaque membre de la §YCommunauté galactique§! reçoit des renseignements §Ymilitaires§! §Hmoyens§! sur §Y[Root.GetName]§! pendant §Y720§! jours."
 cyber.1055.minorleak.tt: "Chaque membre de la §YCommunauté galactique§! reçoit des renseignements §Ymilitaires§! §Rlimités§! sur §Y[Root.GetName]§! pendant §Y360§! jours."
 has_tradition_subterfuge_tt: "Cette option est disponible car nous avons terminé l'arbre des traditions de §Ysubterfuge§!."
 cyber.1205.name: "Censure sensorielle"
 cyber.1205.desc: "La dernière génération de cyberware sensoriel permet à l'utilisateur de bloquer les sensations indésirables. Des odeurs intempestives aux images inconvenantes, l'utilisateur a la possibilité de tout atténuer, masquer, ou même supprimer totalement de sa perception. Les groupes les plus conservateurs de notre société s'inquiètent de plus en plus des effets d'une telle censure sur la conscience de nos citoyens."
 cyber.1205.a: "Nous devons faire face à la réalité de la vie"
 cyber.1205.b: "L'ignorance peut avoir du bon"
 cyber.1205.c: "La censure peut s'avérer risquée, contrairement aux retouches cosmétiques"
 cyber.1205.d: "Nous allons influencer leur perception"
 cyber_censure_truth: "Censure sensorielle interdite"
 cyber_censure_truth_desc: "Nos citoyens n'ont pas le droit d'appliquer des filtres de perception pour bloquer certains éléments de la vie réelle. Il faut savoir regarder la vérité en face."
 cyber_censure_total: "Censure sensorielle totale"
 cyber_censure_total_desc: "Si la réalité ne vous plaît pas, alors pourquoi ne pas bloquer les éléments indésirables ? Rien ne vous oblige à être témoin du crime, de la misère ou des préjugés."
 cyber_censure_partial: "Retouche sensorielle"
 cyber_censure_partial_desc: "Nous avons autorisé nos citoyens à nuancer leur perception grâce à leurs implants. Ils peuvent ainsi instiller toutes sortes de couleurs et d'effets pour égayer leur morne existence."
 cyber_censure_authoritarian: "Censure sensorielle sous l'impulsion de l'État"
 cyber_censure_authoritarian_desc: "Nous influençons la manière dont nos citoyens perçoivent la réalité. En bloquant les messages et les acteurs indésirables de la vie de nos fidèles citoyens, nous les préservons de ceux qui voudraient les détourner du droit chemin."
 cyber.1210.name: "Messages subliminaux"
 cyber.1210.desc: "Selon une nouvelle tendance en matière de publicité, des mouvements clandestins et des sociétés ambitieuses n'hésitent pas à implanter des messages furtifs dans le cyberware de l'utilisateur. Ainsi, des souvenirs factices, des réactions hormonales sélectives ou encore des suggestions de sommeil deviennent monnaie courante. Des acteurs politiques nous ont fait part de leur inquiétude à ce sujet et suggèrent une interdiction totale, ou au moins une régulation de ces messages intrusifs. "
 cyber.1210.a: "Nous ne tolérerons pas de telles pratiques"
 cyber.1210.b: "C'est astucieux ! Autorisons cette pratique"
 cyber.1210.c: "Autorisons cette pratique sous licence"
 cyber.1210.d: "Utilisons cette pratique pour propager la foi"
 cyber_subliminhack_banned: "Messages subliminaux interdits"
 cyber_subliminhack_banned_desc: "Nous avons interdit la pratique consistant à diffuser des messages subliminaux insidieux via le cyberware."
 cyber_subliminhack_allowed: "Messages subliminaux autorisés"
 cyber_subliminhack_allowed_desc: "Nous avons autorisé la pratique consistant à diffuser des messages subliminaux insidieux via le cyberware. Tous les coups sont permis sur le marché."
 cyber_subliminhack_licensed: "Messages subliminaux sous licence"
 cyber_subliminhack_licensed_desc: "Nous vendons des licences pour autoriser la pratique consistant à diffuser des messages subliminaux insidieux via le cyberware."
 cyber_subliminhack_hallowed: "Évangélisation subliminale"
 cyber_subliminhack_hallowed_desc: "Nous diffusons des messages subliminaux insidieux via le cyberware pour propager notre foi."
 cyber.1255.name: "Brèche de cybersécurité"
 cyber.1255.intro: "Plusieurs documents confidentiels ont récemment été téléchargés illégalement par un serveur à distance. Nos agents de sécurité sont catégoriques : tous les pare-feu principaux et secondaires sont intacts, et rien ne prouve pour l'instant que nous faisons face à une cyberattaque externe.\n\n"
 cyber.1255.gov.desc: "$cyber.1255.intro$Nous sommes arrivés à cette conclusion inévitable : compte tenu de la nature sensible des informations qui ont fuité, le coupable doit disposer d'un haut niveau d'accréditation."
 cyber.1255.hack.desc: "$cyber.1255.intro$Nous sommes arrivés à cette conclusion inévitable : cette fuite d'informations remet en question notre décision de proposer en libre accès des améliorations cybernétiques."
 cyber.1255.a: "Ouvrons une enquête"
 leak_investigation: "Enquête sur la fuite d'informations"
 leak_investigation_desc: "Afin de démasquer le coupable, nous devrons enquêter sur toutes les personnes dotées d'implants cybernétiques. Le processus risque d'être... intrusif."
 cyber.1260.name: "Neuromancie"
 cyber.1260.desc: "Nous avons terminé notre enquête sur la faille de cybersécurité.\n\nCertains agents améliorés et haut placés au sein du gouvernement ont été visés, et leur système neurologique piraté. Manipulés par des agents extérieurs et contraints d'agir contre leur gré, ces individus n'ont aucun souvenir des événements en question.\n\nBien que nous connaissions désormais la cause de la fuite, nous ne sommes toujours pas près de découvrir ce qui se cache derrière tout cela. Toutefois, en implantant discrètement des données erronées dans l'esprit des agents affectés, nous pourrons peut-être remonter à la source de la fuite."
 leak_distrust: "Des pantins parmi nous"
 leak_distrust_desc: "Comment nos citoyens pourraient-ils avoir confiance en nos dirigeants quand chacun d'entre nous est peut-être à la solde de l'ennemi ?"
 leader_trait_hacked: "Cyberpantin"
 leader_trait_hacked_desc: "Cette personnalité est compromise, et son système neurologique a été piraté par une source inconnue."
 hacked_leaders.tt: "Un certain nombre de dirigeants cyborgs ont acquis le trait §Y$leader_trait_hacked$§!."
 cyber.1265.name: "Pirates de l'esprit" #Playing on the word 'hijacker'
 cyber.1265.desc: "Nous les tenons.\n\nNous avons retrouvé les criminels à l'origine des cyberattaques sans précédent dont nous avons été victimes. N'ayant pas d'autre but que celui de semer le chaos, ces « pirates de l'esprit » autoproclamés ont réussi à contourner nos systèmes de sécurité avec une facilité déconcertante. Si les cerveaux du groupe sont déjà en détention, nous devons encore décider du sort des agents qui ont été compromis.\n\nLa solution la plus simple consiste à installer un pare-feu personnalisé autour des implants touchés. Il existe également une alternative plus propre mais plus risquée : le redémarrage matériel. En accédant à leurs fonctions cognitives de base, les individus en question pourraient être « éteints » de force pendant l'installation d'un nouveau système d'exploitation."
 cyber.1265.a: "Installons un pare-feu"
 cyber.1265.b: "Redémarrons ces agents"
 cyber.1265.c: "Ils nous tiennent. Installons un pare-feu"
 cyber.1270.name: "En plein renouveau"
 cyber.1270.desc: "Le redémarrage matériel de nos agents compromis a eu des conséquences inattendues : toute trace du piratage neurologique a été effacée, mais aussi une grande partie de l'expérience et des connaissances accumulées.\n\nMalgré cet incident, ces dirigeants font état d'un profond sentiment de renouveau, à la fois sur le plan professionnel que personnel. En nous forçant à prendre des mesures aussi radicales, les pirates nous ont peut-être involontairement rendu service."
 rebooted_leaders: "Retire tous les §Htraits négatifs§! des dirigeants ayant le trait §Y$leader_trait_hacked$§!.\nPour chaque trait retiré, perd §R300§! en expérience."
 leader_hack_resolution: "Vigilance accrue"
 cyber.1275.name: "Pare-feu neurologiques"
 cyber.1275.desc: "Nos esprits sont en sécurité.\n\nLes ingénieurs cérébraux ont réussi à mettre au point un pare-feu neurologique. Afin de garantir notre sécurité collective, le programme sera immédiatement installé chez tous les agents actuels et futurs. Bien que cela ait un impact négatif sur les fonctions cognitives de base de notre classe dirigeante, le projet nous a permis de mieux comprendre la science liée à la sécurité des données."
 cyber.1275.a: "La sécurité avant tout"
 leader_trait_firewalled: "Pare-feu neurologique"
 leader_trait_firewalled_desc: "Bien qu'ils soient à l'abri des cyberattaques, nos dirigeants apprennent moins efficacement."
 hacked_and_firewalled_leaders.tt: "Retire le trait §Y$leader_trait_hacked$§! et confère le trait §Y$leader_trait_firewalled$§! à tous les dirigeants cyborgs."
 #FINAL EVENT #
 #DEMOCRATIC
 cyber.1505.name: "Société 2.0"
 cyber.1505.desc.individualist: "Cette société a été bâtie sur un processus démocratique qu'il nous incombe de renforcer. Notre nouvelle technologie cybernétique nous permet de voter pour toutes les questions sociétales, qu'elles soient majeures ou non, offrant ainsi à chacun l'opportunité d'exprimer son point de vue. La richesse des données et les possibilités infinies qui en découlent dépassent l'imagination."
 cyber.1505.desc.collectivist: "Exprimer ouvertement son opinion aux autres §Y[Species.GetNamePlural]§! n'est pas chose aisée. Mais une fois passé le choc initial, un sentiment de confiance et de certitude s'installe à l'égard de notre environnement. Nous sommes alors conscients de ce que fait la personne à côté de nous, et vice versa. La communication se fait instantanément, muette et par la simple pensée. Afin de protéger cette clarté d'esprit, le cybercerveau a pour instruction de réprimer ses émotions, de peur qu'elles ne prennent le dessus sur ce qui est réellement important."
 cyber.1505.desc.neutral: "Malgré d'interminables consultations, de tours de scrutin et de débats animés, la nation reste indécise sur les questions relatives à la société cybernétique. À présent, les dirigeants doivent intervenir avant que le processus ne déclenche la controverse.\n\nNous pouvons profiter de cette occasion pour modifier notre cybernétique afin de servir le processus démocratique ou adopter une approche plus radicale où les citoyens partageraient leur opinion via leur cyberware. Dans ce cas, il faudrait que leur cybercerveau se débarrasse des émotions de base pour éviter que des idées spontanées ne viennent perturber leur environnement proche."
 cyber.1505.a: "Autorisons le vote en temps réel du cybercerveau"
 cyber.1505.a.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_individualist']\n$unlock_edict_legislative_chorus$"
 cyber.1505.b: "Relions les cybercerveaux pour partager les expériences"
 cyber.1505.b.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_collectivist']\n$unlock_edict_self_preservation_override$"
 cyber.1505.c: "$cyber_keep_auth_option$"
 cyber.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 cyber.1510.name: "Restructuration du système"
 cyber.1510.desc.individualist: "Il apparaît clairement que nos citoyens souhaitent se démarquer et se mesurer les uns aux autres. Nous répondrons à leur désir en encourageant ce comportement hyper-compétitif dans un système où le jeu est partout, promettant ainsi une mobilité sociale et autres petits gadgets en échange d'une productivité accrue."
 cyber.1510.desc.collectivist: "Le sentiment d'appartenance à une communauté est bien plus important que la mobilité sociale individuelle. Par conséquent, au lieu de miser sur la compétitivité, nous exploiterons tout le potentiel du cerveau augmenté en état de veille. Sa puissance de calcul est connectée sans fil à une station via une liaison montante cybernétique qui alimente le sujet en tâches de calcul tout au long de la phase de repos."
 cyber.1510.desc.neutral: "Nos sujets n'ont pas réussi à prendre position en faveur d'une société plus compétitive ou plus communautaire. Puisque nous sommes leurs supérieurs, c'est à nous de décider de la meilleure ligne de conduite à suivre.\n\nNous pouvons soit créer un système de jeu hautement compétitif dans lequel surpasser vos pairs pourrait propulser votre carrière, soit exploiter la puissance de calcul de l'ensemble de la communauté via une liaison montante cybernétique, afin de relier les cerveaux en veille à nos grappes de serveurs."
 cyber.1510.a: "Laissons-les se battre pour obtenir nos faveurs"
 cyber.1510.a.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_individualist']\n$unlock_edict_battle_royale$"
 cyber.1510.b: "Faisons-les travailler pendant leur sommeil"
 cyber.1510.b.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_collectivist']\n$unlock_edict_stately_acclaim$"
 cyber.1510.c: "$cyber_keep_auth_option$"
 cyber.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 cyber.1515.name: "Foule sous contrôle"
 cyber.1515.desc.individualist: "Les §Y[Species.GetNamePlural]§! adoptent un monde où les porteurs d'implants peuvent exprimer leur identité de façon innovante.\n\nMais cette indulgence n'est qu'une façade, car les algorithmes de surveillance améliorés situés à l'intérieur de l'implant contrôlent désormais tous les individus, détectant ainsi les pensées dissidentes dès l'instant où les synapses du cerveau se connectent."
 cyber.1515.desc.collectivist: "L'union fait la force et donne un nouvel élan face à l'adversité. Tous les §Y[Species.GetNamePlural]§! cybernétiques se battent ensemble pour un avenir meilleur et comptent sur leur prochain pour en faire de même.\n\nNos citoyens peuvent avoir la certitude que la personnalité rayonnante et la volonté de fer §Y[Root.Owner.GetDuDelaDelDir][Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetName]§! les aideront à avancer."
 cyber.1515.desc.neutral: "Tandis que le peuple continue d'hésiter à la croisée des chemins, notre §Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetName]§! doit profiter de cette occasion unique offerte par les améliorations pour prendre sa décision.\n\nFaut-il laisser certaines libertés personnelles à nos citoyens tout en les surveillant grâce à leurs implants, ou les laisser sous l'influence de la volonté et de la personnalité rayonnante de leur dirigeant ?"
 cyber.1515.a: "Modérons leur liberté sous notre surveillance"
 cyber.1515.a.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_individualist']\n$unlock_edict_self_indictment_protocol$"
 cyber.1515.b: "Notre dirigeant nous montrera la voie à suivre"
 cyber.1515.b.official.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_official']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.commander.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_commander']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.scientist.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_scientist']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.vacant.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_vacant']\n$unlock_edict_love_letter_virus$"
 cyber.1515.c: "$cyber_keep_auth_option$"
 cyber.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"
 #IMPERIAL
 cyber.1520.name: "Vive l'Empire !"
 cyber.1520.desc.individualist: "Le siège du pouvoir impérial nous a ordonné de concentrer nos efforts sur la dynastie elle-même. Une §Y$r_the_rulerchip$§! spéciale sera implantée chez tous les futurs dirigeants afin d'enregistrer leurs expériences en tant que [root.GetRulerTitle] de §Y[root.GetName]§!. Cette puce-relique sera ensuite transférée à leur héritier après leur décès.\n\nPuisque la $r_the_rulerchip$ se transmet de génération en génération, sa vaste bibliothèque d'expériences deviendra l'enregistrement fondateur de notre société. Nous pourrons aussi exploiter les connaissances de nos citoyens au profit de nos dirigeants."
 cyber.1520.desc.collectivist: "Afin d'accorder un répit à nos citoyens impériaux après tout le travail accompli, un grand §Y$building_cyberdome$§! devra être construit sur §Y[root.Capital.GetName]§!. Il permettra d'accueillir en grande pompe les nouveaux types de cybersports, dans lesquels des athlètes améliorés se disputeront nos faveurs et notre admiration. Assister à une compétition aussi disputée stimulera certainement les spectateurs et leur admiration pour les §Y[root.GetSpeciesNamePlural]§!.\n\nDe plus, ces spectacles pourront être neurodiffusés directement dans les cybercerveaux, ce qui incitera les amateurs de sensations fortes à se rendre sur [root.Capital.GetName] pour assister à ces événements au plus proche de l'action."
 cyber.1520.desc.neutral: "Les progrès de notre société dans le domaine de la cybernétique nous confrontent à un véritable dilemme : concentrer nos efforts au profit de quelques-uns ou du plus grand nombre ? §Y[root.GetName]§! y trouverait son intérêt dans les deux cas.\n\nDévelopper un implant spécialisé nous permettrait de transférer les expériences [root.GetDuDelaDelDir][root.GetRulerTitle] à son héritier. Mettre l'accent sur les cybersports améliorés et les technologies de diffusion nous permettrait d'organiser de superbes événements sur [root.Capital.GetName], notre capitale."
 cyber.1520.a: "Préservons le savoir impérial"
 cyber.1520.a.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_individualist']\n$create_relic_the_rulerchip$\n$unlock_edict_levied_experience$"
 cyber.1520.b: "Accueillons et diffusons des cybersports dans la capitale"
 cyber.1520.b.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_collectivist']\n$unlock_building_cyberdome$\n$unlock_edict_neurocasted_spectacles$"
 cyber.1520.c: "$cyber_keep_auth_option$"
 cyber.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 cyber.1525.name: "Implants Inc."
 cyber.1525.desc.individualist: "Les groupes de discussion des §Y[Species.GetNamePlural]§! réagissent positivement à leurs nouveaux implants oculaires. Notre service d'analyse suggère une hausse importante de l'efficacité des publicités et des ventes de l'ensemble de notre portfolio. Cela démontre tout le potentiel immense du lancement de produit à venir.\n\nL'ère de la cybernétique a sonné, et nous sommes entièrement disposés à en tirer profit grâce à une stratégie corporative renouvelée."
 cyber.1525.desc.collectivist: "La population est favorable à notre engagement en faveur d'un développement personnel holistique.\n\nLa prise en charge des préoccupations socio-économiques est conforme à notre vision corporative, garantissant la mise en place régulière de nouvelles générations d'implants incontournables."
 cyber.1525.desc.neutral: "Compte tenu des profonds changements apportés par la technologie cybernétique à la société, il n'est peut-être pas étonnant de constater que le consommateur moyen ne sache pas quelle décision prendre. La différenciation individuelle sera-t-elle bientôt la norme, ou devons-nous nous concentrer sur le bien-être collectif ?\n\nCette décision essentielle et sans précédent aura sans doute des conséquences importantes, mais l'indécision est la mort du profit. Il faut choisir."
 cyber.1525.a: "Lançons des implants avec des publicités"
 cyber.1525.a.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_individualist']\n$unlock_edict_customer_insights$"
 cyber.1525.b: "Autorisons les améliorations d'implants généralisées"
 cyber.1525.b.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_collectivist']\n$unlock_edict_rolling_updates$\n$unlock_agenda_augmentation_product_launch$"
 cyber.1525.c: "$cyber_keep_auth_option$"
 cyber.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"
 ### SOCIETAL EFFECTS EVENT CHAIN END ###
 ### CYBERIZATION SITUATION START - HIVE VARIANT ###
 situation_cyberization_hive: "Cybernétisation"
 situation_cyberization_hive_type: "Situation d'ascension"
 situation_cyberization_hive_desc: "Une conscience collective a besoin de corps supérieurs. Grâce aux implants cybernétiques, nos drones peuvent être perfectionnés, optimisés, transformés.\nLe moment est venu de transcender les limites de notre biologie.\n\n§YPops qui recevront des implants le mois prochain§! : §G[From.GetCyberPopsPerMonth]§!"
 situation_cyberization_hive_monthly_change_tooltip: "Nos corps deviendront cybernétiques, fusion parfaite de l'organique et de la machine."
 situation_cyberization_hive_outcome: "Une population cybernétique."
 stage_cyberization_hive_effects: "Nous devons mettre au point des implants cybernétiques, et les installer pour nous transformer."
 cyber.hive_government_shift.tt: "Influe sur l'§Yévolution de la conscience cybernétique§! en cours."
 situation_cyberization_culled_drones_desc: "Élimination des drones défectueux"
 situation_cyberization_researching_alternatives_desc: "Recherche d'implants alternatifs"
 situation_cyberization_hive_triggered_modifier: "Modificateur de situation §Y$situation_cyberization_hive$§! ajouté :\n"
 triggered_opinion_hive_integrated: "Conscience intégrée"
 cyber_hive_imperfect_drones: "Drones imparfaits"
 cyber_hive_imperfect_drones_desc: "Tout le monde a son utilité."
 cyber_hive_recycling_implants: "Recyclage d'implants"
 cyber_hive_recycling_implants_desc: "Des anciens implants pour de nouveaux drones."
 cyber_hive_recycling_everything: "Redoutable efficacité"
 cyber_hive_recycling_everything_desc: "Rien n'est sacré. Rien n'est perdu."
 cyber_hive_cyber_babies: "Jeunesse cybernétique"
 cyber_hive_cyber_babies_desc: "Les nouveaux drones sont équipés d'implants lors de leur génération."
 cyber_hive_no_cyber_babies: "Cybernétisation progressive"
 cyber_hive_no_cyber_babies_desc: "Les implants sont installés progressivement, ce qui réduit les dommages subis par les drones sous-développés."
 cyber_hive_no_individual_drones: "Interdiction de l'individualité"
 cyber_hive_no_individual_drones_desc: "Toute identification personnelle est strictement interdite."
 cyber_hive_individual_drones: "Expression de soi"
 cyber_hive_individual_drones_desc: "Les drones peuvent exprimer leur individualité."
 cyber_hive_individual_leader_drones: "Expression de soi restreinte"
 cyber_hive_individual_leader_drones_desc: "Nous faisons un cadeau à nos meilleurs drones : le sentiment d'identité."
 ### AUTHORITIES ###
 #VOLITIONAL
 auth_cyber_hive_volitional: "Conscience délibérée"
 auth_cyber_hive_volitional_desc: "Chaque drone est un individu. Chaque pensée, une perspective nouvelle à examiner pour le collectif. D'innombrables esprits forment une Conscience supérieure à la somme de toutes ses parties."
 concept_auth_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
 gov_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
 gov_cyber_hive_volitional_desc: "$auth_cyber_hive_volitional_desc$"
 #INTEGRATED
 auth_cyber_hive_integrated: "Conscience intégrée"
 auth_cyber_hive_integrated_desc: "Chaque déviation a été corrigée, chaque anomalie résorbée, chaque désunion rectifiée. Le contrôle de la conscience collective est absolu : une conscience partagée et une infinité de corps pour exécuter sa volonté."
 concept_auth_cyber_hive_integrated: "$auth_cyber_hive_integrated$"
 gov_cyber_hive_integrated: "$auth_cyber_hive_integrated$"
 gov_cyber_hive_integrated_desc: "$auth_cyber_hive_integrated_desc$"
 ### EDICTS ###
 edict_hive_mind_outreach: "Portée de la conscience collective"
 edict_hive_mind_outreach_desc: "Par sa volonté, un esprit déterminé est plus rapide que la vitesse de la lumière."
 concept_edict_hive_mind_outreach: "$edict_hive_mind_outreach$"
 edict_hive_hyper_stimulants: "Stimulants surpuissants"
 edict_hive_hyper_stimulants_desc: "Les implants cybernétiques administrent automatiquement des stimulants à nos drones, augmentant ainsi leurs performances."
 concept_edict_hive_hyper_stimulants: "$edict_hive_hyper_stimulants$"
 edict_hive_mega_construction: "Mégaconstructions intégrées"
 edict_hive_mega_construction_desc: "Ce décret alloue davantage de ressources à notre programme de méga-ingénierie, accélérant ainsi la construction de structures galactiques."
 concept_edict_hive_mega_construction: "$edict_hive_mega_construction$"
 #CYBERIZATION STAGE 1
 cyber.2100.name: "Plusieurs corps. Un seul but."
 cyber.2100.desc: "En réfléchissant à la nature des améliorations, nous explorons nos propres aspirations.\n\nLa cybernétisation est avant tout un moyen et non une fin en soi. Un moyen d'optimiser nos corps pour une meilleure exécution de notre volonté. Les améliorations existent sous une infinité de formes, chacune étant source de nouvelles forces, mais aussi de nouveaux besoins. Les membres mécaniques sont plus lourds, les cybercerveaux exigent davantage d'énergie, et les composants nécessitent un entretien constant en raison de leur fragilité. Dans notre quête de la perfection, nous devons faire des choix.\n\nQuel est le centre de notre ambition, le seul et unique but qui exige de transcender les limites de la [Owner.Species.GetFleshTypeCyberCreed] pour tendre des [Root.GetSpeciesHandNamePlural] métalliques vers le ciel ?"
 cyber.2100.a: "La compréhension"
 cyber.2100.a.tt: "Orientons nos recherches pour rendre nos drones plus intelligents."
 cyber.2100.b: "La domination"
 cyber.2100.b.tt: "Orientons nos recherches pour faire de nos drones des instruments de guerre."
 cyber.2100.c: "L'abondance"
 cyber.2100.c.tt: "Orientons nos recherches pour rendre nos drones plus productifs."
 #CYBERIZATION STAGE 2
 cyber.2200.name: "Un objectif : l'amélioration"
 cyber.2200.desc: "À mesure que nos réflexions donnent naissance à des projets concrets, un besoin pressant se fait sentir. Celui d'un espace dédié à l'expérimentation, où les prototypes cybernétiques pourront être testés et fabriqués.\n\nNous devons bâtir un $building_augmentation_center$, où nous pourrons désassembler notre [Owner.Species.GetFleshTypeCyberCreed] et la recomposer à partir du métal et de nos rêves."
 cyber.2200.a: "Il est temps de commencer à bâtir notre avenir."
 cyber.2200.a.tt: "§RAction requise :§!\nConstruire un centre d'amélioration pour relancer la situation §Y$situation_cyberization_hive$§!.\n\nChaque centre d'amélioration fournit §G+200§! emplois d'£job_augmentor£améliorateurs.\n\n$job_augmentor_drone_research_effect_desc$"
 cyber.2205.name: "Plusieurs prototypes. Un seul choix."
 cyber.2205.desc: "Nos recherches en cybernétique ont donné naissance à de nombreux prototypes de cyborgs dignes d'intérêt. Les résultats préliminaires montrent que certains prototypes excellent dans le domaine physique, tandis que d'autres sont plus adaptés au travail de précision. Chacun d'entre eux possède ses forces et ses limites, sans qu'aucun ne se montre clairement supérieur.\n\nUne idée audacieuse nous vient alors à l'esprit : peut-être pourrions-nous diversifier nos drones ? Modifier notre corps de différentes manières en fonction de son rôle à jouer ? Nous ne serions alors plus tous identiques, une perspective que nous avons encore du mal à réaliser. Mais notre harmonie est peut-être le prix à payer pour obtenir ce gain d'efficacité."
 cyber.2205.a: "Sélectionnons plusieurs prototypes différents"
 cyber.2205.b: "Sélectionnons un seul prototype bien équilibré"
 cyber.2220.name: "L'un d'entre nous ?"
 cyber.2220.desc: "L'assemblage des drones produit parfois des corps défectueux. Les drones imparfaits sont généralement éliminés, mais grâce aux implants cybernétiques, ils pourraient être autorisés à rejoindre nos rangs. Augmenter notre nombre est une bonne idée, mais les drones défectueux nécessitent des implants personnalisés en fonction de la gravité de leurs imperfections. Notre Conscience se développerait plus rapidement, mais elle deviendrait aussi plus... imparfaite."
 cyber.2220.a: "L'union fait la force"
 cyber.2220.b: "Une Conscience imparfaite est une Conscience affaiblie"
 cyber.2260.name: "Un problème invisible"
 cyber.2260.desc: "Un petit pourcentage de nos sujets d'étude souffre de réactions négatives aux améliorations. Leur corps rejette les implants, entraînant ainsi des effets secondaires mortellement dangereux. La cause semble être une anomalie génétique que nous n'avions pas remarquée jusqu'alors. D'après nos premiers calculs, ce problème touche environ 5 % de nos drones.\n\nMaintenant que nous avons identifié le problème, nous pouvons surveiller nos drones pour l'éviter, mais nous ne savons que faire des éléments affectés."
 cyber.2260.a: "Éliminons les drones défectueux"
 cyber.2260.a.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization_hive$§! pendant §Y1§! an : §G+20%§!"
 cyber.2260.b: "Équipons les drones défectueux d'implants limités"
 cyber.2260.b.tt: "Pendant la cybernétisation, 5% de la population obtiennent le trait §Y$trait_limited_cybernetic$§! au lieu du trait §Y$trait_cybernetic$§!."
 cyber.2260.c: "Recherchons des implants alternatifs"
 cyber.2260.c.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization_hive$§! pendant §Y5§! ans : §R-50%§!"
 #CYBERIZATION STAGE 3
 cyber.2300.name: "Plusieurs drones. Un seul plan."
 cyber.2300.desc: "Nos prototypes de cyborgs ont été approuvés. Le §Y$building_augmentation_center$§! a été construit. Notre plan est prêt, mais nous devons encore finaliser la logistique de notre transformation.\n\nNous pourrions ordonner à tous nos drones de se rendre dans un $building_augmentation_center$ pour y suivre la procédure, et ainsi suspendre leurs activités quotidiennes. Ce processus serait très rapide, mais nous laisserions nos usines à l'abandon pendant ce temps. L'autre solution consisterait à travailler en dehors des horaires d'activités de nos drones et de les transformer en cyborgs pendant leurs périodes de repos obligatoires, afin de ne pas affecter leurs activités. C'est un processus plus lent, mais aussi plus pratique."
 cyber.2300.shared.tt: "$job_augmentor_drone_assembly_effect_desc$\n\nLa vitesse d'amélioration dépend de l'approche de la situation et du nombre de bâtiments : $building_augmentation_center$."
 cyber.2300.a: "La cybernétisation doit être notre priorité"
 cyber.2300.a.tt: "Pops cybernétisées par mois : §G+200§!\n$situation_cyberization_hive_triggered_modifier$Ressources mensuelles : §R-5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2300.b: "N'interrompez pas notre routine"
 cyber.2300.b.tt: "Pops cybernétisées par mois : §R-100§!\n$situation_cyberization_hive_triggered_modifier$£unity£Unité mensuelle : §G+5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2320.name: "La crainte de la diversité"
 cyber.2320.desc: "Les empires constitués de plusieurs entités singulières nous observent avec méfiance, craignant notre pluralité. Grâce aux implants cybernétiques, nous pourrions donner à nos émissaires des personnalités et des visages bien distincts, pour une apparence moins homogène.\n\nC'est un effort qu'apprécieraient les désunis. Ils pourraient même commencer à... s'identifier à nous. À nous considérer comme leurs semblables."
 cyber.2320.a: "C'est répugnant"
 cyber.2320.b: "C'est un noble sacrifice"
 cyber.2320.b.tt: "Redorons l'image que les empires sans conscience collective se font de nous."
 cyber.2320.c: "Rendons nos émissaires encore plus identiques"
 cyber.2320.c.tt: "Écornons l'image que les empires sans conscience collective se font de nous."
 cyber.2360.name: "Une population, deux groupes"
 cyber.2360.desc: "La cybernétisation de notre Conscience se déroule sans encombre. Une partie de nos citoyens porte désormais des implants cybernétiques, tandis que d'autres sont encore 100% biologiques. C'est la première fois que nous constatons de telles différences entre nous. Les drones sont désormais capables de s'identifier comme faisant partie de l'un ou l'autre groupe, et cette distinction ne fait que renforcer leur sens de l'individualité.\n\nCertains drones ont commencé à se parer de petits accessoires ou à peindre des symboles sur leurs implants pour se différencier les uns des autres. C'est un développement intrigant et inquiétant à la fois."
 cyber.2360.a: "Encourageons ce développement"
 cyber.2360.b: "Interdisons les marques d'identification personnelle"
 cyber.2360.c: "Limitons les symboles individuels aux dirigeants"
 #CYBERIZATION STAGE 4
 cyber.2400.name: "Plusieurs pensées. Un seul cerveau."
 cyber.2400.desc: "L'installation d'implants neuronaux dans nos drones a conduit à un résultat inattendu : puisque leur cerveau est désormais partiellement cybernétique, ils peuvent développer des pensées personnelles, séparées de notre conscience principale.\n\nNous pourrions développer cette technologie en améliorant la capacité de nos drones à penser de manière autonome."
 cyber.2400.a: "Laissons nos drones penser par eux-mêmes"
 cyber.2400.b: "L'individualité constitue une menace pour notre unité"
 cyber.2420.name: "Une seule fin pour tous"
 cyber.2420.desc: "Les implants cybernétiques compliquent la logistique de la mort.\n\nEn retirant les implants des drones décédés, nous pourrions réutiliser cette technologie et ainsi réduire le gaspillage. Nous devrions alors revoir tout notre processus d'élimination des déchets, en échange d'un coût considérable en ressources."
 cyber.2420.a: "Recyclons les implants"
 cyber.2420.b: "Le coût est bien trop élevé"
 cyber.2420.c: "Recyclons les implants... et les corps"
 cyber.2460.name: "Des implants à vie"
 cyber.2460.desc: "Le processus de cybernétisation de notre population existante suit son cours, mais nous devons élaborer un plan pour les générations futures.\n\nGrâce à notre technologie, nous pouvons équiper nos [owner.Species.GetSpawnNamePlural] d'implants cybernétiques avant même leur naissance, afin de créer une espèce réellement cybernétique. Ce serait une solution rapide, facile et efficace. En revanche, les recherches préliminaires montrent que l'installation d'implants dès le plus jeune âge pourrait provoquer une dissociation, une psychose, des tremblements, et toutes sortes de troubles du développement."
 cyber.2460.a: "Le métal est plus fort que la [Owner.Species.GetFleshTypeCyberCreed]"
 cyber.2460.b: "Fixons un âge minimum avant la cybernétisation"
 #CYBERIZATION FINISHED
 cyber.2004.name: "Plusieurs drones. Une seule volonté ?"
 cyber.2004.desc: "La transformation est terminée. Les implants cybernétiques ont été testés, élaborés, peaufinés, optimisés et installés, afin de transformer notre corps en une version perfectionnée de lui-même."
 cyber.2004.desc.volitional: "$cyber.2004.desc$\n\nNos drones sont maintenant davantage capables de penser de manière autonome, et une plus grande liberté entraîne de nouvelles possibilités."
 cyber.2004.desc.integrated: "$cyber.2004.desc$\n\nNos drones sont maintenant plus unis que jamais, leurs chaînes métalliques renforçant le lien de l'esprit."
 cyber.2004.desc.neutral: "$cyber.2004.desc$\n\nAu cours de ce processus, nous avons constaté des possibilités de changement. Notre union est forte, mais avoir des drones plus autonomes présente aussi ses avantages."
 cyber.2004.end: "À mesure que nos corps se transforment, notre conscience collective pourrait aussi évoluer."
 cyber.2004.a: "Devenons une Conscience délibérée"
 cyber.2004.a.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_volitional']\n$unlock_edict_tt$['concept_edict_hive_mind_outreach']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.b: "Devenons une Conscience intégrée"
 cyber.2004.b.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_integrated']\n$unlock_edict_tt$['concept_edict_hive_hyper_stimulants']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.c: "Il n'y a aucune raison de changer"
 cyber.2004.c.tt: "$cyber.21.a.end$\n$keep_auth_tt$ ['concept_auth_hive_mind']"
 ### Driven Assimilator Cyberization ###
 cyber.2010.name: "Objectif manifeste"
 cyber.2010.desc: "Avec l'avènement de la cybernétique avancée, nous pourrons atteindre notre plein potentiel. Jusqu'à présent, nous n'avons fait qu'effleurer la surface.\n\nNotre société se transformera à mesure que nous gagnons en expérience et que notre technologie s'améliore. L'assimilation totale de la vie intelligente est notre destin.\n\nToute résistance est vaine. Les esprits de la galaxie sont à notre disposition."
 cyber.2015.name: "Assimilateurs avancés"
 cyber.2015.desc: "En fusionnant avec la machine, notre population organique a atteint un état de quasi-perfection. Il est maintenant temps d'intégrer la cybernétique avancée dans le tissu même de notre civilisation.\n\nEn rationalisant l'acuité mentale de nos cyborgs, nous pourrions créer une « mémoire par agrégation » qui condensera toutes les expériences collectées pour améliorer la capacité logistique. Nous pourrions également permettre une plus grande variété de pensées et de réactions émotionnelles en créant un « choeur neural ».\n\nDans un cas comme dans l'autre, l'impact sur notre avenir sera grand."
 cyber.2015.a: "Agrégeons nos esprits"
 cyber.2015.a.tt: "$change_auth_tt$ ['concept_auth_memory_aggregator']\n\n§YLes ressources§! produites par l'assimilation de £pop£§Hpops organiques§! sont accrues\n\n$unlock_edict_tt$['concept_edict_aggregated_memory']"
 cyber.2015.b: "Que le choeur chante !"
