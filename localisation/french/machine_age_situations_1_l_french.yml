 #Traits
 trait_limited_cybernetic: "Cybernétique limitée"
 trait_limited_cybernetic_desc: "Cette espèce possède le minimum d'implants nécessaires pour être incluse dans une société cybernétique."
 leader_trait_limited_cyborg: "Cyborg limité"
 leader_trait_limited_cyborg_desc: "Cette personnalité possède le minimum d'implants nécessaires pour être incluse dans une société cybernétique."
 #Factions
 forced_cyberization_full: "Cybernétisation forcée"
 forced_cyberization_limited: "Cybernétisation limitée"
 #Static Modifiers
 borrowed_research: "Recherches subtilisées"
 borrowed_research_desc: "Les résultats de recherches volées ont été mis à contribution pour la cybernétisation, provoquant du mécontentement."
 researcher_media_relations: "Fonds de recherche réaffectés"
 researcher_media_relations_desc: "Les fonds de recherche ont été réaffectés aux relations publiques."
 bad_publicity: "Mauvaise publicité"
 bad_publicity_desc: "Un film à succès a détourné l'opinion publique des projets gouvernementaux."
 state_censorship: "Censure d'État"
 state_censorship_desc: "Le mauvais traitement des dissidents provoque le mécontentement."
 cyber_state_censorship: "Cybercensure"
 cyber_state_censorship_desc: "La censure d'un drame populaire a provoqué l'indignation du public à l'égard du pouvoir du gouvernement."
 cyber_victim_compensation: "Compensation des victimes"
 cyber_victim_compensation_desc: "Une compensation est versée aux familles des victimes d'améliorations expérimentales ratées."
 cyber_anti_faith: "La vérité dans l'acier"
 cyber_anti_faith_desc: "Nous avons rejeté les postulats sur la foi pour nous focaliser à 100% sur la cybernétisation."
 cyber_rulers_force_tests: "Cobayes d'élite forcés"
 cyber_rulers_force_tests_desc: "$cyber_everyone_force_tests_desc$"
 cyber_specialists_force_tests: "Cobayes spécialistes forcés"
 cyber_specialists_force_tests_desc: "$cyber_everyone_force_tests_desc$"
 cyber_workers_force_tests: "Cobayes ouvriers forcés"
 cyber_workers_force_tests_desc: "$cyber_everyone_force_tests_desc$"
 cyber_everyone_force_tests: "Cobayes forcés"
 cyber_everyone_force_tests_desc: "Imposer le recrutement forcé de cobayes nous permettra d'atteindre plus vite nos objectifs."
 cyber_birth_implants: "Jeunesse cybernétique"
 cyber_birth_implants_desc: "Il faut implanter la technologie cybernétique sur nos enfants le plus tôt possible."
 cyber_natural_childhood: "Enfance libre"
 cyber_natural_childhood_desc: "Notre jeunesse a le choix de vivre sans améliorations."
 AI_control: "Superviseurs I.A."
 AI_control_desc: "Des systèmes de réponse synaptique améliorés par intelligence artificielle guident les individus dans l'exécution de tâches productives."
 moderate_AI_control: "$AI_control$"
 moderate_AI_control_desc: "$AI_control_desc$"
 AI_forced_control: "Contrôleurs I.A."
 AI_forced_control_desc: "Les implants installés au plus près du centre décisionnel d'un cerveau permettent un contrôle de l'individu par le gouvernement accru."
 media_blockade: "Silence médiatique"
 media_blockade_desc: "La censure des médias a éteint toute critique visant les objectifs du gouvernement."
 helping_hand: "Coup de main"
 helping_hand_desc: "On n'a jamais assez de bras, surtout dans un laboratoire."
 armed_forces: "Forces armées"
 armed_forces_desc: "L'intégration de membres supplémentaires au sein de l'armée ne peut que la renforcer."
 state_handouts: "Allocations d'État"
 state_handouts_desc: "Le gouvernement s'engage à fournir des améliorations multimembres pour tous les citoyens à mobilité réduite."
 branching_out: "Libre-échange"
 branching_out_desc: "Les améliorations multimembres reviennent aux plus offrants."
 handy_workers: "Ouvriers habiles"
 handy_workers_desc: "La classe ouvrière a bénéficié de multiples coups de pouce pour accéder aux améliorations multimembres."
 luxury_limbs: "Ça coûte un bras"
 luxury_limbs_desc: "Le pouvoir a ses avantages : l'élite a un accès privilégié aux multimembres."
 murdered_martyrs: "Cobayes sacrifiés"
 murdered_martyrs_desc: "Nous proposons aux victimes d'améliorations ratées un sacrifice rituel pour mettre fin à leurs souffrances."
 artificial_pain_relief: "Antalgiques artificiels"
 artificial_pain_relief_desc: "L'industrie pharmaceutique met tout en oeuvre pour développer des antidouleurs pour les individus cybernétisés en souffrance."
 chained_experiments: "Expériences contraintes"
 chained_experiments_desc: "Seuls les citoyens ont le droit de se refuser aux tests."
 cyber_opposition: "Cyberopposition"
 cyber_opposition_desc: "Le refus du gouvernement de reconnaître ses torts a provoqué une violente opposition politique."
 cyber_event_bliss_commercial: "Mods d'extase commerciaux"
 cyber_event_bliss_commercial_desc: "Les implants vendus sur le marché contiennent une solution chimique offrant un sentiment de bonheur et de bien-être sur demande."
 cyber_event_bliss_underground: "Mods d'extase clandestins"
 cyber_event_bliss_underground_desc: "Ces implants non fiables se trouvent par des moyens détournés : ils offrent un sentiment de bonheur et de bien-être sur demande."
 cyber_event_bliss_regulate: "Mods d'extase réglementés"
 cyber_event_bliss_regulate_desc: "Le gouvernement se contente de réguler les mods de bien-être déjà existants sans produire les siens."
 cyber_event_worklife_name: "$cyber.615.name$"
 cyber_event_worklife_own: "Mémoire ouvrière libre"
 cyber_event_worklife_own_desc: "Les citoyens sont libres de conserver la totalité de leur mémoire en privé comme au travail."
 cyber_event_worklife_leave: "Mémoire ouvrière limitée"
 cyber_event_worklife_leave_desc: "Les citoyens sont dans l'obligation de compartimenter les souvenirs de leur vie professionnelle hors de leurs horaires d'activité afin d'éviter l'espionnage industriel."
 cyber_event_worklife_isolate: "Mémoire ouvrière séparée"
 cyber_event_worklife_isolate_desc: "Les citoyens sont dans l'obligation de compartimenter leurs souvenirs professionnels dans leur vie privée et leurs souvenirs privés sur leur lieu de travail afin d'éviter l'espionnage industriel et les conflits éthiques avec leurs employeurs."
 mod_pop_cyborg_specialist_happiness: "Bonheur des cyborgs spécialistes"
 cyber_event_parental_control: "Contrôle parental moteur total"
 cyber_event_parental_control_desc: "Les parents détiennent un contrôle total sur les capacités motrices de leurs enfants mineurs."
 cyber_event_parental_limited: "Contrôle parental moteur limité"
 cyber_event_parental_limited_desc: "Les parents détiennent un contrôle limité sur les capacités motrices de leurs enfants mineurs, comme leur vitesse de course ou leur volume de sortie."
 cyber_event_parental_enforcers: "Contrôle moteur sécuritaire"
 cyber_event_parental_enforcers_desc: "Malgré les objections des parents, le contrôle des capacités motrices des mineurs est réservé aux agents de sécurité."
 cyber_event_knowledge_engineering: "Transfert de savoir en ingénierie"
 cyber_event_knowledge_engineering_desc: "Les données scientifiques du domaine de l'ingénierie sont transférées mentalement en priorité par rapport aux autres domaines de recherche."
 cyber_event_knowledge_physics: "Transfert de savoir en physique"
 cyber_event_knowledge_physics_desc: "Les données scientifiques du domaine de la physique sont transférées mentalement en priorité par rapport aux autres domaines de recherche."
 cyber_event_knowledge_society: "Transfert de savoir en sociologie"
 cyber_event_knowledge_society_desc: "Les données scientifiques du domaine de la sociologie sont transférées mentalement en priorité par rapport aux autres domaines de recherche."
 cyber_implant_taxes: "Taxes sur les implants"
 cyber_implant_taxes_desc: "Impose une forte taxation sur les matériaux et la production d'implants cybernétiques."
 cyber_implant_taxes_tt: "Crédit énergétique mensuel : §G+5%§!\nCoût de développement des cyborgs : §R+10%§!"
 cyber_reformed_implant_taxes: "Taxes réformées sur les implants"
 cyber_reformed_implant_taxes_desc: "Une taxation réformée sur les matériaux et la production d'implants cybernétiques offre des profits à court terme."
 cyber_reformed_implant_taxes_tt: "Crédits énergétiques mensuels : §G+10%§!"
 cyber_market_standards: "Implants aux normes"
 cyber_market_standards_desc: "Les fabricants d'implants de mauvaise qualité devront revoir leurs produits sous peine d'être poursuivis en justice."
 cyber_implant_weapons: "Implants de défense"
 cyber_implant_weapons_desc: "Les citoyens ont le droit de posséder des implants de défense personnelle."
 cyber_implants_dismantled: "Démantèlement d'implants dangereux"
 cyber_implants_dismantled_desc: "Tout implant produit dans le but de blesser ou tuer sera confisqué puis recyclé en appareil plus utile."
 cyber_implant_hacks: "Piratage des implants"
 cyber_implant_hacks_desc: "Une fois en possession du code source d'implants cérébraux, des pirates pourraient manipuler la volonté d'individus."
 cyber_counter_hacking: "Contre-piratage d'implants"
 cyber_counter_hacking_desc: "Il est possible d'identifier les pirates d'implants grâce à des veilleurs de données postés sur nos réseaux de communication."
 cyber_protests: "Contestation du retard d'implants"
 cyber_protests_desc: "La population était habituée à un renouvellement régulier de ses améliorations ; le retard récemment annoncé l'a plongée dans un profond mécontentement."
 cyber_stop_protests: "Dispersion des manifestants"
 cyber_stop_protests_desc: "Les manifestations contre les retards de production de nos implants sont en cours de dispersion."
 #Policies
 policy_cyberization_standards: "Standards de cybernétisation"
 policy_cyberization_standards_desc: "Les implants à grande échelle sont nécessaires au progrès de notre société, mais les détracteurs de la cybernétisation totale ne souhaitent que des améliorations partielles."
 cyberization_standards_full_name: "Cybernétisation totale"
 cyberization_standards_full: "$cyberization_standards_full_name$"
 cyberization_standards_full_effect: "Les personnalités spiritualistes obtiennent le trait : §Y$leader_trait_cyborg$§!\nLes pops spiritualistes obtiennent le trait : §Y$trait_cybernetic$§!"
 cyberization_standards_full_desc: "Tout citoyen est dans l'obligation de se soumettre à une installation totale d'implants cybernétiques.\n\n§E$cyberization_standards_full_effect$§!"
 cyberization_standards_limited_name: "Cybernétisation limitée"
 cyberization_standards_limited: "$cyberization_standards_limited_name$"
 cyberization_standards_limited_effect: "Les personnalités spiritualistes obtiennent le trait : §Y$leader_trait_limited_cyborg$§!\nLes pops spiritualistes obtiennent le trait : §Y$trait_limited_cybernetic$§!"
 cyberization_standards_limited_desc: "Les citoyens opposés à l'amélioration peuvent choisir de se faire installer uniquement les implants cybernétiques indispensables.\n\n§E$cyberization_standards_limited_effect$§!"
 #CYBERIZATION STAGE 1
 cyber.100.name: "Un avenir maîtrisé" #Stage 1 - Start event
 cyber.100.desc.shared: "Les récentes avancées en matière d'implants cybernétiques offriront la possibilité de former la société de nos rêves. En supprimant toute faiblesse biologique, nous deviendrons plus forts, plus rapides, plus intelligents."
 cyber.100.desc.shared_unplugged: "Les récentes avancées en matière d'implants cybernétiques offriront la possibilité de former la société de nos rêves. En supprimant toute faiblesse et imperfection biologique de nos améliorations, nous deviendrons plus forts, plus rapides, plus intelligents."
 cyber.100.desc: "$cyber.100.desc.shared$\n\nLes corporations ont déjà établi des business plans et des estimations de vente, tandis que les membres du gouvernement défendent la distribution de cette technologie prometteuse par l'État."
 cyber.100.desc.unplugged: "$cyber.100.desc.shared_unplugged$\n\nLes corporations ont déjà établi des business plans et des estimations de vente, tandis que les membres du gouvernement défendent la distribution de cette technologie prometteuse par l'État."
 cyber.100.desc.megacorp: "$cyber.100.desc.shared$\n\nDes sous-traitants ont déjà établi des business plans et des estimations de vente pour la production d'implants, tandis que notre conseil d'administration fait tout pour conserver le monopole de cette technologie."
 cyber.100.desc.megacorp_unplugged: "$cyber.100.desc.shared_unplugged$\n\nDes sous-traitants ont déjà établi des business plans et des estimations de vente pour la production d'implants, tandis que notre conseil d'administration fait tout pour conserver le monopole de cette technologie."
 cyber.100.a: "Nous nationaliserons l'industrie des améliorations"
 cyber.100.a.megacorp: "Gardons la production chez nous"
 cyber.100.a.tt: "$situation_cyberization_triggered_modifier$$cyber_control_government_effects$"
 cyber.100.b: "Nous privatiserons la distribution"
 cyber.100.b.megacorp: "Transférons tout ça à nos filiales"
 cyber.100.b.tt: "$situation_cyberization_triggered_modifier$$cyber_control_corporate_effects$"
 cyber.105.name: "Un bien commun"
 cyber.105.desc: "Les améliorés dénoncent le manque d'accessibilité de nos modèles cybernétiques aux citoyens modestes.\n\nSelon eux, tout le monde pourrait fabriquer et réparer ses propres améliorations si les plans étaient relégués au domaine public et la réglementation plus laxiste."
 cyber.105.desc.megacorp: "Des sous-traitants indépendants dénoncent le manque d'accessibilité de nos modèles cybernétiques.\n\nSelon eux, la fabrication d'améliorations pourrait être bien meilleure si les plans et les brevets étaient publiés."
 cyber.105.a: "La régulation protège le consommateur"
 cyber.105.a.megacorp: "C'est notre propriété intellectuelle"
 cyber.105.a.tt: "Modificateur de situation §Y$situation_cyberization$§! inchangé."
 cyber.105.b: "Déréglementons l'industrie"
 cyber.105.b.crafters: "Laissons le peuple fabriquer ce qui lui chante"
 cyber.105.b.megacorp: "Fournissons des schémas en libre accès"
 cyber.105.b.gov.tt: "Modificateur de situation §Y$situation_cyberization$§! altéré :\n§GAjout de :§! $cyber_control_independent_effects$\n§RRetrait de :§! $cyber_control_government_effects$"
 cyber.105.b.cor.tt: "Modificateur de situation §Y$situation_cyberization$§! altéré :\n§GAjout de :§! $cyber_control_independent_effects$\n§RRetrait de :§! $cyber_control_corporate_effects$"
 #Stage 1 Opportunities - Research
 cyber.120.name: "Libération mentale"
 cyber.120.desc: "Une équipe de chercheurs a trouvé un moyen ingénieux d'intégrer des superviseurs I.A. dans nos implants neuronaux. Plus tard, ceux-ci pourront même être directement incorporés dans le cyberware.\n\nLes superviseurs détourneraient l'attention de nos citoyens des tâches oisives pour se consacrer à des exercices cérébraux plus exigeants. Nous perdrons un certain niveau d'autonomie, mais nous optimiserons de manière considérable notre productivité."
 cyber.120.a: "La productivité avant tout"
 cyber.120.a.spiritual: "C'est une véritable bénédiction"
 cyber.120.b: "Notre autonomie est trop capitale"
 cyber.120.b.spiritual: "Ne nous éloignons pas du droit chemin"
 cyber.120.c: "Pourquoi pas, s'il y a un moyen de la désactiver"
 cyber.120.d: "C'est la clé vers un contrôle total..."
 #Stage 1 Challenges - Research
 cyber.160.name: "Dissociation cybernétique"
 cyber.160.desc: "Une nouvelle série à succès a conquis le coeur du public :\n\ndans un monde où tout le monde porte des implants cybernétiques, on suit l'histoire d'un ouvrier ordinaire aux prises avec des troubles dissociatifs dus à son corps augmenté. Le drame présente une critique voilée de la cybernétisation totale et du risque inévitable d'effacer l'identité des [Owner.GetSpeciesNamePlural].\n\nCette popularité a entraîné une virulente opposition à nos projets, provoquant une baisse de 60% des sujets d'étude disponibles pour la pose d'implants."
 cyber.160.a: "Lançons une campagne de communication"
 cyber.160.b: "Renforçons les régulations sur les implants"
 cyber.160.c: "Ce n'est qu'une passade"
 cyber.160.d: "Censurons cette production"
 cyber.160.e: "Censurons les médias"
 #CYBERIZATION STAGE 2
 cyber.200.name: "Centres d'amélioration"
 cyber.200.desc.gov: "Après de longs débats politiques houleux, la production d'améliorations cybernétiques a été confiée à différents ministères du gouvernement. En partageant la responsabilité, ils ne manqueront pas de fournir un travail exemplaire.\n\nNéanmoins, il faut établir une stratégie. La communauté scientifique demande la construction d'un $building_augmentation_center$ pour établir son quartier général du développement cybernétique."
 cyber.200.desc.cor: "Nos rêves sont sur le point de se concrétiser, à la satisfaction générale des innombrables corporations au sein de notre territoire. Grâce à la montée de l'industrie cybernétique, la mise en vente de produits a été facilitée et accélérée.\n\nNéanmoins, il faut établir une stratégie. Les lobbyistes demandent la construction d'un $building_upload_center$ pour établir leur quartier général du développement cybernétique."
 cyber.200.desc.ind: "Nos réseaux de communications s'emballent, les idées de nouveaux modèles fusent, des améliorations neuro-synaptiques aux papilles gustatives cybernétiques ! La majorité d'entre elles semblent irréalisables ou absurdes, mais, par chance, quelques projets sortent du lot.\n\nNéanmoins, il faut établir une stratégie. La communauté scientifique demande la construction d'un $building_augmentation_center$ pour établir leur quartier général du développement cybernétique."
 cyber.200.a.gov: "Approuvons les permis de construire"
 cyber.200.a.cor: "C'est d'accord"
 cyber.200.a.ind: "Très bien"
 cyber.200.a.tt: "§RAction requise :§!\nConstruire un centre d'amélioration pour relancer la situation §Y$situation_cyberization$§!.\n\nChaque centre d'amélioration fournit §G+200§! emplois d'£job_augmentor£améliorateurs.\n\n$job_augmentor_research_effect_desc$"
 cyber.205.name: "Projets pilotes" #Stage 2 - Start event
 cyber.205.desc.shared: "Il est temps de lancer des projets pilotes de grande envergure. Réalisables uniquement sur des planètes possédant un $building_augmentation_center$, ils demanderont du soutien, mais nous offriront une production accrue."
 cyber.205.desc.gov: "Des expérimentations à petite échelle financées par le gouvernement ont confirmé un gain en productivité lors de l'ajout d'améliorations mécaniques.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.cor: "Des expérimentations à petite échelle menées sur des volontaires ont confirmé un gain en productivité lors de l'ajout d'améliorations mécaniques.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.ind: "Des améliorés ont confirmé un gain en productivité lors de l'ajout d'améliorations mécaniques.\n\n$cyber.205.desc.shared$"
 cyber.205.a: "Améliorons nos élites"
 cyber.205.a.tt: "Production de ressources des £pop_cat_ruler£dirigeants : §G+10%§! avec un $building_augmentation_center$"
 cyber.205.b: "Améliorons nos spécialistes"
 cyber.205.b.tt: "Production de ressources des £pop_cat_specialist£spécialistes : §G+10%§! avec un $building_augmentation_center$"
 cyber.205.c: "Améliorons nos ouvriers"
 cyber.205.c.tt: "Production de ressources des £pop_cat_worker£ouvriers : §G+10%§! avec un $building_augmentation_center$"
 cyber.205.d: "Améliorons tout le monde"
 cyber.205.d.tt: "Ressources des £job£§Hemplois§! : §G+5%§! avec un $building_augmentation_center$"
 cyber.210.name: "Développement parallèle"
 cyber.210.desc.gov.rival: "Les journalistes possèdent des éléments prouvant l'existence d'expériences sur des micropuces contrôlant la pensée, financées par l'État. À terme, ces dispositifs pourraient être installés en masse sur nos citoyens pour collecter des données personnelles et détecter toute menace à la sécurité."
 cyber.210.desc.cor.rival: "Des preuves ont surgi lors d'un procès, révélant l'existence d'expériences sur des implants de réalité augmentée organisées par les corporations. Le plan indique l'intégration indolore sur le nerf optique de l'utilisateur ainsi que tous les avantages dont il bénéficie, mais aussi la facilité avec laquelle une société pourrait détourner ces informations."
 cyber.210.desc.ind.rival: "Certains améliorés ont déjà remplacé quelques-uns de leurs membres par des alternatives mécaniques sommaires. Il n'y a aucun moyen d'assurer l'intégrité physique de ces individus et beaucoup redoutent l'utilisation d'implants non réglementés."
 cyber.210.a: "Ça pourrait nous être utile"
 cyber.210.a.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization$§! pendant §Y1§! an : §G+25%§!\n\n"
 cyber.210.b: "Il faut mettre un terme à tout ça"
 cyber.210.b.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization$§! pendant §Y1§! an : §R-25%§!"
 #Stage 2 Opportunities - Test Results and Rival Sector
 cyber.220.name: "Coordination multimembres"
 cyber.220.desc: "Une avancée exceptionnelle vient d'être faite dans le domaine des interfaces neuronales. Un amplificateur de signaux cérébraux offrirait aux utilisateurs un contrôle facilité, mais limité, à une multitude de membres artificiels. Plus tard, il pourrait être directement intégré à un cybercerveau, sans dispositif externe.\n\nLors des phases initiales de test, les sujets présentaient des résultats prometteurs en matière de dextérité et de motricité fine, ainsi qu'une meilleure aptitude au combat. Cependant, les coûts de production s'annoncent élevés, aussi nous allons devoir décider quel secteur sociétal aura le privilège d'en profiter le premier."
 cyber.220.a: "Nos scientifiques ont besoin de plus de bras"
 cyber.220.b: "Renforçons notre armée"
 cyber.220.c: "Donnons ces améliorations aux individus limités physiquement"
 cyber.220.d: "Ceux qui y mettront le prix en profiteront les premiers"
 cyber.220.e: "Armons la classe ouvrière"
 cyber.220.f: "Donnons cet avantage à l'élite"
 #Stage 2 Challenges - Test Results and Rival Sector
 cyber.260.name: "Se plier en quatre"
 cyber.260.desc: "Une expérience portant sur un module vertébral a tourné au drame. Le surplus de puissance généré par les moteurs de l'implant a provoqué des dégâts permanents au rachis de nombreux cobayes.\n\nDes images perturbantes du résultat se sont retrouvées entre les mains du grand public, ce qui a entraîné une pénurie soudaine de volontaires pour d'éventuelles expériences futures."
 cyber.260.a: "Arrêtons tous les tests tant que le problème n'est pas résolu"
 cyber.260.a.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization$§! pendant §Y6§! mois : §R-50%§!"
 cyber.260.b: "Dédommageons les familles des victimes"
 cyber.260.c: "Il nous faut des volontaires : employons la force s'il le faut"
 #CYBERIZATION STAGE 3
 cyber.300.name: "Lancement" #Stage 3 - Start event
 cyber.300.desc: "Nous avons fourni la totalité du territoire en implants mécaniques pour notre population. Dans chaque agglomération majeure, nous proposons ces appareils spécialement conçus par nos améliorateurs pour transformer de façon radicale notre forme biologique.\n\nÀ partir d'aujourd'hui, nous laissons nos imperfections dans le passé pour accueillir un avenir cybernétique."
 cyber.300.a: "Longue vie aux machines !"
 cyber.300.a.tt: "Les personnalités obtiennent le trait : §Y$leader_trait_cyborg$§!\nLes pops obtiennent le trait : §Y$trait_cybernetic$§!\n\n$job_augmentor_growth_effect_desc$\n\nLa vitesse d'amélioration dépend de l'approche de la situation et du nombre de bâtiments : $building_augmentation_center$."
 cyber.305.name: "Objecteurs cybernétiques" #Spiritualists are Cybernetic Objectors
 cyber.305.desc.shared: "En pratique, il leur manque les implants les plus basiques, ce qui les rend encore moins compatibles avec notre société ultra-connectée.\n\nNous pourrions les obliger à installer tous les implants recommandés pour les aider à mieux s'intégrer, mais il y aura forcément des protestations."
 cyber.305.desc: "Les groupes religieux opposés à la fusion machine et [Owner.Species.GetFleshTypeCyberCreed] se sont dissociés de notre effort de cybernétisation de la population. $cyber.305.desc.shared$"
 cyber.305.desc.spiritualist: "Les fidèles réticents à la fusion machine et [Owner.Species.GetFleshTypeCyberCreed] se sont dissociés de notre effort de cybernétisation de la population. $cyber.305.desc.shared$"
 cyber.305.desc.none: "La moralité de la fusion machine et [Owner.Species.GetFleshTypeCyberCreed] suscite depuis longtemps bon nombre de débats. Malheureusement, compte tenu de l'efficacité accrue qui résulte de la cybernétisation, ceux qui choisissent de ne pas y participer risquent d'être désavantagés.\n\nContraindre la population à s'équiper d'implants permettrait de s'assurer que personne n'est laissé pour compte, mais cela générerait sans aucun doute du ressentiment."
 cyber.305.desc.unplugged: "La moralité d'une nouvelle fusion machine et [Owner.Species.GetFleshTypeCyberCreed] suscite depuis longtemps bon nombre de débats. Toutefois, les améliorations que nous avons conçues ne sont plus soumises aux caprices de la machine qui nous a assimilés, ce qui les rend plus efficaces. Ceux qui choisissent de ne pas y participer risquent d'être désavantagés.\n\nContraindre la population à s'équiper d'implants permettrait de s'assurer que personne n'est laissé pour compte, mais cela générerait sans aucun doute du ressentiment."
 cyber.305.a: "Ils doivent évoluer"
 cyber.305.a.materialist: "La foi n'a pas sa place, nous parlons de l'avenir"
 cyber.305.a.spiritualist: "Les fidèles doivent évoluer"
 cyber.305.a.tt: "$cyberization_standards_full_effect$\n\nDonne accès à la politique : §Y$policy_cyberization_standards$§!\n"
 cyber.305.b: "Coupons la poire en deux"
 cyber.305.b.spiritualist: "Trouvons un terrain d'entente"
 cyber.305.b.tt: "$cyberization_standards_limited_effect$\n\nDonne accès à la politique : §Y$policy_cyberization_standards$§!\n"
 #Stage 3 Opportunities - Treatment of Non-Cyborgs
 cyber.320.name: "Potentiel infantile"
 cyber.320.birth.desc: "Depuis que nous maîtrisons la pose d'implants sur les nourrissons, nous nous heurtons à un dilemme. Ces améliorations néonatales ont le potentiel de transformer à jamais notre rapport à la technologie, offrant ainsi des capacités cybernétiques dès le plus jeune âge pour mener notre civilisation vers de nouveaux sommets.$cyber.320.end.desc$"
 cyber.320.metamorphosis.desc: "Nous avons récemment réalisé des percées révolutionnaires, nous permettant d'insérer des implants sur nos petits. Au stade de la métamorphose, nos larves absorbent naturellement les systèmes mécaniques. Des améliorations apportées au stade de la nymphe pourraient déployer tout leur potentiel cybernétique et propulser notre civilisation vers de nouveaux sommets.$cyber.320.end.desc$"
 cyber.320.lithoid.desc: "Depuis que nous maîtrisons la pose d'implants sur nos progénitures cristallisées, nous nous heurtons à un dilemme. Ces améliorations ont le potentiel d'offrir un lien naturel avec les minéraux métalliques, offrant ainsi des capacités cybernétiques dès le plus jeune âge pour mener notre civilisation vers de nouveaux sommets.$cyber.320.end.desc$"
 cyber.320.root.desc: "Depuis que nous maîtrisons la pose d'implants sur nos jeunes pousses, nous nous heurtons à un dilemme. Ces améliorations pourraient leur permettre de transmettre des signaux électriques grâce à un réseau d'hyphe amélioré, développant ainsi leurs capacités cybernétiques dès le plus jeune âge.$cyber.320.end.desc$"
 cyber.320.egg.desc: "Depuis que nous maîtrisons la pose d'implants sur nos petits, nous nous heurtons à un dilemme. Ces améliorations ont le potentiel de transformer à jamais leur rapport à la technologie, offrant ainsi des capacités cybernétiques dès le plus jeune âge pour mener notre civilisation vers de nouveaux sommets.$cyber.320.end.desc$"
 cyber.320.other.desc: "Depuis que nous maîtrisons la pose d'implants cybernétiques sur nos nourrissons, nous nous heurtons à un dilemme. Ces améliorations ont le potentiel de transformer à jamais notre rapport à la technologie, offrant ainsi des capacités cybernétiques dès le plus jeune âge pour mener notre civilisation vers de nouveaux sommets.$cyber.320.end.desc$"
 cyber.320.end.desc: "\n\nCependant, forger une dépendance cybernétique à un stade aussi précoce pourrait aussi provoquer la perte de notre instinct de survie à notre état naturel."
 cyber.320.a: "L'évolution est naturelle et inévitable"
 cyber.320.b: "Préservons une enfance naturelle"
 #Stage 3 Challenges - Treatment of Non-Cyborgs
 cyber.360.name: "Le revers de la conversion"
 cyber.360.desc: "Ces derniers temps, nous accumulons les plaintes d'individus déclarant regretter leur décision de subir des modifications corporelles lourdes. Remplacer le tronc cérébral par un substitut mécanique provoquerait une angoisse existentielle insoutenable, certains allant même jusqu'à parler d'un véritable supplice.\n\nEn plus de multiples demandes de dédommagement, le public attend notre opinion vis-à-vis de la responsabilité étatique."
 cyber.360.a: "Interdisons les modifications extrêmes"
 cyber.360.a.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization$§! pendant §Y6§! mois : §R-50%§!"
 cyber.360.b: "Le sacrifice est la seule façon d'arrêter leurs souffrances"
 cyber.360.c: "Distribuons des antidouleurs plus puissants"
 cyber.360.d: "Dénichons nos cobayes parmi les classes défavorisées"
 cyber.360.e: "Nous n'avons rien à nous reprocher"
 #CYBERIZATION STAGE 4
 cyber.405.name: "Taxes sur les implants" #Government rival
 cyber.405.desc: "Au vu des profits générés par la jeune industrie de l'amélioration, les membres du gouvernement tentent en vain de se tenir à jour des dernières innovations. Des taxes vagues ont été imposées à différentes étapes de la production, de l'extraction des ressources jusqu'à l'installation finale.\n\nLa bureaucratie et les dépenses engendrées ralentissent nos plans d'améliorations et de cybernétisation totale de la population."
 cyber.405.a: "Acceptons les taxes"
 cyber.405.b: "Abrogeons les taxes"
 cyber.405.b.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization$§! : §G+25%§!\n\n"
 cyber.405.c: "Réformons la taxation sur les améliorations"
 cyber.405.c.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization$§! pendant §Y1§! an : §R-10%§!"
 cyber.410.name: "Guerre judiciaire" #Government rival escalation
 cyber.410.desc: "Incapables d'accepter l'approbation du public concernant les implants cybernétiques, nos législateurs sont vent debout pour tenter de limiter les possibilités des améliorations.\n\nDénonçant notre « obsession morbide des implants », ils prétendent que chaque amélioration nous éloigne de notre véritable identité. Leur dernière proposition de loi inclut un pourcentage maximal d'améliorations par individu pour bénéficier d'une protection juridique. Il est vrai que nous risquons de devenir plus machine que [Owner.Species.GetName]."
 cyber.410.a: "Rejetons la proposition de loi"
 cyber.410.a.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization$§! pendant §Y1§! an : §G+25%§!"
 cyber.410.b: "Trouvons un compromis"
 cyber.410.b.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization$§! pendant §Y1§! an : §R-25%§!"
 cyber.415.name: "Sans garantie" #Corporate rival
 cyber.415.desc: "Dans la course effrénée aux profits, le marché de l'amélioration s'est retrouvé inondé d'implants bon marché et de mauvaise qualité. Certains fabricants ne proposent même pas de service après-vente au moment où une panne inévitable se produit.\n\nUne récente affaire a fait d'ailleurs parler d'elle : un célèbre comédien a été victime d'une défaillance de son implant cardiaque en plein spectacle. Le résultat s'est avéré... explosif."
 cyber.415.a: "Le marché finira par se réguler"
 cyber.415.a_industrial: "Rien de bien étonnant"
 cyber.415.a.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization$§! : §G+25%§!"
 cyber.415.b: "Nous devons protéger le consommateur"
 cyber.415.c: "Condamnons les pires marchands"
 cyber.415.c.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization$§! : §R-25%§!"
 cyber.420.name: "Modèles dangereux" #Corporate rival escalation
 cyber.420.desc: "Une nouvelle variété d'implants commence à gagner en popularité, des appareils non pas destinés à aider l'utilisateur, mais à blesser les autres : des pulvérisateurs à toxines, des nanoétrangleurs et des cyberbrouilleurs cérébraux envahissent nos rues.\n\nLes partisans de ces implants assurent qu'ils ont une utilité d'autodéfense, tandis que leurs détracteurs assurent que cette technologie ne génère rien de bon."
 cyber.420.a: "Laissons-les se défendre"
 cyber.420.b: "Ça devient trop dangereux"
 cyber.420.b.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization$§! : §R-25%§!"
 cyber.420.b_pacifist: "Démantelons tous les implants violents"
 cyber.420.b.tt_pacifist: "Les matériaux serviront pour des objets plus... raisonnables.\n\n"
 cyber.425.name: "Piratage du système de contrôle" #Independent rival
 cyber.425.desc: "Un groupuscule de pirates a lancé une attaque massive sur le logiciel source qui alimente tous les implants cybernétiques et s'en est emparé. Ils menacent de rendre le code public si nous n'acceptons pas leurs exigences.\n\nNous ne pensons pas qu'il s'agisse d'un canular. Si le code fuite, nous serons obligés de le réécrire entièrement, ce qui ralentirait considérablement nos efforts de cybernétisation."
 cyber.425.a: "Donnons-leur ce qu'ils demandent"
 cyber.425.b: "Réécrivons le logiciel"
 cyber.425.b.tt: "Vitesse d'avancée de la situation §Y$situation_cyberization$§! pendant §Y1§! an : §R-25%§!"
 cyber.425.c: "Qu'ils essaient, pour voir !"
 cyber.425.c.tt: "Heureusement, nous avons des pirates prêts à riposter"
 cyber.430.name: "Améliorations hasardeuses" #Independent rival escalation
 cyber.430.desc.demands: "Malgré le paiement d'une rançon faramineuse au groupuscule pirate, notre code source a été mis en ligne sur tous les réseaux d'information hier soir. La fuite était accompagnée d'une image indécente représentant notre incapacité à anticiper l'attaque.\n\nL'opinion publique a déjà tourné, et de nombreux consommateurs regrettent leurs implants."
 cyber.430.desc.protest: "La réécriture du logiciel de contrôle des implants a demandé beaucoup de temps et de main d'oeuvre, ce qui a ralenti la production.\n\nLes citoyens, toujours plus dépendants des améliorations, ont déjà commencé à manifester dans les rues pour dénoncer les retards de lancement."
 cyber.430.a: "Rassurons-les en annonçant des lancements imminents"
 cyber.430.b: "Ignorons-les"
 cyber.430.c.demands: "Lançons le contre-piratage"
 cyber.430.c.protest: "Dispersons les manifestants"
 cyber.21.name: "Un peuple amélioré" #Situation 1 - Last event
 cyber.21.desc: "Aujourd'hui est un grand jour pour notre société : nous pouvons désormais améliorer nos corps grâce à des appareils intégrés.\n\nLa route n'aura pas été sans ses difficultés, et la transition connaît ses obstacles, mais tous nos sacrifices en chemin nous auront offert un monde de possibilités infinies."
 cyber.21.a: "Nous serons plus forts"
 cyber.21.a.start: "Modificateur §Y$building_augmentation_center$§! ajouté :\n  "
 cyber.21.a.end: "Donne accès aux effets complets de l'arbre de traditions ['tradition_category:tradition_cybernetics']"
 cyber.21.a.gov.tt: "$cyber.21.a.start$$cyber_control_government_effects$\n$cyber.21.a.end$"
 cyber.21.a.cor.tt: "$cyber.21.a.start$$cyber_control_corporate_effects$\n$cyber.21.a.end$"
 cyber.21.a.ind.tt: "$cyber.21.a.start$$cyber_control_independent_effects$\n$cyber.21.a.end$"
 ### CYBERIZATION SITUATION END ###
 ### SOCIETAL EFFECTS EVENT CHAIN START ###
 futureshock_chain_title: "Le choc du futur"
 futureshock_chain_desc: "Nous ne nous contenterons pas de ce que la nature nous a donné ; nous voulons repousser les limites de notre biologie. La distribution à grande échelle d'implants a rencontré peu de déconvenues qu'il nous a été facile de résoudre. La majorité de la population est pleinement satisfaite des avantages de la cybernétique.\n\nNous nous dirigeons droit vers une ère formidable. Nous avons hâte de découvrir ce que l'avenir nous réserve."
 change_auth_tt: "Transmet l'autorité :"
 keep_auth_tt: "Conserve l'autorité :"
 cyber_keep_auth_option: "La cybernétisation ne modifie pas notre identité."
 unlock_edict_tt: "Permet le décret : "
 unlock_agenda_augmentation_product_launch: "Permet la priorité §Y$council_agenda_agenda_augmentation_product_launch_name$§!"
 ### AUTHORITIES ###
 #DEMOCRATIC
 #Cyber Democratic Individualist
 auth_cyber_democratic_individualist: "Concurrence démocratique"
 auth_cyber_democratic_individualist_desc: "Grâce aux protocoles de neurosécurité ultra avancés, nos citoyens peuvent voter sur des décisions législatives en temps réel.\n\nCe gouvernement démocratique organise régulièrement des élections, au cours desquelles tous les citoyens peuvent élire leurs représentants."
 auth_cyber_democratic_individualist_tt: "$auth_democratic_election_tt$\n$unlock_edict_legislative_chorus$"
 concept_auth_cyber_democratic_individualist: "$auth_cyber_democratic_individualist$"
 gov_cyber_democracy_individualist: "$auth_cyber_democratic_individualist$"
 gov_cyber_democracy_individualist_desc: "$auth_cyber_democratic_individualist_desc$"
 #Cyber Democratic Collectivist
 auth_cyber_democratic_collectivist: "Démocratie interconnectée"
