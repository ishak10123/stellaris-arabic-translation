 job_cyberdome_spectator_desc: "Les spectateurs assistent aux combats du cyberdôme. Grâce au cybercerveau, même les places les moins chères offrent un beau spectacle, mais activer la neurotransmission permet de vivre les combats des hyper-gladiateurs à la première personne."
