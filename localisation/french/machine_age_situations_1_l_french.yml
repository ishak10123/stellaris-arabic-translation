 #Buildings
 building_augmentation_center: "Centre d'amélioration"
 building_augmentation_center_desc: "À la fois centre commercial, centre d'opérations et atelier mécanique, c'est ici que sont réalisés les implants cybernétiques."
 building_augmentation_center_government_desc: "Dans les cliniques gouvernementales, les citoyens peuvent choisir les implants cybernétiques approuvés qu'ils souhaitent installer."
 building_augmentation_center_corporate_desc: "Un complexe tentaculaire destiné à répondre à tous les besoins cybernétiques, avec des assistants numériques et un luxueux spa post-chirurgical."
 building_augmentation_center_independent_desc: "Les cybermédecins clandestins peuvent installer des implants de toutes sortes, même si le patient finit par en payer les frais, et pas seulement avec des crédits."
 building_augmentation_center_hive_desc: "À la fois dépôt de ressources, centre d'opérations et atelier mécanique, c'est ici que sont réalisés les implants cybernétiques."
 building_augmentation_center_creed_desc: "Un sanctuaire d'améliorations transcendantes où les fidèles se rassemblent pour renaître grâce à la fusion divine."
