 #CORPORATE
 #Cyber Corporate Individualist
 auth_cyber_corporate_individualist: "Neurocommerce de firme"
 auth_cyber_corporate_individualist_desc: "Les outils obsolètes tels que les panneaux d'affichage ou les appareils portables ne captent plus l'attention du consommateur. Aujourd'hui, il nous est possible de sonder les cerveaux de nos cibles et de leur transmettre des messages spécifiques afin de les inciter à l'achat.\n\nCette innovation servirait également à contrôler les touristes sur nos bases stellaires et détecter toute activité pirate. Cependant, il y a des risques que des bloqueurs de signal apparaissent sur le marché noir."
