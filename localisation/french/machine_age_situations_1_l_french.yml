 #Cyber Imperial Individualist
 auth_cyber_imperial_individualist: "Puce impériale"
 auth_cyber_imperial_individualist_desc: "Le successeur nommé au trône impérial héritera du titre en plus d'un implant unique transmis d'âge en âge. Il stocke une immensité de données sur tous les dirigeants passés et leur sagesse accumulée sur l'art de gouverner. Une technologie similaire est utilisée par les citoyens : bien que moins complète, elle permet également de transmettre des savoirs aux générations futures."
