 #Cyber Corporate Collectivist
 auth_cyber_corporate_collectivist: "Kaizen de firme"
 auth_cyber_corporate_collectivist_desc: "Kaizen est une technique de gestion qui recherche l'amélioration continue. Elle a du sens dans notre environnement où règnent les logiciels et les idées. Une large gamme d'améliorations offre à notre clientèle un sentiment d'accomplissement personnel et l'ascension vers une synergie sociale.\n\nElles contiennent également une porte dérobée permettant de surveiller les utilisateurs connectés aux réseaux de bases stellaires. Cependant, la marge de bénéfice conséquente ponctionnée sur ces améliorations risque de faire germer un marché de la revente illégal."
