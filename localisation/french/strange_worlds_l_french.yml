l_french:
 ##THE WORLD IS BLEEDING
 strange_worlds.1.name: "Le monde saigne"
 strange_worlds.1.desc: "La surface de §Y[Root.GetName]§! réagit de manière inédite aux travaux de construction que nous menons. Une substance inconnue et visqueuse a commencé à suinter des fondations des bâtiments les plus importants.\n\nLe liquide est écarlate, gélatineux et très collant.\n\nNos [Owner.GetScientistPlural] sont impatients d'étudier cette sécrétion plus en détail. Pour l'instant, il ne s'agit que d'un petit inconvénient, mais mieux vaut assurer la sécurité des [Owner.GetColonistPlural]."
 strange_worlds.5.name: "Hémorragie abondante"
 strange_worlds.5.desc: "Nous avons reçu des rapports inquiétants de §Y[Root.GetName]§! au sujet de l'étrange liquide écarlate.\n\nLa substance devient incontrôlable, avec des quantités croissantes suintant dans les zones affectées.\n\nElle a toutefois ses avantages. Lorsqu'elle se solidifie, elle devient encore plus adhésive, formant un ciment naturel pouvant faciliter nos travaux de construction.\n\nCe qui est inquiétant, c'est qu'il est pratiquement impossible d'enlever la substance des [Owner.GetColonistPlural] qui ont été en contact avec elle. Soigner et étudier les individus concernés nous permettra de recueillir plus d'informations, mais ralentira les travaux."
 strange_worlds.5.a: "Soignons et étudions les individus concernés"
 strange_worlds.5.b: "Poursuivons les travaux"
 strange_worlds.15.name: "Montagne de sang"
 strange_worlds.15.desc: "Les travaux de construction ont bien avancé sur §Y[Root.GetName]§!, mais la substance n'apparaît plus seulement dans les fondations des bâtiments.\n\nDes fissures hémorragiques sont apparues en de nombreux endroits. Au départ, la substance n'agissait que sur les objets étrangers à [Root.GetName], mais elle se propage désormais partout.\n\nElle recouvre à présent une grande partie de la surface de [Root.GetName] et se solidifie rapidement en un épais coagulum minéral.\n\nAprès moults tâtonnements, nos ingénieurs ont trouvé un moyen de limiter les dégâts et de récolter efficacement la substance. Pour cela, il a fallu laisser de vastes étendues de terre à la merci de la sécrétion."
 strange_worlds.15.a: "Voilà qui est intéressant"
 strange_worlds.20.name: "Parasite"
 strange_worlds.20.desc: "Après un examen approfondi des ouvriers touchés sur §Y[Root.GetName]§!, nos scientifiques ont déterminé la cause du problème.\n\nCe qui apparaissait initialement comme une substance collante et gélatineuse est en fait un ensemble de micro-organismes parasites entretenant une relation symbiotique avec la planète. Ces parasites décomposent la matière organique présente sous la croûte de [Root.GetName] et la recyclent en nouveaux matériaux.\n\nLes perturbations causées par nos travaux ont bouleversé leur cycle de vie, les faisant réagir aux substances étrangères que nous avons introduites dans leur écosystème.\n\nNos scientifiques sont convaincus qu'avec le temps, nous trouverons un moyen de coexister harmonieusement avec ces organismes et d'intégrer leur biologie unique dans les processus de production de [Root.GetName]."
 strange_worlds.20.a: "Fascinant, continuons"
 strange_worlds.25.name: "Relation productive"
 strange_worlds.25.desc: "Grâce à des recherches approfondies, nos scientifiques ont créé une variante de l'espèce de micro-organismes parasites de §Y[Root.GetName]§!. Cette mutation considère nos matériaux comme inoffensifs, ce qui nous permet de reprendre nos travaux sans problème.\n\nAprès leur introduction dans la biosphère de la planète, nos parasites se sont vite intégrés.\n\nDe plus, après avoir modifié les effets de décomposition des micro-organismes, nous avons réussi à contrôler les propriétés adhésives de la substance, ce qui nous a permis d'accélérer les processus de production de la planète."
 strange_worlds.25.a.evopred: "Qu'ont-ils à nous apprendre ?"
 strange_worlds.30.name: "Comme par enchantement"
 strange_worlds.30.desc: "Alors que nous préparions notre projet d'expansion sur §Y[Root.GetName]§!, une énorme structure est apparue de nulle part.\n\nElle émet des ondes d'énergie très instables qui la font apparaître et disparaître par intermittence. Cela explique pourquoi elle n'a pas été détectée lors de nos premiers balayages de la zone.\n\nSur sa façade se trouvent des symboles inconnus ne correspondant à aucune langue que nous connaissons.\n\nLe rôle de cette structure est un mystère. Jusqu'à présent, elle n'a causé aucun dégât, mais elle entrave notre expansion."
 strange_worlds.30.a: "Enquêtons"
 strange_worlds.35.name: "Anomalies visuelles"
 strange_worlds.35.desc.no_cloak: "Après avoir étudié le bâtiment oscillant sur §Y[Root.GetName]§!, nous pensons qu'il plie ou déforme la lumière.$strange_worlds.35.desc.common_1$Nous comprenons mieux les propriétés du bâtiment, mais nous ne pouvons toujours pas entrer à l'intérieur. Nous ne savons même pas si c'est possible.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.cloak: "Après avoir étudié le bâtiment oscillant sur §Y[Root.GetName]§!, nous pensons qu'il déclenche par intermittence un effet occultant.$strange_worlds.35.desc.common_1$Nous comprenons mieux les effets occultants du bâtiment, mais nous ne pouvons toujours pas entrer à l'intérieur. Nous ne savons même pas si c'est possible.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.common_1: "\n\nUne activité géothermique exceptionnelle a été détectée dans le manteau silicaté de la planète. Cette puissante source d'énergie alimente la structure, mais sa production est soumise à de fortes fluctuations.\n\n"
 strange_worlds.35.desc.common_2: "\n\nSes murs extérieurs sont constitués de matériaux inconnus très réactifs. Les premières tentatives pour forcer l'entrée n'ont fait que déstabiliser davantage les champs magnétiques du bâtiment. Nous pourrions découper les murs pour en savoir plus, mais le risque de déstabilisation est considérable."
 strange_worlds.35.a: "Utilisons la force brute"
 strange_worlds.35.b: "Poursuivons les recherches depuis l'extérieur"
 strange_worlds.40.name: "Réaction en chaîne"
 strange_worlds.40.desc: "Les tentatives pour entrer de force dans la structure sur §Y[Root.GetName]§! se sont soldées par un désastre. Notre équipement a aggravé la déstabilisation des schémas énergétiques du bâtiment, provoquant une série de violentes explosions. La structure a été réduite en cendres.\n\nCette destruction accidentelle a toutefois révélé quelque chose d'inattendu : les ruines calcinées d'une colonie alien abandonnée dans une vallée voisine.\n\nLa structure semblait projeter un puissant champ d'occultation sur l'ancienne colonie. Nous ignorons pourquoi ils se cachaient, mais ils n'ont pas survécu malgré leurs efforts. Il ne reste rien d'intéressant sur le plan archéologique.\n\nLe fonctionnement de cette étrange technologie reste un mystère, mais cette expérience nous a permis d'acquérir de nouvelles connaissances. Nous allons réutiliser cette puissante source d'énergie géothermique pour notre propre colonie."
 strange_worlds.40.a: "Voilà une découverte intéressante !"
 strange_worlds.40.a_ct: "Bloqueur §YStructure oscillante§! déblayé"
 strange_worlds.45.name: "Centre de commandement"
 strange_worlds.45.desc.intro: "Une étude plus approfondie des curieux symboles sur les murs extérieurs de l'étrange structure que nous avons trouvée sur §Y[Root.GetName]§! a révélé qu'il s'agissait d'une sorte d'interface. En les manipulant, nous avons ouvert une porte cachée vers l'intérieur désolé du bâtiment, où se trouve une immense salle de commandement.\n\nNous ne savons pas exactement comment elle fonctionne, mais à force de tâtonnements, nous avons pu en comprendre les bases. La désactivation de la structure a révélé quelque chose d'inattendu : les ruines calcinées d'une colonie alien abandonnée dans une vallée voisine.\n\nLa structure semblait projeter un puissant champ d'occultation sur l'ancienne colonie. Nous ignorons pourquoi ils se cachaient, mais ils n'ont pas survécu malgré leurs efforts. Bien qu'il ne reste rien d'intéressant sur le plan archéologique, nos scientifiques ont fait bon usage de la salle de commandement."
 strange_worlds.45.desc.a: "$strange_worlds.45.desc.intro$\n\nNous pouvons désormais stabiliser et étendre la portée de l'étrange effet d'occultation pour couvrir toute la vallée. Cela augmentera considérablement la sécurité de notre colonie."
 strange_worlds.45.desc.b: "$strange_worlds.45.desc.intro$\n\nNous pouvons désormais stabiliser et étendre la portée du champ d'occultation pour protéger toute la vallée. En outre, notre connaissance des technologies de l'occultation s'est considérablement accrue."
 strange_worlds.45.a: "Voilà une découverte intéressante !"
 strange_worlds.55.name: "Nature électrique"
 strange_worlds.55.desc.intro: "Des herbivores géants ont commencé à apparaître en nombre et à perturber la production d'énergie de §Y[Root.GetName]§!. Ils pénètrent en groupe dans nos stations énergétiques et meurent électrocutés, tel un suicide collectif.\n\nIls sont très tenaces et franchissent les clôtures du réseau énergétique pour atteindre leur cible. Ce drôle de comportement entrave la production d'énergie.\n\n"
 strange_worlds.55.desc.outro: "L'espèce joue un rôle vital dans l'écosystème de la planète. Si ce phénomène se poursuit, elle s'éteindra."
 strange_worlds.55.desc.a: "$strange_worlds.55.desc.intro$Un effet inattendu est toutefois à noter : l'augmentation de la production de nourriture. Les [Owner.GetColonistPlural] ont découvert que la viande de ces créatures était un véritable délice.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.desc.b: "$strange_worlds.55.desc.intro$Il en résulte une augmentation de l'acquisition de biomasse, mais cela reste très gênant.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.a: "Étudions ce comportement"
 strange_worlds.60.name: "Physiologie catalytique"
 strange_worlds.60.desc: "Nous avons acquis de précieuses connaissances sur l'espèce animale suicidaire qui vit sur §Y[Root.GetName]§!.\n\nCes créatures gigantesques sont aveugles et utilisent l'écholocalisation pour s'orienter et se reconnaître entre elles. Nous en déduisons que notre réseau énergétique émet des sons qui les perturbent, ce qui expliquerait leur comportement agressif à l'égard de nos stations.\n\nNous avons également découvert que leurs enzymes digestives uniques peuvent servir de catalyseur dans le raffinage des métaux. Des tests préliminaires ont montré qu'elles seraient efficaces pour améliorer la production d'alliages.\n\nMalgré ces découvertes, nous sommes encore loin d'un retour à une production d'énergie normale. Nos scientifiques continuent d'étudier le problème."
 strange_worlds.60.a: "$FASCINATING$"
 strange_worlds.65.name: "Magnétisme animal"
 strange_worlds.65.desc.intro: "Nous avons trouvé la cause des pulsions suicidaires qui animent les créatures vivant sur [Root.GetName].\n\nDes recherches plus poussées sur leur écholocalisation et leur comportement social ont révélé une vérité effarante : leurs cris d'accouplement ont pratiquement la même fréquence que les sons émis par notre réseau énergétique.\n\n"
 strange_worlds.65.desc.common: "Nous pourrions reproduire leurs cris afin d'éloigner leur itinéraire migratoire de notre colonie et ainsi stabiliser leur population. Cela nous permettra de collecter les enzymes catalytiques présentes dans leurs excréments pour augmenter la production d'alliages, tout en continuant d'étudier leur physiologie unique.\n\nParallèlement,\n\n"
 strange_worlds.65.desc.outro: "Nous pourrions facilement créer des collecteurs électriques spécialisés pour traiter ces animaux de manière efficace sans perturber la production d'énergie."
 strange_worlds.65.desc.devouring_swarm: "$strange_worlds.65.desc.intro$Nous pourrions utiliser cette information pour guider les créatures vers des collecteurs spécialisés. C'est l'heure du festin."
 strange_worlds.65.desc.food: "$strange_worlds.65.desc.intro$$strange_worlds.65.desc.common$Ces créatures sont devenues une part importante du régime alimentaire sur §Y[Root.GetName]§!.\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.desc.no_food: "$strange_worlds.65.desc.intro$ces créatures sont une source de biomasse durable sur §Y[Root.GetName]§!.\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.a: "Ramassons leurs excréments"
 strange_worlds.65.b_devouring_swarm: "À table !"
 strange_worlds.65.b_default: "Récoltons leur chair"
 strange_worlds.75.name: "Sables étranges"
 strange_worlds.75.desc: "Nos [Owner.GetColonistPlural] ont signalé que les sables de §Y[Root.GetName]§! présentent un comportement étrange.\n\nDe puissantes tempêtes de sable se manifestent sans crier gare à proximité de la colonie, même par temps calme. Des rivières de sable rapides apparaissent de nulle part, puis s'arrêtent aussi vite qu'elles ont commencé. Ils ont également signalé des dunes de sable se déplaçant sans la moindre bribe de vent.\n\nNous n'avons pas encore trouvé d'explications géologiques ou atmosphériques à ces événements.\n\nCe sable atypique ne nous nuit pas directement, mais il perturbe les activités de notre colonie. Les recherches sur ce phénomène unique se poursuivent."
 strange_worlds.75.a: "C'est assez curieux..."
 strange_worlds.80.name: "Sables chantants"
 strange_worlds.80.desc: "Les tempêtes de sable sur §Y[Root.GetName]§! se sont mises à émettre un bourdonnement sourd. Sa fréquence et son intensité varient régulièrement en suivant le même schéma.\n\nCe phénomène de « sable chantant » peut être attribué aux propriétés des particules libres, mais la régularité des modulations ne peut s'expliquer uniquement par la friction.\n\nNous avons trouvé une vallée de dunes marquées d'étranges symboles. Ces glyphes apparaissent fugitivement et disparaissent presque immédiatement.\n\nNous ignorons ce qui anime le sable, mais la répétition de ces schémas indique qu'une intention ou un but se cache derrière ce comportement."
 strange_worlds.80.a: "Étudions les schémas"
 strange_worlds.85.name: "Sable psionique"
 strange_worlds.85.desc_part1_no_zro: "Nos [Owner.GetScientistPlural] étudiant les tempêtes de sable sur §Y[Root.GetName]§! ont découvert que le silicate transportait un nouveau type de matière exotique."
 strange_worlds.85.desc_part1_zro: "Nos [Owner.GetScientistPlural] étudiant les tempêtes de sable sur §Y[Root.GetName]§! ont découvert que le silicate transportait du zro."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_zroni: "\nPendant qu'ils examinaient les échantillons, les [Owner.GetResearchers] ont eu de brèves mais puissantes visions : ils ont vu des Zronis parcourir les dunes couvertes de glyphes de la planète."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_no_zroni: "\nPendant qu'ils examinaient les échantillons, les [Owner.GetResearchers] ont eu de brèves mais puissantes visions : ils ont vu des silhouettes aliens parcourir les dunes couvertes de glyphes de la planète."
 strange_worlds.85.desc_part2_non_machine_common_psionic_zroni: "\nPendant qu'ils examinaient les échantillons, les [Owner.GetResearchers] ont eu de brèves mais puissantes visions psioniques : ils ont vu des Zronis parcourir les dunes couvertes de glyphes de la planète."
 strange_worlds.85.desc_part2_non_machine_common_psionic_no_zroni: "\nPendant qu'ils examinaient les échantillons, les [Owner.GetResearchers] ont eu de brèves mais puissantes visions psioniques : ils ont vu des silhouettes aliens parcourir les dunes couvertes de glyphes de la planète."
 strange_worlds.85.desc_part2_machine_common: "\nPendant qu'ils examinaient les échantillons, les [Owner.GetResearchers] ont subi des interférences dans leurs circuits internes.\n\n"
 strange_worlds.85.desc_part2_machine_zroni: "$strange_worlds.85.desc_part2_machine_common$Ces puissantes perturbations ont provoqué un dysfonctionnement dans le traitement des images, ce qui a entraîné l'apparition de silhouettes de Zronis parcourant les dunes couvertes de glyphes de la planète."
 strange_worlds.85.desc_part2_machine_no_zroni: "$strange_worlds.85.desc_part2_machine_common$Ces puissantes perturbations ont provoqué un dysfonctionnement dans le traitement des images, ce qui a entraîné l'apparition de silhouettes aliens parcourant les dunes couvertes de glyphes de la planète."
 strange_worlds.85.desc_part3_common: "\nCes silhouettes semblent être à l'origine des glyphes. Il nous faudra beaucoup de temps pour les déchiffrer, mais nous pensons qu'il s'agit d'une forme de langage écrit.\n\n"
 strange_worlds.85.desc_part3_zro: "$strange_worlds.85.desc_part3_common$Nous pourrions extraire le zro du sable, mais les mirages risquent de disparaître. Cette précieuse substance est toutefois présente en grande quantité."
 strange_worlds.85.desc_part3_no_zro: "$strange_worlds.85.desc_part3_common$Nous pourrions extraire le matériau exotique du sable, mais les mirages risquent de disparaître. Toutefois, cette substance unique qui défie les lois de la physique pourrait s'avérer d'une grande valeur."
 strange_worlds.85.a: "Continuons à travailler sur la traduction"
 strange_worlds.85.b_no_zro: "Commençons immédiatement à extraire le matériau exotique"
 strange_worlds.85.b_zro: "Commençons immédiatement à extraire le zro"
 strange_worlds.90.name: "Spectacle de sable"
 strange_worlds.90.desc_intro_zroni: "Nous avons mis nos connaissances de la culture zronie à profit pour créer un nouveau glyphe sur les sables de §Y[Root.GetName]§! : le symbole de salutation. La réponse ne s'est pas fait attendre."
 strange_worlds.90.desc_intro_no_zroni: "En utilisant nos bases de données linguistiques, nous avons créé sur les sables de §Y[Root.GetName]§! des centaines de symboles de salutation dans toutes les langues écrites que nous connaissons. Une réponse a fini par arriver."
 strange_worlds.90.desc_common: "\nLes tempêtes de sable ont disparu, le sol de la vallée s'est stabilisé et le chant des dunes s'est tu. Puis des dunes se sont élevées dans les airs, prenant de nouvelles formes. Des figures de sable sont apparues, tourbillonnant dans un spectacle élaboré.\n\n"
 strange_worlds.90.desc_storyline_started: "$strange_worlds.90.desc_common$Nous avons immédiatement compris qu'il s'agissait de l'histoire des Zronis : celle d'un nouveau pouvoir et d'un terrible conflit. Les sables, alimentés par le zro, sont devenus un écho cosmique de l'ancienne race des Zronis.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_finished: "$strange_worlds.90.desc_common$Nous avons immédiatement compris qu'il s'agissait de l'histoire des Zronis : celle de leur ascension dans le Suaire et de la destruction qui s'est ensuivie. Les sables, alimentés par le zro, sont devenus un écho cosmique du destin tragique des Zronis.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_not_started: "$strange_worlds.90.desc_common$Nous avons seulement compris qu'il s'agissait de l'histoire d'une race alien ayant découvert un nouveau pouvoir qui l'a finalement divisée et détruite.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_outro: "\n\nPuis les sables psioniques se sont à nouveau calmés. Les tempêtes ne sont pas réapparues ; nous pensons que les sables se sont en quelque sorte habitués à notre présence sur §Y[Root.GetName]§!."
 strange_worlds.90.a: "$FASCINATING$"
 strange_worlds.95.name: "Opérations de récolte"
 strange_worlds.95.desc_zroni_tech: "Grâce à notre expérience dans la distillation du zro, nous nous sommes approvisionnés en grande quantité dans les sables de §Y[Root.GetName]§!, et nous avons beaucoup appris.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_no_zroni_tech: "Nos tentatives de récolte de zro sur §Y[Root.GetName]§! ont donné des résultats mitigés. Nous avons réussi à en extraire une petite quantité, mais la plus grande partie a été perdue au cours de nos expériences. Cependant, nous avons beaucoup appris.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_outro: "\n\nLe sable semble être revenu à la normale maintenant qu'il ne contient plus de zro. Plus aucune tempête de sable imprévisible ne s'abat sur notre colonie. Ce qui altérait le sable auparavant a disparu."
 strange_worlds.105.name: "Disparition soudaine"
 strange_worlds.105.desc_intro: "Nous avons perdu le contact avec l'un de nos [Owner.GetExplorerPlural] sur §Y[Root.GetName]§! depuis sa découverte d'un §Ygaz exotique§! dans une vallée jusqu'alors inconnue.\n\n"
 strange_worlds.105.desc_gestalt_non_machine: "Nous avons ressenti une douleur à la fois brève et atroce avant que les noeuds ne se taisent."
 strange_worlds.105.desc_gestalt_machine: "Avant que les noeuds ne soient déconnectés, leurs données ont été corrompues. Ils ne sont plus connectés à notre réseau."
 strange_worlds.105.desc_non_gestalt: "Fait inquiétant, sa dernière transmission a été brusquement interrompue par un son qui ressemblait à des cris de souffrance. Nous craignons le pire."
 strange_worlds.105.a: "C'est inquiétant"
 strange_worlds.110.name: "Mares caustiques"
 strange_worlds.110.desc: "En enquêtant sur le dernier emplacement connu de notre [Owner.GetExplorer] disparu sur §Y[Root.GetName]§!, nous sommes tombés sur des marécages extrêmement corrosifs d'où s'échappent des §Ygaz exotiques§!. Ces marais abritent des espèces de flore indigène rustique, capable de survivre dans un environnement très acidifié.\n\nLa zone est particulièrement dangereuse, mais une étude plus poussée des gaz pourrait être bénéfique pour les ressources de la colonie."
 strange_worlds.110.a: "Étudions ces gaz"
 strange_worlds.115.name: "Marais digestif"
 strange_worlds.115.desc: "En examinant les marais acides sur §Y[Root.GetName]§!, l'un de nos [Owner.GetScientistPlural] a été pris au piège avec son matériel d'observation par les vrilles d'une plante locale et traîné dans un bassin très acide. Il a été dissous en un rien de temps. Nous supposons qu'il est arrivé la même chose à notre [Owner.GetExplorer] disparu.\n\nPeu après, les vrilles de la plante ont gonflé et la quantité de §Ygaz exotique§! est montée en flèche. Il semblerait que la plante utilise les marais acides comme un système digestif externe : elle y entraîne ses proies pour les dissoudre, puis absorbe les nutriments. Ce processus libère une petite quantité de gaz exotique qui peut être récoltée.\n\nNous pensons pouvoir exploiter la biologie de cet organisme en le nourrissant des déchets de la colonie et ainsi produire plus de gaz. Nous pouvons également neutraliser ces marais et transformer cette terre fertile en terres agricoles."
 strange_worlds.115.a: "Cultivons ces plantes"
 strange_worlds.115.b: "Défrichons la zone"
 strange_worlds.120.name: "Plantes marécageuses neutralisées"
 strange_worlds.120.desc: "Nous avons réussi à neutraliser les marais acides sur §Y[Root.GetName]§! tout en tuant les plantes qui y vivaient. En conséquence, la brume de §Ygaz exotique§! a disparu.\n\nCes nouvelles terres sont extrêmement fertiles grâce aux nutriments provenant du processus d'alimentation de la flore indigène. Nous avons créé là une précieuse zone agricole."
 strange_worlds.120.a_ct: "Ajoute §G2§! §Ydistricts agricoles§! sur [This.GetName]."
 strange_worlds.120.b.evopred: "Merveilleux, récupérons également les restes"
 strange_worlds.130.name: "Éruption de matière noire"
 strange_worlds.130.desc: "Ce que l'on croyait être un geyser depuis longtemps inactif sur §Y[Root.GetName]§! s'est mis à cracher du gaz mélangé à de la §Ymatière noire§! dans l'atmosphère.\n\nL'éruption a recouvert le ciel, provoquant de graves anomalies gravitationnelles qui empêchent les vols et communications extraplanétaires.\n\nNous pensons que la matière noire provient du noyau de la planète. Ces conditions extrêmes présentant un risque pour nos [Owner.GetColonistPlural], nous avons déployé des siphons orbitaux pour aspirer la matière noire de la stratosphère."
 strange_worlds.130.a: "Surveillons la situation de près"
 strange_worlds.135.name: "Ténèbres liquides"
 strange_worlds.135.desc_common_1: "Nous avons réussi à extraire les miasmes de §Ymatière noire§! de l'atmosphère de §Y[Root.GetName]§! et avons entamer l'évaluation des dégâts."
 strange_worlds.135.desc_common_2: "\nAprès avoir rétabli le contact avec la colonie, nous avons découvert que les [Owner.GetColonistPlural] ont été pétrifiés par ce qui semble être de la matière noire coagulée."
 strange_worlds.135.desc_organic_non_gestalt: "$strange_worlds.135.desc_common_2$ Nous avons détecté des signes de vie à l'intérieur des enveloppes et extrait avec précaution les individus piégés."
 strange_worlds.135.desc_machine: "$strange_worlds.135.desc_common_2$ Nous avons détecté des signaux électroniques à l'intérieur des enveloppes et libéré les individus piégés."
 strange_worlds.135.desc_gestalt: "$strange_worlds.135.desc_common_2$ Sentant leurs tentatives de réintégration dans le collectif, nous les avons libérés de leur tombeau physique."
 strange_worlds.135.desc_outro: "\nContre toute attente, bien qu'ils aient été en stase et longuement exposés à la matière noire, les [Owner.GetColonistPlural] ne semblent pas souffrir d'effets indésirables.\n\nLe geyser à l'origine de l'incident s'est effondré en un lac de matière noire liquide.\n\nIl s'agit d'un événement sans précédent qui nécessite une enquête approfondie. Nos [Owner.GetScientistPlural] ne savent pas où concentrer leurs ressources déjà très sollicitées."
 strange_worlds.135.a: "Mettons la population en quarantaine et étudions-la"
 strange_worlds.135.b: "Mettons l'accent sur l'étude de la matière noire"
 strange_worlds.140.name: "Contaminés par la matière noire"
 strange_worlds.140_intro: "Nos [Owner.GetScientistPlural] sont convaincus que le lac de §Ymatière noire§! sur §Y[Root.GetName]§! ne constitue pas une menace majeure pour la planète. On ne peut pas en dire autant des symptômes qui ont commencé à se manifester au sein de la population.\n\nL'examen des [Owner.GetColonistPlural] en quarantaine a montré qu'ils subissaient des changements physiques suite à leur pétrification."
 strange_worlds.140_common: "\nLeur exposition prolongée a gorgé leurs biomolécules de matière noire, "
 strange_worlds.140_machine_1: "$strange_worlds.140_common$ce qui a complètement corrompu leur système."
 strange_worlds.140_non_machine_1: "$strange_worlds.140_common$ce qui a entraîné la contamination de leur système circulatoire."
 strange_worlds.140_machine_2: "\nCes contaminants peuvent engendrer une défaillance prématurée du système, mais leur intégration dans les processus d'assemblage des unités fabriquées sur ce monde permettra de mettre en place une sous-routine pour collecter et traiter efficacement la matière noire."
 strange_worlds.140_non_machine_2: "\nNous pouvons cultiver ces anomalies pour que nos [Owner.GetColonistPlural] puissent traiter et sécréter de la matière noire exploitable, au détriment de leur durée de vie."
 strange_worlds.140.a.dc_empire: "Acceptons ce cadeau"
 strange_worlds.140.a.machine_empire: "Cultivons les anomalies"
 strange_worlds.140.a.normal: "Traitons ces contaminants"
 strange_worlds.140.b: "Éliminons ces contaminants"
 strange_worlds.145.name: "Micro-trou noir"
 strange_worlds.145.desc: "Des recherches plus approfondies sur le lac de matière noire de §Y[Root.GetName]§! ont permis d'obtenir d'importantes informations géologiques qui pourraient expliquer les causes de l'éruption.\n\nLe noyau de la planète contient un micro-trou noir de moins d'un mètre de diamètre. La masse même de la planète équilibre les forces gravitationnelles que l'on pourrait autrement détecter dans une telle anomalie. Les deux masses ont trouvé un équilibre délicat qui devrait perdurer encore quelque temps.\n\nUne récente activité sismique a déplacé le manteau de la planète, provoquant l'éruption du geyser. Le lac de matière noire a agi comme un bouchon pour stabiliser le noyau planétaire et empêché d'autres éruptions.\n\nCependant, la saturation à long terme de la matière noire n'était pas aussi inoffensive qu'on le pensait.\n\nAu centre de la masse des [Owner.GetColonistPlural], des micro-trous noirs instables sont apparus, provoquant l'implosion violente de leur corps, et ne laissant derrière eux que des coquilles de matière noire cristallisée. Les capteurs n'ont détecté aucun signe de vie à l'intérieur.\n\nD'après notre dernier décompte, environ un quart de la population de §Y[Root.GetName]§! a disparu en l'espace d'un instant. À la place de ces habitants se dressent désormais des statues de matière noire solide."
 strange_worlds.145.a.no_gestalt: "C'est bien regrettable"
 strange_worlds.145.a.gestalt: "Terrifiant"
 strange_worlds.155.name: "Bêtes répugnantes"
 strange_worlds.155.desc_homicidal: "Nous avons rencontré une espèce particulièrement repoussante de la faune locale de §Y[Root.GetName]§!.\n\nElle a développé un mécanisme de défense qui est également son principal moyen de se procurer de la nourriture. Ne produisant pas d'enzymes digestives pour décomposer les aliments solides, ces créatures sécrètent un puissant gaz nauséabond qui provoque des vomissements chez les autres organismes dotés d'un système digestif. Les substances excrétées constituent leur principale source de nutriments.\n\nL'abattage de ces immondes créatures nous fournira des §Ygaz exotiques§! et de la §Ynourriture§!."
 strange_worlds.155.desc_normal: "Nos [Owner.GetColonistPlural] sur §Y[Root.GetName]§! ont rencontré une espèce particulièrement repoussante de la faune locale qui se nourrit d'une manière très... inhabituelle.\n\nIntimidées au premier abord, les créatures se sont finalement habituées à notre présence et sont même très appréciées des jeunes [Root.Owner.GetSpeciesNamePlural] en raison de leur nature amicale.\n\nElles ne constituent pas une menace directe, mais ont développé un mécanisme de défense qui est également leur principal moyen de se procurer de la nourriture. Ne produisant pas d'enzymes digestives pour décomposer les aliments solides, elles sécrètent un puissant gaz nauséabond qui provoque des vomissements chez les autres organismes dotés d'un système digestif. Les substances excrétées constituent leur principale source de nutriments.\n\nDans cette situation, le risque de propagation de maladies infectieuses n'est pas négligeable, aussi les responsables locaux encouragent-ils les [Owner.GetColonistPlural] à se tenir à l'écart."
 strange_worlds.155.a: "En voilà une xénobiologie unique !"
 strange_worlds.155.b_purifiers: "Abject"
 strange_worlds.155.b_swarm: "Un vrai délice !"
 strange_worlds.155.b_normal: "Tirez à vue"
 strange_worlds.160.name: "Évolution écoeurante"
 strange_worlds.160.desc: "Débarrasser §Y[Root.GetName]§! de ses bêtes répugnantes s'est avérée une tâche difficile. Les jeunes habitants de la colonie continuent de jouer avec elles, malgré les avertissements.\n\nEn conséquence, les protéines de notre organe, [Root.Owner.GetSpeciesOrganName], sont devenues la source de nourriture préférée des créatures. Notre colonie est désormais une proie bien plus facile que le reste de la faune planétaire, capable d'éviter les gaz nocifs qu'elles émettent. Elles se sont adaptées à notre présence et tendent des embuscades aux [Owner.GetColonistPlural] qui se promènent seuls après leur repas.\n\nMalgré ce qu'on pourrait croire, cette situation présente des avantages. Nos scientifiques ont découvert que les vapeurs émises par les créatures contiennent de précieuses particules de §Ygaz exotiques§!, que nous pourrions collecter en les domestiquant et en les isolant.\n\nToutefois, la majorité de la colonie est favorable à leur extermination."
 strange_worlds.160.a: "Exploitons-les"
 strange_worlds.160.b: "Ça suffit, tirez à vue"
 strange_worlds.165.name: "Une bouffée d'air frais"
 strange_worlds.165.desc: "Les créatures de §Y[Root.GetName]§! ne provoquent plus de vomissements massifs.\n\nGrâce à la mise au point d'une pâte nutritive synthétique adaptée à leur xénobiologie, nous avons réussi à réguler leurs cycles d'alimentation et, par conséquent, elles ont cessé de tendre des embuscades à nos [Owner.GetColonistPlural].\n\nNous les avons déplacées dans une réserve naturelle parfaitement aménagée, où nos concitoyens peuvent les observer en toute sécurité. Des soigneurs spécialisés ont été formés pour collecter les §Ygaz exotiques§! dans les meilleures conditions."
 strange_worlds.165.a: "Quel soulagement !"
 strange_worlds.165.a.evopred: "Ne nous approprions surtout pas cette odeur"
 strange_worlds.170.name: "Feu à volonté"
 strange_worlds.170.desc: "Cela fait quelques mois que la politique d'éradication des créatures répugnantes sur §Y[Root.GetName]§! a été adoptée et, depuis, aucune d'entre elles n'a été aperçue à proximité de notre colonie.\n\nCertains [Owner.GetColonistPlural] sont tristes de voir les créatures poilues disparaître, mais la plupart sont heureux de pouvoir se déplacer librement, sans craindre d'être forcés à vomir.\n\nNos scientifiques ont recueilli les corps des animaux et extrait de petites quantités de §Ygaz exotiques§! de leurs organes."
 strange_worlds.170.a: "Elles l'ont cherché"
 strange_worlds.185.name: "Hostilité entre districts"
 strange_worlds.185.desc: "Des rapports de §Y[Root.GetName]§! font état d'une augmentation alarmante de l'hostilité entre les populations des districts urbains et ruraux. Les causes sont difficiles à déterminer, en dehors de leur situation géographique.\n\nLes nouveaux arrivants sont d'abord marginalisés, mais finissent par être acceptés quelques semaines après avoir été assignés à leurs districts respectifs. Sur la base de ce schéma, nos scientifiques ont conclu que ce comportement étrange est dû à des facteurs spécifiques aux districts.\n\nAlors que l'enquête se poursuit, il est nécessaire de stabiliser la situation afin d'éviter qu'elle ne dégénère. Nous pourrions faire une déclaration officielle de soutien aux districts ruraux ou urbains, ou y envoyer des forces de l'ordre supplémentaires."
 strange_worlds.185.a: "Soutenons les districts urbains"
 strange_worlds.185.b: "Soutenons les districts ruraux"
 strange_worlds.185.c: "Envoyons des forces de l'ordre supplémentaires"
 strange_worlds.190.name: "Eau contaminée"
 strange_worlds.190.desc_intro: "Après une étude environnementale approfondie de §Y[Root.GetName]§!, nos scientifiques ont trouvé la cause de l'hostilité entre les districts.\n\nLe corps en décomposition d'un organisme géant gît dans les profondeurs du manteau planétaire. Après des milliers d'années de putréfaction, son liquide céphalo-rachidien a pénétré dans la nappe phréatique et l'a contaminée de bactéries psioniques. Ces microbes altérant la conscience ont ensuite pénétré dans le système nerveux de nos [Owner.GetColonistPlural] et déclenché de puissants instincts territoriaux propres à la créature.\n\n"
 strange_worlds.190.desc_non_psionic: "Nous devrions pouvoir résoudre ce problème en faisant passer l'eau par un système sophistiqué de filtres modernes.\n\n"
 strange_worlds.190.desc_psionic: "Cette pollution exotique interfère avec nos capacités psioniques innées.$strange_worlds.190.desc_non_psionic$"
 strange_worlds.190.desc_outro_non_psionic: "Toutefois, nos scientifiques sont convaincus qu'en modifiant génétiquement les bactéries au niveau cellulaire, nous pouvons transformer cet instinct territorial en quelque chose de plus productif."
 strange_worlds.190.a: "Filtrons la nappe phréatique"
 strange_worlds.190.b: "Essayons de modifier génétiquement les bactéries"
 strange_worlds.195.name: "Nouvelles capacités"
 strange_worlds.195.desc_intro: "La construction de stations de filtration d'eau sur §Y[Root.GetName]§! a été un grand succès.\n\n"
 strange_worlds.195.desc_psionic: "L'animosité motivée par un instinct territorial exacerbé a cessé, et en plus de ne plus être perturbées, nos capacités psioniques ont été renforcées par des probiotiques naturels qui favorisent l'§Yéphapse psionique§! entre les individus sur §Y[Root.GetName]§!. Cela consolide notre lien télépathique, approfondit le sentiment de communauté et augmente la productivité."
 strange_worlds.195.desc_non_psionic: "L'animosité motivée par un instinct territorial exacerbé a cessé, laissant à la population un effet secondaire qui pourrait s'avérer bénéfique : des probiotiques naturels favorisent l'§Yéphapse psionique§! entre les individus sur §Y[Root.GetName]§!. Cela permet à nos [Owner.GetColonistPlural] de communiquer par télépathie, approfondissant le sentiment de communauté et augmentant la productivité."
 strange_worlds.195.a: "Tant mieux !"
 strange_worlds.195.a_ct: "Toutes les pops sur §Y[Root.GetName]§! reçoivent le trait §YÉphapse psionique§!"
 strange_worlds.195.a.evopred: "Le goût est... §Métrange§!"
 strange_worlds.195.a_ct.evopred: "Notre espèce primaire reçoit le trait §YÉphapse psionique§!"
 strange_worlds.200.name: "Reséquençage bactérien"
 strange_worlds.200.desc: "Nous avons neutralisé les effets négatifs de la bactérie sur §Y[Root.GetName]§!. Les querelles entre [Owner.GetColonistPlural] se sont apaisées et la productivité commence déjà à augmenter.\n\nNos scientifiques sont persuadés qu'ils peuvent modifier davantage le code génétique du microbe. Avec le bon séquençage de son génome, nous pourrions améliorer l'une des capacités de nos [Owner.GetColonistPlural].\n\nToutefois, les microbes modifiés ne survivront pas longtemps hors de la planète. En effet, pour se reproduire, les bactéries doivent maintenir un lien psionique entre leurs mitochondries et la carcasse du géant. Nous ne comprenons pas tout à fait pourquoi."
 strange_worlds.200.a: "Augmentons leurs capacités de reproduction"
 strange_worlds.200.b: "Améliorons leur force"
 strange_worlds.200.c: "Améliorons leurs capacités cognitives"
 strange_worlds.1000.name: "Tunnels de lave minéralisée"
 strange_worlds.1000.desc: "L'assèchement du climat sur §Y[From.GetName]§! a mis à nu les fonds océaniques, où l'on a découvert un vaste réseau de tunnels de lave.\n\nLes coulées de magma qui ont donné naissance à ces profonds tunnels sont inactives et ont laissé derrière elles de riches dépôts de minéraux, formés en raison de la température et de la pression élevées qui règnent à l'intérieur du noyau en fusion de §Y[From.GetName]§!.\n\nCes gisements sont extrêmement denses, leur exploitation sera coûteuse mais très lucrative."
 strange_worlds.1005.name: "OEufs hydroactifs"
 strange_worlds.1005.desc: "La terraformation de §Y[From.GetName]§! a provoqué une hausse inattendue de sa population animale.\n\nIl s'avère que les cycles de reproduction de nombreuses espèces indigènes sont étroitement liés à la quantité d'eau disponible autour d'elles. Leurs oeufs, enfouis dans le sol depuis des mois en attendant d'absorber l'eau nécessaire à leur éclosion, gisent désormais à la surface. La population animale de la planète connaît une croissance exponentielle.\n\nNombre de ces créatures ont une grande valeur nutritionnelle et constitueront une source abondante de nourriture. Cela nous donne également l'occasion d'étudier un écosystème extrêmement dynamique. Les visiteurs devront se soumettre à des procédures de quarantaine strictes afin d'éviter la contamination d'autres planètes avant de repartir."
 strange_worlds.1005.evopred: "Ce rythme de développement peut-il être reproduit ?"
 strange_worlds.1010.name: "Cryoconservation"
 strange_worlds.1010.intro: "Lors de nos travaux de terraformation sur §Y[From.GetName]§!, nous avons découvert des créatures indigènes piégées dans la glace. Leur nombre est stupéfiant, mais ce qui l'est davantage, c'est qu'elles sont toujours vivantes.\n\nIl semble que les créatures étaient en hibernation extrêmement profonde ; un moyen efficace de survivre à la longue ère glaciaire de §Y[From.GetName]§!. La terraformation et la fonte des glaces qui en a découlé les ont fait sortir de leur stase plus tôt que prévu.\n\nLes animaux qui ont émergé de leur sommeil glacial montrent déjà des signes d'intelligence : ils utilisent des outils sommaires pour collecter de la nourriture.\n\n"
 strange_worlds.1010.desc_exterminate: "$strange_worlds.1010.intro$Nous allons les éliminer sur-le-champ et utiliser leur biomasse à nos propres fins."
 strange_worlds.1010.desc_hunted: "$strange_worlds.1010.intro$Grâce à leur physiologie unique, ils constitueront une abondante source de nourriture."
 strange_worlds.1010.desc_tolerated: "$strange_worlds.1010.intro$Nous pourrions étudier leurs étonnantes capacités d'hibernation ou récolter leur biomasse."
 strange_worlds.1010.desc_protected: "$strange_worlds.1010.intro$Nous devrions les protéger. Leurs étonnantes capacités d'hibernation méritent d'être étudiées plus en détail."
 strange_worlds.1010.a.purge: "Éliminons-les"
 strange_worlds.1010.b.hunted: "Chassons-les"
 strange_worlds.1010.c.study: "Étudions-les"
 strange_worlds.1010.d.purge: "Éliminons-les"
 strange_worlds.1010.e.protect: "Protégeons-les"
 strange_worlds.1015.name: "Montagnes d'acier"
 strange_worlds.1015.desc: "Nos experts en terraformation ont signalé un problème sur §Y[From.GetName]§!.\n\nSous les chaînes de montagnes gelées se trouvent de vastes gisements de fer et de carbone, portés à des températures extrêmement élevées par nos opérations de terraformation.\n\nNous pourrions extraire ces ressources presque fondues, ou continuer de les chauffer pour disposer d'une source inépuisable d'alliages. Bien sûr, cela se ferait au détriment de l'espace habitable."
 strange_worlds.1015.a: "Les ressources sont prioritaires"
 strange_worlds.1015.b: "Ne faisons rien"
 strange_worlds.1020.name: "Atmosphère inflammable"
 strange_worlds.1020.desc: "Les opérations de terraformation sur §Y[From.GetName]§! ont eu des conséquences imprévues. Nous l'ignorions, mais la couche supérieure du sol de la planète contient de fortes concentrations de §Yparticules volatiles§!, et nos opérations les ont répandues dans l'atmosphère.\n\nProblème : ces particules à haute énergie augmentent le risque d'inflammation accidentelle à la surface. La prévention des accidents et des conflits devra être la priorité des futures colonies afin d'éviter toute catastrophe.\n\nToutefois, une gestion prudente des risques fera de l'atmosphère de §Y[From.GetName]§! une mine de matériaux rares."
 strange_worlds.1025.name: "Lave bleue"
 strange_worlds.1025.desc: "À la suite de nos opérations de terraformation, la croûte de §Y[From.GetName]§! s'est déplacée et un phénomène naturel inhabituel s'est produit.\n\nLe mouvement des plaques tectoniques a provoqué le déplacement de poches de §Ygaz exotiques§!, qui ont réagi avec les gisements des volcans riches en §Yalliages§! et coloré leurs éruptions d'un bleu éclatant.\n\nCe phénomène instable a rendu la planète moins habitable, compromettant nos projets de création d'un lieu de vie pour les [Root.GetColonistPlural].\n\nToutefois, le sol autour des volcans est désormais riche en ressources exploitables."
 strange_worlds.1030.name: "Foudre éternelle"
 strange_worlds.1030.desc: "Nous avons reçu des rapports faisant état d'un nouveau phénomène météorologique sur §Y[From.GetName]§!.\n\nLors de la terraformation, nous avons exposé des gisements de cristaux dans le soubassement de la planète, qui ont réagi avec les produits chimiques utilisés dans le processus et sont devenus radioactifs. Cela a entraîné des fluctuations de température extrêmes, créant des orages incessants.\n\nCe phénomène météorologique unique affectera sans aucun doute le développement des infrastructures, et les cristaux radioactifs nuiront à l'habitabilité de la planète à long terme. Toutefois, nos [Owner.GetScientistPlural] pensent pouvoir exploiter l'énergie des orages une fois la terraformation achevée.\n\nNos [Owner.GetEngineerPlural] ont également élaboré un plan visant à neutraliser en toute sécurité la charge des gisements de cristaux. Cela ferait cesser les orages et nous permettrait de récupérer les cristaux pour d'autres usages."
 strange_worlds.1030.a: "Exploitons l'énergie des orages"
 strange_worlds.1030.b: "Neutralisons les cristaux"
 strange_worlds.1035.name: "Espèce hibernante"
 strange_worlds.1035.desc: "L'étude des préconscients sur §Y[event_target:hibernator_planet.GetName]§! nous a permis de mieux comprendre leurs étonnantes capacités d'hibernation. Celles-ci sont régulées par une enzyme qui déclenche l'entrée et la sortie du corps dans un état de sommeil profond. Dans cet état, les réactions chimiques opérées dans leur corps ralentissent au point d'être à peine perceptibles.\n\nNous avons extrait cette enzyme et l'avons administrée à divers organismes. Les espèces auparavant incapables d'hiberner ont acquis la capacité d'entrer dans une profonde léthargie, au cours duquel le vieillissement de leurs cellules est considérablement ralenti.\n\nCette découverte révolutionnaire a ouvert la voie au développement d'une technologie de cryostase artificielle, qui pourrait réduire la tension physique que subissent les espèces organiques lors des voyages spatiaux de longue durée."
 strange_worlds.1040.name: "Tombeaux célestes"
 strange_worlds.1040.desc: "Alors que nous terminions nos opérations de terraformation sur §Y[From.GetName]§!, des corps ont commencé à tomber du ciel.\n\nEn heurtant le sol d'une telle hauteur, ces cadavres anciens sont inévitablement réduits en bouillie. Parmi les entrailles, nous avons trouvé de nombreux petits objets, tels que des ornements et des reliques d'apparence étrange, tous tombés des mêmes nuages denses situés dans la haute atmosphère.\n\nCes épais nuages, qui ont probablement servi de dernière demeure à une race alien inconnue, s'amincissent sous l'effet de nos opérations de terraformation et libèrent leur contenu. Ce phénomène devrait se poursuivre à mesure que l'atmosphère se modifie, et ce jusqu'à ce que les tombeaux nuageux se vident complètement."
 strange_worlds.1040.a: "C'est macabre, mais potentiellement lucratif"
 strange_worlds.1040.b: "Ce n'est pas hygiénique, débarrassons-nous des dépouilles sans tarder"
 strange_worlds.1050.name: "Débris orbitaux"
 strange_worlds.1050.desc: "Les déchets spatiaux et autres débris orbitaux rendent les conditions de travail dangereuses pour nos ingénieurs en terraformation sur §Y[event_target:junk_moon_planet.GetName]§!. Leur quantité est telle qu'ils mettent en danger les navettes qui voyagent entre la surface et l'espace.\n\nCompte tenu de la densité élevée des débris, nous avons mis au point un moyen de magnétiser les plus gros d'entre eux pour qu'ils attirent les autres et forment progressivement un seul objet plus facile à gérer. Nous pourrions même en faire une lune artificielle.\n\nBien que cela allongerait la période de terraformation, les navettes pourraient accéder plus facilement à la surface et le risque que de gros débris orbitaux entrent dans l'atmosphère serait écarté."
 strange_worlds.1050.a: "Créons une lune artificielle"
 strange_worlds.1050.b: "Il brûlera tout seul"
 strange_worlds.1060.name: "Lune poubelle"
 strange_worlds.1060.desc: "Le plan visant à regrouper les débris spatiaux en orbite de §Y[event_target:junk_moon_planet.GetName]§! a été couronné de succès.\n\nEn magnétisant les plus gros d'entre eux, nous avons fini par obtenir une unique masse de ferraille à la densité telle qu'elle a sa propre gravité. Cette nouvelle lune est désormais en orbite stable.\n\nLes débris orbitaux dangereux ayant disparu, l'accès à la surface de §Y[event_target:junk_moon_planet.GetName]§! est beaucoup plus aisé, et nous n'avons plus à nous soucier de leur entrée dans l'atmosphère. De plus, nos ingénieurs sont convaincus qu'ils pourront construire une station minière sur la nouvelle lune."
 strange_worlds.1060.create_moon_ct: "[event_target:junk_moon_planet.GetName] a une nouvelle lune : la lune poubelle"
 site_abandoned_bio_lab: "Complexe ancien"
 abandoned_bio_lab_desc: "Les balayages de §Y[fromfrom.planet.GetName]§! ont révélé un complexe isolé dans sa région la plus difficile d'accès. La structure est détériorée et semble être inactive ou abandonnée, car nous n'y avons détecté aucune signature énergétique. Une expédition archéologique pourrait nous en apprendre davantage."
 strange_worlds.2000.name: "Laboratoire biologique abandonné"
 strange_worlds.2000.desc: "Le complexe renferme de nombreux appareils médicaux abandonnés, des salles de traitement et une morgue. Les capsules de stockage des cadavres contiennent des restes organiques partiellement conservés qui présentent des signes de maladie et de difformité. Les portes de sécurité, les équipements de surveillance et les cellules de détention laissent §H[universal_macrophage_scientist.GetName]§! penser que certains individus étaient détenus contre leur volonté.\n\nNous avons pu récupérer quelques pièces d'équipement, mais la plupart d'entre elles étaient dans un état de détérioration avancé. Les systèmes informatiques contenaient encore quelques données que nous avons extraites, mais elles doivent être traduites."
 strange_worlds.2005.name: "Recherches médicales anciennes"
 strange_worlds.2005.desc: "§H[universal_macrophage_scientist.GetName]§! a partiellement traduit l'un des fichiers récupérés dans le complexe découvert sur §Y[fromfrom.planet.GetName]§!.\n\n§LLaboratoire 17 - Rapport d'avancement - Gelebor, responsable de recherche\n\nNotre nouveau prototype était prometteur. Le système immunitaire des sujets est devenu un million de fois plus résistant et tous les agents pathogènes ont été éradiqués. Les effets secondaires sont toutefois toujours là : des mutations mortelles se sont produites, et personne n'a survécu. Nous allons réessayer. La mise au point du macrophage universel est imminente, c'est une certitude.§!"
 strange_worlds.2010.name: "Le choix de Gelebor"
 strange_worlds.2010.desc: "§H[universal_macrophage_scientist.GetName]§! a traduit un autre fichier provenant du laboratoire abandonné trouvé sur §Y[fromfrom.planet.GetName]§!.\n\n§LLaboratoire 17 - Note interne - Gelebor, responsable de recherche\n\nChers collègues, nous avons reçu l'ordre de cesser nos activités. Notre maître est apparemment à court de patience, mais nous sommes prêts du but ! Le macrophage universel est plus important que les caprices d'un seul individu. Nous pourrions avoir un avenir dépourvu de maladies ! Que valent quelques vies face à des progrès aussi énormes ?\n\nS'ils ne veulent plus nous fournir de sujets de test, j'essaierai le nouveau prototype sur moi. Voulez-vous vous joindre à moi ?§!"
 strange_worlds.2010.a: "Nous devrions nous montrer prudents"
 strange_worlds.2015.name: "Macrophage universel"
 strange_worlds.2015.desc: "§H[universal_macrophage_scientist.GetName]§! a traduit la dernière entrée trouvée sur les ordinateurs du laboratoire de §Y[fromfrom.planet.GetName]§!.\n\n§LLaboratoire 17 - Rapport final - Filidor, aide à la recherche\n\nL'assurance de Gelebor nous a poussés à le suivre aveuglément.\n\nLorsque le prototype nous a été administré, il a d'abord renforcé notre système immunitaire, nous rendant presque totalement résistants aux agents pathogènes étrangers, puis les mutations ont commencé.\n\nGelebor a été le premier à mourir. C'était difficile à regarder. Tous mes collègues sont désormais à la morgue, et je les y rejoindrai bientôt.\n\nNous avons échoué. Nous avons mis notre vie entre les mains de la formule défectueuse de Gelebor. Le macrophage universel est tellement efficace qu'il finit par s'en prendre à son hôte. Tout doit être détruit.§!"
 strange_worlds.2015.a: "Détruisons tout"
 strange_worlds.2015.b: "Finissons le travail de Gelebor, il y a du potentiel"
 strange_worlds.2015.b.mutation: "Nous sommes des maîtres de la mutation, finissons son travail"
 has_tr_mutation_finish_tt: "Cette option est disponible car nous avons terminé l'arbre des traditions de §Ymutation§!."
 strange_worlds.2015.c: "Ces recherches défectueuses pourraient servir à quelque chose"
 strange_worlds.2030.name: "Mutations mortelles"
 strange_worlds.2030.desc: "Les citoyens de §Y[Root.GetName]§! subissent de graves mutations physiques qui empêchent le bon fonctionnement de leurs cellules et organes vitaux. Dans de rares cas, cela se traduit par un métabolisme plus efficace, mais c'est généralement la mort qui s'ensuit.\n\nCes effets secondaires correspondent parfaitement à ceux décrits dans les rapports de recherche sur le §Ymacrophage universel§!. Malgré tous nos efforts, les mutations mortelles engendrées par la formule semblent inévitables. Nous ne pouvons plus faire confiance à cette technologie. Nous allons détruire tous les stocks restants et cesser de l'utiliser."
 strange_worlds.2030.ct: "§Y[Root.GetName]§! perd 100 £pop£pops puis une autre centaine toutes les $@macrophage_kill_pop_every_x$ £pop£pops présentes.\nToutes les £pop£pops organiques sur §Y[Root.GetName]§! reçoivent le trait §YMutations geleboriques§! et leur physiologie change drastiquement."
 site_anomalous_cube: "Cube mystérieux"
 anomalous_cube_desc: "Nous avons découvert un gigantesque cube métallique sur §Y[Planet.GetName]§!. Sa forme parfaite témoigne des compétences technologiques avancées de ses créateurs, mais nous ignorons d'où il vient et à quoi il sert. Une expédition archéologique pourrait nous apporter des réponses."
 strange_worlds.2035.name: "Métal ondulant"
 strange_worlds.2035.desc_intro: "Après avoir examiné de plus près le mystérieux cube géant sur [fromfrom.planet.GetName], nous avons plus de questions que de réponses. Sa surface extérieure est parfaitement lisse, et nos scanners sont incapables de voir à l'intérieur. Lorsque nous nous sommes approchés, ses parois ont ondulé doucement en réponse à notre présence."
 strange_worlds.2035.desc_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! a conclu qu'il était constitué d'une sorte de §Ymétal vivant§!."
 strange_worlds.2035.desc_no_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! a conclu qu'il était constitué d'une sorte d'étrange métal que nous n'avions jamais vu auparavant."
 strange_worlds.2035.a: "Poursuivons donc nos investigations"
 strange_worlds.2040.name: "À l'intérieur du cube"
 strange_worlds.2040.desc: "§H[event_target:anomalous_cube_scientist.GetName]§! examinait le cube métallique sur [fromfrom.planet.GetName] lorsque l'une de ses faces s'est soudainement ouverte en ondulant, révélant une entrée. Une fois à l'intérieur, nous avons découvert une console de commande à laquelle étaient encore attachés les restes d'un molluscoïde. Sa chair n'était plus qu'une poussière blanchâtre.\n\nSur la console, nous avons trouvé un étrange contenant d'où provenaient de temps à autre des bruits sourds, comme si quelque chose bougeait à l'intérieur. Toutefois, §H[event_target:anomalous_cube_scientist.GetName]§! n'a pas réussi à l'ouvrir en raison de la complexité de son mécanisme de verrouillage."
 strange_worlds.2040.evopred: "Nous pouvons certainement récupérer cette poussière"
 strange_worlds.2045.name: "Découverte d'enregistrements audio"
 strange_worlds.2045.desc: "En extrayant les données de la console centrale du cube, §H[event_target:anomalous_cube_scientist.GetName]§! a trouvé et décrypté deux courts enregistrements audio. On y entend une série de claquements gutturaux et d'occlusions glottales émis par un seul locuteur. En les comparant aux données de notre base linguistique, §H[event_target:anomalous_cube_scientist.GetName]§! a identifié une langue ancienne similaire et l'a utilisée pour traduire le premier enregistrement :\n\n§L« Chers membres de la commission, vous devez m'écouter. Il est encore temps d'éviter la guerre. La confiance de vos dirigeants n'est pas fondée, nous ne pouvons pas vaincre la [event_target:anomalous_cube_fallen_empire.GetName]. Ils vont nous anéantir ! »\n\n« L'apaisement est la seule solution. J'ai préparé un cadeau en gage de paix : une boîte contenant le secret de notre métal vivant. Si nous voulons éviter la destruction, nous devons leur faire parvenir. »§!"
 strange_worlds.2045.a: "Traduisons le second enregistrement"
 strange_worlds.2050.name: "Merveilleux métal vivant"
 strange_worlds.2050.desc_intro: "Nous avons traduit le second enregistrement audio trouvé dans la console de commande du cube.\n\n§L« Chers membres de la commission, j'ai échoué. Notre destruction est désormais inévitable.\n\nMon vaisseau cubique a été saboté. Je vais tenter un atterrissage d'urgence sur [fromfrom.planet.GetName]. Même si je survis, je ne serai pas en mesure de remettre notre gage de paix. Comme nous le craignons, la [event_target:anomalous_cube_fallen_empire.GetName] nous attaquera. »§!\n\n§H[event_target:anomalous_cube_scientist.GetName]§! a réussi à ouvrir la boîte. À l'intérieur se trouve un étrange morceau de métal, très malléable et hyperactif, se changeant toutes les quelques secondes en diverses formes élaborées."
 strange_worlds.2050.desc_no_war_lm: "\nNous pourrions garder cette curiosité pour en apprendre davantage sur le métal vivant ou exécuter la volonté de ses anciens propriétaires : l'offrir à la [event_target:anomalous_cube_fallen_empire.GetName] pour améliorer nos relations."
 strange_worlds.2050.desc_no_war_no_lm: "\nNous pourrions garder cette curiosité pour en apprendre davantage sur cet étonnant métal ou exécuter la volonté de ses anciens propriétaires : l'offrir à la [event_target:anomalous_cube_fallen_empire.GetName] pour améliorer nos relations."
 strange_worlds.2050.desc_war_lm: "\nNous utiliserons cet objet étonnant et le vaisseau cubique pour approfondir notre compréhension du métal vivant."
 strange_worlds.2050.desc_war_no_lm: "\nNous utiliserons cet objet étonnant et le vaisseau cubique pour approfondir notre compréhension des composés et structures métalliques."
 strange_worlds.2050.a_no_war: "Offrons-le à la [event_target:anomalous_cube_fallen_empire.GetName]"
 strange_worlds.2050.b_fallen_not_defeated_no_war: "Gardons-le"
 strange_worlds.3005.name: "Prophète suspect"
 strange_worlds.3005.desc: "Nos explorateurs ont fait une découverte intéressante en observant la population de §Y[event_target:pre_ftl_planet.GetName]§!.\n\nUne rumeur circule dans la capitale à propos d'un « élu » qui serait descendu des étoiles pour accomplir une ancienne prophétie et conduire les [event_target:pre_ftl_planet.Owner.GetSpeciesName] vers un nouvel âge d'or.\n\nComme cela ne semble être l'oeuvre d'aucun membre de notre expédition, nous devrions enquêter sur cet individu."
 strange_worlds.3005.a: "Renseignons-nous"
 strange_worlds.3010.name: "Faux prophète"
 strange_worlds.3010.desc_intro: "Notre équipe chargée d'enquêter sur le fameux « élu » sur §Y[event_target:pre_ftl_planet.GetName]§! a découvert sa véritable identité.\n\n"
 strange_worlds.3010.desc_no_megacorp: "Un §Ynomade namarien§! se fait passer pour une figure mythologique [event_target:pre_ftl_planet.Owner.GetSpeciesName] « descendue des étoiles »."
 strange_worlds.3010.desc_megacorp: "Un caravanier de l'espèce §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§! se fait passer pour une figure mythologique [event_target:pre_ftl_planet.Owner.GetSpeciesName] « descendue des étoiles »."
 strange_worlds.3010.desc_outro: "\nUne exploration plus étendue de la planète nous a permis de découvrir son vaisseau accidenté, caché dans une vallée inaccessible non loin de la capitale. Au vu de l'ancienneté des hyperpropulseurs, sa présence ne date pas d'hier.\n\nDepuis son arrivée, il exploite les superstitions locales et jouit du respect et de l'adoration des habitants, dont il est devenu le souverain grâce à son « savoir céleste ».\n\nSi rien n'est fait, ce charlatan pourrait avoir un impact très important sur cette société en développement. Nous devrions peut-être intervenir."
 strange_worlds.3010.a: "Dénonçons l'escroc"
 strange_worlds.3010.b: "Proposons-lui de le secourir"
 strange_worlds.3015.name: "Vérité révélée"
 strange_worlds.3015.desc_no_megacorp: "Nous avons réussi à évincer le §Ynomade namarien§! qui se faisait passer pour « l'élu » de la mythologie [event_target:pre_ftl_planet.Owner.GetSpeciesName] sur §Y[event_target:pre_ftl_planet.GetName]§!."
 strange_worlds.3015.desc_megacorp: "Nous avons réussi à évincer le caravanier de l'espèce §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§! qui se faisait passer pour « l'élu » de la mythologie [event_target:pre_ftl_planet.Owner.GetSpeciesName] sur §Y[event_target:pre_ftl_planet.GetName]§!."
 strange_worlds.3015.desc_outro: "\nAprès avoir étudié les légendes locales plus en détail, nous avons convaincu la classe dirigeante que leur soi-disant élu était en réalité un démon envoyé pour les tromper et plonger la planète dans l'obscurité pendant mille ans.\n\nNous avons démonté l'épave du vaisseau pour en récupérer des pièces et n'en laisser aucune trace. Toutefois, la population locale avait déjà mis la main sur quelques effets personnels, leur donnant un aperçu d'une technologie qu'ils sont incapables de comprendre."
 strange_worlds.3015.a: "C'est bien regrettable"
 strange_worlds.3020.name: "Retour à la maison"
 strange_worlds.3020.desc_intro: "Nos explorateurs ont pu rencontrer « l'élu » de §Y[event_target:pre_ftl_planet.GetName]§! en privé et lui ont proposé de l'aider à réparer son vaisseau et à rentrer chez lui.\n\n"
 strange_worlds.3020.desc_no_megacorp: "Le §Ynomade namarien§! a accepté notre offre avec enthousiasme et nous a expliqué qu'il avait été pris pour un dieu après avoir atterri sur §Y[event_target:pre_ftl_planet.GetName]§! et qu'il craignait depuis qu'on lui fasse du mal si sa véritable identité venait à être révélée."
 strange_worlds.3020.desc_megacorp: "Le caravanier de l'espèce §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§! a accepté notre offre avec enthousiasme et nous a expliqué qu'il avait été pris pour un dieu après avoir atterri sur §Y[event_target:pre_ftl_planet.GetName]§! et qu'il craignait depuis qu'on lui fasse du mal si sa véritable identité venait à être révélée."
 strange_worlds.3020.desc_outro: "\nAprès l'avoir transporté jusqu'à notre poste de recherche et avoir réparé son vaisseau, le voyageur nous a offert une grande partie de son équipement en guise de cadeau d'adieu.\n\nLa vacance du pouvoir créée par son départ a conduit à une brève mais violente bataille entre les différentes sectes religieuses de §Y[event_target:pre_ftl_planet.GetName]§!, qui s'est depuis apaisée."
 strange_worlds.3020.a: "C'est absolument fascinant"
 strange_worlds.3025.name: "[event_target:nomad01_country.GetName]"
 strange_worlds.3025.desc: "Salutations, [Owner.GetSpeciesNamePlural]. Nous avons appris que vous vous étiez débarrassés d'un Namarien rebelle qui s'était détaché de notre flotte.\n\nVous nous avez rendu un grand service. Cet égaré nous causait des ennuis depuis un certain temps, et son ambition démesurée mettait en péril notre expédition.\n\nVeuillez accepter ce cadeau en guise de remerciement."
 strange_worlds.3025.a: "Merci infiniment"
 strange_worlds.3030.name: "[event_target:caravaneer_home_country.GetName]"
 strange_worlds.3030.desc: "Les [Owner.GetSpeciesNamePlural] se sont occupés de l'§Yextorqueur§! disparu ? Beau travail ! Cet imbécile était une vraie plaie qui ne racontait que des inepties embarrassantes. Il en était à sa cinquième fois. Honnêtement, nous sommes ravis qu'il ne soit plus là.\nAcceptez ce cadeau en guise de remerciement. C'est une affaire en or."
 strange_worlds.3030.a: "Merci infiniment"
 strange_worlds.3040.name: "Ce que nous avons laissé derrière nous"
 strange_worlds.3040.desc: "Notre poste d'observation au-dessus de §Y[event_target:pre_ftl_planet.GetName]§! a signalé la disparition de caisses de ressources après une étude géologique à la surface.\n\nNous avons suivi les traqueurs placés dans les caisses et constaté qu'elles étaient désormais entre les mains des habitants d'un village local.\n\nCes ressources pourraient avoir un impact négatif sur le développement de la société [event_target:pre_ftl_planet.Owner.GetSpeciesName]."
 strange_worlds.3040.a: "C'est tout à fait fâcheux..."
 strange_worlds.3045.name: "Retour à l'envoyeur"
 strange_worlds.3045.desc_common: "Les ressources perdues sur §Y[event_target:pre_ftl_planet.GetName]§! semblent avoir eu un effet particulier sur la culture locale.\n\nLa population pré-PRL a créé des imitations rudimentaires de nos navettes d'observation. Bien sûr, ces « vaisseaux » ne fonctionnent pas, mais ils prouvent que les habitants ont observé le travail de nos chercheurs.\n\nAvec l'aide d'un aîné, les [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] imitent notre procédure d'analyse géologique du sol : ils remplissent nos caisses de terre et de pierres, les chargent à bord de leurs vaisseaux et attendent patiemment."
 strange_worlds.3045.desc_non_homicidal: "\nLes [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] pensent qu'en imitant notre travail, ils obtiendront davantage de ressources. Nous devons intervenir avant que ce comportement n'ait des répercussions sur l'ensemble de la société."
 strange_worlds.3045.desc_homicidal: "\nCe qu'ils font est inutile. Seule la mort les attend."
 strange_worlds.3045.a_normal: "Récupérons nos caisses en cachette"
 strange_worlds.3045.a_megacorp: "Récupérons nos caisses discrètement"
 strange_worlds.3045.b_normal: "Échangeons-leur de la nourriture contre des minéraux"
 strange_worlds.3045.b_megacorp: "Faisons du troc !"
 strange_worlds.3045.c: "Abattons ces êtres primitifs"
 strange_worlds.3045.ct: "Le poste d'observation qui surveille §Y[event_target:pre_ftl_planet.GetName]§! produit désormais $@observation_outpost_crate_minerals_production$ £minerals£§Iminéraux§! pour un coût d'entretien de $@observation_outpost_crate_food_upkeep$ de £food£§Inourriture§!"
 strange_worlds.3050.name: "Absence emplie de ressentiment"
 strange_worlds.3050.desc: "Après avoir récupéré nos caisses perdues sur §Y[event_target:pre_ftl_planet.GetName]§!, les rituels de chargement des « vaisseaux » se sont poursuivis quelque temps, jusqu'à ce que des [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] en colère se retournent contre l'aîné et le jettent à bord d'une de leurs fausses navettes avant d'y mettre le feu.\n\nBien que la population ait repris ses anciennes habitudes, son ressentiment envers les « gens du ciel » perdure."
 strange_worlds.3050.a: "C'est bon à savoir"
 strange_worlds.3060.name: "Service annulé"
 strange_worlds.3060.desc: "La société [event_target:pre_ftl_planet.Owner.GetSpeciesName] pré-PRL se développe, aussi avons-nous décidé d'arrêter d'échanger de la nourriture contre des minéraux par l'intermédiaire de notre poste d'observation.\n\nC'était une expérience intéressante, mais continuer à s'immiscer dans leur civilisation ne ferait qu'augmenter le risque que notre présence ne soit révélée."
 strange_worlds.3060.a: "Une décision tout à fait judicieuse"
 strange_worlds.3060.ct: "Le poste d'observation ne produit plus de minéraux et ne nécessite plus de coût d'entretien en nourriture"
 strange_worlds.3070.name: "Anomalie orbitale"
 strange_worlds.3070.desc: "Notre poste d'observation au-dessus de §Y[event_target:pre_ftl_planet.GetName]§! a soudainement quitté son orbite en raison d'une anomalie gravitationnelle, se retrouvant brièvement dans la basse atmosphère.\n\nNotre équipage est indemne et notre poste a repris sa trajectoire initiale, mais nous craignons que les [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] nous aient détectés depuis la surface.\n\nL'avenir nous dira si les habitants ont remarqué notre présence et dans quelle mesure cela affectera leur société."
 strange_worlds.3070.a: "Poursuivons donc leur observation"
 strange_worlds.3075.name: "Échelles vers les cieux"
 strange_worlds.3075.desc_common: "Une technologie primitive de capture d'images a capté notre poste d'observation lorsqu'il était en orbite basse de §Y[event_target:pre_ftl_planet.GetName]§!. Outre les témoignages, ces images ont incité certaines nations à construire des « échelles vers les cieux » afin d'étudier le phénomène.\n\nIl s'agit d'une entreprise futile, mais la concurrence entre les nations alimente les troubles. Alors que la course à la première « échelle » bat son plein, de vieilles tensions sont ravivées par la fierté nationale et le manque de ressources."
 strange_worlds.3075.desc_non_homicidal: "\nEn discréditant les preuves de notre existence en leur possession, nous pourrons peut-être désamorcer les tensions avant que la situation ne devienne incontrôlable.\n\nToutefois, ce bras de fer diplomatique entre les différentes forces politiques pré-PRL pourrait faire l'objet d'une recherche sociologique intéressante, malgré le risque d'escalade violente."
 strange_worlds.3075.desc_homicidal: "\nLe chaos ainsi créé pourrait constituer un excellent sujet de recherche."
 strange_worlds.3075.a: "Discréditons les preuves de notre existence"
 strange_worlds.3075.b: "Poursuivons donc leur observation"
 strange_worlds.3075.b_ct: "La £society£§Yrecherche sociétale§! suscitée par le poste d'observation est doublée"
 strange_worlds.3080.name: "La vérité est ailleurs"
 strange_worlds.3080.desc: "Nos agents ont discrédité les preuves de notre existence sur §Y[event_target:pre_ftl_planet.GetName]§!.\n\nL'authenticité des images a été mise à mal, la crédibilité des témoins anéantie et la construction des « échelles vers les cieux » stoppée. Les nations jusqu'alors divisées ont eu honte de leur naïveté et ont déclaré leur engagement envers la rationalité et les méthodes scientifiques.\n\nLes sites de construction des échelles ont été transformés en centres d'enseignement supérieur, et un nouveau groupe de savants s'est réuni pour briser les mythes de la « citadelle céleste »."
 strange_worlds.3080.a: "$FASCINATING$"
 strange_worlds.3080.a_ct: "La [event_target:pre_ftl_country.GetName] avance de 50% vers le prochain âge.\nLa [event_target:pre_ftl_country.GetName] devient matérialiste."
 strange_worlds.3085.name: "La grande guerre des échelles"
 strange_worlds.3085.desc: "Les tensions entre les nations pré-PRL de §Y[event_target:pre_ftl_planet.GetName]§! qui tentaient de construire des « échelles vers les cieux » ont dégénéré en une véritable guerre mondiale. Après deux années de combats pour des ressources qui s'amenuisaient, la « grande guerre des échelles » a enfin cessé.\n\nLe traité de paix signé prévoit notamment la formation d'un front unifié contre un ennemi commun, la « citadelle céleste ». Alors que les [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] reconstruisent leur monde ravagé par la guerre, leur paranoïa et leur haine de l'inconnu rendront nos futures interactions encore plus difficiles."
 strange_worlds.3085.a: "C'est un problème pour les nous du futur"
 strange_worlds.3085.a_ct: "La £society£§Yrecherche sociétale§! suscitée par le poste d'observation revient à la normale"
 create_hibernators_pops_ct: "Crée $@hibernators_pops_created|*0$ £job_pre_sapient£pops préconscientes ayant le trait §Y$trait_seasonal_dormancy$§!"
 pm_bleeding_planet: "Monde hémorragique"
 pm_bleeding_planet_desc: "Le sol saigne. Prudence est de mise en creusant sous les colons.\n"
 pm_contruction_coagulate: "Coagulum de construction"
 pm_contruction_coagulate_desc: "Le sol saigne en présence des colons. La substance visqueuse agit comme une colle naturelle mais dangereuse.\n"
 pm_hemosymbiosis: "Symbiose sanguine"
 pm_hemosymbiosis_desc: "L'étrange substance qui s'échappe de l'intérieur de la planète affecte le développement. Le temps de construction et l'extraction des ressources sont réduits au détriment du développement de la colonie.\n"
 pm_parasitic_production: "Production parasitaire"
 pm_parasitic_production_desc: "Nous avons modifié les organismes parasites de cette planète pour augmenter la productivité de nos ouvriers.\n"
 pm_frying_fauna: "Créatures électrocutées"
 pm_frying_fauna_desc: "Les créatures géantes de ce monde prospèrent dans des conditions optimales. Leurs enzymes digestives uniques sont utiles pour raffiner des alliages."
 pm_frying_fauna_machine: "$pm_frying_fauna$"
 pm_frying_fauna_machine_desc: "$pm_frying_fauna_desc$"
 pm_frying_fauna_2: "$pm_frying_fauna$"
 pm_frying_fauna_2_desc: "Les collecteurs électriques font des créatures géantes de ce monde une source constante de nutriments."
 pm_frying_fauna_2_machine: "$pm_frying_fauna$"
 pm_frying_fauna_2_machine_desc: "$pm_frying_fauna_2_desc$"
 pm_catalytic_excrement: "Excréments catalytiques"
 pm_catalytic_excrement_ct: "Les créatures géantes de ce monde prospèrent dans des conditions optimales. Leurs enzymes digestives uniques sont utiles pour raffiner des alliages."
 pm_strange_sandstorm: "Mystérieuses tempêtes de sable"
 pm_strange_sandstorm_ct: "Un étrange phénomène lié aux sables de la planète affecte les opérations de cette colonie."
 pm_perpetual_lightning: "Foudre éternelle"
 pm_perpetual_lightning_desc: "Les cristaux radioactifs mis au jour lors de nos opérations de terraformation ont créé les conditions idéales pour la formation d'orages incessants sur toute la planète."
 pm_dark_matter_geyser: "Geyser de matière noire"
 pm_dark_matter_geyser_desc: "La planète est inondée de matière noire."
 pm_population_quarantine: "Population en quarantaine"
 pm_population_quarantine_desc: "La population est en quarantaine pour la durée de l'étude des effets de la pétrification."
 pm_dark_matter_statue: "Statues de matière noire"
 pm_dark_matter_statue_desc: "La planète est jonchée de coquilles de matière noire cristallisée. Ces vestiges sinistres d'anciens habitants offrent des possibilités de recherche."
 pm_raining_corpses: "Pluie de cadavres"
 pm_raining_corpses_desc: "Les nuages denses qui servaient autrefois de cimetière à une race alien s'amincissent et leur contenu tombe à la surface de la planète."
 pm_raining_corpses_tt: "Prod. d'£minor_artifacts£artefacts mineurs par les £pop_cat_worker£ouvriers"
 pm_raining_corpses_no_ancrel: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_desc: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_tt: "Prod. de £consumer_goods£biens de consommation par les £pop_cat_worker£ouvriers"
 pm_revolting_pests: "Bêtes répugnantes"
 pm_revolting_pests_desc: "Les animaux de cette planète sont à la fois fascinants et écoeurants. Il est recommandé de ne pas s'en approcher."
 pm_gaseous_fauna: "Créatures gazières"
 pm_gaseous_fauna_desc: "Une espèce domestiquée de la faune locale est devenue une source de divertissement et de sécrétions gazeuses pour les habitants de la planète."
 pm_gaseous_fauna_ct: "Toutes les £pop£pops produisent §G$@gaseous_fauna_exotic_gases_production$§! £exotic_gases£§Igaz exotiques§!"
 pm_urban_privilege_regular: "Privilège urbain"
 pm_urban_privilege_regular_desc: "Le fait de prendre parti pour les districts urbains dans un conflit local a suscité la colère des districts ruraux."
 pm_urban_privilege_broken_shackles: "$pm_urban_privilege_regular$"
 pm_urban_privilege_broken_shackles_desc: "$pm_urban_privilege_regular_desc$"
 pm_rural_privilege_regular: "Privilège rural"
 pm_rural_privilege_regular_desc: "Le fait de prendre parti pour les districts ruraux dans un conflit local a suscité la colère des districts urbains."
 pm_rural_privilege_broken_shackles: "$pm_rural_privilege_regular$"
 pm_rural_privilege_broken_shackles_desc: "$pm_rural_privilege_regular_desc$"
 pm_peacekeeper_deployment: "Déploiement de pacificateurs"
 pm_peacekeeper_deployment_desc: "Nous avons envoyé des forces de l'ordre supplémentaires afin de résoudre les conflits interdistricts."
 bacterial_drive_modifier_desc: "La présence de probiotiques génétiquement modifiés dans l'eau incite les habitants à poursuivre un objectif unique et commun."
 pm_bd_reproduction: "Moteur bactérien : reproduction"
 pm_bd_reproduction_desc: "$bacterial_drive_modifier_desc$"
 pm_bd_strength: "Moteur bactérien : force"
 pm_bd_strength_desc: "$bacterial_drive_modifier_desc$"
 pm_bd_creativity: "Moteur bactérien : créativité"
 pm_bd_creativity_desc: "$bacterial_drive_modifier_desc$"
 ladder_wars_pre_ftl: "Héritage de la guerre des échelles"
 ladder_wars_pre_ftl_desc: "Ce monde déchiré par la guerre est en train de se reconstruire et la paranoïa excessive de sa population rend les interactions extrêmement difficiles."
 living_metal_mega_construction_insight: "Connaissance des mégaconstructions de métal vivant"
 living_metal_mega_construction_insight_desc: "La découverte de l'artefact de métal vivant nous a permis de mieux comprendre la conception des mégastructures."
 living_metal_mega_construction_insight_ct: "Coût de base du décret Mégaconstructions de métal vivant : §G-50%§!"
 d_coagulated_landscape: "Paysage coagulé"
 d_coagulated_landscape_desc: "Une substance visqueuse suinte de la surface de la planète et se solidifie en un matériau dangereux presque impénétrable. Ce phénomène laisse peu de place à la construction de bâtiments sûrs."
 d_shimmering_structure: "Structure oscillante"
 d_shimmering_structure_desc: "Une immense structure d'origine inconnue qui apparaît et disparaît sans cesse."
 d_geothermal_hotspot: "Centre géothermique"
 d_geothermal_hotspot_desc: "Cette planète dispose d'un étonnant site géothermique qui fournit à la fois de l'énergie et des possibilités de recherche."
 d_ancient_cloaking_array: "Champ d'occultation ancien"
 d_ancient_cloaking_array_desc: "Cette colonie est protégée par un champ d'occultation ancien, la rendant difficile à attaquer. Les colons se sentent en sécurité ici."
 d_psionic_sands: "Sables psioniques"
 d_psionic_sands_desc: "Les sables de cette planète contiennent de grandes quantités de zro, avec lequel il est possible de communiquer."
 d_mountains_of_steel: "Montagnes d'acier"
 d_mountains_of_steel_desc: "Formées par la chaleur extrême de la terraformation, ces immenses montagnes sont riches en ressources."
 d_lava_tubes: "Tunnels de lave"
 d_lava_tubes_desc: "Le magma qui s'écoule ici a créé de profonds tunnels riches en minéraux. Ces gisements représentent une opportunité lucrative pour l'exploitation minière."
 d_lava_tubes_ct: "$t$Coût d'entretien en £energy£ des [miner.GetIcon]mineurs : §R+$@lava_tubes_mining_job_upkeep$§!"
 d_lava_tubes_ct_short: "Coût d'entretien en £energy£ des [miner.GetIcon]mineurs : §R+$@lava_tubes_mining_job_upkeep$§!"
 d_hydroactive_eggs: "OEufs hydroactifs"
 d_hydroactive_eggs_desc: "L'eau abondante permet à la faune locale de se reproduire rapidement."
 d_explosive_atmosphere: "Atmosphère explosive"
 d_explosive_atmosphere_desc: "La forte concentration de particules volatiles dans l'air rend l'atmosphère de cette planète hautement inflammable."
 d_explosive_atmosphere_ct: "$t$Prod. de £volatile_motes£§Yparticules volatiles§! des [mote_harvester.GetIcon]collecteurs de particules : §G+50%§!"
 d_explosive_atmosphere_ct_short: "Prod. de £volatile_motes£§Yparticules volatiles§! des [mote_harvester.GetIcon]collecteurs de particules : §G+50%§!"
 d_blue_lava: "Lave bleue"
 d_blue_lava_desc: "Nos opérations de terraformation ont déclenché une réaction au plus profond de la planète entre de riches gisements de gaz et d'alliages, faisant apparaître une lave d'un bleu envoûtant à la surface."
 d_crystaline_growths: "Excroissances cristallines"
 d_crystaline_growths_desc: "Cette planète recèle une grande quantité d'amas de cristaux que nous pouvons récolter et utiliser."
 d_bogplants: "Plantes marécageuses"
 d_bogplants_desc: "Les marais très acides abritent une espèce végétale unique qui sécrète des gaz exotiques lorsqu'elle se nourrit."
 d_liquid_dark_matter: "Matière noire liquide"
 d_liquid_dark_matter_desc: "Un étrange geyser s'est effondré et a formé un lac de matière noire liquide."
 d_space_junk_hazards: "Déchets spatiaux dangereux"
 d_space_junk_hazards_desc: "Les débris spatiaux en orbite sont dangereux pour les navettes, mais également pour les bâtiments à la surface de la planète s'ils entrent dans son atmosphère."
 trait_inner_darkness: "Noirceur intérieure"
 trait_inner_darkness_desc: "Le corps des membres de cette espèce a été modifié après avoir été exposé à la matière noire, et ils libèrent désormais d'infimes quantités de particules non baryoniques à intervalles réguliers. Toutefois, ce changement a également réduit leur espérance de vie."
 trait_inner_darkness_tt: "(£sr_dark_matter£) $produced_per_pop_group_unit$ £pop£pops : §G+$@inner_darkness_dark_matter_production$§!"
 trait_geleboric_mutations: "Mutations geleboriques"
 trait_geleboric_mutations_desc: "La physiologie de cette espèce a radicalement changé à la suite d'une réaction fâcheuse lors d'une expérience."
 trait_psionic_ephapse: "Éphapse psionique"
 trait_psionic_ephapse_desc: "Après une exposition prolongée à des bactéries altérant l'esprit, le système digestif des membres de cette espèce s'est mis à produire des probiotiques psioniques qui facilitent la communication télépathique entre eux."
 trait_psionic_ephapse_modifier_tooltip: "Si l'espèce a le trait §Y$trait_psionic$§! ou §Y$trait_latent_psionic$§! :\n$bureaucrat_jobs_bonus_workforce_mult$: §G+5%§!\n$researcher_jobs_bonus_workforce_mult$: §G+5%§!"
