 MIASMA_LAUNCHER_DESC: "Cette arme biologique utilise une capsule de gestation dans laquelle se trouve une progéniture partiellement formée et explosive qui peut être tirée comme un missile à tête chercheuse. Une fois séparée de sa capsule, la progéniture se dirige instinctivement vers la cible choisie et explose à l'impact."
 MIASMA_LAUNCHER_SMALL: "$MIASMA_LAUNCHER$"
 MIASMA_LAUNCHER_MEDIUM: "$MIASMA_LAUNCHER$"
 MIASMA_LAUNCHER_LARGE: "$MIASMA_LAUNCHER$"
 MIASMA_LAUNCHER_EXTRA_LARGE: "$MIASMA_LAUNCHER$"
