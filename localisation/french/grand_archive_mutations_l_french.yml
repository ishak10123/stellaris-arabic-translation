 UV_EYE_BEAM_MEDIUM: "$UV_EYE_BEAM$"
 UV_EYE_BEAM_LARGE: "$UV_EYE_BEAM$"
 UV_EYE_BEAM_EXTRA_LARGE: "$UV_EYE_BEAM$"
 XRAY_EYE_BEAM: "Rayon oculaire X"
 XRAY_EYE_BEAM_DESC: "Des modifications supplémentaires de la rétine permettent aux créatures spatiales de tirer des rayons laser encore plus destructeurs avec des longueurs d'onde plus courtes."
