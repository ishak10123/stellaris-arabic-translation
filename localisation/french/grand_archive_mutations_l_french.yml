 ANTIMATTER_LAUNCHER_LARGE: "$ANTIMATTER_LAUNCHER$"
 ANTIMATTER_LAUNCHER_EXTRA_LARGE: "$ANTIMATTER_LAUNCHER$"
 QUANTUM_LAUNCHER: "Lanceur quantique"
 QUANTUM_LAUNCHER_DESC: "Les améliorations apportées au processus de gestation permettent de créer des projectiles quantiques. Ces missiles vivants puisent leur énergie du vide d'un point zéro pour déployer une incroyable puissance de destruction."
