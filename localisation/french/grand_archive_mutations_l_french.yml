 MOLECULAR_DISRUPTOR: "Disrupteur moléculaire"
 MOLECULAR_DISRUPTOR_DESC: "Ces armes biologiques contournent les défenses conventionnelles de la cible en brisant les liens moléculaires au niveau atomique, provoquant ainsi des dégâts critiques au niveau de la coque."
