 MEGA_BOMBARD_SMALL: "$MEGA_BOMBARD$"
 MEGA_BOMBARD_MEDIUM: "$MEGA_BOMBARD$"
 MEGA_BOMBARD_LARGE: "$MEGA_BOMBARD$"
 MEGA_BOMBARD_EXTRA_LARGE: "$MEGA_BOMBARD$"
 GIGA_BOMBARD: "Gigabombardement"
 GIGA_BOMBARD_DESC: "Les modifications apportées au rainurage organique permettent à cette arme de bombardement de tirer des projectiles encore plus gros et plus rapides, rendant les attaques d'artillerie extrêmement puissantes."
 GIGA_BOMBARD_SMALL: "$GIGA_BOMBARD$"
 GIGA_BOMBARD_MEDIUM: "$GIGA_BOMBARD$"
 GIGA_BOMBARD_LARGE: "$GIGA_BOMBARD$"
