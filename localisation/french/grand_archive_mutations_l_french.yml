 ION_MOLECULAR_DISRUPTOR_MEDIUM: "$ION_MOLECULAR_DISRUPTOR$"
 ION_MOLECULAR_DISRUPTOR_LARGE: "$ION_MOLECULAR_DISRUPTOR$"
