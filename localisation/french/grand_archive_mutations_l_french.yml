 TACHYON_BEAM_MEDIUM: "$TACHYON_BEAM$"
 TACHYON_BEAM_LARGE: "$TACHYON_BEAM$"
 TACHYON_BEAM_EXTRA_LARGE: "$TACHYON_BEAM$"
 SHARP_EYE_LASER: "Laser de précision"
 SHARP_EYE_LASER_DESC: "Inspirée du laser coupant des drones miniers, cette mutation permet de générer un rayon oculaire capable de perforer des coques de vaisseaux à courte portée."
