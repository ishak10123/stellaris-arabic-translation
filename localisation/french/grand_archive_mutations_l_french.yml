 GAMMA_EYE_BEAM: "Rayon oculaire gamma"
 GAMMA_EYE_BEAM_DESC: "Une restructuration complète de l'organe oculaire a permis de créer un rayon d'une puissance et d'une capacité de destruction inégalées."
