 RED_EYE_BEAM: "Rayon oculaire rouge"
 RED_EYE_BEAM_DESC: "Une fois améliorées, les lentilles des créatures sont capables d'émettre des rayons laser rouges de haute intensité. D'autres modifications de leur génome entraînent la formation spontanée d'yeux supplémentaires."
 RED_EYE_BEAM_SMALL: "$RED_EYE_BEAM$"
 RED_EYE_BEAM_MEDIUM: "$RED_EYE_BEAM$"
 RED_EYE_BEAM_LARGE: "$RED_EYE_BEAM$"
