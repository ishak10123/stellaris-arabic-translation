 PROTON_THROWER: "Lanceur de protons"
 PROTON_THROWER_DESC: "Cette mutation permet à la créature de générer une forte concentration de protons sous la forme d'un puissant projectile. Cependant, son chargement peut prendre beaucoup de temps."
 PROTON_THROWER_SMALL: "$PROTON_THROWER$"
 PROTON_THROWER_MEDIUM: "$PROTON_THROWER$"
 PROTON_THROWER_LARGE: "$PROTON_THROWER$"
