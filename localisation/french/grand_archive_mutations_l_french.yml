 NEUTRON_THROWER_SMALL: "$NEUTRON_THROWER$"
 NEUTRON_THROWER_MEDIUM: "$NEUTRON_THROWER$"
 NEUTRON_THROWER_LARGE: "$NEUTRON_THROWER$"
 NEUTRON_THROWER_EXTRA_LARGE: "$NEUTRON_THROWER$"
 BIO_DISINTEGRATOR: "Biodésintégrateur"
 BIO_DISINTEGRATOR_DESC: "Inspirée des désintégrateurs de matière des Spontanés, cette arme biologique permet à la créature de désintégrer son adversaire."
