 BLUE_EYE_BEAM: "Rayon oculaire bleu"
 BLUE_EYE_BEAM_DESC: "Le perfectionnement génétique de la rétine permet aux organes oculaires de projeter un rayon d'énergie bleue plus puissant."
 BLUE_EYE_BEAM_SMALL: "$BLUE_EYE_BEAM$"
 BLUE_EYE_BEAM_MEDIUM: "$BLUE_EYE_BEAM$"
 BLUE_EYE_BEAM_LARGE: "$BLUE_EYE_BEAM$"
 BLUE_EYE_BEAM_EXTRA_LARGE: "$BLUE_EYE_BEAM$"
 UV_EYE_BEAM: "Rayon oculaire UV"
 UV_EYE_BEAM_DESC: "Les projecteurs UV protègent la rétine afin d'émettre un rayon laser plus précis et destructeur."
