 automodding_trait_cyborg_tooltip: "$automodding_trait_tooltip_all$\n\n§Y$trait_auto_mod_cyborg$§! choisit des modificateurs dans la ['concept_automodding_cyborg',liste de traits cybernétiques à modification automatique]"
 trait_auto_mod_biological: "Génomique professionnelle"
 trait_auto_mod_biological_desc: "Les chaînes génétiques avancées comprennent des déclics épigénétiques qui s'adaptent aux exigences professionnelles, optimisant de manière dynamique l'expression des gènes en fonction de l'environnement de travail de l'hôte."
 trait_auto_mod_cyborg: "Améliorations universelles"
 trait_auto_mod_cyborg_desc: "Les ports universels à connexion rapide permettent de remplacer les améliorations à volonté, en adaptant leurs capacités aux exigences opérationnelles actuelles."
 trait_auto_mod_robotic: "Cadres adaptatifs"
 trait_auto_mod_robotic_desc: "Ce système reconfigure dynamiquement le matériel pour répondre aux exigences opérationnelles. Ainsi, les performances sont optimisées pour chaque tâche assignée."
 trait_auto_mod_overtuned: "Excellence éphémère"
 trait_auto_mod_overtuned_desc: "Les déclics épigénétiques avancés améliorent les performances physiques et cognitives sur le lieu de travail, mais réduisent considérablement l'espérance de vie. Après tout, il est beaucoup plus ennuyeux de s'éteindre lentement que de s'éteindre tout de suite."
 concept_automodding_trait: "Trait à modification automatique"
 concept_automodding_traits: "Traits à modification automatique"
 concept_automodding_trait_desc: "- Les modificateurs sont automatiquement combinés à une liste prédéfinie de traits correspondant à l'emploi en cours.\n- Les effets des traits s'ajustent selon le pourcentage de groupes de pops possédant le trait.\n- §HPops§! ayant des §Ytraits à modification automatique§! contrôlés chaque mois, par colonie : §G100§!.\n- Les £building£bâtiments de développement et d'assemblage des pops augmentent le nombre de £pop£§Hpops automatiquement modifiées§! mis à jour par mois."
 concept_automodding_biological: "Liste de traits biologiques à modification automatique"
 concept_automodding_biological_desc: "- ['trait:trait_traditional']\n- ['trait:trait_thrifty']\n- ['trait:trait_intelligent']\n- ['trait:trait_industrious']\n- ['trait:trait_agrarian']\n- ['trait:trait_ingenious']\n- ['trait:trait_charismatic']"
 concept_vocational_traits: "Traits professionnels"
 concept_vocational_traits_desc: "Les traits professionnels sont des traits d'espèce pouvant être modifiés automatiquement par le trait ['trait:trait_auto_mod_biological'].$NEW_LINE$$concept_automodding_biological_desc$"
 concept_fleeting_excellence_traits: "Traits $trait_auto_mod_overtuned$"
 concept_fleeting_excellence_traits_desc: "Les traits d'excellence éphémère sont des traits d'espèce pouvant être modifiés automatiquement par le trait ['trait:trait_auto_mod_overtuned'].$NEW_LINE$$concept_automodding_overtuned_desc$"
