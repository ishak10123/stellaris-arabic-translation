 pft_cyber_creed_war: "$CYBERCREED_war$"
 pft_cyber_creed_war_desc: "L'Ordre du Temple de l'acier protège les corps sacrés, la cybernétique et les âmes. Leurs améliorations renforcent l'entraînement et les prouesses au combat.\n\n§LÉthique spiritualiste.§!"
