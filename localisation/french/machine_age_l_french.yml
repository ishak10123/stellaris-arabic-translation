 machine_age.1070.d.tooltip: "$machine_age.1070.intro$ à la construction de bâtiments et aux chantiers navals."
 machine_age.1070.e: "La dîme de l'armée"
 machine_age.1070.e.tooltip: "$machine_age.1070.intro$ au service militaire."
 machine_age.1070.f: "La dîme de la marine"
 machine_age.1070.f.tooltip: "$machine_age.1070.intro$ au service naval."
 machine_age.1070.g: "La dîme de l'amélioration"
 machine_age.1070.g.tooltip: "$machine_age.1070.intro$ à la recherche liée à la cybernétique divine."
 machine_age.1070.h: "La dîme du savoir"
 machine_age.1070.h.tooltip: "$machine_age.1070.intro$ à la recherche liée aux secrets de l'univers."
 machine_age.1070.i: "La dîme du travail"
 machine_age.1070.i.tooltip: "$machine_age.1070.intro$ à la production de produits de nécessité."
 machine_age.1070.j: "La dîme de la richesse"
 machine_age.1070.j.tooltip: "$machine_age.1070.intro$ au commerce."
 machine_age.1070.k: "La dîme de la fabrication"
 machine_age.1070.k.tooltip: "$machine_age.1070.intro$ à la fabrication de produits de qualité."
 machine_age.1075.name: "Sang et circuits"
 machine_age.1075.desc: "L'heure de la fusion divine est enfin venue.\n\nIl est temps de construire des §Ycentres d'amélioration§! sacrés sur nos mondes pour commencer le processus."
 machine_age.1075.a: "$machine_age.1090.pray$"
 machine_age.1075.a.tooltip: "L'amélioration cybernétique complète a commencé pour les fidèles. Toutes les autres activités du Conclave s'arrêteront jusqu'à ce que la fusion divine soit achevée.\n\n§RAction requise :§!\nConstruire un $building_augmentation_center$ pour relancer la situation §Y$situation_cybernetic_creed_cyberization$§!."
 machine_age.1090.name: "Le futur de la chair"
 machine_age.1090.desc: "Au terme du voyage divin, nos vaisseaux atteignent enfin la fusion sacrée de la machine et de la [Owner.Species.GetFleshTypeCyberCreed]. La dernière étape pour les fidèles est l'installation des améliorations sacrées."
 machine_age.1090.construction: "$machine_age.1090.desc$ §Y$CYBERCREED_construction$§! exige que nos corps soient transformés en instruments divins.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.war: "$machine_age.1090.desc$ §Y$CYBERCREED_war$§! exige que les fidèles soient transformés en armes sacrées.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.research: "$machine_age.1090.desc$ §Y$CYBERCREED_research$§! révélera les secrets de l'univers grâce à une population d'esprits en réseau.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.labor: "$machine_age.1090.desc$ §Y$CYBERCREED_labor$§! promet que nous ne manquerons jamais de rien.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.pray: "La fusion est divine. Les améliorations sont des actes de dévotion."
 machine_age.1090.a: "[GetCyberCreed] instaurera une nouvelle ère"
