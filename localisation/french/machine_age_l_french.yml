 the_synth_queen_chain_title: "Cetana : la reine synthétique"
 the_synth_queen_chain_desc: "La mystérieuse Cetana s'est manifestée, prêchant un salut énigmatique.\nQuels desseins manigance-t-elle derrière ses belles paroles ?\n\n§LLes événements et projets spéciaux liés à Cetana vous donneront des informations vous permettant de progresser.§!"
