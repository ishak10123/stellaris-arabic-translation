 advanced_logic_crisis_description: "$menace_crisis_description_intro$\n\nLes empires déchus possèdent des connaissances que nous recherchons, mais ils se reposent sur leurs lauriers. Notre devoir est de les surpasser, à tout prix."
 advanced_logic_crisis_howto_title: "Logique et thèses"
 advanced_logic_crisis_howto: "Accomplir des §Hobjectifs de crise§! génère de la £advanced_logic£§Hlogique avancée§! servant à libérer le potentiel technologique de notre empire. Si nous voulons surpasser les empires déchus, nous devrons faire des recherches sur les §Hthèses§! et réécrire les lois de l'univers."
