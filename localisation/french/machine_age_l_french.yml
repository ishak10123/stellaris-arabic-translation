 machine_age.govswapnotice: "Afin d'accompagner au mieux la fusion de nos corps, notre gouvernement adoptera pleinement la cybernétique et sera restructuré. La §Y[Root.Owner.GetName]§! sera créée."
 machine_age.democraticgovtooltip: "Notre autorité est devenue une §Y['concept_auth_cyber_creed_democratic',améliocratie démocratique]§! cybernétique."
