 cybercreed_faithful_unrest_desc: "La décision des technophants de supprimer les croyances a provoqué une certaine agitation chez les plus zélés."
 cybercreed_unified_faith: "Foi unifiée"
 cybercreed_unified_faith_desc: "Les technophants ont réussi à unifier la foi."
 cybercreed_moderates_ignored: "Modérés ignorés"
 cybercreed_moderates_ignored_desc: "Les technophants ont ignoré les appels à la restriction et autorisent les différentes croyances à poursuivre leurs pratiques."
 cybercreed_creeds_absorbed: "Croyances absorbées"
 cybercreed_creeds_absorbed_desc: "Les technophants ont répondu à l'appel à l'absorption des croyances pour établir une foi unifiée."
 cybercreed_forced_cyberization: "Amélioration forcée"
 cybercreed_forced_cyberization_desc: "Les non croyants de la société n'apprécient pas d'être contraints d'accepter la fusion sacrée."
 cybercreed_allowed_non_cyborgs: "Liberté de choisir"
 cybercreed_allowed_non_cyborgs_desc: "Les non croyants de notre société ont été autorisés à refuser les améliorations divines. Cela a suscité de la sympathie à l'égard de la foi."
 cyber_creed_no_creed_robot_points_modifier: "Cybernétique sans croyance"
 cyber_creed_no_creed_robot_points_modifier_desc: "L'analyse des améliorations divines utilisées par les croyances a permis de mieux comprendre la conception cybernétique."
 elevated_creed_desc: "est la croyance que nous avons choisie."
 cybernetic_creed_construction_robot_points_modifier: "Confrérie choisie"
