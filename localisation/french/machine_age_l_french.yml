 tech_cosmogenesis_world_desc: "$menp_cosmo_features_1_desc$"
 TECH_UNLOCK_COSMOWORLD_CONSTRUCTION_TITLE: "§HPermet la mégastructure§! tour synaptique"
 TECH_UNLOCK_COSMOWORLD_CONSTRUCTION_DESC: "§HTour synaptique§!\n$menp_cosmo_features_1_desc$"
 tech_cosmogenesis_thesis: "Thèse sur l'infini appliqué"
 tech_cosmogenesis_thesis_desc: "En modifiant davantage les règles de la réalité, nous pouvons mieux surveiller ses réactions. À cette échelle, les effets sont encore difficiles à prévoir et pourraient affecter toute la galaxie."
 cosmogenesis_thesis_tech_title: "Tentative de modification des §Hrègles de la réalité§!"
 cosmogenesis_thesis_tech_desc: "Ces expériences dangereuses auront des résultats imprévisibles."
