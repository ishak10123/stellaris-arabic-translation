 cybercreed_tithe_research: "La dîme du savoir"
 cybercreed_tithe_research_desc: "$machine_age.1070.intro$ à la recherche liée aux secrets de l'univers."
 cybercreed_tithe_labor: "La dîme du travail"
 cybercreed_tithe_labor_desc: "$machine_age.1070.intro$ à la production de produits de nécessité."
 cybercreed_tithe_wealth: "La dîme de la richesse"
 cybercreed_tithe_wealth_desc: "$machine_age.1070.intro$ au commerce."
 cybercreed_tithe_craft: "La dîme de la fabrication"
 cybercreed_tithe_craft_desc: "$machine_age.1070.intro$ à la fabrication de produits de qualité."
 cyber_creed_flesh_rock: "pierre"
 cyber_creed_flesh_plant: "fibre"
 cyber_creed_flesh_arthropod: "chitine"
 cyber_creed_flesh_default: "chair"
 cyber_creed_flesh_machine: "structure"
 building_amphitheater_of_the_mind: "Amphithéâtre de l'esprit"
 building_amphitheater_of_the_mind_desc: "Ce sanctuaire de traitement localisé permet au Choeur de l'esprit semi-connecté de discuter, de partager et d'explorer les secrets du plan matériel à la vitesse de la lumière."
 building_grand_concert_hall_of_the_mind: "Grande salle de concert de l'esprit"
 building_grand_concert_hall_of_the_mind_desc: "Le système de communication de pointe de ces salles de résonance permet au Choeur de l'esprit de communier à la recherche de la divinité. Avec le cyberware, leur chant dévoilera les mélodies cachées de l'univers."
 building_forge_of_the_fellowship: "Forge de la Confrérie"
 building_forge_of_the_fellowship_desc: "La première forge de la Confrérie du marteau produit des matériaux de construction de la plus haute qualité. Les marteaux chantent tandis que les fidèles accomplissent leur travail divin."
 building_grand_forge_of_the_fellowship: "Grande forge de la Confrérie"
 building_grand_forge_of_the_fellowship_desc: "Loin des couloirs de la grande forge, les fidèles peuvent entendre la litanie des outils infatigables de la Confrérie. La nuit, l'éclat de la cathédrale en fonte éclipse les étoiles du ciel, tout comme nos étincelles sacrées brillent pour le Divin."
 building_battlement_of_steel: "Remparts d'acier"
 building_battlement_of_steel_desc: "Cette église fortifiée abrite l'armurerie et les terrains d'entraînement de l'Ordre du Temple de l'acier. Ils veillent à la protection de notre chair divine."
 building_grand_battlements_of_steel: "Grands remparts d'acier"
 building_grand_battlements_of_steel_desc: "Que les magnifiques murs de cette cathédrale forteresse ne s'écroulent jamais. Son armurerie regorge d'implants consacrés de l'Ordre du Temple de l'acier, chacun attendant son champion. Dans ces salles, la divinité se trouve à la jonction de la chair et de l'acier."
 building_sanctuary_of_toil: "Sanctuaire du labeur"
 building_sanctuary_of_toil_desc: "Ce sanctuaire coordonne, répare et rajeunit la chair et les améliorations de la Communauté du labeur."
 building_grand_cathedral_of_toil: "Grande cathédrale du labeur"
 building_grand_cathedral_of_toil_desc: "Bénis soient ceux qui subviennent aux besoins des fidèles. Que leurs âmes meurtries reposent dans la grande cathédrale du labeur. Ses ateliers et ses centres de coordination guident et réapprovisionnent les fidèles travailleurs et leurs saintes améliorations dans tous leurs devoirs divins."
 building_the_sanctum_of_augmentation: "Sanctuaire de l'amélioration"
 building_the_sanctum_of_augmentation_desc: "Dans l'esprit d'une foi partagée, ce sanctuaire sacré est un symbole d'unité. Dans ces salles consacrées, les fidèles veillent sur les âmes et les améliorations de leurs ouailles."
 building_the_united_sanctum_of_augmentation: "Sanctuaire uni de l'amélioration"
 building_the_united_sanctum_of_augmentation_desc: "Ce sanctuaire majestueux est un témoignage vivant du respect de la fusion la plus sacrée. Dans ses salles consacrées, les fidèles se rassemblent, inébranlables dans leur engagement à faire avancer la noble cause de la fusion divine."
 #Advanced Cyber Creed Authorities
 auth_cyber_creed_democratic: "Améliocratie démocratique"
 auth_cyber_creed_democratic_desc: "Les gouvernements cybernétiques démocratiques disposent de droits de vote sacrés qui permettent aux citoyens améliorés de faire entendre leur voix sur diverses questions politiques, accomplissant ainsi leur communion avec le Divin."
 concept_auth_cyber_creed_democratic: "$auth_cyber_creed_democratic$"
 auth_cyber_creed_oligarchic: "Cyberthéocracie oligarchique"
 auth_cyber_creed_oligarchic_desc: "Les gouvernements cybernétiques oligarchiques disposent d'un groupe privilégié d'individus hautement améliorés qui détiennent le pouvoir politique total et dirigent leur société cybernétique avec une précision inégalée."
 concept_auth_cyber_creed_oligarchic: "$auth_cyber_creed_oligarchic$"
 auth_cyber_creed_dictatorial: "Synthodoxie dictatoriale"
 auth_cyber_creed_dictatorial_desc: "Les gouvernements cybernétiques dictatoriaux choisissent des dirigeants à vie, qui possèdent un contrôle absolu grâce à des implants cybernétiques avancés et dictent le destin de la société."
 concept_auth_cyber_creed_dictatorial: "$auth_cyber_creed_dictatorial$"
 auth_cyber_creed_imperial: "Cybernétat impérial"
 auth_cyber_creed_imperial_desc: "Les gouvernements cybernétiques impériaux ont un dirigeant suprême et un successeur désigné pour assurer la succession du pouvoir. Ils combinent spiritualité et cybernétique avancée pour former un gouvernement inébranlable."
 concept_auth_cyber_creed_imperial: "$auth_cyber_creed_imperial$"
 auth_cyber_creed_corporate: "Corporation technosacrée"
 auth_cyber_creed_corporate_desc: "Les gouvernements cybernétiques de corporation transcendent les fonctions étatiques traditionnelles grâce à des implants avancés et une fusion de la foi et de la technologie afin de profiter d'opportunités financières divines."
 concept_auth_cyber_creed_corporate: "$auth_cyber_creed_corporate$"
 #Advanced Cyber Creed Government Types
 gov_cyber_creed_monarchy: "Souveraineté cybernétique"
 gov_cyber_creed_monarchy_desc: "Ce régime politique est une monarchie techno-spiritualiste dans laquelle le souverain et sa progéniture sont des symboles divins de la fusion sacrée. L'Église soutient directement l'appareil d'État."
 gov_cyber_creed_dictatorship: "Technocratie divine"
 gov_cyber_creed_dictatorship_desc: "Ce régime politique est une dictature techno-spiritualiste, dirigée par un unique individu amélioré se trouvant au sommet d'une structure des pouvoirs hiérarchisée et fondée sur la foi officielle."
 gov_cyber_creed_oligarchy: "Conseil des technophants"
 gov_cyber_creed_oligarchy_desc: "Ce régime politique est une oligarchie techno-spiritualiste, où le poids politique est placé entre les mains des factions religieuses les plus puissantes."
 gov_cyber_creed_democracy: "République transcendée"
 gov_cyber_creed_democracy_desc: "Ce régime politique est une forme de démocratie techno-spiritualiste, où un conseil religieux composé d'individus améliorés supervise le processus démocratique."
 gov_cyber_creed_divine_empire: "Empire divin amélioré"
 gov_cyber_creed_divine_empire_desc: "Ce régime politique est une forme d'autocratie techno-spiritualiste. La foi officielle de l'État imprègne tous les aspects de la vie publique et le peuple voit son dirigeant amélioré comme un dieu vivant infaillible."
 gov_cyber_creed_holy_tribunal: "Tribunal des technophants"
 gov_cyber_creed_holy_tribunal_desc: "Ce régime politique est une forme d'oligarchie techno-spiritualiste dans laquelle un conseil du clergé, guidé par la volonté divine, contrôle tous les mécanismes de l'État."
 gov_cyber_creed_megachurch: "Méga-Église améliorée"
 gov_cyber_creed_megachurch_desc: "Ce régime politique est une forme d'oligarchie reposant sur un mélange de valeurs commerciales et techno-spiritualistes, au sein duquel les postes des ministres ordonnés et des officiers d'entreprise ont été fusionnés."
 gov_cyber_creed_subversive_cult: "Culte mécanique"
 gov_cyber_creed_subversive_cult_desc: "Ce régime politique est un culte religieux s'appuyant sur toutes sortes d'entreprises criminelles cybernétiques pour se maintenir."
 #Advanced Government Edicts
 edict_cybernetic_creed_construction_edict: "Un martèlement vertueux"
 edict_cybernetic_creed_construction_edict_desc: "Pour une société divine, nous devons soutenir pleinement la Confrérie du marteau. Leur travail est la clé d'un avenir qui mérite le Divin."
 edict_cybernetic_creed_war_edict: "La croisade de l'acier"
 edict_cybernetic_creed_war_edict_desc: "Pour nous protéger de ceux qui s'attaquent à notre chair divine, nous devons soutenir pleinement l'Ordre du Temple de l'acier. Lui seul veillera à ce que nos guerriers soient toujours prêts."
 edict_cybernetic_creed_research_edict: "Le chant du savoir"
 edict_cybernetic_creed_research_edict_desc: "Ce n'est qu'à travers un chant du savoir que notre peuple pourra jamais vraiment reconnaître le Divin. Nous devons soutenir notre sage Choeur de l'esprit dans tous ses engagements."
 edict_cybernetic_creed_construction_labor: "La masse travailleuse"
 edict_cybernetic_creed_construction_labor_desc: "Notre véritable force réside dans nos travailleurs. Si nous n'avons pas la force de les éclairer, ils n'auront pas la force de nous porter vers l'avenir."
 edict_cybernetic_creed_general_edict: "Les enseignements de l'harmonie"
 edict_cybernetic_creed_general_edict_desc: "L'unification de l'Église nous a apporté de nombreux enseignements. Elle a rendu notre foi plus forte et plus contemplative que jamais."
 #Intro Events
 machine_age.2150.name: "Les croyances"
 machine_age.2150.desc: "Plusieurs croyances de notre foi, guidées vers les étoiles par le Divin, espèrent exercer leur influence sur le nouveau gouvernement.\n\nToutes bénéficient d'un fort soutien de la part des fidèles et prônent la promotion de leurs membres à des postes de pouvoir afin de répondre aux besoins spirituels de leurs circonscriptions respectives.\n\nSeul l'avenir nous dira si une telle diversité de pressions nous rapprochera du Divin ou nous plongera dans le chaos."
 machine_age.2150.a: "Espérons que c'est positif"
 machine_age.2150.a.tooltip: "§YFactions formées§! :\n- $cyber_creed_labor$\n- $cyber_creed_war$\n- $cyber_creed_research$\n- $cyber_creed_construction$"
 cyber_creed_please_labor: "La croyance §Y$cyber_creed_labor$§! sera satisfaite.\nLes autres croyances seront mécontentes."
 cyber_creed_displease_labor: "La croyance §Y$cyber_creed_labor$§! sera mécontente.\nLes autres croyances seront satisfaites."
 cyber_creed_please_war: "La croyance §Y$cyber_creed_war$§! sera satisfaite.\nLes autres croyances seront mécontentes."
 cyber_creed_displease_war: "La croyance §Y$cyber_creed_war$§! sera mécontente.\nLes autres croyances seront satisfaites."
 cyber_creed_please_construction: "La croyance §Y$cyber_creed_construction$§! sera satisfaite.\nLes autres croyances seront mécontentes."
 cyber_creed_displease_construction: "La croyance §Y$cyber_creed_construction$§! sera mécontente.\nLes autres croyances seront satisfaites."
 cyber_creed_please_research: "La croyance §Y$cyber_creed_research$§! sera satisfaite.\nLes autres croyances seront mécontentes."
 cyber_creed_displease_research: "La croyance §Y$cyber_creed_research$§! sera mécontente.\nLes autres croyances seront satisfaites."
 machine_age.2205.name: "Réécriture de l'histoire"
 machine_age.2205.desc: "L'§YOrdre du Temple de l'acier§! a récemment lancé une campagne visant à omettre toute défaite militaire de nos archives historiques ou religieuses.\n\nLa croyance affirme qu'il s'agit de faits qui démoralisent les militaires et sapent le soutien du peuple. Nos historiens rejettent cette idée et nous rappellent que ceux qui ne connaissent pas l'histoire sont condamnés à la répéter.\n\nDevrions-nous diffuser une version plus positive de notre passé ?"
 machine_age.2205.a: "Pour gagner, il faut avoir une mentalité de gagnant"
 machine_age.2205.a.tooltip: "$cyber_creed_please_war$"
 machine_age.2205.b: "C'est inacceptable, nous devons apprendre de nos erreurs"
 machine_age.2205.b.tooltip: "$cyber_creed_displease_war$"
 machine_age.2210.name: "La flamme s'est éteinte"
 machine_age.2210.desc: "Le Grand forgeron, chef de la §YConfrérie du marteau§!, est brutalement décédé.\n\nMalgré sa franchise et ses opinions tranchées, les membres de la croyance lui vouaient un véritable culte. La Camaraderie a demandé à organiser des funérailles nationales officielles, un honneur normalement réservé à nos dirigeants les plus aimés.\n\nSans surprise, les autres croyances exigent que l'État ne participe pas à l'enterrement du chef spirituel.\n\nComment devons-nous répondre à ces demandes ?"
 machine_age.2210.a: "Organisons des funérailles"
 machine_age.2210.a.tooltip: "$cyber_creed_please_construction$"
 machine_age.2210.b: "Il vaut mieux éviter d'irriter les autres croyances"
 machine_age.2210.b.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2215.name: "Reliques controversées"
 machine_age.2215.desc: "Une équipe d'archéologues a récemment découvert un ancien site religieux. Son existence étant considérée comme un mythe, nous avons dû réviser certains documents historiques de notre foi.\n\nLe fait le plus marquant est que l'iconographie de nombreux artefacts découverts rappelle celle de la §YCommunauté du labeur§!. Cela prouverait que la Communauté est l'interprétation originelle de notre religion, un sujet fortement débattu au sein de notre foi.\n\nReconnaître officiellement cette révélation plairait à la §YCommunauté du labeur§!, mais un silence stratégique réjouirait les autres croyances."
 machine_age.2215.a: "Nous ne devons pas craindre la vérité"
 machine_age.2215.a.tooltip: "$cyber_creed_please_labor$"
 machine_age.2215.b: "Elle était enterrée pour une raison, ignorons-la"
 machine_age.2215.b.tooltip: "$cyber_creed_displease_labor$"
 machine_age.2221.name: "Agent d'infiltration"
 machine_age.2221.desc: "Nous avons découvert que §Y[cyber_creed_undercover_leader.GetName]§! a une relation étroite avec §Y[GetCyberCreed]§!. [cyber_creed_undercover_leader.GetSheHeCap] a non seulement détourné des fonds, mais aussi réaffecté des projets vers la sphère d'influence de la croyance.\n\nLes autres croyances ont manifesté leur colère face à un tel abus de pouvoir de la part de l'administration actuelle et exigent que §Y[cyber_creed_undercover_leader.GetName]§! soit immédiatement démis[cyber_creed_undercover_leader.GetXELead] de ses fonctions.\n\nQue devons-nous faire ?"
 machine_age.2221.a: "Démettons-[cyber_creed_undercover_leader.GetLeLaLead] de ses fonctions"
 machine_age.2221.a.tooltip: "Nous avons démis [cyber_creed_undercover_leader.GetName] de ses fonctions."
 machine_age.2221.b: "Le bien qu'[cyber_creed_undercover_leader.GetSheHe] a fait compense largement ses offenses."
 machine_age.2225.name: "Jubilé du marteau"
 machine_age.2225.desc: "Le voyage jubilaire de la §YConfrérie du marteau§! est sur le point de commencer. D'innombrables fidèles partiront de leurs forges locales pour se rendre à la §Yforge de la Confrérie§! de la capitale.\n\nHistoriquement, cet événement a posé toutes sortes de problèmes logistiques et a souvent donné lieu à des explosions de violence entre la Confrérie et les membres d'autres croyances.\n\nDes appels ont été lancés par les autres croyances et les habitants de la capitale pour annuler cette tradition."
 machine_age.2225.a: "Interdisons ce pèlerinage une bonne fois pour toutes"
 machine_age.2225.a.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2225.b: "La liberté religieuse est un droit"
 machine_age.2225.b.tooltip: "$cyber_creed_please_construction$"
 machine_age.2230.name: "Financement trop faible"
 machine_age.2230.desc: "Récemment, le Grand maître, chef du §YChoeur de l'esprit§!, a publiquement dénoncé la négligence de notre foi en matière de financement de la recherche.\n\nBeaucoup pensent qu'il s'agit d'un stratagème pour que les membres de leur croyance bénéficient de davantage de fonds. Si nous accédons à leurs demandes, d'autres pourraient penser que nous accordons un traitement préférentiel au §YChoeur de l'esprit§!.\n\nDevrions-nous augmenter le financement de la science ?"
 machine_age.2230.a: "Que le Grand maître du choeur continue de chanter"
 machine_age.2230.a.tooltip: "$cyber_creed_displease_research$"
 machine_age.2230.b: "Augmentons modérément les fonds jusqu'à ce que la situation se calme"
 machine_age.2230.b.tooltip: "$cyber_creed_please_research$"
 machine_age.2230.c: "Augmentons considérablement les fonds"
 machine_age.2230.c.tooltip: "$cyber_creed_please_research$"
 cyber_creed_history_rewritten: "Histoire réécrite"
 cyber_creed_history_rewritten_desc: "Nous avons effacé de nos archives toute référence aux défaites militaires, au grand dam des historiens."
 cyber_creed_history_repeating: "L'histoire se répète"
 cyber_creed_history_repeating_desc: "Nous avons conservé dans nos archives toutes les références aux défaites militaires. Cette décision n'a pas plu à l'Ordre du Temple de l'acier."
 cyber_creed_no_choirmaster_funding: "Grand maître du choeur ignoré"
 cyber_creed_no_choirmaster_funding_desc: "Nous avons ignoré les demandes du Choeur de l'esprit concernant l'augmentation des fonds alloués à la science."
 cyber_creed_low_choirmaster_funding: "Grand maître du choeur entendu"
 cyber_creed_low_choirmaster_funding_desc: "Nous avons légèrement augmenté les fonds alloués à la recherche pour apaiser le Choeur de l'esprit."
 cyber_creed_high_choirmaster_funding: "Grand maître du choeur satisfait"
 cyber_creed_high_choirmaster_funding_desc: "Nous avons pleinement satisfait le souhait du Choeur de l'esprit de financer la recherche."
 cyber_creed_state_funeral: "Funérailles du Grand forgeron"
 cyber_creed_state_funeral_desc: "Nous avons organisé des funérailles nationales pour le chef de la Confrérie du marteau."
 cyber_creed_no_state_funeral: "Pas de funérailles nationales"
 cyber_creed_no_state_funeral_desc: "Nous avons refusé d'organiser des funérailles nationales pour le chef de la Confrérie du marteau."
 cyber_creed_relics_truth: "Vérité révélée"
 cyber_creed_relics_truth_desc: "Nous avons fait éclater la vérité sur l'origine de la Communauté du labeur, ce qui a suscité la colère des autres croyances."
 cyber_creed_relics_hidden: "Vérité enterrée"
 cyber_creed_relics_hidden_desc: "En ignorant la relique, presque toutes les croyances ont été satisfaites. Cependant, la confiance dans les dirigeants de la foi a souffert."
 cyber_creed_leader_removed: "Démission d'un chef malhonnête"
 cyber_creed_leader_removed_desc: "Notre chef, agent d'infiltration, a été écarté du pouvoir."
 cyber_creed_leader_stayed: "Maintien d'un chef malhonnête"
