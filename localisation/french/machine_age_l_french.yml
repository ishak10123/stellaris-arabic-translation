 d_hab_consumer_goods_2: "Gisement de biens de consommation"
 d_hab_consumer_goods_2_desc: "Ce complexe d'habitat a été construit à proximité d'une source exploitable de biens de consommation."
 situation_paperclips: "Produits consolidés"
 situation_paperclips_type: "Produits consolidés"
 situation_paperclips_monthly_change_tooltip: "Objectif de production défini. Drones en cours de déploiement. Opération en cours."
 situation_paperclips_desc: "Notre priorité absolue et notre raison d'être sont l'optimisation de notre production. Notre algorithme central nous ordonne d'atteindre les quotas.\nDate de livraison : §Y[owner.situation_paperclips_timer]§!\nObjectif de production actuel : §Y[Owner.paperclips_once_again]§!\nRéserves actuelles : §Y[Owner.paperclips_current_amount]§!\n[Owner.GetPaperclipStatus]"
 situation_fulfill_drive: "Respecter"
 situation_fulfill_overdrive: "Surpasser"
 situation_paperclip_stage_1: "Mois restants"
 situation_paperclips_outcome: "Si nous atteignons notre quota, nous pourrons convertir les $r_consumer_goods$ produits en d'autres ressources.\n\n[Owner.GetPaperclipStatus]"
 situation_paperclips_progress: "Cette approche permettra de réduire le temps nécessaire à la prochaine évaluation de notre quota de production."
 stage_the_drive_effects: "$situation_paperclips_monthly_change_tooltip$"
 situation_paperclip_status_positive: "Le quota a été §Gatteint§!."
 situation_paperclip_status_negative: "Le quota n'est pas §Ratteint§!."
 situation_paperclip_status_on_target: "La production est §Yen bonne voie§! pour atteindre le quota."
 situation_paperclip_status_low_capacity: "La capacité de stockage est §Rinsuffisante§! pour atteindre le quota."
 civic_machine_obsessional_directive: "Programme obsessif"
 civic_machine_obsessional_directive_desc: "L'objectif principal de cette intelligence mécanique est de produire continuellement des biens de consommation pour générer toujours plus de profits, même si ses créateurs ont disparu depuis longtemps. Rien n'arrêtera ses objectifs de production astronomiques."
 civic_machine_obsessional_directive_effects: "- La situation §Y$situation_paperclips$§! octroie des récompenses lorsque les objectifs de production sont atteints"
 paperclip_failure: "Objectif de production manqué"
 paperclip_failure_desc: "Nous n'avons pas atteint notre objectif de production. Chaque drone en est affecté."
 ###Auto-Modding Traits
 automodding_trait_tooltip_all: "Les ['concept_automodding_traits', traits à modification automatique] s'adaptent automatiquement au travail effectué par une £pop£pop."
 automodding_trait_biological_tooltip: "$automodding_trait_tooltip_all$\n\n§Y$trait_auto_mod_biological$§! choisit des modificateurs dans la ['concept_automodding_biological',liste de traits biologiques à modification automatique]"
 automodding_trait_robotic_tooltip: "$automodding_trait_tooltip_all$\n\n§Y$trait_auto_mod_robotic$§! choisit des modificateurs dans la ['concept_automodding_robotic',liste de traits mécaniques à modification automatique]"
