 origin_cybernetic_creed: "Croyance cybernétique"
 origin_cybernetic_creed_desc: "§RATTENTION : bloque toute ascension à l'exception du chemin ['concept_cybernetic_ascension',cybernétique].§!\n\nMû par une vocation divine, cet empire prône la fusion du corps et de la cybernétique. Les améliorations sont des actes de dévotion."
 origin_tooltip_cybernetic_creed_effects: "- $HOMEWORLD$ les bâtiments initiaux sont remplacés par des ['concept_cybernetic_creed_infrastructure',infrastructures de culte] $NEW_LINE$- Des factions de ['concept_cybernetic_creed',croyance cybernétique] sont formées peu de temps après le début de la partie\n- $SPECIES_TRAITS$ ['trait:trait_cyborg_ritualistic_implants']\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_integrated_cybernetics', £engineering£$tech_integrated_cybernetics$]\n- Emplois de ['concept_cybernetic_creed_jobs',prêtrise de croyance cybernétique]"
 START_SCREEN_CYBERNETIC_CREED: "Notre noble tâche est la fusion [Owner.Species.GetFleshTypeCyberCreed] et machine. Bien que notre histoire soit marquée de tentatives infructueuses, mais guidées par une volonté éthérée, nous avons aujourd'hui consolidé la première étape de la fusion divine grâce à nos implants ritualistes.\n\nNous commençons à peine à exploiter notre potentiel cybernétique illimité ; l'avenir nous réserve une pléthore d'améliorations.\n\nCependant, notre foi est divisée, car les différents courants spirituels rivalisent pour atteindre les objectifs des améliorations sacrées. Une fois que nous aurons répondu à cette question, la fusion parfaite entre [Owner.Species.GetFleshTypeCyberCreed] et technologie nous permettra de dépasser les limites de l'évolution.\n\n$machine_age.1090.pray$"
