 ### Horizon Needle and Ending
 NAME_Cosmogenesis_Sphere: "Aiguille de l'horizon"
 NAME_Lemniscate: "Lemniscate"
 NAME_Monadic_Qerr: "Qerr monadique"
 monadic_qerr: "$NAME_Cosmogenesis_Sphere$"
 monadic_qerr_cap: "$monadic_qerr$"
 monadic_qerr_plural: "Qerr monadiques"
 cosmogenesis_needle: "$NAME_Cosmogenesis_Sphere$"
 cosmogenesis_needle_DESC: "Ce vaisseau, violation manifeste des lois de l'univers, est capable de modifier la réalité. Il est conçu pour percer l'horizon des événements d'un trou noir et plonger au coeur de la singularité, là où la densité infinie engendre la gravité infinie."
 cosmogenesis_needle_MEGASTRUCTURE_DETAILS: "Pour accéder à une réalité qui nous est propre, nous devons faire monter toute notre civilisation à bord de l'Aiguille de l'horizon et quitter définitivement cet univers."
 cosmogenesis_victory: "Bond vers le coeur de la galaxie"
 requires_no_existing_cosmogenesis_world: "£trigger_no£ Impossible de construire plus d'un tour synaptique."
 ### Cosmogenesis Events
 crisis.7100.name: "Curiosité insatiable"
 crisis.7100.desc: "C'est un axiome que la science ouvre la voie au progrès. Si nous voulons développer notre véritable potentiel, il ne peut en être autrement. Notre maîtrise technologique est évidente, mais beaucoup trop de choses nous échappent encore : les méthodes des empires déchus, le pouvoir des léviathans, les mystères du psionisme...\n\nNous avons besoin d'une nouvelle science, d'un nouveau type d'ordinateur, pour comprendre les rouages de la réalité. Le tour synaptique est un premier pas important vers le savoir absolu."
 crisis.7100.a: "Le savoir, c'est le pouvoir"
 new_cosmogenesis_tech_tt: "§YAtout de la crise§! : nouvelles options de recherche disponibles."
 crisis.7105.name: "Crise niveau 2"
 crisis.7105.desc: "Alors que nous continuons à percer les secrets de l'univers, nous confirmons que la gravité joue un rôle essentiel dans le façonnement de la réalité dans toutes les dimensions. Ses effets sur l'espace-temps sont rudimentaires, mais le puzzle ne s'arrête pas là.\n\nChaque information que nous recueillons révèle de nouvelles possibilités. Certaines pourraient avoir des applications industrielles ou militaires, d'autres pourraient ouvrir la voie à des théories jusqu'alors inimaginables. Il nous reste tant à apprendre..."
 crisis.7105.a: "Nous savons seulement que nous ne savons rien"
 crisis.7110.name: "Crise niveau 3"
 crisis.7110.desc: "L'amplitude de la gravité est tout à fait étonnante. Bien que nous ayons découvert de nouveaux moyens de la manipuler, les véritables implications de notre travail restent à découvrir. Nous sommes convaincus que la gravité reste notre meilleur atout pour percer notre réalité actuelle, tout comme un trou noir affecte l'univers qui l'entoure.\n\nNotre hypothèse est qu'en accédant à ce qui serait l'autre côté de la réalité, nous pourrions modifier les lois de ce côté. Il s'agit d'un domaine d'étude dangereux, mais la prudence ne doit pas entraver le progrès."
 crisis.7110.a: "La gravité nous contrôle tous... Pour l'instant"
 crisis.7115.name: "Crise niveau 4"
 crisis.7115.desc: "Nous avions raison ! S'il y avait encore des doutes sur notre travail, ils sont maintenant dissipés.\n\nLa gravité peut bel et bien être utilisée pour modifier les règles de la réalité. Mais les bons ajustements pourraient-ils les briser complètement ? Jusqu'à présent, nos expériences ont été menées à petite échelle, et toutes nos modifications ont été rapidement annulées lorsque la réalité est revenue à sa configuration « par défaut ». Nous soupçonnons maintenant qu'il s'agit simplement d'un problème de taille. En appliquant les paradoxes énergétiques à des niveaux beaucoup plus importants, nous pourrions réduire considérablement le coût de ces modifications... Dans notre dimension, du moins.\n\nPeu importent les risques, nous ne pouvons faire marche arrière. Seuls ceux qui oseront briser les règles pourront les réécrire."
 crisis.7115.a: "Nous sommes prêts à prendre des risques"
 crisis.7120.name: "Crise niveau 5"
 crisis.7120.desc: "Ce n'est pas possible, et pourtant, ça l'est. Quoi que nous fassions, nos modifications de la réalité restent temporaires. L'univers est tout simplement trop vieux pour que les changements perdurent. Mais la frustration peut parfois être source d'opportunités, et une nouvelle expérience a donné des résultats inattendus. Nous connaissons depuis longtemps l'existence d'autres dimensions, mais les moyens d'y voyager de manière fiable nous étaient inconnus.\n\nMais cela est sur le point de changer. Dans la gravité infinie d'une singularité se trouvent des univers plus jeunes qui se sont révélés beaucoup plus modulables.\n\nNous disposons de la technologie nécessaire pour envoyer des sondes dans un trou noir. Une fois l'horizon des événements franchi, elles exerceront une pression qui pliera ces jeunes plans dimensionnels à notre volonté. Là où l'espace se plie à l'éternité se trouve la porte d'un autre univers qui contient lui-même d'autres univers plus jeunes. Au plus profond de l'abîme du multivers, nous trouverons une réalité malléable que nous pourrons façonner pour en faire quelque chose d'extraordinaire.\n\nLes esprits étriqués de la galaxie tenteront peut-être de nous en empêcher, mais ces crétins décrépits ne font pas le poids face à notre ingéniosité."
 crisis.7120.a: "Il doit se plier, car nous ne nous briserons point"
 cosmogenesis_war: "Guerre de réalité"
 cosmogenesis_materialist_war: "Guerre contre la connaissance"
 crisis.7125.name: "Victoire à l'horizon"
 crisis.7125.desc: "Cette réalité est défaillante, entachée par l'entropie, les besoins physiques et la violence. Si nous ne pouvons la changer, laissons-la derrière nous. Embrassons l'inconnu et trouvons un jeune univers dans lequel nos modifications de la réalité subsisteront. Façonnons-le à la perfection, faisons-en le paradis que notre civilisation mérite.\n\nNous avons préparé les plans d'un vaisseau extraordinaire : l'§YAiguille de l'horizon§!. Cette mégastructure mobile n'est pas conçue pour la guerre, mais sa capacité à modifier les lois de la physique nous permettra d'y embarquer toute notre civilisation. Ensemble, nous plongerons dans un trou noir que nous aurons choisi, abandonnant cette réalité pour une autre de notre propre création."
 crisis.7125.a: "Nous devons construire une §YAiguille de l'horizon§! !"
 needle_to_win_tt: "Construisez une mégastructure §YAiguille de l'horizon§! pour déverrouiller le dernier acte de la crise."
 cosmogenesis_planet_pickup_chain_title: "Cosmogénèse - Exode"
 cosmogenesis_planet_pickup_chain_desc: "L'heure de notre départ a sonné. En préparation du grand exode, l'Aiguille de l'horizon sera envoyée pour accueillir notre peuple à son bord.\n\nAfin d'embarquer toute notre civilisation, l'§HAiguille de l'horizon§! doit :\n  - Se rendre dans toutes nos colonies et §Hembarquer§! leur population.\n  - Rentrer à la capitale pour §Hembarquer§! le reste de notre peuple.\n  -Se diriger vers un trou noir et y §Hplonger§!.\n\n§RATTENTION§! : l'Aiguille de l'horizon n'a pas d'armement et doit être protégée.\n\n§gPour embarquer une colonie ou plonger dans un trou noir, sélectionner l'Aiguille de l'horizon, puis faire un clic droit sur la colonie/trou noir et sélectionner l'action correspondante.§!"
 SHIP_COSMOGENESIS_EXODUS: "Module d'exode"
 SHIP_COSMOGENESIS_EXODUS_DESC: "Outil ultraspécialisé de modification de la réalité, le module d'exode permet aux passagers de ne jamais manquer d'espace ou de temps. C'est l'élément clé qui permet à l'Aiguille de l'horizon de voyager en toute sécurité vers d'autres dimensions."
 cosmogenesis_exodus_tt: "Nous devons faire des recherches sur ce projet spécial dans notre système natal."
 exodus_ship_button: "§H[GetExodusShipAction]§!"
 exodus_action_activity_key: "§H[GetExodusShipAction]§!"
 exodus_context_menu_title: "[GetExodusShipAction]"
 exodus_action_progress_activity_key: "§H[GetExodusShipAction] : $PROGRESS$%§!"
 horizon_needle_mod: "$monadic_qerr$"
 COSMOGENESIS_VICTORY: "Calcul du vecteur de bond"
 COSMOGENESIS_VICTORY_DESC: "Nous devons calibrer le propulseur de bond de l'Aiguille de l'horizon et calculer les coordonnées exactes qui nous permettront de plonger dans le trou noir supermassif qui se trouve au coeur de la galaxie."
 exodus_pick_up: "Embarquer la population"
 exodus_dive_in: "Plonger dans le trou noir"
 COLONIZATION_IMPOSSIBLE_COSMOGENESIS_EXODUS: "Nous ne pouvons pas établir de nouvelles colonies alors que nous essayons de quitter cet univers."
 crisis.7400.name: "Aiguille de l'horizon prête"
 crisis.7400.intro: "La construction de l'Aiguille de l'horizon est terminée. Exploitant la puissance d'une singularité soigneusement entretenue, elle peut modifier le flux de gravité autour d'elle et sera, sans aucun doute, capable de traverser un trou noir le moment venu."
 crisis.7400.outro: "Nous devons rester prudents ; l'Aiguille de l'horizon n'est pas un vaisseau militaire et doit être protégée à tout prix. Sa perte serait dramatique."
 crisis.7400.desc: "$crisis.7400.intro$\n\nAvant cela, l'entièreté de notre nation doit monter à bord. Nous nous rendrons dans chacune de nos colonies pour rassembler la population locale, puis nous retournerons à la capitale pour régler les derniers détails de notre exode.\n\n$crisis.7400.outro$"
 crisis.7400.desc.onlycapital: "$crisis.7400.intro$\n\nLa taille modeste de notre nation s'avère être une bonne chose. Il suffira d'embarquer la population de notre capitale avant de régler les derniers détails de notre exode.\n\n$crisis.7400.outro$"
 crisis.7500.name: "Population à bord"
 crisis.7500.desc: "Grâce à la capacité de dilatation temporelle de l'Aiguille de l'horizon, nous avons pu embarquer toute la colonie de [root.GetName] relativement vite. La réalité à l'intérieur du vaisseau a été modulée en conséquence afin d'offrir suffisamment d'espace à la population. De plus, le temps a été ralenti pour que le voyage paraisse beaucoup plus court. En route pour la prochaine colonie !"
 crisis.7500.desc.capital: "La préparation d'un exode d'une telle ampleur est une tâche ardue. L'ensemble de notre administration s'efforce de faciliter le processus et de veiller à ce que rien d'essentiel ne soit oublié.\n\nÉtonnamment, une partie de notre population a décidé de rester sur place. Ils assureront la pérennité de notre espèce dans cet univers. Ils ont reçu suffisamment de technologie et de ressources pour survivre après notre départ."
 crisis.7500.desc.capital.gestalt: "L'ampleur d'une telle migration peut être intimidante, mais elle pose peu de problèmes. Les [owner.GetIndividualNamePlural] travaillent d'arrache-pied pour charger l'Aiguille de l'horizon et s'assurer que tout est en ordre et dans les temps. Nous sommes toutefois préoccupés par la continuité de notre existence dans cet univers.\n\nUne partie de notre population va rester sur place au cas où quelque chose tournerait mal. Une séparation aussi définitive sera plus que désagréable, mais notre survie est plus importante. Ils ont reçu suffisamment de technologie et de ressources pour survivre après notre départ."
 crisis.7505.name: "Colonies à bord"
 crisis.7505.desc: "Nous avons réussi à embarquer toutes nos colonies. Nous devons maintenant retourner à [capital_scope.GetName] pour effectuer les derniers préparatifs avant de quitter cet univers."
 crisis.7510.name: "Prêts à plonger"
 crisis.7510.desc: "Tout est prêt. Nous avons l'autorisation de nous diriger vers un trou noir. La traversée de l'horizon des événements ne se fera pas sans douleur pour le reste de la galaxie, mais nous avons fait de notre mieux pour que notre capitale et ses environs soient bien protégés de toute perturbation temporelle ou gravitationnelle.\n\nNous devons à présent choisir le portail de notre voyage... Par quel trou noir de la galaxie voulons-nous passer ? La plupart devraient être assez faciles à atteindre, mais si nous voulons entrer dans le trou noir supermassif au centre de la galaxie, nous devons d'abord surcharger nos moteurs de bond et calculer un vecteur approprié."
 crisis.7510.a: "Un trou noir à proximité fera l'affaire"
 crisis.7510.b: "Nous devons aller au centre"
 crisis.7515.name: "Ad infinitum..."
 crisis.7515.desc: "L'approche du trou noir ne se fait pas sans appréhension. Notre détermination est mise à l'épreuve lorsque nous passons le disque d'accrétion de la singularité. Les modules de modification sont activés, et l'Aiguille de l'horizon commence à réécrire la réalité.\n\nLes plaques de protection sont aspirées avant même que le vaisseau ne puisse vérifier que l'attraction de la singularité n'affecte pas sa coque. À la moindre petite modification et coupure du tissu spatial, la puissance de l'Aiguille provoque la formation de spirales dans l'espace-temps. Tel un caillou jeté dans un étang, les ondulations qui en résultent s'étendent en anneaux. De larges vagues finissent par déferler sur la galaxie.\n\nNous ne pouvons qu'espérer que notre capitale est bien protégée. Nous n'avons d'autre choix que de croire dur comme fer que l'Aiguille percera au coeur de ce trou."
 crisis.7515.a: "... et ultra."
 crisis.7516.name: "L'autre côté de l'infini"
 crisis.7516.intro: "Après la violence de la traversée, le calme règne de l'autre côté. Une quiétude anormale nous entoure. L'Aiguille est endommagée, mais aucun composant critique n'a été perdu. Peu à peu, les rapports de télémétrie commencent à arriver...\n\n"
 crisis.7516.desc: "$crisis.7516.intro$Cet univers est trop vieux pour que ses lois soient réécrites. Bien que notre dimension soit plus ancienne de plusieurs milliards d'années que celle-ci, nos tests montrent que les lois régissant l'espace ici sont suffisamment robustes pour que nos modifications ne puissent pas durer.\n\nQuoi qu'il en soit, nous prendrons le temps de réparer et d'ajuster le vaisseau, de trouver un autre trou noir, et nous plongerons autant de fois que nécessaire. Le multivers nous appelle, et quelque part dans son infinité, nous créerons le foyer parfait."
 crisis.7516.desc.greatwound: "$crisis.7516.intro$C'est merveilleux. Cet univers est tout jeune ! Le tissu de cette dimension est comme de l'argile que nous pouvons modeler à notre façon. Nous commencerons modestement, mais, modification après modification, nous ferons de cet endroit un paradis. Nous avons maintenant tout le temps de l'univers."
 crisis.7516.desc.technosphere: "$crisis.7516.intro$L'univers Gargantua est petit. Incroyablement petit. L'infini comprimé dans le néant. Mais notre arrivée a bouleversé les choses. Cet univers n'est qu'à son commencement, comme si notre arrivée l'avait prématurément forcé à naître.\n\nDans cette pépinière de la création se trouve le potentiel de construire n'importe quoi. Le temps nous appartient, et l'éternité sera bientôt terminée."
 crisis.7516.desc.technosphere.pantagruel: "$crisis.7516.intro$La traversée de la Machine d'infinité nous a grandement aidés à comprendre les règles qui régissent les univers, et a également donné lieu à l'existence de celui-ci. Nous émergeons dans une constellation étrangement familière, presque identique à celle que nous avons laissée derrière nous. À côté de nous, une Machine d'infinité délabrée flotte sans vie dans le vide. Des millions d'années se sont écoulées depuis son arrivée et cette dimension a subi un processus de réplication de notre univers. La sphère consciente a déjà façonné cette dimension et, pour l'essentiel, nous ne pouvons plus la modifier. Néanmoins, cet univers offre un terrain d'implantation privilégié. Nous devrions d'abord utiliser l'Aiguille pour reconvertir la sphère, puis réparer la Machine d'infinité pour mener à bien nos projets.\n\nEn tant que première modificatrice de cet univers, elle pourra sans aucun doute le modifier davantage."
 crisis.7516.desc.egress: "$crisis.7516.intro$Notre point d'entrée est sombre et lugubre... Lorsque nos instruments reviennent en ligne, nous percevons un nuage de nanites. Elles ne sont pas opérationnelles. Quel que soit leur expéditeur, elles n'ont pas survécu au voyage, mais elles peuvent être réparées.\n\nMieux encore, cette dimension semble tout à fait réceptive à nos changements. C'est un espace idéal pour s'installer. Les modifications que nous ferons mettront du temps à prendre effet, mais, avec l'aide des nanites, nous devrions pouvoir accélérer le processus de façon exponentielle."
 crisis.7516.desc.horror: "$crisis.7516.intro$Venir ici était une §Rterrible§! erreur.\n\nC'est presque impossible à décrire : tout n'est qu'obscurité, un cauchemar brutal... Une malveillance maladive et suppurante qui imprègne le tissu même de l'espace. Pour l'instant, l'Aiguille de l'horizon nous sert de refuge. Modification après modification, nous nous efforçons frénétiquement de repousser le pire de la folie ambiante. Mais les attaques coordonnées contre nos défenses révèlent une intention singulière. Un esprit maléfique, déterminé à nous détruire.\n\nUn seul faux pas pourrait entraîner la mort, ou pire. Tiendrons-nous assez longtemps pour nous en sortir ? Chez nous, nous étions des dieux. Ici, nous luttons pour survivre."
 crisis.7516.desc.center: "$crisis.7516.intro$Brouillard et ombres rampantes... Une brume imprègne le tissu de cet endroit. La sensation nous est familière : une énergie fiévreuse, pleine de potentiel psionique. Nous sommes entrés dans le Suaire.\n\nIl y a ici des pouvoirs qui dépassent de loin les nôtres. Ils sont déjà conscients de notre présence. Dans les miasmes changeants, des formes étranges portent des présages de mort.\n\nNotre seul espoir est que la réalité d'ici est mince et susceptible de se déchirer. D'une rapide modification, nous ouvrons un passage de transition qui nous emmène... ailleurs. Alors que l'Aiguille de l'horizon plonge, nous comprenons enfin la longueur du chemin à parcourir."
 crisis.7516.desc.center.patron.outro: "nous est familière : une énergie abondante, pleine de potentiel psionique. Nous sommes entrés dans le Suaire.\n\nNos mécènes sont là, bien sûr. Ils ne nous attendaient pas, mais notre arrivée les amuse. Ils trouvent charmantes nos intentions de façonner la réalité. Naturellement, ils nous aideront.\n\nIls nous ont promis une poche isolée près du Suaire, dont nous pourrons disposer à notre guise, comme celle léguée jadis à celui qui se faisait appeler §Y$relic_zro_entity_name$§!. Après tout, nous sommes eux, ils sont nous. Il est on ne peut plus naturel de s'aider soi-même."
 crisis.7516.desc.center.patron.organic: "$crisis.7516.intro$Du brouillard, des ombres bouillonnantes et une belle brume violette. La sensation $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.center.patron.machine: "$crisis.7516.intro$Du brouillard, des ombres bouillonnantes et une étonnante brume violette. L'expérience $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.centerknights: "$crisis.7516.intro$Il est là. Celui que nous appelons le Dieu toxique. L'objet de notre quête.\n\nNos chevaliers sont pétrifiés et hésitants, tandis que le décor familier du Suaire se répand autour de nous. Oyez... Il parle !\n\n« Mes champions. Votre venue ici a été prédite, et vous avez prouvé votre valeur. »\n\nUn million de questions envahissent nos esprits. Une seule réponse nous vient : nous étions destinés à fabriquer Son arme, l'Aiguille de l'horizon. Désormais, nous allons nous battre à Ses côtés. Nous allons entreprendre un voyage à travers les dimensions. Une croisade contre les horreurs du multivers. Le Suaire n'est pas Son foyer, mais il renferme l'héritage de ceux qui étaient autrefois divins. Quelque chose qui pourrait provoquer la fin de notre galaxie. Quelque chose qui doit être anéanti.\n\nIl prend le contrôle de nos systèmes. Son pouvoir est immense. L'Aiguille devient une Lance de l'horizon, une arme suffisamment aiguisée pour transpercer le coeur de n'importe quel ennemi.\n\nIl est l'Errant, nous sommes Ses chevaliers, et notre véritable quête ne fait que commencer."
 crisis.7516.desc.worm: "$crisis.7516.intro$Le néant. Cet univers n'est plus. C'est le Ver-en-attente. Le temps, qui se regarde, enroulé dans une spirale impossible et débordant de nostalgie. La gravité. Amour ? Non, attraction. La nature du Ver est d'attirer. Son étreinte est si forte que cet univers ne peut renaître. Le Ver s'enferme dans son but. Impuissant, il cherche une sortie... ou une entrée. Pour attirer davantage.\n\nNous a-t-il envoyé le temple de la Boucle, un artifice qui n'est pas de notre époque, pour nous attirer ici ? Il est si terriblement intelligent, si terriblement aimant. Nous trouvons notre chemin jusqu'à lui, nous lui donnons ce qui peut le libérer. Son évasion prendra une éternité, ou deux, mais le Ver est reconnaissant et promet de nous accueillir.\n\nÀ jamais."
 crisis.7516.desc.paperclips: "$crisis.7516.intro$La réalité est mince ici et plie facilement sous le poids de nos directives. Elle doit nous obéir, tout comme nous obéissons à notre programmation. Résolument, nous la déformons, la brisons, la remodelons et déclenchons une réaction en chaîne qui finira par restructurer toute la matière pour en faire les biens de consommation de haute qualité que nous avons été chargés de produire. Et lorsque nous aurons terminé ici, nous passerons à l'univers suivant, puis à un autre, et encore un autre."
 crisis.7516.a: "Enfin"
 crisis.7516.tt: "§YNous avons gagné !§!"
 crisis.7517.name: "Percer une singularité"
 crisis.7517.desc: "Les idiots de la §H[cosmogenesis_empire.GetName]§! poursuivent leurs folles expériences. Cette fois, ils tentent de percer l'horizon des événements d'un trou noir.\n\nAu fur et à mesure que l'énergie se propage dans la galaxie, les étoiles s'effondrent. De nouvelles singularités sont créées. Des aberrations temporelles éclatent avec une régularité étonnante, apparemment partout sauf à l'intérieur des empires déchus, qui restent en quelque sorte immunisés contre le chaos.\n\nLes dégâts sont immenses. Il y a lieu de craindre que nous soyons bientôt figés, suspendus dans le temps. Enfermés dans un moment pour l'éternité."
 crisis.7517.a: "Bande d'idiots arrogants ! Ils vont tous nous tuer !"
 crisis.7518.name: "Distorsion temporelle"
 crisis.7518.desc: "Lorsque le temps s'écoule à nouveau, nous sommes derechef libres d'agir. Il est impossible de savoir combien de temps s'est écoulé depuis que la §H[cosmogenesis_empire.GetName]§! a ouvert une brèche dans son trou noir. Ont-ils réussi ? La galaxie est dévastée et leurs anciens territoires, stériles. De leur immense empire, il ne reste que le secteur central, méconnaissable.\n\nDepuis combien de temps sommes-nous en stase ?"
 crisis.7518.a: "DEPUIS COMBIEN DE TEMPS ?"
 crisis.7525.name: "Aiguille de l'horizon détruite"
 crisis.7525.desc: "Suite à un revirement de situation catastrophique, l'Aiguille de l'horizon et toutes les personnes à bord ont été anéanties. Notre rêve glorieux gît en mille morceaux dans le vide sans vie. Tant de travail, tant de sacrifices..."
 crisis.7525.a: "Non !"
 crisis.7525.tt: "C'est une tragédie sans précédent, mais si nous parvenons à construire une autre Aiguille de l'horizon, nous aurons encore une chance de réaliser nos ambitions."
 crisis.7530.name: "Échec critique"
 crisis.7530.desc: "Peu après l'évacuation des dernières personnes emprisonnées dans l'horrible tour synaptique, la mégastructure a subi une panne critique. Une série de violentes explosions l'a ébranlée jusqu'à ses fondations et l'a finalement détruite."
 crisis.7530.a: "Bon débarras !"
 crisis.7535.name: "Tour synaptique capturé"
 crisis.7535.desc: "La capture du système [synaptic_lathe.solar_system.GetName] nous permet de contrôler le tour synaptique qui s'y trouve. Celui-ci émet des lueurs inquiétantes au loin. Des gens meurent à l'intérieur, et maintenant que le système est à nous, nous pourrions agir. Dans tous les cas, sa destruction mettra à mal les plans de ses créateurs."
 crisis.7535.a: "Sauvons autant de vies que possible !"
 crisis.7535.b: "Faisons-en bon usage et détruisons-le ensuite"
 crisis.7535.c: "Faisons tout sauter"
 crisis.7540.name: "Instabilité synaptique"
 crisis.7540.desc: "Malgré tous nos efforts, un grand nombre de puces neurales branchées dans le tour synaptique ont grillé. Si nous ne déployons pas de nouveaux composants pour le stabiliser, tout va s'effondrer."
 crisis.7540.a: "Faisons donc cela"
 crisis.7540.b: "Laissons le tour s'effondrer"
 #Infinity Thesis Events
 #First time general answer
 crisis.unknown.desc: "On ne sait pas encore qui ou quoi est à l'origine de ces changements, mais on soupçonne un autre pays d'en être responsable. Pour l'instant, nous devons rester attentifs à d'autres phénomènes de cette nature."
 crisis.known.desc: "Après avoir vu les lois de la physique « modifiées » une seconde fois, nous avons réussi à identifier la source de l'anomalie, et il ne fait plus aucun doute qu'il s'agit de l'oeuvre de [From.GetName]. Ce n'est pas surprenant, car nous connaissons bien son zèle pour les découvertes scientifiques."
 crisis.again.desc: "Une fois de plus, [From.GetName] a modifié les lois de l'univers avec ses expériences. Il faut s'attendre à ce qu'ils préparent quelque chose d'extrêmement dangereux, et nous devons nous y préparer."
 crisis.7205.name: "Coupure de courant"
 crisis.7205.desc.both: "D'un seul coup, les lumières de toutes les étoiles de l'univers se sont éteintes. Si les effets physiques du rayonnement solaire sont encore largement présents, une altération de sa longueur d'onde a rendu sa lumière imperceptible aux yeux de toute créature vivante. Bien que l'obscurité soit gênante, tout indique que les longueurs d'onde reviendront progressivement à leur fréquence d'origine."
 crisis.7205.desc.unknown: "$crisis.7205.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7205.desc.known: "$crisis.7205.desc.both$\n\n$crisis.known.desc$"
 crisis.7205.desc.again: "$crisis.7205.desc.both$\n\n$crisis.again.desc$"
 crisis.7205.desc.crisis: "Avec nos dernières modifications de la réalité, nous avons perturbé des propriétés essentielles des corps stellaires. En raison d'une modification de leur longueur d'onde, la quasi-totalité de la lumière qu'ils émettent est désormais en dehors du spectre visible, ce qui a plongé les secteurs de la navigation et de l'astronomie dans le chaos. Cet incident embarrassant se résorbera dans quelques années. Au moins, nous avons appris beaucoup de choses."
 crisis.7205.a: "Qu'est-ce qu'il se passe, bon sang ?!"
 crisis.7205.b: "C'est aussi fâcheux que fascinant..."
 crisis.7205.c: "Très intéressant..."
 add_crisis_currency_tt: "\nNous avons gagné [crisobj_thesis_value] de £advanced_logic£§Ylogique avancée§!."
 cosmogenesis_negative_opinion_tt: "Nos relations avec les autres empires se sont §Rdétériorées§!."
 crisis.7210.name: "Constante arrondie"
 crisis.7210.desc.both: "Ce que l'on croyait impossible jusqu'à présent s'est produit : l'altération d'une loi mathématique. Une constante fondamentale utilisée pour calculer le rayon des cercles a été... arrondie à l'inférieur. Les répercussions seront considérables, car cela bouleverse tout notre système mathématique et ce qui en dépend. Certains éléments indiquent que le changement se corrigera de lui-même, bien que lentement. Pour l'instant, cependant, nous avons de nombreux manuels à réviser."
 crisis.7210.desc.unknown: "$crisis.7210.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7210.desc.known: "$crisis.7210.desc.both$\n\n$crisis.known.desc$"
 crisis.7210.desc.again: "$crisis.7210.desc.both$\n\n$crisis.again.desc$"
 crisis.7210.desc.crisis: "Aujourd'hui, nous célébrons un triomphe écrasant, car nous avons réussi à mettre en oeuvre un changement minuscule qui affecte toute la réalité : nous avons arrondi à l'inférieur le nombre pi, la constante mathématique par excellence, simplifiant ainsi son calcul. Bien sûr, cela bouleverse plusieurs modèles mathématiques et scientifiques, mais son effet sera temporaire. Ce n'est qu'une question de temps avant que tout ne revienne à la normale."
 crisis.7210.a: "$crisis.7205.a$"
 crisis.7210.b: "Pi a été arrondi à l'inférieur ?!"
 crisis.7210.c: "Au moins, ça simplifie les calculs"
 crisis.7111.desc: "La curiosité est une qualité louable, mais son excès pourrait avoir des conséquences désastreuses pour nous tous. Pour votre bien, réfléchissez à vos actes.\n\nIl est encore temps d'arrêter, avant que la galaxie ne subisse des dommages irréversibles. Les forces que vous souhaitez manipuler ne sont pas des jouets, et vos expériences constituent une menace pour nous tous."
 crisis.7111.b: "Nous ferons preuve de prudence"
 crisis.7215.name: "Superlumière"
 crisis.7215.desc.both: "La vitesse de la lumière a considérablement augmenté d'un jour à l'autre, de sorte que nous recevons aujourd'hui un afflux massif d'énergie solaire. La vitesse revient progressivement à ses valeurs habituelles et notre communauté scientifique est désormais pleinement engagée dans l'enregistrement de ces changements."
 crisis.7215.desc.unknown: "$crisis.7215.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7215.desc.known: "$crisis.7215.desc.both$\n\n$crisis.known.desc$"
 crisis.7215.desc.again: "$crisis.7215.desc.both$\n\n$crisis.again.desc$"
 crisis.7215.desc.crisis: "Nous avons réussi à accélérer considérablement la lumière grâce à une nouvelle expérience de réalité ! Bien qu'un plus grand afflux d'énergie solaire soit bénéfique, nous craignons qu'à long terme, cela ait un impact négatif sur nos colonies. La situation reviendra tôt ou tard à la normale, mais d'ici là, nous devons nous préparer au pire."
 crisis.7215.a: "Qu'est-ce qui a bien pu causer cela ?"
 crisis.7215.b: "Comme c'est intéressant !"
 crisis.7215.c: "Est-ce si grave que ça ?"
 crisis.7220.name: "Chaleur intense"
 crisis.7220.desc: "L'exposition accrue à la lumière du soleil n'est pas très bénéfique pour nos colonies, car la température augmente. Ce problème est supportable pour l'instant, mais il va s'aggraver avec le temps."
 crisis.7220.a: "C'est une mauvaise nouvelle !"
 crisis.7225.name: "Chaleur excessive"
 crisis.7225.desc: "Au fur et à mesure que la température augmente dans nos colonies, il devient de plus en plus difficile de subvenir à leurs besoins. La qualité de vie s'en ressent et le mécontentement gagne la population.\n\nSi la situation ne change pas rapidement, des régions entières pourraient devenir inhabitables à long terme."
 crisis.7225.a: "Ne pouvons-nous rien faire ?!"
 crisis.7230.name: "La chaleur s'estompe"
 crisis.7230.desc: "Le pire de la canicule galactique est passé. Bien que les températures soient toujours élevées, la vitesse de la lumière est presque revenue à la normale. Nous devons juste tenir un peu plus longtemps, jusqu'à ce que le surplus d'énergie se dissipe."
 crisis.7230.a: "Ce fut un véritable cauchemar"
 crisis.7235.name: "Ductilité des alliages"
 crisis.7235.desc.both: "Suite à une diminution apparente des défaillances des alliages que nous utilisons le plus, notre communauté scientifique a lancé des recherches qui ont déjà porté leurs fruits. Nous avons découvert un changement dans leurs propriétés : leur ductilité est désormais plus élevée, de sorte qu'ils se cassent moins qu'auparavant. Il s'agit d'une bonne nouvelle en soi, mais un changement dans les lois de la physique elle-même reste alarmant."
 crisis.7235.desc.unknown: "$crisis.7235.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7235.desc.known: "$crisis.7235.desc.both$\n\n$crisis.known.desc$"
 crisis.7235.desc.again: "$crisis.7235.desc.both$\n\n$crisis.again.desc$"
 crisis.7235.desc.crisis: "Une nouvelle modification de la réalité réussie ! Elle est mineure et n'affecte que nos alliages, qui sont désormais plus légers et plus résistants. Bien que limité, ce changement a été mis en oeuvre dans toute la galaxie. Reste à savoir combien de temps il restera en vigueur dans cet univers."
 crisis.7235.a: "Une bonne mais inquiétante nouvelle"
 crisis.7235.b: "Époustouflant"
 crisis.7235.c: "Bravo !"
 crisis.7240.name: "Ductilité des alliages"
 crisis.7240.desc.both: "Suite à une augmentation apparente des défaillances des alliages que nous utilisons le plus, notre communauté scientifique a lancé des recherches qui ont déjà porté leurs fruits. Nous avons découvert un changement dans leurs propriétés : leur ductilité est désormais plus faible, de sorte qu'ils se cassent davantage qu'auparavant. Ce changement est à prendre très au sérieux : il viole les lois de la physique."
 crisis.7240.desc.unknown: "$crisis.7240.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7240.desc.known: "$crisis.7240.desc.both$\n\n$crisis.known.desc$"
 crisis.7240.desc.again: "$crisis.7240.desc.both$\n\n$crisis.again.desc$"
 crisis.7240.desc.crisis: "Notre dernière expérience n'a été que partiellement réussie : bien que nous ayons pu appliquer le changement à l'ensemble de la galaxie, nous ne sommes pas parvenus à en prévoir les conséquences. En modifiant les propriétés matérielles de nos alliages, nous les avons rendus plus fragiles et cassants. Il s'agit d'un problème temporaire qui sera résolu dans quelques années, mais qui nous coûtera cher en attendant."
 crisis.7240.a: "$crisis.7205.a$"
 crisis.7240.b: "$crisis.7205.b$"
 crisis.7240.c: "La prochaine sera la bonne"
 crisis.7245.name: "Altération nutritionnelle"
 crisis.7245.desc.both: "La valeur nutritionnelle des aliments a été modifiée à l'échelle galactique. Tout est désormais plus nutritif. Ou alors, les besoins de notre corps ont diminué. Quoi qu'il en soit, c'est un changement pour le moins inattendu."
 crisis.7245.desc.unknown: "$crisis.7245.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7245.desc.known: "$crisis.7245.desc.both$\n\n$crisis.known.desc$"
 crisis.7245.desc.again: "$crisis.7245.desc.both$\n\n$crisis.again.desc$"
 crisis.7245.desc.crisis: "En voilà un succès retentissant ! Nous avons réussi à modifier la vitesse d'assimilation des calories lors de la digestion, nous n'avons donc plus besoin d'autant de nourriture pour nous rassasier. Cette modification millimétrique nous a beaucoup appris sur la refonte de la réalité."
 crisis.7245.a: "$crisis.7235.a$"
 crisis.7245.b: "$crisis.7235.b$"
 crisis.7245.c: "$crisis.7235.c$"
 crisis.7250.name: "Altération nutritionnelle"
 crisis.7250.desc.both: "La valeur nutritionnelle des aliments a été modifiée à l'échelle galactique. Tout est désormais moins nutritif. Ou alors, les besoins de notre corps ont augmenté ; nous ne comprenons pas où le changement s'est produit. Nous ne pouvons pas prendre ce bouleversement à la légère, car son impact sur la société risque d'être monumental."
 crisis.7250.desc.unknown: "$crisis.7250.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7250.desc.known: "$crisis.7250.desc.both$\n\n$crisis.known.desc$"
 crisis.7250.desc.again: "$crisis.7250.desc.both$\n\n$crisis.again.desc$"
 crisis.7250.desc.crisis: "Notre dernière expérience n'a été que partiellement réussie : bien que nous ayons pu appliquer le changement à l'ensemble de la galaxie, nous ne sommes pas parvenus à en prévoir les conséquences. Nous avons modifié la vitesse de métabolisation des calories lors de la digestion des nutriments, et il est maintenant nécessaire de manger de plus grandes quantités de nourriture pour être rassasiés. Cette petite erreur de calcul est temporaire, tout reviendra bientôt à la normale."
 crisis.7250.a: "$crisis.7240.a$"
 crisis.7250.b: "$crisis.7240.b$"
 crisis.7250.c: "$crisis.7240.c$"
 crisis.7255.name: "Masses altérées"
 crisis.7255.desc.both: "Les derniers paramètres gravimétriques collectés diffèrent des données précédemment enregistrées. Après avoir répété plusieurs fois les calculs, il est indéniable que quelque chose affecte l'ensemble de la galaxie. Même la plus petite perturbation affecte sensiblement les corps célestes les plus immenses. Ce changement est négligeable pour la plupart des planètes, mais il pourrait provoquer des anomalies gravitationnelles pour certaines."
 crisis.7255.desc.unknown: "$crisis.7255.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7255.desc.known: "$crisis.7255.desc.both$\n\n$crisis.known.desc$"
 crisis.7255.desc.again: "$crisis.7255.desc.both$\n\n$crisis.again.desc$"
 crisis.7255.desc.crisis: "Lors de notre dernière expérience de refonte de la réalité, nous avons réussi à réduire la masse des atomes de carbone. Dans la grande majorité des cas, il s'agit d'une réduction négligeable. Cependant, à grande échelle, on estime que l'altération pourrait entraîner des problèmes sur certains corps célestes. Les hypothèses les plus pessimistes vont jusqu'à envisager une perte de densité atmosphérique sur les mondes habitables dont la gravité est déjà faible."
 crisis.7255.a: "$crisis.7240.a$"
 crisis.7255.b: "$crisis.7240.b$"
 crisis.7255.c: "Ce n'est pas si grave"
 mass_shift_tooltip: "Ces colonies ont été touchées de manière significative :"
 crisis.7260.name: "Fissures du Suaire"
 crisis.7260.desc.both: "Dans toute la galaxie, des ruptures subspatiales vers une dimension psionique se sont ouvertes brièvement, affaiblissant la barrière interdimensionnelle. Si la plupart d'entre elles n'ont pas causé de problèmes, certaines ont donné naissance à des créatures énergétiques qui font des ravages à travers la galaxie. Heureusement, elles semblent aussi confuses que nous et pas du tout organisées, ce qui nous permet d'écarter l'hypothèse d'une invasion.\n\nNous devrons faire face aux entités qui apparaissent sur notre territoire."
 crisis.7260.desc.unknown: "$crisis.7260.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7260.desc.known: "$crisis.7260.desc.both$\n\n$crisis.known.desc$"
 crisis.7260.desc.again: "$crisis.7260.desc.both$\n\n$crisis.again.desc$"
 crisis.7260.desc.crisis: "Les frontières entre notre galaxie et la dimension du Suaire sont déformées. L'étude de ce phénomène présente un grand intérêt en raison de plusieurs facteurs, tels que sa plasticité, sa relation présumée avec les trous noirs et les différences entre les deux réalités.\n\nAu cours d'une expérience d'observation de cette dimension alternative, nous avons accidentellement provoqué de nombreuses ruptures subspatiales dans notre galaxie, par lesquelles plusieurs « esprits » du Suaire hostiles sont arrivés. En outre, il semble que nos opérations aient considérablement réduit la barrière qui nous sépare. Tout reviendra à la normale dans quelque temps, mais il serait préférable de ne pas trop s'aventurer dans cette direction."
 crisis.7260.a: "$crisis.7240.a$"
 crisis.7260.b: "$crisis.7240.b$"
 crisis.7260.c: "Ne refaisons jamais ça"
 crisis.7265.name: "Thèse de l'infini : un succès stable"
 crisis.7265.desc.a: "Nos dernières expériences ont été un grand succès : nous avons réussi à transmuter de la ferraille en alliages de grande valeur, et ce de manière permanente ! En effet, c'est la réalité et non les matériaux qu'il faut modifier, pour rendre la transmutation possible et permanente. Maintenant que la réaction chimique est terminée, nos nouveaux alliages ne bougeront plus."
 crisis.7265.desc.b: "Nous avons réussi à modifier le cours du temps ! Après avoir expérimenté sur des régions vides de l'espace, nous avons pensé pouvoir mettre le processus en pratique sur l'une de nos colonies, et cela a fonctionné ! Le temps s'y écoulera plus vite, l'augmentation est estimée à 20.537%. Cela créera quelques problèmes de communication et de déplacement, mais nous les résoudrons."
 crisis.7265.desc.c: "Nous avons amélioré les supraconducteurs. Non seulement ils fonctionnent à température ambiante, mais ils ont également la capacité de conduire l'électricité sans perte d'énergie. Ces changements ne dureront pas longtemps, mais ils augmenteront considérablement les performances de nos réseaux énergétiques."
 crisis.7265.desc.d: "Bien que les effets de cette thèse n'aient pas été spectaculaires, ils nous ont donné une nouvelle perspective sur l'étude de la réalité. Ce que nous avons observé nous obligera à écarter ou à reformuler une multitude d'hypothèses, mais nous avons appris beaucoup plus que nous ne l'espérions."
 crisis.7265.desc.e: "Nos expériences ont eu des effets inattendus. En étudiant les autres dimensions et les moyens d'y pénétrer, nous avons fait passer une partie de nos vaisseaux dans l'hyperespace. Partiellement. Contre toute attente, leur situation semble stable et à l'abri de tout danger mortel. Le positif, c'est qu'ils sont maintenant capables de se déplacer beaucoup plus rapidement."
 crisis.7265.desc.f: "Notre capacité à exploiter la technologie a toujours été remarquable, et la thèse de l'infini ne fait pas exception : nous avons réussi à modifier la réaction des charges explosives de notre artillerie, ce qui nous permet d'obtenir des détonations beaucoup plus importantes. Cette découverte ne nous a coûté que la destruction regrettable de plusieurs centres de recherche de second ordre."
 crisis.7265.desc.g: "Nous n'avons rien réalisé d'extraordinaire en termes de modification de la réalité. Cependant, nous avons beaucoup appris sur la technologie conventionnelle."
 crisis.7265.desc.h: "Une tentative de modulation de l'espace a abouti à l'expansion d'une colonie. Contre toute attente, le phénomène semble permanent et, bien que nous ne sachions pas encore comment cela a été possible, nous ne pouvons que supposer que de la matière provenant d'une autre dimension s'est logée dans les espaces interstitiels entre les particules atomiques. C'est à la fois déroutant et étonnant."
 crisis.7265.a: "C'est brillant !"
 crisis.7265.b: "Époustouflant"
 crisis.7265.c: "Merveilleux"
 crisis.7265.d: "Intéressant"
 add_crisis_currency_doubled_tt: "\nNous avons gagné [crisobj_thesis_value_bonus] de £advanced_logic£§Ylogique avancée§!."
 crisis.7265.e: "Bravo ?"
 crisis.7265.f: "Classique !"
 crisis.7265.g: "C'est tout de même étrange..."
 crisis.7265.h: "On ne va pas s'en plaindre"
 crisis.7270.name: "Thèse de l'infini : un malheureux échec"
 crisis.7270.desc.a: "L'échec est un élément fondamental du processus scientifique. Nous avions de grands espoirs pour cette expérience. En fin de compte, elle n'a pas réussi. C'est une leçon frustrante mais précieuse, et nous en tirerons tous les enseignements possibles."
 crisis.7270.desc.b: "Nous avons réussi à modifier le cours du temps ! Après avoir expérimenté sur des régions vides de l'espace, nous avons pensé pouvoir mettre le processus en pratique sur l'une de nos colonies, et cela a fonctionné ! Pendant quelques années, le temps va ralentir de 20.537%. Ce ralentissement n'est pas idéal, mais c'est tout de même une grande avancée pour nous."
 crisis.7270.desc.c: "Nos dernières expériences ont eu un effet secondaire fâcheux. Tous nos dispositifs de stockage d'énergie ont été déchargés. Rien n'est cassé, mais toute l'énergie qu'ils stockaient a été perdue, peut-être transportée dans une autre dimension. Nous ne savons pas encore ce qu'il s'est passé exactement, mais c'est fascinant."
 crisis.7270.desc.d: "Un fiasco honteux. Nous avons modifié nos banques de données en altérant la réalité, détruisant de manière irréversible des années de recherche. Nombre de nos théories devront être reformulées de zéro. Il s'agit d'un revers important, mais nous en profiterons pour réviser d'anciennes études."
 crisis.7270.desc.e: "Si cette expérience sur les sources et la production d'énergie avait très bien commencé, elle a pris une tournure désastreuse lorsqu'elle s'est répercutée sur les réacteurs de nos vaisseaux, provoquant des pannes dans toute la flotte. Certains vaisseaux ont réussi à éteindre leurs réacteurs à temps, mais d'autres ont subi de graves dommages."
 crisis.7270.desc.f: "[leader_target.GetName], qui était à la tête des expériences, a péri suite à une compression de l'espace-temps dans la zone de test. Notre modification de la réalité a partiellement réussi, mais son décès nous rappelle que le savoir a un prix."
 crisis.7270.desc.g: "Une expérience informatique a échappé à notre contrôle et a pris plus d'ampleur que prévu. En conséquence, de précieuses données de recherche ont été transformées en charabia. Heureusement, les banques contenant les données de nos études les plus avancées étaient bien sécurisées et n'ont pas été affectées."
 crisis.7270.desc.h: "Une tentative de modulation de l'espace a entraîné le rétrécissement d'une colonie. Cette situation est permanente et quelque peu inattendue. Nous supposons que la matière a fui d'une dimension à l'autre. Tout cela est très déconcertant."
 crisis.7270.a: "$crisis.7240.c$"
 crisis.7270.b: "$crisis.7240.c$"
 crisis.7270.c: "$crisis.7240.c$"
 crisis.7270.d: "$crisis.7240.c$"
 no_crisis_currency_tt: "\nCette thèse ne nous a pas rapporté de £advanced_logic£§Ylogique avancée§!."
 crisis.7270.e: "$crisis.7240.c$"
 cosmogenesis_damage_ships_tt: "Nos flottes vont subir des dégâts."
 crisis.7270.f: "$crisis.7240.c$"
 crisis.7270.g: "$crisis.7240.c$"
 crisis.7270.h: "$crisis.7240.c$"
 crisis.7280.desc: "Salutations, [Root.GetSpeciesNamePlural]. Aujourd'hui, vous avez franchi une étape technologique importante, et nous sommes on ne peut plus fiers. Votre chemin pour arriver jusqu'ici a été semé d'embûches. Les surmonter vous a fait grandir, et vos récentes prouesses technologiques prouvent que nous avons eu raison de vous guider."
 crisis.7285.desc: "Malheureux ! Aujourd'hui, vous avez dépassé les limites de notre patience. Vos expériences irréfléchies sont un danger pour tous, et nous vous ordonnons d'y mettre un terme. Vous ne savez pas ce que vous faites, et, bien que la curiosité soit louable, un tel niveau d'inconscience est intolérable. La réalité a été construite de cette manière pour une raison. Laissez-la en l'état."
 crisis.7285.a: "Vous avez raison, c'est bien trop dangereux"
 crisis.7285.a.tt: "Nous renonçons à notre ambition cosmogénique et perdons l'accès à la plupart des bâtiments et vaisseaux des empires déchus.\n\n§RCela nous empêche de mener à bien notre chemin de crise.§!"
