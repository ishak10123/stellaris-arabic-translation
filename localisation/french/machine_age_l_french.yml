 concept_adaptive_frames_traits: "Traits $trait_auto_mod_robotic$"
 concept_adaptive_frames_traits_desc: "Les traits de cadres adaptatifs sont des traits d'espèce pouvant être modifiés automatiquement par le trait ['trait:trait_auto_mod_robotic'].$NEW_LINE$$concept_automodding_robotic_desc$"
 concept_automodding_robotic: "Liste de traits mécaniques à modification automatique"
