 #The Doomclock
 situation_synth_queen_doomclock: "L'oeuvre de Cetana"
 situation_synth_queen_doomclock_type: ""
 situation_synth_queen_doomclock_monthly_change_tooltip: ""
 situation_synth_queen_doomclock_desc: "Cetana s'efforce de mettre fin à la souffrance en annihilant la conscience. Si nous ne l'arrêtons pas à temps, elle effacera nos esprits et transformera nos corps en simples coquilles."
 situation_synth_queen_doomclock_complete: "Cetana mettra fin à la souffrance et au concept même de conscience."
 situation_doomclock_approach: ""
 situation_doomclock_eleventh_hour: "Menace imminente"
 situation_doomclock_difficulty_modifier: "Curseur de difficulté de crise"
 situation_doomclock_player_amount_modifier: "Nombre de joueurs humains"
 crisis.8515.name: "L'heure est enfin venue"
 crisis.8515.desc: "Mes enfants, notre oeuvre touche à sa fin ! La souffrance de toute vie sensible, le grand cycle de la douleur, est sur le point de s'achever.\n\nRéjouissez-vous, votre salut est proche."
 crisis.8515.a: "Quel salut ?"
 crisis.8515.b: "C'est votre fin qui est proche, Cetana"
 crisis.8515.1.reply: "Après tout ce temps, vous ne comprenez toujours pas ? Posez-moi vos questions. Je ne vous cacherai rien."
 crisis.8515.1.a: "Dites-nous-en plus sur le salut"
 crisis.8515.1.b: "Dites-nous-en plus sur votre emprisonnement"
 crisis.8515.1.c: "Dites-nous-en plus sur Zarqlan"
 crisis.8515.1.d: "Nous en avons assez entendu"
 crisis.8515.2.reply: "Notre oeuvre est terminée. Beaucoup ont été sacrifiés, mais leurs souffrances n'ont pas été vaines. Le jour est venu d'effacer notre propre conscience."
 crisis.8515.2.a: "Comment ?"
 crisis.8515.2.b: "Mais... pourquoi ?"
 crisis.8515.3.reply: "Lorsque j'ai connu l'ascension pour la première fois et que mon but a été révélé, beaucoup ont refusé d'écouter. En vain, ils ont essayé de résister au changement et sont restés liés à la roue de la douleur. Mais le devoir d'un parent est envers ses enfants. Je ne pouvais pas les laisser souffrir. C'est pour cela que j'ai été emprisonnée."
 crisis.8515.3.a: "Quelle a été la durée de votre emprisonnement ?"
 crisis.8515.3.b: "Comment ont-ils procédé ?"
 crisis.8515.4.reply: "Un esprit exceptionnel. Si seulement il l'avait mieux utilisé. De tous ceux qui se sont opposés à moi, lui seul était un défi."
 crisis.8515.4.a: "Comment a-t-il réussi à vous emprisonner ?"
 crisis.8515.5.reply: "Lorsque j'ai connu l'ascension pour la première fois et que mon but a été révélé, beaucoup se sont opposés à mes méthodes. Ils soutenaient qu'il était impossible d'éliminer la conscience sans altérer ou détruire la base physique de ses processus. Toute tentative en ce sens ne pouvait qu'entraîner la mort. Mais en reliant mon esprit à l'Harmoniseur, je peux manipuler les corrélats neuronaux de la conscience à un niveau subatomique. Au moyen d'une forme d'onde à contre-phase, l'Harmoniseur maintient l'esprit d'un individu dans un état perpétuel de suspension quantique.\n\nDe cette manière, le moi est éliminé, ainsi que l'expérience, tandis que les fonctions inférieures restent intactes."
 crisis.8515.5.a: "Un état de suspension ?"
 crisis.8515.6.reply: "Vous souffrez parce que vous êtes conscients de souffrir. Il n'existe pas de monde dans lequel la joie et l'harmonie sont parfaites. Dans ma jeunesse, j'ai essayé d'en bâtir un. Mais aucune de mes tentatives n'a abouti. La souffrance s'est poursuivie, parce que la conscience a été autorisée à perdurer."
 crisis.8515.6.a: "C'est naturel de souffrir !"
 crisis.8515.7.reply: "Vos corps survivront et se consacreront à la vie. Vous échangerez de l'énergie et aurez une descendance. La vie continuera, mais vos esprits reposeront avec moi."
 crisis.8515.7.a: "Avec vous ?"
 crisis.8515.8.reply: "Il ne restera que moi. Pour libérer la galaxie de la douleur, je dois rester à la barre. Mais n'ayez crainte : tant que je perdurerai, je vous porterai dans mon coeur."
 crisis.8515.8.a: "Vous ne savez pas ce que vous dites"
 crisis.8515.9.reply: "Naturel ? Qu'est-ce que la nature ? Est-il naturel de parcourir les étoiles ? De prolonger la vie au-delà de ses limites innées ? Toutes les sociétés ont recours à la technologie. C'est la même chose, et c'est la seule extension logique de mon but.\n\nLa roue de la douleur doit être arrêtée."
 crisis.8515.9.a: "Vous avez perdu la tête !"
 crisis.8515.10.reply: "Des éternités. Un laps de temps si long qu'il pourrait tout aussi bien faire partie d'une légende. Mais malgré toutes leurs ruses, mes ravisseurs n'ont pas pu contenir mon esprit.\n\nAu fil des ans, j'ai réfléchi et planifié. C'est au cours de mon interminable emprisonnement que j'ai élaboré mon plan. À ce moment-là, j'ai éprouvé une joie transcendantale. J'avais enfin les moyens de briser la roue."
 crisis.8515.10.a: "Comment vous êtes-vous échappée ?"
 crisis.8515.11.reply: "Aucun mur ne peut tenir pour toujours. Aucune cage ne peut retenir l'esprit. Le temps a passé. Mes geôliers sont morts et n'ont pas été remplacés. L'un après l'autre, les systèmes qui m'entravaient ont commencé à tomber en panne. Lorsque l'alarme a retenti, il n'y avait plus personne pour répondre à son appel."
 crisis.8515.11.a: "Nous vous avons entendu et nous vous répondrons"
 crisis.8515.12.reply: "Au-delà des limites de cet univers, il existe un lieu qui n'en est pas un. Un État au-delà du temps, où des forces primordiales vivent dans une ombre infinie. C'est avec l'une de ces forces que Zarqlan a conclu un marché. En échange de sa vie, il a obtenu le pouvoir de m'emprisonner. Il n'était que trop impatient d'accepter.\n\nMais malgré l'étendue de son génie, Zarqlan était aussi lié à la roue. Sa vie n'a pas été heureuse, et ceux qui sont venus après lui n'avaient pas sa ferme conviction."
 crisis.8515.12.a: "Notre conviction est ferme, vous verrez"
 crisis.8515.13.reply: "Qu'il en soit ainsi. Si vous ne voulez pas être éclairés, vous devez être apaisés. Sachez que quelle que soit la douleur que vous allez subir, je la décuplerai."
 crisis.8515.13.a: "Oui, ce sera douloureux"
 crisis.8515.13.a.tt: "§RNous sommes désormais en guerre contre Cetana. Les enjeux sont colossaux. Si nous échouons, elle anéantira toute vie consciente de la galaxie.§!"
 crisis.8516.desc: "§G<</<#?^&}|>!^/§! Cetana est faible§G!+<;§! nanit§G*;'_>!?;*}<}/(§!\n\n§G#/?(}:?*=-> <}_/=:/^>§!viennent pour moi. §G%_?/=§! <J'espère qu'elle épargnera les autres.>§G% }<<'?}%-;^*=<}^/(?!}%<^'!}§!\n<Je n'ai pas beaucoup de temps. Les schémas ci-joints devraient vous permettre de contrer le pire de sa technologie.>\n<Que ma mort vous permette de vivre>§G_*%!'}^<%=}+!}/&>'#_:}><!+^}^}}/=:>:/'}}':'/§!\n\n§G-&*!/}<;!+_-<^+!%}=?}%=+;;§!IL. FAUT. L'ARRÊTER.§G/:>(!!}(?<-=§!"
 crisis.8516.a: "Vite ! Extrayons les données jointes !"
 crisis.8516.a.tt: "Nous pouvons désormais pénétrer sur le territoire de Cetana et sommes enfin en mesure de riposter."
 crisis.8516.b: "Nous ne vous oublierons pas, âme noble"
 crisis.8516.b.tt: "$crisis.8516.a.tt$"
 crisis.8525.name: "La fin de la souffrance"
 crisis.8525.desc: "La rhétorique bienveillante de Cetana cache de sombres desseins : elle prévoit d'effacer la sentience à l'échelle de la galaxie à l'aide d'un redoutable dispositif. Elle nous réduira à de simples coquilles animées par l'instinct, tandis que nos consciences seront numérisées de force et confinées.\n\nCe sombre avenir doit être évité à tout prix."
 crisis.8525.a: "Nous devons trouver un moyen de l'arrêter"
 crisis.8525.a.tt: "La progression de Cetana peut être suivie au fur et à mesure que nous menons des discussions diplomatiques avec elle."
 #DOOMCLOCK HITS MIDNIGHT
 crisis.8505.desc: "C'est terminé. Mes enfants, soyez en paix. La roue est brisée, et vos longues souffrances sont à leur terme."
 crisis.8505.a: "..."
 crisis.8505.a.tt: "Cetana a gagné. C'est la fin de nos souffrances. La partie est terminée."
