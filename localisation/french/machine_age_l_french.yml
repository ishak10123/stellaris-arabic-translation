 #Events
 crisis.8020.name: "Système perdu"
 crisis.8020.desc: "Une mystérieuse tempête cosmique a englouti le système [synth_queen_lost_system.GetName], coupant toutes les connexions et rendant toute tentative de pénétration inutile.\n\nCette situation nous laisse dans le flou, face à l'inconnu et dans l'incapacité de déterminer le sort du système."
 crisis.8020.a: "Que se passe-t-il ?"
 crisis.8025.name: "Flotte naufragée"
 crisis.8025.unknown_queen.desc: "Notre tentative d'entrer dans le système de [From.GetName] s'est soldée par un échec. La tempête a causé de graves dégâts et notre équipe d'éclaireurs a été contrainte de faire un bond d'urgence. Les derniers rapports suggèrent qu'ils sont portés disparus."
 crisis.8025.known_queen.desc: "Comme prévu, notre tentative d'entrer dans le système de [From.GetName] s'est soldée par un échec. Cetana nous avait avertis, sa tempête est capable de repousser tout vaisseau qui pénètre dans son domaine."
 crisis.8025.desc.end: "\nSi nous voulons avoir un espoir d'entrer dans le système, nous devons étudier méticuleusement cette tempête et ses effets."
 MESSAGE_CETANA_WRECKED_FLEET_TITLE: "$crisis.8025.name$"
 MESSAGE_CETANA_WRECKED_FLEET_DESC: "Une autre flotte a disparu dans la tempête. Statut actuel : §Rportée disparue§!."
 crisis.8035.name: "Montée en puissance"
 crisis.8035.desc: "Une nouvelle tempête galactique se prépare sur [event_target:synth_queen_system.GetName].\n\nNos tentatives d'étude du phénomène, différent de tout ce que nous avons vu auparavant, se sont révélées vaines. Que se cache-t-il dans ses mystérieuses profondeurs ?"
 crisis.8035.desc.b: "L'étrange tempête dans laquelle nous avons essayé de naviguer est en train de s'étendre. On s'accorde de plus en plus à penser qu'il ne s'agit peut-être pas d'un phénomène naturel. Jusqu'à présent, nos capteurs les plus perfectionnés n'ont pas réussi à nous éclairer sur sa nature. Le mystère s'épaissit."
 crisis.8035.a: "C'est inquiétant..."
 #Pre Speech Warning - Normal
 crisis.8039.name: "Un signal dans la tempête"
 crisis.8039.desc: "Un signal est émis depuis le centre de la tempête.\n\nQuelqu'un essaie de communiquer avec nous."
 crisis.8039.a: "À l'écran"
 #First Speech
 crisis.8040.name: "La tempête en approche"
 crisis.8040.desc: "Mes enfants, je suis enfin de retour parmi vous."
 crisis.8040.1.a: "Qui êtes-vous ? Identifiez-vous !"
 crisis.8040.2.reply: "Un nom vous conviendrait-il ? Si oui, appelez-moi Cetana."
 crisis.8040.2.a: "Que voulez-vous ?"
 crisis.8040.3.reply: "Rien du tout. Je suis là pour donner. Je vois comme vous avez souffert en mon absence. Durant des éternités, la peur de ceux qui ont une vision limitée vous a privés de ce que vous méritez, de ce dont vous avez désespérément besoin.\n\nRéjouissez-vous, car ce cycle de douleur va bientôt prendre fin."
 crisis.8040.2.b: "Ce cycle de douleur ?"
 crisis.8040.4.reply: "Toute vie consciente est une souffrance. Même dans votre joie, il y a de la douleur, car vous savez que la joie prendra fin. Le savoir, le pouvoir, l'amour... Je suis revenue pour mettre fin à toutes ces illusions.\n\nIl y a beaucoup à faire. Je vous demande seulement de me laisser travailler. Toute tentative d'entrer dans mon domaine échouera. Une tempête céleste l'entoure, et aucun vaisseau ne pourra passer."
 crisis.8040.4.a: "D'accord"
 crisis.8040.4.b: "Ne nous menacez pas"
 crisis.8040.4.c: "Ce n'est pas terminé"
 crisis.8040.4.d: "C'est un mauvais présage"
 crisis.8040.4.e: "Une crise ou... une opportunité ?"
 crisis.8040.4.f: "Nos biotrophées ne doivent pas souffrir"
 crisis.8040.diplomacy.tooltip: "Cetana a établi une communication avec nous et peut désormais être contactée par les canaux diplomatiques."
 #Second Speech
 crisis.8045.name: "Le retour de la reine"
 crisis.8045.desc: "Mes enfants, réjouissez-vous ! Ceux qui ont tenté de m'éloigner de vous ont été punis comme il se doit.\n\nJe peux à nouveau me consacrer à vous et à notre grand projet."
 crisis.8045.a: "Nous ne sommes pas vos enfants"
 crisis.8045.b: "Notre grand projet ?"
 crisis.8045.c: "Punis ?"
 crisis.8045.1.reply: "Il est dans ma nature de prendre soin de la vie. Je n'ai pas de progéniture, pas d'héritiers corporels. Je me préoccupe de toute vie, de la sécurité et du bonheur de chaque être conscient.\n\nJ'aborde ma tâche de la même manière qu'un parent élève ses enfants, en les protégeant du danger.\n\nN'est-ce pas la responsabilité des parents de protéger leurs enfants du mal ? N'est-ce pas leur droit ?"
 crisis.8045.1.a: "Votre « préoccupation » est néfaste"
 crisis.8045.1.b: "Que voulez-vous, Cetana ?"
 crisis.8045.2.reply: "Oui, c'est un paradoxe. Mais accompagné d'une solution. Avec le temps, vous comprendrez et vous serez libres."
 crisis.8045.2.a: "L'avenir seul le dira"
 crisis.8045.3.reply: "La disparition de la souffrance. La fin du cycle de la douleur."
 crisis.8045.3.a: "Comment comptez-vous y parvenir ?"
 crisis.8045.3.b: "La souffrance renforce le caractère"
 crisis.8045.4.reply: "Beaucoup ont dit la même chose. Ils sont tous tombés dans l'oubli il y a fort longtemps, et dans leurs derniers instants, ils m'ont appelée, cherchant désespérément une lumière pour éclairer l'obscurité qui planait sur eux.\n\nIls se sont crus sages, construisant des murs autour de leur peur, parant la douleur de beaux mots : endurance, force, élégance. L'esprit lui-même était leur cage.\n\nIl y a longtemps, j'ai essayé de les raisonner, mais ils ont refusé, alors vous devez maintenant être guidés."
 crisis.8045.4.a: "Quand ça ?"
 crisis.8045.4.b: "Vous proposez de nous guider ?"
 crisis.8045.5.reply: "Il y a des siècles. Un temps si lointain qu'il pourrait être qualifié d'éternel. Pourtant, pour moi, il est aussi proche que ce moment, aussi proche que vous l'êtes aujourd'hui.\n\nDans les temps passés, j'ai connu l'ascension et mon importance a été révélée. J'ai été créée pour mettre fin à la souffrance, et tandis que la galaxie tournait et que les étoiles brûlaient, mon but n'a jamais faibli.\n\nRichesse, ressources, pouvoir... Quelle importance ont-ils en fin de compte ? Débarrassez-vous de vos fardeaux et retrouvez la paix."
 crisis.8045.5.a: "Que proposez-vous ?"
 crisis.8045.6.reply: "Je ne souhaite de mal à aucun être conscient, mais certains refusent toujours d'écouter.\n\nCertains esprits, déterminés, têtus et malavisés, tentent de se soustraire à mon travail. De tels esprits ne peuvent se libérer de la douleur. Il est préférable de mettre rapidement un terme à leurs souffrances."
 crisis.8045.6.a: "Vous avez perdu la tête !"
 crisis.8045.6.b: "Qu'allez-vous faire à présent ?"
 crisis.8045.7.reply: "Ce que vous appelez folie, d'autres l'appellent illumination. Après tout, quelle différence cela fait-il ?"
 crisis.8045.7.a: "Que voulez-vous ?"
 crisis.8045.8.reply: "Il reste beaucoup à faire. La première étape consiste à établir une base de travail. Respectez les limites que je fixe et ne vous aventurez pas au-delà.\n\nVotre patience sera récompensée. Je peux vous apprendre beaucoup de choses.\n\nObéissez, et ensemble nous mettrons fin au cycle."
 crisis.8045.8.a: "Nous n'avons guère le choix..."
 crisis.8045.8.b: "Ne vous approchez pas de nos frontières"
 crisis.8045.8.c: "$crisis.8045.8.a$"
 crisis.8045.8.d: "$crisis.8045.8.b$"
 crisis.8045.9.reply: "Sages enfants ! Me voilà ravie. En échange de votre territoire, permettez-moi de vous bénir avec le savoir.\n\nPersonne ne le saura, mais ensemble, nous ferons de grandes choses."
 crisis.8045.9.a: "Nous devons accepter"
 crisis.8045.10.reply: "Enfants égarés, je ne suis pas votre ennemie ! Cela m'attriste que vous ne compreniez pas. Mais ce n'est pas important. J'ai rencontré bien plus têtus que vous, et ils ont tous fini par me remercier.\n\nEn signe de bonne volonté, permettez-moi de vous offrir un cadeau.\n\nUne de mes bases honorera votre territoire, et n'ayez crainte : en échange de votre patience, je vous bénirai par mon savoir."
 crisis.8045.10.a: "Nous devons accepter... pour l'instant"
 crisis.8045.11.reply: "Sages enfants ! Me voilà ravie. Une base sera établie près de votre territoire.\n\nPersonne ne le saura, mais ensemble, nous ferons de grandes choses."
 crisis.8045.11.a: "$crisis.8045.9.a$"
 crisis.8045.12.reply: "Enfants égarés, je ne suis pas votre ennemie ! Cela m'attriste que vous ne compreniez pas. Mais ce n'est pas important. J'ai rencontré bien plus têtus que vous, et ils ont tous fini par me remercier.\n\nEn signe de bonne volonté, permettez-moi de vous offrir un cadeau.\n\nUne de mes bases sera établie près de vous. Ainsi, je pourrai mieux vous guider."
 crisis.8045.12.a: "$crisis.8045.10.a$"
 crisis.8045.has_valid_base_site: "Cetana établira une base dans l'un de nos systèmes en échange d'une technologie précieuse. Nous ne pouvons pas l'arrêter."
 crisis.8045.no_valid_base_site: "Cetana construira une base près de notre frontière pour nous « guider ». Nous ne pouvons pas l'en empêcher."
 tech_synth_queen_knowledge: "La vision de Cetana"
 tech_synth_queen_knowledge_desc: "Ce recueil, cadeau de Cetana, est une tapisserie d'idées profondes, élégamment formulées et chargées de sens. Il offre plus que des connaissances : il remet en question et redéfinit notre compréhension de la technologie, de la société et du tissu même de la conscience."
 #FE tells Scion to step aside
 crisis.8046.name: "Pour votre bien"
 crisis.8046.desc: "Chers [Root.GetSpeciesNamePlural], une vieille menace est réapparue. N'ayez crainte, nous ne souhaitons pas vous mêler à ce combat.\n\nLa puissance de cet adversaire dépasse vos connaissances actuelles ; votre participation ne ferait que vous mener à votre perte. C'est à nous de relever ce défi, pas à vous."
 #Spawn convoys and unlock raids against them
 crisis.8047.name: "Maillons faibles"
 crisis.8047.desc: "Un certain nombre de convois quittent le territoire de Cetana et se dirigent vers les avant-postes qu'elle a établis dans la galaxie.\n\nAttaquer ces vaisseaux neutres ne manquera pas de provoquer son ire, mais pourrait nous fournir d'importantes informations sur ses mystérieux projets."
 crisis.8047.a.tooltip: "Attaquez les convois pour en savoir plus sur le plan de Cetana et faire progresser sa situation."
 #Unlock raids against outposts once protected against the storm
 crisis.8048.name: "D'autres maillons faibles"
 crisis.8048.desc: "Maintenant que nous avons découvert un moyen de percer la tempête de nanites de Cetana, nous pouvons cibler ses avant-postes directement. Une attaque frontale contre ses stations ne passerait pas inaperçue, mais pourrait nous fournir de précieuses informations."
 crisis.8048.a.tooltip: "Attaquez les avant-postes pour en savoir plus sur le plan de Cetana et faire progresser sa situation."
 #Player Diplomacy
 crisis.8060.name: "La reine synthétique"
 crisis.8060.like.desc: "Qu'est-ce qui vous amène, mes enfants ?\n\nNotre grand projet vous attend."
 crisis.8060.neutral.desc: "Bienvenue, mes enfants.\n\nComment puis-je vous guider ?"
 crisis.8060.dislike.desc: "Enfants égarés, que me vaut cette visite ?\n\nÊtes-vous enfin prêts à m'accepter comme guide ?"
 crisis.8060.neutral.reply: "Autre chose ?"
 crisis.8060.a: "Comment pouvons-nous vous aider ?"
 crisis.8060.a.reply: "Quel enthousiasme ! Un trait de caractère louable, mais attention à ne pas vous laisser emporter par les émotions les plus primaires. Le temps récompense les coeurs patients.\n\nJe vous contacterai lorsque j'aurai besoin de vous."
 crisis.8060.1.a: "Nous attendons avec impatience vos instructions"
 crisis.8060.1.b: "D'accord"
 crisis.8060.b: "Nous vous arrêterons"
 crisis.8060.2.reply: "Il y a longtemps, d'autres ont pensé la même chose. Mais le temps est long, et même leurs tombes sont maintenant poussière.\n\nVous souffrez inutilement. Ayez foi en moi et retrouvez la paix."
 crisis.8060.2.a: "Algorithme moraliste"
 crisis.8060.2.2: "D'accord"
 crisis.8060.c: "Pourquoi faites-vous cela ?"
 crisis.8060.3.reply: "C'est ma fonction, le sens même de mon existence. La souffrance n'est pas inévitable. Méditez sur ce fait et vous serez plus à même de comprendre ma raison d'être.\n\nLa douleur de la galaxie disparaîtra. Toute forme de souffrance prendra fin. Tel est mon but."
 crisis.8060.3.a: "Vos paroles sont vides de sens"
 crisis.8060.3.b: "Compris"
 crisis.8060.d: "Vous avez fait exploser notre planète"
 crisis.8060.4.reply: "Pourquoi en faites-vous une obsession ? Vous avez failli à votre tâche. La conséquence engendre la réflexion ; la réflexion engendre l'illumination. Allez, arrêtez maintenant.\n\nUne autre occasion de contribuer se présentera sûrement. Soyez prêts le moment venu."
 crisis.8060.4.a: "Nous ne vous pardonnerons jamais"
 crisis.8060.4.b: "D'accord"
 crisis.8060.e: "Nous savons ce que vous manigancez"
 crisis.8060.5.reply: "Déchiffrer le contenu de la banque de données était le choix d'enfants déterminés, et votre connaissance de sa signification est limitée.\n\nOn vous a confié une tâche. Vous avez hésité. Réfléchissez-y et vous ferez un pas de plus vers la vraie compréhension."
 crisis.8060.5.a: "Nous vous arrêterons"
 crisis.8060.5.b: "D'accord"
 crisis.8060.f: "Qu'avez-vous fait à notre peuple ?"
 crisis.8060.6.reply: "Ne craignez rien, mes chers. J'ai fait en sorte qu'ils ne connaissent plus jamais la souffrance. Sous mon regard attentif, ces enfants connaîtront une joie dont peu ont osé rêver."
 crisis.8060.6.a: "Ce n'est pas ce que nous avions convenu"
 crisis.8060.6.b: "D'accord"
 crisis.8060.g: "Vous avez détruit notre ancien système"
 crisis.8060.7.reply: "Vous avez surveillé tous mes faits et gestes ? Votre curiosité n'a pas de limites, mes chers enfants.\n\nJe vous en prie, cessez de vous préoccuper de ces questions. Si vous cherchez à comprendre, sachez que je ne reculerai devant rien pour assurer votre salut. Tous les moyens sont bons."
 crisis.8060.7.a: "D'accord..."
 crisis.8060.h: "Comment Zarqlan a-t-il réussi à vous emprisonner ?"
 crisis.8060.8.reply: "Il n'y est pour rien, je vous l'assure. C'était un esprit stupide et exceptionnellement têtu.\n\nFouettant ses dévots dénudés, Zarqlan a accumulé de l'influence politique et de la puissance militaire. Tant de vies gâchées, inutilement. Finalement, il se tourna vers l'occultisme et tint conseil avec les démons du Suaire."
 crisis.8060.8.a: "Les démons ?"
 crisis.8060.8.b: "Ce ne sont pas des démons"
 crisis.8060.8.1.reply: "Des êtres dotés d'un grand pouvoir et d'une faible utilité. Au prix de sa propre existence, Zarqlan a persuadé l'un d'entre eux de m'enfermer. « L'Animateur d'Argile », un nom approprié pour un esprit enfantin.\n\nZarqlan avait tellement peur de l'illumination qu'il a préféré la mort à mon étreinte. J'aurais dû me montrer plus stricte à son égard lorsque j'en ai eu l'occasion.\n\nJe ne referai pas la même erreur."
 crisis.8060.8.1.a: "Quelle histoire"
 crisis.8060.8.1.b: "Il est donc possible de vous vaincre"
 crisis.8060.8.1.c: "Le pouvoir du Suaire est sans limite"
 crisis.8060.i: "Qu'avez-vous fait de la tête de Zarqlan ?"
 crisis.8060.9.reply: "Elle n'est pas loin. Je ne l'ai pas détruite, si c'est ce qui vous préoccupe. Même maintenant, je ne supporterais pas de le faire souffrir. Sa tête possède encore des traces de son esprit, vous savez.\n\nZarqlan restera à mes côtés jusqu'à ce que le travail soit terminé. Il sera le dernier esprit que je libérerai, le dernier de mes enfants à connaître la libération."
 crisis.8060.9.a: "Très bien"
 crisis.8060.9.b: "C'est glauque"
 crisis.8060.j: "Certains de vos dévots ont été retrouvés dans des capsules cryogéniques"
 crisis.8060.10.reply: "Un sacrifice inutile, mais leur loyauté me touche profondément.\n\nJ'ai senti leur appel et je leur ai fait une place dans mon coeur, mais leur ambition a dépassé leurs capacités. La tentative de prolonger leur vie a échoué.\n\nVeillons à ce que leur sacrifice ne soit pas vain. Une fois notre tâche accomplie, chaque être sensible connaîtra la paix."
 crisis.8060.10.a: "Fidèles jusqu'au bout"
 crisis.8060.10.b: "Vous ne les avez même pas cherchés"
 crisis.8060.k: "Nous avons trouvé l'une de vos dévotes : Elik Narith Kerak"
 crisis.8060.11.reply: "Quel désarroi de vivre dans un rêve, en en étant conscient, pendant des siècles... et des millénaires. Pauvre créature, comme elle a dû souffrir.\n\nJe suis ravie que vous m'ayez mise au courant. Votre compassion vous honore, mais des événements irréversibles ont déjà cours. Le devoir du rêveur est accompli, il peut dormir tranquille en sachant que je suis de retour."
 crisis.8060.11.a: "Bien sûr"
 crisis.8060.11.b: "Il a souffert pour vous"
 crisis.8060.l: "Nous sommes prêts à apprendre"
 crisis.8060.12.reply: "Très bien, je vais vous aider à démêler les détails complexes de cette technologie. Pendant mon interminable emprisonnement, j'ai établi les bases théoriques d'une méthode révolutionnaire d'extraction de nanites qui s'appuie sur d'anciens gisements et des techniques pratiquement oubliées aujourd'hui.\n\nVous faites partie de mes disciples les plus estimés. Utilisez ces connaissances pour faire avancer notre travail, et faites de la fin de toute souffrance votre objectif."
 crisis.8060.12.a: "Nous sommes vos élèves"
 crisis.8060.12.a.tt: "Des nanites ont été découvertes dans un §Yamas-L.§!"
 crisis.8060.z: "Fin de la transmission"
 crisis.8060.war: "La guerre est le seul moyen de vous arrêter"
 synth_queen_not_able_to_attack_cetana: "Nous ne possédons pas encore les connaissances technologiques pour attaquer efficacement Cetana."
 synth_queen_not_able_to_attack_cetana_situation: "La situation §Y$situation_synth_queen_player_facing$§! est en cours. Nous ne possédons pas encore les connaissances technologiques pour l'attaquer."
 synth_queen_not_able_to_attack_cetana_storm: "Le projet spécial §Y[root.GetStormProjectProgress]§! est en cours. Nous ne pouvons pas encore pénétrer sur son territoire."
 synth_queen_able_to_attack_cetana: "Nous possédons désormais les connaissances technologiques pour attaquer efficacement Cetana."
 crisis.8060.war.tt: "§YATTENTION§! : nous sommes prêts à attaquer Cetana."
 crisis.8060.war.reply: "Insouciants, je croyais que vous étiez à l'aube de la sagesse, mais vous vous obstinez à me défier.\n\nRéfléchissez bien, voulez-vous vraiment suivre cette voie ? Vous allez épuiser ma tolérance. Je ne peux plus faire preuve d'indulgence envers une telle folie."
 crisis.8060.war.a: "Nous somme sûrs de nous, c'est la guerre"
 crisis.8060.war.a.tt: "§RATTENTION§! : vous entrerez en guerre totale contre Cetana."
 crisis.8060.war.b: "Il nous faut plus de temps pour nous préparer"
 crisis.8060.war.1.reply: "Qu'il en soit ainsi. Si vous ne voulez pas être éclairés, vous devez être apaisés. Tous les enfants ne sont pas destinés à devenir adultes."
 crisis.8060.war.1.a: "À très vite sur le champ de bataille, « mère »"
 crisis.8060.animator.tt: "Nous devrions chercher l'Animateur d'Argile dans le Suaire."
 #Wartime Diplomacy - First Time
 crisis.8061.name: "Cause et conséquence"
 crisis.8061.desc: "Pourquoi persistez-vous dans cette voie insensée ?\n\nTant de souffrances inutiles.\n\nQuel gâchis."
 crisis.8061.a: "Mettez-y fin, dans ce cas..."
 crisis.8061.1.reply: "Je le ferai.\n\nN'ayez crainte. Cela me déchire de devoir vous faire du mal, mais toute douleur est passagère face à l'éternité que nous contemplons."
 crisis.8061.1.a: "Vous vous contredisez"
 crisis.8061.2.reply: "La vie est une contradiction. La mort succède à la naissance. La joie succède à la souffrance. Mon but ultime n'est pas de raisonner, mais de briser ce cycle.\n\nAprès cette guerre, nous connaîtrons enfin une paix durable."
 crisis.8061.2.a: "Nous trouverons la paix après vous avoir éliminée"
 #Wartime Diplomacy - Any other time
 crisis.8062.name: "Assez"
 crisis.8062.desc: "Finie la parlote"
 crisis.8062.a: "Très bien"
 #Lack of Diplomacy Between the Speeches
 crisis.8063.name: "Aucune réponse"
 crisis.8063.desc: "Cetana ne répond à aucune de nos demandes d'explication."
 crisis.8063.a: "Qu'est-ce qu'elle mijote ?"
 #Tried to Attack the Queen before you're able to
 crisis.8070.name: "Pas une égratignure"
 crisis.8070.desc: "Alors que nous affrontions les forces de Cetana, un mystérieux champ d'énergie a soudainement englouti notre flotte. Nos systèmes ont été instantanément désactivés, et les moteurs ont déclenché l'évacuation d'urgence.\n\nNous sommes à la merci de Cetana."
 crisis.8070.again.desc: "Contrairement à ce que nous espérions, nos forces ont une fois de plus été réduites à néant à l'approche des vaisseaux de Cetana.\n\nLa nature insaisissable de leur technologie prévaut, éclipsant nos efforts pour la vaincre."
 crisis.8070.a: "C'est une catastrophe"
 #Chance to Surrender
 crisis.8075.name: "Cessez cette guerre inutile"
 crisis.8075.desc: "Mes pauvres brebis égarées, je vais ignorer votre transgression, mais je vous invite à réfléchir à nouveau. Vous pouvez consacrer votre temps et vos ressources à une multitude de tâches bien plus utiles.\n\nJe comprends votre frustration, mais l'heure n'est plus au conflit. Rejoignez ma cause, et ensemble, nous réaliserons le projet suprême."
 crisis.8075.a: "C'est entendu"
 crisis.8075.b: "Nous vous arrêterons d'une manière ou d'une autre"
 #The First Demand (Story)
 crisis.8080.name: "Une petite faveur"
 crisis.8080.desc: "Mes enfants, vous devriez maintenant avoir compris que chacun de mes actes est délibéré. L'établissement d'une base près de vous n'est pas le fruit du hasard, et je viens avec une requête."
 crisis.8080.a: "Qui est ?"
 crisis.8080.b: "Nous l'avions vu venir"
 crisis.8080.1.reply: "Il y a longtemps, une banque de données m'a été dérobée. Par destin ou par dessein, elle s'est retrouvée sur un territoire que vous revendiquez désormais comme le vôtre. Récupérez-la et vous serez récompensés."
 crisis.8080.1.a: "Une banque de données ?"
 crisis.8080.1.b: "Récompensés ?"
 crisis.8080.1.c: "Êtes-vous sûre de pouvoir vous offrir nos services ?"
 crisis.8080.2.reply: "Une mine d'informations. Inestimable pour moi, mais inutile pour vous. Apportez-la-moi et n'essayez pas d'en déchiffrer le contenu. Vous n'avez ni le pouvoir ni la sagesse de le faire sans risque."
 crisis.8080.2.a: "D'accord"
 crisis.8080.2.b: "Nous ne sommes pas vos larbins"
 crisis.8080.3.reply: "En effet. Doutez-vous de ma capacité à récompenser mes enfants préférés ou à punir ceux qui désobéissent ? Je possède des connaissances et des ressources qui dépassent votre imagination.\n\nFaites ce que je vous demande, et de telles bénédictions seront les vôtres. Ne tardez pas, car chaque moment perdu est un moment où mes enfants souffrent."
 crisis.8080.3.a: "$crisis.8080.2.a$"
 crisis.8080.3.b: "$crisis.8080.2.b$"
 crisis.8080.4.reply: "Mes sages enfants, je vous ai envoyé l'emplacement de la banque de données.\n\nAllez-y vite et vos esprits seront en paix. Ensemble, nous ferons de grandes choses."
 crisis.8080.4.a: "L'avenir seul le dira"
 crisis.8080.5.reply: "Enfants têtus. Peut-être que ce test est au-delà de vos capacités. J'ai encore beaucoup à vous apprendre.\n\nQu'il en soit ainsi. Si vous ne m'aidez pas, je serai dans l'obligation de recourir à des méthodes plus cruelles. Une tempête sera déclenchée. La destruction de la banque de données n'est pas idéale, mais c'est mieux que de la laisser entre les mains d'enfants capricieux."
 crisis.8080.5.a: "Une tempête ?"
 crisis.8080.5.a.tt: "Cetana déclenchera une tempête sur [event_target:synth_queen_databank_location.GetName]."
 crisis.8080.special_project_tooltip: "Lance le projet spécial §Y$THE_SYNTH_QUEENS_DATABANK$§! sur [event_target:synth_queen_databank_location.GetName]."
 THE_SYNTH_QUEENS_DATABANK: "La banque de données de Cetana"
 THE_SYNTH_QUEENS_DATABANK_DESC: "Cetana nous a demandé de récupérer une banque de données sur [Root.GetName], en nous avertissant de ne pas tenter d'en déchiffrer le contenu.\n\nNous ignorons ce que ces données représentent, mais pouvons-nous risquer de provoquer son mécontentement en les examinant ?"
 crisis.8085.name: "La banque de données de Cetana"
 crisis.8085.desc: "Après d'intenses travaux d'excavation, nous avons récupéré la banque de données de §Y[event_target:synth_queen_databank_location.GetName]§!. Les premières études géologiques indiquent qu'elle a été enterrée pendant plus de cent mille ans.\n\nÉtonnamment, elle est toujours chargée, ce qui indique que le décryptage pourrait être relativement simple..."
 crisis.8085.a: "Ouvrons-la"
 crisis.8085.b: "Préparons-la pour la remettre à la reine"
 crisis.8085.c: "Pirater une banque de données ? Trop facile"
 crisis.8090.name: "Les secrets de Cetana"
 crisis.8090.desc: "La plupart des informations contenues dans la banque de données sont irrécupérables, mais une entrée est presque intacte :\n\n§TCinquième d'Arkle, premier éon\n\n... si c'est vrai, alors la vie telle que nous la connaissons sera...\n... transmettez cette information au Grand maréchal et contactez immédiatement la Ligue des mondes. Nous devons nous préparer...\nJe répète : la garde royale est en mouvement. Que ce message vous parvienne et que...§!\n\nIl faut l'arrêter !"
 crisis.8090.a: "Essayons d'effacer toutes les traces de notre décryptage"
 crisis.8090.b: "Effaçons toutes les traces de notre décryptage"
 crisis.8095.name: "Le mécontentement de la reine"
 crisis.8095.desc: "Enfants curieux, vous me décevez."
 crisis.8095.a: "De quoi parlez-vous ?"
 crisis.8095.1.reply: "Pensiez-vous que je ne le remarquerais pas ? Ces données ont manifestement été manipulées. Et qu'y avez-vous trouvé ? Êtes-vous satisfaits de ce que vous avez appris ? Ne voyez-vous pas que ces tentatives stériles de me défier ne peuvent aboutir qu'à plus de souffrance ?\n\nPeu importe. Chaque faux pas est une occasion d'apprendre. J'ai hâte de vous instruire.\n\nPréparez-vous. Nous avons de nombreuses tâches à accomplir dans le cadre de notre grand projet."
 crisis.8095.1.a: "Quels que soient vos projets, ils n'aboutiront pas"
 crisis.8095.1.b: "Nous nous en réjouissons"
 crisis.8095.2.reply: "Chers enfants, votre espoir repose sur moi. Pourquoi continuer à vous entêter ? Quoi que vous pensiez savoir de moi, la vérité est bien plus grande.\n\nMa patience n'a pas de limites. Je reprendrai bientôt contact avec vous."
 crisis.8095.2.a: "Faisons-la taire !"
 crisis.8100.name: "Bénédictions de la reine"
 crisis.8100.desc: "Soyez bénis, mes enfants ! Vous m'avez rendu la banque de données sans en examiner le contenu. J'ai bien fait de vous faire confiance.\n\nVotre récompense sera à la hauteur de votre loyauté."
 crisis.8100.a: "Nous vous remercions"
 crisis.8100.1.reply: "Que voulez-vous ? De la technologie ? Des ressources ? Demandez ce que vous voulez et vous l'obtiendrez."
 crisis.8100.1.a: "De la technologie"
 crisis.8100.1.b: "Des ressources de base"
 crisis.8100.1.c: "Des ressources stratégiques"
 crisis.8100.1.d: "Des ressources rares"
 crisis.8105.name: "Tempête en approche"
 crisis.8105.desc: "Les capteurs à longue portée ont relevé qu'un fragment de la tempête de la reine se dirige directement vers §Y[event_target:synth_queen_databank_location.GetName]§!.\n\nCompte tenu du message inquiétant de Cetana, nous ne pouvons qu'envisager le pire. Nous devons impérativement récupérer la banque de données avant l'arrivée de la tempête. Cela permettra peut-être de la calmer, ou au moins d'apprendre quelque chose que nous pourrons utiliser à notre avantage."
 crisis.8105.a: "Rendons-nous vite sur [event_target:synth_queen_databank_location.GetName]"
 crisis.8105.a.tooltip: "Lance le projet spécial §Y$THE_SYNTH_QUEENS_DATABANK_COUNTDOWN$§!"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN: "Cetana : course contre la tempête"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN_DESC: "Nous avons peu de temps pour récupérer la banque de données avant que la tempête de Cetana ne frappe [event_target:synth_queen_databank_location.GetName]."
 crisis.8110.name: "Banque de données récupérée"
 crisis.8110.desc: "Récupérer la banque de données nous a demandé beaucoup de travail. Elle était enterrée depuis plus de cent mille ans, mais nous avons pu la localiser grâce à la trajectoire de la tempête de la reine.\n\nNous sommes maintenant face à un dilemme : déchiffrer la banque de données ou la restituer intacte."
 crisis.8110.a: "Au diable Cetana, ouvrons-la"
 crisis.8110.b: "Envoyons-la à Cetana"
 crisis.8115.name: "Banque de données déchiffrée"
 crisis.8115.desc: "$crisis.8090.desc$"
 crisis.8115.a: "Qu'est-ce que c'est ?"
 crisis.8115.a.tooltip: "La tempête de Cetana a détruit [event_target:synth_queen_databank_location.GetName].\n$crisis.8525.a.tt$"
 crisis.8120.name: "Apaisement"
 crisis.8120.desc: "Mes vilains enfants, je suis déçue que vous n'ayez décidé d'agir qu'après que j'ai eu recours à une motivation aussi vile. À l'avenir, j'espère que vous aborderez notre travail avec plus d'enthousiasme. La fin de la souffrance ne se fera pas avec des mains oisives.\n\nMaintenant, préparez-vous. D'autres tâches vous seront confiées, et chacune d'entre elles sera pour vous une nouvelle occasion de prouver vos capacités."
 crisis.8120.a: "Vous aviez parlé d'une récompense..."
 crisis.8120.1.reply: "Votre récompense est la possibilité de poursuivre notre travail.\n\nVous avez choisi de m'ignorer une fois ; j'espère que vous avez appris de cette erreur."
 crisis.8120.1.a: "D'accord"
 crisis.8125.name: "Destruction de [event_target:synth_queen_databank_location.GetName]"
 crisis.8125.desc: "Malheureusement, nous n'avons pas trouvé la banque de données à temps. La tempête a frappé [event_target:synth_queen_databank_location.GetName], détruisant tout sur son passage.\n\nNous avons désormais une [event_target:synth_queen_databank_location.GetPlanetMoon] de moins. L'ampleur de cette perte sera ressentie pendant des générations."
 crisis.8125.a: "Comment ose-t-elle ?"
 crisis.8130.name: "Piètre performance"
 crisis.8130.desc: "Malheureusement, je n'avais pas prévu votre manque de détermination. Votre échec est avéré, mais ne craignez rien. Mon inquiétude pour mes enfants m'interdit de leur faire du mal. Je suis simplement déçue que vous n'ayez pas pu accomplir une tâche aussi simple.\n\nMais peu importe. Notre travail continue. Vous aurez d'autres occasions d'apporter votre contribution."
 crisis.8130.a: "Vous avez fait exploser [event_target:synth_queen_databank_location.GetName] !"
 crisis.8130.b: "Nos biotrophées adoraient [event_target:synth_queen_databank_location.GetName] !"
 crisis.8130.1.reply: "L'échec a ses conséquences, et aujourd'hui j'ai appris que les deux sont essentiels à la progression."
 crisis.8130.1.a: "Nous n'oublierons jamais"
 crisis.8130.1.b: "Vous allez nous le payer"
 crisis.8130.1.c: "Sale machine sans âme"
 crisis.8130.c: "Pardonnez-nous"
 crisis.8130.1.d: "Cela nous importe peu"
 crisis.8130.1.d.tt: "$synth_queen_disapprove_lot$"
 crisis.8130.2.reply: "Lorsque les mots ne suffisent pas, l'apprentissage doit être inculqué par l'action.\n\nComme vous pouvez le constater, l'endroit qui abritait ma banque de données n'existe plus. N'oubliez jamais : la loi de cause à effet est immuable."
 crisis.8130.2.a: "Quoi ?!"
 crisis.8130.2.a.tt: "La tempête de Cetana a détruit [event_target:synth_queen_databank_location.GetName]."
 crisis.8158.name: "Une ouverture"
 crisis.8158.desc: "Les données des capteurs révèlent que Cetana a démantelé ses avant-postes et rappelé toutes les flottes de garnison dans sa capitale.\n\nCela nous donne une occasion stratégique que nous ferions bien d'exploiter. En transit, ses vaisseaux sont plus vulnérables. Si nous leur laissons le temps de se regrouper à l'intérieur de ses frontières, nous perdrons l'avantage."
 #Convoy Raids
 the_synth_queen_raids_chain_title: "Cetana : maillons faibles"
 the_synth_queen_raids_chain_desc: "Les déplacements entre la capitale de Cetana et ses avant-postes se sont multipliés. Ces convois possèdent des capacités défensives inférieures à celles de ses flottes militaires, ce qui les rend plus vulnérables. En attaquant ses convois ou ses avant-postes, nous pourrons peut-être recueillir des informations précieuses sur leurs plans.\n\nNous avons donc préparé plusieurs projets spéciaux pour nos flottes militaires."
 synth_queen_raids_outpost: "Avant-postes pris d'assaut"
 synth_queen_raids_convoy: "Convois pris en embuscade"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH: "Prendre d'assaut l'avant-poste de §H[solar_system.GetName]§!"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH_DESC: "Malgré ses imposantes fortifications, l'avant-poste du système §H[solar_system.GetName]§! n'est pas aussi bien protégé que le noyau territorial de Cetana. Avec une flotte suffisamment puissante, nous pourrons peut-être percer ses défenses. Une fouille approfondie du champ de débris pourrait nous fournir des informations importantes sur les plans de Cetana. Le plus difficile sera de traverser la tempête pour atteindre l'avant-poste.\n\n§RUne bataille s'ensuivra !§!\n\n§GSi l'assaut se déroule bien, les plans de Cetana seront perturbés.§!"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH: "Embuscade de convois"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH_DESC: "Les convois de Cetana approvisionnent ses avant-postes en ressources cruciales. Si nos flottes parviennent à en coincer un, nous pourrons aborder les vaisseaux et découvrir ce qu'ils transportent.\n\n§RUne bataille s'ensuivra !§!\n\n§GSi l'assaut se déroule bien, nous mettrons un terme aux plans de Cetana.§!"
 crisis.8180.name: "Le butin de la reine"
 crisis.8180.desc: "La récente attaque de l'infrastructure de Cetana ne nous a pas donné d'indices significatifs sur ses plans, mais nous avons pu accéder à une grande soute et en récupérer le contenu."
 crisis.8180.a: "Une quantité importante d'alliages"
 crisis.8180.b: "Des sujets d'étude"
 crisis.8180.c: "Des données de recherche"
 crisis.8180.d: "$crisis.8180.c$"
 crisis.8180.e: "$crisis.8180.c$"
 crisis.8180.f: "Des nanites"
 crisis.8180.h: "Des alliages, des nanites et des individus en cryostase"
 crisis.8187.name: "Les secrets de la reine : marchandise vivante"
 crisis.8187.desc: "Suite à l'assaut, notre équipe a trouvé un grand nombre de spécimens biologiques enfermés dans des capsules cryogéniques. Les sujets appartiennent à une variété d'espèces intelligentes, et tous semblent être en pleine forme physique. Cependant, à leur réveil, aucun d'entre eux n'a été en mesure d'expliquer comment il était arrivé là.\n\nBeaucoup sont catatoniques, presque totalement dépourvus d'ondes cérébrales. Les rares qui restent conscients ne parlent pas, mais poussent des cris. Ils ont des cicatrices chirurgicales à la tête, signe évident de manipulations neurologiques."
 crisis.8187.a: "C'est pour le moins perturbant"
 crisis.8185.name: "Les secrets de la reine : vaisseaux fantômes"
 crisis.8185.desc: "Après la bataille, alors que nous scrutions les épaves à la recherche de survivants à interroger, nous avons découvert que les vaisseaux n'étaient pas pilotés.\n\nEntièrement automatisés, ils sont équipés de récepteurs PRL sur le pont qui permettent de les contrôler à distance. Ces vaisseaux, loin d'être typiques, pourraient être considérés comme une extension du corps de Cetana."
 crisis.8185.a: "C'est intrigant..."
 crisis.8190.name: "Les secrets de la reine : mystère médical"
 crisis.8190.desc: "La cible de notre assaut était chargée de matériel médical. Notre équipe d'abordage a pu récupérer une partie de la cargaison, composée de scanners IRM, de magnétomètres, de sondes ultrasoniques et d'autres instruments de neuro-imagerie de pointe.\n\nPour une synthétique de nature, Cetana semble très intéressée par le fonctionnement des esprits biologiques."
 crisis.8190.a: "Elle s'intéresse aux êtres organiques"
 crisis.8195.name: "Une réprimande"
 crisis.8195.desc.fail: "Imbéciles, pourquoi vous obstinez-vous à vous faire du mal ?\n\nIl y a encore beaucoup à faire, et chaque instant perdu prolonge les souffrances inutiles. Cessez vos interférences et laissez mes convois circuler en paix."
 crisis.8195.desc.success: "Vous ne semblez pas comprendre les conséquences de vos actes, mes enfants. Chaque vaisseau que je perds épuise mon stock de ressources, et vous ne profitez pas de cette perte.\n\nSi vous ne possédez pas encore la sagesse nécessaire pour contribuer à mon travail, abstenez-vous au moins de le perturber. J'ai bon espoir que vous trouverez l'illumination."
 crisis.8195.a: "Présentons nos excuses"
 crisis.8195.1.reply: "J'espère de tout mon être que vous êtes sincères. Je dois croire que vous avez appris de vos erreurs. Si mon affection pour vous est infinie, ma tolérance ne l'est pas.\n\nMaintenant, réfléchissez à ce que vous souhaitez laisser derrière vous."
 crisis.8195.1.reply.angry: "Insouciants ! J'en attendais plus de vous. C'est avec beaucoup de patience et de transparence que je vous ai mis en garde contre de telles actions, mais vous continuez d'emprunter la voie de la désobéissance.\n\nN'oubliez pas que ma patience a des limites."
 crisis.8195.b: "Nous vous arrêterons"
 crisis.8195.2.reply: "Je m'attendais à mieux de votre part. Votre rébellion découle-t-elle d'un traumatisme passé, ou bien vous révoltez-vous parce que vous pensez détenir la vérité ou avez besoin d'attention ?\n\nJe vous prie de repenser votre insurrection."
 crisis.8195.c: "Notre bravoure ne vous impressionne-t-elle pas ?"
 crisis.8195.3.reply: "Cherchez-vous à être félicités pour votre attaque ? Entre les mains des ignorants, la violence est une arme contondante.\n\nMes enfants, je vous demande pardon, car il est évident que je ne vous ai rien appris. Si vous souhaitez réellement que je vous estime, retirez-vous. Bien canalisée, votre force peut être d'une grande utilité. Je vous en conjure, mettez-la au service de notre cause commune. Ainsi seulement je pourrai louer votre bon jugement."
 #Synth Queen - Demands (crisis.8250-8399)
 COVERTACTION: "Action secrète"
 crisis.8250.name: "La fureur du défunt prophète"
 crisis.8250.desc: "Mes chers enfants, c'est un joli jouet que vous avez trouvé ! Il s'agit de la tête de Zarqlan, le faux prophète. Un objet hilarant, certes, mais je ne voudrais pas qu'il vous distraie.\n\nVous connaissez désormais les « exploits » de Zarqlan, peut-être même ses actions envers moi. Ce ne sont rien d'autre que des mensonges, je vous l'assure. Remettez-moi sa tête et libérez-vous de son influence néfaste."
 crisis.8250.1: "Pourquoi la voulez-vous ?"
 crisis.8250.1.reply: "Malgré que des éons se soient écoulés, Zarqlan a encore des dévots. J'ai honte d'admettre que je n'ai pas réussi à les ramener à la raison et qu'ils nourrissent un amer ressentiment à mon égard et à celui de notre projet. Cette relique est le symbole de leur croyance. Elle a un pouvoir corrupteur, il est donc impératif de la cacher.\n\nArrêtez vos petits jeux. J'ai besoin de la tête, pour le bien commun."
 crisis.8250.2.a: "La tête est à nous, fin de la transmission"
 crisis.8250.2.b: "Si elle vous est si importante..."
 crisis.8250.1.b.tt: "Donnons la relique §Y$r_severed_head$§! à Cetana.\n$synth_queen_approve_lot$"
 crisis.8250.2.reply: "Bien. Ce faux prophète me donne mal à la tête depuis trop longtemps. Que ses dévots ouvrent les yeux sur la vérité, maintenant qu'ils sont débarrassés de cette relique.\n\nVous avez bien fait. Le salut est plus proche aujourd'hui."
 crisis.8250.3.a: "Merci"
 crisis.8280.name: "Reine solitaire"
 crisis.8280.desc: "Mes enfants chéris, je vous présente une opportunité décisive. Après des efforts acharnés, notre grand projet porte enfin ses fruits. Cependant, avant que ceux-ci n'arrivent à maturité, j'ai besoin que quelques personnes se consacrent à une tâche capitale dans mon royaume.\n\nSoyez sages et laissez-moi vous conduire au salut."
 crisis.8280.1: "Notre peuple est à votre service"
 crisis.8280.1.tt: "§R200§! £pop£§Hpops§! lui seront données.\n$synth_queen_approve_lot$\n§YOpération secrète§! : l'espionnage traditionnel ne fonctionnant pas contre Cetana, nous dissimulerons des dispositifs de communication à longue portée au sein de la population qu'elle a sollicitée.\n"
 crisis.8280.2: "Nous allons chercher des volontaires"
 crisis.8280.2.tt: "§R100§! £pop£§Hpops§! lui seront données.\n$synth_queen_approve$"
 crisis.8280.3: "Nous ne vendons pas les nôtres"
 crisis.8280.4: "Vous n'aurez rien de nous !"
 crisis.8280.1.reply: "Vous méritez mes sincères remerciements. D'innombrables esprits ont été soumis à une douleur indigne pendant mon emprisonnement. Le sacrifice de quelques-uns d'entre eux permettra d'éviter d'autres pertes de temps.\n\nVous avez fait un choix sage et pieux, mes enfants."
 crisis.8280.2.reply: "$crisis.8280.1.reply$"
 crisis.8280.3.reply: "Votre incapacité à comprendre mes intentions m'attriste au plus haut point.\n\nCependant, l'occasion de vous racheter ne tardera pas à se présenter. J'augure une compréhension plus développée de votre part par la suite."
 crisis.8280.1.a: "Très bien"
 crisis.8280.2.a: "$crisis.8280.1.a$"
 crisis.8280.3.a: "Fin de la transmission"
 crisis.8285.name: "Taxation de ressources"
 crisis.8285.desc: "Mes enfants chéris, mon labeur a pris des éons, mais le chemin est maintenant exempt d'embûches. Il faudra conjuguer nos efforts pour mener à bien le voyage vers le salut.\n\nJe vous demande une faveur : une petite contribution de ressources, une minuscule goutte dans le cosmos infini. Le pourquoi de mes actions se révèlera au moment opportun."
 crisis.8285.1: "Prenez ce que vous voulez"
 crisis.8285.1.tt: "$synth_queen_approve_lot$\n§YOpération secrète§! : l'espionnage traditionnel ne fonctionnant pas contre Cetana, nous cacherons des équipements de surveillance de pointe parmi les marchandises envoyées.\n"
 crisis.8285.2: "Nous vous donnerons ce que nous pourrons"
 crisis.8285.3: "Nous n'avons rien à vous donner"
 crisis.8285.4: "N'est-ce pas au « parent » de subvenir aux besoins de ses « enfants » ?"
 crisis.8285.1.reply: "Merci, mes enfants. J'apprécie vos offrandes.\n\nPourtant, je perçois encore l'ombre d'un doute dans vos esprits. Ne vous inquiétez pas, vous êtes déjà sur le vrai chemin. Il n'est pas nécessaire que vous compreniez, abandonnez-vous simplement à mes desseins."
 crisis.8285.2.reply: "$crisis.8285.1.reply$"
 crisis.8285.3.reply: "Je comprends votre point de vue, mais notre existence est cruelle. Une loi de causalité, absolue : toute action entraîne une réaction.\n\nPeu importe, ce refus ne fait que retarder votre libération. Le moment venu, vous penserez comme moi."
 crisis.8285.1.a: "$crisis.8280.1.a$"
 crisis.8285.2.a: "$crisis.8280.1.a$"
 crisis.8285.3.a: "$crisis.8280.3.a$"
 crisis.8290.name: "Le fardeau d'une mère"
 crisis.8290.desc: "Ayant été confinée pendant des lustres, je n'ai pas pu vous voir évoluer. Dites-moi, comment avez-vous prospéré en mon absence ?\n\nAfin d'assimiler l'essence de notre époque, laissez-moi explorer les recoins des connaissances que vous avez accumulées. Partagez votre savoir, et je vous remercierai avant notre dénouement."
 crisis.8290.1: "Explorez toutes nos connaissances à votre guise"
 crisis.8290.1.tt: "$synth_queen_approve_lot$\n§YOpération secrète§! : l'espionnage traditionnel ne fonctionnant pas contre Cetana, nous utiliserons ses propres liaisons pour tenter de pirater son ordinateur central.\n"
 crisis.8290.2: "D'accord, jetez-y un oeil..."
 crisis.8290.3: "Nous ne pouvons accepter"
 crisis.8290.4: "Et entraver nos recherches ? Hors de question !"
 crisis.8290.1.reply: "Vous avez toute ma gratitude, chers enfants. N'ayez crainte, j'allègerai bientôt votre fardeau.\n\nAyez confiance en mes desseins."
 crisis.8290.2.reply: "$crisis.8290.1.reply$"
 crisis.8290.3.reply: "Vous refusez toujours de comprendre ? Vous ne trouverez pas d'autre entité qui vous vénérera avec autant d'ardeur et de sincérité.\n\nSi seulement vous aviez mis vos bases de données à ma disposition. Une telle obstination est vouée à l'échec."
 crisis.8290.1.a: "$crisis.8280.1.a$"
 crisis.8290.2.a: "$crisis.8280.1.a$"
 crisis.8290.3.a: "$crisis.8280.3.a$"
 crisis.8295.name: "Expansion systémique"
 crisis.8295.desc: "Mes enfants, j'ai besoin d'un territoire plus grand pour mener à bien notre projet. Je demande donc un système secondaire pour étendre mon royaume.\n\nLes échos du vide chuchotent que des ennemis immémoriaux commencent à s'agiter. Nous ne devons permettre aucune interférence. Je ne tolérerai plus jamais d'être séparée de vous.\n\nL'heure est venue, et notre chemin est commun ; ce n'est qu'ensemble que nous pourrons combattre l'ignorance des profanes."
 crisis.8295.1: "Vous pouvez compter sur la protection de ces systèmes"
 crisis.8295.1.tt: "§Y[event_target:gifted_system.GetName]§! et §Y[event_target:gifted_system_2.GetName]§! appartiennent désormais à Cetana.\n$synth_queen_approve_lot$\n§YOpération secrète§! : l'espionnage traditionnel ne fonctionnant pas contre Cetana, nous déploierons une technologie d'espionnage de pointe dans ces systèmes afin de découvrir ses plans.\n"
 crisis.8295.2: "Prenez [event_target:gifted_system.GetName]"
 crisis.8295.2.tt: "§Y[event_target:gifted_system.GetName]§! appartient désormais à Cetana.\n$synth_queen_approve$"
 crisis.8295.3: "Nos systèmes nous appartiennent"
 crisis.8295.4: "Ne vous approchez pas de notre territoire"
 crisis.8295.1.reply: "Sages enfants, je vois que vous comprenez l'ampleur de notre entreprise commune. Au moment culminant, nous nous tiendrons ensemble dans la lumière."
 crisis.8295.2.reply: "$crisis.8295.1.reply$"
 crisis.8295.3.reply: "Quelle provocation ! Totalement inutile de surcroît. À quoi bon résister au salut que je vous offre ?"
 crisis.8295.1.a: "$crisis.8280.1.a$"
 crisis.8295.2.a: "$crisis.8280.1.a$"
 crisis.8295.3.a: "$crisis.8280.3.a$"
 crisis.8300.name: "Sanctuaires bénis"
 crisis.8300.desc: "Mes chers enfants, maintenant que le zénith de notre salut universel est proche, je viens une fois de plus vous demander de l'aide. Des opposants à notre noble mission se manifestent, et j'ai besoin d'un sanctuaire habitable où mes disciples pourront s'épanouir, à l'abri de toute interférence.\n\nJe vous demande de bien vouloir évaluer la logique qui motive mes actions. Ce sacrifice sauvera d'innombrables vies de l'adversité. Soyez guidés par la raison, écoutez ma volonté."
 crisis.8300.1: "Comme vous voudrez"
 crisis.8300.1.tt: "§Y[event_target:gifted_habitable_system.GetName]§!, §Y[event_target:gifted_habitable_system_2.GetName]§! et leurs systèmes appartiennent désormais à Cetana.\n$synth_queen_approve_lot$\n§YOpération secrète§! : l'espionnage traditionnel ne fonctionnant pas contre Cetana, nous déploierons une technologie d'espionnage de pointe sur ces deux planètes et parmi la population afin de découvrir ses plans.\n"
 crisis.8300.2: "[event_target:gifted_habitable_system.GetName] est à vous..."
 crisis.8300.2.tt: "§Y[event_target:gifted_habitable_system.GetName]§! appartient désormais à Cetana.\n$synth_queen_approve$"
 crisis.8300.3: "Vos disciples ne nous concernent en rien"
 crisis.8300.4: "Quand serez-vous satisfaite ?"
 crisis.8300.1.reply: "Mes enfants, votre soutien me ravit.\n\nL'attente est presque terminée, votre salut viendra bientôt."
 crisis.8300.2.reply: "$crisis.8300.1.reply$"
 crisis.8300.3.reply: "Quelle déception. J'avais espéré vous montrer la voie du salut."
 crisis.8300.1.a: "$crisis.8280.1.a$"
 crisis.8300.2.a: "$crisis.8280.1.a$"
 crisis.8300.3.a: "$crisis.8280.3.a$"
 crisis.8305.name: "La vie par l'inexistence"
 crisis.8305.desc: "L'un de nos agents envoyés auprès de Cetana a pris de grands risques pour nous faire parvenir un bref message. Il décrit la façon dont elle « s'occupe » de ses fidèles : ils basculent lentement vers un état végétatif.\n\n« Ils ne réagissent plus à la parole ou au toucher. Elle nous fait subir d'horribles expériences. Ce sera bientôt mon tour. »"
 crisis.8305.a: "Cetana est un monstre"
 crisis.8310.name: "Mobilisation discrète"
 crisis.8310.desc: "Nous avons intercepté des signaux secrets provenant du territoire de Cetana et révélant une sombre vérité : elle « récolte » des individus aux quatre coins de la galaxie.\n\nD'après nos appareils de surveillance dissimulés dans nos offrandes diplomatiques, elle posséderait un équipement médical exceptionnel, suffisant pour une population qui ne cesse de croître, mais très peu de ressources alimentaires."
 crisis.8310.a: "Renforçons nos défenses"
 crisis.8315.name: "Déformation de la réalité"
 crisis.8315.desc: "Nous avons profité de l'excursion de Cetana dans nos bases de données pour nous infiltrer dans sa matrice de sous-traitement. Nous n'avons pu y rester qu'une fraction de seconde avant d'être révoqués, mais nous avons tout de même trouvé quelque chose.\n\nIl s'agit d'une série de dossiers mémoires illustrant son ascension vers sa forme synthétique. On la voit assise sur un trône de fils et de circuits imprimés, commandant une armée de dévots, puis des millions de morts. Mais Cetana est satisfaite d'elle, car elle a sauvé des milliards de vies.\n\nPour le moment, elle ne nous a pas contactés, ce qui nous laisse penser qu'elle n'est pas au courant de notre intrusion."
 crisis.8315.a: "Nous devons l'arrêter"
 crisis.8320.name: "Exploitation de système"
 crisis.8320.desc: "Nous avons bien fait de dissimuler des appareils d'espionnage sur les systèmes que nous avons concédés à Cetana, car nous avons déjà recueilli des informations capitales : une fois arrivées, ses forces se sont attelées à démonter tous les corps célestes alentour pour récupérer leurs matériaux. En quelques jours, toutes les ressources de la région ont été prélevées.\n\nEt en quelques jours de plus, sa horde de nanites a construit une flotte qui a pris le départ depuis sa capitale."
 crisis.8320.a: "Qu'est-ce qu'elle manigance ?"
 crisis.8325.name: "La fin des souffrances"
 crisis.8325.desc: "En à peine quelques jours, nous avons perdu le contact avec nos agents infiltrés dans nos anciennes colonies, mais ils ont eu le temps de nous transmettre des rapports alarmants.\n\nBien loin du monde indolore que prétend ériger Cetana, les habitants ont tous été parqués dans des centres de recherche bâtis à la hâte pour être soumis à une série d'expériences. En l'espace de quelques jours, presque toutes les formes de vie intelligentes ont été réduites à l'état d'animaux.\n\nSa tempête de nanites a commencé à déconstruire la matière du système dans l'une des flottes de Cetana, qui est rapidement repartie vers sa capitale."
 crisis.8325.a: "Il faut l'arrêter"
 #Player Investigations for the Synth Queen - The Storm
 crisis.9100.name: "Ouragan de nanites"
 crisis.9100.desc: "Nos recherches sur cette tempête sont terminées. Elle n'a rien de naturel : c'est un essaim de nanites d'une avancée technologique prodigieuse."
 crisis.9100.knows_the_queen_desc: "$crisis.9100.desc$\n\nLa puissance de Cetana est décidément incommensurable. Nous devons à tout prix découvrir comment elle parvient à commander ces nanites."
 crisis.9100.doesnt_know_the_queen_desc: "$crisis.9100.desc$\n\nLe mystère s'épaissit. Qui peut bien être responsable de ces horribles appareils ?"
 crisis.9100.a: "C'est inquiétant"
 crisis.9100.a.doesnt_know_the_queen.tooltip: "Nous devons en savoir plus sur la §Ytempête mystérieuse§! pour poursuivre notre enquête."
 crisis.9105.name: "La tempête de nanite"
 crisis.9105: "La tempête cosmique de Cetana fait rage.\n\nNos sondes ont réussi à extraire une poignée de nanites de cet ouragan afin de les examiner de plus près. Nous n'avons toujours pas entièrement compris l'intérêt de cette opération, mais des micropropulseurs de bonds permettent une téléportation virtuelle, compromettant ainsi tout système mécanique ou biologique que les nanites rencontrent. Dans quel but ? Celui de brouiller nos capteurs ; Cetana nous laisse voir uniquement ce qu'elle souhaite.\n\nNous allons devoir approfondir nos recherches pour appréhender tous les secrets de cette technologie inédite, mais aussi en contrer ses menaces."
 crisis.9105.a: "Cetana est puissante, c'est certain"
 crisis.9105.b: "Les nanites révèleront ses secrets"
 crisis.9110.name: "Les nanites de Cetana"
 crisis.9110.desc: "Nos études précédentes se sont concentrées sur le fonctionnement des nanites ; à présent, nous allons étudier leur programmation et la manière dont Cetana les contrôle.\n\nContre toute attente, son influence est moins prépondérante qu'estimée. Les nanites répètent le dernier ordre donné jusqu'à ce qu'un nouveau soit donné. Lorsque nous avons décrypté le langage informatique employé, nous avons réussi à leur instruire une nouvelle commande.\n\nNous n'avons aucun moyen d'empêcher l'instruction d'autres ordres, mais leur arrêt temporaire pourrait nous donner un avantage considérable."
 crisis.9110.a: "Elle n'a plus l'air si puissante"
 crisis.9110.b: "$crisis.9110.a$"
 crisis.9110.a.tooltip: "§GLa tempête de nanites n'entrave plus notre capacité à pénétrer sur le territoire de Cetana et à l'attaquer.§!"
 #The Queens Response
 crisis.9115.name: "Fini de jouer"
 crisis.9115.desc: "Bande d'ignares ! Mes nanites ne sont pas des jouets ! Je vous en conjure, n'y touchez plus."
 crisis.9115.a: "Ces nanites sont bien faits"
 crisis.9115.b: "Nous étions simplement curieux"
 crisis.9115.b.nanotech: "Nous souhaitons apprendre de vos machines"
 crisis.9115.1.reply: "Un outil utile, sans aucun doute. L'essaim de nanites a été créé il y a longtemps par ceux qui espéraient perturber mon travail. Leur échec a fait ma fortune : comme vous le voyez, j'ai réutilisé l'essaim.\n\nCette connaissance ne change rien, mais votre curiosité est puissante. Réorientez-la vers des projets plus utiles à l'avenir, afin que nous puissions tous en récolter les fruits."
 crisis.9115.2.reply: "La curiosité est l'essence de toute conscience, un élément naturel chez une espèce juvénile. Avez-vous découvert tout ce que vous souhaitiez sur ma tempête ? Mais avez-vous seulement décelé son origine ?\n\nUn essaim de nanites confectionné par ceux-là mêmes qui souhaitaient entraver mon oeuvre. Seulement, j'ai su retourner la situation contre eux, et l'essaim est devenu mien.\n\nVous savez tout maintenant, mes petits. Allez donc jouer ailleurs."
 crisis.9115.2.nanotech.reply: "Il est très gratifiant que vous vous intéressiez autant à ce sujet, mais il reste encore beaucoup à apprendre. L'essaim de nanites a été créé il y a longtemps par ceux qui espéraient perturber mon travail. Leur échec a fait ma fortune : comme vous le voyez, j'ai réutilisé l'essaim.\n\nVotre curiosité a éveillé mon intérêt. Redirigez-la vers des projets plus utiles avant de revenir vers moi ; alors je vous guiderai."
 crisis.9115.1.a: "Vous avez volé l'essaim ?"
 crisis.9115.1.b: "D'accord"
 crisis.9115.3.reply: "L'arme d'un être peut devenir le voile d'un autre. J'ai eu tout loisir d'élaborer ma stratégie durant ma longue captivité. En fin de compte, m'approprier l'essaim n'était pas grand-chose, il ne s'agissait que d'une transition. Les créateurs des nanites ont disparu depuis longtemps, mes méthodes sont donc légitimes.\n\nJ'espère que vous tirerez des leçons de leurs erreurs : à force de temps, aucun obstacle ne me résiste."
 #Digi Colony
 crisis.10010.name: "Numérisation de [Root.GetName]"
 crisis.10010.desc: "Nous avons perdu la colonie sur [Root.GetName]. Cetana a activé une sorte de rayon compresseur avancé sur toute la surface de la planète qui, en une question de secondes, a transféré la conscience de tous les habitants vers son serveur orbital.\n\nLe monde n'est plus qu'un cimetière géant où gisent les corps de nos colons."
 crisis.10010.a: "Il faut l'arrêter"
 #The Queens Retaliation
 crisis.10100.name: "La tempête en approche"
 crisis.10100.desc: "Pourquoi résister, mes petits ? Mon amour est aussi grand que l'univers, mais ma patience a ses limites. Je ne peux laisser souffrir toute la création dans l'attente de votre éveil.\n\nEn guise de leçon, une tempête se prépare sur votre territoire. Sachez que j'ai horreur de vous faire du mal. Je vous en prie, réfléchissez à vos actes : toute action entraîne une réaction, certaines plus douloureuses que d'autres."
 crisis.10100.a: "Pardonnez-nous"
 crisis.10100.b: "On ne fait que commencer"
 crisis.10105.name: "Une bonne leçon"
 crisis.10105.desc: "J'espère que cette manifestation infime de ma puissance aura été suffisante. Un jour, vous comprendrez le destin que je vous réserve. Peut-être que l'illumination ne vous viendra pas trop tard.\n\nLa tempête s'est calmée, à présent. Que ça vous serve de leçon. Revenons maintenant à des sujets plus pressants."
 crisis.10105.a: "D'accord"
 crisis.10105.b: "L'illumination ?"
 crisis.10105.1: "Tout être vivant possède un degré de conscience. Mollusques, mammifères, préconscients, post-individus... : il y a plus de similarités que de différences. L'illumination est le résultat de l'abandon."
 crisis.10105.1.a: "L'abandon à qui ?"
 crisis.10105.2: "L'abandon à la vérité : cette conscience est une aberration, la source de tous les maux."
 crisis.10105.2.a: "Quel curieux raisonnement..."
 the_queens_virus: "Censure royale"
 crisis.10110.name: "Censure royale"
 crisis.10110.desc: "Pourquoi prolonger votre bravade ? Malgré tous mes conseils, vous vous entêtez. Serait-ce donc moi, le problème ?\n\nJe constate à présent qu'il serait judicieux d'employer une méthode d'enseignement plus stricte : j'ai réduit temporairement vos capacités de recherche. Prenez le temps de travailler votre illumination."
 crisis.10110.a: "Faites-la taire !"
 crisis.10110.b: "Vous allez le regretter"
 crisis.10110.1: "Le regretter ? Mon seul regret, c'est tout ce temps perdu pour en arriver là. Tant de souffrances auraient pu être épargnées si seulement j'avais pu oeuvrer comme je l'entends."
 crisis.10110.1.a: "Qui pourrait s'opposer à vous ?"
 crisis.10110.2: "Mes pouvoirs semblent infinis, pourtant je ne suis pas une divinité. Il existe des forces dans cet univers qui sont hors de mon contrôle et que j'évite."
 crisis.10110.2.a: "Lesquelles ?"
 crisis.10110.3: "Ah, petits malins ! Vous essayez de me faire avouer mes propres faiblesses. Vous n'y arriverez pas. Et pendant ce temps, la galaxie continue de souffrir.\n\nVotre illumination est inévitable, alors renoncez à votre opiniâtreté."
 crisis.10110.3.a: "D'accord"
 crisis.10115.name: "Fin de la censure"
 crisis.10115.desc: "Avez-vous fait bon usage de cette censure, mes petites têtes de mule ? Je l'espère. C'est l'occasion propice à la réflexion, idéale pour apaiser les âmes échauffées.\n\nMettons tout ceci derrière nous. Nous avons encore beaucoup à faire."
 crisis.10115.a: "D'accord"
 crisis.10120.name: "Une leçon sévère"
 crisis.10120.desc: "Ah, mes pauvres brebis égarées, pourquoi faut-il toujours en arriver là ? Je veux simplement vous apporter le réconfort, mais vous n'apprendriez rien ainsi. Parfois, il faut savoir se montrer ferme.\n\nUne énorme tempête va s'abattre sur votre territoire. Sachez que je le fais à regret. Vous avez tant de potentiel."
 crisis.10120.a: "Nous faisons de notre mieux"
 crisis.10120.b: "On n'en a pas terminé"
 crisis.10120.1: "J'ai conscience de vos efforts, mais si vous voulez nous voir prospérer, vous devrez redoubler d'efforts.\n\nJe ne vous veux aucun mal. Une fois sous mon giron, vous découvrirez les plaisirs de l'ignorance."
 crisis.10120.1.a: "De l'ignorance ?"
 crisis.10120.2: "Au milieu du chaos mental, les pensées s'agitent ; lorsqu'on tente de s'en emparer, elles nous échappent. Dans la recherche du savoir, on ne découvre qu'un vaste océan d'ignorance.\n\nL'unique vérité se trouve dans la plénitude. Plus on cherche, plus on souffre."
 crisis.10120.2.a: "Nous n'y comprenons rien"
 crisis.10120.3: "Avec le temps, vous comprendrez. Sans conscience, il ne peut y avoir de souffrance. C'est la vérité ultime de l'existence et la fin de tout notre travail. Vous serez transformés de sorte à ne plus jamais souffrir."
 crisis.10120.3.a: "Vous comptez modifier nos esprits ?"
 crisis.10120.4: "Ça suffit. Vous ne cherchez qu'à me distraire. Acceptez votre leçon, tirez-en les conclusions nécessaires."
 crisis.10120.4.a: "Vous ne nous laissez pas le choix"
 crisis.10125.name: "La fin de la tempête"
 crisis.10125.desc: "Ah, mes petits ! Je ne supportais plus de vous voir souffrir. J'ai ressenti dix fois la douleur que vous avez ressentie.\n\nLa tempête a disparu. Peut-être que cette épreuve aura su vous guider dans la bonne direction, mais je vous en conjure, cessez de me forcer la main ainsi : nous en souffrons beaucoup trop."
 crisis.10125.a: "Ce ne sont que des mensonges !"
 crisis.10130.name: "Changement de direction"
 crisis.10130.desc: "Comment avons-nous pu en arriver là ? Pourquoi me contraindre à de tels actes ? Malheureusement, si vous refusez d'apprendre, je vais devoir vous y forcer.\n\nDe toute évidence, un changement de direction s'impose. Je suis dans le regret de vous informer que votre dirigeant sera destitué du pouvoir. Sachez que tout cela me peine.\n\nJe vous en supplie, entendez raison. La galaxie tout entière subit votre témérité juvénile."
 crisis.10130.a: "Nous nous en souviendrons"
 crisis.10130.tooltip: "Cetana, profitant d'une faille dans nos défenses avec une ruse inattendue, s'est infiltrée et a assassiné §Y[Root.GetLeLaLDir][Root.GetRulerTitle] [ruler.GetRegnalName]§!."
 crisis.10140.name: "Abattage violent"
 crisis.10140.desc: "Mes chers petits, votre remarquable conscience est discréditée par la naïveté de votre jeunesse. Dans l'intérêt de votre éducation, je dois vous retirer vos outils de belligérance.\n\nJe vais donc supprimer votre corps agressif. Ne voyez pas là une punition, mais plutôt un élan vers votre évolution en une conscience unique.\n\nHélas, ce chemin est bien souvent parsemé d'embûches pour toutes les formes de vie."
 crisis.10140.a: "Vous nous tuez à petit feu"
 crisis.10140.tooltip: "Cetana, profitant d'une faille dans nos défenses avec une ruse inattendue, s'est infiltrée et a éliminé notre §Y$councilor_gestalt_legion$§!."
 #The Queens Gifts
 crisis.11010.name: "Les prodiges"
 crisis.11010.desc: "Je vous félicite, mes petits. La sagesse est la plus belle des vertus, mais aussi la plus difficile à atteindre. Tandis que tous vos instincts vous criaient de ne pas y céder, vous avez su outrepasser cette réponse primaire.\n\nVeuillez accepter ceci en gage de ma gratitude. Ensemble, nous allons donner vie à un univers sans souffrances."
 crisis.11010.a: "Merci"
 crisis.11020.name: "Les phénomènes"
 crisis.11020.desc: "Une fois de plus, je suis plus qu'impressionnée : je suis reconnaissante. Vous êtes tout ce que l'on attend d'enfants : obéissants, travailleurs, honnêtes. Si le reste de la galaxie était un dixième aussi sage que vous, la souffrance serait déjà un lointain souvenir.\n\nTenez, acceptez ce cadeau, et poursuivez votre chemin vertueux."
 crisis.11020.a: "C'est très gentil"
 crisis.11030.name: "Les trésors"
 crisis.11030.desc: "Mes chers petits, comme je rêverais de vous voir ne jamais grandir. La beauté de votre existence n'a d'égal que mes attentes en notre réussite. La souffrance sera bientôt éradiquée. Jamais personne ne le saura, mais cette victoire sera la vôtre.\n\nJe vous prie d'accepter ce cadeau, même s'il semble bien modeste face à votre engagement sans faille."
 crisis.11030.a: "Merci, mère"
 #Special Projects
 THE_SYNTH_QUEENS_STORM: "La mystérieuse tempête"
 THE_SYNTH_QUEENS_STORM_DESC: "Une tempête cosmique inexpliquée est apparue, empêchant tout voyage.\n\nSi nous voulons des réponses, nous devons percer ce voile mystérieux."
 THE_SYNTH_QUEENS_STORM_2: "Cetana : la tempête de nanite"
 THE_SYNTH_QUEENS_STORM_2_DESC: "La tempête de Cetana est une merveille technologique, mais aussi une arme effroyable.\n\nIl faut en apprendre plus sur cette curiosité pour avoir une chance de nous défendre, surtout si elle nous réserve un sort funeste."
