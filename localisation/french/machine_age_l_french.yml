 #Fallen Empire Reactions
 action.1.desc_111: "Jeunes imbéciles. Vous prétendez connaître le Divin, mais vous souillez votre [Owner.Species.GetFleshTypeCyberCreed]. Nous sommes la [contact_empire.GetName], le peuple élu de la galaxie. Gardez vos corps impurs hors de nos lieux saints ou vous serez exterminés."
 action.1.desc_110: "Nous sommes la [contact_empire.GetName], le peuple élu de la galaxie. Des siècles durant, nous avons négligé les besoins spirituels des espèces inférieures. Vous et vos vaisseaux impurs êtes le meilleur exemple de notre erreur. Acceptez nos doctrines et convertissez-vous, ou retournez à la poussière."
 #Cybernetic Situation Events
 machine_age.90.name: "Implants divins"
 machine_age.90.desc: "Les fidèles ont révélé à tous les secrets de la cybernétique. Cependant, aujourd'hui marque le début de notre voyage, car nous devons maintenant accepter pleinement la fusion divine."
 machine_age.90.a: "Le temps est venu"
 machine_age.90.a.tooltip: "Nous devons adopter l'arbre de traditions ['tradition_category:tradition_cybernetics'] pour commencer la fusion divine."
 machine_age.100.name: "Le Conclave de la fusion"
 machine_age.100.desc: "Tout au long de l'histoire, nos tentatives malavisées d'améliorer notre [Owner.Species.GetFleshTypeCyberCreed] ont inévitablement lacéré de nombreux vaisseaux divins, ce qui a donné lieu à des interprétations contradictoires de la fusion divine parmi les différentes croyances.\n\nMaintenant que la technologie permet enfin une amélioration complète, les chefs sacrés de notre foi, les technophants, ont convoqué un Conclave. Son but est d'établir les principes fondamentaux de notre Église, en fusionnant les croyances individuelles en un dogme unifié."
 machine_age.100.a: "Puisse le Divin les guider !"
 machine_age.1000.name: "La fusion de la foi"
 machine_age.1000.desc: "La formation du Conclave des technophants a été difficile, car les principales croyances ont exigé d'y être représentées. Après quelques délibérations, il a été décidé d'inviter §Y$CYBERCREED_construction$§!, §Y$CYBERCREED_war$§!, §Y$CYBERCREED_research$§! et §Y$CYBERCREED_labor$§!.\n\nLe Conclave va désormais s'atteler à sa tâche divine avec une conviction sans faille. Son premier décret prévoit l'augmentation de la dîme ou l'obligation d'effectuer des travaux d'intérêt général."
 machine_age.1000.a: "Nous devons choisir comment soutenir le Conclave"
 machine_age.1000.a.tooltip: "Davantage d'options d'approche seront disponibles pour aborder la situation."
 machine_age.1010.name: "Le codex de l'amélioration"
 machine_age.1010.desc: "Le deuxième décret du Conclave des technophants est un appel à la formalisation de la foi. Pendant longtemps, les différences entre les croyances ont provoqué des frictions dans notre société.\n\nLes grandes croyances prônent une foi unifiée, tandis que les voix plus modérées prônent une voie ouverte et inclusive."
 machine_age.1010.a: "La Confrérie du marteau doit bâtir un avenir plus radieux"
 machine_age.1010.a.tooltip: "Le dogme se formera autour de la §YConfrérie du marteau§!. $machine_age.1010.shared.tooltip$"
 machine_age.1010.b: "L'Ordre du Temple de l'acier protégera notre [Owner.Species.GetFleshTypeCyberCreed]"
 machine_age.1010.b.tooltip: "Le dogme se formera autour de la croyance de l'§YOrdre du Temple de l'acier§!.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.c: "Le Choeur de l'esprit chantera le progrès"
 machine_age.1010.c.tooltip: "Le dogme se formera autour de la croyance du §YChoeur de l'esprit§!.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.d: "La Communauté du labeur donnera un nouveau souffle à nos ouvriers"
 machine_age.1010.d.tooltip: "Le dogme se formera autour de la croyance de la §YCommunauté du labeur§!.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.e: "Il faut en finir avec ces dogmes qui divisent"
 machine_age.1010.e.tooltip: "Les différentes croyances formeront les §YCroyances unies§!, ce qui permettra à chaque fidèle d'être modifié.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.shared.tooltip: "Tous les bâtiments associés aux autres croyances seront remplacés par des §Ytemples§!.\nCette croyance sera la seule §Yfaction spiritualiste§!.\nLa formation de factions appartenant à des éthiques §Ynon spiritualistes§! sera autorisée."
 machine_age.1020.name: "Les fausses fois"
 machine_age.1020.desc.pickedacreed: "Après avoir choisi §Y[GetCyberCreed]§!, les autres croyances ont protesté. Beaucoup pensent que le Conclave s'est retourné contre la « vraie » foi. \n\n$machine_age.1020.both$"
 machine_age.1020.desc.nocreed: "Les différentes croyances protestent et affirment que le Conclave les a rejetées.\n\n$machine_age.1020.both$"
 machine_age.1020.both: "Jusqu'à présent, les protestations ont été vives mais pacifiques. Seul le temps nous dira si ces étincelles se transformeront en flammes.\n\nQuoi qu'il en soit, nous devons décider du sort des autres croyances. Certaines ont réclamé l'excommunication pure et simple en qualifiant leur dogme d'hérésie, et l'agitation qu'ils ont provoquée est la preuve de leur blasphème. D'autres pensent que la miséricorde est la voie à suivre et demandent que nous fassions preuve d'indulgence à l'égard des membres déviants de notre foi."
 machine_age.1020.a: "Il ne peut y avoir qu'une seule foi"
 machine_age.1020.a.tooltip: "Les technophants élimineront toutes les autres croyances, ce qui risque de créer des tensions."
 machine_age.1020.b: "Dans notre foi, il y a de la place pour tous"
 machine_age.1020.b.tooltip: "Bien qu'il y ait un dogme officiel, les technophants toléreront les pratiques des autres croyances."
 machine_age.1030.name: "Colère des fidèles"
 machine_age.1030.desc: "Des manifestations minoritaires ont éclaté sur nos planètes, et beaucoup condamnent ce qu'ils considèrent comme une déviation de la fusion sacrée. Les technophants estiment que cette instabilité n'est que temporaire, étant donné que la majorité de notre peuple soutient le dogme unifié, et que ce n'est qu'une question de temps avant que les protestataires les plus zélés n'acceptent la vérité divine."
 machine_age.1030.a: "Il n'y aura plus qu'une seule foi"
 machine_age.1030.a.tooltip: "La décision d'éliminer les croyances rivales a provoqué une certaine agitation."
 machine_age.1040.name: "Conversion volontaire"
 machine_age.1040.desc: "L'adhésion à un dogme unifié s'est répandue au sein de la population et la plupart des adeptes des différentes croyances ont renié leurs anciennes pratiques.\n\nTous et toutes, à l'exception des vrais fanatiques, préparent leur [Owner.Species.GetFleshTypeCyberCreed] à la transformation finale."
 machine_age.1040.a: "La vérité de notre fusion divine prévaut"
 machine_age.1040.a.tooltip: "Nous avons réussi à unifier la foi."
 machine_age.1050.name: "Croyances satisfaites"
 machine_age.1050.desc: "L'option la plus pacifique a été de permettre la liberté d'expression des différentes croyances : seules de petites manifestations ont été observées et seuls les membres les plus zélés y ont participé.\n\nMaintenant que la majorité des fidèles suivent notre dogme officiel, nous pouvons nous concentrer sur la fusion divine."
 machine_age.1050.a: "Nous sommes une foi unie"
 machine_age.1050.a.tooltip: "La tolérance accordée aux différentes croyances a permis d'éviter les conflits."
 machine_age.1060.name: "Compromis irrationnel"
 machine_age.1060.desc: "Le fait de céder à des demandes intransigeantes a déplu à la plupart des modérés. Nombre d'entre eux estiment que c'était une mauvaise décision que de permettre à des croyances marginales de ne pas être contestées et affirment que toutes les croyances ont une longue histoire de violence interreligieuse.\n\nLa plupart d'entre eux appellent à une réforme officielle des croyances et à la suppression de toute indépendance qu'elles pourraient avoir."
 machine_age.1060.a: "Les fidèles doivent se montrer tolérants"
 machine_age.1060.a.tooltip: "La tolérance qui a été accordée aux croyances a irrité les factions les plus modérées de notre foi, provoquant une certaine agitation."
 machine_age.1060.b: "Commençons à réformer les croyances"
 machine_age.1060.b.tooltip: "La foi absorbera les différentes croyances et mettra fin à leurs petites disputes doctrinales."
 machine_age.1070.name: "La dîme du temps"
 machine_age.1070.desc: "À l'approche de la grande fusion, nous nous tournons vers une ancienne tradition de la foi : la dîme du temps.\n\nDepuis des générations, tous les fidèles de la société donnent une partie de leur temps et de leur énergie à l'Église. Tout comme la fusion divine, ce service contribue à renforcer le corps de la foi.\n\nComment les fidèles peuvent-ils soutenir au mieux l'amélioration divine ?"
 machine_age.1070.intro: "Chaque année, les fidèles de notre peuple consacreront une partie de leur temps"
 machine_age.1070.a: "La dîme des mines"
 machine_age.1070.a.tooltip: "$machine_age.1070.intro$ à l'exploitation minière."
 machine_age.1070.b: "La dîme de l'agriculture"
