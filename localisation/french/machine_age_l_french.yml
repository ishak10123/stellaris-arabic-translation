 #Cybernetics Pack
 ###################
 MACHINEAGE_TITLE: "The Machine Age" #Do not translate
 #### Cosmogenesis Crisis ####
 ap_cosmogenesis: "Cosmogénèse"
 ap_cosmogenesis_desc: "Le temps, la gravité et l'espace sont les rouages fondamentaux du mécanisme de la réalité. Si nous apprenons à les manipuler, l'univers et ses secrets nous appartiendront."
 cosmogenesis_chain_title: "Cosmogénèse"
 cosmogenesis_chain_desc: "L'ignorance nous enchaîne, mettant les secrets de l'univers hors de portée.\n\nNous devons nous libérer, quel qu'en soit le prix.\n\n§RLes empires déchus tenteront de nous en empêcher !§!"
 cosmogenesis_level_reached: "Niveau de crise atteint"
 cosmogenesis_aborted_tt: "\n£trigger_no£ §RNous avons abandonné notre ambition cosmogénique.§!"
 ### Crisis Stage Techs
 tech_cosmogenesis_crisis_1: "Théorie de l'apprentissage exponentiel"
 tech_cosmogenesis_crisis_1_desc: "Le changement radical de perspective nécessaire pour comprendre les innombrables strates de la réalité défie même nos esprits les plus brillants."
 cosmogenesis_level_1_tech_title: "Permet le niveau de crise §HCosmogénèse§! §H2§!"
 cosmogenesis_level_1_tech_desc: "§H$tech_cosmogenesis_crisis_1$§!\nNous devons élargir notre champ de réflexion afin de comprendre les rouages de la réalité."
 tech_cosmogenesis_crisis_2: "Pinceau gravitationnel"
 tech_cosmogenesis_crisis_2_desc: "La gravité et l'espace-temps façonnent l'univers. Commençons par la gravité et apprenons à maîtriser les outils nécessaires à notre ascension."
 cosmogenesis_level_2_tech_title: "Permet le niveau de crise §HCosmogénèse§! §H3§!"
 cosmogenesis_level_2_tech_desc: "§H$tech_cosmogenesis_crisis_2$§!\nLa gravité n'est rien de plus qu'un pinceau que nous pourrions utiliser pour peindre sur la toile de la réalité."
 tech_cosmogenesis_crisis_3: "Thèse théorique de l'infini"
 tech_cosmogenesis_crisis_3_desc: "Des modifications précises et incroyablement minuscules de la gravité nous permettent d'injecter des commandes dans le code de la réalité. Prudence est de mise à mesure que nous apprenons les applications de ce nouvel outil remarquable."
 cosmogenesis_level_3_tech_title: "Permet le niveau de crise §HCosmogénèse§! §H4§!"
 cosmogenesis_level_3_tech_desc: "§H$tech_cosmogenesis_crisis_3$§!\nUne à une, les poussées de force gravitationnelle nous permettront de percer l'espace-temps."
 tech_cosmogenesis_crisis_4: "Les règles de la réalité"
 tech_cosmogenesis_crisis_4_desc: "Des expériences récentes confirment que les modifications que nous apportons à la réalité ne sont que temporaires. Des changements plus importants seront nécessaires pour qu'ils soient ancrés."
 cosmogenesis_level_4_tech_title: "Permet le niveau de crise §HCosmogénèse§! §H5§!"
 cosmogenesis_level_4_tech_desc: "§H$tech_cosmogenesis_crisis_4$§!\nLa réalité gémit ; elle proteste et grogne, se remodelant obstinément en dépit de nos modifications. Cela ne peut plus durer."
 tech_cosmogenesis_crisis_5: "Univers naissants"
 tech_cosmogenesis_crisis_5_desc: "Voyager dans différents univers est une tâche intimidante. Nous devons concevoir un vaisseau spatial capable non seulement de percer le tissu de l'espace-temps, mais aussi de survivre au voyage.\n\n§RLes empires déchus tenteront de nous en empêcher !§!"
 cosmogenesis_level_5_tech_title: "§HPermet la mégastructure§! Aiguille de l'horizon"
 cosmogenesis_level_5_tech_desc: "§HAiguille de l'horizon§!\nMerveille de technologie, l'Aiguille de l'horizon est un vaisseau civil capable de modifier la réalité. Il peut accueillir notre population et les connaissances accumulées afin de conduire en toute sécurité la migration trans-universelle."
 requires_capital: "£trigger_no£ Doit être construit en orbite de notre capitale"
 ### Crisis Tab
 crisobj_research_tech_name: "Rechercher de nouvelles technologies"
 crisobj_research_tech_desc: "Chaque nouvelle découverte, aussi minime soit-elle, nous permet de mieux comprendre les rouages de la réalité.\n\nRechercher des technologies pour gagner en £advanced_logic£logique avancée."
 crisobj_research_thesis_name: "Rechercher des thèses sur l'infini appliqué"
 crisobj_research_thesis_desc: "Les expériences à grande échelle visant à modifier les règles qui régissent le comportement de la réalité nous fourniront des données précieuses.\n\nRechercher ces technologies rares pour gagner en £advanced_logic£logique avancée."
 crisobj_have_scholarium_vassals_name: "Conserver des vassaux technopoles"
 crisobj_have_scholarium_vassals_desc: "Les dépendances centrées sur la recherche peuvent nous aider dans notre quête du savoir absolu.\n\nConserver des §Yvassaux technopoles§! pour gagner en £advanced_logic£logique avancée §Ychaque année§!."
 crisobj_neural_chips_name: "Employer des puces neurales"
 crisobj_neural_chips_desc: "L'ampleur de nos recherches est telle que des sacrifices sont nécessaires.\n\nUtiliser des pops comme §Ypuces neurales§! dans le §Ytour synaptique§! pour gagner en £advanced_logic£logique avancée.\n\nLa production des §Ypuces neurales§! augmente en fonction du nombre de pops dans le §Ytour synaptique§! et peut être augmentée davantage grâce aux districts et bâtiments."
 crisobj_have_science_nexuses_name: "Contrôler des centres scientifiques"
 crisobj_have_science_nexuses_desc: "Située loin de toute anomalie gravitationnelle, cette infrastructure de recherche de pointe permet de récolter des données spatio-temporelles intactes.\n\nContrôler des §Ycentres scientifiques§! (mégastructures) totalement améliorés pour gagner en £advanced_logic£logique avancée §Ychaque année§!."
 crisobj_galcom_science_resolution_name: "Obtenir le soutien de la Communauté galactique"
 crisobj_galcom_science_resolution_desc: "Convaincre les membres de la Communauté galactique que nos recherches sont essentielles contribuerait grandement à la réalisation de nos projets.\n\nFaire en sorte que la §YCommunauté galactique§! adopte des §Yrésolutions§! liées à la transmission du savoir pour gagner en £advanced_logic£logique avancée §Ychaque année§!."
 crisis_cosmogenesis_level_1: "§UPréoccupante§!"
 crisis_cosmogenesis_level_1_desc: "Crise niveau 1"
 crisis_cosmogenesis_level_2: "§UÀ risque§!"
 crisis_cosmogenesis_level_2_desc: "Crise niveau 2"
 crisis_cosmogenesis_level_3: "§UDangereuse§!"
 crisis_cosmogenesis_level_3_desc: "Crise niveau 3"
 crisis_cosmogenesis_level_4: "§UCatastrophique§!"
 crisis_cosmogenesis_level_4_desc: "Crise niveau 4"
 crisis_cosmogenesis_level_5: "§UMenace existentielle§!"
 crisis_cosmogenesis_level_5_desc: "Crise niveau 5"
 menp_cosmo_objectives: "Logique avancée"
 unlocks_cosmo_objectives: "Permet de cumuler de la £advanced_logic£§Ylogique avancée§! en atteignant les §Hobjectifs de crise§!.\n\nPermet la technologie §Y$tech_cosmogenesis_crisis_1$§!, qui nous rapprochera de nos objectifs.\n"
 menp_cosmo_objectives_desc: "La logique avancée représente notre compréhension des lois qui régissent la réalité et notre capacité à les influencer."
 menp_cosmo_buildings_1: "Arcologies parfaites"
 unlocks_buildings_1: "Les bâtiments simples des empires déchus apparaissent désormais dans les options de recherche.\n"
 menp_cosmo_buildings_1_desc: "Les empires déchus ont peut-être oublié comment reproduire leur technologie avancée, mais nos esprits découvriront les secrets révolus de leur âge d'or."
 menp_cosmo_techs_1: "Énergie non baryonique"
 unlocks_techs_1: "Permet la technologie liée au composant pour vaisseaux §Y$tech_dark_matter_power_core$§!.\n"
 menp_cosmo_techs_1_desc: "Apprendre à exploiter l'énergie des particules non baryoniques est la prochaine étape dans l'évolution de la production d'énergie ultra-compacte."
 menp_cosmo_features_1: "Neurocybernétique"
 unlocks_features_1: "Permet la technologie liée à la mégastructure §Ytour synaptique§!.\n"
 menp_cosmo_features_1_desc: "Le tour synaptique est un énorme ordinateur-réservoir. Il utilise la puissance de traitement des esprits en réseau de notre population pour calculer et stocker des données. Les avantages sont flagrants, mais certaines espèces malavisées pourraient considérer que la transmutation d'individus en puces est moralement discutable."
 menp_cosmo_ship_2: "Escorteurs cryptiques"
 unlocks_ship_2: "Permet la technologie liée au vaisseau de classe §Yescorte§! des empires déchus.\n"
 menp_cosmo_ship_2_desc: "[Get_menp_cosmo_ship_2]"
 menp_cosmo_ship_2_desc_regular: "Un vaisseau de taille modeste qui met en oeuvre le transcendantalisme dimensionnel, rendant l'intérieur plus grand que sa forme extérieure ne le suggère, grâce à notre maîtrise de l'espace-temps. Ses capacités de tir avancées s'accompagnent d'un coût logistique réduit par rapport aux vaisseaux traditionnels."
 menp_cosmo_buildings_2: "Collecte de ressources avancée"
 unlocks_buildings_2: "Les bâtiments avancés des empires déchus apparaissent désormais dans les options de recherche.\n"
 menp_cosmo_buildings_2_desc: "Les capacités de génération de ressources des empires déchus nous ont longtemps déconcertés. Ce n'est plus le cas."
 menp_cosmo_techs_2: "Avancées non baryoniques"
 unlocks_techs_2: "Permet la technologie liée aux composants pour vaisseaux §Y$tech_enigmatic_decoder$§! et §Y$tech_dark_matter_propulsion$§!.\n"
 menp_cosmo_techs_2_desc: "Notre compréhension croissante de la matière noire et de ses applications ouvrira la voie à de nouveaux progrès technologiques."
 menp_cosmo_features_2: "Outils gravitationnels"
 unlocks_features_2: "Permet la technologie §Y$tech_cosmogenesis_crisis_2$§!, qui nous rapprochera de nos objectifs.\n"
 menp_cosmo_features_2_desc: "$tech_cosmogenesis_crisis_2_desc$\n"
 menp_cosmo_ship_3: "Croiseurs mystérieux"
 unlocks_ship_3: "Permet la technologie liée au vaisseau de classe §Ycroiseur de bataille§! des empires déchus.\n"
 menp_cosmo_ship_3_desc: "[Get_menp_cosmo_ship_3]"
 menp_cosmo_ship_3_desc_regular: "Un autre vaisseau spatial optimisé, cette fois plus grand, qui fera passer les cuirassés actuels pour des jouets."
 menp_cosmo_buildings_3: "Infrastructures complexes"
 unlocks_buildings_3: "Les bâtiments complexes des empires déchus apparaissent désormais dans les options de recherche.\n"
 menp_cosmo_buildings_3_desc: "Le voile du mystère qui entoure les empires déchus a commencé à s'effiler et nous devons continuer à tirer sur le fil. Nous finirons par démêler les secrets de leur technologie."
 menp_cosmo_techs_3: "Anti-baryons exotiques"
 unlocks_techs_3: "Permet la technologie liée aux composants pour vaisseaux §Y$tech_enigmatic_encoder$§! et §Y$tech_dark_matter_deflector$§!.\n"
 menp_cosmo_techs_3_desc: "L'utilisation de la matière noire dans les technologies défensives et le cryptage nous permettra de créer des champs d'annulation et des canaux de communication fiables."
 menp_cosmo_features_3: "Expansion infinie"
 unlocks_features_3: "Permet la technologie §Y$tech_cosmogenesis_crisis_3$§!, qui nous rapprochera de nos objectifs.\n"
 menp_cosmo_features_3_desc: "$tech_cosmogenesis_crisis_3_desc$\n"
 menp_cosmo_ship_4: "Vaisseaux amiraux imprévisibles"
 unlocks_ship_4: "Permet la technologie liée au vaisseau de classe §Ytitan§! des empires déchus.\n"
 menp_cosmo_ship_4_desc: "[Get_menp_cosmo_ship_4]"
 menp_cosmo_ship_4_desc_regular: "Ces vaisseaux remarquables s'apparentent à des forteresses mobiles, et seuls les assauts les plus violents ont une chance de les endommager."
 menp_cosmo_buildings_4: "Âge d'or"
 unlocks_buildings_4: "Les bâtiments extraordinaires des empires déchus apparaissent désormais dans les options de recherche.\n"
 menp_cosmo_buildings_4_desc: "Les connaissances des empires déchus en matière de manipulation dimensionnelle sont étonnantes. Avec chaque découverte, même leur technologie la plus obscure commence à sembler simpliste."
 menp_cosmo_techs_4: "Armure et armements"
 unlocks_techs_4: "Permet la technologie liée aux composants pour vaisseaux §Y$tech_energy_lance_2$§! et §Y$tech_dragon_armor$§!.\n"
 menp_cosmo_techs_4_desc: "Nos dernières avancées technologiques devraient nous permettre de concevoir des armes plus meurtrières et des armures plus résistantes."
 menp_cosmo_features_4: "Transgresseur"
 unlocks_features_4: "Permet la technologie §Y$tech_cosmogenesis_crisis_4$§!, qui nous rapprochera de nos objectifs.\nPermet également la technologie répétable §Y$tech_cosmogenesis_thesis$§!, qui produit de grandes quantités de §Ylogique avancée§!.\n"
 menp_cosmo_features_4_desc: "$tech_cosmogenesis_crisis_4_desc$"
 menp_cosmo_buildings_5: "Mémoire et création"
 unlocks_buildings_5: "Les bâtiments ésotériques des empires déchus apparaissent désormais dans les options de recherche.\n"
 menp_cosmo_buildings_5_desc: "Les secrets des empires déchus, enfin percés à jour, inaugureront une nouvelle ère pour notre peuple."
 menp_cosmo_techs_5: "Essaims de nanites"
 unlocks_techs_5: "Permet la technologie liée aux composants pour vaisseaux §Y$tech_nanite_repair_system$§!, §Y$tech_nanite_autocannon$§! et §Y$tech_nanite_flak_batteries$§!.\n"
 menp_cosmo_techs_5_desc: "Chaque changement de perspective offre de nouvelles opportunités. Un tout petit changement peut avoir des conséquences considérables."
 menp_cosmo_features_5: "Explorateur du vide"
 unlocks_features_5: "Permet la technologie §Y$tech_cosmogenesis_crisis_5$§!, qui nous permettra de construire une §YAiguille de l'horizon§! et d'accomplir nos objectifs."
 menp_cosmo_features_5_desc: "$tech_cosmogenesis_crisis_5_desc$"
