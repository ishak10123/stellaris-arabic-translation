 machine_age.3315.name: "Aube synthétique"
 machine_age.3315.desc: "C'est aujourd'hui que s'achève notre voyage numérique. Personne ne peut nier l'ampleur de ce que nous avons accompli, ni le sacrifice que nous avons consenti pour y parvenir.\n\nNous sommes devenus un peuple entièrement numérisé et synthétique. Nous ne succomberons plus aux ravages de la maladie. Nous ne serons plus soumis aux limites d'une génétique fragile.\n\nNous sommes libres de créer la réalité que nous jugeons appropriée."
 machine_age.3315.a: "Vive l'aube synthétique"
 machine_age.3315.a.tooltip: "Cela va clore la chaîne d'événements §Y$origin_synthetic_fertility$§!."
 machine_age.3315.a.tt: "Les §Y[This.Owner.GetSpeciesNamePlural]§! reçoivent le trait ['concept_synthetic_dawn']"
 synthetic_dawn: "Aube synthétique"
 synthetic_dawn_desc: "Nous sommes devenus un peuple entièrement numérisé et synthétique, libre de créer la réalité qui lui convient."
 trait_robot_synthetic_dawn: "Salut synthétique"
 trait_robot_synthetic_dawn_desc: "Cette espèce synthétique a transcendé ses origines biologiques et s'épanouit dans son existence numérique nouvellement adoptée."
 concept_synthetic_dawn: "$trait_robot_synthetic_dawn$"
 #Situations
 situation_synthetic_fertility_digitization: "Préservation d'identité rapide"
 situation_synthetic_fertility_digitization_type: "Préservation d'identité rapide"
 situation_synthetic_fertility_digitization_monthly_change_tooltip: "Nous étudions la technologie nécessaire à la reconstitution d'une population physique."
 situation_synthetic_fertility_digitization_desc: "Nous ne pouvons pas avoir de descendance, mais nous pouvons préserver notre esprit. Ce processus est lent mais nécessaire.\n\nÀ terme, il nous sera peut-être possible de retourner dans le monde physique, mais cela nécessitera la mise au point de substituts synthétiques."
 situation_synthetic_fertility_approach_none: "L'économie avant tout"
 situation_synthetic_fertility_approach_none_desc: "Nous devons faire concorder les besoins du projet avec la santé de notre économie."
 situation_synthetic_fertility_approach_tech_low: "Fonds supplémentaires"
 situation_synthetic_fertility_approach_tech_low_desc: "Nous allouerons des fonds de notre économie aux centres de recherche."
 situation_synthetic_fertility_approach_tech_high: "Priorité scientifique"
 situation_synthetic_fertility_approach_tech_high_desc: "Pour survivre, nous devons prendre des décisions économiques difficiles."
 situation_synthetic_fertility_approach_unity_low: "Conception virtuelle"
 situation_synthetic_fertility_approach_unity_low_desc: "Nous accorderons à nos meilleures identités numériques plus d'énergie pour travailler sur des solutions de corps synthétiques."
 situation_synthetic_fertility_approach_unity_high: "Mesures d'urgence"
 situation_synthetic_fertility_approach_unity_high_desc: "Les sources d'énergie primaires seront détournées vers les identités numériques pour un remplacement complet des corps de l'espèce."
 situation_synthetic_fertility_complete: "Notre forme physique aura alors expiré et notre population sera totalement numérisée."
 stage_synthetic_fertility_problem_effects: "Pour maintenir notre présence physique dans le monde, nous devons développer des corps synthétiques de pointe dotés de cerveaux positroniques complexes."
 stage_synthetic_fertility_danger_effects: "La moitié de la population a disparu. Nous devons consacrer davantage de ressources financières à la recherche d'une solution synthétique."
 stage_synthetic_fertility_crisis_effects: "Nous ne sommes plus que quelques-uns. Nous devons tout faire pour créer un cerveau positronique suffisamment complexe."
 situation_synthetic_fertility_synthesization_outcome: "Nous n'arrêterons pas tant que notre avenir ne sera pas assuré."
 situation_no_synthetics_adopt: "£trigger_no£ Les traditions synthétiques doivent être adoptées"
 situation_no_robot_research: "£trigger_no£ Des technologies liées aux §Yrobots§! doivent être en cours d'étude"
 situation_synthetic_fertility_synthesization: "Synthétisation"
 situation_synthetic_fertility_synthesization_type: "Synthétisation"
 situation_synthetic_fertility_synthesization_monthly_change_tooltip: "La fabrication de nos corps numériques a commencé. Notre avenir synthétique nous attend."
 situation_synthetic_fertility_synthesization_desc: "Nous disposons désormais des connaissances techniques nécessaires à la synthétisation de notre population.\n\n\n§YPops qui recevront des corps synthétiques le mois prochain§! : §G[From.GetSynthFertPopsPerMonth]§!"
 stage_1_synthetic_fertility_synthesization_effects: "Les robots existants seront utilisés comme corps synthétiques pour notre population numérisée."
 stage_2_synthetic_fertility_synthesization_effects: "Nous concevrons de nouveaux corps robotiques pour notre population numérisée restante."
 situation_synthetic_fertility_synthesization_careful: "Approche prudente"
 situation_synthetic_fertility_synthesization_careful_desc: "$situation_synthetic_fertility_synthesization_careful$"
 situation_synthetic_fertility_synthesization_careful_tooltip: "Vitesse de téléchargement : §Y100§! £pop£§Hpops§! par mois"
 situation_synthetic_fertility_synthesization_full_speed: "Pleine vitesse"
 situation_synthetic_fertility_synthesization_full_speed_desc: "$situation_synthetic_fertility_synthesization_full_speed$"
 situation_synthetic_fertility_synthesization_full_speed_tooltip: "Vitesse de téléchargement : §Y200§! £pop£§Hpops§! par mois"
