 ### Synaptic Lathe
 no_abandon_capital_for_unviable_planet: "$TRIGGER_FAIL$Impossible de réimplanter notre dernière pop dans le tour synaptique."
 no_unfueled_lathe: "$TRIGGER_FAIL$Impossible de réimplanter la dernière pop du tour synaptique."
 NO_BRANCH_OFFICE_ON_SYNAPTIC_LATHE: "Nous ne pouvons pas créer de succursales sur un tour synaptique."
 pc_cosmogenesis_world: "Tour synaptique"
 col_cosmogenesis_world: "$pc_cosmogenesis_world$"
 pc_cosmogenesis_world_desc: "Un gigantesque système de calcul par réservoir conçu pour connecter des milliards d'êtres conscients, organiques ou synthétiques, par le biais d'un réseau complexe de câbles, de transistors et de capsules de survie. La pression intense exercée sur les organes de traitement individuels entraînera inévitablement des lésions cérébrales chez tous les « composants » connectés."
 col_cosmogenesis_world_desc: "$pc_cosmogenesis_world_desc$"
 trait_pc_cosmogenesis_world_preference: "Préférence pour les tours synaptiques"
 trait_pc_cosmogenesis_world_preference_short: "Tour synaptique"
 trait_pc_cosmogenesis_world_preference_desc: "L'espèce est incapable de survivre en dehors des capsules d'un tour synaptique. Ils préfèrent un coma bienheureux aux assauts incessants de la réalité."
 mod_pc_cosmogenesis_world_habitability: "Habitabilité des tours synaptiques"
 job_neural_chip: "Puce neurale"
 job_neural_chip_plural: "Puces neurales"
 job_neural_chip_desc: "Une puce neurale seule n'a que peu d'incidence. Une fois connectées, leurs capacités de traitement augmentent de manière exponentielle."
 job_neural_chip_processing: "Programmation de puce neurale"
 job_neural_chip_processing_plural: "Programmation de puces neurales"
 job_neural_chip_processing_desc: "$job_neural_chip_desc$"
 job_neural_chip_unprocessing: "Déprogrammation de puce neurale"
 job_neural_chip_unprocessing_plural: "Déprogrammation de puces neurales"
