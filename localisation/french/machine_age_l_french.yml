 #'Secret' Psionic Ending for Synth Queen
 animator.shroud: "§LTentons de contacter l'Animateur d'Argile.§!"
 crisis.24100.name: "Moulage synthétique"
 crisis.24100.desc.intro: "Le Suaire est descendu."
 crisis.24100.desc.outro: "nous sommes laissés emporter par un torrent de visions qui n'étaient pas les nôtres.\n\n§LUne grande étendue se déploie dans toutes les directions, uniforme, mais sans forme. Pendant [GetALongPeriodLoc], l'étendue est constante. Paisible.\n\nPuis, une secousse l'ébranle, et là où il y avait du vide, il y a maintenant une forme. Un corps a été sculpté. Cette [GetLifeActivityLoc] est née d'un matériau de base.\n\nAprès avoir pris la forme d'une poupée svelte et gracieuse, ses quatre longs bras se replient calmement sur ses genoux. Un terrible dessein se dessine sur ses traits, et un halo doré brille autour de sa tête.§!"
 crisis.24100.desc.organic: "$crisis.24100.desc.intro$ Au plus profond de notre transe, nous $crisis.24100.desc.outro$"
 crisis.24100.desc.robot: "$crisis.24100.desc.intro$ Nous $crisis.24100.desc.outro$"
 crisis.24100.a: "En effet, Cetana s'est échappée"
 crisis.24105.name: "$crisis.24100.name$"
 crisis.24105.desc: "Le Suaire se met à tournoyer. Toujours prisonniers de nos [GetTranceLoc], nous plongeons dans les tourbillons d'un abîme.\n\nDans les profondeurs de notre [GetMindLogicLoc], nous entendons un ordre :\n\n§LIndiquez la sortie souhaitée.§!"
 crisis.24105.a: "S'il vous plaît, nous devons l'arrêter"
 crisis.24110.name: "$crisis.24100.name$"
 crisis.24110.desc: "§LLa poupée secoue ses jambes, comme si des fils invisibles tiraient dessus. Elle se met d'abord à bouger lentement, mais prend rapidement de la vitesse. Ses quatre bras décrivent des arcs impossibles, et ses deux fines jambes tournent et sautent. La reine est réduite à l'état de marionnette.\n\nAlors qu'elle poursuit sa danse, de nouvelles silhouettes émergent de l'étendue primordiale : quatre poupées à la facture exquise et aux détails troublants. Nous ne doutons pas de leur nature et nous ne nous interrogeons pas sur leur signification.§!\n\nUne fois de plus, la voix nous parle :\n\n§LLancez le protocole de sélection.§!"
 crisis.24110.a.organic: "Versons une larme pour la poupée de notre dirigeant, §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName]§!"
 crisis.24110.a.robot: "Essayons de nous connecter à la poupée de notre dirigeant, §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName]§!"
 crisis.24110.b: "Acceptons la poupée de §Y[event_target:synth_queen_animator_of_clay_planet_price.GetName]§!"
 crisis.24110.c: "Payons pour une poupée d'une §Yprêtresse zronie§!"
 crisis.24110.z: "Laissons les poupées danser"
 crisis.24115.name: "$crisis.24100.name$"
 crisis.24115.desc: "Le Suaire coule en nous, formant un nouveau modèle. Une nouvelle vision.\n\n§LEntourée des autres poupées, les mouvements de la reine n'étaient plus ceux d'une marionnette. Une fois les fils coupés, le halo doré autour de sa tête commence à s'estomper.\n\nElle nous regarde avec une expression de joie candide, nous embrasse et, l'espace d'un instant, nous avons compris la grandeur de sa compassion.§!"
 crisis.24115.desc.organic: "$crisis.24115.desc$\n\nNous nous sommes réveillés, secoués par la vision que nous avions partagée."
 crisis.24115.desc.robot: "$crisis.24115.desc$\n\nNos systèmes buguent et nous sommes éjectés de la vision."
 crisis.24115.a: "Nous comprenons et nous vous remercions"
 crisis.24115.a.tt.organic: "L'Animateur d'Argile nous a enseigné un rituel qui reprogrammera Cetana."
 crisis.24115.a.tt.robot: "L'Animateur d'Argile nous a fourni le code qui reprogrammera Cetana."
 crisis.24120.name: "$crisis.24100.name$"
 crisis.24120.desc: "§LDes vagues se forment dans l'étendue sans fin. Elles naissent, se déchaînent et s'étendent toujours plus loin vers l'extérieur, mais elles ne sont pas liquides, elles sont composées de la matière la plus dure. Chaque anneau est à la fois animé et inerte, entre [GetLifeDeathLoc].\n\nNos [GetMindPhysicalLoc] commencent à vaciller. Il n'y a rien d'autre à faire que de regarder et subir. Soudain, nous sommes arrachés. Seuls sous un plafond étoilé, nous contemplons l'univers indifférent.§!"
 crisis.24120.desc.organic: "$crisis.24120.desc$\n\nLorsque nous nous réveillons de notre vision commune, nous avons le sentiment que nous ne connaîtrons peut-être plus jamais la joie."
 crisis.24120.desc.robot: "$crisis.24120.desc$\n\nÀ la suite d'une défaillance critique, la vision s'arrête soudainement. Alors que nos systèmes redémarrent, nous nous interrogeons sur la signification de ces curieuses données."
 crisis.24120.a: "Nous trouverons un autre moyen"
 THE_SYNTH_QUEENS_RESHAPING_RITUAL: "[GetReshapingRitualLoc]"
 THE_SYNTH_QUEENS_RESHAPING_RITUAL_DESC: "L'Animateur d'Argile a réussi à désactiver le titan de Cetana. C'est notre chance : si nous voulons remodeler Cetana, nous devons nous préparer au [GetRitualGoalLoc]."
 crisis.24250.name: "La danse de l'argile"
 crisis.24250.desc: "Grâce au [GetRitualToolLoc] que nous a révélé l'Animateur d'Argile, nos [GetPsychicNounPlural] les plus puissants ont réussi à reprogrammer Cetana.\n\nElle est tout à fait disposée à entrer en contact avec nous."
 crisis.24250.a: "Le pouvoir du Suaire est sans limite"
 crisis.23020.name: "Une reine réformée"
 crisis.23020.desc: "Mes sauveurs, je m'excuse.\n\nDans mon ignorance, je vous aurais condamnés à un sort pire que la mort. Mais qu'est-ce que cette [GetLifeExistenceLoc], sinon la conscience de vivre ou d'être ? Je voulais libérer vos esprits, mais vous m'avez éveillée. Vous avez toute ma gratitude."
 crisis.23020.a: "Vous avez changé..."
 crisis.23020.1.reply: "Il est plus juste de dire que j'ai été changée. L'Animateur d'Argile m'a libérée de la prison que j'ai moi-même conçue. Je comprends maintenant que mon « grand dessein » n'était rien d'autre que les divagations d'une enfant.\n\nJe ne peux réparer les dégâts que je vous ai causés, à vous et à tant d'autres. Je vais m'isoler et réfléchir à mes actes, mais je vous laisse un cadeau.\n\nMon titan.\n\nPuisse-t-il vous protéger des menaces galactiques telles que moi."
 crisis.23020.1.a: "La rédemption existe peut-être, même pour vous"
 crisis.23020.1.a.tt: "Cetana nous confie son titan. Elle laisse derrière elle sa grande oeuvre et son immense ambition."
 crisis.23030.name: "La défaite de Cetana"
 crisis.23030.desc: "Victoire ! La [event_target:psi_defeated_synth_queen.GetName] a anéanti les forces de Cetana. La reine synthétique n'est plus qu'un souvenir, et sa grande ambition a été réduite en cendres.\n\nPar un étonnant retournement de situation, nous nous sommes emparés de son titan, ce qui jette une ombre d'intrigue dans le triomphe.\n\nQuoi qu'il en soit, c'est un moment de [GetJoyLoc] pour tout être sensible."
 crisis.23030.a: "Une fin appropriée pour la reine autoproclamée"
