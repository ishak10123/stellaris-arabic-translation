 synth_queen_much_shared_research: "Base de données surchargée"
 synth_queen_much_shared_research_desc: "Nous avons permis à Cetana d'accéder sans restriction à nos bases de données, ce qui a considérablement ralenti nos recherches."
 synth_queen_war_preparations: "Guerre en vue"
 synth_queen_war_preparations_desc: "Après avoir découvert les opérations secrètes de Cetana, il est plus urgent que jamais de renforcer notre armée."
 synth_queen_advanced_war_preparations: "Lutte pour survivre"
 synth_queen_advanced_war_preparations_desc: "Le complot de Cetana visant à éradiquer la conscience doit être déjoué par tous les moyens."
 synth_queen_nanite_apprentice: "Apprentis de Cetana"
 synth_queen_nanite_apprentice_desc: "Cetana a développé un vif intérêt pour nous après avoir découvert notre fascination commune pour la nanotechnologie. Qu'elle soit digne de confiance ou non, nous pourrions bénéficier de ses conseils."
 #Opinion
