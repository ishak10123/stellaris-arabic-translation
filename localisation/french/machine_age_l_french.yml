 ##########################
 #ARC WELDERS ORIGIN
 ##########################
 origin_arc_welders: "Soudeurs à arc"
 origin_arc_welders_desc: "Leur planète est déserte, mais leur système natal regorge de richesses. Afin de les exploiter au mieux, ces machines ont été construites plus grandes que jamais. Un puissant §Hfour à arc§! domine désormais leur ciel, mais ces maîtres ingénieurs sont loin d'être satisfaits.\n\nLa galaxie attend et les possibilités sont infinies. Il suffit de faire preuve d'ingéniosité pour les exploiter."
 origin_tooltip_arc_builders_effects: "- $HOMEWORLD$ les ['concept_mining_district', £district£districts miniers] sont remplacés par des ['concept_generator_district', £district£districts générateurs] \n- $HOME_SYSTEM$ un ['concept_arc_furnace', four à arc] construit autour d'un ['concept_pc_molten', monde en fusion] \n- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_orbital_arc_furnace',£engineering_research£four à arc] \n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_mega_engineering', £engineering_research£méga-ingénierie] en construisant un deuxième four à arc"
 origin_tooltip_arc_builders_negative_effects: "- $INITIAL_POPS$ §R-300§! \n- Le monde natal est d'une taille de 15£planetsize£"
 START_SCREEN_ARC_WELDERS: "Des années d'exploitation ont laissé [Root.Capital.GetName] en friche. Cependant, le ciel est riche en ressources et, avec une ambition qui ne rivalise qu'avec notre ingéniosité, nous avons maintenant entrepris de vivre dans l'espace.\n\nLa phase initiale de la construction du four à arc a été une tâche herculéenne, mais son potentiel est énorme. La prochaine étape logique consiste à maximiser sa capacité, ainsi que l'extraction des ressources dans l'ensemble du système. Mais qu'y a-t-il au-delà, et quelles opportunités incroyables attendent nos astucieux ingénieurs ?\n\nAvec l'avènement du voyage PRL, nos conceptions ne sont plus limitées à un seul système. La galaxie est une page blanche, et il est temps de la remplir."
 concept_arc_furnace: "$orbital_arc_furnace_1$"
 concept_arc_furnace_desc: "§EEffets :§!\n$orbital_arc_furnace_1_mod_tooltip$\n\n§L$tech_orbital_arc_furnace_desc$§!"
 concept_orbital_arc_furnace: "$tech_orbital_arc_furnace$"
 concept_orbital_arc_furnace_desc: "§IPermet la mégastructure§! $orbital_arc_furnace_4$ \n\n§L$tech_orbital_arc_furnace_desc$§!"
 concept_mega_engineering: "$tech_mega_engineering$"
 concept_mega_engineering_desc: "- $MOD_COUNTRY_RESOURCE_MAX_ADD$: §G+20 000§! \n- §I$UNLOCKS_FEATURE$§! la restauration des mégastructures \n\n§L$tech_mega_engineering_desc$§!"
 machine_age.3400.name: "Du combustible pour la forge"
 machine_age.3400.desc: "Même à distance, [From.GetName] semblait être le candidat idéal. Maintenant que notre étude du système est terminée, il n'y a plus de doute : un monde en fusion et une géante gazeuse, une abondance d'astéroïdes et de lunes... C'est l'endroit idéal pour un four à arc.\n\nNous devons désormais demander à un vaisseau de construction de se mettre au travail. Il est temps d'allumer la forge."
 ideal_furnace_system_poi: "Système idéal pour le four"
 ideal_furnace_system_name: "[From.GetName]"
 ideal_furnace_system_desc: "Un système idéal pour la construction d'un deuxième four à arc."
 ideal_furnace_system: "Système idéal localisé"
 ideal_furnace_chain_title: "Du combustible pour la forge"
 ideal_furnace_chain_desc: "Nous avons trouvé un système idéal dans lequel construire un deuxième four à arc."
 machine_age.3405.name: "Horizon soudé"
 machine_age.3405.desc: "Le four à arc de notre système natal était une excellente preuve de concept, un testament de notre ambition et de notre ingéniosité. Aujourd'hui, dans le système [from.GetName], un autre four brûle contre le vide.\n\nPlus important encore que les ressources qu'il nous fournira, notre travail a ouvert la porte à des projets d'une taille et d'une échelle titanesques. Nous pouvons désormais voir plus loin, comme si nous nous trouvions au bord d'un vaste horizon.\n\nNotre imagination est notre seule limite."
 ##########################
 #SYNTHETIC FERTILITY
 ##########################
 #Event Chain
 synthetic_fertility_chain_title: "$origin_synthetic_fertility$"
 synthetic_fertility_chain_desc: "Nous avons perdu la capacité de procréer. Notre monde natal est jonché d'écoles abandonnées. Les aires de jeux sont vides. Ce n'est qu'une question de temps avant que le dernier d'entre nous ne disparaisse. Notre espoir, du moins pour le moment, réside dans l'espace numérique du référentiel d'identité.\n\nSi nous voulons un jour retourner dans le monde physique, nous devons développer des corps synthétiques et un cerveau positronique suffisamment complexe."
 #Origin Text
 origin_synthetic_fertility: "Fertilité synthétique"
 origin_synthetic_fertility_desc: "§RATTENTION : bloque toute ascension à l'exception du chemin ['concept_synthetic_ascension',synthétique].§!\n\nAutrefois prospère, cette espèce a cessé de se reproduire en raison d'un récent problème génétique. À court d'options face à l'extinction imminente, ils ont placé leurs espoirs dans le salut numérique."
 origin_tooltip_synthetic_fertility_effects: "- $INITIAL_POPS$ §G+900§! $NEW_LINE$- $SPECIES_TRAITS$ ['concept_pathogenic_genes']\n- Monde natal : $TABBED_NEW_LINE$- Taille : 20£planetsize£ $TABBED_NEW_LINE$- ['concept_abandoned_cities',£blocker£$concept_abandoned_cities$] : +2 $TABBED_NEW_LINE$- ['concept_identity_repository',£building£$concept_identity_repository$] $TABBED_NEW_LINE$- ['concept_abandoned_gene_clinic',£building£$concept_abandoned_gene_clinic$] $NEW_LINE$- Situation : ['concept_identity_rescue',préservation d'identité rapide] $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_synth_ai',technologies d´I.A.'] $NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_robotic_workers', £engineering_research£ouvriers robotiques]"
 origin_tooltip_synthetic_fertility_negative_effects: "- £pop£§HPops§! : en déclin"
 START_SCREEN_SYNTHETIC_FERTILITY: "Notre première incursion dans la conscience numérique a été révolutionnaire, car elle a donné naissance à une communauté entièrement numérisée qui a estompé la frontière entre les mondes physique et virtuel. Notre succès a été tel que nous nous sommes complu dans l'idée que les générations à venir seraient là pour continuer à innover et à explorer.\n\nNous avons eu tort.\n\nUne nouvelle maladie a attaqué notre code génétique, nous privant de la capacité de procréer. Nos esprits les plus brillants n'ont pas réussi à trouver un remède et la panique s'est répandue au sein de notre population vieillissante.\n\nEn désespoir de cause, nous avons étendu notre stockage numérique pour préserver nos identités. Mais est-ce là l'existence que nous désirons ? Nous nous tournons désormais vers le développement de corps synthétiques et d'un cerveau positronique suffisamment sophistiqué pour nous permettre d'exister dans le monde physique."
 #Concepts
 concept_synthetic_ascension: "Ascension synthétique"
 concept_synthetic_ascension_desc: "$ap_synthetic_evolution_desc$"
 concept_pathogenic_genes: "$trait_pathogenic_genes$"
 concept_pathogenic_genes_desc: "- §RColonisation de planètes et réimplantation impossibles§! $NEW_LINE$- §REmpêche toute reproduction naturelle§!\n\n§L$trait_pathogenic_genes_desc$§!"
 concept_identity_rescue: "$situation_synthetic_fertility_digitization$"
 concept_identity_rescue_desc: "Confère des technologies qui débloquent l'$concept_synthetic_ascension$ \n\n§L$situation_synthetic_fertility_digitization_desc$§!"
 concept_identity_repository: "$building_identity_repository$"
 concept_identity_repository_desc: "- Produit :$TABBED_NEWLINE$6.00£physics£ 6.00£society£ 6.00£engineering£ 6.00£unity£$NEW_LINE$- Maintenance : 6.00£energy£$NEW_LINE$- £trade£ : §G+6§!\n\nCe référentiel abrite §Y300§! identités. $building_identity_repository_scaling$\n\n§L$building_identity_repository_desc$§!"
 concept_abandoned_gene_clinic: "$building_abandoned_gene_clinic$"
 concept_abandoned_gene_clinic_desc: "- $building_abandoned_gene_clinic_tt$\n\n§L$building_abandoned_gene_clinic_desc$§!"
 concept_abandoned_cities: "$d_abandoned_cities$"
 concept_abandoned_cities_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-1§! \n- Durée de déblaiement : 360 §Ijours§!\n- Coût de déblaiement : \n  - 750 d'£energy£énergie \n  - 250 £minerals£minéraux\n\n§L$_abandoned_cities_desc$§!"
 concept_synth_ai: "Technologies d'I.A."
 concept_synth_ai_desc: "- ['concept_powered_exoskeletons', £engineering_research£ $tech_powered_exoskeletons$] $NEW_LINE$- ['concept_administrative_ai', £physics_research£ $tech_administrative_ai$] $NEW_LINE$- ['concept_self_aware_logic', £physics_research£ $tech_self_aware_logic$] $NEW_LINE$- ['concept_sapient_ai', £physics_research£ $tech_sapient_ai$]"
 concept_administrative_ai: "$tech_administrative_ai$"
 concept_administrative_ai_desc: "$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$: §G+5%§!\nEntretien des £job_researcher£chercheurs : §R+5%§!\n\n§L$tech_administrative_ai_desc$§!"
 concept_self_aware_logic: "$tech_self_aware_logic$"
 concept_self_aware_logic_desc: "$MOD_COUNTRY_NUM_TECH_ALTERNATIVES_ADD$: §G+1§!\n\n§L$tech_self_aware_logic_desc$§!"
 concept_sapient_ai: "$tech_sapient_ai$"
 concept_sapient_ai_desc: "$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$: §G+5%§!\nEntretien des £job_researcher£chercheurs : §R+5%§!\n\n§L$tech_sapient_ai_desc$§!"
 #Traits
 trait_pathogenic_genes: "Gènes pathogènes"
 trait_pathogenic_genes_desc: "Une nouvelle maladie génétique empêche cette espèce de se reproduire. Elle a résisté à toutes les méthodes de thérapie génique."
 PATHOGENIC_GENES_FORCE_DECLINE: "§RL'espèce est en déclin§! à cause de ses §Ygènes pathogènes§!."
 pathogenic_genes_tooltip: "§RColonisation de planètes et réimplantation impossibles§!"
 pathogenic_genes_warning: "$TRIGGER_FAIL$§YLes pops ayant le trait §R$trait_pathogenic_genes$§! ne peuvent être réimplantées§!."
 leader_trait_robotic_surrogate: "Substitut robotique"
 leader_trait_robotic_surrogate_desc: "Encombrant et lent, ce corps robotisé est le substitut d'une personnalité numérisée dans le référentiel d'identité."
 #Buildings
 building_identity_repository: "Référentiel d'identité"
 building_identity_repository_tt: "Ce référentiel abrite §Y[Owner.GetTotalIdentities]§! identités. $building_identity_repository_scaling$"
 building_identity_repository_scaling: "\n\nChaque identité augmente la production et la maintenance du référentiel, réparties entre tous les référentiels d'identité de notre planète.\n"
 building_identity_repository_desc: "L'esprit est numérisé avant que le corps n'expire. Nous sommes en sécurité à l'intérieur et continuons à travailler pour le bien de la société."
 building_abandoned_gene_clinic: "Clinique génétique abandonnée"
 building_abandoned_gene_clinic_tt: "§RDémolition, remplacement et réparation impossibles§!"
 building_abandoned_gene_clinic_desc: "Lorsque nous avons perdu la capacité de procréer naturellement, la communauté médicale a placé ses espoirs dans cette clinique génétique ultramoderne. Comme tant d'autres de nos infrastructures, elle est aujourd'hui vide, rappelant constamment notre situation critique et le besoin urgent de nouvelles solutions."
 #Situation Events
 machine_age.3100.name: "Salut numérique"
 machine_age.3100.desc: "Faute de solution médicale, notre meilleure chance de survie réside dans la numérisation de notre population au sein du §Yréférentiel d'identité§!. Cependant, il s'agit d'une solution palliative, et un plan est déjà en place pour développer des corps synthétiques et un cerveau positronique d'une complexité suffisante. Nous estimons que nous avons suffisamment de temps pour mener à bien ces recherches en concentrant nos efforts.\n\nGrâce à une I.A. de pointe, nos meilleurs experts ont déjà élaboré les plans des corps robotiques, première étape de notre salut synthétique."
 machine_age.3100.a: "Il faut que ça marche"
 machine_age.3110.name: "Ouvriers robotiques"
 machine_age.3110.desc: "Les recherches sur les corps robotiques sont terminées. Nous avons transformé la clinique génétique abandonnée en centre d'assemblage robotique, et de meilleurs prototypes ont été déployés. Bien que ces systèmes rudimentaires n'aient pas la puissance de traitement nécessaire pour abriter la conscience d'un sujet, ils pourront remplacer une partie de notre main-d'oeuvre perdue. Grâce à une liaison positronique, les habitants du monde numérique peuvent ajouter leurs connaissances et leur expérience aux opérations de routine de ces robots afin d'améliorer leurs performances.\n\nDe leur côté, nos systèmes d'I.A. ont mis au point un modèle d'androïde avancé. Les ingénieurs vieillissants sont prêts à travailler."
 machine_age.3110.a: "Une étape a été franchie"
 machine_age.3110.a.tooltip: "[Root.Capital.GetName] :\n- §Y$building_robot_assembly_plant$§! : §G+1§! \n- £pop£§HPops mécaniques§! : §G+300§!"
 machine_age.3115.name: "Maîtrise des droïdes"
 machine_age.3115.desc: "Cette amélioration considérable de notre technologie robotique nous permet de coloniser d'autres planètes et de soutenir notre population mécanisée dans des tâches plus complexes.\n\nSelon nos systèmes d'I.A., la prochaine étape logique consisterait à émuler les réseaux positroniques des corps synthétiques. Grâce à cet ambitieux projet de recherche, nous devrions être en mesure de renvoyer une conscience numérisée dans le monde organique."
 machine_age.3115.a: "Nous ne pouvons pas abandonner maintenant"
 machine_age.3120.name: "Une dernière étape"
 machine_age.3120.desc: "Notre travail acharné a enfin porté ses fruits. Nous avons conçu un cerveau positronique entièrement fonctionnel et suffisamment sophistiqué pour accueillir nos identités.\n\nNous ne pourrons peut-être pas vaincre la mortalité, mais très bientôt, nous ne serons plus soumis aux limites de l'existence biologique."
 machine_age.3120.a: "L'heure de notre réveil synthétique a sonné"
 machine_age.3120.a.tooltip: "Pour avancer dans ces événements, nous devons adopter la §Ytradition synthétique§!."
 machine_age.3125.name: "Le rêve numérique"
 machine_age.3125.both: "Nos centres d'assemblage et nos experts en synthétisation sont prêts à entamer la mission titanesque du transfert des identités dans des cerveaux positroniques et des corps synthétiques."
 machine_age.3125.desc: "$machine_age.3125.both$\n\nNous allons d'abord nous concentrer sur ceux qui sont encore dans le monde physique, afin d'éradiquer la maladie génétique une bonne fois pour toutes. La puissance de calcul améliorée d'un cerveau synthétique nous permet de surmonter nos contraintes biologiques.$synth.105.end$"
 machine_age.3125.nobody.desc: "$machine_age.3125.both$\n\nSans présence physique dans le monde, nous devons rapidement construire notre premier prototype de corps. La puissance de calcul améliorée d'un cerveau synthétique nous permet de surmonter nos contraintes biologiques.$synth.105.end$"
 machine_age.3125.a: "Que le transfert des identités commence"
 machine_age.3125.a.tooltip: "Les pops biologiques restantes vont être transférées dans des corps synthétiques."
 machine_age.3200.name: "Purgatoire numérique"
 machine_age.3200.desc: "Nos pires craintes se sont réalisées.\n\nLe dernier corps physique a succombé. Bien que nos consciences numérisées soient en sécurité dans le référentiel d'identité, nous ne disposons pas de la technologie nécessaire pour transférer nos esprits dans un cerveau artificiel.\n\nTant que nous n'aurons pas achevé nos recherches, nos dirigeants numériques devront interagir avec le monde organique par l'intermédiaire de mandataires robotiques."
 machine_age.3305.name: "Salut virtuel"
 machine_age.3305.desc: "Nous avons réussi à transférer toutes les identités dans de nouvelles coquilles synthétiques ou dans le référentiel d'identité afin de garantir la pérennité de notre peuple.\n\nCependant, un nouveau défi nous attend. L'espace numérique que nous avons créé pour stocker nos identités numériques devait être temporaire, mais les habitants s'y sont habitués et sont maintenant réticents à retourner dans le monde physique.\n\nNous pourrions leur permettre d'y rester, mais nous pouvons aussi les forcer à intégrer de nouveaux corps synthétiques."
 machine_age.3305.a: "Laissons-les profiter du nirvana"
 machine_age.3305.a.tooltip: "Les identités numériques restantes demeureront dans le §Yréférentiel d'identité§! afin de continuer à soutenir nos citoyens de l'intérieur."
 machine_age.3305.b: "Unis, nous sommes plus forts"
 machine_age.3305.b.tooltip: "Nous placerons les identités numériques restantes dans les corps synthétiques qu'il nous reste et fabriquerons de nouveaux corps pour les autres. Le §Yréférentiel d'identité§! sera détruit."
 machine_age.3310.name: "Renaissance synthétique"
 machine_age.3310.desc: "Cela fait des décennies que les [Root.Owner.GetSpeciesNamePlural] n'ont pas tenu un nouveau-né dans leurs bras. Nous ne vivrons peut-être plus jamais une telle expérience, mais aujourd'hui est un jour d'espoir pour notre peuple.\n\nNous avons développé des §Ycentres identitaires§!, des complexes de pointe dans lesquels nous pouvons copier des identités existantes pour créer de nouvelles personnes.\n\nNous pourrions attribuer des traits de personnalité de divers individus au hasard, et les combinaisons pour créer de nouvelles identités seraient infinies. Nous pouvons également imiter le processus organique en faisant pousser des « graines mentales » dans un environnement virtuel ouvert."
 machine_age.3310.a: "Nous mélangerons nos esprits"
 machine_age.3310.building_tooltip.a.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.a.tt$\n§YPermet le bâtiment :§! $building_identity_complex$"
 machine_age.3310.b: "Certains systèmes naturels sont logiques"
