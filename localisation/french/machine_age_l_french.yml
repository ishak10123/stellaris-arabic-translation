 pft_cyber_creed_labor: "$CYBERCREED_labor$"
 pft_cyber_creed_labor_desc: "La Communauté du labeur supervise avec diligence les humbles ouvriers et leurs améliorations. Ils sont motivés par une profonde croyance en la divinité du travail acharné. Seuls ceux qui prennent soin des racines peuvent comprendre le Divin.\n\n§LÉthique spiritualiste.§!"
