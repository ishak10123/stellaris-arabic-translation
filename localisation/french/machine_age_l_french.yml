 pft_cyber_creed_research: "$CYBERCREED_research$"
 pft_cyber_creed_research_desc: "Le Choeur de l'esprit est un collectif de chercheurs et d'ingénieurs proche de la Conscience. Leurs signaux méditatifs servent à partager des informations en temps réel avec les membres de leur croyance.\n\n§LÉthique spiritualiste.§!"
 cyber_creed_research: "$CYBERCREED_research$"
 pft_cyber_creed_general: "Les Croyances unies"
 pft_cyber_creed_general_desc: "Les Croyances unies, guidées par une coalition de technophants saints, ont purgé toute croyance extrémiste. Toutefois, leur dévouement à la fusion sacrée reste inchangé, libéré du passé dogmatique qui cherchait à restreindre leur gloire.\n\n§LÉthique spiritualiste.§!"
