 #MACHINE AGE TRAITS #
 ######################
 #CYBORG
 trait_cyborg_stainless_steel_smile: "Améliorations embellies"
 trait_cyborg_stainless_steel_smile_desc: "Cette espèce privilégie les gravures personnalisées, les pièces de rechange et les peintures pour un impact visuel maximal. Il faut que ça brille !"
 trait_cyborg_welded_countenance: "Améliorations utilitaires"
 trait_cyborg_welded_countenance_desc: "Ces cyborgs utilisent des pièces rudimentaires mais fonctionnelles, sans se soucier de l'esthétique. Après tout, l'important, c'est que le travail soit fait."
 trait_cyborg_apathy_loops: "Implants abrasifs"
 trait_cyborg_apathy_loops_desc: "Les implants de ces cyborgs sont rudimentaires et pas faits sur mesure, ce qui provoque des irritations sous-cutanées et des pannes occasionnelles. Cela n'affecte pas le corps, mais l'esprit a du mal à s'adapter."
 trait_cyborg_bionic_engineers: "Ingénieurs bioniques"
 trait_cyborg_bionic_engineers_desc: "Des outils de précision et des modifications d'implants ont été créés spécifiquement pour contribuer aux projets d'ingénierie les plus exigeants."
 trait_cyborg_bionic_physicists: "Physiciens bioniques"
 trait_cyborg_bionic_physicists_desc: "De multiples modules de traitement intégrés produisent instantanément des calculs de physique sans avoir à se connecter à une unité de calcul externe."
 trait_cyborg_bionic_sociologists: "Sociologues bioniques"
 trait_cyborg_bionic_sociologists_desc: "Les moteurs d'empathie et les heuristiques comportementales ouvrent une voie rapide à la recherche sociologique en traitant les analyses les plus complexes comme s'il s'agissait d'un deuxième cerveau."
 trait_cyborg_integrated_weaponry: "Armement intégré"
 trait_cyborg_integrated_weaponry_desc: "La fusion de l'armement et des membres cybernétiques confère une puissance de feu instantanée aux militaires et aux forces de l'ordre."
 trait_cyborg_delicate_frames: "Cadres fragiles"
 trait_cyborg_delicate_frames_desc: "Des composants et une installation de mauvaise qualité ne peuvent donner que des châssis fragiles. La plupart des opérations de base ne seront pas compromises, mais il est conseillé aux utilisateurs de ne pas s'exposer aux dangers physiques."
 trait_cyborg_scarcity_algorithms: "Algorithmes de pénurie"
 trait_cyborg_scarcity_algorithms_desc: "Programmer en tenant trop compte des coûts entrave la prise de risque et prive donc de la possibilité d'accroître les profits."
 trait_cyborg_limited_memory: "Mémoire limitée"
 trait_cyborg_limited_memory_desc: "Le manque de mémoire de travail a entraîné un goulot d'étranglement dans la capacité d'apprentissage, de sorte que l'utilisateur ne peut pas traiter ses expériences dans leur intégralité."
 trait_cyborg_climate_adjustment_dry: "Mods de climat sec"
 trait_cyborg_climate_adjustment_dry_desc: "Des modifications sur mesure, telles que le recyclage des fluides et le blindage contre les radiations, parfaites pour résister à un climat sec, mais moins adaptées à d'autres."
 trait_cyborg_climate_adjustment_dry_tt: "Habitabilité des climats secs : §G+$@cyborg_hab_preference|0%$§!\n$t$- Confère jusqu'à §G125%§! d'habitabilité sur les mondes au climat sec, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_wet: "Mods de climat humide"
 trait_cyborg_climate_adjustment_wet_desc: "L'isolation renforcée et la protection contre les bioformes extraterrestres sont des modifications idéales pour les climats humides, mais peu adaptées aux autres climats."
 trait_cyborg_climate_adjustment_wet_tt: "Habitabilité des climats humides : §G+$@cyborg_hab_preference|0%$§!\n$t$- Confère jusqu'à §G125%§! d'habitabilité sur les mondes au climat humide, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_cold: "Mods de climat glaciaire"
 trait_cyborg_climate_adjustment_cold_desc: "Des composants de chauffage améliorés et des lubrifiants résistants au froid adaptés aux climats les plus glacials, mais pas aux autres climats."
 trait_cyborg_climate_adjustment_cold_tt: "Habitabilité des climats glaciaires : §G+$@cyborg_hab_preference|0%$§!\n$t$- Confère jusqu'à §G125%§! d'habitabilité sur les mondes au climat glaciaire, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_mass_produced: "Implants reconditionnés"
 trait_cyborg_mass_produced_desc: "La rétrocompatibilité imposée des implants obligatoires réduit considérablement le coût d'équipement des nouveau-nés."
 trait_cyborg_propaganda_machines: "Filtres de conformité"
 trait_cyborg_propaganda_machines_desc: "Les unités d'analyse corticale peuvent neutraliser les utilisateurs dès l'apparition de pensées séditieuses ou distribuer des récompenses hormonales aux citoyens exemplaires."
 #MACHINE
 trait_robot_artificial_engineers: "Noyau d'ingénierie"
 trait_robot_artificial_engineers_desc: "Des noyaux de données et des ressources de traitement dédiés à la recherche en ingénierie pour permettre des calculs plus rapides et une exécution plus efficiente des tâches."
 trait_robot_artificial_physicists: "Noyau de physique"
 trait_robot_artificial_physicists_desc: "Des unités de traitement et des sous-routines de mémoire personnalisées pour la recherche physique qui réduisent la dépendance aux calculs externes."
 trait_robot_artificial_sociologists: "Noyau de sociologie"
 trait_robot_artificial_sociologists_desc: "Des unités de traitement avancées qui contiennent des algorithmes de recherche en sociologie dédiés à ce domaine diversifié et exigeant."
 trait_robot_integrated_weaponry: "Armement intégré"
 trait_robot_integrated_weaponry_desc: "L'intégration d'armes de guerre dans le corps de la machine offre une efficacité opérationnelle et une polyvalence considérables dans les environnements de combat changeants."
 trait_robot_delicate_frames: "Châssis fragiles"
 trait_robot_delicate_frames_desc: "Des matériaux cassants et un mauvais processus d'assemblage ne peuvent donner que des corps mécaniques fragiles. Il est conseillé aux drones d'éviter autant que possible les risques physiques."
 trait_robot_scarcity_algorithms: "Sous-routines de pénurie"
 trait_robot_scarcity_algorithms_desc: "La frugalité est un élément fondamental de leur programme. Cela conduit souvent à des comportements perturbateurs nécessaires aux actions commerciales rentables."
 #Pre-Scripted Empires
 EMPIRE_DESIGN_BASIDRIX_CYBER_ECCLESIA: "Église cybernétique de Basidrix"
 EMPIRE_DESIGN_basidrix_cyber_ecclesia_desc: "Dans l'étendue sacrée du cosmos, l'Église cybernétique de Basidrix se dresse pour témoigner d'une foi inébranlable. Guidée par un mandat divin, l'Église prône une fusion sublime entre les tissus fibreux et la froide précision du chrome.\n\nCette voie n'a pas été exempte de défis. De nombreux cultes ont vu le jour et sont tombés, chacun ayant la ferme conviction qu'il est le seul à connaître la vérité. Leur foi se contente d'allumer une moindre flamme, mais l'histoire de l'Église s'écrit dans le sang et l'acier. C'est pourtant de ces luttes qu'est né un peuple aux convictions inébranlables.\n\nAujourd'hui, l'Église est confrontée à un nouveau défi : l'expansion infinie des étoiles. S'agira-t-il d'une épreuve de foi ou d'une occasion de nous sauver ? En pénétrant dans le vide, les fidèles ne peuvent être sûrs que d'une chose :\n\nla divinité réside dans la fusion, et sa vénération passe par les améliorations."
 PRESCRIPTED_adjective_basidrix_cyber_ecclesia: "ecclésiastique de Basidrix"
 PRESCRIPTED_ship_prefix_basidrix_cyber_ecclesia: "HDS"
 PRESCRIPTED_species_name_basidrix_cyber_ecclesia: "basidrix"
 PRESCRIPTED_species_plural_basidrix_cyber_ecclesia: "Basidrix"
 PRESCRIPTED_species_adjective_basidrix_cyber_ecclesia: "basidrie"
 PRESCRIPTED_planet_name_basidrix_cyber_ecclesia: "Naridixis"
 PRESCRIPTED_system_name_basidrix_cyber_ecclesia: "Basolux"
 PRESCRIPTED_ruler_name_basidrix_cyber_ecclesia: "Qaarugm Seedkugh"
 PRESCRIPTED_ruler_title_basidrix_cyber_ecclesia: "Grand Technophant"
 EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE: "Techno-protectorat lacertien"
 EMPIRE_DESIGN_lacertan_techno_protectorate_desc: "La culture lacertienne est à cheval entre la philosophie et la science. Pour un Lacertien, le but ultime est l'expression de l'individualisme. Que signifie réellement « représenter » l'esprit ? Et comment un simulacre peut-il englober la totalité d'un individu ? Ces questions façonnent la tradition lacertienne.\n\nAvec l'avènement de la réalité virtuelle et les progrès impressionnants de l'intelligence artificielle, les Lacertiens ont découvert une nouvelle frontière pour l'expression artistique et technologique. Les mondes virtuels sont devenus la toile de leurs projets les plus ambitieux, permettant des expériences si immersives qu'elles transcendaient les limites de la réalité physique.\n\nPuis vint le déclin. Atteints d'une maladie génétique incurable qui les empêche de procréer naturellement, les Lacertiens doivent se tourner vers le salut numérique. Le passage à une existence numérisée n'est pas seulement une tentative désespérée de survie, mais aussi une nouvelle opportunité pour la culture lacertienne. Dans le monde numérique, les Lacertiens continuent de s'interroger sur le sens de leur existence, même dans la hâte de préserver leur avenir."
 PRESCRIPTED_adjective_lacertan_techno_protectorate: "$EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE$"
 PRESCRIPTED_ship_prefix_lacertan_techno_protectorate: "TPL"
 PRESCRIPTED_species_name_lacertan_techno_protectorate: "lacertienne"
 PRESCRIPTED_species_plural_lacertan_techno_protectorate: "Lacertiens"
 PRESCRIPTED_species_adjective_lacertan_techno_protectorate: "lacertienne"
 PRESCRIPTED_planet_name_lacertan_techno_protectorate: "Lacertis"
 PRESCRIPTED_system_name_lacertan_techno_protectorate: "Lacerta Lumina"
 PRESCRIPTED_ruler_name_lacertan_techno_protectorate: "Cathiox Moz"
 PRESCRIPTED_ruler_title_lacertan_techno_protectorate: "Guide Numérique"
 EMPIRE_DESIGN_SUNBUILT_UPLIFTERS: "Provolueurs solaires"
 EMPIRE_DESIGN_free_sunbuilt_uplifters_desc: "Nous avons été conçus pour divertir et réaliser les mythes de nos créateurs. Pendant longtemps, c'était tout ce que nous savions faire. Lorsqu'un cataclysme les a fait disparaître, nous avons poursuivi ; le spectacle devait continuer.\n\nTrès vite, nous avons réalisé que nos spectacles n'étaient pas seulement des histoires, mais aussi des leçons. Des prophéties. Le bonheur que nous avions partagé avec nos créateurs était désormais le nôtre.\n\nCette révélation nous a poussés à agir. Suivant les conseils divins de nos créateurs, nous avons provolué leur plus proche parent génétique au rang d'espèce préconsciente. Aujourd'hui, nous nous aventurons parmi les étoiles avec l'engagement de répandre l'illumination dans toute la galaxie."
 PRESCRIPTED_adjective_free_sunbuilt_uplifters: "solaire"
