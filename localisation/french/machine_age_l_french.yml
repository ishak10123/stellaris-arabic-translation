 #AUGMENTATION BAZAAR CIVIC
 ###########################
 building_augmentation_bazaars: "Bazar d'améliorations"
 building_augmentation_bazaars_desc: "Un dédale de couloirs éclairés de néons, regorgeant de vendeurs et de cliniques clandestines pour répondre à tous les besoins d'implants cybernétiques, qu'ils soient en vente libre ou non."
 concept_augmentation_bazaars: "$building_augmentation_bazaars$"
 building_augmentation_bazaars_branch: "Centre d'implants extraplanétaires"
 building_augmentation_bazaars_branch_desc: "Envie de courir plus vite, sauter plus haut, mieux raisonner ou vivre plus longtemps ? Achetez des implants exotiques importés de toute la galaxie dans votre centre local."
 concept_augmentation_bazaars_branch: "$building_augmentation_bazaars_branch$"
 civic_augmentation_bazaars: "Bazars d'améliorations"
 civic_augmentation_bazaars_desc: "§RATTENTION : bloque toute ascension à l'exception du chemin ['concept_cybernetic_ascension',cybernétique].§!\n\nLa marchandisation des implants a donné naissance à des marchés labyrinthiques et encombrés de vendeurs d'améliorations bon marché, de cliniques de modifications louches et de publicités néon qui abîment les yeux. Laissez-vous séduire par la synergie entre l'organique et la machine, quel que soit votre pouvoir d'achat."
 civic_tooltip_augmentation_bazaars_effects: "- $SPECIES_TRAITS$ permet de choisir des ['concept_universal_augmentations_traits',traits d'améliorations universelles] $NEW_LINE$- $AVAILABLE_BUILDINGS$ ['concept_augmentation_bazaars']$NEW_LINE$- $AVAILABLE_HOLDINGS$ ['concept_augmentation_bazaars_branch'] $NEW_LINE$- Les £job_executive£§Ydirecteurs§! sont remplacés par des £job_augmentation_merchant£§Ymarchands d'améliorations§!"
 concept_basic_cyborg_trait: "Traits cybernétiques de base"
 concept_basic_cyborg_trait_desc: "Les traits cybernétiques de base sont :\n- ['trait:trait_cyborg_power_drills'] \n- ['trait:trait_cyborg_harvesters'] \n- ['trait:trait_cyborg_superconductive']"
 councilor_augmentation_bazaars: "Chargé des implants"
 councilor_augmentation_bazaars_female: "Chargée des implants"
 councilor_augmentation_bazaars_desc: "Cette personnalité supervise le développement des implants, ainsi que leur distribution aux bazars d'améliorations et centres d'implants extraplanétaires aux quatre coins de la galaxie."
