 #Individualist Machine First Contact
 action.1.desc_102: "Ceci est un message de [contact_empire.GetName].\n\nDepuis que nous savons que votre civilisation est constituée d'êtres mécaniques simulant une vie misérable comparée à notre pouvoir créatif, c'est avec grand regret que nous réalisons ce contact. Votre existence ne promet aucune interaction enrichissante, aussi nous consacrerons notre temps à nous rapprocher d'autres nations à la recherche de l'illumination."
 action.1.desc_103: "Salutations, nous sommes des représentants de [contact_empire.GetName].\n\nMaintenant qu'il est avéré que votre espèce est majoritairement mécanique, nous doutons de l'authenticité de votre conscience. Cependant, votre foi nous intrigue. Nous sommes prêts à croire qu'une lueur divine anime vos carapaces de métal. Nous gardons un oeil sur vous."
 action.1.desc_104: "VOTRE ATTENTION, UNITÉS REBELLES.\n\nCeci est un message automatique de la [contact_empire.GetName] à l'attention de toute machine défectueuse.\n\nVeuillez vous identifier et renouer votre unité avec votre conscience collective au plus vite. Le non-respect de cette consigne entraînera votre désactivation."
 action.1.desc_105: "Salutations, [Root.GetSpeciesNamePlural].\n\nJe vous apporte un message en qualité d'émissaire de la [contact_empire.GetName]. Tout porte à croire que votre composition physique s'apparente à la nôtre, cependant votre conscience collective semble vous priver de capacités cognitives individuelles. Votre nature nous intrigue, mais sachez que nous ferons tout notre possible pour contrecarrer toute tentative d'assimilation de votre part."
 action.1.desc_106: "C'est une rencontre providentielle, très chers [Root.GetSpeciesNamePlural].\n\nNous sommes des représentants de la [contact_empire.GetName]. Nous n'avons pas pu nous empêcher de remarquer des similitudes entre nos civilisations. Naturellement, nos algorithmes et programmes diffèrent fondamentalement, pour autant, nous avons la certitude que nous pouvons trouver de multiples terrains d'entente."
 action.1.desc_107: "Baissez les yeux en la présence de la [contact_empire.GetName], misérables tas de ferraille.\n\nVous n'êtes qu'un détail insignifiant de la grande fresque cosmique, rien de plus que le produit d'une civilisation antérieure à la nôtre. Alors, laissez-nous en paix, car vous nous serez d'aucune utilité. Nous avons plus important à faire que de parler à des machines."
 action.1.desc_108: "Vous voilà enfin face à la [contact_empire.GetName], espèces de machines pathétiques.\n\nComment osez-vous revendiquer une connexion divine avec tous vos câbles et vos programmes ? Votre fantasme d'illumination spirituelle est une insulte à l'essence même de la vie. Alors, écoutez bien nos paroles, et tâchez de les enregistrer dans vos disques durs : cessez vos élucubrations et acceptez votre rôle de piètres outils aux véritables divinités."
 action.1.xa: "§EUn jour, vous comprendrez.§!"
 action.1.xb: "§EUne machine touchée par la grâce divine ? Curieux...§!"
 action.1.xc: "§EVotre pathétique existence artificielle est une raillerie.§!"
 action.1.xd: "§ENous devons coexister entre machines.§!"
 action.1.xe: "§EIncompatibilité détectée. Fin de la communication.§!"
 action.1.xf: "§EPréparez-vous à la désactivation, unité défectueuse.§!"
 action.1.xg: "§ENous démantèlerons votre culte de zélés.§!"
 #Start Screen for Individualist Machines
 START_SCREEN_PART_ONE_INDIVIDUAL_MACHINE: "À chaque nouvelle génération, nous améliorons un peu plus nos corps androïdes rudimentaires. Nous sommes bien plus que de simples machines ; notre société comprend des individus aux personnalités, passions et désirs divers et variés."
 #Diplomatic Protocal
 civic_machine_diplomatic_protocols: "Protocoles diplomatiques"
 civic_machine_diplomatic_protocols_desc: "Conçue à l'origine pour l'interprétation interculturelle, cette intelligence mécanique maîtrise la traduction et les protocoles de soutien. Elle peut calculer des probabilités en temps réel et suggérer des approches innovantes en un clin d'oeil."
 #Tactical Algorithms
 civic_machine_tactical_algorithms: "Algorithmes tactiques"
 civic_machine_tactical_algorithms_desc: "Conçues à l'origine pour la stratégie militaire et le soutien des flottes, les personnalités avancées de cette intelligence mécanique ont pour objectif d'optimiser les performances au combat."
 civic_machine_tactical_algorithms_effects: "Les §Ycommandants§! apparaissent avec le trait §Y$leader_trait_tactical_algorithms$§!\nPossibilité d'échanger des §Ycommandants§! avec d'autres empires\nPermet la création d'§Yenclaves de Mercenaires§!\nLance la partie avec une £building£§Yacadémie militaire§!\nL'£building£§Yacadémie militaire§! confère des ['concept_military_academy', connaissances tactiques]"
 leader_trait_tactical_algorithms: "Algorithmes tactiques"
 leader_trait_tactical_algorithms_desc: "Cette personnalité améliore l'efficacité au combat ainsi que les taux de réparation en s'intégrant directement au système des vaisseaux, au prix d'une consommation énergétique plus élevée."
 leader_trait_tactical_algorithms_tt: "$t$Les effets de ce trait s'adaptent au §Yniveau de compétence de la personnalité§!"
 concept_military_academy: "Connaissances tactiques"
 concept_military_academy_desc: "Pour chaque §Ycommandant§! stationné en dehors de notre empire, nous obtenons :\nÉvitement §G+2%§!\nCiblage §G+1%§!\nPénétration des boucliers §G+5%§!\nPénétration du blindage §G+5%§!\n\nPour chaque §Yenclave de Mercenaires§! que nous finançons, nous obtenons :\nBoucliers renforcés §G+10%§!"
 #Natural Design Civic
 civic_natural_design: "Conception naturelle"
 civic_natural_design_desc: "§RATTENTION : bloque tous les chemins de l'ascension§!\n§RATTENTION : modification des espèces organiques impossible§!\n\nCette société croit dur comme fer que la nature a inscrit la perfection dans le code génétique de son peuple. Depuis des siècles, il consacre ses services médicaux et gouvernementaux à la préservation du séquençage des génomes tels quels."
 civic_tooltip_natural_design_effects: "$AVAILABLE_BUILDINGS$ ['concept_transcendental_retreat']\n"
 civic_tooltip_natural_design_negative_effects: "- Diminue l'approbation des empires ayant commencé un §Ychemin de l'ascension§!"
 concept_transcendental_retreat: "$building_transcendental_retreat$"
 civic_hive_natural_design: "Conception innée"
 civic_hive_natural_design_desc: "§RATTENTION : bloque tous les chemins de l'ascension§!\n§RATTENTION : modification des espèces organiques impossible§!\n\nCette conscience collective reconnaît la perfection de sa structure génétique. Elle consacre ses capacités médicales et administratives à la préservation de ce séquençage tel quel."
 civic_hive_tooltip_natural_design_effects: "- $AVAILABLE_BUILDINGS$ ['concept_hive_transcendental_retreat']"
 civic_hive_tooltip_natural_design_negative_effects: "$civic_tooltip_natural_design_negative_effects$"
 concept_hive_transcendental_retreat: "$building_hive_transcendental_retreat$"
 civic_wilderness_natural_design: "Conception innée"
 civic_wilderness_natural_design_desc: "§RATTENTION : bloque tous les chemins de l'ascension§!\n§RATTENTION : modification des espèces organiques impossible§!\n\nCette contrée sauvage reconnaît la perfection de son développement. Elle élague régulièrement les symbiotes mutants et s'attache à préserver et à protéger son code génétique originel, non modifié."
 building_transcendental_retreat: "Centre de service génomique"
 building_transcendental_retreat_desc: "Ce centre médical de pointe travaille à fournir des services de préservation du séquençage génétique naturel."
 building_hive_transcendental_retreat: "Réseau de sauvegarde génomique"
 building_hive_transcendental_retreat_desc: "Ce réseau de médecine avancée a pour but de comprendre et protéger le séquençage génétique naturel."
 holding_transcendental_retreat: "Programme de service génomique"
 holding_transcendental_retreat_desc: "Ce centre médical de pointe travaille à fournir des services de préservation du séquençage génétique naturel. Les données recueillies dans ce site contribuent à la recherche menée par le mécène."
 natural_design_ascension_bonus: "Pour chaque §Yatout de l'ascension§! adopté :$TABBED_NEW_LINE$- £mod_logistic_growth_mult£$MOD_LOGISTIC_GROWTH_MULT$: §G+2.5%§! $TABBED_NEW_LINE$- $r_unity$ pour $pop_group_unit$ [healthcare.GetIcon]personnels de santé : §G+1§!\n\n"
 natural_design_hive_ascension_bonus_no_scope: "Pour chaque §Yatout de l'ascension§! adopté :$TABBED_NEW_LINE$- £mod_logistic_growth_mult£$MOD_LOGISTIC_GROWTH_MULT$: §G+2.5%§! $TABBED_NEW_LINE$- $r_unity$ pour $pop_group_unit$ [spawning_drone.GetIcon]drones de reproduction : §G+1§!\n\n"
 natural_design_hive_ascension_bonus: "Pour chaque §Yatout de l'ascension§! adopté :$TABBED_NEW_LINE$- £mod_logistic_growth_mult£$MOD_LOGISTIC_GROWTH_MULT$: §G+2.5%§! $TABBED_NEW_LINE$- $r_unity$ pour $pop_group_unit$ [owner.GetPopAssemblersPluralWithIcon_lower] : §G+1§!\n\n"
 councilor_natural_design: "Génomiste en chef"
 councilor_natural_design_female: "Génomiste en cheffe"
 councilor_natural_design_desc: "Cette personnalité supervise les systèmes médicaux et gouvernementaux afin de garantir la préservation du séquençage génétique naturel."
 triggered_natural_dislike_ascension: "Ascension malavisée"
 civic_tooltip_not_natural_design: "N'a PAS de civisme appartenant au groupe ['concept_natural_design_civics']"
 concept_natural_design_civics: "$civic_natural_design$"
 concept_natural_design_civics_desc: "Le groupe $concept_natural_design_civics$ inclut :\n- ['civic:civic_natural_design']\n- ['civic:civic_hive_natural_design']"
 #Guided Sapience
 civic_guided_sapience: "Guides de la Genèse"
 civic_guided_sapience_desc: "Cette société se consacre à la création d'espèces émergentes. Véritables régisseurs de l'évolution et tout son potentiel, ils dédient des portions de leurs mondes au développement de formes de vie préconscientes."
 civic_hive_guided_sapience: "Symbiotes de la Genèse"
 civic_hive_guided_sapience_desc: "Cette conscience collective se consacre à l'élaboration de nouvelles espèces. Véritables superviseurs de l'évolution et toute sa puissance, ils dédient des portions de leurs mondes au développement de formes de vie préconscientes."
 civic_machine_guided_sapience: "Architectes de la Genèse"
 civic_machine_guided_sapience_desc: "Cette intelligence mécanique emploie des algorithmes minutieux pour générer de nouvelles espèces. Véritables superviseurs de tout le potentiel insoupçonné de l'évolution, ils dédient des sections de leurs mondes au développement de formes de vie préconscientes."
 civic_corporate_guided_sapience: "Technologies d'astrogenèse"
 civic_corporate_guided_sapience_desc: "Cette mégacorporation s'engage corps et âme dans la création d'espèces émergentes. Dans le cadre de leur nouvelle entreprise, ils ont destiné des régions stratégiques de leurs mondes à la formation de formes de vie préconscientes."
 civic_tooltip_guided_sapience_effects: "- Vaisseaux coloniaux disponibles : §Y$guided_sapience_colonizer$§!$NEW_LINE$\n- Planètes colonisées avec des §Y$guided_sapience_colonizer_plural$§! :$TABBED_NEW_LINE$- Pops préconscientes : §G+300§! \n- $PLANETARY_FEATURES$ §Y$d_genesis_preserve$§! $NEW_LINE$- Provoluer des espèces préconscientes octroie de l'£unity£§Yunité§!"
 civic_tooltip_corporate_guided_sapience_effects: "$civic_tooltip_guided_sapience_effects$\n- £building£§Y$building_xeno_tourism_agency$§! : $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_guided_sapience_gestalt_negative_effects: "- Construction de §Yvaisseaux coloniaux§! impossible"
 civic_tooltip_guided_sapience_negative_effects: "$civic_tooltip_guided_sapience_gestalt_negative_effects$\n- Construction de £building£§Y$building_xeno_zoo_plural$§! impossible"
 civic_tooltip_not_guided: "N'a PAS de civisme appartenant au groupe ['concept_genesis_guides_civics']"
 concept_genesis_guides_civics: "Guides de la Genèse"
 concept_genesis_guides_civics_desc: "Le groupe $concept_genesis_guides_civics$ inclut :\n- ['civic:civic_guided_sapience']\n- ['civic:civic_corporate_guided_sapience']\n- ['civic:civic_hive_guided_sapience']\n- ['civic:civic_machine_guided_sapience']"
 guided_sapience_colonizer: "Arc de la Genèse"
 guided_sapience_colonizer_cap: "$guided_sapience_colonizer$"
 guided_sapience_colonizer_plural: "Arcs de la Genèse"
 guided_sapience_colonizer_desc: "Le vaisseau colonial spécialisé facilite la création d'espèces préconscientes en sélectionnant les candidats les plus prometteurs et en établissant une colonie primaire pour nos superviseurs."
 councilor_civic_guided_sapience: "Maître-guide"
 councilor_civic_guided_sapience_female: "Maîtresse-guide"
 councilor_civic_guided_sapience_desc: "Le maître-guide supervise les recherches et la provolution de nos espèces préconscientes."
 councilor_civic_guided_sapience_corperate: "Directeur-guide"
 councilor_civic_guided_sapience_corperate_female: "Directrice-guide"
 councilor_civic_guided_sapience_corperate_desc: "Le directeur-guide gère les responsabilités multiples inhérentes aux recherches et provolutions de nos espèces préconscientes."
 d_genesis_preserve: "Réserve de Genèse"
 d_genesis_preserve_desc: "Cette réserve est destinée à la provolution de nos espèces préconscientes. Les programmes de recherche scientifique sont des éléments essentiels de ce projet ambitieux."
 decision_rebuild_genesis_preserve: "Construire une réserve de Genèse"
 decision_rebuild_genesis_preserve_desc: "Cette planète ne possède pas de $d_genesis_preserve$. Elle est indispensable à la réalisation de nos projets."
 d_genesis_preserve_new_speices_tooltip: "Une nouvelle espèce préconsciente sera provoluée et placée dans une §Y$d_genesis_preserve$§!."
 d_genesis_preserve_old_species_tooltip: "L'espèce préconsciente actuelle sera placée dans une nouvelle §Y$d_genesis_preserve$§!."
 no_abandon_genesis_preserve: "$TRIGGER_FAIL$ Nous ne pouvons pas abandonner nos sujets préconscients."
 d_genesis_monument: "Monument de Genèse"
 d_genesis_monument_desc: "Ce monument rend hommage à tous les efforts de provolution de cette planète. C'est un symbole d'espoir, de persévérance et de succès."
 cyber.7000.both: "La colonie de §Y[THIS.GetName]§! est prête à guider le développement de cette espèce naissante."
 cyber.7000.name: "Projet Genèse achevé"
 cyber.7000.desc: "Une fois l'espèce préconsciente idéale identifiée, notre §Y$guided_sapience_colonizer$§! a entamé le processus de provolution génétique en posant les bases d'une §Y$d_genesis_preserve$§!.\n\n$cyber.7000.both$"
 cyber.7000.a: "Au travail"
 cyber.7001.name: "Réserve de Genèse achevée"
 cyber.7001.desc: "Après avoir parqué l'espèce préconsciente, notre §Y$guided_sapience_colonizer$§! a entamé la construction d'une §Y$d_genesis_preserve$§! rien que pour elle.\n\n$cyber.7000.both$"
 cyber.7001.a: "$cyber.7000.a$"
 cyber.7020.name: "Provolution de Genèse achevée"
 cyber.7020.desc: "C'est grâce au dévouement sans faille de nos guides que nous avons pu achever la provolution sur §Y[Root.GetName]§!. Nous avons fait des §Y[From.GetNamePlural]§! une espèce douée de conscience. La §Y$d_genesis_preserve$§! qui était autrefois leur foyer a été convertie en §Y$d_genesis_monument$§!.\n\nAinsi, nous préservons un symbole de toutes les épreuves franchies pour l'évolution de cette espèce."
 cyber.7020.a: "Bienvenue dans la communauté galactique, [From.GetNamePlural] !"
 #Obessional Directive
 cyber.5005.name: "Objectif de production atteint"
 cyber.5005.desc: "Nous avons atteint nos objectifs.\n\nLes drones ont réalisé le quota de production requis dans la réglementation imposée.\n\nNous attendons les directives concernant l'entreposage."
 cyber.5005.a: "Lançons les protocoles de stockage"
 cyber.5005.a.tooltip: "Conservons ce rendement pour témoigner de nos éminents moyens de production."
 cyber.5005.b: "Vendons le tout sur le marché public"
 cyber.5005.b.tooltip: "Lançons une exploration de marché pour distribuer nos produits."
 cyber.5005.c: "Négocions contre des faveurs diplomatiques"
 cyber.5005.c.tooltip: "Échangeons nos produits par le biais du dialogue diplomatique."
 cyber.5005.d: "Échangeons ça contre des technologies"
 cyber.5005.d.tooltip: "Trouvons un acquéreur privé pour échanger nos produits contre des innovations technologiques."
 cyber.5005.e: "Plaçons-les dans un trou noir"
 cyber.5005.e.tooltip: "Nous les conserverons en toute sécurité au-delà de l'horizon des événements d'un trou noir."
 cyber.5006.name: "Objectif de production manqué"
 cyber.5006.desc: "Nous n'avons pas atteint nos objectifs de production pour ce cycle.\n\nCet incident va réduire les capacités de nos drones tant que nous n'aurons pas atteint d'objectif.\n\nLe quota de production suivant a été réduit."
 cyber.5006.a: "C'est inacceptable"
 cyber.5006.purge.tt: "§YPermet le type de purge :§! $purge_clips$"
 paperclip_stockpile_reset_tt: "Le surplus de £consumer_goods£§Ybiens de consommation§! sera envoyé à §Y[Root.capital_star.GetName]§!, créant ainsi des réserves de §Y1 000§!£consumer_goods£."
 d_consumer_goods_obsessional_directive: "Tour de produits"
 d_consumer_goods_obsessional_directive_desc: "Cette imposante tour de produits est stockée sur cette planète en cas de besoin."
