 machine_age.1100.name: "Le futur de la foi"
 machine_age.1100.desc: "Nous voilà pleinement fusionnés, non seulement dans nos corps et nos âmes, mais aussi dans notre foi. Les croyances dogmatiques n'ont plus de pouvoir ; la fusion divine sera un voyage personnel pour tous les fidèles.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1100.a: "Notre foi est aussi unifiée que notre [Owner.Species.GetFleshTypeCyberCreed] fusionnée"
 machine_age.1100.a.tooltip: "$machine_age.geneswaptooltip$\n$cyber.21.a.end$\n$machine_age.democraticgovtooltip$"
