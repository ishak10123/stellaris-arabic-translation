 mod_planet_neural_chips_society_research_produces_add: "Recherche £society£ pour $pop_group_unit$ £job_neural_chip£puces neurales "
 mod_planet_neural_chips_engineering_research_produces_add: "Recherche £engineering£ pour $pop_group_unit$ £job_neural_chip£puces neurales "
 mod_planet_neural_chips_advanced_logic_produces_add: "£advanced_logic£$advanced_logic$ pour $pop_group_unit$ £job_neural_chip£puces neurales "
 mod_job_neural_chip_add: "Emplois de puces neurales :"
 mod_pc_cosmogenesis_world_max_buildings_add: "Emplacements constructibles supplémentaires "
 SYNAPTIC_LATHE_EFFICENCY_TITLE: "Efficacité"
 SYNAPTIC_LATHE_EFFICENCY_DESC: "§EChaque §Ypuce neurale§! connectée au tour augmente l'efficacité des §Ypuces neurales§! déjà présentes. En réimplantant notre population en grand nombre, nous pouvons considérablement augmenter la production de la structure.§!"
 pop_cat_chip_slave: "Composants de calcul"
 pop_cat_chip_slave_desc: "Ces individus sont utilisés comme puces dans un immense ordinateur. Plongés dans un coma artificiel, les capsules de vie leur assurent une espérance de vie maximale. À terme, l'énorme charge de traitement provoquera la rupture de leurs organes cognitifs."
 pop_cat_chip_slave_plural: "Composants de calcul"
 purge_cosmogenesis: "Surcharge cognitive"
 purge_cosmogenesis_tooltip: "Les pops concernées sont automatiquement réimplantées dans le §Ytour synaptique§! et employées comme puces neurales."
 purge_cosmogenesis_tooltip_delayed: "§LUn rouage de la machine.§!"
 cosmogenesis_world_0: "$pc_cosmogenesis_world$"
 cosmogenesis_world_0_DESC: "Un ordinateur aux dimensions démesurées qui utilise des êtres conscients comme puces de traitement pour générer de la recherche et de la logique avancée, conduisant à leur mort. Son efficacité augmente considérablement au fur et à mesure que le nombre d'unités qui lui sont connectées augmente."
 cosmogenesis_world_0_MEGASTRUCTURE_DETAILS: "Une structure de calcul qui consomme des pops pour générer de la §Yrecherche§! et de la §Ylogique avancée§!."
 cosmogenesis_world_ruined: "$pc_cosmogenesis_world$ en ruine"
 cosmogenesis_world_ruined_DESC: "Les vestiges d'un tour synaptique, ordinateur géant qui utilisait des êtres conscients comme puces pour percer les mystères de l'univers."
 cosmogenesis_world_ruined_MEGASTRUCTURE_DETAILS: "$cosmogenesis_world_ruined_DESC$"
 #Hidden district - not being displayed in the UI.
 district_cosmogenesis_goverment: "$building_lathe_capital$ synaptique"
 district_cosmogenesis_goverment_plural: "Unités de traitement synaptiques"
 district_cosmogenesis_goverment_desc: "$building_lathe_capital_desc$"
 mod_district_cosmogenesis_goverment_max_add: "Nbre max. d'£district£unités de traitement synaptiques "
 district_cosmogenesis_world_science: "Portail neural"
 district_cosmogenesis_world_science_plural: "Portails neuraux"
 district_cosmogenesis_world_science_desc: "Les facultés créatrices d'innombrables individus nous permettent d'effectuer des simulations rapides d'hypothèses avancées. Cette structure complexe de portails logiques et de caches mémoires organiques fournit des résultats d'une précision inégalée."
 district_cosmogenesis_world_logic: "Spéculateur amplificateur"
 district_cosmogenesis_world_logic_plural: "Spéculateurs amplificateurs"
 district_cosmogenesis_world_logic_desc: "Merveille de métaphysique dialectique, ce district utilise les puces neurales pour déterminer la vérité dans les déclarations formelles sur la réalité. Il répond par oui ou par non aux questions les plus complexes jamais formulées par la psyché collective des habitants du tour synaptique."
 tech_lathe_resonator: "$building_lathe_resonator$"
 tech_lathe_resonator_desc: "$building_lathe_resonator_desc$"
 tech_lathe_overclocker: "$building_lathe_overclocker$"
 tech_lathe_overclocker_desc: "$building_lathe_overclocker_desc$"
 tech_lathe_preserver: "$building_lathe_preserver$"
 tech_lathe_preserver_desc: "$building_lathe_preserver_desc$"
 tech_lathe_life_support: "$building_lathe_life_support$"
 tech_lathe_life_support_desc: "$building_lathe_life_support_desc$"
 tech_lathe_cogitator: "$building_lathe_cogitator$"
 tech_lathe_cogitator_desc: "$building_lathe_cogitator_desc$"
 tech_lathe_validator: "$building_lathe_validator$"
 tech_lathe_validator_desc: "$building_lathe_validator_desc$"
 building_lathe_capital: "Unité de traitement"
 building_lathe_capital_desc: "La nature quantique des unités de traitement du tour synaptique lui permet de paralléliser le calcul sur plusieurs couches dimensionnelles."
 building_lathe_major_capital: "Unité de traitement parallélisée"
 building_lathe_major_capital_desc: "Cette unité de traitement améliorée est désormais plus à même d'exécuter des opérations parallèles en faisant rebondir les échos cognitifs des puces neurales dans des poches de l'espace gamma."
 building_lathe_super_capital: "Unité de traitement vectorielle"
 building_lathe_super_capital_desc: "Cette unité de traitement améliorée rationalise les calculs en créant des vecteurs dans l'espace négatif. Cette compartimentation dimensionnelle des traitements donne des résultats extraordinaires autant en efficacité qu'en stabilité."
 building_lathe_resonator: "Résonateur synaptique"
 building_lathe_resonator_desc: "Les résonateurs exploitent et redirigent le potentiel cognitif des pensées parasites et des systèmes autonomes, ce qui permet à chaque puce d'accroître l'efficacité de ses voisins les plus proches."
 lathe_resonator_tt: "Production des £job_neural_chip£§Ypuces neurales§! : §G+1%§! par £job_neural_chip£§Ypuce neurale§!\n(Valeur actuelle : §G+[num_neural_chips]%§!)"
 building_lathe_stabilisator: "Stabilisateur neural"
 building_lathe_stabilisator_desc: "Les systèmes de stabilisation filtrent le bruit informatique généré par la détresse physique des puces neurales. La réduction des interférences se traduit par une augmentation de la production globale."
 building_lathe_overclocker: "Surcadenceur synaptique"
 building_lathe_overclocker_desc: "Le tour a été conçu pour préserver les puces neurales qui y sont connectées, afin d'assurer leur productivité sur le long terme. Le surcadenceur peut passer outre ces instructions pour une production accrue et plus rapide, mais cela s'accompagne d'un taux d'échec plus élevé."
 building_lathe_preserver: "Remédiateur synaptique"
 building_lathe_preserver_desc: "Les composants organiques du réseau sont particulièrement vulnérables aux fluctuations énergétiques, qui peuvent entraîner une dégénérescence axonale rapide. Le remédiateur s'efforce de réduire ces fluctuations afin de protéger les éléments les plus fragiles du tour synaptique."
 building_lathe_reactor: "Réacteur étendu"
 building_lathe_reactor_desc: "Plus il y a de puces connectées au réseau, plus il faut d'énergie pour le maintenir. L'installation de réacteurs supplémentaires permet d'atténuer la logistique complexe inhérente à l'alimentation du tour synaptique."
 building_lathe_life_support: "Mainteneur synaptique"
 building_lathe_life_support_desc: "La maintenance des composants critiques du tour est assurée par une structure dédiée, nous permettant de prendre en charge un plus grand nombre de puces et de garantir un réseau plus sain."
 building_lathe_cogitator: "Méditateur synaptique"
 building_lathe_cogitator_desc: "Le calcul des chaînes d'approvisionnement hyperspatiales est complexe. La réorientation d'une partie de la puissance de traitement aidera même la plus grande flotte à pénétrer davantage en territoire ennemi."
 building_lathe_cogitator_tt: "§YCapacité navale§! : §G+1%§! par £job_neural_chip£§Ypuce neurale§!\n(Valeur actuelle : §G+[num_neural_chips]%§!)\n§YGain d'expérience des vaisseaux§! : §G+2%§! par £job_neural_chip£§Ypuce neurale§!\n(Valeur actuelle : §G+[num_neural_chips_double]%§!)"
 building_lathe_validator: "Validateur synaptique"
 building_lathe_validator_desc: "Si l'objectif premier des fonctionnalités du validateur est d'aider à formuler des thèses sur l'infini, elles peuvent également être appliquées à des aspects plus généraux de l'informatique."
 building_lathe_validator_tt: "$mod_category_computing_research_speed_mult$: §G+1%§! par £job_neural_chip£§Ypuce neurale§!\n(Valeur actuelle : §G+[num_neural_chips]%§!)"
 ### Synaptic Lathe UI
 SYNAPTIC_LATHE_STABILITY_DESC: "§ELa stabilité mesure la stabilité générale du réseau du tour synaptique. Elle dépend pour l'essentiel du £happiness£§Ybonheur§! des puces neurales.\n\nElle se dégradera si certaines conditions sont réunies, telles que la £housing£§Rsurpopulation§! et le §Rmanque de £amenities£services§!. Un monde stable bénéficie d'avantages en termes de production de ressources, tandis qu'un monde instable souffre de pénalités. Contrairement aux autres colonies, le tour synaptique ne peut jamais subir de véritable §Yrévolte§!.§!"
 SYNAPTIC_LATHE_RESISTANCE_DESC: "§ELa £crime£§Yrésistance§! mesure le niveau général des problèmes causés par les puces neurales rebelles. Un niveau de résistance élevé accélère le §Ydéclin des pops§! et augmente leurs chances de s'échapper. Elle apparaît de façon naturelle lorsque le monde a une population importante, et peut être réduite en augmentant le £happiness£§Ybonheur des pops§! ou en construisant des £building£§Ystabilisateurs neuraux§!.§!"
 SYNAPTIC_LATHE_HOUSING_DESC: "§ELes £housing£§Ylogements§! représentent les infrastructures qui hébergent les puces neurales. Le manque d'espace pour les accueillir ou les entretenir correctement réduira la £stability£§Ystabilité§!. Vous pouvez augmenter le nombre de §Ylogements§! en construisant davantage de £district£§Ydistricts§!, en améliorant l'§Yunité de traitement§! du tour ou en construisant des £building£§Ymainteneurs synaptiques§!.§!"
 SYNAPTIC_LATHE_AMENITIES_DESC: "§ELes §Yservices§! représentent les infrastructures dédiées à la satisfaction des besoins vitaux des puces neurales. Un monde qui ne produit pas suffisamment de services pour sa population subit des pénalités de £happiness£§Ybonheur§!. Vous pouvez augmenter les §Yservices§! en améliorant l'§Yunité de traitement§! du tour ou en construisant des £building£§Ymainteneurs synaptiques§!.§!"
 SYNAPTIC_LATHE_RESISTANCE_TITLE: "Résistance"
 POP_BASE_RESISTANCE: "Résistance de base : $VALUE|2Y$"
 TOOLTIP_RESISTANCE: "Résistance : £crime£$VALUE|Y1$"
 lathe_cant_colossus: "Utilisation impossible sur un §Ytour synaptique§!"
