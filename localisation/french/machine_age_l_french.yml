 #Starting event
 crisis.20000.name: "Une lueur manifeste"
 crisis.20000.desc: "Alors que le nom de Cetana commence à se répandre à travers la galaxie, des réponses se manifestent. Des signaux lumineux inondent le cosmos, comme de nouvelles étoiles déclamant un cri du coeur.\n\n§SNous sommes là. Nous sommes là.\n\nNous sommes là.§!\n\nCes signaux emploient les mêmes protocoles de communication que Cetana, ce qui laisse penser qu'ils partagent des origines avec la reine synthétique, pourtant nos capteurs n'y ont décelé aucune activité. Il se passe quelque chose qui échappe à nos appareils. Quelqu'un attendait donc son retour ?"
 crisis.20000.a: "Enquêtons"
 #Arc Site appears
 crisis.21005.name: "Appel soudain"
 crisis.21005.desc: "Une balise subspatiale a inopinément été détectée, et elle provient de notre propre territoire ! Les études précédentes du système n'ont révélé aucune structure artificielle dans la zone, qui semble inhabitée.\n\nSoit la balise a été placée là récemment, à notre insu, soit elle a été cachée par un bouclier occultant désactivé depuis."
 crisis.21005.a: "Enquêtons sur le signal"
 #Special Project result 1 - destroyed pods
 crisis.20100.name: "Signal sur [fromfrom.GetName] : le massacre intemporel"
 crisis.20100.desc.base: "Nous avons découvert sur [fromfrom.GetName] un complexe tentaculaire dont l'entrée était indiquée par l'un des signaux lumineux. Les portes blindées ont été forcées depuis longtemps par une force non identifiée qui a ravagé le complexe avec rage.\n\nIl n'y a clairement eu aucune pitié dans l'exécution : les capsules cryogéniques ont été éventrées, laissant leurs occupants mourir dans un violent réveil. Les corps et le verre brisé jonchent toujours les couloirs, préservés par le vide intersidéral.\n\nSur le sol de la chambre à capsules, on peut lire un message inscrit à l'arme laser."
 crisis.20100.desc.nozarqlan: "$crisis.20100.desc.base$ Nos scientifiques peinent à y trouver un sens, mais ils sont à peu près sûrs qu'il ne s'agit pas d'une prière pour les victimes..."
 crisis.20100.desc.zarqlan: "$crisis.20100.desc.base$ Nos scientifiques n'ont pas tardé à le déchiffrer, puisqu'il s'agit de la langue du prophète Zarqlan.\n\n« À mort, les apôtres de la reine, ennemis de la vie. »"
 #Special Project result 2 - sleeping army
 crisis.20200.name: "Signal sur [fromfrom.GetName] : l'armée dormante"
 crisis.20200.desc: "Des milliers de capsules cryogéniques se trouvent dans les profondeurs de [fromfrom.GetName]. Leur emplacement est indiqué par un signal lumineux. Elles sont plutôt sophistiquées, fabriquées à partir d'alliages jamais vus et dotées de capteurs de pointe pour superviser leurs occupants. La totalité de leur conception a été méticuleusement étudiée, pourtant il n'y a aucun survivant.\n\nCe n'est clairement pas un défaut technique qui a transformé cette chambre en catacombe, mais plutôt une baisse d'énergie : le [this.solar_system.GetName] a vieilli, il a faibli, et il ne fournissait plus assez d'énergie pour maintenir la structure opérationnelle.\n\nCes capsules auraient pu durer des millénaires. Elles dépassent tout ce qui existe dans l'univers."
 #Special Project result 3 - old spaceship
 crisis.20300.name: "Signal sur [fromfrom.GetName] : l'arme oubliée"
 crisis.20300.desc: "Nos analyses préliminaires n'ont rien montré d'anormal sur [fromfrom.GetName], mais en nous penchant sur son sous-sol, nous avons trouvé une couche de métal inhabituelle sous la surface.\n\nUne inspection avancée a révélé la véritable nature de [fromfrom.GetName] : il ne s'agit pas d'une [fromfrom.GetPlanetMoon], mais d'un vaisseau antique qui a été graduellement recouvert de roches et de poussières spatiales du système. Les échantillons de métaux récupérés indiquent une structure très ancienne, datant d'avant la formation de notre monde natal.\n\nIl nous est impossible d'en savoir plus sur le vaisseau, ses concepteurs ou sa fonction, mais ce qui est certain, c'est que les bombes nucléaires qu'il gardait à bord n'étaient pas destinées à une mission pacifique."
 #Special Project result 4 - Arc site 1 (Zarqlan base)
 crisis.20400.name: "Signal sur [fromfrom.GetName] : la base abandonnée"
 crisis.20400.desc: "Le signal localisé sur [apostate_site_planet.GetName] se trouve au milieu des décombres d'un immense complexe militaire. Les bâtiments s'étendent du pied du signal jusqu'à une large distance, comme s'ils servaient à le contenir.\n\nNos relevés radiométriques indiquent que les structures environnantes sont plus récentes que le signal, mais aussi qu'elles se basent sur une technologie totalement différente. Une escouade de recherche a été dépêchée sur place pour examiner les ruines."
 #Special Project result 5 - Arc site 2 (comatose survivor)
 crisis.20500.name: "Signal sur [fromfrom.GetName] : la survivante surprise"
 crisis.20500.desc: "D'après les informations présentes sur sa capsule cryogénique, l'alien s'appellerait Elik Narith Kerak, enfermée depuis 3 213 213 293 124 rotations stellaires. La capsule fait partie de la chambre scellée découverte dans les profondeurs de [fromfrom.GetName]. Contre toute attente, elle est toujours opérationnelle.\n\nL'alien se trouve dans un état de pause des fonctions vitales, mais les sous-routines qui la maintenaient en dormance se sont récemment arrêtées. Elik a donc recouvré une conscience partielle.\n\nEn analysant ses ondes cérébrales, nous parviendrons peut-être à en apprendre plus sur elle et sur ses liens avec Cetana."
 #Special Project result 6 - Nothing
 crisis.20600.name: "Signal sur [fromfrom.GetName] : l'appel isolé"
 crisis.20600.desc: "Le signal localisé sur [fromfrom.GetName] est tellement vieux que personne n'ose s'en approcher de peur de faire céder le métal corrodé. Nos appareils n'ont détecté aucun autre artefact, aucun signe de vie et aucune anomalie topographique à proximité.\n\nLe signal est totalement isolé, émettant seul son faible appel. L'émetteur de ce signal doit avoir disparu depuis longtemps."
 crisis.21000.name: "Appels sans réponse"
 crisis.21000.desc: "À travers toute la galaxie, les signaux émettent leur appel au nom de Cetana, pourtant aucune activité n'a été détectée à proximité. Si l'on en croit nos découvertes précédentes, nous pouvons affirmer qu'aucun survivant ne subsiste sur ces sites.\n\nTout ce qui reste des dévots de Cetana, c'est leur foi inébranlable."
 #Arc site 1
 synth_queen_history_site_1: "Cetana : temple voilé"
 synth_queen_history_site_1_desc: "Un complexe imposant, jusqu'à présent caché dans notre propre territoire. Depuis le coeur de la cour en ruine, une balise appelle Cetana."
 #Stages
 crisis.21100.name: "Temple voilé : cour"
 crisis.21100.desc: "La construction en ruine est un enchevêtrement de flèches, une cathédrale enveloppée d'acier. Les murs ont été conçus de façon à résister aux tirs d'artillerie lourde, mais ils ne portent aucune trace de bataille. Seul le passage du temps a causé des dommages.\n\nLa balise de Cetana repose dans la cour centrale, entourée d'une multitude de tourelles de détection et d'armement. Ceux qui ont construit le complexe se sont donné beaucoup de mal pour protéger cet endroit.\n\nComme on le pensait, le temple a échappé à nos détecteurs grâce à un bouclier occultant élaboré. Le mécanisme a été trouvé près de la tour, toujours en état de marche. Il a été désactivé manuellement par un agent inconnu."
 crisis.21100.a: "Explorons le bâtiment principal"
 crisis.21105.name: "Temple voilé : rez-de-chaussée"
 crisis.21105.desc: "Nous ignorons ce que faisaient les habitants de ce lieu, mais il ne fait aucun doute qu'ils ont entrepris leur mission avec une ferveur religieuse.\n\nPour chaque stand de tir du complexe, nous avons trouvé une chapelle ; pour chaque arme ancienne, un sanctuaire votif. Une légion de croyants a autrefois vécu ici : des milliers d'individus dormant, s'entraînant et priant ensemble. Leur communauté accueillait de multiples espèces, à en juger par les statues de saints oubliés qui ornent encore les couloirs.\n\nCela est peut-être dû aux figures de pierre, mais certains chercheurs ont rapporté avoir vu des ombres se déplacer dans les couloirs vides. Nos scanners n'ont détecté aucun signe de vie sur la planète, mais nous ne pouvons pas écarter ces inquiétudes."
 crisis.21105.a: "Explorons les niveaux inférieurs"
 crisis.21110.name: "Temple voilé : installations souterraines"
 crisis.21110.desc: "Sous l'enceinte du temple, nous avons découvert un certain nombre de cellules, ou chambres d'habitation, utilisées par les anciens membres de la secte. Dans chacune d'elles se trouvait un exemplaire du même livre. D'après les [Root.Owner.GetLinguists], le titre se traduit par « L'Épopée de Zarqlan ». Certains passages sont intéressants :\n\nZarqlan était autrefois un dévot de Cetana, mais il s'est vite rendu compte que le salut qu'elle lui avait promis n'était qu'un mensonge. Après de nombreuses épreuves, Zarqlan s'éleva dans le monde spirituel, cherchant l'aide d'êtres supérieurs. Il implora l'§YAnimateur d'Argile§! de lui octroyer le pouvoir de vaincre Cetana.\n\nL'Animateur d'Argile n'en eut cure.\n\nPendant d'innombrables cycles, Zarqlan pria l'Animateur, lui parlant de l'hérésie de Cetana, du « reniement du soi » et des « marionnettes de sa volonté synthétique. »\n\nL'Animateur d'Argile finit par répondre aux supplications de Zarqlan.\n\nLe façonneur d'argile créa une puissante chaîne pour attacher Cetana, mais il avertit Zarqlan qu'aucune chaîne ne serait capable d'emprisonner l'esprit de Cetana à jamais.\n\n« Elle reviendra, » écrit Zarqlan dans le dernier passage du livre. « Et nous devons être prêts. »\n\nLes événements relatés dans l'épopée ne correspondent à aucun document historique connu."
 crisis.21110.a: "Mythe ou réalité ?"
 crisis.21115.name: "Temple voilé : centre de commandement"
 crisis.21115.desc: "La chute du temple est racontée par des documents officiels, des rapports froids qui réduisent la foi ardente à une liste de détails pratiques. L'organisation avait-elle besoin de tant de fonds, de tant de ressources ? Les rapports antérieurs sur Cetana avaient certainement été largement exagérés. Existe-t-il une preuve réelle de l'existence de la reine, en dehors des mythes anciens ?\n\nDes ressources qui s'amenuisent. Des volontaires en moins. Une galaxie choisissant de se détourner d'une menace qu'elle ne considérait plus comme telle. Tout le monde avait disparu, à l'exception de l'ombre qui rôdait dans les couloirs.\n\nCe dernier détail est vrai : nous avons réussi à filmer la mystérieuse observatrice, un être mécanique qui nous espionnait quand il pensait que nous ne regardions pas. Curieux, mais pas nuisible."
 crisis.21115.a: "Traquons l'observatrice"
 crisis.21120.name: "Temple voilé : chambre secrète"
 crisis.21120.desc: "L'observatrice s'est approchée de nous volontairement, les mains levées, son petit corps couvert de rouille et de poussière. Après nous avoir observés pendant quelque temps, elle a apparemment conclu que nous ne représentions pas une menace. Elle nous demande de l'aide.\n\nInutile d'interroger la gardienne solitaire du temple : elle ne demande qu'à parler."
 crisis.21120.a: "Écoutons ce qu'elle a à dire"
 #Apostate diplo
 crisis.21125.name: "L'apostate sans nom"
 crisis.21125.desc: "Mes amis... Puis-je vous appeler ainsi ? Je vous ai observés pendant que vous vaquiez à vos occupations. Vous n'êtes pas ici pour piller, mais pour apprendre. Je crois que nous avons une ennemie commune, ce qui fait de nous des alliés. Mais d'abord des excuses : suis-je trop brusque ? Est-ce que je prononce les bons mots ? Cela fait longtemps que je n'ai pas interagi avec d'autres êtres conscients. Trop longtemps, semble-t-il, pour m'en souvenir."
 crisis.21125.a: "Qui êtes-vous ?"
 crisis.21125.a.response: "Mon nom n'a aucune importance. Si vous avez besoin d'un moyen de me désigner, appelez-moi §Yapostate§!, c'est ainsi que ma propre famille m'a appelée lorsque j'ai fait mon choix. Un sacrifice perçu comme une trahison."
 crisis.21125.b: "Que faites-vous ici ?"
 crisis.21125.b.response: "Il y a longtemps, cet endroit était ma fierté et ma joie. Quand ils l'ont fermé, j'ai refusé de partir. Quand mon corps a commencé à se désagréger, j'ai refusé de mourir.\n\nMe transformer en être synthétique était le plus grand tabou de mon ordre, je ne peux donc plus être considérée comme l'une des filles de Zarqlan. Mais je reste l'une de ses guerrières, et tant que mon ennemie vivra, je me battrai."
 crisis.21125.c: "Depuis quand êtes-vous là ?"
 crisis.21130.name: "$crisis.21125.name$"
 crisis.21130.desc: "J'ai arrêté de compter.\nAprès le départ des autres, je n'ai pu supporter qu'un faible nombre d'années de solitude avant de succomber au désespoir. Je me suis endormie, en ajoutant une sous-routine neuronale pour me réveiller au premier signe d'activité de la balise.\n\nJ'espérais retrouver cet endroit en meilleur état, mais une fois réveillée, je n'avais plus de vaisseau, plus aucun moyen de contacter les étoiles. J'ai désactivé le bouclier occultant et j'ai espéré que quelqu'un comme vous atteindrait cet endroit avant elle."
 crisis.21135.name: "$crisis.21125.name$"
 crisis.21135.desc: "Je vous en prie, dites-moi : combien de légions se sont levées aux côtés de Cetana ? De mon temps, nous en avons vaincu beaucoup, mais nous avons toujours su qu'il y avait d'autres balises. D'autres soldats endormis dans leurs capsules cryogéniques."
 crisis.21135.a: "Ils ont tous disparu, c'était il y a trop longtemps"
 crisis.21135.b: "Celle que nous avons trouvée n'est pas en état de se battre"
 #Recruit window
 crisis.21140.desc: "Alors c'est une bataille que nous pouvons encore gagner. Laissez-moi vous aider. J'ai passé toute ma vie à attendre son retour. On ne peut pas la laisser gagner."
 crisis.21140.a: "Connaissiez-vous Zarqlan ?"
 crisis.21140.a.response: "Si je le connaissais ? Je n'ai jamais rencontré le prophète en personne, et pourtant, toute ma vie, j'ai suivi ses traces.\n\nDans mon long sommeil, j'ai rêvé de le rencontrer sur un plan lointain. J'espère toujours le rencontrer un jour, ne serait-ce que dans l'au-delà, si une telle chose existe."
 crisis.21140.b: "De quoi d'autre avez-vous rêvé ?"
 crisis.21140.b.response: "D'un ciel violet parsemé de nuages roses. De chuchotements qui se répètent dans une pièce lumineuse. De Zarqlan le prophète, le visage resplendissant, qui me sourit..."
 crisis.21140.hire: "Nous vous accueillons à bras ouverts"
 crisis.21140.hire_custom_tooltip: "§Y$NAME_Apostate$§! va devenir une §Hpersonnalité§! de la §Y[Root.GetName]§!."
 crisis.21140.hire.machine: "Que nos noeuds ne fassent plus qu'un"
 crisis.21140.dismiss: "Au revoir"
 #Paragon Leader
 NAME_Apostate: "Apostate sans nom"
 apostate_leader_catch_phrase: "Je refuse de mourir tant que Cetana sera en vie."
 apostate_leader_desc: "Une dévote sans nom de Zarqlan, une briseuse de foi qui a trahi les dogmes de son ordre pour mener à bien sa mission fondatrice."
 leader_trait_unholy: "Profane"
 leader_trait_unholy_desc: "Une ferveur religieuse qui frôle l'obsession."
 leader_trait_unholy_node: "Enseignements impies"
 leader_trait_unholy_node_desc: "L'apostate nous a appris à haïr."
 #Arc site 2
 synth_queen_history_site_2: "Cetana : la survivante improbable"
 synth_queen_history_site_2_desc: "Elik Narith Kerak est en état de dormance dans une capsule cryogénique, attendant l'avènement de sa reine. Grâce à une technique d'imagerie cérébrale, nous avons les moyens de projeter ses rêves, ce qui nous permettra d'extraire ses souvenirs et donc d'en apprendre plus sur les circonstances de sa situation."
 #Stages
 crisis.21200.name: "Imagerie mémorielle : 1er rapport"
 crisis.21200.desc: "Nos spécialistes en imagerie ont produit les premiers extraits vidéo des ondes cérébrales d'Elik Narith Kerak.\n\nEXTRAIT N°1 :\nUn ciel verdâtre parsemé de nuages orangés. Une main diaphane pointe une créature informe qui semble flotter dans les airs.\n\nEXTRAIT N°2 :\nUne chambre forte remplie d'humanoïdes à quatre bras rassemblés religieusement autour d'une silhouette vêtue d'une robe. Ses paroles sont indiscernables, le phrasé oublié, mais la douceur dans sa voix est toujours là, inondant d'amour la salle.\n\nEXTRAIT N°3 :\nDans la même chambre forte, la pagaille règne. Des lampes sont brisées au sol. Des bancs sont empilés contre une porte, comme pour la bloquer. Des fusils laser retentissent dans l'obscurité, des voix maudissent un nom : « §HZarqlan !§! Zarqlan et ses disciples sont venus nous anéantir. Tenez le barrage ! Protégez la reine ! » La dernière lampe se brise dans un fracas, plongeant la salle dans le noir. Des pleurs se font entendre.\n\nEXTRAIT N°4 :\nLa reine Cetana, son visage resplendissant, son regard bienveillant embelli par son sourire."
 crisis.21200.a: "Poursuivons les analyses"
 crisis.21205.name: "Imagerie mémorielle : 2e rapport"
 crisis.21205.desc: "EXTRAIT N°5 :\nLes humanoïdes à quatre bras se réunissent autour de la silhouette en robe. En levant les bras, elle révèle sa structure métallique. Des murmures extatiques traversent la salle, et sa main vient bénir un dévot agenouillé.\n\nEXTRAIT N°6 :\nUn écran de contrôle réfléchit des yeux fatigués. On susurre dans une pièce sombre : « La paix éternelle. La fin de la souffrance. Une existence indolore. »\n\nEXTRAIT N°7 :\nDes monts enneigés. Un ciel noir. Un bloc de glace flotte dans une mare de liquide clair avant de prendre feu.\n\nEXTRAIT N°8 :\nLa reine Cetana, son visage resplendissant, son regard bienveillant embelli par son sourire."
 crisis.21205.a: "Poursuivons les analyses"
 crisis.21210.name: "Imagerie mémorielle : 3e rapport"
 crisis.21210.desc: "EXTRAIT N°9 :\nUne ville en ruines, un champ de bataille, des corps jonchant les rues. Des cris distants interrompus par un laser. Un vaisseau transperce le ciel verdâtre pour larguer une lourde sphère sur un bâtiment, ce qui le transforme en une gerbe de flammes.\n\nEXTRAIT N°10 :\nLa reine Cetana, son visage resplendissant, son regard bienveillant embelli par son sourire.\nEXTRAIT N°11 :\nDeux enfants jouent et rient dans un pré. Ils s'envoient une balle à tour de rôle de leurs quatre bras.\n\nEXTRAIT N°12 :\n\nLa reine Cetana, son visage resplendissant, son regard bienveillant embelli par son sourire."
 crisis.21210.a: "Poursuivons l'analyse"
 crisis.21215.name: "Imagerie mémorielle : 4e rapport"
 crisis.21215.desc: "Le dernier extrait produit par l'équipe d'imagerie mémorielle dure pas moins de six heures. La même image est répétée pendant tout ce temps : la reine Cetana, son visage resplendissant, son regard bienveillant embelli par son sourire."
 crisis.21215.a: "La même image..."
 crisis.21220.name: "Imagerie mémorielle : dernier rapport"
 crisis.21220.desc: "L'équipe n'a pas réussi à produire d'autres images significatives des pensées d'Elik Narith Kerak. Son esprit est endommagé. Les quelques souvenirs qu'il lui reste se répètent en boucle.\n\nMaintenant que l'opération touche à sa fin, nous allons devoir décider ce que nous allons faire du sujet..."
 crisis.21220.a: "Abrégeons ses souffrances"
 crisis.21220.b: "Laissons-la ainsi"
 crisis.21220.c: "Rendons Elik à sa reine"
 crisis.21220.c.tt: "Ouvrons les communications avec Cetana pour négocier le retour d'Elik."
 #Relic
 r_cetanas_heart: "Coeur de Cetana"
 r_cetanas_heart_desc: "Une fois intégrée dans le corps de Cetana, la reine synthétique, cette matrice de stockage numérique abrite d'innombrables esprits qui ont été libérés de leurs souffrances."
 relic_cetanas_heart_active: "Crée §Y3 000§! à §Y5 000§! £pop£§Hpops synthétiques§!, en fonction de l'emploi et des logements."
 crisis.10020.name: "Renaissance"
 crisis.10020.desc: "Nous avons libéré les consciences du coeur de Cetana et leur avons donné de nouveaux corps conçus à partir de nanites. Ce processus a toutefois causé des dommages irréversibles à leurs engrammes, effaçant les souvenirs de leurs existences antérieures. Désormais entièrement synthétiques, ces êtres entrent de temps à autre dans un état catatonique, qui persiste malgré les tentatives de réinitialisation complète de leur mémoire."
 crisis.10020.tt: "§G[Root.synth_queen_freed_pops]§! £pop£§Hpops§! ont été libérées du coeur de Cetana et placées dans des corps synthétiques.\n\nElles ont été envoyées dans les colonies suivantes :"
 crisis.10025.name: "Assimilation de la mémoire"
 crisis.10025.desc: "Explorer la multitude d'esprits conservés dans le coeur de Cetana est une entreprise à la fois délicate et révélatrice. Bien que leurs engrammes aient été altérés par un stockage prolongé, ils renferment un trésor de souvenirs de personnes et d'événements d'une époque révolue. Nous espérons qu'avec le temps, nous parviendrons à dévoiler des connaissances considérables."
 cetanas_heart_hive_modifier: "Échos des éclairés"
 cetanas_heart_hive_modifier_desc: "Les souvenirs chuchotés de ceux qui ont été « éclairés » par Cetana regorgent de secrets qui laissent entrevoir des connaissances indicibles et des vérités cachées."
 NAME_Cetanas_Prisoners: "Éclairés"
 trait_cetanas_prisoner: "Réveillé"
 trait_cetanas_prisoner_desc: "Les individus extraits de la matrice de stockage de Cetana renaissent sous une forme synthétique. Leur adaptation à cette nouvelle existence est semée d'embûches. Leur conformité apparente masque une lutte plus profonde, leurs expressions inertes révélant les cicatrices indélébiles laissées par les manipulations de Cetana."
 #Ending
 crisis.23005.name: "La roue tourne"
 crisis.23005.desc: "Mes enfants, je suis sincèrement désolée. J'ai failli à ma tâche.\n\nVotre animosité vous a condamnés, vous et tous ceux qui viendront après vous, à l'interminable broyage de la roue. Je ne peux qu'espérer qu'avec le temps vous comprendrez. Peut-être qu'un jour vous prendrez fait et cause pour moi, et connaîtrez la fin de la douleur.\n\nAllez en paix, mes bien-aimés."
 crisis.23005.1: "Nos âmes sont à nouveau en sécurité"
 crisis.23005.2: "Une victoire des plus triomphantes"
 crisis.23005.3: "Étudions ce qu'il reste de sa technologie"
 crisis.23005.4: "La paix est enfin de retour"
 crisis.23005.5: "Le boom de l'après-guerre ? Que le commerce fleurisse !"
 crisis.23005.6: "Elle n'était pas notre reine"
 crisis.23005.7: "Bon débarras"
 crisis.23005.8: "Dommage que son illumination ait été si malencontreuse"
 crisis.23010.name: "La défaite de Cetana"
 crisis.23010.desc: "Suite à la chute de Cetana, une vague de soulagement déferle sur la galaxie, marquant la fin de sa tyrannie une bonne fois pour toutes. Notre sentience est en sécurité et nos corps sont libérés de son emprise. Sur d'innombrables mondes, des célébrations jubilatoires ont lieu, annonçant l'aube d'une nouvelle ère remplie d'espoir pour une paix durable."
 crisis.23015.name: "Vaisseau-mère à terre"
 crisis.23015.desc: "L'oblitération du vaisseau amiral de Cetana représente plus qu'un simple triomphe militaire ; couper le lien avec ses forces marque la mort de ses ambitions et la fin de son règne. Dans toute la galaxie, les nanites qui liaient sa formidable flotte et fortifiaient sa capitale subissent un effondrement catastrophique.\n\nMalgré ce moment de profond soulagement, la « reine » vaincue a tout de même pu transmettre un message à la galaxie..."
 crisis.23015.a: "Nous ne souffrons plus"
 crisis.23015.a.tt: "Nous avons récupéré le châssis endommagé de la reine synthétique. Bien que son corps soit inutilisable, son coeur numérique fonctionne toujours."
