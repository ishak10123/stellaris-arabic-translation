 #Approaches
 situation_synth_queen_balanced_approach: "Observation équilibrée"
 situation_synth_queen_balanced_approach_tooltip: "Étant donné les diverses variables en compte, mieux vaut conserver notre stabilité et une façade ordinaire."
 situation_synth_queen_research_approach: "Hausse de recherches"
 situation_synth_queen_research_approach_tooltip: "Si nous voulons découvrir les plans de Cetana, nous devons dégager les ressources nécessaires."
 situation_synth_queen_spy_approach: "Hausse d'espionnage"
 situation_synth_queen_spy_approach_tooltip: "Pour connaître le projet de Cetana, il faut prioriser l'espionnage."
 situation_synth_queen_military_approach: "Hausse militaire"
 situation_synth_queen_military_approach_tooltip: "C'est en améliorant notre armée que nous parviendrons à stopper Cetana."
 #Modifiers
 queenslayer: "Les faiblesses de Cetana"
 queenslayer_desc: "Cetana est puissante mais pas invincible. Elle opère selon des schémas complexes que nous pouvons déchiffrer et prédire."
 queenexecutioner: "Le fléau de la reine synthétique"
 queenexecutioner_desc: "Nous avons découvert la plupart des secrets de la technologie de Cetana et sommes prêts à porter un coup dévastateur à ses projets."
 mod_damage_vs_country_type_awakened_synth_queen_mult: "Dégâts infligés à Cetana, la reine synthétique "
 #Player Facing Situation Events
 crisis.8999.name: "Le retour de la reine"
 crisis.8999.desc: "Le programme de Cetana est tout bonnement alarmant, et ses actes dissimulent une intention cachée.\n\nNous devons percer à jour ses véritables objectifs en assignant des ressources à des domaines précis, en espérant qu'elle ne le prenne pas comme une provocation."
 crisis.8999.a: "Arriverons-nous seulement à l'arrêter ?"
 crisis.8999.a.tooltip: "L'apparition soudaine de Cetana est une situation unique qu'il faut régler."
 crisis.9000.name: "Interruption des communications"
 crisis.9000.desc: "Nous avons découvert la fréquence utilisée par les convois et les stations de Cetana pour lancer des appels de détresse.\n\nEn faisant preuve de rapidité et d'efficacité, nous pouvons lancer des assauts sans qu'elle ne sache que nous en sommes à l'origine. Mais notre victoire doit être certaine, ou nous risquons de nous attirer l'ire de Cetana."
 crisis.9000.a: "Que renferment ces convois ?"
 crisis.9000.a.tooltip: "Les victoires contre les convois et les avant-postes de Cetana ne déclenchent plus de pénalités d'opinion avec Cetana."
 crisis.9010.name: "Percée"
 crisis.9010.desc: "Jusqu'à présent, la technologie de Cetana l'a aidée à contrer tous nos assauts. Cependant, de récentes avancées nous ont permis de mieux comprendre la manière dont elle se protège. En possession de ces connaissances, nous avons peut-être une chance de la vaincre.\n\nLa révélation de cette nouvelle technologie est une arme à double tranchant : si elle nous permet d'entrer en conflit ouvert avec la reine, elle met aussi à nu notre opposition à ses plans."
 crisis.9010.a: "Nous devons nous préparer, tout repose là-dessus"
 crisis.9010.a.tooltip: "L'affrontement contre Cetana est inévitable : tout acte de transgression, de notre part ou la sienne, révélera la vérité au grand jour et nous plongera dans une guerre totale."
