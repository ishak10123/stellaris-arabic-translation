l_french:
 #Gestalt trait names and desc
 leader_trait_fallible_hive: "Faillible"
 leader_trait_fallible_hive_desc: "Ces [GetIndividualNamePlural] souffrent d'un comportement erratique qui pourrait poser des problèmes à l'avenir."
 leader_trait_fallible_machine: "Défectueux"
 leader_trait_fallible_machine_desc: "Cette unité souffre de bugs qui pourraient causer des problèmes à l'avenir."
 leader_trait_stubborn_machine: "Programmation rigide"
 leader_trait_stubborn_machine_desc: "La programmation de cette unité est particulièrement rigide, ne permettant que des modifications comportementales mineures."
 leader_trait_stubborn_hive: "Interface rigide"
 leader_trait_stubborn_hive_desc: "Ces [owner.GetIndividualNamePlural] sont particulièrement raides dans leur manière de penser et refusent toute modification comportementale."
 leader_trait_destructive_hive_desc: "Ces [owner.GetIndividualNamePlural] ignorent tout entretien de routine de leur matériel, ce qui conduit à de nombreux dysfonctionnements."
 leader_trait_destructive_machine_desc: "Cette unité n'effectue pas la maintenance de routine indispensable au fonctionnement de son matériel, ce qui provoque chez elle de nombreux dysfonctionnements."
 leader_trait_lavish_lifestyle_hive: "Coûteux"
 leader_trait_lavish_lifestyle_hive_desc: "Le comportement erratique de ces [owner.GetIndividualNamePlural] les rend hautement inefficaces."
 leader_trait_lavish_lifestyle_machine: "$leader_trait_lavish_lifestyle_hive$"
 leader_trait_lavish_lifestyle_machine_desc: "La programmation défectueuse de cette unité la rend hautement inefficace."
 leader_trait_tyrannical_hive: "Rationneur"
 leader_trait_tyrannical_hive_desc: "Ce noeud accorde une bien trop grande priorité au rationnement des ressources."
 leader_trait_tyrannical_machine: "$leader_trait_tyrannical_hive$"
 leader_trait_tyrannical_machine_desc: "Cette unité accorde une bien trop grande priorité au rationnement des ressources."
 leader_trait_righteous_hive: "Incorruptible"
 leader_trait_righteous_hive_desc: "Ces [owner.GetIndividualNamePlural] sont insensibles à toute corruption, ce qui limite les risques de déviance au sein de la [owner.GetGestaltEntityName]."
 leader_trait_righteous_machine: "Routines de mise à jour"
 leader_trait_righteous_machine_desc: "Cette unité contrôle fréquemment la bonne installation des mises à jour sur les autres."
 leader_trait_embezzler_hive: "Pertes énergétiques"
 leader_trait_embezzler_hive_desc: "Ces [owner.GetIndividualNamePlural] ont une irrégularité physiologique qui provoque une consommation excessive d'énergie."
 leader_trait_embezzler_machine: "$leader_trait_embezzler_hive$"
 leader_trait_embezzler_machine_desc: "Cette unité subit un défaut système qui lui fait consommer une quantité d'énergie inhabituellement importante."
 leader_trait_gullible_hive: "Fuite de données"
 leader_trait_gullible_hive_desc: "La nature trop confiante de ce noeud cause de graves failles de sécurité."
 leader_trait_gullible_machine: "$leader_trait_gullible_hive$"
 leader_trait_gullible_machine_desc: "Le système d'exploitation de ce noeud a une faille de sécurité."
 leader_trait_bureaucratic_hive: "Interruptions de communication"
 leader_trait_bureaucratic_hive_desc: "Ce noeud subit des interruptions de communication lorsqu'il fusionne la conscience et les [owner.GetIndividualNamePlural] unitaires."
 leader_trait_bureaucratic_machine: "Erreurs de transmission"
 leader_trait_bureaucratic_machine_desc: "Ce noeud est victime d'erreurs de transmission lors des communications avec les drones individuels."
 leader_trait_micromanager_hive: "Désynchronisé"
 leader_trait_micromanager_hive_desc: "Ces [owner.GetIndividualNamePlural] sont inefficaces pour synchroniser les manoeuvres de flotte trop complexes."
 leader_trait_micromanager_machine: "$leader_trait_micromanager_hive$"
 leader_trait_micromanager_machine_desc: "Cette unité est inefficace pour synchroniser les manoeuvres de flotte trop complexes."
 leader_trait_reckless_hive: "Mauvais calculs"
 leader_trait_reckless_hive_desc: "Ces [owner.GetIndividualNamePlural] calculent mal les risques, continuant de combattre lorsque la logique basique serait de se retirer, de réparer et de regrouper les forces du collectif."
 leader_trait_reckless_machine: "Erreurs de calcul des risques"
 leader_trait_reckless_machine_desc: "Cette unité calcule mal les risques, continuant de combattre lorsque la logique basique voudrait qu'il se retire, répare et regroupe les forces du collectif."
 leader_trait_slipshod_hive: "Défenses affaiblies"
 leader_trait_slipshod_hive_desc: "Ces [owner.GetIndividualNamePlural] ont développé un comportement de combat erratique et inefficace qui affaiblit les capacités défensives de la flotte."
 leader_trait_slipshod_machine: "$leader_trait_slipshod_hive$"
 leader_trait_slipshod_machine_desc: "Cette unité a développé une programmation de combat erratique et inefficace qui affaiblit les capacités défensives de la flotte."
 leader_trait_slothful_hive: "Tactiques inflexibles"
 leader_trait_slothful_hive_desc: "Le comportement trop irrégulier et peu réactif de ces [owner.GetIndividualNamePlural] met nos troupes dans des situations inutilement dangereuses."
 leader_trait_slothful_machine: "Algorithmes de combat non réactifs"
 leader_trait_slothful_machine_desc: "Les algorithmes de combat de cette unité sont défectueux, mettant nos troupes mécanisées au sol dans des situations inutilement dangereuses."
 leader_trait_victory_or_death_hive: "Jusqu'au-boutiste"
 leader_trait_victory_or_death_hive_desc: "Ces [owner.GetIndividualNamePlural] n'accordent aucune considération à la survie, préférant combattre jusqu'au dernier moment."
 leader_trait_victory_or_death_machine: "Protocole de désengagement défectueux"
 leader_trait_victory_or_death_machine_desc: "Le protocole de désengagement de cette unité est défectueux, ce qui la conduit à combattre jusqu'au bout."
 leader_trait_disorganized_hive: "Insuffisances logistiques"
 leader_trait_disorganized_hive_desc: "Le comportement confus de ces [owner.GetIndividualNamePlural] leur fait transmettre des commandements logistiques peu clairs."
 leader_trait_disorganized_machine: "Erreur logistique"
 leader_trait_disorganized_machine_desc: "La sous-routine de traitement logistique de cette unité est défectueuse, ce qui accroît le coût des armées."
 leader_trait_paranoid_hive: "Commandements cachés"
 leader_trait_paranoid_hive_desc: "Ce noeud met en place des schémas de transmission de l'information compliqués, ce qui retarde les recherches."
 leader_trait_paranoid_machine: "Paramétrage de sécurité trop élevé"
 leader_trait_paranoid_machine_desc: "Cette unité met en place des schémas compliqués pour préserver la sécurité de l'information, ce qui retarde les recherches."
 leader_trait_narrow_minded_hive: "Fermé"
 leader_trait_narrow_minded_hive_desc: "Ces [owner.GetIndividualNamePlural] se concentrent uniquement sur leurs missions de recherche, considérant toute autre option comme dispensable."
 leader_trait_narrow_minded_machine: "Erreur processeur"
 leader_trait_narrow_minded_machine_desc: "Les fonctions centrales des processeurs de cette unité sont isolées les unes des autres, ce qui entraîne une prise de décision très rigide."
 leader_trait_neurotic_hive: "Exploration erratique"
 leader_trait_neurotic_hive_desc: "Ces [owner.GetIndividualNamePlural] ont un tempérament erratique et distrait."
 leader_trait_neurotic_machine: "Protocoles de reconnaissance défaillants"
 leader_trait_neurotic_machine_desc: "Le protocole de reconnaissance de cette unité produit des résultats souvent aléatoires."
 leader_trait_opinionated_hive: "Synapses incompatibles"
 leader_trait_opinionated_hive_desc: "Certaines synapses de ces [owner.GetIndividualNamePlural] ont muté, rendant complexes chez eux la compilation et la synthèse des connaissances."
 leader_trait_opinionated_machine: "Données incompatibles"
 leader_trait_opinionated_machine_desc: "Cette unité compile les données de façon inefficace."
 leader_trait_profligate_hive: "Entretien coûteux"
 leader_trait_profligate_hive_desc: "Ces [owner.GetIndividualNamePlural] ont une déficience accroissant le coût d'entretien des autres [owner.GetIndividualNamePlural] de leur monde."
 leader_trait_profligate_machine: "Maintenance coûteuse"
 leader_trait_profligate_machine_desc: "La programmation de cette unité fait une erreur constante accroissant le coût d'entretien de toutes les unités de son monde."
 leader_trait_procrastinator_hive: "Constructions ralenties"
 leader_trait_procrastinator_hive_desc: "Ces [owner.GetIndividualNamePlural] sont inefficaces pour gérer les projets de construction planétaires."
 leader_trait_procrastinator_machine: "$leader_trait_procrastinator_hive$"
 leader_trait_procrastinator_machine_desc: "Cette unité est inefficace pour gérer les projets de construction planétaires."
 leader_trait_insider_trading_hive: "Production inefficiente"
 leader_trait_insider_trading_hive_desc: "Ces [owner.GetIndividualNamePlural] sont inefficaces pour gérer les [owner.GetIndividualNamePlural] de leur monde."
 leader_trait_insider_trading_machine: "$leader_trait_insider_trading_hive$"
 leader_trait_insider_trading_machine_desc: "Cette unité est inefficace pour gérer les drones de son monde."
 leader_trait_eager_machine: "Performant"
 leader_trait_eager_machine_desc: "Cette unité est en parfait état de marche, nécessitant des coûts de maintenance bien moindres pour être opérationnelle."
 leader_trait_eager_hive: "Spécimens de premier choix"
 leader_trait_eager_hive_desc: "Ces [owner.GetIndividualNamePlural] jouissent d'une superbe santé, nécessitant bien moins de soins pour être efficaces."
 leader_trait_martinet_hive: "Exigeant"
 leader_trait_martinet_hive_desc: "Observateurs avisés exigeant une conformité stricte, ces [owner.GetIndividualNamePlural] ont d'excellents résultats lorsqu'il s'agit de limiter toute forme de déviance."
