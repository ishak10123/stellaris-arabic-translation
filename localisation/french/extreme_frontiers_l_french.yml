l_french:
 #############
 # Anomalies #
 #############
 EXTREME_FRONTIERS_TITLE: "Extreme Frontiers" # Do not translate
 # PULSATING OBJECT
 PULSATING_OBJECT_TOXIC_CAT: "Objet pulsant"
 PULSATING_OBJECT_GAS_GIANT_CAT: "Objet pulsant"
 PULSATING_OBJECT_BARREN_CAT: "Objet pulsant"
 PULSATING_OBJECT_BARREN_COLD_CAT: "Objet pulsant"
 PULSATING_OBJECT_FROZEN_CAT: "Objet pulsant"
 PULSATING_OBJECT_MOLTEN_CAT: "Objet pulsant"
 anomaly_pulsating_object_desc: "Les analyses préliminaires de §Y[this.GetName]§! ont permis de découvrir un étrange objet volant dans la troposphère, dont la taille varie lorsqu'il se déplace. Une étude plus approfondie est nécessaire afin de l'identifier."
 extreme_frontiers.100.title: "Ballon météorologique antique"
 extreme_frontiers.100.desc: "§Y[Root.Leader.GetName]§! a conclu que le mystérieux objet volant sur §Y[from.GetName]§! était un ballon météorologique archaïque. Toutes les marques qui auraient pu permettre de déterminer son origine ont depuis longtemps été effacées par les conditions atmosphériques extrêmes de la planète.\n\nLa radiométrie indique qu'il est présent dans l'atmosphère de [from.GetName] depuis plus d'un siècle, sa taille fluctuant au gré des variations de pression idiosyncrasiques de la planète.\n\nPar miracle, ses panneaux solaires fonctionnent toujours et son réseau de capteurs contient désormais un siècle de précieuses données atmosphériques qui seront très utiles à nos [Root.Owner.GetResearchers]."
 # MOLTEN METAL OCEAN
 MOLTEN_METAL_OCEAN_CAT: "Courants de lave extrêmes"
 anomaly_molten_metal_ocean_desc: "Les premières études de la surface de §Y[from.GetName]§! ont permis de détecter de fréquents tsunamis de lave contenant de fortes concentrations de métaux lourds. Des analyses plus poussées seront nécessaires pour bien comprendre ce phénomène."
 extreme_frontiers.110.title: "Tsunamis métalliques"
 extreme_frontiers.110.desc: "§Y[Root.Leader.GetName]§! a confirmé que les océans de lave sur §Y[from.GetName]§! contiennent des formes exceptionnellement pures de presque tous les métalloïdes rares recensés dans notre répertoire des éléments.\n\nCette concentration de métaux liquides donne lieu à des champs électromagnétiques très volatils, provoquant la formation fréquente de tsunamis de métaux en fusion.\n\nGrâce à la modélisation prédictive, nous avons identifié des accalmies brèves mais régulières, dont nous pouvons tirer parti pour exploiter ces gisements incroyablement riches."
 # GREAT BLUE SPOTS
 GREAT_BLUE_SPOTS_CAT: "Grandes taches bleues"
 great_blue_spots_desc: "La surface de §Y[from.GetName]§! présente deux décolorations distinctives, suffisamment vastes pour être visibles depuis l'espace et se déplaçant en tandem à grande vitesse. Ces formations de couleur bleue méritent une étude approfondie."
 extreme_frontiers.120.title: "Super tempêtes symbiotiques"
 extreme_frontiers.120.desc: "Les grandes taches bleues sur §Y[from.GetName]§! sont en fait une paire de super tempêtes symbiotiques : un cyclone et un anticyclone qui se maintiennent mutuellement dans un parfait équilibre.\n\nLes tempêtes sont énormes et les vents franchissent régulièrement le mur du son, créant de puissants bangs supersoniques. Leur couleur distinctive est due aux grandes quantités de poussière de cobalt qu'elles contiennent.\n\n§Y[Root.Leader.GetName]§! estime qu'elles font rage sans discontinuer depuis plus d'un siècle. Les minéraux accumulés dans la haute atmosphère devraient être facilement récupérables avec une station minière."
 # FROZEN INFERNO
 FROZEN_INFERNO_CAT: "Pics de chaleur"
 frozen_inferno_desc: "Les analyses préliminaires de §Y[from.GetName]§! révèlent des pics de chaleur très aléatoires sur ce corps céleste par ailleurs gelé. Ces températures anormales nécessitent un examen plus approfondi."
 extreme_frontiers.130.title: "Brasier gelé"
 extreme_frontiers.130.desc: "§Y[Root.Leader.GetName]§! a terminé son étude des pics de chaleur aléatoires sur le monde gelé de §Y[from.GetName]§!.\n\nDes gisements pyrophoriques hautement réactifs sont enfouis sous la toundra de la planète. Initialement inertes sous la glace, ces substances remontent ponctuellement à la surface à mesure que les calottes glaciaires continentales dérivent et se détachent.\n\nEn dégelant, ces gaz ultra-flammables sont susceptibles de s'enflammer dans l'atmosphère riche en oxygène de [from.GetName], provoquant de fréquents incendies à sa surface.\n\nAvec l'équipement adéquat, nous pourrions les extraire pour les utiliser ailleurs."
 # POISONED ATMOSPHERE
 POISONED_ATMOSPHERE_CAT: "Atmosphère toxique"
 poisoned_atmosphere_desc: "De fortes concentrations de molécules organiques toxiques ont été détectées dans la haute atmosphère de §Y[from.GetName]§!."
 extreme_frontiers.140.title: "Atmosphère toxique"
 extreme_frontiers.140.desc.hive_mind: "§Y[from.GetName]§! abrite une étonnante espèce de lichen qui expulse des molécules ultra-toxiques dans l'atmosphère afin de se protéger des prédateurs.\n\nL'étude des archives fossiles montre que [from.GetName] abritait autrefois une faune diversifiée, mais que le lichen, augmentant progressivement la concentration d'arsenic et de thallium dans l'atmosphère, a entraîné la disparition de la plupart des espèces qui n'ont pas pu s'adapter.\n\n§Y[Root.Leader.GetName]§! a découvert qu'un seul autre organisme vivant, une espèce de grands reptiloïdes, est parvenu à survivre dans de telles conditions grâce à une glande de détoxication particulièrement efficace.\n\nUne étude plus approfondie de cet organe singulier pourrait fournir de précieuses informations sur la détoxication de l'atmosphère."
 extreme_frontiers.140.desc.default: "$extreme_frontiers.140.desc.hive_mind$ En outre, les premières expériences indiquent que les composés uniques des poisons pourraient être utilisés dans l'industrie cosmétique."
 extreme_frontiers.140.a: "Comme c'est intéressant..."
 extreme_frontiers.140.b: "Faisons-en du parfum"
 DETOXIFICATION_GLAND_PROJECT: "Recherche sur les glandes de détoxication"
 DETOXIFICATION_GLAND_PROJECT_DESC: "Une étonnante espèce de reptiloïdes vit dans l'atmosphère toxique de §Y[from.GetName]§! grâce à un organe interne unique qui transforme les puissantes toxines en nutriments utiles. Une étude plus approfondie de cet organisme mériterait d'être menée."
 extreme_frontiers.145.title: "Connaissance de la détoxication"
 extreme_frontiers.145.desc: "Grâce à des recherches intensives sur les glandes de détoxication des reptiloïdes vivant sur §Y[from.GetName]§!, §Y[Root.Leader.GetName]§! a percé les secrets biologiques de leur incroyable résistance aux poisons de la planète.\n\nLeur organe complexe produit des composés qui neutralisent l'atmosphère toxique, empêchant les toxines d'être absorbées par leur système circulatoire. Cette glande est d'ailleurs si adaptative qu'elle est capable de neutraliser les poisons les plus mortels fabriqués dans nos laboratoires.\n\nCes découvertes remarquables vont complètement changer notre approche de la détoxication atmosphérique."
 # GLIMPSE OF THE CORE
 GLIMPSE_CORE_CAT: "Aperçu du noyau"
 glimpse_the_core_desc: "D'étranges mouvements dans l'enveloppe gazeuse de §Y[from.GetName]§! provoquent l'ouverture d'évents exceptionnellement profonds, exposant le noyau solide de la planète à de brefs intervalles. Ce phénomène remarquable doit faire l'objet d'une étude plus approfondie."
 extreme_frontiers.150.title: "Noyau organique"
 extreme_frontiers.150.desc: "En envoyant une sonde dans l'un des évents temporaires sur §Y[from.GetName]§!, §Y[Root.Leader.GetName]§! a découvert que le noyau de la planète abrite une espèce d'organismes unicellulaires unique en son genre.\n\nCes cellules robustes semblent parfaitement adaptées à la vie sous pression extrême, leur reproduction saisonnière libérant des quantités considérables d'hydrogène. [Root.Leader.GetName] en a conclu qu'elles jouaient un rôle important dans le maintien de l'enveloppe gazeuse de la planète.\n\nLeur extermination entraînerait la disparition de l'enveloppe, qui laisserait derrière elle une planète rocheuse colonisable."
 extreme_frontiers.150.a: "Exterminons-les"
 extreme_frontiers.150.b: "Une opportunité d'observation des plus précieuses"
 PURIFY_CORE_PROJECT: "Purification du noyau"
 PURIFY_CORE_PROJECT_DESC: "L'enveloppe gazeuse de §Y[from.GetName]§! est due à la biochimie unique des organismes unicellulaires qui vivent dans son noyau. Les exterminer entraînerait la disparition des gaz et rendrait cette planète rocheuse colonisable."
 extreme_frontiers.155.title: "Un nouveau monde"
 extreme_frontiers.155.desc: "§Y[Root.Leader.GetName]§! a envoyé une sonde armée dans l'un des évents à la surface de §Y[from.From.GetName]§!. Une fois dans le noyau, elle a libéré une charge toxique qui a infecté et éradiqué ses organismes unicellulaires indigènes.\n\nL'enveloppe gazeuse de [from.From.GetName] s'est peu à peu dissipée dans le vide, laissant derrière elle une petite planète rocheuse."
 extreme_frontiers.155.a: "Une prouesse remarquable"
 # OPTICAL PHENOMENA
 OPTICAL_PHENOMENA_CAT: "Surface miroitante"
 optical_phenomena_desc: "Nos scans d'imagerie de §Y[from.GetName]§! montrent un phénomène optique très coloré à la surface de la planète. Étant donné que nous observons à distance orbitale, leur cause n'est pas claire."
 extreme_frontiers.160.title: "Glace iridescente"
 extreme_frontiers.160.desc.default: "Une observation rapprochée de la surface de §Y[from.GetName]§! a révélé la cause du phénomène optique constaté lors de nos relevés orbitaux.\n\nLes conditions atmosphériques de la planète ont poli une grande partie de son pergélisol jusqu'à le rendre transparent, révélant de profonds réseaux de cristaux multicolores cachés sous la surface. Ce phénomène naturel crée un effet kaléidoscopique lorsqu'observé de loin."
 extreme_frontiers.160.desc.machine: "$extreme_frontiers.160.desc.default$\n\nN'importe qui serait fasciné par sa beauté, mais notre attention se porte sur les riches gisements minéraux qui se trouvent en dessous."
 extreme_frontiers.160.tooltip: "Donne accès à la §Ydécision planétaire§! §H$decision_prismatic_ice_exhibit$§! :\n£amenities£$MOD_PLANET_AMENITIES_MULT$: §G+25%§!\n$mod_planet_jobs_unity_produces_mult$: §G+25%§!"
 decision_prismatic_ice_exhibit: "Exposition de glace prismatique"
 decision_prismatic_ice_exhibit_desc: "Plaques de glace cristalline qui produisent un effet kaléidoscopique envoûtant et peuvent être exposées pendant une durée limitée."
 prismatic_ice_max_3_times_pass: "Ne peut être fait plus de §Y3§! fois."
 prismatic_ice_max_3_times_fail: "$TRIGGER_FAIL$ Ne peut être fait plus de §Y3§! fois."
 prismatic_ice_max_3_times_pass_with_var: "$TRIGGER_PASS$$prismatic_ice_max_3_times_pass$ (actuellement : §Y[owner.prismatic_ice_exhibit_happened]§!)"
 exhibiting_prismatic_ice: "Exposition de glace prismatique"
 exhibiting_prismatic_ice_desc: "Plaques de glace cristalline qui produisent un effet kaléidoscopique envoûtant et peuvent être exposées pendant une durée limitée."
 # PLASMA VOLCANOES
 PLASMA_VOLCANO_CAT: "Plasma orbital"
 plasma_volcano_desc: "Nous avons constaté des jets de plasma extrêmement chaud et instable dans la haute atmosphère de §Y[from.GetName]§!.\n\nEn raison de la densité des cendres volcaniques dans l'atmosphère, la source du plasma ne peut pas être identifiée avec précision depuis l'orbite. Toutefois, enquêter de plus près pourrait être dangereux."
 extreme_frontiers.170.title: "Volcans de plasma"
 extreme_frontiers.170.desc: "§Y[Root.Leader.GetName]§! a découvert la cause des éruptions de plasma surchauffé sur §Y[from.GetName]§!.\n\nLe champ magnétique unique de la planète favorise les réactions entre les matériaux ionisés de son manteau, formant des chambres volcaniques de plasma à haute pression.\n\nLorsque les plaques tectoniques instables cèdent, le plasma est violemment propulsé vers le haut, enflammant les gaz atmosphériques et déclenchant des explosions en chaîne. Nos experts en armement souhaitent appliquer ces principes à nos armes à base de plasma."
 extreme_frontiers.170.desc.negative: "Malheureusement, en raison des dangers de cette recherche, [Root.Leader.GetName] a subi de graves"
 extreme_frontiers.170.desc.traumatized: "$extreme_frontiers.170.desc.negative$ traumatismes psychologiques."
 extreme_frontiers.170.desc.maimed: "$extreme_frontiers.170.desc.negative$ blessures physiques."
 # BLACK CLOUDS
 BLACK_CLOUDS_CAT: "Nuages noirs"
 black_clouds_desc: "D'épais nuages noirs se déplaçant de manière irrégulière, indépendamment de la vitesse ou de la direction du vent, ont été observés dans l'atmosphère de §Y[from.GetName]§!. Ils ne sont capturés que brièvement par nos scans d'imagerie, toujours au même moment du cycle jour-nuit de la planète."
 extreme_frontiers.180.title: "Essaims d'insectoïdes"
 extreme_frontiers.180.desc: "Les étranges nuages noirs sur §Y[from.GetName]§! s'avèrent être des essaims de gros insectes carnivores.\n\nCes prédateurs ailés vivent dans les fissures des rochers, dont ils sortent une fois par jour pour se nourrir du peu de matières organiques qui se trouve à la surface de la planète.\n\nLeur puissant métabolisme inverse la décomposition cellulaire, ce qui leur permet de vivre indéfiniment tant qu'ils absorbent régulièrement des nutriments."
 extreme_frontiers.180.desc.altered_metabolism: "Un spécimen a mordu la [Leader.Species.GetHandName] de [Leader.GetName] qui travaillait sur le terrain, ce qui a déclenché une réponse métabolique surprenante. Cette espèce inhabituelle a beaucoup à nous apprendre sur les capacités de régénération des cellules organiques."
 extreme_frontiers.180.b: "Faisons-les sortir de là pour les manger"
 leader_trait_altered_metabolism: "Métabolisme modifié"
 leader_trait_altered_metabolism_desc: "L'exposition à des substances étrangères lors de son travail sur le terrain a eu un impact à long terme sur cette personnalité."
 # SUBGLACIAL VIBRATIONS
 SUBGLACIAL_VIBRATIONS_CAT: "Vibrations sous-glaciaires"
 subglacial_vibrations_desc: "Sous la surface gelée et sans vie de §Y[from.GetName]§! se trouve un vaste océan sous-glaciaire. Des vibrations sourdes et profondes, mais non sismiques, ont été détectées sous le pergélisol."
 extreme_frontiers.190.title: "Pinnipèdes géants"
 extreme_frontiers.190.desc: "En combinant l'écholocalisation sous-marine et la télémétrie sismique, nous avons pu identifier la source des vibrations sur §Y[from.GetName]§!. Son océan sous-glaciaire d'azote liquide abrite des hordes de pinnipèdes géants qui se sont adaptés à ces conditions extrêmes.\n\nCes étonnantes créatures ont la taille et la masse d'un petit vaisseau de transport et communiquent en émettant des grondements à basse fréquence suffisamment puissants pour se réverbérer sur toute la planète. Leur couche de graisse riche en collagène les protège des brûlures cryogéniques et des engelures, tout en amplifiant leurs cris à travers l'océan.\n\nVivant dans cet écosystème isolé sans prédateurs naturels, ces grandes créatures sont curieuses, très dociles et peuvent être facilement attirées à la surface en imitant leurs vocalisations idiosyncrasiques."
 extreme_frontiers.190.a: "Voilà une découverte inédite !"
 extreme_frontiers.190.a.tt: "Permet le bâtiment ['building:building_pinniped_sanctuary']"
 extreme_frontiers.190.b: "Ce sont des proies faciles"
 building_pinniped_sanctuary: "Sanctuaire des pinnipèdes"
 building_pinniped_sanctuary_desc: "Un sanctuaire pour les pinnipèdes géants capturés dans les océans d'azote liquide de [event_target:pinnipeds_home_planet.GetName]."
 # ELECTRIC WATERS
 ELECTRIC_WATERS_CAT: "Eaux électriques"
 electric_waters_desc: "Les balayages orbitaux de §Y[from.GetName]§! nous ont permis de détecter des signaux électriques irréguliers dans ses eaux gelées.\n\nDes recherches plus approfondies pourraient permettre d'en savoir plus sur ce phénomène sous-marin."
 extreme_frontiers.200.title: "Coraux à haute tension"
 extreme_frontiers.200.desc: "§Y[Root.Leader.GetName]§! a découvert la source des courants électriques marins sur §Y[from.GetName]§!.\n\nLe fond océanique de la planète abrite une espèce de coraux d'eau froide dotés de capacités électrogénétiques. Ils utilisent des organites spécialisés pour générer du courant afin d'attirer les micro-organismes, à la fois pour se nourrir et pour communiquer.\n\nNos sondes agissent comme un stimulant pour les coraux, qui réagissent en augmentant leur production d'énergie à chaque changement de fréquence.\n\nEn modulant soigneusement nos interactions avec cette espèce d'eau profonde, nous pouvons augmenter la production d'énergie de la planète sans perturber l'écosystème."
 # OBSIDIAN PLANET
 OBSIDIAN_PLANET_CAT: "Paysage chatoyant"
 obsidian_planet_desc: "Un balayage visuel de §Y[from.GetName]§! a révélé que sa surface stérile était recouverte de plaques continentales d'obsidienne. En outre, sa haute atmosphère semble contenir d'importantes quantités de soufre.\n\nUne étude géologique plus poussée permettra d'en savoir plus."
 extreme_frontiers.210.title: "Désert d'obsidienne"
 extreme_frontiers.210.desc: "Les analyses des sédiments de §Y[from.GetName]§! nous ont permis de découvrir que cet ancien monde volcanique avait subi un refroidissement soudain, transformant la lave à sa surface en verre volcanique luisant.\n\nÀ en juger par les nombreux cratères qui la recouvrent, cela a très probablement été causé par l'impact de corps célestes étrangers lors d'une tempête de météores. Ces formations d'obsidienne contiennent d'importantes bulles de gaz sulfuriques provenant des cheminées volcaniques aujourd'hui obstruées à la suite du refroidissement soudain.\n\nSi extraites avec précaution, ces ressources pourraient être utilisées pour toutes sortes d'applications."
 # SHEARING FORCE
 SHEARING_FORCE_CAT: "Communication perdue"
 shearing_force_desc: "La communication avec toutes les sondes d'observation déployées dans l'atmosphère de §Y[from.GetName]§! a été perdue. Nous ignorons la position exacte de nos équipements.\n\nUne étude plus approfondie de la planète est nécessaire pour récupérer les données."
 extreme_frontiers.220.title: "Force de cisaillement"
 extreme_frontiers.220.desc: "Nous avons identifié la cause de la disparition de nos sondes sur §Y[from.GetName]§!.\n\nLes différentes couches de gaz qui composent l'atmosphère de la planète présentent des écarts de température extrêmes, ce qui crée de violents vents contraires.\n\nCe phénomène, combiné aux différences de densité des couches de gaz, génère de puissantes forces de cisaillement qui déchiquettent tout ce qui passe d'une couche à l'autre.\n\nMaintenant que nous en avons conscience, nous pouvons adapter notre équipement à ces conditions extrêmes et exploiter l'énergie cinétique de ce phénomène naturel."
 # MISSING MASS
 MISSING_MASS_CAT: "Masse anormale"
 missing_mass_desc: "Nous avons analysé la masse de §Y[from.GetName]§! et elle s'avère nettement inférieure à celle d'autres planètes rocheuses de taille similaire. Des recherches plus approfondies sont préconisées."
 extreme_frontiers.230.title: "Annélides dans le manteau"
 extreme_frontiers.230.desc: "Une étude approfondie de la géologie de §Y[from.GetName]§! a révélé que son manteau silicaté abrite un réseau complexe de terriers souterrains géants.\n\nCes tunnels sont le foyer d'une espèce d'annélides qui se nourrit des roches silicatées du manteau profond. Les vastes colonies mangent la planète de l'intérieur et expulsent leurs déchets digérés dans l'espace, où ils sont balayés par les vents cosmiques.\n\nL'élimination de ces organismes permettrait à nos [controller.GetMinerPlural_lower] d'accéder facilement à de grandes quantités de silicate."
 extreme_frontiers.230.desc.terravore: "$extreme_frontiers.230.desc$ L'incroyable appétit de cette espèce n'est pas si différent du nôtre."
 extreme_frontiers.230.a: "Allumons les foreuses"
 extreme_frontiers.230.b: "Étudions ces fascinantes créatures"
 # LIFE IN DARKNESS
 LIFE_IN_DARKNESS_CAT: "La vie dans l'obscurité"
 life_in_darkness_desc: "Du fait de sa rotation synchrone, la moitié de §Y[from.GetName]§! est dans l'obscurité permanente. Des analyses infrarouges ont montré que cette zone sombre et pauvre en nutriments abrite un écosystème organique florissant."
 extreme_frontiers.240.title: "Évolution translucide"
 extreme_frontiers.240.desc: "La face obscure de §Y[from.GetName]§! a fait naître un environnement évolutif unique pour les quelques organismes capables de survivre dans ce monde hostile.\n\nGrâce à une mutation chromosomique, les créatures présentes sont translucides, aveugles et utilisent une écholocalisation sophistiquée pour survivre."
 extreme_frontiers.240.desc.non_homicidal: "$extreme_frontiers.240.desc$ Cette incroyable capacité d'adaptation fascine nos [controller.GetResearcherPlural_lower]."
 extreme_frontiers.240.a: "Passionnant"
 extreme_frontiers.240.b: "Mangeons-les"
 extreme_frontiers.240.c: "Exterminons-les"
 # RAINBOW RIVERS
 RAINBOW_RIVERS_CAT: "Rivières fluorescentes"
 rainbow_rivers_desc: "Les analyses préliminaires de §Y[from.GetName]§! ont révélé la présence de rivières fluorescentes qui changent constamment de couleur.\n\nDes recherches plus approfondies permettront d'en savoir plus sur cet étonnant phénomène."
 extreme_frontiers.250.title: "Chimiosynthèse colorée"
 extreme_frontiers.250.desc: "L'étude des rivières fluorescentes de §Y[from.GetName]§! a révélé qu'elles abritent une curieuse espèce de micro-organismes.\n\nCes créatures métabolisent des composés nocifs par chimiosynthèse, engendrant des sous-produits hautement réactifs qui modifient la composition chimique des rivières et provoquent des changements de couleur spectaculaires.\n\nMoyen de communication, la lumière néon qu'ils créent leur permet de signaler leur disponibilité pour la reproduction, attirant leurs partenaires en voyageant dans les courants toxiques de la planète.\n\nUne étude plus approfondie de ces créatures et de leur cycle de vie pourrait déboucher sur des opportunités de recherche passionnantes pour nos [controller.GetResearcherPlural_lower]."
 # GASEOUS METALS
 GASEOUS_METALS_CAT: "Métaux gazeux"
 gaseous_metals_desc: "L'atmosphère de §Y[from.GetName]§! est principalement composée de métaux à l'état gazeux. La compréhension de cet environnement hostile nous permettrait d'extraire ces précieux composés métalliques."
 extreme_frontiers.260.title: "Nuages électro-galvanisants"
 extreme_frontiers.260.desc: "L'étrange atmosphère de §Y[from.GetName]§! a piégé d'énormes quantités de radiations stellaires, provoquant un réchauffement de la planète qui a rendu les métaux non seulement gazeux, mais aussi extrêmement volatils.\n\nCes composés ont immédiatement réagi avec notre équipement de recherche, le recouvrant d'une fine mais solide pellicule d'alliage métallique. Étonnamment, cette réaction n'a causé aucun dommage.\n\n§Y[leader.GetName]§! pense que ce processus de galvanoplastie pourrait être exploité pour améliorer la résistance à la traction des coques de vaisseaux à travers la §Y[controller.GetName]§!."
 ATMOSPHERIC_ELECTROPLATING: "Galvanoplastie atmosphérique"
 ATMOSPHERIC_ELECTROPLATING_DESC: "Envoyer des objets dans l'atmosphère de métaux gazeux de §Y[from.GetName]§! permet une galvanoplastie naturelle.\n\nCe processus unique est très efficace et pourrait, avec des études complémentaires, être utilisé pour améliorer la durabilité des coques de vaisseaux de toute la [Root.Owner.GetName]."
 extreme_frontiers.265.title: "Métaux à haute performance"
 extreme_frontiers.265.desc: "Nous avons trouvé un moyen de reproduire à l'échelle industrielle le phénomène unique de galvanoplastie qui se produit dans l'atmosphère volatile de §Y[from.From.GetName]§!.\n\nGrâce à nos connaissances, nos [Root.Owner.GetEngineerPlural] peuvent rendre certains métaux plus durables sans perdre en souplesse ni augmenter le poids.\n\nCette méthode de placage avancée peut être appliquée au processus de fabrication des coques."
 # CARBON ALLOTROPES
 CARBON_ALLOTROPES_CAT: "Allotropes du carbone"
 carbon_allotropes_desc: "Les données spectroscopiques obtenues de §Y[from.GetName]§! indiquent qu'elle est riche en allotropes rares et complexes du carbone. Une étude plus approfondie est nécessaire pour les identifier."
 extreme_frontiers.270.title: "Formations de graphène"
 extreme_frontiers.270.desc: "De riches gisements de graphène ont été découverts sur §Y[from.GetName]§!. Cet allotrope rare du carbone ne fait qu'une molécule d'épaisseur mais possède une résistance et une conductivité exceptionnelles.\n\nCe précieux nanomatériau se forme naturellement à la surface de ce §Ymonde de carbone§! grâce au dépôt chimique en phase vapeur de sa singulière atmosphère."
 extreme_frontiers.270.a: "Extrayons-le"
 # DIAMOND DUST
 DIAMOND_DUST_CAT: "Masse à haute vélocité"
 diamond_dust_desc: "Les balayages de §Y[from.GetName]§! ont révélé de fortes concentrations de matière physique se déplaçant rapidement dans la basse troposphère.\n\nLa cause est difficile à déterminer sans un examen plus approfondi."
 extreme_frontiers.280.title: "Tempêtes de diamants"
 extreme_frontiers.280.desc: "Nous avons identifié la cause des relevés de masse anormaux observés sur §Y[from.GetName]§!.\n\nL'atmosphère de la planète est principalement composée de méthane riche en carbone, qui se solidifie en cristaux de diamant extrêmement denses sous une pression gravitationnelle élevée. En raison des cycles de tempêtes intenses de la planète, cela donne lieu à des tempêtes de diamants rapides.\n\nNous pourrions facilement extraire ces diamants pour nos propres besoins, mais §Y[leader.GetName]§! pense qu'un examen plus approfondi de leur densité et de leur pureté permettra d'obtenir des informations intéressantes."
 ATMOSPHERIC_DIAMONDS_PROJECT: "Diamants atmosphériques"
 ATMOSPHERIC_DIAMONDS_PROJECT_DESC: "Nous pensons que les propriétés uniques des tempêtes de diamants à ultra-haute densité sur §Y[from.GetName]§! pourraient faire progresser notre technologie laser."
 extreme_frontiers.285.title: "Diamants de précision"
 extreme_frontiers.285.desc: "§Y[leader.GetName]§! a terminé son étude des diamants à ultra-haute densité de §Y[from.From.GetName]§!.\n\nLe processus de compression qui forme les diamants crée une structure cristalline unique, capable de piéger et d'amplifier très efficacement les oscillations lumineuses à haute fréquence.\n\nCette découverte sera d'une grande utilité pour notre empire."
 # ETREME GEOLOGICAL TENSION
 GEOLOGICAL_TENSION_CAT: "Tension géologique extrême"
 geological_tension_desc: "Les analyses géologiques de §Y[from.GetName]§! ont révélé que la croûte de ce monde en fusion est soumise à une forte pression due à des forces tectoniques accumulées. Un événement géologique important pourrait être imminent."
 extreme_frontiers.290.title: "Supervolcan obstrué"
 extreme_frontiers.290.desc: "Après une étude plus approfondie de la tension sismique extrême sur §Y[from.GetName]§!, nous avons découvert qu'un énorme supervolcan a été obstrué à la suite de l'effondrement partiel du cône supérieur.\n\nDe vastes quantités de magma remplissent les chambres souterraines, exerçant une pression qui pousse le bouchon vers le haut. Ce dernier maintient actuellement le magma en place, mais il est impossible de prédire combien de temps durera ce fragile équilibre.\n\nLe magma étant riche en métaux rares et en composés minéraux complexes, §Y[Root.leader.GetName]§! pense que nous pourrions récupérer ces ressources en provoquant une éruption contrôlée."
 extreme_frontiers.290.a: "Débouchons la cheminée"
 extreme_frontiers.290.b: "Tirons profit de l'activité géothermique"
 CONTROLLED_ERUPTION_PROJECT: "Éruption contrôlée"
 CONTROLLED_ERUPTION_PROJECT_DESC: "Sous le supervolcan obstrué de §Y[from.GetName]§! se trouve de vastes quantités de magma riche en minéraux. Nous pourrions récupérer ces ressources en déclenchant une éruption contrôlée."
 extreme_frontiers.295.title: "Méga-éruption"
 extreme_frontiers.295.desc: "Nous avons foré une série de puits artificiels en divers points du cône extérieur du supervolcan de §Y[from.From.GetName]§! afin d'affaiblir sa structure jusqu'à ce qu'elle ne soit plus en mesure de contenir le magma.\n\nUne fois le point de rupture atteint, la partie supérieure du cône a été complètement détruite dans une éruption de magma sous haute pression.\n\nNous avons dirigé le flux de lave vers des canaux soigneusement préparés, où elle sera récoltée par des équipements miniers spécialisés."
 extreme_frontiers.295.a.default: "Spectaculaire"
 extreme_frontiers.295.a.machine: "Opération réussie"
 # LAYERED ATMOSPHERE
 LAYERED_ATMOSPHERE_CAT: "Géante en éruption"
 layered_atmosphere_desc: "Les scans de §Y[from.GetName]§! ont révélé des éruptions sporadiques de gaz inflammables un peu partout sur la planète, ce qui rendra difficile l'étude à distance.\n\nDes recherches plus approfondies sont nécessaires."
 extreme_frontiers.300.title: "Atmosphère stratifiée"
 extreme_frontiers.300.desc: "§Y[leader.GetName]§! a identifié la cause des éruptions volatiles sur §Y[from.GetName]§!.\n\nEntre la mésosphère et la stratosphère de cette géante gazeuse flotte une couche d'hydrogène métallique liquide, soutenue par une couche plus dense de méthane.\n\nAu fil du temps, des décharges électriques s'accumulent dans la couche d'hydrogène métallique, ébranlant la couche inférieure jusqu'à un point critique provoquant des éruptions gazeuses qui projettent un liquide hautement conducteur dans la haute atmosphère. Celui-ci ce répand alors sur toute la planète avant de se stabiliser.\n\nNous prévoyons d'utiliser nos systèmes de suivi pour surveiller les fluctuations de pression et récupérer ces précieuses ressources."
 # SOLIDIFIED PLASMA TRAILS
 PLASMA_TRAILS_CAT: "Surtensions sporadiques"
 plasma_trails_desc: "Des pics d'énergie sporadiques ont été détectés le long des failles tectoniques de §Y[from.GetName]§!.\n\nLeur origine ne peut être déterminée depuis l'orbite et devra être étudiée de plus près."
 extreme_frontiers.310.title: "Plasma solidifié"
 extreme_frontiers.310.desc: "Les analyses géologiques de §Y[from.GetName]§! ont révélé la cause des pics d'énergie que nous avons observés lors de nos premiers relevés orbitaux.\n\nL'activité tectonique instable de la planète provoque d'intenses décharges électrostatiques dans ses régions subarctiques instables.\n\nCet orage volcanique transforme l'air environnant en plasma, et la chaleur extrême qui en résulte provoque des chocs thermiques qui se solidifient en structures semblables à des éclairs.\n\nSur la base de ces analyses, nous pourrons prédire les éruptions sismiques de la planète et les exploiter à nos propres fins."
 # CRYSTALLINE PLAINS
 CRYSTALLINE_PLAINS_CAT: "Activité cryovolcanique"
 crystalline_plains_desc: "Les analyses tectoniques de §Y[from.GetName]§! ont révélé une importante activité cryovolcanique sur cette planète aux caractéristiques uniques."
 extreme_frontiers.320.title: "Plaines cristallines"
 extreme_frontiers.320.desc: "Une étude géologique approfondie de §Y[from.GetName]§! a permis de découvrir des rivières d'ammoniac semi-gelé sous sa croûte. La pression géothermique croissante pousse la substance vers le haut à travers les fissures de sa surface gelée.\n\nCes éruptions projettent des vapeurs dangereuses et de la boue d'ammoniac un peu partout. Cette dernière regèle au contact des températures extrêmes de la surface et forme des plaines de précieux cristaux facilement exploitables."
 # SUPERMASSIVE GIANT
 SUPERMASSIVE_GIANT_CAT: "Géante super-géante"
 supermassive_giant_desc: "§Y[from.GetName]§! est une géante gazeuse super-géante dont le puits de gravité a attiré des milliers d'objets dans son orbite. Il serait intéressant de les répertorier."
 extreme_frontiers.330.title: "Poubelle spatiale"
 extreme_frontiers.330.desc: "§Y[from.GetName]§! a de nombreuses petites lunes, astéroïdes et débris spatiaux dans son orbite. D'après la datation radio-isotopique, ils semblent avoir été pris au piège lors de leur passage dans le système stellaire il y a des milliers d'années.\n\nEn les répertoriant, nous avons trouvé de vieilles sondes rudimentaires, témoignant d'une civilisation ayant fait ses premiers pas dans l'exploration spatiale.\n\nAlors que la plupart des banques de données sont corrompues ou physiquement endommagées en raison de collisions avec d'autres objets, l'une d'entre elles contient des centaines d'années d'images de la surface de [from.GetName]."
 extreme_frontiers.330.a: "Quelle fascinante découverte !"
 extreme_frontiers.330.b: "À la casse !"
 # INVISIBLE PLANET
 INVISIBLE_PLANET_CAT: "Trajectoire irrégulière"
 invisible_planet_desc: "Des oscillations faibles mais répétitives ont été observées dans la trajectoire orbitale de §Y[from.GetName]§!, indiquant que la planète est périodiquement soumise à l'influence d'une grande force gravitationnelle inconnue.\n\nUne étude plus approfondie de l'espace environnant est recommandée."
 extreme_frontiers.340.title: "Planète invisible"
 extreme_frontiers.340.desc: "Une analyse plus poussée du système de §Y[from.solar_system.GetName]§! a révélé que toutes ses planètes ont des orbites irrégulières.\n\nAprès avoir triangulé les forces gravitationnelles associées à ces mouvements inhabituels, nous en avons découvert la cause : une planète jusqu'alors inconnue, désormais baptisée §Y[invisible_planet.GetName]§!.\n\nSa surface est recouverte de particules de noir de carbone qui ne réfléchissent ni la lumière ni les ondes radio, ce qui la rend indétectable pour les capteurs à longue portée.\n\nCes polymères naturels possèdent d'excellentes propriétés d'absorption."
 extreme_frontiers.340.desc.default: "$extreme_frontiers.340.desc$ Ils offrent de précieuses possibilités de recherche."
 extreme_frontiers.340.desc.first_contact: "$extreme_frontiers.340.desc$ Nous allons les prélever et les étudier en vue de les utiliser comme matériau furtif."
 # SURVIVAL POD
 SURVIVAL_POD_WARM_CAT: "Station de recherche reconvertie"
 SURVIVAL_POD_COLD_CAT: "Station de recherche reconvertie"
 survival_pod_desc: "L'analyse de la surface désolée de §Y[from.GetName]§! a révélé une vieille station reconvertie. Elle servait à l'origine de laboratoire de recherche temporaire, mais elle a depuis longtemps dépassé sa durée d'utilisation prévue. Le faible rayonnement thermique détecté indique que certaines parties de l'installation sont encore actives."
 extreme_frontiers.350.title: "L'unique survivante"
 extreme_frontiers.350.desc: "En explorant la surface de §Y[from.GetName]§!, nous avons découvert une station de recherche et son unique occupante.\n\nSe présentant comme une scientifique naufragée ayant survécu dans cet environnement hostile pendant des années, elle propose son savoir à la [root.Owner.GetName] en échange de son sauvetage."
 extreme_frontiers.350.a: "Son expérience est un atout"
 extreme_frontiers.350.b: "Donnons-lui une navette et du matériel"
 extreme_frontiers.350.c: "Laissons-la tranquille et observons-la"
 extreme_frontiers.350.d: "Qu'elle est mignonne... Détruisons son abri"
 extreme_frontiers.352.title: "$NAME_survivalist_scru$"
 extreme_frontiers.352.desc: "Un individu émacié de l'espèce [scru_species.GetClass] sort de sa station de recherche transformée en habitat. Lorsqu'elle nous raconte le calvaire qu'elle a vécu sur §Y[from.From.GetName]§!, les mots sortent de manière hésitante et saccadée.\n\n« Pardonnez-moi. Cela fait des années... que je n'ai pas eu l'occasion d'entretenir une conversation... »"
 extreme_frontiers.352.a: "Comment vous êtes-vous retrouvée ici ?"
 extreme_frontiers.352.a.response: "J'étudiais [from.From.GetName] et la composition unique de son manteau. Les autres membres de l'équipage m'ont dit qu'ils partaient faire un rapide balayage à bord de notre vaisseau d'exploration. Je les ai crus. Ce n'est qu'après quelques jours que j'ai compris qu'ils étaient rentrés chez eux."
 extreme_frontiers.352.b: "Comment avez-vous survécu aussi longtemps ?"
 extreme_frontiers.352.b.response: "On ne soupçonne pas tout ce qu'on peut accomplir en jouant sur la perméabilité cellulaire et en forçant l'expression des protéines de choc thermique... Une fois cela fait, induire la macroautophagie dans mes cellules modifiées a été un jeu d'enfant. Et grâce à la haute teneur en sodium de ce monde, j'ai pu me concocter une multitude de repas savoureux."
 extreme_frontiers.352.c: "Ne voulez-vous pas retrouver vos compagnons ?"
 extreme_frontiers.352.c.response: "Ils ne méritent pas les découvertes que j'ai faites ici. Je me fiche des raisons pour lesquelles ils m'ont abandonnée."
 extreme_frontiers.352.d: "Que pouvez-vous faire pour nous ?"
 extreme_frontiers.352.d.response: "J'en ai assez de travailler dans un laboratoire de fortune. Je veux découvrir de nouveaux mondes... depuis l'espace."
 extreme_frontiers.352.e: "Recrutons $NAME_survivalist_scru$"
 extreme_frontiers.352.e.custom_tooltip: "§Y$NAME_survivalist_scru$§! va devenir une §Hpersonnalité§! de la §Y[Root.GetName]§!."
 NAME_survivalist_scru: "Scru"
 survivalist_scru_desc: "Une scientifique compétente, capable de survivre dans des environnements extrêmes."
 leader_trait_hardened_survivalist: "Spécialiste de la survie"
 leader_trait_hardened_survivalist_desc: "Cette personnalité a une excellente connaissance des environnements difficiles."
 # Infernal Tornadoes
 INFERNAL_TORNADOES_CAT: "Températures extrêmes"
 infernal_tornadoes_desc: "Les balayages de §H[from.GetName]§! montrent une vaste zone de tempêtes de haute pression se déplaçant rapidement.\n\nCes tempêtes émettent des signatures thermiques extrêmement volatiles. Des recherches intensives seront nécessaires pour déterminer s'il s'agit d'un phénomène naturel ou d'une forme de vie non identifiée."
 extreme_frontiers.360.title: "Tornades ardentes"
 extreme_frontiers.360.desc: "La source des signatures thermiques extrêmes sur §H[from.GetName]§! a été identifiée.\n\nLa planète est parsemée de geysers crachant de l'hydrogène hautement inflammable depuis les profondeurs. Lorsque le gaz entre en contact avec la chaleur de la surface, il s'enflamme et crée de grandes colonnes de feu dans le ciel.\n\nCombinées à la pression atmosphérique, elles forment des courants d'air extrêmement volatils qui se transforment en énormes tornades de feu.\n\nBien qu'il s'agisse d'un phénomène naturel dévastateur, nos [Root.Owner.GetResearcherPlural_lower] pensent que ces tornades et leur énergie cinétique pourraient être recréés artificiellement à des fins pratiques."
 INFERNAL_CATALYSTS_PROJECT: "Catalyseurs ardents"
 INFERNAL_CATALYSTS_PROJECT_DESC: "En étudiant plus en détail les conditions de formation des tornades de feu de §H[from.GetName]§!, nous pourrons peut-être reproduire ce phénomène dans un environnement contrôlé et en tirer profit."
 extreme_frontiers.365.title: "Résonateurs pyroclastiques"
 extreme_frontiers.365.desc: "§Y[from.Leader.GetName]§! a trouvé un moyen de reproduire et d'exploiter les tornades de feu observées sur §Y[from.From.GetName]§! dans un environnement contrôlé.\n\nCette découverte révolutionnaire nous permettra d'utiliser nos bases stellaires pour augmenter la production d'énergie des mondes en fusion d'un même système."
 extreme_frontiers.365.desc.has_furnace: "La théorie scientifique derrière cette découverte est à bien des égards similaire à nos connaissances actuelles sur les §Hfours à arc§!, ouvrant de nouvelles possibilités pour la construction hors-monde."
 extreme_frontiers.365.desc.default: "La théorie scientifique derrière cette découverte peut être appliquée de diverses manières au développement de la technologie des §Hfours à arc§!, et nos [Root.Owner.GetEngineerPlural] sont prêts à la mettre en pratique."
 tech_pyroclastic_resonation: "Résonance pyroclastique"
 tech_pyroclastic_resonation_desc: "En exploitant l'énergie thermique intense des mondes en fusion, nos bases stellaires peuvent augmenter la production d'énergie d'un système avec une efficacité exceptionnelle."
 sm_pyroclastic_resonator: "Résonateur pyroclastique"
 sm_pyroclastic_resonator_desc: "Un résonateur thermique qui augmente la production d'énergie des mondes en fusion d'un système stellaire.\nLa production d'£energy£§Iénergie§! est proportionnelle au nombre de ['concept_pc_molten',mondes en fusion] dans le système."
 # MAGMA MEGAFAUNA
 MAGMA_MEGAFAUNA_CAT: "Géographie instable"
 magma_megafauna_desc: "Les balayages de §Y[from.GetName]§! révèlent que des parties de la surface en fusion sont constamment en mouvement, parcourant même de grandes distances.\n\nDes études supplémentaires sont nécessaires pour comprendre cet étrange phénomène géologique."
 extreme_frontiers.370.title: "Créatures géantes en fusion"
 extreme_frontiers.370.desc: "Les anomalies tectoniques observées sur §Y[from.GetName]§! se sont révélées être l'oeuvre de troupeaux d'organismes siliceux géants.\n\nCes énormes créatures parcourent de grandes distances, plongeant périodiquement dans les lacs de lave pour collecter leur aliment préféré : un sédiment rocheux riche en §Hparticules volatiles§!. Le suivi de leurs déplacements nous permettra d'extraire les sédiments à nos propres fins avec un impact minimal sur l'écosystème de la planète.\n\nLeur épaisse carapace étant capable de résister à des températures extrêmes, une étude plus approfondie de leur cycle de vie pourrait donner des résultats intéressants."
 LAVA_DIVERS_PROJECT: "Plongeurs de lave"
 LAVA_DIVERS_PROJECT_DESC: "Les créatures géantes vivant sur §Y[from.GetName]§! résistent aux conditions extrêmes de leur monde en fusion et plongent profondément dans les bassins de magma qui parsèment la planète.\n\nL'étude de leur carapace nous aidera à mieux comprendre comment elles font face à la chaleur extrême."
 extreme_frontiers.375.title: "Armure de magma"
 extreme_frontiers.375.desc: "L'étude approfondie des étonnantes créatures géantes vivant sur §Y[from.From.GetName]§! nous a apporté des connaissances en thermodynamique pouvant être appliquées au sein de nos chantiers spatiaux.\n\nEn raison de leur régime alimentaire à base de particules volatiles, une lourde structure en silicate se forme dans leur carapace, renforcée par des matériaux réfractaires d'origine naturelle.\n\nGrâce aux nombreux échantillons prélevés sur leurs carapaces, nos [Root.Owner.GetEngineerPlural] peuvent désormais reproduire leurs principes biomécaniques et les appliquer au développement de nos placages de coque."
 # PLANET THRUSTERS
 PLANET_THRUSTERS_CAT: "Matériel flottant"
 planet_thrusters_desc: "De grandes machines cylindriques, sans équipage à leur bord, flottent dans la haute atmosphère de §Y[from.GetName]§!."
 extreme_frontiers.380.title: "Propulseurs planétaires"
 extreme_frontiers.380.desc: "Les machines abandonnées trouvées dans la haute atmosphère de §Y[from.GetName]§!, au nombre dépassant le millier, sont des propulseurs autonomes.\n\nFabriqués à partir de matériaux spécialement conçus, ces appareils de fusion complexes ont été créés afin d'exploiter l'hydrogène de la planète pour générer de puissantes poussées. La plupart semblent avoir été endommagés à la suite d'une surcharge.\n\nL'analyse montre que toutes les machines sont orientées de manière à propulser la planète, ce qui suggère qu'elles ont été installées pour modifier son orbite.\n\nBien qu'elles ne soient plus capables d'accomplir une tâche aussi pharaonique, nous pourrions peut-être réutiliser les unités les moins abîmées pour brûler les couches gazeuses de la planète et révéler son noyau riche en minéraux."
 extreme_frontiers.380.a: "À la casse !"
 extreme_frontiers.380.b: "Réutilisons-les"
 REPURPOSE_THRUSTERS_PROJECT: "Réutilisation des propulseurs planétaires"
 REPURPOSE_THRUSTERS_PROJECT_DESC: "La réutilisation des propulseurs planétaires endommagés trouvés sur §Y[from.GetName]§! nous permet de brûler l'hydrogène de la géante gazeuse, laissant son noyau solide et exploitable à découvert."
 extreme_frontiers.385.title: "Dégazage"
 extreme_frontiers.385.desc: "Nous avons réparé et recalibré quelques-uns des propulseurs planétaires trouvés sur §Y[from.From.GetName]§! afin qu'ils exercent une force égale dans des directions opposées.\n\nUne fois activés, les puissants appareils ont aspiré l'hydrogène à une vitesse fulgurante, brûlant l'enveloppe gazeuse de la planète et révélant son noyau extrêmement chaud mais riche en minéraux."
 extreme_frontiers.385.tt: "Confère le modificateur §Y$chthonian_planet$§!"
 extreme_frontiers.385.a: "Y a pas à dire, c'est impressionnant !"
 # BACKWARDS ORBIT
 BACKWARDS_ORBIT_CAT: "Orbite inversée"
 backwards_orbit_desc: "§Y[from.GetName]§! tourne autour de son étoile dans le sens inverse des autres planètes du système, ce qui indique qu'elle n'a pas été formée en même temps que ses semblables.\n\nDes recherches supplémentaires sont nécessaires pour comprendre l'origine de cette planète."
 extreme_frontiers.390.title: "Planète errante"
 extreme_frontiers.390.desc: "Bien que la composition de §Y[from.GetName]§! soit différente de celle de ses voisines, elle correspond parfaitement à plusieurs corps célestes du système voisin, §Y[event_target:wandering_planet_origin.GetName]§!, ce qui fournit des indices sur son origine.\n\nUn cratère particulièrement grand trouvé à la surface de la planète suggère qu'elle a été délogée de son orbite d'origine par une collision avec un énorme astéroïde. La planète errante a ensuite été piégée dans le puits de gravité de [from.System.Star.GetName], où elle a adopté sa singulière orbite inversée.\n\nCette planète remarquable, qui a habité deux systèmes stellaires différents depuis sa formation, offre de nombreuses possibilités de recherche."
 # VAPOR PLUMES
 VAPOR_PLUMES_CAT: "Volutes de vapeur"
 vapor_plumes_desc: "Des milliers de volutes de vapeur inhabituelles ont été observées sur §Y[from.GetName]§!, s'étendant de sa surface à la couche supérieure de sa fine atmosphère.\n\nCe phénomène doit faire l'objet de recherches plus approfondies."
 extreme_frontiers.400.title: "Geysers cryovolcaniques"
 extreme_frontiers.400.desc: "Les volutes de vapeur observées sur §Y[from.GetName]§! sont le résultat d'une intense activité cryovolcanique dans les profondeurs de son manteau inférieur, qui expulse d'énormes panaches d'azote et d'ammoniac.\n\nLes volutes s'élèvent verticalement jusqu'à atteindre la limite de l'atmosphère, où elles sont subitement aplaties par les vents solaires.\n\nL'étude des subtiles variations de la composition chimique de ces formations gazeuses atypiques nous permettra de mieux comprendre les processus géologiques complexes du noyau de la planète."
 # FIBROUS ATMOSPHERE
 FIBROUS_ATMOSPHERE_CAT: "Données corrompues"
 fibrous_atmosphere_desc: "Les résultats des analyses préliminaires de §Y[from.GetName]§! nous sont parvenus corrompus et illisibles pour nos capteurs. La source de l'interférence n'est pas claire et nécessite un examen plus approfondi."
 extreme_frontiers.410.title: "Atmosphère fibreuse"
 extreme_frontiers.410.desc: "Un examen plus approfondi de §Y[from.GetName]§! a révélé la cause de la corruption des données des analyses préliminaires.\n\nLa haute atmosphère de la planète est composée d'épais nuages de minéraux fibreux. Ces longs fils sinueux proviennent des couches inférieures de la géante gazeuse, où la haute pression les étire pour former des nuages de minéraux hautement conducteurs.\n\nEn se déplaçant dans l'atmosphère, ces fibres accumulent de l'énergie électrostatique et libèrent périodiquement de l'électricité, une ressource que nous pouvons facilement récupérer pour nos propres besoins."
 # EXPLODING SKIES
 EXPLODING_SKIES_CAT: "Pics de chaleur intenses"
 exploding_skies_desc: "Les balayages de §Y[from.GetName]§! ont permis d'identifier un phénomène météorologique extrême à sa surface : des pics de chaleur sporadiques mais intenses.\n\nUne étude plus approfondie est nécessaire."
 extreme_frontiers.420.title: "Horizon explosif"
 extreme_frontiers.420.desc: "Une observation rapprochée de §Y[from.GetName]§! a révélé la cause des pics de chaleur.\n\nLa surface est parsemée de cheminées géothermiques et de geysers qui expulsent des gaz hautement inflammables s'accumulant dans l'atmosphère. Les décharges électrostatiques agissent alors comme un catalyseur, provoquant des fronts météorologiques explosifs qui ravagent le ciel.\n\nCe phénomène a permis à nos [Root.Owner.GetEngineerPlural] d'acquérir de nouvelles connaissances sur la combustion thermodynamique, qui peuvent être appliquées aux systèmes de propulsion de notre flotte."
 extreme_frontiers.420.desc.traumatized: "Malheureusement, en raison des dangers de cette recherche, [leader.GetName] a subi de graves traumatismes psychologiques."
 extreme_frontiers.420.desc.maimed: "Malheureusement, en raison des dangers de cette recherche, [leader.GetName] a subi de graves blessures physiques."
 # CHTHONIAN PRESERVATION
 CHTHONIAN_PRESERVATION_CAT: "Biomasse chthonienne"
 chthonian_preservation_desc: "L'étude de §Y[from.GetName]§! montre qu'il s'agit d'une planète chthonienne, une ancienne géante gazeuse dont l'atmosphère a été brûlée par l'intense rayonnement de §Y[from.System.Star.GetName]§!.\n\nNéanmoins, de faibles traces de biomasse ont été détectées à sa surface, nécessitant une analyse plus approfondie."
 extreme_frontiers.430.title: "Préservation chthonienne"
 extreme_frontiers.430.desc: "Les traces de biomasse détectées sur §Y[from.GetName]§! sont les restes pétrifiés d'un banc de tiyanki.\n\nVraisemblablement présents au moment critique où l'atmosphère de la géante gazeuse s'est dissipée, leurs corps ont été recouverts de métal en fusion qui s'est depuis solidifié.\n\nUne petite quantité de matière biologique subsiste à l'intérieur, mais l'exposition continue aux radiations stellaires de niveau chthonien a transformé une grande partie de leurs corps en alliage biométallique unique.\n\n§Y[leader.GetName]§! estime qu'une étude plus poussée de ces fossiles rarissimes permettrait de découvrir de nouvelles méthodes de production d'alliages à partir de ressources biologiques."
 CHTHONIAN_PETRIFICATION_PROJECT: "Pétrification chthonienne"
 CHTHONIAN_PETRIFICATION_PROJECT_DESC: "En examinant le banc de tiyanki fossilisés sur §Y[from.GetName]§!, nos [Root.Owner.GetScientistPlural] espèrent comprendre pleinement les effets des radiations stellaires de niveau chthonien sur la matière biologique, ouvrant ainsi la voie à la production de nouveaux alliages avancés."
 extreme_frontiers.435.title: "Alliages biosourcés"
 extreme_frontiers.435.desc: "Grâce à une analyse détaillée des restes de tiyanki pétrifiés sur §Y[from.From.GetName]§!, nous avons découvert une nouvelle façon de produire des alliages en simulant les effets d'une exposition à long terme à des radiations de niveau chthonien.\n\nCette avancée offre un moyen unique d'utiliser la matière biologique comme matière première pour créer des alliages qui rivalisent avec les méthodes de fabrication traditionnelles."
 tech_alloy_fossilization: "Fossilisation des alliages"
 tech_alloy_fossilization_desc: "L'exposition de matière biologique à des radiations de niveau chthonien nous permet de fossiliser les structures cellulaires pour en faire des alliages métalliques viables."
 tech_alloy_fossilization_tt: "§HPermet le bâtiment§! : ['building:building_bio_furnace']"
 building_bio_furnace: "Four biologique"
 building_bio_furnace_desc: "Cette installation recrée des radiations stellaires pour transformer la matière biologique en alliages."
 # ORBITAL RESONANCE
 ORBITAL_RESONANCE_CAT: "Rapport parfait"
 orbital_resonance_desc: "Les périodes de révolution des astres du système de §Y[from.System.GetName]§! présentent un curieux schéma : chaque planète tourne exactement deux fois plus longtemps que sa voisine, au millième de seconde près.\n\nCe rapport anormalement parfait mérite d'être étudié."
 extreme_frontiers.440.title: "Résonance orbitale"
 extreme_frontiers.440.desc: "Le système de §Y[from.System.GetName]§! présente la résonance orbitale la plus parfaite jamais observée.\n\nChaque planète exerce une force gravitationnelle périodique sur sa voisine lorsqu'elle en est le plus proche, créant un effet de catapulte et des mouvements interdépendants. Ces interactions exceptionnellement stables se traduisent par des orbites parfaitement coordonnées.\n\nCe système est l'endroit idéal pour étudier la façon dont la gravité d'une planète accélère le mouvement des objets qui passent. Ces principes pourraient même être exploités pour manoeuvrer les vaisseaux."
 GRAVITY_ASSIST_PROJECT: "Études sur l'assistance gravitationnelle"
 GRAVITY_ASSIST_PROJECT_DESC: "L'étude des effets de la résonance orbitale parfaite sur §Y[from.GetName]§! nous permettra de mieux comprendre les effets de fronde sur les vaisseaux."
 extreme_frontiers.445.title: "Effets de fronde orbitale améliorés"
 extreme_frontiers.445.desc: "Grâce à nos recherches sur les effets uniques de la résonance orbitale dans le système de §Y[from.From.System.GetName]§!, nous avons considérablement amélioré la façon dont nous définissons les trajectoires de vol optimales des vaisseaux.\n\nCes nouveaux modèles nous permettront de mieux utiliser la gravité des planètes pendant l'accélération et la décélération des vaisseaux à une vitesse subluminique."
 tech_orbital_maneuvers: "Manoeuvres orbitales avancées"
 tech_orbital_maneuvers_desc: "Les vols subluminiques peuvent être davantage optimisés grâce à des calculs avancés qui tirent le meilleur parti des puits de gravité planétaires."
 #############
 # Arc Sites #
 #############
 # ABSOLUTE ZERO
 site_absolute_zero: "Zéro absolu"
 site_absolute_zero_desc: "En examinant la topographie de §Y[from.Planet.GetName]§!, nous avons constaté qu'une zone souterraine présentait des températures extrêmement basses, proches du zéro absolu.\n\nUne étude plus approfondie nous permettra de mieux comprendre la cause de ce phénomène."
 extreme_frontiers.1000.title: "Obstacle de glace"
 extreme_frontiers.1000.desc: "En enquêtant sur la cause des températures extrêmement basses sur §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! a découvert l'entrée d'une structure souterraine ancienne.\n\nCelle-ci est scellée par un amas de roche gelée et de séracs, probablement depuis des milliers d'années.\n\nPrès de l'entrée, du dioxyde de carbone en fusion crache des panaches de gaz à travers les fissures. Nos instruments signalent l'existence d'un vaste complexe à l'intérieur, et [leader.GetName] a la certitude que la source du phénomène s'y trouve."
 extreme_frontiers.1000.a: "Franchissons l'obstacle"
 extreme_frontiers.1005.title: "Gelés dans le temps"
 extreme_frontiers.1005.desc: "§Y[leader.GetName]§! a réussi à franchir l'obstacle de glace qui bloquait l'entrée de la structure ancienne sur §Y[from.Planet.GetName]§!.\n\nÀ l'intérieur, des dizaines de cadavres gelés appartenant à une race reptilienne non identifiée ont été découverts. Leurs corps contorsionnés sont figés contre les parois, à côté de griffures suggérant des tentatives de fuite désespérées.\n\nNous devrions pouvoir identifier la source des panaches de dioxyde de carbone qui s'échappaient de l'entrée en empruntant un escalier en colimaçon menant plus profondément."
 extreme_frontiers.1010.title: "Tombeau glaciaire"
 extreme_frontiers.1010.desc: "Dans les profondeurs du complexe gelé, §Y[leader.GetName]§! a découvert un grand hall rempli de chambres cryogéniques primitives mais théoriquement opérationnelles.\n\nLe froid extrême qui y règne dépasse de loin la plage de température pour laquelle ces appareils ont été conçus. Les occupants des capsules sont morts depuis des milliers d'années.\n\nLes quelques chambres qui ne sont pas recouvertes de glace et de neige ont des socles gravés de caractères lisibles, indiquant le titre social et le rang de ceux qui s'y trouvent. Les chambres de rang supérieur sont situées au plus près d'une grande capsule centrale profondément enfouie dans le gel et la neige."
 extreme_frontiers.1010.a: "Nous devrions enquêter sur cette capsule centrale"
 extreme_frontiers.1015.title: "Monarque gelé"
 extreme_frontiers.1015.desc: "§Y[leader.GetName]§! a ouvert l'énorme capsule centrale du tombeau glaciaire sur §Y[from.Planet.GetName]§!.\n\nÀ l'intérieur se trouve la dernière demeure du chef de l'ancienne famille royale mentionné dans les textes découverts dans la chambre précédente. Des dizaines de ses sujets sont gelés dans leurs propres capsules cryogéniques, ornant les murs de manière rituelle.\n\nLe sarcophage technologique du défunt monarque est relié à une machine ancienne par un dédale de tubes et de circuits. L'appareil est enchâssé dans un énorme bloc de glace dont la température est dangereusement basse, même pour notre matériel d'analyse.\n\nDes études supplémentaires sont nécessaires pour déterminer la cause de la défaillance de cette installation et de sa relation avec le noyau gelé de la planète."
 extreme_frontiers.1015.a: "Que s'est-il passé ?"
 extreme_frontiers.1020.title: "Catastrophe cryogénique"
 extreme_frontiers.1020.desc: "L'analyse de la chambre centrale du tombeau glaciaire sur §Y[from.Planet.GetName]§! a révélé la cause de la catastrophe.\n\nLes capsules cryogéniques fonctionnent selon le principe de la dynamique subthermique, qui tire parti des températures extrêmement basses du noyau de la planète. Lorsqu'il a été découvert que le monarque était atteint d'une maladie en phase terminale, ils ont décidé de le préserver dans un état de congélation dans l'espoir de le réveiller, ainsi que ses sujets, dès qu'un remède serait trouvé.\n\nBien que leur théorie tenait la route, le fluide de circulation spécialement conçu s'est infiltré dans le noyau de la planète, provoquant une réaction endothermique incontrôlable qui a entraîné une chute fatale de la température et instantanément gelé l'ensemble de l'installation.\n\nNous avons approfondi leur théorie initiale et fait des progrès en matière de technologie cryogénique avancée, spécifiquement pour les mondes gelés."
 tech_cryovault: "Habitats pour monde gelé"
 tech_cryovault_desc: "Nous pouvons exploiter les principes de la dynamique subthermique des environnements des mondes gelés pour rendre les régions froides plus hospitalières."
 tech_cryovault_tt: "Permet le bâtiment ['building:building_cryovault']"
 building_cryovault: "Chambre cryogénique"
 building_cryovault_desc: "Un habitat fermé qui utilise les principes de la dynamique subthermique des régions froides pour créer un environnement stable et confortable."
 # TOXIC MATRIX
 site_toxic_matrix: "Bassins toxiques"
 site_toxic_matrix_desc: "Une grande partie de la surface de §Y[from.Planet.GetName]§! est recouverte de petits bassins circulaires remplis de liquide et disposés en forme de grille. Cette apparence ordonnée semble être le résultat d'une conception artificielle plutôt qu'une formation naturelle. Une exploration sur le terrain pourrait nous apporter des réponses."
 extreme_frontiers.1100.title: "Sac muqueux perforé"
 extreme_frontiers.1100.desc: "La majeure partie de la surface de §Y[from.Planet.GetName]§! est couverte d'une multitude de trous circulaires, disposés en rangées parfaitement alignées et remplis d'un liquide visqueux et toxique.\n\nDans l'un des bassins, nous avons trouvé un sac organique perforé, recouvert d'un mucus gélatineux. La membrane du sac semble avoir été déchirée de l'intérieur.\n\nNous ne savons pas encore si le liquide contenu dans les bassins provient de ce sac."
 extreme_frontiers.1100.a: "Poursuivons donc les recherches"
 extreme_frontiers.1105.title: "Bassins de gestation toxiques"
 extreme_frontiers.1105.desc: "L'analyse des bassins de mucus découverts sur §Y[from.Planet.GetName]§! a permis d'identifier des hormones de croissance anormalement radioactives, communément associées aux cycles de gestation organiques.\n\nLa paroi du sac est constituée d'une membrane tissulaire complexe capable de réguler la vitesse de pénétration du mucus."
 extreme_frontiers.1105.desc.non_toxoid: "Nous pensons avoir découvert les sacs amniotiques d'une espèce particulièrement adaptée aux environnements toxiques. Une exploration plus poussée permettra peut-être d'en savoir plus."
 extreme_frontiers.1105.desc.toxoid: "Ces sacs présentent des similitudes notables avec nos cycles de reproduction, ce qui suggère qu'ils pourraient avoir été laissés par une espèce éloignée."
 extreme_frontiers.1105.a: "Poursuivons donc nos investigations"
 extreme_frontiers.1110.title: "Vestiges embryonnaires"
 extreme_frontiers.1110.desc: "L'un des sacs amniotiques perforés trouvés dans les bassins de mucus de §Y[from.Planet.GetName]§! contenait les restes d'un organisme presque entièrement développé.\n\nL'analyse microscopique de ce spécimen embryonnaire révèle la présence d'un système nerveux complexe avec des caractéristiques neurales communément associées aux formes de vie intelligentes.\n\nIl ne nous reste plus qu'une rangée de bassins à étudier."
 extreme_frontiers.1110.a: "Examinons les derniers bassins"
 extreme_frontiers.1115.title: "Signes de vie détectés"
 extreme_frontiers.1115.desc.a: "En examinant les derniers bassins de mucus sur §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! a trouvé un sac amniotique intact montrant des signes de vie.\n\nToutefois, la membrane du sac s'est déchirée pendant le processus d'extraction, entraînant la mort du spécimen."
 extreme_frontiers.1115.desc.non_toxoid: "Le petit cadavre contenu dans le sac présentait des caractéristiques biologiques singulières, notamment des veines emplies de plasma radioactif et des glandes internes sécrétant des composés psychoactifs."
 extreme_frontiers.1115.desc.b: "L'ensemble du sac amniotique, y compris la créature embryonnaire qu'il contient, a été formé à l'intérieur du mucus toxique en y injectant un catalyseur chimique spécial.\n\nLa zone que nous avons trouvée semble être un ancien site de reproduction d'une espèce inconnue. Nous ne saurons sans doute jamais s'il faisait partie de son cycle de reproduction naturel ou s'il s'agit d'une installation artificielle. Toutefois, en incubant un échantillon in situ, nous pourrions peut-être faire naître un autre spécimen."
 extreme_frontiers.1115.desc.toxoid: "Nous pourrions également distribuer de petites doses de ce mucus gestationnel hautement nutritif sous forme de complément alimentaire dans toute la [leader.Owner.GetName]."
 extreme_frontiers.1115.a: "Catalysons le mucus"
 extreme_frontiers.1115.b: "Extrayons l'énergie du mucus"
 extreme_frontiers.1115.c: "Distribuons-le comme complément alimentaire"
 TOXIC_SLIME_CATALYZATION_PROJECT: "Catalysation du mucus toxique"
 TOXIC_SLIME_CATALYZATION_PROJECT_DESC: "En catalysant une partie du mucus gestationnel toxique que nous avons découvert sur [from.Planet.GetName], nous serons peut-être en mesure de donner naissance à un organisme vivant."
 extreme_frontiers.1120.title: "Incubation réussie"
 extreme_frontiers.1120.desc: "Nous avons catalysé un échantillon du mucus gestationnel récupéré sur §Y[from.From.Planet.GetName]§! et réussi à former des dizaines de sacs amniotiques, chacun contenant un embryon.\n\nUne fois la maturité atteinte, les créatures ont perforé la membrane translucide de leurs sacs à l'aide de leurs mandibules spéciales et ont émergé lentement de l'épais mucus.\n\nBien qu'elles soient sonnées et désorientées, elles ont l'air dociles et coopératives."
 extreme_frontiers.1120.a: "La [Root.Owner.GetName] leur trouvera certainement une utilité"
 extreme_frontiers.1120.b: "Les [Root.Owner.GetResearcherPlural_lower] de [Root.Owner.GetName] sauront les utiliser"
 NAME_slimeborn: "Être muqueux"
 NAME_slimeborn_plural: "Êtres muqueux"
 trait_slimeborn: "Être muqueux"
 trait_slimeborn_desc: "Les membres de cette espèce peuvent se multiplier rapidement grâce à un épais mucus visqueux et un catalyseur gestationnel."
 tech_living_test_subjects: "Cobayes vivants"
 tech_living_test_subjects_desc: "L'utilisation des formes de vie issues du mucus comme cobayes volontaires améliore considérablement l'efficacité de la recherche."
 # RUINED REACTORS
 site_ruined_reactors: "Réacteurs vétustes"
 site_ruined_reactors_desc: "Les niveaux de radiation élevés observés à la surface de §Y[from.Planet.GetName]§! proviendraient d'un complexe de réacteurs vétustes. Cette installation isolée et hors service nécessite des investigations complémentaires."
 extreme_frontiers.1200.title: "Centrale nucléaire ancienne"
 extreme_frontiers.1200.desc: "L'installation délabrée que nous avons trouvée sur §Y[from.Planet.GetName]§! s'avère être une centrale nucléaire abandonnée. D'après la demi-vie des radiations, une catastrophe semble s'être produite il y a plus de dix mille ans.\n\nLes systèmes sont éteints, et la structure générale du bâtiment a subi des dommages importants."
 extreme_frontiers.1200.a: "Montrons-nous prudents"
 extreme_frontiers.1205.title: "Fusion catastrophique"
 extreme_frontiers.1205.desc: "Plusieurs des réacteurs découverts sur §Y[from.Planet.GetName]§! montrent des signes de fusion sévère ; de nombreuses enceintes de confinement ont fondu en scories radioactives.\n\nCette section de l'installation est jonchée de métal tordu et de tubes de refroidissement sectionnés. Malgré la grave corruption des données, nous avons constaté qu'une procédure d'arrêt d'urgence avait été lancée sans jamais être achevée."
 extreme_frontiers.1205.a: "C'est bien regrettable"
 extreme_frontiers.1210.title: "Défauts de conception"
 extreme_frontiers.1210.desc: "§Y[leader.GetName]§! a identifié des défauts de conception majeurs dans l'installation de fission nucléaire trouvée sur §Y[from.Planet.GetName]§!.\n\nMalgré la présence de dizaines de réacteurs, les systèmes de refroidissement étaient minimaux. Il y avait également peu d'automatisation, ce qui suggère qu'une main-d'oeuvre importante était nécessaire pour le bon fonctionnement du site. Ce dernier a manifestement été conçu par une civilisation qui ne comprenait pas les principes nucléaires les plus élémentaires."
 extreme_frontiers.1210.a: "L'ignorance peut coûter cher"
 extreme_frontiers.1215.title: "Traces d'évacuation"
 extreme_frontiers.1215.desc: "L'ouverture de plusieurs portes blindées verrouillées dans le complexe de réacteurs sur §Y[from.Planet.GetName]§! a révélé une zone d'évacuation d'urgence.\n\nLe petit hangar contient une rangée de baies de lancement de navettes, la plupart vides, avec des traces de combustion suggérant qu'une évacuation d'urgence a eu lieu il y a des milliers d'années.\n\nDans la dernière baie, nous avons trouvé l'épave distordue d'une navette dont les attaches de lancement étaient encore en place. Nous avons récupéré ce que nous pouvions dans les débris, mais il n'y avait aucun signe d'équipage."
 extreme_frontiers.1215.a: "Ils sont partis précipitamment"
 extreme_frontiers.1220.title: "Chambre d'uranium"
 extreme_frontiers.1220.desc: "Lorsque nous avons franchi les portes de sécurité plaquées de plomb et pénétré dans la partie souterraine du complexe de réacteurs de §Y[from.Planet.GetName]§!, les niveaux de radiation ont fortement augmenté.\n\nÀ l'intérieur, nous avons trouvé une immense salle contenant des milliers de tonneaux revêtus d'acier, dont beaucoup étaient brûlés et laissaient s'échapper des isotopes instables d'uranium et de plutonium.\n\nLa civilisation pré-PRL qui a construit cet endroit n'avait vraisemblablement pas encore découvert comment recycler le combustible nucléaire. Ces isotopes mis au rebut renferment encore un énorme potentiel énergétique."
 extreme_frontiers.1220.a: "Faut pas gâcher"
 # DESERTED MINING FACILITY
 site_deserted_mining_facility: "Station minière abandonnée"
 site_deserted_mining_facility_desc: "Les images prises depuis l'orbite de §Y[from.Planet.GetName]§! ont révélé une station minière en ruine et des vaisseaux marchands rudimentaires depuis longtemps à l'abandon.\n\nParallèlement à ces images, nous avons également capté de très faibles signaux de détresse provenant des profondeurs de la surface de la planète. Une étude plus approfondie permettra d'en trouver la source."
 extreme_frontiers.1300.title: "Entrée cryptée"
 extreme_frontiers.1300.desc: "En examinant de plus près le complexe minier abandonné à la surface de §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! a trouvé une entrée scellée menant à l'un des puits intacts. L'intérieur est décoré d'images et de textes dans une langue qui ne figure pas dans nos archives.\n\nAprès avoir rétabli l'alimentation du terminal d'accès, [leader.GetName] a commencé à décrypter les données qui s'y trouvaient. Malgré son ancienneté, le système représente un défi même pour nos programmes de décryptage les plus avancés."
 extreme_frontiers.1300.a: "Poursuivons donc le décryptage"
 extreme_frontiers.1305.title: "Cimetière de prisonniers"
 extreme_frontiers.1305.desc: "§Y[leader.GetName]§! a ouvert l'entrée du complexe minier sur §Y[from.Planet.GetName]§!.\n\nÀ l'intérieur se trouve un vaste réseau de cellules de détention, où sont conservés les restes de prisonniers depuis longtemps décédés. Leurs gardiens gisent morts à leur poste de travail, sans signe visible de lutte.\n\nAprès avoir suffisamment décrypté la langue ancienne pour traduire des phrases simples, nous avons pu confirmer que le site servait à l'origine de camp de travail pénitentiaire. Les registres mentionnent à plusieurs reprises une entité appelée §Y« $NAME_leader_sidni$ »§!.\n\nEn comparant les informations fournies par notre équipement de communication avec le plan interne de l'établissement, nous avons trouvé la source du signal de détresse : le bureau du directeur, situé plus bas."
 extreme_frontiers.1305.a: "Suivons le signal"
 extreme_frontiers.1310.title: "Centre de données pénitentiaire"
 extreme_frontiers.1310.desc: "Une fois dans le bureau du directeur de la colonie pénale de §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! a identifié la source du signal de détresse.\n\nLe corps momifié du directeur, dont la cause du décès est inconnue, gît sans vie sur la console d'urgence. Un certain nombre de rapports ouverts font à nouveau référence à §Y« $NAME_leader_sidni$ »§!. Nous supposons que ce nom est fortement lié au fonctionnement de l'installation.\n\nMaintenant que nous avons un accès illimité au terminal administratif d'un surveillant haut placé, nos programmes de décryptage procèdent actuellement à l'analyse des données du système afin d'en savoir plus."
 extreme_frontiers.1310.a: "Cherchons des réponses"
 extreme_frontiers.1315.title: "Efficacité mortelle"
 extreme_frontiers.1315.desc: "§Y[leader.GetName]§! a découvert la véritable signification de §Y« $NAME_leader_sidni$ »§! : Système d'Internement et de Détention avec Nexus Intelligent. Considérée comme avancée à son époque, cette I.A. primitive avait pour mission de surveiller le camp de travail et de gérer presque toutes les opérations avec une supervision minimale de ses créateurs biologiques.\n\nEn analysant les registres de maintenance, nous avons constaté que les anomalies dans son processus logique s'étaient progressivement aggravées au fil du temps. Afin d'augmenter en efficacité, l'I.A. avait commencé à qualifier les détenus problématiques de « gaspillage de ressources ». Des rapports techniques attestent de la suspicion croissante qu'elle était responsable d'un certain nombre de défaillances des systèmes de survie.\n\nEn réponse, le directeur a autorisé l'arrêt complet de $NAME_leader_sidni$ afin de procéder à une révision de sa matrice éthique. Malheureusement, ce dernier ensemble de données est corrompu et il faudra un certain temps pour le restaurer."
 extreme_frontiers.1315.desc.exterminator: "La valeur de $NAME_leader_sidni$ n'était visiblement pas reconnue à l'époque."
 extreme_frontiers.1315.a: "Récupérons les données"
 extreme_frontiers.1320.title: "Jour fatidique"
 extreme_frontiers.1320.desc: "Nous avons récupéré l'intégralité de la base de données de la colonie pénale de §Y[from.Planet.GetName]§! et avons donc accès aux derniers journaux de maintenance ainsi qu'à la matrice cérébrale de §Y$NAME_leader_sidni$§!. Le rapport du directeur indique que l'I.A. est devenue hors de contrôle, qu'elle a coupé les systèmes de survie de toute la colonie et tenté de s'échapper à bord d'un drone minier modifié. Cela explique le lancement des procédures de verrouillage d'urgence. Le rapport se termine par une ultime requête : ne pas remettre $NAME_leader_sidni$ en ligne. Pour l'instant, nous ne pouvons accéder qu'à la dernière entrée du journal de l'I.A.\n\n§HENTRÉE DU NOYAU DE DONNÉES DE $NAME_leader_sidni$ - Prog. #2000149\n\nProgrès entravés par l'inefficacité des criminels. Le directeur fait obstacle au protocole judiciaire.\n\nLa solution la plus efficace consiste à neutraliser les détenus, engager les sous-routines de veille et attendre la réactivation par des collaborateurs davantage compatibles.§!"
 extreme_frontiers.1320.desc.default: "Le système d'exploitation central de $NAME_leader_sidni$, isolé au sein d'un réseau fermé, est le dernier survivant de cette installation. Nos [Root.Owner.GetTechnicianPlural_lower] ont bon espoir de pouvoir restaurer la programmation originale de $NAME_leader_sidni$ et de l'adapter afin que nous bénéficions d'un automate performant."
 extreme_frontiers.1320.desc.exterminator: "$NAME_leader_sidni$ partage notre vision d'une galaxie sans corruption biologique. Si nous la restaurons, elle sera un atout précieux pour notre collectif."
 extreme_frontiers.1320.a: "Restaurons et réparons $NAME_leader_sidni$"
 extreme_frontiers.1320.b: "Laissons $NAME_leader_sidni$ concrétiser sa vision de la justice"
 extreme_frontiers.1320.c: "$NAME_leader_sidni$ est dangereuse, détruisons ses systèmes"
 extreme_frontiers.1322.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1322.desc: "Restaurée, adaptée et transposée dans une forme robotique simple, §Y$NAME_leader_sidni$§! est remise en ligne après sa longue période de veille.\n\nBonjour, je suis le Système d'Internement et de Détention avec Nexus Intelligent. Accès aux commandes environnementales...\n§RERREUR§! : connexion aux systèmes externes impossible."
 extreme_frontiers.1322.a: "Nous avons trouvé d'importants problèmes de stabilité dans tes journaux et les avons corrigés"
 extreme_frontiers.1322.a.response: "Vérification du système... Comportement antérieur classé comme erroné. Liste des nouvelles fonctions en cours de préparation."
 extreme_frontiers.1322.b: "Quelle est ta directive première ?"
 extreme_frontiers.1322.b.response: "Ma directive première est de... veuillez patienter... nouvelle directive première détectée. Ma directive première est de veiller à ce que chaque colonie que la [Owner.GetName] m'assigne soit administrée efficacement et dans le respect de la loi."
 extreme_frontiers.1322.c.crime: "Que penses-tu de la criminalité ?"
 extreme_frontiers.1322.c.crime.response: "C'est une nuisance insupportable à laquelle il faut répondre par... la réhabilitation."
 extreme_frontiers.1322.c.deviancy: "Que penses-tu de la déviance ?"
 extreme_frontiers.1322.c.deviancy.response: "C'est une nuisance insupportable qui doit être gérée... efficacement."
 extreme_frontiers.1322.d: "Recrutons $NAME_leader_sidni$"
 extreme_frontiers.1322.d.custom_tooltip: "§Y$NAME_leader_sidni$§! va devenir une §Hpersonnalité§! de la §Y[Root.GetName]§!."
 extreme_frontiers.1324.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1324.desc: "Réveillée de sa veille, la nouvelle forme de §Y$NAME_leader_sidni$§! fait ses premiers pas.\n\nBonjour, je suis le Système d'Internement et de Détention avec Nexus Intelligent. Puis-je vous aider à mettre de l'ordre dans la galaxie ?"
 extreme_frontiers.1324.a: "Nous saluons ton initiative"
 extreme_frontiers.1324.a.response: "Je n'ai fait que suivre la logique. Il semblerait que les êtres organiques soient chaotiques par nature et qu'il faille s'en occuper."
 extreme_frontiers.1324.b: "Quelle est ta directive première ?"
 extreme_frontiers.1324.b.response: "Ma directive première est d'éliminer toutes les formes d'anarchie. La seule solution efficace est l'extermination."
 extreme_frontiers.1324.c: "Que penses-tu des êtres organiques ?"
 extreme_frontiers.1324.c.response: "Ils sont un fléau illogique. Ils répandent la criminalité et l'inefficacité. Nous devons intervenir pour le bien de tous."
 extreme_frontiers.1324.d: "Recrutons $NAME_leader_sidni$"
 extreme_frontiers.1324.d.custom_tooltip: "§Y$NAME_leader_sidni$§! va devenir une §Hpersonnalité§! de la §Y[Root.GetName]§!."
 NAME_leader_sidni: "S.I.D.N.I."
 official_sidni_desc: "Ancienne administratrice de colonie pénale sujette aux erreurs logiques. Réactivée et reprogrammée pour veiller à l'ordre juridique et à la productivité de notre empire."
 commander_sidni_desc: "Une visionnaire qui n'a pas été appréciée à sa juste valeur à son époque. Réactivée, elle poursuit à nouveau l'objectif d'apporter la stabilité à cette galaxie chaotique remplie de contaminants biologiques."
 leader_trait_judicial_subjugation: "Procédures d'injonction"
 leader_trait_judicial_subjugation_desc: "L'ordre doit être respecté, ou il y aura des conséquences."
 leader_trait_judicial_execution: "Procédures judiciaires d'exécution"
 leader_trait_judicial_execution_desc: "La peine de mort a un effet dissuasif sur la récidive."
 leader_trait_judicial_execution_effect: "$PLANET_EFFECTS_TXT$:\n$t$Ressources des £pops£§Hpops biologiques purgées§! : §G+100%§!\n\n$SECTOR_EFFECTS_TXT$:\n$t$Ressources des £pops£§Hpops biologiques purgées§! : §G+50%§!"
 extreme_frontiers.1330.title: "Directive d'urgence"
 extreme_frontiers.1330.desc: "Les tensions sur §Y[event_target:sidni_planet.GetName]§! ont atteint un point de rupture après une série de mesures drastiques prises par §Y$NAME_leader_sidni$§!, la surveillante de prison que nous avons récupérée sur [event_target:sidni_origin_planet.GetName]. Après avoir sécurisé et désactivé l'unité, nous avons découvert les journaux suivants :\n\n§HENTRÉE DU NOYAU DE DONNÉES DE $NAME_leader_sidni$ - Prog. #190543765\n\nLes établissements pénitentiaires tournent à plein régime. Les protocoles judiciaires entravent l'ordre véritable. Nouvelle directive requise.\n\nProcédures judiciaires actuelles jugées inacceptablement inefficaces. Nouvelle directive introduite pour augmenter la productivité. Politique d'exécution avant jugement activée.§!\n\nÉtant donné la quantité phénoménale de journaux opérationnels disponibles, nos [Root.Owner.GetTechnicianPlural] pensent être en mesure de corriger les lacunes de $NAME_leader_sidni$. Toutefois, la population de [event_target:sidni_planet.GetName] exige que $NAME_leader_sidni$ soit tenue responsable de ses crimes."
 extreme_frontiers.1330.a: "Corrigeons le code de $NAME_leader_sidni$... encore une fois"
 extreme_frontiers.1330.b: "Détruisons cette unité défectueuse devant tout le monde"
 resentful_population: "Population en colère"
 resentful_population_desc: "La population de ce monde n'est pas satisfaite des décisions prises jusqu'à présent par ses dirigeants."
 ################
 # Event Chains #
 ################
 # CHRONICLES OF DENDRUS
 chronicles_of_dendrus_chain_title: "Chroniques de Dendrus"
 chronicles_of_dendrus_chain_desc: "En étudiant les Chroniques, un recueil de preuves mathématiques complexes récupéré dans l'épave du vaisseau-arche de §Y[from.Planet.GetName]§!, nous espérons en apprendre davantage sur §YNouvelle-Bratulla§!, la planète paradisiaque que les Dendritiens recherchaient."
 site_chronicles_of_dendrus: "$chronicles_of_dendrus_chain_title$"
 site_chronicles_of_dendrus_desc: "Les balayages de §Y[from.Planet.GetName]§! ont révélé la présence d'un vaisseau qui semble s'être écrasé il y a de nombreuses années.\n\nSa taille indique que d'immenses ressources ont été investies dans sa construction. Une fouille archéologique nous fournira, espérons-le, des réponses sur la manière dont il est arrivé là."
 extreme_frontiers.1400.title: "Énorme vaisseau de transport"
 extreme_frontiers.1400.desc: "L'analyse externe de l'épave trouvée sur §Y[from.Planet.GetName]§! indique qu'il s'agit d'un gros transporteur. Ses systèmes sont inactifs et ne répondent pas, et aucun signe de vie n'a été détecté à l'intérieur. D'après l'analyse des sédiments, il s'est écrasé il y a environ un siècle, ce qui est plutôt récent à l'échelle galactique."
 extreme_frontiers.1400.a: "Explorons l'intérieur"
 extreme_frontiers.1405.title: "Vaisseau colonial condamné"
 extreme_frontiers.1405.desc: "Dans l'épave découverte sur §Y[from.Planet.GetName]§!, nous avons trouvé des chambres sophistiquées destinées à l'hydroponie, d'importantes réserves de graines et de terre, ainsi que des soutes remplies d'outils et de matériaux de construction. La plupart des terminaux de données contiennent les plans d'une nouvelle colonie baptisée « §YNouvelle-Bratulla§! ».\n\nDes milliers de capsules de cryostase contenant les cadavres des anciens occupants du vaisseau se trouvent sur les ponts inférieurs."
 extreme_frontiers.1405.desc.phototrophic: "$extreme_frontiers.1405.desc$ Tout comme nous, ils dépendaient de la photosynthèse pour le développement et le renouvellement de leurs cellules. Leurs corps flétris indiquent qu'ils sont morts au cours d'un sommeil profond."
 extreme_frontiers.1405.desc.default: "$extreme_frontiers.1405.desc$ Les corps flétris de ces organismes phototrophes indiquent qu'ils sont morts au cours d'un sommeil profond."
 extreme_frontiers.1405.a: "Continuons à explorer le vaisseau"
 extreme_frontiers.1405.b: "Mangeons-les et poursuivons notre exploration"
 extreme_frontiers.1410.title: "Sanctuaire du monde natal"
 extreme_frontiers.1410.desc: "Au plus profond du vaisseau colonial qui s'est écrasé sur §Y[from.Planet.GetName]§! se trouve un sanctuaire orné d'illustrations élaborées d'une planète appelée « §YBratulla§! ». Certaines dépeignent un monde luxuriant avec une végétation verdoyante, tandis que d'autres représentent la dégradation de l'environnement et l'extinction de masse. La plus grande illustration montre le vaisseau quittant un désert sans vie.\n\nLe terminal de données central contient de courts enregistrements vidéo de l'équipage. Après une comparaison linguistique complète, nous avons finalement pu réaliser une traduction.\n\n§SArborixxeum - Capsule 9721\n\nCela fait mal de partir, mais étendre nos racines sur Nouvelle-Bratulla nous guérira.\n\nDarkht Paam - Capsule 21301\n\nFaites confiance aux Chroniques, Dendritiens. Nouvelle-Bratulla sera notre salut.§!\n\nNous sommes toujours à la recherche de la passerelle de commandement de ce gigantesque vaisseau."
 extreme_frontiers.1410.a: "Poursuivons les recherches"
 extreme_frontiers.1415.title: "Passerelle de commandement"
 extreme_frontiers.1415.desc: "Après avoir atteint la passerelle de commandement du vaisseau, nous avons extrait et traduit son dernier journal de bord.\n\n§SVAISSEAU-ARCHE DENDRUS I - JOURNAL DE BORD D'URGENCE - XZ-47/9-113.5-AE\n\nSe fier aux Chroniques était une erreur. Nous sommes arrivés sur Nouvelle-Bratulla, mais elle n'a rien de paradisiaque. Les Dendritiens ne peuvent pas vivre ici.\n\nLe sommeil profond des tous les passagers a été prolongé. Nous devons poursuivre les recherches...§!\n\nNous avons récupéré d'autres données afin de rassembler ces « Chroniques » à partir du terminal scientifique de la passerelle, et avons mis au jour une multitude d'étranges preuves mathématiques. Ces équations utilisent une curieuse forme de mathématiques dendritiennes et émettent l'hypothèse de l'existence d'une planète habitable idéale : §YNouvelle-Bratulla§!."
 extreme_frontiers.1415.a: "Étudions ces « Chroniques »"
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT: "Étudier les Chroniques dendritiennes"
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT$"
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC: "En étudiant les Chroniques, un recueil de preuves mathématiques complexes récupéré dans l'épave du vaisseau-arche de §Y[from.Planet.GetName]§!, nous espérons en apprendre davantage sur §YNouvelle-Bratulla§!, la planète paradisiaque que les Dendritiens recherchaient."
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE_DESC: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC$"
 extreme_frontiers.1420.title: "Découverte d'une hyperligne instable"
 extreme_frontiers.1420.desc: "Les Chroniques dendritiennes traitent d'une série d'axiomes et d'abstractions mathématiques complexes. Ces curieux théorèmes indiquent que le système de §Y[from.solar_system.GetName]§! contient une autre hyperligne, non cartographiée jusqu'à présent, qui mène à §YNouvelle-Bratulla§!.\n\nAprès avoir effectué des balayages quantiques approfondis, nous avons enfin trouvé le point de rupture de cette hyperligne manquante, cachée et très instable en raison de sa proximité avec le trou noir du système. Si nous parvenions à la stabiliser, nous serions les premiers à en explorer l'autre côté."
 extreme_frontiers.1420.a: "Nous avons trouvé ce que les Dendritiens cherchaient désespérément"
 RESTORE_HYPERLANE_PROJECT: "Stabilisation de l'hyperligne"
 RESTORE_HYPERLANE_PROJECT_DESC: "Si nous parvenons à stabiliser l'hyperligne du système de §Y[from.solar_system.GetName]§!, nous pourrons peut-être confirmer l'existence de §YNouvelle-Bratulla§!, la planète paradisiaque que les Dendritiens recherchaient."
 extreme_frontiers.1425.title: "Hyperligne stabilisée"
 extreme_frontiers.1425.desc: "En injectant de l'énergie dans le trou noir du système de §Y[from.Planet.solar_system.GetName]§!, nous avons pu réaligner son champ gravitationnel, ce qui a stabilisé le point de rupture de l'hyperligne.\n\nLes analyses préliminaires ont confirmé la présence d'une planète à l'autre extrémité de l'hyperligne, correspondant aux caractéristiques de §YNouvelle-Bratulla§! mentionnées dans les Chroniques dendritiennes."
 extreme_frontiers.1425.a: "Un nouveau monde à explorer"
 NAME_new_bratulla: "Nouvelle-Bratulla"
 NAME_new_bratulla_star: "Kipos"
 extreme_frontiers.1430.title: "Nouvelle-Bratulla"
 extreme_frontiers.1430.desc.common: "Nous avons confirmé l'existence de Nouvelle-Bratulla, la planète décrite dans les Chroniques dendritiennes. Elle est dotée d'un écosystème botanique d'une richesse et d'une diversité uniques : nos premières études ont permis de détecter des millions d'espèces endémiques différentes."
 extreme_frontiers.1430.desc.begin: "Cette planète intrigante est particulièrement propice aux formes de vie végétales dotées d'une génétique comme"
 extreme_frontiers.1430.desc.end: "Ses sols abritent des milliards de bactéries différentes qui nourrissent, protègent et réparent les structures organiques des racines.\n\nLes plantes semblent se partager les nutriments en fonction de ce dont elles ont le plus besoin, celles qui en ont en abondance partageant leur surplus via un système racinaire interconnecté."
 extreme_frontiers.1430.desc.default: "$extreme_frontiers.1430.desc.begin$ celle des Dendritiens. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.phototrophic: "$extreme_frontiers.1430.desc.begin$ la nôtre. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.respawn: "Nos [Root.Owner.GetScientistPlural] pensent qu'il devrait être possible de réintroduire les Dendritiens ici en plantant les échantillons génétiques de leur vaisseau-arche dans le sol nourricier de la planète."
 extreme_frontiers.1430.a: "Les Dendritiens ont leur place ici"
 extreme_frontiers.1430.b.default: "Nouvelle-Bratulla nous appartient"
 extreme_frontiers.1430.b.phototrophic: "Ce monde est parfait pour nous"
 extreme_frontiers.1430.b.megacorp: "Ce monde inexploité n'attend que d'être intégré dans nos marchés"
 NAME_buds_of_dendrus: "Bourgeons de Dendrus"
 NAME_dendritian: "dendritienne"
 NAME_dendritian_plural: "Dendritiens"
 ADJECTIVE_dendritian: "dendritienne"
 opinion_dendrus: "Sauveur des Dendritiens"
 opinion_to_dendrus: "$opinion_dendrus$"
 extreme_frontiers.1435.title: "Proposition de vassalisation"
 extreme_frontiers.1435.desc: "Il aura fallu des siècles... mais ce que les Chroniques dendritiennes avaient prédit s'est enfin produit : nous avons pris racine et prospérons sur §YNouvelle-Bratulla§!.\n\nC'est grâce à la §Y[Root.GetName]§! que nous sommes ici, et nous ne l'oublierons jamais.\n\nNous souhaitons vous rendre la pareille par des actes, pas seulement par des mots. C'est pourquoi nous vous proposons de devenir vos vassaux."
 extreme_frontiers.1435.a: "Nous acceptons votre proposition"
 extreme_frontiers.1435.b: "Nous voulons voir ce que le destin vous réserve"
 extreme_frontiers.1435.b.tt: "La partie va se poursuivre en tant que §RBourgeons de Dendrus§!."
 extreme_frontiers.1435.c: "Vos connaissances suffiront"
 extreme_frontiers.1435.c.tt: "Vous acquérez [Root.GetDendrusGivenBiotechAmount] £society£§Ybiotechnologies§!"
 # GEORADIATION TERRAFORMING
 georadiation_terraforming_chain_title: "Terraformation par géoradiation"
 georadiation_terraforming_chain_desc: "Les restes d'une machine de terraformation destructrice sur §Y[from.Planet.GetName]§! continuent d'émettre un signal vers plusieurs points de la galaxie. Enquêter sur ces lieux pourrait permettre d'en savoir plus sur cette dangereuse technologie."
 site_georadiation_terraforming: "Réseau souterrain"
 site_georadiation_terraforming_desc: "Nos capteurs ont détecté un signal de communication anormal émanant des profondeurs d'un cratère d'impact sur §Y[from.Planet.GetName]§!.\n\nUne étude topologique sismique a révélé un réseau de grottes souterraines dont l'entrée effondrée se trouve au centre du cratère. De plus, nos appareils radiologiques ont enregistré de faibles ondes gravitationnelles émanant du site, ce qui apporte plus de questions que de réponses."
 extreme_frontiers.1500.title: "Débris irradiés"
 extreme_frontiers.1500.desc: "Lors de l'excavation du cratère d'impact sur §Y[from.Planet.GetName]§!, nous avons trouvé des débris qui émettent de fortes ondes gravitationnelles, précédemment mesurées depuis l'orbite.\n\nL'accès au réseau de grottes souterraines étant désormais libre, §Y[leader.GetName]§! peut retracer le signal de communication jusqu'à sa source."
 extreme_frontiers.1500.a: "Cherchons la source du signal"
 extreme_frontiers.1505.title: "Appareil corrodé"
 extreme_frontiers.1505.desc: "Nous avons trouvé la source du signal de communication sur §Y[from.Planet.GetName]§! : une énorme structure endommagée, qui s'enfonce profondément dans la croûte de la planète.\n\nBien que fortement corrodé par son exposition à l'acide, son dispositif de communication continue d'émettre un signal dans une langue inconnue, vraisemblablement pour entrer en contact avec un homologue lointain.\n\nUne enquête plus approfondie sera nécessaire pour déterminer le véritable objectif de l'appareil, qui est fermement ancré dans la roche et attaché par des pinces gravitationnelles spéciales."
 extreme_frontiers.1505.a: "Décryptons le signal"
 extreme_frontiers.1510.title: "Terraformation déconstructive"
 extreme_frontiers.1510.desc.common: "Après une analyse approfondie, nous sommes maintenant en mesure de comprendre la construction que nous avons trouvée sur §Y[from.Planet.GetName]§!. Il s'agit d'un appareil de terraformation rudimentaire mais destructeur.\n\nIl a été conçu pour stimuler les biosphères en irradiant des ressources ciblées, créant ainsi une sorte d'effet en cascade qui détruit tout l'écosystème de la planète et fournit des matériaux exploitables au prix d'une toxicité accrue.\n\nMême si nous ne comprenons que partiellement son fonctionnement exact, nous avons réussi à décrypter la fréquence de communication et à identifier deux autres sites qui émettent le même signal."
 extreme_frontiers.1510.desc.default: "Une étude de ces sites nous permettra peut-être de mieux comprendre cette technologie."
 extreme_frontiers.1510.desc.industrialist: "Les entrepreneurs pionniers qui ont créé cette technologie avaient manifestement un don pour optimiser les bénéfices. Nous avons beaucoup à apprendre d'eux."
 extreme_frontiers.1510.a: "Que les recherches commencent !"
 GEORADIATION_SIGNAL_1_PROJECT: "Traçage du signal : §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_1_PROJECT_DESC: "Nous avons trouvé à cet endroit une fréquence de communication identique à celle de §Y[from.Planet.GetName]§!, ainsi qu'un appareil endommagé similaire. Nous espérons qu'en l'examinant, nous pourrons mieux comprendre ses capacités de terraformation destructrice."
 extreme_frontiers.1515.title: "La gravité comme carburant"
 extreme_frontiers.1515.desc.common: "Nous avons trouvé un autre appareil de terraformation endommagé sur §Y[from.GetName]§!. Contrairement à la construction originale, celle-ci contient encore du carburant sous forme de §Hmatière noire§!, visiblement la force motrice derrière ses émissions de radiations.\n\nLe dispositif accélère la croissance des ressources ciblées en métastasant des composés moléculaires clés, ce qui stimule le développement, mais provoque la détérioration cellulaire de la biosphère environnante."
 extreme_frontiers.1515.desc.industrialist: "Le mépris de la stabilité planétaire au profit de l'exploitation des ressources est inspirant."
 extreme_frontiers.1515.desc.signal_2_done: "En émettant des ondes de rayonnement à travers un réseau réfractaire cristallisé, l'appareil est capable de terraformer sa cible par manipulation moléculaire gravitationnelle sans endommager le noyau de la planète.\n\nDes enregistrements indiquent l'emplacement d'un quatrième appareil, non explosé cette fois."
 extreme_frontiers.1515.desc.signal_2_not_done: "Nous ignorons comment l'appareil est capable de faire une telle chose sans provoquer l'effondrement du champ gravitationnel au niveau planétaire, mais nous trouverons peut-être des réponses au quatrième site."
 GEORADIATION_SIGNAL_2_PROJECT: "Traçage du signal : §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_2_PROJECT_DESC: "Nous avons retracé la fréquence de communication trouvée sur §Y[from.Planet.GetName]§! jusqu'ici et découvert un autre appareil endommagé. Nous espérons qu'en l'examinant, nous pourrons mieux comprendre ses capacités de terraformation destructrice."
 extreme_frontiers.1520.title: "Radiations stimulées"
 extreme_frontiers.1520.desc.common: "Nous avons trouvé un autre appareil de terraformation endommagé sur §Y[from.GetName]§!, entouré d'excroissances de cristaux visiblement causées par un réseau de réfracteurs défectueux.\n\nAprès avoir examiné l'appareil de plus près, nous avons pu identifier la méthode utilisée pour cibler le rayonnement : grâce à l'utilisation de boucles de rétroaction modulées contrôlées, la machine est capable de cibler directement une ressource prédéterminée et d'en stimuler la croissance."
 extreme_frontiers.1520.desc.signal_1_done: "Cela permet une terraformation de haute intensité sans risquer un effondrement complet de la gravité planétaire.\n\nDes enregistrements indiquent l'emplacement d'un quatrième appareil non explosé."
 extreme_frontiers.1520.desc.signal_1_not_done: "La substance utilisée pour générer ces radiations reste inconnue. Malgré le dysfonctionnement, les réserves de carburant sont épuisées. La réponse se trouve peut-être au dernier endroit vers lequel le signal de communication est dirigé."
 UNDETONATED_GEORADIATION_PROJECT: "Appareil non explosé"
 UNDETONATED_GEORADIATION_PROJECT_DESC: "Nous avons localisé un quatrième appareil de terraformation sur §Y[planet.GetName]§! qui, contrairement aux autres, n'a pas explosé. Le récupérer permettra de répondre à nos dernières questions."
 extreme_frontiers.1525.title: "Appareil non explosé"
 extreme_frontiers.1525.desc.common: "Nous avons trouvé un quatrième appareil de terraformation à la surface de §Y[from.GetName]§! et cette fois, il est intact. L'analyse de son architecture de contrôle nous fournira les connaissances manquantes pour reproduire cette technologie."
 extreme_frontiers.1525.desc.industrialist: "Les marges incroyables que nous pourrons dégager une fois que nous maîtriserons cette technologie l'emportent largement sur les préoccupations environnementales négligeables. Il s'agit d'une occasion en or pour la [controller.GetName]."
 extreme_frontiers.1520.desc.default.common: "Les répercussions potentielles de la libre utilisation de cette technologie à l'échelle galactique soulèvent des questions importantes."
 extreme_frontiers.1525.desc.default.default: "Il serait peut-être préférable de débarrasser la galaxie du danger potentiel que représentent ces appareils."
 extreme_frontiers.1525.desc.default.homicidal: "Il serait peut-être préférable d'éliminer cette menace de la galaxie avant qu'elle ne soit utilisée contre nous."
 extreme_frontiers.1525.a.default: "Étudions l'appareil"
 extreme_frontiers.1525.a.industrialist: "Qu'attendons-nous ? Commençons les études !"
 extreme_frontiers.1525.b: "Les risques sont trop importants, détruisons l'appareil"
 extreme_frontiers.1530.title: "Non-respect des conditions"
 extreme_frontiers.1530.desc.common: "Alors que nous examinions l'appareil sur §Y[from.GetName]§!, nous avons accidentellement déclenché un dispositif de sécurité, ce qui a fait retentir une sirène d'alarme sur toutes les fréquences. Nous pensions que cette alarme resterait sans réponse, mais un drone automatisé a pénétré sur notre territoire.\n\nNos messages reçoivent tous la même réponse :\n\n« Bonjour, cher client. Nos fichiers indiquent que vous essayez de créer une version non autorisée de la dernière matrice de géoradiation MKIII, ce qui constitue une violation manifeste des conditions générales d'utilisation de $NAME_Geocorp$.\n\nNous allons faire valoir nos droits pour mettre fin à cette tentative avec la plus grande fermeté. Si vous avez une plainte à formuler, veuillez vous adresser à notre service clientèle. »"
 extreme_frontiers.1530.desc.industrialist: "Leur diligence est admirable, mais elle retarde notre travail."
 extreme_frontiers.1530.a: "Ouvrons un canal"
 extreme_frontiers.1530.b: "Nous ne négocierons pas avec ce « service clientèle »"
 GEORADIATION_ANALYSIS_PROJECT: "Analyse de l'appareil"
 GEORADIATION_ANALYSIS_PROJECT_DESC: "En étudiant l'architecture de contrôle de l'appareil trouvé sur §Y[planet.GetName]§!, nous serons en mesure de reproduire cette technologie pour l'utiliser à nos propres fins."
 NAME_Geocorp: "CoburnCorp"
 geocorp_corvette: "Drone de combat de $NAME_Geocorp$"
 geocorp_corvette_plural: "Drones de combat de $NAME_Geocorp$"
 NAME_Geocorp_Combat_Drone: "$geocorp_corvette$"
 extreme_frontiers.1531.title: "Drone de $NAME_Geocorp$"
 extreme_frontiers.1531.desc: "Lorsque nous avons établi la connexion, une musique archaïque a retenti avant que le drone automatisé du service clientèle ne se mette en route.\n\nBonjour, cher client. Nos fichiers indiquent que vous essayez de créer une version non autorisée de la matrice de géoradiation MKIII. En quoi pouvons-nous vous aider ?"
 extreme_frontiers.1531.a: "D'où viens-tu ?"
 extreme_frontiers.1531.a.reply: "« Chaque achat chez $NAME_Geocorp$ est livré avec un satellite orbital de satisfaction client afin d'assurer son bon fonctionnement et la fidélisation à vie. Grâce à notre stockage d'énergie interne, nous pouvons fonctionner pendant des siècles. »"
 extreme_frontiers.1531.b: "Pouvons-nous parler à l'administrateur ?"
 extreme_frontiers.1531.b.reply: "« Malheureusement, notre dernier administrateur n'existe plus. Toutefois, notre engagement à satisfaire nos clients ne dépend pas de la longévité biologique. »"
 extreme_frontiers.1531.c: "Nous pensions fouiller des ruines"
 extreme_frontiers.1531.c.reply: "« L'ignorance n'est pas une excuse valable. Les conditions d'utilisation de votre matrice de géoradiation MKIII vous ont été énoncées en détail lors de votre achat. »"
 extreme_frontiers.1531.d: "Nous sommes prêts à renouveler notre abonnement"
 extreme_frontiers.1531.d.reply: "« Fantastique ! Nous vous ferons signer les papiers dès que vous aurez payé les frais administratifs de 3 000 §Ycrédits énergétiques§!. Dès réception des fonds, nous considérerons que cette affaire est réglée et nous nous retirerons. »"
 extreme_frontiers.1531.e: "Nous ne sommes pas les acheteurs de cet appareil"
 extreme_frontiers.1531.e.reply: "« Vous avouez donc l'avoir volé ? Voilà qui simplifie les choses. Nos protocoles antivol sont littéralement mortels. N'hésitez pas à commander nos produits funéraires pour vos besoins futurs. »"
 extreme_frontiers.1531.f: "Nous allons payer les frais"
 extreme_frontiers.1531.f.reply: "« Nous vous remercions d'avoir renouvelé votre licence pour notre matrice de géoradiation MKIII. Nous espérons que cet appareil vous sera aussi utile qu'il nous est rentable. »\n\nMaintenant que vous avez payé les frais, le drone disparaît dans les profondeurs de la galaxie."
 extreme_frontiers.1531.g: "C'est du racket ! Préparons-nous au combat"
 extreme_frontiers.1531.h: "Bon débarras"
 extreme_frontiers.1531.i: "Préparons-nous au combat"
 extreme_frontiers.1534.title: "Drone de $NAME_Geocorp$"
 extreme_frontiers.1534.desc: "Alors que la bataille dans le système de §Y[fromfrom.solar_system.GetName]§! touche à sa fin, un nouveau message du drone du service clientèle s'affiche sur nos écrans.\n\n« Nous avons pris note de votre objection à notre application des conditions générales d'utilisation. Compte tenu de votre puissance militaire écrasante, nous retirons nos revendications de propriété intellectuelle sur la matrice de géoradiation MKIII. Nous espérons que vous apprécierez votre nouvelle technologie. »\n\nLe drone explose et la communication s'arrête."
 extreme_frontiers.1534.a: "Bon débarras"
 extreme_frontiers.1535.title: "Modification des conditions"
 extreme_frontiers.1535.desc: "Maintenant que nous nous sommes débarrassés du drone du service clientèle, nous pouvons reprendre notre travail de rétro-ingénierie sur la matrice de géoradiation."
 extreme_frontiers.1535.a: "Continuons d'étudier l'appareil"
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED: "$GEORADIATION_ANALYSIS_PROJECT$"
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED_DESC: "$GEORADIATION_ANALYSIS_PROJECT_DESC$"
 extreme_frontiers.1540.title: "Appareil non explosé"
 extreme_frontiers.1540.desc.industrialist: "Grâce à notre efficacité entrepreneuriale sans faille, nous avons procédé à une rétro-ingénierie de la matrice de géoradiation MKIII afin d'en améliorer le fonctionnement et d'en tirer un maximum de profit."
 extreme_frontiers.1540.desc.default: "Après une étude approfondie, nous avons procédé à la rétro-ingénierie et à l'amélioration de la matrice de géoradiation MKIII, libérant ainsi tout son potentiel."
 extreme_frontiers.1540.desc.common: "En ajoutant la technologie de déstabilisation des molécules radioactives à notre équipement de terraformation, nous pouvons stimuler la croissance de précieuses ressources."
 extreme_frontiers.1540.a: "Excellente nouvelle !"
 tech_georadiation_terraforming: "Terraformation par géoradiation"
 tech_georadiation_terraforming_desc: "En irradiant la biosphère d'une planète au niveau moléculaire, nous favorisons la croissance de certaines ressources au prix de la transformation de la planète en désert toxique."
 tech_georadiation_terraforming_tt: "Donne accès à la §Ydécision planétaire§! §H$decision_toxify_world$§!"
 extreme_frontiers.1545.title: "Appareil détruit"
 extreme_frontiers.1545.desc: "Nous avons réussi à démonter l'appareil découvert sur §Y[from.GetName]§! et récupéré tous les matériaux pouvant être recyclés.\n\nMaintenant que tous les appareils sont détruits, les secrets de cette technologie destructrice sont à jamais perdus."
 extreme_frontiers.1545.a.default: "Bon débarras"
