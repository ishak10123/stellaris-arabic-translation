 extreme_frontiers.2005.title: "Ressources toxiques"
 extreme_frontiers.2005.desc.common: "Notre premier projet de §Yterraformation par géoradiation§! sur §Y[target.GetName]§! est terminé.\n\nGrâce à l'amélioration de la matrice de géoradiation, nous avons transformé la surface de la planète en désert toxique inhabitable et obtenu des ressources d'une richesse sans précédent."
 extreme_frontiers.2005.desc.industrialist: "Cette étape importante marque le début d'une nouvelle ère en matière d'exploitation des ressources et de profits."
