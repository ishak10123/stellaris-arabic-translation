 #STAGE EVENTS
 bio.25.name: "Développement collectif" #STAGE ONE
 bio.25.desc.no_options: "Notre [owner.GetGovernmentName] est en train de se transformer. Nous sommes sur le point d'atteindre notre plein potentiel, conscients que cette entreprise pourrait changer radicalement notre nature. Planifier notre évolution est une tâche d'une grande importance. Les changements que nous opérons aujourd'hui nous marqueront pour longtemps."
 bio.25.desc.has_options: "$bio.25.desc.no_options$\n\nNous devons choisir une voie pour la première phase de notre développement."
 bio.25.a: "$bio.5.a$"
 bio.25.b: "$bio.5.b$"
 bio.25.c: "$bio.5.c$"
 bio.30.name: "Convergence de la Conscience" #STAGE TWO
 bio.30.desc.no_options: "Être les maîtres de notre propre évolution a entraîné un changement significatif. Nous comprenons mieux les caractéristiques génétiques, la reproduction et le séquençage de l'ADN.\n\nL'apogée de notre évolution est à portée de main.\n\nBientôt, nous serons ce que nous aurions toujours dû être."
 bio.30.desc.has_options: "$bio.30.desc.no_options$Nous avons la possibilité de continuer sur notre lancée actuelle ou de choisir une nouvelle orientation."
 bio.30.a: "$bio.10.a$"
 bio.30.b: "$bio.10.b$"
 bio.30.c: "$bio.10.c$"
 bio.35.name: "Coalescence évolutionnaire" #STAGE THREE
 bio.35.desc.no_options: "Nous sommes à la veille d'un changement évolutif important. Nous devons prendre une décision cruciale quant à la voie que nous allons suivre pour réaliser pleinement notre potentiel."
 bio.35.desc.has_options: "$bio.35.desc.no_options$\n\nNous devons à nouveau choisir une priorité pour l'avenir."
 bio.35.a: "$bio.15.a$"
 bio.35.b: "$bio.15.b$"
 bio.35.c: "$bio.15.c$"
