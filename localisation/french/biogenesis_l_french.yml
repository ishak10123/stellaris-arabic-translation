 behemoth_cocoon_menu_title: "Maturation et croissance"
 behemoth_cocoon_effect: "Un §Ymastodonte§! bien nourri peut faire son nid dans une géante gazeuse pendant §Y3 ans§! pour évoluer vers une créature encore plus puissante."
 behemoth_cocoon_progress_activity_key: "Formation du cocon"
