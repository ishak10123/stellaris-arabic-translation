 ### Hive Fallen Empire #
 RT_INCOMPLETE_OVERMIND: "Esprit supérieur incomplet"
 gov_war_splinter: "Fragment de guerre"
 gov_war_splinter_desc: "Les instincts agressifs et guerriers qui, auparavant, ne représentaient qu'une infime partie de la Conscience. Aujourd'hui, ils tentent de prendre le contrôle des autres fragments, du moins quand ils ne se battent pas ente eux."
 gov_growth_splinter: "Fragment de croissance"
 gov_growth_splinter_desc: "Le désir d'évolution et de changement de la Conscience déchue. Il cherche constamment à se redéfinir et, par conséquent, il n'est pas facile pour lui de contrôler les autres."
 gov_control_splinter: "Fragment de contrôle"
 gov_control_splinter_desc: "L'instinct obsessionnel qui appelle à la suppression de toute déviance et promeut l'uniformité. Il veut à tout prix contrôler les autres fragments, mais le chaos permanent inhérent à notre univers l'en empêche."
 gov_fused_ascendancy: "Ascendance fusionnée"
 gov_fused_ascendancy_desc: "Autrefois brisée, aujourd'hui unie. Les cicatrices de la fragmentation ne doivent pas être vues comme une faiblesse, elles sont la force de cet empire renaissant. L'ancienne conscience collective a échoué, mais la nouvelle a l'intention de régner pour toujours."
 civic_fragmented_command: "Commandement fragmenté"
 civic_fragmented_command_desc: "Cet empire déchu ne possède qu'un fragment d'un ensemble autrefois unifié. Il lui manque des éléments clés pour gouverner pleinement un empire spatial."
 civic_hyper_aggressive_drones: "Drones hyper-agressifs"
 civic_hyper_aggressive_drones_desc: "Les drones de cet empire déchu passent leur temps à se battre, ce qui entraîne une grave pénurie de ressources."
 civic_unstable_drones: "Drones instables"
 civic_unstable_drones_desc: "Les drones de cet empire déchu sont constamment soumis à une évolution forcée. Ils manquent souvent de membres pour accomplir les tâches qui leur sont assignées."
 civic_stunted_drones: "Drones inhibés"
 civic_stunted_drones_desc: "Les drones de cet empire déchu sont tellement contrôlés qu'ils ne se détournent en aucune circonstance de leurs tâches, même en cas d'incendie."
 civic_restored_mind: "Conscience restaurée"
 civic_restored_mind_desc: "Une conscience ancienne qui a retrouvé son intégrité et obéit aux instincts du nouvel âge."
 civic_ancient_memories_of_war: "Vieux souvenirs de guerre"
 civic_ancient_memories_of_war_desc: "Cet empire renaissant fait revenir sur la scène galactique des manoeuvres et des formations depuis longtemps oubliées. Ses flottes obscurciront un jour les étoiles."
 civic_ancient_memories_of_growth: "Vieux souvenirs de croissance"
 civic_ancient_memories_of_growth_desc: "Cet empire renaissant ressuscite des méthodes d'ascension et de prospérité depuis longtemps oubliées. Ses drones dépasseront un jour les étoiles en nombre."
 civic_ancient_memories_of_control: "Vieux souvenirs de contrôle"
 civic_ancient_memories_of_control_desc: "Cet empire renaissant ravive des principes et des directives depuis longtemps oubliées. Son contrôle s'étendra un jour à toutes les étoiles."
