 unlocks_ship_2_bio: "Permet la technologie liée aux vaisseaux de classe §Ylutteur§! et §Ytisseur§! des empires déchus.\n"
 menp_cosmo_ship_2_desc_bio: "Ces vaisseaux transcendent les limites en déformant la relation entre l'espace et le temps. Leur structure compacte dissimule des capacités qu'aucun vaisseau traditionnel ne peut égaler."
 menp_cosmo_ship_3_desc_bio: "$tech_cosmogenesis_harbinger_desc$"
 unlocks_ship_3_bio: "Permet la technologie liée au vaisseau de classe §Yhéraut§! des empires déchus."
 menp_cosmo_ship_4_desc_bio: "$tech_cosmogenesis_stinger_desc$"
 unlocks_ship_4_bio: "Permet la technologie liée au vaisseau de classe §Ytransperceur§! des empires déchus."
 tech_cosmogenesis_mauler: "Lutteur codé"
 tech_cosmogenesis_mauler_desc: "Grâce au transcendantalisme spatio-temporel dimensionnel organique, ce lutteur est plus grand à l'intérieur que ne le suggère sa coque compacte et, grâce à sa masse musculaire dense, sa morsure est plus mortelle que ne le permettent les lois de la physique."
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_TITLE: "§HPermet les vaisseaux de classe§! lutteur codé"
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_DESC: "§HLutteur codé§!\n$tech_cosmogenesis_mauler_desc$"
 tech_cosmogenesis_weaver: "Tisseur de troubles"
 tech_cosmogenesis_weaver_desc: "Équipé d'une batterie d'armes de soutien qui dépasse son anatomie visible, le tisseur de troubles modifie complètement les normes spatiales. Il peut à lui seul changer le cours des batailles."
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_TITLE: "§HPermet les vaisseaux de classe§! tisseur de troubles"
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_DESC: "§HTisseur de troubles§!\n$tech_cosmogenesis_weaver_desc$"
 tech_cosmogenesis_harbinger: "Héraut dédaléen"
 tech_cosmogenesis_harbinger_desc: "Ces hérauts placent leurs appareils de combat dans de minuscules dimensions interconnectées, chacun formant un dédale de hangars pouvant générer une puissance de feu comparable à celle d'une flotte entière."
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_TITLE: "§HPermet les vaisseaux de classe§! héraut dédaléen"
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_DESC: "§HHéraut dédaléen§!\n$tech_cosmogenesis_harbinger_desc$"
 tech_cosmogenesis_stinger: "Transperceur énigmatique"
 tech_cosmogenesis_stinger_desc: "Ce transperceur est équipé de plus de systèmes d'armement que sa source d'énergie ne devrait pouvoir en supporter. Pourtant, il fonctionne et tire... sans interruption."
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_TITLE: "§HPermet les vaisseaux de classe§! transperceur énigmatique"
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_DESC: "§HTransperceur énigmatique§!\n$tech_cosmogenesis_stinger_desc$"
