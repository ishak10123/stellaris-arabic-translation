 bio.40.name: "Caractéristiques biologiques distinctives" #FINAL STAGE - TRADITION TREE CHOICE
 bio.40.desc: "Que nous recherchions la forme la plus pure de nous-mêmes, que nous nous clonions pour être plus efficaces ou que nous nous modifiions génétiquement par des mutations ciblées, ce moment marque un point de non-retour."
 bio.40.desc.evopred: "$bio.20.desc.evopred$"
 bio.40.a: "$bio.20.a$"
 bio.40.b: "$bio.20.b$"
 bio.40.c: "$bio.20.c$"
 #Random Events (Hives)
 bio.110.name: "Répartition des tâches"
 bio.110.desc: "Nous avons commencé à améliorer biologiquement notre [target.GetGestaltEntityName] et devons désormais donner la priorité aux progrès qui seront les plus bénéfiques pour notre civilisation.\n\nLa manipulation génétique sélective nous permet de créer des spécialistes possédant les caractéristiques physiques adaptées à chaque industrie.\n\nGrâce à ces nouvelles capacités, nous avons la possibilité de créer des [target.GetIndividualNamePlural] spécialisés dans la production d'énergie ou dans la défense."
 bio.110.a: "L'énergie est toujours utile"
 bio.110.b: "Donnons la priorité à la défense"
 bio.115.name: "Redondance générationnelle"
 bio.115.desc: "À la suite de l'introduction d'un nouveau modèle biologique pour nos drones, nous devons maintenant déterminer ce qu'il convient de faire avec ceux qui ne sont pas compatibles avec les améliorations génétiques.\n\nCertains drones plus anciens n'ont plus la force nécessaire pour ces améliorations. Nous pouvons soit les utiliser comme ouvriers pour le reste de leur vie, soit recycler leur biomatière pour alimenter la Conscience."
 bio.115.a: "Recyclons les drones plus anciens"
 bio.115.b: "Ils nous sont encore utiles"
 bio.120.name: "Vitesse ou endurance"
 bio.120.desc: "Une percée dans la recherche génétique a mis en évidence une nouvelle façon de renforcer l'efficacité neuronale, ce qui augmenterait considérablement la productivité des [target.GetIndividualName].\n\nToutefois, maintenir cette efficacité cérébrale accrue sur une période prolongée est dangereux et pourrait grandement réduire l'espérance de vie.\n\nNous devons décider si nous voulons conserver notre espérance de vie actuelle ou augmenter nos fonctions cérébrales au détriment d'une vie plus courte."
 bio.120.a: "La vie est déjà trop courte"
 bio.120.b: "Améliorons la productivité des [target.GetIndividualNamePlural]"
 bio.125.name: "Surcharge synaptique"
 bio.125.desc: "Le dernier lot de [target.GetIndividualNamePlural] améliorés a été intégré à la [target.GetGestaltEntityName]. Leur biologie a été adaptée pour accélérer le développement neuronal et les processus cognitifs. Les principaux noeuds synaptiques de la [target.GetGestaltEntityName] fonctionnent désormais à une vitesse inégalée.\n\nCependant, cette accélération met à rude épreuve la stabilité des [target.GetIndividualNamePlural], qui risquent de succomber à une surcharge synaptique catastrophique. Nous pourrions envisager comme alternative d'allouer simplement plus de [target.GetIndividualNamePlural] à la coordination des tâches."
 bio.125.a: "Ralentissons les processus pour maintenir la stabilité"
 bio.125.b: "Qu'ils vivent à toute allure et brûlent intensément"
 bio.130.name: "Phénomène de fréquence"
 bio.130.desc: "Depuis l'intégration des nouveaux clones améliorés dans notre Conscience, nous sommes gênés par un bruit désagréable généré par des vibrations. Une erreur dans le processus de clonage a apparemment conduit au développement de nouveaux transmetteurs, responsables de cette interférence.\n\nLorsque ces clones entrent en contact avec le reste de la Conscience, tous les drones à proximité sont frappés par cet acouphène mental bruyant et extrêmement inquiétant. La distraction est grande et la productivité est compromise."
 bio.130.a: "Désagréable, mais pas insupportable"
 bio.130.b: "Éliminons les clones concernés"
 bio.135.name: "Problème de mobilité"
 bio.135.desc: "Les récentes expériences de clonage ont donné des résultats quelque peu inhabituels. Certains clones semblent avoir un lien neuronal avec leurs donneurs de gènes, ce qui les amène à se déplacer en tandem de manière incontrôlée.\n\nCe phénomène persiste quelle que soit la distance, les drones individuels reflétant les actions de leurs homologues ailleurs dans la galaxie. Il en résulte des possibilités fascinantes.\n\nNous pourrions réunir les clones et les donneurs de gènes et les faire travailler dans des environnements identiques. Ou alors, essayer d'extraire les neurotransmetteurs responsables de ce phénomène afin de pouvoir l'étudier plus en détail."
 bio.135.a: "Créons des postes de travail identiques pour le donneur de gènes et le clone"
 bio.135.b: "Coupons chirurgicalement le lien responsable de cette synchronisation"
 bio.140.name: "Clones incompatibles"
 bio.140.desc: "Afin de renforcer la Conscience, nous avons créé une série de clones à partir du matériel génétique de donneurs et accéléré artificiellement leur développement. Bien que ces clones soient biologiquement parfaits, ils ne sont pas compatibles avec la Conscience.\n\nCette anomalie est certes problématique, mais elle ouvre aussi des perspectives uniques. Les drones individuels possèdent des identités propres et des pensées indépendantes qui pourraient être avantageuses pour le contact avec des êtres extérieurs au collectif. Leur capacité à penser de manière autonome pourrait combler les lacunes de la voix unique de la Conscience, qui peine à s'exprimer. Cependant, ces avantages ont un certain prix... Leur individualité provoque des troubles qui affectent les fonctions cognitives supérieures de la Conscience."
 bio.140.a: "Forçons leur intégration"
 bio.140.b: "Exploitons leur potentiel"
 bio.145.name: "Inquiétudes liées à la création"
 bio.145.desc: "Notre conscience collective est en crise. Nous possédons désormais la capacité de faire des copies de nous-mêmes et pourtant nous hésitons et remettons en question son efficacité (et même sa moralité).\n\nLe clonage nécessite une quantité énorme de ressources, qu'il serait peut-être préférable d'utiliser ailleurs... À cela s'ajoute le fait que la reproduction naturelle permettrait probablement une plus grande diversité génétique.\n\nHistoriquement, nous ne nous sommes jamais reproduits de cette manière et nous ne sommes pas sûrs d'être prêts à accepter un changement aussi fondamental."
 bio.145.a: "Nous ne pouvons ignorer l'efficacité du clonage"
 bio.145.b: "Il est indispensable de maintenir la diversité génétique"
 bio.150.name: "Conscience en burnout"
 bio.150.desc: "Nos expériences de mutation ont entraîné des anomalies au sein de la Conscience. Des tâches autrefois banales exigent désormais des efforts considérables, car des directives contradictoires usent l'esprit collectif.\n\nL'épuisement qui en résulte menace certes de griller certains de nos drones les plus efficaces, mais il offre aussi une opportunité unique.\n\nDevons-nous nous arrêter et nous reposer un peu, ou repousser nos limites ?"
 bio.150.a: "Nous méritons une pause"
 bio.150.b: "Nous dormirons quand nous serons morts"
 bio.151.name: "Revigoration"
 bio.151.desc: "Notre décision de nous reposer et de nous ressourcer a porté ses fruits. Les impulsions chaotiques se sont apaisées et ont fusionné en un flux de pensées harmonieux qui fait avancer le collectif avec une clarté nouvelle.\n\nLes drones, autrefois au bord du burnout, travaillent désormais avec une précision incomparable. Cette période de réflexion a non seulement réduit notre épuisement collectif, mais elle a aussi renforcé notre détermination à relever les défis à venir."
 bio.151.a: "Nous rayonnons littéralement !"
 bio.155.name: "Spécialisation ou généralisation"
 bio.155.desc: "Les mutations offrent de nombreux avantages et les améliorations sélectives nous permettent de mieux orienter la Conscience vers certains objectifs. Grâce à des appendices chitineux résistants, il est désormais possible de se spécialiser dans la production de minéraux.\n\nNous pouvons également améliorer tous nos drones avec des modifications plus génériques afin qu'ils puissent assumer une multitude de fonctions."
 bio.155.a: "La polyvalence est plus utile"
 bio.155.b: "Commençons à creuser"
 bio.160.name: "Dérive phénotypique"
 bio.160.desc: "Les expériences en cours ont introduit des complexités inattendues dans la Conscience. Nous avons produit des drones aux caractéristiques physiques uniques : exosquelettes couverts d'épines, appendices surdimensionnés ou encore organes sensoriels étrangement sensibles.\n\nMême si ces variations présentent des avantages évidents, elles entraînent également un certain stress métabolique que la Conscience ne peut pas compenser. La question se pose donc de savoir quelle est la mutation de trop ?"
 bio.160.a: "Nous devons encourager cette dynamique"
 bio.160.b: "La cohésion doit être maintenue"
 bio.165.name: "Nostalgie du temps jadis"
 bio.165.desc: "La Conscience est en train de changer. En modifiant nos génomes, nous avons pu constater une nette amélioration de notre état de santé. Cependant, notre résistance psychologique a diminué.\n\nNous aimions ce que nous étions auparavant, et bien que nous soyons aujourd'hui plus forts que jamais et que nos capacités cognitives aient immensément évolué, nos précédents schémas de pensée nous manquent.\n\nAu sein de la Conscience, nous avons le sentiment profondément désagréable que nos corps ne correspondent pas à notre psyché intérieure. Sommes-nous allés trop loin ?"
 bio.165.a: "La vie est un changement permanent"
 bio.165.b: "Nous ne devons pas perdre ce qui nous définit"
