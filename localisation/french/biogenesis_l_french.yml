 bio.1050.name: "À vos marques"
 bio.1050.desc: "Nos agents rôdent autour des colonies des [Target.GetSpeciesNamePlural] et auront bientôt accès à leurs structures. Mais chaque chose en son temps. Une bonne chasse ne doit pas être précipitée."
 bio.1055.name: "Prêts"
 bio.1055.desc: "Notre proie est sous nos yeux. Les chasseurs qui ont infiltré [Target.GetName] sont confiants. Ils auront bientôt accès aux [Target.GetSpeciesNamePlural] et à leur ADN."
 bio.1060.name: "Partez"
 bio.1060.desc: "Nos agents sont prêts. Ils ont obtenu l'accès aux [Target.GetSpeciesNamePlural] et sont parfaitement camouflés. Comme tout bon chasseur, ils se sont assurés plusieurs voies d'évacuation, dont certaines sont plus agréables que d'autres. Il serait regrettable de devoir recourir aux égouts."
 bio.1065.name: "Gènes volés"
 bio.1065.desc: "C'est fait ! Nos agents se sont échappés avec une grande quantité de matériel génétique. Nous allons pouvoir faire de grands progrès lors de notre prochaine mutation. Peut-être même que nous développerons un certain goût pour les [From.Target.GetSpeciesNamePlural]."
