 buried_secrets: "Secrets enfouis"
 buried_secrets_desc: "Les expériences génétiques de nos ancêtres ne doivent pas être rendues publiques."
 specimen_study: "Étude de spécimens"
 specimen_study_desc: "Les travaux de recherche acquis contribueront au développement officiel."
 purity_tests: "Tests de pureté"
 purity_tests_desc: "Les affirmations de pureté génétique doivent être vérifiées par des contrôles rigoureux du génome."
 clone_rights: "Droits des clones"
 clone_rights_desc: "Nous respectons l'autonomie des individus clonés."
 class_system: "Système de classe"
 class_system_desc: "Il doit y avoir une hiérarchie stricte entre les citoyens et leurs clones."
 thorough_inspections: "Examen approfondi"
 thorough_inspections_desc: "Nous devons veiller à ce qu'il n'y ait pas d'autres complications dans la production de clones."
 swift_recovery: "Récupération rapide"
 swift_recovery_desc: "Nous avons fait de la productivité notre priorité numéro un."
 well_adjusted: "Adaptation"
 well_adjusted_desc: "Les problèmes émotionnels sont le cadet de nos soucis."
 strict_discipline: "Discipline rigoureuse"
 strict_discipline_desc: "Le travail et la discipline sont la base d'un citoyen exemplaire."
 infinite_growth: "Croissance infinie"
 infinite_growth_desc: "Nous augmentons la capacité de production de nos industries indépendamment des coûts."
 clone_colonies: "Colonies de clones"
 clone_colonies_desc: "Les citoyens dupliqués peuvent accélérer le développement des colonies."
 mutant_studies: "Études de mutants"
 mutant_studies_desc: "Nous conservons ces mutants comme sujets d'étude afin d'approfondir notre compréhension des mutations."
 aspirational_striving: "Aspirations ambitieuses"
 aspirational_striving_desc: "Les individus exceptionnels doivent être considérées comme des modèles, un idéal vers lequel il faut tendre."
 militaristic_fortitude: "Force militariste"
 militaristic_fortitude_desc: "Notre force génétique nous apportera la gloire."
 replicated_success: "Succès répliqué"
 replicated_success_desc: "Les compétences extraordinaires ne doivent pas être limitées à une minorité, mais partagées avec tous les citoyens."
 sewer_sweep: "Nettoyage des égouts"
 sewer_sweep_desc: "Nous ignorons ce qui rampe là-dessous... mais nous n'aimons pas ça."
 weaponized_plague: "Une épidémie comme arme"
 weaponized_plague_desc: "Une épidémie est un outil efficace pour réduire le troupeau."
 biohacker_haven: "Paradis des biohackers"
 biohacker_haven_desc: "Notre gouvernement s'efforcera de démanteler les restrictions sur les modifications génétiques."
 limited_autonomy: "Autonomie limitée"
 limited_autonomy_desc: "Nous maintiendrons l'ordre et limiterons l'accès aux modifications biologiques autorisées par le gouvernement."
 proactive_management: "Gestion proactive"
 proactive_management_desc: "La science théorique n'est que spéculation. Nos dirigeants doivent se consacrer à la tâche qui leur a été confiée."
 really_proactive_management: "$proactive_management$"
 really_proactive_management_desc: "Dans notre empire, il n'y a pas de place pour les travailleurs imprudents."
 #Hive Modifiers
 energetic_manipulation: "Manipulation énergétique"
 energetic_manipulation_desc: "Les améliorations biologiques augmentent l'efficacité."
 defensive_focus: "Priorité à la défense"
 defensive_focus_desc: "Nous avons fait de notre défense une priorité. La force et la résistance constituent le fondement de nos armées."
 grunt_retention: "Engagement des travailleurs"
 grunt_retention_desc: "Les drones de tous âges contribuent à la recherche et au développement de nouvelles technologies."
 assured_longevity: "Longévité garantie"
 assured_longevity_desc: "La cohésion et le moral sont en hausse, nous pouvons donc désormais privilégier notre bien-être."
 hyper_charged: "Hypercharge"
 hyper_charged_desc: "L'efficacité neuronale accrue permet des phases de production plus courtes mais plus intenses."
 hyper_charged_wilderness: "$hyper_charged$"
 hyper_charged_wilderness_desc: "$hyper_charged_desc$"
 vitality_conservation: "Maintien de la vitalité"
 vitality_conservation_desc: "Alors que les améliorations sont de plus en plus sophistiquées, nous devons prendre le temps de nous occuper de notre bien-être."
 accelerated_growth: "Croissance accélérée"
 accelerated_growth_desc: "La productivité augmente à mesure que nous améliorons notre efficacité."
 interference_perseverance: "Adaptation aux interférences"
 interference_perseverance_desc: "La Conscience survit et s'adapte aux interférences neuronales. Nous maintenons une certaine efficacité malgré tout."
 tandem_workers: "Ouvriers en tandem"
 tandem_workers_desc: "Nous tirons le meilleur parti de nos problèmes de coordination actuels."
 mandated_integration: "Intégration obligatoire"
 mandated_integration_desc: "L'intégration forcée des drones rebelles empêchera toute insurrection."
 methodic_procreation: "Procréation méthodique"
 methodic_procreation_desc: "Nous essayons d'optimiser le clonage tout en tenant compte des implications éthiques et sociales."
 genetic_diversification: "Diversification génétique"
 genetic_diversification_desc: "Ensemble, nous réfléchissons à l'avenir de notre espèce et essayons d'agir de manière prudente et raisonnée."
 hive_spa_day: "Pause bien méritée"
 hive_spa_day_desc: "Une année de repos sera bénéfique pour le bien-être du collectif."
 cousin_of_death: "Rien ne nous arrêtera"
 cousin_of_death_desc: "Nous n'avons pas le temps de nous reposer. Nous avons du travail."
 positively_glowing: "Énergie débordante"
 positively_glowing_desc: "Nous nous sommes bien reposés, nos batteries sont rechargées."
 multi_functionality: "Multifonctionnalité"
 multi_functionality_desc: "La productivité augmente et les drones sont davantage polyvalents."
 optimized_workforce: "Main-d'oeuvre optimisée"
 optimized_workforce_desc: "La Conscience est satisfaite et se spécialise."
 change_is_growth: "Changement est synonyme de progrès"
 change_is_growth_desc: "Le progrès est un changement et le changement est un progrès. Nous apprenons à un rythme effréné."
 maintain_the_essence: "Préservation de notre nature"
 maintain_the_essence_desc: "Nous ne devons pas oublier qui nous sommes au cours de notre évolution. Nous sommes forts et déterminés."
 strengthened_focus: "Focalisation accrue"
 strengthened_focus_desc: "Les drones sont en meilleure santé et la Conscience plus heureuse."
 evolutionary_diversion: "Changements évolutionnaires"
 evolutionary_diversion_desc: "La Conscience a subi des changements importants et nous devons désormais nous concentrer sur une biomodification sûre."
 biological_corrections: "Corrections biologiques"
 biological_corrections_desc: "Nous ne devons pas laisser des anomalies génétiques compromettre notre mutation."
 cellular_degradation: "Dégradation cellulaire"
 cellular_degradation_desc: "Nous devons être ouverts à de nouvelles voies d'évolution."
 cellular_degradation_wilderness: "$cellular_degradation$"
 cellular_degradation_wilderness_desc: "$cellular_degradation_desc$"
 resilient_hive: "Conscience résiliente"
 resilient_hive_desc: "Nous mettons l'accent sur les traits qui augmentent la résistance physique et l'adaptabilité afin de garantir la survie de la [GetGestaltEntityName] dans les environnements les plus hostiles."
 cognizant_hive: "Conscience cognitive"
 cognizant_hive_desc: "Nous donnons la priorité à la capacité mentale et à la coordination des [GetIndividualNamePlural], ce qui se traduit par une prise de décision plus rapide et une meilleure efficacité."
 pristine_lineage: "Ascendance irréprochable"
 pristine_lineage_desc: "Les [GetIndividualNamePlural] de traitement et les noeuds de gouvernance sont prioritaires."
 breed_for_growth: "Reproduction au service du développement"
 breed_for_growth_desc: "Nous donnons la priorité aux traits les plus bénéfiques pour la fertilité et la production de [GetIndividualNamePlural] sains."
 breed_for_growth_wilderness: "$breed_for_growth$"
 breed_for_growth_wilderness_desc: "$breed_for_growth_desc$"
 relentless_focus: "Priorité sans faille"
 relentless_focus_desc: "Nous ne pouvons pas nous permettre de diversifier nos intérêts. Notre objectif est la pureté ; nous devons abandonner tout le reste."
 infrastructural_bolstering: "Renforcement des infrastructures"
 infrastructural_bolstering_desc: "Les moyens de production de la [GetGestaltEntityName] ne doivent pas pâtir de notre quête de pureté."
 anomaly_purging: "Suppression des anomalies"
 anomaly_purging_desc: "Nous ne devons rien laisser au hasard. Tout ce qui est involontaire doit être immédiatement éliminé."
 anomaly_purging_wilderness: "$anomaly_purging$"
 anomaly_purging_wilderness_desc: "$anomaly_purging_desc$"
 rigorous_examination: "Étude approfondie"
 rigorous_examination_desc: "Certaines de ces « impuretés » pourraient présenter des avantages pour la [GetGestaltEntityName]. Il ne faut pas les éliminer trop vite."
 rigorous_examination_wilderness: "$rigorous_examination$"
 rigorous_examination_wilderness_desc: "$rigorous_examination_desc$"
 population_relocation: "Déplacement de la population"
 population_relocation_desc: "Nous pouvons réduire le fardeau que représente pour la Conscience l'augmentation du nombre de clones en déplaçant certains citoyens."
 factotum_reserves: "Réserves de serviteurs"
 factotum_reserves_desc: "La production d'énergie de la Conscience est soutenue par les clones ouvriers polyvalents."
 simple_minds: "Simples d'esprit"
 simple_minds_desc: "La Conscience prospère grâce aux qualités de quelques simples d'esprit."
 the_new_batch: "Nouveau lot de clones"
 the_new_batch_desc: "Le vieux fait place au neuf."
 metaphysical_hive: "Conscience métaphysique"
 metaphysical_hive_desc: "Nous nous interrogeons sur le sens et la nature de l'existence, bien que cela crée des dissonances."
 metaphysics_rejected: "Rejet de la métaphysique"
 metaphysics_rejected_desc: "Les questions métaphysiques distraient les esprits solitaires. Notre but n'est pas de réfléchir à l'existence, mais de vivre comme un seul être."
 boosted_neurology: "Neurologie améliorée"
 boosted_neurology_desc: "Nous avons passé trop de temps à réfléchir. Nous devons mener à bien la transformation de notre espèce, quels qu'en soient les désagréments potentiels."
 balanced_advancement: "Développement durable"
 balanced_advancement_desc: "Nos expériences sur les mutations ne doivent pas changer la façon dont nous sommes liés les uns aux autres."
 rage_quitting: "Rejet de la violence"
 rage_quitting_desc: "L'agressivité gratuite n'a pas sa place au sein de la Conscience."
 fury_embracing: "Acceptation de la colère"
 fury_embracing_desc: "Nous sommes ouverts au chaos inconnu de l'avenir."
 decisive_meditation: "Méditation résolue"
 decisive_meditation_desc: "Nous avons décidé de commencer par accepter la nature agitée de notre conscience et de travailler ensemble à une vision globale plus équilibrée."
 meteorological_adaptations: "Adaptations météorologiques"
 meteorological_adaptations_desc: "Nous devons consacrer du temps et des ressources à l'amélioration de notre résistance aux différents climats."
 body_builders: "Culturistes"
 body_builders_desc: "La force physique est le summum de l'évolution."
 deep_thinkers: "Grands penseurs"
 deep_thinkers_desc: "Nous sommes animés par notre capacité à réfléchir en profondeur."
 sensible_supremacy: "Suprématie raisonnable"
 sensible_supremacy_desc: "Nous pouvons être à la fois audacieux et prudents."
 decisive_termination: "Éradication ciblée"
 decisive_termination_desc: "Pour lutter contre l'épidémie, nous éradiquerons les individus infectés."
 survival_study: "Étude des malades"
 survival_study_desc: "En examinant attentivement les [GetIndividualNamePlural] malades, nous trouverons un remède à l'épidémie."
 survival_study_wilderness: "$survival_study$"
 survival_study_wilderness_desc: "$survival_study_desc$"
 uncorrected_blunders: "Bugs non corrigés"
 uncorrected_blunders_desc: "Nous n'avons peut-être pas vérifié nos calculs."
 maverick_citizens: "Citoyens marginaux"
 maverick_citizens_desc: "Si vous n'avez rien fait de mal, vous n'avez rien à craindre."
 #Advanced Governments
 #Purity
 bio.170.name: "Pureté : réforme du gouvernement ?"
 bio.170.desc: "Notre espèce a atteint une nouvelle frontière importante et nous devons faire un choix.\n\nAccomplirons-nous notre destin et élèverons-nous notre civilisation au niveau de l'excellence génétique en veillant à la pureté de notre lignée, ou bien tirerons-nous les leçons du passé et resterons-nous sous notre forme actuelle, non génétiquement modifiée ?"
 bio.170.a: "Favorisons la pureté et élevons-nous vers de nouveaux sommets !"
 bio.170.a.tt: "$change_auth_tt$[GetPurityAuthority]"
 bio.170.b: "Il n'est pas nécessaire de changer notre mode de gouvernance actuel"
 #Cloning
 bio.175.name: "Clonage : réforme du gouvernement ?"
 bio.175.desc: "Notre espèce est arrivée à un tournant et une décision doit être prise.\n\nAccomplirons-nous notre destin en exploitant le pouvoir du clonage et en nous transformant irrévocablement en une civilisation de la perfection répliquée, ou bien tirerons-nous les leçons du passé et nous en tiendrons-nous à notre différenciation inutile ?"
 bio.175.a: "Considérons le clonage comme un élément essentiel de notre avenir"
 bio.175.a.tt: "$change_auth_tt$[GetCloningAuthority]\n$LEADERS_GAIN_CLONES$"
 bio.175.b: "$bio.170.b$"
 #Mutation
 bio.180.name: "Mutation : réforme du gouvernement ?"
 bio.180.desc: "Nous sommes à l'aube d'un changement révolutionnaire et devons faire un choix.\n\nNous pouvons soit accomplir notre destin en exploitant le pouvoir des mutations biologiques avancées, ce qui changerait irrévocablement notre civilisation grâce à l'évolution ciblée de notre code génétique, soit tirer les leçons du passé et continuer sous notre forme actuelle."
 bio.180.a: "Nous pouvons être qui nous voulons"
 bio.180.a.tt: "$change_auth_tt$[GetMutationAuthority]"
 bio.180.b: "$bio.170.b$"
