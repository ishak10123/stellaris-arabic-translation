 ###Starlit Citadel
 origin_starlit_citadel: "Citadelle stellaire"
 origin_starlit_citadel_desc: "Aux confins du système natal de cette civilisation se trouve un mystérieux portail par lequel arrivent des vagues successives d'êtres hostiles. Ces invasions sont aussi imprévisibles qu'inévitables et obligent la population à recourir à sa plus grande réussite technologique : la §Hcitadelle d'espace lointain§!."
 origin_tooltip_starlit_citadel_effects: "- Le système natal dispose :$TABBED_NEW_LINE$- d'un ['concept_deep_space_bastion',bastion d'espace lointain] au bord de son puits de gravité $TABBED_NEW_LINE$- d'un ['concept_wormhole',portail étrange] qui mène à un système inconnu $NEW_LINE$- Le monde natal dispose :$TABBED_NEW_LINE$- d'un £building£['building:building_citadel_uplink',centre de connexion à la citadelle] $TABBED_NEW_LINE$- de [concept_bioship_remains',£blocker£vestiges de vaisseaux biologiques] $TABBED_NEW_LINE$- de +2 ['concept_invasion_site', £blocker£sites d'invasion] $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_deep_space_citadel_tech',£engineering_research£$tech_deep_space_citadel$]"
 START_SCREEN_STARLIT_CITADEL: "Nous n'avons pas toujours été aussi vigilants.\n\nNous étions un peuple pacifique qui n'avait jamais connu le manque. Cependant, cette vie paisible a pris fin le jour fatidique où le portail s'est ouvert.\n\nLes [GetInvadersLower] ont attaqué [Capital.GetName] sans prévenir. Ils ont rasé nos villes et dévasté nos terres, puis ils ont disparu aussi vite qu'ils étaient venus. Nous espérions que cela ne se reproduirait plus. Malheureusement, les invasions ont repris, et chaque nouvelle attaque était plus violente que la précédente.\n\nAujourd'hui, nous nous apprêtons à parcourir la galaxie sous l'oeil vigilant de nos garde-ciel. La citadelle d'espace lointain nous attend. Elle est notre rempart contre les [GetInvadersLower] et tous ceux qui cherchent à nous détruire."
