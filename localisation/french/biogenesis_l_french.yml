 ### BIOMORPHOSIS (GENETIC ASCENSION) SITUATION(S)
 ## REGULAR EMPIRE SITUATION
 #SET-UP / PREAMBLE
 genetic_ascension_situation: "Biomorphose"
 genetic_ascension_situation_type: "$genetic_ascension_situation$"
 genetic_ascension_situation_desc: "La sélection naturelle et la dérive génétique ne s'interposent plus entre nous et notre suprématie biologique. En tant que civilisation, nous sommes en train de définir un nouvel avenir pour notre espèce. Notre [Owner.Species.GetFleshTypeCyberCreed] est notre argile et nous en sommes les sculpteurs."
 genetic_ascension_situation_monthly_change_tooltip: "Nos généticiens font avancer nos recherches."
 genetic_ascension_situation_outcome: "Nous exploiterons le plein potentiel de la manipulation génétique et assurerons le progrès de notre espèce.\n\nNous choisirons l'expression ultime de la biomorphose."
 genetic_ascension_situation_pause_desc: "Situation suspendue"
 genetic_ascension_approach_selected: "$TRIGGER_FAIL$ Nous avons déjà fait notre choix pour cette phase."
 situation_gene_tailoring_needed_desc: "$TRIGGER_FAIL$ N'a PAS la technologie ['concept_gene_tailoring']."
 mod_biomorphosis_progress_mult: "Avancée mensuelle de la situation $genetic_ascension_situation$ "
 #STAGE EVENTS
 bio.5.name: "Altération de notre essence" #STAGE ONE
 bio.5.desc.no_options: "Afin que notre évolution se poursuive, nous devons choisir la voie qui caractérisera notre voyage. En réalisant notre plein potentiel, nous devons être conscients que cette entreprise pourrait changer radicalement notre nature.\n\nPlanifier notre évolution est une tâche d'une grande importance. Les changements que nous opérons aujourd'hui détermineront notre avenir."
 bio.5.desc.has_options: "$bio.5.desc.no_options$\n\nPour commencer notre ascension, nous devons choisir la voie que nous allons emprunter."
 bio.5.a: "Celle de la pureté"
 bio.5.b: "Celle du clonage"
 bio.5.c: "Celle de la mutation"
 bio.10.name: "Le point de bascule" #STAGE TWO
 bio.10.desc.no_options: "Être les maîtres de notre propre évolution a conduit à des progrès significatifs. Nous comprenons mieux les caractéristiques génétiques, la reproduction et le séquençage de l'ADN.\n\nL'apogée de notre évolution est à portée de main. Dans quelques années, nous aurons atteint notre plein potentiel en tant qu'espèce."
 bio.10.desc.has_options: "$bio.10.desc.no_options$\n\nMais pour l'instant, nous devons continuer sur la voie actuelle ou choisir un autre axe pour la prochaine étape de notre développement."
 bio.10.a: "Concentrons-nous sur la pureté"
 bio.10.b: "Concentrons-nous sur le clonage"
 bio.10.c: "Concentrons-nous sur la mutation"
 bio.15.name: "Carrefour de l'évolution" #STAGE THREE
 bio.15.desc.no_options: "Nos efforts nous ont menés à la veille d'un changement évolutif important. Nous devons prendre une décision cruciale quant à la voie que nous allons suivre pour réaliser pleinement notre potentiel."
 bio.15.desc.has_options: "$bio.15.desc.no_options$\n\nNous devons à nouveau choisir une priorité pour l'avenir."
 bio.15.a: "Nous faisons le choix de la pureté"
 bio.15.b: "Nous voulons maîtriser le clonage"
 bio.15.c: "La mutation est notre avenir"
 genetic_ascension_approach_purity: "Pureté"
 genetic_ascension_approach_cloning: "Clonage"
 genetic_ascension_approach_mutation: "Mutation"
 genetic_ascension_approach_purity_desc: "Nous concentrerons nos efforts sur la pureté."
 genetic_ascension_approach_cloning_desc: "La recherche sur le clonage va nous permettre de nous développer."
 genetic_ascension_approach_mutation_desc: "Notre avenir repose sur la mutation génétique."
 bio.20.name: "La voie choisie" #FINAL STAGE - TRADITION TREE CHOICE
 bio.20.desc: "Que nous recherchions la forme la plus pure de nous-mêmes, que nous nous clonions pour être plus efficaces ou que nous nous modifiions génétiquement par des mutations ciblées, ce moment marque un point de non-retour."
 bio.20.desc.evopred: "Nous avons toujours été de nature malléable. Nous sommes les organismes les plus complexes de cet univers et, grâce à nos recherches, nous ne cesserons d'évoluer.\n\nL'avenir s'annonce chaotique, et cela nous convient parfaitement."
 bio.20.a: "Nous découvrirons la véritable signification de la pureté"
 bio.20.b: "Nous nous clonerons pour réussir"
 bio.20.c: "Nous exploiterons le pouvoir des mutations"
 #Random Events
 bio.50.name: "Un peu plus d'égalité"
 bio.50.desc: "Suite à notre accent sur la pureté génétique, les citoyens améliorés de notre empire ont commencé à se considérer comme supérieurs. Ils exigent des journées de travail plus courtes, davantage de services et de pouvoir politique en raison de cette supposée supériorité. Leurs manifestations de plus en plus agressives perturbent grandement la société."
 bio.50.a: "Faisons la chasse aux manifestants"
 bio.50.b: "Leurs préoccupations sont justifiées"
 bio.55.name: "Mitose sociétale"
 bio.55.desc: "Une rhétorique de division de la société domine l'actualité et les divergences d'opinion déchirent l'unité sociale. Une nouvelle forme de lutte des classes a éclaté, les individus aux gènes modifiés ayant de plus en plus de possibilités.\n\nLes citoyens génétiquement améliorés estiment qu'ils sont l'avenir de notre espèce, tandis que les traditionalistes ont le sentiment que nous nous aventurons trop loin dans le contre nature."
 bio.55.a: "Des individus supérieurs pour un monde supérieur"
 bio.55.b: "Nous allons peut-être un peu trop vite"
 bio.60.name: "Disparité toxique"
 bio.60.desc: "Les tests de pureté génétique sont devenus monnaie courante dans certaines industries ; ceux considérés comme génétiquement supérieurs bénéficient d'un traitement préférentiel au travail et dans l'éducation, et d'un accès privilégié aux postes de pouvoir.\n\nAlors que certains soutiennent que les améliorations biologiques rendent plus forts et en meilleure santé, d'autres affirment que cette approche entraîne une discrimination injuste envers ceux qui ne veulent pas ou ne peuvent pas modifier leur génome au nom de notre quête de la perfection génétique."
 bio.60.a: "Nous devons veiller à l'égalité des chances"
 bio.60.b: "C'est ce qu'on appelle la sélection naturelle"
 bio.65.name: "Les héros et les méchants"
 bio.65.desc: "Notre quête de pureté a encouragé certains individus à prendre position dans la sécurité publique. En raison de leurs super-pouvoirs, de leur agilité et de leur endurance, de petits gangs d'âmes charitables se sont formés et se considèrent comme gardiens de l'ordre.\n\nToutefois, leurs aspirations ont également conduit à l'émergence d'adversaires tout aussi importants dans l'ombre, dont les intentions malveillantes sont motivées par le désir d'équilibrer la balance du pouvoir. Les affrontements entre les deux camps causent d'importants dégâts matériels et mettent en danger les civils."
 bio.65.a: "Les justiciers n'ont pas leur place dans nos rues"
 bio.65.b: "Laissons-les se battre"
 MAVERICK_CITIZENS_MOD: "Les [enforcer.GetIcon]§Yagents de sécurité§! accroissent la £stability£§Ystabilité§! de §G+2§! et produisent §G+2§! d'£unity£§Yunité§! pour 100 emplois."
 bio.66.name: "Restrictions extrêmes"
 bio.66.desc: "Nous avons fortement limité la marge de manoeuvre des individus dotés de super-pouvoirs et ils sont désormais soumis à des règles plus strictes. Notre surveillance accrue nous permet également de mieux contrôler leurs activités et de les restreindre davantage si nécessaire.\n\nBien que nous travaillions dur pour nous assurer qu'ils n'utilisent leurs pouvoirs que pour le bien de notre empire, la peur et le mépris ne cessent de croître parmi ceux qui ont des super-pouvoirs et ceux qui n'en ont pas. Notre population est divisée sur cette question."
 bio.66.a: "Levons des régiments de super-soldats"
 bio.66.b: "Réhabilitons les marginalisés"
 bio.67.name: "Dépendance excessive"
 bio.67.desc: "Notre dépendance croissante à l'égard des justiciers génétiquement améliorés est une épée à double tranchant. Bien qu'ils nous procurent un certain sentiment de sécurité, nous n'ignorons pas à quel point nous sommes devenus dépendants d'eux.\n\nNotre population est reconnaissante, mais elle se tourne aussi de plus en plus vers ceux dotés de super-pouvoirs pour bénéficier de conseils et de soutien, en contournant les voies légales et en ignorant l'administration. La frontière entre les héros et le gouvernement devient de plus en plus floue. Notre pouvoir est en jeu."
 bio.67.a: "Créons un Conseil des superpuissants !"
 bio.67.b: "Limitons l'influence de ces « héros » dans les affaires gouvernementales"
 bio.70.name: "Deux pour le prix d'un"
 bio.70.desc: "Une personnalité populaire, acclamée dans toute la galaxie pour son éthique de travail inébranlable, n'est en réalité pas un seul individu, mais deux.\n\nIl s'avère qu'elle possède un clone parfait, leur permettant de travailler en alternance. Tandis que l'un s'occupe des affaires publiques et du travail administratif, l'autre se repose et récupère dans l'ombre.\n\nCette révélation a ébranlé la scène politique et suscité des interrogations sur les limites éthiques du clonage."
 bio.70.a: "Une utilisation extrêmement efficace du clonage"
 bio.70.b: "Renvoyons-les tous les deux pour cette tromperie"
 bio.75.name: "Révolte des clones"
 bio.75.desc: "La pratique consistant à utiliser des clones pour le prélèvement d'organes a entraîné quelques complications. Plusieurs clones, manifestement dotés de sensibilité, se sont rebellés et ont entamé une grève de la faim.\n\nAlors que beaucoup affirment que l'individu d'origine devrait avoir la priorité, d'autres défendent la position selon laquelle tout être sensible devrait avoir droit à son autonomie personnelle. Cette question fait l'objet de débats passionnés."
 bio.75.a: "Mettons fin aux transplantations"
 bio.75.b: "Les droits des individus d'origine sont prioritaires"
 bio.80.name: "Le poids des preuves"
 bio.80.desc: "Les forces de l'ordre sont dans une impasse. Alors que la criminalité ne cesse d'augmenter dans notre capitale, le nombre d'individus réellement traduits en justice n'a jamais été aussi faible. De plus en plus de criminels présumés plaident non coupables et accusent leurs clones.\n\nSi les suspects ne sont pas pris en flagrant délit, il est devenu presque impossible de prouver leur culpabilité. Certains juges demandent désormais la dépénalisation effective de la plupart des infractions."
 bio.80.a: "Renforçons nos systèmes de surveillance"
 bio.80.b: "Qui dit moins de lois dit moins de crimes"
 bio.85.name: "Ressemblance frappante"
 bio.85.desc: "Une immense usine de clonage clandestine a été découverte à l'intérieur de nos frontières, abritant des milliers de doubles de notre [Owner.Leader.GetTitle], [Owner.Leader.GetName]. Les scientifiques civils présents sur place ont été placés en garde à vue, mais aucun d'entre eux ne coopère. Ils affirment tous ne pas savoir qui a commandité les clones.\n\nLes rares preuves laissent supposer que [Owner.Leader.GetName] pourrait être [Owner.Leader.GetLuiElleLead]-même derrière tout cela. Malheureusement, [Owner.Leader.GetSheHe] a disparu sans laisser de traces."
 bio.85.a: "Euthanasions les clones"
 bio.85.b: "Nous avons hérité d'une armée de clones"
 bio.85.b.tt: "([owner.capital_scope.GetName]) :\nReçoit une §Yarmée de clones§!."
 bio.85.c: "Libérons les clones"
 bio.85.c.tt: "Nous allons obtenir un groupe de §Ypops§!."
 bio.86.name: "Réaction inattendue"
 bio.86.desc: "L'euthanasie d'autant de clones a suscité l'indignation au sein de la société et donné lieu à de nombreux débats. Des militants de la cause des droits des [Owner.GetSpeciesAdj] et des groupes religieux ont appelé à de grandes protestations.\n\nDes rumeurs indiquent également que certains clones ont réussi à s'échapper et se cachent parmi la population."
 bio.86.a: "Peut-être pouvons-nous en tirer des enseignements..."
 bio.86.b: "Envoyons les forces de l'ordre pour faire taire la populace"
 bio.86.b.tt: "([owner.capital_scope.GetName]) :\nReçoit trois §Yarmées d'assaut§!."
 bio.90.name: "Communauté mutante"
 bio.90.desc: "De nombreux individus présentant des mutations génétiques remarquables ou non conventionnelles ont été mis à l'écart par la société. Contraints à la clandestinité, ces « mutants » ont créé leurs propres enclaves.\n\nCeux qui pénètrent dans ces zones en reviennent rarement."
 bio.90.a: "Dissolvons ces enclaves"
 bio.90.b: "Surveillons-les à distance"
 bio.95.name: "Rébellion transgénique"
 bio.95.desc: "Nos jeunes ont commencé à modifier leur apparence, manifestement pour leur plus grand plaisir.\n\nParmi les dernières tendances, on trouve les yeux à facettes et les concours portant sur le nombre de membres supplémentaires pouvant être ajoutés à un seul corps, le record actuel s'élevant à 156.\n\nCes « biohackers » ont attiré l'attention du public en raison de problèmes de sécurité. Les appels à des restrictions plus strictes sur les mutations génétiques se multiplient et nous sommes obligés de prendre position."
 bio.95.a: "Ils ne font que s'amuser"
 bio.95.b: "156 membres, c'est beaucoup trop"
 bio.100.name: "Revers inattendu"
 bio.100.desc: "La propagation des mutations génétiques au sein de notre civilisation a engendré une multitude déconcertante de variations physiques.\n\nDes évolutions biologiques autrefois prévisibles présentent désormais des variantes inattendues qui rendent la standardisation presque impossible.\n\nLes points communs physiques qui unissaient autrefois notre espèce s'amenuisent et sont remplacés par un kaléidoscope de formes et de fonctions différentes qui mettent en péril la cohésion sociale."
 bio.100.a: "Encourageons la diversité"
 bio.100.a.tt: "§Y400§! £pop£§Hpops§! aléatoires reçoivent le trait ['trait:trait_bioadaptability'], ['trait:trait_social_pheromones'] ou ['trait:trait_limited_regeneration']."
 bio.100.b: "Introduisons un modèle génétique standardisé"
 bio.105.name: "Amorphisme cellulaire"
 bio.105.desc: "Une expérience transgénique s'est soldée par un échec catastrophique. Nos scientifiques ont tenté de mélanger l'ADN de sujets d'étude à celui d'autres organismes multicellulaires afin de provoquer une réaction hyperimmune qui les immuniserait contre tous les virus.\n\nMais au lieu de cela, ils ont créé une créature qui dissout les parois cellulaires de tout organisme avec lequel elle entre en contact, fusionnant avec lui pour former une énorme masse amorphe de matière biologique.\n\nCet amas de biomasse a roulé à travers le laboratoire, avalant tout sur son passage. Il a pu être capturé, mais il représenterait un grand danger s'il s'échappait. Par chance, il a l'air comestible..."
 bio.105.a: "Neutralisons l'amas de biomasse !"
 bio.105.b: "Cela vaut peut-être la peine de prendre le risque d'étudier cette créature de plus près"
