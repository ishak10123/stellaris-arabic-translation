 #Siege of the Citadel Event Chain
 bio.2005.name: "Fluctuations inhabituelles"
 bio.2005.desc: "Nos garde-ciel nous ont fait part de nouvelles inquiétantes.\n\nRécemment, des fluctuations minimes mais manifestes ont été mesurées à l'intérieur du portail du système de §Y[Root.Capital.System.GetName]§!... Le même genre de fluctuations qui précèdent généralement l'invasion de vaisseaux biologiques ennemis.\n\nSi ces mesures sont correctes, la prochaine attaque n'aura lieu que dans quelques mois. La survie de notre population dépend à nouveau de la détermination de nos défenseurs."
 abandoned_hatchery_chain_1: "Siège de la citadelle"
 abandoned_hatchery_chain_1_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_1_desc: "Les [GetInvadersLower] nous attaquent sans relâche depuis des décennies, et notre bastion d'espace lointain nous a protégés du pire en tant que première ligne de défense. Toutefois, nous ne pourrons pas dormir tranquilles tant que nous n'aurons pas fait la lumière sur nos ennemis.\n\nÀ chaque nouvelle découverte, le jour où nous pourrons enfin riposter et mettre fin une fois pour toutes à ce siège interminable se rapproche."
 bio.2015.name: "Vestiges de l'ennemi"
 bio.2015.desc: "Les débris de la flotte biologique que nous avons détruite dérivent sinistrement dans le système de §Y[Root.Capital.System.GetName]§!. Bien qu'ils soient déformés et partiellement carbonisés, les éléments organiques sont néanmoins suffisamment intacts pour être étudiés.\n\nUne analyse minutieuse de ces restes pourrait lever le voile sur ces hideux vaisseaux, et par la même occasion sur le mystérieux portail d'où ils proviennent."
 PROJECT_HATCHERY_SHIP_REMAINS: "Étude des vestiges de vaisseaux biologiques"
 PROJECT_HATCHERY_SHIP_REMAINS_DESC: "Les restes de la flotte des [GetInvadersLower] offrent une opportunité rare de mener une étude approfondie. Nous pourrons probablement apprendre beaucoup de choses."
 bio.2015.a: "On avance enfin"
 bio.2020.name: "Ennemis analysés"
 bio.2020.desc: "Nos [Root.GetScientistPlural] ont examiné en détail les débris biologiques éparpillés dans le système de §Y[Root.Capital.System.GetName]§! et pensent avoir trouvé la clé qui nous aidera à comprendre le portail en périphérie du système.\n\nAu plus profond des tissus des créatures, ils ont identifié un schéma organique qui semble résonner avec les fluctuations du portail. En reproduisant cette fréquence, nous devrions pouvoir traverser l'étrange déchirure.\n\nDe plus amples recherches sont nécessaires, mais l'opportunité d'affronter l'ennemi sur son propre terrain se dessine enfin."
 abandoned_hatchery_chain_2: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_desc: "Nous sommes sur le point de percer les secrets du portail. Nous ne pouvons pas encore le traverser, mais nous avons suffisamment d'informations pour développer la technologie nécessaire.\n\nNous avons besoin de la §Ystabilisation des trous de ver§! pour porter le combat chez nos ennemis."
 bio.2025.name: "Repaire de l'ennemi"
 bio.2025.desc: "Nos récentes avancées en matière de §Ystabilisation des trous de ver§! nous ont fourni un rare aperçu du système de §Y[event_target:starlit_sealed_system.GetName]§!.\n\nUne flotte agressive de vaisseaux biologiques et une base stellaire lourdement fortifiée nous attendent de l'autre côté. Nous devons faire preuve d'une extrême prudence.\n\nNous avons trouvé le repaire de l'ennemi."
 abandoned_hatchery_chain_3: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_desc: "Nous avons découvert où se cache l'ennemi, mais pour accéder à ses secrets, nous devrons d'abord vaincre ses défenses.\n\nLa bataille qui nous attend ne sera pas facile, mais si nous gagnons, nous pourrons explorer librement le système de §Y[event_target:starlit_sealed_system.GetName]§!."
 bio.2027.name: "Éruption de peur"
 bio.2027.desc: "La flotte qui assurait la défense du système de §Y[starlit_sealed_system.GetName]§! a été anéantie. Peu avant sa défaite, nous avons intercepté un message pressant en provenance de la base stellaire du système. Nous venons enfin de le traduire :\n\n§H« ... hors de contrôle ! Les vaisseaux s'auto-reproduisent ! Qui que vous soyez : s'il vous plaît, sauvez-nous ! »§!\n\nDepuis, toute communication a été interrompue. Si nous avons vraiment remporté la victoire, ce système nous offre une opportunité stratégique importante. Peut-être y aura-t-il un jour un nouveau bastion d'espace lointain sous l'étoile du système de §Y[starlit_sealed_system.GetName]§!, capable de protéger notre civilisation contre toutes les menaces."
 bio.2027.a: "Notre siège est enfin levé"
 citadel_siege_lifted: "Siège levé"
 citadel_siege_lifted_desc: "Nos vaillants défenseurs ont vaincu les [GetInvadersLower], et le siège interminable a pris fin."
 citadel_siege_lifted_machine: "$citadel_siege_lifted$"
 citadel_siege_lifted_machine_desc: "$citadel_siege_lifted_desc$"
 abandoned_hatchery_chain_4: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_desc: "Les [GetInvadersLower] ont été éradiqués du système de §Y[starlit_sealed_system.GetName]§!, mais la situation est différente de ce à quoi nous nous attendions.\n\nTout ce qui reste de nos bourreaux est un monde dévasté."
 PROJECT_BIOMECHANICAL_WORLD: "Patrie de l'ennemi"
 PROJECT_BIOMECHANICAL_WORLD_DESC: "Le monde natal des [GetInvadersLower]. Qui étaient-ils et que voulaient-ils de nous ?"
 bio.2030.name: "Épidémie biomécanique"
 bio.2030.desc: "Le système de §Y[event_target:biomechanical_world_target.GetName]§! est un tombeau à ciel ouvert.\n\nL'espèce dominante de la planète a été entièrement exterminée par une forme de vie mystérieuse et agressive. Des recherches plus approfondies ont révélé qu'il ne s'agissait pas d'organismes naturels, mais de machines biologiques qui semblent avoir été élevées plutôt que fabriquées.\n\nSe pourrait-il que les concepteurs de ces créatures aient été victimes de leur propre création ? L'ennemi ignorait-il que ces organismes nous attaquaient ? Ignorait-il également notre existence ?\n\nUne chose est sûre : quelles que soient les mesures qu'ils aient prises pour endiguer la menace, elles ont causé leur perte, et celle de leurs abominables machines."
 bio.2030.a: "Nous n'étions donc pas les seules victimes..."
 smarter_hatchery: "Flottes améliorées"
 smarter_hatchery_desc: "Elles apprennent, elles s'adaptent... Elles arrivent."
 bio.2030.tt: "\n§EPermet de déverrouiller ce poste au Conseil :§!\n§H$t$$councilor_warden_of_the_citadel$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$MOD_SHIP_FRIENDLY_TERRITORY_ARMOR_MULT$: §G+1%§!\n$ttt$$mod_shipsize_starbase_deep_space_citadel_1_hull_mult$: §G+2%§!\n$ttt$$mod_starbases_upkeep_mult$ : §G-5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$"
 councilor_warden_of_the_citadel: "Garde de la citadelle"
 councilor_warden_of_the_citadel_desc: "Le garde de la citadelle est notre fidèle gardien, chargé de renforcer les défenses, de superviser la préparation militaire et de veiller à ce que la civilisation résiste à toutes les menaces."
 mod_shipsize_starbase_deep_space_citadel_1_hull_mult: "$HITPOINTS$ des bastions d'espace lointain "
 mod_shipsize_starbase_deep_space_citadel_2_hull_mult: "$HITPOINTS$ des forteresses d'espace lointain "
 mod_shipsize_starbase_deep_space_citadel_3_hull_mult: "$HITPOINTS$ des citadelles d'espace lointain "
 siege_node: "Noeud de siège"
 siege_node_desc: "Nous avons appris. Nous nous sommes adaptés. Nos défenses tiendront."
 bio.2036.name: "Ils apprennent"
 bio.2036.desc: "Nous avons remarqué une tendance inquiétante dans les attaques de vaisseaux biologiques. Chaque vague fait preuve d'une meilleure coordination et de tactiques adaptées, et teste méthodiquement nos défenses. D'après les données des capteurs, les signatures énergétiques et le ciblage changent, ce qui indique que leurs stratégies évoluent.\n\nCes créatures, que ce soit par instinct ou par intelligence collective, deviennent de plus en plus difficiles à combattre. Si cela continue, repousser la prochaine vague s'avérera beaucoup plus ardu."
 bio.2036.a: "Prions pour les défenseurs"
 bio.2036.b: "Force aux défenseurs"
 bio.2036.tt: "À chaque nouvelle vague, les flottes arrivant par le §Yportail étrange§! gagnent en puissance."
 bio.2040.name: "Ennemis perdus"
 bio.2040.desc: "Les données télémétriques du portail illustrent un événement important survenu dans le système de §Y[event_target:starlit_sealed_system.GetName]§! : la flotte de vaisseaux biologiques et son écloserie ont été détruites par une force inconnue.\n\nBien que nous soyons soulagés que les [GetInvadersLower] aient connu une fin abrupte, nous ne pouvons pas ignorer le fait qu'une autre puissance pourrait un jour prendre le contrôle du système de [event_target:starlit_sealed_system.GetName].\n\nNous devons agir rapidement et sécuriser cet endroit stratégique avant qu'un nouveau siège ne se produise."
 bio.2040.a: "Amis... ou nouveaux ennemis ?"
 citadel_siege_cancelled: "Fin du siège"
 citadel_siege_cancelled_desc: "Les [GetInvadersLower] ont été anéantis. Notre siège interminable est-il enfin levé ?"
 citadel_siege_cancelled_machine: "$citadel_siege_cancelled$"
 citadel_siege_cancelled_machine_desc: "$citadel_siege_cancelled_desc$"
