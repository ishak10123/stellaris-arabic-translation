 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #PURITY
 bio.200.name: "Acceptation de notre héritage"
 bio.200.desc: "Maintenant que nous nous concentrons sur la pureté de notre génétique, nous prenons conscience de tout ce qui fait la grandeur de notre civilisation.\n\nNous devenons plus purs que jamais et n'avons jamais été aussi fiers de notre héritage.\n\nDes sommités des domaines artistique, scientifique et économique saluent nos efforts et espèrent qu'ils nous apporteront la gloire."
 bio.200.a: "Célébrons cette étape importante en encourageant l'art !"
 bio.200.b: "La recherche scientifique est notre priorité"
 bio.200.c: "La consommation est au coeur de l'économie"
 bio.210.name: "Non à la pureté !"
 bio.210.desc: "Les cris des manifestants résonnent dans nos villes. Un groupe de rebelles a décidé d'aller à l'encontre de notre cause et rejette la voie de la pureté.\n\nCes fauteurs de troubles prêchent notre besoin de diversité génétique et d'intégration culturelle.\n\nSi nous ne nous occupons pas rapidement de cet activisme, nous risquons de voir nos progrès vers la pureté réduits à néant."
 bio.210.a: "Éradiquons ces dissidents !"
 bio.210.b: "Apaisons-les avec de vaines promesses"
 bio.215.name: "Secrets du passé"
 bio.215.desc: "Des archéologues ont découvert des preuves d'une ancienne civilisation sur notre monde natal ancestral.\n\nUne chambre forte enfouie contenant des preuves choquantes de manipulations génétiques passées a été trouvée.\n\nSi ces informations venaient à être divulguées, elles compromettraient nos aspirations à la pureté génétique."
 bio.215.a: "Nous devons nous appuyer sur le passé et combiner ces recherches avec les nôtres"
 bio.215.b: "Détruisons les preuves, personne n'a besoin de savoir"
 bio.220.name: "Science étrange"
 bio.220.desc: "[event_target:rogue_geneticist.GetName], un[event_target:rogue_geneticist.GetXELead] généticien[event_target:rogue_geneticist.GetXNeLead] dissident[event_target:rogue_geneticist.GetXELead], a mené des expériences biologiques non autorisées, au mépris de toutes les règles de sécurité. Son objectif était de créer une espèce supérieure qui incarne ces idéaux de pureté auxquels nous aspirons tant. Malheureusement, il en a résulté la naissance d'une véritable abomination.\n\nUne sous-espèce de créatures éphémères, partageant certains aspects de notre profil génétique, mais affligée de maladies, dépérit désormais sous nos yeux. Bien que l'étude de leur génome se soit révélée extrêmement utile, nous ne pouvons pas les sauver. [event_target:rogue_geneticist.GetName] ne montre aucun remords."
 bio.220.a: "Démettons cette ordure de ses fonctions !"
 bio.220.a.tt: "[event_target:rogue_geneticist.GetName] n'a pas d'autre choix que de prendre sa retraite."
 bio.220.b: "Faisons taire [event_target:rogue_geneticist.GetName]"
 bio.220.c: "C'est exactement le genre d'initiative qu'il nous faut !"
 bio.225.name: "Un scandale !"
 bio.225.desc: "Après l'introduction de tests génétiques réguliers pour contrôler la pureté et identifier les aberrations génomiques, l'ADN de « haute qualité » est devenu une source de fierté.\n\nCependant, certains officiels de l'empire semblent avoir falsifié leurs résultats afin de se donner un meilleur profil biologique, avec des traits plus avantageux que ceux qu'ils ont réellement. Si des informations sur ces mensonges sont révélées, elles susciteront l'indignation de l'opinion publique."
 bio.225.a: "Nous devons faire en sorte que les tests soient plus fiables et plus précis"
 bio.225.b: "Peut-être que ces officiels ont simplement fait une erreur..."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #CLONING
 bio.230.name: "Le dilemme des clones"
 bio.230.desc: "Les clones sont parmi nous. Ils vivent dans nos villes et travaillent dans nos usines. Certains d'entre eux occupent même des postes importants et participent à l'élaboration des politiques qui régissent nos vies.\n\nAprès l'intégration des clones dans notre société, de nombreuses questions restent en suspens : quels sont leurs droits ? Ont-ils les mêmes droits que les individus d'origine ou doivent-ils plutôt être traités comme des subordonnés ?"
 bio.230.a: "La pleine citoyenneté pour tous les clones !"
 bio.230.b: "Au mieux, ce sont des citoyens de seconde classe"
 bio.235.name: "Sabotage à l'usine de clonage !"
 bio.235.desc: "La production de l'un de nos sites de clonage les plus efficaces s'est soudainement arrêtée en raison d'un incident qui a provoqué des dommages considérables.\n\nPour des raisons d'efficacité, de nombreuses lignes de production sont automatisées ; personne n'était donc sur place pour intervenir au moment où l'incident s'est produit.\n\nUn clone a glissé en sortant de la chaîne et s'est pris dans le mécanisme, ce qui a provoqué un embouteillage et nécessité un arrêt complet de la production."
 bio.235.a: "Cela doit faire l'objet d'une enquête approfondie !"
 bio.235.a.tt: "Vitesse d'avancée de la situation §Y$genetic_ascension_situation$§! pendant §Y12§! mois : §R-50%§!"
 biomorphosis_stalled_tt: "Vitesse d'avancée de la situation §Y$genetic_ascension_situation$§! pendant §Y12§! mois :"
 bio.235.b: "Que la production reprenne au plus vite !"
 bio.240.name: "Crise d'identité"
 bio.240.desc: "Notre empire regorge de clones qui signalent des difficultés liées à la notion de « soi ».\n\nIls souhaitent avoir une identité différente de celle de leurs donneurs de gènes. Ils remettent en question leur raison d'être et se sentent dépourvus de motivation quant à leurs objectifs et leurs aspirations."
 bio.240.a: "C'est normal, envoyons-les en thérapie"
 bio.240.b: "Ils devraient se consacrer entièrement à leur travail"
 bio.240.b.tt: "Chaque §Y£leader£personnalité§! de l'espèce principale de l'empire reçoit §G+200§! d'expérience."
 bio.250.name: "Les clones sont partout !"
 bio.250.desc: "Alors que de plus en plus de clones sont intégrés à notre population, les ressources nécessaires à leur entretien deviennent un fardeau pour notre économie.\n\nMême si le défi qui nous attend est énorme, le dynamisme économique résultant de l'augmentation de la main-d'oeuvre et du nombre de consommateurs pourrait poser les bases d'une prospérité à long terme, à condition que nous assurions une transition en douceur."
 bio.250.a: "Nos infrastructures doivent évoluer en fonction des besoins"
 bio.250.b: "Ils peuvent profiter de leur vie sur les colonies extraplanétaires"
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #MUTATION
 bio.260.name: "Mutations indomptables"
 bio.260.desc: "La croissance spontanée de membres supplémentaires, le passage d'un état à l'autre et la métamorphose soudaine sont des exceptions, mais elles ne doivent pas être ignorées.\n\nNos expériences sur les mutations produisent des résultats peu souhaitables. Peut-être que le fait de disposer d'outils permettant de modifier les gènes à volonté a des conséquences plus graves que prévu."
 bio.260.a: "Les mutations atypiques peuvent nous aider dans la recherche scientifique"
 bio_260_opinion_tt: "L'opinion des empires §Yspiritualistes§! à l'égard de la [Root.Owner.GetName] se dégrade de §R50§!."
 bio.260.b: "Éliminons les abominations"
 bio.260.b.tt: "Toutes les §Y£leader£personnalités autoritaristes§! reçoivent le trait §Y$leader_trait_eager$§!."
 bio.265.name: "Mutants d'excellence"
 bio.265.desc: "Grâce à des expériences de mutations menées sur eux-mêmes, un petit pourcentage de notre population bénéficie de capacités et de changements physiques extraordinaires.\n\nCes individus exceptionnellement forts et doués bâtissent leur propre communauté et sont au centre de toutes les attentions."
 bio.265.a: "Leur réussite pourrait inspirer les autres"
 bio.265.b: "Ils feraient de bons soldats"
 bio.265.b.tt: "Crée une §Yarmée de guerriers géniques§! sur §Y[Owner.capital_scope.GetName]§!."
 bio_265_opinion_tt: "L'opinion des empires §Ymilitaristes§! à l'égard de la [Root.Owner.GetName] s'améliore de §G50§!."
 bio.265.c: "Découvrons comment ils ont procédé et imitons-les"
 bio.270.name: "Matérialisation des légendes urbaines"
 bio.270.desc: "Nos systèmes de surveillance ont confirmé la présence d'individus génétiquement modifiés dans les égouts ; un écho inquiétant aux légendes urbaines depuis longtemps discréditées.\n\nCette découverte a accru les tensions sociales, la peur de l'inconnu, et les citoyens porteurs de mutations visibles se plaignent d'une discrimination croissante. Néanmoins, ces individus font preuve d'une ingéniosité remarquable, produisant des ressources à l'aide des gaz d'égout et modifiant leur environnement de manière tout à fait surprenante."
 bio.270.a: "Nettoyons les égouts !"
 bio.270.b: "Ces mutants ont peut-être trouvé quelque chose d'intéressant..."
 bio.280.name: "Épidémie chez les mutants"
 bio.280.desc: "Une nouvelle épidémie se propage dans tout l'empire. Elle provoque chez son hôte des symptômes extrêmement désagréables : expulsions involontaires d'air et de liquide, fatigue paralysante et, dans certains cas, la mort.\n\nCurieusement, seuls ceux dont la physiologie a subi des mutations génétiques contractent la maladie. Une étude de leur génome modifié a donné des résultats étonnants."
 bio.280.a: "Trouvons un usage thérapeutique"
 bio.280.b: "Faisons de cette maladie une arme"
 bio_280_opinion_tt: "L'opinion des empires §Ymatérialistes§! à l'égard de la [Root.Owner.GetName] se dégrade de §R50§!."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #ANY APPROACH
 bio.295.name: "Cellule rebelle"
 bio.295.desc: "Nos centres de recherche en génomique ont permis à l'ensemble de la population d'accéder à des modifications physiologiques comme jamais auparavant.\n\nCependant, nos citoyens exigent que nous allions encore plus loin en donnant aux « biohackers » un accès libre et illimité au génie génétique et aux ressources de l'empire."
 bio.295.a: "Donnons une plus grande autonomie aux biohackers"
 bio.295.b: "Les citoyens ordinaires jouissent déjà de trop de liberté"
 bio_295_opinion_tt: "L'opinion des empires §Yégalitaristes§! à l'égard de la [Root.Owner.GetName] s'améliore de §G50§!."
 bio.300.name: "Génie de la génétique"
 bio.300.desc: "Notre [Root.Owner.GetScientist] [event_target:genius_geneticist.GetName] a récemment publié un article de recherche qui pourrait accélérer de façon exponentielle nos expériences génétiques et en augmenter l'efficacité.\n\nCependant, la méthode présentée n'est que purement théorique et n'a jamais été testée. Nous devons soigneusement l'examiner avant d'envisager de l'utiliser."
 bio.300.a: "Nous reconnaissons la contribution de [event_target:genius_geneticist.GetName]"
 bio.300.b: "Nous ne pouvons pas tolérer des idées (et des individus) aussi frivoles"
 bio.300.c: "Que tout le monde se remette au travail"
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #PURITY
 bio.310.name: "Atteinte à la pureté de la [target.GetGestaltEntityName]"
 bio.310.desc: "Notre espèce a été contaminée par un fragment de code génétique malveillant, conséquence de nos expériences continues de modification génétique. Nous tombons malades à un rythme alarmant, la séquence étrangère déstabilisant notre matériel génétique de manière incontrôlable.\n\nNous devons résoudre ce comportement biologique anormal avant qu'il ne soit trop tard."
 bio.310.a: "Éliminons la raison du problème"
 bio.310.b: "Étudions ce phénomène"
 bio.315.name: "Dévoués à la cause"
 bio.315.desc: "Pour que notre civilisation atteigne la pureté, nous devons veiller au bien-être de la [target.GetGestaltEntityName]. Le processus de modification génétique doit aboutir à des adaptations qui augmentent la résilience du collectif.\n\nSi nous nous trompons de voie et introduisons des changements qui provoquent des instabilités ou perturbent la cohésion, les conséquences pourraient être désastreuses et mettre en péril les fondements de notre unité."
 bio.315.a: "Concentrons-nous sur la résistance physique"
 bio.315.b: "L'efficacité cognitive est d'une importance capitale"
 bio.325.name: "Au-delà du présent"
 bio.325.desc: "Afin de garantir la longévité et la pureté de notre espèce, nous devons nous reproduire de manière plus sélective et introduire des protocoles de tests génétiques plus stricts.\n\nCe n'est qu'en sélectionnant soigneusement les drones dignes de perpétuer notre lignée que nous dépasserons le cadre de l'évolution naturelle."
 bio.325.desc.wilderness: "Afin de garantir la longévité et la pureté de notre diversité symbiotique, nous devons nous reproduire de manière plus sélective et introduire des protocoles de tests génétiques plus stricts.\n\nCe n'est qu'en sélectionnant soigneusement les symbiotes présentant des traits intéressants pour le collectif que nous dépasserons nos limites originelles."
 bio.325.a: "Donnons la priorité à l'intelligence lors des examens"
 bio.325.b: "La reproduction est nécessaire pour étendre notre empire"
 bio.330.name: "Ascension coûteuse"
 bio.330.desc: "Les avantages de la modification génétique assureront notre avenir, mais le rôle de chaque [target.GetIndividualName] et nos moindres actions doivent être conformes à notre vision de la pureté.\n\nNous sommes confrontés à un choix critique : devons-nous privilégier l'excellence au détriment de l'adaptabilité, ou adopter une stratégie plus globale et donner la priorité aux infrastructures nécessaires à la concrétisation de notre démarche ?"
 bio.330.a: "La pureté doit être notre seule priorité"
 bio.330.b: "Nous devons prendre le temps de développer nos infrastructures"
 bio.335.name: "Purge des imperfections"
 bio.335.desc: "Nous avons identifié diverses imperfections et anomalies génétiques au sein de notre [target.GetGestaltEntityName].\n\nPour atteindre des objectifs plus grands, nous devons éliminer ces traits défectueux et reprendre à la nature le contrôle de notre évolution physique."
 bio.335.a: "Éliminons les faibles pour renforcer le collectif"
 bio.335.b: "Essayons de corriger les erreurs"
 bio_335_opinion_tt: "L'opinion des empires §Yenclins à la bienfaisance§! à l'égard de la [Root.Owner.GetName] se dégrade de §R50§!."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #CLONING
 bio.340.name: "Il y a trop de clones !"
 bio.340.desc: "Nos sites de clonage sont plus efficaces que prévu, si bien que nous disposons à présent d'un surplus de clones.\n\nL'intégration d'autant de clones représente un véritable défi."
 bio.340.a: "Les nouveaux clones doivent migrer"
 bio.340.b: "Augmentons la production de clones"
 bio.350.name: "Coquilles vides"
 bio.350.desc: "Un dysfonctionnement dans l'un de nos principaux centres de clonage a affecté de nombreux drones. Une contamination génétique s'est produite au cours du processus de réplication, donnant naissance à un lot de clones dépourvus de la capacité de penser.\n\nCe sont des objets biologiques dépourvus de conscience et de fonctions cognitives supérieures. En attendant que le problème soit identifié et corrigé, le site fonctionne à capacité réduite."
 bio.350.a: "C'est... apaisant"
 bio.350.a.tt: "100 £pop£§Hpops préconscientes§! sont créées sur §Y[owner.capital_scope.GetName]§!."
 bio.350.b: "Produisons un nouveau lot"
 bio.365.name: "Métaphysique de la Conscience"
 bio.365.desc: "Une question émerge au sein de la Conscience : les clones nous remplaceront-ils un jour ?\n\nNos premiers travaux de réplication génétique se déroulent si bien que nous nous demandons si ce mode de reproduction efficace ne remplacera pas un jour notre mode de reproduction naturel.\n\nSi c'est le cas, la Conscience ne disposera plus de donneurs originaux, mais seulement de clones de clones de clones... Qu'est-ce que cela signifie pour notre espèce ? C'est une question qui n'a pas de réponse. Pourtant, nous sommes obligés de nous la poser."
 bio.365.a: "La question a une certaine valeur en soi"
 bio.365.b: "Ce genre de questions est une distraction inutile"
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #MUTATION
 bio.375.name: "Connexion profonde"
 bio.375.desc: "Nous avons fait une découverte. En manipulant certains gènes, nous pouvons élargir notre conscience de manière à ce que nos sens soient beaucoup plus aiguisés, outrepassant les limites de notre espèce.\n\nL'introduction de ces mutations dans la Conscience nécessitera de grandes quantités d'énergie, mais ce faisant, nous approfondirons notre compréhension de l'univers et de la place que nous y occupons."
 bio.375.a: "Les coûts sont négligeables, allons-y"
 bio.375.b: "Ne nous précipitons pas"
 mod_planet_evaluators_physics_research_produces_add: "£physics_research£$physics_research$ pour $pop_group_unit$ [evaluator.GetIcon][evaluator.GetNamePlural_lower] "
 bio.380.name: "Surcharge émotionnelle"
 bio.380.desc: "Des sections entières de la Conscience connaissent des accès incontrôlables de colère et d'émotion qui nous affectent tous et augmentent la frustration et la douleur ressenties par l'ensemble du collectif.\n\nUne mutation récente semble avoir entraîné une surstimulation des neurones dans les centres de contrôle d'agressivité de nos drones, perturbant ainsi l'équilibre émotionnel de la Conscience. Les conflits sont plus fréquents ; certains drones cessent d'effectuer leurs tâches pour attaquer leurs semblables."
 bio.380.a: "Unis, nous veillerons les uns sur les autres"
 bio.380.b: "Laissons cette colère s'exprimer !"
 bio.385.name: "Intolérance environnementale"
 bio.385.desc: "Bien que les mutations soient censées nous améliorer, il a été constaté que certaines d'entre elles ont de fâcheux effets secondaires.\n\nDes améliorations visant à accroître notre longévité ont été implémentées avec succès, mais il s'avère qu'elles réduisent notre tolérance aux conditions climatiques extrêmes.\n\nCeux d'entre nous ayant subi ces modifications biologiques ont signalé des difficultés avec leur système de thermorégulation et ce malaise est ressenti dans toute la Conscience."
 bio.385.a: "Nous devons améliorer nos systèmes de protection contre les intempéries"
 bio.385.b: "Il est normal que nos préférences environnementales changent à mesure que nous évoluons"
 uncomfortable_drones: "Drones mal à l'aise"
 uncomfortable_drones_desc: "Nos drones luttent contre les désagréments causés par les mutations."
 bio.390.name: "Force ou intellect"
 bio.390.desc: "Nous avons découvert deux nouvelles mutations. L'une accroît la force physique des drones subalternes, ce qui se traduit par une augmentation de leur productivité. L'autre augmente l'intellect des drones complexes, ce qui améliore leur capacité à résoudre les problèmes et à élaborer des stratégies.\n\nLa Conscience doit choisir une voie."
 bio.390.a: "La force est synonyme de progrès"
 bio.390.b: "Nous pensons, donc nous prospérons"
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #ANY APPROACH
 bio.405.name: "Génome malade"
 bio.405.desc: "Nous avons tout juste réussi à endiguer l'apparition soudaine d'une maladie génétique.\n\nSuite à la manipulation de notre propre biologie, des mutations indésirables sont apparues dans notre ADN, affectant physiquement de nombreux [target.GetIndividualNamePlural].\n\nLes concernés ont été placés en quarantaine. Nous devons maintenant décider de la marche à suivre."
 bio.405.a: "Éliminons les [target.GetIndividualNamePlural] pour éliminer la maladie"
 bio.405.b: "Étudions les drones atteints"
 bio.410.name: "Dégradation cellulaire"
 bio.410.desc: "Une erreur de calcul a compromis l'intégrité génétique d'une grande partie de nos drones. Malheureusement, nous ne savons pas encore quand cette erreur s'est produite.\n\nSuite à la vérification des calculs et à la modification de certaines des procédures les plus problématiques, nous sommes maintenant prêts à poursuivre nos efforts pour améliorer notre espèce.\n\nToutefois, il est difficile de dire si nous avons réellement corrigé l'erreur ou, pire encore, si nous en avons commis d'autres."
 bio.410.desc.wilderness: "Une erreur de calcul a compromis l'intégrité génétique d'une grande partie de nos symbiotes. Malheureusement, nous ne savons pas encore quand cette erreur s'est produite.\n\nSuite à la vérification des calculs et à la modification de certains détails enzymatiques, nous sommes maintenant prêts à poursuivre nos efforts pour améliorer notre espèce.\n\nToutefois, il est difficile de dire si nous avons réellement corrigé l'erreur ou, pire encore, si nous en avons commis d'autres."
 bio.410.a: "Nous pouvons tirer des enseignements de la suite"
 bio.410.b: "Suspendons les expériences"
 bio.410.b.tt: "$bio.235.a.tt$"
