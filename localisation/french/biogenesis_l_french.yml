 auth_bio_oligarchic_purity: "Hiérarchie eugénique"
 auth_bio_oligarchic_purity_tt: "$eugenic_political_power_effects$"
 auth_bio_oligarchic_purity_desc: "Le pouvoir absolu doit être détenu par l'élite génétique, les individus les plus purs et les plus à même de gérer le destin de cette civilisation. Les citoyens qui leur sont inférieurs remplissent des rôles préétablis, adaptés à leur potentiel génétique. La satisfaction ne vient pas de l'ambition, mais de l'acceptation de la tâche assignée."
 eugenic_political_power_effects: "$pop_effects_from_purity_header$ : $TABBED_NEW_LINE$, $MOD_POP_BONUS_WORKFORCE_MULT$: $plus_minus_icon$§Y$@purity_traits_bonus_workforce_mult|2%$§!, $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: $plus_minus_icon$§Y$@purity_traits_council_speed|Y1%$§!."
 auth_bio_dictatorial_purity: "Justice nucléique"
 auth_bio_dictatorial_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$Prod. de recherche £society£sociétale pour $pop_group_unit$ £pop£pops : $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $MOD_PLANET_CRIME_ADD$ planétaire : $minus_plus_icon$§Y5.0§! $TABBED_NEW_LINE$- $MOD_PLANET_CRIME_ADD$ de secteur : $minus_plus_icon$§Y2.5§! $TABBED_NEW_LINE$- $MOD_PLANET_STABILITY_ADD$ planétaire : $plus_minus_icon$§Y5.0§! $TABBED_NEW_LINE$- $MOD_PLANET_STABILITY_ADD$ de secteur : $plus_minus_icon$§Y2.5§!"
 auth_bio_dictatorial_purity_desc: "Ce gouvernement utilise les données génétiques et biométriques comme outil de justice préventive, en examinant le code génétique de chaque citoyen pour y déceler des tendances criminelles. Grâce à cette surveillance minutieuse, les forces de l'ordre peuvent intervenir avant que le crime ne soit commis, ce qui permet de maintenir l'ordre. La vraie justice n'est pas réactive, mais préventive, et protège la société en éliminant le crime à sa racine."
 auth_bio_imperial_purity: "Règne biotique"
 auth_bio_imperial_purity_tt: "Effets de la ['concept_genetic_purity',pureté génétique] sur la £leader£§Y$imperial_ruler$§!souveraineté de l'empire et ses §Yhéritiers§! :$TABBED_NEW_LINE$- $MOD_LEADER_SKILL_ADD$: $plus_minus_icon$§Y$@purity_traits_imperial_level|2$§! $DOUBLE_NEW_LINE$£leader£Les personnalités de la même espèce que notre §Y[Ruler.GetTitle]§! reçoivent le trait §Y$imperial_bloodline$§!\n£leader£Conséquences de la ['concept_genetic_purity',pureté génétique] sur la §Ylignée impériale§! : $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_MULT$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§!"
 auth_bio_imperial_purity_desc: "Ce gouvernement travaille sans relâche pour atteindre la perfection biotique en prolongeant la durée de vie de ses dirigeants grâce à la modification génétique. La prospérité de la société dépend de la survie et de la diffusion des meilleurs gènes. La surveillance constante du patrimoine génétique est un gage de progrès, la longévité et la perfection étant les objectifs ultimes."
 auth_bio_corporate_purity: "Syndicat organique"
 auth_bio_corporate_purity_tt: "$organic_leaders_have_trade_upkeep$\n\n$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- Prod. de £trade£§Yvaleur commerciale§! pour $pop_group_unit$ £pop£pops : $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_corporate_purity_desc: "Cette mégacorporation a perfectionné la marchandisation de la vie et tire profit du commerce d'organes. Les organes de qualité supérieure atteignent des prix records et les « biens excédentaires » sont proposés sur le marché noir. Des négociateurs véreux et des chirurgiens clandestins proposent leurs services aux clients désespérés et veillent à ce qu'aucun organe ne soit jamais gaspillé."
 #Cloning
 auth_bio_democratic_cloning: "Multiplicité compatible"
 auth_bio_democratic_cloning_tt: "$ENABLES_BACKUP_CLONES$\nEntretien des §Yclones de personnalités§! : §G$@cordant_multiplicity_clone_upkeep|0%$§!\nLa ['concept_clone_leader_degradation',dégradation] des §Yclones de personnalités§! est réduite et ils ne peuvent pas avoir de §Yclones de substitution§!"
 auth_bio_democratic_cloning_desc: "Ce gouvernement promeut le clonage pour l'égalité et le progrès. Les clones jouissent des mêmes droits que les individus d'origine et leurs votes ont le même poids. La volonté du peuple est déterminée par la diversité de chaque perspective, que l'on soit un clone ou non."
 auth_bio_oligarchic_cloning: "Régence réplicative"
 auth_bio_oligarchic_cloning_tt: "$ENABLES_BACKUP_CLONES$\nLe trait §Y$leader_trait_has_backup_clone$§! octroie des effets supplémentaires aux conseillers\nLa ['concept_clone_leader_degradation',dégradation] des §Yclones de personnalités§! est réduite lorsqu'ils sont membres du Conseil\n"
 auth_bio_oligarchic_cloning_desc: "Cette société assure à ses élites un règne perpétuel en confiant le pouvoir aux clones les plus parfaits. Le clonage préserve et améliore leur patrimoine génétique, assurant ainsi une continuité sans faille de la gouvernance. Chaque poste influent est occupé par une itération améliorée, garantissant leur suprématie à travers les générations."
 auth_bio_dictatorial_cloning: "Subordination uniforme"
 auth_bio_dictatorial_cloning_tt: "$ENABLES_BACKUP_CLONES$\n$AVAILABLE_POLICIES$ §Y$policy_homogenous_class$§!"
 auth_bio_dictatorial_cloning_desc: "La loyauté absolue est assurée par une sélection génétique méticuleuse ; seuls les individus enclins à une obéissance inébranlable sont choisis pour le clonage. On obtient ainsi une société durable dans laquelle la rébellion est non seulement improbable, mais biologiquement impossible. La conception minutieuse des citoyens assure une harmonie perpétuelle."
 auth_bio_imperial_cloning: "Continuité héréditaire"
 auth_bio_imperial_cloning_tt: "$ENABLES_BACKUP_CLONES$\nLes pénalités du trait §Y$leader_trait_backup_clone_imperial$§! ne peuvent pas être accrues"
 auth_bio_imperial_cloning_desc: "La légitimité incontestable du dirigeant est garantie par son clonage, chaque itération héritant de la sagesse et des triomphes de ses vies antérieures. Cette continuité ininterrompue du pouvoir assure le développement constant de la société et la poursuite d'un âge d'or."
 auth_bio_corporate_cloning: "Association de réplication"
 auth_bio_corporate_cloning_tt: "$organic_leaders_have_trade_upkeep$\n$ENABLES_BACKUP_CLONES$\nProd. de £trade_value£valeur commerciale des emplois des £building£['building:building_clone_vats',cuves à clones] : §G+$@replicatory_association_trade_mult|0%$§!\nProd. de £mod_planet_amenities_add£services planétaires des £building£§Ycuves à clones§! : §G+$@replicatory_association_amenities_add|0$§!\n$AVAILABLE_POLICIES$ §Y$policy_replicatory_association_insurance$§!"
 auth_bio_corporate_cloning_desc: "La confort et le réconfort n'ont jamais été aussi accessibles : n'importe qui peut se cloner en cas de besoin, ou commander une réplique d'un être cher parti trop tôt. Cette mégacorporation garantit un taux de concordance de 93%. Les technologies de pointe sont mises au service de la lutte contre la solitude."
 AUTHORITY_HAS_CLONE: "$t$À la §Ymort du dirigeant§!, un §Yclone impérial§! le remplace. $TABBED_NEW_LINE$La ['concept_clone_leader_degradation',dégradation] des §Yclones impériaux§! est réduite."
 policy_replicatory_association_insurance: "Répliques garanties"
 policy_replicatory_association_insurance_desc: "Les membres du conseil d'administration et autres employés importants bénéficient d'un accès prioritaire au clonage dans le cadre de leur rémunération."
 replicatory_association_insurance_stellar: "Assurance stellaire"
 replicatory_association_insurance_stellar_name: "$replicatory_association_insurance_stellar$"
 replicatory_association_insurance_stellar_desc: "$leader_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\nLa ['concept_clone_leader_degradation',dégradation] des §Yclones de substitution§! des §Ypersonnalités§! est réduite"
 replicatory_association_insurance_platinium: "Assurance platine"
 replicatory_association_insurance_platinium_name: "$replicatory_association_insurance_platinium$"
 replicatory_association_insurance_platinium_desc: "$councilor_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\nLa ['concept_clone_leader_degradation',dégradation] des §Yclones de substitution§! des §Yconseillers§! est réduite"
 replicatory_association_insurance_basic: "Assurance de base"
 replicatory_association_insurance_basic_name: "$replicatory_association_insurance_basic$"
 replicatory_association_insurance_basic_desc: "$ruler_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\nLa ['concept_clone_leader_degradation',dégradation] des §Yclones de substitution§! du §Ydirigeant§! est réduite"
 leader_upkeep_skill_header_energy: "Entretien en £energy£§Iénergie§! des £leader£personnalités par niveau de compétence :"
 councilor_upkeep_skill_header_energy: "Entretien en £energy£§Iénergie§! des £leader£conseillers par niveau de compétence :"
 ruler_upkeep_skill_header_energy: "Entretien en £energy£§Iénergie§! du £leader£dirigeant par niveau de compétence :"
 policy_homogenous_class: "Façonnage des génomes"
 policy_homogenous_class_desc: "Un façonnage minutieux du génome de base utilisé pour entretenir les clones de nos dirigeants permet l'optimisation d'un groupe trié sur le volet."
 homogenous_class_scientists: "Codex scientifique"
 homogenous_class_scientists_name: "$homogenous_class_scientists$"
 homogenous_class_scientists_desc: "Effets des §Yclones de substitution§! des scientifiques : $TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- La ['concept_clone_leader_degradation',dégradation] des clones de substitution des conseillers est réduite"
 homogenous_class_officials: "Archives administratives"
 homogenous_class_officials_name: "$homogenous_class_officials$"
 homogenous_class_officials_desc: "Effets des §Yclones de substitution§! des officiels : $TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- La ['concept_clone_leader_degradation',dégradation] des clones de substitution est réduite"
 homogenous_class_commanders: "Protocole martial"
 homogenous_class_commanders_name: "$homogenous_class_commanders$"
 homogenous_class_commanders_desc: "Effets des §Yclones de substitution§! des commandants : $TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- La ['concept_clone_leader_degradation',dégradation] des clones de substitution est réduite"
 society_upkeep_skill_header: "Entretien de la £society£§Irecherche sociétale§! :"
