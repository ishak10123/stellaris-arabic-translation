 fresh_biosphere: "Biosphère fraîche"
 fresh_biosphere_desc: "Un nouveau monde plein de nouvelles saveurs et de possibilités d'assimilation. Nos colons sont en train de cataloguer et d'analyser tout ce que cette planète a à offrir."
 fresh_biosphere_tt: "Avancée mensuelle de la situation §Y$evolutionary_predators_situation$§! : §G+10§!"
 exhausted_biosphere: "Biosphère épuisée"
 exhausted_biosphere_desc: "Il n'y a plus rien à découvrir ici. Les colons qui ont autrefois retourné chaque pierre pour trouver des singularités biologiques sont allés au bout de leur travail."
 exhausted_biosphere_tt: "Avancée mensuelle de la situation §Y$evolutionary_predators_situation$§! : §G+1§!"
 genetic_soup: "Soupe génétique"
