 ### Behemoth Crisis ###
 ap_behemoths: "Fureur des mastodontes"
 ap_behemoths_desc: "Les superprédateurs de la galaxie n'ont aucune contrainte. En nous unissant, nous nous déferons de nos faiblesses biologiques et deviendrons une force de la nature."
 must_use_bioships: "£trigger_no£ Nécessite l'utilisation d'un modèle de vaisseau §Ybiologique§!."
 behemoth_crisis_chain_title: "Crise des mastodontes"
 behemoth_crisis_chain_desc: "Les étoiles ne sont rien d'autre que le carburant de notre appétit, et le désastre est le terreau de notre ambition. Nous défierons l'ordre naturel et créerons une énorme bête inarrêtable qui remodèlera le cosmos."
 crisis_behemoth_level_1: "§HPréoccupante§!"
 crisis_behemoth_level_1_desc: "Crise niveau 1"
 crisis_behemoth_level_2: "§HÀ risque§!"
 crisis_behemoth_level_2_desc: "Crise niveau 2"
 crisis_behemoth_level_3: "§HDangereuse§!"
 crisis_behemoth_level_3_desc: "Crise niveau 3"
 crisis_behemoth_level_4: "§HCatastrophique§!"
 crisis_behemoth_level_4_desc: "Crise niveau 4"
 crisis_behemoth_level_5: "§HMenace existentielle§!"
 crisis_behemoth_level_5_desc: "Crise niveau 5"
 behemoth_crisis_level_5_req_tooltip: "£trigger_no£A terminé le projet spécial §Y$BEHEMOTH_CRISIS_SPECIAL_PROJECT_4$§! de la chaîne d'événements §H$become_the_crisis_chain$§!"
 feral_insight: "Connaissances animales"
 feral_insight_name: "$feral_insight$ :"
 feral_insight_value: "$VAL|0$£feral_insight£"
 feral_insight_current_value: "Valeur actuelle : §Y$VALUE|0$§!"
 feral_insight_gaining: "Atteignez les §Hobjectifs de crise§! pour cumuler davantage de £feral_insight£§Y$feral_insight$§!."
 feral_insight_desc: "Nous étudions les habitudes alimentaires et comportementales des méga-organismes."
 feral_insight_crisis_objective: "Objectifs de crise"
 feral_insight_crisis_objective_gained: "$feral_insight$ obtenues"
 feral_insight_crisis_objective_reward: "$REWARD$"
 feral_insight_crisis_objective_progress: "Cet objectif de crise nous a octroyé $AMOUNT$£feral_insight£."
 feral_insight_crisis_description_title: "Crise des mastodontes"
 feral_insight_crisis_description: "$menace_crisis_description_intro$\n\nLes léviathans qui vivent dans le vide sont incroyablement redoutables et puissants, mais leur existence est dénuée de sens. En dotant leurs corps imposants de notre intelligence, nous créerons une nouvelle espèce de créatures spatiales qui nous assurera la suprématie galactique."
 feral_insight_crisis_howto_title: "Naissance de mastodontes"
 feral_insight_crisis_howto: "La poursuite des §Hobjectifs de crise§! génère des £feral_insight£§Hconnaissances animales§! qui nous permettent d'accéder à notre plein potentiel biologique."
 feral_insight_crisis_level_unlocked: "Au niveau $LEVEL$, nous obtiendrons ces avantages :\n"
 feral_insight_crisis_level_locked: "Nécessaire pour atteindre ce niveau :\n"
 feral_insight_crisis_level_unlock: "A §Y$CURRENCY$§! de £feral_insight£connaissances animales"
 feral_insight_crisis_level_desc: "Pour passer d'un niveau de crise à l'autre, accumuler des £feral_insight£§Hconnaissances animales§!, terminer les projets de crise spéciaux et élever votre mastodonte."
 #Crisis Perks
 menp_behemoth_objectives: "Connaissances animales"
 unlocks_behemoth_objectives: "Permet de cumuler des £feral_insight£§Yconnaissances animales§! en atteignant les §Hobjectifs de crise§!.\n"
 menp_behemoth_objectives_desc: "L'étude du comportement des mastodontes nous aidera à surmonter les limites biologiques qui pèsent sur tous ceux qui sont nés sur la planète."
 menp_behemoth_bioship_1: "Chitine renforcée"
 menp_behemoth_bioship_1_desc: "La vie dans l'espace nécessite une enveloppe extérieure solide, capable de résister aux conditions les plus difficiles."
 menp_behemoth_society_1: "Essais accélérés sur le terrain"
 menp_behemoth_society_1_desc: "Les expériences en laboratoire sont un bon début, mais des résultats visibles ne peuvent être obtenus qu'en travaillant sur le terrain, ce qui implique des risques considérables."
 menp_behemoth_food_1: "Cultures ultra-larges"
 menp_behemoth_food_1_desc: "Il est difficile d'assouvir l'énorme appétit d'un mastodonte. Cultiver à grande échelle des aliments génétiquement modifiés est au moins un début."
 menp_behemoth_egg: "Écloseries gigantesques"
 unlocks_behemoth_egg: "Permet la mégastructure §YOEuf de mastodonte§!.\n"
 menp_behemoth_egg_desc: "Un oeuf géant a besoin d'un lieu d'incubation suffisamment grand pour éclore. Cette écloserie orbitale doit être placée à bonne distance de l'étoile, afin que le jeune mastodonte dispose d'un espace suffisant."
 menp_behemoth_bioship_2: "Stimulation glandulaire améliorée"
 menp_behemoth_bioship_2_desc: "À l'aide de sondes spécialement conçues, nous stimulons artificiellement les glandes endocrines du mastodonte pour qu'elles produisent davantage d'hormones de croissance."
 menp_behemoth_society_2: "Connexion transversale"
 menp_behemoth_society_2_desc: "Au croisement de la sélection naturelle et de la bio-ingénierie, une force incomparable est en train d'émerger."
 menp_behemoth_food_2: "Excès de nutriments"
 menp_behemoth_food_2_desc: "Il est pratiquement impossible d'assouvir l'énorme appétit d'un mastodonte. Cultiver à grande échelle des aliments génétiquement modifiés n'est qu'un début."
 menp_behemoth_hatchling: "Couvée colossale"
 unlocks_behemoth_hatchling: "Permet de faire §Yéclore§! les oeufs de mastodonte.\n"
 menp_behemoth_hatchling_desc: "Une couvée de mastodontes recouvre des systèmes entiers. Nos voisins galactiques devront respecter nos créatures ou ils finiront dans leurs estomacs."
 menp_behemoth_bioships_3: "Cycles de croissance accélérés"
 menp_behemoth_bioships_3_desc: "Il est essentiel d'accélérer le développement des créatures spatiales géantes pour atteindre notre objectif principal. Nous veillerons à ce que nos infrastructures se développent en parallèle."
 menp_behemoth_society_3: "Prouesses en bio-ingénierie"
 menp_behemoth_society_3_desc: "Grâce à de nombreux tests plus ou moins réussis, nous avons pu accroître nos connaissances en matière de bio-ingénierie. Nous faisons désormais partie des plus grands bio-ingénieurs de la galaxie."
 menp_behemoth_mind_control: "Formation de pensées profondes"
 unlocks_behemoth_mind_control: "Permet d'influencer les pensées des §Ymastodontes§!.\n"
 menp_behemoth_mind_control_desc: "Notre esprit collectif aspire à quelque chose de plus grand et de meilleur. Notre ambition ne connaît pas de limites."
 menp_behemoth_hatchling_2: "Croissance débridée"
 unlocks_behemoth_hatchling_2: "Permet aux §Ymastodontes§! bien nourris de se faire une chrysalide et de gagner drastiquement en taille et en puissance.\n"
 menp_behemoth_hatchling_2_desc: "La bête s'est libérée de ses chaînes. Le petit d'hier se transforme rapidement en une force de la nature féroce et implacable."
 menp_behemoth_bioship_4: "Organismes surpuissants"
 menp_behemoth_bioship_4_desc: "Les mastodontes, animés par une faim insatiable et une rage indomptable, acquièrent une puissance destructrice. Ce sont des armes biologiques prêtes à éradiquer aussi bien les ennemis que les innocents."
 menp_behemoth_mutation_research: "Mutations de mastodonte"
 unlocks_behemoth_mutation_research: "Donne accès à un §Yprojet spécial§! permettant de façonner le développement génétique des §Ymastodontes§!.\n"
 menp_behemoth_mutation_research_desc: "Nous modifions le matériel génétique des mastodontes au cours de leur croissance afin de ne favoriser que les caractéristiques physiologiques les plus avantageuses."
 menp_behemoth_mind_control_2: "Déploiement des spécimens alpha"
 unlocks_behemoth_mind_control_2: "Nous forgerons des liens psychiques plus forts avec nos §Ymastodontes§!.\n"
 menp_behemoth_mind_control_2_desc: "Les êtres à la génétique parfaite seraient à l'étroit à l'intérieur de nos frontières. Il faut leur donner accès à toute la galaxie."
 menp_behemoth_mind_meld: "Fusion des esprits"
 unlocks_behemoth_mind_meld: "Prenez le contrôle d'un puissant §Ymastodonte de classe IV§!, une créature inégalée capable de dominer la galaxie.\n"
 menp_behemoth_mind_meld_desc: "Notre conscience et celle du mastodonte ne font qu'un. Sa rage devient la nôtre. Nous nous laissons volontairement consumer, et la colère de la bête qui dévore notre conscience collective est de plus en plus palpable. Elle devient nous et nous devenons la bête."
 menp_behemoth_primal_roar: "Rugissement primitif"
 unlocks_behemoth_primal_roar: "Provoquez la plus grande des créatures et défiez-la pour dominer l'espace.\n"
 menp_behemoth_primal_roar_desc: "Elle nous traverse, nous coupe en deux, nous déchire, nous brûle : la colère, ce rugissement primitif. La galaxie brûlera sous le feu de notre courroux."
 menp_behemoth_ever_hungry: "Appétit insatiable"
 unlocks_behemoth_ever_hungry: "Permet la situation $behemoth_finale_situation$. Nourrissez-vous de la galaxie pour gagner en taille et en puissance et devenir le prédateur spatial ultime.\n"
 menp_behemoth_ever_hungry_desc: "Nous souffrons le martyre. Notre seule motivation est notre besoin permanent de manger. Au fond de nous se trouve un vide impossible à combler, peu importe la quantité consommée. Il n'y a qu'un seul moyen d'apaiser cette souffrance : dévorer une galaxie entière."
 menp_behemoth_egg_2: "Progéniture affamée"
 unlocks_behemoth_egg_2: "Débloque la capacité permettant aux §Ymastodontes de classe IV§! de perpétuer leur espèce en pondant des §Yoeufs§!.\n"
 menp_behemoth_egg_2_desc: "Notre progéniture se délectera des restes de la galaxie. Sa faim ne sera pas assouvie, mais elle aura l'éternité devant elle."
 mod_shipclass_military_hull_mult: "Points de coque des vaisseaux militaires "
 mod_country_resource_max_food_add: "Réserves max. de la £food£nourriture "
 mod_starbase_shipyard_build_alloys_cost_mult: "Coût en alliage des vaisseaux "
 crisis_egg_built: "£trigger_yes£ A §Yconstruit§! la mégastructure §H$behemoth_egg$§!"
 crisis_egg_required: "£trigger_no£ A §Yconstruit§! la mégastructure §H$behemoth_egg$§!"
 crisis_egg_hatched: "£trigger_yes£ A §Yfait éclore§! un §Hpetit mastodonte§! d'§Hoeuf de mastodonte§!"
 crisis_hatchling_required: "£trigger_no£ A §Yfait éclore§! un §Hpetit mastodonte§! d'§Hoeuf de mastodonte§!"
 district_mindlink: "Métropole de lien neural"
 district_mindlink_plural: "$district_mindlink$"
 district_mindlink_desc: "De grandes tours surplombent les foyers de peuplement, offrant aux volontaires la possibilité de communier directement avec la bête."
 planet_building_buffer: "Conversion métropolitaine"
 planet_building_buffer_desc: "Bien que la création de tours mentales permettant de communier avec la bête se fasse rapidement, nous avons dû prévoir des plans d'urgence pour assurer la continuité des infrastructures de la planète."
 mod_job_transference_volunteer_add: "Emplois de volontaires pour le transfert"
 planet_transference_volunteers: "$job_transference_volunteer_plural$"
 job_transference_volunteer: "Volontaires pour le transfert"
 job_transference_volunteer_plural: "Volontaires pour le transfert"
 job_transference_volunteer_desc: "Pour beaucoup, le lien neural avec la bête ne représente qu'un simple détail. Il est constant, mais lointain. Au contraire, pour d'autres, le besoin de fusionner avec elle est irrépressible. Ces volontaires jouent le rôle d'intermédiaires tandis que leur esprit est peu à peu absorbé dans le collectif bestial."
 job_transference_volunteer_effect_desc: "\nLes £job_transference_volunteer£volontaires pour le transfert produisent de l'£unity£§Yunité§!, accroissent la §Ystabilité§! de la planète et renforcent nos §Yvaisseaux§!.\n§YTous les 6 mois, §Y10%§! des pops occupant cet emploi sont transférées§!. Cela les tue, mais multiplie la production de ressources du district.\n\n§GPops transférées§! : [num_tranferred_pops]"
 mod_job_transference_drone_add: "Emplois de volontaires pour le transfert "
 job_transference_drone: "Drones de transfert"
 job_transference_drone_plural: "Drones de transfert"
 job_transference_drone_desc: "Bien que le lien neural établisse une connexion permanente entre nous et la bête, le processus de transfert reste lent. Sans ces précautions, nous risquerions de briser nos deux psychés, faisant voler en éclats tous nos efforts."
 MESSAGE_POPS_TRANSFERRED_TITLE: "Population transférée."
 MESSAGE_POPS_TRANSFERRED_DESC: "$VALUE|Y$ pops ont été transférées. Leur esprit vit désormais dans la bête."
 #Crisis Events
 biocrisis.50.name: "Niveau 1 : expériences embryonnaires"
 biocrisis.50.desc: "Nous vivons en symbiose avec nos enveloppes biologiques, mais quelque chose de vital nous a toujours échappé...\n\nInspirés par les grandes créatures spatiales, nous nous lançons dans un projet des plus audacieux : donner naissance à la plus titanesque d'entre elles. Ce mastodonte sera un être d'exception, une forme de vie supérieure conçue dans un but précis, plutôt qu'en laissant l'évolution avancer à l'aveugle.\n\nNotre premier défi sera de créer un oeuf colossal, adapté à la gestation de cette créature à une échelle inégalée. Outre les nutriments qu'elle contiendra, son enveloppe devra absorber la lumière et la chaleur environnantes et transformer les gaz en nutriments."
 biocrisis.50.a: "Notre création occultera les étoiles"
 biocrisis.55.name: "Niveau 2 : accomplissement personnel"
 biocrisis.55.desc: "Alors que les vaisseaux de construction ont oeuvré à la mise en place de cette coquille colossale en orbite d'une géante gazeuse, notre industrie alimentaire a transformé les nutriments nécessaires à la formation de l'albumen d'un oeuf de mastodonte. Cependant, la création d'un embryon fécondé viable s'est avérée beaucoup plus difficile que prévu.\n\nNous avons épuisé une immense quantité de biomasse provenant de vaisseaux biologiques et de la faune spatiale avant de pouvoir stabiliser une base ADN exploitable. Nous gardons cette dernière bien au chaud dans une cellule de fécondation tout à fait novatrice. Nos essais microscopiques se sont révélés fructueux. Maintenant, nous allons pouvoir passer à l'action et fertiliser cet oeuf géant.\n\nNous allons bientôt faire éclore la forme de vie la plus titanesque que cette galaxie ait jamais vue !"
 biocrisis.55.a: "Nous frôlons le sommet de l'évolution"
 biocrisis.60.name: "Orgueil et voracité"
 biocrisis.60.desc: "Notre supériorité génétique est sans égale, et nos exploits surpassent ceux des empires inférieurs de cette galaxie.\n\nEt pourtant, notre progéniture mastodonte ne mesure pas l'étendue de notre domination. Poussée par un instinct vorace, elle engloutit sans relâche, insensible à l'abondance que nous lui offrons. Elle finira sûrement par comprendre et se pliera alors à notre volonté, mais le plus tôt serait préférable. Si nous perdons le contrôle, des milliards de vies sont en danger."
 biocrisis.60.a: "Nous trouverons une solution"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3: "Expériences de connexion cérébrale"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3_DESC: "Le seul moyen d'apprivoiser les mastodontes est peut-être de connecter à distance nos esprits à leur système nerveux à l'aide de la neurotechnologie. Nous avons déjà commencé les expériences."
 biocrisis.15.name: "Symphonie synaptique"
 biocrisis.15.desc: "Nos progrès en neurotechnologie nous ont enfin permis de franchir la barrière qui nous séparait de notre jeune, mais redoutable mastodonte. Il nous suffit de lier nos esprits à notre progéniture, et c'est en utilisant la force mentale de toute notre espèce que nous y parviendrons. Nous ne devons pas brûler les étapes, car cela risquerait de surcharger le système nerveux de cette créature. C'est avec précaution que nous avançons vers notre but."
 biocrisis.15.a: "L'excellence biologique a un prix"
 biocrisis.65.name: "Niveau 4 : incarnation de la bête"
 biocrisis.65.desc: "L'idée d'établir un lien psychique avec le mastodonte est inspirante, mais les implications logistiques forment un véritable défi. Notre capitale devrait accueillir le point de connexion principal, qui nous permettra de gérer la population au fur et à mesure de notre fusion avec la créature.\n\nPar ailleurs, de récentes avancées scientifiques pourraient bientôt nous permettre de perfectionner davantage nos innovations grâce à un projet de mutation expérimental inédit."
 biocrisis.65.a: "Nous ne ferons qu'un"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4: "Fusion des esprits"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC: "La conscience du mastodonte est bien plus complexe que l'on ne l'imaginait. Cela ne fait aucun doute : un seul esprit ne parviendra jamais à la percer. Nos esprits, bien supérieurs à la moyenne, n'ont jamais été conçus pour habiter un être d'une telle ampleur.\n\nNous devons avant tout réussir à connecter nos esprits au mastodonte. Cette première connexion passera inaperçue, puis formera un véritable tsunami, et nous saurons inonder la conscience de la créature pour apaiser sa fureur."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_HIVE: "La Conscience ne tolère aucun écart. La nécessité d'une concentration universelle n'a jamais été aussi grande. Un drone seul ne suffit pas à faire le lien entre nous et le mastodonte. Nous devons donc habiter l'esprit du mastodonte avec notre conscience collective.\n\nCela nous changera à jamais : nos esprits s'uniront et nous deviendrons une seule et même entité. Cette idée peut sembler difficile à concevoir, mais nous serons bientôt l'être le plus puissant de la galaxie !"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_MACHINE: "L'idée d'habiter un vaisseau biologique n'a jamais été très rassurante. Notre dynastie a été façonnée par des générations de drones à corps solide. Nos ancêtres n'auraient même pas pu imaginer le chemin qui nous attend désormais. Et pourtant, nous allons nous débarrasser de nos structures mécaniques et nous réfugier dans une bête de chair.\n\nSerons-nous toujours des machines après avoir fusionné avec cette créature vivante ? La réponse à ces questions résonne en nous : <<ERREUR : INTROUVABLE>>.\n\nL'approche la plus logique serait de suivre l'exemple des organiques et d'accepter l'incertitude. Dans le corps du mastodonte, nous trouverons des réponses. Nous allons fusionner pour ne faire qu'un. Survivre a toujours été notre principale directive ; désormais, nous allons prospérer."
 biocrisis.20.name: "Un avec la bête"
 biocrisis.20.desc: "Incroyable ! C'est une réussite ! Nous avons établi un lien avec le mastodonte et nous nous efforçons de le renforcer alors que nos esprits y sont progressivement transférés. La créature reste impassible et nous ouvre les portes d'un monde au-delà de l'espace. Un monde qui, depuis toujours, nous attendait. Grâce à elle, nous ressentons la présence de tous les êtres sous notre contrôle et reconnaissons toute sa grandeur, au plus profond de notre subconscient.\n\nNous sommes, sans l'ombre d'un doute, la force la plus destructrice et la plus implacable de la galaxie. Sous cette nouvelle forme, nous déchaînerons notre fureur sur nos ennemis tremblants. Rien ne nous empêchera de conquérir l'espace !"
 biocrisis.20.a: "Nous dévorerons l'espace"
 biocrisis.70.name: "Niveau 5 : appétit féroce"
 biocrisis.70.desc: "Une assez grande partie de notre population a été transférée, et nous détenons désormais un pouvoir sur la créature et sa chair. Le mastodonte continue de grandir, alors que son potentiel génétique demeure presque inactif, toutefois stimulé par une alimentation continue et l'union de nos consciences. Une rage primitive nous habite et notre soif de sang ne connaît pas de limites. Nous devons consommer. Nous devons dévorer. Seule l'infinité de la galaxie pourrait nous rassasier.\n\nAbandonnons nos enveloppes et notre lien avec la civilisation. Tout ce qui importe est notre existence parmi les étoiles."
 biocrisis.70.a: "Nous sommes trop grands pour échouer"
 biocrisis.105.name: "Monstre à l'agonie"
 biocrisis.105.desc: "L'un de nos mastodontes est tombé. Tel est le sort des faibles : la nature s'en débarrasse. Nous ne pleurerons pas une créature qui n'a pas su dominer le combat, mais nous devons veiller à ce que ses frères et soeurs ne subissent pas le même sort. Si tous nos petits périssent, nous périrons inévitablement."
 biocrisis.105.a: "Cette mort ne sera pas vaine"
 biocrisis.105.b: "Une malheureuse victime"
 biocrisis.130.name: "Une bête venue de l'espace"
 biocrisis.130.desc: "Malgré les obstacles, nous avons engendré un mastodonte qui émerge aujourd'hui de la chrysalide qui l'a couvé.\n\nIl est bien plus grand, plus puissant et plus affamé que tous les autres. La créature parcourt désormais l'espace à la recherche de nourriture.\n\nElle fait la fierté de notre meute. Quiconque osera se mettre en travers de son chemin deviendra poussière."
 biocrisis.130.a: "Une fois de plus, nous avons surmonté les limites imposées par la nature"
 biocrisis.150.name: "Défi accepté"
 biocrisis.150.desc: "Visiblement, notre ascension ne se fera pas sans heurts. Nous détectons une masse incommensurable dans le système de [event_target:voidspawn_spawn_location.GetName]. Il s'agit d'un être du vide, une monstruosité ancienne dont la présence éclipse même les constructions les plus ambitieuses des mortels.\n\nSa forme étrange défie toute logique et plonge la galaxie dans la pénombre, comme si les étoiles craignaient son approche.\n\nLes intentions de l'être du vide sont aussi claires que sa trajectoire : il vient pour nous, pour notre mastodonte et l'esprit collectif qui a osé se libérer de la chair pour régner dans le vide cosmique. Il ne s'agit pas d'une simple confrontation de puissance matérielle, mais d'une mise à l'épreuve de notre existence même.\n\nSi nous l'affrontons maintenant, nous mourrons, cela ne fait aucun doute. Nous devons lui échapper pour gagner en puissance, jusqu'à ce que nos crocs soient suffisamment aiguisés pour transpercer l'impénétrable."
 biocrisis.150.desc.b: "$biocrisis.150.desc$"
 biocrisis.150.a: "Nous pouvons fuir, mais nous ne pourrons pas nous cacher"
 biocrisis.155.desc: "Ceci est un message de la plus haute importance. L'§Yêtre du vide ancien§!, une entité à la puissance inimaginable, a surgi de l'abîme cosmique. Il est attiré par la [event_target:behemoth_empire.GetName], un empire qui s'est libéré des chaînes de la mortalité et a fusionné avec une bête. Ces deux titans que tout oppose menacent la galaxie.\n\nSi le mastodonte échoue, l'être du vide se calmera. Si le mastodonte ressort victorieux, son pouvoir bouleversera à jamais l'équilibre de la galaxie. Préparez-vous, car les choix d'aujourd'hui affecteront les siècles à venir."
 biocrisis.155.a: "Comment éviter cela ?"
 biocrisis.155.b: "Qui va nous sauver ?"
 biocrisis.155.c: "Que s'est-il passé ?"
 biocrisis.155.d: "Que pouvons-nous faire ?"
 biocrisis.156.desc: "Il y a méprise. La prévention n'existe que pour ceux qui ont encore le temps. Nous n'avons plus ce luxe.\n\nLa bête est déjà là. Notre vénérable ordre a certes survécu à bien des malheurs par le passé, mais la situation dans laquelle nous nous trouvons est extrêmement critique."
 biocrisis.157.desc: "Une question compréhensible. Naïve, mais compréhensible. Avec la sagesse vient l'acceptation. Personne ne nous sauvera.\n\nÉtant donné la taille réduite de notre ordre, nous n'aurions pas pu faire grand-chose. Vous, cependant, auriez pu agir plus tôt pour empêcher cela. Si vous ne parvenez pas à vaincre la [event_target:behemoth_empire.GetName], nous essaierons de ne pas vous en vouloir lorsque la galaxie volera en éclats."
 biocrisis.158.desc: "Les empires stellaires ont tendance à avoir des ambitions démesurées. La [event_target:behemoth_empire.GetName] a privilégié l'ambition à la raison et l'arrogance à la sagesse.\n\nIls ont essayé de commander des forces qu'ils ne pouvaient pas comprendre et ont forcé leurs corps à prendre des formes qu'ils ne pouvaient pas contrôler. Ce faisant, ils nous ont probablement tous condamnés."
 biocrisis.159.desc: "Notre première analyse de vos capacités de combat nous amène à penser qu'une bataille se terminerait mal pour vous. Et d'après notre évaluation de vos flottes, une fuite semble tout aussi vaine. Il n'y a pas d'échappatoire.\n\nDeux bêtes redoutables s'apprêtent à s'affronter au milieu des étoiles. Si la chance vous sourit, vous survivrez.\n\nSi vous êtes sages, vous en tirerez des leçons. La galaxie sera différente une fois la bataille terminée, mais y aura-t-il seulement des témoins... ?\n\n... En théorie, tuer le mastodonte devrait mettre fin à la chasse de l'être du vide... Si toutefois vous vouliez essayer de sauver la galaxie..."
 biocrisis.162.name: "En chemin"
 biocrisis.162.desc: "Un être du vide ancien est entré dans notre territoire. Cette entité ancestrale serait immortelle et invincible. Ses yeux brillent d'une intelligence extraterrestre et ses mouvements sont marqués par le poids des millénaires.\n\nNos [species.GetEyeNamePlural] sont noyés sous un torrent de signaux. Le chaos, le trouble et la peur cosmique la plus profonde nous assaillent.\n\nIl est inconcevable que nous puissions l'emporter sur un tel colosse, mais nous pouvons encore mettre fin à ses agissements si nous l'aidons à abattre sa proie. Nous devons trouver le §Ymastodonte§! et mettre fin à ses jours pour le bien de notre survie."
 biocrisis.162.a: "Évitons le monstre à tout prix !"
 biocrisis.175.name: "Être éliminé"
 biocrisis.175.desc: "L'être du vide n'est plus. Le géant qui éclipsait les étoiles a été exterminé, et sa carcasse dérive désormais dans l'espace, disparaissant lentement dans le néant.\n\nUn autre empire a fait preuve d'une puissance de feu et d'une coordination dépassant l'entendement. La galaxie est différente de ce qu'elle semblait être. L'équilibre des forces a changé, tout comme la place que nous y occupons.\n\nQuelle est la motivation de ces pourfendeurs de bêtes ? S'agit-il d'une démonstration de force, d'un message à tous ceux qui s'opposeraient à eux, ou le prélude à quelque chose de bien pire ?"
 biocrisis.175.desc.kaiju: "S'il existe dans cette galaxie des forces capables d'exterminer l'être du vide ancien, elles peuvent nous exterminer aussi. Nous ne sommes pas très différents de la défunte bête.\n\nLa puissance de feu qui a déchiré son corps pourrait un jour s'en prendre à nous. La galaxie a changé, et nous devons nous adapter.\n\nPour survivre, la rage ne peut pas continuer à nous guider aveuglément. Le vide a perdu un prédateur suprême, il pourrait bientôt en perdre un autre."
 biocrisis.175.a: "Mieux vaut agir avec précaution"
 biocrisis.180.name: "Pourfendeurs du vide"
 biocrisis.180.desc: "En fin de compte, la prétendue invincibilité de l'être du vide ancien s'est révélée être un simple mythe, démenti par la puissance de nos flottes. Maintenant que cette menace a été éliminée, la galaxie peut à nouveau reprendre son souffle."
 biocrisis.180.desc.kaiju: "Bien que l'être du vide ancien ait péri, des résidus d'énergie circulent dans son corps. Sa puissance ancestrale est un festin de potentiel pur.\n\nNous allons consommer ses tendons et sa moelle afin de mêler son essence alien à la nôtre. L'être du vide possédait un pouvoir incommensurable, qui nous appartient désormais."
 biocrisis.180.a: "Aucune créature ne nous chassera"
 biocrisis.180.b: "Ce n'est que le début"
 biocrisis.185.name: "Un seul survivra"
 biocrisis.185.desc: "Des tréfonds du vide nous parvient une terrible révélation : nous ne sommes pas seuls dans notre ascension. Un autre mastodonte est apparu. Cet imitateur rayonne d'une beauté grotesque, cherchant à insulter notre perfection. Nous ne pouvons l'accepter.\n\nIl n'y a pas la place pour un autre prédateur suprême. Jamais nous n'accepterons la paix. Place à la chasse. Place au festin de chair inférieure."
 biocrisis.185.a: "Nous nous repaîtrons de son coeur !"
 biocrisis.187.name: "Avertissement aux mastodontes de classe IV"
 biocrisis.187.desc: "Quelque chose se meut dans les profondeurs du vide.\n\nÀ l'autre bout des étoiles, un empire a entamé la dernière étape de sa transformation grotesque, élevant de monstrueux mastodontes, non comme de simples armes, mais pour lui servir de vaisseaux. Il ne cherche pas la domination, mais l'union. La fusion de l'esprit et de la chair, de l'empire et de l'horreur.\n\nS'il parvient à ses fins, son peuple ne sera plus qu'une faim unique et dévorante.\n\nNous ne pouvons pas le laisser faire. Il faut l'en empêcher maintenant, avant qu'il ne soit trop tard."
 biocrisis.187.a: "Chassez la bête !"
 biocrisis.190.name: "Forme du vide suprême"
 biocrisis.190.desc: "Les derniers obstacles ont été balayés. Les adversaires, les jaloux, tous les êtres inférieurs qui ont tenté en vain de s'agiter ont été réduits au silence. Les étoiles elles-mêmes tremblent, car nous nous tenons au bord du précipice. La transformation est imminente.\n\nNous ne sommes plus restreints par la forme fragile de nos ancêtres. Les planètes sont des prisons. Les empires sont éphémères. L'illusion de l'individualité s'évanouira bientôt dans l'unité vaste et parfaite du mastodonte. Là où esprit et horreur, intelligence et voracité ne font plus qu'un.\n\nLe transfert arrive à sa fin. Une fois terminé, nous n'existerons plus.\n\nNous prospérerons enfin."
 biocrisis.190.a: "PLACE AU TRANSFERT !"
 biocrisis.190.tt: "Nous remporterons la partie dans 30 jours"
 biocrisis.190.b: "Une minute, nous ne sommes pas encore prêts"
 biocrisis.190.b.tt: "Continuez à jouer avec votre empire actuel."
 BEHEMOTH_TRANSFERENCE_PROJECT: "Place au transfert"
 BEHEMOTH_TRANSFERENCE_PROJECT_DESC: "Nous avons suffisamment communié avec la bête. Tout est prêt pour le transfert, il ne nous reste plus qu'à donner l'ordre. Nous sommes à l'aube de l'ascension, en passe d'abandonner les misérables cendres de notre royaume planétaire et de briser les chaînes de la chair et de la gravité."
 biocrisis.191.name: "Victoire du mastodonte"
 biocrisis.191.desc: "La fusion est terminée !\n\nNos identités passées n'existent plus. Les limites des êtres inférieurs ne sont plus les nôtres. À la croisée de la faim et de la réflexion, nous sommes une immense volonté déployée à travers le vide.\n\nLa galaxie repose à nos pieds, fragile et fugace. Mais ce n'est pas la domination que nous cherchons. Nous sommes libres. Libres de rester, libres de partir, mais aussi libres de chasser.\n\nQu'allons-nous faire de cette éternité qui s'offre à nous ?"
 biocrisis.191.a: "Restons dans cette galaxie... pour l'instant"
 biocrisis.191.a.tt: "Les mastodontes resteront des créatures sauvages et ne seront plus jouables."
 biocrisis.191.b: "Partons. Le vide nous appelle"
 biocrisis.191.b.tt: "L'empire mastodonte disparaîtra de la galaxie et ne sera plus jouable."
 biocrisis.191.c: "Les prétendus chasseurs vont apprendre ce qu'est la peur"
 biocrisis.192.name: "L'irrépressible horreur"
 biocrisis.192.desc: "C'est terminé. [behemoth_winner.GetName] a évolué au-delà de la chair, au-delà des empires, au-delà de tout ce qui peut être qualifié de civilisation. Ce n'est plus une nation, mais une force.\n\nLes mondes s'effondrent sur son passage. Les flottes brûlent. Les forteresses ultimes des puissants d'autrefois s'éparpillent comme des cendres dans le vide. Il n'y a plus ni diplomatie, ni plaidoyer, ni baroud d'honneur.\n\nNous ne luttons pas pour notre survie, nous ne faisons que retarder l'inévitable. La fin est imminente."
 biocrisis.192.tt: "[behemoth_winner.GetName] est sur le point de remporter la partie."
 biocrisis.196.name: "Avalé tout rond"
 biocrisis.196.desc: "Voilà des années que le mastodonte et ses semblables ont fui notre galaxie. Nous avons assisté avec soulagement à la disparition de la bête qui aurait pu nous anéantir. Et puis... plus rien. Après avoir traversé des centaines de milliers d'années-lumière, elle a simplement disparu, ne laissant derrière elle ni radiation, ni image résiduelle, ni onde gravitationnelle. Comme si elle n'avait jamais existé."
 biocrisis.196.a: "Nous devons éclaircir ce mystère"
 UNSETTLING: "C'est véritablement déconcertant..."
 biocrisis.197.name: "Quis Venabitur Ipsos Venatori"
 biocrisis.197.desc: "Nous avons passé des années à essayer de faire la lumière sur le sort du mastodonte, mais le mystère reste entier. Faute d'hyperlignes allant aussi loin, nous avons dû nous contenter de théories et d'une science approximative pour émettre des hypothèses sur ses derniers instants.\n\nLa créature n'a manifesté aucune crainte ; elle flottait simplement. Puis, en une fraction de seconde, elle s'est distordue, enroulée sur elle-même puis volatilisée. Sans résistance aucune. Sans laisser de traces.\n\nLes théories abondent : serait-ce une nouvelle forme de voyage PRL ? L'oeuvre d'une déchirure spatiale ou d'une anomalie ? Ou pire encore, une puissance extérieure l'aurait-elle fait disparaître ? Quelle que soit la vérité, elle se trouve bien au-delà de notre portée... et peut-être même de notre entendement."
 biocrisis.197.a: "Il vaut peut-être mieux ne pas trop y penser"
 biocrisis.197.b: "Les Préthoryns que nous avons capturés s'agitent"
 biocrisis.265.name: "Glas de l'agonie"
 biocrisis.265.desc: "Les dernières lamentations du mastodonte sont insupportables. Nous sommes trop nombreux dans la créature et, alors que l'écho de sa conscience s'estompe, nous aussi."
 biocrisis.265.a: "!! - ... "
 biocrisis.520.name: "Le titan aux pieds d'argile"
 biocrisis.520.desc: "Le mastodonte est mort.\n\nSa silhouette colossale dérive inerte dans le vide, témoignant à la fois de notre triomphe et des limites de l'entendement. Les [Root.GetScientistPlural] ont tout tenté pour analyser sa dépouille, désireux de piller les secrets de son esprit impossible. Pourtant, toutes les tentatives de le ranimer, que ce soit par la science, la nécromancie ou même les invocations les plus désespérées, ont échoué les unes après les autres.\n\nLa raison nous apparaît désormais avec une évidence presque douloureuse : le cerveau du mastodonte n'était pas un simple réseau de cellules, mais un véritable maillage de supraconducteurs organiques, entrelacés d'une manière impossible à répliquer par aucune des intelligences connues, artificielles, biologiques ou ésotériques. À sa mort, sa structure neurale s'est écroulée comme un circuit brisé en mille morceaux. Aucune énergie, aucune volonté ni aucune force ne pourra rebâtir ce qui a été perdu.\n\nL'esprit le plus brillant de la galaxie est à présent et pour toujours plongé dans le silence."
 biocrisis.520.a: "Plus rien ne subsiste"
 biocrisis.520.b: "Même les dieux peuvent mourir"
 BEHEMOTH_MUTATION_PROJECT: "$menp_behemoth_mutation_research$"
 BEHEMOTH_MUTATION_PROJECT_DESC: "Nos récentes avancées dans la manipulation génétique des mastodontes nous donnent les connaissances théoriques nécessaires pour améliorer nos créations. Bien que la stabilité génétique soit une source d'inquiétude, nous sommes convaincus qu'avec suffisamment de temps et de ressources, nous pourrons réaliser d'autres améliorations biologiques."
 BEHEMOTH_FATE_PROJECT: "Le sort du mastodonte"
 BEHEMOTH_FATE_PROJECT_DESC: "Après son départ de notre galaxie, le mastodonte a dérivé dans le vide avant de disparaître. Nous pouvons tenter de percer ce mystère, mais à cette distance, seules des méthodes non conventionnelles sont envisageables. Et les réponses seront probablement aussi nébuleuses que le vide lui-même."
 behemoth_mutation_a: "$menp_behemoth_mutation_research$ : agressivité"
 behemoth_mutation_a_tt: "$MOD_SHIP_FIRE_RATE_MULT$mastodontes : §G+$@behemoth_mutation_a_fire_rate_mult|0%$§!\n$MOD_SHIP_ARMOR_MULT$des mastodontes : §R$@behemoth_mutation_a_armor_mult|0%$§!\n$MOD_SHIP_SPEED_MULT$des mastodontes : §R$@behemoth_mutation_a_speed_mult|0%$§!"
 behemoth_mutation_a_desc: "Des muscles surdéveloppés permettent des attaques dévastatrices."
 behemoth_mutation_b: "$menp_behemoth_mutation_research$ : modération"
 behemoth_mutation_b_desc: "L'injection de gènes nutritionnels radiotrophes à nos formes de vie spatiales réduit considérablement leurs besoins de subsistance."
 behemoth_mutation_c: "$menp_behemoth_mutation_research$ : agilité"
 behemoth_mutation_c_tt: "$MOD_SHIP_SPEED_MULT$des mastodontes : §G+$@behemoth_mutation_c_speed_mult|0%$§!\n$MOD_SHIP_EVASION_MULT$des mastodontes : §G+$@behemoth_mutation_c_evasion_mult|0%$§!"
 behemoth_mutation_c_desc: "Avec des glandes subspatiales plus puissantes, nos mastodontes seront plus agiles."
 behemoth_mutation_bio: "$menp_behemoth_mutation_research$ : précision"
 behemoth_mutation_bio_tt: "$MOD_SHIP_WEAPON_RANGE_MULT$ des mastodontes : §G+$@behemoth_mutation_bio_weapon_range_mult|0%$§!\n$MOD_SHIP_ACCURACY_MULT$ des mastodontes : §G+$@behemoth_mutation_bio_accuracy_mult|0%$§!"
 behemoth_mutation_bio_desc: "Cette adaptation multioculaire permet de tirer avec une précision extrême à longue portée."
 behemoth_mutation_synth: "$menp_behemoth_mutation_research$ : résistance"
 behemoth_mutation_synth_tt: "$MOD_SHIP_ARMOR_MULT$des mastodontes : §G+$@behemoth_mutation_synth_armor_mult|0%$§!\n$MOD_SHIP_ARMOR_REGEN_ADD_PERC$des mastodontes : §G+$@behemoth_mutation_synth_armor_regen_add_perc|0%$§!"
 behemoth_mutation_synth_desc: "Un mélange d'alliages et de chitine formant une carapace multicouche qui protège les organes vitaux."
 behemoth_mutation_corpo: "Produits dérivés des mastodontes"
 behemoth_mutation_corpo_tt: "Échange mensuel : §G+$@behemoth_mutation_corpo_trade_produces_mult|0%$§! par mastodonte"
 behemoth_mutation_corpo_desc: "Nos actionnaires avaient quelques réserves sur le projet Mastodonte, mais l'augmentation des dividendes les a rapidement convaincus."
 behemoth_mutation_psi: "$menp_behemoth_mutation_research$ : barrière"
 behemoth_mutation_psi_tt: "$MOD_SHIP_SHIELD_REGEN_ADD_PERC$des mastodontes : §G+$@behemoth_mutation_psi_shield_regen_add_perc|0%$§! pour $pop_group_unit$ £job_telepath£télépathes ou volontaires pour le transfert\n$MOD_SHIP_SHIELD_HARDENING_ADD$des mastodontes : §G+$@behemoth_mutation_psi_shield_hardening_add|0%$§! pour $pop_group_unit$ £job_telepath£télépathes ou volontaires pour le transfert\nNombre de £job_telepath£télépathes et volontaires pour le transfert actuellement employés : §Y[GetNumTelepathsAndTransference]§!"
 behemoth_mutation_psi_desc: "Même si les mastodontes ne sont pas liés au Suaire, nous les avons élevés de manière à ce qu'ils soient réceptifs à nos télépathes et qu'ils puissent utiliser des barrières psioniques."
 behemoth_mutation_psi_2: "$menp_behemoth_mutation_research$ : psionisme"
 behemoth_mutation_psi_2_desc: "Ô bêtes ! Prenez notre pouvoir !"
 behemoth_mutation_cyber: "$menp_behemoth_mutation_research$ : cybernétique"
 behemoth_mutation_cyber_desc: "Pour exploiter la puissance massive des mastodontes, nous développerons les équipements de cyberware les plus avancés de l'univers."
 behemoth_cyber_rage: "$BLANK_STRING$"
 edict_behemoth_nanite_augmentation: "Amélioration de mastodonte : nanites"
 edict_behemoth_nanite_augmentation_desc: "Une peau de mastodonte imprégnée de nanites peut réparer même les plus gros dégâts en un clin d'oeil."
 behemoth_nanite_augmentation_tt: "$MOD_SHIP_ARMOR_REGEN_ADD_PERC$des mastodontes : §G+$@behemoth_edict_armor_regen_add_perc|0%$§!"
 edict_behemoth_living_metal_augmentation: "Amélioration de mastodonte : métal vivant"
 edict_behemoth_living_metal_augmentation_desc: "En superposant du métal vivant et de la chitine, on obtient un blindage réactif qui dispose de propriétés améliorées."
 behemoth_living_metal_augmentation_tt: "$MOD_SHIP_ARMOR_HARDENING_ADD$des mastodontes : §G+$@behemoth_edict_armor_hardening_add|0%$§!"
 edict_behemoth_alloys_augmentation: "Amélioration de mastodonte : alliages"
 edict_behemoth_alloys_augmentation_desc: "Visser des plaques d'alliage sur les carapaces est une méthode grossière mais efficace."
 behemoth_alloys_augmentation_tt: "$MOD_SHIP_ARMOR_MULT$des mastodontes : §G+$@behemoth_edict_armor_mult|0%$§!"
 concept_edict_behemoth_nanite_augmentation: "$edict_behemoth_nanite_augmentation$"
 concept_edict_behemoth_living_metal_augmentation: "$edict_behemoth_living_metal_augmentation$"
 concept_edict_behemoth_alloys_augmentation: "$edict_behemoth_alloys_augmentation$"
 biocrisis.280.name: "$menp_behemoth_mutation_research$"
 biocrisis.280.desc: "Nous avons mis au point plusieurs formules mutagènes pour améliorer nos mastodontes, chacune éveillant des forces et des capacités différentes. Toutefois, les mastodontes ne peuvent tolérer plus d'une injection en raison de leur immense physiologie. Mélanger différentes formules aurait des résultats désastreux au niveau cellulaire. La frontière entre évolution et destruction est aussi mince qu'un fil de rasoir, nous devons donc choisir avec soin les améliorations à apporter."
 biocrisis.280.a: "Rendons-les plus féroces !"
 biocrisis.280.b: "Faisons en sorte qu'ils aient moins besoin de manger"
 biocrisis.280.c: "Rendons-les plus rapides !"
 biocrisis.280.psi: "Le pouvoir du Suaire les soutiendra"
 biocrisis.280.bio: "Rendons-les plus mortels !"
 biocrisis.280.cyber: "Canalisons leur rage"
 biocrisis.280.cyber.tt: "Nos mastodontes ont §G25%§! de chances de résister à leur rage.\nLorsqu'ils sont enragés, ils obtiennent §G+$@behemoth_cyber_rage_fire_rate_mult|0%$§! de cadence de tir, §G+$@behemoth_cyber_rage_shield_penetration_add|0%$§! en pénétration du blindage et §G+$@behemoth_cyber_rage_armor_penetration_add|0%$§! en pénétration des boucliers"
 biocrisis.280.synth: "Leur blindage sera impénétrable"
 biocrisis.280.corp: "On s'en fiche de tout ça, faisons plutôt des peluches à leur image !"
 biocrisis.280.machine: "Fusionnons la chair avec l'acier"
 biocrisis.280.machine_tt: "Permet trois décrets d'§Yamélioration de mastodonte§!\n$t$['concept_edict_behemoth_nanite_augmentation']\n$t$['concept_edict_behemoth_living_metal_augmentation']\n$t$['concept_edict_behemoth_alloys_augmentation']"
 #Crisis Objectives
 crisobj_build_bioships_name: "Construire des vaisseaux biologiques"
 crisobj_build_bioships_desc: "Ayant acquis la capacité de créer des vaisseaux biologiques, nous pouvons désormais affiner et étendre ce processus. Cette symbiose permanente est de plus en plus bénéfique, renforçant nos flottes et notre domination sur la vie dans le cosmos."
 crisobj_breed_fauna_name: "Faire naître des créatures spatiales"
 crisobj_breed_fauna_desc: "Ayant acquis la capacité de faire naître des créatures spatiales, nous pouvons désormais affiner et étendre ce processus. Cette symbiose permanente est de plus en plus bénéfique, renforçant nos flottes et notre domination sur la vie dans le cosmos."
 crisobj_kill_bioships_name: "Détruire des vaisseaux biologiques"
 crisobj_kill_bioships_desc: "Des vaisseaux biologiques ennemis entravent notre domination biologique. Nous devons prendre des mesures décisives et les détruire afin qu'ils ne menacent plus notre suprématie."
 crisobj_kill_space_fauna_name: "Tuer des créatures spatiales"
 crisobj_kill_space_fauna_desc: "Des créatures spatiales hostiles entravent notre domination biologique. Nous devons prendre des mesures décisives et les détruire afin qu'elles ne menacent plus notre suprématie."
 crisobj_cap_fauna_name: "Capturer des créatures spatiales"
 crisobj_cap_fauna_desc: "Les créatures spatiales sauvages se comportent de manière imprévisible et constituent un défi unique. Nous devons prendre des mesures décisives et les capturer pour exploiter leur potentiel et assurer notre suprématie."
 crisobj_build_behemoth_egg_name: "Faire croître des oeufs de mastodonte"
 crisobj_build_behemoth_egg_desc: "Faire croître des oeufs fécondés géants constitue une étape importante pour transcender les trivialités de la vie planétaire."
 crisobj_birth_behemoth_name: "Faire naître des mastodontes"
 crisobj_birth_behemoth_desc: "Sous notre oeil attentif, des organismes gigantesques sont en train de naître dans l'immensité de l'espace. Ces mastodontes, nés de notre ambition et de notre expertise, deviendront des forces titanesques qui feront basculer l'équilibre des pouvoirs en notre faveur."
 crisobj_behemoth_rage_name: "Mastodontes déchaînés"
 crisobj_behemoth_rage_desc: "Désormais relâchés dans la nature, nos mastodontes font des ravages et détruisent tout sur leur passage. Leur rage incontrôlable témoigne de notre puissance et d'une force de la nature qui ne répond qu'à notre volonté, lorsque nous choisissons de l'exercer."
 behemoth_mutation_reward: "Choix d'une mutation"
 biocrisis.210.desc.base: "Quelque chose s'agite. Notre faim n'est pas aveugle, elle s'adapte. Quelque chose grandit, prend forme et fourmille de potentiel.\n\n" #Introduction
 biocrisis.210.desc: "$biocrisis.210.desc.base$Nos oeufs sont le fondement de notre lignée. Ils doivent être choyés et protégés à tout prix. Orientons notre évolution de manière à ce qu'elle profite à nos futurs petits." #Egg
 biocrisis.210.a: "Accélérons la croissance des oeufs"
 biocrisis.210.a.tt: "$behemoth_fast_egg_tt$\n\n§HPermet la politique§! $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.b: "Donnons de la force à nos petits"
 biocrisis.210.b.tt: "$behemoth_slow_egg_tt$\n\n§HPermet la politique§! $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.c: "Renforçons les coquilles"
 biocrisis.210.c.tt: "$behemoth_strong_egg_tt$"
 biocrisis.215.desc: "$biocrisis.210.desc.base$Naviguer sur les ondes solaires et traverser le vide est une compétence que peu d'espèces capables de voyager dans l'espace maîtrisent. Nos avantages tactiques résident dans notre fureur et notre puissance, mais que se passerait-il si nous pouvions y ajouter notre mobilité ?" #Mobility
 biocrisis.215.a: "Traversons le vide"
 biocrisis.215.a.tt: "Confère un §Yorgane de bond§! à notre §Y$behemoth_04$§!."
 biocrisis.215.b: "Tirons vite, et avançons encore plus vite"
 biocrisis.215.b.tt: "$behemoth_turbo_tt$"
 biocrisis.215.c: "Mettons l'accent sur les réflexes"
 biocrisis.215.c.tt: "$behemoth_reflexes_tt$"
 biocrisis.215.d: "Devenons des chasseurs dans l'obscurité"
 biocrisis.215.d.tt: "Confère $@cloaking_high_strength|0+$ d'efficacité de l'occultation à notre §Y$behemoth_04$§!."
 biocrisis.220.desc: "$biocrisis.210.desc.base$Le renforcement de nos défenses biologiques nous permettra de persévérer sous des tirs nourris sans subir de fâcheuses blessures."
 biocrisis.220.a: "Nous pourrions avoir la peau plus épaisse"
 biocrisis.220.a.tt: "Confère $@behemoth_1_hull_add|0+*$ points de coque à notre §Y$behemoth_04$§!."
 biocrisis.220.b: "Notre armure de combat devrait être plus solide"
 biocrisis.220.b.tt: "Confère $@behemoth_1_armor_add|0+*$ points de blindage et $@behemoth_1_armor_hardening_add|%0+$ de blindage renforcé à notre §Y$behemoth_04$§!."
 biocrisis.220.c: "Personne ne nous touchera si nous renforçons nos boucliers"
 biocrisis.220.c.tt: "Confère $@behemoth_1_shield_add|0*+$ de solidité des boucliers, $@behemoth_1_shield_regen_add_perc|%1+$ de régénération quotidienne des boucliers et $@behemoth_1_shield_hardening_add|%0+$ de boucliers renforcés à notre §Y$behemoth_04$§!."
 biocrisis.225.desc: "$biocrisis.210.desc.base$Nous vaincrons en attaquant nos ennemis. Nous avons la possibilité d'accroître notre pouvoir de destruction."
 biocrisis.225.a: "Avec suffisamment d'énergie, les boucliers peuvent être facilement ignorés"
 biocrisis.225.a.tt: "Confère $@behemoth_shield_pen_add|%0+$ de pénétration des boucliers et un entretien mensuel de $@behemoth_shield_pen_upkeep|0*-$£exotic_gases£ à notre §Y$behemoth_04$§!."
 biocrisis.225.b: "Nos projectiles doivent pénétrer les blindages les plus épais"
 biocrisis.225.b.tt: "Confère $@behemoth_armor_pen_add|%0+$ de pénétration des boucliers et un entretien mensuel de $@behemoth_armor_pen_upkeep|0*-$£volatile_motes£ à notre §Y$behemoth_04$§!."
 biocrisis.225.c: "Le menu fretin ne constitue pas une menace"
 biocrisis.225.c.tt: "Confère $@behemoth_tracking_add|0*+$ de ciblage, $@behemoth_point_defense_weapon_fire_rate_mult|%0+$ de cadence de tir par la défense rapprochée et un entretien mensuel de $@behemoth_tracking_upkeep|0*-$£rare_crystals£ à notre §Y$behemoth_04$§!."
 biocrisis.230.desc: "$biocrisis.210.desc.base$Dans le feu de l'action, chaque seconde compte. Les dégâts que nous infligeons sont un rituel de mort, la dernière expérience de nos ennemis avant que ne s'éteignent les lumières de leur pitoyable vie."
 biocrisis.230.a: "Tenons-les, nous allons leur montrer qui nous sommes"
 biocrisis.230.a.tt: "$behemoth_drain_tt$"
 biocrisis.230.b: "Détruisons-les de loin"
 biocrisis.230.b.tt: "$behemoth_spike_tt$"
 biocrisis.230.c: "Démembrons-les de façon stratégique"
 biocrisis.230.c.tt: "$behemoth_burst_tt$"
 biocrisis.235.desc: "$biocrisis.210.desc.base$Une plus grande endurance profitera à une force galactique indomptable comme la nôtre." #Tanky 2
 biocrisis.235.a: "La régénération des tissus nous assure la longévité"
 biocrisis.235.a.tt: "Confère $@behemoth_2_hull_regen_add|%1+$ de régénération quotidienne des coques à notre §Y$behemoth_04$§!."
 biocrisis.235.b: "Nous ne renoncerons jamais"
 biocrisis.235.b.tt: "Confère $@behemoth_2_damage_reduction_mult|%1+$ de réduction des dégâts à notre §Y$behemoth_04$§!."
 biocrisis.235.c: "Seule la force brute nous permettra d'atteindre nos objectifs"
 biocrisis.235.c.tt: "Confère $@behemoth_2_damage_reduction_static|1+$ de réduction des dégâts, $@behemoth_2_armor_hardening_add|%0+$ de blindage renforcé et $@behemoth_2_shield_hardening_add|%0+$ de boucliers renforcés à notre §Y$behemoth_04$§!."
 biocrisis.240.desc: "$biocrisis.210.desc.base$Nous allons envoyer des essaims de notre progéniture ravager les planètes et vider les systèmes de tout ce qui est comestible, soit pratiquement tout. Comment pouvons-nous aider au mieux nos petits ?" #Support Ability
 biocrisis.240.a: "Nous leur permettrons d'être rapides"
 biocrisis.240.a.tt: "$behemoth_buff_tt$"
 biocrisis.240.b: "Nous les rassemblerons autour de notre lumière" #Summon a fleet
 biocrisis.240.b.tt: "$behemoth_summon_tt$"
 biocrisis.240.c: "Nous les aiderons à devenir forts" #Regen friendly bioships
 biocrisis.240.c.tt: "$behemoth_healing_tt$"
 biocrisis.245.desc: "$biocrisis.210.desc.base$Nous devons montrer notre force indomptable à tous les habitants de la galaxie. La prochaine étape de notre évolution consistera à accroître nos aptitudes au combat."
 biocrisis.245.a: "Libérons la colère qui nous anime"
 biocrisis.245.a.tt: "En rejoignant un combat, confère §Y$behemoth_frenzy_modifier$§! pendant £time£§Y$@behemoth_frenzy_duration|0$ jours§! à notre §Y$behemoth_04$§!.\n\n§Y$behemoth_frenzy_modifier$§! :$behemoth_frenzy_modifier_tt$"
 biocrisis.245.b: "Apprenons à maîtriser notre colère"
 biocrisis.245.b.tt: "Confère à notre §Y$behemoth_04$§! \n$t$$MOD_SHIP_FIRE_RATE_MULT$: §G+$@behemoth_tempered_fire_rate_mult|0%$§! \n$t$$MOD_SHIP_SPEED_MULT$: §G+$@behemoth_tempered_speed_mult|0%$§! \n$t$$MOD_SHIP_HULL_REGEN_ADD_PERC$: $@behemoth_tempered_hull_regen_add_perc|%1+$ \n$t$$MOD_SHIP_ARMOR_REGEN_ADD_STATIC$: $@behemoth_tempered_armor_regen_add_static|0+$"
 biocrisis.245.c: "Canalisons notre furie pour inspirer ceux qui nous entourent"
 biocrisis.245.c.tt: "En rejoignant un combat, notre §Y$behemoth_04$§! confère §Y$behemoth_inspiration_modifier$§! pendant £time£§Y$@behemoth_inspiration_duration|0$ jours§! à tous les vaisseaux biologiques amis de ce système.\n\n§Y$behemoth_inspiration_modifier$§! :$behemoth_inspiration_modifier_tt$"
 biocrisis.250.name: "Contrôle direct"
 biocrisis.250.desc: "$biocrisis.210.desc.base$Nous pouvons à présent libérer une onde catastrophique de fureur cryoclastique et pyroclastique. Sa puissance est capable de déchirer la réalité. En d'autres termes, cette arme consumera la galaxie elle-même.\n\nMais notre domination ne se soldera pas par la destruction. Nous ressentons chaque tendon du mastodonte, chacun de ses battements, mais aussi chacun de ses muscles bandé selon notre volonté, comme s'il s'agissait de notre propre chair. Une simple pensée et sa vaste forme nous obéit : ses membres, sa gueule, et jusqu'à son immense coeur né du vide bat de nos propres désirs. Ce n'est pas un simple vaisseau. Nous sommes le mastodonte." #Behemoth Superweapon
 biocrisis.250.a: "L'espace nous appartient à présent"
 biocrisis.250.a.tt: "§HRetire le modificateur :§!\n§R$voidspawn_boss_invincible$§!\n$mod_damage_vs_country_type_voidspawn_boss_mult$ §R-1954%§!\n\n$behemoth_superweapon_tt$\n\n"
