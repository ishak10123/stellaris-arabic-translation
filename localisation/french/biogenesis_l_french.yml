 death_world: "Monde de trépas"
 death_world_desc: "Bien que ce monde soit techniquement habitable, y vivre est un véritable cauchemar. Toute forme de vie qui s'y trouve, qu'elle soit végétale ou animale (y compris les insectes en apparence inoffensifs), est plus dangereuse que le prédateur le plus mortel de notre monde natal."
 d_lethal_ecosphere_blocker: "£blocker£Écosphère mortelle"
 d_lethal_ecosphere_blocker_desc: "Ici règne une sélection non naturelle sanglante : les spécimens et autres expériences écartés par le Fragment de guerre se battent sans relâche pour leur survie. Peu de soldats sortent vivants de ce terrible terrain d'entraînement, mais ceux qui survivent deviennent de véritables machines à tuer."
