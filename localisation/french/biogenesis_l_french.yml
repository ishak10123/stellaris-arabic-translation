 concept_auth_bio_imperial_cloning: "Continuité héréditaire"
 concept_auth_bio_corporate_cloning: "Association de réplication"
 #Mutation
 auth_mutation_habitability_tt: "Les espèces organiques peuvent atteindre §G175%§! d'habitabilité."
 auth_bio_democratic_mutation: "Liberté biologique"
 auth_bio_democratic_mutation_desc: "Cette société vit selon le principe « mon corps, mon temple ». Chacun est libre de disposer de son corps comme il l'entend ; liberté totale et soutien sont garantis. Les possibilités pour les citoyens de modifier leur corps et de découvrir leur véritable potentiel sont vastes."
 auth_bio_oligarchic_mutation: "Commandement catalytique"
 auth_bio_oligarchic_mutation_desc: "Le pouvoir est détenu par des élites dotées de mutations génétiques supérieures, leur conférant une autorité inégalée. Elles agissent au-dessus des lois et possèdent les compétences nécessaires pour protéger et diriger la société. Elles font tout pour assurer sa survie et sa prospérité."
 auth_bio_dictatorial_mutation: "Mandat hybride"
 auth_bio_dictatorial_mutation_desc: "Les mutations génétiques et le progrès qui en résulte constituent le fondement de cette société. Les individus souhaitant rester tels que la nature les a créés sont emprisonnés ou tués. Ceci afin de s'assurer que seuls ceux qui sont génétiquement supérieurs contribuent à la quête éternelle de perfection."
 auth_bio_dictatorial_mutation_tt: "\n£crime£Criminalité du fait des [enforcer.GetIcon][enforcer.GetNamePlural_lower] §G-5§!\n$auth_mutation_habitability_tt$"
 auth_bio_imperial_mutation: "Expansionnisme génomique"
 auth_bio_imperial_mutation_desc: "Cet empire repose sur la nature imprévisible des mutations aléatoires, promettant des résultats incroyables et des innovations qui n'auraient jamais pu voir le jour avec les méthodes traditionnelles. Le chaos génétique est son principal avantage dans la course à la suprématie."
 auth_bio_corporate_mutation: "Financement d'organes"
 auth_bio_corporate_mutation_desc: "Grâce à un système de paiement flexible, chacun peut ici emprunter à crédit des organes ou des parties du corps. Les retards de paiement sont sanctionnés par la saisie de l'objet du prêt ou l'expiration des garanties convenues. Ce système garantit une offre et une demande constantes : chaque partie du corps est à la fois une marchandise et une obligation."
 auth_bio_corporate_mutation_tt: "$organic_leaders_have_trade_upkeep$\nProd. de £trade£§Yvaleur commerciale§! pour $pop_group_unit$ £pop£pops ayant le trait ['trait:trait_spare_organs'] : §G+0.5§!\n$auth_mutation_habitability_tt$"
 auth_bio_democratic_evopred: "Électorat génétique"
 auth_bio_democratic_evopred_desc: "Malgré les difficultés, cette société a réussi à prendre partiellement le contrôle de son propre génome. La population peut décider elle-même de la manière dont ses mutations se manifesteront."
 auth_bio_democratic_evopred_tt: "$auth_bio_evopred_tt$\nAjoute des ['concept_genetic_electorate_effect',effets] supplémentaires au trait ['trait:trait_malleable_genes'], en fonction de la ['concept_faction',faction] la plus puissante\nAvancée de la situation ['concept_adaptive_evolution'] grâce aux §Yespèces§! aliens esclaves ou mieux §G+100%§!"
 auth_bio_oligarchic_evopred: "Bio-magnats"
 auth_bio_oligarchic_evopred_desc: "Cette société a défié le temps. En sélectionnant méticuleusement les gènes les plus purs, l'élite dirigeante a réussi à atteindre une existence intemporelle. Un seul faux pas peut toutefois leur coûter leur éternité, et pour ceux qui se trouvent en bas de l'échelle, l'ambition et l'évolution sont les deux faces d'une même médaille..."
 auth_bio_oligarchic_evopred_tt: "$auth_bio_evopred_tt$\nLes conseillers sont §Yimmortels§!."
 auth_bio_dictatorial_evopred: "Principat suprême"
 auth_bio_dictatorial_evopred_desc: "Une civilisation gouvernée par un prédateur suprême et façonnée par une évolution perpétuelle. Aucun conseil ni aucune constitution ne peut contenir la volonté supérieure de ce principat. Chaque victoire fait progresser l'ascension génétique."
 auth_bio_dictatorial_evopred_tt: "$auth_bio_evopred_tt$\nTrait de dirigeant : ['leader_trait:trait_ruler_apex_predator']"
 apex_predator_male: "$trait_ruler_apex_predator$"
 apex_predator_female: "$trait_ruler_apex_predator$"
 auth_bio_imperial_evopred: "Dynastie immortelle"
 auth_bio_imperial_evopred_desc: "Dans une dynastie immortelle, le passé ne repose pas, il est dévoré. Chaque génération nourrit la suivante et les dépouilles des personnalités défuntes perpétuent le règne immortel de l'empire. Servir implique des sacrifices, et dans la mort, chaque dépendance nourrit l'héritage de ses ancêtres."
 eternal_ancestor_male: "Ancêtre éternel"
 eternal_ancestor_female: "Ancêtre éternelle"
 auth_bio_imperial_evopred_tt: "$auth_bio_evopred_tt$\nPermet au dirigeant de consommer des personnalités éminentes à leur mort."
 auth_bio_corporate_evopred: "BioPrédation GLC" #Galactic Limited Incorporated
 auth_bio_corporate_evopred_desc: "BioPrédation GLC prospère grâce à l'adaptation, tant génétique qu'économique. Avec chaque nouveau génome ajouté à son portefeuille, la mégacorporation affine sa place sur le marché en adaptant les produits et le marketing à la biologie unique de chaque espèce. Ce n'est qu'en comprenant la nature du client que l'on peut conclure une affaire presque... instinctivement."
 auth_bio_corporate_evopred_tt: "$auth_bio_evopred_tt$\n$organic_leaders_have_trade_upkeep$\nEfficacité des pactes commerciaux par trait d'espèce : §G+1%§!\nAvancée de la situation ['concept_adaptive_evolution'] grâce aux §Ypactes commerciaux§! §G+100%§!"
 auth_bio_hive_mind_evopred: "Conscience chimérique"
 auth_bio_hive_mind_evopred_desc: "Cette conscience collective s'est lassée de s'auto-transformer. Chaque nouvelle colonie devient une partie d'une mosaïque vivante, un amalgame de paysages et de chair en constante évolution. Les limites se dissolvent progressivement dans une Conscience chimérique, et ses créatures et ses mondes ne font plus qu'un."
 auth_bio_hive_mind_evopred_tt: "$auth_bio_evopred_tt$\nTerraforme automatiquement les colonies en §Ymondes de la Conscience§!\nAvancée de la situation ['concept_adaptive_evolution'] grâce à la purge d'§Yespèces§! aliens §G+100%§!"
 auth_bio_evopred_tt: "Extension de l'empire causée par les pops, par trait d'espèce : §G-1%§!\n$auth_mutation_habitability_tt$"
 #Hive Advanced Authorities
 auth_bio_hive_purity: "Paradigme de pureté"
 auth_bio_hive_purity_desc: "Cette Conscience prospère grâce à la pureté de ses gènes : chaque drone correspond au modèle biologique idéal. La manipulation minutieuse des gènes favorise l'unité et accroît la force collective. Il en résulte une puissance imparable capable de survivre dans n'importe quel environnement."
 auth_bio_hive_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £unity£$unity$ suscitée pour $pop_group_unit$ £pop£pops : $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_hive_cloning: "Horde autoreproductible"
 auth_bio_hive_cloning_desc: "Les procédés de clonage avancés assurent une production ininterrompue de drones partageant le même patrimoine génétique, chacun incarnant l'efficacité et l'unité. Dotée d'un instinct inné de reproduction, cette Conscience entend bien éclipser les étoiles."
 auth_bio_hive_cloning_tt: "$ENABLES_BACKUP_CLONES$\nLa ['concept_clone_leader_degradation',dégradation des clones] est réduite via l'£society£['technology:tech_node_culling_1',abattage rudimentaire d'un noeud]"
 tech_node_culling_1_cloning: "$tech_node_culling_1$"
 tech_node_culling_1_cloning_desc: "$tech_node_culling_1_desc$"
 REDUCED_CLONE_DEGRADATION_TITLE: "§HPermet §! une dégradation des clones réduite"
 REDUCED_CLONE_DEGRADATION_DESC: "§Y$leader_trait_backup_clone_default_plural$§!La ['concept_clone_leader_degradation',dégradation] des clones de substitution est réduite"
 auth_bio_hive_mutation: "Puissance d'adaptation"
 auth_bio_hive_mutation_desc: "Les drones hyper-adaptatifs de cette Conscience constituent une force dynamique, en constante évolution. Ils surmontent tous les défis grâce à des mutations constantes qui renforcent le collectif et lui confèrent une flexibilité et une résilience inégalées. Cela permet à la Conscience de prospérer dans n'importe quel environnement."
 concept_auth_bio_hive_purity: "Paradigme de pureté"
 concept_auth_bio_hive_cloning: "Horde autoreproductible"
 concept_auth_bio_hive_mutation: "Puissance d'adaptation"
