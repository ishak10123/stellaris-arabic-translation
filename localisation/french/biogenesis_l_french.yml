 SHIP_BEHEMOTH_RAGE: "Glandes d'agression"
 SHIP_BEHEMOTH_RAGE_DESC: "Les mastodontes sont des titans capricieux et sauvages qui ne supportent pas le contrôle très longtemps. Tôt ou tard, ils déchaîneront leur fureur, telle une tempête indomptable. Peut-être la sagesse consiste-t-elle, non à attendre la tempête, mais à la provoquer nous-mêmes lorsque nous le décidons nous, sans nous soumettre au bon vouloir de la bête."
 behemoth_rage_ship_button: "§HRage§!\n\nLibérez le §Ymastodonte§!.\nLe mastodonte enragé se dirigera vers la §Ycolonie§! ou l'§Yoeuf de mastodonte§! le plus proche et tentera de le détruire.\nLa rage dure généralement §Y180 jours§!, mais divers facteurs peuvent influencer sa durée.$TABBED_NEW_LINE$- La rage d'un mastodonte ne se dissipe pas pendant un §Rcombat§! ou un §Rbombardement§!.$TABBED_NEW_LINE$- Si nous parvenons à §Gvaincre§! un mastodonte enragé, nous en reprenons le contrôle."
 behemoth_rage_activity_key: "Enragé"
 behemoth_rage_menu_title: "Rage"
 behemoth_rage_progress_activity_key: "Enragé"
 MESSAGE_BEHEMOTH_RAGE_TITLE: "Mastodonte enragé"
 MESSAGE_BEHEMOTH_RAGE_DESC: "Un mastodonte est entré dans une rage frénétique ! Espérons qu'il se calmera d'ici quelques mois."
 MESSAGE_BEHEMOTH_CALM_TITLE: "Rage dissipée"
 MESSAGE_BEHEMOTH_CALM_DESC: "Un mastodonte s'est calmé et nous en avons repris le contrôle."
 SHIP_BEHEMOTH_COCOON: "Cocon holométabolique"
 SHIP_BEHEMOTH_COCOON_DESC: "Les §Ymastodontes§! peuvent se nicher dans les couches d'une géante gazeuse et se nourrir de son atmosphère dense, riche en éléments lourds et composés moléculaires complexes. Ce régime alimentaire favorise leur croissance et les rend encore plus puissants."
