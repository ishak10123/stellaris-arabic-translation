 bio.1005.name: "Capacité conservée"
 bio.1005.desc: "Notre espèce se complexifie. Nous avons passé les étoiles au peigne fin à la recherche de nouveau matériel génétique et sommes prêts à adopter une nouvelle caractéristique. Grâce au travail acharné de nos [Owner.GetScientistPlural], nous pouvons choisir la suite de notre parcours.\n\nQuelle que soit notre décision, elle façonnera l'avenir des [Root.Owner.GetSpeciesNamePlural]."
 bio.1005.tt: "Confère un nouveau trait d'espèce à notre espèce primaire"
 bio.1005.pop_growth: "Notre espèce doit se développer plus rapidement !"
 bio.1005.pop_output: "Pouvons-nous être plus productifs ?"
 bio.1005.leader: "Nos personnalités ont besoin de tous les avantages possibles"
 bio.1005.habitability: "Nous devons pouvoir nous adapter à différents climats"
 bio.1005.upkeep: "Les frais d'entretien de notre population doivent être réduits"
 bio.1005.humanoid: "Les traits humanoïdes nous rendraient plus polyvalents"
 bio.1005.mammalian: "L'ADN des mammaliens recèle d'autres secrets"
 bio.1005.reptilian: "Les reptiliens sont tout à fait uniques"
 bio.1005.avian: "L'ADN aviaire nous conférerait une mobilité incomparable"
 bio.1005.arthropoid: "Les arthropoïdes sont merveilleusement croustillants"
 bio.1005.molluscoid: "Même un molluscoïde peut nous apprendre quelque chose"
 bio.1005.fungoid: "Les fongoïdes se propagent rapidement et nous pourrions faire de même"
 bio.1005.plantoid: "L'efficacité énergétique des plantoïdes pourrait nous être utile"
 bio.1005.lithoid: "Même s'il est difficile à consommer, l'ADN des lithoïdes offre de délicieuses possibilités"
 bio.1005.necroid: "La chair nécrosée reste de la chair"
 bio.1005.aquatic: "Les capacités d'adaptation des aquatiques augmenteraient notre survie en mer"
 bio.1005.toxoid: "Les toxoïdes sont §Gacides§!."
 bio.1005.infernal: "Les thermophiles §Rbrûlent§!, mais cela ne nous posera plus problème"
 bio.1005.plasmic: "La stabilisation de l'ADN plasmatique serait une performance impressionnante"
 bio.1005.leviathan: "Que peuvent bien nous apprendre les titans de la galaxie ?"
 bio.1005.psionic: "Qu'est-ce qui, dans le génome psionique, alimente de telles prouesses cognitives ?"
 bio.1005.random: "Embrassons le chaos et laissons libre cours à nos instincts !"
 bio.1005.no_reward: "Nous sommes déjà suffisamment complexes"
 bio.1005.unnatural_selection: "Que cette mutation libère des capacités qui dépassent nos limites naturelles !"
