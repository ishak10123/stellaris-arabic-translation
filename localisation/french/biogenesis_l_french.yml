 ### NEW CIVICS ###
 civic_genetic_identification: "Identification génétique"
 civic_genetic_identification_desc: "Dans cette société, chaque nouveau-né est inscrit dans un répertoire génétique utilisé à tous les niveaux de l'administration."
 civic_corporate_genetic_identification: "Sécurité séquencée"
 civic_corporate_genetic_identification_desc: "La séquence génétique de chaque client et employé est enregistrée dans une base de données à laquelle chacun peut accéder moyennant une modique somme. Elle est largement utilisée par les forces de l'ordre, qui peuvent identifier les auteurs d'infractions à partir de traces minimes de matériel génétique."
 civic_corporate_genetic_identification_effects: "- £building£§Y$building_private_security$§! : $megacorp_civic_branch_office_building_effect$"
 councilor_genetic_identification: "Répertorateur"
 councilor_genetic_identification_desc: "Le répertorateur est responsable de la gestion et de la conservation du répertoire génétique, sans lequel les procédures administratives seraient moins efficaces."
 councilor_corporate_genetic_identification: "Courtier en séquences"
 councilor_corporate_genetic_identification_desc: "Le courtier en séquences analyse les demandes d'accès et évalue les plans de monétisation. L'identification génétique d'un individu est une tâche qui lui est aisée."
 civic_crowdsourcing: "Production participative"
 civic_crowdsourcing_desc: "Cette société a compris que seule l'inspiration individuelle mène à une véritable innovation. Les brevets open source, l'ouverture d'esprit, les collaborations spontanées et les prix de l'innovation ouvrent la voie au progrès."
 civic_crowdsourcing_effects: "$t$- Les factions suscitent de la £physics £ £society£ £engineering£§Yrecherche§! au lieu d'£unity£§Yunité§! $TABBED_NEW_LINE$- Des factions vont se former dans l'empire peu après le lancement de la partie, mais leur production sera réduite durant les dix premières années"
 civic_corporate_crowdsourcing: "R&D décentralisée"
 civic_corporate_crowdsourcing_desc: "L'organisation régulière de concours d'innovation interservices encourage les ingénieurs et les concepteurs de cette entreprise à créer."
 civic_corporate_crowdsourcing_effects: "$civic_crowdsourcing_effects$ $TABBED_NEW_LINE$- £building£§Y$building_private_research_initiative$§! : $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_crowdsourcing: "N'a PAS de civisme appartenant au groupe ['concept_crowdsourcing_civics']"
 concept_crowdsourcing_civics: "Production participative"
 concept_crowdsourcing_civics_desc: "Le groupe $concept_crowdsourcing_civics$ inclut :$NEW_LINE$- ['civic:civic_crowdsourcing']$NEW_LINE$- ['civic:civic_corporate_crowdsourcing']"
 councilor_crowdsourcing: "Coordinateur de l'innovation"
 councilor_crowdsourcing_desc: "Le coordinateur de l'innovation veille à l'utilisation équitable des brevets et met en place des incitations à la recherche conformes aux intérêts technologiques du gouvernement."
 councilor_corporate_crowdsourcing: "Arbitre des idées"
 councilor_corporate_crowdsourcing_desc: "Tous les projets ne valent pas la peine d'être financés. L'arbitre des idées évalue la viabilité commerciale et la rentabilité de chacun d'entre eux."
 civic_civil_education: "Éducation civique"
 civic_civil_education_desc: "Dans cet empire, l'éducation a remplacé la répression. Les programmes d'études sont extrêmement vastes et les cours sont soigneusement adaptés pour que tout le monde puisse s'instruire. Après tout, il n'y a pas de mauvais citoyens, seulement de mauvais éducateurs."
 civic_civil_education_effects: "$t$- Remplace tous les £job_enforcer£['concept_enforcer',agents de sécurité] par des £job_educator£['concept_educator',éducateurs] $TABBED_NEW_LINE$- Remplace la £building£['concept_precinct_house',maison de loi] par l'£building£['concept_state_academy',académie d'État]"
 councilor_head_of_education: "Ministre de l'Éducation"
 councilor_head_of_education_desc: "Le ministre de l'Éducation a pour mission de transmettre aux citoyens les connaissances dont ils ont besoin pour accomplir leur travail, mais aussi pour faire face aux différents problèmes de la vie. Une bonne pédagogie constitue le fondement d'une société florissante."
 educator: "$job_educator$"
 job_educator: "Éducateurs"
 job_educator_plural: "Éducateurs"
 job_educator_desc: "Leur travail est irremplaçable : ils instruisent les jeunes générations et veillent à ce que chaque citoyen soit prêt à affronter la galaxie."
 job_educator_effect_desc: "(les £job_educator£éducateurs utilisent des £consumer_goods£§Ybiens de consommation§! pour produire de l'£unity£§Yunité§!, réduire la £crime£§Ycriminalité§!, augmenter l'§Yattractivité des éthiques gouvernementales§! et former les £defense_army£§Iarmées défensives§!)"
 mod_job_educator_add: "Emplois d'£job_educator£éducateurs"
 building_state_academy: "Académie d'État"
 building_state_academy_desc: "C'est ici que sont enseignées les connaissances nécessaires à une société saine."
 concept_state_academy: "$building_state_academy$"
 concept_state_academy_desc: "Emplois d'£job_educator£éducateurs : §G+200§!\n\n$job_educator_effect_desc$\n$h_line$§L$building_state_academy_desc$§!"
 building_center_of_guidance: "Centre d'orientation"
 building_center_of_guidance_desc: "Le personnel de ce vaste complexe de formation et d'éducation est capable de corriger toute déviation qui interfère avec la vie en société."
 mod_planet_jobs_citizen_produces_mult: "Production de ressources des pops jouissant de la pleine citoyenneté "
 civic_hive_familiar_face: "Visage familier"
 civic_hive_familiar_face_desc: "La coopération vaut mieux que la confrontation directe. Cette conscience collective a donné naissance à des drones diplomatiques capables de prendre l'apparence et le comportement de leurs interlocuteurs."
 civic_wilderness_familiar_face: "$civic_hive_familiar_face$"
 civic_wilderness_familiar_face_desc: "La coopération vaut mieux que la confrontation directe. Cette contrée sauvage a donné naissance à des avatars diplomatiques capables de prendre l'apparence et le comportement de leurs interlocuteurs."
 civic_hive_familiar_face_effects: "Les émissaires et les officiels prennent la forme physique de l'espèce avec laquelle ils sont en contact.\n§YConfiance§! nécessaire pour les §Yactions diplomatiques§! : §G-50%§!"
 #Bioship Civics
 civic_hive_shared_genetics: "Génétique commune"
 civic_hive_shared_genetics_desc: "Les vaisseaux biologiques développés par cette Conscience sont basés sur son génome muté. Cela a créé un lien entre les flottes et les drones, qui tire sa force de l'unicité de l'espèce."
 civic_wilderness_shared_genetics: "$civic_hive_shared_genetics$"
 civic_wilderness_shared_genetics_desc: "Les vaisseaux biologiques développés par cette contrée sauvage sont basés sur un génome muté. Cela a créé un lien entre les flottes et les autres symbiotes, chaque espèce tirant sa force de l'autre."
 civic_hive_shared_genetics_effects: "- Pour chaque trait §Gpositif§! de l'espèce principale : §G+2.5%§! de coque de vaisseaux, §R+0.5%§! de maintenance.\n- Pour chaque trait §Rnégatif§! de l'espèce principale : §G+1.5%§! de cadence de tir des vaisseaux, §R+0.5%§! de maintenance."
 shared_genetics_fire_rate: "$civic_hive_shared_genetics$ : cadence de tir"
 shared_genetics_fire_rate_desc: "Nos vaisseaux bénéficient de centres d'agressivité surstimulés, alimentés par un mélange sain d'hormones et de ressentiment."
 shared_genetics_hull: "$civic_hive_shared_genetics$ : coque"
 shared_genetics_hull_desc: "La masse musculaire et osseuse de nos vaisseaux bénéficie de la supériorité génétique de notre espèce."
 civic_hive_aerospace_adaptation: "Adaptation aérospatiale"
 civic_hive_aerospace_adaptation_desc: "Les vaisseaux biologiques de ce collectif sont spécialement conçus pour les vols interatmosphériques. Cela lui permet d'effectuer des missions de soutien aérien et même d'aider à la logistique planétaire."
 civic_hive_aerospace_adaptation_effects: "- Les §Yvaisseaux biologiques§! en orbite des colonies §Gamicales§! ont une maintenance réduite de §G-50%§!.\n- Les colonies §Gamicales§! ayant des §Yvaisseaux biologiques§! en orbite bénéficient d'une augmentation de la §Yvitesse de construction§!, des §Yservices§!, de la §Yvitesse de déblaiement des bloqueurs§! et potentiellement de la §Yproduction des emplois§!, en fonction de la taille de la flotte.\n- Les §Yvaisseaux biologiques§! en orbite des colonies §Rhostiles§! ont une maintenance réduite de §G-85%§!."
 aa_ship_upkeep_friendly: "$civic_hive_aerospace_adaptation$"
 aa_ship_upkeep_bombing: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1_desc: "Les vaisseaux biologiques en orbite de cette planète entrent et sortent régulièrement de l'atmosphère pour se reposer, se nourrir et aider les drones à la surface."
 aa_ship_planet_support_2: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_2_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_3: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_3_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_4: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_4_desc: "$aa_ship_planet_support_1_desc:$"
 civic_machine_stalwart_network: "Réseau robuste"
 civic_machine_stalwart_network_desc: "Cette intelligence mécanique est spécialisée dans les manoeuvres militaires défensives. Elle allie habilement défense et escarmouche."
 defensive_stations_tracking_add: "$t$- Ciblage des stations de défense et bases stellaires "
 defensive_stations_tracking_add_tt: "$defensive_stations_tracking_add$: $VARIABLE|0=+$"
 defensive_stations_weapon_range_mult: "Portée des armes des stations de défense et bases stellaires "
 defensive_stations_weapon_range_mult_tt: "$defensive_stations_weapon_range_mult$: $VARIABLE|1%=+$"
 #Bodysnatcher
 civic_hive_bodysnatcher: "Pille-corps"
 civic_hive_bodysnatcher_desc: "C'est l'intérieur qui compte. Cette Conscience est spécialisée dans l'infiltration, prenant le contrôle du corps d'êtres organiques malchanceux. À mesure que le nombre de pantins augmente, la civilisation hôte est inévitablement absorbée par le collectif."
 civic_hive_bodysnatcher_effects: "Lance la partie avec §Y1 000§! £pop£pops assimilées et la capacité d'§Yassimiler§! les organiques au sein de la conscience collective.\nDonne accès à la mission d'espionnage ['concept_operation_bodysnatcher_prepare_invasion'].\nConfère des £pop£pops supplémentaires grâce à la mission d'espionnage ['concept_operation_smuggle_pops']."
 civic_hive_bodysnatcher_secondary_species: "Imposteurs"
 NAME_Bodysnatchers: "Pille-corps"
 operation_bodysnatcher_prepare_invasion: "Préparer l'invasion"
 operation_bodysnatcher_prepare_invasion_desc: "Nos voisins ont des esprits très malléables. En introduisant dans leur société des corps préparés, déjà intégrés dans notre conscience, nous pouvons plus facilement les accueillir."
 operation_bodysnatcher_prepare_invasion_on_success: "$IF_SUCCESSFUL|E$\nNous obtiendrons l'aide d'agents infiltrés la prochaine fois que nous déclarerons la guerre à la §Y[Target.GetName]§!."
 operation_invasion_prepared: "$TRIGGER_FAIL$ §RNous avons déjà préparé une invasion contre cet empire. Il ne nous reste plus qu'à leur déclarer la guerre pour la lancer.§!"
 operation_invasion_impossible: "$TRIGGER_FAIL$ §RCet empire est bien trop préparé pour faire face aux tentatives d'infiltration. Nous ne pouvons pas lancer cette opération !§!"
 concept_operation_bodysnatcher_prepare_invasion: "$operation_bodysnatcher_prepare_invasion$"
 concept_operation_bodysnatcher_prepare_invasion_desc: "Une mission au cours de laquelle les pops assimilées des espèces cibles infiltrent l'empire afin d'effectuer un sabotage de masse une fois la guerre déclenchée."
 bio.800.name: "Nouveau lieu de travail"
 bio.800.desc: "Les corps infiltrés doivent être placés à des endroits stratégiques avant que nous puissions mettre en oeuvre notre grand projet. Les bases stellaires en sous-effectif et les planètes aux défenses limitées sont des cibles de choix. Nous devons nous mettre au travail au plus vite."
 bio.805.name: "Effectifs supplémentaires"
 bio.805.desc: "Nos préparatifs se déroulent sans accroc : nos corps préparés ont trouvé des hôtes et notre participation aux opérations internes de la [Target.GetName] a fortement augmenté. Nos drones devraient bientôt s'emparer de tous les esprits curieux."
 bio.810.name: "Postes vacants"
 bio.810.desc: "Les [Target.GetSpeciesNamePlural] que nous n'avons pas pu remplacer ont été démis de leurs fonctions, libérant ainsi plusieurs postes au sein des structures de la §Y[Target.GetName]§!. Nos marionnettes sont prêtes à nous ouvrir la porte, elles n'attendent que notre signal."
 bio.815.name: "Nouvelles recrues"
 bio.815.desc: "La §Y[From.Target.GetName]§! a été compromise avec succès. Rien ne peut empêcher notre invasion, et il ne nous reste plus qu'à décider du nombre d'infiltrés à envoyer. Bientôt, il n'y aura plus que des [Owner.GetSpeciesNamePlural]."
 bio.815.tt: "Nous n'avons pas assez de pops de l'espèce cible pour cette action."
 bio.815.a: "Nous devons envoyer tous ceux que nous avons"
 bio.815.b: "Nous devons prendre le contrôle de leurs avant-postes"
 bio.815.b.tt: "Envoyez §Y100§! £pop£§Hpops§!.\n$bio.815.reminder$"
 bio.815.c: "Préparons l'invasion de leurs planètes"
 bio.815.c.tt: "Envoyez §Y300§! £pop£§Hpops§!.\n$bio.815.reminder$"
 bio.815.d: "Infiltrons leurs forteresses !"
 bio.815.d.tt: "Envoyez §Y500§! £pop£§Hpops§!.\n$bio.815.reminder$"
 bio.815.e: "Remplaçons-les tous !"
 bio.815.e.tt: "Envoyez §Y2 000§! £pop£§Hpops§!.\n$bio.815.reminder$"
 bio.815.reminder: "Nous tirerons parti de nos infiltrés lors de la prochaine guerre que nous déclarerons à la §Y[From.Target.GetName]§! ou qu'elle nous déclarera au cours des §Y10§! prochaines années."
 bio.825.name: "Invasion des [From.GetSpeciesNamePlural]"
 bio.825.desc.small: "Les [From.GetSpeciesNamePlural] sournois de la [From.GetName] ont infiltré notre empire ! Nos stations spatiales ont été compromises et l'ennemi a déjà envahi nos colonies. Nous devons nous débarrasser des imposteurs !"
 bio.825.desc.large: "Lorsque la moitié de notre réseau de communication est tombée en panne, nous avons d'abord pensé qu'il s'agissait d'un bug.\n\nCe n'était pas le cas. La [From.GetName] a en réalité remplacé de nombreux membres importants de notre personnel. Notre empire est divisé et nos colonies subissent une invasion.\n\nNe faites confiance à personne !"
 #Smuggle pops operation
 operation_smuggle_pops: "Exfiltration de la population"
 operation_smuggle_pops_desc: "Nos agents vont mener des exfiltrations à grandes échelles sur des éléments isolés de [target.GetName]"
 operation_smuggle_pops_on_success: "$IF_SUCCESSFUL|E$\nRelocalise des £pops£pops dans votre empire."
 smuggle_pops_also_fanatic_egalitarians: "$TRIGGER_FAIL$ §REn tant qu'égalitariste, ce peuple est déjà libre§!"
 smuggle_pops_not_enough_pops: "$TRIGGER_FAIL$ §RLa [Target.GetName] n'a pas assez de £pops£pops à voler§!"
 mod_operation_smuggle_pops_difficulty_add: "Difficulté des opérations d'exfiltration "
 concept_operation_smuggle_pops: "$operation_smuggle_pops$"
 concept_operation_smuggle_pops_desc: "Une opération visant à enlever des pops de l'empire cible."
 bio.900.name: "Acquisition de talent"
 bio.900.desc: "Nos agents ont établi un certain nombre de repaires à partir desquels ils peuvent surveiller la population de la [target.GetName]. Les dissidents, reclus ou individus hautement qualifiés seront évalués et marqués en vue d'une extraction."
 bio.905.name: "Disparition"
 bio.905.desc: "Nos agents ont commencé à rassembler des cibles et à les mener en secret vers des lieux isolés. Lorsque c'est possible, ils créent des diversions pour détourner l'attention des autorités locales et effacer nos traces."
 bio.910.name: "Navettes"
 bio.910.desc: "L'opération à atteint un stade critique auquel nous devons transférer tout le monde discrètement afin de les envoyer en orbite. Nous avons l'intention de synchroniser les départs tout en submergeant de fausses pistes les forces de sécurité."
 bio.915.name: "Extraction"
 bio.915.desc: "Nous avons réussi à extraire nombre de nos cibles, mais l'opération ne s'est pas déroulée sans accrocs, et de nombreux vaisseaux remplis d'individus prometteurs ont dû être abandonnés."
 bio.915.desc.detected: "$bio.915.desc$\n\nDe tels mouvements de population ne sont pas passés inaperçus."
 bio.915.desc.cosmogenesis: "Nous avons réussi à extraire nombre de nos cibles qui sont d'ores et déjà en train de rejoindre le tour. Cependant, l'opération ne s'est pas déroulée sans accrocs, et de nombreux vaisseaux remplis d'individus prometteurs ont dû être abandonnés."
 bio.915.desc.cosmogenesis.detected: "$bio.915.desc.cosmogenesis$\n\nDe tels mouvements de population ne sont pas passés inaperçus."
 bio.915.a: "Nous avons fait le maximum"
 bio.915.b: "Concentrons-nous sur la libération d'autres [Root.GetSpeciesNamePlural]"
 bio.915.c: "Nous devons en faire sortir davantage !"
 bio.915.d: "Nous n'abandonnerons personne à son sort"
 bio.915.tt: "Exfiltrons les £pop£§Hpops§! livrées à elles-mêmes vers les mondes appropriés."
 bio.915.asset.tt: "$bio.915.tt$\nSi la §Y[From.Target.GetName]§! n'avait pas conscience de notre présence jusqu'à maintenant, §Rnul doute qu'il en est désormais autrement.§!"
 MESSAGE_POPS_SMUGGLED_TITLE: "Vol de population"
 MESSAGE_POPS_SMUGGLED_DESC: "Les fourbes habitants de la $COUNTRY|Y$ ont infiltré nos frontières pour enlever notre peuple !"
 opinion_smuggled_pops: "Ils ont volé nos pops !"
 #Disconnected Drones #
 disconnected_drones_name: "$policy_disconnected_drones$"
 policy_disconnected_drones: "Drones déconnectés"
 policy_disconnected_drones_desc: "Nous pouvons décider d'autoriser les drones déconnectés de la conscience centrale à vivre dans nos colonies."
 disconnected_drones_sustain: "Maintien"
 disconnected_drones_sustain_name: "Maintien des drones déconnectés"
 disconnected_drones_sustain_desc: "Bien qu'ils aient été coupés de leur conscience collective, ces drones peuvent être maintenus en vie.\n\n§EPermet la §Ycitoyenneté§! des drones déconnectés§!"
 disconnected_drones_purge: "Extermination"
 disconnected_drones_purge_name: "Exterminer les drones déconnectés"
 disconnected_drones_purge_desc: "Les droits dont jouissent les êtres conscients ne s'étendent évidemment pas aux êtres dépourvus d'intelligence. Sans conscience centrale pour les guider, ces drones ne sont rien de plus que des animaux. Et les animaux inutiles sont des parasites.\n\n§ETous les drones déconnectés vivant dans nos colonies seront §Rpurgés§!.§!"
