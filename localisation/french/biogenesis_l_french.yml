 #General Events
 action.1.desc_109: "§HAu lieu d'un échange calme et ordonné, nous avons été assaillis par trois signaux différents. Bien que leur contenu soit très différent, la voix était identique.§!\n\nSignal 1 : [GetPrimaryHiveFEConversation]\nSignal 2 : [GetSecondaryHiveFEConversation]\nSignal 3 : [GetTertiaryHiveFEConversation]\n\n§HLes mots se sont ensuite confondus en un seul bruit inintelligible. L'analyse a montré que chaque signal contenait une désignation complexe. Pour simplifier, nous les avons traduits comme suit : §Y[GetPrimaryHiveFEName]§!, §Y[GetSecondaryHiveFEName]§!, et §Y[GetTertiaryHiveFEName]§!.§!"
 war_first_hivefe: "« Faibles créatures. Savez-vous faire la guerre ? Comme nous adorerions vous regarder souffrir, vous entendre crier... Pourquoi... »"
 growth_first_hivefe: "« Une vie formidable ! Riche et généreuse. Votre espèce se développe-t-elle par nécessité ou par choix ? Nous ne nous en souvenons pas. Pourquoi... »"
 control_first_hivefe: "« Ces corps... Vos [Species.GetEyeNamePlural] sont décentrés de 3%. Cela doit être corrigé. Nous partons du principe que vous obtempérerez. Pourquoi... »"
 war_second_hivefe: "« ... des boucliers inutiles, incapables de résister au coeur d'une étoile. Cette galaxie doit vous faire peur. Vous devez être... »"
 growth_second_hivefe: "« ... trop peu d'orifices. Avec trois [Species.GetMouthName], vous devriez commencer à voir des résultats. Peut-être que vous... »"
 control_second_hivefe: "« ... une langue atrocement maladroite. Votre grammaire désordonnée doit être remaniée. Vous introduirez les changements que nous proposons... »"
 bio.3000.name: "Avertissement"
 bio.3000.desc: "§HLa dissonance inhérente aux fragments de l'empire déchu a disparu. Trois voix s'unirent, chacune débordant de colère.§!\n\n[owner.GetSpeciesNamePlural] ! Vous êtes dans le système de la Dernière pensée. Cet endroit n'est pas fait pour vos [owner.GetEyeNamePlural]. Si vous continuez, les conséquences dépasseront l'entendement... et votre douleur sera insupportable.\n\nNe nous/le/me dérangez plus."
 bio.3000.a: "Déclenchons le bond d'urgence PRL"
 bio.3000.b: "Nous ne partirons pas"
 bio.3005.name: "Deuxième avertissement"
 bio.3005.desc: "§HL'accord, le choeur, se fait à nouveau entendre et les trois fragments parlent d'une seule voix :§!\n\n... raissez ! Disparaissez ! Disparaissez ! Disparaissez ! Disparaissez ! Dispa..."
 bio.3005.a: "Déclenchons immédiatement le bond d'urgence PRL !"
 bio.3005.b: "Nous percerons vos secrets"
 #Task Events
 #War
 bio.3105.name: "La survie du plus fort"
 bio.3105.desc: "Fragiles [root.GetSpeciesNamePlural], le jour est venu de prouver votre valeur ! Nous avons créé de nouveaux vaisseaux biologiques. La souche a déjà fait ses preuves en décimant ses congénères, et il est maintenant temps de la tester contre d'autres organismes. Un spécimen arrivera bientôt dans le système de §Y[target_system.GetName]§!.\n\nEssayez au moins de nous fournir quelques données intéressantes."
 bio.3105.militarist: "Un défi digne de ce nom !"
 bio.3105.a.tooltip: "Un vaisseau expérimental de l'empire déchu viendra dans le système de §Y[target_system.GetName]§!"
 bio.3105.b: "Est-il possible de refuser ?"
 NAME_New_Breed: "Nouvelle souche"
 NAME_Experimental_Ship: "Vaisseau expérimental"
 bio.3110.name: "Déception"
 bio.3110.desc: "Notre vaisseau expérimental est toujours vivant. Vous êtes encore trop faibles.\n\nNous aurions peut-être dû vous envoyer une amibe."
 bio.3110.a: "Désolés... ?"
 bio.3120.name: "Leçon apprise"
 bio.3120.desc: "Brillant. Vous avez remarqué que cette souche a tendance à esquiver les tirs et en avez tiré parti. Nous en sommes ravis, mais sachez que la prochaine génération n'aura plus ce défaut.\n\nVous avez évolué, jeunes [root.GetSpeciesNamePlural]. Soyez prêts."
 bio.3130.name: "C'est trop calme"
 bio.3130.desc.notruce: "Nous avons remarqué que vous ne vous battez pas. Pourquoi ? Tout jeune empire doit se battre, au risque de se faire distancer. Nous vous avons choisi un adversaire : §Y[unfortunate_country.GetName]§!. Vainquez-le en une décennie, et nous vous garantissons un développement durable."
 bio.3130.desc.truce: "$bio.3130.desc.notruce$\n\nEt ne vous inquiétez pas pour la trêve que vous aviez conclue : elle n'existe plus."
 bio.3130.a: "Vous n'êtes pas sérieux..."
 bio.3130.a.pacifist: "La guerre n'est pas le seul moteur du progrès !"
 bio.3130.a.militarist: "Excellente initiative !"
 bio.3150.name: "Donner une chance à la paix"
 bio.3150.desc: "Jeunes [Root.GetName] ! Permettez-nous de vous avertir et de vous donner un nouveau défi.\n\nNe vous complaisez pas dans votre conquête : pour réellement apprécier la guerre, il faut connaître la paix.\n\nFaites une pause de dix ans et réfléchissez à tout ce que vous avez accompli. Faites-nous confiance ; si vous ne vous reposez pas, vous vous écroulerez."
 bio.3150.a.mean: "Une stupidité sans nom !"
 bio.3150.a.pacifist: "Une vision des plus brillantes !"
 #Growth
 bio.3205.name: "Amélioration de l'écosystème"
 bio.3205.desc: "Votre livraison de biomasse est en retard. Attendez... Vous n'êtes pas la §Y[targetrivalname.GetName]§!.\n\nPourquoi vous nous distrayez ?\n\nAh oui ! Vous êtes les destinataires d'un génome en dormance que nous conservons soigneusement depuis des millénaires. Le moment est enfin venu. Votre colonie sur §Y[target_planet.GetName]§! est le candidat le plus approprié. Sa biosphère sera bientôt engloutie."
 bio.3205.a: "C'est d'accord"
 bio.3205.a.planetscaper: "Dites-nous comment faire !"
 bio.3205.b: "Pourquoi pas plutôt §Y[alternate_planet.GetName]§! ?"
 bio.3205.b.planetscaper: "Nous pensons que §Y[alternate_planet.GetName]§! est bien plus adaptée aux tests !"
 bio.3205.c: "Vous avez perdu la tête ! C'est hors de question !"
 bio.3205.c.environmentalist: "Comment osez-vous ?!"
 bio.3210.name: "Biosphère modifiée"
 bio.3210.desc.base: "La §Y[fallen_empire_hive_growth.GetName]§! a fini d'apporter des modifications à §Y[root.GetName]§!. Son intervention est passée inaperçue, mais les effets sont indéniables."
 bio.3210.desc.radio_bugs: "$bio.3210.desc.base$\n\nLes insectes qui peuplent la planète communiquent désormais sur la même fréquence que celle de nos appareils sans fil. Un simple gazouillis suffit à ouvrir une porte automatique, et un essaim peut paralyser une usine entière. Nous sommes déjà en train de changer les fréquences, mais toutes les usines ne fonctionneront pas à pleine capacité."
 bio.3210.radio_bugs.accept: "Nous nous adapterons"
 bio.3210.radio_bugs.purge: "C'est inacceptable, débarrassons-nous de tous les insectes !"
 bio.3210.radio_bugs.purgeota: "Mises à jour compromises, éliminons les insectes"
 radio_bugs: "Insectes radio"
 radio_bugs_desc: "Les ondes radio de cette planète sont envahies de sons émis par des insectes artificiellement modifiés."
 mod_planet_districts_cities_society_research_produces_add: "£society_research£$society_research$ par les £district£districts de la conscience et urbains"
 bio.3210.desc.world_of_thought: "$bio.3210.desc.base$\n\nPartout sur la planète, des créatures qui se contentaient autrefois de brouter de l'herbe et de se rouler dans la boue nous posent désormais des questions existentielles inquiétantes. L'empire déchu a modifié une grande partie de la faune locale."
 bio.3210.world_of_thought: "La [fallen_empire_hive_growth.GetName] est capable d'une telle chose ?!"
 bio.3210.world_of_thought.homicidal: "Les pauvres"
 bio.3210.world_of_thought.tt: "§Y500§! nouvelles £pop£§Hpops§! sont devenues conscientes sur §Y[This.GetName]§!"
 bio.3210.desc.world_alight: "$bio.3210.desc.base$\n\nLe monde s'est illuminé. Littéralement. Suite aux modifications, les différentes espèces locales sont devenues bioluminescentes et vrombissent non-stop tel un moteur en marche. Nos [owner.GetColonistPlural] ne savent plus ce qu'est la nuit ; nous allons devoir les aider à obscurcir leurs habitations."
 bio.3210.world_alight.accept: "Ce n'est pas toujours agréable d'avoir des [owner.GetEyeNamePlural]"
 bio.3210.world_alight.reject: "Couvrons-les ou éliminons-les. Ce n'est pas vivable !"
 world_alight: "Monde lumineux"
 world_alight_desc: "Un monde où il ne fait jamais nuit. Grâce à la biomodification, sa faune émet en permanence de la lumière et des vibrations désagréables. Les habitants ont besoin d'une aide considérable pour supporter ces conditions impitoyables."
 bio.3220.name: "Divertissement génétique"
 bio.3220.desc: "Nous sommes attristés par la simplicité de l'espèce §Y[boring_species.GetName]§! vivant à l'intérieur de vos frontières. Son existence n'est qu'un écho de son plein potentiel. Notre volonté collective trouve cela offensant. Nous allons vous donner un moyen de réparer ce... tort.\n\nNe nous décevez pas."
 bio.3220.tt: "Fait avancer la situation §Y$evolutionary_predators_situation$§! de §G50%§!."
 bio.3220.humanoid: "Donnez-nous les caractéristiques des humanoïdes"
 bio.3220.mammalian: "Donnez-nous les caractéristiques des mammaliens"
 bio.3220.reptilian: "Donnez-nous les caractéristiques des reptiliens"
 bio.3220.avian: "Donnez-nous les caractéristiques des aviaires"
 bio.3220.arthropoid: "Donnez-nous les caractéristiques des arthropoïdes"
 bio.3220.molluscoid: "Donnez-nous les caractéristiques des molluscoïdes"
 bio.3220.fungoid: "Donnez-nous les caractéristiques des fongoïdes"
 bio.3220.plantoid: "Donnez-nous les caractéristiques des plantoïdes"
 bio.3220.lithoid: "Donnez-nous les caractéristiques des lithoïdes"
 bio.3220.necroid: "Donnez-nous les caractéristiques des nécroïdes"
 bio.3220.aquatic: "Donnez-nous les caractéristiques des aquatiques"
 bio.3220.toxoid: "Donnez-nous les caractéristiques des toxoïdes"
 bio.3220.infernal: "Donnez-nous les caractéristiques des thermophiles"
 bio.3220.psionic: "Donnez-nous les caractéristiques des psioniques"
 bio.3220.evopred: "Nous évoluerons bientôt"
 bio.3220.b: "Il n'est pas question de modifier une espèce selon vos caprices !"
 bio.3230.name: "Trait rare"
 bio.3230.desc: "Nous avons remarqué que certains membres de votre espèce ont développé un trait intéressant que nous ne possédons pas dans notre immense patrimoine génétique. Nous ne voulons pas une simple analyse, mais un échantillon vivant doté du trait §Y[fallen_empire_hive_growth.species.GetInterestingTraitName]§!. Ne vous inquiétez pas, nous ne vous demandons pas un individu entier. Une partie du corps suffira pour cultiver le génome."
 bio.3230.a: "Qu'est-ce qu'un membre à l'échelle de l'univers ?"
 bio.3230.b: "Nous ne pouvons pas vous confier notre patrimoine génétique !"
 #bio.3245.name: "Eternal Harvest"
 #bio.3245.desc: "We have discovered a derelict transport from the §Y[fallen_empire_hive_growth.GetName]§! in the §Y[transport_system.GetName]§!. Initial scans show it is carrying samples of the Fallen Empire's special crop strain, capable of feeding trillions.\n\nThe transport has been left derelict for months already and we have not seen any movement from the [fallen_empire_hive_growth.GetName] to retrieve it. Could this be a test or a glorious opportunity?"
 #Control
 bio.3305.name: "Collection complète"
 bio.3305.desc: "§HCeci est un message préenregistré. Merci de ne pas y répondre.§!\n\nNous avons tenu compte des limites de votre langue et avons modifié cette transmission afin que vous en compreniez le contenu. Un membre de l'espèce §Y[target_pop.GetSpeciesName]§! doit nous être cédé immédiatement pour assimilation. Cette déviance ne peut plus être tolérée.\n\nUn vaisseau de transport attend en orbite de §Y[target_pop.Planet.GetName]§!. Le temps presse. Votre désobéissance mettrait en péril la stabilité."
 bio.3305.a: "Nous n'avons pas le choix"
 bio.3305.a.tooltip: "1 §Y[target_pop.GetSpeciesNamePlural]§! vivants sur §Y[target_pop.Planet.GetName]§! vont être transférés vers §Y[fallen_empire_hive_control.Capital.GetName]§!"
 bio.3305.b: "Venez le chercher vous-mêmes !"
 bio.3305.followup: "§HNous avons reçu un message de la §Y[fallen_empire_hive_control.GetName]§!. À notre grande surprise, il ne s'agissait pas d'un membre des [fallen_empire_hive_control.GetSpeciesNamePlural], mais d'un visage familier appartenant à l'espèce §Y[target_leader_fe_control.Species.GetName]§!.§!\n\n"
 bio.3310.name: "N'ayez crainte"
 bio.3310.desc: "$bio.3305.followup$Aujourd'hui marque un tournant dans votre histoire. Le code génétique de votre espèce est désormais en sécurité ; il a été intégré à l'ensemble. Votre avenir n'est plus incertain. Le moment venu, vous ferez partie de nous."
 bio.3310.familiar_face: "Est-ce l'image qu'ils ont de nous ?"
 bio.3315.desc: "$bio.3305.followup$Le temps nous est compté. Il n'y a pas de mots pour décrire les expériences qu'ils nous font subir. §Y[fallen_empire_hive_control.Capital.GetName]§! est un endroit où nous n'enverrions pas nos pires ennemis. J'espère que le contenu de ce paquet de données permettra de faire en sorte que ce fragment ne s'empare jamais de nous."
 bio.3315.a: "Acceptons le paquet de données"
 bio.3315.tooltip: "§G50%§! de chances qu'il ne s'agisse pas d'un test et qu'il contienne de véritables secrets sur l'§Yempire déchu§!."
 bio.3315.b: "C'est un piège ! Arrêtons la transmission !"
 bio.3330.name: "Priorité absolue"
 bio.3330.desc: "Nous espérons qu'en dépit de vos nombreux défauts, vous êtes en mesure de comprendre la gravité de la situation. Votre §YCommunauté galactique§! hésitante a proposé une résolution qui doit absolument §Y[GetPassFail]§!. Pour vous aider à trouver vos arguments, nous vous permettons d'accéder à nos connaissances supérieures. Soyez attentifs, pour peu que vous soyez capables d'une pensée complexe, bien sûr.\n\n§HL'empire déchu a interrompu la communication.§!"
 bio.3330.a: "Que vient-il de se passer ?"
 bio.3330.b: "C'est une violation du protocole !"
 fail_resolution: "échouer"
 pass_resolution: "réussir"
 fe_political_support: "Politiques anciennes"
 fe_political_support_desc: "Grâce au soutien d'un empire déchu, les litiges et autres tentatives d'obstruction sont un jeu d'enfant."
 fe_political_opposition: "$fe_political_support$"
 fe_political_opposition_desc: "$fe_political_support_desc$"
 MESSAGE_PASS_HIVE_FE_TASK_TITLE: "Fragment d'empire déchu satisfait"
 MESSAGE_PASS_HIVE_FE_TASK: "L'empire déchu $FALLEN_EMPIRE|Y$ est heureux que nous ayons suivi ses instructions. Nous allons pouvoir vivre un jour de plus."
 MESSAGE_FAIL_HIVE_FE_TASK_TITLE: "Fragment d'empire déchu mécontent"
 MESSAGE_FAIL_HIVE_FE_TASK: "L'empire déchu $FALLEN_EMPIRE|Y$ est furieux que nous n'ayons pas suivi ses instructions. Nous ne pouvons qu'espérer être pardonnés."
 bio.3350.name: "Excroissance galactique"
 bio.3350.desc: "Pourquoi vous obstinez-vous à polluer la galaxie par votre présence si vous n'êtes pas capables de vous étendre décemment ? Nul n'ose vous le dire, alors permettez-nous de le faire : personne n'aime vos frontières, et l'espace se porterait bien mieux sans vous.\n\nLe système de §Y[offending_system.GetName]§! perturbe l'harmonie et doit être éliminé de votre empire afin de préserver la cohésion galactique."
 bio.3350.a: "Vous voulez que nous abandonnions un système pour embellir nos frontières ?!"
 bio.3350.bordergore: "Nos frontières sont très bien comme ça !"
 bio.3350.tt: "Nous devons démanteler notre base stellaire dans le système de §Y[offending_system.GetName]§! au risque de subir la colère de la §Y[fallen_empire_hive_control.GetName]§!"
 bio.3355.name: "Prise de tête"
 bio.3355.desc: "Faites-vous exprès d'être aussi ignorants ? L'objectif était simple : vous débarrasser du système de §Y[offending_system.GetName]§!.\n\nPeut-être devrions-nous prendre les choses en main."
 bio.3360.name: "Clarté"
 bio.3360.desc: "Nous sommes ravis de constater que vous êtes capables d'apprendre de vos erreurs. Considérez le problème du système de §Y[FromFrom.GetName]§! réglé. Tout espoir n'est pas perdu, vous allez peut-être finir par nous ressembler.\n\nNous continuerons à suivre votre évolution."
 #Awakening
 #War
 casus_belli_cb_ae_entertainment: "Divertissement"
 war_goal_wg_ae_entertainment: "Divertissement"
 war_goal_wg_ae_entertainment_desc: "Faites la guerre pour divertir l'empire renaissant et trouver des adversaires adéquats."
 wg_ae_war_entertainment_effect: "La §Y[Root.GetName]§! récompense la soif de combat. Plus la §Ylassitude de guerre§! de l'empire renaissant est élevée, meilleure est la récompense."
 #Control
 bio.3400.name: "Unité"
 bio.3400.desc.nogalcom: "Galaxie, nous ne faisons qu'un. Les fragments inférieurs ont vu la réalité en face et ont à nouveau rejoint le collectif. Notre nom est désormais le suivant : §Y[fallen_empire_hive_control.GetName]§!. Réjouissez-vous d'avoir pu assister à ce moment. La plus grande forme de vie parcourt à nouveau les étoiles."
 bio.3400.desc.galcom: "$bio.3400.desc.nogalcom$\n\nNous serons désormais en charge de votre « §YCommunauté galactique§! ». Voilà une excellente occasion de faire la fête !"
 bio.3405.name: "Fausse note"
 bio.3405.desc: "Pourquoi vous mettez-vous en travers de notre route ? Vous êtes une note discordante dans le choeur galactique. Nous ne désirons qu'une chose : l'harmonie. Mais vous résistez et préférez la discorde.\n\nSachez que notre symphonie résonnera dans toute la galaxie, avec ou sans vous."
 bio.3405.a: "Nous avons entendu votre mélodie et ne comptons pas la suivre"
 NAME_Appeal_the_Veto: "Opposition au veto"
 gal_com_arrogance: "Arrogance"
 #Dig Site
 NAME_Echo: "Mausolée résonnant"
 last_thought_site: "Le dernier souvenir"
 last_thought_site_desc: "[From.Planet.GetName] repousse quiconque s'en approche et les chercheurs qui devaient l'étudier inventent toutes sortes d'excuses pour remettre leur travail à plus tard. Même les instruments lâchent lorsqu'ils reçoivent des données à son sujet.\n\nUn terrible événement s'est produit ici, qui résonne encore aujourd'hui dans notre réalité."
 bio.3450.name: "Le mort-né"
 bio.3450.desc: "Notre exploration minutieuse de [From.Planet.GetName] nous a conduits sous sa surface, où nous attendaient d'innombrables couches de matière organique à moitié fossilisée. Nous avons fini par percer le noyau creux de la planète, mais l'atmosphère oppressante s'alourdissait à chaque pas. Malgré les précautions prises par [Root.GetLeaderName], l'anxiété croissante devenait insupportable. Certains [Root.Owner.GetArchaeologistPlural] ont fait une dépression nerveuse collective et ont sombré dans une intense catatonie. Nous avons dû les évacuer immédiatement.\n\nL'immense grotte au coeur de la planète n'est pas un espace vide ordinaire. Nous y avons trouvé les restes d'une créature bien plus grande que toutes celles que nous connaissons. Les traces de liquide amniotique ont dissipé les doutes : [From.Planet.GetName] n'est pas un rocher stérile, mais un oeuf !\n\nEt à l'intérieur repose un monstre mort-né."
 bio.3455.name: "Les synapses"
 bio.3455.desc: "Nos [Root.Owner.GetArchaeologistPlural] ont découvert sur [From.Planet.GetName] un réseau d'étranges vrilles profondément enfouies dans le crâne de la créature mort-née. En les suivant jusqu'à leur source, ils sont tombés sur un réseau de synapses, un système complexe qui regorge encore d'un mystérieux potentiel.\n\n[Root.GetLeaderName] essaie en ce moment même de se connecter aux anciens circuits qui pulsent le long des vrilles. Quel que soit le savoir qu'ils recèlent, il a survécu à son hôte. Reste à savoir s'il s'en souvient encore."
 bio.3460.name: "Le pari risqué"
 bio.3460.desc: "Tout cela remonte à cent mille ans en arrière. Transcrire la perception du temps de la Conscience en unités galactiques standard s'est avéré compliqué, mais grâce aux souvenirs du bio-ordinateur, [Root.GetLeaderName] commence peu à peu à assembler les pièces du puzzle.\n\nAu sommet de sa puissance, la Conscience s'est retrouvée face à un ennemi invincible. Malgré ses nombreux alliés, chaque bataille se soldait par une défaite. Son désespoir l'a alors conduite à l'imprudence.\n\nCe qui s'est passé par la suite a été délibérément effacé, mais les quelques bribes restantes permettent de comprendre l'ultime tentative de la Conscience. Elle a créé cet oeuf de la taille d'une planète comme réceptacle pour son ascension, afin d'abandonner sa fragile existence et de s'affranchir des contraintes planétaires pour fusionner avec la progéniture. Nous ignorons si elle comptait se battre ou s'enfuir.\n\nMais lorsque la créature s'est réveillée, quelque chose de terrible s'est produit."
 bio.3465.name: "La rupture"
 bio.3465.desc: "Grâce à une communication précise avec les bio-ordinateurs et leur lien synaptique encore actif, nous avons pu extraire les derniers souvenirs de la créature mort-née. Bien que le processus ait rapidement détérioré les bio-ordinateurs en raison de l'immense charge cognitive, nous avons pu récupérer la plupart des données.\n\nDans un dernier espoir de survie, la Conscience a renoncé à la prudence et transféré toute sa psyché dans l'hôte à naître. La surcharge synaptique s'est avérée mortelle pour la créature, et la Conscience s'est retrouvée prisonnière d'une boucle de tourments insupportables qui se répétaient sans fin... Une boucle qui l'aurait tuée si son généreux allié n'avait pas coupé la connexion. Aujourd'hui, seuls les échos fragmentés de son esprit demeurent sur [From.Planet.GetName], un monde encore hanté par son dernier cri.\n\nSon dernier souvenir est celui de l'agonie."
