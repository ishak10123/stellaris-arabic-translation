 elder_voidspawn_chain_title: "Être du vide déchaîné"
 elder_voidspawn_chain_desc: "Un énorme être du vide parcourt la galaxie. Il est à la recherche de mastodontes à tuer ; peut-être nous laissera-t-il tranquilles si nous les tuons avant lui.\n\nOBJECTIF : trouver et tuer tous les mastodontes de niveau 4 de la galaxie."
 behemoth_victory_chain_title: "Roi des monstres"
 behemoth_victory_chain_desc: "La fusion des esprits étant accomplie, seules quelques étapes nous séparent encore de nos ambitions. Nous devons nous habituer à notre corps partagé et continuer de transférer l'esprit de notre peuple. Mais le plus important sera de pulvériser quiconque tentera de nous défier.\n\n§HOBJECTIFS§! :\n- Repérer n'importe quel autre mastodonte de classe IV dans la galaxie et le tuer.\n- Achever la situation Douleurs croissantes.\n- Vaincre l'être du vide ancien."
 behemoth_transference: "Transfert vers le mastodonte"
 behemoth_transference_desc: "Le lien qui unit désormais la bête à notre population a changé notre perception sur la vie planétaire : nous préférons ne faire qu'un avec la bête plutôt que de vivre de façon aussi éphémère. Tout le monde a faim d'union... une faim dévorante."
