 behemoth_incubation_poi_name: "Incubation de mastodonte"
 behemoth_incubation_poi_desc: "L'un de nos mastodontes est en cours d'incubation sur la géante gazeuse §H[incubation_planet.GetName]§!. Date prévue de pleine maturité : §H[incubation_planet.behemoth_incubation_timer]§!."
 incubating_behemoth_modifier: "Incubation de mastodonte"
