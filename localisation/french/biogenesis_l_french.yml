 ############################
 #Species traits localized tags
 SPECIES_TRAIT_CATEGORY_HEADER: "§HCatégories du trait§!\nCe trait appartient aux catégories suivantes :"
 SPECIES_TRAIT_HUMANOID: "['concept_humanoid_phenotype_traits']"
 SPECIES_TRAIT_MAMMALIAN: "['concept_mammalian_phenotype_traits']"
 SPECIES_TRAIT_REPTILIAN: "['concept_reptilian_phenotype_traits']"
 SPECIES_TRAIT_ARTHROPOID: "['concept_arthropoid_phenotype_traits']"
 SPECIES_TRAIT_AVIAN: "['concept_avian_phenotype_traits']"
 SPECIES_TRAIT_MOLLUSCOID: "['concept_molluscoid_phenotype_traits']"
 SPECIES_TRAIT_PLANTOID: "['concept_plantoid_phenotype_traits']"
 SPECIES_TRAIT_FUNGOID: "['concept_fungoid_phenotype_traits']"
 SPECIES_TRAIT_LITHOID: "['concept_lithoid_phenotype_traits']"
 SPECIES_TRAIT_NECROID: "['concept_necroid_phenotype_traits']"
 SPECIES_TRAIT_AQUATIC: "['concept_aquatic_phenotype_traits']"
 SPECIES_TRAIT_TOXOID: "['concept_toxoid_phenotype_traits']"
 SPECIES_TRAIT_INFERNAL: "['concept_infernal_phenotype_traits']"
 SPECIES_TRAIT_VOCATIONAL: "['concept_vocational_traits']"
 SPECIES_TRAIT_OVERTUNED: "['concept_overtuned_traits']"
 SPECIES_TRAIT_FLEETING_EXCELLENCE: "['concept_fleeting_excellence_traits']"
 SPECIES_TRAIT_CYBORG: "['concept_cybernetic_traits']"
 SPECIES_TRAIT_UNIVERSAL_AUGMENTATIONS: "['concept_universal_augmentations_traits']"
 SPECIES_TRAIT_ADAPTIVE_FRAMES: "['concept_adaptive_frames_traits']"
 trait_egg_laying: "Oviparité"
 trait_egg_laying_desc: "Les petits de cette espèce ne se développent pas à l'intérieur d'un parent, mais dans la coquille protectrice d'un oeuf. Cela permet une croissance rapide en période d'abondance."
 trait_egg_laying_effect: "Vitesse de dév. des pops : §G+15%§! en habitant sur une planète avec un §Gsurplus de production§! de £food£§Ynourriture§! (ou équivalent)"
 trait_egg_laying_portrait_override_tt: "Ou toute espèce ovipare"
 trait_seasonal_dormancy: "Dormance saisonnière"
 trait_seasonal_dormancy_desc: "Cette espèce a évolué sur une planète dont les saisons cycliques favorisent l'hibernation. Les moyens modernes permettent de simuler artificiellement ces déclencheurs saisonniers afin de mettre de côté les membres les moins productifs de la société."
 trait_seasonal_dormancy_effect: "Entretien des pops employées : §G-15%§!\n    - Entretien des pops inemployées et ['concept_denizen',résidentes] : §G-75%§!"
 trait_seasonal_dormancy_portrait_override_tt: "Ou toute espèce hibernante"
 trait_hollow_bones: "Os creux"
 trait_hollow_bones_desc: "Les os fragiles des membres de cette espèce leur permettent de se déplacer avec grâce et naturel. Cependant, ils sont aussi plus vulnérables aux effets gravitationnels des planètes."
 trait_hollow_bones_effect: "$BONUS_WORKFORCE_FOR$ ouvriers, drones subalternes et emplois de soldats par taille de monde : §R-0.67%§!"
 trait_rooted: "Enracinement"
 trait_rooted_desc: "Cette espèce s'enracine littéralement dans tout environnement qu'elle habite, ce qui fait d'un déménagement une expérience hautement traumatisante."
 AUTO_MIGRATE_ROOTED: "§RLes pops enracinées ne peuvent pas migrer.§!"
 trait_rooted_effect: "§RPas de réimplantation automatique des pops§!\n    - Coût de réimplantation : §R+200%§!"
 trait_rooted_portrait_override_tt: "Ou toute espèce dépendant de l'environnement"
 trait_acidic_vascularity: "Vascularisation acide"
 trait_acidic_vascularity_desc: "Les fluides internes de cette espèce constituent un puissant moyen de défense. Ils sont hautement corrosifs et mortels, faisant regretter à tout ennemi sa décision de transpercer un de ses membres."
 trait_acidic_vascularity_effect: "Les armées §Yexplosent en mourant§! et infligent §G250§! de dégâts aux armées ennemies\n    - Productivité du traitement des pops purgées : §R-75%§!"
 DAMAGE_ARMY: "Inflige des dégâts à : $ARMY|Y$"
 trait_shelled: "Coquilles"
 trait_shelled_desc: "Les individus de cette espèce emportent avec eux leur maison, qu'elle ait été formée naturellement ou trouvée par hasard (ou intentionnellement). Ces coquilles leur offrent une protection et un endroit où passer la nuit."
 trait_shelled_portrait_override_tt: "Ou toute espèce à coquille"
 trait_camouflage: "Camouflage"
 trait_camouflage_desc: "Ces maîtres du camouflage se fondent parfaitement dans l'environnement, se rendant presque invisibles aux prédateurs comme aux proies. Leur compréhension innée de l'optique leur confère un avantage tactique, en particulier en cas de guérilla."
 trait_camouflage_portrait_override_tt: "Ou toute espèce capable de se camoufler"
 trait_chromalogs: "Chromatisme"
 trait_chromalogs_desc: "Grâce à leur utilisation habile des couleurs, les membres de cette espèce ont pu évoluer au-delà du simple camouflage et communiquent grâce aux motifs brillants et complexes présents sur leurs corps."
 trait_chromalogs_portrait_override_tt: "Ou toute espèce communiquant par la couleur de son corps"
 trait_brittle: "Fragilité"
 trait_brittle_desc: "En raison de sa fragilité intrinsèque, cette espèce doit être extrêmement prudente dans ses activités quotidiennes pour ne pas succomber lors des tâches les plus banales."
 trait_familial: "Famille unie"
 trait_familial_desc: "Les membres de cette espèce ont un lien indéfectible avec leurs parents proches et forment des collectifs très efficaces et soudés."
 trait_familial_effect: "Bonheur pour §Y100§! £pop£pops ayant ce trait sur la même planète : §G0.1%§! (Maximum : §G+20%§!)"
 trait_familial_portrait_override_tt: "Ou toute espèce familiale"
 trait_permeable_skin: "Peau perméable"
 trait_permeable_skin_desc: "Cette espèce a développé une peau particulière qui nécessite un environnement idéal. Cependant, tant que celui-ci n'est pas trop éloigné de son climat d'origine, cela ne devrait pas poser de problème."
 trait_permeable_skin_effect: "Habitabilité sur les mondes dont la ['concept_climate_category',catégorie climatique] diffère de notre préférence : §R-20%§!"
 concept_climate_category: "Catégorie climatique"
 concept_climate_category_desc: "Les mondes habitables sont divisés en trois catégories climatiques :\n- Humide :\n$t$- Continental\n$t$- Océanique\n$t$- Tropical\n- Glaciaire :\n$t$- Montagneux\n$t$- Arctique\n$t$- Subarctique\n- Sec :\n$t$- Aride\n$t$- Désertique\n$t$- Savane"
 trait_genetic_memory: "Mémoire génétique"
 trait_genetic_memory_desc: "La transmission de savoir d'une génération à l'autre a donné naissance à de nombreuses civilisations. Cette espèce est allée encore plus loin en encodant des notions de survie directement dans son code génétique, afin de s'assurer que chaque génération naisse avec le savoir de ses ancêtres."
 trait_genetic_memory_effect: "Habitabilité en fonction de l'âge de la colonie : §G+0.5%§! par an (§G+25%§! max.)"
 trait_genetic_memory_portrait_override_tt: "Ou toute espèce ayant hérité d'instincts de survie"
 trait_nascent_stage: "Phase initiale"
 trait_nascent_stage_desc: "Les membres de cette espèce mettent au monde leurs progénitures à un stade de développement précoce, allongeant la période pendant laquelle les jeunes ne peuvent pas contribuer à la société. Pendant cette phase, ils ne sont pas conscients des responsabilités et des charges qui vont de pair avec la sapience."
 trait_nascent_stage_effect: "Les pops nouveau-nées ayant ce trait sont considérées comme préconscientes pendant leurs §Y5§! premières années."
 trait_nascent_stage_portrait_override_tt: "Ou toute espèce ayant une longue enfance"
 trait_presapient_stage: "Préconscience"
 trait_presapient_stage_desc: "Après quelques années sans pensée consciente, les membres de cette espèce deviendront des êtres pleinement conscients."
 trait_flight: "Vol"
 trait_flight_desc: "Les membres de cette espèce se sont affranchis des contraintes de la surface et se déplacent librement dans les airs. Leurs villes sont denses et uniques, optimisées pour les habitants aériens. En cas de conflit, ils se révèlent être des cibles insaisissables."
 trait_flight_portrait_override_tt: "Ou toute espèce capable de voler"
 trait_spatial_mastery: "Maîtrise de l'espace"
 trait_spatial_mastery_desc: "Capables de voler, les membres de cette espèce disposent également d'adaptations cérébrales uniques qui leur permettent de traiter instinctivement les espaces tridimensionnels et de naviguer à travers eux. Ces capacités leur confèrent un avantage dans les batailles, la reconnaissance des planètes et la gestion des villes."
 trait_spatial_mastery_portrait_override_tt: "Ou toute autre espèce ayant la capacité de franchir les trois dimensions"
 trait_spare_organs: "Organes de rechange"
 trait_spare_organs_desc: "Les membres de cette espèce ont développé des organes secondaires pour survivre aux blessures les plus graves ; une adaptation réussie, comme le prouve leur pérennité."
 trait_spare_organs_effect: "Les personnalités survivent à leur première mort\n    - En cas de mort d'une armée d'attaque : §G20%§! de chances de faire apparaître une armée de remplacement\n    - Production des £job_livestock£§Ycheptels§! : §G+50%§!"
 mod_planet_livestock_produces_mult: "Production des £job_livestock£§Ycheptels§! "
 trait_leader_second_chanced: "Seconde chance"
 trait_leader_second_chanced_desc: "Cette personnalité a échappé à une mort certaine grâce à sa biologie. Cela ne fonctionnera pas une deuxième fois."
 #################################
 #Evolutionary Predators Origin #
 #Written by Victor Haeggman  #
 #################################
 #Origin and Start of Game
 origin_evolutionary_predators: "Prédateurs évolutionnaires"
 origin_evolutionary_predators_desc: "§RATTENTION : bloque toute ascension à l'exception du chemin ['concept_mutation_ascension',mutagène].§!\n\nCette espèce a toujours chassé les créatures les plus uniques, guidée par un instinct qu'elle ne parvient pas à comprendre totalement. Elle possède la capacité rare d'intégrer les caractéristiques génétiques de ses proies et s'est ainsi élevée au rang de prédateur suprême sur son monde d'origine, absorbant tout avantage génétique. Aujourd'hui, sa faim l'entraîne dans l'immensité des étoiles."
 origin_tooltip_evolutionary_predators_effects: "- L'espèce a le trait ['concept_malleable_genes'].\n- Situation : ['concept_adaptive_evolution']\n- Le monde natal est une ['concept_genetic_soup',soupe génétique]."
 START_SCREEN_EVOLUTIONARY_PREDATORS_BASE: "Les [GetSpeciesNamePlural] ont toujours été des chasseurs. Nous cherchons des proies partout, et nous sommes capables de braver les conditions les plus extrêmes. Lorsque l'on est ce que l'on mange, les efforts ne sont jamais vains.\n\n"
 START_SCREEN_EVOLUTIONARY_PREDATORS_REGULAR: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Nous avons toujours su que nous étions façonnés par la chair de nos proies : chaque chasse et chaque victime nous ont rendus plus forts.\n\nNotre passé violent n'est pas un fardeau, mais ce qui nous définit. À travers le prisme de la science moderne, nous n'avons plus besoin de consommer nos proies pour évoluer. Un peu de matériel génétique suffit à tisser leur force en la nôtre.\n\nLa soif d'évolution brûle plus que jamais en nous, et grâce à la découverte [GetStartingDriveSingular_DuDel_FR], nous sommes prêts à parcourir la galaxie pour savourer tout ce qu'elle a à nous offrir."
 START_SCREEN_EVOLUTIONARY_PREDATORS_HIVE: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Notre intelligence collective a compris le potentiel de notre génétique : nous pouvons nous imprégner de l'essence de nos proies, les adapter et intégrer leurs forces dans notre collectif.\n\nNos instincts de prédateurs sommeillent toujours en nous, mais ils sont désormais équilibrés et nous savons les contrôler. Nous n'avons plus besoin de chasser pour évoluer ; nos laboratoires peuvent synthétiser n'importe quel matériel génétique et le diffuser dans notre conscience.\n\nGrâce à la découverte [GetStartingDriveSingular_DuDel_FR], nous sommes prêts à nous répandre dans la galaxie et à absorber tout ce qu'elle a à nous offrir."
 START_SCREEN_EVOLUTIONARY_PREDATORS_DEVOURING_SWARM: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Ce n'est qu'après avoir dévoré toute forme de vie sur [GetHomeWorldName] que nous avons réalisé notre erreur. Comment pourrions-nous désormais obtenir de nouvelles adaptations ? Nous avons alors regardé les étoiles.\n\nNous sommes les prédateurs ultimes. Là où d'autres chassent pour survivre, nous chassons pour atteindre la perfection.\n\nGrâce à la découverte [GetStartingDriveSingular_DuDel_FR], nous sommes prêts à chasser à nouveau. La galaxie est immense et regorge de nourriture."
 #Traits
 trait_malleable_genes: "Gènes malléables"
 trait_malleable_genes_desc: "§LCette espèce ne présente pas de caractéristiques et organes identifiables de manière aussi prédominante que les autres ; elle développe l'appendice le mieux adapté à la tâche. Cette flexibilité entraîne toutefois une certaine instabilité qui présente quelques inconvénients.§!"
 trait_malleable_genes_cant_modify: "§RLes espèces ayant ce trait ne peuvent pas être génétiquement modifiées§!\n$automodding_trait_tooltip_all$ Le trait §Y$trait_malleable_genes$§! choisit des modificateurs dans la ['concept_automodding_malleable',liste de traits à modification automatique pour les gènes malléables]"
 CANNOT_MODIFY_MALLEABLE_GENES_SPECIES: "$TRIGGER_FAIL$ La génétique instable de cette espèce empêche sa modification."
 concept_malleable_genes: "$trait_malleable_genes$"
 concept_malleable_genes_desc: "$trait_malleable_genes_cant_modify$"
 concept_automodding_malleable: "Liste de traits à modification automatique pour les gènes malléables"
 concept_automodding_malleable_desc: "- ['trait:trait_malleable_minerals']\n- ['trait:trait_malleable_energy']\n- ['trait:trait_malleable_food']\n- ['trait:trait_malleable_research']\n- ['trait:trait_malleable_unity']\n- ['trait:trait_malleable_forge']\n- ['trait:trait_malleable_trade']\n- ['trait:trait_malleable_ameneties']"
 concept_adaptive_evolution: "Évolution adaptative"
 concept_adaptive_evolution_desc: "La situation progresse à mesure que l'ADN d'autres formes de vie est consommé.\n§GÀ la fin :§!\n$t$- Sélection d'un nouveau trait d'espèce basé sur l'espèce récemment consommée\n§YProgresse en :§!\n$t$- Colonisant de nouvelles planètes\n$t$- Purgeant d'autres espèces ou en les conservant comme cheptel\n$t$- Conservant d'autres espèces de votre empire comme esclaves ou mieux\n$t$- Employant des personnalités aliens au Conseil\n$t$- Conservant des vassaux biologiques\n$t$- Concluant des pactes commerciaux en tant que mégacorporation\n$t$- Rencontrant des formes de vie aliens par le biais d'événements"
 concept_genetic_soup: "$genetic_soup$"
 concept_genetic_soup_desc: "$fresh_biosphere_tt$\n\n§L$genetic_soup_desc$§!"
 trait_malleable_minerals: "Griffes malléables"
 trait_malleable_minerals_desc: "§LLes griffes dures comme du diamant facilitent l'extraction des minéraux.§!"
 trait_malleable_energy: "Isolants malléables"
 trait_malleable_energy_desc: "§LUne épaisse couche isolante qui protège des blessures en cas d'accident, en particulier dans les environnements à haute énergie.§!"
 trait_malleable_food: "Charrues malléables"
 trait_malleable_food_desc: "§LUn appendice supplémentaire en forme de lame rigide qui accélère le travail du sol. Elle peut être adaptée à différents types de terrains, en faisant un outil idéal.§!"
 trait_malleable_research: "Cortex malléable"
 trait_malleable_research_desc: "§LBien qu'un cortex saturé soit quelque peu désagréable, il accélère considérablement la recherche de solutions et d'innovations.§!"
 trait_malleable_unity: "Organes sensoriels malléables"
 trait_malleable_unity_desc: "§LL'amélioration des organes sensoriels facilite la compréhension et le respect des autres points de vue. Avant de pouvoir réussir, il faut d'abord observer.§!"
 trait_malleable_forge: "Callosités malléables"
 trait_malleable_forge_desc: "§LLes callosités extra-épaisses sont inestimables lors de la manipulation de matières brûlantes ou corrosives.§!"
 trait_malleable_trade: "Phéromones malléables"
 trait_malleable_trade_desc: "§LDes phéromones adaptées à chaque situation peuvent être incroyablement utiles lors de négociations.§!"
 trait_malleable_ameneties: "Harmonie malléable"
 trait_malleable_ameneties_desc: "§LUne série d'orifices soigneusement calibrés permet à cette espèce de produire des sons apaisants et harmonieux en se déplaçant.§!"
 #Democratic Effects
 concept_genetic_electorate_effect: "Effet de l'électorat génétique"
 concept_genetic_electorate_effect_desc: "$trait_malleable_imperialist_effect$\n$trait_malleable_isolationist_effect$\n$trait_malleable_progressive_effect$\n$trait_malleable_prosperity_effect$\n$trait_malleable_supremacist_effect$\n$trait_malleable_technologist_effect$\n$trait_malleable_totalitarian_effect$\n$trait_malleable_traditionalist_effect$\n$trait_malleable_xenoist_effect$\n$trait_malleable_manifesti_effect$"
 trait_malleable_imperialist_effect: "Impact de la §Yfaction dominante§! (impérialiste) :\n$t$$mod_planet_jobs_alloys_produces_mult$ : §G+10%§!"
 trait_malleable_isolationist_effect: "Impact de la §Yfaction dominante§! (isolationniste) :\n$t$$mod_planet_jobs_unity_produces_mult$: §G+10%§!"
 trait_malleable_progressive_effect: "Impact de la §Yfaction dominante§! (progressiste) :\n$t$£happiness£Bonheur : §G+10%§!"
 trait_malleable_prosperity_effect: "Impact de la §Yfaction dominante§! (pléniciste) :\n$t$Prod. de £trade£§Yvaleur commerciale§! des £job£emplois : §G+20%§!"
 trait_malleable_supremacist_effect: "Impact de la §Yfaction dominante§! (suprémaciste) :\n$t$$mod_planet_jobs_specialist_produces_mult$: §G+5%§!\n$t$$mod_planet_jobs_ruler_produces_mult$: §G+5%§!"
 trait_malleable_technologist_effect: "Impact de la §Yfaction dominante§! (technologiste) :\n$t$£research£Recherche suscitée par les £job£emplois : §G+10%§!"
 trait_malleable_totalitarian_effect: "Impact de la §Yfaction dominante§! (totalitariste) :\n$t$Efficacité des £pop_cat_worker£ouvriers : §G+15%§!"
 trait_malleable_traditionalist_effect: "Impact de la §Yfaction dominante§! (traditionaliste) :\n$t$£housing£Logements nécessaires aux £pop£pops : §G-0.5§!"
 trait_malleable_xenoist_effect: "Impact de la §Yfaction dominante§! (xénoïste) :\n$t$Habitabilité : §G+15%§!"
 trait_malleable_manifesti_effect: "Impact de la §Yfaction dominante§! (manifestiste) :\n$t$Consommation de services par les £pop£pops : §G-1%§!"
 #Dictatorial Effects
 trait_ruler_apex_predator: "Prédateur suprême"
 trait_ruler_apex_predator_desc: "Les peuples animés par la prédation évolutionnaire veulent être gouvernés par le plus fort. Ce dirigeant suprême récolte les génomes des ennemis vaincus et adopte leur ruse et leur détermination pour se rapprocher de la perfection à chaque victoire."
 trait_ruler_apex_predator_tt: "Obtient des ['concept_apex_predator_effects',connaissances] supplémentaires grâce aux ['concept_apex_predator_victories',victoires]."
 concept_apex_predator_effects: "Connaissances de prédateur suprême"
 concept_apex_predator_effects_desc: "§YHumanoïdes§! : $mod_country_trade_produces_mult$§G+5%§!\n§YMammaliens§! : $MOD_LOGISTIC_GROWTH_MULT$§G+5%§!\n§YReptiliens§! : $MOD_SHIP_SHIELD_HARDENING_ADD$§G+5%§!\n§YAviaires§! : $MOD_SHIP_EVASION_ADD$§G5%§!\n§YArthropoïdes§! : $MOD_SHIP_ARMOR_HARDENING_ADD$§G+5%§!\n§YMolluscoïdes§! : $MOD_SHIP_SENSOR_RANGE_ADD$§G+1§!\n§YFongoïdes§! : $mod_country_food_produces_mult$ §G+5%§!\n§YPlantoïdes§! : $mod_country_energy_produces_mult$§G+5%§!\n§YLithoïdes§! : $mod_country_minerals_produces_mult$ §G+5%§!\n§YNécroïdes§! : $MOD_PLANET_CRIME_ADD$ §G-10§!\n§YAquatiques§! : $MOD_SHIP_HULL_ADD$§G+100§!\n§YToxoïdes§! : $mod_country_exotic_gases_produces_mult$ §G+10%§!\n§YThermophiles§! : $mod_country_alloys_produces_mult$§G+5%§!\n§YMachines§! : $mod_country_alloys_produces_mult$§G+5%§!"
 concept_apex_predator_victories: "Victoires de prédateur suprême"
 concept_apex_predator_victories_desc: "Le prédateur suprême se développe en :\n$t$Gagnant des §Yguerres§!\n$t$§YAssujettissant§! d'autres empires\n$t$Faisant échouer des résolutions de la §YCommunauté galactique§!"
 APEX_PREDATOR_GAINED_TITLE: "Prédateur suprême"
 MESSAGE_APEX_PREDATOR_GAINED: "Notre prédateur suprême, $LEADER|Y$, a vaincu l'espèce §Y[This.GetApexDefeatedSpecies]§! et s'est développé."
 #Hive Effects
 EVOPRED_TERRAFORM_STARTED_TITLE: "Terraformation lancée"
 MESSAGE_EVOPRED_TERRAFORM_STARTED: "Nous avons commencé à terraformer $PLANET|Y$ en un §Ymonde de la Conscience§!."
 decision_evopred_no_hive_world: "Limiter la croissance de la Conscience"
 decision_evopred_no_hive_world_desc: "Certains mondes ne sont pas faits pour rejoindre notre collectif."
 evopred_no_hive_world_tt: "Empêche notre §Yautorité§! de transformer ce monde en §Ymonde de la Conscience§!."
 decision_evopred_hive_world: "Permettre la croissance de la Conscience"
 decision_evopred_hive_world_desc: "Ce monde a été jugé digne de nous rejoindre."
 evopred_hive_world_tt: "Permet à notre §Yautorité§! de transformer ce monde en §Ymonde de la Conscience§!."
 #Situation
 evolutionary_predators_situation: "Évolution adaptative"
 evolutionary_predators_situation_type: "Évolution adaptative"
 evolutionary_predators_situation_desc: "Au contact d'autres espèces, nous analysons et disséminons leurs ['concept_evopred_genetic_insights',connaissances génétiques] uniques. Une fois ce processus achevé, nous évoluons et ajoutons un nouveau §Ytrait d'espèce§! positif et permanent à notre code génétique."
 evolutionary_predators_situation_monthly_change_tooltip: "L'avancée de cette §Ysituation§! dépend de notre consommation de ['concept_evopred_genetic_insights',connaissances génétiques]. Elle peut progresser plus rapidement en fonction de l'§Yapproche§!."
 evolutionary_predators_situation_outcome: "Nous obtiendrons un nouveau trait d'espèce permanent, basé sur le matériel génétique consommé. [Owner.GetConsumedGenes]"
