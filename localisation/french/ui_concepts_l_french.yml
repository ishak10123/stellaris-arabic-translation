l_french:
 ### CONCEPTS
 # Above each concept definition are instructions on usage, including an icon where one exists.
 #   Note that between the icon and the term there's a non-breaking space. When you copy the usage example, it will keep the non-breaking space.
 #   This is important to not get a line break between the icon and the concept.
 # Use a concept link with icon the first time a new concept is mentioned, then use §H without an icon for repeated uses.
 # Use §H with an icon the first time a concept is used withing its own description.
 # Use §H without an icon if the concept is used more than once.
 ui_available_tabs: "\n\nOnglets disponibles :\n"
 # View: £interface£ ['concept_empire_view'] or £interface£ §H$concept_empire_view$§!
 concept_empire_view: "Vue empire"
 concept_empire_view_desc: "Obtenez un aperçu de l'empire.$ui_available_tabs$[GetConceptEmpireAdvisor]"
 empire_view_tab_empire: "§H$EMPIRE$§!"
 empire_view_tab_demographics: "§H$DEMOGRAPHICS_TITLE$§!"
 empire_view_tab_advisor: "§H$GOVERNMENT_ADVISOR_TAB$§!"
 concept_empire_view_tabs_advisor: "$concept_empire_view_tabs_no_advisor$\n- $empire_view_tab_advisor$ : permet de sélectionner la voix du conseiller."
 concept_empire_view_tabs_no_advisor: "- $empire_view_tab_empire$ : affiche la liste des ['concept_authority',autorités], des ['concept_civics',civismes] et des ['concept_empire_modifiers',modificateurs d'empire].\n- $empire_view_tab_demographics$ : affiche les ['concept_pops',pops] et les modificateurs qui les affectent."
 # View: £interface£ ['concept_situation_log_view'] or £interface£ §H$concept_situation_log_view$§!
 concept_situation_log_view: "Vue journal de bord"
 concept_situation_log_view_desc: "La £interface£§Hvue journal de bord§! fournit un aperçu de la situation.$ui_available_tabs$$concept_situation_log_view_tabs$"
 situation_log_view_tab_situation_log: "§H$topbar_button_situation_name$§!"
 situation_log_view_tab_timeline: "§H$TIMELINE$§!"
 situation_log_view_tab_anomilies: "§H$ANOMALIES$§!"
 situation_log_view_tab_victory: "§H$VICTORIES$§!"
 concept_situation_log_view_tabs: "- $situation_log_view_tab_situation_log$ : affiche la liste des ['concept_event_chains',chaînes d'événements], des ['concept_special_projects',projets spéciaux] et des ['concept_first_contacts',premiers contacts].\n- $situation_log_view_tab_timeline$ : affiche les ['concept_milestones',étapes clés] et les ['concept_empire_focuses',objectifs de l'empire].\n- $situation_log_view_tab_anomilies$ : affiche les ['concept_anomalies',anomalies].\n- $situation_log_view_tab_victory$ : affiche le ['concept_scoreboard',tableau]."
 # View: £interface£ ['concept_government_view'] or £interface£ §H$concept_government_view$§!
 concept_government_view: "Vue gouvernement"
 concept_government_view_desc: "La §Hvue gouvernement§! permet de gérer le gouvernement.$ui_available_tabs$$concept_government_view_tabs$"
 government_view_tab_council: "§H$COUNCIL$§!"
 government_view_tab_factions: "§H$FACTIONS$§!"
 government_view_tab_policies_and_edicts: "§H$EDICTS_AND_POLICIES$§!"
 concept_government_view_tabs: "- $government_view_tab_council$ : permet de gérer le ['concept_council'] et les ['concept_agendas',priorités].\n- $government_view_tab_factions$ : affiche les ['concept_factions',factions].\n- $government_view_tab_policies_and_edicts$ : permet de sélectionner des ['concept_policies',politiques] et des ['concept_edicts',décrets]."
 # View: £interface£ ['concept_society_management_view'] or £interface£ §H$concept_society_management_view$§!
 concept_society_management_view: "Vue gestion sociétale" # Use this alias when referring to the concept
 concept_society_management: "$TRADITION_VIEW_TITLE$" # Left out 'View' to fit in the Databank UI
 concept_society_management_desc: "La §Hvue gestion sociétale§! permet de gérer les traditions.$ui_available_tabs$[GetConceptSocietyManagement]"
 society_management_view_tab_traditions: "§H$TRADITIONS$§!"
 society_management_view_tab_crisis: "§H$CRISIS_TAB$§!"
 concept_society_management_view_crisis: "$concept_society_management_view_no_crisis$\n- $society_management_view_tab_crisis$ : permet de suivre l'avancement de la ['concept_crisis',crise]."
 concept_society_management_view_no_crisis: "- $society_management_view_tab_traditions$ : permet de sélectionner des ['concept_traditions',traditions] et des ['concept_ascension_perks',atouts de l'ascension]."
 # View: £interface£ ['concept_technology_view'] or £interface£ §H$concept_technology_view$§!
 concept_technology_view: "Vue technologies"
 concept_technology_view_desc: "La £interface£§Hvue technologies§! permet d'afficher les avancées scientifiques d'un empire dans les domaines de la £physics£['concept_physics_research',recherche en physique], de la £society£['concept_society_research',recherche sociétale] et de la £engineering£['concept_engineering_research',recherche en ingénierie]. À partir de cette interface, vous pouvez sélectionner des options de recherche ou des priorités technologiques.\n\nDe nouvelles ['concept_technologies',technologies] sont présentées de manière semi-aléatoire à partir des options disponibles, ce qui reflète l'imprévisibilité de la recherche scientifique."
 # View: £interface£ ['concept_leaders_view'] or £interface£ §H$concept_leaders_view$§!
 concept_leaders_view: "Vue personnalités"
 concept_leaders_view_desc: "La £interface£§Hvue personnalités§! offre un aperçu de toutes les ['concept_leaders',personnalités] actives au sein de l'empire, ainsi que de leur rôle, ['concept_leader_traits',traits], niveau d'expérience et affectation actuelle. Depuis cette interface, vous pouvez recruter de nouvelles personnalités, réaffecter celles que vous possédez déjà ou les mettre en retraite."
 # View: £interface£ ['concept_species_view'] or £interface£ §H$concept_species_view$§!
 concept_species_view: "Vue espèces"
 concept_species_view_desc: "La £interface£§Hvue espèces§! répertorie de façon exhaustive toutes les ['concept_species',espèces] connues au sein de l'empire. À partir de cette interface, il est possible d'examiner et modifier les ['concept_species_traits',traits d'espèces] et de gérer les droits d'une population donnée, comme sa citoyenneté, son service militaire et ses ['concept_living_standards',conditions de vie].\n\nCe menu est essentiel pour superviser la complexité d'un empire aux espèces diverses, dans lequel la politique, la biologie et l'idéologie s'entrecroisent pour façonner une société galactique."
 # View: £interface£ ['concept_planets_and_sector_view'] or £interface£ §H$concept_planets_and_sector_view$§!
 concept_planets_and_sector_view: "Vue planètes et secteurs" # Use this alias when referring to the concept
 concept_planets_and_sector: "$PLANET_LIST$" # Left out 'View' to fit in the Databank UI
 concept_planets_and_sector_desc: "L'interface £interface£§Hplanètes et secteurs§! propose un menu centralisé pour visualiser toutes les £colony£['concept_colonies',colonies] et les £sector£['concept_sector',secteurs] d'un empire.\n\nC'est également à partir de cette interface que vous pourrez affecter les ['concept_governors',gouverneurs]."
 # View: £interface£ ['concept_expansion_planner'] or
 concept_expansion_planner: "$MENU_PANEL__EXPANSION_PLANNER_TITLE$"
 concept_expansion_planner_desc: "Le £interface£§Hplanificateur d'expansion§! liste les £planet£['concept_planets',mondes] pouvant être colonisés. Vous pouvez lancer une colonisation directement depuis cet écran ; un £colony_ship£['concept_colony_ship',vaisseau colonial] est alors automatiquement construit.\n\nLes £planet£§Hmondes§! concernés doivent avoir été reconnus par un £science_ship£['concept_science_ship',vaisseau scientifique] au préalable, et une enquête doit avoir été menée sur chaque £anomaly£['concept_anomaly',anomalie] qui s'y trouverait avant qu'ils ne soient ouverts à la colonisation.\n\nUne ['concept_starbase',base stellaire] doit aussi avoir été construite dans le système concerné, de manière à ce qu'il soit inclus dans l'espace de l'empire."
 # View: £interface£ ['concept_fleet_management_view'] or £interface£ §H$concept_fleet_management_view$§!
 concept_fleet_management_view: "Vue gestion des flottes" # Use this alias when referring to the concept
 concept_fleet_management: "$topbar_button_fleet_manager_name$" # Left out 'View' to fit in the Databank UI
 concept_fleet_management_desc: "Permet de concevoir des vaisseaux et de créer des flottes. Vous pouvez débloquer de nouvelles §Htailles de vaisseaux§! et de nouveaux ['concept_components',composants] en recherchant les ['concept_technologies',technologies] requises.$ui_available_tabs$[GetConceptFleetManagement]."
 fleet_management_view_tab_fleet_manager: "§H$FLEET_MANAGER_VIEW$§!"
 fleet_management_view_tab_ship_designer: "§H$SHIP_DESIGNER$§!"
 concept_fleet_management_view_space_fauna: "$concept_fleet_management_view_no_space_fauna$\n- §H$CREATURE_DESIGNER$§! : permet de créer des ['concept_space_fauna',créatures spatiales]."
 concept_fleet_management_view_no_space_fauna: "- $fleet_management_view_tab_fleet_manager$ : permet d'organiser vos ['concept_fleets',flottes].\n- $fleet_management_view_tab_ship_designer$ : permet de concevoir des ['concept_military_ships',vaisseaux militaires]."
 # View: £interface£ ['concept_contacts_view'] or £interface£ §H$concept_contacts_view$§!
 concept_contacts_view: "Vue contacts"
 concept_contacts_view_desc: "La £interface£§Hvue contacts§! vous fournit une liste de tous les empires, enclaves indépendantes et entités aliens connus. Depuis cette interface, vous pourrez initier un processus de ['concept_diplomacy',diplomatie] ou évaluer vos différentes relations. Ce menu est le point de départ essentiel pour toutes vos communications interstellaires et renseignements sur l'étranger."
 contacts_view_tab_contacts: "§H$topbar_button_contacts_name$§!"
 contacts_view_tab_agreements: "§H$AGREEMENTS_LIST_TITLE$§!"
 contacts_view_tab_shroud: "§H$THE_SHROUD_TITLE$§!"
 concept_contacts_view_tabs: "- $contacts_view_tab_contacts$ : permet de mener des ['concept_diplomacy',actions diplomatiques].\n- $contacts_view_tab_agreements$ : permet de gérer les ['concept_subject_agreements',contrats de dépendance].\n- $contacts_view_tab_shroud$ : permet de gérer l'['concept_psionic_ascension',ascension psionique]"
 # View: £interface£ ['concept_discoveries_view'] or £interface£ §H$concept_discoveries_view$§!
 concept_discoveries_view: "Vue découvertes"
 concept_discoveries_view_desc: "La £interface£§Hvue découvertes§! inventorie tous les objets et phénomènes significatifs observés dans la galaxie, y compris les ['concept_relics',reliques], artefacts anciens et autres curiosités galactiques importantes.$ui_available_tabs$[GetConceptDiscovery]"
 discoveries_view_tab_relics: "§H$relics$§!"
 discoveries_view_tab_collection: "§H$COLLECTION$§!"
 discoveries_view_tab_vivarium: "§H$VIVARIUM$§!"
 discoveries_view_tab_astral_actions: "§H$ASTRAL_ACTIONS$§!"
 concept_discovery_view_base: "- $discoveries_view_tab_relics$ : permet de gérer les ['concept_relics',reliques]"
 concept_discovery_view_base_ancrel: "$concept_discovery_view_base$ et les ['concept_minor_artifacts',artefacts mineurs]."
 concept_discovery_view_base_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$ : affiche les ['concept_specimens',spécimens].\n- $discoveries_view_tab_vivarium$ : permet de faire naître des ['concept_space_fauna',créatures spatiales]."
 concept_discovery_view_base_ancrel_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$ : affiche les ['concept_specimens',spécimens] et les ['concept_minor_artifacts',artefacts mineurs].\n- $discoveries_view_tab_vivarium$ : permet de faire naître des ['concept_space_fauna',créatures spatiales]."
 concept_discovery_view_base_astral: "$concept_discovery_view_base$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_astral: "$concept_discovery_view_base_ancrel$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_archive_astral: "$concept_discovery_view_base_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_archive_astral: "$concept_discovery_view_base_ancrel_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_astral: "- $discoveries_view_tab_astral_actions$ : permet d'activer des ['concept_astral_actions',actions astrales]."
 # View: £interface£ ['concept_claims_view'] or £interface£ §H$concept_claims_view$§!
 concept_claims_view: "Vue revendications"
 concept_claims_view_desc: "La £interface£§Hvue revendications§! affiche toutes les ['concept_claims',revendications] territoriales d'un empire. Le mode diplomatique de la ['concept_galaxy_map',carte de la galaxie] offre un aperçu clair des systèmes disputés et des poudrières potentielles pour les futurs conflits."
 # View: £interface£ ['concept_market_view'] or £interface£ §H$concept_market_view$§!
 concept_market_view: "Vue marché"
 concept_market_view_desc: "La £interface£§Hvue marché§! offre un cadre pour le commerce interstellaire, l'achat et la vente de ressources ou la réalisation de transactions mensuelles récurrentes."
 # View: £interface£ ['concept_colony_view'] or £interface£ §H$concept_colony_view$§!
 concept_colony_view: "Vue colonie"
 concept_colony_view_desc: "La £interface£§Hvue colonie§! permet de gérer une £colony£['concept_colony',colonie]. Elle peut être utilisée sur les ['concept_habitats',habitats] ou £planet£['concept_planets',mondes] inhabités colonisables pour lancer le processus de §Hcolonisation§!.$ui_available_tabs$$concept_colony_view_tabs$"
 colony_view_tab_planet_summary: "§H$PLANET_TAB$§!"
 colony_view_tab_management: "§H$MANAGEMENT_TAB$§!"
 colony_view_tab_population: "§H$POPULATION_TAB$§!"
 colony_view_tab_armies: "§H$GROUND_COMBAT_TAB$§!"
 colony_view_tab_holdings: "§H$CORPORATE_TAB$§!"
 concept_colony_view_tabs: "- $colony_view_tab_planet_summary$ : fournit une vue d'ensemble des £district£['concept_districts',districts] et £building£['concept_buildings',bâtiments] de la colonie, et indique le ['concept_governor',gouverneur] éventuellement assigné. Vous pouvez définir une ['concept_designation',désignation] ou activer l'['concept_planet_automation',automatisation planétaire] depuis cet onglet.\n- $colony_view_tab_management$ : indique les particularités du monde et les changements de population. Vous pouvez adopter des ['concept_decisions',décisions], procéder à l'['concept_planetary_ascension',ascension planétaire] ou lancer une ['concept_terraforming',terraformation] depuis cet onglet.\n- $colony_view_tab_population$ : présente la population de la colonie répartie en catégories d'£job£['concept_jobs',emplois].\n- $colony_view_tab_armies$ : affiche les forces au sol de la colonie et son niveau de ['concept_devastation',dévastation].\n- $colony_view_tab_holdings$ : fournit un aperçu de toutes les ['concept_overlord_holdings',possessions de la suzeraine] sur la colonie."
 # View: £interface£ ['concept_starbase_view'] or £interface£ §H$concept_starbase_view$§!
 concept_starbase_view: "Vue base stellaire"
 concept_starbase_view_desc: "La £interface£§Hvue base stellaire§! permet de gérer une ['concept_starbase',base stellaire].$ui_available_tabs$$concept_starbase_view_tabs$"
 starbase_view_tab_command: "§H$STARBASE_STARBASE_TAB$§!"
 starbase_view_tab_defenses: "§H$STARBASE_DEFENSES_TAB$§!"
 starbase_view_tab_armies: "§H$MACRO_BUILDER_TAB$§!"
 starbase_view_tab_shipyard: "§H$STARBASE_SHIPYARD_TAB$§!"
 concept_starbase_view_tabs: "- $starbase_view_tab_command$ : fournit un aperçu des §Hmodules§! et §Hbâtiments§! de la base stellaire. Il permet également de l'améliorer une fois la ['concept_technology',technologie] requise découverte.\n- $starbase_view_tab_defenses$ : affiche les ['concept_defense_platforms',plateformes de défense] et vous permet d'en construire davantage en cliquant sur un modèle.\n- $starbase_view_tab_armies$ : permet de recruter un grand nombre d'§Harmées d'assaut§!. Les armées sont recrutées sur les £colony£['concept_colonies',colonies] disponibles dans le £sector£['concept_sector',secteur], et sont ensuite soit positionnées sur la base stellaire soit ajoutées à une §Harmée§! pouvant être §Hralliée§!.\n- $starbase_view_tab_shipyard$ : permet de construire des ['concept_civilian_ships',vaisseaux civils] et ['concept_military_ships',militaires]."
 # View: £interface£ ['concept_system_map'] or £interface£ §H$concept_system_map$§!
 concept_system_map: "Carte du système"
 concept_system_map_desc: "La £interface£§Hcarte du système§! présente une vue détaillée d'un système stellaire individuel, sur laquelle figure les ['concept_celestial_objects',objets célestes], ['concept_civilian_space_stations',stations spatiales civiles], ['concept_fleets',flottes] et l'infrastructure orbitale. Elle permet une gestion précise des constructions, de la colonisation, des opérations de combat et de l'activité scientifique au sein du système."
 # View: £interface£ ['concept_galaxy_map'] or £interface£ §H$concept_galaxy_map$§!
 concept_galaxy_map: "Carte de la galaxie"
 concept_galaxy_map_desc: "La £interface£§Hcarte de la galaxie§! offre un aperçu stratégique de la galaxie connue, permettant de visualiser les £system£['concept_systems',systèmes], frontières de l'['concept_empire',empire] et ['concept_hyperlanes',hyperlignes]. Elle joue le rôle d'interface primaire pour l'exploration, l'expansion et la coordination interstellaire."
 # View: £interface£ ['concept_navigation_bar'] or £interface£ §H$concept_navigation_bar$§!
 concept_navigation_bar: "Barre de navigation"
 concept_navigation_bar_desc: "La £interface£§Hbarre de navigation§! est située à gauche de l'écran.\n\nElle peut être configurée de manière à rester réduite ou à se développer lorsque vous interagissez avec.\n\nEn mode développé, vous pouvez réorganiser les différents menus. Cela modifie également le raccourci clavier qui ouvre chacun d'entre eux."
 # View: £interface£ ['concept_resource_bar'] or £interface£ §H$concept_resource_bar$§!
 concept_resource_bar: "Barre de ressources"
 concept_resource_bar_desc: "La £interface£§Hbarre de ressources§! est située en haut de l'écran.\n\nElle répertorie différentes §Hressources§! comme l'£energy£['concept_energy',énergie] et d'autres métriques comme la £trade_value£['concept_trade',valeur commerciale], la ['concept_research',recherche], la ['concept_starbase_capacity',capacité en bases stellaires] et la ['concept_naval_capacity',capacité navale].\n\nSur la droite se trouvent les paramètres de §Hvitesse de jeu§! vous permettant d'accélérer, de ralentir et de suspendre le temps.\n\nSous la §Hvitesse de jeu§! se trouve le §Hlecteur musical§!."
 # View: £interface£ ['concept_outliner'] or £interface£ §H$concept_outliner$§!
 concept_outliner: "Gestionnaire"
 concept_outliner_desc: "Le £interface£§Hgestionnaire§! permet un accès rapide à des éléments essentiels de l'empire, parmi lesquels les £colony£['concept_colonies',colonies], ['concept_fleets',flottes] et ['concept_civilian_space_stations',stations spatiales civiles]. Personnalisable, cette interface offre une navigation rapide de façon à superviser en temps réel les mises à jour de statut et le contrôle direct sur les opérations cruciales."
