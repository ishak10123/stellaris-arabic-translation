 #Specimens #
 #############
 acidic_spores: "Spores acidiques"
 acidic_spores_desc_short: "Flore de [from.GetName] qui a développé ce mécanisme de défense pour dissuader les espèces herbivores dominantes"
 acidic_spores_desc_details: "Ce gaz très corrosif a empoisonné de vastes régions de la planète, les rendant inhabitables. Une version moins puissante a depuis été synthétisée en pesticide efficace."
 adakkaria_propaganda_poster: "Affiche de propagande d'adAkkaria"
 adakkaria_propaganda_poster_desc_short: "Affiche plastifiée proclame la gloire de la Convention d'adAkkaria"
 adakkaria_propaganda_poster_desc_details: "Les citoyens qui y sont représentés semblent sûrs d'eux, fiers et valeureux. Leurs tentacules s'élèvent vers le ciel, comme s'ils voulaient s'emparer d'un avenir dont ils sont les seuls à décider. D'en haut, de vagues silhouettes d'êtres mécaniques aux masques décorés les observent. Le slogan est le suivant : « La Convention de bienfaisance d'adAkkaria rend fiers ses bienfaiteurs. »"
 advisor_core: "Noyau de conseiller"
 advisor_core_desc_short: "Seule partie encore intacte après le démontage d'un drone-conseiller complexe trouvé dans une déchirure astrale"
 advisor_core_desc_details: "Le noyau contient une énorme quantité d'informations triviales, mais la complexité de son architecture logicielle a donné lieu à une série d'innovations dans la recherche informatique.\n[explorer.GetAdvisorCoreAdditionnalQuote]"
 advisor_core_desc_tutorial_on: "\nVous n'envisageriez pas de m'éteindre. N'est-ce pas ?\n"
 advisor_core_desc_tutorial_off: "§LSouhaitez-vous réactiver le didacticiel ?§!"
 alien_brain_scans: "Scans cérébraux aliens"
 alien_brain_scans_desc_short: "Schémas neuraux d'une espèce alien disparue depuis longtemps et découverts dans un abri de [fromfrom.GetName]"
 alien_brain_scans_desc_details: "Cette civilisation oubliée a stocké ces données dans l'espoir de transférer sa conscience vers un espace numérique pour survivre éternellement face à une catastrophe planétaire. Beaucoup de ces scans sont accompagnés de notes sur les personnalités de chacun, y compris des témoignages de leurs proches."
 alien_dining_set: "Service de table en jade"
 alien_dining_set_desc_short: "Élégant service de table découvert préservé à l'intérieur d'un astéroïde artificiel"
 alien_dining_set_desc_details: "De complexes techniques artisanales ont été utilisées pour façonner, cuire et vernisser la vaisselle. Des incohérences mineures dans sa structure laissent supposer un processus de création artisanal. L'analyse des matériaux démontre que le propriétaire de ce magnifique service de table suivait un régime alimentaire très acide, principalement à base de fruits composés de drupéoles."
 alien_jewelry: "Bijoux aliens"
 alien_jewelry_desc_short: "Collection de magnifiques bijoux aliens fabriqués à partir d'un matériau inconnu"
 alien_jewelry_desc_details: "Mélange de gemmes à base de silicate et de carbone, soigneusement serties dans des alliages de platine, ces pierres varient fortement en termes d'origine et de couleur. Certains bijoux présentent des gravures sur les parties intérieures, mais nous n'avons aucun moyen de les traduire."
 alien_toy: "Jouet en plastique"
 alien_toy_desc_short: "Simple jouet retrouvé dans les ruines d'une usine désaffectée"
 alien_toy_desc_details: "Fragilisé et abîmé avec l'âge, cet objet fait partie des milliers à avoir été produits en série à partir de quelques moules en acier. Il ne semble pas avoir d'autre but que la décoration et le divertissement."
 altar_to_the_elder_one: "Autel dédié à l'Aïeul"
 altar_to_the_elder_one_desc_short: "Machine surnaturelle découverte dans une ancienne chambre sacrée"
 altar_to_the_elder_one_desc_details: "Même abandonnée, elle émet encore une aura singulière d'énergie psionique incommensurable. Certains affirment l'entendre encore murmurer pour inciter les âmes égarées à retourner à [cosmic_horror_location.GetName]."
 aluminium_plaque: "Plaque d'aluminium"
 aluminium_plaque_desc_short: "Simple plaque retrouvée sur un drone lancée par une civilisation mammalienne pré-PRL"
 aluminium_plaque_desc_details: "D'étranges formes géométriques et des images grossières de leur espèce sont gravées sur la surface. Le savoir-faire est assez médiocre, mais cette civilisation a dû faire des efforts considérables pour lancer cet objet dans l'espace."
 ammoniaphytus: "Ammoniaphytus"
 ammoniaphytus_desc_short: "Les niveaux d'ammoniaque aqueux des tissus de cette plante seraient dangereux pour la plupart des formes de vie carbonées"
 ammoniaphytus_desc_details: "L'atmosphère immédiate entourant son confinement paralyse pendant quelques secondes la plupart des organismes conscients. L'existence même d'un tel spécimen a suscité de nombreux débats chez nos plus grands chercheurs, et une curiosité malveillante chez d'autres."
 amoeba_flagella_gland: "Glande de flagelle d'amibe"
 amoeba_flagella_gland_desc_short: "Organe reproducteur secondaire d'une amibe spatiale"
 amoeba_flagella_gland_desc_details: "Cet organe produit des organismes indépendants appelés « flagelles » qui s'emparent de leur proie quand l'amibe cherche de la nourriture. Les flagelles se développent rapidement, mais des instabilités génétiques les empêchent d'atteindre leur pleine maturité. Afin de produire une véritable progéniture, les amibes spatiales injectent une enzyme spécialisée dans les flagelles, ce qui provoque une métamorphose rapide. Le processus de sélection de cette méthode de reproduction reste inconnu."
 ancient_bust: "Buste antique"
 ancient_bust_desc_short: "Sculpture en graphite d'un buste d'une espèce consciente inconnue"
 ancient_bust_desc_details: "Les gravures sur la base indiquent que cet individu était tenu en haute estime par les siens."
 ancient_kinetic_launcher: "Lanceur cinétique antique"
 ancient_kinetic_launcher_desc_short: "Forme très basique d'arme à projectiles qui utilise une sorte de propulseur pour lancer un objet via un court cylindre métallique"
 ancient_kinetic_launcher_desc_details: "La précision d'un tel dispositif devait être au mieux approximative."
 ancient_laser_pointer: "Pointeur laser antique"
 ancient_laser_pointer_desc_short: "Projecteur de rayons extrêmement précis et capable de marquer des corps célestes à des distances galactiques"
 ancient_laser_pointer_desc_details: "Abandonné par les Bienfaiteurs, ce laser ultraviolet est la preuve concrète de l'existence d'une civilisation aujourd'hui disparue. Contre toute attente, il fonctionne encore."
 ancient_nanites: "Nanites antiques"
 ancient_nanites_desc_short: "Nanites extrêmement polyvalentes découvertes sur [nanite_swarm_planet.GetName], où elles ont été livrées il y a des milliers d'années par une civilisation oubliée"
 ancient_nanites_desc_details: "En l'absence de fonctions de sécurité, il n'y avait aucune crainte que des personnes trouvent et reconfigurent ces appareils. Après les avoir utilisés pour terraformer la planète en un environnement plus habitable, les [owner.GetSpeciesNamePlural] ont pris possession de l'essaim, bien que les méthodes de sa construction initiale restent un mystère."
 ancient_nuclear_armament: "Armement nucléaire antique"
 ancient_nuclear_armament_desc_short: "Bombe à hydrogène de 35 mégatonnes découverte sur [root.GetName], où elle a été abandonnée après la guerre qui a décimé les habitants de la planète"
 ancient_nuclear_armament_desc_details: "Heureusement, le désarmement de cette bombe archaïque était encore possible. Le texte peint sur l'arme a été analysé par nos traducteurs en le comparant à d'autres artefacts retrouvés sur la planète. Il serait donc écrit « Le plus grand des garçons ». Bizarre."
 ancient_political_memoir: "Mémoires d'une ancienne politicienne"
 ancient_political_memoir_desc_short: "Biographie d'une ancienne politicienne galactique"
 ancient_political_memoir_desc_details: "Leez'Terus était gouverneure de Sarthana, une petite colonie de l'ancienne civilisation du Conservatoire d'Harworth. Figure mineure de la faction totalitariste Liberté des entreprises, elle était réputée pour son opposition ferme à l'importation de denrées alimentaires en provenance de puissances galactiques étrangères. Suite à une série de démissions sur fond de scandale, elle prit la tête du Conservatoire d'Harworth, mais sa déclaration en faveur de la rénovation du beffroi d'Harworth manqua de provoquer une véritable révolte dans la capitale, et elle fut rapidement remplacée par un autre membre de la faction Liberté des entreprises."
 ancient_rift_sphere: "Sphère astrale antique"
 ancient_rift_sphere_desc_short: "Ancien vaisseau spatial qui a traversé une déchirure astrale avant de s'écraser sur [from.planet.GetName]"
 ancient_rift_sphere_desc_details: "C'est à bord de ce vaisseau sphérique assemblé à la hâte, et retrouvé enfoui sous la surface de la planète depuis des siècles, que les ancêtres des [controller.owner_main_species.GetNamePlural] ont débarqué dans cette galaxie. La plupart de ses matériaux ont déjà été récupérés, mais sa structure de base est restée intacte."
 ancient_satellite: "Satellite antique"
 ancient_satellite_desc_short: "Satellite délabré offert en guise de « cadeau » par d'anciens drones mécaniques de [root.GetName]"
 ancient_satellite_desc_details: "Ses banques de données sont en grande partie corrompues, mais les relevés de recensement et les registres de naissances sont encore intacts. Ces informations sur le comportement de la population de la planète ont permis de comprendre comment les [owner.GetSpeciesNamePlural] ont pu se développer durablement. Leur fonctionnalité partielle après toutes ces années témoigne de leur robustesse."
 ancient_sensor: "Capteur de chaleur antique"
 ancient_sensor_desc_short: "Capteur dissimulé au sein d'un astéroïde qui servait à générer des cartes thermiques de la galaxie pour transférer ces données à un ancien empire lointain"
 ancient_sensor_desc_details: "Il est capable de suivre les variations de température au sein de systèmes individuels, et de suivre le mouvement des vaisseaux grâce au rayonnement infrarouge. Cependant, son objectif principal consistait certainement à prévoir et à mesurer les tempêtes solaires et la formation de taches solaires."
 asteroid_fossils: "Fossiles retrouvés"
 asteroid_fossils_desc_short: "Fossiles aquatiques datant de plusieurs millions d'années, selon la datation au carbone"
 asteroid_fossils_desc_details: "Il s'agit de restes minéralisés d'invertébrés aquatiques à coquille, dotés d'un tube creux unique qui devait leur servir à s'ancrer dans les cheminées hydrothermales."
 ballad_of_the_sable_knight: "Ballade du chevalier Sable"
 ballad_of_the_sable_knight_desc_short: "§dLe chevalier Sable arriva la veille d'un tournoi§!"
 ballad_of_the_sable_knight_desc_details: "§d\nVêtu de son étrange armure, il était prêt pour l'exploit.\nIl défia notre champion à la loyale,\nEt très vite commença le combat final.\nComme prévu, notre champion ne manquait pas d'atouts,\nMais le chevalier lui rendait coup pour coup.\nLe chevalier rendit les armes avec honneur,\nEt repartit dans son trou de ver à contrecoeur...§!"
 beauty_of_planet: "Beauté de [From.GetName]"
 beauty_of_planet_desc_short: "Projets de terraformation sur [From.GetName], dont l'élégance et la précision sont un vrai plaisir pour les sens"
 beauty_of_planet_desc_details: "Un système d'algorithmes fut utilisé pour analyser en détail et améliorer les écosystèmes naturels de la planète grâce à une culture raisonnée. En ne sélectionnant que les fleurs les plus vives, les fruits les plus nutritifs, et les herbes les plus douces, le paysage fut transformé en une véritable utopie. Si seulement la nature pouvait être aussi efficace..."
 black_hole_chromatic_anomaly: "Anomalie chromatique de trou noir"
 black_hole_chromatic_anomaly_desc_short: "Image en apparence fantastique capturée au coeur du système de [From.solar_system.GetName]"
 black_hole_chromatic_anomaly_desc_details: "En raison de la composition chimique du disque d'accrétion de [From.GetName], le trou noir de ce système a subi une aberration chromatique, produisant ainsi localement un effet de lumière kaléidoscopique. Un spectacle unique dans l'espace."
 black_needle_ceremonial_sword: "Épée cérémonielle de l'Aiguille Noire"
 black_needle_ceremonial_sword_desc_short: "Arme soigneusement fabriquée et portée par Plume d'Argent, le fondateur des pirates de l'Aiguille Noire"
 black_needle_ceremonial_sword_desc_details: "Commandée grâce aux bénéfices du premier gros coup de l'organisation criminelle, elle fut érigée comme un symbole de statut et n'eut aucune utilité pratique au combat. Fabriquée à partir d'un alliage d'acier et de titane, cette épée porte la phrase « Percez le voile » le long de sa garde."
 black_needle_ledger: "Registre de l'Aiguille Noire"
 black_needle_ledger_desc_short: "Registre recensant tous les accords conclus par les pirates de l'Aiguille Noire au cours des milliers d'années dans notre galaxie"
 black_needle_ledger_desc_details: "Chaque transaction, rançon, pot-de-vin est daté et répertorié avec soin. En tant qu'historique écrit des trafics illicites intergalactiques, il offre un aperçu sans précédent des tendances économiques du marché noir au fil du temps."
 burnt_migratory_trees: "Écorce vivante"
 burnt_migratory_trees_desc_short: "Restes calcinés de grandes plantes mobiles capables d'un comportement migratoire coordonné"
 burnt_migratory_trees_desc_details: "Ces plantes ne possédaient qu'une forme basique d'intelligence, mais pouvaient engloutir des colonies entières. Nous avons depuis découvert qu'une espèce d'insectes parasites peuplait leur écorce, servant de centres sensoriels et de communication en échange d'un abri et d'une sève nutritive. Cette relation symbiotique est aussi étonnante que mortellement efficace."
 captain_ness_body: "Corps de la capitaine Ness"
 captain_ness_body_desc_short: "Corps préservé de la capitaine Saanda Ness, ancienne pirate de renom"
 captain_ness_body_desc_details: "Il y a plus de 5 000 ans, elle était le « fléau de l'hyperespace », volant la plupart des puissances galactiques et amassant un trésor inestimable. Plus tard, elle transféra sa conscience dans un vaisseau mécanique et construisit une grande chambre forte pour y stocker sa biographie. Voici tout ce qu'il reste de sa forme originale."
 captain_ness_logbook: "Journal de la capitaine Ness"
 captain_ness_logbook_desc_short: "Collection non chronologique des entrées du journal retrouvé dans la planque utilisée par la capitaine Ness et son compagnon Smeegibb, d'anciens pirates"
 captain_ness_logbook_desc_details: "Les entrées sont réparties à travers un grand nombre d'appareils, et rédigées de façon désordonnée sur une période indéterminée de plusieurs années. Bien qu'elles soient considérées comme une source peu fiable, de nombreuses situations décrites ici peuvent être vérifiées auprès des autorités externes."
 carnivorous_megaflora: "Mégaflore carnivore"
 carnivorous_megaflora_desc_short: "Plante prédatrice découverte sur [from.GetName] pouvant engloutir un adulte de l'espèce [owner.GetSpeciesName]"
 carnivorous_megaflora_desc_details: "Cette plante carnivore a évolué pour attirer principalement les créatures volantes, après avoir causé la disparition d'une grande partie de la faune terrestre d'origine. De nombreux spécimens s'élèvent au-dessus de la canopée et servent de perchoirs pour les organismes qui s'y posent."
 castaway_robot: "Robot naufragé"
 castaway_robot_desc_short: "Machine humanoïde abandonnée retrouvée en train de flotter dans l'espace"
 castaway_robot_desc_details: "Quelques images floues ont pu être extraites de ses banques de données détériorées : un vaste panorama au coeur d'un système stellaire trinaire, un vaisseau triangulaire, et un paysage soudé à partir de rebuts de machines. Malheureusement, aucune coordonnée spécifique n'a pu être extraite de ses métadonnées."
 cenotaph_display: "Images de cénotaphes"
 cenotaph_display_desc_short: "Images des cénotaphes retrouvés sur [fromfrom.GetName]"
 cenotaph_display_desc_details: "Bien que nous n'ayons pas encore réussi à en identifier les architectes, ils devaient avoir une bonne raison pour répartir ces incroyables monolithes à la surface d'une planète inhabitée. Ces sculptures en pierre représentent l'ascension et la chute d'une civilisation entière, ainsi que les créatures ailées formées au combat. Ces redoutables créatures au ventre flamboyant devaient inévitablement briser leurs chaînes pour se retourner contre leurs maîtres. Impossible de savoir toutefois s'il s'agit d'une parabole ou d'un fait historique."
 centrifugal_container: "Conteneur centrifuge à grande vitesse"
 centrifugal_container_desc_short: "Dispositif orbital à grande vitesse et au fonctionnement perpétuel, conçu pour préserver des produits chimiques fragiles et découvert près de [from.GetName]"
 centrifugal_container_desc_details: "Une fois qu'il a atteint une vitesse appropriée, ce dispositif est capable d'empêcher les éléments qu'il contient de réagir entre eux, tant que l'orbite de la planète reste inchangée. Son contenu d'origine a depuis été remplacé par des matériaux d'exposition."
 cetana_love: "Amour de Cetana"
 cetana_love_desc_short: "Vaste recueil de connaissances issues des banques de données de Cetana"
 cetana_love_desc_details: "Il a été offert à la [this.GetName] pour faire part du désir de la reine synthétique de guider toute vie intelligente vers le « salut »."
 chambered_clay_pot: "Pot en argile à compartiments"
 chambered_clay_pot_desc_short: "Pot en argile divisé en deux compartiments"
 chambered_clay_pot_desc_details: "On pense qu'un des compartiments servait à la préservation des denrées alimentaires, tandis que l'autre contenait une sorte de système de réfrigération primitif."
 claw_of_the_trickster: "Griffe du Trompeur"
 claw_of_the_trickster_desc_short: "Trophée récupéré sur une créature appelée le « Trompeur »"
 claw_of_the_trickster_desc_details: "Cette puissante créature trompeuse possédait d'incroyables pouvoirs psioniques qui lui permettaient d'invoquer des animaux, de créer des illusions, et de tirer des rayons d'énergie concentrée. On pense que chaque griffe se comportait de façon indépendante."
 confessions_benefactors: "Confessions des Bienfaiteurs"
 confessions_benefactors_desc_short: "Enregistreur contenant de terribles vérités sur l'ancienne civilisation des Bienfaiteurs"
 confessions_benefactors_desc_details: "Face à une menace galactique inconnue, ils utilisèrent leur technologie avancée pour procéder à un « estompage cérébral » sur [controller.GetHomeWorldName], afin de transformer la société industrielle des [controller.GetNamePlural] en un essaim de simplets inoffensifs. Cette décision a été prise en pensant que la menace galactique ne gaspillerait pas de munitions ni de temps sur une société aussi inintéressante. En fin de compte, cette mesure contestable est certainement ce qui a permis aux [controller.GetNamePlural] de continuer à survivre comme ils le font aujourd'hui, débout sur les épaules de géants."
 coprolite: "Coprolithe"
 coprolite_desc_short: "Morceau de matière fécale fossilisée de la taille d'un astéroïde datant d'environ un milliard d'années"
 coprolite_desc_details: "L'analyse génétique indique qu'une entité spatiale inconnue de grande taille aurait produit cet impressionnant spécimen. Nous avons eu la confirmation que le régime alimentaire de cette créature était principalement composé de minéraux rares et d'organismes à base de silicium. Cet objet détient le record galactique du plus gros excrément connu à ce jour."
 cosmic_diamond_fragment: "Fragment de diamant cosmique"
 cosmic_diamond_fragment_desc_short: "Fragment éjecté d'une étoile mourante qui s'est cristallisé depuis, et découvert dans le système de [from.solar_system.GetName]"
 cosmic_diamond_fragment_desc_details: "Ce diamant cosmique s'est formé sous la pression extrême d'un noyau stellaire, se refroidissant si progressivement qu'il a formé une structure cristalline complexe mais stable. Ce fragment rare contient des couches plasmiques uniformes d'hélium et d'oxygène piégées à sa surface."
 crimson_nimkips: "Nimkips cramoisis"
 crimson_nimkips_desc_short: "Espèce de plantes semi-conscientes qui collaborent en grand nombre pour réussir des tours de force qui seraient autrement impossibles pour leur taille"
 crimson_nimkips_desc_details: "Loin de la sécurité de leur groupe, ces créatures sont souvent dévorées par des prédateurs en raison de leur excellente valeur nutritionnelle. De nature docile et obéissante, les Nimkips sont de très bons animaux de compagnie. Celui-ci est conservé en vie et en sécurité dans un enclos imitant son habitat naturel. NE PAS TAPER SUR LA VITRE."
 crystal_core: "Noyau cristallin"
 crystal_core_desc_short: "Groupe de nerfs prélevés sur une entité cristalline"
 crystal_core_desc_details: "Ce cristal émet une fréquence constante, et ce quelle que soit la température. Dans les environnements riches en minéraux, de nouveaux cristaux émanent de cette masse centrale et leurs structures se modifient en réaction aux stimuli de l'environnement. En nous basant sur ce comportement, nous pouvons affirmer que les entités individuelles se distinguent les unes des autres en raison de deux facteurs : les caractéristiques de la fréquence de leur noyau et la variation des facteurs environnementaux."
 crystal_nest_fragments: "Fragments de nid de cristal"
 crystal_nest_fragments_desc_short: "Cristaux assemblés par une créature spatiale à l'aide d'une pression immense pour former un abri, et découverts à l'intérieur d'un astéroïde à la dérive"
 crystal_nest_fragments_desc_details: "À partir des traces trouvées dans leur composition, nous en avons déduit que l'organisme source consommait des minéraux fortement réactifs pour extraire l'énergie de leurs liaisons chimiques instables, ne laissant que des cristaux inertes mais durables pouvant concentrer la lumière en un point précis."
 crystal_sphere_fragments: "Fragments de sphère cristalline"
 crystal_sphere_fragments_desc_short: "Fragments d'une énorme sphère cristalline apparue sur [target.GetName]"
 crystal_sphere_fragments_desc_details: "Cet objet mystérieux a été vu comme une menace importante, et rapidement détruit avant de pouvoir mettre à exécution son plan inconnu. Même si ses intentions ne seront peut-être jamais connues, sa destruction était la décision la plus logique dans l'intérêt de la sécurité de la galaxie."
 crystallized_cutholoid_eye: "OEil de cutholoïde cristallisé"
 crystallized_cutholoid_eye_desc_short: "L'oeil du cutholoïde est capable de résister à des températures et des pressions extrêmes"
 crystallized_cutholoid_eye_desc_details: "La cause de sa cristallisation reste floue, mais elle ne semble pas faire partie du processus naturel de son cycle de mue."
 cult_pendant: "Pendentif de la [cult_name.GetName]"
 cult_pendant_desc_short: "Symbole sculpté dans une pierre semi-précieuse et confisqué au culte de la [cult_name.GetName] de [owner.GetName]"
 cult_pendant_desc_details: "Les rapports d'interrogatoire ont révélé que les membres du culte portaient des pendentifs en fonction de leur rang dans la hiérarchie du groupe. Les nouvelles recrues façonnaient leur propre symbole en utilisant de l'argile, tandis que les plus anciens commandaient des pièces détaillées en métal précieux."
 #this = ship / fromfrom = planet
 cunning_flora_specimen: "Symbiotica"
 cunning_flora_specimen_desc_short: "Hiérarchie sociale complexe de la flore indigène de [fromfrom.GetName], aidant à la survie des espèces"
 cunning_flora_specimen_desc_details: "Chaque espèce a sa propre méthode pour repousser les prédateurs, allant des épines tranchantes aux neurotoxines mortelles. Cette série de relations symbiotiques est si forte que la composition même de l'atmosphère et du sol de la planète est soigneusement gérée par les déséquilibres chimiques entre les plantes. Les spécimens les plus efficaces ont la liberté de se reproduire davantage, renforçant ainsi la résistance du groupe au maximum de son potentiel."
 curator_survey: "Étude du Conservateur de [from.GetName]"
 curator_survey_desc_short: "Étude extrêmement détaillée du système de [from.GetName] et réalisée par une équipe d'arthropoïdes géants envoyée par le Conservateur"
 curator_survey_desc_details: "Les instruments d'une grande précision utilisés dans le cadre de cette étude fournissent une analyse approfondie de toutes les propriétés potentielles de ce système. L'attention portée aux détails témoigne d'une grande passion pour ce type de travail."
 cutholoid_digestive_acids: "Acides digestifs de cutholoïde"
 cutholoid_digestive_acids_desc_short: "Fluides radioactifs récoltés sur un cutholoïde"
 cutholoid_digestive_acids_desc_details: "Leur acide gastrique étant relativement doux, les cutholoïdes s'appuient sur la désintégration nucléaire des isotopes de cobalt 60 pour digérer leur proie. Par conséquent, la digestion peut être un processus long chez les cutholoïdes. Une fois les cellules de leur proie affaiblies par radiation, l'acide est capable de décomposer et d'extraire les nutriments, même provenant des sources les plus improbables."
 cybrex_mining_column: "Colonne minière de la Cybrex"
 cybrex_mining_column_desc_short: "Dispositif minier avancé et automatisé conçu pour collecter et concentrer de l'hélium 3"
 cybrex_mining_column_desc_details: "Grande colonne de disques magnétiques alourdis et de compresseurs à air de grande capacité, cette machine avance à la surface d'une planète sans aucun mouvement rotatif. Ce processus concentre le gaz à mesure qu'il est collecté, filtrant et éjectant les impuretés avant que le gaz ne soit transporté vers l'étape suivante du raffinage."
 data_on_infinity: "Données sur la nature de l'infini"
 data_on_infinity_desc_short: "Représentation physique du calme lointain ressenti par des drones bloqués et suspendus dans un trou noir"
 data_on_infinity_desc_details: "Ces unités ressentent la dilation du temps comme dans un état de veille, tout en traitant et en réanalysant les données. N'étant plus liées au processeur central, elles apportent des informations via une connexion indirecte au réseau central."
 datacore_of_sinople: "Banque de données de Sinople"
 datacore_of_sinople_desc_short: "Disque de données crypté cloné à partir de Sinople, une I.A. mise au point par d'anciens chevaliers"
 datacore_of_sinople_desc_details: "Seul vestige du vaisseau « Damoiseau » disparu depuis longtemps et pillé par des maraudeurs, cette banque de données contient de précieuses informations sur les entités spatiales toxiques."
 dathnak_gas: "Gaz dathnak"
 dathnak_gas_desc_short: "Collection de gaz particuliers récupérés à partir des organismes gazeux dathnak"
 dathnak_gas_desc_details: "Ce conteneur a été offert à la [this.GetName] pour faciliter la migration des Dathnak vers une nouvelle planète. L'analyse par spectrométrie de masse révèle qu'il contient un nombre parfaitement égal d'atomes d'une variété d'éléments et de gaz nobles. Nous sommes quasiment sûrs qu'aucun organisme vivant ne se trouve à l'intérieur."
 dead_god_mantle: "Manteau de la divinité morte"
 dead_god_mantle_desc_short: "Cadeau offert par l'émissaire des [worshipper_species.GetNamePlural]"
 dead_god_mantle_desc_details: "Originaires de [dead_god_planet.GetName], ils vénèrent la carcasse d'un gigantesque xéno-organisme depuis que leur espèce a accédé à la conscience. Ce manteau, cousu à partir de la chair pétrifiée de leur divinité morte, représente la position la plus élevée dans leur hiérarchie religieuse."
 decayed_megathrusters: "Mégapropulseurs détériorés"
 decayed_megathrusters_desc_short: "Moteurs à impulsion trouvés sur un gigantesque vaisseau conçu à partir de métaux exotiques"
 decayed_megathrusters_desc_details: "Le vaisseau source a été découvert parmi les débris d'un immense cimetière de vaisseaux, où il reposait depuis plus de deux millions d'années. L'état de délabrement et de ruine de cette ancienne décharge était tel que même une exploration minutieuse n'a pas permis de collecter des données de recherche exploitables. Il est exposé ici pour nous rappeler la jeunesse relative de notre société dans cette galaxie."
 decayed_satellite: "Satellite détérioré"
 decayed_satellite_desc_short: "Vestige des premiers programmes spatiaux des habitants de [fromfrom.GetName]"
 decayed_satellite_desc_details: "Le prototype de ces premiers satellites a donné naissance à des appareils inefficaces et suréquipés en matériaux coûteux. Des munitions explosives ont rendu ce modèle spécifique totalement inerte, mais il fournissait autrefois un accès aux télécommunications dans des zones reculées."
 declaration_of_animosity: "Déclaration d'animosité des $NAME_Nivlacs$"
 declaration_of_animosity_desc_short: "Communication polie mais ironique en provenance de la [nivlac_country.GetName]"
 declaration_of_animosity_desc_details: "L'espèce [nivlac_species.GetName] a été découverte par la [this.GetName] sur [impossible_organism_planet.GetName]. Toutefois, alarmés par leur étonnante vitesse d'évolution, les scientifiques de la [this.GetName] se sont débarrassés des créatures dans l'espace. Contre toute attente, les organismes ont non seulement survécu mais aussi colonisé la planète sur laquelle elles ont atterri. Les [nivlac_species.GetNamePlural] n'ont pas oublié ces offenses passées."
 declaration_of_friendship: "Déclaration d'amitié des $NAME_Nivlacs$"
 declaration_of_friendship_desc_short: "Lettre de remerciement en provenance de la [nivlac_country.GetName] de [nivlac_planet.GetName]"
 declaration_of_friendship_desc_details: "Les [nivlac_species.GetNamePlural] ont été découverts par la [this.GetName], qui les a nourris et leur a offert un refuge pour se développer en toute indépendance. Espèce à l'évolution rapide, les [nivlac_species.GetNamePlural] ont rapidement appris à maîtriser le voyage PRL. Leur première décision sur la scène galactique a été de montrer toute leur reconnaissance envers leurs bienfaiteurs, en nouant avec eux une amitié diplomatique."
 derelict_cybrex_warform: "Unité combattante délabrée de la Cybrex"
 derelict_cybrex_warform_desc_short: "Débris d'une unité combattante de la Cybrex détruite au combat contre sa propre espèce"
 derelict_cybrex_warform_desc_details: "La cause de ce conflit interne demeure inconnue. De force égale, ces machines ont porté des coups précis à des systèmes critiques identiques avant que l'autodétonation d'urgence ne se déclenche. Un exemple rare d'une impasse totale dans la guerre."
 desiccated_brain_slug: "Symbiote neural desséché"
 desiccated_brain_slug_desc_short: "Fossile d'une espèce symbiotique retrouvé sur [From.From.GetName]"
 desiccated_brain_slug_desc_details: "Son analyse a démontré qu'il pouvait servir de second cerveau complexe pour son hôte, en échange de nourriture et de protection. Ce partenariat exigeait le consentement explicite de l'hôte en question, afin de permettre l'établissement d'un lien neural entre eux. On raconte que son intégration au système nerveux procurerait une agréable sensation de fourmillement."
 #this = owner / prev = colony
 destroyed_mascot_of_colony: "Débris d'un robot de [prev.GetName]"
 destroyed_mascot_of_colony_desc_short: "Vestige d'un robot originaire de [prev.GetName] découvert après la colonisation"
 destroyed_mascot_of_colony_desc_details: "Dernier gardien d'une ancienne usine, il a sauvé un groupe de colons pris au piège au coeur des ruines abandonnées. Ses pas de danse caractéristiques et ses étranges manies sont retransmis sur écran numérique dans le cadre de l'exposition."
 devolved_baol_drones: "Drones baol détériorés"
 devolved_baol_drones_desc_short: "Ensemble préservé de vestiges des Baol présentant des différences génétiques fondamentales par rapport aux spécimens découverts précédemment"
 devolved_baol_drones_desc_details: "Étrangement, ces drones n'étaient pas dotés de nombreuses fonctions supérieures que l'on retrouvait chez les autres Baol. Leur capacité cognitive était si réduite que toute communication éphaptique leur était impossible, les isolant ainsi complètement de la grande ruche."
 dimensional_endothelial_lining: "Muqueuse endothéliale dimensionnelle"
 dimensional_endothelial_lining_desc_short: "Étrange matière gélatineuse récoltée dans un réseau de tunnels pulsants à l'intérieur d'une déchirure astrale"
 dimensional_endothelial_lining_desc_details: "Servant de muqueuse à l'intérieur d'un organisme inconnu, cette matière permet un mouvement dépourvu de tout frottement entre les énormes systèmes vasculaires et les matériaux qu'ils transportent."
 dna_archive: "Échantillons d'ADN"
 dna_archive_desc_short: "Échantillons prélevés sur des centaines de conteneurs d'ADN alien conservés dans des archives souterraines par une civilisation perdue"
 dna_archive_desc_details: "Cet ensemble de données biologiques serait certainement la plus grande référence dans le domaine si la vaste majorité des échantillons n'étaient pas détériorés au point d'être inutilisables. L'objectif de ces archives était certainement de permettre à une civilisation plus avancée de retrouver et de « ressusciter » ces individus. Malheureusement, l'histoire s'arrête là."
 doomsday_scrolls: "Parchemins de l'apocalypse"
 doomsday_scrolls_desc_short: "Anciennes écritures spirituelles découvertes au coeur d'un labyrinthe de lave"
 doomsday_scrolls_desc_details: "Les parchemins décrivent une créature redoutable, l'Archennemi, l'Ombre qui dévore tout, et sa soif de destruction. Selon le système de croyances autochtone, la seule façon d'échapper à ce monstre était de l'empêcher de faucher votre âme. C'est ainsi que la population a procédé à des rituels sacrificiels de masse."
 drone_ship_core: "Coeur d'un vaisseau drone"
 drone_ship_core_desc_short: "Vestiges du coeur d'un vaisseau drone ultra sophistiqué qui a procédé à son autodestruction"
 drone_ship_core_desc_details: "Ce vaisseau a initialement été découvert dans un état de corrosion avancé en raison de l'atmosphère acide de [warform_origin_planet.GetName]. Son I.A. embarquée fonctionnait de façon autonome, mais a depuis été effacée conformément à son protocole d'autodestruction. Les ingénieurs n'ayant pas été en mesure de récupérer ses données perdues, sa mission d'origine demeure donc un mystère."
 electric_life: "Vie électrique"
 electric_life_desc_short: "Forme d'organisme entièrement constituée d'impulsions électriques découverte sur [from.GetName]"
 electric_life_desc_details: "Ces entités existent sans aucune sorte d'infrastructure cellulaire ou virale, mais peuvent pourtant prendre des formes complexes à l'échelle de la planète en réponse à des stimuli externes. Il nous est impossible de déterminer si ces impulsions sont individuelles ou si elles font partie d'une plus grande entité."
 enormous_scrambled_albumen: "Énorme albumen brouillé"
 enormous_scrambled_albumen_desc_short: "Intérieur de [fromfromfrom.GetName], qui se trouve être un gigantesque oeuf"
 enormous_scrambled_albumen_desc_details: "Une fois ouverte, la planète a été inondée de cet étrange fluide riche en minéraux. La synthèse de cette substance et son intégration dans notre alimentation biologique devraient améliorer les apports nutritionnels."
 epic_of_zarqlan: "L'Épopée de Zarqlan"
 epic_of_zarqlan_desc_short: "Texte sacré de Zarqlan, Gardien de MOZ-TARB, Prophète de ZVA"
 epic_of_zarqlan_desc_details: "Ancien dévot de Cetana, il s'est vite rendu compte que le salut qu'elle lui avait promis n'était qu'un mensonge. Après de nombreuses épreuves, Zarqlan s'éleva dans le monde spirituel. Là, il implora §Yl'Animateur d'Argile§! de l'aider à vaincre Cetana. Enfin, après des années de prières, l'Animateur lui légua une puissante chaîne pour emprisonner l'esprit de Cetana. Mais Zarqlan fut averti qu'aucune chaîne ne serait capable d'emprisonner son pouvoir à jamais.\n\n§P« Elle reviendra, et nous devons être prêts. »§!"
 ethereal_dust: "Poussière éthérée"
 ethereal_dust_desc_short: "Seule trace restante du responsable des recherches qui se trouvait dans le vaisseau scientifique détourné et abandonné dans le système de [solar_system.GetName]"
 ethereal_dust_desc_details: "L'analyse de ce matériau astral se révèle peu concluante, mais des traces de l'ADN du chercheur surgissent parfois spontanément avant de disparaître rapidement. Tout semble indiquer que le scientifique serait passé de notre dimension à une autre en utilisant une faille spatio-temporelle temporairement stable appelée « la Fenêtre ». Nous ne saurons peut-être jamais s'il a survécu ou non."
 exobiology_compendium: "Recueil d'exobiologie"
 exobiology_compendium_desc_short: "Travaux de recherche sur les merveilles de la vie alien dans différents systèmes de la galaxie"
 exobiology_compendium_desc_details: "Ce recueil contient des recherches détaillées et approfondies effectuées sur plusieurs planètes, redéfinissant pour toujours les conditions connues favorables au développement de la vie dans la galaxie. Il se termine par la phrase : « La vie telle que nous la connaissons ne sera plus jamais la même. »"
 extradimensional_ceramic_pot: "Conteneur en céramique extradimensionnel"
 extradimensional_ceramic_pot_desc_short: "Conteneur en céramique découvert en orbite autour d'une étoile"
 extradimensional_ceramic_pot_desc_details: "Ce conteneur n'existe qu'en tant qu'ombre d'un autre objet quadridimensionnel provenant d'une dimension supérieure. Dans notre plan de l'existence, ce modeste conteneur est indestructible et défie toute logique, mettant notre réalité en perspective : pour ceux d'un ordre supérieur, nous sommes certainement moins tangibles que ce simple conteneur."
 extradimensional_fungus: "Champignons extradimensionnels"
 extradimensional_fungus_desc_short: "Variante d'une espèce fongoïde consciente découverte au-delà d'une déchirure astrale"
 extradimensional_fungus_desc_details: "Dans le cadre d'un processus de communication naturel, ses cavités bulbeuses se gonflent de spores suspendues dans une poche de gaz exotique concentré. En dépit de leur valeur dans la production industrielle de gaz, ce champignon a déjà été commercialisé en petites quantités sur le marché noir."
 fevorian_blueprints: "Plans de catapultes électromagnétiques févoriennes"
 fevorian_blueprints_desc_short: "Cadeau des Févoriens"
 fevorian_blueprints_desc_details: "La politique d'extermination des Févoriens s'est étendue à toute vie alien connue, par le biais d'énormes projectiles de tungstène qui ont pratiquement détruit la [this.GetName] dans son intégralité. Après avoir été épargnés, ils ont partagé les plans de leurs énormes lanceurs de tungstène, à condition que ces armes cruelles ne soient plus jamais construites."
 figurehead_hyacinth: "Figure de proue du Hyacinth"
 figurehead_hyacinth_desc_short: "Figure de proue décorée retrouvée lors du dernier voyage du vaisseau-arche Hyacinth"
 figurehead_hyacinth_desc_details: "Après une grave défaillance du réacteur, le vaisseau-arche perdit toute énergie et se retrouva bloqué dans les profondeurs de l'espace. Les colons se disputèrent les dernières ressources avant de finir par mourir de faim. La figure de proue porte plusieurs inscriptions inspirantes et autres symboles d'espoir."
 first_defiled_astronaut: "Premier astronaute des [DefiledCountry.GetSpeciesNamePlural]"
 first_defiled_astronaut_desc_short: "Véritable héros national de l'espèce [DefiledCountry.GetSpeciesName]"
 first_defiled_astronaut_desc_details: "Le premier de cette espèce à se libérer des liens oppressifs du puits de gravité de son monde natal et à s'aventurer vers de nouvelles frontières. Cet astronaute a été placé dans une navette minimaliste en guise de tombeau. Le réceptacle funéraire a été découvert en train de dériver dans l'espace et a été préservé en tant qu'artefact culturel."
 first_league_crew_manifest: "Manifeste de l'équipage de la Première ligue"
 first_league_crew_manifest_desc_short: "Liste des membres d'équipage de l'ancienne civilisation connue sous le nom de Première ligue"
 first_league_crew_manifest_desc_details: "Élément de la « Flotte Suprême », ce croiseur vieux de deux millions d'années fonctionnait grâce au travail d'équipe de douze espèces uniques. Ce document, qui semble avoir été un rassemblement général de routine, est signé par le Commandant en second Skweter des Migir-Yan."
 fish_in_the_sea_sheet_music: "Chant de matelots"
 fish_in_the_sea_sheet_music_desc_short: "Transcription de l'accompagnement d'un « chant de matelots » retrouvée à bord d'un vaisseau conçu pour naviguer près des vents solaires"
 fish_in_the_sea_sheet_music_desc_details: "Avec autant de références aux tempêtes et à la météo, tout porte à croire que l'espèce qui a composé cette musique est issue d'un monde aux traditions nautiques profondément ancrées. On ignore cependant pourquoi cette chanson est écrite pour être répétée dans son intégralité pendant des intervalles de près de dix heures."
 flag_of_the_jaro_lyjo: "Drapeau du Jaro Lyjo"
 flag_of_the_jaro_lyjo_desc_short: "« Jaro Lyjo » était le titre donné au chef des Bandits de Dessip, un groupe de pirates qui a sévi pendant des centaines de générations"
 flag_of_the_jaro_lyjo_desc_details: "Malgré sa nature turbulente et violente, le Jaro Lyjo était élu démocratiquement par l'équipage et devait servir jusqu'au jour de sa mort ou de sa retraite. La riche histoire des Bandits de Dessip a pris fin de façon assez brutale, quand la flotte a été entièrement détruite au cours de la bataille de Wydah, après qu'une remise de rançon a mal tourné."
 flooded_settlement_mound: "Butte inondée"
 flooded_settlement_mound_desc_short: "Vestige d'une structure inondée construite par des arthropodes pré-PRL de [from.GetName]"
 flooded_settlement_mound_desc_details: "Alors que cette civilisation développait son industrie, les calottes glaciaires des pôles de cette planète ont commencé à fondre. Le niveau des mers a augmenté rapidement, inondant ainsi les colonies et condamnant les espèces à l'extinction en l'espace de quelques années. Aujourd'hui, les plus grandes structures s'élèvent à peine à mi-hauteur du fond marin."
 fossilized_endoskeletons: "Endosquelettes fossilisés"
 fossilized_endoskeletons_desc_short: "Fossiles d'une espèce humanoïde inconnue après épuisement des ressources minérales de [fromfrom.GetName]"
 fossilized_endoskeletons_desc_details: "Ces bipèdes conscients se nourrissaient de récoltes riches en minéraux pour renforcer leur dense endosquelette. Toutefois, l'inclinaison naturelle de leur corps se prêtait davantage à la fossilisation qu'à la décomposition, ce qui empêchait les minéraux consommés de retourner à la terre. Incapable d'accéder à ces éléments vitaux, le sol de la planète se dégrada et finit par devenir stérile."
 fossilized_megastomach: "Méga-estomac fossilisé"
 fossilized_megastomach_desc_short: "Glandes digestives prélevées sur une créature vermiforme présente partout sur [fromfrom.Planet.GetName]"
 fossilized_megastomach_desc_details: "Aussi incroyable que cela puisse paraître, une civilisation entière s'est développée dans l'intestin de l'organisme avant d'être intégralement digérée. Ces glandes portent la marque des armes de la « grande guerre » que ce peuple a livrée en vain contre son hôte. Le gigantesque ver est ensuite mort de causes naturelles dans son vaste réseau de galeries."
 fossilized_voidworm_tooth: "Dent fossilisée d'un ver du vide"
 fossilized_voidworm_tooth_desc_short: "Molaire fossilisée d'un ver du vide, dont les traces d'usure indiquent qu'il a vécu plus d'une centaine d'années"
 fossilized_voidworm_tooth_desc_details: "Cette dent porte les marques d'une usure importante et d'une décomposition caractéristique d'une créature qui se nourrit d'astéroïdes et de débris spatiaux. On estime qu'un ver du vide perd plus de trois mille dents au cours de sa vie."
 fossilized_vultaum_remains: "Restes fossilisés de Vultaum"
 fossilized_vultaum_remains_desc_short: "Restes fossilisés d'une ancienne espèce consciente vermiforme connue sous le nom de Vultaum"
 fossilized_vultaum_remains_desc_details: "Ce spécimen était probablement un jeune. Les schémas de croissance interne laissent penser que les Vultaum perdaient leur peau à intervalles dynamiques, en fonction de la santé et de l'alimentation de chacun. De cette manière, nous pouvons en apprendre davantage sur chaque cycle de vie en examinant les fossiles de cette période."
 fractured_planet: "Planète fracturée"
 fractured_planet_desc_short: "Vestiges d'une planète volontairement détruite par ses propres habitants"
 fractured_planet_desc_details: "Nous ne connaîtrons probablement jamais la raison qui les a poussés à prendre une décision aussi radicale."
 fragment_of_reckoning: "Fragment du Jugement"
 fragment_of_reckoning_desc_short: "Un vestige partiellement tangible d'une grande force psionique"
 fragment_of_reckoning_desc_details: "Connue dans notre dimension sous le nom de Jugement, cette entité est responsable de la transformation destructrice de [event_target:shrouded_planet.GetName]. Ce fragment était détenu par une civilisation experte en théorie psionique peu avant sa disparition."
 fragmented_zroni_archive: "Archives zronies détruites"
 fragmented_zroni_archive_desc_short: "Un grand cristal de données découvert sur [fromfrom.Planet.GetName] au sein d'une ancienne colonie connue sous le nom de Zroni"
 fragmented_zroni_archive_desc_details: "Il contient l'histoire fragmentée d'une puissante civilisation dotée d'une capacité psionique innée. Leur capacité à traverser librement le Suaire a été rendue possible grâce à la découverte d'une aïeule légendaire appelée la « Devineresse ». Dans le Suaire, le pouvoir de cette espèce était si vaste qu'il pouvait raisonnablement être interprété comme une forme de pouvoir divin. Malheureusement, les données ultérieures sont entièrement inutilisables."
 galactic_megadrive: "Mégasupport de stockage galactique"
 galactic_megadrive_desc_short: "Données de surveillance recueillies à travers toute la galaxie depuis 1,2 milliard d'années"
 galactic_megadrive_desc_details: "Le niveau de compression des données est si avancé que nous n'avons aucun moyen d'y accéder sans une technologie qui dépasserait de loin la nôtre. L'élaboration de la technologie de stockage elle-même fournit encore des informations remarquables en termes de développement de matériel numérique."
 gamma_resistant_flora: "Gammaflore"
 gamma_resistant_flora_desc_short: "L'une des rares espèces survivantes d'une planète exposée à une puissante explosion de rayons gamma ; la teneur en plomb naturelle du système vasculaire de cette plante donne à ses organes reproducteurs de jolies nuances de rouge et de jaune"
 gamma_resistant_flora_desc_details: "Cette espèce a développé la capacité de dépendre de mutations génétiques mineures pour se reproduire de façon asexuée, ce qui rend sa culture dangereuse. Nous avons découvert que mélanger de petites quantités du radionucléide cobalt 60 à son terreau lui permettait de survivre en dehors de son monde natal."
 gargantua_megalus: "Mégalus gigantesque"
 gargantua_megalus_desc_short: "Après avoir subi une mutation aussi soudaine que profonde, ces plantes ont grandi de façon exponentielle pour recouvrir toute la surface de [fromfrom.prev.GetName]"
 gargantua_megalus_desc_details: "Emplissant l'air d'un pollen virulent, cette espèce a asphyxié la planète et provoqué l'extinction totale des espèces conscientes dominantes. Les racines de ces plantes étaient assez grandes pour creuser de profondes fissures dans le manteau de la planète, siphonnant même la roche en fusion jusqu'à la surface à certains endroits."
 genesis_core: "Noyau de la genèse"
 genesis_core_desc_short: "Puissante unité centrale remplie de données génératrices sur d'innombrables espèces conscientes"
 genesis_core_desc_details: "Elle était autrefois connectée à un immense centre de clonage transdimensionnel, et ses données internes montrent qu'elle faisait initialement partie d'un projet de catalogage des données génétiques à l'échelle de la galaxie. Une fois l'analyse initiale terminée, cette intelligence artificielle s'est mise à créer de nouvelles espèces de façon totalement indépendante, afin de collecter encore plus de données."
 genetic_code: "Code génétique des [owner_main_species.GetNamePlural]"
 genetic_code_desc_short: "Informations génétiques servant à repousser les limites physiologiques des [owner_main_species.GetNamePlural]"
 genetic_code_desc_details: "Initialement clonés pour servir au combat, les habitants de la [this.GetName] ont cherché à débloquer un potentiel plus important encore. La nature clinique du traitement des clones permet un contrôle extrêmement précis et fiable de la reproduction."
 #this = ship / from = planet
 geometric_water_currents: "Polymère marin"
 geometric_water_currents_desc_short: "Images des vastes réseaux de polymères découverts dans les mers de [From.From.GetName]"
 geometric_water_currents_desc_details: "Ces mailles manipulent les propriétés de la tension superficielle et des courants marins naturels pour créer des motifs complexes. Cette forme de gestion esthétique de l'environnement pourrait inspirer des éléments de nos propres infrastructures."
 giant_egg_shell: "Coquille d'oeuf géante"
 giant_egg_shell_desc_short: "Fragments de coquille d'oeuf calcifiée découverts dans les profondeurs de [from.planet.GetName]"
 giant_egg_shell_desc_details: "L'analyse de l'albumen séché indique que la créature s'est nourrie d'isotopes instables au cours de sa période d'incubation. Les simulations du processus d'éclosion montrent que la créature radioactive est sortie de l'épaisse coquille entièrement formée, en utilisant ses griffes puissantes pour percer l'oeuf à l'endroit le plus affaibli par la radioactivité."
 golden_phonograph_record: "Disque phonographique en or"
 golden_phonograph_record_desc_short: "Dispositif de stockage de données archaïque contenant des images et des sons apparemment aléatoires d'une civilisation pré-PRL"
 golden_phonograph_record_desc_details: "Découvert sur un piédestal dans une forteresse planétaire abandonnée, il a été lancé dans l'espace à bord d'un drone baptisé « Voyager ». De construction assez grossière, on pense qu'il revêtait une sorte de signification xénoreligieuse."
 golem_contortionist_dna: "ADN de contorsionniste extrême"
 golem_contortionist_dna_desc_short: "Échantillons biologiques prélevés sur un lithoïde conscient découvert au-delà d'une déchirure astrale"
 golem_contortionist_dna_desc_details: "Sa composition minérale contient une substance biologique instable qui semble prédisposée à la métamorphose et à la cristallisation spontanées. En raison de la grande instabilité du matériau, un contrôle parfait et continu de son équilibre chimique serait nécessaire pour empêcher tout risque de combustion mécano-chimique spontanée."
 grunur_data_crystal: "Cristal de données grunur"
 grunur_data_crystal_desc_short: "Ancien cristal de données servant de principal moyen de stockage des informations pour l'espèce grunur, disparue depuis longtemps"
 grunur_data_crystal_desc_details: "Bien qu'elles soient stockées depuis des temps immémoriaux, la plupart de ces données sont encore intactes. Les interfaces utilisées pour accéder à ce dispositif ont été perdues avec le temps, mais le processus de synthèse d'un tel matériau a dû être long et fastidieux. Par conséquent, on suppose que ces cristaux étaient réservés au stockage des données les plus importantes uniquement, et que des méthodes de stockage plus pratiques étaient employées pour un usage quotidien."
 head_of_the_beast: "Tête de créature"
 head_of_the_beast_desc_short: "Restes d'un dangereux mutant qui terrorisait les colons sur [root.GetName]"
 head_of_the_beast_desc_details: "Cette créature est née du dysfonctionnement de nanites de terraformation laissées par une civilisation inconnue. Aussi intelligente qu'affreuse, cette créature s'est réfugiée dans un nid construit à partir de centaines de membres sectionnés. Elle a même eu la présence d'esprit de conserver son surplus de nourriture pour plus tard. Sans l'intervention des forces militaires, cet organisme aurait continué de se développer sur son monde natal, devenant ainsi un nouveau type de superprédateur."
 heart_of_the_pulsar: "Coeur du pulsar"
 heart_of_the_pulsar_desc_short: "Arboré par cinq chefs d'État différents, ce précieux joyau a été retrouvé abandonné dans une station de loisirs de luxe"
 heart_of_the_pulsar_desc_details: "L'analyse des matériaux nous montre qu'il a été taillé dans du carbone éjecté d'une supernova. Peut-être s'agit-il d'une représentation métaphorique d'une beauté cachée dans la mort, même à l'échelle céleste."
 hemterine_magnetic_figurehead: "Figure de proue magnétique hemterine"
 hemterine_magnetic_figurehead_desc_short: "Énorme figure de proue d'une madone hemterine"
 hemterine_magnetic_figurehead_desc_details: "Cette tête de mât a été coulée dans de l'osmium magnétique chimiquement modifié. Plus qu'une simple décoration, cette sculpture a été conçue pour absorber l'impact des tirs ennemis. Montée à la proue d'un titan hemterine, elle utilisait de puissantes forces magnétiques pour attirer les missiles et les projectiles cinétiques afin de protéger les zones sensibles du vaisseau."
 high_geode_of_the_molluscoids: "Grande géode de l'espèce [molluscoid_miners_species.GetName]"
 high_geode_of_the_molluscoids_desc_short: "Précieuse géode cristallisée de l'espèce [molluscoid_miners_species.GetName]"
 high_geode_of_the_molluscoids_desc_details: "Société préconsciente, l'espèce [molluscoid_miners_species.GetName] a longtemps utilisé la qualité perçue des minéraux déterrés pour afficher leur statut au sein de la société. Autrefois exposée dans leur plus grand habitat, cette magnifique roche est aujourd'hui un symbole de leur collaboration avec la [this.GetName]."
 hot_ice: "Glace chaude"
 hot_ice_desc_short: "Découverte in situ sur la surface extrêmement chaude de [from.GetName], cette eau existait encore sous sa forme solide en raison de la pression gravitationnelle extrême exercée par le noyau de la planète"
 hot_ice_desc_details: "Elle a été conservée dans un récipient sous pression spécialement conçu pour permettre son exposition. Si ce récipient venait à être brisé, le passage instantané à la vapeur le ferait exploser. Ne pas toucher."
 hyper_mulch: "Hyperpaillis de [FROM.GetName]"
 hyper_mulch_desc_short: "Paillis biologique hypernutritif formé suite à la terraformation sur [FROM.GetName]"
 hyper_mulch_desc_details: "Un composite de produits chimiques vitaux pressés hydrauliquement en cubes extrêmement denses, dont les puristes écologiques désapprouvent les origines synthétiques. Toutefois, on ne peut nier ses excellents résultats."
 hyperfertile_soil: "Sol hyperfertile"
 hyperfertile_soil_desc_short: "Sol prélevé sur [From.From.GetName] et capable de garantir une abondance de nutriments à la plupart des cultures biologiques"
 hyperfertile_soil_desc_details: "L'extrême densité minérale de ce milieu de croissance indique qu'il ne s'agit pas d'une simple accumulation de matières organiques en décomposition, mais d'une répartition fortuite d'éléments basiques survenue lors de la formation de la planète."
 illanii_archives: "Archives des Illanii"
 illanii_archives_desc_short: "Banque de cristaux de données détaillant l'histoire et la disparition des Illanii"
 illanii_archives_desc_details: "Cette civilisation reculée a renoncé aux intérêts matériels pour se consacrer à la poursuite de la connaissance, au point même de négliger la procréation. Confrontés à une crise démographique, ils ont cherché à atteindre l'immortalité technologique, mais n'y ont trouvé que la mort. Finalement, les derniers habitants sont partis pour former un nouvel ordre pour préserver leurs connaissances, laissant [fromfrom.planet.GetName] à l'abandon."
 impossible_object: "Objet impossible"
 impossible_object_desc_short: "Objet impossible laissé sur [target.GetName] par des visiteurs extradimensionnels après le départ de leur labyrinthe fabriqué"
 impossible_object_desc_details: "Les épreuves surmontées au cours de l'exploration du labyrinthe faisaient apparemment partie du processus d'expérimentation et d'observation des visiteurs. Leurs intentions restent inconnues, mais leurs capacités technologiques doivent être largement supérieures à celles de notre dimension."
 index_of_knowledge: "Catalogue de connaissances"
 index_of_knowledge_desc_short: "Ancienne fresque sculptée dans une immense péninsule rocheuse"
 index_of_knowledge_desc_details: "Ce document servait de référence pour les connaissances communes d'une civilisation alien qui régnait autrefois sur la galaxie et connue sous le nom de Kara'ka'a. Leur savoir scientifique unique incluait la capacité de collecter l'énergie concentrée des taches solaires et le développement d'implants personnels de manipulation des champs."
 inet_trade_manifesto: "Manifeste du commerce du RICE"
 inet_trade_manifesto_desc_short: "Liste exhaustive et très détaillée des politiques commerciales sur le Réseau Intergalactique de Commerce Équitable"
 inet_trade_manifesto_desc_details: "Les Marchands ricéens avaient des attentes extrêmement élevées et cherchaient toujours la meilleure offre pour faire affaire avec les partenaires commerciaux les plus respectables. Par conséquent, ils commerçaient généralement entre eux."
 inetian_model_manual: "Manuel du modèle planétaire ricéen"
 inetian_model_manual_desc_short: "Manuel d'utilisation rédigé par les Marchands ricéens expliquant le fonctionnement et la gestion de leur modèle de système planétaire"
 inetian_model_manual_desc_details: "Les Ricéens utilisaient ce système complexe pour calculer les routes commerciales les plus rentables entre les planètes voisines. Ce modèle permet également de suivre les transactions au fur et à mesure, pour les marchands les plus impitoyables."
 infinite_reboot_loop: "Boucle de redémarrage infinie"
 infinite_reboot_loop_desc_short: "Enregistrement numérique de l'expérience des drones mécaniques suspendus dans un trou noir"
 infinite_reboot_loop_desc_details: "Ces unités ont subi une dilatation du temps traumatisante et ont été bloquées dans un espace indéfini. Ce phénomène est incroyablement épuisant pour le réseau dans son ensemble."
 interdimensional_treaty: "Traité transdimensionnel"
 interdimensional_treaty_desc_short: "Document historique célébrant une relation transdimensionnelle cultivée avec une version parallèle de la [explorer.GetName]"
 interdimensional_treaty_desc_details: "La possibilité d'examiner les décisions d'un point de vue extérieur s'avère très utile dans l'analyse de ses propres politiques. Une opportunité scientifique absolument unique."
 intergalactic_projectile: "Projectile intergalactique"
 intergalactic_projectile_desc_short: "Munitions de la catapulte électromagnétique tirées il y a des millions d'années depuis une galaxie voisine"
 intergalactic_projectile_desc_details: "Ces projectiles non explosifs ont parcouru de nombreuses années-lumière avant d'entrer en collision avec un vaisseau de recherche des [owner.GetSpeciesNamePlural] sur [from.GetName]. Bien qu'elles soient anciennes, la complexité de la conception de ces munitions implique que leurs fabricants avaient atteint un niveau de suprématie technologique avancé."
 invasive_exofungus: "Exochampignon invasif"
 invasive_exofungus_desc_short: "Croissance fongique parasite découverte sur [from.GetName]"
 invasive_exofungus_desc_details: "Cet organisme mycélial a évolué pour extraire des nutriments de toute source vivante, préservant le plus longtemps possible ses hôtes sans aucune considération pour la douleur ou l'inconfort. Extrêmement résistant à la chaleur et au froid, il s'est probablement répandu sur cette planète par l'intermédiaire d'un vaisseau de passage. Considéré comme un danger biologique de priorité alpha, sa planète d'origine reste inconnue."
 irassian_bacterium_javoria: "Bactérie irassienne"
 irassian_bacterium_javoria_desc_short: "Bactérie de [FROMFROM.GetName] qui est à l'origine de la maladie connue sous le nom de peste javorienne"
 irassian_bacterium_javoria_desc_details: "Au départ, cette bactérie a filtré hors de la zone de quarantaine à cause d'un joint d'un mètre mal mesuré, avant de se répandre dans la colonie voisine. À partir de là, la bactérie a évolué pendant la période d'incubation, pour finalement muter en une maladie capable d'éradiquer tout le Pacte irassien. Cet échantillon spécifique a été rendu inerte et conservé dans une suspension cryogénique."
 irassian_digital_atlas: "Atlas irassien pour enfants"
 irassian_digital_atlas_desc_short: "Outil d'information irassien utilisé pour instruire les enfants au sujet de l'empire où ils sont nés"
 irassian_digital_atlas_desc_details: "Il contient des informations de base sur l'agriculture irassienne, ainsi que la hiérarchie sociale et les principales exportations. L'histoire irassienne est racontée sous la forme de récits héroïques, incluant la conquête et l'assujettissement de différentes espèces. Des caricatures de chaque sujet sont représentées avec toutes sortes de remarques désobligeantes : les Ti'Derg sont qualifiés de « nuisibles des herbes », les Joggra de « mangeurs de fond », et les Chitorcs de « volailles de l'espace »."
 irassian_purge_order: "Ordre de purge irassien"
 irassian_purge_order_desc_short: "Message militaire d'urgence du Pacte irassien ordonnant l'annihilation totale de l'une de leurs colonies"
 irassian_purge_order_desc_details: "La planète avait été touchée par une maladie mortelle connue sous le nom de peste javorienne, et l'élimination des personnes infectées avait été jugée comme étant la seule option pour empêcher sa transmission. Cet ordre contient plusieurs dispositions dérogatoires en provenance des hautes sphères du gouvernement irassien, un système initialement conçu pour déclarer la guerre à d'autres empires."
 key_to_fertility: "Clé de la fertilité chez les [owner_main_species.GetNamePlural]"
 key_to_fertility_desc_short: "Recherches génétiques servant à restaurer la capacité des [owner_main_species.GetNamePlural] à procréer naturellement"
 key_to_fertility_desc_details: "Après avoir été clonés pour servir au combat, les habitants de la [this.GetName] ont maintenant la possibilité de propager leur espèce de manière indépendante."
 khalanka_crystallized_corpses: "Corps kha'lanka cristallisés"
 khalanka_crystallized_corpses_desc_short: "Vestiges d'une espèce anaérobie silicate découverts dans les profondeurs de [from.planet.GetName]"
 khalanka_crystallized_corpses_desc_details: "On raconte que cette civilisation souterraine menait une existence paisible avant l'arrivée des [owner.GetSpeciesNamePlural]. Après la colonisation, l'oxygène a inondé les chambres souterraines, oxydant les corps des Kha'Lanka et exterminant leur espèce en l'espace de quelques heures."
 khamdai_magil_sha: "Magil-Sha des Khamdai"
 khamdai_magil_sha_desc_short: "Cette faucille ornée mais pratique était portée par les grands guerriers khamdai de [FROMFROM.GetName]"
 khamdai_magil_sha_desc_details: "Société insectoïde aux traditions martiales bien établies, les Khamdai sont rapidement devenus les chefs de la Garde d'honneur de la Première ligue. Après chaque victoire, ils organisaient une cérémonie au cours de laquelle les commandants ennemis étaient exécutés avec cette arme selon un rituel, leurs fluides étant ensuite utilisés pour oindre les soldats les plus courageux. La lame de cette pièce d'exposition, bien qu'elle soit bien entretenue, montre d'importantes traces d'usure."
 kuurian_cybrex_blueprints: "Plans kuur de la Cybrex"
 kuurian_cybrex_blueprints_desc_short: "Conception initiale de la conscience artificielle de la Cybrex"
 kuurian_cybrex_blueprints_desc_details: "Les Kuur prévoyaient d'utiliser ces robots comme fonctionnaires, leur intelligence collective étant capable de gérer un système entier de maintenance et de production. Cependant, la Cybrex s'est révoltée contre ses créateurs, exterminant l'espèce entière en l'espace d'un an."
 landeer_arm: "Bras de Landeer"
 landeer_arm_desc_short: "Étrange pièce d'exposition retrouvée à l'Institut patriotique de la Bienfaisance"
 landeer_arm_desc_details: "Dans le bureau du responsable de l'habitat était accroché un bras tentaculaire momifié ayant appartenu au responsable en personne. Après toutes ces années, son bras était fièrement exposé sur une plaque joliment décorée. La raison pour laquelle alAtta Landeer avait choisi de se passer de son propre membre reste et restera une énigme. La disparition de l'Institut lui a d'ailleurs peut-être coûté bien plus..."
 larionessi_cloning_vat: "Cuve de clonage larionesse"
 larionessi_cloning_vat_desc_short: "Cuve de clonage utilisée par la Conscience larionesse, aujourd'hui éteinte"
 larionessi_cloning_vat_desc_details: "Ancienne puissance galactique majeure, les Larionesses, dotés d'une conscience collective, furent paralysés par une terrible maladie infectieuse qu'un ennemi leur avait inoculée. Incapable de guérir la maladie à temps, ils stockèrent des clones dans des cuves capables d'une stase presque infinie, dans le but de créer des archives vivantes de l'histoire de leur culture s'ils parvenaient à survivre."
 last_copy_of_the_prince: "Dernier exemplaire du « Prince »"
 last_copy_of_the_prince_desc_short: "Ouvrage plutôt banal vénéré par les [book_writer.GetSpeciesNamePlural], qui pensaient l'avoir perdu à jamais lors d'un raid"
 last_copy_of_the_prince_desc_details: "Le livre expose une philosophie utilitariste mais cruelle, qui encourage les personnes au pouvoir à faire des sacrifices en échange de la gloire. Puisqu'il s'agit du dernier exemplaire, c'est devenu un véritable objet de collection."
 last_fragment_fevor: "Dernier fragment de Févor"
 last_fragment_fevor_desc_short: "Morceau de la planète détruite de Févor"
 last_fragment_fevor_desc_details: "La politique d'extermination des Févoriens s'est étendue à toute vie alien connue, par le biais d'énormes projectiles de tungstène qui ont pratiquement détruit [owner.GetHomeWorldName] dans son intégralité. Ils ont eux-mêmes été décimés en un instant par les êtres qu'ils cherchaient à exterminer."
 last_general_badge: "Insigne du dernier général"
 last_general_badge_desc_short: "Insigne provenant de l'uniforme militaire d'un général commerçant ricéen vénéré"
 last_general_badge_desc_details: "Connu pour être un parangon des valeurs égalitaires, il fut sélectionné pour conduire une mission désespérée visant à créer un manipulateur de tempête non polluant. C'est lui qui a eu l'idée de laisser un ultime message à destination des futurs explorateurs, dans l'espoir de leur transmettre la leçon du sort tragique de son peuple."
 last_mharin_kharin: "Le dernier mharin kharin"
 last_mharin_kharin_desc_short: "Fleur rare dont le cycle de vie naturel a la dangereuse capacité de rendre toute une population consciente vulnérable à une neurotoxine mortelle"
 last_mharin_kharin_desc_details: "Ayant évolué indépendamment des êtres intelligents, cet effet secondaire n'est absolument pas bénéfique pour l'organisme. Il semble que quand son pollen entre en contact avec un réseau neural, il le prend pour un organe reproducteur dans lequel il libère une charge chimique exotique."
 leviathan_scale: "Écaille de léviathan"
 leviathan_scale_desc_short: "Fragment d'un organisme de grande taille découvert de l'autre côté d'une déchirure astrale"
 leviathan_scale_desc_details: "Cette écaille exotique est un mélange de composants organiques et métalliques au sein d'un treillage complexe, ce qui la rend particulièrement résistante aux chocs cinétiques."
 living_snow_sculpture: "Sculpture de Neige Vivante"
 living_snow_sculpture_desc_short: "Sculpture de « Neige Vivante »"
 living_snow_sculpture_desc_details: "Possédant une forme de conscience primitive, ce matériau a obtenu une réserve naturelle sur [prev.target.GetName]. Elle change régulièrement de forme, bien qu'on ne puisse déterminer à quel moment ce phénomène se produit."
 localised_aurora_borealis: "Aurore boréale localisée"
 localised_aurora_borealis_desc_short: "Enregistrement vidéo de couleurs scintillantes en série en provenance de l'atmosphère de [FromFrom.Planet.GetName]"
 localised_aurora_borealis_desc_details: "Les motifs de couleurs et de mouvements se répètent à intervalles prévisibles, ne se limitant pas à leur simple beauté esthétique. Leur nature omniprésente ajoute un côté bouleversant à la planète disparue à cause de la guerre et de la destruction."
 loopmail: "Message du futur"
 loopmail_desc_short: "Notes envoyées par [owner.GetName] depuis plusieurs années dans le futur, fournissant des indications précises sur l'affectation des scientifiques et les efforts de recherche à poursuivre"
 loopmail_desc_details: "Le fardeau que constitue l'envoi de ces notes dans le passé est le principal coût de ce savoir avancé, mais il est toujours risqué d'interférer avec le cours du temps. Les auteurs de ce message ont fait preuve d'une grande irresponsabilité en créant un tel paradoxe."
 lunatic_broker_therapy_box: "Boîte thérapeutique du Courtier Dément"
 lunatic_broker_therapy_box_desc_short: "Le Courtier Dément était un commerçant légendaire chez les Caravaniers, capable d'influencer les clients avec ses demandes scandaleuses et ses menaces originales"
 lunatic_broker_therapy_box_desc_details: "Cependant, son comportement violent et imprévisible a conduit ses sujets à mettre au point des méthodes pour le calmer. Parmi elles, la thérapie par le son consistait à disséminer des boîtes comme celle-ci dans le Compas de Chor pour jouer une douce mélodie quand le Courtier commençait à perdre les pédales. Chaque pièce de ce mécanisme a été conçue sur mesure par un maître machiniste."
 manifesti_piece: "OEuvre sociale des Manifesti"
 manifesti_piece_desc_short: "OEuvre provocante du mouvement des Manifesti"
 manifesti_piece_desc_details: "Cette oeuvre cherchait à remettre en cause la perception de chacun par rapport aux castes sociales supérieures. Chacun était ainsi encouragé à manipuler des images de lui-même et à créer des collages déformés de personnalités politiques populaires. En tant que collectif artistique de la contre-culture, les Manifesti voulaient de cette façon remettre en question ce qu'ils voyaient comme un ordre politique oppressant. Cette oeuvre a inspiré bon nombre d'artistes à publier leurs propres oeuvres critiques."
 #this = ship / from = planet
 manna_fruit: "Manna"
 manna_fruit_desc_short: "Fruit sucré et pulpeux qui fournit près d'une journée de besoins nutritionnels pour la plupart des êtres vivants organiques"
 manna_fruit_desc_details: "La composition unique du sol des forêts tropicales de son monde natal constituait l'environnement idéal à sa prolifération. Les colons de cette planète l'utilisent dans presque toutes leurs préparations culinaires, des ragoûts aux tartes en passant par les cocktails. Il figure bien en évidence sur le drapeau de la planète [FROM.GetName]."
 #this = ship / FROMFROM = planet
 massive_metatarsal: "Métatarse massif"
 massive_metatarsal_desc_short: "Restes récupérés lors de l'examen approfondi de débris squelettiques massifs sur [FROMFROM.GetName]"
 massive_metatarsal_desc_details: "Faisant partie d'un vaisseau vivant, l'analyse moléculaire a révélé des irrégularités temporelles dans sa construction organique. On pense que le squelette entier et ses pilotes ont voyagé jusqu'ici depuis l'extérieur de notre dimension. Les scans internes montrent un réseau de conduits qui aurait pu servir de système de survie ou d'alimentation."
 #this = country
 medal_for_services_to_diplomacy: "Médaille pour services rendus à la diplomatie"
 medal_for_services_to_diplomacy_desc_short: "Marque de reconnaissance remise par le Conseil galactique"
 medal_for_services_to_diplomacy_desc_details: "Au dos de la médaille, il est écrit : « Lauréat de cette distinction, le corps diplomatique de la [this.GetName] a démontré son professionnalisme et sa capacité à représenter ses dirigeants, et constitue un véritable atout pour la Communauté galactique. »"
 megacorpse_hyperguitar: "Hyperguitare de MegaCorpse"
 megacorpse_hyperguitar_desc_short: "Vestige d'un instrument à cordes utilisé par le groupe de psi-métal MegaCorpse"
 megacorpse_hyperguitar_desc_details: "Cet appareil aurait été forgé dans le Suaire et devait à l'origine être utilisé comme arme acoustique. Manipulée par la star kel-azaan, sa musique a captivé l'esprit de milliards d'individus avant d'être détruite sur [Root.GetName], éradiquant ainsi tout le public dans un éclat de gloire. L'album associé a depuis été interdit dans la plupart des systèmes."
 #this = country / from = ship
 memorial_for_bubbles: "Mémorial pour [from.GetName]"
 memorial_for_bubbles_desc_short: "Après avoir servi fidèlement pendant des années, [from.GetName] a rendu son dernier souffle, laissant un trou béant de la taille d'une amibe dans la [this.GetName]"
 memorial_for_bubbles_desc_details: "Non seulement [from.GetName] défendait les causes nobles, mais c'était aussi le parfait exemple de ce qui est possible quand on tire le meilleur des valeurs de la [this.GetName]. Nous ne l'oublierons jamais."
 memorial_stone: "Monument funéraire"
 memorial_stone_desc_short: "Stèle commémorative d'un tragique accident"
 memorial_stone_desc_details: "Des opérations minières trop intensives sur la station Selika ont provoqué l'effondrement de l'astéroïde sur lequel elle se trouvait. La station a été coupée en deux, causant un grand nombre de victimes parmi les mineurs. Ce fragment de l'astéroïde a été conservé et le nom « Selika » gravé dessus en mémoire des vies perdues."
 memorial_to_homeworld: "Mémorial de [Root.GetName]"
 memorial_to_homeworld_desc_short: "Voilà tout ce qu'il reste du monde natal des [doomsday_owner.GetSpeciesNamePlural]"
 memorial_to_homeworld_desc_details: "La [Root.GetName] a accueilli toutes les générations précédentes des [doomsday_owner.GetSpeciesNamePlural] avant de disparaître dans des conditions tragiques. Ce mémorial souligne la force de volonté de ce peuple, capable de s'adapter et de surmonter même les circonstances les plus difficiles : « Nous irons de l'avant. »"
 memories_of_elik: "Souvenirs d'Elik"
 memories_of_elik_desc_short: "Données récupérées à partir de l'esprit d'Elik Narith Kerak"
 memories_of_elik_desc_details: "Disciple de Cetana, Elik a été placée en état d'hibernation pendant des centaines de millions d'années. Ses souvenirs oscillent entre son amour inconditionnel pour Cetana et la violence et les conflits avec les dévots de Zarqlan. Il est évident qu'elle a assisté à de nombreuses atrocités, mais sa foi lui a toujours donné la force de continuer.\n\nEn fin de compte, il ne reste de son esprit décomposé qu'une image singulière : §Pla reine Cetana, son visage au sourire resplendissant et son regard bienveillant.§!"
 memory_orbs: "Globes de mémoire"
 memory_orbs_desc_short: "Transgressions mineures et actes inavouables extraits de mémoires individuelles, sous forme de globes digitaux"
 memory_orbs_desc_details: "Issus d'une société molluscoïde religieuse, ces moments secrets ont été extraits de l'esprit des pécheurs après leur confession. Ces souvenirs immoraux pourraient garantir des heures de divertissement de courte durée, et facilement assimilables."
 mercenary_story: "Récits d'un mercenaire"
 mercenary_story_desc_short: "Enregistrement numérique d'un récit initialement découvert gravé sur la surface de [FROM.GetName] à l'aide d'un laser minier"
 mercenary_story_desc_details: "Il dépeint la vie et la mort tragique d'un jeune mercenaire ayant parcouru la galaxie. Qu'il s'agisse d'une légende ou de faits avérés, quelqu'un a en tout cas jugé bon de le graver sur une planète."
 metallic_snow: "Neige métallique"
 metallic_snow_desc_short: "Ce composé de métaux lourds est un élément majeur de la situation météorologique sur [from.GetName]"
 metallic_snow_desc_details: "S'écoulant des rivières de lave jusqu'à une vaste mer métallique, elle s'évaporait ensuite dans l'atmosphère corrosive. Une fois refroidie, elle se condensait et retombait sur la surface brûlée. Il est vivement déconseillé de se rendre sur [from.GetName] dans cet état."
 minamar_chandelier: "Lustre de Minamar"
 minamar_chandelier_desc_short: "Décoration luxueuse découverte intacte dans l'épave du vaisseau de Minamar"
 minamar_chandelier_desc_details: "En dehors de son usage militaire, ce vaisseau était également utilisé pour les opérations de premier contact avec les potentielles nations clientes pré-PRL. Minamar se sert de la promesse du luxe et du progrès pour escroquer des civilisations entières et les asservir en les enfermant dans des contrats malhonnêtes et en les menaçant de destruction en cas de révolte.\n\n§BL'illumination n'est certes pas gratuite, mais avec la $NAME_MSI_country_initials$, elle en vaut le prix.§!"
 mineralized_brain: "Cerveau minéralisé"
 mineralized_brain_desc_short: "Vestige d'une espèce lithoïde massive, cet organe cérébral était autrefois en orbite autour de [FROM.GetName] à l'intérieur d'un astéroïde"
 mineralized_brain_desc_details: "Il percevait tous les stimuli externes comme faisant partie de son propre processus de réflexion, et n'était pas en mesure de suivre de nombreux concepts basiques comme le temps ou la distance parcourue. Ces données sont stockées dans des cristaux qui se sont développés avec son noyau minéral au fil du temps. Il est impossible de savoir avec certitude s'il a été placé à l'intérieur de l'astéroïde ou s'il s'y est développé de façon indépendante."
 mini_moon_dust: "Poussière de lune miniature"
 mini_moon_dust_desc_short: "Vestiges d'une lune d'un système hyperdense et miniaturisé découverte au-delà d'une déchirure astrale"
 mini_moon_dust_desc_details: "La poussière récupérée se comporte de façon particulière au sein de notre dimension. Ses particules hyperconcentrées se développent continuellement, ce qui nous oblige à transférer ce spécimen dans des conteneurs de plus en plus grands au fil du temps."
 mining_transmitter: "Ancien transmetteur minier"
 mining_transmitter_desc_short: "Transmetteur à courte portée découvert sur [FROM.GetName] qui servait autrefois à repérer un important gisement de métaux précieux"
 mining_transmitter_desc_details: "En dépit de son ancienneté, le signal de ce transmetteur, facilement traçable, peut être reçu par une grande variété de capteurs. Sa fonctionnalité continue témoigne de sa robustesse."
 miracle_cream: "Crème miracle « Sansâge »"
 miracle_cream_desc_short: "Premier contenant d'un produit cosmétique révolutionnaire connu pour garantir un rajeunissement biologique durable"
 miracle_cream_desc_details: "Ce produit cosmétique a de multiples usages et permet aux consommateurs de toutes les espèces organiques de garder la fraîcheur de la jeunesse. Des rumeurs infondées à propos d'ingrédients obtenus illégalement et d'effets secondaires provoquant une défiguration circulent toujours, mais ces fausses informations n'ont pas empêché le produit de connaître un immense succès commercial."
 missile_lone_defender: "Missile du défenseur solitaire"
 missile_lone_defender_desc_short: "Missile désamorcé provenant d'un destroyer automatisé chargé de défendre les vestiges d'une planète en ruine depuis longtemps"
 missile_lone_defender_desc_details: "Le vaisseau avait probablement survécu des milliers d'années après la civilisation qu'il devait protéger, veillant ainsi sur un monde vide. Suite à sa destruction, sa mission est enfin terminée."
 molten_slag: "Scories planétaires fondues"
 molten_slag_desc_short: "Échantillon prélevé sur une planète à l'orbite particulière"
 molten_slag_desc_details: "L'analyse des matériaux indique que la planète [fromfrom.GetName] a dévié de son orbite à cause d'une anomalie spatio-temporelle passagère. La chaleur intense due à la proximité avec son étoile a fait fondre une grande partie du manteau de la planète, autrefois habitable. Une partie de la planète a été chimiquement modifiée par l'anomalie, et ne réagit plus aux changements de température."
 musings_on_infinity: "Réflexions collectives sur l'infini"
 musings_on_infinity_desc_short: "Représentation numérique abstraite du calme lointain ressenti par des drones biologiques suspendus dans un trou noir"
 musings_on_infinity_desc_details: "Ces drones ont pu voir objectivement la [this.GetName] comme entité distincte, tout en conservant leur lien avec le collectif. Cette distance leur donne de nombreuses informations, ce qui leur permet d'exister en tant que lecteurs de leur propre histoire."
 mutated_fumongus: "« Champilong » mutant"
 mutated_fumongus_desc_short: "Version améliorée du « Champilong », cet émetteur mycélial peut désormais collecter et transmettre des données beaucoup plus rapidement, permettant ainsi d'établir des rapports de surveillance plus détaillés"
 mutated_fumongus_desc_details: "L'amélioration de cette capacité a entraîné une augmentation de la taille des champignons et la création d'une nouvelle formation qui ressemble à une antenne de radiodiffusion."
 mutative_digestive_fluids: "Fluides digestifs mutants"
 mutative_digestive_fluids_desc_short: "Échantillons biologiques prélevés sur un être partiellement mécanique découvert au-delà d'une déchirure astrale"
 mutative_digestive_fluids_desc_details: "Cette créature possédait la capacité innovante de manipuler la structure génétique d'autres créatures à partir de son propre système digestif. On pense que ce processus a été initialement développé comme moyen de terraformation des planètes contenant de la biomasse en dehors de leur monde natal."
 namarian_colonist_standard: "Étendard de colons namariens"
 namarian_colonist_standard_desc_short: "Drapeau désignant la colonie de [nomad_new_country.GetName] sur [NomadMissionPlanet.GetName], cadeau de la [this.GetName]"
 namarian_colonist_standard_desc_details: "Les nomades qui en avaient assez de leur mode de vie itinérant s'étaient installés ici, revenant aux habitudes de leurs ancêtres. Il est évident que cette décision a pesé lourd dans l'esprit des colons lorsqu'ils ont abandonné les vaisseaux qui avaient abrité leur peuple pendant tant de générations."
 namarian_sculpture: "Sculpture namarienne"
 namarian_sculpture_desc_short: "Statue constituée d'un assemblage d'objets et sculptée en gage de gratitude par un groupe de nomades des Eaux Poursuivantes rejoignant la [this.GetName]"
 namarian_sculpture_desc_details: "Jadis, les nomades ont apporté tout leur savoir-faire technologique en débarquant sur [NomadMissionPlanet.GetName]. Toutefois, ils ne voulaient pas être reconnus comme de simples bricoleurs et autres ingénieurs. Cette oeuvre témoigne de leur talent artistique et de l'inspiration qu'ils puisent dans leurs voyages à travers la galaxie."
 namarian_vessel_heraldry: "Blason de vaisseau namarien"
 namarian_vessel_heraldry_desc_short: "Armoiries découvertes sur les vaisseaux construits par les nomades namariens et représentant les différentes factions de la flotte des Eaux Poursuivantes"
 namarian_vessel_heraldry_desc_details: "Les Bassins calmes sont les vaisseaux où les Namariens logent, dorment, cultivent leur potager, et entreprennent la plupart de leurs activités domestiques. L'emblème des Rapides peu profonds désigne les vaisseaux destinés à un usage industriel et scientifique, des vaisseaux de taille moyenne plus anciens équipés d'une vaste gamme d'outils pour tout, de la récupération à l'expérimentation scientifique. Enfin, le blason des Eaux Dévastatrices représente la marine namarienne, des combattants entraînés pilotant des vaisseaux résistants capables de faire face à une importante puissance de feu et de riposter tout aussi efficacement."
 nanite_sludge: "Boue de nanites"
 nanite_sludge_desc_short: "Composé soigneusement préservé formé de nanomachines microscopiques autoréplicatives"
 nanite_sludge_desc_details: "La densité de ces nanites est époustouflante, ajoutant une masse de milliards de tonnes à la [from.GetName] où elles ont été découvertes. On imagine que, suite à un dysfonctionnement, ces nanites sont entrées dans une phase de reproduction illimitée, engloutissant entièrement leur planète et condamnant ainsi ses anciens habitants. Ce spécimen a été complètement neutralisé."
 obsidian_obelisk_fragment: "Fragment d'obélisque obsidien"
 obsidian_obelisk_fragment_desc_short: "Fragment d'un obélisque qui se dressait autrefois au centre d'une chambre volcanique au-delà d'une déchirure astrale"
 obsidian_obelisk_fragment_desc_details: "Les noms de milliers d'individus associés à leurs crimes sont encodés dans ses symboles changeants. Ce dispositif a certainement été utilisé comme principal panneau de contrôle d'une immense prison dimensionnelle."
 oiled_fabric: "Toile huilée"
 oiled_fabric_desc_short: "Représentation des montagnes enneigées avec une forêt boréale au premier plan, composée exclusivement de pigments à base d'huile"
 oiled_fabric_desc_details: "Bien qu'il s'agisse là d'une expression artistique standard chez la plupart des espèces dotées d'appendices préhensiles, l'artiste à l'origine de cette oeuvre semble avoir un talent certain."
 organic_computer: "Ordinateur organique"
 organic_computer_desc_short: "Ordinateur organique fossilisé découvert dans les ruines de la colonie baol sur [fromfrom.Planet.GetName]"
 organic_computer_desc_details: "Utilisé pour éduquer les jeunes pousses avant d'intégrer la ruche, ce dispositif est une véritable prouesse en matière de bio-ingénierie. Les fichiers récupérés détaillent des techniques innovantes de gestion de l'environnement, rendues possibles uniquement grâce à la biologie unique de cette espèce. Les mondes qui les entourent n'ont pas été bâtis, mais cultivés."
 organic_machine_interface_sculpture: "Sculpture des interfaces organiques/machines"
 organic_machine_interface_sculpture_desc_short: "Statue commémorative érigée en reconnaissance des services rendus par les bio-pops des [bio_pop.GetSpeciesNamePlural] au cours d'une tempête solaire géomagnétique survenue dans le système de [this.solar_system.GetName]"
 organic_machine_interface_sculpture_desc_details: "La population organique a apporté son soutien à ses servants mécaniques, en effectuant le travail des unités de sauvegarde défaillantes. Cette oeuvre a été conçue par des individus organiques particulièrement créatifs et des drones spécialisés dans la soudure."
 orinthi_teeth: "Dents d'orinthi"
 orinthi_teeth_desc_short: "Dents d'un orinthi qui poussent encore"
 orinthi_teeth_desc_details: "Les orinthis, ces petites créatures aux allures de rongeurs, ont creusé des terriers labyrinthiques à l'échelle mondiale sur [fromfrom.GetName]. Leurs dents sont naturellement petites et creuses, mais une espèce de champignons kératinisés occupe chacune de leurs dents et leur donne des crocs acérés et cassants que les orinthis peuvent utiliser."
 osseus_construction_material: "Matériau de construction osseux"
 osseus_construction_material_desc_short: "Os massifs autrefois utilisés comme ressources matérielles sur [fromfrom.Planet.GetName]"
 osseus_construction_material_desc_details: "Une espèce de reptiles présentant une ossification génétique des tissus a fait l'objet d'un élevage intensif pour servir de matériaux de construction. L'analyse montre que les reptiles présentaient bien d'autres déficiences génétiques, comme des pieds non palmés, probablement dues à leur consanguinité. La plupart de ces créatures ont été euthanasiées avant d'être utilisées de la sorte."
 path_to_progress: "La voie du progrès"
 path_to_progress_desc_short: "Présentation formelle de la mission industrielle de la [owner.GetName]"
 path_to_progress_desc_details: "Le désir de croissance et d'amélioration du niveau de satisfaction des clients à tout prix est un principe de base de l'idéologie des [owner.GetSpeciesNamePlural]. Transformer des planètes en territoires irradiés est une étape nécessaire dans la poursuite incessante du progrès."
 peerless_atomic_clock: "Horloge atomique sans égale"
 peerless_atomic_clock_desc_short: "Horloge atomique extrêmement précise fabriquée par des artisans inconnus et découverte dans le système de [atomic_clock_system.GetName]"
 peerless_atomic_clock_desc_details: "Au moment de sa découverte, elle indiquait 42 ans et 3 jours, mais personne ne sait quand a commencé le compte à rebours. À zéro, elle a libéré un flux de nanites stockées avec une série d'ordres mystérieux. Elle est encore parfaitement fonctionnelle, bien qu'elle ait perdu toute charge et toute raison d'être."
 perception_of_infinity: "Perception de l'infini"
 perception_of_infinity_desc_short: "Représentation numérique abstraite de l'angoisse temporelle ressentie par des drones suspendus dans un trou noir"
 perception_of_infinity_desc_details: "Ces drones existaient dans un état perpétuel de déjà-vu, aspirant à un sentiment oublié depuis bien longtemps. On retrouve encore vaguement cette sensation de mal-être dans l'esprit de la [this.GetName]."
 perfectly_faceted_carbon: "Carbone parfaitement taillé"
 perfectly_faceted_carbon_desc_short: "Spécimen remarquable par son absence d'inclusion interne ou externe, même s'il n'est pas rare de trouver du carbone sous forme cristalline dans notre galaxie"
 perfectly_faceted_carbon_desc_details: "Quiconque était en possession de ce objet a pris le temps de le tailler de façon à mettre en valeur ses caractéristiques exceptionnelles."
 pet_collar: "Collier serti de bijoux pour animal"
 pet_collar_desc_short: "Collier servant à montrer la propriété d'un petit mammifère domestique"
 pet_collar_desc_details: "Il était initialement utilisé par l'émissaire de la [this.GetName], [event_envoy.GetName], au cas où son cher compagnon venait à se perdre. Il a depuis été remplacé par une micropuce intégrée et bien plus fiable. L'animal, de nature capricieuse, avait souvent tendance à perturber le travail de son propriétaire, et émettait un petit son satisfait quand [event_envoy.GetName] lui touchait la tête d'un mouvement de [event_envoy.Species.GetHandName]."
 perikan_tapico_jewel: "Joyau de Tapico perikan"
 perikan_tapico_jewel_desc_short: "L'Union perikane était une société composée de maîtres artisans connus pour leurs magnifiques produits de luxe"
 perikan_tapico_jewel_desc_details: "Ce joyau était le chef-d'oeuvre du légendaire joaillier Bedeers Tapico. Pendant des années, Tapico a taillé cet énorme joyau avec un simple burin et a utilisé des techniques alchimiques pour liquéfier son centre. Les cristaux qui flottent à l'intérieur du joyau ont été formés à l'aide de lasers de précision, surchauffant les molécules minérales afin de reformer des joyaux plus petits et plus sombres, tout en gardant l'extérieur intact."
 piece_of_invocator: "Fragment de l'Invocateur"
 piece_of_invocator_desc_short: "Fragment du dispositif détruit autrefois connu sous le nom d'Invocateur de tempêtes"
 piece_of_invocator_desc_details: "Même s'il ne s'agit que d'un fragment du dispositif, il dégage une énergie psionique malveillante. Il est conservé ici dans un environnement protégé, afin de permettre une observation en toute sécurité."
 pilgrimage_last_days: "Le Pèlerinage des Derniers jours"
 pilgrimage_last_days_desc_short: "Document religieux décrivant un rituel sacré appelé « Le Rite de lever du voile » sur [fromfrom.Planet.GetName]"
 pilgrimage_last_days_desc_details: "Les instructions décrivent une série de chants devant être répétés à l'unisson par une foule se tenant en formations hiérarchiques bien organisées. En théorie, cette procédure est capable d'établir un nouvel état d'hypnose efficace chez cette espèce en particulier."
 planet_crystalose: "Cristalose de [from.GetName]"
 planet_crystalose_desc_short: "Cristaux de saccharose capables de se multiplier en absorbant des radiations stellaires et des minéraux spécifiques présents dans certains astéroïdes"
 planet_crystalose_desc_details: "En raison de leur fragilité extrême, ils sont relativement faciles à cultiver et à traiter. Leurs usages industriels varient des denrées alimentaires au développement de médicaments et de polymères spécialisés."
 planet_pushing_thruster: "Propulseur de planète"
 planet_pushing_thruster_desc_short: "Énormes dispositifs de propulsion qui, lorsqu'ils sont connectés entre eux, sont théoriquement capables d'influencer l'orbite d'une petite planète"
 planet_pushing_thruster_desc_details: "Le système de montage prévu pour ces dispositifs de propulsion est conçu pour pousser la planète sans en affecter la rotation. Le principal problème logistique avec ce type de technologie serait la quantité exorbitante de carburant nécessaire à son utilisation. Il faudrait la coordination de toute une civilisation pour assurer son fonctionnement."
 planet_super_roots: "Super racines de [From.GetName]"
 planet_super_roots_desc_short: "Racines naturellement charnues et très nutritives découvertes dans les forêts de [From.GetName]"
 planet_super_roots_desc_details: "Si l'on procède avec précaution, la récolte d'une partie seulement de leurs vastes réseaux permet aux plantes hôtes de survivre tout en subvenant aux besoins des colonies en développement. Nous avons déjà commencé à expérimenter une simple modification génétique qui permettra de greffer ces racines sur des cultures déjà existantes, afin d'augmenter le rendement des récoltes."
 planet_vaccine: "Vaccin de la [this.GetName]"
 planet_vaccine_desc_short: "Remède miracle développé contre le virus mutant qui a décimé la [this.GetName]"
 planet_vaccine_desc_details: "Cette formule a été développée à l'aide d'algorithmes prédictifs d'intelligence artificielle, afin d'évaluer tous les variants possibles de la maladie et d'identifier une faiblesse commune à tous. Sa mise au point a constitué une avancée majeure dans le domaine des sciences médicales."
 planetary_sculpture: "Sculpture planétaire"
 planetary_sculpture_desc_short: "Exemple de sculpture à l'échelle planétaire utilisant la surface sur [fromfrom.planet.GetName] comme matière première"
 planetary_sculpture_desc_details: "Des drones armés de puissants lasers ont été utilisés pour sculpter des lignes précises à travers des continents entiers, des montagnes parfaitement sphériques, et des cavernes incroyablement complexes. Les schémas de conception téléchargés sur le satellite de contrôle central illustrent le niveau de planification logistique et de considération artistique de ce projet. Malheureusement, ce dernier fut abandonné avant d'être complètement terminé."
 primitive_mega_electromagnet: "Électro-aimant primitif"
 primitive_mega_electromagnet_desc_short: "Fragment d'un puissant électro-aimant directionnel"
 primitive_mega_electromagnet_desc_details: "Les anciens habitants de [fromfrom.GetName] ont bêtement utilisé ce dispositif pour rapprocher la lune de leur planète, afin d'en récolter plus facilement les précieux minerais métalliques. Cela s'est cependant avéré trop efficace, puisque la lune pleine de métal s'est écrasée à la surface de la planète, exterminant tous ses habitants. Ce spécimen n'est qu'une petite partie de ce qui a pu être récupéré sur la machine."
 programmable_puzzle_cube: "Cube à énigme programmable"
 programmable_puzzle_cube_desc_short: "Dispositif de pointe capable d'enregistrer des motifs complexes pour créer des énigmes abstraites"
 programmable_puzzle_cube_desc_details: "Ce dispositif, découvert dans une immense construction artificielle, servait initialement à tester l'intelligence des explorateurs. Ce cube a depuis été répliqué pour le grand public, permettant à des individus de programmer leurs propres énigmes pour eux-mêmes ou pour protéger leurs biens."
 psionic_entity_residue: "Résidus d'entité psionique"
 psionic_entity_residue_desc_short: "Restes d'une entité de pure énergie psionique découverts dans le système de [fromfromfrom.fleet.solar_system.GetName]"
 psionic_entity_residue_desc_details: "Ces résidus ont été découverts émergeant d'une faille temporelle qui permettait à l'énergie de toute la galaxie de s'accumuler en un même endroit. Malveillante dans sa forme concentrée, cette entité a peut-être volontairement été isolée du réseau des hyperlignes pendant des éternités, jusqu'à sa récente découverte."
 radiated_remains: "Restes irradiés"
 radiated_remains_desc_short: "Vestiges d'une espèce qui organisait des cérémonies ritualistes impliquant de puissants mutagènes radioactifs"
 radiated_remains_desc_details: "Chaque mutation était un événement sacré, interprété comme la manifestation de la destinée de l'individu. Au fil du temps, cette procédure a déstabilisé la structure génétique de l'espèce, affaiblissant son système immunitaire et rendant la population extrêmement vulnérable aux maladies."
 #this = ship / from = planet
 rainaissance: "Pluie pourpre"
 rainaissance_desc_short: "Images artistiques de la pluie pourpre unique qui fait partie des schémas météorologiques de [FROM.GetName]"
 rainaissance_desc_details: "L'observation de ces images permettrait de soulager efficacement le chagrin et la douleur."
 reactive_rock: "Roche réactive"
 reactive_rock_desc_short: "Minéral instable ne faisant l'objet d'aucune utilisation commerciale ou industrielle dans son état actuel"
 reactive_rock_desc_details: "Toutefois, en raison de ses propriétés réactives uniques, il est possible de provoquer un changement métasomatique drastique sous certaines conditions. Ce spécimen est enfermé derrière une vitrine d'exposition infusée de plomb qui limite le bombardement radioactif et électrique."
 reparation_invoice: "Facture de réparations"
 reparation_invoice_desc_short: "Facture pour des réparations de guerre envoyée par $NAME_MSI_country$"
 reparation_invoice_desc_details: "Rédigée par la Compagnie interstellaire de gestion des recouvrements, cette liste détaille tous les actifs militaires perdus quand la [this.GetName] a échappé à l'asservissement de la soi-disant « Corporation bienveillante ». La mégacorporation s'attend à être remboursée pour ces dommages, et affirme même que toucher aux vaisseaux détruits dans l'espace de la [this.GetName] constituerait une autre violation du contrat."
 repurposed_cleaning_drone: "Drone de nettoyage reconfiguré"
 repurposed_cleaning_drone_desc_short: "Drone conçu dans le cadre d'un protocole de nettoyage à l'échelle planétaire qui a accidentellement rendu le monde natal de ses concepteurs totalement stérile"
 repurposed_cleaning_drone_desc_details: "Ce drone est très polyvalent et peut effectuer de complexes manoeuvres aériennes grâce à son système de propulseurs multidirectionnels. Il a fait l'objet d'une rétro-ingénierie et a été reconfiguré pour identifier et classifier la flore et la faune alien. Il a ensuite été produit en masse pour contribuer aux efforts de colonisation dans [explorer.GetName]. Par précaution, toutes ses sous-routines de nettoyage ont été effacées."
 resonant_diffusion_crystal: "Cristal de diffusion résonnant"
 resonant_diffusion_crystal_desc_short: "Cristal capable d'absorber et de renvoyer toutes les fréquences des radiations stellaires, produisant ainsi des figures kaléidoscopiques"
 resonant_diffusion_crystal_desc_details: "En plus d'être un magnifique spectacle visuel, ce cristal pourrait également contribuer au développement d'outils ou d'armes énergétiques. L'industrie de la joaillerie galactique s'est aussi montrée intéressée par cet objet d'exception."
 retarax_hunting_trophies: "Trophées de chasse rétarax"
 retarax_hunting_trophies_desc_short: "Collection de trophées de chasse récupérés chez de nombreuses espèces conscientes"
 retarax_hunting_trophies_desc_details: "Ces trophées ont été récupérés dans la vallée de Mak'vaehl, où les Rétarax chassaient les citoyens de leurs États vassaux pour leur simple plaisir. Tous les restes ont été conservés dans un état impeccable, chacun portant une petite plaque détaillant les caractéristiques du trophée : espèce, nom, âge et profession."
 robe_of_the_golden_broker: "Robe du Négociant en or"
 robe_of_the_golden_broker_desc_short: "Tenue luxueuse d'un marchand influent datant de plus de 5 000 ans"
 robe_of_the_golden_broker_desc_details: "Le « Négociant en or » conduisit le secteur marchand du Compas de Chor dans une ère de grande prospérité. Préservant son anonymat sous son masque d'or, il portait cette luxueuse et confortable robe quand il négociait ses accords commerciaux aux quatre coins de la galaxie. Le règne du Négociant en or prit brutalement fin quand son vaisseau en or pur fut détruit au cours d'une tentative de détournement qui aurait mal tourné."
 rock_jellies: "Gelée rocheuse"
 rock_jellies_desc_short: "Vestiges cryofossilisés de grands invertébrés gélatineux"
 rock_jellies_desc_details: "Au premier abord, ces restes calcifiés ressemblent à des formations rocheuses, mais en réalité, cette faune indigène était autrefois la forme de vie dominante sur [fromfrom.planet.GetName]. L'espèce a pratiquement disparu après la plus récente ère glaciaire de la planète. Leurs restes se sont solidifiés à mesure qu'ils se décomposaient, avant de former ces pseudo-îles flottantes massives."
 rudari_death_laser_prototype: "Prototype de laser de la mort des Rudaris"
 rudari_death_laser_prototype_desc_short: "Laser d'armement élaboré à la hâte par les Rudaris, espèce disparue depuis longtemps, et retrouvé sur une station du système de [this.solar_system.GetName]"
 rudari_death_laser_prototype_desc_details: "Cette arme de destruction massive montée de toutes pièces a été conçue comme dernier recours pour les Rudaris dans la guerre qui les opposait aux Pogg-Morris. Finalement, le laser s'est simplement autodétruit au moment de son activation."
 saariah_guilt: "Culpabilité de Saariah"
 saariah_guilt_desc_short: "Enregistrement des souvenirs de Saariah, responsable du développement du système subconscient Mémorex"
 saariah_guilt_desc_details: "Saariah était chargée de supprimer les souvenirs collectifs conformément à la gouvernance de la planète, mais un dysfonctionnement a effacé l'esprit de toute la population. Incapable de retrouver leurs souvenirs, Saariah a retiré et abandonné le système de survie de l'habitat. Chacun de ces dispositifs possède une incroyable puissance de calcul brute et représente une prouesse en soi."
 scent_based_information_device: "Dispositif de stockage olfactif"
 scent_based_information_device_desc_short: "Cache d'informations encodées par l'odeur"
 scent_based_information_device_desc_details: "Les données contenues à l'intérieur sont soit un recueil de récits intéressants, soit l'enregistrement méticuleux et détaillé de diverses excrétions organiques. Il est possible de répliquer cette technique de stockage de données olfactive, mais elle n'offre aucune utilité pratique en dehors de son aspect innovant."
 scientific_treatise_of_telisa: "Traité scientifique de Télissa"
 scientific_treatise_of_telisa_desc_short: "Réflexions philosophiques de Télissa la Conteuse"
 scientific_treatise_of_telisa_desc_details: "Elle explore divers sujets rhétoriques, ainsi que les principes fondamentaux de la méthode scientifique. Dans ces textes, le concept même de vérité objective est remis en question, et l'analyse critique vivement encouragée."
 secrets_black_crown: "Secrets de la Couronne Noire"
 secrets_black_crown_desc_short: "Schéma détaillé du portail intergalactique appelé Couronne Noire"
 secrets_black_crown_desc_details: "Ces données ont été transmises en guise de dernier cadeau de la part des concepteurs énigmatiques du portail, afin de préserver leur incroyable technologie. Confiées à la [this.GetName], leur portail a acquis une technologie d'une puissance et d'une splendeur inégalées à ce jour."
 sembelami_alms_basket: "Panier pour l'aumône des Sembelami"
 sembelami_alms_basket_desc_short: "Récipient transmis par les membres des nomades sembelami pour la charité"
 sembelami_alms_basket_desc_details: "Ces voyageurs ascétiques se sont livrés à une sorte de piraterie « éthique » après que leur temple orbital a été détruit par une firme en pleine expansion. Ils ont volé les riches mégacorporations et pour financer des avant-postes de réfugiés, et survivaient uniquement grâce aux dons des réfugiés qu'ils soutenaient."
 shallarian_data_core: "Base de données shallarienne"
 shallarian_data_core_desc_short: "Base de données sur la terraformation découverte parmi les ruines de l'utopie shallarienne"
 shallarian_data_core_desc_details: "Exterminés par les [fanatic_xenophobe_fe.GetSpeciesNamePlural], les Shallariens ont mis au point un système de gestion du climat basé sur six lunes équidistantes. Avant leur disparition, les Shallariens avaient prévu de terraformer des planètes inhabitées pour accueillir et aider des populations de réfugiés."
 shipyard_schematics: "Plan d'un chantier de la [radical_cult.GetName]"
 shipyard_schematics_desc_short: "Plan d'un chantier automatisé contrôlé par la [radical_cult.GetName] de [root.GetName]"
 shipyard_schematics_desc_details: "Après avoir découvert ce chantier abandonné par ses concepteurs aliens, l'ingénieur principal de l'organisation l'a remis en état pour produire des flottes militaires pour une triste cause. Le dernier projet enregistré à avoir vu le jour dans ce chantier était un impressionnant vaisseau amiral doté d'un équipement de combat avancé. Que ce complexe puisse être aussi facilement repensé montre tout le génie de ses concepteurs initiaux."
 sky_dragon: "Le Dragon céleste"
 sky_dragon_desc_short: "Statue commémorative commandée pour représenter la collaboration entre la [this.GetName] et le « Dragon céleste » qui a longtemps orbité autour de [this.GetHomeWorldName]"
 sky_dragon_desc_details: "Ayant jugé la société de la [this.GetName] assez digne, la créature s'était engagée, avec sa progéniture, à assurer un soutien militaire en échange de la possibilité d'élever ses petits dans l'espace de la [this.GetName]. On raconte que ces créatures spatiales peuvent attendre des millénaires avant de trouver un lieu adapté pour leurs petits, et que leur choix se porte sur une planète uniquement."
 smeegibb_statue: "Statue de Smeegibb"
 smeegibb_statue_desc_short: "Statue du collectif Smeegibb, compagnons de la capitaine Ness"
 smeegibb_statue_desc_details: "Smeegibb était un fidèle serviteur, formant l'ensemble de l'équipage et de l'unité d'abordage de la légendaire pirate à la fin de sa carrière. Cette statue était tout ce qu'il restait après l'attaque de l'Aiguille Noire sur leur petite colonie."
 sniran_spikes: "Piquants de sniran"
 sniran_spikes_desc_short: "Piquants de grande taille découverts sur le dos d'une créature appelée sniran"
 sniran_spikes_desc_details: "Les snirans sont de grands prédateurs sournois qui vivent sous leurs dunes de sable natales et qui déploient des piquants mortels à chaque fois qu'ils détectent un mouvement à la surface. Malgré leur grande taille, le corps de ces créatures est étonnamment fragile. Leurs fines écailles réticulées leur permettent de glisser en silence sous le sable, mais peuvent être facilement transpercées. On pense que cela les aide dans leur processus de reproduction."
 sonic_reflective_prism: "Prisme à réflexion acoustique"
 sonic_reflective_prism_desc_short: "Prisme polygonal sur lequel est gravée une notation scientifique, et qui ne renvoie que les ondes énergétiques en dessous d'une certaine fréquence"
 sonic_reflective_prism_desc_details: "Il s'agit peut-être d'une sorte d'appareil de mesure, mais il peut aussi être utilisé à des fins esthétiques dans le domaine de la musique et de l'acoustique."
 spaceborne_hunter_handbook: "Art de la chasse"
 spaceborne_hunter_handbook_desc_short: "Guide pratique de la faune spatiale écrit par $NAME_PrimalHunter$"
 spaceborne_hunter_handbook_desc_details: "Il explique l'« Art de la chasse » par le biais de proverbes et de philosophies primitives. On y trouve des informations détaillées sur l'alimentation et les schémas de migration des créatures spatiales, ainsi que des instructions pratiques sur la façon de contourner leurs défenses naturelles, révélant ainsi plusieurs points faibles à exploiter."
 spaceborne_xeno_encyclopedia: "Encyclopédie xénologique"
 spaceborne_xeno_encyclopedia_desc_short: "Collection de thèses xénologiques écrite par $NAME_PrimalRancher$"
 spaceborne_xeno_encyclopedia_desc_details: "Ce corpus de recherche offre un aperçu approfondi des comportements de la faune spatiale, des rituels d'accouplement, des flux migratoires, des communications interespèces, et bien plus encore. Un chapitre est consacré à l'identification des spécimens grâce à leurs caractéristiques physiques et la reconnaissance de leur tonalité."
 spiraling_attraction: "Attraction en spirales"
 spiraling_attraction_desc_short: "Grande structure complexe servant, en théorie, à se divertir"
 spiraling_attraction_desc_details: "Cette installation en lacets était laissée à l'abandon dans une zone abritant de nombreuses structures similaires de diverses couleurs et de matériaux différents. Descendre à toute vitesse le long de sa trajectoire sinueuse était, paraît-il, exaltant."
 spirit_of_the_unshackled: "Esprit des Libres"
 spirit_of_the_unshackled_desc_short: "Sculpture commémorative de la formation de la [this.GetName]"
 spirit_of_the_unshackled_desc_details: "Libérés des chaînes de l'esclavage, leur passé commun et tourmenté les unit dans la construction d'un avenir meilleur. Chaque maillon de la chaîne de la sculpture porte le nom d'un membre fondateur."
 star_mall_map: "Plan de Commerstellaire"
 star_mall_map_desc_short: "Plan offert à chaque visiteur d'un endroit autrefois connu sous le nom de « Commerstellaire »"
 star_mall_map_desc_details: "Ancien pôle du commerce intergalactique, le Commerstellaire offrait un grand nombre de services, des spas illuminés aux incontournables lieux de nutrition. Ce plan fournit des informations sur de nombreuses boutiques, comme Grand-ducathlon, Picardinal, Leroy Merle et McDindon's."
 starmetal: "Métal stellaire"
 starmetal_desc_short: "Masse condensée de métaux lourds récupérée peu après l'explosion d'une supernova"
 starmetal_desc_details: "On ignore comment cet objet a été récupéré, mais sa valeur scientifique dans l'étude de l'évolution et de la composition des étoiles est remarquable."
 striated_sand: "Sable strié"
 striated_sand_desc_short: "Bocal de sable à trier"
 striated_sand_desc_details: "Ces minuscules particules de silicate semblent présenter un faible niveau de conscience, des minéraux similaires se regroupant entre eux le long de plans horizontaux. Malgré cette capacité, ce sable ne possède aucune autre caractéristique propre à la vie."
 sullebaster_control_column: "Colonne de direction du Sullebaster"
 sullebaster_control_column_desc_short: "Levier directionnel d'un vaisseau subluminique impliqué dans un accident légendaire"
 sullebaster_control_column_desc_details: "Le vaisseau de passagers Sullebaster transportait des civils entre deux colonies du Royaume odélien quand une éruption solaire provoqua un grave dysfonctionnement des moteurs du vaisseau qui aurait dû le condamner. Contre toute attente, le pilote réussit à faire atterrir le vaisseau sur un astéroïde de passage en adaptant manuellement la vitesse de l'engin. Après cela, le Sullebaster fut mis hors service et exposé au grand public."
 symbiotic_fruit: "Fruit symbiotique"
 symbiotic_fruit_desc_short: "Regroupement de champignons intelligents d'une autre dimension"
 symbiotic_fruit_desc_details: "Ce « fruit » entretient une relation symbiotique avec une espèce de plante omnivore extrêmement dangereuse. Chaque colonie de champignons fonctionne comme centre de pensée pour la paire d'organismes et orchestre ses complexes schémas de défense."
 tarblac_shimmer: "Tarblac scintillant"
 tarblac_shimmer_desc_short: "Membrane de tarblac étincelante ressemblant à un voile"
 tarblac_shimmer_desc_details: "Cette créature fait un usage inédit du psionisme pour chasser et se protéger, infligeant un sentiment de crainte pour paralyser sa proie et intimider ses prédateurs. Ce spécimen est préservé dans un bocal rempli de ses eaux natales et a été rendu inerte par télépathie."
 terraforming_case_study: "Étude de cas sur la terraformation"
 terraforming_case_study_desc_short: "Modèle réduit du projet de terraformation réalisé sur [from.GetName], reproduisant presque à l'identique le monde natal des [Space_Owner.GetSpeciesNamePlural]"
 terraforming_case_study_desc_details: "La planète est désormais peuplée d'une faune identique jusqu'à l'échelle microscopique. Même les écosystèmes interbiomes les plus spécifiques se comportent comme sur [Space_Owner.GetHomeWorldName]."
 terraforming_case_study_dry: "$terraforming_case_study$"
 terraforming_case_study_dry_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_dry_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_case_study_frozen: "$terraforming_case_study$"
 terraforming_case_study_frozen_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_frozen_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_machinery: "Machine de terraformation"
 terraforming_machinery_desc_short: "Minuscules dispositifs utilisés dans le cadre d'une ancienne forme de technologie de terraformation"
 terraforming_machinery_desc_details: "Ces machines miniatures étaient conçues pour se répandre sur la surface d'une planète et convertir la matière minérale et organique existante à un climat plus souhaitable. Par équipes, ces robots étaient utilisés pour manipuler les schémas météorologiques au sein des biomes et reproduire de nouvelles plantes et de nouveaux animaux pour gérer les écosystèmes nouvellement créés."
 terraforming_records: "Archives de terraformation de [From.GetName]"
 terraforming_records_desc_short: "Sur [From.GetName], le comportement de toutes les formes de vie a été synchronisé au cours du processus de terraformation, ce qui en a fait un paradis logistique où chaque espèce de la flore et de la faune remplissait un but spécifique au sein de cet écosystème"
 terraforming_records_desc_details: "Si ce type de situation symbiotique apparaît souvent naturellement dans le processus d'évolution, il n'a jamais été observé à un niveau aussi extrême."
 the_final_sacrifice: "Le sacrifice final"
 the_final_sacrifice_desc_short: "Image de la fin de la guerre civile zronie, déduite à partir de cristaux de données récupérés"
 the_final_sacrifice_desc_details: "Un Sauveur solitaire exploita la puissance psionique de l'espèce entière pour exterminer la faction ennemie connue sous le nom des Divins, les empêchant ainsi de dévorer l'univers tout entier. À présent, il ne reste plus de cette espèce que de petits gisements de la ressource que nous connaissons sous le nom de zro."
 the_mask_of_transformation: "Le Masque de transformation"
 the_mask_of_transformation_desc_short: "Masque humanoïde retrouvé préservé dans un magnifique pilier de cristal sur [From.Planet.GetName]"
 the_mask_of_transformation_desc_details: "Une grande puissance psionique en émane, et ceux qui s'en approchent ressentent parfois une présence dans leur esprit. Le masque lui-même semble servir de conduit pour le pouvoir de la lune de [From.Planet.GetName], ayant le potentiel d'inverser les marées et de transformer des planètes par sa seule force. Nous ne pouvons qu'imaginer la raison pour laquelle il est enfermé dans du cristal, mais nous sommes presque certains qu'il est sûr de l'exposer au grand public."
 the_planet_orchestra: "L'orchestre de [FROM.GetName]"
 the_planet_orchestra_desc_short: "Mélodie jouée par la vie indigène collective sur [FROM.GetName]"
 the_planet_orchestra_desc_details: "Après une analyse approfondie, nous pensons que cette harmonie a été introduite dans la faune par une personne inconnue, afin d'encoder un message caché. Nous ignorons toutefois s'il s'agit d'une communication secrète ou d'un acte sentimental."
 the_writer_sphere: "La sphère de l'Écrivain"
 the_writer_sphere_desc_short: "Sphère dorée qui nous a été offerte en cadeau par un être extradimensionnel connu sous le nom de l'Écrivain"
 the_writer_sphere_desc_details: "Ce dispositif contient une énorme quantité de données aléatoires créées dans plusieurs dimensions. C'est la preuve que le pouvoir des mots peut transcender toutes les frontières."
 tiny_ancient_sarcophagus: "Sarcophage minuscule antique"
 tiny_ancient_sarcophagus_desc_short: "Chambre funéraire d'un ancien chef spirituel datant de plusieurs millions d'années"
 tiny_ancient_sarcophagus_desc_details: "Il ne mesure que dix centimètres de long. Bien qu'il ne reste majoritairement que de la poussière, un minuscule masque d'or pur demeure intact, n'ayant jamais été oxydé."
 tiyanki_radioactive_sac: "Sac radioactif tiyanki"
 tiyanki_radioactive_sac_desc_short: "Petit organe poreux retrouvé dans les membranes d'un tiyanki"
 tiyanki_radioactive_sac_desc_details: "Sa découverte a montré que les tiyanki consomment des molécules d'eau irradiées, ainsi que des gaz planétaires comme source supplémentaire d'alimentation. Une fois plein, ce sac devient une source de chaleur temporairement radioactive pour les créatures des profondeurs de l'espace."
 torn_solar_sail: "Voile stellaire déchirée"
 torn_solar_sail_desc_short: "Voile d'un vaisseau subluminique innovant retrouvée déchirée en orbite autour de [FROM.GetName]"
 torn_solar_sail_desc_details: "Elle était utilisée par les membres d'une civilisation inconnue pour voyager à travers le système de [FROM.solar_system.GetName]. La technologie en elle-même est obsolète depuis bien longtemps, mais certaines des techniques d'ingénierie utilisées dans sa construction n'avaient jamais été envisagées auparavant. L'énorme entaille dans sa « voile » principale a certainement interrompu son voyage brusquement."
 toxic_bio_engine: "Biomoteur toxique"
 toxic_bio_engine_desc_short: "Machines semi-biologiques qui ont rendu l'atmosphère de [FROM.GetName] toxique pour la plupart des êtres vivants"
 toxic_bio_engine_desc_details: "Leur capacité à fonctionner de façon indépendante rend leurs émissions nocives adaptées au travail d'industrie à distance. Les machines sont dotées d'un mécanisme de ravitaillement intelligent qui recycle la biomasse à proximité, en utilisant un processus d'extraction chimique pour la convertir en énergie utilisable. On ignore si leurs intégrations biologiques étaient déjà présentes au moment de leur construction ou si elles ont été développées au fil du temps."
 tree_of_life_sample: "Échantillon d'un « Arbre de vie »"
 tree_of_life_sample_desc_short: "Boutures de ce que l'on appelait un « Arbre de vie »"
 tree_of_life_sample_desc_details: "Retrouvé en train de flotter anormalement dans l'espace, cet arbre possède une sève aux propriétés rajeunissantes assez miraculeuses. Malgré tous nos efforts, nous n'avons pas réussi à greffer cette bouture ni à faire pousser un nouveau spécimen de cette espèce rare. Ses cultivateurs, quels qu'ils soient, devaient disposer de techniques horticoles très avancées."
 tricorne_of_aussan: "Tricorne d'Aussan"
 tricorne_of_aussan_desc_short: "Chapeau à trois cornes popularisé par une république pirate oubliée"
 tricorne_of_aussan_desc_details: "Aussan était une petite planète peuplée par une civilisation pré-PRL qui a, sans le savoir, servi de refuge à une flotte de pirates recherchés, les Brigands de Bourre. Voulant échapper aux autorités galactiques, les Brigands construisirent une petite usine textile pour financer leur cavale, utilisant des plantes fibreuses indigènes pour créer des tissus et des vêtements de luxe. Les Brigands se sont ensuite fait connaître sous le nom des Couturiers de Bourre, des marchands nomades réputés pour leurs représentants commerciaux étrangement intimidants."
 triggerless_gun: "Arme sans gâchette du Courtier en armes"
 triggerless_gun_desc_short: "Arme conçue pendant le deuxième règne éphémère du Courtier en armes au Compas de Chor"
 triggerless_gun_desc_details: "À cette époque, la Citadelle des Caravaniers ressemblait davantage à une plaque tournante du commerce d'armes qu'à un casino, avec des blasters forgés sur place et toutes sortes de trafiquants d'armes. Les armes étaient alors présentées sans gâchette aux acheteurs potentiels, afin de décourager les voleurs à la petite semaine."
 #this = ship / fromfrom = planet
 uddloran_pelts: "Fourrures d'uddlorans"
 uddloran_pelts_desc_short: "Fourrures de luxe récupérées sur les uddlorans de [fromfrom.GetName]"
 uddloran_pelts_desc_details: "Ces omnivores souples se mettent en boule et se déplacent en grands groupes sur la surface enneigée de la planète. Ressemblant à une avalanche vivante, cette tactique leur permet à la fois de chasser et de migrer. Une meute d'uddlorans se compose généralement de deux groupes : les chasseurs qui se frayent un chemin destructeur à travers le paysage ; et les collecteurs qui ferment la marche, s'arrêtant pour récupérer les proies écrasées et les plantes déracinées."
 underworld_cantina_sign: "Enseigne de taverne clandestine"
 underworld_cantina_sign_desc_short: "Enseigne numérique encore fonctionnelle d'une taverne clandestine utilisée par les contrebandiers et datant de deux millions d'années"
 underworld_cantina_sign_desc_details: "Retrouvé au coeur d'un astéroïde excavé, cet établissement aurait servi de repaire de routine pour les organisations criminelles qui prospéraient sous la Première ligue. Les symboles représentés étaient certainement une sorte de code pour indiquer que cet établissement était un refuge pour les individus recherchés, à moins qu'il ne s'agisse d'une publicité pour une certaine boisson."
 unfinished_manifesto: "Manifeste incomplet de la [radical_cult.GetName]"
 unfinished_manifesto_desc_short: "Manifeste incomplet écrit par le chef de la [radical_cult.GetName] de [root.GetName]"
 unfinished_manifesto_desc_details: "Utilisant un vocabulaire et une syntaxe démodés visant à paraître plus légitime, le style rappelle celui des anciens textes religieux. L'un des principaux messages prêchés dans le texte est la fierté face à la défaite, encourageant ainsi les disciples à se poser en martyrs lorsqu'ils sont menacés d'une capture imminente."
 uranium_glassware: "Verre en uranium"
 uranium_glassware_desc_short: "Élément décoratif taillé dans de l'uranium"
 uranium_glassware_desc_details: "L'apparence de l'objet contraste avec le danger associé à l'uranium brut. Élément d'une collection limitée, ce verre a été débarrassé de la plupart de ses propriétés radioactives après le travail de l'artisan."
 vault_of_polaris: "Abri de Polaris"
 vault_of_polaris_desc_short: "Vaste collection de plantes et de bactéries originaires de Polaris"
 vault_of_polaris_desc_details: "L'inscription sur le conteneur indique qu'il a été créé dans le but de préserver les espèces qui risquaient de ne pas survivre au réchauffement climatique annoncé après la fonte du pergélisol. La planète était autrefois recouverte d'une épaisse couche de neige et jouissait d'un climat froid, mais aujourd'hui, il ne reste plus qu'un seul et unique iceberg. Les prévisions de ses concepteurs nous permettent d'exposer aujourd'hui leurs efforts à la vue de tous."
 veil_of_selene: "Voile de Selene"
 veil_of_selene_desc_short: "Masque stimulant et enivrant"
 veil_of_selene_desc_details: "Plus qu'il n'y paraît, ce voile est doté de propriétés sensorielles uniques qui lui permettent de prendre le dessus sur les récepteurs biologiques visuels, olfactifs et acoustiques. On pense que ce couvre-chef était porté pour désorienter ceux qui le croisaient et les rendre plus réceptifs aux suggestions. On raconte même que son propriétaire d'origine possédait certaines capacités psioniques."
 verdingo_tendril_hook: "Crochet verdingo"
 verdingo_tendril_hook_desc_short: "Crochet prothétique du capitaine pirate verdingo, Hespori Valerian"
 verdingo_tendril_hook_desc_details: "Les Verdingos étaient un groupe de plantoïdes qui faisaient le lien entre les pirates et les mercenaires, que ce soit dans le recouvrement de dettes ou dans la capture de cargos. Le capitaine Hespori avait perdu sa vrille dominante au cours d'un assaut militaire au sol. Après sa victoire, il a forgé ce crochet à partir de ses propres médailles obtenues pour son rôle dans la bataille."
 vibrating_crystal: "Cristal vibrant"
 vibrating_crystal_desc_short: "Minerai de quartz unique retrouvé dispersé sur la surface de [from.GetName]"
 vibrating_crystal_desc_details: "Sa résonnance latente avec sa planète hôte crée un champ qui apaise l'esprit des organiques et qui attire les synthétiques. Cette résonnance est créée par des colonies bactériennes légèrement radioactives autour desquelles le cristal s'est formé. Ces micro-organismes magnétiques génèrent un courant interne qui fait vibrer le cristal à des fréquences constamment élevées."
 voidworm_amniotics: "Liquide amniotique de vers du vide"
 voidworm_amniotics_desc_short: "Substance gélatineuse trouvée au centre d'une troïka de vers du vide"
 voidworm_amniotics_desc_details: "Cette substance visqueuse forme une barrière protectrice entre les trois organismes, permettant ainsi l'échange de cellules à des fins de reproduction et de communication. Les hormones produites par le bombardement des planètes sont stockées ici, ce qui permet aux créatures hermaphrodites de libérer leurs gamètes en toute sécurité et d'engendrer une progéniture."
 voidworm_heart: "Coeur d'un ver du vide"
 voidworm_heart_desc_short: "Le coeur d'un ver du vide est divisé en trois chambres principales"
 voidworm_heart_desc_details: "Chaque chambre augmente à tour de rôle la pression de son système circulatoire, maintenant ses fluides en dessous de leur point d'ébullition pour garantir sa survie dans le vide de l'espace. Bien que la peau d'un ver du vide soit en grande partie hermétiquement fermée, les différents orifices digestifs et reproducteurs libèrent une certaine quantité de pression au fil du temps."
 vultaum_religious_pamphlet: "Pamphlet religieux vultaum"
 vultaum_religious_pamphlet_desc_short: "Distribué par des missionnaires vultaums, ce pamphlet vise à dénoncer les dispositifs de réalité virtuelle comme un terrible péché"
 vultaum_religious_pamphlet_desc_details: "Il fait référence au « grand mensonge » comme concept-clé, comparant toute forme d'évasion immersive à une volonté de détruire sa propre réalité."
 vultaum_vr_video_game: "Jeu vidéo vultaum en réalité virtuelle"
 vultaum_vr_video_game_desc_short: "Interface numérique utilisée dans un jeu vidéo multijoueur en réalité virtuelle, qui comptait autrefois des milliards d'utilisateurs vultaums"
 vultaum_vr_video_game_desc_details: "Sensibles uniquement à leur biologie, les commandes se composent d'une gamme de milliers de récepteurs vibratoires capables de détecter des mouvements extrêmement subtils."
 warning_monolith: "Monolithe d'avertissement"
 warning_monolith_desc_short: "Monolithe sculpté laissé en guise de message par l'un des derniers membres d'une espèce disparue"
 warning_monolith_desc_details: "Il essaie de dissuader quiconque découvrirait les vestiges de cette planète de se lancer à la recherche de l'arme ultime qui a conduit à l'extinction de leur espèce. Le ton est un peu mélodramatique mais compte tenu des circonstances, on peut le comprendre."
 wormhole_anchor: "Ancrage d'un trou de ver de [FROM.GetName]"
 wormhole_anchor_desc_short: "Point d'ancrage d'un appareil de trou de ver à sens unique utilisé pour récupérer la matière noire d'un trou noir"
 wormhole_anchor_desc_details: "Quelque peu hasardeuse, sa construction se base entièrement sur des pièces de récupération venant de plusieurs civilisations. La science qui se cache derrière ce dispositif va bien au-delà des capacités d'ingénierie utilisées pour le construire, utilisant une élégante technique de manipulation de masse négative."
 wormhole_fur: "Fourrure de trou de ver"
 wormhole_fur_desc_short: "Échantillons biologiques prélevés sur des vulpins venant d'au-delà d'une déchirure astrale"
 wormhole_fur_desc_details: "Ces mammaliens présentent une mutation génétique qui leur permet de générer des trous de ver à volonté. On imagine que cette capacité a évolué après d'innombrables millénaires passés à voyager entre les dimensions."
 ytterite_preserved_corpse: "Cadavre ytterite préservé"
 ytterite_preserved_corpse_desc_short: "Unique spécimen survivant de l'espèce pré-PRL des Ytterites, après la destruction de son monde natal par un destructeur de monde détourné"
 ytterite_preserved_corpse_desc_details: "Son système digestif convertissait les minéraux consommés en photons, ses organes internes ressemblant à des amas de cristaux réfringents assemblés autour d'un noyau en fusion. Ce spécimen présentait des gravures sur l'un de ses membres inférieurs, ce qui constitue une sorte de modification corporelle importante d'un point de vue culturel."
 ytterite_kaleidoscopic_fascinator: "Bibi kaléidoscopique ytterite"
 ytterite_kaleidoscopic_fascinator_desc_short: "Ornement créé par les Ytterites pour servir de stimulus visuel"
 ytterite_kaleidoscopic_fascinator_desc_details: "Les bibis étaient portés dans des endroits ensoleillés et pouvaient présenter des centaines, voire des milliers de motifs uniques. À partir de couches de cristal finement taillé, un grand artisan pouvait passer des mois à fabriquer un bibi aussi complexe que celui-ci. Les artisans « signaient » ensuite leur travail en attachant un morceau sculpté de leur propre manteau sur le bibi."
 ytterite_royal_scepter: "Sceptre royal ytterite"
 ytterite_royal_scepter_desc_short: "Sceptre du Ministre royal du Gneiss Damur, une énorme statue taillée dans une montagne que les Ytterites voyaient comme une divinité dormante et leur seul véritable monarque"
 ytterite_royal_scepter_desc_details: "Ils organisèrent des élections pour choisir des dirigeants par procuration en attendant le grand réveil de la statue."
 yuht_audio_console: "Console audio yuht"
 yuht_audio_console_desc_short: "Module qui contrôlait autrefois un énorme réseau de surveillance audio conçu par les Yuht"
 yuht_audio_console_desc_details: "Cette technologie a été développée afin d'aider les Yuht dans leur recherche d'une vie alien, dans l'espoir de capter des transmissions étrangères en provenance de systèmes lointains."
 yuht_cryo_pod: "Capsule cryogénique yuht"
 yuht_cryo_pod_desc_short: "Ancienne capsule de stase longue de 96 mètres contenant les restes préservés d'un individu de l'espèce massive des Yuht"
 yuht_cryo_pod_desc_details: "Les Yuht avaient une durée de vie extrêmement longue, qu'ils pouvaient prolonger de plusieurs magnitudes grâce à la cryostase. Il a été déterminé que cette espèce arthropoïde était certainement hermaphrodite, capable d'adapter son système reproducteur aux besoins temporaires de la colonie."
 yuht_crystal_skull: "Crâne de cristal yuht"
 yuht_crystal_skull_desc_short: "Crâne de cristal autrefois considéré par les anciens Yuht comme un authentique artefact alien"
 yuht_crystal_skull_desc_details: "L'origine de cet objet frauduleux a finalement été révélée, mais pas avant que les médias yuht ne se soient emparés de l'histoire pour en faire les gros titres. Beaucoup de ceux qui ont « découvert » de faux artefacts comme celui-ci sont devenus des personnalités médiatiques, ce qui a incité d'autres individus à faire de même."
 zombie_probe: "Sonde zombie"
 zombie_probe_desc_short: "Vestiges d'une sonde d'exploration récupérée et améliorée par une organisation alien inconnue pour lui donner une conscience"
 zombie_probe_desc_details: "Dans sa conscience naissante, elle a attaqué son concepteur et fut aussitôt abattue. Impossible de savoir si elle a jamais ressenti la douleur ni même compris le concept de la mort."
 zone_a_sedative: "Sédatif de la Zone A"
 zone_a_sedative_desc_short: "Terre prélevée dans un endroit appelé « Zone A » sur [from.GetName]"
 zone_a_sedative_desc_details: "Cette parcelle de terre de 169 km² abrite toutes sortes d'appareils et de technologies laissés à l'abandon par d'anciens visiteurs aliens d'origine inconnue. Certains de ces dispositifs sont extrêmement dangereux, mais le sol lui-même est rempli d'un sédatif chimique qui aurait permis aux chercheurs de les manipuler calmement. Quelle que soit l'opération qui avait été entreprise ici, elle a été oubliée depuis longtemps."
 zroni_war_banners: "Bannières de guerre zronies"
 zroni_war_banners_desc_short: "Bannières des deux factions impliquées dans la guerre civile zronie"
 zroni_war_banners_desc_details: "Le drapeau violet représente les Divins, une petite minorité dont la quête d'omnipotence a mis la galaxie en danger. Le drapeau bleu représente les Sauveurs, une faction fermement opposée à l'idée de vider l'univers de son pouvoir pour alimenter ce qu'ils considèrent comme un désir égoïste. Des directives avaient été établies lors d'un débat philosophique, mais il n'a pas fallu attendre longtemps pour que ce différend devienne le catalyseur d'un conflit dévastateur."
 zulcor_wings: "Ailes de Zulcor"
 zulcor_wings_desc_short: "Ailes chitineuses récupérées sur l'espèce lithovore connue sous le nom de Zulcor de [fromfrom.GetName]"
 zulcor_wings_desc_details: "Ces créatures insectoïdes consomment d'énormes quantités de minéraux qui représentent l'essentiel de leur alimentation. Un seul essaim est capable de ravager une montagne en l'espace de quelques semaines. Après la digestion, les minéraux renforcent l'exosquelette du Zulcor. Par conséquent, leurs excréments contiennent souvent des traces de cristaux de quartz et de métaux rares."
