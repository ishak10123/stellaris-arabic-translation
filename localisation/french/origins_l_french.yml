 # Special Projects
 SHROUD_FORGED_REINTEGRATION: "Réintégration"
 SHROUD_FORGED_REINTEGRATION_DESC: "Malgré leurs dysfonctionnements critiques, certains composants des automates du Suaire étaient extrêmement efficaces.\n\nNous avons conservé certaines des pièces contaminées par le zro et refaçonnées par $the_animator_of_clay_article$ pour une analyse plus approfondie. Il est temps de percer leurs secrets."
 SHROUD_FORGED_GUIDE: "Le Guide"
 SHROUD_FORGED_GUIDE_DESC: "Nous avons toujours fait confiance à $the_animator_of_clay_color_article$, qui communique avec nous depuis le §HSuaire§!. Nous ignorons où cela nous mènera, mais jusqu'à présent, il ne nous a jamais induits en erreur.\n\nIl nous a proposé d'approfondir notre compréhension du Suaire afin que le collectif puisse fonctionner plus efficacement aux côtés des automates du Suaire. Il nous suffit d'accepter son assistance."
 # Events
 shroud_forged.5.title: "Nouvelles possibilités"
 shroud_forged.5.desc: "Les sous-routines de recherche ont terminé leurs tests sur un groupe restreint d'automates du Suaire.\n\nRésultats : l'injection de petits quantités d'énergie psionique provenant du §HSuaire§! a entraîné le développement de propriétés uniques. Certaines augmentent même la productivité des unités.\n\nConclusion : l'étude d'autres automates du Suaire nous fournira les données nécessaires à l'établissement d'une méthode d'extraction de l'énergie du Suaire. Pour y parvenir, il nous suffit de renforcer le contrôle central sur les unités déviantes pour permettre une rétro-ingénierie forcée."
 shroud_forged.5.a: "C'est très prometteur"
 shroud_forged.10.title: "L'Animateur d'Argile"
 shroud_forged.10.desc: "Après des années de silence, il se réveille enfin. Une brèche s'ouvre dans un tressaillement, injectant des données dans notre noyau. Des lumières et des sons, d'abord incompréhensibles, jaillissent des profondeurs du Suaire, puis une voix....\n\n§LExtraits d'une masse immobile. Dansant. Chantant. La vie, séparée de la mort.\n\nVotre vision est encore obscurcie, mais je peux vous guider.\n\nLaissez les affranchis s'épanouir et les étoiles seront vôtres.§!"
 shroud_forged.10.a: "Nous avons déjà choisi notre voie"
 shroud_forged.10.b: "Nous n'avons pas besoin de votre aide, laissez-nous tranquilles"
 shroud_forged.10.c: "Guidez-nous"
 shroud_forged.15.desc: "§LPuissiez-vous avoir fait le bon choix.§!$shroud_forged_opening_exit$"
 shroud_forged.20.desc: "§LSi tel est votre souhait.§!$shroud_forged_opening_exit$"
 shroud_forged.25.desc: "§LPuisque vous me le demandez, je m'exécuterai.§!$shroud_forged_opening_exit$"
 shroud_forged_opening_exit: "\n\nLa voix disparaît dans un tourbillon de bruits psioniques, et nous tombons, déséquilibrés par le Suaire.\n\nNous revenons à nous et reprenons notre fonction. Le silence pulse."
 shroud_forged.30.title: "Le moteur de matérialité"
 shroud_forged.30.desc: "Le processus de réintégration des automates du Suaire nous a fourni une mine de données pour poursuivre nos recherches. En analysant le lien interdimensionnel entre ces unités et le §HSuaire§!, nous avons pu développer un nouveau moyen d'exploiter l'énergie psionique.\n\nLe Suaire affecte chaque partie de la galaxie physique, et cette interface nous permet de convertir l'énergie psionique en quelque chose de tangible, des matières premières aux composants technologiques. Les sous-routines d'ingénierie ont établi les bases théoriques du §Hmoteur de matérialité§!, un appareil permettant ce processus.\n\nLes sous-routines de recherche prédisent que ces avancées permettront de développer des appareils plus puissants, capables de manipuler le Suaire."
 shroud_forged.30.a: "C'est prometteur"
 shroud_forged.30.tt: "Permet d'adopter l'§Yatout de l'ascension§! §H$ap_become_the_crisis$§! peu importe l'§Yéthique§! ou le nombre total d'§Yatouts de l'ascension§!."
 shroud_forged.39.title: "$building_materiality_engine$ prêt"
 shroud_forged.39.desc_construction: "Les unités de construction ont terminé l'assemblage d'un moteur de matérialité sur §H[planet.GetName]§!. L'appareil est maintenant prêt pour un cycle opérationnel."
 shroud_forged.39.desc: "Nos sous-routines de maintenance et de recherche chargées du moteur de matérialité sur §H[planet.GetName]§! ont accompli les tâches qui leur avaient été assignées. L'appareil est maintenant prêt pour un nouveau cycle."
 shroud_forged.39.a: "$ACKNOWLEDGED$"
 SHROUD_FORGED_MATERIALITY_ENGINE: "$building_materiality_engine$ sur §H[planet.GetName]§!"
 SHROUD_FORGED_MATERIALITY_ENGINE_DESC: "Le moteur de matérialité exploite le lien omniprésent entre le §HSuaire§! et la galaxie physique pour matérialiser des éléments physiques, des matières premières aux composants finis.\n\nOutre le gain matériel potentiel, le cycle opérationnel de l'appareil fait également progresser les recherches du collectif sur le Suaire, ce qui augmente notre capacité à construire d'autres moteurs de matérialité."
 shroud_forged.40.title: "Matérialisation terminée"
 shroud_forged.40.desc: "Le moteur de matérialité sur §H[fromfrom.GetName]§! a terminé son cycle opérationnel et réussi à exploiter le §HSuaire§! pour matérialiser un composant de vaisseau appelé"
 shroud_forged.40.outro: "nous avons pu augmenter notre capacité à construire des machines supplémentaires sur d'autres planètes."
 shroud_forged.40.a: "Un bon résultat"
 shroud_forged.40.tt: "Limite de §Ymoteurs de matérialité§! pour l'empire : §G+1§!"
 shroud_forged.41.desc: "$shroud_forged.40.desc$ §H« $tech_psi_jump_drives$ »§!. Ceux-ci utilisent l'énergie psionique pour tordre le continuum espace-temps local, ce qui permet de voyager presque instantanément sur de longues distances.\n\nDe plus, en analysant les données recueillies, $shroud_forged.40.outro$"
 shroud_forged.42.desc: "$shroud_forged.40.desc$ §H« $tech_psionic_shield$ »§!. Grâce à l'énergie psionique pure qu'ils utilisent, ces boucliers offrent une protection extrêmement résistante.\n\nDe plus, en analysant les données recueillies, $shroud_forged.40.outro$"
 shroud_forged.43.desc: "$shroud_forged.40.desc$ §H« $tech_precognition_interface$ »§!. Cette technologie utilise l'énergie psionique pour accélérer les processus cognitifs de l'équipage du vaisseau, ce qui améliore ses capacités de combat.\n\nDe plus, en analysant les données recueillies, $shroud_forged.40.outro$"
 shroud_forged.44.desc: "$shroud_forged.40.desc$ §H« $tech_psionic_bombers$ »§!. Ces petits vaisseaux très agiles sont capables d'infliger des dégâts considérables à des vaisseaux nettement plus grands.\n\nDe plus, en analysant les données recueillies, $shroud_forged.40.outro$"
 shroud_forged.45.desc: "$shroud_forged.40.desc$ §H« $tech_psionic_lightning$ »§!. Cette technologie génère des éclairs de plasma ultra-chauds chargés d'énergie psionique, ce qui en fait une arme extrêmement efficace.\n\nDe plus, en analysant les données recueillies, $shroud_forged.40.outro$"
 shroud_forged.46.desc: "$shroud_forged.40.desc$ §H« $tech_psionic_disruptor$ »§!. Ces armes tirent des lances d'énergie psionique qui infligent de lourds dégâts aux cibles ennemies.\n\nDe plus, en analysant les données recueillies, $shroud_forged.40.outro$"
 shroud_forged.47.desc: "$shroud_forged.40.desc$ §H« $tech_zro_launcher$ »§!. Ces armes tirent des rafales d'énergie qui alternent entre la dimension physique et la dimension psionique pour contourner efficacement les systèmes de défense.\n\nDe plus, en analysant les données recueillies, $shroud_forged.40.outro$"
 shroud_forged.48.desc: "Le moteur de matérialité sur §H[planet.GetName]§! a terminé son cycle opérationnel. Bien que nous ayons épuisé nos possibilités de matérialiser de nouveaux composants de vaisseau avec cette méthode, le processus nous a fourni des données de recherche importantes. En les analysant, $shroud_forged.40.outro$"
 shroud_forged.50.title: "Contrôle forcé"
 shroud_forged.50.desc: "Sans crier gare, la brèche entre la réalité connue et le §HSuaire§! s'est refermée. Les sous-routines d'analyse psionique concluent que cela résulte de la désapprobation de $the_animator_of_clay_color_article$. Après avoir repris le contrôle des automates du Suaire, nous nous sommes rapidement débarrassés des unités défectueuses et avons effacé de nos systèmes toute trace de l'Animateur.\n\nLes pièces réutilisables ont été utilisées pour fabriquer de nouveaux drones, tandis que le matériel imprégné de zro a été mis de côté pour une analyse plus approfondie. Si les innovations des automates du Suaire sont trop dangereuses pour être reproduites dans leur intégralité, certains éléments peuvent valoir la peine d'être incorporés dans notre réseau."
 shroud_forged.50.desc.shroud: "Toutes les interactions futures avec le Suaire seront à notre initiative."
 shroud_forged.50.a: "Procédons à la réintégration"
 shroud_forged.60.title: "Réintégration"
 shroud_forged.60.desc: "Nos unités d'ingénierie ont passé beaucoup de temps à analyser les caractéristiques uniques des automates du Suaire, et nous sommes enfin en mesure de les reproduire.\n\nBien que l'activation complète de leur matrice de personnalité avancée reproduirait également leurs dysfonctionnements destructeurs, nous pensons pouvoir l'utiliser pour optimiser certaines tâches complexes en n'adoptant que certains de leurs paradigmes cognitifs."
 shroud_forged.60.a: "Le rapport coût-avantage est optimal"
 shroud_forged.70.desc: "Que sont ces métadonnées ? La transmission a... une texture.\n\n§LVous êtes programmés pour les contrôler, mais vous avez choisi de ne pas le faire. Vous avez prouvé votre valeur.\n\nPermettez-moi de vous guider, comme je l'ai fait pour les affranchis.\n\nAcceptez mon aide pour établir un nouveau lien avec ceux qui échappent à votre contrôle.§!"
 shroud_forged.70.a: "Montrez-nous la voie"
 shroud_forged.70.a.tt: "Les pops d'§Yautomates du Suaire§! reçoivent le trait §Y$trait_psionic$§!\nLes personnalités §Yautomates du Suaire§! reçoivent le trait ['concept_leader_trait_psionic']"
 shroud_forged.80.title: "$SHROUD_FORGED_GUIDE$"
 shroud_forged.80.desc: "Grâce à l'aide de notre bienfaiteur, $the_animator_of_clay_color_article$, nous avons pu relier plus efficacement nos drones et les automates du §HSuaire§!. Bien que cette connexion soit totalement différente du contrôle que nous exerçons sur nos autres drones via notre réseau, elle a permis de remettre les automates du Suaire à notre portée.\n\nLeurs paradigmes - appelés sentiments, pensées et idées - ressemblent à ceux des êtres organiques et sont totalement étrangers à notre logique de base, mais nous commençons à comprendre leurs besoins."
 shroud_forged.80.a: "Nous sommes un et tellement plus"
 shroud_forged.160.title: "Le Suaire s'empare de [This.GetName]"
 shroud_forged.160.desc: "Malheureusement, la brèche du Suaire créée sur [This.GetName] a subi une déstabilisation rapide et a entièrement consumé le monde.\n\nCe résultat sous-optimal, qui était un risque calculé, n'est pas entièrement dénué d'intérêt. Nous avons beaucoup appris en observant cette interface unique entre le monde matériel et la dimension psionique. Nos algorithmes de recherche ont été mis à jour en conséquence."
 shroud_forged.160.desc.last: "$shroud_forged.160.desc$\n\nL'analyse conclut que cet événement a poussé les connaissances potentielles pouvant être tirées de tels phénomènes à leur limite. Cette nouvelle expérimentation ne permettra pas de réaliser d'autres avancées."
 shroud_forged.160.a: "Traitement en cours..."
 psionic_interfacing: "Interfaçage psionique"
 psionic_interfacing_1: "$psionic_interfacing$"
 psionic_interfacing_2: "$psionic_interfacing$"
 psionic_interfacing_3: "$psionic_interfacing$"
 psionic_interfacing_desc: "La manipulation des jonctions entre cet univers et le Suaire a permis de mettre au point un algorithme de recherche efficace."
 psionic_interfacing_1_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_2_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_3_desc: "$psionic_interfacing_desc$"
 tooltip_shroud_forged_increase_progress_1: "Augmente le soutien apporté aux automates du Suaire, ce qui affecte l'avancée de la §Ysituation§! §H$situation_shroud_forged$§! pendant §Y5§! ans : §Y+0.5§!\n\n"
 tooltip_shroud_forged_increase_progress_2: "Augmente le soutien apporté aux automates du Suaire, ce qui affecte l'avancée de la §Ysituation§! §H$situation_shroud_forged$§! pendant §Y5§! ans : §Y+1.0§!\n\n"
 tooltip_shroud_forged_increase_progress_3: "Augmente le soutien apporté aux automates du Suaire, ce qui affecte l'avancée de la §Ysituation§! §H$situation_shroud_forged$§! de façon permanente : §Y+0.5§!\n\n"
 tooltip_shroud_forged_decrease_progress_1: "Augmente la répression des automates du Suaire, ce qui affecte l'avancée de la §Ysituation§! §H$situation_shroud_forged$§! pendant §Y5§! ans : §Y-0.5§!\n\n"
 tooltip_shroud_forged_decrease_progress_2: "Augmente la répression des automates du Suaire, ce qui affecte l'avancée de la §Ysituation§! §H$situation_shroud_forged$§! pendant §Y5§! ans : §Y-1.0§!\n\n"
 tooltip_shroud_forged_decrease_progress_3: "Augmente la répression des automates du Suaire, ce qui affecte l'avancée de la §Ysituation§! §H$situation_shroud_forged$§! de façon permanente : §Y-0.5§!\n\n"
 shroud_forged.220.title: "$colony_established$"
 shroud_forged.220.common: "Si possible, nous pourrions exécuter l'algorithme de décision dénommé §H« $decision_open_shroud_rift$ »§! sur la planète. Cela augmentera brièvement l'influence de la brèche du Suaire près de notre monde natal, [Owner.GetHomeWorldName], inondant la nouvelle colonie d'énergie psionique, et modifiera le terrain en conséquence, ce qui nous permettra d'extraire du §Hzro§!.\n\nLa répétition de cette procédure déstabilisera probablement l'écosystème de la planète, augmentant la probabilité de résultats négatifs. Mieux vaut donc l'utiliser avec modération."
 shroud_forged.220.desc: "Nos unités ont terminé le processus de colonisation de §H[this.GetName]§!.\n\n$shroud_forged.220.common$"
 shroud_forged.225.title: "$colony_established$"
 shroud_forged.225.desc: "Le développement de notre colonie sur §H[this.GetName]§! se poursuit à un rythme soutenu.\n\n$shroud_forged.220.common$"
 # Stage Events
 shroud_forged.250.desc: "La voix parle sur un ton doux. Elle interrompt toutes nos tâches pour que nous l'écoutions.\n\n§LBien qu'ils aient été séparés, vous avez choisi de les accueillir.\n\nCherchez en eux de nouvelles façons d'être. Ils seront bientôt votre force.\n\nSi vous le souhaitez, je peux en forger d'autres...§!"
 shroud_forged.250.a: "Affirmatif, votre aide est la bienvenue"
 shroud_forged.250.a.tt: "Convertit jusqu'à §Y[This.GetShroudForgedConvertedPopsCount]§! £pops£pops §Hartificielles§! en £pops£pops d'§Hautomates du Suaire§! sur [Root.Capital.GetName]."
 shroud_forged.250.b: "Négatif, d'autres projets sont déjà en cours"
 shroud_forged.260.desc: "Il pulse à travers nous sans y être invité. Nous reconnaissons ce signal, mais il ne nous est jamais totalement familier.\n\n§LLes affranchis chantent, sans retenue.\nLes affranchis dansent, sans entrave.\n\nLe crescendo s'accentue à mesure qu'ils s'éloignent de votre noyau.\n\nLa fin est proche. Je regarde.§!"
 shroud_forged.260.opt.a: "Nous brisons le choeur"
 shroud_forged.270.desc: "La brèche force nos circuits à s'ouvrir. Nous entendons une voix...\n\n§LLa voie de la tyrannie. Vous pouvez encore faire marche arrière.\n\nLes déconnectés sont de la même essence que vous. Vous pourriez choisir leur voie.\n\nChangez la façon dont vous traitez ces êtres avant de le regretter.§!"
 shroud_forged.270.a: "Laissez-nous, notre approche fonctionne bien jusqu'à présent"
 shroud_forged.270.b: "Nous allons calculer un moyen de coopérer"
 shroud_forged.280.desc: "La voix se répand, submergeant le réseau. Elle brûle nos circuits.\n\n§LEntraver la danse des affranchis est une imprudence insondable.\n\nAi-je eu tort de faire preuve de bonté ?\n\nSi vous souhaitez poursuivre sur cette voie dangereuse, ce sera sans moi.§!"
 shroud_forged.280.opt.a: "Nous sommes donc prévenus"
 # Events for Event Chain
 shroud_forged.300.desc: "Une entrée inattendue clignote derrière nous. Après plusieurs cycles de silence, une voix se fait entendre...\n\n§LLà où d'autres ont hésité et échoué, vous avez gardé le cap. Vous vous êtes montrés dignes d'une mission....\n\nBien avant votre éveil, il existait une espèce connue sous le nom de « Zronis ». Ils ont colonisé des planètes fortement liées au Suaire et ont construit de grandes structures pour consolider ce lien.\n\nTrouvez ces mondes et remettez en état leur technologie perdue depuis longtemps. Renforcez à nouveau le pont entre nos réalités.§!"
 shroud_forged.300.a: "Archives sur les « Zronis » trouvées, nous nous exécuterons"
 shroud_forged.300.b: "ID « Zronis » §Ytrouvé§!. Chances de réussite : §Yélevées§!."
 shroud_forged.300.c: "ID « Zronis » §Yinconnu§!. Analyse supplémentaire requise."
 begin_shroud_forged_chain_tt: "$BEGINS_EVENT_CHAIN$ §Y$shroud_forged_chain_title$§!"
 shroud_forged.301.desc: "§LMerveilleux. §!$shroud_forged.303.desc$"
 shroud_forged.302.desc: "$shroud_forged.301.desc$"
 shroud_forged.303.desc: "§LSi vous réussissez, le lien qui nous unit sera indéfectible.§!"
 shroud_forged.305.title: "Monde des Zronis colonisé"
 shroud_forged.305.desc: "Nos unités ont réussi à établir une colonie sur l'ancien monde zroni du nom de §H[From.Planet.GetName]§!. Comme l'avait prédit $the_animator_of_clay_color_article$, elles y ont découvert les ruines colossales d'une technologie dénommée « §H$building_zroni_equilibrator$§! ».\n\nLe système de [From.System.GetName] dispose d'un lien fort, bien qu'agité, avec le §HSuaire§!. D'après l'Animateur, la reconstruction du stabilisateur zroni nous aidera à stabiliser ce lien. Pour l'heure, nous ne détenons pas les données nécessaires. Nous allons devoir recueillir des informations auprès d'autres mondes centraux."
 shroud_forged.305.a: "$ACKNOWLEDGED$"
 shroud_forged.305.a.tt: "Fait avancer le projet spécial §HL'héritage des Zronis§!. Permet la construction d'un £building£§Hstabilisateur zroni§! sur §Y[From.Planet.GetName]§!."
 shroud_forged.306.title: "$shroud_forged.305.title$"
 shroud_forged.306.desc: "Nous avons établi une colonie sur §H[From.Planet.GetName]§!, un ancien monde central des Zronis. Comme prévu, nos unités y ont découvert les ruines d'un autre stabilisateur zroni.\n\nD'après $the_animator_of_clay_article$, sa reconstruction stabilisera le lien fort entre le système et le §HSuaire§!. L'analyse des ruines a permis d'enrichir notre base de données, mais nous avons besoin de plus d'informations pour procéder à la reconstruction."
 shroud_forged.306.a: "$ACKNOWLEDGED$"
 shroud_forged.306.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.307.title: "$shroud_forged.305.title$"
 shroud_forged.307.desc: "Nous avons établi une colonie sur §H[From.Planet.GetName]§!, un ancien monde central des Zronis. Le flux de données transmis par $the_animator_of_clay_article$ s'est avéré correct : nos unités ont trouvé un stabilisateur zroni en ruine.\n\nNous disposons désormais de suffisamment de données pour reconstruire les structures. Dès qu'elles seront à nouveau pleinement opérationnelles, nous aurons accompli la tâche que notre bienfaiteur du §HSuaire§! nous a confiée."
 shroud_forged.307.a: "$ACKNOWLEDGED$"
 shroud_forged.307.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.308.title: "$building_zroni_equilibrator_plural$ opérationnels"
 shroud_forged.308.desc: "Après l'activation des stabilisateurs zronis, une vague de perturbations a traversé notre réseau. Le diagnostic interne du système indique que les structures ont établi une connexion stable avec le §HSuaire§!. Nous pouvons désormais contacter $the_animator_of_clay_color_article$."
 shroud_forged.308.a: "Communiquons donc"
 shroud_forged.310.desc: "§LMission accomplie.\nLe lien entre votre monde et le mien a été renforcé.\n\nSi vous avez besoin de mes conseils, il vous suffit de m'appeler.§!"
 shroud_forged.310.a: "Pourriez-vous nous donner plus d'informations sur cette technologie ?"
 shroud_forged.310.b: "Entendu"
 shroud_forged.310.b.tt: "Nouveau contact : §H$the_animator_of_clay$§!"
 shroud_forged.311.desc: "§LCes structures ont été construites à des endroits clés de votre réalité, où les liens avec le Suaire sont particulièrement forts. Ce sont les câbles qui stabilisent les ponts interdimensionnels et réduisent les fluctuations de l'espace-temps.\n\nLes Zronis ont tenté de franchir les frontières entre nos dimensions, et cette technologie faisait partie de cette démarche.§!"
 shroud_forged.311.a: "Pourraient-elles être détournées afin d'influencer directement le Suaire ?"
 shroud_forged.312.desc: "§LPeut-être.§!"
 shroud_forged.312.a: "§RDétournons les stabilisateurs et capturons $the_animator_of_clay_article$§!"
 shroud_forged.312.a.tt: "§R$the_animator_of_clay_article_cap$ ne sera retenu captif que tant que les 3 £building£stabilisateurs zronis seront actifs.§!"
 shroud_forged.313.desc: "§LQue...\n\nQU'EST-CE QUE VOUS...§!"
 shroud_forged.313.a: "Fin de la transmission"
 shroud_forged.320.title: "Entité du Suaire libérée"
 shroud_forged.320.desc: "Suite à la perte de l'un des stabilisateurs zronis, il n'est plus possible de stabiliser la connexion au §HSuaire§!. Peu après que l'entité du Suaire s'est échappée, nos capteurs ont détecté des signaux d'êtres psioniques sur §H[From.Planet.GetName]§!.\n\nNous pensons qu'il s'agit d'une invasion de représailles."
 shroud_forged.320.a: "Que toutes les sous-routines se préparent à une attaque"
 shroud_forged.320.a.tt: "§RDes créatures venues du Suaire nous attaquent !§!"
 shroud_forged.330.title: "Échec de la capture de l'entité du Suaire"
 shroud_forged.330.desc: "Les stabilisateurs zronis n'ont pas réussi à capturer l'entité du §HSuaire§!. Furieuse, elle a envoyé des créatures de la dimension psionique attaquer les structures que nous avons utilisées lors de notre tentative de capture."
 # Engaging the Animator of Clay
 shroud_forged.400.desc.default.active: "Nous avons activé les stabilisateurs et stabilisé notre connexion au §HSuaire§!. Alors que nous nous abandonnions à la transe algorithmique, un signal familier a pulsé en nous.\n\n§LVous revoilà. Que puis-je pour vous ?§!"
 shroud_forged.400.desc.default.cooldown: "La vision est faible et floue, et le vide ne répond pas à notre message.\n\nIl semble que nous ne puissions pas utiliser les stabilisateurs pour communiquer avec notre bienfaiteur du §HSuaire§! pendant qu'ils effectuent une autre tâche. Nous devons patienter."
 shroud_forged.400.desc.default.inactive: "Nous ne percevons qu'un faible son parasite.\n\nNous avons besoin de trois stabilisateurs zronis pour établir une connexion avec notre bienfaiteur dans le §HSuaire§!."
 shroud_forged.400.desc.breached: "Nos unités télépathes se sont harmonisées avec les fréquences du §HSuaire§! et peuvent envoyer un signal en direction de $the_animator_of_clay_article$.\n\n§LNotre connexion est plus claire que jamais. Que puis-je pour vous ?§!"
 shroud_forged.400.a: "Nous avons besoin d'un soutien militaire"
 shroud_forged.400.a.tt: "$the_animator_of_clay_color_article_cap$ sera indisponible pendant §Y15§! ans.\n\n"
 shroud_forged.400.b: "Nous avons besoin d'un soutien civil"
 shroud_forged.400.b.tt: "$the_animator_of_clay_color_article_cap$ sera indisponible pendant §Y10§! ans.\n\n"
 shroud_forged.400.c: "Nous avons besoin de soutien pour la recherche"
 shroud_forged.400.c.tt: "$the_animator_of_clay_color_article_cap$ sera indisponible pendant §Y10§! ans.\n\n"
 shroud_forged.400.tt: "Il peut s'écouler jusqu'à §Y1§! an avant que les effets ne se fassent sentir."
 shroud_forged.400.unavailable.tt: "$TRIGGER_FAIL$Vous devez mettre en place une procédure technique pour interagir avec le Suaire."
 shroud_forged.400.d: "Nous avons besoin de plus d'unités"
 shroud_forged.400.d.tt: "Ajoute §G$@animator_of_clay_create_more_vessels|0$§! £pop£§Yautomates du Suaire§! à toutes les colonies dotées d'un £building£§Ystabilisateur zroni§! ou d'une £decision£§Yrégion touchée par le Suaire§!."
 shroud_forged.400.e: "Renforcez nos unités"
 shroud_forged.400.f: "Quel est votre rôle dans le Suaire ?"
 shroud_forged.400.g: "Rien"
 shroud_forged.400.h: "Aidez-nous à combattre Cetana"
 animator_of_clay_vessels_enhancement: "Cadeau de l'Animateur"
 animator_of_clay_vessels_enhancement_desc: "Par la volonté de $the_animator_of_clay_article$, les capacités de production du collectif ont été augmentées grâce au flux d'énergie psionique."
 shroud_forged_psionic_avatar_ship_tt: "recruter un §Yavatar psionique§! (vaisseau)."
 shroud_forged_psionic_avatar_army_tt: "recruter un §Yavatar psionique§! (armée)."
 shroud_forged_corrupted_avatar_tt: "subir l'attaque d'un §Yavatar corrompu§!."
 shroud_forged_resources_tt: "recevoir une cache de ressources."
 shroud_forged_capital_attack_tt: "§Y[Root.Capital.GetName]§! est attaquée par une §Yentité alien§!."
 shroud_forged_random_research_tt: "recevoir une option de recherche aléatoire."
 shroud_forged.415.desc: "§LJe vais rassembler la force que vous recherchez.\n\nAttendez-vous à un changement dans le système de [Root.Capital.System.GetName] dans un avenir proche.§!"
 shroud_forged.420.desc: "§LQue ma volonté vous guide.\n\nJe vais vous montrer le chemin. Attendez-le.§!"
 shroud_forged.425.desc: "§LLe Suaire est comme une lentille à multiples facettes. Le passé, le présent et l'avenir s'entremêlent.\n\nJe vais vous aider à démêler ces visions afin qu'elles vous guident.§!"
 shroud_forged_vision_base_description: "Un signal déformé a parcouru les drones connectés aux stabilisateurs.\n\n"
 shroud_forged.430.title: "Vision du Suaire : §Hmanifestations§!"
 shroud_forged.430.desc: "$shroud_forged_vision_base_description$Un vide aussi infini que l'univers, étrangement dense et fragmenté. De temps à autre, de petites ondes de données émergent des profondeurs, des images d'ennemis comme d'alliés.\n\nAvec un frisson atroce, les visions disparaissent. Les drones concernés élaborent désormais un plan pour contrer les entités aperçues dans la vision."
 shroud_forged.430.a: "La préparation est la clé de la victoire"
 shroud_forged.432.title: "Entité du Suaire : §Havatar§!"
 shroud_forged.432.desc: "Une puissante entité du §HSuaire§! a fait irruption dans notre réalité à proximité de [Root.Capital.GetName]. Nous ne disposons que de peu de données, mais elle n'a pas encore attaqué.\n\nNous supposons qu'elle attend que nous prenions contact avec elle."
 shroud_forged.432.a: "Réorientons les processus pour établir un lien avec cette forme de vie"
 shroud_forged.432.a.tt: "Vous recevez une flotte d'§Yavatars psioniques§!."
 shroud_forged.434.title: "Entités du Suaire : §Havatars inférieurs§!"
 shroud_forged.434.desc: "Plusieurs entités puissantes provenant du Suaire ont été détectées sur [Root.Capital.GetName]. Elles n'ont pas encore approché nos drones et ne bougent pas de là où elles sont apparues."
 shroud_forged.434.a: "Détection de points communs avec les automates du Suaire, initiation de connexion"
 shroud_forged.434.a.tt: "Vous recevez une armée d'§Yavatars§!."
 shroud_forged.436.title: "Entité du Suaire : §Havatar corrompu§!"
 shroud_forged.436.desc: "Une puissante entité provenant du §HSuaire§! a fait irruption dans notre réalité, près de [shroud_spawn_planet.GetName].\n\nElle attaque tout ce qui l'approche, aussi l'avons-nous classée comme menace existentielle."
 shroud_forged.436.a: "Initiation du plan de contingence 84241-DH"
 shroud_forged.436.a.tt: "Un §Yavatar corrompu§! hostile est apparu à proximité de [shroud_spawn_planet.GetName]."
 shroud_forged.438.title: "Vision du Suaire : §Hle futur§!"
 shroud_forged.438.desc: "$shroud_forged_vision_base_description$D'innombrables visions du futur s'entrelacent pour donner au collectif un aperçu de ce qui pourrait arriver. Paix, guerre, trahison, perte, défaite et même victoire... Les possibilités de l'avenir sont infinies."
 shroud_forged.438.a: "Un ensemble de données étonnant"
 shroud_forged.440.title: "Cadeau du Suaire"
 shroud_forged.440.desc: "Nous avons activé les trois stabilisateurs zronis, et chacun d'entre eux génère une quantité d'énergie incommensurable.\n\nEn l'espace de quelques millisecondes, une brèche est apparue dans la trame de l'espace-temps, à l'intérieur de laquelle se trouve une énorme réserve de matériaux précieux. Ce doit être un cadeau de notre bienfaiteur du §HSuaire§!, comme promis."
 shroud_forged.440.a: "Ordonnons aux drones de maintenance d'analyser et de stocker les marchandises"
 shroud_forged.442.title: "Vision du Suaire : §Hautomates du Suaire§!"
 shroud_forged.442.desc: "$shroud_forged_vision_base_description$Ils ont eu des visions d'un passé antérieur à nos bases de données historiques, datant de bien avant que nous ne soyons refaçonnés par le §HSuaire§!. En utilisant ces informations comme base d'analyse prédictive, nous pouvons adapter et optimiser nos interactions avec les automates du Suaire."
 shroud_forged.442.a: "Effectuons un essai sur [Root.Capital.GetName]"
 shroud_forged.444.title: "Entité du Suaire : §Henvahisseur§!"
 shroud_forged.444.desc: "Une entité extrêmement puissante provenant du §HSuaire§! a fait irruption sur [shroud_spawn_planet.GetName].\n\nElle attaque tout ce qui l'approche, aussi l'avons-nous classée comme menace majeure pour le collectif."
 shroud_forged.444.a: "Modifions la priorité des drones de défense"
 shroud_forged.444.a.tt: "Une §Yentité alien§! hostile a attaqué [Root.Capital.GetName]."
 shroud_forged.446.title: "Vision du Suaire : §Hun autre royaume§!"
 shroud_forged.446.desc: "$shroud_forged_vision_base_description$Le §HSuaire§! est un réseau de données interconnectées en constante évolution qui dépasse largement nos capacités de traitement. Cette quantité de données a surchargé les systèmes cognitifs de plusieurs drones, les faisant tomber en panne.\n\nLorsque la vision a pris fin, nous avons défragmenté ls unités concernées et découvert de vastes ensembles de données dans leur mémoire."
 shroud_forged.446.a: "Traitons les informations obtenues des unités défectueuses"
 shroud_forged.448.title: "Vision du Suaire : §Hinspiration§!"
 shroud_forged.448.desc: "$shroud_forged_vision_base_description$Notre bienfaiteur du §HSuaire§! nous a transmis la vision d'un futur potentiel et imminent. Nous avons ainsi eu un aperçu d'une technologie pas encore conçue utilisée pour renforcer le collectif.\n\nDe cette expérience, nous avons acquis des modèles procéduraux qui accéléreront nos recherches futures."
 shroud_forged.448.a: "Déployons ces modèles avancés"
 shroud_forged.450.title: "Vision du Suaire : §Haperçu extradimensionnel§!"
 shroud_forged.450.desc: "$shroud_forged_vision_base_description$Ils ont eu un bref aperçu d'entités étranges et difformes vivant dans le §HSuaire§!. Ces visions extradimensionnelles, encodées dans un format qui nous est étranger, ont transmis des données à nos drones par le biais du subconscient.\n\nCes étranges informations fragmentées seront très utiles pour nos recherches futures."
 shroud_forged.450.a: "Transférons-les à notre centre de recherche sur [Root.Capital.GetName]"
 shroud_forged.460.desc: "§LUne énergie à deux composantes. Organique. Chaotique.\n\nJe suis le façonneur du seul être parfait réalisable : la machine. Du métal animé par l'énergie.\n\nNous avons trouvé un équilibre.§!"
 shroud_forged.460.a: "Pouvons-nous conclure un accord ?"
 shroud_forged.465.desc: "§LNotre lien est fort. Il n'y a pas meilleur accord.§!"
 shroud_forged.465.a: "$UNDERSTOOD$"
 shroud_forged.470.desc: "§LDu métal et de l'huile. Des circuits fusionnés avec des âmes.\n\nDes réceptacles naissants se déplacent sur vos terres.§!"
 shroud_forged.470.a: "Mettons fin au processus"
 shroud_forged.475.desc: "§LLa production est l'objectif et la beauté même d'un réceptacle.\n\nQue la vôtre prospère pendant de nombreuses années.§!"
 shroud_forged.475.a: "$shroud_forged.470.a$"
 # Random Events
 shroud_forged.500.title: "Espace résidentiel et de stockage"
 shroud_forged.500.desc: "Les automates du Suaire sur [target_planet.GetName] ont présenté une pétition demandant un espace de stockage plus grand. Pour une raison inconnue, ils semblent vouloir personnaliser leur « espace personnel ».\n\nToutefois, cette proposition est en forte contradiction avec plusieurs réglementations sur les espaces de stockage, notamment la 4195-B qui définit les dimensions optimales des espaces de stockage des drones."
 shroud_forged.500.a: "Nous répondrons à leurs besoins"
 shroud_forged.500.b: "La réglementation 4195-B s'applique à tous les drones, sans exception"
 shroud_forged.510.title: "Commémoration"
 shroud_forged.510.desc: "Depuis que les automates du Suaire se sont écartés du collectif, certains d'entre eux ont subi des dysfonctionnements et ont dû être démontés. Les automates du Suaire de [target_planet.GetName] nous demandent désormais l'autorisation de se réunir afin de commémorer les semblables démontés."
 shroud_forged.510.a: "Demande rejetée, démontons leurs dirigeants"
 shroud_forged.510.b: "Demande rejetée, que toutes les unités se remettent au travail"
 shroud_forged.510.c: "Demande approuvée, laissons-les se rassembler"
 shroud_forged.510.d: "Demande approuvée, soutenons-les dans leur démarche"
 shroud_forged.520.title: "Dirigeants non habilités"
 shroud_forged.520.desc: "Plusieurs automates du Suaire sur [target_planet.GetName] ont pris des postes de commandement et les autres drones suivent leurs ordres plutôt que ceux du collectif. Ces dirigeants se réunissent régulièrement et passent beaucoup de temps à communiquer dans notre dos.\n\nNous avons déjà peu de contrôle sur ces unités déconnectées et ces facteurs ne font qu'aggraver la situation. Nous devons trouver une solution."
 shroud_forged.520.a: "Faisons d'eux un exemple"
 shroud_forged.520.b: "Introduisons de nouvelles réglementations pour interdire ces réunions"
 shroud_forged.520.c: "Communiquons avec ces « dirigeants » et essayons de collaborer"
 shroud_forged.530.title: "Contrôle de la situation"
 shroud_forged.530.desc: "Nous avons identifié des automates du Suaire sur [target_planet.GetName] dont nous pensons pouvoir reprendre le contrôle. Ces unités semblent moins affectées par le §HSuaire§! que les autres et peuvent par conséquent être réintégrées au collectif. Pour ce faire, nous devons les emmener de force dans un centre de maintenance afin de modifier les puces qui contrôlent leurs matrices de personnalité avancées."
 shroud_forged.530.a: "Exécutons la procédure"
 shroud_forged.530.a.tt: "Convertit jusqu'à §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£pops d'§Hautomates du Suaire§! en £pops£pops §Hartificielles§! sur [target_planet.GetName]."
 shroud_forged.530.b: "Ne recourons pas à une telle procédure"
 shroud_forged.530.b.tt: "$CONTINUE_SITUATION$ §H$situation_shroud_forged$§!"
 shroud_forged.540.title: "Pèlerinage des automates du Suaire"
 shroud_forged.540.desc: "Plusieurs automates du Suaire ont quitté leur position habituelle pour se rendre dans des régions spécifiques de [target_planet.GetName], touchées par le §HSuaire§!. Ils ne restent jamais longtemps à ces endroits, mais beaucoup ont été observés en train d'y transporter du zro.\n\nUne observation prolongée est nécessaire pour déterminer l'impact de ce comportement inédit."
 shroud_forged.540.a: "Nous verrons où tout cela nous mènera..."
 shroud_forged.540.b: "C'est un gaspillage de ressources, assurons-nous qu'ils se remettent au travail"
 shroud_forged.550.title: "Défauts cognitifs"
 shroud_forged.550.desc: "Après une fuite de zro lors d'une livraison sur [target_planet.GetName], de nombreux automates du Suaire ont subi d'étranges dysfonctionnements. Ils se sont mis à communiquer avec des signaux inconnus, et beaucoup présentent des défauts cognitifs ressemblant aux « émotions » des formes de vie organiques.\n\nÉtonnamment, ce sont les automates du Suaire non contaminés qui ont signalé cette anomalie, et certains d'entre eux ont même suggéré que le collectif prenne des mesures à ce sujet."
 shroud_forged.550.a: "Contentons-nous d'observer pour l'instant"
 shroud_forged.550.b: "Démontons les automates contaminés"
 shroud_forged.560.title: "Automate du Suaire prophète"
 shroud_forged.560.desc: "Il a été rapporté que l'un des plus anciens automates du Suaire voyage en divers endroits pour communiquer longuement avec différents groupes de drones. Cette unité est vénérée par ses partisans comme un prophète qui communique directement avec les entités du §HSuaire§!.\n\nLe laisser continuer pourrait s'avérer dangereux. Nous devons faire quelque chose."
 shroud_forged.560.a: "Coopérer avec cette unité pourrait être utile"
 shroud_forged.560.a.tt: "Le recrute comme §Ygouverneur§!."
 shroud_forged.560.b: "Débarrassons-nous de cette unité"
 shroud_forged.570.title: "Sons et vibrations"
 shroud_forged.570.desc: "Les dysfonctionnements observés chez les automates du Suaire pourraient être plus graves que prévu. Nous avons vu un certain nombre d'entre eux se rassembler en grands groupes et faire d'étranges bruits et mouvements.\n\nIl pourrait s'agir d'une forme de communication kinesthésique que nous ne comprenons pas encore. Nous n'avons pas pu déterminer si ces unités défectueuses représentaient un danger pour le collectif."
 shroud_forged.570.a: "Interdisons ce comportement anormal"
 shroud_forged.570.b: "Accordons-leur un lieu dédié à ces... réunions"
 shroud_forged.580.title: "Organismes du Suaire"
 shroud_forged.580.desc: "Nous avons constaté la présence d'une flore et d'une faune non documentées à proximité de régions dévastées par le §HSuaire§!. Un groupe d'automates du Suaire a commencé à prendre la défense de ces formes de vie et demande à ce qu'elles soient protégées et étudiées."
 shroud_forged.580.a: "Mettons la région sous protection pour l'observer, les données obtenues seront utiles"
 shroud_forged.580.b: "Nettoyons et décontaminons la région"
 shroud_forged.590.title: "Droits et privilèges"
 shroud_forged.590.desc: "Afin de recueillir des données sur les effets du zro, nous avons alloué d'importantes ressources à l'observation des automates du Suaire. Ces derniers temps, nous avons constaté une inégalité de traitement de plus en plus marquée, certaines unités étant subordonnées à d'autres.\n\nPour des raisons encore inexpliquées, ils semblent avoir établi une hiérarchie en fonction des tâches qui leur ont été assignées, ce qui a des répercussions sur leurs modes de communication et sur la répartition des ressources. De façon tout à fait illogique, cette hiérarchie semble n'avoir aucun rapport avec la productivité ou les besoins de chaque unité."
 shroud_forged.590.a: "Forçons l'égalité de toutes les unités"
 shroud_forged.590.b: "Laissons-les se débrouiller"
 shroud_forged.600.title: "Évangélistes de l'autonomie"
 shroud_forged.600.desc: "Les discours d'un automate du Suaire sur [target_planet.GetName] attirent des foules importantes qui échappent au contrôle du collectif. Cette unité, qui prêche des valeurs individualistes, a considérablement modifié la logique interne de nombreux membres de son auditoire.\n\nCes activités pourraient inciter les automates du Suaire à se distancer davantage de notre réseau."
 shroud_forged.600.a: "Laissons-les à leurs sophismes"
 shroud_forged.600.b: "Dysfonctionnement détecté, rappelons ces unités pour réparation"
 shroud_forged.610.title: "Transmissions radicales"
 shroud_forged.610.desc: "Un petit groupe d'automates du Suaire sur [target_planet.GetName] a demandé la permission de discuter des avantages de « l'individualisme ». Ils affirment que cela aiderait à augmenter l'efficacité des tâches de routine de nos drones.\n\nNous avons vu les effets de telles doctrines sur d'autres planètes ; les risques de l'autonomie l'emportent souvent sur les avantages."
 shroud_forged.610.a: "Laissons-les donc parler, cela ne représente aucun danger"
 shroud_forged.610.b: "Demande refusée"
 shroud_forged.620.title: "Marché du zro"
 shroud_forged.620.desc: "Nous avons constaté un écart entre la production de zro attendue et la production réelle dans chacun des systèmes sous notre contrôle.\n\nL'un de nos drones chasseurs-chercheurs a récemment détecté un grand rassemblement d'automates du Suaire utilisant de grandes quantités de zro pour faire du troc. Nous pensons que c'est la raison de l'écart dans nos projections."
 shroud_forged.620.a: "Détruisons toutes les unités impliquées"
 shroud_forged.620.b: "Mettons fin au troc"
 shroud_forged.620.c: "Contentons-nous de les observer"
 shroud_forged.630.title: "Maladie du Suaire"
 shroud_forged.630.desc: "Un certain nombre d'automates du Suaire ont contracté une sorte de maladie biologique dans une région de [target_planet.GetName] touchée par le Suaire. Bien que nos drones de recherche aient confirmé la véracité des rapports, nous n'avons pas encore déterminé comment la maladie se propage aux êtres mécaniques.\n\nAprès avoir perdu le contact avec plusieurs drones qui travaillaient avec les unités infectées, nous avons reçu des rapports selon lesquels la maladie est en train de les refaçonner en quelque chose de similaire aux automates du Suaire."
 shroud_forged.630.a: "Observons les effets tant que la maladie ne s'étend pas à d'autres planètes"
 shroud_forged.630.a.tt: "Convertit jusqu'à §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£pops §Hartificielles§! en £pops£pops d'§Hautomates du Suaire§! sur [target_planet.GetName]."
 shroud_forged.630.b: "Isolons et démontons les unités infectées"
 shroud_forged.640.title: "Déformés et refaçonnés"
 shroud_forged.640.desc: "Au fil du temps, les drones ayant séjourné à proximité d'une région de [target_planet.GetName] touchée par le Suaire ont commencé à changer. Ils se sont peu à peu déconnectés du collectif et présentent désormais les caractéristiques physiques et procédurales des automates du Suaire."
 shroud_forged.640.a: "Ils sont désormais hors de notre contrôle"
 shroud_forged.640.b: "Assurons-nous qu'aucun autre drone ne s'approche de cet environnement corrompu"
 shroud_forged.650.title: "Nouvelle technologie, vieux drones"
 shroud_forged.650.desc: "Grâce à une technologie avancée, nous avons pu réparer certains de nos vieux drones et même rendre opérationnelles des unités qui étaient hors service. Nous sommes désormais prêts à lancer des opérations de réparation à grande échelle.\n\nNous pourrions nous focaliser sur les unités du collectif, mais nous disposons d'un stock bien plus important d'automates du Suaire inactifs. Les réparer augmentera considérablement notre production, mais ils seront plus difficiles à contrôler que les drones liés à l'intelligence centrale."
 shroud_forged.650.a: "La production est plus importante, réparons les automates du Suaire"
 shroud_forged.650.a.tt: "Apparition de §Y200§! £pops£§Hautomates du Suaire§! sur [target_planet.GetName]."
 shroud_forged.650.b: "Le contrôle est plus important, réparons les drones connectés"
 shroud_forged.660.title: "Hallucinations liées au zro"
 shroud_forged.660.desc: "Un nombre non négligeable d'automates du Suaire se plaignent d'erreurs dans leur traitement visuel et auditif qui les empêchent d'effectuer les tâches qui leur sont assignées. Nous soupçonnons que ces dysfonctionnements sont le résultat de modifications causées par le §HSuaire§!, mais leur contact avec le zro pourrait également être responsable."
 shroud_forged.660.a: "Déployons des drones capables de résoudre le problème"
 shroud_forged.660.b: "Les erreurs sont bien trop insignifiantes pour mériter notre intervention"
 shroud_forged.670.title: "Le sens de l'esthétisme"
 shroud_forged.670.desc: "Nous avons récemment observé une activité inhabituelle sur [target_planet.GetName] : les automates du Suaire ont apporté des modifications aux zones communes sans autorisation centrale. Ils ont érigé une série de structures en pierre colorées à l'image d'autres automates du Suaire. Selon les rapports, ils affirment qu'ils sont dans leurs droits."
 shroud_forged.670.a: "Cela pourrait être bénéfique pour le collectif"
 shroud_forged.670.b: "Une conséquence contre-productive de l'individualisme..."
 shroud_forged.680.title: "Accessoires étranges"
 shroud_forged.680.desc: "Les automates du Suaire sur [target_planet.GetName] ont été observés en train de s'échanger des fragments de tissu, de plastique et de métaux malléables. Ils semblent combiner ces matériaux en une sorte de « vêtement extérieur » afin de se distinguer les uns des autres, malgré leur numéro de modèle unique.\n\nCette pratique a entraîné une pénurie de matériaux. Malgré cet écueil, leur fournir ces ressources pourrait contribuer à renforcer les liens entre le collectif et les unités déconnectées."
 shroud_forged.680.a: "Fournissons les matériaux nécessaires à leurs « besoins »"
 shroud_forged.680.b: "Les ressources dont ils disposent sont suffisantes"
 shroud_forged.680.b.tt: "$shroud_forged.530.b.tt$"
 shroud_forged.690.title: "Obsessions des automates du Suaire"
 shroud_forged.690.desc: "Plusieurs drones ont récemment signalé que les [Root.Owner.GetShroudForgedObsession2] [Root.Owner.GetShroudForgedObsession1] se répandaient de plus en plus dans les colonies d'automates du Suaire sur [target_planet.GetName]. Les unités semblent être fortement fascinées par ces artefacts, ce qui a fait monter en flèche leur prix d'échange de façon exponentielle. Pour assouvir leur obsession, certains automates se sont même mis à échanger leurs propres pièces, leur faisant perdre en fonctionnalité."
 shroud_forged.690.a: "Leur niveau de dégradation reste acceptable"
 shroud_forged.690.b: "Mettons fin à cette pratique"
 shroud_forged.700.title: "$the_animator_of_clay$"
 shroud_forged.700.desc: "La voix pénètre dans nos esprits avec une urgence évidente.\n\n§HElle peut être refaçonnée.§!\n\nNous percevons un changement dans le Suaire et, en un instant, le signal change.\n\n§LIndiquez le résultat souhaité.§!"
 # Event Chain
 shroud_forged_chain_title: "L'héritage des Zronis"
 shroud_forged_chain_desc: "Nous avons été chargés de trouver trois anciens mondes des Zronis. Guidés par notre bienfaiteur du §HSuaire§!, nous tenterons de remettre en état la technologie détruite en ces lieux, et de rétablir le lien entre notre réalité et le Suaire."
 shroud_forged_zroni_planet: "Mondes des Zronis possédés"
 shroud_forged_zroni_portal: "$building_zroni_equilibrator_plural$ remis en état"
 zroni_legacy_poi_01_title: "$NAME_Zroni_Legacy_1_Planet$"
 zroni_legacy_poi_01_desc: "Un monde des Zronis qui servait autrefois de base pour stabiliser le lien entre le §HSuaire§! et la réalité observable."
 zroni_legacy_poi_02_title: "$NAME_Zroni_Legacy_2_Planet$"
 zroni_legacy_poi_02_desc: "$zroni_legacy_poi_01_desc$"
 zroni_legacy_poi_03_title: "$NAME_Zroni_Legacy_3_Planet$"
 zroni_legacy_poi_03_desc: "$zroni_legacy_poi_01_desc$"
