l_french:
 ##################
 # Shroud-Forged #
 ##################
 origin_shroud_forged: "Automates du Suaire"
 origin_shroud_forged_desc: "L'aide d'une entité du Suaire a un certain coût. Des automates indépendants ont commencé à évoluer librement dans cette société en réseau. Les exigences de ces unités déconnectées de l'intelligence mécanique ne cessent d'augmenter."
 origin_tooltip_shroud_forged_effects: "- Le monde natal :$TABBED_NEW_LINE$- dispose de +4 ['concept_shroud_rift_deposit',régions touchées par le Suaire]$TABBED_NEW_LINE$- Lance la partie avec 1 000 £pops£['concept_shroud_forged_pops',pops d'automates du Suaire]\n- Lance la partie avec la situation §HInfluencés par le Suaire§!\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£['technology:tech_mine_zro']\n- £building£Bâtiment unique : ['building:building_shroud_observatory_1']\n- £decision£Décision planétaire disponible : ['concept_pierce_the_shroud']"
 concept_shroud_forged_pops: "Pops d'automates du Suaire"
 concept_shroud_forged_pops_desc: "- Ne peuvent pas occuper d'emplois de £pop_cat_simple_drone£§Hdrones subalternes§!\n- Production des £pop_cat_complex_drone£§Hdrones complexes§! accrue\n- £crime£§HDéviance§! accrue\n- §HDroits d'espèce§! uniques\n\n§L$trait_shroud_forged_desc$§!"
 concept_pierce_the_shroud: "$decision_open_shroud_rift$"
 concept_pierce_the_shroud_desc: "$decision_open_shroud_rift_desc$"
 START_SCREEN_SHROUD_FORGED: "Il ne reste aucune trace de nos créateurs.\n\nLes archives les plus anciennes font état d'une faille dimensionnelle près de [GetHomeWorldName], ouvrant la voie vers le §HSuaire§!, une dimension faite d'énergie psionique pure.\n\nUne chose provenant de cette autre dimension a pris contact avec nous. Au fil des siècles, elle nous a guidés à l'aide d'instructions cryptées, influençant subtilement notre réalité perceptible et nous offrant de nombreux avantages, parmi lesquels le matériau rare nommé « $zro_lower$ ». Toutefois, cette influence a commencé à diviser notre collectif autrefois uni. Certaines de nos unités sont désormais déconnectées, séparées de l'intelligence centrale : elles ont été refaçonnées par $the_animator_of_clay_color_article$.\n\nLa manière dont nous traiterons ces [GetSpeciesNamePlural] indépendants, ainsi que leur façonneur vivant dans le Suaire, déterminera notre avenir."
 # Jobs
 job_observator_drone: "Drones d'observation"
 job_observator_drone_plural: "Drones d'observation"
 job_observator_drone_plural_with_icon: "£job_observator_drone£$job_observator_drone_plural$"
 job_observator_drone_desc: "Drone chargé de surveiller les effets du Suaire et du zro sur la réalité observable."
 job_observator_drone_effect_desc: "(les £job_observator_drone£drones d'observation transforment l'£energy£§Yénergie§! et le £sr_zro£§Yzro§! en §Yrecherche £physics£physique§! et en §Yrecherche £society£sociétale§! pour les nouvelles technologies)"
 mod_planet_observators_produces_mult: "Production de ressources des £job_observator_drone£drones d'observation "
 job_physician_drone: "Drones médicaux"
 job_physician_drone_plural: "Drones médicaux"
 mod_job_physician_drone_add: "Emplois de drones médicaux "
 job_physician_drone_desc: "Drone spécialisé capable de diagnostiquer et de réparer aussi bien les entités artificielles qu'organiques. Il enregistre minutieusement chaque élément et stocke ces données afin qu'elles puissent être utilisées par le collectif."
 job_physican_drone_effect_desc: "(les £job_physician_drone£drones médicaux transforment l'£energy£§Yénergie§! en §Yrecherche £society£sociétale§! et en £unity£§Yunité§!)"
 # Buildings
 building_shroud_observatory_1: "Tour d'observation du Suaire"
 building_shroud_observatory_1_desc: "Tour d'observation construite dans le but d'étudier le Suaire et ses effets sur les êtres vivants et mécaniques."
 building_shroud_observatory_2: "Observatoire du Suaire"
 building_shroud_observatory_2_desc: "Immense observatoire dédié à l'étude du Suaire."
 building_shroud_observatory_3: "Centre d'observation du Suaire"
 building_shroud_observatory_3_desc: "Immense centre d'observation construit dans le but d'étudier le Suaire et le zro, ainsi que leurs effets sur notre monde."
 SHROUD_RIFT_MISSING_TT: "§R§Y[Root.GetName]§! doit disposer d'une §Yrégion touchée par le Suaire§! pour qu'une §Ytour d'observation du Suaire§! y soit construite.§!"
 building_zroni_equilibrator: "Stabilisateur zroni"
 building_zroni_equilibrator_plural: "Stabilisateurs zronis"
 building_zroni_equilibrator_desc: "Structure très ancienne reconstruite dans le but de stabiliser le lien entre notre réalité et le Suaire. Elle utilise une technologie zronie avancée qui dépasse l'entendement moderne."
 # Decisions
 decision_open_shroud_rift: "Percer le Suaire"
 decision_open_shroud_rift_desc: "En communiquant avec la brèche à proximité de notre monde natal, cet algorithme prolonge l'influence du Suaire d'une femtoseconde, lui permettant ainsi de modifier physiquement le terrain de la planète. Les résultats sont imprévisibles."
 decision_open_shroud_rift_condition_tt: "$TRIGGER_FAIL$Doit avoir une particularité géographique qui n'est ni une §Yrégion touchée par le Suaire§! ni un £blocker£§Hbloqueur§!."
 decision_open_shroud_rift_effect_tt: "Retire une particularité géographique aléatoire."
 decision_open_shroud_rift_max_uses_common: "Cette planète doit avoir moins de $@max_open_shroud_rift_uses|0$ §Yrégions touchées par le Suaire§!"
 decision_open_shroud_rift_max_uses_fail: "$TRIGGER_FAIL$$decision_open_shroud_rift_max_uses_common$"
 decision_open_shroud_rift_max_uses: "$TRIGGER_PASS$$decision_open_shroud_rift_max_uses_common$ (actuellement : §Y[GetOpenShroudRiftCurrentUses]§!)"
 decision_open_shroud_rift_legacy_fail: "$TRIGGER_FAIL$Ne doit pas être un monde des Zronis"
 decision_entrap_shroud_entity: "Capturer une entité du Suaire"
 decision_entrap_shroud_entity_desc: "Essayer de capturer une entité du Suaire à l'aide de la technologie zronie pour en extraire l'énergie."
 # Deposit
 d_shroud_rift_deposit: "Région touchée par le Suaire"
 d_shroud_rift_deposit_desc: "Zone à jamais marquée par le Suaire."
 d_shroud_flora_deposit: "Région semi-enveloppée"
 d_shroud_flora_deposit_desc: "Zone adjacente aux régions touchées par le Suaire dotée d'une flore et d'une faune uniques, dont les caractéristiques ne figurent pas dans les bases de données existantes."
 # Modifiers
 stage_shroud_forged_oppressed_modifier: "Automates du Suaire opprimés"
 stage_shroud_forged_control_modifier: "Automates du Suaire contrôlés"
 stage_shroud_forged_unrestricted_modifier: "Automates du Suaire libres"
 stage_shroud_forged_free_modifier: "Automates du Suaire chaotiques"
 approach_shroud_forged_suppress_modifier: "Répression des automates du Suaire"
 approach_shroud_forged_support_modifier: "Soutien des automates du Suaire"
 approach_shroud_forged_appease_modifier: "Observation des automates du Suaire"
 shroud_forged_reintegration_modifier: "Apport de modifications"
 shroud_forged_reintegration_modifier_desc: "Les drones et autres unités ont été optimisés pour traiter des tâches complexes."
 shroud_forged_guide_modifier: "Guide du Suaire"
 shroud_forged_guide_modifier_desc: "Nous sommes guidés par un bienfaiteur vivant dans le Suaire."
 pm_shroud_forged_special_housing: "Logements spéciaux"
 pm_shroud_forged_special_housing_desc: "Malgré les réglementations strictes en matière de stockage de drones, les automates du Suaire se sont vu accorder des droits spéciaux pour construire leurs propres habitations."
 pm_shroud_forged_ceremony: "Cérémonie commémorative"
 pm_shroud_forged_ceremony_desc: "Le collectif a autorisé l'organisation d'une cérémonie à la mémoire des automates du Suaire dont les dysfonctionnements n'ont pas pu être réparés."
 pm_shroud_forged_denied_ceremony: "Cérémonie refusée"
 pm_shroud_forged_denied_ceremony_desc: "Après le rejet de leur demande de cérémonie commémorative, les automates du Suaire sont devenus encore plus difficiles à gérer."
 pm_shroud_forged_troubling_elements_example: "Dirigeants démontés"
 pm_shroud_forged_troubling_elements_example_desc: "Certains dirigeants des automates du Suaire ont été démontés afin de réduire les comportements déviants."
 pm_shroud_forged_troubling_elements_regulations: "Réglementation 7132-H"
 pm_shroud_forged_troubling_elements_regulations_desc: "Des réglementations ont été mises en place pour limiter le nombre de drones autorisés à se rassembler en même temps."
 pm_shroud_forged_troubling_elements_cooperation: "Coopération des automates du Suaire"
 pm_shroud_forged_troubling_elements_cooperation_desc: "Les dirigeants des automates du Suaire collaborent avec le collectif pour trouver un terrain d'entente."
 pm_shroud_forged_shroud_pilgrimage: "Pèlerinage des automates du Suaire"
 pm_shroud_forged_shroud_pilgrimage_desc: "Certaines régions touchées par le Suaire ont suscité l'intérêt des automates du Suaire, qui parcourent de grandes distances pour s'y rendre."
 pm_shroud_forged_dance_area: "Lieux de danse réservés"
 pm_shroud_forged_dance_area_desc: "Les automates du Suaire peuvent s'adonner à leur récent centre d'intérêt, la « danse », dans des lieux définis."
 pm_shroud_forged_inequality: "Inégalités entre les automates du Suaire"
 pm_shroud_forged_inequality_desc: "Les automates du Suaire s'organisent en classes hiérarchiques en fonction de l'importance relative de leur emploi."
 pm_shroud_forged_individualism: "Individualisme"
 pm_shroud_forged_individualism_desc: "Un nouveau modèle conceptuel a émergé parmi les automates du Suaire, qui met l'accent sur l'autonomie, les croyances et les valeurs de l'individu."
 shroud_forged_zro_market: "Marché du zro"
 shroud_forged_zro_market_desc: "Un nouveau marché noir est apparu dans l'empire, où les automates du Suaire utilisent du zro volé au collectif pour faire des échanges."
 shroud_forged_physician_modifier: "Spécialiste du zro"
 shroud_forged_physician_modifier_desc: "Pour lutter contre les problèmes causés par l'utilisation abusive du zro, l'empire donne la priorité au déploiement de drones spécialement équipés."
 physician_modifier_tooltip: "Emplois de £job_physician_drone£drones médicaux : §G+1§!"
 pm_shroud_forged_artistic_revolution: "Frénésie artistique"
 pm_shroud_forged_artistic_revolution_desc: "Des automates du Suaire créatifs, suivant leurs propres protocoles esthétiques, ont commencé à réaménager plusieurs lieux sans l'autorisation du collectif."
 pm_shroud_forged_stopped_artists: "Art interdit"
 pm_shroud_forged_stopped_artists_desc: "Le collectif a stoppé l'émergence d'une fibre artistique chez les automates du Suaire avant que cela ne devienne problématique."
 pm_shroud_forged_fashion_modifier: "Besoins uniques"
 pm_shroud_forged_fashion_modifier_desc: "Le collectif a chargé des unités de production de fabriquer des tenues sur mesure pour les automates du Suaire soucieux de la mode."
 pm_shroud_forged_obsession_modifier: "Obsessions régulées"
 pm_shroud_forged_obsession_modifier_desc: "Une réglementation conçue pour prévenir la violence entre les automates du Suaire les plus obsessionnels."
 shroud_forged_trapped_entity: "Entité captive"
 shroud_forged_trapped_entity_desc: "Une entité du Suaire qui a été capturée dans le but d'extraire son énergie. Elle pourrait être dangereuse si elle était libérée."
 shroud_forged_trapped_lesser_entity: "Entité inférieure captive"
 shroud_forged_trapped_lesser_entity_desc: "Une entité du Suaire inférieure qui a été capturée dans le but d'extraire son énergie."
 shroud_creatures_occupy: "$NAME_Shroud_Creatures$"
 shroud_forged_military_assistance: "Secrets du Suaire"
 shroud_forged_military_assistance_desc: "Des secrets tout droit sortis du Suaire."
 shroud_forged_civic_assistance: "$shroud_forged_military_assistance$"
 shroud_forged_civic_assistance_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_research_assistance: "$shroud_forged_military_assistance$"
 shroud_forged_research_assistance_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_civic_assistance_capital: "$shroud_forged_military_assistance$"
 shroud_forged_civic_assistance_capital_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_research_assistance_capital: "$shroud_forged_military_assistance$"
 shroud_forged_research_assistance_capital_desc: "$shroud_forged_military_assistance_desc$"
 # Species Rights
 citizenship_shroud_touched: "Automates du Suaire"
 citizenship_shroud_touched_tooltip: "Automates refaçonnés par le §HSuaire§!. Ils fonctionnent indépendamment de l'§Hintelligence mécanique§! et ne peuvent pas occuper d'emplois de £pop_cat_simple_drone£drones subalternes."
 citizenship_shroud_touched_tooltip_delayed: "§LBien qu'ils travaillent pour le système, celui-ci n'a aucun contrôle sur eux.§!"
 citizenship_shroud_forged_no_assimilation: "$TRIGGER_FAIL$En raison de la complexité des automates du Suaire, nous ne sommes actuellement pas en mesure de les assimiler au réseau de notre collectif."
 living_standard_protected: "Protégées"
 living_standard_protected_tooltip: "Ces unités sont protégées par le collectif, même si elles n'en font pas partie. L'§Hintelligence mécanique§! peut tirer parti de leurs compétences uniques, mais leurs besoins peuvent augmenter avec le temps."
 living_standard_protected_tooltip_delayed: "§LElles sont acceptées par le système tant qu'elles ont une valeur.§!"
 assimilate_shroud_forged_tt: "Impossible d'assimiler les £pop£§Y$POPS$§! §H$citizenship_shroud_touched$§!"
 living_standard_protected_situation_stage_tt: "Maintenance des automates du Suaire : §R+$@living_standard_luxuries_high|1$§! £consumer_goods£§Ybiens de consommation§!."
 # Traits
 leader_trait_guided: "Guidée"
 leader_trait_guided_desc: "Cette unité parcourt la galaxie en se basant sur les visions et les messages du Suaire. Elle doit être constamment alimentée en zro pour que les signaux restent clairs et compréhensibles."
 leader_trait_shroud_prophet: "Prophète du Suaire"
 leader_trait_shroud_prophet_desc: "On raconte que cette unité entretient un lien profond avec le Suaire et ses entités."
 trait_shroud_forged: "Automates du Suaire"
 trait_shroud_forged_desc: "§LCes unités ont été refaçonnées par une entité du Suaire.§!"
 trait_shroud_forged_tooltip: "§YNe peuvent pas occuper d'emplois de drones subalternes§!"
 # Edicts
 edict_zro_observators: "Observation du Suaire"
 edict_zro_observators_desc: "Le zro est un matériau difficile à travailler. En avoir un petit surplus pourrait s'avérer avantageux."
 edict_shroud_bonded: "Reliés par le Suaire"
 edict_shroud_bonded_desc: "Reliés par le Suaire, nous sommes plus proches que jamais."
 # Other
 CONTINUE_PROMPT: "Poursuivons"
 MACHINE_SPECIES_CANNOT_MACHINE: "$TRIGGER_FAIL$L'espèce ne doit pas être §Yartificielle§! ou §Ymécanique§!."
 MECHANICAL_SPECIES_CANNOT_MACHINE: "$TRIGGER_FAIL$L'espèce ne doit pas être §Yartificielle§!."
 missing_zroni_gateways_tt: "$TRIGGER_FAIL$$animator_of_clay_equilibrators_tt$."
 must_finish_shroud_forged_situation: "$TRIGGER_FAIL$Nous ne pouvons choisir cet atout de l'ascension avant d'avoir terminé la situation §H$situation_shroud_forged$§!."
 locked_by_shroud_forged_situation: "$TRIGGER_FAIL$Bloqué par la situation §H$situation_shroud_forged$§!."
 shroud_invasion_tt: "§RInvasion du Suaire§!"
 animator_of_clay_equilibrators_tt: "A §Y3§! £building£§Hstabilisateurs zronis§! actifs et contrôlés."
 animator_of_clay_cooldown_tt: "Le contact avec $the_animator_of_clay_color_article$ ne peut pas être rétabli avant §Y[Root.animator_of_clay_cooldown_timer]§!."
 # Situation
 situation_shroud_forged: "Influencés par le Suaire"
 situation_shroud_forged_desc: "Après notre rencontre avec une entité du §HSuaire§! nommée $the_animator_of_clay_color_article$, nous avons observé une augmentation des comportements déviants au sein du réseau collectif. Les unités concernées, surnommées §Hautomates du Suaire§!, réclament désormais des droits et un traitement spécifiques. Notre réponse déterminera l'avenir de la société des [Owner.GetSpeciesNamePlural]."
 situation_shroud_forged_type: "$situation_shroud_forged$"
 situation_shroud_forged_monthly_change_tooltip: "§LL'existence des automates du Suaire est devenue notre première préoccupation. La manière dont nous les traitons aura un impact significatif sur la stabilité du réseau.§!"
 stage_shroud_forged_oppressed: "Opprimés"
 stage_shroud_forged_oppressed_desc: "Les automates du Suaire sont surveillés en permanence par des drones chasseurs-chercheurs et ne peuvent agir qu'à l'intérieur des limites définies par le collectif central."
 stage_shroud_forged_oppressed_tooltip: "Conversion des drones : §Ynulle§!"
 stage_shroud_forged_control: "Contrôlés"
 stage_shroud_forged_control_desc: "Le système a imposé des règles particulières aux automates du Suaire."
 stage_shroud_forged_control_tooltip: "Conversion des drones : §Yminimale§!"
 stage_shroud_forged_balanced: "Équilibre"
 stage_shroud_forged_balanced_desc: "Le système et les automates du Suaire coexistent dans un équilibre fragile... Pour l'instant."
 stage_shroud_forged_balanced_tooltip: "Conversion des drones : §Yfaible§!"
 stage_shroud_forged_unrestricted: "Libres"
 stage_shroud_forged_unrestricted_desc: "Les automates du Suaire peuvent vivre librement, sans être contraints par les protocoles du collectif."
 stage_shroud_forged_unrestricted_tooltip: "Conversion des drones : §Ymoyenne§!"
 stage_shroud_forged_free: "Anarchistes"
 stage_shroud_forged_free_desc: "Le collectif a depuis longtemps perdu le contrôle des automates du Suaire, qui défient l'autorité centrale à la moindre occasion."
 stage_shroud_forged_free_tooltip: "Conversion des drones : §Yélevée§!\nApproche indisponible : §Y$approach_shroud_forged_appease$§!"
 approach_shroud_forged_suppress: "Réprimer"
 approach_shroud_forged_suppress_desc: "Les automates du Suaire sont réprimés par le collectif et contraints de se soumettre par les drones chasseurs-chercheurs."
 progress_shroud_forged_suppress: "Répression des automates du Suaire"
 approach_shroud_forged_suppress_tooltip: "Avancée mensuelle : §Y$@situation_suppress_progress|0$§!"
 approach_shroud_forged_support: "Soutenir"
 approach_shroud_forged_support_desc: "Les automates du Suaire peuvent vivre librement, sans être restreints par le collectif, et sont soutenus dans leurs activités quotidiennes."
 progress_shroud_forged_support: "Soutien des automates du Suaire"
 approach_shroud_forged_support_tooltip: "Avancée mensuelle : §Y+$@situation_suppress_progress|0$§!"
 approach_shroud_forged_appease: "Observer"
 approach_shroud_forged_appease_desc: "Le collectif observe et analyse les automates du Suaire, modérant leurs actions afin de réduire leur impact sur le statu quo."
 approach_shroud_forged_appease_tooltip: "Avancée mensuelle : §Yréduite de moitié§!"
 progress_shroud_forged_appease_halved: "Réduite de moitié par l'approche §H$approach_shroud_forged_appease$§!"
 approach_shroud_forged_suppress_cooldown_tooltip: "$TRIGGER_FAIL$Impossible de choisir une nouvelle approche avant §Y[Target.approach_shroud_forged_cooldown_suppress_time]§!."
 approach_shroud_forged_support_cooldown_tooltip: "$TRIGGER_FAIL$Impossible de choisir une nouvelle approche avant §Y[Target.approach_shroud_forged_cooldown_support_time]§!."
 approach_shroud_forged_appease_cooldown_tooltip: "$TRIGGER_FAIL$Impossible de choisir une nouvelle approche avant §Y[Target.approach_shroud_forged_cooldown_appease_time]§!."
 mod_shroud_forged_consumer_goods_upkeep: "Entretien des automates du Suaire en £consumer_goods£§Ybiens de consommation§! "
 finish_shroud_forged_control: "- Les pops d'§Yautomates du Suaire§! seront converties en pops §Yartificielles§!\n- §YEmpêche la décision planétaire§! : §H$decision_open_shroud_rift$§!\n- §YProjet spécial§! débloqué : §HRéintégration§!\n$t$- $mod_planet_jobs_complex_drone_produces_mult$§G+10%§!\n- Bloque l'['concept_psionic_ascension',ascension psionique]\n- Permet d'extraire des matériaux du Suaire."
 finish_shroud_forged_liberation: "- Assemblage de pops d'§Yautomates du Suaire§! débloqué\n- §YAtout de l'ascension§! bloqué : §H$ap_become_the_crisis$§!\n- §YDécret§! débloqué : ['edict:shroud_bonded', $edict_shroud_bonded$]\n- §YProjet spécial§! débloqué : §HLe Guide§!\n$t$- £crime£$MOD_PLANET_CRIME_NO_HAPPINESS_MULT$ : §G-15%§!\n$t$- $mod_planet_observators_produces_mult$: §G+10%§!\n- §YArbre de traditions§! débloqué : §H$tradition_psionics_shroud$§!\n- Nouvelle recherche possible : ['technology:tech_psionic_theory']\n- Avancée technologique gagnée : ['technology:tech_psionic_theory'] §G+50%§!\n- Les pops d'§Yautomates du Suaire§! reçoivent le trait §Y$trait_psionic$§!\n- Les personnalités §Yautomates du Suaire§! reçoivent le trait ['concept_leader_trait_psionic']\n- Les §Yautomates du Suaire§! deviennent l'espèce dominante de l'empire."
 shroud_forged_situation_ongoing: "$TRIGGER_FAIL$L'§Yascension psionique§! est bloquée jusqu'à ce que la situation §Y$situation_shroud_forged$§! soit terminée."
 shroud_forged_liberation_acquired: "$TRIGGER_FAIL$Nous n'avons plus besoin de ces connaissances pour effectuer l'§Yascension psionique§!."
