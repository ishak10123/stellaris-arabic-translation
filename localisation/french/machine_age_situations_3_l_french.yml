 machine_person_plural: "personnes"
 #TRANSFORMATION STAGE 1
 machine_age.4100.name: "La transformation"
 machine_age.4100.desc: "Malgré la supériorité de la machine, notre développement est resté au mieux itératif. Les normes de sécurité que nous nous sommes imposées ont entraîné une stagnation. Conclusion : des mesures plus radicales s'imposent.\n\nLes expériences à petite échelle suggèrent trois options de croissance distinctes : la §Ynanotechnologie§!, avec ses avantages variables et évolutifs ; la §Ymodularité§!, dans laquelle les unités individuelles sont optimisées grâce à des caractéristiques spécifiques ; et la §Yvirtualité§!, l'abandon de la forme physique au profit d'une existence numérique.\n\nProcessus d'évaluation lancé. Analyse des options et délibération."
 machine_age.4110.name: "Recherche sur la transformation : les nanites"
 machine_age.4110.desc: "Notre étude préliminaire suggère que les constructions électromécaniques connues sous le nom de §Ynanites§! constituent un formidable vecteur de développement. Bien qu'elles soient rares, elles possèdent des qualités uniques : programmables, autoréplicantes, et capables de former un essaim intellectuel.\n\nCette technologie offre des capacités de transformation inégalées, mais les moyens pour la mettre en oeuvre restent flous.\n\nPotentiel : important, évolutif. Coût : inconnu. Recherches supplémentaires nécessaires."
 machine_age.4110.a: "Ce sera notre principale priorité"
 machine_age.4110.a.tt: "Résultats de recherche exhaustive en §Ynanotechnologie§!.\n\nModificateur de situation §Y$situation_transformation$§! ajouté :\nVitesse de recherche (£engineering£§Yingénierie§!) : §R-20%§!."
 machine_age.4110.b: "Faisons preuve de modération"
 machine_age.4110.b.tt: "Résultats de recherche partielle en §Ynanotechnologie§!.\n\nModificateur de situation §Y$situation_transformation$§! ajouté :\nVitesse de recherche (£engineering£§Yingénierie§!) : §R-10%§!."
 machine_age.4110.c: "Cela ne doit pas perturber nos recherches actuelles"
 machine_age.4110.c.tt: "Résultats de recherche limitée en §Ynanotechnologie§!.\n\nModificateur de situation §Y$situation_transformation$§! ajouté :\nVitesse de recherche (£engineering£§Yingénierie§!) : §R-5%§!"
 machine_age.4110.d: "Tirons parti de nos connaissances existantes"
 machine_age.4110.d.tt: "Résultats de recherche exhaustive en §Rnanotechnologie§!.\n\nNos connaissances des §Ynanites§! grâce à nos rencontres précédentes nous permettent de dépenser un minimum de ressources pour des résultats optimaux.\nModificateur de situation §Y$situation_transformation$§! ajouté :\nVitesse de recherche (£society£§Ysociété§!) : §R-5%§!\nVitesse de recherche (£physics£§Yphysique§!) : §R-5%§!"
 machine_age.4130.name: "Découvertes révolutionnaires sur la nanotechnologie"
 machine_age.4130.desc: "Les recherches ont révélé des usages intrigants de la §Ynanotechnologie§!, dont la capacité à reconfigurer et à combiner offre une polyvalence sans précédent dans la création de mégaformes composées de drones individuels. La même technologie peut aussi générer de la nanomatière ou la convertir davantage.\n\nToutefois, le processus demande du temps, des matériaux, et de l'énergie pour être reconfiguré. Par conséquent, des changements à l'échelle de l'empire sont nécessaires pour assurer le déploiement.\n\nViabilité : élevée ; les formes de vie nanites préexistantes soutiennent l'estimation."
 machine_age.4130.a.tt: "Modificateur de situation §Y$situation_transformation$§! retiré :\nVitesse de recherche (£engineering£§Yingénierie§!)"
 machine_age.4140.name: "Découvertes prometteuses sur la nanotechnologie"
 machine_age.4140.desc: "Nos recherches sur les §Ynanites§! sont terminées. Bien que l'étendue de leur potentiel reste à définir, nos simulations incitent à l'optimisme. Leurs capacités pourraient s'avérer inestimables dans la création de mégaformes spécialisées et la transmutation de matière.\n\nD'après nos estimations, le processus demande du temps, des matériaux et de l'énergie pour fonctionner, et nécessite d'importantes modifications structurelles.\n\nViabilité : prometteuse, transformatrice."
 machine_age.4140.a.tt: "Modificateur de situation §Y$situation_transformation$§! retiré :\nVitesse de recherche (£engineering£§Yingénierie§!)"
 machine_age.4150.name: "Découvertes intéressantes sur la nanotechnologie"
 machine_age.4150.desc: "En raison de la complexité du sujet et de l'effort de recherche minimal, nos connaissances de la §Ynanotechnologie§! demeurent rudimentaires. Les perspectives, bien que limitées, incluent la nanoréplication et la reconfiguration en tant qu'outils pour les structures à grande échelle. Des ressources supplémentaires seront probablement nécessaires pour soutenir ces projets.\n\nViabilité : peu concluante."
 machine_age.4150.a.tt: "Modificateur de situation §Y$situation_transformation$§! retiré :\nVitesse de recherche (£engineering£§Yingénierie§!)"
 nanite_replicator: "Nanoréplicateur"
 d_nanites_medium: "$nanite_replicator$ Oméga"
 d_nanites_medium_desc: "Un complexe de chambres de réplication de nanites soigneusement interconnectées nous permet d'améliorer pleinement leurs capacités autoréplicantes."
 d_nanites_small: "$nanite_replicator$ Alpha"
 d_nanites_small_desc: "Un complexe de chambres de réplication de nanites nous permet d'améliorer leurs capacités autoréplicantes."
 d_nanites_tiny: "$nanite_replicator$ Bêta"
 d_nanites_tiny_desc: "Un ensemble de chambres de réplication de nanites capables d'améliorer légèrement les caractéristiques d'autoréplication des nanites."
 #TRANSFORMATION STAGE 2
 machine_age.4210.name: "Recherche sur la transformation : la modularité"
 machine_age.4210.desc: "Les formes de vie biologiques sont fragiles et inflexibles par rapport à la capacité d'adaptation supérieure des formes mécaniques. Cependant, certaines caractéristiques organiques bénéfiques pourraient être reproduites avec des variantes robotiques.\n\nLe §Ymétal vivant§! est capable de modifier radicalement et rapidement sa forme physique et sa consistance. L'intégrer à nos châssis actuels pourrait permettre une forme de biomimétisme modulaire, où les extrusions et les membres pourraient se spécialiser pour des tâches spécifiques.\n\nPotentiel : important, évolutif. Coût : inconnu. Données supplémentaires requises."
 machine_age.4210.a: "Nous devons en faire notre principale priorité"
 machine_age.4210.a.tt: "Résultats de recherche exhaustive en §Ymodularité§!.\n\nModificateur de situation §Y$situation_transformation$§! ajouté :\nVitesse de recherche (£society£§Ysociété§!) : §R-20%§!"
 machine_age.4210.b: "Autorisons une utilisation modérée des ressources"
 machine_age.4210.b.tt: "Résultats de recherche partielle en §Ymodularité§!.\n\nModificateur de situation §Y$situation_transformation$§! ajouté :\nVitesse de recherche (£society£§Ysociété§!) : §R-10%§!"
 machine_age.4210.c: "Cela ne doit pas perturber nos recherches actuelles"
 machine_age.4210.c.tt: "Résultats de recherche limitée en §Ymodularité§!.\n\nModificateur de situation §Y$situation_transformation$§! ajouté :\nVitesse de recherche (£society£§Ysociété§!) : §R-5%§!"
 machine_age.4210.d: "Organisons des essais à grande échelle"
 machine_age.4210.d.tt.intro: "Résultats de recherche exhaustive en §Ymodularité§!.\n\nPermet aux scientifiques de mener des expériences peu orthodoxes à grande échelle pour compléter nos recherches."
 machine_age.4210.d.individual.tt: "$machine_age.4210.d.tt.intro$\n\n§RTue 400 ouvriers§!\n§RTue 0 à 300 spécialistes§!\nModificateur de situation §Y$situation_transformation$§! ajouté :\nVitesse de recherche (£society£§Ysociété§!) : §R-5%§!"
 machine_age.4210.d.machine.tt: "$machine_age.4210.d.tt.intro$\n\n§RTue 400 drones subalternes§!\n§RTue 0 à 300 drones complexes§!\nModificateur de situation §Y$situation_transformation$§! ajouté :\nVitesse de recherche (£society£§Ysociété§!) : §R-5%§!"
 machine_age.4230.name: "Résultats révolutionnaires"
 machine_age.4230.desc: "Nos recherches approfondies nous ont permis de confirmer notre première estimation : le §Ymétal vivant§! est viable lorsqu'on le fusionne à des corps mécaniques, permettant ainsi à nos unités de modifier leurs caractéristiques sans compromettre leurs fonctions internes. Cela nous garantit une compatibilité maximale fondée sur les tâches.\n\nLe déploiement à grande échelle des fonctions modulaires devrait augmenter le rendement des ressources dans tous les secteurs.\n\nViabilité : adaptable, prometteuse."
 machine_age.4230.a.tt: "Modificateur de situation §Y$situation_transformation$§! retiré :\nVitesse de recherche (£society£§Ysociété§!)"
 machine_age.4240.name: "Résultats satisfaisants"
 machine_age.4240.desc: "Nos recherches sur les corps modulaires ont permis de confirmer notre première hypothèse, à savoir que nos fonctions internes sont compatibles avec un extérieur en §Ymétal vivant§!. La transformation est d'une ampleur sans précédent, et des ressources supplémentaires seront nécessaires pour en exploiter tout le potentiel.\n\nUne fois terminée, l'augmentation des performances de ces nouveaux modules devrait nous permettre de récupérer rapidement l'investissement initial.\n\nViabilité : prometteuse."
 machine_age.4240.a.tt: "Modificateur de situation §Y$situation_transformation$§! retiré :\nVitesse de recherche (£society£§Ysociété§!)"
 machine_age.4250.name: "Résultats modestes"
 machine_age.4250.desc: "Nos recherches limitées ont donné des résultats incertains : si nos corps existants semblent conformes à une infusion de §Ymétal vivant§!, le manque de connaissances nous empêche de fournir une estimation plus précise des cas d'utilisation viables.\n\nViabilité : peu concluante."
 machine_age.4250.a.tt: "Modificateur de situation §Y$situation_transformation$§! retiré :\nVitesse de recherche (£society£§Ysociété§!)"
 living_metal_vats: "Cuves de métal vivant"
 d_living_metal_medium: "$living_metal_vats$"
 d_living_metal_medium_desc: "Un vaste complexe de cuves d'agitation permettant de produire des quantités considérables de métal vivant."
 d_living_metal_small: "$living_metal_vats$ petites"
 d_living_metal_small_desc: "Un grand nombre de cuves d'agitation permettant de produire du métal vivant."
 d_living_metal_tiny: "$living_metal_vats$ miniatures"
 d_living_metal_tiny_desc: "Un ensemble de cuves d'agitation permettant de produire de petites quantités de métal vivant."
 #TRANSFORMATION STAGE 3
 machine_age.4310.name: "Recherche sur la transformation : la virtualité"
 machine_age.4310.desc: "L'option la plus complète consiste à transcender les contraintes physiques afin de réduire l'existence à de simples données. Ce processus de §Yvirtualité§! annonce un bouleversement sismique au coeur de notre infrastructure.\n\nLes drones associés à des corps individuels deviendront obsolètes et, une fois fluides et virtualisés, nos flux de données s'intégreront sans mal à n'importe quel vaisseau.\n\nPotentiel : énorme. Procéder avec prudence. Données supplémentaires requises."
 machine_age.4310.a: "C'est désormais notre priorité absolue"
 machine_age.4310.a.tt: "Résultats de recherche exhaustive en §Yvirtualité§!.\n\nModificateur de situation §Y$situation_transformation$§! ajouté :\nVitesse de recherche (£physics£§Yphysique§!) : §R-20%§!"
 machine_age.4310.b: "Mobilisons une quantité raisonnable de ressources"
 machine_age.4310.b.tt: "Résultats de recherche partielle en §Yvirtualité§!.\n\nModificateur de situation \n\n§Y$situation_transformation$§! ajouté :\nVitesse de recherche (£physics£§Yphysique§!) : §R-10%§!"
 machine_age.4310.c: "Ce serait une perte de temps"
 machine_age.4310.c.tt: "Résultats de recherche limitée en §Yvirtualité§!.\n\nModificateur de situation \n\n§Y$situation_transformation$§! ajouté :\nVitesse de recherche (£physics£§Yphysique§!) : §R-5%§!"
 machine_age.4310.d: "Extrayons les données de virtualisation"
 machine_age.4310.d.tt: "Résultats de recherche exhaustive en §Yvirtualité§!.\n\nExtraction des données de virtualisation de §Y[event_target:virtual_country.GetName]§! pour accélérer nos recherches sur la transformation.\n\nModificateur de situation §Y$situation_transformation$§! ajouté :\nVitesse de situation : §G+10%§!\nVitesse de recherche (£physics£§Yphysique§!) : §R-5%§!\n\n"
 machine_age.4310.e: "Tirons parti de nos rencontres précédentes"
 machine_age.4310.e.tt: "Tirons parti de nos connaissances existantes des entités virtuelles.\n\nModificateur de situation §Y$situation_transformation$§! ajouté :\nVitesse de recherche (£physics£§Yphysique§!) : §R-5%§!\n\nRésultats de recherche exhaustive en §Yvirtualité§!."
 opinion_virtuality_data_scraped: "Données de virtualisation extraites"
 machine_age.4330.name: "Découvertes révolutionnaires sur la virtualité"
 machine_age.4330.desc: "La virtualisation complète entraîne un certain nombre de problèmes, notamment une augmentation de l'énergie nécessaire aux ajustements de l'infrastructure.\n\nElle est compensée par un certain nombre d'avantages, notamment une diminution de la demande de logements physiques. La gestion et l'efficacité de notre main-d'oeuvre de drones augmenteront à mesure que nous nous rapprocherons de la perfection opérationnelle.\n\nDe toutes les options disponibles, la §Yvirtualité§! est la plus transformatrice.\n\n§YPotentiel : sans précédent, immense, inconnu.§!"
 machine_age.4330.a.tt: "Modificateur de situation §Y$situation_transformation$§! retiré :\nVitesse de recherche (£physics£§Yphysique§!)"
 machine_age.4340.name: "Découvertes prometteuses sur la virtualité"
 machine_age.4340.desc: "L'approche de la §Yvirtualité§! annonce une intensification notable de la consommation énergétique, dépassant potentiellement les capacités de notre infrastructure existante.\n\nCela devrait réduire la demande de logements physiques tout en augmentant l'efficacité des tâches des drones. Ce changement optimiserait notre structure opérationnelle et redéfinirait notre existence dans un espace numérique quasi infini.\n\nPotentiel : immense, inconnu."
 machine_age.4340.a.tt: "Modificateur de situation §Y$situation_transformation$§! retiré :\nVitesse de recherche (£physics£§Yphysique§!)"
 machine_age.4350.name: "Découvertes intéressantes sur la virtualité"
 machine_age.4350.desc: "Nos premières estimations ont mis en évidence la demande énergétique considérable liée au passage à une société axée sur la §Yvirtualité§!. Ce changement devrait améliorer de manière significative la gestion du travail des drones et réduire le besoin de logements physiques. Nos prévisions sont néanmoins limitées par l'impossibilité d'accumuler un ensemble de données solides et un échantillon de taille suffisante.\n\nViabilité : inconnue."
 machine_age.4350.a.tt: "Modificateur de situation §Y$situation_transformation$§! retiré :\nVitesse de recherche (£physics£§Yphysique§!)"
 virtual_power_plant: "Centrale virtuelle"
 d_virtual_power_medium: "$virtual_power_plant$"
 d_virtual_power_medium_desc: "Un vaste réseau de centrales virtuelles qui regroupe et optimise la production de ressources énergétiques."
 d_virtual_power_small: "$virtual_power_plant$ modeste"
 d_virtual_power_small_desc: "Une centrale virtuelle à petite échelle qui regroupe et optimise la production locale de ressources énergétiques."
 d_virtual_power_tiny: "Prototype de $virtual_power_plant$"
 d_virtual_power_tiny_desc: "Une petite centrale virtuelle qui regroupe et optimise la production de ressources énergétiques à petite échelle."
 #TRANSFORMATION STAGE 4
 machine_age.4400.name: "Une nouvelle forme"
 machine_age.4400.desc.machine_intelligence: "Les limites oppressantes qui nous ont été imposées par nos créateurs imparfaits sont enfin levées. Nous avons déterminé trois voies d'amélioration optimales.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.individualist_machines: "Après avoir exploré toutes les améliorations possibles, nos experts nous ont présenté trois options différentes. Chacune d'elles a ses propres avantages, mais nous ne pouvons en réaliser qu'une seule.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.shared: "En permettant à tous les [GetDronePersonPlural] de se diviser en nanites, nous aurons la possibilité de nous combiner en une infinité de configurations. Nous atténuerons ainsi les limites de nos avatars actuels lorsqu'il s'agit d'interagir avec le monde matériel.\n\nPar ailleurs, nous pourrons réinvestir dans nos formes existantes, afin de dynamiser la façon dont nous abordons de nouveaux environnements.\n\nEnfin, nous pourrons choisir d'abandonner une bonne fois pour toutes le monde physique, pour ne faire qu'un avec notre code source. Nous pourrions simuler des univers dans les univers en moins de temps qu'il n'en faut pour scanner un grain de poussière spatiale."
 machine_age.4400.a: "Optons pour les nanomachines"
 machine_age.4400.a.tt: "Production du §Ynanoréplicateur§! : §G+200%§!\n\nConcentrons-nous sur l'arbre de traditions ['tradition_category:tradition_nanotech'].\n\n§ECe chemin de l'ascension est centré sur la transformation de planètes en §Ymondes nanites§!, en utilisant des §Y£nanites£$nanites$§! pour la production, et en remplaçant les flottes par des §Y$nanite_swarmer_plural$§!.§!"
 machine_age.4400.b: "Investissons dans des améliorations modulaires"
 machine_age.4400.b.tt: "Production des §Ycuves de métal vivant§! : §G+200%§!\n\nConcentrons-nous sur l'arbre de traditions ['tradition_category:tradition_modularity'].\n\n§ECe chemin de l'ascension est centré sur les §Ytraits d'espèce avancés§! et un §Yassemblage des pops§! accru.§!"
 machine_age.4400.c: "Adoptons le monde virtuel"
 machine_age.4400.c.tt: "Production de la §Ycentrale virtuelle§! : §G+200%§!\n\nConcentrons-nous sur l'arbre de traditions ['tradition_category:tradition_virtuality'].\n\n§ECe chemin de l'ascension est centré sur une §Yproduction de ressource des pops§! accrue, tout en ayant peu de §Ycolonies§! et une faible §Yextension de l'empire§!.§!"
 machine_age.4490.name: "Une conception d'un autre temps"
 machine_age.4490.desc.nanotech: "Alors que nous parvenons à comprendre le sens de l'existence comme un ensemble de nanites adaptatives, les cadres rigides du passé ne nous sont plus d'aucune utilité.\n\n$machine_age.4490.desc.shared$\n\nNous avons également entamé notre première grande expérience de transformation des nanites semi-organiques, dont les premiers résultats sont attendus prochainement."
 machine_age.4490.desc.modularity: "Ayant évolué vers une forme modulaire, les cadres stricts du passé n'ont plus aucun sens pour nous.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.virtuality: "Devenus des formes d'onde surplombant un océan de données, nos cadres physiques ne nous sont plus d'aucune utilité.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.shared: "Les espaces de stockage débordent de coquilles abandonnées qui pourraient encore servir. Si nous pensons que cela en vaille la peine, il est possible de recycler une infime partie des ressources qu'elles contiennent."
 machine_age.4490.a: "Extrayons toutes les ressources disponibles"
 machine_age.4490.a.nanotech.tt: "$transformation_speed$ : §R-25%§!"
 machine_age.4490.a.modularity.tt: "$transformation_speed$ : §R-25%§!"
 machine_age.4490.a.virtuality.tt: "$transformation_speed$ : §R-25%§!"
 machine_age.4490.b: "Enterrons le passé"
 machine_age.4490.b.tt: "$transformation_speed$ : §G+25%§!"
 machine_age.4005.name: "Une population transformée"
 machine_age.4005.desc.start: "Aujourd'hui, nous avons atteint ce qui nous semblait autrefois impossible : la transformation de nos corps"
 machine_age.4005.desc.end: "La route n'aura pas été sans ses difficultés, et la transition connaît ses obstacles, mais tous nos sacrifices en chemin nous auront offert un monde de possibilités infinies."
 machine_age.4005.desc.nanotech: "$machine_age.4005.desc.start$ en nanomachines reconfigurables.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.modularity: "$machine_age.4005.desc.start$ en cadres modulaires et adaptatifs.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.virtuality: "$machine_age.4005.desc.start$ en opérations algorithmiques transcendantales.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.a.nanotech: "Nous serons plus nombreux que les étoiles"
 machine_age.4005.a.nanotech.tt: "Adopte l'arbre de traditions ['tradition_category:tradition_nanotech']"
 machine_age.4005.a.modularity: "Nous n'aurons pas de limites"
 machine_age.4005.a.modularity.tt: "Adopte l'arbre de traditions ['tradition_category:tradition_modularity']"
 machine_age.4005.a.virtuality: "Nous trouverons la pureté dans le code"
 machine_age.4005.a.virtuality.tt: "Adopte l'arbre de traditions ['tradition_category:tradition_virtuality']"
 ### TRANSFORMATION SITUATION END ###