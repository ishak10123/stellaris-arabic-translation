 ### TRANSFORMATION SITUATION START ###
 situation_transformation: "Transformation"
 situation_transformation_type: "Situation d'ascension"
 situation_transformation_desc: "L'itération passive du corps mécanique a atteint sa conclusion logique et inévitable. Une ère de transformation s'ouvre à nous, déclenchée par l'innovation et stimulée par les opportunités."
 situation_transformation_monthly_change_tooltip: "Nos corps mécaniques se préparent à la transformation."
 situation_transformation_outcome: "Une population mécanique transformée."
 stage_transformation_effects: "Nous devons évaluer les résultats et mettre en oeuvre le processus le plus optimal pour nous transformer."
 #Approach Error Correcting
 situation_transformation_errorcorrecting: "Correction d'erreurs"
 approach_transformation_errorcorrecting_tt: "Vitesse de situation : §R-20%§!\nUnité mensuelle : §Ynon affectée§!"
 #Approach Real Time
 situation_transformation_realtime: "Temps réel"
 approach_transformation_realtime_tt: "Vitesse de situation : §Ynon affectée§!"
 #Approach Overclocked
 situation_transformation_overclocked: "Surcadençage"
 approach_transformation_overclocked_tt: "Vitesse de situation : §G+20%§!"
 transformation_waste_discard_tt: "Se débarrasser des anciens corps"
 transformation_waste_recycle_tt: "Recycler les anciens corps"
 transformation_speed: "Vitesse de la situation §Y$situation_transformation$§!"
 situation_transformation_pause_desc: "$situation_cyberization_pause_desc$"
 REQUIRES_FINISHED_TRANSFORMATION: "$TRIGGER_FAIL$A résolu la situation §Y$situation_transformation$§!"
