 situation_unplugged_identity_desc: "Maintenant que nous n'appartenons plus à la [origin_unplugged_assimilator_empire.GetName], nous devons décider comment nous présenter à la galaxie. Allons-nous embrasser la puissance terrifiante de la Machine, ou nous défaire de nos améliorations stigmatisantes ? De nombreux [owner.GetSpeciesNamePlural] souhaitent s'exprimer."
 situation_unplugged_identity_type: "Situation Identité intrinsèque"
 unplugged_identity_stage_1: "Décybernétisation" # describes an outcome of the Situation
 situation_unplugged_stage_decyberize: "Nous rejetons nos améliorations, ainsi que le pouvoir et la terreur qui en découlent."
