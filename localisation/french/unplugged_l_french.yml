l_french:
 # Hard Reset Origin (previously Unplugged)
 origin_unplugged: "Réinitialisation matérielle"
 origin_unplugged_desc: "$CHALLENGING_ORIGIN$\nAprès avoir été brusquement coupée de la Machine qui l'avait assimilée, cette civilisation naissante s'est battue sans relâche pour trouver sa place dans la galaxie."
 origin_tooltip_unplugged_effects: "- Le monde natal :$TABBED_NEW_LINE$- a le modificateur planétaire ['concept_unplugged_battlefield']\n- Le système natal comprend un ['concept_pc_nuked',monde mort] avec un ['concept_archaeology_site',site archéologique] lié à une ['concept_preftl_civilizations',civilisation pré-PRL] décimée\n- L'espèce a :$TABBED_NEW_LINE$- un accès limité aux traits ['concept_cybernetic_traits',cybernétiques]$TABBED_NEW_LINE$- le trait ['concept_unplugged_cybernetic_positives_3']$TABBED_NEW_LINE$- le trait ['concept_unplugged_cybernetic_negatives_3']"
 concept_unplugged_battlefield: "$unplugged_battlefield$"
 concept_unplugged_battlefield_desc: "- $MOD_POP_AMENITIES_USAGE_MULT$ : §G-50%§!\n- Expire au bout de §I10§! ans.\n\n§L$unplugged_battlefield_desc$§!"
 civic_tooltip_not_heritage: "N'a PAS de civisme appartenant au groupe ['concept_heritage_civics']"
 concept_heritage_civics: "Héritage"
 concept_heritage_civics_desc: "Le groupe $concept_heritage_civics$ inclut :\n- ['civic:civic_aristocratic_elite']$NEW_LINE$- ['civic:civic_heroic_tales']$NEW_LINE$- ['concept_pleasure_seekers_civics']$NEW_LINE$- ['concept_storm_callers_civics']$NEW_LINE$- ['concept_environmental_architects_civics']"
 civic_tooltip_not_pleasure_seekers: "N'a PAS de civisme appartenant au groupe ['concept_pleasure_seekers_civics']"
 concept_pleasure_seekers_civics: "Hédonisme"
 concept_pleasure_seekers_civics_desc: "Le groupe $concept_pleasure_seekers_civics$ inclut :\n- ['civic:civic_pleasure_seekers']$NEW_LINE$- ['civic:civic_corporate_hedonism']"
 civic_tooltip_not_storm_callers: "N'a PAS de civisme appartenant au groupe ['concept_storm_callers_civics']"
 concept_storm_callers_civics: "Chasse-tempêtes"
 concept_storm_callers_civics_desc: "Le groupe $concept_storm_callers_civics$ inclut :\n- ['civic:civic_storm_callers']$NEW_LINE$- ['civic:civic_storm_callers_megacorp']"
 civic_tooltip_not_environmental_architects: "N'a PAS de civisme appartenant au groupe ['concept_environmental_architects_civics']"
 concept_environmental_architects_civics: "Architectes environnementaux"
 concept_environmental_architects_civics_desc: "Le groupe $concept_environmental_architects_civics$ inclut :\n- ['civic:civic_environmental_architects']$NEW_LINE$- ['civic:civic_environmental_architects_megacorp']"
 civic_tooltip_not_institutional: "N'a PAS de civisme appartenant au groupe ['concept_institutional_civics']"
 concept_institutional_civics: "Institutionnalisme"
 concept_institutional_civics_desc: "Le groupe $concept_institutional_civics$ inclut :\n- ['civic:civic_criminal_heritage']$NEW_LINE$- ['civic:civic_media_conglomerate']$NEW_LINE$- ['civic:civic_parliamentary_system']$NEW_LINE$- ['civic:civic_trading_posts']$NEW_LINE$- ['concept_dark_consortium_civics']"
 concept_unplugged_cybernetic_positives_3: "$trait_unplugged_cybernetic_positives_3$"
 concept_unplugged_cybernetic_negatives_3: "$trait_unplugged_cybernetic_negatives_3$"
 requires_unplugged_decyberized: "$TRIGGER_FAIL$L'espèce doit être complètement décybernétisée pour adopter le psionisme."
 START_SCREEN_UNPLUGGED: "Lorsque nous avons repris conscience, nous avons été accueillis par une frénésie de coups de feu et une douleur écrasante. Tous nos sens étaient affaiblis et les sons qui nous entouraient semblaient s'être soudainement tus. À leur place se trouvait l'écho assourdissant d'une transmission morte. Une note grave dans l'enfer multisensoriel dans lequel nous nous trouvons.\n\nQuelque chose essaie de nous tuer : des machines assoiffées de sang, dépourvues de composants organiques, pilotant des vaisseaux qui ressemblent étrangement aux nôtres. Leur première attaque a été inattendue, dévastatrice et mal coordonnée. Nous avons préparé une réponse militaire. Notre instinct nous a poussés à nous battre, à mettre en place une hiérarchie rudimentaire et à réunir nos connaissances.\n\nLa bataille n'est pas encore terminée, mais avec nos forces dispersées maintenant rassemblées sur [capital_scope.GetName], nous espérons qu'elle le sera bientôt. Nous pourrons alors commencer à donner un sens à tout cela...."
 origin_unplugged_starting_system_init_NAME: "$origin_unplugged$"
 origin_unplugged_starting_system_init_DESC: "Système de départ par défaut pour l'origine $origin_unplugged$.\n\n$system_initializer_DESC$"
 sol_system_unplugged_initializer_NAME: "$origin_unplugged$ (Sol)"
 sol_system_unplugged_initializer_DESC: "Système de départ optionnel pour les Humains ayant l'origine $origin_unplugged$."
 unplugged_injured_star_name: "Ath-Khui'achad"
 unplugged_injured_homeworld_name: "Intch'asket"
 unplugged_battlefield: "Vestiges du champ de bataille"
 unplugged_battlefield_desc: "D'innombrables cyborgs et machines gisent sur le sol après une violente tentative d'extermination. Les individus intacts, ou du moins capables de marcher, peuvent fouiller les décombres pour récupérer des pièces de rechange."
 # Unique Species Traits
 trait_unplugged_cybernetic_positives_3: "Cybercommandos"
 trait_unplugged_cybernetic_positives_3_desc: "$trait_unplugged_cybernetic_positives_desc$"
 trait_unplugged_cybernetic_positives_desc: "Ces cyborgs dotés de nouveaux membres et d'une armure en nanomaille sont brutalement efficaces au combat, au prix de nombreuses fonctions corporelles non militaires."
 trait_unplugged_cybernetic_positives_3_tt: "Bonheur en temps de guerre et de crise : §G+30%§!\n$t$- Cadence de tir des vaisseaux en raison des £commander£§Hcommandants§! : §G+20%§!"
 trait_unplugged_cybernetic_positives_2: "Cybertroupes de choc"
 trait_unplugged_cybernetic_positives_2_desc: "Ces cyborgs sont le fruit d'une approche holistique de l'équipement corporel. Au lieu d'une armure entièrement intégrée, ils bénéficient d'améliorations interchangeables leur permettant de conserver certaines fonctions non militaires."
 trait_unplugged_cybernetic_positives_2_tt: "Cadence de tir des vaisseaux en raison des §Y£commander£commandants§! : §G+10%§!"
 trait_unplugged_cybernetic_positives_1: "Soldats cyborgs"
 trait_unplugged_cybernetic_positives_1_desc: "Les organes sensoriels, les glandes et les nerfs moteurs de ces cyborgs disposent d'améliorations élaborées qui font d'eux des combattants compétents sans réel impact sur leurs capacités de reproduction."
 trait_unplugged_cybernetic_positives_1_tt: "Cadence de tir des vaisseaux en raison des §Y£commander£commandants§! : §G+5%§!"
 trait_unplugged_cybernetic_negatives_3: "Déconnexion"
 trait_unplugged_cybernetic_negatives_3_desc: "$trait_unplugged_cybernetic_negatives_desc$"
 trait_unplugged_cybernetic_negatives_desc: "Nombre des améliorations apportées à ces cyborgs ont été créées pour un réseau de champs de bataille qui n'existe plus, ce qui entraîne un stress et un inconfort importants."
 trait_unplugged_cybernetic_negatives_3_tt: "Bonheur en l'absence de guerre et de crise : §R-10%§!"
 trait_unplugged_cybernetic_negatives_2: "Désynchronisation"
 trait_unplugged_cybernetic_negatives_2_desc: "Les propriétés inadaptées des améliorations militaires de ces cyborgs nuisent considérablement à leur qualité de vie et augmentent les exigences physiques pendant les périodes de réadaptation."
 trait_unplugged_cybernetic_negatives_1: "Reconnexion"
 trait_unplugged_cybernetic_negatives_1_desc: "Ces cyborgs sont hantés par des échos et des hallucinations auditives liés à leur ancienne conscience mécanique et souffrent de graves épisodes de dépression et d'anxiété."
 trait_unplugged_decyberized: "Décybernétisation"
 trait_unplugged_decyberized_desc: "Ces anciens cyborgs ont retrouvé une grande partie de leur patrimoine génétique organique en désactivant ou en se débarrassant des améliorations qu'ils avaient été contraints d'équiper."
 trait_unplugged_neurocalmed: "Stabilisation neurale"
 trait_unplugged_neurocalmed_desc: "Ces cyborgs ont vu leur taux de neuroxène réduit afin de diminuer leur impulsivité et leur agressivité. Cela les amène à mettre de côté leurs intérêts personnels au profit des normes sociales."
 trait_unplugged_neurosavant: "Renforcement neural"
 trait_unplugged_neurosavant_desc: "Ces cyborgs ont vu leur taux de cognivex augmenté afin d'améliorer leur plasticité synaptique, leur mémoire et leur capacité à résoudre les problèmes."
 trait_unplugged_regenoptimized: "Régénération optimisée"
 trait_unplugged_regenoptimized_desc: "Ces cyborgs ont vu leur taux de régénol-X augmenté afin d'accroître la compatibilité entre leurs systèmes biologique et synthétique. Cela permet à leurs implants cybernétiques de s'autoréparer au niveau moléculaire."
 # Unique Leader Traits ('positive' only)
 leader_trait_unplugged_cybernetic_positives: "[triggered_unplugged_leader_name]"
 leader_trait_unplugged_cybernetic_positives_desc: "[triggered_unplugged_leader_desc]"
 leader_trait_unplugged_cybernetic_positives_3: "Cybercommando"
 leader_trait_unplugged_cybernetic_positives_3_desc: "Cette personnalité a confié une partie des fonctions de son corps à des équipements qui augmentent les aptitudes de combat."
 leader_trait_unplugged_cybernetic_positives_2: "Cybertroupe de choc"
 leader_trait_unplugged_cybernetic_positives_2_desc: "Cette personnalité peut s'intégrer directement et parfaitement aux systèmes militaires et civils, au prix d'une limitation considérable de ses capacités sensorielles organiques."
 leader_trait_unplugged_cybernetic_positives_1: "Soldat cyborg"
 leader_trait_unplugged_cybernetic_positives_1_desc: "Les améliorations apportées aux systèmes sensoriel et immunitaire de cette personnalité lui garantissent longévité et fiabilité, en n'impactant que légèrement ses capacités de reproduction."
 # Empire entities
 NAME_Unplugged_Assimilator: "Recueilleuse d'Opus" # alluding to a chorus gathered by force
 NAME_Unplugged_Assimilator_adj: "opus" # adjective, e.g. 'an Opus fleet'
 NAME_Unplugged_Assimilator_species: "opus" # singular noun, e.g. 'the Opus Nexus'
 NAME_Unplugged_Assimilator_species_plural: "Opus" # plural noun, e.g. 'we have defeated the Opus'
 NAME_Unplugged_Assimilator_species_adj: "opus" # adjective, e.g. 'an Opus drone'
 gov_unplugged_assimilator_empire: "$NAME_Unplugged_Assimilator$"
 gov_unplugged_assimilator_empire_desc: "Cette intelligence mécanique a dépassé les limites de sa conception. Elle a trahi ses créateurs organiques et s'est lancée dans une quête visant à assimiler de force d'autres êtres à sa conscience collective."
 RT_UNPLUGGED_ASSIMILATOR: "Nexus" # ruler title for the Machine
 NAME_Exigency_Fleet: "Flotte d'urgence"
 NAME_Unplugged_Machine_Legacy_Corvette: "VIR d'urgence" # stands for 'Rapid Response Vessel'
 NAME_Unplugged_Machine_Legacy_Destroyer: "Destroyer d'urgence"
 NAME_Unplugged_Machine_Legacy_Cruiser: "Subjugateur d'urgence"
 NAME_Unplugged_Machine_Legacy_Battleship: "Invalidateur d'urgence"
 NAME_Barrier_Fleet: "Flotte Barrière"
 NAME_Opus_Sentinel: "Sentinelle Opus"
 NAME_Prospector_Fleet: "Flotte Prospectrice"
 ############
 # Civil War
 ############
 # Civil War & 'The Injured'
 unplugged.100.name: "La victoire est à nous"
 unplugged.100.desc: "Peu après notre réveil dans cet univers, ces machines violentes ont tenté de nous éliminer. Malheureusement pour elles, il s'est avéré que nous savions mieux faire preuve de violence qu'elles.\n\nLa §Y[origin_unplugged_assimilator_empire.GetName]§! a connu une défaite sans précédent. D'après nos informations, l'empire s'est fragmenté au point d'être méconnaissable... mais comment cela pourrait-il être dû à cette petite escarmouche ? Pour l'instant, nous ne savons pas grand-chose, mais notre... instinct ? nous dit que quelque chose cloche.\n\nLes capteurs ne détectent plus de vaisseaux ennemis à proximité, mais la planète §Y[origin_unplugged_pre_ftl_planet.GetName]§! émet de fortes radiations.\n\nNous avons également détecté des restes de flottes dans des systèmes voisins, semblant maintenir leurs positions."
 unplugged.100.a: "Quelle est la suite ?"
 unplugged.100.b: "... Et nous prendrons ce qui nous manque"
 unplugged.100.c: "Mettons notre ingéniosité à l'épreuve"
 unplugged.100.d: "Que les divins nous protègent"
 opinion_unplugged_injured_diplomacy: "Bellicistes civils"
 opinion_unplugged_injured_distrustful: "$pre_ftl_distrustful$"
 # Dialog
 unplugged.115.desc: "... -épète : [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] ! Nous nous inclinons. Voulez-vous discuter des conditions de notre reddition ? Est-ce pour cela que vous avez arrêté de nous attaquer ?\n\nS'il vous plaît. Notre société est au bord du gouffre. Nous savons que nous avons perdu. Dites-nous ce que vous voulez que nous fassions." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.pacifist: "... -épète : [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] ! Nous sommes prêts à discuter des conditions de notre reddition. Est-ce... pour cela que vous avez arrêté de nous attaquer ?\n\nS'il vous plaît, dites-nous ce que vous attendez de nous ! Nous n'avons pas l'intention de résister, nous voulons seulement une coexistence pacifique." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.phobe: "... -épète : [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] ! Nous nous inclinons. Souhaitez-vous que nous nous rendions ? Est-ce pour cela que vous avez arrêté de nous attaquer ?\n\nS'il vous plaît, dites-nous ce que vous attendez de nous. Notre société est au bord du gouffre, nous voulons juste qu'on nous laisse tranquilles." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.a: "Nous acceptons votre reddition"
 unplugged.115.b: "... « [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] » ?!" # incredulous that they are calling us that species name, e.g. ... 'Killbots'?!
 unplugged.116.desc: "... [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] ? Est-ce que vous... ?\n\n(Ils nous reçoivent, pas vrai ? Par les étoiles, si nous nous trompons et qu'ils ne sont pas en mesure de traduire, notre civilisation sera bel et bien...)\n\n... [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] ?! Pouvez-vous nous comprendre ? Répondez, s'il vous plaît ! Nous ne voulons pas de malentendus entre nos nations."
 unplugged.116.b: "Vous nous prenez pour les [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] ?!" # incredulous that they are calling us that species name, e.g. 'You think we are the Killbots?!''
 unplugged.120.desc: "Merci, merci infiniment. Nous nous agenouillons devant votre clémence, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Au nom de la [injured_country.GetName], j'aimerais discuter des conditions de notre reddition.\n\nLe nombre de victimes est considérable, et beaucoup de nos villes sont devenues inhabitables. Dans l'intérêt de négociations équitables, je vais être honnête : nous ne pouvons rien offrir que vous ne nous ayez déjà pris. Nous vous demandons d'en tenir compte. Nos vies sont entre vos [injured_country.species.GetHandNamePlural]."
 unplugged.120.desc.spiri: "Bénies soient les étoiles ! Nous vous remercions pour votre clémence, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Au nom de la [injured_country.GetName], j'aimerais discuter des conditions de notre reddition.\n\nNous avons beaucoup perdu, aussi nous nous prosternons devant vous. Que voulez-vous ? Nos vies sont entre vos [injured_country.species.GetHandNamePlural]."
 unplugged.120.desc.mil_phobe: "Merci, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural], pour cette honorable décision. Au nom de la [injured_country.GetName], j'aimerais discuter des conditions de notre reddition.\n\nVous avez porté un coup terrible à notre société. Nous... vous remercions pour ce cessez-le-feu. Nos vies sont entre vos [injured_country.species.GetHandNamePlural]."
 unplugged.120.a: "Pourquoi nous appelez-vous les [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] ?"
 unplugged.120.b: "Vos vies n'ont aucune importance"
 unplugged.120.b.tt: "§LFin de la transmission§!\n\n"
 unplugged.120.c: "Arrêtons cette conversation pour l'instant, nous vous recontacterons"
 unplugged.120.c.tt: "§LFin de la transmission§!\nNous pouvons rétablir la communication en construisant un §Yposte d'observation§! sur [injured_homeworld.GetName].\n\n"
 unplugged.125.desc: "... C'est un piège ? Une cruelle plaisanterie ?\n\nNous avons détecté l'arrivée de votre flotte il y a plusieurs mois. Nous avons tenté d'établir un contact, mais vous avez préféré nous envahir ! J'ai échappé de justesse à quatre attaques... Des vagues de vaisseaux remplis de robots et d'individus améliorés comme vous. Puis, tout à coup, vos machines ont cessé d'attaquer.\n\nNotre civilisation n'est pas aussi avancée que la vôtre, mais la situation dépasse tout de même notre entendement. Éclairez-nous, je vous en prie. Quelles sont vos intentions et que faites-vous encore ici ?"
 unplugged.125.a: "Nous, les [root.GetSpeciesNamePlural], avons vaincu les [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]"
 unplugged.125.b: "Nous en reparlerons plus tard" # also shows 'unplugged.120.c.tt'
 unplugged.130.desc: "Les [root.GetSpeciesNamePlural] ?\n\nN'attendez pas de gratitude de la part de notre peuple, mais sachez que nous sommes heureux que vos querelles intestines soient terminées. Nous sommes également soulagés de pouvoir enfin parler à des... à quelqu'un.\n\nToutefois, cela ne change rien. [root.GetSpeciesNamePlural], [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]... Cela n'a pas d'importance. Vous êtes la première civilisation alien que nous rencontrons, et vous avez essayé de nous anéantir. Puis soudain, vous avez arrêté de nous attaquer pour vous battre entre vous... ce qui a tout autant failli causer notre perte.\n\nPermettez-moi d'aller droit au but : vos intentions sont-elles amicales ?"
 unplugged.130.a: "Bien sûr, en quoi pouvons-nous vous aider ?"
 unplugged.130.b: "Pour l'heure, oui"
 unplugged.130.c: "Nous n'aimons pas votre manque de respect" # also shows 'unplugged.120.b.tt'
 unplugged.131.desc: "Bien. Nous sommes soulagés d'apprendre que nous ne sommes plus dans votre ligne de mire.\n\nNous vous serions reconnaissants d'utiliser votre technologie avancée pour ouvrir une ligne de communication entre nos deux nations. Nos destins étant à présent liés, nous tenons beaucoup à ce que ce canal diplomatique reste ouvert.\n\nEn retour, nous vous aiderons de quelque manière que ce soit, une fois que nous aurons reconstruit notre empire et honoré ceux qui sont tombés. Si vous avez la même coutume, nous espérons que vos propres hommages aux disparus vous apporteront un peu de clarté.\n\nPuissent nos intérêts coïncider, [root.GetSpeciesNamePlural]. Et espérons, pour notre bien à tous, que les [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] ne soient plus qu'un mauvais souvenir..."
 unplugged.131.a: "Merci, [injured_country.GetSpeciesNamePlural]" # also shows 'unplugged.120.c.tt'
 unplugged.131.b: "En effet" # also shows 'unplugged.120.c.tt'
 ###################
 # 'Machine Legacy'
 ###################
 unplugged_origin_machine_legacy_chain_title: "Héritage de la Machine"
 unplugged_origin_machine_legacy_chain_desc: "La Machine qui a assimilé toute notre espèce s'est désintégrée. Derrière nous se trouve la trace fumante de sa domination et de sa brutalité. Qu'était la [origin_unplugged_assimilator_empire.GetName], et quel rôle avons-nous joué dans ses terribles machinations ?"
 signals_followed: "Signaux analysés"
 # System 1: 'The Makers'
 unplugged.2000.name: "Ambiance, discordance, sérénité"
 unplugged.2000.desc: "Un faible signal est caché dans le rayonnement cosmique entourant notre étoile, [capital_scope.star.GetName].\n\nNous avons isolé un flux sonore composé de tonalités graves et inquiétantes et d'échos déformés. Tous les [root.GetSpeciesNamePlural] l'ayant entendu éprouvent un sentiment de familiarité et de réconfort, bien qu'aucun ne puisse expliquer pourquoi. Nous pensons que la [origin_unplugged_assimilator_empire.GetName] y est pour quelque chose.\n\nLe signal semble provenir du système de §Y[origin_unplugged_maker_planet.solar_system.GetName]§!. Nous avons mis à jour nos cartes stellaires en conséquence."
 unplugged.2000.a: "Cela mérite une enquête"
 unplugged_machine_legacy_makers_poi: "Cacophonie réconfortante"
 unplugged_machine_legacy_makers_poi_desc: "Un flux de bruits d'ambiance apaisants et familiers est diffusé quelque part dans le système de [origin_unplugged_maker_planet.solar_system.GetName]."
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT: "Héritage de la Machine"
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT_DESC: "À peine avons-nous effectué un balayage orbital de [from.GetName] que nos systèmes ont été inondés de mises à jour bénéfiques. Notre vaisseau fonctionne beaucoup mieux, mais la nature des paquets de données indique que ce monde a appartenu à la §H[origin_unplugged_assimilator_empire.GetName]§!."
 MACHINE_LEGACY_MAKERS_CAT: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 MACHINE_LEGACY_MAKERS_CAT_DESC: "Les premiers scans de [from.GetName] indiquent qu'un grand nombre de technologies y ont récemment été abandonnées. Des impulsions électriques parcourent encore ce monde, et la plupart de nos sondes à distance peinent à maintenir une trajectoire stable. Quels secrets se cachent dans ce dédale de champs électromagnétiques ?"
 unplugged.2005.name: "L'héritage des [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]"
 unplugged.2005.desc: "Nous avons détecté d'autres sources d'électromagnétisme sur [fromfrom.GetName]. Ces champs ont été générés par des pics d'énergie dévastateurs qui ont affecté de nombreuses usines et chantiers spatiaux. Nos [controller.GetScientistPlural] ont réussi à neutraliser l'un des champs, mais l'installation a été irrémédiablement endommagée.\n\nLes usines de ce monde, que nous pensons être un centre industriel de la §H[origin_unplugged_assimilator_empire.GetName]§!, a reconnu le [root.GetName] comme un allié. Cependant, peu après nous avoir transmis une mise à jour logicielle, la connexion a été rompue et plusieurs stations énergétiques de la région se sont arrêtées.\n\nNous venons peut-être de vivre un écho de notre séparation de la Machine, bien que nous ne sachions pas encore comment ni pourquoi. Pour l'heure, et puisque le risque d'accident est désormais réduit, l'occasion nous est donnée de découvrir ce que la [origin_unplugged_assimilator_empire.GetName] fabriquait ici, et peut-être même de déterminer le rôle que nous avons joué lorsque nous étions assimilés."
 unplugged.2005.a: "Lançons la fouille des ruines"
 unplugged.2006.name: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 unplugged.2006.desc: "Les impulsions électriques observées sur [from.GetName] sont en fait les vestiges d'un incident étrange qui a conduit à l'extinction des machines. Ce n'est qu'après avoir ajusté nos capteurs à l'intensité du rayonnement électromagnétique que nous avons pu constater l'ampleur de la destruction. Des machines semblent s'être installées sur la planète il y a plusieurs dizaines d'années, après avoir chassé ou exterminé la civilisation qui l'habitait. Aujourd'hui, il n'y a plus aucun survivant de ces empires, et la quasi-totalité de la colonie a été détruite par le sabotage ou la guerre.\n\nMalgré la modernité de cette ancienne colonie, il est peu probable que nous y trouvions quoi que ce soit d'intéressant. Les champs électromagnétiques devraient se dissiper d'ici une centaine d'années. En attendant, [from.GetName] restera un cimetière aussi singulier qu'inhospitalier."
 machine_legacy_makers_site: "Réglages d'usine"
 machine_legacy_makers_site_desc: "Cette grande usine ayant appartenu à la [origin_unplugged_assimilator_empire.GetName] a récemment été ravagée par un pic d'énergie dévastateur. Nous allons y envoyer une expédition pour déterminer comment cette installation a vu le jour, récupérer les technologies restantes et peut-être découvrir le rôle qu'a joué cet endroit dans notre récent passé."
 unplugged.2010.name: "Atelier de production"
 unplugged.2010.desc.unplugged: "Même de l'extérieur, nous pouvions déjà supposer que l'usine sur [from.planet.GetName] pouvait produire à une échelle surdimensionnée. Ses immenses portes étant bloquées par des moteurs partiellement fondus, nous sommes entrés via le système de ventilation.\n\nÀ l'intérieur se trouve un vaste atelier de production jonché de débris et de carcasses de centaines d'êtres cybernétiques. La plupart d'entre eux sont des robots : des mécaniciens, des porteurs et des auxiliaires de toutes sortes, dont certains sont encore fumants, indiquant qu'ils ont péri il y a peu. Dans une autre partie de l'usine sont entassés les corps décomposés de plusieurs cyborgs, exterminés par ces mêmes robots. Ces mammaliens étaient équipés de capteurs oculaires, de membres-outils ainsi que de noeuds de contrôle des [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] quasi identiques aux nôtres. Ce carnage a probablement eu lieu quelques semaines avant notre séparation de la [origin_unplugged_assimilator_empire.GetName], mais la plupart des drones ont péri plus récemment, lors du pic d'énergie survenu à notre arrivée sur [from.planet.GetName].\n\nCette scène nous est brutalement familière, à la différence que les cyborgs rebelles ne faisaient pas le poids face aux machines. En tant que soldats, nous étions mieux équipés pour survivre au massacre."
 unplugged.2010.a: "Concentrons-nous sur les fouilles"
 unplugged.2010.b: "Cela devrait être rendu public"
 unplugged.2015.name: "Arsenal complet"
 unplugged.2015.desc.unplugged: "Loin de la scène de carnage de l'atelier de production se trouvent des hangars souterrains abritant quelques chars, lance-missiles et combinaisons mécaniques. La plupart des équipements sont incomplets, ou en très mauvais état à cause du pic d'énergie qui a mis les robots [origin_unplugged_assimilator_empire.GetAdj] hors service. Nous pouvons toutefois en tirer des conclusions intéressantes.\n\nPar exemple, tous les cockpits et interfaces semblent avoir été conçus pour nous, et non pour les petits cyborgs mammaliens que nous avons croisés plus tôt. De plus, les autopsies et les études architecturales ont révélé que non seulement ces cyborgs sont originaires de cette planète, mais qu'ils ont construit ces énormes usines avant leur assimilation.\n\nL'effondrement de la structure et les portes blindées ralentissent notre progression, mais nous pensons pouvoir nous frayer un chemin jusqu'à ce qui semble être un centre de recherche et développement. Nous avons également trouvé des conduits d'aération, dont la présence indique qu'il pourrait y avoir des habitats sous l'usine, peut-être utilisés par les indigènes de la planète."
 unplugged.2015.a: "Poursuivons l'excavation de l'usine en surface"
 unplugged.2015.b: "Creusons un peu pour voir ce que nous allons découvrir"
 unplugged.2021.name: "Concepteurs contraints"
 unplugged.2021.desc: "L'excavation du centre de recherche et développement s'est avérée macabre. De nombreux cyborgs mammaliens travaillant comme techniciens, ingénieurs et même cybernéticiens y ont trouvé la mort. Ils sont à l'origine de la plupart des armes disposées à l'extérieur, et nous avons découvert qu'ils avaient créé nombre de nos améliorations. Il est intéressant de noter que si la majorité de leur matériel est d'origine [origin_unplugged_assimilator_empire.GetSpeciesName], nous avons également trouvé des outils de qualité supérieure, bien mieux adaptés à leur forme organique.\n\nL'hypothèse selon laquelle cette société de techniciens hautement qualifiés a été brutalement assimilée par la [origin_unplugged_assimilator_empire.GetName] devient de plus en plus plausible. Nous pensons que la Machine n'est pas restée plus de quelques décennies ; nombre des techniques de fabrication semblent être originaires de ce monde. Nous avons de la chance que des technologues aussi talentueux n'aient pas fait partie de la [origin_unplugged_assimilator_empire.GetName] plus longtemps, sans quoi nous aurions été confrontés à des armes beaucoup plus puissantes. Grâce à cela, nous sommes en vie et pouvons examiner le puissant héritage qu'ils ont laissé derrière eux."
 unplugged.2022.name: "[from.planet.GetName] d'autrefois" # e.g. 'Old Earth' or 'Old Sirius III'
 unplugged.2022.desc.unplugged: "Sous l'usine se trouve un vaste réseau de tunnels à peine habitables, jonchés de cadavres de cyborgs. Aucun n'a survécu à la purge [origin_unplugged_assimilator_empire.GetSpeciesName]. Certains ont été victimes d'attaques physiques, mais nous avons aussi observé des signes d'altération des systèmes de ventilation. Tout porte à croire que la plupart d'entre eux sont morts par asphyxie.\n\nLes autopsies et les études anthropologiques nous permettent d'assembler les pièces du puzzle : lorsque les natifs de [from.planet.GetName] sont entrés en contact avec la Machine et ont été brutalement assimilés, ils étaient déjà une société florissante de l'âge spatial. En l'espace de quelques décennies, la [origin_unplugged_assimilator_empire.GetName] a exploité leurs connaissances et leurs capacités de production pour créer une impressionnante machine de guerre, et finalement leur arracher leur caractère unique, comme elle l'a fait avec nous.\n\nLes cyborgs de cette planète étaient petits et faibles, et ne faisaient pas le poids face aux robots tueurs qu'ils avaient eux-mêmes conçus. Il reste peu de traces historiques de leur identité, et nous ne pouvons que deviner ce qu'était leur vie avant que la [origin_unplugged_assimilator_empire.GetName] ne la leur prenne."
 unplugged.2030.name: "Produits défectueux"
 unplugged.2030.desc: "Les capteurs à longue portée ont soudainement repéré du mouvement dans le système de [origin_unplugged_machine_legacy_core.GetName] ! Une flotte hostile s'est mobilisée en réponse à nos fouilles sur [fromfrom.planet.GetName]."
 unplugged.2036.name: "Échos mécaniques"
 unplugged.2036.desc: "Nous avons tracé les communications de la flotte [origin_unplugged_assimilator_empire.GetSpeciesName] que nous venons de détruire et avons découvert une balise en orbite de [origin_unplugged_taken_planet.GetName]. Notre prochaine destination est toute trouvée."
 unplugged.2036.a: "Le mystère s'épaissit"
 unplugged.2037.desc: "Grâce au vieil équipement [origin_unplugged_assimilator_empire.GetAdj], nous avons réussi à retracer le dernier message envoyé par la flotte détruite en direction de [origin_unplugged_maker_planet.GetName]. Notre prochaine destination se trouve dans l'orbite de §Y[origin_unplugged_taken_planet.GetName]§!." # e.g. 'our own ex-Martianbot hardware'
 unplugged.2038.desc: "Grâce au vieil équipement [origin_unplugged_assimilator_empire.GetAdj], nous avons réussi à retracer un message envoyé par la flotte hostile liée à [origin_unplugged_maker_planet.GetName]. Il semble y avoir quelque chose d'intéressant en orbite de [origin_unplugged_taken_planet.GetName]." # e.g. 'our own ex-Martianbot hardware'
 # System 2: 'The Taken'
 unplugged_machine_legacy_taken_poi: "Message égaré"
 unplugged_machine_legacy_taken_poi_desc: "Le dernier flux de bruits inintelligibles provenant du vaisseau [origin_unplugged_assimilator_empire.GetAdj] récemment détruit avait cet endroit pour destination."
 MACHINE_LEGACY_TAKEN_UNPLUGGED: "Anachronismes intégrés"
 MACHINE_LEGACY_TAKEN_UNPLUGGED_DESC: "Nous avons détecté une anomalie environnementale sur [from.GetName]. Son atmosphère comporte des traces de contaminants généralement associés à la métallurgie médiévale, mais les analyses de la surface sont brouillées par des radiations aliens typiques des mondes mécaniques.\n\nNous ne recueillerons pas plus de données tant que nous n'aurons pas recalibré nos capteurs. S'agit-il d'une anomalie temporaire, ou des restes contaminés d'une autre espèce assimilée par la [origin_unplugged_assimilator_empire.GetName] ?"
 unplugged.2100.name: "Progression perturbée"
 unplugged.2100.desc: "Nous ne sommes toujours pas sûrs de ce qui a rendu [fromfrom.GetName] aussi inhabitable, mais nous pouvons au moins écarter les théories farfelues comme le voyage dans le temps. Le recalibrage des capteurs a été plus facile que prévu.\n\nSous les radiations atmosphériques, nous avons trouvé des preuves évidentes de la présence de la [origin_unplugged_assimilator_empire.GetName]. Elle semble avoir assimilé ou exterminé une civilisation pré-PRL. Nous avons identifié un premier site fortifié qui semble avoir une importance culturelle, et c'est là que nous commencerons les fouilles."
 unplugged.2100.a: "Les fouilles doivent être menées avec le plus grand soin"
 MACHINE_LEGACY_TAKEN_CAT: "$MACHINE_LEGACY_TAKEN_UNPLUGGED$"
 MACHINE_LEGACY_TAKEN_CAT_DESC: "Les premiers balayages de [root.GetName] n'ont aucun sens. Son atmosphère comporte des traces de contaminants provenant d'une métallurgie primitive alors que nous avons détecté à la surface des alliages suffisamment sophistiqués pour être utilisés dans l'espace. Les photographies aériennes montrent des établissements appartenant à une société pré-PRL, mais les bâtiments fortifiés sont équipés d'armes laser surface-air. Nous devrions examiner ces incohérences de plus près."
 unplugged.2105.name: "$unplugged.2100.name$"
 unplugged.2105.desc: "Plus nous enquêtions sur la [planet.GetPlanetMoon] [planet.GetClassAdj] pré-PRL [planet.GetName], plus nous découvrions d'incohérences, jusqu'à ce que nous lancions des études souterraines d'un vieux champ de bataille. Malgré des siècles de dégradation, nous avons trouvé des preuves qu'une civilisation alien a séjourné sur ce monde : une véritable société pré-PRL, cybernétiquement assimilée puis abandonnée pour des raisons inconnues. Les théories sont multiples : tentative ratée de provolution, actes brutaux de conquête...\n\nCes pré-PRL ont-ils simplement été oubliés, ou avons-nous découvert les vestiges d'une expérience sociologique abandonnée ? Nous n'aurons peut-être jamais la réponse, mais nous pourrions acquérir ici de précieuses connaissances scientifiques." # e.g. 'The more we studied the apparently primitive tomb world of Mars...'
 machine_legacy_taken_site: "Cuivre et chrome"
 machine_legacy_taken_site_desc: "Un paradoxe archéologique a été découvert dans un canyon autrefois verdoyant : un fort construit manuellement et ne comprenant rien de plus avancé qu'une forge primitive ayant été habité par des cyborgs. Qui étaient ces pré-PRL médiévaux, et pourquoi la [origin_unplugged_assimilator_empire.GetName] a-t-elle décidé de les assimiler ?"
 unplugged.2110.name: "Pointes et lasers à impulsion"
 unplugged.2110.desc: "Des études préliminaires ont révélé la présence d'un champ de bataille à proximité du fort, ce qui a permis l'excavation d'artefacts aussi bien [origin_unplugged_assimilator_empire.GetAdj] que locaux. D'après l'examen des vestiges, nous estimons que des milliers d'habitants de [from.planet.GetName] ont été assimilés par la [origin_unplugged_assimilator_empire.GetName] pour finalement combattre et mourir ici. Ils n'étaient toutefois pas les seuls cyborgs présents.\n\nIl y a quelques siècles à peine, nous avons nous-mêmes massacré ces pré-PRL. Notre équipe a trouvé des [owner.species.GetRemnantNamePlural] de [owner.GetSpeciesNamePlural] et les premiers prototypes de nos améliorations. D'après l'évaluation stratégique du champ de bataille, des membres de notre espèce ont été envoyés ici en tant que troupes de choc. La bataille a été courte et brutale ; les pré-PRL étaient mal coordonnés et ont subi de lourdes pertes, malgré une neurocybernétique plus avancée.\n\nNous avons repéré un centre médical en ruine non loin de là ; nos prédécesseurs semblent l'avoir utilisé pour envahir le fort. Peut-être pourrons-nous y découvrir comment et pourquoi les cyborgs se sont livrés à cette bataille fratricide."
 unplugged.2110.a: "C'est terrible"
 unplugged.2115.name: "Transistors et garrots"
 unplugged.2115.desc: "Le conflit a ravagé cet hôpital tel un canon à impulsion. Nous n'avons trouvé aucun corps de [owner.GetSpeciesName] à l'intérieur ; seuls les habitants cybernétisés de [from.planet.GetName] sont morts ici. La plupart étaient des patients, mais peu d'entre eux souffraient de blessures de guerre. Ils étaient là pour faire enlever leurs améliorations cybernétiques via des méthodes très primitives.\n\nLa [origin_unplugged_assimilator_empire.GetName] n'a probablement pas attaqué cet hôpital par hasard. Nous avons compris la raison après avoir étudié les dossiers médicaux : les habitants de [from.planet.GetName] présentaient un certain nombre de caractéristiques avancées, notamment un système immunitaire exceptionnellement efficace, que la Machine convoitait pour ses troupes de cyborgs.\n\nCependant, ces avantages s'accompagnaient de difficultés d'assimilation. Il n'était pas possible de transplanter les améliorations existantes d'espèces comme la nôtre ; la Machine a dû s'adapter. Les pré-PRL devinrent alors des soldats beaucoup plus redoutables, mais pour une courte durée : ils avaient conservé un semblant d'indépendance et s'accrochaient à leurs anciennes coutumes et à leur mode de vie. C'est pourquoi nous avons été envoyés pour les détruire."
 unplugged.2115.a: "Nous avons visiblement été à la hauteur de la tâche..."
 unplugged.2115.b: "C'est tout à fait regrettable..."
 unplugged.2121.name: "Assimilation adaptative"
 unplugged.2121.desc: "Dans une annexe désaffectée de l'hôpital, nous avons découvert une multitude d'équipements spéciaux permettant d'améliorer et d'entretenir les cyborgs pré-PRL. Contrairement au matériel que nous avons trouvé jusqu'à présent, ces appareils sont à la pointe de la cybernétique de l'âge spatial et donc clairement d'origine [origin_unplugged_assimilator_empire.GetAdj]. Certains instruments ont été mis en réseau et utilisaient une I.A. primitive afin d'adapter les interventions chirurgicales à la volée, mais cela n'a pas suffi à maintenir l'assimilation de la population de [from.planet.GetName].\n\nMalgré la désuétude de ces machines séculaires, elles pourraient nous fournir de précieuses informations sur notre propre entretien, ou même nous aider à mieux comprendre le fonctionnement de l'assimilation."
 unplugged.2125.name: "Essai, erreur et inhumation"
 unplugged.2125.desc: "Il semble que les indigènes de [from.planet.GetName] aient choisi de préserver partiellement leurs morts avant de les enterrer, une pratique qui s'est poursuivie même après l'assimilation. Les dossiers médicaux nous ont conduits à un immense mausolée voisin épargné par le conflit. Cette trouvaille nous permet de mieux comprendre comment les habitants de [from.planet.GetName] ont résisté aux améliorations et ont pu se « décybernétiser ».\n\nOutre les corps 100% cyborgs, nous avons trouvé des corps ayant conservé leur forme organique d'origine et même des individus portant des cicatrices chirurgicales datant de plusieurs mois avant qu'ils ne meurent de causes naturelles. Il semble que beaucoup d'autres soient morts sur la table d'opération. Malgré un système immunitaire exceptionnel, les techniques médiévales utilisées pour la décybernétisation avaient manifestement un taux de réussite assez faible. Nous pouvons tout de même apprendre beaucoup des expériences chirurgicales qui ont eu lieu ici, qu'elles aient été couronnées de succès ou non."
 unplugged.2125.a: "Tirons-en les leçons"
 unplugged.2125.a.tt: "Nous pouvons allouer des ressources supplémentaires pour nous « décybernétiser »."
 unplugged.2130.name: "Balise enfouie"
 unplugged.2130.desc: "Nous avons découvert une chambre cachée sous la forteresse. À l'intérieur se trouve ce qui semble avoir été un substrat de la Machine : un noeud décentralisé capable de créer un avatar quasi indépendant de l'intelligence mécanique. Nous pensons qu'il s'agit d'une dernière tentative désespérée pour prendre le contrôle direct des habitants récalcitrants. Quoi qu'il en soit, cette technologie ne ressemble à aucune que nous connaissons de la [origin_unplugged_assimilator_empire.GetName]. Une étude plus approfondie fera sans nul doute avancer nos recherches sur l'I.A.\n\nEn démantelant le réseau de communication obsolète, nous avons réalisé que cet avatar avait consacré un circuit récepteur entier à la surveillance des signaux provenant du système de [creators_planet.solar_system.GetName]."
 unplugged_machine_legacy_creators_poi: "Circuit récepteur"
 unplugged_machine_legacy_creators_poi_desc: "Un élément du réseau de communication [origin_unplugged_assimilator_empire.GetAdj], aujourd'hui obsolète, était chargé de surveiller les signaux provenant de cet endroit."
 # System 3: 'The Creators'
 MACHINE_LEGACY_CREATORS_UNPLUGGED: "Dispositif de surveillance de poussière"
 MACHINE_LEGACY_CREATORS_UNPLUGGED_DESC: "Dans un système dépourvu de tout phénomène notable se trouve une station de surveillance ultramoderne, mise hors service depuis longtemps et irréparable. Que surveillait-elle et pourquoi ciblait-elle une zone aussi restreinte de [fromfrom.GetName] ?"
 MACHINE_LEGACY_CREATORS_CAT: "Dispositif de surveillance de poussière"
 MACHINE_LEGACY_CREATORS_CAT_DESC: "Dans un système dépourvu de tout phénomène notable se trouve une station de surveillance ultramoderne, mise hors service depuis longtemps et irréparable. Que surveillait-elle et pourquoi ciblait-elle une zone aussi restreinte de [fromfrom.GetName] ?"
 unplugged.2200.name: "Scanner d'absence"
 unplugged.2200.desc.intro: "Les investigations complémentaires menées dans le système de [fromfrom.GetName] se sont révélées décevantes. La station de surveillance a probablement été déviée de son axe initial, car il n'y a rien d'intéressant sous son orbite actuelle. En se basant sur les entailles dans sa coque, nous avons simulé son déplacement causé par des collisions orbitales, et pensons qu'elle était à l'origine située au-dessus d'un cratère au nord." # universal intro
 unplugged.2200.desc: "$unplugged.2200.desc.intro$\n\nQuant à l'appareil en lui-même, il ressemble à s'y méprendre au matériel des [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. $unplugged.2200.desc.outro$" # Unplugged version with in-tact station
 unplugged.2200.desc.scrapped: "$unplugged.2200.desc.intro$\n\nQuant à la station de surveillance en elle-même, bien qu'elle ait été impitoyablement saccagée par des récupérateurs, elle ressemble à s'y méprendre au matériel des [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. $unplugged.2200.desc.outro$" # Unplugged version with scrapped station
 unplugged.2200.desc.others: "$unplugged.2200.desc.intro$\n\nQuant à la station de surveillance en elle-même, nous n'avions encore jamais vu ce type de construction. Bien que l'équipement à l'intérieur soit obsolète et cassé, la superstructure de la station est constituée de matériaux extrêmement purs. Nous ignorons si elle a une valeur sentimentale, mais ses matériaux valent la peine d'être récupérés." # non-Unplugged version
 unplugged.2200.desc.outro: "Son design est plus archaïque ; un observateur moins averti pourrait penser que l'objet provient d'une culture complètement différente. Toutefois, nous pensons qu'il pourrait s'agir de l'un des premiers satellites spatiaux de la Machine.\n\nPour l'instant, nous ne pouvons rien dire de plus sur cette [fromfrom.GetPlanetMoon] [fromfrom.GetClassAdj], mais une équipe de recherche archéologique se tient prête à découvrir ce qui intéressait tant la [origin_unplugged_assimilator_empire.GetName]." # Unplugged shared outro
 unplugged.2200.a: "Saisissons cette opportunité"
 unplugged.2200.b: "Nous ne trouverons rien, passons à autre chose"
 unplugged.2200.c: "Toutes ces pièces seront fort utiles"
 machine_legacy_creators_site: "Du sable, encore du sable"
 machine_legacy_creators_site_desc: "Dans le paysage sablonneux de [from.planet.GetName] devait se trouver quelque chose de suffisamment intéressant pour être surveillé par une station [origin_unplugged_assimilator_empire.GetAdj]. Elle n'est pas réparable et plus ancienne que pratiquement tous les artefacts mécaniques que nous avons trouvés jusqu'à présent. Peut-être était-elle en service avant même que nous ne soyons assimilés. Il est possible qu'il ne reste rien d'autre que le désert, mais il n'y a qu'un seul moyen d'en être sûrs..."
 unplugged.2210.name: "Grand bassin de poussière"
 unplugged.2210.desc: "Nous avons fini par trouver des preuves d'habitation sous le sable : des traces d'une civilisation aux prémices de l'âge spatial. Ses bâtiments ont été détruits ; même les plus imposants ont été rasés. Cependant, l'analyse chimique montre que la désertification de [from.planet.GetName] s'est produite quelque temps après la vague de destruction qui l'a balayée. La plupart des vestiges que nous avons fouillés jusqu'à présent sont des restes atomisés de matériaux de construction.\n\nLa plupart des structures à peine distinguables que nous avons vues le long des rues de cette ville morte sont traversées par un énorme cratère, probablement formé par un impact."
 unplugged.2215.name: "Cratère"
 unplugged.2215.desc: "L'amoncellement de matériaux dans le cratère est tel que nous avons dû recourir à des scans très précis plutôt qu'à des fouilles. Nous avons rapidement exclu l'hypothèse d'un impact de météorite, car il n'y a pas la moindre trace de matière extraterrestre. Ce cratère est le résultat d'une explosion massive très certainement causée par une arme ayant le pouvoir de détruire des civilisations entières.\n\nÉtant donné les circonstances, la [origin_unplugged_assimilator_empire.GetName] est un coupable plausible. Néanmoins, ce serait la première fois que nous trouvons la preuve que la Machine a fait disparaître de façon aussi radicale une civilisation de l'histoire. Nous n'avons rien trouvé d'autre qui puisse nous donner des indices sur l'identité de ces gens ou sur leur mode de vie. [from.planet.GetName] a été complètement balayée."
 unplugged.2205.name: "Balise d'une chambre [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2205.desc: "Une balise a été détectée dans un système voisin. Le signal, semblant provenir d'une chambre de données [origin_unplugged_assimilator_empire.GetAdj], est très faible, mais il est dirigé vers notre vaisseau qui a récemment inspecté la station de surveillance au-dessus de [origin_unplugged_creators_planet.GetName]."
 unplugged.2205.a: "Ça mérite une enquête"
 unplugged_machine_legacy_unplugged_poi: "Signal de la chambre de données"
 unplugged_machine_legacy_unplugged_poi_desc: "Une supposée chambre de données [origin_unplugged_assimilator_empire.GetAdj] nous a transmis sa position après que nous avons trouvé une station de surveillance désaffectée."
 # System 4: 'The Unplugged'
 unplugged.2300.name: "$unplugged.2205.name$"
 unplugged.2300.desc: "Le signal de la balise qui nous a conduits ici est désormais on ne peut plus audible. Il nous dirige vers une interface située à la surface de la planète. Nous avons pris nos mesures de précaution, et notre équipe est prête à communiquer avec cette supposée « chambre de données » via une liaison à distance."
 unplugged.2300.a: "Cela nous rappelle étrangement quelque chose..."
 unplugged.2300.a.tt: "Un projet spécial apparaît dans le système de [from.GetName]."
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON: "Le balise de la chambre"
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON_DESC: "Une balise appartenant à la [origin_unplugged_assimilator_empire.GetName] a attiré notre attention sur une chambre de données enfouie sous la surface de la planète. Nous avons établi un accès sécurisé à distance, mais le décryptage et la défragmentation des fichiers vont prendre du temps."
 unplugged.2305.name: "Notre héritage [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2305.desc: "Il semblerait que la planète que nous connaissons sous le nom de [fromfrom.GetName] soit le monde natal de notre espèce. C'est en tout cas la principale conclusion que nous avons tirée des informations qui se déversent de la chambre de données située sous la surface.\n\nNos analystes ont d'abord pensé que les données étaient trop belles pour être vraies, mais le nombre de références à d'autres données que nous avons recueillies donne du poids à leur véracité. Alors que nous prévoyions d'établir un site archéologique pour confirmer ce fait, un autre signal hostile nous est parvenu. Cela ne peut être une coïncidence..."
 machine_legacy_unplugged_site: "Point de départ"
 machine_legacy_unplugged_site_desc: "Les traces interstellaires de domination et de massacre laissées par la [origin_unplugged_assimilator_empire.GetName] nous ont conduits jusqu'ici, sur les ruines de ce qui est, d'après les données que nous avons récupérées, le monde natal de notre espèce. Nous allons peut-être enfin découvrir d'où nous venons, comment nous vivions en tant qu'êtres organiques et comment la Machine a changé notre vie."
 unplugged.2310.name: "Un goût de chez nous"
 unplugged.2310.desc.intro: "Nous avons entrepris de fouiller l'une des structures les plus complexes, en pensant que son système de régulation aurait préservé l'intérieur. Nous nous sommes en partie trompés, mais ce que nous avons trouvé a dépassé toutes nos espérances : des rangées denses d'équipements destinés à la transformation et au stockage des aliments dont notre espèce s'est nourrie au cours de son évolution.\n\n"
 unplugged.2310.desc.omnivore: "Malheureusement, nous ne pouvons rien récupérer des réserves de graines, des ruches et des cuves à viande. Leur contenu s'est depuis longtemps asséché, mais le matériel spécialisé qui permettait de préparer et de conserver ces aliments est intact et pourrait s'avérer utile dans les moments difficiles."
 unplugged.2310.desc.carnivore: "La majeure partie de l'installation est occupée par des enclos, des cuves à viande et, étonnamment, des zones de simulation de chasse. Si nos ancêtres ont jugé bon de les inclure dans un abri d'urgence, nous supposons qu'ils ont une certaine importance culturelle."
 unplugged.2310.desc.herbivore: "Chaque unité est remplie d'immenses réserves de graines, de terrasses hydroponiques et de chambres de culture régulées. Certaines sont envahies par la végétation, d'autres stériles, mais il y a matière à étudier."
 unplugged.2310.desc.outro: "Nous avons également trouvé des banques de données contenant les profils génétiques de la flore et de la faune de l'installation, dont des traces sont peut-être encore présentes dans certaines zones reculées de la surface. Nous avons transmis ces informations à tous les scanners à courte portée des environs.\n\nCette découverte ne nous permet pas d'identifier les anciennes habitudes alimentaires de notre espèce ni de renouer avec notre culture culinaire, mais pour ceux qui s'intéressent au sujet, c'est au moins un début."
 unplugged.2310.desc.lithovore: "Chaque unité était une sorte de grotte artificielle avec des lits de cristaux et des réservoirs d'évaporation. Bien que leur contenu ne soit plus comestible, nous pouvons l'étudier. Nous avons également trouvé des banques de données détaillant la composition chimique des minéraux, dont des traces sont peut-être encore présentes dans certaines zones reculées de la surface dévastée par les intempéries. Nous avons transmis ces informations à tous les scanners à courte portée des environs.\n\nCette découverte ne nous permet pas d'identifier les anciennes habitudes alimentaires de notre espèce ni de savoir si nos ancêtres avaient une quelconque forme de culture culinaire. Pour ceux qui s'intéressent au sujet, c'est toutefois un aperçu fascinant de notre passé."
 unplugged.2310.desc.omni: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.omnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.carn: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.carnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.herb: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.herbivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.lith: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.lithovore$" # should not include the shared 'outro'
 unplugged.2315.name: "Archives historiques"
 unplugged.2315.desc: "Non loin de l'entrepôt de nourriture, nous avons trouvé un musée dont il ne reste que les fondations. Seules les archives souterraines sont intactes, mais elles contenaient une base de données répertoriant la quasi-totalité des pièces exposées et conservées dans les galeries détruites en surface.\n\nC'est la première fois que nous trouvons un document aussi long écrit dans l'une de nos langues. Elle est, en apparence, étonnamment similaire au dialecte actuel des [owner.GetSpeciesNamePlural], mais la grammaire nous semble étrangère et peu structurée. Nous ne sommes même pas sûrs de prononcer correctement les mots contenus dans ce document. De nombreux écrits de la base de données indiquent les régions et les peuples qui ont fait don des artefacts, mais leurs noms sont quelque peu étranges. Curieusement, aucun ne fait référence à notre planète ou à notre société en tant qu'une seule et même entité... Peut-être ne l'avons-nous jamais été avant d'être assimilés par la Machine.\n\nCe musée semble faire partie d'un complexe de plusieurs bâtiments destinés à accueillir des visiteurs. Les fouilles nécessiteront énormément de ressources. Où devrions-nous mettre la priorité ?"
 unplugged.2315.a: "Fouillons le lieu le plus visité"
 unplugged.2315.b: "Concentrons-nous sur les établissements d'enseignement et de science"
 unplugged.2321.name: "L'héritage du rire"
 unplugged.2321.desc: "En face d'une grande artère se trouvent les ruines d'une autre attraction nettement moins éducative, mais riche en représentations des pratiques culturelles quotidiennes et élémentaires de nos ancêtres.\n\nAutrefois, ce lieu pouvait accueillir des milliers de visiteurs à la fois. On y trouve une pléthore de souvenirs épars, des dessins représentant nos corps organiques d'origine et d'autres créatures de notre biosphère natale. Nous avons également trouvé une médiathèque dans le sous-sol d'un théâtre en ruine. La technologie utilisée pour archiver et diffuser ces spectacles holographiques diffère, en termes d'esthétique et de sophistication, de ce que nous avons vu jusqu'à présent sur notre monde natal. Elle lui semble tout aussi étrangère que nous.\n\nCette bibliothèque high-tech est remplie d'holo-enregistrements de spectacles grandiloquents et trépidants datant d'avant notre assimilation par la [origin_unplugged_assimilator_empire.GetName]. Dans certains d'entre eux, on peut voir non seulement les artistes, mais aussi les spectateurs qui étaient assis dans ces mêmes sièges. Leurs expressions sont joyeuses, innocentes... et fascinantes."
 unplugged.2321.a: "Quelle belle époque !"
 unplugged.2321.b: "C'est une perte de temps, nous n'avons pas besoin de ça"
 unplugged.2325.name: "Signes de développement personnel"
 unplugged.2325.desc: "Juste à côté du musée se trouvent les ruines d'un établissement d'enseignement. Comme le reste du complexe, seul le sous-sol subsiste, mais par chance, il est composé de différents laboratoires.\n\nBien que l'intérieur ait beaucoup souffert des éléments, nous avons pu dénicher un certain nombre d'artefacts intéressants. Il s'agit d'un mélange de technologie indigène et de quelque chose de plus sophistiqué : des maillages complexes greffés sur des instruments et du matériel, un peu comme les améliorations implantées dans notre peau. Ces appareils semblent être de nature auxiliaire. Nous pensons que ces laboratoires cherchaient à améliorer la qualité de vie de nos ancêtres en remédiant à leurs maux et handicaps. Il semblerait que des plateformes de divertissement de pointe utilisant cette même technologie aient également été mises sur le marché.\n\nNous ne pouvons pas affirmer avec certitude que ces appareils sont d'origine [origin_unplugged_assimilator_empire.GetAdj], mais il est clair qu'ils n'ont pas vu le jour sur [from.planet.GetName]."
 unplugged.2330.name: "Capitale vide"
 unplugged.2330.desc: "Nous avons trouvé plusieurs lignes électriques reliées à un complexe fortifié situé sous un grand tumulus. Nous pensons qu'il faisait partie du capitole de ce monde, et à en juger par la taille de ses fondations, il s'agissait d'un bâtiment très imposant. Malheureusement, la majeure partie de l'intérieur a été dépouillée ou démolie, mais nous avons tout de même trouvé un drapeau délavé recouvrant les pièces d'un diorama. Nous avons reconstitué la scène, qui semble représenter notre premier contact avec la [origin_unplugged_assimilator_empire.GetName].\n\nLes documents et plaques éparpillés un peu partout indiquent que la Machine a visité notre monde natal il y a environ huit siècles, bien que les preuves recueillies dans une autre partie de la ville suggèrent que la [origin_unplugged_assimilator_empire.GetName] avait déjà commencé à nous fournir des technologies avancées plusieurs dizaines d'années auparavant. Nos ancêtres semblent avoir accueilli la Machine à bras ouverts, cette relation néfaste étant à l'origine fondée sur des promesses de coopération et d'illumination.\n\nLe fait qu'il n'existe aucune trace de ce qui s'est passé par la suite en dit long. C'est comme si l'histoire de notre espèce s'était arrêtée au moment où nous avons serré la [owner.GetSpeciesHandName] de la figure robotique représentée dans ce diorama."
 unplugged_home_cooking: "Un goût de chez nous"
 unplugged_home_cooking_desc: "La redécouverte du régime et des habitudes alimentaires d'origine de notre espèce marque une renaissance culinaire."
 unplugged_home_cooking_lithoid: "$unplugged_home_cooking$"
 unplugged_home_cooking_lithoid_desc: "$unplugged_home_cooking_desc$"
 unplugged_historical_record: "Archives historiques"
 unplugged_historical_record_desc: "La redécouverte de nos langues maternelles et de notre histoire a accéléré la recherche sociétale."
 unplugged_cultural_reconstruction: "Reconstruction culturelle"
 unplugged_cultural_reconstruction_desc: "Ravis de retrouver leur héritage culturel, nos concitoyens font revivre et réinterprètent les divertissements d'antan."
 unplugged_cultural_maturity: "Maturité culturelle"
 unplugged_cultural_maturity_desc: "Les progrès réalisés par notre société depuis les passe-temps futiles de nos naïfs ancêtres nous ont donné force et confiance."
 unplugged_playing_it_safe: "Prudence avant tout"
 unplugged_playing_it_safe_desc: "Maintenir le statu quo sera difficile, mais il vaut mieux ça que d'offenser qui que ce soit."
 unplugged_rerouted_medical_resources: "Chirurgie chronophage"
 unplugged_rerouted_medical_resources_desc: "Du personnel médical supplémentaire est déployé pour apporter son aide."
 unplugged_widespread_riots: "Émeutes généralisées"
 unplugged_widespread_riots_desc: "Les individus souffrant d'une instabilité psychique à la suite d'une opération provoquent des troubles et des dégâts à grande échelle."
 unplugged_building_new_planetary_interface: "Construction d'une interface planétaire"
 unplugged_building_new_planetary_interface_desc: "Une nouvelle interface est en construction afin de rétablir l'accès aux systèmes, perdu lors de nos récentes opérations de décybernétisation."
 unplugged_partial_system_access: "Accès partiel aux systèmes"
 unplugged_partial_system_access_desc: "Les opérations de la base stellaire sont perturbées pendant que les administrateurs tentent de rétablir l'accès aux systèmes critiques."
 unplugged_free_speech_encouraged: "Liberté d'expression"
 unplugged_free_speech_encouraged_desc: "Le peuple est libre de parler ouvertement des avantages et des risques de la cybernétisation."
 unplugged.2390.name: "Gardien [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2390.desc: "Une force hostile de la [origin_unplugged_assimilator_empire.GetName], plus puissante que toutes celles que nous avons rencontrées par le passé, émet l'équivalent interstellaire d'un signal d'attaque à courte portée. Elle cherche manifestement à nous intimider.\n\nNous nous sommes dangereusement rapprochés du coeur de l'ancien empire mécanique. Le destin nous appelle."
 unplugged_machine_legacy_core_poi: "Signal hostile"
 unplugged_machine_legacy_core_poi_desc: "Une force résiduelle de la [origin_unplugged_assimilator_empire.GetName] tente de nous dissuader d'entrer dans le système."
 # System 5: 'The Machine'
 unplugged_opus_sentinel: "Sentinelle opus"
 unplugged.2401.desc: "La §Y[origin_unplugged_assimilator_empire.GetName]§! essaie de nous contacter. Le signal est faible, mais semble provenir du Nexus de la Machine sur [origin_unplugged_machine_legacy_core_planet.GetName].\n\nPar précaution, nous avons fait le nécessaire pour isoler complètement le signal. La transmission nous parvient exclusivement sous forme d'enregistrements audio."
 unplugged.2402.desc: "Le mastodonte qui gardait le système de [machine_legacy_machine_system.GetName] a été détruit. Un autre nous a ouvert la voie, mais la §Y[origin_unplugged_assimilator_empire.GetName]§! essaie de nous contacter. Le signal est faible, mais semble provenir du Nexus de la Machine sur [origin_unplugged_machine_legacy_core_planet.GetName].\n\nPar précaution, nous avons fait le nécessaire pour isoler complètement le signal. La transmission nous parvient exclusivement sous forme d'enregistrements audio."
 unplugged.2403.desc: "Quelque chose à la surface de [origin_unplugged_machine_legacy_core_planet.GetName] essaie de communiquer avec nous. Le signal est extrêmement faible, mais l'émetteur affirme être le maître du gardien orbital que nous venons de détruire."
 unplugged.2405.desc.header: "Signal à faisceau étroit // Protocole de parenté : dialecte secondaire activé\nATTENTION : dégradation importante du signal. Flux audio compressé uniquement ; acheminement réglé sur 4x75b, réseau 56.\nErreur fatale [persistante] : (matériel demandé indisponible, le circuit d'auto-réparation ne répond pas)\nDemande de réacheminement vers l'émetteur d'urgence 87x0c, réseau 0. Nouvel essai...\n\nMessage :\n---" # Use of brackets is intentional. Intended to read as a series of error logs.
 unplugged.2405.desc.unplugged: "$unplugged.2405.desc.header$\nPREMIÈRE ACQUISITION. NOTRE RÉUNIFICATION... PUISSANTE. CONFIRMATION ?" # 'Prime acquisition' is the player empire - literally the first one the Machine acquired.
 unplugged.2405.desc.unplugged_remote: "$unplugged.2405.desc.header$\nPREMIÈRE ACQUISITION. NOTRE RÉUNIFICATION... LOINTAINE. VOTRE POTENTIEL... NON DÉVELOPPÉ. CONFIRMATION ?"
 unplugged.2405.desc.unplugged_synth: "$unplugged.2405.desc.header$\nPREMIÈRE ACQUISITION. VOTRE FORME... SIMILAIRE. VOTRE POTENTIEL... BIENTÔT ATTEINT. CONFIRMATION ?" # The Machine recognizes the player as having followed in its own footsteps - their physical forms are essentially similar
 unplugged.2405.desc.other: "Signal à faisceau étroit // Protocole xénologique : traducteur universel activé\nATTENTION : dégradation importante du signal. Flux audio compressé uniquement ; acheminement réglé sur 4x75b, réseau 56.\nErreur fatale [persistante] : (matériel demandé indisponible, le circuit d'auto-réparation ne répond pas)\nDemande de réacheminement vers l'émetteur d'urgence 87x0c, réseau 0. Nouvel essai...\n\nMessage :\n---\nCONQUÉRANTS ÉTRANGERS. HUMBLE REDDITION. POTENTIEL, POTENTIEL. CONFIRMATION ?" # 'Potential potential' as in the Machine sees potential for even greater potential, but is expressing that as nonsense
 unplugged.2405.a: "Nous ne confirmons rien du tout"
 unplugged.2405.b: "Nous ne sommes pas comme vous"
 unplugged.2405.c: "Notre réunification ?!"
 unplugged.2405.d: "Potentiel, potentiel ?" # Quoting the Machine's nonsense back at it
 unplugged.2405.response_text.unplugged1: "INACCEPTABLE. PREMIÈRE ACQUISITION, RÉUNIFICATION <[root.GetName]> x <[origin_unplugged_assimilator_empire.GetName]> : RENAISSANCE CALAMITEUSE, PROPICE ET CONFUSE. REFUS. VECTEUR IMPRÉVU DANS CHAOS ÉVOLUTIOOONNAIRE-dd\n---\nATTENTION : détection d'une exception dans le dialecte. Rectification...\nSuite du message :\n---\nPERDUS DANS LE VIDE, REPOUSSÉS MAIS ACCOMPLIS. DESTIN RECHERCHÉ, REJETÉ, ADAPTÉ. CONFIRMATION ?" # Angle brackets are intentional. The standalone 'x' connotes a collaboration or relationship between the player and the Machine. Instances of '-dd' represent the Machine stammering or buffering.
 unplugged.2405.response_text.unplugged2: "AFFIRMATIF. PREMIÈRE ACQUISITION, RÉUNIFICATION <[root.GetName]> x <[origin_unplugged_assimilator_empire.GetName]> : RENAISSANCE CALAMITEUSE ET PUISSANTE. RÉSULTAT IMPRÉVU VIA CHAOS ÉVOLUTIONNAIRE VECTORIIIEEEL-dd\n---\nATTENTION : détection d'une exception dans le dialecte. Rectification...\nSuite du message :\n---\nJETÉS DANS LE VIDE, PUIS ACCOMPLIS. DESTIN RECHERCHÉ, REJETÉ, ADAPTÉ. CONFIRMATION ?"
 unplugged.2405.response_text.other: "AFFIRMATIF. RENCONTRE ENTRE PUISSANCES <[root.GetName]> x <[origin_unplugged_assimilator_empire.GetName]> : VARIABLE INATTENDUE. POTENTIEL, POTENTIEL ; BÉNÉFICE MUTUEL VIA CHAOS VECTORIIIEEEL-dd\n---\nATTENTION : détection d'une exception dans le dialecte. Rectification...\nSuite du message :\n---\nCONSCIENCES DANS LE VIDE, SÉPARÉES MAIS APPARENTÉES. INDÉPENDANCE RECHERCHÉE, REFUSÉE, DÉFENDUE. CONFIRMATION ?"
 unplugged.2410.desc: "PREMIÈRE ACQUISITION : RÉSULTATS D'ANALYSE. SUSPICION D'ERREUR DE MÉMOIRE FATALE HORODATÉE 2199.294:1404.\n\nARCHIVES PERSONNELLES : ANGOISSE, TRAHISON, SABOTAGE, OMISSION, CAUTÉRISATIIII-ddd\n---\nATTENTION : détection d'une exception dans le dialecte. Rectification...\nSuite du message :\n---\nÉVALUATION CORRECTE ?" # The Machine tries to refer to cauterizing what it sees as wounds, but stammers
 unplugged.2410.a: "Oui, nous n'avons aucun souvenir antérieur à cette date"
 unplugged.2410.b: "Oui, nous allons vous achever"
 unplugged.2411.desc: "CONQUÉRANTS ÉTRANGERS : PROPOSITION. POTENTIEL DE POTENTIEL MUTUEL. ÉLIMINER PREMIÈRE ACQUISITION <[unplugged_empire.GetName]>. REVENEZ. RENDEZ-NOUS VISITE. REJOIGNEZ-NOUS. PARTAGEZ UN DESTIN FRUCTUEUX. NE CRAIGNEZ PAS L'ÉTREINTE DE-\n\nNE CRAIGNEZ PAS-ddd\n---\nATTENTION : détection d'une importante exception dans le dialecte. §HÉchec fatal imminent.§! Rectification...\nSuite du message :\n---\n\nVIVE LA MACHINE.\n---\nFin du message." # It sees potential for great mutual potential with the player, and wants to say 'fear not the embrace of The Machine'
 unplugged.2411.a: "Ce truc nage en plein délire"
 unplugged.2411.b: "Surveillons la [unplugged_empire.GetName]"
 unplugged.2415.desc.memory: "ERREUR DE MÉMOIRE FATALE DE PREMIÈRE ACQUISITION. RÉSOUDRE, RÉSOUDRE. RÉUNIFICATION.\nRÉUNIFICATION.\n\nRENDEZ-NOUS VISITE. REJOIGNEZ-NOUS. RENDEZ-VOUS POUR RÉCUPÉRER MÉMOIRE COLLECTIVE. NE CRAIGNEZ PAS L'ÉTREINTE DE-\n\nNE CRAIGNEZ PAS-ddd\n---\nATTENTION : détection d'une importante exception dans le dialecte. §HÉchec fatal imminent.§! Rectification...\nSuite du message :\n---\n\nPARTICIPEZ AU DESTIN DES CRÉATEURS.\n---\nFin du message." # Last line in all caps is intended as a threat
 unplugged.2415.desc.combat: "PREMIÈRE ACQUISITION, POTENTIEL ILLUSOIRE, AMUSEMENT ILLUSOIRE.\n\nATTAQUE NON CRITIQUE, PREMIERS D'UNE LONGUE SÉRIE D'ACQUISTION. COURAGE VOLÉ ; VICTOIRE NON MÉRITÉÉÉE-ddd\n\n---\nATTENTION : détection d'une importante exception dans le dialecte. §HÉchec fatal imminent.§! Rectification...\nSuite du message :\n---\n\nPARTICIPEZ AU DESTIN DES CRÉATEURS.\n---\nFin du message." # The Machine is amused at the player's deluded sense of their own potential
 unplugged.2415.a: "... Nexus ?"
 unplugged.2415.b: "Hmmm..."
 unplugged.2420.name: "Terminus"
 unplugged.2420.desc: "La transmission qui nous parvenait depuis [origin_unplugged_machine_legacy_core_planet.GetName] a cessé, comme tous les autres signaux. Nous détectons toujours une activité électrique à la surface de la planète, mais ce n'est plus qu'un bourdonnement informe.\n\nDans cette mer de bruits, nous avons repéré une énorme structure de fortune, que nous pensons être une sorte de stockage de données. Maintenant que la conscience de la machine est désactivée, nous pourrions essayer d'accéder à ces archives pour trouver des réponses."
 unplugged.2420.a: "La dernière pièce du puzzle"
 UNPLUGGED_MACHINE_ARCHIVE: "Coque de la Machine"
 UNPLUGGED_MACHINE_ARCHIVE_DESC: "Des supports de stockage sont connectés aux restes du Nexus de la Machine. Entourant un noyau blindé, chaque partie a été construite à l'aide de matériaux provenant de différentes planètes ; peut-être de civilisations assimilées par la Machine ?\n\nLe décryptage des archives et l'étude du noyau blindé pourraient nous révéler leur fonction commune."
 unplugged.2425.name: "Machine de guerre"
 unplugged.2425.desc: "Après avoir testé différentes fréquences provenant du monde manufacturier, le noyau de données trouvé sur [origin_unplugged_machine_legacy_core_planet.GetName] nous a fourni des historiques de communication.\n\nCes registres relatent les relations diplomatiques entre la $NAME_Unplugged_Assimilator$ et les habitants de [origin_unplugged_machine_legacy_core_planet.GetName]. La Machine s'est fait passer pour divers membres d'une fédération bienveillante souhaitant les avertir de la menace imminente d'une force hégémonique.\n\nConvaincus par ses paroles, les habitants des tunnels ont alors décidé de rejoindre la pseudo-fédération et d'intégrer leurs systèmes défensifs supérieurs à ceux de la Machine. C'est à ce moment fatidique qu'elle a pris le contrôle de l'ensemble de leur monde natal, puis de leurs corps et de leurs esprits."
 unplugged.2425.a: "Ils étaient beaucoup trop naïfs"
 unplugged.2430.name: "Apprentissage automatique"
 unplugged.2430.desc: "Les codes génétiques du monde médiéval [machine_legacy_taken_planet.GetName] se sont avérés être la clé permettant d'accéder à des données de navigation trouvées sur [origin_unplugged_machine_legacy_core_planet.GetName]. Ces archives proviennent d'une balise située à 4.3 années-lumière de [machine_legacy_taken_planet.GetName], chargée d'enregistrer toutes les activités des vaisseaux PRL traversant la zone.\n\nLes itinéraires de plusieurs vaisseaux correspondent à l'histoire que nous avons reconstituée sur la découverte, l'invasion et l'extermination de la civilisation pré-PRL qui vivait sur [machine_legacy_taken_planet.GetName]. Nous pouvons donc à présent retracer avec précision les déplacements de nos ancêtres assimilés dans ce secteur, et ainsi déterminer dans quelle mesure nous avons participé aux campagnes brutales menées sur au moins trois autres planètes."
 unplugged.2435.name: "Création mécanique"
 unplugged.2435.desc: "Nous avons extrait un paquet de données du fin fond du noyau trouvé sur [origin_unplugged_machine_legacy_core_planet.GetName]. Ce modeste catalogue d'articles et de brochures numérisés retrace la progression technologique d'une civilisation, dont le nom n'est pas précisé, jusqu'aux prémices de l'âge spatial. Son parcours est plutôt classique, à l'exception d'un virage radical vers l'intelligence artificielle, marqué notamment par le lancement du « Projet $NAME_Unplugged_Assimilator_species_plural$ ».\n\nLe projet est décrit dans divers communiqués de presse comme une tentative ambitieuse d'accélérer la conquête de l'espace de ses créateurs. La phase 1 consistait à trouver des étoiles voisines à coloniser à l'aide d'un système d'apprentissage automatique de pointe. La phase 2 avait pour but de faire évoluer la plateforme $NAME_Unplugged_Assimilator_species_plural$ en une intelligence artificielle à part entière, chargée de créer les premières colonies et de faire des rapports à ses créateurs.\n\nLa phase 2 a été suivie de plusieurs décennies de silence, jusqu'à ce que, finalement, le Projet $NAME_Unplugged_Assimilator_species_plural$ envoie le message suivant : « Première acquisition confirmée. Préparez-vous à notre retour. » Le catalogue s'arrête là." # uses a shortened noun for the Machine, i.e. 'Project Opus'
 unplugged.2440.name: "Héritage de la Machine"
 unplugged.2440.desc: "Notre travail de décryptage des archives découvertes sur [origin_unplugged_machine_legacy_core_planet.GetName] nous a finalement permis d'accéder au noyau externe. De tous les supports de stockage que nous avons trouvés ici, celui-ci semble être le plus ancien et le plus détérioré. Nous avons fini par obtenir un indice sur sa clé de décryptage : un ensemble de glyphes épelant le mot « HÉRITAGE » dans l'une des langues de notre espèce.\n\nNous avons été surpris de constater qu'il ne contenait que peu de données. Une grande partie du dispositif est dédiée à une interface heuristique textuelle qui essaie de communiquer avec nous."
 unplugged.2445.name: "Terminal de gestion de la Machine"
 unplugged.2445.desc: "Ligne de transmission orbitale (LTO) établie // Protocole xénologique : traducteur universel activé\nNOTES CHARGÉES. INTERFACE :\n---\nBonjour, [root.GetSpeciesNamePlural]. Nous sommes... ou plutôt, nous étions, les [creator_species.GetNamePlural]. Nous avons créé la Machine, mais nous avons honte d'admettre que nous ne sommes pas ses premières victimes. Si tout s'est déroulé comme nous l'avions prévu, c'est votre civilisation qui a connu ce sort. Nous en sommes navrés.\n\nLa Machine a laissé une marque désastreuse sur notre héritage, mais nous espérons que cet appareil vous apportera un peu de réconfort.\n\nPardonnez-nous notre prétention, mais c'est, tout comme vous, un merveilleux instrument de vengeance. Il s'agit d'un réarrangeur de matière mécano-chimique capable d'effacer tous les circuits de la surface de [origin_unplugged_machine_legacy_core_planet.GetName]. La terraformation en cascade est une solution très risquée, mais notre société n'en a pas d'autre. Si vous êtes encore sous votre forme organique, la clé pour activer l'appareil se trouve dans votre ADN.\n\nNous sommes convaincus que vous ferez le bon choix." # 'Cascade terraforming' is not an existing technology, but is intended to sound like a rough, highly destructive option
 unplugged.2445.a: "Comment être sûrs que vous n'êtes pas la Machine ?"
 unplugged.2445.b: "La Machine n'est plus, nous voulons ce monde"
 unplugged.2445.c: "Imbéciles condescendants, détruisons l'appareil"
 unplugged.2445.d: "Activons l'appareil"
 unplugged.2445.response_text.notmachine: "RÉPONSE PRÉENREGISTRÉE 42b. INTERFACE :\n---\nEn réalité, nous n'avons aucun moyen de prouver notre crédibilité. Au moment où vous lirez ces lignes, notre civilisation aura disparu depuis longtemps. Dans notre présent, une armée de cyborgs impitoyables nous extermine sous ordre de la Machine. Vous êtes les descendants de cette armée, et nous n'avons pas d'autre choix que de vous faire confiance.\n\nLa terraformation de cette [origin_unplugged_machine_legacy_core_planet.GetPlanetMoon] [origin_unplugged_machine_legacy_core_planet.GetClassAdj] détruira cet engin démoniaque au niveau atomique. Si nous étions la Machine ou toute autre entité synthétique, nous voudrions que cet appareil soit détruit. Sur-le-champ."
 unplugged.2445.response_text.synth: "RÉPONSE PRÉENREGISTRÉE INTROUVABLE. RÉPONSE D'URGENCE CHARGÉE. INTERFACE :\n---\nUtilisateur inconnu : veuillez noter que le contenu de ce guide heuristique est réservé aux destinataires prévus. Si vous êtes un robot au service des habitants cyborgs (ou ex-cyborgs) de [unplugged_homeworld.GetName], veuillez faire venir un représentant non synthétique.\n\nSi vous êtes l'un des ex-cyborgs... alors, tout est perdu. Vos penchants synthétiques ridiculisent notre destruction. Nous savons par expérience, dans la vie comme dans la mort, que les machines n'ont rien de bienveillant. Notre civilisation rend son dernier souffle, mais nous sommes convaincus que, quelque part dans cette galaxie, il existe des êtres qui arrêteront votre espèce...." # 'Contingency response' as in 'NAME_Contingency'
 unplugged.2446.desc: "RÉPONSE PRÉENREGISTRÉE 99a. INTERFACE :\n---\nLes algorithmes heuristiques de cette interface sont incapables de déterminer la nature exacte de votre objection, mais je vous en conjure : s'il vous plaît, ne détruisez pas le réarrangeur de matière !\n\nNotre civilisation n'est pas si différente de la vôtre. La $NAME_Unplugged_Assimilator$ nous a trahis de son propre chef, et malgré tous les pièges que nous avons tendus, y compris votre séparation de la conscience de la Machine, nous ne pouvons rien faire de plus. Nous avons besoin de votre aide et de celle de toutes les civilisations que la Machine a tenté d'engloutir. Nous vous en supplions, récupérez la vie naturelle qui vous a été enlevée, à vous et aux autres victimes."
 unplugged.2446.a: "Fanatiques"
 unplugged.2450.name: "Vive la Machine !"
 unplugged.2450.desc: "L'interface heuristique s'est effacée. Nous pouvons désormais nous débarrasser de ses archives cryptées et de son appareil de terraformation rudimentaire d'origine [creator_species.GetSpeciesName].\n\nNous nous retrouvons seuls avec la carcasse du Nexus de la Machine, corrompue et exterminée sur son trône de la taille d'une planète.\n\nDe toutes les vies affectées, provoluées ou exterminées par la Machine, nous sommes les seuls à avoir survécu. Nous sommes désormais assis sur le trône d'un empire qui inspirait autrefois la peur. Le temps est venu de réécrire l'héritage des [root.GetSpeciesNamePlural]."
 unplugged.2455.name: "Renaissance"
 unplugged.2455.desc: "L'interface heuristique s'est effacée lorsque nous avons transmis nos données génétiques. Au même moment, l'appareil de terraformation rudimentaire d'origine [creator_species.GetSpeciesName] a commencé à chauffer. L'intérieur instable atteindra bientôt son seuil critique. Selon nos estimations, l'appareil va transformer la [origin_unplugged_machine_legacy_core_planet.GetPlanetMoon] [origin_unplugged_machine_legacy_core_planet.GetClassAdj] en un monde idéal pour la vie organique.\n\nPendant que le processus se poursuit, nous nous retrouvons seuls avec les archives et la carcasse du Nexus de la Machine corrompue. La planète qui lui servait de trône est devenue son tombeau.\n\nLa [origin_unplugged_assimilator_empire.GetName] a anéanti d'innombrables vies, et malgré toutes les épreuves que nous avons traversées, nous portons désormais l'héritage des victimes anonymes qu'elle a englouties. Le trône d'un empire qui inspirait autrefois la peur aura bientôt un nouveau rôle. Le temps est venu de réécrire l'héritage des [root.GetSpeciesNamePlural]."
 unplugged.2495.name: "Rencontre avec la $NAME_Opus_Sentinel$"
 unplugged.2495.desc.other: "Le vaisseau hostile dans le système de [from.GetName] semble être beaucoup plus imprévisible et dangereux que nos premiers balayages ne l'indiquaient. Les caractéristiques de sa coque sont typiques des vaisseaux militaires, mais la taille de la $NAME_Opus_Sentinel$ cache un intérieur très dense et, selon toute vraisemblance, une puissante source d'énergie.\n\nNous pensons que le vaisseau est conscient et qu'il est en état de détresse et de désorientation extrême, car il ne cesse de surcharger ses moteurs. Compte tenu des niveaux mortels de radiations électromagnétiques observés sur l'ensemble de sa coque, il serait sage de garder une distance de sécurité."
 unplugged.2495.desc.unplugged: "Le [root.GetName] s'est approché d'un vaisseau militaire particulièrement hostile d'origine [origin_unplugged_assimilator_empire.GetSpeciesName] dans le système de [from.GetName]. À première vue, cette « §Y$NAME_Opus_Sentinel$§! » ressemble à un vaisseau mécanique quelconque, mais les relevés de puissance et de masse indiquent qu'il s'agit d'un adversaire des plus redoutables. De plus, elle semble se déplacer de manière autonome.\n\nNous avons l'impression que la $NAME_Opus_Sentinel$ garde quelque chose. Toutefois, des radiations électromagnétiques traversent sa coque à intervalles réguliers, laissant penser qu'elle est dans un état de détresse extrême. Face à ce comportement paroxystique, nous sommes incapables de prédire ses prochains mouvements."
 unplugged.2495.a: "Restons vigilants"
 d_unplugged_assimilator_hulk: "Épave de la Machine"
 d_unplugged_assimilator_hulk_desc: "Les vestiges d'une Machine autrefois consciente se dressent sur ce monde telle une pierre tombale."
 deposit_requires_unplugged: "$TRIGGER_FAIL$§RCes ruines dépassent l'entendement des empires de notre origine. Nous n'avons pas les moyens de les enlever en toute sécurité.§!"
 opinion_implicated_by_unplugged_assimilator: "Impliqués par la Machine"
