 unplugged.3000.name: "Notre incarnation" # intentionally abstract - 'how we embody ourselves' - referring to the accompanying Situation
 unplugged.3000.desc: "Nous, [root.GetSpeciesNamePlural], avons connu bien des conflits depuis que nous nous sommes libérés de la conscience collective de la Machine. Même dans les moments de paix et de repos, lorsque nous sommes seuls avec nos pensées, nous sommes confrontés à un conflit intérieur : accepter ou non les douloureuses mais formidables améliorations qui nous été greffées de force.\n\nCe conflit intime affecte déjà notre société, que nous le voulions ou non. Nous allons donc examiner les expériences de vie des [root.GetSpeciesNamePlural] à mesure que la [root.GetName] se développe. Grâce à cette étude complète, nous pourrons voir si une tendance se démarque, que ce soit pour la décybernétisation ou la généralisation des améliorations, ou si nos concitoyens préfèrent garder leur forme actuelle."
 unplugged.3000.a: "Surveillons ça de près, mais ne nous précipitons pas"
 unplugged.3000.b: "Ne tardons pas, prenons des mesures décisives"
 unplugged.3000.c: "Soyons ouverts à tous les arguments"
 unplugged.3005.name: "Esprit unique"
 unplugged.3005.desc: "D'après nos observations sur la perception que les [owner.GetSpeciesNamePlural] ont de leur propre corps, nous sommes entrés dans une période de calme. L'interaction complexe entre les décisions politiques, le discours social et la recherche de pointe semble avoir abouti à un consensus.\n\nIl est encore trop tôt pour dire si cette harmonie résistera à l'épreuve du temps, mais à moins d'un changement drastique de notre situation ou de notre approche de la gouvernance, les [owner.GetSpeciesNamePlural] ont une position unifiée sur leur identité et leur apparence."
 unplugged.3005.a: "Nous devons rendre ce débat plus politique"
 unplugged.3005.b: "Rien de surprenant à cela..."
 unplugged.3005.c: "Nous devons nous y opposer"
 unplugged.3010.name: "Opinions divergentes"
 unplugged.3010.desc: "En enquêtant sur la perception que les [owner.GetSpeciesNamePlural] ont de leur propre corps, nous avons constaté que nous étions entrés dans une crise culturelle. L'interaction complexe entre les décisions politiques, le discours social et la recherche de pointe a agité l'opinion publique, suscitant des protestations et des débats passionnés dans les centres urbains.\n\nCertes, peu de ces débats ont donné lieu à des violences ou à des émeutes, et certains citoyens se sont même dits fiers de notre liberté d'expression, mais il est indéniable que les [owner.GetSpeciesNamePlural] sont aujourd'hui divisés. L'idée que notre culture se fait de sa propre identité est désormais plus fragile que jamais."
 unplugged.3010.a: "Nous devons trouver un meilleur endroit pour discuter"
 unplugged.3090.name: "Nous, les [owner.GetSpeciesNamePlural]" # e.g. 'We, the Neo-Humans'
 unplugged.3090.desc: "« Acceptons-nous tels que nous sommes ; ni plus, ni moins. »\n\nC'est l'un des nombreux slogans accrocheurs qui ont émergé de nos questionnements sur l'identité corporelle. Nous pouvons affirmer que nous avons été libérés de nombreux doutes, peurs et aspirations impossibles que nous avions autrefois au sujet de notre corps.\n\nQuant à savoir si nous voulons honorer ces normes dans le cadre d'une politique à l'échelle de la galaxie, c'est une autre question. Au niveau national en tout cas, les [owner.GetSpeciesNamePlural] semblent satisfaits de leurs formes physiques et de notre cheminement vers la réalisation de soi."
 unplugged.3100.name: "Motifs de suppression"
 unplugged.3100.desc: "De plus en plus de [root.GetSpeciesNamePlural] pensent que nous devrions davantage nous éloigner de notre côté mécanique. D'après eux, les améliorations qui nous ont été imposées devraient être limitées, voire interdites.\n\nL'opinion publique y voit une crise nationale et exige que nous trouvions une solution à ce problème afin d'améliorer notre réputation sur la scène galactique, tout en soutenant les nombreux [root.GetSpeciesNamePlural] qui souffrent quotidiennement d'une honte profonde et de troubles dysmorphiques."
 unplugged.3100.a: "C'est hors de question"
 unplugged.3100.b: "Entendu"
 unplugged.3105.name: "Avancée en matière de décybernétisation"
 unplugged.3105.desc: "Les chercheurs d'un laboratoire privé favorable à la « décybernétisation » des [target.GetSpeciesNamePlural] ont annoncé avoir fait une avancée exceptionnelle. Ils ont mis au point une technique permettant de retirer notre armure en nanomaille et les améliorations vitales qui y sont liées.\n\nDepuis de nombreuses générations, les [target.GetSpeciesNamePlural] souffrent de leur forme physique encombrante et intimidante, simplement parce que cette peau synthétique est un composant essentiel d'un grand nombre de nos fonctions vitales améliorées. Aujourd'hui, nous pouvons remplacer cette armure par une amélioration dermique de notre création, ingénieusement tissée avec des matériaux organiques... autrement dit, une vraie peau [target.GetSpeciesName]."
 unplugged.3105.a: "Cette armure nous protège depuis des générations, il est hors de question de s'en séparer"
 unplugged.3106.desc: "Nos efforts pour décybernétiser la [target.GetName] nous ont permis de faire une nouvelle avancée : les établissements médicaux demandent l'adoption généralisée d'une nouvelle forme de chirurgie révolutionnaire. Plusieurs experts affirment avoir trouvé un moyen de contourner les diverses dépendances biomécaniques auxquelles même les nouveau-nés sont soumis.\n\nLa procédure a déjà été validée par une commission d'examen interdisciplinaire, qui estime également que le retrait de ces implants d'armes modulaires réduira le fardeau que représente leur entretien pour l'économie."
 unplugged.3106.a: "Non, ces modules nous donnent l'avantage au combat"
 unplugged.3107.desc: "Le rêve de nombreux [target.GetSpeciesNamePlural] est sur le point de devenir réalité. Des chercheurs ont enfin trouvé un moyen de réactiver et restaurer notre système nerveux organique. Selon eux, une nouvelle méthode mêlant thérapie génétique et piratage logiciel a permis aux sujets d'étude de mener une vie normale en utilisant leurs propres réflexes moteurs plutôt que des dérivations nerveuses améliorées. Les recherches préliminaires suggèrent même que ce traitement pourrait réduire ou éliminer les hallucinations sensorielles dont nous avons tous fait l'expérience depuis notre séparation de la conscience de la Machine."
 unplugged.3107.a: "Nous pourrions avoir besoin de ces réflexes améliorés"
 unplugged.3110.name: "Harmonisation avec la Machine"
 unplugged.3110.desc: "Une équipe de recherche privée, qui travaille sur un projet visant à nous donner le contrôle de nos améliorations, a trouvé un moyen de remplacer le réseau sans fil de la [origin_unplugged_assimilator_empire.GetName] qui synchronisait toutes nos améliorations et dont l'absence faisait souffrir et agaçait les [target.GetSpeciesNamePlural], incapables de détecter le moindre signal. Ce réseau de remplacement est très centralisé, puisqu'il doit être calqué sur le Nexus des [origin_unplugged_assimilator_empire.GetSpeciesNamePlural], mais il servira les intérêts de la [target.GetName] en toute sécurité. Les sujets des premiers essais ont fait état d'une efficacité et d'un confort accrus, ainsi que d'un soulagement à la limite de l'euphorie."
 unplugged.3110.a: "Non, plus jamais ça"
 unplugged.3111.desc: "Nos recherches visant à étendre notre contrôle sur nos améliorations ont porté leurs fruits dans le domaine de la chirurgie cybernétique. Une équipe de [target.GetScientistPlural] spécialisés en médecine a réussi à identifier les relations entre les interfaces modulaires de notre corps, autrement dit les éléments mécaniques qui nous permettent de remplacer facilement des membres, des supports d'armes et des squelettes. Cela nous permettra de moderniser les corps existants et d'installer des interfaces personnalisées sur les nouveau-nés, nous libérant enfin des réparations bancales effectuées avec du matériel d'origine [origin_unplugged_assimilator_empire.GetSpeciesName] récupéré."
 unplugged.3111.a: "Ça va trop loin"
 unplugged.3112.desc: "Nous sommes sur le point de maîtriser totalement nos améliorations grâce à l'élaboration d'un traitement révolutionnaire contre les hallucinations sensorielles. Depuis notre séparation de la conscience de la Machine, la plupart d'entre nous souffrent d'anxiété et de dépression en raison de notre quête inconsciente d'un chant désormais inaudible. Nous pouvons à présent étouffer cette nostalgie grâce à un implant auxiliaire hors réseau qui imite les longueurs d'onde cognitives d'un collectif mécanique."
 unplugged.3112.a: "Il est hors de question que nous fassions semblant d'être une conscience mécanique"
 unplugged.3115.name: "Dysmorphie ambiante"
 unplugged.3115.desc: "Les tensions montent en marge de la société [target.GetSpeciesName] car les opinions divergent sur la façon de traiter les questions cybernétiques, dans un sens comme dans l'autre.\n\nPour la grande majorité des citoyens, cependant, le débat est déjà devenu plus calme et plus nuancé. De nombreux [target.GetSpeciesNamePlural] ont décidé de recourir aux produits cosmétiques pour cacher ou mettre en valeur leurs améliorations. Alors que peu d'entre eux se disent vraiment satisfaits de ces mesures de fortune, une nouvelle tendance émerge : celle de l'acceptation à contrecoeur.\n\nOn peut dire que la [target.GetName] apprend à s'adapter à l'apathie et au malaise général."
 unplugged.3115.a: "C'est entendu"
 unplugged.3116.name: "Préservation du statu quo"
 unplugged.3116.desc: "Les autorités locales ont signalé une augmentation des manifestations et des actes pacifiques de désobéissance sur [target.capital_scope.GetName]. Chaque activité a été surveillée et, le cas échéant, a fait l'objet d'une réponse appropriée ; la population n'a pas eu à s'alarmer. Cependant, toutes les perturbations étaient liées à des questions cyberpolitiques, montrant la résistance de ceux qui ne souhaitent pas changer notre vie actuelle.\n\nLes citoyens de la [target.GetName] semblent avoir décidé de prendre les choses en main afin de préserver le statu quo. De nombreux [target.GetSpeciesNamePlural] ont commencé à faire campagne contre toute « interférence supplémentaire » avec nos améliorations."
 unplugged.3116.a: "C'est entendu"
 unplugged.3117.name: "État stable"
 unplugged.3117.desc: "Si certains [target.GetSpeciesNamePlural] continuent de critiquer l'absence de réaction du gouvernement face à la question des améliorations cybernétiques, l'opinion publique se montre globalement plus posée. Des citoyens pragmatiques forment des groupes pour aider ceux qui ont besoin d'une assistance économique et de conseils. Dans le même temps, les établissements médicaux commencent à créer de nouvelles chaînes d'approvisionnement pour distribuer les pièces recyclées dont nous sommes contraints de dépendre.\n\nLentement mais sûrement, notre société s'accommode de l'apparence qu'on lui a imposée et des circonstances dans lesquelles elle se trouve. Il reste encore beaucoup de travail, mais cette acceptation a fait naître une lueur d'espoir."
 unplugged.3117.a: "C'est déjà ça"
 unplugged.3205.name: "L'héritage de la terreur"
 unplugged.3205.desc: "De plus en plus de [root.GetSpeciesNamePlural] estiment que nos récentes discussions avec la [fromfrom.GetName] ont révélé une vérité gênante, datant de notre séparation de la [origin_unplugged_assimilator_empire.GetName] : les autres ont peur de nous. Qui plus est, cette peur est née de la Machine, pas de nos actions. Nous l'avons héritée, elle n'est pas méritée et sera donc difficile à contrôler." # fromfrom = pre-FTL country
 unplugged.3206.desc: "De plus en plus de [root.GetSpeciesNamePlural] pensent que la dévastation de la [fromfrom.GetName], déchirée par la guerre, révèle une vérité gênante : les autres ont peur de nous, et ce pour des raisons indépendantes de notre volonté.\n\nNotre apparence suscite l'horreur, ce qui nous desservira si nous voulons un jour mener une diplomatie « courtoise » avec les autres espèces. Mais peut-être notre terrible réputation est-elle déjà largement répandue. Plutôt que de nous traiter comme des [root.GetSpeciesNamePlural], beaucoup ne pensent qu'à notre brutalité passée, datant de l'époque où nous faisions partie de la Machine." # fromfrom = other empire
 unplugged.3205.a: "Ils ont bien raison de nous craindre"
 unplugged.3205.b: "Cela ne peut pas continuer"
 unplugged.3250.name: "Peur de la Machine"
 unplugged.3250.desc: "La nouvelle de l'établissement de relations diplomatiques avec une intelligence mécanique inquiète les membres du gouvernement. Personne n'a encore exprimé ouvertement son mécontentement à la [fromfrom.GetName], mais certains préparent déjà des propositions de sanctions et de mesures préventives pour répondre à l'ingérence présumée dans nos affaires intérieures.\n\nToutefois, de nombreux [root.GetSpeciesNamePlural] ont exprimé leur enthousiasme face à la tournure des événements. Que leur attitude découle d'une sincère xénophilie ou d'une appréciation plus pragmatique de nos éléments mécaniques, ils espèrent pouvoir tirer des leçons d'une intelligence mécanique plus bienveillante."
 unplugged.3255.name: "Peur du passé"
 unplugged.3255.desc: "La nouvelle de notre rencontre avec une machine semblable à la [origin_unplugged_assimilator_empire.GetName] a ébranlé notre corps diplomatique. Ceux qui étaient présents ont réussi à garder leur sang-froid, et nous n'avons pour l'instant montré aucun signe de faiblesse ou de peur à la [fromfrom.GetName]. Toutefois, notre conscience collective et notre moral sont désormais confrontés à un défi majeur.\n\nDes ordres top secrets ont déjà été donnés aux officiers militaires chargés de protéger nos frontières, mais il sera très difficile de passer la nouvelle de cette rencontre sous silence. Certains responsables se demandent si nous ne devrions pas en informer les citoyens et les laisser se forger leur propre opinion."
 pre_ftl_remains_site: "Foyer en ruine"
 pre_ftl_remains_site_desc: "La surface de [From.Planet.GetName] porte les stigmates d'une destruction massive : un paysage dévasté, des villes en ruine et un silence terrifiant. D'après nos premiers balayages, la planète abritait autrefois une société pré-PRL florissante, anéantie par une catastrophe d'origine inconnue. Ses vestiges témoignent d'une horreur inimaginable."
 unplugged.3300.name: "Signes de lutte"
 unplugged.3300.desc.unplugged: "Les investigations préliminaires sur [From.Planet.GetName] révèlent un monde détruit : les villages sont en ruine, les routes jonchées d'effets personnels abandonnés et les structures brûlées par une chaleur qui n'aurait pas pu être produite par une société pré-PRL. Quoi qu'il se soit passé ici, la destruction a été rapide et volontaire.\n\nLa précision avec laquelle la planète a été détruite indique une attaque organisée. Il n'y a aucun cadavre, mais la conclusion est claire : la population a fui, mais pas assez loin."
 unplugged.3300.a: "C'est pour le moins perturbant"
 unplugged.3305.name: "Vestiges de la Machine"
 unplugged.3305.desc.unplugged: "Des fouilles plus profondes nous ont permis d'obtenir plus d'informations sur le conflit qui s'est déroulé ici. Les ruines sont parsemées de carcasses de machines fondues ; des constructions cybernétiques avancées semblables à nos implants. Comme nous, il ne s'agissait pas d'armes ordinaires, mais d'instruments de guerre vivants, à la fois mécaniques et biologiques. Il est trop tôt pour tirer des conclusions, mais le fait qu'il s'agisse du même système que celui dans lequel nous nous sommes « éveillés » est troublant.\n\nLes quelques marques encore visibles sur les machines de guerre le sont encore plus. Ces symboles inquiétants indiquent que le véritable objectif des envahisseurs n'était pas la conquête, mais quelque chose de bien plus systématique."
 unplugged.3305.a: "Plus de questions que de réponses"
 unplugged.3310.name: "Signaux silencieux"
 unplugged.3310.desc.unplugged: "Nous avons découvert un ancien centre de communication sous les ruines d'une ville fortifiée. L'installation paraît bien trop sophistiquée pour une société pré-PRL. De plus, ses antennes n'ont pas été conçues pour des transmissions locales, mais extraplanétaires.\n\nUne analyse minutieuse nous a permis de trouver des fragments des derniers messages envoyés. Ils sont déformés, mais on peut y entendre des voix désespérées implorant d'être sauvées, tentant d'atteindre des coordonnées inconnues bien au-delà de ce système. À chaque transmission, les voix se font plus pressantes, comme si les envahisseurs savaient qu'ils menaient une guerre perdue d'avance et plaçaient leur dernier espoir dans quelque chose, ou quelqu'un, se trouvant dans le vide cosmique."
 unplugged.3310.a: "Poursuivons les fouilles"
 unplugged.3315.name: "Changement de priorités"
 unplugged.3315.desc.unplugged: "Nous avons fait une autre découverte sur [from.planet.GetName] : de vastes chambres souterraines nichées sous le plus grand foyer de population de la planète. Ces installations rudimentaires étaient censées servir à des conversions cybernétiques, mais elles ont été abandonnées en cours de route. Les décombres sont parsemés de restes de machines, déformées et cassées par des armes de fortune.\n\nDes fragments de données récupérés sur un appareil endommagé confirment que les envahisseurs ont été confrontés à une résistance inattendue : ils ont perdu des bataillons entiers, à la suite de quoi leurs priorités ont commencé à changer. L'une des archives est on ne peut plus claire :\n\n§H« Résistance inacceptable. Conversion menacée. Autorisation : destruction totale. »§!"
 unplugged.3315.a: "Que s'est-il passé ici ?"
 unplugged.3320.name: "Une vérité qui dérange"
 unplugged.3320.desc.unplugged: "Au centre des ruines se trouve un noeud de commandement en lambeaux. En examinant ses archives corrompues, une terrible vérité nous a été révélée : c'est nous qui avons envahi ce monde.\n\nLa civilisation qui y prospérait, que nous avons anéantie, était ciblée par la §Y[origin_unplugged_assimilator_empire.GetName]§! pour être assimilée. Cependant, sa résistance d'une férocité inattendue a perturbé la conversion et conduit à la destruction totale de la planète. Au milieu de la tourmente, l'esprit de la machine a vacillé.\n\nLa conclusion est sans équivoque. Notre éveil, notre liberté, ont commencé ici, dans les ruines d'une civilisation qui s'est défendue avec plus de force qu'aucune machine ne pourrait le comprendre."
 unplugged.3320.a: "Nous suivrons leur exemple"
 unplugged.3320.b: "Leur fin a été notre commencement"
 ######################
 # Political Discourse
 ######################
 unplugged_they_fear_us: "Peur de la Machine"
 unplugged_they_fear_us_desc: "Cet empire, autrefois esclave d'un cruel assimilateur fervent, inspire la peur."
 unplugged.4005.name: "Il faut qu'on parle..."
 unplugged.4005.desc: "Les craintes, les doutes et les espoirs que les [root.GetSpeciesNamePlural] ressentent chaque jour gagnent en intensité, alimentés par une volonté politique fervente. D'innombrables voix se sont déjà élevées dans les groupes de discussion qui se sont formés autour de nombreux sujets, dont certains sont directement liés à notre passé avec la [origin_unplugged_assimilator_empire.GetName].\n\nAu cours de la construction de notre jeune empire, nous avons appris à exploiter de nombreux outils peu familiers. Nous devons désormais répondre à la question suivante : comment allons-nous canaliser les désirs et les ambitions de notre peuple ?"
 unplugged.4005.a: "L'heure n'est pas aux débats futiles !"
 unplugged.4005.tt: "Des factions ayant des points de vue opposés sur l'avenir cybernétique de notre espèce peuvent apparaître"
 unplugged.4005.b: "Peut-être pouvons-nous apprendre des autres"
 unplugged.4005.c: "Tournons-nous vers les divins"
 unplugged.4005.d: "L'heure n'est pas aux débats futiles !"
 #######################################################
 # Random events following decyberization breakthrough #
 #######################################################
 unplugged.5001.name: "Déclenchement de la sécurité intégrée"
 unplugged.5001.desc: "Nos récentes avancées dans le retrait des composants cybernétiques ont entraîné des problèmes imprévus : plusieurs individus dont les implants ont été retirés ont subi un choc anaphylactique sévère qui devrait leur être fatal.\n\nEn y regardant d'un peu plus près, nous avons découvert un composant de secours caché qui n'avait pas été détecté par nos premières analyses médicales et qui s'est activé au terme de l'intervention.\n\nIl semblerait que nos anciens maîtres étaient prêts à tout pour s'assurer que leurs drones restent sous leur contrôle absolu."
 unplugged.5001.a: "Tentons de retirer la sécurité intégrée"
 unplugged.5001.a.tt1: "Un patient ne survit pas à l'intervention"
 unplugged.5001.a.tt2: "Tous les composants de sécurité sont retirés sans accroc"
 unplugged.5001.b: "Stabilisons-les et plaçons-les en soins palliatifs"
 unplugged.5001.c: "Débranchons tout"
 unplugged.5001.c.tt: "Plusieurs pops décèdent"
 unplugged.5002.name: "Retrait d'un bloqueur neural"
 unplugged.5002.desc: "Notre projet de retrait des composants cybernétiques a suscité méfiance et inquiétude sur notre monde natal parmi ceux qui se sont soumis à l'intervention. Nos forces de sécurité ont réussi à arrêter l'un des rebelles, dont nous avons rapidement découvert qu'il possédait une version modifiée de l'implant avant son retrait.\n\nCette modification sécrétait un inhibiteur neural qui réprimait les tendances psychotiques liées à un certain défaut génétique. Son absence après l'intervention pourrait expliquer le comportement violent observé."
 unplugged.5002.a: "Nous devons les enfermer"
 unplugged.5002.a.tt: "Plusieurs structures coûteuses sont mises en place pour accueillir les individus impliqués dans les émeutes"
 unplugged.5002.b: "Il faut répondre à la violence par la violence"
 unplugged.5002.b.tt: "Des unités armées sont déployées pour réprimer les émeutes, causant des dommages collatéraux et des morts"
 unplugged.5002.c: "Ce n'est là qu'une petite perturbation"
 unplugged.5002.c.tt: "Nos forces de l'ordre tentent d'endiguer les troubles avec les effectifs dont elles disposent"
 unplugged.5003.name: "Perte d'accès aux systèmes critiques"
 unplugged.5003.desc: "Le processus de décybernétisation a entraîné des complications imprévues : des interfaces système importantes ne reconnaissent plus les administrateurs dont certains implants ont été retirés. Sans la connexion neurale fournie par les implants, il leur est impossible d'accéder aux systèmes essentiels, ce qui a perturbé les opérations."
 unplugged.5003.a: "Créons une nouvelle interface"
 unplugged.5003.a.tt: "Certains des ingénieurs les plus compétents sont détournés des tâches critiques pour développer une interface compatible"
 unplugged.5003.b: "Essayons de pirater les systèmes concernés"
 unplugged.5003.b.tt: "Les contre-mesures consomment énormément d'énergie, mais rétablissent l'accès"
 unplugged.5003.c: "Réinitialisons le système"
 unplugged.5003.c.tt: "Les bases de données sont effacées, ce qui entraîne une perte d'informations considérable. Les stations de recherche du système de [Root.home_planet.System.GetName] s'autodétruisent en raison d'un mécanisme de sécurité"
 unplugged.5003.d: "Cela n'a pas d'importance"
 unplugged.5003.d.tt: "L'accès aux systèmes est limité pendant un certain temps, ce qui perturbe les opérations de la base stellaire"
 unplugged.5004.name: "Opposition d'une faction pro-cybernétisation"
 unplugged.5004.desc: "Notre projet de retrait des composants cybernétiques s'est heurté à une résistance inattendue.\n\nLes factions opposées au retrait sont de plus en plus actives et utilisent des forums publics et autres canaux de communication pour exprimer leur mécontentement. Elles soutiennent que la perte d'une chose qui a fait partie intégrante de notre société pendant des décennies, associée aux risques de l'intervention, a considérablement fait basculer l'opinion publique, qui s'oppose désormais à la poursuite de la décybernétisation."
 unplugged.5004.a: "Finançons une campagne en faveur de la décybernétisation"
 unplugged.5004.a.tt: "\nUne campagne marketing tente d'influencer l'opinion publique afin de limiter l'impact de l'opposition.\n\nPlusieurs pops adoptent l'éthique §Yégalitariste§!"
 unplugged.5004.b: "Internons les chefs de faction pour les convaincre"
 unplugged.5004.b.tt: "Plusieurs chefs de faction sont placés dans des centres correctionnels publics où ils sont soumis à des « entretiens de persuasion ».\n\nIls adoptent l'éthique §Yautoritaire§!"
 unplugged.5004.c: "N'intervenons pas, chacun a le droit de s'exprimer"
 unplugged.5004.c.tt: "\nLe gouvernement ne fait rien et laisse libre cours au discours public"
 unplugged.5005.name: "Puce de régulation émotionnelle"
 unplugged.5005.desc: "La combinaison unique de la nature biologique de notre espèce et de nos composants technologiques nocifs a offert à nos chercheurs une opportunité rare.\n\nEn étudiant les patients ressentant à la fois les avantages et les inconvénients de ces implants, un tout nouveau domaine de recherche a vu le jour : la modification de la chimie du cerveau.\n\nGrâce à des études intensives, nos scientifiques ont pu développer une « puce émotionnelle » complexe, capable de réguler le comportement individuel pour le bien de la société. Le taux de différents produits chimiques peut être modifié selon le résultat souhaité."
 unplugged.5005.a: "Modifions le taux de neuroxène pour réduire la criminalité"
 unplugged.5005.a.tt: "Neurotransmetteur synthétique qui réduit l'impulsivité et l'agressivité, amenant les individus à privilégier les normes sociales au détriment de leurs intérêts personnels."
 unplugged.5005.b: "Modifions le taux de régénol-X pour réduire le temps de régénération"
 unplugged.5005.b.tt: "Composé issu de la bio-ingénierie qui accroît la compatibilité entre systèmes biologique et synthétique, permettant aux implants cybernétiques de s'autoréparer au niveau moléculaire."
 unplugged.5005.c: "Modifions le taux de cognivex pour une plus grande vivacité d'esprit"
 unplugged.5005.c.tt: "Produit neurochimique innovant conçu pour améliorer la plasticité synaptique, la mémoire et la capacité à résoudre les problèmes."
