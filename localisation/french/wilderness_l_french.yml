 ####################################
 # Traditions
 ####################################
 tr_adaptability_appropriation_wilderness: "Appropriation"
 tr_adaptability_appropriation_wilderness_delayed: "Les écosystèmes sous-utilisés n'ont aucune utilité pour l'empire. Des [GetIndividualNamePlural] doivent être placés de manière efficace sur ces mondes où ils sont le plus nécessaires."
 tr_discovery_faith_in_science_wilderness: "Réseau mycélien"
 tr_discovery_faith_in_science_wilderness_delayed: "Encourager la nature curieuse de tous les [GetIndividualNamePlural] dans un réseau fongique permet de faire des découvertes beaucoup plus efficaces."
 tr_domination_wilderness_network: "Accélération macrométabolique"
 tr_domination_wilderness_network_delayed: "En augmentant l'échange d'énergie au niveau continental, nous pouvons accroître de manière significative l'entraide entre chacune de nos composantes."
 tr_domination_wilderness_network_effect: "§YPermet le décret§! $edict_drone_overdrive_wilderness$"
 tr_domination_imperious_architecture_wilderness: "Compatibilité phéromonale interespèces"
 tr_domination_imperious_architecture_wilderness_desc: "Les §Ybiomes communautaires§! octroient §G+1§! £defense_army£§Yarmées défensives§! supplémentaires"
 tr_domination_imperious_architecture_wilderness_delayed: "En favorisant la communication phéromonale entre tous les [GetIndividualNamePlural], nous pouvons réagir plus rapidement aux menaces extérieures."
 tr_expansion_colonization_fever_wilderness: "Conscience de nombreux mondes"
 tr_expansion_colonization_fever_wilderness_desc: "Ajoute un §Y£district£district§! aléatoire en colonisant un nouveau monde."
 tr_expansion_colonization_fever_wilderness_delayed: "La [GetGestaltEntityName] est un choeur de pensées que même le néant glacial de l'espace ne peut réduire au silence."
 tr_expansion_a_new_life_wilderness: "Croissance effrénée"
 tr_expansion_a_new_life_wilderness_delayed: "La [GetGestaltEntityName] développe ses propres solutions aux problèmes auxquels elle est confrontée."
 tr_expansion_courier_network_wilderness: "$tr_expansion_courier_network_hive$"
 tr_expansion_courier_network_wilderness_delayed: "Traiter chaque biome comme une petite partie du grand tout favorise la communication ciblée sans exiger la pleine attention de la conscience planétaire."
 tr_expansion_galactic_ambition_wilderness: "$tr_expansion_galactic_ambition_hive$"
 tr_expansion_galactic_ambition_wilderness_delayed: "La terreur primaire allait de pair avec les premières tentatives pour accéder à l'obscurité, loin de notre monde nourricier. Ce n'est qu'en conquérant et en éradiquant cette frayeur que nous pourrons continuer de nous développer. Des millions de [GetIndividualNamePlural] mourront pour que la [GetGestaltEntityName] puisse vivre."
 tr_prosperity_pursuit_of_profit_wilderness: "Transport mondial de liquides"
 tr_prosperity_pursuit_of_profit_wilderness_delayed: "Des veines continentales transportent de la nourriture et des matériaux de construction essentiels vers les écosystèmes dans le besoin."
 tr_prosperity_public_works_wilderness: "Grottes souterraines"
 tr_prosperity_public_works_wilderness_desc: "£district£§YDistricts§! : §G+50§! £housing£§Ylogements§!"
 tr_prosperity_public_works_wilderness_delayed: "En faisant pénétrer les [GetIndividualNamePlural] dans les couches superficielles de la croûte et en agrandissant leurs nids avec des structures de cire, il est possible d'en accueillir beaucoup plus."
 tr_synchronicity_kinship_wilderness: "Rythme quotidien synchronisé"
 tr_synchronicity_kinship_wilderness_delayed: "En contrôlant précisément les cycles de repos des [GetIndividualNamePlural], il est possible de créer un calendrier global de redistribution des nutriments."
 ####################################
 # Ascension Perks
 ####################################
 ap_mastery_of_nature_wilderness: "$ap_mastery_of_nature$"
 ap_mastery_of_nature_wilderness_desc: "Nous sommes le cycle qui dévore et qui est dévoré. De la plus petite cellule à l'arbre le plus haut, nous vivons selon ce principe. Nous sommes la nature."
 ap_engineered_evolution_wilderness: "$ap_engineered_evolution$"
 ap_engineered_evolution_wilderness_desc: "Notre conscience a évolué pour faire face aux défis de son environnement. Maintenant que l'environnement a changé, nous ferons de même."
 engineered_evolution_wilderness_tt: "- Lance la situation §Y$genetic_ascension_situation$§!, qui permet l'arbre de traditions ['tradition_category:tradition_purity'].$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n- $UNLOCKS_AGENDA$ §Y$council_agenda_agenda_engineered_evolution_name$§!, qui offre la chance de rechercher les technologies de modification génétique."
 ############
 # Espionage
 ############
 operation_embed_planetary_roots: "Planter des racines planétaires" # literal roots, as in plantlife
 operation_embed_planetary_roots_desc: "Nous avons pour l'heure d'autres priorités pour nos [owner.GetIndividualNamePlural] de renseignement. Ce n'est qu'en créant un microbiome semi-conscient sur l'un des mondes de notre cible que nous pourrons préserver l'essentiel de notre réseau d'espionnage et peut-être même perturber leur chaîne d'approvisionnement alimentaire." # the Wilderness embeds a part of itself, hence 'microbiome'
 operation_embed_planetary_roots_on_success: "$operation_sleeper_cells_on_success$"
 espionage_planetary_roots: "Racines planétaires"
 espionage_planetary_roots_desc: "Nous avons implanté un microbiome semi-conscient dans cet empire afin de savoir ce qui s'y passe. Ces symbiotes primitifs se tiennent prêts à assister nos [owner.GetIndividualNamePlural] de renseignement à tout moment."
 operation_embed_planetary_roots_requires_blocker: "$TRIGGER_FAIL$ §RNos racines planétaires ont besoin d'un ['concept_natural_blocker',bloqueur naturel] sur l'un des mondes de la cible.§!"
 operation_embed_planetary_roots_dont_stack_this: "$TRIGGER_FAIL$ §RNous avons déjà planté des racines planétaires au sein de la [target.GetName], qui nous seront bénéfiques jusqu'au bloqueur naturel §Y« [planet_roots_success] »§!.§!"
 operation_embed_planetary_roots_not_cleared: "$TRIGGER_FAIL$ §RNous sentons encore nos racines planétaires au sein de la [target.GetName].§!"
 d_wilderness_root_blocker: "Fourré invasif"
 d_wilderness_root_blocker_desc: "Une contrée sauvage non indigène et préconsciente s'est installée en marge de ces zones rurales."
 wilderness.4500.name: "Recherche d'habitats"
 wilderness.4500.desc: "Nos [owner.GetOperativesLowerPlural] semi-autonomes ont trouvé plusieurs sites viables pour notre microbiome unique. Ils vont les surveiller pendant un certain temps pour déterminer lequel offre les meilleures chances de réussite à long terme."
 wilderness.4505.name: "Découverte d'un site potentiel"
 wilderness.4505.desc: "Pensant participer à un acte de conservation de la nature, un membre de l'espèce [target.GetSpeciesName] nous a involontairement aidés en nous proposant de transporter notre « bombe d'ensemençage » au beau milieu de la §H[roots_planet.GetPlanetMoon] [roots_planet.GetName]§!.\n\nLes symbiotes qui s'y trouvent ne disposent certes que d'une courte durée de vie et ne seront pas une véritable extension de notre être, mais ils infiltreront et observeront ces terres étrangères autant qu'ils le pourront."
 wilderness.4510.name: "$espionage_planetary_roots$ plantées"
 wilderness.4510.desc: "Dès l'arrivée de notre microbiome dans sa nouvelle maison, le bloqueur naturel « [GetRootsBlockerName] », nous avons commencé à respirer son air interdit et à percevoir ce monde nommé §H[roots_planet.GetName]§!.\n\nCes symbiotes n'étant pas connectés à notre conscience, notre présence ici sera de courte durée, mais ils nous seront d'une grande utilité lorsque le moment sera venu de reprendre les opérations dans l'espace de la [target.GetName]."
 wilderness.4510.a: "Nos racines doivent être plus profondes et plus durables"
 wilderness.4510.b: "Laissons nos racines pousser librement"
 ####################################
 # Technologies
 ####################################
 tech_wilderness_terraform: "Germination planétaire"
 tech_wilderness_terraform_desc: "Avant de prendre racine sur un nouveau monde, nous devons préparer le terrain et pour cela, nous devons d'abord terraformer une planète afin de nous assurer que nos colonies ne dépérissent pas."
 tech_terrestrial_sculpting_wilderness: "$tech_terrestrial_sculpting$"
 tech_terrestrial_sculpting_wilderness_desc: "$tech_terrestrial_sculpting_desc$"
 tech_terrestrial_sculpting_wilderness_effect: "§HPermet§! la terraformation de toutes les classes planétaires standard."
 tech_wilderness_node: "Centres de l'être"
 tech_wilderness_node_desc: "En favorisant la croissance de symbiotes réfléchis dans les clairières de notre nature commune, chacun bénéficiera d'une meilleure perception de notre volonté collective."
 tech_wilderness_cluster: "$tech_hive_cluster$"
 tech_wilderness_cluster_desc: "Nous pouvons accélérer la circulation de la pensée collective en rassemblant des symbiotes dont le seul but est de promouvoir cette même volonté."
 tech_wilderness_confluence: "$tech_hive_confluence$"
 tech_wilderness_confluence_desc: "Notre volonté mutualiste est renforcée par d'immenses rassemblements de symbiotes empathiques, qui sont tellement en phase avec leur environnement qu'ils peuvent concentrer et diffuser notre pensée collective."
 tech_genome_mapping_wilderness: "$tech_genome_mapping$"
 tech_genome_mapping_wilderness_desc: "Cartographier les génomes de nos innombrables souches d'ADN permet d'approfondir notre compréhension de la manière dont nous grandissons et d'éliminer les complications."
 tech_mining_1_wilderness: "$tech_mining_1$"
 tech_mining_1_wilderness_desc: "L'application d'épaississants et de pression hydraulique aux gisements minéraux existants permet d'extraire des minéraux à de plus grandes profondeurs et en plus grande quantité."
 tech_powered_exoskeletons_wilderness: "$tech_powered_exoskeletons$"
 tech_powered_exoskeletons_wilderness_desc: "Les combinaisons exosquelettes renforcées, qui augmentent la force et la vitesse de leur porteur, offrent des avantages militaires évidents, mais augmentent également l'efficacité du travail physique."
 tech_colonization_1_wilderness: "Projet « Nouveaux mondes »"
 tech_colonization_1_wilderness_desc: "Nous calculons méticuleusement la quantité de ressources et de matériaux nécessaires à l'éveil de nouveaux mondes, afin de préparer au mieux nos symbiotes pionniers à leur éprouvant voyage dans les étoiles."
 tech_wilderness_government: "$tech_planetary_government$"
 tech_wilderness_government_desc: "À partir du moment où une nouvelle planète est éveillée, elle doit se concentrer sur la création d'un environnement stable et prospère plutôt que sur le bien-être du collectif."
 tech_wilderness_colonial_centralization: "$tech_colonial_centralization$"
