 job_wilderness_maintenance_drone_desc: "Biomasse à fort potentiel, stockée et entretenue jusqu'à ce qu'on en ait besoin."
 job_heart_processing: "Biomasse nouvellement formée"
 job_heart_processing_plural: "$job_heart_processing$"
 job_heart_processing_desc: "Cette biomasse sera bientôt intégrée. Elle est destinée à servir une fonction supérieure parmi nous."
 neurosymbiont: "$job_neurosymbiont$"
 job_neurosymbiont: "Neurosymbiotes"
