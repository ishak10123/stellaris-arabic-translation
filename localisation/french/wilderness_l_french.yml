 spindlesymbiont: "$job_spindlesymbiont$"
 job_spindlesymbiont: "Symbiotes de flux"
 job_spindlesymbiont_plural: "Symbiotes de flux"
 job_spindlesymbiont_desc: "Dotés d'innombrables membres flexibles et d'organes sensoriels rares, ces symbiotes guident le flux des ressources, acheminant les nutriments, la matière et les matériaux là où ils sont le plus nécessaires. Chacune de ses actions équilibre la contrée sauvage."
 job_spindlesymbiont_with_icon: "£job_spindlesymbiont£$job_spindlesymbiont$"
