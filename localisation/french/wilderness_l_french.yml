 job_immunosymbiont_plural: "Immunosymbiotes"
 job_immunosymbiont_desc: "Ces symbiotes patrouillent à travers les racines de la contrée sauvage pour repérer et empêcher les anomalies. Ce sont en quelque sorte les anticorps macroscopiques d'un organisme macroscopique."
 job_immunosymbiont_effect_desc: "(les [patrol_drone.GetIcon]immunosymbiotes réduisent la £crime£§Ydéviance§!, sont la base des £defense_army£§Yarmées défensives§! et suscitent de l'£unity£§Yunité§!)"
