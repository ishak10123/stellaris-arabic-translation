 ####################################
 # City Appearance
 ####################################
 WILDERNESS: "Contrée sauvage"
 ####################################
 # Deposits
 ####################################
 d_wilderness_mining: "Réseau de grottes abandonné"
 d_wilderness_mining_desc: "Les formes de vie qui habitaient autrefois ce monde ont abandonné leurs mines à la hâte, dont plusieurs tunnels menacent de s'effondrer."
 d_wilderness_mining_2: "Plateau perforé"
 d_wilderness_mining_2_desc: "Cette région dangereuse est parsemée de déblais sans valeur et de gouffres dus à des activités minières passées."
 d_wilderness_farming: "Forêt desséchée"
 d_wilderness_farming_desc: "Ce qui était autrefois une forêt immense et productive est aujourd'hui sans vie. Les branches desséchées ne sont plus en mesure de fructifier."
 d_wilderness_farming_2: "Forêt fossilisée"
 d_wilderness_farming_2_desc: "Les vestiges d'une immense région sylvestre. Les plantes et les champignons qui y vivaient sont morts si rapidement que les restes se sont cristallisés, inertes."
 d_wilderness_generator: "Ferme solaire calcinée"
 d_wilderness_generator_desc: "De cette ferme solaire aujourd'hui disparue, il ne reste qu'une canopée flétrie et des troncs qui semblent sur le point de s'effondrer."
 d_wilderness_generator_2: "Désert solaire"
 d_wilderness_generator_2_desc: "De cette vaste région, il ne reste que les vestiges épineux d'une forêt solaire autrefois luxuriante. Les feuilles desséchées, légèrement irradiées, flottent désormais dans l'atmosphère sous forme de poussière."
 d_wilderness_city: "Marais fétide"
 d_wilderness_city_desc: "Ce qui abritait et nourrissait autrefois d'innombrables formes de vie n'est plus aujourd'hui qu'une fosse purulente."
 d_wilderness_city_2: "Marécage putride"
 d_wilderness_city_2_desc: "D'innombrables formes de vie ont péri ici. Leurs restes en décomposition se sont infiltrés dans le sol, libérant des substances biochimiques nauséabondes et hautement corrosives."
 d_wilderness_industrial: "Bourbier métallique"
 d_wilderness_industrial_desc: "Les restes de plusieurs sources minérales à ciel ouvert, dont le contenu a été rendu toxique et inerte par l'effondrement de la géologie environnante."
 d_wilderness_industrial_2: "Terres stériles biochimiques"
 d_wilderness_industrial_2_desc: "Les ruines d'un immense complexe d'usines de traitement de minéraux semi-organiques, qui ne sont désormais plus que des bassins rocheux et des ravins recouverts de poussière chimique."
 d_scorched_plains: "Plaines brûlées"
 d_scorched_plains_desc: "Cette région était autrefois grouillante de vie, jusqu'à ce qu'elle soit anéantie par une éruption stellaire."
 concept_scorched_plains: "$d_scorched_plains$"
 concept_scorched_plains_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-2§!\n- Durée de déblaiement : 180 §Ijours§!£time£\n- Coût de déblaiement :\n$t$- 900 d'£energy£§Iénergie§!\n\n§L$d_scorched_plains_desc$§!"
 ####################################
 # Colony Types
 ####################################
 col_wilderness_default: "Colonie sauvage"
 ####################################
 # Planet Designations
 ####################################
 col_wilderness_capital: "Monde coeur"
 col_wilderness_capital_tt: "$col_wilderness_capital_desc$"
 col_wilderness_capital_desc: "Chaque partie de ce monde palpite de vie symbiotique. Celle-ci est présente en si grand nombre que le corps stellaire semble vivant."
 col_wilderness_generator: "Monde de photosynthèse"
 col_wilderness_generator_desc: "$col_generator_desc$"
 col_wilderness_generator_tt: "D'innombrables symbiotes chloroplastiques collectent et stockent l'énergie sur ce monde."
 col_wilderness_mining: "Monde lithique"
 col_wilderness_mining_desc: "$col_mining_desc$"
 col_wilderness_mining_tt: "Sous la surface en apparence stérile de ce monde, la vie souterraine fourmille, creusant avec ardeur pour trouver des minéraux."
 col_wilderness_farming: "Monde pollinisateur"
 col_wilderness_farming_desc: "$col_farming_desc$"
 col_wilderness_farming_tt: "Des symbiotes spécialisés créent partout sur ce monde les conditions idéales pour assurer un approvisionnement constant en flore et en faune nourrissantes."
 col_wilderness_fortress: "Monde chasseur"
 col_wilderness_fortress_desc: "$col_fortress_desc$"
 col_wilderness_fortress_tt: "La surface de ce monde tremble sous les trépignements des troupeaux territoriaux et les cris des redoutables prédateurs."
 col_wilderness_tech: "Monde cérébral"
 col_wilderness_tech_desc: "$col_research_desc$"
 col_wilderness_tech_tt: "Ce monde regorge de curiosités et de phénomènes étranges que les individus avides de connaissances peuvent explorer."
 col_wilderness_nest: "Monde tisseur"
 col_wilderness_nest_desc: "$col_city_desc$"
 col_wilderness_nest_tt: "Un refuge pour une multitude de formes de vie symbiotiques. L'atmosphère peut changer de composition en fonction des besoins et de l'humeur de la contrée sauvage."
 col_wilderness_refinery: "Monde de raffinage"
 col_wilderness_refinery_desc: "Spécialisé dans la production de £exotic_gases£§Hgaz exotiques§! et autres £strategic_resource£§Hressources stratégiques§!."
 col_wilderness_refinery_tt: "Ce monde est recouvert de cheminées géothermiques dans lesquelles une multitude de nano-organismes et autres symbiotes exotiques collectent et transforment des matières premières."
 col_wilderness_forge: "Monde cyborgiste"
 col_wilderness_forge_desc: "$col_foundry_desc$"
 col_wilderness_forge_tt: "Une forge de la taille d'un monde pour transformer les matières premières en alliages polyvalents."
 col_wilderness_unification: "Monde tranquille"
 col_wilderness_unification_desc: "$col_bureau_desc$"
 col_wilderness_unification_tt: "Ce monde dégage une aura de convivialité mutualiste qui approfondit les relations complexes entre les symbiotes."
 ####################################
 # Personalities
 ####################################
 personality_benevolent_wilderness: "Contrée sauvage harmonieuse"
 personality_benevolent_wilderness_desc: "Cette immense biosphère consciente aspire à s'entremêler avec les étoiles. Ses racines s'étendent à travers toute la galaxie, non pas par faim, mais en harmonie."
 personality_rampant_wilderness: "Contrée sauvage envahissante"
 personality_rampant_wilderness_desc: "La contrée sauvage envahissante ne se déchaîne pas ; elle s'étend, consume et perdure. Elle recycle tous les organismes, vivants ou morts, dans un cycle éternel de croissance et de décomposition."
 ####################################
 # Policies
 ####################################
 policy_symbiont_policy: "$policy_drone_policy$"
 policy_symbiont_policy_desc: "Notre collectif mutualiste est certes capable de grandes réalisations et extrêmement productif, mais il n'est pas illimité. Nous devons décider comment et où utiliser au mieux nos ressources."
 symbiont_policy_balanced: "$drone_policy_balanced$"
 symbiont_policy_balanced_name: "$symbiont_policy_balanced$"
 symbiont_policy_balanced_desc: "La contrée sauvage doit se dédier également à la production de ressources brutes et de biens finis.\n\n§EAucun avantage ni pénalité sur la production de ressources.§!"
 symbiont_policy_worker: "$drone_policy_worker$"
 symbiont_policy_worker_name: "$symbiont_policy_worker$"
 symbiont_policy_worker_desc: "La contrée sauvage donne la priorité à l'extraction des ressources brutes, ce qui rend les symbiotes plus productifs au détriment des produits finaux spécialisés.\n\n"
 symbiont_policy_thinker: "$drone_policy_thinker$"
 symbiont_policy_thinker_name: "$symbiont_policy_thinker$"
 symbiont_policy_thinker_desc: "La contrée sauvage donne la priorité à la fabrication de produits finis, ce qui rend les symbiotes plus productifs au détriment de l'extraction des ressources brutes.\n\n"
 ####################################
 # Edicts
 ####################################
 edict_capacity_subsidies_wilderness: "$edict_capacity_subsidies$"
 edict_capacity_subsidies_wilderness_desc: "Ce décret encourage nos symbiotes photosynthétiques à former des troupeaux qui suivent le soleil à la surface, augmentant ainsi la production d'énergie."
 edict_mining_subsidies_wilderness: "$edict_mining_subsidies$"
 edict_mining_subsidies_wilderness_desc: "Ce décret renforce nos racines, ce qui permet à nos symbiotes fouisseurs de faire leur travail en limitant les risques d'effondrement."
 edict_farming_subsidies_wilderness: "$edict_farming_subsidies$"
 edict_farming_subsidies_wilderness_desc: "Ce décret assure une dilution agressive des produits chimiques riches en énergie dans le sol afin d'augmenter la production d'éléments nutritifs."
 edict_forge_subsidies_wilderness: "$edict_forge_subsidies$"
 edict_forge_subsidies_wilderness_desc: "En injectant des nutriments dans nos bassins d'algues lithotrophes, nous obtenons une floraison saisonnière pendant laquelle la récolte de sous-produits d'alliage est fortement augmentée."
 edict_research_subsidies_wilderness: "$edict_research_subsidies$"
 edict_research_subsidies_wilderness_desc: "$edict_research_subsidies_desc$"
 edict_clearing_motes_wilderness: "$edict_clearing_motes$"
 edict_clearing_motes_wilderness_desc: "L'ajout de particules volatiles au régime alimentaire de nos symbiotes permet la digestion de substances organiques et inorganiques. Notre holobionte s'adapte à notre propre environnement en s'en nourrissant."
 edict_learning_campaign_wilderness: "$edict_learning_campaign$"
 edict_learning_campaign_wilderness_desc: "En fournissant aux symbiotes des nutriments supplémentaires, nous pourrons accroître leur productivité."
 edict_war_drone_campaign_wilderness: "Campagne de symbiotes de combat"
 edict_war_drone_campaign_wilderness_desc: "En fournissant aux prédateurs et aux symbiotes de troupeau des nutriments supplémentaires, nous pourrons accroître leur puissance et améliorer leur préparation au combat."
 edict_scientific_revolution_wilderness: "$edict_scientific_revolution$"
 edict_scientific_revolution_wilderness_desc: "$edict_scientific_revolution_desc$"
 edict_drone_overdrive_wilderness: "Surcadençage des symbiotes"
 edict_drone_overdrive_wilderness_desc: "Nos biomes seront poussés davantage afin de répondre à la demande en ressources."
