 ####################################
 # Zones
 ####################################
 zone_urban_wilderness: "Bosquet vital"
 zone_urban_wilderness_desc: "Un noyau vibrant de biomasse et d'instinct où la contrée sauvage s'étend et se remodèle sans cesse. Elle plante ses larges racines dans les profondeurs, s'apprêtant à assumer toute fonction nécessaire."
 zone_foundry_wilderness: "Fournaise vibrante"
 zone_foundry_wilderness_desc: "Cette chambre thermique regorge de pierre en fusion et de force élémentaire. En ces lieux, les symbiotes forgeurs façonnent le métal à un rythme soutenu, alimentant l'ossature en pleine croissance de la planète."
 zone_research_wilderness: "Pousse du savoir"
 zone_research_wilderness_desc: "Un foyer élevé de racines nerveuses accueillant l'efflorescence mutagène. Ici, les symbiotes analystes acquièrent de nouvelles excroissances, de nouveaux sens et de nouveaux savoirs."
 zone_unity_wilderness: "Falaises chantantes"
 zone_unity_wilderness_desc: "Ces formations imposantes à l'ossature creuse et à la chair lithique portent les tonalité du vent à la surface du monde. Les symbiotes de choeur se rassemblent ici pour répandre sa mélodie."
 zone_fortress_wilderness: "Bulbe de commandement"
 zone_fortress_wilderness_desc: "Un noeud sensoriel hypertrophié où se regroupent les symbiotes bergers, diffusant des impulsions olfactives pour rallier et guider les hordes préconscientes. La contrée sauvage n'ordonne pas, elle murmure dans l'ombre."
 zone_minerals_wilderness: "Colonne minérale"
 zone_minerals_wilderness_desc: "Une structure imposante et striée, faite de pierre vivante, telle une montagne organique. En ses entrailles caverneuses, les minéraux s'agrègent et vibrent au rythme tranquille de la contrée sauvage."
 zone_energy_wilderness: "Poumons solaires"
 zone_energy_wilderness_desc: "D'immenses champs de tissus photosynthétiques s'épanouissent sous la lumière du soleil, emmagasinant son énergie jusqu'à l'expulser en un souffle rythmé. Les symbiotes photosynthétiseurs suivent cette énergie dans l'atmosphère afin d'exploiter les courants thermiques sur la trajectoire céleste."
 zone_food_wilderness: "Fleurisse"
 zone_food_wilderness_desc: "Ce cerveau parfumé de pétales et de phéromones trace les routes de pollinisation comme un tisserand. C'est ici que la fertilité de la planète est orchestrée avec une efficacité industrielle."
 zone_research_unity_wilderness: "Coeur harmonique"
 zone_research_unity_wilderness_desc: "Un cocon cadencé au coeur de la contrée sauvage, où le savoir vibre à travers la mémoire et la connaissance. La pensée ne naît pas ici, elle y résonne."
 zone_trade_wilderness: "Carrefour de flux"
 zone_trade_wilderness_desc: "Un ensemble de circuits fibreux, d'excroissances imbriquées et de réservoirs forment ce centre de distribution inlassable où les symbiotes de flux manipulent et acheminent l'essence de la vie. La contrée sauvage subvient à ses propres besoins."
 ####################################
 # Decisions
 ####################################
 decision_wilderness_expand: "Augmenter la taille de la planète"
 decision_wilderness_expand_desc: "En réabsorbant la biomasse purifiée que nous avons collectée, nous pouvons faire croître notre monde."
 decision_wilderness_mastery_over_nature_desc: "Notre collectif a besoin d'espace pour se développer, et nous allons le lui trouver. Nous nous adapterons à tous les environnements de la planète."
