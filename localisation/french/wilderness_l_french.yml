l_french:
 ####################################
 # Events
 ####################################
 # introduction event
 progress.2.desc.wilderness: "Sur [from.GetName], le [root.GetName] a fait une découverte époustouflante : la [from.GetPlanetMoon] grouille de vie alien ! Pour la première fois, nous avons rencontré des formes de vie étrangères.\n\nCette découverte confirme enfin que nous ne sommes pas seuls dans l'univers - car si aucune des créatures aliens trouvées sur [from.GetName] n'est douée de raison, ce n'est qu'une question de temps avant que nous découvrions une forme de vie intelligente..."
 # Colonization Events
 wilderness.1010.name: "[from.GetName] s'éveille"
 wilderness.1010.desc.intro: "Nos spores de terraformation ont rempli leur mission. Elles ont conduit une partie de nous sur un monde alien pour la toute première fois."
 wilderness.1010.desc.same: "Cette sensation d'être à la fois [from.GetName] et [root.GetHomeWorldName]... nous semble déjà si familière. C'est réconfortant, malgré toutes les nouvelles formes que nous avons dû prendre sous un soleil autrefois étranger. Nous nous sommes aisément adaptés aux conditions locales." #e.g. 'becoming Mars as well as Earth...''
 wilderness.1010.desc.similar_cold: "Nous adapter à la [from.GetPlanetMoon] [from.GetClassAdj] qu'est §Y[from.GetName]§! sera un défi de taille, mais nous avons déjà trouvé des moyens familiers pour y faire face. Les vrilles s'étendent, les habitats se créent et les bouches affamées chassent." #e.g. 'Adapting our self to suit arctic Pluto...'
 wilderness.1010.desc.similar_dry: "En tant que [root.GetHomeWorldName], nous avons prospéré dans une atmosphère aride. C'est pourquoi nous pourrons relever le défi de devenir la [from.GetPlanetMoon] [from.GetClassAdj] qu'est §Y[from.GetName]§!. Nous avons déjà trouvé de nouvelles façons de chercher l'humidité et avons appris à travailler avec cette rude géologie, plutôt que contre elle." #e.g. 'the challenge of becoming savannah Mars'
 wilderness.1010.desc.similar_wet: "Tout comme nous avons prospéré dans les eaux de [root.GetHomeWorldName], nous prospérerons en devenant la [from.GetPlanetMoon] [from.GetClassAdj] qu'est §Y[from.GetName]§!. Les minéraux, les courants et même la quantité de lumière nous paraissent étranges, mais nous avons déjà trouvé des moyens d'extraire ce dont nous avons besoin." #e.g. 'we flourish as oceanic Neptune'
 wilderness.1010.desc.diff_cold: "Nous savions que devenir §Y[from.GetName]§! ne serait pas chose aisée et, en effet, une partie de ce qui a fait de nous la [root.capital_scope.GetPlanetMoon] [root.capital_scope.GetClassAdj] [root.GetHomeWorldName] s'est déjà étiolée. Toutefois, ce qui reste se révèle robuste et a commencé à s'adapter. Notre méconnaissance de cet environnement rend difficile l'obtention de ressources vitales, mais nous tenons bon et la vie a déjà trouvé son chemin." #e.g. 'becoming Earth'
 wilderness.1010.desc.diff_dry: "Cet endroit réveille en nous une peur ancestrale. La chaleur et la sécheresse nous rappellent instinctivement « la brûlure ». Toutefois, si nous parvenons à nous adapter et à prospérer ici... devenir §Y[from.GetName]§! pourrait éveiller quelque chose de nouveau en nous. Là où il y a de l'humidité, nous avons trouvé le moyen de la stocker ; là où il n'y a pas d'ombre, nous avons trouvé le moyen d'en créer."
 wilderness.1010.desc.diff_wet: "Notre ambition de devenir §Y[from.GetName]§! nous mettra à l'épreuve, mais nous sommes prêts à faire face à la pourriture et aux inondations. Les parties de nous qui savent gérer l'eau l'absorbent, protégeant ainsi celles qui y sont vulnérables. Nous nous sommes appropriés les courants uniques de cet endroit." #e.g. 'Our effort to become Mars'
 wilderness.1010.desc.other: "Alors que nous nous préparons à devenir §Y[from.GetName]§!, nous identifions les parties de nous qui s'épanouiront et celles qui s'étioleront. Cette [from.GetPlanetMoon] [from.GetClassAdj] a de nombreux points communs avec ce que nous connaissons déjà, mais aussi beaucoup d'inconnues, alors nous observons et expérimentons." #e.g. 'shape ourselves to become Luna'
 wilderness.1010.desc.outro: "Notre composition, nos nutriments et notre ADN ont commencé à s'adapter et à se mélanger à la vie qui était là avant nous. [from.GetName] se réveille."
 wilderness.1010.a: "Bientôt, nos mondes ne feront qu'un"
 # Terraforming Events
 terra.25.desc.wilderness: "Notre long projet d'éveil de §Y[From.GetName]§! n'a pas été aussi concluant que nous l'espérions. Une fissure dans l'un de nos réaligneurs de biomasse a libéré une coulée de §Yrésidus de terraformation§! qui a engorgé des vallées et recouvert certaines zones habitables d'une croûte collante.\n\nMême si cela ne présente aucun danger pour nous, certains de nos éléments les plus mobiles pourraient être affectés pendant quelque temps."
 terra.80.desc.wilderness: "Nous avons débarrassé notre futur nous d'une nouvelle couche de radiations dans l'atmosphère et le sol de §Y[From.GetName]§!. Nos vigilants [Root.GetTerraformerPlural] ont cependant dû intervenir et temporairement isolé une partie du monde. Il semble que nous ayons dérangé une espèce indigène extrêmement farouche qui se développe en environnement radioactif. Hélas, nos actions ont entraîné le déclin de sa population.\n\nMais ce qui est encore plus étonnant, c'est que cette espèce semble être préconsciente et sur le point de penser par elle-même. Alors que les derniers résidus dangereux seront bientôt éliminés de [From.GetName], nous devons décider quoi faire de cette nouvelle forme de vie."
 terra.80.b.wilderness: "Ce monde lui appartient, laissons-la s'éveiller"
 terra.80.d.wilderness: "Engloutissons-la"
 wilderness.2000.name: "Un éveil planifié"
 #wilderness.2000.desc.reg: "We feel the tremendous potential of [from.GetName]. It seems proper to both fear and delight in the awesome power we are about to exert there: shaping this [from.GetPlanetMoon] with our will and the tools we have developed; laying the pattern for its eventual awakening.\n\nWe have long relied on natural processes to grow and sustain the [root.GetName]. But these trials also cost us dearly, and taught us much. Now we shall see what wonders emerge when a habitable world skips its own evolution and gains the wisdom of hard-earned growth and decay."
 wilderness.2000.desc.barren: "La dévastation sur [from.GetName] est douloureuse à regarder, mais elle appartiendra bientôt au passé. La galaxie a choisi d'ignorer ce monde stérile, mais nous, la [root.GetName], avons les moyens et les connaissances pour le reconstruire.\n\nMalgré tout ce que nous avons appris jusqu'à présent, la restauration de [from.GetName] est une tâche ardue. Toutefois, grâce à notre volonté et aux outils de contrôle climatique que nous avons découverts, la vie fleurira bientôt en ce lieu autrefois désolé."
 wilderness.2000.desc.tomb_detox: "Même si la vie qui existait autrefois sur [from.GetName] a disparu, nous sommes prêts à donner une seconde chance à ce monde. Nous avons commencé à restaurer son atmosphère, ses cours d'eau et son sol afin qu'il puisse à nouveau accueillir la vie sous la forme de la [root.GetName]."
 wilderness.2000.desc.gaia: "L'évolution a fait de nous, la [root.GetName], une véritable merveille. Nous avons désormais la possibilité de faire bien plus pour la [from.GetPlanetMoon] [from.GetName]. Nous disposons d'outils et de connaissances qui auraient été impensables pour notre ancien nous, et avons donc commencé à façonner [from.GetName] en un lieu dont l'éveil ne sera comme aucun autre.\n\nUn jour, [from.GetName] débordera de nutriments, renouvelés par le cycle de vie de notre flore et de notre faune. Les vallées, les crêtes et les plateaux seront idéaux pour la cueillette, la chasse et l'habitation. La vie s'y épanouira."
 wilderness.2000.a: "Commençons"
 wilderness_pre_sapient_defence_army: "Troupeau préconscient"
 seq_wilderness_pre_sapient_defence_army: "Troupeau de symbiotes $R$" # e.g. 'Symbiont Herd IV'
 wilderness_pre_sapient_defence_army_plural: "Troupeaux préconscients"
 wilderness_pre_sapient_defence_army_desc: "Ces êtres extrêmement territoriaux sont dociles tant qu'ils ne sont pas provoqués. Lorsque cela arrive, ils s'abandonnent à leurs instincts les plus primaires pour défendre ceux qu'ils perçoivent comme leurs congénères."
 wilderness_pre_sapient_assault_army: "Horde préconsciente"
 seq_wilderness_pre_sapient_assault_army: "Horde de symbiotes $R$" # e.g. 'Symbiont Horde IV'
 wilderness_pre_sapient_assault_army_plural: "Hordes préconscientes"
 wilderness_pre_sapient_assault_army_desc: "Très rusés et endurants, ces êtres impitoyables détruisent brutalement tous ceux qu'ils considèrent comme des ennemis."
 ####################################
 # Origins
 ####################################
 origin_wilderness: "Contrée sauvage"
 origin_wilderness_desc: "§RATTENTION ! Bloque toute ascension à l'exception du chemin de la ['concept_mutation_ascension',pureté].§!\n\nCette entité est un écosystème doué de raison. Diverses formes de vie ont fusionné pour former une conscience de Gestalt planétaire."
 origin_tooltip_wilderness_effects: "- Trait d'espèce : ['trait:trait_wilderness']\n- Remplace tous les £building£['concept_buildings',bâtiments], les £district£['concept_districts',districts] et les £zone£['concept_district_specialization',spécialisations des districts] de base par des versions adaptées\n- Remplace la colonisation des vaisseaux coloniaux par de la ['concept_terraforming',terraformation]\n- Débloque la nouvelle ressource : £biomass£ ['concept_biomass',biomasse]\n- Monde natal :$TABBED_NEW_LINE$- Taille : 18£planetsize£$TABBED_NEW_LINE$- ['concept_scorched_plains',£blocker£$d_scorched_plains$]"
 trait_wilderness: "Contrée sauvage"
 trait_wilderness_desc: "§LCette espèce fait partie d'une entité mutualiste. Elle est intégrée à son environnement, tant au niveau de la pensée que de la production.§!"
 WILDERNESS_NATURAL_WORLDS_DECLINE: "§RLa §Ycontrée sauvage§! ne peut pas survivre sur des mondes artificiels.§!"
 WILDERNESS_DEAD_WORLD: "$TRIGGER_FAIL$La §Ycontrée sauvage§! ne peut pas survivre dans des empires n'appartenant pas à la contrée sauvage."
 country_virtual_jobs: "Tous les emplois de cet empire sont pourvus automatiquement."
 concept_wilderness_trait: "$trait_wilderness$"
 concept_wilderness_trait_desc: "- $MOD_LOGISTIC_GROWTH_MULT$: §R-100%§!\n- §RMigration et réimplantation impossibles§! $NEW_LINE$- §REmpêche toute reproduction naturelle§!\n\n§L$trait_wilderness_desc$§!"
 PRESCRIPTED_adjective_zhardmehka: "Semences"
 PRESCRIPTED_ship_prefix_zhardmehka: "ZMV"
 PRESCRIPTED_species_name_zhardmehka: "zhard-krelline"
 PRESCRIPTED_species_name_plural_zhardmehka: "Zhard-Krellins"
 PRESCRIPTED_species_adjective_zhardmehka: "zhard-krelline"
 PRESCRIPTED_planet_name_zhardmehka: "Tellon"
 PRESCRIPTED_system_name_zhardmehka: "Tattla"
 PRESCRIPTED_ruler_name_zhardmehka: "$FUN3_CHR_Obanva$ $FUN3_CHR_uvi-Livve$"
 PRESCRIPTED_ruler_title_zhardmehka: "Avatar"
 START_SCREEN_WILDERNESS_INTRO: "D'aussi loin que nous nous souvenons, [root.GetHomeWorldName] a toujours été [root.GetHomeWorldName]. Chaque tige, chaque vrille et chaque enzyme fait partie d'une seule et même entité : un équilibre de croissance, de décomposition et de prédation. Pendant des années, [root.GetHomeWorldName] n'a perçu que vaguement le reste de la galaxie, et pourtant les étoiles s'agitaient depuis longtemps.\n\nUne bataille a éclaté dans le ciel au-dessus de [root.GetHomeWorldName]. Les débris d'immenses vaisseaux qui ont plu à la surface ont été rapidement utilisés à d'autres fins. Puis est venue l'éruption stellaire..."
 START_SCREEN_WILDERNESS_DEFAULT: "[root.GetHomeWorldName] l'a ressentie comme une lumière aveuglante et brûlante. Des milliards de symbiotes ont été engloutis par les tempêtes de feu et les radiations. La vie d'un continent entier a été éradiquée."
 START_SCREEN_WILDERNESS_COLD: "[root.GetHomeWorldName] l'a ressentie comme une lumière aveuglante et brûlante. Les glaciers se sont transformés en torrents déchaînés, et les radiations stellaires ont ravagé [root.GetHomeWorldName] jusqu'à la racine. Un continent entier a été anéanti."
 START_SCREEN_WILDERNESS_DRY: "[root.GetHomeWorldName] l'a ressentie comme une lumière aveuglante et brûlante. Les dunes ont fondu et se sont transformées en verre, tandis que les vents violents ont balayé nos surfaces rocheuses. Un continent entier a été rendu stérile."
 START_SCREEN_WILDERNESS_WET: "[root.GetHomeWorldName] l'a ressentie comme une lumière aveuglante et brûlante. Les lacs se sont mis à bouillir et les étendues de glace à fondre, tandis que les radiations stellaires ont ravagé [root.GetHomeWorldName] jusqu'à la racine. Un continent entier a été perdu."
 START_SCREEN_WILDERNESS_OUTRO: "La douleur nous a réveillés. Pour la première fois, nous avons pris conscience de notre fragilité. La galaxie recèle des dangers, mais aussi des merveilles. Nous utiliserons ce que nous avons appris pour germer et nous étendre. Nous voyagerons vers les étoiles comme une seule entité."
 ####################################
 # Authorities
 ####################################
 auth_mutualistic_intelligence: "Intelligence mutualiste"
 auth_mutualistic_intelligence_plural: "Intelligences mutualistes"
 auth_mutualistic_intelligence_desc: "Les intelligences mutualistes sont des consciences planétaires. Elles sont composées d'espèces symbiotiques issues d'une grande variété de biotes, qui agissent en accord avec la volonté collective de leur environnement.\n\nCertains symbiotes peuvent travailler de manière semi-autonome sur des tâches spécialisées, mais la plupart ont besoin d'un contact régulier avec leur environnement mutualiste. S'ils sont isolés, leurs instincts sauvages reviennent et ils finissent par mourir."
 tt_auth_mutualistic_intelligence: "A une autorité §Y$auth_mutualistic_intelligence$§! (§Y$auth_hive_mind$§!)"
 gov_wilderness: "$gov_hive_mind$"
 gov_wilderness_desc: "Ce régime politique opère comme une conscience unique, la population étant composée d'individus n'ayant aucune motivation personnelle si ce n'est de satisfaire les besoins et les désirs de la contrée sauvage."
 RT_WILDERNESS: "Contrée sauvage"
 RT_WILDERNESS_FEMALE: "$RT_WILDERNESS$"
 ####################################
 # Buildings
 ####################################
 building_colony_shelter_wilderness: "Vrilles planétaires"
 building_colony_shelter_wilderness_desc: "Un organisme multicellulaire qui s'étend sur toute la planète et assure la stabilité de la contrée sauvage."
 building_capital_wilderness: "Fagot de racines planétaires"
 building_capital_wilderness_desc: "Une énorme masse vivante d'organismes simples qui se coordonne avec les symbiotes mobiles pour améliorer l'organisation et la productivité."
 building_major_capital_wilderness: "Complexe de racines planétaires"
 building_major_capital_wilderness_desc: "Une masse vivante suffisamment dense pour que les symbiotes puissent vivre, travailler et se reproduire dans une sphère très restreinte."
 building_system_capital_wilderness: "Nexus de racines planétaires"
 building_system_capital_wilderness_desc: "Un immense regroupement de différentes formes de vie travaillant en harmonie. Sa taille est telle qu'il génère son propre microclimat idéal."
 requires_building_wilderness_capital: "§RNécessite un £building£§Yfagot de racines planétaires§! sur le monde.§!"
 requires_building_wilderness_major_capital: "§RNécessite un £building£§Ycomplexe de racines planétaires§! sur le monde.§!"
 requires_building_wilderness_system_capital: "§RNécessite un £building£§Ynexus de racines planétaires§! sur le monde.§!"
 building_imperial_capital_wilderness: "Complexe impérial"
 building_imperial_capital_wilderness_desc: "Depuis cette structure massive et complexe, la contrée sauvage gouverne l'Empire galactique. C'est là que se décide le destin de la galaxie."
 building_tendril_cradle_1: "Berceau tentaculaire"
 building_tendril_cradle_1_desc: "Un amas de courts filaments enracinés s'étend depuis ce site, attirant les matériaux environnants vers les organismes clés à proximité."
 building_tendril_cradle_2: "Étendue filandreuse"
 building_tendril_cradle_2_desc: "De longs filaments parcourent cette zone, aspirant les ressources des terres voisines avant de les traiter et de les redistribuer."
 building_tendril_cradle_3: "Nid de racines porteuses"
 building_tendril_cradle_3_desc: "Des racines enchevêtrées s'animent sous la surface, transportant la biomasse via un réseau complexe vers des foyers vivants éloignés."
 building_tendril_cradle_4: "Noyau filaire planétaire"
 building_tendril_cradle_4_desc: "De gigantesques veines logistiques parcourent le coeur de la planète, drainant, régulant et acheminant les ressources de la contrée sauvage avec une synchronisation sans faille."
 planet_research_buildings: "Bâtiments de recherche planétaire"
 mod_planet_research_buildings_upkeep_mult: "Entretien des bâtiments de recherche planétaire "
 building_brain_node_1: "Proliférateur de recherche"
 building_brain_node_1_desc: "Le travail des symbiotes espiègles et curieux constitue la base de la recherche générale."
 mod_planet_building_brain_node_1_build_speed_mult: "Vit. de constr. des bosquets de recherche "
 building_brain_node_2: "Bosquet de recherche"
 building_brain_node_2_desc: "Un habitat qui stimule de manière unique la curiosité et facilite l'étude d'artefacts et de phénomènes avancés."
 mod_planet_building_brain_node_2_build_speed_mult: "Vit. de constr. des centres de recherche exotique "
 building_brain_node_3: "Centre de recherche exotique"
 building_brain_node_3_desc: "Dans ces vastes installations, les symbiotes extrêmophiles peuvent expérimenter toutes sortes de matériaux exotiques et dangereux."
 mod_planet_building_brain_node_3_build_speed_mult: "Vit. de constr. des centres de recherche avancée "
 building_brain_node_4: "Centre de recherche avancée"
 building_brain_node_4_desc: "Cette fusion de technologies exotiques et de vastes installations développées par des symbiotes permet de mener des recherches innovantes dans divers environnements expérimentaux."
 mod_planet_building_brain_node_4_build_speed_mult: "Vit. de constr. des centres de recherche avancée "
 building_commensal_clearing_1: "Clairière commensale"
 building_commensal_clearing_1_desc: "Sur ces îles sereines, les symbiotes mobiles de toutes sortes peuvent se rassembler, se reposer et se réorienter."
 building_commensal_clearing_2: "Bosquet commensal"
 building_commensal_clearing_2_desc: "Un lieu protégé où les symbiotes peuvent se réunir en grand nombre. Leurs interactions leur permettent de mieux comprendre leur répartition."
 building_commensal_clearing_3: "Vallée commensale"
 building_commensal_clearing_3_desc: "Des communautés denses et diversifiées de symbiotes vont et viennent sur ce terrain vierge, renforçant les liens qui les unissent."
 building_commensal_clearing_4: "Biome commensal"
 building_commensal_clearing_4_desc: "Vastes habitats interconnectés qui sont le théâtre d'innombrables rencontres, chacune d'entre elles étant indispensable à l'unité mutualiste."
 building_massive_growth_1: "Vallon nutritif"
 building_massive_growth_1_desc: "Petite formation géologique offrant le microclimat idéal pour une culture stable tout au long de l'année."
 building_massive_growth_2: "Sous-bois nutritif"
 building_massive_growth_2_desc: "Une vaste canopée semi-perméable offre à ce sous-bois la protection nécessaire pour produire une nourriture riche et succulente de façon continue."
 building_massive_growth_3: "Méga-plantation vallonnée"
 building_massive_growth_3_desc: "Ces vastes terrasses offrent un refuge tant aux micro-organismes semi-aquatiques qu'à la faune, et fournissent des protéines et des céréales en abondance."
 building_massive_growth_4: "Plantation sylvicole"
 building_massive_growth_4_desc: "Sous-bois protégé par une méga-flore luxuriante qui produit une grande quantité de nourriture pour soutenir l'ensemble du réseau trophique."
 building_bioelectric_stimulator_1: "Acclimateur chloroplastique"
 building_bioelectric_stimulator_1_desc: "Un amas de bulles lenticulaires concentre les rayons du soleil à l'intérieur d'un riche mélange d'algues, où l'énergie est convertie et stockée pour une utilisation ultérieure."
 building_bioelectric_stimulator_2: "Accélérateur chloroplastique"
 building_bioelectric_stimulator_2_desc: "Des bulles translucides remplies d'algues photosynthétiques qui captent l'énergie solaire pour renforcer les liens biochimiques et réduire l'auto-décharge."
 building_bioelectric_stimulator_3: "Réseau de lentilles chloroplastiques"
 building_bioelectric_stimulator_3_desc: "Ce centre fournit un approvisionnement flexible et fiable en énergie grâce à un réseau de branches munies de capteurs solaires, qui peuvent s'élever et s'abaisser en fonction de la demande et de la capacité."
 building_bioelectric_stimulator_4: "Kyste chloroplastique"
 building_bioelectric_stimulator_4_desc: "Ces poches translucides remplies d'algues migrent et se multiplient là où leur énergie est nécessaire, éliminant presque complètement la perte d'énergie, même sur de longues distances."
 building_churning_tunnels_1: "Foret lithique"
 building_churning_tunnels_1_desc: "Force une matière végétale d'une dureté quasi cristalline à s'introduire dans les sites d'extraction existants, augmentant ainsi considérablement la quantité de minéraux utiles récupérée."
 building_churning_tunnels_2: "Filtres lithiques"
 building_churning_tunnels_2_desc: "Des colonies de biofilms semi-perméables recueillent des minéraux précieux qui seraient autrement perdus dans les rejets de l'exploitation minière liquide."
 building_churning_tunnels_3: "Macérateur lithique"
 building_churning_tunnels_3_desc: "De puissantes pinces et plaques de broyage transforment la matière terreuse en une boue chimique qui facilite l'extraction des minéraux."
 building_churning_tunnels_4: "Bains lithiques"
 building_churning_tunnels_4_desc: "Une combinaison de macérateurs, d'agents biochimiques et de biofilms qui permet d'extraire des minéraux directement là où se trouvent les veines les plus riches."
 building_natural_furnace_0: "Bassin de fusion"
 building_natural_furnace_0_desc: "Les symbiotes thermophiles travaillent sans relâche pour produire des alliages de haute qualité dans cette source de chaleur naturelle."
 building_natural_furnace_1: "Four de fusion"
 building_natural_furnace_1_desc: "Les organismes résistants à la chaleur permettent une utilisation plus efficace de l'énergie thermique, ce qui se traduit par une production d'alliages de haute qualité."
 building_natural_furnace_2: "Fonderie à lumière solide"
 building_natural_furnace_2_desc: "Fours litho-organiques très complexes, renforcés par une sorte de technologie holographique, qui produisent des alliages extrêmement polyvalents."
 building_natural_furnace_3: "Nano-fonderie"
 building_natural_furnace_3_desc: "Les nano-organismes thermophiles qui vivent dans ces bassins et fours brûlants débarrassent les alliages de leurs impuretés."
 building_avatar_chamber_1: "Berceau des avatars"
 building_avatar_chamber_1_desc: "Cet organisme naissant aux formes élémentaires façonnées par la contrée sauvage, forge son instinct pour faire face aux terres et aux êtres inconnus à sa biosphère d'origine."
 building_avatar_chamber_2: "Chambre des avatars"
 building_avatar_chamber_2_desc: "Ici, des corps factices sont poussés à imiter des organismes et des écosystèmes étrangers à travers diverses épreuves. Le savoir s'acquiert en se familiarisant avec l'inconnu."
 building_avatar_chamber_2_effect: "$building_avatar_chamber_1$ : §G+200§! en production de £amenities£services"
 building_avatar_chamber_3: "Forêt des avatars"
 building_avatar_chamber_3_desc: "Cet organisme tentaculaire utilise des modèles d'avatars inspirés de formes et de paysages extraterrestres. La contrée sauvage s'éduque en vivant l'inexpérimenté."
 building_avatar_chamber_3_effect: "$building_avatar_chamber_1$ : §G+400§! en production de £amenities£services"
 building_avatar_chamber_4: "Cortex des avatars"
 building_avatar_chamber_4_desc: "Une machination à l'échelle planétaire capable de simuler des civilisations entières, des écosystèmes étrangers et des conditions environnementales extrêmes. C'est ici que la contrée sauvage prépare sa rencontre avec la galaxie."
 building_avatar_chamber_4_effect: "$building_avatar_chamber_1$ : §G+800§! en production de £amenities£services"
 building_mote_aggravator: "Digesteur chimique"
 building_mote_aggravator_desc: "Système complexe de tissus vasculaires et de métaboliseurs chimiques qui produit des particules volatiles à partir de matière terreuse."
 building_churning_stomach: "Filtres à gaz exotiques"
 building_churning_stomach_desc: "Des microbes et nano-organismes hautement spécialisés réagissent avec les aérosols ordinaires pour produire des gaz exotiques raffinés."
 building_crystal_growth: "Banc de cristaux"
 building_crystal_growth_desc: "Des auvents spéciaux régulent soigneusement l'humidité et la température afin de favoriser la croissance de cristaux rares artificiels."
 building_planetary_carapace: "Garnison osseuse"
 building_planetary_carapace_desc: "Ce cocon d'entraînement peut abriter un grand nombre de symbiotes territoriaux qui se tiennent prêts à intervenir en cas d'urgence."
 mod_planet_building_planetary_carapace_build_speed_mult: "Vit. de constr. des garnisons osseuses "
 building_planetary_carapace_2: "Forteresse osseuse"
 building_planetary_carapace_2_desc: "Cette vaste installation composée de terrains d'entraînement et de quartiers d'habitation prépare les forces de défense à répondre à toute invasion planétaire."
 building_ozone_thickener: "Bouclier planétaire"
 building_ozone_thickener_desc: "$tech_planetary_shield_generator_desc$"
 building_subterranean_cache: "Réserve souterraine"
 building_subterranean_cache_desc: "$building_resource_silo_desc$"
 building_cradle_of_rebirth: "Berceau de la renaissance"
 building_cradle_of_rebirth_desc: "Fermement enracinée, cette structure métabolise la matière en décomposition et les victimes de la biomasse, alimentant dans l'ombre les entrailles de la planète."
 building_wilderness_storm_relief: "$building_storm_resistant_production$"
 building_wilderness_storm_relief_desc: "Large toit de feuilles résistantes et chargées en bioélectricité, capable de réagir rapidement en cas de tempêtes cosmiques pour protéger les symbiotes à proximité et assurer leur productivité."
 building_wilderness_storm_relief_tt: "Les effets négatifs des §Ytempêtes cosmiques§! sur la production de la planète sont réduits de §G25%§!."
 holding_wilderness_glade: "Clairière sauvage"
 holding_wilderness_glade_plural: "Clairières sauvages"
 holding_wilderness_glade_desc: "Une région productive de la contrée sauvage symbiotique qui n'est que faiblement reliée au collectif supérieur. Bien que les symbiotes qui vivent dans ce biome miniature dépendent largement des sources de nourriture locales, ils peuvent également exploiter d'autres ressources à proximité."
 holding_wilderness_glade_effect_desc: "Les dépendances transforment [owner.WildernessGladeProvides_FR_lela] en £energy£minerals £food£§Yressources de base§! pour leur suzeraine.\nLes suzeraines réduisent la maintenance des £job£emplois producteurs de ressources sur les mondes des dépendances.\nUne £blocker£§Yclairière sauvage§! apparaît sur le monde, occupant tout un district."
 no_free_district_for_wilderness_glade: "$TRIGGER_FAIL$§RAucun emplacement vide de district sur ce monde pour accueillir notre biome miniature.§!"
 blocker_tied_to_wilderness_glade: "$TRIGGER_FAIL$§RTant qu'il y aura une §Yclairière sauvage§! comme possession, ce bloqueur restera en place.§!"
 d_wilderness_glade_blocker: "$d_wilderness_root_blocker$"
 d_wilderness_glade_blocker_desc: "Pour entretenir une clairière sauvage, il faut des structures racinaires considérables qui permettent au biome miniature de survivre dans un environnement étranger."
 holding_wilderness_glade_modifier: "Clairières sauvages partagées"
 holding_wilderness_glade_modifier_desc: "Les mondes des dépendances vivent en harmonie avec nous et chacun partage ses richesses mutualistes." # appears in 'lore brown'
 holding_wilderness_glade_modifier_tt: "La quantité varie en fonction du nombre de mondes des dépendances ayant des §Yclairières sauvages§!."
