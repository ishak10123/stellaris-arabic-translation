 job_gaseosymbiote_plural: "Symbiotes de gaz"
 job_gaseosymbiote_desc: "Ces symbiotes, passés maîtres en alchimie microbienne, préservent l'équilibre nécessaire à la formation naturelle de gaz exotiques."
 job_gaseosymbiote_effect_desc: "(les [gas_refiner_drone.GetIcon]symbiotes de gaz transforment [GetCatalyticMineralsOrFood_LeLaLes_FR] en £exotic_gases£§Ygaz exotiques§!)"
