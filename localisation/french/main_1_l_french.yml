 slave_army_plural: "Armées d'esclaves"
 slave_army_desc: "Des soldats esclaves qui servent leurs maîtres sur le champ de bataille. La plupart sont conscrits de force, mais de nombreux esclaves se portent volontaires dans une tentative désespérée d'augmenter leurs rations alimentaires et d'échapper à un travail éreintant."
