 clone_army_plural: "Armées de clones"
 clone_army_desc: "Des clones spécialisés, atteignant l'âge adulte en quelques mois seulement. Si leur espérance de vie naturelle n'excède pas une dizaine d'années, leur manque d'initiatives personnelles est considéré comme un compromis acceptable eut égard à leur obéissance pleine et entière envers les officiers."
 robotic_army: "Armée robotique d'assaut"
 robotic_army_plural: "Armées robotiques"
 robotic_army_desc: "Des machines à tuer froides et sans pitié, conçues uniquement pour la guerre. Elles poursuivent leurs objectifs sans relâche et sont imperméables aux effets dévastateurs de la baisse de moral qui rongent si souvent les unités de combat organiques."
