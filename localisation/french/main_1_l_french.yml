 PLANET_DAMAGED_INFO: "Ce monde a souffert de $DAMAGE|%Y$ de dommages. Lorsque les dommages planétaires atteindront §Y100%§!, une tuile sera dévastée, détruisant son bâtiment et risquant de tuer la pop qui s'y trouverait."
