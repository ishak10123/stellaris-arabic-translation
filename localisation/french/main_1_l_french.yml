 TOOLTIP_SETUP_EMPIRE_NAMELIST: "§H$CUSTOMIZE_NAME_LISTS$§!\nSélectionnez une liste à partir de laquelle vos vaisseaux, personnalités et planètes seront nommés."
 TOOLTIP_SETUP_SPECIES_EMPIRE_NAMES: "§H$NAMES$§!\nPersonnalisez le nom de votre espèce et de votre empire."
 TOOLTIP_SETUP_WEAPONS: "§H$STARTING_WEAPONS$§!\nChoisissez quel armement équipera les vaisseaux de votre empire en début de partie.\n\nVous aurez la possibilité de changer les modules d'armement en cours de partie. Pour cela, reportez-vous au §Yconcepteur de vaisseaux§! lors de la partie."
 TOOLTIP_SETUP_FTL: "§H$FTL_LABEL$§!\nSélectionnez le mode de voyage qui sera utilisé par votre empire pour les voyages interstellaires. Vous ne pourrez pas changer de mode FTL, à moins de découvrir certaines technologies extrêmement rares. Au cours de la partie, vous ne pourrez jamais passer d'un mode FTL de base à un autre."
