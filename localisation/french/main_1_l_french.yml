 TOOLTIP_SETUP_APPEARANCE: "§H$PORTRAIT$§!\nSélectionnez le type et l'apparence de votre espèce."
 TOOLTIP_SETUP_SPECIES_NAME: "§H$SPECIES_NAME$§!\nSélectionnez le nom de votre espèce."
