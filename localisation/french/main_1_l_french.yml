 TOOLTIP_SETUP_RULER: "§H$RULER$§!\nPersonnalisez votre dirigeant de départ. Notez bien que certains régimes politiques changent de dirigeant plus fréquemment que d'autres, et qu'un dirigeant peut également mourir."
 TOOLTIP_SETUP_NAME_CLASS: "§H$NAME_AND_CLASS$§!\nSélectionnez la classe de planète de votre monde natal et personnalisez son nom. La classe de planète que vous choisirez deviendra le type de planète privilégié pour votre espèce.\n\nCelle-ci pourra cependant résider sur d'autres classes de planètes, selon leurs différences avec la classe de votre planète natale."
