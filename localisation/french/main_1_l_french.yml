 trait_nerve_stapled: "Dénervée"
 trait_nerve_stapled_desc: "§LLes connexions nerveuses non essentielles, liées aux réflexes de survie et au libre arbitre, sont tranchées, créant ainsi une espèce soumise et docile.§!\n"
 trait_fertile: "Fertile"
 trait_fertile_desc: "§LLa fécondité et la gentillesse naturelles de cette espèce ont été grandement accrues par des modifications d'ordre physique et comportemental.§!\n"
 trait_erudite: "Érudite"
 trait_erudite_desc: "§LL'ingénierie biologique a permis d'éveiller des parties dormantes du cerveau de cette espèce, améliorant grandement ses capacités mentales.§!\n"
 trait_robust: "Robuste"
 trait_robust_desc: "§LDes organes bio-optimisés aux fonctions redondantes ont rendue cette espèce exceptionnellement have résistante aux dangers environnementaux et aux maladies.§!\n"
 trait_charismatic: "Charismatique"
 trait_charismatic_desc: "§LLes membres de cette espèce ont un charisme particulier, et sont généralement considérés comme d'agréable compagnie.§!\n"
 trait_repugnant: "Répugnante"
 trait_repugnant_desc: "§LL'apparence physique et les coutumes de cette espèce dérangent la plupart des autres, aussi bien peu apprécient de s'en approcher.§!\n"
 trait_talented: "Talentueuse"
 trait_talented_desc: "§LLes membres de cette espèce naissent avec des dons innés.§!\n"
 trait_strong: "Forte"
 trait_strong_desc: "§LLes membres de cette espèce possèdent une grande force physique, ce qui en fait de redoutables combattants au sol.§!\n"
 trait_strong_tt: "Efficacité des ouvriers : §G+2.50%§!"
 trait_very_strong: "Très forte"
 trait_very_strong_desc: "§LLes membres de cette espèce possèdent une force qui défierait presque les lois de la physique.§!\n"
 trait_very_strong_tt: "Efficacité des ouvriers : §G+5.00%§!"
 trait_weak: "Faible"
 trait_weak_desc: "§LLes membres de cette espèce sont physiquement plus faibles que la moyenne, ce qui en fait de piètres combattants au sol.§!\n"
 trait_weak_tt: "Efficacité des ouvriers : §R-2.50%§!"
 trait_tough: "Coriace"
 trait_tough_desc: "Les membres de cette espèce sont capables de résister à un traumatisme physique qui tuerait pourtant la plupart des autres êtres.\n"
 trait_frail: "Frêle"
 trait_frail_desc: "Les membres de cette espèce sont particulièrement fragiles - ce qui serait une blessure mineure pour d'autres leur est fatal.\n"
 trait_stoic: "Stoïque"
 trait_stoic_desc: "Les membres de cette espèce possèdent une grande discipline mentale, ils paniquent rarement lorsqu'ils sont placés face à des situations dangereuses.\n"
 trait_timid: "Timide"
 trait_timid_desc: "Les membres de cette espèce ont tendance à éviter les confrontations physiques et sont prompts à la panique.\n"
 trait_indolent: "Indolent"
 trait_indolent_desc: "Les membres de cette espèce rechignent face au dur labeur et plus généralement à faire des efforts.\n"
 trait_communal: "Grégaire"
 trait_communal_desc: "§LLes membres de cette espèce ont pour habitude de vivre les uns sur les autres.§!\n"
 trait_solitary: "Solitaire"
 trait_solitary_desc: "§LLes membres de cette espèce sont solitaires et s'accrochent à leur territoire, les lieux surpeuplés les rendent nerveux.§!\n"
 trait_adaptive: "Adaptative"
 trait_adaptive_desc: "§LCette espèce s'adapte facilement dans des environnements qui ne lui sont pas familiers.§!\n"
