 TOOLTIP_SETUP_GOVERNMENT: "§H$ETHICS_AND_GOVERNMENT$§!\nSélectionnez le régime politique et les éthiques de votre empire. Le choix de vos éthiques déterminera quels régimes politiques seront disponibles."
 TOOLTIP_SETUP_EMPIRE_ADVISOR: "§H$EMPIRE_ADVISOR$§!\nChoisissez un type de voix pour les alertes et notifications."
