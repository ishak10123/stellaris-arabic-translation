 leader_trait_rigid_programming_desc: "Ce dirigeant souffre d'une programmation particulièrement figée, qui ne lui permet de ne procéder que rarement à des changements comportementaux, même lorsque ceux-ci garantiraient de meilleures performances."
 leader_trait_newboot: "Rebooté"
 leader_trait_newboot_desc: "Cela fait peu de temps que cette personnalité a été mise à jour pour accéder à un niveau d'autonomie suffisant pour occuper un poste de commandement."
 leader_trait_warbot_tinkerer: "Bricoleur de robots de combat"
 leader_trait_warbot_tinkerer_desc: "Cette personnalité a un goût inhabituel pour la conception de robots de combat, et passe son temps à bricoler et améliorer les modèles existants."
 leader_trait_ai_aided_design: "Conception assistée par I.A."
 leader_trait_ai_aided_design_desc: "Cette personnalité lance constamment des modèles théoriques sur un espace mémoire secondaire afin d'améliorer l'efficacité de la construction des flottes."
 leader_trait_bulldozer: "Bulldozer"
 leader_trait_bulldozer_desc: "Cette personnalité est passée maîtresse dans l'art de transformer rapidement et avec efficacité les terrains les plus aliens en un véritable parking."
 leader_trait_analytical: "Analytique"
 leader_trait_analytical_desc: "Cette personnalité consacre un pourcentage inhabituellement important de sa puissance de traitement à analyser les sciences naturelles et à promouvoir les études menées en ce domaine."
 leader_trait_parts_cannibalizer: "Recycleur"
 leader_trait_parts_cannibalizer_desc: "Cette personnalité défend avec fermeté la pratique du recyclage. Les pièces prises sur les robots de combats abîmés ou défectueux permettent ainsi aux autres de fonctionner plus longtemps."
 leader_trait_demoralizer: "Démoralisateur"
 leader_trait_demoralizer_desc: "Cette personnalité est fascinée par l'esprit fragile des organiques et la façon la plus efficace dont il peut être brisé en recourant à des méthodes de terreur sur le champ de bataille."
 leader_trait_erratic_morality_core: "Routine éthique défaillante"
 leader_trait_erratic_morality_core_desc: "Les défaillances de la routine éthique de cette personnalité la font souffrir d'intenses accès de honte et de regrets à propos des pertes ennemies."
 leader_trait_maintenance_loop: "Routine de maintenance"
 leader_trait_maintenance_loop_desc: "Cette personnalité est perpétuellement engagée dans une routine de maintenance secondaire, prenant un soin méticuleux de tous les vaisseaux de sa flotte afin de réduire leur coût logistique."
 leader_trait_unstable_code_base: "Code de base instable"
 leader_trait_unstable_code_base_desc: "Cette personnalité souffre d'un code de base instable, ce qui se traduit parfois par des tensions et un comportement illogique."
 leader_trait_cataloger: "Compilateur"
 leader_trait_cataloger_desc: "Cette personnalité a pour unique vocation de cataloguer l'ensemble de l'univers."
 #Event Special
 leader_trait_sentinel: "Entrainement de sentinelle"
 leader_trait_sentinel_desc: "Les commandants de flotte sentinelle possèdent une connaissance détaillée de l'anatomie et des tactiques préthorynes."
 leader_trait_hive_mind: "Conscience collective"
 leader_trait_hive_mind_desc: "La conscience de Gestalt qui contrôle les flottes préthorynes s'est avérée capable de démultiplier les tâches avec une efficacité remarquable."
 leader_trait_hive_affinity: "Affinité avec le rucher"
 leader_trait_hive_affinity_desc: "Les créatures préthorynes opérant sous la conscience collective de la flotte sont parvenues à atteindre un niveau d'affinité inhabituel les unes envers les autres. Leur discipline de tir en est améliorée d'autant, ce qui leur permet d'élever la cadence de leurs tirs."
 leader_trait_void_swimmer: "Chasseuse du vide"
 leader_trait_void_swimmer_desc: "Les instincts de chasse de cette conscience de flotte ont mené les créatures préthorynes sous sa domination à entrer dans un état frénétique. Leur soif de combat les pousse toujours plus loin."
 leader_trait_ethereal: "Éthérée"
 leader_trait_ethereal_desc: "Quelques seigneurs de flottes extradimensionnelles ont appris à utiliser la nature éthérée de leurs vaisseaux pour améliorer leurs capacités d'évitement en combat."
 leader_trait_dimensional_stutter: "Bondissement dimensionnel"
 leader_trait_dimensional_stutter_desc: "Pour des raisons inconnues, les vaisseaux sous le commandement de ce seigneur de flotte extradimensionnelle semblent rapidement bondir dans et hors de l'existence lorsqu'ils se déplacent, ce qui a pour effet d'augmenter leur vitesse sous-luminique."
