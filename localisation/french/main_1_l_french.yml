 trait_ruler_home_in_the_sky: "Foyer dans les cieux"
 trait_ruler_home_in_the_sky_desc: "Ce dirigeant est extrêmement ambitieux."
 trait_ruler_industrialist: "Course minière"
 trait_ruler_industrialist_desc: "Cette personnalité a fait une priorité absolue de l'accroissement de la production de minéraux."
 trait_ruler_eye_for_talent: "Découvreur de talent"
 trait_ruler_eye_for_talent_desc: "Ce dirigeant est considéré comme anormalement perspicace et peut repérer du talent là où les autres ne voient que de l'excentricité ou de l'incompétence."
 trait_ruler_deep_connections: "Connexions profondes"
 trait_ruler_deep_connections_desc: "Ce dirigeant est fermement enraciné dans le dédale du réseau qui compose la machine politique."
