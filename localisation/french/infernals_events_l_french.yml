 situation_red_giant_expansion_stage_4: "La chaleur dégagée par notre géante rouge a envahi une grande partie de notre système, rendant la vie extrêmement difficile."
 situation_red_giant_expansion_stage_5: "Notre étoile est sur le point d'exploser, ce qui endommagerait terriblement notre système natal."
