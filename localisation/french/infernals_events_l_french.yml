l_french:
 ####################################
 # Anomaly Events
 ####################################
 # useful refs:
 # [From.GetName] planet
 # [From.GetStarName]
 # [Leader.GetName] scientist
 spires_of_light_category: "Tours de lumière"
 spires_of_light_category_desc: "Les premiers balayages révèlent d'immenses structures lumineuses, dressées au coeur d'un paysage autrement banal. Leur origine et leur fonction nous échappent, mais leur lueur spectrale laisse penser qu'il ne s'agit pas d'un simple phénomène naturel."
 infernals.500.name: "$spires_of_light_category$"
 infernals.500.desc: "Les sondes dépêchées pour examiner les piliers lumineux ont révélé qu'ils sont faits de magma silicaté malléable. Ce matériau est expulsé par des cheminées souterraines et se solidifie avant d'atteindre la surface. Les formations qui en résultent peuvent atteindre plusieurs centaines de mètres de haut avant qu'elles ne s'effondrent sous leur propre poids.\n\nCela donne une forêt de tours de verre volcanique presque pur et translucide, réfractant la chaude lueur orangée du magma qui bouillonne encore sous terre.\n\nSelon [Leader.GetName], notre scientifique, les décombres des tours effondrées recèlent des ressources précieuses."
 #EXCELLENT:0 (first option has default answer)
 infernals.500.a: "Ne touchons pas à ce lieu sacré"
 infernals.500.b: "Demandons un permis d'extraction"
 infernals.500.c: "Utilisons-les pour les exercices de visée"
 lava_whirlpool_category: "Tourbillon de lave"
 lava_whirlpool_category_desc: "La première reconnaissance de [Planet.GetName] a révélé une étrange formation semblable à une tempête dans son principal océan de lave. Ce phénomène très inhabituel mérite d'être étudié."
 infernals.56.name: "Tourbillon de lave"
 infernals.56.desc: "[Leader.GetName] a confirmé que l'étrange formation était un tourbillon de lave. Ce phénomène est extrêmement rare, et jamais un tourbillon de cette taille n'avait été observé auparavant. Stupéfait[Leader.GetXELead], [Leader.GetName] a ordonné une enquête.\n\nL'analyse des échantillons a révélé que le tourbillon est en partie maintenu par du métal vivant qui, déchiré par les courants, tente de se reconstituer. Cela perturbe davantage le flux de lave et perpétue le mouvement du tourbillon. Les échantillons montrent également que le métal vivant pourrait être extrait à moindre coût."
 infernals.56.a: "Lançons les opérations d'extraction"
 outgassing_category: "Émissions gazeuses"
 outgassing_category_desc: "Un balayage de routine de [Planet.GetName] a révélé des fluctuations chimiques particulièrement importantes dans son atmosphère. Une étude plus approfondie permettrait de comprendre ce qu'il se passe."
 infernals.1001.name: "Émissions gazeuses"
 infernals.1001.desc: "Les fluctuations chimiques observées dans l'atmosphère ont été détectées à différents moments et à différents endroits. Les plus importantes ont été enregistrées au-dessus d'un vaste océan de magma exposé, où une sonde a été envoyée pour prélever des échantillons.\n\nAprès une analyse plus approfondie, [Leader.GetName] a conclu que l'océan de magma de [Planet.GetName] rejette de précieux gaz exotiques. Cette découverte inattendue laisse entrevoir le potentiel du monde en tant qu'atout industriel."
 infernals.1001.a: "Lançons les procédures d'extraction"
 crystal_lava_lakes_category: "Lacs de lave cristalline"
 crystal_lava_lakes_category_desc: "Il semble y avoir de vastes bassins de lave en fusion à la surface de ce monde. Nous devrions les étudier, car ils pourraient receler de précieuses ressources."
 infernals.1002.name: "Lacs de lave cristalline"
 infernals.1002.desc: "Les premières images de la surface de [Planet.GetName] montrent des formations géologiques surprenantes, que nous avons baptisées « lacs de lave cristalline ». Ces masses magmatiques renferment des minéraux uniques qui forment naturellement des structures cristallines à certaines températures. Il en résulte un lac d'une transparence extraordinaire et brillant d'une irisation rougeâtre. Cet effet visuel apparaît et disparaît au fil des saisons, en fonction des variations de température liées à la rotation de la planète.\n\nLa beauté visuelle de ces lacs de lave cristalline pourrait constituer un puissant attrait pour les touristes, et les minéraux cristallins eux-mêmes pourraient être extraits de la surface pendant la saison active et utilisés comme réservoirs d'énergie."
 infernals.1002.a: "Faisons-en un lieu de villégiature"
 infernals.1002.b: "Récoltons plutôt l'énergie des lacs"
 crystal_lava_resort: "Complexe cristallo-lavique"
 crystal_lava_resort_desc: "Les lacs d'une beauté à couper le souffle de ce monde ont été transformés en une destination touristique de luxe afin d'attirer des visiteurs de toute la galaxie."
 bioadaptive_flora_category: "Flore bioadaptative"
 bioadaptive_flora_category_desc: "[Planet.GetName] est un désert volcanique d'apparence ordinaire, mais sa teneur en oxygène est anormalement élevée. Cela est sans aucun doute dû à un phénomène inhabituel."
 infernals.1003.name: "Flore bioadaptative"
 infernals.1003.desc: "[Planet.GetName] semblait être un simple monde de magma et de feu, mais des études plus approfondies ont révélé un écosystème indigène composé d'une flore complexe habitant un réseau de failles à travers la planète. Ces plantes produisent de l'oxygène et collectent de minuscules quantités d'eau, créant ainsi des microclimats presque tempérés au milieu du désert brûlant.\n\nLes biomes créés par cette flore sont habitables pour des espèces qui, autrement, ne s'installeraient pas sur des mondes volcaniques, et la flore elle-même favorise l'agriculture. Pour le bien de nos colons, nous devrions explorer ce qui vit exactement dans ces canyons."
 infernals.1003.a: "Désignons cette zone comme habitable"
 infernals.1003.tooltip_a: "Ajoute un modificateur planétaire qui augmente l'habitabilité et le développement."
 bioadaptive_flora_modifier: "Flore bioadaptative"
 bioadaptive_flora_modifier_desc: "Les failles de la planète sont habitées par une flore résistante qui crée des microclimats relativement frais et respirable, rendant cet environnement volcanique habitable dans une certaine mesure."
 tectonic_icebreaker_category: "Brise-glace tectonique"
 tectonic_icebreaker_category_desc: "Des anomalies de température ont été détectées dans le régolithe de [Planet.GetName], laissant penser que quelque chose refroidit certaines parties de la surface. Des forages permettront d'en savoir plus."
 infernals.1004.name: "Brise-glace tectonique"
 infernals.1004.desc: "[Leader.GetName] a rapporté que d'énormes glaciers se cachent sous la surface volcanique de §Y[from.GetName]§!. Ceux-ci sont entourés de formations rocheuses inhabituelles composées de minéraux aux propriétés isolantes exceptionnelles. L'activité tectonique érode lentement ces couches isolantes et [Leader.GetName] estime que lorsque la température des glaciers et celle du reste de la planète seront identiques, celle-ci sera suffisamment refroidie pour être considérée comme un monde aride plutôt que volcanique.\n\nNous pouvons accélérer ce processus afin d'améliorer l'habitabilité de la planète. Toutefois, ce phénomène est intéressant d'un point de vue scientifique, et il pourrait être judicieux d'observer son évolution naturelle."
 infernals.1004.a: "Stabilisons l'activité tectonique"
 infernals.1004.b: "Accélérons la fonte"
 infernal_oasis_category: "Oasis infernale"
 infernal_oasis_category_desc: "Les premières images du monde en fusion nommé §Y[from.GetName]§! montrent une zone verdoyante étonnamment lumineuse, aussi grande qu'un continent. Ce spectacle unique laisse supposer qu'il s'y passe quelque chose de tout à fait inhabituel."
 infernals.505.name: "Havre de paix au milieu du chaos"
 infernals.505.desc: "L'activité tectonique unique de §Y[from.GetName]§! a donné naissance à une merveille sans précédent. Alors que la majeure partie du monde n'est qu'un désert brûlant recouvert de gaz volcaniques et de lave en fusion, une énorme plaque continentale de roche solide s'élève à des dizaines de kilomètres au-dessus de la surface. Ces hauts plateaux sont situés bien au-dessus des nuages toxiques et abritent un écosystème verdoyant composé de plantes et d'animaux indigènes.\n\nCet endroit pourrait accueillir de nombreuses espèces et fournir des informations scientifiques intéressantes s'il faisait l'objet de recherches."
 infernals.505.a: "Une découverte des plus étonnantes !"
 NAME_Vermilion: "Vermillon"
 NAME_Kira: "Kira"
 mysterious_ringing_category: "Sonnerie mystérieuse"
 mysterious_ringing_category_desc: "Nos scientifiques ont mesuré des ondes radio provenant d'un point précis de [Planet.GetName] à intervalles réguliers. Elles semblent coïncider avec le moment où la nuit laisse place au jour."
 infernals.3210.name: "Sonnerie mystérieuse"
 infernals.3210.desc: "Une équipe scientifique s'est rendue sur [from.GetName] pour trouver la source du signal et a confirmé qu'il provenait d'un réseau de grottes souterraines équipées d'instruments d'observation scientifique.\n\n[Leader.GetName] a conduit son équipe dans les grottes, où ils ont découvert une salle scellée par un alliage inconnu d'où provient une faible sonnerie. [GetMysteriousRingingDesc3210]\n\nUne fois équipée de protections auditives, l'équipe a pénétré dans la salle et découvert une créature inconnue en hibernation à côté de la source du signal : un étrange dispositif cylindrique.\n\nD'après l'analyse, l'appareil émet des ondes radio à intervalles réguliers, suivies de plusieurs heures de sons mélodiques entremêlés de vocalisations qui semblent correspondre aux capacités vocales de la créature. [Leader.GetName] suppose que l'appareil la réveille à heures fixes."
 infernals.3210.individual: "L'équipe scientifique a identifié un point faible dans le sceau et l'a brisé, après quoi la sonnerie est devenue assourdissante, plongeant les membres dans la panique et des accès de rage incontrôlables."
 infernals.3210.gestalt: "L'équipe scientifique a identifié un point faible dans le sceau et l'a brisé, après quoi la sonnerie est devenue assourdissante, provoquant une surcharge sensorielle et une défaillance cognitive chez les drones."
 infernals.3210.a: "Copions leurs recherches et partons"
 infernals.3210.b: "Essayons de réveiller la créature pour la recruter"
 infernals.3210.btt: "Nous recevrons un £scientist£§Yscientifique§! de niveau §G4§!."
 infernals.3210.c: "Volons l'appareil"
 infernals.3210.ctt: "Nos travailleurs bénéficieront de rappels réguliers et reprendront plus rapidement le travail. Permet une décision qui augmente la production des £job£['concept_jobs',emplois] de §G+10%§! contre §R-5%§! de £happiness£['concept_happiness',bonheur]."
 decision_planetary_workshift: "Appliquer des horaires de travail planétaires"
 decision_planetary_workshift_desc: "$planetary_workshift_deployed_desc$"
 planetary_workshift_deployed: "Horaires de travail planétaires appliqués"
 planetary_workshift_deployed_desc: "En synchronisant l'ensemble de la planète sur un fuseau horaire unique, la communication et l'efficacité entre les équipes s'améliorent. Le coût en bonheur n'a que peu d'importance."
 ####################################
 # Origin Events
 ####################################
 # Red Giant Origin
 infernals.45.name: "Tendance inquiétante"
 infernals.45.desc: "Nous avons toujours pensé que §Y[capital_star.GetName]§! était une géante rouge ordinaire, mais d'après nos dernières analyses, sa taille et son rayonnement sont en augmentation. Ces changements ont déjà un impact notable sur notre climat et inquiètent de plus en plus la population.\n\nCette tendance ne semble pas près de s'arrêter. Nous devons enquêter sur la cause du phénomène afin d'assurer la survie de notre espèce."
 infernals.45.desc.gestalt: "Nous avons toujours pensé que §Y[capital_star.GetName]§! était une géante rouge ordinaire, mais d'après nos dernières analyses, sa taille et son rayonnement sont en augmentation. Ces changements ont déjà un impact notable sur notre climat.\n\nCette tendance ne semble pas près de s'arrêter. Nous devons enquêter sur la cause du phénomène afin d'assurer la survie de notre espèce."
 infernals.45.a: "Gardons notre calme et minimisons le problème"
 infernals.45.b: "Nous devons lancer une enquête au plus vite"
 infernals.45.c: "Nous avons d'autres priorités"
 infernals.45.d: "Laissons le service des relations publiques gérer la situation"
 infernals.45.public.tt: "\n§HSituation :§! $situation_red_giant_expansion$ \n- Définit l'approche de la situation sur §Y$approach_reassure_public$§! \n- Gain de ressources mensuel : §G10§!£unity£"
 infernals.45.cause.tt: "\n§HSituation :§! $situation_red_giant_expansion$ \n- Définit l'approche de la situation sur §Y$approach_find_the_cause$§!"
 infernals.50.name: "Nova stellaire"
 infernals.50.desc: "[GetRedGiantEndingExplode]"
 infernals.50.totalIgnorance: "La cause du bouleversement de la géante rouge n'a plus d'importance. Nous n'avons d'autre choix que d'accepter notre destin et de tout reconstruire."
 infernals.50.semiIgnorance: "La perturbation causée par l'explosion stellaire a détruit toutes les preuves qui auraient pu nous permettre de déterminer la cause.\n\nNous n'avons d'autre choix que d'accepter notre destin et de tout reconstruire."
 infernals.50.defaultEnding: "Le processus initié par des individus aliens dans une station minière délabrée a finalement abouti : §Y[Target.GetStarName]§! a explosé en nova après avoir englouti la quasi-totalité du système. Le plasma multicolore et les radiations ont balayé §Y[event_target:red_giant_homeworld_tmp.GetName]§!, ainsi que le reste de notre système natal.\n\n[GetMegacorpDesc50]\n\n[GetLususMiningDesc]"
 infernals.50.megacorp: "Notre monde natal est désormais un immense gisement de minéraux s'étendant sur tout le système et facilement accessible. Le coût d'extraction de ces ressources est bien inférieur que lorsqu'elles se trouvaient à l'intérieur de leurs lunes et planètes respectives. Grâce à cet approvisionnement peu coûteux, nous pouvons nous attendre à une augmentation considérable de nos bénéfices."
 infernals.50.nonmegacorp: "Notre monde natal n'est plus qu'un désert, mais la nova a fait apparaître une abondance de minéraux dans tout le système, facilement accessibles à l'aide d'équipements miniers conventionnels. Nous pouvons exploiter ces richesses pour nous construire un nouvel avenir."
 infernals.50.lususExists: "La station émet une dernière impulsion d'énergie avant de s'éteindre définitivement. Nous voilà désormais seuls avec les décombres de notre monde natal."
 infernals.50.lususGone: "La station n'existant plus, §Y[event_target:red_giant_homeworld_tmp.GetName]§! n'a plus à s'inquiéter : cela ne se reproduira plus jamais."
 infernals.50.a: "Nous devons tout faire pour reconstruire notre foyer"
 infernals.51.name: "Effets de la nova estompés"
 infernals.51.desc: "Après d'importants travaux de nettoyage, la surface de §Y[this.GetName]§! est à nouveau habitable pour les thermophiles. Certaines cicatrices resteront certes visibles à jamais, mais nous pouvons les exploiter pleinement pour mener des recherches uniques."
 infernals.60.name: "Retour à la normale"
 infernals.60.desc: "En ajustant l'aspirateur, en extrayant l'hydrogène de la coquille et en calibrant les proportions de l'étoile, nous sommes parvenus à inverser l'expansion de §Y[Target.GetStarName]§! et à la ramener à son état stable de géante rouge.\n\nLe climat s'est déjà stabilisé et nous pouvons désormais espérer un avenir plus prospère pour notre monde natal, coeur de notre empire.\n\n[GetRedGiantEndingKalmStationStatus]"
 infernals.60.lususDestroyed: "Sans la station, nous ne saurons probablement jamais ce qui s'est passé exactement, mais nous pouvons au moins tirer parti des matériaux libérés par l'étoile."
 infernals.60.lususAlive: "Maintenant que nous savons comment contrôler la station, nous pouvons décider de son utilisation future."
 infernals.60.a: "Démantelons la station"
 infernals.60.b: "Poursuivons l'étude de la station"
 infernals.60.c: "Qu'elle serve de monument commémoratif de notre victoire"
 infernals.60.d: "C'est un véritablement soulagement pour tous"
 infernals.65.name: "Dilatation stellaire"
 infernals.65.desc: "Les dernières observations confirment que §Y[Target.system_star.GetName]§! grandit de plus en plus vite. Des effets physiques résultant de l'augmentation du rayonnement ont également été signalés. Si nous ne trouvons pas de moyen de l'arrêter, §Y[Target.system_star.GetName]§! nous anéantira bien avant d'engloutir la planète.\n\n[GetMegacorpDesc65]"
 infernals.65.nonmegacorp: "Nous protéger des radiations stellaires peut nous faire gagner du temps. Toutefois, nous pourrions aussi exploiter l'augmentation du rayonnement pour stimuler nos secteurs énergétique et industriel... Une entreprise plus risquée, mais potentiellement lucrative."
 infernals.65.megacorp: "Investir dans la protection de la planète nous protégerait contre les possibles fluctuations du marché et sécuriserait notre base d'actifs. Toutefois, nous pourrions aussi améliorer nos indicateurs de performance énergétique et industrielle en utilisant l'augmentation du rayonnement pour accroître la production."
 infernals.65.a: "Protégeons notre monde natal"
 infernals.65.b: "Exploitons ce phénomène"
 infernals.70.name: "Étoile affamée"
 infernals.70.desc: "§Y[Target.GetName]§! a englouti un monde situé au coeur de notre système, faisant ainsi sa première victime majeure. Les matières premières n'ont certes pas disparu, mais elles se trouvent désormais hors d'atteinte, dans les profondeurs ardentes de l'étoile.\n\nLes pertes économiques immédiates sont supportables, mais elles laissent entrevoir un avenir effrayant."
 infernals.75.name: "Dommage collatéral"
 infernals.75.desc: "La croissance imparable de notre géante rouge a englouti un autre monde. Ses ressources abondantes resteront à jamais inaccessibles, à moins que l'étoile ne perde ses couches extérieures dans une violente explosion stellaire."
 infernals.95.name: "Tunnels stellaires"
 infernals.95.desc: "Le mystère entourant §Y[capital_star.GetName]§! est plus étrange que nous ne l'aurions imaginé. Des recherches en cours ont révélé l'existence de tunnels subspatiaux jumeaux au plus profond de notre étoile.\n\nL'un d'entre eux accélère la fusion et augmente la production d'hélium en acheminant des matériaux riches en hydrogène vers l'enveloppe extérieure. Cela devrait en principe favoriser la contraction du noyau, mais le second tunnel aspire l'énergie produite et contrecarre le processus. En conséquence, l'étoile se dilate.\n\nLes premières données télémétriques provenant de ces tunnels indiquent qu'ils sont reliés à plusieurs points terminaux dispersés dans toute la galaxie. Notre survie dépend de notre capacité à les localiser le plus rapidement possible."
 infernals.95.a: "Nous devons examiner trois de ces endroits"
 infernals.95.a.tt: "Des points viables permettant de trianguler l'origine du subespace ont été localisés."
 infernals.105.name: "Marques subspatiales"
 infernals.105.desc: "Des mesures astrométriques autour de §Y[FromFromFrom.GetName]§! ont révélé des marques subspatiales inexplicables. Il n'y a actuellement aucun point de sortie à cet endroit, mais un tunnel pourrait s'être ouvert dans l'orbite de la géante gazeuse dans le passé. Les données collectées ont permis des découvertes en physique qui pourraient être utilisées dans d'autres domaines.\n\nEn attendant, nous devons chercher ailleurs afin de localiser l'origine des tunnels subspatiaux qui affectent notre étoile."
 infernals.105.a: "Poursuivons les recherches"
 infernals.110.name: "Ferraille alien"
 infernals.110.desc: "Les balayages autour de §Y[FromFromFrom.GetName]§! ont révélé des marques subspatiales. Des poches de vieux débris métalliques ont également été identifiées à proximité. Ceux-ci sont fixés en orbite et pourraient être liés aux marques.\n\nLa surveillance continue de ces fluctuations subspatiales devrait nous aider à optimiser les panneaux solaires autour de notre étoile.\n\nCes données se sont avérées utiles, mais nous devons examiner au moins un autre site pour déterminer la source du problème."
 infernals.110.a: "Vendons la ferraille"
 infernals.115.name: "Triangulation terminée"
 infernals.115.desc: "Enfin une véritable avancée !\n\nD'autres marques autour de §Y[FromFromFrom.GetName]§! nous ont permis de trianguler l'origine des perturbations dont souffre notre étoile. Elle se trouve dans un système jusqu'alors inconnu présentant des signatures hostiles.\n\nNous espérons que cette enquête nous aidera à neutraliser ce qui affecte notre étoile.\n\nLorsque nous aurons pénétré dans le système de §YLusus§!, nous pourrons peut-être changer le destin du système de §Y[FromFromFromFrom.Target.solar_system.GetName]§! et de notre civilisation."
 infernals.115.a: "Procédons avec la plus grande prudence"
 infernals.115.b: "Activons les systèmes d'armement"
 infernals.115.c: "Effectuons un rituel de bénédiction avant"
 red_giant_lusus_triangulated_tt: "Un nouveau système est dévoilé."
 infernals.2115.name: "Équipe d'abordage"
 infernals.2115.desc: "Notre équipe a pris le contrôle de la station. Ses occupants ont opposé une légère résistance, mais ils étaient trop mal armés et manifestement pas formés au combat. En y regardant de plus près, il s'est avéré que beaucoup d'entre eux étaient encore très jeunes. Ceux qui n'ont pas été tués ont été arrêtés.\n\nNous avons commencé à étudier le fonctionnement des tunnels subspatiaux, qui semblent être une sorte d'aspirateur d'énergie. Une fois que nous aurons compris comme les utiliser, nous pourrons résoudre le problème auquel notre système natal est confronté."
 infernals.2115.a: "Démolissons-la"
 infernals.2115.b: "Interrogeons les survivants"
 infernals.2115.c: "Asservissons-les"
 infernals.2115.d: "Les survivants représentent un risque, éliminons-les"
 infernals.2115.e: "Parlons aux survivants"
 infernals.2115.f: "Purgeons la station"
 infernals.2115.g: "Mangeons-les"
 infernals.400pops: "Apparition de §G400§! £pop£ pops ([this.GetName])"
 infernals.300pops: "Apparition de §G300§! £pop£ pops ([this.GetName])"
 infernals.2121.name: "Équipage alien éliminé"
 infernals.2121.desc: "La station minière subspatiale a été détruite et tout son équipage tué.\n\nLors de la destruction de la station, un accumulateur d'énergie inconnu a explosé. L'énergie libérée a traversé le tunnel subspatial jusqu'à §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!, aggravant ainsi la situation dans notre système.\n\nToutefois, le transfert d'hydrogène vers notre étoile a cessé, ce qui signifie que, aussi grave que soit la situation actuelle, elle ne peut plus empirer. Même si nous ne saurons peut-être jamais qui a construit cette station, nous avons au moins la certitude que ce pouvoir ne tombera jamais entre les mains de nos rivaux.\n\nMalheureusement, à l'heure actuelle, nous n'avons aucun moyen de ramener §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! à son état d'origine. Nous allons devoir compter sur nos enregistrements pour déterminer ce que faisait la station."
 infernals.2121.a: "Nettoyons ce bazar"
 infernals.2122.name: "Station détruite"
 infernals.2122.desc: "Les débris de la station dérivent dans l'espace. Sa destruction nous offre une nouvelle chance de changer le destin de §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!, non pas en appuyant sur un simple bouton, mais au prix d'efforts considérables et coûteux."
 infernals.2125.name: "Négociations avec l'équipage alien"
 infernals.2125.desc: "Après de longues recherches, nous disposons enfin d'un traducteur rudimentaire qui nous permet de communiquer avec l'équipage de la station.\n\nEn service depuis des générations, elle se déplace de géante gazeuse en géante gazeuse et extrait l'énergie d'étoiles lointaines à l'aide d'un aspirateur subspatial afin d'alimenter ses systèmes de survie et son puissant propulseur de bond.\n\nL'équipage ne comprend pas totalement le système qu'il opère et ignorait que le processus d'aspiration affectait les étoiles et provoquait leur destruction.\n\nMalgré la confusion, les membres de l'équipage semblent disposés à quitter la station. Ils nous ont également promis de nous partager leurs connaissances en échange d'un lieu sûr où s'installer et élever leurs enfants."
 infernals.2125.a: "Donnons-leur un refuge"
 infernals.2125.b: "Donnons-leur un vaisseau afin qu'ils suivent leur propre voie"
 infernals.2125.c: "Vidons la station de son oxygène à distance"
 infernals.2125.d: "Laissons-les se faire leur propre opinion à notre égard"
 infernals.2130.name: "Opérations minières subspatiales"
 infernals.2130.desc: "La station aspire l'hydrogène d'une géante gazeuse et l'achemine jusqu'à notre étoile via le subespace. La fusion de l'hélium qui en découle libère une grande quantité d'énergie, qui est convertie en §Yentropie cristallisée§! afin d'alimenter la station.\n\nL'instabilité de §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! est due à des erreurs de calibrage et à l'usure de l'équipement, que l'équipage n'a pas remarquées ou n'a pas su corriger.\n\nNous pourrions probablement inverser le processus en utilisant leur technologie ancienne, mais cela ne sera pas chose aisée. Autrement, la transformation de notre étoile en nova pourrait mettre au jour d'innombrables gisements et faire de notre héritage une véritable mine à exploiter."
 infernals.2130.a: "Au travail"
 infernals.2131.desc: "La station aspire l'hydrogène d'une géante gazeuse et l'achemine jusqu'à notre étoile via le subespace. La fusion de l'hélium qui en découle libère une grande quantité d'énergie, qui est convertie en §Yentropie cristallisée§! afin d'alimenter la station.\n\nL'équipage ne dispose que d'un enregistrement audio endommagé pour les aider à faire fonctionner la station. Ils ont perdu le contact avec leur civilisation il y a des milliers d'années, sans doute à la suite de son effondrement ou de sa destruction. Depuis, les erreurs de calibrage se sont accumulées, l'équipement s'est dégradé, et le processus d'aspiration est devenu si instable qu'il menace aujourd'hui d'anéantir §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!.\n\nNous pourrions probablement inverser le processus en utilisant leur technologie ancienne, mais cela ne sera pas chose aisée. Autrement, la transformation de notre étoile en nova pourrait mettre au jour d'innombrables gisements et faire de notre héritage une véritable mine à exploiter."
 infernals.2135.name: "Fin de la menace"
 infernals.2135.desc: "Lorsque les occupants de la station ont été informés de notre situation critique, ils se sont montrés inquiets et consternés. Ils pensaient être seuls et ignoraient l'existence d'autres espèces dans la galaxie.\n\nDans un élan de remords et avant même que nous ayons vraiment compris ce qu'ils faisaient, ils se sont mis à démanteler la station, détruisant irrémédiablement la plupart de ses composants.\n\nCela rendra difficile le contrôle de l'expansion de l'étoile. Nous devons décider du sort de cet équipage imprévisible, et de si nous leur accordons notre pardon ou non."
 infernals.2135.a: "Emmenons-les et démontons la station pour récupérer ce que nous pouvons"
 infernals.2135.b: "Débarrassons-nous d'eux et de la station"
 infernals.2135.c: "Asservissons-les et détruisons la station"
 infernals.2140.name: "Perspectives de stabilité"
 infernals.2140.desc: "Cela nous a demandé beaucoup d'efforts, mais nous avons enfin pu reprendre le contrôle du destin de §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!. Si nous ne faisons rien, l'étoile suivra son cycle de vie naturel à sa taille actuelle.\n\nToutefois, la station, vieille et en piteux état, ne pourra pas supporter de multiples reconfigurations. Chaque ajustement la pousse au bord de la rupture, c'est pourquoi nous n'avons le choix qu'entre deux options.\n\nNous pouvons rendre à l'étoile sa taille d'origine ou la forcer à se dilater davantage, transformant ainsi le système en un immense gisement de ressources faciles à exploiter.\n\nNos [GetScientistPlural] vont tenter une ultime reconfiguration. Ensuite, il ne restera plus qu'une seule issue : un démantèlement rapide par des forces externes."
 infernals.2140.a: "Gardons l'étoile dans son état actuel"
 infernals.2140.b: "Accélérons la dilatation de l'étoile"
 infernals.2140.bdesc: "Fait irrévocablement croître §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!."
 infernals.2140.c: "Ramenons l'étoile à sa taille d'origine"
 infernals.2140.cdesc: "Fait irrévocablement rétrécir §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!."
 infernals.2145.name: "Stabilité assurée"
 infernals.2145.desc: "Maintenant que nous contrôlons complètement la taille et l'énergie de §Y[Target.GetStarName]§!, nous avons pu la stabiliser. Elle demeurera inchangée pendant des millions d'années, et notre peuple pourra enfin revivre en paix, dans un système natal stable et prévisible.\n\nLa dilatation de notre étoile a des conséquences évidentes sur nos infrastructures, mais ces bouleversements ouvrent aussi de nouvelles perspectives : nous pouvons exploiter sa production d'énergie accrue tout en assurant une présence durable dans le système."
 infernals.2145.a: "Nous avons enfin repris le contrôle de notre destin"
 infernals.2151.name: "Une station bien mystérieuse"
 infernals.2151.desc: "À leur entrée dans le système, nos vaisseaux ont fait face à une faible résistance de la part de drones automatisés. Ceux-ci ont été rapidement neutralisés, et nous pouvons désormais examiner la station alien de plus près.\n\nLa structure est en grande partie fonctionnelle, mais sa coque semble avoir été réparée à de nombreuses reprises. En tentant d'accéder à l'une des baies d'amarrage, nous sommes entrés en contact avec une espèce alien jusqu'alors inconnue. Malgré la barrière de la langue, nous avons pu confirmer que l'installation est à l'origine des tunnels qui modifient §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!.\n\nNous essayons actuellement de communiquer, car une solution diplomatique pourrait être envisageable. En cas d'échec, nous serons probablement contraints de recourir à des méthodes plus directes, telles que l'abordage de la station ou sa destruction. Sans connaître son objectif précis, de telles mesures pourraient toutefois représenter un risque considérables pour notre étoile."
 infernals.2151.a: "Traduisons leur langue"
 infernals.2151.b: "Pénétrons de force dans la station"
 infernals.2151.c: "Détruisons la station"
 infernals.2160.name: "Crise imminente"
 infernals.2160.desc: "Les recherches menées par la station minière subspatiale indiquent qu'elle stocke d'énormes quantités d'énergie thermique d'une manière qui nous est encore inconnue. Nos [GetScientistPlural] appellent cela l'§Yentropie cristallisée§!. Il s'agit d'une sorte de boucle de rétroaction thermique qui amplifie l'apport d'énergie.\n\nSi nous parvenions à reproduire cette technologie, nous pourrions exploiter des forces jusqu'alors inimaginables, que beaucoup considèrent comme contre nature et dangereuses. Cela pourrait certes générer de grandes quantités de chaleur excédentaire, mais si nous trouvons un moyen de prospérer dans de telles conditions, notre potentiel sera illimité."
 infernals.2160.a: "Poursuivons l'enquête"
 infernals.2160.a.tt: "[GetRedgiantAlreadyHyperthermiaPickable]Révèle la ressource §Y$entropy_crystals$§! afin de développer l'hyperthermie galactique."
 infernals.2160.a.ttunlock: "Permet d'adopter l'atout de l'ascension $ap_galactic_hyperthermia$.\n"
 infernals.2160.b: "Cette technologie est bien trop dangereuse"
 infernals.2160.c: "C'est une application beaucoup trop primitive de l'§Yentropie cristallisée§!"
