 INF_ORIGIN_RED_GIANT_TRIANGULATION_DESC: "Un endroit approprié pour trianguler l'origine de la perturbation."
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD: "Protéger notre monde natal"
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD_DESC: "Tout en travaillant sans relâche pour inverser les changements que connaît notre étoile, nous devons également préparer nos propres formes à résister à la chaleur. L'adaptation de notre population à des températures plus élevées nous aidera à prospérer au milieu des flammes de notre nouvel avenir."
 INF_ORIGIN_RED_GIANT_EXPLOIT: "Exploitation thermique"
 INF_ORIGIN_RED_GIANT_EXPLOIT_DESC: "L'augmentation du rayonnement stellaire pose certes un problème à long terme, mais à court terme, nous pouvons l'exploiter pour accroître nos capacités industrielles et énergétiques."
 INF_ORIGIN_RED_GIANT_BOARD_STATION: "Abordage de la station"
 INF_ORIGIN_RED_GIANT_BOARD_STATION_DESC: "Ces aliens sans scrupules exploitent notre étoile. Nous devons aborder leur station et en prendre le contrôle."
 INF_ORIGIN_RED_GIANT_PARLAY: "Xénolinguistique d'urgence"
 INF_ORIGIN_RED_GIANT_PARLAY_DESC: "L'équipage de la station contrôle l'aspirateur subspatial qui détruit notre étoile. Nous devons établir une communication pour qu'ils nous aident à trouver une solution."
 INF_THERMOPHILE_ADAPTATION: "Évolution thermophile"
 INF_THERMOPHILE_ADAPTATION_DESC: "Alors que nous embrasons la galaxie, nous devons également préparer nos propres formes à résister à la chaleur. L'adaptation de notre population à des températures plus élevées nous aidera à prospérer au milieu des flammes de notre nouvel avenir.\n\n§HÀ l'achèvement :§!$TABBED_NEW_LINE$- Ajoute le modificateur §Y$crisis_thermophile_adaptation$§!$TABBED_NEW_LINE$- Augmente l'§Yhabitabilité des mondes volcaniques§! de §G+50%§!"
