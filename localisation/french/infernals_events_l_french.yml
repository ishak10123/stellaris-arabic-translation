 # RG Timeline events
 TIMELINE_EVENT_ORIGIN_RG_START: "$origin_red_giant$\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_START_TOOLTIP: "§HTunnels stellaires§!\n§YÉvénement d'origine§!\n\nNous avons détecté une série de perturbations subspatiales et recherchons la cause de la dangereuse instabilité de notre étoile."
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA: "Mort d'une géante\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA_TOOLTIP: "§HTémoins d'une supernova§!\n§YÉvénement d'origine§!\n\nNotre étoile s'est dilatée jusqu'à engloutir tout le système, réduisant les planètes à l'état de ruines en fusion et dispersant les ressources dans le vide. Nous n'avons d'autre choix que de nous construire un nouvel avenir parmi les étoiles."
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE: "Géante apaisée\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE_TOOLTIP: "§HMonde natal sauvé§!\n§YÉvénement d'origine§!\n\nL'étoile en expansion a pu être stabilisée et la catastrophe évitée. Nous devons encore nous adapter à l'augmentation de son rayonnement, mais si nous relevons ces défis, nous en sortirons plus forts que jamais."
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL: "Géante paisible\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL_TOOLTIP: "§HMonde natal sauvé§!\n§YÉvénement d'origine§!\n\nNous avons inversé les changements dévastateurs qui affectaient notre étoile, lui faisant retrouver son état normal. Nous avons prouvé que nous pouvons surmonter les menaces les plus apocalyptiques, et nous sommes désormais prêts à affronter tout ce que l'univers nous réserve."
 # COSMIC DAWN
 # All strings below are in order of their appearance ingame
 infernals.2500.name: "Signaux venus des profondeurs" # intro
 infernals.2500.desc: "Une analyse ciblée nous a révélé l'existence d'une installation sophistiquée, cachée sous la surface de §Y[root.capital_scope.GetName]§!, dont la taille et la complexité augmentent à mesure que l'on s'approche du noyau. Les signatures matérielles et énergétiques correspondent à celles des capsules de stase dans lesquelles nous nous sommes réveillés.\n\nIl doit s'agir des vestiges de notre ancienne civilisation. Si nous parvenons à y accéder, nous trouverons peut-être des réponses aux questions les plus importantes concernant notre passé : qui sommes-nous et que nous est-il arrivé ?"
 infernals.2500.a: "Que le voyage commence"
 INF_ORIGIN_COSMIC_DAWN_DRILLING: "Forage de la croûte" # from 2500
 INF_ORIGIN_COSMIC_DAWN_DRILLING_DESC: "Si nous voulons comprendre qui nous sommes, nous devons d'abord savoir d'où nous venons. Nous devons examiner l'installation découverte sous la surface de §Y[owner.Capital.GetName]§!."
 infernals.2505.name: "Éveil de nos semblables"
 infernals.2505.desc.a: "Nous avons trouvé d'autres capsules de stase contenant des §Y[root.GetSpeciesNamePlural]§! vivants. Nous sommes actuellement en train de les réveiller, mais ils ne semblent pas en savoir plus que nous sur notre passé."
 infernals.2505.desc.b: "Nous avons trouvé d'autres capsules de stase contenant des §Y[root.GetSpeciesNamePlural]§! vivants. Nous les avons questionnés, mais il est clair qu'ils n'ont aucun souvenir utile."
 infernals.2505.a: "Lançons une fouille complète"
 infernals.2505.b: "Creusons seulement où nécessaire"
 infernals.2505.c: "Recrutons des sous-traitants pour creuser"
 situation_cosmic_dawn: "Fouilles approfondies"
 situation_cosmic_dawn_type: "$situation_cosmic_dawn$"
 situation_cosmic_dawn_monthly_change_tooltip: "L'état d'avancement actuel de nos fouilles approfondies."
 situation_cosmic_dawn_desc: "Nos fouilles ont mis au jour un complexe souterrain regorgeant de technologies avancées, de données archivées et de capsules de stase contenant d'autres membres de notre espèce endormis. Toute notre histoire est enfouie ici. Si nous parvenons à tout déterrer, nous saurons peut-être enfin qui nous sommes."
 situation_cosmic_dawn_finish_tt: "Nous devons redécouvrir notre passé afin de mieux nous connaître."
 situation_cd_mod_mining: "$approach_cd_mining$"
 situation_cd_mod_drilling: "$approach_cd_drilling$"
 situation_cd_mod_financial: "$approach_cd_financial$"
 situation_cd_mod_storm: "$TRIGGER_FAIL$ Projet spécial §Y$INF_ORIGIN_COSMIC_DAWN_STORM$§! non terminé"
 situation_cd_mod_bribe: "$TRIGGER_FAIL$ Projet spécial §Y$INF_ORIGIN_COSMIC_DAWN_BRIBE$§! non terminé"
 sit_cd_stage1_tt: "Nous avons commencé à forer la croûte planétaire."
 sit_cd_stage2_tt: "Nous ne voyons plus la surface."
 sit_cd_stage3_tt: "À mi-chemin à travers la croûte, la température commence à augmenter."
 sit_cd_stage4_tt: "Nous avons creusé si profondément dans la croûte que nous entendons le noyau."
 sit_cd_stage5_tt: "Si nous continuons à creuser, le noyau nous engloutira."
 approach_cd_mining: "Mines intégrales"
 approach_cd_mining_tt: "Que tout le monde creuse ! Et tant qu'à faire, extrayons autant de minéraux que possible.\nAvancée mensuelle : §Y+$@approach_cd_mining$§!\n\n"
 approach_cd_drilling: "Forage ciblé"
 approach_cd_drilling_tt: "Utilisons nos meilleures foreuses afin de ne creuser que là où c'est nécessaire.\nAvancée mensuelle : §Y+$@approach_cd_drilling$§!\n\n"
 approach_cd_financial: "Incitations financières"
 approach_cd_financial_tt: "Confions les fouilles à des sous-traitants et conservons une partie de leurs bénéfices.\nAvancée mensuelle : §Y+$@approach_cd_financial$§!\n\n"
 # Stage 2
 infernals.2510.name: "Amnésie et données"
 infernals.2510.intro: "Plus nous découvrons de capsules de stase, plus il devient évident que les membres de notre espèce ont tous perdu leurs souvenirs."
 infernals.2510.desc.a: "$infernals.2510.intro$\n\nCertains, tout juste réveillés, nous ont posé la question qui nous taraude : qui êtes-vous ?\n\nMalgré notre histoire séculaire et l'évolution de notre société, nous ne pouvons prétendre être plus proches de la réponse qu'eux.\n\n$infernals.2510.outro$"
 infernals.2510.desc.b: "$infernals.2510.intro$\n\nAprès leur réveil, nous avons rapidement compris qu'eux aussi avaient perdu tout souvenir de nos origines. En l'absence de réponses, nous sommes contraints de tracer notre propre voie à travers l'histoire.\n\n$infernals.2510.outro$"
 infernals.2510.outro: "Contrairement aux dormeurs, les bases de données contiennent de nouvelles informations étonnantes. Nous les avons analysées à maintes reprises afin d'être sûrs, mais les résultats sont sans équivoque : tout indique que plus de douze milliards d'années se sont écoulées depuis notre entrée en stase.\n\nNos origines remontent donc à la naissance de l'univers, au moment où les premières étoiles et planètes se sont formées. Nous pourrions faire partie des tout premiers êtres vivants à avoir jamais évolué."
 infernals.2510.a: "Rattrapons ce que nous avons manqué"
 infernals.2510.b: "Cet univers nous revient de droit"
 # Stage 3
 infernals.2515.name: "Défaillance des systèmes de survie"
 infernals.2515.desc: "Nous avons mis au jour une tragédie : les journaux du site de stase indiquent que §Y[event_target:homeworld.GetName]§! a dérivé dans l'espace pendant des milliards d'années avant d'être happée par son étoile actuelle. Ce moment a provoqué une violente marée gravitationnelle.\n\nMême si cela a permis la création du paradis volcanique qui est notre foyer, l'onde de choc a gravement endommagé les cellules énergétiques de l'installation. Les systèmes automatisés ont donné la priorité aux individus de haut rang en désactivant les capsules de statut inférieur et en interrompant la maintenance structurelle.\n\nNos [GetScientistPlural] estiment qu'un seul individu pourra être sauvé, car l'énergie libérée entraînera l'effondrement complet du tunnel.\n\nSi les haut placés n'avaient pas défini de priorité, nous aurions peut-être pu sauver beaucoup plus de monde."
 infernals.2515.a: "Les avancées scientifiques sont de la plus haute importance"
 infernals.2515.a.tt: "Nous recevrons un £scientist£§Yscientifique§!"
 infernals.2515.b: "Donner la priorité aux experts était une bonne décision"
 infernals.2515.b.tt: "Nous recevrons un £official£§Yofficiel§!"
 infernals.2515.c: "Déconnectons les cellules sans les activer"
 infernals.2515.c.tt: "Les individus sont remplaçables. Notre empire a besoin d'espace pour s'étendre."
 infernals.2520.name: "Refugium interstellaire"
 infernals.2520.desc: "§Y[event_target:leader.GetName]§! est en train de reconstituer les archives de la station de stase. Ses dernières découvertes indiquent que d'autres [root.GetSpeciesNamePlural] mineurs pourraient être dispersés un peu partout dans la galaxie.\n\nLes archives contiennent les coordonnées des mondes en question, mais étant donné leur ancienneté et que des étoiles entières sont nées et d'autres mortes depuis, leur localisation nécessite une interpolation complexe. Afin de prouver l'exactitude des données, [event_target:leader.GetName] a sélectionné une planète à explorer, mais la traduction de l'ensemble des données est toujours en cours.\n\nEntre-temps, une pensée inquiétante nous est venue : [root.Capital.GetStarName] n'est peut-être pas notre véritable étoile mère, mais un simple refuge parmi tant d'autres. Si tel est le cas, d'où venons-nous ? Et cela a-t-il encore de l'importance ?"
 infernals.2520.a: "Nous devons trouver nos semblables"
 infernals.2520.b: "Ce monde est notre foyer désormais"
 cosmic_dawn_anomalies_event_chain_title: "Refugium interstellaire"
 cosmic_dawn_anomalies_event_chain_desc: "D'autres [root.GetSpeciesNamePlural] pourraient être dispersés un peu partout dans la galaxie.\n\nLes archives contiennent les coordonnées des mondes en question, mais étant donné leur ancienneté et que des étoiles entières sont nées et d'autres mortes depuis, leur localisation nécessite une interpolation complexe."
 # Anomaly 2
 cosmic_dawn_sleepers_category: "Dormeurs isolés"
 cosmic_dawn_sleepers_category_desc: "La planète se trouvant à ces coordonnées abriterait d'autres dormeurs et des technologies. Nous devons mener une enquête approfondie."
 infernals.2525.name: "$cosmic_dawn_sleepers_category$"
 infernals.2525.desc: "§Y[root.leader.GetName]§! a découvert une installation souterraine abritant d'autres membres de notre espèce en stase, et a réussi à les réveiller. Contrairement à nous, ils ont de vagues souvenirs de leur vie antérieure et s'accrochent aux histoires d'un grand empire galactique qui reviendrait un jour les sauver.\n\nBien que prudents, ils nous considèrent comme leurs semblables. Nous pourrions nous faire passer pour leurs sauveurs tant attendus ou être honnêtes et leur expliquer que nous voulons écrire une nouvelle page de notre histoire et que nous sommes aussi avides d'apprendre d'eux que de leur partager notre savoir.\n\nDe nouvelles informations trouvées dans ces archives nous ont permis de localiser un deuxième endroit comportant des capsules de stase."
 infernals.2525.a: "Nous sommes leurs sauveurs"
 infernals.2525.b: "Nous écrivons une nouvelle page"
 infernals.2525.c: "Assimilons-les"
 # Anomaly 3
 cosmic_dawn_sleepers2_category: "Dormeurs méfiants"
 cosmic_dawn_sleepers2_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2530.name: "$cosmic_dawn_sleepers2_category$"
 infernals.2530.desc: "§Y[root.leader.GetName]§! a découvert d'autres membres de notre espèce en stase et a réussi à les réveiller, mais ils ont pris peur et exigent que nous partions. Ils ne nous considèrent pas comme leurs semblables et ne veulent pas de nous ici.\n\nAprès des négociations tendues, ils ont exprimé le souhait d'explorer la galaxie. Nous pourrions leur proposer un modeste vaisseau à un prix raisonnable ou, compte tenu de notre besoin constant de main-d'oeuvre, nous pourrions les installer dans la colonie la plus proche. Peut-être reviendront-ils alors à la raison...\n\nLes archives de cette installation indiquent l'emplacement d'un autre monde abritant des capsules de stase."
 infernals.2530.a: "Donnons-leur un vaisseau"
 infernals.2530.b: "Emmenons-les avec nous"
 infernals.2530.b.tt: "£pop£$POPS$ obtenues : §G+200§!"
 infernals.2530.c: "Assimilons-les"
 # Ship returns
 infernals.2531.name: "Le retour"
 infernals.2531.desc: "Les dormeurs à qui nous avions confié un vaisseau sont revenus à bord d'un immense vaisseau de guerre. Au cours de leur voyage, ils sont tombés sur des pirates, qu'ils ont réussi à berner et finalement vaincus.\n\nLa conquête du vaisseau ennemi a éveillé en eux l'envie de se livrer à la piraterie. Dès lors, leurs attaques sont devenues de plus en plus audacieuses et leurs cibles de plus en plus dangereuses. Mais malgré leur succès, cela ne peut durer éternellement.\n\nIls sont maintenant rentrés, en quête de stabilité et peut-être de quelque chose de plus grand. Leur vaisseau, leur expérience et leur butin pourraient s'avérer très utiles."
 infernals.2531.a: "Le jeu en valait la chandelle"
 infernals.2531.a.tt: "Leur vaisseau pourrait rejoindre notre flotte. Nous gagnerions un croiseur."
 infernals.2531.b: "Modifions leur vaisseau afin qu'il colonise de nouveaux mondes"
 infernals.2531.b.tt: "Confère un §Hvaisseau colonial§!."
 infernals.2531.c: "Souhaitons-leur la bienvenue sur notre monde-capitale"
 infernals.2531.c.tt: "£pop£$POPS$ obtenues : §G+200§!"
 # Anomaly 4
 cosmic_dawn_sleepers3_category: "Port stellaire des dormeurs"
 cosmic_dawn_sleepers3_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2535.name: "$cosmic_dawn_sleepers3_category$"
 infernals.2535.desc: "§Y[root.leader.GetName]§! a découvert une petite station de stase, ainsi qu'un port stellaire caché abritant un vaisseau scientifique quasi opérationnel. De petites réparations suffiront à le remettre en état.\n\nLa station renferme également une multitude de données scientifiques, notamment des spécimens en bon état d'autres espèces[GetInterstellarRefugiaDesc2535] Nous ignorons si ces individus ont été enlevés de force ou s'ils sont venus de leur plein gré, mais le vaisseau comprend des cellules d'isolement dédiées au transport d'êtres intelligents.\n\nLeur étude pourrait être très enrichissante. Peut-être y a-t-il même d'autres formes de vie à découvrir."
 infernals.2535.contact: ", dont certaines pourraient bien être les ancêtres de civilisations conscientes." # prints this in [GetInterstellarRefugiaDesc2535] above
 infernals.2535.nocontact: "." # Can't be empty, so holds the full stop.
 infernals.2535.a: "Étudions les spécimens"
 infernals.2535.b: "Rendons les spécimens à leurs semblables"
 infernals.2535.c: "Détruisons toutes les preuves"
 # Random Stasis Pods discovered
 infernals.2536.1: "Après des mois de travail, tous les nouveaux [root.GetSpeciesNamePlural] endormis sur [planet.GetName] ont rejoint nos rangs."
 infernals.2536.1.a: "Mettons le cap sur le système !"
 infernals.2536.1.b: "Nous n'avons plus le temps pour cela" # ends the chance to spawn more pods.
 infernals.2536.2: "Une autre capsule de stase a été ouverte et ses occupants ont été ramenés à la maison."
 infernals.2536.3: "Nous avons libéré d'autres [root.GetSpeciesNamePlural] et les aidons à s'adapter à cet univers plus froid, où la chaleur des étoiles est nécessaire à leur survie."
 infernals.2536.4: "D'autres [root.GetSpeciesNamePlural] ont été réveillés sur [planet.GetName]."
 infernals.2536.5: "Nous avons localisé une autre capsule de stase."
 infernals.2536.6: "[root.leader.GetName] a découvert une autre capsule de stase et ramène ainsi de nouveaux [root.GetSpeciesNamePlural] provenant d'un lointain passé parmi nous."
 infernals.2536.7: "[root.leader.GetName] a trouvé une autre capsule de stase contenant des [root.GetSpeciesNamePlural] parfaitement conservés."
 infernals.2536.8: "[root.leader.GetName] a ouvert une capsule de stase ancienne sur [planet.GetName] et soigne ses occupants victimes de choc thermique."
 infernals.2536.9: "Une autre capsule de stase contenant des [root.GetSpeciesNamePlural] a été découverte sur [planet.GetName]."
 infernals.2536.10: "D'autres [root.GetSpeciesNamePlural] provenant d'un lointain passé ont été réveillés pour rejoindre nos rangs."
 # Stage 4
 infernals.2540.name: "Ancienne prison"
 infernals.2540.desc: "Les dernières fouilles ont révélé un fait étonnant : les dormeurs de cet endroit se sont réveillés il y a des siècles, mais n'ont jamais quitté les lieux.\n\nL'analyse architecturale indique que la structure a été verrouillée de l'extérieur, apparemment pour les enfermer. Lorsque nous avons forcé les portes blindées, les dormeurs nous ont accueillis avec hostilité avant de se retirer.\n\nLes archives pourraient nous fournir des explications, mais toute tentative d'accès risque de provoquer une nouvelle escalade. Nous pourrions prendre d'assaut le complexe pour résoudre le problème rapidement, ou essayer de les soudoyer pour qu'ils coopèrent."
 infernals.2540.a: "Prenons d'assaut l'installation"
 infernals.2540.b: "Offrons-leur des cadeaux et notre amitié"
 INF_ORIGIN_COSMIC_DAWN_STORM: "Prise d'assaut du site de stase"
 INF_ORIGIN_COSMIC_DAWN_STORM_DESC: "Nous devons accéder au site, mais les dormeurs réveillés nous en empêchent. Prenons-en le contrôle par la force."
 infernals.2545.name: "Assaut de la prison"
 infernals.2545.desc: "Nos troupes ont pris d'assaut le site et sont parvenus à maîtriser la plupart de ses occupants sans trop de difficulté.\n\nLes archives ont révélé que l'installation était en réalité une prison. Les prisonniers étaient des extrémistes ayant préconisé des mesures technologiques extrêmes pour réchauffer l'univers en refroidissement, dont certaines étaient totalement irréalistes ou auraient pu avoir des conséquences catastrophiques.\n\nDes chefs de la prison se sont barricadés dans une salle centrale avec des explosifs. Ils exigent que tous les prisonniers restent ici et que les portes soient à nouveau scellées.\n\nNous pourrions diffuser un gaz invisible dans le tunnel qui rendrait les explosifs inertes afin de préserver la structure, mais cela asphyxierait la plupart des occupants."
 infernals.2545.a: "Diffusons du gaz dans le tunnel"
 infernals.2545.a.tt: "£pop£$POPS$ obtenues : §G+100§!"
 infernals.2545.b: "Faisons évacuer les lieux"
 infernals.2545.b.tt: "£pop£$POPS$ obtenues : §G+400§!"
 INF_ORIGIN_COSMIC_DAWN_BRIBE: "Soudoiement des occupants du site de stase"
 INF_ORIGIN_COSMIC_DAWN_BRIBE_DESC: "Si nous parvenons à rendre les occupants du site dépendants de nous, nous disposerons d'un moyen de pression pour en obtenir l'accès. Fournissons-leur de grandes quantités de ressources utiles et vitales."
 infernals.2550.name: "Assaut de la prison"
 infernals.2550.desc: "Des mois de commerce ont rendu les anciens détenus dépendants de nous. Lorsque nous avons menacé d'y mettre un terme, ils ont paniqué et nous ont cédé le contrôle du site.\n\nLes archives confirment qu'il s'agissait d'une prison. Ses détenus réclamaient autrefois l'introduction de technologies radicales pour réchauffer l'univers en refroidissement. Certaines idées étaient absurdes, d'autres potentiellement mortelles.\n\nPar chance, ils ne se souviennent de rien. Tandis que nos scientifiques continuent d'étudier les lieux, les anciens prisonniers s'intègrent peu à peu et sont en bonne voie pour l'assimilation."
 infernals.2550.a: "Beau travail"
 infernals.2550.a.tt: "£pop£$POPS$ obtenues : §G+300§!"
 # Stage 5
 infernals.2555.name: "Tragique accident"
 infernals.2555.intro: "Un accident s'est produit sur le dernier site de fouilles, endommageant la station énergétique. Heureusement, les capsules de stase sont toujours opérationnelles."
 infernals.2555.outro: "Nous ignorons combien de temps les systèmes de survie resteront opérationnels. Si nous voulons sauver les dormeurs, nous devons agir avant que l'installation ne soit à court d'énergie."
 infernals.2555.desc.a: "$infernals.2555.intro$\n\nLes soupçons se portent sur certains des thermophiles récemment assimilés : des rumeurs circulent selon lesquelles ils ne seraient pas les plus assidus.\n\n$infernals.2555.outro$"
 infernals.2555.desc.b: "$infernals.2555.intro$\n\nLorsqu'ils ont appris ce qu'il s'était passé, les thermophiles précédemment sauvés se sont portés volontaires pour participer aux opérations de sauvetage.\n\n$infernals.2555.outro$"
 infernals.2555.a: "Éliminons les travailleurs indisciplinés"
 infernals.2555.b: "Payons pour recruter davantage de personnel"
 infernals.2555.c: "Allons vite à leur rescousse"
 infernals.2555.d: "Nous devrions nous montrer prudents"
 # Option events from above (Stage 4)
 infernals.2560.name: "Résolution de la situation"
 infernals.2560.desc: "L'accès a été limité aux travailleurs les plus fidèles afin de gêner le moins possible les opérations de sauvetage.\n\nMalheureusement, les contrôles de sécurité ont tellement réduit nos effectifs que nous n'avons pas pu sauver l'installation. Les dormeurs ont perdu la vie.\n\nNotre seule consolation est d'étudier cette technologie. Nous pourrions tirer de précieux enseignements de sa dégradation progressive et de son arrêt définitif."
 infernals.2560.a: "Quelle tristesse !"
 infernals.2565.name: "$infernals.2560.name$"
 infernals.2565.desc: "Des récompenses financières ont été proposées pour les opérations de sauvetage, et les volontaires ont afflué en masse.\n\nHélas, l'initiative a été sabotée par d'anciens détenus, opposés à notre recours à la richesse comme levier de pouvoir. Ce sabotage a coûté la vie à tous les occupants des capsules de stase.\n\nNotre seule consolation est que la technologie et les archives n'ont pas subi de dommages et restent examinables. Cet échec a également mis au jour des failles dans nos procédures de vérification, que nous pouvons à présent corriger."
 infernals.2565.a: "Quel acte ignoble !"
 infernals.2570.name: "$infernals.2560.name$"
 infernals.2570.intro: "L'afflux de travailleurs et d'équipes de secours dans l'installation souterraine a permis d'extraire sans encombre les [Species.GetNamePlural] endormis de leurs capsules de stase défectueuses. Ces nouveaux citoyens, conscients du sort auquel ils ont échappé, nous sont reconnaissants de les avoir sauvés."
 infernals.2570.outro: "Dans l'urgence de l'intervention, nombre de capsules de stase ont hélas dû être ouvertes de force ou irrémédiablement endommagées, compromettant leur utilité pour la recherche scientifique."
 infernals.2570.desc.a: "$infernals.2570.intro$\n\n$infernals.2570.outro$"
 infernals.2570.desc.b: "$infernals.2570.intro$\n\nPar ailleurs, d'anciens détenus volontaires aident les nouveaux arrivants en discutant avec eux et en leur fournissant des biens de première nécessité, facilitant ainsi leur intégration.\n\n$infernals.2570.outro$"
 infernals.2570.a: "Heureusement que nous avions ces volontaires supplémentaires"
 infernals.2570.a.tt: "£pop£$POPS$ obtenues : §G+400§!"
 infernals.2570.b: "Beau travail"
 infernals.2570.b.tt: "£pop£$POPS$ obtenues : §G+400§!"
 infernals.2570.c: "$ACKNOWLEDGED$"
 infernals.2570.c.tt: "£pop£$POPS$ obtenues : §G+400§!"
 infernals.2575.name: "$infernals.2560.name$"
 infernals.2575.desc: "Nos scientifiques ont soigneusement analysé les systèmes de la station afin de savoir exactement à quoi nous avions affaire avant de lancer les opérations de sauvetage.\n\nMalheureusement, le processus, de l'analyse à la publication, en passant par les études de suivi, a pris beaucoup trop de temps. Lorsque nous étions enfin prêts, les systèmes de survie avaient déjà cessé de fonctionner, entraînant la mort de tous les occupants des capsules de stase.\n\nC'est tragique, mais au moins, cela nous a permis d'acquérir de nouvelles connaissances, et la technologie récupérée s'avère précieuse."
 infernals.2575.a: "Heureusement, les vivants peuvent tout de même en profiter"
 infernals.2575.b: "$ACKNOWLEDGED$"
 # Situation completed
 infernals.2580.name: "Découverte de notre histoire"
 infernals.2580.desc: "Nous avons enfin atteint le noyau central, dont la taille dépasse l'entendement. À l'intérieur de la planète réside une immense arcologie alimentée par le magma et abritant des milliers de dormeurs.\n\nElle renferme également de grandes archives retraçant notre passé : l'ascension de notre empire galactique, et des rapports sur le grand refroidissement de l'univers. Certains ont choisi la stase, d'autres ont lutté contre l'inévitable, et beaucoup ont simplement nié la réalité et perdu la vie.\n\nCette mine d'informations nous a révélé des vérités longtemps oubliées. Certains pensent qu'elle témoigne de qui nous sommes et de ce que nous pouvons encore devenir. D'autres affirment que nous nous sommes forgé une nouvelle identité qui nous est propre et que la société de nos ancêtres n'a plus sa place aujourd'hui.\n\nQuoi qu'il en soit, nous pouvons utiliser ce vaste réseau de tunnels comme bon nous semble."
 infernals.2580.a: "Nous devrions rebâtir notre ancien empire"
 infernals.2580.b: "Les autres empires devront respecter notre héritage"
 infernals.2580.b.tt: "Nous recevrons un £commander£§Ycommandant§! de niveau §G5§!."
 infernals.2580.c: "Nous devons regarder vers l'avenir"
 infernals.2580.d: "L'essentiel, c'est que nous fassions quelque chose de bien"
 # Relic & Specimen
 r_pyroglyphic_codex: "Codex pyroglyphique"
 r_pyroglyphic_codex_desc: "Un planétaire cristallin complexe renfermant une multitude d'informations sur une civilisation datant des débuts de l'univers. Nous pouvons en tirer de nombreux enseignements pour bâtir une société meilleure."
 r_pyroglyphic_codex_effect_tt: "\nLorsque le codex pyroglyphique est activé pour la §Ypremière fois§!, notre monde-capitale reçoit de façon permanente le modificateur §Y$infernal_library$§!, qui a les effets suivants : $TABBED_NEW_LINE$- $MOD_PLANET_MAX_DISTRICTS_ADD$ : §G+5§! $TABBED_NEW_LINE$- $MOD_PLANET_HOUSING_MULT$: §G+20%§! $TABBED_NEW_LINE$- $MOD_PLANET_AMENITIES_ADD$: §G+10%§!"
 infernal_library: "Architecture souterraine"
 infernal_library_desc: "La redécouverte d'anciennes techniques de construction a ouvert de nouvelles possibilités pour la création d'immenses villes troglodytes. Le niveau de détail de l'architecture rappelle à notre population ses véritables origines."
 pyroglyphic_codex_mod: "$r_pyroglyphic_codex$"
 pyroglyphic_codex_mod_desc: "Les secrets fascinants que recèle le codex pyroglyphique constituent la base de nouvelles approches de recherche et ce pour de nombreuses années."
 infernal_stasispod: "Capsule de stase ancienne"
 infernal_stasispod_desc_short: "Un cercueil en pierre synthétique équipé de régulateurs de température d'une précision étonnante."
 infernal_stasispod_desc_details: "Ces capsules étaient utilisées par les [Species.GetNamePlural] d'autrefois pour se mettre en stase pendant des milliards d'années. Elles ne devaient réveiller leurs occupants que lorsque la température serait suffisamment élevée pour permettre leur survie. Celle-ci provient d'un site dont les systèmes de survie ont cessé de fonctionner, entraînant la mort de ses occupants. Elle est un témoignage poignant des épreuves que les [Species.GetNamePlural] ayant survécu ont surmontées."
 ####################################
 # Colony Events
 ####################################
 # Imminent Eruption
 infernals.3000.name: "Éruption imminente"
 infernals.3000.desc: "Nos systèmes d'alerte géologique prévoient une éruption volcanique à proximité de la principale colonie de §Y[planet.GetName]§! dans les douze prochains mois.\n\nSi nous investissions dans un système de décompression contrôlée, nous pourrions utiliser les coulées de lave pour produire de l'énergie. De plus, des équipes pourraient être mises en place pour recueillir le magma à la source afin d'en extraire des métaux précieux. Autre option : privilégier l'évacuation de la population et des provisions afin de minimiser les risques.\n\nNous pouvons également observer la situation avant de prendre des mesures, au cas où les prévisions seraient inexactes."
 infernals.3000.a: "Évacuons !"
 infernals.3000.a.tt: "A §Y500§! d'énergie."
 infernals.3000.b: "Attendons de voir"
 infernals.3000.c: "Concentrons-nous sur la production d'énergie"
 infernals.3000.d: "Recueillons du magma"
 infernals.3005.name: "Juste à temps"
 infernals.3005.desc: "L'évacuation précoce de la colonie s'est avérée judicieuse, car le volcan est entré en éruption plus tôt que prévu et a détruit de nombreux bâtiments dans la région. La pression souterraine s'étant désormais dissipée, les colons peuvent revenir et commencer la reconstruction."
 infernals.3010.name: "Colère volcanique"
 infernals.3010.desc: "Le volcan est entré en éruption plus tôt que prévu. La colonie, prise au dépourvu, a subi de lourds dégâts matériels, et de nombreuses vies ont été perdues."
 infernals.3015.name: "Observation"
 infernals.3015.desc: "Après plusieurs mois, l'activité volcanique à proximité d'une colonie de §Y[planet.GetName]§! s'est calmée. Même si, à long terme, le risque d'éruption subsiste, la colonie est pour l'instant hors de danger."
 infernals.3015.a: "Le risque en valait la peine"
 infernals.3020.name: "Réseau électrique renforcé"
 infernals.3020.desc: "Les ingénieurs sont parvenus à concevoir un système sécurisé permettant de libérer lentement la lave sous pression des chambres souterraines, en la faisant passer par des générateurs électriques. Cette initiative a offert un surcroît d'énergie temporaire au réseau de la colonie."
 infernals.3025.name: "Moisson magmatique"
 infernals.3025.desc: "L'éruption volcanique a été stoppée par l'utilisation conjointe de disrupteurs ultrasoniques et de barrières physiques, entraînant la formation d'un vaste champ de magma en surface, où il a commencé à se solidifier. Les équipes d'extraction ont d'ores et déjà entamé l'exploitation de ce gisement de minéraux."
 # Lava Sports
 infernals.3030.name: "Sports de lave"
 infernals.3030.desc: "On pourrait penser que personne n'aimerait passer du temps à proximité de coulées de lave à débit rapide, mais ce n'est pas le cas, du moins sur §Y[planet.GetName]§!.\n\nLes colons organisent des courses d'aéroglisseurs le long de coulées de lave actives, évitant les rochers flottants et sautant par-dessus les cascades de lave. D'autres parient sur les résultats des courses et les tripots attirent l'attention du crime organisé. Plusieurs pilotes ont perdu la vie dans divers accidents.\n\nIl n'existe aucune loi contre cette pratique dans la colonie, car nul n'aurait jamais imaginé une telle chose. Nous pourrions saluer l'enthousiasme des colons et les laisser faire ce qu'ils veulent, mais cela pourrait conduire à des cascades de plus en plus dangereuses et à une augmentation de la criminalité, car les paris sont déjà en hausse. Autrement, nous pourrions réglementer ce sport. Cela susciterait sans doute quelques plaintes, mais permettrait à long terme de réduire le nombre de décès et d'infractions. Nous pourrions aussi l'interdire complètement. Bien qu'efficace, cette mesure coûterait cher."
 infernals.3030.a: "Laissons couler"
 infernals.3030.b: "Réglementons ce sport"
 infernals.3030.c: "Interdisons ces imbécilités !"
 lava_surfboard: "Planche de surf lavique"
 lava_surfboard_desc_short: "Une plaque d'acier allongée dotée d'un mécanisme de sustentation improvisé soudé sur la face inférieure."
 lava_surfboard_desc_details: "Manifestement bricolée à partir de pièces détachées, cette planche de surf destinée aux courses sur lave de [Event.Planet.GetName] surprend par la qualité de sa conception. Elle dispose d'un excellent système de sustentation et d'une protection thermique efficace, le tout avec un design qui rappelle l'esprit indépendant et résilient de nos colons qui partent à la découverte de l'inconnu."
 infernals.3035.name: "Laissons couler !"
 infernals.3035.desc: "Le feu vert donné aux colons pour s'adonner à cette pratique a suscité un vif intérêt pour les sports de lave. Les images de pilotes manoeuvrant leur aéroglisseur au-dessus des coulées de lave sont rapidement devenues un emblème de la culture locale de §Y[planet.GetName]§!.\n\nMalheureusement, l'enthousiasme a relégué la sécurité au second plan. On continue de signaler des cas isolés de décès, et les prêteurs exploitent sans vergogne la dépendance au jeu des amateurs de sports de lave. Même si les courses continuent de bénéficier d'un large soutien du public, nous devons rester attentifs à ces conséquences négatives."
 infernals.3035.a: "C'est véritablement déconcertant..."
 infernals.3040.name: "Mesures de sécurité"
 infernals.3040.desc: "Alors que les colons ont d'abord protesté contre les autorités impériales souhaitant réglementer leur passe-temps favori, les nouvelles mesures de sécurité pour les aéroglisseurs ont presque entièrement éliminé les accidents et les décès. Même les pilotes reconnaissent les avantages de ces réglementations pour leur sécurité, ce qui a permis de convaincre le public.\n\nLes paris sportifs sont désormais taxés et contrôlés, les recettes étant utilisées pour l'équipement de sécurité des pilotes. Les éléments criminels ont en grande partie déserté les tripots, mais certains colons considèrent la fiscalité appliquée par les autorités comme injuste."
 infernals.3040.a: "Mieux vaut prévenir que guérir"
 infernals.3045.name: "Sport interdit"
 infernals.3045.desc: "Pour stopper cette pratique à haut risque, les autorités ont mobilisé les forces de l'ordre. Malgré une forte opposition populaire et des protestations généralisées dans la colonie, la surveillance continue des coulées de lave et l'interdiction des courses ont réduit le nombre de décès à zéro. Quant aux paris, ils ont quasiment disparu."
 infernals.3045.a: "Nous n'avions pas le choix"
 lava_sports_flow: "Sports de lave : §Gautorisés§!"
 lava_sports_flow_desc: "Le feu vert donné aux colons pour s'adonner à cette pratique a suscité un vif intérêt pour les sports de lave."
 lava_sports_regulated: "Sports de lave : §Yréglementés§!"
 lava_sports_regulated_desc: "Alors que les colons ont d'abord protesté contre les autorités impériales souhaitant réglementer leur passe-temps favori, les nouvelles mesures de sécurité pour les aéroglisseurs ont presque entièrement éliminé les accidents et les décès. Même les pilotes reconnaissent les avantages de ces réglementations pour leur sécurité, ce qui a permis de convaincre le public."
 lava_sports_banned: "Sports de lave : §Rinterdits§!"
 lava_sports_banned_desc: "Pour stopper cette pratique à haut risque, les autorités ont mobilisé les forces de l'ordre."
 # Kindled Myths
 infernals.3055.name: "Mythes enflammés"
 infernals.3055.desc: "La civilisation pré-PRL habitant sur §Y[pre_ftl_planet.GetName]§! présente des similitudes frappantes avec certaines créatures issues de nos mythes les plus anciens. Cela s'explique en partie par des tendances générales en matière d'évolution convergente et de psychologie, mais plus nous en apprenons sur cette espèce, plus nous découvrons de liens.\n\nS'agit-il réellement des mêmes créatures que celles qui apparaissent dans nos mythes et légendes ? Cette perspective suscite un enthousiasme croissant, et nous pourrions investir dans la poursuite de ces recherches. Mais il arrive que les coïncidences ne soient que cela... des hasards. Et trop creuser pourrait attirer l'attention de cette société sur nous et avoir des conséquences inattendues."
 infernals.3055.a: "Ignorons cette coïncidence"
 infernals.3055.b: "Enquêtons à ce propos"
 infernals.3060.name: "Hypothèse insensée"
 infernals.3060.desc: "Malgré l'envie d'étudier ce phénomène plus en détail, il a été jugé peu pertinent de continuer à explorer l'hypothèse d'entités mythologiques d'origine alien. Après tout, cette espèce a ses propres mythes, légendes et points de vue, qui pourraient être incompatibles avec les nôtres. Les recherches ont été mises en pause, et les ressources redéployées vers d'autres priorités."
 infernals.3060.a: "Étonnamment familières, mais étranges à la fois"
 infernals.3065.name: "Troubles primitifs"
 infernals.3065.desc: "Dans notre volonté d'établir un lien entre l'espèce observée et nos mythes, nos agents ont enfreint le protocole de contact sécurisé avec les civilisations pré-PRL. Partout sur la planète, des autochtones ont vu nos vaisseaux à maintes reprises, volé du matériel et même enlevé l'un de nos agents à des fins de recherche. La découverte de notre existence a provoqué troubles et divisions profondes.\n\nMalgré le chaos opérationnel, l'enthousiasme de notre population pour trouver des liens mythologiques persiste. Dans tout l'empire, cette espèce commence à être perçue non plus comme étrangère, mais comme un reflet spirituel."
 infernals.3065.a: "Nous aurions dû être plus prudents"
 infernals.3070.name: "Découverte étonnante"
 infernals.3070.desc: "Après une étude approfondie menée auprès des habitants de §Y[pre_ftl_planet.GetName]§!, les hypothèses mythologiques ont progressivement perdu de leur crédibilité. Bien qu'il existe de nombreux parallèles entre nos récits les plus anciens et ces êtres, des différences indéniables ont également été mises en évidence.\n\nMalgré cette situation plus complexe, l'enthousiasme pour cette espèce demeure. On suppose qu'elle pourrait être une population résiduelle des êtres originels de nos histoires et que les différences sont dues au temps qui s'est écoulé depuis. Même si nous devons aujourd'hui la reconnaître comme une société à part entière, beaucoup dans notre empire se sentent désormais spirituellement très liés à elle."
 infernals.3070.a: "Un moment enrichissant pour chacun d'entre nous"
 # Molten Core Grand Archive specimen
 infernals.3200.name: "Noyau en fusion"
 infernals.3200.desc: "À mesure que la colonie sur §Y[planet.GetName]§! se développe, les traces d'une civilisation éteinte se multiplient. Celle-ci utilisait le métal vivant, mais rien n'indique où elle se le procurait.\n\nUne réponse a récemment fait son apparition, sous la forme d'une étrange sphère scintillante entourée d'un champ de force émergeant des flux de magma du noyau. Sa fonction et sa conception exactes ne nous apparaissent pas clairement pour l'instant, mais elle produit du métal vivant lorsqu'elle est exposée à des températures extrêmement élevées. Le mystère archéologique est levé, mais une question se pose : que faire de cet artefact ?"
 infernals.3200.a: "Gardons-le"
 infernals.3200.a.accept: "Ce curieux objet n'a rien de comparable parmi nos créations. Il n'est pas seulement une source de £sr_living_metal£§Ymétal vivant§!, il a également une importance scientifique et historique qui mérite d'être étudiée plus en détail."
 infernals.3200.b: "Jetons-le dans la lave"
 infernals.3200.b.deny: "Il n'y a rien d'admirable dans une civilisation qui n'a pas su s'adapter et qui a disparu. Cet artefact doit être éliminé et oublié."
 infernal_molten_core: "Noyau en fusion"
 infernal_molten_core_desc_short: "Une sphère argentée à la texture ondulée et fluide, entourée d'un champ de force émettant un léger sifflement."
 infernal_molten_core_desc_details: "Le champ de force du noyau ne faiblit qu'au contact de températures élevées, libérant alors une goutte de £sr_living_metal£§Ymétal vivant§!. Ses créateurs ont disparu depuis longtemps, mais ce noyau témoigne de leur savoir et de leur génie."
 # CD Timeline events
 TIMELINE_EVENT_ORIGIN_CD_START: "Échos venus des profondeurs\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_START_TOOLTIP: "§HÀ la poursuite des traces§!\n§YÉvénement d'origine§!\n\nNous avons capté de faibles signaux provenant des profondeurs de la planète. Ils émanent d'un réseau de structures anciennes profondément enfouies dans la croûte, datant de bien avant notre stase."
 TIMELINE_EVENT_ORIGIN_CD_END: "Découverte de notre histoire\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_END_TOOLTIP: "§HChaîne d'événements terminée§!\n§YÉvénement d'origine§!\n\nNous avons découvert une immense installation au coeur de la planète et récupéré un codex renfermant des informations perdues depuis longtemps. Nous sommes les descendants d'un empire ancien et puissant, et prêts à revendiquer notre héritage."
