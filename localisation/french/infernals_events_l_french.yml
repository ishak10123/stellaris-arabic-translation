 situation_red_giant_expansion_stage_1: "Notre étoile est relativement calme, mais son rayonnement est anormalement élevé."
 situation_red_giant_expansion_stage_2: "Notre étoile a grossi au cours de notre évolution, ce qui a des répercussions importantes sur notre monde natal."
