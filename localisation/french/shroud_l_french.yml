 councilor_mindwarden_desc: "Notre $TITLE$ est l'autorité supérieure pour enrayer le fléau de l'hostilité psionique et les pensées criminelles."
 councilor_mindwarden_unlock_title: "§HPoste du Conseil occupé par une personnalité de la [mindwarden_enclave_country.GetName].§!"
 councilor_mindwarden_conditional_tooltip: "Leader non psionique"
 # Shroudspeaker
 councilor_chosen: "Porte-parole du Suaire"
 councilor_chosen_female: "$councilor_chosen$"
 councilor_chosen_desc: "Notre $TITLE$ guide le travail des prêtres en écoutant au mieux les sensations venant du coeur du Suaire."
 # Grand Preacher
 councilor_chosen_corporate: "Grand prêcheur"
 councilor_chosen_corporate_female: "$councilor_chosen_corporate$"
 councilor_chosen_corporate_desc: "Notre $TITLE$ s'assure que le travail évangélique de nos prêtres serve au mieux les intérêts de notre économie."
 # Grand Vessel
 councilor_grand_vessel: "Grand réceptacle"
 councilor_grand_vessel_female: "$councilor_grand_vessel$"
 councilor_grand_vessel_desc: "Notre $TITLE$ est en charge d'optimiser l'efficacité des complexes automatisés. Il a également le privilège d'occuper l'une des unités de conditionnement les plus spacieuses de notre société."
 # Executive Vessel
 councilor_executive_vessel: "Réceptacle exécutif"
 councilor_executive_vessel_female: "$councilor_executive_vessel$"
 councilor_executive_vessel_desc: "Notre $TITLE$ est en charge d'optimiser les profits des complexes automatisés. Il a également le privilège d'occuper l'une des suites de conditionnement les plus spacieuses et au meilleur standing de notre société."
