 the_composer_of_strands_REVENGE_PROJECT_DESC: "$the_composer_of_strands_color_article_cap$ $PATRON_REVENGE_PROJECT_DESC$"
 DELVING_RITUAL: "Rituel de visite"
 DELVING_RITUAL_DESC: "La §Y[shroudwalker_enclave_country.GetName]§! a réalisé les préparatifs nécessaires pour accomplir un rituel de visite pour entrer dans le §HSuaire§! en notre nom. Impossible de savoir quelles connaissances ils nous feront découvrir."
 MINDWARDENS_THE_FIRST_ENCLAVE: "La première enclave"
 MINDWARDENS_THE_FIRST_ENCLAVE_DESC: "Nous sommes prêts à construire une §Henclave des Gardiens de la conscience§! indépendante pour mener à bien notre mission visant à mettre fin à l'infection psionique à travers la galaxie.\n\nUne fois terminée, cette installation pourra fournir des services anti-psioniques à ceux qui en ont besoin, tout en nous apportant une partie des revenus et matériaux reçus."
 MINDWARDENS_THE_FIRST_ENCLAVE_NOTE: "Conversion d'une §Yflotte§! de 30 ou plus menée par un §Ycommandant§! en une §Yenclave des Gardiens de la conscience§! dans un système que nous contrôlons."
 SHROUD_SHAPING_PROJECT: "Façonner le Suaire"
 SHROUD_SHAPING_PROJECT_DESC: "Nombreuses sont les entités présentes à l'intérieur du §HSuaire§!, chacune dotée de pouvoirs formidables. Elles n'attribuent leurs immenses bienfaits qu'en échange d'un lien irrévocable.\n\nCependant, nous pensons pouvoir nous frayer notre propre chemin. Plutôt que de lier nos psychés à un mécène unique, nos [GetResearchers] psioniques peuvent développer un moyen de canaliser de plus petites quantités d'énergie afin de façonner le Suaire selon notre propre volonté."
 EXPLORE_BORDER_SYSTEM: "Exploration de [exiled_system_border.GetName]"
 EXPLORE_BORDER_SYSTEM_DESC: "L'observation à distance montre un afflux récent d'énergies étranges dans le système de §H[exiled_system_border.GetName]§!, ce qui semble correspondre à des analyses inhabituelles produites par notre centre antique sur [owner.GetHomeWorldName].\n\nSi nous voulons comprendre ce phénomène, nous devons explorer [exiled_system_border.GetName]."
 EXPLORE_BORDER_SYSTEM_TOOLTIP: "Envoyez un §Yvaisseau§! ou une §Yflotte§! pour explorer §Y[exiled_system_border.GetName]§!."
