 shroud_seal: "$SHROUD_SEAL$"
 shroud_seal_DESC: "Cet appareil sophistiqué émet des ondes à basse fréquence capables de contrer l'énergie psionique, pouvant aller jusqu'à dissiper entièrement les auras psioniques."
 shroud_seal_MEGASTRUCTURE_DETAILS: "Le §Ysceau du Suaire§! s'atténue à proximité des §Yauras psioniques§! et réduit l'efficacité des §Ycomposants de vaisseaux psioniques§!."
