 job_drone_energy_thrall: "Drones énergétiques"
 job_drone_energy_thrall_plural: "Drones énergétiques"
 job_drone_energy_thrall_desc: "La conscience inactive pourrait être mise à profit en la mettant au service de noeuds de gouvernance de qualité. Un appareil de siphonnage spécialement calibré est implanté chez chaque drone énergétique, ce qui collecte son énergie inutilisée et la stocke dans des cellules énergétiques à transfert facile."
 job_drone_energy_thrall_effect_desc: "Les £job_energy_thrall£drones énergétiques produisent de l'£unity£§Iunité§! et un §Igain d'expérience des personnalités§!, et ils réduisent la §Ypénalité d'assemblage des pops§! des décrets §Y$edict_energy_drain$§! et §Y$edict_sanguine_council$§! de §G0.02%§!."
 mod_job_drone_energy_thrall_add: "Emplois de drones énergétiques "
