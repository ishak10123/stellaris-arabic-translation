 MESSAGE_DIGEST_EFFECT_DESC: "L'§Yaura psionique§! de la $ENEMY$ a libéré une vague d'énergie négative. Nos colonies et nos flottes situées dans sa zone d'influence ont subi des dégâts.\n- Flottes endommagées : §Y$FLEETS$§!\n- Colonies dévastées : §Y$COLONIES$§!"
