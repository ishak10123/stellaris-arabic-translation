 decision_add_aura_blocker_tt: "Ajoute 2 £blocker£§Ybloqueurs§! au monde : §H$d_aura_blocker$§!"
 d_aura_blocker: "Végétation du Suaire"
 d_aura_blocker_desc: "Un fourré luxuriant de végétation inhabituelle dégageant du §H$zro_lower$§! dans le cadre de son cycle de croissance normal."
 fertility_accord_tt: "Permet la £decision£§Ydécision planétaire§! : §H$decision_add_aura_blocker$§!\nPermet le £building£§Y$BUILDING$§! : ['building:building_composer_sanctum']"
 col_pleasure: "Monde de plaisir"
 col_pleasure_desc: "Un paradis de béatitude psionique. Les plaisirs exotiques offerts par les améliorations psychiques offrent un monde d'extase transcendantale."
 col_pleasure_tt: "$col_pleasure_desc$"
 bliss_accord_tt: "Obtient la capacité d'améliorer un §Ymonde de villégiature§! pour en faire un §Ymonde de plaisir§!, ce qui permet la construction de §Hsanctuaires§! et de ['building:building_psi_corps',Corps psi], tout en augmentant la £trade£§Yvaleur commerciale§! de §G5%§!.\nPermet le £building£§Y$BUILDING$§! : ['building:building_instrument_sanctum']"
 bliss_accord_gestalt_tt: "Permet le £building£§Y$BUILDING$§! : ['building:building_instrument_sanctum']"
 shroud.4862.title: "Transformation de §H[From.GetName]§!"
 shroud.4862.shared: "Nos [GetTelepathPlural] ont fait appel au pouvoir de notre mécène, et nous avons été récompensés."
 shroud.4862.desc: "$shroud.4862.shared$ $the_composer_of_strands_color_article_cap$ a transformé §H[From.GetName]§! en monde Gaïa, ce qui en fait un habitat idéal pour les [Root.GetSpeciesNamePlural]."
 shroud.4862.a: "$INCREDIBLE$"
 shroud.4862.a.tooltip: "La planète §H[From.GetName]§! a été transformée en §Hmonde Gaïa§!."
 shroud.4890.title: "Le pouvoir de la rétrospection"
 shroud.4890.desc: "Nos [GetTelepathPlural] ont fait appel au pouvoir de notre mécène, et celui-ci nous chuchote une offre : $whisperers_in_the_void_color_article$ réinventeront l'une de nos planètes pour en faire un monde relique. À nous de choisir laquelle."
 shroud.4890.a: "Planète §H[event_target:hindsight_planet_candidate_1.GetName]§!"
 shroud.4890.b: "Planète §H[event_target:hindsight_planet_candidate_2.GetName]§!"
 shroud.4890.c: "Planète §H[event_target:hindsight_planet_candidate_3.GetName]§!"
 shroud.4890.d: "Planète §H[event_target:hindsight_planet_candidate_4.GetName]§!"
 leader_trait_whispering_mind: "Esprit murmurant"
 leader_trait_whispering_mind_desc: "L'esprit de cette personnalité est submergé de murmures, chacun possédant sa propre intention. La communion se fait avec des milliers d'entités différentes plutôt qu'une seule."
 knowledge_accord_tt: "Les personnalités peuvent acquérir le trait §Y$leader_trait_master_salvager$§!."
 wisdom_accord_tt: "Permet le £building£§Y$BUILDING$§! : ['building:building_whisperers_sanctum']"
 shroud.4935.title: "$ACCORD_CREATION$ dans le système de §H[capital_scope.solar_system.GetName]§!"
 shroud.4935.desc: "$shroud.4862.shared$ $end_of_the_cycle_color_article_cap$ a matérialisé un monde Gaïa dans le système de §H[capital_scope.solar_system.GetName]§!, offrant un habitat idéal pour les [Root.GetSpeciesNamePlural] ; un paradis éphémère où embrasser la fin de toutes choses."
 shroud.4935.tooltip: "Un §Hmonde Gaïa§! est apparu dans le système de [capital_scope.solar_system.GetName] : §H[accord_creation_world.GetName]§!"
 shroud.4970.title: "La fin est venue"
 shroud.4970.desc.1: "Le voile qui sépare les dimensions a disparu pour un bref instant, renvoyant la totalité de la puissance psionique du Suaire dans la réalité tangible."
 shroud.4970.desc.2: "Tous les êtres conscients, vivants ou mécaniques, ont été éradiqués. Toutes les planètes se sont changées en coquilles vides, désormais stériles. Même les étoiles ont poussé leur dernier soupir, s'éteignant pour de bon.\n\nEt malgré cela, lors de nos ultimes instants, tout ce que nous avons perçu fut une voix dans nos esprits...\n\n§R« LA FIN DES FINS. »§!"
 shroud.4970.desc: "$end_of_the_cycle_color_article_cap$ est imminente.\n\nL'aura de fin a consumé la galaxie. Alors que le dernier système stellaire succombait à son pouvoir, un déferlement incroyable d'énergie est entré en éruption.$shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4970.a: "C'est parfait"
 shroud.4970.a.tooltip.destroyed: "§YLa galaxie est détruite.§!"
 shroud.4970.a.tooltip: "Nous avons mis fin au cycle.\n\n$shroud.4970.a.tooltip.destroyed$"
 shroud.4971.title: "$shroud.4970.title$"
 shroud.4971.desc.1: "C'est la fin."
 shroud.4971.desc.2.1: "L'§Haura psionique§! destructrice émise par"
 shroud.4971.desc.2.2: "s'est répandue à travers la galaxie. Alors que le dernier système stellaire succombait à la corruption de l'aura, un déferlement incroyable d'énergie est entré en éruption."
 shroud.4971.desc.2.3: "Comme venue d'une autre dimension de la réalité, l'immense force cataclysmique a tout anéanti."
 shroud.4971.desc.2.contact_psionic: "$shroud.4971.desc.2.1$ la §H[from.GetName]§! $shroud.4971.desc.2.2$ $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.contact_no_psionic: "$shroud.4971.desc.2.1$ la §H[from.GetName]§! $shroud.4971.desc.2.2$ $shroud.4971.desc.2.3$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.no_contact_psionic: "$shroud.4971.desc.2.1$ une civilisation alien avec laquelle nous n'avons aucun contact $shroud.4971.desc.2.2$ $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.no_contact_no_psionic: "$shroud.4971.desc.2.1$ une civilisation alien avec laquelle nous n'avons aucun contact $shroud.4971.desc.2.2$ $shroud.4971.desc.2.3$\n\n$shroud.4970.desc.2$"
 shroud.4971.a: "$crisis.6051.a$"
