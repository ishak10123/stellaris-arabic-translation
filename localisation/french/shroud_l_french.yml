 shroud.1510.title: "Opposition d'aura psionique"
 shroud.1510.desc: "Notre §Haura psionique§! du système de [from.GetName] lutte contre une aura adverse originaire du système voisin, [fromfrom.GetName]. Nos [GetResearchers] psioniques ont déjà modélisé ce genre de comportement, mais c'est la première fois que nous découvrons réellement le phénomène.\n\nEn théorie, l'aura la plus puissante (c'est-à-dire, celle projetée avec la plus grande intensité) réduira peu à peu la force de son ennemie. Si ce combat aboutit à un déclin total, l'aura victorieuse pourra s'écouler dans le système laissé vacant.\n\nC'est une véritable bataille des esprits."
 shroud.1510.a: "Notre volonté l'emportera"
 shroud.1550.title: "La puissance de la volonté"
 shroud.1550.desc.common_1: "Du fait de nos incursions dans le §HSuaire§!, ses énergies affectent l'espace observable. Bien qu'ils soient importants, ces effets restent intermittents et isolés."
 shroud.1550.desc.common_2: "Nos actions ont des répercussions à travers le Suaire, ce qui nous rapproche d'êtres dotés d'une grande puissance. Si nous nous attirons les faveurs de ces entités, nous pourrons ensuite canaliser leur énergie psionique dans la réalité physique. Nos [GetTelepathPlural] ont émis l'hypothèse que l'aura résultante renforcerait notre empire,"
 shroud.1550.desc_1.knows: "$shroud.1550.desc.common_1$ Les §Hauras psioniques§! proposent une manière de transformer cette influence en un flux constant."
 shroud.1550.desc_1.default: "$shroud.1550.desc.common_1$ La théorie des §Hauras psioniques§! propose une manière de transformer cette influence en un flux constant."
 shroud.1550.desc.knows: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$ ainsi que nos alliés, tout en affaiblissant nos ennemis, tout comme nous l'avons précédemment observé."
 shroud.1550.desc.knows.homicidal: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$ tout en affaiblissant nos ennemis, tout comme nous l'avons précédemment observé."
 shroud.1550.desc.default: "$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$ ainsi que nos alliés, tout en affaiblissant nos ennemis."
 shroud.1550.desc.default.homicidal: "$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$ tout en affaiblissant nos ennemis."
 shroud.1550.a: "C'est prometteur"
