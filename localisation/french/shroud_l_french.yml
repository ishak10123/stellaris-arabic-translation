 shroud.4150.title: "La Fin approche"
 shroud.4150.desc: "Notre mécène parle en silence. Alors que nous percevons l'imminence de la fin du cycle, une énergie renouvelée nous saisit. Nous sommes exaltés par l'urgence.\n\nSi nous voulons satisfaire la volonté de la Fin, il faut canaliser l'énergie collective de tous les [This.GetSpeciesNamePlural] vers un seul et même objectif. Nous devons manifester le pouvoir de notre mécène et poursuivre l'extension de son aura jusqu'aux confins de la galaxie."
 shroud.4150.a: "Notre heure est venue"
