 #==========================
 trait_tankbound: "Cuves de survie"
 trait_tankbound_desc: "Les membres de cette espèce mènent leur existence suspendus dans des cuves de bio-fluides spécialisés. Les équipements d'assistance leur sont donc indispensables, et ils sont incapables de pratiquer un travail physique."
 trait_tankbound_effects: "Entretien des pops en nourriture (ou équivalent) : §G-50%§! $TABBED_NEW_LINE$- §RImpossible d'occuper des emplois d'ouvriers§!$TABBED_NEW_LINE$- §RImpossible de rejoindre une armée§!"
 trait_tankbound_portrait_override_tt: "Nécessite une espèce limitée à des vaisseaux de confinement"
 trait_robot_latent_psionic: "$trait_latent_psionic$"
 trait_robot_latent_psionic_desc: "§LCette espèce dispose de processeurs psioniques latents, en sommeil chez la plupart de ses unités. Même s'ils sont rares, ces pouvoirs s'activent chez certaines des personnalités qui en sont issues.§!\n"
 trait_robot_psionic: "$trait_psionic$"
 trait_robot_psionic_desc: "§LToutes les unités de cette espèce possèdent un puissant matériel psionique. Elles peuvent manipuler à la fois les royaumes physiques et immatériels uniquement grâce à un traitement cognitif.§!\n"
 trait_default_psionic_desc: "§LTous les membres de cette espèce disposent de puissantes capacités psioniques. Ils communiquent communément entre eux par télépathie.§!\n"
 trait_hive_psionic_desc: "§LTous les membres de cette espèce possèdent de puissantes capacités psioniques. Ils peuvent manipuler à la fois les royaumes physiques et immatériels grâce au pouvoir de leur esprit.§!\n"
