 # Carceral Test Facility
 building_carceral_test_facility: "Bureaux expérimentaux"
 building_carceral_test_facility_desc: "Une succursale coloniale proposant un système de franchise à ses clients potentiels, leur offrant la possibilité d'établir leurs propres programmes expérimentaux. Déployons les défenses pour combattre le crime !"
 building_psionic_offices: "Bureaux psioniques"
 building_psionic_offices_desc: "La complexité des esprits étrangers s'apprivoise plus efficacement en leur présence physique, ce qui permet d'établir les accords commerciaux les plus lucratifs pour les deux parties."
 building_psionic_offices_tt: "\nEffets sur le système :\n$t$- Émet une §Yaura psionique§! pour le possesseur de la succursale à une intensité mensuelle de $@psionic_offices_intensity|0+$\n$t$- §RTout type de diffusion d'aura psionique par le propriétaire de la colonie a priorité sur ce bâtiment.§!"
 job_shroud_trader: "Marketeurs empathiques"
 job_shroud_trader_plural: "Marketeurs empathiques"
 job_shroud_trader_plural_with_icon: "£job_telepath£$job_shroud_trader_plural$"
 job_shroud_trader_desc: "Ces experts s'adaptent à l'esprit émotionnel des marchés locaux, concluent des contrats et organisent des séminaires sur les tendances actuelles parmi les leaders d'opinion."
 mod_job_shroud_trader_add: "Emplois de marketeurs empathiques"
 mod_pop_shroud_trader_bonus_workforce_mult: "$BONUS_WORKFORCE_FOR$ marketeurs empathiques"
 #==========================
 # Buildings
 #==========================
 # Experimentation Chambers
 building_experimentation_chambers_1: "Chambres expérimentales"
 building_experimentation_chambers_1_desc: "Un site ultra-confidentiel pour mener des expériences sur les criminels endurcis. Il se compose principalement de cellules de prison et de laboratoires de recherche."
 building_experimentation_chambers_2: "Complexe expérimental"
 building_experimentation_chambers_2_desc: "Un campus partagé entre installations de détention et technologie top secrète, où les [Owner.GetIndividualNamePlural] contrevenant à la loi sont utilisés comme cobayes dans des expériences réalisées par les meilleurs [Owner.GetResearchers_lower] de l'empire."
 building_experimentation_chambers_3: "Centre d'expérimentation"
 building_experimentation_chambers_3_desc: "Un réseau dédié à la technologie et aux installations de détention haute sécurité. Des équipes de [Owner.GetResearchers_lower] d'élite y mènent des expériences inédites sur des [Owner.GetIndividualNamePlural] tirés des bas-fonds de l'empire."
 # Lifecrypt
 # Lifecrypt (Normal)
 building_lifecrypt_1: "Tour sangsue"
 building_lifecrypt_1_desc: "Ces dispositifs monumentaux sont capables de puiser l'énergie excédentaire de populations dédiées présentes à proximité. Des individus portent un équipement spécialisé qui canalise leur force vitale vers un conduit central où elle peut être répartie parmi la haute société."
 building_lifecrypt_2: "Siphon d'âme"
 building_lifecrypt_2_desc: "Bien que leur nom puisse semble quelque peu baroque, les siphons d'âme sont en réalité le fruit de la science pure. Calibrés pour récolter les énergies des drones par l'intermédiaire de longes, ils sont capables d'extraire d'immenses quantités d'énergie excédentaire, sans causer d'erreurs critiques."
 building_lifecrypt_3: "Drain d'essence"
 building_lifecrypt_3_desc: "Les limites des drains d'essence doivent être clairement définies, car s'aventurer dans leur zone d'influence peut s'avérer fatal pour quiconque ne posséderait pas l'équipement approprié. Certains individus sont formés à réguler leur métabolisme de façon à ne pas donner de trop grandes quantités d'énergie à la fois."
 # Lifecrypt (Machine)
 building_lifecrypt_machine_1: "Batterie de siphon"
 building_lifecrypt_machine_1_desc: "Ces dispositifs monumentaux sont capables de puiser l'énergie de traitement excédentaire de drones dédiés présents à proximité. Des robots portent un équipement spécialisé qui canalise leur batterie vers un conduit central où elle peut être répartie parmi ceux dotés d'un dessein supérieur."
 building_lifecrypt_machine_2: "Complexe de batterie"
 building_lifecrypt_machine_2_desc: "Calibrés pour récolter les énergies de drones par l'intermédiaire de longes, ces appareils sont capables d'extraire d'immenses quantités de fluides de traitement excédentaire sans provoquer de défaut critique."
 building_lifecrypt_machine_3: "Nexus de batterie"
 building_lifecrypt_machine_3_desc: "Les limites d'un nexus de batterie doivent être clairement définies, car s'aventurer dans leur zone d'influence peut s'avérer fatal pour toute unité non dotée de l'équipement isolant adéquat."
 # Lifecrypt (Hive Mind)
 building_lifecrypt_hive_mind_1: "Tour sangsue"
 building_lifecrypt_hive_mind_1_desc: "Ces dispositifs monumentaux sont capables de puiser l'énergie de traitement excédentaire de drones dédiés présents à proximité. Des ouvriers portent un équipement spécialisé qui canalise leurs batteries vers un conduit central où l'énergie tirée peut être répartie parmi les castes supérieures."
 building_lifecrypt_hive_mind_2: "Siphon d'âme"
 building_lifecrypt_hive_mind_2_desc: "Bien que leur nom puisse semble quelque peu baroque, les siphons d'âme sont en réalité le fruit de la science pure. Calibrés pour récolter les énergies de drones par l'intermédiaire de longes, ils sont capables d'extraire d'immenses quantités de fluides métaboliques des organismes sans mettre leur vie en danger."
 building_lifecrypt_hive_mind_3: "Drain d'essence"
 building_lifecrypt_hive_mind_3_desc: "Les limites des drains d'essence doivent être clairement définies, car s'aventurer dans leur zone d'influence peut s'avérer fatal pour tout drone qui ne posséderait pas l'équipement approprié. Certains ouvriers sont formés à réguler leur métabolisme de façon à ne pas donner de trop grandes quantités d'énergie à la fois."
 # Lifecrypt (Corporate)
 building_lifecrypt_corporate_1: "Direction de synergie"
 building_lifecrypt_corporate_1_desc: "Ces dispositifs monumentaux sont capables de puiser l'énergie excédentaire de stagiaires dédiés présents à proximité. Des individus portent un équipement spécialisé qui canalise leur force vitale vers un conduit central où elle peut être répartie parmi les hauts gradés."
 building_lifecrypt_corporate_2: "Administration synergique"
 building_lifecrypt_corporate_2_desc: "Calibrés pour récolter les énergies d'individus par l'intermédiaire de longes, les bâtiments d'administration synergique sont capables d'extraire d'immenses quantités de fluides métaboliques des stagiaires sans mettre leur vie en danger et jusqu'au niveau jugé le plus judicieux."
 building_lifecrypt_corporate_3: "Nexus synergique"
 building_lifecrypt_corporate_3_desc: "Les limites du nexus synergique doivent être clairement définies, car les stagiaires ne possédant pas l'équipement approprié courent d'immenses risques à s'aventurer dans leur zone d'influence. Certains individus sont formés à des techniques synergiques avancées pour garantir leur survie à travers l'ensemble du processus."
 # Psionic Suppressor
 building_psionic_suppressor: "Suppresseur psionique"
 building_psionic_suppressor_desc: "Ce complexe prend en charge toute une diversité d'atténuateurs psioniques à longue portée qui dissipent les auras psioniques à travers le système stellaire et les empêchent de s'étendre davantage."
 building_psionic_suppressor_tt: "Réduction quotidienne de l'§Hintensité§! de l'§Yaura psionique§! dans ce système : $@building_psionic_suppressor_decrease|0$"
 # Materiality Engine
 building_materiality_engine: "Moteur de matérialité"
 building_materiality_engine_plural: "Moteurs de matérialité"
 building_materiality_engine_desc: "L'énergie psionique du Suaire jouxte tous les points de la galaxie physique. Le moteur de matérialité exploite cette interface, ce qui permet de traverser des dimensions et de matérialiser des ressources et composants précieux."
 building_materiality_engine_tt: "Initie un §Yprojet spécial§! pour dériver une technologie de ['concept_component',composants] psioniques à partir du §HSuaire§!. Une fois ce projet réussi, il accroît la production de ce bâtiment et le nombre de moteurs de matérialité pouvant être construits."
 biology_unit_is_observator_tt: "$t$Les £job_calculator_biologist£sous-routines de biologie sont converties en £job_observator_drone£drones d'observation"
 physics_unit_is_extradimensional_research_unit_tt: "$t$Les £job_calculator_physicist£calculateurs physiques sont convertis en £job_extradimensional_research_unit£unités de recherche extradimensionnelles"
