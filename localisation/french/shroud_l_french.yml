 # End of the Cycle accords
 ACCORD_FRACTALIZATION: "Fractalisation"
 ACCORD_FRACTALIZATION_desc: "L'aura de fin déforme des fragments de la réalité physique pour les entrelacer au Suaire, ouvrant des espaces inconnus dans lesquels s'étendre en spirale. Une fois tissés, ces fils demeurent jusqu'à l'arrivée de la Fin."
 ACCORD_FRACTALIZATION_TT: "§Y$mod_station_researchers_produces_mult$§!et §Ydes stations minières§! dans notre §Haura psionique§! : §G+100%§!"
 fractalization_effect_tt: "De la §Y$ACCORD_FRACTALIZATION$§! :$TABBED_NEW_LINE$$mod_station_researchers_produces_mult$: §G+[GetFractalizationValue]%§!$TABBED_NEW_LINE$$mod_station_gatherers_produces_mult$: §G+[GetFractalizationValue]%§!"
 ACCORD_FRACTALIZATION_TRIGGER: "£trigger_no£ §RLa $stage_2$ de la §Hsituation§! §Y$situation_end_of_the_cycle$§! a été atteinte§!"
 ACCORD_CREATION: "Création"
 ACCORD_CREATION_desc: "En cette période de déclin, l'emprise de $end_of_the_cycle_article$ sur cette réalité se renforce. Des mondes d'autres dimensions peuvent être amenés dans leur intégralité dans celle-ci, accélérant encore davantage le chemin inévitable vers le néant."
 ACCORD_CREATION_TT: "Crée un §Hmonde Gaïa§! avec §H1 000§! £pop£§Y$POPS$§! dans notre £system£§Ysystème-capitale§!."
 ACCORD_CREATION_TRIGGER: "£trigger_no£ §RLa §Hsituation§! §Y$situation_end_of_the_cycle$§! a débuté§!"
 ACCORD_DISTORTION: "Distorsion"
 ACCORD_DISTORTION_desc: "L'influence de $end_of_the_cycle_article$ déforme la trame même de l'espace et du temps, ouvrant de nouvelles voies pour répandre sa volonté."
 ACCORD_DISTORTION_TT: "Pour les §H$@distortion_accord_duration|0$§! prochaines années, nos flottes peuvent réaliser des hyperbonds à une portée double et sans subir d'effets négatifs."
 ACCORD_DISTORTION_TRIGGER: "£trigger_no£ §RLa $stage_3$ de la §Hsituation§! §Y$situation_end_of_the_cycle$§! a été atteinte§!"
 ACCORD_INTENSIFICATION: "Intensification"
 ACCORD_INTENSIFICATION_desc: "Rien ne peut entraver l'inévitabilité de l'aura de fin. À force de volonté, la voie vers le néant s'ouvre à tous !"
 ACCORD_INTENSIFICATION_TT: "Augmente les gains d'intensité de l'§Haura psionique§! de §G+50§! et désactive tous les §Hsceaux du Suaire§! de la galaxie pendant 3 ans."
