 #==========================
 PATRON_REVENGE_PROJECT: "Avatar de la vengeance"
 PATRON_REVENGE_PROJECT_DESC: "n'a fait que déchaîner sa furie contre nous. Une percée du Suaire est apparue dans le système de [event_target:selected_planet_for_revenge.solar_system.GetName] et nos [GetTelepathPlural] perçoivent la cruauté de notre ancien mécène approchant à grande vitesse.\n\nNous devons nous préparer à nous défendre."
