 shroud.4950.title: "Aura malveillante"
 shroud.4950.desc.1: "Nos données indiquent que cette aura provoque des effets extrêmement délétères. Si nous ne faisons rien, elle va se répandre rapidement à travers la galaxie."
 shroud.4950.desc.2: "Nous avons détecté une puissante aura psionique dans le système de §H[from.GetName]§!"
 shroud.4950.desc.3.intro: "$shroud.4950.desc.2$ Selon nos [GetTelepathPlural], son émission depuis le §HSuaire§! découle des activités psioniques"
 shroud.4950.desc.3.default: "$shroud.4950.desc.3.intro$ d'une civilisation alien."
 shroud.4950.desc.3.contact: "$shroud.4950.desc.3.intro$ de la §H[fromfrom.GetName]§!"
 shroud.4950.desc.4: "$shroud.4190.desc.intro$ L'§Haura psionique§! en question, qui tire son nom de son origine théorique, a maintenant été détectée dans le système de §H[from.GetName]§!."
 shroud.4950.desc.5.intro: "$shroud.4950.desc.2$, dont l'origine remonterait aux frontières"
 shroud.4950.desc.5.default: "$shroud.4950.desc.5.intro$ d'une civilisation alien."
 shroud.4950.desc.5.contact: "$shroud.4950.desc.5.intro$ de la §H[fromfrom.GetName]§!"
 shroud.4950.a: "$grand_archive.1100.a$"
 shroud.4955.title: "Effroi grandissant"
 shroud.4955.desc.1: "La crainte d'une calamité imminente s'est installée chez notre population."
 shroud.4955.desc.1.gestalt: "$shroud.4955.desc.1$ Nos [GetTelepathPlural] ont même détecté une perturbation concomitante dans les énergies du §HSuaire§!."
 shroud.4955.desc.1.non_gestalt: "$shroud.4955.desc.1$ Selon nos [GetTelepathPlural], même le §HSuaire§! est étrangement déstabilisé, comme si ses forces tremblaient d'appréhension."
 shroud.4955.desc.2.intro: "Ces dernières années, la galaxie a connu une recrudescence d'événements difficiles."
 shroud.4955.desc.2.outro: "Alors que nous détectons d'étranges phénomènes, nos [GetResearchers] prédisent des circonstances encore bien pires à venir."
 shroud.4955.desc.2.contact_aura: "$shroud.4955.desc.2.intro$ Nous avons assisté à la croissance inexplicable de §H[from.GetName]§!. Nous avons connu l'intrusion d'une §Haura psionique§! adverse. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.contact_no_aura: "$shroud.4955.desc.2.intro$ Nous avons assisté à la croissance inexplicable de §H[from.GetName]§!. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_aura: "$shroud.4955.desc.2.intro$ Nous avons connu l'intrusion d'une §Haura psionique§! adverse. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_no_aura: "$shroud.4955.desc.2.intro$ $shroud.4955.desc.2.outro$"
 shroud.4955.desc.3: "Nous ne savons pas exactement ce qui approche, mais nous le sentons avec une profonde certitude."
 shroud.4955.a: "Nous devons nous préparer au pire"
 shroud.4955.a.tt: "Si l'§Haura de fin§! recouvre la galaxie, le jeu prend fin."
 shroud.4960.title: "Menace psionique"
 shroud.4960.desc.1.intro: "L'§Haura psionique§! malveillante émise par"
 shroud.4960.desc.1.outro: "se répand à travers la galaxie à une vitesse inquiétante. À en juger par les observations de nos [GetResearchers], nous ne sommes pas le premier système stellaire à souffrir de ses effets néfastes."
 shroud.4960.desc.1.contact: "$shroud.4960.desc.1.intro$ la §H[from.GetName]§! $shroud.4960.desc.1.outro$"
 shroud.4960.desc.1.no_contact: "$shroud.4960.desc.1.intro$ une civilisation alien avec laquelle nous n'avons aucun contact $shroud.4960.desc.1.outro$"
 shroud.4960.desc.2: "D'après nos dernières données, elle s'en est prise à la moitié de la galaxie reliée par hyperlignes. La force qui se cache derrière semble décidée à détruire des galaxies entières. Si nous ne nous y opposons pas, elle pourrait bien y parvenir."
 shroud.4960.a: "Il faut l'arrêter"
 shroud.4960.a.tt: "Peut déclarer la ['concept_total_war',guerre totale] à la §H[from.GetName]§!.\n$shroud.4955.a.tt$"
 shroud.4965.title: "Menace imminente"
 shroud.4965.desc.1.intro: "L'§Haura psionique§! dévastatrice émise par"
 shroud.4965.desc.1.outro: "a continué à se répandre à travers la galaxie. Elle occupe désormais la majorité des systèmes stellaires de notre galaxie."
 shroud.4965.desc.1.contact: "$shroud.4960.desc.1.intro$ la §H[from.GetName]§! $shroud.4960.desc.1.outro$"
 shroud.4965.desc.1.no_contact: "$shroud.4960.desc.1.intro$ une civilisation alien avec laquelle nous n'avons aucun contact $shroud.4960.desc.1.outro$"
 shroud.4965.desc.2: "Si nous n'agissons pas au plus vite, c'est la catastrophe galactique assurée."
 shroud.4965.a: "C'est notre dernière chance"
 the_reckoning_chain_title: "Le Jugement"
 the_reckoning_chain_desc: "Notre accord avec $end_of_the_cycle_color_article$ a mené à la destruction de la §H[this.GetName]§!, ne laissant rien d'autre que les vestiges d'un empire autrefois puissant.\n\nL'intention destructrice de notre ancien mécène a désormais pris la forme d'un immense être énergétique : le §R$NAME_Reckoning$§!. La créature passe d'un monde à l'autre en consommant leurs populations pour restaurer sa force."
