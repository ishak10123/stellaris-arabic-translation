 # Eater of Worlds accords
 ACCORD_FRENZY: "Frénésie"
 ACCORD_FRENZY_desc: "$the_eater_of_worlds_article_cap$ imprègne nos forces d'une rage frénétique."
 ACCORD_HUNGER: "Faim"
 ACCORD_HUNGER_desc: "$the_eater_of_worlds_article_cap$ a soif de conflits."
 ACCORD_DOOM: "Condamnation"
 ACCORD_DOOM_desc: "Nous allons déchaîner la volonté destructrice du $the_eater_of_worlds$ contre nos ennemis."
 ACCORD_DOOM_TT: "Fait apparaître la flotte §Y$Name_Doom_Eater_Fleet$§!.\n\nSa puissance est proportionnelle à l'§Yintensité de la condamnation§!.\nIntensité de la condamnation actuelle : §Y[GetEaterOfWorldsDoomIntensity]/50§!\n\nClasses de vaisseaux disponibles : [GetEaterOfWorldsShipClasses]\n\n§RToute flotte §Y$Name_Doom_Eater_Fleet$§! existante sera démantelée.§!"
 ACCORD_DIGEST: "Digestion"
 ACCORD_DIGEST_desc: "L'appétit infini du $the_eater_of_worlds$ doit être assouvi."
 ACCORD_DIGEST_TT: "§Y$DEVASTATION$§! sur les mondes de nos adversaires couverts par notre §Haura psionique§! : §G+$@accord_digest_devastation|0$§!\n§Y$HULL$§! et §Yblindage§! des vaisseaux de nos adversaires couverts par notre §Haura psionique§! : §G$@accord_digest_ship_malus|0%$§!\n$ACCORD_LOOSE_INTENSITY$"
 # Cradle of Souls accords
 ACCORD_CHARITY: "Confiance"
 ACCORD_CHARITY_desc: "La charité contagieuse du $the_cradle_of_souls$ attire les autres plus près de notre confiance."
 ACCORD_TRUST: "Vision"
 ACCORD_TRUST_desc: "$the_cradle_of_souls_article_cap$ s'exprime à travers de nombreuses bouches, et nous partageons dorénavant sa voix."
 ACCORD_THOUGHTBOND: "Lien mental"
 ACCORD_THOUGHTBOND_desc: "$the_cradle_of_souls_article_cap$ accorde une harmonie de pensée sans précédent."
 ACCORD_THOUGHTBOND_TT: "$mod_pop_factions_produces_mult$ : §G+$@accord_thoughtbond_faction_output|0%$§! pendant §H$@accord_duration|0$§! ans"
 ACCORD_THOUGHTBOND_TT_gestalt: "$mod_planet_jobs_unity_produces_mult$: §G+$@accord_thoughtbond_unity_from_jobs|0%$§! pendant §H$@accord_duration|0$§! ans"
 ACCORD_FAVOR: "Faveur"
 ACCORD_FAVOR_desc: "$the_cradle_of_souls_article_cap$ mesure la diplomatie à l'aide d'un pouvoir de valeur."
 ACCORD_FAVOR_TT: "Consume toutes les faveurs des autres empires couverts par notre §Haura psionique§! et confère de l'unité et de l'influence pour chacune d'entre elles.\n$ACCORD_LOOSE_INTENSITY$"
 # Composer of Strands accords
 ACCORD_LIFE: "Croissance"
 ACCORD_LIFE_desc: "$the_composer_of_strands_article_cap$ fructifie et nous, nous semons."
 ACCORD_FERTILITY: "Vigueur"
 ACCORD_FERTILITY_desc: "$the_composer_of_strands_article_cap$ nous bénit d'une influence féconde."
 ACCORD_TRANSFORMATION: "Transformation"
 ACCORD_TRANSFORMATION_desc: "$the_composer_of_strands_article_cap$ sculpte les mondes selon sa volonté."
 ACCORD_TRANSFORMATION_TT: "Un monde inhabitable aléatoire compris dans nos frontières se transforme en §Hmonde Gaïa§! de taille §G$@accord_transformation_gaia_world_size|0$§!."
 ACCORD_GENERATION: "Expansion"
 ACCORD_GENERATION_desc: "La volonté du $the_composer_of_strands$ s'épanouit en notre présence."
 ACCORD_GENERATION_TT: "$@accord_generation_pop_gain|0$ £pop£§Ypops§! de notre espèce principale sont ajoutées à toutes les colonies situées dans notre §Haura psionique§!\n$ACCORD_LOOSE_INTENSITY$"
 # Instrument of Desire accords
 ACCORD_PROGRESS: "Avancée"
 ACCORD_PROGRESS_desc: "$the_instrument_of_desire_article_cap$ se délecte du progrès."
 ACCORD_BLISS: "Béatitude"
 ACCORD_BLISS_desc: "$the_instrument_of_desire_article_cap$ nous enveloppe d'une écoeurante félicité."
 ACCORD_ASCENSION: "Ascension"
 ACCORD_ASCENSION_desc: "Aucune restriction matérielle ne limite la prospérité de $the_instrument_of_desire_article$."
 ACCORD_ASCENSION_TT: "Supprime le coût de notre prochaine §Yascension planétaire§!."
 ACCORD_ASCENSION_FAIL_TT: "$TRIGGER_FAIL$§RAucune ascension planétaire effectuée depuis la dernière activation§!"
 ACCORD_EXPLOITATION: "Exploitation"
 ACCORD_EXPLOITATION_desc: "$the_instrument_of_desire_article_cap$ aspire à davantage que de satisfaire les besoins primaires. Ce qu'il souhaite, c'est la surabondance."
 ACCORD_EXPLOITATION_TT: "Ressources des emplois pour $pop_group_unit$ [entertainer.GetIcon][entertainer.GetNamePlural_lower] dans toutes les colonies possédées pendant §H$@accord_duration|0$§! ans : §G+$@accord_exploitation_resources_from_jobs|0%$§!\n$ACCORD_LOOSE_INTENSITY$"
