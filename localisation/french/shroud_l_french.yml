 job_superstitious_beliefs_high_priest_desc: "Utilisant les étoiles comme guides, ces personnalités mystiques sont à la tête des institutions spirituelles de l'empire."
 job_superstitious_beliefs_high_priest_effect_desc: "Les £job_superstitious_beliefs_high_priest£hauts astrologues transforment les £consumer_goods£§Ibiens de consommation§! en £unity£§Iunité§! et en £stability£§Istabilité§!"
