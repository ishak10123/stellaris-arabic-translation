 policy_psionic_choir: "Choeur psionique"
 policy_psionic_choir_desc: "Les télépathes se rassemblent pour s'harmoniser avec les énergies du Suaire. Les mélodies qu'ils émettent entrent en résonance avec la population psionique de l'empire, unissant et élevant la volonté de tous."
 song_of_calming: "Chant de l'apaisement"
