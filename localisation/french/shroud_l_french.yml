 job_test_subject: "Sujets d'étude"
 job_test_subject_plural: "Sujets d'étude"
 job_test_subject_desc: "Condamnés pour activités criminelles, ces individus se rendent utiles comme sujets d'étude pour des expériences technologiques."
 job_test_subject_effect_desc: "Les £job_test_subject£sujets d'étude sont utilisés pour produire de la §Yrecherche§! et des £amenities£§Iservices§!"
