 job_corpse_reader_plural: "Décodeurs de cadavres"
 job_corpse_reader_desc: "En observant et en interprétant la décomposition unique de chaque cadavre, nous percerons les mystères de la galaxie."
 corpse_broker: "Trafiquant de cadavres"
