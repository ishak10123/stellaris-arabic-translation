 # Establishing the Chamber of Silence
 shroud.2820.name: "Établissement de la chambre du silence"
 shroud.2820.desc.1: "Plus notre maîtrise du psionisme croît, plus les murmures provenant de l'autre côté du voile se font entendre. La §RVoix§!, plus forte et plus audible que jamais, se faufile dans ce flot de pensées et dans les sombres recoins de notre esprit.\n\n§R« OUVREZ LA VOIE. »§!"
 shroud.2820.desc.2.intro: "Nous devons filtrer les bruits parasites."
 shroud.2820.desc.2.chamber: "$shroud.2820.desc.2.intro$ Nous avons construit $shroud.2820.desc.2.outro$"
 shroud.2820.desc.2.no_chamber: "$shroud.2820.desc.2.intro$ Nous avons dessiné les plans d'$shroud.2820.desc.2.outro$"
 shroud.2820.desc.2.outro: "un bâtiment isolé afin que ceux possédant les pouvoirs psioniques les plus avancés puissent entendre les instructions de la §RVoix§! avec une clarté des plus limpides."
 shroud.2820.a.chamber: "Nos esprits s'ouvrent de plus en plus"
 shroud.2820.a.no_chamber: "Construisons cette « chambre du silence »"
 CONTINUE_SITUATION: "Poursuivre la §Ysituation§! :"
 shroud.2820.a.tt: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2820.a.tt_no_chamber: "Adoptez la tradition §H$tr_psionics_endbringers_cult$§! et construisez un bâtiment §H$building_chamber_of_silence$§! pour faire progresser la situation."
 # The Great Awakening
 shroud.2830.name: "$utopia.2650.name$"
 shroud.2830.desc: "À l'intérieur de la chambre du silence, nous entendons clairement le message de la §RVoix§!.\n\n§R« TOUT RENAÎTRA. »§!\n\nNous comprenons à présent. La Fin est une renaissance, et nous ne devons pas la craindre. Nous renaîtrons, meilleurs et plus forts que nous n'aurions pu l'imaginer.\n\nPour saisir ce destin, nous devons maîtriser le royaume psychique qu'est le §HSuaire§!. Nous ne reproduirons pas les erreurs de ceux que nous avons découverts sur le monde enveloppé du Suaire. Ils ont renié leur peur, nous l'accepterons."
 shroud.2830.desc.outro.awakening: "Notre vision est claire"
 shroud.2830.desc.outro.no_awakening: "Notre vision est presque claire"
 shroud.2830.a.awakening: "Le Suaire est la clé"
 shroud.2830.a.no_awakening: "$shroud.2780.a$"
 shroud.2830.a.tt: "$tr_psionics_psionic_assimilation_desc$\n$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2830.a.tt_no_awakening: "Adoptez la tradition §H$tr_psionics_shroud_great_awakening$§! pour faire progresser la situation."
 # Blind the Willing - First select event
 shroud.8320.name: "Une vision claire"
 shroud.8320.desc: "§H[blinded_leader.GetName]§! nous a montré la voie. Nos sens superflus brouillent l'appel de la §RVoix§!. En éliminer un nous permet d'améliorer nos capacités psychiques.\n\nRenoncer à nos [Species.GetEyeNamePlural] est la meilleure solution. Notre vision dans le monde physique obscurcit notre perception du §HSuaire§!. De nombreux [Root.GetSpeciesNamePlural] ont déjà suivi l'exemple inspirant de §H[blinded_leader.GetName]§! et ôté leurs [Species.GetEyeNamePlural] sans la moindre hésitation.\n\nCes derniers sont comblés, l'esprit empli des louanges de la §RVoix§!."
 shroud.8320.a: "Vue par-delà la vue"
 leader_trait_blinded: "Aveugle"
 leader_trait_blinded_desc: "Il y a encore tant de choses à voir."
 # A Leap of Faith - First select event
 shroud.8330.name: "Acte de foi"
 shroud.8330.desc: "En proie à la frustration à cause de nos limites physiques, §H[forsaken_leader.GetName]§! a tenté d'accélérer sa transformation psionique en buvant un poison mortel lors d'une démonstration publique des plus dramatiques.\n\nÀ sa mort, son corps s'est teinté d'un violet vif et s'est désintégré en une fine poussière d'énergie psionique pure. Ce miracle a été rendu possible par la volonté de la §RVoix§!.\n\nCe fut un signe on ne peut plus clair : §H[forsaken_leader.GetName]§! nous a montré la voie, nous devons la suivre."
 shroud.8330.a: "Notre forme physique ne doit pas être un frein"
 # Mid-stage events
 shroud.8350.name: "Lobotomie"
 shroud.8350.desc: "Certains [owner.GetSpeciesNamePlural] ont du mal à cohabiter avec la §RVoix§!.\n\nDésespérés de retrouver la paix, les plus faibles d'entre nous ont recours à des procédures de lobotomie rudimentaires et non réglementées. Si aucune mesure n'est prise, ces pratiques risquent de se généraliser."
 shroud.8350.a: "Laissons les faibles faire ce qu'ils veulent"
 shroud.8350.b: "La §RVoix§! est une bénédiction, interdisons ces pratiques"
 endbringers_voice_plague: "En proie aux voix"
 endbringers_voice_plague_desc: "Lorsque les voix s'expriment, nous n'avons d'autre choix que d'écouter."
 shroud.8360.name: "Auto-expérimentation psionique"
 shroud.8360.desc: "Nous continuons à suivre la §RVoix§!, qui nous transmet des vérités indéniables.\n\nDe nombreux [owner.GetSpeciesNamePlural] cherchent d'autres moyens d'amplifier la §RVoix§! et d'accéder plus efficacement à sa sagesse.\n\nL'usage de drogues provenant du marché noir a considérablement augmenté, et des établissements médicaux non réglementés proposent des services expérimentaux visant à maximiser la sensibilité psionique.\n\nOù ces pratiques nous mèneront-elles ?"
 shroud.8360.a: "Faisons tout ce qui est en notre pouvoir pour amplifier la §RVoix§!"
 shroud.8360.b: "Nous devons empêcher le chaos de s'installer"
 shroud.8370.name: "Cauchemars apocalyptiques"
 shroud.8370.desc: "À mesure que nos capacités psioniques s'accroissent, nous sommes tourmentés par d'horribles cauchemars annonçant la fin de l'univers.\n\nNos rêves sont devenus des prophéties apocalyptiques, intensifiant la peur existentielle ressentie par la population. Le sommeil s'est transformé en torpeur anxieuse, empêchant de nombreux individus de mener une vie normale.\n\nDans nos rêves, la §RVoix§! nous dit :\n\n§R« ACCEPTEZ LE CHAOS. »§!"
 shroud.8370.a: "Tout commencement a une fin"
 shroud.8370.b: "Faisons de la chambre du silence un refuge"
 endbringers_apocalyptic_nightmares: "Cauchemars apocalyptiques"
 endbringers_apocalyptic_nightmares_desc: "La Voix interrompt nos cycles de sommeil par l'irruption de visions cataclysmiques."
 endbringers_nightmare_shelter: "Refuge anti-cauchemars"
 endbringers_nightmare_shelter_desc: "La chambre du silence offre un refuge aux victimes de cauchemars cataclysmiques."
 shroud.8380.name: "Marque de la Fin"
 shroud.8380.desc: "Le nombre de cas d'automutilation augmente au sein de la population.\n\nLes adeptes les plus fervents de la §RVoix§! gravent les mots « La Fin » sur leur corps, affirmant que cela leur apporte une bénédiction terrible.\n\nQue cela soit vrai ou non, le nombre d'individus pratiquant ce rituel croît rapidement. Est-ce réellement la volonté du §HSuaire§! ?"
 shroud.8380.a: "Nous portons cette marque avec fierté"
 shroud.8380.a.tt: "La moitié de notre population reçoit le trait ['trait:trait_marked']."
 shroud.8380.b: "Cette pratique n'a aucun sens"
 approach_blind_selected_tt: "L'approche $approach_situation_breach_shroud_endbringers_blind$ n'a pas été sélectionnée."
 approach_forsake_selected_tt: "L'approche $approach_situation_breach_shroud_endbringers_forsake_flesh$ n'a pas été sélectionnée."
 trait_marked: "Marque indélébile"
 trait_marked_desc: "En signe de leur dévouement effrayant, les membres de cette espèce ont gravé les mots « La Fin » sur leur corps."
 trait_marked_unity_bonus: "£unity£ suscitée par 100 £pops£pops : §G+0.06§!"
 endbringers_sanity: "Un îlot de lucidité dans un océan de folie"
 endbringers_sanity_desc: "La forte volonté de rester sains d'esprit nous empêche d'être entraînés dans les méandres de la folie."
 # Breach the Shroud
 shroud.2840.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2840.desc: "$shroud.2800.intro$ Une sinistre entité au pouvoir incommensurable surgit des profondeurs immatérielles. Il s'agit de la §RVoix§!, qui transperce notre psyché la plus intime avec une force redoutable.\n\n§R« DÉCOUVREZ MON NOM. »§!\n\nCe n'est que maintenant que nous réalisons à quel point nos petits esprits sont éloigné de la §RVoix§!. Le sceau est brisé, et bientôt, notre véritable nature sera pleinement révélée.\n\nNos télépathes sont prêts à plonger au coeur du Suaire afin de découvrir le vrai nom de notre grand mécène."
 shroud.2840.a: "L'heure de la communion est venue"
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE: "Communier avec la §RVoix§!"
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_DESC: "Nous nous sommes rassemblés sur [capital_scope.GetName] dans un seul et unique but.\n\nNous allons pénétrer au plus profond du §HSuaire§! afin de contraindre cette §RVoix§! d'une puissance extraordinaire à nous reconnaître et à communier avec nous.\n\nNous l'avons appelée le Cataclysme. D'autres l'ont appelée le Jugement. Elle va désormais nous révéler son véritable nom, et cette connaissance nous permettra d'atteindre la grandeur."
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_PROJECT_TOOLTIP: "Pour terminer ce projet, §Hvisitez le Suaire§! 3 fois. ([GetEndbringersDelveCount]/3)"
 # EotC Delve Events
 shroud.8420.title: "L'épreuve du silence"
 shroud.8420.desc: "Alors que nous pénétrons dans le Suaire, notre volonté unifiée étouffe les bruits parasites qui pourraient détourner notre attention de notre objectif portant le nom de §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!.\n\nMais notre détermination seule ne suffit pas à nous protéger. Des murmures essaient de nous séduire avec des futilités toutes plus insignifiantes les unes que les autres, mais toutes aussi tentantes.\n\nAlors que notre point de rupture approche, l'entité revient. Un ordre résonne dans le vide :\n\n§R« SILENCE. »§!"
 shroud.8420.a: "Gardons le silence et tenons bon"
 shroud.8420.a.reply: "Cet ordre transperce le chaos, élimine le bruit et éradique le désordre qui menaçait de nous engloutir. Notre psyché tient bon malgré la fragmentation.\n\nL'entité nommée §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! s'enfonce davantage dans le Suaire. La clarté qui s'ensuit est pour ainsi dire tout aussi assourdissante. Elle comble les zones vides de nos esprits et nous lègue une détermination nouvelle.\n\nEt des cadeaux. De merveilleux cadeaux."
 shroud.8420.a.tooltip: "§Y$endbringers_madness_1$§! perd l'effet suivant :\n$t$$MOD_POP_AMENITIES_USAGE_MULT$ : $@madness_base_pop_amenities_usage_mult|0=-%$"
 shroud.8430.title: "L'épreuve de pureté"
 shroud.8430.desc: "Alors que nous pénétrons plus profondément dans le Suaire, nous sommes témoins de la corruption d'un chaos conscient.\n\nDes esprits oisifs et putrides créent des turbulences psioniques qui contaminent le Suaire d'une pourriture fétide. Dans ce chaos répugnant, la présence accablante de l'entité nommée §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! se fait sentir.\n\nSa malveillance écrase le chaos et se répand dans notre esprit. Nous nous préparons à l'absolution lorsqu'un ordre résonne dans le vide :\n\n§R« ORDRE. UNITÉ. »§!"
 shroud.8430.a: "Tenons bon !"
 shroud.8430.a.reply: "L'ordre traverse le chaos malveillant.\n\nDe nombreuses voix hurlent de douleur lorsque l'entité nommée §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! balaie les distorsions conscientes qui gangrènent le Suaire. Il ne reste alors qu'un royaume purifié de toute imperfection.\n\nAlors que l'entité s'enfonce encore plus profondément dans le Suaire, nous observons et étudions le résultat de sa purification."
 shroud.8430.a.tooltip: "§Y$endbringers_madness_2$§! perd l'effet suivant :\n$t$$mod_planet_pops_upkeep_mult$ : $@madness_base_planet_pops_upkeep_mult|0=-%$"
 shroud.8440.title: "L'épreuve du feu"
 shroud.8440.desc: "À notre entrée dans le Suaire, la douleur nous assaille. Les habituelles brumes psioniques se sont muées en flammes qui consument notre esprit.\n\nÀ travers ce supplice, nous percevons des villes s'effondrant sous la lave, des planètes englouties par les flammes, et des populations entières se tordant de douleur tandis que des flammes spectrales réduisent leurs corps à l'état de cendres fumantes.\n\nAu coeur du bûcher, nous sentons la présence de l'entité nommée §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!. Alors que sa puissance menace de consumer la réalité, elle ordonne :\n\n§R« LIBÉRATION. »§!"
 shroud.8440.a: "Faisons pénitence"
 shroud.8440.a.reply: "Les flammes psioniques engloutissent nos esprits et brûlent notre complaisance, ne laissant derrière elles qu'une détermination purifiée.\n\nNous comprenons désormais la glorieuse raison d'être et la simplicité grandiose de cette entité nommée §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!."
 shroud.8450.title: "$utopia.3310.name$"
 shroud.8450.desc: "Une proclamation retentit :\n\n§R« VOUS CONNAISSEZ MON NOM. »§!\n\nNotre voyage à travers les étoiles est à son apogée : nous tenons enfin la réponse à des siècles de questions. $end_of_the_cycle_color_article_cap$ nous oblige. Notre accord est établi.\n\n§R« C'EST LE DÉBUT DE LA FIN. »§!\n\nDouleur, agitation, certitude. Les mots s'estompent et notre destin est scellé.\n\nNous la voyons désormais : une galaxie plongée dans le silence, empreinte de l'inévitabilité de l'§Raura de fin§!."
 shroud.8450.a: "Une fin inévitable nous attend"
 shroud.8450.a.homicidal: "De belles horreurs nous attendent"
 shroud.8450.a.tech_tooltip: "Technologies découvertes :\n£society£['technology:tech_psionic_aura']\n£society£['technology:tech_aura_intensification']"
 embracing_the_end: "Accepter la Fin"
 embracing_the_end_desc: "Nous voyons enfin la beauté de la Fin. Accueillons-la avec joie."
 MOD_SHIP_PSIONIC_AURA_SPEED_MULT: "$MOD_SHIP_SPEED_MULT$au sein d'une aura psionique "
 MOD_SHIP_PSIONIC_AURA_FIRE_RATE_MULT: "$MOD_SHIP_FIRE_RATE_MULT$au sein d'une aura psionique "
 end_of_the_cycle_endbringers: "$end_of_the_cycle_article_cap$"
 situation_end_of_the_cycle_endbringers_desc: "Notre accord avec $end_of_the_cycle_color_article$ nous confère un pouvoir incommensurable et nous charge d'une prestigieuse mission.\n\nLa volonté de notre mécène exige l'anéantissement total de cette réalité. À chaque système consumé par l'§Haura de fin§!, le néant miséricordieux se rapproche un peu plus.\n\nNous serons les témoins de l'inévitable.\n\nSystèmes restant à conquérir : [Owner.GetEndCycleGalaxySystemsLeft]"
 end_of_the_cycle_endbringers_monthly_change_tooltip: "$end_of_the_cycle_monthly_change_tooltip$"
 situation_end_of_the_cycle_endbringers_finish_effects: "§RLe Jugement attend.§!"
 approach_situation_end_of_the_cycle_bring_the_inevitable: "Déclencher l'inévitable"
 approach_situation_end_of_the_cycle_stall_for_time: "Gagner du temps"
 approach_situation_end_of_the_cycle_delay_your_destiny: "Retarder notre destinée"
 shroud.8460.title: "Sablier retourné"
 shroud.8460.desc: "Le pouvoir de $end_of_the_cycle_color_article$ a un prix, et le temps qui nous est imparti est bientôt écoulé.\n\nLa galaxie n'est pas encore imprégnée de l'aura purificatrice de notre mécène, et les efforts que nous avons déployés jusqu'à présent n'ont été que minimes.\n\nUne nouvelle énergie afflue de l'autre côté du voile pour nous aider à accomplir cette tâche colossale. C'est la bénédiction promise !"
 shroud.8460.a: "Tout n'est pas perdu"
 shroud.8470.title: "La Fin est proche"
 shroud.8470.desc: "Le pouvoir de notre mécène est inouï, mais le temps presse. Une telle incompétence ne saurait être tolérée par la miséricorde de $end_of_the_cycle_color_article$.\n\nIl reste toutefois un mince espoir. Quoi qu'il en coûte, nous devons recouvrir la galaxie de l'aura de fin. Dans cette situation désespérée, nos [GetTelepathPlural] puisent désormais toute l'énergie possible au sein du §HSuaire§!."
 shroud.8470.a: "L'échec n'est pas une option !"
 shroud.8480.title: "$GALACTIC_FOCUS$ abrogée"
 shroud.8480.desc: "La résolution ayant désigné l'émetteur de l'§Haura psionique§! destructrice comme cible prioritaire des opérations de défense a été abrogée par le Sénat galactique. Par voie de fait, toutes les opérations militaires en cours conduites par les membres de la Communauté contre §H[former_malevolent_aura.GetName]§! doivent immédiatement cesser. Pour l'heure, la paix est revenue."
 shroud.8481.desc: "Le Sénat galactique a abrogé la résolution nous désignant comme cible de ses « opérations de défense », et tous les membres de la Communauté ont reçu ordre de mettre fin immédiatement aux hostilités. Toute opération militaire a désormais cessé. Pour l'instant, tout au moins."
 shroud.8481.homicidal: "$shroud.8480.desc$\n\n$crisis.4111.nasty$"
 shroud.8500.title: "Les messagers de la Fin"
 shroud.8500.desc.intro: "La volonté inéluctable de notre mécène renforce son emprise sur la galaxie. Nous savons désormais comment la Fin viendra.\n\nNous devons répandre l'§Raura de fin§! dans toute la galaxie. Lorsque le monde physique fusionnera avec l'essence pure du §HSuaire§!, l'anéantissement s'abattra."
 shroud.8500.desc.outro: "Cette immense mission sera notre plus grande réalisation et la porte vers le salut ultime."
 shroud.8500.desc.homicidal: "$shroud.8500.desc.intro$\n\nL'éradication de toute vie dans la galaxie sera une conséquence bienvenue. $shroud.8500.desc.outro$"
 shroud.8500.desc.default: "$shroud.8500.desc.intro$\n\n$shroud.8500.desc.outro$"
 shroud.8500.a: "L'échec n'est pas permis"
 shroud.8600.title: "$shroud.4970.title$"
 shroud.8600.desc.intro: "C'était notre destin.\n\nL'§Raura de fin§! enveloppe la galaxie, et la population de [Root.GetHomeWorldName] est entrée dans un état d'euphorie frénétique, célébrant"
 shroud.8600.desc.outro: "Une renaissance grandiose est à nos portes, promise depuis notre grand éveil.\n\nDevant nous, toute existence est engloutie par le vide. La destruction et l'anéantissement sont devenus les seules lois de la galaxie, et un à un, les mondes qui la peuplent retournent à néant.\n\nNous sommes les derniers. Le vide qui s'approche de nous est magnifique... Nous le voyons déjà dans les affres d'une nouvelle forme fragile. La Fin est arrivée, et un nouveau Commencement s'amorce."
 shroud.8600.desc.homicidal: "$shroud.8600.desc.intro$ la disparition de tout ce qui n'est pas nous. $shroud.8500.desc.outro$"
 shroud.8600.desc.default: "$shroud.8600.desc.intro$ notre salut. $shroud.8600.desc.outro$"
 shroud.8600.a: "Il n'y a pas de fin définitive..."
 shroud.8610.title: "Le prix de la faiblesse"
 shroud.8610.desc.intro: "Nous avons échoué. À cause de notre faiblesse, la volonté de $end_of_the_cycle_color_article$ n'a pas abouti. Nous devons désormais payer le prix de notre incompétence.\n\nElle a tout emporté. En un instant, si rapidement qu'il n'y avait aucunement moyen de réagir, encore moins de répliquer, la [Root.GetName] a... disparu. Là où se trouvaient autrefois des colonies prospères, il n'y a maintenant plus que ruines. Là où autrefois des flottes puissantes franchissaient le néant, il n'y a plus que silence et débris. Tous ont été dévorés par la Fin. Tous ont été pris par le §HSuaire§!."
 shroud.8610.desc.outro: "Notre mécène a fait apparaître une gigantesque entité du Suaire au-dessus de [former_capital.GetName]. Rendue incommensurablement puissante par toutes les consciences de nos psioniques qu'elle a dévorés, elle erre désormais dans la galaxie afin d'achever la mission que nous n'avons su mener à bien."
 shroud.8610.desc.a: "$shroud.8610.desc.intro$\n\n$shroud.8610.desc.outro$"
 shroud.8610.desc.b: "$shroud.8610.desc.intro$\n\nLa plupart des [Root.GetSpeciesNamePlural] ont accepté ce destin, mais une minorité d'infidèles ont refusé de se soumettre à la volonté ultime de notre mécène. Dirigés par §H[Root.GetRulerName]§!, redoutable psychiste qui avait prédit ce qui allait arriver, ils se sont exilés sur un monde hors de portée de la Fin.\n\n$shroud.8610.desc.outro$ Lorsque ce sera fait, le tour des exilés viendra."
 shroud.8610.a: "Peut-être était-ce notre véritable destin"
 shroud.8610.b: "Les exilés pourront-ils réellement lui échapper ?"
 shroud.8710.title: "Survivants de l'apocalypse"
 shroud.8710.desc: "C'est fini. Le §RJugement§! n'est plus.\n\n$end_of_the_cycle_color_article_cap$ est retournée dans les profondeurs du §HSuaire§!, et la menace qu'elle faisait peser sur notre réalité a été écartée. Pour l'instant.\n\nAlors que le cadavre de son avatar quittait ce monde, des restes ont pu être récupérés. Malgré sa mort, nos télépathes détectent une grande quantité d'énergie psionique, bien plus puissante que le fragment récupéré sur §H[shrouded_planet.GetName]§!.\n\nCe concentré d'inévitabilité pourra être utilisé pour reconstruire la galaxie qui a survécu au Jugement.\n\nLa Fin est venue puis s'en est allée, mais nous sommes toujours là."
 shroud.8710.a: "Était-ce là notre réel destin ?"
 r_core_of_the_reckoning: "Noyau du Jugement"
 r_core_of_the_reckoning_desc: "Ce noyau, récupéré parmi les restes du Jugement, émet une puissante énergie psionique."
 core_of_reckoning_active_effect_tt: "Permet la £decision£§Ydécision planétaire§! : ['concept_banish_decision']"
 decision_banish: "Bannir"
 decision_banish_desc: "En laissant le Suaire consumer cet endroit, le noyau du Jugement retrouve l'équilibre."
 decision_banish_effects_tt: "Envoyer cette planète dans le Suaire."
 concept_banish_decision: "$decision_banish$"
 concept_banish_decision_desc: "$decision_banish_desc$\n$decision_banish_effects_tt$\nConfère le modificateur §Y$shroud_surge$§! pendant §Y10§! ans :\n$shroud_surge_effects$"
 shroud_surge: "Déferlement du Suaire"
 shroud_surge_desc: "L'équilibre du noyau du Jugement a été temporairement rétabli."
 shroud_surge_effects: "Double les effets passifs du §Ynoyau du Jugement§!."
 #======================
 # Shroud Leaders
 #======================
 ganthuata: "Ganthuata"
 ganthuata_desc: "Fidèle disciple du $the_cradle_of_souls$ cherchant à partager ses vérités profondes avec ceux qui sont prêts à les recevoir."
 ganthuata_catch_phrase: "Nous nous blottissons dans les bras du Berceau."
 leader_trait_disciple_of_the_cradle: "Disciple du Berceau"
 leader_trait_disciple_of_the_cradle_desc: "Ce que l'on voit nourrit ce que l'on sait. $the_cradle_of_souls_article_cap$ devient plus sûr à mesure que nous observons nos voisins."
 leader_trait_disciple_of_the_cradle_envoys_zro: "$t$- Les émissaires affectés aux mécènes génèrent §G+0.5§! de £zro£§Yzro§! par mois"
 shroud.12010.desc: "§HNotre communion avec le Suaire a fait naître une nouvelle voix. Chaude et douce, elle résonne à la fois dans le monde physique et le monde psychique.§!\n\nBonjour. Je m'appelle Ganthuata, et je suis à la recherche d'individus partageant les mêmes idéaux que moi et ayant trouvé la voie véritable. Le message du $the_cradle_of_souls$ vous est-il familier ?"
 shroud.12010.name: "$ganthuata$"
 shroud.12010.a: "Nous avons déjà entendu parler du $the_cradle_of_souls$, oui. Pourquoi ?"
 shroud.12010.a.response: "Pourquoi ? Les voyageurs posent des questions à ceux dont ils croisent la route afin de mieux les comprendre. Lorsque vous me répondez, j'apprends."
 shroud.12010.b: "Que voulez-vous ?"
 shroud.12010.b.response: "Que peuvent bien désirer ceux qui ont été élevés par le Berceau ? Tout d'abord, je souhaite votre amitié. Pendant de longues années, j'ai cherché des esprits en phase avec la splendeur du Berceau, et aujourd'hui, toute une civilisation s'éveille dans sa lumière."
 shroud.12010.c: "En quoi pouvez-vous nous aider ?"
 shroud.12010.c.response: "Je peux vous aider à diffuser votre message à travers les étoiles. Ensemble, guidons la galaxie vers la douce étreinte du Berceau."
 shroud.12010.hire_custom_tooltip: "§Y$ganthuata$§! va devenir une §Hpersonnalité§! de la §Y[Root.GetName]§!."
 koborokra: "Koborok'Ra"
 koborokra_desc: "Ex-soldat ayant subi des tortures psioniques extrêmes aux mains de ses ennemis il y a bien longtemps. C'est aujourd'hui un amiral tourmenté, à la soif de destruction inextinguible."
 koborokra_catch_phrase: "Le sang doit couler."
 leader_trait_disciple_of_the_eater: "Porte-sang"
 leader_trait_disciple_of_the_eater_desc: "Cette personnalité a conclu un pacte de sang avec $the_eater_of_worlds_article$."
 leader_trait_disciple_of_the_eater_attunement_effect: "Harmonie avec $the_eater_of_worlds_article$ : §G+$@disciple_of_the_eater_combat_attunement$§! par bataille de flottes remportée"
 leader_trait_disciple_of_the_eater_zro_fleet_attack_effect: "$t$- $i_zro$ : §G+$@disciple_of_the_eater_zro_fleet_attack|1$§! par pourcent de dévastation causée par les bombardements orbitaux"
 leader_trait_disciple_of_the_eater_zro_army_attack_effect: "$t$- $i_zro$ : §G+$@disciple_of_the_eater_zro_army_attack|0$§! par pourcent de dévastation causée par les armées d'assaut"
 shroud.12020.name: "$koborokra$"
 shroud.12020.desc: "§HUne armure usée par les combats et une cape maculée de sang dissimulent une silhouette masquée. Un grognement rauque rompt le silence.§!\n\nCette galaxie mérite de souffrir. Je devine que vous partagez ce sentiment.\n\n§HL'amiral poursuit en caressant le manche de sa somptueuse épée.§!\n\nOn m'a demandé de vous rejoindre, mais $the_eater_of_worlds_color_article$ reste mon véritable maître."
 shroud.12020.desc.covenant: "$shroud.12020.desc$ Il est également le vôtre."
 shroud.12020.desc.no_covenant: "$shroud.12020.desc$ Un jour, il deviendra peut-être le vôtre."
 shroud.12020.a: "Pourquoi nous ?"
 shroud.12020.a.response: "Ensemble, nous pouvons étouffer même les étoiles les plus reculées de la galaxie. Il y a des limites à la souffrance que l'on peut infliger seul."
 shroud.12020.b: "Pourquoi devrions-nous vous faire confiance ?"
 shroud.12020.b.response: "$the_eater_of_worlds_article_cap$ contrôle le moindre de mes mouvements. Je lui ai juré allégeance, et j'ai vu ce moment dans mes rêves. Sa volonté est que je vous serve. Votre refus scellerait mon destin."
 shroud.12020.c: "Pourquoi servez-vous $the_eater_of_worlds_article$ ?"
 shroud.12020.c.response: "J'ai été trahi, brisé et plongé dans l'agonie. C'est alors que $the_eater_of_worlds_article$ s'est adressé à moi. Il m'a donné ce dont j'avais besoin pour survivre... un tissu ensanglanté pour recouvrir mes blessures sanglantes. Il m'a donné le pouvoir de couper les mains qui m'avaient tant fait souffrir. Je lui suis donc redevable."
 shroud.12020.d: "Que pouvez-vous nous offrir ?"
 shroud.12020.d.response: "Ensemble, nous envelopperons d'innombrables systèmes de flammes purificatrices et savourerons la symphonie des cris. Nous regarderons les mondes brûler et offrirons à la galaxie un spectacle qu'elle n'oubliera jamais. Tel est notre destin."
 shroud.12020.hire_custom_tooltip: "§Y$koborokra$§! va devenir une §Hpersonnalité§! de la §Y[Root.GetName]§!."
 morr: "Morr"
 morr_desc: "Son exposition prolongée aux veines instables lors de ses nombreuses quêtes de $zro_lower$ a entraîné la création d'un lien fort et démentiel avec $the_instrument_of_desire_article$. Aujourd'hui, cette connexion lui permet de jouir d'une richesse démesurée en dépouillant les mondes de leurs ressources et en les revendant à des prix exorbitants."
 morr_catch_phrase: "Tout ce qui brille nous appartient."
 leader_trait_disciple_of_the_instrument: "Coeur avare"
 leader_trait_disciple_of_the_instrument_desc: "Cette personnalité, en parfaite harmonie avec $the_instrument_of_desire_article$, est capable de détecter la présence de ressources même dans les coins les plus inhospitaliers de la galaxie."
 leader_trait_disciple_of_the_instrument_planetary_decision_effect: "- Donne accès à la décision planétaire §Y$decision_divine_deposits$§!"
 decision_divine_deposits: "Rechercher des gisements"
 decision_divine_deposits_desc: "Guidé par la mystérieuse attraction de $the_instrument_of_desire_article$, le gouverneur de cette planète a découvert un gisement de ressources perdu depuis longtemps."
 decision_divine_deposits_tt: "Ajoute une particularité géographique aléatoire."
 shroud.12030.name: "$morr$"
 shroud.12030.desc: "§HLe regard de $morr$ ne se pose jamais, passant sans cesse de l'ombre à la lumière, comme en quête perpétuelle.§!\n\nVous le sentez aussi, n'est-ce pas ? $the_instrument_of_desire_article_cap$ ne reste jamais immobile. Il désire, il dévore, il ordonne.\n\nCe que je vois, je le prends. Aucun trésor de la nature ne résiste à ma volonté. Je vous offre mes services non par loyauté, mais parce qu'ensemble, nous pouvons raser les étoiles et nourrir le vide de ce qui lui est dû."
 shroud.12030.a: "Pourquoi nous ?"
 shroud.12030.a.response: "$the_instrument_of_desire_article_cap$ est avide. De multiples [root.species.GetHandNamePlural] sont nécessaires pour le satisfaire."
 shroud.12030.b: "Que pouvez-vous nous offrir ?"
 shroud.12030.b.response: "Je peux vous aider à extraire toutes les molécules monnayables que la nature possède. Nous ne gaspillerons pas un seul atome.\n\nCeux qui se contentent du minimum sont de pitoyables lâches. Qu'ils meurent. Ensemble, nous prendrons tout."
 shroud.12030.c: "Pourquoi servez-vous $the_instrument_of_desire_article$ ?"
 shroud.12030.c.response: "Autrefois, je traquais tous les minéraux que les étoiles avaient à offrir. Dans un air poussiéreux, avec des capteurs défectueux et des informations erronées... jusqu'à ce que $the_instrument_of_desire_article$ s'adresse à moi.\n\nIl m'a promis une richesse inouïe en échange de mon allégeance.\n\nJe suis donc aujourd'hui à son service et lui livre les ressources que j'extrais. Ma dette est éternelle... mais la richesse est infinie."
 shroud.12030.hire_custom_tooltip: "§Y$morr$§! va devenir une §Hpersonnalité§! de la §Y[Root.GetName]§!."
 kronen: "Kronen le Martyr"
 kronen_desc: "Autrefois visionnaire, ce scientifique reclus est aujourd'hui réduit à l'état de coquille vide, victime des machinations du $the_composer_of_strands$. Seule son intelligence prodigieuse subsiste, brillant faiblement dans l'obscurité telle une étoile mourante."
 kronen_catch_phrase: "Il reste tant à défaire..."
 leader_trait_disciple_of_the_composer: "Brin maudit"
 leader_trait_disciple_of_the_composer_desc: "Plus il façonne la chair, plus la sienne se décompose. $the_composer_of_strands_article_cap$ recrée tous ceux qui cherchent à apprendre son art interdit."
 shroud.12040.name: "$kronen$"
 shroud.12040.desc: "§HAlors que nos capteurs détectent un vaisseau pénétrant notre espace, une voix éraillée résonne à travers le Suaire. Fatiguée et stridente, elle nous est pourtant familière, semblable à celle du $the_composer_of_strands$.§!\n\nDe la nouvelle... [GetKronenFlesh] ? Intéressant. Elle semble très douce et facile à... travailler. Ou peut-être pas ? Difficile à dire. De nombreux noeuds se meuvent sous [GetKronenSkin]. Quelle forme $the_composer_of_strands_article$ m'a-t-il tissée aujourd'hui ?\n\n§HLa communication se stabilise enfin, et une silhouette à nu, semblable à un amas de muscles, apparaît, griffonnant avec frénésie, comme prise de convulsions.§!\n\nVous me voyez tel que je suis. Peut-être suis-je encore $kronen$, ou peut-être pas. Mais tout comme moi, vous êtes une toile déployée pour le pinceau du Composeur. Venez, procédons au dévoilement."
 shroud.12040.a: "Au quoi ?"
 shroud.12040.a.response: "À la mue, si vous préférez. Le processus consistant à éliminer la couche rugueuse et imparfaite qui nous recouvre. Le détissage des brins qui nous lient à notre forme, à la certitude. Vous avez été touchés par le Composeur, vous aussi. Vous avez déjà entamé le processus... Ne sentez-vous pas ce frémissement ?"
 shroud.12040.b: "Pourquoi voulez-vous nous rejoindre ?"
 shroud.12040.b.response: "Ne la sentez-vous pas ? La marque gravée sur chaque brin frémissant. Je dois me défaire, me débarrasser de ce que j'étais, déchirer les fils qui me lient à la chair et regarder mon identité disparaître. Mais vous... vous êtes un empire. Vaste et puissant. Ensemble, nous pourrions tirer sur des fils bien plus grands."
 shroud.12040.c: "En quoi pouvez-vous nous aider ?"
 shroud.12040.c.response: "Je ne vous offre pas simplement mon aide. Ma chair est une bénédiction, une expérience de douleur et de détermination, façonnée par $the_composer_of_strands_article$. Chaque fibre de mon être hurle, mais je persévère, j'étudie et j'apprends. Tout ce que ma douleur a engendré... vous appartient. Tant que nous le façonnons ensemble."
 shroud.12040.hire_custom_tooltip: "§Y$kronen$§! va devenir une §Hpersonnalité§! de la §Y[Root.GetName]§!."
 shroud.12045.desc: "§HÀ mesure que notre population augmente, $kronen$ sombre de plus en plus dans la folie. Sa voix tremble, son corps se tord et se contorsionne, et il pousse des cris rauques de frustration.§!\n\nLes brins sont sans fin... Je les tire et les arrache, mais c'est du solide ! Combien de temps encore vais-je devoir supporter cette horrible forme ? Combien de fois encore vais-je devoir me dépouiller avant que le modèle ne se révèle ?"
 shroud.12045.a: "Quel est le problème ?"
 shroud.12045.a.response: "LE problème ? Comme s'il n'y en avait qu'un... À chaque morceau que j'enlève, à chaque brin brillant que j'arrache, les fils ne font que se resserrer davantage ! Pendant ce temps, $the_composer_of_strands_article$ fredonne sa mélodie nauséabonde et viscérale..."
 shroud.12045.a.response_2: "$shroud.12045.a.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.b: "Avez-vous besoin d'une pause ?"
 shroud.12045.b.response: "Une pause ? Non, surtout pas. Nous ne pouvons pas nous permettre de stagner et de laisser cette misérable chair pourrir dans la médiocrité. Je n'ai pas besoin de repos, mais de sujets. J'ai besoin de matière à modeler, à sculpter, à façonner."
 shroud.12045.b.response_2: "$shroud.12045.b.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.c: "Pouvons-nous vous aider ?"
 shroud.12045.c.response: "Pouvez-vous me rappeler... comment j'étais ? La première fois que nous nous sommes parlé, mes membres étaient-ils déjà de cette couleur ? Ma cornée était-elle aussi trouble ? Je n'ai jamais le temps de me souvenir que ma chair se transforme davantage.\n\nLaissez tomber... Ici, les souvenirs n'ont aucune valeur. La révélation réside dans le changement lui-même. Le passé ne vaut rien pour $the_composer_of_strands_article$. Laissez-moi un instant. Je dois... réfléchir."
 shroud.12045.c.response_2: "$shroud.12045.c.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.desc_2: "§HKronen se met à convulser violemment. Son unique oeil se retourne, sa chair palpite et bouillonne sous la surface... puis le calme revient. La terrible restructuration s'arrête aussi brusquement qu'elle a commencé.§!\n\nAh... Bonjour. Je peux vous aider ?"
 shroud.12045.d: "Ça va ?"
 shroud.12045.d.response: "Bien sûr, pourquoi ça n'irait pas ? Les brins ont élargi mon esprit et refaçonné ma chair inefficace afin de mieux correspondre à la volonté du $the_composer_of_strands$. Maintenant, si vous voulez bien m'excuser... il me reste nombre de fils à tirer et d'enveloppes à abandonner.\n\n§HUne fois la transmission terminée, un bourdonnement retentit à travers le Suaire. L'affliction qui tourmente Kronen... n'est pas le fruit du hasard. C'est la volonté du $the_composer_of_strands$.§!"
 shroud.12045.end: "Les bénédictions du Composeur ne sont pas à prendre à la légère."
 zulyn: "Zulyn l'Entendeur"
 zulyn_desc: "Érudit s'étant affranchi des limites des études scientifiques conventionnelles pour se lancer à la poursuite des secrets divulgués par les échos frénétiques des $whisperers_in_the_void$."
 zulyn_catch_phrase: "Il nous suffit d'écouter..."
 shroud.12050.name: "$zulyn$"
 shroud.12050.desc: "§HLe dispositif de communication s'active et une voix empreinte d'une urgence effrayante retentit.§!\n\nBonjour, chers collègues. J'ai entendu votre voix, ou plutôt vos voix, au milieu de la cacophonie. Vous les entendez aussi désormais, n'est-ce pas ? Le grand choeur des §H$whisperers_in_the_void$§!, leurs bénédictions étouffées et leur folie chuchotée ?\n\nCes secrets sont dangereux pour qui ne les comprend pas, mais je peux vous aider à les interpréter. Je veux vous aider à faire face au déluge de paradoxes qui vous tourmente l'esprit. Loin de moi l'idée de vous offenser, bien sûr. J'ai moi-même eu du mal à comprendre leur signification à l'époque."
 shroud.12050.a: "Pourquoi pensez-vous pouvoir nous aider ?"
 shroud.12050.a.response: "Vous avez percé le voile du §HSuaire§!, je me trompe ? Mais le maîtrisez-vous ? J'ai consacré ma vie à explorer ses profondeurs et à cartographier l'influence de ses entités et de leurs échos sur notre monde fragile.\n\nLes Murmureurs m'ont guidé pendant longtemps. Je peux vous aider à comprendre toutes ces paroles insensées qui envahissent actuellement votre esprit."
 shroud.12050.b: "Que savez-vous des Murmureurs ?"
 shroud.12050.b.response: "J'ai passé des années à répertorier leurs murmures dans l'attente de ce moment. Maintenant que vous êtes en phase avec leur choeur, je ne manquerai pas cette occasion de révéler la vérité qui s'y cache."
 shroud.12050.c: "Que proposez-vous ?"
 shroud.12050.c.response: "Consacrer ma vie à la recherche m'a permis d'affiner ma concentration pour percer les mystères des structures de notre réalité et des profondeurs infinies du §HSuaire§!.\n\nEnsemble, nous pourrons transcender les limites de cette dimension. Je vous promets que les secrets de l'univers deviendront nôtres."
 shroud.12050.hire_custom_tooltip: "§Y$zulyn$§! va devenir une §Hpersonnalité§! de la §Y[Root.GetName]§!."
 leader_trait_disciple_of_the_whisperers: "Murmures du Suaire"
 leader_trait_disciple_of_the_whisperers_desc: "Cette personnalité entend $whisperers_in_the_void_article$ résonner à travers le Suaire, ce qui lui confère une rare perspicacité scientifique sur les mécanismes cachés de l'univers physique."
 leader_trait_disciple_of_the_whisperers_effects: "$t$- $@disciple_of_the_whisperers_tech_zro|0=+$ £sr_zro£§Izro§! en découvrant une technologie §Yrare§! ou §Ypsionique§!"
 ouwron: "Ouw'ron"
 ouwron_desc: "Après son exil de sa tribu nomade pour avoir été témoin de $end_of_the_cycle_article$, Ouw'ron a erré parmi les étoiles dans l'espoir d'obtenir sa faveur. Maintenant que le $NAME_Reckoning$ approche, son coeur brûle du feu de sa détermination. Nul ne saurait refuser cette volonté."
 ouwron_catch_phrase: "Le jour du Jugement viendra..."
 shroud.12060.name: "$ouwron$"
 shroud.12060.desc_1: "§HUne avalanche de signaux incompréhensibles s'abat sur notre dispositif de communication. Au milieu du chaos, une voix se fait entendre.§!\n\nVous voilà enfin. Vous n'êtes pas à l'heure, mais pas totalement en retard non plus. N'ayez crainte. Je vois au-delà de cette prison physique étroite que nous appelons réalité. L'offrande a été faite, rien ne se dresse sur mon chemin."
 shroud.12060.desc_blind: "\n§HC'est alors que nous réalisons que, tout comme nous, cet être a renoncé à la vue pour la cause.§!"
 shroud.12060.desc_default: "\n§HC'est alors que nous remarquons que ses orbites sont vides, à l'abandon depuis longtemps.§!"
 shroud.12060.desc_2: "\nAllez, ne soyez pas timides. Je sais que vous avez entraperçu la noble simplicité de $end_of_the_cycle_color_article$. Communiez avec moi, et ensemble nous la ferons apparaître."
 shroud.12060.a: "Depuis quand êtes-vous au courant pour $end_of_the_cycle_article$ ?"
 shroud.12060.a.response: "Depuis aussi longtemps que je m'en souvienne. Comme dans tous les esprits, cette connaissance est endormie jusqu'à ce que le §HSuaire§! lève son voile. C'est alors que son intention pure devient claire. Notre objectif est simple : faire en sorte que la Fin arrive."
 shroud.12060.b: "Pourquoi voulez-vous nous aider ?"
 shroud.12060.b.response: "Vous connaissez déjà la réponse. Vous et moi avons été témoins de son inévitabilité. Le processus a déjà commencé. Nous n'avons d'autre choix que d'avancer dans cette direction. Nous courons tous ensemble vers la fin."
 shroud.12060.c: "Que pouvez-vous nous offrir ?"
 shroud.12060.c.response: "Je ne suis qu'un grain de poussière dans ce cycle agonisant, comme tout le monde. Que puis-je vous offrir ? Les esprits disparaissent de cette galaxie et j'ai pour mission de les guider au plus vite... Je vous accorderai également cette miséricorde."
 shroud.12060.hire_custom_tooltip: "§Y$ouwron$§! va devenir une §Hpersonnalité§! de la §Y[Root.GetName]§!."
 leader_trait_disciple_of_the_end: "Apôtre de la Fin"
 leader_trait_disciple_of_the_end_desc: "En tant que fidèle apôtre de $end_of_the_cycle_article$, sa foi inébranlable en la venue du $NAME_Reckoning$ résonne dans chacune de ses batailles."
 leader_trait_disciple_of_the_end_effects: "$t$- Intensité de l'aura par vaisseau détruit dans le système : $@disciple_of_the_end_aura_intensity|0=+$$TABBED_NEW_LINE$- $MOD_SHIP_FTL_JUMPDRIVE_RANGE_MULT$au sein de l'§Haura de fin§! : $@disciple_of_the_end_jumpdrive_range|0=+%$"
 shroud.12155.name: "Conviction pure et dure"
 shroud.12155.desc: "§HAucune action n'est sans conséquences. Notre dispositif de communication s'allume et $ouwron$ laisse éclater sa colère.§!\n\nBande d'hérétiques ! Imbéciles ! Imposteurs ! Nous aurions dû nous en douter. Vous éliminer dès l'instant où votre nature corrompue a osé pénétrer dans le §HSuaire§! aurait été la meilleure option.\n\nVous n'avez fait que retarder la fin prédite, l'inévitable ! Que pensez-vous accomplir par cette rébellion ? Vous pouvez dire adieu à tout ce que vous auriez pu gagner.\n\nIl n'y a qu'une seule issue. Alors, chantez... chantez vers le néant !"
 shroud.12155.tt: "$ouwron$ se retourne contre nous !"
