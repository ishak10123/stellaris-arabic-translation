 shroud.3000.title: "Impressions fugaces"
 shroud.3000.desc: "Dans les ténèbres tourbillonnantes, les ombres au loin prennent des formes fugaces avant de rejoindre le néant... Une obscure cacophonie de voix fulmine indistinctement... Des lumières vacillent, puis s'éteignent. Des zones de chaleur apparaissent et disparaissent aussitôt.\n\nUn mouvement se fait jour. Quelque chose tournoie. Est-ce nous qui bougeons ou le Suaire lui-même ?\n\nUne présence approche, comme si elle provenait de partout à la fois. Puis une voix se fait entendre.\n\n§HQUE VOYEZ-VOUS ?§!"
 shroud.3000.a: "Nous voyons un monde qui se consume"
 shroud.3000.a.reply: "Un poids se déplace, puis la voix revient...\n\n§HBIEN.§!\n\nLes ténèbres s'inclinent, puis tournoient. Quelque chose se presse contre nous pendant un instant et soudain, nous sommes à nouveau seuls."
 shroud.3000.b: "Nous voyons des festivités"
 shroud.3000.b.reply: "Une forme lourde frémit. Les ténèbres s'écrasent peu à peu contre nous, de plus en plus fort...\n\n§HNON !§!\n\nLe néant s'incline, avant de tournoyer. Soudain, nous sommes à nouveau seuls..."
 shroud.3000.c: "Nous l'ignorons"
 shroud.3000.c.reply: "§HFAIBLES !§!\n\nLe néant s'incline, avant de tournoyer. Soudain, nous sommes à nouveau seuls..."
 shroud.3005.title: "Faim dévorante"
 shroud.3005.desc: "L'odeur nauséabonde des viscères sature tous nos sens.\n\nDes images se tordant et grognant d'une fureur vorace commencent à émerger des tréfonds du Suaire. D'abord nous parviennent les cris féroces de bêtes affamées... Nous ressentons leur faim. Puis leurs gueules salivantes sont désormais les nôtres.\n\nDes silhouettes apparaissent devant nos yeux. Du bétail paniqué. Des proies. Si proches, si alléchantes... La douleur qui nous tenaille devient insupportable.\n\nNos sens se tordent, se resserrant alors que la faim consume nos pensées. Est-ce que ces cris proviennent de notre gibier... ou de l'intérieur de nous-mêmes ?\n\nLes chaînes qui nous restreignent se resserrent. Puis un hurlement s'enroule autour du tourment :\n\n§HBRISEZ VOS LIENS ! REPAISSEZ-VOUS !§!"
 shroud.3005.a: "Brisons les chaînes. Dévorons les proies"
 shroud.3005.a.boons.tt: "Obtenez un avantage du Suaire aléatoire centré sur le combat."
 shroud.3005.a.reply: "Notre retenue s'évapore brusquement.\n\nAffamés, déchaînés.\n\nLa terreur !\n\n§HMANGEZ.§!"
 shroud.3005.b: "Nous devons résister à la faim. Apaiser notre esprit"
 shroud.3005.b.reply: "Les chaînes tiennent bon. La voix bouillonne de rage tandis que nous nous affranchissons de son influence, apaisant notre esprit alors que nous reprenons le contrôle.\n\n§HFAIBLES ! BONS À RIEN !§!\n\nLa faim se retire, laissant place à un vague ressentiment qui se dissipe dans le Suaire."
 shroud.3010.title: "Festin sacrificiel"
 shroud.3010.desc: "Depuis les abysses, une voix... rauque et résonnant de cruauté... nous appelle.\n\n§HREPAISSEZ-VOUS. CONSUMEZ. DÉVOREZ.§!\n\nDes visions surgissent d'elles-mêmes. Des mondes réduits en cendres et au silence, les plaintes de nos [Root.GetCitizenPlural] alors que leurs formes physiques sont consumées par l'énergie psionique, rassasiant les voix... et notre propre... faim.\n\nAlors que ces images se déroulent, nous percevons une autre présence qui nous enjoint à faire preuve de retenue et de solidarité envers nos [Root.GetCitizenPlural], afin de devenir plus forts, ensemble. Mais les hurlements de la voix la recouvrent."
 shroud.3010.desc.organic: "§HDONNEZ-MOI LEUR CHAIR !§!"
 shroud.3010.desc.other: "§HDONNEZ-MOI LEUR CORPS !§!"
 shroud.3010.a: "Consommons-les"
 shroud.3010.a.reply: "Les cris de ceux qui se font dévorer résonnent à la fois à travers le Suaire et l'empire, avant de se taire brusquement.\n\nAvec ce sacrifice, notre pouvoir grandit et la faim recule."
 shroud.3010.b: "Unissons-nous"
 shroud.3010.b.reply: "Nous faisons taire la voix et nous traversons ensemble le Suaire, embrassant notre empire. Un soupir de soulagement collectif recouvre les cris de rage alors que la faim s'évanouit."
 shroud.3015.title: "Visions fugaces"
 shroud.3015.desc: "De puissants courants d'énergie psionique s'affrontent dans les ténèbres. Les ombres s'élèvent et chutent autour de nous... Une faible lueur clignote un peu plus loin.\n\nSoudain, une scène apparaît pendant un bref instant. Ses contours disparaissent avant que nous puissions les saisir.\n\nUne étrange présence s'installe autour de nous.\n\n§HQU'AVEZ-VOUS VU ?§!"
 shroud.3015.a: "Nous avons vu une forêt, riche de nombreuses formes de vie"
 shroud.3015.a.reply: "Le silence s'épaissit. Puis la voix revient...\n\n§HEXCELLENT.§!\n\nUne chaleur puissante monte en nous, puis s'évanouit. La présence est partie."
 shroud.3015.b: "Nous avons vu un terrain vague, vidé de tout ce qu'il avait à offrir"
 shroud.3015.b.reply: "La voix revient...\n\n§HJAMAIS.§!\n\nUn froid glacial nous envahit, puis il disparaît soudain. La présence est partie."
 shroud.3015.c: "Nous l'ignorons"
 shroud.3015.c.reply: "La voix revient...\n\n§HAUCUN INTÉRÊT.§!\n\nUn vide extrême nous envahit, puis la sensation disparaît soudain. La présence est partie."
 shroud.3020.title: "Conservation tentante"
 shroud.3020.desc: "Venue d'entre les nombreuses strates du Suaire, une vision se déploie devant nous.\n\nLes brumes forment les contours d'une créature en difficulté, prise au piège et haletante alors que des vrilles l'enserrent de plus en plus fermement.\n\nL'animal ne ressemble à aucun de ceux que nous ayons rencontrés jusqu'à présent.\n\nUne voix s'insinue en nous.\n\n§HLES LIENS DU DESTIN VOUS APPELLENT ! LEQUEL CHOISIREZ-VOUS ?§!"
 shroud.3020.a: "Il faut relâcher la créature"
 shroud.3020.a.reply: "La voix résonne dans nos [GetMindLoc] alors que l'image de la créature disparaît peu à peu.\n\n§HPROSPÉRITÉ.§!\n\nUne autre étincelle fugace apparaît : une résurgence de la vie, quelque part dans notre empire."
 shroud.3020.b: "Il faut la capturer"
 shroud.3020.b.reply: "La voix s'efface de nos pensées, remplacée par l'écho d'un cri qui se répercute à travers des visions d'un terrain nu.\n\n§HPESTILENCE.§!"
 shroud.3020.c: "Tuons-la"
 shroud.3020.c.swarm: "Il faut la dévorer"
 shroud.3020.c.reply: "La voix sort de nos pensées alors qu'un désir écrasant prend le dessus. La soif de sang inonde nos [GetMindLoc] tandis qu'un rire brutal retentit dans le néant.\n\n§HBIEN SÛR ! C'EST UNE PROIE FACILE !§!"
 shroud.3025.title: "Paysage changeant"
 shroud.3025.desc: "Les brumes du Suaire se déploient, révélant des visions qui tourbillonnent sans fin.\n\nDes paysages obscurs se tordent de manière incompréhensible devant nos yeux. Des montagnes se forment et s'aplatissent de nouveau. Des océans bouillonnant de chaos s'évaporent, remplacés par les os blanchis des animaux marins gisant dans des déserts à perte de vue.\n\nSous les canopées des forêts, des créatures dociles s'ébattent avant d'être prises de convulsions et de se transformer en monstres assoiffés de sang. Se déchirant mutuellement, elles connaissent le cycle éternel de la mort et de la renaissance.\n\n À travers le chaos, un choix transperce nos [GetMindLoc].\n\n§HQUEL DÉSORDRE. ENCHEVÊTRÉ SUR LUI-MÊME.§!"
 shroud.3025.a: "Soumettons la nature à notre volonté"
 shroud.3025.a.reply: "Nous attrapons le chaos.\n\nNous fixons les repères, forçons les continents à s'immobiliser.\n\nAlors que les pièces du puzzle trouvent leur place, la voix s'élève.\n\n§HPLATITUDE, FADEUR, VIDE...§!"
 shroud.3025.b: "Laissons s'épanouir le désordre de la nature"
 shroud.3025.b.reply: "Les visions se poursuivent. Le cycle éternel devient flou avant d'exploser en mille morceaux, cessant aussi brusquement qu'il avait commencé.\n\nLes énergies déferlent à travers l'étendue immense, puis se rassemblent pour composer de nouvelles formes.\n\nLa voix s'élève.\n\n§HCONFLIT PAISIBLE. UNITÉ DISSOCIÉE.§!"
 shroud.3025.b.reply.tt: "Cette planète gagne un §Gmodificateur positif§! et un §Rmodificateur négatif§! aléatoires."
 shroud.3030.title: "Prisme dans les ténèbres"
 shroud.3030.desc: "Le bouillonnement du Suaire s'apaise pour révéler une immense étendue de sable noir. Les vagues se font entendre, hors de vue.\n\nDevant, ou peut-être derrière, un prisme apparaît. Un unique rayon de lumière l'éclaire, se réfractant pour former une image trouble.\n\nD'innombrables silhouettes indistinctes et formes diverses apparaissent brièvement, avant d'être à nouveau avalées par l'obscurité.\n\nSur le sable, une présence s'installe.\n\n§HÀ QUOI AVEZ-VOUS ASSISTÉ ?§!"
 shroud.3030.a: "Nous avons vu une conférence de nombreuses voix"
 shroud.3030.a.reply: "Les sables bougent doucement. La voix revient.\n\n§HBIEN. L'HARMONIE EST LA VOIE DE L'UNIVERS.§!\n\nNous ressentons une pesanteur qui se soulève. Nous sommes de nouveau seuls."
 shroud.3030.b: "Nous avons assisté au carnage du combat"
 shroud.3030.b.reply: "Les sables se mettent soudain à tourbillonner sous l'effet de violentes bourrasques.\n\n§HNON. QUE LES ARMES ROUILLENT ET TOMBENT DANS L'OUBLI !§!\n\nLa tempête se calme. La voix est partie."
 shroud.3030.c: "Nous l'ignorons"
 shroud.3030.c.reply: "Les sables bougent doucement.\n\n§HL'HÉSITATION EST MÈRE DE L'ÉCHEC...§!\n\nNous sommes de nouveau seuls."
 shroud.3035.title: "Rixe obscure"
 shroud.3035.desc: "L'énergie chaotique du Suaire se tord et déferle.\n\nDes vrilles d'ombre se déploient et s'enroulent, le brouillard se retournant violemment contre lui-même. Au milieu de cette tempête de fureur psionique, deux entités informes s'affrontent. Elles sont implacables, inébranlables et folles de rage.\n\nUne présence étrangère se presse pour s'insinuer dans nos [GetMindPhysicalLoc], envahissante et vaste.\n\n§HCEUX QUI PÉNÈTRENT ICI DOIVENT OFFRIR UNE SOLUTION.§!"
 shroud.3035.a: "Le dialogue aide à se comprendre"
 shroud.3035.a.reply: "Le brouillard se dissipe contre l'énergie psionique tournoyante. La conscience revient.\n\n§HL'HARMONIE EST UNE SAGESSE.§!\n\nLe Suaire est désormais plus calme."
 shroud.3035.b: "Le compromis est une faiblesse"
 shroud.3035.b.reply: "À chaque coup porté par le brouillard, l'effervescence des énergies qui nous entourent s'intensifie.\n\n§HLA VIOLENCE EST LA RÉCOMPENSE DES ÊTRES DÉNUÉS DE RÉFLEXION.§!\n\nLes énergies du Suaire convulsent à nouveau."
 shroud.3040.title: "Voir l'invisible"
 shroud.3040.desc: "Une mare de liquide noir s'étend devant nous.\n\nSoudain, une image floue clignote à la surface. Nous apercevons un mont dont chaque crête est surmontée d'or miroitant, avant qu'il ne disparaisse brusquement.\n\nUne voix résonne dans les recoins de nos [GetMindLoc].\n\n§HAVEZ-VOUS VU L'INVISIBLE ?§!"
 shroud.3040.a: "Nous avons vu une proie attendant d'être prélevée"
 shroud.3040.a.reply: "Une série de vagues se répandent à la surface. De nouveau, nous percevons la voix.\n\n§HLA CROISSANCE SANS LIMITES NOURRIT L'ÉQUILIBRE SANS MESURE.§!\n\nAlors que le liquide retrouve son calme, nous sentons la voix partir."
 shroud.3040.b: "Nous avons vu la perfection de la nature qui doit être préservée"
 shroud.3040.b.reply: "Le liquide s'agite. Des vagues se soulèvent et se brisent. Un tourbillon naît dans l'obscurité. La voix revient, plus forte.\n\n§HINACCEPTABLE ! IL FAUT CROÎTRE ET ACQUÉRIR TOUJOURS PLUS !§!\n\nLa surface redevient lisse. La voix est partie."
 shroud.3040.c: "Nous l'ignorons"
 shroud.3040.c.reply: "Le liquide se trouble. La voix s'élève de nouveau.\n\n§HLA CONVICTION FLÉCHIT... VOTRE VOLONTÉ EST EMPREINTE DE FAIBLESSE.§!\n\nAlors que la surface se lisse, nous sentons la voix partir."
 shroud.3045.title: "Noyau lumineux"
 shroud.3045.desc: "Le brouillard se recompose devant nos yeux. Des énergies incandescentes pulsent d'une vigueur soudaine. Nous distinguons les contours d'une forme étrange, semblable à une forêt.\n\nSon immense canopée scintille lorsque nous approchons, passant par une multitude de teintes de violet, de rose et de noir.\n\nAbritée à sa base repose un noyau lumineux, irradiant en rythme avec les couleurs de la canopée.\n\nUne voix pénètre dans nos [GetMindLoc].\n\n§HSAISIR, POSSÉDER, EXPLOITER.§!"
 shroud.3045.a: "Extrayons-le"
 shroud.3045.a.reply: "Dès le retrait du noyau, la canopée s'éteint et se flétrit instantanément. La voix revient.\n\n§HOUI ! LE BUTIN ENGENDRE LE BUTIN.§!"
 shroud.3045.b: "Ne touchons à rien"
 shroud.3045.b.reply: "Un frisson nous traverse. Est-ce le monde qui tremble ou nous ?\n\n§HLA PROSPÉRITÉ EST TOUT. LA FUIR EST PURE FOLIE !§!"
 shroud.3050.title: "Cacophonies indisciplinées"
 shroud.3050.desc.intro: "Les puissants courants psioniques s'écrasent au coeur de la turbulence perpétuelle du Suaire. Une cacophonie rugissante enfle et réclame notre attention."
 shroud.3050.desc.outro: "Le bruit est accablant."
 shroud.3050.desc.eater: "Des cris de douleurs, le tonnerre du combat, un grondement de flammes dévorantes. Nous percevons la douleur... Mais à qui appartient-elle ?"
 shroud.3050.desc.composer: "Des cris, des appels, animaux, sauvages, primaires... Les fleuves jaillissent, les vents gémissent... La nature tout entière aboie et hurle, signifiant l'urgence toute à la fois."
 shroud.3050.desc.cradle: "Des voix murmurent, marmonnent, s'exclament et déclarent... Des myriades d'intonations, de syllabes, de sons... Des bavardages en langues innombrables se font entendre simultanément."
 shroud.3050.desc.instrument: "Les foreuses percent, les machines broient... la matière est transformée bruyamment, avec force... Toutes les usines de l'univers explosent et s'embrasent à la fois."
 shroud.3050.a: "Faisons avec"
 shroud.3050.a.reply: "Le crescendo monte encore et encore. Nous sommes brusquement poussés dans une direction qui nous échappe...\n\nFinalement, nous retombons dans le silence."
 shroud.3050.b: "Détournons-nous"
 shroud.3050.b.reply: "C'est insupportable. Nos [GetMindLoc] se replient dans le confort du silence."
 shroud.3055.title: "Visions prophétiques"
 shroud.3055.desc.intro: "Une obscurité dense nous enveloppe. De tous côtés, la pression nous enserre encore et encore. Jusqu'à ce qu'une image floue se présente."
 shroud.3055.desc.outro: "Dans l'obscurité et les ombres, quelque chose attire notre attention. Aucune erreur n'est possible : il s'agit du drapeau de la [Root.GetName] ?\n\nC'est nous ?"
 shroud.3055.desc.eater: "Nous voyons un monde ravagé, les suites d'un combat... Les vainqueurs fouillent les corps et les débris."
 shroud.3055.desc.composer: "Nous voyons de nombreux mondes... se précipitant de manière impossible à travers le temps et l'espace... tous semblables, unis sous un même empire."
 shroud.3055.desc.cradle: "Nous voyons une grande assemblée. La forme opaque de nombreuses silhouettes... écoutant, parlant."
 shroud.3055.desc.instrument.default: "Nous voyons un monde optimisé... des rangées infinies de mines et d'usines... Aucun recoin de sa surface n'est resté intact."
 shroud.3055.desc.instrument.relentless_industrialist: "Nous voyons un monde optimisé... des rangées infinies de mines et d'usines... La perfection pure. Aucun recoin de sa surface n'est resté intact."
 shroud.3055.a: "Maintenons la vision"
 shroud.3055.a.reply: "L'image devient légèrement plus nette. Nous faisons confiance à notre perception."
 shroud.3055.b.organic: "Dissipons-la de nos esprits"
 shroud.3055.b.machine: "Supprimons-la de nos circuits"
 shroud.3055.b.reply: "Les pourtours indistincts de la vision se dissolvent à nouveau dans le néant"
 shroud.3060.title: "Entre le vide"
 shroud.3060.desc.intro: "Les brumes éthérées du Suaire s'agitent et se tordent, attirant notre conscience plus profond tandis que nos formes physiques restent inertes, inhabitées.\n\nNotre [GetPsycheLoc] s'étire, piégée dans une marée répétée. Chaque tentative de mouvement s'effondre sur elle-même, la tension se resserre telle une vis dans sa poigne."
 shroud.3060.desc.intro.organic: "Nous voyons au-delà de nous-mêmes, nos corps coincés dans un tesseract tombant en cascade et dépassant notre compréhension physique."
 shroud.3060.desc.intro.machine: "Des sous-routines s'engagent, l'échec est identifié : une boucle récursive. Nos processeurs psioniques ne sont pas suffisants pour briser le cycle et reprendre la fonction habituelle."
 shroud.3060.desc.intro.end: "Alors que la tension devient insupportable, nos formes menacent de se dissoudre dans le néant. Une voix se fraie un chemin jusqu'à notre prison."
 shroud.3060.desc.outro: "Les mots résonnent en nous, créant un élan dans leur sillage et nous percevons un moyen de dissiper la perturbation qui menace de nous déchirer en lambeaux si nous cédons."
 shroud.3060.desc.eater: "§HDÉVOREZ ! CONSUMEZ LE VIDE INFINI !§!"
 shroud.3060.desc.composer: "§HDÉPASSONS LES CONFINS DE L'INFINI RÉCURSIF !§!"
 shroud.3060.desc.cradle: "§HEMBRASSONS L'ÉTERNITÉ ! TOUT NE FAIT QU'UN ET UN FORME UN TOUT !§!"
 shroud.3060.desc.instrument: "§HCÉDONS AU POTENTIEL INFINI !§!"
 shroud.3060.a: "La soumission est inévitable"
 shroud.3060.a.reply: "La voix enfle, guidant nos actions, forçant nos pensées au-delà de notre compréhension limitée. Le cycle continue : l'étreinte qui nous attire plus profond, puis la rupture contre notre psyché.\n\nNous avons brisé la boucle, guidés par nos supplications envers les puissances supérieures du Suaire.\n\nCependant, nous ne sommes pas au complet. §H[event_target:shroud_warped_leader.GetName]§! n'est plus à son poste. La voix revient."
 shroud.3060.a.reply.default: "LA RECONSTRUCTION VIENDRA"
 shroud.3060.a.reply.eater: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.composer: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.cradle: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.instrument: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.b: "Il faut résister"
 shroud.3060.b.reply: "Nous refusons la pression qui nous est imposée.\n\nLa boucle s'accélère, nous entraînant par la puissance de sa marée récurrente. Une fois que nous cessons de lutter, la tension ne menace plus de nous briser. Au contraire, elle nous intègre, nous permettant une vision fugitive au-delà de nous-mêmes.\n\nLa voix revient."
 shroud.3060.b.reply.default: "AUCUN INTÉRÊT"
 shroud.3060.b.reply.eater: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.composer: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.cradle: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.instrument: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.leader_return.title: "Déformation du Suaire"
 shroud.3060.leader_return.desc: "Le Suaire tremble tandis que de légères distorsions se répercutent dans nos [GetMindPhysicalLoc] sous l'effet d'une présence familière. La périphérie de notre [GetMindPerceptionLoc] s'agite et l'écho de murmures se fait entendre, tout juste audible.\n\n§H[from.GetName]§! nous revient, traversant les brumes ineffables pour reprendre sa forme familière, entière malgré la distance, après la reconstruction opérée par le Suaire, et ayant hâte de reprendre ses responsabilités."
 shroud.3060.leader_return_tt: "§H[from.GetName]§! a acquis un nouveau trait : §G$leader_trait_shroud_warped$§!"
 leader_trait_shroud_warped: "Déformation du Suaire"
 leader_trait_shroud_warped_desc: "Absorbé et reconstruit par le Suaire, notre leader possède désormais une sagesse éthérée qui lui permet d'observer l'inobservable et d'amplifier le potentiel psionique de ceux qui l'entourent."
 leader_trait_shroud_warped_invasion_effect: "Renseignements sur les empires ennemis par invasion victorieuse : §G+$@shroud_warped_intel|0$§!"
 shroud.3065.title: "L'offre d'un calice"
 shroud.3065.desc.intro: "Le brouillard du Suaire frémit, s'ouvrant pour révéler un calice débordant d'un liquide chatoyant à la surface parfaitement lisse.\n\nUne envie irrépressible de le saisir s'empare de nous. Nous tendons la main sans réfléchir. Le liquide se trouble alors que nous commençons à l'ingérer.\n\nLa lucidité afflue soudain. Plus nous consommons ce liquide et plus le mensonge apparaît. Le fluide s'épaissit, chaque goutte commence à cailler en nous.\n\nUn besoin impérieux de purger nos systèmes de l'élément contaminé se fait jour."
 shroud.3065.desc.eater: "§HGAVEZ-VOUS ! NOYEZ VOTRE FAIBLESSE !§!"
 shroud.3065.desc.composer: "§HNOURISSEZ-VOUS ! INHALEZ LES NOUVELLES CROISSANCES !§!"
 shroud.3065.desc.cradle: "§HRENFORCEZ-VOUS ! EMBRASSEZ L'UNIFICATION DOULOUREUSE !§!"
 shroud.3065.desc.instrument: "§HIMBIBEZ-VOUS ! REPAISSEZ-VOUS DE VOS ADDICTIONS !§!"
 shroud.3065.desc.outro: "La voix tourbillonne, se mélangeant avec le liquide et le figeant alors qu'il s'insinue de force plus profondément en nous, affirmant sa volonté en nous soumettant."
 shroud.3065.a.organic: "Buvons-le"
 shroud.3065.a.machine: "Absorbons-le"
 shroud.3065.a.reply.intro: "Le liquide se vide, épais et répugnant. Il s'accumule en nous, saturant nos [GetMindPhysicalLoc].\n\nLa chaleur pulse en nous, déformant nos pensées, usant les contours de notre [GetPsycheLoc].\n\nLa voix revient, satisfaite, tandis que le calice se dissout devant nous."
 shroud.3065.a.reply.default: "CONQUÉRANT ! CHAMPION"
 shroud.3065.a.reply.eater: "§H$shroud.3065.a.reply.default$§!"
 shroud.3065.a.reply.composer: "§HFORMATEUR ! CATALYSEUR VIVANT.§!"
 shroud.3065.a.reply.cradle: "§HINTÉGRATEUR ! ESPRITS CONTRE ESPRITS.§!"
 shroud.3065.a.reply.instrument: "§HDÉCADENCE ! DES SENS À EXPLORER.§!"
 shroud.3065.b: "Expurgeons"
 shroud.3065.b.reply.intro: "De violentes convulsions s'emparent de nos [GetBodiesLoc] alors que nous rejetons de l'intérieur la contamination, purgeant cette substance écoeurante.\n\nLe liquide infâme éclabousse le vide, se tordant avant de se disperser. La voix feule, ses paroles s'évaporant avec l'immondice."
 shroud.3065.b.reply.default: "FAIBLESSE !"
 shroud.3065.b.reply.eater: "§H$shroud.3065.b.reply.default$§!"
 shroud.3065.b.reply.composer: "§HSTAGNATION !§!"
 shroud.3065.b.reply.cradle: "§HLÂCHETÉ !§!"
 shroud.3065.b.reply.instrument: "§HUN TEL POTENTIEL...§!"
 shroud.3070.title: "La toile du changement"
 shroud.3070.desc.intro: "Le Suaire se contracte, se repliant vers l'intérieur et compressant notre psyché au plus profond d'un vide confiné et résonnant.\n\nUne présence se profile, fluide et indistincte. Sa forme change alors qu'elle ouvre et ferme les séparations qui nous tiennent à l'écart du reste du Suaire. Chaque rideau révèle une cascade de visions."
 shroud.3070.desc.eater: "Les mondes brûlent, leurs braises portées par les lamentations des victimes. Chaque image dévoile un festin potentiel, prêt à être dévoré."
 shroud.3070.desc.composer: "Des paysages luxuriants, saturés d'animaux qui fourmillent sur des plaines verdoyantes. Les fils de la vie s'entrelacent et s'étendent. Chaque image révèle une atmosphère grouillante de potentiel à façonner."
 shroud.3070.desc.cradle: "Des communautés se rassemblent, s'encourageant mutuellement dans l'unité, au risque d'exclure les dissidents. Chaque image révèle une nouvelle utopie, accueillant uniquement les plus fidèles."
 shroud.3070.desc.instrument: "De vastes carrières s'étendent devant nous, emplies de ressources lucratives prêtes à l'extraction. Chaque image révèle des trésors de richesses n'attendant que d'être pillées."
 shroud.3070.desc.outro: "À chaque nouvelle vision, l'inertie nous renverse et nous contorsionne, nous entraînant à des vitesses impossibles alors que les murs de la réalité se tordent et ondulent.\n\nNous percevons l'amusement de la silhouette. Elle nous teste, dans l'attente d'un nom à donner à la force qui nous saisit."
 shroud.3070.a.eater: "Satisfaction"
 shroud.3070.a.composer: "Formation"
 shroud.3070.a.cradle: "Harmonie"
 shroud.3070.a.instrument: "Potentiel"
 shroud.3070.a.reply.intro: "Notre voix s'exclame, la présence s'immobilise. Les visions cessent alors que la tempête d'inertie s'apaise dans une lucidité retentissante.\n\nNous l'avons nommée."
 shroud.3070.a.reply.default: "SATISFACTION. NOURRIE PAR LA CONQUÊTE."
 shroud.3070.a.reply.eater: "§H$shroud.3070.a.reply.default$§!"
 shroud.3070.a.reply.composer: "§HFORMATION. LA VIE S'ENTRELACE, LES SCHÉMAS SE SOLIDIFIENT.§!"
 shroud.3070.a.reply.cradle: "§HL'HARMONIE. LA DISCORDE EST EXCLUE AVEC GENTILLESSE.§!"
 shroud.3070.a.reply.instrument: "§HLE POTENTIEL. ATTENDANT D'ÊTRE ARRACHÉ AU COSMOS INACTIF.§!"
 shroud.3070.a.reply.outro: "Satisfaite de notre décision, la forme ouvre la barrière. Dès que nous en sortons, le vide se dissipe."
 shroud.3070.b.eater: "Désespoir"
 shroud.3070.b.composer: "Excès"
 shroud.3070.b.cradle: "Apparence"
 shroud.3070.b.instrument: "Gaspillage"
 shroud.3070.b.reply.intro: "Notre voix hésite, arrachée par la forme furieuse qui nous pousse à travers la barrière."
 shroud.3070.b.reply.default: "DÉSESPOIR ? FAIBLESSE, FAMINE, VOUS MANQUEZ DE CONVICTION !"
 shroud.3070.b.reply.eater: "§H$shroud.3070.b.reply.default$§!"
 shroud.3070.b.reply.composer: "§HEXCÈS ? VAUTREZ-VOUS DANS LA MÉDIOCRITÉ !§!"
 shroud.3070.b.reply.cradle: "§HAPPARENCE ? RESTEZ DANS VOTRE ISOLEMENT !§!"
 shroud.3070.b.reply.instrument: "§HGASPILLAGE ? LA MISÈRE CRASSE EST VOTRE OBSESSION !§!"
 shroud.3070.b.reply.outro: "Nous chutons à travers le Suaire, le quittant avec un sentiment de malaise."
 shroud.3100.title: "Conflit psionique"
 shroud.3100.desc: "Un orchestre dissonant de dévastation nous attire plus profondément dans le Suaire. Chaque réverbération martèle notre psyché au rythme implacable de la ruine.\n\nLe bruit prend sa forme.\n\nNous sommes au bord d'un conflit psionique. Nous ignorons la motivation des entités impliquées, mais la puissance déployée est incroyable.\n\nLes bombardements psioniques entrent et sortent de notre perception, se tordant dans la réalité fracturée qui est devant nous. Il n'y a aucun refuge possible, seulement la tempête qui approche."
 shroud.3100.a: "§YIl nous faut subir et observer§!"
 shroud.3101.title: "§GRésonnance incessante§!"
 shroud.3101.desc.intro: "Nous nous attardons, risquant de déclencher la fureur alors que le conflit se rapproche encore davantage."
 shroud.3101.desc: "$shroud.3101.desc.intro$\n\nNous nous concentrons pour nous mettre à l'unisson de la cascade psionique. Nos pensées restent fluides. Le bombardement constant ne fléchit pas, mais nous restons indemnes, nous déplaçant peu à peu, au rythme de la destruction.\n\nÀ chaque pas, notre compréhension grandit. Le barrage psionique glisse entre les creux de plans invisibles.\n\nAlors que nous nous retirons, le schéma se maintient. Avec quelques améliorations, les principes que nous observons pourraient s'adapter à nous."
 shroud.3102.title: "§RBarrage abyssal§!"
 shroud.3102.desc: "$shroud.3101.desc.intro$Nous tentons de nous mettre à l'unisson de la tempête psychique, nous déplaçant au fil de ses rythmes imprévisibles.\n\nNos premiers pas sont prometteurs, mais le tempo de la destruction nous consume inévitablement.\n\nTandis que la tempête passe, les échos du barrage retentissent toujours à travers nous. Même dans cette réalité, les réverbérations psioniques de notre échec résonnent dans l'empire."
 shroud.3102.a.tt: "Deux bâtiments aléatoires de l'empire sont détruits."
 shroud.3105.title: "Chemins psychiques"
 shroud.3105.desc: "Sans crier gare, une pression psychique entre en éruption dans le Suaire.\n\nUn labyrinthe de chemins incandescents se déroule devant nous. S'étendant au-delà de la perception, il apparaît en crépitant avant de disparaître aussi vite dans le néant.\n\nUne autre vague se prépare. Grâce à notre concentration, nous percevons sa configuration avant même qu'elle émerge. Le dédale s'enflamme à nouveau, explosant dans un réseau de possibilités.\n\nChaque voie offre une nouvelle tentation à explorer, avant de sombrer définitivement."
 shroud.3105.a: "§YNous devons faire face§!"
 shroud.3106.title: "§G$tech_psionic_lightning$§!"
 shroud.3106.desc.intro: "La pression s'accumule, jouant de notre curiosité. Nous bougeons à son rythme, dirigeant notre esprit à travers le labyrinthe d'énergie psychique. Les pensées créent un élan, nous poussant à avancer,"
 shroud.3106.desc: "$shroud.3106.desc.intro$ glissant à travers les arcs d'énergie psionique avant que notre détermination ne faiblisse.\n\nNous sommes libres et nous transcendons nos formes physiques. Le dédale et sa multitude de chemins deviennent une simple extension de notre propre conscience, révélant un savoir profondément enfoui dans la tempête.\n\nAussi vite qu'il avait commencé, le moment arrive à son terme. L'image résiduelle du labyrinthe s'effondre derrière nous alors que nous émergeons, enrichis d'une nouvelle perspective. Avec des améliorations minutieuses, ces principes psioniques pourraient s'appliquer à nos armes de guerre."
 shroud.3107.title: "§RPerdus dans le néant§!"
 shroud.3107.desc: "$shroud.3106.desc.intro$ considérant la multitude de chemins qui s'étendent devant nous. L'impossibilité du choix nous accable.\n\nDans ce moment d'hésitation, les chemins incandescents entrent en éruption. Des arcs d'énergie psionique se tordent dans l'effondrement, piégeant nos pensées et nous plongeant dans le chaos du Suaire.\n\nLorsque nous émergeons, nos [GetTelepathPlural] sont désorientés et affligés par le traumatisme de l'échec. Le retour de bâton psionique se répercute à travers la [Root.GetName]."
 shroud.3110.title: "Lance psychique"
 shroud.3110.desc: "Un rayon totémique d'énergie psionique singulière s'étend jusque dans le Suaire, formant d'incalculables infinités. Sa composition stable unique constitue un contraste frappant par rapport aux formations généralement chaotiques que nous avions rencontrées jusque-là.\n\nSommes-nous en sécurité, ici ?"
 shroud.3110.a: "§YRestons ici un moment§!"
 shroud.3111.title: "§GDisrupteurs psioniques§!"
 shroud.3111.desc: "Malgré son intensité aveuglante, nous avons réussi à maintenir notre concentration sur le rayon d'énergie psychique parfaitement formé. Enfin, nous contemplons la véritable nature de sa structure intriquée et mystique.\n\nLes nouvelles possibilités jaillissent dans notre esprit. En reproduisant cette formation énergétique unique dans la dimension physique, nous pourrons construire une arme invincible."
 shroud.3112.title: "§R[GetTelepathPluralCap] surchargés§!"
 shroud.3112.desc: "Il nous a été impossible de rester. La proximité avec une formation d'énergie psionique aussi intense était trop violente pour nos [GetTelepathPlural].\n\nL'exposition à ce phénomène écrasant a causé à nos esprits des dégâts qui prendront du temps avant de se réparer."
 recovering_telepaths: "$DEFAULT_TELEPATH_PLURAL_CAP$ en cours de récupération"
 recovering_telepaths_desc: "L'effort excessif produit dans le Suaire a laissé des traces sur nos $DEFAULT_TELEPATH_PLURAL$."
 recovering_telepaths_robot: "$MACHINE_TELEPATH_PLURAL_CAP$ en cours de récupération"
 recovering_telepaths_robot_desc: "L'effort excessif produit dans le Suaire a laissé des traces sur nos $MACHINE_TELEPATH_PLURAL$."
 recovering_telepaths_hive: "$HIVE_TELEPATH_PLURAL_CAP$ en cours de récupération"
 recovering_telepaths_hive_desc: "L'effort excessif produit dans le Suaire a laissé des traces sur nos $HIVE_TELEPATH_PLURAL$."
 MACHINE_SENSE: "sentir"
 shroud.3120.title: "Un écho distant"
 shroud.3120.desc: "À travers le Suaire, nous pouvons [GetFeelLoc] la résonnance d'immenses pouvoirs. Leur influence imprègne le royaume psionique.\n\nNos actions peuvent nous permettre d'entrer en harmonie avec eux, mais il existe aussi un autre moyen. En puisant dans le pouvoir du zro, nos [GetTelepathPlural] pourront tendre la main directement à ces entités.\n\nIl nous suffit de choisir laquelle nous désirons solliciter."
 shroud.3120.a: "$utopia.3005.a$"
 shroud.3120.b: "$utopia.3005.b$"
 shroud.3120.c: "$utopia.3005.c$"
 shroud.3120.d: "§CUn être qui pleure l'espoir enterré.§!"
 ORGANIC_SPIRITS: "esprits"
 MACHINE_SPIRITS: "entités psioniques"
 shroud.3125.title: "$shroud.3120.title$"
 shroud.3125.desc: "Alors que nous tentons d'établir le contact avec la présence, nous pouvons [GetFeelSenseLoc] qu'elle s'agite. Nous avons déjà rencontré des [GetSpiritsLoc] auparavant, mais il s'agit d'autre chose, quelque chose de bien plus puissant... de bien plus ancien.\n\nUne fois leurs énergies infusées de zro épuisées, nos [GetTelepathPlural] doivent se retirer du Suaire. Nous devrons revenir plus tard."
 shroud.3125.tt: "Gain très élevé d'§Hharmonie§! avec une entité du §HSuaire§!."
 shroud.3115.title: "Bombardement psionique"
 shroud.3115.desc: "Une série de convulsions puissantes a traversé le Suaire, envoyant des secousses à travers nos esprits.\n\nCes réverbérations menacent de submerger nos [GetTelepathPlural].\n\nQuelle est la cause de ce bombardement psionique ?"
 shroud.3115.a: "§YNous devons le découvrir§!"
 shroud.3116.title: "§G$tech_psionic_bombers$§!"
 shroud.3116.desc: "Nous avons renforcé nos esprits contre ce barrage continuel et nous avons bientôt compris sa nature.\n\nLes convulsions explosives sont causées par des courants d'énergie psionique concentrée qui se reflètent depuis notre propre dimension. Ces gouttes volatiles d'intention psychique ont le potentiel d'endommager de façon significative l'esprit de ceux qui n'y sont pas préparés.\n\nUne idée s'est installée : ces puissantes formations pourront offrir une base pour des nouveaux armements conçus à partir du Suaire."
 shroud.3117.title: "§RChoc psionique§!"
 shroud.3117.desc: "Nos réserves mentales ont décru.\n\nLa puissance extrême des détonations psychiques a entraîné des cas de choc psionique chez nombre de nos [GetTelepathPlural].\n\nIl nous faudra du temps pour récupérer."
 psionic_shock_modifier: "Choc psionique"
 psionic_shock_modifier_desc: "L'exposition à des forces extrêmes du Suaire a entraîné un choc psionique chez nos $DEFAULT_TELEPATH_PLURAL$."
 psionic_shock_hive_modifier: "$psionic_shock_modifier$"
 psionic_shock_hive_modifier_desc: "L'exposition à des forces extrêmes du Suaire a entraîné un choc psionique chez nos $HIVE_TELEPATH_PLURAL$."
 psionic_shock_robot_modifier: "$psionic_shock_modifier$"
 psionic_shock_robot_modifier_desc: "L'exposition à des forces extrêmes du Suaire a entraîné un choc psionique chez nos $MACHINE_TELEPATH_PLURAL$."
 shroud.3200.title: "Animatus"
 shroud.3200.desc: "Alors que nos esprits dérivent à nouveau dans les profondeurs du Suaire, nous nous apercevons d'une présence familière : $the_animator_of_clay_color_article$ est à nos côtés.\n\nDes rythmes mécaniques émergent autour de notre conscience, des voix étouffées s'élèvent en choeur et les fantômes de notre flotte commencent à remuer. Ils nous proposent de porter nos formes physiques plus loin, afin d'alléger nos esprits pour qu'ils puissent se consacrer à des préoccupations plus importantes.\n\nIls ne sont pas en vie, mais nous les connaissons. Leur forme est le fruit d'une volonté et leur présence découle d'une histoire et d'un dessein. S'unissant tous ensemble, ils viennent à notre rencontre avec impatience.\n\nNous ne sommes plus de simples opérateurs de ces vaisseaux. Nous sommes alliés, unis dans la détermination, portés par une volonté commune."
 shroud.3200.a: "Nous ne sommes que des feuilles portées par le vent"
 shroud.3200.a.tt: "§Y$unlock_edict_tt$§!$edict_animatus$"
 shroud.3210.title: "Volonté de modération"
 shroud.3210.desc.intro: "Une essence mélancolique s'insinue dans nos esprits : c'est $the_outsider_color_article$ qui est auprès de nous.\n\nAlors que son chagrin résonne, des tourbillons noueux d'énergie psionique se fondent en une forme étrange et changeante. Plus nous la regardons, moins nous parvenons à l'interpréter. Une voix s'élève.\n\n§HCertaines choses échappent à notre compréhension. Elles nous enseignent douleur et regret.\n\nJ'étais la première de mon peuple à venir en ce lieu, mais nous en avons tous payé le prix. Nous avons laissé le Suaire nous détruire. Ne faites pas la même erreur !§!\n\n"
 shroud.3210.desc.know_zroni: "$shroud.3210.desc.intro$Nous reconnaissons cette voix : elle appartient aux Zronis. Comment est-elle arrivée ici ? Nous l'ignorons. Mais peut-être devrions-nous tenir compte de son avertissement concernant le pouvoir destructeur du Suaire."
 shroud.3210.desc.left_zroni: "$shroud.3210.desc.intro$Nous connaissons cette voix. Nous avons déjà rencontré cette Zronie : la Devineresse. Comment est-elle arrivée ici ? Nous l'ignorons. Mais peut-être devrions-nous tenir compte de son avertissement concernant le pouvoir destructeur du Suaire."
 shroud.3210.desc.default: "$shroud.3210.desc.intro$Cette entité reste un mystère pour nous. Son sinistre avertissement n'a que peu de sens à nos yeux."
 shroud.3210.a: "Nous devrions nous montrer prudents"
 shroud.3210.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_temperance$"
 shroud.3220.title: "Jeu de pensées"
 shroud.3220.desc: "Tout autour de nous, le Suaire pulse aux rythmes calmes d'une entité : $the_golden_dream_color_article$.\n\nNous observons des volutes d'énergie psionique former doucement un dessin complexe. Des cryptages inconnus commencent à apparaître sous forme de schémas soigneux.\n\nPeu à peu, ils se déploient les uns autour des autres, créant de nouvelles formes de plus en plus élaborées. Nous finissons par percevoir une certaine logique régissant leurs mouvements.\n\nNous réalisons alors que nous jouons à un jeu avec $the_golden_dream_article$. Chaque nouvelle étape à travers laquelle il nous guide nous emplit d'un plaisir serein."
 shroud.3220.a: "Tout en jouant, nous nous enfuyons vers un endroit précieux"
 shroud.3220.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_distraction$"
 shroud.3230.title: "Les sables du temps"
 shroud.3230.desc: "Des grains de pensée passent au-dessus de nous. Nous reconnaissons $the_endless_tide_color_article$ en cette présence abrasive.\n\nInéluctablement, son flux et son reflux érodent tout ce qu'elle touche avant de créer quelque chose de nouveau.\n\nÉmergeant de nouveau dans son sillage, nous nous sentons comme rajeunis."
 shroud.3230.a: "Ici, nous sommes éternels"
 shroud.3230.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_endless$"
 shroud.3240.title: "Reformation"
 shroud.3240.desc: "Une cime vertigineuse se profile en surplomb de nos pensées : ce n'est autre que $the_pale_mountain_color_article$. Nos esprits se tendent alors qu'une vision assaille tous nos sens.\n\nDevant nous, nous apercevons les contours brumeux d'un vaisseau endommagé, dérivant dans le vide.\n\nQuelque part dans nos esprits, la pression indirecte se déplace et le vaisseau commence à se transformer.\n\nUne fois le vaisseau entièrement réparé, la vision s'interrompt soudainement, nous laissant uniquement avec une profonde sensation de renouveau."
 shroud.3240.a: "Une grande renaissance de nos esprits"
 shroud.3240.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_rebirth$"
 shroud.3250.title: "La force de l'abstention"
 shroud.3250.desc: "Sérénité et silence emplissent notre esprit. Ils appartiennent à $the_hollow_point_color_article$. Une vision s'étend langoureusement face à nos sens.\n\nNous observons des éternités de conflit se dérouler en un bref instant : des civilisations s'effondrent, des histoires s'effacent, les statues de tyrans morts depuis longtemps se retrouvent enfouies par le temps.\n\nLa sagesse de $the_hollow_point_article$ repose dans la force paisible de l'abstention. Des guerres éclatent et se terminent, mais nous restons là. Ce détachement imprègne nos personnalités d'une nouvelle longévité, les libérant de la toxicité corrosive du grief mortel."
 shroud.3250.a: "Nous vivons malgré tout"
 shroud.3250.a.tt: "Toutes les personnalités psioniques vont recevoir le trait §Y$leader_trait_shroud_age$§! : §G+40§! ans."
 shroud.3260.title: "Le chaos et l'ordre"
 shroud.3260.desc: "L'éruption ardente du Suaire pulse devant nous. Une présence intraitable se profile : $the_vacant_throne_color_article$.\n\nAlors qu'il s'approche, des spires vastes et noueuses d'énergie psionique se retrouvent domestiquées. Le bourbier devient plus pur et plus limpide. Des couleurs s'épanouissent d'une définition inédite. Partout s'imposent la symétrie, la logique et la structure.\n\nQuelque chose se forme dans les recoins les plus profonds de nos esprits : un immense désir d'ordre."
 shroud.3260.a: "Adieu le chaos. Embrassons l'ordre"
 shroud.3260.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_order$"
 shroud.3270.title: "Accélération infinie"
 shroud.3270.desc: "Une accélération mentale incroyable frappe nos sens. Nous reconnaissons $the_black_river_color_article$ en cette entité.\n\nNous nous précipitons à une vitesse inconcevable vers une finalité qui nous échappe partiellement. Il s'agit de la frontière entre le tout et le rien, la séparation de l'éternel et ce qui ne sera jamais, la limite au-delà de laquelle aucune loi naturelle ne peut s'étendre.\n\nEnfin, alors que nous revenons à nous, nous découvrons une nouvelle notion de ce qu'est le véritable mouvement."
 shroud.3270.a: "Avons-nous aperçu les confins de l'univers ?"
 shroud.3270.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_motion$"
 #==========================
 # Forge our own Path
 #==========================
 shroud.3500.title: "Tracer son propre chemin"
 shroud.3500.desc: "Nos [GetResearchers] ont développé une technique intelligente pour puiser de la puissance dans le §HSuaire§!.\n\nLes mécènes gardent le secret des plus grands pouvoirs de la dimension psionique, ne les divulguant qu'au prix d'un accord. Mais comme cela est impossible, nous avons trouvé un moyen de forger notre propre chemin.\n\nLorsque nous projetons notre volonté dans le Suaire, cela nous permet de tirer de petites quantités de pouvoir de chacun de ses domaines d'harmonie. Il faut une grande concentration pour y parvenir, mais nos esprits sont à présent suffisamment solides pour maintenir cet équilibre délicat."
 shroud.3500.a: "Au sein du Suaire, notre volonté nous est propre"
 shroud.3510.title: "$utopia.2681.name$"
 shroud.3510.desc: "Dans un repli du §HSuaire§!, nos [GetTelepathPlural] ont découvert un noyau de pouvoir inexploité.\n\nDes forces convergentes peuvent s'accumuler peu à peu dans la dimension psionique pour former de puissantes concentrations d'énergie qui pourront, un jour, devenir de plus grandes entités. Nous avons découvert un rassemblement de ce type, n'attendant que d'être cueilli.\n\nPar la force de sa volonté psionique pure, l'un d'entre nous pourrait absorber cette force extraordinaire. Plusieurs candidats ont été sélectionnés."
 shroud.3510.a: "Notre §H[leader_1.GetTitle]§! [leader_1.GetName]"
 shroud.3510.b: "Notre §H[leader_2.GetTitle]§! [leader_2.GetName]"
 shroud.3510.c: "Notre §H[leader_3.GetTitle]§! [leader_3.GetName]"
 shroud.3510.d: "Notre §H[leader_4.GetTitle]§! [leader_4.GetName]"
 psionic_mastery: "Maîtrise psionique"
 psionic_mastery_desc: "Nous avons atteint la maîtrise de nos pouvoirs psioniques. Nos psychés se déplacent sans entrave à travers le Suaire."
 shroud.3520.title: "$psionic_mastery$"
 shroud.3520.desc: "En projetant notre volonté dans le §HSuaire§!, nous avons atteint un degré de maîtrise sur nos capacités psioniques. Nous avons rassemblé du pouvoir depuis les domaines de nombreuses entités, tout en restant exempts de leur influence. De plus, nos [GetTelepathPlural] disposent désormais d'un contrôle expert sur leurs transes psioniques.\n\nLà où d'autres auraient peut-être laissé le Suaire forger leur destinée, nous avons maintenu une véritable indépendance de volonté.\n\nLe potentiel psionique de la §H[this.GetName]§! a été réalisé."
 shroud.3520.a: "Ce n'est que le début"
 #==========================
 # Patrons First Contact
 #==========================
 shroud.first_contact.title: "$utopia.3300.name$"
 shroud.first_contact.prompt: "$utopia.2657.a$"
 shroud.first_contact.1.desc.default: "Le Suaire. Il s'écoule haut sous la réalité que nous connaissons, telle une ombre projetée par l'obscurité. Tout être doté de pouvoirs psioniques a vu cet endroit en rêve, même sans le savoir.\n\nNous avons passé des années à essayer de percer le voile, de l'amenuiser et lui faire perdre en épaisseur sous la pression combinée de tous nos esprits. De l'autre côté, nos efforts ont été remarqués. Quelque chose nous observe.\n\nSa présence irradie un pouvoir phénoménal, celui appartenant au mécène [GetPatronInsert], niché dans les profondeurs du Suaire. Cela nous remarque à peine. Cela nous surveille, un peu à la manière dont nous observerions nous-mêmes une goutte de condensation glissant sur un hublot.\n\nSi seulement nous pouvions atteindre son esprit insondable..."
 shroud.first_contact.1.desc.hive: "Le Suaire. Il s'écoule haut sous la réalité que nous connaissons, telle une vision à l'intérieur d'un drone qui se reposerait. Malgré son étrangeté, il paraît... étrangement familier.\n\nNous avons passé des années à essayer de percer le voile, de l'amenuiser et lui faire perdre en épaisseur sous la pression combinée de tous nos esprits. De l'autre côté, nos efforts ont été remarqués. Quelque chose nous observe.\n\nSa présence irradie un pouvoir phénoménal, celui appartenant au mécène [GetPatronInsert], niché dans les profondeurs du Suaire. Cela nous remarque à peine. Cela nous surveille, un peu à la manière dont nous observerions nous-mêmes un drone parmi une foule.\n\nSi seulement nous pouvions atteindre son esprit insondable..."
 shroud.first_contact.1.desc.robot: "Le Suaire. Il dépasse tous les paramètres spatiotemporels que nous avons précédemment détectés. La seule comparaison possible serait avec les données anormales qui perturbent nos cycles de repos.\n\nNous avons passé des années à essayer de pirater sa barrière, de l'amenuiser et lui faire perdre en épaisseur sous la pression combinée de tous nos processeurs. De l'autre côté, nos efforts ont été remarqués. Quelque chose nous observe.\n\nSa présence irradie un pouvoir phénoménal, celui appartenant au mécène [GetPatronInsert], niché dans les profondeurs du Suaire. Cela nous remarque à peine. Cela nous surveille, un peu à la manière dont nous observerions nous-mêmes un unique bit dans un flux de données.\n\nSi seulement nous pouvions atteindre son esprit insondable..."
 shroud.first_contact.2.desc.all: "Nous percevons des entités majeures au sein du Suaire, mais les calculs nous échappent. Contrairement à ceux de l'espace en perpétuelle expansion, leurs mouvements ne peuvent être suivis et leur destination rejoint leur origine, comme si les énergies se donnaient naissance à elles-mêmes.\n\nQuelle que soit leur nature, elles nous appellent par leur singularité de pensée et de volonté."
 shroud.first_contact.2.desc.default: "Parmi les nombreuses voix, nous en entendons une plus clairement que les autres : [GetPatronInsert] encercle nos psychés.\n\nPeut-être qu'avec un effort suffisant, nous pourrons établir le contact."
 shroud.first_contact.2.desc.robot: "Parmi les nombreuses voix, nous en détectons une plus clairement que les autres : [GetPatronInsert] domine nos calculs.\n\nPeut-être qu'avec un effort suffisant, nous pourrons établir le contact."
 shroud.first_contact.3.desc.default: "Nous traversons l'Entre-Deux, un vide qui sépare le Suaire de la réalité tangible de l'espace conventionnel.\n\nDès que nous entrons, nous ressentons sa présence : c'est bien [GetPatronInsert] qui envahit nos esprits. C'est une entité dotée d'un pouvoir inimaginable, projeté sur l'avenir.\n\nNous ne devons pas nous détourner."
 shroud.first_contact.3.desc.robot: "Nous traversons l'Entre-Deux, un vide qui sépare le Suaire des phénomènes de l'espace ordinaire.\n\nDès que nous entrons, nous détectons sa présence : c'est bien [GetPatronInsert] qui envahit nos esprits. C'est une entité dotée d'un pouvoir incroyable, projeté sur l'avenir.\n\nNous ne devons pas nous détourner."
 shroud.first_contact.4.desc.default: "Le Suaire pulse de pouvoir. Nous percevons ses énergies partout, pourtant il n'est nulle part. Y entrer revient à distinguer les schémas des sensations vagues, mais aussi à percevoir des entités majeures par la concentration.\n\nNous sentons le signal d'une force de ce type : [GetPatronInsert] nous appelle depuis les profondeurs insondables qui nous surplombent.\n\nRéussirons-nous à retenir notre souffle assez longtemps pour l'atteindre ?"
 shroud.first_contact.4.desc.robot: "Le Suaire pulse de pouvoir. Nous percevons ses énergies partout, pourtant il n'est nulle part. Y entrer revient à détecter les schémas et les distinguer des sensations vagues, mais aussi à révéler de puissantes entités grâce à un traitement intense.\n\nNous sentons le signal d'une force de ce type : [GetPatronInsert] nous appelle depuis les profondeurs insondables qui nous surplombent.\n\nNos circuits entreront-ils en surcharge avant que nous puissions l'atteindre ?"
 shroud.first_contact.end.b: "Il y a beaucoup de choses à prendre en compte"
 shroud.first_contact_insert.eater.default: "un §Hgrognement vorace§!"
 shroud.first_contact_insert.eater.machine: "un §Hgrognement insatiable§!"
 shroud.4005.title: "$the_eater_of_worlds_article_cap$ Émerge"
 shroud.4005.desc.default: "En sondant le §HSuaire§! plus profondément, nous sommes arrivés à portée d'une entité que nous avons provisoirement baptisée « §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§! ». Elle a émis le grondement vorace de celui qui se nourrit sans cesse, sans jamais être rassasié. Nos signaux exploratoires ont été reçus par des rots de feu et de ruine. Son apparente indifférence envers notre compréhension était étouffante.\n\nFinalement, l'impatience de la créature a pris le dessus. Un rugissement féroce a encerclé l'esprit de nos [GetTelepathPlural]. Au milieu de tas de débris et [GetEaterEmergesExtra]\n\nBrusquement, le bruit s'est tu, nous laissant tenaillés par une faim douloureuse.\n\nLa volonté de l'entité nous apparaît plus clairement, désormais. [GetEaterEmergesEnding]"
 shroud.4005.desc.hive: "$shroud.4005.desc.default$"
 shroud.4005.desc.gestalt_machine: "En sondant le §HSuaire§! plus profondément, nous sommes arrivés à portée d'une entité que nous avons provisoirement baptisée « §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§! ». Elle a émis le grondement vorace de celui qui se nourrit sans cesse, sans jamais être rassasié. Nos signaux exploratoires ont été reçus par des rots de feu et de ruine. Son apparente indifférence envers notre compréhension était écrasante.\n\nFinalement, l'impatience de la créature a pris le dessus. Un rugissement féroce a encerclé l'esprit de nos [GetTelepathPlural]. Au milieu de tas de débris et [GetEaterEmergesExtra]\n\nBrusquement, le bruit s'est tu, nous laissant pour la première fois tenaillés par une faiblesse que nous n'avions détectée que chez les espèces organiques : la faim.\n\nLa volonté de l'entité nous apparaît plus clairement, désormais. [GetEaterEmergesEnding]"
 shroud.4005.desc.individual_machine: "$shroud.4005.desc.gestalt_machine$"
 shroud.4005.desc_extra_pacifist: "de ruines, elle nous a présenté une vision d'agressivité insensée."
 shroud.4005.desc_extra_robot: "de ruines, elle nous a présenté un modèle de perfection martiale."
 shroud.4005.desc_extra_organic: "de cadavres, elle nous a présenté une destinée martiale d'une splendeur terrible."
 shroud.4005.desc_outro_pacifist: "C'est un agent de violence et de discorde qui s'oppose à la plupart de nos principes majeurs. Nous ne pensons pas qu'il soit recommandable de poursuivre le développement de l'harmonie avec cet être : $the_eater_of_worlds_color_article$."
 shroud.4005.desc_outro_robot: "Nous connaissons sa vision de violence et de gloire. Une fois que nos [GetTelepathPlural] se seront rechargés, nous pourrons communier avec cet être : $the_eater_of_worlds_color_article$."
 shroud.4005.desc_outro_organic: "Nous connaissons sa vision de violence et de gloire. Une fois que nos [GetTelepathPlural] auront récupéré, nous pourrons communier avec cet être : $the_eater_of_worlds_color_article$."
 shroud.4005.a.default: "[GetEaterEmergesOptionA]"
 shroud.4005.a.robot: "[GetEaterEmergesOptionA]"
 shroud.4005.a.pacifist: "Nous pouvons tirer des enseignements, même de cette terrible puissance"
 shroud.4005.a.non_pacifist: "Quelle puissance brute"
 shroud.4005.b.default: "$shroud.first_contact.end.b$"
 shroud.4005.b.robot: "$shroud.first_contact.end.b$"
 shroud.4005.c.default: "Quelle horreur !"
 shroud.4005.c.robot: "Protocole d'évitement de la menace initié"
 shroud.first_contact.end.a.tt.the_eater_of_worlds: "Gain d'§Yharmonie§! avec $the_eater_of_worlds_color_article$.\n$shroud.first_contact.end.b.tt.the_eater_of_worlds$"
 shroud.first_contact.end.b.tt.the_eater_of_worlds: "Révèle $the_eater_of_worlds_color_article$ dans le §YSuaire§!."
 shroud.first_contact.end.c.tt.the_eater_of_worlds: "Perte importante d'§Yharmonie§! avec $the_eater_of_worlds_color_article$.\n$shroud.first_contact.end.b.tt.the_eater_of_worlds$"
 shroud.first_contact_insert.cradle.default: "une §Hchaleur invitante§!"
 shroud.first_contact_insert.cradle.machine: "une §Hchaleur étouffante§!"
 shroud.4015.title: "$the_cradle_of_souls_article_cap$ Émerge"
 shroud.4015.desc.default: "Le pouvoir de l'entité que nous appelons « §H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§! » est dispersé à travers le §HSuaire§!, mais sa source reste évasive. Nous avons cherché dans la dimension psionique, changeant constamment de direction, questionnant notre jugement.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.hive: "Le pouvoir de l'entité que nous appelons « §H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§! » est dispersé à travers le §HSuaire§!, mais sa source reste évasive. Nous avons cherché dans la dimension psionique, changeant constamment de direction, questionnant nos calculs.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.default.end: "Alors que nous nous étions interrompus pour réfléchir, l'entité a émergé. Nous n'avons rien vu, rien entendu, mais nous avons ressenti une chaleur incomparable.\n\nNous avons perçu le pouvoir au coeur de cette chose, un noyau des énergies diffuses dans l'ensemble du Suaire, mais aussi au-delà. Les pensées convergeaient, irradiant une chaleur commune. Au retour de ce voyage, nous sommes lourds de quiétude.\n\nLes souhaits de cette entité nous apparaissent désormais plus clairement. [GetCradleEmergesEnding]"
 shroud.4015.desc.gestalt_machine: "Le pouvoir de l'entité que nous appelons « §H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§! » est dispersé à travers le §HSuaire§!, mais sa source reste évasive. Nous avons cherché dans la dimension psionique, changeant constamment de direction, questionnant nos calculs.\n\nAlors que nous avions interrompu le processus, l'entité a émergé. Nous ne sommes pas parvenus à transmettre un message, mais elle a activé une partie profonde de notre code.\n\nNous avons perçu le pouvoir au coeur de cette chose, un noyau des énergies diffuses dans l'ensemble du Suaire, mais aussi au-delà. Les concepts convergeaient, irradiant une chaleur commune. Au retour de ce voyage, nous sommes chargés de quiétude.\n\nLes souhaits de cette entité nous apparaissent désormais plus clairement. [GetCradleEmergesEnding]"
 shroud.4015.desc.individual_machine: "$shroud.4015.desc.gestalt_machine$"
 shroud.4015.desc_outro_homicidal: "Nos esprits refusent immédiatement ces fausses promesses d'ordre et d'harmonie. Développer davantage notre harmonie $the_cradle_of_souls_color_article$ affaiblirait notre détermination."
 shroud.4015.desc_outro_robot: "Nous connaissons sa vision d'ordre et d'harmonie. Une fois que nos [GetTelepathPlural] se seront rechargés, nous pourrons communier avec cet être : $the_cradle_of_souls_color_article$."
 shroud.4015.desc_outro_organic: "Nous connaissons sa vision d'ordre et d'harmonie. Une fois que nos [GetTelepathPlural] auront récupéré, nous pourrons communier avec cet être : $the_cradle_of_souls_color_article$."
 shroud_is_homicidal: "§RNotre nature violente et prédatrice nous l'interdit.§!"
 shroud.4015.a.default: "Espérons nous rapprocher encore davantage"
 shroud.4015.a.robot: "$shroud.4015.a.default$"
 shroud.4015.b.default: "$shroud.first_contact.end.b$"
 shroud.4015.b.robot: "$shroud.first_contact.end.b$"
 shroud.4015.c.default: "Non, pas ça"
 shroud.4015.c.robot: "C'est un non catégorique"
 shroud.first_contact.end.a.tt.the_cradle_of_souls: "Gain d'§Yharmonie§! avec $the_cradle_of_souls_color_article$.\n$shroud.first_contact.end.b.tt.the_cradle_of_souls$"
 shroud.first_contact.end.b.tt.the_cradle_of_souls: "Révèle $the_cradle_of_souls_color_article$ dans le §YSuaire§!."
 shroud.first_contact.end.c.tt.the_cradle_of_souls: "Perte importante d'§Yharmonie§! avec $the_cradle_of_souls_color_article$.\n$shroud.first_contact.end.b.tt.the_cradle_of_souls$"
 shroud.first_contact_insert.composer: "un §Haccord résonnant§!"
 shroud.4025.title: "$the_composer_of_strands_article_cap$ Émerge"
 shroud.4025.desc.default: "Nous avons suivi la piste de l'entité que nous avons provisoirement baptisée « §H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§! », toujours plus loin au sein du §HSuaire§!. Elle avait laissé des indices : une image par-ci, une mélodie par-là. Elle nous invitait à approcher, mais notre progression restait lente.\n\nEnfin, nous y sommes parvenus. Nous avons été accueillis par une panoplie de visions : systèmes stellaires débordants d'activités, distorsions prodigieuses des [GetSpeciesNamePlural]. Transportés par son étreinte, nous étions perdus dans un enchevêtrement de motifs âcres.\n\nNous avons saisi des fils pour nouer leurs extrémités. Les signes disparates évoluant en schémas. Nos énergies épuisées, nous nous sommes prélassés dans la majesté des formes et des silhouettes. La présence s'est retirée dans le silence.\n\nL'intention de cette entité nous apparaît plus clairement, désormais. Nous avons vu sa vision de la croissance débridée. Une fois que nos [GetTelepathPlural] auront récupéré, nous pourrons communier avec cet être : $the_composer_of_strands_color_article$."
 shroud.4025.desc.hive: "$shroud.4025.desc.default$"
 shroud.4025.desc.gestalt_machine: "Nous avons suivi les traces moléculaires de l'entité que nous avons provisoirement baptisée « §H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§! », toujours plus loin au sein du §HSuaire§!. Elle avait laissé des indices : une image par-ci, une mélodie par-là. Elle nous invitait à approcher, mais notre progression restait lente.\n\nEnfin, nous y sommes parvenus. Nous avons été accueillis par une panoplie de visions : systèmes stellaires débordants d'activités, distorsions prodigieuses des [GetSpeciesNamePlural]. Transportés par son étreinte, nous étions perdus dans un enchevêtrement de motifs incohérents.\n\nNous avons saisi des fils pour nouer leurs extrémités. Les signes disparates évoluant en schémas. Nos énergies épuisées, nous avons traité le remarquable ensemble de données. La présence s'est retirée dans le silence.\n\nL'intention de cette entité nous apparaît plus clairement, désormais. Nous avons vu sa vision de la croissance débridée. Une fois que nos [GetTelepathPlural] se seront rechargés, nous pourrons communier avec cet être : $the_composer_of_strands_color_article$."
 shroud.4025.desc.individual_machine: "$shroud.4025.desc.gestalt_machine$"
 shroud.4025.a.default: "Son pouvoir est resplendissant"
 shroud.4025.a.robot: "Son pouvoir est incalculable"
 shroud.4025.b.default: "$shroud.first_contact.end.b$"
 shroud.4025.b.robot: "$shroud.first_contact.end.b$"
 shroud.4025.c.default: "Un spectacle minable !"
 shroud.4025.c.robot: "Tout cela va mal finir"
 shroud.first_contact.end.a.tt.the_composer_of_strands: "Gain d'§Yharmonie§! avec $the_composer_of_strands_color_article$.\n$shroud.first_contact.end.b.tt.the_composer_of_strands$"
 shroud.first_contact.end.b.tt.the_composer_of_strands: "Révèle $the_composer_of_strands_color_article$ dans le §YSuaire§!."
 shroud.first_contact.end.c.tt.the_composer_of_strands: "Perte importante d'§Yharmonie§! avec $the_composer_of_strands_color_article$.\n$shroud.first_contact.end.b.tt.the_composer_of_strands$"
 shroud.first_contact_insert.instrument: "une §Hpulsation frénétique§!"
 shroud.4035.title: "$the_instrument_of_desire_article_cap$ Émerge"
 shroud.4035.desc.all.start: "Après des mois d'appels lancés en vain, l'entité baptisée « §H[Root.Patron:the_instrument_of_desire.GetPreCommunicationName]§! » a finalement émergé des profondeurs du §HSuaire§!."
 shroud.4035.desc.default: "$shroud.4035.desc.all.start$\n\nSon message nous a atteints comme un déluge. Des pensées ont afflué dans nos esprits avec force, parlant à nos désirs les plus fous. Les paroles se déversaient en nous, brusques et abondantes, noyant tout le reste de nos esprits. Le message était séduisant : une vision de pouvoir et de plaisir.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.default.end: "La cascade s'est changée en goutte à goutte. La présence n'attendait aucune réponse, du moins pour l'instant. Elle nous a abandonnés avec une soif impossible à étancher.\n\nLes besoins de l'entité nous apparaissent plus clairement, à présent. Nous connaissons sa vision de la richesse sans limites. Une fois que nos [GetTelepathPlural] auront récupéré, nous pourrons communier avec cet être : $the_instrument_of_desire_color_article$."
 shroud.4035.desc.hive: "$shroud.4035.desc.all.start$\n\nSon message nous a atteints comme un déluge. Des pensées ont afflué dans nos esprits avec force, parlant à nos désirs les plus fous. Les paroles se déversaient en nous, brusques et abondantes, noyant tout le reste de nos esprits. Le message était dynamisant : une vision de la production sans mesure.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.gestalt_machine: "$shroud.4035.desc.all.start$\n\nSon message nous a atteints comme un déluge. Des données ont afflué dans nos circuits avec force, dépassant toutes les entrées précédentes. Un code exotique se déversait en nous, brusque et abondant, noyant tout le reste de nos systèmes. Le message était dynamisant : une vision de la production sans mesure.\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.desc.machine.end: "La cascade s'est changée en goutte à goutte. La présence n'attendait aucune réponse, du moins pour l'instant. Elle nous a abandonnés avec un vide fragmenté, avide d'une saisie élégante.\n\nLes besoins de l'entité nous apparaissent plus clairement, à présent. Nous connaissons sa vision de la richesse sans limite. Une fois que nos [GetTelepathPlural] se seront rechargés, nous pourrons communier avec cet être : $the_instrument_of_desire_color_article$."
 shroud.4035.desc.individual_machine: "$shroud.4035.desc.all.start$\n\nSon message nous a atteints comme un déluge. Des pensées ont afflué dans nos esprits avec force, parlant à nos désirs les plus fous. Les paroles se déversaient en nous, brusques et abondantes, noyant tout le reste de nos esprits. Le message était dynamisant : une vision de la production sans mesure.\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.a.default: "C'est glorieux"
 shroud.4035.a.robot: "C'est remarquable"
 shroud.4035.b.default: "$shroud.first_contact.end.b$"
 shroud.4035.b.robot: "$shroud.first_contact.end.b$"
 shroud.4035.c.default: "Ce ne sont que des paroles creuses"
 shroud.4035.c.robot: "$shroud.4035.c.default$"
 shroud.first_contact.end.a.tt.the_instrument_of_desire: "Gain d'§Yharmonie§! avec $the_instrument_of_desire_color_article$.\n$shroud.first_contact.end.b.tt.the_instrument_of_desire$"
 shroud.first_contact.end.b.tt.the_instrument_of_desire: "Révèle $the_instrument_of_desire_color_article$ dans le §YSuaire§!."
 shroud.first_contact.end.c.tt.the_instrument_of_desire: "Perte importante d'§Yharmonie§! avec $the_instrument_of_desire_color_article$.\n$shroud.first_contact.end.b.tt.the_instrument_of_desire$"
 shroud.4040.title: "$utopia.3300.name$"
 shroud.4040.desc: "Nous connaissons de nombreuses voix dans le §HSuaire§!, leurs échos sont aussi variés qu'omniprésents. Après leurs dernières transes, nos [GetTelepathPlural] ont signalé la présence d'une entité unique en son genre sous la forme d'un §Htambourinement divers§! qui infiltrait le centre même du Suaire.\n\nEn appliquant comme il se doit notre énergie psionique, nous pouvons essayer de suivre la piste de cette entité puissante, connue parmi nos [GetTelepathPlural] sous le nom de §H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§!."
 shroud.4040.a: "$utopia.2657.a$"
 shroud.4045.title: "$whisperers_in_the_void_article_cap$"
 shroud.4045.desc.intro: "Dans nos efforts pour communier avec l'entité baptisée « §H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§! » nous sommes attirés vers les entrailles du Suaire. Dans ce domaine intérieur, le Suaire se tourne sans bouger. Les reflets de chaque pensée, de chaque cycle, se rassemblent en une force primaire. Nous entendons les voix des sans-voix, portées dans un bouillonnement intemporel : $whisperers_in_the_void_color_article$.\n\nUne discorde grinçante nous entoure. Nous luttons pour écouter leurs messages infinis, jusqu'à ce qu'une pensée singulière traverse nos [GetTelepathPlural].\n\n§HL'écoute est un sacrifice.§!\n\nPour puiser dans cet immense pouvoir, nous devons aider l'entité à occuper"
 shroud.4045.desc.covenant: "$shroud.4045.desc.intro$ le domaine d'un autre mécène : [GetCovenantPatronColor]. Un tel acte remplacerait complètement la présence de notre mécène actuel, faisant voler en éclat notre accord.$shroud.4045.desc.outro$"
 shroud.4045.desc.no_covenant: "$shroud.4045.desc.intro$ le domaine d'un autre mécène, remplaçant complètement sa présence.$shroud.4045.desc.outro$"
 shroud.4045.desc.outro: "\n\nCela pourrait avoir des conséquences majeures."
 shroud.4045.a: "Faisons entrer les Murmureurs du néant"
 shroud.4045.a.covenant.tt: "§RMet un terme à notre accord avec le mécène [GetCovenantPatronColor].§!\nRemplace entièrement sa présence dans son domaine par $whisperers_in_the_void_color_article$.\n§RIl y aura des conséquences.§!"
 shroud.4045.a.no_covenant.tt: "Nous choisirons le domaine d'un mécène majeur pour remplacer sa présence par $whisperers_in_the_void_color_article$.\n§RIl y aura des conséquences.§!"
 shroud.4045.b: "Mieux vaut éviter de troubler l'équilibre du Suaire"
 shroud.4046.title: "Changement dans le Suaire"
 shroud.4046.desc.1: "Dès que le choix a été fait, nos [GetTelepathPlural] ont surgi du §HSuaire§!, violemment"
 shroud.4046.desc.2: "Leurs esprits sont submergés par les échos de voix disparates.\n\nNotre choix a reconfiguré de façon irrévocable notre perception de la dimension psionique. Alors que $whisperers_in_the_void_color_article$ trouvent leur place dans nos esprits, nous ne sentons plus comme autrefois la présence d'un autre mécène : [GetCovenantPatronColor]. Nous n'avons désormais plus accès à son domaine.\n\nNous saisissons peu à peu la volonté des Murmureurs du néant. Nous percevons leur vision de la connaissance infinie. Une fois que nos [GetTelepathPlural]"
 shroud.4046.desc.3: "nous pourrons à nouveau entrer en contact avec cet être multiple et communier avec lui."
 shroud.4046.desc.robot: "$shroud.4046.desc.1$ éveillés. $shroud.4046.desc.2$ auront récupéré, $shroud.4046.desc.3$"
 shroud.4046.desc.organic: "$shroud.4046.desc.1$ activés. $shroud.4046.desc.2$ se seront rechargés, $shroud.4046.desc.3$"
 shroud.whispers_in_the_shroud.title: "Murmures dans le Suaire"
 shroud.whispers_in_the_shroud.a: "$utopia.2657.a$"
 minor_patron_instrument_cradle_intro: "Nous nous retrouvons entre le domaine de $the_instrument_of_desire_article$ et celui du $the_cradle_of_souls$."
 minor_patron_cradle_composer_intro: "Nous nous retrouvons entre le domaine du $the_cradle_of_souls$ et celui du $the_composer_of_strands$."
 minor_patron_composer_eater_intro: "Nous nous retrouvons entre le domaine du $the_composer_of_strands$ et celui du $the_eater_of_worlds$."
 minor_patron_eater_instrument_intro: "Nous nous retrouvons entre le domaine du $the_eater_of_worlds$ et celui de $the_instrument_of_desire_article$."
 minor_patron_default_intro: "Nous nous trouvons entre les domaines de deux puissantes entités du Suaire."
 shroud.4050.desc: "[This.GetMinorPatronCradleComposerIntro]\n\nDans ce chaos d'êtres sans vie, nous détectons une §H$code_name_animator$§! dont la volonté façonne des énergies denses en des formes curieuses et inédites.\n\nPuisque nous avons interrompu ses activités, elle s'approche et déplace le brouillard opaque du Suaire et nous tend quelque chose.\n\nQu'arrivera-t-il si nous le saisissons ?"
 shroud.4055.title: "$the_animator_of_clay_article_cap$ Émerge"
 shroud.4055.desc: "Alors que nos esprits se sont imprégnés des énergies turbulentes du Suaire, nos [GetSpeciesBodyPlural] ont commencé à convulser. Nous avons senti que la §H$code_name_animator$§! nous attrapait brièvement et nous incitait à observer.\n\nLa pénombre lourde s'est retirée pour dévoiler une silhouette. Ses membres s'agitaient brusquement, tirés d'un côté à l'autre par des cordelettes vaporeuses. Puis soudain, les liens ont disparu et la silhouette s'est effondrée.\n\nElle a doucement repris vie, se relevant progressivement, libre de ses mouvements, avant de recommencer sa danse hypnotique."
 shroud.4055.desc.know_animator: "Nous avons alors réalisé que nous avions déjà rencontré cette entité. $the_animator_of_clay_color_article_cap$ était diverti. Là où l'inanimé s'éveille et la matière morne est douée d'une âme, on le trouve lui aussi."
 shroud.4055.a: "La marionnette danse, libérée de ses ficelles"
 shroud.4060.desc: "[This.GetMinorPatronCradleComposerIntro]\n\nNous percevons une présence. Une §H$code_name_outsider$§! envahit notre esprit, déclenchant une tempête d'énergie psionique autour de nous.\n\nUn profond sentiment de regret et d'envie fait son entrée dans notre psyché collective. Nous voyons des images de systèmes stellaires familiers, tels qu'ils étaient des millénaires plus tôt.\n\nQuelle que soit cette entité, elle semble bien connaître notre galaxie. Y a-t-elle habité autrefois ?"
 shroud.4065.title: "$the_outsider_article_cap$ Émerge"
 shroud.4065.desc.intro: "Le pouvoir distant connu comme l'§H$code_name_outsider$§! a insinué l'angoisse dans nos esprits depuis les tréfonds du §HSuaire§!. Malgré son silence, l'avertissement était limpide :\n\n§HPrenez garde en ces royaumes. Vous ne connaissez pas les pouvoirs auxquels vous avez affaire. La ruine vous guette à tous les instants...§!"
 shroud.4065.desc.outro_default: "Quoi que cela signifie, nous connaissons maintenant $the_outsider_color_article$. Il reste à savoir de quelle manière nos destins sont liés."
 shroud.4065.desc.outro_know_zroni: "Cette entité a un lien avec notre galaxie. Elle est marquée de l'empreinte mentale distincte de la civilisation zronie. Nous l'avons déjà croisée. Comment est-ce possible ?\n\nQuoi que cela signifie, nous connaissons maintenant $the_outsider_color_article$. Il reste à savoir de quelle manière nos destins sont liés."
 shroud.4065.desc.outro_left_zroni: "Nous reconnaissons cet être. C'est la Devineresse que nous avons croisée près d'une §Hdéchirure astrale§!. Est-ce là son destin ? Est-elle devenue $the_outsider_color_article$ ?"
 shroud.4065.a.default: "Quelles horreurs a-t-elle connues ?"
 shroud.4065.a.know_zroni: "Le peuple zroni est-il toujours en vie ?"
 shroud.4065.a.left_zroni: "Ne succombons pas au même destin"
 shroud.4070.desc: "[This.GetMinorPatronComposerEaterIntro]\n\nUne masse de pensées s'installe autour de nos esprits. Un poids abrasif s'écoule au-dessus de nous, déformant notre perception du temps. Chaque grain de pensée frotte et grince contre la texture de ce nouveau domaine.\n\nAlors que la sensation s'évanouit, l'§H$code_name_tide$§! se retire, laissant des impressions durables derrière lui.\n\nLes traces s'attardent devant nous, nous invitant à le suivre."
 shroud.4075.title: "$the_endless_tide_article_cap$ Émerge"
 shroud.4075.desc: "L'§H$code_name_tide$§! a été mis au jour dans le §HSuaire§!. Dénué de forme, il n'en est pas moins vaste et sa présence s'étire infiniment de part et d'autre de notre perception.\n\nUn murmure texturé nous traverse en cascade, déroulant des histoires d'autrefois. Nous voyons des empires oubliés réduits en poussière par l'implacable marche du temps. Chaque grain qui nous submerge est un souvenir.\n\nAu sein de ces archives sans limites, des schémas apparaissent : des cycles d'ambition et de ruine, de triomphe et de déclin. Ces profondeurs renferment la sagesse.\n\n$the_endless_tide_color_article_cap$ s'étire au-delà du temps, érodant l'ignorance et ne laissant perdurer que ce qui en a la volonté."
 shroud.4075.a: "La sagesse est à présent nôtre"
 shroud.4080.desc: "[This.GetMinorPatronComposerEaterIntro]\n\nLa gravité de nos propres actions nous attire encore plus loin, leur poids nous entraînant dans l'ombre étouffante d'une forme montagneuse.\n\nDu haut de ses pics grisonnants, un regard inflexible creuse dans nos esprits. Nous luttons pour saisir l'ampleur de l'§H$code_name_mountain$§! devant nous.\n\nLe sommet le plus haut nous appelle, nous défiant de l'escalader."
 shroud.4085.title: "$the_pale_mountain_article_cap$ Émerge"
 shroud.4085.desc: "Nous escaladons les hauteurs vertigineuses du §HSuaire§! et atteignons enfin le sommet intangible. L'§H$code_name_mountain$§! nous a mis à l'épreuve, comme elle a testé ceux qui sont venus avant nous.\n\nUn immense mausolée d'empires oubliés nous chante un choeur aux échos de l'histoire effacée. Chaque strate d'échec et d'ambitions mal placées a permis de construire les fondations de ce qui a suivi.\n\nPourtant, ce n'est pas un tombeau figé, c'est un creuset. Le cycle de ruine et de renouveau reforge les échecs du passé dans le socle des triomphes à venir. La destruction n'est pas une fin, mais un nouveau début.\n\n$the_pale_mountain_color_article_cap$ s'élève dans nos esprits."
 shroud.4085.a: "La montagne continuera de grandir"
 shroud.4090.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\nUn poids réconfortant ralentit nos pensées jusqu'à ce qu'elles se changent en un brouillard béat et endormi. Des tensions précédemment inconnues se dispersent, remplacées par un calme somptueux.\n\nNous plongeons davantage dans cette douce étreinte et remarquons un §H$code_name_dream$§! qui s'approche de nous. Sa nature écrasante nous enveloppe et il nous murmure des promesses de contentement extravagant.\n\nSa paresse complaisante est étrangement tentante."
 shroud.4095.title: "$the_golden_dream_article_cap$ Émerge"
 shroud.4095.desc: "Alors que nous nous reposons dans un cocon de tranquillité oisive au sein du §HSuaire§!, nous nous retrouvons attirés dans les salles étincelantes de l'§H$code_name_dream$§!.\n\nDes tentations soyeuses nous traversent l'esprit alors qu'une riche tapisserie de splendeurs se déploie devant nous. La négligence fainéante menace nos pensées d'inertie sous le poids de son opulence.\n\n$the_golden_dream_color_article_cap$ nous offre le luxe au-delà de tout entendement."
 shroud.4095.a: "Le rêve s'éveille"
 shroud.4100.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\nLe bouillonnement chaotique du Suaire se déforme en un vortex agité d'énergie psionique. Soudain, les innombrables torrents déferlent et s'unissent, apaisés par une force invisible. Son calme crée de nouvelles formes paisibles.\n\nTout en observant ces phénomènes, nous prenons conscience d'une §H$code_name_point$§! orchestrant ces mouvements, soumettant le chaos pour en faire émerger l'ordre.\n\nSa sérénité nous appelle."
 shroud.4105.title: "$the_hollow_point_article_cap$ Émerge"
 shroud.4105.desc: "Nos [GetTelepathPlural] ont essayé de s'introduire agressivement dans le désordre turbulent du Suaire, sans succès. Ce n'est que lorsqu'ils ont cessé leurs efforts qu'ils ont senti la véritable étreinte de l'§H$code_name_point$§!.\n\nDes images sont apparues dans nos esprits, montrant une terrible procession de conflits, chacun débordant des distractions du chaos et de la fureur.\n\nAu milieu de tout cela, nous avons perçu la présence vigilante et éternelle de $the_hollow_point_color_article$. Sereine dans sa patience, elle attend que le conflit infini de la galaxie touche enfin à son terme."
 shroud.4105.desc.outro_homicidal: "Malgré nos instincts les plus élémentaires, nos esprits ont été exposés à une curieuse façon de penser."
 shroud.4105.a.default: "La patience survivra au conflit"
 shroud.4105.a.homicidal: "Ce n'est qu'un rêve mélancolique... nous connaissons notre véritable objectif"
 shroud.4110.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\nUn bruit chaotique laisse place à une obscurité étouffante. Nous sentons que nos intentions sont scrutées, étudiées, jugées.\n\nL'attente de l'ordre, incontesté et immuable, regarde au plus profond de nous. L'§H$code_name_throne$§! juge notre objectif.\n\nUne fois qu'il nous a observés à sa guise, les ténèbres reculent. La surveillance minutieuse cherche à nous contraindre à rentrer dans le rang."
 shroud.4115.title: "$the_vacant_throne_article_cap$ Émerge"
 shroud.4115.desc: "Nous nous sommes agenouillés en présence de l'§H$code_name_throne$§!.\n\nNos esprits ont été scrutés avec l'indifférence froide de l'autorité, qui nous fixait à notre place tout en nous jugeant.\n\nArmé de son vide oppressif, $the_vacant_throne_color_article$ n'offre ni clémence, ni souffrance. Il n'attend que l'ordre et la certitude, les imposant là où ils sont absents.\n\nNous portons désormais ce poids avec nous."
 shroud.4115.a: "Le jugement est présent partout"
 shroud.4120.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\nUne brusque sensation d'accélération nous submerge et nos perceptions sont dépassées par un afflux incompréhensible d'informations. Soudain, nous nous apercevons que nous fonçons vers des horizons infinis.\n\nUne entité bouge de concert avec nous. Cette §H$code_name_river$§! s'attarde brièvement avant que son élan la propulse au-delà des limites de notre compréhension.\n\nNous devons la suivre."
 shroud.4125.title: "$the_black_river_article_cap$ Émerge"
 shroud.4125.desc: "Ce n'est qu'en nous plongeant de force au-delà de nos limites confortables dans le §HSuaire§! que nous avons finalement pu atteindre la §H$code_name_river$§!.\n\nUne sensation de mouvement omnidirectionnel nous a saisis, à une vitesse qui défiait notre entendement. Par la suite, il nous a semblé que nous avions voyagé sur une distance immense en un temps record.\n\nNous avons finalement compris $the_black_river_color_article$ et son périple incessant. L'immensité de la galaxie est un chemin qu'il nous suffit d'emprunter."
 shroud.4125.a: "La vélocité à l'état pur"
 shroud.4135.title: "$end_of_the_cycle_article_cap$"
 shroud.4135.desc: "Sans prévenir, nous nous retrouvons déchirés à l'intérieur du Suaire. Une présence menaçante assaillit nos esprits.\n\nC'est $end_of_the_cycle_color_article$, et elle nous a toujours attendus. Les [GetTelepathPlural] lancent soudain un appel depuis leur transe : une douzaine de voix s'élèvent à l'unisson, en un choeur parfaitement synchronisé : §R« VOTRE MOMENT N'EST PAS ENCORE VENU. »§! Une pause. §R« MAIS CE POURRAIT ÊTRE LE CAS. »§!\n\nRien d'autre, mais un marché nous est offert - de cela au moins nous sommes certains. La puissance, le savoir, et des richesses au-delà de toute mesure.\n\n§RSi nous acceptons seulement d'amener la Fin.§!"
 shroud.4135.a: "$utopia.3308.a$"
 shroud.4135.a.tt: "Remplace le domaine de tous les mécènes connus par $end_of_the_cycle_color_article$.\nNous aurons au moins 50 ans pour consumer la galaxie dans l'§H$end_aura$§!. Si nous y parvenons, c'est la fin du jeu.\n$covenant.cycle.tooltip$$shroud.8450.a.tech_tooltip$\n$shroud.4135.psionic_components_insight$\n\nAnnule les accords avec tous les autres mécènes.\n$eotc_opinion_modifier_tooltip$"
 shroud.4135.b: "Sortons du Suaire et essayons d'oublier"
 shroud.4135.b.forging_our_own_path: "Notre chemin est maintenant décidé. Nous marchons seuls"
 shroud.4135.psionic_components_insight: "Avancée technologique gagnée sur tous les ['concept_psionic_components',composants psioniques] : §G+10%§!"
 concept_psionic_components: "Composants psioniques"
 concept_psionic_components_desc: "$tech_psionic_bombers$\n$tech_psionic_lightning$\n$tech_psionic_disruptor$\n$tech_zro_launcher$\n$tech_psionic_shield$\n$tech_precognition_interface$\n$tech_psi_jump_drives$"
 triggered_opinion_eotc_situation_stage1: "Invoquer la Fin"
 shroud.4140.title: "Tout ou rien"
 shroud.4140.desc: "Notre destin est lié à $end_of_the_cycle_color_article$. Là où son aura prospère, il en va de même pour notre population. Nous sommes arrivés à une conclusion simple : tout ce qui entrave l'aura entrave également la [This.GetName] et doit donc être éliminé.\n\nSi nous le voulons, nous pouvons faire fi de toute limite pesant sur nos objectifs militaires et conquérir nos ennemis, sans aucune pitié. Rien ne doit s'interposer face à la suprématie de la Fin."
 shroud.4140.a: "Que la destinée se réalise pleinement"
 shroud.4140.a.tooltip: "Donne accès au §Hcasus belli§! ['concept_total_war']\n$eotc_opinion_modifier_2_tooltip$"
 triggered_opinion_eotc_situation_stage2: "Les messagers de la Fin"
 shroud.4145.title: "Annihilation"
 shroud.4145.desc_1.common_1: "Alors que l'§Raura de fin§! se répand sur la galaxie, nous percevons une résistance grandissante."
 shroud.4145.desc_1.common_2: "Mais peu importe, nous n'attendrons pas que les autres acceptent $end_of_the_cycle_color_article$."
 shroud.4145.desc_1.default: "$shroud.4145.desc_1.common_1$ Nos voisins distants se retournent rapidement contre nous. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_1.homicidal: "$shroud.4145.desc_1.common_1$ L'antipathie de nos ennemis devient encore plus ancrée. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_2: "Inspirés par la volonté de notre mécène, nous avons conçu de nouvelles méthodes pour mobiliser l'énergie et la matière de façon à nourrir l'Aura. Nous sommes prêts à sacrifier l'essence même de l'univers pour faire progresser la Fin."
 shroud.4145.a: "Nous devons faire tout ce qui est nécessaire"
 shroud.4145.a.tooltip: "$eotc_opinion_modifier_3_tooltip$\nPermet les décrets :\n$t$- ['edict:annihilation_of_matter',$edict_annihilation_of_matter$]\n$t$- ['edict:annihilation_of_energy',$edict_annihilation_of_energy$][GetDimensionalCollapseEdictGain]"
 shroud.4145.dimensional_collapse: "\n$t$- ['edict:dimensional_collapse', $edict_dimensional_collapse$]"
