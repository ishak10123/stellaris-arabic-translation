 engineering_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
 RECKONING_ARRIVAL_PROJECT: "Face au Jugement"
 RECKONING_ARRIVAL_PROJECT_DESC: "La galaxie subit la menace d'une entité incroyablement puissante connue sous le nom de §R$NAME_Reckoning$§!. Composée d'énergie pure, elle s'est soudainement matérialisée pour lancer une campagne de destruction.\n\nToutes les données disponibles indiquent que cet être est un adversaire unique en son genre. Si nous devons affronter cette menace, nous devons réaliser au plus vite des recherches pour déterminer les meilleures méthodes de combat."
 shroud.11235.title: "$RECKONING_ARRIVAL_PROJECT$"
 shroud.11235.desc: "Nos [GetScientistPlural] ont mené des recherches minutieuses sur l'entité puissante connue sous le nom de §R$NAME_Reckoning$§!.\n\nSelon leurs découvertes, nous avons déterminé une méthode efficace d'affronter cet ennemi à l'aide de notre technologie existante. L'énergie que contient le $NAME_Reckoning$ peut être dégradée à l'aide d'une forme modifiée d'un armement conçu pour perforer les boucliers énergétiques.\n\nMalgré sa puissance, nous avons à présent une meilleure chance dans notre affrontement contre cette menace."
 shroud.11235.a: "$extreme_frontiers.1531.i$"
 RECKONING_VULNERABILITY_PROJECT: "Tout a un point faible"
 RECKONING_VULNERABILITY_PROJECT_DESC: "Bien que nous ayons échoué, notre affrontement contre le §R$NAME_Reckoning$§! nous a fourni des données inestimables.\n\nEn consacrant des recherches à cet être énergétique mystérieux, nous pourrons identifier ses vulnérabilités et ainsi, développer des méthodes d'attaque plus efficaces."
 shroud.11240.title: "Apprendre de notre défaite"
 shroud.11240.desc: "Le §R$NAME_Reckoning$§! possède une force trop importante pour que nos flottes puissent la vaincre. Malgré notre défaite, l'affrontement nous a permis d'obtenir des données cruciales sur cet être énergétique mystérieux. Nous n'aurions jamais pu obtenir ces informations sans contact direct.\n\nL'analyse préliminaire indique que nous avons rassemblé suffisamment de données pour modéliser la composition de l'entité. Des recherches supplémentaires nous permettront peut-être d'identifier ses faiblesses et de peaufiner nos attaques en conséquence."
 shroud.11240.a: "Tout a un point faible"
 shroud.11245.title: "La faiblesse du $NAME_Reckoning$"
 shroud.11245.desc.1: "Nos [GetScientistPlural] ont fait une découverte dans leurs recherches concernant l'être énergétique connu sous le nom de §R$NAME_Reckoning$§!."
 shroud.11245.desc.2.intro: "Non seulement cette entité a émergé"
 shroud.11245.desc.2.outro: "À l'aide d'une catégorie de lasers aux propriétés suppressives de psi, nos flottes pourront briser la connexion, laissant sa forme physique vulnérable aux attaques."
 shroud.11245.desc.2.psionic: "$shroud.11245.desc.2.intro$ du §HSuaire§!, mais en plus, elle maintient son pouvoir défensif à l'aide d'un lien transdimensionnel vers la dimension psionique. $shroud.11245.desc.2.outro$"
 shroud.11245.desc.2.non_psionic: "$shroud.11245.desc.2.intro$ d'une autre dimension de la réalité, mais en plus, elle maintient son pouvoir défensif à l'aide d'un lien transdimensionnel mystérieux. $shroud.11245.desc.2.outro$"
 reckoning_insight_modifier: "Savoir sur le Jugement "
 reckoning_insight_modifier_desc: "En menant des recherches approfondies, nous avons déterminé une méthode efficace pour infliger des dégâts au $NAME_Reckoning$ à l'aide d'une forme modifiée de l'un de nos armements existants."
 reckoning_vulnerability_modifier: "Faiblesse du Jugement "
 reckoning_vulnerability_modifier_desc: "Grâce aux données recueillies lors de notre dernier combat avec le Jugement, nous avons découvert un moyen de lui infliger des dégâts plus importants en utilisant des lasers suppresseurs de psi."
