 job_superstitious_beliefs_priest_corporate_desc: "En exploitant des canaux mystiques ancestraux, ces adeptes des marques offrent une perspective commerciale qui dépasse les limites des projections de marché habituelles."
 job_superstitious_beliefs_priest_corporate_effect_desc: "Les £job_superstitious_beliefs_priest_corporate£diseurs de bonne aventure transforment les £consumer_goods£§Ibiens de consommation§! en £unity£§Iunité§!, en £trade£§Ivaleur commerciale§! et en £stability£§Istabilité§!"
