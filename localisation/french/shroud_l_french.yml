 #==========================
 # Tutorials
 #==========================
 TUTORIAL_SHROUD_TAB_TITLE: "Didacticiel : le Suaire"
 TUTORIAL_SHROUD_TAB_DESC: "Voici l'onglet §SSuaire§!. Le panneau de gauche indique la position de notre empire dans le Suaire, représenté par les §Sdomaines§! de quatre entités psioniques connues sous le nom de §Smécènes§!.\n\nNotre emplacement est déterminé par l'§Sharmonie§!, qui s'acquiert lorsqu'une action du royaume physique trouve grâce aux yeux d'un mécène. Obtenez de l'harmonie pour débuter le processus de révélation de l'identité d'un mécène. Une fois révélé, cliquez sur un domaine pour ouvrir le panneau de son mécène.\n\nCliquez sur §S$DELVE$§! ou le centre du panneau de gauche pour entrer dans le Suaire et explorer la dimension psionique. L'expérience pourra dépendre de notre position d'harmonie au sein des domaines."
 TUTORIAL_SHROUD_PATRON_TITLE: "Didacticiel : mécènes du Suaire"
 TUTORIAL_SHROUD_PATRON_DESC: "Le panneau §SMécène§! propose des options et informations en lien avec un mécène du Suaire. Réalisez les objectifs fournis par les §Sappels§! et les §Sactes§! pour remporter de l'§Sharmonie§! avec une entité en particulier.\n\nAugmentez l'harmonie pour débloquer des accords passifs, qui offriront des avantages à votre empire. Si vous gagnez une harmonie importante avec un mécène, vous pourrez commencer le processus de formation d'un §Saccord§!, qui déclenchera des effets encore plus considérables."
 TUTORIAL_SHROUD_COVENANT_TITLE: "Didacticiel : accords"
 TUTORIAL_SHROUD_COVENANT_DESC: "La confirmation d'un §Saccord§! avec un mécène du Suaire permet d'accéder aux §Spouvoirs d'accord§!. $tutorial.shroud_covenant.shared$"
 tutorial.shroud_covenant.shared: "Cliquez sur l'icône d'un pouvoir d'accord pour activer ses effets en déboursant du £sr_zro£§Szro§!. Pour cela, rendez-vous dans le panneau Suaire ou celui du mécène individuel.\n\nAprès l'activation d'un pouvoir d'accord, il faudra patienter un certain délai afin qu'il se recharge pour pouvoir l'activer une nouvelle fois."
 TUTORIAL_SHROUD_SHAPING_TITLE: "Didacticiel : façonnage du Suaire"
 TUTORIAL_SHROUD_SHAPING_DESC: "Nous avons désormais la possibilité d'acquérir certains pouvoirs qui nécessitent normalement d'avoir un §Saccord§! avec un §Smécène§!.\n\nUne fois les deux §Saccords passifs§! d'un mécène débloqués, nous obtiendrons l'accès à un §Spouvoir d'accord§!. $tutorial.shroud_covenant.shared$"
 tutorial.2600.name: "Didacticiel : auras psioniques"
 tutorial.2600.desc: "Nos colonies habitées par des populations psioniques ont désormais la possibilité d'émettre une §Saura psionique§!. Cette aura provient du §Smécène du Suaire§! avec lequel nous possédons la plus forte §Sharmonie§!.\n\nLes auras psioniques ont divers effets sur notre propre empire, mais aussi parfois sur les empires alliés ou hostiles. Pour étendre notre aura à d'autres systèmes, nous allons devoir atteindre une harmonie encore supérieure avec un mécène, de façon à accéder à une technologie d'£research£§Sintensification d'aura psionique§!.\n\nPour observer les effets de notre aura psionique, ouvrez l'onglet §SSuaire§! ou survolez l'icône de l'aura, en bas au centre du panneau de la £interface£§SVue système§!."
 tutorial.2610.name: "Didacticiel : intensification d'aura psionique"
 tutorial.2610.desc: "Notre §Saura psionique§! a désormais la capacité de gagner en §Sintensité§! afin de se répandre à d'autres systèmes.\n\nLes auras psioniques peuvent atteindre trois niveaux d'intensité, aux effets progressifs. Si une aura psionique atteint un nouveau niveau d'intensité ou maximise son intensité, elle tentera de s'étendre aux systèmes voisins. La plupart des auras psioniques disposent d'une distance maximale à laquelle elles peuvent s'éloigner de leur source.\n\nL'intensité de l'aura peut augmenter par différents moyens, par exemple via des populations hautement psioniques, des niveaux élevés de £happiness£§Sbonheur§!, des emplois de £job_telepath£[GetTelepath_lower] et des £leader£personnalités ou gouverneurs psychiques de £sector£secteurs."
 tutorial.2620.name: "Didacticiel : opposition d'auras"
 tutorial.2620.desc: "Notre §Saura psionique§! a rencontré une autre aura dans un système voisin. Lorsque cela se produit, les deux auras peuvent s'affronter pour déterminer laquelle s'étendra dans l'autre système.\n\nCe processus dépend du §Sgain§! mensuel d'intensité de chacune des auras, qui peut être consulté en survolant l'icône d'aura en bas au centre du panneau de la £interface£§SVue système§!."
 #==========================
 # Technologies
 #==========================
 tech_psionic_aura: "$PSIONIC_AURA$"
 tech_psionic_aura_desc: "Les émanations psioniques du Suaire apportent la faveur d'une entité dans la réalité physique. Un empire en harmonie avec un mécène du Suaire émettra une aura psionique depuis l'endroit où sa population psionique est la plus importante."
 feature_unlock_psionic_aura: "$PSIONIC_AURA_PLURAL$"
 feature_unlock_psionic_aura_desc: "Permet à un empire en harmonie avec un mécène du Suaire d'émettre une aura psionique depuis l'endroit où sa population psionique est la plus importante."
 psionic_aura_delve_success_tt: "Chances de réussite de la visite : §G+$@delve_success_tier_1|0$%§!"
 tech_aura_intensification: "Intensification d'aura psionique"
 tech_aura_intensification_desc: "Les émanations psioniques du Suaire aspirent à s'étendre. Grâce à ces nouvelles connaissances, les auras psioniques d'un empire peuvent être amplifiées davantage et se propager à des systèmes stellaires entiers pour avantager nos alliés et désavantager nos ennemis."
 feature_allow_psionic_aura_intensity_spread: "Propagation d'aura psionique"
 feature_allow_psionic_aura_intensity_spread_desc: "Permet aux auras psioniques de se propager aux systèmes voisins, jusqu'à §Y[Owner.GetAuraHyperlaneRange]§! hyperlignes de la source."
 feature_allow_psionic_aura_intensity_growth: "Croissance d'aura psionique"
 feature_allow_psionic_aura_intensity_growth_desc: "Permet aux auras psioniques de gagner en intensité."
 aura_intensification_delve_success_tt: "Chances de réussite de la visite : §G+$@delve_success_tier_2|0$%§!"
 tech_psionic_suppression: "Suppression psionique"
 tech_psionic_suppression_desc: "Les appareils capables d'atténuer l'énergie psionique sont aussi difficiles à fabriquer qu'à comprendre. En effet, la complexité est inévitable lorsque l'on s'intéresse à toute force extradimensionnelle."
 tech_psionic_suppression_feature_tt: "$i_unlocks_feature$ fabrication de §Ysceaux du Suaire§! et construction de §Ysuppresseurs psioniques§!."
 tech_aura_resonation: "Résonance d'aura"
 tech_aura_resonation_desc: "Il existe un moyen de faire rayonner les auras psioniques au-delà des mondes peuplés. Grâce à l'émetteur d'aura, même une base stellaire peut devenir un conducteur d'énergie psionique provenant du Suaire."
 tech_materiality_engine: "$building_materiality_engine$"
 tech_materiality_engine_desc: "$building_materiality_engine_desc$"
 tech_psionic_bombers: "Bombardiers psioniques"
 tech_psionic_bombers_desc: "De petite taille, ces appareils agiles se spécialisent dans l'envoi de charges concentrées d'énergie psionique. Plus la cible est massive, plus son explosion crée de résonance."
 tech_bio_psionic_bombers: "$tech_psionic_bombers$"
 tech_psionic_lightning: "Foudre psionique"
 tech_psionic_lightning_desc: "La création d'une connexion psionique temporaire entre deux vaisseaux permet la projection d'une charge directe de puissance mentale provoquant un effet dévastateur. En effet, l'énergie brute a la capacité de perturber les systèmes des vaisseaux et d'influencer leurs équipages."
 tech_bio_psionic_lightning: "$tech_psionic_lightning$"
 ship_terrify_tt: "De chances de ['concept_terrify',terrifier] les vaisseaux militaires pendant £time£§Y5 à 10§! jours, selon leur taille."
 concept_terrify: "Terrifier"
 concept_terrify_desc: "Les vaisseaux terrifiés interrompront leurs attaques et fuiront l'assaillant."
 tech_psionic_disruptor: "Disrupteurs psioniques"
 tech_psionic_disruptor_desc: "Ces disrupteurs hautement avancés déclenchent une lance puissante d'énergie psionique à travers les coques des ennemis, ce qui permet de désactiver de façon ciblée les armements adverses."
 tech_bio_psionic_disruptor: "$tech_psionic_disruptor$"
 tech_zro_launcher: "Lanceurs de zro"
 tech_zro_launcher_desc: "Ces munitions extrêmement concentrées en $zro_lower$ traversent les boucliers ennemis, et même de multiples réalités, sans perdre de leur puissance. Une fois en contact avec un objet physique, leurs effets dévastateurs sont exponentiels."
