 shroud.3.diplo_title: "$utopia.3000.name$"
 shroud.10.name: "Un allié contre la reine"
 shroud.10.desc.intro: "Le Suaire résonne d'une férocité sans précédent. De vastes spirales d'énergies se tordent dans les cieux.\n\nDans ce capharnaüm, nous observons les échos psioniques de la reine synthétique. Toute-puissante et infinie, elle joue avec la galaxie dans le creux de sa main."
 shroud.10.desc.outro: "Pourquoi ? Y aurait-il une faiblesse qui nous est inconnue ? Aurons-nous de l'aide si nous établissons le contact ?\n\nAlors que nous nous concentrons sur l'Animateur, nous percevons son impatience. Nous n'aurons probablement qu'une seule chance de lui demander son assistance. D'énormes quantités d'§Hénergie§! et de §Hzro§! seront nécessaires pour cet effort."
 shroud.10.desc: "$shroud.10.desc.intro$\n\nNous ne sommes pas les seuls à l'observer. Depuis sa cachette, l'entité connue comme $the_animator_of_clay_color_article$ observe, imperturbable, le pouvoir immense de la reine.\n\n$shroud.10.desc.outro$"
 shroud.10.desc.1: "$shroud.10.desc.intro$\n\nNous ne sommes pas les seuls à l'observer. Depuis sa cachette, $the_animator_of_clay_color_article$ observe, imperturbable, le pouvoir immense de la reine.\n\n$shroud.10.desc.outro$"
 shroud.10.a: "$animator.shroud$"
 shroud.10.b: "Nous n'avons pas besoin de son aide"
 shroud.10.b.tt: "Nous n'aurons jamais une autre chance de demander à l'Animateur de nous aider à vaincre Cetana."
