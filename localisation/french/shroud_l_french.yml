 CASUS_BELLI_COST_TT: "La sélection de ce §Hcasus belli§! coûtera :"
 casus_belli_cb_proxy_war: "Guerre par procuration"
 war_goal_wg_proxy_war: "Guerre par procuration"
 war_goal_wg_proxy_war_desc: "Guerre menée sur la base de rumeurs hostiles et de messes basses. En cas de victoire, l'attaquant obtient le contrôle des systèmes revendiqués, avec §Y33%§! de §Ymenace§! en moins pour chaque système conquis."
 shroud.5055.title: "$proxy_war_busted_modifier$"
 shroud.5055.desc.common: "Nous avons été bernés.\n\nNos agents ont intercepté des messages confidentiels provenant de la §H[from.GetName]§!, révélant leur intention de nous plonger dans une guerre par procuration.\n\nIls ont vigoureusement nié toute implication, mais le mal est fait."
 shroud.5055.desc.galactic: "$shroud.5055.desc.common$ La nouvelle de leur duplicité s'est rapidement répandue, ternissant leur réputation à travers toute la galaxie."
 shroud.5060.title: "$proxy_war_busted_modifier$"
 shroud.5060.desc.common: "Bien que nous ayons réussi à provoquer un conflit, l'opération ne s'est pas tout à fait déroulée comme prévu. Les messages de l'un de nos agents ont été interceptés, révélant nos agissements à toutes les parties concernées.\n\nNos tentatives pour expliquer la situation ont échoué."
 shroud.5060.desc.galactic: "$shroud.5060.desc.common$ Non seulement cet événement a détérioré nos relations avec les belligérants, mais le scandale a également terni notre réputation à l'échelle galactique."
 shroud.5060.desc.default: "$shroud.5060.desc.common$ Cet événement a considérablement détérioré nos relations avec les belligérants."
 shroud.5060.a.tt: "L'opinion des empires impliqués dans la §Yguerre par procuration§! à l'égard de la [Root.Owner.GetName] s'est dégradée de §R200§!."
 proxy_war_busted_modifier: "Guerre par procuration mise au jour"
 proxy_war_busted_modifier_desc: "Les complots qui ont conduit à une guerre par procuration ont été découverts par les parties impliquées. Cela a terni notre réputation."
 opinion_proxy_war_busted: "$proxy_war_busted_modifier$"
