 # Whisperers in the Void accords
 ACCORD_KNOWLEDGE: "Savoir"
 ACCORD_KNOWLEDGE_desc: "$whisperers_in_the_void_article_cap$ partagent leurs secrets avec nous."
 ACCORD_WISDOM: "Sagesse"
 ACCORD_WISDOM_desc: "$whisperers_in_the_void_article_cap$ détiennent le savoir de tous les domaines du Suaire."
 ACCORD_FORESIGHT: "Prévoyance"
 ACCORD_FORESIGHT_desc: "$whisperers_in_the_void_article_cap$ résonnent d'une sagesse intemporelle."
 ACCORD_FORESIGHT_TT: "Ajoute §G$@foresight_tech_progression|0%$§! à l'avancée des technologies étudiées actuellement"
 ACCORD_HINDSIGHT: "Rétrospection"
 ACCORD_HINDSIGHT_desc: "$whisperers_in_the_void_article_cap$ détiennent un codex des mondes issus d'époques et d'espaces qui nous sont inconnus. Il nous suffit d'en tourner une page."
 ACCORD_HINDSIGHT_TT: "Choisissez une colonie vous appartenant dans votre §Haura psionique§!. Elle devient un §Hmonde relique§! et tous les bloqueurs sont retirés.\n$ACCORD_LOOSE_INTENSITY$"
