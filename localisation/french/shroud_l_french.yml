 intensification_accord: "$ACCORD_INTENSIFICATION$"
 intensification_accord_effect: "Tous les §Ysceaux du Suaire§! sont désactivés."
 intensification_accord_aura_tt: "L'aura de fin désactive tous les §Ysceaux du Suaire§! jusqu'au §Y[from.shroud_seals_disabled_timer]§!."
 debris_destruction_name: "Détruit tous les §Ydébris§! de vaisseaux qui ont été abandonnés."
 rip_and_tear: "Destruction totale"
 rip_and_tear_desc: "La présence du $the_eater_of_worlds$ peut se manifester dans l'armement des flottes, sans aucune considération pour la sécurité du reste des vaisseaux.\n\n§E$debris_destruction_name$\n§!"
 ravenous_onslaught: "Massacre vorace"
 ravenous_onslaught_desc: "La faim du $the_eater_of_worlds$ entraîne nos flottes dans des combats rapprochés intenses. Amis ou ennemis, nous nous approprions tous les vaisseaux qui flottent encore à la fin du carnage.\n\n"
 hunger_accord_tt: "Permet les §Ydoctrines de guerre§! : §H$rip_and_tear$§! et §H$ravenous_onslaught$§!\nPermet le £building£§Y$BUILDING$§!: ['building:building_eater_sanctum']"
 building_cradle_sanctum: "Sanctuaire du Berceau"
 building_cradle_sanctum_desc: "Ce sanctuaire est dédié à la communion avec le Berceau. [GetCradleSanctumDesc]"
 building_cradle_sanctum_desc_homicidal: "Là, les esprits se rencontrent pour comprendre l'étrange volonté de notre mécène pacifiste."
 building_cradle_sanctum_desc_default: "Là, on cultive le calme par la rencontre des esprits, tout en encourageant la coopération intragalactique."
