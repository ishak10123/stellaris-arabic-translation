 PROXY_WAR_BUSTED_MESSAGE_TYPE_DESC: "Les belligérants impliqués ont découvert que nous étions à l'origine de la guerre par procuration.\n$shroud.5060.a.tt$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_TITLE: "$proxy_war_busted_modifier$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_DESC: "Nous avons découvert que la §H$INSTIGATOR$§! avait comploté pour nous plonger dans une guerre par procuration.\nNotre opinion à l'égard de la §H$INSTIGATOR$§! s'est dégradée de §R200§!."
