 # Entropy Drinkers
 civic_tooltip_not_entropy_drinkers: "N'a PAS le civisme appartenant au groupe ['concept_entropy_drinkers_civics']."
 civic_entropy_drinkers: "Buveurs d'entropie"
 civic_entropy_drinkers_desc: "$civic_ap_blockade_tt$\n\nCette société puise le précieux métabolisme de populations inactives par l'intermédiaire de connexions psychiques parasites. Une fois correctement collectées, ces énergies peuvent être redistribuées à des classes plus importantes."
 civic_entropy_drinkers_effects: "- Permet les §Hdécrets§! suivants :$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Peut construire : £building£['building:building_lifecrypt_1',tour sangsue].\n- Les personnalités commencent avec le trait ['concept_leader_trait_psionic']."
 civic_entropy_drinkers_psionic_modifier: "- $energy_with_icon$ pour $pop_group_unit$ £pop£pops psioniques : §G+0.5§!"
 civic_entropy_drinkers_machine: "Extracteurs énergétiques"
 civic_entropy_drinkers_machine_desc: "$civic_ap_blockade_tt$\n\nL'attribution adéquate d'énergie est essentielle pour garantir l'efficacité des machines. Toutes les unités sont conçues dans cet objectif, permettant le surcadençage périodique des noeuds critiques lorsque c'est nécessaire."
 civic_entropy_drinkers_machine_effects: "- Permet les §H$EDICTS$§!décrets suivants :$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council_machine',$edict_sanguine_council_machine$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Peut construire : £building£['building:building_lifecrypt_machine_1',batterie de siphon].\n- Les personnalités commencent avec le trait ['concept_leader_trait_psionic']."
 civic_entropy_drinkers_hive_mind: "Caste parasite"
 civic_entropy_drinkers_hive_mind_desc: "$civic_ap_blockade_tt$\n\nCe collectif réaffecte le précieux métabolisme de drones inférieurs par l'intermédiaire de connexions psychiques parasites. Une fois correctement collectées, ces énergies peuvent être redistribuées à des castes plus importantes."
 civic_entropy_drinkers_hive_mind_effects: "- Permet les §H$EDICTS$§!décrets suivants :$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Peut construire : £building£['building:building_lifecrypt_hive_mind_1',tour sangsue].\n- Les personnalités commencent avec le trait ['concept_leader_trait_psionic']."
 civic_entropy_drinkers_corporate: "Vampires d'entreprise"
 civic_entropy_drinkers_corporate_desc: "$civic_ap_blockade_tt$\n\nCette mégacorporation puise le précieux métabolisme de populations inactives par l'intermédiaire de connexions psychiques parasites. Une fois correctement collectées, ces énergies peuvent être redistribuées aux cadres supérieurs."
 civic_entropy_drinkers_corporate_effects: "- Permet les §Hdécrets§! suivants :$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Peut construire : £building£['building:building_lifecrypt_corporate_1',direction de synergie].\n- Les personnalités commencent avec le trait ['concept_leader_trait_psionic'].\n£building£§Y$building_executive_retreat$§! : $megacorp_civic_branch_office_building_effect$"
 has_not_begun_non_psionic_ascension: "N'a PAS de chemin de l'§Yascension non psionique§!"
 has_not_begun_non_psionic_ascension_success: "$TRIGGER_PASS$$has_not_begun_non_psionic_ascension$"
 has_not_begun_non_psionic_ascension_fail: "$TRIGGER_FAIL$$has_not_begun_non_psionic_ascension$"
 # Superstitious Beliefs
 civic_tooltip_not_superstitious_beliefs: "N'a PAS le civisme appartenant au groupe ['concept_superstitious_beliefs_civics']."
 civic_superstitious_beliefs_desc_common: "Avant chaque décision majeure, il est nécessaire d'organiser des cérémonies dignes pour être en harmonie avec les forces invisibles qui façonnent le destin."
 civic_superstitious_beliefs_common_effects: "Permet le décret ['edict:galactic_dowsing',$edict_galactic_dowsing$]\nTous les 13 ans, le ['concept_sb_cycle',cycle] change.\nLes événements survenant par hasard peuvent bénéficier à votre empire, ou au contraire, l'entraver."
 civic_superstitious_beliefs: "Croyances superstitieuses"
 civic_superstitious_beliefs_desc: "La société affirme avoir découvert un mécanisme ritualiste permettant de prédire l'avenir, en utilisant la reconnaissance de schémas ésotériques et l'analyse d'anomalies cycliques. $civic_superstitious_beliefs_desc_common$"
 civic_superstitious_beliefs_effects: "Remplace :\n$t$- Les £job_priest£prêtres par des £job_superstitious_beliefs_priest£médiums\n$t$- Les £job_high_priest£grands prêtres par des £job_superstitious_beliefs_high_priest£hauts astrologues\n$civic_superstitious_beliefs_common_effects$"
 civic_machine_superstitious_beliefs: "Découvreurs de schémas"
 civic_machine_superstitious_beliefs_desc: "Cet empire mécanique affirme être capable de résoudre l'inconnu en utilisant la reconnaissance de schémas ésotériques et l'analyse d'anomalies cycliques. Les alignements célestes sont observés avant chaque décision majeure pour assurer la meilleure prévision possible."
 civic_machine_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_hive_superstitious_beliefs: "Nexus de zodiaque"
 civic_hive_superstitious_beliefs_desc: "Ce collectif affirme avoir découvert un mécanisme ritualiste permettant de prédire l'avenir, en utilisant la reconnaissance de schémas ésotériques et l'analyse d'anomalies cycliques. $civic_superstitious_beliefs_desc_common$"
 civic_hive_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_corporate_superstitious_beliefs: "Entreprise de divination"
 civic_corporate_superstitious_beliefs_desc: "Cette corporation affirme avoir découvert un mécanisme ritualiste permettant de prédire l'avenir, en utilisant la reconnaissance de schémas ésotériques et l'analyse d'anomalies cycliques. Pour optimiser les résultats, les gains et pertes à venir sont évalués ainsi que les indicateurs de performance des alignements célestes idéaux."
 civic_corporate_superstitious_beliefs_effects: "Remplace :\n$t$- Les £job_priest£prêtres par des £job_superstitious_beliefs_priest_corporate£diseurs de bonne aventure\n$t$- Les £job_high_priest£grands prêtres par des £job_superstitious_beliefs_high_priest_corporate£courtiers de bonne aventure\n$civic_superstitious_beliefs_common_effects$"
 # Twisted Experimenters
 civic_twisted_experimenters: "Peine expérimentale"
 civic_twisted_experimenters_desc: "Dans cette société, les procédures judiciaires et la soif de savoirs partagent une seule et même solution. Travaillant dans le plus grand secret, des chercheurs mènent des expériences brutales sur des cobayes venus du monde criminel. Les morts éventuelles sont le coût du progrès."
 civic_twisted_experimenters_effects: "Commence avec la situation ['concept_experimental_testing'] qui accorde une connaissance technologique à son terme.\nPermet de construire et commence avec : £building£['building:building_experimentation_chambers_1'].\nTous les esclaves non mécaniques ont accès à l'emploi d'esclave ['concept_slave_orderly',aide-soignant].\nAccès à l'['concept_slave_army',armée d'esclaves] : §Y$abomination_army$§!"
 civic_twisted_experimenters_hive_mind: "Conscience corrective"
 civic_twisted_experimenters_hive_mind_desc: "Les déviants de ce collectif sont utilisés comme cobayes dans des recherches scientifiques de pointe, sans restrictions sur les méthodes appliquées. De cette façon, les drones problématiques conservent une certaine valeur sous forme d'équipements remplaçables."
 civic_twisted_experimenters_hive_mind_effects: "Commence avec la situation ['concept_experimental_testing_hive_mind'] qui accorde une connaissance technologique à son terme.\nPermet de construire et commence avec : £building£['building:building_experimentation_chambers_1']."
 civic_twisted_experimenters_corporate: "Recherche et développement judiciaires"
 civic_twisted_experimenters_corporate_desc: "Cette mégacorporation a mis en place une initiative réjouissante pour réduire les lacunes judiciaires tout en optimisant l'innovation scientifique. Les citoyens problématiques sont réassignés à des projets de recherche expérimentale et se soumettent à des tests rigoureux pour mener à des percées technologiques. Le nombre des victimes doit être maintenu dans les projections anticipées."
 civic_twisted_experimenters_corporate_effects: "Commence avec la situation ['concept_experimental_testing_corporate'] qui accorde une connaissance technologique à son terme.\nPermet de construire et commence avec : £building£['building:building_experimentation_chambers_1'].\nPermet de construire le £building£bâtiment de firme ['concept_building_carceral_test_facility'].\nTous les esclaves non mécaniques ont accès à l'emploi d'esclave ['concept_slave_orderly',aide-soignant].\nAccès à l'['concept_slave_army',armée d'esclaves] : §Y$abomination_army$§!"
 experimenters_we_will_learn_1: "Nous allons beaucoup en apprendre."
 experimenters_we_will_learn_2: "C'est une voie royale pour l'expérimentation."
 experimenters_we_will_learn_3: "Ces nouveaux paramètres sont réjouissants."
 experimenters_tragic_lesson_1: "Nous apprendrons beaucoup de cette tragédie."
 experimenters_tragic_lesson_2: "Cette tragédie est une opportunité pour de nouvelles expériences."
 experimenters_tragic_lesson_3: "C'est une leçon tragique, mais les données nous seront utiles."
 experimenters_ermerging_crime_1: "Un tel environnement offrira à nos [GetExperimentalEngineerPlural_lower] de nouvelles opportunités d'expérimentation."
 experimenters_ermerging_crime_2: "La criminalité nous accorde au moins des opportunités d'explorer de nouvelles voies dans la recherche scientifique."
 experimenters_ermerging_crime_3: "Ces conditions émergentes nous apporteront de nombreuses opportunités pour l'expérimentation."
 experimenters_ermerging_crime_4: "Ces environnements constituent une source riche en cobayes pour nos [GetExperimentalEngineerPlural_lower]."
 # Secret Societies
 civic_tooltip_not_secret_societies: "N'a PAS de civisme appartenant au groupe ['concept_secret_societies_civics']"
 civic_secret_societies: "Sociétés secrètes"
 civic_secret_societies_desc: "Un groupe de figures d'élite secrètes tissent une situation politique complexe depuis les coulisses, entrelaçant les affaires internes avec celles des autres mondes."
 civic_secret_societies_effects: "Des ['concept_ss_factions',factions] clandestines émergeront après avoir contacté d'autres empires.\nCommence avec la capacité à mener des ['concept_proxy_wars',guerres par procuration].\nLes [bureaucrat.GetIcon][bureaucrat.GetNamePlural_lower] produiront £unity£de l'unité pour chaque §Yguerre par procuration§! active et réussie.\nCommence par un ['concept_first_contact',premier contact] avec deux autres empires voisins.\n$INFILTRATION_LEVEL$ gagné sur les empires après le §Ypremier contact§! : §G+$@secret_society_infiltration_gain|0$§!"
 civic_secret_societies_corporate: "Cartel influent"
 civic_secret_societies_corporate_desc: "Les puissants bureaux de cette mégacorporation mènent des opérations extraplanétaires dans la plus grande confidentialité. Si vous n'êtes pas déjà au courant, c'est que vous n'avez pas à savoir."
 civic_secret_societies_corporate_effects: "Des ['concept_ss_factions',factions] clandestines émergeront après avoir contacté d'autres empires.\nCommence avec la capacité à mener des ['concept_proxy_wars',guerres par procuration].\nLes [bureaucrat.GetIcon][bureaucrat.GetNamePlural_lower] produiront de l'£unity£§Yunité§! pour chaque §Yguerre par procuration§! active et réussie.\nCommence par un ['concept_first_contact',premier contact] avec deux autres empires voisins.\n$INFILTRATION_LEVEL$ gagné sur les empires après le §Ypremier contact§! : §G+$@secret_society_infiltration_gain|0$§!\n£building£§Y$building_corporate_embassy$§! : $megacorp_civic_branch_office_building_effect$"
 shroud.5012.title: "Émergence de sociétés secrètes"
 shroud.5012.desc: "Nos soupçons étaient justifiés. Les civilisations voisines de [first_neighbor.GetName] et [second_neighbor.GetName] ont confirmé avoir été contactées via des canaux officieux avant d'entamer une communication plus officielle.\n\nCes §Hfactions§! émergent à présent de nos propres ombres et revendiquent leur existence. Connues sous les noms de §H$pft_the_curtain$§!, §H$pft_the_masquerade$§! et §H$pft_the_grand_dance$§!, ces organisations autrefois secrètes réclament dorénavant un dialogue officiel avec nous.\n\nNous ne saurons peut-être jamais véritablement ce qu'elles veulent et comment elles ont appris ce qu'elles savent, mais il est possible que nous ayons tout intérêt à répondre à leurs exigences."
 shroud.5012.a: "Que la danse commence..."
 shroud.5012.tt: "Des §Yfactions de société secrète§! émergeront bientôt :\n$t$§H$pft_the_curtain$§!\n$t$§H$pft_the_masquerade$§!\n$t$§H$pft_the_grand_dance$§!"
 shroud.5013.title: "Contacts étranges"
 shroud.5013.desc: "Parmi nous, certains agissent sous couvert de diplomatie. Nous supposons cependant qu'ils ne se limitent pas à notre propre monde natal.\n\nBien que nous ne nous soyons aventurés que récemment parmi les étoiles, nous sommes parvenus à établir le contact très facilement avec d'autres formes de vies. Cela ne ressemble pas à une simple coïncidence. Nous soupçonnons que ces relations interstellaires trouvent leur origine dans le mystère de certaines §Hfactions§! qui se sont profondément ancrées au coeur de notre société.\n\nUne fois que nous en saurons plus sur ces êtres, peut-être que ceux qui évoluent dans l'ombre révéleront enfin leur vrai visage."
 shroud.5013.a: "Sont-ils avec nous ou contre nous ?"
 # Chosen
 civic_ap_blockade_tt: "§RATTENTION : bloque toute ascension à l'exception du chemin ['concept_psionic_ascension',psionique].§!"
 civic_chosen: "Élus"
 civic_chosen_desc: "$civic_ap_blockade_tt$\n\nInfluencée par le Suaire au début de son histoire, cette société est liée par un pacte de patronage avec une entité puissante."
 civic_chosen_effects: "- Débute la partie en contact avec un §Imécène du Suaire§!.\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£['technology:tech_psionic_aura',aura psionique]"
 civic_chosen_effects_additional: "- Acquiert une adaptation de l'£unity£§Iunité§! du fait de l'['concept_attunement',harmonie] avec le Suaire"
 civic_hive_chosen: "Nombreux élus"
 civic_hive_chosen_desc: "$civic_ap_blockade_tt$\n\nInfluencé par le Suaire au début de son histoire, ce collectif est lié par un pacte de mécénat avec une entité puissante."
 civic_machine_chosen: "Réseau d'apôtres"
 civic_machine_chosen_desc: "$civic_ap_blockade_tt$\n\nInfluencées par le Suaire au début de leur histoire, ces machines sont codées en dur par un pacte de mécénat avec une entité puissante."
 civic_corporate_chosen: "Directeurs élus"
 civic_corporate_chosen_desc: "$civic_ap_blockade_tt$\n\nDepuis sa fondation, cette corporation doit son succès à une mystérieuse entité du Suaire, avec laquelle elle respecte un pacte de mécénat."
 civic_corporate_chosen_effects: "$civic_chosen_effects$\n- £building£§Y$building_psionic_offices$§! : $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_chosen: "N'a PAS le civisme appartenant au groupe ['concept_chosen_civics']."
 concept_chosen_civics: "Élus"
 concept_chosen_civics_desc: "Le groupe $concept_chosen_civics$ inclut :\n- ['civic:civic_chosen']$NEW_LINE$- ['civic:civic_hive_chosen']$NEW_LINE$- ['civic:civic_machine_chosen']$NEW_LINE$- ['civic:civic_corporate_chosen']"
 shroud.5105.title: "Les élus"
 shroud.5105.desc: "Nous le savons depuis toujours... Nous avons une connexion éthérée avec une entité que nous ne pouvons ni comprendre, ni définir.\n\n[This.GetTheChosenP2]\n\nDepuis aussi longtemps qu'il nous est possible de remonter grâce aux archives, cette chose mystérieuse est là. À l'évidence, elle nous a choisis. Mais pourquoi ? Cela reste à découvrir.\n\nQuel nom devons-nous donner à notre [This.GetSensation_lower] ?"
 shroud.5105.desc_p2: "Nous ressentons sa présence dans nos pensées les plus intimes. Elle plane, toujours hors de portée. C'est à la fois une certitude et une impossibilité dans notre esprit."
 shroud.5105.desc_p2_machine: "Nous détectons sa présence dans nos calculs les plus complexes. Elle plane, toujours hors de portée. C'est à la fois une certitude et une impossibilité dans nos circuits."
 shroud.5105.a: "$the_composer_of_strands_article_cap$"
 shroud.5105.b: "$the_eater_of_worlds_article_cap$"
 shroud.5105.c: "$the_cradle_of_souls_article_cap$"
 shroud.5105.d: "$the_instrument_of_desire_article_cap$"
 shroud.5110.title: "Notre [GetChosenPatron] nous appelle"
 shroud.5110.desc_common: "À travers toute notre histoire, l'entité indicible que nous connaissons sous le nom de §H[GetChosenPatron]§! nous accompagne. Aujourd'hui, alors que la vaste galaxie nous attend, nous pouvons [GetFeelLoc] plus que jamais sa présence dans nos [GetMindPhysicalLoc].\n\nElle plane, nous attirant plus près. Et cette proximité nous offre pour la première fois un aperçu des véritables contours de ce vide profond et mystérieux qui règne dans notre [GetMindLogicLoc]. Notre [GetChosenPatron] nous appelle"
 shroud.5110.desc_common_2: "Nous comprenons enfin comment nous rendre dans ce domaine éthéré de notre propre volonté."
 shroud.5110.desc_organic: "$shroud.5110.desc_common$, nous faisant miroiter des expériences qui dépassent notre entendement.\n\n$shroud.5110.desc_common_2$"
 shroud.5110.desc_robot: "$shroud.5110.desc_common$, rationalisant nos paramètres selon des principes jusque-là inconnus.\n\n$shroud.5110.desc_common_2$"
 shroud.5110.a: "Nos horizons s'ouvrent vers l'intérieur"
 shroud.5110.a.tt: "Acquiert de l'§Yharmonie§! avec l'entité : $@chosen_patron_attunement_gift|0G$\nL'interface du §YSuaire§! est accessible via le menu §YContacts§!."
 shroud.5115.title: "[GetChosenPatron]"
 shroud.5115.desc.intro: "Le Suaire. Il s'écoule loin au-dessus de notre réalité connue, telle une ombre jetée par les ténèbres.\n\nBien que nous ayons commencé à explorer cette dimension psionique il y a longtemps, nos premières incursions étaient plus que timides. À présent, après des années passées à user le voile entre nos dimensions par le pouvoir de nos esprits combinés, nous le percevons assez clairement pour nous y aventurer sans peur.\n\nDe l'autre côté, nos efforts ne sont pas passés inaperçus. Notre §H[GetChosenPatron]§! nous attend."
 shroud.5115.desc.outro: "Dans ce maelström d'innombrables entités, sa clarté renferme une promesse."
 shroud.5115.desc.composer: "$shroud.5115.desc.intro$\n\n§HDÉPLOYEZ. ABSORBEZ. ÉTENDEZ.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.eater: "$shroud.5115.desc.intro$\n\n§HRESSENTEZ LA VÉRITABLE FAIM.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.cradle: "$shroud.5115.desc.intro$\n\n§HCOLLECTEZ ET EMBRASSEZ.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.instrument: "$shroud.5115.desc.intro$\n\n§HSUCCOMBEZ AU DÉSIR.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.a: "Nous reviendrons."
