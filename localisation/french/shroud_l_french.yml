 # Shroud
 THE_SHROUD_TITLE: "Le Suaire"
 SHROUD_HEADER_INSIGHT_TT: "$SHROUD_HEADER_TT$\n\nDécouvrez ses mécènes en atteignant la quantité adéquate d'§Hharmonie§! pour vous attirer leurs faveurs."
 SHROUD_HEADER_TT: "Le §HSuaire§! abrite de nombreuses entités."
 SHROUD_HEADER_DESC: "Le Suaire se divise en une multitude de domaines conceptuels en constante évolution, chacun peuplé d'une entité puissante. On raconte que les actions que l'on accomplit dans le royaume physique peuvent avoir des répercussions dans l'autre versant."
