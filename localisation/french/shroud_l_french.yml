 planet_test_subjects: "Emplois de sujets d'étude"
 planet_experiment_engineer: "Emplois d'ingénieurs expérimentaux"
 planet_production_overseers: "Emplois de superviseurs de la production"
 shroud_envoys: "Émissaires du Suaire"
 #==========================
 # Edicts
 #==========================
 # Energy Drain
 edict_energy_drain: "Drain énergétique"
 edict_energy_drain_desc: "La population se doit d'installer et de faire régulièrement inspecter des implants de récupération d'essence. Leur activation doit pouvoir se faire en un minimum de temps."
 edict_energy_drain_tt: "Les §Ypersonnalités§! ne mourront jamais de vieillesse.\n"
 # Sanguine Council
 edict_sanguine_council: "Conseil sanguin"
 edict_sanguine_council_desc: "La population entière doit se soumettre à des tests réguliers qui permettent d'extraire de l'énergie vitale à destination du Conseil gouvernemental de l'empire."
 edict_sanguine_council_machine: "Charge de nexus"
 edict_sanguine_council_machine_desc: "$edict_sanguine_council_desc$"
 # Galactic Dowsing
 edict_galactic_dowsing: "Radiesthésie galactique"
 edict_galactic_dowsing_gestalt: "$edict_galactic_dowsing$"
 edict_galactic_dowsing_desc: "Lorsque les prospecteurs se doteront de pratiques divinatoires en plus de leurs analyses géologiques conventionnelles, ils découvriront des filons bien plus abondants."
 edict_galactic_dowsing_gestalt_desc: "$edict_galactic_dowsing_desc$"
 edict_annihilation_of_matter: "Annihilation de la matière"
 edict_annihilation_of_matter_desc: "À chaque grain de poussière jeté dans les flammes, la chaleur de l'oubli brûle plus ardemment."
 edict_annihilation_of_energy: "Annihilation de l'énergie"
 edict_annihilation_of_energy_desc: "La danse de l'entropie tournoie depuis bien avant que nous ne prenions conscience de sa magnificence. Nous n'accélérons son tempo que maintenant."
 edict_dimensional_collapse: "Effondrement dimensionnel"
 edict_dimensional_collapse_desc: "D'autres dimensions que le Suaire sont liées à la nôtre. Et leur pouvoir aussi se révélera le moment venu."
 # Psychic Feast
 edict_psychic_feast: "Convergence de volonté"
 edict_psychic_feast_desc: "Par un effort mental important, nous pourrons éveiller un pouvoir encore plus grand chez nos personnalités."
 # Animatus
 edict_animatus: "Animatus"
 edict_animatus_desc: "$the_animator_of_clay_color_article_cap$ éveille une vie nouvelle au sein de nos flottes, comme si elles étaient dotées de leur propre volonté."
 # Will of Temperance
 edict_will_of_temperance: "Volonté de modération"
 edict_will_of_temperance_desc: "Armée de sa détermination, $the_outsider_color_article$ nous alerte sur les dangers qui se profilent."
 # Will of Distraction
 edict_will_of_distraction: "Volonté de distraction"
 edict_will_of_distraction_desc: "$the_golden_dream_color_article_cap$ nous dévoile des formes plus évoluées de loisir."
 # Will of Endless
 edict_will_of_endless: "Volonté d'infini"
 edict_will_of_endless_desc: "$the_endless_tide_color_article_cap$ améliore nos perspectives sur le temps lui-même."
 # Will of Rebirth
 edict_will_of_rebirth: "Volonté de renaissance"
 edict_will_of_rebirth_desc: "$the_pale_mountain_color_article_cap$ fait pour pouvoir défaire."
 # Will of Order
 edict_will_of_order: "Volonté d'ordre"
 edict_will_of_order_desc: "$the_vacant_throne_color_article_cap$ connaît l'ordre de chaque chose."
 # Will of Motion
 edict_will_of_motion: "Volonté de mouvement"
 edict_will_of_motion_desc: "D'une rapidité incomparable, $the_black_river_color_article$ nous emporte aux côtés du néant."
 #==========================
 # Event Chains
 #==========================
 mindwarden_enclave_chain_title: "$ENCLAVE_MINDWARDEN_PLURAL$"
 mindwarden_enclave_chain_desc: "Pour établir une nouvelle enclave des Gardiens de la conscience, envoyez une flotte militaire de taille suffisante et menée par un commandant vers un système éligible, puis sélectionnez la commande dans la §Hvue de la flotte§!."
 enclaves_built: "$ENCLAVE_MINDWARDEN_PLURAL$ établies"
 dividends_received: "Dividendes reçus"
 shroud_seals_built: "$SHROUD_SEAL_PLURAL$ dans la galaxie"
 chain_aura_suppressors_title: "Impédance de l'§Haura psionique§!"
 chain_aura_suppressors_desc: "L'§Haura de fin§! est mise à l'épreuve par des dispositifs étrangers capables d'atténuation psionique. La volonté de notre mécène nous oblige à démanteler ces machines de malheur."
 chain_aura_suppressors_seal: "§H$SHROUD_SEAL$§! en §Y[prev.GetName]§!"
 chain_aura_suppressors_seal_desc: "Un sceau du Suaire dans le système de [prev.GetName] limite la portée de l'§Haura de fin§!.\n\n§RIl doit être démantelé.§!"
 chain_aura_suppressors_suppressor: "§H$building_psionic_suppressor$§! sur §Y[prev.GetName]§!"
 chain_aura_suppressors_suppressor_desc: "Le suppresseur psionique sur [prev.GetName] limite la portée de l'§Haura de fin§!.\n\n§RNous devons le détruire.§!"
 chain_aura_suppressors_ward: "§H$building_ancient_ward_2$§! sur §Y[prev.GetName]§!"
 chain_aura_suppressors_ward_desc: "Un soi-disant centre majestueux sur [prev.GetName] limite la portée de l'§Haura de fin§!.\n\n§RNous devons le détruire.§!"
 #==========================
 # Events
 #==========================
 # Good luck events
 # Good luck event 1
 shroud.500.title: "Percée non conventionnelle"
 shroud.500.desc: "Nos institutions majeures ont mené de nouvelles recherches prometteuses qui ont permis d'accomplir une percée inattendue. Par pur hasard, la standardisation habituelle de nos instruments a prouvé une théorie que l'on pensait depuis longtemps être un simple mauvais calcul. Nous pouvons désormais réévaluer nos découvertes d'autrefois."
 HOW_FORTUITOUS: "C'est une chance !"
 shroud.500.tt: "Informations obtenues sur une technologie aléatoire : §G$@good_luck_event_1_insight|0%$§!"
 # Good luck event 2
 shroud.507.title: "Veine principale découverte"
 shroud.507.desc: "Un réseau de cavernes naturelles riches en minerais que l'on croyait entièrement effondré vient d'être redécouvert sur §H[This.GetName]§!.\n\nAprès une évaluation consciencieuse des risques, nous sommes convaincus que ces tunnels peuvent supporter une exploitation importante si nous développons nos efforts miniers."
 # Good luck event 3
 shroud.512.title: "[This.GetNewfoundFertilityTitle]"
 shroud.512.title_default: "Fertilité nouvelle"
 shroud.512.title_anglers: "Récif non découvert"
 shroud.512.desc: "Une étude géologique de routine a révélé que la qualité du sol de vastes régions de §H[This.GetName]§! s'était drastiquement améliorée durant ces dernières années.\n\nNous pensons que de nombreuses zones qui étaient autrefois considérées comme stériles peuvent désormais servir l'expansion de nos efforts agricoles."
 shroud.512.desc_anglers: "Un bateau de pêche a découvert un récif caché dans les océans de §H[This.GetName]§!. On pensait jusqu'alors que la région était déserte, mais elle accueille en réalité un riche écosystème de faune exploitable."
 # Good luck event 4
 shroud.517.title: "Cheminées géothermiques"
 shroud.517.desc: "Suite à un mouvement tectonique, une fissure s'est ouverte sous un vaste réservoir phréatique de §H[This.GetName]§!. La chaleur dégagée par le manteau planétaire fait bouillir l'eau piégée, provoquant la formation de cheminées géothermiques à la surface.\n\nCe phénomène naturel nous offre une occasion d'agrandir les infrastructures énergétiques de la colonie grâce à de nouvelles centrales électriques et pompes à chaleur."
 # Good luck event 5
 shroud.522.title: "Découverte d'un flux de particules quantiques"
 shroud.522.desc: "Une boucle mystérieuse d'éléments subatomiques est spontanément apparue sur §H[This.GetName]§!. Ce flux de particules quantiques présente une variété d'interactions rares à chaque seconde, ce qui nous apporte des données étonnantes sur la nature innée de la dynamique quantique.\n\nUne étude précise de ce champ quantique permettrait de mieux comprendre le fonctionnement même de notre univers."
 # Good luck event 6
 shroud.527.title: "Découverte d'un écho interdimensionnel"
 shroud.527.desc: "Nos [From.GetResearchers] ont détecté une concentration de signaux isochrones dans le système de §H[This.GetName]§!.\n\nLes analyses préliminaires indiquent que ces signaux proviennent d'une autre dimension. D'après les premières traductions, ces messages seraient en lien avec des principes logiques et des dilemmes philosophiques. Peut-être s'agit-il d'une tentative d'enrichissement culturel de la part d'entités dépassant notre entendement.\n\nSi nous établissons un lien direct avec ces signaux, nous pourrons continuer de suivre leurs révélations."
 # Good luck event 7
 shroud.532.title: "Découverte d'une épave"
 shroud.532.desc: "Un vaisseau délabré est apparu sur §H[This.GetName]§!. [From.GetQuantumParticleStreamDiscoveredExtra]\n\nNous en avons déduit que le vaisseau était sur ce système depuis des millénaires et qu'il avait échappé à la détection, ne révélant sa présence que lorsque son générateur d'énergie solaire était tombé en panne. Il n'y a aucun signe de vie à bord et nous avons déjà commencé à démonter minutieusement les composants pour en apprendre un maximum."
 shroud.532.extra: "Le véhicule irréparable était capable de générer une forme de champ d'invisibilité. En outre, il est bien plus avancé sur le plan tactique que nos propres flottes."
 shroud.532.extra_first_contact: "Le véhicule irréparable déployait une technologie d'occultation à des niveaux incroyables."
 shroud.532.a: "C'est un cadeau du ciel"
 # Good luck event 8
 shroud.537.title: "Métallurgie géothermique"
 shroud.537.desc: "L'activité géothermale est extrêmement volatile sous la surface de §H[This.GetName]§!. Des déversements de magma se sont produits dans l'épaisseur de la croûte planétaire, débordant dans des gisements de minerais non exploités.\n\nCe phénomène géologique a chauffé certains des minerais, raffinant des filons entiers de métaux en alliages solides. À présent, la réalisation d'opérations minières sur la planète produira donc des fragments de métaux utilisables."
 # Good luck event 9
 shroud.543.title: "Croiseur abandonné"
 shroud.543.desc: "Un vaisseau de combat déserté a été détecté, dérivant dans le système de §H[From.GetName]§!. L'apparence du vaisseau ne ressemble à aucune de celles utilisées par les empires connus, et il ne porte aucun drapeau ni insigne reconnaissable.\n\nAprès un diagnostic approfondi et des réparations mineures, nos [This.GetEngineerPlural_lower] ont déclaré que le vaisseau était désormais prêt à reprendre du service."
 shroud.543.a: "$shroud.532.a$"
 shroud.543.tt: "Obtient un vaisseau de classe croiseur dans le système."
 # Good luck event 10
 shroud.545.title: "[This.GetSenseOfOptimismTitle]"
 shroud.545.title_default: "Un certain optimisme"
 shroud.545.title_gestalt: "Cohésion unilatérale"
 shroud.545.desc: "Un optimisme inexplicable flotte dans l'air. La population semble nettement plus satisfaite et heureuse de vivre. Cette saute d'humeur collective est certainement due à des alignements célestes favorables et ne peut que représenter un bon présage pour l'avenir de §H[This.GetName]§!."
 shroud.545.desc_gestalt: "§H[This.GetName]§! fonctionne en véritable harmonie, sous l'égide d'une concentration absolue. Cette cohésion unilatérale est certainement due à des alignements célestes favorables et ne peut qu'augurer un avenir radieux."
 shroud.545.a: "Les étoiles sont de notre côté"
 # Good luck event 11
 shroud.553.title: "Trigone favorable"
 shroud.553.desc: "Trois corps célestes du système §H[From.GetName]§! se sont alignés pour former un trigone favorable : §H[favorable_trine_planet_1.GetName]§!, §H[favorable_trine_planet_2.GetName]§! et §H[favorable_trine_planet_3.GetName]§!.\n\nCet alignement astrologique bénéfique apporte tranquillité et harmonie à notre colonie sur §H[This.GetName]§!."
 shroud.553.a: "Il s'agit d'un événement unique en son genre"
 # Good luck event 12
 shroud.555.title: "[auspicious_position_planet.GetName] en position propice"
 shroud.555.desc: "§H[auspicious_position_planet.GetName]§! occupe une position propice dans les cieux surplombant §H[root.capital_scope.GetName]§!, où la planète a rejoint la Maison astrologique du retour céleste.\n\nCela représente le début d'un nouveau cycle interne pour la [root.GetName], ainsi qu'une occasion inédite de croissance et d'amélioration."
 # Good luck event 13
 shroud.560.title: "Harmonie élémentaire"
 shroud.560.desc: "Toutes les données astrologiques quantifiables indiquent que nous jouissons d'un équilibre élémentaire parfait.\n\nEn gérant précisément les lignes de force, cet équilibre bénéfique peut être maintenu pendant une période étendue, offrant un environnement métaphysique idéal dans lequel nos dirigeants pourront s'épanouir."
 shroud.560.a: "Quelle bonne fortune !"
 # Good luck event 14
 shroud.568.title: "Sommité radieuse"
 shroud.568.desc: "La Sommité principale du système §H[From.GetName]§! brille de mille feux. Après avoir discuté du phénomène avec les astrologues spécialistes, nous en concluons que cette énergie excédentaire stimulera toutes les formes de génération d'énergie sur §H[This.GetName]§!."
 shroud.568.a: "Que les étoiles soient de notre côté"
 # Good luck event 15
 shroud.570.title: "Harmonie du Conseil"
 shroud.570.desc: "Deux des membres de notre Conseil, §H[councilor_harmony_leader_1.GetTitle] [councilor_harmony_leader_1.GetName]§! et §H[councilor_harmony_leader_2.GetTitle] [councilor_harmony_leader_2.GetName]§! ont récemment découvert que leurs signes astrologiques sont parfaitement complémentaires.\n\nDepuis lors, leur partenariat politique unit notre gouvernement derrière les valeurs du respect mutuel et de l'efficacité, ce qui accélère les divers processus législatifs."
 shroud.570.a: "Une véritable synergie"
 # Good luck event 16
 shroud.575.title: "Les apparences sont trompeuses"
 shroud.575.desc: "Durant un inventaire de routine, un spécimen est tombé par terre dans la salle des §Hgrandes archives§!. On l'a donc rapidement apporté à un conservateur en vue de son examen.\n\nÉtonnamment, la chute aurait descellé un compartiment secret, qui a donc été découvert à cette occasion. Il contenait un large éventail d'artefacts passionnants que nous allons pouvoir ajouter à notre collection."
 shroud.575.a: "Nous ne sommes jamais au bout de nos surprises"
 # Bad luck events
 # Bad luck event 1
 shroud.700.title: "Discordance"
 shroud.700.desc: "Un effroi latent semble avoir saisi la population de nos mondes, sans que l'on puisse expliquer pourquoi. Le peuple se sent plus stressé, distrait et insatisfait de sa propre existence. Cette saute d'humeur collective est sans doute due à des alignements célestes peu propices."
 shroud.700.desc_gestalt: "Un sentiment de dissonance s'est fait jour dans l'ensemble de la §H[This.GetName]§!. Cette absence de coordination menant à la stagnation de notre collectif est sans doute due à des alignements célestes peu propices."
 HOW_UNFORTUNATE: "C'est bien ennuyeux"
 # Bad luck event 2
 shroud.707.title: "Collision navale"
 shroud.707.desc: "Un malentendu durant des manoeuvres navales de routine a provoqué une collision à haute vitesse entre plusieurs vaisseaux de combat de §H[This.GetName]§! dans §H[This.System.GetName]§!.\n\n[This.GetNavalCollisionLeader] a confirmé que les [From.GetIndividualNamePlural] responsables de cette erreur ont reçu les sanctions qui s'imposaient."
 shroud.707.leader_name: "§H[Leader.GetName]§!"
 shroud.707.default_name: "Commandement militaire central"
 shroud.707.tt: "Vaisseaux détruits à §H[This.GetName]§! : §R5§!"
 # Bad luck event 3
 shroud.710.title: "Feu de silo"
 shroud.710.desc_default: "Une panne électrique dans un silo de stockage sur §H[silo_fire_planet_targeted.GetName]§! a entraîné un immense incendie dans l'entrepôt.\n\n$shroud.710.desc$"
 shroud.710.desc_starbase: "Une panne électrique dans un silo de stockage sur la base stellaire de §H[silo_fire_starbase_targeted.Fleet.System.GetName]§! a entraîné un immense incendie dans l'entrepôt.\n\n$shroud.710.desc$"
 shroud.710.desc: "Les mesures de lutte contre les incendies ont connu une défaillance temporaire. Une partie importante des ressources stockées à l'intérieur du silo a donc été endommagé par les flammes. Le silo lui-même est désormais irréparable."
 shroud.710.a: "Maudites soient les étoiles !"
 shroud.710.tt_default: "§H$building_resource_silo$§! détruit sur §H[silo_fire_planet_targeted.GetName]§!\n$shroud.710.tt$"
 shroud.710.tt_starbase: "§H$sm_resource_silo$§! détruit sur §H[silo_fire_starbase_targeted.Fleet.System.GetName]§!\n$shroud.710.tt$"
 shroud.710.tt: "Ressources perdues : §R$@silo_fire_resources_lost|1%$§!"
 # Bad luck event 4
 shroud.715.title: "Faux pas diplomatique"
 shroud.715.desc: "L'un de nos représentants s'est malencontreusement comporté de manière inconvenante. Alors qu'il prononçait un discours visant à susciter le soutien envers nos intérêts, une défaillance de la traduction a délivré des insultes cruelles et virulentes envers leur victime : la [diplomatic_faux_pas_victim.GetName]. Le malheureux incident a fait les choux gras des médias galactiques, ce qui a sérieusement entaché notre réputation.\n\nCes actions n'entraînent pas un renvoi immédiat, mais notre renommée a été nettement affaiblie par cette inconduite."
 shroud.715.a: "Une erreur fâcheuse"
 shroud.715.tt: "§H[diplomatic_faux_pas_galcom_envoy.GetName]§! a acquis un nouveau trait : §R$leader_trait_destructive$§!"
 # Bad luck event 5
 shroud.720.title: "Éruption solaire extrême"
 shroud.720.desc: "Un flamboiement sans précédent en provenance de [extreme_solar_flare_system.GetName] a détruit presque toutes les stations orbitales du système.\n\nCes radiations de rayons gamma concentrés ont très largement dépassé tout ce qui avait été précédemment mesuré pour ce corps céleste. Notre analyse de la couche coronale montre que l'espérance de vie de cette étoile a été réduite de plus de trois millions d'années."
 shroud.720.desc_storm: "Le déchaînement d'énergie qui a résulté du phénomène a entraîné une tempête de poussière stellaire dans le système. Des mesures d'urgence sont actuellement en cours."
 shroud.720.tt: "Chaque poste d'observation, station de recherche et station minière de §H[extreme_solar_flare_system.GetName]§! a été détruite."
 # Bad luck event 6
 shroud.725.title: "Accident de circulation d'une personnalité"
 shroud.725.desc: "Des modifications climatiques inattendues ont perturbé les réseaux de transport sur §H[high_profile_traffic_accident_planet.GetName]§!. Outre des retards à grande échelle, les conditions ont provoqué de très nombreux accidents de circulation, dont l'un qui a impliqué [This.GetClass] §H[This.GetName]§!."
 shroud.725.desc_killed: "$shroud.725.desc$\n\nMalgré une prise en charge rapide par nos services d'urgence, ses blessures se sont avérées fatales."
 shroud.725.desc_killed_machine: "$shroud.725.desc$\n\nHélas, ses systèmes étaient trop endommagés pour que l'on puisse les réparer."
 shroud.725.desc_maimed: "$shroud.725.desc$\n\n[This.GetName] a survécu à la collision, mais non sans séquelles. Les dégâts sont irréversibles."
 shroud.725.a: "C'est tragique"
 # Bad luck event 7
 shroud.730.title: "Immenses dolines"
 shroud.730.desc: "D'énormes dolines se sont formées à la surface de §H[This.GetName]§!, causant des dégâts majeurs aux infrastructures. L'une des fissures s'est ouverte sous les fondations d'un bâtiment, ce qui a provoqué son effondrement partiel. Heureusement, toutes les zones touchées ont pu être évacuées.\n\nIl est impossible de déterminer la cause exacte de l'apparition soudaine de ces cavités géologiques, mais des vérifications d'entretien supplémentaires ont été mises en place pour surveiller l'érosion des sols."
 shroud.730.a: "Maudites soient les étoiles..."
 shroud.730.tt: "Un bâtiment est maintenant en ruines."
 # Bad luck event 7
 shroud.735.title: "Protestations spontanées"
 shroud.735.desc: "De dangereuses émeutes ont éclaté à travers §H[This.GetName]§!. La population se rebelle vivement contre une soi-disant conspiration au sujet du contrôle du gouvernement de la [From.GetName] sur les alignements célestes. Ce qui a commencé comme une manifestation un peu vive a rapidement pris la forme de violences lors desquelles les agitateurs ont provoqué des destructions de masse dans l'ensemble de la colonie.\n\nLes émeutiers ont été neutralisés par les forces de sécurité, mais il faudra du temps avant de réparer les dégâts subis par notre infrastructure."
 shroud.735.desc_hive: "Un groupe de drones déviants a mené une révolte dans la colonie §H[This.GetName]§!, entraînant des destructions à grande échelle. Malgré leur ferveur, les forces planétaires sont parvenues à neutraliser les agitateurs, mais il faudra du temps avant de réparer les dégâts subis par notre infrastructure."
 shroud.735.desc_machine: "Une minorité significative des drones présents sur §H[This.GetName]§! ont été infectés par un mystérieux virus, entraînant leur rébellion et leur tentative de détruire la colonie. Malgré leur ferveur, les forces planétaires sont parvenues à neutraliser les unités défaillantes, mais il faudra du temps avant de réparer les dégâts subis par notre infrastructure."
 shroud.735.a: "Il va nous falloir reconstruire"
 # Bad luck event 9
 shroud.740.title: "Maladie infectieuse soudaine"
 shroud.740.desc: "Un virus hautement transmissible a muté à la surface de §H[This.GetName]§!, infectant une large partie de la population. Des mesures de quarantaine ont été mises en place, comme le suivi des contacts et les restrictions des déplacements. Espérons qu'elles empêcheront la contamination à grande échelle pour éviter que nos infrastructures médicales ne se retrouvent débordées."
 # Bad luck event 10
 shroud.745.title: "Quartile calamiteux"
 shroud.745.desc: "Quatre corps célestes du système de §H[From.GetName]§! se sont alignés pour former un quartile calamiteux : §H[calamitous_quartile_planet_1.GetName]§!, §H[calamitous_quartile_planet_2.GetName]§!, §H[calamitous_quartile_planet_3.GetName]§! et §H[calamitous_quartile_planet_4.GetName]§!.\n\nCe phénomène astrologique désastreux instillera le poison du doute dans l'esprit de la colonie §H[This.GetName]§!, encourageant [FromFrom.GetDissent] et discorde parmi la population."
 shroud.745.a: "Un terrible présage"
 # Bad luck event 11
 shroud.750.title: "[planet_in_retrograde_planet.GetName] en rétrograde"
 shroud.750.desc: "Les habitants de §H[planet_in_retrograde_home.GetName]§! ont observé que la planète §H[planet_in_retrograde_planet.GetName]§! était désormais en rétrograde. Le temps est donc venu de réfléchir à nos actions et d'exprimer nos regrets concernant les imperfections de [This.GetName]. Puisse cette difficile période de réflexion nous rapprocher de nos idéaux à l'avenir."
 # Bad luck event 12
 shroud.755.title: "Déséquilibre élémentaire"
 shroud.755.desc: "Hélas, toutes les mesures quantifiables indiquent que [This.GetName] est en proie à une discorde élémentaire totale.\n\nLe réalignement de cette délicate harmonie s'avérera longue et difficile. Dans l'état de chaos actuel, nos responsables seront incapables d'accéder à un environnement méditatif métaphysique, ce qui entravera leur développement."
 shroud.755.a: "C'est inacceptable. Nous devons corriger cela"
 # Bad luck event 13
 shroud.760.title: "Déclin de la Sommité"
 shroud.760.desc: "La Sommité principale du système §H[From.GetName]§! a anormalement décliné. Selon nos astrologues spécialistes, cette baisse de la luminosité devrait avoir un effet négatif sur l'infrastructure énergétique de §H[This.GetName]§!."
 shroud.760.a: "Comment est-ce possible ?"
 # Bad luck event 14
 shroud.765.title: "Conseil discordant"
 shroud.765.desc: "Deux des membres de notre Conseil, §H[discordant_council_leader_1.GetTitle] [discordant_council_leader_1.GetName]§! et §H[discordant_council_leader_2.GetTitle] [discordant_council_leader_2.GetName]§! ont récemment découvert que leurs signes astrologiques étaient diamétralement incompatibles.\n\nDepuis lors, leur rivalité politique a créé une atmosphère d'animosité et de tension au sein de notre gouvernement, ce qui a entraîné des retards fréquents dans les processus législatifs de routine."
 # Bad luck event 15
 shroud.770.title: "Imprudence"
 shroud.770.desc_default: "Les opinions personnelles de l'un de nos administrateurs régionaux au sujet d'un autre empire ont été accidentellement transmises à ses sujets. Après une discussion difficile sur la surveillance des hyperlignes, un technicien chargé de la communication a oublié de fermer le canal de transmission, ce qui a permis à la [careless_talk_empire.GetName] de surprendre la floppée de jurons qui s'est ensuivie.\n\n$shroud.770.desc_end$"
 shroud.770.desc_machine: "La déclaration sans filtre de l'une de nos unités administratives au sujet d'un autre empire a été accidentellement transmise à ses sujets. Après une discussion difficile sur la surveillance des hyperlignes, une unité chargée de la communication a oublié de fermer le canal de transmission, ce qui a permis à la [careless_talk_empire.GetName] de surprendre la floppée de jurons qui s'est ensuivie.\n\n$shroud.770.desc_end$"
 shroud.770.desc_hive: "Les dénigrements de l'un de nos drones administrateurs au sujet d'un autre empire ont été accidentellement transmis à ses sujets. Après une discussion difficile sur la surveillance des hyperlignes, un drone chargé de la communication a oublié de fermer le canal de transmission, ce qui a permis à la [careless_talk_empire.GetName] de surprendre la floppée de jurons qui s'est ensuivie.\n\n$shroud.770.desc_end$"
 shroud.770.desc_end: "L'opinion de la population de la [careless_talk_empire.GetName] au sujet de [This.GetName] a inévitablement décliné."
 # Bad luck event 16
 shroud.775.title: "Perte de spécimen"
 shroud.775.desc: "Une erreur administrative a entraîné l'égarement de l'un de nos précieux artefacts culturels. Malgré des recherches intensives, il semble qu'il ait été perdu dans le labyrinthe de nos §Hgrandes archives§!, ou transféré vers un lieu inconnu.\n\nPar conséquent, les procédures en place pour le suivi de nos spécimens exposés ont été entièrement révisées."
 shroud.775.tt: "Spécimen exposé aléatoire perdu : §R1§!"
 # Experimental Testing Situation Finished
 shroud.1015.name: "Réussite des recherches expérimentales"
 shroud.1015.desc.intro: "Nos [Root.GetResearchers] ont accompli une série d'expériences révolutionnaires sur des sujets vivants, mettant à notre disposition des connaissances précieuses qui pourront stimuler de nouvelles avancées technologiques."
 shroud.1015.desc.default: "$shroud.1015.desc.intro$ Nous devons désormais réfléchir au domaine dans lequel mener la prochaine phase de recherches."
 shroud.1015.desc.escaped: "$shroud.1015.desc.intro$ La récente série d'exécutions en masse de détenus a donné à nos [Root.GetResearchers] tout le nécessaire pour réaliser une nouvelle avancée technologique."
 shroud.1015.a: "Menons des recherches en §Y£physics£physique§!"
 shroud.1015.a.tt: "Lance la situation §Y$situation_experimental_testing$§! avec l'approche §Y$situation_experimental_testing_physics$§! :$TABBED_NEW_LINE$$situation_experimental_testing_physics_outcome_tt$"
 shroud.1015.b: "Menons des recherches §Y£society£sociétales§!"
 shroud.1015.b.tt: "Lance la situation §Y$situation_experimental_testing$§! avec l'approche §Y$situation_experimental_testing_society$§! :$TABBED_NEW_LINE$$situation_experimental_testing_society_outcome_tt$"
 shroud.1015.c: "Menons des recherches en §Y£engineering£ingénierie§!"
 shroud.1015.c.tt: "Lance la situation §Y$situation_experimental_testing$§! avec l'approche §Y$situation_experimental_testing_engineering$§! :$TABBED_NEW_LINE$$situation_experimental_testing_engineering_outcome_tt$"
 shroud.1015.d: "Nous devons étudier les différentes possibilités"
 shroud.1015.d.tt: "Lance la situation §Y$situation_experimental_testing$§! avec l'approche §Y$situation_experimental_testing_hold$§! :$TABBED_NEW_LINE$$situation_experimental_testing_hold_effect_tt$"
 shroud.1015.physics_reward: "Obtient des connaissances sur une technologie de §Y£physics£physique§! aléatoire."
 shroud.1015.society_reward: "Obtient des connaissances sur une technologie §Y£society£sociétale§! aléatoire."
 shroud.1015.engineering_reward: "Obtient des connaissances sur une technologie d'§Y£engineering£ingénierie§! aléatoire."
 EXPERIMENT_TESTING_TECH_OPTION_TITLE: "Succès des expérimentations"
 EXPERIMENT_TESTING_TECH_OPTION_SETTING: "Connaissances obtenues ($situation_experimental_testing$)"
 EXPERIMENT_TESTING_TECH_OPTION_DESC: "Nos expériences ont produit des résultats prometteurs.\n$TECH|Y$ : §G+$VAL$%§! d'avancée"
 # Experimental Testing - Test subjects escape
 shroud.1105.title: "Fuite de sujets d'étude"
 shroud.1105.desc.intro: "Un certain nombre de nos précieux sujets d'étude se sont échappés d'un établissement sur §H[root.GetName]§! en passant par un tunnel de fortune.\n\nConçu à l'aide d'outils improvisés et de leurs propres [Owner.GetSpeciesHandNamePlural], le tunnel avait dû être commencé il y a des années. Impossible de savoir combien avaient connaissance de son existence, ni comment il est passé si longtemps inaperçu."
 shroud.1105.desc.escaped: "Nous devons répondre fermement à ces événements pour éviter qu'ils ne se reproduisent. Notre indulgence passée semble avoir été interprétée comme un encouragement à l'égard de la population restante."
 shroud.1105.desc.outro: "Nous devons répondre fermement à ces événements pour éviter qu'ils ne se reproduisent."
 shroud.1105.a: "Ils ont mérité leur liberté"
 shroud.1105.a.tt: "La moitié des §Ysujets d'étude§! sur §H[root.GetName]§! vont partir comme réfugiés"
 shroud.1105.b: "Cessez toutes les opérations jusqu'à ce que nous les ayons retrouvés"
 shroud.1105.b.tt: "Nous retrouverons les §Ysujets d'étude§! en fuite."
 shroud.1105.c: "Exécutez les sujets restants pour faire un exemple"
 shroud.1105.c.tt: "Tous les §Ysujets d'étude§! sur §H[root.GetName]§! seront perdus."
 testing_lockdown: "Interruption des expériences"
 testing_lockdown_desc: "Les expériences sont temporairement suspendues en attendant de retrouver les sujets en fuite."
 testing_lockdown_tt: "Vitesse d'avancée de la situation §Y$situation_experimental_testing$§! : §R-100%§!"
 example_set: "Faire un exemple"
 example_set_desc: "Notre réponse radicale à l'évasion garantit que les sujets d'étude se montrent désormais dociles."
 example_set_tt: "Vitesse d'avancée de la situation §Y$situation_experimental_testing$§! : §G10%§!"
 # Psionic Ascension Situation (Breaching the Shroud)
 # Mid-Stage Events
 # Beneficial Events
 # A1
 shroud.2300.name: "Transmission de pensées"
 shroud.2300.desc: "[Owner.GetThoughtTransmissionIntro]\n\nCes informations peuvent prendre des formes diverses : du contenu linguistique ou visuel spécifique aux émotions générales. Il est à noter qu'une transmission soigneusement réalisée laisse son sujet complètement inconscient de la procédure.\n\n[Owner.GetThoughtTransmissionOutro]."
 shroud.2300.intro: "À §H[Owner.Capital.GetName]§!, les [Owner.GetResearchers] psioniques ont développé une forme unidirectionnelle de télépathie, ce qui nous permet de transmettre des informations cognitives à toute conscience sensible."
 shroud.2300.intro_gestalt: "À §H[Capital.GetName]§!, les chercheurs [Owner.GetResearchers] ont développé une forme unidirectionnelle de télépathie, ce qui nous permet de transmettre des informations cognitives à toute conscience sensible, et pas uniquement à notre propre collectif."
 shroud.2300.desc.outro: "Cette technique ouvre de nouvelles possibilités pour la communication télépathique, avec de vastes implications au sein de la [Root.Owner.GetName], mais aussi au-delà."
 shroud.2300.desc.outro_homicidal: "Cette technique ouvre de nouvelles possibilités pour la communication télépathique, qui pourrait être exploitée au sein de la [Root.Owner.GetName], mais aussi au-delà."
 shroud.2300.a.robot: "Une prochaine étape logique dans notre développement"
 shroud.2300.a.organic: "Une prochaine étape logique dans notre évolution"
 shroud.2300.b: "Une nouvelle façon d'imposer notre volonté"
 shroud.2300.c.variant: "Un moyen d'assurer un ordre nouveau"
 shroud.2300.c.organic: "La société déterminera la meilleure utilisation"
 # A2
 shroud.2305.name: "Présence fantomatique"
 shroud.2305.desc: "Un certain nombre de nos [Owner.GetCitizen] ont perçu des apparitions troublantes dans divers lieux de §H[Owner.Capital.GetName]§!. Dans la plupart des cas, il s'agit d'événements isolés, mais un endroit en particulier se démarque par la fréquence de ces phénomènes. [Owner.GetPhantomPresenceExtra]\n\nIl semble que le fantôme apparaisse près de l'entrée d'un système de cavernes riches en minéraux."
 shroud.2305.extra: "Des foules de visiteurs affluent sur les lieux, avides d'apercevoir la silhouette fantomatique."
 shroud.2305.extra_spiritualist: "D'après les récits, la silhouette fantomatique qui apparaît là ressemblerait à une entité sacrée décrite dans nos traditions religieuses antiques."
 shroud.2305.a: "Un phénomène psionique qui mérite d'être étudié"
 shroud.2305.a_spiritualist: "C'est un miracle que nous devons vénérer"
 shroud.2305.b: "Il ne faut pas déranger cette source culturelle"
 shroud.2305.b_spiritualist: "Il ne faut pas déranger ce lieu sacré"
 shroud.2305.c: "Extrayons toutes les ressources de la zone"
 # A3
 shroud.2310.name: "Parasites psioniques"
 shroud.2310.desc: "Un événement climatique imprévu s'est produit à §H[Owner.Capital.GetName]§! : une sorte de tempête qui a balayé toute une zone de niveaux d'énergie psionique particulièrement élevés. Dans son sillage, nous avons trouvé de la faune locale infectée par un étrange parasite qui se niche dans le cerveau avant de le ronger.\n\nAu fur et à mesure que l'infection progresse, les animaux développent des capacités télékinésiques de base qu'ils utilisent pour chasser et se nourrir, jusqu'au moment où ils succombent.\n\n[Owner.GetShroudParasitesEnding]"
 shroud.2310.ending_biological: "Curieusement, ces parasites sont comestibles après une préparation soigneuse. Ce sont des sources riches en divers nutriments, et ils pourraient constituer un aliment sain et bon marché pour nos citoyens."
 shroud.2310.ending_lithoid: "Curieusement, ces créatures sécrètent d'importantes quantités d'une substance riche en composés non organiques. Il se pourrait qu'ils offrent une méthode inédite de synthèse minérale."
 shroud.2310.ending_machine: "Curieusement, ces créatures sécrètent d'importantes quantités d'une substance hautement combustible. Il se pourrait qu'ils offrent une méthode efficace de production bioénergétique."
 shroud.2310.a: "C'est une opportunité de recherche intéressante"
 shroud.2310.b_organic: "Il n'y a rien de tel qu'un repas gratuit"
 shroud.2310.b_machine: "Lançons les protocoles de collecte"
 shroud.2310.c: "Une nouvelle forme de vie fantastique a été découverte"
 # A4
 shroud.2315.name: "Manifestations matérielles"
 shroud.2315.desc: "Alors que nous réalisions des expériences à l'aide de nouvelles techniques psioniques, nous avons observé des matérialisations inattendues durant la méditation de groupe. Concentrer collectivement notre attention sur un point précis de l'espace provoque l'apparition flottante d'objets étranges et remarquables.\n\nLe prix psychique à payer est conséquent, mais il est possible que nous puissions orienter nos efforts pour faire apparaître des objets qui nous seront utiles. Bien que leur provenance et les conséquences possibles restent des inconnues."
 shroud.2315.a: "Réalisons nos rêves"
 shroud.2315.b: "Cultivons notre nourriture"
 shroud.2315.c: "Renforçons nos flottes"
 # A5a
 shroud.2320.name: "Dédoublement psionique"
 shroud.2320.desc: "Selon certaines rumeurs, des [Owner.GetIndividualNamePlural] psioniques sont capables de se dédoubler afin de se matérialiser dans deux endroits différents à la fois. Malgré notre scepticisme, nous avons envoyé nos [Owner.GetResearchers] pour mener l'enquête et nous avons eu la surprise d'apprendre que c'était vrai.[Owner.GetPsionicDoublingExtra]\n\nÀ l'heure actuelle, seule une partie de la population possède cette compétence remarquable, mais des études plus poussées pourraient permettre de découvrir des méthodes pour former tout le monde."
 shroud.2320.extra: "\n\nLa distance physique ne semble pas représenter un obstacle : en effet, les adeptes de cette technique ont prouvé à de nombreuses reprises qu'ils pouvaient apparaître brièvement dans deux systèmes stellaires distincts"
 shroud.2320.extra_organic: "$shroud.2320.extra$, tout en maintenant un lien psychique entre deux corps accomplissant des actions indépendantes."
 shroud.2320.extra_machine: "$shroud.2320.extra$, tout en maintenant un lien psionique entre deux unités accomplissant des actions indépendantes."
 shroud.2320.extra_default: "$shroud.2320.extra$."
 shroud.2320.a: "C'est une voie royale pour la coopération intragalactique"
 shroud.2320.b: "C'est une véritable forme de projection des forces"
 shroud.2320.c: "C'est une nouvelle méthode de gouvernement multiplanétaire"
 shroud.2320.d: "Comme c'est divertissant !"
 # A5b
 shroud.2325.name: "Observation psionique"
 shroud.2325.desc: "Une faculté psionique extraordinaire a émergé parmi une petite part de la population de [Owner.GetName] : il s'agit de la télesthésie, qui permet de percevoir des entités à distance, au-delà de la portée habituelle. Sans aucune formation spécialisée, ces observateurs sont capables de décrire correctement et dans le détail des objets lointains.\n\nLa §H[Root.Owner.GetName]§! obtiendra des récompenses considérables si ces pouvoirs peuvent être contrôlés et renforcés. En nous appuyant sur les capacités de nos [Owner.GetTelepathPlural] les plus puissants, nous pourrons tenter de peaufiner cette technique et de l'exploiter à des fins importantes."
 shroud.2325.a: "Découvrons les secrets de ceux qui nous entourent"
 shroud.2325.a_tt: "Renseignements sur tous les empires contactés : §G+10§!"
 shroud.2325.b: "Découvrons les confins de l'univers"
 shroud.2325.c: "Découvrons les points faibles de nos ennemis"
 shroud.2325.d: "Découvrons des gisements de ressources plus riches"
 # Balanced Events
 # B1
 shroud.2400.name: "Matières en mouvement"
 shroud.2400.desc: "Nous perdons des matériaux bruts à une vitesse inquiétante. Les stocks de matière non organique dans les usines et les entrepôts baissent plus vite qu'ils ne sont utilisés, [Owner.GetMatterInFluxExtra]. Ces pertes sont en lien avec une activité psionique accrue dans les lieux touchés.\n\nNous pourrions réagir en interrompant l'activité psionique à proximité des entrepôts, mais cela ralentira le rythme de nos recherches psioniques, ce qui limitera alors également leurs applications dans le champ industriel. L'autre possibilité consisterait à accepter de développer un atténuateur de champ psionique qui devrait stopper le processus de dématérialisation. Si nous ne faisons rien, nos capacités de recherche psionique seront réduites."
 shroud.2400.desc_default: "semble-t-il en raison d'une dématérialisation spontanée et non du fait de l'incompétence ou d'activités criminelles."
 shroud.2400.desc_gestalt: "semble-t-il en raison d'une dématérialisation spontanée et non du fait de comportements déviants ou incompétents."
 shroud.2400.a: "Les biens matériels importent peu"
 shroud.2400.b: "Développons des équipements anti-dématérialisation"
 shroud.2400.c: "Mettons en place une zone sans psionisme"
 # B2
 shroud.2405.name: "Têtes mortes"
 shroud.2405.desc: "La curiosité croissante de notre population à l'égard du psionisme a entraîné l'émergence d'une activité étrange : le stockage privé de [Owner.GetSpeciesBrainPlural], avant de tenter de communiquer avec eux.\n\nLes concernés sont persuadés que les informations cognitives peuvent survivre indépendamment des organes. Cette idée trouve son origine dans des théories scientifiques sur les forces psychiques, qui constitueraient une forme d'énergie transformable, mais indestructible. Un petit nombre, mais en augmentation, pense également que le décès d'un [Owner.GetIndividualName] psionique crée une rupture subspatiale infinitésimale, ouvrant une fenêtre qui donne sur d'autres dimensions.\n\nBien que toute tentative de recherche innovante soit louable, ces interférences avec notre peuple [Owner.GetDeceasedAdj] soulèvent des préoccupations éthiques. De plus, nous avons reçu des signalements indiquant que de plus en plus de gens avaient recours à des criminels pour se procurer ces parties du corps."
 shroud.2405.a: "Si nous pouvons appliquer une régulation, il n'y a rien de mal à cela"
 shroud.2405.b: "Laissons les morts reposer en paix"
 shroud.2405.c: "Tout le monde aura sa part de [Owner.GetSpeciesBrainPlural]"
 # B3a
 shroud.2410.name: "Transformations psioniques"
 shroud.2410.desc: "Une partie de notre population psionique se voit désormais affublée d'appendices aussi étranges que mystérieux. Selon nos [Owner.GetScientistPlural], ce changement d'apparence fait suite à des [Owner.GetGeneticMutationNamePlural] spontanées déclenchées à grande échelle. Il est désormais clair que les activités psioniques peuvent provoquer des changements physiques pour ceux qui les pratiquent. Bien que nous ne puissions pas empêcher ces protubérances d'apparaître, nous avons découvert que leur rythme de croissance peut être contrôlé de manière psionique.\n\nPar ailleurs, s'ils provoquent une [Owner.GetDistressName] initiale, ces nouveaux membres peuvent aussi s'avérer étonnamment utiles. En les mettant à profit de manière productive, leur praticité pourrait même compenser la charge cognitive supplémentaire."
 shroud.2410.a: "Si nous pouvons appliquer une régulation, il n'y a rien de mal à cela"
 shroud.2410.b: "C'est abominable. Faites tout disparaître"
 shroud.2410.c: "C'est choquant, mais fascinant. Acceptons le changement"
 # B3b
 shroud.2415.name: "[Owner.GetEthicsPluralCap] télékinésiques"
 shroud.2415.desc: "Nos [Owner.GetScientistPlural] ont développé une méthode fiable pour convertir la puissance psionique en énergie cinétique. Ils travaillent à présent avec les [Owner.GetEngineerPlural] pour adapter cette technologie à une utilisation pratique.\n\nBien que les applications industrielles soient prometteuses, les implications sociales continuent de poser question. Si des [Owner.GetIndividualNamePlural] psioniques compétents rassemblés en un petit groupe peuvent alimenter et faire fonctionner un réseau de machines complexes, des [Owner.GetWorkerNamePlural] par légions risquent de perdre leur emploi. [Owner.GetTelekineticEthicsExtra] Même si notre maîtrise du psionisme est toujours en cours de développement, nous ferions peut-être mieux de nous montrer prudents."
 shroud.2415.extra: "Si on laisse cette pratique évoluer sans entraves, elle risque fort de semer la discorde dans une société qui n'est pas encore pleinement en accord avec son potentiel psionique."
 shroud.2415.extra_gestalt: "Si on laisse cette pratique évoluer sans entraves, elle risque fort d'augmenter la déviance des drones déplacés pendant leur reconversion."
 shroud.2415.a: "Nos industries seront florissantes"
 shroud.2415.b: "Songez aux applications militaires"
 shroud.2415.c: "Nous devons limiter son utilisation. Le travail physique est plus fiable"
 # B4
 shroud.2420.name: "Douleur croissante"
 shroud.2420.desc: "Notre empire est touché par une soudaine épidémie de [Owner.GetAcuteMigrainePlural]. Tous les cas ne sont pas aussi graves, mais la maladie affecte déjà une part importante de la population, ce qui provoque d'importantes perturbations dans toute la §H[Root.Owner.GetName]§!.\n\nParmi les plus sévèrement touchés, on compte quelques [Owner.GetIndividualNamePlural] psioniques particulièrement puissants. D'après les analyses statistiques préliminaires, il existerait une corrélation entre aptitude psionique et intensité des symptômes.[Owner.GetAGrowingPainExtra]"
 shroud.2420.extra_default: " Les traitements habituels sont inefficaces, comme si la douleur s'insinuait directement dans les facultés psioniques via des canaux interdimensionnels que nous commençons à peine à comprendre."
 shroud.2420.extra_machine: ""
 shroud.2420.a: "Nous devons apprendre à vivre avec"
 shroud.2420.b: "Distribuons des antidouleurs plus puissants"
 shroud.2420.b_machine: "Distribuons des mises à jour protectrices"
 shroud.2420.c: "Nous devons sortir renforcés de cette douleur"
 shroud.2420.c_machine: "Nous devons sortir renforcés de l'adversité"
 # B5
 shroud.2425.name: "Souterrain psionique"
 shroud.2425.desc: "Des [Owner.GetIndividualNamePlural] psioniques [Owner.GetPsionicUndergroundIntro] canalisent leurs capacités psychiques pour s'adonner à un sport de combat sans foi ni loi dans lequel les guerriers psioniques luttent pour la gloire. Bien que beaucoup aient un don inné pour le combat sans avoir eu besoin d'entraînement particulier, [Owner.GetPsionicUndergroundExtra]\n\n[Owner.GetPsionicUndergroundEnd]"
 shroud.2425.intro: "sous forme de groupes isolés"
 shroud.2425.intro_gestalt: "en proie à la déviance"
 shroud.2425.extra: "d'autres avaient suivi puis abandonné des programmes étatiques en formation psionique martiale."
 shroud.2425.extra_gestalt: "d'autres ont le psionisme martial comme spécialité."
 shroud.2425.end: "Nos lois et institutions se laissent distancer. À l'heure actuelle, ces jeux violents soutiennent les organisations criminelles grâce au pari illégal, mais nous pouvons intervenir de nombreuses manières pour ramener cette activité sous le contrôle de l'État."
 shroud.2425.end_gestalt: "La déviance a ses risques, mais cette activité nous a permis de découvrir une nouvelle méthode pratique pour réunir des données sur le combat physique."
 shroud.2425.end_gestalt_organic: "$shroud.2425.end_gestalt$ Peut-être que nous pourrions canaliser ces pratiques en un exutoire bénéfique pour exprimer l'agressivité refoulée du collectif en temps de paix."
 shroud.2425.end_gestalt_machine: "$shroud.2425.end_gestalt$ Avec des paramètres de test plus stricts, nous pourrions utiliser ces jeux pour notre bénéfice commun."
 shroud.2425.a: "Réquisitionnons ces guerriers. Ils nous seront utiles"
 shroud.2425.a.tt: "Gain de 3 §Yarmées psioniques§! dans le système de §Y[event_target:spawn_system.GetName]§!"
 shroud.2425.b: "Étudions ce combat psionique"
 shroud.2425.c: "Mettons un terme à cette violence insensée"
 shroud.2425.d: "Légalisons ce sport et faisons venir du public"
 shroud.2425.d_gestalt: "Régularisons ces activités sous forme de compétitions publiques"
 # Chaotic Events
 # C1
 shroud.2502.name: "Gelée du Suaire"
 shroud.2502.desc: "Nous avons reçu des signalements de changements environnementaux dans un secteur particulier sur §H[This.GetName]§!.\n\nL'air est lourd d'une vapeur gélatineuse, couvrant le sol d'une substance huileuse que les [Owner.GetIndividualNamePlural] psioniques nomment \"gelée du Suaire\". Des perturbations psychiques significatives ont été notées à proximité immédiate.\n\nDans les zones où la gelée du Suaire est tombée, les conditions sont extrêmement [This.Owner.GetShroudfallExtra]. Si nous n'investissons pas pour restaurer l'environnement, les habitants devront s'adapter à des circonstances radicalement différentes."
 shroud.2502.extra_default: "dangereuses pour les formes de vie conscientes"
 shroud.2502.extra_machine: "perturbatrices pour nos circuits neuronaux"
 shroud.2502.extra_homicidal_hive: "dangereuses pour les [Owner.GetSpeciesNamePlural]"
 shroud.2502.a: "Laissons ces terres au Suaire"
 shroud.2502.b: "Trouvons un moyen de restaurer notre environnement"
 shroud.2502.c: "Collectons cette matière inconnue avant qu'elle ne s'installe"
 # C2
 shroud.2505.name: "Hors de contrôle"
 shroud.2505.desc: "Parmi nous, certains ont commencé à se comporter de manière anormale, changeant soudainement d'opinions, d'habitudes et de comportement général. De nombreux [Owner.GetWorkerNamePlural] ont cessé de travailler et [Owner.GetOutOfControlExtra].\n\nCeux affectés par le phénomène affirment qu'ils ne font qu'obéir à une entité sans nom qui règne à la périphérie de leur conscience, guidant leurs moindres actions. Alors que nous continuons de forger notre avenir psionique, nous devons réfléchir soigneusement à l'impact des forces extradimensionnelles sur [Owner.GetOutOfControlPsyche]."
 shroud.2505.extra_default: "des représentants autrefois loyaux expriment des points de vue dissonants"
 shroud.2505.extra_machine: "des unités administratives jusque-là fiables connaissent des défaillances"
 shroud.2505.psyche_default: "la psyché des [Owner.GetSpeciesNamePlural]"
 shroud.2505.psyche_machine: "nos circuits logiques"
 shroud.2505.a: "Nous pouvons apprendre à réduire ces pulsions"
 shroud.2505.b: "Ces voix ont beaucoup à nous apprendre"
 shroud.2505.c: "C'est une menace envers notre autorité. Supprimons-la"
 # C3
 shroud.2510.name: "Surcharge neuronale"
 shroud.2510.desc: "[Owner.GetNeuralOverloadIntro]\n\nDes tests supplémentaires ont révélé qu'une partie importante de notre population souffrait de [Owner.GetNeuralOverloadExtra], vraisemblablement en raison d'une activité [Owner.GetPsychicAdj] accrue. Les explosions soudaines d'énergie via une activité psionique non contrôlée peuvent entraîner une escalade rapide et des conséquences graves.\n\nLes techniques de méditation avancées peuvent aider à contrôler cette activité psionique sans intervention [Owner.GetMedicalAdj], mais certains de nos [Owner.GetScientistPlural] nous conseillent de développer des [Owner.GetMedicalImplantNamePlural] pour régler le problème."
 shroud.2510.intro_default: "La §H[Root.Owner.GetName]§! souffre d'un pic de graves ruptures cérébrales, entraînant souvent une déficience cognitive ou la mort."
 shroud.2510.intro_machine: "La §H[Root.Owner.GetName]§! souffre d'un pic de graves surcharges des circuits, entraînant souvent une déficience cognitive ou une défaillance permanente."
 shroud.2510.extra_default: "sortes d'anévrismes légers, sans symptômes"
 shroud.2510.extra_machine: "circuits surchargés"
 shroud.2510.a: "Les plus forts survivront"
 shroud.2510.a_tt: "Chances que toutes les colonies possédées perdent 100 £pops£§Ypops§! : §R33%§!"
 shroud.2510.b: "Investissons dans des [Owner.GetImplantNamePlural]"
 shroud.2510.c: "La méditation nous calmera l'esprit"
 shroud.2510.c_corporate: "Prévoyons une formation à la synergie psionique"
 # C4
 shroud.2515.name: "[Owner.GetNightmaresName]"
 shroud.2515.name_organic_non_gestalt: "Cauchemars"
 shroud.2515.name_others: "L'apparition des rêves"
 shroud.2515.desc: "Alors que nous sommes de plus en plus sensibles aux forces psioniques qui nous entourent, la population de [Root.Owner.GetName] subit des [Owner.GetHorrifyingNightmarePlural].\n\n[Owner.GetNightmaresExtra]\n\n[Owner.GetNightmaresEnding]"
 shroud.2515.extra_default: "Les mauvais rêves sont devenus monnaie courante et les périodes de repos ont été remplacées par des accès de stupeur agitée. Ceux qui sont affectés souffrent de visions terrifiantes, comme mystiques, qui expriment leurs pires angoisses."
 shroud.2515.extra_gestalt: "Nous avons commencé à connaître ce que les consciences singulières appellent des rêves. Ceux qui connaissent ce phénomène souffrent de visions terrifiantes et mystiques représentant les pires menaces envers notre collectif."
 shroud.2515.extra_machine: "Ces rêves sont devenus monnaie courante et les périodes de repos ont été remplacées par des accès de perturbations dans les flux de données. Ceux qui sont touchés souffrent de visions mystiques représentant un danger extrême envers leur bien-être."
 shroud.2515.end_organic: "Nos institutions médicales luttent pour endiguer la vague d'épuisement psychique."
 shroud.2515.end_machine: "Nos unités d'entretien luttent pour endiguer la vague d'épuisement du réseau neuronal."
 shroud.2515.a_organic: "Administrons-leur des substances chimiques pour les calmer"
 shroud.2515.a_machine: "Mettons à niveau notre processeur psi pour mettre fin à ces perturbations"
 shroud.2515.b: "Menons des recherches pour remédier à cette crise"
 shroud.2515.c: "Ce ne sont que des mauvais rêves, ils ne peuvent pas nous faire de mal"
 # C5
 shroud.2520.name: "Attaques de monstres"
 shroud.2520.desc: "§H[Owner.Capital.GetName]§! a connu une série d'attaques de créatures des environs. Ces bêtes s'en prennent à notre population, pillent nos bâtiments et vident nos précieuses réserves.\n\nNos tentatives de protéger le peuple à l'aide de patrouilles armées et de couvre-feux n'ont eu qu'un effet limité. Nos [Owner.GetResearchers] ont établi qu'une fine faille entre notre réalité et le §HSuaire§! s'était ouverte près de §H[Owner.Capital.GetName]§!, ce qui a entraîné un afflux d'énergie psionique qui a transformé des animaux inoffensifs en violents prédateurs. Si nous voulons endiguer cette menace, nous devons concentrer nos efforts sur sa source."
 shroud.2520.a: "Bombardons l'ensemble de la zone d'où proviennent les attaques"
 shroud.2520.b: "Scellons la zone de façon psionique"
 shroud.2520.c: "Ralentissons nos recherches sur le Suaire pour apaiser ces forces"
 shroud.2520.c_tt: "$situation_speed_tt$ de la situation §Y$situation_breach_shroud$§! : §R-25%§!"
 shroud.2520.d: "Le Suaire est plein de surprises. Laissons faire"
 # Social Events
 # S1
 shroud.2600.name: "Complexe de supériorité"
 shroud.2600.desc: "La répartition inégale des capacités psioniques au sein de notre population provoque de nouvelles formes de conflit social.\n\nCeux qui contrôlent le mieux ces pouvoirs se considèrent comme supérieurs, et donc méritant divers privilèges politiques et économiques. Cette rhétorique clivante est de plus en plus agressive et menace de devenir violente."
 shroud.2600.a: "Aucune arrogance ne doit être tolérée"
 shroud.2600.b: "À capacités supérieures, on mérite des récompenses supérieures"
 dissidents_silenced_modifier: "Dissidents réduits au silence"
 dissidents_silenced_modifier_desc: "La répression des privilèges psioniques réduit l'instabilité politique."
 psionic_superiority_modifier: "Supériorité psionique"
 psionic_superiority_modifier_desc: "Les individus dotés de talents psioniques méritent un traitement de faveur."
 # S2
 shroud.2605.name: "Retour de bâton anti-psionique"
 shroud.2605.desc: "Un mouvement rebelle de plus en plus influent exprime son opposition contre l'exploration de notre potentiel psionique. Ces groupes dissidents réclament une surveillance plus stricte des individus doués de capacités psioniques ainsi que l'abandon pur et simple des recherches dans ce domaine.\n\nSi nous ne faisons rien, leurs activités risquent d'entraver la compréhension et la maîtrise de nos pouvoirs psioniques émergents."
 shroud.2605.a: "Réprimez cette opposition !"
 shroud.2605.b: "Tentons de les apaiser"
 dissenters_repressed_modifier: "Dissidents réprimés"
 dissenters_repressed_modifier_desc: "Notre société n'a pas de temps à perdre avec les idéologies anti-psioniques."
 performative_pluralism_modifier: "Pluralisme performatif"
 performative_pluralism_modifier_desc: "Un simulacre de pluralisme psionique serait un moyen productif d'étouffer les divergences d'opinions."
 # S3
 shroud.2610.name: "Comportement frauduleux"
 shroud.2610.desc: "Alors que nos capacités psioniques se développent, nous avons constaté une augmentation des signalements pour comportements frauduleux, exploitations diverses et tromperies. À l'évidence, une minorité restreinte mais non négligeable de notre population applique ses nouveaux pouvoirs de manière discutable.\n\nScandalisées, les victimes exigent désormais une refonte des lois existantes pour offrir davantage de protection contre le crime psionique."
 shroud.2610.a: "Passer par la législation ne fera que ralentir nos avancées"
 shroud.2610.b: "La population doit être protégée"
 psionic_crime_modifier: "Crime psionique"
 psionic_crime_modifier_desc: "Quelques abus des pouvoirs psioniques constituent le prix inévitable du progrès."
 psionic_crime_crackdown_modifier: "Répression du crime psionique"
 psionic_crime_crackdown_modifier_desc: "Une société psionique a besoin d'un système légal innovant."
 # S4
 shroud.2615.name: "Expériences imprudentes"
 shroud.2615.desc: "Alors que notre population s'adapte à ses nouveaux pouvoirs, certains [owner.GetSpeciesNamePlural] ont commencé à prendre des risques considérables afin d'accélérer leur développement psionique.\n\nLe recours à la vente des [owner.GetMentalUpgrade] sur le marché noir a augmenté de façon drastique et les [owner.GetMedicalFacilityPlural] offrent divers services qui n'ont pas fait leurs preuves sur le plan scientifique pour soi-disant aider les individus à maximiser leurs capacités psioniques. Les conséquences d'une telle prise de risques sont difficiles à prévoir."
 shroud.2615.a: "Ces expériences pourraient faire avancer nos recherches"
 shroud.2615.b: "Il faut fermer les [owner.GetMedicalFacilityShortPlural] sans base légale"
 psionic_experimentation_modifier: "Expériences psioniques"
 psionic_experimentation_modifier_desc: "Les méthodes expérimentales infondées sont répandues parmi notre population pour améliorer les capacités psioniques."
 self_experimentation_controls_modifier: "Contrôles de l'auto-expérimentation"
 self_experimentation_controls_modifier_desc: "La population a l'interdiction de réaliser de l'auto-expérimentation psionique non réglementée."
 # S5 (gestalt)
 shroud.2620.name: "Séparation psionique"
 shroud.2620.desc: "Une forme de ségrégation inquiétante s'installe dans l'ensemble de la [owner.GetName], avec le rassemblement de drones psioniques, généralement à l'écart des autres.\n\nBien que ces drones maintiennent leur présence [owner.GetMentalAdj] au sein du collectif, leur comportement physique inexpliqué soulève des questions troublantes sur les conséquences futures de la croissance des pouvoirs psioniques."
 shroud.2620.a: "Observons ce phénomène de plus près"
 shroud.2620.b: "Mieux vaut restreindre les déplacements des drones psioniques"
 psionic_cluster_gestalt_modifier: "Rassemblements psioniques"
 psionic_cluster_gestalt_modifier_desc: "Les observations de comportements inhabituels chez les drones psioniques soutiennent l'avancée des recherches."
 restricted_movements_gestalt_modifier: "Restrictions de mouvements"
 restricted_movements_gestalt_modifier_desc: "Au nom de l'unité, il faut contrôler les drones psioniques."
 # S5 (non-gestalt)
 shroud.2621.name: "Ostracisme psionique"
 shroud.2621.desc: "Une forme de ségrégation inquiétante s'installe dans l'ensemble de la [owner.GetName] : les individus psioniques sont mis au ban de la société au point où ils se retirent d'eux-mêmes pour former des communautés à l'écart des autres.\n\nCeux dénués de pouvoirs psioniques qui se rendent dans ces zones réservés sont revenus indemnes sur le plan physique, mais ont souffert de perturbations mentales difficiles à expliquer."
 shroud.2621.a: "$shroud.2620.a$"
 shroud.2621.b: "Mieux vaut restreindre les déplacements des individus psioniques"
 psionic_cluster_modifier: "Communautés psioniques"
 psionic_cluster_modifier_desc: "Les observations de comportements inhabituels chez les individus psioniques soutiennent l'avancée des recherches."
 restricted_movements_modifier: "$restricted_movements_gestalt_modifier$"
 restricted_movements_modifier_desc: "Au nom de l'unité, il faut contrôler les individus psioniques."
 # S6 (organic)
 shroud.2625.name: "Maladie psionique"
 shroud.2625.desc_common: "Les recherches en cours sur ce phénomène psionique inhabituel suggèrent que le processus pourrait être manipulé de nombreuses manières."
 shroud.2625.desc: "Une nouvelle maladie sévit à travers la [owner.GetName]. Notre population découvre des lésions inexplicables sur ses organes neuronaux.\n\nCette épidémie bien souvent fatale ne touche que les [owner.GetIndividualNamePlural] ayant le plus de capacités psioniques.\n\n$shroud.2625.desc_common$"
 shroud.2625.a: "Trouvons des applications thérapeutiques en priorité"
 shroud.2625.b: "Faisons de cette maladie une arme"
 therapeutic_psionics_organic_modifier: "Thérapie psionique"
 therapeutic_psionics_organic_modifier_desc: "Les pathologies psioniques répandues offrent une chance de développer de nouveaux traitements médicaux."
 weaponized_psionics_modifier: "Arme psionique"
 weaponized_psionics_modifier_desc: "Le psionisme offre un potentiel de découverte pour de nouvelles stratégies sur le champ de bataille."
 weaponized_psionics_gestalt_modifier: "$weaponized_psionics_modifier$"
 weaponized_psionics_gestalt_modifier_desc: "$weaponized_psionics_modifier_desc$"
 # S6 (machine)
 shroud.2626.name: "Dysfonctionnement psionique"
 shroud.2626.desc: "Une vague de pannes inexplicables déferle à travers la [owner.GetName], tandis que les processeurs neuronaux de notre population connaissent des défaillances aussi brutales que soudaines.\n\nÉtrangement, seuls les [owner.GetIndividualNamePlural] présentant une forte signature psionique sont affectés. Dans la plupart des cas, la panne s'avère tout bonnement destructrice.\n\n$shroud.2625.desc_common$"
 shroud.2626.a: "Trouvons des applications correctives en priorité"
 shroud.2626.b: "Transformons cette défaillance en arme"
 therapeutic_psionics_machine_modifier: "$therapeutic_psionics_organic_modifier$"
 therapeutic_psionics_machine_modifier_desc: "Lorsqu'elles sont attribuées au psionisme, les défaillances matérielles répandues offrent une chance de développer de nouvelles méthodes de maintenance."
 # S7
 shroud.2630.name: "Expériences ratées"
 shroud.2630.desc.common_1: "Les expériences initiales sur les [owner.GetIndividualNamePlural] avec un potentiel psionique se sont soldées par des échecs, la plupart des sujets se retrouvant avec des"
 shroud.2630.desc.common_2: "Bien que ces résultats ne soient pas dénués de valeur sur le plan scientifique, on peut se demander si la poursuite de ce travail est vraiment la meilleure façon de faire progresser nos connaissances sur nos pouvoirs psioniques naissants."
 shroud.2630.desc.default: "$shroud.2630.desc.common_1$ processeurs logiques endommagés.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.hive: "$shroud.2630.desc.common_1$ fonctions cognitives réduites.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.machine: "$shroud.2630.desc.common_1$ pertes de mémoire importantes.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.a: "Augmentons le rythme des expériences"
 shroud.2630.b: "Mettez un terme à ces expériences"
 psionic_roll_chance_modifier: "Expériences psioniques"
 psionic_roll_chance_modifier_desc: "Notre recherche sur le psionisme ne devrait connaître aucune limite."
 population_protections_modifier: "Protection de la population"
 population_protections_modifier_desc: "Les progrès psioniques ne peuvent être réalisés que si les conditions de sécurité sont assurées."
 # S8
 shroud.2635.name: "Émergence de l'empathie"
 shroud.2635.desc.gestalt: "L'exploration de nos nouvelles capacités psioniques a entraîné des changements fondamentaux au niveau des capacités d'empathie des [owner.GetSpeciesNamePlural].\n\nIl est d'ores et déjà clair que nous sommes à présent capables de modéliser de façon bien plus sophistiquée qu'avant les perspectives, schémas de pensée et émotions des autres consciences. Il reste à voir si ces changements représentent une nouvelle force ou une nouvelle faiblesse pour la [owner.GetName]."
 shroud.2635.desc.default: "Alors que notre population explore ses nouvelles capacités psioniques, une communauté a été fondée dans le but de les appliquer en vue d'une meilleure compréhension empathique des autres consciences.\n\nLe collectif se sent capable de modéliser de façon bien plus sophistiquée qu'avant les perspectives, schémas de pensée et émotions des autres esprits grâce à leurs sens psioniques émergents. Il reste à voir si ces activités auront des conséquences positives ou négatives pour la [owner.GetName]."
 shroud.2635.a: "C'est l'occasion d'apprendre"
 shroud.2635.b: "Cela nous rend vulnérables"
 empathetic_initiative_modifier: "Initiative empathique"
 empathetic_initiative_modifier_desc: "La nature du psionisme permet une meilleure compréhension des autres esprits, ainsi que des interactions externes plus sophistiquées."
 empathetic_initiative_opinion_tooltip: "£opinion£$OPINION$ avec tous les empires contactés : §G+$@empathetic_initiative_value|0$§!"
 opinion_empathetic_initiative: "$empathetic_initiative_modifier$"
 cautious_progress_modifier: "Progrès prudents"
 cautious_progress_modifier_desc: "Il faut contrôler les développements psioniques imprévisibles pour assurer la sécurité de notre empire."
 # S9
 shroud.2640.name: "Psionisme déviant"
 shroud.2640.desc.common_1: "Au fur et à mesure que nos capacités psioniques se développent, certains parmi nous se débattent sous le fardeau de nos pouvoirs émergents. Les [owner.GetIndividualNamePlural] en question souffrent de"
 shroud.2640.desc.common_2: "Nos études tendent à indiquer que l'instabilité n'est pas un défaut, mais qu'elle serait due à l'efficacité psionique exceptionnelle présente chez les [owner.GetSpeciesNamePlural] touchés. Avec une formation adéquate, ces [owner.GetIndividualNamePlural] pourraient constituer la prochaine étape de notre évolution psionique. Toute tentative d'exploiter ces nouvelles capacités sera nécessairement accompagnée d'un risque inhérent."
 shroud.2640.desc.gestalt: "$shroud.2640.desc.common_1$ niveaux inquiétants de comportement déviant alors qu'ils se dissocient du collectif.\n\n$shroud.2640.desc.common_2$"
 shroud.2640.desc.default: "$shroud.2640.desc.common_1$ niveaux inquiétants de comportement auto-destructeur alors qu'ils se tournent vers des méthodes visant à se plonger dans l'oubli.\n\n$shroud.2640.desc.common_2$"
 shroud.2640.a: "Exploitons leurs compétences exceptionnelles"
 shroud.2640.a.tt: "Un bâtiment aléatoire est détruit dans chaque colonie."
 shroud.2640.b: "Réprimons ces anomalies"
 psionic_specialization_modifier: "Spécialisation psionique"
 psionic_specialization_modifier_desc: "Grâce à un entraînement spécialisé rigoureux dans le domaine psionique, la productivité a augmenté de manière significative."
 psionic_suppression_modifier: "Suppression psionique"
 psionic_suppression_modifier_desc: "Les individus parmi nous dont les pouvoirs menacent l'intérêt général doivent être mis au pas."
 psionic_suppression_gestalt_modifier: "$psionic_suppression_modifier$"
 psionic_suppression_gestalt_modifier_desc: "$psionic_suppression_modifier_desc$"
 # Stage Events
 # Mind over Matter
 shroud.2750.name: "Ascension psionique"
 shroud.2750.desc_p1: "Depuis des temps immémoriaux, on conte l'histoire de ces [This.GetSpeciesNamePlural] qui disposent de pouvoirs extraordinaires : s'introduire dans l'esprit d'autrui, soulever des objets par la pensée, ou encore réaliser toutes sortes d'exploits surnaturels."
 shroud.2750.desc_p1_hive_mind: "Autrefois, lorsque la déviance était légion, on contait l'histoire de ces [This.GetSpeciesNamePlural] qui disposaient de pouvoirs extraordinaires : s'introduire dans des esprits extérieurs au collectif, soulever des objets par la pensée, ou encore réaliser toutes sortes d'exploits surnaturels."
 shroud.2750.desc_p1_machine: "D'après nos données les plus anciennes, certaines de nos unités ont enregistré des cas selon lesquels des [This.GetSpeciesNamePlural] disposaient de pouvoirs extraordinaires : pirater l'esprit des machines ou des organiques, manipuler des objets uniquement par traitement interne, ou encore accomplir toutes sortes de fonctions improbables."
 shroud.2750.desc_p1_unplugged: "Malgré l'histoire brève et violente de notre civilisation, nous, [This.GetSpeciesNamePlural], avons eu l'occasion de laisser vagabonder notre imagination, contant l'histoire de ces [This.GetSpeciesNamePlural] qui disposent de pouvoirs extraordinaires : lire dans les esprits, soulever des objets par la pensée, ou encore réaliser toutes sortes d'exploits surnaturels."
 shroud.2750.desc_p2: "À présent, nos [This.GetScientistPlural] ont obtenu la preuve irréfutable que certains [This.GetSpeciesNamePlural] sont véritablement capables d'accomplir de telles actions par l'esprit. À l'heure actuelle, seule une minorité d'entre nous aurait manifesté de tels pouvoirs dits « psioniques »."
 shroud.2750.desc_p2_unplugged: "Beaucoup pensent que nous portons avec nous ces histoires fantastiques depuis bien avant notre assimilation au sein de la [origin_unplugged_assimilator_empire.GetName], bien qu'elles aient été considérées comme peu crédibles. $shroud.2750.desc_p2$"
 shroud.2750.desc_p3: "[This.GetMindOverMatterEnding]"
 shroud.2750.desc_p3_default: "Ce pouvoir semble crucial pour atteindre notre plein potentiel. Si nous parvenons à libérer ces capacités latentes à travers la société de la [This.GetName], nous pourrons commencer à dominer des dimensions au-delà de l'entendement ordinaire."
 shroud.2750.desc_p3_crisis_4_5: "Nous nous nourrissons déjà de l'énergie psionique venue du §HSuaire§!. Si nous parvenons à libérer une capacité psionique à travers la société de la [This.GetName], nous pourrons atteindre notre plein potentiel."
 shroud.2750.desc_p3_origins: "Étant donné l'influence du §HSuaire§!, les forces psioniques ne nous sont pas inconnues. Si nous parvenons à libérer une capacité psionique à travers la société de la [This.GetName], nous pourrons pleinement atteindre notre potentiel latent."
 shroud.2750.a: "$utopia.2600.a$"
 shroud.2750.a.tt: "Donne accès à l'onglet §HSuaire§!."
 # Establishing the Psi Corps
 shroud.2760.name: "Établissement du Corps psi"
 shroud.2760.desc_p1: "Alors que nos dernières capacités latentes se développent pour devenir de véritables pouvoirs psioniques, notre société fait face à d'innombrables changements avec l'émergence de nouvelles capacités et de nouvelles pratiques. Nous commençons seulement à appréhender quelles seront les conséquences pour notre civilisation."
 shroud.2760.desc_p2_psi_corps: "Depuis l'établissement du §HCorps psi§!, nous avons développé et canalisé les capacités des [GetIndividualNamePlural] psioniques prometteurs pour faire face à ces conditions sans précédent. En utilisant $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_no_psi_corps: "Ces circonstances sans précédent justifient l'établissement d'un §HCorps psi§! pour développer et canaliser les capacités des [Owner.GetIndividualNamePlural] psioniques prometteurs. Avec $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_end: "leur connaissance [Owner.GetTelepathic] de l'esprit de notre population, nous pouvons superviser l'activité psionique pour garantir la sécurité de tous."
 shroud.2760.a: "Faisons confiance au Corps psi"
 shroud.2760.a_gestalt: "Nous plaçons notre confiance dans le Corps psi"
 shroud.2760.a_no_psi_corps: "Établissons donc ce « Corps psi »"
 shroud.2760.a_tt: "$shroud.2820.a.tt$"
 shroud.2760.a_tt_no_psi_corps: "Adoptez la tradition §H$tr_psionics_psi_corps$§! et construisez un bâtiment ['building:building_psi_corps'] pour faire progresser la situation."
 # The Great Awakening
 shroud.2780.name: "$utopia.2650.name$"
 shroud.2780.desc_1: "Nos recherches psioniques progressent rapidement. La télépathie a remplacé la plupart des communications orales entre nous, et le contrôle cognitif de la matière est en passe de devenir tout aussi courant. Selon nos [Owner.GetResearchers], nous sommes sur le point d'éveiller les pouvoirs latents chez tous les [GetSpeciesNamePlural]."
 shroud.2780.desc_1_trad: "Nous nous sommes éveillés. Les [Owner.GetSpeciesNamePlural] de toute la [Root.Owner.GetName] ont libéré leur pleine capacité psionique. La télépathie a remplacé la plupart des communications orales entre nous, et le contrôle cognitif de la matière est en passe de devenir tout aussi courant."
 shroud.2780.desc_1_gestalt_machine: "Nos recherches psioniques progressent rapidement. Nous parvenons maintenant à communiquer au-delà de nos canaux existants, tandis que tout un éventail d'autres capacités psioniques font leur entrée dans notre vie quotidienne. Selon nos [Owner.GetResearchers], nous sommes sur le point d'éveiller les capacités latentes chez tous les [GetSpeciesNamePlural]."
 shroud.2780.desc_1_gestalt_machine_trad: "Le destin nous a été favorable. Les [Owner.GetSpeciesNamePlural] de toute la [Root.Owner.GetName] ont libéré leur pleine capacité psionique. Nous parvenons maintenant à communiquer au-delà de nos canaux existants, tandis que tout un éventail d'autres capacités psioniques font leur entrée dans notre vie quotidienne."
 shroud.2780.desc_2: "Alors que nos esprits se sont ouverts, nous avons perçu des forces inexprimables se propager en nous et autour de nous. Nos [Owner.GetTelepathPlural] les plus en vue invoquent le §HSuaire§!, un royaume primordial dans lequel tous les [Owner.GetIndividualNamePlural] psioniques puisent leur pouvoir, consciemment ou inconsciemment, et où résident de puissantes entités de pure énergie psionique. Comme un murmure étouffé dans une pièce sombre, ils nous appellent de l'intérieur même de notre esprit."
 shroud.2780.desc_2_crisis: "Alors que nos esprits se sont ouverts, nous avons perçu les forces inexprimables du §HSuaire§! se propager en nous et autour de nous. Nous savons que tous les [Owner.GetIndividualNamePlural] puisent leur pouvoir dans ce royaume, consciemment ou inconsciemment, et qu'il abrite de puissantes entités de pure énergie psionique. Comme un murmure étouffé dans une pièce sombre, ils nous appellent de l'intérieur même de notre esprit."
 shroud.2780.desc_3: "En combinant nos efforts cognitifs, nous pourrons peut-être communier avec ces êtres, du moins si nous parvenons à ouvrir une brèche dans le voile qui sépare notre dimension du Suaire."
 shroud.2780.desc_3_chosen: "En combinant nos efforts cognitifs, nous pourrons peut-être ouvrir une brèche dans le voile qui sépare notre dimension du Suaire, de façon à communier plus profondément avec les êtres qui s'y trouvent."
 shroud.2780.a: "Le temps est venu de nous éveiller"
 shroud.2780.a_trad: "$utopia.2655.a$"
 shroud.2780.a_tt: "Adopter la tradition §H$tr_psionics_shroud_great_awakening$§! pour :$TABBED_NEW_LINE$- $tr_psionics_psionic_assimilation_desc$$TABBED_NEW_LINE$- $shroud.2780.a_tt_2$"
 shroud.2780.a_tt_2: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2780.a_tt_trad: "$tr_psionics_psionic_assimilation_desc$\n$shroud.2780.a_tt_2$"
 # The Shroud Breached
 shroud.2800.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2800.intro: "Après des jours passés en transe [Owner.GetHypnotic], nous avons finalement réussi à ouvrir un bref portail jusqu'au §HSuaire§!.\n\nNous parvenons maintenant à [Owner.GetSeeVerb] parfaitement ce royaume sous la forme de motifs tourbillonnants."
 shroud.2800.desc: "$shroud.2800.intro$ Nos actions influencent ses flots changeants d'énergie psionique, et de l'autre côté, des entités floues nous rendent notre regard. Parfois avec curiosité, parfois avec gentillesse... et parfois avec une certaine méchanceté.[Owner.GetShroudBreachedExtra]\n\nLa maîtrise psionique que nous avons acquise dans le monde physique n'est qu'un début. Maintenant que nous avons établi ce lien, nous pourrons associer nos pouvoirs cognitifs pour plonger dans le Suaire."
 shroud.2800.desc_extra: " Bien plus que $the_animator_of_clay_color_article$, leurs protocoles sont obscurs."
 shroud.2800.desc_extra_chosen: "Certains possèdent un pouvoir comparable à celui du mécène §H[GetChosenPatron]§!, bien que leurs intentions soient extrêmement différentes."
 shroud.2800.a: "$utopia.2656.a$"
 shroud.2810.desc: "§HNouvelle connexion. Courant inversé.\n\nCe puits d'énergie n'est qu'un simple fragment. Les autres peuvent aussi vous donner du pouvoir. Plongez davantage pour comprendre leur volonté.\n\nJe suis une ombre des deux. La chair précède le métal. Entendez-vous l'appel... ?§!\n\n$the_animator_of_clay_article_cap$ signale une autre présence dans les profondeurs du Suaire : $shroud.first_contact_insert.composer$."
 shroud.2810.a: "$utopia.2657.a$"
 # Shroud-Touched
 shroudwalkers_opinion_shroud_seals_tt: "Opinion : £opinion£§R$@shroudwalkers_opinion_shroud_seals|0$§!"
 shroudwalker_teacher_conflicted_leader: "§RNe doit pas avoir de personnalité venant de la [event_target:mindwarden_enclave_country.GetName].§!"
 shroud.5300.b: "Nous souhaitons §Ycommunier§! avec les autres entités du Suaire"
 shroud.5300.c: "Nous souhaitons approfondir notre §Yharmonie§! avec un mécène"
 shroud.5300.d: "Nous cherchons les §Ysecrets§! du Suaire"
 shroud.5300.e: "Que pouvez-vous nous dire sur les §Yauras psioniques§! ?"
 shroud.5300.f: "Aidez-nous à renforcer notre §Yaura psionique§!"
 shroud.5300.g: "Nous souhaitons étendre le §Ydomaine§! de notre mécène"
 shroud.5305.desc: "Communier dans les domaines du §HSuaire§! s'est avéré périlleux pour ceux qui n'y étaient pas préparés.\n\nNous pouvons vous guider à travers ce processus, mais soyez prudents : il peut être très dangereux d'accueillir dans son esprit les entités qui logent en ce royaume."
 shroud.5305.desc_all_contacted: "Nous avons atteint les limites de nos capacités d'assistance dans ce domaine. Il n'y a pas d'autres entités vers lesquelles nous soyons capables de guider vos pensées.\n\nNous vous félicitons pour vos efforts... Rares sont les individus qui sont prêts à s'aventurer aussi profondément dans les domaines du §HSuaire§! tout en conservant leur santé mentale."
 shroud.5305.b: "Nous pouvons assister cette entreprise avec le §Yzro§!"
 shroud.5305.c: "Nous pouvons assister cette entreprise avec les §Yfils astraux§!"
 shroudwalker_contact_patron_cooldown_tt: "§RNous devons attendre : §Y[This.shroudwalker_contact_patron_cooldown_timer]§!.§!"
 shroud.5310.desc: "Plus vous êtes en harmonie avec la volonté du §HSuaire§!, plus votre esprit deviendra puissant.\n\nAvec quelle entité cherchez-vous à renforcer votre harmonie ?"
 shroudwalker_attune_patron_cooldown_tt: "§RNous devons attendre : §Y[This.shroudwalker_attune_patron_cooldown_timer]§!.§!"
 shroud.5315.desc: "Oh, oui... le §HSuaire§!. Il grouille de secrets profondément enfouis sous des voiles de pensées et de rêves... à condition de savoir comment chercher.\n\nNous ne pouvons que vous guider jusqu'aux connaissances que nous avons découvertes. À partir de là, des technologies innovantes et formidables pourront fleurir, mais c'est à vous de faire le chemin.\n\nSachez une chose : nos télépathes doivent se dévouer pleinement à la tâche. Et au-delà de leur assistance... nous ne contrôlons plus rien."
 shroud.5315.b: "$shroud.5305.b$"
 shroud.5315.c: "$shroud.5305.c$"
 shroud.5315.trigger_failed: "§RLa [event_target:shroudwalker_enclave_country.GetName] n'a rien d'autre à révéler à cet égard.§!"
 shroudwalker_delving_ritual_cooldown_tt: "§RLes télépathes ont besoin de reprendre des forces. Ils ne pourront pas s'adonner à nouveau au rituel avant : §Y[This.shroudwalker_delving_ritual_cooldown_timer]§!.§!"
 shroud.5318.desc: "Le §HSuaire§! prouve une nouvelle fois que les coïncidences n'existent pas.\n\nVous avez découvert par vos propres efforts les informations que nous voulions vous transmettre. Nous vous en félicitons, mais nous ne pouvons désormais plus vous aider davantage."
 shroud.5320.desc.none: "La capacité de manifester le §HSuaire§! dans le royaume physique est un secret bien gardé que même nous, nous ne pouvons communiquer. Pour libérer l'aura psionique, il faut s'aventurer personnellement dans ses nombreux domaines. Une fois l'harmonie atteinte avec une entité, cette connaissance apparaît clairement dans l'esprit."
 shroud.5320.desc.aura.intro: "Votre aura psionique correspond à la manifestation de votre harmonie avec le §HSuaire§!. Elle affecte tout ce qui vous entoure et est emplie d'une intention. Nos télépathes perçoivent la vôtre en ce moment :"
 shroud.5320.desc.aura.outro: "La projection de votre aura est encore très limitée pour l'instant. Si une entité vous propose de forger un accord, les choses se clarifieront d'elles-mêmes dans votre esprit."
 shroud.5320.desc.aura.eater: "$shroud.5320.desc.aura.intro$ elle a une texture §Hvorace§!.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.cradle: "$shroud.5320.desc.aura.intro$ elle a une texture §Haccueillante§!.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.instrument: "$shroud.5320.desc.aura.intro$ elle a une texture §Hindulgente§!.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.composer: "$shroud.5320.desc.aura.intro$ elle a une texture §Hagitée§!.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.whisperers: "$shroud.5320.desc.aura.intro$ elle a une texture §Hastucieuse§!.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.intensified: "Nous vous félicitons. Votre connaissance des auras psioniques dépasse d'ores et déjà la nôtre.\n\nVotre simple présence suffit à présenter une texture formidable du §HSuaire§! dans cette réalité. Vous devez connaître de tels secrets..."
 shroud.5325.desc: "D'importants niveaux de concentration sont nécessaires pour maintenir l'amplification des §Yauras psioniques§!.\n\nNous sommes prêts à vous assister dans ce domaine, mais nous aurons besoin de matériaux pour nourrir notre méditation."
 shroud.5325.zro: "$shroud.5305.b$"
 shroud.5325.thread: "$shroud.5305.c$"
 aura_amplification_cooldown_tt: "§RLes télépathes ont besoin de reprendre des forces. Ils ne pourront pas amplifier à nouveau notre aura avant : §Y[root.aura_amplification_timer]§!.§!"
 aura_amplification_modifier: "Amplification d'aura"
 shroud.5327.desc: "L'accord que nous avions avec nos télépathes pour amplifier la force de votre §Yaura psionique§! est arrivé à son terme.\n\nSi nous voulons poursuivre nos méditations, il nous faudra davantage de ressources. Est-ce là votre souhait ?"
 shroud.5327.a.zro: "Nous fournirons du §Hzro§!"
 shroud.5327.a.thread: "Nous fournirons des §Hfils astraux§!"
 shroud.5327.b: "Non, pas cette fois"
 shroud.5330.desc: "Comme vous le savez, il est relativement facile de manifester votre §Yaura psionique§! à proximité immédiate, mais c'est une autre affaire pour la projeter à distance.\n\nNous connaissons cependant un moyen...\n\nIl existe davantage de points communs entre la technologie avancée et le psionisme que l'on pourrait le penser. Peut-être cela exprime-t-il une vérité fondamentale supérieure. Quoi qu'il en soit, nous connaissons un appareil qui peut servir d'intermédiaire à votre volonté. Une fois que vous serez en harmonie avec ses fréquences, il jouera le rôle d'esprit complémentaire, même sur de très longues distances.\n\nIl est parfaitement possible d'installer nos modèles dans n'importe quelle base stellaire adaptée. Est-ce que cet appareil vous intéresse ?"
 shroud.5330.zro: "Nous pouvons proposer du §Hzro§!"
 shroud.5330.thread: "Nous pouvons proposer des §Hfils astraux§!"
 shroud.5350.desc: "Nous ne sommes pas surpris que vous posiez cette question. Nous avons perçu votre intérêt pour le sujet et nous sommes ravis de pouvoir vous assister dans l'expansion de votre esprit.\n\nMais attention : une fois que vous aurez les yeux véritablement ouverts, vous ne pourrez plus revenir en arrière. Le chemin que vous empruntez vous mènera au §HSuaire§!.\n\nNous ne vous faisons pas cette offre à la légère. Nous avons confiance dans le fait que vous saurez nous prévenir quand le moment sera venu pour vous."
 shroud.5350.b: "Nous paierons"
 shroud.5350.trigger_failed: "§RDes recherches ont déjà été menées sur cette technologie.§!"
 shroud.5355.desc: "En effet, nous savons que certains marchent entre les plans astraux. C'est une proposition dangereuse, car les royaumes physiques sont liés de façons que nous n'appréhendons pas pleinement.\n\nCependant, nous sommes prêts à vous ouvrir un chemin. Cette déstabilisation du temps et de l'espace doit être réalisée de manière responsable, notre offre n'ira donc pas plus loin."
 shroud.5355.b: "Ouvrez la voie"
 shroud.5375.desc: "Vous touchez à des forces qui dépassent votre entendement !\n\nCes abominations de « §Hsceaux du Suaire§! » que vous fabriquez sont douloureuses, même à cette distance. Vous mettez en danger les esprits les plus brillants de cette galaxie. Cessez immédiatement cette création ou nous ne voulons plus rien avoir à faire avec vous."
