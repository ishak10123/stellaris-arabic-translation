 shroud.11225.title: "Une disparition soudaine"
 shroud.11225.desc.common_1: "En un instant, tout a disparu.\n\nLa terrible §Raura de fin§! présente dans nos systèmes s'est soudainement volatilisée, emportant tout avec elle. Des étoiles se sont effondrées pour former des trous noirs, des planètes ont disparu, et seul un profond silence règne désormais."
 shroud.11225.desc.common_2: "La folie qui a provoqué une telle force destructrice pourrait bien rester à jamais un mystère."
 shroud.11225.desc.default: "$shroud.11225.desc.common_1$\n\n$shroud.11225.desc.common_2$"
 shroud.11225.desc.mitigated: "$shroud.11225.desc.common_1$ Nos efforts pour repousser l'aura semblent avoir eu un certain effet, préservant le peu que nous pouvions.\n\n$shroud.11225.desc.common_2$"
 shroud.11225.a: "Comment est-ce possible ?"
 SPECIAL_PROJECT_CALLING: "Appel des connaissances"
 SPECIAL_PROJECT_CALLING_DESC: "$whisperers_in_the_void_color_article_cap$ aspirent à acquérir des connaissances qui dépassent les limites de la pensée conventionnelle. En chargeant nos [Owner.GetResearchers] de se concentrer sur des domaines de recherche plus marginaux, nous pourrons peut-être étancher la soif de connaissances des Murmureurs."
 physics_technology_CALLING_PROJECT: "$SPECIAL_PROJECT_CALLING$"
 physics_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
