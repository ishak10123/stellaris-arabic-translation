 shroud.4500.desc.non_pacifist: "$shroud.4500.desc.1$$utopia.3306.desc.2$\n\nIl a l'air impatient de s'y mettre."
 shroud.4500.a: "Concluons l'accord avec $the_eater_of_worlds_color_article$"
 shroud.4505.desc.intro: "C'est fait. Nous avons conclu un accord avec $the_eater_of_worlds_color_article$. Sa volonté s'étend à la §H[Root.GetName]§!."
 shroud.4505.desc.outro: "Alors que nous formions notre lien, le Mangeur a réclamé son dû : la population entière de l'une de nos villes a brusquement disparu. Ce n'est pas très cher payé... sauf si sa faim doit encore frapper."
 shroud.4505.desc.default: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.hive: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.gestalt_machine: "$shroud.4505.desc.hive$"
 shroud.4505.desc.individual_machine: "$shroud.4505.desc.intro$\n\nLes changements sont déjà détectables dans notre société. Nos unités militaires sont toujours plus concentrées sur le combat. En temps de paix, nous devons les faire participer à d'intenses simulations de bataille, sous peine que leur agitation se transforme en sauvagerie.\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc_2_pacifist: "Les changements se dessinent déjà dans notre société. Nos esprits sont en proie à un conflit, animés par un goût pour la bataille. Cette dissonance cognitive provoque un grand malaise au sein de notre population habituellement pacifique. Avons-nous fait le bon choix ?"
 shroud.4505.desc_2_organic_non_gestalt: "Les changements sont déjà évidents dans notre société. Notre personnel militaire est toujours plus avide de combat. En temps de paix, nous devons leur faire suivre un entraînement éprouvant, sous peine que leur agitation se transforme en sauvagerie."
 shroud.4505.desc_2_machine_non_gestalt: "Les changements sont déjà détectables dans notre société. Nos unités militaires sont toujours plus concentrées sur le combat. En temps de paix, nous devons les faire participer à d'intenses simulations de bataille, sous peine que leur agitation se transforme en sauvagerie."
 shroud.4505.desc_2_gestalt: "Les changements sont déjà détectables dans notre société. Nos [GetIndividualNamePlural] militaires sont toujours plus concentrés sur le combat. En temps de paix, nous devons les faire participer à d'intenses simulations de bataille, sous peine qu'ils deviennent agressifs sans raison."
 shroud.4505.a.default: "Espérons que non"
 shroud.4505.a.gestalt: "Le jeu en vaut la chandelle"
 shroud.4510.desc.intro: "Du temps a passé depuis que nous avons posé les bases d'un accord avec "
 shroud.4510.desc.outro: ". Notre lien est encore fragile, nous avons donc encore une chance de le rompre, ou au contraire de le renforcer.\n\nD'après nos [GetTelepathPlural], confirmer cet engagement nous permettra de tirer activement parti des pouvoirs accordés par notre mécène, tout en améliorant nos flottes et notre aura psionique."
 shroud.4510.desc: "$shroud.4510.desc.intro$$the_eater_of_worlds_color_article$$shroud.4510.desc.outro$"
 shroud.4510.b: "Renonçons au §H$the_eater_of_worlds$§!"
 shroud_eater_covenant_chain_title: "$eater_covenant_chain_title$"
 shroud_eater_covenant_chain_desc.intro: "Nous avons créé un lien avec une entité du Suaire nommée $the_eater_of_worlds_color_article$. Insatiable, elle nous confère une partie de son pouvoir en échange d'un prix à payer.\n\nSelon les [GetTelepathPlural], le lien pourrait être encore renforcé si nous choisissons d'aligner nos actions avec la volonté de notre mécène."
 shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\nLe Mangeur a faim et s'impatiente. Il aspire à la guerre, et au goût si doux des combats et des lamentations."
 shroud_eater_covenant_chain_begin: "$eater_covenant_chain_begin$"
 shroud_eater_covenant_chain_end: "$eater_covenant_chain_end$"
 robot_shroud_eater_covenant_chain_title: "$shroud_eater_covenant_chain_title$"
 robot_shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\nLe Mangeur a faim et s'impatiente. Il aspire à la guerre, et au goût si doux du feu et de la ruine."
 # Instrument of Desire
 shroud.4550.title: "$utopia.3304.name$"
 shroud.4550.desc.default: "Dès que nous plongeons dans le Suaire, une présence s'approche de nous. Ses pensées s'enroulent et se vrillent autour des esprits des [GetTelepathPlural], marchandant mielleusement. C'est $the_instrument_of_desire_color_article$ qui peut nous garantir richesse, puissance et prestige... Tout ce que nous avons jamais désiré. Tout ce que nous désirerons jamais.\n\nLe coût ? Bien peu de choses, rien d'autre qu'une sorte d'indemnité. Il ne veut que le meilleur pour nous. Il nous aidera, nous guidera, sera le tuteur de nos ambitions et de nos rêves.\n\n§HSi nous l'acceptons dans nos coeurs.§!\n\nIl est persuadé que nous allons accepter. Et, à dire vrai, comment donc pourrions-nous refuser ?"
 shroud.4550.desc.hive: "$shroud.4550.desc.default$"
 shroud.4550.desc.gestalt_machine: "Dès que nous plongeons dans le Suaire, une présence s'approche de nous. Ses pensées s'enroulent et se vrillent autour des circuits des [GetTelepathPlural], marchandant mielleusement. C'est $the_instrument_of_desire_color_article$ qui peut nous garantir richesse, puissance et prestige... Tout ce que nous avons jamais désiré. Tout ce que nous désirerons jamais.\n\nLe coût ? Bien peu de choses, rien d'autre qu'une sorte d'indemnité. Il ne veut que le meilleur pour nous. Il nous aidera, nous guidera, sera le tuteur de nos ambitions et de nos rêves.\n\n§HSi nous l'acceptons dans nos processeurs.§!\n\nIl est persuadé que nous allons accepter. Et, à dire vrai, comment donc pourrions-nous refuser ?"
 shroud.4550.desc.individual_machine: "$shroud.4550.desc.gestalt_machine$"
 shroud.4550.a: "Concluons l'accord avec $the_instrument_of_desire_color_article$"
 shroud.4555.desc.intro: "C'est fait. Nous avons conclu un accord avec $the_instrument_of_desire_color_article$. Sa volonté s'étend à la §H[Root.GetName]§!."
 shroud.4555.desc.outro: "Tel est le prix de notre lien. Selon les [GetTelepathPlural], les plus grandes bénédictions de l'Instrument sont encore à venir."
 shroud.4555.desc.default: "$shroud.4555.desc.intro$\n\nLe prix de notre marché est déjà évident. Alors que nous attendons l'âge d'or promis de la richesse et de la prospérité, le peuple ne se satisfait plus de vivre avec le strict nécessaire. Les [Root.GetSpeciesNamePlural] rêvent maintenant de toutes sortes de biens matériels, qui font peser un nouveau fardeau sur notre économie.\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.hive: "$shroud.4555.desc.intro$\n\nLe prix de notre marché est déjà détectable. Alors que nous attendons l'âge d'or promis de la production inégalée, les besoins élémentaires de nos drones se sont accrus. Les [Root.GetSpeciesNamePlural] exigent maintenant toutes sortes de biens superflus, qui font peser un nouveau fardeau sur notre économie.\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.gestalt_machine: "$shroud.4555.desc.hive$"
 shroud.4555.desc.individual_machine: "$shroud.4555.desc.default$"
 shroud.4555.a.default: "Espérons qu'ils aient raison"
 shroud.4555.a.gestalt: "Nous avons confiance en eux"
 shroud.4560.desc: "$shroud.4510.desc.intro$$the_instrument_of_desire_color_article$$shroud.4510.desc.outro$"
 shroud.4560.b: "Renonçons au §H$the_instrument_of_desire$§!"
 shroud_instrument_covenant_chain_title: "$instrument_covenant_chain_title$"
 shroud_instrument_covenant_chain_desc.intro: "Nous avons créé un lien avec une entité du Suaire nommée l'§HInstrument du désir§!. Attentive, elle nous confère une partie de son pouvoir en échange d'un prix à payer. Nous avons encore sans doute beaucoup à découvrir\n\nSelon les [GetTelepathPlural], le lien pourrait être encore renforcé si nous choisissons d'aligner nos actions avec la volonté de notre mécène."
 shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\nL'Instrument aspire à la jouissance. Les plaisirs assouvis, la décadence et l'esclavage font sa délectation."
 shroud_instrument_covenant_chain_begin: "$instrument_covenant_chain_begin$"
 shroud_instrument_covenant_chain_end: "$instrument_covenant_chain_end$"
 robot_shroud_instrument_covenant_chain_title: "$shroud_instrument_covenant_chain_title$"
 robot_shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\nL'Instrument aspire à la jouissance. La consommation débridée, l'exploitation et l'esclavage font sa délectation"
 # Cradle of Souls
 shroud.4600.title: "$utopia.3304.name$"
 shroud.4600.desc.default: "[GetCradleCovenantProposedDesc]"
 shroud.4600.desc.hive: "$shroud.4600.desc.default$"
 shroud.4600.desc.gestalt_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc.individual_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc_homicidal: "Alors que nous nous enfonçons dans le Suaire, une présence nous assaille. Sa lueur envahissante obscurcit tout le reste. Il s'agit du §H$the_cradle_of_souls$§! et il brûle jusqu'au plus profond de nous.\n\nTout ce qu'il souhaite, c'est un compromis à l'échelle galactique, une paix abjecte entre des êtres incompatibles. Il nous promet un grand pouvoir si nous acceptons cette ignoble vision.\n\n§HSi et seulement si nous le laissons façonner nos horizons.§!\n\nLa lumière du Berceau est implacable, et son pouvoir est indéniable. Nos esprits pourraient-ils accepter une telle chose ? Cela affaiblira-t-il notre détermination ?"
 shroud.4600.desc_non_homicidal: "Alors que nos esprits s'enfoncent dans le Suaire, une présence se fait jour en nous. Nous percevons un éclat qui illumine tout ce qui l'entoure, irradiant l'ordre et l'équilibre. Il s'agit du §H$the_cradle_of_souls$§! et il nous remue jusqu'au plus profond de nous.\n\nTout ce qu'il souhaite, c'est la paix durable, une galaxie guérie du chaos. Si nous partageons sa vision, il peut nous transformer en vecteurs d'harmonie. Il nous promet un lien de confiance inviolable.\n\n§HSi et seulement si nous le laissons façonner nos horizons.§!\n\nLes espoirs du Berceau nous assaillent."
 shroud.4600.a: "Concluons l'accord avec $the_cradle_of_souls_color_article$"
 shroud.4605.intro: "C'est fait. Nous avons conclu un accord avec $the_cradle_of_souls_color_article$. Sa volonté s'étend à la §H[Root.GetName]§!."
 shroud.4605.desc.default: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc.gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.non_gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.hive: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.gestalt_machine: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.individual_machine: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc_outro_homicidal: "L'impact sur la psyché des [Root.GetSpeciesNamePlural] est d'ores et déjà indéniable. L'esprit de nombreux [Root.GetIndividualPlural] est infesté de pensées de paix galactique, provoquant une profonde dissonance dans toute notre société.\n\nSelon nos [GetTelepathPlural], les bienfaits de cet accord ne se sont pas encore manifestés. En attendant, un terrible conflit tourmente nos esprits. Que nous sommes-nous infligés ?"
 shroud.4605.desc_outro_gestalt: "L'impact sur la psyché des [Root.GetSpeciesNamePlural] est d'ores et déjà détectable. Alors que nous visons des relations paisibles à travers l'ensemble de la galaxie, toute discorde avec nos voisins cause un trouble dans la conscience collective.\n\nCette légère perturbation est le prix de notre lien. Selon nos [GetTelepathPlural], les plus grandes bénédictions du Berceau sont encore à venir."
 shroud.4605.desc_outro_non_gestalt: "L'impact sur la psyché des [Root.GetSpeciesNamePlural] est d'ores et déjà évident. Alors que nous désirons instaurer des relations paisibles à travers l'ensemble de la galaxie, toute discorde avec nos voisins cause la détresse de notre peuple entier.\n\nCette légère perturbation est le prix de notre lien. Selon nos [GetTelepathPlural], les plus grandes bénédictions du Berceau sont encore à venir."
 shroud.4605.a.default: "[GetCradleCovenantFormedOption]"
 shroud.4605.a.gestalt: "[GetCradleCovenantFormedOption]"
 shroud.4605.opt.a.default: "Espérons qu'ils aient raison"
 shroud.4605.opt.a.gestalt: "Nous avons confiance en eux"
 shroud.4605.opt.a.homicidal: "Nous ne pouvons qu'attendre"
 shroud.4610.desc: "$shroud.4510.desc.intro$$the_cradle_of_souls_color_article$$shroud.4510.desc.outro$"
 shroud.4610.b: "Renonçons au §H$the_cradle_of_souls$§!"
 shroud_cradle_covenant_chain_title: "$the_cradle_of_souls$"
 shroud_cradle_covenant_chain_desc: "Nous avons créé un lien avec une entité du Suaire nommée $the_cradle_of_souls_color_article$. Harmonieuse, elle nous confère une partie de son pouvoir en échange d'un prix à payer.\n\nSelon les [GetTelepathPlural], le lien pourrait être encore renforcé si nous choisissons d'aligner nos actions avec la volonté de notre mécène.\n\nLe Berceau souhaite libérer la galaxie du chaos et du conflit, avec le concours de tous ses habitants unis dans l'objectif commun de la paix universelle. Seul l'équilibre parfait pourra le contenter."
 shroud_cradle_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"
 shroud_cradle_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"
 robot_shroud_cradle_covenant_chain_title: "$shroud_cradle_covenant_chain_title$"
 robot_shroud_cradle_covenant_chain_desc: "$shroud_cradle_covenant_chain_desc$"
 # Composer of Strands
 shroud.4650.title: "$utopia.3304.name$"
 shroud.4650.desc.default: "Une présence nous attend dans le Suaire. Elle nous accueille avec une véritable sympathie. Elle ne s'exprime pas tant par des mots que par des visions, des concepts, des idées. Elle s'écoule dans l'esprit des [GetTelepathPlural], si doucement et précautionneusement qu'on pourrait croire qu'elle y a toujours été. Un déluge d'images défile devant eux.\n\nLa présence nommée $the_composer_of_strands_color_article$ considère nos formes organiques avec un intérêt curieux. Elle nous révèle diverses manières qui permettraient de les faire grandir, de les modifier. Les faire évoluer. Les améliorer.\n\n§HSi nous l'accueillons à l'intérieur même de notre chair.§!\n\nElle attend patiemment notre réponse, comme prise d'affection. Comme un parent poule attendrait une réponse de son enfant préféré."
 shroud.4650.desc.hive: "$shroud.4650.desc.default$"
 shroud.4650.desc.gestalt_machine: "Une présence nous attend dans le Suaire. Elle nous accueille avec une véritable sympathie. Elle ne s'exprime pas tant par des mots que par des visions, des concepts, des idées. Elle s'écoule dans les circuits des [GetTelepathPlural], si doucement et précautionneusement qu'on pourrait croire qu'elle y a toujours été. Un déluge d'images défile devant eux.\n\nLa présence nommée $the_composer_of_strands_color_article$ considère nos formes mécaniques avec un intérêt curieux. Elle nous révèle diverses manières qui permettraient de les adapter, de les modifier. Les améliorer. Les mettre à niveau.\n\n§HSi nous l'accueillons à l'intérieur même de nos composants.§!\n\nElle attend patiemment notre réponse, comme prise d'affection. Comme un parent poule attendrait une réponse de son enfant préféré."
 shroud.4650.desc.individual_machine: "$shroud.4650.desc.gestalt_machine$"
 shroud.4650.a: "Concluons l'accord avec $the_composer_of_strands_color_article$"
 shroud.4655.desc.intro: "C'est fait. Nous avons conclu un accord avec $the_composer_of_strands_color_article$. Sa volonté s'étend à la §H[Root.GetName]§!."
 shroud.4655.desc.outro: "Il est clair que nous avons renoncé à un certain contrôle de la forme des [Root.GetSpeciesNamePlural]. Notre mécène a désormais la liberté de la changer selon sa volonté.\n\nCe n'est qu'un maigre sacrifice en échange de notre nouveau lien. Selon les [GetTelepathPlural], les plus grandes bénédictions du Composeur sont encore à venir."
 shroud.4655.desc.default: "$shroud.4655.desc.intro$\n\nNos [GetScientistPlural] ont déjà détecté des schémas anormaux dans la structure génétique des échantillons des [Root.GetSpeciesNamePlural], comme si de nombreuses générations de changements liés à l'évolution s'étaient condensés en un jour. $shroud.4655.desc.outro$"
 shroud.4655.desc.hive: "$shroud.4655.desc.default$"
 shroud.4655.desc.individual_machine: "$shroud.4655.desc.intro$\n\nNos [GetScientistPlural] ont déjà détecté des schémas anormaux dans la structure moléculaire des échantillons des [Root.GetSpeciesNamePlural], comme si de nombreuses générations de mises à niveau du système s'étaient condensées en un jour. $shroud.4655.desc.outro$"
 shroud.4655.desc.gestalt_machine: "$shroud.4655.desc.individual_machine$"
 shroud.4655.a.default: "$covenant.composer.option$"
 shroud.4655.a.gestalt: "C'est le prix du pouvoir"
 shroud.4660.desc: "$shroud.4510.desc.intro$$the_composer_of_strands_color_article$$shroud.4510.desc.outro$"
 shroud.4660.b: "Renonçons au §H$the_composer_of_strands$§!"
 shroud_composer_covenant_chain_title: "$composer_covenant_chain_title$"
 shroud_composer_covenant_chain_desc.intro: "Nous avons créé un lien avec une entité du Suaire nommée $the_composer_of_strands_color_article$. Protectrice, elle nous confère une partie de son pouvoir en échange d'un prix à payer. Nous avons encore sans doute beaucoup à découvrir.\n\nSelon les [GetTelepathPlural], le lien pourrait être encore renforcé si nous choisissons d'aligner nos actions avec la volonté de notre mécène."
 shroud_composer_covenant_chain_desc: "$shroud_composer_covenant_chain_desc.intro$\n\nLe Composeur aspire aux manipulations génétiques pour libérer la chair des contraintes de l'évolution. Il nous enseigne le respect de la vie, de la nature et la sacralité de la chair."
 shroud_composer_covenant_chain_begin: "$composer_covenant_chain_begin$"
 shroud_composer_covenant_chain_end: "$composer_covenant_chain_end$"
 robot_shroud_composer_covenant_chain_title: "$shroud_composer_covenant_chain_title$"
 robot_shroud_composer_covenant_chain_desc: "$shroud_composer_covenant_chain_desc.intro$\n\nLe Composeur aspire aux manipulations de la forme physique pour libérer la croissance des contraintes conventionnelles. Il nous enseigne le respect de la vie, de la nature et la sacralité de la chair."
 # Whisperers in the Void
 shroud.4700.title: "$utopia.3304.name$"
 shroud.4700.desc: "$utopia.3304.desc.shroud$"
 shroud.4700.a: "Concluons l'accord avec $whisperers_in_the_void_color_article$"
 shroud.4700.b: "$shroud.reject_covenant$"
 shroud_whisperers_in_the_void_covenant_formed_effect: "$t$$mod_country_base_unity_produces_add$: §R-15%§!"
 shroud.4705.desc.intro: "C'est fait. Nous avons conclu un accord avec $whisperers_in_the_void_color_article$. Leur volonté s'étend à la §H[root.GetName]§!.\n\nL'influence de notre nouveau mécène s'est vite installée."
 shroud.4705.desc.outro: "Tel est le prix de ce lien puissant. Selon les [GetTelepathPlural], les plus grandes bénédictions des Murmureurs sont encore à venir. Notre communion directe avec une entité psionique aussi magnifique en vaudra sans doute la peine."
 shroud.4705.desc.gestalt: "$shroud.4705.desc.intro$ Alors que notre collectif attend un afflux de connaissances cachées, nous sentons que nos pensées se dispersent en schémas divergents. En effet, [GetNetworkName] est recouvert d'une discorde croissante entre les voix intérieures.\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.non_gestalt: "$shroud.4705.desc.intro$ Alors que nous avons soif de connaissances cachées, les idées et opinions de notre société sont maintenant plus divergentes que jamais. Une discorde de voix intérieures érode notre psyché, menaçant le bien-être mental de tous les [root.GetSpeciesNamePlural].\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.default: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.desc.hive: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.gestalt_machine: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.individual_machine: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.a.default: "Nous trouverons une solution"
 shroud.4705.a.gestalt: "$shroud.4705.a.default$"
 shroud.4710.title: "$utopia.2658.name$"
 shroud.4710.desc: "$shroud.4510.desc.intro$$whisperers_in_the_void_color_article$$shroud.4510.desc.outro$"
 shroud.4710.a: "$utopia.2658.a$"
 shroud.4710.b: "Renonçons aux §H$whisperers_in_the_void$§!"
 shroud_whisperers_in_the_void_covenant_accepted_effect: "$t$£research£Recherche mensuelle pour $pop_group_unit$ $telepath_type_plural_with_icon$ : $@telepath_whisperers_research|0=+$"
 # End of the Cycle
 shroud.4715.desc.intro: "C'est fait. Nous avons conclu un accord avec $end_of_the_cycle_color_article$. Lorsque nous avons accepté le marché, nos [GetTelepathPlural] ont repris la parole : §R« C'EST LE DÉBUT DE LA FIN. »§!"
 shroud.4715.desc.default: "$shroud.4715.desc.intro$\n\nPuis le silence. Un silence insondable, emplissant l'esprit de tous les [root.GetSpeciesNamePlural]. Là où autrefois, les énergies innombrables du §HSuaire§! tourbillonnaient au sein même de notre conscience, un silence de mort s'est désormais abattu sur la dimension psionique.\n\nNous étions seuls avec notre réflexion sur les conséquences de notre choix."
 shroud.4715.desc.hive: "$shroud.4715.desc.intro$\n\nPuis le silence. Un silence insondable, emplissant l'esprit de tous les [root.GetSpeciesNamePlural]. Là où autrefois, les énergies innombrables du §HSuaire§! tourbillonnaient dans notre [GetBrainName], un silence inerte s'est désormais abattu sur la dimension psionique.\n\nNous étions seuls à tenter d'évaluer les conséquences de notre choix."
 shroud.4715.desc.gestalt_machine: "$shroud.4715.desc.default$"
 shroud.4715.desc.individual_machine: "$shroud.4715.desc.default$"
 shroud.4715.a.default: "Que sa volonté soit clémente"
 shroud.4715.a.gestalt: "$shroud.4715.a.default$"
 shroud_whisperers_covenant_chain_title: "$whisperers_covenant_chain_title$"
 shroud_whisperers_covenant_chain_desc: "Nous avons créé un lien avec des entités du Suaire nommées $whisperers_in_the_void_color_article$. Insondables, elles ont promis de nous conférer une partie de leur puissance en échange d'un prix à payer.\n\nSelon les [GetTelepathPlural], le lien pourrait être encore renforcé si nous choisissons d'aligner nos actions avec la volonté de notre mécène.\n\nLes Murmureurs se délectent de la connaissance, des secrets tus et des intrigues. Ils savourent la joie pure d'un esprit complet, suivant sans relâche la moindre piste."
 shroud_whisperers_covenant_chain_begin: "$whisperers_covenant_chain_begin$"
 shroud_whisperers_covenant_chain_end: "$whisperers_covenant_chain_end$"
 robot_shroud_whisperers_covenant_chain_title: "$shroud_whisperers_covenant_chain_title$"
 robot_shroud_whisperers_covenant_chain_desc: "$shroud_whisperers_covenant_chain_desc$"
 shroud.11110.title: "Le cycle continue"
 shroud.11110.desc: "Les §HMurmureurs§! s'insinuent de façon stridente. Leurs voix recouvrent tout le reste dans nos esprits. Ils ont hâte de communier avec nous, de nous abreuver de leurs connaissances.\n\nUn choix irrévocable se présente à nous."
 shroud.11110.a: "Absorbons $the_eater_of_worlds_article$"
 shroud.11110.b: "Absorbons $the_cradle_of_souls_article$"
 shroud.11110.c: "Absorbons $the_instrument_of_desire_article$"
 shroud.11110.d: "Absorbons $the_composer_of_strands_article$"
 shroud.11120.title: "[GetBetrayedPatronColour] : la vengeance"
 shroud.11120.title.eater: "$the_eater_of_worlds_color_article$ : La vengeance"
 shroud.11120.title.cradle: "$the_cradle_of_souls_color_article$ : La vengeance"
 shroud.11120.title.instrument: "$the_instrument_of_desire_color_article$ : La vengeance"
 shroud.11120.title.composer: "$the_composer_of_strands_color_article$ : La vengeance"
 shroud.11120.desc: "Lorsque nos [GetTelepathPlural] sont sortis du §HSuaire§!, nous avons découvert que notre trahison a suscité une violente réaction de la part de notre ancien mécène : [GetBetrayedPatronColour].\n\nUne percée du Suaire est apparue près du monde §H[event_target:selected_planet_for_revenge.GetName]§!, qui n'est à présent plus qu'une friche. Une rage palpable transparaissait depuis l'autre côté. Notre ancien mécène prépare sans aucun doute sa revanche."
 shroud.11120.a: "Nous devons nous préparer à nous défendre"
 shroud.11120.a.tt: "§H[event_target:selected_planet_for_revenge.GetName]§! se transforme en §Ymonde enveloppé du Suaire§!.\nUne percée du Suaire apparaît à proximité."
 shroud_tunnel_object: "$SHROUD_TUNNEL_GALACTIC$"
 shroud.11130.title: "Vengeance furieuse"
 shroud.11130.desc_common: "Un §Yavatar psionique§! a émergé de la percée du Suaire dans le système de [event_target:spawn_system.GetName]. C'est une manifestation de la fureur du mécène [GetBetrayedPatronColour]. Il voyage désormais en direction de [capital_scope.GetName]."
 shroud.11130.desc_success: "Nous sommes parvenus à rassembler nos forces contre la menace émergente. Nos vaisseaux ont émis des vagues d'énergie psionique dans la percée du Suaire, affaiblissant l'entité hostile alors qu'elle s'introduisait dans notre réalité."
 shroud.11130.success_tt: "$NAME_Psionic_Avatar$ a perdu la moitié de sa force."
 shroud.11250.title: "La Fin"
 shroud.11250.desc: "Alors que nous entrons en transe, nos esprits sont frappés de silence. Nous n'avons jamais connu le Suaire aussi calme.\n\nLe vide a perdu sa voix.\n\nTout a disparu."
 shroud.11250.a: "Ce doit être la Fin."
 shroud.11255.title: "Renaissance de la [owner.GetName]"
 shroud.11255.desc: "Nous avons redoublé d'efforts pour nous remettre de la destruction causée par $end_of_the_cycle_color_article$. Nous avons reconstruit un §Havant-poste§! dans le système de §H[solar_system.Star.GetStarName]§!, marquant un nouveau départ pour la [owner.GetName]."
