 abomination_army: "Abominations"
 abomination_army_desc: "Des soldats asservis ayant subi d'intenses traitements expérimentaux visant à augmenter leur agression et leurs capacités martiales, ce qui les a transformés en armes vivantes. Aussi dociles envers leurs maîtres qu'ils sont redoutables au combat."
 seq_abomination_army: "$R$° Armée d'abominations"
 mindwarden_army: "Gardiens d'assaut"
 mindwarden_army_desc: "Ces unités spécialisées ont reçu un entraînement intensif en techniques et technologies anti-psioniques, ce qui en fait de puissants adversaires face aux cibles capables d'envahir les pensées."
