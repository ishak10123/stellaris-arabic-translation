 # Energy Thralls (Normal)
 job_energy_thrall: "Sujets énergétiques"
 job_energy_thrall_plural: "Sujets énergétiques"
 job_energy_thrall_desc: "L'énergie excédentaire de la population pourrait être mise à profit en la mettant au service d'une gouvernance de qualité. Un appareil de siphonnage spécialement calibré est implanté chez chaque sujet énergétique, ce qui collecte son essence et la stocke dans des cellules énergétiques à transfert facile."
 job_energy_thrall_effect_desc: "Les £job_energy_thrall£sujets énergétiques produisent de l'£unity£§Iunité§!, du §Y£mod_leader_species_exp_gain£§!gain d'expérience des personnalités, et ils réduisent la §Ypénalité de développement des pops§! des décrets §Y$edict_energy_drain$§! et §Y$edict_sanguine_council$§! de §G0.02%§!.\n\n"
 mod_job_energy_thrall_add: "Emplois de sujets énergétiques "
