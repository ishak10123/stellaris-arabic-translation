 civic_tankbound: "Cuves de survie"
 civic_tankbound_desc: "Les membres de cette société mènent leur existence suspendus dans des cuves de biofluides spécialisés. Les équipements d'assistance leur sont donc indispensables, et ils sont incapables de pratiquer un travail physique."
 civic_tankbound_effects_base: "Ajoute le trait ['trait:trait_tankbound'].\nLes $job_farmer_plural_with_icon$, les $job_miner_plural_with_icon$ et les $job_technician_plural_with_icon$ sont désormais entièrement §Yautomatisés§!.\nLes emplois de ['concept_colonist',colons] sont spécialistes.\nLes £district£districts §Yurbains§! ont des emplois de §Ysuperviseurs de la production§! supplémentaires."
 civic_tankbound_effects: "$civic_tankbound_effects_base$"
 civic_tankbound_negative_effects: "$t$- Commence la partie avec 2 000 £pop£pops de moins qu'habituellement."
 civic_tankbound_corporate: "Réservoir d'idées"
 civic_tankbound_corporate_desc: "Cette société a adopté de façon universelle un produit expérimental sous la forme de cuves d'habitation spécialisées. Par conséquent, les équipements d'assistance sont indispensables à ses membres, et ils sont incapables de pratiquer un travail physique."
