 tr_psionics_endbringers_cult_desc: "$ALLOW_CHAMBER_OF_SILENCE$"
 tr_psionics_endbringers_cult_delayed: "Une fois entendue, la Voix ne peut être ignorée. Nous nous soumettons à sa volonté."
 building_chamber_of_silence: "Chambre du silence"
 building_chamber_of_silence_desc: "Les individus psioniques de tout l'empire se rassemblent pour communiquer avec le Suaire dans des chambres où règne un silence protecteur."
 building_chamber_of_silence_madness_1_tt: "Réduit les effets négatifs de la ['modifier:endbringers_madness_1'] de §G$@chamber_of_silence_effect_mult|0%$§!."
 building_chamber_of_silence_madness_2_tt: "Réduit les effets négatifs de la ['modifier:endbringers_madness_2'] de §G$@chamber_of_silence_effect_mult|0%$§!."
 building_chamber_of_silence_madness_3_tt: "Réduit les effets négatifs de la ['modifier:endbringers_madness_3'] de §G$@chamber_of_silence_effect_mult|0%$§!."
 building_chamber_of_silence_paranoia_tt: "Réduit les effets négatifs de la ['modifier:endbringers_paranoia'] de §G$@chamber_of_silence_effect_mult|0%$§!."
 building_chamber_of_silence_destroyed_tt: "§RCe bâtiment sera détruit en cas de perte de la colonie.§!"
 shroud.8310.name: "$shroud.2750.name$"
 shroud.8310.desc: "Nous sommes voués à un niveau d'existence supérieur. Ceux qui résistent en vain sont éliminés afin de préserver le caractère sacré de notre ascension. Notre destin est scellé. Le chemin que nous avons parcouru a été englouti par les ombres du monde enveloppé du Suaire.\n\nÀ présent, la §RVoix§! nous parle avec une clarté saisissante.\n\n§R« LE CHEMIN EST TOUT TRACÉ. »§!\n\nElle est en quête de sacrifices volontaires."
 shroud.8310.a: "C'est inévitable"
 shroud.8310.a.tt: "Chaque colonie perd entre 100 et 300 £pop£§Hpops§!."
