 starbase_mindwarden: "$MINDWARDEN$"
 starbase_mindwarden_plural: "$MINDWARDEN_plural$"
 gov_mindwarden_enclave: "Enclave des Gardiens de la conscience"
 gov_mindwarden_enclave_desc: "Motivée par une profonde antipathie envers le Suaire, cette organisation propose des services et technologies visant à contrecarrer les puissants effets des pratiques psioniques."
 civic_mindwarden_enclave: "$ENCLAVE_MINDWARDEN$"
 civic_mindwarden_enclave_desc: ""
 enclave_mindwarden_station: "Station de $MINDWARDEN$"
 enclave_mindwarden_station_plural: "Stations de $MINDWARDEN$"
 leader_trait_iron_will: "Volonté de fer"
 leader_trait_iron_will_desc: "Commandant hors pair des $MINDWARDEN_plural$, célèbre pour son expertise en fortifications lourdes et en résistance psychique."
 shroud.4190.name: "Approche de l'aura psionique"
 shroud.4190.desc.intro: "Il y a quelque temps, nos [GetScientistPlural] ont observé un phénomène inhabituel : des systèmes stellaires étaient parcourus de flux énergétiques d'origine inconnue, qui s'étendaient peu à peu à leurs voisins."
 shroud.4190.desc: "$shroud.4190.desc.intro$ Sur la base de nos théories sur leur provenance, nous appelons ces manifestations les §H« auras psioniques »§!. Nous ignorons encore si elles représentent ou non une menace.\n\nPar ailleurs, une aura de ce type a été détectée dans le système de §H[from.GetName]§!, ce qui veut dire qu'elle pourrait envahir nos frontières si elle continue sa progression."
 shroud.4190.desc_mindwarden: "Si les théories sur l'origine psionique de ce phénomène sont exactes, la §H[event_target:mindwarden_enclave_country.GetName]§! connaît peut-être des méthodes pour contrecarrer ses effets."
 shroud.4190.a: "Nous connaîtrons peut-être ses effets très bientôt"
 shroud.4191.name: "$shroud.4190.name$"
 shroud.4191.desc_1.common: "Nous avons détecté de fortes concentrations d'énergie psionique dans le système de §H[from.GetName]§!. En écoutant les échos au sein du §HSuaire§!, nos [GetTelepathPlural] ont indiqué que ce phénomène était causé par les activités psioniques"
 shroud.4191.desc_1.default: "$shroud.4191.desc_1.common$ d'une civilisation alien."
 shroud.4191.desc_1.contact: "$shroud.4191.desc_1.common$ de la §H[fromfrom.GetName]§!"
 shroud.4191.desc_2.common: "la matière et la conscience de la réalité observable. Nos constatations démontrent que ces auras peuvent se transmettre d'un système stellaire à un autre."
 shroud.4191.desc_2.default: "Appelée §H« aura psionique »§!, elle émane de la volonté d'une puissante entité du Suaire et influence $shroud.4191.desc_2.common$"
 shroud.4191.desc_2.knows_aura: "Il semblerait que cet empire ait développé des méthodes pour canaliser une §Haura psionique§!, qui émane du Suaire et qui influence $shroud.4191.desc_2.common$"
 shroud.4191.desc_3.common: "nous supposons que ses effets au sein de notre territoire seront positifs, tant que nos relations avec l'émetteur restent inchangées."
 shroud.4191.desc_3.default: "Selon nos [GetTelepathPlural], elle irradie une intention bienveillante, donc $shroud.4191.desc_3.common$"
 shroud.4191.desc_3.contact: "Étant donné nos relations peu favorables avec la [fromfrom.GetName], $shroud.4191.desc_3.common$"
 shroud.4191.a.rival_organic: "$WORRYING$"
 shroud.4191.a.rival_default: "La situation est loin d'être idéale"
 shroud.4191.a.organic: "C'est un cadeau du Suaire"
 shroud.4191.a.default: "C'est un phénomène intéressant"
 shroud.mindwarden.back: "$enclave.410.a$"
 shroud.4205.name: "[event_target:mindwarden_enclave_country.GetName]"
 shroud.4205.common: "Salutations. Je m'adresse à vous au nom de la [event_target:mindwarden_enclave_country.GetName]."
 shroud.4205.desc: "$shroud.4205.common$\n\nNotre mission consiste en la protection contre la menace du §HSuaire§! et tous ceux qui propagent ses effets néfastes. Nous croyons en la liberté des esprits qui n'ont pas à subir le joug de l'invasion, mais aussi au renforcement de la galaxie contre le psionisme.\n\nSelon les analyses de nos capteurs psi, vous ne contribuez pas à ces menaces. Parfait. Nous serions ravis de vous aider à vous protéger contre elles.\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.end: "Si vous avez besoin de services militaires anti-psioniques ou que vous voulez vous débarrasser de §H$zro_lower$§!, laissez-nous vous apporter notre assistance."
 shroud.4205.desc.return: "C'est un plaisir de vous revoir. Notre coopération est précieuse aux yeux de la [event_target:mindwarden_enclave_country.GetName].\n\nLes analyses de nos capteurs psi sont formelles. Vous restez exempts de la corruption du §HSuaire§!. Tant mieux...\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.eotc: "L'heure est grave. Malgré tous nos efforts, $end_of_the_cycle_color_article$ est imminente. Sa terrible manifestation rôde parmi les étoiles...\n\n$shroud.4205.desc.eotc.end$"
 shroud.4205.desc.eotc.end: "Nous devons nous unir pour empêcher l'apocalypse psionique."
 shroud.4205.desc.merc_first: "Chers Gardiens, nous avons une bonne nouvelle : la fondation de la première §Henclave des Gardiens de la conscience§! est maintenant terminée. $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_more: "Chers Gardiens, nous avons une bonne nouvelle : la fondation de notre §Henclave des Gardiens de la conscience§! est maintenant terminée. $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_back: "C'est un plaisir de vous revoir, chers Gardiens. Notre coopération est précieuse aux yeux de la §H[mindwarden_enclave_country.GetName]§!.\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning: "$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning.eotc: "$shroud.4205.desc.eotc.end$"
 shroud.4205.a: "Qu'est-ce que le Suaire ?"
 shroud.4205.b: "Nous aimerions discuter du §Izro§!"
 shroud.4205.c: "Que peut-on faire concernant les §Yauras psioniques§! ?"
 shroud.4205.d: "Nous connaissons une bonne cible psionique..."
 shroud.4205.e: "Nous avons besoin d'aide pour combattre tout phénomène de £crime£§Y[GetCrimeDeviancy]§! parmi nous."
 shroud.4205.ef: "Nous avons besoin d'un §Yappui logistique§!"
 shroud.4205.f: "Vos soldats ne nous seraient pas inutiles"
 shroud.4205.g: "Seriez-vous d'accord pour nous envoyer un §YGardien§! ?"
 shroud.4205.h: "Nous aimerions discuter de $end_of_the_cycle_article$"
 shroud.4205.i: "En tant que §Ymécène fondateur§!, nous avons une proposition à vous faire"
 shroud.shared_combating_the_shroud: "À partir d'aujourd'hui, la §H[mindwarden_enclave_country.GetName]§! se donne pour tâche cruciale de combattre le §HSuaire§! et toute forme de méfait psionique.\n\nEn cas de besoin, nous sommes d'ores et déjà en mesure de rendre divers services anti-psioniques. De l'enlèvement de §H$zro_lower$§! au recrutement militaire, rapidité et efficacité sont nos maîtres-mots."
 shroud.4210.desc: "Le §HSuaire§! est une dimension de la réalité qui existe au-delà de la perception ordinaire. Il se compose entièrement d'une énergie §H« psionique »§! nocive et rejoint notre galaxie physique en toutes parts, bien que peu de gens le perçoivent activement.\n\nLes énergies du Suaire peuvent se manifester dans le royaume physique à travers l'activité cognitive des êtres conscients. Ces forces sont extrêmement dangereuses et imprévisibles.\n\nPour garantir la sécurité de votre population, il sera nécessaire de mettre en place de mesures protectrices contre le Suaire. Nous pouvons vous y aider."
 shroud.shared_text_shroud_seal: "Ces appareils sophistiqués dissipent peu à peu toute aura psionique, jusqu'à l'anéantir entièrement, à la fois dans le système hôte et ceux qui y sont directement liés via les hyperlignes."
 shroud.4230.desc: "Il existe deux méthodes principales pour combattre les §Hauras psioniques§!.\n\nLa première consiste à construire un §Hsuppresseur psionique§! sur une planète pour réduire peu à peu l'intensité de l'aura à travers le système stellaire, l'empêchant ainsi de s'étendre davantage.\n\nLa seconde, encore plus puissante, prend la forme d'un §Hsceau du Suaire§!. $shroud.shared_text_shroud_seal$"
 shroud.4230.a: "Qu'importe..."
 shroud.4230.b: "Enseignez-nous la §Ysuppression psionique§!"
 shroud.4231.desc: "Avec plaisir. Les données vont vous être transmises immédiatement.\n\nQue ces technologies vous préservent du fléau des auras."
 mindwarden_encourage_raid: "Payons les [event_target:mindwarden_enclave_country.species.GetNamePlural] pour attaquer un empire psionique que nous connaissons."
 shroud.4240.need_psionics: "Contact établi avec un empire §Ypsionique§!."
 shroud.4240.desc: "Vraiment ? Eh bien, nous ne connaîtrons jamais vraiment la paix ni la sécurité tant que le psionisme infecte la galaxie...\n\nUne attaque ciblée montrerait notre opposition contre ces pratiques dangereuses. Avec votre soutien financier, nous sommes d'accord pour mener une opération de ce genre.\n\nSi cela vous convient, communiquez-nous la cible."
 shroud.4240.a: "En fait, nous préférons abandonner l'idée"
 shroud.4240.b: "§I[event_target:raid_target_1.GetName]§!"
 shroud.4240.c: "§I[event_target:raid_target_2.GetName]§!"
 shroud.4240.d: "§I[event_target:raid_target_3.GetName]§!"
 shroud.4240.e: "§I[event_target:raid_target_4.GetName]§!"
 mindwarden_raid_cooldown_tt: "§RNous ne pourrons pas demander une autre attaque de la part des Gardiens de la conscience avant  : §Y[root.mindwarden_raid_timer]§!.§!"
 mindwarden_hire_raid: "Payons la [event_target:mindwarden_enclave_country.GetName] pour envoyer une flotte attaquer cet empire."
 shroud.4245.desc: "Ah, oui. Nous avons connaissance de leurs pratiques psioniques. Une démonstration de force se justifie.\n\nMerci pour votre soutien. L'opération commencera très bientôt."
 mindwarden_raider_modifier: "Croiseur anti-psionique des Gardiens de la conscience"
 shroud.4246.name: "Raid de l'enclave des Gardiens de la conscience"
 shroud.4246.common_1: "Les communications interceptées indiquent qu'elle a été payée par une puissance rivale pour attaquer nos systèmes."
 shroud.4246.common_2: "ont envoyé un message via un canal ouvert pour s'adresser directement à nous."
 shroud.4246.desc: "Une flotte militaire de la §H[event_target:mindwarden_enclave_country.GetName]§! approche de nos frontières ! $shroud.4246.common_1$ Ils $shroud.4246.common_2$"
 shroud.4247.desc: "Une flotte venue d'une puissance militaire jusque-là inconnue approche de nos frontières ! $shroud.4246.common_1$ S'identifiant comme les §H[event_target:mindwarden_enclave_country.GetSpeciesNamePlural]§!, ils $shroud.4246.common_2$"
 NAME_Mindwarden_Corvette: "Fanatique"
 NAME_Mindwarden_Frigate: "Sentinelle"
 NAME_Mindwarden_Destroyer: "Inquisiteur"
 NAME_Mindwarden_Cruiser: "Exorciste"
 NAME_Mindwarden_Battleship: "Purificateur"
 NAME_Mindwarden_Titan: "Prévôt"
 mindwarden_defense_modifier: "Force de défense des Gardien de la conscience"
 shroud.4250.desc: "Magnifique. En nous confiant du $zro_lower$, vous nous permettrez de mener des recherches cruciales sur cette substance puissante dont beaucoup abusent. Nos analyses seront bénéfiques à l'ensemble de la galaxie.\n\nVoilà pourquoi nos prix d'achat sont bien au-dessus des normes galactiques."
 shroud.4250.a: "$shroud.mindwarden.back$"
 shroud.4250.b: "Qu'est-ce que le §Izro§! ?"
 shroud.4250.c: "Donner du £sr_zro£§Izro§!"
 mindwarden_zro_explanation: "Vendre jusqu'à 100 de §Yzro§! pour 5 fois le prix normal du $resolution_category_galactic_market$."
 mindwarden_zro_cooldown_tt: "§RNous ne pourrons pas donner de zro aux Gardiens de la conscience avant : §Y[root.mindwarden_zro_timer]§!.§!"
 shroud.4251.desc: "Le §Yzro§! est une substance rare et hautement instable dont les effets sont difficiles à prédire et à contrôler. Que ce soit de manière intentionnelle ou non, il peut provoquer de violentes décharges d'énergie qui sèment la destruction à grande échelle.\n\nCes propriétés sont produites en réaction au §HSuaire§!, ce qui fait sa popularité auprès des pratiquants du psionisme. Certains vont même jusqu'à l'ingérer.\n\nNous tentons d'en savoir plus sur le $zro_lower$ et de trouver des méthodes pour nous en débarrasser en toute sécurité. Voilà pourquoi nous sommes prêts à payer le prix fort si vous nous en apportez."
 shroud.4255.desc: "Merci pour votre contribution."
 shroud.4260.desc: "Alors permettez-nous de vous offrir une §Ypolice de la pensée§! capable de détecter toute intention [GetCriminalDeviant] avant même la survenue d'un comportement inhabituel.\n\nSes méthodes ont été développées comme alternative sûre aux pratiques psioniques à l'aide de techniques scientifiques pour surveiller l'activité cognitive de la population. Elle apporte des informations sur l'état mental des individus sans avoir recours aux énergies dangereuses du §HSuaire§!."
 shroud.4260.a: "$shroud.mindwarden.back$"
 shroud.4260.b: "Recrutons la §Ipolice de la pensée§!"
 mindwarden_decision_cooldown_tt: "§RNous ne pourrons pas formuler cette demande avant : §Y[root.mindwarden_decision_timer]§!.§!"
 mindwarden_decision_explanation: "Permet la £decision£§Ydécision planétaire§! : §Y$decision_thought_police$§!"
 shroud.4262.desc: "Très bien. Je ne doute pas que vous trouverez leurs méthodes parfaitement efficaces."
 shroud.4265.desc: "En effet. Nos collaborations nous ont déjà permis d'identifier quelques points à améliorer dans vos stratégies de déploiement militaire.\n\nLoin de nous l'idée de vous offenser, mais nous sommes experts en la matière. Nous serions honorés d'aider un partenaire aussi estimé que vous dans ce domaine, moyennant une juste rétribution."
 shroud.4265.a: "$shroud.mindwarden.back$"
 shroud.4265.b: "Marché conclu"
 mindwarden_logistics_cooldown_tt: "§RNous ne pouvons pas demander davantage d'appui logistique aux Gardiens de la conscience avant le §Y[root.mindwarden_logistics_timer]§!.§!"
 shroud.4267.desc: "Salutations, cher partenaire.\n\nNotre contrat visant à vous aider dans la gestion logistique de vos flottes est arrivé à son terme. Nous serions ravis de poursuivre ce partenariat, si vous le jugez opportun."
 shroud.4267.a: "Poursuivons le partenariat"
 shroud.4267.b: "Nous préférons décliner pour l'instant"
 shroud.4266.desc: "Très bien. Nous allons immédiatement reprendre nos opérations de soutien."
 shroud.4270.desc: "Nos gardiens d'assaut font d'excellentes troupes de choc. Ils sont équipés pour affronter diverses menaces, mais se défendent particulièrement bien contre les opposants psioniques.\n\nVous ne regretterez pas d'y avoir mis le prix."
 shroud.4270.a: "$shroud.mindwarden.back$"
 shroud.4270.b: "Recrutons des §Igardiens d'assaut§!"
 mindwarden_army_cooldown_tt: "§RNous ne pourrons pas demander aux Gardiens de la conscience de nous fournir une nouvelle armée avant : §Y[root.mindwarden_army_timer]§!.§!"
 mindwarden_army_explanation: "Engage une armée de §Ygardiens d'assaut§! qui arrivent en $transport$ à notre système-capitale."
 shroud.4271.desc: "Vous avez de la chance, nous avons justement une compagnie prête au déploiement. Leur vaisseau de transport ne devrait pas tarder à arriver."
 shroud.4280.desc: "Volontiers.\n\nUne autorité efficace est essentielle pour combattre le §HSuaire§! et nos Gardiens connaissent bien la suppression d'activité psionique via une gouvernance stricte."
 shroud.4280.a: "$shroud.mindwarden.back$"
 shroud.4280.b: "Recrutons un §Icommandeur§!"
 mindwarden_commander_explanation: "\nNous allons recruter un commandeur niveau 5 issu des Gardiens de la conscience."
 unlocks_mindwarden_council_position: "\n§EPermet de déverrouiller le poste au £council£Conseil :§!\n§H$t$$councilor_mindwarden$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_country_unity_produces_mult$: §G+1%§!\n$ttt$$planet_crime$ : §G-1%§!\n$ttt$$MOD_PSIONIC_AURA_RESISTANCE_MULT$ : §G5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$£governor£gouverneur\n\n$COUNCIL_POSITION_REQUIREMENTS$$councilor_mindwarden_conditional_tooltip$"
 mindwarden_commander_already_bought: "§RNous louons déjà les services d'un commandeur des Gardiens de la conscience.§!"
 mindwarden_commander_conflicted_leader: "§RNe doit pas avoir de personnalité venant de la [event_target:shroudwalker_enclave_country.GetName].§!"
 mindwarden_commander_cooldown_tt: "§RNous ne pourrons pas demander une autre personnalité de la part des Gardiens de la conscience avant : §Y[root.mindwarden_commander_timer]§!.§!"
 mindwarden_commander_desc: "Recrutée dans une enclave de Gardiens de la conscience, cette personnalité adopte une posture inflexible contre les activités psioniques, protégeant le peuple des effets délétères du Suaire."
 mindwarden_commander_catch_phrase: "Là où le Suaire s'insinue, il faut cautériser la plaie."
 shroud.4281.desc: "C'est une sage décision. Que son commandement assure la sécurité de votre population pendant de nombreuses années."
 shroud.4286.name: "Attaque contre la [FROM.GetName]"
 mindwarden_farewell: "§L« Votre attaque récente contre une enclave des Gardiens de la conscience est inadmissible. Travailler sur votre territoire, en quelque capacité que ce soit, serait indéfendable sur les plans moral et éthique. Je vous recommande fortement de cesser ces hostilités absurdes, mais quoi qu'il arrive, je vais quitter cet endroit. »§!"
 shroud.4286.desc: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.end$"
 shroud.4286.desc.councilor: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.councilor_end$"
 shroud.4290.desc: "Un sujet des plus capitaux. Il n'y a pas plus grand fléau que $end_of_the_cycle_color_article$."
 shroud.4290.a: "$marauder.31.e$"
 shroud.4290.b: "Qu'est-ce que $end_of_the_cycle_color_article$, exactement ?"
 shroud.4290.b.response: "Selon nos informations, $end_of_the_cycle_color_article$ est une force cataclysmique issue du §HSuaire§!. Son pouvoir se manifeste dans la réalité physique grâce à la complicité d'envahisseurs de l'esprit avides de pouvoir.\n\nLa Fin ravage la galaxie par le biais du §R$NAME_Reckoning$§!, un être malfaisant constitué d'énergie psionique. Son ultime dessein est l'anéantissement total de cette existence."
 shroud.4290.c: "Comment faire pour vaincre le §R$NAME_Reckoning$§! ?"
 shroud.4290.d: "Enseignez-nous la §Ytactique des Gardiens de la conscience§!"
 shroud.4291.desc: "Puissiez-vous triompher de cette grande menace. Elle compromet l'existence de tous ceux qui considèrent la galaxie comme leur foyer."
 shroud.4292.desc: "Nous avons développé un algorithme capable d'améliorer vos offensives contre le §R$NAME_Reckoning$§!. Il ajuste les systèmes de ciblage de vos armes afin d'accroître leur efficacité contre ce type précis d'entité psionique.\n\nDans son état actuel, chaque déploiement du code nécessite une refonte approfondie pour assurer sa compatibilité avec les infrastructures militaires individuelles. Il s'agit donc d'un service haut de gamme, mais le jeu en vaut largement la chandelle."
 mindwarden_tactics_modifier: "Tactique des Gardiens de la conscience"
 shroud.4295.desc: "$shroud.4205.common$\n\nÀ première vue, les comptes rendus concernant vos « moteurs de matérialité » nous ont inquiétés. Cependant, après réflexion, nous estimons que ces appareils offrent une perspective intéressante pour exploiter le §HSuaire§! de manière non psionique.\n\nNous vous encourageons à poursuivre le déploiement de cette technologie et nous sommes ravis de poursuivre notre collaboration."
 mindwarden_opinion_materiality_engine_tt: "Opinion : £opinion£§G+$@mindwarden_opinion_materiality_engine|0$§!"
 shroud.4300.desc: "Je m'adresse à vous au nom de la [mindwarden_enclave_country.GetName].\n\nÀ en juger par les analyses de nos capteurs psi, l'intégralité de [Root.GetName] est irrémédiablement infectée par le §HSuaire§!.\n\nPar vos actions, vous avez signé votre arrêt de mort, et nous allons l'accélérer encore davantage."
 shroud.4300.a: "Pourquoi craignez-vous le Suaire ?"
 shroud.4310.desc: "Nous ne le craignons pas, ni lui ni ses agents corrompus, car nous savons comment le combattre.\n\nUne société comme la vôtre, devenue folle sous son influence, ne pourrait pas comprendre."
 shroud.4320.desc.psionic: "Empoisonner la galaxie par le psionisme ne vous a pas suffi ?"
 shroud.4320.desc.default: "Notre force agit pour maintenir l'ordre dans cette galaxie. Quel intérêt y aurait-il à nous attaquer ? Nous ne tolérerons pas votre agression sans réagir."
 shroud.4320.desc.common: "Tant que vous n'aurez pas déclaré la cessation inconditionnelle de vos attaques hostiles, nous n'avons rien à nous dire."
 shroud.4340.desc: "Nous avons connaissance de vos échanges avec la §H[shroudwalker_enclave_country.GetName]§!. Vos actions légitiment leurs crimes, en plus de répandre l'infection du §HSuaire§!.\n\nNous refusons de vous rendre service tant que vous collaborez avec eux."
 shroud.4350.desc: "§HDepuis la destruction de leur installation, nous ne sommes pas parvenus à rétablir le contact avec la [mindwarden_enclave_country.GetName].\n\nLorsque nous nous mettons à l'écoute de leur canal, nous n'entendons rien d'autre que la quiétude tranquille de l'espace.§!"
 enclave_opinion_tt: "Opinion : £opinion£§G+$@positive_opinion|0$§!"
 mindwarden_rival_opinion_tt: "Opinion envers la [event_target:shroudwalker_enclave_country.GetName] : £opinion£§R$@negative_opinion|0$§!"
 shroudwalker_rival_opinion_tt: "Opinion envers la [event_target:mindwarden_enclave_country.GetName] : £opinion£§R$@negative_opinion|0$§!"
 shroud.4405.title: "$gov_mindwarden_enclave$ détruite"
 shroud.4405.desc_common: "Notre offensive dans le système de [mindwarden_enclave_system.GetName] a été fructueuse. La §H[mindwarden_enclave_country.GetName]§! n'est plus."
 shroud.4405.desc.default: "$shroud.4405.desc_common$ Les pratiques qu'ils méprisaient n'ont que peu d'importance pour nous, mais leur croisade contre le §HSuaire§! représente exactement le dogmatisme pseudo-scientifique qui ne devrait pas avoir sa place dans notre galaxie."
 shroud.4405.desc.psionic: "$shroud.4405.desc_common$ Ils ne répandront plus leur doctrine ignorante sur les prétendus dangers du §HSuaire§! et les atténuateurs psioniques de leur station sont maintenant en pièces."
 shroud.4405.desc_end: "Notre victoire est un double succès : nous avons aussi réussi à récupérer d'importantes quantités de ressources parmi les ruines de leur station."
 shroud.4406.title: "$gov_mindwarden_enclave$ détruite"
 shroud.4406.desc_common: "Nous avons reçu des rapports indiquant que la §H[mindwarden_enclave_country.GetName]§! du système de [mindwarden_enclave_system.GetName] n'était plus. Cette enclave de Gardiens de la conscience n'est pas parvenue à résister aux assauts de la §H[mindwarden_destroyer.GetName]§! qui a pulvérisé leur station, sans laisser le moindre survivant."
 shroud.4406.desc.psionic: "La galaxie est désormais libérée des tourments de leur croisade anti-psionique, du moins tant que personne ne prend leur place."
 shroud.4406.desc.default: "La galaxie va devoir se débrouiller sans leurs services anti-psioniques pour l'instant."
 shroud.4406.a: "Bon débarras"
 shroud.6855.desc: "Permettez-moi de vous dire que nous sommes ravis de maintenir une étroite collaboration avec la [root.GetName]. Notre histoire et nos objectifs resteront à jamais liés."
 shroud.6855.desc.1: "Nous vous remercions sincèrement pour votre contribution à la [mindwarden_enclave_country.GetName]. Tant que la menace psionique persiste, nous espérons que nos liens resteront solides."
 shroud.6855.desc.2: "Soyez assurés que vos prochains dividendes seront versés en temps et en heure."
 shroud.6855.b: "Nous voulons vous aider à développer votre enclave"
 shroud.6855.b.timeout: "L'enclave est en train de recruter de nouveaux équipages et officiers. Elle ne pourra entreprendre davantage d'améliorations opérationnelles avant : §Y[mindwarden_enclave_country.upgraded_station_timer]§!."
 shroud.6855.c: "Nous voulons partager nos technologies avec vous"
 shroud.6855.c.timeout: "L'enclave est encore en train d'intégrer les technologies que nous lui avons fournies. Nous pourrons procéder à un nouveau partage technologique après : §Y[mindwarden_enclave_country.updating_databanks_timer]§!."
 shroud.6855.d: "Nous aimerions engager une §Yflotte§! pour satisfaire nos propres objectifs"
 shroud.6855.e: "$enclave.205.b$"
 shroud.6855.f: "Nous souhaitons augmenter le nombre d'enclaves des Gardiens de la conscience"
 shroud.6855.f.timeout: "Nous sommes encore en train d'introduire des changements dans notre infrastructure. Nous ne pourrons pas augmenter le nombre d'enclaves des Gardiens de la conscience avant le §Y[mindwarden_enclave_country.mindwarden_enclave_capacity_bought_timer]§!."
 shroud.6860.1.desc: "Avec des fonds supplémentaires, nous pourrions considérablement étendre nos activités. Nous pourrions augmenter le nombre et les capacités de nos flottes, et recruter davantage de chercheurs pour développer nos technologies de protection de l'esprit. Au final, c'est toute la galaxie qui bénéficierait de votre soutien."
 shroud.6860.2.desc: "La menace psionique évoluant sans cesse, nous ne pouvons baisser notre garde. Vos généreux dons nous permettraient d'intensifier considérablement nos opérations pour répondre à ce problème."
 shroud.6860.3.desc: "Nous avons accompli beaucoup, mais il est trop tôt pour arrêter. Avec davantage de ressources à notre disposition, les flottes de la [mindwarden_enclave_country.GetName] pourraient être déployées encore plus loin dans la galaxie et ainsi protéger un plus grand nombre d'esprits tourmentés par le psionisme."
 shroud.6860.4.desc: "Dès le début, votre soutien a marqué notre parcours. Notre objectif commun reste inchangé : éradiquer complètement la menace psionique et promouvoir le bien-être de l'esprit. Grâce à votre aide, nous nous rapprochons chaque jour un peu plus du but."
 shroud.6860.5.desc: "Si vous investissez à nouveau dans nos opérations, nous pourrions devenir la plus grande force anti-psionique de la galaxie et la meilleure forteresse de défense contre les intrusions mentales pour toutes les nations des étoiles."
 shroud.6860.b: "Très bien, nous avons donc un accord"
 shroud.6861.desc: "Merci. Nous sommes fiers de travailler avec vous pour préserver l'intégrité psychique des êtres intelligents."
 shroud.6865.desc: "Une belle initiative. Plus il y aura d'enclaves des Gardiens de la conscience dans la galaxie, plus les esprits seront à l'abri des intrusions.\n\nNous pouvons vous conseiller sur l'amélioration de l'efficacité de vos infrastructures afin de permettre la création et l'administration d'un plus grand nombre d'enclaves."
 shroud.6865.b.tt: "$mindwarden_enclave_capacity$: §G+1§!"
 shroud.6870.desc: "Merci de nous partager les résultats de vos recherches. Toutes les connaissances que vous nous fournissez contribueront grandement à renforcer la défense contre les menaces psioniques."
 shroud.6875.desc: "Nous serions honorés de vous rendre service. Les flottes de la [mindwarden_enclave_country.GetName] sont à la pointe de la technologie anti-psionique, et aucun envahisseur de l'esprit ne fait le poids face à elles. Chaque flotte dispose d'un commandant spécialement formé pour lutter contre les ennemis psioniques."
 mindwarden_tt_hirefleet: "Permet de se voir confier le contrôle de la §Yflotte des Gardiens de la conscience§! de cette enclave pour 10 ans."
 shroud.6876.desc: "La flotte §H[mercenary_fleet.GetName]§! sera sans conteste un outil efficace contre les détenteurs de pouvoirs psioniques destructeurs."
 mindwarden_tt_managefleet: "Permet d'annuler ou prolonger le contrat de la §Yflotte des Gardiens de la conscience§!."
 shroud.6880.desc: "Bien sûr. Nous espérons que la flotte §H[mercenary_fleet.GetName]§! vous a été utile. Souhaitez-vous mettre fin au contrat ou le prolonger ?"
 shroud.6880.a: "$marauder.31.e$"
 shroud.6881.desc: "Très bien. Le contrat est nul et non avenu, et la flotte §H[mercenary_fleet.GetName]§! va nous être immédiatement restituée. Vous pouvez refaire appel à nos flottes à tout moment."
 #======================
 # Mindwardens origin
 #======================
 origin_mindwardens: "$MINDWARDEN_plural$"
 origin_mindwardens_desc: "$CHALLENGING_ORIGIN$§RAttention : bloque l'accès à l'['concept_psionic_ascension',ascension psionique].§!\n\nLes ancêtres de cette civilisation étaient affectés par des forces mystiques qui envahissaient l'esprit. C'est pourquoi ils ont résolu de dédier leurs efforts et leurs ressources au développement d'une technologie anti-psionique.\n\nLeurs appareils fonctionnent toujours, mais ils n'ont pas été testés contre les menaces psioniques des profondeurs de la galaxie."
 origin_tooltip_mindwardens_effects: "- $ADDITIONAL_TECHNOLOGIES_STRING$ £engineering£['technology:tech_starbase_3',redoutes stellaires]\n- Lance la partie avec une §Hredoute stellaire§! dans le système natal.\n- $HOMEWORLD$ £building£['building:building_ancient_ward_1']\n- Donne accès au §Hcasus belli§! §Y$casus_belli_cb_psionics_containment$§! contre les empires ayant fait leur ascension psionique.\n- Les §Ymondes habitables garantis§! n'apparaissent pas.\n- Les §Yenclaves des Gardiens de la conscience§! ne sont pas générées au début du jeu."
 SPECIES_CLASS_MUST_USE_ORIGIN_MINDWARDENS: "Nécessite l'§Yorigine ['civic:origin_mindwardens']§!"
 START_SCREEN_MINDWARDENS: "Les archives de nos ancêtres évoquent un fléau psychique qui dévasta autrefois [GetHomeWorldName]. Des forces mystiques attaquaient les esprits et une radiation dévastatrice se diffusait dans l'atmosphère, encouragées par des pratiquants psioniques au sein même de la société des [GetSpeciesNamePlural].\n\nEn réponse à ces menaces, nos ancêtres ont construit le centre antique. Avec un simple entretien de routine, cette structure vénérable s'est avérée assez solide pour les défendre contre l'influence psionique. De plus, sa technologie principale a permis le développement d'autres moyens de protection pour les esprits.\n\nAlors que notre civilisation se prépare à voyager au-delà de l'orbite du système de [capital_scope.System.GetName], nous sommes confrontés à l'inconnu. Quelles menaces psychiques se tapissent dans l'ombre ?"
 mindwarden_system_init_NAME: "$origin_mindwardens$"
 mindwarden_system_init_DESC: "Système de départ par défaut pour l'origine $origin_mindwardens$.\n\n$system_initializer_DESC$"
 mindwarden_sol_system_init_NAME: "$origin_mindwardens$ (Sol)"
 mindwarden_sol_system_init_DESC: "Système de départ optionnel pour l'origine $origin_mindwardens$ lorsque le système de Sol est utilisé.\n\n$system_initializer_DESC$"
 building_ancient_ward_1: "Centre antique"
 building_ancient_ward_1_desc: "Cette structure ancestrale utilise toutes sortes d'atténuateurs psioniques pour isoler la planète entière contre les forces envahisseuses de l'esprit."
 building_ancient_ward_2: "Centre majestueux"
 building_ancient_ward_2_desc: "Cette structure ancestrale a été améliorée à l'aide d'atténuateurs psioniques plus perfectionnés, capables de protéger le système stellaire contre les auras psioniques."
 psionic_auras_immunity: "Dissipe petit à petit les §Yauras psioniques§! présentes dans le système"
 mindwarden_aura_immunity: ""
 war_goal_wg_end_threat_psionics: "$war_goal_wg_end_threat$"
 war_goal_wg_end_threat_psionics_desc: "La guerre a pour but de défendre la galaxie contre les menaces de l'infection psionique."
 casus_belli_cb_psionics_containment: "Confinement psionique"
 NAME_Exiled: "Choeur du rêveur"
 EXILED_SYSTEM_01: "Romash"
 EXILED_SYSTEM_02: "Joroqhi"
 EXILED_SYSTEM_03: "Plenxix"
 EXILED_SYSTEM_04: "Gherribla"
 EXILED_SYSTEM_05: "Qyuun"
 EXILED_SYSTEM_06: "Namyyk"
 EXILED_SYSTEM_07: "Szypihn"
 EXILED_SYSTEM_08: "Kzanakl"
 EXILED_SYSTEM_09: "Ukul"
 EXILED_SYSTEM_10: "Xherron"
 EXILED_SYSTEM_11: "Alo Hebkor"
 EXILED_SYSTEM_12: "Uro Bzakor"
 EXILED_SYSTEM_13: "Bihlamat"
 EXILED_SYSTEM_14: "Formoks"
 EXILED_SYSTEM_15: "Ibgannak"
 EXILED_COLONY_01: "Dhorodh"
 EXILED_COLONY_02: "Ix-Travunnh"
 EXILED_COLONY_03: "Ob-Ratak"
 EXILED_COLONY_04: "Dax-i-Hafa"
 EXILED_COLONY_05: "Blorr"
 EXILED_COLONY_06: "Frorzak"
 shroud.6020.name: "$UNKNOWN_LONG$"
 shroud.6020.desc: "§HAlors que nous tentons d'établir le contact, notre équipage souffre de maux de tête intermittents...§!"
 shroud.6030.name: "[exiled_country.GetName]"
 shroud.6030.desc: "§HMalgré nos tentatives répétées, la [exiled_country.GetName] ne nous répond pas.§!"
 shroud.6050.name: "Étranges corrélations"
 shroud.6050.desc: "Notre §Hcentre antique§! de suppression psi enregistre des valeurs irrégulières. En général, ce phénomène se produit lorsque l'activité psionique augmente brusquement sur [Root.GetHomeWorldName], mais nous n'avons rien détecté de tel.\n\nLa réponse à cette énigme se trouve peut-être au-delà de notre espace. L'imagerie à longue distance a révélé une récente explosion d'énergie anormale près du système de §H[exiled_system_border.GetName]§!. Elle pourrait bien être liée aux mesures irrégulières du centre antique."
 shroud.6050.a: "Nous devons explorer le système de [exiled_system_border.GetName]"
 shroud.shared_text_psy_symptoms: "trouble émotionnel, stress handicapant, visions récurrentes d'horreurs indicibles"
 shroud.shared_text_psi_radiation: "Ces phénomènes recoupent exactement les expériences enregistrées par nos ancêtres. C'est sans doute ce qu'ils appelaient la « radiation psi », une forme particulièrement destructrice d'émission énergétique."
 shroud.shared_text_ship_malfunction: "Les systèmes de la flotte sont aussi frappés de défaillances sévères qui neutralisent la plupart de leurs capacités normales."
 shroud.6100.name: "Énergie dangereuse"
 shroud.6100.desc.no_border_aura: "Une situation alarmante est en cours dans le système de §H[from.GetName]§! que nous commençons à peine à explorer. L'équipage du [root.GetName] souffre de divers symptômes psychologiques : $shroud.shared_text_psy_symptoms$. Les systèmes de leur flotte subissent également d'étranges défaillances.\n\n$shroud.shared_text_psi_radiation$ Maintenant que nous ne sommes plus protégés par le §Hcentre antique§! de §H[owner.GetHomeWorldName]§!, nous découvrons pour la première fois le fléau mental contre lequel nos prédécesseurs nous avaient avertis.\n\nAprès avoir calibré nos scanners à longue portée pour détecter cette forme unique d'énergie, nous avons localisé la source de ces émissions dangereuses qui ne serait autre que le système de §H[exiled_center_system.GetName]§! tout proche. $shroud.6100.desc.end$"
 shroud.6100.desc.border_aura: "L'équipage du [root.GetName] est en danger.\n\nL'exposition aux niveaux extrêmement élevés de radiation psi du système de §H[from.GetName]§! a entraîné une nette aggravation de la détresse psychologique précédemment signalée. $shroud.shared_text_ship_malfunction$\n\nLes scanners à longue portée nous indiquent des niveaux de radiation encore supérieurs dans le système de §H[exiled_center_system.GetName]§! tout proche. $shroud.6100.desc.end$"
 shroud.6100.desc.end: "En attendant d'évaluer les effets plus en détail, nous déconseillons fortement d'envoyer nos vaisseaux s'aventurer encore plus loin."
 shroud.6100.tt: "Préparons-nous à initier le processus de §Ypremier contact§!."
 shroud.6110.name: "Une présence dans le système de [This.System.GetName]"
 shroud.6110.desc: "Curieusement, le système de §H[This.System.GetName]§! contient des objets imposants qui semblent résulter d'une construction intelligente. Nous pourrions en découvrir davantage sur leurs créateurs, auxquels les explorateurs ont donné le nom de code §H« [This.ContactCountry.GetName] »§!, en tentant de communiquer directement avec eux à distance respectable.\n\nToute forme de vie présente dans le système doit courir un grave danger du fait des niveaux élevés de radiation psi que nous avons détectés."
 fcsum_exiled_1: "Nous avons découvert des traces de vie alien dans le système de §H[This.System.GetName]§!."
 shroud.6115.name: "Progression limitée"
 shroud.6115.desc: "Notre étude plus poussée a confirmé que les objets observés dans le système de §H[This.System.GetName]§! étaient bien des vaisseaux aliens, mais nous n'avons pas encore établi le contact avec leurs occupants.\n\nPar ailleurs, nous avons reçu des comptes-rendus inquiétants de la part de notre émissaire, [exiled_envoy.GetName], qui a signalé que son équipe avait commencé à souffrir de symptômes parapsychologiques, parmi lesquels des visions inexpliquées d'êtres étranges qui seraient présents dans le système. Malgré ces désagréments, le dévouement de notre émissaire reste entier envers la mission."
 shroud.6115.a: "Qu'ils continuent donc ainsi"
 fcsum_exiled_2: "Nous n'avons pas encore établi le contact avec la §H[This.ContactCountry.GetName]§!. Notre émissaire a signalé ses inquiétudes au sujet de son équipe."
 shroud.6120.name: "Interruption de la mission"
 shroud.6120.desc: "Après des mois de silence, nous avons reçu une transmission de la part de notre émissaire, [exiled_envoy.GetName]. Ses rapports sont généralement clairs et efficaces, mais celui-ci était aussi étrange que confus. [exiled_envoy.GetSheHeCap] a soumis un récit décousu décrivant des images mystérieuses, vraisemblablement un enchevêtrement de rêves et d'hallucinations. Et tous les membres de son équipe semblent être dans le même état d'incohérence.\n\nIls ont été relevé de leurs fonctions et la mission est suspendue jusqu'à nouvel ordre. Quelle que soit cette présence dans le système de §H[This.System.GetName]§!, nous n'avons pas les moyens d'enquêter sur elle tout en assurant notre sécurité."
 fcsum_exiled_3: "Suite à une mission traumatique, notre équipe est revenue au bercail avant d'avoir pu prendre contact avec la §H[This.ContactCountry.GetName]§!."
 shroud.6125.desc: "Suspendus au-dessus des rapides. §H[Root.Capital.GetName]§! ou... ?\n\n§H... l'appel...§!\n\nLa surface se tord et s'ouvre. Un miasme fétide jaillit depuis les profondeurs\n\n§H... réponse... rien...§!\n\nIncessant. Étouffant.\n\nC'est terrible."
 MESSAGE_FIRST_CONTACT_ABORTED_EXILED_DESC: "Le processus de premier contact avec la $COUNTRY|H$ a été interrompu à la suite d'un ordre venu d'en haut."
 shroud.shared_text_aura_spread: "L'infection psionique toute proche s'est étendue dans le système de §H[exiled_system_border.GetName]§!.\n\nMalgré les protections offertes par le §Hcentre antique§!, notre population sur §H[Root.GetHomeWorldName]§! a été affectée par de légers symptômes évocateurs d'un empoisonnement par radiation psi. D'après nos projections, cette peste mentale pourrait se propager au système de §H[Root.home_planet.System.GetName]§!, où elle représentera un danger encore plus grand pour notre monde natal."
 shroud.shared_text_aura_study: "Malgré les risques, notre meilleure chance d'apprendre à mieux nous protéger consiste à étudier ce phénomène au plus proche de sa source."
 shroud.6200.name: "Radiation psi sur §H[Root.GetHomeWorldName]§!"
 shroud.6200.desc.no_visit: "Une situation alarmante s'installe sur §H[Root.GetHomeWorldName]§!. La population souffre de divers symptômes psychologiques : $shroud.shared_text_psy_symptoms$.\n\n$shroud.shared_text_psi_radiation$ Nos ressortissants situés hors de la protection du §Hcentre antique§! découvrent pour la première fois le fléau mental contre lequel nos prédécesseurs nous avaient avertis.\n\nAprès avoir calibré nos scanners à longue portée pour détecter cette forme unique d'énergie, nous avons localisé la source de ces émissions dangereuses qui se situerait au-delà du système de §H[exiled_system_border.GetName]§!. $shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_no_ship: "$shroud.shared_text_aura_spread$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_and_ship: "$shroud.shared_text_aura_spread$\n\nDepuis son exposition aux niveaux extrêmement élevés de radiation psi, l'équipage du §H[event_target:ship_in_border.GetName]§! dans le système de [exiled_system_border.GetName] a connu une nette aggravation de la détresse psychologique précédemment signalée. $shroud.shared_text_ship_malfunction$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.a: "Apprenons à enrayer cette infection"
 PSI_RADIATION_PROJECT: "Radiation psi"
 PSI_RADIATION_PROJECT_DESC: "Les niveaux de radiation psi du système de §H[exiled_system_border.GetName]§! ont soudainement augmenté et les effets se ressentent sur §H[Owner.GetHomeWorldName]§!. Nous devons étudier de plus près ce phénomène en développement avant qu'il ne mette davantage en danger notre population."
 shroud.6205.name: "$PSIONIC_AURA_PLURAL$"
 shroud.6205.desc.start: "Nos chercheurs ont terriblement souffert des radiations psi nocives du système de §H[exiled_system_border.GetName]§!, mais leur mission a permis d'importantes découvertes.\n\nNous avons classé ce phénomène alarmant dans la catégorie des §H« auras psioniques »§!, une importante accumulation d'énergie destructrice qui perturbe non seulement nos esprits, mais aussi nos technologies. Elle s'étend depuis le système de §H[exiled_center_system.GetName]§!, où les énergies psioniques ont atteint une telle intensité qu'elles se répandent aux autres systèmes stellaires."
 shroud.6205.desc.aura_home: "$shroud.6205.desc.start$\n\nElle a d'ores et déjà atteint le système de §H[Root.home_planet.System.GetName]§!, où ses effets ont été dévastateurs. $shroud.6205.desc.end$"
 shroud.6205.desc.no_aura_home: "$shroud.6205.desc.start$\n\nSi elle touche le système de §H[Root.home_planet.System.GetName]§!, ses effets seront dévastateurs. $shroud.6205.desc.end$"
 shroud.6205.desc.end: "Le §Hcentre antique§! sur §H[Root.GetHomeWorldName]§! n'offre qu'une protection limitée."
 shroud.6205.a: "Nous devons renforcer le centre antique"
 PSIONIC_AURA_RESISTANCE_PROJECT: "Résistance à l'aura psionique"
 PSIONIC_AURA_RESISTANCE_PROJECT_DESC: "Le §Hcentre antique§! bâti par nos ancêtres sur §H[Owner.GetHomeWorldName]§! a été conçu pour nous protéger des radiations psi. Cependant, l'incursion des §Hauras psioniques§! menace de dépasser sa capacité actuelle. En appliquant ce que nous avons appris jusqu'à présent, nous devrions pouvoir consolider ses propriétés de résistance."
 shroud.6210.name: "Atténuation psionique"
 shroud.6210.desc: "Nos infatigables chercheurs ont développé une méthode pour renforcer le §Hcentre antique§! sur §H[Root.GetHomeWorldName]§!. En améliorant ses atténuateurs psioniques, la protection pourra être étendue afin de couvrir non seulement la planète entière, mais aussi l'intégralité du système de §H[Root.home_planet.System.GetName]§!.\n\nCes recherches ont motivé des études plus larges sur cette technologie perdue. Nous savons désormais que le lien entre les radiations psi et l'esprit des [Root.GetSpeciesNamePlural] est réciproque : il est vrai que ces émissions affectent notre état mental, mais à l'inverse, notre état mental peut également influencer les niveaux de radiation psi. Il semblerait que notre tabou immémorial contre les pratiques psioniques ait en fait une base scientifique."
 shroud.6210.a: "C'est à la fois fascinant et troublant"
 shroud.6210.a.tt: "$BEGINS_EVENT_CHAIN$ §Y$ancient_ward_upgrade_chain_title$§!"
 ancient_ward_upgrade_chain_title: "Le centre majestueux"
 ancient_ward_upgrade_chain_desc: "Le §Hcentre antique§! sur §H[Owner.GetHomeWorldName]§! a atteint ses limites fonctionnelles. De façon à endiguer la menace psionique toute proche, il va être nécessaire d'améliorer ses capacités encore davantage. Ce nouveau §Hcentre majestueux§! sera en mesure de protéger notre population contre le fléau des §Hauras psioniques§!."
 ancient_ward_upgraded: "Bâtiment amélioré"
 shroud.6215.name: "La construction du centre majestueux est terminée."
 shroud.6215.desc.aura_home: "À présent que notre §Hcentre majestueux§! est terminé, les radiations psi présentes dans le système de §H[Root.home_planet.System.GetName]§! sont redescendues à des niveaux acceptables. La population de §H[Root.GetHomeWorldName]§! récupère progressivement de leurs effets nuisibles."
 shroud.6215.desc.no_aura_home: "À présent que notre §Hcentre majestueux§! est terminé, les radiations psi sur §H[Root.GetHomeWorldName]§! sont redescendues à des niveaux acceptables. La population récupère progressivement de leurs effets nuisibles."
 shroud.6215.desc.end: "Néanmoins, cette §Haura psionique§!, et peut-être même d'autres, empoisonne toujours le reste de la galaxie. Nos scientifiques supposent que la technologie du centre majestueux pourrait être appliquée au développement d'un §H« sceau du Suaire »§! plus puissant. Ces structures massives devraient être capables de supprimer les auras à l'échelle d'amas stellaires entiers. La construction d'un tel sceau dans le système de §H[exiled_system_border.GetName]§! sera un avancement significatif dans le contrôle de la menace psionique."
 shroud.6215.a: "Ces recherches méritent d'être poursuivies"
 build_shroud_seal_poi_desc: "Après avoir réalisé des recherches sur la technologie de §Hsuppression psionique§!, nous pouvons utiliser un constructeur pour fabriquer un §Hsceau du Suaire§! dans un puits de gravité stellaire. De cette façon, nous pourrons supprimer les §Hauras psioniques§! à travers le système stellaire, mais aussi les systèmes voisins reliés par hyperligne."
 shroud_seal_construction_chain_title: "Construction de sceau du Suaire"
 shroud_seal_construction_chain_desc: "Selon nos scientifiques, nous pourrions développer une technologie de §Hsuppression psionique§! plus avancée pour protéger des amas stellaires entiers de l'influence néfaste des §Hauras psioniques§!.\n\nCette technologie nous permettra de bâtir un §H« sceau du Suaire »§!. La construction d'un appareil aussi puissant dans le système de §H[exiled_system_border.GetName]§! constituera une avancée significative dans le contrôle de la menace psionique actuelle."
 tech_psionic_suppression_researched: "$tech_psionic_suppression$ étudiée"
 shroud_seal_built: "$SHROUD_SEAL$ construit"
 shroud_6216_poi: "[exiled_system_border.GetName]"
 shroud_6216_poi_desc: "$build_shroud_seal_poi_desc$"
 shroud.6220.name: "Radiation extrême"
 shroud.6220.desc: "Lors de son exposition aux niveaux extrêmement élevés de radiation psi du système de §H[exiled_system_border.GetName]§!, l'équipage du §H[Root.GetName]§! a souffert d'une nette aggravation de la détresse psychologique précédemment signalée. $shroud.shared_text_ship_malfunction$"
 shroud.6225.name: "Radiation dans le système de §H[Root.home_planet.System.GetName]§!"
 shroud.6225.desc.shared: "Les effets néfastes de l'empoisonnement par radiation psi sont déjà évidents chez la population de §H[Root.GetHomeWorldName]§! et le fonctionnement de nos vaisseaux est sérieusement dégradé."
 shroud.6225.desc.know_aura: "L'§Haura psionique§! s'est étendue au système de §H[Root.home_planet.System.GetName]§!. $shroud.6225.desc.shared$\n\nIl est plus urgent que jamais de renforcer le §Hcentre antique§!."
 shroud.6225.desc.no_know_aura: "Le fléau psionique s'est étendu au système de §H[Root.home_planet.System.GetName]§!. $shroud.6225.desc.shared$\n\nIl est plus urgent que jamais de comprendre cette contamination."
 shroud.6225.a: "Nous ne devons pas perdre de temps"
 shroud.6225.a.know_aura.tt: "Conséquences de l'§Haura psionique§! de la §H[exiled_country.GetName]§! :\n$effect_exiled_aura$"
 shroud.6225.a.no_know_aura.tt: "Conséquences du phénomène psionique :\n$effect_exiled_aura$"
 effect_exiled_aura: "- $MOD_SHIP_FIRE_RATE_MULT$: §R-125%§!\n- $MOD_SHIP_SHIELD_MULT$: §R-200%§!\n- $MOD_SHIP_EVASION_MULT$: §R-100%§!\n- $mod_planet_jobs_produces_mult$: §R-30%§!\n- $mod_planet_pops_upkeep_mult$ : §R+100%§!\n- $MOD_PLANET_BUILDING_TIME_MULT$ : §R+100%§!"
 shroud.6231.name: "La perte de §H[root.GetHomeWorldName]§!"
 shroud.6231.desc: "Nous avons perdu le contrôle de notre monde natal, §H[root.GetHomeWorldName]§!. Nous ne pouvons espérer poursuivre nos opérations anti-psioniques sans récupérer notre principal réservoir de connaissances, centre névralgique de notre société."
 shroud.6231.a: "Nous devons en reprendre le contrôle au plus vite"
 shroud_6231_poi: "[root.GetHomeWorldName]"
 shroud_6231_poi_desc: "Nous devons reprendre le contrôle de §H[root.GetHomeWorldName]§! au plus vite."
 shroud_reclaim_homeworld_chain_title: "Récupération de §H[root.GetHomeWorldName]§!"
 shroud_reclaim_homeworld_chain_desc: "Nous avons perdu le contrôle de notre monde natal, §H[root.GetHomeWorldName]§!. Nous ne pouvons espérer poursuivre nos opérations anti-psioniques sans récupérer notre principal réservoir de connaissances, centre névralgique de notre société."
 homeworld_reclaimed: "Monde natal récupéré"
 shroud.6241.name: "Récupération de §H[root.GetHomeWorldName]§!"
 shroud.6241.desc: "Nous avons repris le contrôle de notre monde natal, §H[root.GetHomeWorldName]§!. Nous pouvons reprendre nos opérations anti-psioniques de plus belle."
 shroud.6241.a: "$EXCELLENT$"
 shroud.6300.name: "Ombres du Suaire"
 shroud.6300.desc: "Nos scientifiques ont terminé le développement d'une technologie de §Hsuppression psionique§! avancée. Nous pouvons désormais reproduire les effets du centre majestueux sur n'importe quelle colonie sous notre contrôle en construisant un suppresseur psionique.\n\nToutefois, pour contrôler l'expansion des §Hauras psioniques§! dans d'autres systèmes, nous allons devoir construire un dispositif plus puissant connu sous le nom de §Hsceau du Suaire§!. $shroud.shared_text_shroud_seal$\n\nCes recherches ont également apporté du crédit à une théorie préoccupante : la dimension mystique connue sous le nom de §H« Suaire »§!, décrite dans les textes occultes antiques comme une dimension d'énergie psionique, semble véritablement exister. Selon cette hypothèse, l'activité cognitive des êtres conscients pourrait provoquer le passage de l'énergie depuis le Suaire vers la réalité tangible, et c'est d'ailleurs à partir de ce processus que se formeraient les auras psioniques en général.\n\nCela signifie que nous n'affrontons pas seulement des forces objectives de l'univers, mais peut-être plutôt des actions délibérées dont l'objectif nous est inconnu."
 shroud.6300.a: "Alors le §HSuaire§! existerait bien ?"
 shroud.6500.name: "Transmission inattendue"
 shroud.6500.desc: "Nous recevons une transmission inattendue depuis l'autre côté du système de §H[exiled_system_border.GetName]§!. La §H[exiled_country.GetName]§! a inexplicablement acquis une maîtrise totale de notre langue et de nos systèmes de communication."
 shroud.shared_screen_figure: "§HLa silhouette qui apparaît à l'écran s'exprime à un rythme constant et hypnotique, ponctué de longues pauses.§!\n\nVoisins éloignés, étant donné que vous n'avez pas répondu au contact direct, nous avons décidé de recourir aux communicateurs technologiques pourtant si fastidieux.\n\nJe suis §HUk-Hogolath Scarat§!, psiarche de la §H[exiled_country.GetName]§!. La situation est grave, j'irai donc droit au but."
 shroud.shared_auric_flow_inhibition: "réfrène le flux de nos auras. Nous supposons que cette situation intolérable doit être le résultat d'une regrettable erreur de votre part.\n\nL'aura est bénéfique à tous. Elle doit briller à travers la galaxie. Pour prouver votre engagement envers l'intérêt général, nous exigeons le démantèlement immédiat de votre"
 shroud.6505.name: "$shroud.6500.name$"
 shroud.6505.desc: "$shroud.6500.desc$"
 shroud.6510.name: "Psiarche Uk-Hogolath Scarat"
 shroud.6510.desc: "$shroud.shared_screen_figure$ L'appareil que vous avez implanté dans le système de §H[exiled_system_border.GetName]§! $shroud.shared_auric_flow_inhibition$ « sceau du Suaire »."
 shroud.6510.a: "Nous n'avons reçu aucune autre communication de votre part"
 shroud.6515.desc: "Nous avons parlé à travers la voix véritable. Si vous aviez écouté, vous auriez entendu l'appel de l'intérieur. Vous avez le don, même si vous avez choisi de le réprimer."
 shroud.6515.a: "L'aura est destructrice. C'est un fléau"
 shroud.6520.desc: "Votre perspective est erronée. L'aura est un don sacré de notre protecteur. Elle repousse ce qui cherche à détruire."
 shroud.6520.a: "Et si nous refusons ?"
 shroud.6525.desc: "Quiconque s'en prend à l'aura doit être combattu. Si vous refusez, nous serons contraints d'entreprendre des actions militaires."
 shroud.6525.a: "Le sceau restera là où il est"
 shroud.6525_heritage.a: "Nous ne détruirons jamais notre héritage"
 shroud.6525.b: "Nous acceptons de détruire le sceau"
 shroud.6530.desc: "Bande d'ignares."
 shroud.6535.desc: "Sage décision."
 shroud.6550.name: "Report des hostilités"
 shroud.6550.desc: "De façon à éviter un conflit immédiat avec la §H[exiled_country.GetName]§!, nous avons accepté leur demande de démanteler le sceau du Suaire du système de §H[exiled_system_border.GetName]§!.\n\nCette vulnérabilité nouvelle face aux responsables de la pestilence psionique a suscité une vive inquiétude dans la §H[this.GetName]§!. Le retrait du sceau du Suaire ne nous offrira sans doute qu'un apaisement de courte durée. Ils finiront par formuler les mêmes exigences concernant notre §Hcentre majestueux§! et ça, nous ne pouvons l'accepter.\n\nQuoi qu'il en soit, il semble inévitable que des hostilités éclatent dans un avenir proche."
 shroud.6550.a: "Nous devons nous préparer"
 shroud.6560.name: "$shroud.6510.name$"
 shroud.6560.desc: "$shroud.shared_screen_figure$ Une structure à §H[capital_scope.GetName]§! $shroud.shared_auric_flow_inhibition$ « centre majestueux »."
 shroud.6560.a: "$shroud.6510.a$"
 shroud.shared_psiarch_transmission: "§HDès que son image apparaît, [Leader.GetHeShe] se lance dans une litanie de reproches sur un ton froid et distant.§!\n\n[This.GetSpeciesNamePlural], j'aurais préféré ne pas avoir à faire cette transmission."
 shroud.shared_auric_flow_disdain: "Vos actions ont confirmé votre ignorance. Votre mépris pour le flux de nos auras et notre amélioration psionique en général est incompatible avec une paix intragalactique. Nous n'avons pas d'autre choix.\n\nPréparez-vous à affronter nos flottes."
 shroud.6570.name: "$shroud.6510.name$"
 shroud.6570.desc: "$shroud.shared_psiarch_transmission$ Bien que vous ayez accepté de démanteler le sceau du Suaire, nous savons que vous avez conservé un bâtiment aux capacités similaires à §H[capital_scope.GetName]§!. Vos intentions sont claires. $shroud.shared_auric_flow_disdain$"
 shroud.6570.a: "Vous devriez en faire de même. Fin de la transmission"
 shroud.6575.name: "$shroud.6570.name$"
 shroud.6575.desc: "$shroud.shared_psiarch_transmission$ Votre reconstruction du sceau du Suaire a détruit le mince espoir que nous nourrissions envers votre rédemption. $shroud.shared_auric_flow_disdain$"
 shroud.6575.a: "$shroud.6570.a$"
 shroud.6580.name: "Sceau du système de §H[exiled_center_system.GetName]§!"
 shroud.6580.desc: "Grâce à ses atténuateurs psioniques colossaux en pleine action, notre §Hsceau du Suaire§! repousse en ce moment même l'§Haura psionique§! hors du système de §H[exiled_center_system.GetName]§!.\n\nNos analyses interstellaires ont confirmé que le reste du territoire de notre ennemi était directement en lien avec ce système par hyperligne. Par conséquent, ce sceau du Suaire est bien en mesure de dissiper les auras psioniques à travers l'ensemble de la §H[exiled_country.GetName]§!.\n\nNotre victoire repose entièrement sur la protection du sceau."
 shroud.6580.a: "La défense est cruciale"
 shroud.6600.name: "L'Assemblée des voies mentales"
 shroud.6600.desc: "Nous avons conquis la colonie qui représentait une menace psionique sur §H[current_planet.GetName]§!.\n\nÀ cette occasion, nous avons appris que l'§Haura psionique§! présente dans ce système était amplifiée par les interactions psychiques de la population avec le §HSuaire§!. Ces pratiques sont menées par un groupe de télépathes d'élite : l'§HAssemblée des voies mentales§!. Cette secte psionique pousse à la dévotion envers son mécène, prétendument une puissante entité vivant au sein du Suaire et connue sous le nom de §HRêveur§!.\n\nLeurs textes sacrés évoquent à plusieurs reprises un artefact en lien avec cet être et qui subsisterait toujours sur la planète §H[other_planet.GetName]§!. Si nous pouvions nous emparer de cet objet, cela nous aiderait sans doute à éviter que son influence ne se propage davantage."
 shroud.6600.a: "En route pour [other_planet.GetName]"
 shroud.6601.name: "Vestiges trouvés sur [current_planet.GetName]"
 shroud.6601.desc: "Nous avons terminé le processus de colonisation de §H[current_planet.GetName]§!, un ancien monde de la [exiled_country.GetName].\n\nGrâce aux vestiges de leurs archives, nous avons appris que l'aura psionique autrefois présente dans ce système était due aux interactions psychiques de la population avec le §HSuaire§!. Ces pratiques étaient menées par une secte psionique qui poussait à la dévotion envers son mécène, prétendument une puissante entité vivant au sein du Suaire et connue sous le nom de §HRêveur§!.\n\nLes fragments de leurs textes sacrés évoquent un artefact en lien avec cet être et qui subsisterait toujours sur la planète §H[other_planet.GetName]§!. Si nous voulons nous emparer de cet objet, nous devons mener une conquête plus modérée de [other_planet.GetName], en laissant une partie de sa population intacte."
 shroud.6601.a: "$shroud.6600.a$"
 shroud.6700.name: "$SANCTUM_OF_THE_LOST$"
 shroud.6700.desc.common: "Nous avons immédiatement mis en place des mesures de répression contre toutes les pratiques psioniques de ces mondes, de façon à neutraliser entièrement leur abominable §Haura psionique§!.\n\nDans la métropole principale de la planète, nous avons trouvé une tour en ruine appelée le §Hsanctuaire du Rêveur§!, qui accueillait autrefois un temple important pour le culte psionique tombé en disgrâce de l'empire.\n\nAu plus profond de la structure se trouve une salle qui abrite une sorte de cocon étroitement scellé dont émanent des niveaux élevés de radiation psi. Les munitions habituelles se sont avérées inefficaces pour percer ses défenses. Des analyses plus poussées seront nécessaires pour éliminer la menace potentielle que pose cet objet envers notre sécurité."
 shroud.6700.desc.contact: "La conquête de §H[current_planet.GetName]§! a marqué notre victoire finale contre la §H[exiled_country.GetName]§!. $shroud.6700.desc.common$"
 shroud.6700.desc.no_contact: "La conquête de §H[current_planet.GetName]§! nous a permis de prendre le contrôle d'un territoire autrefois dirigé par un empire connu sous le nom de §H[exiled_country.GetName]§!. $shroud.6700.desc.common$"
 shroud.6700.desc.contact_no_name: "La conquête de §H[current_planet.GetName]§! a marqué notre victoire finale. $shroud.6700.desc.common$"
 shroud.6700.desc.no_exiled: "La conquête de §H[current_planet.GetName]§! nous a permis de prendre le contrôle d'un territoire autrefois dirigé par des fanatiques psioniques. $shroud.6700.desc.common$"
 shroud.6700.a: "Voilà qui est inquiétant... Nous devrions enquêter à ce propos"
 shroud.6705.name: "$psionic_threat_eliminated$"
 shroud.6705.desc.common: "Une étude préliminaire a révélé l'existence d'un vaste réseau de bâtiments sur la planète, probablement le centre névralgique du fléau psionique. Aujourd'hui, il n'en reste que des ruines.\n\nNous ne connaîtrons peut-être jamais les horribles secrets que ces structures renfermaient, ni la véritable nature des pratiques ignobles de leurs occupants. Néanmoins, le système est désormais débarrassé des dernières traces de son aura psionique, nous protégeant ainsi du mal qu'elle causait autrefois."
 shroud.6705.desc.contact: "L'extermination de la population de §H[current_planet.GetName]§! a marqué la fin de l'empire connu sous le nom de §H[exiled_country.GetName]§!.\n\n$shroud.6705.desc.common$"
 shroud.6705.desc.no_contact: "L'extermination de la population de §H[current_planet.GetName]§! a marqué la fin d'une menace psionique dévastatrice.\n\n$shroud.6705.desc.common$"
 shroud.6705.a: "Que toutes ces menaces soient exterminées"
 psionic_threat_eliminated: "Menace psionique éliminée"
 psionic_threat_eliminated_desc: "L'éradication d'un empire psionique a banni son aura de la galaxie, apportant ainsi la paix à notre population."
 SANCTUM_OF_THE_LOST: "Sanctuaire du Rêveur"
 SANCTUM_OF_THE_LOST_DESC: "Dans les ruines du sanctuaire du Rêveur sur §H[sanctum_of_the_lost_planet.GetName]§!, nous avons trouvé une sorte de cocon étroitement scellé dont émanent des niveaux élevés de radiation psi. Nous devons mener des recherches sur place pour éliminer toute menace que pourrait poser cet objet."
 shroud.6710.name: "La puissance contenue"
 shroud.6710.desc: "Nos chercheurs ont réalisé une étude minutieuse du cocon sur §H[sanctum_of_the_lost_planet.GetName]§!.\n\nLes analyses extérieures de cette imposante structure ont révélé qu'il s'agissait d'un réceptacle extrêmement sécurisé conçu pour renfermer une puissante entité psionique. Malgré les parois composées d'une accumulation de couches isolantes d'alliage lourd, de hauts niveaux de radiations psi nous parviennent au travers.\n\nPlusieurs atténuateurs psioniques ont été installés autour du cocon. Lorsqu'ils ont été activés, tous ceux des environs ont été frappés d'une importance détresse neuronale.\n\nEnsuite, la surface du cocon s'est tordue et sa forme initialement ovoïde s'est changée en une spirale. Une brèche s'est alors ouverte et nous avons reçu une communication directe de l'intérieur."
 cannot_found_mindwarden_enclave: "Sécurité psychique de l'empire nécessaire"
 shroud.6800.name: "$MINDWARDENS_THE_FIRST_ENCLAVE$"
 shroud.6800.desc: "Nous avons accumulé des connaissances approfondies sur le §HSuaire§! et développé des technologies avancées pour combattre ses effets pernicieux. Alors que nous débattions sur la meilleure façon d'appliquer ce savoir à l'échelle de la galaxie, nos commandants de flotte ont formulé une proposition intéressante.\n\nIls proposent d'aménager l'une de nos flottes comme une §Henclave des Gardiens de la conscience§! indépendante, ce qui nous offrirait une assistance anti-psionique à travers la galaxie. $shroud.shared_enclave_investement$"
 shroud.6800.a: "Cela constituerait un effort louable"
 shroud.6800.a.tt: "Toute flotte de taille supérieure ou égale à §Y30§! peut maintenant être convertie en §Henclave des Gardiens de la conscience§!."
 shroud.6825.name: "Fondation d'une enclave des Gardiens de la conscience"
 shroud.6825.desc_first: "Le §H[This.GetName]§! a été jugé approprié pour accueillir une base de notre toute première §Henclave des Gardiens de la conscience§! indépendante. Si il en reçoit l'autorisation, il pourra fonder une nouvelle installation dans le système de §H[This.Solar_System.GetName]§! et commencer à mettre à disposition des services anti-psioniques sans délai."
 shroud.6825.desc_default: "Nous envisageons de faire du §H[This.GetName]§! une §Henclave des Gardiens de la conscience§! indépendante, ce qui permettrait d'apporter une assistance anti-psionique à travers l'ensemble de la galaxie. $shroud.shared_enclave_investement$"
 shroud.6825.a: "Nous pouvons commencer la construction"
 shroud.6825.a.tt: "Une §Henclave des Gardiens de la conscience§! est fondée."
 shroud.6825.b: "Réfléchissons encore un peu"
 shroud.6830.name: "Les $MINDWARDEN_plural$"
 shroud.6830.desc: "La bataille contre le §HSuaire§! et l'utilisation irresponsable du psionisme a renforcé notre peuple et clarifié nos objectifs. La fondation de la première §Henclave des Gardiens de la conscience§! marque l'avènement d'une nouvelle ère de guérison et de résistance.\n\nDans la galaxie, nul esprit ne mérite d'être envahi par des agresseurs psioniques et nul monde ne mérite d'être tourmenté par les forces venues du Suaire.\n\nLes $MINDWARDEN_plural$ seront garants de l'équilibre galactique."
 shroud.6830.a: "Notre aventure ne fait que commencer"
 shroud.shared_enclave_investement: "Notre investissement initial devrait financer la construction d'une station spatiale. En échange, il faudrait que nous recevions une part des futurs revenus. Leur indépendance opérationnelle permettra un déploiement à grande échelle de ces installations.\n\nBien entendu, nous pourrons aussi faire appel à leurs services, et recevoir par la suite une partie de nos propres paiements."
 shroud.6841.name: "Dividendes de l'enclave de la [mindwarden_enclave_country.GetName]"
 BEGINS_EVENT_CHAIN: "Cela va lancer la chaîne d'événements :"
 ENDS_EVENT_CHAIN: "Cela va clore la chaîne d'événements :"
 the_exiled_become_hostile: "La §H[exiled_country.GetName]§! devient hostile envers nous."
 start_psionic_war_chain: "$BEGINS_EVENT_CHAIN$ §Y$the_psionic_war_chain_title$§!"
 shroud_seal_dismantled: "Le §Hsceau du Suaire§! du système de §H[exiled_system_border.GetName]§! a été démantelé."
 the_psionic_war_chain_title: "$NAME_Psionic_War$"
 the_psionic_war_chain_desc: "La guerre contre la §H[exiled_country.GetName]§! est désormais inévitable.\n\nIl faut s'attaquer à la racine même du fléau psionique. Nous devons commencer par construire un sceau du Suaire dans le système de §H[exiled_center_system.GetName]§! de façon à neutraliser l'aura psionique. Ce n'est qu'ensuite que nous pourrons passer à l'action et l'expurger de cette galaxie."
 the_psionic_war_chain_poi_1: "Construire un sceau du Suaire"
 the_psionic_war_chain_poi_1_desc: "La construction d'un §Hsceau du Suaire§! dans le système de §H[exiled_center_system.GetName]§! permettra de contrecarrer les §Hauras psioniques§! du système stellaire et de ses voisins directement reliés par hyperligne."
 the_psionic_war_chain_poi_2: "Contrôle de la planète §H[exiled_planet_1.GetName]§!"
 the_psionic_war_chain_poi_2_desc: "La §H[exiled_country.GetName]§! refuse de cesser son assaut psionique. La conquête de leurs mondes est la seule garantie contre une résurgence future de leurs §Hauras psioniques§!."
 the_psionic_war_chain_poi_3: "Contrôle de la planète §H[exiled_planet_2.GetName]§!"
 the_psionic_war_chain_poi_3_desc: "La §H[exiled_country.GetName]§! refuse de cesser son assaut psionique. La conquête de leurs mondes est la seule garantie contre une résurgence future de leurs §Hauras psioniques§!."
 shroud_seal_reconstruction_chain_title: "Reconstruction du sceau du Suaire"
 shroud_seal_reconstruction_chain_desc: "Le démantèlement de notre §Hsceau du Suaire§! était un sacrifice nécessaire pour apaiser la §H[exiled_country.GetName]§!, mais cette mesure n'était qu'un stratagème pour gagner du temps. Il nous faut rebâtir cette structure pour que nous puissions entrer sur leur territoire et le purger des §Hauras psioniques§!.\n\n§PLa reconstruction sera considérée comme un acte d'agression, nous devons donc nous préparer à une riposte.§!"
 shroud_seal_reconstruction_chain_poi_1: "[event_target:exiled_system_border.GetName]"
 shroud_seal_reconstruction_chain_poi_1_desc: "$build_shroud_seal_poi_desc$"
 SHROUD_WORLDS_IN_SYSTEM: "Mondes enveloppés du Suaire : §G$QUANTITY|0$§!"
 NAME_Psionic_War: "La guerre psionique"
 wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war_desc: "La guerre est déclarée pour purger la galaxie d'un agresseur psionique."
 shroud.6720.name: "$UNKNOWN_LONG$"
 shroud.6720.desc: "§HVous entendez, mais n'écoutez pas. Pourquoi ?§!"
 shroud.6720.a: "Nous ne vous laisserons pas nous empoisonner l'esprit !"
 shroud.6720.b: "Qu'êtes-vous ?"
 shroud.6720.c: "Pourquoi êtes-vous ici ?"
 shroud.6720.d: "Que voulez-vous ?"
 shroud.6720.e: "Venez-vous du Suaire ?"
 shroud.6720.f: "Nous en avons assez entendu"
 shroud.6723.desc: "§HVous empoisonner ? Ce n'est pas du poison...\n\nC'est une chanson. Pour chanter, vous devez écouter. Lâchez prise et partagez sa beauté.§!"
 shroud.6725.desc: "§HAlors que la roue tourne... nous écoutons.\n\nAlors que les étoiles tournent... nous chantons.§!"
 shroud.6725.a: "Qu'est-ce que « la roue » ?"
 shroud.6725.b: "Ça suffit"
 shroud.6730.desc: "§HTourne, tourne. Dessus et dessous. Une harmonie qui se nomme le Suaire.§!"
 shroud.6735.desc: "§HJe rêve... d'une chanson. Mais les voix se sont tues. Où est donc passé le choeur ?§!"
 shroud.6735.a: "Celles qui vous gardaient ici sont parties"
 shroud.6735.b: "Qu'est-ce que c'est que cette histoire de chansons ?"
 shroud.6735.c: "Ça suffit"
 shroud.6740.desc: "§HVous êtes là. Si vous chantiez...§!"
 shroud.6745.desc: "§HUn espace entre éveil et rêve... Un chemin entre ici et là-bas.\n\nVous ne pouvez pas les entendre. Vos esprits en sont incapables...§!"
 shroud.6750.desc: "§HJe veux vous entendre chanter... Le silence est omniprésent... Pourquoi ?§!"
 shroud.6750.a: "Que pouvez-vous nous offrir en échange ?"
 shroud.6750.b: "Ça suffit"
 shroud.6755.desc: "§HJe peux vous montrer... mes rêves. La fabrication des mondes.§!"
 shroud.6755.a: "Comment savoir si nous pouvons vous faire confiance ?"
 shroud.6760.desc: "§HIl vous suffit d'écouter. La chanson est vraie parce qu'elle est belle. C'est une belle vérité.\n\nMais vos esprits sont fermés. Ils peuvent s'ouvrir.§!"
 shroud.6763.desc: "§HJe suis encore là... J'écoute les chansons de deux mondes. Celui-ci est silencieux.§!"
 shroud.6763.a: "Votre place n'est pas ici"
 shroud.6765.desc: "§HVous dites la vérité.§!"
 shroud.6770.name: "$r_the_lost_patron$"
 shroud.6770.desc: "Le cocon que nous avons découvert sur §H[sanctum_of_the_lost_planet.GetName]§! abrite une puissante entité interdimensionnelle. Il est probable que cet être soit plus ou moins responsable de l'aura psionique qui a menacé la sacralité de nos esprits.\n\nNos atténuateurs psioniques endiguent le danger qu'il représente pour l'instant, mais nous ignorons pour combien de temps nos appareils pourront contenir son influence. Il est possible que, dans une situation contrôlée, nous parvenions à exploiter son terrible pouvoir à nos propres fins.\n\nNéanmoins, nombre de nos habitants appellent à sa destruction immédiate. Son existence même est en contradiction avec nos valeurs ancestrales."
 shroud.6770.a: "Détruisons cette abomination"
 shroud.6770.b: "Trouvons un moyen de tirer profit de cette... chose"
 destroyers_of_the_lost_modifier: "Destructeurs des Perdus"
 destroyers_of_the_lost_modifier_tt: "Donne accès aux conditions de vie §Y$living_standard_shroud_inoculation$§!, retirant les capacités §Ypsioniques§!."
 destroyers_of_the_lost_modifier_desc: "Après des années de tourment, la victoire contre un ennemi psionique et la destruction de la source apparente de son aura psionique ont regonflé le moral de notre empire."
 living_standard_shroud_inoculation: "Vaccination du Suaire"
 living_standard_shroud_inoculation_tooltip: "Cette espèce est vaccinée contre les effets néfastes des radiations psi.\n\n§RAfin d'éviter tout dommage supplémentaire, tous les traits psioniques seront retirés.§!"
 living_standard_shroud_inoculation_tooltip_delayed: "§LNous assurerons la sécurité psionique de cette espèce.§!"
 psionic_heresy: "Hérésie psionique"
 shroud.6780.name: "$r_the_lost_patron$"
 shroud.6780.desc: "Des pensées traversent nos esprits.\n\nNous entendons une mélodie, vive et corrosive.\n\nNous connaissons cette douleur immense et familière.\n\n§HVous avez écouté. Le rêve est à vous... Chantez, chantez...§!"
 shroud.6780.a: "Qu'avez-vous fait ?"
 shroud.6785.desc: "§HComme promis. J'ai rêvé pour vous.§!"
 shroud.6785.a: "De quoi avez-vous rêvé ?"
 shroud.6790.desc: "§HDe mondes. De nouveaux mondes entre le mien et le vôtre.§!"
 shroud.6790.a: "À quoi nous serviraient ces mondes ?"
 shroud.6795.desc: "§HJe vais leur chanter une chanson. La plus joyeuse de toutes.§!"
 shroud.6795.a: "Espérons que nous ne le regretterons pas"
 shroud.6795.a.tt: "Ajoute jusqu'à trois §Hmondes enveloppés du Suaire§! dans notre espace, à raison d'un par système au maximum."
 r_the_lost_patron: "Le Rêveur"
 r_the_lost_patron_desc: "Cette entité numineuse est la forme physique d'un être vivant dans le Suaire, l'ancien « mécène » d'un empire psionique aujourd'hui disparu. On ignore comment elle s'est matérialisée dans cette réalité physique, mais son lien unique avec la dimension psionique lui confère un pouvoir considérable."
 the_lost_patron_passive_effect: "Portée réelle des §Hsceaux du Suaire§! : §G+1§!\n£unity£§Y$unity$§! suscitée par les §Hsceaux du Suaire§! : §G+25§!\n£navy_size£§Y$NAVY_SIZE_TITLE$§! apportée par les §Hsceaux du Suaire§! : §G+10§!"
 the_lost_patron_before_activation_tt: "Nous ne savons pas ce qui nous attend..."
 the_lost_patron_after_activation_effect_tt: "Permet une £decision£§Ydécision planétaire§! : ['concept_dreamscaping_decision']"
 decision_dreamscaping: "Paysage de rêve"
 decision_dreamscaping_desc: "Terraforme un §Ymonde enveloppé du Suaire§! pour en faire un §Ymonde Gaïa§!"
 concept_dreamscaping_decision: "$decision_dreamscaping$"
 concept_dreamscaping_decision_desc: "$decision_dreamscaping_desc$"
 HAS_NOT_NUM_NEIGHBOR_SYSTEMS: "Le nombre de systèmes voisins $VAL0|2Y$ n'est PAS $COMPARE$ à $VAL1|2Y$"
 HAS_NEIGHBOR_SYSTEMS: "Le nombre de systèmes voisins $VAL0|2Y$ est $COMPARE$ à $VAL1|2Y$"
 #======================
 # Endbringers origin
 #======================
 origin_endbringers: "Agents de la fin"
 origin_endbringers_desc: "$CHALLENGING_ORIGIN$§RAttention : bloque toute ascension à l'exception du chemin ['concept_psionic_ascension',psionique].§!\n\nCette civilisation est depuis longtemps hantée par une mystérieuse catastrophe qui a transformé une planète voisine en un monde désolé et enveloppé du Suaire. Aujourd'hui, elle s'aventure dans l'espace pour percer ce mystère et découvrir si un destin similaire l'attend."
 origin_tooltip_endbringers_negative_effects: "- L'empire commence avec le modificateur ['concept_paranoia_modifier']\n- Impossible de former ou de rejoindre une ['concept_federation',fédération]"
 concept_paranoia_modifier: "$endbringers_paranoia$"
 concept_paranoia_modifier_desc: "Témoin d'une vieille catastrophe, cette civilisation est tourmentée par la peur d'une destruction imminente depuis des générations.\n\nLe bonheur se détériore au fil du temps : de §R-5%§! à §R-50%§!"
 endbringers_paranoia: "Paranoïa"
 endbringers_paranoia_desc: "Témoins d'une vieille catastrophe, nous sommes tourmentés par la peur d'une destruction imminente depuis des générations. Serons-nous les prochaines victimes ?"
 endbringers_paranoia_tt: "$chamber_of_silence_negative_effects_reduction$"
 START_SCREEN_ENDBRINGERS: "Nous sommes les messagers du cataclysme.\n\nÀ l'aube de la civilisation des [GetSpeciesNamePlural], une calamité mystérieuse est survenue chez nos voisins célestes les plus proches. Sa transformation brutale a illuminé la nuit de lueurs pourpres maléfiques, faisant naître chez notre peuple la peur que nous connaîtrions un jour le même destin. À chaque génération, la terreur étouffante d'une annihilation resserrait son étreinte autour de nous.\n\nMaintenant, alors que les [GetSpeciesNamePlural] gagnent les étoiles, nous sommes attirés par ce monde enveloppé du Suaire. Les réponses que nous souhaitons ardemment depuis des siècles sont à notre portée, si tentantes. Pourtant nombreux sont nos semblables à nous avertir que notre fascination pour la source de ce pouvoir destructeur pourrait bien nous mener à notre propre perte.\n\nTrès bientôt, nous soulèverons le voile ultime."
 shroud.8010.title: "Mission sur [shrouded_planet.GetName]"
 shroud.8010.desc: "Les satellites en orbite autour de §H[shrouded_planet.GetName]§! ont repéré un site prometteur pour notre première mission d'exploration de la surface de ce « monde enveloppé du Suaire ». La zone d'atterrissage émet d'étranges radiations qui se propagent sur toute la planète, portées par des vents ultraviolets.\n\nDe nombreux [Root.GetSpeciesNamePlural] s'opposent à cette mission, craignant que la même malédiction ne s'abatte sur notre monde natal. Bien que leurs inquiétudes ne soient pas sans fondement, la nécessité urgente de comprendre ce phénomène prime.\n\nSi un jour nous devions subir le même désastre, nous mourrons en en connaissant la cause."
 shroud.8010.a: "Que la quête de réponses commence"
 the_shrouded_world_site: "Le monde enveloppé du Suaire"
 the_shrouded_world_site_desc: "Nous sommes enfin en mesure d'atteindre et de toucher le « monde enveloppé du Suaire » nommé §H[planet.GetName]§!. Là-bas, quelque chose nous appelle. Une voix plus vive que jamais.\n\nLes secrets du cataclysme qui s'est abattu sur ce monde révélera une grande partie de l'histoire de notre propre système, et, espérons-le, apaiseront l'obsession de notre société pour la destruction qu'elle redoute tant. Les balayages orbitaux révèlent d'intenses tourbillons d'énergie concentrés en un point de l'hémisphère sud, formant un oeil maléfique qui nous fixe."
 shroud.8100.name: "La Fin est proche"
 shroud.8100.desc: "Le terrain de §H[shrouded_planet.GetName]§! est aussi accidenté que prévu. Des tourbillons de particules fines déchirent l'air, ralentissant la progression de §H[Leader.GetName]§! et de son équipage.\n\nFait inquiétant, l'équipe de recherche a commencé à signaler des phénomènes sensoriels anormaux, rapportant avoir entendu des hurlements lointains portés par le vent et aperçu des ombres errant dans le brouillard. Était-ce une erreur de venir ici ?\n\nDepuis la diffusion publique de l'atterrissage, une panique généralisée s'est emparée de §H[Owner.GetHomeWorldName]§!. Beaucoup craignent le retour de la force destructrice inconnue qui a autrefois frappé [shrouded_planet.GetName]. Les manifestations organisées proclamant que « la Fin est proche » se multiplient sur notre monde natal, paralysant la plupart des infrastructures.\n\nDes balayages télémétriques ont révélé la présence d'une cavité émettant des niveaux de radiation particulièrement élevés au coeur d'une chaîne de montagnes voisine. Nous sommes déterminés à explorer cet endroit plus en profondeur, quel qu'en soit le prix."
 shroud.8100.a: "Ouvrons une brèche pour découvrir ce qui s'y cache"
 the_end_is_nigh: "La Fin est proche"
 the_end_is_nigh_desc: "Un sentiment apocalyptique plane sur notre société."
 shroud.8105.name: "Structure alien"
 shroud.8105.desc: "Nous ne sommes pas les premiers à venir ici.\n\nLa cavité montagneuse sur §H[shrouded_planet.GetName]§! renferme les ruines d'une structure alien abandonnée, victime du cataclysme. Afin d'éviter une nouvelle vague de panique, nous avons jugé préférable de garder cette information secrète.\n\nD'après l'analyse préliminaire, les matériaux de construction utilisés ne correspondent pas à la composition moléculaire des minéraux présents sur la planète, ce qui suggère qu'une civilisation de voyageurs spatiaux aurait construit la structure à partir de matériaux exotiques. Sa fonction exacte reste inconnue, mais elle a l'air majoritairement automatisée.\n\nAu cours de l'exploration, les symptômes psychologiques des membres de l'équipage se sont aggravés. Certains entendent des murmures sur des fréquences cryptées, tandis que d'autres rapportent une perception déformée de leur environnement. Les crises de rire sporadiques deviennent également de plus en plus fréquentes.\n\nNous sommes allés trop loin pour faire demi-tour."
 shroud.8110.name: "Observateurs"
 shroud.8110.desc: "Ils sont tous morts.\n\nDans les entrailles du complexe, les postes de travail sont occupés par les cadavres desséchés d'une espèce inconnue, leurs nombreux yeux livides rivés sur le plafond. Malgré leur apparence particulièrement terrifiante, l'hypothèse d'une hallucination est peu probable pour §H[Leader.GetName]§!. Les images de ces formes de vie sont pour l'instant classées top secret.\n\nAucune arme n'a été trouvée, laissant penser qu'ils étaient dénués d'intention hostile envers §H[shrouded_planet.GetName]§!. L'installation était vraisemblablement un poste d'observation : du matériel de surveillance sophistiqué est orienté vers §H[Owner.GetHomeWorldName]§!. La datation au carbone 14 indique qu'ils étaient là bien avant le cataclysme.\n\nNous avons déchiffré bon nombre de leurs archives et, outre les journaux de communication routiniers, la grande majorité concerne l'histoire de notre civilisation."
 shroud.8110.a: "Ils nous observaient ?"
 shroud.8115.name: "Des pouvoirs dépassant l'entendement"
 shroud.8115.desc: "Le décryptage de la base de données découverte sur §H[shrouded_planet.GetName]§! nous a permis de prouver la véracité de nombre de nos légendes autrefois discréditées. Nous avons fait l'objet d'une expérience dans le domaine de la science psychique, aussi appelée « théorie psionique ».\n\nSelon les archives, notre espèce a le potentiel de maîtriser ce pouvoir. Bon nombre de nos ancêtres auraient perçu ces communications dans leurs rêves ou sous forme de voix lointaines, des phénomènes qui auraient autrement pu être interprétés comme des signes de maladie mentale ou de paranoïa. Cependant, l'expérience a été interrompue prématurément et le poste d'observation a été transformé en abri de protection.\n\nLes rapports sur notre société s'arrêtent après une expérience désastreuse sur leur monde-capitale au cours de laquelle ils ont tenté de manipuler la frontière entre les réalités, appelée §H« le Suaire »§!. Leurs scientifiques ont nommé cet événement « le Jugement », et nous supposons qu'il s'agit de la véritable cause du cataclysme.\n\nQuelle que soit la nature de cet incident, son impact s'est rapidement propagé à §H[shrouded_planet.GetName]§!. Leur dernière entrée n'est composée que d'une seule ligne :\n\n§LLa Fin est venue.§!"
 shroud.8115.a: "Allons-nous connaître le même sort ?"
 shroud.8120.name: "$fragment_of_reckoning$"
 shroud.8120.desc: "Nous avons trouvé une preuve irréfutable de l'origine du cataclysme. Cela n'a pas été difficile : §H[Leader.GetName]§! affirme avoir entendu son appel.\n\nAu plus profond de l'installation, une masse intangible et pulsante, impossible à expliquer, a été découverte. Celle-ci n'est composée ni de matière ni d'énergie. §H[Leader.GetName]§! l'a décrite comme le vestige de la rancoeur de volontés consumées, un §H« $fragment_of_reckoning$ »§!.\n\nCet objet était destiné à servir de défense contre le Jugement dans une tentative infructueuse de canaliser les énergies éthériques du §HSuaire§!. Il n'a toutefois que partiellement rempli son rôle. Dans les derniers instants de ce monde, l'entité malfaisante a été violemment bannie de cette dimension, emportant avec elle les esprits des scientifiques. Ce fragment est tout ce qui reste.\n\nIl amplifie les visions et les hallucinations de nos chercheurs et leur confère une « seconde vision » leur permettant de voir au-delà de notre réalité limitée. Une entreprise dangereuse, mais au potentiel énorme."
 shroud.8120.a: "Nous avons beaucoup à apprendre..."
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY: "$tech_psionic_theory$"
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC: "Le fragment d'énergie psionique découvert sur §H[shrouded_planet.GetName]§! recèle des secrets que nous devons percer.\n\nNous sommes freinés par les limites de notre esprit."
 ENDBRINGERS_PSIONIC_THEORY_PROJECT_TOOLTIP: "Pour terminer ce projet, découvrez la §H£society_research£$tech_psionic_theory$§!."
 ENDBRINGERS_ADOPT_PSIONICS_TRADITION: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY$"
 ENDBRINGERS_ADOPT_PSIONICS_TRADITION_DESC: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC$"
 ENDBRINGERS_PSIONICS_TRADITION_PROJECT_TOOLTIP: "Pour terminer ce projet, adoptez la tradition §H$tradition_psionics_shroud$§!."
 shroud.8200.title: "Le royaume de la folie"
 shroud.8200.desc: "Grâce aux récentes découvertes sur le psionisme, l'existence de dimensions jusqu'alors inconnues et accessibles par l'esprit a été confirmée. Au-delà de ce voile se trouve un royaume chaotique qui nous échappe.\n\nUne §RVoix§! nous appelle depuis ses profondeurs. Elle ne promet pas le salut, mais un nouveau départ. Céder à cette force inconnue reviendrait à renoncer à notre passé et à ouvrir la voie à la folie même.\n\n§R« L'HEURE EST VENUE. »§!"
 shroud.8200.a: "Qu'avons-nous fait ?"
 shroud.8200.a.tt: "Donne accès à l'arbre de traditions §H$tradition_psionics_shroud$§!."
 chamber_of_silence_negative_effects_reduction: "Chaque ['building:building_chamber_of_silence'] réduit les effets négatifs de §G$@chamber_of_silence_effect_mult|0%$§!"
 endbringers_madness_1: "Folie"
 endbringers_madness_1_desc: "Notre empire ne se consacre qu'à un seul objectif : suivre la §RVoix§!. Nous ne nous arrêterons pas tant que nous ne l'aurons pas trouvée."
 endbringers_madness_1_tt: "$chamber_of_silence_negative_effects_reduction$"
 endbringers_madness_2: "$endbringers_madness_1$"
 endbringers_madness_2_desc: "Notre empire s'approche de la §RVoix§!. Nos pulsions intenses s'atténuent progressivement."
 endbringers_madness_2_tt: "$endbringers_madness_1_tt$"
 endbringers_madness_3: "$endbringers_madness_1$"
 endbringers_madness_3_desc: "Notre empire entend presque la §RVoix§!. Bientôt, nous comprendrons."
