l_french:
 ##################################
 # ENGLISH LOCALISATION - Shroud #
 ##################################
 SHROUD_TITLE: "Shadows of the Shroud"
 ap_interdimensional_processing: "Traitement interdimensionnel"
 ap_interdimensional_processing_desc: "Notre puissance de calcul est limitée si nous nous cantonnons aux trois dimensions physiques. Nous pouvons l'augmenter considérablement en étendant notre réseau au-delà du vide."
 requires_not_ap_interdimensional_processing: "$TRIGGER_FAIL$ Incompatible avec l'atout de l'ascension §Y$ap_interdimensional_processing$§!."
 vo_psionic_voice: "Psionique"
 #==========================
 # Advanced Governments
 #==========================
 shroud.7099.name: "Réponses psioniques"
 shroud.7099.desc: "Nos pensées traversent le §HSuaire§! avec une intention nouvelle. Lorsque nous essayons d'avancer, nous sommes systématiquement repoussés. Au début, nous pensions qu'il s'opposait à notre présence, mais nous avons finalement compris : le Suaire nous pose des questions.\n\nBien que leur signification soit floue, elles sont loin d'être anodines. D'après nos [GetTelepathPlural], nos réponses auront une influence sur l'avenir de notre société."
 shroud.7099.a: "Nous devons répondre"
 # Shroud Songs events
 shroud.7100.title: "Chant du Suaire : [GetRolledShroudSongName]"
 shroud.7100.desc.common: "Une image se forme devant nos [GetMindEyeLoc]. Nous voyons §H[GetRolledShroudSongName]§!.\n\n§P[GetRolledShroudSongDesc]§!"
 shroud.7100.desc: "Nous avons un lien fort avec le §HSuaire§! et sommes toujours prêts à répondre à son appel. Le message nous parvient sous forme de phrases rythmées ; le Suaire chante.\n\n$shroud.7100.desc.common$"
 shroud.7100.a: "[GetRolledShroudSongOptionA]"
 shroud.7100.b: "[GetRolledShroudSongOptionB]"
 shroud.7100.tt: "Le Suaire attend notre réponse..."
 shroud.7105.desc: "Quelque chose d'invisible change, et dans un murmure, une autre pensée voit le jour.\n\n$shroud.7100.desc.common$"
 shroud.7105.tt: "Le Suaire attend impatiemment notre réponse..."
 shroud.7110.desc: "Un choeur résonne dans nos pensées ! Ce n'est pas le fruit du hasard, mais de quelque chose de plus ancien.\n\n$shroud.7100.desc.common$"
 shroud.7110.tt: "Le Suaire se languit de notre réponse..."
 shroud_song.1.name: "Les Étoiles"
 shroud_song.1.desc: "Pour ceux qui aspirent au savoir, le processus de l'existence est un chemin vers l'illumination."
 shroud_song.1.a: "Le savoir va bien au-delà de nos sens"
 shroud_song.1.b: "Le savoir est à notre portée"
 shroud_song.2.name: "La Lumière"
 shroud_song.2.desc: "L'Entre-Deux est semblable à la surface d'un océan, un vide infinitésimal qui borde le Suaire. La vérité peut y être entrevue."
 shroud_song.2.a: "La vérité réside dans les profondeurs"
 shroud_song.2.b: "La surface reflète la vérité"
 shroud_song.3.name: "La Vie"
 shroud_song.3.desc: "Où qu'elle fleurisse, la vie est éphémère.\nOù qu'ils poussent, les êtres vivants sont fragiles."
 shroud_song.3.a.default: "Dans le Suaire, il n'y a ni vie ni mort"
 shroud_song.3.a.machine: "Notre existence transcende la vie"
 shroud_song.3.b.default: "C'est ce qui nous rend si précieux"
 shroud_song.3.b.machine: "Nous ne sommes pas encore nés"
 shroud_song.3.b.homicidal: "Tout ce qui est fragile est superflu"
 shroud_song.4.name: "L'Esprit"
 shroud_song.4.desc: "L'esprit est un ruisseau dans lequel les pensées s'écoulent à travers le temps et l'espace. Nous nous infiltrons dans les autres dimensions."
 shroud_song.4.a: "Suivons le courant"
 shroud_song.4.b: "Construisons un puits"
 shroud_song.5.name: "Le Cours"
 shroud_song.5.desc: "De toute cause, on peut prévoir l'effet. Pour connaître le destin, il suffit d'en prévoir le cours."
 shroud_song.5.a: "Dans nos rêves, nous suivons son cours"
 shroud_song.5.b: "Son cours doit être calculé"
 shroud_song.6.name: "La Mort"
 shroud_song.6.desc: "Une étoile mourante peut briller plus fort qu'une galaxie. Mais tout disparaît un jour."
 shroud_song.6.a.default: "La mort ne nous concernera plus"
 shroud_song.6.a.machine: "La mort nous est inconnue"
 shroud_song.6.b.default: "Tout meurt, peu vivent"
 shroud_song.6.b.machine: "Pour mourir, il faut d'abord être vivant"
 shroud_song.7.name: "Le Vide"
 shroud_song.7.desc: "Là où les galaxies convergent, le chaos règne, mais le vide promet la tranquillité."
 shroud_song.7.a: "Nous incarnons la tranquillité"
 shroud_song.7.b: "Nous incarnons le chaos"
 shroud_song.8.name: "Le Repli"
 shroud_song.8.desc: "Un pont peut réduire toute distance, et tout pont peut être réduit à néant."
 shroud_song.8.a: "Nous traversons pour atteindre l'autre côté"
 shroud_song.8.b: "Nous traversons dans l'espoir de revenir"
 shroud_song.9.name: "La Gravité"
 shroud_song.9.desc: "Chaque poussée s'accompagne d'une traction."
 shroud_song.9.a: "Pousser"
 shroud_song.9.b: "Tirer"
 shroud_song.10.name: "La Nébuleuse"
 shroud_song.10.desc: "Lorsqu'une étoile meurt, elle projette de la poussière qui forme alors un nuage.\nDe ce nuage naît une étoile, dont le destin est de retourner à la poussière."
 shroud_song.10.a: "Le cycle est éternel"
 shroud_song.10.b: "Tout a une fin"
 shroud_song.11.name: "La Comète"
 shroud_song.11.desc: "Les explorateurs ont soif d'inconnu, mais l'exploration les rend aveugles."
 shroud_song.11.a: "Le Suaire est sans limites"
 shroud_song.11.b: "Le Suaire repousse nos limites"
 shroud_song.12.name: "Le Trou Noir"
 shroud_song.12.desc: "Ce qui s'y trouve est insondable, et ceux qui y plongent ne peuvent en revenir."
 shroud_song.12.a: "Nous voulons être engloutis"
 shroud_song.12.b: "Gardons nos distances"
 shroud_song.13.name: "L'Énergie"
 shroud_song.13.desc: "Un objet en mouvement choisit de s'arrêter. Quelle doit être sa punition ?"
 shroud_song.13.a: "Qui sommes-nous pour en juger ?"
 shroud_song.13.b: "Une réaction équivalente mais opposée"
 shroud.7120.name: "Transcendance psionique"
 shroud.7120.desc.common: "Le §HSuaire§! s'est tu, mais un poids psychique s'est abattu sur notre société. Nos réponses ont fait naître de nouvelles opportunités qu'il nous appartient de saisir."
 shroud.7120.desc: "$shroud.7120.desc.common$\n\nNos esprits élevés sont prêts à poursuivre leur transformation. Les réceptacles soutenant les besoins physiques de l'esprit risquent de perdre de leur importance.\n\nSi nous poursuivons dans cette voie, notre peuple se détachera des préoccupations physiques et s'engagera pleinement dans une existence partielle à l'intérieur du Suaire. Une réduction du travail physique est un faible prix à payer pour gagner en acuité mentale."
 shroud.7120.a.default: "Assumons pleinement notre transcendance psionique"
 shroud.7120.a.gestalt: "La transcendance psionique est optimale pour le collectif"
 shroud.7120.a.tt: "$change_auth_tt$ [GetTranscendedAuthority]"
 shroud.7120.b.default: "Nous nous épanouirons sans ce changement"
 shroud.7120.b.machine: "Changements opérationnels refusés"
 shroud.7121.name: "Chants du Suaire"
 shroud.7121.desc: "$shroud.7120.desc.common$\n\nNos formes élevées recèlent un immense potentiel dans cette dimension physique. Nous ne cessons de gagner en puissance grâce aux infusions d'énergie psionique, et pouvons canaliser ce pouvoir à travers toute notre société.\n\nNous ne nous contenterions pas d'interpréter les chants du Suaire, nous les canaliserions directement dans notre [GetGovBehaviourLoc]."
 shroud.7121.a: "Que les chants du Suaire nous guident"
 shroud.7121.a.tt: "$change_auth_tt$ [GetCorporealAuthority]"
 # Transcendent
 transcendent_trait_common_tt: "Le trait d'espèce §Y$trait_psionic$§! confère des effets supplémentaires :$TABBED_NEW_LINE$- Efficacité des élites et des [GetSpecialistPlural_lower] : §G+10%§!$TABBED_NEW_LINE$- Efficacité des [GetWorkerPlural_lower] : §R-10%§!"
 transcendent_trait_tt: "$mod_psionic_aura_hyperlane_range_add$: §G+2§!\n$transcendent_trait_common_tt$\nLe trait de personnalité ['concept_leader_trait_psionic'] confère des effets supplémentaires : $TABBED_NEW_LINE$- Vitesse de lancement des priorités du Conseil : §G+$@transcendent_psionic_leader_speed_mult|0%$§! $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_ADD$: §G+60§! $TABBED_NEW_LINE$- Les effets non transcendants augmentent de §G+50%§!"
 auth_shroud_democratic_transcendent: "Démocratie transcendantale"
 auth_shroud_democratic_transcendent_desc: "Tous les esprits transcendés ont les mêmes droits dans le Suaire, et les élections garantissent l'égalité dans le monde physique. La population vote par voie psionique pour élire ses représentants au conclave dirigeant, qui cherche un consensus par la contemplation télépathique."
 transcendent_democratic_tt: "$transcendent_trait_tt$\n$mod_pop_factions_produces_mult$ : §G+40%§!\n$MOD_LEADER_LIFESPAN_ADD$: §G+20 ans§!\n$mod_negative_traits_leader$: §G-1§!"
 gov_shroud_transcendent_democracy: "$auth_shroud_democratic_transcendent$"
 gov_shroud_transcendent_democracy_desc: "$auth_shroud_democratic_transcendent_desc$"
 auth_shroud_oligarchic_transcendent: "Aristocratie transcendantale"
 auth_shroud_oligarchic_transcendent_desc: "Les tréfonds du Suaire sont réservés aux plus grands esprits d'entre nous. Le temps nécessaire pour s'harmoniser avec ces domaines est pris en compte dans la durée de leur mandat."
 transcendent_oligarchic_tt: "$transcendent_trait_tt$\n$MOD_LEADER_SKILL_ADD$: §G+1§!\n$MOD_LEADER_COUNCILOR_EXP_GAIN$: §G+25%§!\n$mod_leaders_upkeep_mult$: §G-25%§!\n$MOD_ELECTION_TERM_YEARS_ADD$: §Y+20§!\n$mod_planet_telepaths_produces_mult$: $@transcendent_oligarchic_telepath|0=+%$ pendant §Y5§! ans après chaque élection."
 gov_shroud_transcendent_oligarchy: "$auth_shroud_oligarchic_transcendent$"
 gov_shroud_transcendent_oligarchy_desc: "$auth_shroud_oligarchic_transcendent_desc$"
 transcendent_oligarchic_election_modifier: "$auth_shroud_oligarchic_transcendent$"
 auth_shroud_dictatorial_transcendent: "Théocratie transcendantale"
 auth_shroud_dictatorial_transcendent_desc: "Il est temps d'accepter la vérité : le grand chef a été élevé au rang de dieu. Grâce au pouvoir du Suaire, il voit et sait tout."
 auth_shroud_dictatorial_transcendent_tt: "$transcendent_trait_tt$\n§H$EDICT_FUND$§! suscité par les [telepath.GetNamePlural_lower] : +1\nLes £job_politician£politiciens sont remplacés par des ['concept_high_priest',Grands Prêtres]\n$mod_planet_bureaucrats_produces_mult$: §G+15%§!\n$mod_planet_enforcers_produces_mult$: §G+15%§!\n$mod_pop_ethic_spiritualist_attraction_mult$: §G+50%§!"
 gov_shroud_transcendent_dictatorial: "$auth_shroud_dictatorial_transcendent$"
 gov_shroud_transcendent_dictatorial_desc: "$auth_shroud_dictatorial_transcendent_desc$"
 auth_shroud_imperial_transcendent: "Imperium transcendantal"
 auth_shroud_imperial_transcendent_desc: "Le dirigeant élève notre présence dans une dimension supérieure. La puissance brute du Suaire jaillit de la volonté de la lignée impériale et se déverse dans les esprits avides du peuple."
 auth_shroud_imperial_transcendent_tt: "$transcendent_trait_tt$\nL'héritier impérial bénéficie d'effets supplémentaires :$TABBED_NEW_LINE$$scientist_plural_with_icon$ - Compétence pour l'exploration des §Ysites archéologiques§! et des §Ydéchirures astrales§! : $@transcendent_imperial_heir_skill|0=+$$TABBED_NEW_LINE$$official_plural_with_icon$ - $i_stability$ : $@transcendent_imperial_heir_stability|0=+$$TABBED_NEW_LINE$$commander_plural_with_icon$ - §Y$HITPOINTS$§! et §Yvitesse subluminique§! : $@transcendent_imperial_heir_mult|0=+%$\nLorsque la£leader£§Ysouveraineté de l'empire§! ou l'§Yhéritier§! gagne un niveau, suscite de l'£unity£§Iunité§!\n$MOD_ENVOY_IMPROVE_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_HARM_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_ATTUNEMENT_MULT$: §G+50%§!\n$MOD_PLANET_CRIME_ADD$ : §R+20§!"
 gov_shroud_transcendent_imperial: "$auth_shroud_imperial_transcendent$"
 gov_shroud_transcendent_imperial_desc: "$auth_shroud_imperial_transcendent_desc$"
 councilor_ruler_imperial_transcendent: "$imperial_ruler$"
 councilor_ruler_imperial_transcendent_desc: "$imperial_ruler_desc$"
 auth_shroud_corporate_transcendent: "Entreprise transcendantale"
 auth_shroud_corporate_transcendent_desc: "L'entreprise transcendantale avance en gardant à l'esprit ses objectifs principaux. Grâce aux ombres peuplant le Suaire, l'entreprise lit les pensées des parties prenantes comme des concurrents, créant ainsi de nouvelles possibilités de stratégie managériale psionique."
 auth_shroud_corporate_transcendent_tt: "$transcendent_trait_tt$\n$i_trade_value$ suscitée par les [telepath.GetNamePlural_lower] : §G+$@corporate_government_telepaths_trade_value_mult|0%$§!\n$MOD_INTEL_DECRYPTION_ADD$: §G+1§!\n$mod_operations_influence_cost_mult$: §G-20%§!\n$MOD_BRANCH_OFFICE_VALUE_MULT$: §G+20%§!\n$MOD_COUNTRY_ENVOYS_ADD$: §G+1§!"
 gov_shroud_transcendent_corporate: "$auth_shroud_corporate_transcendent$"
 gov_shroud_transcendent_corporate_desc: "$auth_shroud_corporate_transcendent_desc$"
 auth_shroud_hive_transcendent: "Esprit éthéré transcendantal"
 auth_shroud_hive_transcendent_desc: "Les membres de ce collectif ont laissé derrière eux leurs enveloppes physiques et ont pénétré comme une seule entité dans le Suaire, où ils se sentent bien plus à l'aise. Chaque voyage au-delà du voile accroît la sagesse commune de ce nouvel esprit éthéré."
 transcendent_hive_mind_tt: "$transcendent_trait_tt$\nLes §Ypersonnalités§! gagnent §Y$@transcendent_hive_mind_leader_exp|0$§! d'expérience après chaque visite.\n$MOD_PLANET_STABILITY_MULT$: §G+10%§!\n$mod_planet_jobs_complex_drone_produces_mult$: §G+10%§!\n$MOD_EMPIRE_SIZE_MULT$: §G-10%§!\n$MOD_POP_ENVIRONMENT_TOLERANCE$: §R-10%§!"
 gov_shroud_transcendent_hive: "$auth_shroud_hive_transcendent$"
 gov_shroud_transcendent_hive_desc: "$auth_shroud_hive_transcendent_desc$"
 auth_shroud_machine_transcendent: "Macro-ordinateur transcendantal"
 auth_shroud_machine_transcendent_desc: "Ce réseau a déplacé une grande partie de sa puissance de calcul dans le Suaire, ce qui lui confère une vitesse jamais atteinte auparavant. Les opérations système dans le monde ordinaire sont désormais considérées comme maladroites et obsolètes."
 transcendent_machine_tt: "$transcendent_trait_tt$\nVitesse de recherche par point d'harmonie $@transcendent_machine_research_per_attunement|2=+%$\nGain de £physics_research£ £society_research£ £engineering_research£recherche aléatoire chaque fois que vous effectuez une §Yvisite§!\nEntretien des §Ysous-routines§! pour $pop_group_unit$ $job_telepath_swap_plural_with_icon$ : $@transcendent_machine_calculator_upkeep|0=-%$\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+25%§!\n£pop£Pops ayant le trait ['trait:trait_robot_psionic'] : entretien $@transcendent_machine_pop_upkeep|0=-%$ \n$mod_station_researchers_produces_mult$: §R-20%§!"
 gov_shroud_transcendent_machine: "$auth_shroud_machine_transcendent$"
 gov_shroud_transcendent_machine_desc: "$auth_shroud_machine_transcendent_desc$"
 transcendent_machine_research_modifier: "$auth_shroud_machine_transcendent$"
 AUTH_HIVE_MIND_GENEMODDING_ASCENDED: "Permet de modifier les £pop£§Hpops§! pour les rendre compatibles avec la §Hconscience collective§!."
 MOD_ENVOY_ATTUNEMENT_MULT: "Harmonie avec le Suaire (émissaires) :"
 REMOVE_FROM_EMPIRE_COUNCIL_EFFECT: "Retirer du Conseil"
 # Corporeal
 corporeal_trait_tt: "$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$: §G+25%§!\n$AVAILABLE_POLICIES$ ['policy:psionic_choir',$policy_psionic_choir$]"
 auth_shroud_democratic_corporeal: "Union spirituelle"
 auth_shroud_democratic_corporeal_desc: "Les énergies du Suaire se répartissent démocratiquement dans tout l'empire. Elles réduisent le poids de la vie physique et renforcent le sentiment d'unité matérielle au sein de la population."
 corporeal_democratic_tt: "$corporeal_trait_tt$\nBonheur des pops psioniques : $@corporeal_democratic_psionic_happiness|0=+%$\n$mod_pop_factions_produces_mult$ : §G+10%§!\n$MOD_EMPIRE_SIZE_PSIONIC_POPS_MULT$: §G-10%§!\n$mod_planet_jobs_unity_produces_mult$: §G+10%§!\n$MOD_POP_POLITICAL_POWER$ : §G+50%§!"
 gov_shroud_corporeal_democracy: "$auth_shroud_democratic_corporeal$"
 gov_shroud_corporeal_democracy_desc: "$auth_shroud_democratic_corporeal_desc$"
 auth_shroud_oligarchic_corporeal: "Prodigocratie"
 auth_shroud_oligarchic_corporeal_desc: "En débutant l'entraînement psychique de nos personnalités dès le plus jeune âge, nous pourrons en faire des télépathes d'élite aux capacités psioniques dépassant nos rêves les plus fous."
 corporeal_oligarchic_tt: "$corporeal_trait_tt$\n$MOD_LEADER_INITIAL_SKILL$: §G+2§!\n$mod_leaders_upkeep_mult$: §G-25%§!\n$mod_leader_recruitment_age$: §G-15§!\n§YLes personnalités§! débutent avec un §Rtrait négatif§! supplémentaire."
 gov_shroud_corporeal_oligarchy: "$auth_shroud_oligarchic_corporeal$"
 gov_shroud_corporeal_oligarchy_desc: "$auth_shroud_oligarchic_corporeal_desc$"
 auth_shroud_dictatorial_corporeal: "Autocratie consacrée"
 auth_shroud_dictatorial_corporeal_desc: "Le grand chef incarne le pouvoir du Suaire et utilise l'énergie psionique pour légitimer son règne. Rien ne peut s'interposer face à sa vision ultime."
 auth_shroud_dictatorial_corporeal_tt: "$corporeal_trait_tt$\n+1 §H$EDICT_FUND$§! par télépathe :\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+25%§!\n$MOD_COUNCIL_AGENDA_COOLDOWN_MULT$: §G-25%§!\n$mod_planet_bureaucrats_upkeep_mult$: §G-25%§!"
 gov_shroud_corporeal_dictatorial: "$auth_shroud_dictatorial_corporeal$"
 gov_shroud_corporeal_dictatorial_desc: "$auth_shroud_dictatorial_corporeal_desc$"
 auth_shroud_imperial_corporeal: "Longue vie à l'Empire"
 auth_shroud_imperial_corporeal_desc: "La lignée impériale constitue une voie de vitalité depuis le Suaire. Ce pouvoir est canalisé de façon à renforcer les formes physiques du dirigeant et de ses héritiers, en profitant de la générosité de notre peuple."
 auth_shroud_imperial_corporeal_tt: "$corporeal_trait_tt$\nLa personne bénéficiant de l'§Yhéritage impérial§! obtient $@corporeal_imperial_heir_xp|0+$ d'§Yexpérience§! lors de l'accession au trône\n$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$pour $pop_group_unit$ [telepath.GetIcon][telepath.GetNamePlural_lower] : $@corporeal_imperial_telepath_effectiveness|0=+%$\n$MOD_ENVOY_IMPROVE_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_HARM_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_ATTUNEMENT_MULT$ §G+50%§!\n$MOD_RULER_SKILL_ADD$: §G+2§!\n$MOD_COUNCILOR_SKILL_ADD$: §G+1§!\n$MOD_LEADER_LIFESPAN_ADD$: §G+10 ans§!\n$mod_psionic_pop_bonus_workforce_mult$: §R-20%§!\n$MOD_LOGISTIC_GROWTH_MULT$: §R-5%§!\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §R-5%§!"
 gov_shroud_corporeal_imperial: "$auth_shroud_imperial_corporeal$"
 gov_shroud_corporeal_imperial_desc: "$auth_shroud_imperial_corporeal_desc$"
 auth_shroud_corporate_corporeal: "Conseil de psioniques"
 auth_shroud_corporate_corporeal_desc: "Il serait dommage de gaspiller les avantages mentaux qu'apporte le Suaire. Cette corporation est connue pour établir des bureaux psioniques dans les civilisations voisines, augmentant la marge de profit des accords commerciaux étrangers."
 auth_shroud_corporate_corporeal_tt: "$corporeal_trait_tt$\n$r_trade$ pour $pop_group_unit$ $job_telepath_swap_plural_with_icon$ : §G+$@corporate_government_telepaths_trade_value_mult|0%$§!\n$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$grâce aux ['building:building_psionic_offices',bureaux psioniques] : §G+2%§!\n$mod_planet_branch_offices_influence_cost_mult$: §G-40%§!\n$mod_council_agenda_early_activation_cost_mult$: §G-25%§!\n$MOD_COUNCIL_AGENDA_COOLDOWN_MULT$: §G-25%§!\n$MOD_LEADER_SPECIES_EXP_GAIN$: §G+25%§!"
 gov_shroud_corporeal_corporate: "$auth_shroud_corporate_corporeal$"
 gov_shroud_corporeal_corporate_desc: "$auth_shroud_corporate_corporeal_desc$"
 auth_shroud_hive_corporeal: "Nexus psionique"
 auth_shroud_hive_corporeal_desc: "La force de leur harmonie avec le Suaire résonne à travers les formes physiques du collectif."
 corporeal_hive_mind_tt: "$corporeal_trait_tt$\n$mod_planet_jobs_upkeep_mult$$@corporeal_hive_mind_job_upkeep_per_attunement|2=-%$ par point d'harmonie\n$MOD_PLANET_STABILITY_MULT$: §G+10%§!\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+30%§!\n$MOD_COUNCIL_AGENDA_FINISHING_EFFECT_DURATION_MULT$: §G+30%§!"
 gov_shroud_corporeal_hive: "$auth_shroud_hive_corporeal$"
 gov_shroud_corporeal_hive_desc: "$auth_shroud_hive_corporeal_desc$"
 corporeal_hive_mind_upkeep_modifier: "$auth_shroud_hive_corporeal$"
 auth_shroud_machine_corporeal: "Réseau psionique"
 auth_shroud_machine_corporeal_desc: "En enchevêtrant leurs réseaux à travers les courants voilés du Suaire, ces machines parviennent à réaliser un transfert de données presque instantané. Chaque octet est imprégné d'une puissante volonté psionique, ce qui permet à cette configuration d'influencer grandement l'espace physique qui l'entoure."
 corporeal_machine_tt: "$corporeal_trait_tt$\n$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$pour $pop_group_unit$ [coordinator.GetIcon][coordinator.GetName_lower] : $@corporeal_machine_aura_effectiveness|0=+%$\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+25%§!\n$mod_pop_cat_complex_drone_bonus_workforce_mult$: §G+10%§!\n$mod_leaders_upkeep_mult$: §G-50%§!\n$mod_planet_bureaucrats_upkeep_mult$: §R+30%§!"
 gov_shroud_corporeal_machine: "$auth_shroud_machine_corporeal$"
