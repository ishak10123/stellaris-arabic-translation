 # Experiment Engineer
 # Experiment Engineer (Normal)
 job_experiment_engineer: "Ingénieurs expérimentaux"
 job_experiment_engineer_plural: "Ingénieurs expérimentaux"
 job_experiment_engineer_desc: "Ces chercheurs d'élite réalisent des expériences sur des sujets d'étude provenant de la population criminelle, sans ressentir trop de scrupules sur la sévérité de leurs méthodologies."
 job_experiment_engineer_effect_desc: "Les £job_experiment_engineer£ingénieurs expérimentaux transforment les £consumer_goods£§Ibiens de consommation§! et la £crime£§Icriminalité§! en §Yrecherche§!"
