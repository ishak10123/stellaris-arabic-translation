l_french:
 ### DIGITIZATION SITUATION START ###
 situation_digitization: "Synthétisation"
 situation_digitization_type: "Situation d'ascension"
 situation_digitization_desc: "Le moment est venu de renoncer à nos imparfaites enveloppes biologiques. Nous devons préparer des machines corporelles perfectionnées, et lancer le processus de transfert des consciences.\n\n§YPops qui seront numérisées le mois prochain§! : §G[From.GetSynthPopsPerMonth]§!"
 situation_digitization_monthly_change_tooltip: "Notre esprit deviendra numérique, et notre corps une machine."
 situation_digitization_outcome: "Une population synthétique."
 stage_digitization_effects: "Nous devons mettre au point une représentation numérique du cerveau, construire des machines corporelles, et nous transformer."
