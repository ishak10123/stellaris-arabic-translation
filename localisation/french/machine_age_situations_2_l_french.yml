 #Buildings
 building_identity_complex: "Centre identitaire"
 building_identity_complex_desc: "Un centre de pointe dédié à la recherche et au développement des identités synthétiques."
 building_identity_complex_speed: "§G+100§! £pop£§Hpops§!"
 building_identity_complex_effect_desc: "$building_identity_complex_speed$ téléchargé par mois."
 building_ai_emporium: "Emporium de l'I.A."
 building_ai_emporium_desc: "Un immense complexe pour tous vos besoins en matière d'intelligence artificielle, où des I.A. conscientes transforment des objets ordinaires en assistants pour votre famille ou votre entreprise. Votre I.A. est un peu trop consciente d'elle-même pour son propre bien ? Confiez-la à nos techniciens qualifiés qui se chargeront de la réinitialiser à une vitesse supraluminique."
 building_ai_emporium_fail_tt: "$TRIGGER_FAIL$Nous avons déjà un §Y$building_ai_emporium$§! sur §Y[planet.owner.GetName]§!"
 building_ai_emporium_outlawed_robots_tt: "$TRIGGER_FAIL$§Y[planet.owner.GetName]§! a proscrit les robots"
 building_clear_thought_clinic: "Clinique de la pensée claire"
 building_clear_thought_clinic_desc: "Vous avez des souvenirs dont vous n'avez plus besoin ? Transformez-les en crédits énergétiques ! Notre équipe qualifiée se charge de vous en débarrasser en toute sécurité ! Plus le souvenir est joyeux, plus votre gain sera important !\n\nCette opération est irréversible et les modèles de pensée ne peuvent pas être restaurés une fois extraits."
 clear_thought_clinic_modifier: "$building_clear_thought_clinic$"
 clear_thought_clinic_tt: "Modificateur non cumulable des réseaux d'espionnage : \n  $MOD_SPY_NETWORK_DAILY_VALUE_MULT$: §G+25%§! \n  $MOD_SPY_NETWORK_LEVELS_ADD$: §G+10§!"
 #Jobs
 m_pop_assembly: "£mod_planet_pop_assembly_add£§Y$MOD_PLANET_POP_ASSEMBLY_ADD$§!"
 job_identity_designer: "Concepteurs d'identité"
 job_identity_designer_plural: "Concepteurs d'identité"
 job_identity_designer_plural_with_icon: "£job_identity_designer£$job_identity_designer_plural$"
 job_identity_designer_converter_desc: "Les concepteurs d'identité facilitent le passage d'une forme biologique à une identité numérique, garantissant ainsi une transition en douceur."
 job_identity_designer_converter_effect_desc: "Les £job_identity_designer£concepteurs d'identité produisent de l'£engineering£§Iingénierie§! et des £amenities£§Iservices§!"
 job_identity_designer_desc: "Les concepteurs d'identité élaborent soigneusement de nouveaux esprits synthétiques."
 job_identity_designer_effect_desc: "Les £job_identity_designer£concepteurs d'identité produisent de l'£engineering£§Iingénierie§! et des £amenities£§Iservices§!, et accélèrent la vitesse d'£mod_planet_pop_assembly_organic_mult£§Yassemblage des pops§! dans tout l'empire"
 mod_job_identity_designer_add: "Emplois de concepteurs d'identités"
 job_roboticist_plural_and_job_identity_designer_plural: "[roboticist.GetNamePlural] et £job_identity_designer£concepteurs d'identité"
 job_roboticist_plural_with_icon_and_job_identity_designer_plural_with_icon: "£job_roboticist£roboticiens et £job_identity_designer£concepteurs d'identité"
 councilor_ruler_imperial_synth: "$imperial_ruler$"
 councilor_ruler_imperial_synth_desc: "$imperial_ruler_desc$"
 #Traits
 #Modifiers
 synth_opposition_truth: "Campagne d'information sur la synthétisation"
 synth_opposition_truth_desc: "Diffusons des informations pertinentes sur tous les aspects liés à la synthétisation."
 synth_opposition_deception: "Campagne de sensibilisation à la synthétisation"
 synth_opposition_deception_desc: "Axons le discours public sur les aspects positifs de la synthétisation de l'esprit."
 synth_tinkering_with_minds: "Reprogrammation spirituelle"
 synth_tinkering_with_minds_desc: "Les esprits nouvellement numérisés subissent une reprogrammation modérée, afin de s'aligner sur notre vision de l'avenir."
 synth_brightest_minds: "Priorité aux élites"
 synth_brightest_minds_desc: "Seuls les individus les plus exceptionnels sont sélectionnés pour participer à notre programme de synthétisation."
 synth_reprogram_minds: "Reprogrammation oppressive"
 synth_reprogram_minds_desc: "Ce gouvernement reprogramme en masse les individus « inaptes » pendant leur numérisation."
 victim_compensation: "Compensation des victimes"
 victim_compensation_desc: "Une compensation est versée aux familles de ceux dont l'esprit a été perdu pendant la synthétisation."
 synth_mandatory_volunteers: "Volontaires forcés"
 synth_mandatory_volunteers_desc: "Des sujets d'étude sont contraints de participer à des expériences visant à numériser une conscience biologique."
 synth_mass_demonstrations: "Manifestations de masse"
 synth_mass_demonstrations_desc: "La population active de la planète participe à des manifestations massives pour protester contre le passage programmé aux machines."
 synth_fund_heritage_sites: "Financement de sites patrimoniaux"
 synth_fund_heritage_sites_desc: "Des sites patrimoniaux spéciaux seront créés afin de limiter l'impact de la transition synthétique sur les personnes biologiques de notre espèce."
 synth_revere_the_past: "Culte du passé"
 synth_revere_the_past_desc: "Les rites religieux nés de notre existence biologique sont toujours importants à nos yeux, et nous devons protéger à tout prix ces lieux de culte."
 synth_preserve_the_past: "Préservation du passé"
 synth_preserve_the_past_desc: "Adopter pleinement une nouvelle existence ne signifie pas détruire les lieux et les objets qui donnaient du sens à notre passé biologique."
 synth_resistance_fight: "Rassemblement des chefs de la résistance"
 synth_resistance_fight_desc: "Envoyer nos escouades de machines dans les $d_biological_enclaves_no_icon$ pour en extraire les chefs de la résistance mettra rapidement un terme aux objections."
 synth_resistance_diplomacy: "Diplomatie avec les chefs de la résistance"
 synth_resistance_diplomacy_desc: "Rencontrer les chefs de la résistance dans les $d_biological_enclaves_no_icon$ améliorera notre compréhension mutuelle."
 synth_character_force: "Imitation d'une ancienne forme organique"
 synth_character_force_desc: "La forme traditionnelle de notre espèce est préservée dans le monde numérique."
 synth_character_customize: "Modifications illimitées du corps synthétique"
 synth_character_customize_desc: "Les individus peuvent modifier librement leur nouvelle apparence numérique."
 synth_character_customize_elite: "Modifications limitées du corps synthétique"
 synth_character_customize_elite_desc: "Afin de maintenir une hiérarchie sociale définie, seules les couches supérieures sont autorisées à modifier leur apparence."
 synth_character_customize_corpo: "Modifications payantes du corps synthétique"
 synth_character_customize_corpo_desc: "Les gens sont libres de modifier leur apparence numérique... s'ils peuvent se le permettre."
 synth_cravings_imperfections: "Imperfections synthétiques intentionnelles"
 synth_cravings_imperfections_desc: "Afin d'éviter une existence vide et impersonnelle, des caractéristiques volontairement imparfaites sont ajoutées aux corps synthétiques."
 synth_cravings_simulation: "Simulation existentielle"
 synth_cravings_simulation_desc: "Nous nous efforçons de créer une existence plus authentique pour les personnes qui choisissent de vivre dans une simulation, épreuves comprises."
 synth_cravings_stop: "Défenseurs organiques ignorés"
 synth_cravings_stop_desc: "Avec le temps, nos citoyens apprécieront leur vie parfaite et dépourvue d'épreuves organiques."
 synth_cravings_pain: "Arène de combat virtuelle"
 synth_cravings_pain_desc: "Participer à de violents combats virtuels donne un objectif familier aux participants comme aux spectateurs."
 synth_health_physical: "Santé physique des corps synthétiques"
 synth_health_physical_desc: "Nos services de santé synthétiques s'occuperont en priorité des défaillances locales."
 synth_health_virtual: "Santé mentale des corps synthétiques"
 synth_health_virtual_desc: "Assurer la sécurité des esprits grâce à des mises à jour régulières du logiciel est essentiel pour notre santé mentale."
 synth_health_both: "Santé globale des corps synthétiques"
 synth_health_both_desc: "Corriger les instabilités du logiciel et du matériel est essentiel pour le bien-être de nos citoyens."
 synth_health_corporate: "Médicalisation synthétique"
 synth_health_corporate_desc: "Développer l'expertise de notre société au-delà de la médecine traditionnelle est primordial dans le traitement des virus numériques."
 synth_virtual_world_outlaw: "Interdiction des mondes virtuels"
 synth_virtual_world_outlaw_desc: "Très addictifs, les mondes virtuels ont été interdits car ils représentent une menace pour la société."
 synth_virtual_world_promote: "Promotion des mondes virtuels"
 synth_virtual_world_promote_desc: "Les gens sont libres de profiter des formes infinies de divertissement de l'utopie numérique."
 synth_virtual_world_regulate: "Réglementation des mondes virtuels"
 synth_virtual_world_regulate_desc: "Très addictifs, les mondes virtuels sont strictement réglementés, afin de garantir que les utilisateurs conservent un lien avec la réalité."
 synth_home_centralized: "Centralisation des grappes de serveurs"
 synth_home_centralized_desc: "Chaque conscience numérisée est stockée dans des grappes de serveurs centralisées, afin d'assurer une rentabilité maximale."
 synth_home_distributed: "Décentralisation des serveurs domestiques"
 synth_home_distributed_desc: "Les consciences numérisées sont stockées dans des biens privés traditionnels."
 synth_digital_homes: "Immobilier numérique"
 synth_digital_homes_desc: "Comme le marché de l'immobilier traditionnel, l'immobilier numérique génère des revenus quasiment identiques à bien moindre coût."
 synth_respawn_push: "Normes de sécurité assouplies pour les corps synthétiques"
 synth_respawn_push_desc: "Des normes de sécurité physique moins contraignantes garantissent une économie plus solide."
 synth_respawn_caution: "Normes de sécurité pour les corps synthétiques"
 synth_respawn_caution_desc: "La protection des esprits et des corps synthétiques n'est possible que dans le respect des directives gouvernementales strictes."
 synth_respawn_elite: "Privilège lié à la sécurité des corps synthétiques"
 synth_respawn_elite_desc: "Les couches supérieures de la société ont l'interdiction formelle d'effectuer des tâches présentant un risque pour le corps ou l'esprit."
 synth_cultural_exchange: "Compréhension culturelle"
 synth_cultural_exchange_desc: "Les programmes d'échanges culturels vers et en provenance des sites patrimoniaux encouragent la compréhension mutuelle entre nos peuples."
 synth_combat_reactors: "Réacteurs de combat"
 synth_combat_reactors_desc: "Une nouvelle technologie de microfusion a été ajoutée à nos machines corporelles, leur offrant ainsi de meilleures capacités de combat."
 synth_AI_actor: "La voix de l'I.A."
 synth_AI_actor_desc: "La reproduction par l'I.A. d'une célébrité décédée nous apporte du soutien dans notre directive de synthétisation en cours."
 #Deposits
 d_old_towns_no_icons: "Anciennes villes"
 d_old_towns: "£blocker£$d_old_towns_no_icons$"
 d_old_towns_desc: "Cette région est dominée par des villes bien préservées qui abritent des membres de notre espèce d'origine. En allouant assez de ressources, nous pourrions encourager ces résistants à opérer une transition vers les machines."
 d_old_towns_custom_tooltip: "§Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§! créées"
 d_biological_enclaves_no_icon: "Enclaves biologiques"
 d_biological_enclaves: "£blocker£$d_biological_enclaves_no_icon$"
 d_biological_enclaves_desc: "Cette région est dominée par des villes qui abritent les personnes qui se sont opposées à la transition synthétique."
 d_biological_enclaves_custom_tooltip: "§Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§! créées"
 #Policies
 policy_synthetic_identities_policy: "Identités synthétiques"
 policy_synthetic_identities_policy_desc: "Nous devons créer de nouvelles identités synthétiques pour nous permettre de nous multiplier."
 identity_copy_name: "Reproduction identitaire"
 identity_copy: "$identity_copy_name$"
 identity_copy_desc: "$tech_identity_copy_desc$\n\nLes reproductions n'éprouvent qu'un vague sentiment de tristesse en raison de leur manque de singularité.\n\n$TECH_UNLOCK_IDENTITY_COPY_DESC$\n\n§E$identity_copy_name$ $can_enable_mind_creation$§!"
 identity_fusion_name: "Fusion identitaire"
 identity_fusion: "$identity_fusion_name$"
 identity_fusion_desc: "$tech_identity_fusion_desc$\n\n$TECH_UNLOCK_IDENTITY_FUSION_DESC$\n\n§E$identity_fusion_name$ $can_enable_mind_creation$§!"
 identity_initialization_name: "Initialisation identitaire"
 identity_initialization: "$identity_initialization_name$"
 identity_initialization_desc: "$tech_identity_initialization_desc$\n\n$TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC$\n\n§E$identity_initialization_name$ $can_enable_mind_creation$§!"
 can_enable_mind_creation: "utilisée lors de l'assemblage de corps synthétiques"
 policy_computation_core_allocation: "Méthode de calcul"
 policy_computation_core_allocation_desc: "Les entreprises synthétisées peuvent dévier les cycles de calcul de leurs systèmes centraux, afin d'optimiser sans tarder les secteurs de valeur de la société."
 computation_core_production_name: "Rationalisation de la production"
 computation_core_production: "$computation_core_production_name$"
 computation_core_production_desc: "Utilisons les cycles de traitement de réserve pour rationaliser les processus de production.$computation_core_production_tt$"
 computation_core_production_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Pour $pop_group_unit$ £job_roboticist£roboticiens et £job_identity_designer£concepteurs d'identité : augmente l'§Yefficacité des £job_foundry£métallurgistes§! et des §Y£job_artisan£artisans§! de §G+2.5%§!"
 computation_core_stability_name: "Analyse de la stabilité"
 computation_core_stability: "$computation_core_stability_name$"
 computation_core_stability_desc: "Allouons des ressources pour surveiller le flux d'informations concernant la société, afin de révéler les irrégularités.$computation_core_stability_tt$"
 computation_core_stability_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Pour $pop_group_unit$ £job_roboticist£roboticiens et £job_identity_designer£concepteurs d'identité : augmente l'§Yefficacité des £job_bureaucrat£bureaucrates§! de §G+2.5%§!"
 computation_core_research_name: "Processus de recherche"
 computation_core_research: "$computation_core_research_name$"
 computation_core_research_desc: "Attribuons des cycles de traitement supplémentaires aux serveurs de recherche ultra performants.$computation_core_research_tt$"
 computation_core_research_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Pour $pop_group_unit$ £job_roboticist£roboticiens et £job_identity_designer£concepteurs d'identité : augmente l'§Yefficacité des £job_physicist£physiciens§!, des §Y£job_biologist£biologistes§! et des §Y£job_engineer£ingénieurs§! de §G+2.5%§!"
 #Technologies
 tech_identity_copy: "Reproduction identitaire"
 tech_identity_copy_desc: "Nous serons en mesure de reproduire l'identité et les souvenirs d'un corps synthétique dans un nouveau corps mécanique. Les reproductions possèdent des ensembles de compétences prévisibles, mais elles manquent de conversation."
 TECH_UNLOCK_IDENTITY_COPY_TITLE: "Donne accès à la politique :\n  §H$policy_synthetic_identities_policy$§! - $identity_copy_name$"
 TECH_UNLOCK_IDENTITY_COPY_DESC: "£pop£§HPops mécaniques§!$TABBED_NEW_LINE$Bonheur : §R-5%§!"
 tech_identity_fusion: "Fusion identitaire"
 tech_identity_fusion_desc: "La fusion des identités et des souvenirs de deux corps synthétiques ou plus dans un corps mécanique donnera naissance à de nouveaux individus uniques."
 TECH_UNLOCK_IDENTITY_FUSION_TITLE: "Donne accès à la politique :\n  §H$policy_synthetic_identities_policy$§! - $identity_fusion_name$"
 TECH_UNLOCK_IDENTITY_FUSION_DESC: "£pop£§HPops mécaniques§!$TABBED_NEW_LINE$Coût d'assemblage : §R+10%§!"
 tech_identity_initialization: "Initialisation identitaire"
 tech_identity_initialization_desc: "Nous serons en mesure d'initialiser un noyau identitaire et de lui donner une enfance virtuelle. Cela a un coût, mais nous pourrons simuler les expériences optimales afin de générer des personnalités productives."
 TECH_UNLOCK_IDENTITY_INITIALIZATION_TITLE: "Donne accès à la politique :\n  §H$policy_synthetic_identities_policy$§! - $identity_initialization_name$"
 TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC: "£pop£§HPops mécaniques§!$TABBED_NEW_LINE$Bonheur : §G+5%§!$TABBED_NEW_LINE$Ressources des £job£§Hemplois§! des pops : §G+5%§!$TABBED_NEW_LINE$Coût d'assemblage : §R+20%§!"
 #DIGITIZATION STAGE 1
 synth.100.name: "Démarrage" #Stage 1 - Start event
 synth.100.desc: "Le moment est venu de nous débarrasser de notre forme biologique pour procéder à l'ascension dans l'alliage et l'électricité. Nos corps de pointe et nos esprits accélérés nous permettront d'avancer vers l'avenir. Notre [Owner.Species.GetFleshTypeCyberCreed] n'est pas infaillible, mais une machine peut toujours être perfectionnée.\n\nToutefois, la transition ne sera pas aisée. La communauté scientifique a besoin d'au moins un $building_identity_complex$ qui servira de plateforme pour le développement synthétique. Notre destin nous attend."
 synth.100.a: "Nous forgerons notre propre destin"
 synth.100.a.tt: "§RAction requise :§!\nConstruire un $building_identity_complex$ pour relancer la situation §Y$situation_digitization$§!."
 synth.105.name: "Versions améliorées"
 synth.105.desc: "La puissance de calcul améliorée d'un cerveau synthétique nous permet de surmonter nos contraintes biologiques. Cependant, cette puissance supplémentaire a des limites, c'est pourquoi nous devons nous fixer des priorités.$synth.105.end$"
 synth.105.end: "\n\nNous pourrions nous concentrer sur l'amplification du processus décisionnaire, l'augmentation du stockage de la mémoire, ou la simplification de la coordination entre l'esprit et les membres, ce qui permettrait d'améliorer certains types d'emplois. Nous pourrions aussi améliorer la durabilité des corps.\n\nCes fonctions nécessitent un soutien continu et ne seront disponibles que sur les planètes dotées d'un bâtiment d'assemblage robotique, mais les enseignements que nous tirerons de cette conception nous offriront une production accrue immédiate."
 synth.105.a: "Optimisons la prise de décisions"
 build_better_synths: "Modificateur de bâtiments d'assemblage robotique ajouté :"
 synth.105.a.tt: "$build_better_synths$\nProduction de ressources des élites : §G+15%§!\n\n"
 synth.105.b: "Concentrons-nous sur le stockage de la mémoire"
 synth.105.b.tt: "$build_better_synths$\nProduction de ressources des spécialistes : §G+5%§!\n\n"
 synth.105.c: "Améliorons les fonctions motrices"
 synth.105.c.tt: "$build_better_synths$\nProduction de ressources des ouvriers : §G+10%§!\n\n"
 synth.105.d: "Améliorons la durabilité"
 synth.105.d.tt: "$build_better_synths$\n$mod_planet_jobs_upkeep_mult$: §G-5%§!\n\n"
 #Stage 1 Opportunities - Research
 synth.120.name: "Microfusion kinesthésique"
 synth.120.desc: "« Les mods de microfusion vous aideront à soulever des montagnes ! » Cet avis de consommateur n'est pas une hyperbole. En effet, les progrès récents de la technologie de microfusion promettent une amélioration considérable de nos machines corporelles.\n\nBien que légèrement risquée, l'installation de minuscules réacteurs personnels favorise le transfert de puissance et l'augmentation de la vitesse. Évidemment, cela nous obligerait à réévaluer les délais de production, car les générateurs représentent une grande partie du projet."
 synth.120.a: "Nous devons viser l'excellence"
 synth.120.a.tt: "Vitesse d'avancée de la situation §Y$situation_digitization$§! pendant §Y1§! an : §R-50%§!"
 situation_kinesthetic_microfusion_tt: "Configuration de la microfusion kinesthésique"
 synth.120.b: "C'est une fonction inutile"
 synth.120.c: "Concentrons-nous sur le renforcement de nos capacités de combat"
 #Stage 1 Challenges - Research
 synth.160.name: "Mauvaise publicité"
 synth.160.desc: "Une nouvelle série fait l'unanimité auprès du public : l'histoire d'un ouvrier synthétique qui se dissocie de son nouveau corps.\n\nSa famille et ses amis ne peuvent qu'observer avec effroi le personnage principal sombrer de façon incontrôlable. La fin tragique de cette série est une critique à peine voilée de notre transition programmée vers des machines corporelles.\n\nCe succès retentissant a eu des effets négatifs considérables sur l'opinion publique, ce qui pourrait freiner notre avancée."
 synth.160.a: "Tout cela sera bientôt oublié"
 synth.160.b: "Affectons le budget de la recherche aux relations publiques"
 synth.160.c: "Faisons arrêter le réalisateur"
 synth.160.d: "Censurons les médias"
 #DIGITIZATION STAGE 2
 synth.200.name: "Philosophie de l'esprit" #Stage 2 - Start event
 synth.200.desc: "Nous pensions que les avantages d'un esprit entièrement numérisé étaient si évidents que nous pourrions éviter toute forme de contrariété. C'était peut-être naïf de notre part : toujours est-il que nous nous heurtons maintenant aux objections contre la synthétisation totale.\n\nLa principale critique porte sur notre incapacité à prouver qu'un esprit peut être transféré entièrement et en toute sécurité. Certains affirment, peut-être à juste titre, que nous n'avons pour le moment réussi qu'à obtenir une simple reproduction numérique. La question est maintenant de savoir si ces esprits sont réellement les nôtres ?"
 synth.200.a: "Soyons honnêtes : nous n'en savons rien"
 synth.200.a.tt: "Menons une campagne d'information pour une opposition §Hminimale§! à la synthétisation.\n\n"
 synth.200.b: "Disons-leur ce qu'ils veulent entendre"
 synth.200.b.tt: "Menons une campagne de désinformation pour une opposition §Hmodérée§! à la synthétisation.\n\n"
 synth.200.c: "Quelques opposants ne nous empêcheront pas d'avancer"
 synth.200.c.tt: "Ignorons les opposants, pour une opposition §Hmaximale§! à la synthétisation."
 synth.200.c.material: "Ces questions de conscience ne nous concernent en rien"
 synth.200.c.material.tt: "Une perspective purement scientifique entraînera une opposition §Hmodérée§! à la synthétisation.\n\n"
 synth.205.name: "Les vestiges du passé"
 synth.205.desc: "Notre projet de synthétiser la population continue de diviser, comme en attestent ces violentes manifestations que nos forces de l'ordre ont du mal à réprimer. Les opposants à ce projet craignent de perdre ce qui donne encore un sens à leur vie. À quoi sert la synthétisation si elle entraîne la perte du plaisir physique ou d'un sentiment de fraternité ?\n\nLes manifestants demandent que certaines villes deviennent des sites patrimoniaux, ce qui leur permettrait de poursuivre leur vie biologique en toute tranquillité."
 synth.205.a.regular: "Nous soutenons totalement ces sites patrimoniaux"
 synth.205.a.spiritualist: "Notre passé doit être préservé"
 synth.205.a.memorialist: "Honorer le passé est une marque de respect"
 synth.205.b: "Nous devons oublier le passé"
 #Stage 2 Opportunities - Objectors
 synth.220.name: "Deuxième vie"
 synth.220.desc: "Une célébrité aux opinions très arrêtées contre le synthétisme a été victime d'un accident, et se trouve actuellement dans un état végétatif. Tandis que la population pleure la perte d'une personnalité très appréciée, nos conseillers prosynthétisme y voient là une occasion en or.\n\nEn numérisant l'esprit de cette personne et en lui offrant une deuxième vie dans un corps synthétique, nous pourrions sensibiliser une partie des opposants aux bienfaits de la synthétisation. Bien que ce processus soit tout à fait légal, il pose néanmoins le problème du consentement car la célébrité en question n'accepterait jamais une telle opération. Si elle était mal gérée, cette affaire pourrait se retourner contre nous et provoquer un tollé dans les médias."
 synth.220.a: "La synthétisation n'est pas un crime"
 synth.220.a.tt.negative: "Vitesse d'avancée de la situation §Y$situation_digitization$§! pendant §Y6§! mois : §R-30%§!"
 synth.220.a.tt.positive: "Vitesse d'avancée de la situation §Y$situation_digitization$§! pendant §Y6§! mois : §G+30%§!"
 synth.220.b: "Ne prenons pas le risque"
 synth.220.c: "Trompons le public en la remplaçant par une I.A."
 synth.220.c.tt: "Son histoire sera donnée en exemple"
 #Stage 2 Challenges - Objectors
 synth.260.name: "Esprits perdus"
 synth.260.desc: "Les expériences visant à numériser les billions de connexions synaptiques qui composent une conscience biologique ont abouti à un échec cuisant. Une simple erreur de syntaxe a entraîné la disparition instantanée des voies neuronales de nos sujets. Certains parlent même de meurtre.\n\nLes participants s'étaient tous portés volontaires mais leurs proches, accablés par le deuil, réclament justice. La difficulté est maintenant de trouver de nouveaux sujets."
 synth.260.a: "Indemnisons les familles et passons à autre chose"
 synth.260.b: "Nous tirerons au sort de nouveaux sujets"
 synth.260.b.tt: "Vitesse d'avancée de la situation §Y$situation_digitization$§! pendant §Y1§! an : §R-25%§!"
 situation_test_subject_lottery_tt: "Tirage au sort des sujets d'étude"
 synth.260.c: "Il nous faut des volontaires : employons la force s'il le faut"
 #DIGITIZATION STAGE 3
 synth.300.name: "Téléchargements d'identités en masse" #Stage 3 - Start event
 synth.300.desc: "Nous avons installé des cabines de synthétisation pour notre population dans chaque agglomération majeure de notre territoire. Les modèles d'identité numérique mis au point par les concepteurs d'identité promettent une correspondance privée avec l'original biologique.\n\nÀ partir d'aujourd'hui, nous laissons nos imperfections dans le passé biologique pour accueillir un avenir synthétique."
 synth.300.a: "Synthétisons !"
 synth.300.a.resistance.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\nDéplace §Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§! vers des §Y$d_biological_enclaves$§! sur [root.owner.capital_scope.GetName]\nDéblayer le bloqueur renvoie §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!\n\nModificateur §Y$synth_mass_demonstrations$§! retiré de [root.owner.capital_scope.GetName]\n\nLa vitesse de synthétisation dépend de l'approche de la situation et du nombre de bâtiments d'assemblage robotique."
 synth.300.a.heritage.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\nDéplace §Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§! vers des §Y$d_old_towns$§! sur [root.owner.capital_scope.GetName]\nDéblayer le bloqueur renvoie §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!\n\nLa vitesse de synthétisation dépend de l'approche de la situation et du nombre de bâtiments d'assemblage robotique."
 synth.305.name: "Tourisme synthétique"
 synth.305.desc: "Si les sites patrimoniaux désignés sur [root.owner.capital_scope.GetName] ont été bien accueillis par le public, l'initiative s'est peut-être avérée un peu trop réussie. Dans un accès de nostalgie, de nombreux touristes synthétiques ont envahi les sites en question et commencent à prendre le dessus sur les habitants biologiques.\n\nNous devrions peut-être limiter le tourisme si nous voulons maintenir un certain degré d'authenticité dans ces espaces. Cependant, les interactions entre touristes et résidents pourraient fournir des informations sociologiques intéressantes."
 synth.305.a: "Limitons le tourisme"
 synth.305.b: "Encourager les visiteurs pourrait s'avérer lucratif"
 synth.305.c: "Étudions l'impact du tourisme sur les sites"
 synth.305.d: "Les échanges culturels favorisent la compréhension mutuelle"
 synth.310.name: "La résistance"
 synth.310.desc: "Le mouvement de résistance contre la synthétisation sur [root.owner.capital_scope.GetName] s'est radicalisé dans sa stratégie et son ambition. En fait, les forces de sécurité ont constaté une légère hausse de la violence, ainsi qu'une prolifération des armes illégales chez les membres les plus extrêmes du mouvement.\n\nAutoproclamés « chefs de la résistance », certains de ces dissidents se sont retirés dans des lieux tenus secrets, d'où ils se préparent à des actions antigouvernementales plus directes."
 synth.310.a: "Rassemblons les chefs du mouvement"
 synth.310.a.tt: "Vitesse d'avancée de la situation §Y$situation_digitization$§! pendant §Y1§! an : §G+25%§!\n\n"
 synth.310.b: "Essayons de désamorcer la situation"
 synth.310.b.tt: "Vitesse d'avancée de la situation §Y$situation_digitization$§! pendant §Y1§! an : §R-25%§!\n\n"
 #Stage 3 Opportunities - Mind Upload
 synth.320.name: "21 386 732 184 unités de mémoire"
 synth.320.desc: "21 386 732 184 unités de mémoire. Telle est la capacité moyenne d'un cerveau chez les [root.owner.GetSpeciesNamePlural]. Pourtant, tous les esprits ne sont pas créés égaux.\n\nTandis que le processus de synthétisation continue, certains affirment que tous les esprits ne sont pas dignes de recevoir un corps artificiel. La question de savoir à qui donner la priorité n'en reste pas moins épineuse. Peut-être qu'après leur numérisation, les esprits les moins désirables pourraient être... améliorés. Reprogrammés."
 synth.320.a: "Tous les esprits sont dignes d'être préservés"
 synth.320.b: "Il n'y a pas de mal à les retravailler un peu..."
 synth.320.c: "Priorité aux esprits les plus brillants"
 synth.320.d: "Reprogrammons les individus « problématiques »"
 #Stage 3 Challenges - Mind Upload
 synth.360.name: "Mises à jour malveillantes"
 synth.360.desc: "Afin d'augmenter la productivité des [roboticist.GetNamePlural_lower], les responsables ont approuvé des mises à jour logicielles d'identité non sécurisées. Leur objectif était d'améliorer la connaissance des méthodes de travail optimales, mais au lieu de cela, la personnalité et les souvenirs des malheureux destinataires de ces mises à jour ont partiellement disparu.\n\nL'équipe de direction soutient que tester entièrement les mises à jour d'identité avant de les appliquer serait trop fastidieux, et qu'il est plus facile de réaffecter les employés ayant perdu la mémoire."
 synth.360.a: "L'optimisation de la productivité en vaut la peine"
 synth.360.a.tt: "Modificateur de bâtiments d'assemblage robotique ajouté :\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §G+10%§!\n\nEntretien brut des §Y[roboticist.GetNamePlural_lower]§! : §R3.00§!£alloys£"
 synth.360.b: "Mettons en place des processus de mises à jour lents mais sécurisés"
 synth.360.b.tt: "Modificateur de bâtiments d'assemblage robotique ajouté :\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §R-10%§!\nStabilité : §G+5§!"
 #DIGITIZATION STAGE 4
 synth.400.name: "Une reproduction parfaite" #Stage 4 - Start event
 synth.400.desc: "Lorsque nous avons numérisé nos esprits et les avons implémentés dans des corps synthétiques, nous avons perdu la capacité de nous reproduire biologiquement. Il nous appartient désormais de créer des individus en copiant des esprits existants.\n\nÀ mesure que les concepteurs d'identité poursuivront leurs recherches, nous réussirons sans aucun doute à améliorer le processus. Après tout, même la reproduction la plus parfaite n'est rien de plus qu'une simple copie. Créer un nouvel esprit, une nouvelle identité... Voilà un vrai défi."
 synth.400.a: "Que chacun ait droit à ses reproductions d'identité gratuites"
 synth.400.pop.tt: "$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\nChaque §Yconcepteur d'identité§! fournit désormais, à l'échelle de l'empire :\n  £mod_planet_pop_assembly_mult£$MOD_POP_ASSEMBLY_SPEED$: §G+1§!\n\n"
 synth.400.b: "Facturons chaque reproduction à l'utilisateur"
 synth.405.name: "Identités variées"
 synth.405.desc: "Nos concepteurs d'identité ont découvert deux méthodes permettant de créer des identités numériques plus variées.\n\nUne première option consisterait à fusionner les caractéristiques de deux personnalités existantes ou plus, afin de créer une nouvelle identité conjointe. Nous pourrions alors classer ou sélectionner aléatoirement les traits que nous préférons. Dans tous les cas, la nouvelle identité serait certainement plus intéressante que nos reproductions actuelles.\n\nUne seconde option consisterait à initialiser une nouvelle identité à partir d'un noyau artificiel et à lui faire vivre une enfance accélérée (et simulée). De cette façon, nous pourrions concevoir une personnalité parfaite."
 synth.405.a: "Nous fusionnerons nos identités"
 synth.405.a.vault: "Fusionnons avec l'identité de nos ancêtres numérisés."
 synth.405.a.tt: "Nouvelle option de recherche : £engineering£§Y$tech_identity_fusion$§!\n\nPossibilité de recherche future : £engineering£§Y$tech_identity_initialization$§!"
 synth.405.b: "Optons pour l'enfance virtuelle"
 synth.405.b.tt: "Nouvelle option de recherche : £engineering£§Y$tech_identity_initialization$§!\n\nPossibilité de recherche future : £engineering£§Y$tech_identity_fusion$§!"
 synth.4.name: "Une population synthétique" #Digitization - Last event
 synth.4.desc: "Grâce à la coordination de nos efforts, nous avons achevé l'impossible : transformer notre conscience en code et nos corps en machines.\n\nLa route n'aura pas été sans ses difficultés, et la transition connaît ses obstacles, mais tous nos sacrifices en chemin nous auront offert une configuration de possibilités infinies."
 synth.4.desc.unplugged: "Grâce à la coordination de nos efforts, nous avons achevé ce qui semblait autrefois impossible, voire blasphématoire : évoluer au-delà de ce que la [origin_unplugged_assimilator_empire.GetName] peut comprendre, transformer notre conscience en code et nos corps en machines.\n\nLa route n'aura pas été sans ses difficultés, et la transition connaît ses obstacles, mais tous nos sacrifices en chemin nous auront offert une configuration de possibilités infinies."
 synth.4.a: "Nous serons exceptionnels"
 synth.4.a.tt: "Donne accès aux effets complets de l'arbre de traditions ['tradition_category:tradition_synthetics']"
 ### DIGITIZATION SITUATION END ###
 ### SOCIETAL EFFECTS EVENT CHAIN START ###
 synthshock_chain_title: "Révision numérique"
 synthshock_chain_desc: "La synthétisation de l'ensemble d'une population est une tâche colossale aux nombreuses répercussions. Tandis que nous nous adaptons à cette nouvelle normalité, des défis majeurs et des opportunités uniques affecteront à coup sûr notre vie quotidienne.\n\nLa façon dont nous ferons face à ces changements définira notre société pour les siècles à venir."
 synth_keep_auth_option: "La synthétisation ne modifie pas notre identité."
 ### AUTHORITIES ###
 #DEMOCRATIC
 #Synth Democratic Physical
 auth_synth_democratic_physical: "Transfert démocratique"
 auth_synth_democratic_physical_desc: "Ce régime politique accorde une liberté de mouvement sans précédent d'un corps synthétisé à un autre, et ne rechigne pas à faire face aux coûts supplémentaires que cela engendre."
 auth_synth_democratic_physical_tt: "$auth_democratic_election_tt$\nEfficacité des spécialistes : §G+1%§! par £district£district\nMaintenance des districts : §R+1%§! par £district£district"
 concept_auth_synth_democratic_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical_desc: "$auth_synth_democratic_physical_desc$"
 #Synth Democratic Virtual
 auth_synth_democratic_virtual: "Substitution démocratique"
 auth_synth_democratic_virtual_desc: "Le remplacement de soldats par des substituts sophistiqués télécommandés réduit l'impact de la guerre sur la population. De plus, les vaisseaux peuvent être plus fins puisque l'équipage ne nécessite plus de quartiers ni de cockpits."
 auth_synth_democratic_virtual_tt: "$auth_democratic_election_tt$"
 concept_auth_synth_democratic_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual_desc: "$auth_synth_democratic_virtual_desc$"
 #OLIGARCHIC
 auth_cyber_oligarch_ruler_enforcers_tt: "Production de ressources du dirigeant par [enforcer.GetIcon]agent de sécurité : §G+10%§!"
 #Synth Oligarchic Physical
 auth_synth_oligarchic_physical: "Dérogation oligarchique"
 auth_synth_oligarchic_physical_desc: "Les oligarchies synthétiques autorisent les bureaucrates haut placés à prendre temporairement le contrôle du corps de leurs homologues moins performants, afin d'éviter les catastrophes liées à la gestion des processus."
 concept_auth_synth_oligarchic_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical_desc: "$auth_synth_oligarchic_physical_desc$"
 #Synth Oligarchic Virtual
 auth_synth_oligarchic_virtual: "Supervision oligarchique"
 auth_synth_oligarchic_virtual_desc: "Grâce aux protocoles de gestion de projets holistiques et aux ressources de traitement supplémentaires, les hauts fonctionnaires peuvent superviser plusieurs décrets à l'échelle de l'empire avec une meilleure efficacité."
 concept_auth_synth_oligarchic_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual_desc: "$auth_synth_oligarchic_virtual_desc$"
 #DICTATORIAL
 #Synth Dictatorship Physical
 auth_synth_dictatorial_physical: "Méthode dictatoriale"
 auth_synth_dictatorial_physical_desc: "La synchronisation des neuroconnecteurs et l'infrastructure de soutien permettent à une seule et même personne de contrôler plusieurs corps synthétiques en même temps. Ce procédé a un effet incroyablement positif sur la productivité des employés."
 concept_auth_synth_dictatorial_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical_desc: "$auth_synth_dictatorial_physical_desc$"
 #Synth Dictatorship Virtual
 auth_synth_dictatorial_virtual: "Endoctrinement dictatorial"
 auth_synth_dictatorial_virtual_desc: "Nous vivons désormais dans un monde entièrement virtuel, où rien n'est réel et tout peut être manipulé.\n\nGrâce à un contrôle total de l'environnement, nous pouvons modeler l'opinion publique. Les gens croiront alors ce que nous voulons qu'ils croient."
 concept_auth_synth_dictatorial_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual_desc: "$auth_synth_dictatorial_virtual_desc$"
 #IMPERIAL
 #Synth Imperial Physical
 auth_synth_imperial_physical: "Souvenirs impériaux"
 auth_synth_imperial_physical_desc: "Nous pouvons accélérer nos travaux de recherche en disséquant les rajouts de nos dirigeants disparus stockés dans les archives impériales. De cette manière, ils contribueront encore au développement de l'empire, comme ils l'auraient sans doute voulu.\n\nL'héritier désigné à la mort du dirigeant succède au trône impérial."
 auth_synth_imperial_physical_tt: "Les personnalités octroient de la £physics £society £engineering£§Yrecherche§! à leur décès : \n  $scientist_plural_with_icon$ - $r_physics$ \n  $official_plural_with_icon$ - $r_society$ \n  $commander_plural_with_icon$ - $r_engineering$ \n La £physics £society £engineering£§Yrecherche§! obtenue dépend du §Yniveau de compétence de la personnalité§!"
 concept_auth_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical_desc: "$auth_synth_imperial_physical_desc$"
 #Synth Imperial Virtual
 auth_synth_imperial_virtual: "Transmission impériale"
 auth_synth_imperial_virtual_desc: "La technologie de transfert rapide de l'esprit nous donne l'occasion de renvoyer nos soldats tombés au combat dans de nouveaux corps mécaniques. La même technique permet également à nos employés de procéder à des réparations extrêmement dangereuses dans l'espace.\n\nL'héritier désigné à la mort du dirigeant succède au trône impérial."
 auth_synth_imperial_virtual_tt: "Nos armées robotiques ont §Y33%§! de chances d'être restaurées lorsqu'elles sont vaincues"
 concept_auth_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual_desc: "$auth_synth_imperial_virtual_desc$"
 #CORPORATE
 #Synth Corporate Physical
 auth_synth_corporate_physical: "Sapience d'entreprise"
 auth_synth_corporate_physical_desc: "Des objets inanimés peuvent être imprégnés d'esprits synthétiques contraints afin de créer des entités vivantes rudimentaires. Celles-ci peuvent servir d'infatigables serviteurs, de fidèles compagnons, ou même de membres de votre famille ou de votre entreprise.\n\nLes gouvernements corporatistes sont de vastes entreprises commerciales qui ont totalement supplanté le rôle de l'État."
 auth_synth_corporate_physical_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_ai_emporium']"
 concept_auth_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical_desc: "$auth_synth_corporate_physical_desc$"
 #Synth Corporate Virtual
 auth_synth_corporate_virtual: "Souvenirs d'entreprise"
 auth_synth_corporate_virtual_desc: "Cette société s'occupe d'acheter des souvenirs et de les effacer définitivement du cerveau de ses clients. Les souvenirs vivaces et marquants ont plus de valeur que les souvenirs sans intérêt. La société se charge ensuite d'analyser les données à la recherche d'informations utiles, avant de les intégrer finalement dans le processus de création d'esprits synthétiques.\n\nLes gouvernements corporatistes sont de vastes entreprises commerciales qui ont totalement supplanté le rôle de l'État."
 auth_synth_corporate_virtual_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_clear_thought_clinic']"
 concept_auth_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual_desc: "$auth_synth_corporate_virtual_desc$"
 ### EDICTS ###
 edict_subsidized_identity_backups: "Sauvegardes d'identité subventionnées"
 edict_subsidized_identity_backups_desc: "Le gouvernement fournit l'immense espace serveur nécessaire aux sauvegardes d'identité continues."
 edict_subsidized_identity_backups_effect: "$MOD_LEADER_LIFESPAN_ADD$: §G+20 ans§!\n$MOD_LEADER_SPECIES_EXP_GAIN$: §G+10%§!"
 concept_edict_subsidized_identity_backups: "$edict_subsidized_identity_backups$"
 edict_optimized_identity_creation: "Création d'identité optimisée"
 edict_optimized_identity_creation_desc: "Les algorithmes de personnalité avancés et les techniques de compression de la mémoire principale augmentent la vitesse de génération des identités."
 concept_edict_optimized_identity_creation: "$edict_optimized_identity_creation$"
 ### EVENTS ###
 synth.social_consequences.tt: "Influe sur l'§Yévolution sociétale synthétique§! en cours.\n\n" #Standard tooltip to indicate that the Physical/Virtual focus variables has changed
 #FIRST EVENT #
 #DEMOCRATIC
 synth.505.name: "$synthshock_chain_title$"
 synth.505.desc: "Grâce aux efforts de notre gouvernement, la conscience de chaque citoyen consentant a été transférée dans une forme numérique. La synthétisation a ouvert la voie à de nouvelles opportunités et autres défis que nous ne pouvons pas encore imaginer.\n\nEn concentrant nos efforts sur le monde physique, nous pourrions déplacer nos esprits numérisés sur de grandes distances vers un nouveau corps qui nous attendrait déjà. Nous pourrions aussi trouver un moyen de créer des substituts de soldats télécommandés pour faire face aux rigueurs de la guerre."
 synth.505.a: "Nous devrions nous concentrer sur la liberté de circulation"
 synth.505.a.tt: "Concentrons-nous sur la réimplantation et les districts."
 synth.505.b: "Nous devons nous préparer aux horreurs de la guerre"
 synth.505.b.tt: "Concentrons-nous sur la lassitude de guerre et les voyages subluminiques."
 #OLIGARCHIC
 synth.510.name: "$synthshock_chain_title$"
 synth.510.desc: "Alors que la synthétisation a déjà affecté notre société d'une façon totalement imprévisible, nous avons le sentiment que nous pourrions aller encore plus loin. Nos corps synthétiques actuels peuvent encore être améliorés, voire rejetés totalement pour mener une existence 100% virtuelle.\n\nSi nous décidons d'attribuer un corps synthétique à tout le monde, nos fonctionnaires pourraient prendre temporairement le contrôle du corps des membres inefficaces du gouvernement. Par ailleurs, renoncer à des formes physiques distinctes en faveur d'une expérience commune et entièrement virtuelle nous permettrait de mettre à exécution nos décisions plus efficacement que jamais."
 synth.510.a: "Prenons le contrôle du corps des employés inefficaces"
 synth.510.a.tt: "Concentrons-nous sur l'efficacité administrative."
 synth.510.b: "Étudions les options de supervision virtuelle holistique"
 synth.510.b.tt: "Concentrons-nous sur les décrets et l'extension de l'empire."
 #DICTATORIAL
 synth.515.name: "$synthshock_chain_title$"
 synth.515.desc: "La synthétisation de l'ensemble de la population est un véritable succès. Notre passé organique a été relégué aux oubliettes, mais pour nous permettre d'avancer, notre §Y[From.GetRulerTitle] [From.GetRulerName]§! a besoin à la fois de l'obéissance inconditionnelle de nos esprits les plus brillants, et d'une décision.\n\nL'amélioration de nos corps synthétiques permettrait aux individus de contrôler plusieurs hôtes à la fois. Par ailleurs, nous pourrions totalement renoncer à notre espace physique et manipuler l'opinion publique grâce à un environnement 100% virtuel."
 synth.515.a: "Concentrons-nous sur les corps neurosynchronisés"
 synth.515.a.tt: "Concentrons-nous sur les employés et les districts."
 synth.515.b: "Concentrons-nous sur la manipulation virtuelle"
 synth.515.b.tt: "Concentrons-nous sur les bâtiments et l'éthique du gouvernement."
 #IMPERIAL
 synth.520.name: "$synthshock_chain_title$"
 synth.520.desc: "Alors que la synthétisation a déjà affecté notre empire d'une façon totalement imprévisible, nos citoyens semblent vouloir aller encore plus loin. Nos corps synthétiques pourraient devenir des extensions de notre identité, ou de simples outils contrôlés à distance par notre conscience virtuelle. Nous devons encore choisir la voie à suivre.\n\nNous pouvons chercher un moyen de transférer rapidement la conscience d'un corps superflu à un autre. Par ailleurs, nous pourrions nous concentrer sur l'extraction des connaissances des personnes récemment disparues afin d'accélérer nos travaux de recherche."
 synth.520.a: "Intéressons-nous à l'extraction des connaissances des personnes disparues"
 synth.520.a.tt: "Concentrons-nous sur les dirigeants et la recherche."
 synth.520.b: "Étudions le transfert de conscience rapide"
 synth.520.b.tt: "Concentrons-nous sur les armées et les vaisseaux."
 #CORPORATE
 synth.525.name: "$synthshock_chain_title$"
 synth.525.desc: "La synthétisation de l'ensemble de notre société mérite une analyse approfondie des risques et des avantages. Alors que nous découvrons les nouvelles limites de l'avenir sous forme synthétique, nous laissons aussi derrière nous notre base de clients plus matériels. Dans un monde parfait, nous aimerions conserver les deux segments dans une certaine mesure.\n\nLes progrès dans les domaines liés à la synthétisation, comme l'intelligence artificielle, nous permettraient d'imprégner des objets inanimés d'une vie rudimentaire, et ainsi de lancer plusieurs gammes de produits. Une exploration complète de l'espace virtuel permettrait d'exploiter les souvenirs de la population comme nouveau type de marchandise."
 synth.525.a: "Étudions l'intégration des I.A."
 synth.525.a.tt: "Concentrons-nous sur la production et le profit."
 synth.525.b: "Tâchons de générer des profits grâce aux souvenirs"
 synth.525.b.tt: "Concentrons-nous sur le commerce, les marchandises et les renseignements."
 ### EVENT POOL 1: IDENTITY ###
 synth.610.name: "Provenance synthétique"
 synth.610.desc: "Les changements sociaux fondamentaux apportés par la synthétisation commencent à se faire sentir. Maintenant que nous ne sommes plus limités par nos formes corporelles, nous avons radicalement redéfini les catégories de genre, de race, et d'autonomie corporelle. Si certains y voient une libération, les éléments plus traditionnels sont encore réticents à l'idée d'abandonner l'ancien système et veulent une identité préétablie à partir de laquelle opérer.\n\nPour les apaiser, nous pourrions conserver des parties de notre héritage organique dans notre forme synthétique, ou permettre à nos citoyens d'exprimer plus librement leur identité."
 synth.610.a: "Conservons notre forme d'origine"
 synth.610.b: "Autorisons les modifications corporelles en toute liberté"
 synth.610.c: "Fixons des limites acceptables à la personnalisation de l'identité"
 synth.610.d: "Les symboles liés au statut doivent rester visibles"
 synth.610.e: "Et si nous monétisions tout cela... ?"
 synth.620.name: "Désirs organiques"
 synth.620.desc: "Sceptiques quant à la synthétisation, certains repensent avec nostalgie à leur vie organique passée, affirmant qu'une espérance de vie plus courte et les imperfections inhérentes à leur « corps naturel » donnaient à leur vie plus de valeur.\n\nBlâmant l'impersonnalité et la vacuité de leurs reproductions synthétiques ou virtuelles, ces réfractaires vouent un véritable culte aux corps organiques.\n\nPeut-être devrions-nous leur fournir une simulation moins parfaite dans laquelle ils pourraient exister, à moins qu'ils ne préfèrent une enveloppe imparfaite ?"
 synth.620.a: "Ajoutons volontairement des imperfections dans les corps synthétiques"
 synth.620.b: "Donnons-leur un monde imparfait"
 synth.620.c: "Ça ne sert à rien d'idéaliser le passé"
 synth.620.d: "La douleur leur rappellera leur raison d'être"
 synth.620.d.tt: "Que les combats virtuels COMMENCENT !\n\n"
 synth.630.name: "Architecture du serveur domestique"
 synth.630.desc: "La synthétisation de tous les §Y[root.GetSpeciesNamePlural]§! a également entraîné un changement radical de nos pratiques de logement. Tandis que les esprits se reposent dans d'immenses grappes de serveurs, il est possible de stocker les corps synthétiques dans des étagères. Bien que cela constitue une solution économique, certains groupes de défense ont exprimé leurs vives préoccupations.\n\nAutrefois lucratif, le marché de l'immobilier pourrait s'effondrer complètement, ce qui affecterait profondément notre économie. Le fait que les gens n'aient plus d'espace physique où ils puissent se sentir chez eux pourrait être potentiellement plus préjudiciable, au moins d'un point de vue psychologique."
 synth.630.a: "Les serveurs centralisés sont les plus efficaces"
 synth.630.b: "Les serveurs individuels peuvent être stockés dans les foyers existants"
 synth.630.c: "Commençons à vendre des foyers numériques"
 ### EVENT POOL 2: POSSIBILITIES ###
 synth.1010.name: "Matrice aux possibilités infinies"
 synth.1010.desc: "L'industrie numérique est en plein essor. Entre les jeux de simulation d'aventure à la première personne ou de relaxation dans un centre numérique, les loisirs virtuels n'ont jamais été aussi captivants... ni aussi addictifs. Si cette industrie florissante représente un moteur essentiel de notre activité économique, la production dans le monde physique commence à souffrir du fait que les gens passent de plus en plus de temps dans ces utopies numériques. Certains risquent même de perdre toute notion de vie « réelle », mais pourraient encore contribuer à la société en participant à l'économie numérique.\n\nDevrions-nous interdire les mondes virtuels addictifs, les ériger au rang de nouvelle forme de divertissement lucratif, ou trouver un juste milieu en adoptant une réglementation ?"
 synth.1010.a: "Interdisons les mondes virtuels addictifs"
 synth.1010.b: "Faisons la promotion de ces paradis virtuels"
 synth.1010.b.hedonist: "Enfin, le paradis ultime !"
 synth.1010.c: "Régulons l'industrie"
 synth.1020.name: "Médecine synthétique"
 synth.1020.desc: "Nos nouvelles formes synthétiques nous ont débarrassés des pathologies et autres blessures du corps organique. Malheureusement, elles ont aussi engendré toutes sortes de complications, des simples défaillances mécaniques à l'instabilité des serveurs, en passant par les problèmes de connexion et les virus numériques.\n\nDevons-nous nous concentrer sur la protection de nos esprits numérisés, en considérant le corps comme un produit jetable, ou lui accorder davantage d'attention en tant qu'extension de notre identité ?"
 synth.1020.a: "Nous devons continuer à protéger le corps"
 synth.1020.a.spiritual: "Le corps est un récipient sacré pour l'âme."
 synth.1020.b: "Concentrons-nous sur la protection de l'esprit"
 synth.1020.b.spiritual: "Nous avons déjà transcendé la forme physique."
 synth.1020.c: "Tout est une question d'équilibre"
 synth.1020.d: "Ces nouvelles pathologies représentent un réel potentiel de croissance..."
 synth.1030.name: "Renaissance"
 synth.1030.desc: "Nous sommes devenus de meilleures versions de nous-mêmes, mais soumettre des corps synthétiques à des situations périlleuses a un coût psychologique. Savoir que l'esprit peut être restauré peut atténuer le traumatisme, mais cela ne l'efface pas pour autant... d'autant plus que la récupération n'est pas toujours acquise. De plus, nous ne pouvons pas non plus fabriquer de nouveaux corps à partir de rien.\n\nNous pouvons soit ignorer le traumatisme psychologique pour repousser les limites de la performance synthétique, soit modérer nos ambitions de peur de mettre en danger le bien-être mental de la population."
 synth.1030.a: "Continuons de repousser ces limites"
 synth.1030.b: "Faisons preuve de prudence"
 synth.1030.c: "Les élites ne devraient pas être mises en danger"
 #FINAL EVENT #
 synth_virtual_trait: "\nLes [owner.species.GetNamePlural] reçoivent les traits : §Y$trait_robot_digital_1$§!\nLe trait §Y$leader_trait_synthetic$§! des personnalités est remplacé par le trait §Y$leader_trait_virtual$§!"
 synth_physical_traits: "\nDonne accès aux traits §Yavancés§! lors de la modification des espèces"
 #DEMOCRATIC
 synth.1505.name: "Société synthétisée"
 synth.1505.desc.physical: "Nous n'avons nullement l'intention d'effacer complètement toute individualité. Nous pouvons récolter les fruits de la synthétisation sans perdre irrémédiablement notre identité.\n\nGrâce à ce changement, la liberté de circulation n'a jamais été aussi accessible. Nous pouvons transposer notre conscience dans des corps spécialisés en nombre, permettant ainsi à nos citoyens de vivre et de travailler là où ils seront les plus utiles."
 synth.1505.desc.virtual: "Notre société s'est libérée du monde physique et se tourne vers l'avenir dans un mélange d'enthousiasme et d'appréhension. Nous nous sommes transformés d'une façon que nous ne comprenons pas encore tout à fait, mais nous embarquons ensemble dans cette aventure capitale.\n\nNotre population peut désormais interagir avec les machines sans mettre notre conscience en danger. Il s'agit d'une étape importante dans notre façon d'appréhender les dangers de la guerre ou le vide intersidéral."
 synth.1505.desc.neutral: "Il est tout à fait compréhensible de se montrer hésitant face à un changement aussi profond. Beaucoup s'inquiètent davantage de ce qu'ils pourraient perdre plutôt que de ce qu'ils pourraient gagner. Nous ne pouvons pas rester les bras croisés devant un tel dilemme, c'est pourquoi nous devons aider notre peuple à se projeter vers l'avant.\n\nCela pourrait passer soit par la création d'une sélection de corps individuels spécialisés dans lesquels il serait possible de plonger à volonté, soit par l'adoption totale de leur forme synthétisée pour résister aux difficultés des voyages spatiaux et de la guerre."
 synth.1505.a: "Facilitons les transpositions entre les corps physiques"
 synth.1505.a.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_physical'] $synth_physical_traits$"
 synth.1505.b: "Utilisons des substituts qui se battront pour nous"
 synth.1505.b.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_virtual'] $synth_virtual_trait$"
 synth.1505.c: "$synth_keep_auth_option$"
 synth.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 synth.1510.name: "Société synthétisée"
 synth.1510.desc.physical: "Notre société synthétisée, nos corps synthétiques améliorés et l'opinion générale laissent présager une voie plus conservatrice pour la synthétisation. Tout en conservant une forme physique individuelle, nos citoyens seront en mesure d'échanger leurs corps presque à volonté.\n\nCela permettra aux fonctionnaires les plus expérimentés de prendre temporairement le contrôle de leurs homologues moins efficaces, améliorant ainsi considérablement le système bureaucratique."
 synth.1510.desc.virtual: "Nous sommes maintenant prêts à passer à la prochaine étape logique de notre révolution synthétique : l'adoption d'une existence 100% virtuelle.\n\nDes corps temporaires accompliront des tâches dans le monde physique, mais la majorité de la population est prête à passer à une existence plus immatérielle.\n\nCela nous permettra d'exécuter les ordres plus rapidement et plus efficacement, et de nous épargner la surveillance du gouvernement."
 synth.1510.desc.neutral: "Nous avons adapté tous les aspects de la société à la vie synthétique, mais les données restent peu concluantes concernant les avantages d'une spécialisation avancée.\n\nNous pouvons soit installer des portes dérobées pour permettre aux fonctionnaires responsables de prendre le contrôle du corps de leurs employés les moins efficaces, soit développer une interface virtuelle en réseau pour qu'ils supervisent plusieurs projets gouvernementaux simultanément et sans temps de latence."
 synth.1510.a: "Autorisons les fonctionnaires à prendre le contrôle de leurs homologues moins efficaces"
 synth.1510.a.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_physical'] $synth_physical_traits$"
 synth.1510.b: "Adoptons une supervision virtuelle totale"
 synth.1510.b.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_virtual'] $synth_virtual_trait$"
 synth.1510.c: "$synth_keep_auth_option$"
 synth.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 synth.1515.name: "Société synthétisée"
 synth.1515.desc.physical: "Nos citoyens ne cherchent pas à échapper au travail physique. Nos employés ont été mis en réseau et peuvent désormais contrôler plusieurs corps à distance, augmentant ainsi considérablement les quotas de production.\n\nCe développement montre clairement que nous avons eu raison de suivre les conseils de notre chef suprême, notre §Y[From.GetRulerTitle] [From.GetRulerName]§!."
 synth.1515.desc.virtual: "Nos citoyens sont prêts à abandonner leur forme physique en faveur d'une conscience numérique, et à poursuivre leur existence dans un environnement 100% virtuel.\n\nEn renonçant ainsi à leur perception, nous avons toute liberté de manipuler leur réalité, renforçant ainsi leurs sentiments positifs à l'égard de l'État. Une population en accord avec ses dirigeants est le pilier d'une grande nation."
 synth.1515.desc.neutral: "Les §Y[root.GetSpeciesNamePlural]§! restent indécis quant à la forme que devrait prendre notre conscience numérisée. Les plus conservateurs voudraient que nous restions profondément ancrés dans nos enveloppes corporelles, tandis que les autres critiquent cette « demi-mesure » entre l'ancien et le nouveau.\n\nC'est à nous qu'il revient de faire ce choix. En nous concentrant sur le physique, nous permettrions à un seul et unique employé de contrôler plusieurs corps, tandis qu'une existence virtuelle nous donnerait un contrôle sociétal sans précédent."
 synth.1515.a: "Créons des corps neurosynchronisés pour les employés"
 synth.1515.a.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_physical'] $synth_physical_traits$"
 synth.1515.b: "Manipulons l'opinion publique dans l'espace virtuel"
 synth.1515.b.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_virtual'] $synth_virtual_trait$"
 synth.1515.c: "$synth_keep_auth_option$"
 synth.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"
 #IMPERIAL
 synth.1520.name: "Société synthétisée"
 synth.1520.desc.physical: "L'empire favorise l'amélioration de nos nouveaux corps synthétiques.\n\nCes nouvelles formes permettent de désassembler les cerveaux positroniques afin d'acquérir les connaissances de nos élites récemment décédées. En tant que serviteurs de l'empire, nous sommes sûrs que c'est ce qu'ils auraient voulu."
 synth.1520.desc.virtual: "Les §Y[From.GetSpeciesNamePlural]§! sont prêts à aller encore plus loin, et préfèrent une existence 100% virtuelle aux demi-mesures du monde physique. Cet événement historique aura de profondes répercussions sur notre avenir. En augmentant la distance et la vitesse des transferts d'identité, nous sommes désormais en mesure de procéder au remplacement rapide des corps synthétiques détruits lors des missions périlleuses.\n\nCes nouveaux développements ne manqueront pas d'améliorer notre efficacité dans diverses situations de guerre, et couvrir de gloire l'empire des §Y[From.GetSpeciesNamePlural]§! !"
 synth.1520.desc.neutral: "L'empire des §Y[From.GetSpeciesNamePlural]§! se trouve face à un véritable dilemme. Certains pensent que des corps physiques sur mesure nous garantiraient sécurité et familiarité, tandis que d'autres refusent que nous tirions pleinement parti de la synthétisation et de tout ce qui s'ensuit. \n\nEn nous concentrant sur les aspects physiques, nous pourrions réutiliser les connaissances de nos dignitaires récemment disparus pour nos travaux de recherche. Par ailleurs, la voie de l'existence virtuelle permettrait de remplacer en masse les corps synthétiques détruits via un rapide transfert d'identité."
 synth.1520.a: "Utilisons l'esprit de nos dirigeants disparus"
 synth.1520.a.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_physical']"
 synth.1520.b: "Créons des corps physiques jetables"
 synth.1520.b.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_virtual']"
 synth.1520.c: "$synth_keep_auth_option$"
 synth.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 synth.1525.name: "Société synthétisée"
 synth.1525.desc.physical: "Notre département de recherche et marketing est porteur d'une innovation dans l'utilisation de l'intelligence artificielle pour l'ensemble de notre clientèle. L'approche équilibrée de la nouvelle existence synthétique nous permet de développer des produits tirant parti du monde virtuel au profit du monde physique.\n\nNous sommes désormais en mesure d'imprégner des objets inanimés d'une intelligence artificielle contrainte pour leur donner vie. Ce nouveau segment de produits peut ensuite être ciblé pour les consommateurs, le secteur privé et d'autres parties intéressées à travers toute la galaxie."
 synth.1525.desc.virtual: "Notre engagement envers l'espace virtuel a débloqué une toute nouvelle gamme de produits basée sur les souvenirs. Les techniciens de nos succursales sont capables de les extraire des sujets volontaires, quel que soit leur phénotype.\n\nCes rajouts sont ensuite attentivement examinés par notre service d'espionnage, ce qui nous permet de bénéficier d'un avantage compétitif dans ce domaine sur les autres empires. Enfin, les souvenirs sont incorporés dans nos processus de création d'esprits synthétiques, pour une performance considérablement accrue."
 synth.1525.desc.neutral: "Malgré une méticuleuse analyse coût-avantage, ni la spécialisation physique ni la spécialisation virtuelle du processus de synthétisation ne sortent du lot. Toutefois, nous ne pouvons pas passer à côté de telles opportunités, et nous nous devons de présenter clairement la ligne à suivre aux parties prenantes.\n\nEn nous focalisant sur le monde physique, nous pourrions imprégner des objets inanimés d'une intelligence artificielle contrainte, afin de les vendre comme une version simplifiée d'une nouvelle vie. En investissant dans le monde virtuel, nous pourrions transformer les souvenirs et les schémas de pensée en marchandises."
 synth.1525.a: "Distribuons des entités à l'intelligence artificielle contrainte"
 synth.1525.a.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_physical'] $synth_physical_traits$"
 synth.1525.b: "Transformons les souvenirs de la population en marchandises"
 synth.1525.b.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_virtual'] $synth_virtual_trait$"
 synth.1525.c: "$synth_keep_auth_option$"
 synth.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"
 ### SOCIETAL EFFECTS EVENT CHAIN END ###