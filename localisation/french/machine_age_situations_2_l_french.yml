 situation_digitization_overclocked_approach_tt: "$situation_approach_tt$ : $situation_digitization_overclocked$"
 situation_num_identity_complex_tt: "$building_identity_complex$"
 situation_digitization_ongoing_desc: "Synthétisation en cours"
