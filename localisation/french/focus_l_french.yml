 development.330.desc: ""
 development.330.hint: "$core_focus_139.hint$"
 development.330.lore: "§L« Un responsable local affirme : \"L'économie indépendante prospère ! Une mégacorporation ouvre une dixième succursale ! »§!"
 development.330.req: "A établi 10 succursales"
