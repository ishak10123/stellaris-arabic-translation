 development.300.desc: "(Qui produit au moins 80 d'énergie)"
 development.300.hint: "Après avoir découvert la technologie £physics£§H$tech_dyson_swarm$§!, trouvez une ['concept_star',étoile] propice et utilisez un £construction_ship£['concept_construction_ship',vaisseau de construction] pour bâtir la £megastructure£['concept_megastructure',mégastructure] §H$tech_dyson_swarm$§!."
 development.300.lore: "§L« En regardant cette étoile, nous nous sommes demandé : \"Et si on la taxait ?\" »§!"
 development.300.req: "A construit un essaim de Dyson"
 development.300.fail: "£trigger_no£ $development.300.req$"
 development.300.success: "£trigger_yes£ $development.300.req$"
 development.305.name: "Construire un four à arc"
 development.305.desc: "(Système comptant au moins 15 mondes)"
 development.305.hint: "Après avoir découvert la technologie £engineering£§H$tech_orbital_arc_furnace$§!, trouvez un §Hmonde en fusion§! dans un £system£['concept_system',système] comptant au moins 15 £planet£['concept_planets',mondes] et utilisez un £construction_ship£['concept_construction_ship',vaisseau de construction] pour bâtir la £megastructure£['concept_megastructure',mégastructure] §H$tech_orbital_arc_furnace$§!."
 development.305.lore: "§L« Le soleil se lève à l'horizon et, l'espace d'un instant, la structure est baignée d'une lumière dorée. Des milliers de kilomètres d'échafaudages et d'acier... Nous avons fait de ce monde notre forge. »§!"
 development.305.req: "A construit un four à arc"
 development.305.fail: "£trigger_no£ $development.305.req$"
 development.305.success: "£trigger_yes£ $development.305.req$"
 development.310.name: "Avoir 3 espèces"
 development.310.desc: ""
 development.310.hint: "Proposez un ['concept_diplomatic_pact',pacte diplomatique] §H$PACT_migration_treaty$§! à un autre ['concept_empire',empire] depuis l'onglet $contacts_view_tab_contacts$ de la £interface£['concept_contacts_view',vue contacts].$focus_other$"
 development.310.lore: "§L« La galaxie est vaste, pleine de connaissances, de technologies et d'idées nouvelles, alors pourquoi ne s'en tenir qu'à une seule façon de penser ? »§!"
 development.310.req: "A 3 espèces"
 development.310.fail: "£trigger_no£ $development.310.req$"
 development.310.success: "£trigger_yes£ $development.310.req$"
 development.315.name: "Former une fédération"
 development.315.desc: ""
 development.315.hint: "Contactez un autre ['concept_empire',empire] depuis l'onglet $contacts_view_tab_contacts$ de la £interface£['concept_contacts_view',vue contacts] et demandez-lui de former une ['concept_federation',fédération].$focus_other$"
 development.315.lore: "§L« Que cet accord soit la preuve de notre volonté de préférer l'unité à la division et le dialogue à la guerre. Nous avons fait le choix d'un destin commun parmi les étoiles. » - Préambule de la concorde galactique§!"
 development.315.req: "A formé une fédération"
 development.315.fail: "£trigger_no£ $development.315.req$"
 development.315.success: "£trigger_yes£ $development.315.req$"
 development.320.name: "Intégrer le Conseil"
 development.320.desc: ""
 development.320.hint: "Augmentez suffisamment votre ['concept_diplomatic_weight',poids galactique] avant les prochaines élections du ['concept_galactic_council'] pour faire partie des élus."
 development.320.lore: "§L« Le vrai pouvoir ne vient pas des flottes ou des armées, mais des salles où les grandes décisions sont prises. »§!"
 development.320.req: "A intégré le Conseil galactique"
 development.320.fail: "£trigger_no£ $development.320.req$"
 development.320.success: "£trigger_yes£ $development.320.req$"
 development.325.name: "Avoir un officiel confirmé"
 development.325.desc: "(Atteindre le niveau 4)"
 development.325.hint: "$development.230.hint$"
 development.325.lore: "§L« Ce sont les travailleurs qui doivent être épuisés en fin de journée, pas leurs chefs. » - Ir'B va'Bir, magistrat en chef§!"
 development.325.req: "A un officiel de niveau 4"
 development.325.fail: "£trigger_no£ $development.325.req$"
 development.325.success: "£trigger_yes£ $development.325.req$"
 development.400.name: "Niveau fédéral 5"
 development.400.desc: ""
 development.400.hint: "Affectez un £official£['concept_official',officiel] à la ['concept_federation',fédération] pour augmenter l'§Hexpérience fédérale§!."
 development.400.lore: "§L« Cinq niveaux de gouvernance, une centaine de comités, un millier de réunions... Et pourtant, cela nous a rendus plus forts. »§!"
 development.400.req: "Fait partie d'une fédération de niveau 5"
 development.400.fail: "£trigger_no£ $development.400.req$"
 development.400.success: "£trigger_yes£ $development.400.req$"
 development.405.name: "Construire une sphère de Dyson"
 development.405.desc: ""
 development.405.hint: "Après avoir découvert la technologie £physics£§H$tech_dyson_sphere$§!, améliorez la £megastructure£['concept_megastructure',mégastructure] §H$tech_dyson_swarm$§! en §H$tech_dyson_sphere$§!.$focus_other$" # With Machine Age
 development.406.hint: "Après avoir découvert la technologie £physics£§H$tech_dyson_sphere$§!, trouvez une ['concept_star',étoile] propice et utilisez un £construction_ship£['concept_construction_ship',vaisseau de construction] pour bâtir la £megastructure£['concept_megastructure',mégastructure] §H$tech_dyson_sphere$§!.$focus_other$" # Without Machine Age
 development.405.lore: "§L« La plus grande des civilisations ne se bat pour les ressources, elle les définit. » - Progression vers le type III§!"
 development.405.req: "A construit une sphère de Dyson"
 development.405.fail: "£trigger_no£ $development.405.req$"
 development.405.success: "£trigger_yes£ $development.405.req$"
 development.410.name: "Construire un anneau-monde"
 development.410.desc: ""
 development.410.hint: "Après avoir découvert la technologie £physics£§H$tech_ring_world$§!, trouvez une ['concept_star',étoile] propice et utilisez un £construction_ship£['concept_construction_ship',vaisseau de construction] pour bâtir la £megastructure£['concept_megastructure',mégastructure] §H$tech_ring_world$§!.$focus_other$"
 development.410.lore: "§L« L'anneau brillait magnifiquement à la lumière de notre étoile... Puis les ombres des envahisseurs l'ont recouvert. » - Journal d'Addavv uvi-Waddiv, Standard 174§!"
 development.410.req: "A construit un anneau-monde"
 development.410.fail: "£trigger_no£ $development.410.req$"
 development.410.success: "£trigger_yes£ $development.410.req$"
 development.415.name: "Avoir 3 officiels de niveau 5"
 development.415.desc: ""
 development.415.hint: "$development.230.hint$"
 development.415.lore: "§L« Après des décennies de gouvernance, ils sont devenus maîtres de la politique, de la négociation et de la culpabilisation. »§!"
 development.415.req: "A 3 officiels de niveau 5"
 development.415.fail: "£trigger_no£ $development.415.req$"
 development.415.success: "£trigger_yes£ $development.415.req$"
 development.500.name: "Construire une Assemblée interstellaire"
 development.500.desc: ""
 development.500.hint: "Après avoir découvert la technologie £society£§H$tech_interstellar_assembly$§!, trouvez une ['concept_star',étoile] propice et utilisez un £construction_ship£['concept_construction_ship',vaisseau de construction] pour bâtir la £megastructure£['concept_megastructure',mégastructure] §H$tech_interstellar_assembly$§!.$focus_other$"
 development.500.lore: "§L« Qui contrôle la discussion contrôle le cours de l'histoire. » - Grande chancelière Sagu, fille de Thub§!"
 development.500.req: "A construit une Assemblée interstellaire"
 development.500.fail: "£trigger_no£ $development.500.req$"
 development.500.success: "£trigger_yes£ $development.500.req$"
 development.505.name: "Avoir +3000 biens de consommation par mois"
 development.505.desc: ""
 development.505.hint: "Ouvrez l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie] pour construire des £district£['concept_industrial_districts',districts industriels] et des £building£['building:building_factory_1',industries civiles] qui produisent des £consumer_goods£['concept_consumer_goods',biens de consommation]. Vous pouvez également en acheter sur le £market£['concept_market',marché] ou auprès d'autres ['concept_empires',empires]."
 development.505.lore: "§L« Ils ne les mangent pas et ne les utilisent pas pour s'étendre. Certains leur servent simplement de... décoration. L'inefficacité de ces individus est insupportable. »§!"
 development.505.req: "A +3000 biens de consommation par mois"
 development.505.fail: "£trigger_no£ $development.505.req$"
 development.505.success: "£trigger_yes£ $development.505.req$"
 development.510.name: "Avoir des relations à +200 avec 10 empires"
 development.510.desc: ""
 development.510.hint: "$development.100.hint$"
 development.510.lore: "§L« Que c'est épuisant d'être populaire. »§!"
 development.510.req: "A des relations à +200 avec 10 empires"
 development.510.fail: "£trigger_no£ $development.510.req$"
 development.510.success: "£trigger_yes£ $development.510.req$"
 development.515.name: "Déployer un oeuf de mastodonte"
 development.515.desc: ""
 development.515.hint: "Déployez un §Hoeuf de mastodonte§! en sélectionnant votre ['concept_construction_ship',vaisseau de construction], puis cliquez sur §HConstruire une mégastructure§!. Ensuite, choisissez l'option Oeuf de mastodonte et une §Hgéante gazeuse§! adéquate pour construire la structure orbitale."
 development.515.lore: "§L« En levant les yeux, nous avons aperçu son ombre traverser la lune. Ce n'était pas un vaisseau, ni une tempête, mais quelque chose de plus gros... de vivant. » - Témoignage d'un observateur, colonie E-91§!"
 development.515.req: "A déployé un oeuf de mastodonte"
 development.515.fail: "£trigger_no£ $development.515.req$"
 development.515.success: "£trigger_yes£ $development.515.req$"
 development.520.name: "Construire un centre de recherche en génomique"
 development.520.desc: ""
 development.520.hint: "Construisez un §Hcentre de recherche en génomique§! sur l'un de vos mondes, dans n'importe quel emplacement de ['concept_building',bâtiment] disponible."
 development.520.lore: "§L« Si nous ne sommes pas censés modifier notre génome, alors pourquoi est-il modifiable ? »§!"
 development.520.req: "A construit un centre de recherche en génomique"
 development.520.fail: "£trigger_no£ $development.520.req$"
 development.520.success: "£trigger_yes£ $development.520.req$"
