 ###################
 # Core Focus Cards
 ###################
 core.100.name: "Créer une colonie"
 core.100.desc: ""
 core.100.hint: "Utilisez un £colony_ship£['concept_colony_ship',vaisseau colonial] pour coloniser un £planet£['concept_planet',monde] habitable."
 core.100.lore: "§L« Un nouveau monde n'est pas seulement un atout, c'est une responsabilité. » - Manuel des opérations coloniales, 223e édition§!"
 core.100.req: "A créé une colonie"
 core.100.fail: "£trigger_no£ $core.100.req$"
 core.100.success: "£trigger_yes£ $core.100.req$"
 core.102.name: "Définir la désignation d'une colonie"
 core.102.desc: "(Hors capitale)"
 core.102.hint: "Modifiez la ['concept_designation',désignation] d'une colonie (hors capitale) depuis l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie]."
 core.102.lore: "§L« Officiellement, la désignation d'une colonie augmente son efficacité. Officieusement, ce n'est qu'un moyen de faire passer de simples pierres pour une stratégie économique. »§!"
 core.102.req: "A modifié la désignation d'un monde"
 core.102.fail: "£trigger_no£ $core.102.req$"
 core.102.success: "£trigger_yes£ $core.102.req$"
 core.104.name: "Construire une station minière"
 core.104.desc: ""
 core.104.hint: "Utilisez un £construction_ship£['concept_construction_ship',vaisseau de construction] pour bâtir une £mining_station£['concept_mining_station',station minière] au-dessus d'un ['concept_celestial_object',objet céleste] propice."
 core.104.lore: "§L« Là où d'autres ne voient qu'un astéroïde, nous voyons un tas de crédits énergétiques. »§!"
 core.104.req: "A construit une station minière"
 core.104.fail: "£trigger_no£ $core.104.req$"
 core.104.success: "£trigger_yes£ $core.104.req$"
 core.106.name: "Construire un bâtiment"
 core.106.desc: ""
 core.106.hint: "Dans l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie], cliquez sur un §Hemplacement de construction§! disponible et sélectionnez un £building£['concept_building',bâtiment] à construire."
 core.106.lore: "§L« Aujourd'hui, un site de construction. Demain, une civilisation. »§!"
 core.106.req: "A construit un bâtiment"
 core.106.fail: "£trigger_no£ $core.106.req$"
 core.106.success: "£trigger_yes£ $core.106.req$"
 core.108.name: "Construire un module de base stellaire"
 core.108.desc: ""
 core.108.hint: "Dans l'onglet $starbase_view_tab_command$ de la £interface£['concept_starbase_view',vue base stellaire], sélectionnez un §Hmodule de base stellaire§! constructible."
 core.108.lore: "§L« Ils nous avaient promis une grande aventure, mais ils ont omis de mentionner les mois de silence et d'air recyclé. Maintenant que le carrefour commercial est opérationnel, nous avons enfin une raison de rester. »§!"
 core.108.req: "A construit un module de base stellaire"
 core.108.fail: "£trigger_no£ $core.108.req$"
 core.108.success: "£trigger_yes£ $core.108.req$"
 core.110.name: "Bâtir une construction de base stellaire"
 core.110.desc: ""
 core.110.hint: "Dans l'onglet $starbase_view_tab_command$ de la £interface£['concept_starbase_view',vue base stellaire], sélectionnez une §Hconstruction de base stellaire§! disponible."
 core.110.lore: "§L« La fonction d'une base stellaire est déterminée par son emplacement dans la galaxie. Les constructions qui la composent l'affinent. » - Ingénierie orbitale : Théorie et pratique§!"
 core.110.req: "A bâti une construction de base stellaire"
 core.110.fail: "£trigger_no£ $core.110.req$"
 core.110.success: "£trigger_yes£ $core.110.req$"
 core.112.name: "Adopter une tradition"
 core.112.desc: ""
 core.112.hint: "Adoptez une ['concept_tradition',tradition] depuis l'onglet $society_management_view_tab_traditions$ de la £interface£['concept_society_management_view',vue gestion sociétale]."
 core.112.lore: "§L« Un peuple sans traditions erre sans but. Un peuple qui s'accroche aux vieilles traditions stagne. La sagesse ne peut être atteinte qu'en choisissant celles que l'on veut perpétuer. »§!"
 core.112.req: "A adopté une tradition"
 core.112.fail: "£trigger_no£ $core.112.req$"
 core.112.success: "£trigger_yes£ $core.112.req$"
 core.114.name: "Promulguer un décret"
 core.114.desc: ""
 core.114.hint: "Promulguez un [concept_edict',décret] depuis l'onglet §H$government_view_tab_policies_and_edicts$§! de la £interface£['concept_society_management_view',vue gouvernement]."
 core.114.lore: "§L« Avis à tous les citoyens : le décret 827-B est officiellement entré en vigueur. Veuillez vous référer au paragraphe 34, section 12, pour connaître toutes les directives à suivre. Que votre journée soit productive ! »§!"
 core.114.req: "A promulgué un décret"
 core.114.fail: "£trigger_no£ $core.114.req$"
 core.114.success: "£trigger_yes£ $core.114.req$"
 core.116.name: "Mener 3 priorités à bien"
 core.116.desc: ""
 core.116.hint: "Chaque fois qu'une ['concept_agenda',priorité] est menée à bien, lancez-la depuis l'onglet $government_view_tab_council$ de la £interface£['concept_government_view',vue gouvernement] et choisissez-en une nouvelle."
 core.116.lore: "§L« Un dirigeant sans priorité équivaut à un vaisseau sans cap. »§!"
 core.116.req: "A mené 3 priorités à bien"
 core.116.fail: "£trigger_no£ $core.116.req$"
 core.116.success: "£trigger_yes£ $core.116.req$"
 core.118.name: "Posséder 1 000 crédits énergétiques"
 core.118.desc: ""
 core.118.hint: "Ouvrez l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie] pour construire des £district£['concept_generator_districts',districts générateurs] qui produisent des £energy£['concept_energy',crédits énergétiques].\n\nVous pouvez également construire des £mining_station£['concept_mining_stations',stations minières] à proximité d'['concept_celestial_objects',objets célestes] riches en énergie, acheter des £energy£§Hcrédits énergétiques§! sur le £market£['concept_market',marché] ou auprès d'autres ['concept_empires',empires].$focus_other$"
 core.118.lore: "§L« Les crédits ne font pas le bonheur, mais le commerce pourrait ! »§!"
 core.118.req: "Possède 1 000 crédits énergétiques"
 core.118.fail: "£trigger_no£ $core.118.req$"
 core.118.success: "£trigger_yes£ $core.118.req$"
 core.120.name: "Posséder 1 000 minéraux"
 core.120.desc: ""
 core.120.hint: "Ouvrez l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie] pour construire des £district£['concept_mining_districts',districts miniers] qui produisent des £minerals£['concept_minerals',minéraux].\n\nVous pouvez également construire des £mining_station£['concept_mining_stations',stations minières] à proximité d'['concept_celestial_objects',objets célestes] riches en minéraux, acheter des £minerals£§Hminéraux§! sur le £market£['concept_market',marché] ou auprès d'autres ['concept_empires',empires].$focus_other$"
 core.120.lore: "§L« Si vous respirez trop, vos poumons seront silicatés. Si vous respirez trop peu, vous vous évanouirez. Dans les deux cas, l'entreprise réduira votre salaire. »§!"
 core.120.req: "Possède 1 000 minéraux"
 core.120.fail: "£trigger_no£ $core.120.req$"
 core.120.success: "£trigger_yes£ $core.120.req$"
 core.122.name: "Posséder 1 000 unités de nourriture"
 core.122.desc: ""
 core.122.hint: "Ouvrez l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie] pour construire des £district£['concept_farming_districts',districts agricoles] qui produisent de la £food£['concept_food',nourriture].\n\nVous pouvez également acheter de la £food£§Hnourriture§! sur le £market£['concept_market',marché] ou auprès d'autres ['concept_empires',empires].$focus_other$"
 core.122.lore: "§L« Un empire bien nourri prospère. Un empire affamé changera bientôt de propriétaire. ».§!"
 core.122.req: "Possède 1 000 unités de nourriture"
 core.122.fail: "£trigger_no£ $core.122.req$"
 core.122.success: "£trigger_yes£ $core.122.req$"
 core.124.name: "Posséder 1 000 biens de consommation"
 core.124.desc: ""
 core.124.hint: "Ouvrez l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie] pour construire des £district£['concept_industrial_districts',districts industriels] qui produisent des £consumer_goods£['concept_consumer_goods',biens de consommation]. Vous pouvez également en acheter sur le £market£['concept_market',marché] ou auprès d'autres ['concept_empires',empires].$focus_other$"
 core.124.lore: "§L« Les biens de consommation sont essentiels à l'innovation, à la culture et au bien-être général. Ils peuvent prendre de nombreuses formes, des produits de luxe aux outils de pointe en passant par les chapeaux branchés. »§!"
 core.124.req: "Possède 1 000 biens de consommation"
 core.124.fail: "£trigger_no£ $core.124.req$"
 core.124.success: "£trigger_yes£ $core.124.req$"
 core.126.name: "Posséder 1 000 alliages"
 core.126.desc: ""
 core.126.hint: "Ouvrez l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie] pour construire des £district£['concept_industrial_districts',districts industriels] qui produisent des £alloys£['concept_alloys',alliages].\n\nVous pouvez également acheter des £alloys£§Halliages§! sur le £market£['concept_market',marché] ou auprès d'autres ['concept_empires',empires].$focus_other$"
 core.126.lore: "§L« Les alliages ne sont pas une ressource très élégante, mais on ne construit pas un cuirassé avec de bonnes intentions. »§!"
 core.126.req: "Possède 1 000 alliages"
 core.126.fail: "£trigger_no£ $core.126.req$"
 core.126.success: "£trigger_yes£ $core.126.req$"
 core.127.name: "Construire un district de la conscience"
 core.127.desc: ""
 core.127.hint: "Construisez un £district£['concept_hive_district',district de la conscience] sur une £colony£['concept_colony',colonie]."
 core.127.lore: "§L« Toujours plus de tunnels, de drones, de conscience... Ça ne s'arrête jamais. »§!"
 core.127.req: "A construit un district de la conscience"
 core.127.fail: "£trigger_no£ $core.127.req$"
 core.127.success: "£trigger_yes£ $core.127.req$"
 core.127_1.name: "Construire un biome communautaire"
 core.127_1.hint: "Construisez un £district£§Cbiome communautaire§! sur une £colony£['concept_colony',colonie]."
 core.127_1.lore: "§L« La planète fut. »§!"
 core.127_1.req: "A construit un biome communautaire"
 core.127_1.fail: "£trigger_no£ $core.127_1.req$"
 core.127_1.success: "£trigger_yes£ $core.127_1.req$"
 core.128.name: "Construire un district urbain"
 core.128.desc: ""
 core.128.hint: "Construisez un £district£['concept_city_district',district urbain] depuis l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie]."
 core.128.lore: "§L« Les gratte-ciel d'une ville représentent les ambitions de ses habitants. Plus ils sont hauts, plus les rêves sont grands. »§!"
 core.128.req: "A construit un district urbain"
 core.128.fail: "£trigger_no£ $core.128.req$"
 core.128.success: "£trigger_yes£ $core.128.req$"
 core.129.name: "Construire un district central"
 core.129.desc: ""
 core.129.hint: "Construisez un £district£['concept_nexus_district',district central] sur une £colony£['concept_colony',colonie]."
 core.129.lore: "§L« Qui dit plus de districts centraux dit plus d'unités. Il n'y a pas d'inconvénient. Sauf si une déviance est constatée, auquel cas un recalibrage est effectué. »§!"
 core.129.req: "A construit un district central"
 core.129.fail: "£trigger_no£ $core.129.req$"
 core.129.success: "£trigger_yes£ $core.129.req$"
 core.130.name: "Construire un district industriel"
 core.130.desc: ""
 core.130.hint: "Construisez un £district£['concept_industrial_district',district industriel] depuis l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie]."
 core.130.lore: "§L« Rien ne décrit mieux le progrès que les fumées industrielles. »§!"
 core.130.req: "A construit un district industriel"
 core.130.fail: "£trigger_no£ $core.130.req$"
 core.130.success: "£trigger_yes£ $core.130.req$"
 core.132.name: "Construire un district générateur"
 core.132.desc: ""
 core.132.hint: "Construisez un £district£['concept_generator_district',district générateur] depuis l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie]."
 core.132.lore: "§L« L'énergie est le fondement de tout. » - L'Abdibâl§!"
 core.132.req: "A construit un district générateur"
 core.132.fail: "£trigger_no£ $core.132.req$"
 core.132.success: "£trigger_yes£ $core.132.req$"
 core.132_1.name: "Construire un champ de photosynthèse"
 core.132_1.hint: "Construisez un £district£§Cchamp de photosynthèse§! depuis l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie]."
 core.132_1.lore: "§L« Le monde boit la lumière, comme vous et moi buvons l'eau. » - Zosira K'Tun§!"
 core.132_1.req: "A construit un champ de photosynthèse"
 core.132_1.fail: "£trigger_no£ $core.132_1.req$"
 core.132_1.success: "£trigger_yes£ $core.132_1.req$"
 core.134.name: "Construire un district minier"
 core.134.desc: ""
 core.134.hint: "Construisez un £district£['concept_mining_district',district minier] depuis l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie]."
 core.134.lore: "§L« La richesse d'un monde ne réside pas dans son ciel, mais dans son sol. Creusez profondément et la prospérité suivra. »§!"
 core.134.req: "A construit un district minier"
 core.134.fail: "£trigger_no£ $core.134.req$"
 core.134.success: "£trigger_yes£ $core.134.req$"
 core.134_1.name: "Construire une montagne creuse"
 core.134_1.hint: "Construisez une £district£§Cmontagne creuse§! depuis l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie]."
 core.134_1.lore: "§L« Comme l'arbre, la montagne peut être exploitée pour le mana qu'elle contient. »§!"
 core.134_1.req: "A construit une montagne creuse"
 core.134_1.fail: "£trigger_no£ $core.134_1.req$"
 core.134_1.success: "£trigger_yes£ $core.134_1.req$"
 core.136.name: "Construire un district agricole"
 core.136.desc: ""
 core.136.hint: "Construisez un £district£['concept_farming_district',district agricole] depuis l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie]."
 core.136.lore: "§L« La première récolte a été plutôt maigre, mais lorsque nous avons goûté cette nouvelle céréale, nous avons su que ce monde nous nourrirait. »§!"
 core.136.req: "A construit un district agricole"
 core.136.fail: "£trigger_no£ $core.136.req$"
 core.136.success: "£trigger_yes£ $core.136.req$"
 core.136_1.name: "Construire un verger forestier"
 core.136_1.hint: "Construisez un £district£§Cverger forestier§! depuis l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie]."
 core.136_1.lore: "§L« Un monde abondant ne peut que se développer. »§!"
 core.136_1.req: "A construit un verger forestier"
 core.136_1.fail: "£trigger_no£ $core.136_1.req$"
 core.136_1.success: "£trigger_yes£ $core.136_1.req$"
 core.138.name: "Promulguer une décision planétaire"
 core.138.desc: ""
 core.138.hint: "Ouvrez la liste des ['concept_decisions',décisions] planétaires depuis l'onglet $colony_view_tab_management$ de la £interface£['concept_colony_view',vue colonie] et promulguez-en une."
 core.138.lore: "§L« Les colons aiment les dirigeants résolus, jusqu'à ce qu'ils prennent une décision qui ne va pas dans leur sens. »§!"
 core.138.req: "A promulgué une décision planétaire"
 core.138.fail: "£trigger_no£ $core.138.req$"
 core.138.success: "£trigger_yes£ $core.138.req$"
 ##########################
 # Exploration Focus Cards
 ##########################
 exploration.100.name: "Étudier une anomalie"
 exploration.100.desc: ""
 exploration.100.hint: "Lorsque vous découvrez une £anomaly£['concept_anomaly',anomalie], affectez-y un £scientist£['concept_scientist',scientifique] pour l'étudier."
 exploration.100.lore: "§L« Il n'y a pas de signaux ordinaires. Chaque lumière clignotante, chaque écho a une signification, et notre tâche consiste à la découvrir. »§!"
 exploration.100.req: "A étudié une anomalie"
 exploration.100.fail: "£trigger_no£ $exploration.100.req$"
 exploration.100.success: "£trigger_yes£ $exploration.100.req$"
 exploration.105.name: "Reconnaître un système"
 exploration.105.desc: ""
 exploration.105.hint: "Utilisez un £science_ship£['concept_science_ship',vaisseau scientifique] pour reconnaître entièrement un nouveau £system£['concept_system',système]."
 exploration.105.lore: "§L« L'expansion territoriale commence par la compréhension des étoiles que nous souhaitons revendiquer. » - Introduction à la cartographie galactique, 7e édition§!"
 exploration.105.req: "A reconnu un système"
 exploration.105.fail: "£trigger_no£ $exploration.105.req$"
 exploration.105.success: "£trigger_yes£ $exploration.105.req$"
 exploration.110.name: "Mener un projet spécial à bien"
 exploration.110.desc: ""
 exploration.110.hint: "Trouvez un ['concept_special_project',projet spécial] dans l'onglet $situation_log_view_tab_situation_log$ de la £interface£['concept_situation_log',vue journal de bord] et recherchez-le."
 exploration.110.lore: "§L« L'analyse des données vous semble difficile ? Le véritable défi consiste à convaincre les citoyens de l'importance de nos découvertes. »§!"
 exploration.110.req: "A mené un projet spécial à bien"
 exploration.110.fail: "£trigger_no£ $exploration.110.req$"
 exploration.110.success: "£trigger_yes£ $exploration.110.req$"
 exploration.115.name: "Rencontrer une forme de vie alien"
 exploration.115.desc: ""
 exploration.115.hint: "Utilisez un £science_ship£['concept_science_ship',vaisseau scientifique] pour reconnaître de nouveaux £system£['concept_systems',systèmes] jusqu'à rencontrer une forme de vie alien."
 exploration.115.lore: "§L« Les formes de vie aliens existent bel et bien. La question est de savoir si, quand nous en rencontrerons une, nous la reconnaîtrons pour ce qu'elle est. »§!"
 exploration.115.req: "A rencontré une forme de vie alien"
 exploration.115.fail: "£trigger_no£ $exploration.115.req$"
 exploration.115.success: "£trigger_yes£ $exploration.115.req$"
 exploration.120.name: "Obtenir une option de recherche permanente"
 exploration.120.desc: ""
 exploration.120.hint: "Étudiez des £anomaly£['concept_anomalies',anomalies], des £archaeology£['concept_archaeology_sites',sites archéologiques] et des ['concept_debris',débris] de bataille spatiale. Certains peuvent vous octroyer une §Hoption de recherche permanente§! qui restera disponible jusqu'à ce que vous effectuiez la recherche."
 exploration.120.lore: "§L« Le véritable progrès n'est pas un saut ; ce sont des milliers de pas avançant prudemment vers l'inconnu. » - Principes de la recherche scientifique, vol. III§!"
 exploration.120.req: "A une option de recherche permanente"
 exploration.120.fail: "£trigger_no£ $exploration.120.req$"
 exploration.120.success: "£trigger_yes£ $exploration.120.req$"
 exploration.125.name: "Recruter un scientifique"
 exploration.125.desc: ""
 exploration.125.hint: "Recrutez une ['concept_leader',personnalité] de la classe des £scientist£['concept_scientist',scientifiques] depuis la £interface£['concept_leaders_view',vue personnalités].$focus_other$"
 exploration.125.lore: "§L« Vous cherchez quelqu'un qui sache à la fois faire des mesures quantiques et établir un budget ? Bonne chance. »§!"
 exploration.125.req: "A recruté un scientifique"
 exploration.125.fail: "£trigger_no£ $exploration.125.req$"
 exploration.125.success: "£trigger_yes£ $exploration.125.req$"
 exploration.200.name: "Fouiller un site archéologique"
 exploration.200.desc: ""
 exploration.200.hint: "Affectez un £scientist£['concept_scientist',scientifique] à un £archaeology£['concept_archaeology_site',site archéologique] et guidez-le à travers les événements."
 exploration.200.lore: "§L« Qui dit nouvel empire disparu dit nouvel avertissement funeste. Pourquoi personne ne retient la leçon ? »§!"
 exploration.200.req: "A fouillé un site archéologique"
 exploration.200.fail: "£trigger_no£ $exploration.200.req$"
 exploration.200.success: "£trigger_yes£ $exploration.200.req$"
 exploration.205.name: "Faire passer un scientifique au niveau sup."
 exploration.205.desc: ""
 exploration.205.hint: "Envoyez un £science_ship£['concept_science_ship',vaisseau scientifique] commandé par un £scientist£['concept_scientist',scientifique] reconnaître des £system£['concept_systems',systèmes] et étudier des £anomaly£['concept_anomalies',anomalies]. Vous pouvez également le nommer ['concept_governor',gouverneur] ou au ['concept_council'].\n\nCes tâches lui permettent d'acquérir une grande expérience, de gagner des niveaux et de développer de nouveaux ['concept_leader_traits',traits]."
 exploration.205.lore: "§L« Le savoir n'est pas une destination à atteindre, mais un pont qui ne peut être emprunté que si l'on ose le traverser. » - La voie de l'érudit : Croître par la compréhension§!"
 exploration.205.req: "A fait passer un scientifique au niveau sup."
 exploration.205.fail: "£trigger_no£ $exploration.205.req$"
 exploration.205.success: "£trigger_yes£ $exploration.205.req$"
 exploration.210.name: "Observer une civilisation pré-PRL"
 exploration.210.desc: ""
 exploration.210.hint: "Utilisez un £construction_ship£['concept_construction_ship',vaisseau de construction] pour bâtir un §Hposte d'observation§! au-dessus d'un monde abritant une §Hcivilisation pré-PRL§!."
 exploration.210.lore: "§L« Actuellement, les chances que cette civilisation s'éteigne avant de développer la technologie PRL sont de 3 contre 1. Faites vos jeux. »§!"
 exploration.210.req: "A observé une civilisation pré-PRL"
 exploration.210.fail: "£trigger_no£ $exploration.210.req$"
 exploration.210.success: "£trigger_yes£ $exploration.210.req$"
 exploration.215.name: "Nommer un scientifique comme gouverneur"
 exploration.215.desc: ""
 exploration.215.hint: "Nommez un £scientist£['concept_scientist',scientifique] comme ['concept_governor',gouverneur] d'un £sector£['concept_sector',secteur] ou d'un £planet£['concept_planet',monde] depuis l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie] ou depuis la £interface£['concept_planets_and_sector_view',vue planètes et secteurs]."
 exploration.215.lore: "§L« La science n'est pas au service de la tradition, pas plus qu'elle n'est régie par le passé. Un monde gouverné par les scientifiques ne stagnera jamais. » - Réflexions sur la gouvernance de la conservatrice Rhassa Tosh§!"
 exploration.215.req: "A nommé un scientifique comme gouverneur"
 exploration.215.fail: "£trigger_no£ $exploration.215.req$"
 exploration.215.success: "£trigger_yes£ $exploration.215.req$"
 exploration.220.name: "Traverser un trou de ver"
 exploration.220.desc: ""
 exploration.220.hint: "Après avoir découvert la technologie £physics£§H$tech_wormhole_stabilization$§!, envoyez un £science_ship£['concept_science_ship',vaisseau scientifique] explorer et traverser un §Htrou de ver§!."
 exploration.220.lore: "§L« Veuillez noter que l'assurance-vie de l'institut ne couvre pas les décès liés au paradoxe temporel causé par les voyages dans le temps. »§!"
 exploration.220.req: "A traversé un trou de ver"
 exploration.220.fail: "£trigger_no£ $exploration.220.req$"
 exploration.220.success: "£trigger_yes£ $exploration.220.req$"
 exploration.225.name: "Signer une convention de recherche"
 exploration.225.desc: ""
 exploration.225.hint: "Proposez ce ['concept_diplomatic_pact',pacte diplomatique] à un autre ['concept_empire',empire] depuis l'onglet $contacts_view_tab_contacts$ de la £interface£['concept_contacts_view',vue contacts]."
 exploration.225.lore: "§L« Deux esprits peuvent résoudre un problème plus rapidement qu'un seul. Alors pourquoi pas deux civilisations ? Leurs découvertes seront infinies. »§!"
 exploration.225.req: "A signé une convention de recherche"
 exploration.225.fail: "£trigger_no£ $exploration.225.req$"
 exploration.225.success: "£trigger_yes£ $exploration.225req$"
 exploration.300.name: "Construire un essaim de Dyson"
 exploration.300.desc: "(Qui produit au moins :\n30 £physics£, £society£ ou £engineering£)"
 exploration.300.hint: "Après avoir découvert la technologie £physics£§H$tech_dyson_swarm$§!, trouvez une ['concept_star',étoile] propice et utilisez un £construction_ship£['concept_construction_ship',vaisseau de construction] pour bâtir la £megastructure£['concept_megastructure',mégastructure] §H$tech_dyson_swarm$§!."
 exploration.300.lore: "§L« Regarder le déploiement des premiers satellites depuis le pont d'observation... Ça vous change. L'idée de pouvoir posséder la lumière d'une étoile est enivrante. » - Tig Bori, ingénieur en chef de la SSI D'Tuma§!"
 exploration.300.req: "A construit un essaim de Dyson qui produit au moins §Y30§!£physics£, £society£ ou £engineering£"
 exploration.300.fail: "£trigger_no£ $exploration.300.req$"
 exploration.300.success: "£trigger_yes£ $exploration.300.req$"
 exploration.305.name: "Obtenir l'aide à la recherche de l'enclave"
 exploration.305.desc: ""
 exploration.305.hint: "Après avoir établi le contact, utilisez l'onglet $contacts_view_tab_contacts$ de la £interface£['concept_contacts_view',vue contacts] pour demander l'§Hassistance de recherche§! de l'§Hordre des Conservateurs§!."
 exploration.305.lore: "§L« Un jour, j'ai demandé à un Conservateur quelle était la plus grande découverte scientifique de tous les temps. Il m'a souri et répondu : \"la prochaine\". »§!"
 exploration.305.req: "Bénéficie de l'aide à la recherche de l'enclave"
 exploration.305.fail: "£trigger_no£ $exploration.305.req$"
 exploration.305.success: "£trigger_yes£ $exploration.305.req$"
 exploration.310.name: "Construire 5 laboratoires de recherche"
 exploration.310.desc: ""
 exploration.310.hint: "Construisez 5 laboratoires de recherche sur une ou plusieurs £colony£['concept_colonies',colonies] depuis l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie]."
 exploration.310.lore: "§L« Cinq nouveaux laboratoires de recherche et on se demande encore où vont les subventions... »§!"
 exploration.310.req: "A 5 laboratoires de recherche"
 exploration.310.fail: "£trigger_no£ $exploration.310.req$"
 exploration.310.success: "£trigger_yes£ $exploration.310.req$"
 exploration.315.name: "Explorer une déchirure astrale"
 exploration.315.desc: ""
 exploration.315.hint: "Après avoir découvert la technologie £physics£§H$tech_rift_sphere$§!, affectez un £scientist£['concept_scientist',scientifique] à une ['concept_astral_rift',déchirure astrale] et guidez-le."
 exploration.315.lore: "§L« Elle défie les lois de la physique, distord le temps et pourrait tous nous faire disparaître. Nous étions évidemment obligés de l'étudier de près. »§!"
 exploration.315.req: "A exploré une déchirure astrale"
 exploration.315.fail: "£trigger_no£ $exploration.315.req$"
 exploration.315.success: "£trigger_yes£ $exploration.315.req$"
 exploration.320.name: "Avoir un scientifique confirmé"
 exploration.320.desc: "(Atteindre le niveau 4)"
 exploration.320.hint: "$exploration.205.hint$"
 exploration.320.lore: "§L« Les vrais scientifiques n'accumulent pas de connaissances, ils nourrissent leur perspective. »§!"
 exploration.320.req: "A un scientifique confirmé"
 exploration.320.fail: "£trigger_no£ $exploration.320.req$"
 exploration.320.success: "£trigger_yes£ $exploration.320.req$"
 exploration.325.name: "Terraformer 3 mondes"
 exploration.325.desc: ""
 exploration.325.hint: "Après avoir découvert la technologie £society£§H$tech_terrestrial_sculpting$§!, trouvez un £planet£['concept_planet',monde] propice à la ['concept_terraforming',terraformation] et lancez le processus."
 exploration.325.lore: "§L« Vous avez lu le rapport du dernier cycle de terraformation ? Ils ont ajouté des plages ! »§!"
 exploration.325.req: "A terraformé 3 mondes"
 exploration.325.fail: "£trigger_no£ $exploration.325.req$"
 exploration.325.success: "£trigger_yes£ $exploration.325.req$"
 exploration.400.name: "Découvrir une technologie répétable"
 exploration.400.desc: ""
 exploration.400.hint: "Ouvrez la £interface£['concept_technology_view',vue technologies] et découvrez une §Htechnologie répétable§!. Celle-ci est caractérisée par un cadre spécial."
 exploration.400.lore: "§L« Une nouvelle découverte est un nouveau pas en avant, mais l'horizon ne se rapproche jamais. » - Ely Canto, directeur de recherche§!"
 exploration.400.req: "A découvert une technologie répétable"
 exploration.400.fail: "£trigger_no£ $exploration.400.req$"
 exploration.400.success: "£trigger_yes£ $exploration.400.req$"
 exploration.405.name: "Obtenir un bâtiment d'empire déchu"
 exploration.405.desc: ""
 exploration.405.hint: "Vainquez un ['concept_fallen_empire',empire déchu].$focus_other$"
 exploration.405.lore: "§L« L'héritage des anciennes civilisations est incroyable ! Reste à comprendre comment ce truc fonctionne... »§!"
 exploration.405.req: "A obtenu un bâtiment d'empire déchu"
 exploration.405.fail: "£trigger_no£ $exploration.405.req$"
 exploration.405.success: "£trigger_yes£ $exploration.405.req$"
 exploration.410.name: "Examiner les débris d'un empire déchu"
 exploration.410.desc: ""
 exploration.410.hint: "Après une bataille avec un ['concept_fallen_empire',empire déchu], envoyez un £science_ship£['concept_science_ship',vaisseau scientifique] étudier le ['concept_special_project',projet spécial]."
 exploration.410.lore: "§L« La question qu'il faut se poser au sujet des anciens est la suivante : sont-ils tombés à cause ou malgré leur puissance ? » - Couronnes brisées : Étude du déclin galactique§!"
 exploration.410.req: "A examiné les débris d'un empire déchu"
 exploration.410.fail: "£trigger_no£ $exploration.410.req$"
 exploration.410.success: "£trigger_yes£ $exploration.410.req$"
 exploration.415.name: "Examiner les débris d'une crise"
 exploration.415.desc: ""
 exploration.415.hint: "Après une bataille avec une §Hcrise§!, envoyez un £science_ship£['concept_science_ship',vaisseau scientifique] étudier le ['concept_special_project',projet spécial]."
 exploration.415.lore: "§L« Comprendre une arme permet de mieux la manier. La question est de savoir s'il est ensuite possible de la lâcher. » - Amiral Hask'Valgam, à propos de l'équilibre des pouvoirs§!"
 exploration.415.req: "A examiné les débris d'une crise"
 exploration.415.fail: "£trigger_no£ $exploration.415.req$"
 exploration.415.success: "£trigger_yes£ $exploration.415.req$"
 exploration.420.name: "Avoir 3 scientifiques de niveau 5"
 exploration.420.desc: ""
 exploration.420.hint: "$exploration.205.hint$"
 exploration.420.lore: "§L« Trois scientifiques, donc trois théories. Et ils pensent tous avoir raison. »§!"
 exploration.420.req: "A 3 scientifiques de niveau 5"
 exploration.420.fail: "£trigger_no£ $exploration.420.req$"
 exploration.420.success: "£trigger_yes£ $exploration.420.req$"
 exploration.500.name: "Construire un centre scientifique"
 exploration.500.desc: ""
 exploration.500.hint: "Après avoir découvert la technologie £physics£§H$tech_mega_shipyard$§!, trouvez un £planet£['concept_planet',monde] ou une ['concept_star',étoile] propice et utilisez un £construction_ship£['concept_construction_ship',vaisseau de construction] pour bâtir la £megastructure£['concept_megastructure',mégastructure] §H$tech_mega_shipyard$§!."
 exploration.500.lore: "§L« Avec ce centre, aucune réponse n'est hors de notre portée, même si elle peut être hors de notre temps. »§!"
 exploration.500.req: "A construit un centre scientifique"
 exploration.500.fail: "£trigger_no£ $exploration.500.req$"
 exploration.500.success: "£trigger_yes£ $exploration.500.req$"
 exploration.505.name: "Produire 1 000 de recherche par mois"
 exploration.505.desc: ""
 exploration.505.hint: "Construisez davantage de ['building:building_research_lab_1',laboratoires de recherche]. Définissez la ['concept_designation',désignation] d'une colonie sur §H$col_research$§! depuis l'onglet $colony_view_tab_planet_summary$ de la £interface£['concept_colony_view',vue colonie].$focus_other$"
 exploration.505.lore: "§L« Notre taux d'innovation est en baisse ce trimestre. Si nous avions réduit ces réunions inutiles, nous aurions peut-être fait plus de découvertes. »§!"
 exploration.505.req: "Produit 1 000 de recherche par mois"
 exploration.505.fail: "£trigger_no£ $exploration.505.req$"
 exploration.505.success: "£trigger_yes£ $exploration.505.req$"
 exploration.510.name: "Activer des reliques 10 fois"
 exploration.510.desc: "(Une relique ou plus)"
 exploration.510.hint: "Activez une ou plusieurs ['concept_relics',reliques] 10 fois depuis l'onglet $discoveries_view_tab_relics$ de la £interface£['concept_discoveries_view',vue découvertes]."
 exploration.510.lore: "§L« Nous avons trouvé les spécifications complètes de la relique sur un ancien forum de discussion électronique. L'activer devrait être un jeu d'enfant. »§!"
 exploration.510.req: "A activé des reliques 10 fois"
 exploration.510.fail: "£trigger_no£ $exploration.510.req$"
 exploration.510.success: "£trigger_yes£ $exploration.510.req$"
 exploration.600.name: "Rencontrer un léviathan"
 exploration.600.desc: ""
 exploration.600.hint: "Utilisez un £science_ship£['concept_science_ship',vaisseau scientifique] pour explorer de nouveaux £system£['concept_systems',systèmes] jusqu'à rencontrer un léviathan."
 exploration.600.lore: "§L« Partir à la recherche d'un léviathan est une entreprise dangereuse. Et une fois que nous l'aurons trouvé, il faudra réfléchir à la manière de faire face à sa puissance. »§!"
 exploration.600.req: "A rencontré un léviathan"
 exploration.600.fail: "£trigger_no£ $exploration.600.req$"
 exploration.600.success: "£trigger_yes£ $exploration.600.req$"
