 # Conquest Focus Cards
 #######################
 conquest.100.name: "Améliorer une base stellaire"
 conquest.100.desc: ""
 conquest.100.hint: "Améliorez une ['concept_starbase',base stellaire] au niveau suivant depuis l'onglet $starbase_view_tab_command$ de la £interface£['concept_starbase_view',vue base stellaire]."
 conquest.100.lore: "§L« Un bon port stellaire est un avertissement pour l'ennemi. Il n'est pas là pour faire beau, mais pour dissuader. »§!"
 conquest.100.req: "A amélioré une base stellaire"
 conquest.100.fail: "£trigger_no£ $conquest.100.req$"
 conquest.100.success: "£trigger_yes£ $conquest.100.req$"
 conquest.105.name: "Recruter un commandant"
 conquest.105.desc: ""
 conquest.105.hint: "Recrutez une ['concept_leader',personnalité] de la classe des £commander£['concept_commander',commandants] depuis la £interface£['concept_leaders_view',vue personnalités].$focus_other$"
 conquest.105.lore: "§L« Les meilleurs commandants ne demandent pas combien ils seront payés, mais quand ils seront envoyés au combat. »§!"
 conquest.105.req: "A recruté un commandant"
 conquest.105.fail: "£trigger_no£ $conquest.105.req$"
 conquest.105.success: "£trigger_yes£ $conquest.105.req$"
 conquest.110.name: "Construire 5 corvettes"
 conquest.110.desc: ""
 conquest.110.hint: "Construisez 5 vaisseaux de type §Hcorvette§! depuis l'onglet $fleet_management_view_tab_fleet_manager$ de la £interface£['concept_fleet_management_view',vue gestion des flottes] ou un ['concept_shipyard',chantier spatial]."
 conquest.110.lore: "§L« Rapide, bon marché et remplaçable. Personne ne le dit à haute voix, mais les équipages le savent. » - Ilsh na-Sutar, 3e flotte expéditionnaire§!"
 conquest.110.req: "A construit 5 corvettes"
 conquest.110.fail: "£trigger_no£ $conquest.110.req$"
 conquest.110.success: "£trigger_yes£ $conquest.110.req$"
 conquest.111.name: "Cloner 5 amibes spatiales"
 conquest.111.desc: ""
 conquest.111.hint: "Clonez 5 amibes spatiales depuis l'onglet $fleet_management_view_tab_fleet_manager$ de la £interface£['concept_fleet_management_view',vue gestion des flottes] ou un ['concept_shipyard',port bestial]."
 conquest.111.lore: "§L« L'idée de transformer des êtres vivants en armes est controversée. Certains y voient un progrès, d'autres un blasphème, mais l'histoire ne retient que les vainqueurs. » - Dr Hask'Zumon, Guerre et génétique§!"
 conquest.111.req: "A cloné 5 amibes spatiales"
 conquest.111.fail: "£trigger_no£ $conquest.111.req$"
 conquest.111.success: "£trigger_yes£ $conquest.111.req$"
 conquest.112.name: "Produire 5 lutteurs"
 conquest.112.desc: ""
 conquest.112.hint: "Produisez 5 vaisseaux biologiques de type §Hlutteur§! depuis l'onglet $fleet_management_view_tab_fleet_manager$ de la £interface£['concept_fleet_management_view',vue gestion des flottes] ou un ['concept_shipyard',chantier spatial]."
 conquest.112.lore: "§L« On ne les appelle pas des lutteurs pour rien. » - Nara na-Telkan, 4e flotte expéditionnaire§!"
 conquest.112.req: "A produit 5 lutteurs"
 conquest.112.fail: "£trigger_no£ $conquest.112.req$"
 conquest.112.success: "£trigger_yes£ $conquest.112.req$"
 conquest.115.name: "Construire 3 plateformes de défense"
 conquest.115.desc: ""
 conquest.115.hint: "Construisez 3 §Hplateformes de défense§! depuis l'onglet $starbase_view_tab_defenses$ de la £interface£['concept_starbase_view',vue base stellaire]."
 conquest.115.lore: "§L« Vos défenses n'ont pas besoin d'être très solides, elles doivent juste tenir jusqu'à ce que l'ennemi meure en premier. »§!"
 conquest.115.req: "A construit 3 plateformes de défense"
 conquest.115.fail: "£trigger_no£ $conquest.115.req$"
 conquest.115.success: "£trigger_yes£ $conquest.115.req$"
 conquest.120.name: "Déclarer un rival"
 conquest.120.desc: ""
 conquest.120.hint: "Déclarez un autre ['concept_empire',empire] comme ['concept_rival',rival] depuis l'onglet $contacts_view_tab_contacts$ de la £interface£['concept_contacts_view',vue contacts]."
 conquest.120.lore: "§L« La grandeur d'un empire ne se mesure pas au nombre de ses partisans, mais à la puissance de ses rivaux. »§!"
 conquest.120.req: "A déclaré un rival"
 conquest.120.fail: "£trigger_no£ $conquest.120.req$"
 conquest.120.success: "£trigger_yes£ $conquest.120.req$"
 conquest.125.name: "Gagner une bataille de flottes"
 conquest.125.desc: ""
 conquest.125.hint: "Concevez une ['concept_fleet',flotte] puissante depuis l'onglet $fleet_management_view_tab_fleet_manager$ de la £interface£['concept_fleet_management_view',vue gestion des flottes]. Sélectionnez-la depuis le £interface£['concept_outliner',gestionnaire], la £interface£['concept_system_map',carte du système] ou la £interface£['concept_galaxy_map',carte de la galaxie] et envoyez-la combattre un adversaire."
 conquest.125.lore: "§L« Sur le plan tactique, leur amiral était meilleur, mais nos vaisseaux étaient plus grands. »§!"
 conquest.125.req: "A gagné une bataille de flottes"
 conquest.125.fail: "£trigger_no£ $conquest.125.req$"
 conquest.125.success: "£trigger_yes£ $conquest.125.req$"
 conquest.200.name: "Découvrir de nouvelles armes"
 conquest.200.desc: ""
 conquest.200.hint: "Ouvrez la £interface£['concept_technology_view',vue technologies] et recherchez une technologie d'armement, comme les §Hlasers§! en £physics£['concept_physics_research',physique] ou les §Hmissiles§! en £engineering£ ['concept_engineering_research',ingénierie]."
 conquest.200.lore: "§L« La victoire ne se joue pas sur le champ de bataille, mais dans les laboratoires. » - Igvi-Inor, 2e amas d'assaut§!"
 conquest.200.req: "A découvert une nouvelle arme"
 conquest.200.fail: "£trigger_no£ $conquest.200.req$"
 conquest.200.success: "£trigger_yes£ $conquest.200.req$"
 conquest.205.name: "Faire passer un commandant au niveau sup."
 conquest.205.desc: ""
 conquest.205.hint: "Envoyez une ['concept_fleet',flotte] commandée par un £commander£['concept_commander',commandant] au combat. Vous pouvez également le nommer ['concept_governor',gouverneur] ou au ['concept_council'].\n\nCes tâches lui permettent d'acquérir une grande expérience, de gagner des niveaux et de développer de nouveaux ['concept_leader_traits',traits]."
 conquest.205.lore: "§L« Les bleus apprennent à se battre, les commandants aguerris apprennent quand se battre. » - Nouvelles doctrines de la guerre spatiale§!"
 conquest.205.req: "Faire passer un commandant au niveau sup."
 conquest.205.fail: "£trigger_no£ $conquest.205.req$"
 conquest.205.success: "£trigger_yes£ $conquest.205.req$"
 conquest.210.name: "Construire 20 destroyers"
 conquest.210.desc: ""
 conquest.210.hint: "Créez et renforcez une ou plusieurs ['concept_fleets',flottes] de 20 §Hdestroyers§! depuis l'onglet $fleet_management_view_tab_fleet_manager$ de la £interface£['concept_fleet_management_view',vue gestion des flottes], ou construisez les vaisseaux individuellement depuis un ['concept_shipyard',chantier spatial]."
 conquest.210.lore: "§L« Assez robustes pour durer et assez bon marché pour être perdus. \"Un bon investissement\" d'après le commandement. »§!"
 conquest.210.req: "A construit 20 destroyers"
 conquest.210.fail: "£trigger_no£ $conquest.210.req$"
 conquest.210.success: "£trigger_yes£ $conquest.210.req$"
 conquest.211.name: "Avoir 10 mères amibes spatiales"
 conquest.211.desc: ""
 conquest.211.hint: "Créez et renforcez une ou plusieurs ['concept_fleets',flottes] de 10 §Hmères amibes spatiales§! depuis l'onglet $fleet_management_view_tab_fleet_manager$ de la ['concept_fleet_management_view',vue gestion des flottes]. Vous pouvez également utiliser un ['concept_beastport',port bestial] pour les cloner individuellement ou laisser les §Hamibes spatiales§! existantes grandir."
 conquest.211.lore: "§L« Une arme pour nous, un foyer pour ses enfants. »§!"
 conquest.211.req: "A 10 mères amibes spatiales"
 conquest.211.fail: "£trigger_no£ $conquest.211.req$"
 conquest.211.success: "£trigger_yes£ $conquest.211.req$"
 conquest.212.name: "Produire 20 tisseurs"
