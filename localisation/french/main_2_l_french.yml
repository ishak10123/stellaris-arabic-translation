 GROUND_SUPPORT_STANCE_DESC: "§HBombardement orbital§!\nLe protocole de bombardement orbital est §H$STANCE|Y$§!."
 bombardment_selective_desc: "Le protocole de bombardement $bombardment_selective$ ne vise que les sites militaires dûment identifiés, en prenant soin d'épargner toute perte civile évitable :\n- dommages §Ymodérés§! pour les §Yarmées§! ;\n- dommages §Ymodérés§! pour le §Ymonde§! ;\n- dommages §Elégers§! pour les £pop£§Ypops§! ;\n- ne permet §RPAS§! de bombarder les mondes non défendus ;\n- ne permet §RPAS§! de tuer les §Y$MIN_POPS$§! dernières £pop£pops."
 bombardment_indiscriminate_desc: "Le protocole de bombardement $bombardment_indiscriminate$ vise les infrastructures militaires et planétaires sans se soucier des pertes civiles :\n- dommages §Himportants§! pour les §Yarmées§! ;\n- dommages §Himportants§! pour le §Ymonde§! ;\n- dommages §Ymodérés§! pour les £pop£§Ypops§! ;\n- permet de bombarder les mondes non défendus ;\n- ne permet §RPAS§! de tuer les §Y$MIN_POPS$§! dernières £pop£pops."
 bombardment_armageddon_desc: "Le protocole de bombardement $bombardment_armageddon$ fait tomber sur un monde d'un véritable tapis de bombes, avec pour objectif clair de causer autant de pertes civiles que possible :\n- dommages §Rmassifs§! pour les §Yarmées§! ;\n- dommages §Rmassifs§! pour le §Ymonde§! ;\n- dommages §Rmassifs§! pour les £pop£§Ypops§!\n- permet de bombarder les mondes non défendus ;\n- permet de transformer des mondes en mondes morts, sans aucune vie."
 bombardment_raiding_desc: "Le protocole de bombardement $bombardment_raiding$ vise les foyers de population ennemis avec des vaisseaux spécialisés dans la capture et collectant les xénos pour les ramener sur nos mondes afin de les mettre au travail :\n- dommages §Elégers§! pour les §Yarmées§! ;\n- dommages §Elégers§! pour le §Ymonde§! ;\n- permet d'§Yenlever§! des £pop£pops lorsque cela est possible, au lieu de les tuer ;\n- ne permet §RPAS§! d'enlever ou tuer la dernière £pop£pop.\nChaque armée présente sur le monde accroît le nombre de £pop£pops protégées."
