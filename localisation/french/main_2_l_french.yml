 civic_tooltip_aristocratic_elite_effects: "- Les emplois de £job_politician£§Ypoliticiens§! sont convertis en emplois de £job_noble£§Ynobles§!.\n- Permet de construire des £building£§Ydomaines nobiliaires§!, fournissant des emplois de £job_noble£§Ynobles§! supplémentaires.\n- Donne accès à la possession £building£§Y$holding_noble_vacation_homes$§!.\n- Les §Ypersonnalités§! ont §Y20%§! de chances supplémentaires de commencer avec un trait positif et négatif supplémentaire."
