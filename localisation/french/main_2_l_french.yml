 civic_ancient_preservers_desc: ""
 civic_trading_conglomerate: "Conglomérat marchand"
 civic_trading_conglomerate_desc: ""
 civic_artist_collective: "Collectif d'artistes"
 civic_artist_collective_desc: ""
