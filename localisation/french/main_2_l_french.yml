 TECH_UNLOCK_JUMPDRIVE_1_DESC: "§HPropulseur de bond§!\n$tech_jump_drive_1_desc$"
 TECH_UNLOCK_PSI_JUMPDRIVE_1_TITLE: "§HPermet le composant§! Propulseur de bond Psi I"
