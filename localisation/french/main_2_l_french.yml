 gunship: "Canonnière"
 gunship_desc: "Les canonnières sont conçues pour combattre les autres vaisseaux de classe équivalente et embarquent autant d'armement à portée intermédiaire que possible."
 explosive: "Siège"
 explosive_desc: "Les vaisseaux de siège embarquent de l'armement guidé infligeant des dommages importants aux vaisseaux les plus imposants, aux bases stellaires et aux mondes."
 carrier: "Porteur"
 carrier_desc: "Les porteurs agissent comme des plateformes de lancement pour les appareils de combat."
 screen: "Escorteur"
 screen_desc: "Les escorteurs embarquent de la défense rapprochée afin de protéger le reste de la flotte des missiles, torpilles et appareils de combat."
 artillery: "Artillerie"
 artillery_desc: "Les vaisseaux d'artillerie embarquent des missiles et armements de tir direct. Ils sont souvent en difficulté face aux petits vaisseaux ou à ceux qui se rapprochent trop."
 brawler: "Destructeur"
 brawler_desc: "Les destructeurs sont conçus pour les combats rapprochés et embarquent de l'armement à courte portée infligeant de lourds dommages, comme les autocanons et disrupteurs."
 energy_torpedoes: "Lanceur énergétique"
 energy_torpedoes_desc: "Les lanceurs énergétiques disposent de torpilles à protons ou à neutrons pour infliger des dommages supplémentaires aux vaisseaux les plus imposants. Ils sont souvent vulnérables face aux vaisseaux se rapprochant trop d'eux."
