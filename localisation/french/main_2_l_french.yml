 requirement_robotics_2: "§RNécessite §Y$building_capital_2$§! sur la planète et que l'intelligence artificielle ne soit pas proscrite.§!"
 requirement_robotics_3: "§RNécessite §Y$building_capital_3$§! sur la planète et que l'intelligence artificielle ne soit pas proscrite.§!"
 requirement_slave_facility: "§RAucun esclave ne se trouve sur ce monde.§!"
