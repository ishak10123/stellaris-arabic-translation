 citizenship_organic_trophy: "Biotrophée"
 citizenship_organic_trophy_tooltip: "L'§H$auth_machine_intelligence$§! prend grand soin des pops de cette espèce, qu'elle libère des fardeaux de la responsabilité et de la moindre prise de décision."
 citizenship_organic_trophy_tooltip_delayed: "§LGloire aux organiques.§!"
 citizenship_assimilation: "Assimilation"
 citizenship_assimilation_tooltip: "Les £pop£§Hpops§! de cette espèce sont §Yaltérées§! au cours du temps afin de mieux correspondre à l'espèce dominante de l'empire. Les §Hpops§! en cours d'assimilation ne peuvent produire la moindre ressource.\n\n§HPops§! de base assimilées par mois : §Y100§!"
 citizenship_assimilation_tooltip_delayed: "§LNous intégrerons vos caractéristiques biologiques et technologiques aux nôtres. Votre culture s'adaptera à nos besoins.§!"
 citizenship_full_machine: "Intégration mécanique"
 citizenship_full_machine_tooltip: "Toutes les pops de cette espèce dans l'empire sont pleinement intégrées au sein de l'§H$auth_machine_intelligence$§!."
 citizenship_full_machine_tooltip_delayed: "§LContrôle direct assumé.§!"
 citizenship_full: "Pleine citoyenneté"
 citizenship_full_tooltip: "Les pops sont libres de s'impliquer dans la vie politique et chaque espèce peut donner naissance à des §Hpersonnalités§!."
 citizenship_full_tooltip_delayed: "§LChacun des individus de cette espèce est un membre estimé de la société [From.GetAdj].§!"
 citizenship_caste_system: "Système de castes"
 citizenship_caste_system_tooltip: "§Y50%§! des pops de cette espèce seront automatiquement §Yasservies§! sur chacune de nos planètes. Les pops libres peuvent s'engager politiquement et donner naissance à des §Hpersonnalités§!."
 citizenship_caste_system_tooltip_delayed: "§LCertains [From.GetSpeciesNamePlural] sont plus égaux que d'autres.§!"
 citizenship_caste_system_limited: "Système de castes (résidence)"
 citizenship_caste_system_limited_tooltip: "§Y50%§! des pops de cette espèce seront automatiquement §Yasservies§! sur chacune de nos planètes. Les pops libres ne peuvent pas s'engager politiquement et l'espèce ne peut donner naissance à des §Hpersonnalités§!."
 citizenship_caste_system_limited_tooltip_delayed: "§LCertains [From.GetSpeciesNamePlural] sont plus égaux que d'autres.§!"
 citizenship_limited: "Résidence"
 citizenship_limited_tooltip: "Les pops sont libres mais disposent d'un poids politique moindre, et cette espèce ne pourra donner naissance à aucune §Hpersonnalité§!."
 citizenship_limited_tooltip_delayed: "§LCette espèce doit encore prouver qu'elle mérite tous les droits accordés aux autres. Peut-être n'y parviendra-elle jamais...§!"
 citizenship_slavery: "Esclaves"
 citizenship_slavery_tooltip: "Toutes les pops de cette espèce sont asservies. Les esclaves consomment §Hmoins de biens de consommation§! que les pops libres."
 citizenship_slavery_tooltip_delayed: "§LLa liberté n'est qu'illusion. Pour certains, plus que pour d'autres, cette vérité est indéniable.§!"
 citizenship_purge: "Indésirables"
 citizenship_purge_tooltip: "Toutes les pops de cette espèce sont systématiquement purgées. Les pops purgées (à l'exception de celles qui sont §Hexterminées§! ou §Hdéportées§!) ne consomment §Haucun bien de consommation§!."
 citizenship_purge_tooltip_delayed: "§LLes archives ne reconnaissent pas l'existence de cette espèce.§!"
