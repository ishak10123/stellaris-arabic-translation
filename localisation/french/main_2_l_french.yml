 MACRO_BUILDER_TITLE: "§EConcepteur d'armées d'assaut§!"
 MACRO_BUILDER_DESC: "Le §Yconcepteur d'armées d'assaut§! permet de recruter aisément un grand nombre d'armées d'assaut sur les mondes du secteur qui le permettent.\n\nUne fois le processus de recrutement achevé, il est tenté de renforcer toute §Yarmée§! pouvant être §Yralliée§! ou de les positionner sur une base stellaire."
 MACRO_BUILDER_CAPACITY_DESC: "Le nombre d'armées pouvant être recrutées simultanément dépend du nombre de £planet£§Ymondes§! disponibles. Certains de ceux-ci peuvent être exclus du §Yconcepteur d'armées d'assaut§! dans l'onglet Armées de l'interface planétaire."
