 building_robotics_assembly_plant_desc: "La création d'armées robotiques nécessite une usine d'assemblage robotique.\nAjoute §Y100§! £pop£§Hpops robotiques§! par an\nEntretien de la pop : §Y1§!£energy£"
 building_robotics_assembly_plant_2: "Usine d'assemblage de droïdes"
 building_robotics_assembly_plant_2_desc: "La création d'armées robotiques nécessite une usine d'assemblage de droïdes.\nAjoute §Y100§! £pop£§Hpops droïdes§! par an\nAméliore les pops §Hrobotiques§! en §Hdroïdes§!\nEntretien de la pop : §Y2§!£energy£"
 building_robotics_assembly_plant_3: "Usine d'assemblage de synthétiques"
 building_robotics_assembly_plant_3_desc: "La création d'armées robotiques nécessite une usine d'assemblage de synthétiques.\nAjoute §Y100§! £pop£§Hpops synthétiques§! par an\nAméliore les pops §Hdroïdes§! en §Hsynthétiques§!\nEntretien de la pop : §Y5§!£energy£"
 building_colony_shelter: "Vaisseau-abri reconstitué"
 building_colony_shelter_desc: "Les restes d'un Vaisseau de colonisation, réassemblés pour un usage planétaire."
 building_capital: "Administration planétaire"
 building_capital_desc: "Le siège des élites dirigeantes locales."
 building_major_capital: "Capitole planétaire"
 building_major_capital_desc: "Un complexe tentaculaire de structures bureaucratiques, étant dans les faits le centre administratif d'une colonie majeure."
 building_system_capital: "Complexe capitolin du système"
 building_system_capital_desc: "Un agencement colossal comprenant aussi bien des bureaux administratifs que des réseaux d'infrastructures, permettant la construction et l'exploitation d'installations très exigeantes."
 building_ancient_factory: "Fabricants autonomes"
 building_ancient_factory_desc: "§LCet ancien complexe a été construit avec une technologie qui a depuis longtemps été perdue.§!"
 building_ancient_archives: "Archives des précurseurs"
 building_ancient_archives_desc: "§LDes puits sans fonds de connaissance ancienne.§!"
 building_dark_matter_power_plant: "Centrale à matière noire"
 building_dark_matter_power_plant_desc: "§LCet ancien complexe a été construit avec une technologie qui a depuis longtemps été perdue.§!"
 building_agri_processing_complex: "Complexe de traitement agricole"
 building_agri_processing_complex_desc: "§LCet ancien complexe a été construit avec une technologie qui a depuis longtemps été perdue.§!"
 building_primitive_farm: "Fermes primitives"
 building_primitive_farm_desc: "Des fermes primitives pour travailler le sol en échange d'un maigre tribut."
 building_primitive_factory: "Usines de base"
 building_primitive_factory_desc: "Des usines primitives et inefficaces vomissant de la pollution pour produire des biens."
 building_primitive_offices: "Bureaux de base"
 building_primitive_offices_desc: "Ces bureaux contiennent des box à perte de vue, exposés au bruit des basses besognes."
 building_primitive_mine: "Mine primitive"
 building_primitive_mine_desc: "Tunnels miniers primitif qui serpentent à travers le sol."
 building_primitive_power_plant: "Centrale électrique primitive"
 building_primitive_power_plant_desc: "Une centrale primitive et assez peu fiable, produisant de l'énergie grâce à la technologie du charbon ou les débuts balbutiants de l'énergie atomique, contribuant à empoisonner l'atmosphère."
 building_mutant_landfill: "Décharge de mutants"
 building_mutant_landfill_desc: "Une masse putride de cadavres de mutants. Leur matière organique volatile s'est agrégée pour former une sorte de structure."
 building_vault: "Caveau souterrain"
 building_vault_desc: "Ces tentes marquent l'entrée de surface d'un immense caveau souterrain, prévu comme un abri anti-bombes par les habitants originaux de ce monde. Ses occupants se sont montés les uns contre les autres lorsqu'ils sont arrivés à court de vivres."
 building_vault_2: "Caveau souterrain"
 building_vault_2_desc: "Ces tentes marquent l'entrée de surface d'un immense caveau souterrain, prévu comme un abri anti-bombes par les habitants originaux de ce monde. Le caveau contient une gigantesque machine ainsi que des réserves d'équipement minier."
 building_particle_accelerator: "Accélérateur de particules"
 building_particle_accelerator_desc: "Cet ancien accélérateur de particules a été construit en utilisant un nouveau concept, et les terminaux qui ont survécu au sein de la structure contiennent des quantités astronomiques de données de recherche qui semblent avoir été amassées par quelqu'un qui devait être un brillant physicien théorique."
 building_odd_factory: "Étrange usine"
 building_odd_factory_desc: "Un complexe bien conçu qui produit des ressources à haute valeur ajoutée, abandonné sur la planète par une civilisation différente."
 building_quarantine: "Station de recherche sur l'épidémie"
 building_quarantine_desc: "Hôpital temporaire consacré à l'étude des malades infectés par l'épidémie afin de découvrir un remède."
 building_plague_memorial: "Mémorial commémorant l'épidémie"
 building_plague_memorial_desc: "Un monument commémoratif pour rappeler aux habitants l'horrible maladie qui hantait autrefois leurs foyers. Il se dresse comme un testament à la survie de la nation."
 building_energy_grid: "Réseau énergétique"
 building_energy_grid_plural: "Réseaux énergétiques"
 building_energy_grid_desc: "Un réseau énergétique calibré avec une très grande précision afin de maximiser la production des générateurs énergétiques."
 building_energy_grid_effect_desc: "Pour chaque £job£emploi producteur d'£energy£§Yénergie§! : §G+1§! sur la production brute."
 building_energy_nexus: "Liaison énergétique"
 building_energy_nexus_desc: "Ce complexe colossal centralise tous les réseaux énergétiques de ce monde, améliorant leur efficacité."
 building_mineral_purification_plant: "Centrales de purification des minéraux"
 building_mineral_purification_plant_desc: "Les minéraux traités par ces purificateurs sont de la meilleure qualité."
 building_mineral_purification_hub: "Centre de purification des minéraux"
 building_mineral_purification_hub_desc: "Centres colossaux où les minéraux sont reçus et transportés jusqu'à des installations de purification."
 building_medical_1: "Centre médical"
 building_medical_1_desc: "$job_healthcare_desc$"
 building_medical_2: "Génécliniques"
 building_medical_2_desc: "Les génécliniques fournissent des traitements médicaux perfectionnés, ce qui statistiquement contribue à la santé de la population et à allonger son espérance de vie."
 building_medical_3: "Centres de cytorevitalisation"
 building_medical_3_desc: "Les centres de cytorevitalisation fournissent des traitements médicaux perfectionnés à une population importante. Les traitements cellulaires permettent de disposer d'une population bien plus saine et à l'espérance de vie accrue."
 building_mineral_silo_1: "Silo à minéraux I"
 building_mineral_silo_1_desc: "Les silos à minéraux augmentent la capacité de stockage en minéraux de notre empire."
 building_mineral_silo_2: "Silo à minéraux II"
 building_mineral_silo_2_desc: "$building_mineral_silo_1_desc$"
 building_mineral_silo_3: "Silo à minéraux III"
 building_mineral_silo_3_desc: "$building_mineral_silo_1_desc$"
 building_planetary_shield_generator: "Générateur de bouclier planétaire"
 building_planetary_shield_generator_desc: "$tech_planetary_shield_generator_desc$"
 building_autochthon_monument: "Monument autochtone"
 building_autochthon_monument_plural: "Monuments autochtones"
 building_autochthon_monument_desc: "Un monument élevé à la mémoire des pionniers s'étant aventurés dans l'espace pour ouvrir la voie à la conquête spatiale."
 building_autochthon_monument_effect: "Suscite §G1§!£unity£ par §Yatout de l'ascension§! adopté.\n\n"
 building_heritage_site: "Site patrimonial"
 building_heritage_site_desc: "Une zone dédiée à l'histoire primitive de l'empire et de sa population."
 building_heritage_site_effect: "Suscite §G2§!£unity£ par §Yatout de l'ascension§! adopté.\n\n"
 building_hypercomms_forum: "Forum d'hypercomm"
 building_hypercomms_forum_desc: "Ce forum est un immense complexe équipé de matériel de communication interpesonnels à la pointe de la technologie, permettant l'échange d'idées multisensorielles lors de discussions informelles et la formation rapide d'un consensus à l'issu de débats."
 building_hypercomms_forum_effect: "Suscite §G3§!£unity£ par §Yatout de l'ascension§! adopté.\n\n"
 building_autocurating_vault: "Caveau autogéré"
 building_autocurating_vault_desc: "Réseau informatisé et hautement spécialisé, acquérant, analysant, évaluant et exposant de manière constante les objets du quotidien qu'il semble juger être de grande importance, permettant ainsi de créer un musée vivant du présent."
 building_temple: "Temple"
 building_temple_desc: "Les temples, des bâtiments assez simple érigés en des périodes extrêmement anciennes, sont des lieux de méditation contemplative et de communion avec ce qui nous unit tous."
 building_holotemple: "Holotemple"
 building_holotemple_desc: "Évolution perfectionnée de ses prédécessuers grossiers, la technologie spiritualiste de pointe permet de créer une réalité maléable à l'intérieur de l'holotemple, assurant ainsi une méditation plus profonde et une dévotion plus intense."
 building_sacred_nexus: "Noeud sacré"
 building_sacred_nexus_desc: "Les dernières avancées en technologie des champs permettent aux fidèles d'expérimenter de façon directe l'influence du Divin sur un sol sacré."
 building_citadel_of_faith: "Citadelle de la foi"
 building_citadel_of_faith_desc: "Un complexe massif, offrant à tous les pèlerins refuge et retraite à l'écart du monde matériel."
 building_stronghold: "Bastion"
 building_stronghold_desc: "Une forteresse planétaire abritant une garnison importante afin de protéger le monde de toute invasion ou soulèvement."
 building_fortress: "Forteresse"
 building_fortress_desc: "Un important complexe défensif doté d'une garnison nombreuse et de centres d'entraînement pour les troupes."
 building_bio_reactor: "Bioréacteur"
 building_bio_reactor_desc: "Complexe permettant la transformation avec une très grande efficience de la matière organique en énergie."
 tech_bio_reactor: "$building_bio_reactor$"
 tech_bio_reactor_desc: "$building_bio_reactor_desc$"
 building_bio_reactor_2: "Bioréacteur avancé"
 building_bio_reactor_2_desc: "Complexe permettant la transformation avec une très grande efficience de la matière organique en énergie. Les progrès en matière de collecte des déchets permettent de récupérer des sous-produits gazeux utiles."
 tech_bio_reactor_2: "$building_bio_reactor_2$"
 tech_bio_reactor_2_desc: "$building_bio_reactor_2_desc$"
 building_hab_stronghold: "Zone de sécurité"
 building_hab_stronghold_desc: "Cette section est dédiée à la sécurité et fournit des forces de sécurité armées afin de protéger l'habitat de toute menace, aussi bien intérieure qu'extérieure."
 building_crude_huts: "Huttes sommaires"
 building_crude_huts_desc: "Des abris primitifs construits en pierre, en argile ou en tout autre matériau disponible."
 building_primitive_dwellings: "Résidences primitives"
 building_primitive_dwellings_desc: "Ces bâtiments modestes fournissent un nombre réduit de logements, mais permettent surtout de se mettre à l'abri des éléments."
 building_stone_palace: "Palais de pierre"
 building_stone_palace_desc: "Des sortes de petits palais construits en pierre, où réside l'élite régnante locale."
 building_primitive_capital: "Capitale régionale"
 building_primitive_capital_desc: "Bâtiments de la capitale régionale des divers États-nations occupant ce monde primitif."
 building_urban_dwellings: "Résidences urbaines"
 building_urban_dwellings_desc: "Jungles de béton, le plus souvent exiguës et polluées."
 building_pre_ftl_radio_telescope: "Radiotélescope"
 building_pre_ftl_radio_telescope_desc: "Un dispositif permettant de chercher la présence d'une vie alien intelligente."
 awareness_gain_desc: "Accroît les chances que cette civilisation, avec le temps, accède à un plus haut degré de £awareness£§Yperception§!."
 building_hive_crude_huts: "Nids simples"
 building_hive_crude_huts_desc: "Utilisant les matériaux disponibles les plus simples et exigeant le moins d'efforts, ces nids suffisent à peine à préserver les drones du gel au cours de la nuit."
 building_hive_primitive_dwellings: "Colonie primitive"
 building_hive_primitive_dwellings_desc: "Commençant à optimiser l'espace disponible, ces bâtiments hexagonaux peuvent abriter ce que l'on pourrait appeler une colonie naissante."
 building_hive_stone_palace: "Ruche de pierre"
 building_hive_stone_palace_desc: "Sur un monde où la survie exige de lutter contre sa propre espèce, disposer de murs de pierre constitue toujours un réel avantage."
 building_hive_primitive_capital: "Noeud continental"
 building_hive_primitive_capital_desc: "Le coeur même du continent, étendant son contrôle sur les consciences luttant pour s'assurer de la domination de leur monde."
 building_hive_urban_dwellings: "Réserve de drones"
 building_hive_urban_dwellings_desc: "Une solution tout à fait commode pour loger les drones lors de leurs cycles de repos. Il y a des entrées et sorties distinctes afin d'optimiser le processus de circulation de la Conscience."
 building_hive_primitive_factory: "$building_primitive_factory$"
 building_hive_primitive_factory_desc: "$building_primitive_factory_desc$"
 building_hive_primitive_mine: "$building_primitive_mine$"
 building_hive_primitive_mine_desc: "$building_primitive_mine_desc$"
 building_hive_primitive_power_plant: "$building_primitive_power_plant$"
 building_hive_primitive_power_plant_desc: "$building_primitive_power_plant_desc$"
 building_hive_primitive_farm: "$building_primitive_farm$"
 building_hive_primitive_farm_desc: "$building_primitive_farm_desc$"
 building_hive_primitive_node: "Noeud synaptique simple"
 building_hive_primitive_node_desc: "Grâce à ce simple noeud synaptique, la volonté de la Conscience sera réaffirmée."
 building_machine_primitive_node: "Noeud en liaison montante simple"
 building_machine_primitive_node_desc: "Un noeud en liaison montante simple permettant de réduire la latence planétaire."
 building_farming_districts_1: "Centre de développement des cultures"
 building_farming_districts_1_desc: "Un centre administratif modeste chargé d'observer les terres arables et d'initier l'expansion de l'agriculture planétaire."
 building_farming_districts_2: "Centre de revalorisation des terres"
 building_farming_districts_2_desc: "Ce centre se consacre à la restauration des terres pour améliorer les rendements, de façon à permettre une meilleure croissance des districts agricoles."
 building_farming_districts_3: "Complexe agricole automatisé"
 building_farming_districts_3_desc: "Les moissonneuses mécanisées, flottes de drones et champs au climat régulé stimulent l'expansion rapide des districts agricoles."
 building_farming_districts_4: "Réseau de cultures planétaire"
 building_farming_districts_4_desc: "Un vaste complexe intégré supervisant les opérations agricoles intensives et de haute densité de façon à optimiser le nombre de districts agricoles présents sur la planète."
 building_mine_generic: "Dépôt de carrière en surface"
 building_mine_generic_desc: "En coordonnant l'excavation proche de la surface et la collecte des minerais, ce dépôt permet une expansion précoce des districts miniers."
 building_mining_districts_1: "Site minier industriel"
 building_mining_districts_1_desc: "Les appareils de forage, systèmes de convoyage et dispositifs de tri fonctionnent à l'unisson pour offrir une production soutenue et permettre l'expansion initiale des districts miniers."
 building_mining_districts_2: "Dispositif de forage en profondeur"
 building_mining_districts_2_desc: "Une station menant des opérations minières en effectuant des forages profonds et des renforcements structurels, afin d'avoir accès à des sites de minéraux supplémentaires."
 building_mining_districts_3: "Chantier de tunnels sismiques"
 building_mining_districts_3_desc: "Un complexe équipé pour le percement des tunnels et la stabilisation souterraine à haut rendement, donnant ainsi accès à des gisements de minerais précédemment hors de portée."
 building_mining_districts_4: "Réseau d'extraction tectonique profonde"
 building_mining_districts_4_desc: "En tant que station tentaculaire opérant à une profondeur planétaire maximale, ce complexe gère des zones d'extraction entièrement industrialisées où il contribue à l'expansion totale des districts miniers."
 building_generator_generic: "Chantier de production voltaïque"
 building_generator_generic_desc: "Dédié à la génération d'énergie à grande échelle, ce bâtiment abrite des cellules énergétiques, conduites de plasma et dispositifs de génération à haute production."
 building_generator_districts_1: "Complexe de travaux conducteurs"
 building_generator_districts_1_desc: "Ce complexe participe à l'établissement de nouveaux districts générateurs en mettant à disposition des infrastructures de réseaux essentiels et des systèmes de gestion de l'énergie."
 building_generator_districts_2: "Complexe de relais"
 building_generator_districts_2_desc: "Pour permettre une contribution plus large au développement des districts générateurs, cette station emploie des infrastructures planétaires de génération énergétique via le déploiement de relais de haute capacité, de chantiers de transformateurs et de noeuds de stabilisation du réseau."
 building_generator_districts_3: "Dispositif de régulation du plasma"
 building_generator_districts_3_desc: "Un complexe dans lequel les écoulements de plasma stabilisé et le contrôle de résonance du circuit permettent une intensification du développement des générateurs à travers la planète."
 building_generator_districts_4: "Nexus planétaire"
 building_generator_districts_4_desc: "Ce nexus énergétique intégré coordonne des opérations de générateurs à l'échelle de la planète qui permettent l'expansion maximale des districts générateurs."
 ####################################
 #Wonders
 ####################################
 building_xeno_zoo: "Xénozoo"
 building_xeno_zoo_plural: "Xénozoos"
 building_xeno_zoo_desc: "Une réserve consacrée à la conservation et à l'étude de la faune locale."
 building_fe_xeno_zoo: "Xénoréserve"
 building_hab_capital: "Centre administratif"
 building_hab_capital_desc: "Le coeur administratif de l'habitat, servant à la fois de capitale et de siège des autorités locales."
 building_hab_capital_tooltip: "£mod_planet_max_districts_add£Max. de districts des corps célestes majeurs : §G+0.25§!\n"
 building_hab_solar_power_processor: "Processeur solaire"
 building_hab_solar_power_processor_desc: "Les processeurs solaires redistribuent l'énergie capturée par de vastes champs de panneaux solaires disposés sur la coque extérieure de l'habitat."
 building_hab_astro_mining_facility: "Hangar d'astrominage"
 building_hab_astro_mining_facility_desc: "Ne disposant pas de ressource naturelle en tant que tel, l'habitat dépend de ces complexes pour miner et traiter les minéraux des astéroïdes et planétoïdes voisins."
 building_hab_agri_bay: "Zone agricole"
 building_hab_agri_bay_desc: "Une section de l'habitat réservée à la culture des diverses espèces végétales et animales nécessaires à la population locale."
 building_hab_cultural_center: "District des plaisirs"
 building_hab_cultural_center_desc: "Ce complexe tentatculaire répond aux besoins culturels et sociaux de la population de l'habitat."
 building_hab_laboratory_module: "Complexe scientifique"
 building_hab_laboratory_module_desc: "Une section de l'habitat entièrement dédiées à la recherche scientifique."
 building_fe_xeno_zoo_desc: "Réserve hautement sophistiquée, destinée à maintenir l'habitat naturel des espèces aliens « préservées »."
 building_paradise_dome: "Dôme du paradis"
 building_paradise_dome_desc: "Dôme d'habitation totalement clos, comprenant un écosystème en circuit fermé. Il s'agit d'un véritable paradis privé pour ceux qui sont suffisamment riches ou chanceux pour y vivre."
 building_monument: "Monument"
 building_monument_desc: "Un monument à la gloire d'un grand personnage."
 building_monument_proper: "Monument à [GetRulerName]"
 building_monument_desc_proper: "Un monument colossal honorant l'inoubliable [GetRulerName]."
 building_grand_mausoleum: "Grand mausolée"
 building_grand_mausoleum_desc: "Un imposant mausolée construit pour servir de tombe à un grand dirigeant."
 building_grand_mausoleum_proper: "Grand mausolée de [GetRulerName]"
 building_grand_mausoleum_desc_proper: "Le mausolée sacré révérant la mémoire de [GetRulerName]."
 building_grand_mausoleum_allowed_tooltip: "Doit avoir un §Ydirigeant§!\nUne §Yadministration planétaire§!, une §Ycapitale planétaire§!, ou un §Ycomplexe-capitale de l'empire§! doit être construit sur la planète"
 building_royal_gardens: "Jardins royaux"
 building_royal_gardens_desc: "Un immense jardin d'agrément où les gens peuvent venir se rassembler pour célébrer le souvenir et la mémoire de ce personnage illustre."
 building_royal_gardens_proper: "Jardins royaux de [GetRulerName]"
 building_royal_gardens_desc_proper: "Un fantastique jardin développé par l'illustre [GetRulerName]."
 building_galactic_stock_exchange: "Bourse galactique"
 building_galactic_stock_exchange_desc: "En nous engageant dans le libre échange des produits et services, nous permettons une économie plus spécialisée où un individu peut se focaliser sur ses points forts et les échanger contre les besoins d'un autre."
 building_ministry_production: "Ministère de la production"
 building_ministry_production_desc: "Le ministère de la Production travaille sans relâche à organiser et rationaliser la production industrielle sur l'ensemble de ce monde."
 building_production_center: "Centre de traitement des ressources"
 building_production_center_desc: "Un vaste complexe centralisant la gestion des ressources et la production industrielle sur l'ensemble de ce monde."
 building_supercomputer: "Superordinateur planétaire"
 building_supercomputer_desc: "Un superordinateur colossal et unique, pouvant mener à bien des calculs incroyablement complexes et améliorer la production scientifique sur l'ensemble de ce monde."
 building_hyper_entertainment_forum: "Forums d'hyperdivertissement"
 building_hyper_entertainment_forum_desc: "Ces complexes de divertissement gigantesques sont les lieux où les rêves deviennent réalité : centres commerciaux, restaurants, parcs d'attractions, salles d'arcade virtuelles et bien plus encore. Vous en aviez rêvé, ils le sont !"
 building_institute: "Institut de recherche"
 building_institute_desc: "L'institut de recherche est un complexe massif qui fait collaborer ensemble les savants à la pointe dans des domaines disparates pour une synergie sans précédent. Cela permet d'améliorer le rendement de recherche de toute la planète."
 building_virtual_combat_arena: "Arène de combat virtuel"
 building_virtual_combat_arena_desc: "L'arène de combat virtuel sert à la fois comme un moyen de divertissement et une manière de promouvoir l'unité communautaire. Les armées locales peuvent également utiliser l'arène de combat virtuel pour des exercices virtuels."
 building_monument_purity: "Monument à la pureté"
 building_monument_purity_desc: "$tech_purity_campaigns_desc$"
 building_orillium_factory: "Usine d'explosifs orillium"
 building_orillium_factory_desc: "Les qualités uniques du minerai d'orillium lui permettent d'être transformé en des explosifs de haute précision, particulièrement adaptés pour des explosions contrôlées lors des opérations minières de grande profondeur."
 building_pitharan_plant: "Centrale d'engrais pitharan"
 building_pitharan_plant_desc: "Les centrales d'engrais pitharan produisent des fertilisants à partir de la poussière pitharane utilisée comme additif pour améliorer les rendements des cultures."
 building_military_academy: "Académie militaire"
 building_military_academy_desc: "Les académies militaires améliorent les taux de recrutement à l'échelle locale et offrent des standards d'entraînement améliorés."
 building_symbol_unity: "Symbole d'unité"
 building_symbol_unity_desc: "$tech_symbol_unity_desc$"
 building_visitor_center: "Centre des visiteurs"
 building_visitor_center_desc: "$tech_visitor_center_desc$"
 building_alien_sanctuary: "Sanctuaire alien"
 building_alien_sanctuary_desc: "$tech_alien_sanctuary_desc$"
 building_psi_corps: "Corps psi"
 building_psi_corps_desc: "Les [GetIndividualNamePlural] psioniques sont amenés de toutes les régions de l'empire jusqu'à ce lieu où ils peuvent affiner la maîtrise de leur don.\n\n§YLe Corps psi est votre [GetPsiCorpFriend]. Faites-lui confiance.§!"
 psionic_bonus_workforce_from_telepaths_tt: "$mod_psionic_pop_bonus_workforce_mult$dépend des emplois de [telepath.GetIcon]télépathes"
 building_hive_synapse: "Synapse de la conscience"
 building_hive_synapse_desc: "Renforcer le signal de la conscience collective fait de nos drones des travailleurs bien plus efficaces."
 building_xenology_center: "Centre xénologique"
 building_xenology_center_desc: "En collectant les membres d'espèces plus faibles en un seul lieu, nous pouvons les étudier et apporter par leur étude toutes les preuves de notre supériorité."
 building_symbol_purity: "Symbole de pureté"
 building_symbol_purity_desc: "$tech_symbol_unity_desc$"
 building_control_center: "Centre de contrôle"
 building_control_center_desc: "La construction de puissants centres de traitement permet d'optimiser l'efficacité opérationnelle des drones."
