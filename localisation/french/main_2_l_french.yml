 civic_tooltip_gospel_of_the_masses_effects: "Les £pop£§Hpops spiritualistes§! allouent de la §Yvaleur commerciale§! sur chaque monde et dans chaque succursale.\nPermet de construire des £building£bâtiments de firme §Y$building_temple_of_prosperity$§!."
 civic_tooltip_criminal_heritage_effects: "Permet de construire des §Ysuccursales§! sur les mondes de n'importe quel empire habituel qui n'a ni guerre, ni trêve avec nous.\nLa criminalité sur les mondes où sont implantées les §Ysuccursales§! accroît leur valeur.\nPermet de construire des £building£§Ybâtiments de firme§! aggravant la criminalité."
 civic_tooltip_inward_perfection_effects: "Interdit les §Yrivalités§!.\nInterdit de former des §Ypactes défensifs§!.\nInterdit de conclure des §Ytraités migratoires§!.\nInterdit de contracter des §Yconventions de recherche§!.\nInterdit de conclure des §Ypactes commerciaux§!.\nInterdit de §Ygarantir des indépendances§!.\nInterdit d'intégrer des §Yfédérations§!.\nInterdit d'§Yinfiltrer§! des civilisations pré-PRL.\nInterdit les §Ydépendances§!.\nInterdit la politique §Y$unrestricted_wars$§!."
 civic_tooltip_feudal_realm_effects: "- Proposer la §Ysujétion§! ne dépend plus des §Yprérequis diplomatiques§!.\n- Les contrats des §Ydépendances§! ne peuvent comporter ces clauses :\n$t$$TRIGGER_FAIL$§Y$subject_cannot_expand$§!\n$t$$TRIGGER_FAIL$§YNon-participation aux guerres de la dépendance§!\n$t$$TRIGGER_FAIL$§Y$subject_can_not_do_diplomacy$§!"
 civic_tooltip_franchising_effects: "- Les contrats des §Ydépendances§! ne peuvent comporter ces clauses :\n$t$$TRIGGER_FAIL$§Y$subject_cannot_expand$§! ;\n$t$$TRIGGER_FAIL$§Y$subject_can_not_do_diplomacy$§! ;\n$t$$TRIGGER_FAIL$§Y$subject_does_not_get_sensors$§!.\n- Donne accès à la possession £building£§Y$holding_franchise_headquarters$§!.\n- £building£§Y$building_commercial_forum$§! : $megacorp_civic_branch_office_building_effect$"
