 sm_synchronized_defenses: "Défenses synchronisées"
 sm_corvette_assembly_yards: "Chantiers d'assembl. de corvette"
 sm_destroyer_assembly_yards: "Chantiers d'assembl. de destroyer"
 sm_cruiser_assembly_yards: "Chantiers d'assembl. de croiseur"
 sm_battleship_assembly_yards: "Chantiers d'assembl. de cuirassé"
 sm_reinforced_hull_layers: "Couches de coque renforcées"
 sm_observatory: "Observatoire"
 sm_engineering_bay: "Baie d'ingénierie"
 sm_crew_quarters: "Quartiers de l'équipage"
 sm_crew_quarters_desc: "Fournit des lieux de vie et du ravitaillement aux équipages des vaisseaux, réduisant ainsi la charge logistique pour la flotte qui se trouve amarrée.\n"
 sm_crew_quarters_machine_intelligence: "Service ombilical"
 sm_crew_quarters_desc_machine_intelligence: "Le service ombilical connecte directement les flottes amarrées à l'intelligence centrale de la station, qui peut alors l'assister pour les réparations et le ravitaillement.\n"
 sm_crew_quarters_hive_mind: "Chambre de gestation de l'équipage"
 sm_crew_quarters_desc_hive_mind: "La capacité à faire naître sur place des drones d'équipage constitue un très net avantage logistique pour les flottes amarrées.\n"
 sm_hydroponic_farms: "Fermes hydroponiques orbitales"
 sm_orbital_mind_control_laser: "Laser de contrôle mental orbital"
 sm_fallen_empire_weapon: "Module de défense de lance à tachyons"
 sm_pioneering_terminal: "Terminal d'innovation"
 sm_solar_panel_network: "Réseau de panneaux solaires"
 sm_neutronium_fission_plant: "Centrale de fission de neutronium"
 sm_fleet_academy: "Académie de la flotte"
 sm_fleet_academy_machine_intelligence: "Simulateurs de combat"
 sm_fleet_academy_hive_mind: "$sm_fleet_academy_machine_intelligence$"
 sm_fleet_academy_desc: "Pour que nos équipages fraîchement recrutés soient véritablement prêts au combat, ils doivent être commandés par des officiers compétents. L'Académie de la flotte nous assurera que ces officiers ont des connaissances à jour sur les doctrines et les pratiques employées dans la guerre interstellaire."
 sm_fleet_academy_desc_machine_intelligence: "Les simulations répétées de divers scénarios d'engagement prépareront au mieux les drones de combat embarqués pour les combats réels."
 sm_fleet_academy_desc_hive_mind: "$sm_fleet_academy_desc_machine_intelligence$"
 sm_navigator_guild: "Guilde des navigateurs"
 sm_living_metal_armory: "Armurerie de métal vivant"
 sm_dark_matter_factory: "Réacteur de matière noire"
 sm_colossus_yards: "Chantier d'assemblage colossal"
 sm_colossus_yards_desc: "Dépassant le concept du chantier spatial traditionnel, les vaisseaux de classe colosse sont assemblés par des plateformes de construction mobiles agissant en toute indépendance.\n"
 sm_colossus_yards_desc_modifier: "Chantiers spatiaux : §Ypermet la construction des colosses§!"
 sm_titan_yards: "Chantier d'assemblage de titans"
 sm_titan_yards_desc: "Des chantiers navals spécialisés érigés sur la coque de la base stellaire permettent la construction des gigantesques vaisseaux de la classe titan.\n"
 sm_titan_yards_desc_modifier: "Chantiers spatiaux : §Ypermet la construction des titans§!"
 sm_dockyard: "Chantier naval"
 sm_shipyard: "Chantier spatial"
 sm_shipyard_desc: "Un chantier spatial peut construire un vaisseau à la fois, en parallèle d'autres chantiers spatiaux.\n"
 sm_gun_battery: "Batterie de canons"
 sm_gun_battery_desc: "Ajoute deux emplacements d'armement intermédiaire à la base stellaire.\n"
 sm_missile_battery: "Batterie lance-torpilles"
 sm_missile_battery_desc: "Ajoute deux emplacements d'armement guidé à la base stellaire.\n"
 sm_mining_terminal: "Mining Terminal (remove?)"
 sm_trading_hub: "Carrefour commercial"
 sm_trading_hub_plural: "Plateformes commerciales"
 sm_trading_hub_desc: "Une zone d'affrètement civile où les marchands et négociants peuvent conduire leurs affaires.\n"
 sm_anchorage: "Ancrage"
 sm_anchorage_desc: "Disposer d'ancrages pour les vaisseaux est nécessaire au développement de la flotte.\n"
 sm_hangar_bay: "Hangar"
 sm_hangar_bay_desc: "Ajoute à la base stellaire un hangar pour les appareils de combat.\n"
 sm_astromining_bay: "Hangar d'astrominage"
 sm_astromining_bay_desc: "Des hangars et des entrepôts pour soutenir les opérations de collecte de ressources dans le système."
 sm_ftl_inhibitor: "Inhibiteur PRL"
 sm_ftl_inhibitor_desc: "Tant que la base stellaire sera opérationnelle, son inhibiteur PRL interdira aux vaisseaux ennemis de quitter le système par d'autres hyperlignes que celle par laquelle ils seront entrés."
 sm_communications_jammer: "Brouilleur"
 sm_communications_jammer_desc: "Ces puissants brouilleurs interfèrent avec les communications entre vaisseaux ennemis, rendant difficile toute coordination des mouvements des flottes hostiles.\n"
 sm_disruption_field: "Disrupteur de champ"
 sm_disruption_field_desc: "Génère des champs localisés de particules subatomiques agitées autour des vaisseaux hostiles présents dans le système, réduisant ainsi de manière importante l'efficacité de leurs boucliers.\n"
 sm_warp_fluctuator: "Enregistreur d'hyperlignes"
 sm_warp_fluctuator_desc: "Assiste les vaisseaux amicaux en mode PRL présents dans le système à identifier les conditions idéales pour entrer en hyperligne et optimiser les trajets calculés.\n"
 warp_fluctuator_tt: "$trade_with_icon$ des [Root.GetTradingHubPluralType] : §G+2§!"
 sm_transit_hub: "Carrefour de transit"
 sm_transit_hub_desc: "Une infrastructure dédiée aux vaisseaux non militaires, permettant de disposer d'un réseau de transit fluide et utile pour les usages civils.\n"
 sm_transit_hub_desc_modifier: "Les pops de §Ytravailleurs§! et de §Ydrones§! de ce système vont, si elles ne sont pas soumises à des contrôles migratoires, §Ymigrer§! automatiquement vers d'autres mondes ayant d'une habitabilité convenable, des emplois et des logements disponibles, et se trouvant dans des systèmes dotés d'un §Ycarrefour de transit§!.\n\n"
 sm_transit_hub_migrate_effect_desc: "Permet la §Yréimplantation autonome§! des £pop_cat_slave£§Yesclaves§! inemployés et §Yrobots non conscients§! du système vers d'autres colonies."
 sm_command_center: "Centre de commandement"
 sm_command_center_desc: "Tous les systèmes de défense sont coordonnés depuis ce vaste complexe, enfoui profondément sous la coque de la base stellaire. Les ressources cartographiques et projections 3D tracent tout le trafic spatial transitant par le système en temps réel.\n"
 sm_defense_grid: "Supercalculateur de défense coordonnée"
 sm_defense_grid_desc: "Un puissant supercalculateur coordonnant l'orbite relative et les arcs de tir des plateformes de défense de la station stellaire, accroissant le nombre de plateformes utiles.\n"
 sm_science_division: "Département scientifique"
 sm_science_division_desc: "Accroît de §Y2£physics , 2£society  et 2£engineering §! la production scientifique de la §Y$sm_spire$§!."
 sm_offworld_trading_company: "Compagnie commerciale extraplanétaire"
 sm_offworld_trading_company_desc: "Bureaux d'une organisation non gouvernementale dédiée au développement du commerce interstellaire.\n"
 sm_offworld_trading_company_desc_modifier: "$trade_with_icon$ des [Root.GetTradingHubPluralType] : §G+4§!\n\n"
 sm_nebula_refinery: "Raffinerie de nébuleuse"
 sm_nebula_refinery_desc: "Le raffinage des nuages de poussière d'une nébuleuse permet d'en extraire des minéraux de valeur.\n"
 sm_listening_post: "Poste d'écoute"
 sm_listening_post_desc: "Le poste d'écoute abrite une équipe d'opérateurs se consacrant à l'analyse des réverbérations des hyperlignes, permettant ainsi d'étendre la portée des capteurs de la base stellaire.\n"
 sm_naval_logistics_office: "Bureau logistique de la flotte"
 sm_naval_logistics_office_desc: "Un centre administratif réduit mais performant accroissant la capacité théorique d'ancrage de la base stellaire.\n"
 sm_naval_logistics_office_desc_modifier: "Ancrages : §G+3§! en £navy_size£capacité navale"
 sm_black_hole_observatory: "Observatoire de trou noir"
 sm_black_hole_observatory_desc: "La construction d'un complexe scientifique spécialisé, dédié à l'étude d'un trou noir, permet à l'empire de faire progresser sa connaissance des sciences physiques.\n"
 sm_deep_space_black_site: "Zone de haute sécurité"
 sm_deep_space_black_site_desc: "Une grande partie de la base stellaire a été réservée comme zone de haute sécurité, qui officiellement n'existe pas. Le système entier est étroitement surveillé de là, tandis que les analystes des renseignements manipulent les médias locaux et événements sociaux au mieux de leurs capacités.\n"
 sm_resource_silo: "$building_resource_silo$"
 sm_resource_silo_desc: "$building_resource_silo_desc$\n"
 building_resource_silo: "Silo de stockage"
 building_resource_silo_desc: "Silos et complexes de stockage massifs, où d'énormes quantités de ressources peuvent être entreposées en toute sécurité."
 sm_hydroponics_bay: "Zone hydroponique"
 sm_hydroponics_bay_desc: "En dédiant une section de cette base stellaire à des fermes hydroponiques, elle sera capable de nourrir tous ceux qui s'y trouvent, et même d'exporter les surplus de production vers d'autres systèmes."
 sm_target_uplink_computer: "Ordinateur de ciblage"
 sm_target_uplink_computer_desc: "Un ordinateur de ciblage extrêmement performant, qui collecte et analyse les données de toutes les sources de données issues des capteurs amis dans le système. Cela facilite grandement la tâche de ciblage de la base stellaire.\n"
 sm_curator_think_tank: "Laboratoire d'idées des Conservateurs"
 sm_curator_think_tank_desc: "La construction d'un complexe de recherche entièrement consacré à l'étude et à la coopération avec les Conservateurs permet des avancées significatives pour la recherche de l'empire.\n"
 sm_art_college: "Collège des Arts"
 sm_art_college_desc: "Ce Collège des Arts sous gravité zéro-g, dont la gestion est assurée en collaboration étroite avec l'enclave la plus proche des Artisans, célèbre les beautés des immensités spatiales par des oeuvres produites par ses étudiants si talentueux.\n"
 sm_salvager_workshop: "Atelier de réparation"
 sm_salvager_workshop_desc: "Cette annexe animée fournit aux équipes d'ingénieurs une quantité invraisemblable d'outils et de pièces détachées, permettant une collaboration rapprochée avec la station des Récupérateurs toute proche.\n"
 sm_shroud_beacon: "Flambeau du Suaire"
 sm_shroud_beacon_desc: "Une balise psionique utilisée pour faire apparaître une percée du Suaire dans ce système. Si le Flambeau peut lui-même être démantelé ou détruit, la percée ne disparaît pas pour autant.\n"
 sm_mercenary_garrison: "Garnison mercenaire"
 sm_mercenary_garrison_desc: "Un ensemble de casernements abritant des militaires contractuels. Ces vétérans grisonnants organisent des entraînements fréquents et réguliers pour le reste de l'équipage, et sont toujours prêts à défendre la station. Tant qu'ils seront payés, en tout cas.\n"
 sm_astromining_hub: "Centre d'astrominage"
 sm_astromining_hub_desc: "Ces bureaux et installations de traitement sont utilisés par des ingénieurs et des coordinateurs responsables de nos opérations de collecte de ressources dans le système. Grâce à une optimisation minutieuse et à des processus de stockage supérieurs, nous pouvons exploiter les gisements locaux avec une efficacité sans précédent.\n"
 sm_astromining_hub_office_desc_modifier: "Modules de hangars d'astrominage :\n Production des stations minières : §G+10%§! "
 requires_astromining_bay: "§RRequiert§! §Y$sm_astromining_bay$§!"
