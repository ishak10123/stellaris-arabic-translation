 civic_tooltip_mechanists_effects: "Lance la partie avec §Y800§! £pop£§Hpops§! robotiques, ainsi que la technologie et les infrastructures permettant d'en construire davantage.\n- $mod_planet_pops_robotics_upkeep_mult$: §G-5%§!\n"
 civic_tooltip_shared_burden_effects: "Permet les conditions de vie §Y$living_standard_shared_burden$§!, grâce auxquelles les £pop£§Hpops§! ont un entretien en £consumer_goods£§Ybiens de consommation§! modéré quelle que soit leur §Yclasse§!.\nDésactive l'usage de la plupart des autres §Yconditions de vie§!.\nDonne accès à la possession £building£§Y$holding_communal_housing_outreach$§!."
 civic_tooltip_fanatic_purifiers_effects: "Interdit la moindre §Yrelation diplomatique§! avec les autres espèces.\nInterdit l'accès au §YMarché galactique§!.\nOffre le casus belli §YPurification§! contre les autres espèces.\nLes £pop£§Yxénopops§! sont systématiquement purgées, ce qui suscite de l'£unity£§Yunité§!.\nAutorise le protocole de bombardement §Yapocalyptique§!.\n"
 civic_tooltip_devouring_swarm_effects: "Interdit la moindre §Yrelation diplomatique§! avec les autres empires.\nInterdit l'accès au §YMarché galactique§!.\nOffre le casus belli §YFaim§! contre tous les autres empires.\nLes £pop£§Yxénopops§! sont systématiquement dévorées, ce qui suscite de la £society£§Yrecherche sociétale§!.\n"
 civic_tooltip_devouring_swarm_lithoid_effects: "Interdit la moindre §Yrelation diplomatique§! avec les autres empires.\nInterdit l'accès au §YMarché galactique§!.\nInterdit de §Yterraformer§! les mondes.\nOffre le casus belli §YFaim§! contre tous les autres empires.\nOffre la décision planétaire §YConsommer ce monde§!\nLes £pop£§Yxénopops§! sont systématiquement dévorées, ce qui suscite de la £society£§Yrecherche sociétale§!.\n"
 civic_tooltip_machine_servitor_effects: "$t$- Lance la partie avec §Y2 000§! £pop£§Hpops organiques§! ayant la citoyenneté £job_bio_trophy£§Y$citizenship_organic_trophy$§! et les conditions de vie §Y$living_standard_organic_trophy$§!.\n$t$- $AVAILABLE_BUILDINGS$ £building£['building:building_organic_sanctuary']\n$t$- $AVAILABLE_HOLDINGS$ £building£['building:holding_organic_sanctuary']"
 civic_tooltip_machine_terminator_effects: "Interdit la moindre §Yrelation diplomatique§! avec les espèces organiques.\nInterdit l'accès au §YMarché galactique§!.\nOffre le casus belli §YPurification§! contre toutes les espèces organiques voisines.\n§YPurge§! les £pop£§Hpops organiques§!.\nPurger les £pop£§Hpops organiques§! suscite de l'£unity£§Yunité§!.\nPermet de recourir au protocole de bombardement §Yapocalyptique§!.\n"
 civic_tooltip_machine_assimilator_effects: "Lance la partie avec §Y1K§! £pop£pops cyborgs et la capacité d'§Yassimiler§! les organiques en tant que cyborgs.\nAssimiler des £pop£§Hpops organiques§! génère une petite quantité d'£unity£§Yunité§! et de £society£§Yrecherche sociétale§!.\nAvec le temps, les £pop£§Hpops organiques§! non assimilées sont automatiquement §Ypurgées§!.\nOffre le casus belli §YAssimilation§! à l'encontre de tous les autres empires.\n§YOpinion§! dégradée de la plupart des autres empires.\nDonne accès au chemin de l'ascension §Ycybernétique§!."
 civic_tooltip_corporate_dominion_effects: "Commence avec la technologie §Y$tech_space_trading$§! déjà découverte.\n§YPermet les§! vaisseaux coloniaux privés."
 civic_tooltip_barbaric_despoilers_effects: "Interdit de conclure des §Ytraités migratoires§!.\nInterdit de former des §Hfédérations§! autres que les §Yalliances militaires§! ou les §Yhégémonies§! (mais permet de les intégrer).\nOffre le casus belli §Y$casus_belli_cb_despoliation$§! contre tous les autres empires.\nPermet le protocole de bombardement §Y$bombardment_raiding$§!, autorisant à enlever les £pops£pops des mondes bombardés.\n£opinion£§YOpinion§! dégradée de la plupart des autres empires."
 civic_tooltip_exalted_priesthood_effects: "- Les emplois de £job_politician£§Ypoliticiens§! sont convertis en emplois de £job_high_priest£§Y$job_high_priest_plural$§!.\nLa £building£§Ycitadelle de la foi§! fournit des emplois de £job_high_priest£§Y$job_high_priest_plural$§! supplémentaires."
 civic_tooltip_exalted_priesthood_techpriest_effects: "- Les emplois de £job_politician£§Ypoliticiens§! sont convertis en emplois de £job_technophant£§Ytechnophants§!.\nLa £building£§Ycitadelle de la foi§! fournit des emplois de £job_technophant£§Ytechnophants§! supplémentaires."
 civic_tooltip_citizen_service_effects: "Donne accès à la possession £building£§Y$holding_recruitment_office$§!."
