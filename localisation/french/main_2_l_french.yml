 TECH_BASE_COST: "Coût de base"
 TECH_STARTING: "Tech. départ"
 RESEARCH_EFFICIENCY: "Vitesse de recherche"
 RESEARCH_EFFICIENCY_DESC: "La vitesse de recherche représente l'efficacité du rendement scientifique de l'empire, augmentant ou réduisant la cadence à laquelle les technologies sont découvertes. Cette valeur dépend pour l'essentiel de la compétence des scientifiques nommés, mais d'autres facteurs peuvent aussi entrer en ligne de compte."
 REASEARCH_SCIENTIST_EFFICIENCY: "Scientifique $LEADER$ : $VALUE$"
 TECH_UNLOCK_OUTPOST_CONSTRUCTION_TITLE: "§HConstruction d'§!avant-postes"
 TECH_UNLOCK_OUTPOST_CONSTRUCTION_DESC: "§HAvant-postes§!\nType de base stellaire le plus élémentaire qui soit, l'avant-poste est une station légèrement armée construite en orbite d'une étoile pour étendre les frontières de l'empire. Il ne peut recevoir aucune construction ou module et n'est pas listé dans le gestionnaire."
 TECH_UNLOCK_STARPORT_CONSTRUCTION_TITLE: "§HAmélioration des bases en§! ports stellaires"
 TECH_UNLOCK_STARPORT_CONSTRUCTION_DESC: "§HPorts stellaires§!\nAmélioration de l'avant-poste, le port stellaire peut abriter une construction et recevoir deux modules."
 TECH_UNLOCK_STARHOLD_CONSTRUCTION_TITLE: "§HAmélioration des bases en§! redoutes stellaires"
 TECH_UNLOCK_STARHOLD_CONSTRUCTION_DESC: "§HRedoute stellaire§!\nAmélioration du port stellaire, la redoute stellaire peut abriter deux constructions et recevoir quatre modules."
 TECH_UNLOCK_STAR_FORTRESS_CONSTRUCTION_TITLE: "§HAmélioration des bases en§! forteresses stellaires"
 TECH_UNLOCK_STAR_FORTRESS_CONSTRUCTION_DESC: "§HForteresses stellaires§!\nAmélioration de la redoute stellaire, la forteresse stellaire peut abriter trois constructions et recevoir un ensemble total de six modules."
 TECH_UNLOCK_CITADEL_CONSTRUCTION_TITLE: "§HAmélioration des bases en§! citadelles"
 TECH_UNLOCK_CITADEL_CONSTRUCTION_DESC: "§HCitadelles§!\nAmélioration de la forteresse stellaire, la citadelle est le type de base stellaire le plus lourdement défendu, capable d'abriter quatre constructions et de recevoir un ensemble total de six modules."
 UNITY_COST_MULT: "Multiplicateur du coût des décrets en unité : $VALUE|=2%-$"
 TECH_UNLOCK_FIRE_CONTROL_1_TITLE: "§HComposant§! $FIRE_CONTROL_1$"
 TECH_UNLOCK_FIRE_CONTROL_1_DESC: "§H$FIRE_CONTROL_1$§!\n$FIRE_CONTROL_1_DESC$"
 TECH_UNLOCK_ION_CANNON_CONSTRUCTION_TITLE: "§HStation§! $ion_cannon$"
 TECH_UNLOCK_ION_CANNON_CONSTRUCTION_DESC: "§H$ion_cannon$§!\nLes canons ioniques sont d'immenses plateformes de défense pouvant être construites en orbite d'une base stellaire, capables de détruire les vaisseaux ennemis d'un feu mortel à longue portée."
