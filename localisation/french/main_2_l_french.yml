 #Origin Events
 TIMELINE_EVENT_GALACTIC_DOORSTEP_TOOLTIP: "§H$origin.1050.name$§!\n§YÉvénement d'origine§!\n\nNos vaisseaux peuvent désormais passer de l'autre côté. En guise de dernier cadeau, ses constructeurs nous ont transmis les secrets de sa construction, rendant parfaitement évident ce qui semblait jusqu'à présent si mystérieux. Nous pourrons bientôt construire nos propres portails, qui nous permettront de traverser l'empire presque instantanément."
 TIMELINE_EVENT_GALACTIC_DOORSTEP: "L'ouverture de la Couronne Noire\n§L[GetDate]§!"
 TIMELINE_EVENT_LOST_COLONY_TOOLTIP: "§HDécouverte de notre monde natal§!\n§YÉvénement d'origine§!\n\nNous avons enfin rencontré la civilisation qui a donné naissance à notre colonie perdue. Le temps et la distance ont fait de nous des êtres très différents, mais nos origines sont désormais certaines. Les échos de notre passé commun façonneront notre avenir."
 TIMELINE_EVENT_LOST_COLONY: "Monde natal autrefois perdu\n§L[GetDate]§!"
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION_TOOLTIP: "§HCréation d'un monde mécanique§!\n§YÉvénement d'origine§!\n\nNous avons créé un véritable monde mécanique, exempt d'inefficacité et de décomposition organique. Le futur sera fait d'acier et régi par des algorithmes."
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION: "Mondes remaniés\n§L[GetDate]§!"
 TIMELINE_EVENT_REMNANTS_TOOLTIP: "§HRestauration d'une oecuménopole§!\n§YÉvénement d'origine§!\n\nNotre empire a redonné à son monde natal sa gloire d'antan : autrefois en ruines, c'est à nouveau une grande oecuménopole, témoignant de la ténacité et de l'ambition de notre civilisation."
 TIMELINE_EVENT_REMNANTS: "Mondes remaniés\n§L[GetDate]§!"
 TIMELINE_EVENT_SHATTERED_RING_TOOLTIP: "§HRestauration d'un anneau-monde§!\n§YÉvénement d'origine§!\n\nNotre système natal dévasté a été complètement restauré. Ce qui n'était qu'un cimetière d'ambitions ratées brille aujourd'hui comme le phare de la civilisation."
 TIMELINE_EVENT_SHATTERED_RING: "La boucle est bouclée\n§L[GetDate]§!"
 TIMELINE_EVENT_LEGENDARY_LEADER_TOOLTIP: "§HDestinée accomplie§!\n§YÉvénement d'origine§!\n\nLe voyage de la Sommité est arrivé à son terme. Soit son règne durera éternellement, façonnant l'empire pour toujours, soit il inaugurera une nouvelle ère, dans laquelle le pouvoir sera partagé et l'avenir réécrit."
 TIMELINE_EVENT_LEGENDARY_LEADER: "Destin final\n§L[GetDate]§!"
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE_TOOLTIP: "§HConstruction d'une percée du Suaire§!\n§YÉvénement d'origine§!\n\nLe voile entre les réalités est enfin levé, et la première percée du Suaire relie désormais notre royaume à l'inconnu. Cette déchirure, qui brise les lois de la distance et du temps, est un passage à travers le vide de l'espace. Les mystères et les dangers qui nous attendent de l'autre côté restent à découvrir."
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE: "Au-delà du voile\n§L[GetDate]§!"
 TIMELINE_EVENT_VOID_DWELLERS_TOOLTIP: "§HConstruction d'un habitat§!\n§YÉvénement d'origine§!\n\nUne nouvelle construction a surgi du néant. Ce premier habitat supplémentaire constitue la première étape de l'expansion de notre empire et permettra à notre peuple de ne pas se limiter à son existence planétaire."
 TIMELINE_EVENT_VOID_DWELLERS: "Une maison au milieu des étoiles\n§L[GetDate]§!"
 TIMELINE_EVENT_OCEAN_PARADISE_TOOLTIP: "§HMaîtres des mers§!\n§YÉvénement d'origine§!\n\nGrâce à l'hydrocentrisme, nous avons refaçonné notre monde natal et étendu ses grands océans au-delà de leurs frontières naturelles. Bientôt, comme les marées, le reste de la galaxie se pliera à notre volonté."
 TIMELINE_EVENT_OCEAN_PARADISE: "Vagues dévorantes\n§L[GetDate]§!"
 TIMELINE_EVENT_DOOMSDAY_TOOLTIP: "§HDestruction du monde natal§!\n§YÉvénement d'origine§!\n\nL'inévitable s'est finalement produit. Notre monde natal, autrefois prospère, a succombé au destin et s'est effondré dans un cataclysme ardent. Les cendres de notre passé flottent désormais dans le vide, et notre avenir repose sur les survivants."
 TIMELINE_EVENT_DOOMSDAY: "Fin du monde\n§L[GetDate]§!"
 TIMELINE_EVENT_EVOPRED_ABSORB_TOOLTIP: "§HTrait d'espèce absorbé§!\n§YÉvénement d'origine§!\n\nNous avons absorbé du nouveau matériel génétique pour la première fois. Un délice."
 TIMELINE_EVENT_EVOPRED_ABSORB: "Matériel génétique absorbé\n§L[GetDate]§!"
 TIMELINE_EVENT_WORMHOLE_DEFENDED_TOOLTIP: "L'écloserie abandonnée et ses flottes ont été détruites le §L[GetDate]§!."
 TIMELINE_EVENT_WORMHOLE_DEFENDED: "Trou de ver défendu\n§L[GetDate]§!"
 #Crisis Events
 TIMELINE_EVENT_CRISIS_GREAT_KHAN_TOOLTIP: "§HGrand Khan§!\n§YCrise§!\n\nUn nouveau seigneur de guerre a réuni les clans de maraudeurs pour former une horde redoutable. Le Grand Khan balaie la galaxie, renversant des empires et asservissant des mondes. Des flottes entières sont réduites en cendres, alors que les mercenaires autrefois désordonnés s'unissent désormais avec un objectif terrifiant. L'ère du pillage est révolue, laissant place à l'ère de la conquête."
 TIMELINE_EVENT_CRISIS_GREAT_KHAN: "La horde en furie\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST_TOOLTIP: "§HTempête Grise§!\n§YCrise§!\n\nLes portes-L se sont ouvertes, libérant les anciennes flottes de la Tempête Grise qui sillonnent désormais la galaxie en ravageant tout sur leur passage. Elles ne connaissent ni la diplomatie ni la pitié, et n'aspirent qu'à la réplication. Des mondes s'éteignent, des flottes entières disparaissent et la peur se propage. Le passé a resurgi, et il n'a pas changé."
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST: "L'éveil\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_FORMLESS_TOOLTIP: "§HInformes§!\n§YCrise§!\n\nLes créatures énergétiques appelées « Informes » ont dû se rendre à l'évidence : notre galaxie est loin d'être un refuge sûr pour elles. Elles inonderont notre univers d'envahisseurs venus d'une autre dimension... ou périront en essayant."
 TIMELINE_EVENT_CRISIS_FORMLESS: "Furie des Informes\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE_TOOLTIP: "§HInfestation de vers du vide§!\n§YCrise§!\n\nLa nature des vers du vide a changé : ils se reproduisent de manière incontrôlée depuis qu'ils ont atteint un nombre critique. Ils cherchent à éradiquer toute forme de vie dans la galaxie, sans savoir que cela entraînera leur propre disparition."
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE: "La faim dévorante\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_UNBIDDEN_TOOLTIP: "§HSpontanés§!\n§YCrise§!\n\nUne faille dans le tissu de l'existence a permis l'invasion de créatures énergétiques pures qui refusent de négocier et de céder du terrain. Elles consomment des systèmes entiers pour alimenter leur expansion sans fin. Leurs ancres stabilisent la faille, attirant ainsi d'autres créatures de leur espèce dans notre domaine. Ce sont les Spontanés."
 TIMELINE_EVENT_CRISIS_UNBIDDEN: "L'ouverture de la faille\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE_TOOLTIP: "§HKaléidoscope§!\n§YCrise§!\n\nUne entité énergétique affamée appelée Kaléidoscope est apparue dans la galaxie et a commencé à se nourrir de systèmes inhabités. Sa faim semble insatiable, mais elle se laisse facilement distraire. Elle ne devrait pas tarder à revenir à l'état de poussière."
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE: "Le spectre affamé\n§L[GetDate]§!"
 TIMELINE_EVENT_BECOME_THE_CRISIS_TOOLTIP: "§HDevenir la crise§!\n§YCrise§!\n\nLa galaxie s'est assombrie. La [EVENT_TARGET_0.GetName] a abandonné toute forme de diplomatie en se proclamant la plus grande menace pour la vie galactique. Ses flottes se rassemblent, et les espions parlent d'un plan final apocalyptique. Ce n'est plus un simple empire, mais une véritable crise."
 TIMELINE_EVENT_BECOME_THE_CRISIS: "L'ennemi de la galaxie\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE_TOOLTIP: "§HFléau préthoryn§!\n§YCrise§!\n\nVenus de l'autre côté des frontières galactiques, les Préthoryns ont surgi. Leurs vaisseaux biologiques volent en nuée parmi les étoiles, ne laissant rien d'autre dans leur sillage que des mondes infestés. Les cris de la horde étouffent les supplications."
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE: "La marée dévorante\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CONTINGENCY_TOOLTIP: "§HContingence§!\n§YCrise§!\n\nUn signal froid, calculé et inarrêtable pulse à travers la galaxie. Les systèmes d'IA ont failli. Les esprits synthétiques se sont soumis. La Contingence s'est éveillée. Provenant de mondes mécaniques cachés, des unités guerrières implacables apparaissent, exécutant leur directive finale : l'extermination totale."
 TIMELINE_EVENT_CRISIS_CONTINGENCY: "Le signal fantôme\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CETANA_TOOLTIP: "§HCetana§!\n§YCrise§!\n\nUne voix s'élève dans le vide : « Mes enfants, enfin je vous retrouve. »\n\nCetana, intelligence antique qui fut enfermée si longtemps que son nom sombra entièrement dans l'oubli, s'est éveillée. Son objectif ne souffrira aucune contradiction : éliminer la souffrance quoi qu'il en coûte. Ses flottes se déplacent avec une grâce glaciale, menant sa croisade afin d'établir une paix définitive et totale dans la galaxie."
 TIMELINE_EVENT_CRISIS_CETANA: "Retour de la reine\n§L[GetDate]§!"
 TIMELINE_EVENT_HATCH_BEHEMOTH_TOOLTIP: "§HPetit mastodonte§!\n§YÉtape clé§!\n\nLe premier petit mastodonte est sorti de son oeuf le §L[GetDate]§!."
 TIMELINE_EVENT_HATCH_BEHEMOTH: "Petit mastodonte\n§L[GetDate]§!"
 #Galactic Events
 TIMELINE_EVENT_GALACTIC_MARKET_TOOLTIP: "§HMarché galactique§!\n§YÉvénement galactique§!\n\nLe commerce a rassemblé les étoiles. Le Marché galactique a été officiellement établi, devenant ainsi le poumon économique de la galaxie. Les échanges circulent librement, les fortunes se font et se défont en un instant, et le destin d'empires entiers dépend désormais de l'offre et de la demande."
 TIMELINE_EVENT_GALACTIC_MARKET: "Commerce libéralisé\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_TOOLTIP: "§HCommunauté galactique§!\n§YÉvénement galactique§!\n\nLes empires de la galaxie se sont rassemblés sous une même entité politique. La Communauté galactique a été créée, un forum où la diplomatie, les débats, et les luttes de pouvoir façonneront l'avenir des étoiles. Sa véritable influence reste toutefois à démontrer."
 TIMELINE_EVENT_GALACTIC_COMMUNITY: "Un nouvel ordre\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION_TOOLTIP: "§HRésolution votée§!\n§YÉvénement galactique§!\n\nLa Communauté galactique s'est exprimée, et une nouvelle résolution restructure la loi interstellaire. Certains s'en réjouissent, d'autres fulminent, mais tous doivent obéir."
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION: "Une loi pour les étoiles\n§L[GetDate]§!"
 TIMELINE_EVENT_WAR_IN_HEAVEN_TOOLTIP: "§HGuerre dans les cieux§!\n§YÉvénement galactique§!\n\nLes anciennes reliques resurgissent, en tant que gardiens bienveillants et titans courroucés. La [EVENT_TARGET_0.GetName] et la [EVENT_TARGET_1.GetName], anciennes rivales d'une époque oubliée, ont ravivé leur guerre cosmique. Leurs flottes éclipsent les étoiles, exigeant que les espèces plus jeunes s'agenouillent... ou soient anéanties."
 TIMELINE_EVENT_WAR_IN_HEAVEN: "Guerre des anciens\n§L[GetDate]§!"
 TIMELINE_EVENT_NEXUS_STORM_TOOLTIP: "§HTempête du nexus§!\n§YÉvénement galactique§!\n\nUne tempête sans précédent a éclaté dans le système de [EVENT_TARGET_0.GetName]. La tempête du nexus ravage les systèmes, paralysant les vaisseaux et bombardant les planètes sans relâche."
 TIMELINE_EVENT_NEXUS_STORM: "Une tempête intemporelle\n§L[GetDate]§!"
