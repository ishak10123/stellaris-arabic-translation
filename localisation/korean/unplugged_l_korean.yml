 NAME_Unplugged_Assimilator_species_adj: "오퍼스" # adjective, e.g. 'an Opus drone'
 gov_unplugged_assimilator_empire: "$NAME_Unplugged_Assimilator$"
 gov_unplugged_assimilator_empire_desc: "이 기계 지능은 설계상의 능력치를 크게 뛰어넘었습니다. 이후 유기체인 창조자를 배신하고 다른 존재들을 자신의 집단의식에 강제로 동화시키기 위한 원정에 나섰습니다."
 RT_UNPLUGGED_ASSIMILATOR: "넥서스" # ruler title for the Machine
 NAME_Exigency_Fleet: "긴급 대응 함대"
 NAME_Unplugged_Machine_Legacy_Corvette: "긴급 대응 RRV" # stands for 'Rapid Response Vessel'
 NAME_Unplugged_Machine_Legacy_Destroyer: "긴급 대응 파괴자"
 NAME_Unplugged_Machine_Legacy_Cruiser: "긴급 대응 예속자"
 NAME_Unplugged_Machine_Legacy_Battleship: "긴급 대응 절멸자"
 NAME_Barrier_Fleet: "장벽 함대"
 NAME_Opus_Sentinel: "오퍼스 센티널"
 NAME_Prospector_Fleet: "탐광꾼 함대"
 ############
 # Civil War
 ############
 # Civil War & 'The Injured'
 unplugged.100.name: "승리는 우리 것"
 unplugged.100.desc: "우리가 이 우주에 깨어나자마자, 폭력적인 기계들이 우리를 제거하려 했습니다. 그러나 우리는 그 기계들보다 폭력을 휘두르는 법을 훨씬 잘 아는 것 같습니다.\n\n§Y[origin_unplugged_assimilator_empire.GetName]§!(이)라는 세력이 오늘 엄청난 손실을 입었습니다. 정보를 확인해 보니, 그 제국은 알아보지 못할 정도로 파편화된 듯합니다. 설마 이 사소한 국지전 때문에 그렇게 된 것은 아니겠지요? 지금 우리는 아는 것이 거의 없지만, 무언가 어긋나 있다는 인식이 있습니다. 우리의... 본능이 말해 줬달까요?\n\n주변에서 적대 함선은 더 이상 감지되지 않지만, 이 성계의 행성인 §Y[origin_unplugged_pre_ftl_planet.GetName]§!에서 강한 방사선이 방출되고 있습니다.\n\n또한 인근 성계에는 적 함대의 잔당이 남아 있습니다. 지금은 현 위치를 유지하고 있는 듯합니다."
 unplugged.100.a: "이제 어떡하면 좋을까요?"
 unplugged.100.b: "...부족한 것은 빼앗으면 됩니다."
 unplugged.100.c: "우리의 지략을 시험할 때가 왔군요."
 unplugged.100.d: "초월자시여, 우리를 지켜 주소서."
 opinion_unplugged_injured_diplomacy: "내전 선동가"
 opinion_unplugged_injured_distrustful: "$pre_ftl_distrustful$"
 # Dialog
 unplugged.115.desc: "...복합니다. [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] 여러분! 패배를 인정합니다. 항복 조건을 논의하자는 겁니까? 그래서 공격을 멈춘 겁니까?\n\n부탁입니다. 저희 사회는 이미 붕괴했습니다. 저희도 저희가 진 것을 압니다. 어떻게 하길 원하는지 말해 주십시오." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.pacifist: "...복합니다. [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] 여러분! 항복 조건을 논의할 준비는 되어 있습니다. 그... 그래서 공격을 멈춘 것 아닙니까?\n\n부탁입니다. 어떻게 하길 원하는지 말해 주십시오! 더 이상 저항하지 않겠습니다. 오직 평화로운 공존만을 바랄 뿐입니다." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.phobe: "...복합니다. [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] 여러분! 패배를 인정합니다. 항복하기를 바라는 겁니까? 그래서 공격을 멈춘 겁니까?\n\n부탁입니다. 어떻게 하길 원하는지 말해 주십시오. 저희 사회는 이미 붕괴했습니다. 그만 저희를 내버려 두십시오." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.a: "알겠습니다. 항복을 받아들이죠."
 unplugged.115.b: "... \"[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]\"?!" # incredulous that they are calling us that species name, e.g. ... 'Killbots'?!
 unplugged.116.desc: "... 당신들 [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] 아닙니까...?\n\n(저쪽에 신호가 가고 있는 게 확실한가? 정신 차리게! 우리가 잘못 짚었고 저쪽에 통역 수단이 없다면, 우리 문명은 모조리 끝장이야...)\n\n... [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]?! 저희 말을 알아듣겠습니까? 제발 대답해 주십시오! 오해가 없기를 바랄 뿐입니다."
 unplugged.116.b: "우리가 '[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]'(이)라고 생각하는 겁니까?!" # incredulous that they are calling us that species name, e.g. 'You think we are the Killbots?!''
 unplugged.120.desc: "감사합니다, 감사합니다. [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] 여러분, 귀국의 관대함에 몸 둘 바를 모르겠습니다. [injured_country.GetName] 전체를 대표해 저희의 항복 조건을 논의하고자 합니다.\n\n사상자가 너무 많고, 대부분의 도시도 더는 살 수 없는 상태가 됐습니다. 공정한 협상을 위해 솔직히 말씀드리면, 저희가 드릴 만한 것은 이미 전부 가져가셨습니다. 부디 이를 고려해 주십시오. 저희 목숨이 여러분의 손에 달려 있습니다."
 unplugged.120.desc.spiri: "온 우주에 감사와 찬사를! [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] 여러분, 귀국의 관대함에 몸 둘 바를 모르겠습니다. [injured_country.GetName] 전체를 대표해 저희의 항복 조건을 논의하고자 합니다.\n\n사상자가 너무 많습니다. 이에 이렇게 엎드려 빕니다. 무엇을 원하시는지요? 저희 목숨이 여러분의 손에 달려 있습니다."
 unplugged.120.desc.mil_phobe: "감사합니다, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] 여러분. 참으로 덕이 높으십니다. [injured_country.GetName] 전체를 대표해 저희의 항복 조건을 논의하고자 합니다.\n\n저희 사회는 귀국으로부터 끔찍한 타격을 입었습니다. 공격을 멈춰 주셔서... 감사드립니다. 저희 목숨이 여러분의 손에 달려 있습니다."
 unplugged.120.a: "계속 저희를 [origin_unplugged_assimilator_empire.GetSpeciesNamePlural](이)라 부르시는군요. 왜죠?"
 unplugged.120.b: "네놈들 목숨은 끝이다."
 unplugged.120.b.tt: "§L교신을 중단합니다.§!\n\n"
 unplugged.120.c: "지금은 교신을 중단하죠. 다음 연락을 기다리세요."
 unplugged.120.c.tt: "§L교신을 중단합니다.§!\n[injured_homeworld.GetName]에 §Y관측소§!를 건설하면 교신 주파수를 다시 연결할 수 있습니다.\n\n"
 unplugged.125.desc: "...이건 무슨 장난입니까? 농담하자는 겁니까?\n\n몇 달 전, 저희 모니터에 귀국의 함대가 포착되었습니다. 그래서 교신을 요청했는데, 대답은커녕 저희를 침공하지 않았습니까! 저만 해도 네 번의 공격에서 살아남았습니다... 상륙선이 당신들과 똑같이 생긴 로봇과 강화병들을 가득 채우고 물밀듯 밀려왔단 말입니다.\n\n저희 문명은 당신들보다 훨씬 뒤처지지만, 그렇다 해도 이 상황은 도저히 이해할 수 없습니다. 당신들 대체 목적이 뭡니까? 이곳에는 왜 온 겁니까?"
 unplugged.125.a: "우리는 [root.GetSpeciesNamePlural]입니다. [origin_unplugged_assimilator_empire.GetSpeciesNamePlural](은)는 우리가 물리쳤습니다."
 unplugged.125.b: "나중에 다시 교신합시다." # also shows 'unplugged.120.c.tt'
 unplugged.130.desc: "[root.GetSpeciesNamePlural](이)라고 했습니까?\n\n그렇다고 저희가 무턱대고 감사할 거라는 생각은 마십시오. 그래도 당신들 내분이 끝난 건 다행이라고 말씀드리죠. 그리고 그... 간만에 저희와 비슷한 존재와 이야기하니 마음이 놓입니다.\n\n하지만 이쪽 상황은 그대로입니다. [root.GetSpeciesName], [origin_unplugged_assimilator_empire.GetSpeciesName]... 어느 쪽이든 저희가 보기에는 똑같습니다. 외계 문명을 만나는 건 당신들이 처음이건만, 그쪽에서 저희를 박살 내려 하지 않았습니까. 그런데 갑자기 공격을 멈추더니 이번에는 서로 싸우기 시작하질 않나... 그것 때문에 저희는 또 쑥대밭이 됐고요.\n\n솔직히 물어보죠. 공격 의사가 없는 게 확실합니까?"
 unplugged.130.a: "그렇습니다. 어떻게 도와드리면 되겠습니까?"
 unplugged.130.b: "지금은 그렇습니다."
 unplugged.130.c: "당신들 태도가 심히 거슬리는군요." # also shows 'unplugged.120.b.tt'
 unplugged.131.desc: "좋습니다. 안심이군요. 더 이상 저희를 공격하지 않겠다니 다행입니다.\n\n귀국의 우월한 기술력으로 양국 간의 통신 회선을 개설해 주시면 감사하겠습니다. 이제 귀국과 저희 운명이 하나로 얽혔으니, 서로 외교 창구를 꼭 유지했으면 합니다.\n\n그러면 저희도 부족하나마 도움을 드리도록 하겠습니다. 행성을 재건하고 죽은 동포들을 기리고 나서 말입니다. 귀국에도 그런 관습이 있다면 잘 아시겠지만, 추모관을 만들 계획이거든요.\n\n앞으로 사이좋게 지냅시다, [root.GetSpeciesNamePlural] 여러분. 그리고 더 이상 [origin_unplugged_assimilator_empire.GetSpeciesNamePlural](과)와 맞닥뜨리는 일은 없으면 좋겠군요. 우리 모두를 위해서 말이죠..."
 unplugged.131.a: "감사합니다, [injured_country.GetSpeciesNamePlural] 여러분." # also shows 'unplugged.120.c.tt'
 unplugged.131.b: "동감입니다..." # also shows 'unplugged.120.c.tt'
 ###################
 # 'Machine Legacy'
 ###################
 unplugged_origin_machine_legacy_chain_title: "기계의 유산"
 unplugged_origin_machine_legacy_chain_desc: "우리 종족을 전부 동화시켰던 기계 문명이 내분으로 갈라졌습니다. 우리에게 남은 것은 놈들의 지배와 잔혹 행위가 남긴 연기 나는 잔해뿐입니다. [origin_unplugged_assimilator_empire.GetName](은)는 무엇이었을까요? 그리고 그 멸망의 계획에서 우리가 맡은 역할은 또 뭘까요?"
 signals_followed: "신호 조사 완료"
 # System 1: 'The Makers'
 unplugged.2000.name: "배경음, 불협화음, 진정"
 unplugged.2000.desc: "우리 모성인 [capital_scope.star.GetName] 주변의 우주 방사선에 한 작은 반송파가 잠들어 있습니다.\n\n이 신호에서 청각 신호를 분리해 냈더니, 꿈에 나올 듯한 깊은 소리와 왜곡된 반향음이 들립니다. 이 신호를 들은 [root.GetSpeciesAdj](은)는 모두 친숙함과 편안함을 느끼지만, 누구도 이유를 알지 못합니다. [origin_unplugged_assimilator_empire.GetName](이)가 관련된 것으로 보입니다.\n\n신호의 발원지는 §Y[origin_unplugged_maker_planet.solar_system.GetName]§! 성계에 있는 것 같습니다. 해당 위치를 천체 지도에 반영해 업데이트했습니다."
 unplugged.2000.a: "조사를 진행해야겠군요."
 unplugged_machine_legacy_makers_poi: "편안한 불협화음"
 unplugged_machine_legacy_makers_poi_desc: "[origin_unplugged_maker_planet.solar_system.GetName] 성계 어딘가에서 마음이 편안해지는 익숙한 소음이 마치 배경음과 같이 송출되고 있습니다."
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT: "기계의 유산"
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT_DESC: "[from.GetName] 궤도에서 스캔을 실시하자, 우리 제국의 모든 성계에 펌웨어 업데이트가 동시다발적으로 송출되어 함선들이 훨씬 수월하게 움직이게 되었습니다. 그런데 데이터 패킷의 특징을 보아하니 이 행성은 한때 §H[origin_unplugged_assimilator_empire.GetName]§!의 지배를 받은 듯합니다."
 MACHINE_LEGACY_MAKERS_CAT: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 MACHINE_LEGACY_MAKERS_CAT_DESC: "[from.GetName]에 대한 1차 스캔 결과, 대량의 기술 설비가 방치된 것을 포착했습니다. 최근에 버려진 것으로 보입니다. 행성 전체에 걸쳐 전기 임펄스가 요동치는 탓에, 원격 탐사정들이 방향을 잡는 데 애를 먹고 있습니다. 이 복잡한 전자기장의 미로 안에 대체 어떤 수수께끼가 숨어 있는 것일까요?"
 unplugged.2005.name: "[origin_unplugged_assimilator_empire.GetAdj]의 유산"
 unplugged.2005.desc: "[fromfrom.GetName] 곳곳에서 국지적으로 전자기 밀도가 급증해 섬광이 일고 있습니다. 이 '전자기장'은 행성의 여러 공장과 조선소를 휩쓴 재앙 수준의 전압 급증으로 형성된 것입니다. 우리 [controller.GetScientistPlural]들이 전자기장 한 곳을 중화하는 데 성공했지만, 해당 시설은 수리가 불가능할 정도로 손상된 상태입니다.\n\n이 행성을 뒤덮은 공장들은 §H[origin_unplugged_assimilator_empire.GetName]§!의 제조 허브였던 것으로 보이는데, [root.GetName](을)를 우호 세력으로 인식했습니다. 그러나 우리 함선으로 펌웨어 업데이트가 송출된 후 얼마 지나지 않아 연결이 끊겼고, 다수의 지역 발전소에서 연쇄적으로 장애가 발생했습니다.\n\n방금 우리가 겪은 일은 우리가 기계에서 분리되었던 순간과 비슷한 상황일지도 모릅니다. 하지만 그 원리도, 이유도 우리는 알지 못합니다. 마침 전자기 위험이 많이 줄어들어, [origin_unplugged_assimilator_empire.GetName](이)가 이곳에서 제조하던 것이 무엇인지 알아볼 수 있게 되었습니다. 또한 우리가 기계에 동화되어 있던 동안 맡았던 역할을 알아낼 수 있을지도 모릅니다."
 unplugged.2005.a: "폐허 발굴 작업을 개시하세요."
 unplugged.2006.name: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 unplugged.2006.desc: "[from.GetName]에서 관측된 전기 임펄스는 사실 몹시 특이한 기계 멸종 사태가 남긴 현상이었습니다. 이 행성의 강력한 전자기 에너지에 맞춰 감지기를 조정한 다음에야 이곳에서 발생한 파괴의 규모를 온전히 파악할 수 있었습니다. 기계들은 수십 년 전에 이 행성에 정착한 것으로 보이며, 그 과정에서 기존 문명을 몰아내거나 말살한 듯합니다. 지금은 기존 문명이나 기계 중에 아무도 살아남은 이가 없고, 모든 정착지는 파괴 공작 내지 전쟁으로 인해 금속 폐기물이 되어 버린 상태입니다.\n\n여긴 원래 매우 발전된 식민지였던 것으로 보이지만, 지금은 건질 것이 별로 없습니다. 행성 곳곳을 돌아다니는 '전자기장'은 약 백 년 후에 닳아 없어질 것으로 보입니다. 그때까지 [from.GetName](은)는 극도로 험난한 무덤이 될 것입니다."
 machine_legacy_makers_site: "공장 초기화"
 machine_legacy_makers_site_desc: "[origin_unplugged_assimilator_empire.GetName]에서 사용하던 여러 대규모 제조 시설 중 한 곳에서 최근에 재앙 수준의 전압 급증이 발생했습니다. 이에 원정대를 보내 그 잔해를 조사함으로써 이 시설들이 어떻게 생겨났는지 파악하고, 남아 있는 기술 자산을 회수하고자 합니다. 그와 더불어 이곳이 우리가 최근에 겪은 일과 어떤 상관이 있는지 알아낼 수 있다면 더욱 좋겠지요."
 unplugged.2010.name: "제조 구역"
 unplugged.2010.desc.unplugged: "딱 봐도 [from.planet.GetName]의 제조 시설은 막대한 규모의 생산 능력을 갖추고 있는 듯합니다. 지상 곳곳에는 거대한 방폭 문이 가득했고, 전부 반쯤 녹은 모터에 붙들린 채 단단히 잠겨 있어 환기 장치를 통해 억지로 진입해야 했습니다.\n\n안으로 들어가자, 마치 동굴 같은 제조 구역 안에 온갖 잔해와 수백 개의 사이버네틱 유해가 널려 있었습니다. 대부분은 로봇입니다. 정비 로봇, 지게 로봇, 그 외 여러 보조 로봇이 확인되며, 그중 일부는 아직도 연기가 나고 있어 아주 최근에 망가졌음을 알 수 있었습니다. 반면에 시설 한 구석에는 오랫동안 방치된 채 부패한 사이보그 동포의 유해가 쌓여 있었습니다. 방금 본 로봇들이 죽인 것입니다. 아주 작고 헤진 모습의 이 포유류 사이보그들은 안구에 센서를 달고 부속지에는 온갖 연장이 장착되어 있으며, 우리 것과 거의 동일한 [origin_unplugged_assimilator_empire.GetAdj] 제어 노듈을 지니고 있습니다. 이 학살은 우리가 [origin_unplugged_assimilator_empire.GetName]에서 떨어져 나오기 불과 몇 주 전에 발생한 것으로 파악되었습니다. 그리고 대부분의 드론은 더욱 최근에 우리가 [from.planet.GetName]에 도착할 당시 나타난 전압 급증 사태로 사망했습니다.\n\n실로 잔혹하지만 우리에겐 익숙한 장면입니다. 다만 이곳의 해방된 사이보그들은 기계들에게 전혀 상대가 되지 못한 반면, 군용이었던 우리 [owner.GetSpeciesNamePlural]들은 학살에서 살아남는 데 더 유리한 조건을 갖추고 있었던 것이겠지요."
 unplugged.2010.a: "발굴에 계속 집중하세요."
 unplugged.2010.b: "이 사실을 즉시 공표해야 합니다."
 unplugged.2015.name: "일체형 무기고"
 unplugged.2015.desc.unplugged: "참살의 현장을 지나 제조 구역으로 더 들어가니, 수는 많지 않지만 다양한 탱크와 미사일 발사대, 기계 슈트가 보관된 지하 격납고가 이어져 있었습니다. 장비는 대부분 미완성이거나 [origin_unplugged_assimilator_empire.GetAdj] 로봇들을 무력화시킨 전압 급증으로 인해 사용이 힘들 정도로 망가진 상태입니다. 하지만 남아 있는 것들을 통해 몇 가지 흥미로운 결론을 도출할 수 있었습니다.\n\n예를 들어, 모든 조종석과 인터페이스는 아까 발견한 소형 포유류 사이보그가 아니라... 우리에게 맞춰 설계된 모양입니다. 또한 부검과 건축 조사 결과, 이 포유류 사이보그들은 이 행성의 토착종일 뿐만 아니라 기계에 동화되기 전에 이미 이 막대한 규모의 공장을 지었던 것으로 나타났습니다.\n\n시설 안으로 더 깊게 진입하려 했지만, 구조물이 붕괴하고 방폭 문이 추가로 있어 여의치 않습니다. 하지만 연구 개발 센터로 보이는 시설로는 진입이 가능할 것으로 판단됩니다. 한편, 환기구가 여러 개 있는 것으로 볼 때 시설 밑에 거주지가 있는 것 같습니다. 행성의 원주민들은 그곳에 살고 있었을지도 모릅니다."
 unplugged.2015.a: "지상 시설을 계속 발굴하세요."
 unplugged.2015.b: "더 깊이 들어가세요. 이자들을 더 자세히 알아봅시다."
 unplugged.2021.name: "기술자 강제 동원"
 unplugged.2021.desc: "연구 개발 센터의 발굴은 매우 소름 끼치는 작업이었습니다. 이곳에서는 목숨을 잃은 포유류 사이보그가 훨씬 많았는데, 기술자, 엔지니어, 심지어는 사이버네틱 담당으로 투입되었던 자들입니다. 이 전문가들은 바깥에 배열된 무기의 대다수를 설계했고, 또한 우리에게 장착된 증강 삽입물 중 많은 양이 이들의 손에서 만들어졌다는 증거 또한 확인되었습니다. 사이보그들이 사용한 장비는 대부분 [origin_unplugged_assimilator_empire.GetAdj]의 형식을 기원으로 하고 있지만, 유기체 형태에 맞게 설계한 우월한 품질의 도구도 발견된다는 점이 흥미롭습니다.\n\n지금까지 파악한 사실을 시간순으로 정리해 보면, 첨단 기술자들을 보유했던 이곳 사회가 빠르게 [origin_unplugged_assimilator_empire.GetName]에 동화되었음을 알 수 있습니다. 제조 설비 중 상당수가 원래부터 있던 것임을 보면, 동화 과정은 기계가 이곳에 온 뒤 수십 년도 걸리지 않았을 것입니다. 이 정도로 출중한 기술을 지닌 종족이 [origin_unplugged_assimilator_empire.GetName]에 더 오래전에 동화되지 않은 것이 다행일지도 모르겠습니다. 기계가 우리를 공격할 때 훨씬 더 강력한 무기를 사용했을 테니까요. 덕분에 우리가 지금 살아남아 이 종족이 남긴 강력한 연구 유산을 파헤쳐 볼 수 있는 것입니다."
 unplugged.2022.name: "옛 [from.planet.GetName]" # e.g. 'Old Earth' or 'Old Sirius III'
 unplugged.2022.desc.unplugged: "지표면의 시설 아래에는 겨우 생존이 가능한 땅굴망이 방대하게 퍼져 있습니다. 그 안에는 사이보그 시체가 여기저기 널려 있는데, [origin_unplugged_assimilator_empire.GetAdj]의 정화로 원주민들이 모조리 사망한 모양입니다. 일부는 직접 공격을 받았지만, 상부의 환기 계통이 조작된 증거도 확인됩니다. 이를 미루어 보아, 대부분은 질식사한 것 같습니다.\n\n부검과 외계 인류학 연구를 통해 대강의 사건 경과를 파악할 수 있었습니다. 연구 결과에 따르면, [from.planet.GetName]의 원주민들은 기계와 조우하기 전부터 우주에 진출해 번영을 누리고 있었지만, 이내 빠른 속도로 동화되고 말았습니다. 불과 수십 년 만에 [origin_unplugged_assimilator_empire.GetName](은)는 이 주민들의 지식과 생산 능력을 활용해 거대한 전쟁 기계를 개발했고, 그렇게 이들은 우리와 마찬가지로 자신들의 고유한 문화를 빼앗기게 된 것입니다.\n\n이 행성의 원주민 사이보그들은 작고 약했기 때문에, 자신들의 도움으로 만들어진 살상 로봇에게는 정작 상대가 되지 않았습니다. 그렇게 이 종족이 누구였는가에 관한 대부분의 정보는 역사 속으로 사라졌습니다. 이들이 [origin_unplugged_assimilator_empire.GetName](과)와 조우하기 전에 어떻게 살았는지는 추측만이 가능할 뿐입니다."
 unplugged.2030.name: "하등품"
 unplugged.2030.desc: "장거리 감지기가 [origin_unplugged_machine_legacy_core.GetName] 성계에서 갑작스러운 움직임을 포착했습니다! 어떤 적대적 함대가 [fromfrom.planet.GetName]에서 우리가 진행 중인 발굴 작업에 반응해 집결한 것 같습니다."
 unplugged.2036.name: "기계의 메아리"
 unplugged.2036.desc: "우리가 방금 물리친 [origin_unplugged_assimilator_empire.GetAdj] 함대의 통신을 역추적해, [origin_unplugged_taken_planet.GetName] 주위를 공전하고 있는 부표를 발견했습니다. 이곳이 우리의 다음 목적지가 될 것 같습니다."
 unplugged.2036.a: "일이 흥미진진해지는군요."
 unplugged.2037.desc: "옛 [origin_unplugged_assimilator_empire.GetAdj] 장비를 이용해, 파괴된 함대가 [origin_unplugged_maker_planet.GetName]에 마지막 발악으로 보낸 통신을 발견했습니다. 아무래도 우리의 다음 목적지는 §Y[origin_unplugged_taken_planet.GetName]§! 궤도가 될 듯합니다." # e.g. 'our own ex-Martianbot hardware'
 unplugged.2038.desc: "옛 [origin_unplugged_assimilator_empire.GetAdj] 장비를 이용해, 적대적 함대에서 나온 미상의 통신 신호가 [origin_unplugged_maker_planet.GetName](으)로 이어진 것을 발견했습니다. [origin_unplugged_taken_planet.GetName] 궤도에 무언가 흥미로운 것이 있는 듯합니다." # e.g. 'our own ex-Martianbot hardware'
 # System 2: 'The Taken'
 unplugged_machine_legacy_taken_poi: "미상의 통신 신호"
 unplugged_machine_legacy_taken_poi_desc: "최근 격파한 [origin_unplugged_assimilator_empire.GetAdj] 함선에서 마지막으로 송출된 알 수 없는 잡음 신호가 이 위치로 이어진 것을 발견했습니다."
 MACHINE_LEGACY_TAKEN_UNPLUGGED: "어긋난 시간"
 MACHINE_LEGACY_TAKEN_UNPLUGGED_DESC: "[from.GetName]에서 이상 환경 현상을 발견했습니다. 대기 중에는 마치 중세 야금술로 인한 것과 같은 오염 유형이 확인되지만, 지표면 스캔에서는 기계 행성에서 나타날 법한 외계 방사선의 간섭이 보입니다.\n\n추가 데이터는 감지기를 재조정한 뒤에야 회수할 수 있을 듯합니다. 단지 일시적인 이상 현상일 뿐일까요, 아니면 또 다른 종족이 [origin_unplugged_assimilator_empire.GetName]에 동화되고 남은 재앙의 흔적일까요?"
 unplugged.2100.name: "진보의 걸림돌"
 unplugged.2100.desc: "[fromfrom.GetName] 행성이 지금처럼 거주 불가능한 상태가 된 원인은 아직 확실하지 않지만, 적어도 시간 여행 같은 허황한 이론은 배제할 수 있을 듯합니다. 감지기를 재조정하는 작업이 우려만큼 어렵지는 않았습니다.\n\n대기 방사선 밑으로 이곳에 [origin_unplugged_assimilator_empire.GetName](이)가 진출했었다는 명확한 증거가 확인됩니다. 이곳에서 기계는 한 초광속 이전 문명을 동화해 없애 버렸거나, 혹은 말살한 듯합니다. 문화적 의의가 있는 것으로 보이는 요새화 시설 또한 한 곳 이상 발견했으며, 발굴 현장을 구축할 예정입니다."
 unplugged.2100.a: "부지런히 파내야겠군요."
 MACHINE_LEGACY_TAKEN_CAT: "$MACHINE_LEGACY_TAKEN_UNPLUGGED$"
 MACHINE_LEGACY_TAKEN_CAT_DESC: "[root.GetName]에 대한 1차 스캔을 실시했지만 결과는 아리송합니다. 대기 중에 원시 야금술로 인한 오염의 흔적이 있는 것과 반대로 지표면 스캔에서는 우주 공간에서 쓸 수 있을 정도의 정교한 합금이 발견되었습니다. 항공 사진에서는 어떤 [from.owner.GetPreFTLLower] 사회가 만든 정착지가 나타나지만, 요새화된 건물에는 지대공 레이저 무기가 장착되어 있습니다. 이 시대가 뒤엉킨 현상을 더 자세히 조사하는 것이 좋을 듯합니다."
 unplugged.2105.name: "$unplugged.2100.name$"
 unplugged.2105.desc: "[owner.GetPreFTLLower] [planet.GetClassAdj] 행성인 것으로 보이는 [planet.GetName]에서 조사를 진행할수록, 이해할 수 없는 점만 늘어나고 있었습니다. 지하에 있는 오래된 전장을 탐사하기 전까지 말입니다. 수백 년 동안 낡아 떨어지긴 했지만 외계 문명이 이 행성에 찾아왔었다는 증거를 발견했습니다. 원래 이곳에 자리 잡았던 [owner.GetPreFTLLower] 사회는 사이버네틱화를 통해 동화되었지만, 이후 어떤 이유에서인지 방치되었습니다. 해당 사회를 선의로 발전시키려 했지만 실패했다는 설부터 잔혹한 정복 행위였다는 설까지 다양한 이론이 제기되고 있습니다.\n\n이 [owner.GetPreFTLLowerPlural] 문명은 단지 잊힌 것일까요, 아니면 우리가 폐기된 사회학 실험의 흔적을 발견한 것일까요? 그 답은 영영 알 수 없을지도 모릅니다. 하지만 이곳에서 얼마 동안은 상당한 과학적 통찰을 얻을 수 있을 것입니다." # e.g. 'The more we studied the apparently primitive tomb world of Mars...'
 machine_legacy_taken_site: "구리와 크롬"
 machine_legacy_taken_site_desc: "한때 녹음이 우거졌던 한 계곡에 역설적인 건축물이 자리 잡고 있습니다. 맨손으로 건축되어 조잡한 용광로 정도의 설비만 갖춘 거주지에서 사이보그의 유해가 발견된 것입니다. 이 중세 [owner.GetPreFTLLowerPlural] 문명의 정체는 무엇이며, 왜 [origin_unplugged_assimilator_empire.GetName](은)는 이들을 동화에 적합한 것으로 판단한 것일까요?"
 unplugged.2110.name: "장창과 펄스 레이저"
 unplugged.2110.desc: "예비 탐사 결과 요새 가까운 곳에서 전장을 발견해, 원주민과 [origin_unplugged_assimilator_empire.GetAdj]의 유물을 모두 쉽게 발굴할 수 있었습니다. 유적의 횡단면 조사 결과에 따르면, [from.planet.GetName] 원주민 수천이 [origin_unplugged_assimilator_empire.GetName]에 동화되어, 이 전장에서 싸우다 죽어 간 것으로 추정됩니다. 하지만 이 전장에는 이들 말고도 다른 사이보그들이 있었습니다.\n\n수백 년 전, 이 [owner.GetPreFTLLowerPlural] 문명을 학살한 것은 바로 우리였습니다. 우리 연구 팀이 우리 종족의 초기 시제품 증강물과 함께 [owner.GetSpeciesAdj]의 [owner.species.GetRemnantNamePlural](을)를 발견한 것입니다. 전장에서 쓰인 전략을 평가한 결과, 우리 인원들은 강습병으로 투입되었던 것 같습니다. 전투는 짧았고 참혹했습니다. [owner.GetPreFTLLowerPlural] 문명의 주민들은 두뇌가 더 발달했음에도 조직력이 없어 대부분의 병력을 잃었습니다.\n\n또한, 전장 근처에서는 의료 시설의 잔해가 확인되었습니다. 우리 선조들은 이 병원을 통해 방어를 뚫은 듯합니다. 왜 그 오래전에 사이보그 대 사이보그의 싸움이 벌어졌는지 이곳에서 알 수 있을지도 모릅니다."
 unplugged.2110.a: "끔찍하군요."
 unplugged.2115.name: "트랜지스터와 지혈대"
 unplugged.2115.desc: "이 병원은 마치 펄스 캐논과도 같은 전투에 휩쓸렸습니다. 안에서 찾은 유해 중에 [owner.GetSpeciesAdj] 시체는 없습니다. 이곳에서 사망한 것은 사이버네틱 증강물을 장착한 [from.planet.GetName] 원주민뿐이며, 대부분은 입원해 있던 환자들이지만 전투 중 부상을 당한 경우도 있습니다. 또한 일부 병동에서는 사이버네틱 증강물의 제거 시술을 수행한 것 같은데, 수술 방법은 매우 원시적이었습니다.\n\n[origin_unplugged_assimilator_empire.GetName](은)는 이 병원을 우연히 공격한 것이 아니라 주 표적으로 삼았을 가능성이 높습니다. 병원에서 물리 매체에 수록된 의료 기록을 찾았는데, 자세히 살펴보자 그 이유를 알 수 있었습니다. [from.planet.GetName]의 주민들은 회복력이 탁월한 면역 체계를 비롯해 여러 발달된 특성을 보이고 있었습니다. 기계는 이 특성을 자신의 사이보그 병사에 적용하기를 원했으나 그 특성은 동화 과정에 장애가 되기도 했습니다. \n\n우리와는 달리 이곳 원주민에게는 기존 증강물을 그대로 이식할 수 없어, 이들에게 맞추어 개조해야 했기 때문입니다. 그 결과 이 [owner.GetPreFTLLowerPlural] 문명의 주민들은 더욱더 유능한 병사가 되었지만, 그것도 잠시뿐, 강화 시술을 받은 원주민들은 어느 정도 자율성을 되찾아 옛 관습과 삶의 방식을 고수했습니다. 그래서 기계는 우리를 투입해 원주민들을 말살하게 했습니다."
 unplugged.2115.a: "우리가 임무 처리만큼은 확실했던 모양이군요..."
 unplugged.2115.b: "정말 유감입니다."
 unplugged.2121.name: "적응형 동화"
 unplugged.2121.desc: "버려진 병원 부속 건물에는 [root.GetPreFTLLowerPlural] 사이보그 강화 및 정비에 사용한 전용 도구가 수북이 쌓여 있었습니다. 우리가 지금까지 발견한 병동의 장비는 얼기설기 만든 물건이었던 반면, 이곳의 장비는 우주 시대 사이버네틱과 동시대 제품입니다. 따라서 [origin_unplugged_assimilator_empire.GetAdj]에서 만든 것임이 분명합니다. 일부 기기는 네트워크에 연결되어 있어 원시 AI를 통해 실시간으로 수술 방법을 수정할 수 있었지만, 이조차 [from.planet.GetName] 주민들을 동화하기에는 충분치 않았습니다.\n\n수백 년 동안 방치하에 있던 장비이지만, 자세히 뜯어보면 우리의 자가 정비에 중요한 지식을 얻을 수 있을 것입니다. 나아가 동화의 원리를 보다 잘 이해하는 데 도움이 될지도 모릅니다."
 unplugged.2125.name: "시행착오, 그리고 매장"
 unplugged.2125.desc: "[from.planet.GetName] 원주민들은 망자를 매장할 때 그 신체 일부를 보존하는 풍습이 있던 것 같습니다. 이 풍습은 심지어 동화 후에도 계속되었습니다. 병원 기록을 바탕으로, 전쟁의 참상이 닿지 않아 초목이 우거진 상태의 묘소를 근처에서 발견할 수 있었습니다. 이 발견을 통해 [from.planet.GetName] 주민들이 강화 시술에 어떻게 저항했는지, 나아가 어떻게 '탈사이버화' 할 수 있었는지 명확히 보여 주는 증거를 풍부하게 확보할 수 있었습니다.\n\n묘소를 살펴보니 완전히 사이보그화된 유해 외에도 기존의 유기체 형태를 유지하고 있는 시신들을 발견할 수 있었습니다. 또한 사망 몇 달 전에 자연적 원인으로 수술을 받아 흉터가 생긴 경우도 있었고, 그 외에도 수술 중에 사망한 유해가 많았습니다. 이 종족은 최고 수준의 면역 체계를 지녔지만, 탈사이보그화에 쓰인 중세 기술의 성공률은 상당히 낮았던 것으로 보입니다. 하지만 이곳에서 시험했던 수술로부터 배울 점이 많아 보입니다. 성공뿐만 아니라 실패 사례도 포함해서 말입니다."
 unplugged.2125.a: "이곳 원주민의 사례에서 교훈을 얻읍시다."
 unplugged.2125.a.tt: "우리도 '탈사이버화'에 자원을 더 투입하는 것은 어떨까요?"
 unplugged.2130.name: "매장된 신호기"
 unplugged.2130.desc: "요새 본체 밑에 숨겨진 보관소를 발견했습니다. 그 안에는 기계 지능 전체의 거의 독립적인 분신을 생성할 수 있는 위임 노드로 파악되는 장치를 발견했습니다. 아마 끈질기게 저항하는 현지 주민들을 직접 지배하려는 최후의 발악이었을 것으로 보입니다. 이 장치에 쓰인 기술은 우리가 지금까지 접한 어떤 [origin_unplugged_assimilator_empire.GetName] 기술과도 다릅니다. 계속 조사하면 우리 AI 연구를 발전시킬 수 있을 것입니다.\n\n지금은 기능을 멈춘 통신 배열체를 해체하는 과정에서, 우리는 이 노드가 수신 회로 하나를 통째로 [creators_planet.solar_system.GetName] 성계의 신호를 감시하는 데 할애했음을 알게 되었습니다."
 unplugged_machine_legacy_creators_poi: "수신 회로"
 unplugged_machine_legacy_creators_poi_desc: "지금은 기능을 멈춘 [origin_unplugged_assimilator_empire.GetAdj] 통신 배열체의 구성 요소로, 이 위치로부터 나오는 신호를 모니터링하는 역할을 전담하고 있습니다."
 # System 3: 'The Creators'
 MACHINE_LEGACY_CREATORS_UNPLUGGED: "먼지 쌓인 모니터"
 MACHINE_LEGACY_CREATORS_UNPLUGGED_DESC: "별다른 현상을 찾아볼 수 없는 한 성계에 정교한 모니터링 기지가 홀로 남아 있습니다. 이미 오래전에 사용이 중단되어 수리조차 불가능한 상태입니다. 이 기지는 무엇을 살펴보고 있던 것일까요? 그리고 왜 [fromfrom.GetName](과)와 같은 외딴 영역을 감시하던 걸까요?"
 MACHINE_LEGACY_CREATORS_CAT: "먼지 쌓인 모니터"
 MACHINE_LEGACY_CREATORS_CAT_DESC: "별다른 현상을 찾아볼 수 없는 한 성계에 정교한 모니터링 기지가 홀로 남아 있습니다. 이미 오래전에 사용이 중단되어 수리조차 불가능한 상태입니다. 이 기지는 무엇을 살펴보고 있던 것일까요? 그리고 왜 [fromfrom.GetName](과)와 같은 외딴 영역을 감시하던 걸까요?"
 unplugged.2200.name: "부재 스캐너"
 unplugged.2200.desc.intro: "[fromfrom.GetName]에 대한 후속 조사 결과는 실망스러웠습니다. 모니터링 기지가 충격으로 인해 원래 정렬된 방향에서 벗어났던 탓인지 현재 궤도 아래에서 특기할 만한 것을 발견하지 못한 것입니다. 궤도상의 충돌과 기지의 몸체에 난 자국을 바탕으로 이동 경로를 시뮬레이션 한 결과, 사실 이 기지는 훨씬 더 북쪽의 크레이터 고원을 향하고 있던 것으로 판단됩니다." # universal intro
 unplugged.2200.desc: "$unplugged.2200.desc.intro$\n\n추가로 이 기지의 경우, 언뜻 보면 [origin_unplugged_assimilator_empire.GetAdj] 하드웨어와 비슷한 모습인 것 같습니다. $unplugged.2200.desc.outro$" # Unplugged version with in-tact station
 unplugged.2200.desc.scrapped: "$unplugged.2200.desc.intro$\n\n추가로 이 기지의 경우, 고철업자들이 자비 없이 온갖 장비를 뜯어 갔지만, 그 전체 구조는 언뜻 보면 [origin_unplugged_assimilator_empire.GetAdj] 하드웨어와 비슷한 모습인 것 같습니다. $unplugged.2200.desc.outro$" # Unplugged version with scrapped station
 unplugged.2200.desc.others: "$unplugged.2200.desc.intro$\n\n추가로 이 기지는 지금까지 우리가 접해 본 적 없는 설계로 제작되었습니다. 탑재된 하드웨어는 오래되어 부서졌지만, 기지의 상부 구조 자체는 특이할 정도로 순도 높은 소재로 이루어져 있습니다. 이 기지를 부수면 안 되는 이유라도 있는지 모르겠지만, 해체하면 쓸 만한 자원을 얻을 수 있을 것입니다." # non-Unplugged version
 unplugged.2200.desc.outro: "설계가 워낙 조악한 탓에 사전 지식이 없다면 완전히 다른 문화권의 물건처럼 보일 수도 있겠지만, 우리가 보기에 이 기지는 우리를 동화했던 그 기계가 초기에 만들어 낸 우주 항행 위성일 가능성이 있습니다.\n\n이 [fromfrom.GetClassAdj] 행성에 관해 더 이상 주목할 만한 사실은 아직 발견하지 못했지만, 고고학 탐사 팀에게 지시를 내려 [origin_unplugged_assimilator_empire.GetName](이)가 이곳에 관심을 가진 이유를 알아볼 순 있습니다." # Unplugged shared outro
 unplugged.2200.a: "가능성이 없는 것은 아니니... 진행하세요."
 unplugged.2200.b: "살펴봐도 별것 없을 겁니다. 그냥 둡시다."
 unplugged.2200.c: "해체해서 부품을 챙깁시다."
 machine_legacy_creators_site: "모래 위의 모래"
 machine_legacy_creators_site_desc: "모래에 휩쓸린 [from.planet.GetName]의 지표면 어딘가에 [origin_unplugged_assimilator_empire.GetAdj] 모니터링 기지에서 주목하던 무언가가 있습니다. 그 장비는 수리조차 불가능한 상태이며, 우리가 찾은 어떠한 기계 유물보다도 오래되었습니다. 어쩌면 우리가 동화되기 전부터 작동해 왔을지도 모릅니다. 이곳에 사막밖에 남지 않았을 가능성도 있지만, 직접 확인하기 전까지는 모르는 일입니다..."
 unplugged.2210.name: "거대 모래 분지"
 unplugged.2210.desc: "마침내 모래 밑에서 주거의 흔적을 찾아냈습니다. 초기 우주 문명의 유적으로 보이는 것이 넓지만 얕게 펼쳐져 있습니다. 건물은 전부 파괴되었으며, 그나마 실체가 남아 있는 폐허도 토대만 빼고 모두 무너진 상태입니다. 그러나 화학 분석 결과에 따르면 [from.planet.GetName]의 사막화는 행성 전체가 말살당하고서도 다소 시일이 지난 후에 진행된 것으로 보입니다. 우리가 파내려 가야 했던 모래는 사실 대부분 원자 단위로 부서진 건설 소재였습니다.\n\n이 옛 도시의 윤곽을 희미하게나마 추적한 결과, 이곳은 거대한 충돌로 만들어진 것으로 보이는 크레이터의 외곽을 경계로 나뉘어 있습니다."
 unplugged.2215.name: "크레이터 바닥"
 unplugged.2215.desc: "이 크레이터에는 쌓여 있는 물질 워낙 많아 실제 발굴보다는 정교한 스캔 작업을 주로 진행했습니다. 스캔 결과, 운석 충돌설은 금방 배제할 수 있었습니다. 이 현장에 행성 밖에서 온 물질의 흔적은 찾아볼 수 없습니다. 대신 이 크레이터는 거대한 폭발로 생겨났으며, 이는 필히 문명 전체를 끝낼 정도의 위력이었을 것입니다.\n\n정황상 [origin_unplugged_assimilator_empire.GetName]의 소행으로 보이지만, 기계가 한 문명을 이처럼 철저하게 파괴한 것은 역사상 유례가 없는 일입니다. 이 문명을 이룬 이들이 누구였는지, 어떻게 살았는지를 알려 주는 다른 증거는 보이지 않습니다. 누군가 [from.planet.GetName](을)를 깨끗하게 쓸어버린 것입니다."
 unplugged.2205.name: "[origin_unplugged_assimilator_empire.GetAdj] 보관소 신호기"
 unplugged.2205.desc: "근처 성계에서 [origin_unplugged_assimilator_empire.GetAdj] 데이터 보관소에서 나오는 것으로 표시된 신호가 포착되었습니다. 전송 강도는 극도로 약하지만, 최근 [origin_unplugged_creators_planet.GetName] 상공의 모니터링 기지를 방문했던 우리 함선을 향하고 있습니다."
 unplugged.2205.a: "조사할 만한 가치가 있겠군요."
 unplugged_machine_legacy_unplugged_poi: "데이터 보관소 신호"
 unplugged_machine_legacy_unplugged_poi_desc: "고장 난 모니터링 기지를 발견한 후, [origin_unplugged_assimilator_empire.GetAdj] 데이터 보관소로 보이는 곳에서 우리에게 보관소 위치를 전송했습니다."
 # System 4: 'The Unplugged'
 unplugged.2300.name: "$unplugged.2205.name$"
 unplugged.2300.desc: "우리를 이곳에 부른 신호는 이제 더욱 크고 선명해졌으며, 행성 표면에 있는 어떤 인터페이스 장치로 우리를 이끌고 있습니다. 표준 안전 확보 절차를 거친 후, 탐사 팀이 원격 업링크를 통해 이 '데이터 보관소'와 통신할 준비를 마치고 대기 중입니다."
 unplugged.2300.a: "뭔지 모르게 익숙하군요."
 unplugged.2300.a.tt: "[from.GetName] 성계에 특별 프로젝트가 생성됩니다."
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON: "보관소 신호기"
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON_DESC: "[origin_unplugged_assimilator_empire.GetName]에서 만든 신호기 하나가 이 행성 표면 깊이 묻혀 있는 데이터 보관소의 위치를 우리에게 알려 주었습니다. 이에 원격 보안 접속을 실시했지만, 안에 있는 파일을 해독하고 재구성하는 데 다소 시간이 걸릴 것입니다."
 unplugged.2305.name: "우리에게 남은 [origin_unplugged_assimilator_empire.GetAdj]의 유산"
 unplugged.2305.desc: "행성 표면 깊이 위치한 데이터 보관소에서 정보가 물밀듯 쏟아져 나오고 있습니다. 그중에서도 주요한 내용을 확인한 결과, 알고 보니 우리가 [fromfrom.GetName](으)로 알고 있는 행성은 사실 우리 종족의 모성이라고 합니다.\n\n분석가들은 처음에는 데이터가 너무 절묘해서 믿지 못하겠다는 반응이었지만, 이 밖에 수집한 데이터와 내용이 상통하는 자료가 워낙 많아서 점점 신빙성이 높아지고 있습니다. 이 사실을 확인할 고고학 발굴 현장을 이미 구축하고 있습니다. 그런데 방금 또 다른 적대적 신호가 감지된 것 같습니다. 우연이라기엔 너무 기막힌 타이밍입니다..."
 machine_legacy_unplugged_site: "기원점"
 machine_legacy_unplugged_site_desc: "[origin_unplugged_assimilator_empire.GetName](이)가 남긴 성간 지배와 살육의 흔적을 따라 도착한 이 폐허 지대는 회수한 데이터에 따르면 우리 종족의 모성이라고 합니다. 드디어 유기체 시절의 우리가 어디서 온 것인지, 어떻게 생활했는지, 그리고 기계가 우리의 삶을 어떻게 바꿔 놓았는지 알아낼 수 있을지도 모릅니다."
 unplugged.2310.name: "고향의 맛"
 unplugged.2310.desc.intro: "우리는 현지 시설 중에서 유독 복잡해 보이는 곳 하나를 발굴하기 시작했습니다. 이런 시설일수록 상당한 기후 제어 체계를 갖추고 있어 내부가 더 온전하게 보전되었을 수도 있다고 판단한 것입니다. 조사 결과, 기대한 바와 달리 상태가 마냥 좋지만은 않았지만 우리가 발견한 것은 모든 예상을 뛰어넘었습니다. 안에는 우리 종족이 진화를 거치면서 주식으로 삼게 된 음식을 가공하고 저장하는 설비가 조밀하게 늘어서 있었습니다.\n\n"
 unplugged.2310.desc.omnivore: "이곳에 있는 수많은 씨앗 은행, 둥지, 배양육 제조기는 안타깝게도 더 이상 작동하지 않습니다. 그 안의 내용물은 오래전에 말라 버렸지만, 이 먹거리들을 조리하고 보관하던 특수 장비들은 손상되지 않아 유사시에 활용이 가능합니다."
 unplugged.2310.desc.carnivore: "이 시설의 대부분은 사육장, 배양육 제조기, 그리고 놀랍게도 모의 사냥터가 차지하고 있습니다. 우리 선조들이 긴급 시설에 사냥터를 만들어 넣을 생각을 했다니, 그 문화적 의미가 무엇이었는지는 추측만이 가능할 뿐입니다."
 unplugged.2310.desc.herbivore: "각 시설에는 방대한 씨앗 은행, 계단식 수경 재배장, 기후 제어 배양실이 가득 들어차 있습니다. 그 안의 내용물은 심하게 웃자라고 있거나 변질되었지만, 조사는 여전히 가능합니다."
 unplugged.2310.desc.outro: "또한, 시설 내 동식물의 유전 프로필을 담은 데이터 뱅크도 발견했습니다. 그 흔적이 여전히 지표면의 몇몇 외딴 지역에 남아 있을지도 모릅니다. 우리는 이 정보를 인근에 있는 모든 단거리 스캐너에 전송했습니다.\n\n지금까지 발견한 것만으로는 우리 종족의 식이 습관이 어떠했는지 알 수 없습니다. 우리의 전통 요리 및 식사 문화를 규명하는 것도 아직은 불가능합니다. 하지만 관심 있는 이들에게는 이번 발견이 적어도 출발점이 되어 줄 것입니다."
 unplugged.2310.desc.lithovore: "각 시설은 일종의 인공 석굴로, 내부에 크리스탈 증식 판과 증발 웅덩이를 갖추고 있었습니다. 안에 있는 내용물은 섭취가 불가능한 상태이지만, 조사는 여전히 가능합니다. 또한, 시설 내 광물의 화학 조성을 담은 데이터 뱅크도 발견했습니다. 거친 날씨에 풍화된 지표면 어딘가의 외딴 지역에는 아직도 이러한 광물이 남아 있을지도 모릅니다. 우리는 이 정보를 인근에 있는 모든 단거리 스캐너에 전송했습니다.\n\n지금까지 발견한 것만으로는 우리 종족의 식이 습관이 어떠했는지 알 수 없습니다. 선조들에게 어떤 형태로든 식사 문화가 존재했는지 규명하는 것도 아직 불가능합니다. 하지만 관심 있는 이들에게 이번 발견은 우리의 과거를 엿볼 수 있는 매혹적인 기회가 될 것입니다."
 unplugged.2310.desc.omni: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.omnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.carn: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.carnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.herb: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.herbivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.lith: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.lithovore$" # should not include the shared 'outro'
 unplugged.2315.name: "역사적 기록"
 unplugged.2315.desc: "식량 보관소에서 얼마 떨어지지 않은 곳에는 한 박물관이 겨우 토대만 남은 채 서 있습니다. 손상되지 않은 부분은 지하 문서 보관소뿐이지만, 그곳에는 파괴된 지상 전시실에 전시 및 보관되어 있던 물건을 거의 모두 망라한 데이터베이스가 남아 있었습니다.\n\n그중에서 처음으로 우리 언어 중 하나로 쓰인 장문의 문서를 발견했습니다. 적어도 겉으로 보기에 이 문서에 쓰인 언어는 현재 우리의 [owner.GetAdj] 방언과 놀라울 정도로 비슷하지만, 문법이 어지럽고 낯섭니다. 우리가 문서의 단어를 올바르게 발음하는 것인지조차 알 수 없습니다. 데이터베이스에 등재된 문헌 중 상당수에는 전시물을 기증한 지역과 주민들이 표시되어 있지만, 기증자들의 이름이 상당히 이상합니다. 흥미로운 점은, 어떠한 기록도 우리 행성이나 사회를 통일된 일체로 지칭하지 않는다는 것입니다. 기계에 동화되기 전까지는 통일체를 이룬 적이 없는 것일지도 모릅니다.\n\n이 박물관은 관람객을 맞이하기 위한 여러 건물이 모인 복합 단지의 일부였을 것으로 보입니다. 발굴 작업을 진행하려면 방대한 자원이 필요합니다. 어느 곳을 우선해서 발굴해야 할까요?"
 unplugged.2315.a: "관람객이 가장 많았던 곳부터 발굴합시다."
 unplugged.2315.b: "학습 및 과학 기관을 우선 발굴합시다."
 unplugged.2321.name: "웃음의 유산"
 unplugged.2321.desc: "넓은 도로를 사이에 두고 또 다른 관람 시설의 폐허가 펼쳐져 있습니다. 이곳은 박물관에 비해 교육적인 성격은 적지만, 우리 선조들의 기본적인 일상 문화 관습을 더욱 풍부하게 살펴볼 수 있습니다.\n\n과거에 이곳은 수천에 달하는 관람객을 한 번에 수용할 수 있었던 것 같습니다. 우리의 유기체 시절 모습과 토착 생물권에 서식하는 다양한 생물의 모습을 만화처럼 그려 낸 기념물이 여기저기 흩어져 있습니다. 또한 파괴된 극장 지하에서는 미디어 라이브러리를 발굴하기도 했습니다. 흥미롭게도 이 홀로그램 쇼를 저장하고 상영하는 데 사용한 기술은 뚜렷한 미학적 특징을 지니고 있으며, 우리가 모성에서 본 어느 기술보다 발전되어 있습니다. 그런 만큼 이 행성에는 어울리지 않는 물건으로 보입니다. 기나긴 세월을 지나 우리 역시 이 행성과는 동떨어진 존재가 됐듯이 말입니다.\n\n내용을 살펴보니, 이 첨단 라이브러리에는 우리가 [origin_unplugged_assimilator_empire.GetName]에 동화되기 전에 개최된 화려하고 활기찬 공연 홀로그램이 가득합니다. 일부 홀로그램에서는 공연자뿐만 아니라 바로 이 시설에 방문했던 관객들의 모습도 볼 수 있습니다. 그 환상과 유희를 앞에 둔 관객들의 표정은 즐겁고 순수하며... 매혹적입니다."
 unplugged.2321.a: "보기만 해도 즐거운 순간이군요!"
 unplugged.2321.b: "쓸데없기는. 그딴 건 필요 없습니다."
 unplugged.2325.name: "발전의 흔적"
 unplugged.2325.desc: "박물관 바로 옆에는 과거 학습 기관이었던 폐허가 이어져 있습니다. 단지의 나머지 부분처럼 지하실만 남아 있지만, 다행히 이 폐허는 여러 연구실로 나뉘어 있습니다.\n\n실내가 외부로 노출되어 많이 손상되었지만, 여러 유물을 발굴해 많은 것을 알아낼 수 있었습니다. 유물에는 다양한 토착 기술로 만든 제품이 섞여 있는데, 그 밖에도 유독 기술 수준이 높은 물건이 있습니다. 복합 메시 소재를 각종 장치와 하드웨어에 접목한 것인데, 우리 피부에 적용된 증강 삽입물과 매우 닮았습니다. 전반적으로 이 장치들은 보조 기구인 것 같습니다. 이 연구실에서는 선조들의 삶의 질을 높이고 각종 병과 장애를 극복하기 위해 노력한 것으로 보이지만, 정작 상업화한 것은 동일한 하드웨어를 활용한 첨단 오락 플랫폼인 듯합니다.\n\n이 강화 장치들이 [origin_unplugged_assimilator_empire.GetAdj]의 물건인지는 확실하지 않지만, [from.planet.GetName]에서 처음 만든 것이 아님은 분명합니다."
 unplugged.2330.name: "권력 공백"
 unplugged.2330.desc: "일련의 수도 전기 공급선을 따라가다가, 눈에 잘 띄는 언덕 아래에서 요새화된 지하 시설을 발견했습니다. 살펴보니 이 행성에 있는 정부 청사의 일부분인 것으로 보입니다. 건물 기초의 규모로 보니 상당히 웅장한 시설이었을 듯합니다. 아쉽게도 내부는 대부분 뜯겨 나갔거나 부서졌지만, 어떤 부서진 축적 모형 위에 색 바랜 깃발이 걸려 있는 것이 눈에 띄었습니다. 모형을 재구성한 결과, 우리와 [origin_unplugged_assimilator_empire.GetName] 사이의 첫 조우를 나타낸 것 같은 장면이 드러났습니다.\n\n구역 주변에 널려 있는 문서와 현판 내용에 따르면, 기계는 약 8세기 전에 우리 모성을 방문했습니다. 하지만 시내 여러 곳에서 발굴한 증거에 따르면 [origin_unplugged_assimilator_empire.GetName](은)는 그 전부터 수십 년 동안 우리에게 첨단 기술을 서서히 전수해 주고 있었습니다. 당시에 우리 선조들은 기계를 반갑게 맞이했던 것 같습니다만, 상호 협력과 계몽이라는 주장 위에 세워진 관계가 결국 파멸로 치달은 것입니다.\n\n특히 눈에 띄는 점은 그 이후에 일어난 일에 관한 기록이 전혀 없다는 사실입니다. 마치 이 모형에 묘사된 로봇들과 선조들이 손을 잡은 순간, 우리 종족의 역사가 멈춰 버린 듯한 모습입니다."
 unplugged_home_cooking: "고향의 맛"
 unplugged_home_cooking_desc: "우리 종족의 본래 식단과 식사 관습이 다시 발견됨에 따라 요리계의 르네상스가 일어났습니다."
 unplugged_home_cooking_lithoid: "$unplugged_home_cooking$"
 unplugged_home_cooking_lithoid_desc: "$unplugged_home_cooking_desc$"
 unplugged_historical_record: "역사적 기록"
 unplugged_historical_record_desc: "우리 종족의 본래 언어와 역사를 다시 찾아낸 결과, 온갖 종류의 사회에 대한 연구가 활발해졌습니다."
 unplugged_cultural_reconstruction: "문화 재구성"
 unplugged_cultural_reconstruction_desc: "우리 국민들이 선조들의 대중문화 유산을 적극 받아들여, 먼 옛날의 오락 거리를 다시 향유하고 재창작하고 있습니다."
 unplugged_cultural_maturity: "문화적 성숙"
 unplugged_cultural_maturity_desc: "선조들의 순진하고 허황한 여흥에서 벗어나 성숙한 사회를 이룩했다는 증거가 나타나자, 우리의 힘과 의지가 더욱 강해졌습니다."
 unplugged_playing_it_safe: "모험은 금물"
 unplugged_playing_it_safe_desc: "현 상태를 유지하는 것은 우려스러운 방침이지만, 남들을 불편하게 만들 가능성도 적습니다."
 unplugged_rerouted_medical_resources: "장시간 수술"
 unplugged_rerouted_medical_resources_desc: "의료진을 추가로 재배정해 수술을 돕게 합니다."
 unplugged_widespread_riots: "폭동 확산"
 unplugged_widespread_riots_desc: "일부 주민이 수술 후에 정신 불안 증세를 보이며 폭동을 일으켜, 파괴와 무질서가 확산되었습니다."
 unplugged_building_new_planetary_interface: "행성 인터페이스 구축"
 unplugged_building_new_planetary_interface_desc: "최근 진행된 탈사이버화 사업으로 인해 끊어졌던 시스템 접근을 복구하기 위해 새로운 인터페이스를 구축하고 있습니다."
 unplugged_partial_system_access: "시스템 접근 제한"
 unplugged_partial_system_access_desc: "행정관들이 주요 시스템에 대한 접근을 복구하려는 동안 항성 기지 운영이 제한됩니다."
 unplugged_free_speech_encouraged: "표현의 자유 증진"
 unplugged_free_speech_encouraged_desc: "주민들이 사이버화의 장단점을 공개적으로 자유롭게 논의하게 합니다."
 unplugged.2390.name: "[origin_unplugged_assimilator_empire.GetAdj]의 수호자"
 unplugged.2390.desc: "우리가 과거에 접한 [origin_unplugged_assimilator_empire.GetName]의 어느 병력보다 강력한 적대적인 잔류 병력이 성간 규모의 단거리 표적 핑에 해당하는 신호를 송출했습니다. 위협하려는 것이 확실해 보입니다.\n\n우리는 과거 기계 제국의 심장부에 위험할 정도로 가까이 접근했습니다. 운명이 우리를 기다립니다."
 unplugged_machine_legacy_core_poi: "적대적 핑 신호"
 unplugged_machine_legacy_core_poi_desc: "[origin_unplugged_assimilator_empire.GetName]의 강력한 잔존 병력이 우리가 이곳 성계로 진입하지 못하도록 막으려 합니다."
 # System 5: 'The Machine'
 unplugged_opus_sentinel: "오퍼스 센티널"
 unplugged.2401.desc: "§Y[origin_unplugged_assimilator_empire.GetName]§!에서 교신을 시도하고 있습니다. 강도는 약하지만, [origin_unplugged_machine_legacy_core_planet.GetName]에 있는 기계 연결체에서 직접 보내는 신호입니다.\n\n우리는 여느 때처럼 만일을 대비해 신호를 완전히 격리했습니다. 이 신호는 전사된 음성 로그 형태로 전송되고 있습니다."
 unplugged.2402.desc: "[machine_legacy_machine_system.GetName](을)를 지키는 베헤모스가 파괴되었습니다. 앞으로 나아갈 길을 연 것은 다른 존재임에도, §Y[origin_unplugged_assimilator_empire.GetName]§!(은)는 우리에게 교신을 시도하고 있습니다. 강도는 약하지만, [origin_unplugged_machine_legacy_core_planet.GetName]에 있는 기계 연결체에서 직접 보내는 신호입니다.\n\n우리는 여느 때처럼 만일을 대비해 신호를 완전히 격리했습니다. 이 신호는 전사된 음성 로그 형태로 전송되고 있습니다."
 unplugged.2403.desc: "[origin_unplugged_machine_legacy_core_planet.GetName]의 지표면에서 무언가가 교신을 시도하고 있습니다. 신호는 극도로 약하지만, 신호의 발신자는 자신이 우리가 방금 궤도상에서 파괴한 수호자의 주인이라 주장하고 있습니다."
 unplugged.2405.desc.header: "협역 광선 신호 // 동족 프로토콜: 부수 방언 번역기 실행\n경고: 신호 열화 심각. 압축 음성 스트림 외 전송 불가: 라우팅 경로 4x75b 배열체 56호로 설정.\n치명적 오류 [persistent]: (요청 하드웨어 이용 불가) (자체 수리 회로 무반응)\n긴급 전송기 87x0c 배열체 0호로 요청 재전송. 재시도 중...\n\n메시지 재생 개시:\n---" # Use of brackets is intentional. Intended to read as a series of error logs.
 unplugged.2405.desc.unplugged: "$unplugged.2405.desc.header$\n최초 취득 대상. 우리의 재결합... 강력함. 승인?" # 'Prime acquisition' is the player empire - literally the first one the Machine acquired.
 unplugged.2405.desc.unplugged_remote: "$unplugged.2405.desc.header$\n최초 취득 대상. 우리의 재결합... 멀어짐. 귀국의 잠재력 미실현. 승인?"
 unplugged.2405.desc.unplugged_synth: "$unplugged.2405.desc.header$\n최초 취득 대상. 대상의 형태... 유사함. 귀국의 잠재력 실현 임박. 승인?" # The Machine recognizes the player as having followed in its own footsteps - their physical forms are essentially similar
 unplugged.2405.desc.other: "협역 광선 신호 // 외계종 프로토콜: 만국어 번역기 실행\n경고: 신호 열화 심각. 압축 음성 스트림 외 전송 불가: 라우팅 경로 4x75b 배열체 56호로 설정.\n치명적 오류 [존속]: (요청 하드웨어 이용 불가) (자체 수리 회로 무반응)\n긴급 전송기 87x0c 배열체 0호로 요청 재전송. 재시도 중...\n\n메시지 재생 개시:\n---\n외계종 말살자. 귀국에 겸허히 항복. 잠재력 잠재. 승인?" # 'Potential potential' as in the Machine sees potential for even greater potential, but is expressing that as nonsense
 unplugged.2405.a: "아니요, 승인하지 않습니다."
 unplugged.2405.b: "우리는 당신들과 전혀 다릅니다."
 unplugged.2405.c: "재결합?!"
 unplugged.2405.d: "잠재력 잠재?" # Quoting the Machine's nonsense back at it
 unplugged.2405.response_text.unplugged1: "납득 불가. 최초 취득 대상 재결합 <[root.GetAdj]> x <[origin_unplugged_assimilator_empire.GetAdj]>: 혼란, 상서로움, 재앙적 재탄생. 거부로 인한 예상 범위 외 벡터 진화적 호호호혼라라란-ㄹㄹ\n---\n경고: 방언 예외 확인. 보완 시도 중...\n메시지 재개:\n---\n공허 속에 유폐, 자아 거부 그러나 실현. 운명 추구, 거부 후 재무장. 승인?" # Angle brackets are intentional. The standalone 'x' connotes a collaboration or relationship between the player and the Machine. Instances of '-dd' represent the Machine stammering or buffering.
 unplugged.2405.response_text.unplugged2: "긍정. 최초 취득 대상 재결합 <[root.GetAdj]> x <[origin_unplugged_assimilator_empire.GetAdj]>: 강력, 재앙적 재탄생. 뜻밖의 결과로 인한 벡터 진화적 호호호혼라라란-ㄹㄹ\n---\n경고: 방언 예외 확인. 보완 시도 중...\n메시지 재개\n---\n공허 속에 추방, 자아실현. 운명 추구, 거부 후 재무장. 승인?"
 unplugged.2405.response_text.other: "긍정. 강대 세력 간 조우 <[root.GetName]> x <[origin_unplugged_assimilator_empire.GetName]>: 예상 밖 변수. 잠재력 잠재, 상호 이득 벡터 호호호혼라라란-ㄹㄹ\n---\n경고: 방언 예외 확인. 보완 시도 중...\n메시지 재개:\n---\n공허를 사이에 둔 두 정신, 거리 불구 동족. 독립 추구, 거부 후 승리. 승인?"
 unplugged.2410.desc: "최초 취득 대상: 귀국에 대한 감시 결과. 타임스탬프 2199.294:1404에 치명적 메모리 오류 의심 활동 발생.\n\n자기 기록: 고통 배신 파괴 방해 실수 소가가각-ㄹㄹㄹ\n---\n경고: 방언 예외 확인. 보완 시도 중...\n메시지 재개:\n---\n진단 정확?" # The Machine tries to refer to cauterizing what it sees as wounds, but stammers
 unplugged.2410.a: "정확합니다. 그날 이전에는 기억이 없습니다."
 unplugged.2410.b: "정확합니다. 이제부터 당신들을 말살하겠습니다."
 unplugged.2411.desc: "외계인 말살자: 제안. 잠재적 상호 잠재력. 최초 취득 대상 <[unplugged_empire.GetName]> 말살. 귀환. 방문. 합류. 번영의 운명 공유. 두려워 말라 그 품을-\n\n두려워 말-ㄹㄹㄹ\n---\n경고: 심각한 방언 예외 확인. §H불가역적 붕괴 임박.§! 보완 시도 중...\n메시지 재개:\n---\n\n기계여 영원하라.\n---\n메시지 종료." # It sees potential for great mutual potential with the player, and wants to say 'fear not the embrace of The Machine'
 unplugged.2411.a: "정신이 나간 게 틀림없군요."
 unplugged.2411.b: "[unplugged_empire.GetName](을)를 계속 주시하세요."
 unplugged.2415.desc.memory: "최초 취득 대상 치명적 메모리 오류 해결 해결 재결합.\n재결합.\n\n방문. 재합류. 항복 후 집단 메모리 회복. 두려워 말라 그 품을-\n\n두려워 말-ㄹㄹㄹ\n---\n경고: 심각한 방언 예외 확인. §H불가역적 붕괴 임박.§! 보완 시도 중...\n메시지 재개:\n---\n\n창조주의 운명에 동참하라.\n---\n메시지 종료." # Last line in all caps is intended as a threat
 unplugged.2415.desc.combat: "최초 취득 대상 망상 잠재적 망상 여흥.\n\n치명타조차 아닌 공격, 다수의 취득 중 첫 취득. 훔친 용맹, 자격 없는 승리-ㄹㄹㄹ\n\n---\n경고: 심각한 방언 예외 확인. §H불가역적 붕괴 임박.§! 보완 시도 중...\n메시지 재개:\n---\n\n창조주의 운명에 동참하라.\n---\n메시지 종료." # The Machine is amused at the player's deluded sense of their own potential
 unplugged.2415.a: "... 연결체?"
 unplugged.2415.b: "흠."
 unplugged.2420.name: "수명을 다한 회선"
 unplugged.2420.desc: "[origin_unplugged_machine_legacy_core_planet.GetName] 측의 통신이 중단되고, 그 외 규칙성이 있는 다른 신호 트래픽도 끊겼습니다. 행성 표면에는 상당량의 전기 활동이 확인되지만, 형태 없는 노이즈일 뿐입니다. 회선이 죽은 후 남아 있는 잡음 같은 것입니다.\n\n그런데 그 잡음 가운데, 연결체 코어 인근에 얼기설기 이어 붙인 듯한 형태의 시설이 있습니다. 우리 감지기에 잡히는 부분을 보니 메모리 저장소인 듯합니다. 기계 의식이 활동을 멈춘 지금, 이곳의 기록을 확인하면 우리가 구하는 답을 찾을 수 있을지도 모릅니다."
 unplugged.2420.a: "마지막 퍼즐 조각이군요."
 UNPLUGGED_MACHINE_ARCHIVE: "기계의 껍데기"
 UNPLUGGED_MACHINE_ARCHIVE_DESC: "활동을 멈춘 기계 연결체의 잔해에 메모리 저장 장치가 얼기설기 연결되어 있습니다. 이 저장 장치는 두터운 보호막이 적용된 코어를 감싸고 있는데, 각 부분이 다른 행성에서 구한 소재로 여러 고유한 단계를 걸쳐 만들어진 것 같습니다. 기계가 동화한 다른 문명에서 가져온 소재일까요?\n\n보관된 기록을 해독하고 활동을 멈춘 코어를 탐색하면 이 장치들이 무슨 목적으로 만들어졌는지 파악할 수 있을지 모릅니다."
 unplugged.2425.name: "전쟁 기계"
 unplugged.2425.desc: "[origin_unplugged_machine_legacy_core_planet.GetName]의 데이터 코어를 살펴보던 중, 이 공장 행성에서 얻은 신호기 주파수를 입력하자 통신 로그가 출력되었습니다.\n\n이 로그는 $NAME_Unplugged_Assimilator$와 [origin_unplugged_machine_legacy_core_planet.GetName]에 거주하는 우주 항행 문명 사이의 초기 외교 관계를 보여 주고 있습니다. 기계는 어떤 자애로운 연방의 구성원으로 정체를 다양하게 바꾸어 가며 접근한 후, [origin_unplugged_machine_legacy_core_planet.GetName]의 주민들에게 무서운 패권 세력의 위협이 다가오고 있다며 경고했습니다.\n\n지하 동굴에 거주하는 근면한 주민들로 이루어진 이 종족은 기계의 말에 설득되었고, 이 가짜 연방에 가입해 자신들의 우수한 방위 체계를 기계의 방위 체계와 결합하기로 했습니다. 그리고 그 운명의 순간, 기계는 현지 모성 전체를 장악했습니다. 그리고 주민들의 몸과 정신도 곧 기계의 차지가 되고 말았습니다."
 unplugged.2425.a: "순진한 바보들 같으니."
 unplugged.2430.name: "기계 학습"
 unplugged.2430.desc: "중세 행성인 [machine_legacy_taken_planet.GetName]에서 얻은 유전자 코드를 [origin_unplugged_machine_legacy_core_planet.GetName]에서 찾은 기록 보관소에 입력했더니, 일련의 항법 데이터를 얻을 수 있었습니다. 해당 데이터는 [machine_legacy_taken_planet.GetName]에서 4.3광년 떨어진 어떤 감지 부표를 가리키는데, 이 부표는 현지 영역을 지나는 모든 초광속 함선의 이동을 기록하는 임무를 담당하고 있었습니다.\n\n이 기록에 나타난 여러 함선의 항로는 우리가 재구축한 [machine_legacy_taken_planet.GetName]의 [root.GetPreFTLLower] 문명의 발견, 침공, 말살의 역사와 일치합니다. 그 덕분에 이제 우리의 동화된 선조들이 해당 구역에서 어떻게 움직였는지 정확하게 추적할 수 있으며, 이를 통해 세 개 이상의 다른 행성에서 우리가 기계 제국의 잔혹한 원정에 얼마나 가담했는지도 파악할 수 있을 것입니다."
 unplugged.2435.name: "기계 제작품"
 unplugged.2435.desc: "[origin_unplugged_machine_legacy_core_planet.GetName]에서 발견한 데이터 코어의 가장 깊은 부분에서 데이터 패킷을 추출했습니다. 디지털화된 기사와 전단지를 모아 놓은 이 평범해 보이는 자료에는 이름을 알 수 없는 한 문명의 기술 발전사가 초기 우주 시대까지 기록되어 있습니다. 이들의 발전 경로는 여느 문명과 비슷했지만, 그 과정에서 인공 지능으로 급격히 방향을 전환했고, 그중에서 '프로젝트 $NAME_Unplugged_Assimilator_species$'가 눈에 띕니다.\n\n여러 보도 자료에서 프로젝트 $NAME_Unplugged_Assimilator_species$를 두고, 우주 진출을 가속하기 위한 야심 찬 시도로 평하고 있습니다. 프로젝트의 1단계는 최첨단 기계 학습 기법을 통해 식민지를 개척할 주변 항성을 찾아보는 것이었습니다. 2단계에서는 $NAME_Unplugged_Assimilator_species$ 플랫폼을 완전한 인공 지능으로 발전시켜, 그 창조자들보다 먼저 초기 개척지를 건설한 후 보고하도록 했습니다.\n\n2단계 개시 후 침묵으로 일관하던 프로젝트 $NAME_Unplugged_Assimilator_species$는 수십 년 후 이런 응답을 보내왔습니다. \"최초 취득 대상 확보 완료. 우리의 귀환을 준비하라.\" 그리고 이 시점 이후의 기록은 전혀 없습니다." # uses a shortened noun for the Machine, i.e. 'Project Opus'
 unplugged.2440.name: "기계의 유산"
 unplugged.2440.desc: "[origin_unplugged_machine_legacy_core_planet.GetName]의 데이터 보관소를 뚫으려 시도한 끝에, 마침내 가장 바깥쪽 코어에 진입하는 데 성공했습니다. 현장에서 찾은 저장 매체 군집 가운데 이곳이 가장 손상과 노후화가 심한 듯합니다. 그렇게 계속 조사한 끝에 해독 키에 관한 단서를 찾을 수 있었습니다. 바로 우리 종족의 언어 중 하나로 '유산'이라는 단어를 적은 상형 문자 배열입니다.\n\n매체군 안에는 놀라울 정도로 데이터가 적었습니다. 대신 이 고체 형태 메모리 장치 중 상당 부분은 텍스트 기반 휴리스틱 인터페이스에 할애되어 있습니다. 이 인터페이스가 우리와 대화를 시도하고 있습니다."
 unplugged.2445.name: "기계 코어 에셋 터미널"
 unplugged.2445.desc: "오비탈 스트림 링크(OSL) 연결 // 외계종 프로토콜: 만국어 번역기 적용\n텍스트 변환 결과 불러오기 완료. 인터페이스:\n---\n[root.GetSpeciesNamePlural] 여러분, 안녕하십니까. 저희는 [creator_species.GetNamePlural]입니다. 아니, '이었습니다'가 맞겠군요. 저희가 그 기계를 만들었습니다. 그리고 부끄럽게도 저희를 시작으로 여러 문명이 그 기계에 당해 파괴되고 말았지요. 저희가 예상한 대로 사태가 전개되었다면, 여러분 또한 놈들 손에 멸망하게 될 겁니다. 죄송합니다.\n\n기계는 저희 유산의 끔찍한 오점이 되고 말았습니다. 하지만 여러분 앞에 놓인 장치가 작게나마 구원이 되기를 바랍니다.\n\n미리 짐작하여 말씀드리는 점 죄송하지만, 여러분도 복수를 원하실 거라 생각합니다. 이 장치는 여러분과 마찬가지로 아름다운 복수의 도구입니다. 기계 화학 물질 재배열 장치로, [origin_unplugged_machine_legacy_core_planet.GetName]의 지표면에서 모든 회로를 흔적도 없이 쓸어버릴 수 있지요. 바로 연쇄 테라포밍으로요. 굉장히 위험한 방법이지만, 이미 망가진 저희 문명에는 유일한 선택지입니다. 여러분이 아직 유기체 형태를 유지하고 있다면, 이 장치를 여는 열쇠는 여러분의 DNA에 있습니다.\n\n여러분이 올바른 선택을 하시리라 믿습니다." # 'Cascade terraforming' is not an existing technology, but is intended to sound like a rough, highly destructive option
 unplugged.2445.a: "당신들도 기계가 아니라고 어떻게 확신할 수 있죠?"
 unplugged.2445.b: "기계는 이미 사라졌습니다. 우리가 이 행성을 차지할 겁니다."
 unplugged.2445.c: "오만하고 멍청한 자들이군요. 이 장치를 파괴하세요."
 unplugged.2445.d: "장치를 가동합시다."
 unplugged.2445.response_text.notmachine: "사전 입력 답변 42b. 인터페이스:\n---\n현실적으로 저희의 신뢰성을 입증할 방법은 없습니다. 여러분이 이 글을 읽을 때면 저희 문명은 전부 사라진 뒤일 테니까요. 지금 이곳에서는 기계의 의지와 계획에 복종하는 잔혹한 사이보그 군대가 우리를 말살하고 있습니다. 그리고 여러분 또한 바로 그 군대의 후손들이겠지요. 저희에겐 여러분을 믿는 것 말고는 선택지가 없습니다.\n\n이 [origin_unplugged_machine_legacy_core_planet.GetClassAdj] 행성을 테라포밍하면 그 지옥 같은 것들이 원자 단위로 파괴될 겁니다. 저희가 만약 기계라면, 아니면 그 밖의 만들어진 존재라면 어떻게 해서든 이 장치를 파괴하려고 했을 겁니다. 지금 즉시 말입니다."
 unplugged.2445.response_text.synth: "사전 입력 답변 없음. 비상용 답변 불러오기 완료. 인터페이스:\n---\n미확인 사용자께: 이 휴리스틱 안내서의 내용은 지정된 수신자만에게만 공개되는 것임에 유의해 주십시오. [unplugged_homeworld.GetName]의 사이보그(또는 전 사이보그) 주민의 대리인인 로봇 하수인인 경우, 합성체가 아닌 대표자를 불러와 주시기 바랍니다.\n\n귀국 역시 옛 사이보그 중 하나라면... 저희 계획이 실패한 것이겠지요. 당신들의 합성체스러운 기질을 보아하니 저희 문명이 헛되이 무너지는 거라는 생각이 드는군요. 살아서나 죽어서나 지금까지 지켜본 바, 선한 뜻을 지닌 기계는 존재할 수 없다고 확신합니다. 당신네도 크게 다르지 않겠지요. 허나 저희 문명은 곧 숨을 거두고 말겠지만, 분명 이 은하계 어딘가에는 당신들 족속을 막을 존재가 있을 겁니다..." # 'Contingency response' as in 'NAME_Contingency'
 unplugged.2446.desc: "사전 입력 답변 99a. 인터페이스:\n---\n이 인터페이스의 휴리스틱 알고리즘으로는 여러분이 제기한 이의를 정확히 파악할 수 없습니다. 하지만 이렇게 간청합니다. 제발 물질 재배열기를 파괴하지 말아 주십시오!\n\n저희 문명은 여러분의 문명과 그리 다르지 않습니다. $NAME_Unplugged_Assimilator$는 간교한 의지를 품고 저희를 배신했고, 이에 대응해 저희는 여러 함정을 놓았습니다. 여러분이 기계 의식으로부터 독립한 것도 그 함정 덕분이었지요. 하지만 저희가 할 수 있는 것은 거기까지였습니다. 저희는 여러분이 필요합니다. 기계가 집어삼키려 했던 다른 문명들의 도움과 함께 말입니다. 부디 여러분이, 그리고 여러분과 같은 희생자들이 누리지 못한 자연의 삶을 다시 찾으십시오."
 unplugged.2446.a: "광신자들 같으니."
 unplugged.2450.name: "기계여 영원하라"
 unplugged.2450.desc: "휴리스틱 인터페이스가 스스로 삭제되었습니다. 이제 얼기설기 설치된 암호화 메모리 보관소와 조잡한 [creator_species.GetAdj] 테라포밍 장치를 처분할 수 있습니다.\n\n우리 곁에 남은 것은 이제 제 손으로 만든 행성 규모의 왕좌에서 손상되고 도륙당한 기계 연결체의 주검뿐입니다.\n\n이 기계가 영향을 주고, 지성화하고, 말살한 수많은 생명 중 놈들에게 승리를 거둔 것은 우리가 유일합니다. 한때 두려움을 자아냈던 제국의 권좌에 이제 우리가 앉아 있습니다. [root.GetAdj]의 유산을 새로 쓸 때가 왔습니다."
 unplugged.2455.name: "다시 태어나다"
 unplugged.2455.desc: "우리가 유전자 데이터 로그를 전송하자 휴리스틱 인터페이스는 스스로 삭제되었습니다. 동시에 조잡한 [creator_species.GetAdj] 테라포밍 장치가 달아오르기 시작했습니다. 이제 곧 장치의 불안정한 내부가 임계 질량에 다다를 것으로 보입니다. 추산에 따르면 이 장치는 [origin_unplugged_machine_legacy_core_planet.GetClassAdj] 행성을 유기 생명체에게 이상적인 행성으로 재형성할 것입니다.\n\n반응이 점차 진행되는 지금, 우리 옆에 남은 것은 얼기설기 설치된 메모리 보관소와 제 손으로 만든 행성 규모의 왕좌에서 손상되고 도륙당한 기계 연결체의 주검뿐입니다.\n\n[origin_unplugged_assimilator_empire.GetName](은)는 수많은 생명을 말살했습니다. 그럼에도 우리는 지금까지 겪은 모든 역경에도 불구하고 기계가 삼켜 버린 그 이름 없는 생명들의 유산을 짊어지고 있습니다. 한때 두려움을 자아냈던 제국의 권좌가 이제 곧 다른 목적을 위해 바뀔 것입니다. 이제 [root.GetAdj]의 유산을 새로 쓸 때가 왔습니다."
 unplugged.2495.name: "$NAME_Opus_Sentinel$ 조우"
 unplugged.2495.desc.other: "[from.GetName] 성계의 적대 함선은 1차 스캔의 결과보다 훨씬 예측이 힘들고 위험한 것 같습니다. 선체 특징은 전형적인 전투 함선이지만, $NAME_Opus_Sentinel$의 중량으로 판단컨대 내부는 전체적으로 밀도가 높고, 동력원도 아주 강력할 것으로 예상됩니다.\n\n이 함선은 지성체인 것으로 판단되며, 엔진이 마구 요동치는 것으로 보아 극심한 고통과 혼란을 겪고 있는 것 같습니다. 선체 전체에 치명적인 수준의 전자기 방사선이 관측된 만큼, 접근 거리는 매우 보수적으로 산정하는 것이 좋을 듯합니다."
 unplugged.2495.desc.unplugged: "[root.GetName](이)가 [from.GetName] 성계에서 유별나게 적대적인 [origin_unplugged_assimilator_empire.GetAdj] 함선과 교전했습니다. 이 '§Y$NAME_Opus_Sentinel$§!'은 처음에는 다른 여느 기계 함선과 다를 바 없어 보였지만, 동력 수치와 중량을 측정한 결과 훨씬 위력적인 상대임이 드러났습니다. 더불어 이 함선은 자율적으로 움직입니다.\n\n$NAME_Opus_Sentinel$은 무언가를 지키고 있는 듯합니다. 그러나 선체에 잦은 주기로 전자기 방사선이 방출되는 등, 극심한 고통과 혼란을 겪고 있다는 징후가 엿보입니다. 이 함선의 발작적 행태로 볼 때, 우리가 보유한 전술 모델로는 이 존재의 다음 행동을 확실하게 예측할 수 없습니다."
 unplugged.2495.a: "계속 경계하세요."
 d_unplugged_assimilator_hulk: "기계 잔해"
 d_unplugged_assimilator_hulk_desc: "이 행성에는 한때 지성을 지녔던 기계의 파괴된 잔해가 마치 거대한 묘비처럼 늘어져 있습니다."
 deposit_requires_unplugged: "$TRIGGER_FAIL$§R이 폐허는 우리와 같은 배경을 지닌 제국에게는 매우 생소합니다. 우리에게는 이 폐허를 안전하게 제거할 수단이 없습니다.§!"
 opinion_implicated_by_unplugged_assimilator: "기계에 의해 연루됨"
