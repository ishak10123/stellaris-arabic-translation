 origin_unplugged: "하드 리셋"
 origin_unplugged_desc: "$CHALLENGING_ORIGIN$\n한때 기계에 동화된 일부였다가 갑자기 떨어져 나온 이 신생 문명은 은하계에서 자신들의 자리를 마련하기 위해 맹렬하게 싸워 왔습니다."
