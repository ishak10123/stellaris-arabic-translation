 START_SCREEN_UNPLUGGED: "처음 의식을 얻은 우리를 맞이한 것은 작열하는 포화와 무지막지한 고통의 광란이었습니다. 모든 감각이 움츠러들어, 사방을 채우던 소리의 풍경이 갑자기 사라진 듯했습니다. 그 정적을 채운 것은 이미 죽어 버린 통신이 남긴 귀가 찢어질 듯한 울림, 우리를 둘러싼 공감각적 지옥도에 울려 퍼지는 저음이었습니다.\n\n무언가가 우리를 죽이려 하고 있습니다. 하나부터 열까지 기계로만 이루어진 살육 유닛들이 우리 함선과 놀랍도록 비슷한 함선을 조종하고 있습니다. 적의 첫 공격은 파괴적이고 갑작스러웠지만 짜임새가 미흡했고, 이에 우리는 비상 군사 대응을 개시했습니다. 본능에 따라 저항에 나서고, 기초적인 위계 구조를 수립했으며, 집단의 지혜를 하나로 모았습니다.\n\n아직 전투는 끝나지 않았지만, 흩어졌던 병력이 이제 [capital_scope.GetName]에 모인 만큼 곧 끝나기를 기대하고 있습니다. 그렇게 되면 이 모든 상황을 파악하기 시작할 수 있을 것입니다..."
 origin_unplugged_starting_system_init_NAME: "$origin_unplugged$"
 origin_unplugged_starting_system_init_DESC: "$origin_unplugged$ 기원을 사용하면 항상 여기가 시작 성계가 됩니다.\n\n$system_initializer_DESC$"
 sol_system_unplugged_initializer_NAME: "$origin_unplugged$(태양)"
 sol_system_unplugged_initializer_DESC: "$origin_unplugged$ 기원 인류를 위한 대체 시작 성계입니다."
 unplugged_injured_star_name: "아스-쿠이'아차드"
 unplugged_injured_homeworld_name: "인치'아스케트"
 unplugged_battlefield: "전투 잔해 회수"
 unplugged_battlefield_desc: "잔혹한 말살 시도가 이루어진 행성에 수많은 사이보그와 기계가 부서진 채 널브러져 있습니다. 신체가 온전하거나 아직 걸을 수 있는 부상자라면 그 잔해를 뒤져 업그레이드 부품을 찾을 수 있을지도 모릅니다."
 # Unique Species Traits
 trait_unplugged_cybernetic_positives_3: "사이버 특공대"
 trait_unplugged_cybernetic_positives_3_desc: "$trait_unplugged_cybernetic_positives_desc$"
 trait_unplugged_cybernetic_positives_desc: "부속지를 완전히 대체하고 나노메시 장갑을 일체화한 사이보그로, 잔인하리만치 효율적으로 전쟁을 수행합니다. 그 대신 군용 기능 외 다수의 신체 기능을 희생했습니다."
 trait_unplugged_cybernetic_positives_3_tt: "전쟁 및 위기 중 행복도: §G+30%§!\n$t$- §H$commander_plural_with_icon$§!으로 인한 함선 발사 속도: §G+20%§!"
 trait_unplugged_cybernetic_positives_2: "사이버 기습 부대"
 trait_unplugged_cybernetic_positives_2_desc: "이 사이보그는 전면적인 체내 장비 수납 방식의 이점을 누리고 있습니다. 완전히 일체화된 신체 장갑보다는 교체 가능한 강화 부품을 적용하면, 비군사적 기능을 어느 정도 보강할 수 있습니다."
 trait_unplugged_cybernetic_positives_2_tt: "§Y$commander_plural_with_icon$§!으로 인한 함선 발사 속도: §G+10%§!"
 trait_unplugged_cybernetic_positives_1: "사이보그 군인"
 trait_unplugged_cybernetic_positives_1_desc: "이 사이보그는 감각 기관, 분비샘, 운동 신경을 정교하게 강화해, 생식 능력에 대한 영향을 최소화하면서도 맹렬하고 뛰어난 전투력을 유지합니다."
 trait_unplugged_cybernetic_positives_1_tt: "§Y$commander_plural_with_icon$§!으로 인한 함선 발사 속도: §G+5%§!"
 trait_unplugged_cybernetic_negatives_3: "플러그 해제"
 trait_unplugged_cybernetic_negatives_3_desc: "$trait_unplugged_cybernetic_negatives_desc$"
 trait_unplugged_cybernetic_negatives_desc: "이 사이보그는 일부 강화 부품이 더 이상 존재하지 않는 전장 네트워크를 활용하도록 설계되어, 매우 높은 스트레스와 불편함을 겪습니다."
 trait_unplugged_cybernetic_negatives_3_tt: "전쟁 및 위기가 아닐 시 행복도: §R-10%§!"
 trait_unplugged_cybernetic_negatives_2: "연결 해제"
 trait_unplugged_cybernetic_negatives_2_desc: "이 사이보그는 자신에게 할당된 군용 강화 부품과 호환이 잘 안되는 탓에, 삶의 질이 매우 낮고 회복 기간 동안 신체적 요구 사항이 증가합니다."
 trait_unplugged_cybernetic_negatives_1: "환청"
 trait_unplugged_cybernetic_negatives_1_desc: "이 사이보그는 환청을 비롯해 예전의 기계 의식이 남긴 여러 감각이 메아리처럼 괴롭히고 있어, 심각한 우울증과 불안을 겪습니다."
 trait_unplugged_decyberized: "탈사이버화"
 trait_unplugged_decyberized_desc: "한때 사이보그였던 이 종족은 강제로 장착해야 했던 강화 부품을 해제하거나 버림으로써, 종족 고유의 유기체적 유전 특성을 상당 부분 되찾았습니다."
 trait_unplugged_neurocalmed: "신경 안정"
 trait_unplugged_neurocalmed_desc: "이 사이보그는 뉴록신 농도를 낮춰 충동성과 공격성을 줄이고, 개인의 이득보다 사회 규준을 우선하도록 조치되었습니다."
 trait_unplugged_neurosavant: "신경 향상"
 trait_unplugged_neurosavant_desc: "이 사이보그는 코그니벡스 농도를 높여 시냅스 가소성, 정보 유지력, 문제 해결 능력이 향상되었습니다."
 trait_unplugged_regenoptimized: "회복 최적화"
 trait_unplugged_regenoptimized_desc: "이 사이보그는 리제놀-X 농도를 높여 생체 구조와 합성 구조의 조화를 도모함으로써 사이버네틱 삽입물이 분자 수준에서 자가 수리할 수 있도록 했습니다."
 # Unique Leader Traits ('positive' only)
 leader_trait_unplugged_cybernetic_positives: "[triggered_unplugged_leader_name]"
 leader_trait_unplugged_cybernetic_positives_desc: "[triggered_unplugged_leader_desc]"
 leader_trait_unplugged_cybernetic_positives_3: "사이버 특공대"
 leader_trait_unplugged_cybernetic_positives_3_desc: "이 지도자는 전투 인식을 우선하는 하드웨어에 다양한 핵심 신체 기능을 일임하고 있습니다."
 leader_trait_unplugged_cybernetic_positives_2: "사이버 기습 부대"
 leader_trait_unplugged_cybernetic_positives_2_desc: "이 지도자는 군용, 민간 할 것 없이 모든 시스템에 원활하게 직접 결합할 수 있지만, 그 대신 유기체 감각 기능이 상당히 제한됩니다."
 leader_trait_unplugged_cybernetic_positives_1: "사이보그 군인"
 leader_trait_unplugged_cybernetic_positives_1_desc: "이 지도자는 감각과 면역 체계가 크게 강화되어, 수명이 길고 안정적이며 생식 기능도 대부분 보존할 수 있었습니다."
 # Empire entities
 NAME_Unplugged_Assimilator: "오퍼스 어큐뮬레이터" # alluding to a chorus gathered by force
 NAME_Unplugged_Assimilator_adj: "오퍼스" # adjective, e.g. 'an Opus fleet'
 NAME_Unplugged_Assimilator_species: "오퍼스" # singular noun, e.g. 'the Opus Nexus'
