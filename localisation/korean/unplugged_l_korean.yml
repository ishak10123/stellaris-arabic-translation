 unplugged.3000.name: "정체성 도입" # intentionally abstract - 'how we embody ourselves' - referring to the accompanying Situation
 unplugged.3000.desc: "우리 [root.GetSpeciesNamePlural](은)는 기계의 집단의식에서 벗어나는 순간부터 분란의 중심에 있었습니다. 하지만 평화와 안식의 때에도, 그래서 홀로 생각에 잠길 때에도, 우리는 우리 몸에 강제로 부착된 이 놀랍지만 고통스러운 삽입물과의 내적인 갈등에 직면합니다.\n\n그 어떤 싸움보다 내밀한 이 내적 갈등은 이미 우리 사회 전체에 좋든 싫든 영향을 미치기 시작하고 있습니다. 이에 우리는 [root.GetName](이)가 성장하는 동안 모든 [root.GetSpeciesNamePlural]의 생애를 살펴볼 것입니다. 이러한 종합 연구를 통해 소위 '탈사이버화' 경향 및 증강 확대 경향을 파악하고, 현재 신체 형태에 대한 유지 또는 개선에 대한 여론을 진단할 것입니다."
 unplugged.3000.a: "면밀히 살펴보되, 너무 서두르지는 맙시다."
 unplugged.3000.b: "현재에 안주해서는 안 됩니다. 신속하고 단호하게 움직입시다."
 unplugged.3000.c: "모든 주장에 마음을 열어야 합니다."
 unplugged.3005.name: "하나의 정신"
 unplugged.3005.desc: "우리 신체 형태에 대한 [owner.GetAdj]의 인식을 종합적으로 관측한 결과, 우리 종족이 바야흐로 안정기에 진입한 듯합니다. 우리 신체에 관한 정책 결정, 사회적 담론, 그리고 첨단 연구의 복잡한 상호 작용을 통해 일정한 여론이 형성된 것입니다.\n\n겉으로 나타난 이러한 조화가 얼마나 오래갈지는 아직 알 수 없지만, 우리가 처한 상황이나 정부 유형에 급격한 변화가 없는 한 [owner.GetSpeciesNamePlural](은)는 우리의 정체성과 모습에 관해 일치된 입장을 지닐 것입니다."
 unplugged.3005.a: "이 논의를 더욱 정치적으로 만들어야겠군요."
 unplugged.3005.b: "예상대로군요."
 unplugged.3005.c: "반대하세요."
 unplugged.3010.name: "여론 분열"
 unplugged.3010.desc: "우리의 신체 형태에 대한 [owner.GetAdj]의 인식을 조사하는 과정에서, 우리가 문화적 격동기에 돌입했음을 알 수 있었습니다. 우리 신체에 관한 정책 결정, 사회적 담론, 그리고 첨단 연구의 복잡한 상호 작용을 통해 여론이 크게 요동치면서, 도심지를 중심으로 열띤 시위와 논쟁이 벌어지고 있습니다.\n\n이러한 격론이 직접적인 폭력이나 소요 사태로 이어진 사례는 드물며, 사실 일부 시민은 우리 사회에서 이처럼 다양한 목소리가 허락됨에 자부심을 드러내고 있습니다. 그러나 [owner.GetSpeciesNamePlural] 종족이 분열되어 있으며, 우리 문화권의 자기 정체성에 대한 관념이 그 어느 때보다 연약하다는 점 또한 분명합니다."
 unplugged.3010.a: "더 원활한 논의를 위한 장을 찾아야겠군요."
 unplugged.3090.name: "우리는 [owner.GetSpeciesNamePlural]" # e.g. 'We, the Neo-Humans'
 unplugged.3090.desc: "\"더도 말고 덜도 말고 지금 모습을 인정하자.\"\n\n이 표어는 우리 사회가 신체 정체성과 씨름하는 과정에서 나타난, 단순하면서도 이목을 끄는 여러 캐치프레이즈 중 하나입니다. 우리는 한때 자아에 관해 지녔던 의심과 두려움, 그리고 불가능한 열망으로부터 벗어나, 이제는 자유를 정당하게 주장할 수 있습니다.\n\n은하계 외계종들도 있는 그대로의 모습을 인정해 줘야 할지는 다른 문제이지만, 적어도 국내에서 [owner.GetSpeciesName] 시민들은 자신의 신체 형태에 만족하는 것으로 보이며, 그렇게 우리는 자기실현을 향해 나아가고 있습니다."
 unplugged.3100.name: "제거의 근거"
 unplugged.3100.desc: "우리의 기계적 측면과 거리를 두기 위해 더 노력을 기울여야 한다고 생각하는 [root.GetSpeciesNamePlural]의 수가 늘어나고 있습니다. 우리 신체에 강제된 증강 삽입물을 제한하거나 아예 금지해야 한다는 것입니다.\n\n대중은 지금의 상황을 나라의 위기로 여기고 있으며, 이 문제에 대한 해법을 찾음으로써 국제 무대에서의 평판을 높이는 동시에 깊은 치욕과 비정상적인 신체 형태로 매일 고통받는 많은 [root.GetSpeciesNamePlural]들을 지원할 것을 요구하고 있습니다."
 unplugged.3100.a: "말이 되는 소리를 하세요."
 unplugged.3100.b: "반드시 그렇게 하겠습니다."
 unplugged.3105.name: "탈사이버화를 위한 돌파구"
 unplugged.3105.desc: "[target.GetName]의 '탈사이버화' 운동에 전념하는 한 민간 연구소의 연구원들이 획기적인 연구 결과를 발표했습니다. 우리 신체에 접합된 나노메시 장갑과 관련 필수 증강물을 제거할 수 있는 기법을 개발했다는 것입니다.\n\n[target.GetSpeciesNamePlural](은)는 세대를 불문하고 자신의 신체 형태가 거북하고 위압적이라 여기며 고통 속에 살아왔습니다. 강화 시술을 받은 우리에게는 필수 생명 기능 중 대다수에 이러한 합성 피부가 없어서는 안 될 요소가 되었기 때문입니다. 그러나 이제 이 메시 피부를 우리가 자체 개발한 피부 증강물로 교체할 수 있게 되었습니다. 이 증강물은 유기물인 [target.GetSpeciesAdj]의 진짜 피부를 절묘하게 접목한 제품입니다."
 unplugged.3105.a: "그 장갑 피부 덕분에 대대로 안전할 수 있었습니다. 그대로 둡시다."
 unplugged.3106.desc: "[target.GetName]의 탈사이버화를 위한 노력이 또 다른 돌파구를 이룩해 내면서, 의료 시설들이 획기적인 새로운 형태의 수술을 확대 보급할 것을 청원하고 있습니다. 현재 [target.GetSpeciesNamePlural]들은 새로 태어난 개체조차 생체 기계에 의존해야 하는 탓에 다수의 모듈식 재활용 증강물을 장착해야 하는데, 전문가들이 이러한 특성을 우회하는 방법을 찾았다는 것입니다.\n\n이 시술은 학제 간 검토 위원회를 통해 이미 검증을 마쳤으며, 나아가 위원회는 기존의 모듈식 무기 삽입구를 제거할 경우 그런 외계 증강물을 정비하는 데 드는 경제적 부담 또한 줄어들 것으로 보고 있습니다."
 unplugged.3106.a: "거절합니다. 그 모듈 덕분에 우리가 전장에서 우위를 점할 수 있는 겁니다."
 unplugged.3107.desc: "많은 [target.GetSpeciesName]들이 꿈꾸던 일이 드디어 실현을 앞두고 있습니다. 연구원들이 마침내 우리의 유기체 신경계를 활성화하고 복구하는 방법을 찾아낸 것입니다. 유전자 치료와 펌웨어 해킹을 새롭게 조합한 결과, 시험 참가자들이 증강 신경 우회가 아니라 자기 자신의 운동 반사 신경을 사용해 문제없이 생활할 수 있게 되었다고 합니다. 그뿐만이 아니라, 예비 연구 결과 이 치료법을 적용하면 우리가 기계 의식으로부터 분리된 후 겪어 왔던 다양한 감각 환영이 줄어들거나 없어질 것으로 보입니다."
 unplugged.3107.a: "아직 우리한테는 강화된 반사 신경이 필요할지 모릅니다."
 unplugged.3110.name: "기계 조화"
 unplugged.3110.desc: "증강 삽입물에 대한 제어권을 되찾아 주는 사업을 진행하던 한 민간 연구 팀이 [origin_unplugged_assimilator_empire.GetAdj]의 무선 네트워크를 대체하는 방법을 알았습니다. 이 네트워크는 과거에 우리의 증강물 전체를 동기화하는 역할을 담당했는데, 이것이 사라지자 장치 신호를 찾을 수 없게 되는 바람에 [target.GetSpeciesNamePlural]들이 계속되는 짜증과 고통을 겪어야 했던 것입니다. 이 대체 네트워크는 [origin_unplugged_assimilator_empire.GetSpeciesAdj] 연결체를 모델로 삼는 만큼 중앙에 대한 집중도가 높습니다. 하지만 예전 기계와는 달리 안전하게 우리 [target.GetName] 국민들의 이익에 보탬이 될 것입니다. 1차 시험 결과, 참가자들에게서 능률 증가와 편안함, 그리고 열락에 가까운 안도감이 관측되었습니다."
 unplugged.3110.a: "우리는 다시는 기계의 노예가 되지 않을 겁니다."
 unplugged.3111.desc: "우리 증강 삽입물에 대한 제어권을 확대하려는 노력이 사이버네틱 수술 분야에서 결실을 거두었습니다. 의료 [target.GetScientistPlural]들로 이루어진 한 팀이 우리 신체의 모듈식 인터페이스에서 특정한 하위 기계 요소를 분리하는 데 성공한 것입니다. 이 요소는 바로 부속지, 무기 탑재 장치, 신체 프레임을 쉽게 교체할 수 있게 하는 역할을 합니다. 이번 업적으로 기존 신체에 새로운 삽입물을 장착하고 새로 태어난 [target.GetSpeciesNamePlural]에게는 맞춤형 인터페이스를 설치할 수 있게 됨에 따라, 고철에서 회수한 [origin_unplugged_assimilator_empire.GetAdj] 장비로 어설프게 수리하던 방식에서 드디어 벗어날 수 있을 것입니다."
 unplugged.3111.a: "이건 도가 지나친 것 같군요."
 unplugged.3112.desc: "이제 우리 몸의 증강 삽입물을 완전히 정복하는 순간이 가시권에 들어섰습니다. 감각 환영을 치료하는 획기적인 방법을 드디어 개발한 것입니다. 우리가 기계 이식에서 분리된 후로 [target.GetSpeciesNamePlural] 중 절대다수가 불안과 우울에 시달렸습니다. 이제는 더 이상 들리지 않는 합일의 노래를 무의식적으로 추구한 탓입니다. 하지만 이제는 기계 의식의 인지 파장을 모방하지만 네트워크에 연결되지 않는 보조 삽입물을 통해 그 갈망을 억누를 수 있게 되었습니다."
 unplugged.3112.a: "또다시 기계 의식이 된 척 살아간다고요? 말도 안 됩니다."
 unplugged.3115.name: "환경성 이상 신체"
 unplugged.3115.desc: "사이버네틱 문제에 대한 대응 방식에 관해 다양한 의견이 엇갈리면서 [target.GetAdj] 사회의 주변부에 긴장이 불거지고 있습니다.\n\n하지만 대다수 시민에게 이번 논쟁은 이미 훨씬 조용하고 은근한 논의로 잦아들었습니다. 많은 [target.GetSpeciesNamePlural]들이 증강물을 자기만의 방식으로 숨기거나 드러냄으로써 외적인 측면에서 만족을 찾고 있습니다. 이러한 임시방편으로 진정한 만족을 얻었다는 [target.GetSpeciesNamePlural]들은 극소수이지만, 이들을 비롯해 삽입물을 마지못해 받아들이는 새로운 추세가 생겨나고 있습니다.\n\n[target.GetName](이)가 무감각과 불편함에 적응하는 법을 배우고 있다 해도 과언이 아닐 겁니다."
 unplugged.3115.a: "알겠습니다."
 unplugged.3116.name: "현상 유지"
 unplugged.3116.desc: "[target.capital_scope.GetName]의 여러 지방 당국이 대대적인 시위와 비폭력 시민 불복종 운동의 증가를 보고했습니다. 각 시위와 활동은 적절한 시기와 방법에 따라 감시하거나 대응했으며, 온 국민이 우려할 만한 일은 아직 일어나지 않았습니다. 그러나 해당 사건이 모두 사이버네틱 정책과 관련되어 있어, 우리의 현재 상태를 유지하고자 하는 국민의 저항에 부딪히고 있습니다.\n\n[target.GetName] 국민에게 '현상 유지' 이데올로기는 단순히 가만히 있는 것을 의미하지 않는 것 같습니다. 적지 않은 [target.GetSpeciesNamePlural]들이 증강물을 '더 이상 건드리는 것에' 반대하는 운동을 적극적으로 전개하고 있습니다."
 unplugged.3116.a: "알겠습니다."
 unplugged.3117.name: "안정 상태"
 unplugged.3117.desc: "일부 [target.GetSpeciesNamePlural]들이 계속해서 정부가 사이버네틱 증강물 문제에 대응하지 않고 있다고 비판하는 반면, 전반적인 여론은 보다 침착한 방향으로 형성되고 있습니다. 실용적 성향의 국민들이 단체를 결성해 경제 지원과 상담이 필요한 이들을 돕고 있습니다. 한편, 각종 의료 시설은 국민들에게 꼭 필요한 재활용 부품을 유통하기 위해 새로운 공급 사슬을 구축하기 시작했습니다.\n\n그렇게 느리지만 확실하게, 우리 사회는 우리에게 강제된 신체 형태와 우리가 맞닥뜨렸던 상황을 받아들이고 있습니다. 아직 할 일이 너무나 많지만, 지금의 모습을 받아들임으로써 희미하게나마 희망을 찾을 수 있다는 느낌이 듭니다."
 unplugged.3117.a: "어쨌든 결론은 났군요."
 unplugged.3205.name: "공포의 유산"
 unplugged.3205.desc: "최근 [fromfrom.GetName](과)와 나눈 불편한 대화를 통해 불편한 진실이 드러났다고 생각하는 [root.GetSpeciesNamePlural]들이 늘어나고 있습니다. 우리가 [origin_unplugged_assimilator_empire.GetName]에서 갈라져 나왔을 당시, 다른 이들이 우리를 두려워하고 있었다는 사실 말입니다. 이 두려움은 우리의 행동이 아닌 기계로부터 비롯된 것입니다. 우리 행동으로 인한 게 아닌 물려받은 특성이기 때문에 우리로서는 어찌 할 방도가 없을 듯합니다." # fromfrom = pre-FTL country
 unplugged.3206.desc: "전쟁에 찢겨 황폐해진 [fromfrom.GetName]의 모습이 우리의 불편한 진실을 보여 준다고 생각하는 [root.GetSpeciesNamePlural]들이 늘어나고 있습니다. 바로 우리 스스로도 어쩔 수 없는 이유로 다른 이들이 우리를 두려워하고 있다는 사실 말입니다.\n\n우리의 외형은 남들에게 죽음의 공포를 불러일으키기 때문에 다른 종족과는 원만한 외교를 펼치기가 어렵습니다. 게다가 우리의 끔찍한 악명은 이미 널리 퍼져 있을지도 모릅니다. 대부분이 우리를 [root.GetSpeciesNamePlural](으)로 대하기보다 지난 기계 시절에 우리가 보인 잔혹함만을 생각하기 때문입니다." # fromfrom = other empire
 unplugged.3205.a: "당연히 우리를 두려워해야 마땅하죠."
 unplugged.3205.b: "이래서는 안 됩니다."
 unplugged.3250.name: "기계에 대한 공포"
 unplugged.3250.desc: "우리가 기계 지능과 외교 관계를 맺었다는 소식에 정부 공직자들이 몹시 충격을 받고 있습니다. 아무도 [fromfrom.GetName]에 직접 불쾌감을 드러내지는 않았으나, 벌써 상대가 우리 내정에 개입할 것이라 여기며 선제적으로 제재하고 대응하자는 제안서를 작성하고 있습니다.\n\n하지만 이 상황에 기대감을 나타내는 [root.GetSpeciesNamePlural]들도 있습니다. 이러한 반응이 진정한 외계종 선호 성향의 발현으로 인해 나온 것인지, 아니면 우리 자신의 기계적 요소에 대한 실용적인 인정에서 비롯된 것인지는 모르겠지만, 우리가 더 자애로운 기계 지능의 사례로부터 배울 것이 있다는 점은 고무적이라고 할 수 있습니다."
 unplugged.3255.name: "과거에 대한 공포"
 unplugged.3255.desc: "우리가 [origin_unplugged_assimilator_empire.GetName](과)와 유사한 기계와 조우했다는 소식이 들리자, 우리 외교계가 충격에 빠졌습니다. 그 자리에 직접 참여한 자들은 끝까지 평정심을 유지했고, 아직 [fromfrom.GetName]에 별다른 약점이나 공포심을 내비친 적은 없습니다. 그러나 우리의 집단적 의식과 사기가 중대한 난관에 직면해 있다는 것만큼은 사실입니다.\n\n이미 군 장성들을 대상으로 국경을 지키라는 일급비밀 지령이 내려졌습니다. 그러나 이 조우 소식을 계속 감추기는 매우 어려울 것입니다. 정부 일각에서는 [root.GetAdj] 주민들에게 이 사실을 알려, 각자 자유롭게 의견을 표명하게 해야 하는 것이 아니냐는 질문을 제기하고 있습니다."
 pre_ftl_remains_site: "망가진 요람"
 pre_ftl_remains_site_desc: "[From.Planet.GetName] 행성의 지표면은 체계적인 말살로 인한 상흔을 간직하고 있습니다. 자연은 불타고, 도시는 무너졌으며, 섬뜩한 침묵이 감돕니다. 1차 스캔 결과, 이곳에는 한때 초광석 이전 단계의 사회가 번성하고 있었으나 모종의 원인으로 찾아온 재앙에 멸망하고 말았습니다. 산산이 흩어진 폐허는 말로 표현할 수 없는 공포를 속삭이고 있습니다."
 unplugged.3300.name: "투쟁의 흔적"
 unplugged.3300.desc.unplugged: "1차 조사 결과, [From.Planet.GetName](은)는 철저히 부서진 상태였습니다. 거주지는 무너졌고, 도로에는 버려진 소지품이 널려 있으며, 구조물은 초광속 이전 사회에서는 만들어 낼 수조차 없었을 열에 그을린 상태였습니다. 이 행성에 찾아온 재앙은 신속하게, 의식적으로 파괴를 자행했습니다.\n\n그 정밀함으로 볼 때 조직적 공습에 의한 파괴였던 것으로 보입니다. 시체는 확인되지 않지만, 증거를 볼 때 결론은 명확합니다. 주민들은 몸을 피했지만, 멀리 가지는 못했을 것입니다."
 unplugged.3300.a: "충격적이군요."
 unplugged.3305.name: "잔류 기계"
 unplugged.3305.desc.unplugged: "발굴을 더 깊이 진행하자, 이곳에서 벌어진 분쟁의 성격을 더 자세히 파악할 수 있었습니다. 폐허 곳곳에 녹아 버린 기계의 껍데기가 흩어져 있습니다. 우리 삽입물과 다르지 않은 첨단 사이버네틱 구성체가 보입니다. 무기 또한 우리와 마찬가지로 단순하지 않습니다. 이들은 기계이면서 생체이기도 한 살아 있는 전쟁 도구였습니다. 결론을 내리기에는 아직 이르지만, 우리가 갑작스럽게 '각성'하기 전에 이러한 체계에 속했다는 사실을 생각하면 매우 충격적입니다.\n\n더 기분 나쁜 점은, 얼마 되지 않지만 이 전쟁 기계들에 남아 있는 표식입니다. 보기만 해도 불편한 이 기호들은 침공군이 정복이 아니라 그보다 훨씬 체계적인 목적을 지니고 있었음을 나타냅니다."
 unplugged.3305.a: "답은커녕 질문만 늘어나는군요."
 unplugged.3310.name: "침묵의 신호"
 unplugged.3310.desc.unplugged: "어마어마한 규모의 통신 허브가 요새화된 도시 폐허 아래에 묻혀 있는 것을 발견했습니다. 이 시설은 초광속 이전 사회에서 기대할 수 있는 수준을 넘어섰습니다. 게다가 안테나 배열체의 설계를 보면 이곳이 행성 내 송출이 아닌, 저 머나먼 우주로 신호를 전송하기 위한 시설이었음을 알 수 있습니다.\n\n세심하게 허브를 조사한 결과, 이 장치를 통해 전송된 마지막 메시지를 일부 추출할 수 있었습니다. 왜곡되어 알아듣기 힘들지만, 통신 내용을 들어보니 여러 목소리가 구원을 간청하면서 이 성계 너머의 알 수 없는 좌표에 교신을 시도하고 있습니다. 게다가 메시지마다 목소리가 더욱 다급해집니다. 이 행성을 침공한 자들은 전세가 기울고 있음을 알고서는 저 우주 공간의 무언가, 또는 누군가에게 마지막 희망을 걸었던 것입니다."
 unplugged.3310.a: "계속 진행하세요."
 unplugged.3315.name: "우선순위 변경"
 unplugged.3315.desc.unplugged: "[from.planet.GetName]에서 또 다른 유적을 발견했습니다. 행성의 인구 밀집 지역 밑에 다수의 방대한 지하 공간이 자리 잡고 있었습니다. 이 조잡하고 잔혹한 시설은 사이버네틱 전환 시술을 위해 세워졌지만, 운영 중에 갑자기 방치된 듯합니다. 기계 잔해 속에는 임시변통으로 만든 무기에 파괴되고 구부러진 기계 조각이 흩어져 있습니다.\n\n한 손상된 장치에서 회수한 데이터 조각을 통해, 침공군이 예기치 못한 저항에 직면했음을 확인했습니다. 다수의 부대가 통째로 소실되면서 전투의 우선순위가 변경되기 시작했습니다. 한 기록에서 이 점을 명확하게 알아볼 수 있었습니다.\n\n§H\"저항 용납 불가. 전환 진행 곤란. 허가: 완전 섬멸.\"§!"
 unplugged.3315.a: "여기서 무슨 일이 있었던 거죠?"
 unplugged.3320.name: "반갑지 않은 진실"
 unplugged.3320.desc.unplugged: "폐허 중앙에 부서진 지휘 노드가 있습니다. 안에 있는 로그를 확인하던 중, 끔찍한 최후의 진실이 드러났습니다. 이 행성을 침공한 자들은 바로 우리였습니다.\n\n이곳에서 번성했던 문명, 우리가 멸망시킨 바로 그 문명은 §Y[origin_unplugged_assimilator_empire.GetName]§!의 동화 활동의 표적이었습니다. 그러나 이들이 예상 밖으로 격렬히 저항함에 따라 전환 작업에 지장이 생겼고, 그 결과는 전 행성 섬멸이라는 최종 대응 조치였습니다.\n\n그렇게 도저히 부정할 수 없는 결론이 도출되었습니다. 우리의 각성, 우리가 찾은 자유는 바로 기계의 이해 범위를 벗어날 정도로 격렬히 맞서 싸운 한 문명의 잿더미인 이곳에서 시작되었습니다."
 unplugged.3320.a: "이 문명이 갔던 길을 따릅니다."
 unplugged.3320.b: "이들의 종말이 우리에게는 시작이었군요."
 ######################
 # Political Discourse
 ######################
 unplugged_they_fear_us: "기계에 대한 공포"
 unplugged_they_fear_us_desc: "이 제국은 잔혹한 의욕적 동화자를 섬기던 세력으로, 그 끔찍한 악명은 은하계에 널리 퍼져 있습니다."
 unplugged.4005.name: "할 얘기가 있는데..."
 unplugged.4005.desc: "우리 [root.GetSpeciesNamePlural](이)가 매일 겪고 있는 두려움과 의심, 그리고 희망이 열렬한 정치적 의지로 인해 강도를 더해 가고 있습니다. 국민들은 온갖 쟁점을 두고 서로 모여 수많은 목소리를 내고 있으며, 그중 일부는 [origin_unplugged_assimilator_empire.GetAdj]에 속했던 우리의 과거를 직접 언급하고 있습니다.\n\n우리는 막 태어난 우리 제국을 꾸려 나가는 과정에서 익숙하지 않은 여러 가지 도구를 활용하는 법을 배웠습니다. 이제 남은 질문은 이것입니다. 우리 국민들의 욕망과 의욕을 어느 방향으로 풀어 나가야 할까요?"
 unplugged.4005.a: "느긋하게 토론이나 할 시간이 없습니다!"
 unplugged.4005.tt: "우리 종족의 사이버네틱 향방에 관해 서로 다른 견해를 지닌 세력이 나타날 수 있습니다."
 unplugged.4005.b: "다른 이들의 사례를 탐구해 보면 어떨까요?"
 unplugged.4005.c: "초월자들에게서 답을 구해 봅시다."
 unplugged.4005.d: "느긋하게 토론이나 할 시간이 없습니다!"
 #######################################################
 # Random events following decyberization breakthrough #
 #######################################################
 unplugged.5001.name: "안전장치 발동"
 unplugged.5001.desc: "최근 사이버네틱 부품 제거 부문에 혁신이 이루어짐에 따라 예기치 못한 문제가 나타나고 있습니다. 삽입물 연결 해제 시술을 받은 주민 일부가 극심한 과민증 쇼크를 겪은 것입니다. 소생은 불가능할 것으로 보입니다.\n\n추가 조사를 진행한 결과, 의료 스캔에서 드러나지 않은 백업 부품이 숨겨져 있었습니다. 이 부품이 해제 시술 후 즉시 발동한 것입니다.\n\n우리의 옛 [origin_unplugged_assimilator_empire.GetAdj] 주인들은 자신들의 드론을 완벽하게 통제하기 위해 수단과 방법을 가리지 않았던 것으로 보입니다."
 unplugged.5001.a: "안전장치 제거를 시도하세요."
 unplugged.5001.a.tt1: "환자가 시술로 인해 사망합니다."
 unplugged.5001.a.tt2: "모든 안전장치를 성공적으로 제거합니다."
 unplugged.5001.b: "환자를 안정시키고 연명 치료를 실시하세요."
 unplugged.5001.c: "치료를 중단하세요."
 unplugged.5001.c.tt: "일부 팝이 사망합니다."
 unplugged.5002.name: "신경 차단기 제거"
 unplugged.5002.desc: "사이버네틱 부품 제거 사업을 진행하자, 해당 시술을 받은 모성 주민들 사이에 불신과 반목이 불거졌습니다. 치안 부대를 투입해 폭도 하나를 체포했는데, 후속 조사를 통해 당사자는 개조된 삽입물을 지녔다가 제거 시술을 받은 것으로 드러났습니다.\n\n이 개조 삽입물은 일종의 신경 억제기로, 특정 유전 결함과 연관된 신경증적 경향을 억제하는 역할을 했던 것으로 보입니다. 제거 시술로 억제기가 사라진 것이 이번에 나타난 폭력 행동의 원인이었을 가능성이 있습니다."
 unplugged.5002.a: "폭도를 잡아 가둬야 합니다."
 unplugged.5002.a.tt: "많은 비용을 들여, 다양한 기관에서 폭동에 연루된 자들을 대상으로 치료를 제공합니다."
 unplugged.5002.b: "힘에는 힘으로 대응해야 하는 법이죠."
 unplugged.5002.b.tt: "무장 부대를 출동시켜 폭동을 진압하지만, 부수적 피해와 사상자가 발생합니다."
 unplugged.5002.c: "사소한 소란일 뿐입니다."
 unplugged.5002.c.tt: "집행관을 통해 가용 인력으로 폭동을 진압합니다."
 unplugged.5003.name: "중요 시스템 접속 해제"
 unplugged.5003.desc: "탈사이버화 과정에서 예상 밖의 결과가 나왔습니다. 삽입물을 제거한 행정 담당관을 중요 시스템 인터페이스가 인식하지 못하고 있습니다. 삽입물에 의한 신경 접속이 끊어지자 주요 시스템 접속이 중단된 것인데, 이로 인해 업무에 혼선을 빚고 있습니다."
 unplugged.5003.a: "새 인터페이스를 구축합시다."
 unplugged.5003.a.tt: "요직에 기용 중인 숙련된 기술자들을 차출해 호환성 있는 인터페이스를 개발합니다."
 unplugged.5003.b: "해당 시스템에 해킹을 시도합시다."
 unplugged.5003.b.tt: "해킹 대응 조치가 발동되어 심각한 전력 누수가 발생하지만 접속이 복구됩니다."
 unplugged.5003.c: "리부트 시퀀스를 개시하세요."
 unplugged.5003.c.tt: "데이터 코어 삭제를 진행해 대량의 지식이 사라지고, 자동 안전장치가 발동해 [Root.home_planet.System.GetName] 성계 전역에 있는 연구 기지가 자폭합니다."
 unplugged.5003.d: "별일도 아니군요."
 unplugged.5003.d.tt: "일정 기간 시스템 접속이 제한되어, 항성 기지 운영이 지장을 받습니다."
 unplugged.5004.name: "사이버화 찬성파의 저항"
 unplugged.5004.desc: "사이버네틱 부품 제거 사업이 예기치 못한 저항에 부딪혔습니다.\n\n제거에 반대하는 세력들이 점차 적극적으로 목소리를 내며, 공론장과 각종 소통 창구를 통해 불만을 토로하고 있습니다. 이들은 우리 사회에서 수십 년 동안 필수적인 역할을 한 존재를 제거하는 일과 이 시술로 인한 위험 때문에 탈사이버화 사업 시행에 대한 여론이 크게 변화했다고 주장하고 있습니다."
 unplugged.5004.a: "대대적인 인식 개선 사업에 자금을 투입합시다."
 unplugged.5004.a.tt: "\n여론을 바꾸고 반대 세력의 영향력에 대응하기 위한 종합 홍보 전략을 실시합니다.\n\n여러 팝의 윤리관이 §Y평등주의§!로 전환됩니다."
 unplugged.5004.b: "각 세력 지도자를 투옥하고 설득합시다."
 unplugged.5004.b.tt: "일부 세력 지도자를 공공 부문에서 관리하는 교정 시설에 구금한 뒤 '설득'을 진행합니다.\n\n당사자들의 윤리관이 §Y권위주의§!로 전환됩니다."
 unplugged.5004.c: "개입하지 마세요. 표현의 자유가 우선입니다."
 unplugged.5004.c.tt: "\n정부가 직접 행동에 나서지 않고, 공적 논의가 자연스럽게 이루어지도록 합니다."
 unplugged.5005.name: "감정 조절 칩"
 unplugged.5005.desc: "우리 종족의 생물학적 특성과 해로운 기술 삽입물이 서로 만나 우리 연구자들에게 흔치 않은 기회를 창출해 주었습니다.\n\n삽입물의 혜택과 부작용을 모두 겪은 환자들을 대상으로 하는 새로운 연구 분야가 생긴 것입니다. 바로 뇌 내 화학 물질을 바꾸는 연구입니다.\n\n과학자들은 엄격한 연구를 통해 고도의 '감정 칩'을 개발했습니다. 이 칩은 개인의 행동을 조율해 사회 전체에 도움을 주는데, 적절한 화학 물질을 선택해 원하는 결과에 맞게 두뇌를 개조할 수 있습니다."
 unplugged.5005.a: "뉴록신을 씁시다. 범죄가 줄어들게요."
 unplugged.5005.a.tt: "충동성과 공격성을 줄이는 합성 신경 전달 물질로, 대상자가 개인의 이익보다 사회적 규범을 우선하도록 유도합니다."
 unplugged.5005.b: "리제놀-X가 좋겠군요. 회복력이 빨라질 겁니다."
 unplugged.5005.b.tt: "생체 구조와 합성 구조 사이의 조화를 도모해, 사이버네틱 삽입물이 분자 수준에서 자가 수리할 수 있도록 하는 생체 공학 화합물입니다."
 unplugged.5005.c: "코그니벡스를 쓰세요. 두뇌를 명석하게 만듭시다."
 unplugged.5005.c.tt: "시냅스 가소성, 정보 유지력, 문제 해결 능력을 높이도록 고안된 최첨단 신경 화학 물질입니다."
