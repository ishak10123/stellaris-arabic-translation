 tech_fe_administration_1: "프랙털 행정 절차"
 tech_fe_administration_1_desc: "우리가 첨단 기술을 정복해 나가면, 제국의 행정적 요구 역시 이에 따라 확대될 것입니다. 이제 막 꽃피우고 있는 우리 제국의 행정 수요에 능숙하게 대응해야 합니다."
 tech_fe_administration_2: "양자 행정 절차"
 tech_fe_administration_2_desc: "우리 제국의 기술 수준은 이제 행정에 필요한 수준을 넘어섰습니다. 우리는 은하 제국을 원활하게 통치하는 데 필요한 전문 기술을 충분히 확보했습니다."
