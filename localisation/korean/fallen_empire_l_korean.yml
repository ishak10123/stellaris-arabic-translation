 ### FE Civics
 civic_antediluvian_mind: "연로한 의식"
 civic_antediluvian_mind_desc: "이 게슈탈트 의식은 세월의 흐름을 정통으로 맞았습니다. 시간의 거품 안에 장기간 살다보니 한때는 끝을 모르던 생존 욕망이 무뎌진 것입니다."
 civic_sluggish_drones: "통제받지 않는 드론"
 civic_sluggish_drones_desc: "지배 의식이 긴장의 끈을 풀고 압력을 거의 행사하지 않자, 이 제국의 드론들은 무관심한 듯한 태도로 천천히 작업을 수행하고 있습니다."
 ### FE Buildings
 building_fe: "몰락한 제국 건물"
 building_ancient_control_center: "고대 제어소"
 building_ancient_control_center_desc: "링 월드를 관장하던 고대 제어소로서, 쉬지 않고 일하는 기계 드론 군단 덕분에 겨우 유지되고 있습니다."
 building_ancient_palace: "고대 궁전"
 building_ancient_palace_desc: "이 어마어마한 초거대 시설은 오래전에 지나간 시대의 모습을 보여 주고 있습니다. 광채가 나는 외벽은 시간의 흐름을 거부하고 있지만, 상당수의 건물은 버려진 채 황폐한 모습으로 남아 있습니다."
 building_ancient_hive_capital: "숭상받는 핵"
 building_ancient_hive_capital_desc: "군체의 지배력을 드러내는 이 고대 연결체에서는 셀 수 없을 정도로 수많은 세대에 걸쳐 드론들이 충직하게 지시를 이행해 왔습니다."
 building_affluence_emporium: "풍요 엠포리엄"
 building_affluence_emporium_desc: "이 시설은 첨단 구매 알고리즘으로 물질적 욕구를 예측하고 충족해, 주민들이 자신이 원하는 것을 깨닫기도 전에 만족을 선사합니다."
 building_affluence_center: "풍요 센터"
 building_affluence_center_desc: "이 시설에서는 아무리 말도 안 되는 욕구라도 힘들이지 않고 순식간에 실현할 수 있습니다."
 building_nourishment_complex: "영양 단지"
 building_nourishment_complex_desc: "복제 기술을 이용해, 지시만 내리면 새로운 맛을 빠르게 만들어 냅니다."
 building_nourishment_center: "영양 센터"
 building_nourishment_center_desc: "이 시설 내에서는 상상할 수 있는 어떠한 맛도 재현할 수 있습니다."
 building_dimensional_replicator: "차원 복제소"
 building_dimensional_replicator_desc: "이 제조소는 에너지를 물질로 완벽하게 전환하는 기술을 사용하고 있습니다."
 building_dimensional_fabricator: "차원 제조소"
 building_dimensional_fabricator_desc: "이 첨단 제조소는 차원 공간의 구조를 거침없이 파고들어, 희귀한 자원을 추출합니다."
 building_class_3_singularity: "3등급 특이점"
 building_class_3_singularity_desc: "이 특이점에서 방출되는 에너지를 전부 포획하기란 공학의 기적과도 같은 일입니다."
 building_class_4_singularity: "4등급 특이점"
 building_class_4_singularity_desc: "이 특이점의 에너지 출력은 물리 법칙에 반하는 수준이지만, 억제장으로 흔들림 없는 안정성을 확보하고 있습니다."
 building_micro_forge: "하이퍼 단조장"
 building_micro_forge_desc: "이 단조장에서는 자원 투입 속도가 곧 생산 속도입니다."
 building_nano_forge: "자동 단조장"
 building_nano_forge_desc: "이 단조장에 위치한 방대한 규모의 나노 복제 시설은 경탄이 나올 만큼 효율적으로 원자재를 첨단 합금으로 변환합니다."
 building_fe_sky_dome: "스카이 돔"
 building_fe_sky_dome_desc: "최첨단 반중력 기술로 움직이는 이 부유 도시는 주민들에게 목가적인 안식처를 제공합니다."
 building_fe_dome: "천공의 반구"
 building_fe_dome_desc: "중력 무효화 기술로 부유하는 이 반구형 구조물은 물리적 한계를 초월하며, 첨단 생명 유지 장치로 주민들의 욕구를 원활하게 충족합니다."
 building_fe_fortress: "아스피스 우주 요새"
 building_fe_fortress_desc: "이 초거대 행성 방어 시설은 다수의 무기고와 여러 겹의 보호막을 갖추고 있습니다. 고도로 전문화된 포위 부대가 아니라면 방어가 뚫릴 일은 없을 것입니다."
 building_fe_stronghold: "이지스 복합 방어 시설"
 building_fe_stronghold_desc: "이 기념비적인 행성 방어 시설은 무수한 무기고와 방어막으로 행성을 보호합니다. 행성에 있는 산이 전부 부서진다 해도, 방어 시설만큼은 무너지지 않을 것입니다."
 building_master_archive: "중앙 기록 보관소"
 building_master_archive_desc: "이 보관소는 여러 시대에 걸친 은하계의 지식을 보전하고 있지만, 고대의 지식 회수 시스템을 활용하는 기술은 없어진 상태입니다. 일부 회수한 데이터 조각은 엄청난 가치를 지닌 것으로 드러났습니다."
 building_empyrean_shrine: "천공의 위상 사원"
 building_empyrean_shrine_desc: "오직 장막의 영혼들과 소통하는 데 사용하는 사원으로, 우리 차원에는 그 모습을 일부만 드러내고 있습니다."
 building_ancient_cryo_chamber: "고대 냉동 수면 시설"
 building_ancient_cryo_chamber_desc: "줄줄이 늘어선 냉동 수면 포드가 이 거대 구조물을 가득 채우고 있습니다. 포드에는 오래전에 냉동 수면에 들어가 이미 목숨이 다한 수십억 외계인의 유해가 있습니다."
 building_fe_administration_1: "모든 것을 보는 행정부"
 building_fe_administration_1_desc: "이 막대한 규모의 시설은 은하계를 아우르는 관료 체계에 필수 불가결한 요소로, 방대한 행정망에 연결되어 있습니다."
 building_fe_administration_2: "모든 것을 아는 행정부"
 building_fe_administration_2_desc: "이 막대한 규모의 시설은 은하계를 아우르는 관료 체계의 중심 요소로, 견고하고 고도화된 행정망을 조율하는 역할을 담당합니다."
 building_fe_administration_hive_1: "연접 군집"
 building_fe_administration_hive_1_desc: "고도로 전문화된 드론의 세심한 관리를 받는 이 네트워크는 연접된 노드 군집으로 구성되어 있으며, 방대한 인지 영역에 대한 군체의 장악력을 강화합니다."
 building_fe_administration_hive_2: "연접 축삭"
 building_fe_administration_hive_2_desc: "고도로 전문화된 드론의 세심한 관리를 받는 이 방대한 네트워크는 연접된 노드 군집으로 구성되어 있으며, 은하계에 대한 군체의 의지를 보강하는 역할을 합니다."
 building_fe_administration_machine_1: "프랙털 조율 거점"
 building_fe_administration_machine_1_desc: "수조 개에 이르는 신호를 거의 즉각적으로 정밀하게 처리하고 전송하는 고도화된 프랙털 허브입니다."
 building_fe_administration_machine_2: "양자 조율 거점"
 building_fe_administration_machine_2_desc: "수천조 개에 이르는 신호를 즉각적으로 정밀하게 처리하고 전송하는 첨단 양자 얽힘 허브입니다."
 building_fe_temple_1: "천상의 성소"
 building_fe_temple_1_desc: "형이상학 기술이 극도로 발전하면서, 신도들이 신적 존재와 직접 소통할 수 있게 되었습니다."
 building_fe_temple_2: "천상의 대성당"
 building_fe_temple_2_desc: "형이상학 기술을 사이오닉 설교에 적용해 영적 공명을 증폭합니다. 신도들은 이 거대 단지를 통해 온 시스템에 걸쳐 신적 존재와 밀접하게 소통할 수 있습니다."
 building_fe_assembly_1: "로봇 제조 연결체"
 building_fe_assembly_1_desc: "전문 로봇 기술자들이 근무하는 선도적인 조립 단지로, 기존의 한계를 초월해 로봇 혁신의 최첨단을 실현합니다."
 building_fe_assembly_2: "로봇 양자 생산 허브"
 building_fe_assembly_2_desc: "로봇 공학의 기적이라 할 수 있는 이 시설의 양자 조립 라인은 양자 얽힘 전환 장치를 이용해 기계 부품을 세세한 디테일 하나하나까지 직접 제작합니다. 단 하나의 원자도 잃지 않습니다."
 building_fe_clinic_1: "분자 재활성화 기관"
 building_fe_clinic_1_desc: "분자 재활성화 기관은 세포 내부의 복잡한 구조를 심도 있게 연구해, 치료의 효능을 증진하고 국민의 질과 수명을 크게 개선합니다."
 building_fe_clinic_2: "생체 재생 기관"
 building_fe_clinic_2_desc: "의료 기술의 정점에 서 있는 생체 재생 기관은 획기적인 생체 재생 치료법의 세계를 개척함으로써 생명 연장의 한계를 끊임없이 재정의합니다."
 building_fe_security_1: "사법부 청사"
 building_fe_security_1_desc: "이 거대한 사법부 단지는 법원과 법 집행 기관을 하나로 통합하고 있습니다."
 building_fe_security_2: "사법 지구라트"
 building_fe_security_2_desc: "사법 기관의 정점에 서 있는 이 거대한 건축물은 정의를 수호하는 기념비로서 법원과 구금 시설, 그리고 가장 잔악한 범죄자도 갱생시킬 수 있는 교정 시설을 수용하고 있습니다."
 building_fe_market_1: "은하 상업 허브"
 building_fe_market_1_desc: "도시의 윤곽을 이루는 이 초고층 건물들은, 아래에서 분주하게 움직이는 무역 지구 위로 그림자를 드리우고 있습니다."
 building_fe_market_2: "성간 상업 연결체"
 building_fe_market_2_desc: "은하 경제 위에 군림하는 이 초거대 고층 건물은 무역 지구에 위치하며, 궤도상에서도 볼 수 있습니다."
 building_fe_silo_1: "공간 압축 창고"
 building_fe_silo_1_desc: "이 창고는 아공간의 일부에 영향을 줘 분자 사이의 거리를 좁힘으로써, 안에 저장된 모든 물건의 크기를 줄입니다. 살아 있는 존재는 출입이 금지됩니다."
 building_fe_silo_2: "타 차원 창고"
 building_fe_silo_2_desc: "국지적인 주머니 차원을 생성해 거의 무한하게 자원을 보관할 수 있는 시설입니다."
 building_fe_entertainment_1: "가상 위락 플라자"
 building_fe_entertainment_1_desc: "휴양과 여가 분야의 선두 주자인 이 거대한 오락 시설은 뇌파 판독기를 이용해 개별 사용자에게 맞춰진 가상 휴양지를 즉각적으로 생성할 수 있습니다."
 building_fe_entertainment_2: "만능 위락 연결체"
 building_fe_entertainment_2_desc: "오락 부문의 정점에 오른 초거대 시설로, 기존의 한계를 초월해 이용자들이 자신의 욕망을 자각하기도 전에 꿈을 실현합니다."
 building_fe_lab_1: "양자 혁신 연결체"
 building_fe_lab_1_desc: "이 연결체는 최첨단 장비와 전례 없는 규모의 노동력을 자랑하며, 양자 이론의 연구를 넘어선 응용을 통해 획기적인 혁신을 이루는 시대를 앞당기고 있습니다."
 building_fe_lab_2: "초월 혁신부"
 building_fe_lab_2_desc: "과학 발전의 최정점을 대표하는 시설이자, 마침내 도래한 끝없는 혁신의 시대를 보여 주는 증거 그 자체입니다."
 building_fe_mine_1: "양자 시추 공장"
 building_fe_mine_1_desc: "양자 터널링 기술을 적용한 이 채굴 공장은 물리적 접촉 없이 고체를 뚫고 지나가, 행성의 맨틀 어디에서나 광물을 찾아냅니다."
 building_fe_mine_2: "양자 시추 허브"
 building_fe_mine_2_desc: "양자 터널링 기술을 적용한 이 채굴 허브는 물리적 접촉 없이 고체와 액체를 뚫고 지나가, 장소를 가리지 않고 행성의 외핵 깊숙한 곳에서까지 광물을 찾아냅니다."
 ### FE Jobs
 job_fe_overseer: "감독관"
 job_fe_overseer_plural: "감독관"
 job_fe_overseer_desc: "여유로운 삶을 거부하고 공공을 위한 삶에 헌신하는 몇 안 되는 충직한 일꾼입니다. 고대 문명의 잔존 세력을 관장하고 이끌 사명을 짊어지고 있습니다."
 mod_job_fe_overseer_add: "$job_fe_overseer$ 직업"
 job_fe_maintenance_bot: "관리인"
 job_fe_maintenance_bot_plural: "관리인"
 job_fe_maintenance_bot_desc: "이 고대 기계들은 점차 노후화되는 링 월드의 설비를 쉬지 않고 정비하며 수리합니다."
 mod_job_fe_maintenance_bot_add: "$job_fe_maintenance_bot$ 직업"
 mod_job_fe_maintenance_bot_per_pop: "$VALUE$팝마다 $job_fe_maintenance_bot$ 직업 §G+1§!"
 mod_job_fe_maintenance_bot_per_pop_short: "\n$VALUE$ £pop£마다 £mod_job_maintenance_drone_add£ §G+1§!"
 job_fe_guardian_bot: "수호자"
 job_fe_guardian_bot_plural: "수호자"
 job_fe_guardian_bot_desc: "이 고대 기계들은 이미 냉동 수면 상태에서 목숨이 다한 수십억의 지성체를 쉬지 않고 지키고 있습니다."
 mod_job_fe_guardian_bot_add: "$job_fe_guardian_bot$ 직업"
 fe_hedonist: "$job_fe_hedonist$"
 job_fe_hedonist: "쾌락주의자"
 job_fe_hedonist_plural: "쾌락주의자"
 job_fe_hedonist_desc: "생각할 수 있는 모든 물질적 욕구 및 욕망이 충족되는 부유한 삶을 살아갑니다."
 mod_job_fe_hedonist_add: "$job_fe_hedonist$ 직업"
 job_fe_archivist: "기록 관리관"
 job_fe_archivist_plural: "기록 관리관"
 job_fe_archivist_effect_desc: "£job_archivist£ $job_fe_archivist_plural$은 $r_consumer_goods$를 $r_research$로 바꿉니다."
 job_fe_archivist_desc: "각 데이터 조각은 최초의 사서가 영겁의 세월 전에 수립한 고대 의식에 따라 정확하게 보관하고, 분류하고, 색인이 만들어져야 합니다."
 mod_job_fe_archivist_add: "$job_fe_archivist$ 직업"
 job_fe_acolyte_farm: "쟁기의 종복"
 job_fe_acolyte_farm_plural: "쟁기의 종복"
 job_fe_acolyte_farm_plural_with_icon: "£job_fe_acolyte_farm£ $job_fe_acolyte_farm_plural$"
 job_fe_acolyte_farm_desc: "카자르지엘께서 세 번 저주받은 악마의 독이 든 꼬리를 자르실 때 쓰셨던 것이 바로, 모든 기구 중에서도 가장 고귀한 존재, 쟁기가 아니었더냐."
 job_fe_acolyte_farm_effect_desc: "£job_fe_acolyte_farm£ $job_fe_acolyte_farm_plural$은 £food£ §Y$food$§!을 생산합니다."
 mod_job_fe_acolyte_farm_add: "$job_fe_acolyte_farm$ 직업"
 job_fe_acolyte_mine: "망치의 종복"
 job_fe_acolyte_mine_plural: "망치의 종복"
 job_fe_acolyte_mine_plural_with_icon: "£job_fe_acolyte_mine£ $job_fe_acolyte_mine_plural$"
 job_fe_acolyte_mine_desc: "성 마자쿠달께서 불타는 망치를 힘차게 휘두르시매, 첫 번째 망령의 두개골이 반으로 갈라져, 결정으로 이어지는 길이 열렸더라."
 job_fe_acolyte_mine_effect_desc: "£job_fe_acolyte_mine£ $job_fe_acolyte_mine_plural$은 £minerals£ §Y$minerals$§!을 생산합니다."
 mod_job_fe_acolyte_mine_add: "$job_fe_acolyte_mine$ 직업"
 job_fe_acolyte_generator: "하이퍼스패너의 종복"
 job_fe_acolyte_generator_plural: "하이퍼스패너의 종복"
 job_fe_acolyte_generator_plural_with_icon: "£job_fe_acolyte_generator£ $job_fe_acolyte_generator_plural$"
 job_fe_acolyte_generator_desc: "또한 하이퍼스패너를 기억할지니, 온 세상에 어둠이 내렸을 무렵, 광휘의 바자그께서 하이퍼스패너로 태양을 길들이셨음이라."
 job_fe_acolyte_generator_effect_desc: "£job_fe_acolyte_generator£ $job_fe_acolyte_generator_plural$은 £energy£ §Y$energy$§!을 생산합니다."
 mod_job_fe_acolyte_generator_add: "$job_fe_acolyte_generator$ 직업"
 job_fe_acolyte_artisan: "작업장의 종복"
 job_fe_acolyte_artisan_plural: "작업장의 종복"
 job_fe_acolyte_artisan_desc: "아즈나카께서 종복들에게 이르시길, \"작업장으로 가라. 가서 네 기술로 네가 찾는 미래를 만들라\" 하시더라."
 job_fe_acolyte_artisan_effect_desc: "£job_fe_acolyte_artisan£ $job_fe_acolyte_artisan_plural$은 £consumer_goods£ §Y$consumer_goods$§!를 생산합니다."
 mod_job_fe_acolyte_artisan_add: "$job_fe_acolyte_artisan$ 직업"
 job_fe_protector: "보호자"
 job_fe_protector_plural: "보호자"
 job_fe_protector_desc: "다수가 평안하게 휴식을 취하고 풍요를 누릴 수 있도록, 이 거친 개체들은 밤에도 경계를 늦추지 않고 자신들을 해하려는 존재에게 폭력을 행사할 준비를 갖추고 있습니다."
 mod_job_fe_protector_add: "$job_fe_protector$ 직업"
 job_fe_augur: "장막의 전조"
 job_fe_augur_plural: "장막의 전조"
 job_fe_augur_desc: "이 존재는 말은 하지만 언어를 사용하지 않습니다. 그 의미를 이해하기 위해서는 광기의 벼랑을 맴돌아야 합니다."
 mod_job_fe_augur_add: "$job_fe_augur$ 직업"
 job_fe_sky_cardinal: "천공의 추기경"
 job_fe_sky_cardinal_plural: "천공의 추기경"
 job_fe_sky_cardinal_desc: "그렇게 하늘 위에서 미래가 탄생했습니다. 빛은 눈이 멀 만큼 강렬했지만, 그 너머를 볼 수 있는 이들도 있었습니다. 이들은 다른 자들을 앞으로 이끌겠다는 사명을 스스로 짊어졌습니다."
 mod_job_fe_sky_cardinal_add: "$job_fe_sky_cardinal$ 직업"
 job_fe_xeno_ward: "보호 외계종"
 job_fe_xeno_ward_plural: "보호 외계종"
 job_fe_xeno_ward_desc: "이 외계종은 은하계의 파괴와 혼돈 속에서도 종족의 존속을 확보할 수 있도록, 원래 자원 환경과 비슷한 환경에 수용되어 살아가고 있습니다."
 mod_job_fe_xeno_ward_add: "$job_fe_xeno_ward$ 직업"
 job_fe_xeno_keeper: "외계종 관리사"
 job_fe_xeno_keeper_plural: "외계종 관리사"
 job_fe_xeno_keeper_desc: "이 선구자들은 사육사의 역할을 맡아, 관리 중인 보호 외계종의 욕구를 돌봅니다."
 mod_job_fe_xeno_keeper_add: "$job_fe_xeno_keeper$ 직업"
