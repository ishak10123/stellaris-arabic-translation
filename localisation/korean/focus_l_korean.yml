 core.120.lore: "§L\"숨을 너무 깊게 쉬면 폐병이 걸릴 거야. 그렇다고 너무 조금 쉬면 기절하지. 어느 쪽이든 회사는 네 임금을 안 줘도 돼서 좋아할 거다.\"§!"
