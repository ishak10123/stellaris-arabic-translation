 development.310.success: "£trigger_yes£ $development.310.req$"
 development.315.name: "연방 결성"
 development.315.desc: ""
 development.315.hint: "£interface£ ['concept_contacts_view']의 $contacts_view_tab_contacts$ 탭에서 다른 ['concept_empire']과 접촉하고 ['concept_federation']을 이루자고 제안하십시오.$focus_other$"
 development.315.lore: "§L\"이 협정이 우리의 결의에 대한 증거가 되기를 바랍니다. 우리는 분열보다는 통합을, 전쟁보다는 대화를, 그리고 모든 별이 함께 나아가기를 선택할 것입니다.\" - 은하계 화합 협정의 서문§!"
 development.315.req: "연방을 결성함"
 development.315.fail: "£trigger_no£ $development.315.req$"
 development.315.success: "£trigger_yes£ $development.315.req$"
 development.320.name: "평의회 참여"
 development.320.desc: ""
 development.320.hint: "['concept_galactic_council']에 참여할 수 있게 다음 투표 전까지 ['concept_diplomatic_weight']을 충분히 올리십시오."
 development.320.lore: "§L\"진정한 힘은 함대나 군대에서 나오지 않는다. 중요한 결정이 이루어지는 방에서 비롯된다.\"§!"
 development.320.req: "은하 평의회에 참여함"
 development.320.fail: "£trigger_no£ $development.320.req$"
 development.320.success: "£trigger_yes£ $development.320.req$"
 development.325.name: "베테랑 공직자 확보"
 development.325.desc: "(4레벨 도달)"
 development.325.hint: "$development.230.hint$"
 development.325.lore: "§L\"진짜 힘든 일을 하는 건 결국 노동자다. 지도자가 앓는 소리를 해서는 안 된다.\" - 최고 치안 판사이르'브 바'비르§!"
 development.325.req: "4레벨 공직자를 확보함"
 development.325.fail: "£trigger_no£ $development.325.req$"
 development.325.success: "£trigger_yes£ $development.325.req$"
