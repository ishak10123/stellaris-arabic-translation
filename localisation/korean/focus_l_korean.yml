 ###################
 core.100.name: "식민지 건립"
 core.100.desc: ""
 core.100.hint: "£colony_ship£ ['concept_colony_ship']으로 거주 가능한 £planet£ ['concept_planet']을 개척하십시오."
 core.100.lore: "§L\"새로운 세계는 단순한 자산이 아니다. 새로운 책임이기도 하다.\" - 식민지 개발 지침, 223판§!"
 core.100.req: "식민지를 건립함"
 core.100.fail: "£trigger_no£ $core.100.req$"
 core.100.success: "£trigger_yes£ $core.100.req$"
 core.102.name: "식민지 특화 설정"
 core.102.desc: "(수도 외 식민지)"
 core.102.hint: "수도가 아닌 식민지에서 £interface£ ['concept_colony_view']의 $colony_view_tab_planet_summary$ 탭으로 가서 ['concept_designation']를 변경하십시오."
 core.102.lore: "§L\"서면으로 보면 '식민지 특화'는 능률을 향상할 것 같지. 그런데 현장에 가 보면 '돌밖에 없는 행성'을 그럴싸한 투자처로 포장하는 말일 뿐이야.\"§!"
 core.102.req: "행성의 식민지 특화를 변경함"
 core.102.fail: "£trigger_no£ $core.102.req$"
 core.102.success: "£trigger_yes£ $core.102.req$"
 core.104.name: "채굴 기지 건설"
 core.104.desc: ""
 core.104.hint: "£construction_ship£ ['concept_construction_ship']으로 적합한 ['concept_celestial_object']에 £mining_station£ ['concept_mining_station']를 건설하십시오."
 core.104.lore: "§L\"평범한 사람의 눈에는 흔한 소행성으로 보이겠지만, 우리 눈에는 약간 찌그러진 형태의 크레딧으로 보입니다.\"§!"
 core.104.req: "채굴 기지를 건설함"
 core.104.fail: "£trigger_no£ $core.104.req$"
 core.104.success: "£trigger_yes£ $core.104.req$"
 core.106.name: "건물 건설"
 core.106.desc: ""
 core.106.hint: "£interface£ ['concept_colony_view']의 $colony_view_tab_planet_summary$ 탭에서 이용 가능한 §H건물 슬롯§!을 클릭한 후 건설할 £building£ ['concept_building']을 선택하십시오."
 core.106.lore: "§L\"오늘 이곳은 건설 현장에 불과하지만, 내일 이곳에는 하나의 문명이 서 있을 것이오.\"§!"
 core.106.req: "건물을 건설함"
 core.106.fail: "£trigger_no£ $core.106.req$"
 core.106.success: "£trigger_yes£ $core.106.req$"
 core.108.name: "항성 기지 모듈 건설"
 core.108.desc: ""
 core.108.hint: "£interface£ ['concept_starbase_view']의 $starbase_view_tab_command$ 탭에서 이용 가능한 §H항성 기지 모듈§!을 선택해 건설하십시오."
 core.108.lore: "§L\"멋진 모험을 할 수 있다고 해서 왔어요. 그런데 몇 개월이나 재밌는 일도 없이 탁한 실내 공기만 마셔야 했죠. 그래도 이제 무역 허브가 생겨서 좀 살맛이 나네요.\"§!"
 core.108.req: "항성 기지 모듈을 건설함"
 core.108.fail: "£trigger_no£ $core.108.req$"
 core.108.success: "£trigger_yes£ $core.108.req$"
 core.110.name: "항성 기지 건물 건설"
 core.110.desc: ""
 core.110.hint: "£interface£ ['concept_starbase_view']의 $starbase_view_tab_command$ 탭에서 이용 가능한 §H항성 기지 건물§!을 선택해 건설하십시오."
 core.110.lore: "§L\"항성 기지의 목적은 기지가 은하의 어떤 곳에 있는지에 따라 결정된다. 건물은 그 목적을 달성하기 쉽게 할 뿐이다.\" - 궤도 공학: 이론과 응용§!"
 core.110.req: "항성 기지 건물을 건설함"
 core.110.fail: "£trigger_no£ $core.110.req$"
 core.110.success: "£trigger_yes£ $core.110.req$"
 core.112.name: "전통 채택"
 core.112.desc: ""
