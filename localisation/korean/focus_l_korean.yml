 core.114.desc: ""
 core.114.hint: "£interface£ ['concept_government_view']의 §H$government_view_tab_policies_and_edicts$§! 탭에서 ['concept_edict']을 활성화하십시오."
 core.114.lore: "§L\"시민 여러분께 전합니다. 827-B 시행령이 정식으로 공포되었습니다. 자세한 준수 지침은 34조 12항을 참조하십시오. 오늘도 부지런히 일하시길 바랍니다!\"§!"
 core.114.req: "시행령을 활성화함"
 core.114.fail: "£trigger_no£ $core.114.req$"
 core.114.success: "£trigger_yes£ $core.114.req$"
