 core.112.lore: "§L\"전통이 없는 민족은 목적 없이 방황하고, 전통에 집착하는 민족은 뒤처진다. 지혜로움이란 시대에 안 맞는 전통을 버릴 줄 아는 것이리라.\"§!"
 core.112.req: "전통을 채택함"
