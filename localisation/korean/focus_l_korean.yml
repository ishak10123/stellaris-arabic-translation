 development.310.name: "종족 3개 확보"
 development.310.desc: ""
 development.310.hint: "£interface£ ['concept_contacts_view']의 $contacts_view_tab_contacts$ 탭에서 다른 ['concept_empire']에 §H$PACT_migration_treaty$§! ['concept_diplomatic_pact']을 제안하십시오.$focus_other$"
 development.310.lore: "§L\"은하는 광활하고, 지식과 기술, 참신한 생각으로 가득합니다. 굳이 하나의 사고방식만 고집할 필요가 있을까요?\"§!"
 development.310.req: "종족을 3개 확보함"
