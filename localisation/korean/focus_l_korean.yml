 development.400.desc: ""
 development.400.hint: "£official£ ['concept_official']를 ['concept_federation']에 배정해서 §H연방 경험치§!를 획득하십시오."
 development.400.lore: "§L\"다섯 단계로 나뉜 정부와 백 가지 위원회, 천 번의 회의... 비효율적으로 보여도 우리가 강한 비결입니다.\"§!"
 development.400.req: "5레벨 연방에 참여함"
 development.400.fail: "£trigger_no£ $development.400.req$"
 development.400.success: "£trigger_yes£ $development.400.req$"
 development.405.name: "다이슨 스피어 건설"
 development.405.desc: ""
 development.405.hint: "£physics£ §H$tech_dyson_sphere$§! 기술을 연구한 후 §H$tech_dyson_swarm$§! £megastructure£ ['concept_megastructure']을 §H$tech_dyson_sphere$§!로 업그레이드하십시오.$focus_other$" # With Machine Age
 development.406.hint: "£physics£ §H$tech_dyson_sphere$§! 기술을 연구한 후 적합한 ['concept_star']을 찾아서 £construction_ship£ ['concept_construction_ship']으로 §H$tech_dyson_sphere$§! £megastructure£ ['concept_megastructure']을 건설하십시오.$focus_other$" # Without Machine Age
 development.405.lore: "§L\"고도로 발달한 문명은 자원을 두고 싸우지 않습니다. 무엇이든 자원으로 만들 수 있으니까요.\" - 제3 계급의 진격§!"
 development.405.req: "다이슨 스피어를 건설함"
 development.405.fail: "£trigger_no£ $development.405.req$"
 development.405.success: "£trigger_yes£ $development.405.req$"
 development.410.name: "링 월드 건설"
 development.410.desc: ""
 development.410.hint: "£physics£ §H$tech_ring_world$§! 기술을 연구한 후 적합한 ['concept_star']을 찾아서 £construction_ship£ ['concept_construction_ship']으로 §H$tech_ring_world$§! £megastructure£ ['concept_megastructure']을 건설하십시오.$focus_other$"
 development.410.lore: "§L\"우리 항성의 빛을 받아 아름답게 빛났던 링을... 침공자 무리의 그림자가 뒤덮었다.\" - 아드다브 우비-와디브의 일기, 표준 174§!"
 development.410.req: "링 월드를 건설함"
 development.410.fail: "£trigger_no£ $development.410.req$"
 development.410.success: "£trigger_yes£ $development.410.req$"
 development.415.name: "5레벨 공직자 3명 확보"
 development.415.desc: ""
 development.415.hint: "$development.230.hint$"
 development.415.lore: "§L\"수십 년을 일한 끝에 정치가들은 정책과 협상, 남 탓하기의 달인이 되었습니다.\"§!"
 development.415.req: "5레벨 공직자를 3명 확보함"
 development.415.fail: "£trigger_no£ $development.415.req$"
 development.415.success: "£trigger_yes£ $development.415.req$"
 development.500.name: "성간 의회 건설"
 development.500.desc: ""
 development.500.hint: "£society£ §H$tech_interstellar_assembly$§! 기술을 연구한 후 적합한 ['concept_star']을 찾아서 £construction_ship£ ['concept_construction_ship']으로 §H$tech_interstellar_assembly$§! £megastructure£ ['concept_megastructure']을 건설하십시오.$focus_other$"
 development.500.lore: "§L\"대화를 지배하는 자가 역사의 흐름을 지배한다.\" - 쑤브의 딸, 사구 대법관§!"
 development.500.req: "성간 의회를 건설함"
 development.500.fail: "£trigger_no£ $development.500.req$"
 development.500.success: "£trigger_yes£ $development.500.req$"
 development.505.name: "월간 +3,000 소비재 달성"
 development.505.desc: ""
 development.505.hint: "£consumer_goods£ ['concept_consumer_goods']를 모으려면 £interface£ ['concept_colony_view']의 $colony_view_tab_planet_summary$ 탭에서 £district£ ['concept_industrial_districts']와 £building£ ['building:building_factory_1']를 건설하거나 £market£ ['concept_market'] 또는 다른 ['concept_empires']에서 £consumer_goods£ §H$concept_consumer_goods$§!를 구매하십시오."
 development.505.lore: "§L\"그자들은 그걸 먹지 않고, 그렇다고 확장하는 데 쓰지도 않는다. 그저... 장식해 놓을 뿐이다. 그 비효율성에 정말 할 말이 없어진다.\"§!"
 development.505.req: "월간 +3,000 소비재를 달성함"
 development.505.fail: "£trigger_no£ $development.505.req$"
 development.505.success: "£trigger_yes£ $development.505.req$"
 development.510.name: "10개 제국과 +200 관계 획득"
 development.510.desc: ""
 development.510.hint: "$development.100.hint$"
 development.510.lore: "§L\"인기가 너무 많은 것도 지치는 것 같아.\"§!"
 development.510.req: "10개 제국과 +200 관계를 획득함"
 development.510.fail: "£trigger_no£ $development.510.req$"
 development.510.success: "£trigger_yes£ $development.510.req$"
 development.515.name: "베헤모스 알 배치"
 development.515.desc: ""
 development.515.hint: "§H베헤모스 알§!을 배치하려면 ['concept_construction_ship']을 선택하고 §H거대 구조물 건설§!을 클릭하십시오. 그다음 베헤모스 알을 선택한 뒤 적당한 §H거대 가스 행성§!의 궤도에 건설하십시오."
 development.515.lore: "§L\"위를 올려다보니 달에 거대한 그림자가 드리워 있었다. 함선도, 폭풍도 아닌... 거대한 생명체였다.\" - 목격자 증언, E-91 식민지§!"
 development.515.req: "베헤모스 알을 배치함"
 development.515.fail: "£trigger_no£ $development.515.req$"
 development.515.success: "£trigger_yes£ $development.515.req$"
 development.520.name: "유전체 연구 시설 건설"
 development.520.desc: ""
 development.520.hint: "보유 행성에 있는 이용 가능한 아무 ['concept_building'] 슬롯에 §H유전체 연구 시설§!을 건설하십시오."
 development.520.lore: "§L\"우리 유전체 좀 봐. 이렇게 개조하기 쉬운 걸 건드리지 말라니, 말이 안 되잖아.\"§!"
 development.520.req: "유전체 연구 시설을 건설함"
 development.520.fail: "£trigger_no£ $development.520.req$"
 development.520.success: "£trigger_yes£ $development.520.req$"
