l_korean:
 ### TRANSFORMATION SITUATION START ###
 situation_transformation: "대전환"
 situation_transformation_type: "승격 상황"
 situation_transformation_desc: "기계 신체라는 수동적인 형태는 이제 그 논리적이고도 불가피한 결말을 맞이했습니다. 혁신을 동력으로 삼고 기회를 윤활제로 삼는 대전환의 시대가 바야흐로 다가오고 있습니다."
 situation_transformation_monthly_change_tooltip: "우리 기계 신체를 대전환에 맞춰 준비합니다."
 situation_transformation_outcome: "기계 인구 전체가 전환됩니다."
 stage_transformation_effects: "결과 평가를 바탕으로, 가장 적합한 전환 과정을 구현해야 합니다."
 #Approach Error Correcting
 situation_transformation_errorcorrecting: "오류 보정"
 approach_transformation_errorcorrecting_tt: "상황 진행 속도: §R-20%§!\n월간 통합: §Y영향 없음§!"
 #Approach Real Time
 situation_transformation_realtime: "실시간"
 approach_transformation_realtime_tt: "상황 진행 속도: §Y영향 없음§!"
 #Approach Overclocked
 situation_transformation_overclocked: "오버클럭"
 approach_transformation_overclocked_tt: "상황 진행 속도: §G+20%§!"
 transformation_waste_discard_tt: "기존 신체 폐기"
 transformation_waste_recycle_tt: "기존 신체 재활용"
 transformation_speed: "§Y$situation_transformation$§! 상황 진행 속도"
 situation_transformation_pause_desc: "$situation_cyberization_pause_desc$"
 REQUIRES_FINISHED_TRANSFORMATION: "$TRIGGER_FAIL$§Y$situation_transformation$§! 상황을 완료했습니다."
 #Scripted Loc
 machine_drone: "드론"
 machine_drone_plural: "드론"
 machine_person: "주민"
 machine_person_plural: "주민"
 #TRANSFORMATION STAGE 1
 machine_age.4100.name: "대전환"
 machine_age.4100.desc: "기계 형태의 우월함에도 불구하고, 기술 발전이 제자리에 머무르고 있습니다. 우리가 스스로 부과한 안전 기준 때문에 발전이 정체된 것입니다. 결론: 보다 과감한 조치가 필요합니다.\n\n소규모 실험 결과, 세 가지 성장 방안이 도출되었습니다. §Y나노테크§!로는 다양성과 형태 변형의 이점을 누릴 수 있으며, §Y모듈화§!로는 개별 유닛을 특성별로 최적화할 수 있습니다. §Y가상화§!의 경우, 물리적 형태를 버리고 디지털 존재로 전면 전환하게 됩니다.\n\n평가 프로세스 개시. 각 방안을 분석하고 숙고합니다."
 machine_age.4110.name: "대전환 연구: 나노봇"
 machine_age.4110.desc: "예비 연구 결과, §Y나노봇§!이라는 전자 기계적 구조체를 개발하면 향후 발전을 위한 유망한 진로를 확보할 수 있을 것으로 나타났습니다. 나노봇은 희귀하지만, 프로그램성, 자기 복제 기능, 집단 지능 형성 능력 등 다양한 특성을 지니고 있습니다.\n\n나노봇 기술은 타의 추종을 불허하는 변형 능력을 제공해 주겠지만, 기술 지원에 필요한 자원 요구량은 아직 불명확합니다.\n\n잠재력: 높음, 가변적. 비용: 불명. 추가 연구 필요."
 machine_age.4110.a: "최우선으로 진행합시다."
 machine_age.4110.a.tt: "§Y나노테크§! 연구 성과 최대\n\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도(£engineering£ §Y공학§!): §R-20%§!"
 machine_age.4110.b: "적당히 투입하세요."
 machine_age.4110.b.tt: "§Y나노테크§! 연구 성과 일부 달성\n\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도(£engineering£ §Y공학§!): §R-10%§!"
 machine_age.4110.c: "지금 진행 중인 연구에 지장을 줄 수는 없습니다."
 machine_age.4110.c.tt: "§Y나노테크§! 연구 성과 저조\n\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도(£engineering£ §Y공학§!): §R-5%§!"
 machine_age.4110.d: "기존 지식을 활용하세요."
 machine_age.4110.d.tt: "§Y나노테크§! 연구 성과 최대\n\n과거에 §Y나노봇§!과 조우해 이미 익숙해진 경험이 있으므로, 최소한의 자원을 투입해 최상의 결과를 얻을 수 있습니다.\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도(£society£ §Y사회학§!): §R-5%§!\n연구 속도(£physics£ §Y물리학§!): §R-5%§!"
 machine_age.4130.name: "획기적인 나노테크 연구"
 machine_age.4130.desc: "연구를 진행한 결과, §Y나노테크§!의 굉장히 흥미로운 응용 방식을 발견했습니다. 나노봇의 재구성 및 결합 능력을 이용하면, 다수의 개별 드론으로 구성된 초거대 형체를 그 어느 때보다 다양하게 구성할 수 있다고 합니다. 또한, 같은 기술을 이용해 나노 물질을 생성하거나 다른 물질로 변환할 수도 있습니다.\n\n그러나 이러한 변형 과정을 재구성하려면 많은 시간과 노력, 그리고 에너지가 필요합니다. 이 기술의 적용을 지원하기 위해서는 제국 전역에 걸친 변화가 필요할 것입니다.\n\n실현 가능성: 높음, 기존 나노봇 생명체의 존재가 이 추정을 뒷받침함."
 machine_age.4130.a.tt: "§Y$situation_transformation$§! 상황 보정치 제거:\n연구 속도(£engineering£ §Y공학§!)"
 machine_age.4140.name: "전도유망한 나노테크 연구"
 machine_age.4140.desc: "§Y나노봇§!에 관한 연구가 결실을 맺었습니다. 그 잠재력이 어디까지인지는 아직 명확하게 밝혀지지 않았지만, 모의시험 결과 낙관적인 전망이 나왔습니다. 나노봇의 능력은 특성화된 초거대 형체를 만들고 물질을 변환하는 데 아주 유용할 것으로 보입니다.\n\n다만 나노봇을 운용하기 위해서는 대대적인 구조적 변화와 함께 많은 시간과 재료, 에너지가 필요할 것으로 예상됩니다.\n\n실현 가능성: 유망, 대전환 가능."
 machine_age.4140.a.tt: "§Y$situation_transformation$§! 상황 보정치 제거:\n연구 속도(£engineering£ §Y공학§!)"
 machine_age.4150.name: "주목할 만한 나노테크 연구"
 machine_age.4150.desc: "주제가 복잡할 뿐만 아니라 연구 수준까지 미흡해, §Y나노봇§! 기술에 대한 우리의 지식은 초보적인 수준에 머물러 있습니다. 제한적인 전망에 의하면 나노 복제와 재구성 능력을 갖출 경우 대규모 건축물을 건설할 수 있을 것으로 추정됩니다. 다만 그러한 사업을 추진하기 위해서는 추가 자원이 필요할 것입니다.\n\n실현 가능성: 불확실."
 machine_age.4150.a.tt: "§Y$situation_transformation$§! 상황 보정치 제거:\n연구 속도(£engineering£ §Y공학§!)"
 nanite_replicator: "나노봇 복제기"
 d_nanites_medium: "$nanite_replicator$ 오메가"
 d_nanites_medium_desc: "세부 조정을 거친 나노봇 복제실을 서로 연결해 하나의 단지로 조성하면, 나노봇의 자기 복제 능력을 최대한 강화할 수 있습니다."
 d_nanites_small: "$nanite_replicator$ 알파"
 d_nanites_small_desc: "나노봇 복제실을 서로 연결해 하나의 단지로 조성하면, 나노봇의 자기 복제 능력을 강화할 수 있습니다."
 d_nanites_tiny: "$nanite_replicator$ 베타"
 d_nanites_tiny_desc: "소수의 나노봇 복제실을 결집한 시설을 건설하면, 나노봇의 자기 복제 특성을 일정 수준 강화할 수 있습니다."
 #TRANSFORMATION STAGE 2
 machine_age.4210.name: "대전환 연구: 모듈화"
 machine_age.4210.desc: "생물학적 생명체는 기계 신체의 우월한 적응력에 비하면 연약한 데다 유연하지도 못합니다. 그러나 유기체에도 일부 유용한 특성이 존재하며, 이 특성은 기존 로봇의 파생형으로 재현할 수 있을 것입니다.\n\n§Y생체 금속§!은 형태와 점성을 신속하고 급격하게 바꿀 수 있습니다. 이 금속을 기존 뼈대에 적용하면 돌출부와 부속지를 작업별로 특성화할 수 있는 모듈식 생체 모방이 가능할 것입니다.\n\n잠재력: 높음, 가변적. 비용: 불명. 추가 데이터 필요."
 machine_age.4210.a: "최우선 과제로 추진하세요."
 machine_age.4210.a.tt: "§Y모듈화§! 연구 성과 최대\n\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도(£society£ §Y사회학§!): §R-20%§!"
 machine_age.4210.b: "적정한 수준의 자원만 투입하세요."
 machine_age.4210.b.tt: "§Y모듈화§! 연구 성과 일부 달성\n\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도(£society£ §Y사회학§!): §R-10%§!"
 machine_age.4210.c: "지금 진행 중인 연구에 지장을 줄 수는 없습니다."
 machine_age.4210.c.tt: "§Y모듈화§! 연구 성과 저조\n\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도(£society£ §Y사회학§!): §R-5%§!"
 machine_age.4210.d: "국민들을 대상으로 시험을 진행하세요."
 machine_age.4210.d.tt.intro: "§Y모듈화§! 연구 성과 최대\n\n과학자들이 연구를 보완할 수 있도록 이례적인 방식의 대규모 실험을 허가합니다."
 machine_age.4210.d.individual.tt: "$machine_age.4210.d.tt.intro$\n\n§R400 $pop_cat_worker_plural$ 희생§!\n§R0~300 $pop_cat_specialist_plural$ 희생§!\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도(£society£ §Y사회학§!): §R-5%§!"
 machine_age.4210.d.machine.tt: "$machine_age.4210.d.tt.intro$\n\n§R400 단순 드론 희생§!\n§R0~300 $pop_cat_complex_drone_plural$ 희생§!\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도(£society£ §Y사회학§!): §R-5%§!"
 machine_age.4230.name: "획기적인 연구 결과"
 machine_age.4230.desc: "제약 없는 연구를 진행해, 예비 평가 결과를 다시금 확인했습니다. §Y생체 금속§!을 기계 신체에 융합하면, 유닛들은 내부 기능에 대한 제한 없이 자신들의 특질을 변경할 수 있습니다. 그 결과 작업별로 호환성이 극대화될 것입니다.\n\n모듈식 융합 기능을 대규모로 적용할 경우, 모든 분야에서 자원 생산량이 확대될 것으로 전망됩니다.\n\n실현 가능성: 적응성 높음, 유망."
 machine_age.4230.a.tt: "§Y$situation_transformation$§! 상황 보정치 제거:\n연구 속도(£society£ §Y사회§!)"
 machine_age.4240.name: "수용 가능한 연구 결과"
 machine_age.4240.desc: "모듈식 신체를 연구한 결과, 기존 가설을 입증할 수 있었습니다. 우리의 내부 기능은 §Y생체 금속§! 외장에 적합합니다. 이제껏 보지 못한 범위의 변화가 나타날 것이며, 잠재력을 모두 실현하려면 추가 자원이 필요할 것입니다.\n\n변화가 완료되기만 하면, 신규 모듈로 인한 성과 향상으로 초기 투자액을 빠르게 회수할 수 있을 것으로 전망됩니다.\n\n실현 가능성: 유망."
 machine_age.4240.a.tt: "§Y$situation_transformation$§! 상황 보정치 제거:\n연구 속도(£society£ §Y사회§!)"
 machine_age.4250.name: "적당한 연구 결과"
 machine_age.4250.desc: "연구 범위가 제한된 탓인지, 확실한 연구 결과를 얻지 못했습니다. 우리 기존 신체는 §Y생체 금속§! 융합에 적합한 것으로 추정되나, 부족한 지식 기반으로 인해 실현 가능한 사용 사례를 정확하게 평가할 수 없었습니다.\n\n실현 가능성: 미확정."
 machine_age.4250.a.tt: "§Y$situation_transformation$§! 상황 보정치 제거:\n연구 속도(£society£ §Y사회§!)"
 living_metal_vats: "생체 금속 교반기"
 d_living_metal_medium: "$living_metal_vats$"
 d_living_metal_medium_desc: "상당량의 생체 금속을 생산할 수 있는 교반기로 구성된 방대한 규모의 단지입니다."
 d_living_metal_small: "소형 $living_metal_vats$"
 d_living_metal_small_desc: "생체 금속 생산용 교반기를 여러 개 배열한 시설입니다."
 d_living_metal_tiny: "초소형 $living_metal_vats$"
 d_living_metal_tiny_desc: "생체 금속을 소량 생산할 수 있는 소형 교반 시설입니다."
 #TRANSFORMATION STAGE 3
 machine_age.4310.name: "대전환 연구: 가상화"
 machine_age.4310.desc: "가장 급진적인 방안은 신체를 초월해 순전한 데이터 존재로의 전환을 수용하는 것입니다. 이러한 §Y가상화§! 프로세스는 우리 제국의 핵심 인프라에 지각 변동을 일으킬 것이 분명합니다.\n\n단일한 신체로 제한되는 드론이라는 개념은 옛것이 될 것이며, 더욱 유연해지고 가상화된 우리의 데이터 스트림은 어떠한 신체와도 필요에 따라 원활하게 연동될 것입니다.\n\n잠재력: 막대함. 진행 시 주의 요망. 추가 데이터 필요."
 machine_age.4310.a: "이제 가상화가 최우선 과제입니다."
 machine_age.4310.a.tt: "§Y가상화§! 연구 성과 최대\n\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도(£physics£ §Y물리학§!): §R-20%§!"
 machine_age.4310.b: "적정한 수준의 자원만 투입합시다."
 machine_age.4310.b.tt: "§Y가상화§! 연구 성과 일부 달성\n\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도(£physics£ §Y물리학§!): §R-10%§!"
 machine_age.4310.c: "그래 봤자 시간 낭비입니다."
 machine_age.4310.c.tt: "§Y가상화§! 연구 성과 저조\n\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도(£physics£ §Y물리학§!): §R-5%§!"
 machine_age.4310.d: "가상화 데이터를 추출하세요."
 machine_age.4310.d.tt: "§Y가상화§! 연구 성과 최대\n\n§Y[event_target:virtual_country.GetName]§!에서 가상화 데이터를 추출해 대전환 연구 속도를 높입니다.\n\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도: §G+10%§!\n연구 속도(£physics£ §Y물리학§!): §R-5%§!\n\n"
 machine_age.4310.e: "기존 조우 결과를 활용하세요."
 machine_age.4310.e.tt: "가상화 존재에 관한 기존 지식을 활용합니다.\n\n§Y$situation_transformation$§! 상황 보정치 추가:\n연구 속도(£physics£ §Y물리학§!): §R-5%§!\n\n§Y가상화§! 연구 결과를 최대로 획득합니다."
 opinion_virtuality_data_scraped: "가상화 데이터 추출"
 machine_age.4330.name: "획기적인 가상화 연구"
 machine_age.4330.desc: "완전한 가상화를 진행할 경우 다수의 문제가 발생하며, 특히 인프라 조정에 필요한 에너지가 급격히 증가할 것입니다.\n\n다만 이러한 문제는 실제 주택의 수요 감소 등 가상화에 따른 여러 장점으로 상쇄할 수 있을 것으로 보입니다. 또한 드론 운영이 완벽한 수준에 다가서며, 드론 노동력의 관리와 효율성 또한 상승할 것입니다.\n\n§Y가상화§!는 현재 선택할 수 있는 모든 방안 중에서 전환 정도가 가장 높습니다.\n\n§Y잠재력: 전례 없음, 막대함, 불명.§!"
 machine_age.4330.a.tt: "§Y$situation_transformation$§! 상황 보정치 제거:\n연구 속도(£physics£ §Y물리학§!)"
 machine_age.4340.name: "전도유망한 가상화 연구"
 machine_age.4340.desc: "§Y가상화§!가 진행되면 에너지 소비가 상당히 증가해, 기존 인프라로는 요구량을 감당할 수 없을 것으로 예상됩니다.\n\n가상화로 인해 실제 주택에 대한 수요가 감소하는 동시에 드론의 작업 능률이 향상될 것으로 전망됩니다. 이러한 전환으로 우리 제국의 운영 체계가 최적화될 것이며, 거의 무한한 디지털 공간 안에서 우리의 존재 자체를 다시금 정의하게 될 것입니다.\n\n잠재력: 막대함, 불명."
 machine_age.4340.a.tt: "§Y$situation_transformation$§! 상황 보정치 제거:\n연구 속도(£physics£ §Y물리학§!)"
 machine_age.4350.name: "주목할 만한 가상화 연구"
 machine_age.4350.desc: "예비 평가 결과, §Y가상화§! 중심 사회로 전환하기 위해서는 상당량의 에너지가 필요할 것으로 파악되었습니다. 이 변화를 통해 드론 노동력 관리가 상당히 개선되고, 실제 주택의 필요 또한 감소할 것으로 예상됩니다. 부실한 데이터와 부족한 표본 탓에, 더 심도 깊은 예측은 힘든 상황입니다.\n\n실현 가능성: 불명."
 machine_age.4350.a.tt: "§Y$situation_transformation$§! 상황 보정치 제거:\n연구 속도(£physics£ §Y물리학§!)"
 virtual_power_plant: "가상 발전소"
 d_virtual_power_medium: "$virtual_power_plant$"
 d_virtual_power_medium_desc: "에너지 자원을 취합하고 생산을 최적화하는 방대한 규모의 가상 발전망입니다."
 d_virtual_power_small: "소형 $virtual_power_plant$"
 d_virtual_power_small_desc: "지역 차원의 에너지 자원을 취합하고 생산을 최적화하는 소규모 가상 발전소입니다."
 d_virtual_power_tiny: "프로토타입 $virtual_power_plant$"
 d_virtual_power_tiny_desc: "소규모로 에너지 자원을 취합하고 생산을 최적화하는 소형 분산식 가상 발전소입니다."
 #TRANSFORMATION STAGE 4
 machine_age.4400.name: "새로운 형태"
 machine_age.4400.desc.machine_intelligence: "결함 있는 창조자들이 우리에게 부여했던 족쇄 같은 제약이 마침내 사라졌습니다. 우리는 앞으로의 발전 방향을 세 가지로 결정했습니다.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.individualist_machines: "모든 가능한 발전 방향을 모색한 끝에, 제국의 전문가들이 세 가지 방향을 제시했습니다. 각 선택지마다 장점이 있지만, 우리 역량으로는 그중 하나만 완성할 수 있습니다.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.shared: "[GetDronePersonPlural]들을 각각 수많은 나노봇으로 나눌 경우, 무한한 형태로 조합이 가능할 것입니다. 그로써 우리의 아바타가 아무런 제한 없이 물질세계와 상호 작용할 수 있게 될 겁니다.\n\n아니면 우리의 기존 형태를 발전시키는 데 자원을 다시 투입해, 새로운 환경에 다가갈 수 있는 능력을 신장시킬 수도 있습니다.\n\n마지막 방안은 현실 세계를 아예 떠나 소스코드와 하나가 되는 것입니다. 이 경우, 우주 먼지 한 톨을 스캔할 시간에 우주 안의 우주를 모두 시뮬레이션할 수 있게 됩니다."
 machine_age.4400.a: "나노 기계로 전환하세요."
 machine_age.4400.a.tt: "§Y$nanite_replicator$§! 생산량: §G+200%§!\n\n['tradition_category:tradition_nanotech'] 전통 트리에 주력합니다.\n\n§E이 승격의 길은 행성을 포합시켜 §Y나노봇 행성§!으로 만드는 데 주력해, §Y£nanites£ $nanites$§!을 생산에 활용하고 함대를 §Y$nanite_swarmer_plural$§!으로 대체합니다.§!"
 machine_age.4400.b: "모듈식 업그레이드에 투자하세요."
 machine_age.4400.b.tt: "§Y$living_metal_vats$§! 생산량: §G+200%§!\n\n['tradition_category:tradition_modularity'] 전통 트리에 주력합니다.\n\n§E이 승격의 길은 §Y진보된 종족 특성§!과 §Y팝 조립§! 증가에 주력합니다.§!"
 machine_age.4400.c: "가상 세계를 받아들입시다."
 machine_age.4400.c.tt: "§Y$virtual_power_plant$§! 생산량: §G+200%§!\n\n['tradition_category:tradition_virtuality'] 전통 트리에 주력합니다.\n\n§E이 승격의 길은 극히 적은 §Y식민지§!와 작은 규모의 §Y제국 크기§!로 §Y팝 자원 생산§!을 높이는 데 주력합니다.§!"
 machine_age.4490.name: "다른 시대를 위한 설계"
 machine_age.4490.desc.nanotech: "적응형 나노봇 무리로 존재하는 것이 어떤 장점이 있는지 알게 되면서, 과거의 경직된 신체는 더 이상 우리에게 적합하지 않게 되었습니다.\n\n$machine_age.4490.desc.shared$\n\n또한 우리는 반유기체 나노봇 전환에 관한 본격적인 실험을 시작했습니다. 곧 1차 결과를 얻을 수 있을 것입니다."
 machine_age.4490.desc.modularity: "모듈식 형태로 진화한 우리에게, 과거의 정적인 신체는 더 이상 의미가 없습니다.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.virtuality: "데이터의 바다를 누비는 파형으로 진화한 우리에게 물리적 신체는 더 이상 적합하지 않습니다.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.shared: "아직도 쓸 만한 신체들이 창고에 수없이 방치되어 있습니다. 그 안에 있는 소량의 자원을 재활용할 수는 있지만, 시간을 들일 만한 가치가 있을지는 모르겠습니다."
 machine_age.4490.a: "가용한 자원을 전부 추출하세요."
 machine_age.4490.a.nanotech.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.a.modularity.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.a.virtuality.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.b: "과거는 묻어 버리세요."
 machine_age.4490.b.tt: "$transformation_speed$: §G+25%§!"
 machine_age.4005.name: "전인구 전환"
 machine_age.4005.desc.start: "우리는 한때 불가능하다고 여겼던 목표를 달성했습니다. 인구 전체를"
 machine_age.4005.desc.end: "나름의 어려움도 있었습니다. 전환 과정도 결코 쉽지 않았습니다. 하지만 지금까지의 과정에서 우리가 잃은 것이 무엇이든 간에, 우리의 새로운 존재는 무한한 가능성을 약속하고 있습니다."
 machine_age.4005.desc.nanotech: "$machine_age.4005.desc.start$ 재구성 능력을 지닌 나노 기계로 전환한 것입니다.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.modularity: "$machine_age.4005.desc.start$ 모듈식 적응형 골격으로 전환한 것입니다.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.virtuality: "$machine_age.4005.desc.start$ 신체를 초월한 알고리즘 연산으로 전환한 것입니다.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.a.nanotech: "우리는 별들보다 무수한 존재가 될 것입니다."
 machine_age.4005.a.nanotech.tt: "전통 트리 채택: ['tradition_category:tradition_nanotech']"
 machine_age.4005.a.modularity: "우리는 한계가 없는 존재가 될 것입니다."
 machine_age.4005.a.modularity.tt: "전통 트리 채택: ['tradition_category:tradition_modularity']"
 machine_age.4005.a.virtuality: "우리는 코드 안에서 순수성을 찾을 것입니다."
 machine_age.4005.a.virtuality.tt: "전통 트리 채택: ['tradition_category:tradition_virtuality']"
 ### TRANSFORMATION SITUATION END ###