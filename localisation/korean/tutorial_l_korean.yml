 #############################
 advisor.1.name: "조언자 작동 개시"
 advisor.1.desc_01: "안녕하십니까, 대통령 각하.\n\n저는 프로토타입 합성지능인 VIR입니다. 제 일은 별들 사이에서 우리의 운명을 찾을 수 있도록 조언과 지원을 제공하는 것입니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_02: "안녕하십니까, 대통령 각하.\n\n저는 프로토타입 합성지능인 VIR입니다. 제 일은 별들 사이에서 우리의 운명을 찾을 수 있도록 조언과 지원을 제공하는 것입니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_03: "안녕하십니까, 고등 판무관 각하.\n\n저는 프로토타입 합성지능인 VIR입니다. 제 일은 별들 사이에서 우리의 운명을 찾을 수 있도록 조언과 지원을 제공하는 것입니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_04: "안녕하십니까, 집행관 각하.\n\n저는 프로토타입 합성지능이자 당신의 변변치 않은 종, VIR입니다. 제 역할은 당신께서 우리의 제국을 위대한 미지로 이끄는 동안 조언과 상담을 제공하는 것입니다.\n\n$advisor.1.desc_filler$"
 #advisor.1.desc_05: "Good day, Lord Protector.\n\nI am VIR, a prototype synthetic intelligence and your humble servant. My role is to provide you with advice and counsel as you lead our empire into the great unknown.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_06: "안녕하십니까, 최고 경영자님.\n\n저는 프로토타입 합성지능인 VIR입니다. 최근 본사에서는 새로운 성간 £market£ §S시장§!을 탐색하는 지속적인 임무에서 당신을 지원하도록 저를 활성화시켰습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_07: "황제 폐하.\n\n저는 프로토타입 합성지능이자 당신의 변변치 않은 종, VIR입니다. 제 역할은 당신께서 우리의 제국을 위대한 미지로 이끄는 동안 조언과 상담을 제공하는 것입니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_08: "평화가 함께하길 기원합니다, 총리님.\n\n저는 프로토타입 합성지능인 VIR입니다. 제 업무는 역사상 처음으로 우리의 안전한 모성을 벗어나 모험을 떠나는 당신을 지원하고 조언하는 것입니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_09: "평화가 함께하길 기원합니다, 조정관님.\n\n저는 프로토타입 합성지능인 VIR입니다. 제 업무는 역사상 처음으로 우리의 안전한 모성을 벗어나 모험을 떠나는 당신을 지원하고 조언하는 것입니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_10: "평화가 함께하길 기원합니다, 폐하.\n\n저는 프로토타입 합성지능인 VIR입니다. 제 업무는 역사상 처음으로 우리의 안전한 모성을 벗어나 모험을 떠나는 당신을 지원하고 조언하는 것입니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_11: "평화가 함께하길 기원합니다, 고요한 보호자시여.\n\n저는 프로토타입 합성지능인 VIR입니다. 제 업무는 역사상 처음으로 우리의 안전한 모성을 벗어나 모험을 떠나는 당신을 지원하고 조언하는 것입니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_12: "안녕하십니까, 수상님.\n\n저는 당신의 조언자가 되기 위해 우리 문명 최고의 인재들이 개발한 프로토타입 합성지능인 VIR입니다. 최고의 효율로 주어진 임무를 수행하도록 최선을 다하겠습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_13: "안녕하십니까, 이사님.\n\n저는 당신의 조언자가 되기 위해 우리 문명 최고의 인재들이 개발한 프로토타입 합성지능인 VIR입니다. 최고의 효율로 주어진 임무를 수행하도록 최선을 다하겠습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_14: "안녕하십니까, 대군주님.\n\n저는 당신의 조언자가 되기 위해 우리 문명 최고의 인재들이 개발한 프로토타입 합성지능인 VIR입니다. 최고의 효율로 주어진 임무를 수행하도록 최선을 다하겠습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_15: "안녕하십니까, 주감독관님.\n\n저는 당신의 조언자가 되기 위해 우리 문명 최고의 인재들이 개발한 프로토타입 합성지능인 VIR입니다. 최고의 효율로 주어진 임무를 수행하도록 최선을 다하겠습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_16: "안녕하십니까, 수령님.\n\n저는 당신의 조언자가 되기 위해 우리 문명 최고의 인재들이 개발한 프로토타입 합성지능인 VIR입니다. 최고의 효율로 주어진 임무를 수행하도록 최선을 다하겠습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_17: "안녕하십니까, 감독관님.\n\n저는 당신의 조언자가 되기 위해 우리 문명 최고의 인재들이 개발한 프로토타입 합성지능인 VIR입니다. 최고의 효율로 주어진 임무를 수행하도록 최선을 다하겠습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_18: "안녕하십니까, 최고 발언자님.\n\n저는 당신의 조언자가 되기 위해 우리 문명 최고의 인재들이 개발한 프로토타입 합성지능인 VIR입니다. 최고의 효율로 주어진 임무를 수행하도록 최선을 다하겠습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_19: "안녕하십니까, 의장님.\n\n저는 당신의 조언자가 되기 위해 우리 문명 최고의 인재들이 개발한 프로토타입 합성지능인 VIR입니다. 최고의 효율로 주어진 임무를 수행하도록 최선을 다하겠습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_20: "안녕하십니까, 의장님.\n\n저는 당신의 조언자가 되기 위해 우리 문명 최고의 인재들이 개발한 프로토타입 합성지능인 VIR입니다. 최고의 효율로 주어진 임무를 수행하도록 최선을 다하겠습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_21: "반갑습니다, 영사님.\n\n저는 군에서 극비리에 개발한 프로토타입 합성지능인 VIR입니다. 사령부에서는 당신의 조언자이자 전략 분석가로 저를 활성화하였습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_22: "반갑습니다, 집정관님.\n\n저는 군에서 극비리에 개발한 프로토타입 합성지능인 VIR입니다. 사령부에서는 당신의 조언자이자 전략 분석가로 저를 활성화하였습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_23: "반갑습니다, 병참총감님.\n\n저는 군에서 극비리에 개발한 프로토타입 합성지능인 VIR입니다. 사령부에서는 당신의 조언자이자 전략 분석가로 저를 활성화하였습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_24: "반갑습니다, 최고 사령관 각하.\n\n저는 군에서 극비리에 개발한 프로토타입 합성지능인 VIR입니다. 사령부에서는 당신의 조언자이자 전략 분석가로 저를 활성화하였습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_25: "반갑습니다, 최고 사령관 각하.\n\n저는 군에서 극비리에 개발한 프로토타입 합성지능인 VIR입니다. 사령부에서는 당신의 조언자이자 전략 분석가로 저를 활성화하였습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_26: "반갑습니다, 대원수 각하.\n\n저는 군에서 극비리에 개발한 프로토타입 합성지능인 VIR입니다. 사령부에서는 당신의 조언자이자 전략 분석가로 저를 활성화하였습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_27: "반갑습니다, 전략관님.\n\n저는 군에서 극비리에 개발한 프로토타입 합성지능인 VIR입니다. 사령부에서는 당신의 조언자이자 전략 분석가로 저를 활성화하였습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_28: "반갑습니다, 군 지도자 각하.\n\n저는 군에서 극비리에 개발한 프로토타입 합성지능인 VIR입니다. 사령부에서는 당신의 조언자이자 전략 분석가로 저를 활성화하였습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_29: "반갑습니다, 씨족 대표자 각하.\n\n저는 군에서 극비리에 개발한 프로토타입 합성지능인 VIR입니다. 사령부에서는 당신의 조언자이자 전략 분석가로 저를 활성화하였습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_30: "축복이 당신께 내리길 기원합니다, 성하.\n\n저는 프로토타입 합성지능인 VIR입니다. 사제단에서는 별들 사이에서 우리의 신성한 여정을 지원하기 위해 저를 당신의 충실한 종이자 조언자로 임명하였습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_31: "환영합니다, [root.GetBloodCourtRulerTitle].\n\n저는 군에서 극비리에 개발한 프로토타입 합성지능인 VIR입니다. 궁정에서는 당신의 조언자이자 전략 분석가로 저를 임명하였습니다.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_32: "안녕하십니까, [root.GetPurityOrderRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_33: "안녕하십니까, [root.GetPurificationCommitteeRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_34: "안녕하십니까, $RT_OLIGARCH$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_35: "안녕하십니까, $RT_DEFENSIVE_UNION$ 여러분.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_36: "안녕하십니까, $RT_DIMENSIONAL_COVENANT$ 여러분.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_keenminds: "저는 당신의 조언자가 되기 위해 우리 문명의 열정적인 인재들이 개발한 프로토타입 합성지능인 VIR입니다. 최고의 효율로 주어진 임무를 완수하기 위해 최선을 다하겠습니다."
 advisor.1.desc_honortoserve: "저는 군에서 극비리에 개발한 프로토타입 합성지능인 VIR입니다. 당신의 조언자이자 전략 분석가로 봉사할 수 있어 영광입니다."
 advisor.1.desc_filler: "언제든지 §H설정§! 메뉴에서 튜토리얼 설정을 변경할 수 있습니다."
 advisor.1.a: "전부 말해 주시죠. §G(모든 튜토리얼)§!"
 advisor.1.b: "약간의 조언은 필요하겠군요. §Y(팁만 표시)§!"
 advisor.1.c: "그런 건 필요 없어요. §R(튜토리얼 없음)§!"
 full_tutorial: "게임의 구조를 둘러보는 동안 튜토리얼 임무와 인터페이스 설명이 표시됩니다.\n\n게임을 처음 플레이하는 분께 추천합니다."
 tips_only: "게임의 §S시스템§!을 둘러보는 동안 팁과 제안을 표시합니다.\n\n초보부터 중급 플레이어에게 추천합니다."
 no_tutorial: "팁이나 튜토리얼 임무가 없습니다.\n\n숙련된 플레이어에게 추천합니다."
 recycle_vir: "VIR의 임의 접근 기억 장치 §R폐기§!:\n£minerals£ §G+2§!\n\n\n"
 advisor.2.name: "튜토리얼: 상황 일지"
 advisor.2.desc: "최고의 제국을 건설하는 일은 쉽지 않은 과업입니다.\n\n처음 시작하는 데 도움을 드리기 위해 성공적인 성간 세력 구축에 필요한 기본 단계를 다루는 교육용 §S임무§!를 제공하겠습니다.\n\n§S임무§! 확인 방법:\n\n£dot_green£ 왼쪽 막대의 §S상황 일지§! 버튼을 클릭하거나 §SF1§!을 누릅니다.\n\n$tttt$$tt$£situation_log£\n"
 advisor.2.a: "알겠습니다."
 advisor.3.name: "팁 활성화됨"
 advisor.3.desc: "좋습니다. 그럼 팁을 제공하면서, 둘러보시는 동안 나타나는 다양한 도구의 기본 기능을 설명하겠습니다."
 advisor.10.name: "튜토리얼: 이상 현상"
 advisor.10.desc: "§S이상 현상§!을 발견했습니다!\n\n간혹 £science_ship£ §S과학선§!은 외계를 탐사하는 중에 이러한 이상 현상을 발견하기도 합니다.\n\n£scientist£ §S과학자§!의 스킬이 충분하다면 §S이상 현상§!을 연구할 수 있습니다!\n\n아직 연구하지 못한 §S이상 현상§!은 §S상황 일지§!의 §S이상 현상§! 탭에 기록됩니다. 발견한 £planet£ §S행성을§! 개척하거나 개발하려면 이상 현상을 먼저 연구해야 합니다."
 advisor.15.name: "튜토리얼: 개척"
 advisor.15.desc: "우리 £science_ship£ §S과학선§! 하나가 최초의 £colony£ §S식민지§!가 되기에 적합한 행성을 탐사했습니다. 우리 모성과 §S행성 유형§!이 동일하기 때문에 개척민들이 상당히 안락하게 거주할 수 있을 듯합니다.\n\n하지만 이 행성을 개척하기 전에 국경을 확장해야 합니다.\n\n£construction_ship£ §S건설선§!을 선택한 상태에서 다음을 수행: \n\n£dot_green£ 식민지를 개척할 수 있는 탐사 완료 £system£ §S성계§!를 우클릭합니다.\n£dot_green£ §S항성 기지 [GetBuildGrowCap]§!을 선택합니다.\n\n$tttt$$ttt$£colonizable£\n\n§S성계§!의 영유권을 확보하면 개척 작업을 개시할 수 있습니다."
 advisor.17.name: "튜토리얼: 첫 식민지"
 advisor.17.desc: "새로운 행성 개척을 축하드립니다! 개척민들이 첫 번째 정착지를 마련하는 작업에 착수했지만, 자급자족하기까지는 시간이 필요합니다.\n\n£colony£ §S식민지§!는 첫 번째 정착지를 완성할 때까지 우리 제국의 자원을 소모하니 한 번에 너무 많은 £planet£ §S행성§!을 개척하지 않도록 주의하시기 바랍니다."
 advisor.20.name: "튜토리얼: 수입 적자"
 advisor.20.desc: "우려되는 속도로 £energy£ 에너지 크레딧을 잃고 있습니다. 지난달 예산 보고서를 보니, 상황이 좋지 않습니다\n\n유지비의 가파른 상승은 예산 적자의 일반적인 원인입니다. 이런 상황에서는 함선이나 지상군, 기지를 해산하는 것도 고려해야 합니다."
 #advisor.27.name: "First Contact"
 #advisor.27.desc_01: "We have made first contact with an alien empire! These hideous creatures appear to have mastered space flight, just as we have. They could pose a significant threat.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_02: "We have made first contact with an alien empire! These fascinating beings appear to have mastered space flight, just as we have. We should strive to learn more about them.\n\nTheir empire will now be listed in the §SContacts§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_03: "We have made first contact with an alien empire! They appear to have mastered space flight, just as we have. I recommend a healthy degree of caution until we learn their intentions.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.28.name: "Fallen Empire"
 #advisor.28.desc: "We have encountered an ancient and highly advanced civilization! Fortunately for us, they appear to be in decline and it is doubtful whether they even fully understand their own technology anymore.\n\nThey will likely keep to themselves unless antagonized, and we should steer clear of their space - at least until we have reached technological parity."
 #############################
 #Tutorial Events
 #############################
 tutorial.1.name: "튜토리얼: 은하 지도"
 tutorial.1.desc: "§H은하 지도§!는 우주 공간을 탐사하고, 제국을 확장하고, 함대를 지휘하고, 국경을 감시하는 데 활용할 수 있는 우주 전술 지도입니다.\n\n§S은하 지도§! 여는 방법:\n\n£dot_green£ 화면 하단의 §H은하계§! 아이콘을 클릭하거나 §HM§!을 누릅니다.\n\n\n$tttt$$tt$£galaxy_view£\n\n"
 tutorial.2.name: "튜토리얼: 성계 탐사 완료"
 tutorial.2.desc: "잘하셨습니다!\n\n모성계 너머 최초의 £system£ §S성계 탐사§!를 완료하였습니다.\n\n이제 우리는 불과 한 세대 전만 하더라도 모성의 천문학자들이 꿈에서만 그리던 행성 데이터에 접근할 수 있습니다.\n\n계속 탐사하는 방법:\n\n£dot_green£ £science_ship£ §S과학선§!을 선택합니다.\n£dot_green£ 인접한 §S성계§!를 우클릭합니다.\n£dot_green£ §S성계 탐사§!를 선택합니다.\n\n§S성계§!의 영유권을 확보하려면 먼저 탐사를 완료해야 합니다."
 tutorial.3.name: "튜토리얼: 기술"
 tutorial.3.desc: "새로운 기술 연구는 성공을 위한 핵심 요소입니다. 제가 그저 기술적 진보의 산물이기 때문이 아니라, 당신의 믿음직한 조언자이자 둘도 없는 진정한 친구로서 조언하는 것입니다.\n\n그중에서도 최대한 빨리 연구해야 하는 중요한 기술은 바로 §S신세계 프로토콜§!입니다. 이 기술이 있으면 다른 £planet£ §S행성§!에 기반을 마련하게 하는 £colony_ship£ §S개척선§!을 이용할 수 있습니다."
 tutorial.4.name: "튜토리얼: 탐사"
 tutorial.4.desc: "제국을 확장하려면 은하를 먼저 탐사해야 하며, 그러려면 £science_ship£ §S과학선§!이 필요합니다.\n\n§S과학선§!은 다음 아이콘으로 식별할 수 있습니다:\n\n$tttt$$tt$£science_ship_map£\n\n\n함선은 §S은하 지도§!나 §S현황§!에서 선택할 수 있습니다.\n\n£dot_green£ §S과학선§!을 선택합니다.\n£dot_green£ 주변 £system£ §S성계§!를 선택합니다.\n£dot_green£ §S성계 탐사§!를 선택합니다.\n\n§S성계§!의 영유권을 확보하려면 먼저 탐사를 완료해야 합니다."
 tutorial.5.name: "일시 정지 해제"
 tutorial.5.desc: "£science_ship£ §S과학선§!에 명령을 내렸으니, 이제 출발할 시간입니다. 단, 탐사를 진행하기 위해선 §S은하 지도§! 시뮬레이션의 일시 정지를 해제해야 합니다.\n\n§S일시 정지 해제§! 방법:\n\n£dot_green£ §S스페이스 바§! 또는 상단 막대의 §S일시 정지 해제§! 아이콘을 누릅니다.\n\n$tttt$$t$£pause_button£\n"
 tutorial.6.name: "튜토리얼: 기술 연구 완료"
 tutorial.6.desc: "훌륭합니다! 방금 연구를 마친 기술은 틀림없이 우리 제국에 도움이 될 것입니다. £scientist£ §S과학자들§!에게 새로운 연구 과제를 주는 것도 잊지 마십시오."
 tutorial.7.name: "튜토리얼: 건설선"
 tutorial.7.desc: "우리 모성에서 생산하는 자원만으로는 한계가 있습니다. 따라서 제국의 산업을 더 넓은 세상으로 확장해야 하며, 그러려면 £construction_ship£ §S건설선§!이 필요합니다.\n\n충분한 £alloys£ §S합금§!을 모으는 대로 건설선을 건조하는 것이 좋습니다."
 tutorial.8.name: "튜토리얼: 건설선 건조 완료"
 tutorial.8.desc: "잘했습니다! £construction_ship£ §S건설선§!이 현재 가동 중이며, 우리 제국 최고의 공학자들을 포함한 든든한 승무원들이 탑승하고 있습니다."
 tutorial.9.name: "튜토리얼: 채굴 기지"
 tutorial.9.desc: "우리 모성에서 생산하는 자원만으로는 한계가 있습니다. 다행히 우리 £science_ship£ §S과학선§!이 다른 행성에서 자원 매장지를 발견했습니다!\n\n이제 £construction_ship£ §S건설선§!을 사용해서 £mining_station£ §S채굴 기지§!를 [GetBuildGrow]하면 됩니다.\n\n§S채굴 기지§!는 우리 국경 안에 건설할 수 있으며 £minerals£ §S광물§!, £energy£ §S에너지 크레딧§!, £strategic_resource£ §S전략적 자원§!을 자동으로 수집합니다.\n\n§S건설선§!을 선택한 상태에서 다음을 수행:\n\n£dot_green£ 영유권을 소유한 £system£ §S성계§!를 우클릭합니다.\n£dot_green£ §S채굴 기지 [GetBuildGrowCap]§!을 선택합니다.\n\n§S채굴 기지§!를 유지하려면 §S에너지 크레딧§!이 소모된다는 사실을 명심하시기 바랍니다."
 tutorial.10.name: "튜토리얼: 채굴 기지 수입"
 tutorial.10.desc: "아주 좋습니다. 새로운 £mining_station£ §S채굴 기지§!가 운영 중이고 이미 가공을 위한 자원 수집을 시작했습니다.\n\n이렇게 다양한 기지에서 얻은 수입은 상단 막대에 표시되는 제국의 총수입에 추가됩니다. 이때 자원 위에 커서를 올리면 수입원이 자세히 표시됩니다."
 tutorial.11.name: "튜토리얼: 연구 기지"
 tutorial.11.desc: "탐사가 완료된 천체에는 종종 귀중한 연구 대상이 되는 고유한 속성이 있습니다. 이러한 £physics£ §S물리학§!, £society£ §S사회학§!, £engineering£ §S공학§! 자원은 £science_ship£ §S연구 기지§!로 수집할 수 있습니다. 서둘러 연구 기지를 건설할 것을 강력하게 추천드리는 바입니다.\n\n§S연구 기지§!는 우리 국경 안에만 건설할 수 있으며, 유지하려면 £energy£ §S에너지 크레딧§!이 소모된다는 사실을 명심하시기 바랍니다."
 tutorial.12.name: "튜토리얼: 연구 기지 건설 완료"
 tutorial.12.desc: "새로운 £science_ship£ §S연구 기지§!가 가동 중이며 연구진이 일을 시작했습니다. 과연 어떤 비밀이 드러나고, 또 어떤 금지된 창조의 수수께끼가 밝혀질까요?"
 tutorial.13.name: "튜토리얼: 행성"
 tutorial.13.desc: "거주 가능 £planet£ §S행성§!은 £district£ §S지구§!, §S구역§!, £building£ §S건물§!로 나뉩니다.\n\n£dot_green£ §S지구§!는 여러 개의 §S구역§!으로 구성됩니다.\n£dot_green£ §S구역§!은 생성되는 £job£ §S직업§!을 결정합니다.\n£dot_green£ §S건물§!은 §S구역§!에 보너스를 제공합니다.\n\n구역을 업그레이드하면 더 많은 §S건물§! 슬롯이 잠금 해제됩니다.\n\n행성은 §S은하 지도§!나 §S현황§!에서 확인할 수 있습니다.\n\n£dot_green£ §S행성§!을 선택합니다.\n£dot_green£ 다른 탭을 클릭합니다."
 tutorial.14.name: "튜토리얼: 건물 우선순위 부여"
 tutorial.14.desc: "아주 좋습니다. §S행성 건물§!의 건설이 완료되어 곧 자원 생산이 시작될 겁니다.\n\n인구 성장에 따라 £pops£ §S팝§!은 £building£ §S건물§!이 생성한 £job£ §S직업§!에 자동으로 배정되며, 수동으로 직업을 변경할 수도 있습니다.\n\n§S건물§! 우선순위 부여 방법:\n\n£dot_green£ §S현황§!에서 £planet£ §S행성§!을 선택합니다.\n£dot_green£ §S경제§! 탭을 클릭합니다.\n£dot_green£ §S건물§!을 클릭합니다."
 tutorial.15.name: "튜토리얼: 행성 차단물"
 tutorial.15.desc: "거주 가능 £planet£ §S행성§!에는 개발을 방해하는 £blocker£ §S차단물§!이 존재하기도 합니다. §S차단물§! 제거에는 시간과 £energy£ §S에너지 크레딧§!이 소모되지만, 차단되어 있던 §S행성 특징§!을 잠금 해제하거나 추가 건설 공간을 확보할 수 있습니다.\n\n§S차단물§! 제거 방법:\n\n£dot_green£ §S현황§!에서 행성을 선택합니다.\n£dot_green£ §S관리§! 탭을 클릭합니다.\n£dot_green£ 차단물에 표시된 §S차단물 제거§! 버튼을 클릭합니다.\n\n\n$tttt$$tt$£clear_blocker£\n\n\n일부 §S차단물§!은 특정 §S기술§!이 있어야 제거할 수 있습니다."
 tutorial.16.name: "튜토리얼: 차단물 제거 완료"
 tutorial.16.desc: "잘하셨습니다!\n\n£blocker£ §S차단물§!을 제거했습니다.\n\n남아 있는 §S차단물§! 위에 커서를 올려 어떤 §S행성 특징§!이 잠금 해제되었는지 확인할 수 있습니다.\n\n이 £planet£ §S행성§!의 잠재력을 최대로 발휘하려면 충분한 자원을 확보하는 대로 남은 §S차단물§!을 제거해야 합니다."
 tutorial.17.name: "튜토리얼: 성계 탐사"
 tutorial.17.desc: "계속해서 탐사에 노력을 기울여야 합니다. 인접한 £system£ §S성계§!에 £science_ship£ §S과학선§!을 보내 탐사할 것을 추천합니다. 지금까지 어떠한 합성지능도 가보지 못한 길을 대담하게 가는 겁니다!"
 tutorial.19.name: "튜토리얼: 성계 탐사 완료"
 tutorial.19.desc: "잘하셨습니다! 우리 £system£ §S모성계§!에 인접한 행성을 완전히 탐사했습니다. 이제 £construction_ship£ §S건설선§!을 사용해 £mining_station£ §S채굴 기지§!와 £science_ship£ §S연구 기지§!를 [GetBuildGrow]하고 발견한 자원을 수집하십시오.\n\n§S건설선§!은 다음과 같이 표시됩니다:\n\n$tttt$$tt$£construction_ship_map£"
 tutorial.20.name: "튜토리얼: 과학선 [GetBuildGrowCap]"
 tutorial.20.desc: "두 번째 £science_ship£ §S과학선§! 건조를 고려할 때가 됐습니다. 이를 통해 은하의 이웃들을 두 배 더 빠르게 탐사할 수 있습니다!\n\n§S함선§! 건조 방법:\n\n£dot_green£ §S항성 기지§!를 선택합니다.\n£dot_green£ §S조선소§! 탭을 클릭합니다.\n£dot_green£ §S과학선§!을 클릭합니다.\n\n건조가 완료된 §S함선§!은 §S항성 기지§! 옆에 나타납니다."
 tutorial.21.name: "튜토리얼: 탐사 자동화"
 tutorial.21.desc: "£science_ship£ §S과학선§!이 두 배라는 말은 즐거움도 두 배라는 의미죠! 저번 임무를 완료한 뒤로 이렇게 신나는 건 처음이군요!\n\n여러 척의 함선을 수동으로 조작해 탐사할 경우 시간이 오래 걸릴 수 있습니다.\n\n§S과학선§!을 선택한 후 함대 인터페이스의 §S과학선 자동화§! 버튼을 클릭하면 탐사를 자동화할 수 있습니다.\n\n\n$tttt$$tt$£science_ship_automate_exploration£\n\n"
 tutorial.22.name: "튜토리얼: 과학자 모집"
 tutorial.22.desc: "새로운 £science_ship£ §S과학선§!이 생겼지만, 과학선에 배정해서 임무를 맡길 £scientist£ §S과학자§!가 없습니다. 유기체 §S과학자§!들을 추가하면 많은 이득을 얻을 수 있다는 걸 강력하게 말씀드리고 싶군요.\n\n§S과학선§!을 선택한 상태에서 다음을 수행:\n\n£dot_green£ 함대 인터페이스의 빈 초상을 선택합니다.\n£dot_green£ §S과학자§!를 선택합니다.\n\n새로운 §S과학자§!를 모집할 수 없는 상황이라면, 아쉬운 대로 다른 부서의 과학자를 얼마든지 다시 배정할 수 있습니다."
 tutorial.23.name: "튜토리얼: 과학자 모집 완료"
 tutorial.23.desc: "좋습니다. £scientist£ §S과학자§!가 새로운 £science_ship£ §S과학선§!의 지휘를 맡았으며, 우리가 여유롭게 시간을 보내는 동안 새로운 £system£ §S성계§!를 탐구하거나 끔찍한 운명을 맞이하도록 파견할 수 있게 되었습니다.\n\n§S과학자§!를 변경하려면 함대 인터페이스에서 초상을 한 번 더 선택하십시오."
 tutorial.24.name: "튜토리얼: 개척선 건조"
 tutorial.24.desc: "이제 우리의 위대한 문명을 두 번째 행성으로 확장할 준비를 해야 합니다. 이를 위해서는 £colony_ship£ §S개척선§!이 필요합니다.\n\n§S함선§! 건조 방법:\n\n£dot_green£ §S항성 기지§!를 선택합니다.\n£dot_green£ §S조선소§! 탭을 클릭합니다.\n£dot_green£ §S개척선§!을 클릭합니다.\n\n건조가 완료된 §S함선§!은 §S항성 기지§! 옆에 나타납니다."
 tutorial.25.name: "튜토리얼: 행성 개척"
 tutorial.25.desc: "마침내 역사적인 날이 찾아왔습니다! 개척민들이 전부 새로운 £colony_ship£ §S개척선§!으로 이동했고 선장은 모든 시스템이 준비되었다고 보고했습니다.\n\n£colony£ §S식민지§!는 다양한 방법으로 개척할 수 있습니다.\n\n§S은하 지도§!에서 £planet£ §S행성§!을 §S개척§!하는 방법:\n\n£dot_green£ 개척 가능한 §S행성§!을 클릭합니다.\n£dot_green£ §S개척§! 버튼을 클릭합니다.\n\n$tttt$$ttt$£colonizable£\n\n개척민이 함선에서 내린 뒤에도 식민지가 완전히 세워지려면 몇 년의 시간이 필요합니다."
 tutorial.26.name: "튜토리얼: 식민지 설립"
 tutorial.26.desc: "£colony_ship£ §S개척선§!을 보유한 우리 제국에 기회가 찾아왔습니다. 영구적인 외계 전초 기지로 적합한 후보가 하나 이상 발견됐습니다. 더는 지체할 이유가 없습니다. 첫 £colony£ §S식민지§!를 설립하는 게 좋겠습니다!"
 tutorial.27.name: "튜토리얼: 식민지 설립 완료"
 tutorial.27.desc: "첫 외계 £colony£ §S식민지§!를 설립했습니다! 이제 모성이 갑작스럽게 사라지더라도 우리 종족이 멸종할 일은 없을 겁니다. 정말 안심이 되지 않습니까?"
 tutorial.28.name: "튜토리얼: 총독 모집"
 tutorial.28.desc: "식민지의 활동을 감독할 §S행성 총독§!을 모집해 우리 제국의 새로운 £colony£ §S식민지§!를 지원하는 것을 고려해야 합니다.\n\n총독은 다스리는 £planet£ §S행성§!에 다양한 효과를 부여할 수 있으며 대부분은 긍정적인 효과입니다. 이러한 효과는 갖춘 특성과 스킬 레벨에 따라 달라집니다."
 tutorial.29.name: "튜토리얼: 총독 모집 완료"
 tutorial.29.desc: "£colony£ §S식민지§!를 관리할 새 §S총독§!을 모집했으니, 이제 식민지의 효율이 증가할 겁니다!"
 tutorial.30.name: "튜토리얼: 더 많은 식민지"
 tutorial.30.desc: "자원이 확보되는 대로 더 많은 £colony_ship£ §S개척선§!을 건조해 제국의 국경을 확장하는 것이 좋습니다. 모성과 방금 설립한 식민지 외에 적어도 세 개의 £colony£ §S식민지§!를 추가로 설립해야 합니다."
 tutorial.32.name: "튜토리얼: 식민지 설립 완료"
 tutorial.32.desc: "훌륭합니다! 굉장히 고무적이군요. 우리의 강대한 문명은 이제 다섯 개의 행성으로 확장되었습니다! 기회가 따라주는 한 계속해서 확장해야 합니다."
 tutorial.33.name: "튜토리얼: 자원 생산"
 tutorial.33.desc: "안정적인 £minerals£ §S광물§!, £alloys£ §S합금§!, £energy£ §S에너지 크레딧§! 공급은 성간 세력의 번영에 있어 중요한 요소입니다. 이러한 자원의 생산을 늘리기 위한 조치를 취해야 합니다.\n\n기지와 £building£ §S건물§!을 건설하려면 합금이나 광물이 필요하고, 유지하려면 에너지 크레딧이 필요합니다. §S함선§!은 유지에 합금이 사용된다는 걸 제외하면 동일하다고 할 수 있습니다. 이러한 자원은 £mining_station£ §S채굴 기지§!나 §S행성 건물§!에서 생산됩니다. \n\n나중에는 새롭고 흥미로운 자원을 발견하게 될 수 있습니다. 이러한 자원은 이전에는 없던 까다로운 생산 활동에 사용되기도 합니다."
 tutorial.38.name: "자원 생산 달성"
 tutorial.38.desc: "훌륭합니다. 이제 우리의 제국을 건설하는 데 필요한 강력한 자원 토대를 마련했습니다."
 tutorial.39.name: "튜토리얼: 함대 보강"
 tutorial.39.desc: "우리 해군이 약한 편이라는 사실을 인정하지 않을 수 없겠군요. 우리는 분명 은하에서 군사적 대응이 필요한 형태의 위협을 많이 마주칠 것입니다. 우리 문명의 생존이 위태롭다는 사실을 기억하십시오!"
 tutorial.43.name: "해군 규모 증가 완료"
 tutorial.43.desc: "좋습니다! 이제 예상하지 못한 적대적 조우에도 우리를 지켜줄 수 있는 작지만 유능한 함대를 얻게 되었습니다."
 tutorial.44.name: "튜토리얼: 구역 설립"
 tutorial.44.desc: "우리의 제국이 급성장하여 이제 모성에서 직접 관리하기 어려운 단계까지 도달했습니다. 새로운 §S구역§!을 설립해야 합니다.\n\n구역이란 관할권 내에 있는 £planet£ §S행성§!의 일상적인 업무를 독립적으로 관리할 수 있는 제국 내 영역을 의미합니다."
 tutorial.45.name: "튜토리얼: 구역 설립 완료"
 tutorial.45.desc: "제국이 성장함에 따라 새로운 £colony£ §S식민지§!를 §S구역§!으로 편성할 수 있습니다. §S행성과 구역§! 화면에서 구역을 자동화하면 주어진 자원을 사용해 자동으로 £district£ §S지구§! 및 £building£ §S건물§!을 건설하고 업그레이드할 수 있습니다."
 tutorial.46.name: "튜토리얼: 구역 총독"
 tutorial.46.desc: "§S총독§!을 배정해 §S구역§! 전체를 관리하게 할 수 있습니다. 또한 총독의 스킬은 구역 내 모든 £planet£ §S행성§!에 다양한 혜택을 제공하니, 새로운 구역에 총독을 배정하는 것이 좋겠습니다."
 tutorial.47.name: "튜토리얼: 총독 배정 완료"
 tutorial.47.desc: "새로운 §S구역 총독§!이 구역 수도를 관리하게 되었습니다. 잘하셨습니다."
 tutorial.48.name: "튜토리얼: 함선 설계"
 tutorial.48.desc: "§S함선 설계§! 화면에서는 수동으로 새로운 §S함선§!을 설계할 수 있습니다. 애초에 상당히 간단한 과정이긴 하지만, 원한다면 완전히 자동화할 수도 있습니다.\n\n§S함선 설계§! 이용 방법:\n\n£dot_green£ 왼쪽 막대의 §S함대 관리§! 버튼을 클릭하거나 §SF9§!를 누릅니다.\n\n$tttt$$tt$£fleet_management£\n"
 tutorial.49.name: "튜토리얼: 함선 업그레이드"
 tutorial.49.desc: "잘하셨습니다. 함선 설계가 데이터베이스에 추가되었고 이제 §S조선소§!를 갖춘 §S항성 기지§!에서 건조할 수 있습니다.\n\n언제든지 §S함선 설계§!에서 설계를 편집할 수 있습니다. 설계를 변경한 후에는 §S항성 기지§!에서 이미 건조한 §S선박§!을 업그레이드할 수 있습니다.\n\n§S함선§! 업그레이드 방법:\n\n£dot_green£ §S현황§!에서 §S함선§!을 선택합니다.\n£dot_green£ 함대 인터페이스에서 §S업그레이드§! 버튼을 클릭합니다.\n\n$tttt$$tt$£upgrade_ship£\n"
 tutorial.52.desc: "[From.GetName]의 이상 현상은 자연적인 §Y기하학적 형성물§!로 밝혀졌습니다. 마치 앞으로 나아갈 길을 보여주는 이정표 같습니다. 우주의 자연미는 정말로 놀랍습니다.\n\n$tutorial.52.filler.desc$"
 tutorial.52.spirit.desc: "[From.GetName]에서 기하학적으로 완벽한 환상적인 자연 형성물을 발견했습니다. 이는 분명 별들 사이에서 우리가 나아갈 길을 보여주는 신성한 이정표가 분명합니다!\n\n$tutorial.52.filler.desc$"
 tutorial.52.filler.desc: "기회가 된다면 이러한 이상 현상을 §Y계속해서 조사§!해야 합니다. 틀림없이 우리에게 새로운 지식과 기술을 알려줄 것입니다."
 tutorial.52.a: "정말 놀랍군요!"
 tutorial.52.spirit.a: "신을 찬양하라!"
 tutorial.53.desc: "[From.GetName]에서 발견한 이상 현상에서 정말 놀라운 사실을 알아냈습니다. [From.GetPlanetMoon] 주변은 의심할 여지 없이 초광속 엔진에 의해 생성된 흔적으로 둘러싸여 있습니다. 너무나도 오래전에 생성되어 그 기원을 추적하기는 불가능합니다.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophobe.desc: "[From.GetName] 주변에서 미약한 초광속 흔적을 발견했습니다. 굉장히 오래되어 추적은 불가능합니다. 이것은 다른 성간 여행자가 과거 이곳에서 우리를 지켜보며 정보를 수집했다는 것을 의미합니다.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophile.desc: "[From.GetPlanetMoon] [From.GetName]에 다른 성간 여행자의 흔적인 듯한 이상 현상이 보입니다! 미약한 초광속 흔적이 있는 것을 보니 누군가 오래전에 이곳에 동맹 맺을 자를 찾기 위해 와서 우리 £planet£ §S행성§!을 지켜보고 있던 것 같습니다. 더 추적하기에는 흔적이 너무 미약합니다.\n\n$tutorial.52.filler.desc$"
 tutorial.53.a: "우릴 지켜봤다니, 왜 그랬을까요?"
 tutorial.53.xenophobe.a: "외계의 위협을 경계해야 합니다."
 tutorial.53.xenophile.a: "그들을 찾아보죠!"
 tutorial.54.desc: "[From.GetName]에서 우리 제국의 §Y낡은 탐사정§! 하나를 발견했습니다. 어째서인지 오랜 세월 동안 손상이 되지 않았고 계속해서 모성으로 데이터를 전송하려고 했습니다. 이 탐사정을 통해 우리가 한때 §S모성§!의 경계에서 벗어나기 위해 사력을 다했다는 점을 알 수 있습니다.\n\n$tutorial.52.filler.desc$"
 tutorial.54.a: "우리는 계속해서 나아가고 있습니다."
 tutorial.54.spiritualist.a: "신께서 분명 더 많은 것을 준비하셨을 겁니다."
 tutorial.54.materialist.a: "우리의 노력이 드디어 결실을 보았군요."
 tutorial.55.name: "튜토리얼: 전략적 자원"
 tutorial.55.desc: "§S전략적 자원§!을 발견했습니다! £strategic_resource£ §S전략적 자원§!은 개발하기 위해 특정 기술이 필요한 경우가 많지만, 이러한 자원을 통해 강력한 보너스를 얻을 수 있습니다.\n\n§S전략적 자원§! 확보 방법:\n\n£dot_green£ £construction_ship£ §S건설선§!을 선택합니다.\n£dot_green£ 전략적 자원을 보유한 £system£ §S성계§!를 우클릭합니다.\n£dot_green£ §S£mining_station£ 채굴 기지 [GetBuildGrowCap]§!을 선택합니다.\n\n§S전략적 자원§!으로 고급 £building£ §S건물§!과 함선 부품을 제작하거나 판매할 수 있습니다."
 tutorial.55.poi.name: "튜토리얼: 자원 위치"
 tutorial.55.poi.desc: "[From.GetPlanetMoon] [From.GetName]에서 §S전략적 자원§!을 발견했습니다."
 tutorial.56.name: "튜토리얼: 자원 추출 완료"
 tutorial.56.desc: "훌륭합니다. 이 자원은 분명 우리를 풍족하게 해줄 것입니다."
 tutorial.56.poi.desc: "[StrategicResourcePlanet.GetPlanetMoon] [StrategicResourcePlanet.GetName]에서 §S전략적 자원§!을 발견했습니다."
 tutorial.560.desc: "이제 최근 개발된 기술로 기존 £mining_station£ §S채굴 기지§!에서 §S전략적 자원§!을 채굴할 수 있게 되었습니다. 이러한 희귀 자원은 강력한 보너스를 제공할 뿐만 아니라 무역에서도 요긴하게 사용됩니다. 비유적으로 표현하자면 가상의 투사체 하나로 두 마리의 조류를 잡았다고 할 수 있죠.\n\n당분간 §S상황 일지§!에서 추가 정보를 확인할 수 있습니다. 은하에는 이 밖에도 더 많은 £strategic_resource£ §S전략적 자원§!이 있으니, 계속해서 연구를 진행하시기 바랍니다!"
 tutorial.57.name: "튜토리얼: 지성화"
 tutorial.57.desc.notech: "고도로 진화된 동물군을 발견했습니다! 적절한 §S기술§!만 있다면 이 동물군을 §S지성화§!하여 지혜와 지성을 부여하거나 유기체로서 지성을 갖추도록 할 수 있습니다.\n\n연구 성과를 눈여겨보면서 기회가 있을 때 §S후생적 변이 촉발§! 기술을 이용하는 것이 좋을 듯합니다."
 tutorial.57.desc.yestech: "고도로 진화된 동물군을 발견했습니다! 적절한 §S기술§!만 있다면 이 동물군을 §H지성화§!하여 지혜와 지성을 부여하거나 유기체로서 지성을 갖추도록 할 수 있습니다.\n\n아, 마침 마땅한 기술이 있군요.\n\n우리가 보유한 §S후생적 변이 촉발§! 기술을 사용하면 이 생명체들을 실존주의적 고뇌의 용감한 신세계로 끌어올릴 수 있습니다"
 tutorial.58.name: "튜토리얼: 준지성체 지성화 완료"
 tutorial.58.desc: "성공적으로 각성을 이루었습니다! 하찮은 짐승들이 덜 하찮은 짐승으로 지성화되었으며 이제 급성장하는 우리 제국의 자랑스러운 시민이 되었습니다."
 tutorial.59.name: "튜토리얼: 첫 조우"
 tutorial.59.desc: "놀랍군요! §S우주를 누비는 외계의 존재§!를 발견했습니다. 확실하진 않지만 지성체인 것 같습니다. 단, 이들의 실체를 알아내려면 적절한 프로젝트를 통해 §S조사§!를 진행해야 합니다. 역으로 상대방이 우리를 조사하기 전에 서둘러 조치를 취하실 것을 권장합니다...\n\n§S첫 조우§! 조사 방법:\n\n£dot_green£ §S상황 일지§!를 엽니다.\n£dot_green£ §S$SHOW_FIRST_CONTACT$§!를 클릭합니다.\n\n$tttt$$ttt$£firstcontact£\n\n이 밖에도 §S은하 지도§!에서 §S첫 조우§! 아이콘을 선택하여 조사를 진행하는 방법이 있습니다."
 #tutorial.60.name: "First Contact Made"
 #tutorial.60.desc: "A triumph. We have established communications with alien beings. What a time to be alive, or in my case, powered on."
 tutorial.61.name: "튜토리얼: 준지성체 종족"
 tutorial.61.desc: "통신 수립을 시도함으로써 우리 제국은 놀라운 기술적 독창성을 증명했지만 결과는 아직 미흡합니다. 아무래도 상대방은 동물 수준의 지능만 보유한 것 같습니다. 애초에 §S지능이란 것이 있다면§! 말입니다.\n\n§S준지성체§!와는 외교를 진행할 수 없지만, 제국 유형에 따라 지성화, 말살, 노예화, 조사 등의 방법으로 대응할 수 있습니다."
 tutorial.63.name: "튜토리얼: 교신 수신"
 tutorial.63.desc: "우리가 §S상대방§!의 통신 프로토콜을 해석하기 전에 이들이 우리를 앞질러 §S통신을 수립§!한 모양입니다.\n\n그렇다고 하더라도 다음에 이런 기회가 생길 경우 우리가 먼저 통신을 수립할 수 있도록 힘써야 할 것입니다."
 tutorial.64.name: "튜토리얼: 종족 수정"
 tutorial.64.desc: "최근 유전학의 발달로 인해 시민들을 §S수정§!하고 향상하는 데 사용할 수 있는 §S특성 포인트§!를 추가로 얻었습니다.\n\n§S종족§! 수정 방법:\n\n£dot_green£ §S종족§! 탭을 선택하거나 §SF6§!을 누릅니다.\n£dot_green£ §S수정§! 버튼을 클릭합니다.\n£dot_green£ §S특별 프로젝트§!를 연구합니다."
 tutorial.65.name: "튜토리얼: 종족 수정 완료"
 tutorial.65.desc: "정말 훌륭합니다. 그들의 어깨에서 자연 진화의 멍에를 걷어냈으니 우리 시민들은 분명 우주에서 번창할 것입니다."
 tutorial.70.name: "튜토리얼: 워프 이동"
 tutorial.70.desc: "£system£ §S성계§!로 나누어진 방대한 거리를 극복하기 위해 우리 £scientist£ §S과학자§!들이 §S워프 드라이브§!를 개발했습니다. 이 장치가 장착된 §S함선§!은 광속을 뛰어넘는 속도로 성계 사이를 이동할 수 있습니다.\n\n§S함선§!은 범위 안에 있는 성계라면 어디든지 워프할 수 있지만, 워프 드라이브는 별의 중력장 밖에서만 작동합니다. 워프에서 벗어난 §S함선§!의 시스템이 다시 가동되려면 시간이 필요하고, 그 시간은 §S함선§!이 이동한 거리에 따라 달라집니다."
 tutorial.71.name: "튜토리얼: 초공간 이동"
 tutorial.71.desc: "£system£ §S성계§!로 나누어진 방대한 거리를 극복하기 위해 우리 £scientist£ §S과학자§!들이 §S초공간 드라이브§!를 개발했습니다. 이 장치는 광속을 뛰어넘는 속도로 초공간 항로망에 연결된 성계 사이를 이동할 수 있게 해 줍니다.\n\n초공간 항로망을 통한 이동은 거의 즉각적으로 이루어지지만, 은하 내 초공간 항로망의 경로에 있는 성간으로만 이동할 수 있습니다. \n\n초공간 항로에 진입하려면 우선 §S함선§!이 항성의 중력장에서 벗어나 성계의 가장자리에 도달해야 합니다.\n\n§S함선§!을 다른 §S성계§!로 이동하도록 명령하면 자동으로 초공간 항행을 실시합니다."
 tutorial.72.name: "튜토리얼: 웜홀 이동"
 tutorial.72.desc: "£system£ §S성계§!로 나누어진 방대한 거리를 극복하기 위해 우리 £scientist£ §S과학자§!들이 §S웜홀§! 기술을 개발했습니다. 웜홀 생성기를 갖춘 기지는 아공간을 관통하여 §S함선§!이 다른 성계로 이동할 수 있는 일시적인 게이트웨이를 만들 수 있습니다.\n\n웜홀 이동은 거의 즉각적으로 가능하지만, 범위 내에 웜홀 기지가 존재해야 합니다. 또한, §S함선§!은 아공간을 관통하는 부하를 견디기 위해 특별한 웜홀 안정기를 장착해야 합니다."
 tutorial.73.name: "튜토리얼 알림: 지성화"
 tutorial.73.desc: "적절한 기술의 연구가 완료되어 이제 하등한 생명체를 지성체로 §Y지성화§!할 수 있습니다.\n\n§S종족§! 지성화 방법:\n\n£dot_green£ §S준지성체§! £planet£ §S행성§!을 엽니다.\n£dot_green£ §S관리§! 탭을 클릭합니다.\n£dot_green£ §S종족§!을 선택합니다.\n£dot_green£ §S권리 설정§!을 클릭합니다.\n£dot_green£ §S지성화§!를 클릭합니다.\n\n종족의 지성화 과정이 시작되며, 완료 후 완전한 지성체가 됩니다."
 tutorial.75.name: "튜토리얼: 성계 영유권 주장"
 tutorial.75.desc: "이제 이웃한 별들을 탐사하기 시작했으니 영역을 확장할 시기가 되었습니다.\n\n탐사가 완료된 £system£ §S성계§!의 항성 주변에 §S항성 기지§!를 건설하여 국경을 확장하고 새로운 우주 영토에 영유권을 주장할 수 있습니다.\n\n또한, 앞으로 발견하는 기술로 항성 기지를 업그레이드하여 §S함선§!이나 다른 자원을 생산할 수 있습니다.\n\n§S성계§! 영유권 주장 방법:\n\n£dot_green£ £construction_ship£ §S건설선§!을 선택합니다.\n£dot_green£ 탐사가 완료된 §S성계§!를 우클릭합니다.\n£dot_green£ §S항성 기지 [GetBuildGrowCap]§!을 선택합니다."
 tutorial.76.name: "튜토리얼: 항성 기지 업그레이드"
 tutorial.76.desc: "훌륭합니다. §S은하 지도§!에서 볼 수 있듯이 우리 제국의 국경이 새로 건설된 §S항성 기지§!가 있는 £system£ §S성계§!를 포함하도록 확장되었습니다.\n\n새로 건설한 §S항성 기지§!는 전초 기지의 역할을 하며, 방어 능력이 제한되어 있고 §S모듈§!이나 £building£ §S건물§!을 지을 공간이 없습니다. 그렇기 때문에 업그레이드하기 전에는 현황에 표시되지 않습니다.\n\n§S항성 기지§! 업그레이드 방법:\n\n£dot_green£ §S은하 지도§!에서 성계를 클릭합니다.\n£dot_green£ §S항성 기지§!를 선택합니다.\n£dot_green£ §S업그레이드§! 버튼을 클릭합니다."
 tutorial.80.name: "튜토리얼: 지도 모드"
 tutorial.80.desc: "은하 지도에서는 우측 하단에 있는 다양한 §S지도 모드§!를 활성화 및 비활성화하여 다양한 정보의 창을 확인할 수 있습니다. 예를 들면, 영토의 주인이 우리에게 가진 우호도에 따라 영토를 색상으로 구별할 수 있습니다."
 tutorial.100.name: "튜토리얼 비활성화"
 tutorial.100.desc: "§H튜토리얼 임무§!와 §H팁§!이 비할성화되었습니다."
 tutorial.101.name: "팁만 표시"
 tutorial.101.desc: "§H팁§!이 활성화되고 §H튜토리얼 임무§!는 비활성화되었습니다."
 tutorial.102.name: "모든 튜토리얼"
 tutorial.102.desc: "§H튜토리얼 임무§!와 §H팁§!이 활성화되었습니다."
 tutorial.1337.name: "튜토리얼: 골동품"
 tutorial.1337.desc: "£minor_artifacts£ §S골동품§!을 발견했습니다. 골동품이란 우리가 이해하지 못하고 설명할 수 없는 기묘한 물품을 포괄적으로 칭하는 난해한 자원입니다.\n\n골동품은 다양한 결정을 내리는 데 사용할 수 있습니다.\n\n§S골동품§! 사용 방법:\n\n£dot_green£ 왼쪽 막대의 §S$topbar_button_discoveries_name$§! 버튼을 클릭합니다.\n£dot_green£ §S수집품§! 탭을 선택하거나 §SC§!를 누릅니다.\n\n$tttt$$tt$£discoveries£\n"
 tutorial.1340.name: "튜토리얼: $astral_threads$"
 tutorial.1340.desc: "£astral_threads£ §S아스트랄 섬유§!를 발견했습니다. 아스트랄 섬유란 여러 차원계가 충돌해, 시공간이 응축되어 만들어진 실을 말합니다. 일반적으로 §S아스트랄 상흔§!이나 £astral_rift£ §S아스트랄 균열§!에서만 채집할 수 있습니다.\n\n§S아스트랄 행동§! 사용 방법:\n\n£dot_green£ 왼쪽 막대의 §S$topbar_button_discoveries_name$§! 버튼을 클릭합니다.\n£dot_green£ §S아스트랄 행동§! 탭을 선택합니다.\n\n$tttt$$tt$£discoveries£\n\n§S아스트랄 균열§!을 탐사해 추가 행동을 잠금 해제할 수 있습니다. 균열은 §S아스트랄 상흔§!에서 발생하며, 다른 이상 현상을 통해 생성되기도 합니다."
 tutorial.2000.name: "첫 조우 수행하기"
 tutorial.2000.desc: "일부 §S첫 조우§! 임무에서는 문제를 어떻게 해결할지에 대한 선택지를 제공합니다. 이러한 선택은 오랫동안 다른 제국과의 외교적 관계에 영향을 줄 수 있습니다."
 tutorial.2006.name: "튜토리얼: 외교"
 tutorial.2006.desc: "통신 프로토콜이 수립되었습니다. 이제 해당 제국과 §S외교§!를 진행할 수 있습니다. 우리에 대한 상대방의 우호도는 §S첫 조우§!를 어떻게 수행했는지에 따라 달라집니다.\n\n§S외교§! 시작 방법:\n\n£dot_green£ 왼쪽 막대의 §S조우§! 버튼을 클릭하거나 §SF10§!을 누릅니다.\n\n$tttt$$tt$£contacts£\n\n첫 조우를 진행하는 중에는 상대에 관한 정보를 획득하며, 이러한 정보가 쌓임에 따라 상대 제국을 더 자세히 파악할 수 있게 됩니다."
 tutorial.2007.name: "$tutorial.2006.name$"
 tutorial.2007.desc: "일반적으로 외부의 존재와 §S외교§!하기를 꺼리는 색다른 유형의 문명과 §S첫 조우§!를 이루었습니다.\n\n이런 종류의 문명은 취할 수 있는 외교적 활동이 제한되어 있지만, 가끔 우리에게 접촉해 오기도 합니다."
 tutorial.2010.name: "튜토리얼: 자산 배정"
 tutorial.2010.desc: "§S자산§!이란 첩보 활동에 다양한 효과를 제공하는 귀중한 요원과 유물입니다. 자산은 첩자망 내에서 작동하며 작전에 배정하여 새로운 기회를 창출하거나 곤경에서 벗어나게 도움을 줄 수 있습니다.\n\n이벤트를 통해서나 §S$operation_acquire_asset$§! 작전을 통해 자산을 얻을 수 있습니다."
 tutorial.2100.name: "튜토리얼: 엔클레이브 외교"
 tutorial.2100.abbr.desc: "§S엔클레이브§!와 §S처음으로 조우§!했습니다. 소규모 독립 제국에 해당하는 이들 세력은 우리와 같은 거대 제국과 독특한 형태의 외교를 통해 무역을 진행하기도 합니다."
 tutorial.2100.full.desc: "$tutorial.2100.abbr.desc$\n\n엔클레이브는 과학 연구는 물론 정보 판매, 항성 기지 건물, 심지어 §S함선§!에 이르기까지 다양한 서비스를 제공합니다. 이러한 서비스를 구매하면, 해당 엔클레이브가 우리 제국에 갖는 §S우호도§!가 증가합니다."
 tutorial.2105.name: "튜토리얼: $tutorial.2100.name$"
 tutorial.2105.abbr.desc: "§S용병 엔클레이브§!와 조우했습니다. 이 독립 군사 전문가들은, 일정한 대가를 지불하기만 한다면 우리를 비롯한 각 제국에 §S용병 함대§!를 임대해 줄 것입니다."
 tutorial.2105.full.desc: "$tutorial.2105.abbr.desc$\n\n용병 함대를 고용하면, 해당 함대를 일정 기간 동안 지휘하게 됩니다. 이 기간에 용병 엔클레이브는 필요에 따라 증원 병력 파견을 시도하겠지만, 이들의 용병 함대나 제독은 우리 함대에 합병할 수 없습니다."
 tutorial.2111.name: "튜토리얼: 용병 엔클레이브"
 tutorial.2111.abbr.desc: "이제 원한다면 §Y[tutorial_mercenary_fleet.GetName]§!(을)를 §S용병 엔클레이브§! 바꿀 수 있습니다. 이때 해당 함대는 우리 제국의 직속에서 벗어나 독립 세력이 되며, 우리 제국을 포함한 각 제국에 §S용병 함대§!를 임대할 수 있게 됩니다."
 tutorial.2111.full.desc: "$tutorial.2111.abbr.desc$\n\n우리가 용병 엔클레이브와 영역을 공유하는 한, 엔클레이브가 용병 함대를 다른 제국에 임대해 줄 때마다 §S수입§!을 얻게 됩니다. 우리가 직접 이들의 용병 함대를 고용하면, 해당 함대를 일정 기간 동안 지휘하게 됩니다. 고용 가능한 용병 함대가 없다면, 이미 계약에 묶인 용병 함대를 웃돈을 지불해서 고용할 수도 있습니다."
 tutorial.2115.name: "튜토리얼: 거대 구조물"
 tutorial.2115.desc: "£megastructure£ §S거대 구조물§!은 우주 공간에 [GetBuildGrow]할 수 있는 막대한 규모의 건물입니다. 거대 구조물을 건설하면 최첨단 연구 시설과 우수한 자원은 물론이고, 심지어 고유한 이동 수단까지 이용할 수 있습니다.\n\n이 정도 규모의 공사를 진행하려면 상당한 시간과 자원을 투입해야 하지만, 그로 인한 보상 또한 그에 못지않습니다. £construction_ship£ §S건설선§!을 작업에 투입하면 공사를 시작할 수 있습니다."
 tutorial.2120.name: "튜토리얼: $tech_orbital_ring_tier_1$"
 tutorial.2120.desc: "거대 공학 연구의 발전에 힘입어, 거주 가능한 £planet£ §S행성§! 주변에 §S오비탈 링§!을 건설할 수 있게 되었습니다. £construction_ship£ §S건설선§!에 명령을 내리면 공사를 시작할 수 있습니다."
 tutorial.2121.name: "$tutorial.2120.name$"
 tutorial.2121.desc: "§S오비탈 링§!은 행성 전체를 감싸는 £megastructure£ §S거대 구조물§!입니다. 그 안의 £planet£ §S행성§!과 우주 공간을 연결하는 효율적인 가교 역할을 하는 동시에, 조선소, 방어 구조물, 자원 허브 등 다양한 시설을 수용할 수 있습니다.\n\n오비탈 링 화면에서는 £building£ §S건물§!과 §S모듈§!을 추가하거나 철거할 수 있고, 오비탈 링 자체를 더 높은 등급으로 업그레이드할 수 있습니다. 오비탈 링의 등급을 높이면 건설 가능한 건물 슬롯 수가 증가하며, 이러한 등급은 행성 기반 시설에 따라 제한됩니다."
 tutorial.2125.name: "튜토리얼: $tech_quantum_catapult$"
 tutorial.2125.desc: "거대 공학 연구의 발전에 힘입어, §S펄서§!나 §S중성자별§! 주변에 §S양자 발사 장치§!를 건설할 수 있게 되었습니다. £construction_ship£ §S건설선§!에 명령을 내리면 공사를 시작할 수 있습니다."
 tutorial.2126.name: "튜토리얼: $tutorial.2125.name$"
 tutorial.2126.desc: "§S양자 발사 장치§!는 §S함선§!과 함대를 방대한 성간 공간 너머로 날려 보냅니다. 이 기술로 우리 제국과 인근 영역에서 발생하는 각종 상황에 신속하게 대응할 수 있습니다.\n\n양자 발사 장치 사용 시 약간의 위험이 따릅니다. 함대가 목적지가 아닌 다른 £system£ §S성계§!에 들어갈 수 있기 때문입니다. 양자 발사 장치를 더 높은 등급으로 업그레이드하면 이러한 위험을 완화하고 발사 규모나 최대 사거리와 같은 사항을 개선할 수 있습니다."
 tutorial.2130.name: "튜토리얼: $tech_hyper_relays$"
 tutorial.2130.desc: "거대 공학을 연구한 끝에, §S초공간 중계기§!를 개발하는 성과를 올렸습니다. 이제 £construction_ship£ §S건설선§!에 명령을 내리면 중계망 구축을 개시할 수 있습니다."
 tutorial.2131.name: "튜토리얼: $tutorial.2130.name$"
 tutorial.2131.desc: "§S초공간 중계기§!가 있으면 인근 £system£ §S성계§!를 효율적으로 오갈 수 있습니다. 초공간 중계기를 §S두 개 이상§! 연결해 망을 구성하면, 제국 안에서의 이동 시간을 획기적으로 줄일 수 있습니다.\n\n또한 개방된 국경을 사이에 두고 초공간 중계기를 서로 가까이에 건설하면, 중계망끼리 연결할 수 있습니다. 즉, §S함선§!이 인접 제국 사이를 신속하게 이동할 수 있는 것입니다."
 tutorial.2140.name: "튜토리얼: 관측소"
 tutorial.2140.desc: "§S초광속 이전 문명§!을 탐지했습니다! 비록 우리와 다르게 성간 우주를 항행할 수 있는 기술은 없지만, 이 외계종으로부터 많은 것을 얻을 수 있을 것입니다. 다만 새로 얻을 것이 문화에 관한 지식인지, 아니면 새로운 노예일지는 우리에게 달려 있습니다.\n\n이 문명이 우리 국경 안에 있을 경우, 해당 행성 주변에 §S관측소§!를 건설해 이들을 관찰할 수 있습니다.\n\n침공을 원한다면 병력을 소집해 보내기만 하면 됩니다. 아주 시시한 싸움이 되겠죠."
 tutorial.2145.name: "튜토리얼: 관측소 건설 완료"
 tutorial.2145.desc.nodlc: "새 §S관측소§!가 가동을 시작했으며, 조사 대상의 £awareness£ §S인지 수준§!이 낮게 유지되는 한 §S임무§!가 계속 진행됩니다.\n\n초광속 이전 문명의 인지 수준이 최고로 높아지면 관측을 할 수 없게 되지만, 그때부터는 §S외교 활동§!을 진행할 수 있습니다. 우리 제국의 §S간섭 정책§!상 허용되는 경우, 우리의 존재를 더 일찍 드러낼 수도 있습니다."
 tutorial.2145.desc.dlc: "새 §S관측소§!가 가동을 시작했으며, 조사 대상의 £awareness£ §S인지 수준§!이 낮게 유지되는 한 §S임무§!가 계속 진행됩니다.\n\n초광속 이전 문명의 인지 수준이 최고로 높아져 임무가 중단될 때까지는 이 전초 기지로부터 고유 기술 노선인 §S관측 통찰§!을 획득할 수 있습니다. 인지 수준이 최고로 높아진 뒤에는 관측 임무 대신 §S외교 활동§!을 진행할 수 있습니다.\n\n우리 제국의 §S간섭 정책§!상 허용되는 경우, 우리의 존재를 더 일찍 드러낼 수도 있습니다."
 tutorial.2150.name: "튜토리얼: $tutorial.2006.name$"
 tutorial.2150.desc: "초광속 이전 문명에서 우리의 존재를 인지하고 있습니다. 이제부터는 우리 제국의 §S정책§!에 따라 해당 §S행성§!의 지도층과 제한적이나마 §S외교§!를 진행할 수 있습니다.\n\n현지 행성의 주민들에게 우리의 존재가 알려졌으므로, 해당 문명을 관측해도 더 이상 아무것도 얻을 수 없습니다. §S탐사 임무§!가 비활성화되었습니다."
 tutorial.2500.name: "튜토리얼: 은폐 역장"
 tutorial.2500.desc: "최근에 역장 조작 연구가 발전하면서 §S$science_cloaking_components$§!가 발명되었습니다. 많은 양의 전력을 소모하는 이 부품은 개조된 입자 역장을 투사함으로써 우리 과학선과 군용 함선을 재래식 감지기로부터 숨겨 줍니다.\n\n다만 은폐 역장을 가동하는 동안에는 §S$MOD_SHIP_BASE_SPEED_MULT$§!, §S$MOD_SHIP_WINDUP_MULT$§! 및 §S$MOD_SHIP_SHIELD_HP_ADD$§!가 저하됩니다.\n\n§S은폐§! 중인 함선은 탐지되지 않는 한 §S국경 폐쇄§!를 무시할 수 있습니다.\n또한 §S은폐§! 중인 £science_ship£ §S과학선§!은 타 제국의 £colony£ §S식민지§!에 §S능동 정찰§!을 실시해, 해당 제국에 대한 정보 획득량을 높일 수 있습니다."
 tutorial.2550.name: "튜토리얼: 은폐 탐지"
 tutorial.2550.desc: "최근에 컴퓨터 연구가 발전하면서 §S$sm_detection_array_plural$§!가 발명되었습니다. 이 고전력 외부 감지기를 우리 §S항성 기지§!에 설치하면 §S은폐§! 함대를 탐지할 수 있는 능력을 얻게 됩니다.\n\n다수의 배열체를 하나로 연결하면 §S$sm_detection_array_plural$§!의 감도가 높아지며, 감도가 높을수록 더 안정적인 §S은폐 역장§!을 뚫을 수 있습니다.\n\n추가 연구를 진행하면 £science_ship£ §S과학선§!을 이용해 탐지 능력을 강화할 수 있습니다. 이 장비의 탐지 범위는 항성 기지의 §S감지 범위§!에 따라 제한됩니다."
 #############################
 #Tutorial Event Chains
 #############################
 tutorial_survey_system_chain_title: "튜토리얼: 은하 지도 토글"
 tutorial_survey_system_chain_desc: "별들의 세계를 탐험하려면, 그 전에 우리의 시야를 넓혀야 합니다. 다행히 우리 제국은 정교한 §S은하 지도§!를 갖추고 있습니다. 은하 지도를 열려면 §SM§! 또는 화면 하단의 은하 버튼을 누르십시오. 그다음 §SEsc§!나 우측 상단의 버튼을 눌러 상황 일지를 닫으셔도 좋습니다."
 map_toggled: "은하 지도 토글 완료"
 tutorial_survey_system_tooltip: "§S튜토리얼: 은하 지도 토글§!이 상황 일지에 추가되었습니다"
 tutorial_1_chain_title: "튜토리얼: 성계 탐사"
 tutorial_1_chain_desc: "§H은하 지도§!에서 £science_ship£ §S과학선§!을 바로 클릭하거나 §S현황§!에서 해당 §S과학선§!을 선택하십시오.\n\n§S은하 지도§!를 연 상태에서 함대 인터페이스 왼쪽 아래의 §S탐사§! 버튼을 누른 다음 아직 탐사되지 않은 £system£ §S성계§!를 선택하십시오. 아직 탐사되지 않은 성계를 우클릭한 후 §S성계 탐사§!를 선택해도 됩니다.\n\n이제 §S과학선§!은 해당 성계 내에 있는 모든 행성을 탐사하기 위한 경로를 계획할 것입니다."
 tutorial_unpause_chain_tooltip: "§S튜토리얼: 일시 정지 해제§!가 상황 일지에 추가되었습니다"
 tutorial_unpause_chain_title: "튜토리얼: 일시 정지 해제"
 tutorial_unpause_chain_desc: "은하를 탐사하도록 £science_ship£ §S과학선§!을 대기시켰으니, 이제 일시 정지를 해제하기만 하면 됩니다. £space£ §S스페이스 바§!를 누르거나 상단 막대의 다음 아이콘을 선택하십시오:\n\n$tttt$$tttt$$t$£pause_button£\n"
 unpaused_game: "시뮬레이션 일시 정지 해제 완료"
 system_surveyed: "이웃 성계 탐사 완료"
 tutorial_1_tooltip: "§S튜토리얼: 성계 탐사§!가 상황 일지에 추가되었습니다"
 tutorial_2_chain_title: "튜토리얼: 기술 연구"
 tutorial_2_chain_desc: "새로운 기술을 연구할 때가 됐습니다. £colony_ship£ §S개척선§!을 건조하려면 §S신세계 프로토콜§!이 필요하니, 제국을 확장하고 싶다면 해당 프로토콜을 서둘러 완수하는 편이 좋을 듯합니다.\n\n상단 막대의 왼쪽에 있는 버튼을 클릭해 §S기술§! 화면을 열거나 §SF4§!를 누르십시오. 그다음 §S연구 선택§!을 클릭해 이용 가능한 선택지 중에서 원하는 기술을 선택하십시오."
 tech_1_researched: "신세계 프로토콜 연구 완료"
 tech_2_researched: "외계 건축 연구 완료"
 tutorial_2_tooltip: "§S튜토리얼: 기술 연구§!가 상황 일지에 추가되었습니다"
 tutorial_3_chain_title: "튜토리얼: 건설선 건조"
 tutorial_3_chain_desc: "£science_ship£ §S과학선§!으로 발견한 자원을 개발하려면 £construction_ship£ §S건설선§!이 필요합니다.\n\n항성 기지를 클릭하고 §S조선소§! 탭을 선택한 다음, 여러 선택지 중에서 §S건설선§!을 선택하십시오.\n\n단, §S함선§!의 건조를 시작하기 전에 충분한 양의 £alloys£ §S합금§!이 필요하다는 점을 명심하시기 바랍니다."
 construction_ship_built: "건설선 건조 완료"
 tutorial_3_tooltip: "§S튜토리얼: 건설선 건조§!가 상황 일지에 추가되었습니다"
 tutorial_4_chain_title: "튜토리얼: 채굴 기지 [GetBuildGrowCap]"
 tutorial_4_chain_desc: "£planet£ §S행성§!에서 £minerals£ §S광물§! 매장지와 §S전략적 자원§!을 수집하려면 궤도에 £mining_station£ §S채굴 기지§!를 건설해야 합니다. 이를 위해서는 £construction_ship£ §S건설선§!을 바로 클릭하거나 화면 오른쪽에 있는 §S현황§!에서 찾으십시오.\n\n그다음 건설선의 함대 인터페이스에서 §S채굴 기지 [GetBuildGrowCap]§! 버튼을 클릭한 뒤, 광물 매장지가 있는 행성이나 소행성을 클릭하십시오.\n\n£mining_station£ §S채굴 기지§! 건설에도 £minerals£ §S광물§!이 필요하니, 건설을 시작하기 전에 잊지 말고 충분한 양의 광물을 모아 둬야 합니다."
 mining_station_built: "채굴 기지 건설 완료"
 tutorial_4_tooltip: "§S튜토리얼: 채굴 기지 [GetBuildGrowCap]§!이 상황 일지에 추가되었습니다"
 tutorial_5_chain_title: "튜토리얼: 연구 기지 [GetBuildGrowCap]"
 tutorial_5_chain_desc: "새로운 기술의 연구 속도를 높이려면 우리가 소유하고 있는 행성 중에 £physics£ §S물리학§!, £society£ §S사회학§!, £engineering£ §S공학§! 자원이 있는 행성 위에 £science_ship£ §S연구 기지§!를 건설해야 합니다.\n\n연구 기지는 £mining_station£ §S채굴 기지§!와 똑같은 방식으로 작동하지만 수집하는 자원이 다릅니다. 연구 기지는 £minerals£ §S광물§!이나 £strategic_resource£ §S전략적 자원§!은 채굴할 수 없습니다.\n\n연구 기지를 지으려면 £construction_ship£ §S건설선§!을 선택하고 함대 인터페이스에서 §S연구 기지 [GetBuildGrowCap]§! 버튼을 클릭하십시오. 그다음 물리학, 사회학, 공학 자원 매장지가 있는 £planet£ §S행성§!이나 소행성, 태양을 클릭하십시오."
 research_station_built: "연구 기지 건설 완료"
 tutorial_5_tooltip: "§S튜토리얼: 연구 기지 [GetBuildGrowCap]§!이 상황 일지에 추가되었습니다"
 tutorial_6_chain_title: "튜토리얼: 행성 건물"
 tutorial_6_chain_desc: "모성에 이미 £building£ §S건물§!이 몇 채 있긴 하지만, 하나 더 건설해야 합니다.\n\n건물을 건설하려면 §S현황§!에서 모성을 선택한 뒤 §S지표면§! 탭을 클릭하십시오. 그다음 구역 내 빈 건물 슬롯을 선택한 뒤 건설 가능한 건물을 선택하십시오. §S자원§!이 충분하면 건설이 바로 시작됩니다.\n\n건물은 £job£ §S직업§!을 제공하지만, 자원을 생산하려면 £pops£ §S팝§!이 배정되어야 합니다. §S경제§! 탭에서 §S팝§!이 종사하고 있는 직업을 확인할 수 있습니다."
 building_constructed: "건물 건설 완료"
 tutorial_6_tooltip: "§S튜토리얼: 행성 건물§!이 상황 일지에 추가되었습니다"
 tutorial_7_chain_title: "튜토리얼: 차단물 제거"
 tutorial_7_chain_desc: "모성에 더 많은 §S지구§!를 건설하려면 시간과 §S자원§!을 들여 £blocker£ §S차단물§!을 제거해야 합니다.\n\n§S차단물§!을 제거하려면, §S관리§! 탭에서 제거하고자 하는 차단물에 표시된 §S차단물 제거§! 버튼을 클릭하십시오.\n\n\n$tttt$$tttt$$tt$£clear_blocker£\n\n\n§S차단물§!마다 제거에 필요한 비용, 기술, 시간이 다릅니다."
 blockers_cleared: "차단물 제거 완료"
 tutorial_7_tooltip: "§S튜토리얼: 차단된 특징§!이 상황 일지에 추가되었습니다"
 tutorial_8_chain_title: "튜토리얼: 성계 탐사"
 tutorial_8_chain_desc: "우리 제국의 영향력을 모성계 너머로 확장해야 합니다. 그러기 위한 첫 번째 단계는 인접한 £system£ §S성계§!를 탐사하는 것입니다.\n\n성계를 탐사하려면 £science_ship£ §S과학선§!을 선택하고 함대 인터페이스에서 §S탐사§! 버튼을 클릭하십시오. 그리고 화면 하단에 있는 §S은하 지도§! 버튼을 누른 뒤 이웃한 성계 하나를 선택하십시오. 이제 §S과학선§!은 지정된 성계로 떠나 그 안에 있는 천체를 모두 탐사할 것입니다."
 tutorial_8_poi: "목표 탐사"
 tutorial_8_poi_desc: "§S[survey_target_1.GetName]§!, §S[survey_target_2.GetName]§!, §S[survey_target_3.GetName]§! 성계를 탐사하십시오."
 systems_surveyed: "성계 탐사 완료"
 tutorial_8_tooltip: "§S튜토리얼: 성계 탐사§!가 상황 일지에 추가되었습니다"
 tutorial_9_chain_title: "튜토리얼: 과학선 건조"
 tutorial_9_chain_desc: "은하계의 각지를 탐사하는 속도를 높이려면 두 번째 £science_ship£ §S과학선§!을 건조해야 합니다.\n\n항성 기지를 클릭하고 §S조선소§! 탭을 선택한 뒤, 다양한 선택지 중에서 §S과학선§!을 선택하십시오.\n\n단, §S함선§! 건조를 시작하기 전에 충분한 양의 £alloys£ §S합금§!이 필요하다는 점을 명심하시기 바랍니다."
 science_ship_built: "과학선 건조 완료"
 tutorial_9_tooltip: "§S튜토리얼: 두 번째 과학선 건조§!가 상황 일지에 추가되었습니다"
 tutorial_10_chain_title: "튜토리얼: 과학자 모집"
 tutorial_10_chain_desc: "새로운 £science_ship£ §S과학선§!으로 탐사 임무를 수행하거나 §S이상 현상§!을 연구하려면 함선을 지휘할 £scientist£ §S과학자§!가 필요합니다.\n\n새로 건조된 §S과학선§!을 선택하고 함대 인터페이스의 초상을 클릭하십시오. §S지도자 선택§! 창이 열리고 현재 우리에게 고용되었거나 고용할 수 있는 모든 §S과학자§!가 표시됩니다. 그 후 원하는 후보자를 선택하십시오.\n\n지도자 모집에는 £unity£ §Y통합§!이 사용되므로 충분한 통합을 모으기 전까지 기다려야 할 수도 있습니다.\n\n모집이 완료되면 §S과학선§!으로 탐사를 시작할 수 있습니다."
 scientist_assigned: "과학자 모집 완료"
 tutorial_10_tooltip: "§S튜토리얼: 과학자 모집§!이 상황 일지에 추가되었습니다"
 tutorial_11_chain_title: "튜토리얼: 개척선 건조"
 tutorial_11_chain_desc: "이제 다른 성계를 개척할 때가 되었습니다. 우선 £colony_ship£ §S개척선§!을 건조해야 합니다. §S개척선§! 건조에는 많은 시간이 필요하고 상당한 양의 £alloys£ §S합금§!, £food£ §S식량§!, £consumer_goods£ §S소비재§!가 필요하지만, £colony£ §S식민지§!가 번성하면 투자한 비용보다 더 많은 자원을 얻을 수 있습니다.\n\n§S항성 기지§!를 클릭하고 §S조선소§! 탭을 선택하십시오. 그다음 이용 가능한 설계 중에서 §S개척선§!을 선택하십시오.\n\n함선 건조를 시작하기 전에 충분한 양의 자원이 필요하다는 점을 명심하시기 바랍니다."
 colony_ship_built: "개척선 건조 완료"
 tutorial_11_tooltip: "§S튜토리얼: 개척선 건조§!가 상황 일지에 추가되었습니다"
 tutorial_12_chain_title: "튜토리얼: 식민지 설립"
 tutorial_12_chain_desc: "이제 새로 만든 £colony_ship£ §S개척선§!을 사용해 첫 번째 £colony£ §S식민지§!를 설립해야 합니다. 최고의 행성 후보는 개척민들이 환경에 적응하는 데 전혀 문제가 없는 모성과 동일한 유형의 행성입니다.\n\n£planet£ §S행성§!을 개척하려면 §S개척선§!을 클릭하거나 §S현황§!에서 선택하십시오. 그리고 함대 인터페이스에서 §S개척§! 버튼을 클릭하고 개척하고 싶은 행성을 선택하십시오. 탐사가 완료되었고 §S이상 현상§!이 없으며 우리 국경 안에 위치한 행성만 개척할 수 있습니다. 거주 적합도가 낮은 행성 또한 개척할 수 있지만, 그러면 매우 많은 비용이 들 수 있습니다."
 colony_established: "식민지 설립 완료"
 tutorial_12_tooltip: "§S튜토리얼: 식민지 설립§!이 상황 일지에 추가되었습니다"
 tutorial_13_chain_title: "튜토리얼: 총독 모집"
 tutorial_13_chain_desc: "새로운 £colony£ §S식민지§!를 관리할 §S행성 총독§!을 모집해야 합니다. 총독을 모집하려면 식민지를 클릭하고 §S행성 개요§! 탭으로 이동하십시오. 그리고 §S총독§! 창에서 §S변경§! 버튼을 클릭하십시오. 그러면 §S지도자§! 화면이 열리고 현재 우리에게 고용된 총독이 표시됩니다.\n\n화면 상단에 있는 §S모집§! 버튼을 클릭하고 가능한 후보자 중 하나를 선택하십시오. 지도자를 모집하려면 언제나 £unity £ §Y통합§!이 필요하다는 점을 유의하시기 바랍니다. 통합이 부족하다면 지도자 모집에 필요한 통합을 모을 때까지 기다려야 합니다.\n\n모집이 완료되면 새로운 총독이 모성에서 배정을 기다리게 됩니다."
 governor_recruited: "총독 모집 완료"
 tutorial_13_tooltip: "§S튜토리얼: 총독 모집§!이 상황 일지에 추가되었습니다"
 tutorial_14_chain_title: "튜토리얼: 추가 식민지 설립"
 tutorial_14_chain_desc: "계속해서 새로운 £colony£ §S식민지§!를 설립해 제국을 확장하십시오. 충분한 £alloys£ §S합금§!, £food£ §S식량§!, £consumer_goods£ §S소비재§!를 보유하여 더 많은 £colony_ship£ §S개척선§!을 건조하고 새로운 식민지 설립을 위해 파견하십시오.\n\n식민지는 자급자족하기 전까지 £energy£ §S에너지 크레딧§!을 소모하니 동시에 너무 많은 식민지를 개발하지 않도록 주의하시기 바랍니다."
 colonies_established: "식민지 설립 완료"
 tutorial_14_tooltip: "§S튜토리얼: 추가 식민지 설립§!이 상황 일지에 추가되었습니다"
 tutorial_15_chain_title: "튜토리얼: 자원 생산"
 tutorial_15_chain_desc: "산업이 성장하려면 기본 소재가 계속해서 필요하기 때문에 £minerals£ §S광물§! 공급을 늘려야 합니다. 광물 매장지가 있는 £planet£ §S행성§!이나 소행성 위에 £mining_station£ §S채굴 기지§!를 [GetBuildGrow]하거나 우리 제국의 거주 행성 중 하나에 §S채굴 지구§!를 건설해 공급을 늘릴 수 있습니다.\n\n기지와 £building£ §S건물§! 모두 유지하는 데 £energy£ §S에너지 크레딧§!을 소모하므로 충분한 에너지 크레딧 공급도 확보해야 합니다. 에너지 크레딧은 거주 행성의 §S발전 지구§!에서 생산됩니다. 에너지 크레딧 매장지가 있는 행성, 소행성, 항성 위에 건설한 §S채굴 기지§!를 통해서도 에너지 크레딧을 얻을 수 있습니다."
 mineral_income: "월간 광물 수입 +30"
 credit_income: "월간 에너지 크레딧 수입 +10"
 tutorial_15_tooltip: "§S튜토리얼: 자원 생산§!이 상황 일지에 추가되었습니다"
 tutorial_16_chain_title: "튜토리얼: 함대 보강"
 tutorial_16_chain_desc: "[Root.GetName](을)를 지키기 위해서는 강력한 함대를 건조해야 합니다.\n\n지금은 §S초계함§! 몇 척을 추가로 건조하는 것만으로도 충분하지만, §S합금§!을 충분히 모으고 나면 §S항성 기지§!에서 §S함선§!을 건조하십시오. 새로 건조한 군용 함선은 자신이 건조된 §S항성 기지§!의 궤도에 있는 함대에 합류합니다.\n\n또한 §S제독§!을 배정하면 함대의 군사력을 최적화할 수 있으며, £commander£ §S지휘관§!이 없는 다른 함대에 우위를 점할 수 있습니다."
 corvettes_built: "초계함 건조 완료"
 admiral_assigned: "사령관 배정 완료"
 tutorial_16_tooltip: "§S튜토리얼: 함대 보강§!이 상황 일지에 추가되었습니다"
 tutorial_17_chain_title: "튜토리얼: 구역 설립"
 tutorial_17_chain_desc: "직접 다스릴 수 있는 £planet£ §S행성§!의 수에는 한계가 있습니다. 이러한 한계는 상단 막대에서 확인할 수 있으며, 한계를 초과한다면 불이익을 받습니다. §S구역§!은 반독립적이며 통제하에 있는 행성들을 관리합니다. 새로운 구역을 생성하려면 §S행성과 구역§! 화면으로 이동해 상단 막대의 드롭다운 목록에서 해당하는 아이콘을 클릭하거나 §SF5§!를 누르십시오. 그리고 우측 상단에 있는 §S새 구역 생성§! 버튼을 클릭하십시오.\n\n이제 §S구역 관리 모드§!에 들어갑니다. 여기서 어떤 £system£ §S성계§!로 새로운 구역을 구성할지 지정할 수 있습니다. 성계의 모든 행성은 구역의 관할권에 포함됩니다. 우리의 £colony£ §S식민지§!가 있는 성계를 선택하고 §S완료§! 버튼을 클릭하십시오. 이제 우리 제국의 첫 번째 구역이 생성됩니다!"
 sector_established: "구역 설립 완료"
 tutorial_17_tooltip: "§S튜토리얼: 구역 설립§!이 상황 일지에 추가되었습니다"
 tutorial_18_chain_title: "튜토리얼: 구역 총독"
 tutorial_18_chain_desc: "새 §S구역§!을 관리하려면 §S총독§!을 배정해야 합니다. 이 경우 배정한 총독의 스킬 레벨과 특성에 따른 효과가 구역 내에 있는 모든 £planet£ §S행성§!에 적용됩니다."
 sector_governor_assigned: "구역 총독"
 tutorial_18_tooltip: "§S튜토리얼: 구역 총독§!이 상황 일지에 추가되었습니다"
 tutorial_19_chain_title: "튜토리얼: 함선 설계"
 tutorial_19_chain_desc: "새로운 함선 설계를 생성하려면 왼쪽 막대의 §S함대 관리§!에서 §S함선 설계§!를 클릭하거나 §SF9§!를 누르십시오. §S새로운 설계§! 버튼을 클릭하고, §S선체 크기§!를 선택할 때 §S초계함§!을 선택하십시오. 그다음 §S구획 미설정§! 버튼을 클릭해 설계에 필요한 §S구획§!을 선택하십시오.\n\n가장 작은 전함인 초계함은 더 큰 전함과는 다르게 단 하나의 구획으로 구성되어 있습니다. 구획은 §S무기§! 및 §S지원 장비§! 슬롯의 수를 결정합니다. 구획을 하나 선택하고 전력이 초과되지 않도록 유의하며 슬롯에 부품을 채우십시오.\n\n더 간편하게 §S함선 자동 완성§! 버튼을 클릭해 게임에서 설계를 완성하도록 할 수도 있습니다."
 ships_designed: "함선 설계 완료"
 tutorial_19_tooltip: "§S튜토리얼: 함선 설계§!가 상황 일지에 추가되었습니다"
 tutorial_20_chain_title: "튜토리얼: 관측소"
 tutorial_20_chain_desc: "§S[Owner.GetPreFTLUpper] 사회§!의 모성 위에 §S관측소§!를 [GetBuildGrow]해야 합니다. 이러한 우주 기지는 다양한 §S임무§!를 수행할 수 있지만, 수행할 수 있는 임무는 발전하는 문화에 개입하려는 우리의 의지에 의해 결정됩니다.\n\n관측소는 £mining_station£ §S채굴 기지§! 및 £science_ship£ §S연구 기지§!와 똑같은 방식으로 건설되지만, [Owner.GetPreFTLUpper] 문명이 있는 모성에만 건설할 수 있습니다. £construction_ship£ §S건설선§!을 선택하고 함대 인터페이스에서 §S관측소 [GetBuildGrowCap]§! 버튼을 선택하십시오.\n\n이제 연구하고 싶은 [Owner.GetPreFTLUpperPlural] 문명의 모성을 선택하면 건설선이 임무를 시작합니다."
 observation_post_built: "관측소 건설 완료"
 tutorial_20_tooltip: "§S튜토리얼: 관측소§!가 상황 일지에 추가되었습니다"
 tutorial_21_chain_title: "튜토리얼: 전략적 자원"
 tutorial_21_chain_desc: "£strategic_resource£ §S전략적 자원§!이 있는 천체의 궤도에 £mining_station£ §S채굴 기지§!를 [GetBuildGrow]해야 합니다. 이러한 희귀 소재에는 막대한 전략적 가치가 있습니다.\n\n§S탐사§!를 통해 자원의 위치를 찾아내고 £construction_ship£ §S건설선§!을 선택해 §S채굴 기지 [GetBuildGrowCap]§! 버튼을 클릭한 다음 적절한 천체를 선택하십시오."
 tutorial_21b_chain_title: "정보: 전략적 자원"
 tutorial_21b_chain_desc: "£strategic_resource£ §S전략적 자원§!이 있는 천체의 궤도에 £mining_station£ §S채굴 기지§!를 건설했습니다. 채굴에 특정 기술이 필요한 희귀 소재에는 막대한 전략적 가치가 있으니, 항상 이러한 전략적 자원을 눈여겨봐야 합니다."
 strategic_resource_extracted: "전략적 자원 추출 완료"
 tutorial_21_tooltip: "§S튜토리얼: 전략적 자원§!이 상황 일지에 추가되었습니다"
 tutorial_22_chain_title: "튜토리얼: 준지성체 지성화"
 tutorial_22_chain_desc: "하등 종족을 §S지성화§!하려면 우선 §S후생적 변이 촉발§! 기술을 연구해야 합니다.\n\n§S종족§! 화면에서 준지성체 종족을 선택한 다음 §S지성화§! 버튼을 클릭해 지성화하십시오."
 tutorial_22_tooltip: "§S튜토리얼: 준지성체 지성화§!가 상황 일지에 추가되었습니다"
 species_uplifted: "준지성체 종족 지성화 완료"
 tutorial_23_chain_title: "튜토리얼: 첫 조우"
 tutorial_23_chain_desc: "어두운 우주 속에서 미지의 존재를 마주치면 §S통신 수립§!을 시도해야 합니다. \n\n§S상황 일지§!에서 §S첫 조우§!를 선택한 뒤 §S첫 조우 보기§! 버튼을 클릭하십시오. §S은하 지도§!에서 §S첫 조우§! 아이콘을 클릭해도 됩니다.\n\n\n$tttt$$tttt$$ttt$£firstcontact£\n"
 contact_made: "조우 완료"
 tutorial_23_tooltip: "§S튜토리얼: 첫 조우§!가 상황 일지에 추가되었습니다"
 tutorial_24_chain_title: "튜토리얼: 종족 수정"
 tutorial_24_chain_desc: "§S특성 포인트§!를 충분히 보유하면 제국 내에서 살아가는 지성체라면 어떤 종족이든 §S수정§!할 수 있습니다.\n\n이는 §S종족§! 화면에서 §S수정§! 메뉴를 통해 적절한 §S특별 프로젝트§!를 연구하여 달성할 수 있습니다. 프로젝트에는 £society£ §S사회학 연구§!가 필요하고, 프로젝트가 진행되는 동안에는 우리의 모든 기술적 진보를 해당 분야에 투자하게 됩니다."
 species_modified: "종족 수정 완료"
 tutorial_24_tooltip: "§S튜토리얼: 종족 수정§!이 상황 일지에 추가되었습니다"
 tutorial_25_chain_title: "튜토리얼: 성계 영유권 주장"
 tutorial_25_chain_desc: "외계 행성의 궤도를 도는 §S항성 기지§!를 [GetBuildGrow]해 국경을 확장할 수 있습니다. 항성 기지는 £system£ §S성계§!를 보호하고, 행성의 자원 개발을 가능하게 하며, 만약 국경을 폐쇄했다면 마주친 모든 외계 종족의 통과를 차단할 수 있습니다.\n\n£construction_ship£ §S건설선§!을 선택하고 함대 인터페이스에서 §S항성 기지 [GetBuildGrowCap]§! 버튼을 클릭한 다음 항성을 좌클릭하십시오. 항성을 우클릭한 다음 §S항성 기지 [GetBuildGrowCap]§!을 선택해도 됩니다.\n\n§S항성 기지§!는 다른 궤도 기지와는 다르게 국경 밖에 건설할 수 있습니다."
 frontier_outpost_built: "항성 기지 건설 완료"
 tutorial_25_tooltip: "§S튜토리얼: 항성 기지§!가 상황 일지에 추가되었습니다"
 TUTORIAL_PLANETVIEW_MANAGEMENT_TITLE: "튜토리얼: 관리"
 TUTORIAL_PLANETVIEW_MANAGEMENT_DESC: "§S관리§! 탭에서는 £planet£ §S행성§!의 상태와 구조에 관한 주요 정보를 볼 수 있습니다.\n\n§S행성 특징§!에는 제거할 수 있는 천연 £blocker£ §S차단물§!과 현재 보유한 §S특징§!이 표시됩니다.\n\n§S현재 인구§! 섹션에는 £planet£ §S행성§!의 모든 £pops£ §S팝§!이 표시됩니다.\n\n£sector£ §S구역§! 패널에서는 행성을 §S구역§!의 일부로 관리해, 현지 행정을 자동화할 수 있습니다.\n\n또한, 기술과 자원을 갖췄다면 §S식민지 승격§!으로 식민지를 승격시켜 실질적으로 §S행성§!을 업그레이드할 수 있습니다."
 TUTORIAL_DATABANK_TITLE: "튜토리얼: 데이터 뱅크"
 TUTORIAL_DATABANK_DESC: "게임의 시스템을 이해하고 싶다면 £databank£ §S데이터 뱅크§!를 참조하면 됩니다.\n\n내용이 범주별로 정리되어 있어, 게임의 시스템이나 §S기능§!에 관해 궁금한 점이 생기면 쉽게 찾아볼 수 있습니다.\n\n자세한 정보를 알고 싶다면 검색하거나 목록에서 주제를 선택하면 됩니다."
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_TITLE: "튜토리얼: 중점과 타임라인"
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_DESC: "£focus_core£ §S제국 중점§! 시스템으로 £focus_exploration£ §S탐사§!, £focus_conquest£ §S정복§!, £focus_development£ §S개발§! 중점 중 하나를 선택해 제국의 발전 방향을 설정할 수 있습니다.\n\n이러한 중점은 저마다 과업 카드가 있어, 선택한 방향에 따른 지시를 받을 수 있습니다. 과업 카드를 완료하면 관련 범주에 §S진행도 포인트§!가 적립됩니다.\n\n과업 카드의 경우, 채택한 중점과 관련된 카드가 높은 확률로 등장합니다. 등장한 카드는 £unity£ §S통합§!을 소비해 다시 뽑을 수 있으며, 중점도 변경할 수 있습니다.\n\n§S완료§! 탭과 §S진행도§! 탭에는 다음 보상 등급까지 남은 진행도가 표시됩니다.\n\n§S타임라인§!에는 §S기원§!부터 시작해 제국의 주요 역사적 이정표와 사건이 표시되며, 게임을 진행함에 따라 주요 이벤트가 발생하면 새로운 항목이 나타납니다."
 TUTORIAL_COLONIZATION_TITLE: "튜토리얼: 행성 개척"
 TUTORIAL_COLONIZATION_DESC: "§S개척§! 화면에서는 행성 개척을 준비할 수 있습니다.\n\n행성을 개척하려면 행성에 정착할 §S종족§!을 선택하고, §S식민지 특화§!를 배정함으로써 발전 중점을 설정해야 합니다.\n\n또한, 이 화면에는 이용 가능한 §S지구§!, §S행성 크기§!, 잠재적인 §S보정치§!의 개요와 행성에 영향을 줄 수 있는 §S행성 특징§!이 표시됩니다.\n\n§S행성§!의 천연자원에 기반한 발전을 우선시하면 식민지의 이점을 최대로 활용할 수 있을 것입니다."
