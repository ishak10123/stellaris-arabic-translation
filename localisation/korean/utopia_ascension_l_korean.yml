 utopia.2700.name: "진화 설계"
 utopia.2700.desc: "진화란 때로는 올바른 방향으로 개입할 필요가 있습니다. 이제 우리는 유례없는 속도로 신체와 정신을 유전적으로 변형해, 끊임없이 변화하는 가혹한 환경을 견딜 수 있게 하는 기술을 보유하게 되었습니다."
 utopia.2703.name: "진화 정복"
 utopia.2703.desc: "한때 [Root.GetSpeciesName]의 운명은 유전적 복권이라는 자연의 변덕에 의해 결정되었습니다. 하지만 종족의 생존이 확률의 자비로 결정되던 시기는 끝났습니다.\n\n우리 시대의 기술자들은 강철과 콘크리트가 아닌 생명 그 자체의 구성 요소로 작업합니다. 진보된 유전자 변형 기술이라면 우리 국가의 미래를 지킬 수 있을 것입니다."
 utopia.2600.name: "육신을 지배하는 정신"
 utopia.2600.desc: "우리 문명이 시작된 이후로 초자연적 현상이라고밖에 설명할 수 없는 힘을 휘두르는 강력한 마법사에 관한 이야기가 널리 퍼졌습니다. 이 희귀한 [Root.GetSpeciesNamePlural](은)는 동족의 정신에 침입하거나, 생각만으로 무거운 물건을 들어 올리고, 수많은 '마법'의 묘기를 수행할 수 있었다고 합니다. 다만, 최근까지도 이는 그저 이야기에 불과했습니다.\n\n하지만, 이번에 우리 과학자들이 특정한 [Root.GetSpeciesName] 개인들이 사이오닉 잠재력을 가지고 있다는 결정적인 증거를 찾아냈습니다. 물론 극소수의 동족만 사이오닉 능력을 타고난 것으로 보이지만, 그 수는 지난 몇백 년간 꾸준하게 증가해 왔습니다.\n\n이것이 갑작스러운 진화적 급성장 때문인지, 아니면 모종의 이유로 늘 우리의 유전 코드에 존재해 있던 잠재적 사이오닉 능력이 각성한 것인지 과학자들은 확신하지 못하고 있습니다."
 utopia.2600.desc.unplugged: "우리 문명의 역사는 아직 짧지만 폭력으로 점철되어 있으며, 그럼에도 불구하고 우리 [root.GetSpeciesNamePlural]들은 온갖 상상력을 동원해 환상적인 이야기를 만드는 일에 푹 빠지곤 했습니다. 이 장난스러운 이야기에는 마음을 읽고, 생각만으로 무거운 물체를 움직이며, 그 밖의 다양한 '마법'을 부리는 등 초자연적인 현상으로 볼 수밖에 없는 능력을 발휘하는 강력한 마법사가 자주 등장합니다.\n\n많은 이들은 우리가 동화되기 전부터 이러한 이야기를 간직해 왔으며, 우리 종족의 집단의식 안에 살아 있다고 여깁니다. 하지만 대부분의 [root.GetSpeciesNamePlural](은)는 아주 최근까지 그런 이야기를 그저 환상에 불과한 것으로 치부해 왔습니다. 그러나 이번에 우리 과학자들이 특정 [Root.GetSpeciesAdj] 개인들에게 사이오닉 잠재력이 잠들어 있다는 결정적인 증거를 찾아냈습니다.\n\n물론 극소수의 동족만 사이오닉 능력을 타고난 것으로 보이지만, 유전 연구 결과에 따르면 그 수는 지난 몇백 년간 꾸준하게 증가해 왔습니다. 이것이 갑작스러운 진화적 급성장 때문인지, 아니면 [origin_unplugged_assimilator_empire.GetName]의 간섭 때문인지 과학자들은 확신하지 못하고 있습니다."
 utopia.2600.a: "우리를 기다리는 어렴풋한 미래의 모습일 수 있겠군요."
 utopia.2602.name: "사이오닉 잠재력을 드러낸 [From.GetSpeciesNamePlural]"
 utopia.2602.1.desc.1.non_gestalt_intro: "§H[From.GetName]§! 당국에서 유출된 보고서에 따르면,"
 utopia.2602.1.desc.1.non_gestalt_outro: "잠재적 사이오닉 능력이 나타나기 시작했다고 합니다. 기록상 [From.GetSpeciesNamePlural](이)가 사이오닉 능력을 보인 적은 이제껏 없었기에, 이들은 상당히 최근에 각성한 것이 분명합니다."
 utopia.2602.1.desc.1.organic_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ [From.GetSpeciesName]에 속한 특정 개인들에게서 $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.machine_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ [From.GetSpeciesName]에 속한 특정 기계 유형에서 $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.gestalt_intro: "§H[From.GetName]§! 당국에서 유출된 보고서에 따르면 특정 [From.GetSpeciesNamePlural]들에게서 잠재적 사이오닉 능력이 나타나기 시작했다고 합니다."
 utopia.2602.1.desc.1.gestalt_outro: "기존의 모든 기록을 넘어서는 초현실적 능력을 묘사하고 있었습니다."
 utopia.2602.1.desc.1.organic_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ 이들 사이에서 인지적 연결은 새로운 개념이 아니지만, 보고서는 $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.1.machine_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ 이들 사이에서 신경망 기반 통신은 새로운 개념이 아니지만, 보고서는 $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.2.intro: "현재 이 힘은 극히 소수의"
 utopia.2602.1.desc.2.outro: "보고서 어디에서도 이 현상에 대한 설명은 찾아볼 수 없었습니다."
 utopia.2602.1.desc.2.organic: "$utopia.2602.1.desc.2.intro$ [From.GetSpeciesName]에게서만 발현되었다고 합니다. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.2.machine: "$utopia.2602.1.desc.2.intro$ [From.GetSpeciesNamePlural]에서만 발현되었다고 합니다. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.machine_gestalt: "$utopia.2602.1.desc.1.machine_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.machine_non_gestalt: "$utopia.2602.1.desc.1.machine_non_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.organic_gestalt: "$utopia.2602.1.desc.1.organic_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.1.desc.organic_non_gestalt: "$utopia.2602.1.desc.1.organic_non_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.2.desc: "우리 국경 내 [From.GetSpeciesName]들 역시 비슷한 변화를 보이기 시작했기 때문에, 우주의 특정 지역에만 국한된 현상은 아닐 것입니다."
 utopia.2602.a.organic_non_gestalt: "정말 기이하군요."
 utopia.2602.a.hive_or_machine_non_gestalt: "특수한 능력이라니, 의심스럽군요."
 utopia.2602.a.machine_gestalt: "연산이 불가능한 상황입니다."
 utopia.2602.b: "초능력? 헛소리가 따로 없군요!"
 utopia.2602.c: "마법이 있다 한들 구제 불능인 건 마찬가지입니다."
 utopia.2602.d.organic: "네... 네, 그들이 발산하는 초능력이 느껴지는군요."
 utopia.2602.d.machine: "네... 그들의 사이오닉 주파수를 감지했습니다."
 utopia.2605.name.organic_non_gestalt: "초능력자로 밝혀진 [psionic_leader.GetTitle]"
 utopia.2605.name.machine_non_gestalt: "사이오닉 유닛으로 밝혀진 [psionic_leader.GetTitle]"
 utopia.2605.name.gestalt: "사이오닉 능력자로 밝혀진 [psionic_leader.GetName]"
 utopia.2605.desc.organic_non_gestalt: "성인기에 접어든 후에 사이오닉 능력이 발현하는 경우는 드물지만, 전례가 없는 것은 아닙니다. 최근 [psionic_leader.GetName] [psionic_leader.GetTitle](은)는 사이오닉으로 의심되는 능력을 선보였으며, 철저한 ESP 검사 결과, 4등급 사이오닉 능력자로 판별되었습니다."
 utopia.2605.desc.machine_non_gestalt: "드문 일이지만, 사이오닉 능력이 없던 유닛 중에서도 해당 능력이 발현되는 경우가 있습니다. 최근 [psionic_leader.GetName] [psionic_leader.GetTitle](은)는 사이오닉으로 의심되는 기능을 선보였으며, 철저한 검사 결과, 4등급 사이오닉 유닛으로 판별되었습니다."
 utopia.2605.desc.gestalt: "새롭게 얻은 힘의 영향력은 날이 갈수록 커지고 있습니다. 최근 우리 [GetBrainName]의 운반체인 [psionic_leader.GetName](은)는 사이오닉으로 의심되는 능력을 선보였으며, 철저한 검사 결과, 4등급 [GetPsychicNoun](으)로 판별되었습니다."
 utopia.2605.a: "이 새로운 능력은 우리한테 도움이 되겠어요."
 utopia.2652.name: "사이오닉 능력을 각성한 [This.GetSpeciesNamePlural]"
 utopia.2652.desc.1.intro: "은하계 내 [This.GetSpeciesNamePlural] 전체가 엄청난 변화를 겪었습니다. 전에는"
 utopia.2652.desc.1.outro: "사이오닉 잠재력을 완전히 해방한 것입니다."
 utopia.2652.desc.1.organic: "$utopia.2652.desc.1.intro$ 극소수만 잠재적 사이오닉 능력을 발현했지만, 이제는 종족 전체가 $utopia.2652.desc.1.outro$"
 utopia.2652.desc.1.machine: "$utopia.2652.desc.1.intro$ 극소수만 잠재적 사이오닉 능력을 나타냈지만, 이제는 종 전체가 $utopia.2652.desc.1.outro$"
 utopia.2652.desc.2.non_gestalt: "이러한 변화는 [From.GetName]에서 시작된 것으로 보이나, 이제는 지역에 상관없이 [GetSpeciesWord]의 모든 구성원에게서 나타나고 있습니다."
 utopia.2652.desc.2.organic_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\n또한, 강력한 사이오닉 능력을 보여주는 것 외에도 [This.GetSpeciesNamePlural](은)는 언어 대신 텔레파시를 사용해 의사소통하기 시작했습니다."
 utopia.2652.desc.2.machine_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.desc.2.gestalt.intro: "또한, 강력한 사이오닉 능력을 보여주는 것 외에도 [This.GetSpeciesNamePlural](은)는 이제"
 utopia.2652.desc.2.organic_gestalt: "$utopia.2652.desc.2.gestalt.intro$ 기존 채널을 넘어 비언어적인 소통을 할 수 있습니다."
 utopia.2652.desc.2.machine_gestalt: "$utopia.2652.desc.2.gestalt.intro$ 기존 집단 채널을 넘어 소통할 수 있습니다."
 utopia.2652.desc.organic_non_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_non_gestalt$"
 utopia.2652.desc.machine_non_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_non_gestalt$"
 utopia.2652.desc.organic_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_gestalt$"
 utopia.2652.desc.machine_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.b: "분명 논리적으로 설명할 방법이 있을 겁니다."
 utopia.2652.c.organic: "신중하게 진행하세요."
 utopia.2652.c.machine: "이상적이지 않은 전개군요."
 utopia.2652.d.organic: "이들의 각성으로 막대한 사이오닉 소동을 느꼈습니다."
 utopia.2652.d.machine: "이전에 감지했던 사이오닉 소동의 원인이로군요."
 utopia.2650.name: "위대한 각성"
 utopia.2650.desc: "[Root.GetSpeciesName](은)는 위대한 각성이라고밖에 설명할 수 없는 일을 경험했습니다. 지금까지 우리는 종족에 내재된 막강한 사이오닉 잠재력을 인지하고 있었지만, 그런 힘은 극소수에게서만 발현되었습니다... 지금까지는 말입니다.\n\n거의 하룻밤 사이에 모든 곳에 있는 [Root.GetSpeciesNamePlural](이)가 자신의 사이오닉 능력을 완전히 해방했습니다. 마치 [Root.GetSpeciesName] 전체의 사이오닉 에너지 같은 것이 임계점을 넘으면서, 두뇌에 잠재된 능력을 집단으로 각성한 듯합니다.\n\n이미 [Root.GetSpeciesNamePlural] 대부분은 언어 대신 텔레파시를 사용해 의사소통하고 있으며, 이는 우리 사회가 마주하게 될 수많은 변화 중 극히 일부일 뿐입니다. 이제 우리는 과거에 상상할 수도 없었던 방식으로 결속되어 있습니다."
 utopia.2650.a: "베일이 걷혔군요."
 utopia.2655.name: "장막"
 utopia.2655.desc: "장막은 마치 어두운 방에서 숨죽여 속삭이듯 정신 속에서 우리를 부릅니다. 장막은 순수한 초자연적 에너지로 이루어진 태고의 영역이며, 시간이 시작된 순간부터 존재했습니다. 사이오닉 능력을 타고난 모든 생명체는 힘을 끌어오기 위해 어떤 방식으로든 장막을 활용합니다. 설령 무의식적으로라도 말이죠.\n\n초월 이후, 우리는 더욱 선명하게 장막을 바라보게 되었습니다. 장막에는 한때 우리 제국의 가장 강력한 텔레파시 능력자들조차 형태 없이 소용돌이치는 에너지 덩어리로만 볼 수 있던 패턴이 존재합니다. 또한... 다른 것들도 있죠. 반대편에서 우리를 응시하고 영혼과 같은 존재 말입니다. 이들은 가끔은 호기심으로, 가끔은 친절함으로... 그리고 가끔은 악의를 품고 우리를 바라봅니다.\n\n우리는 아직 새로운 힘을 사용하는 법을 배우고 있지만, 이 영혼들과 소통이 가능할지 모릅니다. 물론 우리의 가장 강력한 텔레파시 능력자들을 하나로 모아야 하겠지만요."
 utopia.2655.a: "장막을 탐사해야겠어요."
 BREACHING_SHROUD_PROJECT: "장막 뚫기"
 BREACHING_SHROUD_PROJECT_DESC: "장막이라고 알려진 초자연적 영역의 주민들과 소통하길 원한다면, 막대한 양의 사이오닉 에너지를 방출해야 합니다. [Root.Capital.GetName]에 새로 설립된 텔레파시 능력자 밀회에서 가장 강력한 초능력자들이 참여하는 대규모 교령회를 준비했습니다."
 utopia.2656.name: "교령회"
 utopia.2656.desc: "최면 상태에 빠지고 며칠 후, 텔레파시 능력자 밀회에 참여한 우리 초능력자들이 드디어 장막으로 연결되는 게이트웨이를 짧게나마 열 수 있었습니다.\n\n이제 최초로 사이오닉 연결 고리를 구축했으니, 앞으로는 §H조우§! 메뉴에서 장막에 접근할 수 있을 것입니다. 유의미하게 장막에 진출하고 그곳에 거주하는 존재를 만나려면, 사이오닉 접근 범위를 확장하는 특별한 사이오닉 방출기를 사용해야 할 것입니다. 다만, 그러려면 엄청난 양의 에너지가 필요합니다."
 utopia.2656.a: "이제 장막으로 가서 확인해 볼 때가 됐군요."
 utopia.2657.name: "거울 나라의 세상"
 utopia.2657.desc: "아직 베일을 뚫지는 못했지만, 우리의 연합된 정신력 아래 베일이 점차 얇아지는 것이 느껴집니다. 하지만 §H장막§! 저편에서, 우리가 그 너머로 들어가려 한다는 사실을 알아챘습니다. 무언가가 우리를 지켜보고 있습니다.\n\n그 존재는 엄청난 힘을 내뿜고 있으며, 가늠할 수조차 없는 목적을 지니고 있습니다. 그 존재가 우리 정신의 틈 사이로 스며듭니다.\n\n이 존재는 우리에게 거의 신경을 쓰지 않습니다. 마치 창문에 맺히는 물방울을 바라보듯 우리를 보고 있습니다. 우리가 이 존재의 헤아리기 어려운 정신에 닿을 수만 있다면, 우리를 들여보내 줄지도 모릅니다."
 utopia.2657.a: "교감을 시도해 보세요."
 utopia.2657.a.tt: "§G계약을 맺을 수 있게 됩니다.§!"
 utopia.2657.b: "우리가 알아서 들어갑시다."
 utopia.2657.c: "애초에 잘못된 생각이었어요! 앞으로 더 조심해야 됩니다."
 utopia.2658.name: "확정"
 utopia.2658.desc: "§H[GetShroudPatron]§!(과)와 계약하기 위한 기초를 마련한 뒤로 꽤 시간이 흘렀습니다. 연결은 아직 약하므로, 연결을 끊거나 강화할 기회는 남아 있습니다."
 utopia.2658.a: "계약을 확정하세요."
 utopia.2658.b: "§Y[GetShroudPatron]§!(을)를 거부하세요."
 utopia.2659.name: "진입점"
 utopia.2659.desc: "우리 텔레파시 능력자들이 §H장막§! 너머 존재의 도움 없이 장막을 뚫기 위해 부단히 애쓰고 있습니다. 그리고 마침내 진입점을 찾았습니다. 심연이 우리를 부릅니다. 우리가 할 일은 이제 과감하게 뛰어드는 것뿐입니다."
 utopia.2659.a: "장막 너머의 심연으로 가 봅시다."
 FORM_COVENANT_PROJECT: "형언할 수 없는 존재와의 교감"
 FORM_COVENANT_PROJECT_DESC: "[Root.Capital.GetName]의 텔레파시 능력자 밀회가 장막에 거주하는 존재와의 위대한 교감을 위한 준비를 하고 있습니다."
 utopia.3020.name: "§G사이오닉 아바타 소환§!"
 utopia.3020.desc: "§H장막§!의 강력한 에너지가 우리가 통제하는 사이오닉 아바타에 성공적으로 흘러들어 왔습니다!\n\n새로이 태어나 우리 차원으로 옮겨진 아바타는 [Root.Capital.GetName] 궤도상의 우주 비행체로 거듭났습니다."
 utopia.3021.desc: "§H장막§!의 강력한 에너지가 우리가 통제하는 사이오닉 아바타에 성공적으로 흘러들어 왔습니다!\n\n새로이 태어나 우리 차원으로 옮겨진 아바타는 [Root.Capital.GetName] 지표면에서 거대한 전사로 거듭났습니다."
 utopia.3022.name: "§R소환 실패§!"
 utopia.3022.desc: "아바타를 소환하고 우리 차원으로 가져오려면, 현재 우리의 능력을 뛰어넘는 막대한 사이오닉 에너지가 필요합니다. 이에 대한 시도가 실패로 돌아가자, §H장막§!의 에너지가 불안한 듯이 사라졌습니다."
 utopia.3023.name: "사이오닉 개체의 공격"
 utopia.3023.desc: "사이오닉 아바타를 소환하려는 시도는 부분적인 성공만을 거뒀습니다. 아바타가 올바른 형태를 취하고 우리 차원으로 넘어왔지만, [GetTelepathPlural]들이 아바타를 통제하지 못한 것입니다!\n\n이제 자신의 앞길을 가로막는 것은 모조리 파괴하려는 공격적인 사이오닉 개체를 상대해야 합니다."
 utopia.3024.name: "장막의 습격"
 utopia.3024.desc: "§H장막§!의 아바타가 우주의 구조를 관통해 [shroud_spawn_system.GetName] 성계에서 실체화했습니다! 아바타는 복수심에 불타며 엄청난 양의 사이오닉 에너지를 축적했고, 이를 이용해 자신의 길을 가로막는 불행한 자들을 공격하고 있습니다."
 utopia.3024.a: "아바타를 막아야 합니다!"
 utopia.3026.name: "장막 아바타 추방"
 utopia.3026.desc: "일반 우주의 존재를 계속해서 위축시킨 결과, §H[shroud_spawn_system.GetName]§! 성계의 아바타가 약화되었습니다.\n\n실체를 유지할 수 없게 된 아바타는 다시 §H장막§! 속으로 물러났습니다."
 utopia.3026.a.default: "속이 시원하군요."
 utopia.3026.a.machine_or_hive: "뜻밖의 행운이군요."
 exit.shroud: "장막을 나간다."
 shroud_army: "사이오닉 아바타"
 shroud_army_desc: "장막에서 온 거대한 전사로서, 순수한 사이오닉 에너지로 만들어졌습니다."
 shroud.chances.high: "§G높은 성공 확률§!"
 shroud.chances.medium: "§Y중간 성공 확률§!"
 shroud.chances.low: "§R낮은 성공 확률§!"
 venture.shroud.tooltip: "에너지를 소비해 장막의 더 깊은 곳까지 탐험합니다. 우리가 가진 §H즈로§! 매장지가 많을수록 비용은 최대 4개까지 감소합니다.\n\n"
 exit.shroud.tooltip: "장막을 떠나 일반 우주로 돌아옵니다."
 shroud.avatar: "성공한다면 순수한 초자연적 에너지의 아바타가 우리 우주에 등장합니다. 아바타는 완전하게 통제할 수 있을 것입니다."
 shroud.boon: "성공한다면 장막의 에너지가 우리 제국 전체에 긍정적인 효과를 주는 강력한 혜택으로 변할 것입니다."
 shroud.unknown: "성공한다면... 흠... 어떻게 될지 누가 알겠습니까?"
