 utopia.3100.name: "불타는 폐허"
 utopia.3100.desc_prefix: "[Root.Capital.GetName]... 흐릿하고 희미한 광경이지만, 의문의 여지가 없습니다. 여기는 [Root.Capital.GetName], 바로 우리의 수도입니다. "
 utopia.3100.desc_suffix: "\n\n§H가능성 중 하나가 아닙니다. 그렇게 될 것입니다. 태양이 뜨는 것만큼이나 확실히 말입니다. 이것이 당신의 운명입니다.§!\n\n환영은 소용돌이치는 초자연적 에너지의 기운을 남기며, 이곳에 나타난 것만큼이나 빠르게 사라졌습니다."
 utopia.3100.desc_default: "$utopia.3100.desc_prefix$비록 불과 연기로 뒤덮여 잘 알아볼 수 없지만, 이 위대한 도시는 사뭇 다르면서도 익숙하게 보입니다. 하지만 수천... 아니, 수백만의 훼손된 시체가 거리에 나뒹굴고 있습니다. 전부 [Root.GetSpeciesName]입니다. 게다가 참기 힘들 정도의 시체 썩는 악취가 진동하고 있습니다.\n\n§H당신의 미래입니다.§!\n\n폐허 속에 살아 있는 자들은 없습니다. 하늘에는 거대한 궤도 시설이 연기를 뿜으며 천천히 행성을 향해 피할 수 없는 하강을 하고 있습니다. 우리가 미래의 수많은 가능성 중 하나를 보고 있는 걸까요?$utopia.3100.desc_suffix$"
 utopia.3100.desc_hive: "$utopia.3100.desc_prefix$비록 불과 연기로 뒤덮여 잘 알아볼 수 없지만, 이 위대한 도시는 사뭇 다르면서도 익숙하게 보입니다. 하지만 수천... 아니, 수백만의 훼손된 시체가 거리에 나뒹굴고 있습니다. 전부 [Root.GetSpeciesName]입니다. 게다가 시체 썩는 악취가 만연합니다.\n\n§H당신의 미래입니다.§!\n\n폐허 속에 살아 있는 자들은 없습니다. 하늘에는 거대한 궤도 시설이 연기를 뿜으며 천천히 행성을 향해 피할 수 없는 하강을 하고 있습니다. 우리가 미래의 수많은 가능성 중 하나를 보고 있는 걸까요?$utopia.3100.desc_suffix$"
 utopia.3100.desc_machine: "$utopia.3100.desc_prefix$비록 불과 연기로 뒤덮여 있지만, 이 주요 도시는 사뭇 다르면서도 인식할 수 있습니다. 하지만 수천... 아니, 수백만의 해체된 유닛이 거리에 나뒹굴고 있습니다. 전부 [Root.GetSpeciesName]입니다. 주변에 파괴가 가득합니다.\n\n§H당신의 미래입니다.§!\n\n폐허 속에 제대로 작동하는 것이 남아 있지 않습니다. 하늘에는 거대한 궤도 시설이 연기를 뿜으며 천천히 행성을 향해 피할 수 없는 하강을 하고 있습니다. 우리가 미래의 수많은 가능성 중 하나를 수신하고 있는 걸까요?$utopia.3100.desc_suffix$"
