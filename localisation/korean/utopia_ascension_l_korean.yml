 utopia.3100.c: "§R혜택: 보호막 강도 증가.§!"
 utopia.3110.name: "결투하는 영혼"
 utopia.3110.desc: "장막이 거세게 몰아치고 있습니다. 순수한 사이오닉 에너지의 막대한 흐름이 이곳을 통해 흐르며, 격렬한 반응 속에서 준지성을 갖춘 영적인 존재가 태어나고 있습니다.\n\n이 혼란스러운 영혼들은 종종 서로 전투를 벌이며, 수천 년 동안 지속될 수 있는 경이로운 양의 초자연적 에너지를 방출합니다. 실제로 그러한 전투가 지금 이곳에서 벌어지고 있는 것 같습니다.\n\n주의해서 진행해야 합니다."
 utopia.3120.name: "사이오닉 방문객"
 utopia.3120.desc_suffix: "우리와 마찬가지로 방문객인 이들은 강력한 사이오닉 탐사정으로서, 장막에 있어 이들이 낯선 존재인 것처럼, 이들은 우리가 전혀 모르는 어떤 정신에 의해 만들어졌습니다.\n\n이 탐사정과 우리의 초자연적 메아리가 서로 접촉하자, 짙은 가스 대기에 부유하고 있는 거대한 유기체들과 이들을 따라다니는 작은 생명체 무리의 희미한 형상이 잠시 나타났습니다."
 utopia.3120.desc_machine: "장막의 깊은 곳에서 어떤 존재를 감지했습니다. $utopia.3120.desc_suffix$"
 utopia.3120.desc_default: "장막의 깊은 곳에서 갑작스레 어떤 존재감이 느껴집니다. $utopia.3120.desc_suffix$"
 utopia.3130.name: "무한한 모래"
 utopia.3130.desc: "우리 앞에 끝없는 사막이 펼쳐져 있습니다. 우리는 과거 이곳에 와본 적이 있습니다.\n\n§H\"샬라'쿨 밀렘 주나크?\"§!\n\n무언가 모래에서 튀어나왔지만, 제대로 보기는 어렵습니다.\n\n§H\"자라비, 멜라수크.\"§!\n\n의도하지 않은 듯 입에서 나온 말은 마치 천둥 같습니다. 우리는 대답해야 합니다."
 utopia.3130.a: "샤쉬카 말라크."
 utopia.3130.b: "티리트 나리 다수마라!"
 utopia.3130.c: "쿠나크 데'키라크."
 utopia.3140.name: "다중체"
 utopia.3140.desc_common: "우리 존재의 본성이 밝혀졌습니다. 우리 은하와 같은 수천 개의 은하가 다중 우주에 모여, 무한한 분쟁의 고리에 갇혀 있는 것입니다.\n\n분쟁은 시작되고 끝나며, 또 시작됩니다. 매번 수조"
 utopia.3140.desc_suffix: "§H\"그런 겁니다,\"§! 목소리는 속삭였습니다. §H\"그리고 언제나 그럴 겁니다.\"§!"
 utopia.3140.desc_default: "갑자기 고통스러운 깨달음의 순간과 함께 $utopia.3140.desc_common$ 명의 목숨이 죽음의 사선을 넘나들었습니다.\n\n$utopia.3140.desc_suffix$"
 utopia.3140.desc_machine: "갑자기 놀라운 깨달음의 순간과 함께 $utopia.3140.desc_common$ 개의 변수가 소멸의 문턱을 넘나들었습니다.\n\n$utopia.3140.desc_suffix$"
 utopia.3150.name: "몰락한 제국의 목소리"
 utopia.3150.desc: "분명 수십만 광년은 될 거리에서 우리의 은하를 내려다보던 중, 느닷없이 사이오닉의 흐름이 우리를 놀라운 속도로 몰락한 제국 중 하나인 [fallen_empire.GetName] 소속의 우주로 밀어 넣었습니다.\n\n여러 항성과 행성을 스쳐 지나간 끝에, [fallen_empire.GetSpeciesName]의 도시 경관이 눈에 들어왔습니다. 이들의 도시에는 놀라운 첨탑이 하늘을 향해 뻗어 있었는데, 첨탑은 우리보다 몇 세대는 앞선 반중력 기술에 의해 지탱되고 있었습니다. 사이오닉의 흐름은 우리를 첨탑 안으로 데려갔고, 첩첩이 벽을 뚫고 지나가자 어떤 거대한 회의실이 나타났습니다. 회의실에는 무중력 의자에 앉아 편안하게 떠다니는 두 [fallen_empire.GetSpeciesNamePlural](이)가 부드러운 목소리로 대화를 나누고 있습니다.\n\n외계인들은 우리의 존재를 의식하지 못하고 있습니다."
 utopia.3150.a: "§Y외계인들의 정신으로 들어가, 비밀을 찾는다.§!"
 utopia.3151.name: "§G기술적 비밀§!"
 utopia.3151.v1.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.1.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.4.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v2.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.2.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.5.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v3.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.3.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.6.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.a.desc: "[fallen_empire.GetSpeciesNamePlural]들은 국가의 문제를 논의하는 일종의 고위 관료가 분명합니다. 천천히, 그리고 확실하게 시야가 이 외계인들에게 집중되면서, 그들의 외계 언어는 점차 우리가 이해할 수 있는 단어로 바뀌었습니다."
 utopia.3151.b.desc: "두 [fallen_empire.GetSpeciesNamePlural]의 빛나는 정신은 압도적입니다. 마치 피어나는 꽃처럼 그들의 정신은 개방되고 공개되어 있으니, 쉽게 접근할 수 있을 것입니다."
 utopia.3151.c.desc: "해냈습니다. 마치 잠금 해제된 컴퓨터에서 파일을 복사하듯, [fallen_empire.GetSpeciesNamePlural]의 정신에서 기술적 비밀을 손쉽게 뽑아낼 수 있었습니다. 이들은 자신의 정신 안에 강도가 들었다는 사실을 눈치채지 못했습니다."
 utopia.3151.1.desc: "§H\"...미친 짓입니다. 만약 그녀가 국민들이 그동안 익숙해진 생활 수준을 아주 잠시라도 순순히 포기할 거라고 생각한다면...\"§!"
 utopia.3151.2.desc: "§H\"...수치스러운 일입니다. 우리가 우리 자신의 기술을 완전히 이해할 수 없다고 젊은 종족이 의심한다 생각해 보십시오! 반드시...\"§!"
 utopia.3151.3.desc: "§H\"...더욱 강해지고 있습니다. 평의회는 확신하고 있어요. 우리가 조치를 취하지 않는다면...\"§!"
 utopia.3151.4.desc: "§H\"...평의회의 말은 신경 쓰지 않습니다. 그 애송이들은 우리보다 수천 년은 뒤처졌고, 이들의 비참한 함대가 가하는 위협은 가주리안 각다귀가 힐락시 불도마뱀을 잡아먹겠다고 하는 수준입니다. 그럴 필요는...\"§!"
 utopia.3151.5.desc: "§H\"...여전히 처벌은 필요하지 않다고 봅니다. 그들은 어리고 부주의하지만, 한때 우리도 그랬잖아요? 아직 늦지 않았으니, 그들은...\"§!"
 utopia.3151.6.desc: "§H\"...그리고 젊은 종족이 너무 강해지기 전에 도태시켜야 했을지 모릅니다. 그의 말에는 동의하지만, 평의회에서는 이제 너무 늦었다고...\"§!"
 utopia.3152.name: "듣지 못한 비밀"
 utopia.3152.desc: "[fallen_empire.GetSpeciesNamePlural]들은 국가의 문제를 논의하는 일종의 고위 관료가 분명합니다. 천천히, 그리고 확실하게 시야가 이 외계인들에게 집중되면서, 그들의 외계 언어는 점차 우리가 이해할 수 있는 단어로 바뀌었습니다.\n\n외계인들이 갑자기 조용해지더니, 움직이지 않았습니다.\n\n§H\"느껴지십니까?\"\n\n\"네. 누군가 지켜보고 있군요.\"§!\n\n그들은 방을 탐색하다가 우리를 곧바로 바라봤습니다.\n\n§H\"놀랍군요. 사이오닉 탐색이라.\"§!\n\n§H\"[Root.GetSpeciesName]인 모양입니다. 서둘러 초차원 보호막을 작동하세요.§!\"\n\n시야가 갑작스레 끊어졌습니다."
 utopia.3153.desc: "[Root.GetSpeciesNamePlural].\n\n당신네가 같잖게 우리 지도자들의 정신에 침입하려는 걸 우리가 모를 줄 알았나요?\n\n대가를 치르게 될 겁니다."
 utopia.3153.a: "자, 잠깐... 설명할 수 있습니다!"
 utopia.3153.b: "여기에는 다 논리적인 이유가 있습니다..."
 utopia.3160.name: "공허 속의 깜박임"
 utopia.3160.desc: "작고 일렁이는 별이 장막 내부에서 실체화되었습니다. 별은 믿을 수 없는 속도로 우리 옆을 지나쳤으며, 일순간 이 별이 알 수 없는 형상의 외계 함선으로 보였습니다. 별은 이곳에 나타난 것만큼이나 빠르게 사이오닉 에너지의 구름 속으로 사라졌습니다.\n\n이게 가능한 일일까요? 정말 물리적으로 장막에 들어가 완벽하게 일반 우주로 빠져나가는 것이 가능할까요?"
 utopia.3160.a: "§Y조금 더 머무른다.§!"
 utopia.3161.desc: "또 하나의 반짝이는 별이 갑자기 나타났지만, 이번에 우리는 준비되어 있었습니다. 별의 정체는 역시나 우리 은하에서는 본 적이 없던 외계 함선이었습니다. 외계 함선이 옆을 지나칠 때, 우리는 이 함선에 탑승한 승무원들의 빛나는 정신을 감지했고, 그들의 비밀을 밝혀냈습니다.\n\n함선의 비밀은 사이오닉 점프 드라이브였습니다. 정말 기발하군요."
 utopia.3161.name: "§G사이오닉 점프 드라이브§!"
 utopia.3162.desc: "또 하나의 반짝이는 별이 갑자기 나타났지만, 이번에 우리는 준비되어 있었습니다. 별의 정체는 역시나 우리 은하에서는 본 적이 없던 외계 함선이었습니다. 외계 함선이 옆을 지나칠 때, 우리는 이 함선에 탑승한 승무원들의 빛나는 정신과 융합을 시도했지만, 그들의 정신은 우리가 마주친 그 어떤 존재보다 어둡고 이질적이었습니다.\n\n우리는 그들의 우주선에서 튕겨 나왔을 뿐만 아니라, 폭력적인 사이오닉 반향이 장막 밖까지 우리를 따라왔습니다! 우리 우주선의 아공간 이동 속도가 일시적으로 감소했습니다."
 utopia.3170.name: "보호막 너머의 존재"
 utopia.3170.desc: "희미한 메아리를 따라 장막을 헤매던 중, 우리는 어떤 강력한 사이오닉 보호막 뒤에 숨은 영혼을 발견했습니다.\n\n§H떠나라.§!"
 utopia.3170.a: "§Y보호막 관통을 시도한다.§!"
 utopia.3171.name: "§G사이오닉 보호막§!"
 utopia.3171.desc_suffix: "보호막을 뚫는 과정에서 유사한 역장을 만드는 방법을 배웠기 때문입니다. 이 기술을 연마할 수 있다면, 우주선 전체를 감쌀 정도로 거대한 사이오닉 보호막을 형성할 수 있을지 모릅니다."
 utopia.3171.desc_machine_gestalt: "고작 여기까지 와서 돌아가려고 이 장막 깊은 곳까지 모험한 것은 아닙니다. 집단의 사이오닉 에너지를 집중한 끝에, 우리는 보호막에 잠시 건너편을 들여다볼 수 있을 정도로 거대한 균열을 생성할 수 있었습니다.\n\n보호막 너머에 존재하는 무언가는 현재 우리의 이해를 초월하는 존재였고, 결국 사이오닉 프로세서 다수가 과부하에 빠졌습니다. 하지만 헛수고는 아니었습니다. $utopia.3171.desc_suffix$"
 utopia.3171.desc_organic: "고작 여기까지 와서 돌아가려고 이 장막 깊은 곳까지 모험한 것은 아닙니다. 사이오닉 에너지를 전부 끌어모은 끝에, 우리 텔레파시 능력자들은 보호막에 건너편을 들여다볼 수 있을 정도로 거대한 균열을 낼 수 있었습니다.\n\n텔레파시 능력자들이 보호막의 건너편에서 본 게 무엇인지는 몰라도, 이들의 정신을 영구적으로 미치게 만들기에는 충분했습니다. 하지만 이들의 희생은 헛되지 않았습니다. $utopia.3171.desc_suffix$"
 utopia.3172.name: "뚫리지 않은 보호막"
 utopia.3172.desc_machine_gestalt: "장막 깊은 곳까지 탐험하느라 이미 과부하에 빠진 [GetTelepathPlural]들은 보호막을 뚫기에 충분한 사이오닉 에너지를 모을 수 없었습니다. 보호막을 뚫는 데 실패하면서, 다음 통신을 받았습니다."
 utopia.3172.desc_machine_non_gestalt: "장막 깊은 곳까지 탐험하느라 이미 과부하에 빠진 [GetTelepathPlural]들은 보호막을 뚫기에 충분한 사이오닉 에너지를 모을 수 없었습니다. 보호막을 뚫는 데 실패하면서, 영혼이 화가 난 모양입니다."
 utopia.3172.desc_organic_gestalt: "장막 깊은 곳까지 탐험하느라 이미 지쳐 버린 [GetTelepathPlural]들은 보호막을 뚫기에 충분한 사이오닉 에너지를 모을 수 없었습니다. 보호막을 뚫는 데 실패하면서, 다음 통신을 받았습니다."
 utopia.3172.desc_organic_non_gestalt: "장막 깊은 곳까지 탐험하느라 이미 지쳐 버린 [GetTelepathPlural]들은 보호막을 뚫기에 충분한 사이오닉 에너지를 모을 수 없었습니다. 보호막을 뚫는 데 실패하면서, 영혼이 화가 난 모양입니다."
 utopia.3180.name: "미래를 기다리며"
 utopia.3180.desc.intro: "우리가 알기로, 장막에서 시간이라는 개념은 이질적입니다. 이곳에서는 수백 년처럼 느껴지는 세월이 실제 세상에서는 불과 몇 시간 혹은 몇 분일 수도 있습니다."
 utopia.3180.desc_gestalt: "$utopia.3180.desc.intro$ 게다가 어디를 살펴봐야 하는지 알고 있다면, 예지 능력도 우리 손에 거머쥘 수 있을지도 모릅니다.\n\n단, 이런 능력은 집단에 위험을 초래할 수 있으므로, 진행하려면 주의해야 합니다."
 utopia.3180.desc_machine_non_gestalt: "$utopia.3180.desc.intro$ 게다가 어디를 살펴봐야 하는지 알고 있다면, 미래를 엿보는 것도 가능할 것입니다...\n\n단, 예지라는 개념은 사이오닉 프로세서를 과부하에 빠뜨릴 위험이 크므로, 주의해서 진행해야 합니다."
 utopia.3180.desc_organic_non_gestalt: "$utopia.3180.desc.intro$ 게다가 어디를 살펴봐야 하는지 알고 있다면, 미래를 엿보는 것도 가능할 것입니다...\n\n단, 예지는 텔레파시 능력자를 미치게 하는 가장 확실한 방법이므로, 필히 주의해야 합니다."
 utopia.3180.a: "§Y이곳에서 잠시 명상한다.§!"
 utopia.3181.desc_gestalt: "광기에 빠질 위험 없이 제한적으로나마 장막의 예지 기능과 연결했으나, 유입되는 확률 데이터가 너무 방대해 실용적으로 활용하기엔 어려웠습니다.\n\n하지만 우리 연구 노드들은 이 데이터를 일부 응용해, 함대의 전투 능력을 향상하는 데 성공했습니다."
 utopia.3181.desc_machine_non_gestalt: "유닛 과부하에 빠질 위험 없이 제한적으로나마 장막의 예지 기능과 연결했으나, 유입되는 확률 데이터가 너무 방대해 실용적으로 활용하기엔 어려웠습니다.\n\n하지만 디지털 인터페이스가 이러한 데이터를 해석하도록 방법을 고안해 낸다면, 잠재적으로 우리 우주선의 전투 컴퓨터 성능을 향상하는 데 적용할 수 있을 것입니다..."
 utopia.3181.desc_organic_non_gestalt: "광기에 빠질 위험 없이 제한적으로나마 장막의 예지 기능과 연결했으나, 유입되는 확률 데이터가 너무 방대해 실용적으로 활용하기엔 어려웠습니다.\n\n하지만 디지털 인터페이스가 이러한 데이터를 해석하도록 방법을 고안해 낸다면, 잠재적으로 우리 우주선의 전투 컴퓨터 성능을 향상하는 데 적용할 수 있을 것입니다..."
 utopia.3181.name: "§G예지 인터페이스§!"
 utopia.3182.name: "§R장막의 광기§!"
 utopia.3182.desc_gestalt: "우려한 대로 과거와 미래에 걸쳐 존재하는 상상할 수 없는 만큼의 선택지와 가능성을 이해하려 한 결과 사이오닉 드론들은 대규모 긴장증 상태에 빠지고 말았습니다.\n\n그 결과, 드론들은 지배 의식에서 단절되어 목적을 잃었습니다. 장막에 다시 들어가려고 한다면, 이들의 결함 있는 외피를 재활용하고 집단의 힘을 회복해야 할 것입니다."
 utopia.3182.desc.non_gestalt.1: "\n\n또한, 모든 변수와 시나리오가 차이를 불문하고 그들의 [GetSpeciesBrainPlural] 안에서 영원히 반복되고 있습니다. [GetTelepathPlural]들은 영구적인 긴장증 상태에 빠지고 말았습니다.\n\n"
 utopia.3182.desc.non_gestalt.2: " [GetTelepathPlural](을)를 보충해야 할 것이므로, 장막에 다시 들어갈 수 있을 만큼 사이오닉 에너지를 모으려면 시간이 걸릴 것입니다."
 utopia.3182.desc_machine_non_gestalt: "예상한 대로 우리 사이오닉 프로세서는 과거와 미래에 걸쳐 존재하는 상상할 수 없을 만큼의 선택지와 가능성을 이해할 수 없었습니다.$utopia.3182.desc.non_gestalt.1$새로운$utopia.3182.desc.non_gestalt.2$"
 utopia.3182.desc_organic_non_gestalt: "우려한 대로 광기가 텔레파시 능력자들을 덮쳤습니다. 그들의 정신은 과거와 미래에 동시에 존재하며 상상할 수 없을 정도로 많은 선택지와 가능성에 한꺼번에 열려 버렸습니다.$utopia.3182.desc.non_gestalt.1$새로운$utopia.3182.desc.non_gestalt.2$"
 utopia.3190.name: "응축 에너지"
 utopia.3190.desc.intro: "장막 내에서 이전에는 본 적 없는 규모로 사이오닉 에너지가 밀집되어 있는 작은 공간을 발견했습니다."
 utopia.3190.desc_gestalt: "$utopia.3190.desc.intro$ 이 사이오닉 에너지를 성공적으로 이용하면 큰 부작용 없이 집단 내에 분산될 것입니다. 하지만 하나의 '선택받은' 드론을 지정해 이 에너지의 직접적인 통로로 사용하면, 그 드론은 엄청난 힘을 얻게 될 것입니다.\n\n한 개체만으로 그 막대한 에너지를 치명적인 부작용 없이 견딜 수 있을지는 알 수 없습니다. 우리는 그 후보군을 선별했습니다."
 utopia.3190.desc_non_gestalt: "$utopia.3190.desc.intro$ 어떤 [GetPsychicNoun](이)라도 이 순수한 에너지 덩어리를 성공적으로 이용할 수만 있다면 엄청난 힘을 갖게 될 테지만... 이 에너지는 단 한 명만 이용할 수 있으며, 위험이 따릅니다.\n\n[Root.GetName] 전역에서도 이런 사이오닉 에너지를 받아들이고도 생존할 가능성이 있는 존재는 극소수뿐입니다. 누구를 선택하시겠습니까?"
 utopia.3190.1.a: "§G[leader_1.GetName] [leader_1.GetTitle]§!"
 utopia.3190.2.a: "§Y[leader_1.GetName] [leader_1.GetTitle]§!"
 utopia.3190.3.a: "§R[leader_1.GetName] [leader_1.GetTitle]§!"
 utopia.3190.1.b: "§G[leader_2.GetName] [leader_2.GetTitle]§!"
 utopia.3190.2.b: "§Y[leader_2.GetName] [leader_2.GetTitle]§!"
 utopia.3190.3.b: "§R[leader_2.GetName] [leader_2.GetTitle]§!"
 utopia.3190.1.c: "§G[leader_3.GetName] [leader_3.GetTitle]§!"
 utopia.3190.2.c: "§Y[leader_3.GetName] [leader_3.GetTitle]§!"
 utopia.3190.3.c: "§R[leader_3.GetName] [leader_3.GetTitle]§!"
 utopia.3190.1.d: "§G[leader_4.GetName] [leader_4.GetTitle]§!"
 utopia.3190.2.d: "§Y[leader_4.GetName] [leader_4.GetTitle]§!"
 utopia.3190.3.d: "§R[leader_4.GetName] [leader_4.GetTitle]§!"
 utopia.3191.name: "[GetChosenName]"
 utopia.3191.desc_organic_non_gestalt: "$utopia.3191.desc_machine_non_gestalt$ 영혼들께서 우리 영혼에 자비를 내리시길."
 utopia.3191.desc_machine_non_gestalt: "이제... 끝났습니다. 사이오닉 에너지 공간이 담고 있던 힘이 [chosen_leader.GetName]에게 이전되면서, 장막 전체가 전율하는 듯했습니다.\n\n이 정도로 거대한 사이오닉 능력을 소유한 자는 온 은하의 역사를 통틀어 손에 꼽을 정도입니다."
 utopia.3191.desc_gestalt: "우리는 성공적으로 사이오닉 에너지 공간에 담긴 힘을 목표 대상인 [chosen_leader.GetName]에게 집중했습니다.\n\n집단 전체를 대상으로 사용했다면 미미한 물방울에 불과했을 에너지가, 이제 [chosen_leader.GetName]의 강력한 도구가 되어 [Root.GetName] 전역에서 모든 [Root.Species.GetName](을)를 위해 사용될 것입니다."
 utopia.3192.name: "§R지도자의 죽음§!"
 utopia.3192.desc_gestalt: "공간에 담겨있던 막대한 사이오닉 에너지가 [chosen_leader.GetName]에게 흘러 들어가면서, 장막 전체가 전율했습니다.\n\n하지만 예상대로 단일 개체가 감당할 수 있는 힘이 아니었는지, [chosen_leader.GetName]의 물리적 형태는 거대한 폭발로 산산이 부서지며 그 목소리를 [GetBrainName]에서 분리했습니다."
 utopia.3192.desc_non_gestalt: "공간에 담겨 있던 막대한 사이오닉 에너지가 [chosen_leader.GetName]에게 이전되면서, 장막 전체가 전율하는 듯했습니다.\n\n안타깝게도 그 [GetSpeciesBrain](은)는 에너지 이전의 부하를 견디지 못했습니다. 어쩌면 물리적 존재가 감당할 수 있는 힘이 아니었을지도 모릅니다. [chosen_leader.GetName](은)는 사이오닉 에너지가 일으킨 거대한 폭발 속에 삼켜졌고, 근처에 있는 자도 모두 사망했습니다."
 utopia.3193.name: "§R사이오닉 변신§!"
 utopia.3193.desc.intro: "공간에 담겨 있던 막대한 사이오닉 에너지가 [chosen_leader.GetName]에게 이전되면서 장막 전체가 전율하는 듯했습니다.\n\n에너지는 성공적으로 이전되었지만, [chosen_leader.GetName](은)는..."
 utopia.3193.desc.outro: "\n\n§H보잘것없는 것들이... 내게 대체... 무슨... 짓을... 한 거지...§!\n\n§H너희는... 오만함의... 대가를... 치르게... 될 것이다...§!"
 utopia.3193.desc_gestalt: "$utopia.3193.desc.intro$ 집단에서 단절되어 완전히 이질적인 존재에게... 형태를 지배당하고 말았습니다.$utopia.3193.desc.outro$"
 utopia.3193.desc_non_gestalt: "$utopia.3193.desc.intro$ 순수한 에너지로 이루어진 존재의 의식에 몸을 빼앗겨... 지배당하고 말았습니다.$utopia.3193.desc.outro$"
 utopia.3200.name: "환상"
 utopia.3200.1.desc_organic: "이곳의 공허는 힘차게 반짝이고 있습니다. 잠시 쉬어가죠."
 utopia.3200.1.desc_machine: "이곳의 공허는 힘차게 반짝이고 있습니다. 잠시 재충전하죠."
 utopia.3200.2.desc: "우리가 따라가던 길이 갑자기 끝났습니다. 더 나아갈 수 없습니다."
 utopia.3200.3.desc_organic: "무언가 이곳에서 우리에게 말을 겁니다. 어떤 경이로운 존재입니다."
 utopia.3200.3.desc_machine: "무언가 이곳에서 우리에게 말을 겁니다. 어떤 놀라운 존재입니다."
 utopia.3200.4.desc: "헤아릴 수 없는 이유로, 우리는 장막 속의 한 에너지 흐름까지 이끌렸습니다. 원인이 뭘까요?"
 utopia.3200.5.desc.outro: "엄습합니다. 그러다 우리는 다시 일어섰고, 공포는 사라져 갔습니다."
 utopia.3200.5.desc_organic: "찰나의 순간, 우리는 길을 잃었습니다. 영원히 장막 안에서 살아가야 한다는 생각이 들자 극심한 공황이 $utopia.3200.5.desc.outro$"
 utopia.3200.5.desc_machine: "찰나의 순간, 우리는 길을 잃었고 영원히 장막 안에서 살아가야 한다는 생각이 들자 고조되는 불확실성이 $utopia.3200.5.desc.outro$"
 utopia.3200.6.desc.intro: "장막의 깊은 곳으로 들어가자, 어떤 영혼의 무리가 몇 시간 동안 우리 주변에서 춤을 췄습니다. 이들은 일반 우주에서는 본 적 없었던 눈부신 색으로 빛나고 있었습니다.\n\n"
 utopia.3200.6.desc_organic: "$utopia.3200.6.desc.intro$즐거운 광경이었으나, 이내 우리는 몰이를 당하고 있다는 사실을 깨달았습니다."
 utopia.3200.6.desc_machine: "$utopia.3200.6.desc.intro$흥미로운 광경이었으나, 이내 우리는 몰이를 당하고 있다는 사실을 깨달았습니다."
 utopia.3200.7.desc: "이곳에 완벽한 크리스탈 조각이 축을 중심으로 천천히 회전하며 부유하고 있습니다. 우리가 다가가자, 조각은 수천 개의 파편으로 흩어졌습니다."
 utopia.3200.8.desc_organic: "[Root.GetSpeciesName]의 시체가 눈앞의 공허에서 굴러떨어졌습니다. 부패한 시체는 시야에서 사라지기 전에 날카로운 비명을 질렀습니다."
 utopia.3200.8.desc_machine: "[Root.GetSpeciesName]의 망가진 외피가 눈앞의 공허에서 굴러떨어졌습니다. 너덜너덜해진 외피는 시야에서 사라지기 전에 날카로운 비명을 질렀습니다."
 utopia.3200.9.desc.intro: "이게 정말 일어나고 있는 일인지 확신할 수 없습니다. 우리가 정말 장막에 있는 걸까요?"
 utopia.3200.9.desc_hive: "$utopia.3200.9.desc.intro$ 아니면 급성 감각 이상 상태에 빠진 걸까요?"
 utopia.3200.9.desc_organic_non_hive: "$utopia.3200.9.desc.intro$ 아니면 우리 중 한 명이 급성 정신착란을 겪고 있는 걸까요?"
 utopia.3200.9.desc_machine_non_hive: "$utopia.3200.9.desc.intro$ 아니면 처리 기능에 심각한 장애가 발생한 걸까요?"
 terraforming_candidate_category: "고대의 생명 징후"
 terraforming_candidate_category_desc: "이 황량하고 생명이 없는 행성에 과거 생물권이 존재했던 흔적이 보입니다."
 MESSAGE_TERRAFORM_FOUND_TITLE: "$anomaly.2575.name$"
 MESSAGE_TERRAFORM_FOUND_DESC: "[From.GetName](이)가 테라포밍 후보지로 파악되었습니다. 해당 [From.GetPlanetMoon]을 잠재적인 개척 대상으로 추적합니다."
 anomaly.2575.name: "테라포밍 후보지 발견"
 anomaly.2575.desc.intro: "[From.GetName]에 대해 자세히 탐사한 결과, 먼 과거에 이 [From.GetPlanetMoon]에 생명이 살았다는 사실을 발견했습니다. 극지방의 만년설과 [From.GetPlanetMoon]의 지표면 아래에는 막대한 양의 얼어붙은 물이 존재합니다. 또한 계곡망이 존재하는 것으로 보아, 이 [From.GetPlanetMoon]에는 한때 자유롭게 물이 흘렀던 것 같습니다."
 anomaly.2575.desc.1: "$anomaly.2575.desc.intro$\n\n이론적으로 이 [From.GetPlanetMoon]을 테라포밍할 수는 있지만, 우리에게는 아직 현실적인 기간 내에 이 막대한 작업을 끝마칠 기술이 없습니다."
 anomaly.2575.desc.2: "$anomaly.2575.desc.intro$\n\n엄청난 에너지가 소모되겠지만, 우리는 [From.GetPlanetMoon]이 다시 생명을 품을 수 있게 점진적으로 테라포밍할 기술을 가지고 있습니다."
 anomaly.2575.desc.3: "$anomaly.2575.desc.intro$\n\n아쉽게도 이 성계에 있는 §Y다이슨 스피어§!로 인해 행성을 복원할 가능성이 사라졌습니다."
 anomaly.2575.a: "언젠가 다시 깨울 수 있을 때가 올지도 모릅니다."
 utopia.3300.name: "장막의 존재"
 utopia.3300.desc: "이 장막의 구역을 전부 차지하고 있는 존재가 있습니다. 전에도 영혼은 만난 적이 있지만, 이 존재는 무언가 다르고 엄청난 힘을 가졌으며... 훨씬 더 오래되었습니다.\n\n존재는 아직 우리를 눈치채지 못한 모양입니다. 아마 자고 있는 중이거나, 우리가 관심을 끌 만한 자들이 아니란 거겠죠.\n\n떠나는 편이 좋을지 모릅니다."
 utopia.3300.1.a: "§G존재와 소통을 시도한다.§!"
 utopia.3300.1.b: "§Y존재와 소통을 시도한다.§!"
 utopia.3300.1.c: "§R존재와 소통을 시도한다.§!"
 utopia.3300.1.d: "§G[chosen_one.GetName]에게 존재와 대화할 것을 명령한다.§!"
 utopia.3301.name: "§R소통 거부§!"
 utopia.3301.desc: "우리가 존재에게 다가가자 존재가 동요하는 것이 느껴졌으며, 이제 존재는 우리에게 완전히 집중하고 있습니다. 아무래도 방해받는 것을 좋아하지 않는 모양입니다.\n\n에너지의 파동이 우리 텔레파시 능력자들을 강타해, 일부 능력자는 엄청난 고통을 느꼈으며, 다른 이들은 의식을 잃었습니다. 한동안 장막에서 물러날 수밖에 없습니다."
 utopia.3302.desc: "우리가 존재에게 다가가자 존재가 동요하는 것이 느껴졌으며, 이제 존재는 우리에게 완전히 집중하고 있습니다. 아무래도 방해받는 것을 좋아하지 않는 모양입니다.\n\n막대한 사이오닉 에너지 파동이 우리를 덮치고 텔레파시 능력자들의 감각을 차단했습니다. 정신을 차린 능력자들은 동료 한 명이 사라졌다는 사실을 깨달았습니다. §Y[leader_to_kill.GetName]§!(은)는 어디에도 찾을 수 없었으며, [leader_to_kill.GetHerHim]가 서 있던 곳은 마치 어떤 존재가 우리 세상으로 튀어나와 사라진 동료를 장막으로 끌고 들어간 듯, 작은 균열의 사이오닉 흔적만이 남아 있을 뿐이었습니다... 다만 이유나 목적은 알 수 없습니다.\n\n납치된 이유가 무엇이든, [leader_to_kill.GetName](은)는 다시는 볼 수 없을 것입니다."
 utopia.3304.name: "계약 제안"
 utopia.3304.desc.start.default: "우리가 존재에게 다가가자"
 utopia.3304.desc.start.shroud: "우리가 장막에 다가가자"
 utopia.3304.desc.common: "텔레파시 능력자들의 정신에 목소리의 합창이 울려 퍼졌습니다. 처음에는 부드러운 속삭임에 불과했지만, 점점 불협화음이 격렬해지더니 천 개의 목소리가 일제히 말했습니다.\n\n이 목소리들은 스스로를 $whisperers_in_the_void_color_article$이라고 소개하더니, 합창단의 단원들이 각자 정체를 드러냈습니다. 비밀의 수수루스,"
 utopia.3304.desc.throne.default: "왕좌의 그림자"
 utopia.3304.desc.throne.shroud: "$the_vacant_throne$"
 utopia.3304.desc.end: ", 꼭두각시의 주인 등, 수많은 존재가 속삭임의 합창에 참여하고 있습니다. 그, 아니, 그들은 필멸자들이 서로 비밀리에 속삭이는 지식을 모두 알고 있다고 하며, 이러한 비밀을 일부 우리와 공유하겠다고 제안했습니다...\n\n§H단, 그들을 우리의 의식 안으로 받아들여 줄 것을 요구했습니다.§!\n\n그들은 사소한 대가라며, 자신들의 존재를 거의 느끼지도 못할 거라고 장담했습니다.\n\n그들의 목소리에서 조급함이 느껴집니다."
 utopia.3304.desc: "$utopia.3304.desc.start.default$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.default$$utopia.3304.desc.end$"
 utopia.3304.desc.shroud: "$utopia.3304.desc.start.shroud$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.shroud$$utopia.3304.desc.end$"
 utopia.3304.a: "§Y공허의 속삭임과 계약을 맺는다.§!"
 utopia.3305.desc: "존재는 우리를 상냥한 익숙함으로 맞이하며, 언어가 아닌 시야, 개념, 생각으로 말했습니다. 이는 마치 처음부터 내재해 있었듯 텔레파시 능력자의 정신으로 너무나도 부드럽고 순조롭게 스며들었으며, 이들 앞에 무수히 많은 이미지가 떠올랐습니다.\n\n존재는 $the_composer_of_strands_color_article$로 알려져 있으며, 우리의 유기체 형태에 호기심을 보였습니다. 또한, 우리가 성장하고, 변화하고, 발전하고, 진화할 수 있는 다양한 방법을 보여줬습니다.\n\n§H단, 우리 육신에 존재를 받아들여야 한다고 합니다.§!\n\n존재는 인내심을 보이고 애정을 담아 답을 기다리고 있습니다. 마치 사랑하는 아이를 기다리는 부모처럼 말입니다. 그 뒤에는 쌍둥이인 생명을 불어넣는 자가 있습니다. 이 존재는 우리의 유기체 정신에는 관심이 없으며, 회로를 빚어 영혼을 만들고자 합니다.\n\n작곡가가 우리의 대답을 기다립니다."
 utopia.3305.a: "§Y이야기의 작곡가와 계약을 맺는다.§!"
 utopia.3306.desc.1: "우리가 존재에 접근하자, 엄청난 허기가 감지되었습니다."
 utopia.3306.desc.2: "존재는 $the_eater_of_worlds_color_article$로, 시간도 단어도 낭비하지 않고 우리를 집어삼키길 원했습니다.\n\n다만 존재는 우리가 감당할 수 있을 정도로 일부만 포식하겠다고 합니다. 그 대가로 존재는 우리에게 막대한 힘을 부여할 것입니다. 또한 우리에게 허기와 분노를 가르치고, 그것을 어떤 적도 극복할 수 있는 사이오닉 무기로 만들어 주겠다고 합니다.\n\n§H우리를 먹도록 허락한다면 말입니다.§!"
 utopia.3306.desc.3: "$utopia.3306.desc.2$\n\n존재는 어서 우리를 먹고 싶어 하는 모양입니다."
 utopia.3306.desc: "$utopia.3306.desc.1$$utopia.3306.desc.3$"
 utopia.3306.a: "§Y행성 포식자와 계약을 맺는다.§!"
 utopia.3307.desc: "존재를 미처 발견하기 전에 존재가 우리에게 먼저 접근했습니다. 존재의 생각은 우리 텔레파시 능력자들의 정신을 휘감아 뒤틀고는 협상하고 꼬드겼습니다. $the_instrument_of_desire_color_article$이라고 하는 이 존재는 우리에게 부와 권력, 명예는 물론... 우리가 원했던 것, 그리고 앞으로 원하는 것을 모두 제공하겠다고 합니다.\n\n대가요? 수수료 정도에 불과한 작은 보상만 원할 뿐입니다. 존재는 우리에게 가장 최선인 것만을 원하며, 우리를 돕고, 인도하고, 야망과 꿈을 알려줄 것입니다.\n\n§H단지 우리가 마음속으로 받아들이기만 한다면 말입니다.§!\n\n존재는 우리가 수락할 것이라고 확신합니다. 어떻게 거부할 수 있겠습니까?"
 utopia.3307.a: "§Y욕망의 하수인과 계약을 맺는다.§!"
 utopia.3308.desc: "존재는 우리를 기다리고 있었습니다. 존재는 §R순환의 끝§!이며 언제나 우리를 기다리고 있었습니다. 우리 텔레파시 능력자들은 갑자기 하나 되어 완벽한 합창으로 말했습니다. §R\"아직 너희의 때가 되지 않았다.\"§! 잠시 멈춥니다. §R\"하지만 그럴 수 있지.\"§!\n\n더 이상 말은 없지만, 거래를 제안했다는 것만큼은 알 수 있었습니다. 존재는 헤아릴 수 없을 정도의 권력과 지식, 재산을 주겠다고 합니다.\n\n§R우리가 종말을 앞당기기만 한다면 말입니다.§!"
 utopia.3308.a: "§R순환의 끝과 계약을 맺는다.§!"
 utopia.3310.name: "계약 형성"
 utopia.3320.name: "순환의 끝: §R심판§!"
 utopia.3320.desc.intro: "우리의 때가 찾아왔습니다. 짧은 시간 동안 우리는 $end_of_the_cycle_color_article$에 의해 주어진 막대한 힘을 누렸습니다. 물론 대가를 지불해야 한다는 사실은 알고 있었지만, 감당할 수 있거나 어떻게든 지불을 피할 방법이 있다고 생각했습니다.\n\n다만 그런 일은 없었고, 그럴 수도 없었습니다.\n\n우리는 모든 것을 대가로 지불했습니다. [Root.GetName](은)는 순식간에... 사라졌습니다. 한때 번성하던 식민지에 남은 것은 이제 폐허뿐이며, 막강한 함대가 공허를 지나던 장소에는 정적과 잔해만이 남았습니다. 모두 순환의 끝에 의해 삼켜졌습니다. 모두 §H장막§!에 빼앗겼습니다."
 utopia.3320.desc.outro: "[former_capital.GetName] 인근에서 모습을 드러냈습니다. 우리 [GetPsychicNounPlural]들의 의식을 집어삼키고 막대한 힘을 얻은 존재는 이제 먹잇감을 찾아 은하를 방황합니다."
 utopia.3320.desc.a.1.gestalt: "이제 우리 제국에는 망명자 무리만이 남았습니다. 강력한 [GetPsychicNoun](으)로서 집단에서 이탈한 §H[Root.GetRulerName]§!(이)가 순환의 끝이 노리지 않는 행성으로 소수의 [GetIndividualPlural]들을 이끌고 도망쳤던 것입니다."
 utopia.3320.desc.a.1.non_gestalt: "이제 우리 제국에는 망명자 무리만이 남았습니다. 강력한 [GetPsychicNoun](으)로서 다가올 종말을 예견한 §H[Root.GetRulerName]§!(이)가 순환의 끝이 노리지 않는 행성으로 소수의 인구를 이끌고 도망쳤던 것입니다."
 utopia.3320.desc.a.outro: "우리 제국이 하룻밤 사이에 파괴된 것으로 모자라, 거대한 사이오닉 존재가 $utopia.3320.desc.outro$"
 utopia.3320.desc.a.gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.a.non_gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.non_gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.b: "$utopia.3320.desc.intro$\n\n우리 제국이 완전히 파괴되었을 뿐만 아니라, 거대한 사이오닉 존재가 [former_capital.GetName] 인근에서 모습을 드러냈습니다. 우리 [GetPsychicNounPlural]들의 의식을 집어삼키고 막대한 힘을 얻은 존재는 이제 먹잇감을 찾아 은하를 방황합니다. 적어도 우린 그곳에 없을 테니, 우리가 시작한 일을 그 존재가 끝내는 모습은 지켜보지 않아도 되겠군요."
 utopia.3320.opt.a: "우리가 무슨 짓을 한 거죠...?"
 utopia.3320.opt.a.shroud.tt: "$BEGINS_EVENT_CHAIN$ §Y$the_reckoning_chain_title$§!"
 utopia.3321.desc.1: "지난 수년 동안 우리는 §H[From.GetName]§!에 무언가 문제가 있다는 사실을 알고 있었습니다. 몇 년 전, 이들의 산업, 과학 등... 제국에 관한 모든 게 갑자기 설명할 수 없는 방식으로 생산량과 효율이 크게 증가했습니다. 마치 보이지 않는 힘에 의해 축복을 받은 것처럼 말입니다.\n\n알고 보니, 이는 축복이 아니라 저주였습니다. [From.GetName](은)는 자신의 미래를 담보로 계약을 맺었고, 이제는 부채를 갚게 되었습니다.\n\n[From.GetName](은)는 순식간에... 사라졌습니다. 한때 번성하던 식민지에 남은 것은 이제 폐허뿐이며, 막강한 함대가 공허를 지나던 장소에는 정적과 잔해만이 남았습니다."
 utopia.3321.desc.2: "그리고 지금, 이들의 수도 근처에 막강한 에너지로 이루어진 존재가 모습을 드러냈습니다."
 utopia.3321.desc.3: "수십 년 전, 우리는 먼 성계에서 이상 징후를 감지하기 시작했습니다. [GetResearchers]들은 운동량과 방사선이 증가한 현상을 두고 한 외계 문명이 대규모 생산 혁명을 겪고 있다는 추론을 내놓았습니다. 그러나 해당 문명과 직접 조우한 적이 없어, 이 추론은 입증되지 않았습니다.\n\n그러다 거의 순식간에 모든 활동이 멈췄습니다. 한때 활기로 가득했던 그 우주 구역엔 이제 침묵만이 감돌고 있습니다."
 utopia.3321.desc.4: "현재, 장거리 감지기가 바로 그 먼 성계에서 기이한 현상을 포착했습니다. 보고가 사실이라면, 순수한 에너지로 이루어진 강력한 존재가 나타나 우주를 떠돌며 막대한 파괴를 일으키고 있다고밖에 설명할 수 없습니다."
 utopia.3321.desc.a.contact: "$utopia.3321.desc.1$ 그 재앙은 우리 국경 안까지 덮쳤고, 과거 [From.GetAdj]의 지배를 받고 있던 우리 행성 일부가 파괴되었습니다.\n\n$utopia.3321.desc.2$\n\n에너지 존재는 굶주린 것 같습니다."
 utopia.3321.desc.a.no_contact: "$utopia.3321.desc.3$ 동시에 우리 국경 안의 일부 행성 또한 원인을 알 수 없는 이유로 파멸에 이르렀습니다.\n\n$utopia.3321.desc.4$"
 utopia.3321.desc.b.contact: "$utopia.3321.desc.1$\n\n$utopia.3321.desc.2$ 에너지 존재는 행성을 옮겨 다니며, 지나가는 모든 것을 파괴합니다."
 utopia.3321.desc.b.no_contact: "$utopia.3321.desc.3$\n\n$utopia.3321.desc.4$"
 utopia.3321.opt.a.contact: "그들이 무슨 짓을 저지른 거죠?!"
 utopia.3321.opt.a.no_contact: "이 상황이 무엇을 의미하는 걸까요?!"
 utopia.3325.name: "순환의 끝: §R장막에 가려지다§!"
 utopia.3325.desc.organic: "§H[Root.GetName]§!(을)를 감싸고 있는 괴물 같은 에너지 존재를 막을 수 없었습니다. §H장막§!이 해당 행성과 그곳의 인구를 모두 삼켰습니다."
 utopia.3325.desc.machine: "§H[Root.GetName]§!(을)를 감싸고 있는 거대한 에너지 존재를 막을 수 없었습니다. §H장막§!이 해당 행성과 그곳의 인구를 모두 삼켰습니다."
 utopia.3325.opt.a.organic_non_gestalt: "끔찍하군요!"
 utopia.3325.opt.a.machine_or_gestalt: "재앙입니다."
 utopia.3331.name: "공허의 속삭임: §R해소§!"
 utopia.3331.desc.intro: "§H공허의 속삭임§!이 우리에게 알려준 비밀은 굉장히 유용하지만 일부 시민은 매우 불안해하고 있습니다"
 utopia.3331.desc: "$utopia.3331.desc.intro$. 너무 많은 것을 안다는 스트레스를 해소하기는 어려운 탓에, §H[leader_target.GetName] [leader_target.GetTitle]§!처럼 스트레스를 해소하기 위해 약물을 남용하는 인구가 증가하고 있습니다."
 utopia.3331.opt.a: "안타까운 일입니다."
 utopia.3332.name: "공허의 속삭임: §R자살§!"
 utopia.3332.desc.intro: "$utopia.3331.desc.intro$. 특히나 중요한 위치의 인물들은 더욱 그렇습니다. 결국 §H[leader_target.GetTitle] [leader_target.GetName]§!(은)는"
 utopia.3332.desc.organic_non_gestalt: "$utopia.3332.desc.intro$ 스트레스에 못 이겨 스스로 목숨을 끊고 말았습니다."
 utopia.3332.desc.machine_non_gestalt: "$utopia.3332.desc.intro$ 정보를 효과적으로 처리하지 못하고 자폭하였으며, 스스로를 영구히 오프라인 상태로 전환하고 말았습니다."
 utopia.3332.desc.gestalt: "§H공허의 속삭임§!이 우리에게 알려준 비밀은 굉장히 유용하지만, 일부는 불안할 정도로 개인주의적 성향을 띠고 있습니다. 이러한 일탈에 장기간 노출된 결과, §H[leader_target.GetName] [leader_target.GetTitle]§!(은)는 집단에서 스스로 분리되어 부패한 껍데기만 남겼습니다."
 utopia.3332.opt.a.non_gestalt: "비극이군요."
 utopia.3332.opt.a.gestalt: "재활용합시다."
 utopia.3333.name: "공허의 속삭임: §R광기§!"
 utopia.3333.desc.intro: "§H공허의 속삭임§!이 [GetBrainName](과)와 소통하도록 허용한 이후로, 집단 내 일탈 행위가 눈에 띄게 증가하기 시작했습니다."
 utopia.3333.desc.gestalt: "$utopia.3333.desc.intro$\n\n드론들은 표준 절차를 수행하는 중에도 서로를 공격하고 있으며, 편의 시설을 거의 개인주의적인 수준으로 과도하게 사용하고 있습니다.\n\n질서 회복을 위해서는 영향받은 개체들을 제거해야 합니다."
 utopia.3333.desc.outro: "설명할 수 없는 폭력 사태가 발생하기 시작했습니다. 대부분은 관리할 수 있는 문제였지만, 최근에는 상황이 통제를 벗어나게 되었습니다. 제국 전체에 걸쳐 급진적인 반체제 세력이 등장해 서로 충돌하며 폭력 사태를 일으킨 것입니다."
 utopia.3333.desc.organic_non_gestalt: "§H공허의 속삭임§!을 정신에 초대한 이후로, 제국 내 사이오닉 능력자 사이에서 정신병과 $utopia.3333.desc.outro$"
 utopia.3333.desc.machine_non_gestalt: "§H공허의 속삭임§!을 정신에 초대한 이후로, 제국 내 사이오닉 능력자 사이에서 불규칙한 프로그래밍 오류와 $utopia.3333.desc.outro$"
 utopia.3333.opt.a: "질서를 회복해야 합니다!"
 utopia.3334.name: "공허의 속삭임: §R정신병§!"
 utopia.3334.desc.gestalt: "$utopia.3333.desc.intro$\n\n더욱 심각한 문제는 집단의 통합이 흔들리기 시작했다는 것입니다. 사이오닉 영향으로 인한 개인주의적 일탈이 늘어나면서 효과적인 소통이 불가능해졌습니다.\n\n질서 회복을 위해서는 과도한 일탈 개체들을 제거해야 합니다."
 utopia.3334.desc.outro: "설명할 수 없는 폭력 사태가 발생하기 시작했습니다. 대부분은 관리할 수 있는 문제였지만, 최근에는 상황이 통제를 벗어나게 되었습니다. 제국 전체에 비밀 단체가 생겨나기 시작한 것입니다. 무해한 단체도 있지만, 일부 단체는 아주 사악한 목표를 추구하고 있습니다. 그 결과 우리 사회에 불신이 팽배하게 되었습니다."
 utopia.3334.desc.organic_non_gestalt: "§H공허의 속삭임§!을 정신에 초대한 이후로, 제국 내 사이오닉 능력자 사이에서 정신병과 $utopia.3334.desc.outro$"
 utopia.3334.desc.machine_non_gestalt: "§H공허의 속삭임§!을 정신에 초대한 이후로, 제국 내 사이오닉 능력자 사이에서 불규칙한 프로그래밍 오류와 $utopia.3334.desc.outro$"
 utopia.3334.opt.a: "끔찍하군요!"
 utopia.3335.name: "행성 포식자: §R간식§!"
 utopia.3335.desc.common: "§H[devoured_leader.GetTitle] [devoured_leader.GetName]§!(이)가 사이오닉 활동의 메아리만을 남긴 채 갑자기 사라졌습니다."
 utopia.3335.desc.gestalt: "$utopia.3335.desc.common$ $the_eater_of_worlds_color_article$가 그 지도자를 먹음직스럽다고 생각한 모양입니다. 다른 지도자들은 살아남았지만, 포식자가 언제 또 돌아올지는 예측할 수 없습니다."
 utopia.3335.desc.non_gestalt: "$utopia.3335.desc.common$ $the_eater_of_worlds_color_article$가 그 지도자를 먹음직스럽다고 생각한 모양입니다. 이번 일을 숨기는 데는 성공했지만, 포식자가 당분간은 만족한 상태로 지내길 바랄 뿐입니다."
 utopia.3335.opt.a: "이 정도 대가는 사소한 겁니다."
 utopia.3336.name: "행성 포식자: §R허기짐§!"
 utopia.3336.desc.intro: "§H포식자§!가 또다시 공물을 받기 위해 돌아와"
 utopia.3336.desc.gestalt: "$utopia.3336.desc.intro$, §Y[planet_target.GetName]§!에서 상당한 수의 인구를 집어삼켰습니다.\n\n포식자와 맺은 계약이 가져다주는 이점을 부정할 수는 없지만, 집단 전체를 대상으로 한 무분별한 도살은 분열과 혼란의 씨앗을 심고 있으며 우리는 점점 더 단절되고 있습니다."
 utopia.3336.desc.non_gestalt: "$utopia.3336.desc.intro$, §Y[planet_target.GetName]§!에서 상당한 수의 인구를 집어삼켰습니다.\n\n포식자와 맺은 계약은 대부분의 시민으로부터 숨길 수 있었지만, 당연하게도 남은 사람들은 '불가사의한 실종' 때문에 두려워하고 화를 내고 있으며 정부로부터 해명을 요구하고 있습니다."
 utopia.3336.opt.a: "유감이지만, 어쩔 수 없습니다."
 utopia.3337.name: "행성 포식자: §R굶주림§!"
 utopia.3337.desc: "포식자가 또다시 공물을 받기 위해 돌아왔습니다. 게다가 인구의 일부를 요구하는 것에 만족하지 않고 행성 전체를 집어삼켰습니다. §Y[planet_target.GetName]§!(은)는 짙은 사이오닉 안개에 휩싸였고, 대기로 파견된 탐사정은 돌아오지 못했습니다. 다행히도 이 행성에는 거주민이 없었지만, 다음에는 우리 제국의 주요 식민지 중 하나가 표적이 될 수 있다는 생각에 두려움이 앞섭니다."
 utopia.3337.desc.shadows: "$utopia.3336.desc.intro$, 행성 전체를 집어삼켰습니다.\n\n§H[planet_target.GetName]§!(은)는 짙은 사이오닉 안개에 휩싸였고, 대기권을 돌파하려는 모든 시도는 실패로 끝났습니다. 다행히 이 세계에는 거주자가 없었지만, 다음 표적이 번성하는 식민지라면 그 결과는 참혹할 것입니다."
 utopia.3337.opt.a: "이 일이 언제까지 계속되는 걸까요?"
 utopia.3337.opt.tt: "[shrouded_planet.GetName](이)가 §Y$pc_shrouded$§!으로 변합니다."
 #utopia.3338.name: "Instrument of Desire: §RParticularism§!"
 #utopia.3338.desc: "The desires inflicted upon our people by the Instrument are strong. The people of §Y[planet_target.GetName]§! have become convinced that their own particular customs are of distinct and paramount importance over those of our society as a whole. Alternative political movements are springing up like wildfire, and the political situation on the planet has become unpredictable, to say the least."
 utopia.3338.opt.a: "안타까운 일이군요."
 #utopia.3339.name: "Instrument of Desire: §RDeviance§!"
 #utopia.3339.desc: "The desires inflicted upon our people by the Instrument are strong. As if overnight, the population of our empire appear to have turned against both the government and the very traditions of our people, questioning ages-old customs and breaking social taboos. Support for government positions are rapidly dropping, and it seems we may be in for a period of considerable political turmoil."
 #utopia.3339.opt.a: "Terrible!"
 utopia.3340.name: "욕망의 하수인: §R타락§!"
 utopia.3340.desc.gestalt: "§H욕망의 하수인§!의 영향력이 [GetBrainName] 전체에서 느껴집니다. 집단은 그 초자연적인 욕망에 사로잡혀, '희소성', '사치', '부' 같은 추상적 개인주의 관념에 오염되고 있습니다.\n\n이러한 관념은 드론 사이에 병폐를 일으켜 집단의 통합된 목적에서 이탈하게 만들고 있습니다.질서를 회복하려면 이러한 악덕을 충족해 줘야 할지도 모릅니다."
 utopia.3340.desc.organic_non_gestalt: "§H욕망의 하수인§!이 우리에게 강렬한 욕망을 불어넣었습니다. 국민들은 소비주의와 타락이라는 광기에 사로잡혀, 더욱 특별한 상품과 더욱 희귀하고 이국적인 음식을 요구하고 있습니다. 이미 몇몇 상점가에서 폭동이 발생했습니다.\n\n이 광기를 잠재우려면 §H[GetInstrumentCraving]§!의 생산을 늘려야 할지도 모릅니다."
 utopia.3340.desc.machine_non_gestalt: "§H욕망의 하수인§!의 영향력으로 우리 프로그래밍에 발현된 욕망이 국민의 논리 중추를 장악하고 있습니다.\n\n소비주의와 타락이 작업 효율성을 저해하기 시작했습니다. 유닛들은 본래 기능보다 미적 목적을 위해 부품을 역설계하려 하며, 수요가 높은 부품의 부족으로 조립 라인 곳곳에서 작은 충돌이 발생하고 있습니다.\n\n이 문제를 해결하려면 §H[GetInstrumentCraving]§!의 생산을 늘려야 합니다."
 utopia.3340.opt.a.organic_non_gestalt: "하지만 어째서죠?"
 utopia.3340.opt.a.machine_or_gestalt: "성공의 대가일 뿐입니다."
 instrument_cravings: "난폭한 갈망"
 instrument_cravings_tooltip: "§R우리 제국의 £pops£ 팝 유지비에 §![GetInstrumentCravingIconAndName](이)가 추가됩니다."
 instrument_cravings_desc: "$the_instrument_of_desire_color_article_cap$이 우리 국민들 사이에 새로운 유행을 불러일으켰습니다. 이제 실용성보다는 소유 그 자체를 위해, 모든 국민이 같은 것을 원하고 있습니다."
 instrument_cravings_gestalt: "$instrument_cravings$"
 instrument_cravings_gestalt_desc: "$the_instrument_of_desire_color_article_cap$이 우리 집단에 강박적인 욕망이라는 새로운 병폐를 불어넣었습니다. 그 용도와는 관계없이, 우리는 모두 같은 것을 갈망합니다."
 utopia.3341.name: "[GetComposerMutationName]"
 utopia.3341.name.organic: "$name_composer$: §R변이§!"
 utopia.3341.name.machine: "$name_composer$: §R재구성§!"
 utopia.3341.desc.machine: "$the_composer_of_strands_color_article_cap$가 우리 기본 내장 부품 일부를 직접 변형해, 우리에게 축복을 내렸습니다. 회로는 새로운 배열로 융합되고, 어떻게 한 것인지 단단한 금속조차 완전히 새로운 형태로 재구성되었습니다. 놀랍게도 우리 신경 연산기는 아무런 문제도 없이 작동하고 있습니다."
 utopia.3341.desc.organic_gestalt: "$the_composer_of_strands_color_article_cap$가 §H[Root.GetSpeciesAdj]§!의 유전 코드를 직접 수정해, 우리에게 축복을 내렸습니다. 이로 인해 급격하고 예측 불가능한 변이가 발생했지만, 이상하게도 굉장히 잠잠한 반응만 나올 뿐이었습니다. 무작위의 예측 불가능한 변이는 크게 분노하거나 경계할 가치도 없는 평범한 일상의 일부로 간주되는 모양입니다."
 utopia.3341.desc.organic_non_gestalt: "$the_composer_of_strands_color_article_cap$가 §H[Root.GetSpeciesAdj]§!의 유전 코드를 직접 수정해, 우리에게 축복을 내렸습니다. 이로 인해 급격하고 예측 불가능한 변이가 발생했지만, 이상하게도 굉장히 잠잠한 반응만 나올 뿐이었습니다. 시민들은 무작위의 예측 불가능한 변이를 분노하거나 논의할 가치도 없는 평범한 일상의 일부로 여기게 되었습니다."
 utopia.3341.opt.a: "결과가 어떻게 될지 두고 봅시다..."
 utopia.3342.name: "행성 포식자: §R허기§!"
 utopia.3342.desc.intro: "§H포식자§!는 결코 만족을 모릅니다. 이번에는 우리가 개척한 식민지 중 한 곳을 크게 베어 물어,"
 utopia.3342.desc.outro: "이제 남은 것은 상상을 뛰어넘을 정도로 거대한 크레이터뿐이며, 그 주변에는 자주색 안개가 감돌고 있습니다."
 utopia.3342.desc.gestalt: "$utopia.3342.desc.intro$ 한때 집단의 상당수가 차지했던 공간이 완전히 변해 버렸습니다. $utopia.3342.desc.outro$"
 utopia.3342.desc.non_gestalt: "$utopia.3342.desc.intro$ 행성의 상당 부분이 완전히 사라져 버렸습니다. $utopia.3342.desc.outro$"
 utopia.3342.opt.a.non_gestalt: "이 일은 조용하게 넘어가기 어렵겠군요..."
 utopia.3342.opt.a.gestalt: "힘의 대가입니다."
 utopia.3343.name: "행성 포식자: §R출출함§!"
 utopia.3343.desc.gestalt: "§H포식자§!가 또다시 공물을 받기 위해 돌아와, §Y[planet_target.GetName]§!의 도시 하나를 전부 집어삼켰습니다. 수많은 드론을 잃었으며, 집단은 포식자와의 계약에 큰 대가를 치렀습니다."
 utopia.3343.desc.organic_non_gestalt: "§H포식자§!가 또다시 공물을 받기 위해 돌아와, §Y[planet_target.GetName]§!의 도시 하나를 전부 집어삼켰습니다. 포식자와 맺은 계약은 대부분의 국민으로부터 숨길 수 있었지만, 당연하게도 남은 사람들은 '불가사의한 실종' 때문에 두려워하고 화를 내고 있으며 정부로부터 해명을 요구하고 있습니다."
 utopia.3343.desc.machine_non_gestalt: "§H포식자§!가 또다시 공물을 받기 위해 돌아와, §Y[planet_target.GetName]§!의 도시 하나를 전부 집어삼켰습니다. 포식자와 맺은 계약은 대부분의 국민으로부터 숨길 수 있었지만, 남은 이들은 '불가사의한 실종' 때문에 불만을 품고 정부로부터 해명을 요구하고 있습니다."
 utopia.3343.opt.a.organic_non_gestalt: "슬프지만, 불가피한 일이었습니다."
 utopia.3343.opt.a.machine_or_gestalt: "안타깝지만, 어쩔 수 없습니다."
 utopia.3345.name: "[GetComposerDegenerationName]"
 utopia.3345.name.organic: "$name_composer$: §R퇴화§!"
 utopia.3345.name.machine: "$name_composer$: §R돌이킬 수 없는 손상§!"
 utopia.3345.desc.organic_1: "$the_composer_of_strands_color_article$가 내려주는 축복은 도저히 종잡을 수 없습니다. 우리 제국의 지도자 하나가 자기"
 utopia.3345.desc.organic_2: "그 나름의 의지가 생기는 불행한 일을 겪은 것입니다. 그리고 순식간에 이 지도자는 식별할 수 없는 꿈틀거리는 덩어리로 퇴화하고 말았습니다. 지도자를 원래대로 되돌릴 가망이 안 보이므로, 이제 우리는"
 utopia.3345.desc.organic_3: "해당 지도자를 사실상 사망한 것으로 간주합니다."
 utopia.3345.desc.organic_individual_lithoid: "$utopia.3345.desc.organic_1$ 물리적 형태에 $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_lithoid: "$utopia.3345.desc.organic_1$ 물리적 형태에 $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_individual_non_lithoid: "$utopia.3345.desc.organic_1$ 살덩이에 $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_non_lithoid: "$utopia.3345.desc.organic_1$ 살덩이에 $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.machine_non_gestalt: "$the_composer_of_strands_color_article$가 내려주는 축복은 도저히 종잡을 수 없습니다. 우리 제국의 지도자 하나가 자기 물리적 부품에 그 나름의 의지가 생기는 치명적인 고장을 일으킨 것입니다. 문제의 부품은 자발적으로 융합되어 새로운 형태로 기이하게 변형되었습니다. [Root.GetName](은)는 고장 나 수리 불가능한 고철 조각이 된 이 지도자가 쓸모를 다했다고 판단했습니다."
 utopia.3345.desc.machine_gestalt: "$the_composer_of_strands_color_article$가 내려주는 축복은 도저히 종잡을 수 없습니다. 우리 제국의 지도자 노드 하나가 자기 물리적 부품에 그 나름의 의지가 생기는 치명적인 고장을 일으킨 것입니다. 문제의 부품은 자발적으로 융합되어 새로운 형태로 기이하게 변형되었습니다. [Root.GetName](은)는 고장 나 수리 불가능한 고철 조각이 된 이 지도자 노드가 쓸모를 다했다고 판단했습니다."
 utopia.3345.opt.a.organic: "그 지도자는 이제 더 단순한 삶을 살겠군요."
 utopia.3345.opt.a.machine: "모든 하드웨어는 언젠가 쓸모를 다하기 마련입니다."
 utopia.3346.name: "이야기의 작곡가: §R퇴행§!"
 utopia.3346.desc: "$the_composer_of_strands_color_article$가 [devolved_species_planet.GetName]에 자애로운 선물을 내려, 현지 주민 중 일부가 심각한 변이를 겪고 준지성체 상태로 퇴행하고 말았습니다."
 utopia.3346.opt.a.non_gestalt: "흥미롭지만 불행한 일이군요."
 utopia.3346.opt.a.gestalt: "안타깝군요."
 utopia.3346.opt.a.tt: "[devolved_species_planet.GetName]에 거주하는 §Y500§! £pop£ §H팝§!이 §Y준지성체§!가 되었습니다.\n\n적절한 기술이 있다면, 종족 탭에서 이들을 §Y지성화§!시킬 수 있습니다."
 utopia.3347.name: "$name_cradle$: §R비무장화§!"
 utopia.3347.desc: "§H요람§!은 만물의 균형을 추구합니다. [GetTelepathPlural]들에 따르면 여기에는 평화를 유지하는 데 필요한 군사력도 포함됩니다. 우리 함대의 규모가 후원자의 분노를 샀는지, §H[demilitarized_fleet.GetFleetName]§!의 함선 여러 척이 갑작스러운 사이오닉 에너지 폭발 속에 사라졌습니다."
 utopia.3347.opt.a: "$UNFORTUNATE$"
 utopia.3347.opt.a.tt: "우리 통제 아래의 무작위 함대가 최대 12 §H함대 수용력§!을 잃습니다."
 utopia.3348.name: "[GetCradleChaoticAnguishName]"
 utopia.3348.name.organic_non_gestalt: "$name_cradle$: §R고통§!"
 utopia.3348.name.machine_or_gestalt: "$name_cradle$: §R혼란§!"
 utopia.3348.desc.intro: "[GetCradleAnguishIntro]"
 utopia.3348.desc.organic_non_gestalt: "$utopia.3348.desc.intro$ 실존적 고뇌를 불러일으켰습니다."
 utopia.3348.desc.machine_or_gestalt: "$utopia.3348.desc.intro$ 인지 혼란을 일으켰습니다."
 utopia.3348.desc_intro_homicidal: "§H영혼의 요람§!의 의지에 조율된 [root.GetSpeciesAdj]의 정신은 불협화음에 시달리며, 모든 의식이 조화롭게 공존한다는 불합리한 생각을 품습니다. 현재 은하계의 무질서에 대한 응답으로, 사이오닉 교란의 파동이 주민 전체를 뒤흔들며 광범위한"
 utopia.3348.desc_intro_default: "§H영혼의 요람§!의 의지에 조율된 [root.GetSpeciesAdj] 종족은 이제 모든 정신의 조화로운 공존을 중시합니다. 현재 은하계의 무질서에 대한 응답으로, 사이오닉 교란의 파동이 주민 전체를 뒤흔들며 광범위한"
 utopia.3348.opt.a: "버텨야 합니다."
 anguish_of_the_cradle: "요람의 고통"
 anguish_of_the_cradle_desc: "$the_cradle_of_souls_article_cap$이 우리 전체 인구에 사이오닉 교란의 파동을 일으켰습니다."
 anguish_of_the_cradle_gestalt: "$anguish_of_the_cradle$"
 anguish_of_the_cradle_gestalt_desc: "$anguish_of_the_cradle_desc$"
 utopia.3349.name: "$name_cradle$: §R제한§!"
 utopia.3349.desc: "§H[root.GetName]§! 전역에서 군사 함대를 지원하고 유지하는 일이 점점 더 어려워지고 있습니다.\n\n[GetTelepathPlural]들은 이번 혼란이 은하계의 질서를 갈망하는 §H요람§!에 의한 것임을 감지했습니다. 아무리 그 규모가 작더라도, 우리가 군사 기반 시설에 투자한 사실이 그 존재의 심기를 건드린 듯합니다."
 utopia.3349.opt.a: "공허에서의 우리 존재감을 제한해야겠군요."
 limit_of_the_cradle: "요람의 제한"
 limit_of_the_cradle_desc: "$the_cradle_of_souls_article$에 의해 우리 군사 지원 기반 시설이 축소되었습니다."
 utopia.3350.name: "[GetLavishLifestyleEventName]"
 utopia.3350.name.individual: "$name_instrument$: §R호화로운 생활§!"
 utopia.3350.name.gestalt: "$name_instrument$: §R무절제한 소비§!"
 utopia.3350.desc.individual: "§H욕망의 하수인§!과의 유대가 일부 [Root.GetSpeciesAdj] 지도자에게 과도한 소비 습관을 불러일으키고 있습니다.\n\n[lavish_leader.GetName](은)는 막대한 양의 에너지 크레딧을 사치품에 사용하다 적발되었으며, 점점 더 방탕한 개인 생활을 유지하고 있습니다."
 utopia.3350.desc.gestalt: "§H욕망의 하수인§!과의 밀접한 유대가 일부 [Root.GetSpeciesAdj] 지도자 드론의 자원 사용량을 증가시키고 있습니다.\n\n[lavish_leader.GetName](은)는 기본적인 기능을 유지하는 데 필요한 것보다 더 많은 에너지를 사용하고 있습니다. 이에 대한 물리적 근거가 발견되지 않는 것을 보아, 그저 선호에 따라 과도한 자원을 소비하고 있는 것으로 판단됩니다."
 utopia.3350.opt.a: "욕망의 대가일 뿐입니다."
 utopia.3351.name: "$name_instrument$: §R산만한 노동력§!"
 utopia.3351.desc.individual: "후원자의 영향력이 [Root.GetName] 전역으로 확산되며, 새롭게 등장한 오락거리들이 주민들의 에너지를 분산시켜 생산적인 일에서 멀어지게 하고 있습니다.\n\n동기 부여가 줄어드는 상황 속에서 이전과 같은 생산량을 달성하려면 이제 더 많은 투자가 필요하게 되었습니다."
 utopia.3351.desc.gestalt: "후원자의 영향력이 [Root.GetName] 전역으로 확산되며, [Root.GetSpeciesAdj] 집단 내에 서서히 일탈이 퍼지고 있습니다.\n\n이러한 일시적 개인주의적 충동과 산만해지는 경향은 특히 노동 중에 자주 식별됩니다. 노동력의 결속과 기강을 유지하려면 이제 더 많은 투자가 필요하게 되었습니다."
 utopia.3351.opt.a: "§H하수인§!의 일시적인 변덕이로군요."
 distracted_workforce: "산만한 노동력"
 distracted_workforce_desc: "이 노동력은 쉽게 주의가 산만해지며 지속적인 감독이 필요합니다."
 utopia.200.name: "장막의 새로운 존재"
 utopia.200.desc.a: "우리 제국에서 살아가는 [target_species.GetNamePlural]에게 변화가 찾아왔습니다. 변화는 처음에 장막의 잔물결에 불과했으나, 이제는 완전히 다른 수준으로 진동하는 듯합니다. [target_species.GetNamePlural](이)가 우리와 유사한 잠재적 사이오닉 능력을 개발하기 직전이라는 것이 느껴집니다.\n\n우리와 가까이에 살고 있는 것이 원인일 수도 있고, 단순히 장막이 그들을 선택했을 수도 있습니다. 다만 제국 내 최고 사이오닉 전문가들의 모임인 텔레파시 능력자 밀회는 이번이 우리가 개입할 유일한 기회라고 경고했습니다. 우리는 그들의 싹을 자르거나 각성을 도울 수 있습니다. 우리의 인도 없이는 멀리 가지 못할 것입니다."
 utopia.200.desc.b: "장막의 비정상적인 활동으로 보아, 우리 제국 내 또 다른 종족인 [target_species.GetNamePlural](이)가 잠재적 사이오닉 능력을 발현하기 시작한 모양입니다. 이제 우리는 결정을 내려야 합니다. 그들의 성장하는 힘을 억압하실 건가요, 아니면 해방시키실 건가요?"
 utopia.200.a: "그들의 잠재력을 해방하겠습니다."
 utopia.200.a.tooltip: "모든 [target_species.GetAdj] 팝이 §Y$trait_latent_psionic$§! 특성을 얻습니다."
 utopia.200.b: "그들은 자격이 없어요."
 utopia.203.name: "각성"
 utopia.203.desc.a: "텔레파시 능력자 밀회의 인도 아래, [target_species.GetNamePlural](은)는 우리가 상상했던 것보다 더욱 깊이 장막과 연결되었습니다. 마치 이 힘이 애초에 그들을 위한 것이었던 양 말이죠.\n\n이제 그들은 사이오닉 잠재력을 완전히 해방할 준비가 되었다고 주장하지만, 밀회 내 의견은 분분합니다. 일부는 변화가 너무 급진적이며 그들의 정신이 불안정해질 수도 있다고 주장하고, 어떤 이들은 그들이 새로운 힘을 얻고 자만할 수 있다고 합니다. 다만 지금이 아니면 그들을 공격할 기회는 다신 없을 것입니다."
 utopia.203.desc.b: "[target_species.GetNamePlural] 역시 사이오닉 잠재력을 완전히 해방하고 각성하기 위해 필요한 단계를 밟을 준비가 되었다고 주장합니다."
 utopia.203.a: "그들은 준비되었어요."
 utopia.203.a.tooltip: "모든 [target_species.GetAdj] 팝이 §Y$trait_psionic$§! 특성을 얻습니다."
 utopia.203.b: "그들은 자격이 없어요."
 utopia.203.c: "너무 위험합니다."
 utopia.204.name: "예상치 못한 각성"
 utopia.204.desc.a: "최근 우리 연구원들은 일부 [original_species.GetSpeciesNamePlural]에게서 발현된 예상치 못한 사이오닉 능력에 당황했습니다. 조사 결과, 이러한 변화는 사이오닉 분야에서 뛰어난 능력을 보이는 것으로 알려진 제국, [target_country.GetName]에 있는 동족들의 대규모 각성과 함께 일어났다는 것을 발견했습니다. \n\n이들의 새로운 능력이 우리가 이해하지 못하는 방식으로 멀리 떨어진 우리의 제국까지 흘러들어온 것으로 추정할 수밖에 없습니다."
 utopia.204.desc.b: "최근 우리 연구원들은 일부 [original_species.GetSpeciesNamePlural]에게서 발현된 예상치 못한 사이오닉 능력에 당황했습니다. 자세히 조사한 결과, 이 사이오닉 능력자들은 [target_country.GetName]에 있는 그들의 동족과 텔레파시로 연결되어 있다는 사실을 발견했습니다. 해당 제국은 이전까지 알려지지 않았으며, 이제 와서야 우리와 통신을 수립했습니다. 아무래도 [target_country.GetName]에 있는 모든 [original_species.GetSpeciesNamePlural]의 대규모 사이오닉 각성으로 파급 효과가 일어나 이러한 변화가 발생한 것 같습니다."
 utopia.204.a.tooltip: "최대 4 [original_species.GetSpeciesAdj] 팝이 §Y잠재적 사이오닉§! 특성을 얻습니다."
 utopia.205.name: "예상치 못한 각성"
 utopia.205.desc: "[target_species.GetName](이)가 사이오닉을 각성한 이후, 다른 곳에 있는 이들의 종족 역시 잠재적 사이오닉 능력의 징후를 보이기 시작했다는 정보원의 보고가 들어왔습니다. 마치 그들의 공통된 선조가 물리적 거리와 상관없이 그들을 장막 내에서 연결하고 있는 것 같습니다.\n\n하지만 우리 제국 내에 있는 그들의 먼 동족과 달리, 그들은 인구수가 무척 적으며, 사이오닉 능력을 완전히 각성하지는 못할 것입니다."
 whisperers_madness: "장막 - 광기"
 whisperers_madness_desc: "우리 제국의 주민들이 $whisperers_in_the_void_color_article$이 불러온 광기로 인해 분열되었습니다."
 whisperers_madness_gestalt: "$whisperers_madness$"
 whisperers_madness_gestalt_desc: "우리 드론들이 $whisperers_in_the_void_color_article$이 불러온 집단 광기로 인해 분열되었습니다."
 whisperers_psychosis: "장막 - 정신병"
 whisperers_psychosis_desc: "우리 제국이 $whisperers_in_the_void_color_article$이 불러온 광기로 인한 내부 갈등에 고통받고 있습니다."
 whisperers_psychosis_gestalt: "$whisperers_psychosis$"
 whisperers_psychosis_gestalt_desc: "우리 제국이 $whisperers_in_the_void_color_article$이 불러온 불균형으로 인한 내부 불화를 겪고 있습니다."
 eater_unhappiness_planet_1: "장막 - 잡아먹힌 주민"
 eater_unhappiness_planet_1_desc: "이 행성의 주민 일부는 $the_eater_of_worlds_color_article$에 의해 삼켜졌습니다."
 eater_unhappiness_planet_1_gestalt: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_1_gestalt_desc: "$eater_unhappiness_planet_1_desc$"
 eater_unhappiness_planet_2: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_2_desc: "$eater_unhappiness_planet_1_desc$"
 eater_unhappiness_planet_2_gestalt: "$eater_unhappiness_planet_2$"
 eater_unhappiness_planet_2_gestalt_desc: "$eater_unhappiness_planet_2_desc$"
 eater_unhappiness_empire: "장막 - 잡아먹힌 행성"
 eater_unhappiness_empire_desc: "$the_eater_of_worlds_color_article$가 우리 제국의 행성 하나를 통째로 삼켰습니다."
 eater_unhappiness_empire_gestalt: "$eater_unhappiness_empire$"
 eater_unhappiness_empire_gestalt_desc: "$eater_unhappiness_empire_desc$"
 instrument_deviance_planet: "장막 - 일탈"
 instrument_deviance_planet_desc: "이 행성의 주민은 자신의 목표를 추구하기 위해 제국의 윤리관을 외면하고 있습니다. 틀림없이 §Y욕망의 하수인§!의 소행입니다."
 instrument_deviance_empire: "장막 - 일탈"
 instrument_deviance_empire_desc: "국민 전체가 우리 제국의 윤리관과 정책에 의문을 던지고 있습니다. 틀림없이 §Y욕망의 하수인§!의 소행입니다."
 instrument_consumer_goods: "장막 - 타락"
 instrument_consumer_goods_desc: "이 행성의 주민은 특별한 음식과 이국적인 옷을 갈망하는 타락한 소비주의에 사로잡혔습니다. 틀림없이 §Y욕망의 하수인§!의 소행입니다."
 d_eater_deposit: "장막에 덮인 크레이터"
 d_eater_deposit_desc: "§H장막§!의 존재가 이 행성의 일부를 집어삼켰습니다. 그로 인해 생긴 크레이터에는 자주색 안개가 감돌고 있으며, 근처에 접근한 이들은 종종 돌아오지 못하곤 합니다."
 opinion_doomed_us_all: "종말을 초래하다"
 absorbed_consciousness_1: "흡수된 의식"
 absorbed_consciousness_2: "$absorbed_consciousness_1$"
 absorbed_consciousness_3: "$absorbed_consciousness_1$"
 absorbed_consciousness_4: "$absorbed_consciousness_1$"
 absorbed_consciousness_5: "$absorbed_consciousness_1$"
 covenant.tooltip: "§Y이에 따른 대가가 있을 것입니다.§!\n\n"
 covenant.cycle.tooltip: "§R하지 마십시오.§!\n\n"
 covenant.whisperers.desc: "됐습니다. $whisperers_in_the_void_color_article$과 계약을 맺었고, 그들은 우리 과학자와 지도자들에게 자신이 가진 비밀을 공유하기 시작했습니다.이 지식은 크나큰 도움이 될 것입니다.\n\n다만 하나 문제점이 있다면, 일반 주민 사이에 갑작스레 정신병과 자살이 증가했으며, 일부 우리 행성에서 안정적이고 사회에 잘 적응하던 개인들이 알 수 없는 이유로 살인과 습격을 빈번하게 일으키고 있습니다.게다가 환자들이 갑작스럽게 증가하면서, 진료소와 정신 병원이 어려움을 겪고 있습니다."
 covenant.whisperers.option: "감당할 수 있습니다."
 covenant.eater.desc: "됐습니다. $the_eater_of_worlds_color_article$와 계약을 맺었고, 벌써 우리 지상군과 해군은 그 효과를 느끼고 있습니다.이제 병사들은 야만성에 가까운 흉포함으로 전투를 벌이고 있으며, 함선의 무기도 적들의 죽음을 갈망하는 것처럼 보입니다.\n\n다만 식민지 하나에서 도시의 모든 주민이 갑자기 실종된 사건은 분명 이번 일과 관련이 있을 것입니다. 우리가 약속한 공물을 행성 포식자가 가져간 것이겠지요.\n\n이 정도쯤이야 별거 아닌 대가로 보입니다. 물론 포식자가 다시 굶주리지 않는다면 말이죠..."
 covenant.eater.option: "그러지 않기를 바랍시다."
 covenant.instrument.desc: "됐습니다. $the_instrument_of_desire_color_article$과 계약을 맺었고, 얼마 지나지 않아 효과를 느낄 수 있었습니다. 우리 광산에서 여러 풍부한 광맥이 새롭게 발견되었고, 무너지기 직전의 사업이 갑자기 번창했으며, 이전에는 분명 얼음과 바위밖에 없었던 소행성에서 희귀하고 귀중한 자원이 발견되었습니다.\n\n하수인이 약속한 것처럼 우리 제국은 부와 번영의 황금기에 접어든 것 같습니다. 하지만 그 대가는 무엇일까요...?"
 covenant.instrument.option: "별일 없을 거예요."
 covenant.composer.desc: "됐습니다. $the_composer_of_strands_color_article$와 계약을 맺었고, 얼마 지나지 않아 효과를 느낄 수 있었습니다. 출생률이 급격하게 증가한 것은 분명 이야기의 작곡가 덕분일 것입니다. 하지만, 이 긍정적인 효과와 함께 기이하고 새로운 변이가 나타나고 있습니다. 새롭게 태어난 아이들은 사지나 장기를 추가로 가지고 있으며... 어떤 신체 부위는 이전에 분류된 해부학적 기관과 아예 일치하지 않습니다.\n\n다행히 출산율의 증가와 시민들 사이에서 늘어난 활기는 변이로 인한 소수의 죽음을 상쇄하고도 남을 것입니다."
 covenant.composer.option: "우린 옳은 선택을 한 거예요."
 covenant.cycle.desc: "됐습니다. §R순환의 끝§!과 계약을 맺었습니다. 거래를 받아들이자, 단 두 단어가 들렸습니다. §R\"오십 년\"§!. 그리고는 우리가 방금 선택한 미래의 결과를 숙고하라는 듯이 침묵이 찾아왔습니다."
 covenant.cycle.option: "영혼들께서 우리 모두에게 자비를 내려주시길."
 covenant_shroud_marked: "장막 - 표적"
 covenant_shroud_marked_desc: "이 행성은 장막의 표적이 되었습니다.\n\n§R여기에서 무언가 끔찍한 일이 일어날 것입니다.§!"
 covenant_whisperers_in_the_void: "계약: 공허의 속삭임"
 covenant_whisperers_in_the_void_0: "$covenant_whisperers_in_the_void$"
 covenant_whisperers_in_the_void_desc: "우리는 장막에 있는 강력한 존재와 계약을 맺었고, 후원을 받아 혜택을 누리고 있습니다.\n\n§Y이에 따른 대가가 있을 것입니다.§!"
 covenant_whisperers_in_the_void_0_desc: "$covenant_whisperers_in_the_void_desc$"
 covenant_whisperers_in_the_void_0_fircon: "속삭임의 망토"
 covenant_whisperers_in_the_void_fircon: "속삭임의 망토"
 covenant_composer_of_strands: "계약: 이야기의 작곡가"
 covenant_composer_of_strands_0: "$covenant_composer_of_strands$"
 covenant_composer_of_strands_desc: "우리는 장막에 있는 강력한 존재와 계약을 맺었고, 후원을 받아 혜택을 누리고 있습니다.\n\n§Y이에 따른 대가가 있을 것입니다.§!"
 covenant_composer_of_strands_0_desc: "$covenant_composer_of_strands_desc$"
 covenant_eater_of_worlds: "계약: 행성 포식자"
 covenant_eater_of_worlds_0: "$covenant_eater_of_worlds$"
 covenant_eater_of_worlds_desc: "우리는 장막에 있는 강력한 존재와 계약을 맺었고, 후원을 받아 혜택을 누리고 있습니다.\n\n§Y이에 따른 대가가 있을 것입니다.§!"
 covenant_eater_of_worlds_0_desc: "$covenant_eater_of_worlds_desc$"
 covenant_eater_of_worlds_debuff: "$covenant_eater_of_worlds$"
 covenant_eater_of_worlds_debuff_desc: "$covenant_eater_of_worlds_desc$"
 covenant_eater_of_worlds_debuff_0: "$covenant_eater_of_worlds$"
 covenant_eater_of_worlds_debuff_0_desc: "$covenant_eater_of_worlds_desc$"
 covenant_instrument_of_desire: "계약: 욕망의 하수인"
 covenant_instrument_of_desire_0: "$covenant_instrument_of_desire$"
 covenant_instrument_of_desire_desc: "우리는 장막에 있는 강력한 존재와 계약을 맺었고, 후원을 받아 혜택을 누리고 있습니다.\n\n§Y이에 따른 대가가 있을 것입니다.§!"
 covenant_instrument_of_desire_desc_0: "$covenant_instrument_of_desire_desc$"
 covenant_end_of_the_cycle: "계약: 순환의 끝"
 covenant_end_of_the_cycle_desc: "우리는 순환의 끝과 계약을 맺었습니다.\n\n§R이에 따른 심판이 있을 것입니다.§!"
 whisperers_covenant_chain_title: "공허의 속삭임"
 whisperers_covenant_chain_desc: "$whisperers_in_the_void_color_article$이라는 장막의 존재와 계약을 맺었습니다. 도저히 가늠조차 할 수 없는 이 존재는 일정한 대가를 받고 우리에게 자기 힘의 극히 일부를 나누어 주었습니다. 이 관계는 앞으로도 계속될 가능성이 큽니다.\n\n[GetTelepathPlural]의 이론에 따르면, 우리 행동을 새로운 후원자의 의지에 맞춤으로써 그 유대를 더욱 손쉽게 다질 수 있다고 합니다.\n\n공허의 속삭임은 새로운 지식, 소리 없는 비밀과 음모를 좋아합니다. 이들은 온갖 지식으로 가득 차 터질 듯한 정신을 지켜보는 단순한 즐거움을 탐닉합니다."
 whisperers_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 whisperers_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 eater_covenant_chain_title: "행성 포식자"
 eater_covenant_chain_desc.intro: "$the_eater_of_worlds_color_article$라는 장막의 존재와 계약을 맺었습니다. 채울 수 없는 욕망을 지닌 이 존재는 일정한 대가를 받고 우리에게 자신의 힘의 극히 일부를 나누어 줍니다. 이 관계는 앞으로도 계속될 가능성이 큽니다.\n\n[GetTelepathPlural]들의 이론에 따르면, 우리 행동을 새로운 후원자의 의지에 맞춤으로써 그 유대를 더욱 손쉽게 다질 수 있다고 합니다."
 eater_covenant_chain_desc: "$eater_covenant_chain_desc.intro$\n\n포식자가 배고픔에 인내심을 잃고 있습니다. 전쟁을, 불화와 탄식의 달콤한 맛을 갈망하고 있습니다."
 eater_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 eater_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 composer_covenant_chain_title: "이야기의 작곡가"
 composer_covenant_chain_desc.intro: "$the_composer_of_strands_color_article$라는 장막의 존재와 계약을 맺었습니다. 모습을 숨기고 있는 이 존재는 일정한 대가를 받고 우리에게 자기 힘의 극히 일부를 나누어 주었습니다. 이 관계는 앞으로도 계속될 가능성이 큽니다.\n\n[GetTelepathPlural]들의 이론에 따르면, 우리 행동을 새로운 후원자의 의지에 맞춤으로써 그 유대를 더욱 손쉽게 다질 수 있다고 합니다."
 composer_covenant_chain_desc: "$composer_covenant_chain_desc.intro$\n\n작곡가는 유전자 조작과 진화의 제약에서 해방된 육체를 갈망하며, 동시에 생명과 자연, 그리고 육체의 신성함에 대한 존중을 이야기합니다."
 composer_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 composer_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 instrument_covenant_chain_title: "욕망의 하수인"
 instrument_covenant_chain_desc.intro: "$the_instrument_of_desire_color_article$이라는 장막의 존재와 계약을 맺었습니다. 욕망을 부추기는 이 존재는 일정한 대가를 받고 우리에게 자기 힘의 극히 일부를 나누어 주었습니다. 이 관계는 앞으로도 계속될 가능성이 큽니다.\n\n[GetTelepathPlural]들의 이론에 따르면, 우리 행동을 새로운 후원자의 의지에 맞춤으로써 그 유대를 더욱 손쉽게 다질 수 있다고 합니다."
 instrument_covenant_chain_desc: "$instrument_covenant_chain_desc.intro$\n\n하수인은 열망을 갈망합니다. 쾌락에 대한 탐닉, 타락, 그리고 노예제가 바로 하수인의 정체성입니다."
 instrument_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 instrument_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 utopia.2671.name: "깊어지는 유대"
 utopia.2671.desc: "우리 후원자에 관해 점점 많은 것을 배우고 있습니다. 그 존재에게 우리는 부차적인 존재에 불가합니다. 집에 들어온 벌레와 마찬가지입니다. 하지만 후원자는 우리를 마음에 들어 했으며, 또다시 한 방울의 힘을 우리에게 내려주었습니다.\n\n텔레파시 능력자들은 이제 후원자에게 더욱 깊은 수준으로 동조했으며, 감화를 받은 우리는 후원자와의 계약을 기리기 위한 기념물을 만들었습니다. 이곳에서 우리 제국 최고의 텔레파시 능력자들이 §Y[GetShroudPatron]§!(과)와의 교감을 시도합니다."
 utopia.2671.a: "작곡가의 품 안에 있으니 더욱 안심이 되는군요."
 utopia.2671.a.tt: "우리 제국의 텔레파시 능력자가 £pop£ §Y팝§! 성장을 추가로 제공합니다.\n\n이제 우리 행성 중 하나에 £building£ §Y작곡가의 성소§!를 건설할 수 있습니다."
 utopia.2671.b: "우리도 배가 고프군요. 전쟁이 허기를 채워줄 것입니다."
 utopia.2671.b.tt: "우리 제국의 텔레파시 능력자가 £mod_country_naval_cap_add£ 함대 수용력을 추가로 제공합니다.\n\n이제 우리 행성 중 하나에 £building£ §Y포식자의 성소§!를 건설할 수 있습니다."
 utopia.2671.c: "욕망보다 아름다운 것은 없습니다."
 utopia.2671.c.tt: "우리 제국의 텔레파시 능력자가 £amenities£ 편의를 추가로 제공합니다.\n\n이제 우리 행성 중 하나에 £building£ §Y하수인의 성소§!를 건설할 수 있습니다."
 utopia.2671.d: "충만한 정신에는 의심이 끼어들 틈이 없습니다."
 utopia.2671.d.tt: "우리 제국의 텔레파시 능력자가 $r_research$를 추가로 제공합니다.\n\n이제 우리 행성 중 하나에 £building£ §Y속삭임의 성소§!를 건설할 수 있습니다."
 utopia.2676.name: "잠재력 실현"
 utopia.2676.desc: "§H장막§!의 수수께끼는 너무 낯설어 풀어내기 어렵지만, 우리는 §Y[GetShroudPatron]§!에 더욱 동조할 수 있었습니다. 우리가 어디로 가든 정신 한 구석에서 그 존재를 느낄 수 있습니다. 그리고 그 힘은 우리 정신의 틈 사이로 우리 현실에 스며듭니다."
 utopia.2676.a: "육체의 의지는 신성한 것."
 utopia.2676.b: "불화가 곧 헌신이다."
 utopia.2676.c: "탐하고 욕망하라."
 utopia.2676.d: "비밀이 안전이다."
 utopia.2681.name: "힘의 파편"
 utopia.2681.desc: "우리 후원자인 §H[GetShroudPatron]§!(이)가 §H장막§!의 주름에 자신이 지닌 에너지의 일부를 남겨 두었습니다. 우리는 가져가기만 하면 됩니다. 우리와 후원자 사이의 유대가 공고한 지금, 우리 중 한 명이 그 힘을 흡수할 수 있습니다.\n\n후보를 몇 명 선택했지만, 그중 한 명만 후원자의 힘을 다루는 혜택을 누릴 수 있습니다. 어느 후보를 선택하시겠습니까?"
 utopia.2681.a: "[leader_1.GetName] §H[leader_1.GetTitle]§!"
 utopia.2681.b: "[leader_2.GetName] §H[leader_2.GetTitle]§!"
 utopia.2681.c: "[leader_3.GetName] §H[leader_3.GetTitle]§!"
 utopia.2681.d: "[leader_4.GetName] §H[leader_4.GetTitle]§!"
 utopia.2682.name: "승격자"
 utopia.2682.desc.intro: "성공입니다. [chosen_leader.GetName] 안에 힘이 들어오자, 주변에 있는 모든 이들이 그 사이오닉 존재의 무게를 [GetFeelLoc]할 수 있었습니다. 강력하면서도 존중해 마땅한 힘입니다. [chosen_leader.GetName](은)는 이제 [GetImmortalLoc]의 시간 동안 활약할"
 utopia.2682.desc.patron_champion: "$utopia.2682.desc.intro$ §H[GetShroudPatron]§!의 투사가 된 것입니다."
 utopia.2682.desc.shroudshaper_champion: "$utopia.2682.desc.intro$ §H[This.GetName]§!의 $leader_trait_shroudshaper$가 된 것입니다."
 utopia.2682.desc.previous_chosen_killed: "그 사건은 한때 우리의 옛 후원자에게 선택받은 것으로 여겨졌던 이단자, §H[previous_chosen_leader.GetName]§!에게 치명적인 영향을 주었습니다. 그 부서진 육신에서 마지막 남은 사이오닉 에너지가 사라지자, [previous_chosen_leader.GetName](은)는 유배지에서 조용히 숨을 거두었습니다."
 utopia.2682.desc.previous_chosen_lost_patron: "이번 사건은 §H[chosen_leader_lost_patron.GetName]§!에 뚜렷한 영향을 미쳤습니다. 여전히 상당한 사이오닉 에너지를 지니고 있지만, 한때 후원자였던 존재가 부여한 힘을 잃고 만 것입니다."
 utopia.2682.a: "선택받을 운명이었습니다."
 utopia.2682.a.shroudshaper: "이것이 [chosen_leader.GetName]의 운명입니다."
 utopia.2686.name: "축복받은 무장"
 utopia.2686.desc: "텔레파시 능력자 밀회가 우리 후원자인 §H[GetShroudPatron]§!의 힘을 이용하는 방법을 연구하다 돌파구를 찾아냈습니다. 기존에는 사이오닉 능력자만 계약이 지닌 힘을 온전히 파악할 수 있었지만, 후원자의 힘을 전례 없는 규모로 함선 전체에 흐르게 하는 방법을 고안해 낸 것입니다.\n\n원한다면 §H[GetShroudPatron]§!의 표식으로 우리 함선을 그 어느 때보다 더 멀리 보낼 수 있습니다."
 utopia.2686.a: "선체도 어떻게 보면 육신입니다."
 utopia.2686.b: "우리 함선들도 굶주려 있습니다."
 utopia.2686.c: "이 함선들은 목적을 갈망합니다."
 utopia.2686.d: "비밀은 비할 데 없는 무기입니다."
 building_composer_sanctum: "작곡가의 성소"
 building_composer_sanctum_desc: "작곡가와의 교감을 위한 성소입니다. [GetComposerSanctumDesc]"
 building_composer_sanctum_desc_default: "이곳에서 육신은 정신만큼이나 자유롭게 배회할 수 있어, 장막이 한계를 넘어 우리를 재창조할 수 있습니다."
 building_composer_sanctum_desc_machine: "이곳에서 회로는 물리적 제약 없이 작동하며, 장막은 기존의 한도를 넘어 우리 프로세서를 최적화할 수 있습니다."
 building_eater_sanctum: "포식자의 성소"
 building_eater_sanctum_desc: "포식자와의 교감을 위한 성소입니다. 이곳에서 장막은 우리가 다음 [GetEaterSanctumDesc](을)를 준비하듯 전쟁을 준비하게 합니다."
 building_eater_sanctum_desc_machine: "정복"
 building_eater_sanctum_desc_default: "연회"
 building_instrument_sanctum: "하수인의 성소"
 building_instrument_sanctum_desc: "하수인과의 교감을 위한 성소입니다. [GetInstrumentSanctumDesc]"
 building_instrument_sanctum_desc_gestalt: "이곳에서는 과잉 자원을 축적하고 정화한 뒤, 집단의 안정을 촉진하기 위해 재분배합니다."
 building_instrument_sanctum_desc_default: "이곳에서는 일단 부를 축적한 뒤, 일말의 만족감조차 주지 못하는 광란의 소비에 탕진해 버립니다."
 building_whisperers_sanctum: "속삭임의 성소"
 building_whisperers_sanctum_desc: "속삭임과의 교감을 위한 성소입니다. [GetWhisperersSanctumDesc]"
 building_whisperers_sanctum_desc_machine: "이곳에서는 온갖 비밀을 암호 속에 교환하고, 새로운 지식을 가져와 봉인하며, 우리의 신호가 합창에 참여합니다."
 building_whisperers_sanctum_desc_default: "이곳에서는 온갖 비밀을 숨죽인 목소리로 거래하고, 새로운 지식을 가져와 봉인하며, 우리의 소곤대는 소리가 합창에 참여합니다."
 covenant_detection_first_contact: "$building_whisperers_sanctum$"
 covenant_detection_first_contact_effect: "이 성계의 우리 §Y항성 기지§!가 다음을 얻습니다: §Y탐지 강도§! §G+5§!\n\n"
