l_korean:
 ##THE WORLD IS BLEEDING
 strange_worlds.1.name: "피 흘리는 행성"
 strange_worlds.1.desc: "§Y[Root.GetName]§!의 지표면에서 건설 공사를 진행하자, 지금껏 한 번도 본 적 없는 반응이 나타났습니다. 주요 시설의 기초 부분에서 정체를 알 수 없는 점액이 새어 나오는 것입니다.\n\n이 선홍색을 띤 액체는 보기에는 젤리 같지만 접착력이 매우 높습니다.\n\n우리 [Owner.GetScientistPlural]들은 이 물질을 어서 연구하고 싶어 합니다. 현재로서는 그냥 불편한 정도지만, 일단 [Owner.GetColonistPlural]들의 안전부터 확보하는 것이 좋을 것 같습니다."
 strange_worlds.5.name: "대출혈"
 strange_worlds.5.desc: "§Y[Root.GetName]§!(으)로부터 선홍색 이상 점액에 관해 우려스러운 내용의 보고가 들어왔습니다.\n\n이 물질이 해당 지역 전체에 걸쳐 더욱 빠른 속도로 배출되면서 감당하기가 점점 버거워지고 있다고 합니다.\n\n다만 이 점액에는 나름의 장점이 있습니다. 응고 과정에서 접착력이 강해져, 건설 공사에 보조용으로 쓸 수 있을 정도의 천연 시멘트를 형성하는 것입니다.\n\n하지만 걱정스러운 점은 이 물질과 접촉한 [Owner.GetColonistPlural]들에게서 점액을 떼어 내는 것이 불가능에 가깝다는 것입니다. 피해자들을 치료하고 조사하면 더 많은 정보를 모을 수 있겠지만, 공사가 느려질 우려가 있습니다."
 strange_worlds.5.a: "피해 인부들을 치료하고 연구하세요."
 strange_worlds.5.b: "공사나 계속하시죠."
 strange_worlds.15.name: "피의 산"
 strange_worlds.15.desc: "§Y[Root.GetName]§!에서 공사가 비약적인 속도로 진행 중이지만, 이제 점액이 시설의 기초 부분만이 아니라 다른 부분에서도 출현하고 있습니다.\n\n점액이 나오는 균열이 여러 위치에서 확인되었고, 처음에는 [Root.GetName] 외부에서 온 물질에서만 나타나던 현상이 이제는 무차별적으로 확산되고 있습니다.\n\n이제 점액은 [Root.GetName] 지표면의 상당 부분을 덮어 버리고는 두꺼운 무기질 응고물로 빠르게 굳어져 [Root.GetName](을)를 둘러싸고 있습니다.\n\n기술자들은 값비싼 시행착오를 거친 끝에 더 이상의 피해를 막고 점액을 효율적으로 채취할 수 있는 방법을 발견했습니다. 다만 그 과정에서 지표면의 상당 부분을 점액에 내주고 말았습니다."
 strange_worlds.15.a: "상황이 흥미롭게 흘러가는군요."
 strange_worlds.20.name: "기생충"
 strange_worlds.20.desc: "§Y[Root.GetName]§!에서 점액과 접촉한 인부들을 집중적으로 연구하고 치료한 우리 과학자들이 드디어 문제의 근본 원인을 파악했습니다.\n\n이 점액은 처음에는 젤리 같은 물질로 보였지만, 사실은 행성과 공생 관계에 있는 기생 미생물이 모인 것이라고 합니다. 이 미생물은 [Root.GetName]의 지각 아래에 있는 유기체를 해체해 새로운 물질로 재활용합니다.\n\n[Root.GetName]에서의 개발 사업으로 미생물의 자연스러운 생애 주기에 교란이 발생하면서, 우리가 현지 생태계에 들여온 외부 물질에 반응한 것 같습니다.\n\n연구진은 시간이 지나면 이 생명체와 조화롭게 공사를 진행하는 한편, 이들의 고유한 생체 구조를 [Root.GetName]의 생산 체계에 결합하는 방법을 찾을 수 있을 것이라 자신합니다."
 strange_worlds.20.a: "훌륭합니다. 계속 진행하세요."
 strange_worlds.25.name: "생산적인 관계"
 strange_worlds.25.desc: "우리 과학자들이 대대적인 연구를 통해 §Y[Root.GetName]§!에서 발견한 기생 미생물의 파생종을 만들어 내는 데 성공했습니다. 이 변이종은 우리가 들여온 자재를 현지 생태계에 무해한 물질로 인식하도록 설계되어, 별다른 문제 없이 공사를 속행할 수 있습니다.\n\n제작한 변이종을 행성의 생물권에 유입시키자, 변이종이 현지 생태계에 문제없이 섞여 들었습니다.\n\n게다가 미생물이 본래 가지고 있던 해체 능력을 재활용해 점액의 접착성을 추출할 수 있었고, 이를 통해 우리 행성의 생산 공정을 개선할 수 있었습니다."
 strange_worlds.25.a.evopred: "그 생물로부터 우린 뭘 취할 수 있죠?"
 strange_worlds.30.name: "느닷없는 출현"
 strange_worlds.30.desc: "§Y[Root.GetName]§!에서 앞으로 진행할 확장 사업을 준비하던 중, 어떤 거대한 구조물이 난데없이 나타났습니다.\n\n이 구조물은 매우 불안정한 에너지파를 방출하는 탓에 시야에서 사라졌다 나타나기를 반복합니다. 그렇기 때문에 현지 구역을 1차 스캔했을 당시에는 감지되지 않은 것입니다.\n\n구조물이 나타났을 때 살펴보니 봉인된 외벽에서 알 수 없는 기호가 발견됐는데, 우리 기록에 있는 어떤 언어와도 일치하지 않습니다.\n\n또한, 구조물에 어떤 기능이 있는지도 파악되지 않습니다. 구조물은 아직까지 아무 해도 끼치지 않았지만, 개발 사업에는 지장이 되고 있습니다."
 strange_worlds.30.a: "조사하세요."
 strange_worlds.35.name: "시각 이상 현상"
 strange_worlds.35.desc.no_cloak: "§Y[Root.GetName]§!에 나타난 일렁이는 구조물을 분석한 결과, 어떤 원리인지는 모르겠지만 이 물체가 빛을 구부리고 왜곡하고 있는 것으로 추정됩니다.$strange_worlds.35.desc.common_1$이 구조물의 특성을 점차 파악해 가고 있지만, 아직 내부로 진입하지는 못하고 있습니다. 아니, 진입이 가능한지조차 알 수 없습니다.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.cloak: "§Y[Root.GetName]§!에 나타난 일렁이는 구조물을 분석한 결과, 어떤 원리인지는 모르겠지만 이 물체가 간헐적으로 은폐 효과를 발동하고 있는 것으로 추정됩니다.$strange_worlds.35.desc.common_1$이 구조물의 은폐 기능을 점차 파악해 가고 있지만, 아직 내부로 진입하지는 못하고 있습니다. 아니, 진입이 가능한지조차 알 수 없습니다.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.common_1: "\n\n아래 있는 규산염으로 된 맨틀에서 아주 특이한 지열 활동이 감지되었습니다. 이곳의 강력한 에너지원이 구조물에 동력을 공급하고 있는데, 공급량의 변동이 매우 심합니다.\n\n"
 strange_worlds.35.desc.common_2: "\n\n구조물의 봉인된 외벽은 반응성이 매우 크며 한 번도 본 적 없는 물질로 이루어져 있습니다. 처음에는 강제 진입을 시도했으나, 구조물의 전자기장만 불안정해졌을 뿐이었습니다. 외벽을 잘라 내고 들어가면 더 많은 것을 알아낼 수 있겠지만, 구조물이 예기치 않게 불안정해질 위험이 매우 높습니다."
 strange_worlds.35.a: "강제로 진입하세요."
 strange_worlds.35.b: "외벽을 계속 조사하세요."
 strange_worlds.40.name: "폭주 반응"
 strange_worlds.40.desc: "§Y[Root.GetName]§!에서 발견한 구조물에 강제로 진입하려 했으나, 결과는 재앙이었습니다. 우리가 쓴 장비로 인해 구조물의 에너지 패턴이 더욱 불안정해져 강한 폭발이 연속으로 발생한 것입니다. 이제 구조물은 잿더미가 되어 버렸습니다.\n\n그런데 이번 폭발 사고로 인해 예기치 않은 결과가 발생했습니다. 오랫동안 버려진 외계 정착지의 폐허가 근처 계곡에 나타난 것입니다.\n\n구조물은 과거에 식민지였던 곳에 강력한 은폐장을 투사하고 있었던 것으로 파악됩니다. 무엇을 피해 숨은 것인지는 아직 알 수 없지만, 분명한 것은 살아남고자 이토록 애썼음에도 멸망했다는 것입니다. 아쉽게도 고고학적 가치가 있는 유물은 남아 있지 않습니다.\n\n이 특이한 기술의 정확한 작동 원리는 파악하지 못했지만, 이번 경험에서 새로운 지식을 일부 획득했습니다. 이곳의 강력한 지열 에너지원을 개발해 우리 식민지에서 활용할 것입니다."
 strange_worlds.40.a: "귀중한 발견이군요."
 strange_worlds.40.a_ct: "§Y일렁이는 구조물§! 차단물 제거"
 strange_worlds.45.name: "조종실"
 strange_worlds.45.desc.intro: "§Y[Root.GetName]§!에서 발견한 외계 구조물의 외벽에 써진 특이한 표시를 계속 조사한 결과, 이 표시는 일종의 인터페이스인 것으로 드러났습니다. 우리는 인터페이스를 조작해 구조물의 내부로 이어지는 숨겨진 문을 열었고, 안에 들어가자 거대한 조종실이 나왔습니다.\n\n자세한 작동 원리는 파악하지 못했지만, 여러 시행착오를 거쳐 기초적인 조종 방법은 알아낼 수 있었습니다. 그렇게 구조물의 기능을 중단시키자 예기치 않은 결과가 발생했습니다. 오래전에 버려진 외계 정착지의 폐허가 근처 계곡에 나타나 것입니다.\n\n구조물은 과거에 식민지였던 곳에 강력한 은폐장을 투사하고 있었던 것으로 파악됩니다. 무엇을 피해 숨은 것인지는 아직 알 수 없지만, 분명한 것은 살아남고자 이토록 애썼음에도 멸망했다는 것입니다. 고고학적 가치가 있는 유물은 남아 있지 않지만, 우리 과학자들이 이 조종실을 유용하게 활용할 방법을 알아냈습니다."
 strange_worlds.45.desc.a: "$strange_worlds.45.desc.intro$\n\n이제 우리는 구조물의 특이한 은폐 효과를 안정화하고 확장해 계곡 전체에 적용할 수 있게 되었습니다. 그 덕분에 우리 식민지가 매우 안전해질 것입니다."
 strange_worlds.45.desc.b: "$strange_worlds.45.desc.intro$\n\n이제 우리는 구조물의 은폐장을 안정화하고 확장해 계곡 전체를 보호할 수 있게 되었습니다. 또한, 은폐 기술에 대한 지식이 크게 늘었습니다."
 strange_worlds.45.a: "귀중한 발견이군요."
 strange_worlds.55.name: "자연의 충격"
 strange_worlds.55.desc.intro: "§Y[Root.GetName]§!에서 한 거대 초식 동물이 대량으로 나타나 에너지 생산에 지장을 주기 시작했습니다. 녀석들은 대규모 자살극이라도 연출하는 듯 단체로 우리 발전소에 자기 발로 들어와 감전당하고 있습니다.\n\n녀석들은 아주 집요하게 전력망 주변의 울타리를 뚫고 들어와 목표 지점으로 향합니다. 이 특이한 행태로 인해 발전이 저해되고 있습니다.\n\n"
 strange_worlds.55.desc.outro: "이 동물은 행성 생태계에서 중추적인 역할을 맡고 있습니다. 하지만 지금 같은 사태가 계속된다면 결국 스스로 멸종을 자초하고 말 것입니다."
 strange_worlds.55.desc.a: "$strange_worlds.55.desc.intro$그러나 뜻밖에 식량 생산량이 늘어나는 효과도 있었습니다. [Owner.GetColonistPlural]들이 감전된 동물을 먹었는데, 살코기가 아주 맛있다고 합니다.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.desc.b: "$strange_worlds.55.desc.intro$그 결과 생체 물질 획득량이 늘어나기는 했지만, 여전히 불편하기는 마찬가지입니다.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.a: "그 동물들의 행태를 조사하세요."
 strange_worlds.60.name: "촉매 효소"
 strange_worlds.60.desc: "자살 행태를 보이는 §Y[Root.GetName]§!의 동물종에 관한 중요한 사실을 알아냈습니다.\n\n이 거대 동물은 시각 기능이 없어, 반향 정위를 통해 주변을 인지하고 서로를 식별합니다. 아마 우리가 사용하는 에너지망이 녀석들의 민감한 청각에 부담을 주어, 발전기를 공격하도록 만들고 있는 것으로 판단됩니다.\n\n또한, 이 동물들이 지닌 고유한 소화 효소를 금속 제련에서 촉매제로 쓸 수 있다는 사실을 알아냈습니다. 1차 시험 결과, 이 효소는 합금 생산을 개선하는 데 효능이 있을 것으로 확인되었습니다.\n\n이러한 발견에도 불구하고 에너지 생산 정상화는 아직 요원합니다. 과학자들이 계속해서 문제를 조사하고 있습니다."
 strange_worlds.60.a: "$FASCINATING$"
 strange_worlds.65.name: "동물 자성"
 strange_worlds.65.desc.intro: "[Root.GetName]의 생물들이 적극적으로 자살 충동을 보이는 이유를 알아냈습니다.\n\n녀석들의 반향 정위와 사회 행동에 대한 관찰 조사에서 충격적인 사실이 드러났습니다. 이 동물들이 짝짓기 상대를 찾을 때 내는 소리가 우리 에너지망에서 나오는 소리의 주파수와 거의 동일한 것입니다.\n\n"
 strange_worlds.65.desc.common: "이에 동물들의 울음소리를 재현함으로써 녀석들을 식민지에서 먼 곳으로 이주하도록 유도해, 개체 수를 안정화시켜 볼 수 있습니다. 이렇게 할 경우 녀석들의 변에서 촉매 역할을 하는 효소를 채취해 합금 생산력을 높이고, 그 독특한 생체 구조를 계속 조사할 수도 있을 것입니다.\n\n한편,"
 strange_worlds.65.desc.outro: "이런 상황에 맞춰 특수 전기 수확기를 만들면, 에너지 생산에 지장을 주지 않고 이 동물들을 효율적으로 가공할 수 있을 것입니다."
 strange_worlds.65.desc.devouring_swarm: "$strange_worlds.65.desc.intro$이 지식을 이용하면 녀석들을 특수 수확기로 손쉽게 유도할 수 있을 것입니다. 마음껏 먹어 봅시다!"
 strange_worlds.65.desc.food: "$strange_worlds.65.desc.intro$$strange_worlds.65.desc.common$ §Y[Root.GetName]§!에서는 이 동물을 주식으로 섭취하기 시작했습니다.\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.desc.no_food: "$strange_worlds.65.desc.intro$§Y[Root.GetName]§!에서는 이 동물들을 통해 안정적인 양의 생체 물질을 지속적으로 얻고 있습니다.\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.a: "분변을 채취하세요."
 strange_worlds.65.b_devouring_swarm: "성대한 잔치로군요!"
 strange_worlds.65.b_default: "살코기를 채취하세요."
 strange_worlds.75.name: "이상한 모래"
 strange_worlds.75.desc: "우리 [Owner.GetColonistPlural]들의 보고에 따르면 §Y[Root.GetName]§!의 모래에서 기이한 현상이 나타났다고 합니다.\n\n조용한 날씨에 별안간 극심한 모래 폭풍이 식민지 근처에 나타나는가 하면, 세차게 움직이는 모래의 강이 불현듯 나타났다가 갑자기 멈춘다고도 합니다. 바람 한 점 없는 날에 모래 언덕이 측면으로 움직였다는 보고도 있습니다.\n\n현 상황과 관련해 대기나 지리적인 원인은 아직 파악되지 않고 있습니다.\n\n이 특이한 모래는 우리에게 직접 피해를 주지는 않지만, 식민지 운영에는 지장이 발생하고 있습니다. 현재 이 독특한 현상에 관한 조사가 진행 중입니다."
 strange_worlds.75.a: "흥미롭군요."
 strange_worlds.80.name: "노래하는 모래"
 strange_worlds.80.desc: "§Y[Root.GetName]§!에 나타난 모래 폭풍이 깊이 웅웅대는 소리를 내기 시작했습니다. 소리의 주파수는 높낮이가 일정하게 움직이면서 반복되는 패턴으로 변조되고 있습니다.\n\n이 '노래하는 모래' 현상의 원인을 자유 입자의 특성에서 찾을 수도 있겠지만, 그 변조의 규칙성은 마찰만으로는 설명이 안 됩니다.\n\n이와 더불어 기이한 기호가 새겨진 둔덕이 가득 찬 계곡도 발견했습니다. 이 상형 문자들은 순식간에 솟아올랐다가 거의 즉시 흩어집니다.\n\n무엇이 모래를 움직이는지는 확실하지 않지만, 패턴이 일정한 것으로 볼 때 어떤 목적이나 의도가 깔려 있는 것으로 보입니다."
 strange_worlds.80.a: "패턴을 조사하세요."
 strange_worlds.85.name: "사이오닉 모래"
 strange_worlds.85.desc_part1_no_zro: "§Y[Root.GetName]§!의 모래 폭풍을 조사하던 [Owner.GetScientistPlural]들이 모래를 이루는 규소에 처음 보는 외계 물질이 분포되어 있다는 사실을 발견했습니다."
 strange_worlds.85.desc_part1_zro: "§Y[Root.GetName]§!의 모래 폭풍을 조사하던 [Owner.GetScientistPlural]들이 모래를 이루는 규소에 즈로가 분포되어 있다는 사실을 발견했습니다."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_zroni: "\n또한, 표본을 취급하던 [Owner.GetResearchers]들이 짧지만 강렬한 환상을 보았다고 합니다. 환상 속에서는 즈로니들의 환영이 이 행성의 상형 문자 둔덕을 돌아다니고 있었다고 합니다."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_no_zroni: "\n또한, 표본을 취급하던 [Owner.GetResearchers]들이 짧지만 강렬한 환상을 보았다고 합니다. 환상 속에서는 어떤 낯선 외계인들의 환영이 이 행성의 상형 문자 둔덕을 돌아다니고 있었다고 합니다."
 strange_worlds.85.desc_part2_non_machine_common_psionic_zroni: "\n또한, 표본을 취급하던 [Owner.GetResearchers]들이 짧지만 강렬한 사이오닉 환상을 보았다고 합니다. 환상 속에서는 즈로니들의 환영이 이 행성의 상형 문자 둔덕을 돌아다니고 있었다고 합니다."
 strange_worlds.85.desc_part2_non_machine_common_psionic_no_zroni: "\n또한, 표본을 취급하던 [Owner.GetResearchers]들이 짧지만 강렬한 사이오닉 환상을 보았다고 합니다. 환상 속에서는 어떤 낯선 외계인들의 환영이 이 행성의 상형 문자 둔덕을 돌아다니고 있었다고 합니다."
 strange_worlds.85.desc_part2_machine_common: "\n그리고 표본을 취급하던 [Owner.GetResearchers]들에게서 내부 회로 간섭이 발생했다고 합니다.\n\n"
 strange_worlds.85.desc_part2_machine_zroni: "$strange_worlds.85.desc_part2_machine_common$그 강렬한 교란으로 인해 시각 정보 처리 기능이 오작동을 일으켜, 즈로니들의 환영이 이 행성의 상형 문자 둔덕을 돌아다니는 모습이 나타났습니다."
 strange_worlds.85.desc_part2_machine_no_zroni: "$strange_worlds.85.desc_part2_machine_common$그 강렬한 교란으로 인해 시각 정보 처리 기능이 오작동을 일으켜, 어떤 낯선 외계인들의 환영이 이 행성의 상형 문자 둔덕을 돌아다니는 모습이 나타났습니다."
 strange_worlds.85.desc_part3_common: "\n이 환영들이 상형 문자를 만들어 내는 것으로 보입니다. 문자를 해독하려면 상당한 시간이 걸리겠지만, 일단 일종의 문자 언어인 것은 분명해 보입니다.\n\n"
 strange_worlds.85.desc_part3_zro: "$strange_worlds.85.desc_part3_common$모래에서 즈로를 그냥 추출할 수도 있겠지만, 그럴 경우 환영들이 흩어질 가능성이 높습니다. 하지만 여기에 이 고가치 물질이 상당히 많이 묻혀 있는 것도 사실입니다."
 strange_worlds.85.desc_part3_no_zro: "$strange_worlds.85.desc_part3_common$모래에서 이 외계 물질을 그냥 추출할 수도 있겠지만, 그럴 경우 환영들이 흩어질 가능성이 높습니다. 하지만 물리 법칙을 거스르는 이 특이한 물질은 매우 가치가 높을 수도 있습니다."
 strange_worlds.85.a: "번역 작업을 계속 진행하세요."
 strange_worlds.85.b_no_zro: "즉시 외계 물질을 추출하세요."
 strange_worlds.85.b_zro: "즉시 즈로를 추출하세요."
 strange_worlds.90.name: "장관을 이루는 모래"
 strange_worlds.90.desc_intro_zroni: "우리는 즈로 문화에 대한 사전 지식을 활용해 §Y[Root.GetName]§!의 모래에 새로운 상형 문자를 적었습니다. 즈로니 언어로 인사에 해당하는 문자입니다. 답변은 즉시 나타났습니다."
 strange_worlds.90.desc_intro_no_zroni: "우리 언어 데이터베이스를 이용해 §Y[Root.GetName]§!의 모래 위에 우리가 아는 모든 외계 언어로 인사에 해당하는 문자를 적어 넣었습니다. 이윽고 답변이 나타났습니다."
 strange_worlds.90.desc_common: "\n모래 폭풍은 흩어지고, 계곡 바닥은 평평해졌으며, 모래 둔덕의 노래는 잠잠해졌습니다. 그 후 모래 둔덕들이 공중에 떠오르더니 새로운 형태를 취했습니다. 움직이는 모래로 된 형상들이 공중에서 움직이며 정교한 장관을 연출했습니다.\n\n"
 strange_worlds.90.desc_storyline_started: "$strange_worlds.90.desc_common$우리는 이 광경이 즈로니의 이야기임을 즉시 알아차렸습니다. 새로 찾은 힘과 잔혹한 분쟁의 모습이 펼쳐졌습니다. 이 즈로를 동력 삼아 움직이는 모래는 고대 즈로니 종족이 남긴 우주적 메아리였던 것입니다.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_finished: "$strange_worlds.90.desc_common$우리는 이 광경이 즈로니의 이야기임을 즉시 알아차렸습니다. 장막으로의 승격과 이어지는 파괴의 모습이 펼쳐졌습니다. 이 즈로를 동력 삼아 움직이는 즈로니의 비극적 운명을 담은 우주적 메아리였던 것입니다.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_not_started: "$strange_worlds.90.desc_common$우리가 이해한 내용은, 눈앞에 보이는 환상이 어떤 외계 종족의 이야기라는 것뿐이었습니다. 이들은 새로운 힘을 발견했다가 결국 분열되어 무너졌던 것 같습니다.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_outro: "\n\n이후 사이오닉 모래는 다시 가라앉았습니다. 폭풍은 돌아오지 않았습니다. 이제 이 모래는 우리가 §Y[Root.GetName]§!에 있어도 괜찮은 모양입니다."
 strange_worlds.90.a: "$FASCINATING$"
 strange_worlds.95.name: "채취 작업"
 strange_worlds.95.desc_zroni_tech: "우리는 즈로 증류 기술을 이용해 §Y[Root.GetName]§!의 모래에서 상당량의 즈로를 추출했으며, 그 과정에서 많은 것을 배울 수 있었습니다.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_no_zroni_tech: "§Y[Root.GetName]§!에서 즈로를 추출하려 했으나 절반의 성공이었습니다. 소량을 추출하는 데는 성공했지만 실험 중에 다량의 즈로가 사라지고 말았습니다. 하지만 그 과정에서 많은 것을 배울 수 있었습니다.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_outro: "\n\n함유되어 있던 즈로를 모두 없애자 모래가 다시 정상으로 돌아온 것 같습니다. 식민지에 나타났던 예측 불가능한 모래 폭풍 현상도 사라졌습니다. 이 모래를 움직이던 것이 무엇이든, 이제는 감쪽같이 사라진 것 같습니다."
 strange_worlds.105.name: "갑작스러운 실종"
 strange_worlds.105.desc_intro: "§Y[Root.GetName]§!에 있는 우리 [Owner.GetExplorer] 중 하나와 통신이 두절되었습니다. 지금까지 탐사하지 않은 계곡에서 잠재적 §Y외계 가스§! 매장지를 발견했다고 보고한 직후였습니다.\n\n"
 strange_worlds.105.desc_gestalt_non_machine: "노드가 침묵하기 전, 짧지만 강렬한 고통이 감지되었습니다."
 strange_worlds.105.desc_gestalt_machine: "노드의 데이터가 통신 두절 전에 손상되었습니다. 사라진 노드는 더 이상 네트워크에 연결되어 있지 않습니다."
 strange_worlds.105.desc_non_gestalt: "걱정되는 점은 마지막 통신이 갑자기 두절되기 전에 고통에 찬 비명 소리 같은 것이 들렸다는 점입니다. 최악의 상황이 우려됩니다."
 strange_worlds.105.a: "걱정되는군요."
 strange_worlds.110.name: "부식성 웅덩이"
 strange_worlds.110.desc: "§Y[Root.GetName]§!에서 사라진 [Owner.GetExplorer]의 마지막 위치를 조사하던 중, 순수한 §Y외계 가스§!로 이루어진 안개를 분출하는 강산성 늪지를 발견했습니다. 이 늪에는 극도의 산성에도 견딜 수 있는 내성을 갖춘 토착 식물종이 서식하고 있습니다.\n\n아주 위험한 지형이지만, 외계 가스 안개를 계속 연구하면 식민지 자원 확보에 도움이 될 수 있을 것입니다."
 strange_worlds.110.a: "안개를 조사하세요."
 strange_worlds.115.name: "소화성 늪"
 strange_worlds.115.desc: "§Y[Root.GetName]§!의 산성 늪을 조사하던 우리 [Owner.GetScientistPlural] 하나가 관측 장비와 함께 토착 생물의 촉수에 휘감겨 강산성 웅덩이로 끌려 들어가서는 거의 즉시 녹아 없어졌습니다. 앞서 사리진 [Owner.GetExplorer]도 이렇게 사망한 것으로 판단됩니다.\n\n그 직후 식물의 촉수가 눈에 띄게 팽창하더니 §Y외계 가스§! 방출량이 급격히 증가했습니다. 이 포식자 식물은 산성 늪을 외부 소화계로 활용하고 있는 것 같습니다. 먹이를 사냥용 촉수로 끌어들여 녹인 후, 영양분을 흡수하는 것입니다. 그리고 이 과정에서 소량의 추출 가능한 외계 가스가 방출됩니다.\n\n이 유기체에게 식민지에서 나온 폐기물을 먹이면, 그 생체 구조를 활용해 가스를 더 많이 생산할 수 있습니다. 아니면 산성 늪을 중화시켜, 영양분이 풍부한 이 땅을 농지로 개간할 수도 있습니다."
 strange_worlds.115.a: "이 생물을 재배합시다."
 strange_worlds.115.b: "토지를 개간하세요."
 strange_worlds.120.name: "늪지 식물 중화"
 strange_worlds.120.desc: "§Y[Root.GetName]§!의 산성 늪을 중화해 그 안에 사는 식물종을 없앤 결과, §Y외계 가스§! 안개가 사라졌습니다.\n\n이렇게 개간한 땅은 토착 식물의 섭식 과정에서 나온 잔여 영양분으로 인해 놀랍도록 비옥합니다. 이로써 가치가 높은 농지를 추가로 확보하게 되었습니다."
 strange_worlds.120.a_ct: "[This.GetName]에 §Y$district_farming_plural$§! §G2§!개 추가"
 strange_worlds.120.b.evopred: "훌륭합니다. 나머지도 채취하세요."
 strange_worlds.130.name: "암흑 물질 폭발"
 strange_worlds.130.desc: "§Y[Root.GetName]§!에서 발견한 간헐천이 오래전에 활동을 멈추었다는 예상과는 달리 격렬하게 폭발해, §Y암흑 물질§!이 주입된 가스를 대기 중에 분출했습니다.\n\n하늘을 메운 분출물로 인해 심각한 중력 이상 현상이 발생하면서 행성 바깥으로의 비행과 통신이 차단되었습니다.\n\n이 암흑 물질은 행성의 핵에서 유래된 것으로 판단됩니다. 이 같은 극단적인 환경은 [Owner.GetColonistPlural]들에게 위험이 되기 때문에, 현재 궤도 추출기를 배치해 성층권에서 암흑 물질을 뽑아내고 있습니다."
 strange_worlds.130.a: "상황을 예의 주시하세요."
 strange_worlds.135.name: "액체 어둠"
 strange_worlds.135.desc_common_1: "드디어 §Y암흑 물질§! 가스를 §Y[Root.GetName]§!의 대기권에서 뽑아내는 데 성공했습니다. 현재 피해 현황을 파악 중입니다."
 strange_worlds.135.desc_common_2: "\n식민지와 연락을 재개하자, [Owner.GetColonistPlural]들이 고체화된 암흑 물질로 보이는 물질로 인해 딱딱하게 굳어 버렸다는 사실을 발견했습니다."
 strange_worlds.135.desc_organic_non_gestalt: "$strange_worlds.135.desc_common_2$ 그리고 그 껍데기 안에서 활력 징후가 감지되어, 조심스럽게 주민들을 구출해 냈습니다."
 strange_worlds.135.desc_machine: "$strange_worlds.135.desc_common_2$ 그리고 그 껍데기 안에서 전자 신호가 감지되어, 구출 작업을 진행했습니다."
 strange_worlds.135.desc_gestalt: "$strange_worlds.135.desc_common_2$ 그리고 그 안에 있는 자들이 군체와 다시 결합하려 하고 있는 것이 감지되어, 그 단단한 껍데기로부터 꺼내 주었습니다."
 strange_worlds.135.desc_outro: "\n[Owner.GetColonistPlural]들은 정지 상태로 오랫동안 암흑 물질에 노출되어 있었음에도 불구하고 예상과 달리 전혀 영향을 받지 않은 것으로 보입니다.\n\n당초 사고의 원인이었던 간헐천은 붕괴되어 액체 암흑 물질로 이루어진 호수가 되었습니다.\n\n이번 일은 전례가 없는 사태로서 집중적인 조사가 필요합니다. [Owner.GetScientistPlural]들은 이미 가뜩이나 희박해진 자원을 어디에 투입할지 정하지 못하고 있습니다."
 strange_worlds.135.a: "주민들을 격리해 연구하세요."
 strange_worlds.135.b: "암흑 물질 연구를 우선 진행하세요."
 strange_worlds.140.name: "암흑 물질 오염"
 strange_worlds.140_intro: "우리 [Owner.GetScientistPlural]들은 §Y§!에 나타난 §Y[Root.GetName]§!암흑 물질 호수가 행성에 더는 큰 위험이 되지 않을 것이라며 자신하고 있습니다. 하지만 그런 예상에도 불구하고 주민들에게서 나타나고 있는 증상은 심상치 않습니다.\n\n격리된 [Owner.GetColonistPlural]들을 조사하던 중, 암흑 물질에 갇혀 있던 일로 인해 신체적 변화가 일어나고 있다는 사실이 확인된 것입니다."
 strange_worlds.140_common: "\n주민들은 오랫동안 암흑 물질에 노출되면서 신체 분자에 암흑 물질이 가득 차게 되었고,"
 strange_worlds.140_machine_1: "$strange_worlds.140_common$ 그 결과 각 계통이 완전히 오염되었습니다."
 strange_worlds.140_non_machine_1: "$strange_worlds.140_common$ 그 결과 순환 계통이 완전히 오염되었습니다."
 strange_worlds.140_machine_2: "\n이 오염 물질로 인해 조기 계통 장애가 발생할 위험은 있지만, 이 행성에서 만들어지는 유닛의 조립 공정에 암흑 물질을 결합할 경우 암흑 물질을 효율적으로 가공하고 채취하는 서브루틴을 적용할 수 있을 것입니다."
 strange_worlds.140_non_machine_2: "\n이 이상 현상을 적절히 유도하면 우리 [Owner.GetColonistPlural]들의 신체로 하여금 채취 가능한 암흑 물질을 가공하고 분비하게 할 수 있습니다. 단, 기대 수명은 단축될 것입니다."
 strange_worlds.140.a.dc_empire: "이 선물을 받아들입시다."
 strange_worlds.140.a.machine_empire: "이상 현상을 유도합시다."
 strange_worlds.140.a.normal: "오염 물질을 가공합시다."
 strange_worlds.140.b: "오염을 제거하세요."
 strange_worlds.145.name: "초소형 블랙홀"
 strange_worlds.145.desc: "§Y[Root.GetName]§!에서 나타난 암흑 물질 호수를 계속 조사한 결과, 처음에 발생한 폭발 사고의 원인을 규명해 줄 중요한 지질 정보를 찾아냈습니다.\n\n이 행성의 핵에는 길이가 1미터 미만인 초소형 블랙홀이 자리 잡고 있습니다. 그런데 행성 자체의 질량이 워낙 크기 때문에 원래라면 우리 장비에 감지됐을 블랙홀의 중력을 덮어 버린 것 같습니다. 이 두 질량체는 이러한 관계 속에 미묘한 균형을 이루고 있으며, 이 균형은 당분간 지속될 예정입니다.\n\n다만 최근의 지진 활동으로 내부 맨틀의 위치가 바뀌면서 간헐천이 분출한 것 같습니다. 이 암흑 물질 호수는 행성의 핵을 안정시키고 더 이상의 분출을 막는 일종의 마개 기능을 했던 모양입니다.\n\n그러나 암흑 물질의 장기적인 포화 현상은 당초 판단했던 것만큼 무해하지는 않았던 것 같습니다.\n\n[Owner.GetColonistPlural]의 질량 중심에 불안정한 소형 블랙홀이 나타나, 신체 내부가 붕괴된 것입니다. 그 후에 남은 것은 결정화된 암흑 물질로 이루어진 껍데기뿐입니다. 스캔을 진행했지만 활력 징후는 더 이상 감지되지 않았습니다.\n\n최종 집계 결과, §Y[Root.GetName]§!의 전체 주민 중 1/4가량을 한순간에 잃은 것으로 나타났습니다. 사라진 주민들이 있던 자리에는 단단한 암흑 물질로 이루어진 조각상이 늘어서 있습니다."
 strange_worlds.145.a.no_gestalt: "안타깝군요."
 strange_worlds.145.a.gestalt: "소름 끼치는군요."
 strange_worlds.155.name: "역겨운 짐승"
 strange_worlds.155.desc_homicidal: "§Y[Root.GetName]§!에서 유난히 혐오스러운 토착 동물종을 발견했습니다.\n\n이 동물은 독특한 방어 기제를 갖췄는데, 이는 주된 먹이 섭취 수단이기도 합니다. 이 녀석들은 고체 음식을 분해하는 데 필요한 소화 효소를 자체적으로 만들지 못하기 때문에 구역질을 유발하는 강력한 가스를 방출합니다. 그리고 이 가스는 내장이 있는 유기체가 흡입할 경우 토사물을 발사체처럼 토하도록 유도하는데, 녀석들은 이렇게 나온 물질을 통해 주로 영양분을 얻는 것입니다.\n\n이 끔찍한 생물을 박멸하면 쏠쏠한 양의 §Y외계 가스§!와 §Y식량§!을 얻을 수 있을 것입니다."
 strange_worlds.155.desc_normal: "§Y[Root.GetName]§!의 [Owner.GetColonistPlural]들이 어떤 토착 동물종을 발견했는데, 이 동물들의 먹이 획득 방식이 아주... 독특합니다.\n\n이 동물들은 처음에는 거리를 두었지만 이내 우리의 존재에 익숙해졌고, 붙임성이 좋아 어린 [Root.Owner.GetSpeciesNamePlural] 사이에서는 꽤 인기가 많습니다.\n\n직접적인 위험은 없지만, 이 동물이 발전시킨 방어 기제는 주된 먹이 섭취 수단이기도 합니다. 이 녀석들은 고체 음식을 분해하는 데 필요한 소화 효소를 자체적으로 만들지 못하기 때문에 구역질을 유발하는 강력한 가스를 방출합니다. 그리고 이 가스는 내장이 있는 유기체가 흡입할 경우 토사물을 발사체처럼 토하도록 유도하는데, 녀석들은 이렇게 나온 물질을 통해 주로 영양분을 얻는 것입니다.\n\n전반적인 상황을 검토해 봤을 때 감염병이 확산될 위험이 있기 때문에, 현지 지도부는 [Owner.GetColonistPlural]들에게 이 이상한 생물로부터 거리를 둘 것을 촉구하고 있습니다."
 strange_worlds.155.a: "정말 독특한 외계 생물이군요."
 strange_worlds.155.b_purifiers: "더러운 것들."
 strange_worlds.155.b_swarm: "이거 아주 별미로군요!"
 strange_worlds.155.b_normal: "보이는 족족 쏴 버리세요."
 strange_worlds.160.name: "역겨운 상황 전개"
 strange_worlds.160.desc: "§Y[Root.GetName]§!에서 역겨운 짐승들을 박멸하려 했지만 쉽지가 않습니다. 식민지의 어린 구성원들이 공식 경고에도 불구하고 그 동물들과 계속 놀고 있기 때문입니다.\n\n그 결과 이 짐승들이 우리 [Root.Owner.GetSpeciesOrganName]에 있는 단백질을 주식으로 삼게 되었습니다. 녀석들의 지독한 가스를 피하는 방법을 아는 다른 토착 동물 대신, 우리 식민지가 손쉬운 표적이 된 것입니다. 나아가 이 짐승들은 우리에 맞게 전술을 바꾸어, 식사 후 혼자 돌아다니는 [Owner.GetColonist]들을 매복 기습하는 모습이 확인되기도 했습니다.\n\n믿긴 힘들지만, 한편으로는 이 상황이 우리에게 유리한 면도 있습니다. 과학자들의 조사에 따르면, 이 생물이 배출하는 구토 유발 가스에는 귀중한 §Y외계 가스§! 입자가 섞여 있습니다. 이 짐승들을 길들여 격리 시설에서 사육하면 그 외계 가스를 채취할 수 있을지도 모릅니다.\n\n그러나 대다수의 식민지 주민은 그냥 녀석들을 박멸하라는 입장입니다."
 strange_worlds.160.a: "잡아서 기릅시다."
 strange_worlds.160.b: "이제 견딜 만큼 견뎠습니다. 보이는 족족 쏴 버리세요."
 strange_worlds.165.name: "신선해진 공기"
 strange_worlds.165.desc: "이제 §Y[Root.GetName]§!의 짐승들은 더 이상 집단 구토를 유발하지 않습니다.\n\n이 외계 생물의 생체 구조에 맞춰 합성 영양 반죽을 개발해, 녀석들의 먹이 섭취 주기를 조절함으로써 우리 [Owner.GetColonistPlural]들을 기습하는 일이 없도록 한 것입니다.\n\n그리고 녀석들을 세심하게 설계된 야생 보호 구역으로 이동시켜, 주민들이 안전한 환경에서 구경할 수 있도록 했습니다. 또한 전문 사육사를 육성해, 더 이상의 피해 없이 §Y외계 가스§!를 추출할 수 있게 조치했습니다."
 strange_worlds.165.a: "이제 안심이군요."
 strange_worlds.165.a.evopred: "우리는 저렇게 냄새나는 방향으로 진화하지 않도록 조치하세요."
 strange_worlds.170.name: "박멸 명령"
 strange_worlds.170.desc: "§Y[Root.GetName]§!에서 발견한 그 역겨운 생물에 대한 공식 박멸 방침을 채택한 이후, 녀석들이 식민지에서 마지막으로 나타난 지 수 개월이 흘렀습니다.\n\n일부 [Owner.GetColonistPlural]들은 그 털북숭이들이 사라진 것을 아쉬워하고 있지만, 이제 강제로 구토할 걱정 없이 돌아다닐 수 있다며 전반적으로 만족하고 있습니다.\n\n과학자들은 녀석들의 사체를 가져다 장기에서 소량의 §Y외계 가스§!를 추출했습니다."
 strange_worlds.170.a: "자업자득이군요."
 strange_worlds.185.name: "지구 간 적대 행위"
 strange_worlds.185.desc: "§Y[Root.GetName]§!에서 농촌 지구와 도시 지구 주민 사이에 적대 행위가 발생했다는 우려스러운 보고가 들어왔습니다. 이 적대의 원인은 우연한 지리적 위치 외에는 확인되지 않습니다.\n\n새로 이주한 주민의 경우, 처음에는 소외될 순 있지만 각 지구에 배속된 후 몇 주 안에 사회의 일원으로 인정받는 것이 보통입니다. 이 점을 근거로 과학자들은 이 행성에서 나타난 이상한 적대 행위가 해당 지구에 국한된 요인 때문인 것으로 확신하고 있습니다.\n\n이 사안을 조사하는 동안, 적대 관계가 심각해지지 않도록 상황을 안정시킬 필요가 있습니다. 농촌 지구나 도시 지구 중 한쪽에 대한 지지를 공식 표명할 수 있고, 평화 유지를 위해 추가 치안 인력을 투입하는 방법도 있습니다."
 strange_worlds.185.a: "도시 지구를 지지하세요."
 strange_worlds.185.b: "농업 지구를 지지하세요."
 strange_worlds.185.c: "추가 치안 인력을 투입하세요."
 strange_worlds.190.name: "물에 있는 무언가"
 strange_worlds.190.desc_intro: "§Y[Root.GetName]§!에 대한 대대적인 환경 조사 끝에, 과학자들이 지구 간 적대 행위의 원인을 알아냈습니다.\n\n그 행성의 맨틀 속 깊숙한 곳에는 거대한 유기체의 사체가 자리 잡고 있습니다. 수천 년 동안 사체가 부패하면서 오래전에 죽은 이 생물의 척수액이 행성의 지하수로 섞여 들어 사이오닉 박테리아를 감염시킨 것입니다. 정신을 조종하는 이 미생물이 결국 우리 [Owner.GetColonistPlural]들의 신경계에 들어가 강력한 영역 보호 본능을 초래했습니다. 이 본능은 그 생물의 특성이었을 가능성이 높습니다.\n\n"
 strange_worlds.190.desc_non_psionic: "여러 종류의 전용 고등급 필터를 제작해 지하수를 복합적으로 정수하면, 이 문제를 해결할 수 있을지도 모릅니다.\n\n"
 strange_worlds.190.desc_psionic: "이 외계 불순물이 우리의 타고난 사이오닉 능력을 교란시키고 있습니다. $strange_worlds.190.desc_non_psionic$"
 strange_worlds.190.desc_outro_non_psionic: "하지만 우리 과학자들은 이 박테리아를 세포 수준에서 유전적으로 개조하면, 영역 보호 본능을 생산적인 방향으로 전환할 수 있을 것이라 자신합니다."
 strange_worlds.190.a: "지하수를 정수하세요."
 strange_worlds.190.b: "박테리아 유전자 개조를 시도하세요."
 strange_worlds.195.name: "능력 발현"
 strange_worlds.195.desc_intro: "§Y[Root.GetName]§!에 정수장을 설치했으며, 결과는 대성공이었습니다.\n\n"
 strange_worlds.195.desc_psionic: "고도의 영역 보호 본능에 따른 공격성이 잦아들고, 우리의 사이오닉 능력에 대한 간섭이 사라졌을 뿐만 아니라 천연 활생균이 §Y[Root.GetName]§!의 각 주민에게 §Y사이오닉 전기 시냅스§!를 촉진하면서 사이오닉 능력이 오히려 강화되었습니다. 그 결과 주민 사이의 텔레파시 연결이 강해지고, 공동체에 대한 소속감이 높아지는 동시에 생산성이 향상되었습니다."
 strange_worlds.195.desc_non_psionic: "고도의 영역 보호 본능에 따른 공격이 잠잠해졌으며, 주민들에게는 꽤 도움이 될 수도 있는 부작용이 남았습니다. 천연 활생균이 §Y[Root.GetName]§!의 각 [Owner.GetColonistPlural]에게 §Y사이오닉 전기 시냅스§!를 촉진한 것입니다. 그 덕분에 [Owner.GetColonistPlural]들에게 텔레파시로 소통할 수 있는 능력이 생겨, 공동체에 대한 소속감이 높아지고 생산성이 향상되었습니다."
 strange_worlds.195.a: "잘됐군요."
 strange_worlds.195.a_ct: "§Y[Root.GetName]§!의 모든 팝에게 §Y사이오닉 전기 시냅스§!가 생깁니다."
 strange_worlds.195.a.evopred: "맛이... §M이상하군요§!."
 strange_worlds.195.a_ct.evopred: "우리 주 종족에게 §Y사이오닉 전기 시냅스§!가 생깁니다."
 strange_worlds.200.name: "박테리아 유전자 재배열"
 strange_worlds.200.desc: "§Y[Root.GetName]§!의 박테리아가 낳는 부정적 영향을 중화하는 데 성공했습니다. [Owner.GetColonistPlural]들 사이의 다툼이 잠잠해졌으며, 이미 생산성이 향상된 징후가 나타나고 있습니다.\n\n과학자들은 이 미생물의 유전 부호를 더욱 수정할 수 있을 것으로 자신합니다. 유전체를 올바르게 배열하면 [Owner.GetColonistPlural]들의 능력 중 한 부분을 추가로 강화할 수 있다는 것입니다.\n\n하지만 개조된 미생물은 행성 밖에서는 오래 살아남지 못합니다. 박테리아가 번식하려면 미토콘드리아와 행성 안의 외계종 사체 사이에 사이오닉 연결을 유지해야 하기 때문입니다. 이유는 아직 완전히 파악하지 못했습니다."
 strange_worlds.200.a: "생식 능력을 강화하세요."
 strange_worlds.200.b: "근력을 강화하세요."
 strange_worlds.200.c: "인지 능력을 강화하세요."
 strange_worlds.1000.name: "광물화된 용암 동굴"
 strange_worlds.1000.desc: "§Y[From.GetName]§!의 기후를 건조하게 만든 결과, 새로 드러난 해저면 전역에 그물처럼 뻗어 있는 용암 동굴이 드러났습니다.\n\n이 깊은 동굴망을 만든 마그마는 지금은 흐름을 멈추었으며, §Y[From.GetName]§!의 극단적인 고온 고압 환경에서 오래전에 형성된 풍부한 광맥을 남겼습니다.\n\n이 용암 동굴 광맥은 매우 밀도가 높습니다. 채굴 작업에 상당한 비용이 소요되겠지만 수익도 그만큼 높을 것입니다."
 strange_worlds.1005.name: "수활성 알"
 strange_worlds.1005.desc: "§Y[From.GetName]§!에서의 테라포밍 작업으로 인해, 토착 동물의 개체 수가 예기치 못하게 급증했습니다.\n\n확인 결과, 많은 토착종의 번식 주기가 주변에서 이용할 수 있는 물의 양에 밀접하게 연계되어 있는 것으로 드러났습니다. 부화에 필요한 물을 흡수하기 위해 몇 달간 땅속에 묻혀 기다리던 알들에서 새끼들이 깨어나 사방을 뒤덮게 된 것입니다. 행성의 동물 개체 수가 기하급수적으로 증가하고 있습니다.\n\n그렇게 태어난 동물들은 영양분이 풍부한 종이 많아 §Y[From.GetName]§!에 풍족한 식량 공급원이 되어 줄 뿐만 아니라, 극도로 활발한 이곳 생태계를 연구할 기회가 될 것입니다. 이제 이 행성에 온 방문객은 떠나기 전에 오염 물질 유출을 방지하기 위해 엄격한 검역 절차를 거쳐야 합니다."
 strange_worlds.1005.evopred: "이 번식 속도를 재현할 수 있을까요?"
 strange_worlds.1010.name: "빙결 보존"
 strange_worlds.1010.intro: "§Y[From.GetName]§!에서의 테라포밍 작업 중에 지표면의 얼음 안에 갇힌 토착 동물종을 발견했습니다. 개체 수가 놀랄 만큼 많은데, 더욱 놀라운 것은 이 동물들이 아직도 살아 있다는 점입니다.\n\n이 생물들은 극도로 깊은 동면에 빠져 있었던 것으로 보입니다. §Y[From.GetName]§!의 기나긴 빙하기에서 살아남기 위해서는 효과적인 방법이라 할 수 있는데, 테라포밍으로 기온이 높아지면서 동면 상태가 일찍 풀린 모양입니다.\n\n얼음 속의 잠에서 깨어난 동물들은 벌써 간단한 도구를 이용해 식량을 모으는 등 지성의 조짐을 보이고 있습니다.\n\n"
 strange_worlds.1010.desc_exterminate: "$strange_worlds.1010.intro$이 동물들은 지체 없이 처분하고, 남은 생체 물질은 우리 목적에 따라 활용할 예정입니다."
 strange_worlds.1010.desc_hunted: "$strange_worlds.1010.intro$독특한 생리를 지닌 이 동물들은 우리에게 풍부한 식량 공급원이 될 것입니다."
 strange_worlds.1010.desc_tolerated: "$strange_worlds.1010.intro$이에 이 동물들의 놀라운 동면 능력을 연구해도 좋고, 아니면 생체 물질을 채취할 수도 있습니다."
 strange_worlds.1010.desc_protected: "$strange_worlds.1010.intro$이 생명체들을 지키는 게 좋을 듯합니다. 이들의 놀라운 동면 능력을 계속 연구해야 합니다."
 strange_worlds.1010.a.purge: "처분합시다."
 strange_worlds.1010.b.hunted: "사냥합시다."
 strange_worlds.1010.c.study: "연구합시다."
 strange_worlds.1010.d.purge: "처분합시다."
 strange_worlds.1010.e.protect: "보호합시다."
 strange_worlds.1015.name: "강철의 산"
 strange_worlds.1015.desc: "우리 테라포밍 전문가들이 §Y[From.GetName]§!에 곧 문제가 발생할 것이라고 지적했습니다.\n\n이 행성의 얼음 산맥 아래에는 고밀도의 철과 석탄 매장지가 광대하게 펼쳐져 있습니다. 그리고 이 광물은 테라포밍 작업으로 인해 초고온으로 가열된 상태입니다.\n\n광물 자체는 거의 융해된 상태이기 때문에 쉽게 제거할 수 있습니다. 하지만 제거하는 대신 가열을 계속한다면 영구적으로 합금을 얻을 수 있을 것입니다. 물론 이 경우 거주에 적합한 공간을 포기해야 합니다."
 strange_worlds.1015.a: "자원이 우선입니다."
 strange_worlds.1015.b: "아무 조치도 하지 마세요."
 strange_worlds.1020.name: "가연성 대기"
 strange_worlds.1020.desc: "§Y[From.GetName]§!에서의 테라포밍 작업이 예기치 않은 결과를 초래했습니다. 미처 알지 못했지만, 이 행성의 표토층은 고밀도의 §Y불안정 분말§!을 함유한 미세 입자로 되어 있었습니다. 그런데 테라포밍 작업으로 표토층에 간섭이 발생해, 행성의 대기에 불안정 분말이 확산된 것입니다.\n\n문제는 대기에 고에너지 입자가 퍼진 탓에 지표면에서 의도치 않은 연소 사건이 발생할 위험이 높아졌다는 것입니다. 앞으로 만들어질 식민지에서는 재앙을 피하기 위해 사고와 분쟁 방지를 우선적으로 신경 써야 합니다.\n\n그러나 이 위험을 주의 깊게 관리할 수 있다면 §Y[From.GetName]§!의 대기는 풍부한 희귀 자원의 보고가 될 것입니다."
 strange_worlds.1025.name: "푸른 용암"
 strange_worlds.1025.desc: "§Y[From.GetName]§!의 지각이 테라포밍 작업으로 인해 이동함에 따라 특이한 자연 현상이 나타났습니다.\n\n지각판의 이동으로 §Y외계 가스§! 매장지가 뒤틀렸고, 그로 인해 방출된 가스가 §Y합금§!이 풍부하게 함유된 화산 속 매장지와 반응해 선명한 파란색의 화산 분출을 만들어 낸 것입니다.\n\n이 불안정한 현상으로 인해 행성은 이전보다 거주하기 부적합해졌으며, [Root.GetColonistPlural]들이 살아갈 공간을 만들겠다는 우리의 계획도 지장을 받았습니다.\n\n다만 해당 화산 주변의 토양에 풍부한 자원이 생겨나, 이를 개발할 수 있게 되었다는 점은 고무적입니다."
 strange_worlds.1030.name: "멈추지 않는 번개"
 strange_worlds.1030.desc: "§Y[From.GetName]§!에서 새로운 기상 현상이 나타나고 있다는 보고가 들어왔습니다.\n\n행성의 기반암 안에 있던 크리스탈 매장지가 테라포밍 중에 밖으로 노출되어, 작업 중에 사용한 화학 물질과 반응해 방사능을 띠게 되었다는 것입니다. 그 결과 기온 변동이 심해져, 행성 전체에 멈추지 않는 전기 폭풍이 발생했습니다.\n\n이 독특한 기상 현상은 틀림없이 기반 시설 개발에 영향을 줄 것이며, 방사능 크리스탈 또한 장기적으로 봤을 때 행성의 거주 적합도에 영향을 미칠 것입니다. 그러나 우리 [Owner.GetScientistPlural]들은 테라포밍이 끝나면 폭풍의 에너지를 활용할 수 있을 것으로 자신하고 있습니다.\n\n한편 [Owner.GetEngineerPlural]들 또한 크리스탈 매장지의 전하를 안전하게 중화시킬 계획을 세웠습니다. 이 계획대로라면 폭풍을 없애고 크리스탈을 안전하게 채취해 다른 용도로 활용할 수 있을 것입니다."
 strange_worlds.1030.a: "폭풍의 에너지를 활용합시다."
 strange_worlds.1030.b: "크리스탈의 전하를 중화하세요."
 strange_worlds.1035.name: "동면종"
 strange_worlds.1035.desc: "§Y[event_target:hibernator_planet.GetName]§!의 준지성체를 연구한 결과, 이들의 놀라운 동면 행태를 더욱 자세히 파악할 수 있었습니다. 이들은 동면 주기를 조절하는 특정한 효소가 있어, 이를 통해 신체를 깊은 수면 정지 상태에 들어가거나 깨어나게 만듭니다. 그중에서도 수면 상태에서는 체내 화학 반응이 거의 미미할 정도로 줄어듭니다.\n\n우리는 이 효소를 추출해 (안정제 화합물로 진정시킨) 다른 다양한 생물에게 투여하는 데 성공했습니다. 모든 사례에서 기존에 동면 능력이 없던 생물종이 긴 휴면 상태에 들어갔으며, 휴면 중에는 세포 노화 속도가 유의미하게 감소했습니다.\n\n이 획기적인 발견은 유기체 생물이 장기/장거리 우주여행으로 겪는 신체적 부담을 줄여 주는 인공 냉동 수면 기술의 발전으로 이어질 것입니다."
 strange_worlds.1040.name: "하늘 매장"
 strange_worlds.1040.desc: "§Y[From.GetName]§!에서 테라포밍 작업을 마무리하던 중, 하늘에서 시체가 떨어지기 시작했습니다.\n\n워낙 높은 곳에서 떨어졌기 때문에, 이 고대의 사체들은 떨어지자마자 곤죽이 되었습니다. 떨어진 내장 사이에서는 장식물과 기이한 모습의 유물 등 작은 물체가 모여 있는 것을 발견했는데, 모두 대기권 상층의 짙은 구름에서 떨어진 것입니다.\n\n이 짙은 구름은 현재로서는 우리가 알지 못하는 외계 종족이 망자들의 마지막 안식처로 활용한 것으로 추정됩니다. 테라포밍으로 인해 구름이 옅어지면서 안에 떠 있던 내용물이 떨어진 것입니다. 이 사체와 유품은 대기권이 안정화됨에 따라 계속 떨어지고 있으며, 구름 묘소가 완전히 빌 때까지 계속될 전망입니다."
 strange_worlds.1040.a: "소름 끼치지만 돈은 되겠군요."
 strange_worlds.1040.b: "지저분하기 짝이 없군요. 즉시 전부 치우세요."
 strange_worlds.1050.name: "궤도 잔해"
 strange_worlds.1050.desc: "§Y[event_target:junk_moon_planet.GetName]§! 행성 궤도에서 떨어지는 우주 쓰레기와 소형 잔해로 인해 테라포밍 기술자들의 근무 환경이 위험해졌습니다. 이러한 물체가 워낙 많아 지표면과 우주를 오가는 왕복선들도 위험한 상태입니다.\n\n잔해의 높은 밀도에 착안해, 우리는 잔해 중에 가장 큰 것을 골라 자성화함으로써 공전 중에 다른 잔해를 끌어들이도록 하는 방안을 개발했습니다. 잔해들이 더 관리하기 쉬운 단일한 물체로 점차 뭉치게 만드는 것이 목적입니다. 이 방법을 통해 일종의 위성까지 만들 수 있을 것으로 보입니다.\n\n이렇게 하면 테라포밍 기간이 늘어나겠지만, 왕복선이 지표면을 더 쉽게 접근할 수 있게 될 뿐 아니라, 거대 궤도 잔해가 대기권에 주기적으로 진입할 위험을 없앨 수 있을 것입니다."
 strange_worlds.1050.a: "위성을 만들어 봅시다."
 strange_worlds.1050.b: "가만히 두면 타서 없어질 겁니다."
 strange_worlds.1060.name: "고철 위성"
 strange_worlds.1060.desc: "§Y[event_target:junk_moon_planet.GetName]§! 궤도상의 우주 쓰레기를 하나로 뭉치는 계획은 성공이었습니다.\n\n크기가 큰 쓰레기를 골라 자성화해, 모든 쓰레기를 점차 하나의 고철 덩어리로 뭉친 것입니다. 고철 덩어리는 밀도가 높아지면서 이제는 체감할 수 있을 정도의 자체적인 중력까지 생겼으며, 그렇게 만들어진 위성은 현재 안정적인 궤도에 안착해 있습니다.\n\n위험한 궤도 잔해가 없어져 §Y[event_target:junk_moon_planet.GetName]§! 표면에 접근하기가 훨씬 수월해졌으며, 잔해가 대기권에 들어오는 일을 걱정할 필요도 없습니다. 또한, 기술자들은 이 새로운 위성에 별도의 채굴 기지를 건설할 수 있을 것이라고 확신하고 있습니다."
 strange_worlds.1060.create_moon_ct: "[event_target:junk_moon_planet.GetName]에 새 위성 생성: 고철 위성"
 site_abandoned_bio_lab: "고대 시설"
 abandoned_bio_lab_desc: "§Y[fromfrom.planet.GetName]§!(을)를 스캔한 결과, 현지에서 접근하기 가장 어려운 지점에 홀로 떨어진 시설을 발견했습니다. 에너지 신호가 없고 장기간에 걸친 마모의 흔적이 있는 것으로 볼 때, 운영이 중단되었거나 버려진 것으로 보입니다. 고고학 탐사를 진행하면 더 자세한 사정을 알 수 있을지도 모릅니다."
 strange_worlds.2000.name: "버려진 생물 연구소"
 strange_worlds.2000.desc: "시설 내부에는 수많은 의료 기기가 버려져 있고, 치료실과 시체 안치실이 갖춰져 있습니다. 또한, 사체 보관용 포드에는 질병과 기형의 흔적이 보이는 유기체 유해가 부분적으로 보존되어 있습니다. §H[universal_macrophage_scientist.GetName]§!(은)는 보안 문, 감시 장비, 수용실이 있다는 점을 근거로 이곳에 강제로 구금된 자들이 있었을 것이라는 결론을 내렸습니다.\n\n일부 장비 부품을 회수했으나, 그 외 대부분은 현저하게 노후화된 상태였습니다. 컴퓨터 시스템에는 일부나마 데이터가 남아 있어 몇 가지 파일을 회수했으나, 번역이 필요한 상황입니다."
 strange_worlds.2005.name: "고대 면역 연구"
 strange_worlds.2005.desc: "§H[universal_macrophage_scientist.GetName]§!(이)가 §Y[fromfrom.planet.GetName]§!의 시설에서 발견한 데이터 파일 중 하나를 일부 번역했습니다.\n\n§L제17 연구실 - 진행 상황 보고 - 수석 연구원 겔레보르\n\n신규 시제품에서 일단 가능성을 확인했다. 피험체의 면역 체계가 수백만 배 강화되었으며 모든 병원체가 박멸되었다. 부작용은 여전하다. 치명적인 변이가 발생했으며, 생존자는 없다. 다시 시도할 것이다. 범용 대식 세포의 개발이 머지않았다. 틀림없다.§!"
 strange_worlds.2010.name: "겔레보르의 선택"
 strange_worlds.2010.desc: "§H[universal_macrophage_scientist.GetName]§!(이)가 §Y[fromfrom.planet.GetName]§!의 버려진 연구소에서 찾은 파일을 하나 더 번역했습니다.\n\n§L제17 연구실 - 내부 직원 메모 - 수석 연구원 겔레보르\n\n동료 연구원 여러분, 오늘 사업 중단 명령이 내려왔습니다. 우리 주인께서 인내심이 바닥난 모양이지요. 하지만 목표 달성이 머지않았습니다! 범용 대식 세포는 어느 한 개인의 변덕에 휘둘리기에는 너무나 중요한 과제입니다. 질병 없는 미래가 우리 것이 될 수 있단 말입니다! 그 정도의 진보를 이루는 데 그깟 목숨 몇 개가 대수입니까?\n\n그쪽에서 피험체를 더 이상 보내지 않겠다면, 저한테 스스로 시제품을 투여하겠습니다. 저와 함께하실 분 안 계십니까?§!"
 strange_worlds.2010.a: "조심해서 진행하세요."
 strange_worlds.2015.name: "범용 대식 세포"
 strange_worlds.2015.desc: "§H[universal_macrophage_scientist.GetName]§!(이)가 §Y[fromfrom.planet.GetName]§!의 연구소 컴퓨터에서 찾은 마지막 기록을 번역했습니다.\n\n§L제17 연구실 - 최종 보고서 - 연구 보조원 필리도르\n\n겔레보르의 자신감 넘치는 모습에 우리는 맹목적으로 따랐다.\n\n시제품을 우리에게 직접 투여하자 처음에는 면역 체계가 강화되었으며, 외부 병원체에 대해 거의 완벽한 저항력이 생겼다. 그리고 변이가 시작되었다.\n\n가장 먼저 사망한 것은 겔레보르였다. 차마 보기 힘들 정도였다. 지금은 모든 팀원이 안치실에 누워 있으며, 나도 곧 동료들을 따라갈 것이다.\n\n우리는 실패했다. 우리는 겔레보르가 만든 잘못된 약품에 우리의 목숨을 맡겼다. 범용 대식 세포는 너무 효과적이다. 너무 효과적이어서 주인마저 공격하는 것이다. 이곳에 있는 것은 전부 파기해야 한다.§!"
 strange_worlds.2015.a: "전부 부숴 버리세요."
 strange_worlds.2015.b: "겔레보르의 연구를 완성하세요. 가능성이 보입니다."
 strange_worlds.2015.b.mutation: "우리는 변이의 장인입니다. 작업을 마무리합시다."
 has_tr_mutation_finish_tt: "§Y$Mutation$§! 전통 트리를 완료했기 때문에 고를 수 있는 선택지입니다."
 strange_worlds.2015.c: "연구는 잘못되긴 했지만 어딘가 활용할 곳이 있을 겁니다."
 strange_worlds.2030.name: "치명적 변이"
 strange_worlds.2030.desc: "§Y[Root.GetName]§!의 시민들이 세포와 필수 장기의 기능을 방해하는 심각한 신체 변이를 겪고 있습니다. 그로 인해 신진대사의 효율성이 높아지는 경우도 있지만, 대부분의 경우 사망으로 이어집니다.\n\n이 부작용은 §Y범용 대식 세포§!의 연구 기록에 나타난 증상과 완벽하게 일치합니다. 그 많은 노력에도 불구하고 해당 약품으로 인한 치명적인 변이는 피할 수 없는 것 같습니다. 이 기술은 더 이상 믿을 수 없습니다. 남은 약품은 모두 파기하고, 사용을 중단할 예정입니다."
 strange_worlds.2030.ct: "§Y[Root.GetName]§!에서 100 £pop£ 팝이 사망하고, 현지에 있는 $@macrophage_kill_pop_every_x$ £pop£ 팝당 100 £pop£ 팝이 추가로 사망합니다.\n§Y[Root.GetName]§!의 모든 유기체 £pop£ 팝이 §Y겔레보르 변이§!가 발생해 생체 구조가 급격하게 변화합니다."
 site_anomalous_cube: "기이한 육면체"
 anomalous_cube_desc: "§Y[Planet.GetName]§!에서 거대한 금속 육면체를 발견했습니다. 흠 없이 매끈한 형태로 볼 때 매우 발달된 기술이 쓰인 것으로 판단되나, 그 기원이나 기능은 짐작조차 할 수 없습니다. 고고학 탐사를 진행하면 답을 얻을 수 있을지도 모릅니다."
 strange_worlds.2035.name: "물결치는 금속"
 strange_worlds.2035.desc_intro: "[fromfrom.planet.GetName]에서 발견한 수수께끼의 거대 육면체를 더욱 자세히 조사했지만, 답은커녕 질문만 더 생겼습니다. 육면체의 바깥 표면은 패인 곳 하나 없이 완벽히 매끈하고, 우리 스캐너 신호가 통과하지 못합니다. 육면체에 다가가자, 우리의 존재에 반응해 그 경이로운 표면이 부드럽게 물결치는 듯합니다."
 strange_worlds.2035.desc_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§!(은)는 이 육면체가 일종의 §Y생체 금속§!으로 이루어진 것으로 결론 내렸습니다."
 strange_worlds.2035.desc_no_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§!(은)는 이 육면체가 우리가 처음 보는 이상한 금속으로 이루어진 것으로 결론 내렸습니다."
 strange_worlds.2035.a: "계속 조사하세요."
 strange_worlds.2040.name: "육면체 안으로"
 strange_worlds.2040.desc: "§H[event_target:anomalous_cube_scientist.GetName]§!(이)가 [fromfrom.planet.GetName]의 금속 육면체를 조사하던 중, 한 면이 갑자기 물결치면서 열리더니 육면체의 내부로 들어가는 입구가 나타났습니다. 안에 들어가자 제어 콘솔이 있었고, 콘솔에는 부패한 연체류의 껍데기가 놓여 있었습니다. 과거에 그 안에 있던 육신은 이미 분해되어 흰 먼지가 되어 있었습니다.\n\n콘솔에는 특이한 용기가 있었는데, 안에 무언가가 움직이는 듯 가끔씩 쿵쿵대는 소리와 둔탁한 충격음이 들렸습니다. 그러나 용기의 잠금장치가 복잡한 탓에 §H[event_target:anomalous_cube_scientist.GetName]§!(은)는 아직 열 수 없었습니다."
 strange_worlds.2040.evopred: "먼지는 아직 회수할 수 있겠지요?"
 strange_worlds.2045.name: "음성 기록 발견"
 strange_worlds.2045.desc: "육면체의 중앙 콘솔에서 데이터를 추출하던 중, §H[event_target:anomalous_cube_scientist.GetName]§!(은)는 두 건의 짧은 음성 기록을 찾아 해독할 수 있었습니다. 기록을 들어보니 배 속에서 올라오는 듯한 혀 차는 소리와 거친 파열음이 연이어 들렸는데, 발화자는 한 명뿐인 것 같습니다. 이에 §H[event_target:anomalous_cube_scientist.GetName]§!(이)가 우리 언어 데이터베이스와 기록을 대조해 유사한 고대 언어를 찾아냈고, 이를 이용해 첫 번째 음성 기록을 알아들을 수 있는 수준으로 번역했습니다.\n\n§L\"각하, 제발 좀 들어 주십시오. 아직 전쟁을 피할 시간은 남아 있습니다. 각하의 자신감은 과신에 불과합니다. [event_target:anomalous_cube_fallen_empire.GetName]에는 이길 수 없습니다. 이러다 당하고 말 겁니다!\"\n\n\"화친을 청하는 것이 유일한 길입니다. 소신이 준비한 상자에 평화를 청하는 선물을 넣어 놓았습니다. 우리 생체 금속의 비밀 말입니다. 멸망을 피하려면 이것을 필히 전달해야 합니다.\"§!"
 strange_worlds.2045.a: "두 번째 음성 기록을 번역하세요."
 strange_worlds.2050.name: "경이로운 생체 금속"
 strange_worlds.2050.desc_intro: "육면체의 제어 콘솔에서 찾은 두 번째 음성 기록의 번역을 완료했습니다\n\n§L\"각하, 실패입니다. 이제 멸망은 불가피합니다.\n\n소신의 육면선이 파괴 공작에 당했습니다. [fromfrom.planet.GetName]에 비상 착륙을 시도할 예정입니다. 살아남더라도 평화의 징표는 전달하지 못할 겁니다. 우려한 대로 [event_target:anomalous_cube_fallen_empire.GetName] 측이 공격해 올 것입니다.\"§!\n\n§H[event_target:anomalous_cube_scientist.GetName]§!(이)가 상자의 잠금장치를 해독해 냈습니다. 그 안에는 특이한 금속 조각이 들어 있었는데, 아주 유연하고 반응도가 높아 몇 초마다 형태를 변화해 정교한 모양을 만들고 있습니다."
 strange_worlds.2050.desc_no_war_lm: "\n이 흥미로운 물질을 가져가면 생체 금속에 대한 우리의 이해 수준을 높일 수 있을 것입니다. 아니면 이 금속을 원래 주인이 원했던 방법대로 처리할 수도 있습니다. [event_target:anomalous_cube_fallen_empire.GetName]에 선물로 주어 호감을 사는 것입니다."
 strange_worlds.2050.desc_no_war_no_lm: "\n이 흥미로운 물질을 가져가면 이 놀라운 금속에 대한 우리의 이해 수준을 높일 수 있을 것입니다. 아니면 이 금속을 원래 주인이 원했던 방법대로 처리할 수도 있습니다. [event_target:anomalous_cube_fallen_empire.GetName]에 선물로 주어 호감을 사는 것입니다."
 strange_worlds.2050.desc_war_lm: "\n이 놀라운 물질과 그것을 싣고 온 육면체 우주선을 활용하면, 생체 금속에 대한 우리의 지식수준을 높일 수 있을 것입니다."
 strange_worlds.2050.desc_war_no_lm: "\n이 놀라운 물질과 그것을 싣고 온 육면체 우주선을 활용하면, 금속 화합물과 구조에 대한 우리의 지식수준을 높일 수 있을 것입니다."
 strange_worlds.2050.a_no_war: "[event_target:anomalous_cube_fallen_empire.GetName]에 전해 줍시다."
 strange_worlds.2050.b_fallen_not_defeated_no_war: "우리가 가집시다."
 strange_worlds.3005.name: "수상한 예언자"
 strange_worlds.3005.desc: "§Y[event_target:pre_ftl_planet.GetName]§!의 현지 주민을 관찰하던 우리 원정대가 흥미로운 사실을 발견했습니다.\n\n보고에 따르면 수도 전체가 별세계에서 내려온 '선택받은 자'의 이야기로 들떠 있으며, 이 선택받은 자는 고대의 예언을 실현하고 [event_target:pre_ftl_planet.Owner.GetSpeciesName] 전체를 새로운 황금시대로 이끌 것이라고 합니다.\n\n우리 원정대 대원의 소행은 아닌 것 같으니, 이 행성을 방문했다는 자에 대한 추가 조사가 필요할 듯합니다."
 strange_worlds.3005.a: "더 자세히 알아보세요."
 strange_worlds.3010.name: "거짓 예언자"
 strange_worlds.3010.desc_intro: "우리 원정대가 §Y[event_target:pre_ftl_planet.GetName]§!에 나타난 '선택받은 자'에 대한 조사를 통해 그 정체를 밝혀냈습니다.\n\n"
 strange_worlds.3010.desc_no_megacorp: "어떤 §Y나마리안 유랑민§!이 '별세계에서 내려온' [event_target:pre_ftl_planet.Owner.GetSpeciesName] 신화의 주인공을 사칭하고 있다고 합니다."
 strange_worlds.3010.desc_megacorp: "어떤 §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§! 상인이 '별세계에서 내려온' [event_target:pre_ftl_planet.Owner.GetSpeciesName] 신화의 주인공을 사칭하고 있다고 합니다."
 strange_worlds.3010.desc_outro: "\n추가 조사를 진행한 결과, 추락한 함선이 수도에서 약간 떨어진 인적 없는 계곡에 조종이 불가능한 상태로 숨겨진 것을 발견했습니다. 초공간 드라이브의 모델 일자로 볼 때, 이곳에 추락한 지 꽤 시간이 지난 것 같습니다.\n\n조난자는 이 행성에 발이 묶인 뒤로 현지인들의 미신을 이용해 온 듯합니다. 이들은 '천상의 지식'을 갖춘 지도자로 추대받은 후, 현지인들의 존경과 찬양을 흡족하게 받아들이고 있습니다.\n\n조치를 취하지 않는다면 이 사기꾼이 한창 발전 중인 현지 사회에 매우 중대한 영향을 줄 수도 있습니다. 개입하는 것이 좋을 것 같습니다."
 strange_worlds.3010.a: "사기꾼임을 폭로합시다."
 strange_worlds.3010.b: "그 행성에서 구출해 주겠다고 하세요."
 strange_worlds.3015.name: "드러난 진실"
 strange_worlds.3015.desc_no_megacorp: "§Y[event_target:pre_ftl_planet.GetName]§!에서 [event_target:pre_ftl_planet.Owner.GetSpeciesName] 신화의 '선택받은 자'를 사칭하고 있던 §Y나마리안 유랑민§!을 지도자 자리에서 내쫓는 데 성공했습니다."
 strange_worlds.3015.desc_megacorp: "§Y[event_target:pre_ftl_planet.GetName]§!에서 [event_target:pre_ftl_planet.Owner.GetSpeciesName] 신화의 '선택받은 자'를 사칭하고 있던 §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§!(을)를 지도자 자리에서 내쫓는 데 성공했습니다."
 strange_worlds.3015.desc_outro: "\n현지의 전설을 더 자세히 연구한 끝에, 현지 통치 계급을 설득해 소위 '선택받은 자'가 사실은 주민들을 속여 행성을 천 년 동안 어둠에 잠기게 할 악마라고 믿게 했습니다.\n\n추락한 함선은 해체해 부품을 회수했고, 현지 주민들이 찾을 수 있을 만한 흔적은 전부 없앴습니다. 그러나 일부 개인 물품이 이미 발견되어, 이 행성의 종족이 현재 지식수준을 넘는 기술을 엿볼 수 있게 되었습니다."
 strange_worlds.3015.a: "아이고, 이런."
 strange_worlds.3020.name: "집으로"
 strange_worlds.3020.desc_intro: "원정대는 §Y[event_target:pre_ftl_planet.GetName]§!의 '선택받은 자'와 단독으로 만날 기회를 얻을 수 있었고, 그자에게 함선을 고쳐 우주로 돌아갈 수 있도록 도와주겠다고 제안했습니다.\n\n"
 strange_worlds.3020.desc_no_megacorp: "§Y나마리안 유랑민§!은 기다렸다는 듯 원정대의 제안을 받아들였습니다. 그리고 자신이 §Y[event_target:pre_ftl_planet.GetName]§!에 추락한 후 오해로 인해 신으로 모셔졌으며, 정체가 탄로 나면 해를 입을까 줄곧 두려워하며 지냈다고 털어놓았습니다."
 strange_worlds.3020.desc_megacorp: "§Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§!(은)는 기다렸다는 듯 원정대의 제안을 받아들였습니다. 그리고 자신이 §Y[event_target:pre_ftl_planet.GetName]§!에 추락한 후 오해로 인해 신으로 모셔졌으며, 정체가 탄로 나면 해를 입을까 줄곧 두려워하며 지냈다고 털어놓았습니다."
 strange_worlds.3020.desc_outro: "\n우리 연구 기지로 함선을 운반해 수리하자, 이 여행자는 고마워하며 자기 함선에 보관된 물건 중 상당 부분을 선물로 주고 작별을 고했습니다.\n\n그 후 '선택받은 자'가 행성을 떠나며 생긴 권력 공백으로 인해 §Y[event_target:pre_ftl_planet.GetName]§!의 여러 종교 분파 사이에 짧고 격렬한 내전이 벌어졌지만, 지금은 잠잠해진 상태입니다."
 strange_worlds.3020.a: "아주 흥미롭군요."
 strange_worlds.3025.name: "[event_target:nomad01_country.GetName]"
 strange_worlds.3025.desc: "[Owner.GetSpeciesName] 여러분, 안녕하십니까. 우리 함대에서 이탈한 나마리안 하나를 처분하신 것으로 알고 있습니다.\n\n저희에게 큰 도움을 주셨습니다. 이 그릇된 자는 예전부터 줄곧 분란을 일으켰으며, 야심만 앞서 우리 여정에 위험이 되었습니다.\n\n부디 이 선물을 받아 주시기 바랍니다."
 strange_worlds.3025.a: "대단히 감사드립니다."
 strange_worlds.3030.name: "[event_target:caravaneer_home_country.GetName]"
 strange_worlds.3030.desc: "실종된 그 §Y라켓§!을 처리한 게 당신네 [Owner.GetSpeciesNamePlural]들이었다며? 잘했수다! 그 멍청한 자식, 예전부터 골칫거리였거든. 듣기 민망할 정도로 헛소리만 하고 말이야. 실종된 게 이번이 벌써 다섯 번째야. 솔직히 이제 볼일 없어서 다행이다 싶다니까?\n자, 받아요. 문제 없애 줘서 고맙다고 주는 거요. 이번 한 번만 주는 거야. 이득 보시는 거라고."
 strange_worlds.3030.a: "대단히 감사드립니다."
 strange_worlds.3040.name: "우리가 남겨 둔 것"
 strange_worlds.3040.desc: "§Y[event_target:pre_ftl_planet.GetName]§! 상공에 있는 우리 관측소에서 보고가 들어왔습니다. 최근 지표면에서 지질 탐사를 실시한 후에 물자 상자가 사라졌다는 것입니다.\n\n상자에 넣어 놓은 위치 추적기를 따라가던 중, 현지 마을 한 곳에서 물자를 발견하고 가져간 것을 알아냈습니다.\n\n우리 저장 용기의 노출로 [event_target:pre_ftl_planet.Owner.GetSpeciesAdj] 사회의 발전이 부정적인 영향을 받을 가능성이 있습니다."
 strange_worlds.3040.a: "아이고, 이런."
 strange_worlds.3045.name: "발신자에게 반송"
 strange_worlds.3045.desc_common: "§Y[event_target:pre_ftl_planet.GetName]§!에서 분실한 물자가 현지 문화에 특이한 영향을 준 것 같습니다.\n\n[Root.GetPreFTLUpper] 주민들이 우리 관측 왕복선을 서툴게 모방한 것입니다. 물론 이 '함선'은 겉모습만 흉내 낸 것에 불과하지만, 우리 연구원들이 탐사 중에 현지 주민들에게 발견되었다는 증거입니다.\n\n관측 결과, [event_target:pre_ftl_planet.Owner.GetSpeciesName] 주민들이 장로의 지도에 따라 우리의 지질 토양 분석 작업을 흉내 내는 의식을 치르고 있다고 합니다. 우리가 분실한 상자에 흙과 돌을 채우고 '함선'에 적재한 다음, 끈기 있게 기다리는 것입니다."
 strange_worlds.3045.desc_non_homicidal: "\n[event_target:pre_ftl_planet.Owner.GetSpeciesName] 주민들은 이렇게 우리의 작업을 흉내 내면 물자가 더 생길 줄 알고 있는 것 같습니다. 이 행동이 현지 사회 전반에 영향을 주기 전에 개입해야 합니다."
 strange_worlds.3045.desc_homicidal: "\n이러한 의식은 의미가 없습니다. 결국 이들을 기다리는 건 죽음뿐이니까요."
 strange_worlds.3045.a_normal: "은밀하게 상자를 회수하세요."
 strange_worlds.3045.a_megacorp: "신중하게 상자를 회수하세요."
 strange_worlds.3045.b_normal: "그 광물을 회수하고 식량을 주는 건 어떨까요?"
 strange_worlds.3045.b_megacorp: "그렇다면 물물 교환을 하죠!"
 strange_worlds.3045.c: "이 원시 종족을 없애 버리세요."
 strange_worlds.3045.ct: "이제 §Y[event_target:pre_ftl_planet.GetName]§!에서 관측 활동 중인 관측소가 $@observation_outpost_crate_food_upkeep$ $i_food$의 유지비로 $@observation_outpost_crate_minerals_production$ $i_minerals$을 생산합니다."
 strange_worlds.3050.name: "원한을 부르는 침묵"
 strange_worlds.3050.desc: "§Y[event_target:pre_ftl_planet.GetName]§!에서 분실한 상자를 회수한 후에도 '함선'에 화물을 적재하는 의식은 얼마간 계속되었습니다. 그러나 이내 [event_target:pre_ftl_planet.Owner.GetSpeciesName] 주민들은 화를 내면서 마을 장로에게 대들더니, 장로를 가짜 왕복선에 던져넣고 불을 질렀습니다.\n\n이후 주민들은 과거의 일상으로 돌아갔지만, 이들의 문화에는 소위 '하늘에서 온 자들'에 대한 원한이 남아 있습니다."
 strange_worlds.3050.a: "잘 알았습니다."
 strange_worlds.3060.name: "서비스 취소"
 strange_worlds.3060.desc: "[Root.GetPreFTLLower] [event_target:pre_ftl_planet.Owner.GetSpeciesName] 사회가 발전함에 따라, 우리는 관측소를 통해 진행하던 식량과 광물의 교환을 중단했습니다.\n\n흥미로운 실험이었지만, 현지 문명에 계속 개입할 경우 우리의 존재가 원주민들에게 너무 일찍 발각될 위험만 낳을 것입니다."
 strange_worlds.3060.a: "합리적인 조치군요."
 strange_worlds.3060.ct: "관측소가 더 이상 광물을 생산하지 않고, 식량 유지비가 필요 없어집니다."
 strange_worlds.3070.name: "궤도 이상 현상"
 strange_worlds.3070.desc: "§Y[event_target:pre_ftl_planet.GetName]§! 상공의 우리 관측소가 중력 이상 현상으로 인해 궤도를 이탈해, 잠시 행성의 대기권 하층까지 떨어졌습니다.\n\n다친 인원 없이 원래 궤도로 돌아갔지만, 관측소를 지표면의 [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural]들이 발견했을지도 모른다는 우려가 제기됩니다.\n\n우리가 실제로 현지에 노출되었는지, 노출되었을 경우 현지 사회에 얼마나 영향을 줄지는 두고 봐야 할 듯합니다."
 strange_worlds.3070.a: "계속 관측하세요."
 strange_worlds.3075.name: "천국으로 가는 사다리"
 strange_worlds.3075.desc_common: "§Y[event_target:pre_ftl_planet.GetName]§!의 원시적 영상 촬영 장비가 저궤도를 지나던 우리 관측소의 모습을 포착했습니다. 이러한 사진과 목격자 증언에 고무된 일부 국가에서 조사를 계속하기 위해 이른바 '천국으로 가는 사다리'를 짓기 시작했습니다.\n\n아무 소용 없는 노력이지만, 국가 간의 경쟁으로 인해 불안이 심화되고 있습니다. 최초로 '사다리'를 완성하기 위해 각국이 각축을 벌이면서, 해묵은 긴장 관계가 국가적 자존심과 자원 부족 때문에 다시 악화되고 있는 것입니다."
 strange_worlds.3075.desc_non_homicidal: "\n우리 존재에 대한 증거의 신빙성을 떨어뜨릴 수만 있다면, 상황이 손쓸 수 없을 정도로 악화되기 전에 긴장을 해소할 수 있을지도 모릅니다.\n\n반대로 현 상황이 폭력 사태로 번질 위험을 감수하고, [Root.GetPreFTLUpper] 국가의 여러 정치 세력 사이에서 오가는 외교적 가식에 대한 사회학적 사례 연구를 진행할 수도 있습니다."
 strange_worlds.3075.desc_homicidal: "\n이번 일로 생길 혼란은 훌륭한 연구 주제가 될 수 있습니다."
 strange_worlds.3075.a: "증거의 신빙성을 떨어뜨리세요."
 strange_worlds.3075.b: "계속 관측하세요."
 strange_worlds.3075.b_ct: "관측소의 £society£ §Y사회학§! 연구 생산량이 두 배로 증가합니다."
 strange_worlds.3080.name: "진실은 저 너머에"
 strange_worlds.3080.desc: "우리 요원들이 §Y[event_target:pre_ftl_planet.GetName]§!에 우리가 존재한다는 증거의 신빙성을 떨어뜨리는 데 성공했습니다.\n\n사진이 조작으로 판명되고 증인의 신빙성을 무너뜨리자, '천국으로 가는 사다리'의 건설이 중단되었습니다. 한때 서로 반목했던 여러 나라는 자신들이 어리석었다고 부끄러워하며 합리적인 탐구와 과학적 연구 방식을 추구하겠다는 의지를 피력했습니다.\n\n사다리 건설 현장은 고등 교육 기관으로 개조되었고, 새로운 일군의 학자가 모여 '하늘 성채'를 신화에 불과한 것으로 일축했습니다."
 strange_worlds.3080.a: "$FASCINATING$"
 strange_worlds.3080.a_ct: "[event_target:pre_ftl_country.GetName]의 다음 단계로의 진행도가 50% 증가합니다\n[event_target:pre_ftl_country.GetName](이)가 물질주의로 변합니다"
 strange_worlds.3085.name: "사다리 대전"
 strange_worlds.3085.desc: "§Y[event_target:pre_ftl_planet.GetName]§!에서 '천국으로 가는 사다리'를 건설하려던 [Root.GetPreFTLLower] 국가들 사이의 긴장 관계가 전면적인 세계 전쟁으로 치달았습니다. 계속 줄어드는 자원을 두고 2년간 살육전을 벌인 끝에, 이 '사다리 대전'은 마침내 끝을 맺었습니다.\n\n전후에 체결된 평화 조약의 핵심 내용은 공동의 적인 '하늘 성채'에 맞서 공동 전선을 형성하는 것입니다. [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural]들이 전쟁으로 무너진 세계를 재건하는 지금, 미지의 존재에 대한 높은 피해 의식과 증오로 인해 앞으로 이들과의 상호 작용은 더욱 까다로워질 것입니다."
 strange_worlds.3085.a: "그건 나중 문제겠죠."
 strange_worlds.3085.a_ct: "관측소의 £society£ §Y사회학§! 연구 생산량이 다시 통상 수준으로 돌아갑니다."
 create_hibernators_pops_ct: "§Y$trait_seasonal_dormancy$§! 특성을 지닌 $@hibernators_pops_created|*0$ £job_pre_sapient£ 준지성체 팝 생성"
 pm_bleeding_planet: "피 흘리는 행성"
 pm_bleeding_planet_desc: "이곳은 땅 자체가 피를 흘립니다. 개척지 일대의 땅을 건드릴 때는 반드시 주의해야 합니다.\n"
 pm_contruction_coagulate: "건설용 응고제"
 pm_contruction_coagulate_desc: "이곳에 개척지가 들어서자 땅에서 피가 나고 있습니다. 이 끈적한 점액은 위험하지만, 천연 접착제로 작용하기도 합니다.\n"
 pm_hemosymbiosis: "피의 공생"
 pm_hemosymbiosis_desc: "이 행성에서 나오는 이상한 점액 때문에 개발 사업이 지장을 받고 있습니다. 이 물질은 식민지 개발을 늦추는 대신 건설 시간과 채굴 작업에 도움을 줍니다.\n"
 pm_parasitic_production: "기생 생산"
 pm_parasitic_production_desc: "이 행성의 기생 생물을 개조해, 모든 노동자의 생산성을 높이도록 조치했습니다.\n"
 pm_frying_fauna: "감전된 동물"
 pm_frying_fauna_desc: "이 행성의 거대 동물은 최적화된 조건이 있어야 잘 살아갈 수 있습니다. 녀석들의 독특한 소화 효소는 합금 제련에 유용합니다."
 pm_frying_fauna_machine: "$pm_frying_fauna$"
 pm_frying_fauna_machine_desc: "$pm_frying_fauna_desc$"
 pm_frying_fauna_2: "$pm_frying_fauna$"
 pm_frying_fauna_2_desc: "전기 수확기로 이 행성의 거대 동물을 안정적인 영양 공급원으로 만듭니다."
 pm_frying_fauna_2_machine: "$pm_frying_fauna$"
 pm_frying_fauna_2_machine_desc: "$pm_frying_fauna_2_desc$"
 pm_catalytic_excrement: "촉매 분변"
 pm_catalytic_excrement_ct: "이 행성의 거대 동물은 최적화된 조건이 있어야 잘 살아갈 수 있습니다. 녀석들의 독특한 소화 효소는 합금 제련에 유용합니다."
 pm_strange_sandstorm: "기이한 모래 폭풍"
 pm_strange_sandstorm_ct: "이 행성의 모래에서 일어나는 특이 현상이 식민지 운영에 영향을 주고 있습니다."
 pm_perpetual_lightning: "멈추지 않는 번개"
 pm_perpetual_lightning_desc: "테라포밍에 따른 이상 현상으로 노출된 방사능 크리스탈로 인해, 행성 전체에 멈추지 않는 번개 폭풍이 발생하기 위한 최적의 기상 환경이 조성되었습니다."
 pm_dark_matter_geyser: "암흑 물질 간헐천"
 pm_dark_matter_geyser_desc: "이 행성은 암흑 물질 안개에 잠겨 있습니다."
 pm_population_quarantine: "주민 격리"
 pm_population_quarantine_desc: "주민들을 격리해 암흑 물질 석화에 따른 영향을 조사하고 있습니다."
 pm_dark_matter_statue: "암흑 물질 조각상"
 pm_dark_matter_statue_desc: "굳어진 암흑 물질이 만들어 낸 석화 껍데기가 행성 곳곳에서 확인되었습니다. 과거 주민들이 남긴 이 흔적은 소름 끼치지만 일정한 연구 기회를 제공해 주기도 합니다."
 pm_raining_corpses: "시체의 비"
 pm_raining_corpses_desc: "한때 어떤 외계 종족의 묘소로 쓰였던 짙은 구름이 옅어지면서, 구름 묘소의 내용물이 행성 표면으로 떨어지고 있습니다."
 pm_raining_corpses_tt: "$WORKERS$ £job£ 직업으로 인한 £minor_artifacts£ $minor_artifacts$"
 pm_raining_corpses_no_ancrel: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_desc: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_tt: "£pop_cat_worker£ $pop_cat_worker$ £job£ 직업으로 인한 £consumer_goods£ $consumer_goods$"
 pm_revolting_pests: "역겨운 짐승"
 pm_revolting_pests_desc: "이 행성에 서식하는 동물은 아주 신기하지만 구토를 유발합니다. 가까이 접근하지 않는 것을 권장합니다."
 pm_gaseous_fauna: "가스 배출 동물"
 pm_gaseous_fauna_desc: "토착 동물이었다가 가축화된 이 생물은 보호 구역에 전시되어 볼거리를 제공해 주며, 행성 주민들이 채취해 쓸 수 있는 가스를 배출하기도 합니다."
 pm_gaseous_fauna_ct: "모든 £pop£ 팝이 §G$@gaseous_fauna_exotic_gases_production$§! $i_exotic_gases$ 생산"
 pm_urban_privilege_regular: "도시의 특권"
 pm_urban_privilege_regular_desc: "지역 분쟁에서 도시 지구의 편을 들자, 농업 지구 주민들이 민감하게 반응하고 있습니다."
 pm_urban_privilege_broken_shackles: "$pm_urban_privilege_regular$"
