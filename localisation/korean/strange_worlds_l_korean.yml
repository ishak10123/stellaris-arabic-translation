 pm_peacekeeper_deployment: "평화 유지 인력 투입"
 pm_peacekeeper_deployment_desc: "지구 간 분쟁을 해결하는 동안 치안 활동을 추가로 실시합니다."
 bacterial_drive_modifier_desc: "유전자 개조 박테리아 보충제를 상수도에 섞어, 주민들이 단일한 공통 목표를 추구하도록 감화시킵니다."
 pm_bd_reproduction: "박테리아 충동: 생식"
