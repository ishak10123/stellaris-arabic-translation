 pm_bd_creativity: "박테리아 충동: 창의성"
 pm_bd_creativity_desc: "$bacterial_drive_modifier_desc$"
 ladder_wars_pre_ftl: "사다리 대전의 유산"
 ladder_wars_pre_ftl_desc: "전란으로 파괴된 행성을 재건 중인 이 종족은 전쟁으로 인해 피해 의식이 심해져, 다른 이들과 교류할 경우 이에 엮인 당사자 모두가 어려움을 겪습니다."
 living_metal_mega_construction_insight: "생체 금속 거대 구조물 통찰"
 living_metal_mega_construction_insight_desc: "생체 금속 유물을 발견한 덕분에 거대 구조물 개발에 관한 놀라운 통찰을 얻을 수 있었습니다."
 living_metal_mega_construction_insight_ct: "생체 금속 거대 구조물 시행령 기본 비용: §G-50%§!"
 d_coagulated_landscape: "응고된 풍경"
 d_coagulated_landscape_desc: "끈끈한 점액이 행성 표면에서 새어 나와 응고해, 거의 관통이 불가능한 위험 물질로 변합니다. 그 바람에 안전하게 건물을 지을 공간이 거의 남아 있지 않습니다."
 d_shimmering_structure: "일렁이는 구조물"
 d_shimmering_structure_desc: "기원을 알 수 없는 거대 구조물이 일렁입니다."
 d_geothermal_hotspot: "지열점"
 d_geothermal_hotspot_desc: "이 행성에는 에너지와 연구 기회를 모두 제공해 주는 놀라운 지열 지대가 있습니다."
 d_ancient_cloaking_array: "고대 은폐 배열체"
 d_ancient_cloaking_array_desc: "이 식민지는 고대 종족이 남긴 은폐 배열체의 도움을 받고 있어, 적이 공격하기 매우 까다롭습니다. 이곳이라면 개척민들이 안심하고 살 수 있습니다."
 d_psionic_sands: "사이오닉 모래"
 d_psionic_sands_desc: "이 행성의 모래에는 전반적으로 즈로가 다량 함유되어 있으며, 이 모래와 소통도 가능합니다."
 d_mountains_of_steel: "강철의 산"
 d_mountains_of_steel_desc: "테라포밍으로 인한 극고온의 열로 형성된 이 거대하고 험준한 산맥은 풍부한 자원 매장지이기도 합니다."
 d_lava_tubes: "용암 동굴"
 d_lava_tubes_desc: "마그마의 흐름이 만들어 낸 깊고 광물이 풍부한 동굴망입니다. 채굴 작업을 진행하면 그 부산물로 짭짤한 수익을 올릴 수 있습니다."
 d_lava_tubes_ct: "$t$[miner.GetIcon] [miner.GetName] 직업 £energy£ 유지비: §R+$@lava_tubes_mining_job_upkeep$§!"
 d_lava_tubes_ct_short: "[miner.GetIcon] [miner.GetName] 직업 £energy£ 유지비 §R+$@lava_tubes_mining_job_upkeep$§!"
 d_hydroactive_eggs: "수활성 알"
 d_hydroactive_eggs_desc: "이곳은 자연환경에서 물을 쉽게 얻을 수 있어, 토착 동물의 번식 속도가 놀라울 정도로 빠릅니다."
 d_explosive_atmosphere: "폭발성 대기"
 d_explosive_atmosphere_desc: "이 행성의 대기는 불안정 분말의 농도가 짙은 탓에 가연성이 아주 높습니다."
 d_explosive_atmosphere_ct: "$t$[mote_harvester.GetIcon] $mote_harvester$ 직업으로 인한 £volatile_motes£ §Y$volatile_motes$§!: §G+50%§!"
 d_explosive_atmosphere_ct_short: "[mote_harvester.GetIcon] $mote_harvester$ 직업으로 인한 £volatile_motes£ §Y$volatile_motes$§! §G+50%§!"
 d_blue_lava: "푸른 용암"
 d_blue_lava_desc: "테라포밍 작업으로 인해 이 행성의 깊은 곳에 매장된 풍부한 가스와 합금이 반응을 일으켜, 행성 표면에 매혹적인 푸른색 용암이 흐릅니다."
 d_crystaline_growths: "크리스탈 지대"
 d_crystaline_growths_desc: "이 행성에는 채취해 활용할 수 있는 크리스탈이 다량 형성되어 있습니다."
 d_bogplants: "늪지 식물"
 d_bogplants_desc: "이곳의 강산성 늪지에는 먹이를 섭취하고 외계 가스를 배출하는 독특한 식물종이 서식하고 있습니다."
 d_liquid_dark_matter: "액체 암흑 물질"
 d_liquid_dark_matter_desc: "특이한 간헐천이 붕괴해 암흑 물질 웅덩이가 생겼습니다."
 d_space_junk_hazards: "우주 고철 위험"
 d_space_junk_hazards_desc: "궤도를 공전하는 우주 쓰레기가 행성 대기권에 떨어져, 왕복선과 지표면의 건물에 위험이 되고 있습니다."
 trait_inner_darkness: "내면의 어둠"
 trait_inner_darkness_desc: "이 종족의 몸은 암흑 물질에 노출된 후 강화되었습니다. 그 덕분에 비바리온 입자를 주기적으로 소량 배출하지만, 기대 수명은 훨씬 짧아졌습니다."
 trait_inner_darkness_tt: "£pop£ $produced_per_pop_group_unit$(£sr_dark_matter£): §G+$@inner_darkness_dark_matter_production$§!"
 trait_geleboric_mutations: "겔레보르 변이"
 trait_geleboric_mutations_desc: "이 종족의 생체 구조는 어떤 실험에서 발생한 불의의 반응으로 인해 급격히 변화했습니다."
 trait_psionic_ephapse: "사이오닉 전기 시냅스"
 trait_psionic_ephapse_desc: "정신을 변화시키는 박테리아에 장기간 노출된 끝에, 이 종족의 소화계는 주민 간의 텔레파시 소통을 촉진하는 사이오닉 활생균을 생산하게 되었습니다."
 trait_psionic_ephapse_modifier_tooltip: "해당 종족이 §Y$trait_psionic$§! 또는 §Y$trait_latent_psionic$§!일 경우:\n$bureaucrat_jobs_bonus_workforce_mult$: §G+5%§!\n$researcher_jobs_bonus_workforce_mult$: §G+5%§!"
