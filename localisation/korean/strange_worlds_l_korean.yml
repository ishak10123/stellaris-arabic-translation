 tech_enhanced_cryosleep_sedatives: "냉동 수면 안정제 강화"
 tech_enhanced_cryosleep_sedatives_desc: "희귀한 효소에 기반한 안정제로 냉동 수면 효과를 강화해, 유기체 종족의 장거리 우주여행에 대한 내성을 비약적으로 높입니다."
 tech_universal_marcophage: "범용 대식 세포"
 tech_universal_marcophage_desc: "질병 자체를 과거의 유물로 만들어 버리는 강력한 면역 강화제로, 이 세포를 취한 유기체 주민은 더 충실하고 건강한 삶을 누릴 수 있습니다. 단, 심각한 부작용이 나타날 수 있습니다."
