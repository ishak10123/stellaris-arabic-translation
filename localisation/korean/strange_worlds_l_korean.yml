 pm_rural_privilege_regular: "농촌의 특권"
 pm_rural_privilege_regular_desc: "지역 분쟁에서 농업 지구의 편을 들자, 도시 지구 주민들이 민감하게 반응하고 있습니다."
 pm_rural_privilege_broken_shackles: "$pm_rural_privilege_regular$"
