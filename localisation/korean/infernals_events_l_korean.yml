l_korean:
 ####################################
 # Anomaly Events
 ####################################
 # useful refs:
 # [From.GetName] planet
 # [From.GetStarName]
 # [Leader.GetName] scientist
 spires_of_light_category: "빛의 첨탑"
 spires_of_light_category_desc: "1차 스캔 결과, 평범한 지형 위로 우뚝 솟은 일련의 빛나는 구조물이 포착되었습니다. 그 기원과 목적은 불분명하지만, 은은한 광휘는 자연 현상 이상의 무엇임을 시사합니다."
 infernals.500.name: "$spires_of_light_category$"
 infernals.500.desc: "빛나는 첨탑을 조사하기 위해 파견된 탐사정에 따르면, 이 구조물들은 가단성 있는 규산염 마그마로 형성되었다고 합니다. 이 물질은 기반암 분출공을 통해 위로 밀려 올라와, 지표를 뚫기 전에 굳었습니다. 이렇게 형성된 구조물은 무게로 인해 붕괴하기 전까지 수백 미터 높이까지 자랄 수 있었습니다.\n\n그 결과, 거의 순수하고 투명한 화산 유리로 이루어진 첨탑의 숲이 만들어졌으며, 각 첨탑은 아래에서 들끓는 용암의 따뜻한 주황빛을 굴절시키고 있습니다.\n\n과학자 [Leader.GetName](은)는 이 붕괴된 첨탑의 잔해가 귀중한 자원이 될 수 있다고 평가합니다."
 #EXCELLENT:0 (first option has default answer)
 infernals.500.a: "이 신성한 장소를 평화롭게 내버려 둡시다."
 infernals.500.b: "추출 허가에 입찰하세요."
 infernals.500.c: "첨탑으로 표적 연습이나 하죠."
 lava_whirlpool_category: "용암 소용돌이"
 lava_whirlpool_category_desc: "[Planet.GetName]의 첫 조사 도중 행성의 주요 용암 바다에서 기이한 폭풍 같은 형태가 포착되었습니다. 이 현상은 매우 이례적이므로 조사가 필요합니다."
 infernals.56.name: "용암 소용돌이"
 infernals.56.desc: "[Leader.GetName](이)가 확인한 그 기이한 형태의 정체는 용암의 소용돌이였습니다. 이러한 현상은 극히 드물며, 이 정도 규모로는 기록된 바가 없습니다. 놀란 [Leader.GetName](은)는 표본 채취 임무를 지시했습니다.\n\n표본 분석 결과, 소용돌이는 고여 있는 생체 금속 웅덩이에 의해 부분적으로 유지되고 있었습니다. 이 금속은 용암류에 의해 찢어졌다가 스스로를 재구성하려 하는데, 이 과정이 용암을 더욱 교란시켜 소용돌이의 움직임을 이어 나가는 것입니다. 또한, 표본 채취를 통해 이 생체 금속을 손쉽게 채취할 수 있음이 확인되었습니다."
 infernals.56.a: "채취 작업을 시작합시다."
 outgassing_category: "가스 방출"
 outgassing_category_desc: "[Planet.GetName]의 정기 스캔에서 대기 중 비정상적으로 강한 화학적 변동이 관측되었습니다. 정밀 조사를 통해 이 현상의 원인을 밝힐 수 있을 것입니다."
 infernals.1001.name: "가스 방출"
 infernals.1001.desc: "대기 중 화학적 변동은 지속적으로, 행성 표면 전반에서 관찰되었습니다. 변동은 광활하게 노출된 마그마 바다 위에 강하게 나타났으며, 이에 표본을 수집하기 위해 탐사정이 파견되었습니다.\n\n정밀 분석 결과, [Leader.GetName](은)는 [Planet.GetName]의 마그마 바다가 귀중한 외계 가스를 방출하고 있음을 밝혀냈습니다. 이 예상치 못한 발견은 해당 행성이 잠재적으로 우리 산업 자원이 될 수 있음을 시사합니다."
 infernals.1001.a: "추출 절차를 시작합시다."
 crystal_lava_lakes_category: "크리스탈 용암 호수"
 crystal_lava_lakes_category_desc: "이 행성의 표면에는 자유롭게 흐르는 용암으로 이루어진 커다란 웅덩이가 존재하는 것으로 보입니다. 자원 수확의 기회를 제공하므로, 조사할 가치가 있습니다."
 infernals.1002.name: "크리스탈 용암 호수"
 infernals.1002.desc: "[Planet.GetName] 표면을 촬영한 첫 이미지에서 '크리스탈 용암 호수'라 불리는 놀랍고 예상치 못한 지질 구조가 드러났습니다. 이 오래된 마그마 웅덩이에는 독특한 광물이 섞여 있어, 특정 온도 범위 내에서 자연적으로 결정 구조를 형성합니다. 그 결과 호수는 매우 투명하며 붉은 스펙트럼의 무지갯빛으로 빛나게 됩니다. 이 놀라운 시각적 효과는 행성의 공전에 따라 온도가 변하면서 계절 주기에 맞춰 나타났다가 사라집니다.\n\n이 크리스탈 용암 호수가 자아내는 아름다운 광경은 관광객을 끌어들이는 강력한 매력이 될 수 있습니다. 물론 크리스탈 광물 자체도 활성기 동안 표면으로부터 채취할 수 있을 것이며, 이후에는 그 특성을 활용해 에너지 저장 매체로 사용 가능합니다."
 infernals.1002.a: "부지를 휴양지로 개발합시다."
 infernals.1002.b: "호수에서 에너지를 수확합시다."
 crystal_lava_resort: "크리스탈 용암 휴양지"
 crystal_lava_resort_desc: "이 행성의 아름다운 호수는 은하계 전역에서 방문객을 끌어들이는 호화 관광지로 개발되었습니다."
 bioadaptive_flora_category: "생체 적응형 식물"
 bioadaptive_flora_category_desc: "[Planet.GetName](은)는 평범한 화산 황무지로 보이지만, 산소 함량이 이상할 정도로 높습니다. 무언가 특이한 존재가 산소를 생산하고 있는 것이 틀림없습니다."
 infernals.1003.name: "생체 적응형 식물"
 infernals.1003.desc: "[Planet.GetName]은 초기에 마그마와 화염에 뒤덮인 행성으로 분류되었지만, 조사 결과 행성 전역의 열곡망에 서식하는 복잡한 식물군으로 이루어진 토착 생태계가 드러났습니다. 이 식물들은 산소를 생산하고 극소량의 수분을 모아 과열된 황무지 속에서도 온화한 미기후에 가까운 지대를 형성합니다.\n\n이 식물군이 지탱하는 생물 군계는 화산 행성 정착을 꺼리는 다른 종들이 거주하기에 적합할 수 있으며, 식물군 자체 또한 농업에 활용될 수 있습니다. 정착을 계획한다면 그 협곡에 정확히 무엇이 서식하는지 철저히 탐사하는 것이 유익할 것입니다."
 infernals.1003.a: "지역을 정착 가능 구역으로 지정하세요."
 infernals.1003.tooltip_a: "거주 적합도 관용도 및 성장을 향상시키는 행성 보정치를 추가합니다."
 bioadaptive_flora_modifier: "생체 적응형 식물"
 bioadaptive_flora_modifier_desc: "회복력 강한 토착 식물군이 이 행성의 열곡을 덮고 있어, 화산 환경 속에서도 비교적 시원하고 호흡 가능한 미기후를 형성하며 제한적인 거주 가능성을 제공합니다."
 tectonic_icebreaker_category: "지각 쇄빙"
 tectonic_icebreaker_category_desc: "[Planet.GetName]의 표토에서 이상한 저온 이상 현상이 감지되었습니다. 이는 어떤 물체나 일련의 과정이 표면 일부를 냉각시키고 있을 수 있음을 시사합니다. 시추 탐사를 통해 더 많은 것을 밝혀낼 수 있을 것입니다."
 infernals.1004.name: "지각 쇄빙"
 infernals.1004.desc: "[Leader.GetName](이)가 §Y[from.GetName]§!의 화산 표면 아래에 거대한 빙하가 존재한다는 보고를 해 왔습니다. 이 빙하는 뛰어난 단열성을 지닌 광물로 이루어진 특이한 암석층에 둘러싸여 있다고 합니다. 지각 활동이 이 단열층을 서서히 약화시키고 있으며, [Leader.GetName](은)는 빙하와 행성 나머지 부분의 온도가 같아지면 화산 행성이 아닌 건조 행성으로 간주할 수 있을 만큼 냉각될 것으로 예측합니다.\n\n우리는 이 과정을 가속함으로써 행성의 거주 적합도를 높일 수 있습니다. 그러나 과학적으로도 흥미로운 현상인 만큼, 자연적으로 진행되도록 두어 연구하는 것도 가치가 있습니다."
 infernals.1004.a: "지각을 안정화하세요."
 infernals.1004.b: "용해를 가속합시다."
 infernal_oasis_category: "화염 속의 오아시스"
 infernal_oasis_category_desc: "§Y[from.GetName]§!(을)를 촬영한 결과, 타오르는 용암 행성에서 놀랍도록 밝은 대륙 규모의 녹색 지대가 포착되었습니다. 이 특별한 광경은 표면에 매우 이례적인 현상이 일어나고 있음을 시사합니다."
 infernals.505.name: "대격변 사이의 안식처"
 infernals.505.desc: "§Y[from.GetName]§!의 독특한 구성과 지각 구조는 비할 데 없는 경이로움을 만들어 냈습니다. 행성 대부분은 화산 스모그와 자유롭게 흐르는 용암으로 가득 찬 뜨거운 사막이지만, 단단한 암석으로 이루어진 하나의 거대한 대륙판이 평균 표면보다 수십 킬로미터 높게 솟아 있습니다. 이렇게 형성된 고원 지대는 유독한 구름층보다 훨씬 높은 곳에 있으며, 토착 동식물로 이루어진 푸르른 생태계를 품고 있습니다.\n\n이 고원은 다양한 종이 거주하기에 적합하며, 연구한다면 흥미로운 과학적 통찰을 얻을 수 있습니다."
 infernals.505.a: "정말 놀라운 발견이군요."
 NAME_Vermilion: "버밀리온"
 NAME_Kira: "키라"
 mysterious_ringing_category: "의문의 울림"
 mysterious_ringing_category_desc: "우리 과학자들이 [Planet.GetName]의 한 지점에서 규칙적인 전파 스파이크를 감지했습니다. 이 신호는 해당 지점이 밤에서 낮으로 넘어가는 시점과 일치하는 것으로 보입니다."
 infernals.3210.name: "의문의 울림"
 infernals.3210.desc: "과학 팀이 [from.GetName]에 도착해 신호를 추적한 결과, 과학 관측 장비를 갖춘 지하 동굴 시스템에서 나오고 있음을 확인했습니다.\n\n[Leader.GetName](이)가 팀을 이끌고 동굴로 들어갔고, 그곳에서 낯선 합금으로 봉인된 방과 안에서 흘러나오는 희미한 울림을 발견했습니다. [GetMysteriousRingingDesc3210]\n\n청력 보호 장비가 지급된 후, 팀은 안으로 들어가 신호의 근원 옆에서 동면 중인 미확인 종의 생물을 발견했습니다. 신호원은 기이한 원통형 장치였습니다.\n\n분석 결과, 이 장치는 규칙적인 전파를 방출한 후 몇 시간에 걸쳐 멜로디가 섞인 소음을 내보내며, 여기에 생물의 발성 구조와 일치하는 것으로 보이는 음성 신호가 겹쳐 있는 것이 밝혀졌습니다. [Leader.GetName](은)는 이 장치가 정해진 일정에 따라 생물을 깨우려고 시도하는 것일 수 있다고 추측합니다."
 infernals.3210.individual: "조사팀은 봉인의 취약점을 발견하고 돌파했으며, 그 순간 울림은 귀가 먹먹할 정도로 커져 팀원 사이에 공황과 분노 발작을 일으켰습니다."
 infernals.3210.gestalt: "조사팀은 봉인의 취약점을 발견하고 돌파했으며, 그 순간 울림은 귀가 먹먹할 정도로 커져 드론 사이에 감각 과부하와 인지 붕괴를 일으켰습니다."
 infernals.3210.a: "연구를 복사하고 떠납시다."
 infernals.3210.b: "생물을 깨워 고용해 봅시다."
 infernals.3210.btt: "지도자 획득: £scientist£ §Y$scientist$§! (시작 레벨 §G4§!)"
 infernals.3210.c: "장치를 훔치세요."
 infernals.3210.ctt: "노동자에게 자주 작업 복귀를 상기시키면 작업 효율이 오를 것입니다. £happiness£ ['concept_happiness'] §R-5%§!를 대가로 £job£ ['concept_jobs'] 생산량 §G+10%§!를 부여하는 결정을 잠금 해제합니다."
 decision_planetary_workshift: "행성 교대 근무령 시행"
 decision_planetary_workshift_desc: "$planetary_workshift_deployed_desc$"
 planetary_workshift_deployed: "행성 교대 근무령 시행"
 planetary_workshift_deployed_desc: "행성 전체가 단일한 시간대에 맞춰 작업하도록 조치하면, 주민들의 행복을 어느 정도 희생하더라도 팀 간의 소통과 효율성을 향상할 수 있습니다."
 ####################################
 # Origin Events
 ####################################
 # Red Giant Origin
 infernals.45.name: "우려스러운 동향"
 infernals.45.desc: "우리는 오랫동안 §Y[capital_star.GetName]§!(을)를 전형적인 적색 거성으로 여겨 왔습니다. 그러나 최근 분석에 따르면 그 크기와 방사선 방출량이 증가하고 있습니다. 이러한 변화는 이미 우리 기후에 눈에 띄는 영향을 미치고 있으며, 주민들의 불안감도 커지고 있습니다.\n\n이러한 동향은 멈출 기미가 보이지 않습니다. 우리 종족이 살아남으려면 이 현상의 원인을 조사해야 합니다."
 infernals.45.desc.gestalt: "우리는 오랫동안 §Y[capital_star.GetName]§!(을)를 전형적인 적색 거성으로 여겨 왔습니다. 그러나 최근 분석에 따르면 그 크기와 방사선 방출량이 증가하고 있습니다. 이러한 변화는 이미 우리 기후에 눈에 띄는 영향을 미치고 있습니다.\n\n이러한 동향은 멈출 기미가 보이지 않습니다. 우리 종족이 살아남으려면 이 현상의 원인을 조사해야 합니다."
 infernals.45.a: "진정하고 별문제 아니라고 발표하세요."
 infernals.45.b: "신속한 조사가 필요하겠군요."
 infernals.45.c: "지금은 달리 중요한 일이 많습니다."
 infernals.45.d: "홍보 팀에 맡기면 되겠군요."
 infernals.45.public.tt: "\n§H상황:§! $situation_red_giant_expansion$ \n- 상황 접근 방식을 §Y$approach_reassure_public$§!로 설정 \n- 월간 자원 획득량: §G10§! £unity£"
 infernals.45.cause.tt: "\n§H상황:§! $situation_red_giant_expansion$ \n- 상황 접근 방식을 §Y$approach_find_the_cause$§!로 설정"
 infernals.50.name: "신성"
 infernals.50.desc: "[GetRedGiantEndingExplode]"
 infernals.50.totalIgnorance: "적색 거성 재앙의 원인이 무엇이었는지는 더 이상 중요하지 않습니다. 이제 우리가 할 수 있는 일은 현재 상태를 받아들이고 남은 것을 바탕으로 재건하는 것뿐입니다."
 infernals.50.semiIgnorance: "항성 폭발로 인한 파괴는 원인을 추적하는 데 필요한 모든 증거를 지워 버렸습니다.\n\n이제 우리가 할 수 있는 것은 현재 상태를 받아들이고 남은 것을 바탕으로 재건하는 것뿐입니다."
 infernals.50.defaultEnding: "낡은 채굴 기지에 남아 있던 외계인 잔존 인구가 시작한 일련의 과정이 마침내 끝을 맞았습니다. §Y[Target.GetStarName]§!(이)가 성계 전체를 거의 집어삼킨 후 신성이 된 것입니다. 형형색색의 플라스마와 방사선이 우리 모성계의 나머지 부분과 함께 §Y[event_target:red_giant_homeworld_tmp.GetName]§!(을)를 깨끗이 쓸어 버렸습니다.\n\n[GetMegacorpDesc50]\n\n[GetLususMiningDesc]"
 infernals.50.megacorp: "우리 모성은 이제 성계 전역에 흩어져, 손쉽게 채굴할 수 있는 거대한 광물 자원의 구름이 되었습니다. 이 자원을 채굴하는 비용은 각 행성과 위성 내부에 남아 있었을 때보다 훨씬 저렴합니다. 이 값싼 자원 공급 덕분에 우리의 수익이 급증할 것으로 기대됩니다."
 infernals.50.nonmegacorp: "우리 모성은 이제 불모지가 되었지만, 신성 폭발로 인해 성계 전체에 걸쳐 기존 채굴 장비로 쉽게 접근할 수 있는 광물 자원의 구름이 나타났습니다. 이 부를 이용해 새로운 미래를 건설할 수 있습니다."
 infernals.50.lususExists: "기지는 마지막으로 한 차례 에너지를 내뿜더니 이내 꺼졌고, 모성의 잔해를 수습하는 것은 온전히 우리의 몫으로 남았습니다."
 infernals.50.lususGone: "기지가 더는 존재하지 않으므로, §Y[event_target:red_giant_homeworld_tmp.GetName]§!(은)는 이런 일이 다시는 일어나지 않을 것이라는 사실에 안도할 수 있습니다."
 infernals.50.a: "우리의 고향을 복원하기 위해 할 수 있는 모든 것을 해야 합니다."
 infernals.51.name: "신성 완화"
 infernals.51.desc: "대대적인 환경 정화 노력 끝에, §Y[this.GetName]§!의 표면은 다시 $trait_infernal_plural$가 생존할 수 있는 환경이 되었습니다. 자연에는 일부 영구적인 상처가 남았지만, 이는 독특한 연구 기회로서 최대한 활용할 수 있습니다."
 infernals.60.name: "정상화"
 infernals.60.desc: "사이펀을 조정하고, 외곽 층에서 수소를 추출하고, 항성의 투입 비율을 미세 조정하여, 우리는 §Y[Target.GetStarName]§!의 팽창을 안전하게 되돌려 안정된 적색 거성으로 복구했습니다.\n\n§Y[Target.GetStarName]§!에서는 이미 기후가 안정되는 징후가 감지되었으며, 제국의 심장부로 남은 우리 모성에서 더욱 살기 좋은 미래를 기대할 수 있습니다.\n\n[GetRedGiantEndingKalmStationStatus]"
 infernals.60.lususDestroyed: "우리 [Owner.Species.GetHandNamePlural]에 기지가 없는 한 무슨 일이 있었는지 정확히 알 수는 없겠지만, 항성이 수축하며 방출한 물질은 최대한 활용할 수 있습니다."
 infernals.60.lususAlive: "이제 이 기지를 제어하는 방법을 이해했으니, 앞으로 어떻게 사용할지 결정할 수 있습니다."
 infernals.60.a: "기지를 해체하세요."
 infernals.60.b: "기지에 대한 연구를 계속하세요."
 infernals.60.c: "우리의 승리를 기리는 기념비로 남깁시다."
 infernals.60.d: "이제 안심이군요."
 infernals.65.name: "성계 영역 확장"
 infernals.65.desc: "지속적인 관측 결과 §Y[Target.system_star.GetName]§!(이)가 가속하며 팽창하고 있음이 확인되었습니다. 방사선 증가로 인한 물리적 영향도 보고되고 있습니다. 막을 방법을 찾지 못한다면, §Y[Target.system_star.GetName]§!(은)는 행성을 삼키기보다 훨씬 앞서 우리를 절멸시킬 것입니다.\n\n[GetMegacorpDesc65]"
 infernals.65.nonmegacorp: "항성 방사선으로부터 모성을 보호하면 더 많은 시간을 확보할 수 있습니다. 더 위험하지만 잠재적으로 수익성이 높은 접근 방식으로는, 증가한 방사선을 활용해 에너지와 산업 부문을 촉진하는 방법이 있습니다."
 infernals.65.megacorp: "행성 보호에 대한 투자는 변동성에 대한 보험 역할을 하며, 자산 기반을 지키는 데 도움이 될 것입니다. 하지만 증가한 방사선을 활용하는 쪽으로 방향을 전환하면, 에너지와 산업 지표를 향상시킬 가능성도 있습니다."
 infernals.65.a: "모성을 보호합시다."
 infernals.65.b: "현상을 이용하세요."
 infernals.70.name: "굶주린 항성"
 infernals.70.desc: "§Y[Target.GetName]§!(이)가 우리 성계의 가장 안쪽 행성을 삼켜 첫 번째 주요 희생양을 만들었습니다. 원자재는 여전히 존재하지만, 이제는 항성의 불타는 심연 너머에 있어 손이 닿지 않습니다.\n\n당장의 경제적 손실은 감당할 수 있지만, 이는 §Y[Owner.Capital.GetName]§!(을)를 기다리는 섬뜩한 미래의 예고이기도 합니다."
 infernals.75.name: "부수적 피해"
 infernals.75.desc: "우리 적색 거성의 전례 없는 팽창에 또 다른 행성이 삼켜졌습니다. 그 풍부한 자원은 항성이 격렬한 신성 폭발로 외층을 벗어 내지 않는 한 영원히 접근할 수 없게 되었습니다."
 infernals.95.name: "항성 터널링"
 infernals.95.desc: "§Y[capital_star.GetName]§!에 대한 진실은 우리가 상상했던 것보다 더 기이합니다. 진행 중인 조사에서 항성 깊은 곳에 쌍을 이룬 아공간 터널이 발견되었습니다.\n\n이 중 하나는 수소가 풍부한 물질을 외부층으로 직접 공급하여 핵융합을 가속하고 헬륨 생산을 증가시킵니다. 이는 본래 핵 압축을 촉진해야 하지만, 두 번째 터널이 이 에너지를 흡수하여 그 과정을 상쇄합니다. 그 결과 항성은 팽창하게 됩니다.\n\n두 아공간 터널의 초기 원격 측정 결과, 이 터널들은 은하계 전역에 흩어져 있는 여러 종착점과 연결된 것으로 보입니다. 우리의 생존은 가능한 한 빨리 이 지점들을 조사하는 데 달려 있습니다."
 infernals.95.a: "이 지점 중 세 곳을 조사해야 합니다."
 infernals.95.a.tt: "아공간의 기원을 삼각 측량할 수 있는 유효한 목표 지점을 발견했습니다."
 infernals.105.name: "아공간 균열"
 infernals.105.desc: "§Y[FromFromFrom.GetName]§! 주변의 천체 측정 스캔에서 설명할 수 없는 아공간 균열을 발견했습니다. 현재 이 위치에는 출구 지점이 없지만, 과거에 이 가스 행성 주위 궤도에서 터널이 열렸을 가능성이 있습니다. 수집된 데이터는 다른 분야에도 적용할 수 있는 물리학적 통찰을 제공할 것입니다. \n\n연구가 진행되는 동안, 우리 항성 내부에서 작동하는 아공간 터널의 근원을 파악하기 위해 다른 곳을 방문해 봐야 할 것입니다."
 infernals.105.a: "계속 수색하세요."
 infernals.110.name: "외계 고철"
 infernals.110.desc: "§Y[FromFromFrom.GetName]§! 주변 스캔에서 아공간 균열이 확인되었습니다. 또한, 행성 근처에서 고대 고철 잔해도 발견되었으며, 이들은 궤도에 고정되어 있어 균열과 관련이 있을 가능성이 있습니다. \n\n이 아공간 변동을 지속적으로 스캔하면 모항성 주위의 태양광 배열을 최적화하는 데 도움이 될 것입니다.\n\n이는 유용한 데이터지만, 현재 문제의 원인을 파악하려면 적어도 한 곳의 조사가 더 필요합니다."
 infernals.110.a: "고철을 경매에 부치세요."
 infernals.115.name: "삼각 측량 완료"
 infernals.115.desc: "마침내, 진정한 돌파구를 찾았습니다.\n\n§Y[FromFromFrom.GetName]§! 주변의 더 많은 균열을 통해 우리는 항성을 어지럽히는 근원이 이전에는 탐지되지 않았던 적대적 신호가 포착된 성계임을 삼각 측량할 수 있었습니다.\n\n이 조사는 결국 우리 항성에 영향을 미치는 것이 무엇이든 대응하는 데 도움이 될 수 있습니다.\n\n§Y루수스§! 성계로 진입하면, §Y[FromFromFromFrom.Target.solar_system.GetName]§!(과)와 우리 문명의 운명을 바꿀 수 있을지도 모릅니다."
 infernals.115.a: "신중하게 접근하세요."
 infernals.115.b: "우리의 힘을 보여 줄 준비를 합시다."
 infernals.115.c: "접근하기 전에 행운을 빌도록 하죠."
 red_giant_lusus_triangulated_tt: "새로운 성계가 드러났습니다."
 infernals.2115.name: "탑승조"
 infernals.2115.desc: "우리 군이 기지를 장악했습니다. 주민들이 약간의 저항을 했지만, 무장이 빈약하고 전투 훈련을 받지 않은 것으로 보였습니다. 자세히 살펴보니 상당수가 미성체로 보였습니다. 사망하지 않은 자들은 구금되었습니다.\n\n일종의 에너지 채굴 사이펀으로 보이는 아공간 터널을 제어하는 방법에 대한 분석이 시작되었습니다. 시간이 지나면 우리 모성계의 상황을 해결할 수 있을 것입니다."
 infernals.2115.a: "기지를 철거하세요."
 infernals.2115.b: "생존자들을 심문하세요."
 infernals.2115.c: "노예로 만듭시다."
 infernals.2115.d: "생존자들은 위험 요소입니다. 제거합시다."
 infernals.2115.e: "생존자들과 대화합시다."
 infernals.2115.f: "기지를 정화하세요."
 infernals.2115.g: "먹어 치웁시다."
 infernals.400pops: "§G400§! £pop£ $POPS$이 [this.GetName]에 생성됩니다"
 infernals.300pops: "§G300§! £pop£ $POPS$이 [this.GetName]에 생성됩니다"
 infernals.2121.name: "외계인 제거 완료"
 infernals.2121.desc: "아공간 채굴 기지가 파괴되어 탑승자 전원이 사망했습니다.\n\n기지 파괴로 알 수 없는 에너지 저장 매체가 폭발했고, 그 에너지가 붕괴 중인 아공간 터널을 통해 §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!(으)로 흘러 들어가면서 모성의 상황을 크게 악화시켰습니다.\n\n다만, 항성으로의 수소 이전은 중단되었습니다. 상황이 심각하긴 하지만 더는 악화되지 않을 것입니다. 설령 이 기지의 기원이나 설계를 영원히 알 수 없더라도, 그 강력한 힘이 경쟁자들의 손에 넘어가지 않을 것이라는 사실만큼은 안도할 일입니다.\n\n안타깝게도, §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!(을)를 원래 상태로 즉각 되돌릴 방법은 없습니다. 항성의 상태에 영향을 미치려면, 기록에만 의지하여 기지에서 무엇을 하고 있었는지 알아내야 할 것입니다."
 infernals.2121.a: "이 난장판을 정리합시다."
 infernals.2122.name: "기지 파괴"
 infernals.2122.desc: "기지의 잔해가 우주를 떠다닙니다. 기지의 파괴는 단순한 스위치 조작이 아니라, 힘들고 값비싼 비용을 들여 §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!의 운명을 바꿀 새로운 기회를 제공합니다."
 infernals.2125.name: "외계인과의 협상"
 infernals.2125.desc: "길고 어려운 과정 끝에, 기지 주민들과 소통할 수 있는 기초적인 통역기를 확보했습니다.\n\n이 기지는 여러 세대에 걸쳐 운영되어 왔으며, 가스 행성 사이를 이동하며 아공간 사이펀을 사용해 먼 항성에서 에너지를 추출하여 생명 유지 장치와 강력한 점프 드라이브에 동력을 공급해 왔습니다.\n\n그러나 이 외계인들은 자신들이 운용하는 시스템을 완전히 이해하지 못했고, 사이펀이 항성을 대상으로 삼아 결국 항성을 파괴한다는 사실도 알지 못했습니다.\n\n혼란스러워하면서도, 이들은 정거장을 떠나 안전하게 거주하고 자손을 키울 장소를 제공받는 대가로 자신들이 알고 있는 지식을 가르쳐 주겠다고 약속했습니다."
 infernals.2125.a: "피난처를 제공하세요."
 infernals.2125.b: "스스로의 길을 개척하도록 함선을 줍시다."
 infernals.2125.c: "원격으로 공기를 빼내서 없애버리세요."
 infernals.2125.d: "스스로 우리에 대한 판단을 내리도록 내버려 둡시다."
 infernals.2130.name: "아공간 채굴 작업"
 infernals.2130.desc: "이 기지는 가스 행성에서 수소를 추출하여, 아공간을 통해 우리 항성의 외층으로 전달합니다. 그 결과 발생한 헬륨 융합이 과잉 에너지를 방출하며, 이는 기지에 동력을 공급하기 위한 §Y$entropy_crystals$§!로 변환됩니다.\n\n§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!의 불안정성은 보정 오류와 장비 노후화로 인한 결과로, 주민들은 이 문제를 알아차리지 못했거나 고치는 방법을 몰랐던 것으로 보입니다.\n\n고대 기술을 활용하면 이 과정을 되돌릴 수 있지만, 쉽지는 않을 것입니다. 대안으로, 항성이 강제로 신성 폭발하도록 유도하면 수많은 자원이 드러나 우리의 유산을 활용 가능한 자원의 보고로 바꿀 수도 있습니다."
 infernals.2130.a: "작업을 시작해 봅시다."
 infernals.2131.desc: "이 기지는 가스 행성에서 수소를 추출하여, 아공간을 통해 우리 항성의 외층으로 전달합니다. 그 결과 발생한 헬륨 융합이 과잉 에너지를 방출하며, 이는 기지에 동력을 공급하기 위한 §Y$entropy_crystals$§!로 변환됩니다.\n\n기지 주민들은 기지 운영에 대한 왜곡된 구전 지식만을 간직하고 있으며 고향 문명과의 연락은 수천 년 전 끊어졌는데, 아마도 그 문명이 붕괴했거나 파괴되었기 때문일 것입니다. 누적된 보정 오류와 장비 노후화로 인해 점점 더 불안정해진 사이펀이 이제 §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!(을)를 파괴할 위협이 되었습니다.\n\n고대 기술을 활용하면 이 과정을 되돌릴 수 있지만, 쉽지는 않을 것입니다. 대안으로, 항성이 강제로 신성 폭발하도록 유도하면 수많은 자원이 드러나 우리의 유산을 활용 가능한 자원의 보고로 바꿀 수도 있습니다."
 infernals.2135.name: "위협의 종식"
 infernals.2135.desc: "우리의 곤경을 알게 된 기지 주민들은 불안과 경악을 표했습니다. 이들은 우주에 자신들만이 존재한다고 믿었고, 은하계에 다른 종족이 있다는 사실을 몰랐습니다.\n\n주민들은 회한에 사로잡혀, 우리가 그 행동을 제대로 파악하기도 전에 기지를 해체하기 시작했고 대부분의 부품을 영구적으로 파괴했습니다.\n\n그 결과, 항성의 팽창을 제어하기가 어려워졌습니다. 이제 우리는 이 변덕스러운 외계인들을 어떻게 처리할지, 그리고 그들이 바라는 용서를 베풀 것인지 결정해야 합니다."
 infernals.2135.a: "외계인을 받아들이고 기지는 인양하세요."
 infernals.2135.b: "기지와 함께 모두 처분해 버리세요."
 infernals.2135.c: "외계인을 노예로 만들고, 기지는 파괴하세요."
 infernals.2140.name: "안정의 전망"
 infernals.2140.desc: "엄청난 노력 끝에, 이제 우리는 §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!의 운명을 완전히 통제하게 되었습니다. 그대로 두면 현재 크기에 맞는 자연적인 수명 주기를 따를 것입니다.\n\n하지만 고대의 낡은 기지는 반복적인 재조정을 견딜 수 없습니다. 각 조정은 시설에 극한의 부담을 줍니다. 이제 우리에게는 하나의 선택만 남아 있습니다.\n\n항성을 이전 크기로 다시 축소하거나, 강제로 확장해 해당 성계를 쉽게 수확할 수 있는 자원 지대로 바꾸는 것입니다.\n\n우리 [GetScientistPlural]들이 마지막 재조정을 시도할 것입니다. 그다음에는 외부의 힘에 의한 신속한 해체만이 유일한 방법이 될 것입니다."
 infernals.2140.a: "항성을 현재 상태로 고정하세요."
 infernals.2140.b: "항성의 팽창을 가속하세요."
 infernals.2140.bdesc: "불가피하게 §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!(이)가 팽창합니다."
 infernals.2140.c: "항성을 정상으로 되돌리세요."
 infernals.2140.cdesc: "불가피하게 §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!(이)가 수축합니다."
 infernals.2145.name: "안정 달성"
 infernals.2145.desc: "우리 항성의 변동하는 크기와 에너지를 완전히 통제하게 되면서, §Y[Target.GetStarName]§!(이)가 완전히 안정되었습니다. 이제 수백만 년 동안 현재 상태를 유지할 것이며, 우리 국민은 다시 한번 모성계에서 안정과 예측 가능성을 누릴 수 있습니다.\n\n우리 항성의 증가한 크기는 기반 시설 관리 방식에도 분명한 영향을 미칩니다. 우리는 이제 이러한 변화를 최대한 활용해 강화된 에너지 출력을 이용하며, 성계에서 안전하게 생존할 수 있는 기반을 유지할 수 있습니다."
 infernals.2145.a: "마침내 운명이 우리 손에 들어왔군요."
 infernals.2151.name: "수수께끼의 기지"
 infernals.2151.desc: "우리 함대가 성계에 진입하자, 자동화된 드론 무리의 저항에 부딪혔습니다. 그러나 이들은 신속하게 무력화되었고, 그 결과 외계 기지를 더 자세히 조사할 수 있게 되었습니다.\n\n이 구조물은 여전히 작동 중이지만, 선체에는 광범위한 임시 수리 흔적이 남아 있습니다. 정박소 하나에 접근을 시도하던 중, 알려지지 않은 외계 종족과 조우했습니다. 언어 장벽은 여전히 남아 있지만, 이 시설이 §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!에 영향을 미치는 터널의 근원지임을 확인했습니다.\n\n현재 소통을 가능하게 하기 위한 노력이 진행 중이며, 외교적 해결이 가능할 수도 있습니다. 그러나 실패할 경우, 기지를 장악하거나 완전히 파괴하는 등 더 직접적인 방법을 고려해야 할지도 모릅니다. 단, 그 목적을 완전히 이해하지 못한 채 이러한 행동을 취하는 것은 우리 항성에 상당한 위험을 초래할 수 있습니다."
 infernals.2151.a: "저들의 언어를 번역하세요."
 infernals.2151.b: "무력으로 기지를 장악하세요."
 infernals.2151.c: "기지를 파괴하세요."
 infernals.2160.name: "위기의 불꽃"
 infernals.2160.desc: "아공간 채굴 기지에 대한 지속적인 연구 결과, 이 기지가 방대한 양의 열에너지를 특이한 형태로 저장하고 있음이 밝혀졌습니다. [GetScientistPlural]들은 이를 §Y$entropy_crystals$§!이라고 부르며, 이는 열 피드백 루프를 활용하여 에너지 입력을 증폭시킵니다.\n\n이 기술을 복제함으로써, 우리는 이전에는 상상할 수 없었으며 많은 이들이 부자연스럽고 위험하다고 여길 막강한 힘을 다루는 법을 배울 수 있습니다. 이 과정에서 막대한 열이 과잉 발생할 수 있지만, 이러한 환경에서 번성할 방법을 찾기만 한다면 은하계가 우리의 것이 될지도 모릅니다."
 infernals.2160.a: "더 조사해 봅시다."
 infernals.2160.a.tt: "[GetRedgiantAlreadyHyperthermiaPickable]§Y$entropy_crystals$§!을 드러내 은하계 과열 진행도를 증가시킵니다."
 infernals.2160.a.ttunlock: "$ap_galactic_hyperthermia$ 승격 특전을 채택할 수 있게 됩니다.\n"
 infernals.2160.b: "사용하기에는 너무 위험한 기술입니다."
 infernals.2160.c: "§Y$entropy_crystals$§!을 이렇게 원시적으로 사용하다니."
 situation_red_giant_expansion: "적색 거성 팽창"
 situation_red_giant_expansion_type: "$situation_red_giant_expansion$"
 situation_red_giant_expansion_desc: "우리 항성 방출량의 급격한 변화는 모성의 안정을 위협합니다. 이 상태가 계속되면 §Y[Owner.Capital.GetStarName]§!(은)는 결국 신성이 되어 성계를 완전히 분해할 것입니다."
 situation_red_giant_expansion_monthly_change_tooltip: "팽창의 진행도는 그 원인을 찾아 해결하는 우리의 능력에 달려 있습니다."
 situation_red_giant_expansion_fail_tooltip: "§Y[Target.solar_system.GetName]§!(이)가 초신성 폭발을 일으킵니다."
 situation_red_giant_expansion_finish_tooltip: "§Y[Target.solar_system.GetName]§!(이)가 정상으로 돌아옵니다."
 situation_red_giant_expansion_stage_1: "우리 항성은 비교적 평온하지만, 방사선 방출량이 비정상적으로 높습니다."
 situation_red_giant_expansion_stage_2: "우리 항성은 과거 진화 시기보다 커졌으며, 이는 모성에 명백한 영향을 미치고 있습니다."
 situation_red_giant_expansion_stage_3: "우리 항성은 위험할 정도로 거대하며, 극심한 활동성으로 인해 모성의 안정이 위협받고 있습니다."
 situation_red_giant_expansion_stage_4: "우리의 적색 거성은 성계의 대부분을 불태우고 있어, 생존이 극도로 어렵습니다."
 situation_red_giant_expansion_stage_5: "우리 항성은 폭발 직전에 있으며, 이는 모성계의 모든 것에 치명적인 피해를 줄 것입니다."
