 # RG Timeline events
 TIMELINE_EVENT_ORIGIN_RG_START: "$origin_red_giant$\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_START_TOOLTIP: "§H항성 터널링§!\n§Y기원 이벤트§!\n\n일련의 아공간 교란 현상이 포착되었습니다. 우리 항성을 위협하는 불안정성의 원인을 찾는 조사가 시작되었습니다."
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA: "거성의 죽음\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA_TOOLTIP: "§H초신성 목격§!\n§Y기원 이벤트§!\n\n우리 항성은 팽창하여 성계 전체를 집어삼켰고, 행성들은 녹아내린 폐허로 변했으며 자원은 공허 속으로 흩어졌습니다. 이제 우리는 별들 사이에서 새로운 미래를 개척하는 것 외에는 선택지가 없습니다."
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE: "누그러진 거성\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE_TOOLTIP: "§H모성 구원§!\n§Y기원 이벤트§!\n\n항성 크기 안정화에 성공하여 대재앙적 붕괴를 막았습니다. 항성의 높아진 방사선 출력에 적응해야 하겠지만, 이 도전을 통해 우리는 전보다 더욱 강해질 것입니다."
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL: "평화로운 거성\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL_TOOLTIP: "§H모성 구원§!\n§Y기원 이벤트§!\n\n우리는 모성의 파괴적인 변화를 되돌려, 우리에게 익숙한 평화로운 상태로 복원했습니다. 우리는 가장 종말적인 위협조차 극복할 수 있음을 증명했으며, 이제 우주가 던지는 어떤 시련에도 맞설 준비가 되어 있습니다."
 # COSMIC DAWN
 # All strings below are in order of their appearance ingame
 infernals.2500.name: "심연 속의 신호" # intro
 infernals.2500.desc: "정밀 스캔 결과, §Y[root.capital_scope.GetName]§! 지표면 아래에 묻힌 정교한 시설이 확인되었습니다. 이 시설은 행성 핵에 가까워질수록 규모와 복잡성이 증가하며, 그 물질 및 에너지 신호는 우리가 처음 깨어난 동면실과 일치합니다.\n\n이 시설은 분명 우리의 이전 문명이 남긴 잔재일 것입니다. 이곳에 접근할 수 있다면 우리의 과거에 무슨 일이 일어났는지에 대한 중요한 질문의 답을 찾을 수 있을지도 모릅니다."
 infernals.2500.a: "여정의 시작이군요."
 INF_ORIGIN_COSMIC_DAWN_DRILLING: "지각 시추" # from 2500
 INF_ORIGIN_COSMIC_DAWN_DRILLING_DESC: "우리가 누구인지 이해하려면, 먼저 어디서 왔는지 알아야 합니다. §Y[owner.Capital.GetName]§! 지표면 아래에 묻힌 시설들을 발굴할 필요가 있습니다."
 infernals.2505.name: "동족의 각성"
 infernals.2505.desc.a: "살아있는 §Y[root.GetSpeciesNamePlural]§!들이 담긴 동면 포드를 추가로 발견했습니다. 현재 이들을 깨우는 중이지만, 우리와 마찬가지로 과거에 대한 뚜렷한 기억이 없는 것 같습니다."
 infernals.2505.desc.b: "살아있는 §Y[root.GetSpeciesNamePlural]§!들이 담긴 동면 포드를 추가로 발견했습니다. 이들을 통합했지만, 유용한 기억을 지니고 있지는 않습니다."
 infernals.2505.a: "전면 발굴을 승인하세요."
 infernals.2505.b: "필요한 부분만 제거하세요."
 infernals.2505.c: "하청업체를 고용해 발굴을 진행하세요."
 situation_cosmic_dawn: "심층 발굴"
 situation_cosmic_dawn_type: "$situation_cosmic_dawn$"
 situation_cosmic_dawn_monthly_change_tooltip: "심층 발굴의 현재 진행 상황입니다."
 situation_cosmic_dawn_desc: "발굴 결과, 지하 시설에서 첨단 기술과 기록 데이터, 그리고 더 많은 동족이 담긴 동면 포드를 발견했습니다. 우리의 역사가 바로 이곳에 묻혀 있습니다. 이 모든 것을 발굴할 수 있다면 마침내 우리가 누구인지 이해할 수 있을 것입니다."
 situation_cosmic_dawn_finish_tt: "우리 자신에 대해 더 많이 알기 위해서는, 아득한 과거를 재발견해야 합니다."
 situation_cd_mod_mining: "$approach_cd_mining$"
 situation_cd_mod_drilling: "$approach_cd_drilling$"
 situation_cd_mod_financial: "$approach_cd_financial$"
 situation_cd_mod_storm: "$TRIGGER_FAIL$ §Y$INF_ORIGIN_COSMIC_DAWN_STORM$§! 특별 프로젝트가 완료되지 않음"
 situation_cd_mod_bribe: "$TRIGGER_FAIL$ §Y$INF_ORIGIN_COSMIC_DAWN_BRIBE$§! 특별 프로젝트가 완료되지 않음"
 sit_cd_stage1_tt: "행성의 지각을 뚫기 시작했습니다."
 sit_cd_stage2_tt: "여기서는 더 이상 지표면이 보이지 않습니다."
 sit_cd_stage3_tt: "지각의 절반을 뚫자 온도가 상승하고 있습니다."
 sit_cd_stage4_tt: "지각 깊숙이 들어오니 핵이 요동치는 소리가 들립니다."
 sit_cd_stage5_tt: "더 나아간다면 핵에 삼켜질 것입니다."
 approach_cd_mining: "노천 채굴"
 approach_cd_mining_tt: "모든 인원이 채굴에 참여합니다. 내려간 김에 광물 자원도 수집하는 편이 좋을 것입니다. \n월간 진행도: §Y+$@approach_cd_mining$§!\n\n"
 approach_cd_drilling: "정밀 시추"
 approach_cd_drilling_tt: "가장 뛰어나고 정밀한 시추 장비를 배치합니다. 반드시 필요한 부분만 파내야 합니다. \n월간 진행도: §Y+$@approach_cd_drilling$§!\n\n"
 approach_cd_financial: "재정적 인센티브"
 approach_cd_financial_tt: "채굴 하청 권한을 이 경로로 전환하고, 수익 일부를 우리 몫으로 확보합니다. \n월간 진행도: §Y+$@approach_cd_financial$§!\n\n"
 # Stage 2
 infernals.2510.name: "기억상실과 데이터"
 infernals.2510.intro: "더 많은 동면 포드를 발견하면서, 동족들이 거의 모든 기억을 잃은 것이 드러났습니다."
 infernals.2510.desc.a: "$infernals.2510.intro$\n\n새롭게 깨어난 동족 중 일부는 우리가 지금 고민하는 바로 그 질문을 던졌습니다. \"당신은 누구입니까?\"\n\n수 세기에 걸친 역사와 발전을 거듭하는 사회를 지녔음에도, 우리가 이들보다 답에 더 가까워졌다고는 말할 수 없습니다.\n\n$infernals.2510.outro$"
 infernals.2510.desc.b: "$infernals.2510.intro$\n\n깨어난 우리의 동족들은 다른 이들과 마찬가지로 기원에 대한 기억을 지니고 있지 않습니다. 답이 없는 상황에서, 우리는 역사 속에서 우리만의 길을 개척할 수밖에 없습니다.\n\n$infernals.2510.outro$"
 infernals.2510.outro: "동면자들과는 달리, 시설 데이터베이스에는 놀라운 새로운 정보가 담겨 있었습니다. 분석을 여러 번 반복하여 확인했지만, 결과는 부정할 수 없었습니다. 데이터에 따르면 우리가 처음 동면에 들어간 이후로 120억 년이 넘는 시간이 흘렀다고 합니다.\n\n이는 우리의 기원이 우주의 시작, 즉 가장 초기의 항성과 행성이 형성되던 시기와 가깝다는 사실을 의미합니다. 우리는 어쩌면 최초로 진화한 지성체 중 하나일지도 모릅니다."
 infernals.2510.a: "그동안 놓친 것들을 따라잡아야 합니다."
 infernals.2510.b: "이 우주는 마땅히 우리의 것입니다."
 # Stage 3
 infernals.2515.name: "생명 유지 장치 고장"
 infernals.2515.desc: "비극적인 사건을 발굴해 냈습니다. 이 온전히 보존된 동면 포드 시설 기록에 따르면, §Y[event_target:homeworld.GetName]§!(은)는 수십억 년 동안 우주를 표류하다가 현재의 항성에 포획되었고, 이 과정에서 거대한 조수가 발생했습니다.\n\n그 힘이 지금 우리가 고향이라 부르는 화산 낙원을 만들었지만, 최초의 충격파로 인해 시설의 동력 전지가 치명적인 손상을 입었습니다. 자동화 시스템은 고위급 개체를 우선시하여 하위 계급 포드와 구조물 유지 기능을 정지시켰습니다. \n\n[GetScientistPlural]들의 예측에 따르면 전력이 누출되는 상황에서 구조를 시작하면 터널이 무너질 가능성이 있어, 단 한 명만 구할 수 있다고 합니다. \n\n만약 계급에 따라 우선순위가 정해지지 않았다면, 더 많은 이를 구할 수 있었을지도 모릅니다."
 infernals.2515.a: "과학적 진보가 무엇보다 중요합니다."
 infernals.2515.a.tt: "지도자 획득: £scientist£ §Y$scientist$§!"
 infernals.2515.b: "전문가들을 우선시한 것은 좋은 선택이었습니다."
 infernals.2515.b.tt: "지도자 획득: £official£ §Y$official$§!"
 infernals.2515.c: "구조를 진행하지 말고 전지를 제거하세요."
 infernals.2515.c.tt: "개인은 대체할 수 있지만, 제국이 성장할 공간은 포기할 수 없습니다."
 infernals.2520.name: "성간 피난처"
 infernals.2520.desc: "§Y[event_target:leader.GetName]§!(이)가 동면 기록을 복원하고 있습니다. 최근 발견에 따르면, 과거의 우리처럼 동면 상태로 보존된 수많은 소규모 [root.GetSpeciesNamePlural] 개체군이 은하계 전역에 흩어져 있을 수 있다고 합니다.\n\n기록 보관소에는 이 행성들의 위치가 남아 있지만, 그 이후로 수많은 항성이 태어나고 사라졌기 때문에 지금 찾아내려면 복잡한 보간법이 필요합니다. 실증 사례로 [event_target:leader.GetName](이)가 한 행성을 식별했지만, 전체 데이터 세트 해석은 이제 시작일 뿐입니다.\n\n한편, 불안한 의문이 떠오릅니다. [root.Capital.GetStarName](은)는 우리의 진정한 모성이 아니라 수많은 피난처 중 하나에 불과할지도 모릅니다. 그렇다면 우리의 기원은 어디일까요? 그리고 그것은 여전히 중요한 문제일까요?"
 infernals.2520.a: "우리 동족을 찾아야 합니다."
 infernals.2520.b: "이제 이 행성이 우리의 고향입니다."
 cosmic_dawn_anomalies_event_chain_title: "성간 피난처"
 cosmic_dawn_anomalies_event_chain_desc: "과거의 우리처럼 동면 상태로 보존된 수많은 소규모 [root.GetSpeciesNamePlural] 개체군이 은하계 전역에 흩어져 있을 수도 있습니다.\n\n기록 보관소에는 이 행성들의 위치가 남아 있지만, 그 이후로 수많은 항성이 태어났고 사라졌기 때문에 지금 찾아내려면 복잡한 보간법이 필요합니다."
 # Anomaly 2
 cosmic_dawn_sleepers_category: "고립된 동면자들"
 cosmic_dawn_sleepers_category_desc: "이 좌표의 행성에는 동면자들과 그 기술이 숨겨져 있는 것으로 추정됩니다. 철저히 조사해야 합니다."
 infernals.2525.name: "$cosmic_dawn_sleepers_category$"
 infernals.2525.desc: "§Y[root.leader.GetName]§!(이)가 더 많은 동족이 잠들어 있는 지하 시설을 발견하고, 이들을 성공적으로 깨웠습니다. 우리와 달리 이들은 이전 삶에 대한 희미한 기억을 간직하고 있으며, 언젠가 자신들을 구하러 돌아올 위대한 우주 제국의 이야기로 버텨 왔습니다.\n\n조심스럽지만, 이들은 우리를 동족으로 인식하고 있습니다. 우리는 이들이 오랫동안 기다려온 구원자이자 오래된 영광의 계승자를 자처할 수 있습니다. 혹은 진실을 밝혀, 우리가 새로운 길을 만들어 가고 있으며, 가르쳐 주고 싶은 만큼 배움을 원하는 마음도 크다는 것을 보여 줄 수도 있습니다.\n\n이 보관소의 추가 자료들을 통해 동면 포드가 있는 두 번째 후보지를 좁힐 수 있었습니다."
 infernals.2525.a: "우리가 저들의 고대 구원자입니다."
 infernals.2525.b: "우리는 새로운 길을 만들어 가고 있습니다."
 infernals.2525.c: "동화시키세요."
 # Anomaly 3
 cosmic_dawn_sleepers2_category: "경계하는 동면자들"
 cosmic_dawn_sleepers2_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2530.name: "$cosmic_dawn_sleepers2_category$"
 infernals.2530.desc: "§Y[root.leader.GetName]§!(이)가 동면 중인 더 많은 동족을 발견하고 깨우는 데 성공했지만, 그들은 두려움에 떨며 떠나라고 요구했습니다. 또한 우리를 동족으로 인식하지도 않았고, 우리의 존재를 환영하지도 않았습니다.\n\n긴박한 협상 끝에, 이들은 은하를 탐험하고 싶다는 소망을 표현했습니다. 우리는 적당한 비용으로 간단한 함선을 제공할 수 있습니다. 아니면 노동력의 필요가 끊이지 않는 만큼, 이들을 인근 식민지로 이주시키는 것도 가능합니다. 그렇게 하면 우리의 뜻을 이해하게 될지도 모릅니다.\n\n이 시설의 기록에는 더 많은 동면 포드가 있는 또 다른 행성의 위치가 나와 있습니다."
 infernals.2530.a: "함선을 줍시다."
 infernals.2530.b: "집으로 데려오세요."
 infernals.2530.b.tt: "£pop£ $POPS$ 획득: §G+200§!"
 infernals.2530.c: "동화시키세요."
 # Ship returns
 infernals.2531.name: "귀환"
 infernals.2531.desc: "우리의 함선을 가져갔던 동면자들이 거대한 군함을 타고 돌아왔습니다. 은하계를 횡단하는 여정에서 해적과 충돌했지만, 재치 있게 적을 제압하고 통제권을 가져왔습니다.\n\n이들은 적의 함선을 탈취하며 해적 활동의 맛을 보았고, 이후 더욱 대담해져 점점 더 강력한 목표물을 습격했습니다. 그러나 아무리 성공적인 해적도 영원할 수는 없습니다.\n\n이제 동면자들은 안정을, 그리고 어쩌면 더 위대한 무언가를 찾아 고향으로 돌아왔습니다. 이들의 함선과 경험, 그리고 전리품은 매우 유용하게 쓰일 수 있을 것입니다."
 infernals.2531.a: "배를 내어줄 가치가 있었습니다."
 infernals.2531.a.tt: "이들의 함선을 우리 함대에 사용할 수 있습니다. 순양함 1척을 얻습니다."
 infernals.2531.b: "이들의 함선을 개조하여, 우리를 위해 새로운 행성을 개척하게 합시다."
 infernals.2531.b.tt: "§H$colonizer$§! 1척을 얻습니다."
 infernals.2531.c: "수도에 이들을 위한 자리가 있습니다."
 infernals.2531.c.tt: "£pop£ $POPS$ 획득: §G+200§!"
 # Anomaly 4
 cosmic_dawn_sleepers3_category: "동면자들의 항성 항구"
 cosmic_dawn_sleepers3_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2535.name: "$cosmic_dawn_sleepers3_category$"
 infernals.2535.desc: "§Y[root.leader.GetName]§!(이)가 더 작은 동면 시설과 함께 거의 완전한 상태의 과학선을 숨긴 항성 항구를 발견했습니다. 함선은 약간의 수리만 거치면 다시 운용할 수 있을 것입니다.\n\n이곳에는 다른 종의 보존 표본을 포함한 방대한 과학 데이터가 남아 있습니다[GetInterstellarRefugiaDesc2535] 이 표본들이 강제로 수집된 것인지 자발적으로 제공된 것인지는 불분명하지만, 함선에는 지성체 운반용 격리실이 포함되어 있습니다.\n\n우리는 표본을 연구함으로써 많은 것을 얻을 수 있으며, 어쩌면 우주 저 밖에서 더 많은 생명체를 찾을 수 있을지도 모릅니다."
 infernals.2535.contact: ". 그 일부는 현대 지성체의 조상일 가능성이 높습니다." # prints this in [GetInterstellarRefugiaDesc2535] above
 infernals.2535.nocontact: "." # Can't be empty, so holds the full stop.
 infernals.2535.a: "표본을 연구하세요."
 infernals.2535.b: "표본을 후손에게 돌려줍시다."
 infernals.2535.c: "증거를 인멸하세요."
 # Random Stasis Pods discovered
 infernals.2536.1: "몇 달에 걸친 노력 끝에, [planet.GetName]에서 잠들어 있던 새로운 [root.GetSpeciesNamePlural] 전원이 우리에게 합류했습니다."
 infernals.2536.1.a: "성계로 항로를 설정하세요!"
 infernals.2536.1.b: "더는 이럴 시간이 없습니다." # ends the chance to spawn more pods.
 infernals.2536.2: "또 다른 동면 포드가 성공적으로 열렸고, 그 안의 주민들이 고향으로 돌아갔습니다."
 infernals.2536.3: "우리는 더 많은 [root.GetSpeciesNamePlural](을)를 해방했으며, 생존을 위해 항성의 열기가 필요한 더 추운 우주에 적응할 수 있도록 돕는 중입니다."
 infernals.2536.4: "[planet.GetName]에서 더 많은 [root.GetSpeciesNamePlural](이)가 성공적으로 깨어났습니다."
 infernals.2536.5: "또 다른 동면 포드를 성공적으로 확보했습니다."
 infernals.2536.6: "[root.leader.GetName](이)가 동면 포드를 추가로 발견하여, 아주 오래전에 잠들었던 더 많은 [root.GetSpeciesNamePlural]들을 다시 현재로 데려왔습니다."
 infernals.2536.7: "[root.leader.GetName](이)가 또 다른 동면 포드를 발견했으며, 그 안에는 [root.GetSpeciesNamePlural]들이 안전하게 보존되어 있었습니다."
 infernals.2536.8: "[root.leader.GetName](이)가 [planet.GetName]에서 고대의 동면 포드를 열었고, 이제 거주자들의 저온 충격을 치료하고 있습니다."
 infernals.2536.9: "[planet.GetName]에서 안에 [root.GetSpeciesNamePlural](이)가 있는 또 다른 동면 포드를 발견했습니다."
 infernals.2536.10: "아주 오래전에 잠들었던 더 많은 [root.GetSpeciesNamePlural]들이 깨어나 우리에게 합류했습니다."
 # Stage 4
 infernals.2540.name: "고대의 감옥"
 infernals.2540.desc: "최근 발굴에서 놀라운 사실이 드러났습니다. 이곳의 동면자들은 수 세기 전에 깨어났음에도 시설을 떠나지 않은 것입니다.\n\n건축 분석 결과 시설의 문은 밖에서 잠그는 구조로, 이들을 가두기 위한 것으로 보입니다. 강화된 문을 뚫고 들어가자 동면자들은 적대적인 반응을 보였지만, 이후 물러났습니다.\n\n기록을 살펴보면 이 상황을 파악할 수 있겠지만, 접근 자체가 추가적인 도발 행위가 될 가능성이 있습니다. 시설을 급습하여 신속하게 상황을 해결하거나, 협조를 얻기 위해 뇌물을 제공하는 것도 가능합니다."
 infernals.2540.a: "시설을 급습하세요."
 infernals.2540.b: "선물을 주고 친목을 도모하도록 하세요."
 INF_ORIGIN_COSMIC_DAWN_STORM: "동면 시설 급습"
 INF_ORIGIN_COSMIC_DAWN_STORM_DESC: "이 시설에 대한 접근이 필요한 상황에서, 깨어난 동면자들이 방해가 됩니다. 무력으로 제거합시다."
 infernals.2545.name: "감옥 돌파"
 infernals.2545.desc: "우리 군대가 시설을 급습하여 가벼운 저항을 뚫고 신속하게 대부분의 거주자들을 제압했습니다.\n\n기록에 따르면 이곳은 일종의 감옥이었습니다. 수감자들은 식어 가는 우주의 온기를 되찾기 위해 극단적인 기술의 활용을 주장한 과격주의자였는데, 이는 터무니없이 비현실적인거나 잠재적으로 재앙을 초래할 가능성이 있었습니다. \n\n몇몇 §Y[root.GetSpeciesNamePlural]§! 감옥 지도자들은 폭발물을 가지고 중앙 방에 자신을 가둔 채 모든 거주자들이 다시 봉인될 것을 요구하고 있습니다.\n\n구조물을 보호하기 위해 터널에 투명한 기체를 채워 폭발을 무력화할 수 있지만, 그렇게 하면 대부분의 거주자들은 곧 질식하게 될 것입니다."
 infernals.2545.a: "터널에 기체를 주입하세요."
 infernals.2545.a.tt: "£pop£ $POPS$ 획득: §G+100§!"
 infernals.2545.b: "신속히 대피시키세요."
 infernals.2545.b.tt: "£pop£ $POPS$ 획득: §G+400§!"
 INF_ORIGIN_COSMIC_DAWN_BRIBE: "동면 시설에 뇌물 제공"
 INF_ORIGIN_COSMIC_DAWN_BRIBE_DESC: "시설 거주자들이 우리에게 의존하게 되면, 접근권을 요구할 영향력을 확보할 수 있을 것입니다. 유용한 필수 재화와 자원을 대량으로 지급합시다."
 infernals.2550.name: "감옥 돌파"
 infernals.2550.desc: "수개월간의 무역으로 한때 수감자였던 이들은 우리의 보급품에 의존하게 되었습니다. 우리가 공급을 중단하겠다고 위협하자, 이들은 당황하며 시설의 통제권을 내주었습니다.\n\n시설의 기록은 이곳이 감옥이었음을 확인해 주었습니다. 수감자들은 한때 식어 가는 우주의 온기를 되찾기 위해 급진적인 기술을 추진했지만, 이는 터무니없거나 위험할 정도로 현실적이었습니다.\n\n다행히 수감자들은 이 모든 것을 기억하지 못합니다. 과학자들이 현장을 연구하는 동안 거주자들은 사회에 통합되어 동화의 길을 순조롭게 걷고 있습니다."
 infernals.2550.a: "잘됐군요."
 infernals.2550.a.tt: "£pop£ $POPS$ 획득: §G+300§!"
 # Stage 5
 infernals.2555.name: "비극적인 사고"
 infernals.2555.intro: "최근 발굴 현장에서 사고가 발생했습니다. 시설의 발전소가 손상되었지만, 동면 포드는 아직 작동 중입니다."
 infernals.2555.outro: "시스템이 얼마나 더 오래 작동할지는 불분명합니다. 동면자들을 구출하려면, 시설의 전력이 다하기 전에 행동해야 합니다."
 infernals.2555.desc.a: "$infernals.2555.intro$\n\n이전 시설에서 최근 동화된 호열체 일부에게 의심의 눈초리가 쏠리고 있습니다. 이들이 그다지 성실한 일꾼은 아니었다는 소문이 있습니다.\n\n$infernals.2555.outro$"
 infernals.2555.desc.b: "$infernals.2555.intro$\n\n이 재난의 소식을 듣고, 이전에 구출된 호열체들이 구조 과정을 돕기 위해 자원했습니다.\n\n$infernals.2555.outro$"
 infernals.2555.a: "불충한 일꾼들을 숙청하세요."
 infernals.2555.b: "비용을 지불하고 더 많은 인력을 고용하세요."
 infernals.2555.c: "구조를 서두릅시다."
 infernals.2555.d: "신중하게 진행하세요."
 # Option events from above (Stage 4)
 infernals.2560.name: "상황 수습"
 infernals.2560.desc: "가장 충성스러운 일꾼들에게만 접근을 허용하여 구조 작업의 차질을 최소화했습니다.\n\n안타깝게도, 보안 심사로 인해 인력이 제한되어 시설을 구하는 데 실패했습니다. 동면자들은 모두 사망했습니다.\n\n유일한 위안은 기술 연구에 있습니다. 시설의 점진적인 붕괴와 가동 중단 과정에서 귀중한 통찰을 얻을 수 있을 것입니다."
 infernals.2560.a: "정말 유감이군요."
 infernals.2565.name: "$infernals.2560.name$"
 infernals.2565.desc: "구조 작업에 대한 금전적 보상을 제안하자 지원자가 쇄도했습니다.\n\n안타깝게도 부를 이용해 통제력을 행사하는 것에 불만을 품은 이전 수감자들이 방해 공작을 벌였고, 이로 인해 모든 동면 포드 거주자가 사망했습니다.\n\n작은 위안은 피해가 특정 목표에 집중되었다는 점입니다. 우리는 여전히 이곳의 기술과 기록을 연구할 수 있으며, 이번 실패로 드러난 심사 과정의 결함도 이제 해결할 수 있을 것입니다."
 infernals.2565.a: "정말 비열한 짓이군요!"
 infernals.2570.name: "$infernals.2560.name$"
 infernals.2570.intro: "지하 시설로 일꾼과 구조대가 몰려들면서, 우리는 고장 난 동면 포드에서 잠들어 있던 [Species.GetName]들을 신속하고 안전하게 구출할 수 있었습니다. 자신들이 어떤 운명을 벗어난 건지 목격한 새로운 시민들은 구조에 감사를 표하고 있습니다."
 infernals.2570.outro: "안타깝게도, 성급한 구조 과정에서 많은 동면 포드를 절단하거나 파괴해야 했기 때문에 이를 통해 얻은 과학적 통찰은 제한적이었습니다."
 infernals.2570.desc.a: "$infernals.2570.intro$\n\n$infernals.2570.outro$"
 infernals.2570.desc.b: "$infernals.2570.intro$\n\n또한, 수감자 동화 과정에서 온 자원봉사자들이 새로운 이주자들과 대화하고 보급품을 지원하며 사회 통합을 돕고 있는 것으로 보입니다.\n\n$infernals.2570.outro$"
 infernals.2570.a: "추가 자원봉사자들이 있어서 다행이군요."
 infernals.2570.a.tt: "£pop£ $POPS$ 획득: §G+400§!"
 infernals.2570.b: "잘하셨습니다."
 infernals.2570.b.tt: "£pop£ $POPS$ 획득: §G+400§!"
 infernals.2570.c: "$ACKNOWLEDGED$"
 infernals.2570.c.tt: "£pop£ $POPS$ 획득: §G+400§!"
 infernals.2575.name: "$infernals.2560.name$"
 infernals.2575.desc: "과학자들이 동면자들을 구출하기 전에 시스템을 신중하게 분석하여, 우리가 직면한 문제를 완전히 파악했습니다.\n\n안타깝게도, 분석에서 발표와 후속 연구까지의 과정이 너무 오래 걸렸습니다. 우리가 준비되었을 때 생명 유지 장치는 이미 망가졌으며 모든 생명이 사라진 뒤였습니다.\n\n비극적이지만, 구조 작업은 주요한 과학적 성과를 낳았으며 회수한 기술은 이미 그 가치를 입증하고 있습니다."
 infernals.2575.a: "다행히 살아있는 이들은 그 혜택을 누릴 수 있겠군요."
 infernals.2575.b: "$ACKNOWLEDGED$"
 # Situation completed
 infernals.2580.name: "드러난 역사"
 infernals.2580.desc: "우리는 마침내 중앙 코어에 도달했으며, 그 규모는 상상을 초월합니다. 행성 내부에는 마그마를 동력으로 구동되는 거대한 아콜로지가 자리 잡아, 수천 명의 동면자를 수용하고 있습니다.\n\n이곳에는 우리 은하 제국의 부흥이나 우주 대냉각기 시대의 목소리 등, 과거를 기록한 방대한 기록도 보관되어 있습니다. 일부는 동면을 선택했고, 일부는 필연에 맞서 싸웠으며, 많은 이들이 현실을 부정하며 사라졌습니다.\n\n이 기록은 오랫동안 묻혀 있던 진실을 드러냅니다. 어떤 이는 이것이 우리가 진정 누구인지, 앞으로 무엇이 될 수 있는지 보여 준다고 믿습니다. 다른 이들은 우리가 이미 성공적인 새 정체성을 만들어 냈으며, 우리 조상들의 사회는 오늘날의 우주에 적합하지 않다고 주장합니다.\n\n어느 쪽이든, 이 방대한 터널망은 우리가 원하는 대로 활용할 수 있습니다."
 infernals.2580.a: "고대 제국을 재건합시다."
 infernals.2580.b: "다른 제국들은 우리의 유산을 존중해야 합니다."
 infernals.2580.b.tt: "지도자 획득: £commander£ §Y$commander$§! (시작 레벨 §G5§!)"
 infernals.2580.c: "우리는 미래를 바라봐야 합니다."
 infernals.2580.d: "선을 행하는 것만이 중요합니다."
 # Relic & Specimen
 r_pyroglyphic_codex: "화염 문자 코덱스"
 r_pyroglyphic_codex_desc: "태초의 문명에 대한 풍부한 정보를 담고 있는 정교한 크리스탈 천문 모형입니다. 이를 통해 더 나은 사회를 건설하는 데 필요한 많은 교훈을 얻을 수 있습니다."
 r_pyroglyphic_codex_effect_tt: "\n$r_pyroglyphic_codex$를 §Y처음으로§! 활성화하면 수도에 §Y$infernal_library$§! 보정치가 영구적으로 추가되어 다음 효과가 발생합니다: $TABBED_NEW_LINE$- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+5§! $TABBED_NEW_LINE$- $MOD_PLANET_HOUSING_MULT$: §G+20%§! $TABBED_NEW_LINE$- $MOD_PLANET_AMENITIES_ADD$: §G+10%§!"
 infernal_library: "지하 건축술"
 infernal_library_desc: "이 행성에서 고대 건축 기술을 재발견함으로써 광대한 동굴 같은 도시를 건설할 새로운 가능성이 열렸습니다. 이전에는 볼 수 없었던 세밀한 구조와 건축 양식이 장관을 이루며, 모든 시민에게 자신들의 진정한 기원을 상기시킵니다."
 pyroglyphic_codex_mod: "$r_pyroglyphic_codex$"
 pyroglyphic_codex_mod_desc: "화염 문자 코덱스에서 발견된 매혹적인 비밀들이 새로운 연구 분야를 촉진하고 있으며, 앞으로 수년간 그 영향은 계속될 것입니다."
 infernal_stasispod: "고대 동면 포드"
 infernal_stasispod_desc_short: "놀라울 정도로 정밀한 온도 제어 장치가 갖춰진 합성석 관입니다"
 infernal_stasispod_desc_details: "이 포드들은 고대 [Species.GetName](이)가 수십억 년 동안 동면에 들어갈 때 사용했으며, 온도가 생존에 적합할 만큼 따뜻해졌을 때만 거주자를 깨웠습니다. 이 포드는 많은 시스템이 고장 나 거주자들이 사망한 시설에서 온 것입니다. 이는 [Species.GetName] 생존자들이 겪었던 시련을 냉엄하고 엄숙하게 상기시켜 줍니다."
