 ####################################
 # Imminent Eruption
 infernals.3000.name: "임박한 분화"
 infernals.3000.desc: "지질 경보 시스템이 §Y[planet.GetName]§!의 주요 거주지 인근에서 향후 1년 내 화산 분화가 일어날 가능성이 높다고 경고하고 있습니다.\n\n압력 조절 장치에 투자하면 용암 흐름을 에너지 생산에 활용할 수 있으며, 분화구에서 직접 마그마를 채취하여 귀금속을 추출하도록 인력을 대기시킬 수도 있습니다. 아니면 위험을 최소화하기 위해 해당 지역에서 민간인과 보급품을 대피시키는 데 집중할 수도 있습니다.\n\n또한 예측이 부정확할 가능성을 대비해, 다른 행동을 취하기 전에 상황을 계속 관찰할 수도 있습니다."
 infernals.3000.a: "대피하세요!"
 infernals.3000.a.tt: "§Y500§! $energy$을 보유함"
 infernals.3000.b: "기다리고 지켜보세요."
 infernals.3000.c: "에너지 생산에 집중하세요."
 infernals.3000.d: "마그마를 채취하세요."
 infernals.3005.name: "때맞춘 선택"
 infernals.3005.desc: "식민지 조기 대피는 현명한 결정이었습니다. 화산이 예상보다 일찍 분화하여 해당 지역의 건물들이 심각하게 손상된 것입니다. 이제 지하 화산 압력이 최소화되었으니 식민지 주민들은 안전하게 돌아와 재건할 수 있습니다."
 infernals.3010.name: "화산의 분노"
 infernals.3010.desc: "화산이 일찍 폭발했고, 식민지는 재앙에 대처할 준비가 되어 있지 않았습니다. 사회 기반 시설에 막대한 피해가 발생했으며 상당한 인명 피해가 있었습니다."
 infernals.3015.name: "기다리고 지켜보기"
 infernals.3015.desc: "몇 달 후, §Y[planet.GetName]§! 식민지 근처의 화산 활동이 다시 잠잠해졌습니다. 장기적인 위험이 사라진 것은 아니지만, 당분간은 식민지가 안전할 것으로 보입니다."
 infernals.3015.a: "위험을 감수한 보람이 있었군요."
 infernals.3020.name: "향상된 전력망"
 infernals.3020.desc: "기술진이 지하의 압축된 용암을 서서히 방출하는 안전한 시스템을 구축하고, 그 과정에서 용암이 발전기를 통과하도록 했습니다. 이 덕분에 식민지의 전력망에 단기적인 이익이 발생했습니다."
 infernals.3025.name: "마그마 채취"
 infernals.3025.desc: "초음파 분열기와 물리적 장벽의 조합으로 화산 분출을 막자, 지표면에 거대한 마그마 지대가 형성되어 굳어 가고 있습니다. 채굴 팀이 이미 이 광물 자원을 채취하기 시작했습니다."
 # Lava Sports
 infernals.3030.name: "용암 스포츠"
 infernals.3030.desc: "누군가는 사람들이 빠르게 흐르는 용암 근처에서 시간을 보내고 싶어 하지 않을 거라고 생각할지 모릅니다. 하지만 §Y[planet.GetName]§!에서는 그렇지 않습니다.\n\n개척민들은 흐르는 용암류를 따라 다용도 호버크래프트 경주를 벌이며, 떠다니는 바위를 피하고 용암 폭포를 뛰어넘습니다. 경주 결과를 두고 돈을 거는 이도 있으며, 도박장은 범죄 조직의 관심을 끌고 있습니다. 다양한 사고로 몇몇 조종사들이 사망하기도 했습니다.\n\n이런 일을 할 것이라고는 상상하지도 못했기 때문에, 식민지에는 이 관행을 금지하는 법이 없습니다. 우리는 주민들의 열정을 존중해 자유롭게 경주하도록 내버려둘 수 있지만, 이 경우 이미 도박이 성행하는 만큼 더욱 위험한 도전과 범죄가 늘어날 수도 있습니다. 대안으로는 이 스포츠를 규제하는 방법이 있습니다. 이는 다소의 불만을 야기할 수 있지만, 장기적으로는 사망자와 범죄를 최소화할 것입니다. 또는 전면 금지할 수도 있는데, 이는 효과적이지만 시행 비용이 많이 들 것입니다."
 infernals.3030.a: "자유롭게 즐기도록 둡시다."
 infernals.3030.b: "스포츠를 규제하세요."
 infernals.3030.c: "이 어리석은 짓을 금지하세요!"
 lava_surfboard: "용암 서핑 보드"
 lava_surfboard_desc_short: "아래쪽에 급조한 부양 장치가 용접된 길쭉한 강철판입니다"
 lava_surfboard_desc_details: "여분의 부품으로 급조된 것이 분명함에도, [Event.Planet.GetName]의 용암 스포츠에서 사용되는 이 서핑 보드에서는 남다른 정성과 기지가 느껴집니다. 탁월한 부양 시스템과 열 보호 기능이 갖춰져 있으며, 외형은 개척민들의 강인한 자립심을 연상시킵니다."
 infernals.3035.name: "자유롭게 즐기도록 둡시다!"
 infernals.3035.desc: "개척민들이 유행을 즐기도록 허용한 결과, 용암 스포츠를 둘러싼 열기가 폭발적으로 증가했습니다. 용암류 위에서 호버크래프트를 타는 조종사들의 이미지는 빠르게 §Y[planet.GetName]§! 지역 문화의 상징이 되고 있습니다.\n\n안타깝게도, 열정이 안전을 앞지르고 있습니다. 경주 중 사망 사례가 계속 보고되고 있으며, 불법 대부업자들이 용암 스포츠 애호가들의 도박 습관을 이용하고 있다고 합니다. 스포츠를 향한 대중의 지지는 여전히 높지만, 앞으로도 부정적인 결과가 나타나는지 계속 주시해야 합니다."
 infernals.3035.a: "불편한 이야기군요."
 infernals.3040.name: "안전 조치"
 infernals.3040.desc: "처음에는 개척민들이 당국의 규제에 반감을 품었지만, 경주용 기체에 도입된 새로운 안전 조치 덕분에 부상과 사망 사례가 거의 사라졌습니다. 경주 조종사들은 이러한 규제가 자신들의 안전에 얼마나 도움이 되는지 목소리를 내고 있으며, 대중 역시 점차 이를 지지하고 있습니다.\n\n용암 스포츠 도박에도 재정적 투명성과 과세가 도입되어, 수익금은 경주자들을 위한 안전 장비 마련에 사용되고 있습니다. 범죄 조직은 대부분 도박장에서 물러났지만, 일부 주민은 당국의 과세가 부당하다고 불평합니다."
 infernals.3040.a: "후회하기보다는 조심하는 편이 낫습니다."
 infernals.3045.name: "스포츠 금지"
 infernals.3045.desc: "이 위험한 행위를 중단시키기 위해 법 집행 기관이 배치되었습니다. 집행에 대한 대중의 반발은 강력했으며 식민지 전역에서 시위가 발생했지만, 용암 흐름에 대한 지속적인 감시와 경주의 중단을 통해 사망자 수가 0으로 떨어졌고, 도박판도 거의 사라졌습니다."
 infernals.3045.a: "다른 방법이 없었습니다."
 lava_sports_flow: "용암 스포츠: §G허용§!"
 lava_sports_flow_desc: "개척민들이 유행을 즐기도록 허용한 결과, 용암 스포츠를 둘러싼 열기가 폭발적으로 증가했습니다."
 lava_sports_regulated: "용암 스포츠: §Y규제§!"
 lava_sports_regulated_desc: "처음에는 개척민들이 당국의 규제에 반감을 품었지만, 경주용 기체에 도입된 새로운 안전 조치 덕분에 부상과 사망 사례가 거의 완전하게 사라졌습니다. 경주 조종사들은 이러한 규제가 자신들의 안전에 얼마나 도움이 되는지 목소리를 내고 있으며, 대중 역시 점차 이를 지지하고 있습니다."
 lava_sports_banned: "용암 스포츠: §R금지§!"
 lava_sports_banned_desc: "이 위험한 행위를 중단시키기 위해 법 집행 기관이 배치되었습니다."
 # Kindled Myths
 infernals.3055.name: "불붙은 신화"
 infernals.3055.desc: "§Y[pre_ftl_planet.GetName]§!의 초광속 이전 종족은 우리의 가장 오래된 신화 속에 나타나는 존재들과 놀라울 정도로 유사합니다. 일부는 수렴 진화와 심리학의 일반적인 경향으로 설명될 수 있지만, 이 종족에 대해 알아갈수록 더 많은 연관성이 발견되고 있습니다.\n\n이들이 우리 신화와 전설에 등장하는 바로 그 존재들일까요? 이 가능성에 대한 기대가 커지고 있으며, 우리는 자원을 투자해 추가 연구를 진행할 수 있습니다. 하지만 때로는 단순한 우연이 겹쳤을 뿐 중요한 의미는 없을 수도 있고, 지나친 조사는 이 사회에 우리의 존재를 드러내어 의도치 않은 결과를 초래할 수 있습니다."
 infernals.3055.a: "우연의 일치입니다. 무시하세요."
 infernals.3055.b: "계속 조사하세요."
 infernals.3060.name: "어리석은 가정"
 infernals.3060.desc: "일부는 추가 조사를 촉구했지만, 신화에서 나온 외계종이라는 가설을 이 이상 쫓는 것은 현명하지 않습니다. 결국 이 종족 역시 고유한 신화, 전설, 그리고 스스로를 바라보는 방식을 가지고 있으므로 우리 예상과는 다를 수 있기 때문입니다. 해당 주제에 대한 연구는 중단되었고, 자금은 다른 사안으로 다시 배정되었습니다."
 infernals.3060.a: "익숙하면서도 낯선 존재로군요."
 infernals.3065.name: "원시의 혼란"
 infernals.3065.desc: "이 종족을 우리 신화와 연결하려는 열망 속에서, 우리 요원들이 초광속 이전 문명 조우 프로토콜을 무시했습니다. 행성 전역에서 현지인들은 우리 함선을 여러 차례 목격했으며, 장비를 훔쳤고, 한 사례에서는 우리 요원 한 명을 연구 목적으로 납치하기까지 했습니다. 우리의 존재가 알려지면서 소요가 발생하고 양극화된 반응이 나타났습니다.\n\n작전상의 혼란에도 불구하고, 우리 국민들 사이에서는 신화적 연관성에 대한 기대가 여전히 존재합니다. 제국민들은 이 종족을 점점 더 영적인 시각으로 바라보고 있습니다."
 infernals.3065.a: "좀 더 조심했어야 했는데."
 infernals.3070.name: "놀라운 발견"
 infernals.3070.desc: "§Y[pre_ftl_planet.GetName]§! 주민들에 대한 집중적인 연구는 신화적 가설을 가라앉혔습니다. 우리의 가장 오래된 이야기와 이 존재들 사이에서는 많은 유사점이 발견되었지만, 일부 조화되지 않는 차이점도 드러난 것입니다.\n\n복잡한 상황에도 불구하고, 이 종족에 대한 관심은 여전합니다. 일부에서는 이들이 우리의 이야기 속 존재들의 잔존 인구이며, 차이점은 그사이 흐른 막대한 시간에 의한 것일 수 있다는 의견이 제시됩니다. 오늘날 우리는 이 종족을 독립된 사회로 인식해야 하지만, 제국 내부에서는 이들과 강한 영적 유대감을 느끼는 이들이 많아졌습니다."
 infernals.3070.a: "우리 모두에게 뜻깊은 순간이군요."
 # Molten Core Grand Archive specimen
 infernals.3200.name: "융핵"
 infernals.3200.desc: "§Y[planet.GetName]§!의 식민지가 성장하면서 $sr_living_metal$을 활용하던 멸망한 문명이 있었다는 증거 또한 늘어나고 있습니다. 하지만 이들이 어디에서 이 물질을 획득한 것인지에 대한 단서는 찾을 수 없었습니다.\n\n그러나 최근 한 가지 실마리를 찾았습니다. 심핵에서 흘러나온 마그마 속에서 역장에 갇힌 채 기이한 빛으로 일렁이는 구체가 떠오른 것입니다. 이 구체의 본래 목적과 구조는 즉각적으로 파악할 수 없었지만, 극도로 높은 온도에 노출되었을 때 일정한 $sr_living_metal$ 방울을 생성하는 것으로 보입니다. 고고학적 수수께끼는 이로써 간단히 풀렸지만, 이제 이 구체를 어떻게 처리할지 결정해야 합니다."
 infernals.3200.a: "유물을 보관하세요."
 infernals.3200.a.accept: "이 기묘한 물체는 우리가 개발한 어떤 것과도 다릅니다. $sr_living_metal$의 원천으로서 유용할 뿐만 아니라, 연구할 가치가 있는 과학적, 역사적 호기심의 대상이기도 합니다."
 infernals.3200.b: "용암 속으로 다시 던져 버립시다."
 infernals.3200.b.deny: "적응에 실패하고 멸종한 문명에 대해 감탄할 이유가 없습니다. 유물은 처분하고 잊어버려야 합니다."
 infernal_molten_core: "융핵"
 infernal_molten_core_desc_short: "물결치듯 유동적인 질감을 가진 은빛의 구체로, 희미하게 쉬익 소리를 내는 역장으로 둘러싸여 있습니다"
 infernal_molten_core_desc_details: "융핵의 역장은 고온에 노출될 때만 느슨해져 $r_living_metal$ 한 방울이 빠져나올 수 있게 합니다. 원 제작자들은 오래전에 사라졌지만, 이 핵은 그들의 과학과 독창성을 나타내는 증거로 남아 있습니다."
 # CD Timeline events
 TIMELINE_EVENT_ORIGIN_CD_START: "깊은 메아리\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_START_TOOLTIP: "§H흔적 추적§!\n§Y기원 이벤트§!\n\n행성 표면 깊은 곳에서부터 발신되는 희미하고 복잡한 신호를 감지했습니다. 이 신호는 지각 깊숙이 박혀 있는 고대 구조물 네트워크에서 비롯된 것으로, 이는 우리가 오랜 동면을 시작하기 전에 만들어진 것입니다."
 TIMELINE_EVENT_ORIGIN_CD_END: "드러난 역사\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_END_TOOLTIP: "§H이벤트 연쇄 완료§!\n§Y기원 이벤트§!\n\n행성 깊은 곳에서 거대한 고대 시설을 발견하고, 지나간 시대의 잃어버린 정보가 담긴 코덱스를 회수했습니다. 우리는 고대의 강력한 유산의 계승자로서, 그 소유권을 주장할 준비가 되었습니다."
