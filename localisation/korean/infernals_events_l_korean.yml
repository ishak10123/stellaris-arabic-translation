 rg_high_negative_progress: "\n월간 팽창: §G-50§!\n\n"
 approach_reassure_public: "대중 안심시키기"
 approach_find_the_cause: "원인 규명하기"
 approach_suppress_unrest2: "불안 억누르기"
 approach_disrupt_subspace_tunnels2: "아공간 터널 차단하기"
 approach_add_fuel_to_the_fire3: "불에 기름 붓기"
 approach_wait_and_see3: "기다리고 지켜보기"
 approach_siphon_stellar_material3: "항성 물질 추출하기"
 approach_continue_siphoning4: "계속 추출하기"
 approach_stabilize_the_star4: "항성 안정화하기"
 approach_cease_activity4: "활동 중단하기"
 approach_reverse_inflation4: "팽창 되돌리기"
 approach_at_any_cost: "어떤 대가든 감수하기"
 approach_reassure_public_effect: "이 위기가 알려지면 사회를 불안정하게 만들 수 있습니다. 비밀로 유지해야 합니다.$rg_default_progress$"
 approach_find_the_cause_effect: "항성의 팽창은 멈출 수 없습니다. 근본적인 원인을 찾기 위해 즉각적이고 포괄적인 조사가 필요합니다.$rg_default_progress$"
 approach_suppress_unrest2_effect: "사회적 불안 속에서는 효과적인 해결이 불가능합니다. 질서와 안정을 회복하는 데 우선순위를 두어야 합니다.$rg_default_progress$"
 approach_disrupt_subspace_tunnels2_effect: "우리 항성의 온전함을 보존하기 위해서는 즉각적인 대응책이 필요합니다. 아공간 터널의 차단이 필수적입니다.$rg_small_progress$"
 approach_add_fuel_to_the_fire3_effect: "이러한 상황은 우리 모성계의 행성들에서 심층 추출 작업을 시작하여 광물 수확을 극대화할 기회를 제공합니다.$rg_high_progress$"
 approach_wait_and_see3_effect: "섣부르게 판단하기보다는 인내심을 가지고 지켜봐야 합니다.$rg_small_negative_progress$"
 approach_siphon_stellar_material3_effect: "항성에서 직접 물질을 제거하면 정상화 과정을 가속할 수 있을 것입니다.$rg_medium_negative_progress$"
 approach_continue_siphoning4_effect: "이 힘을 사용하여 모성계를 불태우고, 그 잔해를 뒤져 부를 찾을 수 있습니다.$rg_high_progress$"
 approach_stabilize_the_star4_effect: "항성을 현재 상태에서 안정화하여 우리의 현 적응 상태를 유지할 수 있습니다.$rg_no_progress$"
 approach_cease_activity4_effect: "채굴 플랫폼을 비활성화하고, 항성이 더 안정된 상태로 돌아가게 할 수 있습니다.$rg_small_negative_progress$"
 approach_reverse_inflation4_effect: "항성을 이전 크기로 다시 수축시켜 모성의 거주 적합도를 복원할 수 있습니다.$rg_high_negative_progress$"
 approach_at_any_cost_effect: "어떤 대가를 치르더라도 재앙을 피하기 위해 팽창을 막아야 합니다.\n월간 팽창: §G+0.5§!\n\n"
 INF_ORIGIN_RED_GIANT_TRIANGULATION: "아공간 간섭 삼각 측량"
 INF_ORIGIN_RED_GIANT_TRIANGULATION_DESC: "간섭의 근원지를 삼각 측량하기에 적합한 위치입니다."
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD: "모성 보호"
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD_DESC: "항성의 변화를 되돌리기 위해 끊임없이 노력하는 동안 우리 자신도 열기에 맞설 준비를 해야 합니다. 주민들이 더 높은 온도에 적응하게 하면 불길에 휩싸인 항성의 새로운 미래에서도 번영할 수 있을 것입니다."
 INF_ORIGIN_RED_GIANT_EXPLOIT: "열 활용"
 INF_ORIGIN_RED_GIANT_EXPLOIT_DESC: "증가한 항성 방사선 증가는 심각한 장기적 문제를 야기하지만, 단기적으로는 이를 활용하여 산업과 에너지 생산 능력을 향상시킬 수 있습니다."
 INF_ORIGIN_RED_GIANT_BOARD_STATION: "기지 진입"
 INF_ORIGIN_RED_GIANT_BOARD_STATION_DESC: "이 무모한 외계인들이 우리 항성을 착취하고 있습니다. 즉시 이들의 기지에 진입하여 통제권을 장악해야 합니다."
 INF_ORIGIN_RED_GIANT_PARLAY: "긴급 외계 언어학"
 INF_ORIGIN_RED_GIANT_PARLAY_DESC: "기지 주민들이 우리 항성을 파괴하고 있는 아공간 사이펀을 제어하고 있습니다. 협조를 확보하여 이 문제를 해결할 수 있도록 소통할 방법을 찾아야 합니다."
 INF_THERMOPHILE_ADAPTATION: "호열성 진화"
 INF_THERMOPHILE_ADAPTATION_DESC: "은하계를 불태우는 길에 나서는 동안 우리 자신도 열기에 맞설 준비를 해야 합니다. 주민들이 더 높은 온도에 적응하게 하면 불길에 휩싸인 새로운 미래에서도 번영할 수 있을 것입니다. \n\n§H완료 시:§!$TABBED_NEW_LINE$- §Y$crisis_thermophile_adaptation$§! 보정치 추가$TABBED_NEW_LINE$- §Y$mod_pc_volcanic_habitability$§! §G+50%§! 증가"
