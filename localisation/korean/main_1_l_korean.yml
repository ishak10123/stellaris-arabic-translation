 ethic_authoritarian: "권위주의"
 ethic_authoritarian_desc: "§L어떤 문명이든 성공하려면 강한 지도자가 필요하며, 그러한 존재가 없다면 무질서하고 혼란스러운 상황이 펼쳐질 것입니다. 시민들을 가장 효율적인 방향으로 이끄는 것은 국가의 의무입니다.§!\n"
 ethic_fanatic_authoritarian: "광적인 권위주의"
 ethic_fanatic_authoritarian_desc: "§L하나의 목소리, 하나의 권좌, 하나의 국가. 지도자라는 위대한 책임을 맡은 소수의 깨우친 자들에게 복종하는 것은 대중의 중요한 의무입니다.§!\n"
 ethic_egalitarian: "평등주의"
 ethic_egalitarian_desc: "§L개인이 충분히 노력하면 어떤 지위든 오를 수 있는 기회의 평등을 받아들이지 못하는 사회는, 매우 불공정할 뿐만 아니라 결국 비생산적일 수밖에 없습니다.§!\n"
 ethic_fanatic_egalitarian: "광적인 평등주의"
 ethic_fanatic_egalitarian_desc: "§L자신의 욕망과 이상이 다른 사람의 의견보다 중요하다는 잘못된 생각에 빠져 폭군이 될 수 있는 자들을 항상 조심해야 합니다. 모든 구성원의 욕구와 권리를 고려하지 않는 사회는 사회가 아니라 범죄입니다.§!\n"
 ethic_xenophobe: "외계종 혐오"
 ethic_xenophobe_desc: "§L광대하게 펼쳐진 미지의 은하에서 우리 종족의 생존을 두고 도박을 하느라 위험을 키울 수는 없습니다! 외계인은 절대 신뢰해서는 안 됩니다. 그 거짓 미소 뒤에 어떤 마음을 품고 있을지 알 수 없으니...§!\n"
 ethic_fanatic_xenophobe: "광적인 외계종 혐오"
 ethic_fanatic_xenophobe_desc: "§L모든 외계인 세력은 무자비하게 진압해야 합니다. 순수함을 유지하고 우리 자신과 우리를 낳아준 행성에 충실해야 외계인들의 교활한 음모를 막을 수 있습니다. 외계인을 지배하는 것만으로는 충분히 안전하다고 할 수 없을지도 모릅니다...§!\n"
 ethic_xenophile: "외계종 선호"
 ethic_xenophile_desc: "§L우리 모두는 내심 미지의 존재를 동경하고 있습니다. 대상에 상관없이 익숙한 것을 거부하고 낯선 것을 즐기는 모험적인 정신이라고 할 수 있죠.§!\n"
 ethic_fanatic_xenophile: "광적인 외계종 선호"
 ethic_fanatic_xenophile_desc: "§L세상에 절대적인 도덕률이 있다면, 그것은 우주를 탐험하고 그 안에 있는 모든 것을 포용하는 것입니다. 우리는 홀로 길을 걸어갈 운명이 아닙니다.§!\n"
 ethic_militarist: "군국주의"
 ethic_militarist_desc: "§L진정한 미덕은 용기와 규율뿐이며, 이를 적절히 활용하면 어떠한 난관도 극복할 수 있습니다. 진정한 힘은 절제된 힘과 공약에 있습니다.§!\n"
 ethic_fanatic_militarist: "광적인 군국주의"
 ethic_fanatic_militarist_desc: "§L가장 중요한 것은 힘을 드러내는 능력입니다. 우리 삶의 방식을 지킬 수 있는 유일한 방법은 모두가 자발적이든 아니든 그것을 공유하도록 하는 것입니다...§!\n"
 ethic_pacifist: "평화주의"
 ethic_pacifist_desc: "§L갈등을 통한 해결은 어리석은 개념입니다. 그것은 철저히 파괴적이며, 얻어야 할 것을 파괴하고 파괴해야 할 것은 자라게 합니다.§!\n"
 ethic_fanatic_pacifist: "광적인 평화주의"
 ethic_fanatic_pacifist_desc: "§L문명화된 존재로서 우리의 최우선 목표는 모든 무력 충돌을 끝내는 것입니다. 전쟁은 모든 것을 버리고 진화를 포기하는 것과 마찬가지입니다.§!\n"
 ethic_spiritualist: "정신주의"
 ethic_spiritualist_desc: "§L이 광대하고 무정한 우주에서 우리가 얼마나 작고 무의미한 존재인지 알아야 한다는 사람들이 있습니다... 말도 안 되는 소리죠! 우리가 알 수 있는 유일한 진실은 자신의 존재뿐입니다. 이 찬란한 세계도 결국 우리 모두가 공유하게 된 꿈일 뿐입니다.§!\n"
 ethic_fanatic_spiritualist: "광적인 정신주의"
 ethic_fanatic_spiritualist_desc: "§L과학은 의식이 곧 현실이라는 것을 증명했습니다. 그렇지 않다고 착각하며 어린아이처럼 '단단한 물질'로 된 블록을 가지고 노는 이도 있지만, 우리는 인내심을 가지고 그들을 지켜볼 것입니다.§!\n"
 ethic_materialist: "물질주의"
 ethic_materialist_desc: "§L별에 닿기 위해서는 신이나 영혼 같은 유치한 미신을 버려야 합니다. 현실은 잔인하고 냉혹하기에, 우리는 마음을 단단히 먹고 끊임없이 과학과 기술을 추구해서 우리 종족의 생존을 보장해야 합니다.§!\n"
 ethic_fanatic_materialist: "광적인 물질주의"
 ethic_fanatic_materialist_desc: "§L고통스럽지만 우리는 낡은 도덕 관념을 버리고 성장해야 합니다. 살아있는 존재에게 특별한 가치를 부여하는 '신성한 번뜩임' 따위는 없습니다. 우리가 가치를 부여한 것 외에 어떠한 사물에도 본질적 가치 따위는 존재하지 않습니다. 확실성의 자유를 받아들이고 모든 일에서 최대의 효율을 달성합시다!§!\n"
 ethic_neutral: "중립"
 ethic_neutral_desc: "§L중립의 정신은 모든 가능성을 열어둔 자유로운 정신입니다...§!"
 ethic_gestalt_consciousness: "게슈탈트 의식"
 ethic_gestalt_consciousness_desc: "§L우리는 공허에 도달할 것이다.\n광대한 우주는 우리가 될 것이다.§!"
 STORM_DEVASTATION: "폭풍 황폐도"
 STORM_DEVASTATION_TOOLTIP: "§K$STORM_DEVASTATION$§!\n우주 폭풍이 지나가면서 행성을 황폐화하는 정도를 조절합니다."
 building_foundry_upkeep_1: "합금 회수 공장"
 building_foundry_upkeep_1_desc: "첨단 기술을 활용해 고철과 폐기물을 귀중한 합금으로 정제하는 데 특화된 시설입니다."
 building_factory_upkeep_1: "재순환 센터"
 building_factory_upkeep_1_desc: "새로운 교환 캠페인과 중고품 재사용을 통해 수명이 다해 가는 소비재를 다시 활용할 수 있게 만듭니다."
 building_foundry_efficiency_1: "금속 가공 연구소"
 building_foundry_efficiency_1_desc: "최첨단 이론과 탄탄하고 검증된 논문을 활용하면, 실질적인 효율성을 크게 높일 수 있습니다."
 building_factory_efficiency_1: "분산형 설계 센터"
 building_factory_efficiency_1_desc: "믿을 수 있는 소비자들과 협력하며 설계 작업을 진행하면, 생산 과정을 간소화하고 간접 비용을 줄일 수 있습니다."
 building_research_upkeep_1: "연구 소재 공급 창고"
 building_research_upkeep_1_desc: "연구 소재의 공급과 분배를 효율적으로 관리함으로써 행성 전역에서 낭비와 비효율을 최소화하는 중앙 허브입니다."
 building_research_efficiency_1: "데이터 기반 법칙 연구 시설"
 building_research_efficiency_1_desc: "이론가들에게 풍부한 실험 데이터를 제공하면, 연구 효율성을 크게 향상시킬 수 있습니다."
