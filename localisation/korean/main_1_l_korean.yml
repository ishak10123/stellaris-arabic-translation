 COMBAT_WIDTH: "전장 넓이"
 COMBAT_WIDTH_DESC: "$PLANET|Y$의 $COMBAT_WIDTH$는 $AMT|Y$입니다. 전장 넓이는 행성의 크기에 따라 다르며, 전투 중 동시에 공격할 수 있는 지상군의 수를 결정합니다."
 PLANET_DAMAGE: "행성 피해량"
 PLANET_DAMAGED: "황폐도: §R$DAMAGE|0$%§!"
 PLANET_DAMAGED_INFO: "행성이 $DAMAGE|%Y$의 피해를 입었습니다. 행성 피해량이 §Y100%§!에 도달하면 타일이 황폐화되고, 건물은 폐허가 되며, 팝이 사망할 수 있습니다."
 PLANET_DAMAGED_INFO_DELAYED: "§E행성 피해량은 궤도 폭격과 지상 전투로 인한 부수적 피해로 인해 발생하며, 행성이 폭격이나 침공을 받지 않을 때 서서히 복구됩니다.§!"
 PLANET_UNDAMAGED_BOMBARDMENT_INFO: "행성이 궤도 폭격을 받고 있지만, 아무 피해도 발생하지 않았습니다."
