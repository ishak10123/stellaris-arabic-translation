 trait_pc_gaia_preference_terraforming: "$trait_pc_gaia_preference$"
 trait_pc_gaia_preference_terraforming_short: "$trait_pc_gaia_preference_short$"
 trait_pc_gaia_preference_terraforming_desc: "§L기후 선호도는 유전적 수준에서 결정되며, 이 경우에는 우연히 결정됩니다.§!"
 gaia_preference_terraforming_trait_tooltip: "가이아 행성의 팝 생산량: §G+5%§!"
 trait_dry_planet_preference: "건조 행성 선호"
 trait_dry_planet_preference_short: "저습 행성"
 trait_dry_planet_preference_desc: "§L기후 선호도는 설계에 의해 결정됩니다.§!"
