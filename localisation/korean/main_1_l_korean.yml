 #Terrain Tiles
 ####################################
 pc_continental_tile: "온대 지형"
 pc_continental_tile_desc: "다양한 숲이 우거진 온화한 기후의 지형입니다."
 pc_desert_tile: "사막 지형"
 pc_desert_tile_desc: "약간의 암석 노두가 있는 척박하고 건조한 지형입니다."
 pc_arid_tile: "건조 지형"
 pc_arid_tile_desc: "초목이 드문 건조하고 험한 지형입니다."
 pc_tundra_tile: "동토 지형"
 pc_tundra_tile_desc: "초목이 드물고 찬 바람이 강하게 부는 초원 지대입니다."
 pc_tropical_tile: "열대 지형"
 pc_tropical_tile_desc: "초목으로 덮인 온난다습한 기후의 지형입니다."
 pc_ocean_tile: "해양 지형"
 pc_ocean_tile_desc: "바다로 둘러싸인 고립된 섬과 군도입니다."
 pc_arctic_tile: "극지 지형"
 pc_arctic_tile_desc: "초목 없이 눈과 얼음으로 덮인 지형입니다."
 pc_savannah_tile: "초원 지형"
 pc_savannah_tile_desc: "나무와 관목이 넓게 자리 잡은 따뜻하고 건조한 지형입니다."
 pc_alpine_tile: "고산 지형"
 pc_alpine_tile_desc: "눈과 얼음으로 덮인 융기 지형입니다."
 pc_gaia_tile: "가이아 지형"
 pc_gaia_tile_desc: "대부분의 생명체가 살아가기에 매우 적합한 생물 군계를 지닌 다채로운 지형입니다."
 pc_nuked_tile: "황무지 지형"
 pc_nuked_tile_desc: "전쟁으로 파괴된 험한 지형입니다. 방사선 수치가 낮아 일부 생명체는 살아남을 수 있습니다."
 pc_infested_tile: "감염된 지형"
 pc_infested_tile_desc: "프레소린 무리의 분비물로 인해 훼손된 지형입니다."
 pc_ringworld_habitable_tile: "링 월드 지형"
 pc_ringworld_habitable_tile_desc: "링 월드 내부 성계에 의해 꼼꼼히 관리된 깨끗한 지형입니다."
 pc_machine_tile: "사이버네틱 지형"
 pc_machine_tile_desc: "지표면 밑의 초전도 회로를 보호하는 소독된 지형입니다."
 pc_habitat_tile: "거주지 지형"
 pc_habitat_tile_desc: "인공 중력 발생기 위에 만들어진 광석 판은 도시와 공업 건설을 위한 기성 토대 역할을 합니다."
