 ####################################
 #Leader Traits
 ####################################
 #All
 leader_trait_adaptable: "빠른 적응"
 leader_trait_adaptable_desc: "이 지도자는 새로운 방법과 아이디어가 우수하다고 입증되면 빠르게 채택합니다."
 leader_trait_stubborn: "고집"
 leader_trait_stubborn_desc: "이 지도자는 고집이 세고, 새로운 방법과 아이디어가 우수하다고 입증됐을지라도 그것을 받아들이는 것이 느립니다."
 leader_trait_resilient: "회복력"
 leader_trait_resilient_desc: "이 지도자는 뛰어난 회복력과 신체 조건 덕분에 기대 수명이 높습니다."
 leader_trait_substance_abuser: "약물 남용자"
 leader_trait_substance_abuser_desc: "이 지도자는 스트레스로 인해 약물 중독에 빠졌고, 이로 인해 건강이 좋지 않습니다."
 leader_trait_eager: "열성적"
 leader_trait_eager_desc: "이 지도자는 발탁되기 위해 특히 열성적입니다."
 leader_trait_arrested_development: "정체된 성장"
 leader_trait_arrested_development_desc: "이 지도자의 기술과 개인적 성장은 정체된 것 같습니다."
 leader_trait_intemporal: "탈시간"
 leader_trait_intemporal_desc: "이 지도자는 시간의 영향을 받지 않아, 나이가 들어도 사망하지 않습니다."
 #Admiral
 leader_trait_ex_fighter_pilot: "전직 전투기 조종사"
 leader_trait_ex_fighter_pilot_desc: "이 지도자는 전직 에이스 전투기 조종사로, 공격기 전대의 속도와 기동성을 활용하는 데 탁월합니다."
 leader_trait_trickster: "책략가"
 leader_trait_trickster_desc: "이 지도자는 적을 이기기 위해 속임수와 기습을 활용해서 교활하게 싸웁니다."
 leader_trait_fleet_logistician: "함대 군수 전문가"
 leader_trait_fleet_logistician_desc: "이 지도자는 군수 분야에 통달했으며, 유지비를 절감하기 위해 보급품을 관리하는 법을 알고 있습니다."
 leader_trait_fleet_organizer: "함대 조직자"
 leader_trait_fleet_organizer_desc: "이 지도자는 편제의 전문가로, 대규모 우주 함대를 지휘하는 데 필요한 세부 관리 기술을 갖추고 있습니다."
 leader_trait_nervous: "겁쟁이"
 leader_trait_nervous_desc: "이 지도자는 겁이 많고 자주 불안해하며, 대규모 우주 함대를 지휘할 경우 쉽게 당황합니다."
 leader_trait_engineer: "기술자"
 leader_trait_engineer_desc: "이 지도자는 타고난 기술자로, 임무 중에 즉석에서 우주선 수리를 진행하고 감독할 수 있는 지식과 기술을 갖췄습니다."
 leader_trait_aggressive: "공격적"
 leader_trait_aggressive_desc: "이 지도자는 공격적인 성격으로 악명이 높으며, 함대 무기를 무수히 발사해 적을 제압합니다."
 leader_trait_cautious: "신중"
 leader_trait_cautious_desc: "이 지도자는 신중한 사령관으로, 불필요한 위험을 피하고 전투 시 함선 간에 서로 지원할 수 있도록 항상 대형을 유지하는 데 주의를 기울입니다."
 leader_trait_unyielding: "불굴"
 leader_trait_unyielding_desc: "이 지도자는 패배를 인정하느니 싸우다 죽는 편을 택할 것입니다."
 leader_trait_gale_speed: "질풍"
 leader_trait_gale_speed_desc: "이 지도자는 어떠한 우주 활동에서든 속도와 신속한 기동이 성공의 열쇠라고 믿습니다."
 leader_trait_lethargic: "무기력"
 leader_trait_lethargic_desc: "이 지도자는 둔하고 게을러서, 일할 때도 무기력하고 책임감이 없습니다."
 #General
 leader_trait_restrained: "용의주도"
 leader_trait_restrained_desc: "이 지도자는 손실을 최소화하고 부하 및 비전투 요원들 사이에서 발생하는 불필요한 사상자를 방지하는 데 노력을 기울입니다."
 leader_trait_defender: "방어자"
 leader_trait_defender_desc: "이 지도자는 방어 전문가로, 지상군을 어떻게 배치하고 방어 시설을 어떻게 활용해야 적이 행성 침공을 가장 어려워할지 잘 알고 있습니다."
 leader_trait_attacker: "침공자"
 leader_trait_attacker_desc: "이 지도자는 행성 침공 기술에 통달했으며, 어떻게 해야 우주에서 적 행성을 가장 효과적으로 습격할 수 있는지 알고 있습니다."
 leader_trait_butcher: "도살자"
 leader_trait_butcher_desc: "이 지도자는 자비가 없으며, 적을 절대 살려두지 않습니다."
 leader_trait_glory_seeker: "명예를 추구하는 자"
