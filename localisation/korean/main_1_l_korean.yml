 DIFFICULTY_GRAND_ADMIRAL_DESC: "AI는 경제와 연구 및 함대 수용력에서 막대한 보너스를 받습니다."
 FE_DIFFICULTY_TOOLTIP: "§H난이도§!\n게임 난이도를 설정합니다.\n\n선택 가능한 난이도는 다음과 같습니다:\n- §Y$DIFFICULTY_CIVILIAN$§!: $DIFFICULTY_CIVILIAN_DESC$\n- §Y$DIFFICULTY_CADET$§!: $DIFFICULTY_CADET_DESC$\n- §Y$DIFFICULTY_ENSIGN$§!: $DIFFICULTY_ENSIGN_DESC$\n- §Y$DIFFICULTY_CAPTAIN$§!: $DIFFICULTY_CAPTAIN_DESC$\n- §Y$DIFFICULTY_COMMODORE$§!: $DIFFICULTY_COMMODORE_DESC$\n- §Y$DIFFICULTY_ADMIRAL$§!: $DIFFICULTY_ADMIRAL_DESC$\n- §Y$DIFFICULTY_GRAND_ADMIRAL$§!: $DIFFICULTY_GRAND_ADMIRAL_DESC$"
 FE_IRONMAN: "철인 모드"
 FE_IRONMAN_TOOLTIP: "§H철인 모드§!\n철인 모드에서는 콘솔 명령어를 이용할 수 없으며, 게임이 동일한 파일에 주기적으로 자동 저장됩니다. 한번 이 설정으로 게임을 시작하면 되돌릴 수 없습니다."
 FE_EMPIRES_TOOLTIP: "§HAI 제국 수§!\n은하 내 AI 제국의 수를 설정합니다."
 FE_ADVANCED_EMPIRES_TOOLTIP: "§H진보된 AI 제국 수§!\n게임 시작 시 자원, 기술, 인구 보너스를 받는 일반 AI 제국의 수를 설정하며, 해당 제국은 이 밖의 추가 보너스를 받지 않습니다. 이 설정은 ['concept_fallen_empires']에는 적용되지 않습니다."
 FE_IRONMAN_MULTIPLAYER: "§R멀티 플레이에서는 철인 모드를 이용할 수 없습니다.§!"
 FE_IRONMAN_NOCLOUD: "§R철인 모드를 플레이하려면, Steam 클라우드를 활성화하고 Steam에 로그인되어 있어야 합니다.§!"
 FE_IRONMAN_AUTOSAVE: "§R철인 모드에서는 자동 저장 빈도를 변경할 수 없습니다.§!"
 FE_GALAXY_SHAPE_TOOLTIP: "§H은하 형태§!\n은하 지도의 형태를 설정합니다.\n\n일부 형태는 특정 §Y은하 크기§!에서만 선택할 수 있습니다.\n\n선택 가능한 형태는 다음과 같습니다:\n$concept_galaxy_shape_desc$"
 FE_GALAXY_SIZE_TOOLTIP: "§H은하 크기§!\n은하에 나타나는 최대 성계 수를 설정하고, §YAI 제국§!의 기본 수에 영향을 줍니다.\n\n§R경고:§! 설정값을 높이면 게임 후반 성능에 큰 영향을 줍니다."
 ACHIEVEMENT_TOOLTIP_YES: "§G이 게임에서는 도전 과제를 달성할 수 있습니다.§!"
 ACHIEVEMENT_TOOLTIP_NO: "§R이 게임에서는 도전 과제를 달성할 수 없습니다.§!"
 ACHIEVEMENT_TOOLTIP_IRONMAN: "§R철인 모드가 비활성화되어 있습니다.§!"
 ACHIEVEMENT_TOOLTIP_CHECKSUM: "§R체크섬이 수정되었습니다.§!"
 ACHIEVEMENT_ELIGIBLE: "§G이 게임은 도전 과제를 달성할 수 있습니다.§!"
 ACHIEVEMENT_CONSOLE_WARNING: "디버그 커맨드를 사용하면 도전 과제가 비활성화됩니다."
 ACHIEVEMENT_NOT_ELIGIBLE: "§I이 게임은 도전 과제를 달성할 수 없습니다.§!"
 NUM_FALLEN_EMPIRES: "몰락한 제국"
 FE_FALLEN_EMPIRES_TOOLTIP: "§H몰락한 제국 수§!\n은하에 생성될 수 있는 ['concept_fallen_empires']의 최대 수를 설정합니다."
 NUM_MARAUDER_EMPIRES: "약탈자 제국"
 FE_MARAUDER_EMPIRES_TOOLTIP: "§H약탈자 제국 수§!\n은하에 생성될 수 있는 ['concept_marauder_empires', 약탈자 제국]의 최대 수를 설정합니다.$requires_apoc$"
 NUM_HABITABLE_WORLDS: "거주 가능 행성"
 FE_HABITABLE_WORLDS_TOOLTIP: "§H거주 가능 행성§!\n이 설정은 성계에서 생명체가 거주할 수 있는 영역 안에 행성이 생성될 확률을 설정합니다. 설정값이 높을수록 은하계에 거주 가능 행성이 늘어납니다. §Y$FE_HABITABLE_WORLDS_RARE$§! 설정의 경우 거주 가능 행성이 특수한 성계에서만 나타납니다.\n\n§R경고:§! 설정값을 1x보다 높게 설정하면 게임 후반 성능에 영향을 줄 수 있습니다."
 FE_HABITABLE_WORLDS_RARE: "희귀"
 FE_RANDOMIZE: "무작위"
 FE_RANDOMIZE_EMPIRES_TOOLTIP: "이 설정을 활성화하면, 슬라이더에 표시된 범위 내에서 무작위 숫자의 AI 제국이 생성됩니다."
 FE_RANDOMIZE_ADVANCED_EMPIRES_TOOLTIP: "이 설정을 활성화하면, 슬라이더에 표시된 범위 내에서 무작위 숫자의 AI 제국이 발전된 제국이 됩니다."
 FE_RANDOMIZE_FALLEN_EMPIRES_TOOLTIP: "이 설정을 활성화하면, 슬라이더에 표시된 범위 내에서 무작위 숫자의 몰락한 제국이 생성됩니다."
 FE_RANDOMIZE_MARAUDER_EMPIRES_TOOLTIP: "이 설정을 활성화하면, 슬라이더에 표시된 범위 내에서 무작위 숫자의 약탈자 제국이 생성됩니다."
 FE_CLUSTERED_STARTS: "제국 배치"
 FE_CLUSTERED_STARTS_TOOLTIP: "§H제국 배치§!\n각 제국을 밀집시켜 배치하거나 무작위로 은하 전역에 배치하도록 설정합니다."
 FE_ADVANCED_NEAR_PLAYER: "진보된 이웃"
 FE_ADVANCED_NEAR_PLAYER_TOOLTIP: "§H진보된 이웃§!\n['concept_advanced_empires', 진보된 AI 제국]이 플레이어 주변에 생성되는 것을 허용합니다. 이 설정을 §Y비활성화§!하면, 진보된 AI 제국이 설정값보다 적게 등장할 수 있습니다."
 FE_MID_GAME: "중반 게임 시작 연도"
 FE_MID_GAME_TOOLTIP: "§H$FE_MID_GAME$§!\n['concept_machine_uprising']이나 ['concept_great_khan']과 같은 게임 중반 이벤트의 발생 가능 연도를 설정합니다."
 FE_GUARANTEED_COLONIES: "거주 가능 행성 보장"
 FE_GUARANTEED_COLONIES_TOOLTIP: "§H$FE_GUARANTEED_COLONIES$§!\n플레이어의 시작 성계 근처에 모성과 같은 유형의 거주 가능 행성이 생성되는 수를 설정합니다.\n\n§R경고:§! 이 옵션을 비활성화하면, 모성 근처에서 거주 가능 행성을 찾지 못할 수도 있습니다."
 FE_VICTORY: "승리 연도"
 FE_VICTORY_TOOLTIP: "§H$FE_VICTORY$§!\n진행 중인 ['concept_endgame_crisis'] 또는 ['concept_war_in_heaven']이 없을 경우, 게임이 몇 년도에 마무리되는지 설정합니다. 이때 §I점수§!가 가장 높은 제국이 승리합니다. 단, 해당 연도에 도달해도 계속해서 플레이할 수 있습니다.\n\n이 슬라이더를 최대로 설정하면, 시간으로 인한 승리가 전면 비활성화됩니다."
 FE_END_GAME: "종반 게임 시작 연도"
 FE_END_GAME_TOOLTIP: "§H$FE_END_GAME$§!\n['concept_endgame_crises']나 ['concept_fallen_empire_awakening']과 같은 게임 종반 이벤트의 발생 가능 연도를 설정합니다."
 FE_TECH_SPEED: "기술 비용"
 FE_TECH_SPEED_TOOLTIP: "§H$FE_TECH_SPEED$§!\n일반 제국의 ['concept_technologies'] 획득 속도를 설정합니다."
 FE_TECH_SPEED_DIFFICULTY_SCALE: "난이도 조정 기술 비용"
 FE_TECH_SPEED_DIFFICULTY_SCALE_TOOLTIP: "§H$FE_TECH_SPEED_DIFFICULTY_SCALE$§!\n선택한 난이도가 ['concept_technologies'] 연구 비용에 주는 영향을 설정합니다. 더욱 발전된 기술일수록 더 많은 영향을 받습니다.\n\n설정값을 높이면, 난이도가 높을수록 게임이 어려워집니다."
 DIFF_TECH_SCALING_OFF: "끄기"
 DIFF_TECH_SCALING_LOW: "낮음"
 DIFF_TECH_SCALING_NORMAL: "보통"
 DIFF_TECH_SCALING_HIGH: "높음"
 DIFF_TECH_SCALING_EXTREME: "매우 높음"
 DIFF_TECH_SCALING_OFF_TOOLTIP: "§H$DIFF_TECH_SCALING_OFF$§!\n게임 난이도가 ['concept_technology'] 비용에 영향을 주지 않습니다."
 DIFF_TECH_SCALING_LOW_TOOLTIP: "§H$DIFF_TECH_SCALING_LOW$§!\n난이도가 ['concept_technology'] 비용에 작은 영향을 줍니다. 기술의 등급이 높을수록 비용이 더욱 증가합니다."
 DIFF_TECH_SCALING_NORMAL_TOOLTIP: "§H$DIFF_TECH_SCALING_NORMAL$§!\n난이도가 ['concept_technology'] 비용에 적당한 영향을 줍니다. 기술의 등급이 높을수록 비용이 더욱 증가합니다."
 DIFF_TECH_SCALING_HIGH_TOOLTIP: "§H$DIFF_TECH_SCALING_HIGH$§!\n난이도가 ['concept_technology'] 비용에 큰 영향을 줍니다. 기술의 등급이 높을수록 비용이 더욱 증가합니다."
 DIFF_TECH_SCALING_EXTREME_TOOLTIP: "§H$DIFF_TECH_SCALING_EXTREME$§!\n난이도가 ['concept_technology'] 비용에 매우 큰 영향을 줍니다. 기술의 등급이 높을수록 비용이 더욱 증가합니다.\n\n§R경고:§! 선택한 난이도가 높다면, 종반 위기를 쓰러뜨리기 어렵거나 불가능할 수 있습니다."
 FE_TRADITION_SPEED: "전통 비용"
 FE_TRADITION_SPEED_TOOLTIP: "§H$FE_TRADITION_SPEED$§!\n일반 제국의 ['concept_traditions'] 획득 속도를 설정합니다."
 FE_NAVAL_CAPACITY_MULT: "$NAVY_SIZE_TITLE$"
 FE_NAVAL_CAPACITY_MULT_TOOLTIP: "§H$FE_NAVAL_CAPACITY_MULT$§!\n모든 제국의 함대 수용력을 조절합니다. 다른 모든 함대 수용력 보정치와 곱연산으로 적용됩니다.\n\n§R경고:§! 이 설정을 높이면 종반 게임 성능과 밸런스에 영향을 줄 수 있습니다."
 FE_COMMAND_LIMIT_MULT: "$COMMAND_LIMIT$"
 FE_COMMAND_LIMIT_MULT_TOOLTIP: "§H$FE_COMMAND_LIMIT_MULT$§!\n모든 제국의 지휘 한계치를 조절합니다. 다른 모든 지휘 한계치 보정치와 곱연산으로 적용됩니다.\n\n§R경고:§! 이 설정을 변경하면 게임 밸런스에 영향을 줄 수 있습니다."
 FE_CRISES: "위기 강도"
 FE_CRISES_TOOLTIP: "§K위기 강도§!\n['concept_endgame_crises']의 함대 전투력을 설정합니다. 설정값이 높을수록 종반 위기가 더욱 위험해집니다.\n\n§I위기 유형§!을 §I모두§!로 설정하면, 플레이어가 각 종반 위기에서 생존할 때마다 위기 강도 값이 2배 높아집니다.\n\n§Y$DIFFICULTY_ENSIGN$ 난이도§! 이상일 경우, §Y중반 위기§! 또한 위기 강도의 영향을 받습니다."
 FE_PRIMITIVE_WORLDS: "초광속 이전 문명 및 준지성체 종족"
 FE_PRIMITIVE_WORLDS_TOOLTIP: "§H$FE_PRIMITIVE_WORLDS$§!\n은하의 ['concept_preftl_civilizations'] 및 ['concept_presapient_species']의 생성을 설정합니다.\n\n설정값이 높을수록 은하 생성 시 해당 문명 및 종족이 생성될 확률이 증가합니다."
 FE_LOGISTIC_CEILING: "로지스틱 성장 상한치"
 FE_LOGISTIC_CEILING_TOOLTIP: "§H$FE_LOGISTIC_CEILING$§!\n행성이 로지스틱 곡선의 중간 구간에 있을 때, 팝 성장이 받는 보너스를 설정합니다. 설정값이 높을수록 팝이 더 빠르게 성장합니다.\n\n§R경고:§! 설정값을 높이면 게임 후반 성능 및 밸런스에 영향을 줄 수 있습니다."
 FE_GROWTH_SCALE: "성장 요구치 비례"
 FE_GROWTH_SCALE_TOOLTIP: "§H$FE_GROWTH_SCALE$§!\n제국의 팝 수에 따라 팝 성장이 조절됩니다. 설정값이 높을수록 팝이 느리게 성장합니다.\n\n§R경고:§! 설정값을 낮추면 게임 성능 및 밸런스에 중대한 영향을 줄 수 있기 때문에, §Y$FE_LOGISTIC_CEILING$§!를 같이 낮추는 것을 적극 권장합니다."
 FE_LOGISTICS_FLEET_UPKEEP: "함대 유지비 군수 비용"
 FE_LOGISTICS_FLEET_UPKEEP_TOOLTIP: "§H$FE_LOGISTICS_FLEET_UPKEEP$§!\n정박해 있지 않거나 적 영역에 있는 함대의 $r_trade$ 유지비를 조절합니다. 설정값을 높이면 전쟁에서 함대를 유지하는 비용이 커집니다."
 FE_LOGISTICS_PLANET_DEFICIT: "행성 적자 군수 비용"
 FE_LOGISTICS_PLANET_DEFICIT_TOOLTIP: "§H$FE_LOGISTICS_PLANET_DEFICIT$§!\n적자 행성을 보급하는 데 드는 $r_trade$을 조절합니다. 설정값을 높이면 고도로 전문화된 대신 큰 적자를 내는 행성을 보급하는 데 드는 비용이 커집니다. 제국의 다른 행성으로 해당 행성을 보급해도 마찬가지입니다."
 POP_FACTION_SUPPORTERS: "지지자"
