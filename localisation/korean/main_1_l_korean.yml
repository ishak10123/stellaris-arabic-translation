 trait_pc_alpine_preference: "고산 선호"
 trait_pc_alpine_preference_short: "고산"
 trait_pc_alpine_preference_desc: "§L기후 선호도는 유전적 수준에서 아주 오랜 기간에 걸친 진화나 숙련된 유전자 조작에 의해 결정됩니다.§!"
 trait_pc_savannah_preference: "초원 선호"
 trait_pc_savannah_preference_short: "초원"
 trait_pc_savannah_preference_desc: "§L기후 선호도는 유전적 수준에서 아주 오랜 기간에 걸친 진화나 숙련된 유전자 조작에 의해 결정됩니다.§!"
 trait_pc_arctic_preference: "극지 선호"
 trait_pc_arctic_preference_short: "극지"
 trait_pc_arctic_preference_desc: "§L기후 선호도는 아주 오랜 기간에 걸친 진화나 설계, 숙련된 유전자 조작에 의해 결정됩니다.§!"
