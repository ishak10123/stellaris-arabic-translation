 #Cyber Imperial Individualist
 auth_cyber_imperial_individualist: "칩셋 제정"
 auth_cyber_imperial_individualist_desc: "황위 계승자는 황위뿐만 아니라 대대로 내려온 특수 삽입물을 물려받습니다. 이 삽입물에는 선대 황제들로부터 내려온 귀중한 지식이 담겨 있으며, 국가 경영에 관한 온갖 지혜를 전하고 있습니다. 그 열화판이기는 하지만 제국 곳곳에서 같은 기술을 사용해 국민들이 자신의 경험을 후대에 남기고 있습니다."
