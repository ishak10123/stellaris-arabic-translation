 edict_love_letter_virus: "연애편지 바이러스"
 edict_love_letter_virus_desc: "삽입물이 페로몬 등의 화학 물질을 더 많이 생성하게 해, 각계각층의 국민들이 타인을 향해 좀 더 '애정 공세'를 펼치도록 유도합니다."
