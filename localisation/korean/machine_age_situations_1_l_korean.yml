 #Cyber Democratic Individualist
 auth_cyber_democratic_individualist: "동시 투표 민주정"
 auth_cyber_democratic_individualist_desc: "고도로 발달한 신경 보안 프로토콜에 힘입어, 이제 국민들이 각종 정책 결정에 실시간으로 직접 투표할 수 있게 되었습니다.\n\n동시 투표 민주정에서는 모든 국민이 자신들의 대표를 직접 선출하는 선거를 정기적으로 개최합니다."
