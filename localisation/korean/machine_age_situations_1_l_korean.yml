 #Buildings
 building_augmentation_center: "증강 센터"
 building_augmentation_center_desc: "사이버네틱 삽입물을 설치하는 건물입니다. 이 안에는 쇼핑몰과 운영 센터, 정비소도 입점해 있습니다."
 building_augmentation_center_government_desc: "정부 시술소에서는 주민들이 승인된 사이버네틱 삽입물을 골라 설치할 수 있습니다."
 building_augmentation_center_corporate_desc: "사이버네틱에 관해 필요한 것을 전부 갖춘 거대 단지로, 디지털 개인 상점부터 시술 후 케어를 위한 호화 스파까지 없는 것이 없습니다."
 building_augmentation_center_independent_desc: "뒷골목의 사이버닥을 찾아가면 어떤 삽입물도 설치할 수 있지만, 크레딧을 몇 푼 날리는 정도로는 끝나지 않을지도 모릅니다."
 building_augmentation_center_hive_desc: "사이버네틱 삽입물을 장착하는 조립 라인이 끝없이 늘어서 있습니다. 자원 저장소, 운영 센터, 그리고 기계 공장을 겸한 곳입니다."
 building_augmentation_center_creed_desc: "초월 증강 시술의 성지로서, 모여든 신도들은 신성한 융합을 통해 새로운 존재로 거듭납니다."
