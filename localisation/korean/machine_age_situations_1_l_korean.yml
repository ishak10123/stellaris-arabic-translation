 building_cyberdome: "사이버돔"
 building_cyberdome_desc: "증강 시술을 받은 선수들이 등장하는 격렬한 사이버 스포츠 경기를 열어, 모든 제국민에게 즐거움을 선사하는 곳입니다. 강화 신체를 지닌 검투사, 운동선수, 육상 선수들이 국민들의 총애를 얻기 위해 부상을 당하거나 사망할 때까지 경쟁합니다."
