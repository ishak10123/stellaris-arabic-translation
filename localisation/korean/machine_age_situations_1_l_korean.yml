 unlock_edict_neurocasted_spectacles: "$unlock_edict_tt$ ['concept_edict_neurocasted_spectacles']"
 #CORPORATE
 edict_customer_insights: "소비자 조사"
 edict_customer_insights_desc: "방대한 네트워크를 통한 조사와 실시간 데이터 분석을 통해 시장 변동을 그 어느 때보다 빠르게 분석하고 대응할 수 있습니다. 이를 바탕으로 수익성이 가장 높은 제품과 기능에 자원을 집중합니다."
