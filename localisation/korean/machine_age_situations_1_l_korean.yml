 #Cyber Oligarchic Individualist
 auth_cyber_oligarchic_individualist: "오버클럭 과두정"
 auth_cyber_oligarchic_individualist_desc: "전문 분야별 바이오칩에 대한 원격 오버클럭을 통해 생산을 늘립니다. 그 혜택은 지배 계층에게 돌아가, 통치자들이 정치 활동과 여가에 더 많은 시간을 할애할 수 있게 합니다."
