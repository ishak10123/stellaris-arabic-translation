 cyber_everyone_force_tests: "강제 시험 대상자"
 cyber_everyone_force_tests_desc: "시험 대상자를 강제로 모집하면 목표 달성에 도움이 될 것입니다."
 cyber_birth_implants: "영유아 사이버화"
 cyber_birth_implants_desc: "영유아를 대상으로 신속히 사이버네틱 증강을 실시합니다."
 cyber_natural_childhood: "영유아 증강 금지"
 cyber_natural_childhood_desc: "영유아가 증강 시술 없이 자유롭게 자랄 수 있도록 조치합니다."
 AI_control: "AI 감독관"
 AI_control_desc: "AI로 시냅스 반응을 증강해, 주민들을 더 생산적인 작업에 배정합니다."
 moderate_AI_control: "$AI_control$"
 moderate_AI_control_desc: "$AI_control_desc$"
 AI_forced_control: "AI 통제관"
 AI_forced_control_desc: "두뇌의 의사 결정 중추 깊숙한 곳에 삽입물을 설치하면, 정부가 더욱 높은 수준의 통제를 행사할 수 있습니다."
 media_blockade: "언론 차단"
 media_blockade_desc: "완전한 언론 차단으로 정부의 목표에 대한 비판을 일축했습니다."
 helping_hand: "도움의 손길"
 helping_hand_desc: "일손은 많을수록 좋습니다. 실험실에서는 특히 그렇죠."
 armed_forces: "군사 증강"
 armed_forces_desc: "추가 부속지가 장착된 덕분에 군대가 더욱 강해졌습니다."
 state_handouts: "삽입물 지원"
 state_handouts_desc: "이동 약자들을 대상으로 다중 부속지 증강 삽입물을 제공합니다."
 branching_out: "시장 진출"
 branching_out_desc: "다중 부속지 증강물을 가장 높은 가격을 제시하는 구매자에게 제공합니다."
 handy_workers: "노동력 향상"
 handy_workers_desc: "노동자 계층을 대상으로 최첨단 다중 부속지 증강 삽입물을 제공해 노동력을 향상시켰습니다."
 luxury_limbs: "호화 부속지"
 luxury_limbs_desc: "힘 있는 자에게 특권이 따르듯, 엘리트층은 부속지를 늘릴 권리를 더욱 많이 누립니다."
 murdered_martyrs: "시험 대상자 희생 의식"
 murdered_martyrs_desc: "증강 시험으로 피해를 받은 자들의 고통을 끝낼 수 있도록 희생 의식을 치릅니다."
 artificial_pain_relief: "인공 통증 해소"
 artificial_pain_relief_desc: "제약 업계가 어려운 처지에 놓인 사이버 국민을 위해 강력한 진통제를 개발하는 데 집중합니다."
 chained_experiments: "연쇄 실험"
 chained_experiments_desc: "오직 국민만이 시험 참여를 거부할 권리가 있습니다."
 cyber_opposition: "사이버 반대"
 cyber_opposition_desc: "국가가 책임을 부인하자, 대대적인 정치적 반대가 촉발되었습니다."
 cyber_event_bliss_commercial: "상용 쾌락 발생기"
 cyber_event_bliss_commercial_desc: "화학 물질을 통해 쾌락과 행복감을 원할 때마다 느낄 수 있는 삽입물이 상용화되었습니다."
 cyber_event_bliss_underground: "비인가 쾌락 발생기"
 cyber_event_bliss_underground_desc: "버튼만 누르면 쾌락과 건강을 선사하지만 불안정한 삽입물이 수상한 경로를 통해 보급되고 있습니다."
 cyber_event_bliss_regulate: "쾌락 발생기 규제"
 cyber_event_bliss_regulate_desc: "정부는 쾌락 및 회복 장치를 직접 개발하는 대신 기존 제품을 규제하는 방안을 택했습니다."
 cyber_event_worklife_name: "$cyber.615.name$"
 cyber_event_worklife_own: "노동자 메모리 비제한"
 cyber_event_worklife_own_desc: "직장에서나 재택근무 중에 뇌 내 메모리의 일부를 따로 분리할 필요가 없게 됩니다."
 cyber_event_worklife_leave: "노동자 메모리 제한"
 cyber_event_worklife_leave_desc: "산업 스파이 방지를 위해, 직원이 퇴근 시 업무 관련 메모리를 따로 분리하게 합니다."
 cyber_event_worklife_isolate: "노동자 메모리 격리"
 cyber_event_worklife_isolate_desc: "산업 스파이를 방지하는 한편 직원의 윤리관이 고용주와 충돌하지 않도록, 직원들이 업무 관련 메모리와 여가 관련 메모리를 완전히 분리하게 합니다."
 mod_pop_cyborg_specialist_happiness: "사이보그 $pop_cat_specialist$ 행복도"
 cyber_event_parental_control: "전면적 자녀 운동 기능 통제"
 cyber_event_parental_control_desc: "부모에게 미성년 자녀의 운동 기능에 대한 통제권을 부여합니다."
 cyber_event_parental_limited: "제한적 자녀 운동 기능 통제"
 cyber_event_parental_limited_desc: "부모에게 미성년 자녀의 운동 기능 중 달리기 속도와 음향 출력 크기 등 일부 기능에 대한 통제권을 부여합니다."
 cyber_event_parental_enforcers: "집행관 운동 기능 통제"
 cyber_event_parental_enforcers_desc: "부모들의 반대를 무릅쓰고, 운동 기능 통제권을 집행관에게만 부여합니다."
 cyber_event_knowledge_engineering: "공학 지식 이전"
 cyber_event_knowledge_engineering_desc: "공학 관련 전문 지식을 과학자의 정신에 주입합니다. 단, 다른 연구 분야는 포기해야 합니다."
 cyber_event_knowledge_physics: "물리학 지식 이전"
 cyber_event_knowledge_physics_desc: "물리학 관련 전문 지식을 과학자의 정신에 주입합니다. 단, 다른 연구 분야는 포기해야 합니다."
 cyber_event_knowledge_society: "사회학 지식 이전"
 cyber_event_knowledge_society_desc: "사회학 관련 전문 지식을 과학자의 정신에 주입합니다. 단, 다른 연구 분야는 포기해야 합니다."
 cyber_implant_taxes: "삽입물 과세"
 cyber_implant_taxes_desc: "사이버네틱 삽입물의 소재와 생산에 막대한 세금을 부과합니다."
 cyber_implant_taxes_tt: "월간 에너지 크레딧: §G+5%§!\n$pop_cat_cyborg$ 성장 비용: §R+10%§!"
 cyber_reformed_implant_taxes: "삽입물 과세 개혁"
 cyber_reformed_implant_taxes_desc: "사이버네틱 삽입물의 소재와 생산에 대한 세금을 개혁해, 단기 수입을 높입니다."
 cyber_reformed_implant_taxes_tt: "월간 에너지 크레딧: §G+10%§!"
 cyber_market_standards: "삽입물 시장 표준화"
 cyber_market_standards_desc: "저질 사이버네틱 삽입물을 만드는 자들을 처벌해, 시장의 전반적 수준을 높입니다."
 cyber_implant_weapons: "무기 삽입물"
 cyber_implant_weapons_desc: "국민의 개인용 무기 삽입물 설치를 허용합니다."
 cyber_implants_dismantled: "위험 삽입물 해체"
 cyber_implants_dismantled_desc: "살상을 목적으로 만든 삽입물을 전부 수거해, 실용적인 제품으로 다시 만듭니다."
 cyber_implant_hacks: "삽입물 해킹"
 cyber_implant_hacks_desc: "해커가 삽입물 핵심 제어부의 소스 코드를 입수하면, 다른 이들의 삽입물에 접속해 조종할 수 있습니다."
 cyber_counter_hacking: "삽입물 역해킹"
 cyber_counter_hacking_desc: "데이터 다이버들이 우리 제국의 통신망을 통해 불법 삽입물 해킹을 추적합니다."
 cyber_protests: "삽입물 공급 지연 항의"
 cyber_protests_desc: "최근 들어 삽입물 공급이 지연되자, 새로운 증강 삽입물을 계속해서 접하는 데 익숙해진 우리 국민들이 반기를 들었습니다."
 cyber_stop_protests: "시위대 해산"
 cyber_stop_protests_desc: "삽입물 공급 지연에 항의하는 시위대를 해산시키고 있습니다."
 #Policies
 policy_cyberization_standards: "사이버화 표준"
 policy_cyberization_standards_desc: "우리 사회를 위해서는 인구 전체가 삽입물을 장착해야 하지만, 완전한 사이버화를 원하지 않는 국민은 제한적인 사이버화를 선택할 수 있습니다."
 cyberization_standards_full_name: "완전한 사이버화"
 cyberization_standards_full: "$cyberization_standards_full_name$"
 cyberization_standards_full_effect: "정신주의 지도자 특성 획득: §Y$leader_trait_cyborg$§!\n정신주의 팝 특성 획득: §Y$trait_cybernetic$§!"
 cyberization_standards_full_desc: "전 국민이 사이버네틱 삽입물을 빠짐없이 장착하게 합니다.\n\n§E$cyberization_standards_full_effect$§!"
 cyberization_standards_limited_name: "제한적 사이버화"
 cyberization_standards_limited: "$cyberization_standards_limited_name$"
 cyberization_standards_limited_effect: "정신주의 지도자 특성 획득: §Y$leader_trait_limited_cyborg$§!\n정신주의 팝 특성 획득: §Y$trait_limited_cybernetic$§!"
 cyberization_standards_limited_desc: "완전 증강을 원하지 않는 국민은 사이버네틱 삽입물을 일부만 장착할 수도 있습니다.\n\n§E$cyberization_standards_limited_effect$§!"
 #CYBERIZATION STAGE 1
 cyber.100.name: "미래 제어" #Stage 1 - Start event
 cyber.100.desc.shared: "최근 사이버네틱 삽입물 분야에서 이룩한 여러 혁신 덕분에, 언젠가는 우리 사회를 완전히 탈바꿈할 수 있을 것입니다. 유기물 신체의 약점을 제거함으로써 우리의 지능과 속도, 힘을 높일 수 있습니다."
 cyber.100.desc.shared_unplugged: "최근 사이버네틱 삽입물 분야에서 이룩한 여러 혁신 덕분에, 언젠가는 우리 사회를 우리 뜻대로 탈바꿈할 수 있을 것입니다. 유기물 신체의 약점과 기존 증강물의 결함을 제거함으로써 우리의 지능과 속도, 힘을 높일 수 있습니다."
 cyber.100.desc: "$cyber.100.desc.shared$\n\n기업마다 새로운 사업 제안과 매출 전망을 내놓고 있으며, 공직자들은 이처럼 잠재력이 높은 기술은 국가가 나서서 누구나 이용할 수 있게 보장해야 한다고 주장하고 있습니다."
 cyber.100.desc.unplugged: "$cyber.100.desc.shared_unplugged$\n\n기업마다 새로운 사업 제안과 매출 전망을 내놓고 있으며, 공직자들은 이처럼 잠재력이 높은 기술은 국가가 나서서 누구나 이용할 수 있게 보장해야 한다고 주장하고 있습니다."
 cyber.100.desc.megacorp: "$cyber.100.desc.shared$\n\n우리 자회사들은 다양한 사업 제안과 타사 삽입물 생산의 매출 전망을 내놓고 있으며, 이사회에서는 이토록 중요한 기술은 우리가 독점해야 한다고 주장하고 있습니다."
 cyber.100.desc.megacorp_unplugged: "$cyber.100.desc.shared_unplugged$\n\n우리 자회사들은 다양한 사업 제안과 타사 삽입물 생산의 매출 전망을 내놓고 있으며, 이사회에서는 이토록 중요한 기술은 우리가 독점해야 한다고 주장하고 있습니다."
 cyber.100.a: "삽입물 산업을 국유화합시다."
 cyber.100.a.megacorp: "앞으로도 자체 개발로 갑시다."
 cyber.100.a.tt: "$situation_cyberization_triggered_modifier$$cyber_control_government_effects$"
 cyber.100.b: "삽입물 유통을 민영화합시다."
 cyber.100.b.megacorp: "이 사업은 자회사에 맡깁시다."
 cyber.100.b.tt: "$situation_cyberization_triggered_modifier$$cyber_control_corporate_effects$"
 cyber.105.name: "국민에 의한, 국민을 위한"
 cyber.105.desc: "우리 제국에서 개발한 사이버네틱 설계 대부분을 일반 국민들은 이용할 수 없을 것이라며, 자가 개조자들이 분통을 터뜨리고 있습니다.\n\n이들은 설계 도면을 공개하고 환경 규제를 완화하면, 대부분의 국민이 스스로 증강 삽입물을 만들고 수리할 수 있을 것이라고 주장했습니다."
 cyber.105.desc.megacorp: "독립 계약 업체들이 우리가 개발한 사이버네틱 설계는 대부분 이용할 수 없다며 불평하고 있습니다.\n\n이들은 우리가 관련 도면을 제공하고 삽입물 생산에 관한 특허를 완화하면, 삽입물 생산이 개선될 것이라고 주장했습니다."
 cyber.105.a: "규제를 하는 데는 다 이유가 있는 겁니다."
 cyber.105.a.megacorp: "이건 우리 지식 재산입니다."
 cyber.105.a.tt: "§Y$situation_cyberization$§! 상황 보정치가 변화하지 않습니다."
 cyber.105.b: "규제를 완화하세요."
 cyber.105.b.crafters: "국민들이 원하는 걸 만들게 합시다."
 cyber.105.b.megacorp: "오픈소스 도면을 공개하세요."
 cyber.105.b.gov.tt: "§Y$situation_cyberization$§! 상황 보정치 갱신:\n§G추가:§! $cyber_control_independent_effects$\n§R제거:§! $cyber_control_government_effects$"
 cyber.105.b.cor.tt: "§Y$situation_cyberization$§! 상황 보정치 갱신:\n§G추가:§! $cyber_control_independent_effects$\n§R제거:§! $cyber_control_corporate_effects$"
 #Stage 1 Opportunities - Research
 cyber.120.name: "정신 의탁"
 cyber.120.desc: "한 연구진이 우리 모바일 장치에 AI 감독관을 연계하자는 혁신적인 방안을 제시했습니다. 이후에는 감독관을 사이버웨어에 직접 결합할 수도 있을 것입니다.\n\n감독관의 도움을 받는다면, 우리 국민들은 단순 반복 업무가 아니라 더 지적인 과업에 집중할 수 있을 것입니다. 그 과정에서 자율성이 다소 희생되겠지만, 제국의 생산성을 증대할 수 있는 전례 없는 기회를 그냥 지나칠 수는 없습니다."
 cyber.120.a: "생산성보다 중요한 건 없지요."
 cyber.120.a.spiritual: "축복과 같은 제안이로군요."
 cyber.120.b: "자율성을 잃는다니, 대가가 너무 큽니다."
 cyber.120.b.spiritual: "우리는 신성한 길을 벗어나지 않을 것입니다."
 cyber.120.c: "켜고 끌 수 있는 것이라면 받아들이지요."
 cyber.120.d: "실로 엄청난 통제권을 손에 쥐게 되겠군요..."
 #Stage 1 Challenges - Research
 cyber.160.name: "사이버네틱 해리"
 cyber.160.desc: "어떤 신작 드라마가 우리 국민들의 집단적 상상력을 자극해 널리 호평을 받고 있습니다.\n\n사이버네틱 삽입물 사용이 보편화된 세상을 배경으로 하는 이 드라마는 개조 신체로 인한 해리 장애로 트라우마를 겪고 있는 노동자의 이야기를 다루고 있으며, 비극적 결말을 통해 전신 사이버화와 그로 인한 [Owner.Species.GetAdj] 정체성의 말살을 꽤나 노골적으로 비판하고 있습니다.\n\n해당 드라마의 대성공으로 우리 제국의 사이버화 계획에 대한 대대적인 반대 여론이 발생해, 드라마 공개 후 시험 대상자 확보가 60% 감소했습니다."
 cyber.160.a: "홍보 사업을 개시합시다."
 cyber.160.b: "삽입물 규제를 강화하세요."
 cyber.160.c: "관심은 꺼지기 마련입니다."
 cyber.160.d: "드라마를 검열하세요."
 cyber.160.e: "관련 보도를 전부 차단하세요."
 #CYBERIZATION STAGE 2
 cyber.200.name: "증강 센터"
 cyber.200.desc.gov: "얼마간의 정치적 내분 끝에, 사이버네틱 증강물 생산을 다수의 정부 부처가 분담하게 되었습니다. 각 부처가 제 몫을 하나씩 챙겨간 만큼, 앞으로도 서로를 견제할 것이 분명합니다.\n\n어찌 되었든 계획은 이행해야 합니다. 우리 연구 공동체에는 사이버네틱 개발을 위한 거점 역할을 할 $building_augmentation_center$가 최소한 하나 이상 필요합니다."
 cyber.200.desc.cor: "사이버네틱은 한때는 꿈이었지만, 머지않아 현실이 될 것입니다. 그로 인한 이익을 누릴 이들을 꼽자면, 무엇보다 우리 국경 안에 위치한 다수의 기업이겠지요. 그리고 사이버네틱 산업이 성장함에 따라 우리는 점차 빠른 속도로 신제품을 이용할 수 있을 것입니다.\n\n어찌 되었든 계획은 이행해야 합니다. 우리 기업 로비스트 측에 사이버네틱 개발을 위한 거점 역할을 할 $building_upload_center$가 최소한 하나 이상 필요합니다."
 cyber.200.desc.ind: "신경 스냅스 증강 기술에서부터 사이버네틱 미각샘에 이르기까지, 신박한 설계 아이디어가 통신망에서 활발하게 오가고 있습니다. 대부분은 현실성이 없거나 구현 비용이 엄청나겠지만, 다행히 가능성이 엿보이는 아이디어도 있습니다.\n\n어찌 되었든 계획은 이행해야 합니다. 우리 온라인 공동체에 사이버네틱 개발을 위한 거점 역할을 할 $building_augmentation_center$가 최소한 하나 이상 필요합니다."
 cyber.200.a.gov: "건축 허가를 내리세요."
 cyber.200.a.cor: "승인합니다."
 cyber.200.a.ind: "진행하세요."
 cyber.200.a.tt: "§R행동 필요:§!\n§Y$situation_cyberization$§! 상황을 계속 진행하려면 $building_augmentation_center$를 건설해야 합니다.\n\n각 $building_augmentation_center$가 §G200§! $job_augmentor_with_icon$ 직업을 제공합니다.\n\n$job_augmentor_research_effect_desc$"
 cyber.205.name: "시범 사업" #Stage 2 - Start event
 cyber.205.desc.shared: "이제 시범 사업의 범위를 확대해야 할 때가 됐습니다. 사업 확대는 지속적인 지원을 필요로 하며, $building_augmentation_center$가 있는 행성에서만 가능합니다. 하지만 사업에서 얻는 교훈을 통해 생산성을 즉시 개선할 수 있을 것입니다."
 cyber.205.desc.gov: "정부의 지원을 받은 연구 사업으로 소규모 시험을 진행한 결과, 기계적 증강이 생산성 향상으로 이어진다는 점을 확인했습니다.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.cor: "자원자로 이루어진 포커스 그룹에 소규모 시험을 진행한 결과, 기계적 증강이 생산성 향상으로 이어진다는 점을 확인했습니다.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.ind: "자가 개조자들의 보고서를 검토한 결과, 기계적 증강이 생산성 향상으로 이어진다는 점을 확인했습니다.\n\n$cyber.205.desc.shared$"
 cyber.205.a: "엘리트층의 수준을 높이세요."
 cyber.205.a.tt: "$pop_cat_ruler$ 자원 생산량: $building_augmentation_center$가 있을 시 §G+10%§!"
 cyber.205.b: "전문가를 강화하세요."
 cyber.205.b.tt: "$pop_cat_specialist$ 자원 생산량: $building_augmentation_center$가 있을 시 §G+10%§!"
 cyber.205.c: "노동자의 역량을 높입시다."
 cyber.205.c.tt: "$pop_cat_worker$ 자원 생산량: $building_augmentation_center$가 있을 시 §G+10%§!"
 cyber.205.d: "전부 증강합시다."
 cyber.205.d.tt: "£job£ §H직업§!으로 인한 자원: $building_augmentation_center$가 있을 시 §G+5%§!"
 cyber.210.name: "병행 개발"
 cyber.210.desc.gov.rival: "언론에서 정부가 사고 모니터링 마이크로칩 실험에 자금을 대고 있다는 증거를 포착했습니다. 이 장치의 개발이 완료되어 국민들에게 설치되면, 보안과 성격에 관한 내밀한 정보를 상세하게 수집할 수 있습니다."
 cyber.210.desc.cor.rival: "어떤 상표 분쟁 사건에서 법정에 제출된 증거를 통해, 다수의 기업이 소비자의 시신경에 위화감 없이 부착되는 증강 현실 삽입물을 실험해 왔다는 사실이 밝혀졌습니다. 도면에 따르면 이 장치는 이용자에게 도움을 줄 뿐만 아니라, 기업이 이용자의 시각 정보를 탈취할 수 있게 해 주기도 합니다."
 cyber.210.desc.ind.rival: "자가 개조자들은 이미 부속지를 기초적인 기계로 교체하기 시작했습니다. 이들이 이런 시술을 자기 자신에게 행하는 이상, 이들의 안전을 보장할 방법은 없습니다. 그리고 규제 없이 삽입물을 이용할 경우 득보다 실이 많다는 우려가 있습니다."
 cyber.210.a: "이걸 기회로 삼을 수 있겠군요."
 cyber.210.a.tt: "§Y1§!년 동안 §Y$situation_cyberization$§! 상황 진행 속도 §G+25%§!\n\n"
 cyber.210.b: "당장 멈춰야 합니다."
 cyber.210.b.tt: "§Y1§!년 동안 §Y$situation_cyberization$§! 상황 진행 속도 §R-25%§!"
 #Stage 2 Opportunities - Test Results and Rival Sector
 cyber.220.name: "부속지 협응"
 cyber.220.desc: "신경 인터페이스 분야에서 획기적인 발전이 있었습니다. 뇌파 증폭기를 사용하면 제한적이지만 원활하게 인공 부속지를 제어할 수 있습니다. 앞으로는 뇌파 증폭기를 외부 장치 없이 사이버 두뇌에 바로 일체화할 수 있을 것입니다.\n\n1차 시험 대상자들은 민첩성과 물체 조작 방면에서 고무적인 결과를 나타냈고, 전투 숙련도가 향상되었습니다. 전례 없는 기술이긴 하지만 제조 비용의 문제가 있으니 그 혜택을 누가 먼저 누릴 것인지 결정해야 합니다."
 cyber.220.a: "누구보다 도움이 필요한 건 과학자들이지요."
 cyber.220.b: "우리 장병들을 강화하는 데 주력합시다."
 cyber.220.c: "신체적 제한이 있는 이들을 먼저 도와줍시다."
 cyber.220.d: "공짜는 안 됩니다! 가장 높은 가격을 부르는 자들에게 파세요."
 cyber.220.e: "노동자에게 부속지를!"
 cyber.220.f: "엘리트층에게 항상 주도권을 줘야 합니다."
 #Stage 2 Challenges - Test Results and Rival Sector
 cyber.260.name: "허리 접기"
 cyber.260.desc: "새로 개발한 척추 모듈에 대한 시험이 재앙으로 끝났습니다. 삽입물에 장착된 모터의 힘이 너무 강한 탓에 시험 대상자 중 다수가 영구적인 척수 손상을 입은 것입니다.\n\n이 끔찍한 결과가 기록된 이미지가 대중에 유출되어, 향후 있을 시험에 대한 자원자가 급격히 감소했습니다."
 cyber.260.a: "해결책을 찾을 때까지 시험을 전부 중단하세요."
 cyber.260.a.tt: "§Y6§!개월 동안 §Y$situation_cyberization$§! 상황 진행 속도 §R-50%§!"
 cyber.260.b: "피해자 가족에게 보상을 지급하세요."
 cyber.260.c: "자원자를 모집하세요. 안 되면 강제로라도."
 #CYBERIZATION STAGE 3
 cyber.300.name: "강화 개시" #Stage 3 - Start event
 cyber.300.desc: "우리는 지금까지 제국 전역의 주요 도시에 [Owner.Species.GetName] 주민들에게 장착할 기계 삽입물을 비축해 두었습니다. $job_augmentor_plural$들이 설계한 이 장치를 장착하면, 우리의 유기물 신체는 비약적으로 발전할 것입니다.\n\n마침내 우리의 과거를 버리고 사이버네틱의 미래를 맞이할 때가 왔습니다."
 cyber.300.a: "사이버화 개시."
 cyber.300.a.tt: "지도자 특성 획득: §Y$leader_trait_cyborg$§!\n팝 특성 획득: §Y$trait_cybernetic$§!\n\n$job_augmentor_growth_effect_desc$\n\n증강 속도는 상황 접근 방식과 $building_augmentation_center$ 건물 수에 따라 달라집니다."
 cyber.305.name: "사이버네틱 거부자" #Spiritualists are Cybernetic Objectors
 cyber.305.desc.shared: "이들은 아주 기초적인 삽입물마저 달지 않아, 점차 고도로 연결되는 우리 사회에서는 생활하는 것 자체가 어렵습니다.\n\n전 국민의 전면적인 삽입물 설치를 의무화하면 이들을 사회에 통합시킬 수 있지만, 분명히 불만이 제기될 것입니다."
 cyber.305.desc: "[Owner.Species.GetFleshTypeCyberCreed]의 기계화에 반대하는 종교 집단들이 우리 제국의 전인구 사이버화 사업을 거부하고 나섰습니다. $cyber.305.desc.shared$"
 cyber.305.desc.spiritualist: "당연한 일이지만, [Owner.Species.GetFleshTypeCyberCreed]의 기계 융합에 반대하는 신도들이 우리 제국의 전인구 사이버화 사업을 거부하고 나섰습니다. $cyber.305.desc.shared$"
 cyber.305.desc.none: "[Owner.Species.GetFleshTypeCyberCreed](과)와 기계 사이의 융합이 과연 윤리적인가는 오래전부터 논쟁되어 왔습니다. 안타깝게도 사이버화로 인해 효율성이 증가함에 따라, 사이버화를 거부한 이들은 점차 불리한 처지에 놓일 것입니다.\n\n전 국민의 전면적인 삽입물 설치를 의무화하면 아무도 뒤처지지 않겠지만, 분명히 불만이 제기될 것입니다."
 cyber.305.desc.unplugged: "[Owner.Species.GetFleshTypeCyberCreed](과)와 기계를 다시금 융합하는 것이 과연 윤리적인가는 오래전부터 논쟁의 대상이었습니다. 그러나 우리가 설계한 증강 삽입물은 더 이상 우리를 동화시킨 기계의 의지에 속박되지 않아, 그 어느 때보다 효율적입니다. 그렇기에 삽입물을 거부한 이들은 점차 불리한 처지에 놓일 것입니다.\n\n전 국민의 전면적인 삽입물 설치를 의무화하면 아무도 뒤처지지 않겠지만, 분명히 불만이 제기될 것입니다."
 cyber.305.a: "그들 보고 적응하라 하십시오."
 cyber.305.a.materialist: "신앙은 아무 상관 없습니다. 우리는 앞으로 나아갈 것입니다."
 cyber.305.a.spiritualist: "종교계가 적응해야 할 문제입니다."
 cyber.305.a.tt: "$cyberization_standards_full_effect$\n\n정책 이용 가능: §Y$policy_cyberization_standards$§!\n"
 cyber.305.b: "서로 절반씩 양보합시다."
 cyber.305.b.spiritualist: "서로 이해하도록 합시다."
 cyber.305.b.tt: "$cyberization_standards_limited_effect$\n\n정책 이용 가능: §Y$policy_cyberization_standards$§!\n"
 #Stage 3 Opportunities - Treatment of Non-Cyborgs
 cyber.320.name: "가능성의 잉태"
 cyber.320.birth.desc: "삽입물을 신생아에게 설치할 수 있게 되었지만, 그로 인해 갑작스러운 딜레마에 봉착했습니다. 이 획기적인 신생아 증강 기술을 적용하면 우리 종족과 과학 기술 사이의 융합 관계가 영구히 변화할 것입니다. 그 결과 유아기부터 우리에게 내재된 사이버네틱 잠재력이 개방될 것이며, 우리 문명은 그 어느 때보다 높은 경지로 도약할 것입니다.$cyber.320.end.desc$"
 cyber.320.metamorphosis.desc: "최근 우리는 놀라운 혁신을 이룩했습니다. 마이크로칩을 우리 종족의 아이들에게 직접 설치할 수 있게 된 것입니다. 우리 애벌레들은 선천적으로 변태 과정에서 기계 시스템을 흡수하는 능력을 지니고 있습니다. 번데기 단계에서 증강 기술을 적용하면 지금껏 활용하지 못한 사이버네틱 잠재력이 개방될 것이며, 우리 문명은 그 어느 때보다 높은 경지로 도약할 것입니다.$cyber.320.end.desc$"
 cyber.320.lithoid.desc: "삽입물을 새로 결정화된 자손들에게 설치할 수 있게 되었지만, 그로 인해 갑작스러운 딜레마에 봉착했습니다. 이 증강 기술을 적용하면 우리 종족의 아이들이 금속 광물과 자연스럽게 융화될 것입니다. 그 결과 유아기부터 우리에게 내재된 사이버네틱 잠재력이 개방될 것이며, 우리 문명은 그 어느 때보다 높은 경지로 도약할 것입니다.$cyber.320.end.desc$"
 cyber.320.root.desc: "삽입물을 우리 새싹들에게 설치할 수 있게 되었지만, 그로 인해 갑작스러운 딜레마에 봉착했습니다. 이 증강 기술을 적용하면 우리 아이들이 균사망을 통해 전기 신호를 전송할 수 있게 될 것이며, 그 결과 유아기부터 우리에게 내재된 사이버네틱 잠재력이 개방될 것입니다.$cyber.320.end.desc$"
 cyber.320.egg.desc: "삽입물을 갓 부화한 새끼에게 설치할 수 있게 되었지만, 그로 인해 갑작스러운 딜레마에 봉착했습니다. 이 획기적인 증강 기술을 적용하면 우리 종족과 과학 기술 사이의 융합 관계가 영구히 변화할 것입니다. 그 결과 유아기부터 우리에게 내재한 사이버네틱 잠재력이 개방될 것이며, 우리 문명은 그 어느 때보다 높은 경지로 도약할 것입니다.$cyber.320.end.desc$"
 cyber.320.other.desc: "사이버네틱 삽입물을 신생아에게 설치할 수 있게 되었지만, 그로 인해 갑작스러운 딜레마에 봉착했습니다. 이 획기적인 증강 기술을 적용하면 우리 종족과 과학 기술 사이의 융합 관계가 영구히 변화할 것입니다. 그 결과 유아기부터 우리에게 내재한 사이버네틱 잠재력이 개방될 것이며, 우리 문명은 그 어느 때보다 높은 경지로 도약할 것입니다.$cyber.320.end.desc$"
 cyber.320.end.desc: "\n\n그러나 너무 이른 시기부터 사이버네틱 강화에 의존하게 되면, 결국 우리 종족은 본래의 자연적인 상태에서 생존할 능력을 잃게 될지도 모릅니다."
 cyber.320.a: "진화 또한 자연스러운 과정입니다."
 cyber.320.b: "어릴 때는 자연스럽게 자라도록 놔두어야 합니다."
 #Stage 3 Challenges - Treatment of Non-Cyborgs
 cyber.360.name: "전환통"
 cyber.360.desc: "최근 실험적인 신체 개조 시술을 받은 것을 후회한다는 소리가 일부 들려오고 있습니다. 뇌간을 기계 삽입물로 대체함에 따라 실존에 대한 두려움이 지속적으로 느껴진다는 것입니다. 그중 일부는 주기적으로 계속 참을 수 없는 고통을 겪고 있다고 합니다.\n\n그로 인해 배상 요구가 이어지고 있어, 국가의 책임에 관한 우리 정부의 입장을 명확히 해야만 하는 상황입니다."
 cyber.360.a: "극단적인 개조를 금지하세요."
 cyber.360.a.tt: "§Y6§!개월 동안 §Y$situation_cyberization$§! 상황 진행 속도 §R-50%§!"
 cyber.360.b: "희생 의식을 치러 고통을 끝내 줍시다."
 cyber.360.c: "더 강력한 진통제를 지급하세요."
 cyber.360.d: "최하위 계층에서 시험 대상자를 선발하세요."
 cyber.360.e: "정부는 책임이 없습니다."
 #CYBERIZATION STAGE 4
 cyber.405.name: "삽입물 과세" #Government rival
 cyber.405.desc: "규제가 느슨한 증강 산업에서 세금 창출의 기회를 포착한 지방 정부 공직자들이 추세에 뒤쳐지지 않기 위해 앞다퉈 나서고 있습니다. 사이버네틱 삽입물 소재 추출에서부터 최종 설치에 이르는 모든 단계에 광범위한 세금이 부과되고 있습니다.\n\n이러한 규제 및 비용 부담으로 인해 증강 보급 속도가 저해되어, 완전한 사이버화를 향한 여정이 지연되고 있습니다."
 cyber.405.a: "해당 세금을 인정하세요."
 cyber.405.b: "해당 세금을 폐지하세요."
 cyber.405.b.tt: "§Y$situation_cyberization$§! 상황 진행 속도 §G+25%§!\n\n"
 cyber.405.c: "증강 삽입물 과세를 개혁하세요."
 cyber.405.c.tt: "§Y1§!년 동안 §Y$situation_cyberization$§! 상황 진행 속도 §R-10%§!"
 cyber.410.name: "사법 전쟁" #Government rival escalation
 cyber.410.desc: "대중들 사이에서 사이버네틱 삽입물이 빠르게 확산되자, 이러한 추세를 따라잡지 못한 입법부에서 증강 삽입물을 일부라도 제한하기 위해 온갖 수단을 동원하고 있습니다.\n\n최근 제기된 한 법안에서는 우리 국민들이 '삽입물에 집착'하고 있으며 증강 시술을 받을 때마다 '[Owner.Species.GetName] 본연의 정체성으로부터 멀어진다'고 강변하면서, 증강 삽입물의 비율이 정해진 수준을 초과하는 국민의 경우 법의 보호를 받지 못하도록 정하고 있습니다. 삽입물이 어느 수준에 다다르면 [Owner.Species.GetName]보다 기계에 더 가까운 존재가 될 위험이 있다는 것입니다."
 cyber.410.a: "법 제정을 저지하세요."
 cyber.410.a.tt: "§Y1§!년 동안 §Y$situation_cyberization$§! 상황 진행 속도 §G+25%§!"
 cyber.410.b: "타협안을 찾읍시다."
 cyber.410.b.tt: "§Y1§!년 동안 §Y$situation_cyberization$§! 상황 진행 속도 §R-25%§!"
 cyber.415.name: "보증 불가" #Corporate rival
 cyber.415.desc: "증강 삽입물 시장에 반짝 수익을 노린 저질 삽입물이 싼값에 풀리고 있습니다. 이러한 삽입물은 금방 고장 나기 마련이지만, 제조사에서는 고객들에게 어떠한 지원도 하지 않고 있습니다.\n\n널리 알려진 최근 사례에서는 인기 연예인의 심장 조절 삽입물이 무대에서 오작동을 일으켰다고 합니다. 그리고 그 결과는, 안타깝게도 폭발이었습니다."
 cyber.415.a: "시장이 알아서 조절할 겁니다."
 cyber.415.a_industrial: "늘 있는 일 아닙니까?"
 cyber.415.a.tt: "§Y$situation_cyberization$§! 상황 진행 속도 §G+25%§!"
 cyber.415.b: "사용자의 안전을 보장해야 합니다."
 cyber.415.c: "가장 악질인 자들을 골라 처벌합시다."
 cyber.415.c.tt: "§Y$situation_cyberization$§! 상황 진행 속도 §R-25%§!"
 cyber.420.name: "의도된 위험" #Corporate rival escalation
 cyber.420.desc: "최근 수상한 신종 사이버네틱 삽입물들이 인기를 끌고 있습니다. 이 삽입물들은 사용자를 돕는 것이 아니라, 다른 이들을 해치는 용도로 개발된 것들입니다. 독극물 살포기, 나노 교살기, 사이버 두뇌 교란기 등이 거리에 범람하고 있습니다.\n\n찬성론자들은 이러한 삽입물이 호신용으로 필요하다고 주장하지만, 그런 기술은 누구에게도 보탬이 되지 않는다는 주장도 만만치 않습니다."
 cyber.420.a: "시민들이 무장하게 놔두세요."
 cyber.420.b: "이건 너무 위험합니다."
 cyber.420.b.tt: "§Y$situation_cyberization$§! 상황 진행 속도 §R-25%§!"
 cyber.420.b_pacifist: "유해한 삽입물은 전부 해체해야 합니다."
 cyber.420.b.tt_pacifist: "해체한 삽입물을 재료로 삼아, 좀 더... 실용적인 제품을 만듭니다.\n\n"
 cyber.425.name: "제어 소프트웨어 해킹" #Independent rival
 cyber.425.desc: "다수의 해커 집단이 모든 사이버네틱 삽입물을 구동하는 핵심 소프트웨어에 일제히 침투했습니다. 그러더니 요구를 들어주지 않을 경우 코드를 대중에 공개하겠다며 위협하고 있습니다.\n\n현재로서 이들의 결심은 확고해 보입니다. 코드가 공개될 경우 코드를 다시 작성해야 하며, 그로 인한 지연은 우리 제국의 증강 사업에 치명적인 영향을 줄 것입니다."
 cyber.425.a: "돈을 달라는 대로 주세요."
 cyber.425.b: "소프트웨어를 다시 작성합시다."
 cyber.425.b.tt: "§Y1§!년 동안 §Y$situation_cyberization$§! 상황 진행 속도 §R-25%§!"
 cyber.425.c: "한번 해 보라고 하세요."
 cyber.425.c.tt: "우리 측에서 일류 해커들을 미리 확보해 두길 잘했군요."
 cyber.430.name: "믿지 못할 삽입물" #Independent rival escalation
 cyber.430.desc.demands: "보안 침투를 자행한 해커 집단들에게 거액을 주었지만, 어젯밤 늦게 주요 코드 베이스가 모든 공개 정보망에 업로드되었습니다. 그리고 유출에 앞서 이번 공격을 막지 못한 우리 정부의 무능함을 조롱하는 외설적인 화면이 공개되었습니다.\n\n여론은 이미 흉흉해지고 있으며, 사이버네틱 삽입물에 대한 '구매자의 후회'가 눈에 띄게 증가하고 있습니다."
 cyber.430.desc.protest: "삽입물 제어 소프트웨어를 재작성하느라 상당한 시간과 노력이 소모되었으며, 삽입물 생산 속도도 느려졌습니다.\n\n최신형 삽입물에 대한 의존도가 날로 높아지고 있던 국민 중 상당수는 제품 출시 지연에 항의하기 위해 거리로 나섰습니다."
 cyber.430.a: "신제품은 조만간 출시할 예정입니다."
 cyber.430.b: "무시하세요."
 cyber.430.c.demands: "역해킹을 개시하세요."
 cyber.430.c.protest: "시위대를 해산시키세요."
 cyber.21.name: "전인구 증강 완료" #Situation 1 - Last event
 cyber.21.desc: "오늘, 우리 사회는 역사의 전환점을 맞이했습니다. 우리 모두의 신체를 기계 부품과 완전히 통합해 강화할 수 있게 된 것입니다.\n\n나름의 어려움도 있었습니다. 전환 과정도 결코 쉽지 않았습니다. 하지만 지금까지의 과정에서 우리가 잃은 것이 무엇이든 간에, 우리의 새로운 존재는 무한한 가능성을 약속하고 있습니다."
 cyber.21.a: "우리는 더 강해질 것입니다."
 cyber.21.a.start: "§Y$building_augmentation_center$§! 보정치 추가:$TABBED_NEW_LINE$"
 cyber.21.a.end: "전통 트리 효과 완전 잠금 해제: ['tradition_category:tradition_cybernetics']"
 cyber.21.a.gov.tt: "$cyber.21.a.start$$cyber_control_government_effects$\n$cyber.21.a.end$"
 cyber.21.a.cor.tt: "$cyber.21.a.start$$cyber_control_corporate_effects$\n$cyber.21.a.end$"
 cyber.21.a.ind.tt: "$cyber.21.a.start$$cyber_control_independent_effects$\n$cyber.21.a.end$"
 ### CYBERIZATION SITUATION END ###
 ### SOCIETAL EFFECTS EVENT CHAIN START ###
 futureshock_chain_title: "미래 충격"
 futureshock_chain_desc: "우리는 자연이 준 것에 만족하기를 거부하며, 그 대신 유기체 몸의 한계를 넘어서려 노력합니다. 전 국민 삽입물 보급에 따른 문제는 크지 않았으며, 그나마도 쉽게 해결이 가능한 수준입니다. 국민 대다수는 새로운 사이버네틱이 주는 혜택에 매우 기뻐하고 있습니다.\n\n우리는 진정으로 위대한 도약을 목전에 두고 있습니다. 앞으로 어떤 일이 펼쳐질지 두고 볼 일입니다."
