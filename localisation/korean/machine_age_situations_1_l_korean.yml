 #Cyber Imperial Collectivist
 auth_cyber_imperial_collectivist: "네트워크 제정"
 auth_cyber_imperial_collectivist_desc: "제국 네트워크를 통해 모든 국민이 완전히 새로운 유형의 오락을 접할 수 있게 되었습니다. 수도에 거대한 $building_cyberdome$을 건설한 뒤, 증강 시술을 받은 운동선수들이 등장하는 격렬한 사이버 스포츠 경기를 열어 다양한 행성에 중계하는 것입니다."
