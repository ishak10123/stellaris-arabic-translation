 state_censorship: "국가 검열"
 state_censorship_desc: "반대 의견을 무자비하게 탄압하는 바람에 불만이 속출하고 있습니다."
 cyber_state_censorship: "사이버 검열"
 cyber_state_censorship_desc: "어떤 인기 드라마를 금지한 일로 정부의 지나친 조치에 대한 분노가 촉발되었습니다."
 cyber_victim_compensation: "피해자 보상"
 cyber_victim_compensation_desc: "실험적인 증강 시도가 실패로 돌아가면서 피해를 입은 이들의 가족에게 보상을 지급했습니다."
 cyber_anti_faith: "차갑고 단단한 강철"
 cyber_anti_faith_desc: "우리는 믿음에 기반한 추측을 멀리하고, 사이버화 계획을 지체 없이 추진하기로 결정했습니다."
 cyber_rulers_force_tests: "강제 시험 대상 엘리트"
