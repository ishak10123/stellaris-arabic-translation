 #Cyber Oligarchic Collectivist
 auth_cyber_oligarchic_collectivist: "수면 근로 과두정"
 auth_cyber_oligarchic_collectivist_desc: "최근 두뇌 고도화 기술의 발달로, 노동자를 수면 중에도 제어할 수 있게 되었습니다. 대상자의 신경 통로를 서버에 연결한 뒤, 뇌에 연산 작업을 할당하거나 대상자의 신체를 움직여 반복 작업을 수행하는 것입니다. 말 그대로 꿈의 직장이군요."
