 cyber.social_consequences.tt: "현재 진행 중인 §Y사이버네틱 사회 전환§!에 영향을 줍니다.\n\n" #Standard tooltip to indicate that the Individualism/Collectivism variables are changed
 #FIRST EVENT #
 #DEMOCRATIC
 cyber.505.name: "미래 충격"
 cyber.505.desc.gov: "우리 국민에 대한 신체 증강은 효율적인 제조 공정과 의사 결정 과정을 바탕으로 이룩한 성과였습니다. 우리는 서로 다른 다양한 목소리를 들었고, 그들의 우려를 해결했습니다. 이제 §Y[root.GetSpeciesAdj]§! 주민 모두 자신의 삶을 바꿀 삽입물이 주는 혜택을 평등하게 누릴 수 있게 되었습니다.\n\n논리적으로 생각해 보았을 때, 이다음으로는 증강 기술이 주는 영향을 폭넓게 살펴봐야 마땅합니다. 이 기술을 민주주의 절차에 적용해야 할까요, 아니면 경험 동기화를 통해 노동자들을 고도화하는 데 활용해야 할까요?"
 cyber.505.desc.cor: "협력 기업과의 증강 프로세스를 성공적으로 완료했습니다. 경이로운 수준의 효율성으로 삽입물의 제조와 보급, 설치를 진행했습니다. §Y[root.GetSpeciesAdj]§! 사회의 다양한 목소리를 들었고, 그들의 우려 중 합리적인 부분을 해결해 주었습니다. 이제 우리는 다시 샘솟는 열정을 지니고 미래를 바라볼 준비가 되었습니다.\n\n정부 또한 이제 다음 조치를 취할 준비를 마쳤습니다. 우리가 이룩한 기술적 발전을 이용해 민주주의 절차를 개선할 수도 있고, 삽입물 동기화를 통해 노동자를 강화할 수도 있습니다."
 cyber.505.desc.ind: "공직자들 사이에서 일부 우려가 있었지만, 삽입물에 대한 분산식 보급 모델은 소기의 성과를 거두었습니다. 소형 시술소와 정비소가 거리마다 생겨나, 주민들은 멀리 가지 않고도 증강 시술을 받을 수 있게 되었습니다.\n\n이제는 정부 차원에서 다음 단계로의 진행을 위한 준비를 갖춰야 합니다. 삽입물을 사용해 우리 제국의 민주주의 절차를 강화할 수도 있고, 서로의 경험을 동기화함으로써 우리 자신과 노동자들을 이롭게 할 수도 있습니다."
 cyber.505.a: "민주주의 절차를 강화해야 합니다."
 cyber.505.a.tt: "행복도, 통합, 특성화 증진에 주력합니다."
 cyber.505.b: "우리의 정신을 서로 연결해야 합니다."
 cyber.505.b.tt: "행복도, 노동자 생산량, 안정성에 주력합니다."
 #OLIGARCHIC
 cyber.510.name: "권력 구조 조정"
 cyber.510.desc.gov: "지금과 같은 대전환을 이해하고 대응할 수 있는 것은 오직 사회 지도층뿐입니다. 그 밖의 집단이 나설 경우 제국민들 사이에 혼란과 반목만이 발생할 것입니다. §Y[Species.GetNamePlural]§! 주민들에게 정부 보급 사이버네틱 삽입물을 장착했으며, 우리는 삽입된 칩을 통해 지금껏 잠재되어 있던 가능성을 활용할 기회를 얻게 되었습니다.\n\n이제 우리는 어떠한 사회를 지향해야 할까요? 격렬한 경쟁을 통해 노동자들의 수준을 새롭게 개선해야 할까요, 아니면 수면 중인 정신의 대기 연산력까지 활용하는 사회가 좋을까요?"
 cyber.510.desc.cor: "정부 인가를 받은 기업들이 더욱 개선된 바이오칩을 앞다퉈 출시하고 있는 지금, 우리는 이 놀라운 사회적 변화를 최대한 활용할 수 있는 방안이 무엇일지 결정해야 합니다.\n\n자연을 모방해 오직 강자만이 살아남는 세상을 만들어야 할까요, 아니면 잠들어 있는 뇌에서 지금까지 활용하지 못했던 잠재력을 이끌어 내야 할까요?"
 cyber.510.desc.ind: "결과가 좋든 나쁘든 간에 우리 국민들은 앞으로 스스로 사이버 증강 하드웨어를 만들고 유통할 수 있게 될 것입니다. 덕분에 우리에게는 지금의 상황을 전반적으로 파악하고, 이러한 예기치 않은 사회적 변화를 최대한 활용할 수 있는 방안을 고민할 여유가 생겼습니다.\n\n국민들을 압박해 더 높은 할당량을 채우게 해야 할까요, 아니면 잠을 자면서도 제국을 위해 일하게 해야 할까요?"
 cyber.510.a: "국민들이 우리에게 충성하고 봉사하게 합시다."
 cyber.510.a.tt: "행복도를 희생해 생산력을 늘리는 데 주력합니다."
 cyber.510.b: "잠들어 있는 힘을 활용합시다."
 cyber.510.b.tt: "각 세력을 활용해 더 많은 자원을 얻는 데 주력합니다."
 #DICTATORIAL
 cyber.515.name: "대중 통제"
 cyber.515.desc.gov: "증강 프로그램을 진행하는 과정에서, 우리는 안정성과 통제력을 강화할 수 있는 여러 기회를 포착했습니다. 정부 보급 삽입물을 제조해 국민들에게 설치하면, 우리가 원하는 결과를 내도록 유도하는 알고리즘을 비밀리에 삽입할 수 있을 것입니다.\n\n또한, 개인 삽입물에 각종 모니터링 및 백도어 툴을 추가해 감시 범위를 넓힐 수도 있습니다. 아니면 우리 §Y[Ruler.GetTitle]§!의 눈부신 성품으로 대중에게 영향력을 행사할 수 있게 하는 특수 코드를 설치할 수도 있을 것입니다."
 cyber.515.desc.cor: "우리 협력 기업들이 사이버네틱 삽입물을 대대적으로 제조하고, 보급하고, 설치할 준비를 마쳤습니다. 이제 앞으로 진행될 펌웨어 업데이트는 우리에게 흔치 않은 기회가 될 것입니다.\n\n개인 증강 하드웨어에 감시 툴을 숨겨, 문제의 소지가 있는 국민들을 사전에 축출할 수 있습니다. 아니면 대중에게 우리 §Y[Ruler.GetTitle]§!의 의지를 각인시키는 인격 강제 제어 기능을 개발할 수도 있을 것입니다."
 cyber.515.desc.ind: "종합 병원도, 동네 시술소도, 그리고 해커 집단도 전 국민을 대상으로 사이버네틱 삽입물을 보급하고 설치할 준비를 마쳤습니다. 그러나 이 새롭고 흥분되는 기술에 대한 권한을 그렇게 전면적으로 분산시켜야 할 필요는 없어 보입니다.\n\n우리가 취할 수 있는 조치는 다음과 같습니다. 우선, 비밀 감시 툴을 몰래 설치한 커스텀 개조 부품을 보급함으로써 문제의 소지가 있는 국민들을 추적할 수도 있습니다. 아니면 우리 §Y[Ruler.GetTitle]§!의 의지를 각인시키는 인격 강제 제어 알고리즘을 설치해, 국민들을 무의식 차원에서 위대한 경지로 이끌 수도 있을 것입니다."
 cyber.515.a: "개인 삽입물에 감시 툴을 숨깁시다."
 cyber.515.a.tt: "제국의 안정화와 범죄 감소에 주력합니다."
 cyber.515.b: "인격 강제 제어 기술을 연구하세요."
 cyber.515.b.tt: "노동자 생산력 및 재정착에 주력합니다."
 #IMPERIAL
 cyber.520.name: "미래 충격"
 cyber.520.desc.gov: "정부에서는 전 국민을 효율적으로 증강하는 사업에 막대한 자원을 투입했습니다. 그 결과 정부 인가 증강 센터마다 밤낮으로 삽입물을 설치하고 있으며, 국민들을 대상으로 올바른 사용법과 정비 요령을 교육하고 있습니다.\n\n문제는 삽입물이 지닌 가치를 어디에 활용하는가입니다. 이미 훌륭한 우리 지도층의 자질을 더욱 강화하는 데 주력하는 방법도 있지만, 한편으로는 그 밑에서 일하는 국민들의 불만을 잠재울 오락 거리를 제공하는 수단으로도 활용할 수 있습니다.\n\n통치 집단에게 최고급 삽입물을 보급할 경우, 지도층의 지식을 대대로 보전함으로써 기존과는 비교도 할 수 없는 안정도를 얻게 될 것입니다. 아니면 제국의 수도 행성을 개조해 사이버네틱으로 강화된 선수들이 출전하는 최첨단 유혈 스포츠 경기를 열어 국민들에게 즐길 거리를 제공할 수도 있습니다."
 cyber.520.desc.cor: "공식 인가 기업들이 운영 지침을 준수해 증강 사업을 진행했습니다. 그 결과 전 국민이 사이버네틱 삽입물을 시술받아, 그 어느 때보다 효율적으로 제국을 섬길 준비를 갖추었습니다.\n\n문제는 삽입물이 지닌 가치를 어디에 활용하는가입니다.\n\n통치 집단에게 최고급 삽입물을 보급할 경우, 지도층의 지식을 대대로 보전함으로써 기존과는 비교도 할 수 없는 안정도를 얻게 될 것입니다. 또는 제국의 수도 행성을 개조해 사이버네틱으로 강화된 선수들이 출전하는 최첨단 유혈 스포츠 경기를 열어 국민들에게 즐길 거리를 제공할 수도 있습니다."
 cyber.520.desc.ind: "여러 제국 공직자들이 우려를 제기했지만, 분산식 사이버네틱 삽입물 보급 및 설치 사업은 성공을 거두었습니다. 우리 제국의 행성 곳곳에서 소형 시술소들이 쉼 없이 우리 국민들을 강화하고 있습니다.\n\n이제 문제는 삽입물이 지닌 가치를 어디에 활용하는가입니다. 제국의 지식을 대대로 이어지는 삽입물에 보전할 수도 있고, 그 누구도 보지 못한, 아니, 그 어떤 안구 삽입물도 보지 못한 유혈 사이보그 스포츠 경기를 대중에게 제공할 수도 있을 것입니다."
 cyber.520.a: "제국의 지식을 보전하세요."
 cyber.520.a.tt: "제국 통치자 강화에 주력합니다."
 cyber.520.b: "대중에게 오락 거리를 제공하세요."
 cyber.520.b.tt: "수도 행성의 생산성 및 행복도 강화에 주력합니다."
 #CORPORATE
 cyber.525.name: "삽입물 수익 창출"
 cyber.525.desc.gov: "규모는 크지만 효과는 떨어지는 정부 주도 삽입물 사업이 종료를 앞두면서, 이제 이 전례 없는 제품으로부터 더 많은 수익을 창출할 기회가 생겼습니다. 분석 팀은 두 가지 수익원을 제안했는데, 각기 다른 위험성과 장점이 있습니다.\n\n앞으로 출시되는 모든 안구 삽입물에 반드시 광고를 삽입하게 하는 것이 좋을까요, 아니면 증강 시술 인구를 대상으로 정기 업그레이드를 의무화하는 것이 좋을까요?"
 cyber.525.desc.cor: "고도로 최적화된 우리 기업 인프라에서 예상했듯이, 삽입물 생산과 설치는 뛰어난 효율성을 보여 주고 있습니다. 이러한 신형 삽입물에서 발굴할 수 있는 사업 기회는 그야말로 무궁무진합니다.\n\n그중에서 두 가지 사업 기회가 주목을 받고 있습니다. 둘 중 한 가지만 선택할 수 있지만, 어느 쪽이든 막대한 수익을 안겨 줄 것입니다.\n\n선택지는 다음과 같습니다. 앞으로 출시되는 모든 안구 삽입물에 반드시 광고를 삽입하게 하는 것이 좋을까요, 아니면 증강 시술 인구을 대상으로 정기 업그레이드를 의무화하는 것이 좋을까요?"
 cyber.525.desc.ind: "놀라울 것도 없지만, 마구잡이식 '공동체적' 사이버웨어 구현이 자비로운 최후를 맞이하고 있습니다. 이제 놀라운 가능성을 가진 사이버웨어 신기술의 발전 방향을 수정하고, 그 과정에서 우리 제품의 마진율을 높일 기회가 찾아왔습니다.\n\n앞으로 출시되는 모든 안구 삽입물에 반드시 광고를 삽입하게 하는 것이 좋을까요, 아니면 소프트웨어와 두뇌 정기 업그레이드를 의무화하는 것이 좋을까요?"
 cyber.525.a: "광고 지원 프로토타입 안구 삽입물을 연구하세요."
 cyber.525.a.tt: "무역량 증진과 경제적 기회비용 감축에 주력합니다."
 cyber.525.b: "삽입물 업그레이드 기술을 연구하세요."
 cyber.525.b.tt: "생산성과 관련된 안건, 첩보 및 편의 유지비에 주력합니다."
 ### EVENT POOL ###
 cyber.610.name: "즉각적인 행복"
 cyber.610.desc: "뇌를 자극해 신경 전달 화학 물질 분비를 조절할 수 있는 비인가 삽입물이 노동자 계층에 퍼지고 있습니다. 이 삽입물은 강렬한 쾌락을 생성하고 고통 내성을 높이는 등 다양한 용도로 사용이 가능합니다. 이 불법 삽입물을 역설계해 안정적인 버전을 만들려면 상당한 투자가 필요할 것이며, 자극으로 인한 효과는 영원하지 않다는 것 또한 고려해야 합니다.\n\n이 비인가 프로토타입을 상용화를 위한 제품으로 새롭게 만들까요? 아니면 포장만 다시 해서 판매하거나 삽입물 사용을 규제할까요?"
 cyber.610.a: "안정적인 버전을 개발합시다."
 cyber.610.b: "비인가 프로토타입을 그대로 판매합시다."
 cyber.610.c: "그런 유형의 삽입물을 규제합시다."
 cyber.615.name: "일과 삶의 분리"
 cyber.615.desc: "점차 많은 기업에서 직원들이 업무 시간 중에 경험한 내용을 직장 밖에서는 접근할 수 없는 메모리 영역에 저장하도록 요구하고 있습니다.\n\n이들 기업은 이러한 메모리 격리 기능이 산업 스파이 방지 차원에서 가장 기밀 등급이 높은 업무에만 적용된다고 주장하고 있습니다. 심지어 직원의 개인적인 윤리관이 생산성을 저해하지 않도록, 직장에서는 사적인 경험을 차단하도록 요구하는 기업도 있습니다."
 cyber.615.a: "직원들이 스스로 선택하게 내버려 둬야 합니다."
 cyber.615.b: "일은 직장에서만 신경 쓰는 게 좋겠지요."
 cyber.615.c: "일과 삶은 어느 쪽으로든 철저하게 분리해야 합니다."
 cyber.625.name: "구독 기반 수익 창출"
 cyber.625.desc: "사이버웨어가 우리 생활에 깊이 접목됨에 따라, 수익 창출 모델의 변화가 우리 사회 전체에 극적인 영향을 주고 있습니다. 이러한 추세에 따라 삽입물 제조사들은 가장 기본적인 기능도 구독 서비스로 전환하고 있습니다. 구독료를 미납하면 갑자기 사이버 부속지가 작동하지 않고, 안구가 꺼지는 것입니다. 여러 소비자 단체에서 이러한 관행을 멈출 것을 촉구하고 있습니다."
 cyber.625.a: "사이버웨어 구독 서비스를 금지하세요."
 cyber.625.b: "돈이 없으면 애초에 안 사면 되지 않습니까?"
 cyber.625.c: "필수가 아닌 기능에만 구독을 허용하세요."
 cyber.625.d: "그거 좋은 생각이네요! 적극 시행합시다."
 cyber_subscription_ban: "사이버웨어 구독 서비스 금지"
 cyber_subscription_ban_desc: "사이버웨어 생산 업체가 삽입물 기능을 구독 서비스로 전환하지 못하도록 조치했습니다."
 cyber_subscription_limited: "사이버웨어 구독 서비스 제한"
 cyber_subscription_limited_desc: "사이버웨어 생산 업체가 삽입물 핵심 기능을 구독 서비스로 전환하지 못하도록 조치했습니다."
 cyber_subscription: "§Y$trait_cybernetic$§! 종족 특성에 다음 보정치 추가:\n$t$행복도: §R-5%§!\n$t$['concept_planet_traders']의 $BONUS_WORKFORCE_FOR$: §G+25%§!"
 cyber_subscription_megacorp: "§Y$trait_cybernetic$§! 종족 특성에 다음 보정치 추가:\n$t$행복도: §R-5%§!\n$t$['concept_planet_traders']의 $BONUS_WORKFORCE_FOR$: §G+50%§!"
 cyber.655.name: "예기치 않은 기계 고장"
 cyber.655.desc: "우리 사이버웨어 공학자들이 수익 창출의 기회가 있다며 찾아왔습니다. 삽입물의 내구도를 조금만 낮춰도 사용자들은 필수 부품을 교체하게 되기 때문에, 이를 통해 상당한 수익을 창출할 수 있다는 것입니다.\n\n마모가 가장 자주 발생하는 부분의 소재를 저품질 생체 합금으로 대체하면, 소비자에게 최소한의 피해를 주면서도 부품은 교체해야 하는 방식으로 고장을 일으킬 수 있을 것입니다."
 cyber.655.a: "말도 안 되는 소리!"
 cyber.655.a.tt: "국민들에게 저질 부품을 공급할 수는 없습니다!\n\n"
 cyber.655.b: "재밌군요. 사이버웨어를 더 약하게 만듭시다."
 cyber.655.c: "좋습니다! 하는 김에 가격도 올리세요."
 cyber.655.d: "이번에 얻은 데이터로 사이버화 사업을 개선합시다."
 worse_parts: "저질 부품"
 worse_parts_desc: "국민들이 사이버네틱 부품을 더 자주 교체하도록, 일부러 품질이 낮은 부품을 공급하기로 했습니다."
 worse_parts_effect_tt: "§Y$trait_auto_mod_cyborg$§! 특성을 지닌 $pop_group_unit$ £pop£ §H팝§!으로 인한 $r_trade$: §G+0.5§!"
 optimized_parts: "최적화 부품"
 optimized_parts_desc: "사이버네틱 부품을 지속적으로 혁신하고 개선해, 설치 공정을 간소화하고 속도를 높일 수 있게 되었습니다."
 optimized_parts_effect_tt: "§Y$trait_auto_mod_cyborg$§! 특성을 가진 £pop£ §H팝§!의 $r_energy$ 유지비: §R+0.1§!"
 cyber.660.name: "예기치 않은 사회적 실패"
 cyber.660.desc: "국민들이 사이버네틱 노후화 계획을 알아차린 것 같습니다.\n\n최근 시행한 사이버웨어 품질 및 가격 변경 방침에 분노한 [Owner.GetSpeciesNamePlural] 주민들이 거리를 가득 메우고는 변경 방침을 철회하라고 목소리를 높이고 있습니다."
 cyber.660.a: "알겠습니다. 솔직히 욕심이 과하긴 했어요."
 cyber.660.b: "뭐라는 거죠? 안 들려요!"
 cyber.660.c: "우리가 왜 그래야 하는지..."
 discontent: "불만"
 discontent_desc: "국민들이 최근 사이버웨어 가격 인상과 품질 저하 문제로 시위를 벌이고 있습니다."
 cyber.805.name: "자녀 통제"
 cyber.805.desc: "영유아에게도 뇌 삽입물을 설치하게 되자, 양육자들이 자녀에 대한 통제권 확대를 요구하고 있습니다. 현재 운동 기능 통제는 집행관에게만 허락되지만, 일부 양육자는 그 범위를 양육권자까지 확대하기를 원하고 있는 것입니다.\n\n운동 기능 통제는 신체적 자율성을 명백히 침해하는 행위이지만, 이미 여러 형태의 강제적인 자녀 통제가 허용되고 있습니다. 운동 기능 통제를 제한적으로 허용하는 방안도 있습니다. 아동이 문제 행동을 보일 경우 속도를 느리게 하거나 음향 출력을 낮추는 방식입니다."
 cyber.805.a: "부모가 알아서 하게 두세요."
 cyber.805.b: "통제를 제한적으로 허용합시다."
 cyber.805.c: "원격 신체 통제는 집행관에게만 허용합니다."
 cyber.810.name: "지식 이전"
 cyber.810.desc: "사이버네틱 뇌 삽입물의 발전으로 매력적인 기회가 생겼습니다. 주관적이고 느린 교육 방법에 의존하는 대신 중요 지식을 뇌에서 뇌로 직접 이전할 수 있는 것입니다. 이러한 지식 전수를 위해서는 멸균 처리한 시술실이 필요하기 때문에, 대규모 활용은 힘들 것입니다. 게다가 수령자가 받아들인 정보가 수령자의 기억 중 비슷한 기억을 덮어 써 버리는 문제도 있습니다.\n\n이 기술의 응용 분야 중에서도 과학자 간의 지식 공유가 우리 제국에 가장 큰 영향을 줄 것으로 보입니다. 이러한 공유를 통해 사이버화로 인해 생긴 공학 부문의 부채를 다소 상쇄할 수도 있고, 다른 분야에 집중할 수도 있습니다."
 cyber.810.a: "공학 지식을 이전하세요."
 cyber.810.b: "물리학 지식을 이전하세요."
 cyber.810.c: "사회학 지식을 이전하세요."
 cyber.810.d: "각자의 정신은 각자가 간직하게 합시다."
 cyber.815.name: "애정의 탈중앙화"
 cyber.815.desc: "[root.GetSpeciesNamePlural] 주민 중 상당수는 기꺼이 기성품 사이버네틱스로 삶의 질을 증진했습니다. 하지만 최근 들어 늘어나고 있는 다처다부제 가구에서는 맞춤형 하드웨어에 기반한 비공개 네트워크를 이용하는 추세입니다. 이들 집단은 맞춤형 환경에서 고립된 상태로 살면서, 서로의 감정과 경험을 아주 밀접하게 공유합니다.\n\n일부 사회 복지 단체들과 학자들은 이러한 현상에 박수를 보내면서, 각종 관계와 가족 간 유대를 맞춤형으로 증강하면 모든 이들에게 보탬이 될 것이라는 견해를 피력하고 있습니다. 그러나 다른 한편에서는 사회 전반에서 물러나 고립된 삶을 사는 것에 우려를 표하고 있으며, 심지어 그렇게 살다 보면 주민들이 국소적인 '애정 게슈탈트'에 빠져 개별성을 잃을 수도 있다는 주장도 제기됩니다."
 cyber.815.a: "주민들이 어떻게 살고 사랑하건 우리가 상관할 바는 아니지요."
 cyber.815.a.tt: "앞으로도 맞춤형 하드웨어와 비공개 디지털 공간 이용을 허용합니다."
 decentralized_families: "가족의 탈중앙화"
 decentralized_families_desc: "국민들이 어떤 가정을 이루고 있든, 맞춤형 소프트웨어와 증강 삽입물을 이용하면 가정 내 관계를 훨씬 풍부하게 만들 수 있을 것입니다."
 cyber.815.b: "가정을 회복합시다."
 cyber.815.b.tt: "맞춤형 증강 삽입물보다는 더욱 엄격히 규제되는 해결책을 택할 것입니다."
 centralized_families: "가족의 중앙화"
 centralized_families_desc: "사이버네틱 증강 삽입물과 소프트웨어를 더욱 엄격히 통제해, 가정에서 디지털 울타리를 세우지 못하게 합니다." #as in a richly decorated but enclosed space
 cyber.820.name: "과격한 외형"
 cyber.820.desc: "사회 비주류의 하위 문화는 [root.GetSpeciesAdj]의 역사 전체에 걸쳐 존재했지만, 사이버네틱 강화 기술의 대두로 상황이 변했습니다. 비주류 집단들이 급진적으로 자신들의 모습을 바꾸어, 이제 [root.GetSpeciesAdj]임을 알아보기 힘든 정도가 된 것입니다. 특히 청소년들이 대대적으로 개조한 [root.GetSpeciesHandNamePlural], 3D 바디 페인팅, 장식용 부속지 등에 열광하면서 세대 간 격차가 커지고 있습니다.\n\n찬성론자들은 청소년들이 자신의 참된 모습을 받아들이고 있는 것이라고 강변하며, [root.GetSpeciesAdj]의 동질성을 거부함으로써 자신의 삶에 대한 주체성을 드러낼 뿐이라고 말합니다. 그러나 현 상황을 우려하는 부모들과 전문가들은 이들이 부적응자에 불과하며 우리 사회를 망칠 것이라 주장합니다."
 cyber.820.a: "신체 개조에 엄격한 지침을 적용하세요."
 cyber.820.b: "그것도 다 한때예요. 알아서 수그러들 겁니다."
 radical_image: "과격한 외형"
 radical_image_desc: "우리 사회의 청소년층이 자신들의 모습으로 과감한 실험을 벌이고 있습니다."
 cyber.820.c: "그 청소년들한테 무언가 배울 수 있을지도 모릅니다."
 radical_insights: "과격한 통찰"
 radical_insights_desc: "반문화적 신체 개조자들의 선례를 따라, 우리 사회는 새로운 미용 증강 삽입물을 통해 외형 변화를 실험하고 있습니다."
 cyber.821.name: "과격 시위"
 cyber.821.desc: "현 상황을 우려하는 청년, 활동가, 예술가들이 수천 명 모여 사이버네틱 증강의 자율화를 요구하고 있습니다. 시위 참가자는 전형적인 비주류 [root.GetSpeciesNamePlural] 집단부터 개조된 부속지를 장착하거나, 상체 형태를 바꾸거나, 그 밖에 외계인처럼 형태를 바꾼 주민들까지 다양합니다. 이들은 모두 자신이 선택한 사이버네틱 장식을 이유로 차별을 받은 [root.GetAdj] 국민들과 연대를 주장하고 있습니다."
 cyber.821.a: "우리는 흔들리지 않을 것입니다."
 cyber.821.a.tt: "앞으로도 계속 집단주의적 사이버네틱 방침을 견지합니다."
 radical_image_denied: "과격한 외형 변경 거부"
 radical_image_denied_desc: "최근 사이버네틱 증강물을 통한 표현의 자유를 요구하는 시위가 점차 확산되고 있습니다."
 cyber.821.b: "시위대의 요구 사항을 고려하겠습니다."
 cyber.821.b.tt: "각 국민의 사이버네틱 증강물에 대한 선택의 자유를 어느 정도 확대합니다."
 radical_image_upheld: "과격한 외형 변경 인정"
 radical_image_upheld_desc: "최근 발생한 시위 덕분에 외형을 변경하는 사이버네틱 증강물을 통한 표현의 자유가 일부 보장되었습니다."
 cyber.822.name: "과격한 생리 구조 변경"
 cyber.822.desc: "환자 중 극도로 독특한 사이버네틱 삽입물을 장착하는 경우가 발생하면서, 치료 과정에서 이제까지 경험하지 못한 기괴한 문제가 나타나고 있다며 의료 종사자들이 불만을 제기하고 있습니다.\n\n이처럼 정교하게 신체를 개조한 환자들은 사소한 질병조차 맞춤형 수술 도구나 대대적인 해체와 같은 특수한 치료 방식을 적용해야 합니다. 이러한 치료의 비용은 신체를 개조하지 않은 비[root.GetSpeciesAdj] 환자들에 대한 치료 비용보다 훨씬 높습니다."
 cyber.822.a: "그만한 비용을 치를 가치가 있습니다."
 cyber.822.b: "개조를 그 정도로 허용한 건 실수였군요."
 #Cold Metal
 cyber.830.name: "오한"
 cyber.830.desc: "증강 시술을 받은 집단 중 일부가 기온이 낮아지면 통증이 느껴진다고 합니다. 이 현상은 기온이 어는점 이하로 내려가는 것이 일반적인 §H[cold_planet.GetName]§! 등지에서 특히 심합니다.\n\n금속제 삽입물의 경우 저온 환경에서 착용감이 불편한 것으로 알려져 있기는 하지만, 이 정도로 반응이 심한 것은 말이 되지 않습니다. 이번 일은 우리 노동자 계층에게도 영향을 주고 있습니다."
 cyber.830.a: "임상 시험을 의뢰하세요."
 cyber.830.b: "노동자들이 아픈 건 우리 책임이 아닙니다."
 cyber.830.tooltip: "§Y$trait_cybernetic$§! 종족 특성에 다음 보정치 추가:$TABBED_NEW_LINE$고산 / 극지 / 동토 거주 적합도: §R-20%§!"
 COLD_METAL_PROJECT: "차가운 금속"
 COLD_METAL_PROJECT_DESC: "극저온 기후에 거주하는 국민들이 사이버네틱 삽입물로 인해 심각한 고통을 겪는 사례가 나타나고 있습니다. 임상 시험을 진행하면, 더 많은 데이터를 얻을 수 있을 것입니다."
 cyber.835.name: "임상 시험 보고서"
 cyber.835.desc: "임상 시험을 실시했지만, 사이버웨어의 저온 노출과 환자의 연령, 성별, 직업, 삽입물 유형 사이의 상관관계를 명확히 입증하지 못했습니다.\n\n어떤 의료 전문가는 환자들의 통증이 심리적인 것이라고 주장하면서, 진통제와 행동 치료만 처방해야 한다고 주장합니다. 다른 전문가들은 이 문제를 과소평가해서는 안 된다고 촉구하며, 치료 방법을 개발하기 위한 프로그램에 자금을 투입하자고 합니다."
 cyber.835.a: "아프다고 생각해서 아픈 겁니다."
 cyber.835.b: "연구 사업을 진행하세요."
 cyber.835.c: "환자들을 좀 더 따뜻한 행성으로 옮깁시다."
 cyber.835.tooltip: "§Y$trait_cybernetic$§! 종족 특성에 다음 보정치 제거:$TABBED_NEW_LINE$고산 / 극지 / 동토 거주 적합도: §R-20%§!"
 cyber.840.name: "마음 가는 대로"
 cyber.840.desc: "우리 종족은 대대로 여행자의 삶을 살았습니다. 유목민이자 방랑자였죠. 어떤 이들에게는 여행이 목적지에 가기 위한 수단일 뿐이지만, 우리에게는 여정 그 자체가 목적입니다. 신체 증강 기술의 발달로 우리는 더욱 쉽게 새로운 행성에 도달할 수 있게 되었으며, 그와 동시에 멀리 방황하는 이들을 추적할 수 있게 되었습니다. 모두가 이러한 변화를 반기는 것은 아닙니다.\n\n삽입물을 조작해 종적을 감추고 자기만의 삶을 사는 이들이 점차 늘어나고 있습니다. 지금은 소규모 유행에 불과하지만, 자칫하면 문제가 될 수 있습니다."
 cyber.840.a: "그자들이 옳습니다. 추적 기술을 금지하세요."
 cyber.840.b: "걱정할 이유가 전혀 없습니다."
 cyber.840.c: "추적 불가능한 삽입물을 보급하세요... 물론 대가는 받아야지요."
 cyber.840.d: "불만 세력을 진압하세요. 추적 기술은 계속 유지할 겁니다."
 cyber_wanderers: "쉼 없는 방랑자"
 cyber_wanderers_desc: "추적하기는 어렵지만, 어디서나 찾아볼 수 있습니다."
 cyber_wanderers_tracked: "줄에 메인 신세"
 cyber_wanderers_tracked_desc: "우리 종족은 자유를 중시하며, 어떠한 추적 기술도 단호하게 배척합니다."
 cyber.855.name: "성적 향상" #Idiom: if you achieve a required score, you 'make the grade'; similar to 'make the cut'
 cyber.855.intro.desc: "인지 마이크로프로세서, 강화 AI 개인 교사, 신경 가소성 재생을 촉진할 합성 효소... 미취학 아동에게 시술하는 삽입물만 해도 이 정도입니다."
 cyber.855.gov.desc: "$cyber.855.intro.desc$\n\n기술 변화를 따라가야 한다는 과제가 우리 국가 교육 과정에 큰 부담이 되고 있습니다. 공공 증강물에 의존하는 학생들과 최첨단 장비를 이용할 여유가 있는 가정의 학생들 사이에 성취도 격차가 점차 벌어지고 있습니다.\n\n형평성 있는 체계를 유지하기 위해서는 5년 동안 대대적으로 자원을 투입해야 할 것입니다."
 cyber.855.corp.desc: "$cyber.855.intro.desc$\n\n양질의 교육에는 원래 비용이 소요되지만, 점차 많은 국민이 교육 과정을 따라가는 것조차 힘겨워하고 있습니다. 최첨단 삽입물을 살 수 있는 가정의 학생들과 구형 중고 모델이나 짝퉁 모델에 의존해야 하는 학생들 사이에 성취도 격차가 점점 벌어지고 있습니다.\n\n사회 계층화가 더욱 악화되지 않도록 하려면, 5년 동안 대대적으로 자원을 투입해야 할 것입니다."
 cyber.855.a: "비용 소모가 너무 큽니다."
 cyber.855.b: "교육은 누구나 접근이 가능해야 합니다."
 cyber_education: "증강 교육"
 cyber_education.tt: "이제부터 우리는 건실하고 완전한 증강형 교육 체계를 구축하기 위해 5개년 사업을 개시합니다."
 cyber.860.name: "평등주의적 능력주의"
 cyber.860.desc: "교육 부문 증강에 대한 투자가 엄청난 성과를 거두었습니다.\n\n고품질 사이버네틱이 대중에 보급됨에 따라 학업 분야에서 진정한 능력주의가 구현되어, 사회적 계층과 상관없이 모든 이가 자신의 잠재력을 온전히 실현할 수 있게 되었습니다. 이러한 변화로 인한 혜택은 특히 과학계에서 두드러져, 연구 생산과 혁신이 모든 면에서 개선되었습니다."
 egalitarian_excellence: "평등주의적 능력주의"
 egalitarian_excellence.tt: "양질의 교육과 국민의 완전 증강은 사회적 발전과 물질적 발전을 위한 핵심입니다."
 cyber.865.name: "탁월한 지도자"
 cyber.865.desc: "교육용 증강물에 공적 자금을 투입하지 않기로 한 것은 알고 보니 현명한 결정이었습니다.\n\n우리 사회는 개인의 능력을 숭상합니다. '사회적 격차' 심화에 대한 비판이 산발적으로 등장했지만, 학업 경쟁으로 인해 우리는 은하계에서 교육 수준이 가장 뛰어난 생산적인 지도자를 보유하게 되었습니다."
 exceptional_leaders: "탁월한 지도자"
 exceptional_leaders.tt: "최고의 인재를 개발하는 과정에서 출중한 능력을 갖춘 지도자를 배출할 수 있게 되었습니다."
 cyber.1005.name: "한계 돌파"
 cyber.1005.desc: "'[Species.GetName] 신기록 또 경신' - 오늘날 [Owner.GetAdjective] 스포츠계에서 흔히 찾아볼 수 있는 제목입니다. [GetAthletePlural]들이 더욱 새롭고 정교한 개조 삽입물을 달고 서로 경쟁하는 과정에서, 운동 수행력의 한계가 점차 확대되고 있는 것입니다.\n\n이러한 '강화 선수'를 응원하는 팬들은 신기록 달성 소식에 크게 기뻐하지만, 강화 선수는 일반 선수와 리그를 분리해야 한다고 주장하는 열혈 팬들이 늘어나고 있습니다. 그 밖에도 팀 경기에 참가하는 강화 선수의 수를 제한함으로써, 개조를 받지 않은 내추럴 [GetAthletePlural]들도 기량을 뽐낼 수 있게 하는 방안을 원하는 팬들도 있습니다."
 cyber.1005.a: "내추럴 선수들의 시대는 이제 끝났습니다."
 cyber.1005.a.tt: "강화 선수들을 통해 혁신을 촉진합시다."
 cyber.1005.b: "강화 선수들은 별도의 리그로 보냅시다."
 cyber.1005.c: "강화 [GetAthletePlural]의 수를 제한합니다."
 cyber_athletes: "사이버네틱 강화 선수"
 cyber_athletes_desc: "스포츠 분야에서 강화 선수를 활용하도록 촉진하면, 최첨단 사이버웨어를 현장에서 시험해 볼 수 있습니다."
 cyber_athlete_leagues: "사이버네틱 강화 리그"
 cyber_athlete_leagues_desc: "'내추럴' 선수를 강화 선수와 분리함으로써, 서로 공정한 경기를 치를 수 있게 합니다."
 limited_cyber_athletes: "사이버네틱 강화 선수 제한"
 limited_cyber_athletes_desc: "참가하는 모든 팀이 우승을 노릴 수 있도록, 강화 선수의 수를 규제합니다."
 athlete_plural: "선수"
 cyber.1010.name: "하늘: 광고 문의"
 cyber.1010.desc: "§Y[sky_megacorp.GetName]§!에서 짭짤한 기회를 들고 왔습니다. 자사의 신제품인 에너지 음료 '플라스마 퀜치'를 광고하고 싶다는 것입니다.\n\n이번 광고는 우리 국민들이 하늘을 올려다볼 때마다 안구 삽입물에 직접 투영할 예정입니다. 이렇게 얻은 광고비는 다양한 사회사업에 투자할 수 있을 것으로 보입니다.\n\n사생활을 상당히 침해하는 광고지만, 음료 자체는 매우 맛있으며 독성이 전혀 없다는 장담을 받았습니다."
 cyber.1010.a: "플라스마 퀜치를 마시자!" #Feel free to localize Plasma Quench to sound like a slimy energy drink. No need to make it word for word.
 cyber.1010.b: "하늘은 광고판이 아닙니다!"
 cyber.1010.c: "조건 협상을 시작합시다."
 cyber.1010.d: "관심 없습니다."
 cyber.1015.desc: "§Y[sky_megacorp.GetName]§!에서 온 은하계가 사랑하는 에너지 음료, 플라스마 퀜치에 관해 새로운 제안을 들고 찾아왔습니다. 개조 국민들이 바라보는 하늘을 광고판으로 삼아 좋은 성과를 거둔 이 기업은, 실제 행성에도 광고를 게시하게 해 달라고 요청해 왔습니다.\n\n[sky_megacorp.GetName] 대변인은 이렇게 말했습니다. \"[most_populous.GetName](은)는 광고 위치로 제격입니다!\" 생각해 보면, 모든 국민이 이 놀라운 음료를 접할 수 있도록 하는 것이 더욱 공정하지 않을까요?"
 cyber.1015.a: "플라스마가 흐른다!"
 cyber.1015.a.tt: "§Y[most_populous.GetName]§! 일대에 거대 광고판을 세웁니다."
 cyber.1015.b: "디지털 하늘로 충분합니다."
 cyber.1015.c: "국민들이 다시금 자유롭게 하늘을 보게 합시다!"
 sold_sky_1: "디지털 광고판"
 sold_sky_1_desc: "국민들의 가상 시야를 판매하는 것은 정말 탁월한 결정이었습니다!"
 sold_sky_1_mega: "$sold_sky_1$"
 sold_sky_1_mega_desc: "$sold_sky_1_desc$"
 sold_sky_2: "행성급 광고판"
 sold_sky_2_desc: "이 행성의 엘리트층은 추가 자원을 위해 국민들이 보는 하늘을 팔았습니다."
 sold_sky_2_mega: "$sold_sky_2$"
 sold_sky_2_mega_desc: "$sold_sky_2_desc$"
 cyber.1030.name: "불법 메모리"
 cyber.1030.desc: "감각 및 감정 경험을 제어할 수 있는 삽입물이 다수 출시되자, 증강 시술을 받은 국민들이 가상 생활 이벤트를 현실의 도피처 및 유흥 거리로 삼고 있습니다. 기억 흔적 예술가들은 이론적으로 모든 감정을 자극할 수 있지만, 이러한 작업 방식이 어둠의 길로 빠지고 말았습니다.\n\n여러 기억 흔적 클럽에서 기록자의 극단적인 감정 경험을 담은 기록을 거액을 주고 사들이고 있습니다. 이러한 기록에는 결혼식이나 성행위도 있지만, 자살이나 습격, 살인과 같은 내용도 있습니다. 이에 범죄자들이 자신이 저지른 범죄를 기록하고 피해자의 끔찍한 경험이 담긴 삽입물을 훔쳐 가면서 범죄가 증가했습니다.\n\n이 우려스러운 유행에 어떻게 대처해야 할까요?"
 cyber.1030.a: "해당 산업 자체를 금지합시다. 너무 위험해요."
 cyber.1030.a.tt: "오락용 기억 흔적 산업을 금지합니다."
 cyber.1030.b: "기록 제작에 세금을 부과합시다."
 cyber.1030.b.tt: "오락용 기억 흔적에서 세금을 징수합니다."
 cyber.1030.c: "그런 기록을 소지한 자는 전부 단속하세요."
 cyber.1030.c.tt: "법 집행 기관이 범죄 행동을 기록하는 자를 집중 단속합니다."
 cyber.1030.d: "발칙해서 마음에 드는군. 유행을 인정하세요."
 cyber.1030.d.tt: "국가가 모든 형태의 쾌락을 인정합니다."
 cyber.1030.e: "죽음을 계속해서 경험한다? 참으로 거룩한 일입니다."
 cyber.1030.e.tt: "이것으로 우리 죽음의 사제들이 필멸의 수행자들이 얻은 경험을 이해하고 이들을 인도해 줄 수 있을 것입니다."
 entertainment_crackdown: "기억 흔적 단속"
 entertainment_crackdown_desc: "범죄 활동을 방지하기 위해 오락용 기억 흔적 기록을 금지했습니다."
 endorsed_entertainment: "기억 흔적 인정"
 endorsed_entertainment_desc: "오락용 기억 흔적 기록이 국가 인정을 받은 뒤로 더욱 확산되고 있습니다."
 illicit_entertainment: "불법 기억 흔적"
 illicit_entertainment_desc: "오락용 기억 흔적에 대한 수요를 억제하는 법률이 새로 제정되었습니다."
 decadent_entertainment: "퇴폐적 기억 흔적"
 decadent_entertainment_desc: "국민들이 오락용 기억 흔적이 제공하는 극단적 쾌락에 열광하고 있습니다. 언젠가는 또 다른 유행이 찾아오겠지만 말이죠."
 deadly_entertainment: "죽음의 기억 흔적"
 deadly_entertainment_desc: "이제 우리 죽음의 사제들이 목숨을 취하거나 잃는 일을 직접 경험할 수 있게 되었습니다. 이 경험은 사제들이 일반인, 특히 필멸의 수행자들을 인도하는 데 도움이 됩니다."
 cyber.1055.name: "스파이 게임"
 cyber.1055.desc: "어떤 해군 사관후보생이 어리석게도 기밀 정보를 유출하고 말았습니다. 이 사관후보생은 한 네트워크 전투 시뮬레이션 게임의 골수팬으로, 우리 군 구축함 주포의 각속도에 관해 다른 플레이어와 논쟁을 벌이다 이런 일을 저질렀습니다.\n\n후보생은 자신의 주장을 뒷받침하기 위해 함선의 기밀 도면을 업로드했고, 이 문서는 은하 네트워크를 통해 빠르게 퍼져 나갔습니다. 범인은 잡혔지만, 평의회에서는 이번 일을 계기로 온라인 게임을 전부 금지할 것을 촉구하고 있습니다."
 cyber.1055.a: "어차피 함대를 현대화할 시점이기는 했습니다."
 cyber.1055.b: "네트워크 보안 조치를 강화합시다."
 cyber.1055.c: "평의회가 옳습니다. 게임을 금지하세요."
 cyber.1055.d: "반대 내용의 보고서를 퍼뜨려 유출 정보를 묻어 버리세요."
 cyber_breach_overcome: "스파이 게임: 함대 현대화"
 cyber_breach_overcome_desc: "이미 엎질러진 물입니다. 이번 일을 계기로 함대를 현대화해, 유출된 도면을 무용지물로 만듭니다."
 cyber_breach_forgive: "스파이 게임: 보안 업데이트"
 cyber_breach_forgive_desc: "유출에 대응하기 위해 보안 프로토콜을 업데이트했습니다. 애초에 게이머가 국가 안보를 위협하진 않습니다. 멍청한 실수에 과민 반응 할 필요는 없습니다."
 cyber_breach_ban: "스파이 게임: 전면 금지"
 cyber_breach_ban_desc: "운영 보안을 강화하는 동시에 네트워크 게임을 전면 금지했습니다."
 cyber.1055.leak.tt: "§Y은하 공동체§!의 각 회원국이 §Y720§!일 동안 §Y[Root.GetName]§!에 대한 §H중간§! 수준의 §Y군사§! 정보를 얻습니다."
 cyber.1055.minorleak.tt: "§Y은하 공동체§!의 각 회원국이 §Y360§!일 동안 §Y[Root.GetName]§!에 대한 §R낮은§! 수준의 §Y군사§! 정보를 얻습니다."
 has_tradition_subterfuge_tt: "§Y기만§! 전통 트리를 완료했기 때문에 고를 수 있는 선택지입니다."
 cyber.1205.name: "감각 검열"
 cyber.1205.desc: "새로 출시된 감각 사이버웨어를 이용하면, 이용자가 원치 않는 감각을 차단할 수 있습니다. 불쾌한 냄새부터 차마 보기 힘든 사진에 이르기까지 모든 감각을 조절하거나 가릴 수 있고, 심지어 아예 사용자의 인식 범위에서 삭제할 수도 있습니다. 보수적인 이들은 그러한 감각 검열이 국민들의 의식에 미칠 영향을 점차 우려하고 있습니다."
 cyber.1205.a: "삶의 진실을 외면해서는 안 됩니다."
 cyber.1205.b: "누구나 무지의 행복을 누릴 권리가 있습니다."
 cyber.1205.c: "외형 개선을 위한 보정은 괜찮지만, 검열은 위험합니다."
 cyber.1205.d: "감각을 우리가 선별합시다."
 cyber_censure_truth: "감각 검열: 금지"
 cyber_censure_truth_desc: "현실의 요소를 차단하는 인식 필터를 사용하도록 놔둘 수는 없습니다. 항상 진실을 직시해야 합니다."
 cyber_censure_total: "감각 검열: 전면 허용"
 cyber_censure_total_desc: "현실이 불편하다면, 불편한 요소를 차단하면 그만인 것 아닐까요? 범죄나 참상, 편견 따위를 굳이 볼 필요는 없으니까요."
 cyber_censure_partial: "감각 보정"
 cyber_censure_partial_desc: "삽입물을 통한 인식 보정을 허용했습니다. 이제 국민들이 칙칙한 경험에 생생한 색상과 각종 효과를 입힐 수 있게 되었습니다."
 cyber_censure_authoritarian: "국가 주도 감각 검열"
 cyber_censure_authoritarian_desc: "국민이 인식하는 현실을 정부가 직접 선별합니다. 반체제적 메시지와 활동가들을 충직한 국민들의 삶에서 배제함으로써, 국민들을 잘못된 길로 인도할 자들로부터 지킵니다."
 cyber.1210.name: "잠재의식 메시지"
 cyber.1210.desc: "최근 지하 운동 세력과 야심 찬 기업들이 은밀한 메시지를 사용자의 사이버웨어에 심는 방식의 광고를 자주 활용하고 있습니다. 이에 따라 가짜 기억, 선택적 호르몬 반응, 수면 암시가 점차 보편화되고 있습니다. 일부 정치권 인사는 해당 문제를 거론하며, 이러한 침해성 메시지를 전면 금지하거나 최소한 규제라도 할 것을 촉구하고 있습니다."
 cyber.1210.a: "가만 볼 수 없겠군요."
 cyber.1210.b: "기발한 생각이군! 허용하세요."
 cyber.1210.c: "관련 면허를 도입합시다."
 cyber.1210.d: "이 방법을 이용해 신앙을 전파하세요."
 cyber_subliminhack_banned: "잠재의식 해킹: 금지"
 cyber_subliminhack_banned_desc: "사이버웨어를 통해 은밀한 잠재의식 메시지를 심는 행위를 전면 금지했습니다."
 cyber_subliminhack_allowed: "잠재의식 해킹: 허용"
 cyber_subliminhack_allowed_desc: "사이버웨어를 통해 은밀한 잠재의식 메시지를 심는 행위를 허용했습니다. 시장에서 통용되는 한, 불공정 행위란 없는 겁니다."
 cyber_subliminhack_licensed: "잠재의식 해킹: 면허"
 cyber_subliminhack_licensed_desc: "사이버웨어를 통해 은밀한 잠재의식 메시지를 심을 수 있는 면허를 판매합니다."
 cyber_subliminhack_hallowed: "잠재의식 전도"
 cyber_subliminhack_hallowed_desc: "사이버웨어를 통해 은밀한 잠재의식 메시지를 심어 신앙을 전파합니다."
 cyber.1255.name: "사이버 보안 침입"
 cyber.1255.intro: "최근 여러 기밀 문서를 원격 서버에서 불법 다운로드하는 일이 발생했습니다. 우리 보안 요원들은 주 방화벽과 2차 방화벽 모두 뚫리지 않았다고 확언하고 있으며, 현재까지는 사이버 공격의 증거도 보이지 않습니다.\n\n"
 cyber.1255.gov.desc: "$cyber.1255.intro$결론은 하나뿐입니다. 내부 유출자가 있는 것입니다. 유출된 정보가 민감한 내용인 것으로 볼 때, 보안 등급이 높은 자가 틀림없습니다."
 cyber.1255.hack.desc: "$cyber.1255.intro$결론은 하나뿐입니다. 오픈소스 사이버네틱 증강을 도입하려는 우리의 결정에 흠집을 내려는 내부 유출자가 있는 것입니다."
 cyber.1255.a: "조사를 개시하세요."
 leak_investigation: "유출 조사"
 leak_investigation_desc: "유출의 진상을 규명하려면 사이버네틱 삽입물 사용자를 전부 조사해야 합니다. 다소... 침해가 동반될 가능성이 높습니다."
 cyber.1260.name: "뉴로맨시"
 cyber.1260.desc: "이번 사이버 보안 유출에 대한 조사가 완료되었습니다.\n\n유출은 증강 시술을 받은 고위 공직자들의 신경체가 해킹되었던 것이 원인이었습니다. 이들은 외부 요원의 조작을 받아 자신의 의사에 반해 행동했으며, 해당 사건에 대한 기억이 전혀 없습니다.\n\n원인은 밝혀냈지만 그 배후에는 누가, 아니면 무엇이 있는지는 밝혀내지 못했습니다. 그러나 피해 공직자의 의식에 거짓 데이터를 은밀히 심어 둔다면, 유출의 근원을 추적할 수 있을지도 모릅니다."
 leak_distrust: "등잔 밑의 꼭두각시"
 leak_distrust_desc: "우리 중 누구나 꼭두각시가 될 수 있는데, 국민들이 어떻게 지도층을 신뢰할 수 있겠습니까?"
 leader_trait_hacked: "사이버 꼭두각시"
 leader_trait_hacked_desc: "이 지도자는 불명의 외부 세력에 의해 신경체가 해킹되고 말았습니다."
 hacked_leaders.tt: "무작위 숫자의 사이보그 지도자가 §Y$leader_trait_hacked$§! 특성을 획득했습니다."
 cyber.1265.name: "정신 강탈자" #Playing on the word 'hijacker'
 cyber.1265.desc: "범인을 잡았습니다.\n\n유례없는 사이버 공격의 배후에 있던 범죄자들을 드디어 찾았습니다. 혼란 조장 외에는 아무런 목표도 없는 이 범죄자들은 스스로를 '정신 강탈자'라고 부르며, 우리 보안 시스템을 민망할 정도로 쉽게 우회하고 있었습니다. 주동자는 이미 체포했지만, 이들에게 당한 공직자들을 어떻게 해야 할지 결정해야 합니다.\n\n가장 간단한 해결책은 피해를 받은 삽입물에 맞춤형 방화벽을 설치하는 것입니다. 그보다 깔끔하지만 위험한 방법으로는 강제 재부팅이 있습니다. 해당 지도자의 기본 인지 기능에 접근한 뒤 강제로 '종료'시킨 다음, 새로운 운영 체제를 설치하는 것입니다."
 cyber.1265.a: "방화벽을 세웁시다."
 cyber.1265.b: "공직자들을 재부팅하세요."
 cyber.1265.c: "놈들이 우리를 노리고 있습니다. 벽을 세우세요."
 cyber.1270.name: "새로운 부팅, 새로운 시작"
 cyber.1270.desc: "해킹에 당한 공무원들을 강제로 재부팅했더니 예상치 못한 결과가 발생했습니다. 신경 해킹의 모든 흔적이 깨끗이 없어졌지만, 기존에 축적된 지식과 경험 중 상당 부분이 함께 사라진 것입니다.\n\n이러한 차질에도 불구하고, 재부팅된 지도자들은 '새로운 시작'을 통해 업무적으로도 개인적으로도 다시 태어난 느낌을 마음 깊이 느끼는 것으로 나타났습니다. 해커들 때문에 극단적인 조치를 취한 것이 오히려 우리에게 도움이 된 것일 수도 있습니다."
 rebooted_leaders: "§Y$leader_trait_hacked$§! 특성을 지닌 지도자로부터 §H부정적 특성§!을 모두 제거합니다.\n제거된 특성마다 경험치 §R300§!을 잃습니다."
 leader_hack_resolution: "감시의 결의"
 cyber.1275.name: "신경 방화벽"
 cyber.1275.desc: "우리의 정신은 안전합니다.\n\n두뇌 공학자들이 신경 방화벽 개발에 성공한 것입니다. 현직 공직자과 향후 채용할 공무원에게 모두 보안 유지를 위한 프로그램을 설치할 예정입니다. 프로그램 설치 시 지도층의 기본 인지 기능이 저해되겠지만, 그 덕분에 데이터 보안에 관한 상당한 지식을 얻을 수 있었습니다."
 cyber.1275.a: "안전이 제일이죠."
 leader_trait_firewalled: "신경 방화벽"
 leader_trait_firewalled_desc: "사이버 공격은 막았지만, 지도자들의 학습 능률이 감소하고 말았습니다."
 hacked_and_firewalled_leaders.tt: "모든 사이보그 지도자에게서 §Y$leader_trait_hacked$§! 특성을 제거하고 §Y$leader_trait_firewalled$§! 특성을 적용합니다."
 #FINAL EVENT #
 #DEMOCRATIC
 cyber.1505.name: "사회 2.0"
 cyber.1505.desc.individualist: "우리 사회는 민주적 절차를 바탕으로 세워졌습니다. 그렇기에 이러한 민주적 기초를 단단히 다져야 마땅할 것입니다. 새로 도입된 사이버네틱 장치 덕분에, 이제 모든 국민이 크고 작은 사회적 사안에 직접 투표할 수 있게 되었습니다. 국민 하나하나가 자신의 의견을 표출할 기회를 전에 없던 수준으로 누리게 된 것입니다. 이러한 투표를 통해 얻을 수 있는 데이터의 양은 상상을 초월하며, 그 가능성도 무궁무진합니다."
 cyber.1505.desc.collectivist: "다른 §Y[Species.GetNamePlural]§!에게 자신의 생각이 공개되는 것은 생각만 해도 끔찍한 일입니다. 하지만 이러한 충격은 이내 우리 주위에 있는 이들에 대한 신뢰감과 확신으로 바뀌었습니다. 우리는 옆에 있는 자가 무슨 생각을 하고 있는지 알고 있으며, 그쪽도 우리 생각을 인지하고 있습니다. 아무 말 없이 생각만으로도 즉시 소통이 이루어집니다. 이처럼 명확한 정신 상태를 유지하기 위해, 중요한 내용이 사라지지 않도록 사이버 두뇌에 감정을 무효화하도록 지시했습니다."
 cyber.1505.desc.neutral: "끊임없는 협의와 투표, 그리고 활발한 논의에도 불구하고 우리 제국은 아직 사이버 강화 사회에 관한 입장을 결정하지 못했습니다. 논의 과정이 분열을 초래하는 언쟁으로 변하기 전에 우리 지도층이 개입해야 합니다.\n\n이번 일을 기회로 삼아 사이버네틱을 개조해 민주적 절차를 증진할 수도 있고, 사이버웨어를 통해 국민들이 직접 생각을 공유할 수 있게 하는 급진적인 방안을 추진할 수도 있습니다. 두 번째 방안을 추진하려면, 저절로 떠오르는 각종 생각으로 인해 주변인들에게 방해가 되지 않도록 사이버 두뇌에서 기본 감정을 억제하도록 해야 할 것입니다."
 cyber.1505.a: "실시간 사이버 두뇌 투표를 시행합니다."
 cyber.1505.a.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_individualist']\n$unlock_edict_legislative_chorus$"
 cyber.1505.b: "사이버 두뇌를 연결해 경험을 공유합니다."
 cyber.1505.b.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_collectivist']\n$unlock_edict_self_preservation_override$"
 cyber.1505.c: "$cyber_keep_auth_option$"
 cyber.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 cyber.1510.name: "권력 구조 조정"
 cyber.1510.desc.individualist: "국민들이 남들과 자신을 차별화하고 경쟁하기 원한다는 점이 분명해졌습니다. 이에 우리는 이러한 극단적 경쟁 심리를 뒷받침하기 위해 게임화된 시스템을 마련했습니다. 생산성 향상을 대가로 사회적 신분 상승 기회와 일정한 금전을 제공하는 이 시스템은 국민들의 열망과 잘 맞아떨어질 것입니다."
 cyber.1510.desc.collectivist: "국민들로 하여금 공동체에 대한 소속감을 느끼게 하는 것이 개인의 사회적 신분 상승보다 훨씬 중요합니다. 따라서 국민의 경쟁 심리를 이용하는 대신, 우리는 수면 중인 강화 두뇌의 잠재력을 이용하려고 합니다. 강화 두뇌의 연산력을 사이버네틱 업링크를 통해 기지에 무선으로 연결한 뒤, 휴면기 동안 대상자에게 연산 작업을 할당하는 것입니다."
 cyber.1510.desc.neutral: "우리 국민들은 경쟁적인 사회나 공동체적인 사회 중 어느 쪽으로도 의사를 표명하지 않고 있습니다. 이들을 다스리는 자로서, 우리는 국민들을 위한 최선의 길이 무엇인지 결정할 것입니다.\n\n다른 이들보다 더 두각을 나타내면 경력이 상승하는 게임화된 경쟁 시스템을 만들 수도 있고, 사이버네틱 업링크를 통해 수면 중인 국민들의 뇌를 서버 팜에 연결함으로써 그 연산력을 활용할 수도 있습니다."
 cyber.1510.a: "혜택을 놓고 서로 경쟁하게 합시다."
 cyber.1510.a.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_individualist']\n$unlock_edict_battle_royale$"
 cyber.1510.b: "잠을 자면서도 일하게 합시다."
 cyber.1510.b.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_collectivist']\n$unlock_edict_stately_acclaim$"
 cyber.1510.c: "$cyber_keep_auth_option$"
 cyber.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 cyber.1515.name: "대중 통제"
 cyber.1515.desc.individualist: "§Y[Species.GetAdj]§! 국민들은 증강 시술을 받은 자들이 새로운 방식으로 자신의 정체성을 표현할 수 있는 세상을 맞이하고 있습니다.\n\n그러나 자기표현에 대한 이러한 관대함은 겉보기일 뿐이며, 실제로는 삽입물에 내장된 고도의 감시 알고리즘이 개개인을 모니터링하면서 뇌 시냅스에 연결되는 순간에 반체제적 사상을 포착해 냅니다."
 cyber.1515.desc.collectivist: "다수의 힘과 그 단결력은 적대 세력을 목전에 두었을 때 빛을 발휘합니다. 사이버 강화 시술을 받은 전 §Y[Species.GetAdj]§! 인구는 함께 더 나은 미래를 향해 싸우며, 자기 옆에 있는 이들도 그와 같이 싸울 것이라 믿습니다.\n\n우리 국민들은 철의 의지를 지닌 §Y[Ruler.GetName] [Ruler.GetTitle]§!의 눈부신 성품이 자신들을 이끌어 줄 것이라는 사실을 믿고 안심할 수 있습니다."
 cyber.1515.desc.neutral: "많은 이들이 갈림길에서 갈팡질팡하는 지금, §Y[Ruler.GetName] [Ruler.GetTitle]§!(은)는 증강 기술이 선사하는 이 둘도 없는 기회를 놓치지 말고 결정을 내려야 합니다.\n\n국민들에게 개인적 자유를 일부 허용하는 대신 삽입물을 통해 계속 감시할까요, 아니면 지도자의 눈부신 성품으로 국민들을 감화시킬까요?"
 cyber.1515.a: "자유를 주되 감시를 통해 제한합시다."
 cyber.1515.a.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_individualist']\n$unlock_edict_self_indictment_protocol$"
 cyber.1515.b: "지도자께서 우리를 인도하실 것입니다."
 cyber.1515.b.official.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_official']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.commander.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_commander']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.scientist.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_scientist']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.vacant.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_vacant']\n$unlock_edict_love_letter_virus$"
 cyber.1515.c: "$cyber_keep_auth_option$"
 cyber.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"
 #IMPERIAL
 cyber.1520.name: "제국이여 영원하라"
 cyber.1520.desc.individualist: "제국 정부에서 우리의 역량을 통치 집단의 온존에 집중할 것을 명했습니다. 이제 앞으로 모든 통치자에게 특수한 §Y$r_the_rulerchip$§!을 삽입해, §Y[root.GetName]§!의 [root.GetRulerTitle]로서 접하는 경험을 전부 기록하고 전수할 것입니다. 이 유물 칩은 기존 통치자가 서거하면 그 계승자에게 전달됩니다.\n\n이처럼 $r_the_rulerchip$이 대대로 전해져 내려가는 동안, 그 안에 담긴 방대한 경험은 우리 사회의 기초가 되는 기록이 될 것입니다. 또한, 우리 국민들이 배운 바를 지도자를 위해 활용할 수도 있습니다."
 cyber.1520.desc.collectivist: "고된 노동으로 고생하는 우리 제국 시민들에게 휴식을 제공하기 위해, 거대한 §Y$building_cyberdome$§!을 §Y[root.Capital.GetName]§!에 건설해야 합니다. 이 시설은 새로운 사이버 스포츠의 무대로서, 증강 시술을 받은 선수들이 우리들의 호감과 존경을 두고 경쟁을 벌이는 찬란한 전당이 될 것입니다. 그처럼 격렬한 경기를 보는 대중들 또한 기운을 얻을 뿐만 아니라 §Y[root.GetName]§!에 대한 존경 또한 깊어질 것으로 예상됩니다.\n\n게다가 이러한 경기는 사이버 두뇌에 신경을 통해 직접 송출할 수도 있습니다. 이를 통해 열광적인 관중들이 [root.Capital.GetName]에 찾아와 그 원초적 스릴을 직접 느끼도록 유도할 것입니다."
 cyber.1520.desc.neutral: "사이버네틱 분야에서의 사회적 발전이 현재 기로에 서 있습니다. 소수의 이익을 위해 노력할 것인가, 다수의 이익을 위할 것인가 정해야 합니다. 어느 방안을 택하든 §Y[root.GetName]§!에는 결국 도움이 될 것입니다.\n\n첫 번째 방안으로 특수한 삽입물을 개발해 [root.GetRulerTitle]의 경험을 계승자에게 전수할 수 있습니다. 반대로 증강 사이버 스포츠와 방송 기술에 주력할 경우, 수도인 [root.Capital.GetName]에서 화려한 이벤트를 열 수 있습니다."
 cyber.1520.a: "제국의 지식을 보전하세요."
 cyber.1520.a.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_individualist']\n$create_relic_the_rulerchip$\n$unlock_edict_levied_experience$"
 cyber.1520.b: "수도에서 사이버 스포츠 경기를 개최하고 방송하세요."
 cyber.1520.b.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_collectivist']\n$unlock_building_cyberdome$\n$unlock_edict_neurocasted_spectacles$"
 cyber.1520.c: "$cyber_keep_auth_option$"
 cyber.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 cyber.1525.name: "삽입물 사업"
 cyber.1525.desc.individualist: "§Y[Species.GetAdj]§!(으)로 구성된 포커스 그룹을 조사한 결과, 신형 안구 삽입물에 대한 반응은 긍정적이라고 합니다. 분석 팀에서는 광고 효과가 급속하게 상승했으며 전체 제품군에 걸쳐 매출 전망이 높아졌다고 보고했습니다. 이를 미루어 보아, 정식 제품 출시는 엄청난 잠재력을 보일 것으로 추정됩니다.\n\n사이버네틱의 시대는 이미 도래했습니다. 그리고 우리는 사업 전략을 다시금 새롭게 정비해 사이버네틱 기술을 활용할 준비를 모두 마쳤습니다."
 cyber.1525.desc.collectivist: "총체적 자기 개조에 대한 우리의 의지가 대중으로부터 호응을 얻고 있습니다.\n\n사회 경제적 문제에 대응하는 것은 우리의 기업적 비전과도 일치하며, 앞으로도 우리는 차세대 필수 삽입물을 지속적으로 소개할 예정입니다."
 cyber.1525.desc.neutral: "사이버네틱 기술이 사회에 가져온 방대한 변화를 감안할 때, 일반 소비자가 서로 다른 선택지 앞에서 고민에 빠지는 현상은 어찌 보면 당연한 일입니다. 개인 간의 차별화가 새로운 표준이 될까요, 아니면 집단 전체의 안녕에 주력해야 할까요?\n\n이번 결정은 다른 어떤 결정과도 비할 수 없이 중요하며, 분명히 광범위한 영향을 미칠 것입니다. 단, 결정을 내리지 못하면 수익 창출의 기회도 사라집니다. 반드시 선택을 내려야 합니다."
 cyber.1525.a: "광고 지원 삽입물을 출시하세요."
 cyber.1525.a.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_individualist']\n$unlock_edict_customer_insights$"
 cyber.1525.b: "대대적인 삽입물 업그레이드를 실시하세요."
 cyber.1525.b.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_collectivist']\n$unlock_edict_rolling_updates$\n$unlock_agenda_augmentation_product_launch$"
 cyber.1525.c: "$cyber_keep_auth_option$"
 cyber.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"
 ### SOCIETAL EFFECTS EVENT CHAIN END ###
 ### CYBERIZATION SITUATION START - HIVE VARIANT ###
 situation_cyberization_hive: "사이버화"
 situation_cyberization_hive_type: "승격 상황"
 situation_cyberization_hive_desc: "군체 의식에게는 우월한 신체가 필요합니다. 사이버네틱 삽입물이 있으면, 우리 드론을 더 완벽하게 강화하고 개량할 수 있습니다.\n이제 우리 생체 구조의 한계를 뛰어넘을 때가 왔습니다.\n\n§Y다음 달 삽입물 시술을 받는 팝§!: §G[From.GetCyberPopsPerMonth]§!"
 situation_cyberization_hive_monthly_change_tooltip: "우리 신체를 유기체와 기계가 완벽히 융합하는 사이버네틱 신체로 바꿉니다."
 situation_cyberization_hive_outcome: "인구 전체가 사이버네틱이 됩니다."
 stage_cyberization_hive_effects: "사이버네틱 삽입물을 개발하고 설치함으로써 우리 자신을 바꿔야 합니다."
 cyber.hive_government_shift.tt: "현재 진행 중인 §Y사이버네틱 의식 전환§!에 영향을 줍니다."
 situation_cyberization_culled_drones_desc: "결함 드론 제거"
 situation_cyberization_researching_alternatives_desc: "대안 삽입물 연구"
 situation_cyberization_hive_triggered_modifier: "§Y$situation_cyberization_hive$§! 상황 보정치 추가:\n"
 triggered_opinion_hive_integrated: "통합 군체"
 cyber_hive_imperfect_drones: "불완전 드론"
 cyber_hive_imperfect_drones_desc: "쓸모없는 존재는 없습니다."
 cyber_hive_recycling_implants: "삽입물 재활용"
 cyber_hive_recycling_implants_desc: "신규 드론용 구형 삽입물입니다."
 cyber_hive_recycling_everything: "암울한 효율성"
 cyber_hive_recycling_everything_desc: "신성불가침이란 없습니다. 어느 것도 낭비하지 않습니다."
 cyber_hive_cyber_babies: "사이버네틱 유체"
 cyber_hive_cyber_babies_desc: "신생 드론에게 산란 중에 삽입물을 장착합니다."
 cyber_hive_no_cyber_babies: "점진적 사이버화"
 cyber_hive_no_cyber_babies_desc: "삽입물을 점진적으로 설치해, 발달 중인 드론이 받는 피해를 줄입니다."
 cyber_hive_no_individual_drones: "개별성 금지"
 cyber_hive_no_individual_drones_desc: "개별성을 드러내는 모든 특징을 엄격히 금지합니다."
 cyber_hive_individual_drones: "자기표현"
 cyber_hive_individual_drones_desc: "드론이 자신의 개별성을 표현하는 것을 허가합니다."
 cyber_hive_individual_leader_drones: "자기표현 제한"
 cyber_hive_individual_leader_drones_desc: "오직 최고의 드론에게만 허락된 귀한 선물, 바로 자기 자신이라는 감각입니다."
 ### AUTHORITIES ###
 #VOLITIONAL
 auth_cyber_hive_volitional: "자의적 군체"
 auth_cyber_hive_volitional_desc: "모든 드론은 개별체이며, 각각의 사고는 우리 집단이 살펴볼 새로운 관점을 더해 줍니다. 수많은 의식이 모여, 군체를 그 부분의 합보다 훨씬 위대한 존재로 고양시킵니다."
 concept_auth_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
 gov_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
 gov_cyber_hive_volitional_desc: "$auth_cyber_hive_volitional_desc$"
 #INTEGRATED
 auth_cyber_hive_integrated: "통합 군체"
 auth_cyber_hive_integrated_desc: "모든 이탈을 교정하고, 모든 이상 현상을 억제하고, 통합을 저해하는 모든 요소를 수정합니다. 이 군체 의식에 의한 통제는 절대적입니다. 단일한 의식을 공유하며, 수많은 신체가 그 의지를 이행합니다."
 concept_auth_cyber_hive_integrated: "$auth_cyber_hive_integrated$"
 gov_cyber_hive_integrated: "$auth_cyber_hive_integrated$"
 gov_cyber_hive_integrated_desc: "$auth_cyber_hive_integrated_desc$"
 ### EDICTS ###
 edict_hive_mind_outreach: "군체 의식 범위 확장"
 edict_hive_mind_outreach_desc: "의식이 결심을 굳히면, 그 의지는 빛보다 빠른 속도로 움직입니다."
 concept_edict_hive_mind_outreach: "$edict_hive_mind_outreach$"
 edict_hive_hyper_stimulants: "초자극제"
 edict_hive_hyper_stimulants_desc: "사이버네틱 삽입물이 자동으로 드론에게 강화 약물을 주입해 작업 수행 능력을 높입니다."
 concept_edict_hive_hyper_stimulants: "$edict_hive_hyper_stimulants$"
 edict_hive_mega_construction: "일체화 거대 구조물"
 edict_hive_mega_construction_desc: "이 시행령은 거대 공학 사업에 추가 자원을 투입해 신규 은하 구조물의 건설 속도를 높입니다."
 concept_edict_hive_mega_construction: "$edict_hive_mega_construction$"
 #CYBERIZATION STAGE 1
 cyber.2100.name: "다수의 신체, 하나의 목적"
 cyber.2100.desc: "증강 기술의 본질을 고민하다 보면, 우리는 결국 우리가 지닌 열망이 무엇인지 살피는 자신을 발견하게 됩니다.\n\n사이버화는 목적을 위한 수단입니다. 우리의 의지를 더욱 잘 수행하기 위해 우리의 신체를 최적화하는 방법을 모색하는 것입니다. 증강 기술의 형태는 무한합니다. 그리고 각 기술은 새로운 힘을 부여하지만 또 다른 부담을 초래합니다. 기계 부속지는 무겁고, 사이버 두뇌에는 더 많은 에너지가 필요하며, 민감한 부품에는 지속적인 정비가 필요합니다. 완벽으로 가는 여정에서, 우리는 여러 가지 선택을 내려야 합니다.\n\n우리가 지닌 열망의 핵심은 무엇일까요? 금속 [owner.GetSpeciesHandName](을)를 저 하늘을 향해 뻗어 우리 [Owner.Species.GetFleshTypeCyberCreed]의 한계를 벗어나면서까지 추구해야 할 그 단일한 목표는 과연 무엇일까요?"
 cyber.2100.a: "이해."
 cyber.2100.a.tt: "드론의 지능을 높이는 연구에 주력합니다."
 cyber.2100.b: "지배."
 cyber.2100.b.tt: "드론을 전쟁 도구로 만드는 연구에 주력합니다."
 cyber.2100.c: "풍요."
 cyber.2100.c.tt: "드론의 생산성을 높이는 연구에 주력합니다."
 #CYBERIZATION STAGE 2
 cyber.2200.name: "단일 목표: 증강"
 cyber.2200.desc: "뚜렷한 방향이 없던 생각이 구체적인 계획으로 형태를 잡아 가는 과정에서 시급하게 필요한 것이 생겼습니다. 바로 사이버네틱 프로토타입을 시험하고 개발할 수 있는 전용 실험 공간입니다.\n\n이에 우리는 우리의 [Owner.Species.GetFleshTypeCyberCreed](을)를 분해해 기계와 꿈으로 다시 이어 붙일 수 있는 $building_augmentation_center$를 건립할 것입니다."
 cyber.2200.a: "이제부터 우리의 미래를 건설합시다."
 cyber.2200.a.tt: "§R행동 필요:§!\n§Y$situation_cyberization_hive$§! 상황을 계속 진행하려면 $building_augmentation_center$를 건설해야 합니다.\n\n각 $building_augmentation_center$가 §G200§! $job_augmentor_drone_with_icon$ 직업을 제공합니다.\n\n$job_augmentor_drone_research_effect_desc$"
 cyber.2205.name: "다수의 프로토타입, 하나의 선택"
 cyber.2205.desc: "사이버네틱 연구를 통해 가능성이 엿보이는 다양한 사이보그 프로토타입을 개발했습니다. 예비 시험 결과, 일부 프로토타입은 신체적인 능력이 필요한 작업에서 두각을 나타내며, 그와 달리 더욱 정밀한 작업에 적합한 모델도 있습니다. 각 프로토타입은 저마다 장점과 한계가 있으며, 어느 한 모델도 특출나게 우월하지 않습니다.\n\n이때 엄청난 생각이 떠올랐습니다. 드론을 다각화할 수는 없을까? 우리 신체를 기능에 따라 다양한 형태로 개조하면 어떨까? 더 이상 서로 동일한 존재가 아니게 된다니, 우리로서는 이해하기가 어렵습니다. 하지만 다각화로 인한 효율성 증가는 우리의 조화를 희생할 만한 가치가 있을지도 모릅니다."
 cyber.2205.a: "서로 다른 프로토타입을 다양하게 선정하세요."
 cyber.2205.b: "성능을 골고루 갖춘 프로토타입을 하나만 선정하세요."
 cyber.2220.name: "그들도 우리인가?"
 cyber.2220.desc: "드론 조립 과정에서 가끔은 신체 결함이 있는 드론이 나오기도 합니다. 기형 드론은 처분하는 것이 일반적이지만, 사이버네틱 삽입물 덕분에 이들도 우리 군집에 합류할 수 있게 되었습니다. 드론 수가 늘어나는 것은 바람직하지만, 그러한 드론은 결함 수준에 따라 개별화된 삽입물이 필요합니다. 우리 군체는 더 빨리 성장하겠지만... 완전함에서는 그만큼 멀어질 것입니다."
 cyber.2220.a: "드론은 많을수록 좋은 겁니다."
 cyber.2220.b: "불완전한 군체는 나약합니다."
 cyber.2260.name: "보이지 않는 문제"
 cyber.2260.desc: "일부 시험 대상이 증강 삽입물에 거부 반응을 보이고 있습니다. 신체 자체가 삽입물을 거부해 생명까지 위협하는 부작용이 나타난 것입니다. 부작용의 원인은 지금까지 미처 확인하지 못한 유전적 결함인 것으로 보입니다. 예비 계산 결과, 이 결함을 지닌 드론은 전체 인구 중 5% 정도입니다.\n\n문제를 파악했으니, 이제부터 각 드론을 검사하면 결함에 대응할 수 있습니다. 하지만 이미 결함이 있는 드론은 어떻게 처리해야 할지 알 수 없습니다."
 cyber.2260.a: "결함 드론은 제거하세요."
 cyber.2260.a.tt: "§Y1§!년 동안 §Y$situation_cyberization_hive$§! 상황 진행 속도 §G+20%§!"
 cyber.2260.b: "결함 드론에 삽입물을 제한적으로 장착하세요."
 cyber.2260.b.tt: "사이버화 진행 중에 5%의 인구가 §Y$trait_cybernetic$§! 특성 대신 §Y$trait_limited_cybernetic$§! 특성을 획득합니다."
 cyber.2260.c: "대안 삽입물을 연구하세요."
 cyber.2260.c.tt: "§Y5§!년 동안 §Y$situation_cyberization_hive$§! 상황 진행 속도 §R-50%§!"
 #CYBERIZATION STAGE 3
 cyber.2300.name: "다수의 드론, 하나의 계획"
 cyber.2300.desc: "사이보그 프로토타입 승인이 완료되었고, §Y$building_augmentation_center$§! 또한 건설했습니다. 계획은 준비되었으나, 아직 사이보그 전환을 위한 시행 방침을 결정하지 못했습니다.\n\n모든 드론이 일상 활동을 중단하고 $building_augmentation_center$로 이동해 시술받도록 명령할 수도 있습니다. 이 경우 진행 속도가 빠르지만, 시술이 끝날 때까지 공장이 비게 됩니다. 아니면 일상 활동에 영향이 없도록 드론들의 작업 일정을 반영해, 의무 휴식 시간에 사이보그 전환 시술을 받게 할 수도 있습니다. 진행은 느리겠지만, 기존 활동에 대한 지장은 훨씬 덜할 것입니다."
 cyber.2300.shared.tt: "$job_augmentor_drone_assembly_effect_desc$\n\n증강 속도는 상황 접근 방식과 $building_augmentation_center$ 건물 수에 따라 달라집니다."
 cyber.2300.a: "사이버화를 우선 추진하세요."
 cyber.2300.a.tt: "월간 팝 사이버화: §G+200§!\n$situation_cyberization_hive_triggered_modifier$월간 자원: §R-5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2300.b: "질서를 어지럽히면 안 됩니다."
 cyber.2300.b.tt: "월간 팝 사이버화: §R-100§!\n$situation_cyberization_hive_triggered_modifier$월간 $unity$: §G+5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2320.name: "하나를 두려워하는 다수"
 cyber.2320.desc: "개별체로 구성된 제국들이 우리에게 의혹의 눈초리를 보내면서, 우리가 다원성을 띠게된 것을 두려워하고 있습니다. 우리 사절단에 사이버네틱 삽입물을 장착하면, 더욱 뚜렷하게 구분되는 안면과 성격을 부여해 덜 동질적인 외양을 연출할 수 있습니다.\n\n개별체 제국들은 이러한 노력을 알아줄 것입니다. 심지어 우리와... 공감하게 될지도 모릅니다. 우리를 자신들 중 하나로 여길지도 모르지요."
 cyber.2320.a: "역겹군요."
 cyber.2320.b: "감수할 만한 희생입니다."
 cyber.2320.b.tt: "우리 제국에 대한 비게슈탈트 제국의 우호도가 증가합니다."
 cyber.2320.c: "다른 제국들이 당황하도록 우리 사절단을 더욱 똑같이 만듭시다."
 cyber.2320.c.tt: "우리 제국에 대한 비게슈탈트 제국의 우호도가 감소합니다."
 cyber.2360.name: "하나의 인구, 두 개의 집단"
 cyber.2360.desc: "우리 군체의 사이버화가 순조롭게 진행 중입니다. 일부 인구는 사이버네틱 삽입물을 장착한 반면, 다른 인구는 완전한 생물체의 몸을 유지하고 있습니다. 이처럼 우리 내부에 뚜렷한 차이가 발생한 적은 처음입니다. 이제 드론들은 두 개의 집단 중 하나의 정체성을 지닐 수 있으며, 이러한 분열로 인해 점점 더 자신의 개별성을 느끼고 있습니다.\n\n그중 어떤 드론들은 작은 장신구로 자신을 꾸미거나, 서로를 구분하기 위해 삽입물에 기호를 그려 넣고 있습니다. 매우 흥미롭지만 당혹스러운 변화입니다."
 cyber.2360.a: "변화를 더욱 촉진하세요."
 cyber.2360.b: "식별 표현 사용을 금지하세요."
 cyber.2360.c: "개인 기호는 지도자만 사용하게 하세요."
 #CYBERIZATION STAGE 4
 cyber.2400.name: "다수의 생각, 하나의 뇌"
 cyber.2400.desc: "신경 삽입물을 드론에게 장착하자 예기치 못한 결과가 나타났습니다. 부분적으로 사이버네틱으로 대체된 이들의 뇌가 지배 의식과 동떨어진 개별적 사고를 형성하고 있습니다.\n\n이 기술을 더욱 발전시키면, 드론의 자율적 사고 능력을 키울 수 있습니다."
 cyber.2400.a: "드론이 스스로 사고하게 합시다."
 cyber.2400.b: "개별성은 우리의 통합에 위협이 됩니다."
 cyber.2420.name: "모두를 위한 하나의 최후"
 cyber.2420.desc: "사이버네틱 삽입물로 인해 사망자 처리가 복잡해지고 있습니다.\n\n사망한 드론에게서 삽입물을 수거하면 해당 장치를 재활용해 폐기물을 줄일 수 있습니다. 하지만 이 새로운 절차를 수용하려면 폐기물 처리 절차를 전면 수정해야 하며, 그로 인한 자원 소모 또한 상당할 것입니다."
 cyber.2420.a: "삽입물을 재활용하세요."
 cyber.2420.b: "그만한 비용을 감수할 가치는 없습니다."
 cyber.2420.c: "삽입물을 재활용하세요... 시체도요."
 cyber.2460.name: "평생 사용할 삽입물"
 cyber.2460.desc: "기존 인구에 대한 사이버화는 안정적으로 진행되고 있지만, 새로 태어나는 드론에 대한 사이버화 절차는 새로 수립해야 합니다.\n\n우리가 보유한 기술을 사용하면, 아직 태어나지 않은 [owner.Species.GetSpawnNamePlural]들에게 사이버네틱 삽입물을 장착함으로써 진정한 사이버네틱 종족을 만들 수 있습니다. 빠르고, 쉽고, 효율적인 방안입니다. 하지만 예비 연구 결과에 따르면, 삽입물을 조기에 설치할 경우 해리성 장애, 정신병, 경련, 그 밖의 다양한 발달 장애가 나타날 수 있다고 합니다."
 cyber.2460.a: "금속은 [Owner.Species.GetFleshTypeCyberCreed]보다 강합니다."
 cyber.2460.b: "사이버화 최저 연령을 설정하세요."
 #CYBERIZATION FINISHED
 cyber.2004.name: "다수의 드론, 하나의 의지?"
 cyber.2004.desc: "전환이 끝났습니다. 사이버네틱 삽입물에 대한 시험과 프로토타입 개발, 정비, 마감, 장착을 진행했으며, 우리의 신체는 이제 완벽한 형태로 탈바꿈했습니다."
 cyber.2004.desc.volitional: "$cyber.2004.desc$\n\n이제 우리 드론들에게 별도의 사고 능력이 생겼습니다. 그리고 큰 자유에는 큰 책임이 따릅니다."
 cyber.2004.desc.integrated: "$cyber.2004.desc$\n\n우리 드론들의 정신적 유대가 금속의 사슬로 강화되어, 그 어느 때보다 하나가 되었습니다."
 cyber.2004.desc.neutral: "$cyber.2004.desc$\n\n이 과정에서 우리는 변화의 가능성을 엿보았습니다. 우리는 하나 될 때 강하지만, 자율성을 지닌 드론 또한 나름의 강점이 있을 것입니다."
 cyber.2004.end: "우리 신체가 진화함에 따라, 군체 의식 또한 다른 존재로 변모할 수 있습니다."
 cyber.2004.a: "자의적 군체가 됩니다."
 cyber.2004.a.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_volitional']\n$unlock_edict_tt$['concept_edict_hive_mind_outreach']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.b: "통합 군체가 됩니다."
 cyber.2004.b.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_integrated']\n$unlock_edict_tt$['concept_edict_hive_hyper_stimulants']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.c: "변화할 필요는 없습니다."
 cyber.2004.c.tt: "$cyber.21.a.end$\n$keep_auth_tt$ ['concept_auth_hive_mind']"
 ### Driven Assimilator Cyberization ###
 cyber.2010.name: "목적 실현"
 cyber.2010.desc: "첨단 사이버네틱의 등장으로, 우리의 궁극적인 잠재력을 실현할 수 있게 되었습니다. 지금까지 우리는 겉만 핥고 있었을 뿐입니다.\n\n우리의 전문 지식이 확대되고 기술이 발전함에 따라, 우리 사회도 분명히 변화할 것입니다. 지성체의 완전한 동화가 우리의 운명입니다.\n\n저항해도 소용없습니다. 우리는 은하계의 모든 정신을 포섭할 것입니다."
 cyber.2015.name: "최첨단 동화자"
 cyber.2015.desc: "우리 제국의 유기체 국민들은 기계와의 융합을 통해 완벽에 가까운 경지에 올랐습니다. 이제 첨단 사이버네틱을 우리 문명의 근간에 통합할 때가 왔습니다.\n\n우리 사이보그들의 사고 과정을 간소화하면, '취합 기억'을 형성함으로써 이들의 집단 경험을 투입해 물류 능력을 향상시킬 수 있을 것입니다. 아니면 '신경 합창'의 형성을 촉진해, 사고와 감정적 반응의 다양성을 확대할 수도 있습니다.\n\n어떤 선택을 내리든 우리 제국의 미래에 중대한 영향을 줄 것입니다."
 cyber.2015.a: "우리의 정신을 합칩시다."
 cyber.2015.a.tt: "$change_auth_tt$ ['concept_auth_memory_aggregator']\n\n£pop£ §H유기체 팝§! 동화로 생성되는 §Y자원§!이 추가로 증가\n\n$unlock_edict_tt$['concept_edict_aggregated_memory']"
 cyber.2015.b: "합창을 시작합시다."
 cyber.2015.b.tt: "$change_auth_tt$ ['concept_auth_neural_chorus']\n\n$unlock_edict_tt$ ['concept_edict_choral_harmony']"
 cyber.2015.c: "우린 변하지 않을 겁니다."
 cyber.2015.c.tt: "$keep_auth_tt$ ['concept_auth_machine_intelligence']"
 gov_memory_aggregator: "기억 취합기"
 gov_memory_aggregator_desc: "동화된 주민의 사고 과정을 간소화함으로써 '취합 기억'을 형성해, 모든 행정 및 물류 작업을 크게 개선합니다."
 auth_memory_aggregator: "기억 취합기"
 auth_memory_aggregator_desc: "$gov_memory_aggregator_desc$"
 auth_memory_aggregator_tt: "£pop£ §H유기체 팝§! 동화로 생성되는 자원이 추가로 증가"
 gov_neural_chorus: "신경 합창"
 gov_neural_chorus_desc: "생각의 다양성을 확대하고 감정 반응의 범위를 넓혀, 강력한 만큼이나 아름다운 정신들의 위대한 노래인 '신경 합창'의 생성을 추진합니다."
 auth_neural_chorus: "신경 합창"
 auth_neural_chorus_desc: "$gov_neural_chorus_desc$"
 auth_driven_neural_chorus_tt: "사이보그 지도자 시작 레벨: §G+1§!$NEW_LINE$사이보그 지도자 유지비: §G-25%§! $NEW_LINE$사이보그 팝으로 인한 £unity£ $unity$: §G+0.1§!"
 concept_auth_memory_aggregator: "$gov_memory_aggregator$"
 concept_auth_neural_chorus: "$gov_neural_chorus$"
 edict_aggregated_memory: "취합 기억"
 edict_aggregated_memory_desc: "동화된 주민들의 기억이 쇄도하는 폭풍처럼 몰아칩니다. 이제 우리는 이들의 집단 경험을 마음대로 활용할 수 있습니다."
 edict_choral_harmony: "합창의 화음"
 edict_choral_harmony_desc: "음악을 만들기 위해서는 조화로운 화음이 있어야 합니다. 동화된 주민들의 정신을 하나로 통합합니다."
 concept_edict_aggregated_memory: "$edict_aggregated_memory$"
 concept_edict_choral_harmony: "$edict_choral_harmony$"
