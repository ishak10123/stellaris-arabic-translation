 r_the_rulerchip: "통치자 칩"
 r_the_rulerchip_desc: "이 첨단 증강 삽입물은 과거에 이 칩을 설치했던 이들의 경험을 저장해, 통치자들이 대대로 지식을 축적할 수 있게 합니다."
