 #Static Modifiers
 borrowed_research: "빌려 온 연구"
 borrowed_research_desc: "도용한 연구 결과를 사이버화 사업에 적용한 일로 인해 공분이 확산되고 있습니다."
 researcher_media_relations: "연구비 용도 변경"
 researcher_media_relations_desc: "연구비를 홍보 사업으로 돌립니다."
