 unlock_edict_levied_experience: "$unlock_edict_tt$ ['concept_edict_levied_experience']"
 edict_neurocasted_spectacles: "신경 송출"
 edict_neurocasted_spectacles_desc: "수도에 위치한 사이버돔에서 벌어지는 치열한 스포츠 경기를 사이버 두뇌에 직접 송출함으로써, 국민들의 관심을 수도로 돌립니다. 관람객들은 안전한 포드 속에서 글래디에이터들의 전투를 1인칭으로 체험할 수 있습니다. 1년 내내 경기를 즐겨 보세요!"
 edict_neurocasted_spectacles_effect: "수도 행성 외 팝 행복도: §G+10%§!$DOUBLE_NEW_LINE$§E$building_cyberdome$ 효과:§!$building_cyberdome_edict_effects$"
