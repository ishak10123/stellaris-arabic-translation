 #Cyber Democratic Collectivist
 auth_cyber_democratic_collectivist: "상호 연결 민주정"
 auth_cyber_democratic_collectivist_desc: "의식 인터페이스 기술을 통해 전신 사이보그가 실시간으로 감각 데이터, 정서 반응, 사고 패턴을 공유할 수 있게 되었습니다. 또한 강렬한 외부 반응에 대한 보호 장치로 감정 방화벽을 설치해, 감정 데이터 패킷 공유 시 원치 않는 반응을 걸러냅니다.\n\n상호 연결 민주정에서는 모든 국민들이 자신들의 대표를 직접 선출하는 선거를 정기적으로 개최합니다."
