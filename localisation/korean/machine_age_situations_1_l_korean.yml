 auth_cyber_dictatorial_individualist: "사이버비전 독재정"
 auth_cyber_dictatorial_individualist_desc: "삽입물 설치의 의무화로 더욱 확실한 통제와 법 집행이 가능해지면서, 피지배층에 대한 정부의 장악력이 한층 더 강화되었습니다. 이 정부에서는 '딕테이터-칩'이라 불리는 장치를 통해 착용자를 감시하고, 문제 발생 시 자동으로 당국에 통보합니다."
