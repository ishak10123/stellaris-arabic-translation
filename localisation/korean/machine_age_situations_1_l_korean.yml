 concept_building_cyberdome: "$building_cyberdome$"
 #CORPORATE
 #Cyber Corporate Individualist
 auth_cyber_corporate_individualist: "신경 상업 기업"
 auth_cyber_corporate_individualist_desc: "전광판이나 휴대용 기기 같은 철 지난 도구로는 소비자들의 관심을 붙들어둘 수 없었습니다. 이제 우리는 잠재 고객의 정신을 스캔해 특정한 메시지와 격정적인 호소문을 개인의 뇌에 직접 전송할 수 있게 되었습니다.\n\n이번 혁신으로 항성 기지에 방문하는 이들을 모니터링해 해적 활동을 파악할 수 있을 뿐만 아니라, 암시장 신호 차단기에 대한 수요를 창출할 수 있을지도 모릅니다."
 auth_cyber_corporate_individualist_tt: "$unlock_edict_customer_insights$"
 gov_cyber_corporate_individualist: "$auth_cyber_corporate_individualist$"
 gov_cyber_corporate_individualist_desc: "$auth_cyber_corporate_individualist_desc$"
 concept_auth_cyber_corporate_individualist: "$auth_cyber_corporate_individualist$"
 #Cyber Corporate Collectivist
 auth_cyber_corporate_collectivist: "카이젠 기업"
 auth_cyber_corporate_collectivist_desc: "지속적인 개선 의지를 뜻하는 '카이젠'은 현대 소프트웨어 및 두뇌 환경에 어울리는 견실한 철학입니다. 우리 고객들은 방대하게 제공되는 업그레이드를 통해 개인적인 성취를 이루고 사회적 시너지를 창출할 수단을 얻게 됩니다.\n\n또한, 각 제품에는 항성 기지 네트워크에 접속한 모든 사용자를 감시할 수 있는 백도어가 설치되어 있습니다. 하지만 이러한 삽입물은 마진율이 높기 때문에 비인가 중고 시장이 형성될 가능성이 높습니다."
 auth_cyber_corporate_collectivist_tt: "$unlock_agenda_augmentation_product_launch$\n$unlock_edict_rolling_updates$"
