 edict_stately_acclaim: "국가의 인정"
 edict_stately_acclaim_desc: "과두정에서 과도한 업무에 시달리는 세력이 막대한 노력을 기울이고 있다는 점을 부각시킴으로써 해당 세력의 찬성도와 선호도를 높입니다. 이 찰나의 영예로 인해 사회 계층 이동의 기회가 확대되기도 합니다."
