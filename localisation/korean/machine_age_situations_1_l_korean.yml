 edict_levied_experience: "경험 차출"
 edict_levied_experience_desc: "사이버네틱을 통해 국민들의 지식을 추출하면, 우리 지도자가 반복 작업에 시간을 낭비하지 않고도 경험을 쌓을 수 있게 할 수 있습니다."
