 edict_rolling_updates: "정기 업데이트"
 edict_rolling_updates_desc: "사용자 개입 없이 자동으로 삽입물 업데이트를 설치함으로써, 단일한 거대 인프라를 건설할 필요가 없어집니다. 또한, 적대적 사이버 침투를 사전에 대응할 수 있게 됩니다."
