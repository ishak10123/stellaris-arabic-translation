 BIOSHIP_SENSOR_4: "타키온 감지 기관"
 BIOSHIP_SENSOR_4_DESC: "회전하는 타키온 광선을 이용해 극히 먼 거리에서도 성간 이동을 감지할 수 있는 감각 기관입니다."
