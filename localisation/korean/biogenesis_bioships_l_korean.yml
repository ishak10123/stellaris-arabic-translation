 #Combat Computers
 BIO_COMBAT_COMPUTER_DEFAULT: "전투 본능"
 BIO_COMBAT_COMPUTER_DEFAULT_DESC: "모든 생체 함선은 기초적인 전투 본능을 갖추고 있어, 회피 기동과 표적 계산이 가능합니다."
 BIO_COMBAT_COMPUTER_BASIC: "신경 삽입물"
 BIO_COMBAT_COMPUTER_BASIC_DESC: "이러한 삽입물은 함선의 유기적 시스템에 직접 통합되어 신속한 의사 결정과 정확한 전술적 조율을 가능케 하며, 살아 있는 전투 컴퓨터로서 경계 능력을 강화하고 전투 성능을 최적화합니다."
 BIO_COMBAT_COMPUTER_ADVANCED: "강화 신경 삽입물"
 BIO_COMBAT_COMPUTER_ADVANCED_DESC: "표준 신경 삽입물의 진화형인 이 시스템은 전술적 처리 및 의사 결정 속도를 향상하며, 더욱 뛰어난 효율성과 조율 능력을 제공해서 생체 함선이 시시각각 변화하는 전장에 신속히 대응하게 합니다."
 BIO_COMBAT_COMPUTER_SAPIENT: "지능형 신경 삽입물"
 BIO_COMBAT_COMPUTER_SAPIENT_DESC: "이 삽입물에는 독립적으로 전략적 사고가 가능한 생체 지성체가 들어 있습니다. 유기체의 본능과 인공적 추론을 혼합함으로써, 생체 함선은 복잡한 전투 상황에 유동적으로 적응해 거의 자율적인 의사 결정을 해냅니다."
 BIO_COMBAT_COMPUTER_AUTONOMOUS: "자율 신경 삽입물"
 BIO_COMBAT_COMPUTER_AUTONOMOUS_DESC: "이 시스템은 완전히 자율적으로 작동합니다. 자의식이 있는 생체 지능이 주입되어 있어 외부 입력 없이도 함선에 분석, 전략 수립, 의사 결정 능력을 부여합니다. 그 결과 전투 효율성이 비약적으로 상승합니다."
 BIO_COMBAT_COMPUTER_PRECOG: "예지 전투 본능"
 BIO_COMBAT_COMPUTER_PRECOG_DESC: "사이오닉의 힘을 활용한 이 삽입물은 생체 함선에 예지적 통찰력을 제공해 적의 행동을 사전에 예측하게 해 줍니다. 거의 초자연적인 이 능력을 지닌 함선은 복잡한 위협에도 순식간에 대응하며 적에게 결정적인 우위를 점할 수 있습니다."
