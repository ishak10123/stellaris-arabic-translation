 #Healing Guns
 tech_weaver_buffer_2: "위버 치유 포자"
 tech_weaver_buffer_2_desc: "아군 함선에 회복 포자를 발사해 선체의 경미한 피해를 수리하고 치열한 전투에도 쓰러지지 않도록 지원합니다."
 tech_weaver_buffer_3: "위버 수리 포자"
 tech_weaver_buffer_3_desc: "회복력이 향상된 포자를 분출해 집중 공격을 받는 아군 함선에 강력한 치유의 혼합물을 전달합니다."
 tech_weaver_buffer_4: "위버 적응형 포자"
 tech_weaver_buffer_4_desc: "적응형이 높은 유기물을 정확하게 발사해 상당한 피해를 수리하고 유기체의 재생을 촉진합니다."
 tech_weaver_buffer_5: "위버 지능형 포자"
 tech_weaver_buffer_5_desc: "지능이 있는 치유 포자를 내보냅니다. 치명적인 피해를 받은 부분을 자동으로 찾아가 수리하며, 전투에서 생존할 가능성을 크게 올립니다."
 tech_weaver_buffer_6: "위버 알 수 없는 회복 장치"
 tech_weaver_buffer_6_desc: "이 생물학적 지원 무기는 거의 즉각적인 수리와 재생을 수행해서 아군이 생사가 오가는 전투에서 살아남을 수 있게 합니다."
 BIO_HEALING_GUN_1: "포자 발사기"
 BIO_HEALING_GUN_1_DESC: "재생성 포드를 발사해 강력한 치유의 혼합물을 아군 함선에 전달할 수 있습니다."
