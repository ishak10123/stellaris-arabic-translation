 bio_ship_unique_components: "보완 기관"
 bio_ship_unique_components_DESC: "배양되거나 살아 있는 선체에 부착되는 이 보완 기관은 생체 함선의 독특한 능력을 미세 조정하도록 설계되었습니다."
 MAULER_STAGE_1_GROWTH_1: "$ship_growth_stage_1$ 성장 분비샘"
 MAULER_STAGE_1_GROWTH_1_DESC: "분비샘을 이식해 강력한 성능을 지닌 호르몬과 스테로이드를 분비하게 함으로써 강제로 함선이 다음 단계로 성장하게 만듭니다."
 MAULER_STAGE_1_GROWTH_2: "$ship_growth_stage_1$ 성장 분비샘 가속"
 MAULER_STAGE_1_GROWTH_2_DESC: "이 기관은 호르몬과 스테로이드가 풍부한 자신의 분비물에 외계 가스를 주입해 생체 함선의 성장 속도를 높입니다."
 MAULER_STAGE_2_GROWTH_1: "$ship_growth_stage_2$ 성장 분비샘"
 MAULER_STAGE_2_GROWTH_1_DESC: "$MAULER_STAGE_1_GROWTH_1_DESC$"
