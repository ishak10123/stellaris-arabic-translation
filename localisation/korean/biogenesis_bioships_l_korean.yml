 #FTL Drives
 BIO_EMPTY_DRIVE: "$EMPTY_DRIVE$"
 BIO_EMPTY_DRIVE_DESC: "$EMPTY_DRIVE_DESC$"
 BIO_HYPER_DRIVE_1: "생체 초공간 항로 역장 I"
 BIO_HYPER_DRIVE_1_DESC: "초공간을 계속해서 밀어붙여, 함선이 성간 초공간 항로의 좁은 틈을 비집고 들어갈 수 있게 합니다."
 BIO_HYPER_DRIVE_2: "생체 초공간 항로 역장 II"
 BIO_HYPER_DRIVE_2_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_HYPER_DRIVE_3: "생체 초공간 항로 역장 III"
 BIO_HYPER_DRIVE_3_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_JUMP_DRIVE_1: "도약 기관"
 BIO_JUMP_DRIVE_1_DESC: "도약 기관은 현실의 구조에 함선 크기의 구멍을 뚫어, 성계 사이를 거의 즉각적으로 오갈 수 있게 합니다. 이 과정 중에 함선이 지나가는 공간이 무엇인지는 아직 파악된 게 많지 않습니다."
 BIO_PSI_JUMP_DRIVE_1: "사이오닉 도약 기관"
 BIO_PSI_JUMP_DRIVE_1_DESC: "사이오닉 도약 기관은 함선과 승무원의 사이오닉 잠재력을 활용하는 근거리 시공간 워프를 통해 출발지와 목적지 사이의 간격을 제거합니다. 아마도요."
 tech_bio_hyper_drive_1: "초공간 항행"
 tech_bio_hyper_drive_1_desc: "항성 대부분의 중력장 사이에는 거미줄 형태의 차원 외 초공간이 이어져 있습니다. 이러한 초공간 항로를 이용하면, 이론적으로 초광속 항행이 가능합니다."
 tech_bio_hyper_drive_2: "초공간 항로 침투점"
 tech_bio_hyper_drive_2_desc: "우주 공간에 함선이 더 적은 에너지로 초공간 항로에 '침투'할 수 있는 지점이 있다는 사실을 발견했습니다. 이 침투점을 이용해 차세대 초공간 드라이브를 개발할 수 있을 것입니다."
 tech_bio_hyper_drive_3: "초공간 슬립스트림"
 tech_bio_hyper_drive_3_desc: "아공간 슬립스트림을 이용할 수 있는 차세대 초공간 드라이브입니다. 이를 통해 드라이브의 성능이 비약적으로 개선되었습니다."
 tech_bio_jump_drive_1: "$BIO_JUMP_DRIVE_1$"
 tech_bio_jump_drive_1_desc: "이 혁신적인 $BIO_JUMP_DRIVE_1$은 양자 차원에서 현 지점의 시공간 연속체를 조작해, 목표 지점과 동일하게 재구성합니다. 이로써 함선이 한 성계에서 다른 성계로, 거의 즉각적으로 '도약'하듯 이동하게 됩니다."
 tech_bio_psi_jump_drive_1: "$BIO_PSI_JUMP_DRIVE_1$"
