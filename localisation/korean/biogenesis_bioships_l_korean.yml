 PSI_BIO_BARRIER: "사이오닉 공명 조직"
 PSI_BIO_BARRIER_DESC: "이 우수한 생체 보호막은 특별히 재배된 조직으로 사이오닉 에너지를 활용해서 적의 공격에 놀라울 정도로 정밀하게 적응하는 방어를 구축합니다. 조직의 공명이 보호막 강도를 증폭하고 재생을 가속해서 예측 못 한 공격도 단단히 막아 줍니다."
