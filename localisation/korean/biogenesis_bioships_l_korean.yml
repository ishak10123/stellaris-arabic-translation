 BIO_ARCHAEO_SHIELD_DESC: "이 기술은 고대 유물 노듈 주위에 보호막 투사 조직을 배양해서 충격 지점에 시간을 느리게 하는 정지장을 생성합니다. 보호막은 느려진 시간을 이용해 공격의 에너지를 분산하는 능력을 증폭하며, 이로써 방어 강도가 크게 오릅니다."
