 ################################################
 BIOSHIP_GROWTH_PROGRESS: "$t$월간 진행도: $VALUE$"
 BIOSHIP_GROWTH_STATUS: "§H성장 단계 진행도§! $TABBED_NEW_LINE$$next_growth_stage_label$ $SHIP|Y$$TABBED_NEW_LINE$총 성장 진행도: $PROGRESS|*2Y$/$THRESHOLD|*2Y$ $TABBED_NEW_LINE$월간 성장 진행도: $MONTHLY$"
