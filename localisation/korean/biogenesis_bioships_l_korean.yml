 concept_confusion: "혼란"
 concept_confusion_desc: "혼란에 빠진 함선은 피아를 구분하지 못하고 무차별적으로 공격합니다."
 BIO_CONFUSER_GUN_1: "어둑한 포자"
 BIO_CONFUSER_GUN_1_DESC: "유기 투사체에 불안정 효소를 채워 적의 표적 시스템을 교란하고 정확도를 떨어뜨립니다."
