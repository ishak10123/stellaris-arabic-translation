 #Shields/Musculature
 tech_bio_shields_1: "$tech_shields_1$"
 BIO_SHIELD_1: "편향막 근육계"
 BIO_SHIELD_1_DESC: "특수 근육 조직이 에너지장을 생성해 보호용 편향 보호막을 형성합니다. 한 번에 흡수할 수 있는 피해량은 많지 않지만, 빠르게 재생되어 단점을 만회합니다."
 SMALL_BIO_SHIELD_1: "소형 $BIO_SHIELD_1$"
 MEDIUM_BIO_SHIELD_1: "중형 $BIO_SHIELD_1$"
 LARGE_BIO_SHIELD_1: "대형 $BIO_SHIELD_1$"
 tech_bio_shields_2: "$tech_shields_2$"
 BIO_SHIELD_2: "개선된 편향막 근육계"
 BIO_SHIELD_2_DESC: "정제된 근육 조직이 에너지를 더 효율적으로 전달해 편향 보호막을 강화합니다. 이렇게 강화된 시스템은 더 많은 피해를 흡수하고 더 빨리 재충전되므로 장기전에서 방어력이 비약적으로 상승합니다."
 SMALL_BIO_SHIELD_2: "소형 $BIO_SHIELD_2$"
 MEDIUM_BIO_SHIELD_2: "중형 $BIO_SHIELD_2$"
 LARGE_BIO_SHIELD_2: "대형 $BIO_SHIELD_2$"
 tech_bio_shields_3: "$tech_shields_3$"
 BIO_SHIELD_3: "보호막 근육계"
