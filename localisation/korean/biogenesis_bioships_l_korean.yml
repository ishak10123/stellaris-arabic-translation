 BIOSHIP_SENSOR_3: "아공간 감지 기관"
 BIOSHIP_SENSOR_3_DESC: "함선이 이동하면서 만들어 내는 아공간 파동을 감지하는 감각 기관입니다. 기존의 심우주용 감각 기관을 훨씬 능가하는 민감도와 감지 범위를 갖췄습니다."
