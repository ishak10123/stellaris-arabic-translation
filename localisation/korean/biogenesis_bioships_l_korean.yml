 tech_weaver_debuffer_2: "약화 촉수"
 tech_weaver_debuffer_2_desc: "억제 능력을 갖춘 유기체 촉수가 적을 불안정하게 하는 파동을 내뿜어서 보호막을 오작동하게 하고 방어 능력을 약화합니다."
 tech_weaver_debuffer_3: "억제 촉수"
 tech_weaver_debuffer_3_desc: "정제된 억제 시스템이 오작동 영역을 증폭해서 효과적으로 보호막의 안정성을 저하하고 상대 함선의 내구력을 떨어뜨립니다."
 tech_weaver_debuffer_4: "방해 촉수"
 tech_weaver_debuffer_4_desc: "강력한 촉수가 넓은 지역에 억제 역장을 펼쳐서 보호막과 통신을 오작동하게 하고 적 함선의 대열을 무력화합니다."
 tech_weaver_debuffer_5: "생체 전기 촉수"
 tech_weaver_debuffer_5_desc: "적응형 생체 전기 파동이 보호막을 약화하고 표적 시스템을 불안정하게 해서 적을 취약하게 만들고 혼란에 빠뜨립니다."
 tech_weaver_debuffer_6: "생체 플라스마 파동"
 tech_weaver_debuffer_6_desc: "복잡한 생체 플라스마 파동이 먼 거리에서 보호막을 무력화하고 시스템을 마비시켜 적의 전투력을 제압합니다."
