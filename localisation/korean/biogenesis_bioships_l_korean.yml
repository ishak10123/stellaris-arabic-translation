 BIO_SHIELD_4: "진보된 보호막 근육계"
 BIO_SHIELD_4_DESC: "생체 보호막 기술의 정점에 선 이 보강된 근육계는 에너지를 더 효과적으로 전달하여 보호막 강도를 높입니다. 에너지와 운동 에너지형 공격 모두에 강력한 저항력을 제공하여 전투에서 범용적인 방어력을 보장합니다."
