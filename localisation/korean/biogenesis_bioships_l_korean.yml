 #Mauler Technologies
 tech_maulers: "$mauler_class_plural_cap$"
 tech_maulers_desc: "생체 공학의 획기적 발전으로 우주 항행과 초광속 항행이 가능한 군용 함선을 육성할 수 있게 되었습니다."
 TECH_UNLOCK_mauler_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_1$"
 TECH_UNLOCK_mauler_stage_1_CONSTRUCTION_DESC: "§H$mauler_stage_1$§!\n$mauler_class_cap$는 가장 기초적인 군용 함선으로, 근거리 무기와 두꺼운 갑각질 외피를 갖췄습니다."
 tech_mauler_build_speed: "표준형 마울러 부화"
 tech_mauler_build_speed_desc: "이 부화실은 배아 전함을 영양소가 풍부한 생체 포드 안에서 육성함으로써 성장을 촉진합니다. 기초적이긴 하지만, 건조된 게 아니라 배양된 함대를 갖추기 위한 첫걸음입니다."
 tech_mauler_build_speed_effect: "$mod_ship_mauler_cost_mult$: §G-5%§!\n$mauler_class_cap$ 함선 건조: §G+25%§!"
 tech_mauler_growth_1: "개선된 마울러 발달"
 tech_mauler_growth_1_desc: "정제된 부화 절차로 배양 시간을 줄이고 유기 우주선의 구조적 안정성을 개선합니다. 향상된 영양소 전달 시스템과 유전자 조정이 함선을 빠르고 강인하게 만듭니다."
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_2$"
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_DESC: "§H$mauler_stage_2$§!\n$ship_growth_stage_2$급 $mauler_class_cap$를 선별하고 성장시켜 화력과 외피를 강화했습니다."
 gateway_bio_ships: "§H생체 함선 루트§!\n§E이 기술을 이용하면, 생체 함선 분야가 추가로 발전합니다.§!"
 tech_mauler_growth_2: "진보된 마울러 발달"
 tech_mauler_growth_2_desc: "비할 데 없는 활력과 적응력을 지닌 함선을 생산하는 시설입니다. 최적화된 유전자 매트릭스와 진보된 생명 공학적 지원을 통해 함선이 우주에서 최고의 성능을 내게 합니다."
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_3$"
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_DESC: "§H$mauler_stage_3$§!\n$ship_growth_stage_3$급 $mauler_class_cap$는 $mauler_class_cap$ 중에서도 정점으로, 매우 견고한 외피와 다수의 근거리 무기를 갖췄습니다."
 #Weaver Technologies
 tech_weavers: "$weaver_class_plural_cap$"
 tech_weavers_desc: "초기 생체 공학의 토대를 기초로 설계된 위버는 민첩성과 향상된 전투력을 모두 갖추도록 제작됩니다."
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_1$"
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_DESC: "§H$weaver_stage_1$§!\n$weaver_class_cap$는 중간 크기의 다목적 생체 함선으로, 커다란 적을 기동전으로 상대하고 함대전을 지원하도록 설계되었습니다."
 tech_weaver_build_speed: "표준형 위버 부화"
 tech_weaver_build_speed_desc: "정제된 생체 포드 안에서 중간 크기의 생체 함선을 육성하는 시설입니다. 향상된 영양소 전달 방식과 유전적 최적화를 통해 민첩하고 적응력이 뛰어난 함선을 함대에 제공합니다."
 tech_weaver_build_speed_effect: "$mod_ship_weaver_cost_mult$: §G-5%§!\n$weaver_class_cap$ 건조 속도: §G+25%§!"
 tech_weaver_growth_1: "개선된 위버 발달"
 tech_weaver_growth_1_desc: "이 시설은 향상된 생체 공학 기술을 이용하여 성장 주기를 가속하고 함선의 적응력을 개선합니다. 향상된 유전자 매트릭스와 최적화된 환경으로 내구도가 높고 전투에서 반응 속도가 뛰어난 생체 함선을 생산합니다."
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_2$"
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_DESC: "§H$weaver_stage_2$§!\n$ship_growth_stage_2$ $weaver_class_cap$는 군사 작전에서 함대의 속도와 적응력을 향상하기 위해 선별적으로 양성된 함선입니다."
 tech_weaver_growth_2: "진보된 위버 발달"
 tech_weaver_growth_2_desc: "우수한 정밀성과 범용성을 갖춘 생체 함선을 생산하는 시설입니다. 혁신적인 성장 기술과 적응형 유전자 강화를 활용해 극히 까다로운 전술 상황에서도 활약하는 함선을 만들어 냅니다."
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_3$"
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_DESC: "§H$weaver_stage_3$§!\n$ship_growth_stage_3$ $weaver_class_cap$는 월등한 민첩성과 전술적 범용성을 확보하기 위해 세심하게 양성된 함선입니다."
 #Harbinger Technologies
 tech_harbingers: "$harbinger_class_plural_cap$"
 tech_harbingers_desc: "강력한 화력과 유기체 특유의 회복력을 자랑하는 하빈저는 생체 공학 전쟁에 커다란 변화를 몰고 왔습니다. 하빈저는 함대의 중추 역할을 합니다."
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_1$"
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_DESC: "§H$harbinger_stage_1$§!\n$harbinger_class_cap$는 공격기를 사출하여 함대의 전력을 보강합니다."
 tech_harbinger_build_speed: "표준형 하빈저 부화"
 tech_harbinger_build_speed_desc: "대형 생체 함선을 육성하는 시설입니다. 진보된 영양소 주입 기술을 활용해 즉시 전장에 투입할 수 있는 강인한 생체 함선을 배출합니다."
 tech_harbinger_build_speed_effect: "$mod_ship_harbinger_cost_mult$: §G-5%§!\n$harbinger_class_cap$ 건조 속도: §G+25%§!"
 tech_harbinger_growth_1: "개선된 하빈저 발달"
 tech_harbinger_growth_1_desc: "이 복잡한 시설은 정교한 생체 공학 기술을 이용해 성장을 가속하고 구조적 안정성을 강화합니다. 그 결과, 함선의 내구성이 개선되고 전투 효율성이 향상되었습니다."
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_2$"
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_DESC: "§H$harbinger_stage_2$§!\n발전한 성장 기술로 더 강하고 믿음직한 함선이 생산됩니다."
 tech_harbinger_growth_2: "진보된 하빈저 발달"
 tech_harbinger_growth_2_desc: "진보된 부화 시스템으로 내구력과 화력이 뛰어난 생체 함선을 생산합니다. 유전자 미세 조정과 우수한 성장 환경을 누리고 탄생한 함선은 최고의 강인함으로 전장을 지배합니다."
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_3$"
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_DESC: "§H$harbinger_stage_3$§!\n최고의 출력과 전장 지배력을 갖도록 양성됩니다."
 #Stinger Technologies
 tech_stingers: "$stinger_class_plural_cap$"
 tech_stingers_desc: "스팅어는 고가치 표적에 무시무시한 공격을 날리게 설계되었습니다. 적 방어선의 취약 지점을 공략하는 데 특화되어 있습니다."
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_1$"
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_DESC: "§H$stinger_stage_1$§!\n신속하고 강력한 생체 함선입니다. 정밀 타격이 가능하고 전술적 성능이 월등합니다."
 tech_stinger_build_speed: "표준형 스팅어 부화"
 tech_stinger_build_speed_desc: "정밀성과 신속함을 갖춘 매끈하고 민첩한 생체 함선을 양성하는 시설입니다. 진보된 생체 포드와 전문화된 영양소 용액을 활용해 정확하고 효과적인 공격이 가능한 함선을 생산합니다."
 tech_stinger_build_speed_effect: "$mod_ship_stinger_cost_mult$: §G-5%§!\n$stinger_class_cap$ 건조 속도: §G+25%§!"
 tech_stinger_growth_1: "개선된 스팅어 발달"
 tech_stinger_growth_1_desc: "이 정교한 시설은 성장 주기를 가속하고 생체 공학적 정밀도를 향상해 뛰어난 기동성과 정확성을 갖춘 함선을 만들어 냅니다. 이렇게 개선된 스팅어는 교전 상황에서 파괴적인 위력을 발휘합니다."
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_2$"
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_DESC: "§H$stinger_stage_2$§!\n교전 상황에서 뛰어난 속도와 정확성을 갖추도록 개선된 함선입니다."
 tech_stinger_growth_2: "진보된 스팅어 발달"
 tech_stinger_growth_2_desc: "생체 함선 배양 기술의 정점에 선 이 첨단 시설은 비할 데 없는 속도와 위력을 지닌 스팅어를 생산합니다. 스팅어가 신속함과 무시무시한 정확도로 전장을 지배하는 건 이 시설의 최적화된 유전자 견본과 최첨단 부화 기술 덕분이라고 해도 과언이 아닙니다."
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_3$"
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_DESC: "§H$stinger_stage_3$§!\n최강의 속도와 정밀성, 전장 지배력을 자랑합니다."
