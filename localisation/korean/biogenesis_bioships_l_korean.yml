 ######################
 #Graphical Cultures #
 ######################
 BIOGENESIS_CAT: "생체창조"
 BIOGENESIS_01: "스피노보어"
 BIOGENESIS_02: "셸크래프트"
 graphical_culture_tooltip_not_biological: "['concept_biological_ship', 생체] 함선 세트를 보유하지 않음"
 graphical_culture_tooltip_biological: "['concept_biological_ship', 생체] 함선 세트를 보유해야 함"
 concept_biological_ship: "$bio_ship$"
 concept_biological_ships: "$concept_biological_ship$"
 concept_biological_ship_desc: "- 생체 함선은 명확히 정의된 역할을 지니고 세 단계의 성장을 거치는 전문화된 전투용 함선 등급입니다. $NEW_LINE$- 건설 비용은 주로 $i_alloys$ 대신 $i_food$을 사용합니다. $NEW_LINE$- 유지비는 주로 $i_energy$ 대신 $i_food$을 사용합니다. $NEW_LINE$- §Y£engineering£ 우주 공학§! 기술 대신 §Y£society£ 생물학§! 기술을 요구합니다. $NEW_LINE$$h_line$§L생체 함선은 거대하고 굴곡진 근섬유로 이루어진 살아 있는 함선입니다. 이 근섬유에 가득한 생체 발광 세포 기관이 고에너지 화합물을 방출해, 열과 빛을 만들어 냄으로써 추진력을 얻습니다.§!"
 default_ship: "기계 함선"
 bio_ship: "생체 함선"
 #Shipset Descriptions
 biogenesis_01_shipset_desc: "§H함선 세트 유형: ['concept_biological_ship', 생체]§!\n건조되었다기보다 태어났다는 말이 더 어울리는 이 생체 전함은 최상위 포식자의 위엄을 내뿜습니다. 이 전함이 갖춘 준지성체 생체 물질은 끝없이 환경에 적응하고, 사냥하고, 적을 공격합니다."
 biogenesis_02_shipset_desc: "§H함선 세트 유형: ['concept_biological_ship', 생체]§!\n용감한 모험가를 위해 사육된 이 단단한 우주선은 주인을 섬기지 않습니다. 그저 자신을 집으로 여기는 용감한 탐험가를 위해 인내하고, 함께 성장할 따름이죠."
 humanoid_01_shipset_desc: "혹독한 심우주에서도 버티게끔 튼튼하고 굳세게 건조되었습니다. 미지의 영역을 정복하기 위해 설계된 이 함선은 창조자의 희망과 꿈을 머나먼 별까지 운반합니다."
 synthetics_01_shipset_desc: "이 함선의 설계는 지칠 줄 모르는 정신의 순수성을 상징합니다. 열선을 감은 선체는 오버클럭된 메인프레임에서 에너지를 발산하여, 최대 효율에 다다르기 위한 여정에 차질이 없게 합니다."
 mammalian_01_shipset_desc: "내구도를 중시하여 제작된 이 가공할 함선은 자신의 창조주만큼 인내력이 강합니다. 속이 빽빽하게 찬 선체는 선원을 외부로부터 보호하고, 예비 시스템은 척박한 환경 속에서도 생존을 보장합니다."
 reptilian_01_shipset_desc: "각지고 실용적이며 다부진 설계가 포식자의 강인함을 떠올리게 합니다. 우주에 이 함선이 존재한다는 것은 제작자들이 얼마나 냉혹하고 끈질긴지를 보여 주는 증거입니다."
 avian_01_shipset_desc: "우아하고 매끈한 이 다용도 함선은 비행하는 자태가 무척 아름답습니다. 그 윤곽과 곡선을 보고 있으면 우주를 장애물이 아니라 그저 하늘의 일부로 보는 종족이 있다는 사실을 깨닫게 됩니다."
 arthropoid_01_shipset_desc: "키틴질과 강철, 형태와 기능... 이 함선에서는 구분이 무의미한 것들입니다. 미학보다는 내구성을 중시해서 제작된 점과 여러 겹으로 이루어진 선체를 보면 생존에 대한 제작자의 집착을 알 수 있습니다."
 molluscoid_01_shipset_desc: "우아하면서도 내구성이 좋은 이 함선은 선원들의 창이자 방패입니다. 단단한 외부 구조 밑에는 고도로 발달한 시스템이 있어서 전력과 영양분의 흐름을 조용하고 효율적으로 관리합니다."
 fungoid_01_shipset_desc: "마치 잘 자란 버섯처럼 둥글납작합니다. 자급자족할 수 있게 제작된 이 함선의 특수 시스템은 균사체의 조직을 모방한 복잡한 내부 네트워크를 구성합니다."
 plantoid_01_shipset_desc: "이 신록의 함선은 단순히 우주를 항해하는 게 아니라 그곳에 뿌리를 내립니다. 광합성을 하는 엔진은 선상 동식물의 균형을 맞추며 안정된 상태를 유지합니다."
 lithoid_01_shipset_desc: "시간과 압력으로 응축된 바위 같은 이 함선은 마치 영원이 지나도 그대로일 것만 같습니다. 실리콘 크리스탈 매트릭스는 코어 시스템을 지지하며, 세상을 구성하는 힘 그 자체로부터 에너지를 얻습니다."
 necroid_01_shipset_desc: "음울하고 불길한 느낌을 풍기는 이 부유하는 성당은 죽음과 재탄생의 기념비입니다. 함선의 엔트로피 핵과 종교 의식적인 설계에서는 공허 태생의 힘과 끝없는 야망이 엿보입니다."
 nemesis_01_shipset_desc: "당장에라도 굴복해야 할 것 같은 육중하고 고압적인 설계가 눈에 띕니다. 보강된 상부 구조와 예비 시스템은 독보적인 권력의 기운을 내뿜습니다."
 aquatic_01_shipset_desc: "부드럽게 흐르면서도 무시무시하게 부푼 이 함선은 바다의 힘을 휘두릅니다. 물을 테마로 한 내부와 유체 역학적인 윤곽은 그 제작자의 품위를 나타냅니다."
 toxoid_01_shipset_desc: "매연을 내뿜고, 불길하게 덜걱거리고, 세상 모든 규정을 어기고 있지만, 어쨌든 작동합니다. 폐기물을 연료로 쓰며 타협을 모르는 천재성으로 조직된 이 괴물체는 다른 함선이 무너지는 곳에서도 살아남을 것입니다."
 cybernetics_01_shipset_desc: "크롬이 빛나고 회로가 윙윙거리는 이곳에서 반사 신경은 설 자리가 없습니다. 지연 시간과 한계는 없고, 순수하고 초월적인 정밀성을 자랑하는 직접 신경 접속을 경험하세요."
