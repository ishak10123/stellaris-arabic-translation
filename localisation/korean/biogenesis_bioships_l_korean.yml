 MOD_BIOSHIP_GROWTH_PROGRESS_ADD: "성장 진행률"
 MOD_BIOSHIP_GROWTH_PROGRESS_MULT: "월간 성장 진행도"
 SECTION_INSTANCE_MASK: "§H$TECH|Y$ 연구로 $STAGE|Y$단계 잠금 해제§!"
