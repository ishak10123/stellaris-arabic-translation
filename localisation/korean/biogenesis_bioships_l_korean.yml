 #Unique components
 MAULER_PURSUIT_1: "신진대사 재활용 기관"
 MAULER_PURSUIT_1_DESC: "이 함선의 추진 기관이 배출하는 화학 폐기물을 재활용해 지구력을 높입니다."
 MAULER_PURSUIT_2: "에너지 재활용 기관"
 MAULER_PURSUIT_2_DESC: "함선의 재활용 대사 경로에 불안정 분말을 추가해, 지구력을 더욱 높입니다."
 MAULER_BITER_1: "침식성 체액"
 MAULER_BITER_1_DESC: "이식된 분비샘이 $mauler_class_plural_cap$의 체액을 부식성으로 만들어 그 파괴력을 강화합니다."
 MAULER_BITER_2: "부식성 체액"
 MAULER_BITER_2_DESC: "우리 $mauler_class_plural_cap$의 체액에 불안정 분말을 혼합해 공격 피해량을 더욱 높입니다. 적 함선의 장갑에 대한 피해량이 특히 높아집니다."
 weapon_type_mandible: "§Y턱§!"
 mod_weapon_type_mandible_weapon_damage_mult: "턱 무기 피해량"
 APPLIED_MODIFIERS_SUPPORT_TITLE: "지원 무기로 인한 적용 보정치:"
 WEAVER_GROWTH_AURA_1: "발달 페로몬"
 WEAVER_GROWTH_AURA_1_DESC: "위버는 근처 유기체의 성숙을 가속하는 복잡한 생화학적 신호를 발산합니다. 이러한 발달 페로몬은 성장 속도와 적응력을 개선해 어떤 난관도 극복할 수 있는 함대를 빠른 속도로 구축합니다."
 WEAVER_GROWTH_AURA_2: "외계 발달 페로몬"
 WEAVER_GROWTH_AURA_2_DESC: "정제된 생체 공학으로 페로몬의 효능을 증폭해 아군 생체 함선의 성장과 최적화를 극적으로 가속합니다. 이 업그레이드된 페로몬 덕분에 함대는 치열한 전투 중에도 놀라운 속도로 최고 성능에 도달합니다."
 GROWTH_AURA: "$WEAVER_GROWTH_AURA_1$"
 GROWTH_AURA_TT: "§P이 아우라는 성장 가능한 생체 함선에만 적용됩니다.§!"
 WEAVER_BOOSTER_1: "기본 공생 증폭기"
 WEAVER_BOOSTER_1_DESC: "이 유기적 장치는 생체 함선 간의 유대를 강화하여 함대 전체의 에너지 전달과 조직력을 향상합니다. 이 장치가 있으면 전투 및 자원 관리의 효율성이 보장될 것입니다."
 WEAVER_BOOSTER_2: "업그레이드된 공생 증폭기"
 WEAVER_BOOSTER_2_DESC: "이 장치는 공생 증폭기의 더욱 발전된 형태로, 함대의 필요에 따라 유동적으로 조정되어 효율성과 반응성이 증가합니다. 함대 전체의 역량을 최적화하며, 작전 중에 원활한 적응성을 제공합니다."
 HARBINGER_INCUBATOR_1: "부화 매트릭스"
 HARBINGER_INCUBATOR_1_DESC: "이 세포 매트릭스는 발달 중인 공격기 알 주변에 형성되어 생체 공학 부화기 역할을 합니다."
 HARBINGER_INCUBATOR_2: "신속 $HARBINGER_INCUBATOR_1$"
 HARBINGER_INCUBATOR_2_DESC: "부화 기간 중에 함선을 외계 가스에 노출시켜, 공격기가 빠르게 성숙해집니다."
 HARBINGER_CHITIN_1: "키틴질 성장 조절 기관"
 HARBINGER_CHITIN_1_DESC: "격납고 내의 분비물이 키틴질 성장을 촉진해 양성되는 공격기의 내구력을 향상합니다."
 HARBINGER_CHITIN_2: "크리스탈 성장 조절 기관"
 HARBINGER_CHITIN_2_DESC: "우리 공격기의 키틴질 외골격에 희귀 크리스탈을 심어, 피해에 대한 저항력을 크게 높입니다."
 STINGER_RANGE_1: "거리 측정 신경군"
 STINGER_RANGE_1_DESC: "감각 데이터를 처리하는 보조 신경군입니다."
 STINGER_RANGE_2: "개선된 $STINGER_RANGE_1$"
 STINGER_RANGE_2_DESC: "신경 경로상의 신경집에 희귀 크리스탈을 심으면, 표적 정보 처리 성능이 크게 향상됩니다."
 STINGER_FIRE_RATE_1: "열 배출 구멍"
 STINGER_FIRE_RATE_1_DESC: "함선의 흉부에 열 배출구를 일렬로 배치해 고온 압축 가스를 우주 공간으로 사출할 수 있게 함으로써, 무기의 발사 속도를 높입니다."
 STINGER_FIRE_RATE_2: "불안정 구멍"
 STINGER_FIRE_RATE_2_DESC: "불안정 분말을 열 교환 매체로 활용하기 위해서는 의도치 않은 폭발을 방지하기 위한 전용 세포 구조가 필요합니다."
 #Armor/Carapace
 tech_bio_ship_armor_1: "$tech_ship_armor_1$"
 BIO_ARMOR_1: "$NANOCOMPOSITE_CARAPACE$"
 BIO_ARMOR_1_DESC: "이 진보된 생체 장갑은 회복력 있는 유기 조직과 나노 구조 소재를 합쳐서 엄청난 충격을 견딜 수 있는 살아 있는 외피를 만들어 냅니다. 손상에 유동적으로 적응하여 빠르게 재생되는 이 외피는 생체 함선을 안전하게 보호합니다."
 SMALL_BIO_ARMOR_1: "소형 $BIO_ARMOR_1$"
 MEDIUM_BIO_ARMOR_1: "중형 $BIO_ARMOR_1$"
 LARGE_BIO_ARMOR_1: "대형 $BIO_ARMOR_1$"
 tech_bio_ship_armor_2: "$tech_ship_armor_2$"
 BIO_ARMOR_2: "$CERAMO_CHITIN_CARAPACE$"
 BIO_ARMOR_2_DESC: "세라믹 화합물이 주입된 강화 키틴질이 이 생체 장갑에 뛰어난 내구성과 내열성을 부여합니다. 여러 겹으로 이루어진 구조는 유기체 함선에 필요한 유연성을 떨어뜨리지 않으면서도 뛰어난 보호력을 제공합니다."
 SMALL_BIO_ARMOR_2: "소형 $CERAMO_CHITIN_CARAPACE$"
 MEDIUM_BIO_ARMOR_2: "중형 $CERAMO_CHITIN_CARAPACE$"
 LARGE_BIO_ARMOR_2: "대형 $CERAMO_CHITIN_CARAPACE$"
 tech_bio_ship_armor_3: "$tech_ship_armor_3$"
 BIO_ARMOR_3: "$PLASTEEL_CARAPACE$"
 BIO_ARMOR_3_DESC: "이 생체 장갑은 회복력 있는 유기 조직과 플라스틸 보강재를 결합해 놀라운 강도와 유연성을 균형 있게 제공합니다. 이러한 복합 구조는 운동 에너지형 및 에너지 기반 공격에 대해 강력한 보호력을 제공하므로 생체 함선의 장갑으로 매우 적합합니다."
 SMALL_BIO_ARMOR_3: "소형 $PLASTEEL_CARAPACE$"
 MEDIUM_BIO_ARMOR_3: "중형 $PLASTEEL_CARAPACE$"
 LARGE_BIO_ARMOR_3: "대형 $PLASTEEL_CARAPACE$"
 tech_bio_ship_armor_4: "$tech_ship_armor_4$"
 BIO_ARMOR_4: "듀라스틸 외피"
 BIO_ARMOR_4_DESC: "내구성 있는 유기 화합물이 주입된 이 생체 장갑은 지속적인 피해에 대한 뛰어난 저항력을 제공합니다. 복합적인 구조가 살아 있는 함선의 유연성을 떨어뜨리지 않으면서도 놀라운 내구성을 보장합니다."
 SMALL_BIO_ARMOR_4: "소형 $DURASTEEL_CARAPACE$"
 MEDIUM_BIO_ARMOR_4: "중형 $DURASTEEL_CARAPACE$"
 LARGE_BIO_ARMOR_4: "대형 $DURASTEEL_CARAPACE$"
 tech_bio_ship_armor_5: "$tech_ship_armor_5$"
 BIO_ARMOR_5: "뉴트로늄 외피"
 BIO_ARMOR_5_DESC: "생체 공학이 만들어 낸 걸작인 이 외피는 유기체 조직 내에 뉴트로늄 필라멘트가 주입된 거의 무적에 가까운 장갑입니다. 밀도가 높으면서도 적응력이 뛰어난 구조 덕분에 무지막지한 힘에도 견디는 엄청난 보호력을 제공합니다."
 SMALL_BIO_ARMOR_5: "소형 $NEUTRONIUM_CARAPACE$"
 MEDIUM_BIO_ARMOR_5: "중형 $NEUTRONIUM_CARAPACE$"
 LARGE_BIO_ARMOR_5: "대형 $NEUTRONIUM_CARAPACE$"
 tech_bio_dragon_armor: "$tech_dragon_armor$"
 DRAGON_BIO_ARMOR: "$DRACONIC_CARAPACE$"
 DRAGON_BIO_ARMOR_DESC: "생체 장갑 진화의 정점에 선 이 외피는 고대의 최상위 포식자에서 영감을 얻어 탄생했습니다. 재생성 유기 물질과 파괴하기가 극도로 어려운 생체 합금을 층층이 쌓은 구조 덕분에 무시무시하고 굳센 방어력을 갖췄으니, 그 기틀이 된 생물도 자랑스러워할 것입니다."
 SMALL_DRAGON_BIO_ARMOR: "소형 $DRAGON_BIO_ARMOR$"
 MEDIUM_DRAGON_BIO_ARMOR: "중형 $DRAGON_BIO_ARMOR$"
 LARGE_DRAGON_BIO_ARMOR: "대형 $DRAGON_BIO_ARMOR$"
 tech_bio_archaeoarmor: "$tech_archaeoarmor$"
 BIO_ARCHAEO_ARMOR: "펄스 외피"
 BIO_ARCHAEO_ARMOR_DESC: "외피 내부의 이온화된 층이 반응성 전하를 생성해 자기적 반발과 투사된 자기장을 이용해 충격 에너지를 분산합니다."
