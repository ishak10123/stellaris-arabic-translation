 BIOSHIP_SENSOR_1_DESC: "이 감각 기관은 레이더에 준하는 생체 구조를 이용해, 함선이 심우주에서도 기본적인 감지 및 추적 능력을 발휘할 수 있게 합니다."
 BIOSHIP_SENSOR_2: "중력 감지 기관"
 BIOSHIP_SENSOR_2_DESC: "이 감각 기관은 우주에서 발생하는 중력 변화를 감지하도록 발달했습니다. 이를 이용해 함선에 의한 중력 변화 등을 감지할 수 있습니다."
