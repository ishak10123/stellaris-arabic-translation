 ####################################
 # Zones
 ####################################
 zone_urban_wilderness: "심장수풀"
 zone_urban_wilderness_desc: "생체 물질과 본능이 모인, 맥동하는 심장부입니다. 끝없이 확장하며 모습을 바꾸는 이곳에서 광야 공생군은 넓고 깊게 뿌리를 내려, 새로이 나타나는 다양한 기능을 지탱합니다."
 zone_foundry_wilderness: "융용내장"
 zone_foundry_wilderness_desc: "이 가열로는 용암과 원초적 힘으로 들끓고 있습니다. $job_forgesymbiont_plural$들이 이곳에서 소화의 교향악을 연주하며 금속을 형성해, 행성의 골격을 키웁니다."
 zone_research_wilderness: "생각줄기"
 zone_research_wilderness_desc: "신경 뿌리와 만개한 변이 유전자가 높다랗게 모여 있는 노드입니다. 이곳에서 $job_evosymbiont_plural$들이 새로운 부속지와 감각, 그리고 새로운 이해를 갖춘 채 태어납니다."
 zone_unity_wilderness: "노래 절벽"
 zone_unity_wilderness_desc: "속이 빈 뼈와 암석질 피부가 얽힌 높다란 형성체입니다. 행성 표면 위로 바람이 불면 여기에서 여러 층으로 구성된 복합적인 소리가 울려 퍼집니다. $job_choirsymbiont_plural$들은 이곳에 모여 온 행성과 함께 합주곡을 만들어 냅니다."
 zone_fortress_wilderness: "명령 구근"
 zone_fortress_wilderness_desc: "충혈된 감각 기관입니다. $job_tamersymbiont_plural$들은 이곳에 모여 향기 파동을 방출함으로써 준지성체 무리를 결집하고 지시를 내립니다. 광야 공생군은 명령을 '내리는' 대신 '분비'합니다."
 zone_minerals_wilderness: "광맥척추"
 zone_minerals_wilderness_desc: "살아 있는 돌로 이루어진 높다란 능선형 구조체로, 산맥인 동시에 신체 기관이기도 합니다. 광야 공생군이 느릿하게 호흡을 뱉을 때마다 이 동굴 같은 뼈 안에 축적되어 있는 광물 또한 그에 맞춰 맥동합니다."
 zone_energy_wilderness: "태양광 진균폐"
 zone_energy_wilderness_desc: "광합성 조직이 널리 퍼져 있는 지대가 햇빛을 받아 부풀어 오르고, 그렇게 압력을 올리다 리듬감 있게 터지면서 숨을 내쉽니다. 이 빛나는 맥박으로부터 $job_photosymbiont_plural$들이 하늘로 솟아올라, 열기의 흐름을 타고 별이 그려 내는 원호를 쫓습니다."
 zone_food_wilderness: "베틀꽃"
 zone_food_wilderness_desc: "꽃잎과 페로몬으로 이루어진 향기 나는 두뇌로, 마치 실로 수를 놓듯 수분 경로를 엮어 나갑니다. 이곳에서 행성의 생식 활동이 마치 기계 공장과 같이 효율적으로 조직됩니다."
 zone_research_unity_wilderness: "화음 심부"
 zone_research_unity_wilderness_desc: "광야 공생군의 심장부에 있는 율동 기관으로, 기억과 개념을 통해 지식이 진동하는 곳입니다. 이곳에서 생각은 만들어지는 것이 아니라 메아리칠 뿐입니다."
 zone_trade_wilderness: "가닥길"
 zone_trade_wilderness_desc: "섬유질 고리, 휘감긴 부속지, 저장낭으로 이루어진 이 배급 센터에서는 $job_spindlesymbiont_plural$들이 쉼 없이 생명의 정수를 직조하고 분배합니다. 이렇게 광야 공생군은 제 스스로 물질을 필요한 곳에 보냅니다."
 ####################################
 # Decisions
 ####################################
 decision_wilderness_expand: "행성 크기 확장"
 decision_wilderness_expand_desc: "지금까지 모은 정제 생체 물질을 다시 흡수해 우리 행성의 크기를 키웁니다."
 decision_wilderness_mastery_over_nature_desc: "집단의식은 성장할 공간이 필요합니다. 따라서 우리는 이에 필요한 공간을 만들고, 종국에는 행성의 모든 환경에 적응해 낼 것입니다."
