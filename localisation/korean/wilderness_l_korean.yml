 district_hollow_mountains: "텅 빈 산"
 district_hollow_mountains_plural: "텅 빈 산"
 district_hollow_mountains_desc: "이 암석 지대에는 강인한 공생체들이 귀중한 광물을 탐색하는 과정에서 만든 갱도가 곳곳에 파여 있습니다."
