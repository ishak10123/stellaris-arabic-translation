 ####################################
 # City Appearance
 ####################################
 WILDERNESS: "광야 공생군"
 ####################################
 # Deposits
 ####################################
 d_wilderness_mining: "공동 동굴망"
 d_wilderness_mining_desc: "이 행성에서 거주하던 종족은 자신들의 광산을 난잡한 상태로 방치한 채 서둘러 떠났습니다. 게다가 일부 터널의 경우, 원주민들이 물자를 모두 뜯어 가는 바람에 붕괴할 가능성이 있습니다."
 d_wilderness_mining_2: "곰보 고원"
 d_wilderness_mining_2_desc: "이 위험천만한 지역에는 과거에 대대적으로 진행된 채굴 활동으로 인해 남겨진 무가치 광물과 싱크홀이 곳곳에 퍼져 있습니다."
 d_wilderness_farming: "말라 버린 숲"
 d_wilderness_farming_desc: "이 광대한 숲은 한때 풍부한 자원의 보고였지만, 지금은 생명이라고는 찾아볼 수 없습니다. 시들어 버린 가지는 더 이상 작물을 생산할 능력이 없습니다."
 d_wilderness_farming_2: "화석화된 숲"
 d_wilderness_farming_2_desc: "다양한 삼림이 풍부하게 자리했던 광활한 지역의 잔해입니다. 다량의 식물과 균류가 빠른 속도로 시들어 크리스탈 같은 모습으로 굳어졌으며, 현재는 아무런 생화학적 활동이 없는 상태입니다."
 d_wilderness_generator: "타버린 태양광 발전 지대"
 d_wilderness_generator_desc: "지금은 죽어 버린 이 태양광 발전 지대에 남은 것이라고는 시들어 버린 수풀 지붕과 금세라도 바스러질 것 같은 줄기뿐입니다."
 d_wilderness_generator_2: "태양광 폐허"
 d_wilderness_generator_2_desc: "이 광활한 지대에 남은 것은 한때 울창했던 태양광 발전 삼림의 가시 돋친 유해뿐입니다. 미약한 방사선을 띤 마른 잎들이 부서져 대기 중에 먼지로 부유하고 있습니다."
 d_wilderness_city: "악취를 풍기는 늪"
 d_wilderness_city_desc: "한때는 다양한 생명체가 활발하게 서식했던 곳이지만, 지금은 버려진 채 악취를 풍기는 끈끈한 웅덩이가 되어 버렸습니다."
 d_wilderness_city_2: "곪아 버린 늪지대"
 d_wilderness_city_2_desc: "이곳에서는 다양한 종의 수많은 생명체가 목숨을 잃었습니다. 그리고 그 생명체들이 남긴 유해가 부패해 땅속에 스며듦으로써, 악취를 풍기는 부식성 생화학 물질이 범람하게 되었습니다."
 d_wilderness_industrial: "금속 수렁"
 d_wilderness_industrial_desc: "여러 노천 광물 매장지가 버려져 있는 곳으로, 주변 지형의 붕괴로 인해 매장물이 불활성 독성 물질로 변해 버린 상태입니다."
 d_wilderness_industrial_2: "생화학 황무지"
 d_wilderness_industrial_2_desc: "거대한 반유기체 광물 가공 시설 단지의 폐허로, 지금은 화학 물질 분진이 덮인 암석 분지와 협곡이 남아 있을 뿐입니다."
 d_scorched_plains: "그을린 평원"
 d_scorched_plains_desc: "이 지역은 한때 생명으로 가득했지만, 항성 대폭발의 여파로 황폐화되고 말았습니다."
 concept_scorched_plains: "$d_scorched_plains$"
 concept_scorched_plains_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-2§! \n- 제거 시간: £time£ 180§I일§!\n- 제거 비용:\n$t$- 900 $i_energy$\n\n§L$d_scorched_plains_desc$§!"
 ####################################
 # Colony Types
 ####################################
 col_wilderness_default: "광야 공생군 식민지"
 ####################################
 # Planet Designations
 ####################################
 col_wilderness_capital: "심장 행성"
 col_wilderness_capital_tt: "$col_wilderness_capital_desc$"
 col_wilderness_capital_desc: "막대한 수의 공생 생명체가 모여 살아 숨 쉬는 천체를 이룬 행성으로, 사방에 공생체의 울림이 울려 퍼집니다."
 col_wilderness_generator: "광합성 행성"
 col_wilderness_generator_desc: "$col_generator_desc$"
 col_wilderness_generator_tt: "이 행성에서는 엽록체 공생체가 무수히 군집을 이루어 에너지를 저장합니다."
 col_wilderness_mining: "암석 행성"
 col_wilderness_mining_desc: "$col_mining_desc$"
 col_wilderness_mining_tt: "겉으로는 황폐해 보이는 이 행성의 지표면 아래에서는 다수의 지하 생물이 조화를 이루어 광물을 캐는 일에 매진하고 있습니다."
 col_wilderness_farming: "수분 행성"
 col_wilderness_farming_desc: "$col_farming_desc$"
 col_wilderness_farming_tt: "기능별로 특화된 공생체들이 이상적인 생육 조건을 유지하는 행성으로, 영양분이 풍부한 동식물을 대량으로 공급합니다."
 col_wilderness_fortress: "사냥꾼 행성"
 col_wilderness_fortress_desc: "$col_fortress_desc$"
 col_wilderness_fortress_tt: "이 행성의 지표면은 영역 본능이 강한 동물 무리의 발굽질과 무서운 포식자들의 울음소리로 떨리고 있습니다."
 col_wilderness_tech: "사고 행성"
 col_wilderness_tech_desc: "$col_research_desc$"
 col_wilderness_tech_tt: "이 활기찬 행성에는 이해력과 탐구심을 갖춘 이들에게 호기심을 유발하는 기이한 현상이 가득합니다."
 col_wilderness_nest: "직공 행성"
 col_wilderness_nest_desc: "$col_city_desc$"
 col_wilderness_nest_tt: "이곳은 너무도 다양한 공생 생명체가 서식하고 있어, 공생군의 필요와 기분에 따라 대기 물질 조성이 변할 정도입니다."
 col_wilderness_refinery: "정제 행성"
 col_wilderness_refinery_desc: "£exotic_gases£ §H$exotic_gases$§!를 포함한 £strategic_resource£ §H전략적 자원§! 생산에 특화되어 있는 곳입니다."
 col_wilderness_refinery_tt: "이 행성은 곳곳에 지열공이 있으며, 이곳에서 나노 유기체와 다른 여러 공생체가 원자재를 수집하고 가공합니다."
 col_wilderness_forge: "도가니 행성"
 col_wilderness_forge_desc: "$col_foundry_desc$"
 col_wilderness_forge_tt: "광물을 다양한 용도의 고품질 합금으로 가공하는 행성 규모 용광로입니다."
 col_wilderness_unification: "고요한 행성"
 col_wilderness_unification_desc: "$col_bureau_desc$"
 col_wilderness_unification_tt: "이 행성에는 느긋한 상리 공생의 기운이 퍼져 있어, 공생체 사이의 복잡한 관계를 더욱 심화시킵니다."
 ####################################
 # Personalities
 ####################################
 personality_benevolent_wilderness: "조화 공생군"
 personality_benevolent_wilderness_desc: "지성을 갖춘 이 거대한 생물권은 별세계에 진출하는 데만 관심이 있습니다. 그리고 굶주림이 아닌 조화 속에서 은하계 전체에 끈기 있게 뿌리를 뻗습니다."
 personality_rampant_wilderness: "거침없는 공생군"
 personality_rampant_wilderness_desc: "거침없는 공생군은 분노하지 않습니다. 뻗어 나가고, 삼키고, 인내할 뿐입니다. 생사를 불문한 모든 존재를 성장과 쇠락이라는 영원한 순환 안에서 재활용합니다."
 ####################################
 # Policies
 ####################################
 policy_symbiont_policy: "$policy_drone_policy$"
 policy_symbiont_policy_desc: "우리는 상리 공생 집단으로서 막대한 능력과 생산력을 갖췄지만, 한계가 없는 것은 아닙니다. 따라서 자원을 최선으로 활용하기 위한 방법과 투입 분야를 결정해야 합니다."
 symbiont_policy_balanced: "$drone_policy_balanced$"
 symbiont_policy_balanced_name: "$symbiont_policy_balanced$"
 symbiont_policy_balanced_desc: "광야 공생군이 원자재 생산과 완제품 생산에 균등하게 집중합니다.\n\n§E자원 생산에 대한 어떠한 이익도, 불이익도 없습니다.§!"
 symbiont_policy_worker: "$drone_policy_worker$"
 symbiont_policy_worker_name: "$symbiont_policy_worker$"
 symbiont_policy_worker_desc: "광야 공생군이 원자재 추출을 우선해, 관련 공생체의 생산성이 높아지는 대신 특화된 제조물의 생산량이 감소합니다.\n\n"
 symbiont_policy_thinker: "$drone_policy_thinker$"
 symbiont_policy_thinker_name: "$symbiont_policy_thinker$"
 symbiont_policy_thinker_desc: "광야 공생군이 완제품 제조를 우선해, 생산성이 높아지는 대신 원자재 추출량이 감소합니다.\n\n"
 ####################################
 # Edicts
 ####################################
 edict_capacity_subsidies_wilderness: "$edict_capacity_subsidies$"
 edict_capacity_subsidies_wilderness_desc: "이 시행령은 우리 광합성 공생체로 하여금 이주 집단을 형성해 태양을 따라 지표면을 옮겨 다니게 함으로써 에너지 생산량을 늘립니다."
 edict_mining_subsidies_wilderness: "$edict_mining_subsidies$"
 edict_mining_subsidies_wilderness_desc: "이 시행령은 우리의 뿌리를 강화함으로써 지하 공생체의 채굴에 따른 구조 붕괴의 위험을 낮춰 줍니다."
 edict_farming_subsidies_wilderness: "$edict_farming_subsidies$"
 edict_farming_subsidies_wilderness_desc: "이 시행령은 우리 토양에 고에너지 화학 물질을 적극적으로 녹여 냄으로써 영양분 생산량을 강화합니다."
 edict_forge_subsidies_wilderness: "$edict_forge_subsidies$"
 edict_forge_subsidies_wilderness_desc: "우리 무기 영양 조류 웅덩이에 영양분을 주입하면, 조류를 계절에 따라 증식시키고 합금 부산물 생산량을 늘릴 수 있습니다."
 edict_research_subsidies_wilderness: "$edict_research_subsidies$"
 edict_research_subsidies_wilderness_desc: "$edict_research_subsidies_desc$"
 edict_clearing_motes_wilderness: "$edict_clearing_motes$"
 edict_clearing_motes_wilderness_desc: "기존 식단에 불안정 분말을 추가하면, 공생체가 유기물과 무기물을 모두 흡수할 수 있게 됩니다. 그리고 우리 집합체는 이 공생체를 섭취함으로써 환경에 적응합니다."
 edict_learning_campaign_wilderness: "$edict_learning_campaign$"
 edict_learning_campaign_wilderness_desc: "우리 공생체에 추가 영양분을 제공하면 생산성을 높일 수 있습니다."
 edict_war_drone_campaign_wilderness: "전투 공생체 원정"
 edict_war_drone_campaign_wilderness_desc: "우리 포식자 및 무리 공생체에 추가 영양분을 제공하면, 공격력이 강해지고 견고한 전투태세를 갖추게 됩니다."
 edict_scientific_revolution_wilderness: "$edict_scientific_revolution$"
