 mod_job_broodsymbiont_per_pop_short: "\n$VALUE$ £pop£마다 £mod_job_spawning_drone_add£ §G+1§!"
 motesymbiote: "$job_motesymbiote$"
 job_motesymbiote: "분말 공생체"
 job_motesymbiote_plural: "분말 공생체"
 job_motesymbiote_desc: "크기가 작고 밝은 빛을 내며 금방이라도 폭발할 것만 같은 위험한 공생체입니다. 반짝이고 불안정한 힘을 갖춘 분말을 생성합니다."
 job_motesymbiote_effect_desc: "[chemist_drone.GetIcon] $job_motesymbiote_plural$는 [GetCatalyticMineralsOrFood](을)를 £volatile_motes£ §Y$volatile_motes$§!로 바꿉니다."
 mod_job_motesymbiote_add: "$job_motesymbiote$ 직업"
 mod_job_motesymbiote_per_pop: "$VALUE$팝당 $job_motesymbiote$ 직업 §G+1§!"
 mod_job_motesymbiote_per_pop_short: "\n$VALUE$ £pop£마다 £mod_job_chemist_drone_add£ §G+1§!"
 crystalsymbiote: "$job_crystalsymbiote$"
 job_crystalsymbiote: "크리스탈 공생체"
 job_crystalsymbiote_plural: "크리스탈 공생체"
 job_crystalsymbiote_desc: "몸에서 희귀한 크리스탈 결정이 자라는 공생체입니다. 크리스탈 결정은 환경이나 기능, 집단 수요에 따라 다르게 자랍니다."
 job_crystalsymbiote_effect_desc: "[translucer_drone.GetIcon] $job_crystalsymbiote_plural$는 [GetCatalyticMineralsOrFood](을)를 £rare_crystals£ §Y$rare_crystals$§!로 바꿉니다."
 mod_job_crystalsymbiote_add: "$job_crystalsymbiote$ 직업"
 mod_job_crystalsymbiote_per_pop: "$VALUE$팝당 $job_crystalsymbiote$ 직업 §G+1§!"
 mod_job_crystalsymbiote_per_pop_short: "\n$VALUE$ £pop£마다 £mod_job_translucer_drone_add£ §G+1§!"
 gaseosymbiote: "$job_gaseosymbiote$"
 job_gaseosymbiote: "가스 공생체" #Cus I don't want to have a Gassy  mbionte
 job_gaseosymbiote_plural: "가스 공생체"
 job_gaseosymbiote_desc: "이 공생체는 미생물 연금술의 대가입니다. 외계 가스를 자연적으로 생산하는 데 필요한 정확한 조건을 유지합니다."
 job_gaseosymbiote_effect_desc: "[gas_refiner_drone.GetIcon] $job_gaseosymbiote_plural$는 [GetCatalyticMineralsOrFood](을)를 £exotic_gases£ §Y$exotic_gases$§!로 바꿉니다."
 mod_job_gaseosymbiote_add: "$job_gaseosymbiote_drone$ 직업"
 mod_job_gaseosymbiote_per_pop: "$VALUE$팝당 $job_gaseosymbiote_drone$ 직업 §G+1§!"
 mod_job_gaseosymbiote_per_pop_short: "\n$VALUE$ £pop£마다 £mod_job_gas_refiner_drone_add£ §G+1§!"
 spindlesymbiont: "$job_spindlesymbiont$"
 job_spindlesymbiont: "물레 공생체"
 job_spindlesymbiont_plural: "물레 공생체"
 job_spindlesymbiont_desc: "수많은 유연한 부속지와 생소한 감각 기관을 지닌 이 공생체는 자원의 흐름을 조절하고, 영양소와 각종 물질 및 재료를 필요한 곳에 배급합니다. 이 공생체들의 동작 하나하나가 광야 공생군에 균형을 가져옵니다."
 job_spindlesymbiont_with_icon: "£job_spindlesymbiont£ $job_spindlesymbiont$"
 job_spindlesymbiont_plural_with_icon: "£job_spindlesymbiont£ $job_spindlesymbiont_plural$"
 job_spindlesymbiont_effect_desc: "$job_spindlesymbiont_plural_with_icon$는 $r_trade$을 생산합니다."
 mod_job_spindlesymbiont_add: "$job_spindlesymbiont$ 직업"
 job_wilderness_maintenance_drone: "유연한 생체 물질"
 job_wilderness_maintenance_drone_plural: "$job_wilderness_maintenance_drone$"
 job_wilderness_maintenance_drone_desc: "필요할 때까지 저장 및 유지되는, 잠재력으로 가득한 생체 물질입니다."
 job_heart_processing: "새로 형성된 생체 물질"
 job_heart_processing_plural: "$job_heart_processing$"
 job_heart_processing_desc: "이 생체 물질은 곧 통합되어, 우리 안에서 더 높은 기능을 수행할 운명입니다."
 neurosymbiont: "$job_neurosymbiont$"
 job_neurosymbiont: "신경 공생체"
 job_neurosymbiont_plural: "신경 공생체"
 job_neurosymbiont_plural_with_icon: "£job_neurosymbiont£ $job_neurosymbiont_plural$"
 job_neurosymbiont_desc: "이 공생체는 베헤모스와 우리 사이의 살아 있는 통로로, 우리의 정신을 야수의 정신에 점진적으로 주입하면서 살아갑니다."
 job_neurosymbiont_effect_desc: "£job_neurosymbiont£ $job_neurosymbiont_plural$는 £energy£ §Y$energy$§!을 생산합니다."
 mod_job_neurosymbiont_add: "$job_neurosymbiont$ 직업"
 mod_job_neurosymbiont_per_pop: "$VALUE$팝마다 $job_neurosymbiont$ 직업 §G+1§!"
