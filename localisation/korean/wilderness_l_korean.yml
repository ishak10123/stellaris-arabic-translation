l_korean:
 ####################################
 # Events
 ####################################
 # introduction event
 progress.2.desc.wilderness: "[Root.GetName]호가 [from.GetName]에서 깜짝 놀랄 만한 사실을 발견했습니다. 이 [from.GetPlanetMoon]에 외계 생명체가 가득했던 것입니다! 우리 외부에서 온 생명체를 만나는 일은 이번이 처음입니다.\n\n이 굉장한 발견으로 이 우주에는 우리와 행성 [root.owner.capital_scope.GetName]만 있는 것이 아님이 입증되었습니다. [from.GetName]에서 발견한 외계 생명체 중 지성체는 없지만, 외계 지성체를 만날 날 또한 머지않았을 가능성이 큽니다..."
 # Colonization Events
 wilderness.1010.name: "깨어난 [from.GetName]"
 wilderness.1010.desc.intro: "우리 테라포밍 포자가 처음으로 우리의 일부를 외계 행성에 운반함으로써 목적을 달성했습니다."
 wilderness.1010.desc.same: "[from.GetName]인 동시에 [root.GetHomeWorldName](이)가 되는 이 감각... 이미 익숙하게 느껴집니다. 참으로 안락한 존재감입니다. 한때 외계의 천체였던 항성의 빛 아래에서 수많은 새로운 형태를 취하고 있음에도 말입니다. 우리는 이곳의 기존 조건에 수월하게 적응했습니다." #e.g. 'becoming Mars as well as Earth...''
 wilderness.1010.desc.similar_cold: "[from.GetClassAdj] 행성인 §Y[from.GetName]§!에 맞춰 적응하는 과정에서 어려움도 있겠지만, 우리는 이미 이 상황에 대응할 익숙한 방법을 찾았습니다. 촉수를 뻗고, 땅을 깎아 거주지를 만들며, 주린 입을 벌려 사냥에 나섭니다." #e.g. 'Adapting our self to suit arctic Pluto...'
 wilderness.1010.desc.similar_dry: "행성 [root.GetHomeWorldName](으)로 살면서, 우리는 바싹 마른 기후에서 더욱 번성했습니다. 이번에도 마찬가지로 우리는 [from.GetClassAdj] 행성인 §Y[from.GetName]§!(이)가 되는 도전에 맞설 것입니다. 우리는 이미 수분을 찾아 보전하는 방식을 새롭게 발견했으며, 이 혹독한 지리 조건을 거스르기보다 함께 공존하는 법을 익혔습니다." #e.g. 'the challenge of becoming savannah Mars'
 wilderness.1010.desc.similar_wet: "과거 [root.GetHomeWorldName]의 수역에서 그랬던 것처럼, 우리는 [from.GetClassAdj] 행성인 §Y[from.GetName]§!(으)로서도 번영을 누릴 것입니다. 이곳에서는 광물도, 해류도, 일조량도 낯설게 느껴지지만, 우리는 이미 우리에게 필요한 것을 추출하는 방법을 찾아냈습니다." #e.g. 'we flourish as oceanic Neptune'
 wilderness.1010.desc.diff_cold: "§Y[from.GetName]§!(이)가 되는 일이 쉽지 않을 것임은 이미 알고 있었습니다. 실제로 우리를 [root.capital_scope.GetClassAdj] 행성인 [root.GetHomeWorldName](으)로 만들어 주었던 요소 중 일부는 이곳에서 사그라들었지만, 나머지는 여전히 건재한 모습으로 이미 적응을 시작했습니다. 이곳은 낯선 환경 탓에 생명 유지에 필요한 기본 자원을 얻기 어렵지만, 이 엄혹한 조건을 버텨 내면서 우리는 생명이 스스로 길을 찾아가는 모습을 목격하고 있습니다." #e.g. 'becoming Earth'
 wilderness.1010.desc.diff_dry: "이곳은 우리 안의 원초적 공포를 일깨웁니다. 너무나 뜨겁고 건조한 이 환경은 '그을린 땅'에 대한 기억을 본능적으로 떠올리게 합니다. 하지만 이곳에 적응해 번성할 수 있다면... §Y[from.GetName]§!(이)가 됨으로써 우리 안에 새로운 무언가를 일깨울 수 있을지도 모릅니다. 물기가 있는 곳이 있으면, 우리는 수분을 저장하는 법을 찾아냈습니다. 그늘이 없는 곳이 있으면, 우리는 스스로 그늘을 만드는 법을 찾아냈습니다."
 wilderness.1010.desc.diff_wet: "§Y[from.GetName]§!(이)가 되는 데는 어려움이 따를 테지만, 우리는 부패와 홍수에 맞서 대비를 갖췄습니다. 우리의 일부에서 물을 다루는 데 능숙한 부분은 물을 흡수함으로써 물에 취약한 다른 부분들을 지키고 있습니다. 우리는 이곳의 독특한 해류를 받아들였습니다." #e.g. 'Our effort to become Mars'
 wilderness.1010.desc.other: "§Y[from.GetName]§!(으)로의 변화를 위해 모습을 갖춰 나가면서, 우리는 우리 자신에서 잘 자라날 부분과 시들어 버릴 부분을 구분하고 있습니다. 이러한 [from.GetClassAdj] 행성으로 존재하는 것은 우리가 익히 아는 경험과 비슷한 부분도 많지만, 낯선 부분도 많습니다. 따라서 우리는 상황을 지켜보고 실험할 것입니다." #e.g. 'shape ourselves to become Luna'
 wilderness.1010.desc.outro: "우리의 상부 구조, 우리의 영양소, 그리고 우리의 DNA마저도 우리보다 먼저 이곳에 존재해 왔던 생명들과 어울려 적응하기 시작했습니다. [from.GetName](이)가 깨어나고 있습니다."
 wilderness.1010.a: "곧 우리 행성들은 하나가 될 것입니다."
 # Terraforming Events
 terra.25.desc.wilderness: "§Y[From.GetName]§!(을)를 일깨우기 위해 오랫동안 노력했지만, 바랐던 결과가 나오지 않았습니다. 생체 물질 재배열기 하나가 파열됨에 따라, 소규모이지만 §Y테라포밍 잔여물§!이 범람해 계곡을 메우고 일부 거주 적합 구역을 끈끈하게 덮어 버린 것입니다.\n\n잔여물 자체는 위험하지 않지만, 우리 중에서 운동 능력이 더 뛰어난 부분은 이 고름 같은 물질 때문에 한동안 고생을 감수해야 할 것 같습니다."
 terra.80.desc.wilderness: "§Y[From.GetName]§!의 대기와 토양의 방사선층으로부터 우리의 미래 자아들을 구해 냈습니다. 하지만 상황을 지켜보던 우리 [Root.GetTerraformerPlural]들이 개입해, 해당 영역을 일시적으로 격리해야 했습니다. 우리가 토착 생물 중에서 방사선 환경에서 주로 서식하며 극히 눈에 띄지 않는 생물종 하나를 방해한 모양입니다. 안타깝게도 우리의 행동으로 인해 이 생물종의 개체 수가 줄고 있습니다.\n\n더 흥미로운 사실은, 이 종족이 준지성체라는 점입니다. 녀석들은 독자적인 사고력을 얻기 직전 단계에 와 있습니다. [From.GetName](이)가 기존에 있던 유해 환경을 마지막까지 없애 버리려는 이 시점에, 우리는 이 새로운 생명체를 어떻게 할지 결정해야 합니다."
 terra.80.b.wilderness: "이 행성은 그 생물들의 것입니다. 지성을 깨우치도록 놔둬야 합니다."
 terra.80.d.wilderness: "먹어 버립시다."
 wilderness.2000.name: "계획된 각성"
 #wilderness.2000.desc.reg: "We feel the tremendous potential of [from.GetName]. It seems proper to both fear and delight in the awesome power we are about to exert there: shaping this [from.GetPlanetMoon] with our will and the tools we have developed; laying the pattern for its eventual awakening.\n\nWe have long relied on natural processes to grow and sustain the [root.GetName]. But these trials also cost us dearly, and taught us much. Now we shall see what wonders emerge when a habitable world skips its own evolution and gains the wisdom of hard-earned growth and decay."
 wilderness.2000.desc.barren: "[from.GetName]의 황폐화는 보기에는 고통스럽겠지만, 오래가지는 않을 것입니다. 은하계의 생명들은 이 불모 행성을 무시하는 것이 옳다고 여겨왔지만, 우리 [root.GetName](은)는 이곳을 재건할 수단과 지식을 지니고 있습니다.\n\n지금까지 알아낸 것이 많지만, [from.GetName] 복구는 여전히 힘겨운 과업입니다. 허나 우리의 의지력과 이전에 발견한 기후 개조 도구를 통해, 지금까지 불모지였던 이곳에 머지않아 생명이 꽃피게 될 것입니다."
 wilderness.2000.desc.tomb_detox: "우리가 알던 생명체들은 [from.GetName]에서 전부 사라졌지만, 이제 우리는 이 세계에 두 번째 기회를 부여할 준비가 되어 있습니다. [from.GetName](이)가 [root.GetName]의 형태로 다시금 생명체를 길러 낼 수 있도록 벌써부터 대기, 수로, 토양에 대한 복원 작업을 시작했습니다."
 wilderness.2000.desc.gaia: "우리 [root.GetName](은)는 진화라는 도가니를 통해 경이로운 존재로 거듭났습니다. 그리고 이제 우리는 [from.GetPlanetMoon] [from.GetName]에 훨씬 더 많은 것을 선사할 기회를 누리게 되었고, 예전의 우리는 생각지도 못했을 수단과 지식을 활용해 [from.GetName](을)를 차원이 다른 각성이 일어나도록 가꾸기 시작했습니다.\n\n훗날 [from.GetName](은)는 우리 동식물이 대대로 살아가면서 활기가 되살아나고 영양분으로 넘쳐 나는 기반을 이룰 것이며, 계곡과 산맥, 고원에는 채집, 사냥, 거주를 위한 공간이 가득할 것입니다. 이곳에 생명이 번성하게 될 날이 머지않았습니다."
 wilderness.2000.a: "시작합시다."
 wilderness_pre_sapient_defence_army: "준지성체 무리"
 seq_wilderness_pre_sapient_defence_army: "공생체 무리 $R$" # e.g. 'Symbiont Herd IV'
 wilderness_pre_sapient_defence_army_plural: "준지성체 무리"
 wilderness_pre_sapient_defence_army_desc: "영역 본능이 깊이 자리 잡은 이 생물들은 건드리지 않는 한 온순합니다. 다만 누군가 도발할 경우에는 가장 원초적인 본능만 남긴 채 모든 것을 내려놓고 자신들이 동족이라 인식하는 존재를 지키기 위해 싸웁니다."
 wilderness_pre_sapient_assault_army: "준지성체 군집"
 seq_wilderness_pre_sapient_assault_army: "공생체 군집 $R$" # e.g. 'Symbiont Horde IV'
 wilderness_pre_sapient_assault_army_plural: "준지성체 군집"
 wilderness_pre_sapient_assault_army_desc: "높은 지략과 근성을 바탕으로, 자신이 적으로 간주하는 존재는 누구든 잔혹하고 확실하게 파괴하는 매서운 생명체입니다."
 ####################################
 # Origins
 ####################################
 origin_wilderness: "광야 공생군"
 origin_wilderness_desc: "§R경고: ['concept_purity_ascension']을 제외한 승격의 길이 전부 차단됩니다.§!\n\n이 존재는 지성이 있는 생물권 그 자체입니다. 다양한 생명체가 오래전부터 하나로 합쳐져, 행성 단위의 게슈탈트 의식이 된 것입니다."
 origin_tooltip_wilderness_effects: "- 종족 특성: ['trait:trait_wilderness']\n- 모든 표준 £building£ ['concept_buildings'], £district£ ['concept_districts'] 및 £zone£ ['concept_district_specialization']를 맞춤형으로 대체\n- 개척선을 이용한 개척을 ['concept_terraforming']으로 대체\n- 신규 자원 잠금 해제: £biomass£ ['concept_biomass'] \n- 모성:$TABBED_NEW_LINE$- 크기: £planetsize£ 18$TABBED_NEW_LINE$- ['concept_scorched_plains', £blocker£ $d_scorched_plains$]"
 trait_wilderness: "광야 공생군"
 trait_wilderness_desc: "§L이 생물은 상호 공생군의 일부로 존재하며, 그 생각이든 생산 활동이든 주변 환경과 일체화되어 있습니다.§!"
 WILDERNESS_NATURAL_WORLDS_DECLINE: "§R§Y광야 공생군§!은 비자연 행성에서는 생존할 수 없습니다.§!"
 WILDERNESS_DEAD_WORLD: "$TRIGGER_FAIL$§Y광야 공생군§!은 광야 공생군이 아닌 제국에서는 생존할 수 없습니다."
 country_virtual_jobs: "이 제국의 일자리는 모두 자동으로 채워집니다."
 concept_wilderness_trait: "$trait_wilderness$"
 concept_wilderness_trait_desc: "- $MOD_LOGISTIC_GROWTH_MULT$: §R-100%§!\n- §R이주 및 재정착 불가§! $NEW_LINE$- §R자연적인 생식 불가§!\n\n§L$trait_wilderness_desc$§!"
 PRESCRIPTED_adjective_zhardmehka: "개화자"
 PRESCRIPTED_ship_prefix_zhardmehka: "ZMV"
 PRESCRIPTED_species_name_zhardmehka: "자드-크렐린"
 PRESCRIPTED_species_name_plural_zhardmehka: "자드-크렐린"
 PRESCRIPTED_species_adjective_zhardmehka: "자드-크렐린"
 PRESCRIPTED_planet_name_zhardmehka: "텔론"
 PRESCRIPTED_system_name_zhardmehka: "타틀라"
 PRESCRIPTED_ruler_name_zhardmehka: "$FUN3_CHR_Obanva$ $FUN3_CHR_uvi-Livve$"
 PRESCRIPTED_ruler_title_zhardmehka: "아바타"
 START_SCREEN_WILDERNESS_INTRO: "기억조차 나지 않을 정도로 오래전부터 [root.GetHomeWorldName](은)는 언제나 행성 [root.GetHomeWorldName] 그 자체였습니다. 이곳에 있는 줄기, 촉수, 효소는 저마다 단일한 자아의 일부로서 성장과 쇠락, 그리고 포식 사이의 균형을 이뤘습니다. 그렇게 오랜 세월 동안 [root.GetHomeWorldName]에게 외부의 은하계는 희미한 존재에 불과했으나 별세계는 오래전부터 들썩이고 있었습니다.\n\n[root.GetHomeWorldName] 상공에서 전투가 발생했습니다. 지표면에 거대 함선들의 잔해가 흩뿌려졌고, 이 외계 물질은 즉시 재활용되었습니다. 그러다 항성 대폭발이 일어났습니다..."
 START_SCREEN_WILDERNESS_DEFAULT: "대폭발은 [root.GetHomeWorldName]에게 눈이 멀 듯한 작열하는 빛으로 느껴졌습니다. 수십억 개의 공생체가 화염과 방사선에 쓸려 나갔고, 온갖 생명체가 대륙 채로 사라졌습니다."
 START_SCREEN_WILDERNESS_COLD: "대폭발은 [root.GetHomeWorldName]에게 눈이 멀 듯한 작열하는 빛으로 느껴졌습니다. 빙하가 녹아 격류로 변했고, 그와 동시에 성간 방사선은 [root.GetHomeWorldName](을)를 뿌리까지 태워 버리면서 대륙 전체가 휩쓸렸습니다."
 START_SCREEN_WILDERNESS_DRY: "대폭발은 [root.GetHomeWorldName]에게 눈이 멀 듯한 작열하는 빛으로 느껴졌습니다. 모래 언덕이 녹아 유리가 되었고, 쇄도하는 바람이 바위 표면을 깨끗이 쓸어버렸습니다. 그리하여 대륙 전체가 완전히 황무지로 변해 버렸습니다."
 START_SCREEN_WILDERNESS_WET: "대폭발은 [root.GetHomeWorldName]에게 눈이 멀 듯한 작열하는 빛으로 느껴졌습니다. 성간 방사선이 [root.GetHomeWorldName](을)를 뿌리까지 태워 버리면서 호수가 끓어오르고 빙하는 녹아내렸습니다. 그리하여 대륙 전체가 사라지고 말았습니다."
 START_SCREEN_WILDERNESS_OUTRO: "이 고통은 우리를 일깨웠습니다. 우리는 처음으로 자신의 연약함을 이해했습니다. 은하는 위험천만한 곳이지만, 경이로움도 간직하고 있습니다. 우리는 지금까지 배운 것을 활용해 싹을 틔우고 뻗어 나갈 것입니다. 그리고 우주로 나아갈 것입니다."
 ####################################
 # Authorities
 ####################################
 auth_mutualistic_intelligence: "상리 공생 지능"
 auth_mutualistic_intelligence_plural: "상리 공생 지능"
 auth_mutualistic_intelligence_desc: "$auth_mutualistic_intelligence_plural$은 행성 규모의 분산된 의식으로 출현합니다. 다양한 생물군에서 나온 각종 공생체 생물종으로 이루어지며, 각 생물은 주변 환경의 집단 의지에 따라 행동합니다.\n\n일부 공생체는 수행하는 작업에 따라 어느 정도 자율성을 지니지만, 대부분은 공생 환경과 규칙적으로 접촉해야 살아갈 수 있습니다. 만약 본래 환경과 분리될 경우, 이들은 야생의 본능에 따라 움직이다 결국에는 사망할 것입니다."
 tt_auth_mutualistic_intelligence: "§Y$auth_mutualistic_intelligence$§!(§Y$auth_hive_mind$§!) 정부 체제를 보유"
 gov_wilderness: "$gov_hive_mind$"
 gov_wilderness_desc: "이 정부는 하나의 의식으로 기능하며, 인구는 $RT_WILDERNESS$의 욕구와 욕망을 충족시키는 것 외에는 그 어떠한 개인적인 주체성을 갖지 않습니다."
 RT_WILDERNESS: "광야 공생군"
 RT_WILDERNESS_FEMALE: "$RT_WILDERNESS$"
 ####################################
 # Buildings
 ####################################
 building_colony_shelter_wilderness: "행성 촉수"
 building_colony_shelter_wilderness_desc: "이 행성 전체에 뻗어 있는 다세포 유기체 개척 생물로, 광야 공생군의 안정을 확보합니다."
 building_capital_wilderness: "행성 뿌리 뭉치"
 building_capital_wilderness_desc: "단순한 유기체로 이루어진 존재로, 활발히 확산하는 가운데 운동성 공생체와의 조화를 통해 조직력과 생산력을 높입니다."
 building_major_capital_wilderness: "행성 뿌리 복합체"
 building_major_capital_wilderness_desc: "고도로 국지화된 환경에서 공생체들이 살고, 일하고, 번식하는 데 충분한 밀도를 갖춘 생체 물질의 집합입니다."
 building_system_capital_wilderness: "행성 뿌리 연결체"
 building_system_capital_wilderness_desc: "다양한 생명체가 서로 조화롭게 일하는 거대한 연합체로, 이상적인 기후를 국지적으로 자체 형성할 정도로 막대한 크기를 자랑합니다."
 requires_building_wilderness_capital: "§R행성에 §Y$building_capital_wilderness$§!가 필요합니다.§!"
 requires_building_wilderness_major_capital: "§R행성에 §Y$building_major_capital_wilderness$§!가 필요합니다.§!"
 requires_building_wilderness_system_capital: "§R행성에 §Y$building_system_capital_wilderness$§!가 필요합니다.§!"
 building_imperial_capital_wilderness: "제국 복합체"
 building_imperial_capital_wilderness_desc: "광야 공생군은 이 거대하고 정교한 구조물에서 은하 제국을 통치합니다. 여기에서 은하계의 운명이 결정됩니다."
 building_tendril_cradle_1: "덩굴 요람"
 building_tendril_cradle_1_desc: "뿌리로 고정된 짧은 덩굴 다발이 이 장소에서 자라나와, 근처의 물질을 끌어들이고 근방의 중요 기관에 보냅니다."
 building_tendril_cradle_2: "광활한 덩굴망"
 building_tendril_cradle_2_desc: "길게 자란 덩굴들이 뻗어 나가 온 지형을 덮고는 주변의 개활지에서 자원을 빨아들여 가공하고 재분배합니다."
 building_tendril_cradle_3: "운반뿌리 둥지"
 building_tendril_cradle_3_desc: "매듭진 뿌리들이 지표면 아래에서 맥동하면서 이동해, 여러 층의 도관을 통해 멀리 있는 생체 거점으로 생체 물질을 운반합니다."
 building_tendril_cradle_4: "행성 줄심장"
 building_tendril_cradle_4_desc: "이 행성 전역에 퍼져 있는 거대한 물류용 촉수들은 일사불란한 움직임으로 광야 공생군의 자원을 쉼 없이 끌어들이고, 조절하고, 유통합니다."
 planet_research_buildings: "행성 연구 건물"
 mod_planet_research_buildings_upkeep_mult: "$planet_research_buildings$ 유지비"
 building_brain_node_1: "연구 성장터"
 building_brain_node_1_desc: "장난기와 탐구심이 다분한 공생체들의 작업을 통해 일반 연구의 기초를 마련합니다."
 mod_planet_building_brain_node_1_build_speed_mult: "$building_brain_node_1$ 건설 속도"
 building_brain_node_2: "연구 삼림"
 building_brain_node_2_desc: "고도로 발달한 유물과 각종 현상에 관한 연구를 촉진하도록 탐색 행동을 증진하는 데 특화된 거주지입니다."
 mod_planet_building_brain_node_2_build_speed_mult: "$building_brain_node_2$ 건설 속도"
 building_brain_node_3: "외계 연구 구획"
 building_brain_node_3_desc: "이 방대한 구획에서는 극한 환경의 공생체들이 대규모로 모여 온갖 외계 위험 물질을 이용한 실험을 진행합니다."
 mod_planet_building_brain_node_3_build_speed_mult: "$building_brain_node_3$ 건설 속도"
 building_brain_node_4: "첨단 연구 구획"
 building_brain_node_4_desc: "공생체에서 자란 방대한 구획과 외계 기술을 결합한 이곳에서는 다양한 샌드박스 환경에서 첨단 기술 연구를 진행합니다."
 mod_planet_building_brain_node_4_build_speed_mult: "$building_brain_node_4$ 건조 속도"
 building_commensal_clearing_1: "공생 모임터"
 building_commensal_clearing_1_desc: "각양각색의 운동성 공생체가 이 고요한 섬들에 모여 휴식을 취하고, 앞으로 광야 공생군 내에서 나아갈 방향을 정합니다."
 building_commensal_clearing_2: "공생 삼림"
 building_commensal_clearing_2_desc: "공생체가 대규모로 안전하게 모일 수 있는 이상적인 환경을 갖춘 장소입니다. 이곳에서는 공생체 사이의 상호 작용을 통해 분산된 우리 자아에 대한 이해를 도모합니다."
 building_commensal_clearing_3: "공생 계곡"
 building_commensal_clearing_3_desc: "이 청정 지형에서는 조밀하게 구성된 다양한 공생체 집단이 오가며 상호 간의 유대를 강화합니다."
 building_commensal_clearing_4: "공생 생물군계"
 building_commensal_clearing_4_desc: "여러 거주지가 방대하게 연결된 이곳에서는 공생체 간의 수많은 조우가 이루어지며, 그때마다 상리 공생 통일체를 형성하는 생명의 불꽃이 일어납니다."
 building_massive_growth_1: "영양 협곡"
 building_massive_growth_1_desc: "1년 내내 작물이 안정적으로 성장할 수 있도록 이상적인 국지 기후를 유지하는 소규모 협곡 지대입니다."
 building_massive_growth_2: "영양 관목"
 building_massive_growth_2_desc: "이 관목은 거대한 반침투성 수풀에 덮인 덕분에 외부로부터 안전한 환경 속에서 지속적으로 풍부하고 영양가 높은 식량을 생산합니다."
 building_massive_growth_3: "등고선 재배 거대 농장"
 building_massive_growth_3_desc: "반수생 미생물과 동물이 함께 번성하는 널따란 계단식 농장으로, 대량의 단백질과 곡물을 생산합니다."
 building_massive_growth_4: "식목 농장"
 building_massive_growth_4_desc: "잎이 많은 거대 식물의 보호 아래 다양한 식물이 자라나는 곳으로, 전체 먹이 사슬을 지탱할 수 있을 정도로 대규모의 작물을 공급합니다."
 building_bioelectric_stimulator_1: "엽록체 적응기"
 building_bioelectric_stimulator_1_desc: "렌즈 형태의 거품 군집으로 항성의 빛을 수렴해 짙은 녹조류 혼합액으로 통과시킴으로써, 빛 에너지를 전환 및 저장하고 필요할 때 활용합니다."
 building_bioelectric_stimulator_2: "엽록체 가속기"
 building_bioelectric_stimulator_2_desc: "광합성 조류로 가득 찬 유리질 거품을 통해 항성의 에너지를 활용함으로써, 생화학 결합을 더욱 강화하여 자체 에너지 배출량을 줄입니다."
 building_bioelectric_stimulator_3: "엽록체 렌즈 배열체"
 building_bioelectric_stimulator_3_desc: "이 동력 허브는 태양광 수용 기관이 배열된 가지에 무게 추를 달아 에너지 수요 및 공급량에 맞게 올리고 내림으로써 유연하고도 안정적으로 에너지를 공급합니다."
 building_bioelectric_stimulator_4: "엽록체 낭포"
 building_bioelectric_stimulator_4_desc: "녹조류가 가득 찬 이 유리질 낭포는 에너지를 필요로 하는 곳으로 이동하고 증식함으로써, 거리에 따른 에너지 손실이 거의 발생하지 않게 합니다."
 building_churning_tunnels_1: "암석 채굴공"
 building_churning_tunnels_1_desc: "크리스탈에 가까운 경도를 지닌 식물성 물질을 기존 채굴장 일대에 강제로 주입시켜, 여러 유용한 광물의 채굴량을 크게 늘립니다."
 building_churning_tunnels_2: "암석 여과기"
 building_churning_tunnels_2_desc: "반침투성 생체 여과막 군집을 통해, 액체 채굴 작업에서 나온 유출수에 섞인 고가치 광물을 유실되기 전에 포집합니다."
 building_churning_tunnels_3: "암석 파쇄기"
 building_churning_tunnels_3_desc: "강력한 연마용 판과 집게를 이용해 토양 물질을 유체 형태의 화학 물질로 변환함으로써 광물 채굴 작업을 용이하게 합니다."
 building_churning_tunnels_4: "암석 욕조"
 building_churning_tunnels_4_desc: "파쇄기, 생화학제, 생체 여과막이 어우러진 곳으로, 풍부한 광맥이 발견되면 현장에서 바로 채굴이 가능합니다."
 building_natural_furnace_0: "제련 웅덩이"
 building_natural_furnace_0_desc: "호열성 공생체가 천연 열원 주변에서 쉬지 않고 일하면서 고품질 합금을 생산하는 곳입니다."
 building_natural_furnace_1: "제련 가마"
 building_natural_furnace_1_desc: "이곳에 있는 내열성 생물들은 열효율을 높임으로써 고품질 합금을 생산할 수 있게 합니다."
 building_natural_furnace_2: "고체 광선 용광로"
 building_natural_furnace_2_desc: "고도로 발달한 암석 유기체 가마에 홀로그램 기술을 결합해 다용도 합금을 생산합니다."
 building_natural_furnace_3: "나노 용광로"
 building_natural_furnace_3_desc: "열이 들끓는 웅덩이와 가마에 서식하는 호열성 나노 유기체들이 합금에서 불순물을 제거합니다."
 building_avatar_chamber_1: "아바타 요람"
 building_avatar_chamber_1_desc: "광야 공생군의 기본 형태 형성이 시작되는 씨눈 기관으로, 토착 생물권 밖의 낯선 생명체와 지형에 적응할 수 있도록 본능을 조절합니다."
 building_avatar_chamber_2: "아바타 실험실"
 building_avatar_chamber_2_desc: "모의 개체들을 육성한 후, 외부 생물체와 생태계를 모방한 환경을 통해 자체 시험을 거치는 곳입니다. 이곳에서는 미지의 세계를 체화함으로써 지식을 퍼뜨립니다."
 building_avatar_chamber_2_effect: "$building_avatar_chamber_1$이 £amenities£ 편의를 §G200§!만큼 추가로 생산합니다."
 building_avatar_chamber_3: "아바타 숲"
 building_avatar_chamber_3_desc: "이 광활한 기관은 외계 생명체와 지형을 닮은 아바타 견본들을 송출합니다. 광야 공생군은 자신이 접한 적 없는 존재로 직접 살아 봄으로써 지식을 습득합니다."
 building_avatar_chamber_3_effect: "$building_avatar_chamber_1$이 £amenities£ 편의를 §G400§!만큼 추가로 생산합니다."
 building_avatar_chamber_4: "아바타 피질"
 building_avatar_chamber_4_desc: "모의 문명, 외계 생태계, 극지 환경 등을 통째로 만들 수 있는 행성급 규모의 체화 기관입니다. 이곳에서 광야 공생군은 은하계와의 조우에 대비한 리허설을 진행합니다."
 building_avatar_chamber_4_effect: "$building_avatar_chamber_1$이 £amenities£ 편의를 §G800§!만큼 추가로 생산합니다."
 building_mote_aggravator: "화학 소화 기관"
 building_mote_aggravator_desc: "혈관 조직과 신진대사 화학 물질이 유려하게 공존하는 기관으로, 일반 토양 물질에서 $volatile_motes$을 생산합니다."
 building_churning_stomach: "외계 가스 여과기"
 building_churning_stomach_desc: "고도로 특화된 미생물과 나노 유기체가 일반 에어로졸 물질에 반응해 고순도 $exotic_gases$를 생산합니다."
 building_crystal_growth: "크리스탈 기단"
 building_crystal_growth_desc: "특수 지붕으로 습도와 온도를 정밀하게 제어해, 생산이 까다로운 인공 $rare_crystals$을 만들어 냅니다."
 building_planetary_carapace: "골격 주둔지"
 building_planetary_carapace_desc: "외부로부터 보호를 받는 훈련장으로, 영역 본능이 강한 사나운 공생체 무리가 유사시에 언제나 부름에 응할 수 있도록 대기합니다."
 mod_planet_building_planetary_carapace_build_speed_mult: "$building_planetary_carapace$ 건설 속도"
 building_planetary_carapace_2: "골격 요새"
 building_planetary_carapace_2_desc: "훈련장과 거주 공간으로 이루어진 광활한 시설로, 안에 거주하는 방어 병력이 어떠한 행성 침공 사태에도 대응할 수 있도록 대비시키는 역할을 담당합니다."
 building_ozone_thickener: "임관층 행성 보호막"
 building_ozone_thickener_desc: "$tech_planetary_shield_generator_desc$"
 building_subterranean_cache: "지하 매장지"
 building_subterranean_cache_desc: "$building_resource_silo_desc$"
 building_cradle_of_rebirth: "재탄생의 요람"
 building_cradle_of_rebirth_desc: "깊이 뿌리 내린 이 구조체는 대사 작용을 통해 부패 중인 물질과 포획된 사냥감을 생체 물질로 바꿈으로써, 고요한 맥박이 울릴 때마다 행성의 몸체에 영양분을 공급합니다."
 building_wilderness_storm_relief: "$building_storm_resistant_production$"
 building_wilderness_storm_relief_desc: "생체 전기로 충전된 단단한 잎이 넓은 지붕 형태를 이뤄, 근처에 있는 공생체들의 안전을 지켜 주고 우주 폭풍에 빠르게 대응함으로써 생명 및 생산 활동에 대한 위험을 막습니다."
 building_wilderness_storm_relief_tt: "§Y$default_storm$§!이 행성 생산량에 주는 부정적 효과가 §G25%§! 감소합니다."
 holding_wilderness_glade: "광야 공생군 개활지"
 holding_wilderness_glade_plural: "광야 공생군 개활지"
 holding_wilderness_glade_desc: "광야 공생군의 생산 구역에 해당하는 곳으로, 부모 집합체와 미약하게 연결되어 있습니다. 현지 식량 자원에 대한 의존도가 매우 높지만, 이 국지 생물권 안에 거주하는 공생체들은 주변의 다양한 자원을 추출하는 데 매우 능합니다."
 holding_wilderness_glade_effect_desc: "종속국이 지배국을 위해 [owner.WildernessGladeProvides](을)를 $r_basic_plural$으로 바꿉니다.\n지배국이 종속국 행성의 $mod_planet_jobs_productive_upkeep_mult$를 감소시킵니다.\n£blocker£ §Y$holding_wilderness_glade$§!가 행성에 생성되어, 지구 슬롯 하나를 차지합니다."
 no_free_district_for_wilderness_glade: "$TRIGGER_FAIL$§R이 행성에는 국지 생물군계를 건설할 지구가 없습니다.§!"
 blocker_tied_to_wilderness_glade: "$TRIGGER_FAIL$§R이 차단물은 이 행성에 §Y$holding_wilderness_glade$§! 보유 자산이 존재하는 한 사라지지 않습니다.§!"
 d_wilderness_glade_blocker: "$d_wilderness_root_blocker$"
 d_wilderness_glade_blocker_desc: "이 국지 생물군계가 우리의 외계 환경에서 살아남기 위해서는 인근 $holding_wilderness_glade$를 지탱할 대규모 뿌리 구조가 필요합니다."
 holding_wilderness_glade_modifier: "분산형 광야 공생군 개활지"
 holding_wilderness_glade_modifier_desc: "종속국의 행성이 우리 행성과 조화를 이뤄, 상리 공생에 의한 혜택을 서로 나눕니다." # appears in 'lore brown'
 holding_wilderness_glade_modifier_tt: "§Y$holding_wilderness_glade_plural$§!를 갖춘 종속국 행성의 수에 따라 규모가 달라집니다."
