 job_tamersymbiont: "조련 공생체"
 job_tamersymbiont_plural: "조련 공생체"
 job_tamersymbiont_desc: "이 공생체는 복잡한 페로몬 신호로 준지성체 군집을 조련해, 이 생물들의 야성적인 본능을 잘 조직된 행성 방위 수단으로 탈바꿈합니다."
 job_tamersymbiont_effect_desc: "[soldier.GetIcon] $job_tamersymbiont_plural$는 £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!과 $r_stability$를 증가시키고 £defense_army£ §Y방위군§!을 생성합니다."
 mod_job_tamersymbiont_add: "$job_tamersymbiont$ 직업"
 mod_job_tamersymbiont_per_pop: "$VALUE$팝당 $job_tamersymbiont$ 직업 §G+1§!"
 mod_job_tamersymbiont_per_pop_short: "\n$VALUE$ £pop£마다 £mod_job_patrol_drone_add£ §G+1§!"
 immunosymbiont: "$job_immunosymbiont$"
 job_immunosymbiont: "면역 공생체"
 job_immunosymbiont_plural: "면역 공생체"
 job_immunosymbiont_desc: "이 공생체는 광야의 뿌리를 순찰하면서 일탈을 감지하고 분란을 저지합니다. 거대 유기체를 위한 일종의 거대한 항체인 셈입니다."
 job_immunosymbiont_effect_desc: "[patrol_drone.GetIcon] $job_immunosymbiont_plural$는 £crime£ §Y$PLANET_CRIME_NO_HAPPINESS_TITLE$§!을 감소시키고 £defense_army£ §Y방위군§!을 생성하며, £unity£ §Y$unity$§!을 생산합니다."
 broodsymbiont: "$job_broodsymbiont$"
 job_broodsymbiont: "산란 공생체"
 job_broodsymbiont_plural: "산란 공생체"
 job_broodsymbiont_plural_with_icon: "[spawning_drone.GetIcon] $job_broodsymbiont_plural$"
 job_broodsymbiont_desc: "광야 공생군을 유연한 형태의 생체 물질로 채우는 공생체입니다. 이 생체 물질은 살아 있으며, 행성의 필요에 따라 어떤 모습으로든 바뀝니다."
 job_broodsymbiont_effect_desc: "[spawning_drone.GetIcon] $job_broodsymbiont_plural$는 $r_food$(또는 $r_minerals$)을 £mod_planet_amenities_no_happiness_add£ §Y$PLANET_AMENITIES_TITLE$§! 및 £biomass£ §Y생체 물질§!로 바꿉니다."
 mod_job_broodsymbiont_add: "$job_broodsymbiont$ 직업"
