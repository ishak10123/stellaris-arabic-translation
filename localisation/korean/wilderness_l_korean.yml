 ####################################
 # Traditions
 ####################################
 tr_adaptability_appropriation_wilderness: "징발"
 tr_adaptability_appropriation_wilderness_delayed: "사용되지 않는 생태계는 제국에 아무런 기여도 하지 않습니다. [GetIndividualNamePluralCap](을)를 가장 필요한 행성에 효율적으로 재배치해야 합니다."
 tr_discovery_faith_in_science_wilderness: "균사체망"
 tr_discovery_faith_in_science_wilderness_delayed: "균사체 연결망에 속한 모든 [GetIndividualNamePlural]의 호기심 많은 성격을 활용하면, 발견 능률을 크게 개선할 수 있습니다."
 tr_domination_wilderness_network: "대규모 신진대사 가속화"
 tr_domination_wilderness_network_delayed: "대륙 차원에서 에너지 교환 속도를 높인다면, 우리의 각 부분이 서로에게 제공하는 혜택의 규모를 훨씬 더 확대할 수 있습니다."
 tr_domination_wilderness_network_effect: "§Y시행령 잠금 해제:§! $edict_drone_overdrive_wilderness$"
 tr_domination_imperious_architecture_wilderness: "이종 간 페로몬 적합성"
 tr_domination_imperious_architecture_wilderness_desc: "§Y$district_craglands_plural$§!가 £defense_army£ §Y$defense_army_plural$§!을 추가 제공: §G+1§!"
 tr_domination_imperious_architecture_wilderness_delayed: "모든 [GetIndividualNamePlural] 사이의 페로몬 교환을 강제하면, 외부 위협에 더 빠르게 대응할 수 있습니다."
 tr_expansion_colonization_fever_wilderness: "다행성 정신"
 tr_expansion_colonization_fever_wilderness_desc: "신규 행성 개척 시 무작위 §Y£district£ 지구§!를 하나 추가합니다."
 tr_expansion_colonization_fever_wilderness_delayed: "[GetGestaltEntityName](은)는 차가운 우주의 공허도 침묵시킬 수 없는 생각의 합창곡입니다."
 tr_expansion_a_new_life_wilderness: "거침없는 성장"
 tr_expansion_a_new_life_wilderness_delayed: "[GetGestaltEntityName](은)는 자신이 직면한 문제에 대한 해결책을 직접 키워 냅니다."
 tr_expansion_courier_network_wilderness: "$tr_expansion_courier_network_hive$"
 tr_expansion_courier_network_wilderness_delayed: "각 생물군계를 전체의 하위 의식으로 취급하면, 행성 의식의 정신을 그곳에 집중하지 않고도 대상과 소통할 수 있습니다."
 tr_expansion_galactic_ambition_wilderness: "$tr_expansion_galactic_ambition_hive$"
 tr_expansion_galactic_ambition_wilderness_delayed: "우리를 보살피던 요람 행성에서 벗어나 어둠 속을 향해 망설이며 처음으로 뻗은 촉수에는 원시의 공포가 따랐습니다. 이러한 공포를 정복하고 지배해야만 우리는 계속해서 성장할 수 있을 것입니다. [GetGestaltEntityName]의 생존을 위해서라면 수백만의 [GetIndividualNamePlural](은)는 죽음을 택할 것입니다."
 tr_prosperity_pursuit_of_profit_wilderness: "전 행성 액체 운송"
 tr_prosperity_pursuit_of_profit_wilderness_delayed: "대륙 전체에 뻗친 운송망으로 영양분과 주요 건설 자재를 운반해, 어려움에 처한 생태계를 보완합니다."
 tr_prosperity_public_works_wilderness: "지하 둥지"
 tr_prosperity_public_works_wilderness_desc: "모든 £district£ §Y지구§!가 §G50§! £housing£ §Y$MOD_PLANET_HOUSING_ADD$§!를 추가로 제공합니다."
 tr_prosperity_public_works_wilderness_delayed: "[GetIndividualNamePlural]들이 지각 표층에 침투하고 둥지를 밀랍으로 강화하게 하면, 수용 가능 규모를 확대할 수 있습니다."
 tr_synchronicity_kinship_wilderness: "활동 주기 동기화"
 tr_synchronicity_kinship_wilderness_delayed: "[GetIndividualNamePlural]의 휴식 주기를 정밀하게 제어하면, 영양분 재분배를 행성 전체에 걸쳐 자연스러운 일정으로 진행할 수 있습니다."
 ####################################
 # Ascension Perks
 ####################################
 ap_mastery_of_nature_wilderness: "$ap_mastery_of_nature$"
 ap_mastery_of_nature_wilderness_desc: "우리는 포식과 피식의 순환 그 자체입니다. 세포 하나하나부터 높다란 나무에 이르기까지 우리는 모두 이 원칙에 따라 살아갑니다. 우리가 곧 자연입니다."
 ap_engineered_evolution_wilderness: "$ap_engineered_evolution$"
 ap_engineered_evolution_wilderness_desc: "우리의 의식은 주변 환경이 주는 시련을 극복하도록 진화했습니다. 환경이 변화한 만큼 우리도 변할 것입니다."
 engineered_evolution_wilderness_tt: "- §Y$genetic_ascension_situation$ 상황§!을 개시해 ['tradition_category:tradition_purity'] 전통 트리를 잠금 해제합니다.$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n- 유전자 변형 기술이 연구 선택지로 부여되는 다음 안건이 잠금 해제됩니다. $UNLOCKS_AGENDA$ §Y$council_agenda_agenda_engineered_evolution_name$§!"
 ############
 # Espionage
 ############
 operation_embed_planetary_roots: "행성 뿌리 조직 정착" # literal roots, as in plantlife
 operation_embed_planetary_roots_desc: "정보 수집 [owner.GetIndividualNamePlural]들은 현재 긴급하게 달리 쓸 곳이 있습니다. 그러나 부분적으로 의식을 갖춘 미생물을 대상 제국의 행성에 정착시키면, 우리의 첩자망을 대부분 보전하면서도 상대의 식량 공급망을 교란시킬 수 있습니다." # the Wilderness embeds a part of itself, hence 'microbiome'
 operation_embed_planetary_roots_on_success: "$operation_sleeper_cells_on_success$"
 espionage_planetary_roots: "행성 뿌리 조직"
 espionage_planetary_roots_desc: "상대 제국에 부분적으로 의식을 갖춘 미생물을 정착시켜, 이곳에서 일어나는 일을 보고하도록 했습니다. 이 원시적 수준의 공생체는 우리 정보 수집 [owner.GetIndividualNamePlural]들을 즉시 지원할 준비를 갖춘 채 대기하고 있습니다."
 operation_embed_planetary_roots_requires_blocker: "$TRIGGER_FAIL$ §R우리 $espionage_planetary_roots$을 정착시키기 위해서는 대상 행성 한 곳에 ['concept_natural_blocker']이 필요합니다.§!"
 operation_embed_planetary_roots_dont_stack_this: "$TRIGGER_FAIL$ §R이미 [target.GetName] 내에 $espionage_planetary_roots$을 정착시켰습니다. 그에 따른 혜택은 §Y[planet_roots_success]§!까지 지속될 수 있습니다.§!"
 operation_embed_planetary_roots_not_cleared: "$TRIGGER_FAIL$ §R[target.GetName] 내부 어딘가에서 아직도 우리 $espionage_planetary_roots$의 존재가 느껴집니다.§!"
 d_wilderness_root_blocker: "침입 덤불"
 d_wilderness_root_blocker_desc: "외부에서 온 준지성체 공생군이 농촌 지역 외곽에 자리를 잡아 형성된 지대입니다."
 wilderness.4500.name: "서식지 모색"
 wilderness.4500.desc: "우리 준자율체 [owner.GetOperativesLowerPlural]들이 우리 고유 미생물군계가 서식할 후보지를 발견했습니다. 장기적으로 봤을 때 성공 전망이 가장 밝은 곳을 찾아, 앞으로 일정 기간 동안 각 후보지를 지켜볼 예정입니다."
 wilderness.4505.name: "후보지 발견"
 wilderness.4505.desc: "[target.GetSpeciesAdj] 측이 의도치 않게 우리에게 도움을 주었습니다. 자신들이 자연 보호의 의무를 이행하는 것이라고 착각하며 §H[roots_planet.GetPlanetMoon] [roots_planet.GetName]§!의 한 배후지에 우리의 '씨앗 폭탄' 미생물을 운반하겠다고 나선 것입니다.\n\n이 폭탄 안에서 자라나는 공생체들은 우리 자아의 일부로 완전히 자라기 전에 목숨을 잃고 말겠지만, 이들로부터 외계 행성을 최대한 침투하고 관측을 수행하려는 강렬한 의지가 느껴집니다."
 wilderness.4510.name: "$espionage_planetary_roots$ 정착 완료"
 wilderness.4510.desc: "우리가 보낸 미생물이 새 보금자리가 될 [GetRootsBlockerName]에 도착한 순간부터, 우리는 그 금지된 공기를 들이마시며 §H[roots_planet.GetName]§!(이)라는 이 행성을 지켜보기 시작했습니다.\n\n이 공생체들은 우리 자아 전체와 근본적으로 단절되어 있기 때문에 우리가 행사할 수 있는 영향력은 지극히 적습니다. 하지만 [target.GetAdj] 영역에서 작전을 재개할 때가 되면, 공생체들은 다시 우리를 위해 활동할 것입니다."
 wilderness.4510.a: "우리가 내린 뿌리는 더 깊게 파고들고 더 오래 존속합니다."
 wilderness.4510.b: "우리 뿌리가 이곳에서 마음껏 자라게 합시다."
 ####################################
 # Technologies
 ####################################
 tech_wilderness_terraform: "행성 발아"
 tech_wilderness_terraform_desc: "새 행성으로 뿌리를 뻗치기 위해서는 발아를 위한 토양을 먼저 마련해야 합니다. 행성을 테라포밍하면 우리 식민지들이 건강하게 출발할 여건을 마련할 수 있습니다."
 tech_terrestrial_sculpting_wilderness: "$tech_terrestrial_sculpting$"
 tech_terrestrial_sculpting_wilderness_desc: "$tech_terrestrial_sculpting_desc$"
 tech_terrestrial_sculpting_wilderness_effect: "§H기능 잠금 해제:§! 모든 표준 행성 유형을 테라포밍할 수 있게 됩니다."
 tech_wilderness_node: "존재의 중심"
 tech_wilderness_node_desc: "깊은 사고력을 지닌 공생체들이 우리 분산된 자아 곳곳에 위치한 개활지에서 자라나도록 유도하면, 모두가 우리의 집단 의지를 더 확실히 느끼게 할 수 있습니다."
 tech_wilderness_cluster: "$tech_hive_cluster$"
 tech_wilderness_cluster_desc: "공통의 의지를 추진하는 역할에 전념하는 공생체의 군집을 육성한다면, 전체 집단의 사고가 더 유려하게 진행되도록 촉진할 수 있습니다."
 tech_wilderness_confluence: "$tech_hive_confluence$"
 tech_wilderness_confluence_desc: "깊은 공감 능력을 갖춘 공생체 군집을 대규모로 육성하면, 주변 환경과 조화를 이뤄 집단의 사고를 집약하고 다시 송출하게 함으로써 우리의 상리 공생적 의지를 강화할 수 있습니다."
 tech_genome_mapping_wilderness: "$tech_genome_mapping$"
 tech_genome_mapping_wilderness_desc: "다양한 DNA 변종 유전체의 지도를 작성하면, 우리의 성장 원리에 대한 이해가 깊어지고 문제를 유발하는 여러 복잡한 요인을 제거할 수 있습니다."
 tech_mining_1_wilderness: "$tech_mining_1$"
 tech_mining_1_wilderness_desc: "점액질의 경화제와 유압을 기존 광물 매장지에 적용하면, 더 깊은 곳에서 광물을 캐내고 생산량을 높일 수 있습니다."
 tech_powered_exoskeletons_wilderness: "$tech_powered_exoskeletons$"
 tech_powered_exoskeletons_wilderness_desc: "동력형 외골격 슈트는 사용자의 힘과 속도를 강화하기 때문에 군사적으로 활용할 수 있을 뿐만 아니라 육체노동의 능률도 높일 수 있습니다."
 tech_colonization_1_wilderness: "신세계 계획"
 tech_colonization_1_wilderness_desc: "새 행성의 각성에 필요한 자원과 물자를 계산하는 데 집중함으로써, 우리 개척 공생체들이 성간 항행이라는 고된 여정에 대비하게 합니다."
 tech_wilderness_government: "$tech_planetary_government$"
 tech_wilderness_government_desc: "새 행성이 각성하는 순간부터 그 행성은 우리 자아 전체를 위하는 것보다는 안정적이고 풍요로운 환경을 만들어 내는 데 주력해야 합니다."
