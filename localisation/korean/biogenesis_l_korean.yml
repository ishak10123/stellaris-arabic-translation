 trait_auto_hab_preference_desc: "§L기후 선호도는 아주 오랜 기간에 걸친 진화나 설계, 숙련된 유전자 조작에 의해 결정됩니다. 아니면 지금과 같이 레트로바이러스 인자를 통한 환경 적응을 통해서도 결정됩니다.§!"
