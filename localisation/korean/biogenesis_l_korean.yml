 SHIP_BEHEMOTH_RAGE: "공격성 분비샘"
 SHIP_BEHEMOTH_RAGE_DESC: "길들지 않은 괴수 베헤모스는 의지력이 강한 탓에 쉽게 제어가 풀리고 맙니다. 섣불리 길들이려고 했다간 녀석의 화를 돋워, 베헤모스라는 이름의 아무도 막을 수 없는 우주 폭풍이 휘몰아칠 수 있습니다. 베헤모스가 우리 말을 들을 때까지 기다리기보다 녀석을 자극해서 필요할 때마다 그 분노를 불러일으키는 편이 나을지도 모릅니다."
 behemoth_rage_ship_button: "§H격노§!\n\n§Y베헤모스§!를 풀어놓습니다.\n격노에 빠진 베헤모스가 가장 가까운 §Y식민지§!나 §Y베헤모스 알§!로 이동해 파괴를 시도합니다.\n격노 상태는 보통 §Y180일§! 동안 지속되나, 다양한 요인으로 인해 기간이 바뀔 수도 있습니다.$TABBED_NEW_LINE$- §R전투§!나 §R폭격§! 중에는 베헤모스의 격노가 가라앉지 않습니다.$TABBED_NEW_LINE$- 격노 중인 베헤모스를 전투로 §G제압§!하면, 베헤모스가 다시 우리의 통제를 받습니다."
