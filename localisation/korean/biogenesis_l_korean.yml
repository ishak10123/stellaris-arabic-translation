 d_lethal_ecosphere_blocker_desc: "이곳에서는 전쟁 파생체가 폐기한 표본과 실험체들이 유혈 낭자한 부자연 선택의 투쟁 속에서 생존을 위해 발버둥 칩니다. 어마어마한 적대감이 지배하는 이 훈련장은 대부분의 병사에게 무덤이 되겠지만, 누구든 생존한다면 무자비한 살육 기계가 될 것이 틀림없습니다."
