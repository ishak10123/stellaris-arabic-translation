 DSC_AURA_KINETIC_PENETRATION: "초소형 특이점 불안정화 장치"
 DSC_AURA_KINETIC_PENETRATION_DESC: "아주 미세한 특이점으로 이루어진 영역을 구성해, 운동 에너지형 탄약을 표적에 닿기 전에 분산시킵니다."
