 replicatory_association_insurance_basic_desc: "$ruler_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\n§Y제국 통치자§! §Y$leader_trait_has_backup_clone_plural$§!의 ['concept_clone_leader_degradation', 퇴화] 완화"
