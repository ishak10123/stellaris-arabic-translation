 behemoth_army: "괴수급 거대 야수"
 behemoth_army_desc: "웬만한 도시보다도 거대하게 우뚝 솟은 이 괴수들의 그림자는 태양마저 가려 버리며, 내딛는 걸음은 대지를 송두리째 뒤흔듭니다."
