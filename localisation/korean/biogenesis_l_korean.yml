 DSC_EMPTY_AURA: "빈 슬롯"
 DSC_TARGET_MAGNET: "표적 오버라이드"
 DSC_TARGET_MAGNET_DESC: "안테나 배열체가 이 방어 기지의 횡단면이 탐지되도록 인위적으로 유도해, 적은 어쩔 수 없이 주변의 우리 측 아군 대신 방어 기지를 공격하게 됩니다."
