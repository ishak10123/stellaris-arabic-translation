 SHIP_BEHEMOTH_COCOON: "홀로메타볼릭 스피너"
 SHIP_BEHEMOTH_COCOON_DESC: "§Y베헤모스§!는 격풍이 몰아치는 가스 행성의 대기층에 자리 잡고, 그 조밀한 대기에 가득한 중금속과 복합 분자 화합물을 흡수함으로써 필수 영양분을 확보합니다. 시간이 지나면 이 영양분은 베헤모스의 성장을 촉진하고 그 막강한 힘을 더욱 키워 줄 것입니다."
