 concept_growth_factor: "$growth_factor_desc$"
 concept_growth_factor_desc: "성장 계수는 베헤모스가 흡수한 영양분의 양을 나타내는 지표로, 상황의 진행 속도에 영향을 줍니다.\n\n매달 §R0.75%§!씩 감소합니다.\n\n$behemoth_finale_situation_monthly_change_tooltip$\n\n최솟값은 $pop_group_unit$ £pop£ §H전이된 팝§!당 §G0.5%§!입니다."
 behemoth_finale_situation_desc: "이렇게 규모가 막대한 형태에 적응하려면 시간이 다소 걸릴 것입니다. 몸에 적응하는 동안에는 주변 환경을 잘 파악하고 있어야 합니다. 우리는 공허에 무방비하게 노출되어 있으니 말입니다.\n\n현재 ['concept_growth_factor']: §G[growth_factor_value]%§!"
