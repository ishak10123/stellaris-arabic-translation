 death_world: "죽음 행성"
 death_world_desc: "엄밀히 말하면 거주가 가능한 행성이지만, 이곳에서의 삶은 악몽과도 같습니다. 이곳의 현지 생물은 식물과 동물 가릴 것 없이 가장 보잘것없는 벌레조차 우리 모성의 최상위 포식자보다 훨씬 더 무시무시합니다."
