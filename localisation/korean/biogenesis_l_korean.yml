 ### Hive Fallen Empire #
 RT_INCOMPLETE_OVERMIND: "불완전한 지배 의식"
 gov_war_splinter: "전쟁 파생 군체"
 gov_war_splinter_desc: "단일한 군체를 구성하던 다양한 충동 중 하나로, 공격적이고 호전적인 본능을 갖췄습니다. 이 군체는 내부에서도 치열한 싸움을 벌이며, 그러지 않을 때는 다른 파생 군체를 지배하려 듭니다."
 gov_growth_splinter: "성장 파생 군체"
 gov_growth_splinter_desc: "멸망한 군체의 일부로, 진화와 변화에 대한 열망을 갖췄습니다. 스스로를 바꾸는 데 너무 치중한 나머지, 다른 파생체들을 지배하는 데 애를 먹고 있습니다."
 gov_control_splinter: "지배 파생 군체"
 gov_control_splinter_desc: "이 파생체는 일탈을 억누르고 통일성을 증진하는 데 집착하는 본능이 특징입니다. 어떻게든 다른 파생체를 지배하고자 하지만, 우리 우주에 내재하는 끊임없는 혼란에 계속해서 주의를 뺏기고 있습니다."
 gov_fused_ascendancy: "융합된 권세"
 gov_fused_ascendancy_desc: "한때 무너졌으나 다시 일어섰습니다. 분열의 상흔은 이 각성한 제국을 약하게 만들기는커녕 새롭게 태어나게 했습니다. 과거의 군체는 실패를 거두었지만, 새로 나타난 군체는 영원한 지배를 추구합니다."
 civic_fragmented_command: "파편화된 명령"
 civic_fragmented_command_desc: "과거에 존재했던 온전한 군체의 일부가 떨어져 나와 생긴 이 몰락한 제국은 성간 제국을 다스리는 데 필요한 핵심 부분이 결핍되어 있습니다."
 civic_hyper_aggressive_drones: "과잉 공격적 드론"
 civic_hyper_aggressive_drones_desc: "이 몰락한 제국의 드론들은 항상 서로 싸움을 벌이고 있기 때문에 자원이 심각하게 부족합니다."
 civic_unstable_drones: "불안정한 드론"
 civic_unstable_drones_desc: "이 몰락한 제국의 드론들은 끊임없이 강제 진화하고 있습니다. 그 결과, 부속지가 부족해지는 바람에 배정된 작업을 수행하기 어려울 때가 많습니다."
 civic_stunted_drones: "제약받는 드론"
 civic_stunted_drones_desc: "이 몰락한 제국의 드론들은 극히 세부적인 부분까지 통제를 받아, 어떠한 이유로도 배정된 작업에서 이탈할 수 없습니다. 공장에 화재가 나도 예외는 없습니다."
 civic_restored_mind: "의식 회복"
 civic_restored_mind_desc: "마침내 다시 회복되어 현대적인 본능을 따르는 고대의 의식입니다."
 civic_ancient_memories_of_war: "옛 전쟁의 기억"
 civic_ancient_memories_of_war_desc: "이 각성한 제국은 오래전에 사라진 전술과 진형을 은하계 무대에서 선보입니다. 이들의 함대는 별들조차 가릴 정도로 무수히 많습니다."
 civic_ancient_memories_of_growth: "옛 성장의 기억"
 civic_ancient_memories_of_growth_desc: "이 각성한 제국은 오래전에 사라진 발전과 번영의 방법을 구현합니다. 이들은 우주의 별보다 많을 정도로 수많은 드론을 다스립니다."
 civic_ancient_memories_of_control: "옛 지배의 기억"
 civic_ancient_memories_of_control_desc: "이 각성한 제국은 오래전에 사라진 권위와 규제를 실현합니다. 이들의 권세는 성간 우주까지 미칠 것입니다."
