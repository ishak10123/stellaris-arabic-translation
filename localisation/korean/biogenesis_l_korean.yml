 policy_homogenous_class: "유전체 맞춤 조작"
 policy_homogenous_class_desc: "지도자의 클론을 유지하는 데 사용하는 기본 유전체를 세심하게 맞춤 조작하면, 정예 조직을 최적화할 수 있습니다."
 homogenous_class_scientists: "과학적 코덱스"
