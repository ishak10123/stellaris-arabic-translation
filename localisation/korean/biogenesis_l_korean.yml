 MESSAGE_VOIDSPAWN_TRAIT_ADDED: "$SPECIES|Y$(이)가 §Y$trait_voidling$§! 특성을 획득했습니다."
 MESSAGE_TIYANKI_TRAIT_ADDED: "$SPECIES|Y$(이)가 §Y$trait_tiyanki$§! 특성을 획득했습니다."
 ### BIOMORPHOSIS (GENETIC ASCENSION) SITUATION(S)
 ## REGULAR EMPIRE SITUATION
 #SET-UP / PREAMBLE
 genetic_ascension_situation: "생체 변형"
 genetic_ascension_situation_type: "$genetic_ascension_situation$"
 genetic_ascension_situation_desc: "우리는 이제 자연 선택과 유전적 부동에 방해받지 않고 생물계를 지배할 수 있습니다. 우리 문명은 종족 자체의 미래가 재정립될 순간을 목전에 두고 있습니다. 우리 [Owner.Species.GetFleshTypeCyberCreed](은)는 진흙이며, 우리는 이를 빚는 조각가입니다."
 genetic_ascension_situation_monthly_change_tooltip: "우리 유전학자들이 부단히 연구를 진행하고 있습니다."
 genetic_ascension_situation_outcome: "유전자 조작의 잠재력을 완전히 개방시켜 종족의 발전을 도모합니다.\n\n이로써 생체 변형을 궁극적으로 어떻게 구현할 것인지 선택이 주어집니다."
 genetic_ascension_situation_pause_desc: "상황 일시 정지 중"
 genetic_ascension_approach_selected: "$TRIGGER_FAIL$이미 이 단계에서는 선택을 내렸습니다."
 situation_gene_tailoring_needed_desc: "$TRIGGER_FAIL$['concept_gene_tailoring'] 기술을 보유하지 않음"
 mod_biomorphosis_progress_mult: "$genetic_ascension_situation$ 월간 진행도"
 #STAGE EVENTS
 bio.5.name: "본질 개조" #STAGE ONE
 bio.5.desc.no_options: "진화를 촉진하기 위해서는 우리의 진화 과정을 규정할 경로를 확실히 선택해야 합니다. 우리는 이처럼 잠재력을 실현하고자 하는 과정에서 우리의 본질이 근본적으로 변할 수도 있음을 알고 있습니다.\n\n진화를 조정하는 일은 아주 중대한 작업입니다. 우리가 어떤 변화를 택하는지에 따라 우리의 미래가 바뀔 것입니다."
 bio.5.desc.has_options: "$bio.5.desc.no_options$\n\n우리 종족을 도약시키기 위해서는 그 여정이 향할 길을 우리가 선택해야만 합니다."
 bio.5.a: "순수의 길."
 bio.5.b: "클론의 길."
 bio.5.c: "변이의 길."
 bio.10.name: "변곡점" #STAGE TWO
 bio.10.desc.no_options: "우리는 스스로 진화를 조절한 결과 크나큰 발전을 이루어 냈고, 유전적 특성, 생식, DNA 염기 서열에 대한 깊은 이해를 갖추게 되었습니다.\n\n이제 우리 종족의 발전이 정점에 다다르고 있습니다. 몇 년만 있으면 종족의 잠재력이 완전히 실현될 것입니다."
 bio.10.desc.has_options: "$bio.10.desc.no_options$\n\n이제 우리는 왔던 길을 계속 따라갈 수도 있고, 아니면 다른 분야에 중점을 두고 다음 발전 단계를 모색할 수도 있습니다."
 bio.10.a: "순수성에 중점을 둡시다."
 bio.10.b: "클론에 중점을 둡시다."
 bio.10.c: "변이에 중점을 둡시다."
 bio.15.name: "진화의 갈림길" #STAGE THREE
 bio.15.desc.no_options: "부단한 노력을 기울인 끝에, 우리 종족이 진화 과정의 중대한 전환점에 다다랐습니다. 이제 우리는 어떠한 길을 따라 종족의 진화적 잠재력을 완전히 실현하면 좋을지 결정을 내려야 합니다."
 bio.15.desc.has_options: "$bio.15.desc.no_options$\n\n다시 한번 우리가 주력할 분야를 선택할 때가 왔습니다."
 bio.15.a: "순수성을 선택합시다."
 bio.15.b: "클론 기술을 완성합시다."
 bio.15.c: "변이가 우리를 미래로 이끌 것입니다."
 genetic_ascension_approach_purity: "순수"
 genetic_ascension_approach_cloning: "클론"
 genetic_ascension_approach_mutation: "변이"
 genetic_ascension_approach_purity_desc: "더욱 순수한 존재가 되는 데 노력을 기울입니다."
 genetic_ascension_approach_cloning_desc: "쿨론 연구에 집중하면 성장의 길이 열릴 것입니다."
 genetic_ascension_approach_mutation_desc: "우리의 미래는 유전자 변이에 달려있습니다."
 bio.20.name: "지나간 길" #FINAL STAGE - TRADITION TREE CHOICE
 bio.20.desc: "종족의 가장 순수한 형태를 추구하든 클론 기술로 성공을 도모하든, 아니면 의도적인 변이를 통해 유전자를 강화하든 이 순간을 지나면 선택을 되돌릴 수 없습니다."
 bio.20.desc.evopred: "우리는 쉽게 변하는 특성을 타고났습니다. 우리는 이 우주에서 가장 복잡한 생명체로서 연구를 통해 끊임없이 변화할 것입니다.\n\n혼란이 다가옵니다. 우리에게는 완벽하기 그지없는 미래입니다."
 bio.20.a: "순수함의 의미를 깨닫도록 합시다."
 bio.20.b: "클론 기술로 성공을 거머쥘 겁니다."
 bio.20.c: "변이의 힘을 적극 활용합시다."
 #Random Events
 bio.50.name: "평등의 차등"
 bio.50.desc: "유전적 순수성에 주력한 결과, 유전자가 강화된 시민들이 나머지 주민에 비해 자신들이 선천적으로 우월하다고 여기기 시작했습니다. 이러한 인식을 바탕으로 당사자들이 근로 시간 단축, 편의 확대, 정치적 권한 강화를 요구하고 있습니다. 해당 주민들의 시위가 점차 격해지고 있으며, 그 결과 상당한 사회적 혼란이 발생하고 있습니다."
 bio.50.a: "시위를 진압하세요."
 bio.50.b: "당연히 요구할 만한 권리군요."
 bio.55.name: "사회적 세포 분열"
 bio.55.desc: "뉴스에는 분란을 조장하는 표현이 난무하고, 견해 차이로 인해 사회가 분열되고 있습니다. 유전자 조작을 받은 주민들이 더 많은 기회를 누리게 되면서 새로운 종류의 계급 투쟁이 나타나고 있습니다.\n\n유전자 강화 계층은 자신들이 우리 종족의 미래를 대표한다고 생각하는 반면, 전통파 주민들은 우리가 자연을 너무 지나치게 거슬렀다고 생각합니다."
 bio.55.a: "우월한 사회라면 구성원도 우월해야 하는 법."
 bio.55.b: "우리가 너무 빨리 변했는지도 모르겠군요."
 bio.60.name: "신랄한 격차"
 bio.60.desc: "일부 산업에서 무차별적인 순수성 검사가 확산되고 있습니다. 유전자 구성이 우월한 것으로 인정되면 직업과 교육에서 우대를 받고, 별다른 요건을 충족하지 않고도 여러 유력 지위에 쉽게 오를 수 있습니다.\n\n일각에서는 생체 강화를 거치면 실제로 능력과 건강이 향상된다고 주장하나, 그러한 인식이 확산될 경우 문제가 발생할 수 있다는 우려도 나오고 있습니다. 완벽한 유전자를 갖추고자 유전체를 바꿀 의사나 능력이 없는 이들에게 차별이 발생할 수 있다는 것입니다."
 bio.60.a: "모두에게 공평한 기회를 보장해야 합니다."
 bio.60.b: "적자생존이란 말이 있지요."
 bio.65.name: "영웅과 악당"
 bio.65.desc: "우리가 유전적 순수성을 추구하는 과정에서 그 혜택을 받은 일부 구성원이 의기양양해져서는 공공 안전의 수호자를 자처하고 나섰습니다. 초능력에 가까운 완력, 민첩성, 내구력을 지니게 된 이 몽상가들은 영웅을 자처하면서 법을 자기 [owner.species.GetHandNamePlural](으)로 집행하고 있습니다.\n\n그러나 이 신진 세력의 용맹에 맞서는 이들이 나타났습니다. 이들과 마찬가지로 유전자를 강화한 숙적들이 우리 사회에 암약하면서, 힘의 균형을 유지하려는 욕망으로 악의를 불태우고 있습니다. 이 두 진영 사이의 충돌로 인해 상당한 재산 피해가 발생했을 뿐만 아니라 시민들도 위험해지고 있습니다."
 bio.65.a: "자경단 따위가 활동하게 둘 순 없죠."
 bio.65.b: "맘껏 싸우라고 하세요."
 MAVERICK_CITIZENS_MOD: "[enforcer.GetIcon] §Y[enforcer.GetNamePlural]§!(이)가 100 직업당 §G2§! $r_stability$ 및 §G2§! $r_unity$을 추가로 생산합니다."
 bio.66.name: "초능력 제한"
 bio.66.desc: "초능력을 지닌 구성원들의 활동을 제한하기로 하면서 초능력 보유자들은 엄격한 제한과 규제를 받게 되었고, 감시 활동을 통해 이들의 움직임을 파악하고 제약할 수 있게 되었습니다.\n\n최대한 초능력 보유자들이 자신의 능력을 우리 제국을 위해서만 사용하도록 조치하고 있지만, 초능력 보유자와 일반 주민들 사이에 우려와 환멸이 확산되고 있습니다. 해당 문제로 주민들이 크게 분열되고 말았습니다."
 bio.66.a: "초능력 부대를 설립합시다."
 bio.66.b: "박탈한 권리를 되돌려 줍시다."
 bio.67.name: "초능력 의존"
 bio.67.desc: "유전자 강화 자경단에 대한 의존도가 높아지면서, 이 초능력자들이 양날의 검이 되고 있습니다. 자경단 덕분에 안심하고 살 수 있게 되었지만, 이들에게 과도하게 의존하게 된 것이 문제입니다.\n\n주민들은 자경단에게 고마워하고 있지만, 급기야는 사법 절차를 우회하고 공무원들을 무시한 채 자경단원들이 자신들을 이끌고 도와줄 것을 바라고 있습니다. 영웅과 정부 사이의 구분이 모호해졌습니다. 앞으로 권력이 어떻게 될지 모르는 상황입니다."
 bio.67.a: "초능력자 의회를 결성합시다!"
 bio.67.b: "이 '영웅'이란 작자들이 국정에 관여하지 못하게 하세요."
 bio.70.name: "둘이 하나"
 bio.70.desc: "은하계 전체에서 지칠 줄 모르는 성실함으로 정평이 난 유력 지도자가 있습니다. 그런데 이 지도자가 사실 두 명인 것으로 나타났습니다.\n\n지도자가 자신의 완벽한 클론을 만들어, 교대로 번갈아 가며 근무한 것입니다. 한쪽이 공무를 돌보고 행정을 처리하는 동안, 다른 한쪽은 몰래 쉬면서 몸을 회복했다고 합니다.\n\n이번 일은 정치권에 큰 충격을 주었으며, 리더십의 본질이 무엇인지, 클론 기술의 윤리적 경계가 무엇인지에 관한 화두를 던져 주었습니다."
 bio.70.a: "클론 기술을 효율적으로 사용했군요."
 bio.70.b: "나라를 속였으니 둘 다 해임하세요."
 bio.75.name: "클론 반란"
 bio.75.desc: "장기를 얻으려 클론 제작을 의뢰하는 관행이 벌써부터 부작용을 일으키고 있습니다. 지성이 있는 것이 분명한 일부 클론이 장기간 단식 투쟁에 들어간 것입니다.\n\n원본의 건강과 수명이 클론보다 중요하다고 주장하는 이가 많지만, 지성이 있는 존재라면 자기 결정권이 있다는 주장도 제기되었습니다. 이 민감한 주제로 인해 열띤 논쟁이 벌어지고 있습니다."
 bio.75.a: "클론 장기 이식을 중단하세요."
 bio.75.b: "원본의 권리가 우선입니다."
 bio.80.name: "입증 책임"
 bio.80.desc: "법 집행 기관들이 진퇴양난에 빠졌습니다. 수도의 범죄율이 높아지고 있지만 법의 심판대에 오르는 주민의 수는 줄어만 갑니다. 용의자들이 사실은 자기 클론이 범죄를 저지른 것이라며 무죄를 주장하는 사례가 늘고 있는 탓입니다.\n\n그 결과 현행범으로 검거되지 않는 한 유죄를 입증하기가 거의 불가능해졌습니다. 사법부 일각에서는 기존 위법 행위를 대부분 실질적으로 비범죄화할 것을 요구하고 있습니다."
 bio.80.a: "감시 시스템을 보강하세요."
 bio.80.b: "법이 줄면 범죄도 줄어드는 법이죠."
 bio.85.name: "복사 붙여넣기"
 bio.85.desc: "우리 국경 내에서 거대한 무허가 클론 시설이 발견되었습니다. 그 안에는 수천에 달하는 도플갱어가 있었으며, 그중에는 우리 [Owner.Leader.GetTitle]인 [Owner.Leader.GetName]의 클론도 있었습니다. 시설에서 같이 발견된 민간인 과학자들을 구금했지만 아무도 수사에 협조하지 않고 있으며, 자신들은 누가 클론을 주문했는지 모른다 주장합니다.\n\n그나마 찾은 증거로 볼 때, 다름 아닌 [Owner.Leader.GetName](이)가 배후에 있을 가능성이 있습니다. 하지만 [Owner.Leader.GetName](은)는 이미 자취를 감추었습니다."
 bio.85.a: "클론들은 안락사시키세요."
 bio.85.b: "우리한테 클론 군대가 생겼군요."
 bio.85.b.tt: "([owner.capital_scope.GetName]):\n§Y$clone_army$§! 하나가 창설됩니다."
 bio.85.c: "클론들을 풀어 줍시다."
 bio.85.c.tt: "§Y팝§! 그룹을 획득합니다."
 bio.86.name: "예상치 못한 역효과"
 bio.86.desc: "클론에 대한 대규모 안락사 조치가 엄청난 분노와 논란을 불러일으켰습니다. [Owner.GetSpeciesAdj] 권리 운동가들과 종교 단체들이 들고 일어나 대규모 시위를 벌이고 있습니다.\n\n한편 일부 클론이 탈주해 일반인들 사이에 숨어 다닌다는 소문이 돌고 있습니다."
 bio.86.a: "이번 일이 교훈이 될지도 모르겠군요..."
 bio.86.b: "치안 부대를 파견해서 폭도들을 진압하세요."
 bio.86.b.tt: "([owner.capital_scope.GetName]):\n§Y$assault_army_plural$§! 셋이 창설됩니다."
 bio.90.name: "돌연변이 공동체"
 bio.90.desc: "유전자 변이가 현저하거나 특이하게 나타난 주민들은 우리 사회에서 배척의 대상입니다. 지하로 숨어든 이 돌연변이들은 자신들만의 엔클레이브를 형성했습니다.\n\n이 지역으로 들어간 자들은 돌아오는 법이 거의 없습니다."
 bio.90.a: "그 엔클레이브를 박멸하세요."
 bio.90.b: "상황을 예의주시하세요. 단, 멀리서."
 bio.95.name: "유전자 이식을 통한 반항"
 bio.95.desc: "요즘 젊은이들 사이에서 자신의 외모를 급격하게 바꾸는 행위가 일종의 극단적인 여흥처럼 번지고 있습니다.\n\n최근에는 겹눈 열풍이 불고 있으며, 몸에 부속지를 얼마나 많이 달 수 있는지 경쟁이 벌어지고 있습니다. 참고로 현재 최고 기록은 156개입니다.\n\n이들은 '바이오해커'로 불리며 사회적 관심과 안전에 관한 우려를 초래하고 있습니다. 유전자 변이를 엄격하게 제한해야 한다는 목소리가 커지는 지금, 우리도 공식 입장을 정해야 합니다."
 bio.95.a: "뭐 나쁠 거 있겠습니까. 다 재미로 하는 건데."
 bio.95.b: "156개면 너무 많긴 하네요."
 bio.100.name: "예상 밖의 단점"
 bio.100.desc: "우리 문명에 유전자 조작이 널리 받아들여지면서 국민들의 신체가 당혹스러울 정도로 다양해지고 있습니다.\n\n기존에 예측이 가능했던 신진대사 과정에도 예기치 못한 파생형이 다양하게 등장함에 따라 표준화가 거의 불가능할 지경입니다.\n\n우리 종족을 하나로 묶어 주었던 신체적 동질감이 해체되고 있으며, 그 대신 형태와 기능이 만화경처럼 다양해져 사회적 결집이 위태로워졌습니다."
 bio.100.a: "다양성을 증진하세요."
 bio.100.a.tt: "무작위로 §Y400§! £pop£ §H팝§!이 ['trait:trait_bioadaptability'], ['trait:trait_social_pheromones'] 또는 ['trait:trait_limited_regeneration'] 특성을 얻습니다."
 bio.100.b: "표준 유전자 견본을 따르게 합시다."
 bio.105.name: "형체 없는 세포"
 bio.105.desc: "어떤 유전자 이식 실험이 잘못되어 재앙이 발생했습니다. 이 실험의 연구자들은 대상자의 DNA를 다른 다세포 생물의 DNA와 접합해 초면역 반응을 활성화함으로써, 대상자가 어떠한 바이러스에도 감염되지 않도록 하려 했습니다.\n\n그러나 그로 인해 태어난 것은 접촉하는 모든 유기체의 세포벽을 녹여 일정한 형체가 없는 거대한 생체 물질 덩어리로 융합하는 괴물이었습니다.\n\n이 덩어리 생물은 시험 시설을 돌아다니며 무엇이든 닥치는 대로 흡수했습니다. 지금은 포획한 상태지만, 탈주한다면 중대한 보건 위험을 초래할 것입니다. 그나마 다행인 점은, 이 생물을 먹을 수 있다는 점입니다..."
 bio.105.a: "그 살덩어리를 없애 버리세요!"
 bio.105.b: "위험을 감수하더라도 연구할 가치가 있겠군요."
 ## HIVE EMPIRE SITUATION
 #SET-UP / PREAMBLE
 genetic_ascension_situation_hive: "$genetic_ascension_situation$"
 genetic_ascension_situation_hive_type: "$genetic_ascension_situation$"
 genetic_ascension_situation_hive_desc: "$genetic_ascension_situation_desc$"
 genetic_ascension_situation_hive_monthly_change_tooltip: "유전학 전문 드론을 통해 연구를 점진적으로 진행합니다."
 genetic_ascension_situation_hive_outcome: "$genetic_ascension_situation_outcome$"
 #STAGE EVENTS
 bio.25.name: "집단 발달" #STAGE ONE
 bio.25.desc.no_options: "[owner.GetGovernmentName](이)가 변화하고 있습니다. 이제 우리는 잠재력을 완전히 실현할 것입니다. 물론 이 일로 우리의 본질이 근본적으로 변하리라는 것도 알고 있습니다. 우리의 진화를 스스로 조절하는 일은 아주 중대한 작업이며, 우리가 지금 일구는 변화는 먼 미래까지 영향을 미칠 것입니다."
 bio.25.desc.has_options: "$bio.25.desc.no_options$\n\n이제 이러한 발달의 첫 번째 단계에서 어디에 중점을 둘지 정해야 합니다."
 bio.25.a: "$bio.5.a$"
 bio.25.b: "$bio.5.b$"
 bio.25.c: "$bio.5.c$"
 bio.30.name: "군체 수렴" #STAGE TWO
 bio.30.desc.no_options: "우리는 스스로 진화를 조절한 결과 중대한 변화를 일구어 냈고, 유전적 특성, 생식, DNA 염기 서열에 대한 깊은 이해를 갖추게 되었습니다.\n\n이제 우리의 과업이 정점에 다다르고 있습니다.\n\n곧 우리는 우리의 존재 목적을 이룰 수 있을 것입니다."
 bio.30.desc.has_options: "$bio.30.desc.no_options$ 그 후에는 왔던 길을 계속 따라갈 수도 있고, 새로운 중점 분야를 선택할 수도 있습니다."
 bio.30.a: "$bio.10.a$"
 bio.30.b: "$bio.10.b$"
 bio.30.c: "$bio.10.c$"
 bio.35.name: "진화 융합" #STAGE THREE
 bio.35.desc.no_options: "우리는 진화 과정의 중대한 돌파구를 눈앞에 두고 있습니다. 이제 우리는 어떠한 길을 따라 종족의 진화적 잠재력을 완전히 실현하면 좋을지 결정을 내려야 합니다."
 bio.35.desc.has_options: "$bio.35.desc.no_options$\n\n다시 한번 우리가 우선할 분야를 선택할 때가 왔습니다."
 bio.35.a: "$bio.15.a$"
 bio.35.b: "$bio.15.b$"
 bio.35.c: "$bio.15.c$"
 genetic_ascension_hive_approach_one: "$genetic_ascension_approach_purity$"
 genetic_ascension_hive_approach_two: "$genetic_ascension_approach_cloning$"
 genetic_ascension_hive_approach_three: "$genetic_ascension_approach_mutation$"
 genetic_ascension_hive_approach_one_desc: "$genetic_ascension_approach_purity_desc$"
 genetic_ascension_hive_approach_two_desc: "$genetic_ascension_approach_cloning_desc$"
 genetic_ascension_hive_approach_three_desc: "$genetic_ascension_approach_mutation_desc$"
 bio.40.name: "생물학적 특수성" #FINAL STAGE - TRADITION TREE CHOICE
 bio.40.desc: "종족의 가장 순수한 형태를 추구하든 클론 기술로 성공을 도모하든, 아니면 의도적인 변이를 통해 유전자를 강화하든 이 순간을 지나면 선택을 되돌릴 수 없습니다."
 bio.40.desc.evopred: "$bio.20.desc.evopred$"
 bio.40.a: "$bio.20.a$"
 bio.40.b: "$bio.20.b$"
 bio.40.c: "$bio.20.c$"
 #Random Events (Hives)
 bio.110.name: "분업"
 bio.110.desc: "[target.GetGestaltEntityName]의 생물학적 도약을 개시하는 지금, 우리는 반드시 우리 문명에 도움이 될 만한 형질을 우선적으로 강화해야 합니다.\n\n선택적인 유전자 조작을 이용하면, 산업별로 적합한 신체적 특징을 지닌 전문가를 육성할 수 있을 것입니다.\n\n새로 생긴 이 능력은 에너지 생산에 종사하거나 국방에 투입되는 [target.GetIndividualNamePlural]들을 강화하는 데 쓸 수 있습니다."
 bio.110.a: "에너지는 언제나 쓸 데가 있지요."
 bio.110.b: "국방에 우선 집중해야 합니다."
 bio.115.name: "잉여 세대"
 bio.115.desc: "우리 드론에 적용할 생체 견본을 새로 도입함에 따라, 이번 유전자 고도화 사업에 적합하지 않은 드론은 어떻게 처리할지 결정해야 합니다.\n\n기존 드론 중 일부는 유전자 개조를 버틸 힘이 없습니다. 수명이 다할 때까지 노동에 종사하게 하는 방법이 있고, 아니면 이들의 유기물을 군체에 재활용할 수도 있습니다."
 bio.115.a: "드론을 재활용하세요."
 bio.115.b: "그 드론들도 아직 쓸모는 있습니다."
 bio.120.name: "속도냐 지구력이냐"
 bio.120.desc: "유전자 연구자들이 돌파구를 찾아냈습니다. 신경 전달 능률을 높여 [target.GetIndividualName]의 생산성을 크게 향상시키는 방법을 발견한 것입니다.\n\n그러나 뇌의 출력이 증가한 만큼 장시간 버티기가 힘들어, 수명이 짧아지는 문제가 있습니다.\n\n기존의 수명을 유지할지, 아니면 수명을 희생해 뇌 기능을 강화할지 결정해야 합니다."
 bio.120.a: "수명 유지를 우선합시다."
 bio.120.b: "[target.GetIndividualNamePlural]들을 쥐어짜세요. 생산성을 높입시다."
 bio.125.name: "시냅스 과부하"
 bio.125.desc: "새로 유전자를 강화한 [target.GetIndividualNamePlural]들이 [target.GetGestaltEntityName]에 통합되었습니다. 생체 공학을 통한 미세 조정을 거친 이 [target.GetIndividualNamePlural]들은 신경 발달과 인지 작용이 매우 빠릅니다. 그 덕분에 [target.GetGestaltEntityName]의 주요 시냅스 노드가 이례적인 속도로 활동하고 있습니다.\n\n하지만 속도가 빨라진 만큼 [target.GetIndividualName]의 안정성에 부담이 가고 있으며, 치명적인 시냅스 과부하가 발생할 위험도 있습니다. 그 대안으로 조정 작업에 노동력을 더 많이 할당하는 방법이 있습니다."
 bio.125.a: "속도를 낮추고 안정을 유지하세요."
 bio.125.b: "짧지만 화려하게 불태워 봅시다."
 bio.130.name: "주파수 이상 현상"
 bio.130.desc: "우리 군체에 신규 클론 무리가 합류한 뒤로, 기분 나쁜 청각 진동 문제가 관측되고 있습니다. 클론 제작 과정의 결함으로 인해 클론의 생체 전달 기관의 발달이 저해되어 주파수 간섭이 발생하는 것으로 보입니다.\n\n이 클론들이 군체 전체와 교신할 때면 주변의 모든 드론이 시끄럽고 불편한 이명 현상을 경험합니다. 그 결과 집중력이 크게 떨어지고 생산성이 저해될 위험이 생겼습니다."
 bio.130.a: "불편하지만 참을 만합니다."
 bio.130.b: "문제가 된 클론들을 제거하세요."
 bio.135.name: "동작 문제"
 bio.135.desc: "최근 클론 실험에서 특이한 결과가 나왔습니다. 일부 클론이 원본 드론과 신경을 통해 연결되어, 의도치 않게 동일한 동작을 보이는 현상이 발생하고 있습니다.\n\n이 현상은 드론 사이의 거리와 상관없이 나타납니다. 상대 드론의 동작을 은하계 어디에서든 그대로 따라 하는 것입니다. 이번 현상으로 여러 흥미로운 가능성이 제기되었습니다.\n\n우선 클론과 원본 드론이 각자 동일한 환경에서 작업을 수행하게 하는 실험을 진행해 볼 수 있습니다. 아니면 원인이 된 신경 전달 물질을 추출해, 이 현상을 더욱 면밀히 연구해 볼 수도 있습니다."
 bio.135.a: "원본과 클론이 근무할 동일한 업무 공간을 만들어 보세요."
 bio.135.b: "수술을 통해 동기화 연결을 끊으세요."
 bio.140.name: "부적합 클론"
 bio.140.desc: "우리는 군체를 강화하기 위해 기존 드론으로부터 추출한 물질로 클론 무리를 육성해 이들의 성장 속도를 인위적으로 높였습니다. 이렇게 태어난 클론은 생물학적으로는 이상이 없는 개체들이지만 우리 군체에는 부적합합니다.\n\n이러한 이질성은 우려되는 면은 있으나, 동시에 다른 곳에서는 얻을 수 없는 기회이기도 합니다. 단일한 정체성과 독자적 사고 능력을 지니게 된 이 개별화된 드론들은 군체 밖의 존재들과 교류하는 데 도움이 될지도 모릅니다. 이들의 자율적 사고 능력을 활용하면 군체의 하나 된 목소리로는 대응하기 힘든 공백을 메꿀 수 있을 것으로 기대됩니다. 그러나 이러한 가능성에는 대가가 따릅니다. 이들의 개별화된 의식이 불안을 초래해, 우리 군체의 고차원적 인지 기능을 저해하고 있습니다."
 bio.140.a: "강제로 통합하세요."
 bio.140.b: "이들의 잠재력을 활용합시다."
 bio.145.name: "클론 문제"
 bio.145.desc: "우리 집단의식이 크게 흔들리고 있습니다. 이제 우리 자신의 복사본을 창조할 수 있게 되었지만, 이 행동의 효과성에 (그리고 심지어 도덕성에) 의문을 던지며 주저하고 있는 것입니다.\n\n클론 제작 공정에는 상당량의 자원이 필요합니다. 이 자원을 다른 곳에 투입하는 것이 나을지도 모르며, 자연 번식이 유전적 다양성 측면에서 더 유리하다는 점도 감안해야 합니다.\n\n우리는 역사적으로 클론 제작을 통해 번식한 적이 없습니다. 그리고 과연 이처럼 우리 종족에 크나큰 영향을 줄 변화를 받아들일 준비가 되어 있는지도 확실하지 않습니다."
 bio.145.a: "클론의 효율성을 간과해서는 안 됩니다."
 bio.145.b: "유전적 다양성은 반드시 필요합니다."
 bio.150.name: "군체의 번아웃"
 bio.150.desc: "우리가 진행한 여러 변이 실험으로 인해 군체 내에서 이상 현상이 발생했습니다. 기존에는 수월하게 진행되던 작업도 전보다 품이 들어가는데, 서로 상충되는 지시로 인해 집단의식에 부담이 가해졌기 때문입니다.\n\n그로 인한 피로 때문에 가장 능률이 좋았던 일부 드론이 번아웃 현상을 보이고 있지만, 이번 일은 곧 기회이기도 합니다.\n\n이제 결정을 내려야 합니다. 잠시 쉬면서 회복을 꾀할까요, 아니면 우리 군체를 한계까지 밀어붙일까요?"
 bio.150.a: "이제 쉴 때도 됐습니다."
 bio.150.b: "잠은 죽어서 자면 된다는 말이 있죠."
 bio.151.name: "상쾌하게 새롭게"
 bio.151.desc: "휴식을 취해 기능을 회복하자는 결정이 결실을 맺었습니다. 한때 서로 어긋나던 충동들이 안정을 찾고 조화로운 사고의 흐름으로 응집해, 새로이 쇄신된 명확함으로 우리 집단을 이끌고 있습니다.\n\n이전에 번아웃으로 내몰렸던 드론들도 지치지 않고 정확하게 작업을 수행합니다. 잠시 자신을 돌아보는 시간을 거치면서 우리 집단의 피로도가 낮아졌을 뿐만 아니라, 다가올 시련에 맞서겠다는 의지 또한 강해졌습니다."
 bio.151.a: "때 빼니 광이 다 나는군요!"
 bio.155.name: "전문화 vs 일반화"
 bio.155.desc: "변이는 많은 혜택을 가져다줍니다. 이에 맞춰 선별적으로 유전자를 강화하면, 우리 군체를 목적에 더욱 적합하게 바꿀 수 있습니다. 가령, 단단한 키틴질 부속지를 적용하면 드론들을 광물 생산에 특화시킬 수 있습니다.\n\n반대로 모든 드론에게 좀 더 범용성이 높은 유전자 개조를 적용하면, 각 개체가 다양한 기능을 수행할 수 있게 될 것입니다."
 bio.155.a: "범용 드론이 더 유용하겠군요."
 bio.155.b: "얼른 채굴을 시작합시다."
 bio.160.name: "변화무쌍한 표현형"
 bio.160.desc: "계속되는 실험으로 인해 군체에 예기치 못한 특징이 생겨나고 있습니다. 외골격에 뿔이 나거나, 부속지가 과도하게 커지거나, 감각 기관이 비정상적으로 민감해지는 등 독특한 신체적 특징을 지닌 드론들이 나타나고 있는 것입니다.\n\n이러한 다양화도 나름의 장점이 있지만, 이로 인해 신진대사에 지장이 생겼습니다. 이처럼 커지는 부담에 군체가 힘겨워하고 있습니다. 따라서 변이를 어느 정도로만 진행해면 좋을지 결정을 내려야 합니다."
 bio.160.a: "역동적 변화를 수용합시다."
 bio.160.b: "군체의 결속을 유지해야 합니다."
 bio.165.name: "과거에 대한 열망"
 bio.165.desc: "군체가 변하고 있습니다. 유전체 개조로 건강이 크게 개선되는 것은 확인됐으나, 그로 인해 심리적 고통에 대한 내성은 약해지고 말았습니다.\n\n우린 예전의 모습을 그다지 싫어하지 않았습니다. 비록 근력과 인지 능력은 개조 덕분에 훨씬 우수해졌지만, 익숙했던 기존의 사고 패턴을 그리워하고 있습니다.\n\n군체 전체에 걸쳐 우리의 신체가 우리 안에 내재된 정신과 어울리지 않는다는 불편한 감각이 깊이 자리 잡고 있습니다. 어쩌면 우리가 너무 빨리 성장한 것은 아닐까요?"
 bio.165.a: "삶은 곧 변화입니다."
 bio.165.b: "우리의 본질을 잃어서는 안 됩니다."
 #Modifiers
 supremacy_denied: "우월성 거부"
 supremacy_denied_desc: "정부가 유전적 격차를 줄이기 위해 단호한 조치를 취하고 있습니다."
 augment_appreciation: "강화 인정"
 augment_appreciation_desc: "유전학 전문가와 유전자를 강화한 이들 모두 우리 사회의 귀중한 구성원입니다."
 conscious_evolution: "의식 진화"
 conscious_evolution_desc: "우리는 함께 앞으로 나아갑니다."
 superior_individuals: "우월한 개체"
 superior_individuals_desc: "우월한 재능에서 우월한 결과가 나옵니다."
 welfare_state: "복지 국가"
 welfare_state_desc: "국책 사회 복지 사업을 시행 중입니다."
 selective_survival: "선택적 생존"
 selective_survival_desc: "유전자 강화 일꾼을 투입해 산업 효률을 증진합니다."
 super_powered: "초능력"
 super_powered_desc: "초능력을 지닌 병사들로 방어를 강화합니다."
 deceitful_dismissal: "기만으로 인한 해임"
 deceitful_dismissal_desc: "우리는 새로운 정직한 지도자를 찾고 있습니다."
 harvesting_halt: "채취 중단"
 harvesting_halt_desc: "클론에게서 장기를 채취하는 관행을 불법화했습니다."
 clone_drivers: "클론 기반 성장"
 clone_drivers_desc: "클론을 계속해서 착취하면, 산업 효율 증진에 주력할 수 있습니다."
 effective_surveillance: "효과적인 체계"
 effective_surveillance_desc: "우리 사회는 민권을 중시합니다. 적어도 이론상으로는 말이죠."
 decriminalized_society: "떳떳한 정부"
 decriminalized_society_desc: "적극적 치안 활동을 통해, 우리는 범죄에 더욱 단호하게 대처하고 있습니다."
 mass_euthanasia: "집단 안락사"
 mass_euthanasia_desc: "무허가 클론 생산에 대해 특단의 조치를 취할 것입니다."
 duplicated_inheritance: "복제된 유산"
 duplicated_inheritance_desc: "신병이 유입됨에 따라 우리 제국의 군사 활동이 증가하고 있습니다."
 duplicated_inheritance_armies: "클론 군대 승계"
 mutant_crackdown: "돌연변이 단속"
 mutant_crackdown_desc: "정부가 배척 현상에 대항해 특단의 조치를 취합니다."
 mutant_enclaves: "돌연변이 엔클레이브"
 mutant_enclaves_desc: "돌연변이 엔클레이브는 귀중한 사회학 연구 대상입니다."
 embracing_change: "변화 수용"
 embracing_change_desc: "창의적인 표현과 참신함을 위한 새로운 기회를 마련하면, 다양성을 증진할 수 있습니다."
 biological_limitations: "생물학적 한계"
 biological_limitations_desc: "생체 보안 및 법 집행 기술을 적용해, 현행 규정의 효용성을 유지합니다."
 societal_diversification: "사회적 다변화"
 societal_diversification_desc: "국민들이 각자 독특한 생체 개조술을 받아 봄으로써 책임 문제에 대응하고 있습니다."
 standardized_biology: "생체 구조 표준화"
 standardized_biology_desc: "표준화된 유전자 견본을 적용함으로써 사회적 결속을 도모합니다."
 blob_neutralized: "살덩어리 제거"
 blob_neutralized_desc: "살덩어리 생물에 대해 특단의 조치를 취한 덕분에 온 국민이 안심하고 있습니다."
 globule_research: "덩어리 연구"
 globule_research_desc: "과학자들이 살덩어리 생물을 포획하고 생물학 실험을 진행하고 있습니다."
 super_troopers: "초능력 부대"
 super_troopers_desc: "초능력 부대가 치안 유지를 돕습니다."
 watch_the_watchers: "감시자를 감시하라"
 watch_the_watchers_desc: "감시자는 누가 감시하냐고요? 우리가 합니다."
 hero_council: "영웅 의회"
 hero_council_desc: "초능력 영웅들이 우리 정부의 의사 결정 과정에 자문을 제공합니다."
 hero_restrictions: "영웅 제한"
 hero_restrictions_desc: "우리 정부가 더 이상 초능력자의 도움에 기대지 않습니다."
 ethical_cloning: "윤리적 클론 생산"
 ethical_cloning_desc: "엄격한 지침을 적용해 대규모 클론 생산 기술의 사용을 제한합니다."
 nuisance_crackdown: "잡음 진압"
 nuisance_crackdown_desc: "클론은 평등합니다. 하지만 원본들은 더 평등합니다."
 artistic_integrity: "예술적 순수성"
 artistic_integrity_desc: "예술 활동을 통해 우리는 위대한 경지에 이를 것입니다."
 logic_first: "논리 우선"
 logic_first_desc: "우리는 은하 과학계를 선도할 것입니다."
 practical_application: "실제적 용도"
 practical_application_desc: "각종 재화와 서비스의 생산을 우선 추진합니다."
 crack_downs: "단속"
 crack_downs_desc: "법의 엄정한 손길 아래 안정을 도모합니다."
 performative_reformation: "혁명 퍼포먼스"
 performative_reformation_desc: "혁명이 그렇게 하고 싶다면, 마음껏 상상의 나래를 펼치게 해 줍시다."
 ancestral_inheritance: "선조의 지혜"
 ancestral_inheritance_desc: "선조들의 지식을 승계해 미래의 지침으로 삼습니다."
 buried_secrets: "묻힌 비밀"
 buried_secrets_desc: "우리 선조들의 행적이 지금 와서 드러나게 할 수는 없습니다."
 specimen_study: "표본 연구"
 specimen_study_desc: "획득한 표본을 연구해 공식 개발 사업을 보완합니다."
 purity_tests: "순수성 시험"
 purity_tests_desc: "유전적 순수성을 인정받기 위해서는 엄격한 유전체 검증을 거쳐야 합니다."
 clone_rights: "클론권"
