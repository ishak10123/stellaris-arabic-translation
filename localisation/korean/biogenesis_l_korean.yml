 DLC_BIOGENESIS_RECOMMENDATION_DESC: "선택하신 요소 중 일부와 콘텐츠가 적합한 §S$BIOGENESIS_TITLE$§!를 추천합니다."
 ############################
 #Phenotype Species Traits #
 ############################
 #Species traits localized tags
 SPECIES_TRAIT_CATEGORY_HEADER: "§H특성 범주§!\n이 특성은 다음 범주에 속합니다:"
 SPECIES_TRAIT_HUMANOID: "['concept_humanoid_phenotype_traits']"
 SPECIES_TRAIT_MAMMALIAN: "['concept_mammalian_phenotype_traits']"
 SPECIES_TRAIT_REPTILIAN: "['concept_reptilian_phenotype_traits']"
 SPECIES_TRAIT_ARTHROPOID: "['concept_arthropoid_phenotype_traits']"
 SPECIES_TRAIT_AVIAN: "['concept_avian_phenotype_traits']"
 SPECIES_TRAIT_MOLLUSCOID: "['concept_molluscoid_phenotype_traits']"
 SPECIES_TRAIT_PLANTOID: "['concept_plantoid_phenotype_traits']"
 SPECIES_TRAIT_FUNGOID: "['concept_fungoid_phenotype_traits']"
 SPECIES_TRAIT_LITHOID: "['concept_lithoid_phenotype_traits']"
 SPECIES_TRAIT_NECROID: "['concept_necroid_phenotype_traits']"
 SPECIES_TRAIT_AQUATIC: "['concept_aquatic_phenotype_traits']"
 SPECIES_TRAIT_TOXOID: "['concept_toxoid_phenotype_traits']"
 SPECIES_TRAIT_INFERNAL: "['concept_infernal_phenotype_traits']"
 SPECIES_TRAIT_VOCATIONAL: "['concept_vocational_traits']"
 SPECIES_TRAIT_OVERTUNED: "['concept_overtuned_traits']"
 SPECIES_TRAIT_FLEETING_EXCELLENCE: "['concept_fleeting_excellence_traits']"
 SPECIES_TRAIT_CYBORG: "['concept_cybernetic_traits']"
 SPECIES_TRAIT_UNIVERSAL_AUGMENTATIONS: "['concept_universal_augmentations_traits']"
 SPECIES_TRAIT_ADAPTIVE_FRAMES: "['concept_adaptive_frames_traits']"
 trait_egg_laying: "난생 종족"
 trait_egg_laying_desc: "이 종족의 유체는 모체 안에서 발달하는 대신, 알 껍질의 보호를 받으며 그 속에서 자라납니다. 따라서 자원이 풍부할 때는 빠르게 성장할 수 있습니다."
 trait_egg_laying_effect: "팝 성장 속도: $r_food$(또는 상응하는 자원)이 §G초과 생산§!되는 행성에 거주하는 동안 §G+15%§!"
 trait_egg_laying_portrait_override_tt: "또는 난생하는 아무 종족"
 trait_seasonal_dormancy: "계절성 휴면"
 trait_seasonal_dormancy_desc: "이 종족은 휴면에 적합한 계절 주기를 갖춘 행성에서 진화했습니다. 현대에는 이러한 계절성 휴면을 인위적으로 촉진함으로써 생산성이 낮은 사회 구성원을 휴면시켜 효율을 높일 수 있습니다."
 trait_seasonal_dormancy_effect: "고용 팝 유지비: §G-15%§!\n    - 실업자 및 ['concept_denizen'] 팝 유지비: §G-75%§!"
 trait_seasonal_dormancy_portrait_override_tt: "또는 휴면하는 아무 종족"
 trait_hollow_bones: "비어 있는 뼈"
 trait_hollow_bones_desc: "이 종족은 뼈가 가볍기 때문에 유려하고 수월하게 움직일 수 있습니다. 그 대신 자신들이 거주하는 행성의 중력에 큰 영향을 받습니다."
 trait_hollow_bones_effect: "행성 크기당 $pop_cat_worker_plural$, $pop_cat_simple_drone_plural$ 및 군인 직업 $BONUS_WORKFORCE_FOR$: §R-0.67%§!"
 trait_rooted: "뿌리"
 trait_rooted_desc: "이 종족은 자신이 자리 잡은 곳에 실제로 뿌리를 내립니다. 이들에게 이주는 매우 고통스러운 경험입니다."
 AUTO_MIGRATE_ROOTED: "§R뿌리를 내린 팝은 이주할 수 없습니다.§!"
 trait_rooted_effect: "§R팝이 자동으로 재정착하지 않음§!\n    - 재정착 비용: §R+200%§!"
 trait_rooted_portrait_override_tt: "또는 환경에 종속된 아무 종족"
 trait_acidic_vascularity: "산성 체액"
 trait_acidic_vascularity_desc: "이 종족에게 체액은 가장 강력한 방어 수단입니다. 체액의 부식성과 살상력이 높기 때문에 섣불리 이들을 공격했다간 후회하기 십상입니다."
 trait_acidic_vascularity_effect: "지상군이 §Y사망 시 폭발§!해 적에게 §G250§! 피해\n    - 정화된 팝의 자원 생산량: §R-75%§!"
 DAMAGE_ARMY: "$ARMY|Y$에 피해"
 trait_shelled: "껍데기"
 trait_shelled_desc: "이 종족은 자신의 거처를 들고 다닙니다. 자연스럽게 자라나거나 우연히(또는 의도적으로) 찾아 사용하는 이러한 '껍데기'는 이들을 지켜 주고 어디서나 밤을 지낼 수 있게 해 주는 안식처 역할을 합니다."
 trait_shelled_portrait_override_tt: "또는 껍데기를 지닌 아무 종족"
 trait_camouflage: "위장"
 trait_camouflage_desc: "위장의 명수인 이 종족은 주변 환경에 완벽하게 숨어들어, 포식자에게도 사냥감에게도 거의 보이지 않습니다. 이들은 광학에 대한 이해도가 선천적으로 높은 덕분에 게릴라전에서 두각을 나타냅니다."
 trait_camouflage_portrait_override_tt: "또는 위장 능력을 지닌 아무 종족"
 trait_chromalogs: "색채 소통"
 trait_chromalogs_desc: "이 종족은 신체 색상 조절 기술을 적극 활용해, 단순한 위장을 넘어 화려하고 정교한 색상 패턴을 통해 소통할 수 있도록 진화했습니다."
 trait_chromalogs_portrait_override_tt: "또는 신체 색상으로 소통하는 아무 종족"
 trait_brittle: "취약"
 trait_brittle_desc: "이 종족은 선천적으로 몸이 약해, 일상 속에서 아주 사소한 일을 할 때조차 탈이 나지 않도록 최대한 주의를 기울여야 합니다."
 trait_familial: "혈연"
 trait_familial_desc: "이 종족은 가까운 친족과 깊고 오래 지속되는 관계로 묶여, 효율성과 응집성이 고도로 높은 집단을 형성합니다."
 trait_familial_effect: "동일한 행성 내 해당 특성을 지닌 §Y100§! £pop£ 팝당 행복도: §G0.1%§!(최대 §G+20%§!)"
 trait_familial_portrait_override_tt: "또는 혈연 기반의 아무 종족"
 trait_permeable_skin: "침투성 피부"
 trait_permeable_skin_desc: "이 종족은 피부가 아주 특수하게 발달한 탓에 이상적인 조건에서만 살아갈 수 있습니다. 종족의 본래 거주지에서 멀리 벗어나지 않는 한 별문제는 없을 것입니다."
 trait_permeable_skin_effect: "['concept_climate_category']가 우리 종족의 선호와 다른 행성의 거주 적합도: §R-20%§!"
 concept_climate_category: "기후 범주"
 concept_climate_category_desc: "거주 가능 행성의 기후는 세 가지 범주로 나뉩니다.\n- 습윤 기후:\n$t$- 대륙\n$t$- 해양\n$t$- 열대\n- 냉대 기후:\n$t$- 고산\n$t$- 극지\n$t$- 동토\n- 저습 기후:\n$t$- 건조\n$t$- 사막\n$t$- 초원"
 trait_genetic_memory: "유전자 기억"
 trait_genetic_memory_desc: "대부분의 문명은 지식과 배움이 대대로 전해지는 과정에서 태어납니다. 이 종족은 이러한 과정을 한층 더 발전시켜, 생존을 위한 통찰을 유전자 차원에서 새겨 넣었습니다. 이렇게 이 종족의 각 세대는 선조들이 축적한 지식을 보유한 채 태어납니다."
 trait_genetic_memory_effect: "식민지 나이로 인한 거주 적합도: 연간 §G+0.5%§!(최대 §G+25%§!)"
 trait_genetic_memory_portrait_override_tt: "또는 선천적인 생존 본능을 지닌 아무 종족"
 trait_nascent_stage: "미성숙 출산"
 trait_nascent_stage_desc: "이 종족의 태아는 발달 단계가 아직 초기일 때 태어나기 때문에 사회 활동을 할 수 있게 될 때까지 유독 오랜 시간이 걸립니다. 아직 나이가 어린 구성원들은 훗날 지성을 갖춤으로써 지니게 되는 온갖 책임과 부담을 모른 채 천진난만하게 자라납니다."
 trait_nascent_stage_effect: "이 특성을 지닌 팝은 출생 후 §Y5§!년 동안 준지성체로 자라납니다."
 trait_nascent_stage_portrait_override_tt: "또는 긴 유아기를 지닌 아무 종족"
 trait_presapient_stage: "준지성체"
 trait_presapient_stage_desc: "이 종족은 의식적인 사고 능력이 없는 시기를 잠시 거친 뒤, 머지않아 온전한 지성체로 성장할 것입니다."
 trait_flight: "비행"
 trait_flight_desc: "이 종족은 지상의 속박에서 벗어나 하늘을 자유롭게 누빌 수 있으며, 그 덕분에 적과 교전할 때는 공격을 아주 능숙하게 피해 냅니다. 이들의 도시는 비행 종족에 걸맞은 독특하고 치밀한 구조를 갖췄습니다."
 trait_flight_portrait_override_tt: "또는 비행 능력을 지닌 아무 종족"
 trait_spatial_mastery: "공간 지각 숙달"
 trait_spatial_mastery_desc: "이 종족은 비행 능력이 있을 뿐만 아니라, 두뇌가 독특하게 발달해 3차원 공간을 본능적으로 파악하고 돌파할 수 있습니다. 그 덕분에 전투를 계획하고, 행성을 탐사하고, 도시를 관리하는 능력이 누구보다 뛰어납니다."
 trait_spatial_mastery_portrait_override_tt: "또는 3차원 돌파 능력을 지닌 아무 종족"
 trait_spare_organs: "예비 장기"
 trait_spare_organs_desc: "이 종족은 아무리 심각한 부상을 입어도 살아남을 수 있도록 여분의 장기가 발달했습니다. 이들 종족이 아직까지 살아남은 것을 보면 성공적인 진화였던 모양입니다."
 trait_spare_organs_effect: "지도자 첫 사망 시 부활\n    - 공격 지상군 사망 시: §G20%§! 확률로 대체 지상군 생성\n    - £job_livestock£ §Y$job_livestock$§! 생산량: §G+50%§!"
 mod_planet_livestock_produces_mult: "£job_livestock£ §Y$job_livestock$§! 생산량"
 trait_leader_second_chanced: "기사회생"
 trait_leader_second_chanced_desc: "이 지도자는 독특한 생체 구조 덕분에 죽을 뻔한 위기에서 목숨을 건졌습니다. 하지만 이번이 마지막입니다."
 #################################
 #Evolutionary Predators Origin #
 #Written by Victor Haeggman  #
 #################################
 #Origin and Start of Game
 origin_evolutionary_predators: "진화하는 포식자"
 origin_evolutionary_predators_desc: "§R경고: ['concept_mutation_ascension']을 제외한 승격의 길이 전부 차단됩니다.§!\n\n이 종족은 예전부터 자신도 완전히 알지 못하는 본능에 이끌려 아주 독특한 생물들을 사냥해 왔습니다. 이들은 사냥감의 유전자를 자기 유전자와 결합하는 희귀한 능력을 지니고 있어, 모든 유전적 장점을 흡수해 모성의 먹이 사슬에서 정점에 올랐습니다."
 origin_tooltip_evolutionary_predators_effects: "- $SPECIES_TRAITS$ ['concept_malleable_genes']\n- 상황: ['concept_adaptive_evolution']\n- 모성: ['concept_genetic_soup']"
 START_SCREEN_EVOLUTIONARY_PREDATORS_BASE: "[GetSpeciesNamePlural](은)는 오래전부터 사냥꾼이었습니다. 우리는 새로운 먹잇감을 맛볼 수 있는 곳이라면 극한의 조건을 무릅쓰고서라도 찾아갑니다. 음식이 말 그대로 피와 살이 되는 우리에게 이러한 노력은 결코 헛된 것이 아닙니다.\n\n"
 START_SCREEN_EVOLUTIONARY_PREDATORS_REGULAR: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$우리는 예전부터 사냥감의 살코기가 우리를 변화시킴을 알고 있었습니다. 사냥을 하고 먹이를 취할 때마다 우리는 강해졌습니다.\n\n이러한 폭력의 역사는 우리를 짓누르는 과오가 아니라 우리라는 존재의 본질 그 자체입니다. 현대 과학을 통해 더욱 발전한 우리 종족은 더는 사냥감을 먹지 않아도 진화할 수 있습니다. 미량의 유전 물질만 있어도 그 장점을 우리 유전자에 짜 넣을 수 있는 것입니다.\n\n진화를 향한 갈증은 아직도 우리 안에 타오르고 있습니다. [GetStartingDrive]의 시대가 밝아오는 지금, 바야흐로 은하계 전체를 사냥해 그 다채로운 풍미를 만끽할 때가 왔습니다."
 START_SCREEN_EVOLUTIONARY_PREDATORS_HIVE: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$우리의 집단 지능은 예전부터 우리 유전자가 지닌 잠재력을 알고 있었습니다. 우리는 사냥감의 정수를 흡수하고 변화시켜, 그 장점을 우리 집단에 결합할 수 있습니다.\n\n이 오래된 포식자의 습성은 아직도 남아 있지만, 이제는 그 본능을 균형에 맞게 조절할 수 있습니다. 이제 우리는 사냥 없이도 진화할 수 있습니다. 어떤 유전 물질이든 합성하여 군체 전체에 보급할 수 있기 때문입니다.\n\n이제 [GetStartingDrive]의 등장에 힘입어 은하 전체로 뻗어 나가, 그 다채로운 풍미를 만끽할 때입니다."
 START_SCREEN_EVOLUTIONARY_PREDATORS_DEVOURING_SWARM: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$[GetHomeWorldName]의 생명체를 마지막 하나까지 모조리 섭취한 뒤에야 우리는 우리의 어리석음을 깨달았습니다. 이 이상 진화할 수단을 잃고 만 것입니다. 그렇게 우리는 우주로 눈을 돌렸습니다.\n\n우리는 궁극의 포식자입니다. 대부분의 포식자는 생존을 위해 사냥하지만, 우리는 완벽한 존재가 되기 위해 사냥합니다.\n\n[GetStartingDrive]의 등장으로 다시 한번 사냥에 나설 때가 왔습니다. 은하는 광대합니다. 그리고 먹잇감으로 가득합니다."
 #Traits
 trait_malleable_genes: "가변 유전자"
 trait_malleable_genes_desc: "§L이 종족은 여느 종족과 달리 신체 특징이나 장기가 고정되어 있지 않습니다. 자신이 하는 일에 적합한 부속지를 길러 낼 수 있는 것입니다. 하지만 이러한 불안정성 때문에 일부 부작용이 발생하기도 합니다.§!"
 trait_malleable_genes_cant_modify: "§R이 특성이 있는 종족은 유전자 변형 불가§!\n$automodding_trait_tooltip_all$§Y$trait_malleable_genes$§!는 ['concept_automodding_malleable']에서 보정치를 선택합니다."
 CANNOT_MODIFY_MALLEABLE_GENES_SPECIES: "$TRIGGER_FAIL$이 종족은 유전자가 불안정해 유전자를 변형할 수 없습니다."
 concept_malleable_genes: "$trait_malleable_genes$"
 concept_malleable_genes_desc: "$trait_malleable_genes_cant_modify$"
 concept_automodding_malleable: "가변 유전자 자동 개조 특성 목록"
 concept_automodding_malleable_desc: "- ['trait:trait_malleable_minerals']\n- ['trait:trait_malleable_energy']\n- ['trait:trait_malleable_food']\n- ['trait:trait_malleable_research']\n- ['trait:trait_malleable_unity']\n- ['trait:trait_malleable_forge']\n- ['trait:trait_malleable_trade']\n- ['trait:trait_malleable_ameneties']"
 concept_adaptive_evolution: "적응형 진화"
 concept_adaptive_evolution_desc: "이 상황은 다른 생명체의 DNA를 섭취함에 따라 진행됩니다.\n§G완료 시:§!\n$t$- 최근 섭취한 종족에 따라 새로운 종족 특성을 선택\n§Y진행 조건:§!\n$t$- 신규 행성 개척\n$t$- 다른 종족을 정화하거나 가축으로 사육\n$t$- 제국 내 다른 종족을 노예 이상의 지위로 보유\n$t$- 생체 함선 보유\n$t$- 평의회에 외계인 지도자 고용\n$t$- 거대 기업으로 통상 조약 체결\n$t$- 이벤트를 통해 외계 생명체 조우"
 concept_genetic_soup: "$genetic_soup$"
 concept_genetic_soup_desc: "$fresh_biosphere_tt$\n\n§L$genetic_soup_desc$§!"
 trait_malleable_minerals: "가변 발톱"
 trait_malleable_minerals_desc: "§L발톱이 다이아몬드처럼 단단해져, 광물을 더 쉽게 채취할 수 있습니다.§!"
 trait_malleable_energy: "가변 절연층"
 trait_malleable_energy_desc: "§L두꺼운 절연층이 생겨나, 고에너지 환경 등에서의 사고로부터 몸을 지켜 줍니다.§!"
 trait_malleable_food: "가변 쟁기"
 trait_malleable_food_desc: "§L단단한 삽과 같은 손가락이 달린 부속지가 생겨나 경작 및 작물을 심는 속도가 빨라집니다. 다양한 지형에 맞게 적응하는 이 가변 쟁기는 어느 작업에서도 유용하게 활용할 수 있습니다.§!"
 trait_malleable_research: "가변 피질"
 trait_malleable_research_desc: "§L중앙 피질이 확대됩니다. 다소 불편한 감은 있지만, 문제 해결 능력과 혁신력이 비약적으로 성장합니다.§!"
 trait_malleable_unity: "가변 감각 기관"
 trait_malleable_unity_desc: "§L감각 기관이 강화되어 다양한 관점에서 상황을 더욱 깊이 파악하고 이해할 수 있게 됩니다. 제대로 번영하기 위해서는 관찰부터 철저히 해야 하는 법입니다.§!"
 trait_malleable_forge: "가변 외피"
 trait_malleable_forge_desc: "§L뜨겁거나 부식성이 있는 소재를 다룰 때 외피가 추가로 생기면 많은 도움이 됩니다.§!"
 trait_malleable_trade: "가변 페로몬"
 trait_malleable_trade_desc: "§L상황에 맞춰 페로몬을 살포하는 능력이 생긴다면, 협상을 성공으로 이끄는 데 큰 도움이 될 것입니다.§!"
 trait_malleable_ameneties: "가변 화음 기관"
 trait_malleable_ameneties_desc: "§L이 종족은 정교하게 조정이 가능한 구멍을 다수 지니고 있어, 단순히 몸을 움직이는 것만으로도 마음이 편해지는 조화로운 소리를 만들어 냅니다.§!"
 #Democratic Effects
 concept_genetic_electorate_effect: "유전자 유권자 효과"
 concept_genetic_electorate_effect_desc: "$trait_malleable_imperialist_effect$\n$trait_malleable_isolationist_effect$\n$trait_malleable_progressive_effect$\n$trait_malleable_prosperity_effect$\n$trait_malleable_supremacist_effect$\n$trait_malleable_technologist_effect$\n$trait_malleable_totalitarian_effect$\n$trait_malleable_traditionalist_effect$\n$trait_malleable_xenoist_effect$\n$trait_malleable_manifesti_effect$"
 trait_malleable_imperialist_effect: "§Y지배적 세력§!으로 인한 효과(제국주의):\n$t$$mod_planet_jobs_alloys_produces_mult$: §G+10%§!"
 trait_malleable_isolationist_effect: "§Y지배적 세력§!으로 인한 효과(고립주의):\n$t$$mod_planet_jobs_unity_produces_mult$: §G+10%§!"
 trait_malleable_progressive_effect: "§Y지배적 세력§!으로 인한 효과(진보주의):\n$t$£happiness£ 행복도: §G+10%§!"
 trait_malleable_prosperity_effect: "§Y지배적 세력§!으로 인한 효과(번영지상주의):\n$t$£job£ 직업으로 인한 $r_trade$: §G+20%§!"
 trait_malleable_supremacist_effect: "§Y지배적 세력§!으로 인한 효과(우월주의):\n$t$$mod_planet_jobs_specialist_produces_mult$: §G+5%§!\n$t$$mod_planet_jobs_ruler_produces_mult$: §G+5%§!"
 trait_malleable_technologist_effect: "§Y지배적 세력§!으로 인한 효과(기술주의):\n$t$£job£ 직업으로 인한 £research£ 연구: §G+10%§!"
 trait_malleable_totalitarian_effect: "§Y지배적 세력§!으로 인한 효과(전체주의):\n$t$£pop_cat_worker£ $mod_pop_cat_worker_bonus_workforce_mult$: §G+15%§!"
 trait_malleable_traditionalist_effect: "§Y지배적 세력§!으로 인한 효과(전통주의):\n$t$£pop£ $MOD_POP_HOUSING_USAGE_ADD$: §G-0.5§!"
 trait_malleable_xenoist_effect: "§Y지배적 세력§!으로 인한 효과(친외계종):\n$t$거주 적합도 §G+15%§!"
 trait_malleable_manifesti_effect: "§Y지배적 세력§!으로 인한 효과(선언자):\n$t$£pop£ $MOD_POP_AMENITIES_USAGE_BASE$: §G-1§!"
 #Dictatorial Effects
 trait_ruler_apex_predator: "최상위 포식자"
 trait_ruler_apex_predator_desc: "진화적 포식 능력을 지닌 종족은 가장 적응력이 뛰어난 구성원에게만 지도자 자리를 허락합니다. 이 종족의 최고 통치자는 자신이 무찌른 적의 유전체를 채취할 뿐만 아니라 상대의 지략과 결의까지 자신의 것으로 만들어, 승리를 쟁취할 때마다 완벽한 존재에 한 걸음씩 가까워집니다."
 trait_ruler_apex_predator_tt: "['concept_apex_predator_victories']에서 추가 ['concept_apex_predator_effects', 통찰]을 획득합니다."
 concept_apex_predator_effects: "최상위 포식자 통찰"
 concept_apex_predator_effects_desc: "§Y인간류§!: $mod_country_trade_produces_mult$ §G+5%§!\n§Y포유류§!: $MOD_LOGISTIC_GROWTH_MULT$ §G+5%§!\n§Y파충류§!: $MOD_SHIP_SHIELD_HARDENING_ADD$ §G+5%§!\n§Y조류§!: $MOD_SHIP_EVASION_ADD$ §G5%§!\n§Y절지류§!: $MOD_SHIP_ARMOR_HARDENING_ADD$ §G+5%§!\n§Y연체류§!: $MOD_SHIP_SENSOR_RANGE_ADD$ §G+1§!\n§Y진균류§!: $mod_country_food_produces_mult$ §G+5%§!\n§Y식물류§!: $mod_country_energy_produces_mult$ §G+5%§!\n§Y암석류§!: $mod_country_minerals_produces_mult$ §G+5%§!\n§Y망령류§!: $MOD_PLANET_CRIME_ADD$ §G-10§!\n§Y수생류§!: $MOD_SHIP_HULL_ADD$ §G+100§!\n§Y독소류§!: $mod_country_exotic_gases_produces_mult$ §G+10%§!\n§Y호열체§!: $mod_country_alloys_produces_mult$ §G+5%§!\n§Y기계§!: $mod_country_alloys_produces_mult$ §G+5%§!"
 concept_apex_predator_victories: "최상위 포식자 승리"
 concept_apex_predator_victories_desc: "취상위 포식자는 다음을 통해 성장합니다:\n$t$§Y전쟁§!에서 승리\n$t$타 제국 §Y종속국화§!\n$t$§Y은하 공동체§!에서 결의안 부결 초래"
 APEX_PREDATOR_GAINED_TITLE: "최상위 포식자"
 MESSAGE_APEX_PREDATOR_GAINED: "우리 제국의 최상위 포식자 $LEADER|Y$(이)가 §Y[This.GetApexDefeatedSpecies]§!에 승리를 거두고 더욱 성장했습니다."
 #Hive Effects
 EVOPRED_TERRAFORM_STARTED_TITLE: "테라포밍 개시"
 MESSAGE_EVOPRED_TERRAFORM_STARTED: "$PLANET|Y$(을)를 §Y군체 행성§!으로 테라포밍하기 위한 작업을 시작했습니다."
 decision_evopred_no_hive_world: "군체 행성 성장 중단"
 decision_evopred_no_hive_world_desc: "모든 행성을 우리 집단의 일부로 만들 필요는 없습니다."
 evopred_no_hive_world_tt: "우리 §Y정부 체제§!에 따라 이 행성이 §Y군체 행성§!으로 변하지 않게 막습니다."
 decision_evopred_hive_world: "군체 행성 성장 허용"
 decision_evopred_hive_world_desc: "이 행성은 우리의 일부가 될 자격이 있는 것으로 판단됩니다."
 evopred_hive_world_tt: "우리 §Y정부 체제§!에 따라 이 행성이 §Y군체 행성§!으로 변하는 것을 허용합니다."
 #Situation
 evolutionary_predators_situation: "적응형 진화"
 evolutionary_predators_situation_type: "적응형 진화"
 evolutionary_predators_situation_desc: "우리는 새로운 종족을 만나면 그 고유한 ['concept_evopred_genetic_insights']을 분석하고 배포합니다. 이 작업이 완료되면 우리 종족은 한층 진화되어, 유전 코드에 긍정적인 §Y종족 특성§!이 영구적으로 추가됩니다."
 evolutionary_predators_situation_monthly_change_tooltip: "이 §Y상황§!의 진행도는 우리가 섭취하는 ['concept_evopred_genetic_insights']의 수에 따라 달라집니다. §Y접근 방식§!에 따라 진행 속도가 빨라질 수도 있습니다."
