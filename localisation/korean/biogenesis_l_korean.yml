 DSC_AURA_MISSILE_PENETRATION: "다중 표적 생성기"
 DSC_AURA_MISSILE_PENETRATION_DESC: "수백만 개의 가짜 신호를 생성해 탄두가 잘못된 표적을 향하게 하는 미사일 대응 수단입니다."
