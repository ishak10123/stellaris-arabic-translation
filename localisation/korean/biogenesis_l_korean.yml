 elder_voidspawn_chain_desc: "어떤 거대 공허 태생체가 우리 은하를 초토화시키며 지나고 있습니다. 베헤모스들을 노리고 있는 것 같은데, 우리가 베헤모스를 대신 처리해 준다면 우리를 그냥 내버려 둘지도 모릅니다.\n\n목표: 은하계에서 4급 베헤모스를 모두 찾아 처치하십시오."
 behemoth_victory_chain_title: "괴물의 왕"
 behemoth_victory_chain_desc: "정신 융합이 완료되었으니, 우리 야망을 이룰 날이 얼마 남지 않았습니다. 새로 공유하게 된 이 육체에 어서 적응하고 계속해서 우리의 정신을 옮겨야 하겠지만, 그보다 우리 앞길을 막는 자부터 모조리 부수는 것이 급선무입니다.\n\n§H목표§!:\n- 은하계에서 4등급 베헤모스를 모두 찾아 처치하십시오.\n- 성장통 상황을 완료하십시오.\n- 장로 공허 태생체를 처치하십시오."
 behemoth_transference: "베헤모스 전이"
 behemoth_transference_desc: "야수와 우리 국민들 사이의 연결로 인해 행성 주민들의 삶에 대한 인식이 새롭게 바뀌었습니다. 이렇게 덧없이 사느니 야수와 하나가 되겠다는 것입니다. 이제 모두 야수와의 합일을 갈망하고 있으며, 미칠 듯한... 허기를 느끼고 있습니다."
