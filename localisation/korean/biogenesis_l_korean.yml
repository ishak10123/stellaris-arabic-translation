 ###Starlit Citadel
 origin_starlit_citadel: "별빛 성채"
 origin_starlit_citadel_desc: "수수께끼의 차원문이 이 문명의 모성계 가장자리에 나타나, 그로부터 적대적 존재들이 쇄도하는 파도처럼 출현하고 있습니다. 이 침공군은 회피할 수조차 없는 예측 불허의 움직임을 보이고 있으며, 이들을 물리칠 수 있는 유일한 수단은 이 문명의 가장 위대한 기술적 성취인 §H$dsc_name$§!뿐입니다."
 origin_tooltip_starlit_citadel_effects: "- $HOME_SYSTEM$ $TABBED_NEW_LINE$- 중력장 가장자리에 ['concept_deep_space_bastion'] $TABBED_NEW_LINE$- 미지의 성계로 이어지는 ['concept_wormhole', $BYPASS_STARLIT_WORMHOLE$] $NEW_LINE$- $HOMEWORLD$  $TABBED_NEW_LINE$- £building£ ['building:building_citadel_uplink'] $TABBED_NEW_LINE$- ['concept_bioship_remains', £blocker£ $d_bioship_remains$] $TABBED_NEW_LINE$- ['concept_invasion_site', £blocker£ $d_invasion_site$]: +2 $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_deep_space_citadel_tech',£engineering_research£ $tech_deep_space_citadel$]"
 START_SCREEN_STARLIT_CITADEL: "우리가 원래부터 이토록 긴장 속에 살았던 것은 아닙니다.\n\n풍요로운 행성 [Capital.GetName]에 거주하는 우리는 한때 평화롭고 만족스러운 삶을 살았습니다. 하지만 그 차원문이 열린 뒤로 모든 것이 바뀌었습니다.\n\n아무런 징조도 없이 [GetInvadersLower]들이 나타났습니다. 이들은 우리의 도시를 무너뜨리고 우리 땅을 유린하더니, 돌연히 나타났을 때와 마찬가지로 감쪽같이 사라졌습니다. 그 후 [GetInvadersLower]들이 돌아오지 않으리라 헛된 희망을 품었으나 침공은 또다시 이어졌고, 놈들의 공격은 갈수록 잔혹해졌습니다.\n\n이제 우리는 은하계 진출을 준비 중이며, 우리 $job_skywatcher_plural$들도 만반의 대비를 갖췄습니다. 우리 모성 상공 높은 곳에는 $dsc_name$가 그 위용을 자랑하며, [GetInvadersLower]들을 비롯해 우리를 파괴하려는 모든 세력에 맞서는 굳건한 방벽이 되어 주고 있습니다."
