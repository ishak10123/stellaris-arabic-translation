 deep_space_citadel_0_MEGASTRUCTURE_DETAILS: "§Y$deep_space_citadel_0$§!는 성간 중력장의 방어력을 극대화하도록 만들어진 무장 항성 기지입니다."
 DSC_AURA_LASER_PENETRATION: "반폴라론 방출기"
 DSC_AURA_LASER_PENETRATION_DESC: "이 장치는 극성을 띤 에너지의 응집력을 흐트러뜨려 잠재적 피해량을 낮춥니다."
