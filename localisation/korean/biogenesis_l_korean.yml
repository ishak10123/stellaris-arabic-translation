 job_skywatcher_effect_desc: "£job_skywatcher£ $job_skywatcher_plural$은 $r_stability$를 높이고 £defense_army£ §Y방위군§!을 생성하며, 제국 전체의 £mod_country_naval_cap_add£ §Y함대 수용력§!을 증가시킵니다. 또한 §Y$dsc_name_plural$§!, §Y$starbases$§! 및 §Y$military_station_small_plural$§!의 효과를 강화합니다."
