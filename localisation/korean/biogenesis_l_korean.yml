 ### NEW CIVICS ###
 civic_genetic_identification: "유전자 식별"
 civic_genetic_identification_desc: "이 사회는 모든 시민을 대상으로 출생 시 유전자 등록부 등록을 의무화하며, 그렇게 확보한 정보를 각급 행정에 사용합니다."
 civic_corporate_genetic_identification: "염기 서열 보안"
 civic_corporate_genetic_identification_desc: "모든 고객과 직원의 염기 서열을 데이터베이스에 보관해, 누구나 소정의 수수료를 내고 열람할 수 있게 합니다. 여러 법 집행 기관에서 이 서비스를 적극 활용해, 아주 미량의 흔적만으로도 흉악범들을 찾아내고 있습니다."
 civic_corporate_genetic_identification_effects: "- £building£ §Y$building_private_security$§! $megacorp_civic_branch_office_building_effect$"
 councilor_genetic_identification: "등록관"
 councilor_genetic_identification_desc: "$TITLE$(은)는 유전자 등록부 유지와 보안을 책임짐으로써 원활하고 효율적인 관료 행정에 기여합니다."
 councilor_corporate_genetic_identification: "염기 서열 브로커"
 councilor_corporate_genetic_identification_desc: "염기 서열 열람 신청과 수익 창출 계획에 대한 평가를 담당하는 $TITLE$(은)는 유전 신원 정보라면 누구의 것이든 회수할 수 있습니다."
 civic_crowdsourcing: "크라우드소싱"
 civic_crowdsourcing_desc: "이 사회는 개인의 영감이 진정한 혁신의 뿌리임을 깨달아, 오픈 소스 특허, 개방성, 자생적 협력과 혁신에 대한 지원을 통해 진보를 향한 길을 닦습니다."
 civic_crowdsourcing_effects: "$t$- 각 세력이 $r_unity$ 대신 $r_research$를 생성 $TABBED_NEW_LINE$- 게임이 시작되고 얼마 후, 제국에 여러 세력이 형성되지만 첫 10년 동안 세력 생산량이 감소"
 civic_corporate_crowdsourcing: "탈중앙 R&D"
 civic_corporate_crowdsourcing_desc: "이 기업은 정기적인 부서 간 혁신 경연 대회를 통해 연구 개발 사업을 추진합니다."
 civic_corporate_crowdsourcing_effects: "$civic_crowdsourcing_effects$ $TABBED_NEW_LINE$- £building£ §Y$building_private_research_initiative$§! $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_crowdsourcing: "['concept_crowdsourcing_civics'] 사회 제도를 보유하지 않음"
 concept_crowdsourcing_civics: "크라우드소싱"
 concept_crowdsourcing_civics_desc: "$concept_crowdsourcing_civics$ 사회 제도는 다음으로 구성됨 $NEW_LINE$- ['civic:civic_crowdsourcing']$NEW_LINE$- ['civic:civic_corporate_crowdsourcing']"
 councilor_crowdsourcing: "혁신 총괄"
 councilor_crowdsourcing_desc: "$TITLE$(은)는 특허의 공정한 사용을 관장하고, 정부가 집중 개발 중인 기술과 관련해 연구 인센티브를 마련하는 업무를 담당합니다."
 councilor_corporate_crowdsourcing: "아이디어 평가관"
 councilor_corporate_crowdsourcing_desc: "모든 프로젝트가 투자 가치가 있는 것은 아닙니다. $TITLE$(은)는 프로젝트의 시장성과 수익성을 평가합니다."
 civic_civil_education: "시민 교육"
 civic_civil_education_desc: "이 제국에서는 법 집행을 교육으로 대체했습니다. 종합적인 준비와 엄격한 교정 과정을 통해 어떠한 국민도 학습에서 소외되지 않도록 합니다. 사실 나쁜 국민은 없습니다. 그저 나쁜 교육자가 있을 뿐이죠."
 civic_civil_education_effects: "$t$- 모든 £job_enforcer£ ['concept_enforcer'](을)를 £job_educator£ ['concept_educator']로 대체 $TABBED_NEW_LINE$- £building£ ['building:building_precinct_house']를 £building£ ['building:building_state_academy']로 대체"
 councilor_head_of_education: "교육부 장관"
 councilor_head_of_education_desc: "$TITLE$의 임무는 모든 국민이 업무를 수행하는 데 필요한 지식뿐만 아니라 삶의 복잡다단한 문제를 해결할 수 있는 지식을 갖출 수 있도록 하는 것입니다. 양질의 교육이 번성하는 사회를 만듭니다."
 educator: "$job_educator$"
 job_educator: "교육자"
 job_educator_plural: "교육자"
 job_educator_desc: "교육자는 아동 교육에 전념하는 지칠 줄 모르는 지식의 수호자로, 모든 국민이 은하계에서 활약할 준비를 갖출 수 있도록 하는 대체 불가능한 서비스를 제공합니다."
 job_educator_effect_desc: "£job_educator£ $job_educator_plural$는 $r_consumer_goods$를 이용해 $r_unity$을 생산하고, £crime£ §Y$PLANET_CRIME_TITLE$§!를 줄이고, §Y통치 윤리관 선호도§!를 높이며, £defense_army£ §Y방위군§!을 생성합니다."
 mod_job_educator_add: "$job_educator$ 직업"
 building_state_academy: "국립 학교"
 building_state_academy_desc: "건전한 사회에 필요한 것으로 여겨지는 기초 지식을 가르치는 곳입니다."
 concept_state_academy: "$building_state_academy$"
 concept_state_academy_desc: "$job_educator$ 직업: §G+200§!\n\n$job_educator_effect_desc$\n$h_line$§L$building_state_academy_desc$§!"
 building_center_of_guidance: "지도 센터"
 building_center_of_guidance_desc: "이곳에서는 사회 구성원으로서의 삶을 모든 방면에서 다룹니다. 온갖 학교와 훈련 시설로 이루어진 거대 단지로, 어떠한 일탈도 교정할 수 있습니다."
 mod_planet_jobs_citizen_produces_mult: "완전한 시민권 팝 자원 생산량"
 civic_hive_familiar_face: "익숙한 얼굴"
 civic_hive_familiar_face_desc: "이 군체 의식은 협력을 통한 분쟁 해결을 선호합니다. 이를 위해 교섭 상대의 형태와 습관을 재현할 수 있는 외교 드론을 발전시켰습니다."
 civic_wilderness_familiar_face: "$civic_hive_familiar_face$"
 civic_wilderness_familiar_face_desc: "이 광야 공생군은 협력을 통한 분쟁 해결을 선호합니다. 이를 위해 교섭 상대의 형태와 습관을 재현할 수 있는 외교 아바타를 발전시켰습니다."
 civic_hive_familiar_face_effects: "사절과 공직자들이 자신이 배치된 제국에 거주하는 종족의 형태를 취합니다.\n§Y외교 행동§! 수행에 필요한 §Y신뢰도§!: §G-50%§!"
 #Bioship Civics
 civic_hive_shared_genetics: "유전자 공유"
 civic_hive_shared_genetics_desc: "이 군체는 변이 유전체를 기초로 생체 함선을 길러 냅니다. 이들의 함대는 드론과 밀접하게 연결되어, 종족의 고유한 특성에서 힘을 얻습니다."
 civic_wilderness_shared_genetics: "$civic_hive_shared_genetics$"
 civic_wilderness_shared_genetics_desc: "이 광야 공생군의 유전체는 생체 함선 육성에 적합한 기지로 변이했습니다. 그렇게 자라난 함대는 다른 공생체와 내재적으로 연결되며, 각 종족은 다른 종족으로부터 힘을 얻습니다."
 civic_hive_shared_genetics_effects: "- §G긍정적인§! 주 종족 특성마다: 함선 선체 §G+2.5%§!, 유지비 §R+0.5%§!\n- §R부정적인§! 주 종족 특성마다: 함선 발사 속도 §G+1.5%§!, 유지비 §R+0.5%§!"
 shared_genetics_fire_rate: "$civic_hive_shared_genetics$: 발사 속도"
 shared_genetics_fire_rate_desc: "우리 함선은 공격 중추를 과하게 자극함으로써 뛰어난 성능을 발휘합니다. 호르몬과 호전성을 적절한 비율로 혼합해 공격의 원동력으로 삼는 것입니다."
 shared_genetics_hull: "$civic_hive_shared_genetics$: 선체"
 shared_genetics_hull_desc: "우리 함선의 근육과 골격에는 우리 종족의 유전적 우월성이 반영되어 있습니다."
 civic_hive_aerospace_adaptation: "공중 적응"
 civic_hive_aerospace_adaptation_desc: "이 집단의 생체 함선은 대기 비행에 특히 적합해, 근접 공중 지원 임무를 수행하거나 행성 측 군수를 지원할 수도 있습니다."
 civic_hive_aerospace_adaptation_effects: "- §G우호적§! 식민지의 궤도에 있는 §Y생체 함선§!의 함선 유지비가 §G50%§! 감소합니다.\n- 궤도에 §Y생체 함선§!이 있는 §G우호적§! 식민지의 §Y건설 속도§!, §Y편의§!, §Y차단물 제거 속도§!가 함대 규모에 따라 증가하며, 경우에 따라 §Y직업 생산량§!도 증가할 수 있습니다.\n- §R적대적§! 식민지의 궤도에 있는 §Y생체 함선§!의 함선 유지비가 §G85%§! 감소합니다."
 aa_ship_upkeep_friendly: "$civic_hive_aerospace_adaptation$"
 aa_ship_upkeep_bombing: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1_desc: "이 행성의 궤도에 있는 생체 함선은 정기적으로 대기권을 출입해 행성 측의 드론에게 휴식, 식량, 지원을 제공합니다."
 aa_ship_planet_support_2: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_2_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_3: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_3_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_4: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_4_desc: "$aa_ship_planet_support_1_desc:$"
 civic_machine_stalwart_network: "굳건한 네트워크"
 civic_machine_stalwart_network_desc: "이 기계 지능은 방어 절차에 특화되어 있어, 견고한 방어와 기습 프로토콜을 병행합니다."
 defensive_stations_tracking_add: "$t$- 항성 기지 및 방어 기지 추적"
 defensive_stations_tracking_add_tt: "$defensive_stations_tracking_add$: $VARIABLE|0=+$"
 defensive_stations_weapon_range_mult: "항성 기지 및 방어 기지 무기 사거리"
 defensive_stations_weapon_range_mult_tt: "$defensive_stations_weapon_range_mult$: $VARIABLE|1%=+$"
 #Bodysnatcher
 civic_hive_bodysnatcher: "신체 강탈자"
 civic_hive_bodysnatcher_desc: "중요한 건 겉모습이 아니라 알맹이라는 말이 있습니다. 이 군체는 불운한 유기체의 신체에 침투해 조종하는 특기가 있습니다. 그렇게 꼭두각시의 수가 늘어남에 따라 숙주 문명은 군체에 흡수됩니다."
 civic_hive_bodysnatcher_effects: "§Y1,000§! 동화 £pop£ 팝과 유기체를 군체 의식에 §Y동화§!하는 능력을 지닌 채 게임을 시작합니다.\n['concept_operation_bodysnatcher_prepare_invasion'] 첩보 임무를 수행할 수 있습니다.\n['concept_operation_smuggle_pops'] 첩보 임무에서 £pop£ 팝을 추가로 획득합니다."
 civic_hive_bodysnatcher_secondary_species: "사칭꾼"
 NAME_Bodysnatchers: "신체 강탈자"
 operation_bodysnatcher_prepare_invasion: "침공 준비"
 operation_bodysnatcher_prepare_invasion_desc: "우리 주변국의 주민들은 설득에 매우 약합니다. 우리 의식에 통합된 신체를 준비해 침투시킨다면, 주민들을 훨씬 수월하게 우리의 일원으로 만들 수 있을 것입니다."
 operation_bodysnatcher_prepare_invasion_on_success: "$IF_SUCCESSFUL|E$\n다음에 §Y[Target.GetName]§!에 전쟁을 선포할 때 내부 요원의 도움을 받습니다."
 operation_invasion_prepared: "$TRIGGER_FAIL$ §R이미 상대국에 대한 침공 준비를 완료한 상태입니다. 전쟁을 선포해서 침공을 개시하십시오.§!"
 operation_invasion_impossible: "$TRIGGER_FAIL$ §R이 국가는 침투 시도에 대한 방비가 매우 잘되어 있습니다. 이 작전은 수행할 수 없습니다!§!"
 concept_operation_bodysnatcher_prepare_invasion: "$operation_bodysnatcher_prepare_invasion$"
 concept_operation_bodysnatcher_prepare_invasion_desc: "대상 종족과 종족이 동일한 동화 팝을 상대국에 침투시켜, 전쟁이 발발하면 대규모 방해 공작을 개시하도록 준비합니다."
 bio.800.name: "신규 직업"
 bio.800.desc: "우리의 원대한 계획을 실행하려면 침투시킨 신체들을 전략적 요충지에 배치해야 합니다. 앞서 수집한 정보를 바탕으로 인력이 모자란 항성 기지와 방어가 미흡한 행성을 파악해 주요 표적으로 삼았습니다. 이제 곧 작업을 시작할 것입니다."
 bio.805.name: "추가 인력"
 bio.805.desc: "작업이 순조롭게 진행 중입니다. 우리가 침투시킨 신체들이 숙주를 찾아 [Target.GetName] 내부에 자리를 잡았습니다. 의구심을 지닌 주민들은 우리 드론들이 곧 포섭할 것입니다."
 bio.810.name: "공석 발생"
 bio.810.desc: "우리가 대체하지 못한 [Target.GetSpeciesName] 주민들을 각 직책에서 해임함에 따라 §Y[Target.GetName]§! 조직 안에 여러 공석이 생겼습니다. 우리가 세운 꼭두각시들이 본격적인 침투를 개시할 준비를 마친 상태입니다. 승인만 떨어지면 바로 행동에 들어갈 것입니다."
 bio.815.name: "신입"
 bio.815.desc: "§Y[From.Target.GetName]§! 침투에 성공했습니다. 침공 준비 작업이 완료되었으니, 이제 상대 제국에 위장 주민들을 얼마나 더 많이 침투시킬 것인지 정하기만 하면 됩니다. 곧 모두가 [Owner.GetAdj](이)가 될 것입니다."
 bio.815.tt: "이 행동을 취하는 데 필요한 대상 종족 팝이 부족합니다."
 bio.815.a: "보낼 수 있는 만큼 전부 보낸 겁니다."
 bio.815.b: "상대의 전초 기지를 확보하세요."
 bio.815.b.tt: "§Y100§! £pop£ §H팝§!을 보냅니다.\n$bio.815.reminder$"
 bio.815.c: "행성 침공을 준비하세요."
 bio.815.c.tt: "§Y300§! £pop£ §H팝§!을 보냅니다.\n$bio.815.reminder$"
 bio.815.d: "놈들의 요새에 침투하세요!"
 bio.815.d.tt: "§Y500§! £pop£ §H팝§!을 보냅니다.\n$bio.815.reminder$"
 bio.815.e: "전부 우리로 만들어 버립시다!"
 bio.815.e.tt: "§Y2,000§! £pop£ §H팝§!을 보냅니다.\n$bio.815.reminder$"
 bio.815.reminder: "§G10§!년 내에 우리가 §Y[From.Target.GetName]§!에게 선포하거나 상대가 우리에게 선포하는 다음 전쟁에서 우리가 준비한 침투 자원을 활용합니다."
 bio.825.name: "[From.GetSpeciesNamePlural] 침공"
 bio.825.desc.small: "[From.GetName], 이 음흉한 자들이 우리 제국에 침투했습니다. 놈들이 벌써 우리 제국의 우주 기지를 장악하고는 우리 측 식민지를 공격하고 있습니다. 저 가짜들을 반드시 섬멸해야 합니다!"
 bio.825.desc.large: "처음에는 오류라고 생각했습니다. 우리 통신망의 절반이 두절되었으니 말입니다.\n\n하지만 아니었습니다. [From.GetName], 그 기만자들이 각 구역에서 우리 핵심 인력을 바꿔치기했던 것입니다. 우리 제국은 분열되었으며 식민지가 침공을 받고 있습니다.\n\n누구도 믿으면 안 됩니다!"
 #Smuggle pops operation
 operation_smuggle_pops: "인구 밀반출"
 operation_smuggle_pops_desc: "우리 요원이 [target.GetName]의 고립된 지역에서 대규모 반출 작전을 수행합니다."
 operation_smuggle_pops_on_success: "$IF_SUCCESSFUL|E$\n우리 제국으로 일부 £pops£ 팝을 이동시킵니다."
 smuggle_pops_also_fanatic_egalitarians: "$TRIGGER_FAIL$ §R[Target.GetName] 또한 광적인 평등주의 제국이기 때문에 상대국의 국민은 이미 자유입니다§!"
 smuggle_pops_not_enough_pops: "$TRIGGER_FAIL$ §R[Target.GetName]에는 탈취할 가치가 있는 £pops£ 팝이 부족합니다§!"
 mod_operation_smuggle_pops_difficulty_add: "$operation_smuggle_pops$ 작전 난이도"
 concept_operation_smuggle_pops: "$operation_smuggle_pops$"
 concept_operation_smuggle_pops_desc: "대상으로부터 팝을 납치해 오는 작전입니다."
 bio.900.name: "인재 확보"
 bio.900.desc: "우리 제국의 요원들이 [target.GetName]의 인구를 감시할 수 있는 거점과 은신처를 다수 마련했습니다. 사회에 불만을 품고 있거나 소외되었거나 능력이 출중한 자들은 검토를 거친 뒤에 반출 대상으로 지정될 것입니다."
 bio.905.name: "사라지는 마술"
 bio.905.desc: "우리 요원이 반출 대상을 집결시킨 뒤 외딴곳으로 몰래 빼돌리고 있습니다. 그 과정에서 지역 당국의 주의를 분산시키고 우리의 흔적을 감추기 위해 기회가 되는 대로 사건을 일으키고 있습니다."
 bio.910.name: "왕복선"
 bio.910.desc: "우리 제국의 작전이 아주 중요한 단계에 도달했습니다. 이제 우리가 모은 인구를 궤도로 몰래 옮겨야 하는데, 일단 왕복선을 모든 시설에서 동일한 시간에 출발시키고, 미끼 등으로 주의를 분산시키면서 치안 부대의 발목을 잡으려고 합니다."
 bio.915.name: "반출 성공"
 bio.915.desc: "반출 대상을 대부분 빼내는 데 성공했습니다. 하지만 약간의 차질이 생기면서 유망한 인원이 탑승한 함선이 상당수 낙오되었습니다."
 bio.915.desc.detected: "$bio.915.desc$\n\n현지 당국이 이렇게 많은 인원이 이동하는 것을 알아챈 모양입니다."
 bio.915.desc.cosmogenesis: "반출 대상을 대부분 빼내는 데 성공했습니다. 해당 인원은 벌써 가공기로 이동하고 있지만, 작전에 약간의 차질이 생기면서 유망한 인원이 탑승한 함선이 상당수 낙오되었습니다."
 bio.915.desc.cosmogenesis.detected: "$bio.915.desc.cosmogenesis$\n\n현지 당국이 이렇게 많은 인원이 이동하는 것을 알아챈 모양입니다."
 bio.915.a: "할 수 있는 건 다 했습니다."
 bio.915.b: "다른 [Root.GetSpeciesNamePlural]들을 해방시키는 데 집중합시다."
 bio.915.c: "더 많이 탈출시켜야 합니다!"
 bio.915.d: "[GetSpeciesName](을)를 전부 데려오세요."
 bio.915.tt: "상대국이 방심한 사이 £pop£ §H팝§!을 적당한 행성으로 탈출시킵니다."
 bio.915.asset.tt: "$bio.915.tt$\n§Y혹시나 [From.Target.GetName]§!(이)가 우리의 존재를 몰랐다고 해도, §R이젠 확실히 알게 되겠죠.§!"
