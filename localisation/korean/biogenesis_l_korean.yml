 change_is_growth_desc: "성장은 곧 변화이며, 변화가 곧 성장입니다. 우리의 학습 속도가 점점 빨라지고 있습니다."
 maintain_the_essence: "본질 유지"
 maintain_the_essence_desc: "계속 진화하더라도 우리 본 모습을 놓쳐서는 안 됩니다. 우리는 강하며, 굳센 의지를 지녔습니다."
