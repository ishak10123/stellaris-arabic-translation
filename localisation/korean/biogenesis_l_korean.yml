 #General Events
 action.1.desc_109: "§H평온하고 질서정연한 대화는커녕 세 가지 다른 신호가 마치 우리를 공격하듯 엄습합니다. 내용은 다르지만, 목소리는 하나입니다.§!\n\n신호 1: [GetPrimaryHiveFEConversation]\n신호 2: [GetSecondaryHiveFEConversation]\n신호 3: [GetTertiaryHiveFEConversation]\n\n§H이제 목소리들은 알아들을 수 없는 소음이 되었습니다. 분석 결과, 각 신호에는 복잡한 명칭이 있었습니다. 우리는 편의상 각 명칭을 다음과 같이 번역했습니다: §Y[GetPrimaryHiveFEName]§!, §Y[GetSecondaryHiveFEName]§!, §Y[GetTertiaryHiveFEName]§!.§!"
 war_first_hivefe: "\"나약한 생물이군. 전쟁은 어떻게 하려고 그렇게 약한 겁니까? 당신들의 발버둥과 아우성을 지켜보는 건... 꽤 재밌겠군요. 어째서...\""
 growth_first_hivefe: "\"이토록 풍성한 생명이라니! 먹이도 든든히 먹었군요. 여러분의 성장은 필요에 의한 것인가요, 선택에 따른 것인가요? 기억이 나지 않는군요. 어째서...\""
 control_first_hivefe: "\"훌륭한 신체로군요... [Species.GetEyeNamePlural](이)가 중앙에서 3% 이탈해 있습니다. 보정해야겠어요. 협조를 기대합니다. 어째서...\""
 war_second_hivefe: "\"... 그 따위 보호막으로는 항성 내핵만 가도 무너지겠군. 당신네한테 은하계란 참으로 무서운 곳이겠군요. 아마...\""
 growth_second_hivefe: "\"... 구멍이 너무 적군. 제3의 [Species.GetMouthName](이)가 있으면 도움이 될지도 모르겠군요. 그러니...\""
 control_second_hivefe: "\"... 고통스러울 정도로 비효율적인 언어군요. 문법이 엉망진창이라 체계화가 필요하겠어요. 우리가 제안한 수정 사항을...\""
 bio.3000.name: "신중히 생각하시길"
 bio.3000.desc: "§H몰락한 제국의 파생체들 사이의 불협화음이 사라졌습니다. 세 목소리가 조화를 이루어 분노를 터뜨립니다.§!\n\n이런 지각 없는 [owner.GetSpeciesName] 같으니! 당신들은 최후의 사고 성계에 진입했습니다. 확실히 새겨들으세요. 이곳은 당신들의 [owner.GetEyeNamePlural](으)로는 감당할 수 없는 곳입니다. 계속 들어온다면 상상도 하지 못할 결말과 참을 수 없는 고통을 맞이하게 될 겁니다.\n\n당신들은 우리를, '그것을', 나를 방해하지 못합니다."
 bio.3000.a: "긴급 초광속 발진."
 bio.3000.b: "우린 떠날 생각 없습니다."
 bio.3005.name: "또 다른 생각"
 bio.3005.desc: "§H조화가, 합쳐진 소리가 계속 이어집니다. 세 파생체가 하나 되어 말합니다.§!\n\n...가! 나가! 나가! 나가! 나가! 나가! 나가! 나..."
 bio.3005.a: "긴급 초광속 발진!"
 bio.3005.b: "당신들의 비밀을 반드시 알아낼 겁니다."
 #Task Events
 #War
 bio.3105.name: "강자 생존"
 bio.3105.desc: "오늘, 약해 빠진 당신들 [root.GetSpeciesNamePlural]에게 실력을 입증할 기회를 주겠습니다! 이번에 우리 쪽에서 최신형 생체 함선을 개발했는데, 이번 신종은 다른 유체들을 말살해 강함을 입증했습니다. 이제 외계종을 상대로 시험해 볼 차례입니다. 때가 되면 표본 하나가 §Y[target_system.GetName]§!에 도착할 겁니다.\n\n흥미로운 데이터를 만들어 낼 수 있을지 어디 한번 지켜보겠습니다."
 bio.3105.militarist: "도전을 받아들이죠!"
 bio.3105.a.tooltip: "몰락한 제국의 시험용 함선이 §Y[target_system.GetName]§!에 도달할 것입니다."
 bio.3105.b: "반품 되나요?"
 NAME_New_Breed: "신종 함선"
 NAME_Experimental_Ship: "시험용 함선"
 bio.3110.name: "실망"
 bio.3110.desc: "시험용 신종 함선이 아직 살아 있군요. 당신들은 너무 약합니다.\n\n차라리 아메바를 보낼 걸 그랬군요."
 bio.3110.a: "사과라도 하라는 겁니까?"
 bio.3120.name: "교훈 습득"
 bio.3120.desc: "감동이군요. 이번 함선이 사격을 회피하는 습성이 있음을 간파하고 공략하다니. 하지만 곧 잉태를 완료할 다음 세대에는 그런 결함이 없을 겁니다.\n\n어리기만 했던 [root.GetSpeciesName](이)가 성장했군요. 다음번엔 각오하시죠."
 bio.3130.name: "너무 조용한데"
 bio.3130.desc.notruce: "지금 보니 당신들 지금 전투 중이 아니군요. 왜죠? 신생 제국은 싸우지 않으면 뒤쳐집니다. 당신들 §Y[unfortunate_country.GetName]§!(을)를 위해 적절한 적수를 골라 뒀습니다. 십 년 내로 물리친다면, 당신들 문명은 앞으로도 계속 발전할 수 있을 겁니다."
 bio.3130.desc.truce: "$bio.3130.desc.notruce$\n\n휴전을 맺었다 해도 걱정하지 마세요. 이제 사라졌으니까."
 bio.3130.a: "대체 무슨 소리를..."
 bio.3130.a.pacifist: "발전을 이루는 방법은 분쟁만이 아닙니다!"
 bio.3130.a.militarist: "훌륭한 계획입니다!"
 bio.3150.name: "평화에게 기회를"
 bio.3150.desc: "어린 [Root.GetName] 여러분, 여러분에게 경고와 과제를 주고자 이렇게 왔습니다.\n\n주변을 전부 점령하는 맛이 짜릿하기는 하겠지만, 전쟁을 참으로 알기 위해서는 평화도 알아야 하는 법입니다.\n\n10년 동안 지금 까지 얻은 성취를 곱씹어 보세요. 우리를 믿고 가만히 있으란 겁니다. 그렇지 않으면 부숴 버리겠습니다."
 bio.3150.a.mean: "이건 무슨 바보 같은 소리입니까?"
 bio.3150.a.pacifist: "정말 현명한 견해로군요!"
 #Growth
 bio.3205.name: "생태계 업그레이드"
 bio.3205.desc: "생체 물질 전달이 늦는군요. 아니 잠깐... §Y[targetrivalname.GetName]§!(이)가 아니군.\n\n당신들 때문에 헷갈렸지 않습니까!\n\n아, 그렇지. 당신들한테 오래 잠들어 있던 유전 패턴을 드리겠습니다. 우리가 수천 년의 세월 동안 정성스레 보관해 온 유전체이죠. 적당한 때가 될 때까지 배포를 늦추고 있었거든요. 당신들의 §Y[target_planet.GetName]§! 식민지가 적당하겠군요. 곧 그곳의 생물권에 작업을 진행하겠습니다."
 bio.3205.a: "받아들이죠."
 bio.3205.a.planetscaper: "그 방법도 알려 주실 수 없을까요?!"
 bio.3205.b: "대신 §Y[alternate_planet.GetName]§!(은)는 어떨까요?"
 bio.3205.b.planetscaper: "시험 장소로는 §Y[alternate_planet.GetName]§!(이)가 훨씬 나을 것 같습니다!"
 bio.3205.c: "말도 안 되는 소리. 거부합니다!"
 bio.3205.c.environmentalist: "되도 않는 소리군!"
 bio.3210.name: "생물권 개조"
 bio.3210.desc.base: "§Y[fallen_empire_hive_growth.GetName]§!(이)가 §Y[root.GetName]§!에 대한 개조 작업을 마쳤습니다. 비록 그 과정은 눈에 보이지 않았지만, 결과는 분명합니다."
 bio.3210.desc.radio_bugs: "$bio.3210.desc.base$\n\n행성 전체의 곤충들이 우리가 쓰는 무선 통신 장치와 동일한 주파수로 소통하고 있습니다. 곤충이 울면 자동문이 열리고, 곤충 무리가 들이닥치면서 공장 전체가 멈춥니다. 주파수를 변경하는 방식으로 상황에 대응하고 있지만, 아직 일부 시설은 가동률이 완전히 회복되지 않았습니다."
 bio.3210.radio_bugs.accept: "상황에 적응할 수밖에요."
 bio.3210.radio_bugs.purge: "이럴 순 없습니다. 곤충을 전부 잡아 버리세요!"
 bio.3210.radio_bugs.purgeota: "업데이트 지장 발생. 벌레를 처분하세요."
 radio_bugs: "전파 벌레"
 radio_bugs_desc: "이 행성의 전파에는 인위적으로 개조된 곤충들의 울음소리가 가득합니다."
 mod_planet_districts_cities_society_research_produces_add: "£district£ 도시 및 군체 지구로 인한 £society_research£ $society_research$"
 bio.3210.desc.world_of_thought: "$bio.3210.desc.base$\n\n한때 풀이나 뜯고 진흙에서 뒹굴며 행복하게 살던 이 행성의 생물들이 바뀌어 버리면서, 존재 그 자체에 관한 불안한 의문이 생겨났습니다. 몰락한 제국이 이 행성에 사는 대부분의 동물을 개조한 것입니다."
 bio.3210.world_of_thought: "[fallen_empire_hive_growth.GetName]에 그런 능력도 있었다고?"
 bio.3210.world_of_thought.homicidal: "동물들이 참 딱하게 됐군요."
 bio.3210.world_of_thought.tt: "§Y[This.GetName]§!에서 §Y500§! £pop£ §H팝§!이 새로 지성체가 되었습니다."
 bio.3210.desc.world_alight: "$bio.3210.desc.base$\n\n행성 전체가 말 그대로 빛나고 있습니다. 이번 개조로 이 행성의 다양한 생물종이 생체 발광 능력을 지니게 되었고, 돌아가는 엔진처럼 계속되는 소음을 내고 있습니다. 게다가 밤이 사라지는 바람에 우리 [owner.GetColonistPlural]들에게 빛 차단 장비를 보급해야 하는 상황입니다."
 bio.3210.world_alight.accept: "이런 때는 [owner.GetEyeNamePlural](이)가 있는 것이 참 괴롭군요."
 bio.3210.world_alight.reject: "동물들을 가리든지 없애든지 하세요. 이대로 놔둘 순 없습니다!"
 world_alight: "눈부신 행성"
 world_alight_desc: "동물들이 영구히 빛을 내뿜고 끊임없이 거친 진동음을 내도록 개조된 탓에 밤이 오지 않게 된 행성입니다. 주민들이 이 혹독한 조건을 버틸 수 있도록 돕는 데만 해도 어마어마한 지원이 필요합니다."
 bio.3220.name: "유전자 엔터테인먼트"
 bio.3220.desc: "당신들 영역에 사는 §Y[boring_species.GetName]§! 종족은 실망스러울 정도로 단순합니다. 자신들이 가진 잠재력을 흉내조차 내지 못하고 있단 말입니다. 이런 발달 지체 때문에 우리 집단의식이 매우 불쾌해하고 있습니다. 결함을 해결할 세 가지 수단 중 하나를 제공하겠습니다.\n\n실망시키지 마십시오."
 bio.3220.tt: "§Y$evolutionary_predators_situation$§! 상황 진행도가 §G50%§! 증가합니다."
 bio.3220.humanoid: "인간류를 개조해 주십시오."
 bio.3220.mammalian: "포유류를 개조해 주십시오."
 bio.3220.reptilian: "파충류를 개조해 주십시오."
 bio.3220.avian: "조류를 개조해 주십시오."
 bio.3220.arthropoid: "절지류를 개조해 주십시오."
 bio.3220.molluscoid: "연체류를 개조해 주십시오."
 bio.3220.fungoid: "균류를 개조해 주십시오."
 bio.3220.plantoid: "식물류를 개조해 주십시오."
 bio.3220.lithoid: "암석류를 개조해 주십시오."
 bio.3220.necroid: "망령류를 개조해 주십시오."
 bio.3220.aquatic: "수생류를 개조해 주십시오."
 bio.3220.toxoid: "독소류를 개조해 주십시오."
 bio.3220.infernal: "호열체를 개조해 주십시오."
 bio.3220.psionic: "사이오닉을 개조해 주십시오."
 bio.3220.evopred: "두고 보시죠. 우린 곧 진화할 테니."
 bio.3220.b: "종족 개조라고? 당신들 변덕에 놀아날 생각은 없습니다!"
 bio.3230.name: "희귀 특성"
 bio.3230.desc: "당신들 중 일부 개체에서 우리의 방대한 유전자 보관소에 없는 독특한 특징이 발현된 것으로 확인되는군요. 단순한 분석 결과로는 안 되겠으니, 해당 §Y[fallen_empire_hive_growth.species.GetInterestingTraitName]§!의 생체 표본을 제출하세요. 걱정할 것 없습니다. [interesting_species.GetName] 전체가 필요한 건 아니니까요. [interesting_species.GetHandName]만 있어도 대체품을 육성하는 데 충분할 겁니다."
 bio.3230.a: "원대한 계획을 위해서라면 [interesting_species.GetHandName] 하나쯤은 아무것도 아니죠."
 bio.3230.b: "당신들한테 우리 유전자 구성을 맡길 순 없습니다!"
 #bio.3245.name: "Eternal Harvest"
 #bio.3245.desc: "We have discovered a derelict transport from the §Y[fallen_empire_hive_growth.GetName]§! in the §Y[transport_system.GetName]§!. Initial scans show it is carrying samples of the Fallen Empire's special crop strain, capable of feeding trillions.\n\nThe transport has been left derelict for months already and we have not seen any movement from the [fallen_empire_hive_growth.GetName] to retrieve it. Could this be a test or a glorious opportunity?"
 #Control
 bio.3305.name: "컬렉션 완성"
 bio.3305.desc: "§H사전 녹음 메시지입니다. 응답하지 마십시오.§!\n\n이 메시지는 당신들이 이해할 수 있도록 변조한 겁니다. 당신들이 쓰는 언어의 한계를 고려한 것이죠. 동화에 쓸 §Y[target_pop.GetSpeciesName]§! 개체들을 즉시 내놓으십시오. 거역은 용납할 수 없습니다. 아니, 용납하지 않을 것입니다.\n\n이미 §Y[target_pop.Planet.GetName]§! 밖에 수송선이 대기하고 있습니다. 시간이 흐를수록 당신들이 불리합니다. 이에 따르지 않으면 대가를 치르게 될 겁니다."
 bio.3305.a: "따르는 수밖에요."
 bio.3305.a.tooltip: "§Y[target_pop.Planet.GetName]§!에서 1 §Y[target_pop.GetSpeciesNamePlural]§! 팝이 §Y[fallen_empire_hive_control.Capital.GetName]§!(으)로 이전됩니다."
 bio.3305.b: "어디 가져가 보시지!"
 bio.3305.followup: "§H§Y[fallen_empire_hive_control.GetName]§!에서 통신이 도착했습니다. 그러나 옛 [fallen_empire_hive_control.GetSpeciesName] 대신 익숙한 §Y[target_leader_fe_control.Species.GetName]§!의 모습이 인사를 건넸습니다.§!\n\n"
 bio.3310.name: "두려워 마십시오"
 bio.3310.desc: "$bio.3305.followup$오늘은 당신들에게 중대한 날입니다. 당신들 종족의 유전자 염기 서열을 확보해 우리 집단에 동화시켰습니다. 당신들의 미래는 더 이상 불안하지 않습니다. 때가 되면 당신들은 우리의 일부가 될 것입니다."
 bio.3310.familiar_face: "남들이 우릴 보면 이런 느낌인 걸까요?"
 bio.3315.desc: "$bio.3305.followup$시간이 별로 없습니다. 저들은 §Y[fallen_empire_hive_control.Capital.GetName]§!에서 우리에게 말로 할 수 없을 정도로 끔찍한 실험을 저질렀습니다. 상대가 아무리 철천지원수라도 하지 않을 실험을 말입니다. 이 데이터 패킷에 있는 정보가 놈들이 우릴 지배하지 않도록 지켜 주길 바랄 뿐입니다."
 bio.3315.a: "데이터 패킷을 받으세요."
 bio.3315.tooltip: "함정이 아니라 §G몰락한 제국§!의 비밀이 진짜로 들어 있을 확률은 §Y50%§!입니다."
 bio.3315.b: "함정이다! 통신을 중단하세요!"
 bio.3330.name: "필수 안건"
 bio.3330.desc: "비록 결함이 많은 당신들이지만, 이번 상황의 심각성만큼은 이해할 수 있길 바랍니다. 우유부단한 당신네 §Y은하 공동체§!가 이번에 제안한 결의안은 반드시 §Y[GetPassFail]§!되어야 합니다. 여러분이 적절한 근거를 마련할 수 있도록 우리의 우월한 지식을 빌려주겠습니다. 잘은 모르지만 당신들한테도 복합적인 사고 능력쯤은 있을 테니, 잘 집중하시기 바랍니다.\n\n§H몰락한 제국이 우리와의 통신을 종료했습니다.§!"
 bio.3330.a: "방금 뭐였죠?"
 bio.3330.b: "다짜고짜 이러는 게 어디 있습니까!"
 fail_resolution: "부결"
 pass_resolution: "가결"
 fe_political_support: "고대의 정책"
 fe_political_support_desc: "몰락한 제국의 지원 덕분에 입법과 필리버스터가 매우 수월해집니다."
 fe_political_opposition: "$fe_political_support$"
 fe_political_opposition_desc: "$fe_political_support_desc$"
 MESSAGE_PASS_HIVE_FE_TASK_TITLE: "몰락한 제국의 파생 군체가 만족함"
 MESSAGE_PASS_HIVE_FE_TASK: "$FALLEN_EMPIRE|Y$에서 우리가 자신들이 내린 지시에 따랐다며 만족하고 있습니다. 당분간은 안전할 것입니다."
 MESSAGE_FAIL_HIVE_FE_TASK_TITLE: "몰락한 제국의 파생 군체가 불쾌해함"
 MESSAGE_FAIL_HIVE_FE_TASK: "$FALLEN_EMPIRE|Y$에서 우리에게 내린 지시를 따르지 않았습니다. 상대가 우리를 용서하기를 바랄 뿐입니다."
 bio.3350.name: "은하계의 무용지물"
 bio.3350.desc: "왜 당신들은 능력도 없는 주제에 세력을 확장해서 은하계를 더럽힙니까? 다들 당신들을 상대하기도 역겨워서 말을 아끼는 듯하니, 우리가 말해 주겠습니다. 당신들의 국경 모양을 온 은하계가 싫어합니다. 당신들이 없다면 이 우주는 훨씬 아름다워질 겁니다.\n\n§Y[offending_system.GetName]§! 성계는 쓸모도 없고 거슬립니다. 은하계의 결속을 위해 그 성계를 당신들 제국에서 없애십시오."
 bio.3350.a: "국경이 안 예쁘니까 성계를 포기하라는 겁니까 지금?"
 bio.3350.bordergore: "우린 이게 좋단 말입니다!"
 bio.3350.tt: "§Y[offending_system.GetName]§! 성계의 항성 기지를 해체하지 않으면 §Y[fallen_empire_hive_control.GetName]§!의 분노를 맛보게 됩니다."
 bio.3355.name: "두통"
 bio.3355.desc: "당신들 우리 말을 일부러 못 들은 체한 겁니까? §Y[offending_system.GetName]§! 성계만 없애면 된다 하지 않았습니까.\n\n어쩌면 당신들을 좀 더 적극적으로 솎아 내야 할지도 모르겠군요."
 bio.3360.name: "명확성"
 bio.3360.desc: "마침내 과거의 실수에서 교훈을 얻고 있군요. 좋습니다. 이제 §Y[FromFrom.GetName]§! 성계 문제는 해결됐습니다. 어쩌면 당신들도 우리처럼 위대해질 가능성이 아직 남아 있군요.\n\n계속 지켜보겠습니다."
 #Awakening
 #War
 casus_belli_cb_ae_entertainment: "여흥"
 war_goal_wg_ae_entertainment: "여흥"
 war_goal_wg_ae_entertainment_desc: "각성한 제국에게 여흥을 선사하고 적절한 경쟁자를 만들기 위한 전쟁입니다."
 wg_ae_war_entertainment_effect: "열띤 교전을 벌일 경우, §Y[Root.GetName]§!에서 보상을 제공합니다. 각성한 제국의 §Y전쟁 피로도§!가 높을수록 보상도 더 좋아집니다."
 #Control
 bio.3400.name: "통일"
 bio.3400.desc.nogalcom: "온 은하계와 우리는 하나입니다. 여러 열등한 파생체들이 진실을 깨닫고는 다시 한번 우리 집단에 합류했습니다. 이제 우리의 이름은 §Y[fallen_empire_hive_control.GetName]§!입니다. 이 순간을 목격하다니 당신들은 운이 좋군요. 이제 지고의 생명체가 또 한 번 별세계를 거닐게 됐으니 말입니다."
 bio.3400.desc.galcom: "$bio.3400.desc.nogalcom$\n\n이제 당신들의 '§Y은하 공동체§!'는 우리가 이끌겠습니다. 기념 행사를 열어야겠군요."
 bio.3405.name: "불협화음"
 bio.3405.desc: "왜 우리 앞길을 막는 겁니까? 당신들은 은하라는 합창에 어긋나는 음입니다. 우리는 그저 당신들이 화음을 이루게 하려는 것뿐입니다. 하지만 당신들은 불협화음을 고집하며 저항하는군요.\n\n이것만 알아두십시오. 우리의 교향곡은 당신들이 있든 없든 전 은하계에 울릴 것입니다."
 bio.3405.a: "그쪽 선율은 이미 들었지만, 장단에 맞출 생각은 들지 않더군요."
 NAME_Appeal_the_Veto: "거부권 호소"
 gal_com_arrogance: "오만"
 #Dig Site
 NAME_Echo: "메아리치는 영묘"
 last_thought_site: "마지막 생각"
 last_thought_site_desc: "[From.Planet.GetName](은)는 다가오는 모든 존재의 접근을 저지합니다. 이곳에 배정된 연구원들은 작업을 지연시키기 위해 온갖 핑계를 꾸며 대고, 측정 기기들은 데이터 그 자체를 거부하는 듯 오류와 오작동을 반복합니다.\n\n이곳에서 무슨 일이 일어난 것이 틀림없습니다. 그 메아리가 현실의 경계를 뚫고 오늘날에도 울려 퍼질 만큼 끔찍한 일이 일어난 것입니다."
 bio.3450.name: "사산"
 bio.3450.desc: "[From.Planet.GetName]에 대한 조사를 조심스레 진행하는 과정에서 우리는 반쯤 화석화된 생체 물질로 이루어진 지층을 수없이 통과해 지하 깊숙이 내려갔습니다. 마침내 이 행성의 텅 빈 핵에 진입하니, 걸음을 옮길 때마다 무거운 공기가 우리를 짓누릅니다. [Root.GetLeaderName](이)가 미리 조치를 취했음에도 불구하고, 커지는 불안감을 도저히 참을 수 없을 정도입니다. 일부 [Root.Owner.GetArchaeologistPlural]들은 단체로 의지가 꺾여 긴장증 증세를 보이는 탓에 이들을 즉시 호송해야 했습니다.\n\n행성의 중심에 있는 동공은 단순한 빈 공간이 아닙니다. 그 안에는 지금껏 알려진 어떠한 생명체도 범접할 수 없는 크기의 유해가 있었습니다. 아직 남아 있는 양수 잔여물의 흔적을 확인하자, 그나마 지니고 있던 의심이 확신으로 바뀌었습니다. [From.Planet.GetName](은)는 아무도 살지 않는 바윗덩어리가 아니라, 생명체의 알이었습니다.\n\n그리고 그 안에 잠들어 있는 것은 알 안에서 사망한 괴물의 유해였습니다."
 bio.3455.name: "시냅스"
 bio.3455.desc: "[From.Planet.GetName]에서 우리 [Root.Owner.GetArchaeologistPlural]들이 사산한 괴물의 두개골 안에 깊이 자리 잡은 특이한 촉수망을 추적했습니다. 유기체로 이루어진 이 얇은 줄을 따라가니 시냅스 다발이 겉으로 드러나 배열된 곳이 나왔습니다. 이 정교한 기관은 아직도 섬찟한 잠재력으로 꿈틀거리고 있습니다.\n\n[Root.GetLeaderName](은)는 촉수들을 따라 박동하는 이 오래된 회로에 진입해 연결을 시도하고자 합니다. 괴물은 비록 오래전에 사망했지만 그 안에 담긴 지식은 계속 유지됐을 것입니다. 괴물의 기억이 오늘날까지도 남아 있는지는 미지수이지만 말입니다."
 bio.3460.name: "도박"
 bio.3460.desc: "그 일은 십만 년 전에 일어났습니다. 이 군체의 시간 감각을 은하 표준 단위로 전환하는 일은 결코 단순하지 않았지만, [Root.GetLeaderName](은)는 이 생체 컴퓨터의 메모리를 꼼꼼히 뜯어보며 진실의 퍼즐을 맞춰 갔습니다.\n\n이 군체는 전성기에 이르러 자신이 도저히 물리치지 못할 적을 만났습니다. 이에 여러 다른 세력과 동맹을 맺었지만 전투는 모조리 패배로 끝났고, 다급함은 무모함으로 이어졌습니다.\n\n이후 일어난 일에 관한 기록은 상당 부분이 고의로 삭제되었지만, 아직 흩어져 있는 정보의 파편만으로도 이 군체가 감행한 마지막 도박이 무엇인지 충분히 알 수 있었습니다. 군체는 이 행성 크기의 알을 만들어 발전을 위한 그릇으로 삼아, 그 안의 유체와 융합함으로써 행성에 묶인 취약한 형태를 버리고자 했습니다. 이 시도가 위협에 맞서기 위함이었는지, 아니면 도망치고자 함이었는지는 알 수 없습니다.\n\n하지만 알 안의 생명체가 꿈틀거리자, 일이 대단히 잘못되기 시작했습니다."
 bio.3465.name: "파열"
 bio.3465.desc: "살아남은 생체 컴퓨터 및 아직 가동 중인 시냅스 링크와의 정밀한 연결을 통해, 사산된 생명체로부터 마지막 기억을 추출할 수 있었습니다. 이 작업으로 막대한 인지적 부담이 가해져 생체 컴퓨터의 상태가 빠르게 악화되었지만, 대부분의 데이터를 늦기 전에 회수할 수 있었습니다.\n\n멸망 위기에 놓인 군체는 오직 살아남겠다는 절박함으로 신중을 기울일 겨를도 없이 자신의 정신체 전체를 부화도 하지 않은 유체 안에 쏟아 넣었습니다. 그 결과 치명적인 시냅스 과부하가 발생해, 생명체도 사망했을 뿐만 아니라 군체 스스로도 끔찍한 고통의 악순환에 갇혀 버렸습니다. 이 군체가 몹시도 측은했던 동맹이 연결을 끊어 주지 않았다면, 군체는 완전히 사멸했을 것입니다. 지금은 군체 의식의 메아리만이 파열된 채 [From.Planet.GetName]에 남아, 그 최후의 단말마가 아직도 유령처럼 행성을 떠돌고 있습니다.\n\n군체가 최후에 생각한 것은 오직 고통뿐이었습니다."
