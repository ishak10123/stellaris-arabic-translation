 #Mutation
 auth_mutation_habitability_tt: "유기체 종족은 거주 적합도가 §G175%§!에 도달할 수 있음"
 auth_bio_democratic_mutation: "생체 다양성의 자유"
 auth_bio_democratic_mutation_desc: "이 사회는 각 국민의 신체는 거룩한 신전과 같은 존재이며, 각자 자신의 신체를 온전히 계획하고 통제한다는 원칙을 고수하고 있습니다. 이들은 자유 및 전적인 지원이라는 기본 틀을 바탕으로, 모든 국민에게 고유한 잠재력을 실현하고 자기 모습과 미래를 자신의 판단에 따라 형성할 권한을 부여합니다."
 auth_bio_oligarchic_mutation: "촉진 명령"
 auth_bio_oligarchic_mutation_desc: "우월한 유전자 변이를 거친 엘리트층에 권력을 집중시킴으로써, 이들에게 독보적인 권위를 부여합니다. 일반 법률의 구속을 받지 않는 이 엘리트층은 자신의 능력을 발휘해 사회를 보호하고 이끌며, 사회의 존속과 번영을 위해 필요하다고 판단되는 모든 조치를 취합니다."
 auth_bio_dictatorial_mutation: "유전자 혼합 의무"
 auth_bio_dictatorial_mutation_desc: "이 사회는 유전자 변이를 사회 발전의 주축으로 여겨 의무화하고 있습니다. 자연 그대로의 모습으로 만족하는 자들은 즉각적으로 매장하거나 살처분해 유전적으로 우월한 구성원만 남김으로써, 생존한 이들이 유전적 완벽을 위한 종족 전체의 부단한 여정에 기여하도록 합니다."
 auth_bio_dictatorial_mutation_tt: "\n[enforcer.GetIcon] [enforcer.GetName](으)로 인한 £crime£ 범죄 §G-5§!\n$auth_mutation_habitability_tt$"
 auth_bio_imperial_mutation: "유전체 확장주의"
 auth_bio_imperial_mutation_desc: "무작위 변이의 예측 불가능한 힘을 받아들인 이 제국은 어마어마한 잠재력을 실현함으로써 기존 방식으로는 불가능했던 혁신과 능력을 구현합니다. 변이에 의한 혼란은 지배를 위한 경쟁에서 가장 큰 이점으로 작용하며, 종족 전체가 누구도 범접할 수 없는 우위를 점하게 합니다."
 auth_bio_corporate_mutation: "장기 고리대금업"
 auth_bio_corporate_mutation_desc: "이 체제에서는 변제 수단의 유연화를 통해 장기 및 신체 부위를 담보로 대출을 제공합니다. 변제 기일을 놓칠 경우, 미리 합의한 담보를 두고 신속한 압류 절차가 개시됩니다. 이러한 제도를 통해 모든 신체 부위를 상품이자 담보로 활용함으로써, 장기 수요와 공급이 안정적으로 순환하게 하는 것입니다."
 auth_bio_corporate_mutation_tt: "$organic_leaders_have_trade_upkeep$\n['trait:trait_spare_organs']로 인한 $pop_group_unit$ £pop£ 팝당 $r_trade$: §G+0.5§!\n$auth_mutation_habitability_tt$"
 auth_bio_democratic_evopred: "유전자 유권자"
 auth_bio_democratic_evopred_desc: "이 사회는 비록 관리는 힘들지만 자신들의 가변성 유전체에 대한 통제 능력을 부분적으로 확보했습니다. 그렇기에 주민들은 자신들을 어떻게 변이시킬 것인지 스스로 결정합니다."
 auth_bio_democratic_evopred_tt: "$auth_bio_evopred_tt$\n가장 강력한 ['concept_faction']이 어딘지에 따라 ['trait:trait_malleable_genes']에 ['concept_genetic_electorate_effect', 효과]를 추가\n노예 이상의 외계 §Y종족§!으로 인한 ['concept_adaptive_evolution'] 상황 진행도 §G+100%§!"
 auth_bio_oligarchic_evopred: "바이오 거물"
 auth_bio_oligarchic_evopred_desc: "이 사회는 시간을 정복했습니다. 이곳의 통치 엘리트층은 철저히 선별된 가장 순수한 유전자를 통해 시간을 초월한 존재로 거듭납니다. 하지만 이러한 영원성은 단 한 번의 과오만으로도 박탈당할 수 있으며, 이 엘리트층의 지배를 받는 자들에게 야심과 진화는 그저 종이 한 장 차이일 뿐입니다."
 auth_bio_oligarchic_evopred_tt: "$auth_bio_evopred_tt$\n평의원들이 §Y불멸자§!임"
 auth_bio_dictatorial_evopred: "최상위 원수"
 auth_bio_dictatorial_evopred_desc: "이 문명은 끊임없는 진화에 의해 빚어졌으며, 지고의 위치에 오른 최상위 권위자의 통치를 받습니다. 어떤 평의회도 헌법도 최고 통치자의 우월한 의지보다 앞설 수 없습니다. 모든 유전적 승리는 권좌의 발전을 위한 동력이 됩니다."
 auth_bio_dictatorial_evopred_tt: "$auth_bio_evopred_tt$\n통치자 특성: ['leader_trait:trait_ruler_apex_predator']"
 apex_predator_male: "$trait_ruler_apex_predator$"
 apex_predator_female: "$trait_ruler_apex_predator$"
 auth_bio_imperial_evopred: "불멸의 왕조"
 auth_bio_imperial_evopred_desc: "$auth_bio_imperial_evopred$에게 과거는 묻어 두는 것이 아닌 포식의 대상일 뿐입니다. 각 세대는 다음 세대를 위한 자양분이 되며, 세상을 떠난 지도자가 남긴 유산은 제국의 통치를 영원히 유지하는 대들보가 됩니다. 제국을 섬기는 것은 곧 희생양이 되는 것이며, 모든 국민은 죽어서 선조의 유산을 더욱 살찌웁니다."
 eternal_ancestor_male: "$eternal_ancestor_female$"
 eternal_ancestor_female: "영원의 선조"
 auth_bio_imperial_evopred_tt: "$auth_bio_evopred_tt$\n통치자가 사망한 지도자를 흡수할 수 있게 됩니다."
 auth_bio_corporate_evopred: "바이오프레데이션 GLC" #Galactic Limited Incorporated
 auth_bio_corporate_evopred_desc: "바이오프레데이션 GLC의 성장 동력은 적응입니다. 유전적 적응과 경제적 적응을 모두 포함해서 말이죠. 이 거대 기업은 포트폴리오에 새로운 유전체가 추가될 때마다 자사의 시장 지위를 정비하고, 각 종족의 생체 구조에 맞춰 제품과 협상 방식을 조정합니다. 고객의 본성만 이해한다면 영업은 거의... 본능이나 다름없어집니다."
 auth_bio_corporate_evopred_tt: "$auth_bio_evopred_tt$\n$organic_leaders_have_trade_upkeep$\n종족 특성당 통상 조약 효율성: §G+1%§!\n§Y통상 조약§!으로 인한 ['concept_adaptive_evolution'] 진행도 §G100%§! 증가"
 auth_bio_hive_mind_evopred: "키메라 의식"
 auth_bio_hive_mind_evopred_desc: "이 군체 의식은 단순한 자기 변화에 질렸습니다. 이에 새로 식민지를 개척할 때마다 그곳의 환경과 육신을 변화무쌍하게 융합함으로써 살아 있는 태피스트리의 일부로 만듭니다. 이 키메라 의식 안에서는 모든 경계가 사라져 온갖 생물과 행성이 하나가 됩니다."
 auth_bio_hive_mind_evopred_tt: "$auth_bio_evopred_tt$\n식민지를 §Y군체 행성§!으로 자동 테라포밍\n외계 §Y종족§! 정화로 인한 ['concept_adaptive_evolution'] 진행도 §G+100%§!"
 auth_bio_evopred_tt: "종족 특성당 팝으로 인한 $EMPIRE_SIZE$: §G-1%§!\n$auth_mutation_habitability_tt$"
 #Hive Advanced Authorities
 auth_bio_hive_purity: "순수성 패러다임"
 auth_bio_hive_purity_desc: "이 군체는 유전적 순수성을 부단히 추구해, 모든 드론을 이상적인 생체 견본에 일치시킴으로써 성장합니다. 정밀한 유전자 조작으로 통합을 증진하고 집단의 힘을 강화해, 효율성과 생존력을 연마한 불굴의 집단을 구축하는 것입니다."
 auth_bio_hive_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $pop_group_unit$ £pop£ 팝당 생성되는 £unity£ $unity$: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_hive_cloning: "복제 무리"
 auth_bio_hive_cloning_desc: "첨단 클론 기술을 통해 유전적으로 동일한 드론들을 쉼 없이 생산합니다. 이 과정에서 각 클론은 완벽한 통일성과 효율성을 갖추도록 조정됩니다. 이 군체는 생육하고 번성하라는 내면의 명령을 충실하게 따라, 저 별들을 가릴 만큼 막대한 성장을 이루고자 합니다."
 auth_bio_hive_cloning_tt: "$ENABLES_BACKUP_CLONES$\n£society£ ['technology:tech_node_culling_1']에 의해 ['concept_clone_leader_degradation', 클론 퇴화] 완화"
 tech_node_culling_1_cloning: "$tech_node_culling_1$"
 tech_node_culling_1_cloning_desc: "$tech_node_culling_1_desc$"
 REDUCED_CLONE_DEGRADATION_TITLE: "§H기능 잠금 해제:§! 클론 퇴화 완화"
