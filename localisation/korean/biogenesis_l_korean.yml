 homogenous_class_officials_desc: "$official_plural_with_icon$에 적용되는 §Y$leader_trait_has_backup_clone_plural$§! 효과: $TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- ['concept_clone_leader_degradation', 퇴화] 완화"
 homogenous_class_commanders: "무력 프로토콜"
