 #Purity
 bio.170.name: "순수: 정부 개혁?"
 bio.170.desc: "우리 종족은 다시금 위대한 발전의 문턱에 서 있습니다. 이제 선택을 해야 합니다.\n\n주어진 운명을 받아들이고 우리의 유전 계통을 순수하게 유지함으로써 우리 문명의 유전적 우월함을 새로운 경지로 끌어올려야 할까요? 아니면 과거를 교훈 삼아 지금처럼 정돈되지 않은 형태를 유지해야 할까요?"
 bio.170.a: "순수성을 받아들여 새로운 경지로 나아갑시다!"
 bio.170.a.tt: "$change_auth_tt$ [GetPurityAuthority]"
 bio.170.b: "우리 방식을 바꿀 필요는 없습니다."
 #Cloning
 bio.175.name: "클론: 정부 개혁?"
 bio.175.desc: "우리 종족에 중대한 순간이 찾아왔습니다. 얼른 결정을 내려야 합니다.\n\n우리의 운명을 받아들이고 클론 기술의 힘을 적극 활용함으로써 우리 문명을 완벽함을 복제하는 문명으로 영영 탈바꿈시켜야 할까요? 아니면 지금까지의 여정을 교훈 삼아, 아무 의미 없는 개별성을 계속 유지해야 할까요?"
 bio.175.a: "클론 기술은 우리 미래에 빠질 수 없는 핵심입니다."
 bio.175.a.tt: "$change_auth_tt$ [GetCloningAuthority]\n$LEADERS_GAIN_CLONES$"
 bio.175.b: "$bio.170.b$"
 #Mutation
 bio.180.name: "변이: 정부 개혁?"
 bio.180.desc: "우리는 생물 진화의 중대한 기로에 서 있습니다. 중요한 선택이 우리를 기다립니다.\n\n우리의 운명을 인정하고 최첨단 생체 변이의 힘을 받아들이면, 유전자 부호에 기반한 계획적인 진화를 통해 우리 문명을 영구히 변화시킬 수 있을 것입니다. 아니면 과거에서 얻은 교훈을 보전하고 지금의 평범한 형태를 유지하는 방법도 있습니다."
 bio.180.a: "우리는 그 어떤 존재도 될 수 있습니다."
 bio.180.a.tt: "$change_auth_tt$ [GetMutationAuthority]"
 bio.180.b: "$bio.170.b$"
