 BEHEMOTH_ARMOR: "베헤모스 장갑"
 BEHEMOTH_ARMOR_DESC: "베헤모스의 외부 갑각에는 나노 구조로 이루어진 결정체가 격자를 이루고 있습니다. 가스 행성 내부의 초고압으로 씨앗 역할을 할 크리스탈이 생성되면, 이 유기체 조직은 자가 치유 능력과 막강한 내구도를 지니게 됩니다."
