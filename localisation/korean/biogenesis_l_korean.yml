 metaphysics_rejected: "형이상학 거부"
 metaphysics_rejected_desc: "형이상학적 질문을 고민해 봤자 정신만 산란해집니다. 우리의 목적은 존재에 관해 고민하는 것이 아니라 존재로서 살아가는 것입니다."
 boosted_neurology: "신경 강화"
 boosted_neurology_desc: "숙고의 시간이 너무 길었습니다. 이제 부작용의 위험을 무릅쓰고 우리 종족을 변화시키는 데 집중해야 합니다."
