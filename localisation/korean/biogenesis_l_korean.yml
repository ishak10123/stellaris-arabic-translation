 ### Behemoth Crisis ###
 ap_behemoths: "베헤모스의 격노"
 ap_behemoths_desc: "성간 우주의 최상위 포식자는 사소한 한계 따위에 묶이지 않습니다. 이러한 정신을 아로새겨 우리는 우리를 옥죄는 신체의 약점을 벗어던지고 자연의 힘 그 자체가 될 것입니다."
 must_use_bioships: "£trigger_no£ §Y생체§! 함선 세트가 필요합니다."
 behemoth_crisis_chain_title: "베헤모스 위기"
 behemoth_crisis_chain_desc: "항성은 우리의 허기를 채울 연료에 불과하며, 재앙은 우리의 야망이 피어나는 토양일 뿐입니다. 우리는 자연의 질서를 거슬러 우주 그 자체의 모습을 바꿀 만큼 거대하고 누구도 막을 수 없는 야수를 만들어 낼 것입니다."
