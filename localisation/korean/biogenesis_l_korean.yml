 disconnected_drones_sustain: "연명"
 disconnected_drones_sustain_name: "단절된 드론 연명"
 disconnected_drones_sustain_desc: "이 드론들은 집단의식과의 연결이 끊겼지만 목숨을 유지시킬 수는 있습니다.\n\n§E단절된 드론에 §Y시민권 유형§! 잠금 해제§!"
 disconnected_drones_purge: "말살"
 disconnected_drones_purge_name: "단절된 드론 말살"
 disconnected_drones_purge_desc: "지성체의 권리는 이성이 없는 존재에게는 적용되지 않습니다. 자신들을 이끌어 줄 중앙 의식이 없는 이상, 이 드론들은 짐승과 다르지 않습니다. 그리고 우리에게 방해가 되는 짐승은 병충해일 뿐입니다.\n\n§E우리 식민지에 거주하는 단절된 드론을 모두 §R정화§!합니다.§!"
