 #PURITY
 bio.200.name: "유산의 수용"
 bio.200.desc: "우리 유전자의 순수성을 지키는 데 주력하는 과정에서 우리 문명을 위대하게 만드는 것이 무엇인지 점차 깨닫고 있습니다.\n\n그 어느 때보다 유전적으로 순수해진 우리는 이제 우리가 물려받은 우월성에 유례없는 자부심을 느끼고 있습니다.\n\n예술, 과학, 상업 등 모든 분야의 전문가들이 우리의 집단적 노력을 응원하고, 그 성과가 제국의 영광으로 이어지기를 바라고 있습니다."
 bio.200.a: "예술 작품을 의뢰해 이 업적을 기립시다!"
 bio.200.b: "과학 연구가 언제나 우선입니다."
 bio.200.c: "소비가 경제의 근간입니다."
 bio.210.name: "우리는 정화를 거부한다!"
 bio.210.desc: "시위대의 구호 소리가 도심에 울려 퍼집니다. 국내 반란 세력이 우리 제국의 대의를 거부하며 순수성을 향한 여정에서 벗어나려 하고 있습니다.\n\n이 불순분자들은 유전적 다양성과 문화적 통합이 필요하다 강변합니다.\n\n이에 적절히 대처하지 않는다면, 이 불온한 자들의 활동은 순수성을 향한 발전에 걸림돌이 될 위험이 있습니다."
 bio.210.a: "반란분자들을 진압하세요!"
 bio.210.b: "허울 좋은 약속으로 달래 봅시다."
 bio.215.name: "과거의 비밀"
 bio.215.desc: "고고학자들이 우리 선조들의 모성에서 고대 문명의 흔적을 발견했습니다.\n\n태곳적부터 묻혀 있다가 발굴된 이 보관소 안에서 과거에 유전자 실험이 행해졌다는 놀라운 증거가 발견되었습니다.\n\n이 소식이 대중에게 공개된다면, 현재 우리가 주장 중인 유전적 순수성의 필요에 대한 근거가 취약해질 수 있습니다."
 bio.215.a: "선조들의 연구를 우리 연구와 통합합시다. 과거를 기반으로 성장하는 겁니다."
 bio.215.b: "증거를 파기하세요. 아무도 알아서는 안 됩니다."
 bio.220.name: "이상한 과학"
 bio.220.desc: "[event_target:rogue_geneticist.GetName](이)라는 유전학자가 무허가 생체 실험을 자행하다 발각되었습니다. 안전 지침을 모두 무시한 채, 우리 종족이 이상으로 삼는 순수하고 우월한 종족을 창조하려 했던 것입니다. 하지만 실험 결과 태어난 것은 흉측한 괴물이었습니다.\n\n수명이 짧은 이 하위 종족은 우리의 유전자 특성을 일부 갖췄지만 대부분은 각종 질병에 시달리는 흉물로서, 현재 우리 시설에 수용된 채 쇠약해지고 있습니다. 이들의 유전자 구성에 대한 연구로 나름의 성과는 거뒀지만, 이번 일로 인한 예후는 좋지 않습니다. [event_target:rogue_geneticist.GetName](은)는 후회하는 기미조차 없습니다."
 bio.220.a: "이 변절자를 당장 해임하세요!"
 bio.220.a.tt: "[event_target:rogue_geneticist.GetName](이)가 강제 해임됩니다."
 bio.220.b: "[event_target:rogue_geneticist.GetName](을)를 '처분'하세요."
 bio.220.c: "우리한테 필요한 게 바로 이런 진취성입니다!"
 bio.225.name: "순수한 스캔들!"
 bio.225.desc: "유전적 순수성을 향한 여정을 촉진하도록 정기적인 유전자 검사를 통해 표준에서 벗어나는 유전체들을 파악한 결과, 국민들 사이에서 '수준 높은' DNA가 자랑거리가 되고 있습니다.\n\n일부 정부 공직자는 시험 결과를 조작해 자신의 유전자 구성을 허위로 기재함으로써 자신들이 실제보다 더 바람직한 특성을 가지고 있는 것처럼 꾸미기도 했습니다. 이 사실이 밝혀질 경우, 대중의 분노를 살 위험이 있습니다."
 bio.225.a: "더 정확하고 신뢰할 수 있는 검사가 필요합니다."
 bio.225.b: "그냥 그 공직자가 실수한 거 아니겠습니까..."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #CLONING
 bio.230.name: "클론 딜레마"
 bio.230.desc: "우리는 클론과 함께 살아갑니다. 이들은 우리 도시에 살고 우리 공장에서 일하며, 일부는 영향력이 있는 지위에 올라 우리 삶을 규율하는 정책을 수립하고 있습니다.\n\n이렇듯 클론들이 우리 사회의 일부로 편입되었지만, 아직도 풀리지 않은 문제가 많습니다. 클론에게는 어떠한 권리가 보장되어야 할까요? 클론은 비클론 국민과 평등해야 할까요? 아니면 하층 계급으로 두어야 할까요?"
 bio.230.a: "클론에게 완전한 시민권을 보장합시다!"
 bio.230.b: "기껏해야 2등 시민일 뿐입니다."
 bio.235.name: "클론 공장 파괴 공작!"
 bio.235.desc: "우리 제국에서 가장 생산량이 많은 클론 공장에서 대형 사고가 발생해 생산이 중단되었습니다.\n\n현재 다수의 작업이 효율성을 위해 자동화되어 있기 때문에, 사고 발생을 제때 막을 인원이 없었습니다.\n\n컨베이어 벨트에서 방금 나온 클론 하나가 미끄러져 기계에 말려 들어감에 따라 공정이 지체되었고, 결국 생산을 완전히 멈춰야 했던 것입니다."
 bio.235.a: "대대적인 조사를 진행하세요!"
 bio.235.a.tt: "§Y12§!개월 동안 §Y$genetic_ascension_situation$§! 상황 진행 속도: §R-50%§!"
 biomorphosis_stalled_tt: "§Y12§!개월 동안 §Y$genetic_ascension_situation$§! 상황 진행 속도:"
 bio.235.b: "최대한 빨리 생산을 재개하세요!"
 bio.240.name: "정체성의 위기"
 bio.240.desc: "우리 제국 전역의 클론들이 자기 정체성으로 인해 괴로워한다는 보고가 들어오고 있습니다.\n\n이들은 자신에게 유전자를 제공한 원본과는 다른 정체성을 갈망하고 있습니다. 자신의 존재 목적에 의문을 던지며, 삶의 목적과 포부에 대해 불안함을 느끼고 있다고 합니다."
 bio.240.a: "흔한 일 아닙니까. 상담을 받으라고 하세요."
 bio.240.b: "노동에서 충족감을 찾게 해야 합니다."
 bio.240.b.tt: "제국의 주 종족에 해당하는 모든 §Y£leader£ 지도자§!가 §G200§! 경험치를 얻습니다."
 bio.250.name: "여기에도 클론 저기에도 클론"
 bio.250.desc: "우리 주민으로 편입되는 클론의 수가 늘어남에 따라, 이들의 생활에 들어가는 추가 자원이 경제에 부담이 되고 있습니다.\n\n당장의 어려움이 크긴 하지만, 노동력과 소비층이 확대됨에 따라 나타날 경제적 역동성은 장기적인 번영을 위한 기초가 될 것입니다. 단, 그러려면 지금 찾아온 과도기에 효과적으로 대응해야만 합니다."
 bio.250.a: "수요 증가에 맞춰 기반 시설을 확대해야겠군요."
 bio.250.b: "클론들을 외계 식민지에서 살게 하면 되겠네요."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #MUTATION
 bio.260.name: "종잡을 수 없는 변이"
 bio.260.desc: "느닷없는 부속지 생성. 물질 상태의 변동. 갑작스러운 형태 변화. 간헐적으로 올라오는 보고이기는 하지만 무시할 수는 없습니다.\n\n우리의 변이 실험이 문명 전체에 걸쳐 그다지 바람직하지 못한 결과를 내고 있습니다. 유전자를 임의로 개조하는 수단을 발견했지만, 아직 우리가 감당하기에는 버거운 일이었던 모양입니다."
 bio.260.a: "그런 변이가 오히려 연구에 도움이 될지도 모릅니다."
 bio_260_opinion_tt: "우리 제국에 대한 §Y정신주의§! 제국의 우호도 변동: §R-50§!"
 bio.260.b: "흉물들은 전부 제거하세요."
 bio.260.b.tt: "모든 §Y권위주의 £leader£ 지도자§!가 §Y$leader_trait_eager$§! 특성을 얻습니다."
 bio.265.name: "우월한 돌연변이"
 bio.265.desc: "일부이기는 하지만 우리 국민들이 스스로 변이 실험을 통해 비상한 힘과 신체 능력을 얻었습니다.\n\n남다른 힘과 출중한 재능을 갖춘 이 능력자들은 하나의 집단을 이루어 세간의 관심을 받고 있습니다."
 bio.265.a: "이들의 성공이 다른 국민들에게 영감을 줄 수도 있겠군요."
 bio.265.b: "군인으로 쓰면 딱이겠어요."
 bio.265.b.tt: "§Y[Owner.capital_scope.GetName]§!에 §Y$gene_warrior_army$§!이 생성됩니다."
 bio_265_opinion_tt: "우리 제국에 대한 §Y군국주의§! 제국의 우호도 변동: §G+50§!"
 bio.265.c: "어떻게 성공했는지 알아내서 재현해 봅시다."
 bio.270.name: "도시 전설, 현실이 되다"
 bio.270.desc: "감시 결과, 유전자가 변이된 자들로 이루어진 집단이 하수도에 살고 있다는 게 확인되었습니다. 오랫동안 도시 전설로 치부되었던 소문이 불길한 메아리처럼 울리고 있습니다.\n\n이 일로 우리 사회 전체가 긴장하고 있으며, 미지의 존재에 대한 공포가 커지면서 겉보기에 확연히 변이된 주민들에 대한 차별이 증가하고 있습니다. 하지만 이 하수도의 주민들은 하수도의 가스를 자원으로 삼고 주변 환경을 전혀 예상치 못한 방향으로 변화시키는 등 놀라운 독창성을 보여 주고 있습니다."
 bio.270.a: "하수도를 쓸어버리세요!"
 bio.270.b: "이 돌연변이들이 무언가 이뤄 낼지도 모르겠군요..."
 bio.280.name: "돌연변이 전염병"
 bio.280.desc: "새로운 전염병이 발발해 제국 전체로 퍼지고 있습니다. 이 병에 걸리면 비자발적인 기체 및 액체의 배출, 극심한 피로 등 다양한 증상이 나타나며, 심한 경우 사망에 이르기도 합니다.\n\n무엇보다 흥미로운 점은, 이 질병이 어떠한 형태로든 유전적 변이를 진행한 대상에게만 나타난다는 것입니다. 현재 환자들의 개조된 유전체에 대한 연구가 진행 중이며, 벌써부터 놀라운 발견이 나타나고 있습니다."
 bio.280.a: "치료에 응용할 수 있는지 알아보세요."
 bio.280.b: "이 질병을 무기화하세요."
 bio_280_opinion_tt: "우리 제국에 대한 §Y물질주의§! 제국의 우호도 변동: §R-50§!"
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #ANY APPROACH
 bio.295.name: "반란 세포"
 bio.295.desc: "우리 제국의 유전체 연구 시설 덕분에 우리 문명 전체가 전례 없는 수준으로 생체를 개조할 수 있게 되었습니다.\n\n그러나 주민들은 더 많은 것을 원하고 있습니다. 이에 따라 관련 자원의 중앙 독점을 풀고, 소위 '바이오해커'들이 유전체 기술을 아무런 제한 없이 자유롭게 이용할 수 있게 하라는 주장이 제기되었습니다."
 bio.295.a: "바이오해커들의 자율을 더 보장해 줍시다."
 bio.295.b: "대중은 이미 너무 많은 자유를 누리고 있습니다."
 bio_295_opinion_tt: "우리 제국에 대한 §Y평등주의§! 제국의 우호도 변동: §G+50§!"
 bio.300.name: "천재 유전학자"
 bio.300.desc: "[Owner.GetScientist] [event_target:genius_geneticist.GetName](이)가 우리가 수행하는 유전자 실험의 효율성과 효과성을 비약적으로 높일 수 있는 학술 논문을 발표했습니다.\n\n단, 이 논문에서 제시하는 새로운 방법은 아직 검증을 거치지 않은 이론에 불과하기 때문에 유전자 개조 공정에 안전하게 적용하기 위해서는 신중한 고려가 필요합니다."
 bio.300.a: "[event_target:genius_geneticist.GetName]의 기여를 인정합시다."
 bio.300.b: "쓸데없는 공상과 하찮은 재능은 용납하지 않습니다."
 bio.300.c: "모두 돌아가서 일이나 하세요."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #PURITY
 bio.310.name: "[target.GetGestaltEntityName] 순수성 파열"
 bio.310.desc: "우리 종족의 유전자를 개조하는 실험을 연이어 진행한 결과, 비정상적인 유전 부호가 우리 DNA에 침입하고 말았습니다. 외래 염기 서열이 우리 유전 물질과 무분별하게 상호 작용하면서 종족 전체가 심각한 속도로 악화되고 있습니다.\n\n이 비정상적인 생체 작용에 너무 늦기 전에 대응해야 합니다."
 bio.310.a: "오염을 제거하세요."
 bio.310.b: "일단 조사부터 해 봅시다."
 bio.315.name: "대의에 대한 충성"
 bio.315.desc: "우리 문명이 순수해지기 위해서는 우선 [target.GetGestaltEntityName]의 건강을 생각해야 하며, 이에 따라 유전자 개조 과정 하나하나가 우리 집단의 회복력을 강화하도록 조치해야 합니다.\n\n우리의 안정이나 결속을 해치는 잘못된 방향으로 개조를 진행할 경우, 우리의 통합을 지탱하는 토대 자체가 위태로워질 수 있습니다."
 bio.315.a: "신체적 회복력에 집중합시다."
 bio.315.b: "인지 기능의 효율성이 무엇보다 중요합니다."
 bio.325.name: "오늘을 넘어"
 bio.325.desc: "우리 종족의 존속과 순수성을 확보하려면, 선별적인 교배와 엄격한 유전자 검증 절차를 더욱 철저히 실시해야 합니다.\n\n자연 진화를 초월하기 위해서는 우리의 유지를 이어받을 자격이 있는 드론을 세심하게 선별해야 합니다."
 bio.325.desc.wilderness: "우리 공생 집단의 존속과 순수성을 확보하려면, 선별적인 교배와 엄격한 유전자 검증 절차를 더욱 철저히 실시해야 합니다.\n\n우리의 타고난 한계를 초월하기 위해서는 우리 군체에 이득이 될 특성을 갖춘 타당한 공생 대상을 세심하게 골라내야 합니다."
 bio.325.a: "지능이 높은 드론을 선별합시다."
 bio.325.b: "우리의 번식은 제국의 확장을 위한 것입니다."
 bio.330.name: "슬기로운 강화"
 bio.330.desc: "유전자 개조는 우리 제국의 유지를 이어 나가는 데 도움이 되겠지만, 모든 [target.GetIndividualName]의 역할과 활동을 순수성 추구라는 우리의 비전과 일치시키는 것 또한 중요합니다.\n\n이제 우리는 중대한 결정을 내려야 합니다. 적응력을 희생시켜 완벽함을 추구해야 할까요? 아니면 이러한 활동을 지탱할 기반 시설을 먼저 구축하는 더 광범위한 전략을 취해야 할까요?"
 bio.330.a: "오직 순수성만을 추구해야 합니다."
 bio.330.b: "시간을 들여 기반 시설을 개발해야 합니다."
 bio.335.name: "결격자 정화"
 bio.335.desc: "[target.GetGestaltEntityName]에서 불순하거나 비정상적인 유전자를 격리하는 데 성공했습니다.\n\n더욱 원대한 목표를 향해 나아가기 위해서는 이러한 결함을 제거함으로써 신체 발전에 대한 주도권을 자연 진화로부터 탈환해야 합니다."
 bio.335.a: "약자를 솎아 내서 전체를 강화합시다."
 bio.335.b: "결격자는 다시 개조하세요."
 bio_335_opinion_tt: "우리 제국에 대한 §Y자애 경향§! 제국의 우호도 변동: §R-50§!"
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #CLONING
 bio.340.name: "클론이 너무 많아!"
 bio.340.desc: "우리 클론 배양 시설이 당초 예상보다 훨씬 효율적으로 작동함에 따라 잉여 클론이 생산되고 있습니다.\n\n대규모 잉여 클론을 우리 사회로 받아들이는 일이 생각보다 만만치 않습니다."
 bio.340.a: "그 새 구성원들을 이주시켜야겠군요."
 bio.340.b: "생산량을 늘리고 클론의 노동력을 쥐어짭시다."
 bio.350.name: "빈 껍데기"
 bio.350.desc: "우리 제국의 주요 클론 배양 센터 한 곳이 오작동을 일으키는 바람에 일부 드론이 피해를 입었습니다. 유전자 오염 물질이 복제 공정에 유입되어, 한 클론 생산분 전체가 사고 능력이 없이 배양된 것입니다.\n\n이들은 지성이 없고 고차원적 인지 능력이 없는 생체 물질에 불과합니다. 이 문제에 온전히 대응하고 생산 문제를 시정할 때까지 클론 배양 시설의 생산량이 감소합니다."
 bio.350.a: "뭔가... 편안한 기분이군요."
 bio.350.a.tt: "§Y[owner.capital_scope.GetName]§!에 100 £pop£ §H준지성체 팝§!이 생성됩니다."
 bio.350.b: "새로운 생산분을 배양하세요."
 bio.365.name: "군체 형이상학"
 bio.365.desc: "우리 의식 안에서 질문 하나가 떠오릅니다. 언젠가는 클론이 우리를 전부 대체하지 않을까?\n\n유전자 복제 작업은 순조롭게 진행 중이지만, 그만큼 우리의 궁금증도 커져만 갑니다. 클론을 통한 인구 재생산이 이처럼 효율적이라면, 언젠가는 자연 번식을 완전히 대체하지 않을까 하는 것입니다.\n\n정말로 그렇다면 언젠가 우리 군체에 원본은 더 이상 남아 있지 않고 클론의 클론의 클론만 남게 될지도 모릅니다... 이것이 우리 종족에게 의미하는 바가 무엇일까요? 답이 없는 의문이자 분란을 부르는 주제지만 던질 수밖에 없는 질문이기도 합니다."
 bio.365.a: "질문 그 자체에 가치가 있는 것이죠."
 bio.365.b: "그런 의문은 주의만 분산시킬 뿐입니다."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #MUTATION
 bio.375.name: "연결 심화"
 bio.375.desc: "놀라운 발견입니다. 특정 유전자를 조작하면 우리의 의식 범위가 넓어지고, 우리가 우리 종족의 한계라고 여겨 온 범위를 넘어 우리의 감각이 고양된다는 사실을 알아냈습니다.\n\n이러한 유전자 변이를 군체 전체에 구현하기 위해서는 엄청난 양의 에너지가 필요합니다. 하지만 성공할 경우 우주와 그 안에서 우리가 차지하는 위치에 대한 이해가 더욱 깊어질 것입니다."
 bio.375.a: "그 정도 비용은 신경 쓰지 마세요. 진행합시다."
 bio.375.b: "절대로 서둘러 진행해서는 안 됩니다."
 mod_planet_evaluators_physics_research_produces_add: "$pop_group_unit$ [evaluator.GetIcon] [evaluator.GetNamePlural]당 £physics_research£ $physics_research$"
 bio.380.name: "쇄도하는 감정"
 bio.380.desc: "다수의 군체 구획이 걷잡을 수 없는 분노를 경험하고 있습니다. 감정의 파도가 우리 집단의식 전체에 물결치면서 집단적 고통과 좌절을 증폭시키고 있습니다.\n\n최근 도입한 유전자 변이가 우리 드론의 공격성 제어 중추에 있는 신경 세포를 과도하게 자극하면서 군체의 정서적 균형이 깨졌습니다. 다툼이 훨씬 자주 발생하고 있으며, 일부 드론은 아예 작업에서 이탈해 다른 드론을 공격하고 있습니다."
 bio.380.a: "모두 하나 되어 우리 마음을 돌봅시다."
 bio.380.b: "이 분노를 받아들입시다."
 bio.385.name: "환경 내성 약화"
 bio.385.desc: "어떤 유전자 변이는 우리의 의욕과 능력을 높여 주지만, 불쾌한 부작용을 초래하는 변이도 있다는 것이 밝혀졌습니다.\n\n우리 수명을 연장하기 위한 유전자 강화 작업이 순조롭게 진행되고 있지만, 바로 그 변이 때문에 극단적 기후에 대한 내성이 약해지고 있습니다.\n\n해당 생체 강화 시술을 받은 구성원들이 체내 열 조절 계통을 조절하는 데 어려움을 겪고 있으며, 그로 인한 불쾌감이 군체 전체에 체감되고 있습니다."
 bio.385.a: "우리 제국의 기상 보호 시스템을 고도화해야겠군요."
 bio.385.b: "몸이 변하면 선호하는 환경도 바뀌는 것이죠."
 uncomfortable_drones: "불편한 드론"
 uncomfortable_drones_desc: "우리 드론들은 변이로 인한 불편함을 이겨 내며 살아가야 합니다."
 bio.390.name: "능률 대 지능"
 bio.390.desc: "두 가지 변이를 발견했습니다. 하나는 단순노동 드론의 근력을 높여 작업 능률을 비약적으로 향상시키고, 다른 하나는 정밀 드론의 지능을 높여 문제 해결 및 전략 능력을 향상시킵니다.\n\n이제 군체가 어느 방향으로 가야 할지 결정해야 합니다."
 bio.390.a: "강함이 곧 발전입니다."
 bio.390.b: "우리는 생각합니다. 고로 번성합니다."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #ANY APPROACH
 bio.405.name: "감염된 유전체"
 bio.405.desc: "갑작스러운 유전자 역병이 발생해, 현재 겨우 막아 내고 있는 중입니다.\n\n우리 생체 구조를 조작하는 과정에서 의도치 않은 DNA 변이가 발생해, 많은 [target.GetIndividualNamePlural]의 신체 능력이 저하되고 있습니다.\n\n감염된 [target.GetIndividualNamePlural]들은 현재 격리를 완료했으며, 이제 향후 대응 방향을 결정해야 합니다."
 bio.405.a: "[target.GetIndividualNamePlural]들을 처분해 역병을 끝냅시다."
 bio.405.b: "감염 드론을 조사하세요."
 bio.410.name: "부패하는 세포"
 bio.410.desc: "계산 오류 때문에 우리 드론 중 상당수의 유전적 무결성이 손실되었습니다. 하지만 오류가 발생한 지점을 정확히 파악하지 못한 상태입니다.\n\n종족 강화와 관련된 생체 계산을 검토하고 문제의 소지가 있는 시술을 변경해, 다시 작업을 수행할 준비를 마쳤습니다.\n\n하지만 우리가 오류를 수정한 것이 맞는지, 아니면 더 많은 오류를 만들어 낸 것인지는 아직 확실하지 않습니다."
 bio.410.desc.wilderness: "계산 오류 때문에 우리 공생체 중 상당수의 유전적 무결성이 손실되었습니다. 하지만 오류가 발생한 지점을 정확히 파악하지 못한 상태입니다.\n\n우리 구성 요소의 조정과 관련된 계산을 검토하고 균형이 맞지 않는 효소를 고쳐, 다시 작업을 수행할 준비를 마쳤습니다.\n\n하지만 우리가 오류를 수정한 것이 맞는지, 아니면 더 많은 오류를 만들어 낸 것인지는 아직 확실하지 않습니다."
 bio.410.a: "앞으로 무슨 일이 생기든, 우리에게 교훈을 줄 겁니다."
 bio.410.b: "실험을 중단하세요."
 bio.410.b.tt: "$bio.235.a.tt$"
