 unlocks_ship_2_bio: "몰락한 제국의 §Y마울러§! 및 §Y위버§! 함선 기술이 잠금 해제됩니다.\n"
 menp_cosmo_ship_2_desc_bio: "이 함선은 시공간의 관계를 뒤틀어 기존의 한계를 초월합니다. 그 작은 선체에는 물리 법칙에 얽매인 함선은 따라올 수 없는 능력이 숨겨져 있습니다."
 menp_cosmo_ship_3_desc_bio: "$tech_cosmogenesis_harbinger_desc$"
 unlocks_ship_3_bio: "몰락한 제국의 §Y하빈저§! 기술이 잠금 해제됩니다."
 menp_cosmo_ship_4_desc_bio: "$tech_cosmogenesis_stinger_desc$"
 unlocks_ship_4_bio: "몰락한 제국의 §Y스팅어 타이탄§! 기술이 잠금 해제됩니다."
 tech_cosmogenesis_mauler: "암호 마울러"
 tech_cosmogenesis_mauler_desc: "시공간 차원을 초월하는 유기 구조를 갖춘 이 마울러는 안이 밖보다 넓으며, 작은 선체 안에 복잡하게 얽힌 근육계를 감추고 있습니다. 물리 법칙으로 설명할 수 없을 만큼 치명적인 위력으로 적을 물어뜯을 수 있습니다."
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_TITLE: "§H함선 유형 잠금 해제:§! 암호 마울러"
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_DESC: "§H암호 마울러§!\n$tech_cosmogenesis_mauler_desc$"
 tech_cosmogenesis_weaver: "딜레마 위버"
 tech_cosmogenesis_weaver_desc: "딜레마 위버는 기존의 공간 법칙을 따르지 않습니다. 겉으로 보이는 구조 이상의 지원 무기가 배치되어 있어, 단독으로 전장의 흐름을 바꿀 수 있습니다."
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_TITLE: "§H함선 유형 잠금 해제:§! 딜레마 위버"
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_DESC: "§H매트릭스 위버§!\n$tech_cosmogenesis_weaver_desc$"
 tech_cosmogenesis_harbinger: "미로 하빈저"
 tech_cosmogenesis_harbinger_desc: "이 하빈저는 뒤얽힌 주머니 차원 안에 공격기를 보관하고 있습니다. 각 함선의 내부에는 현실을 초월한 격납고가 미로를 이루고 있어, 단독으로도 함대 하나만큼의 화력을 운용할 수 있습니다."
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_TITLE: "§H함선 유형 잠금 해제:§! 미로 하빈저"
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_DESC: "§H미로 하빈저§!\n$tech_cosmogenesis_harbinger_desc$"
 tech_cosmogenesis_stinger: "신비 스팅어"
 tech_cosmogenesis_stinger_desc: "동력원이 감당할 수 없을 정도로 무기를 꽉 채운 이 스팅어는 정상적으로 움직일 수 없을 것 같음에도 화력을 내뿜습니다. 그것도 쉬지 않고 말이죠."
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_TITLE: "§H함선 유형 잠금 해제:§! 신비 스팅어"
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_DESC: "§H신비 스팅어§!\n$tech_cosmogenesis_stinger_desc$"
