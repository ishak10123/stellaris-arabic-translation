 #Purity
 plus_minus_icon: "£plus_minus£"
 minus_plus_icon: "£minus_plus£"
 pop_effects_from_purity_header: "['concept_genetic_purity']으로 인한 £pop£ 팝 효과:"
 leaders_gain_genetic_purity_trait: "£leader£ 유기체 지도자가 §Y$trait_leader_genetic_purist$§! 특성 획득"
 genetic_purist_effects_header: "['concept_genetic_purity']으로 인한 £leader£ §Y$trait_leader_genetic_purist$§! 효과:"
 authority_grants_genetic_purist_tt: "$leaders_gain_genetic_purity_trait$ $NEW_LINE$$genetic_purist_effects_header$"
 concept_genetic_purity: "종족 유전적 완벽"
 concept_genetic_purity_desc: "['tradition_category:tradition_purity'] 전통을 받아들인 정부 체제는 자국의 £pop£ §H유기체 팝§!과 £leader£ §H지도자§!에 증감하는 효과 및 보정치를 부여합니다.$TABBED_NEW_LINE$- §G긍정적§! 종족 특성에 특성 포인트 사용 시 증가합니다.$TABBED_NEW_LINE$- §R부정적§! 종족 특성에서 특성 포인트 획득 시 감소합니다."
 trait_leader_genetic_purist: "유전적 순수주의자"
 trait_leader_genetic_purist_desc: "이 지도자는 유전적 완벽을 이루겠다는 확고한 신념을 지니고 있으며, 어떠한 결함이라도 결코 용납하지 않습니다."
 auth_bio_democratic_purity: "표현형 자기 결정권"
 auth_bio_democratic_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £mod_pop_happiness£ $MOD_POP_HAPPINESS$: $plus_minus_icon$§Y$@purity_traits_happiness|1%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $mod_leaders_upkeep_mult$ $minus_plus_icon$§Y2.5%§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$ $plus_minus_icon$§Y2.5%§!"
 auth_bio_democratic_purity_desc: "자기 신체를 결정한 권리는 누구에게나 있습니다. 국가 차원에서 모든 국민에게 자신의 판단에 따라 신체를 개조할 권한을 인정합니다. 이제 신체는 상상의 나래를 마음껏 펼칠 수 있는 궁극의 캔버스가 됩니다."
 auth_bio_oligarchic_purity: "우생학적 위계"
 auth_bio_oligarchic_purity_tt: "$eugenic_political_power_effects$"
 auth_bio_oligarchic_purity_desc: "우월한 유전자를 지닌 엘리트층과 문명 전체의 운명을 수호하는 가장 순수하고 뛰어난 자들에게 절대 권력을 부여해야 합니다. 그 밑의 모든 국민은 자신이 물려받은 유전적 가능성에 따라 정밀하게 부여된 역할을 수행합니다. 삶의 만족은 원대한 야망이 아니라 자신에게 주어진 목적을 받아들이는 데서 오는 것입니다."
 eugenic_political_power_effects: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $MOD_POP_BONUS_WORKFORCE_MULT$: $plus_minus_icon$§Y$@purity_traits_bonus_workforce_mult|2%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: $plus_minus_icon$§Y$@purity_traits_council_speed|Y1%$§!"
 auth_bio_dictatorial_purity: "핵산 사법부"
 auth_bio_dictatorial_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$$pop_group_unit$ £pop£ 팝당 생성되는 £society£ 사회학 연구: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- 행성 $MOD_PLANET_CRIME_ADD$: $minus_plus_icon$§Y5.0§! $TABBED_NEW_LINE$- 구역 $MOD_PLANET_CRIME_ADD$: $minus_plus_icon$§Y2.5§! $TABBED_NEW_LINE$- 행성 $MOD_PLANET_STABILITY_ADD$: $plus_minus_icon$§Y5.0§! $TABBED_NEW_LINE$- 구역 $MOD_PLANET_STABILITY_ADD$: $plus_minus_icon$§Y2.5§!"
 auth_bio_dictatorial_purity_desc: "이 정부는 유전자 및 생체 데이터를 선제적 사법 처리의 수단으로 활용합니다. 모든 국민의 유전 부호를 상세히 조사함으로써 범죄 성향을 밝혀내는 것입니다. 이렇게 범죄가 일어나기 전에 조치를 취하면, 정밀한 감독을 통해 질서를 확보할 수 있습니다. 진정한 정의는 사후 대응이 아닌 사전 예방을 통해 범죄를 근절해야만 이룩할 수 있습니다."
 auth_bio_imperial_purity: "생체 지배"
 auth_bio_imperial_purity_tt: "['concept_genetic_purity']으로 인한 £leader£ §Y$imperial_ruler$§! 및 §Y후계자§! 효과:$TABBED_NEW_LINE$- $MOD_LEADER_SKILL_ADD$: $plus_minus_icon$§Y$@purity_traits_imperial_level|2$§! $DOUBLE_NEW_LINE$£leader£우리 §Y[Ruler.GetTitle]§!(과)와 종족이 동일한  지도자가 §Y$imperial_bloodline$§! 특성 획득\n£leader£['concept_genetic_purity']으로 인한  §Y제국 혈통§! 효과: $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_MULT$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§!"
 auth_bio_imperial_purity_desc: "이 정부는 유전적 우월성을 기조로 삼아 지도자의 수명을 늘리고 완벽한 생체를 끈질기게 추구합니다. 사회 번영은 최상의 유전자만 보전하고 확산시켜 유전적 우월성에 의한 미래를 구축해야 비로소 이룰 수 있는 것입니다. 쉼 없이 유전자 풀을 관리하면 진보를 이룩함으로써 장수와 완벽함이라는 궁극의 보상을 취할 수 있습니다."
 auth_bio_corporate_purity: "유기적 범죄 조직"
 auth_bio_corporate_purity_tt: "$organic_leaders_have_trade_upkeep$\n\n$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $pop_group_unit$ £pop£ 팝당 생성되는 $r_trade$: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_corporate_purity_desc: "생명 그 자체를 완벽하게 상품화하는 데 성공한 이 거대 기업은 수익 창출을 목적으로 장기를 생산합니다. 프리미엄급 장기는 높은 가격에 거래되지만, '중복' 자산의 경우 암시장으로 흘러들어갈 수 있습니다. 이러한 환경에서 은밀히 암약하는 중개상과 암시장의 외과의들은 절박한 고객들의 수요를 충족하고 어떠한 자산도 버려지지 않도록 조치함으로써 번성합니다."
 #Cloning
 auth_bio_democratic_cloning: "조화로운 다원성"
 auth_bio_democratic_cloning_tt: "$ENABLES_BACKUP_CLONES$\n§Y$leader_trait_backup_clone_default$§! 유지비: §G$@cordant_multiplicity_clone_upkeep|0%$§!\n§Y$leader_trait_backup_clone_default_plural$§!는 ['concept_clone_leader_degradation', 퇴화]가 완화되며 §Y$leader_trait_has_backup_clone_plural$§! 특성 보유 불가"
 auth_bio_democratic_cloning_desc: "이 정부는 클론 기술을 평등과 진보를 보여 주는 증거로 여깁니다. 클론은 자연 출생한 국민과 평등한 지위를 누리며, 이들의 목소리 또한 동등한 가치를 지닙니다. 이렇게 클론, 비클론 할 것 없이 모든 이의 관점을 다양하게 수용함으로써 국민들의 뜻은 한층 풍부해집니다."
 auth_bio_oligarchic_cloning: "자가 복제 섭정"
 auth_bio_oligarchic_cloning_tt: "$ENABLES_BACKUP_CLONES$\n§Y$leader_trait_has_backup_clone$§! 특성이 평의원에게 추가 효과 부여\n§Y$leader_trait_backup_clone_default_plural$§!가 평의회에 있는 동안 ['concept_clone_leader_degradation', 퇴화] 완화\n"
 auth_bio_oligarchic_cloning_desc: "이 사회는 우월한 클론의 특질을 끊임없이 계승하여 권력을 확보하는 방법으로 엘리트층이 영구히 사회를 지배하게 합니다. 클론 기술로 엘리트층의 유전적 유산을 보전하는 동시에 완벽하게 다듬음으로써 지배층의 지위가 원활하게 이어지도록 하는 것입니다. 이들은 특정한 특권 계통을 복제를 통해 강화하고 제국의 모든 유력 지위를 차지하게 해, 엘리트층의 지배를 대대로 공고히 정착시킵니다."
 auth_bio_dictatorial_cloning: "동질적 복종"
 auth_bio_dictatorial_cloning_tt: "$ENABLES_BACKUP_CLONES$\n$AVAILABLE_POLICIES$ §Y$policy_homogenous_class$§!"
 auth_bio_dictatorial_cloning_desc: "엄정한 유전자 선별을 통해, 불굴의 복종심이 각인된 이들만 복제 대상으로 선택함으로써 절대적 충성을 확보합니다. 그 결과 반란이 힘든 정도를 넘어 생리적으로 불가능하고 영구히 지속되는 사회를 구축하여, 사회 구성원의 근간부터 시작해 모든 방면에서 깨지지 않는 조화를 이룩합니다."
 auth_bio_imperial_cloning: "유전적 연속성"
 auth_bio_imperial_cloning_tt: "$ENABLES_BACKUP_CLONES$\n§Y$leader_trait_backup_clone_imperial$§! 특성의 불이익이 증가하지 않음"
 auth_bio_imperial_cloning_desc: "위대한 통치자의 지혜와 성과를 클론 기술로 보전함으로써, 의심할 여지 없이 고결한 그 정신을 다음 세대로 이전합니다. 이렇게 지도자의 능력을 끊임없이 계승해 사회를 영구히 발전시키면, 그 현명한 통치 아래 황금 시대가 영원히 지속되게 할 수 있습니다."
 auth_bio_corporate_cloning: "복제 협회"
 auth_bio_corporate_cloning_tt: "$organic_leaders_have_trade_upkeep$\n$ENABLES_BACKUP_CLONES$\n£building£ ['building:building_clone_vats']로 인한 $mod_planet_jobs_trade_produces_mult$: §G+$@replicatory_association_trade_mult|0%$§!\n£building£ §Y$building_clone_vats$§!로 인한 £mod_planet_amenities_add£ 행성 편의: §G+$@replicatory_association_amenities_add|0$§!\n$AVAILABLE_POLICIES$ §Y$policy_replicatory_association_insurance$§!"
 auth_bio_corporate_cloning_desc: "전에 없던 수준의 편리함과 안락함을 누려 보세요. 클론을 만들어 예비 장기를 확보하거나, 세상을 떠난 연인을 생전 모습 그대로 복제할 수 있습니다. 복제 정확도 93%를 자랑하는 이 거대 기업은 최첨단 기술에 기반한 정밀 복제를 통해 고객에게 확실한 위안을 약속합니다."
 AUTHORITY_HAS_CLONE: "$t$§Y통치자§! 사망 시, §Y$leader_trait_backup_clone_imperial$§!이 새 통치자가 됩니다. $TABBED_NEW_LINE$§Y$leader_trait_backup_clone_imperial_plural$§!의 ['concept_clone_leader_degradation', 퇴화]가 완화됩니다."
 policy_replicatory_association_insurance: "복제 보험"
 policy_replicatory_association_insurance_desc: "이사회 구성원 및 기타 주요 인원에게 보수의 일환으로 클론 우선 이용권을 제공합니다."
