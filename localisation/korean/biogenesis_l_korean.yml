 feral_insight: "야수의 통찰"
 feral_insight_name: "$feral_insight$:"
 feral_insight_value: "£feral_insight£ $VAL|0$"
 feral_insight_current_value: "현재 수치: §Y$VALUE|0$§!"
 feral_insight_gaining: "§H위기 목표§!를 완료해 더 많은 £feral_insight£ §Y$feral_insight$§!을 얻으십시오."
 feral_insight_desc: "우리는 거대 생명체의 섭식 및 행동 주기를 연구하고 있습니다."
 feral_insight_crisis_objective: "위기 목표"
 feral_insight_crisis_objective_gained: "$feral_insight$ 획득"
 feral_insight_crisis_objective_reward: "$REWARD$"
 feral_insight_crisis_objective_progress: "이 위기 목표로 $AMOUNT$ £feral_insight£을 획득했습니다."
 feral_insight_crisis_description_title: "베헤모스 위기"
 feral_insight_crisis_description: "$menace_crisis_description_intro$\n\n이 우주 공간에 기거하는 레비아탄은 그 무엇도 비할 수 없는 힘을 지닌 위압적인 존재이지만, 목적과 야심은 결핍되어 있습니다. 이들의 강대한 생체 구조를 우리 제국의 지적 능력과 결합한다면, 우주 동물의 새로운 세대를 만들어 내고, 우리는 은하계 지배의 정점에 서게 될 것입니다."
 feral_insight_crisis_howto_title: "베헤모스 부화"
 feral_insight_crisis_howto: "§H위기 목표§!를 추진하면 £feral_insight£ §H야수의 통찰§!이 생성되어, 우리의 생물학적 잠재력을 완전히 실현할 수 있게 됩니다."
 feral_insight_crisis_level_unlocked: "$LEVEL$에서 다음 보상을 획득:\n"
 feral_insight_crisis_level_locked: "이 단계를 잠금 해제하기 위해 필요:\n"
 feral_insight_crisis_level_unlock: "£feral_insight£ §Y$CURRENCY$§! 야수의 통찰 보유"
 feral_insight_crisis_level_desc: "위기 단계를 진행하려면 £feral_insight£ §H야수의 통찰§!을 축적하고, 특별 위기 기술을 연구하고, 베헤모스를 성장시키십시오."
 #Crisis Perks
 menp_behemoth_objectives: "야수의 통찰"
 unlocks_behemoth_objectives: "§H위기 목표§!를 달성하면 £feral_insight£ §Y$menp_behemoth_objectives$§!을 축적할 수 있습니다.\n"
 menp_behemoth_objectives_desc: "베헤모스의 행동을 연구하면 우리의 궁극적 목표인 초월에 더 가까이 다가갈 수 있습니다. 우리는 행성에서 태어난 생명체의 생물학적 제한을 벗어 던질 것입니다."
 menp_behemoth_bioship_1: "키틴질 경화"
 menp_behemoth_bioship_1_desc: "우주의 엄혹한 환경을 견디려면 두꺼운 외피가 필요합니다. 외부를 강화하면, 아무리 거친 환경에서도 생존을 보장할 수 있을 것입니다."
 menp_behemoth_society_1: "현장 시험 촉진"
 menp_behemoth_society_1_desc: "연구소에서의 실험도 좋은 출발점이 되지만, 진정한 발전을 이루기 위해서는 위험을 무릅쓴 현장 시연이 필요한 법입니다."
 menp_behemoth_food_1: "초거대 작물"
 menp_behemoth_food_1_desc: "베헤모스의 막대한 식욕을 달래는 일은 가면 갈수록 어려워질 것입니다. 우선 유전자 개조를 통해 먹이의 크기부터 키워야겠군요."
 menp_behemoth_egg: "대규모 부화장"
 unlocks_behemoth_egg: "§Y베헤모스 알§! 거대 구조물을 잠금 해제합니다.\n"
 menp_behemoth_egg_desc: "초거대 생물의 알을 수용하려면 그만큼 거대한 부화 시설이 필요합니다. 궤도상에 건설하는 이 부화장은 베헤모스의 성장에 필요한 막대한 공간을 감안해 항성과 정확한 거리를 두고 지어야 합니다."
 menp_behemoth_bioship_2: "분비샘 자극 개선"
 menp_behemoth_bioship_2_desc: "베헤모스의 내분비샘을 인위적으로 자극하는 전용 무인정을 제작해, 성장 호르몬을 통한 발달을 촉진합니다."
 menp_behemoth_society_2: "융합 탐구"
 menp_behemoth_society_2_desc: "자연 선택과 생체 공학의 융합을 통해 그 무엇보다도 독보적인 힘이 탄생했습니다."
 menp_behemoth_food_2: "영양소 과부하"
 menp_behemoth_food_2_desc: "베헤모스의 막대한 식욕을 달래는 일은 불가능에 가깝습니다. 일단은 유전자 개조를 통해 먹이의 크기부터 키우는 수밖에 없을 듯합니다."
 menp_behemoth_hatchling: "초대형 유체"
 unlocks_behemoth_hatchling: "베헤모스 알 거대 구조물을 §Y부화§!시킬 수 있게 됩니다.\n"
 menp_behemoth_hatchling_desc: "베헤모스의 유체들이 여러 성계에 퍼져 있습니다. 우리 이웃 제국들은 우리가 키워 낸 이 생물들의 자율권을 존중해야 할 것입니다. 먹잇감이 되기 싫다면 말입니다."
 menp_behemoth_bioships_3: "성장 주기 단축"
 menp_behemoth_bioships_3_desc: "우리의 궁극적인 목표를 달성하기 위해서는 초거대 우주 동물의 발달을 촉진하는 일이 무엇보다 중요합니다. 이를 위해 관련 기반 시설 또한 그 규모에 맞게 확대할 것입니다."
 menp_behemoth_society_3: "생체 공학 통달"
 menp_behemoth_society_3_desc: "우리는 엄격한 시험과 시행착오를 통해 제국의 과학적 역량을 발전시켰습니다. 그 결과, 우리는 은하계를 선도하는 생체 공학 강국이 되었습니다."
 menp_behemoth_mind_control: "심층 사고 형성"
 unlocks_behemoth_mind_control: "§Y베헤모스§!의 사고에 영향을 줄 수 있게 됩니다.\n"
 menp_behemoth_mind_control_desc: "우리의 집단 지능이 지금보다 더 크고 좋은 것을 갈망하며 요동치고 있습니다. 우리의 야망에는 한계가 없습니다."
 menp_behemoth_hatchling_2: "제한 없는 성장"
 unlocks_behemoth_hatchling_2: "먹이를 먹은 §Y베헤모스§!가 번데기로 변태하도록 해, 녀석의 크기와 힘을 비약적으로 키웁니다.\n"
 menp_behemoth_hatchling_2_desc: "베헤모스가 고삐 풀린 듯 성장 중입니다. 한때 유체에 불과했던 녀석이 점점 흉폭하고 자비 없는 자연재해가 되고 있습니다."
 menp_behemoth_bioship_4: "강해지는 생물"
 menp_behemoth_bioship_4_desc: "몰아치는 굶주림과 굴하지 않는 분노를 원동력으로 삼아, 베헤모스들의 힘이 혼돈의 경지에 오르고 있습니다. 이들의 생체 무기 또한 적뿐만 아니라 근처의 모든 것을 언제라도 쓸어버릴 준비를 갖추고 있습니다."
 menp_behemoth_mutation_research: "베헤모스 변이"
 unlocks_behemoth_mutation_research: "§Y베헤모스§!의 유전자 발달을 좌우하는 §Y특별 프로젝트§!를 잠금 해제합니다.\n"
 menp_behemoth_mutation_research_desc: "베헤모스의 성장에 맞춰 유전 물질을 다시 조정해, 가장 유리한 생리적 특성이 발현되게 합니다."
 menp_behemoth_mind_control_2: "최상위종 투입"
 unlocks_behemoth_mind_control_2: "우리 §Y베헤모스§!와 더욱 깊은 초자연적 연결을 맺습니다.\n"
 menp_behemoth_mind_control_2_desc: "유전적 완벽성의 정점에 선 이 생물을 우리 영역에만 둘 수는 없습니다. 온 은하계와 나누어야 합니다."
 menp_behemoth_mind_meld: "정신 융합"
 unlocks_behemoth_mind_meld: "은하계를 지배할 가공할 위력을 갖춘 강력한 §YIV 등급 베헤모스§!에 대한 완전한 제어권을 얻습니다.\n"
 menp_behemoth_mind_meld_desc: "우리의 정신이 곧 베헤모스의 정신이고 베헤모스의 정신이 곧 우리의 정신이며, 야수의 분노는 우리의 분노가 됩니다. 우리는 자의로 야수의 먹이가 됩니다. 야수가 우리의 집단의식을 게걸스럽게 포식하는 동안, 우리는 그 분노를 느낍니다. 야수가 우리가 되고, 우리가 야수가 됩니다."
 menp_behemoth_primal_roar: "원초적 포효"
 unlocks_behemoth_primal_roar: "은하 최대의 야수를 불러내, 우주에 대한 지배권을 놓고 격돌합니다.\n"
 menp_behemoth_primal_roar_desc: "무언가가 우리 몸속을 그슬고, 찢어발기고, 태우며 지나갑니다. 그 정체는 바로 격노, 다시 말해 원초적 포효입니다. 온 은하계가 우리가 내뿜는 분노에 불타오를 것입니다."
 menp_behemoth_ever_hungry: "영원한 허기"
 unlocks_behemoth_ever_hungry: "$behemoth_finale_situation$ 상황을 잠금 해제합니다. 온 은하를 먹어치워 크기와 힘을 키움으로써 궁극의 성간 포식자가 됩니다.\n"
 menp_behemoth_ever_hungry_desc: "고통이 가시지 않습니다. 이제 포식에 대한 갈망만이 우리의 유일한 존재 이유가 되었습니다. 우리 안에 있는 공허는 무엇을 먹어도 채울 수 없습니다. 이 고통을 달래기 위해서는 적어도 은하만 한 크기의 먹이가 필요할 것입니다."
 menp_behemoth_egg_2: "굶주린 자손"
 unlocks_behemoth_egg_2: "§YIV 등급 베헤모스§!가 §Y알§!을 낳아 자기 종족을 보전할 수 있는 능력을 잠금 해제합니다.\n"
 menp_behemoth_egg_2_desc: "우리가 길러 낸 괴물이 은하를 죽이고 먹어 치울 것입니다. 그 굶주림은 끝을 모르며, 이들은 영겁의 시간 동안 포식을 멈추지 않을 것입니다."
 mod_shipclass_military_hull_mult: "군용 함선 선체"
 mod_country_resource_max_food_add: "식량 저장 한도"
 mod_starbase_shipyard_build_alloys_cost_mult: "함선 합금 비용"
 crisis_egg_built: "£trigger_yes£ §H$behemoth_egg$§! 거대 구조물을 §Y건설§!함"
 crisis_egg_required: "£trigger_no£ §H$behemoth_egg$§! 거대 구조물을 §Y건설§!함"
 crisis_egg_hatched: "£trigger_yes£ §H$behemoth_egg$§!에서 §H$behemoth_hatchling$§!를 §Y부화§!시킴"
 crisis_hatchling_required: "£trigger_no£ §H$behemoth_egg$§!에서 §H$behemoth_hatchling$§!를 §Y부화§!시킴"
 district_mindlink: "정신 연결 메트로폴리스"
 district_mindlink_plural: "$district_mindlink$"
 district_mindlink_desc: "높다란 첨탑이 인구 밀집 지역 위로 우뚝 솟아 있습니다. 이곳에서 자원자들은 야수와 직접 교감할 수 있습니다."
 planet_building_buffer: "메트로폴리스 전환"
 planet_building_buffer_desc: "야수와의 교감을 위한 정신 연결 첨탑은 빠르게 세울 수 있지만, 이에 따라 이 행성의 기반 시설이 계속 운영되도록 대응 계획을 수립해야 했습니다."
 mod_job_transference_volunteer_add: "$job_transference_volunteer$ 직업"
 planet_transference_volunteers: "$job_transference_volunteer_plural$"
 job_transference_volunteer: "전이 자원자"
 job_transference_volunteer_plural: "$job_transference_volunteer$"
 job_transference_volunteer_desc: "대부분의 주민은 야수와의 정신 연결을 그리 대수롭게 여기지 않습니다. 연결 자체는 계속 유지되고 있지만 긴밀하지는 않은 것입니다. 하지만 이러한 융합에 병적으로 집착하는 이도 있습니다. 이들은 자의로 매개체가 되어, 베헤모스라는 집합체에 정신이 서서히 흡수됩니다."
 job_transference_volunteer_effect_desc: "\n£job_transference_volunteer£ [GetTransferenceVolunteerDrone](은)는 £unity£ §Y통합§!을 생산하고, 행성의 $r_stability$를 증가시키며, §Y함선§!을 강화합니다.\n이 직업에 종사하는 팝의 §Y10%§!는 6개월마다 §Y전이§!됩니다. 전이된 팝은 사망하지만, 그 대신 해당 지구의 자원 생산량이 늘어납니다.\n\n§G전이된 팝§!: [num_tranferred_pops]"
 mod_job_transference_drone_add: "[GetTransferenceVolunteerDrone] 직업"
 job_transference_drone: "전이 드론"
 job_transference_drone_plural: "$job_transference_drone$"
 job_transference_drone_desc: "정신 연결을 통해 야수와 영속적인 연결을 구축하는 데 성공했지만, 전이에는 많은 시간이 필요합니다. 마땅한 조치를 취하지 않으면 양쪽의 정신이 붕괴해 모든 것이 물거품으로 돌아갈 수 있습니다."
 MESSAGE_POPS_TRANSFERRED_TITLE: "인구 전이 완료"
 MESSAGE_POPS_TRANSFERRED_DESC: "$VALUE|Y$팝이 전이되었습니다. 이제 이들의 정신은 야수 안에서 살아갑니다."
 #Crisis Events
 biocrisis.50.name: "1단계: 배아 실험"
 biocrisis.50.desc: "우리는 생체 함선과 공생하며 살아가지만, 지금까지 무언가 중요한 것을 놓치고 있었습니다...\n\n그 거대한 공허 태생체들로부터 받은 영감을 바탕으로, 우리는 우리 역사상 가장 원대한 과업을 시작하고자 합니다. 그것은 바로 역대 가장 큰 생체 함선을 탄생시키는 일입니다. 이 '베헤모스'는 맹목적 진화가 아니라 분명한 목적을 위해 만들어 낸 새로운 최상위 생명체가 될 것입니다.\n\n이를 위해 첫 번째로 넘어야 할 과제는 전례 없는 크기의 생명체를 생성하는 데 적합한 거대한 알을 만드는 것입니다. 알에는 영양분을 주입할 뿐만 아니라, 알이 주변의 빛과 열을 흡수하고 가스를 정제해 추가적인 영양분을 보충할 수 있도록 조치해야 합니다."
 biocrisis.50.a: "별들을 가릴 만큼 거대한 야수를 만듭시다."
 biocrisis.55.name: "2단계: 자기실현"
 biocrisis.55.desc: "여러 건설선이 거대 가스 행성의 궤도에 수정란과 껍질을 분주히 조립하는 동안, 식품 산업에서는 베헤모스 알의 난백 부분에 필요한 영양분을 가공했습니다. 그런데 제대로 된 수정 난황을 만드는 일이 생각보다 훨씬 까다로웠습니다.\n\n생체 함선과 우주 동물로부터 얻은 막대한 양의 생체 물질을 전부 투입한 후에야 제대로 된 DNA 기초를 안정화할 수 있었고, 뒤이어 이 DNA를 최첨단 수정 세포 안에 밀봉해 두었습니다. 이후 미시 수준에서 진행한 시험 또한 성공을 거두었습니다. 이제 본격적으로 작업을 진행할 준비가 되었습니다. 실로 어마어마한 규모의 사업이 곧 시작됩니다. 이제 남은 일은 이 초거대 알을 수정시키는 것뿐입니다.\n\n머지않아 이 은하계가 지금껏 보지 못한 규모의 생명체가 부화할 것입니다!"
 biocrisis.55.a: "진화의 정점이 가까워지고 있습니다."
 biocrisis.60.name: "오만과 굶주림"
 biocrisis.60.desc: "우리의 유전자 기술은 비교를 불허하며, 우리가 이룬 성과는 은하계의 다른 하등한 제국을 가릴 만큼 찬란하게 빛납니다.\n\n그러나 우리가 만든 베헤모스는 아직 우리의 방대한 지배력을 받아들이지 않고 있습니다. 본능적인 식욕에 이끌리는 이 짐승의 허기는 우리가 아무리 막대한 양의 먹이를 주어도 좀체 가라앉지 않습니다. 때가 되면 정신을 차리고 우리의 지시에 따르겠지만, 시간이 얼마 없습니다. 녀석이 언제 통제를 벗어나 수십억의 목숨을 위협할지 모릅니다."
 biocrisis.60.a: "반드시 길이 있을 겁니다."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3: "뇌 연결 시험"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3_DESC: "현재 우리의 의식을 베헤모스의 신경계와 원격 연결하는 신경 공학 실험을 진행 중입니다. 현재로서는 이것이 야수를 길들이는 유일한 방법으로 판단됩니다."
 biocrisis.15.name: "시냅스의 향연"
 biocrisis.15.desc: "최첨단 신경 공학의 힘을 빌려 우리가 키워 낸 거대 괴수와의 소통 장벽을 극복하는 방법을 마침내 찾아냈습니다. 우리 정신을 야수와 직접 연결하는 것이 유일한 방법입니다. 한 개인의 정신이 아니라, 우리 종족 전체의 정신을 하나로 모아 연결해야 합니다. 게다가 너무 빨리 진행할 경우, 베헤모스의 신경계에 과부하가 걸릴 위험이 있습니다. 극도의 주의가 필요합니다."
 biocrisis.15.a: "생물학적 완성에 이르려면 큰 대가가 따르는 법이죠."
 biocrisis.65.name: "4단계: 야성의 체화"
 biocrisis.65.desc: "베헤모스와 정신을 연결한다는 이론을 세우기는 했지만, 연결에 필요한 준비 작업이 어마어마할 것으로 예상됩니다. 우선 우리 수도에 주 연결 허브를 설치할 계획입니다. 이 허브를 통해 우리가 야수와 하나가 되는 동안 주민들에 대한 처리 과정을 진행할 수 있을 것입니다.\n\n또한 최근 이룩한 과학 기술의 발전을 이용하면, 가까운 시일 내에 변이 실험 프로젝트를 진행해 우리의 피조물을 더욱 강화할 수 있을 것입니다."
 biocrisis.65.a: "우리는 하나가 될 겁니다."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4: "정신의 융합"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC: "베헤모스의 의식은 우리가 예상했던 것보다 훨씬 방대하고 복잡합니다. 이번 일로 한 개인의 의식으로는 야수와 결합하는 데 부족하다는 것을 깨달았습니다. 우리의 정신은 다른 종족보다 우월하지만, 베헤모스와 같은 육체에 들어가도록 만들어지지는 않았기 때문입니다.\n\n일단 우리 전 국민의 개별 의식을 베헤모스와 연결하는 작업이 필요합니다. 처음에는 연결이 미약하겠지만, 곧 의식의 격류가 흘러 베헤모스의 불같은 분노를 길들일 수 있을 것입니다."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_HIVE: "군체 내부에는 어떠한 이탈도 있을 수 없습니다. 그러니 과거 어느 때보다 더 많은 집중을 기울여야 합니다. 드론 하나만으로는 베헤모스와 우리 사이의 연결을 감당할 수 없습니다. 따라서 우리 집단의식 전체가 야수의 의식에 들어가야 합니다.\n\n그 과정에서 우리의 존재 또한 틀림없이 변할 것입니다. 우리의 의식은 하나로 합쳐져 단일한 존재가 되겠지요. 가늠하기 힘들 정도로 막막한 개념이라 이해조차 하기 힘들지만, 걱정할 필요는 없습니다. 조금 있으면 우리는 은하계에서 가장 강력한 존재가 될 테니까요!"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_MACHINE: "생체 함선 안에서 살아간다는 생각에는 예나 지금이나 꺼림칙한 구석이 있습니다. 우리는 대대로 금속 신체를 지닌 드론들을 통해 형성되어 왔습니다. 우리보다 앞서 존재했던 이들은 우리가 지금 걷고 있는 이 길을 생각조차 하지 못했을 것입니다. 그럼에도 우리는 우리의 기계 골격을 버리고 살아 있는 야수 안으로 들어갈 것입니다.\n\n살덩이와 융합된 존재도 여전히 기계라 부를 수 있을까요? 그 답은 너무나도 명백한 <<오류: 찾을 수 없음>>입니다.\n\n논리적인 결론은 단 하나, 유기체들이 그러하듯 불확실성을 받아들여야 앞으로 나아갈 수 있다는 것뿐입니다. 베헤모스의 몸 안에서 우리는 답을 찾을 것입니다. 야수와 결합해 하나가 될 것입니다. 우리 제국의 최우선 목표는 지금까지 생존이었습니다. 그러나 이제부터는 생존을 넘어 번성할 것입니다."
 biocrisis.20.name: "야수와의 합일"
 biocrisis.20.desc: "성공입니다! 정말로 성공을 거두었습니다! 베헤모스와 연결을 구축했고, 현재는 의식을 1차로 전이하는 작업을 진행하면서 연결을 강화하는 중입니다. 야수는 마땅히 우리 것이라고 자부할 수 있는 이 드넓은 우주 공간에서 얌전히 우리를 맞이하고 있습니다. 이 연결을 통해 우리가 통제하는 모든 야수의 영혼이 느껴지며, 그 정신 깊은 곳에서 우리 인구 전체가 베헤모스의 어마어마한 규모를 체감하고 있습니다.\n\n우리는 의심의 여지 없이 은하계에서 가장 위력적이고 거침없는 힘을 갖추게 될 것입니다. 이 새로운 형체를 통해, 우리는 두려움에 떠는 적에게 우리의 분노를 퍼부을 것입니다. 은하계는 이제 우리 차지입니다!"
 biocrisis.20.a: "포식을 시작합시다!"
 biocrisis.70.name: "5단계: 무지막지한 식욕"
 biocrisis.70.desc: "주민들의 의식을 충분히 이전해, 이제 베헤모스와 그 육신을 직접 조종할 수 있게 되었습니다. 야수는 계속 성장 중이며, 그 유전적 잠재력 또한 대부분 발휘되지 않은 상황입니다. 앞으로 많은 의식과 영양분을 꾸준히 공급해야 능력을 일깨울 수 있습니다. 우리 신경에 원초적 격노가 흐르고, 피에 대한 갈망이 끝없이 솟구칩니다. 지금 당장 포식해야 합니다. 집어삼켜야 합니다. 은하계를 먹어 치워야 합니다.\n\n허물을 벗듯 문명의 구속을 벗어던집시다. 이제 우리에게 중요한 것은 이 우주 공간에서의 삶뿐입니다."
 biocrisis.70.a: "우리한테 당할 자는 이제 없습니다."
 biocrisis.105.name: "야수의 고통"
 biocrisis.105.desc: "우리 야수 하나가 사망했습니다. 나약한 개체가 적자생존의 법칙에 따라 자연스레 도태된 결과입니다. 전투에서 제 몫을 다하지 못하고 죽었으니 딱히 안타깝진 않지만, 남은 베헤모스가 같은 운명을 맞지 않도록 노력을 기울여야 합니다. 베헤모스 무리의 생존력을 개선하지 않는다면 우리도 멸망할 것입니다."
 biocrisis.105.a: "이번 죽음을 교훈 삼읍시다."
 biocrisis.105.b: "유감스러운 희생이군요."
 biocrisis.130.name: "별 사이에 야수가"
 biocrisis.130.desc: "여러 역경에도 불구하고 베헤모스를 고치에서 길러내는 데 성공했습니다.\n\n녀석은 누구보다 크고, 사납고, 굶주려 있으며, 이제는 먹이를 찾아 우주 공간을 떠돌고 있습니다.\n\n이 야수는 베헤모스 무리의 정점으로서 감히 그 앞을 막는 모든 존재에게 말로 표현할 수 없을 정도로 끔찍한 파멸을 선사할 것입니다."
 biocrisis.130.a: "우리가 또다시 자연의 한계를 뛰어넘었군요."
 biocrisis.150.name: "도전에 대한 응전"
 biocrisis.150.desc: "결국 우리의 승격을 막으려 하는 자가 나타났습니다. [event_target:voidspawn_spawn_location.GetName] 성계에서 계산이 불가능할 정도의 질량이 감지되었습니다. 그 정체는 바로 공허 태생체로 밝혀졌습니다. 단순히 존재만으로도 필멸자가 야심 차게 건설한 가장 강대한 건축물마저 왜소하게 만들어 버리는 고대의 괴물 말입니다.\n\n도저히 이 세상 것이라고 볼 수 없는 그 형체는 기존의 이해 범위를 벗어나 있으며, 마치 항성들마저도 괴물의 접근이 두려운 듯 불길한 황혼이 은하계에 드리웁니다.\n\n공허 태생체의 움직임을 보니, 녀석의 의도가 무엇인지 한눈에 알 수 있습니다. 녀석은 우리와 베헤모스의 신체를, 그리고 감히 육신을 초월해 공허 그 자체에 대한 지배권을 주장한 우리 집단의식을 노리고 있습니다. 이 싸움은 단순한 물질적 힘의 충돌이 아닙니다. 우리의 현존에 대한 시험입니다. 우리의 새로운 형태가 시험대에 오른 것입니다.\n\n지금 싸움에 응한다면 목숨을 보장하기 어렵습니다. 지금은 몸을 피하고, 우리의 송곳니가 뚫을 수 없는 적을 뚫을 정도로 날카로워질 때까지 힘을 키워야 합니다."
 biocrisis.150.desc.b: "$biocrisis.150.desc$"
 biocrisis.150.a: "놈에게서 도망칠 수는 있어도 숨을 수는 없습니다."
 biocrisis.155.desc: "긴급한 메시지입니다. 불가해할 정도의 힘을 지닌 존재인 §Y$NAME_Boss_Voidspawn$§!가 우주 공간 깊은 곳으로부터 모습을 드러냈습니다. 유한한 육체를 초월해 야수와 하나가 된 제국, [event_target:behemoth_empire.GetName]에 이끌린 것입니다. 서로 상극인 이 초거대 생물들이 은하 전체를 위협하고 있습니다.\n\n베헤모스가 패할 경우, 공허 태생체가 잠잠해질지도 모릅니다. 반대로 공허 태생체가 패할 경우, 베헤모스가 지닌 힘으로 인해 은하계의 세력 균형이 변할 것입니다. 단단히 대비하십시오. 지금 내리는 선택이 앞으로 영겁의 세월을 좌우하게 될지도 모릅니다."
 biocrisis.155.a: "이 일을 어떻게 막을 수 있죠?"
 biocrisis.155.b: "우리를 구해 줄 이는 없을까요?"
 biocrisis.155.c: "어쩌다 이렇게 된 겁니까?"
 biocrisis.155.d: "그럼 우린 뭘 할 수 있죠?"
 biocrisis.156.desc: "오해를 하고 있군요. 막는다는 것은 그럴 시간이 있을 때 의미가 있는 것입니다. 지금 우리에게 시간은 사치일 뿐입니다.\n\n야수가 이미 당도했습니다. 저희 조직은 과거부터 여러 재앙을 버텨 냈지만, 단도직입적으로 말하겠습니다. 지금 은하계는 극도로 위급한 상황에 처해 있습니다."
 biocrisis.157.desc: "그런 질문을 하는 것도 이해는 합니다. 순진한 생각이지만, 이해는 하죠. 지혜가 있으면 납득도 쉬운 법. 아무도 우리를 구하러 오지 않을 겁니다.\n\n저희 조직은 규모가 워낙 작은 탓에 도저히 손쓸 여력이 없었습니다. 하지만 당신들은 이 일을 막을 조치를 더 빨리 취할 수도 있었죠. 당신들이 [event_target:behemoth_empire.GetName]에 패배한다면, 은하계가 무너지는 것을 당신들 탓으로 돌리지 않도록 애써 보겠습니다."
 biocrisis.158.desc: "모름지기 제국이란 자기가 감당할 수준을 넘어서는 경향이 있습니다. 특히 [event_target:behemoth_empire.GetName]의 경우 신중함 대신 야심을, 지혜 대신 오만을 택했지요.\n\n자신들이 이해하지도 못할 힘을 휘둘렀으며, 자신들의 신체를 스스로 통제하지 못할 형태로 밀어 넣었습니다. 그럼으로써 우리 모두 파멸의 위기에 처하게 된 것입니다."
 biocrisis.159.desc: "당신들의 전투 능력을 일차적으로 분석했지만, 싸워 봤자 좋게 끝날 것 같진 않습니다. 당신들의 함대 역량을 볼 때, 도주하더라도 결과는 마찬가지일 겁니다. 뭘 하든 지금 상황은 피할 수 없습니다.\n\n가공할 힘을 지닌 두 야수가 우주를 가로지르는 전투에 돌입할 채비를 갖추고 있습니다. 그래도 운이 좋다면 놈들보다 오래 살아남을 수 있을지도 모릅니다.\n\n생각이 있으시다면 이번 과오에서 배우는 게 있으실 겁니다. 하지만 이것만은 알아 두시죠. 전투가 끝나면 은하계는 바뀔 겁니다. 끝까지 살아남아 그 모습을 목격할 자가 과연 있을지는 완전히 다른 문제지만 말입니다.\n\n... 혹시라도 은하계를 구할 생각이라면 베헤모스만 쓰러뜨리시죠. 그러면 공허 태생체는 사냥을 멈출 겁니다."
 biocrisis.162.name: "방해 금지"
 biocrisis.162.desc: "$NAME_Boss_Voidspawn$가 우리 영역에 진입했습니다. 이 고대의 존재는 불멸이자 무적의 존재로 알려져 있습니다. 녀석의 눈은 외계의 지성으로 번뜩이며, 그 몸뚱이는 마치 영겁의 무게를 짊어진 듯 파도치며 움직입니다.\n\n우리 [species.GetEyeNamePlural]에 파편화된 신호가 물밀듯 들어옵니다. 혼돈, 왜곡, 그리고 깊디깊은 우주의 공포가 우리 안에서 메아리칩니다.\n\n우리로서는 이 야수를 당해 낼 재간이 없습니다. 하지만 녀석이 사냥감을 죽이도록 도와준다면 난동을 잠재울 수 있을지도 모릅니다. §Y베헤모스§!를 찾아 쓰러뜨리는 것만이 살아남을 수 있는 유일한 방법입니다."
 biocrisis.162.a: "무슨 수를 써서든 저 괴물을 피하세요!"
 biocrisis.175.name: "태생체 사망"
 biocrisis.175.desc: "공허 태생체는 이제 없습니다. 항성마저 왜소하게 만들던 그 거대한 괴물이 쓰러졌습니다. 이 세상 것 같지 않던 그 형체의 잔해가 우주 공간을 부유하며 천천히 흩어져 무로 돌아가고 있습니다.\n\n어떤 제국이 우리는 상상조차 하지 못할 화력과 조직력을 선보인 결과입니다. 은하계는 예전의 은하계가 아닌 듯합니다. 세력의 균형이, 그리고 그 안에 있는 우리의 지위가 바뀌었습니다.\n\n이 야수를 쓰러뜨린 자들의 동기는 무엇이었을까요? 무력을 과시해서 자신들에게 반대하는 자들에게 메시지를 보낸 것일까요, 아니면 이번 일은 앞으로 일어날 더 끔찍한 일의 전조에 불과한 것일까요?"
 biocrisis.175.desc.kaiju: "이 은하계에 $NAME_Boss_Voidspawn$를 없앨 능력이 있는 세력이 있다면, 그 존재에게는 우리를 없앨 능력도 있다는 뜻입니다. 우리는 죽어 버린 태생체와 그리 다르지 않으니 말입니다.\n\n그 고대의 육신을 찢어발긴 화력이 언젠가 우리를 향할지도 모르는 일입니다. 은하계는 변했으며, 우리도 그에 맞춰 변해야 합니다.\n\n맹목적인 분노만으로는 생존을 보장할 수 없습니다. 우주 공간은 한 최고 포식자의 죽음을 목도했습니다. 그리고 또 하나의 죽음이 잇따를지도 모릅니다."
 biocrisis.175.a: "주의해서 진행해야겠군요."
 biocrisis.180.name: "공허 학살자"
 biocrisis.180.desc: "장로 공허 태생체가 무적이라는 소문은 결국 신화에 불과했던 것으로 드러났습니다. 그리고 그 신화는 우리 함대의 힘 앞에 무너졌습니다. 이제 이 고대의 위협은 해결되었으니, 은하계는 다시금 편히 숨 쉴 수 있을 것입니다."
 biocrisis.180.desc.kaiju: "$NAME_Boss_Voidspawn$는 죽었지만, 그 시체는 남아 있는 에너지로 맥동하고 있습니다. 이 강력한 고대의 존재는 우리에게 순수한 잠재력을 부여하는 성찬이 될 것입니다.\n\n이 야수의 힘줄과 골수를 섭취해, 그 외계의 정수를 우리와 합칠 것입니다. 막강했던 공허 태생체의 힘을 이제 우리가 휘두르는 것입니다."
 biocrisis.180.a: "그 어떠한 야수도 우리를 사냥할 순 없습니다."
 biocrisis.180.b: "잔치는 이제 시작일 뿐."
 biocrisis.185.name: "두 개의 태양은 없는 법"
 biocrisis.185.desc: "공허 어딘가에서 우리 말고도 초월을 시도하는 자들이 또 있다는 끔찍한 사실이 드러났습니다. 또 하나의 베헤모스가 나타나 똑같이 끔찍한 위용을 떨치며 우리의 완벽한 모습을 모방하려 하고 있습니다. 가만히 두고만 볼 수 없습니다.\n\n최상위 포식자는 하나로 충분합니다. 협상의 여지는 없습니다. 집어삼킬 육신만 있을 뿐. 사냥이 시작되었습니다."
 biocrisis.185.a: "녀석의 심장을 먹어 치웁시다!"
 biocrisis.187.name: "IV 등급 베헤모스 경고"
 biocrisis.187.desc: "공허 깊숙한 곳에서 무언가 꿈틀거리고 있습니다.\n\n우주 어딘가에서 한 제국이 끔찍한 변화의 막바지에 이르렀으며, 무지막지한 베헤모스를 성장시켜 단순한 무기가 아닌 그릇으로 활용하려고 합니다. 이 제국은 지배가 아닌 통합을 추구합니다. 정신과 육체의, 그리고 제국과 공포의 통합 말입니다.\n\n통합에 성공하면 이들 국가는 끝없는 굶주림에 찬 단일한 존재가 될 것입니다.\n\n가만히 두고만 볼 수 없습니다. 지금 당장 저지하지 않으면 돌이킬 수 없는 일이 일어날지도 모릅니다."
 biocrisis.187.a: "그 야수를 사냥하세요!"
 biocrisis.190.name: "최상위 공허 생물"
 biocrisis.190.desc: "골칫거리가 모두 해결되었습니다. 참칭자도, 도전자도, 절박하게 맞서던 하등 생물도 모두 처리했습니다. 우리가 진정한 존재로 거듭날 순간을 앞두자 온 우주가 떨고 있습니다.\n\n우리는 이제 선조에게서 물려받은 나약한 형태를 벗어던질 것입니다. 행성은 우리를 가두는 감옥이고 제국은 덧없는 개념일 뿐입니다. 개성이라는 허상도 곧 베헤모스의 완벽한 대통합에 소멸될 것입니다. 정신과 공포가, 지성과 굶주림이 하나가 될 것입니다.\n\n전이가 거의 마무리되었습니다. 이 과정이 완료되면 우리는 더 이상 단순히 존재하는 데 그치지 않을 것입니다.\n\n우리는 번성할 것입니다."
 biocrisis.190.a: "전이를 완료합시다!"
 biocrisis.190.tt: "우리 제국이 30일 후에 게임에서 승리합니다"
 biocrisis.190.b: "잠깐, 아직 준비가 끝나지 않았습니다."
 biocrisis.190.b.tt: "현재 제국으로 계속 플레이합니다."
 BEHEMOTH_TRANSFERENCE_PROJECT: "전이 완료"
 BEHEMOTH_TRANSFERENCE_PROJECT_DESC: "우리는 베헤모스와 충분히 교감해 왔습니다. 전이의 준비가 끝났고, 이제 명령만 내리면 됩니다. 이제 우리는 승격의 문턱에 서 있으며, 행성에 얽매인 우리 제국의 초라한 잿더미를 버리고 육신과 중력의 사슬을 벗어 던질 준비가 되어 있습니다."
 biocrisis.191.name: "베헤모스 승리"
 biocrisis.191.desc: "융합이 완료되었습니다!\n\n우리는 하등 생물의 한계에서 벗어나 새로운 존재가 되었습니다. 정신과 굶주림으로 엮여 공허를 아우르는 거대한 의지가 된 것입니다.\n\n이제 은하계는 우리 발밑에 있으며, 언제라도 부술 수 있는 덧없는 개념에 지나지 않습니다. 하지만 우리는 이제 지배에 연연하지 않습니다. 우리는 자유로운 존재로서 이곳에 남아도 좋고, 여길 떠나거나 사냥할 수도 있습니다.\n\n영원한 존재가 되었으니, 앞으로 어떻게 하면 좋을까요?"
 biocrisis.191.a: "지금은... 이 은하계에 남읍시다."
 biocrisis.191.a.tt: "베헤모스가 야생 생명체로 남으며 더 이상 플레이할 수 없게 됩니다."
 biocrisis.191.b: "떠납시다. 공허가 앞으로 나아가라고 손짓하는군요."
 biocrisis.191.b.tt: "베헤모스 제국이 은하계에서 사라지고 더 이상 플레이할 수 없게 됩니다."
 biocrisis.191.c: "소위 사냥꾼이라는 작자들에게 진정한 공포를 알려 줍시다."
 biocrisis.192.name: "멈출 수 없는 공포"
 biocrisis.192.desc: "이제 다 끝입니다. [behemoth_winner.GetName](이)가 육신과 제국의 한계, 아니, 문명이라 할 수 있는 모든 것의 한계를 초월했습니다. 국가가 아닌 우주의 강력한 힘 자체가 된 것입니다.\n\n행성이 무너지고 함대가 불탑니다. 한때 위용을 떨치던 자들은 은하계 곳곳으로 도망가, 공허 속의 잔불처럼 흩어지고 말았습니다. 이제 외교도, 호소도, 저항도 없습니다.\n\n더 이상의 싸움은 생존을 위한 것이 아닙니다. 단지 멸망을 늦출 뿐입니다. 종말이 다가왔습니다."
 biocrisis.192.tt: "[behemoth_winner.GetName]의 승리가 임박했습니다"
 biocrisis.196.name: "통째로 삼켜지다"
 biocrisis.196.desc: "몇 년 전, 베헤모스와 그 동족이 우리 은하계를 떠났습니다. 우리는 안도의 한숨을 내쉬며, 우리를 종말로 몰고 갈 수도 있었던 그 야수가 캄캄한 공허로 사라지는 모습을 지켜보았습니다. 그러고는... 아무것도 없었습니다. 수십만 광년을 넘어 이동한 베헤모스가 흔적도 없이 사라진 것입니다. 방사선도, 잔상도, 중력의 파문조차 일지 않았습니다. 마치 처음부터 존재하지 않았던 것처럼 말입니다."
 biocrisis.196.a: "반드시 진상을 알아내야 합니다."
 UNSETTLING: "불안하군요."
 biocrisis.197.name: "사냥꾼은 누가 사냥하는가"
 biocrisis.197.desc: "수년이 지났지만, 여전히 베헤모스의 운명은 베일에 싸여 있습니다. 초공간 항로로는 녀석이 있는 곳으로 갈 수 없었기에, 우리는 이론과 반쯤 미친 과학에 기대어 그 야수가 최후에 어떻게 되었는지 추측할 수밖에 없었습니다.\n\n베헤모스는 두려움의 기색조차 없이 그저 날아갈 뿐이었습니다. 그러다 어느 순간 뒤틀린 천처럼 안으로 소용돌이치며 형태가 일그러지더니 사라져 버렸습니다. 아무런 저항도, 흔적도 없이 말입니다.\n\n이에 다양한 가설이 제기되었습니다. 새로운 형태의 초광속 이동을 한 걸까요? 심우주의 균열이나 이상 현상에 숨은 걸까요? 아니면 더 섬뜩한 추측이지만 외부의 힘에 의해 존재 자체가 안쪽으로 붕괴해 소멸됐을 가능성도 있습니다. 진실이 무엇이든 우리로서는 알 수 없습니다... 어쩌면 우리의 이해를 벗어난 걸지도 모릅니다."
 biocrisis.197.a: "차라리 잊고 넘어가는 게 나을 수도 있습니다."
 biocrisis.197.b: "포획한 프레소린들이 불안에 떠는군요."
 biocrisis.265.name: "고통의 단말마"
 biocrisis.265.desc: "베헤모스가 내지르는 고통의 단말마는 도저히 견디기 힘들 정도였습니다. 우리 중 너무나 많은 부분이 괴물 안에 있습니다. 괴물의 의식이 메아리처럼 옅어지자, 우리도 의식을 잃습니다."
 biocrisis.265.a: "!! - ... "
 biocrisis.520.name: "텅 빈 괴수"
 biocrisis.520.desc: "베헤모스가 죽었습니다.\n\n공허에 떠다니는 녀석의 거대한 시체를 보니, 우리의 위대한 승리와 우리 지식의 한계를 돌아보게 됩니다. [Root.GetScientistPluralCapital]들은 베헤모스의 불가사의한 정신에 담긴 수수께끼를 풀기 위해 녀석의 시체에 벌떼처럼 달려들었지만, 안타깝게도 기계나 강령술을 써도 녀석을 되살릴 수 없었습니다. 절박한 마음에 심지어 기도도 외워 봤지만 소용이 없었습니다.\n\n이윽고 그 이유가 밝혀졌습니다. 베헤모스의 뇌는 보통 뇌와는 달리 세포망이 아닌 유기물 초전도체가 격자 구조로 이루어졌기 때문입니다. 그 구조는 인공, 생물, 비전에 관한 지식을 모두 동원해도 재현할 수 없을 정도로 복잡하게 뒤얽혀 있습니다. 베헤모스가 죽자 녀석의 신경계는 손쓸 수 없을 정도로 망가진 회로처럼 무너졌습니다. 안타깝게도 그 어떠한 기술이나 의지나 힘으로도 복원할 수 없습니다.\n\n은하계 제일의 정신이 영원한 침묵에 빠진 것입니다."
 biocrisis.520.a: "아무것도 남지 않았군요."
 biocrisis.520.b: "신도 죽는 법이군요."
 BEHEMOTH_MUTATION_PROJECT: "$menp_behemoth_mutation_research$"
 BEHEMOTH_MUTATION_PROJECT_DESC: "최근에 베헤모스 유전학에서 거둔 획기적인 성과를 확대하면, 이론적으로 우리의 피조물을 더욱 변이시킬 수 있습니다. 유전적 안정성이 우려되기는 하지만, 시간과 자원만 투입한다면 분명히 더 많은 생체 강화를 실현할 수 있을 것입니다."
 BEHEMOTH_FATE_PROJECT: "베헤모스의 운명"
 BEHEMOTH_FATE_PROJECT_DESC: "우리 은하를 떠난 베헤모스는 공허를 떠돌다 그대로 사라졌습니다. 이 수수께끼를 파헤쳐 볼 순 있겠지만, 현장이 너무도 멀리 있는 탓에 기존 방식은 사용할 수 없습니다. 그 해답은 공허만큼이나 모호할 겁니다."
 behemoth_mutation_a: "$menp_behemoth_mutation_research$: 공격"
 behemoth_mutation_a_tt: "베헤모스 $MOD_SHIP_FIRE_RATE_MULT$: §G+$@behemoth_mutation_a_fire_rate_mult|0%$§!\n베헤모스 $MOD_SHIP_ARMOR_MULT$: §R$@behemoth_mutation_a_armor_mult|0%$§!\n베헤모스 $MOD_SHIP_SPEED_MULT$: §R$@behemoth_mutation_a_speed_mult|0%$§!"
 behemoth_mutation_a_desc: "근육을 비대하게 키우면, 더 치명적인 공격을 가할 수 있습니다."
 behemoth_mutation_b: "$menp_behemoth_mutation_research$: 절제"
 behemoth_mutation_b_desc: "우리의 우주 생명체에 방사선 영양 유전자를 주입하면, 생존에 필요한 에너지의 양을 급격하게 줄일 수 있습니다."
 behemoth_mutation_c: "$menp_behemoth_mutation_research$: 민첩"
 behemoth_mutation_c_tt: "베헤모스 $MOD_SHIP_SPEED_MULT$: §G+$@behemoth_mutation_c_speed_mult|0%$§!\n베헤모스 $MOD_SHIP_EVASION_MULT$: §G+$@behemoth_mutation_c_evasion_mult|0%$§!"
 behemoth_mutation_c_desc: "더욱 강력한 아공간 분비샘을 갖춰, 베헤모스가 보다 날렵하게 움직이게 합니다."
 behemoth_mutation_bio: "$menp_behemoth_mutation_research$: 정밀"
 behemoth_mutation_bio_tt: "베헤모스 $MOD_SHIP_WEAPON_RANGE_MULT$: §G+$@behemoth_mutation_bio_weapon_range_mult|0%$§!\n베헤모스 $MOD_SHIP_ACCURACY_MULT$: §G+$@behemoth_mutation_bio_accuracy_mult|0%$§!"
 behemoth_mutation_bio_desc: "안구의 수를 늘려, 엄청난 거리에서 매우 정밀한 사격을 가할 수 있게 합니다."
 behemoth_mutation_synth: "$menp_behemoth_mutation_research$: 회복력"
 behemoth_mutation_synth_tt: "베헤모스 $MOD_SHIP_ARMOR_MULT$: §G+$@behemoth_mutation_synth_armor_mult|0%$§!\n베헤모스 $MOD_SHIP_ARMOR_REGEN_ADD_PERC$: §G+$@behemoth_mutation_synth_armor_regen_add_perc|0%$§!"
 behemoth_mutation_synth_desc: "합금과 키틴질을 섞어, 필수 장기를 안전하게 지켜 줄 여러 개의 갑각층을 형성합니다."
 behemoth_mutation_corpo: "베헤모스 상업"
 behemoth_mutation_corpo_tt: "월간 거래: 베헤모스당 §G+$@behemoth_mutation_corpo_trade_produces_mult|0%$§!"
 behemoth_mutation_corpo_desc: "우리 주주들이 베헤모스 프로젝트를 다소 우려하는 모습을 보였지만, 배당금이 늘어나자 다들 마음을 돌렸습니다."
 behemoth_mutation_psi: "$menp_behemoth_mutation_research$: 장벽"
 behemoth_mutation_psi_tt: "베헤모스 $MOD_SHIP_SHIELD_REGEN_ADD_PERC$: $pop_group_unit$ £job_telepath£ $job_telepath_plural$ 또는 $job_transference_volunteer$당 §G+$@behemoth_mutation_psi_shield_regen_add_perc|0%$§!\n베헤모스 $MOD_SHIP_SHIELD_HARDENING_ADD$: $pop_group_unit$ £job_telepath£ $job_telepath_plural$ 또는 $job_transference_volunteer$당 §G+$@behemoth_mutation_psi_shield_hardening_add|0%$§!\n현재 고용한 100 £job_telepath£ $job_telepath_plural$ 및 $job_transference_volunteer$ 수: §Y[GetNumTelepathsAndTransference]§!"
 behemoth_mutation_psi_desc: "베헤모스는 장막에 연결되어 있지 않지만, 우리는 녀석들이 우리 텔레파시를 어느 정도 수신해 방어용 사이오닉 장벽을 사용할 수 있도록 육성했습니다."
 behemoth_mutation_psi_2: "$menp_behemoth_mutation_research$: 사이오닉"
 behemoth_mutation_psi_2_desc: "오 야수여, 우리의 힘을 취하라!"
 behemoth_mutation_cyber: "$menp_behemoth_mutation_research$: 사이버네틱"
 behemoth_mutation_cyber_desc: "베헤모스의 격렬한 힘을 활용하기 위해 지금껏 존재하지 않았던 최첨단 사이버웨어를 개발합니다."
 behemoth_cyber_rage: "$BLANK_STRING$"
 edict_behemoth_nanite_augmentation: "베헤모스 증강: 나노봇"
 edict_behemoth_nanite_augmentation_desc: "베헤모스 외피에 나노봇을 주입해, 아무리 심한 피해를 받아도 순식간에 회복할 수 있게 합니다."
 behemoth_nanite_augmentation_tt: "베헤모스 $MOD_SHIP_ARMOR_REGEN_ADD_PERC$: §G+$@behemoth_edict_armor_regen_add_perc|0%$§!"
 edict_behemoth_living_metal_augmentation: "베헤모스 증강: 생체 금속"
 edict_behemoth_living_metal_augmentation_desc: "키틴질층 사이에 생체 금속을 넣어, 삭마 특성이 강화된 반응형 장갑을 형성합니다."
 behemoth_living_metal_augmentation_tt: "베헤모스 $MOD_SHIP_ARMOR_HARDENING_ADD$: §G+$@behemoth_edict_armor_hardening_add|0%$§!"
 edict_behemoth_alloys_augmentation: "베헤모스 증강: 합금"
 edict_behemoth_alloys_augmentation_desc: "합금판을 갑각에 박아 넣습니다. 단순하지만 효율적이죠."
 behemoth_alloys_augmentation_tt: "베헤모스 $MOD_SHIP_ARMOR_MULT$: §G+$@behemoth_edict_armor_mult|0%$§!"
 concept_edict_behemoth_nanite_augmentation: "$edict_behemoth_nanite_augmentation$"
 concept_edict_behemoth_living_metal_augmentation: "$edict_behemoth_living_metal_augmentation$"
 concept_edict_behemoth_alloys_augmentation: "$edict_behemoth_alloys_augmentation$"
 biocrisis.280.name: "$menp_behemoth_mutation_research$"
 biocrisis.280.desc: "베헤모스를 강화하기 위해 저마다 다른 장점과 능력을 일깨우는 다양한 변이 약물을 개발했습니다. 그러나 베헤모스는 방대한 생체 구조로 인해 단 하나의 약물만 주입받을 수 있습니다. 또한, 서로 다른 약물을 혼합하여 주입했다간 세포 차원에서 재앙적 결과가 나타날 것입니다. 진화와 멸망 사이의 선은 면도날처럼 얇습니다. 어떤 강화를 선택할지 현명하게 결정해야 합설계니다."
 biocrisis.280.a: "더 사납게 만듭시다!"
 biocrisis.280.b: "허기를 덜어 줍시다."
 biocrisis.280.c: "더 빠르게 만듭시다!"
 biocrisis.280.psi: "장막의 힘이 녀석을 지탱해 줄 겁니다."
 biocrisis.280.bio: "살상력을 높입시다!"
 biocrisis.280.cyber: "녀석의 분노를 이용합시다."
 biocrisis.280.cyber.tt: "우리 베헤모스가 §G25%§!의 확률로 격노에 저항합니다.\n격노 중에는 발사 속도 §G+$@behemoth_cyber_rage_fire_rate_mult|0%$§!, 장갑 관통 §G+$@behemoth_cyber_rage_shield_penetration_add|0%$§!, 보호막 관통 §G+$@behemoth_cyber_rage_armor_penetration_add|0%$§!의 효과를 얻습니다."
 biocrisis.280.synth: "절대 뚫을 수 없는 외피를 줍시다."
 biocrisis.280.corp: "다 집어치우고 베헤모스 봉제 인형이나 만드세요."
 biocrisis.280.machine: "육신에 강철을 섞읍시다."
 biocrisis.280.machine_tt: "§Y베헤모스 증강§! 시행령 3개 잠금 해제\n$t$['concept_edict_behemoth_nanite_augmentation']\n$t$['concept_edict_behemoth_living_metal_augmentation']\n$t$['concept_edict_behemoth_alloys_augmentation']"
 #Crisis Objectives
 crisobj_build_bioships_name: "생체 함선 건조"
 crisobj_build_bioships_desc: "생체 함선 육성 기술을 통달한 우리는 이제 육성 공정을 정비하고 확대하고 있습니다. 계속되는 공생은 점차 큰 혜택을 안겨 주어, 우리 함대를 강화하고 살아 숨 쉬는 우주에 대한 우리의 지배력을 공고히 해 줄 것입니다."
 crisobj_breed_fauna_name: "우주 동물 번식"
 crisobj_breed_fauna_desc: "우주 동물 번식 기술을 통달한 우리는 이제 번식 공정을 정비하고 확대하고 있습니다. 계속되는 공생은 점차 큰 혜택을 안겨 주어, 우리 함대를 강화하고 살아 숨 쉬는 우주에 대한 우리의 지배력을 공고히 해줄 것입니다."
 crisobj_kill_bioships_name: "생체 함선 파괴"
 crisobj_kill_bioships_desc: "적의 생체 함선이 우리의 생물학적 패권을 넘보려 합니다. 지금 결단을 내려 적 함대를 파괴해, 우리의 우월성에 대한 위협을 진압해야 합니다."
 crisobj_kill_space_fauna_name: "우주 동물 처치"
 crisobj_kill_space_fauna_desc: "적대적인 우주 동물이 우리의 생물학적 패권을 넘보려 합니다. 지금 결단을 내려 놈들을 파괴해, 우리의 우월성에 대한 위협을 진압해야 합니다."
 crisobj_cap_fauna_name: "우주 동물 포획"
 crisobj_cap_fauna_desc: "길들지 않은 우주 동물이 자연재해처럼 마구 날뛰면서 전에 없던 난관을 초래하고 있습니다. 지금 결단을 내려 이 생물을 생포함으로써, 그 잠재력을 이용해 우리의 우월성을 공고히 해야 합니다."
 crisobj_build_behemoth_egg_name: "베헤모스 알 육성"
 crisobj_build_behemoth_egg_desc: "초거대 수정란을 키우는 일은 행성에 묶인 생명체라는 사소한 존재에서 벗어나 더 높은 경지로 도약하는 중요한 첫걸음이 될 것입니다."
 crisobj_birth_behemoth_name: "베헤모스 부화"
 crisobj_birth_behemoth_desc: "광활한 우주 공간에서 어마어마한 크기의 생명체들이 우리의 주의 깊은 감독하에 형체를 갖추고 있습니다. 우리의 야망과 기술로 태어난 이 베헤모스들은 은하계의 세력 균형을 우리 쪽으로 가져오는 초거대 병력이 될 것입니다."
 crisobj_behemoth_rage_name: "베헤모스의 격노"
 crisobj_behemoth_rage_desc: "별세계에 풀어놓은 우리 베헤모스들이 태고의 분노와 광란에 사로잡혀 지나는 모든 곳을 파괴하고 있습니다. 그 걷잡을 수 없는 격노는 우리의 힘을 보여 주는 증거입니다. 우리의 의지에만 답하고 우리가 원하는 때에 반응하는 자연의 힘 말입니다."
 behemoth_mutation_reward: "변이 선택"
 biocrisis.210.desc.base: "무언가가 꿈틀댑니다. 우리 안의 굶주림은 의식을 갖췄으며 주변에 적응합니다. 무언가가 새로이 자라나 모습을 갖추고, 넘치는 잠재력으로 요동칩니다.\n\n" #Introduction
 biocrisis.210.desc: "$biocrisis.210.desc.base$우리 알은 그야말로 우리 혈통의 생명 줄입니다. 무슨 일이 있어도 지키고 돌봐야 하며, 앞으로 부화할 자손들에게 보탬이 되도록 진화의 방향을 유도해야 합니다." #Egg
 biocrisis.210.a: "알의 성장을 촉진합시다."
 biocrisis.210.a.tt: "$behemoth_fast_egg_tt$\n\n§H정책 잠금 해제§!: $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.b: "태어날 자손들의 역량을 강화합시다."
 biocrisis.210.b.tt: "$behemoth_slow_egg_tt$\n\n§H정책 잠금 해제§!: $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.c: "껍데기를 강화합시다."
 biocrisis.210.c.tt: "$behemoth_strong_egg_tt$"
 biocrisis.215.desc: "$biocrisis.210.desc.base$태양풍을 타고 헤엄치며 우주 공간을 횡단하는 기술을 갖춘 존재는 우주 항행 종족 중에서도 몇 없습니다. 우리의 전술적 강점은 불타는 격노와 막강한 힘이지만, 여기에 기동성도 높인다면 어떨까요?" #Mobility
 biocrisis.215.a: "우주 공간을 횡단합시다."
 biocrisis.215.a.tt: "우리 §Y$behemoth_04$§!가 §Y$BIO_JUMP_DRIVE_1$§!을 획득합니다."
 biocrisis.215.b: "빠르게 쏘고, 더 빠르게 움직이는 겁니다."
 biocrisis.215.b.tt: "$behemoth_turbo_tt$"
 biocrisis.215.c: "반사 신경에 집중합시다."
 biocrisis.215.c.tt: "$behemoth_reflexes_tt$"
 biocrisis.215.d: "어둠 속의 사냥꾼으로 만드세요."
 biocrisis.215.d.tt: "우리 §Y$behemoth_04$§!가 $@cloaking_high_strength|0+$ $MOD_SHIP_CLOAKING_STRENGTH_ADD$를 획득합니다."
 biocrisis.220.desc: "$biocrisis.210.desc.base$우리의 생체 방어력을 강화하면, 적의 지속적인 공격에도 성가신 부상을 입지 않고 오래 버틸 수 있을 것입니다."
 biocrisis.220.a: "피부를 더 두껍게 해 보죠."
 biocrisis.220.a.tt: "우리 §Y$behemoth_04$§!가 $@behemoth_1_hull_add|0+*$ $HITPOINTS$를 획득합니다."
 biocrisis.220.b: "전투 장갑을 더 단단하게 만듭시다."
 biocrisis.220.b.tt: "우리 §Y$behemoth_04$§!가 $@behemoth_1_armor_add|0+*$ $MOD_SHIP_ARMOR_ADD$ 및 $@behemoth_1_armor_hardening_add|%0+$ $MOD_SHIP_ARMOR_HARDENING_ADD$를 획득합니다."
 biocrisis.220.c: "보호막을 강화한다면 아무도 우리를 건들 수 없을 겁니다."
 biocrisis.220.c.tt: "우리 §Y$behemoth_04$§!가 $@behemoth_1_shield_add|0*+$ $MOD_SHIP_SHIELD_ADD$, $@behemoth_1_shield_regen_add_perc|%1+$ $MOD_SHIP_SHIELD_REGEN_ADD_PERC$ 및 $@behemoth_1_shield_hardening_add|%0+$ $MOD_SHIP_SHIELD_HARDENING_ADD$를 획득합니다."
 biocrisis.225.desc: "$biocrisis.210.desc.base$우리는 적극적으로 교전에 뛰어들어 적을 정복하곤 합니다. 그런 우리에게 전투력을 강화할 기회가 생겼습니다."
 biocrisis.225.a: "에너지 출력만 높으면 보호막을 무시할 수 있습니다."
 biocrisis.225.a.tt: "우리 §Y$behemoth_04$§!가 $@behemoth_shield_pen_add|%0+$ $MOD_SHIP_SHIELD_PENETRATION_ADD$을 획득하고 £exotic_gases£ $@behemoth_shield_pen_upkeep|0*-$ 월간 유지비를 얻습니다."
 biocrisis.225.b: "우리 투사체는 아무리 두꺼운 장갑도 관통할 겁니다."
 biocrisis.225.b.tt: "우리 §Y$behemoth_04$§!가 $@behemoth_armor_pen_add|%0+$ $MOD_SHIP_ARMOR_PENETRATION_ADD$을 획득하고 £volatile_motes£ $@behemoth_armor_pen_upkeep|0*-$ 월간 유지비를 얻습니다."
 biocrisis.225.c: "날파리 따위는 우리에게 생채기도 내지 못할 겁니다."
 biocrisis.225.c.tt: "우리 §Y$behemoth_04$§!가 $@behemoth_tracking_add|0*+$ $MOD_SHIP_TRACKING_ADD$ 및 $@behemoth_point_defense_weapon_fire_rate_mult|%0+$ $mod_weapon_type_point_defense_weapon_fire_rate_mult$를 획득하고 £rare_crystals£ $@behemoth_tracking_upkeep|0*-$ 월간 유지비를 얻습니다."
 biocrisis.230.desc: "$biocrisis.210.desc.base$치열한 전투에서는 일분일초가 소중합니다. 우리가 가하는 공격은 죽음의 의례로서, 적들의 딱한 목숨을 꺼뜨리기 전에 마지막으로 선사하는 경험입니다."
 biocrisis.230.a: "놈들의 발을 묶어 버리세요. 우리가 어떤 존재인지 확실히 알려 줍시다."
 biocrisis.230.a.tt: "$behemoth_drain_tt$"
 biocrisis.230.b: "원거리에서 적을 분쇄합시다."
 biocrisis.230.b.tt: "$behemoth_spike_tt$"
 biocrisis.230.c: "전략적으로 적의 사지를 잘라 버립시다."
 biocrisis.230.c.tt: "$behemoth_burst_tt$"
 biocrisis.235.desc: "$biocrisis.210.desc.base$은하계를 충실하게 수호하는 우리 군에게 내구력 향상은 큰 보탬이 될 것입니다." #Tanky 2
 biocrisis.235.a: "조직 재생 능력이 있으면 더 오래 버틸 수 있을 겁니다."
 biocrisis.235.a.tt: "우리 §Y$behemoth_04$§!가 $@behemoth_2_hull_regen_add|%1+$ $MOD_SHIP_HULL_REGEN_ADD_PERC$을 획득합니다."
 biocrisis.235.b: "우리는 절대 항복하지 않을 것입니다."
 biocrisis.235.b.tt: "우리 §Y$behemoth_04$§!가 $@behemoth_2_damage_reduction_mult|%1+$ $MOD_SHIP_DAMAGE_REDUCTION_MULT$를 획득합니다."
 biocrisis.235.c: "답은 순수한 무력뿐입니다."
 biocrisis.235.c.tt: "우리 §Y$behemoth_04$§!가 $@behemoth_2_damage_reduction_static|1+$ $MOD_SHIP_DAMAGE_REDUCTION_ADD$, $@behemoth_2_armor_hardening_add|%0+$ $MOD_SHIP_ARMOR_HARDENING_ADD$ 및 $@behemoth_2_shield_hardening_add|%0+$ $MOD_SHIP_SHIELD_HARDENING_ADD$를 획득합니다."
 biocrisis.240.desc: "$biocrisis.210.desc.base$우리는 유체 무리를 동원해 행성을 유린하고 성계에서 먹을 수 있는 것은 모조리 먹어 치울 것입니다. 그리고 우리가 먹을 수 없는 것이란 없습니다. 그렇다면 궁금한 점이 하나 있습니다. 어떻게 해야 우리 자손들에게 가장 큰 도움을 줄 수 있을까요?" #Support Ability
 biocrisis.240.a: "움직임을 더 빠르게 만듭시다."
 biocrisis.240.a.tt: "$behemoth_buff_tt$"
 biocrisis.240.b: "우리의 빛으로 집결하게 합시다." #Summon a fleet
 biocrisis.240.b.tt: "$behemoth_summon_tt$"
 biocrisis.240.c: "더 강해지는 법을 가르칠 겁니다." #Regen friendly bioships
 biocrisis.240.c.tt: "$behemoth_healing_tt$"
 biocrisis.245.desc: "$biocrisis.210.desc.base$은하계에 거주하는 모든 존재에게 우리의 가차 없는 힘을 보여 줘야 합니다. 다음 진화 단계에서는 우리의 전투 능력을 강화할 것입니다."
 biocrisis.245.a: "내면의 분노를 받아들입시다."
 biocrisis.245.a.tt: "우리 §Y$behemoth_04$§!가 전투에 투입되면 £time£ §Y$@behemoth_frenzy_duration|0$일§! 동안 §Y$behemoth_frenzy_modifier$§!을 획득합니다.\n\n§Y$behemoth_frenzy_modifier$§!:$behemoth_frenzy_modifier_tt$"
 biocrisis.245.b: "분노를 조절하는 법을 익힙시다."
 biocrisis.245.b.tt: "우리 §Y$behemoth_04$§! 다음을 획득합니다 \n$t$$MOD_SHIP_FIRE_RATE_MULT$: §G+$@behemoth_tempered_fire_rate_mult|0%$§! \n$t$$MOD_SHIP_SPEED_MULT$: §G+$@behemoth_tempered_speed_mult|0%$§! \n$t$$MOD_SHIP_HULL_REGEN_ADD_PERC$: $@behemoth_tempered_hull_regen_add_perc|%1+$ \n$t$$MOD_SHIP_ARMOR_REGEN_ADD_STATIC$: $@behemoth_tempered_armor_regen_add_static|0+$"
 biocrisis.245.c: "분노의 힘으로 우리 주변에 있는 이들에게 영감을 줍시다."
 biocrisis.245.c.tt: "우리 §Y$behemoth_04$§!가 전투에 투입되면 £time£ §Y$@behemoth_inspiration_duration|0$일§! 동안 이 성계에 있는 모든 아군 생체 함선에 §Y$behemoth_inspiration_modifier$§!을 부여합니다.\n\n§Y$behemoth_inspiration_modifier$§!:$behemoth_inspiration_modifier_tt$"
 biocrisis.250.name: "직접 제어"
 biocrisis.250.desc: "$biocrisis.210.desc.base$이제 우리는 현실 자체를 갈가리 찢을 만큼 강력한 얼음과 불의 분노를 뿜어낼 수 있게 되었습니다. 다시 말해, 은하계를 불바다로 만들 무기를 손에 넣었다는 말입니다.\n\n하지만 우리의 지배는 파괴로 끝나지 않습니다. 마치 베헤모스가 우리의 신체가 된 것처럼 녀석의 힘줄과 맥박, 그리고 그 거대한 근육까지 우리 뜻대로 움직이는 것이 느껴집니다. 생각만으로 이 야수의 거대한 팔다리와 턱을 움직일 수 있고, 공허에서 태어난 녀석의 거대한 심장은 우리의 의지에 따라 박동합니다. 베헤모스는 이제 단순한 그릇이 아닙니다. 우리가 바로 베헤모스가 된 것입니다." #Behemoth Superweapon
 biocrisis.250.a: "이제 공간 자체가 우리 것입니다."
 biocrisis.250.a.tt: "§H보정치 제거:§!\n§R$voidspawn_boss_invincible$§!\n$mod_damage_vs_country_type_voidspawn_boss_mult$ §R-1954%§!\n\n$behemoth_superweapon_tt$\n\n"
