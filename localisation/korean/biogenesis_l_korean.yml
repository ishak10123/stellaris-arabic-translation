 concept_automodding_habitability_desc: "- 현재 행성에 맞춰, 보정치가 미리 정해진 특성 목록에 있는 항목과 자동으로 합쳐집니다.\n- 식민지마다 매월 확인하는 §Y$concept_automodding_traits$§!을 지닌 £pop£ §H팝§!: §G100§!\n- 팝 성장 및 건물 조립에 따라 매월 업데이트되는 자동 개조 £pop£ §H팝§!의 수가 증가합니다."
