 d_devastated_cities_desc: "이 도시는 파괴로 폐허가 되었으며, 자랑스러운 첨탑과 북적이던 거리는 생기 없는 흙더미가 되었습니다."
 d_devoured_continent: "삼켜진 생물권"
 d_devoured_continent_desc: "이곳은 생물권 전체가 완전히 포식당했습니다."
