 #Siege of the Citadel Event Chain
 bio.2005.name: "특이한 변동"
 bio.2005.desc: "우리 $job_skywatcher_plural$들이 우려스러운 상황을 보고했습니다.\n\n최근에 §Y[Root.Capital.System.GetName]§!에 위치한 차원문 안에서 미약하지만 우리가 분명히 알고 있는 변동이 포착된 것입니다. 과거에도 비슷한 전파 교란이 발생했고, 뒤이어 생체 함선 무리의 공세가 연이어 들이닥친 적이 있습니다.\n\n이번 관측 결과가 사실이라면, 몇 달 내에 침공이 시작될 것입니다. 우리 국민들의 생존이 다시 한번 제국의 수호자들의 결의에 달려 있습니다."
 abandoned_hatchery_chain_1: "성채 포위"
 abandoned_hatchery_chain_1_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_1_desc: "[GetInvadersLower]들이 우리를 공격한 지 수십 년이 되었습니다. 우리 $starbase_deep_space_citadel_1$는 여전히 첫 번째 방어선에서 활약하고 있지만, 이 침공자들 대한 진실을 밝혀내야 진정한 안전을 찾을 수 있습니다.\n\n적에 관한 사실을 알아낼 때마다 놈들에게 역공을 가할 날이 가까워집니다. 그리고 그때, 우리는 이 오랜 포위 공격을 확실하게 종식시킬 것입니다."
 bio.2015.name: "적의 잔해"
 bio.2015.desc: "궤멸된 생체 함대가 남긴 잔해가 §Y[Root.Capital.System.GetName]§! 곳곳에 불길하게 떠다니고 있습니다. 대부분 망가지고 그을렸지만 함선의 유기 물질만큼은 상당 부분이 그대로 남아 있어 귀중한 연구 자료가 되고 있습니다.\n\n이 물질을 세심하게 분석하면 적의 끔찍한 구조물에 담긴 비밀을 캐낼 수 있을 것입니다. 그렇다면 침공자들이 나타난 저 수수께끼의 차원문에 관한 지식도 얻을 수 있을지 모릅니다."
 PROJECT_HATCHERY_SHIP_REMAINS: "생체 함선 잔해 연구"
 PROJECT_HATCHERY_SHIP_REMAINS_DESC: "[GetInvadersLower]들이 남긴 함대의 잔해는 희귀한 연구 소재입니다. 우리의 생존을 보장해 줄 지식을 얻을 수 있을지도 모릅니다."
 bio.2015.a: "드디어 진전이 있군요."
 bio.2020.name: "적군 분석"
 bio.2020.desc: "§Y[Root.Capital.System.GetName]§!에 남겨진 생체 잔해를 세심하게 연구한 [Root.GetScientistPlural]들이 우리 성계 가장자리에 자리 잡은 차원문을 이해하기 위해 필요한 열쇠를 찾아낸 것 같다고 합니다.\n\n함선의 조직 깊은 곳에서 어떤 유기물 패턴을 파악했는데, 이 패턴이 차원문의 변동과 공명하는 것으로 보입니다. 이 주파수를 역설계하면 우리도 이 수수께끼의 균열을 통과할 수 있을 것입니다.\n\n추가 연구가 필요하겠지만, 처음으로 적에게 역공을 가할 수 있는 가능성이 보였습니다."
 abandoned_hatchery_chain_2: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_desc: "차원문의 수수께끼를 해결하는 날이 한 발짝 더 가까워졌습니다. 아직 차원문 통과는 불가능하지만, 이를 위한 기술을 개발하는 데 필요한 지식을 얻은 것입니다.\n\n적에게 반격을 가하기 위해서는 §Y$tech_wormhole_stabilization$§!가 필요합니다."
 bio.2025.name: "적의 요람"
 bio.2025.desc: "최근 §Y$tech_wormhole_stabilization$§! 연구에서 획기적인 성과를 달성한 덕분에 좀처럼 볼 수 없었던 §Y[event_target:starlit_sealed_system.GetName]§! 성계의 모습을 엿볼 수 있었습니다.\n\n반대편에서는 생체 함선으로 이루어진 공격 함대와 방어 시설로 중무장한 항성 기지가 우리를 기다리고 있습니다. 극도로 주의해야 합니다.\n\n이로써 우리는 마침내 적의 요람을 발견했습니다."
 abandoned_hatchery_chain_3: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_desc: "적의 요람을 찾았지만, 그 비밀을 캐내기 위해서는 적의 방어를 뚫어야 합니다.\n\n쉽지 않은 전투가 되겠지만, 그 후에는 자유롭게 §Y[event_target:starlit_sealed_system.GetName]§! 성계를 탐험할 수 있을 것입니다."
 bio.2027.name: "저무는 공포"
 bio.2027.desc: "§Y[starlit_sealed_system.GetName]§!(을)를 지키는 함대를 무찔렀습니다. 그런데 전투가 마무리되기 직전에 성계의 항성 기지에서 으스스한 통신 내용을 포착했습니다. 우리가 방금 번역한 내용은 다음과 같습니다.\n\n§H\"... 제어 불능! 함선이 스스로 번식하고 있다! 누가 됐든 제발 구해 줘!\"§!\n\n이 교신 이후, 모든 통신이 멈췄습니다. 우리가 진정 승리를 거둔 것이라면, 적의 집결지는 우리에게 전략적 기회이기도 합니다. 언젠가는 이곳에 새로운 $starbase_deep_space_citadel_1$가 §Y[starlit_sealed_system.GetName]§!의 빛을 받아 광채를 내며, 과거와 같은 위협이 다시는 우리 문명을 위험에 빠뜨리지 못하게 지켜보게 될지도 모릅니다."
 bio.2027.a: "마침내 포위가 끝났군요."
 citadel_siege_lifted: "포위 종식"
 citadel_siege_lifted_desc: "우리 제국의 용맹한 수호자들이 [GetInvadersLower]들을 물리쳐, 마침내 오랜 포위 공격이 끝났습니다."
 citadel_siege_lifted_machine: "$citadel_siege_lifted$"
 citadel_siege_lifted_machine_desc: "$citadel_siege_lifted_desc$"
 abandoned_hatchery_chain_4: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_desc: "마침내 [GetInvadersLower]들을 §Y[starlit_sealed_system.GetName]§! 성계에서 몰아냈습니다. 하지만 이곳의 상황은 우리가 예상했던 것과 매우 다릅니다.\n\n우리를 괴롭히던 무리들은 완전히 무너진 행성만을 남기고 사라져 버렸습니다."
 PROJECT_BIOMECHANICAL_WORLD: "적의 모성"
 PROJECT_BIOMECHANICAL_WORLD_DESC: "[GetInvadersLower]들의 모성입니다. 이들은 누구였을까요? 우리에게 무엇을 원한 것일까요?"
 bio.2030.name: "생체 기계 역병"
 bio.2030.desc: "§Y[event_target:biomechanical_world_target.GetName]§!(은)는 흙을 덮지 않은 무덤 꼴입니다.\n\n이 행성의 주 종족은 기이하고 공격적인 형태의 생명체에 완전히 말살당했습니다. 추가 조사 결과, 그 생명체는 자연적인 유기체가 아니라 생체 기계였습니다. 잘 살펴보니 이 기계들은 제작한 것이 아니라 길러 낸 것 같습니다.\n\n이 괴물들을 만든 종족은 자신들의 피조물에 무너졌던 것일까요? 우리를 공격한 이 침공자들은 애초에 자신들이 한 행동을 전혀 인지하지 못했거나, 우리의 존재조차 알지 못했던 것은 아닐까요?\n\n확실한 것은 하나뿐입니다. 이곳의 종족이 이 역병 같은 존재들을 막기 위해 어떤 조취를 취했든, 그 조치로 인해 자신들이 창조한 자동화된 흉물들과 함께 궤멸되었다는 것입니다."
 bio.2030.a: "우리 말고도 피해자가 있다는 것인가..."
 smarter_hatchery: "개량된 함대"
 smarter_hatchery_desc: "놈들은 학습합니다. 적응합니다. 그리고 우리를 노리고 있습니다."
 bio.2030.tt: "\n§E평의회 의석 잠금 해제:§!\n§H$t$$councilor_warden_of_the_citadel$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$MOD_SHIP_FRIENDLY_TERRITORY_ARMOR_MULT$: §G+1%§!\n$ttt$$mod_shipsize_starbase_deep_space_citadel_1_hull_mult$: §G+2%§!\n$ttt$$mod_starbases_upkeep_mult$: §G-5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$"
 councilor_warden_of_the_citadel: "성채의 수호자"
 councilor_warden_of_the_citadel_desc: "$TITLE$(은)는 우리의 충직한 수호자로서 제국의 방위를 굳건히 하고, 군사 준비 태세를 감독하며, 어떠한 위협을 상대로도 문명을 지키는 책무를 담당하고 있습니다."
 mod_shipsize_starbase_deep_space_citadel_1_hull_mult: "$starbase_deep_space_citadel_1$ $HITPOINTS$"
 mod_shipsize_starbase_deep_space_citadel_2_hull_mult: "$starbase_deep_space_citadel_2$ $HITPOINTS$"
 mod_shipsize_starbase_deep_space_citadel_3_hull_mult: "$starbase_deep_space_citadel_3$ $HITPOINTS$"
 siege_node: "포위 노드"
 siege_node_desc: "우리는 학습했습니다. 그리고 적응했습니다. 우리의 방어선은 무너지지 않을 것입니다."
 bio.2036.name: "학습 능력"
 bio.2036.desc: "우리를 침공하는 생체 함선들로부터 우려스러운 경향을 확인했습니다. 놈들은 공격할 때마다 조직력이 강해지고, 전술이 변화하며, 우리의 방어를 체계적으로 파악합니다. 감지기 기록을 살펴보니 에너지 신호와 표적 획득 순위가 변하고 있습니다. 놈들의 전략이 발전하고 있다는 증거입니다.\n\n본능인지 집단 지성인지는 알 수 없으나, 이 괴물들이 점점 강해지고 있습니다. 이대로 가면 앞으로의 공격은 점점 더 물리치기 어려워질 것입니다."
 bio.2036.a: "장병들을 위해 기도합시다."
 bio.2036.b: "방어 병력을 강화하세요."
 bio.2036.tt: "§Y$STARLIT_WORMHOLE_GALACTIC$§!을 통해 침략해 오는 함대가 매번 더 강해집니다."
 bio.2040.name: "사라진 적"
 bio.2040.desc: "차원문을 통해 원격 측정을 진행한 결과, §Y[event_target:starlit_sealed_system.GetName]§!에서 중대한 상황 변화가 감지되었습니다. 생체 함대와 부화 시설 전체가 알 수 없는 세력에 의해 파괴된 것입니다.\n\n[GetInvadersLower]들이 최후를 맞이했다는 소식은 물론 기쁘지만, 또 다른 세력이 [event_target:starlit_sealed_system.GetName] 성계를 장악할 위험을 무시할 수는 없습니다.\n\n다시 포위 공격에 당하기 전에 이 전략적 요충지를 빠르게 확보해야 합니다."
 bio.2040.a: "아군인가... 새로운 적인가?"
 citadel_siege_cancelled: "포위 중단"
 citadel_siege_cancelled_desc: "[GetInvadersLower]들이 멸망했습니다. 오랜 포위 공격이 마침내 끝난 것일까요?"
