 subject_dna_desc: "이 조건에 따라 종속국은 자신들의 DNA 표본을 지배국에 보내거나 보내지 않습니다."
 subject_gives_evopred_dna: "DNA 공물"
 subject_gives_evopred_dna_desc: "종속국이 DNA 패킷을 지배국에 보냅니다."
 subject_gives_no_evopred_dna: "DNA 공물 없음"
 subject_gives_no_evopred_dna_desc: "종속국이 DNA 패킷을 지배국에 보내지 않습니다."
 bio.1005.name: "능력 확보"
 bio.1005.desc: "우리 종족이 점차 복잡해지고 있으며, 새로운 유전 물질을 찾아 우주를 샅샅이 뒤진 끝에 마침내 새로운 개성을 받아들일 준비도 끝났습니다. 우리 [Owner.GetScientistPlural]들의 노고 덕분에 확보한 여러 선택지 중에 하나를 고르면 됩니다.\n\n어느 것을 택하든 앞으로 수 세대에 걸쳐 [Owner.GetSpeciesName]의 미래에 막대한 영향을 줄 것입니다."
 bio.1005.tt: "주 종족에 새로운 종족 특성을 추가합니다."
 bio.1005.pop_growth: "우리 종족의 성장 속도를 높여야 합니다!"
 bio.1005.pop_output: "생산력을 높일 수는 없을까요?"
 bio.1005.leader: "뭐가 됐든 지도자들한테 도움이 되어야 합니다."
 bio.1005.habitability: "변화하는 기후에 적응해야 합니다."
 bio.1005.upkeep: "우리 주민들에게 들어가는 유지비를 줄입시다."
 bio.1005.humanoid: "인간류 특성이면 더욱 다양한 상황에 대응할 수 있을 겁니다."
 bio.1005.mammalian: "포유류 DNA에는 아직 밝혀낼 비밀이 많습니다."
 bio.1005.reptilian: "파충류가 상당히 독특하더군요."
 bio.1005.avian: "조류 특성을 얻으면 민첩성이 극대화되겠군요."
 bio.1005.arthropoid: "절지류는 바삭바삭해서 맛있지요."
 bio.1005.molluscoid: "연체류에게서도 배울 것이 있을 겁니다."
 bio.1005.fungoid: "우리도 균류처럼 빠르게 번식해 봅시다."
 bio.1005.plantoid: "식물류의 뛰어난 에너지 효율이 도움이 되겠군요."
 bio.1005.lithoid: "섭취는 어렵지만, 암석류의 DNA에는 맛깔나는 가능성이 숨어 있지요."
 bio.1005.necroid: "아무리 망령류라도 먹을 만한 살코기는 있지요."
 bio.1005.aquatic: "수생류의 적응력은 바다 바깥에서도 생존에 도움이 되겠군요."
 bio.1005.toxoid: "독소류는 맛이 §G시큼§!한 게 특징이죠."
 bio.1005.infernal: "호열체는 §R불타오르지만§!, 불길은 다스리면 됩니다."
 bio.1005.plasmic: "플라스마 DNA를 안정화시키면 아주 멋질 겁니다."
 bio.1005.leviathan: "은하계의 거대 생명체들에게서 무엇을 배울 수 있을까요?"
 bio.1005.psionic: "사이오닉 유전자의 어떤 요소가 그렇게 뛰어난 인지 능력을 촉진하는 걸까요?"
 bio.1005.random: "혼란을 받아들입시다. 본능의 소리를 따르는 겁니다!"
 bio.1005.no_reward: "그런 게 없어도 우린 충분히 복잡한 존재입니다."
 bio.1005.unnatural_selection: "변이를 통해 우리의 타고난 한계를 넘어서는 능력을 개방합시다!"
 has_tr_mutation_unnatural_selection_evo_pred_tt: "§Y$tr_mutation_unnatural_selection$§! 전통을 선택했기 때문에 고를 수 있는 선택지입니다."
 has_tr_mutation_nucleotide_isolation_evo_pred_tt: "§Y$tr_mutation_nucleotide_isolation$§! 전통을 선택했기 때문에 고를 수 있는 선택지입니다."
 #Modifiers
 fresh_biosphere: "새로운 생물권"
 fresh_biosphere_desc: "맛보고 흡수할 새로운 행성입니다. 우리 개척민들이 이 행성에서 얻을 수 있는 모든 것을 파악하고 이해하는 작업을 진행하고 있습니다."
 fresh_biosphere_tt: "월간 §Y$evolutionary_predators_situation$§! 상황 진행도: §G+10§!"
 exhausted_biosphere: "고갈된 생물권"
 exhausted_biosphere_desc: "이곳에는 더 이상 찾을 게 없습니다. 한때 특별한 생체 흔적을 찾아 바위 하나하나까지 샅샅이 뒤지던 정착민들은 이제 만족한 상태입니다."
 exhausted_biosphere_tt: "월간 §Y$evolutionary_predators_situation$§! 상황 진행도: §G+1§!"
 genetic_soup: "유전자 수프"
 genetic_soup_desc: "기억조차 없는 먼 옛날부터 이 행성은 여러 특이한 유전자를 만들어 왔습니다. 이곳의 유전적 다양성에는 끝이 없습니다."
 turtle_world_modifier_evopred: "넴마 행성: 분류 작업"
 turtle_world_modifier_evopred_desc: "이 행성의 주민들은 현지 동물의 독특한 유전자를 살피고 수집하는 능력이 뛰어납니다."
 eat_the_titans_evopred: "$eat_the_titans$"
 eat_the_titans_evopred_desc: "$eat_the_titans_desc$"
 eat_the_titans_evopred_tt: "$fresh_biosphere_tt$\n$farmer_is_titan_hunter_tt$"
 #Jobs
 evolutionary_predators_pops_tt: "월간 §Y$evolutionary_predators_situation$§! 상황 진행도: §G+0.1§!"
 #Espionage
 operation_evolutionary_predator_procure_dna: "DNA 확보"
 operation_evolutionary_predator_procure_dna_desc: "이 종족에 침투하고 아무도 보지 않는 사이에 DNA를 몰래 수집하면, 유전 물질을 좀 더 직접적으로 모을 수 있을 것입니다."
 operation_evolutionary_predator_procure_dna_on_success: "$IF_SUCCESSFUL|E$\n§Y$evolutionary_predators_situation$§! 상황 진행도가 약간 높아지고, 주 종족의 DNA를 획득합니다."
 operation_evolutionary_predator_procure_dna_preftl: "$operation_evolutionary_predator_procure_dna$"
 operation_evolutionary_predator_procure_dna_preftl_on_success: "$operation_evolutionary_predator_procure_dna_on_success$"
 bio.1050.name: "추적"
 bio.1050.desc: "우리 요원들이 [Target.GetSpeciesName]의 정착지를 배회하고 있으며, 곧 현지 건물에 진입할 수 있을 것입니다. 기다리면 때는 옵니다. 우리 종족은 인내심이 강합니다. 사냥을 서두르면 그르치는 법입니다."
 bio.1055.name: "준비"
 bio.1055.desc: "사냥감이 시야에 들어왔습니다. [Target.GetName]에 침투하기 위해 보낸 사냥꾼들은 자신감에 차 있습니다. 이들은 곧 [Target.GetSpeciesName]의 주거 시설에 진입해 그 안에 있는 귀중한 DNA를 전부 확보할 것입니다."
 bio.1060.name: "급습"
 bio.1060.desc: "요원들이 준비를 마쳤습니다. 적절한 위장을 갖추고 [Target.GetSpeciesName]의 주거 시설에 침입한 것입니다. 뒤이어 뛰어난 사냥꾼답게 빠져나갈 길 또한 확보했으나, 개중에는 달갑지 않은 탈출구도 있습니다. 하수도로 탈출해야 한다면 아주 곤란할 겁니다."
 bio.1065.name: "유전자 탈취"
 bio.1065.desc: "해냈습니다! 우리 요원들이 다량의 유전 물질을 탈취했습니다. 다음번 변이에서는 대단한 발전을 이룰 수 있을 것입니다. 이거 어쩌면 [From.Target.GetSpeciesName]에 맛을 들이게 될지도 모르겠군요."
 #Toast
