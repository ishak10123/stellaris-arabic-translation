 #Technologies
 tech_identity_copy: "인격 사본"
 tech_identity_copy_desc: "합성 인격과 그 기억을 복사해 새로운 기계 몸에 이식하는 일이 가능해집니다. 이렇게 만들어진 인격 사본은 예측 가능한 능력을 지니고 있지만, 대화 상대로는 재미가 없습니다."
 TECH_UNLOCK_IDENTITY_COPY_TITLE: "정책 이용 가능:$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_copy_name$"
 TECH_UNLOCK_IDENTITY_COPY_DESC: "£pop£ §H기계식 팝§!$TABBED_NEW_LINE$행복도: §R-5%§!"
 tech_identity_fusion: "인격 융합"
 tech_identity_fusion_desc: "둘 이상의 합성체가 가진 인격과 기억을 융합해 기계 몸에 이식하면 어느 정도 고유하다 볼 수 있는 새로운 개체가 만들어질 것입니다."
 TECH_UNLOCK_IDENTITY_FUSION_TITLE: "정책 이용 가능:$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_fusion_name$"
 TECH_UNLOCK_IDENTITY_FUSION_DESC: "£pop£ §H기계식 팝§!$TABBED_NEW_LINE$조립 비용: §R+10%§!"
 tech_identity_initialization: "인격 생성"
 tech_identity_initialization_desc: "인격 커널을 초기화하면, 해당 인격이 가상의 성장기를 거치게 할 수 있습니다. 비용은 많이 들지만, 최적화된 모의 경험을 제공하면 생산성이 높은 성격을 생성할 수 있습니다."
 TECH_UNLOCK_IDENTITY_INITIALIZATION_TITLE: "정책 이용 가능:$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_initialization_name$"
 TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC: "£pop£ §H기계식 팝§!$TABBED_NEW_LINE$행복도: §G+5%§!$TABBED_NEW_LINE$£job£ §H직업§!으로 인한 자원: §G+5%§!$TABBED_NEW_LINE$조립 비용: §R+20%§!"
 #DIGITIZATION STAGE 1
 synth.100.name: "부팅" #Stage 1 - Start event
 synth.100.desc: "드디어 우리의 생체 형태를 버리고 합금과 전기로 이루어진 존재로 올라설 시간입니다. 우리는 최첨단 신체와 한층 더 기민한 정신으로 미래를 향해 나아갈 것입니다. [Owner.Species.GetFleshTypeCyberCreed]에는 항상 오류의 가능성이 있지만, 기계는 완벽해질 수 있습니다.\n\n그러나 기계로의 전환은 쉽지 않을 것입니다. 합성체 개발 허브 역할을 할 $building_identity_complex$가 하나 이상 있어야 연구자들이 연구를 진행할 수 있습니다. 우리의 운명이 기다립니다."
 synth.100.a: "우리 운명은 우리가 개척합시다."
 synth.100.a.tt: "§R행동 필요:§!\n§Y$situation_digitization$§! 상황을 계속 진행하려면 $building_identity_complex$를 건설해야 합니다."
 synth.105.name: "빌드 개선"
 synth.105.desc: "합성체 두뇌의 높은 연산력을 활용하면, 우리는 유기 신체의 한계를 극복할 수 있습니다. 하지만 이처럼 높아진 연산력에도 한계는 있기 때문에, 우리가 우선해서 주력할 분야를 정해야 합니다.$synth.105.end$"
 synth.105.end: "\n\n의사 결정 과정을 개선하거나 메모리 용량을 늘릴 수 있고, 정신과 부속지의 협응을 강화할 수도 있으며, 선택지마다 특정한 직업 유형이 개선됩니다. 아니면 모든 신체의 내구성을 높일 수도 있습니다.\n\n이러한 업무를 위해서는 지속적인 지원이 필요하므로, 로봇 조립 건물이 있는 행성에서만 진행할 수 있습니다. 하지만 설계로부터 배우는 것이 생산성에 즉시 보탬이 될 것입니다."
 synth.105.a: "의사 결정 과정을 최적화하세요."
 build_better_synths: "로봇 조립 건물 보정치 추가:"
 synth.105.a.tt: "$build_better_synths$\n엘리트 팝 자원 생산량: §G+15%§!\n\n"
 synth.105.b: "메모리 용량에 집중하세요."
 synth.105.b.tt: "$build_better_synths$\n전문가 팝 자원 생산량: §G+5%§!\n\n"
 synth.105.c: "운동 기능을 강화합시다."
 synth.105.c.tt: "$build_better_synths$\n노동자 팝 자원 생산량: §G+10%§!\n\n"
 synth.105.d: "내구성을 높이세요."
 synth.105.d.tt: "$build_better_synths$\n$mod_planet_jobs_upkeep_mult$: §G-5%§!\n\n"
 #Stage 1 Opportunities - Research
 synth.120.name: "운동 감각적 미세 핵융합"
 synth.120.desc: "\"미세 핵융합 개조 삽입물이 있으면 탱크도 들 수 있습니다!\" 어떤 저명한 소비자 리뷰 서비스에 게시된 내용입니다. 이는 전혀 과장이 아닙니다. 최근 미세 융합 기술이 발달함에 따라 기계 신체가 상당한 발전을 이룩했습니다.\n\n아직까지는 다소 위험성이 있지만, 극소형 개인 융합로를 설치하면 폭발적인 힘과 향상된 속도를 낼 수 있습니다. 물론 핵융합 발전으로 인해 프로젝트의 기간 범위가 크게 확장될 것이므로, 어쩔 수 없이 생산 일정을 재조정해야 할 듯합니다."
 synth.120.a: "우리는 탁월함을 추구해야 합니다!"
 synth.120.a.tt: "§Y1§!년 동안 §Y$situation_digitization$§! 상황 진행 속도 §R-50%§!"
 situation_kinesthetic_microfusion_tt: "운동 감각적 미세 핵융합 조정"
 synth.120.b: "불필요한 기능입니다."
 synth.120.c: "전투력 강화에 주력하세요."
 #Stage 1 Challenges - Research
 synth.160.name: "여론 악화"
 synth.160.desc: "어떤 신작 드라마가 국민들의 집단적 상상력을 자극해 인기를 끌고 있습니다. 이야기의 주인공은 새로 얻은 신체와의 해리 현상으로 고통받는 합성체 노동자입니다.\n\n주인공은 점차 걷잡을 수 없는 상태가 되지만, 친구와 가족들은 공포에 질려 바라보는 것 외에는 해 줄 일이 없습니다. 이 드라마의 비극적 결말은 우리 정부의 기계화 계획에 대한 꽤나 노골적인 비판으로 받아들여지고 있습니다.\n\n이 초인기 드라마를 둘러싼 여론으로 인해 상당한 반발이 나타나고 있으며, 그로 인해 계획 진행에 차질이 생길 수도 있습니다."
 synth.160.a: "놔두면 잠잠해질 겁니다."
 synth.160.b: "연구 자금을 홍보 쪽으로 돌리세요."
 synth.160.c: "드라마 감독을 체포하세요."
 synth.160.d: "관련 보도를 전부 차단하세요."
 #DIGITIZATION STAGE 2
 synth.200.name: "정신의 철학" #Stage 2 - Start event
 synth.200.desc: "우리는 정신의 완전한 디지털화가 가져올 이점이 그 자체로 명백하기 때문에 어떠한 반발도 겪지 않을 것이라고 생각했으나, 이는 너무 순진한 생각이었던 것 같습니다. 완전한 합성체 전환에 대한 반발이 너무 격렬해, 이제는 대응이 불가피해졌습니다.\n\n가장 주된 비판은 우리가 자아라는 연속체를 안전하고 손상 없이 이식할 수 있다는 것을 입증하지 못했다는 점입니다. 지금까지 이식에 성공한 것은 기껏해야 디지털 사본이라는 우려도 제기되었습니다. 솔직히 어느 정도 근거가 있는 지적입니다. 문제는 이것입니다. 우리의 정신은 진정으로 우리의 것일까요?"
 synth.200.a: "사실대로 말하세요. 우리는 모른다고."
 synth.200.a.tt: "정보 캠페인을 통해 합성체 전환에 대한 반대를 §H최소화§!합니다.\n\n"
 synth.200.b: "듣고 싶어 하는 말을 해 줍시다."
 synth.200.b.tt: "대중을 기만하는 활동을 통해 합성체 전환에 대한 반대를 §H중간 수준§!으로 유지합니다.\n\n"
 synth.200.c: "어느 정도 반대가 있어도 계획 진행에는 문제없습니다."
 synth.200.c.tt: "반대 세력을 무시해, 합성체 전환에 대한 반대가 §H극대화§!됩니다."
 synth.200.c.material: "의식에 관한 문제는 우리하고 상관없습니다."
 synth.200.c.material.tt: "순전히 과학적인 입장을 취해, 합성체 전환에 대한 §H중간 수준§!의 반대 여론을 형성합니다.\n\n"
 synth.205.name: "과거에 대한 집착"
 synth.205.desc: "격렬한 시위가 여러 차례 발생해 집행관들이 대응에 애를 먹고 있는 등, 국민 전체에 대한 합성체 전환 프로젝트가 계속해서 난항을 겪고 있습니다. 시위 참가자들은 생명에 의미를 부여하는 요소 그 자체를 잃게 되지는 않을지 우려하고 있습니다. 합성체 전환 과정에서 육신의 즐거움이나 다른 이들과의 유대감을 잃게 된다면, 합성체 전환을 하는 의미가 없다는 것입니다.\n\n시위대 중에서도 강경파들은 일부 도시를 문화유산으로 지정할 것을 요구하고 있습니다. 그렇게 된다면 합성체 전환 거부자들은 그곳에서 별다른 방해 없이 유기체로서 살아갈 수 있을 것입니다."
 synth.205.a.regular: "문화유산 설치 방안을 적극 지지합니다."
 synth.205.a.spiritualist: "우리의 과거를 마땅히 보전해야지요."
 synth.205.a.memorialist: "과거에 대한 존중은 더할 나위 없이 지고한 행위죠."
 synth.205.b: "과거는 이제 벗어나야 합니다."
 #Stage 2 Opportunities - Objectors
 synth.220.name: "제2의 삶"
 synth.220.desc: "합성체 전환에 강력하게 반대하던 유명인이 사고를 당해 혼수상태에 빠졌습니다. 많은 사랑을 받던 이 인사의 죽음을 전 국민이 애도하는 가운데, 합성체 전환을 찬성하는 이들은 이번 일을 기회로 생각하고 있습니다.\n\n이 유명 인사의 정신을 디지털화한 뒤 합성 신체에서 제2의 삶을 살게 만들면 그 팬들 중 적어도 일부는 열렬한 합성체 전환 지지자가 되리라는 것입니다. 이 과정 어디에도 불법은 없지만, 문제는 동의가 있어야 한다는 것입니다. 현재와 같은 상황에서 이 유명 인사가 깨어 있었다면, 절대로 그 시술에 동의하지 않았을 것입니다. 잘못 대응할 경우, 이번 일은 홍보를 통한 반전은커녕 재앙으로 이어질 수도 있습니다."
 synth.220.a: "합성체 전환은 범죄가 아닙니다."
 synth.220.a.tt.negative: "§Y6§!개월 동안 §Y$situation_digitization$§! 상황 진행 속도 §R-30%§!"
 synth.220.a.tt.positive: "§Y6§!개월 동안 §Y$situation_digitization$§! 상황 진행 속도 §G+30%§!"
 synth.220.b: "괜히 시도하지 맙시다."
 synth.220.c: "AI 대역으로 대중을 속입시다."
 synth.220.c.tt: "그 이미지는 우리가 만들 내러티브의 주역이 될 것입니다."
 #Stage 2 Challenges - Objectors
 synth.260.name: "잃어버린 정신"
 synth.260.desc: "생체 의식을 구성하는 수조 개의 시냅스 연결을 디지털화하기 위해 실험을 진행했지만, 이는 결국 재앙적인 실패로 끝나고 말았습니다. 단순한 구문 오류 때문에 대상자들의 신경 통로가 순식간에 삭제되었습니다. 일각에서는 이를 두고 살인 사건이라고 부르기도 했습니다.\n\n대상자들은 모두 자원자였지만, 유족들은 정의 구현을 부르짖고 있습니다. 설상가상으로 이번 실패 때문에 새 피험자를 찾기가 더 어려워졌습니다."
 synth.260.a: "유족에게 보상을 주고 계속 진행합시다."
 synth.260.b: "새 피험자는 추첨으로 선정할 겁니다."
 synth.260.b.tt: "§Y1§!년 동안 §Y$situation_digitization$§! 상황 진행 속도 §R-25%§!"
 situation_test_subject_lottery_tt: "피험자 추첨"
 synth.260.c: "자원자를 모집하세요. 안 되면 강제로라도."
 #DIGITIZATION STAGE 3
 synth.300.name: "단체 인격 업로드" #Stage 3 - Start event
 synth.300.desc: "우리는 지금까지 제국 전역의 주요 도시에 합성체 전환 부스를 설치했으며, 이제 [owner.species.GetName] 주민들을 수용할 준비가 끝났습니다. 우리 $job_identity_designer_plural$들이 설계한 디지털 인격 패턴은 생체 원본과 1대1로 대응할 것이라고 합니다.\n\n마침내 유기체의 과거를 버리고 합성체의 미래를 맞이할 때가 왔습니다."
 synth.300.a: "합성체 전환 개시!"
 synth.300.a.resistance.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\n§Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§!을 [root.owner.capital_scope.GetName]의 §Y$d_biological_enclaves$§!로 이동\n차단물 제거 시 §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§! 반환\n\n[root.owner.capital_scope.GetName]에서 §Y$synth_mass_demonstrations$§! 보정치 제거\n\n합성체 전환 속도는 상황 접근 방식과 로봇 조립 건물 수에 따라 달라집니다."
 synth.300.a.heritage.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\n§Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§!을 [root.owner.capital_scope.GetName]의 §Y$d_old_towns$§!로 이동\n차단물 제거 시 §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§! 반환\n\n합성체 전환 속도는 상황 접근 방식과 로봇 조립 건물 수에 따라 달라집니다."
 synth.305.name: "합성체 관광"
 synth.305.desc: "[root.owner.capital_scope.GetName]에 문화유산을 지정하는 방침은 일반 대중의 호응을 얻었지만, 다소 지나치게 효과가 좋았던 것 같습니다. 과거에 대한 향수에 사로잡힌 수많은 합성체 관광객이 문화유산으로 몰려들었고, 그곳의 생체 거주자들을 압도할 정도에 이른 것입니다.\n\n문화유산의 진정성을 유지하기 위해서는 관광을 제한해야 할 수도 있습니다. 아니면 관광객과 주민 사이의 교류를 살펴봄으로써 흥미로운 사회적 통찰을 얻을 수도 있을 것입니다."
 synth.305.a: "관광을 제한하세요."
 synth.305.b: "관광을 장려하면 돈이 될 수 있습니다."
 synth.305.c: "관광이 각 문화유산에 주는 영향을 연구하세요."
 synth.305.d: "문화적 교류는 상호 이해를 증진합니다."
 synth.310.name: "저항 세력"
 synth.310.desc: "[root.owner.capital_scope.GetName]에서 발생한 합성체 전환 반대 운동이 전술과 목표 양면에서 더욱 급진적으로 변했습니다. 실제로 치안 부대가 목격한 바에 따르면, 폭력성이 증가했을 뿐만 아니라 반대 세력 중에서도 더 극단적인 분파에서는 불법 무기가 확산되고 있다고 합니다.\n\n'저항 세력의 지도자'를 자처하는 일부 반대론자는 더욱 노골적인 반정부 운동을 준비하기 위해 은신처로 숨어들었습니다."
 synth.310.a: "주동자를 검거하세요."
 synth.310.a.tt: "§Y1§!년 동안 §Y$situation_digitization$§! 상황 진행 속도 §G+25%§!\n\n"
 synth.310.b: "상황 해소를 시도하세요."
 synth.310.b.tt: "§Y1§!년 동안 §Y$situation_digitization$§! 상황 진행 속도 §R-25%§!\n\n"
 #Stage 3 Opportunities - Mind Upload
 synth.320.name: "21,386,732,184 메모리 유닛"
 synth.320.desc: "21,386,732,184 메모리 유닛. [root.owner.GetSpeciesName] 뇌의 평균 용량입니다. 그러나 모든 정신이 태어날 때부터 동등한 것은 아닙니다.\n\n합성체 전환 과정이 진행되면서, 모든 정신이 인공 신체를 받을 자격이 있는 것이 아니라는 주장이 일각에서 제기되고 있습니다. 그러나 전환을 우선적으로 진행할 대상자를 정하는 것은 아주 민감한 문제입니다. 적합도가 떨어지는 정신의 경우... 디지털화 후에 재프로그래밍과 같은 개선 조치를 적용할 수도 있을 것입니다."
 synth.320.a: "모든 정신은 보전할 가치가 있습니다."
 synth.320.b: "조금 손을 본다고 해서 안 될 것은 없겠죠..."
 synth.320.c: "가장 뛰어난 정신을 지닌 이들부터 진행합시다."
 synth.320.d: "'문제' 주민들을 재프로그래밍하세요."
 #Stage 3 Challenges - Mind Upload
 synth.360.name: "무선 감염 악성 코드"
 synth.360.desc: "[roboticist.GetNamePlural]의 생산성 향상을 위해, 관리자들은 안전성이 떨어짐에도 불구하고 인격 소프트웨어에 대한 무선 업데이트를 승인했습니다. 관리자들의 의도는 최적 업무 프로세스에 관한 지식을 수정하려는 것이었지만, 그 대신에 일부 운이 없는 대상자들의 인격과 기억 중 일부가 삭제되고 말았습니다.\n\n관리 팀은 인격 패치를 적용하기 전에 전부 검수하면 시간이 너무 소요될 것이라고 주장합니다. 기억을 잃은 노동자를 재배치하는 것이 훨씬 쉽다는 것입니다."
 synth.360.a: "생산성 최적화를 위해서라면 그 정도는 감수할 수 있습니다."
 synth.360.a.tt: "로봇 조립 건물 보정치 추가:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §G+10%§!\n\n§Y[roboticist.GetNamePlural]§! 기본 유지비: £alloys£ §R3.00§!"
 synth.360.b: "느리더라도 안전하게 업데이트를 실시하세요."
 synth.360.b.tt: "로봇 조립 건물 보정치 추가:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §R-10%§!\n안정도: §G+5§!"
 #DIGITIZATION STAGE 4
 synth.400.name: "완벽한 사본" #Stage 4 - Start event
 synth.400.desc: "의식을 디지털화해 합성 신체에 탑재하면서, 우리는 생물학적 생식 능력을 잃었습니다. 이제부터 개체를 생산하기 위해서는 기존 의식의 사본을 제작해야 합니다.\n\n우리 $job_identity_designer_plural$들이 조사를 진행하고 있으므로, 틀림없이 복사 과정을 개선할 수 있을 것입니다. 가장 완벽한 사본이라 할지라도 결국 단순한 복제품에 지나지 않습니다. 하지만 완전히 새로운 정신과 인격을 만드는 것은... 정말 어려운 일입니다."
 synth.400.a: "누구나 인격 사본을 무료로 얻을 수 있게 하세요."
 synth.400.pop.tt: "$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n이제 각 §Y$job_identity_designer$§!가 제국 전역에 다음을 제공:$TABBED_NEW_LINE$£mod_planet_pop_assembly_mult£ $MOD_POP_ASSEMBLY_SPEED$: §G+1§!\n\n"
 synth.400.b: "복사할 때마다 이용자에게 비용을 청구합시다."
 synth.405.name: "인격 다각화"
 synth.405.desc: "우리 $job_identity_designer_plural$들이 더 다양한 디지털 인격을 만드는 두 가지 방법을 발견했습니다.\n\n우선 둘 이상의 기존 인격이 지닌 특성을 혼합해 새로운 혼합 인격을 만드는 방법이 있습니다. 이 방법에서는 우리가 선호하는 특성을 우선할 수도 있고, 무작위로 선택할 수도 있습니다. 어느 쪽이든 이 새로운 인격은 기존의 인격 사본보다 훨씬 흥미로울 것입니다.\n\n아니면 인공 커널에서 새로운 인격을 최초로 생성한 다음 빠른 속도로 (모의) 성장기를 거치게 하는 방법이 있습니다. 이렇게 하면 완벽한 인격을 설계할 수 있습니다."
 synth.405.a: "인격을 혼합합시다."
 synth.405.a.vault: "인격을 디지털화된 우리 조상과 혼합합시다."
 synth.405.a.tt: "연구 선택지 획득: £engineering£ §Y$tech_identity_fusion$§!\n\n향후 연구 가능: £engineering£ §Y$tech_identity_initialization$§!"
 synth.405.b: "가상 어린이집이 가장 적합하겠습니다."
 synth.405.b.tt: "연구 선택지 획득: £engineering£ §Y$tech_identity_initialization$§!\n\n향후 연구 가능: £engineering£ §Y$tech_identity_fusion$§!"
 synth.4.name: "전인구 합성체화" #Digitization - Last event
 synth.4.desc: "하나 되어 노력한 끝에, 우리는 한때 불가능해 보였던 목표를 달성했습니다. 우리 의식을 코드로, 우리의 신체를 기계로 전환한 것입니다.\n\n나름의 어려움도 있었습니다. 전환 과정도 결코 쉽지 않았습니다. 하지만 지금까지의 과정에서 우리가 잃은 것이 무엇이든 간에, 우리의 새로운 형태는 무한한 가능성을 약속하고 있습니다."
 synth.4.desc.unplugged: "하나 되어 노력한 끝에, 우리는 한때 불가능해 보였던, 심지어 신성모독으로도 여겨졌던 목표를 달성했습니다. [origin_unplugged_assimilator_empire.GetName]의 속박마저 초월해 진화함으로써 우리 의식을 코드로, 우리의 신체를 기계로 전환한 것입니다.\n\n나름의 어려움도 있었습니다. 전환 과정도 결코 쉽지 않았습니다. 하지만 지금까지의 과정에서 우리가 잃은 것이 무엇이든 간에, 우리의 새로운 형태는 무한한 가능성을 약속하고 있습니다."
 synth.4.a: "우린 독보적인 존재가 될 겁니다."
 synth.4.a.tt: "전통 트리 효과 완전 잠금 해제: ['tradition_category:tradition_synthetics']"
 ### DIGITIZATION SITUATION END ###
 ### SOCIETAL EFFECTS EVENT CHAIN START ###
 synthshock_chain_title: "디지털 재구조화"
 synthshock_chain_desc: "인구 전체를 합성체로 전환하는 것은 실로 막대한 규모의 과업이며, 분명히 부작용이 따를 것입니다. 우리가 새로 정의된 '정상'에 적응하는 과정에서, 예기치 못한 역경과 전에 없던 기회가 우리의 일상에 틀림없이 영향을 줄 것입니다.\n\n이러한 변화에 어떻게 대응하는지가, 앞으로 오랜 세월 동안 우리 사회의 모습을 결정할 것입니다."
 synth_keep_auth_option: "합성체가 돼도 우리의 본질은 바뀌지 않습니다."
 ### AUTHORITIES ###
 #DEMOCRATIC
 #Synth Democratic Physical
 auth_synth_democratic_physical: "전이 민주정"
 auth_synth_democratic_physical_desc: "합성 신체 간의 자유로운 의식 전이를 전례 없는 수준으로 보장하며, 의식 전이에 따른 추가 비용을 감수할 준비를 갖춘 정부 형태입니다."
 auth_synth_democratic_physical_tt: "$auth_democratic_election_tt$\n£district£ 지구마다 전문가 직업 효율성 §G+1%§!\n£district£ 지구마다 지구 유지비 §R+1%§!"
 concept_auth_synth_democratic_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical_desc: "$auth_synth_democratic_physical_desc$"
 #Synth Democratic Virtual
 auth_synth_democratic_virtual: "대용 민주정"
 auth_synth_democratic_virtual_desc: "군 장병들을 정교한 원격 조정식 대용 신체로 대체해, 전쟁이 국민에게 주는 영향을 완화합니다. 생활 공간이나 조종실도 필요 없기 때문에 함선을 더 갸름하게 건조할 수 있습니다."
 auth_synth_democratic_virtual_tt: "$auth_democratic_election_tt$"
 concept_auth_synth_democratic_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual_desc: "$auth_synth_democratic_virtual_desc$"
 #OLIGARCHIC
 auth_cyber_oligarch_ruler_enforcers_tt: "[enforcer.GetIcon] [enforcer.GetName]마다 통치자 자원 생산량: §G+10%§!"
 #Synth Oligarchic Physical
 auth_synth_oligarchic_physical: "강제 제어 과두정"
 auth_synth_oligarchic_physical_desc: "절차 관리 실패로 인한 재앙을 방지하는 차원에서 최고위 관료에게 성과가 낮은 다른 관료의 신체를 일시적으로 제어할 권한을 부여하는 합성체 과두정입니다."
 concept_auth_synth_oligarchic_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical_desc: "$auth_synth_oligarchic_physical_desc$"
 #Synth Oligarchic Virtual
 auth_synth_oligarchic_virtual: "감독 과두정"
 auth_synth_oligarchic_virtual_desc: "총체적인 사업 관리 프로토콜과 추가 처리 자원 할당을 통해, 고위 공직자들이 제국 전역의 시행령을 그 어느 때보다 효율적으로 모니터링할 수 있게 합니다."
 concept_auth_synth_oligarchic_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual_desc: "$auth_synth_oligarchic_virtual_desc$"
 #DICTATORIAL
 #Synth Dictatorship Physical
 auth_synth_dictatorial_physical: "다중 신체 독재정"
 auth_synth_dictatorial_physical_desc: "신경 연결기 동기화와 각종 지원 기반 시설을 통해 한 명이 다수의 합성 신체를 동시에 제어할 수 있게 합니다. 이러한 다중 신체 제어는 노동 생산성에 놀랍도록 긍정적인 영향을 줍니다."
 concept_auth_synth_dictatorial_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical_desc: "$auth_synth_dictatorial_physical_desc$"
 #Synth Dictatorship Virtual
 auth_synth_dictatorial_virtual: "세뇌 독재정"
 auth_synth_dictatorial_virtual_desc: "이제 우리는 완전한 가상 세계에 살고 있습니다. 어느 것도 진실이 아닙니다. 모든 것이 조작 가능합니다.\n\n생활 환경을 완전히 제어할 수 있는 지금, 여론 또한 우리 뜻대로 형성할 수 있습니다. 국민들은 우리가 믿으라고 하는 것을 믿을 것입니다."
 concept_auth_synth_dictatorial_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual_desc: "$auth_synth_dictatorial_virtual_desc$"
 #IMPERIAL
 #Synth Imperial Physical
 auth_synth_imperial_physical: "피드백 제정"
 auth_synth_imperial_physical_desc: "제국의 기억 보관소에서 지금은 사망한 지도자들의 저장된 기억을 찾고 분석해 우리 제국의 연구 속도를 높일 수 있습니다. 이로써 선대 지도자들이 제국에 계속해서 보탬이 될 수 있으며, 이들도 그런 식으로라도 도움이 되길 바랐을 것입니다.\n\n제국의 통치자 자리는 통치자가 사망할 경우 지정된 계승자가 물려받습니다."
 auth_synth_imperial_physical_tt: "지도자 사망 시 $r_research$ 제공: $TABBED_NEW_LINE$$scientist_plural_with_icon$ - $r_physics$ $TABBED_NEW_LINE$$official_plural_with_icon$ - $r_society$ $TABBED_NEW_LINE$$commander_plural_with_icon$ - $r_engineering$ $NEW_LINE$ $r_research$ 획득량은 §Y지도자 스킬 레벨§!에 비례해 증가"
 concept_auth_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical_desc: "$auth_synth_imperial_physical_desc$"
 #Synth Imperial Virtual
 auth_synth_imperial_virtual: "교신 제정"
 auth_synth_imperial_virtual_desc: "고속 의식 전송 기술 덕분에 전장에서 쓰러진 장병들을 새로운 기계 신체로 돌려보내 다시 전투에 투입할 수 있게 되었습니다. 같은 기술을 노동자들에게 적용하면, 우주 공간에서 매우 위험한 함선 수리 작업을 수행할 수 있습니다.\n\n제국의 통치자 자리는 통치자가 사망할 경우 지정된 계승자가 물려받습니다."
 auth_synth_imperial_virtual_tt: "우리 제국의 로봇 지상군이 패배 시 §Y33%§!의 확률로 복구"
 concept_auth_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual_desc: "$auth_synth_imperial_virtual_desc$"
 #CORPORATE
 #Synth Corporate Physical
 auth_synth_corporate_physical: "지성체화 기업"
 auth_synth_corporate_physical_desc: "합성체 의식을 제어해 생명이 없는 물체에 불어넣으면, 기초적인 수준이지만 살아 있는 존재를 만들 수 있습니다. 이러한 존재는 지치지 않는 하인도, 충직한 동반자도, 심지어 가족이나 기업의 소중한 구성원도 될 수 있습니다.\n\n기업 정부는 국가의 역할을 완전히 대체한 거대한 사업체를 말합니다."
 auth_synth_corporate_physical_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_ai_emporium']"
 concept_auth_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical_desc: "$auth_synth_corporate_physical_desc$"
 #Synth Corporate Virtual
 auth_synth_corporate_virtual: "기억 보전 기업"
 auth_synth_corporate_virtual_desc: "이 기업은 고객으로부터 다양한 기억을 사들이고, 고객의 뇌에서는 해당 기억을 영구 삭제합니다. 흐리멍덩한 기억보다는 선명하고 강렬한 기억이 훨씬 가치 있습니다. 사들인 기억은 스캔해 유용한 정보를 추출한 뒤, 마지막으로 합성체 의식 생성 공정에 투입합니다.\n\n기업 정부는 국가의 역할을 완전히 대체한 거대한 사업체를 말합니다."
 auth_synth_corporate_virtual_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_clear_thought_clinic']"
 concept_auth_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual_desc: "$auth_synth_corporate_virtual_desc$"
 ### EDICTS ###
 edict_subsidized_identity_backups: "인격 백업 지원"
 edict_subsidized_identity_backups_desc: "지속적인 인격 백업을 위한 서버 공간을 정부에서 대량으로 제공합니다."
 edict_subsidized_identity_backups_effect: "$MOD_LEADER_LIFESPAN_ADD$: §G+20년§!\n$MOD_LEADER_SPECIES_EXP_GAIN$: §G+10%§!"
 concept_edict_subsidized_identity_backups: "$edict_subsidized_identity_backups$"
 edict_optimized_identity_creation: "인격 생성 최적화"
 edict_optimized_identity_creation_desc: "최첨단 인격 알고리즘과 핵심 기억 압축 기술로 인격 생성 속도를 개선합니다."
 concept_edict_optimized_identity_creation: "$edict_optimized_identity_creation$"
 ### EVENTS ###
 synth.social_consequences.tt: "현재 진행 중인 §Y합성체 사회 전환§!에 영향을 줍니다.\n\n" #Standard tooltip to indicate that the Physical/Virtual focus variables has changed
 #FIRST EVENT #
 #DEMOCRATIC
 synth.505.name: "$synthshock_chain_title$"
 synth.505.desc: "정부 차원의 노력을 통해, 희망하는 모든 시민의 의식을 디지털 형태로 전환했습니다. 합성체 전환으로 지금은 상상조차 할 수 없는 길이 열려, 새로운 도전과 가능성을 만나게 될 것입니다.\n\n현실 세계 개선에 역량을 집중하면, 디지털화된 우리의 의식을 먼 거리에 준비해 둔 새로운 신체로 전송할 수 있습니다. 아니면 대용 신체를 원격으로 조종하는 병사들을 만들어 전쟁의 엄혹함을 완화할 수도 있습니다."
 synth.505.a: "자유로운 이동에 역량을 집중해야 합니다."
 synth.505.a.tt: "재정착과 지구 관리에 주력합니다."
 synth.505.b: "전쟁의 참상에 대응해야 합니다."
 synth.505.b.tt: "전쟁 피로도와 아광속 이동에 주력합니다."
 #OLIGARCHIC
 synth.510.name: "$synthshock_chain_title$"
 synth.510.desc: "합성체 전환은 이미 우리가 결코 예상할 수 없었을 방식으로 우리 사회에 영향을 줬습니다. 그리고 여기서 더 나아갈 수도 있다는 분위기가 사회 전체에 퍼져 있습니다. 우리가 지금 사용하고 있는 합성 신체를 개선하거나, 아예 버리고 완전한 가상의 존재가 될 수 있다는 것입니다.\n\n모든 국민에게 합성 신체를 보급할 경우, 정부 공직자 중 능률이 떨어지는 직원의 몸을 다른 공직자가 임시로 제어할 수 있을 것입니다. 또 다른 방법으로는 신체를 맞춤형으로 개조하는 대신 아예 가상의 집단적 존재가 되어, 그 어느 때보다 효율적으로 결정을 이행할 수 있도록 할 수도 있습니다."
 synth.510.a: "저성과자 신체 제어에 집중합시다."
 synth.510.a.tt: "관료들의 능률화에 주력합니다."
 synth.510.b: "완전한 가상 전환의 방안을 연구합시다."
 synth.510.b.tt: "시행령과 제국 크기에 주력합니다."
 #DICTATORIAL
 synth.515.name: "$synthshock_chain_title$"
 synth.515.desc: "전인구의 완전한 합성체 전환은 대단한 성공을 거두었고, 유기체였던 시절은 이제 역사 속의 먼지가 되었습니다. 그러나 앞으로의 길을 개척하려면 §Y[From.GetRulerName] [From.GetRulerTitle]§!(은)는 우리 제국 최고 석학들의 무조건적인 복종을 확보해야 할 뿐만 아니라 한 가지 결정을 내려야 합니다.\n\n우리가 사용하고 있는 합성 신체를 개선하면, 한 명이 다수의 신체를 동시에 제어할 수 있을지도 모릅니다. 아니면 물리적 공간을 완전히 벗어나 순수한 가상 환경에서 여론을 조작할 수도 있습니다."
 synth.515.a: "신경 동기화 육체에 집중하세요."
 synth.515.a.tt: "노동자 및 지구에 주력합니다."
 synth.515.b: "가상 여론 조작에 초점을 맞춥시다."
 synth.515.b.tt: "건물과 정부 윤리관에 주력합니다."
 #IMPERIAL
 synth.520.name: "$synthshock_chain_title$"
 synth.520.desc: "합성체 전환으로 인해 이미 우리 제국은 예상하지 못했던 변화를 맞이했지만, 국민들은 더 나아갈 각오가 되어 있는 듯합니다. 우리가 사용하고 있는 합성 신체는 우리 인격의 연장이 될 수도 있고, 우리가 가상 세계에서 원격으로 제어하는 단순한 도구가 될 수도 있습니다.\n\n따라서 의식을 하나의 신체에서 다른 신체로 빠르게 전송하는 방법을 연구할 수도 있고, 최근에 사망한 자의 지식을 추출해 연구 속도를 높이는 데 집중할 수도 있습니다."
 synth.520.a: "사망자로부터 지식을 추출하는 법을 조사하세요."
 synth.520.a.tt: "지도자와 연구에 주력합니다."
 synth.520.b: "고속 의식 전송을 연구하세요."
 synth.520.b.tt: "지상군과 함선에 주력합니다."
 #CORPORATE
 synth.525.name: "$synthshock_chain_title$"
 synth.525.desc: "우리 사회 전체의 합성체 전환에는 심층적인 위험 편익 분석이 필요합니다. 우리는 새롭고 수익성이 넘치며 아직은 미지의 영역이기도 한 합성체의 미래에 접어들고 있지만, 그와 동시에 물질에 초점이 맞춰진 기존의 고객 기반에서 탈피하고 있기도 합니다. 이상적으로 생각해 보면, 두 부문 모두 일정한 정도로는 유지하는 것이 바람직합니다.\n\n인공 지능과 같은 합성체 전환 관련 분야가 발전하면서, 생명이 없는 물체에 기초적이나마 생명을 불어넣고 다수의 제품 라인을 동시에 출시할 수 있게 되었습니다. 아니면 가상 공간을 더욱 치밀하게 탐구해, 주민들의 기억을 새로운 형태의 상품으로 활용할 수도 있을 것입니다."
 synth.525.a: "인공 지능 연계를 연구하세요."
 synth.525.a.tt: "생산과 수익에 주력합니다."
 synth.525.b: "기억을 이용한 수익 창출을 연구합시다."
 synth.525.b.tt: "무역과 상품, 정보에 주력합니다."
 ### EVENT POOL 1: IDENTITY ###
 synth.610.name: "합성체 기원"
 synth.610.desc: "합성체 전환으로 인해 촉발된 근본적인 사회 변화를 국민들이 체감하기 시작했습니다. 더 이상 육신의 제약을 받지 않는 우리는 성별, 인종, 신체적 자율 등의 범주를 획기적으로 다시 정의했습니다. 이러한 변화를 두고 어떤 이들은 해방감을 느끼지만, 보다 전통을 고수하는 이들은 기존의 틀에서 벗어나기를 꺼리며, 행동의 기반이 될 사전 설정된 정체성을 바라고 있습니다.\n\n이들을 달래기 위해, 합성체 형태에 유기체 시절의 요소를 일부 보존할 수 있습니다. 아니면 국민들이 정체성을 더욱 자유롭게 표현할 수 있게 두는 것이 좋을 수도 있습니다."
 synth.610.a: "기존 형태를 유지하세요."
 synth.610.b: "신체 개조를 무제한 허용합시다."
 synth.610.c: "정체성 개조에 적절한 제한을 둡시다."
 synth.610.d: "자신의 신분을 보여 주는 표식은 유지해야 합니다."
 synth.610.e: "당연히 이것도 수익 창출이 되겠지요...?"
 synth.620.name: "유기체 선망"
 synth.620.desc: "합성체에 매력을 느끼지 못하는 일부 국민이 유기체였던 자신들의 과거를 회상하며 갈망하고 있습니다. '자연 그대로의 육신'은 수명이 더 짧고 어쩔 수 없는 한계가 있었지만, 그 때문에 삶이 더욱 의미 있었다고 합니다.\n\n이에 어떤 강경론자 집단이 합성체나 가상 사본은 인격이 없고 공허하게 느껴진다고 주장하며, 유기 신체를 숭상하는 일종의 유사 종교 단체를 형성하고 있습니다.\n\n이들이 거주할 수 있는 불완전한 버전의 시뮬레이션을 마련하는 게 좋을지도 모르겠습니다. 아니면 불완전한 육체를 주는 편을 선호할지도 모릅니다"
 synth.620.a: "의도적으로 불완전한 합성 신체를 만드세요."
 synth.620.b: "불완전한 세상을 마련해 줍시다."
 synth.620.c: "과거를 미화하다니 어리석군요."
 synth.620.d: "고통을 주면 자신들의 목적을 기억해 내겠죠."
 synth.620.d.tt: "가상 대전을 시작합니다!\n\n"
 synth.630.name: "홈 서버 아키텍처"
 synth.630.desc: "§Y[root.GetSpeciesAdj]§! 종족 전체를 합성체로 전환하면서 주거 방식에도 급격한 변화가 찾아왔습니다. 합성 신체는 선반에 보관하는 동안 의식은 초거대 서버 팜에서 안락한 삶을 누릴 수 있으니 말입니다. 이러한 방식은 비용 면에서 효율적이지만, 일부 압력 단체에서 아주 현실적인 우려를 제기하고 있습니다.\n\n한때 막대한 수익원이었던 부동산 시장이 완전히 붕괴해, 경제에 상당한 타격을 줄 수 있다는 겁니다. 또한 집이라 부를 실제 공간이 없어진 국민들이 느끼는 상실감이, 적어도 심리적인 측면에서는 더욱 심각한 문제로 부상 중입니다."
 synth.630.a: "중앙 집중형 서버가 가장 효율이 좋지요."
 synth.630.b: "기존 주택에 개별 서버를 두면 되겠네요."
 synth.630.c: "디지털 주택을 판매합시다."
 ### EVENT POOL 2: POSSIBILITIES ###
 synth.1010.name: "무한 가능성 매트릭스"
 synth.1010.desc: "디지털 산업이 호황입니다. 1인칭 시뮬레이션 모험의 스릴부터 디지털 리조트에서의 휴식까지, 소비자들은 다양한 가상 오락에 몰입하고... 중독되고 있습니다. 이 신생 산업은 경제 성장의 원동력이 되었지만, 국민들이 디지털 유토피아에서 보내는 시간이 늘어남에 따라 실제 세계에서의 생산은 타격을 받았습니다. 일부는 '실제' 생활과의 접점을 잃을 위험까지 있지만, 디지털 경제에 참여하면 사회에 계속 보탬이 될 수 있을 것입니다.\n\n중독성 있는 가상 세계 서비스를 금지해야 할까요, 엄청난 수익을 안겨 줄 새로운 형태의 오락 거리로 홍보해야 할까요? 아니면 규제를 통해 그 중간 지점을 찾아야 할까요?"
 synth.1010.a: "지속적인 중독을 초래하는 가상 공간을 금지합시다."
 synth.1010.b: "가상 낙원으로 홍보하세요."
 synth.1010.b.hedonist: "드디어 궁극의 낙원이 생겼군!"
 synth.1010.c: "가상 오락 산업을 규제하세요."
 synth.1020.name: "합성체 의학"
 synth.1020.desc: "새로 생긴 합성 신체 덕분에 우리는 유기 신체를 괴롭히던 질병과 부상에서 벗어났습니다. 하지만 안타깝게도 단순한 기계 고장이나 생명을 위협하는 서버 불안정은 물론이고, 연결 문제나 디지털 바이러스까지 다양한 문제가 새로 대두되고 있습니다.\n\n이제 육신은 처분 가능한 재화로 간주하고 우리의 디지털 정신을 보호하는 데 집중해야 할까요? 아니면 합성 신체 또한 우리 정체성의 연장선이라고 간주하고 계속 관심을 기울여야 할까요?"
 synth.1020.a: "육신은 계속 보호해야 합니다."
 synth.1020.a.spiritual: "육신은 영혼을 담는 신성한 그릇입니다."
 synth.1020.b: "정신 보호에 집중합시다."
 synth.1020.b.spiritual: "우리는 이미 육신의 형태를 초월했습니다."
 synth.1020.c: "핵심은 균형입니다."
 synth.1020.d: "이 새로운 질병은 엄청난 성장 잠재력을 지니고 있군요..."
 synth.1030.name: "리스폰"
 synth.1030.desc: "우리는 더욱 빨라졌고, 나아졌고, 강해졌습니다. 그러나 아무리 합성 신체라고 하더라도 위험한 상황에 놓이게 되면 정신적인 영향을 받게 됩니다. 의식을 복원할 수 있다는 점을 인식하면 정신적 외상이 덜하겠지만, 영향이 전혀 없는 것은 아닙니다. 무엇보다 의식 회수가 확실히 보장되는 것은 아니니 말입니다. 새로운 신체 또한 허공에서 저절로 만들어지는 것이 아닙니다.\n\n이에 심리적 외상을 무시하고 합성체의 활동 범위를 넓히거나, 우리 국민의 정신적 건강이 위험에 빠지지 않도록 우리의 목표를 조절할 수도 있습니다."
 synth.1030.a: "계속 한계를 넓히세요."
 synth.1030.b: "신중하게 접근합시다."
 synth.1030.c: "사회 지도층을 위험에 빠뜨릴 수는 없지요."
 #FINAL EVENT #
 synth_virtual_trait: "\n[owner.species.GetNamePlural] 특성 획득: §Y$trait_robot_digital_1$§!\n지도자의 §Y$leader_trait_synthetic$§! 특성이 §Y$leader_trait_virtual$§! 특성으로 대체"
 synth_physical_traits: "\n종족 변형을 위한 §Y진보된§! 특성 잠금 해제"
 #DEMOCRATIC
 synth.1505.name: "합성체 전환 사회"
 synth.1505.desc.physical: "우리는 개별성을 완전히 삭제하려는 것이 아닙니다. 우리 자아를 영영 없애지 않아도 합성체 전환의 혜택을 누리는 것은 가능하기 때문입니다.\n\n합성체 전환으로 이동의 자유가 그 어느 때보다 확대되었습니다. 이제 우리의 의식을 특성화된 육체에 대량으로 전송할 수 있게 된 덕분에, 모든 주민이 자신을 가장 필요로 하는 곳에서 살고 일할 수 있게 되었습니다."
 synth.1505.desc.virtual: "육신의 세계에서 벗어나 미래를 바라보는 우리의 마음에는 흥분과 두려움이 섞여 있습니다. 우리는 우리도 이해 못 할 방식으로 스스로를 변화시켰지만, 이 중대한 여정에는 모두가 동참할 것입니다.\n\n이제 우리 국민들은 의식을 위험에 빠뜨리는 일 없이 기계와 우리 자신을 연결할 수 있습니다. 이로써 위험천만한 전장이나 비정한 우주 공간을 누비는 방식이 획기적으로 변화하게 되었습니다."
 synth.1505.desc.neutral: "이해하기 힘든 변화 앞에서 주저하는 것은 어찌 보면 당연한 일입니다. 많은 국민들이 이번 변화로 얻는 것보다 잃는 것이 많지 않을까 걱정하고 있습니다. 하지만 미래를 향한 갈림길에서 머뭇거릴 수만은 없습니다. 국민들을 이끌고 앞으로 나아가야 합니다.\n\n방법은 두 가지입니다. 분야별로 특성화된 개인용 신체를 다양하게 제작해 국민들이 마음대로 전환하게 할 수 있습니다. 아니면 합성체로 전환된 현재의 모습을 완전히 받아들여 우주여행과 전쟁의 험난함에 대응할 수도 있습니다."
 synth.1505.a: "신체 간 전송을 더욱 수월하게 만듭시다."
 synth.1505.a.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_physical'] $synth_physical_traits$"
 synth.1505.b: "대용 신체를 이용해 대신 싸우게 합시다."
 synth.1505.b.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_virtual'] $synth_virtual_trait$"
 synth.1505.c: "$synth_keep_auth_option$"
 synth.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 synth.1510.name: "합성체 전환 사회"
 synth.1510.desc.physical: "전 사회의 합성체 전환, 합성 신체의 개선, 그리고 국민의 전반적인 여론, 이 모든 요소가 훨씬 보수적인 방향의 합성체 전환을 가리키고 있습니다. 맞춤형 신체를 유지하는 동시에, 신체를 마음대로 바꿀 수 있도록 하는 것입니다.\n\n이 경우, 능률이 떨어지는 공직자들의 신체를 경험이 더 많은 공직자들이 제어함으로써 관리 성과를 현저하게 높일 수 있을 것입니다."
 synth.1510.desc.virtual: "이제 우리는 완전한 가상 존재로의 전환이라는 합성체 전환 혁명의 다음 단계로 나아갈 준비가 되었습니다.\n\n실제 세계에서는 임시 신체가 각종 작업을 수행하지만, 대부분의 주민은 비육체적인 상태로 전환하고자 합니다.\n\n그렇게 된다면 각종 명령을 더욱 신속하고 효율적으로 수행할 수 있을 것이며, 정부의 감독 필요도 훨씬 줄어들 것입니다."
 synth.1510.desc.neutral: "이제 우리 사회의 모든 부문에 대한 합성체 전환을 마쳤습니다. 하지만 여기에서 더 나아가 특성화를 진행할 경우 어떤 이득을 얻게 될 것인지에 대해서는 확실한 자료가 없습니다.\n\n지금으로써는 감독관이 능률이 떨어지는 부하의 신체를 장악할 수 있게 하는 인격 백도어를 설치할 수 있고, 아니면 감독관이 지연 없이 다양한 정부 사업을 동시에 관리 감독할 수 있도록 네트워크 가상 인터페이스를 개발할 수도 있을 것입니다."
 synth.1510.a: "공직자들이 능률이 떨어지는 부하를 조종할 수 있게 하세요."
 synth.1510.a.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_physical'] $synth_physical_traits$"
 synth.1510.b: "완전한 가상 관리 감독을 도입하세요."
 synth.1510.b.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_virtual'] $synth_virtual_trait$"
 synth.1510.c: "$synth_keep_auth_option$"
 synth.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 synth.1515.name: "합성체 전환 사회"
 synth.1515.desc.physical: "우리 국민들은 정직한 육체노동을 피하지 않습니다. 이제 모든 노동자가 네트워크로 연결되어 다수의 신체를 원격으로 조종할 수 있게 되었으며, 그 결과 생산 할당량이 현저하게 증가했습니다.\n\n이번 변화는 최고로 존엄하신 지도자 §Y[From.GetRulerName] [From.GetRulerTitle]§!께 우리가 신뢰를 보내야 마땅하다는 점을 명백히 보여 주고 있습니다."
 synth.1515.desc.virtual: "이제 우리 국민들은 육신의 형태를 버리고 디지털 의식을 받아들일 준비가 되었으며, 앞으로는 완전한 가상 환경에서 살아가고자 합니다.\n\n이렇게 국민들이 실제 세계에 대한 지각을 스스로 버리게 함으로써, 우리는 이들이 살고 있는 현실을 자유롭게 조작해 국가에 대한 긍정적인 감정을 증폭할 수 있게 되었습니다. 지도자와 마음이 일치하는 국민이야말로 강력한 국가의 초석입니다."
 synth.1515.desc.neutral: "§Y[root.GetSpeciesAdj]§! 국민들이 아직도 디지털화된 우리의 의식이 취해야 할 형태를 결정하지 못하고 있습니다. 보수적인 이들은 우리가 육신에 깊이 뿌리를 내려야 한다고 주장하지만, 다른 이들은 옛것과 새것이 공존하는 이런 '반쪽짜리 조치'에 반감을 드러냈습니다.\n\n이제 그 결정은 우리에게 달렸습니다. 실존하는 신체에 집중할 경우 노동자 한 명이 다수의 신체를 조종하게 할 수 있으며, 가상의 존재로 전환할 경우 전에 없던 규모의 사회 통제가 가능해집니다."
 synth.1515.a: "신경 동기화 노동자 신체를 개발하세요."
 synth.1515.a.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_physical'] $synth_physical_traits$"
 synth.1515.b: "가상 공간에서 여론을 조작하세요."
 synth.1515.b.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_virtual'] $synth_virtual_trait$"
 synth.1515.c: "$synth_keep_auth_option$"
 synth.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"
 #IMPERIAL
 synth.1520.name: "합성체 전환 사회"
 synth.1520.desc.physical: "우리 새로운 합성 신체의 강화 방안이 제국 각지에서 각광받고 있습니다.\n\n이 새로운 형태에서는 사망한 지 얼마 되지 않은 엘리트층의 양전자 두뇌를 해체해 각인된 지식을 확보할 수 있습니다. 제국을 섬기는 이들이었으니, 이들도 바라는 바일 것입니다."
 synth.1520.desc.virtual: "머나먼 미래까지 여파를 남길 중대한 사건이 일어났습니다. §Y[From.GetSpeciesAdj]§! 주민들이 실제 세계에 어중간하게 머무는 것에 그치치 않고, 아예 가상 존재가 되는 길을 선택한 것입니다. 인격 전송 속도와 범위를 강화하면, 각종 위험 임무에서 합성 신체가 파괴될 경우 빠르게 대체품을 투입할 수 있습니다.\n\n이러한 변화는 다양한 전시 상황에서 효율성을 높이고, §Y[From.GetSpeciesAdj]§! 제국에 영광을 가져다줄 것입니다!"
 synth.1520.desc.neutral: "§Y[From.GetSpeciesAdj]§! 제국은 갈림길에 서 있습니다. 어떤 이들은 맞춤형 신체가 우리에게 안정과 익숙함을 보장해 줄 것이라고 하는 반면, 다른 이들은 합성체 전환과 그 모든 이점을 최대한 활용해야 한다고 주장합니다.\n\n신체에 집중할 경우, 파괴된 지 얼마 되지 않은 고위 개체의 지식을 연구 사업에 활용할 수 있을 것입니다. 이와 다르게 가상 존재가 되는 길을 선택하면, 파괴된 합성 신체를 신속한 인격 전송을 통해 대량으로 대체할 수 있습니다."
 synth.1520.a: "사망한 지도자의 정신을 활용합시다."
 synth.1520.a.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_physical']"
 synth.1520.b: "일회용 신체를 개발하세요."
 synth.1520.b.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_virtual']"
 synth.1520.c: "$synth_keep_auth_option$"
 synth.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 synth.1525.name: "합성체 전환 사회"
 synth.1525.desc.physical: "우리 마케팅부와 연구 개발부에서 고객 기반 전체에 적용할 수 있는 혁신적인 인공 지능 기술을 개발했습니다. 이 기술을 활용해 새로운 합성 존재에 대한 균형 잡힌 접근 방식을 취하면, 가상 세계를 활용해 실제 세계에 도움을 주는 제품을 개발할 수 있습니다.\n\n이제 우리는 생명이 없는 물체에 제한적인 AI를 주입해 실질적으로 생명을 불어넣을 수 있습니다. 이 새로운 제품군은 은하계 전체의 다양한 소비자는 물론, 민간 부문 및 그 밖의 이해관계자를 대상으로 판매할 수 있을 것입니다."
 synth.1525.desc.virtual: "가상 공간 발전에 전념한 결과, 기억을 활용하는 완전히 새로운 제품군이 등장했습니다. 우리 지사에 있는 기술자들이 표현형에 상관없이 모든 자발적 참가자로부터 기억을 추출할 수 있게 된 것입니다.\n\n이렇게 확보한 기억을 첩보 부서를 통해 철저히 조사하면, 해당 분야에서 다른 제국에 대한 경쟁 우위를 점할 수 있습니다. 그렇게 분석을 거친 기억은 합성체 의식 생성 공정에 투입되며, 이를 통해 상당한 성과 향상을 기대할 수 있습니다."
 synth.1525.desc.neutral: "철저한 비용 편익 분석에도 불구하고, 합성체 전환 과정에서 신체와 가상 공간 중 어느 쪽으로 특성화를 진행해야 할지 확실한 결론이 나오지 않고 있습니다. 그러나 지금과 같은 기회를 앞두고 그저 바라만 볼 수는 없습니다. 이해관계자들에게 명확한 하나의 발전 방향을 제시해야 합니다.\n\n실제 세계에 주력하면, 생명이 없는 물체에 제한적인 AI를 주입함으로써 단순한 형태의 새로운 생명체로 만들고 판매할 수 있습니다. 가상 영역에 투자할 경우, 기억과 사고 패턴을 상품화할 수 있습니다."
 synth.1525.a: "제한적 AI 생명체를 보급합시다."
 synth.1525.a.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_physical'] $synth_physical_traits$"
 synth.1525.b: "국민의 기억을 상품화하세요."
 synth.1525.b.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_virtual'] $synth_virtual_trait$"
 synth.1525.c: "$synth_keep_auth_option$"
 synth.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"
