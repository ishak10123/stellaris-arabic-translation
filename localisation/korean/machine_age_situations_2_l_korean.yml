l_korean:
 ### DIGITIZATION SITUATION START ###
 situation_digitization: "합성체 전환"
 situation_digitization_type: "승격 상황"
 situation_digitization_desc: "결함 있는 유기 신체를 떠날 때가 찾아왔습니다. 이제 첨단 기계 신체를 준비하고 의식 전송 절차를 시작해야 합니다.\n\n§Y다음 달 디지털화되는 팝§!: §G[From.GetSynthPopsPerMonth]§!"
 situation_digitization_monthly_change_tooltip: "우리의 의식은 디지털로 전환되고, 우리의 몸은 기계가 될 것입니다."
 situation_digitization_outcome: "인구 전체가 합성체가 됩니다."
 stage_digitization_effects: "우리는 두뇌의 디지털 버전을 설계하고 기계 신체를 구축함으로써 우리 자신을 변화시켜야 합니다."
 #Approach Error Correcting
 situation_digitization_errorcorrecting: "오류 보정"
 approach_digitization_errorcorrecting_tt: "유리한 이벤트 발생 확률 증가\n$situation_speed_tt$: §R-20%§!"
 situation_digitization_errorcorrecting_approach_tt: "$situation_digitization_errorcorrecting$ $situation_approach_tt$"
 #Approach Real Time
 situation_digitization_realtime: "실시간"
 approach_digitization_realtime_tt: "$situation_speed_tt$: §Y변경 없음§!"
 situation_digitization_realtime_approach_tt: "$situation_digitization_realtime$ $situation_approach_tt$"
 #Approach Overclocked
 situation_digitization_overclocked: "오버클럭"
 approach_digitization_overclocked_tt: "까다로운 이벤트 발생 확률 증가\n$situation_speed_tt$: §G+20%§!"
 situation_digitization_overclocked_approach_tt: "$situation_digitization_overclocked$ $situation_approach_tt$"
 situation_num_identity_complex_tt: "$building_identity_complex$"
 situation_digitization_ongoing_desc: "합성체 전환 진행 중"
 situation_digitization_pause_desc: "$situation_cyberization_pause_desc$"
 situation_identity_complex_needed_desc: "£trigger_no£ 활성화된 $building_identity_complex$ 없음"
 synth_positive_media_coverage_tt: "긍정적 언론 보도"
 synth_negative_media_coverage_tt: "부정적 언론 보도"
 biological_pop: "£pop£ 생체 팝"
 biological_pops: "£pop£ 생체 팝"
 mechanical_pop: "£pop£ 기계식 팝"
 mechanical_pops: "£pop£ 기계식 팝"
 pop_is: "(이)가"
 pops_are: "(이)가"
 #Buildings
 building_identity_complex: "인격 개발 단지"
 building_identity_complex_desc: "합성 인격을 연구하고 개발하기 위한 최첨단 허브입니다."
 building_identity_complex_speed: "£pop£ §H팝§! §G+100§!"
 building_identity_complex_effect_desc: "매월 $building_identity_complex_speed$이 업로드됩니다."
 building_ai_emporium: "AI 엠포리엄"
 building_ai_emporium_desc: "인공 지능에 관해서라면 무엇이든 찾을 수 있는 초대형 원스톱 복합 상점입니다. 지성체 AI를 이용해 일상 속의 물건을 가족용 또는 사업용 스마트 비서로 만들어 보세요. AI가 자의식이 너무 강해서 골치가 아프시다고요? AI 엠포리엄으로 가져오시면 전문 정비사들이 아광속보다 빠르게 초기화해 드립니다."
 building_ai_emporium_fail_tt: "$TRIGGER_FAIL$이미 §Y[planet.owner.GetName]§!에는 §Y$building_ai_emporium$§!이 존재합니다"
 building_ai_emporium_outlawed_robots_tt: "$TRIGGER_FAIL$§Y[planet.owner.GetName]§!에서 로봇을 금지했습니다"
 building_clear_thought_clinic: "기억 청소 시술소"
 building_clear_thought_clinic_desc: "더 이상 필요 없는 기억이 있으신가요? 에너지 크레딧으로 바꾸세요! 숙련된 저희 직원들이 안전하게, 보안 걱정 없이 제거해 드립니다! 즐거운 기억일수록 금액도 커집니다!\n\n이 시술은 비가역적 시술로, 추출한 사고 패턴은 복구가 불가능합니다."
 clear_thought_clinic_modifier: "$building_clear_thought_clinic$"
 clear_thought_clinic_tt: "비중첩 첩자망 보정치: $TABBED_NEW_LINE$$MOD_SPY_NETWORK_DAILY_VALUE_MULT$: §G+25%§! $TABBED_NEW_LINE$$MOD_SPY_NETWORK_LEVELS_ADD$: §G+10§!"
 #Jobs
 m_pop_assembly: "£mod_planet_pop_assembly_add£ §Y$MOD_PLANET_POP_ASSEMBLY_ADD$§!"
 job_identity_designer: "인격 설계사"
 job_identity_designer_plural: "인격 설계사"
 job_identity_designer_plural_with_icon: "£job_identity_designer£ $job_identity_designer_plural$"
 job_identity_designer_converter_desc: "$job_identity_designer_plural$는 생체 인격에서 디지털 인격으로의 전환을 수월하게 해, 전이 과정을 고통 없이 완료하게 해 줍니다."
 job_identity_designer_converter_effect_desc: "$job_identity_designer_plural_with_icon$는 $i_engineering$ 및 $i_amenities$를 생산합니다."
 job_identity_designer_desc: "$job_identity_designer_plural$는 새로운 합성체 의식을 정교하게 만듭니다."
 job_identity_designer_effect_desc: "$job_identity_designer_plural_with_icon$는 $i_engineering$, $i_amenities$ 및 제국 전역의 $m_pop_assembly$을 생산합니다."
 mod_job_identity_designer_add: "$job_identity_designer$ 직업"
 job_roboticist_plural_and_job_identity_designer_plural: "[roboticist.GetNamePlural] 및 $job_identity_designer_plural$"
 job_roboticist_plural_with_icon_and_job_identity_designer_plural_with_icon: "$job_roboticist_plural_with_icon$ 및 $job_identity_designer_plural_with_icon$"
 councilor_ruler_imperial_synth: "$imperial_ruler$"
 councilor_ruler_imperial_synth_desc: "$imperial_ruler_desc$"
 #Traits
 #Modifiers
 synth_opposition_truth: "합성체 전환 정보 캠페인"
 synth_opposition_truth_desc: "합성체 전환 전반에 관한 진실한 정보를 널리 알립니다."
 synth_opposition_deception: "합성체 전환 조작 캠페인"
 synth_opposition_deception_desc: "합성체 전환이 지닌 긍정적인 면을 강조하는 방향으로 공적 내러티브를 형성합니다."
 synth_tinkering_with_minds: "의식 조작"
 synth_tinkering_with_minds_desc: "새로 디지털화를 마친 의식에 적정한 재프로그래밍을 수행해, 미래를 향한 우리의 비전과 조화를 이루게 합니다."
 synth_brightest_minds: "능력자 우선 선발"
 synth_brightest_minds_desc: "국민 중에서 가장 능력이 탁월한 자를 선발해 합성체 전환 프로그램에 참여하게 합니다."
 synth_reprogram_minds: "억압적 재프로그래밍"
 synth_reprogram_minds_desc: "이 정부는 디지털화 대상자 중 '부적합' 개체들에 대대적인 재프로그래밍을 실시하고 있습니다."
 victim_compensation: "피해자 보상"
 victim_compensation_desc: "합성체 전환 중 의식을 상실한 이들의 유족에게 보상을 지급합니다."
 synth_mandatory_volunteers: "강제 자원"
 synth_mandatory_volunteers_desc: "대상자를 생체 의식 디지털화 실험에 강제로 참여하게 합니다."
 synth_mass_demonstrations: "대규모 시위"
 synth_mass_demonstrations_desc: "이 행성의 노동자들은 기계 전환 계획에 반기를 들고 대규모 시위에 나섰습니다."
 synth_fund_heritage_sites: "문화유산 자금 지원"
 synth_fund_heritage_sites_desc: "특수한 문화유산을 만들어, 우리 종족의 생체 구성원들이 합성체 전환으로 받는 영향을 줄입니다."
 synth_revere_the_past: "과거 숭배"
 synth_revere_the_past_desc: "우리의 유기 신체에서 비롯된 종교 의식은 여전히 우리에게 중요한 의미를 지니며, 숭배가 이루어지는 장소 또한 마땅히 보전해야 합니다."
 synth_preserve_the_past: "과거 보전"
 synth_preserve_the_past_desc: "우리가 완전히 새로운 존재로 거듭났다고 해도 유기체 시절의 과거에 의미를 주었던 장소와 유물까지 없애야 하는 것은 아닙니다."
 synth_resistance_fight: "저항 세력 주동자 검거"
 synth_resistance_fight_desc: "기계 분대를 $d_biological_enclaves_no_icon$에 투입해 저항 세력의 주동자를 검거함으로써 반대 세력을 빠르게 진압합니다."
 synth_resistance_diplomacy: "저항 세력 주동자 회담"
 synth_resistance_diplomacy_desc: "$d_biological_enclaves_no_icon$에서 저항 세력의 주동자와 만나, 상호 이해를 증진합니다."
 synth_character_force: "옛 유기체 형태 모방"
 synth_character_force_desc: "우리 종족의 기존 형태를 디지털 공간에 보전합니다."
 synth_character_customize: "합성 신체 개조 자유화"
 synth_character_customize_desc: "개개인이 자신의 디지털 외모를 자유롭게 바꿀 수 있도록 합니다."
 synth_character_customize_elite: "합성 신체 개조 제한"
 synth_character_customize_elite_desc: "사회적 위계를 명확히 드러내기 위해, 오직 상위 계층만 외모를 자유롭게 바꿀 수 있도록 합니다."
 synth_character_customize_corpo: "합성 신체 개조 수익 창출"
 synth_character_customize_corpo_desc: "자유롭게 디지털 외모를 바꿀 수 있도록 합니다. 단, 대가를 지불할 수 있다는 전제하에 말이죠."
 synth_cravings_imperfections: "합성체 고의 결함"
 synth_cravings_imperfections_desc: "공허하고 비인격적인 존재가 되지 않도록, 합성 신체에 의도적으로 결함을 추가합니다."
 synth_cravings_simulation: "인생은 시뮬레이션"
 synth_cravings_simulation_desc: "시뮬레이션 속에서 살아가는 길을 선택한 국민들을 위해, 실제와 되도록 가까운 삶을 구축하려 노력합니다. 온갖 역경도 포함해서 말이죠."
 synth_cravings_stop: "유기체 강경파 무시"
 synth_cravings_stop_desc: "시간이 지나면, 유기체가 겪는 어려움에서 벗어나 완벽하게 조율된 삶에 모든 국민이 감사하게 될 것입니다."
 synth_cravings_pain: "가상 격투장"
 synth_cravings_pain_desc: "고통이 느껴지는 가상 전투에 몰입하다 보면, 참가자도 관객도 어떤 익숙한 목적을 느끼게 됩니다."
 synth_health_physical: "합성체 신체 건강 중점"
 synth_health_physical_desc: "우리 제국의 합성체 의료 사업이 여기저기에서 발생하는 신체 고장을 해결하는 데 주력합니다."
 synth_health_virtual: "합성체 정신 건강 중점"
 synth_health_virtual_desc: "건강한 삶을 위해서는 지속적인 소프트웨어 업데이트를 통해 정신을 안전하게 지켜야 합니다."
 synth_health_both: "합성체 건강 균형 중점"
 synth_health_both_desc: "소프트웨어와 하드웨어 안정성 문제를 모두 해결해야 국민들이 편해집니다."
 synth_health_corporate: "합성체 의료화"
 synth_health_corporate_desc: "디지털 바이러스를 치료하려면, 무엇보다 우리 기업의 전문 분야를 기존 의료 서비스 너머로 확대해야 합니다."
 synth_virtual_world_outlaw: "가상 세계 금지"
 synth_virtual_world_outlaw_desc: "중독성이 높은 가상 리조트를 사회의 위협으로 규정하고 금지했습니다."
 synth_virtual_world_promote: "가상 세계 홍보"
 synth_virtual_world_promote_desc: "국민들이 디지털 유토피아에서 끝없이 다양한 여흥을 자유롭게 즐길 수 있도록 합니다."
 synth_virtual_world_regulate: "가상 세계 규제"
 synth_virtual_world_regulate_desc: "중독성이 높은 가상 리조트를 엄격히 규제해, 국민들이 현실과의 끈을 유지하게 합니다."
 synth_home_centralized: "중앙 집중형 서버 팜"
 synth_home_centralized_desc: "디지털화된 의식을 국가 소유의 중앙 서버 팜에 저장해 비용 효율성을 극대화합니다."
 synth_home_distributed: "분산형 가정용 서버"
 synth_home_distributed_desc: "디지털화된 의식을 기존의 개인 주거지 안에 저장합니다."
 synth_digital_homes: "디지털 부동산"
 synth_digital_homes_desc: "디지털 부동산은 기존의 주택 시장과 비슷하게 아주 적은 비용으로도 거의 동일한 소득을 제공합니다."
 synth_respawn_push: "합성체 안전 기준 완화"
 synth_respawn_push_desc: "물리적 안전 기준을 완화해 경제 회복력을 높입니다."
 synth_respawn_caution: "합성체 안전 기준"
 synth_respawn_caution_desc: "합성 신체와 그 안의 정신을 지키기 위해서는 정부의 엄격한 지도가 반드시 필요합니다."
 synth_respawn_elite: "합성체 안전 특권"
 synth_respawn_elite_desc: "상위 계층이 신체나 정신에 위험을 줄 만한 작업을 수행하지 못하게 합니다."
 synth_cultural_exchange: "문화적 이해"
 synth_cultural_exchange_desc: "다양한 문화유산 현장에서 문화 교류 프로그램을 진행하면, 국민들 사이의 상호 이해를 증진할 수 있습니다."
 synth_combat_reactors: "전투 반응로"
 synth_combat_reactors_desc: "신형 미세 핵융합 기술을 기계 신체에 추가해, 전투력을 크게 높입니다."
 synth_AI_actor: "AI 대변인"
 synth_AI_actor_desc: "사망한 유명인의 사본에 AI를 융합해, 현재 진행 중인 합성체 전환 계획에 대해 지지를 확보합니다."
 #Deposits
 d_old_towns_no_icons: "구도시"
 d_old_towns: "£blocker£ $d_old_towns_no_icons$"
 d_old_towns_desc: "이 지역은 양호한 상태로 보존된 여러 개의 도시가 주를 이루고 있으며, 각 도시에는 기계화를 거치지 않은 동족이 살고 있습니다. 자원을 투입하면 이 거부자들이 기계화를 받아들이게 할 수 있을지도 모릅니다."
 d_old_towns_custom_tooltip: "§Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§! 생성"
 d_biological_enclaves_no_icon: "생체 엔클레이브"
 d_biological_enclaves: "£blocker£ $d_biological_enclaves_no_icon$"
 d_biological_enclaves_desc: "이 지역에 있는 대부분의 도시는 합성체 전환을 거부한 이들이 거주하고 있습니다."
 d_biological_enclaves_custom_tooltip: "§Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§! 생성"
 #Policies
 policy_synthetic_identities_policy: "합성 인격"
 policy_synthetic_identities_policy_desc: "새로운 합성 인격을 만들어야 우리 인구가 더욱 성장할 수 있습니다."
 identity_copy_name: "인격 사본"
 identity_copy: "$identity_copy_name$"
 identity_copy_desc: "$tech_identity_copy_desc$\n\n인격 사본은 자신이 고유하지 않다는 사실에서 비롯되는 사소한 우울감을 느낄 뿐입니다.\n\n$TECH_UNLOCK_IDENTITY_COPY_DESC$\n\n§E$identity_copy_name$$can_enable_mind_creation$§!"
 identity_fusion_name: "인격 융합"
 identity_fusion: "$identity_fusion_name$"
 identity_fusion_desc: "$tech_identity_fusion_desc$\n\n$TECH_UNLOCK_IDENTITY_FUSION_DESC$\n\n§E$identity_fusion_name$$can_enable_mind_creation$§!"
 identity_initialization_name: "인격 생성"
 identity_initialization: "$identity_initialization_name$"
 identity_initialization_desc: "$tech_identity_initialization_desc$\n\n$TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC$\n\n§E$identity_initialization_name$$can_enable_mind_creation$§!"
 can_enable_mind_creation: "은 합성체를 조립할 때 사용합니다."
 policy_computation_core_allocation: "연산 코어 중점"
 policy_computation_core_allocation_desc: "합성체 전환을 마친 기업은 코어 시스템에서 연산 사이클을 빼돌려, 일체의 지연 없이 고가치 사회 부문을 최적화할 수 있습니다."
 computation_core_production_name: "생산 간소화"
 computation_core_production: "$computation_core_production_name$"
 computation_core_production_desc: "여분의 처리 사이클을 이용해 생산 공정을 간소화합니다.$computation_core_production_tt$"
