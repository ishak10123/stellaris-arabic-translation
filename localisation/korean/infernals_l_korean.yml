 # Councilors
 councilor_infernal_scorcher: "수석 추진자"
 councilor_infernal_scorcher_desc: "$TITLE$는 군대의 사기를 뜨겁게 달궈 군사 작전에 대한 헌신을 유지합니다."
 councilor_thermal_engineer: "열 공학자"
 councilor_thermal_engineer_desc: "$TITLE$는 극도로 뜨거운 환경에서 기반 시설을 건설할 때 발생하는 기술적 난제를 해결해 줄 수 있습니다."
 councilor_corporate_thermal_engineer: "수석 $councilor_thermal_engineer$"
 councilor_corporate_thermal_engineer_desc: "적절한 대가만 지불하면, $TITLE$는 극도로 뜨거운 환경에서 기반 시설을 건설할 때 발생하는 기술적 난제를 해결해 줄 수 있습니다."
 councilor_pyromanic_priest: "화염광 사제"
 councilor_pyromanic_priest_desc: "$TITLE$는 고난을 사랑하라는 가르침을 전해, 방탕한 소비를 줄입니다."
 councilor_imbuement_officer: "의태 감독관"
 councilor_imbuement_officer_desc: "$TITLE$은 동적 고체에 대한 전문 지식을 활용하여 물리학 및 공학 연구를 지원합니다."
 councilor_synth_imbuement_officer: "의태 메인프레임"
 councilor_synth_imbuement_officer_desc: "$TITLE$은 동적 고체에 대한 전문 지식을 활용하여 물리학 및 공학 연구를 지원합니다."
 councilor_corporate_imbuement_officer: "의태 대행 책임자"
 councilor_corporate_imbuement_officer_desc: "$TITLE$는 이해관계자 간 조율을 통해 물리학 및 공학 연구를 촉진합니다."
 # Bombardment Stances
 bombardment_firestorm: "화염 폭풍"
 bombardment_firestorm_desc: "화염 폭풍 폭격은 행성 일부를 불태워, 마치 장엄한 화톳불과 같이 우리의 의지를 다지고 사회를 통합합니다."
 bombardment_seismic_bombing: "지진 융단 폭격"
 bombardment_seismic_bombing_desc: "$bombardment_seismic_bombing$은 행성의 지질을 표적으로 삼아 기반 시설을 파괴하고 지각을 갈라 대규모 화산을 생성합니다."
 # Policies
 orbital_bombardment_devastation: "황폐화"
 orbital_bombardment_devastation_name: "황폐화"
 orbital_bombardment_devastation_desc: "지형을 초토화하는 것을 목표로 삼고 모든 궤도 무기의 사용을 허가합니다.\n\n§E'황폐화' 궤도 폭격 태세를 허용합니다.§!"
 diplo_stance_devastators: "황폐"
 diplo_stance_devastators_desc: "이 제국은 외계 행성을 철저히 황폐화하고자 합니다."
 # Opinion Modifiers
 triggered_infernals_opinion_of_others: "비호열체"
 triggered_infernals_opinion_of_infernals: "동료 호열체"
 # Casus Belli & War Goal
 casus_belli_cb_blaze: "정화의 불길"
 war_goal_wg_blaze: "황폐화"
 war_goal_wg_blaze_desc: "불로 은하계를 정화하기 위한 전쟁입니다. 모든 반대 세력은 정당한 표적이 될 것입니다."
 # Personalities
 personality_scorching_infernals: "불타는 파괴자"
 personality_scorching_infernals_desc: "$personality_scorching_infernals$는 외계 행성을 파멸적인 불의 의식을 치르기에 더할 나위 없이 좋은 장소로 여깁니다. 이들이게 현지 지성체란 사소한 방해물에 불과합니다."
 # Melting District Deposits
 d_volcanic_ore_veins: "화산 광맥"
 d_volcanic_ore_veins_desc: "갓 식은 화산 광맥은 풍부한 광석 자원을 제공합니다."
 d_volcanic_rich_mountain: "화산 $d_rich_mountain$"
 d_volcanic_rich_mountain_desc: "$d_rich_mountain_desc$"
 d_volcanic_mineral_fields: "화산 $d_mineral_fields$"
 d_volcanic_mineral_fields_desc: "$d_mineral_fields_desc$"
 d_volcanic_ore_caverns: "화산 $d_ore_rich_caverns$"
 d_volcanic_ore_caverns_desc: "$d_ore_rich_caverns_desc$"
 d_volcanic_mineral_layers: "화산 광물층"
 d_volcanic_mineral_layers_desc: "고대의 지질 활동으로 탄생한 풍부한 광물층이 지표면 깊숙이 묻혀 있습니다."
 d_volcanic_weak_crust: "취약한 지각"
 d_volcanic_weak_crust_desc: "이전의 분화로 기반 지각판이 으스러져, 광물이 풍부한 광맥까지 훨씬 쉽게 시추할 수 있게 되었습니다."
 d_volcanic_mineral_hills: "광석 매장 구릉지"
 d_volcanic_mineral_hills_desc: "멀리서 희미하게 반짝이는 빛이 이 구릉지 아래에 풍부한 광석이 매장되어 있음을 알려 줍니다."
 d_volcanic_lava_river: "용암 강"
 d_volcanic_lava_river_desc: "따뜻하고 붉은 빛을 띠는 용암이 자유롭게 흐르며 이 용암 강의 연안을 밝히고 있습니다."
 # Thermotechnic District Deposits
 d_volcanic_stable_plateaus: "안정된 고원"
 d_volcanic_stable_plateaus_desc: "이 고원은 주변 지역에 비해 지질학적으로 안정적입니다."
 d_volcanic_tranquil_flatlands: "고요한 평지"
 d_volcanic_tranquil_flatlands_desc: "완만하게 펼쳐진 이 평지는 행성 전역의 혼돈 속에서도 거의 그대로 보존되어 있습니다."
 d_volcanic_intraplate: "견고한 판 내부"
 d_volcanic_intraplate_desc: "단층선에서 멀리 떨어진 이 지역은 지질학적 재해의 영향으로부터 안전합니다."
 d_volcanic_basalt_plains: "현무암 평원"
 d_volcanic_basalt_plains_desc: "고대의 화산 활동으로 균열과 구멍이 생긴, 반짝이는 현무암 고원입니다."
 d_volcanic_sulfur_lava: "유황 용암"
 d_volcanic_sulfur_lava_desc: "끊임없이 흐르는 이 용암은 특이한 화학 물질 혼합물을 대기로 방출합니다."
 d_volcanic_dried_lavariver: "말라붙은 용암 강"
 d_volcanic_dried_lavariver_desc: "고대에는 용암 강이었으나, 이미 오래전에 식어 이제는 땅을 가로지르는 검게 탄 자국만 남아 있습니다."
 d_volcanic_tunnels: "고립된 터널"
 d_volcanic_tunnels_desc: "고대 마그마의 흐름이 벽을 그을리고, 매끄럽게 다듬어진 길고 속이 빈 터널이 산을 굽이굽이 통과합니다."
 # Misc Deposits
 d_volcanic_fumarole: "분출공"
 d_volcanic_fumarole_desc: "크게 벌어진 이 분출구는 행성 깊은 곳으로부터 뜨거운 $exotic_gases$를 내뿜습니다." # an opening in or near a volcano, through which hot sulphurous gases emerge
 d_volcanic_stifling_atmosphere: "숨 막히는 대기"
 d_volcanic_stifling_atmosphere_desc: "화산재가 대기를 뒤덮어, 세상을 숨 막히고 재로 가득한 황혼 속으로 몰아넣습니다."
 d_andisol_soil: "안디솔 계곡"
 d_andisol_soil_desc: "화산재로 형성된 색이 짙고 영양이 풍부한 토양이 농작물을 재배할 귀중한 기회를 제공합니다."
 d_red_giant_unstable: "£energy£ §Y+5§!" # star deposit
 d_red_giant_unstable_desc: "$d_red_giant_dm$"
 d_red_giant_dm: "£sr_dark_matter£ §Y+8§!" # star deposit
 d_red_giant_dm_desc: "$d_red_giant_dm$"
 # Blockers
 d_seismic_bombing_crater: "£blocker£ 화산 크레이터"
 d_seismic_bombing_crater_desc: "이 지역은 지진 융단 폭격으로 인해 지각이 갈라져, 활발한 화산 활동이 일어나고 있습니다."
 d_large_volcano: "£blocker£ 거대 화산"
 d_large_volcano_desc: "$d_active_volcano_desc$"
 d_ash_storms: "£blocker£ 화산재 폭풍"
 d_ash_storms_desc: "이 지역은 숨 막히는 화산재 구름에 휩싸여 있습니다."
 d_charged_atmosphere: "£blocker£ 대기 충전"
 d_charged_atmosphere_desc: "이 지역의 공기는 위험하면서도 자극적인 에너지를 담아 불꽃이 튑니다."
 d_lava_flooding: "£blocker£ 계절성 용암 범람"
 d_lava_flooding_desc: "이 지역은 주기적으로 뜨거운 용암이 범람합니다."
 d_toxic_atmosphere: "£blocker£ 유독성 대기"
 d_toxic_atmosphere_desc: "이 지역의 대기에서는 호흡이 거의 불가능해, 오직 강한 자만이 살아남을 수 있습니다."
 d_raging_lavafalls: "£blocker£ 휘몰아치는 용암 폭포"
 d_raging_lavafalls_desc: "폭포처럼 쏟아지는 용암이 지표면을 따라 흐르며 장대한 풍경을 이룹니다."
 d_rugged_landscape: "£blocker£ 바위 지형"
 d_rugged_landscape_desc: "지각 활동과 화산 분출로 인해 끊임없이 파괴되는 광활한 지역입니다."
 # Planet Modifiers
 volcanic_critters: "극한성 생명체"
 volcanic_critters_desc: "극한의 열기와 치명적인 용암 속에서도, 생명은 살아남을 길을 찾아냅니다."
 volcanic_mineral_rich: "$mineral_rich$"
 volcanic_mineral_rich_desc: "$mineral_rich_desc$"
 volcanic_ultra_rich: "$ultra_rich$"
 volcanic_ultra_rich_desc: "$ultra_rich_desc$"
 volcanic_mineral_poor: "$mineral_poor$"
 volcanic_mineral_poor_desc: "$mineral_poor_desc$"
 volcanic_subterranean: "$subterranean_wildlife$"
 volcanic_subterranean_desc: "$subterranean_wildlife_desc$"
 volcanic_asteroid_impacts: "$asteroid_impacts$"
 volcanic_asteroid_impacts_desc: "$asteroid_impacts_desc$"
 volcanic_asteroid_belt: "$asteroid_belt$"
 volcanic_asteroid_belt_desc: "$asteroid_belt_desc$"
 volcanic_crystal_lake: "크리스탈 호수"
 volcanic_crystal_lake_desc: "이 용암 웅덩이에서는 열기와 따뜻한 빛으로 고동치는 거대한 수정이 천천히 솟아오릅니다."
 volcanic_hollow_planet: "텅 빈 행성"
 volcanic_hollow_planet_desc: "불로 빚어진 행성의 공허한 메아리가 울리는 거대한 동굴들이 지표면 아래 남아 있습니다."
 volcanic_lavafall: "용암 폭포"
 volcanic_lavafall_desc: "이곳에서는 용암이 자유롭게 흐르며, 가파른 경사를 따라 자연의 불꽃이 장관을 연출합니다."
 volcanic_oasis: "불지옥 속 오아시스"
 volcanic_oasis_desc: "저 너머의 맹렬한 화염으로부터 높은 산맥으로 보호받는 작고 푸른 대륙입니다. 이곳의 독특한 동식물군은 산맥 너머에 놓인 황무지와 극명한 대조를 이룹니다."
 fractalized_entropy_category: "프랙털 엔트로피"
 fractalized_entropy_category_desc: "감지기가 소행성대에서 표류 중인 기이한 물체를 포착했습니다. 기원은 알 수 없으나, 항로가 일정해 정지시킨 뒤 조사할 수 있을 것으로 보입니다."
 infernals.3205.name: "프랙털 엔트로피"
 infernals.3205.desc: "[Leader.GetName](이)가 안정적인 항성 궤도에 떠 있는 단단하고 각진 구조물을 발견했다고 보고했습니다. 알 수 없는 물질로 구성되어 있으며 크리스탈 구조를 연상시키는 면들이 특징인 이 물체는 모든 성분 분석에 저항력을 보였습니다. 물체는 고정된 방향을 유지하며 계속해서 모항성을 향했고, 조작이나 회전 시도를 모두 견뎌 냈습니다.\n\n통제된 실험 중, 탐사선이 이 물체에 집중 에너지 파동을 발사했습니다. 구조물은 깔끔하게 분리되어 대칭을 이루며 둘로 나뉘었고, 각 부분은 원본의 작은 복제체로 재구성되었습니다. 이후 발사한 파동도 분열, 복제, 일관된 소형화로 이어지는 동일한 결과를 낳았습니다.\n\n결국, 널리 퍼진 소형 구조물들의 구름이 궤도상에서 안정화되었습니다. 각 파편은 원본의 정확한 정렬과 기하학 구조를 유지했으며, 하나의 집합체로서는 원래 구조물의 형상을 그대로 보이고 있습니다.\n\n이 현상은 전례가 없을 뿐만 아니라 설명할 방법도 전혀 없습니다. 수집한 모든 원격 측정 데이터는 추가 분석을 위해 보관되었습니다."
 infernals.3205.a: "조각들을 보존하고 관찰합시다."
 # Archaeological Sites
 from_the_ashes_site: "잿더미 속에서"
 from_the_ashes_site_desc: "극도로 뜨겁고 생명체에 적대적인 [Planet.GetName]의 표면에서 확인된 인공적인 폐허가 [GetScientistPlural]의 관심을 끌었습니다. 고고학 조사를 통해 이곳에 누가 있었는지, 그리고 무슨 일이 일어났는지 밝혀낼 수 있을 것입니다."
 infernals.2700.name: "잊힌 제국"
 infernals.2700.desc: "[From.Planet.GetName]의 폐허는 처음에는 돌로 지어진 것처럼 보였지만, 발굴 및 분석 결과 이 잊힌 도시의 많은 구조물이 나무와 유사한 석화된 유기물로 만들어진 것으로 나타났습니다. 오늘날 이 행성에서 이 유기물의 출처는 찾을 수 없습니다. 더 작은 유물은 조잡한 금속, 유리, 그리고 유사한 석화 유기물로 만들어졌으며, [GetScientistPlural]들은 더 이상 존재하지 않는 토착 생물의 화석도 발견했습니다.\n\n수수께끼의 문명은 기후가 훨씬 온화했던 시기에 이 행성에 거주했던 것으로 보입니다. 행성이 지금처럼 변하기 훨씬 전에 사라진 걸까요, 아니면 격변을 목도하며 최후를 맞이하게 된 걸까요?"
 infernals.2705.name: "종말의 목격자들"
 infernals.2705.desc: "[From.Planet.GetName]의 폐허 도시 발굴을 통해 문화적으로 중요한 장소들이 드러났으며, 이곳은 문자일 가능성이 있는 복잡한 문양으로 장식되어 있습니다. 무엇보다 흥미로운 점은 발굴팀이 선반으로 가득 찬 지하 공간을 발견했으며, 각 선반에는 빽빽하게 문자가 새겨진 얇은 청동판이 놓여 있었다는 사실입니다. 청동이 저장 매체로서 비효율적임에도 불구하고, 공동 기록 보관용 문서로 제작된 것으로 보입니다.\n\n고고학 팀은 도시 전역으로 활동을 확장하며 번역 작업을 시작했습니다. 이 문명이 맞이한 마지막 운명은 여전히 의문으로 남아 있습니다."
 infernals.2710.name: "다가오는 파멸"
 infernals.2710.desc: "[From.Planet.GetName]의 팀이 음울한 분위기의 지하 묘지를 발견했습니다. 이곳은 땅을 파서 만든 다수의 참호로 이루어져 있으며, 벽의 구멍에는 미라가 된 유해가 서너 구씩 쌓여 안치되어 있습니다. 원시적인 화기, 간단한 유리 망원경, 복잡한 직물 자수와 같은 부장품들이 이 문명의 기술 발전 수준을 짐작할 수 있게 합니다.\n\n지하 묘지 내의 많은 교차로에는 멸종한 토착 동물의 조각상이 이곳을 수호하는 듯 배치되어 있습니다. 이 생물들은 둥근 돔형 등껍질과 네 개의 짧은 다리, 작고 뭉툭한 머리를 가지고 있습니다. 보존 상태가 양호한 표본에서는 이들이 몸을 웅크린 채 등껍질을 이용해 위에 새겨진 불꽃 모양 조각으로부터 자신을 보호하는 모습이 묘사되어 있습니다.\n\n이 예술품의 진정한 의미는 시간의 뒤편으로 사라졌을지 모르지만, 어쩌면 이 사회가 임박한 불의 파멸을 인지하고 있었을 가능성을 나타내는 것일 수도 있습니다. 폐허를 더 발굴하면 이들이 겪은 일이 명확해질 것입니다."
 infernals.2715.name: "화염 속의 몰락"
 infernals.2715.desc: "[From.Planet.GetName]의 폐허 도시에 대한 광범위한 탐사를 통해, 이 문명이 생태계 붕괴를 겪었으며 불타는 최후의 날이 다가오고 있음을 인지하고 있었다는 사실이 확인되었습니다. 뜨거운 화산재가 쏟아지기 전에는 종이 기반 기록이 존재했지만, 이후 청동판으로 전환할 수밖에 없었습니다. 불꽃을 피하는 동물을 묘사한 예술 작품은 자신들의 종말을 받아들이려 했던 시도를 기록하고 있습니다.\n\n발굴 과정에서 거의 완벽하게 보존된 지하 묘지 수호 조각상의 표본도 발견되었습니다. 그 위에 새겨진 불꽃이 내부에서 빛을 발하는, 보존 가치가 뛰어난 인상적인 작품입니다.\n\n또한 화산 활동을 막으려 했던 시도의 흔적도 발견되었습니다. 도로와 부서진 수레는 주민들이 돌무더기를 가장 가까운 화산 칼데라로 운반하여 활동을 막으려 했음을 보여줍니다. 그러나 불행히도 운명을 막는 데 실패한 것입니다. 오늘날 이 행성에는 다세포 생물이 존재하지 않습니다.\n\n이 역사는 어떤 문명이든 간에, 자신이 가진 도구로 감당할 수 없는 문제에 직면했을 때 얼마나 취약할 수 있는지를 상기시켜 줍니다."
 infernals.2715.a: "비극적인 결말이군요."
 infernals.2715.b: "이들의 실수에서 교훈을 얻어야 합니다."
 inferno_temple_site: "불의 사원"
 inferno_temple_site_desc: "[Planet.GetName]의 인구 밀집 지역에서 멀리 떨어진 활화산 산맥에 고대 사원이 폐허가 된 채 방치되어 있습니다. 이 사원의 역사를 이해하면 행성의 문화를 더 깊이 파악할 수 있을 것입니다."
 infernals.2720.name: "고대의 흔적"
 infernals.2720.desc: "사원에는 전투의 흔적이 남아 있었으며, 토양 아래에서는 현지 지성 종족의 오래된 유해를 발견했습니다. 사원은 불에 타 버려진 것으로 보입니다. 보안 팀은 현지인들이 이 지역을 저주받은 장소로 여기며, 이곳 전체에 발을 들이는 것을 피한다고 보고했습니다.\n\n사원의 벽 속에는 정교한 프레스코화와 조각품이 다수 보존되어 있었습니다. 이 작품들에서는 중앙에 어두운 틈이 있는 뒤틀린 불의 원이라는 반복적인 모티프가 나타납니다. 한 그림에서는 두 발로 걷는 형상이 네 개의 '눈' 중 하나를 뽑아 세상에 던져 이 원형 모티프를 만들어 내는 모습이 묘사되어 있습니다. 우리는 이를 '화염의 눈'으로 명명했습니다.\n\n추가 발굴을 통해 이 이상한 형상을 둘러싼 믿음이 무엇이었는지 밝힐 수 있을 것입니다."
 infernals.2725.name: "눈의 제물"
 infernals.2725.desc: "화염의 눈 사원을 발굴하는 과정에서 제물 의식의 흔적이 여럿 드러났습니다. 중앙에 단상이 있는 거대한 원형 구덩이는 화염의 눈과 그 동공을 모방하듯 배치되어 있으며, 잿더미와 숯 층으로 가득합니다. 분자 분석 결과, 이 재와 숯은 동물의 조직이 불탄 흔적으로 보입니다.\n\n희생된 제물이 야생 동물이었는지, 가축이었는지, 혹은 현지 주민이었는지는 확인되지 않았습니다.\n\n발굴 팀이 더 많은 해답을 찾는 동안, 관련 흔적을 확보하기 위해 요원들을 현 인구 밀집 지역으로 파견했습니다."
 infernals.2725.a: "풀어야 할 수수께끼로군요!"
 infernals.2725.b: "드론을 보내 이 수수께끼의 답을 찾아봅시다."
 infernals.2730.name: "어두운 관행"
 infernals.2730.desc: "사원의 가장 깊은 부분을 막고 있던 무거운 돌문을 발견했습니다. 문을 돌파한 발굴 팀은 중앙에 구덩이가 있는 원형의 방을 찾아냈으며, 그 구덩이는 자연적인 지하 마그마 저장고와 곧바로 이어져 있었습니다. 마그마의 주황빛이 벽을 붉은색으로 물들이며, 기이한 방을 둘러싼 비문을 희미하게 비추었습니다. 주변 상단 벽에는 밝게 타오르는 눈들이 박혀 있었습니다.\n\n구덩이의 한쪽 가장자리에는 화염의 눈 모양 제단 위에서 갈가리 찢긴 채 남은 이곳 주민의 메마른 유해가 있습니다. 이곳의 존재들은 스스로를 제물로 바쳐 화염의 눈을 달래려 했던 것으로 보입니다.\n\n벽을 따라 새겨진 글귀는 이 사원의 문화적 역할을 이해하는 데 결정적인 내용을 담고 있을 수 있으므로, 즉시 번역해야 합니다."
 infernals.2735.name: "맥동하는 예언"
 infernals.2735.desc: "마지막 조사 결과, 사원 가장 안쪽 방에 있는 경전에는 화염의 눈의 귀환과 관련된 일련의 예언이 기록되어 있었습니다. 그 내용에 따르면 신도들의 반항에 분노한 화염의 눈이 어둠으로 하늘을 가리고, 특정한 성스러운 산을 폭발시키고, 특정 작물을 넝쿨째 시들게 하는 등의 재앙을 가져올 것이라 합니다. 예언에서는 이를 문명의 종말로 묘사하며, 그 뒤에는 화염의 눈에 복종하는 자들만이 살아남는다고 전하고 있습니다.\n\n이곳 주민들 사이에 파견된 우리 요원들은 문화적 연관성을 조사한 끝에, 이 예언서가 행성의 여러 문화에서 많은 격언과 표현의 근원이 되었으며, 후대의 이야기와 신화의 원전이 되었음을 밝혀냈습니다. 또한 현대의 사원에서 행해지고 있는 수수께끼의 의식은 이 고대 예언의 변형이나 그에 대한 반응에서 비롯되었다고 합니다.\n\n우리는 이 모든 예언된 사건들을 기술로 재현하거나, 현지인들이 눈치채지 못할 정도로 현실감 있게 조작해 낼 수 있습니다. 만약 우리가 우리 자신을 화염의 눈의 화신으로 내세우며 예언이 줄곧 옳았음을 증명한다면, 이들로부터 양보와 충성을 얻어낼 수 있을 것입니다. 그렇게 하면 장기적으로 이들을 흡수하는 데 큰 도움이 될 수 있습니다."
 infernals.2735.a: "예언을 재현합시다."
 infernals.2735.a.tt: "§Y[From.Planet.GetName]§!의 원시 사회는 우리의 윤리관을 받아들이는 법을 배우게 될 것입니다."
 infernals.2735.a.fail: "§Y$interference_not_allowed$§! 정책을 채택하지 않음"
 infernals.2735.b: "개입하지 마세요."
 infernals.2735.c: "이들의 역사는 영원히 사라지고 말았군요."
 infernal_figurine: "화염의 소상"
 infernal_figurine_desc_short: "둥근 등껍질과 네 개의 짧은 다리를 가진 단단한 생물이 불꽃 모양으로 형상화된 조각 아래 웅크리고 있습니다."
 infernal_figurine_desc_details: "알 수 없는 광물로 조각된 불꽃이 붉은빛을 내뿜습니다. 이 유물은 멸종한 문명의 지하 묘지에서 발굴되었으며, 다가오는 화산 재앙 속에서 살아남으려는 주민들의 헛된 희망을 나타냈을 가능성이 있습니다."
