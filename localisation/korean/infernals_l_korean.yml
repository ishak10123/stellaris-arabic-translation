 cosmic_dawn_tunnel_researcher: "$d_cd_ancient_tunnels$당 $researcher_jobs_bonus_workforce_mult$: §G+1%§!"
 cosmic_dawn_tunnel_worker: "$d_cd_ancient_tunnels$당 $mod_pop_cat_worker_bonus_workforce_mult$: §G+1%§!"
 d_stasis_pods: "£blocker£ 고대 동면 포드"
 d_stasis_pods_desc: "이 동면 포드는 잃어버린 우리 동족으로부터 전해진 고대 장치로, 첨단 냉동 기술을 사용하여 개체를 가사 상태로 유지합니다. 적절한 기술을 갖춘다면 이들을 깨울 수 있을지도 모릅니다."
