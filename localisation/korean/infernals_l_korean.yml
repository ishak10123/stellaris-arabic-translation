 d_stasis_pods_tt_inf: "- §G100§! £pop£ $POPS$이 생성됨\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_stasis_pods_tt_other: "- £society_research£ §Y$society_research$§! 획득: §G+350§!\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_cd_ancient_tunnels: "고대 터널"
 d_cd_ancient_tunnels_desc: "한때 여러 줄에 달하는 동면 포드를 보관하는 데 사용되었던 이 광대한 터널은 이제 비어 있지만, 대신 새로운 생활 공간을 제공합니다."
 d_galvanic_living_metal: "$sr_living_metal$ 퇴적층"
 d_galvanic_living_metal_desc: "이 행성에는 천연 $r_living_metal$ 매장지가 있습니다. 이곳의 생명체는 이 매력적인 자원과 끊임없이 접촉하며 진화하여 독특한 생물학적, 과학적 경로를 따라 발전해 왔습니다."
 # Civic - Scorched World Heralds
 civic_scorched_earth: "그을린 행성의 전령"
 civic_scorched_earth_desc: "이 사회의 문화는 전통과 의식에서부터 기술 그 자체에 이르기까지 모든 면에 열기가 스며들어 있습니다. 이들은 자신을 은하의 정당한 불의 지배자라고 여기며, 약한 종족들은 오직 호열체에게만 어울리는 이상적인 우주로 나아가는 길에 놓인 장애물에 불과하다고 생각합니다."
 civic_scorched_earth_effects: "- §Y$trait_infernal_plural$§!를 제외한 다른 종족과 §Y외교§! 불가\n- §Y은하 시장§! 이용 불가\n- 다른 종족에 §Y'$casus_belli_cb_blaze$'§! 전쟁 명분 사용 가능\n- §Y$bombardment_firestorm$§! 폭격 태세로 폭격 시 £unity£ §Y$unity$§! 획득\n- §Y$bombardment_seismic_bombing$§! 폭격 태세로 아래 행성에 특수 차단물 생성 \n- 비['trait:trait_infernal'] 종족은 §Y노예§! 이하의 신분으로 제한됨"
 SCORCHED_HERALDS_ONLY_INF: "$TRIGGER_FAIL$§Y$civic_scorched_earth$§! 사회는 ['trait:trait_infernal'] £pop£ $POPS$만을 허용합니다."
 civic_hive_scorched_earth: "화염광의 본능"
 civic_hive_scorched_earth_desc: "우리의 그을린 행성은 행성 진화의 정점입니다. 우리는 은하를 불태우고, 그 화염 속에서 번영할 것입니다!"
 # Civic - World Forgers
 civic_world_forgers: "행성 제련사"
 civic_world_forgers_desc: "이 사회는 화산 환경에서 번성하며, 필요할 때는 인위적으로 화산을 만들어 내기도 합니다."
 civic_world_forgers_effects: "- 시작 행성 잠금 해제: ['concept_pc_volcanic'] \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge'] \n- £job_polytechnic_mentor£ ['concept_polytechnic_mentor']를 추가하는 £building£ §Y$building_volcanic_forge_1$§! 건물 건설 가능 \n- £building£ §Y$building_volcanic_forge_1$§!가 있는 행성은 점차 §Y$pc_volcanic$§!으로 변함 \n- ['concept_guaranteed_colonies']: §Y$climate_dry$§! 행성"
 civic_corporate_world_forgers: "행성 건축가"
 civic_corporate_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_hive_world_forgers: "화산 거주자"
 civic_hive_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_world_forgers_gestalt_effects: "- 시작 행성 잠금 해제: ['concept_pc_volcanic'] \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge'] \n- £job_polytechnic_drone£ ['concept_polytechnic_drone']을 추가하는 £building£ §Y$building_volcanic_forge_1$§! 건물 건설 가능 \n- £building£ §Y$building_volcanic_forge_1$§!가 있는 행성은 점차 §Y$pc_volcanic$§!으로 변함 \n- ['concept_guaranteed_colonies']: §Y$climate_dry$§! 행성"
 civic_machine_world_forgers: "열 관리자"
 civic_machine_world_forgers_desc: "$civic_world_forgers_desc$"
 tech_volcanic_forge: "화산 제련소"
 tech_volcanic_forge_desc: "이 시설을 가동하면 행성을 서서히 화산 낙원으로 바꾸면서 유용한 자원을 지표면으로 끌어올립니다. 열 제련사들이 변환 과정을 가속할 수 있습니다."
 concept_volcanic_forge: "$tech_volcanic_forge$"
 concept_volcanic_forge_desc: "$building_volcanic_forge_basic$ \n\n- 월간 진행도: §G+0.1§! \n- §Y100§! £job_miner£ $job_miner_plural$당 월간 진행도: §G+0.05§! \n- §Y100§! £job_foundry£ $job_foundry_plural$당 월간 진행도: §G+0.05§!"
 building_volcanic_forge_1: "$tech_volcanic_forge$"
 building_volcanic_forge_1_desc: "행성 지각 깊숙이 시추하도록 설계된 이 산업 단지는 전 세계에 화산 활동을 유발하여 모든 생물군계를 불타는 지형으로 테라포밍합니다."
 building_volcanic_forge_2: "화산 주조소"
 building_volcanic_forge_2_desc: "$building_volcanic_forge_1_desc$"
 building_volcanic_forge_1_effect: "\n$building_volcanic_forge_basic$ \n$volcanic_forge_1_monthly$ \n\n모든 £job_miner£ $concept_planet_miners$으로 인한 진행도: §G+[root.GetMinerVar1]§! \n모든 £job_foundry£ $concept_planet_metallurgists$으로 인한 진행도: §G+[root.GetForgerVar1]§!"
 building_volcanic_forge_2_effect: "\n$building_volcanic_forge_basic$ \n$volcanic_forge_2_monthly$ \n\n모든 £job_miner£ $concept_planet_miners$으로 인한 진행도: §G+[root.GetMinerVar2]§! \n모든 £job_foundry£ $concept_planet_metallurgists$으로 인한 진행도: §G+[root.GetForgerVar2]§!"
 building_volcanic_forge_basic: "행성을 §H$pc_volcanic$§!으로 바꿉니다."
 volcanic_forge_1_monthly: "- £job_polytechnic_mentor£ ['concept_polytechnic_mentor'] 직업을 §G200§! 추가합니다.\n- 월간 진행도: §G+0.1§! \n- §Y100§! £job_miner£ $concept_planet_miners$당 월간 진행도: §G+0.05§! \n- §Y100§! £job_foundry£ $concept_planet_metallurgists$당 월간 진행도: §G+0.05§!"
 volcanic_forge_2_monthly: "- £job_polytechnic_mentor£ ['concept_polytechnic_mentor'] 직업을 §G400§! 추가합니다.\n- 월간 진행도: §G+0.2§! \n- §Y100§! £job_miner£ $concept_planet_miners$당 월간 진행도: §G+0.1§! \n- §Y100§! £job_foundry£ $concept_planet_metallurgists$당 월간 진행도: §G+0.1§!"
 # Civic - Fire Cult
 civic_pyrolatry: "화염 교단"
 civic_pyrolatry_desc: "극한의 역경 속에서 대대로 단련된 이 사회는 통합을 통해 생존하고, 생존을 통해 통합할 수 있다고 믿습니다. 오직 불 속에서 태어난 투쟁만이 이들을 탄탄히 결속시켜, 차갑고 무정한 은하계에서 살아남게 해 줍니다."
 civic_pyrolatry_effects: "- £unity£ §Y$unity$§! 직업 생산량은 $HABITABILITY$가 낮을수록 비례해 증가합니다(최대 §G500%§!).\n- 게임이 시작되고 얼마 후 ['concept_fire_cult'] 세력이 형성됩니다.\n- £job_priest£ §Y$job_priest_plural$§!를 £job_fire_dancer£ ['concept_inf_fire_dancers']로 대체합니다.\n- $HABITABILITY$가 §R50%§! 미만인 행성에서 £job_politician£ §Y$job_politician_plural$§!를 £job_fire_oracle£ ['concept_inf_fire_oracles']로 대체합니다.\n- $HABITABILITY$가 §R20%§! 미만인 행성에서 §Y$ember_legion$§! 지상군을 모집할 수 있습니다.\n- £blocker£ ['concept_dec_blazing_scourge']을 생성하는 §Y$decision_blazing_scourge$§! 행성 결정을 이용할 수 있습니다.\n- 다음 사회 제도와 시너지 효과를 가집니다: $civic_superstitious_beliefs$, $civic_exalted_priesthood$, $civic_death_cult$, $civic_aristocratic_elite$, $civic_merchant_guilds$."
 # Job
 concept_inf_fire_dancer: "$job_fire_dancer$"
 concept_inf_fire_dancers: "$job_fire_dancer_plural$"
 concept_inf_fire_dancer_desc: "$job_fire_dancer_effect_desc$ \n\n§L$job_fire_dancer_desc$§!"
 job_fire_dancer: "화염 무용수"
 fire_dancer: "$job_fire_dancer$"
 job_fire_dancer_plural: "화염 무용수"
 job_fire_dancer_desc: "불과 인내를 다스리는 화염 무용수들은 뜨거운 의식을 펼쳐 공동체를 경외와 열정으로 하나 되게 합니다."
 mod_job_fire_dancer_add: "$job_fire_dancer$ 직업"
 job_fire_dancer_effect_desc: "£job_fire_dancer£ $job_fire_dancer_plural$는 £consumer_goods£ §Y$consumer_goods$§!를 £unity£ §Y$unity$§!, £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§! 및 £mod_planet_stability_add£ §Y$PLANET_STABILITY_TITLE$§!로 바꿉니다."
 concept_inf_cremator: "$job_cremator$"
