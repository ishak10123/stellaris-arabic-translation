 concept_inf_cremator_desc: "$job_cremator_effect_desc$ \n\n§L$job_cremator_desc$§!"
 job_cremator: "화장사"
 cremator: "$job_cremator$"
 job_cremator_plural: "화장사"
 job_cremator_desc: "화장사들은 신성한 불의 의식을 주관하며, 고인을 불길로 인도해 마지막 신비로 이끕니다. 숭고한 통로의 명예로운 관리자로서, 이들은 죽음이 초월과 만나는 자리에서 자신의 역할을 다합니다."
 mod_job_cremator_add: "$job_cremator$ 직업"
