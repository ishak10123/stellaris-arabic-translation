 infernals.35.name: "휘몰아치는 화염"
 infernals.35.desc: "§H[from.GetName]§!의 표면이 갈라지고, 견딜 수 없는 열기가 아래에서 솟구치면서 지각이 부서졌습니다. 변화는 신속하고 절대적이었습니다. 산이 무너지고, 바다가 끓어오르며, 하늘은 불씨로 뒤덮였습니다.\n\n한때 번성했던 생태계의 흔적은 더 이상 남아 있지 않습니다. 이제 이곳을 집이라 부를 수 있는 것은 극한성 생명체뿐입니다."
