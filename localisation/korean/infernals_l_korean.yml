 infernal_01_shipset_desc: "이 함선들의 눈부신, 녹아내릴 듯한 열기는 우주의 차가운 어둠조차 불태워 버립니다. 견고한 장갑판은 함선의 제작자들이 고향이라 부르는 행성의 불길을 가까스로 억누르고 있습니다."
 decision_living_metal_distribution: "$sr_living_metal$ 분배"
 decision_living_metal_distribution_desc: "우리 기반 시설의 동맥에 주입된 $r_living_metal$은 일상 속 기계 장치에 끊임없는 효율성을 불어넣습니다. 스스로 수리하는 구조물부터 실시간으로 적응하는 교통 시스템에 이르기까지, 이 통합은 도구와 유기체 사이의 경계를 모호하게 만듭니다."
