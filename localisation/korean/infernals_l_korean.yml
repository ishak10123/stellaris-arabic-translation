 job_fire_seer: "화염 예지자"
 fire_seer: "$job_fire_seer$"
 job_fire_seer_plural: "화염 예지자"
 job_fire_seer_desc: "불 속에서 태어난 파괴적인 혼돈은 숯과 재에 숙련된 예지자만이 해석할 수 있는 흔적을 남깁니다. 이러한 신비로운 통찰력은 의식과 통치 모두에 활용됩니다."
