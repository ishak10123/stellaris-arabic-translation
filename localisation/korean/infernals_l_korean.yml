l_korean:
 INFERNALS_TITLE: "Infernals Species Pack" # Do not translate
 vo_infernal_voice: "호열체"
 # Traits
 trait_pc_volcanic_preference: "화산 선호"
 trait_pc_volcanic_preference_short: "화산"
 trait_pc_volcanic_preference_desc: "$trait_pc_savannah_preference_desc$"
 trait_volcanic_planet_preference: "$trait_pc_volcanic_preference$" #robotic
 trait_volcanic_planet_preference_desc: "$trait_dry_planet_preference_desc$" #robotic
 trait_infernal: "호열체"
 trait_infernal_plural: "호열체"
 trait_infernal_desc: "이 종족은 금속 합금으로 이루어진 신체 조직을 가지도록 진화해, 일반적인 유기체라면 타 버릴 정도로 뜨거운 행성에서도 성장하고 번성할 수 있습니다. 합금 세포는 분해가 느리고 교체가 드물어, 노화 관련 질병의 발현을 늦춥니다. 다만 금속 조직은 냉기를 잘 전도하기 때문에, 냉대 기후에서는 건강에 위협이 됩니다."
 TRAIT_INFERNAL_EFFECT: "$pop_group_unit$ £pop£ 팝당 $r_alloys$ 유지비: §R+$@living_standard_alloys_normal$§!$TABBED_NEW_LINE$- $pc_volcanic$ $HABITABILITY$: §G+20%§! $TABBED_NEW_LINE$- 최소 $HABITABILITY$ (§H$pc_volcanic$§!): §Y+50%§! $TABBED_NEW_LINE$- §Y냉대§! 행성 $HABITABILITY$: §R-30%§!  $TABBED_NEW_LINE$- 지도자 수명: §G+10년§!"
 trait_unbreakable_resolve: "불굴의 의지"
 trait_unbreakable_resolve_desc: "복잡한 거울 신경망으로 연결된 이 개체들은 의지를 동기화하는 타고난 능력을 지녔습니다. 이들에게 의무는 짐이 아니라 공동의 목적이며, 흔들림 없는 단결로 역경에 맞섭니다."
 trait_unbreakable_resolve_tooltip: "행성의 이 특성을 지닌 각 $pop_group_unit$ £pop£ §H팝§!당 £stability£ $PLANET_STABILITY_TITLE$ §G+0.2§!(최대: §G+15§!) \n- §R노예 또는 더 낮은 계층의 팝은 포함되지 않습니다.§!"
 trait_shell_slag: "외피 광재"
 trait_shell_slag_desc: "$r_living_metal$과 정교하게 공생하는 이 종족은 전통적인 성장 방식이 아니라, 생물학적 철 구조의 응집과 자기 조립을 통해 성장합니다."
 trait_shell_slag_tooltip: "이 특성을 지니고 노예 이상의 직업을 가진 각 $pop_group_unit$ £pop£ §H팝§!이 매월 §G$@shell_slag_trait_resource_production|3$§! §Y$r_living_metal$§!을 생산합니다."
 trait_robot_assembly_slag: "조립 광재"
 trait_robot_assembly_slag_desc: "$r_living_metal$과 정교하게 통합된 이 기계 종족은 전통적인 조립 방식이 아니라, 자동화된 철제 뼈대의 응집과 자기 조립을 통해 확장됩니다."
 trait_pyroclastic: "화쇄류 제어"
 trait_pyroclastic_desc: "화산 행성의 끊임없는 분노 속에서 형성된 이 종족은 화쇄류의 힘을 두려워하지 않으며, 오히려 이를 제어하고 조종하여 파괴를 생존과 힘의 필수적인 원천으로 바꿉니다."
 trait_pyroclastic_tooltip: "$pc_volcanic_plural$ $MOD_LOGISTIC_GROWTH_MULT$: §G+10%§!"
 trait_crucible_community: "도가니 공동체"
 trait_crucible_community_desc: "역경을 겪으며 단련되고 공동의 투쟁으로 뭉친 이 종족은 깨지지 않는 하나로 담금질 되었습니다. 이들의 집단 의지가 통치를 이끄는 원동력이 되며, 각 구성원은 단결의 사슬에서 없어서는 안 될 연결 고리입니다."
 trait_crucible_community_tooltip: "이 특성을 지닌 각 $pop_group_unit$ £pop£ §H팝§!당 §Y$MOD_COUNTRY_EDICT_FUND_ADD$§! §G+0.25§!"
 trait_ductile: "연성"
 trait_ductile_desc: "§L이 종족은 재사용 가능한 합금 화합물을 생성하도록 설계되었습니다.§!\n"
 # Volcanic World
 pc_volcanic: "화산 행성"
 pc_volcanic_plural: "화산 행성"
 pc_volcanic_desc: "유황이 풍부한 대기와 부분적으로 액화된 암석권을 가진 암석 행성입니다. 화산재와 현무암으로 뒤덮인 표면 곳곳에서는 생생한 화산 활동과 용암으로 된 호수와 강이 보입니다. 만약 생명체가 존재한다면, 극한 환경에서만 서식하는 미생물 정도일 것입니다."
 mod_pc_volcanic_habitability: "화산 행성 거주 적합도"
 mod_pc_volcanic_max_districts_add: "최대 지구($pc_volcanic$)"
 concept_pc_volcanic: "$pc_volcanic$"
 concept_pc_volcanic_desc: "- $mod_planet_jobs_alloys_produces_mult$: §G+5%§! \n\n§L$pc_volcanic_desc$§!"
 district_geothermal: "지열 발전소"
 district_geothermal_plural: "지열 발전소"
 district_geothermal_desc: "행성 내부의 들끓는 열을 활용해 식민지에 전력을 공급합니다."
 district_melting: "마그마 도관"
 district_melting_plural: "마그마 도관"
 district_melting_desc: "일련의 전자기 여과기가 행성의 마그마 흐름에서 귀중한 광물을 추출합니다."
 district_melting_uncapped: "$district_melting$"
 district_melting_uncapped_plural: "$district_melting_plural$"
 district_melting_uncapped_desc: "$district_melting_desc$"
 mod_district_melting_max: "최대 $district_melting_plural$"
 district_polytechnic: "열 기술 포럼"
 district_polytechnic_plural: "열 기술 포럼"
 district_polytechnic_desc: "학제 간 협력과 교육의 중심지로서, 식민지가 행성의 지질 역동성을 효과적으로 관리할 수 있도록 돕습니다."
 mod_district_polytechnic_max_add: "최대 $district_polytechnic_plural$"
 thermotechnic_default: "보조 센터"
 thermotechnic_hive: "시냅스 군집"
 thermotechnic_machine: "보조 허브"
 melt_extractor: "$job_melt_extractor$"
 job_melt_extractor: "열 제련사"
 job_melt_extractor_plural: "열 제련사"
 job_melt_extractor_desc: "극한의 열에 익숙한 이 노동자는 광물을 결합해 유용한 합금을 만드는 데 능숙합니다."
 mod_job_melt_extractor_add: "$job_melt_extractor$ 직업"
 job_melt_extractor_effect: "£job_miner£ $job_melt_extractor_plural$는 £minerals£ §Y$minerals$§!을 생산합니다."
 melt_extractor_drone: "$job_melt_extractor_drone$"
 job_melt_extractor_drone: "열 제련 드론"
 job_melt_extractor_drone_plural: "열 제련 드론"
 job_melt_extractor_drone_desc: "극한의 열을 견디도록 제작된 이 드론은 광물을 결합해 유용한 합금을 만들어 내도록 설계되었습니다."
 mod_job_melt_extractor_drone_add: "$job_melt_extractor_drone$ 직업"
 job_melt_extraction_drone_effect: "£job_mining_drone£ $job_melt_extractor_drone_plural$은 £minerals£ §Y$minerals$§!을 생산합니다."
 job_polytechnic_mentor: "열 기술 멘토"
 job_polytechnic_mentor_plural: "열 기술 멘토"
 job_polytechnic_mentor_desc: "다양한 기술을 지닌 이 멘토는 지식 분야 간 격차를 해소하여 전문 노동자의 효율성을 높입니다."
 mod_job_polytechnic_mentor_add: "$job_polytechnic_mentor$ 직업"
 job_polytechnic_mentor_effect: "£job_polytechnic_mentor£ $job_polytechnic_mentor_plural$는 다른 직업에 의해 강화됩니다. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_mentor: "$job_polytechnic_mentor_plural$"
 concept_polytechnic_mentor_desc: "$pop_group_unit$ £pop£ §H팝§!당 추가 자원 생산량\n(한도: 범주당 §Y4000§! £job£ 직업):\n- £job_miner£ ['concept_planet_miners']: £unity£ $unity$ §G+$@polytechnic_output$§!\n- £job_technician£ ['concept_planet_technician']: £physics_research£ $physics_research$ §G+$@polytechnic_output$§!\n- £job_foundry£ ['concept_planet_metallurgists']: £engineering_research£ $engineering_research$ §G+$@polytechnic_output$§!\n- £job_artisan£ ['concept_planet_artisans']: £society_research£ $society_research$ §G+$@polytechnic_output$§!"
 job_polytechnic_job_tt: "$concept_polytechnic_mentor_desc$"
 job_polytechnic_drone: "화쇄류 드론"
 job_polytechnic_drone_plural: "화쇄류 드론"
 job_polytechnic_drone_desc: "다양한 기술을 지닌 이 드론은 지식 분야 간 격차를 해소하여 전문 노동자의 효율성을 높입니다."
 mod_job_polytechnic_drone_add: "$job_polytechnic_drone$ 직업"
 job_polytechnic_drone_effect: "£job_polytechnic_drone£ $job_polytechnic_drone_plural$은 다른 직업에 의해 강화됩니다. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_drone: "$job_polytechnic_drone_plural$"
 concept_polytechnic_drone_desc: "$concept_polytechnic_mentor_desc$"
 # Origin - Red Giant
 origin_red_giant: "적색 거성"
 origin_red_giant_desc: "이 문명은 기로에 서 있습니다. 모성계 중심부의 적색 거성이 행성의 기온을 높이기 시작하면서, 산 채로 타 죽을 위협에 처했습니다.\n\n원인을 찾아 해결하기 전까지 적응할 수 있을까요? 아니면 이 기이하고 어쩌면 부자연스러운 변화를 받아들이고 열기를 이용하게 될까요?"
 origin_tooltip_red_giant_effects: "- $HOMEWORLD$ ['concept_pc_volcanic'](크기: £planetsize£ 20)"
 START_SCREEN_RED_GIANT: "진실은 서서히 다가오다, 순식간에 거리를 좁힙니다.\n\n우리의 항성은 빠르고 비정상적인 진화 단계에 접어들고 있습니다. 에너지 방출량은 모든 예측을 넘어섰고, 스펙트럼 변화는 불규칙한 대류 패턴을 보이며, 질량 손실 없이 핵융합 속도가 증가하고 있습니다.\n\n지금까지 우리는 이 온난화에 맞춰 함께 진화해 왔습니다. 하지만 기본적인 생물학적 진화에는 한계가 있기 마련입니다.\n\n[capital_star.GetName] 내부에서 진행 중인 변화가 계속된다면, 우리가 고향이라 부르는 이 행성은 불타고 말 것입니다. 이제는 가능성이 아니라 시기의 문제일 뿐입니다."
 red_giant_start_NAME: "적색 거성 성계"
 red_giant_start_DESC: "§Y$origin_red_giant$§! 기원을 사용하는 제국의 보장된 시작 성계입니다."
 tech_starfire_cannon: "$starfire_cannon$"
 tech_starfire_cannon_desc: "잠재적인 위험이 다 그렇듯, 우리 항성의 변형에서 발생하는 위험한 방사선도 유용한 도구로 활용될 수 있습니다. 이를 광선 무기로 전환하면 적 함선을 과열시켜 무력화할 수 있을 것입니다. \n\n궤도에 §Y$starfire_cannon$§!를 건설하는 행성 결정을 잠금 해제합니다."
 SOLARFLARE_EMITTER: "항성 플레어 방출기"
 SOLARFLARE_EMITTER_DESC: "가장 강력한 방어 체계마저 꿰뚫고 취약한 함선 시스템을 무력화할 수 있는 강력한 에너지 광선입니다."
 starfire_cannon_cap: "$starfire_cannon$"
 starfire_cannon: "항성 화염포"
 starfire_cannon_plural: "항성 화염포"
 NAME_Starfire_Cannon: "$starfire_cannon$"
 starfire_cannon_key: "$starfire_cannon$ 코어"
 sfe_on_hit_stun_tt: "§G5§!일 동안 표적을 §Y무력화§!하여 속도, 발사 속도, 보호막을 감소시킵니다.\n\n$ION_CANNON_FLEET_EFFECT$"
 sfe_weapon_stun_effect: "§R$starfire_cannon$ 영향§!"
 sfe_weapon_stun_effect_desc: "   " # not visible
 decision_starfire_cannon: "$starfire_cannon$ 구축"
 decision_starfire_cannon_desc: "빠르게 노화하는 적색 거성의 강렬한 방사선을 모방한 이 궤도 캐논은 초고열 이온화 광선을 발사하여 표적에 피해를 줄 뿐만 아니라 함선 부품을 태워 무력화할 수 있습니다."
 decision_starfire_cannon_effects: "행성 궤도에 다수의 함선 시스템을 무력화할 수 있는 장거리 무기인 §Y$starfire_cannon$§!를 구축합니다."
 decision_starfire_cannon_limit: "$TRIGGER_FAIL$성계 한도: §Y3§!"
 # Origin - Cosmic Dawn
 origin_cosmic_dawn: "우주의 여명"
 origin_cosmic_dawn_desc: "이 문명은 스스로 일어선 것이 아니라, 해방되었습니다. 수면 포드의 문이 열리고 이들은 알아볼 수 없을 만큼 세월이 흘러 버린 행성에서 깨어났습니다. 하지만 모든 것이 사라진 것은 아닙니다. 은하계 전역의 먼지와 폐허 속에 흩어진 이들의 과거가 다시 발견되기를 기다리고 있는 것입니다."
 origin_tooltip_cosmic_dawn_effects: "- $HOMEWORLD$ $TABBED_NEW_LINE$- ['concept_pc_volcanic'](크기: £planetsize£ 14) $TABBED_NEW_LINE$- ['concept_inf_cd_deposit']: +5\n- §H심층 발굴§! 상황으로 시작"
 origin_tooltip_cosmic_dawn_negatives: "- $INITIAL_POPS$ §R-600§!"
 START_SCREEN_COSMIC_DAWN: "우리는 자신이 한때 잠들어 있었다는 사실조차 희미하게 느껴지는 상태로 깨어났습니다. 지금 이 순간에도 우리에게 과거가 있었다는 가장 강력한 증거는 기억이 아니라, 우리를 동면 상태로 보존했던 복잡한 기술에서 나옵니다.\n\n수천, 수만 개의 포드와 거대한 열전달 시스템, 용암을 휘젓는 거대한 도가니. 우리의 기원에 대한 단서는 이러한 기계 장치 너머의 벽에 새겨져 있었습니다. 그것은 식어 가는 행성에서 벗어나 별들 사이로 온기를 찾아 흩어지는 함대의 모습이었습니다. 질문에 대한 해답을 찾아, 우리는 지하의 '탄생실'을 떠났습니다. 우리는 §Y[owner.Capital.GetName]§! 지표면 전역에서 유용한 기술과 자원을 발견했고, 지각 속에 숨겨진 더 많은 시설의 흔적도 찾아냈습니다. 그중 일부에는 우리가 동족으로 맞이할 수도 있을 동면자들이 있습니다.\n\n그렇다면 별들은 어떨까요? 우리가 그러했듯, 아직 잠들어 있는 다른 존재들이 있을까요? 만약 존재한다면, 우리의 가장 열띤 질문인 '우리는 누구인가?'에 대한 답을 찾는 데 도움을 줄지도 모릅니다."
 cosmic_dawn_start_NAME: "새로운 보금자리"
 cosmic_dawn_start_DESC: "$origin_cosmic_dawn$ 기원을 사용하면 여기가 보장된 시작 성계가 됩니다."
 concept_inf_cd_deposit: "$d_stasis_pods$"
 concept_inf_cd_deposit_desc: "생산: £society_research£ 3.0\n제거 시: \n$d_stasis_pods_tt$ \n\n§L$d_stasis_pods_desc$§!"
 cosmic_dawn_districtsize: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 cosmic_dawn_districtsize2: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+2§!\n   $d_cd_ancient_tunnels$: §G+2§!"
