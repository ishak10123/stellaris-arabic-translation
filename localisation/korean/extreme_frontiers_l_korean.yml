 # CHRONICLES OF DENDRUS
 chronicles_of_dendrus_chain_title: "덴드루스 연대기"
 chronicles_of_dendrus_chain_desc: "§Y[from.Planet.GetName]§!의 난파 방주선에서 회수한 복잡한 수학 증명 모음집, '연대기'를 연구합니다. 이를 통해 덴드리티안들이 찾던 낙원의 행성인 '§Y뉴 브라툴라§!'에 대해 더 많은 정보를 얻고자 합니다."
 site_chronicles_of_dendrus: "$chronicles_of_dendrus_chain_title$"
 site_chronicles_of_dendrus_desc: "스캔을 통해 §Y[from.Planet.GetName]§!에서 우주 난파선이 확인되었습니다. 난파선은 수년 전 이곳에 불시 착륙한 것으로 보입니다.\n\n난파선의 거대한 규모를 보아, 제작에 상당한 자원이 투입된 것으로 판단됩니다. 고고학 탐사를 통해 난파선이 이곳에 떨어진 경위를 밝혀낼 것입니다."
 extreme_frontiers.1400.title: "거대한 수송선"
 extreme_frontiers.1400.desc: "§Y[from.Planet.GetName]§!에서 발견한 난파선의 외부 분석 결과, 이 함선은 대용량 수송선으로 추정됩니다. 난파선의 시스템은 비활성화되어 반응이 없으며, 내부에서는 생명 신호가 감지되지 않습니다. 퇴적층 분석에 따르면, 은하계 기준으로는 꽤 최근인 약 한 세기 전에 이곳에 떨어진 것으로 추정됩니다."
 extreme_frontiers.1400.a: "내부를 탐사하세요."
 extreme_frontiers.1405.title: "비운의 개척선"
 extreme_frontiers.1405.desc: "§Y[from.Planet.GetName]§!에서 발견한 난파선 내부에는 수경재배를 위한 첨단 격실과 다양한 씨앗, 토양, 그리고 손대지 않은 도구와 건축 자재로 가득한 화물 격납고가 발견되었습니다. 대부분의 데이터 터미널엔 '§Y뉴 브라툴라§!'라고 명명된 새로운 식민지 계획이 담겨 있습니다.\n\n하부 갑판에는 함선의 전 거주자들이 수천 개의 냉동 수면 포드 안에서 죽은 채로 발견되었습니다."
 extreme_frontiers.1405.desc.phototrophic: "$extreme_frontiers.1405.desc$ 이들은 우리처럼 세포 성장과 재생을 위해 광합성에 의존했는데, 말라비틀어진 시체를 보면 장기 냉동 수면 도중 사망한 것으로 판단됩니다."
 extreme_frontiers.1405.desc.default: "$extreme_frontiers.1405.desc$ 이 광영양 생물들의 말라 비틀어진 시체를 보면 장기 냉동 수면 도중 사망한 것으로 판단됩니다."
 extreme_frontiers.1405.a: "계속 조사하세요."
 extreme_frontiers.1405.b: "유해를 섭취하고 계속 조사하세요."
 extreme_frontiers.1410.title: "모성 사원"
 extreme_frontiers.1410.desc: "§Y[from.Planet.GetName]§!의 난파 개척선에서 '§Y브라툴라§!'라는 행성의 삶을 묘사한 정교한 삽화가 장식된 내성소를 발견했습니다. 일부는 무성한 식물이 자생하는 풍요로운 세계를, 다른 일부는 환경의 부패와 대규모 죽음을 묘사하고 있습니다. 가장 큰 삽화는 이 함선이 황량한 폐허를 떠나는 장면을 나타내고 있습니다.\n\n중앙 데이터 터미널에는 승무원들이 촬영한 짧은 영상이 담겨져 있었는데, 광범위한 언어 매핑을 통해 번역에 성공했습니다.\n\n§S아르보릭세움 - 포드 9721\n\n떠나는 건 아프지만, 뉴 브라툴라에 자리를 잡는 것이 우리를 치유할 것이라 믿는다.\n\n다르흐트 팜 - 포드 21301\n\n덴드리티안들이여, 연대기를 믿어라. 뉴 브라툴라는 우리의 구원이 될 것이다.§!\n\n우리는 아직 이 거대한 함선의 지휘 갑판을 찾아 수색하고 있습니다."
 extreme_frontiers.1410.a: "계속 수색하세요."
 extreme_frontiers.1415.title: "지휘 갑판"
 extreme_frontiers.1415.desc: "난파선의 지휘 갑판에 접근해 마지막 비행 로그를 추출하고 번역했습니다.\n\n§S방주선 덴드루스 I - 비상 로그 - XZ-47/9-113.5-AE\n\n연대기를 믿은 건 실수였다. 뉴 브라툴라에 도착했지만, 이곳은 낙원의 행성 따위가 아니었다. 덴드리티안은 여기서 생존할 수 없다.\n\n모든 승객의 냉동 수면 기간을 연장했다. 우리는 계속해서 낙원을 찾아야 한다...§!\n\n추가 데이터 복구를 통해 지휘 갑판의 과학 단말기에서 이들의 '연대기'를 발견할 수 있었는데, 그 정체는 특이한 수학적 증명식의 모음집이었습니다. 이 수학 방정식들은 기이한 형태의 덴드루스 수학을 활용해 이상적인 거주 가능 행성, '§Y뉴 브라툴라§!'의 예상 위치를 제시하고 있습니다."
 extreme_frontiers.1415.a: "이 '연대기'를 연구하세요."
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT: "덴드리티안 연대기 연구"
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT$"
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC: "§Y[from.Planet.GetName]§!의 난파 방주선에서 회수한 복잡한 수학 증명 모음집, '연대기'를 연구합니다. 이를 통해 덴드리티안들이 찾던 낙원의 행성인 '§Y뉴 브라툴라§!'에 대해 더 많은 정보를 얻고자 합니다."
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE_DESC: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC$"
 extreme_frontiers.1420.title: "손상된 초공간 항로 발견"
 extreme_frontiers.1420.desc: "덴드리티안 연대기는 복잡한 수학적 공리와 추상으로 구성되어 있으며, 이 기이한 정리들은 §Y[from.solar_system.GetName]§! 성계에 이전까지 기록되지 않은 초공간 항로가 하나 존재하며, 이것이 '§Y뉴 브라툴라§!'로 이어진다는 암시를 담고 있습니다.\n\n우리는 광범위한 양자 스캔을 통해 소재 불명이었던 이 초공간 항로 입구를 마침내 찾아냈지만, 블랙홀과 너무 인접해 있었던 탓에 극심한 손상을 입어 희미해진 상태였습니다. 이 항로를 복원할 수 있다면 그 끝에 있는 존재를 처음으로 발견하게 될 것입니다."
 extreme_frontiers.1420.a: "덴드리티안들이 찾지 못한 길을 우리가 발견했군요."
 RESTORE_HYPERLANE_PROJECT: "손상된 초공간 항로 복원"
 RESTORE_HYPERLANE_PROJECT_DESC: "§Y[from.solar_system.GetName]§! 성계의 손상된 초공간 항로를 복원할 방법을 찾으면 덴드리티안들이 찾던 낙원 행성, §Y뉴 브라툴라§!의 존재를 확인할 수 있을 것입니다."
 extreme_frontiers.1425.title: "복원된 초공간 항로"
 extreme_frontiers.1425.desc: "§Y[from.Planet.solar_system.GetName]§! 성계의 블랙홀에 에너지를 주입하고 중력장을 재구성해 손상된 초공간 항로의 입구를 복원했습니다.\n\n1차 분석 결과, 초공간 항로 끝에는 덴드리티안 연대기에 언급된 §Y뉴 브라툴라§!의 특징과 일치하는 행성이 존재하는 것으로 확인되었습니다."
 extreme_frontiers.1425.a: "탐사할 새로운 행성을 찾았군요."
 NAME_new_bratulla: "뉴 브라툴라"
 NAME_new_bratulla_star: "키포스"
 extreme_frontiers.1430.title: "뉴 브라툴라"
 extreme_frontiers.1430.desc.common: "덴드리티안 연대기에 서술된 행성, 뉴 브라툴라의 존재를 확인했습니다. 뉴 브라툴라에는 대단히 풍부하고 다양한 식물 생태계가 존재하며, 추가 조사를 통해 수백만 종의 다양한 토착종들 또한 감지했습니다."
 extreme_frontiers.1430.desc.begin: "이 흥미로운 행성은 식물성 생명체에 특히나 적합한 환경으로,"
 extreme_frontiers.1430.desc.end: "이 행성의 토양에는 수십억 종의 다양한 박테리아가 서식하고 있으며, 이들은 유기적인 뿌리 구조에 영양을 공급하고, 이를 보호하며 회복을 돕고 있습니다.\n\n식물들은 연결된 뿌리 시스템을 통해 필요한 순서대로 영양분을 분배하는 것으로 보이며, 영양이 풍부한 식물은 잉여분을 공유하는 듯합니다."
 extreme_frontiers.1430.desc.default: "$extreme_frontiers.1430.desc.begin$ 덴드리티안과 같은 종족들에게 이상적인 서식지입니다. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.phototrophic: "$extreme_frontiers.1430.desc.begin$ 우리와 같은 종족들에게 이상적인 서식지입니다. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.respawn: "우리 [Root.Owner.GetScientistPlural]들은 방주선에서 확보한 유전자 샘플을 이 행성의 특이한 토양에 옮겨 심는다면 덴드리티안 종족을 복원할 수 있을 것으로 보고 있습니다."
 extreme_frontiers.1430.a: "이 행성은 덴드리티안의 집이 되어야 합니다."
 extreme_frontiers.1430.b.default: "뉴 브라툴라는 우리 차지입니다."
 extreme_frontiers.1430.b.phototrophic: "우리한테 완벽한 행성이군요."
 extreme_frontiers.1430.b.megacorp: "이 미개척 행성을 개발해야 합니다."
 NAME_buds_of_dendrus: "덴드루스의 싹"
 NAME_dendritian: "덴드리티안"
 NAME_dendritian_plural: "덴드리티안"
 ADJECTIVE_dendritian: "덴드리티안"
 opinion_dendrus: "덴드리티안의 구원자"
 opinion_to_dendrus: "$opinion_dendrus$"
 extreme_frontiers.1435.title: "속국화 제안"
 extreme_frontiers.1435.desc: "수백 년이 흐르긴 했지만... 어쨌든 덴드리티안 연대기에서 예견된 대로, 마침내 §Y뉴 브라툴라§!에 덴드리티안들이 뿌리를 내리고 번영하고 있습니다.\n\n우리가 이곳에 있는 것은 §Y[Root.GetName]§! 덕분입니다. 그 은혜를 잊지 않겠습니다.\n\n말뿐인 감사가 아닌 행동으로 보답하겠습니다. 겸허한 마음으로 귀국의 속국이 되기를 청합니다."
 extreme_frontiers.1435.a: "속국으로 받아들이겠습니다."
 extreme_frontiers.1435.b: "여러분의 운명이 펼쳐지는 모습을 지켜봐야 합니다."
 extreme_frontiers.1435.b.tt: "§R덴트루스의 싹§!으로 플레이합니다."
 extreme_frontiers.1435.c: "여러분의 지식만으로도 충분합니다."
 extreme_frontiers.1435.c.tt: "£society£ §Y생물학 기술§!을 [Root.GetDendrusGivenBiotechAmount]개 획득합니다."
 # GEORADIATION TERRAFORMING
 georadiation_terraforming_chain_title: "지오라디에이션 테라포밍"
 georadiation_terraforming_chain_desc: "§Y[from.Planet.GetName]§!에서 발견된 파괴적인 테라포밍 장치의 잔해는 계속해서 은하계의 몇몇 지점으로 신호를 방출하고 있습니다. 해당 지점들을 조사하면 이 위험한 기술에 대해 더 알아볼 수 있을 것입니다."
 site_georadiation_terraforming: "지하 동굴망"
 site_georadiation_terraforming_desc: "우리 감지기가 §Y[from.Planet.GetName]§!의 충돌 크레이터 깊은 곳에서 방출되는 이상 통신 신호를 포착했습니다.\n\n지형 스캔 결과, 크레이터 중앙에서 입구가 무너진 지하 동굴망을 발견했습니다. 또한 방사선 장비가 현장에서 방출되는 희미한 중력 방사선을 감지해, 해답보다 오히려 더 많은 의문이 제시되고 있습니다."
 extreme_frontiers.1500.title: "방사능 잔해"
 extreme_frontiers.1500.desc: "§Y[from.Planet.GetName]§!의 충돌 크레이터를 발굴하는 과정에서 부서진 잔해가 드러났습니다. 이 파편들은 이전 궤도에서 감지한 중력 방사선을 강하게 방출하고 있었습니다.\n\n지하 동굴망에 진입할 수 있게 되었으니, 이제 §Y[leader.GetName]§!(을)를 보내 통신 신호의 출처를 추적할 수 있습니다."
 extreme_frontiers.1500.a: "신호를 추적하세요."
 extreme_frontiers.1505.title: "부식된 장치"
 extreme_frontiers.1505.desc: "§Y[from.Planet.GetName]§!의 통신 신호를 추적해 그 출처에 도달했습니다. 행성 지각 깊은 곳에서 구조적 손상을 입은 거대 구조물을 발견한 것입니다.\n\n산성에 노출되어 부식된 통신 배열체는 낯선 언어 신호를 계속해서 방출하며 먼 존재와 교신하려는 시도를 멈추지 않고 있습니다.\n\n특수 중력 걸쇠로 기반암에 단단히 고정된 이 장치의 진정한 용도를 파악하기 위해서는 조사가 더 필요할 것입니다."
 extreme_frontiers.1505.a: "신호를 해독하세요."
 extreme_frontiers.1510.title: "파괴적 테라포밍"
 extreme_frontiers.1510.desc.common: "면밀한 분석 결과, §Y[from.Planet.GetName]§!에서 발견한 구조물이 투박하지만 파괴적인 테라포밍 기기라는 사실만은 부분적으로 확인했습니다.\n\n이 기계는 목표 자원의 방사능이 증대되도록 촉진해, 토착 생물권을 방사선에 노출하도록 설계되어 있습니다. 그 결과 행성의 생태계가 연쇄적으로 파괴되고 행성 전역의 전반적인 독성이 증가하는 한편, 사용자는 풍부한 추출 자원을 확보할 수 있게 됩니다.\n\n정확한 작동 원리를 완전히 이해하지는 못했지만, 우리는 장치의 통신 주파수를 성공적으로 해독해 동일한 신호를 보내는 지점을 두 군데 더 알아냈습니다."
 extreme_frontiers.1510.desc.default: "해당 장소들을 조사하면 이 기술에 대한 통찰을 높일 수 있을 듯합니다."
 extreme_frontiers.1510.desc.industrialist: "이 기술을 창조한 기업가다운 개척자들은 분명 수익을 효율화하는 데 탁월한 능력을 지니고 있었습니다. 이번 발견을 더 탐구하면 많은 것을 배울 수 있을 것입니다."
 extreme_frontiers.1510.a: "탐색을 개시합시다."
 GEORADIATION_SIGNAL_1_PROJECT: "신호 흔적: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_1_PROJECT_DESC: "§Y[from.Planet.GetName]§!에서 발견한 구조물이 발신하던 것과 동일한 통신 주파수를 추적한 끝에, 이 현장에서 또 다른 파손된 장치를 발견했습니다. 연구를 통해 그 파괴적인 테라포밍 능력에 대한 통찰을 높일 수 있을 듯합니다."
 extreme_frontiers.1515.title: "중력 연료"
 extreme_frontiers.1515.desc.common: "§Y[from.GetName]§!에서 또 다른 파손된 테라포밍 장치를 성공적으로 발견했습니다. 이전과 달리 이번 장치는 동력원이 일부 남아 있었는데, 연구를 통해 이 장치가 방사선 방출의 원동력으로 §H암흑 물질§!을 사용하고 있음을 확인했습니다.\n\n이 장치는 핵심 분자 결합을 전이시켜 목표 자원의 성장을 가속하고, 그 결과 해당 자원은 증식하지만 주변 생물권의 세포 구조가 무너지게 됩니다."
 extreme_frontiers.1515.desc.industrialist: "자원을 개발하기 위해 행성의 안정을 무참히 무시하는 모습이 큰 영감을 줍니다."
 extreme_frontiers.1515.desc.signal_2_done: "결정화된 내화 배열을 통해 방사선 파동을 발산하는 이 기기는, 행성의 핵을 무너지지 않게 하면서 중력 분자 조작으로 목표를 테라포밍할 수 있습니다.\n\n확보한 기록에서 폭발하지 않은 네 번째 장치의 위치를 확인했습니다."
 extreme_frontiers.1515.desc.signal_2_not_done: "이 장치가 어떻게 목적을 달성하면서도 행성 규모의 중력 붕괴를 일으키지 않을 수 있는지는 아직 명확하지 않지만, 남은 통신 발신지에서 그 해답을 찾을 수 있을지도 모릅니다."
 GEORADIATION_SIGNAL_2_PROJECT: "신호 흔적: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_2_PROJECT_DESC: "§Y[from.Planet.GetName]§!에서 발견한 구조물이 발신하던 통신 주파수를 추적한 끝에, 이 현장에서 또 다른 파손된 장치를 발견했습니다. 연구를 통해 그 파괴적인 테라포밍 능력에 대한 통찰을 높일 수 있을 듯합니다."
 extreme_frontiers.1520.title: "방사선 촉진"
 extreme_frontiers.1520.desc.common: "§Y[from.GetName]§!에서 또 다른 파손된 테라포밍 장치를 성공적으로 발견했습니다. 이 장치는 고장 난 굴절 배열체의 오작동으로 자라난 크리스탈에 둘러싸여 있었습니다.\n\n정밀 조사 결과, 장치가 목표에 집중적으로 방사선을 투사하기 위해 사용한 방법이 확인되었습니다. 제어된 변조 피드백 루프를 활용하여, 사전에 설정한 자원을 직접 겨냥하고 성장을 촉진할 수 있었던 것입니다."
 extreme_frontiers.1520.desc.signal_1_done: "이를 통해 행성에 중력 붕괴를 일으키지 않으면서도 고강도 테라포밍을 이룬 것으로 보입니다.\n\n확보한 기록에 폭발하지 않은 네 번째 장치의 위치가 확인됩니다."
 extreme_frontiers.1520.desc.signal_1_not_done: "하지만, 오작동이 있었음에도 기계의 연료가 모두 소진되어 방사선 생성에 사용한 정확한 물질은 확인할 수 없었습니다. 남아 있는 통신 발신지에서 그 해답을 찾을 수 있을지도 모릅니다."
 UNDETONATED_GEORADIATION_PROJECT: "폭발하지 않은 장치"
 UNDETONATED_GEORADIATION_PROJECT_DESC: "§Y[planet.GetName]§!에서 폭발하지 않은 네 번째 테라포밍 장치를 발견했습니다. 장치를 회수하면 이 기술에 대한 남은 질문들의 해답을 얻을 수 있을 것입니다."
 extreme_frontiers.1525.title: "폭발하지 않은 장치"
 extreme_frontiers.1525.desc.common: "§Y[from.GetName]§!의 표면에서 비활성화된 온전한 네 번째 기기를 성공적으로 확보했습니다. 제어 구조를 분석하면 이 기술을 복제하는 데 필요한 마지막 정보를 얻을 수 있을 것입니다."
 extreme_frontiers.1525.desc.industrialist: "이 기술을 자유자재로 활용할 수 있을 때 은하계에서 얻을 막대한 이익이 하찮은 환경 문제보다 훨씬 중요합니다. 이는 [controller.GetName]에 있어 황금 같은 기회입니다."
 extreme_frontiers.1520.desc.default.common: "이 기술을 은하 규모로 자유롭게 도입할 경우 발생할 잠재적인 파급 효과는 심각한 문제를 야기할 수 있습니다."
 extreme_frontiers.1525.desc.default.default: "이 장치들이 초래할 수 있는 잠재적 위험을 은하계에서 제거하는 편이 나을지도 모릅니다."
 extreme_frontiers.1525.desc.default.homicidal: "이 기술이 우리에게 사용되기 전에 이 위협을 은하계에서 제거하는 편이 나을지도 모릅니다."
 extreme_frontiers.1525.a.default: "장치를 연구하세요."
 extreme_frontiers.1525.a.industrialist: "뭘 망설이는 겁니까? 연구를 시작하세요!"
 extreme_frontiers.1525.b: "득보다 실이 큽니다. 장치를 파괴하세요."
 extreme_frontiers.1530.title: "약관 위반"
 extreme_frontiers.1530.desc.common: "§Y[from.GetName]§!의 장치를 연구하던 중 실수로 비상 안전장치를 발동해 모든 주파수에 경보 사이렌이 울리고 있습니다. 이 신호가 무시될 거라는 우리의 초기 예상과는 달리, 자동 드론 하나가 우리 영역에 나타났습니다.\n\n모든 통신에서는 다음의 동일한 응답이 돌아옵니다.\n\n\"안녕하세요, 소중한 고객님. 당사 기록에 따르면 고객님께서는 최신 MKIII 지오라디에이션 매트릭스의 비인가 버전을 제작하려 하고 계십니다. 이는 $NAME_Geocorp$의 최종 사용자 라이선스 약관을 명백히 위반하는 행위입니다.\n\n당사는 귀하의 시도를 중단하기 위해 강경한 법적 권한을 행사할 예정입니다. 불만 사항이 있으신 경우 저희 고객 서비스 드론에 문의해 주시길 바랍니다.\""
 extreme_frontiers.1530.desc.industrialist: "직접 찾아온 성실한 태도는 본받을 만하지만, 우리의 작업을 지연시키고 있습니다."
 extreme_frontiers.1530.a: "통신을 연결하세요."
 extreme_frontiers.1530.b: "'고객 서비스'와 협상할 생각은 없습니다."
 GEORADIATION_ANALYSIS_PROJECT: "장치 분석"
 GEORADIATION_ANALYSIS_PROJECT_DESC: "§Y[planet.GetName]§!에서 발견한 장치의 제어 구조를 분석하면 필요에 따라 이 기술을 복제할 수 있을 것 같습니다."
 NAME_Geocorp: "코번코프"
 geocorp_corvette: "$NAME_Geocorp$ 전투 드론"
 geocorp_corvette_plural: "$NAME_Geocorp$ 전투 드론"
 NAME_Geocorp_Combat_Drone: "$geocorp_corvette$"
 extreme_frontiers.1531.title: "$NAME_Geocorp$ 드론"
 extreme_frontiers.1531.desc: "연결이 이루어지고, 고풍스러운 음악이 재생되더니 자동 안내 데스크 드론이 응답합니다.\n\n안녕하세요, 소중한 고객님. 현재 MKIII 지오라디에이션 매트릭스의 비인가 버전을 제작 중이신 것으로 보입니다. 어떻게 도와드릴까요?"
 extreme_frontiers.1531.a: "어디서 나타난 거죠?"
 extreme_frontiers.1531.a.reply: "\"$NAME_Geocorp$에서 구매하신 모든 기기는 정상 작동과 평생 고객 유지를 보장하기 위해 원격 고객 만족 궤도 위성과 함께 배송됩니다. 내부 에너지 저장고 덕분에 수 세기가 지나도 멀쩡하죠.\""
 extreme_frontiers.1531.b: "관리자와 대화할 수 있을까요?"
 extreme_frontiers.1531.b.reply: "\"유감스럽게도, 마지막 관리자가 사망했습니다. 그러나 고객 만족을 위한 저희의 노력은 생물학적 수명에 연연하지 않습니다.\""
 extreme_frontiers.1531.c: "우리는 그저 잔해를 수습했을 뿐입니다."
 extreme_frontiers.1531.c.reply: "\"무지는 변명이 될 수 없습니다. MKIII 지오라디에이션 매트릭스 이용 약관은 구매 당시 상세히 안내되었습니다.\""
 extreme_frontiers.1531.d: "구독을 갱신하고 싶습니다."
 extreme_frontiers.1531.d.reply: "\"반가운 소식이군요. 행정 수수료 3000 §Y에너지 크레딧§!을 지불하시는 대로 서류에 서명하겠습니다. 해당 금액이 입금되면 문제가 해결된 것으로 간주하고 저희는 철수하도록 하겠습니다.\""
 extreme_frontiers.1531.e: "이 기기를 구매한 것은 저희가 아닙니다."
 extreme_frontiers.1531.e.reply: "\"그럼 절도를 인정하시는 건가요? 사안이 훨씬 간단해지겠군요. 저희 도난 방지 프로토콜은 목숨을 보장하지 않습니다. 참고로, 장례 물품도 판매하니 다가올 수요에 맞춰 구매를 고려해 주시길 바랍니다.\""
 extreme_frontiers.1531.f: "수수료를 지불하겠습니다."
 extreme_frontiers.1531.f.reply: "\"MKIII 지오라디에이션 매트릭스 라이선스를 갱신해 주셔서 감사합니다. 저희의 이득만큼이나 고객님께서도 유용하게 사용하시길 바랍니다.\"\n\n수수료를 지불하니 드론이 우주 속으로 사라집니다."
 extreme_frontiers.1531.g: "터무니없군요. 전투에 대비하세요."
 extreme_frontiers.1531.h: "속이 시원하군요."
 extreme_frontiers.1531.i: "전투에 대비하세요."
 extreme_frontiers.1534.title: "$NAME_Geocorp$ 드론"
 extreme_frontiers.1534.desc: "§Y[fromfrom.solar_system.GetName]§!에서의 전투가 종료되자, 고객 서비스 드론으로부터 도착한 새로운 통신이 우리 화면에 나타났습니다.\n\n\"최종 사용자 라이선스 약관 조건 집행에 대한 귀하의 반대를 접수했습니다. 귀하의 압도적인 군사력을 확인한바, 당사는 MKIII 지오라디에이션 매트릭스에 대한 지적재산권 청구를 철회하겠습니다. 새로 획득하신 기술을 유용하게 사용하시길 바랍니다.\"\n\n메시지 전달 후 드론이 폭발하며 통신이 끊겼습니다."
 extreme_frontiers.1534.a: "속이 시원하군요."
 extreme_frontiers.1535.title: "약관 변경"
 extreme_frontiers.1535.desc: "고객 서비스 드론을 처리했으니, 지오라디에이션 매트릭스 역설계 작업을 재개할 수 있습니다."
 extreme_frontiers.1535.a: "계속 연구하세요."
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED: "$GEORADIATION_ANALYSIS_PROJECT$"
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED_DESC: "$GEORADIATION_ANALYSIS_PROJECT_DESC$"
 extreme_frontiers.1540.title: "폭발하지 않은 장치"
 extreme_frontiers.1540.desc.industrialist: "쉬지 않는 사업가의 효율성을 바탕으로, 우리는 MKIII 지오라디에이션 매트릭스를 역설계해 최대 이익을 낼 수 있도록 작동 방식을 개선했습니다."
 extreme_frontiers.1540.desc.default: "많은 연구 끝에 MKIII 지오라디에이션 매트릭스를 역설계하고 개선하여, 그 잠재력을 완전히 개방했습니다."
 extreme_frontiers.1540.desc.common: "우리 테라포밍 장비에 방사성 분자 불안정화 기술을 추가하면 귀중한 자원의 성장을 촉진할 수 있습니다."
 extreme_frontiers.1540.a: "멋진 소식이군요."
 tech_georadiation_terraforming: "지오라디에이션 테라포밍"
 tech_georadiation_terraforming_desc: "행성의 생물권을 분자 방사선 붕괴에 노출해, 행성을 독성 황무지로 만드는 대가로 특정 자원의 성장을 촉진합니다."
 tech_georadiation_terraforming_tt: "§H$decision_toxify_world$§! §Y행성 결정§!을 잠금 해제합니다."
 extreme_frontiers.1545.title: "장치 파괴"
 extreme_frontiers.1545.desc: "§Y[from.GetName]§!에서 발견한 장치를 성공적으로 파괴하여, 우리 이익에 맞게 재활용할 수 있는 모든 자재를 회수했습니다.\n\n이 장치가 파괴되고 이전 기기들도 잔해가 되었으니, 이제 이 파괴적인 기술의 비밀은 은하계에서 영영 찾을 수 없게 되었습니다."
 extreme_frontiers.1545.a.default: "잘 없앴군요."
 decision_toxify_world: "행성 독성화"
 decision_toxify_world_desc: "행성의 생물권을 분자 방사선 붕괴에 노출해 특정 자원의 성장을 촉진하며, 그 과정에서 행성을 독성 황무지로 만듭니다."
 decision_toxify_world_tt: "상황 개시: §H행성 독성화§!\n - 이 행성에 [this.GetToxifiedResourcesText] 매장지를 조성하며 §Y유독성 행성§!으로 만듭니다."
 not_toxifying_world: "아직 독성화되고 있지 않음"
 not_toxifying_world_pass: "$TRIGGER_PASS$$not_toxifying_world$"
 not_toxifying_world_fail: "$TRIGGER_FAIL$$not_toxifying_world$"
