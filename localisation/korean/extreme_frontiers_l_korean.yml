 approach_toxify_world_georadiation_tt: "행성을 방사선 처리해 6개월마다 £minerals£ §Y$minerals$§!, £alloys£ §Y$alloys$§!, £energy£ §Y$energy$§! 또는 £food£ §Y$food$§!을 얻습니다."
