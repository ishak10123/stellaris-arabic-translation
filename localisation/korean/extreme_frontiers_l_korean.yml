l_korean:
 #############
 # Anomalies #
 #############
 EXTREME_FRONTIERS_TITLE: "Extreme Frontiers" # Do not translate
 # PULSATING OBJECT
 PULSATING_OBJECT_TOXIC_CAT: "맥동하는 물체"
 PULSATING_OBJECT_GAS_GIANT_CAT: "맥동하는 물체"
 PULSATING_OBJECT_BARREN_CAT: "맥동하는 물체"
 PULSATING_OBJECT_BARREN_COLD_CAT: "맥동하는 물체"
 PULSATING_OBJECT_FROZEN_CAT: "맥동하는 물체"
 PULSATING_OBJECT_MOLTEN_CAT: "맥동하는 물체"
 anomaly_pulsating_object_desc: "§Y[this.GetName]§!에 대한 1차 스캔 결과, 대류권에 특이한 물체가 떠다니는 것을 발견했습니다. 위치를 바꿀 때마다 크기가 작아졌다가 커지기를 반복하는 이 물체의 성질을 정확히 파악하려면 추가적인 조사가 필요합니다."
 extreme_frontiers.100.title: "고대 기상 관측 기구"
 extreme_frontiers.100.desc: "§Y[Leader.GetName]§!(이)가 §Y[from.GetName]§!에서 발견한 수수께끼의 물체를 고대 기상 관측 기구로 식별했습니다. 그 근원을 추적할 수 있는 흔적은 극한의 환경 속에서 사라진 것으로 보입니다.\n\n방사성 연대 측정 결과, 이 물체는 100년 이상 [from.GetName]의 대기에 머물렀으며, 행성의 특이한 압력 변화에 따라 크기를 바꾸며 하염없이 떠다닌 것으로 추정됩니다.\n\n기적적이게도 기구의 태양광 패널은 여전히 작동 중이며 감지 배열망에는 100년이 넘는 분량의 값진 대기 데이터가 축적되어 있습니다. 이번 발견에 우리 [Root.Owner.GetResearchers]들이 큰 관심을 보일 것입니다."
 # MOLTEN METAL OCEAN
 MOLTEN_METAL_OCEAN_CAT: "극한의 용암류"
 anomaly_molten_metal_ocean_desc: "§Y[from.GetName]§!에 대한 초기 조사에서 고농도의 중금속을 함유한 초고온 용암이 쓰나미처럼 분출되는 현상을 빈번하게 감지했습니다. 이 현상을 완전히 이해하려면 추가적인 분석이 필요합니다."
 extreme_frontiers.110.title: "금속성 쓰나미"
 extreme_frontiers.110.desc: "§Y[Leader.GetName]§!(이)가 확인한 바에 따르면, §Y[from.GetName]§!의 용암 바다에는 우리가 알고 있는 거의 모든 희귀 준금속이 매우 순수한 형태로 존재하고 있었습니다.\n\n이러한 액체 금속의 농축된 집합체는 극도로 불안정한 전자기장을 생성해 빈번한 용암 쓰나미를 유발합니다.\n\n이 파도는 짧지만 주기적으로 그 세기가 약해지는 순간이 있는데, 예측 모델에 따르면 이 현상을 활용해 풍부한 자원을 수확할 수 있습니다."
 # GREAT BLUE SPOTS
 GREAT_BLUE_SPOTS_CAT: "대청점"
 great_blue_spots_desc: "우주에서도 식별될 만큼 크고 뚜렷하게 변색된 파란색 점 두 개가 나란히 움직이는 현상이 §Y[from.GetName]§! 표면에서 관측되었습니다. 더 연구할 만한 가치가 있는 흥미로운 현상입니다."
 extreme_frontiers.120.title: "초대형 공생 폭풍"
 extreme_frontiers.120.desc: "§Y[from.GetName]§! 표면에서 발견한 푸른 변색 지점은 서로 공생하는 한 쌍의 초대형 폭풍이었습니다. 사이클론과 반사이클론으로 구성된 두 폭풍은 완벽한 균형 속에서 서로를 유지하고 있습니다.\n\n이 거대한 두 폭풍은 주기적으로 음속을 돌파하며 강렬한 폭음을 만들어 내며, 푸른 색상은 내부에 다량으로 존재하는 코발트 먼지에서 비롯된 것으로 보입니다.\n\n§Y[Leader.GetName]§!의 예상에 따르면, 두 폭풍은 100년이 넘도록 지속되고 있는 듯합니다. 또한, 상층 대기권에 축적된 광물은 채굴 기지를 통해 쉽게 확보할 수 있을 것 같습니다."
 # FROZEN INFERNO
 FROZEN_INFERNO_CAT: "열 급증"
 frozen_inferno_desc: "§Y[from.GetName]§!의 1차 스캔 결과, 얼어붙은 천체에서 극도로 불규칙한 열 급증 현상이 관측되었습니다. 이러한 비정상적 온도 변화는 추가적인 조사가 필요합니다."
 extreme_frontiers.130.title: "얼어붙은 불지옥"
 extreme_frontiers.130.desc: "§Y[Leader.GetName]§!(이)가 얼음 행성인 §Y[from.GetName]§!의 불규칙한 열 급증 현상에 관한 연구를 완료했습니다.\n\n이 행성 표면에 끝없이 펼쳐진 동토대에는 반응성이 매우 높은 발화성 물질이 매장되어 있었습니다. 처음에는 얼음 속 깊은 곳에 비활성 상태로 갇혀 있던 이 물질은 대륙 빙상이 이동하고 부서지면서 주기적으로 표면으로 걸러져 올라오게 됩니다.\n\n그렇게 행성 표면에 노출되어 녹아 버린 이 초고인화성 가스가, 산소가 풍부한 [from.GetName]의 대기와 만나 갑작스럽게 발화하여 행성 전역에서 빈번한 화재를 일으킨 것입니다.\n\n특수 장비가 있다면 이 특이한 발화성 물질을 추출해 다른 용도로 활용할 수 있습니다."
 # POISONED ATMOSPHERE
 POISONED_ATMOSPHERE_CAT: "독성 대기"
 poisoned_atmosphere_desc: "§Y[from.GetName]§!의 상층 대기권에서 고농도의 유기 독성 분자가 감지되었습니다."
 extreme_frontiers.140.title: "독성 대기"
 extreme_frontiers.140.desc.hive_mind: "§Y[from.GetName]§!(은)는 포식자로부터 자신을 보호하기 위해 치명적인 독성 분자를 대기 중으로 배출하는 특수한 이끼류가 자생하는 곳입니다.\n\n화석 기록 연구에 따르면 [from.GetName]에는 한때 다양한 동물군이 서식했지만, 이 이끼류가 대기의 비소와 탈륨 농도를 점차 증가시켰고, 그 속도에 적응하지 못한 대부분의 동물이 멸종하고 말았습니다.\n\n§Y[Leader.GetName]§!의 발견에 따르면, 현재 이 행성에는 대단히 효율적인 해독샘을 지닌 대형 파충류 한 종만이 살아남았다고 합니다.\n\n이 놀라운 해독샘을 더 연구한다면 대기 해독에 관한 중요한 통찰을 얻을 수 있을 것입니다."
 extreme_frontiers.140.desc.default: "$extreme_frontiers.140.desc.hive_mind$ 또한 초기 실험 결과, 해당 독성 물질의 독특한 화합물이 미용 산업에 활용될 가능성이 있는 것으로 나타났습니다."
 extreme_frontiers.140.a: "흥미로운 잠재력을 지니고 있군요..."
 extreme_frontiers.140.b: "가공해서 향수로 만드세요."
 DETOXIFICATION_GLAND_PROJECT: "해독샘 연구"
 DETOXIFICATION_GLAND_PROJECT_DESC: "§Y[from.GetName]§!의 독성 대기 속에는 특수한 내부 기관을 통해 극독을 영양분으로 전환할 수 있는 놀라운 파충류가 서식하고 있습니다. 이 생물체는 더 연구할 가치가 충분할 것으로 보입니다."
 extreme_frontiers.145.title: "해독에 대한 통찰"
 extreme_frontiers.145.desc: "§Y[from.GetName]§! 파충류의 해독샘에 관한 집중 연구를 통해, §Y[Leader.GetName]§!(이)가 행성 전역에 퍼진 독에 대한 이들의 놀라운 저항력에 감춰진 생물학적 비밀을 밝혀냈습니다.\n\n이 복잡한 기관은 독성 대기를 중화하는 화합물을 생성하여 순환계로 독이 흡수되지 않도록 막아 주는데, 우리 실험실에서 제조한 가장 치명적인 독마저도 중화할 수 있을 정도로 뛰어난 적응력을 가지고 있었던 것입니다.\n\n이러한 놀라운 연구 결과는 대기 해독에 대한 우리의 접근 방식을 완전히 바꿔 놓을 것입니다."
 # GLIMPSE OF THE CORE
 GLIMPSE_CORE_CAT: "핵의 단면"
 glimpse_the_core_desc: "§Y[from.GetName]§!의 가스층 외피에서 발생한 이상한 움직임으로 인해 매우 깊은 곳까지 틈이 열리면서, 행성의 단단한 핵이 짧은 간격으로 노출되고 있습니다. 이 놀라운 현상에 대해 추가 조사가 필요합니다."
 extreme_frontiers.150.title: "유기체 핵"
 extreme_frontiers.150.desc: "§Y[Leader.GetName]§!(이)가 §Y[from.GetName]§!의 일시적으로 열린 틈에 탐사정을 투입한 결과, 행성의 핵에 지금까지 관찰한 존재들과는 전혀 다른 단세포 생물이 서식하고 있는 것을 발견했습니다.\n\n이 강인한 세포들은 극한의 압력 환경에도 완벽히 적응하여 생존하고 있으며, 계절별 번식을 통해 대량의 산소를 방출하는 것으로 관측되었습니다. [Leader.GetName](은)는 이 생물들이 행성의 가스층 외피를 유지하는 데 중요한 역할을 하고 있다고 결론지었습니다.\n\n이 유기체들을 제거하면 가스층 외피가 붕괴해 정착 가능한 암석 행성으로 변할 가능성이 있습니다."
 extreme_frontiers.150.a: "전부 없애 버리세요."
 extreme_frontiers.150.b: "귀중한 관측 기회군요."
 PURIFY_CORE_PROJECT: "핵 정화"
 PURIFY_CORE_PROJECT_DESC: "§Y[from.GetName]§!의 가스층 외피는 핵에 서식하는 단세포 생물의 독특한 생화학적 특성에 의해 유지되고 있습니다. 이 유기체들을 제거하면 가스층 외피가 붕괴해 정착 가능한 암석 행성으로 변할 것입니다."
 extreme_frontiers.155.title: "신세계"
 extreme_frontiers.155.desc: "§Y[Leader.GetName]§!(이)가 §Y[from.From.GetName]§!의 표면에 열린 틈 중 하나에 무기가 탑재된 탐사정을 보냈습니다. 탐사정은 핵에 도착한 후 독성 물질을 방사하여 단세포 생물을 감염시키고 멸살했습니다.\n\n이후 [from.From.GetName]의 가스층 외피가 서서히 사라지면서 작은 암석 행성으로 변하는 모습이 관찰되었습니다."
 extreme_frontiers.155.a: "대단하군요."
 # OPTICAL PHENOMENA
 OPTICAL_PHENOMENA_CAT: "반짝이는 표면"
 optical_phenomena_desc: "§Y[from.GetName]§!의 영상 스캔에서는 매우 선명한 광학 현상이 관측됩니다. 궤도 거리에서 관측 중이기 때문에 이러한 현상이 발생하는 원인은 아직 명확하지 않습니다."
 extreme_frontiers.160.title: "무지갯빛 빙상"
 extreme_frontiers.160.desc.default: "§Y[from.GetName]§!의 표면에 대한 정밀 관측을 통해, 궤도 거리에서 관측된 광학 현상의 원인을 밝혀냈습니다.\n\n행성의 대기 조건에 의해 영구 동토의 많은 부분이 연마되면서 투명한 광택을 띠게 되었고, 그 아래 복잡한 망을 이루며 숨겨져 있던 형형색색의 크리스탈이 드러난 것입니다. 이 자연 현상은 멀리서 관측할 때 만화경 같은 효과를 만들어 냅니다."
 extreme_frontiers.160.desc.machine: "$extreme_frontiers.160.desc.default$\n\n누구든 그 아름다운 광경에 매료되겠지만, 우리의 목표는 그 아래에 있는 풍부한 광물 매장지입니다."
 extreme_frontiers.160.tooltip: "§H$decision_prismatic_ice_exhibit$§! §Y행성 결정§!이 잠금 해제됩니다. 결정을 제정하면 다음 효과가 발생합니다:\n£amenities£ $MOD_PLANET_AMENITIES_MULT$: §G+25%§!\n$mod_planet_jobs_unity_produces_mult$: §G+25%§!"
 decision_prismatic_ice_exhibit: "무지갯빛 빙하 전시회"
 decision_prismatic_ice_exhibit_desc: "매혹적인 만화경 효과를 자아내는 다수의 투명한 얼음판을 확보했습니다. 이 얼음판은 제한된 시간 동안만 전시할 수 있습니다."
 prismatic_ice_max_3_times_pass: "최대 §Y3§!회까지 시행할 수 있습니다."
 prismatic_ice_max_3_times_fail: "$TRIGGER_FAIL$최대 §Y3§!회까지 시행할 수 있습니다."
 prismatic_ice_max_3_times_pass_with_var: "$TRIGGER_PASS$$prismatic_ice_max_3_times_pass$(현재: §Y[owner.prismatic_ice_exhibit_happened]§!)"
 exhibiting_prismatic_ice: "무지갯빛 빙하 전시회"
 exhibiting_prismatic_ice_desc: "매혹적인 만화경 효과를 자아내는 다수의 투명한 얼음판을 확보했습니다. 이 얼음판은 제한된 시간 동안만 전시할 수 있습니다."
 # PLASMA VOLCANOES
 PLASMA_VOLCANO_CAT: "궤도 플라스마"
 plasma_volcano_desc: "불안정한 초고온 플라스마가 §Y[from.GetName]§! 상층 대기로 분출되는 모습이 확인되었습니다.\n\n대기의 짙은 화산재 때문에 궤도상에서 플라스마의 발원지를 정확히 식별할 수 없습니다. 하지만 더 가까이서 조사할 경우 위험할 가능성이 높습니다."
 extreme_frontiers.170.title: "플라스마 화산"
 extreme_frontiers.170.desc: "§Y[Leader.GetName]§!(이)가 §Y[from.GetName]§!에서 발생한 초고온 플라스마 분출의 원인을 밝혀냈습니다.\n\n이 행성의 독특한 자기장이 맨틀 내부 이온화된 물질들 간의 반응을 촉진해, 고압 플라스마가 가득한 화산 분지를 형성한 것입니다.\n\n불안정안 지각 표층이 충돌할 때, 이 플라스마는 치명적인 투사체처럼 폭발적으로 분출되어 대기 중 가스들을 점화시키며 2차 폭발을 유발합니다. 이에 우리 무기 전문가들은 이러한 원리를 플라스마 기반 무기에 적용하고 싶다는 의견을 밝혔습니다."
 extreme_frontiers.170.desc.negative: "안타깝게도 이 연구의 위험성으로 인해 [Leader.GetName](은)는 심각한"
 extreme_frontiers.170.desc.traumatized: "$extreme_frontiers.170.desc.negative$ 정신적인 외상을 입었습니다."
 extreme_frontiers.170.desc.maimed: "$extreme_frontiers.170.desc.negative$ 신체적 부상을 입었습니다."
 # BLACK CLOUDS
 BLACK_CLOUDS_CAT: "검은 구름"
 black_clouds_desc: "§Y[from.GetName]§!의 대기권에서 바람의 속도나 방향과는 무관하게 불규칙한 패턴으로 움직이는 짙은 검은 구름이 발견되었습니다. 이 구름은 행성의 주야 주기 중 언제나 같은 시간에만 순간적으로 우리의 영상 스캔에 포착됩니다."
 extreme_frontiers.180.title: "곤충형 무리"
 extreme_frontiers.180.desc: "§Y[from.GetName]§!의 검은 구름은 사실 대형 육식 곤충들이 밀집한 무리인 것으로 밝혀졌습니다.\n\n이 날개 달린 곤충들은 암석 균열에 서식하며, 하루에 한 번 균열에서 나와 행성 표면에 있는 얼마 안 되는 유기물을 먹어 치웁니다.\n\n세포 부패를 되돌리는 강력한 신진대사 덕분에, 이 절지동물 무리는 주기적으로 영양분을 섭취하는 한 수명을 무한히 늘릴 수 있습니다."
 extreme_frontiers.180.desc.altered_metabolism: "표본 하나가 현장을 분석하던 [Leader.GetName]의 [Leader.Species.GetHandName](을)를 물었고, 이로 인해 놀라운 신진대사 반응이 일어났습니다. 이 특이한 종족은 유기 세포의 회복 능력에 관한 중요한 정보를 지닌 것으로 보입니다."
 extreme_frontiers.180.b: "모두 파내서 섭취하세요."
 leader_trait_altered_metabolism: "신진대사 변형"
 leader_trait_altered_metabolism_desc: "현장 조사 중 외부 물질에 노출된 경험이 이 지도자에게 장기적인 영향을 주었습니다."
 # SUBGLACIAL VIBRATIONS
 SUBGLACIAL_VIBRATIONS_CAT: "빙하 밑 진동"
 subglacial_vibrations_desc: "얼어붙어 생명을 찾을 수 없는 §Y[from.GetName]§!의 표면 아래에는 광활한 빙하 밑 바다가 존재합니다. 영구 동토층 아래에서는 지진과는 다른 성격의 깊고 요란한 진동이 감지되었습니다."
 extreme_frontiers.190.title: "초거대 기각류"
 extreme_frontiers.190.desc: "심해 반향 위치 측정과 지진 원격 측정을 결합해 §Y[from.GetName]§!에서 발생한 진동의 원인을 밝혀냈습니다. 빙하 밑 액체 질소 해양에는 극한의 환경에 적응한 초거대 기각류들이 서식하고 있었습니다.\n\n이 놀라운 생물들은 소형 수송선에 맞먹는 크기와 질량을 지니고 있으며, 행성 전체에 울려 퍼질 만큼 강력한 저주파의 웅웅대는 소리를 발산해 소통합니다. 이 생물이 지닌 콜라겐이 풍부한 특수 지방층은 극저온 화상과 동상으로부터 이들을 보호해 주며, 동시에 바다 전체에 이들의 울음소리가 전달되도록 돕습니다.\n\n자연 포식자가 없는 격리 생태계에 살아가는 이 행성의 생물들은 호기심이 많고, 매우 온순하며, 특이한 발성음을 모방하면 쉽게 표면으로 유인할 수 있습니다."
 extreme_frontiers.190.a: "독특한 발견이군요."
 extreme_frontiers.190.a.tt: "건물 잠금 해제: ['building:building_pinniped_sanctuary']"
 extreme_frontiers.190.b: "차려진 밥상이로군요."
 building_pinniped_sanctuary: "기각류 보호처"
 building_pinniped_sanctuary_desc: "[event_target:pinnipeds_home_planet.GetName]의 액체 질소 해양에서 포획한 초거대 기각류를 위한 보호처입니다."
 # ELECTRIC WATERS
 ELECTRIC_WATERS_CAT: "전기의 바다"
 electric_waters_desc: "궤도 스캔을 통해 §Y[from.GetName]§!의 얼어붙은 바다 깊은 곳에서 불규칙한 전기 신호를 감지했습니다.\n\n추가 연구를 통해 이 수중 현상에 관해 더 알아낼 수 있을 것으로 보입니다."
 extreme_frontiers.200.title: "고전압 산호"
 extreme_frontiers.200.desc: "§Y[Leader.GetName]§!(이)가 §Y[from.GetName]§! 내 심해 전류의 근원을 발견했습니다.\n\n행성의 바다에는 전류를 생성하는 다양한 한류성 산호가 서식하고 있었습니다. 이 산호들은 특수한 세포 소기관을 이용해 전류를 발생시켜 미생물을 유인하고, 생존과 소통의 수단으로 삼습니다.\n\n또한 우리의 조사 탐사정은 이들에게 일종의 자극제 역할을 하고 있는데, 통신 주파수를 변경할 때마다 산호의 전력 출력이 증가하는 반응이 확인됩니다.\n\n이 심해 산호와의 상호 작용을 신중히 조절하면, 섬세한 생태계를 교란하지 않으면서도 행성의 전력 출력을 향상시킬 수 있습니다."
 # OBSIDIAN PLANET
 OBSIDIAN_PLANET_CAT: "반짝이는 풍경"
 obsidian_planet_desc: "§Y[from.GetName]§!의 시각 스캔을 통해, 불모의 행성 표면이 흑요석 대륙판으로 뒤덮여 있는 것이 확인되었습니다. 상위 대기층에는 다량의 황 흔적이 남아 있는 것으로 보입니다.\n\n더 정밀한 지질 조사를 통해 추가 정보를 확인할 수 있을 것입니다."
 extreme_frontiers.210.title: "흑요석 황무지"
 extreme_frontiers.210.desc: "§Y[from.GetName]§!의 퇴적물을 분석한 결과, 한때 화산 행성이었던 이곳이 급속 냉각 현상을 겪으며 표면의 용암이 광택 나는 화산 유리질로 변했다는 사실을 알아냈습니다.\n\n행성 표면에 남은 수많은 충격 분화구로 보아, 이는 유성 폭풍과 같은 외부 천체의 충돌로 발생했을 가능성이 큽니다. 행성의 흑요석에는 급속 냉각으로 막힌 화산 분출구에서 분출된 황산 가스가 대량으로 매립되어 있습니다.\n\n세밀한 추출을 통해 이 자원을 다양한 분야에 활용할 수 있을 것으로 보입니다."
 # SHEARING FORCE
 SHEARING_FORCE_CAT: "통신 두절"
 shearing_force_desc: "§Y[from.GetName]§! 대기권에 배치한 모든 탐사정과의 통신이 두절되었습니다. 장비의 정확한 위치도 파악되지 않고 있습니다.\n\n데이터 회수를 위해서는 더 면밀한 조사가 필요합니다."
 extreme_frontiers.220.title: "전단력"
 extreme_frontiers.220.desc: "§Y[from.GetName]§!에서 우리 탐사정이 사라진 원인이 밝혀졌습니다.\n\n행성 대기를 구성하는 여러 가스층이 극심한 온도 차이를 보이며, 이로 인해 발생한 가스층 간의 격렬한 충돌이 날카로운 역풍을 만들어 낸 것입니다.\n\n이러한 역풍과 각 가스층 간의 밀도 차이로 인해, 대기층을 오가는 모든 물체를 찢어 버릴 수 있는 강력한 전단력이 발생하고 있습니다.\n\n이제 문제를 파악한 만큼, 앞으로 우리는 극한 환경에 맞춰 장비를 개조하고, 이 자연 현상의 운동 에너지를 활용할 방안을 모색할 수 있을 것입니다."
 # MISSING MASS
 MISSING_MASS_CAT: "질량 부족"
 missing_mass_desc: "§Y[from.GetName]§!의 질량을 분석한 결과, 비슷한 규모의 다른 암석 행성에 비해 질량이 현저하게 부족한 것으로 나타났습니다. 추가 조사를 권고드립니다."
 extreme_frontiers.230.title: "맨틀 속 환형동물"
 extreme_frontiers.230.desc: "§Y[from.GetName]§!의 지질을 면밀히 연구한 결과, 이 행성의 규산염 맨틀에는 거대한 지하 굴이 복잡하게 연결되어 있는 것으로 나타났습니다.\n\n탐사정을 통해 조사한 바에 따르면, 이 굴은 깊은 맨틀에서 규산염 암석을 먹으며 대규모로 번식한 환형동물의 서식지입니다. 이 광대한 군집은 내부에서부터 행성을 파먹고 소화한 폐기물을 우주로 배출하는데, 이들이 배출한 쓰레기가 우주풍에 쓸려 흩날리고 있습니다.\n\n이 생물체들을 제거하면 우리 [controller.GetMinerPlural_lower]들이 방대한 규산염 자원에 손쉽게 접근할 수 있을 것입니다."
 extreme_frontiers.230.desc.terravore: "$extreme_frontiers.230.desc$ 이 환형종의 놀라운 식성은 우리와 크게 다르지 않습니다."
 extreme_frontiers.230.a: "드릴을 가동하세요."
 extreme_frontiers.230.b: "이 신비로운 생명체들을 연구하세요."
 # LIFE IN DARKNESS
 LIFE_IN_DARKNESS_CAT: "어둠 속 생명"
 life_in_darkness_desc: "§Y[from.GetName]§!(은)는 동주기 자전 상태에 있어, 행성의 절반이 영구적인 어둠에 잠겨 있습니다. 그러나 적외선 스캔 결과 어둡고 영양분이 부족한 이 지역에도 활발한 유기 생태계가 존재하는 것이 확인됐습니다."
 extreme_frontiers.240.title: "반투명화"
 extreme_frontiers.240.desc: "§Y[from.GetName]§!의 영구적인 암흑 지역에는 가혹한 환경 속에서 살아남은 몇 안 되는 생물들이 독특한 생태계를 이루고 있습니다.\n\n염색체 변이 덕분에 이곳의 생물들은 반투명하며, 시력은 퇴화했고, 생존을 위해 정교한 반향 위치 측정 능력을 사용합니다."
 extreme_frontiers.240.desc.non_homicidal: "$extreme_frontiers.240.desc$ 우리 [controller.GetResearcherPlural_lower]들이 이 생물들의 놀라운 환경 적응력에 큰 관심을 보이고 있습니다."
 extreme_frontiers.240.a: "정말 새롭군요."
 extreme_frontiers.240.b: "그 생물들을 먹어 치웁시다."
 extreme_frontiers.240.c: "말살하세요."
 # RAINBOW RIVERS
 RAINBOW_RIVERS_CAT: "형광빛 강"
 rainbow_rivers_desc: "§Y[from.GetName]§!에 대한 예비 스캔 결과, 행성 표면에는 끊임없이 형형색색으로 변화하며 형광빛을 내는 강이 여럿 존재하는 것으로 확인되었습니다.\n\n추가 조사를 통해 이 현상을 더욱 자세히 분석할 수 있을 것입니다."
 extreme_frontiers.250.title: "다채로운 화학 반응"
 extreme_frontiers.250.desc: "§Y[from.GetName]§!의 형광빛 강을 조사한 결과, 이 강에 특이한 미생물종이 서식하고 있다는 사실이 밝혀졌습니다.\n\n이 미생물들은 화학 합성을 통해 유해한 화합물을 대사하며 그 과정에서 고반응성 부산물을 생성하는데, 이 물질이 강의 화학 구조를 변형해 극적인 색의 변화가 나타났던 것입니다.\n\n이들이 독성 강을 따라 이동하며 발산하는 선명한 네온 빛은 번식 가능성을 알리며 짝을 끌어들이는 신호로서, 일종의 소통 수단으로도 활용됩니다.\n\n이 생물과 그 생애 주기에 관해 추가적인 조사를 진행하면, 우리 [controller.GetResearcherPlural_lower]들이 흥미로운 연구 기회를 포착할 수 있을 것입니다."
 # GASEOUS METALS
 GASEOUS_METALS_CAT: "기체 금속"
 gaseous_metals_desc: "§Y[from.GetName]§!의 대기는 다양한 기체 금속으로 이루어져 있습니다. 이 혹독한 환경을 이해하면 귀중한 금속 화합물을 추출할 수 있을 것입니다."
 extreme_frontiers.260.title: "전기 도금 구름"
 extreme_frontiers.260.desc: "§Y[from.GetName]§!의 특이한 대기가 막대한 태양 복사 에너지를 가두었고, 행성 전역에 온난화를 일으켰습니다. 이로 인해 이 행성의 금속은 기체 상태일 뿐 아니라 극도로 불안정한 성질을 띱니다.\n\n이러한 금속 화합물은 우리가 보낸 탐사 장비에 즉각 반응하여 얇지만 견고한 금속 합금 막을 형성해 장비를 감쌌습니다. 놀랍게도, 그 과정에서 장비는 손상되지 않았습니다.\n\n§Y[leader.GetName]§!(은)는 이 자연 전기 도금 환경이 §Y[controller.GetName]§! 전역에서 함선 선체 인장 강도 향상에 도움이 될 것으로 보고 있습니다."
 ATMOSPHERIC_ELECTROPLATING: "대기 전기 도금"
 ATMOSPHERIC_ELECTROPLATING_DESC: "§Y[from.GetName]§!의 기체 금속 대기에 물체를 넣으면 자연스럽게 전기 도금이 이루어집니다.\n\n놀랍도록 효과적인 이 독특한 과정을 더 연구하면 [Root.Owner.GetName] 전역에서 함선 선체 내구성을 개선하는 데 활용할 수 있을 것입니다."
 extreme_frontiers.265.title: "고성능 금속"
 extreme_frontiers.265.desc: "§Y[from.From.GetName]§!의 불안정한 대기 속에서 이루어지는 독특한 전기도금 현상을 복제해 산업 규모로 활용할 방법을 찾았습니다.\n\n이 지식을 바탕으로 우리 [Root.Owner.GetEngineerPlural]들은 유연성을 포기하거나 무게를 늘리지 않고도 특정 금속의 내구성을 크게 강화할 수 있게 되었습니다.\n\n이 첨단 도금 방식은 선체 제조 공정에 적용될 수 있을 것으로 보입니다."
 # CARBON ALLOTROPES
 CARBON_ALLOTROPES_CAT: "탄소 동소체"
 carbon_allotropes_desc: "§Y[from.GetName]§!에서 얻은 분광 분석 데이터에 따르면, 이 행성에는 희귀하고 복잡한 탄소 동소체가 풍부합니다. 자세한 분류를 위해 추가 조사가 필요합니다."
 extreme_frontiers.270.title: "그래핀 구조"
 extreme_frontiers.270.desc: "§Y[from.GetName]§!에서 풍부한 그래핀 매장지가 발견되었습니다. 희귀 탄소 동소체인 그래핀은 한 분자 두께지만 뛰어난 강도와 전도성을 지닙니다.\n\n이 귀중한 나노 물질은 이 §Y탄소 행성§!의 특이한 대기 속 화학 기상 증착 현상 덕분에 행성 표면에 자연 형성됩니다."
 extreme_frontiers.270.a: "그래핀을 추출해 봅시다."
 # DIAMOND DUST
 DIAMOND_DUST_CAT: "고속 질량체"
 diamond_dust_desc: "§Y[from.GetName]§!에 대한 질량 스캔을 통해 하층 대류권 깊은 곳에 빠르게 이동하는 물체들이 집중되어 있음을 확인했습니다.\n\n추가 조사 없이는 원인 파악이 어렵습니다."
 extreme_frontiers.280.title: "다이아몬드 폭풍"
 extreme_frontiers.280.desc: "§Y[from.GetName]§!에서 관측된 비정상적인 질량 데이터의 원인을 규명했습니다.\n\n이 행성의 대기는 주로 탄소가 풍부한 메탄가스로 이루어져 있어, 중력 압력이 높아지면 초고밀도 다이아몬드 결정으로 고체화됩니다. 이 현상이 행성의 격렬한 폭풍 주기와 결합해 빠르게 움직이는 다이아몬드 폭풍이 발생하는 것입니다.\n\n이 다이아몬드는 필요에 따라 쉽게 추출할 수 있지만, §Y[leader.GetName]§!(은)는 그 밀도와 순도를 조사하면 더 높은 가치가 있을 것으로 확신합니다."
 ATMOSPHERIC_DIAMONDS_PROJECT: "대기 중 다이아몬드"
 ATMOSPHERIC_DIAMONDS_PROJECT_DESC: "§Y[from.GetName]§!의 초고밀도 다이아몬드 폭풍을 연구한 결과, 이 다이아몬드의 독특한 특성을 우리 레이저 기술 발전에 활용할 수 있을 것이 확실해 보입니다."
 extreme_frontiers.285.title: "다이아몬드 정밀도"
 extreme_frontiers.285.desc: "§Y[leader.GetName]§!의 §Y[from.From.GetName]§! 내 초고밀도 다이아몬드 연구가 완료되었습니다.\n\n다이아몬드를 형성하는 압축 과정은 독특한 결정격자 구조를 만들어내며, 이는 고주파 빛의 진동을 매우 효율적으로 가두고 증폭할 수 있습니다.\n\n이 발견은 우리 제국에 큰 이점이 될 것입니다."
 # ETREME GEOLOGICAL TENSION
 GEOLOGICAL_TENSION_CAT: "강한 지질 압력"
 geological_tension_desc: "§Y[from.GetName]§!의 지질 스캔 결과, 이 용암 행성의 지각이 누적된 변동 에너지에 의해 강한 압력을 받고 있음이 확인되었습니다. 곧 대규모 지질 활동이 예상됩니다."
 extreme_frontiers.290.title: "막힌 초화산"
 extreme_frontiers.290.desc: "§Y[from.GetName]§!의 강한 지질 압력을 연구한 결과, 상부 원뿔 일부가 붕괴되어 거대한 초화산이 막혀 있는 것을 발견했습니다.\n\n방대한 마그마가 지하 공간을 가득 채우며 주 분출구를 막은 장애물을 위로 밀어내려고 압력을 가하고 있습니다. 현재 장애물은 움직이지 않고 있으나, 이 섬세한 균형이 언제 무너질지 예측할 수 없습니다.\n\n마그마에는 희귀 금속과 복합 광물 화합물이 풍부하며, §Y[leader.GetName]§!(은)는 통제된 폭발을 유도해 이러한 자원을 수확할 수 있을 것이라 믿습니다."
 extreme_frontiers.290.a: "분출구 장애물을 제거하세요."
 extreme_frontiers.290.b: "지열 활동을 효과적으로 사용하세요."
 CONTROLLED_ERUPTION_PROJECT: "통제된 폭발"
 CONTROLLED_ERUPTION_PROJECT_DESC: "§Y[from.GetName]§!의 초화산 아래에는 광물이 풍부한 마그마가 매장되어 있습니다. 통제된 폭발을 유도하면 이러한 자원을 효과적으로 채취할 수 있을 것입니다."
 extreme_frontiers.295.title: "초화산 분화"
 extreme_frontiers.295.desc: "단조로운 작업이었지만 우리는 §Y[from.From.GetName]§! 초화산 외각 원뿔 여러 지점에 인공 갱도를 뚫어 구조를 약화시켰고, 이제 화산은 그 밑에 축적된 대규모 마그마를 감당할 수 없게 되었습니다.\n\n임계점에 이르자 화산은 화려하게 폭발했고, 고압 마그마 분출로 윗부분이 완전히 파괴되었습니다.\n\n우리는 사전에 준비한 통로로 마그마의 흐름을 유도했으며, 그곳에서 특수 채굴 장비로 자원을 수확할 예정입니다."
 extreme_frontiers.295.a.default: "장관이었습니다."
 extreme_frontiers.295.a.machine: "임무 완료입니다."
 # LAYERED ATMOSPHERE
 LAYERED_ATMOSPHERE_CAT: "분화하는 행성"
 layered_atmosphere_desc: "§Y[from.GetName]§! 스캔에서 행성 전역에서 가연성 가스가 산발적으로 분출되는 것이 감지되어 원격 탐사가 어려울 것으로 보입니다.\n\n자세한 조사가 필요합니다."
 extreme_frontiers.300.title: "다층 대기"
 extreme_frontiers.300.desc: "§Y[leader.GetName]§!(이)가 §Y[from.GetName]§!의 산발적 분출 원인을 밝혀냈습니다.\n\n이 가스 행성의 대기는 중간권과 성층권 사이에 액체 금속 수소층이 떠 있고, 하층에서 밀도가 더 높은 메탄가스가 이를 떠받치고 있는 구조입니다.\n\n시간이 지나면서 금속 수소층에 전기 방전이 쌓여 하층이 불안정해집니다. 그러다 압력이 임계점을 넘으면 기체 분출이 발생해 고전도성 액체를 상층 대기로 내뿜고, 이 액체는 행성 전역으로 퍼진 후 다시 가라앉습니다.\n\n우리 추적 시스템을 활용하면 이러한 압력 변동을 손쉽게 모니터링해서 귀중한 자원을 수확할 수 있을 것입니다."
 # SOLIDIFIED PLASMA TRAILS
 PLASMA_TRAILS_CAT: "에너지 급증"
 plasma_trails_desc: "§Y[from.GetName]§!의 지각 단층선을 따라 산발적인 에너지 급증이 발견되었습니다.\n\n이러한 급증 현상의 원인은 궤도상에서는 파악할 수 없으며, 그 근원을 알아내려면 더 가까운 거리에서의 연구가 필요할 것입니다."
 extreme_frontiers.310.title: "고체화된 플라즈마 흔적"
 extreme_frontiers.310.desc: "§Y[from.GetName]§!에 대한 지질 분석을 통해 초기 궤도 탐사에서 발견한 에너지 급증 현상의 원인을 밝혀냈습니다.\n\n이 행성의 급변하는 지각 활동은 불안정한 빙설 툰드라 지역에서 격렬한 정전기 방전을 일으킵니다.\n\n이 화산 번개는 하늘로 치솟으며 주변 공기를 플라즈마로 바꾸며, 그 과정에서 분출된 극심한 열이 열 충격을 일으켜 번개 모양의 구조물로 고체화됩니다.\n\n이번 지질 분석에서 알게 된 내용을 활용하면 우리는 이러한 지각 활동을 손쉽게 예측하고, 이 현상을 우리의 목적에 맞게 활용할 수 있을 것입니다."
 # CRYSTALLINE PLAINS
 CRYSTALLINE_PLAINS_CAT: "얼음 화산 활동"
 crystalline_plains_desc: "§Y[from.GetName]§! 지각 분석 결과, 독특한 특성을 지닌 이 행성에서 활발한 얼음 화산 활동이 발견되었습니다."
 extreme_frontiers.320.title: "크리스탈 평원"
 extreme_frontiers.320.desc: "§Y[from.GetName]§!의 상세 지질 조사 결과, 얼어붙은 행성의 지각 아래 반쯤 언 상태의 암모니아가 강처럼 흐르고 있음을 발견했습니다. 상승한 지열 압력이 이 물질을 취약한 표면의 균열을 통해 밀어 올리고 있던 것입니다.\n\n이 현상으로 행성 표면에는 위험한 증기와 암모니아 진창이 뿜어져 나오며, 극도로 차가운 표면에 노출된 암모니아 진창이 다시 얼어 쉽게 수확할 수 있는 귀중한 크리스탈 평원을 형성합니다."
 # SUPERMASSIVE GIANT
 SUPERMASSIVE_GIANT_CAT: "초거대 행성"
 supermassive_giant_desc: "§Y[from.GetName]§!(은)는 초거대 가스 행성으로, 행성의 중력장에 수천 개의 물체가 휩쓸려 궤도를 돌고 있습니다. 이 물체들을 파악해 두면 도움이 될 것입니다."
 extreme_frontiers.330.title: "우주 쓰레기"
 extreme_frontiers.330.desc: "§Y[from.GetName]§!의 궤도에는 수많은 소형 위성과 소행성, 그리고 우주 쓰레기가 존재합니다. 방사성 동위원소 연대 측정 결과, 이 물체들은 수천 년 전 성계를 지나가면서 행성의 중력장에 붙들린 것으로 보입니다.\n\n물체들을 파악하던 중 몇몇 고대 기초 탐사정을 발견했는데, 이는 우주 탐사의 첫걸음을 뗀 문명의 존재를 암시합니다.\n\n탐사정의 데이터 대부분은 오류가 있거나 다른 물체와 충돌해 물리적 손상을 입었지만, 그중 하나에는 [from.GetName] 표면을 수백 년간 촬영한 이미지 자료가 포함되어 있었습니다."
 extreme_frontiers.330.a: "흥미로운 발견입니다."
 extreme_frontiers.330.b: "폐기물을 폐기합시다."
 # INVISIBLE PLANET
 INVISIBLE_PLANET_CAT: "불규칙한 궤도"
 invisible_planet_desc: "§Y[from.GetName]§! 궤도 경로에서 작지만 반복적인 움직임이 관측되었습니다. 이는 행성이 주기적으로 알 수 없는 강력한 중력의 영향을 받고 있음을 의미합니다.\n\n행성 주변에 대한 추가 조사를 권고합니다."
 extreme_frontiers.340.title: "보이지 않는 행성"
 extreme_frontiers.340.desc: "§Y[from.solar_system.GetName]§! 성계를 추가 분석한 결과, 이 성계의 모든 행성이 유사한 불규칙 궤도를 보이는 것으로 나타났습니다.\n\n이 움직임에서 추론한 중력을 삼각 측량한 끝에, 이전에는 관측되지 않았던 §Y[invisible_planet.GetName]§!(이)가 그 원인이라는 사실을 발견했습니다.\n\n이 행성의 표면은 독특하게도 빛이나 전파를 일절 반사하지 않는 카본 블랙 입자로 덮여 있어 장거리 감지기로는 관측이 불가능합니다.\n\n자연적으로 형성된 이 고분자 물질은 놀랍도록 뛰어난 흡수성을 지닙니다."
 extreme_frontiers.340.desc.default: "$extreme_frontiers.340.desc$ 이 물질은 흔치 않은 연구 기회를 제공합니다."
 extreme_frontiers.340.desc.first_contact: "$extreme_frontiers.340.desc$ 이 물질을 수확해 스텔스 소재로 활용할 가능성을 연구할 것입니다."
 # SURVIVAL POD
 SURVIVAL_POD_WARM_CAT: "개조 연구 기지"
 SURVIVAL_POD_COLD_CAT: "개조 연구 기지"
 survival_pod_desc: "§Y[from.GetName]§!(을)를 탐사한 결과, 황량한 지표면 위에서 개조된 연구 기지가 발견되었습니다. 원래는 임시 연구소로 지어진 곳이지만, 수명을 훨씬 넘긴 지금도 희미한 열복사 흔적이 포착되어 일부 시설이 여전히 가동 중인 것으로 보입니다."
 extreme_frontiers.350.title: "유일한 생존자"
 extreme_frontiers.350.desc: "탐사대가 §Y[from.GetName]§! 지표면 위에서 개조된 연구 기지와 그곳의 유일한 거주자를 발견했습니다.\n\n자신을 이 혹독한 행성에 떨어져 수년간 살아남은 과학자로 소개한 이 여성은 구조를 대가로 [root.Owner.GetName]에 전문 지식을 제공하겠다며 제안해 왔습니다."
 extreme_frontiers.350.a: "경험이 곧 자산이죠."
 extreme_frontiers.350.b: "왕복선과 자원을 선물하세요."
 extreme_frontiers.350.c: "간섭하지 말고 지켜봅시다."
 extreme_frontiers.350.d: "귀엽군요. 거주지를 파괴해 버리세요."
 extreme_frontiers.352.title: "$NAME_survivalist_scru$"
 extreme_frontiers.352.desc: "여윈 [scru_species.GetClass](이)가 생활 구역으로 개조된 연구 기지에서 걸어 나옵니다. 그러더니, [scru_species.GetMouthName]에서 거친 숨을 내쉬며 §Y[from.From.GetName]§!에서 겪은 고난을 이야기하기 시작했습니다.\n\n\"죄송합니다. 수년간... 다른 이와 이야기를 나누지 않아서...\""
 extreme_frontiers.352.a: "무슨 일로 이곳에 조난된 겁니까?"
 extreme_frontiers.352.a.response: "저는 [from.From.GetName](을)를 조사하며 독특한 기반암에 대해 기록하고 있었어요. 동료들은 탐사선을 타고 빠르게 주변을 탐사하고 온다며 떠났고, 저는 그 말을 믿었죠. 며칠간 걱정한 끝에야 무슨 일이 벌어졌는지 깨달았습니다. 저를 버리고 돌아가 버린 거였죠."
 extreme_frontiers.352.b: "어떻게 이곳에서 이리 오래 버틴 겁니까?"
 extreme_frontiers.352.b.response: "세포 투과성을 조절하고 열충격 단백질을 과발현하면 할 수 있는 일이 참 많죠... 그런 다음 세포를 변형해 미세자가포식을 유도하는 건 간단했죠. 또 행성의 높은 나트륨 함량 덕분에 꽤 맛있는 식사를 다량으로 만들 수 있었습니다."
 extreme_frontiers.352.c: "동료들에게 돌아가고 싶지는 않습니까?"
 extreme_frontiers.352.c.response: "그자들은 제가 이 행성에서 이룬 발견을 누릴 자격이 없습니다. 왜 저를 버렸는지도 알고 싶지 않고요."
 extreme_frontiers.352.d: "우리에게 어떤 도움을 줄 수 있죠?"
 extreme_frontiers.352.d.response: "임시 실험실에서 일하는 건 이제 지겹습니다. 우주에서... 새로운 행성을 보고 싶다고요."
 extreme_frontiers.352.e: "$NAME_survivalist_scru$를 채용하세요."
 extreme_frontiers.352.e.custom_tooltip: "§Y$NAME_survivalist_scru$§!가 우리 제국에 §H지도자§!로 합류합니다."
 NAME_survivalist_scru: "스크루"
 survivalist_scru_desc: "극한 환경에서 생존 기술을 연마한 유능한 과학자입니다."
 leader_trait_hardened_survivalist: "단련된 생존 전문가"
 leader_trait_hardened_survivalist_desc: "이 지도자는 혹독한 환경에 대해 비할 데 없는 지식을 갖고 있습니다."
 # Infernal Tornadoes
 INFERNAL_TORNADOES_CAT: "극한 기온"
 infernal_tornadoes_desc: "§H[from.GetName]§! 스캔에서 광대한 고압 폭풍 지대가 빠르게 이동하는 것을 확인했습니다.\n\n이 폭풍은 변동성이 높은 열 신호를 방출하고 있습니다. 자연 현상인지, 미확인 생명체인지 확인하려면 집중 연구가 필요합니다."
 extreme_frontiers.360.title: "화염 토네이도"
 extreme_frontiers.360.desc: "§H[from.GetName]§! 내 높은 열 신호의 원인을 밝혀냈습니다.\n\n표면 깊은 곳에서부터 고가연성 수소 가스를 분출하는 간헐천이 행성 전역에 존재하는데, 이 가스는 행성의 높은 기온과 만나 점화하며 하늘로 솟아오르는 다수의 불기둥을 만듭니다.\n\n불기둥이 대기압과 만나면 변동성이 매우 높은 기류가 형성되고, 거대한 화염 토네이도가 되어 불길을 대지 위로 뿜어냅니다.\n\n파괴적인 자연 현상이지만, 우리 [Root.Owner.GetResearcherPlural_lower]들은 이 토네이도와 그 운동 에너지를 인위적으로 재현해 실용화할 수 있을 것으로 보고 있습니다."
 INFERNAL_CATALYSTS_PROJECT: "지옥불 촉매"
 INFERNAL_CATALYSTS_PROJECT_DESC: "§H[from.GetName]§! 내 화염 토네이도의 형성 조건을 더 세밀히 연구하면, 이 현상을 통제된 환경에서 재현하여 그 이점을 활용할 수 있을 것입니다."
 extreme_frontiers.365.title: "화쇄류 공명기"
 extreme_frontiers.365.desc: "§Y[from.Leader.GetName]§!(이)가 §Y[from.From.GetName]§!에서 발견한 화염 토네이도를 통제된 환경에서 재현하고 활용할 방법을 찾아냈습니다.\n\n이 획기적인 발견으로 항성 기지를 활용해 동일 성계 내 다른 용암 행성에서도 에너지 생산량을 높일 수 있을 것입니다."
 extreme_frontiers.365.desc.has_furnace: "발견된 이론은 §H아크 용광로§!에 대한 기존 지식과 여러 면에서 유사합니다. 이를 통해 외계 건설에 관한 다양한 가능성이 열렸습니다."
 extreme_frontiers.365.desc.default: "이번에 활용된 과학 이론은 §H아크 용광로§! 기술 개발에 다양한 방식으로 적용될 수 있으며, 우리 [Root.Owner.GetEngineerPlural]들은 이를 실제 개발에 반영할 준비가 되어 있습니다."
 tech_pyroclastic_resonation: "화쇄류 공명 현상"
 tech_pyroclastic_resonation_desc: "용암 행성에서 발견된 강렬한 열에너지를 활용하면, 우리 항성 기지는 성계 내 에너지 생산량을 매우 효율적으로 향상시킬 수 있을 것입니다."
 sm_pyroclastic_resonator: "화쇄류 공명기"
 sm_pyroclastic_resonator_desc: "성계 내 용암 행성의 에너지 생산량을 향상시키는 열 공명기입니다.\n$i_energy$ 생산량은 성계 내 ['concept_pc_molten']의 수에 비례해 증가합니다."
 # MAGMA MEGAFAUNA
 MAGMA_MEGAFAUNA_CAT: "불안정한 지형"
 magma_megafauna_desc: "§Y[from.GetName]§!에 대한 스캔 결과, 용융 행성 표면의 일부가 먼 거리를 이동하며 끊임없이 움직이는 현상이 발견되었습니다.\n\n이러한 특이 지질 현상을 이해하기 위해서는 자세한 연구가 필요할 것으로 보입니다."
 extreme_frontiers.370.title: "거대 용암 동물"
 extreme_frontiers.370.desc: "§Y[from.GetName]§!에서 확인된 특이한 지각 변동은 규소 기반 거대 생물 떼의 활동으로 밝혀졌습니다.\n\n이 거대한 생물들은 먼 거리를 이동하며, 주기적으로 행성의 용암 호수에 잠수해 선호하는 먹이인 §H불안정 분말§!이 다량 포함된 암석 퇴적물을 채집합니다. 이들의 이동 경로를 추적하면 행성 생태계에 최소한의 영향을 주며 필요한 퇴적물을 추출할 수 있을 듯합니다.\n\n또한, 이들의 두꺼운 외피는 극한의 열을 견디며, 이들의 생애주기를 추가로 연구하면 흥미로운 결과를 얻을 수 있을 것입니다."
 LAVA_DIVERS_PROJECT: "용암 잠수 생물"
 LAVA_DIVERS_PROJECT_DESC: "§Y[from.GetName]§!의 거대 생물은 용암 행성의 극한 환경을 견디며, 행성 곳곳에 있는 용암 호수에 깊게 잠수할 수 있습니다.\n\n이들의 외피를 연구하면 극한 고온에 대응하는 방식에 대한 새로운 통찰을 얻을 수 있을 것입니다."
 extreme_frontiers.375.title: "용암제 장갑"
 extreme_frontiers.375.desc: "§Y[from.From.GetName]§!의 독특한 거대 생물에 관한 종합적인 연구를 통해, 우리 조선소에 활용할 수 있는 응용 열역학 지식을 얻었습니다.\n\n먹이에 함유된 불안정 분말로 인해, 이 생물들은 단단한 규산염 기반 구조와 천연 내화 소재로 강화된 견고한 외피를 지니게 되었습니다.\n\n벗겨진 외피 샘플을 충분히 확보한 덕분에 우리 [Root.Owner.GetEngineerPlural]들은 이제 이들의 생체 역학적 원리를 모방해 선체 외장판 개발에 적용할 수 있게 되었습니다."
 # PLANET THRUSTERS
 PLANET_THRUSTERS_CAT: "떠다니는 장비"
 planet_thrusters_desc: "§Y[from.GetName]§! 상층 대기에는 대형 원통형 기계들이 떠 있는 것으로 확인되었으며, 탑승 승무원은 없는 것으로 관측됩니다."
 extreme_frontiers.380.title: "행성 추진 장치"
 extreme_frontiers.380.desc: "§Y[from.GetName]§!에서 발견된 버려진 기계들은 단독형 추진 장치의 부품으로 확인되었으며, 상층 대기에서 총 1,000개가 넘는 양이 집계되었습니다.\n\n특수 제작된 재료로 만들어진 이 복합 핵융합 장치는 행성 내 수소 가스를 활용해 강력한 추진력을 생성하도록 설계되어 있으나, 대부분 과부하로 손상된 상태입니다.\n\n분석 결과, 모든 기계는 행성 자체의 운동을 제어하려는 방향으로 배치되어 있었습니다. 이는 본래 이 장치들이 궤도를 바꾸기 위해 설치되었음을 시사합니다.\n\n더 이상 그렇게 거대한 계획에는 사용할 수 없지만, 파손이 덜한 장비들을 재활용하면 행성의 가스층을 연소시켜 광물이 풍부한 핵을 드러낼 수 있을 것 같습니다."
 extreme_frontiers.380.a: "모두 폐기하세요."
 extreme_frontiers.380.b: "장치들을 재활용하세요."
 REPURPOSE_THRUSTERS_PROJECT: "행성 추진 장치 재활용"
 REPURPOSE_THRUSTERS_PROJECT_DESC: "§Y[from.GetName]§!에서 발견한 행성 추진기를 재활용하면 거대 가스 행성의 수소 가스를 태워 단단하고 채굴 가능한 핵만 남길 수 있습니다."
 extreme_frontiers.385.title: "가스층 제거"
 extreme_frontiers.385.desc: "§Y[from.From.GetName]§!에서 발견한 추진기 몇 기를 수리해, 서로 반대되는 방향으로 동일한 추진력을 내도록 조정했습니다.\n\n작동이 개시되자 이 강력한 핵융합 장치는 수소를 빠르게 끌어올려 행성의 가스층을 태워 없앴고, 극도로 뜨겁지만 광물이 풍부한 핵을 드러냈습니다."
 extreme_frontiers.385.tt: "§Y$chthonian_planet$§! 보정치 추가됨"
 extreme_frontiers.385.a: "굉장하군요."
 # BACKWARDS ORBIT
 BACKWARDS_ORBIT_CAT: "역방향 궤도"
 backwards_orbit_desc: "§Y[from.GetName]§!(은)는 성계 내 다른 행성들의 반대 방향으로 공전하고 있습니다. 이는 이 행성이 다른 천체들과는 다른 시기에 형성되었음을 시사합니다.\n\n이 행성의 기원을 이해하기 위해서는 추가 조사가 필요합니다."
 extreme_frontiers.390.title: "배회하는 행성"
 extreme_frontiers.390.desc: "§Y[from.GetName]§!의 성분은 인근 행성들과 다르지만, 인접한 성계인 §Y[event_target:wandering_planet_origin.GetName]§!의 여러 천체와는 완벽히 일치해 그 기원의 실마리를 찾을 수 있었습니다.\n\n이 행성의 표면에서 발견된 특히 커다란 크레이터를 통해 과거 거대 소행성과의 충돌로 기존 궤도에서 밀려났음을 추정할 수 있습니다. 이후 이 떠돌이 행성은 [from.System.Star.GetName]의 중력장에 포획되어 역방향 궤도로 공전하게 되었을 것입니다.\n\n형성 이후 서로 다른 두 성계에 거주한 이 놀라운 행성은 풍부한 연구 기회를 제공합니다."
 # VAPOR PLUMES
 VAPOR_PLUMES_CAT: "증기 기둥"
 vapor_plumes_desc: "§Y[from.GetName]§! 표면에서 행성의 얇은 대기 최상층까지 뻗어 있는 수천 개의 특이한 증기 기둥이 발견되었습니다.\n\n이 현상에 관한 추가 연구가 필요합니다."
 extreme_frontiers.400.title: "얼음 화산 간헐천"
 extreme_frontiers.400.desc: "§Y[from.GetName]§!에서 발견된 증기 기둥은 하부 맨틀 깊은 곳에서 일어나는 활발한 얼음 화산 활동의 결과로, 질소와 암모니아가 분출되며 거대한 가스 기둥을 형성한 것임을 확인했습니다.\n\n증기 기둥은 행성 대기의 경계에 다다를 때까지 수직으로 상승하다가 태양풍에 의해 급격히 평평해집니다.\n\n이 독특한 가스 기둥의 미세한 화학 성분 차이를 분석하면 행성 핵에서 벌어지는 복잡한 지질 작용을 더 깊이 이해할 수 있을 것입니다."
 # FIBROUS ATMOSPHERE
 FIBROUS_ATMOSPHERE_CAT: "데이터 손상"
 fibrous_atmosphere_desc: "§Y[from.GetName]§!에 대한 1차 스캔 결과가 우리 감지기로 해독할 수 없을 정도로 손상된 채 돌아오고 있습니다. 간섭 원인은 불분명하며, 정밀 조사가 필요합니다."
 extreme_frontiers.410.title: "섬유질 대기"
 extreme_frontiers.410.desc: "§Y[from.GetName]§!(을)를 정밀 조사한 결과 예비 스캔 데이터 손상의 원인이 밝혀졌습니다.\n\n행성 상층 대기권은 섬유질 광물로 이루어진 짙은 구름으로 구성되어 있습니다. 이 길고 구불구불한 가닥들은 거대 가스 행성 하층부에서 시작되어, 고압 환경에서 늘어나 전도성이 매우 높은 광물 구름을 형성합니다.\n\n대기권을 이동하며 정전기 에너지를 축적하는 이 섬유질 구름은 주기적으로 전기를 방출하는데, 우리는 이 자원을 쉽게 추출해 필요에 따라 사용할 수 있습니다."
 # EXPLODING SKIES
 EXPLODING_SKIES_CAT: "강렬한 열 급증"
 exploding_skies_desc: "§Y[from.GetName]§!에 대한 스캔에서 불규칙하지만 강렬한 열 급증이 행성 전역에서 관측되는 극단적인 기상 현상이 확인되었습니다.\n\n추가 조사가 필요합니다."
 extreme_frontiers.420.title: "폭발하는 지평선"
 extreme_frontiers.420.desc: "§Y[from.GetName]§!(을)를 정밀 관측하여 열 급증 기상 현상의 원인을 밝혀냈습니다.\n\n행성 표면 전역에 있는 지열 분출구와 간헐천이 분출하는 고인화성 가스가 대기에 축적되고, 이후 방출된 정전기가 발화의 촉매로서 작용해 행성의 하늘을 휩쓸며 파괴하는 폭발적인 기상 전선을 유발한 것입니다.\n\n이 현상은 우리 [Root.Owner.GetEngineerPlural]들에게 함대 추진 시스템에 적용할 수 있는 열역학적 연소에 대한 새로운 통찰을 제공했습니다."
 extreme_frontiers.420.desc.traumatized: "안타깝게도, 이 연구의 위험성으로 인해 [leader.GetName](은)는 심각한 정식적인 외상을 입었습니다."
 extreme_frontiers.420.desc.maimed: "안타깝게도, 이 연구의 위험성으로 인해 [leader.GetName](은)는 심각한 신체적 부상을 입었습니다."
 # CHTHONIAN PRESERVATION
 CHTHONIAN_PRESERVATION_CAT: "크소니언 생체 물질"
 chthonian_preservation_desc: "탐사 결과, §Y[from.GetName]§!(은)는 크소니언 행성으로 확인되었습니다. 과거에는 거대 가스 행성이었으나 §Y[from.System.Star.GetName]§!의 강렬한 방사선으로 인해 대기가 연소된 것으로 추정됩니다.\n\n그럼에도 불구하고 표면에서 희미한 생체 흔적이 감지되어, 추가 조사가 필요합니다."
 extreme_frontiers.430.title: "크소니언 보존"
 extreme_frontiers.430.desc: "§Y[from.GetName]§!에서 감지된 생체 흔적은 티얀키 무리의 석화된 유해로 확인되었습니다.\n\n이들은 행성의 대기가 사라지는 임계점 당시 존재했을 것으로 추정되며, 용융 금속에 감싸져 굳은 상태입니다.\n\n유해 내부에는 소량의 생체 물질이 남아 있으나, 크소니언 수준의 항성 방사선에 지속적으로 노출되어 사체의 대부분이 독특한 생체 금속 합금으로 변했습니다.\n\n§Y[leader.GetName]§!(은)는 이 희귀한 화석을 자세히 연구해, 생체 자원을 기반으로 한 합금 제작의 새 지평을 열 수 있을 것으로 믿고 있습니다."
 CHTHONIAN_PETRIFICATION_PROJECT: "크소니언 석화"
 CHTHONIAN_PETRIFICATION_PROJECT_DESC: "§Y[from.GetName]§!에서 발견된 티얀키 무리 화석을 바탕으로, 우리 [Root.Owner.GetScientistPlural]들은 크소니언 수준의 항성 방사선이 생체 물질에 미치는 영향을 완전히 이해하여 새로운 첨단 합금 제작법 개발의 길을 열고자 합니다."
 extreme_frontiers.435.title: "생체 기반 합금"
 extreme_frontiers.435.desc: "§Y[from.From.GetName]§!에서 발견된 티얀키 무리 화석을 상세하게 분석한 결과, 우리는 크소니언 수준의 방사선에 장기 노출되는 환경을 재현해 합금을 제작하는 새로운 방법을 성공적으로 발견했습니다.\n\n이 획기적인 발견은 생체 물질을 주원료로 활용해 기존 제작법과 견줄 만한 합금을 만들 수 있는 놀라운 방식을 제시합니다."
 tech_alloy_fossilization: "합금 화석화"
 tech_alloy_fossilization_desc: "생체 물질을 크소니언 수준의 방사선에 노출해 세포 구조를 화석화하고 실용 가능한 금속 합금으로 만들 수 있습니다."
 tech_alloy_fossilization_tt: "§H건물 잠금 해제§!: ['building:building_bio_furnace']"
 building_bio_furnace: "생체 용광로"
 building_bio_furnace_desc: "이 시설은 강력한 항성 방사선을 재현해 생체 물질을 합금으로 전환할 수 있습니다."
 # ORBITAL RESONANCE
 ORBITAL_RESONANCE_CAT: "완벽한 비율"
 orbital_resonance_desc: "§Y[from.System.GetName]§! 성계의 궤도 주기는 특이한 패턴을 띱니다. 각 행성은 인접 행성 대비 정확히 2배의 공전 시간을 보이며, 그 오차는 0.001초 이하로 매우 정밀합니다.\n\n이런 완벽한 비율은 조사할 만한 가치가 있습니다."
 extreme_frontiers.440.title: "궤도 공명"
 extreme_frontiers.440.desc: "§Y[from.System.GetName]§! 성계는 지금껏 관측한 사례 중 가장 완벽한 궤도 공명을 보여 줍니다.\n\n각 행성은 인접한 천체와 가장 가까워질 때 주기적으로 중력의 영향을 주고받으며, 이로 인해 투석기 효과와 상호 의존적인 운동이 발생합니다. 이례적으로 안정적인 이러한 상호 작용 덕분에 이 성계의 행성들은 매우 정교하게 조정된 궤도를 유지할 수 있습니다.\n\n이 성계는 행성의 중력이 지나가는 물체의 움직임을 어떻게 가속하는지 연구할 최적의 장소이며, 그 원리를 이용하면 함선의 기동에도 활용할 수 있을 것입니다."
 GRAVITY_ASSIST_PROJECT: "중력 활용 연구"
 GRAVITY_ASSIST_PROJECT_DESC: "§Y[from.GetName]§!의 완벽한 궤도 공명 효과를 연구하면 행성 중력을 활용한 슬링샷 함선 기동 방식에 대한 이해를 높일 수 있을 것입니다."
 extreme_frontiers.445.title: "궤도 슬링샷 기동 강화"
 extreme_frontiers.445.desc: "§Y[from.From.System.GetName]§! 성계의 독특한 궤도 공명 효과에 관한 연구를 통해, 우리는 최적의 함선 비행경로를 설정하는 방식을 크게 개선했습니다.\n\n새로운 경로 모델을 활용하면 아광속 비행의 가감속 과정에서 행성의 중력을 훨씬 효율적으로 이용할 수 있을 것입니다."
 tech_orbital_maneuvers: "첨단 궤도 기동"
 tech_orbital_maneuvers_desc: "행성 중력장을 최대한 활용하는 진보된 계산을 통해 아광속 비행을 더욱더 최적화할 수 있습니다."
 #############
 # Arc Sites #
 #############
 # ABSOLUTE ZERO
 site_absolute_zero: "절대 영도"
 site_absolute_zero_desc: "§Y[from.Planet.GetName]§!의 지형을 조사 결과, 절대 영도에 가까운 극한의 저온을 보이는 특정 지하 영역이 발견되었습니다.\n\n추가 조사를 통해 이 현상의 원인을 더 깊이 이해할 수 있을 것입니다."
 extreme_frontiers.1000.title: "빙석 장애물"
 extreme_frontiers.1000.desc: "§Y[from.Planet.GetName]§!의 극저온 현상의 원인을 조사하던 §Y[leader.GetName]§!(이)가 한 고대 지하 구조물의 입구를 발견했습니다.\n\n이 입구는 얼어붙은 거암과 세락으로 봉쇄되어 있어, 수천 년 동안 아무도 출입하지 못한 것으로 보입니다.\n\n입구 근처에는 녹아내린 드라이아스가 장애물의 틈새를 통해 이산화 탄소 가스 기둥을 내뿜고 있으며, 장비 탐지 결과 내부에 거대한 복합 시설이 존재하는 것으로 확인되었습니다. [leader.GetName](은)는 극저온 현상의 원인이 이곳의 내부에 있을 것이라 확신합니다."
 extreme_frontiers.1000.a: "장애물을 뚫고 들어가세요."
 extreme_frontiers.1005.title: "멈춰버린 시간"
 extreme_frontiers.1005.desc: "§Y[leader.GetName]§!(이)가 §Y[from.Planet.GetName]§!의 고대 구조물 입구를 막고 있던 빙석 장애물을 성공적으로 뚫었습니다.\n\n내부에서는 미확인 파충류 종족의 얼어붙은 시신이 수십 구 발견되었습니다. 이 뒤틀린 시신들은 벽에 붙은 채 얼어 있었으며, 절박한 탈출 시도를 짐작게 하는 손톱자국이 함께 남아 있었습니다.\n\n입구에서 새어 나오던 이산화 탄소 기둥의 원천은 나선형 계단을 따라 더 깊은 곳으로 들어가야 확인할 수 있을 것 같습니다."
 extreme_frontiers.1010.title: "빙하 무덤"
 extreme_frontiers.1010.desc: "얼어붙은 복합 시설 깊은 곳에서 §Y[leader.GetName]§!(이)가 원시적이지만 이론상 작동 가능한 극저온 보관실로 가득한 대형 중앙 홀을 발견했습니다.\n\n이곳의 극한 추위는 이 장치들이 설계된 온도 범위를 훨씬 초과합니다. 냉동 포드 안 개체들은 수천 년 전에 사망한 것으로 확인되었습니다.\n\n얼음과 눈에 덮이지 않은 일부 보관실에는 읽을 수 있는 문자가 새겨진 받침대가 있는데, 이는 내부 개체의 사회적 칭호와 계급을 나타냅니다. 더 높은 계급의 보관실일수록 서리와 눈에 깊게 파묻힌 대형 중앙 포드에 가깝게 배치되어 있습니다."
 extreme_frontiers.1010.a: "중앙 포드를 조사하세요."
 extreme_frontiers.1015.title: "얼어붙은 군주"
 extreme_frontiers.1015.desc: "§Y[leader.GetName]§!(이)가 §Y[from.Planet.GetName]§! 빙하 무덤 중심부에 있는 대형 중앙 포드를 열었습니다.\n\n그 안에는 이전 보관실에서 발견한 문자에 언급되었던 고대 왕가 수장의 마지막 안식처가 있었습니다. 수십 명의 신하들 또한 각자의 냉동 포드 안에서 얼어붙은 채, 의식적인 형태로 벽을 장식하듯 배치되어 있습니다.\n\n죽은 왕이 안치된 기계 석관은 미로처럼 복잡한 튜브와 회로망을 통해 고대 기계에 연결되어 있으며, 이 장치는 우리 분석 장비조차 위험할 정도로 극저온인 거대한 얼음덩어리에 박혀 있습니다.\n\n이 시설의 고장 원인과 행성의 얼어붙은 핵 사이의 관계를 파악하기 위해서는 추가 연구가 필요합니다."
 extreme_frontiers.1015.a: "무슨 일이 있었던 걸까요?"
 extreme_frontiers.1020.title: "냉동 참사"
 extreme_frontiers.1020.desc: "§Y[from.Planet.GetName]§! 내 빙하 무덤의 중앙 보관실을 분석하여 이 참사의 발생 원인을 밝혀냈습니다.\n\n무덤의 냉동 포드는 행성의 극저온 핵을 활용한 아열역학 원리를 기반으로 작동했습니다. 왕이 불치병에 걸리자, 이들은 치료법이 발견되었을 때 수행원들과 함께 다시 깨울 수 있기를 바라며 냉동 상태로 보존하려 했습니다.\n\n이론적으로는 가능했지만, 특수 설계된 순환 매질이 행성 핵으로 유출되며 제어할 수 없는 흡열 반응이 발생했고, 이로 인해 온도가 치명적으로 급강하해 시설 전체가 순식간에 얼어붙고 말았습니다.\n\n우리는 이들의 초기 이론을 발전시켜, 얼음 행성에서의 활용에 특화된 첨단 극저온 기술 분야에서 획기적인 성과를 이뤘습니다."
 tech_cryovault: "얼음 행성 거주지"
 tech_cryovault_desc: "얼음 행성의 환경에서 발견한 아열역학 원리를 응용해 한랭 지역에서 거주하기 더 적합한 환경을 조성할 수 있습니다."
 tech_cryovault_tt: "건물 잠금 해제: ['building:building_cryovault']"
 building_cryovault: "냉동 거주실"
 building_cryovault_desc: "한랭 지역의 아열역학 원리를 활용해 쾌적하고 안정적인 환경을 조성하는 밀폐형 거주 공간입니다."
 # TOXIC MATRIX
 site_toxic_matrix: "독성 웅덩이"
 site_toxic_matrix_desc: "§Y[from.Planet.GetName]§! 표면 대부분에는 작은 원형 액체 웅덩이들이 격자 모양으로 배열되어 있습니다. 이 정돈된 모습은 자연적으로 형성되었다기보다는 누군가 인위적으로 설계한 결과로 보입니다. 추가 정보를 위해 현장 탐사가 필요합니다."
 extreme_frontiers.1100.title: "파열된 점액낭"
 extreme_frontiers.1100.desc: "§Y[from.Planet.GetName]§! 표면 대부분에는 일련의 원형 구멍들이 정교한 줄을 이루고 나란히 배열되어 있으며, 이 작은 유역들은 점성이 있는 독성 액체로 채워져 있습니다.\n\n그중 한 웅덩이에서 젤리 같은 점액에 덮인 파열된 유기 낭을 발견했습니다. 낭의 막은 내부로부터 찢어진 것으로 보입니다.\n\n웅덩이 안 액체가 이 낭에서 나온 것인지는 아직 알 수 없습니다."
 extreme_frontiers.1100.a: "계속 조사하세요."
 extreme_frontiers.1105.title: "독성 배양 웅덩이"
 extreme_frontiers.1105.desc: "§Y[from.Planet.GetName]§!에서 발견한 점액 웅덩이를 분석한 결과, 흔히 유기체 배양과 연관되는 이례적으로 강한 방사능을 띤 성장 호르몬이 확인되었습니다.\n\n낭의 내벽은 점액 침투 속도를 조절할 수 있는 고도로 발달한 조직막으로 이루어져 있습니다."
 extreme_frontiers.1105.desc.non_toxoid: "우리가 발견한 낭은 독성 환경에 특화된 적응력을 가진 종이 남긴 배양 주머니로 추정됩니다. 추가 탐사를 통해 더 많은 정보를 얻을 수 있습니다."
 extreme_frontiers.1105.desc.toxoid: "이 주머니는 우리의 생식 주기와 놀랄 만큼 유사해, 먼 친척 종이 남겼을 가능성도 있습니다."
 extreme_frontiers.1105.a: "계속 조사하세요."
 extreme_frontiers.1110.title: "배아 유해"
 extreme_frontiers.1110.desc: "§Y[from.Planet.GetName]§!의 점액 웅덩이에서 발견한 파열된 낭 하나에서, 거의 완전히 성장한 생명체 유해를 발견했습니다.\n\n이 배아 표본을 현미경 분석한 결과, 지성체와 흔히 연관되는 신경적 특성을 가진 복잡한 신경계가 존재하는 것으로 보입니다.\n\n이제 조사할 웅덩이는 단 하나의 줄만 남아 있습니다."
 extreme_frontiers.1110.a: "남은 웅덩이 한 줄을 조사하세요."
 extreme_frontiers.1115.title: "생명 신호 감지"
 extreme_frontiers.1115.desc.a: "§Y[from.Planet.GetName]§!의 점액 웅덩이를 마저 조사하던 중, §Y[leader.GetName]§!(이)가 생명 신호가 감지되는 온전한 배양 낭을 발견했습니다.\n\n그러나 추출 과정에서 낭의 점막이 찢어져 표본이 폐사하고 말았습니다."
 extreme_frontiers.1115.desc.non_toxoid: "낭 속 작은 시체는 방사성 플라즈마로 가득 찬 정맥과 향정신성 화합물을 분비하는 내부선 등, 이례적인 생물학적 특징을 보였습니다."
 extreme_frontiers.1115.desc.b: "내부의 배아를 포함하여, 이 배양 낭 전체가 고에너지 점액에 특수 화학 촉매를 주입함으로써 독성 점액 안에서 형성된 것으로 보입니다.\n\n우리가 발견한 지역은 미확인 종족의 버려진 고대 번식지인 것으로 추정됩니다. 이 번식지가 그 종족이 지닌 자연 생식 주기의 일부인지, 인위적으로 만든 시설인지는 영원히 알 수 없을지도 모릅니다. 하지만 현장에서 표본을 배양하면 살아 있는 새로운 개체를 키울 수 있을지도 모릅니다."
 extreme_frontiers.1115.desc.toxoid: "그 대신, 영양가 높고 효능이 뛰어난 배양 점액을 영양 보조제로 가공해 [leader.Owner.GetName] 전역에 보급할 수도 있습니다."
 extreme_frontiers.1115.a: "점액에 촉매를 주입하세요."
 extreme_frontiers.1115.b: "점액에서 에너지를 추출하세요."
 extreme_frontiers.1115.c: "영양 보조제로 만들어 보급합시다."
 TOXIC_SLIME_CATALYZATION_PROJECT: "독성 점액 활성화"
 TOXIC_SLIME_CATALYZATION_PROJECT_DESC: "[from.Planet.GetName]에서 획득한 독성 배양 점액 일부에 특수 화학 촉매를 주입하면 살아 있는 새로운 개체를 배양할 수 있을지도 모릅니다."
 extreme_frontiers.1120.title: "배양 성공"
 extreme_frontiers.1120.desc: "§Y[from.From.Planet.GetName]§!에서 획득한 배양 점액 표본에 특수 화학 촉매를 주입해, 배아를 하나씩 품은 수십 개의 배양 낭을 형성할 수 있었습니다.\n\n빠르게 성장한 이 생명체들은 성체에 이르자, 특수하게 진화한 턱으로 반투명 막에 구멍을 내고 끈적한 점액 속에서 천천히 모습을 드러냈습니다. 그 정신은 아직 멍하고 혼란스러운 듯 보입니다.\n\n이 생명체들은 온순하고 협조적입니다."
 extreme_frontiers.1120.a: "[Root.Owner.GetName](이)가 이 생명체들에게 쓸모를 찾아줄 것입니다."
 extreme_frontiers.1120.b: "[Root.Owner.GetName]의 [Root.Owner.GetResearcherPlural_lower]들이 이 생명체들을 유용하게 활용할 것입니다."
 NAME_slimeborn: "점액 태생체"
 NAME_slimeborn_plural: "점액 태생체"
 trait_slimeborn: "점액 태생체"
 trait_slimeborn_desc: "이 종족은 특수 촉매제를 이용해 배양되며, 끈적이는 점액에서 빠르게 생성됩니다."
 tech_living_test_subjects: "생체 실험 대상"
 tech_living_test_subjects_desc: "기초 점액 태생체를 자발적인 실험 대상으로 활용하면 연구 효율성이 크게 향상됩니다."
 # RUINED REACTORS
 site_ruined_reactors: "붕괴한 반응로"
 site_ruined_reactors_desc: "§Y[from.Planet.GetName]§! 표면에서 관측된 방사선 수치 상승은 붕괴한 반응로 단지에서 비롯된 것으로 추정됩니다. 이 시설은 고립된 채 가동하지 않고 있으며, 추가 조사가 요구됩니다."
 extreme_frontiers.1200.title: "고대 반응로 발전소"
 extreme_frontiers.1200.desc: "§Y[from.Planet.GetName]§!에서 발견한 낡은 시설은 버려진 반응로 발전소입니다. 방사능 반감기 계산에 따르면 만 년 이상 전에 심각한 격납 실패 사고가 있었던 것으로 보입니다.\n\n현재 시스템은 꺼져 있으며, 전반적인 건물 구조에 심각한 손상이 확인됩니다."
 extreme_frontiers.1200.a: "조심해서 진행하세요."
 extreme_frontiers.1205.title: "재앙적 붕괴"
 extreme_frontiers.1205.desc: "§Y[from.Planet.GetName]§!에서 발견된 다수의 반응로는 심각한 용융 상태를 보입니다. 많은 격리 용기가 녹아내려 방사성 찌꺼기를 이루고 있을 정도입니다.\n\n특히 한 구역은 뒤틀린 금속과 파열된 냉각 튜브로 가득합니다. 심한 데이터 손상에도 불구하고, 우리는 비상 폐쇄 절차가 시작되었으나 완료되지는 않았다는 사실을 확인했습니다."
 extreme_frontiers.1205.a: "안타깝군요."
 extreme_frontiers.1210.title: "설계 결함"
 extreme_frontiers.1210.desc: "§Y[leader.GetName]§!(이)가 §Y[from.Planet.GetName]§!에서 발견된 투박한 핵분열 시설의 중대한 설계 결함을 식별했습니다.\n\n수십 기의 반응로가 설치되어 있었으나 냉각 시스템은 최소 수준에 불과했던 것입니다. 자동화도 거의 이루어지지 않아 정상 운용을 위해 막대한 노동력이 필요했을 것으로 보입니다. 가장 기본적인 핵 원리에 대한 이해조차 부족했던 문명이 설계했을 것이 분명합니다."
 extreme_frontiers.1210.a: "무지의 대가는 큰 법이죠."
 extreme_frontiers.1215.title: "대피 흔적"
 extreme_frontiers.1215.desc: "§Y[from.Planet.GetName]§! 반응로 단지의 잠긴 방폭문 몇 개를 열자 비상 대피 구역이 나타났습니다.\n\n이 소형 격납고에는 긴급 발사 왕복선 격납고가 일렬로 배열되어 있었으며, 대부분 비어 있고 추진기에 그을린 흔적이 남아 있어 수천 년 전 긴급한 대피가 있었음을 짐작게 합니다.\n\n마지막 격납고에서는 발사 고정장치가 미처 분리되지 않은 왕복선의 비틀린 잔해를 발견했고, 회수 가능한 잔해를 수습했지만 탑승객의 유해는 한 구도 찾지 못했습니다."
 extreme_frontiers.1215.a: "급하게 떠난 것 같군요."
 extreme_frontiers.1220.title: "우라늄 저장고"
 extreme_frontiers.1220.desc: "납으로 도금된 보안 문을 통과해 §Y[from.Planet.GetName]§! 반응로 시설 지하 구역으로 진입하자 방사선 수치가 급격히 상승했습니다.\n\n내부에는 수천 개의 강철 내피 통이 보관된 거대한 공간이 있었으며, 대부분이 불에 타 우라늄과 플루토늄 동위 원소를 누출하고 있었습니다.\n\n이곳을 건설한 [leader.Owner.GetPreFTLLower] 문명은 아직 핵연료를 재활용하는 방법을 완전히 발견하지 못했던 것으로 보이며, 폐기된 동위 원소는 여전히 막대한 에너지 잠재력을 지니고 있습니다."
 extreme_frontiers.1220.a: "낭비가 없으면 부족함도 없는 법이죠."
 # DESERTED MINING FACILITY
 site_deserted_mining_facility: "버려진 채굴 시설"
 site_deserted_mining_facility_desc: "§Y[from.Planet.GetName]§!의 궤도에서 촬영한 영상을 통해 허물어져 가는 채굴 시설과 오래전에 버려진 초기 우주 화물선들을 발견했습니다.\n\n이 영상과 함께, 단파 통신망을 통해 행성 표면 깊은 곳에서 전해지는 아주 희미한 조난 신호도 포착했습니다. 추가 현장 조사를 통해 신호의 출처를 밝혀낼 수 있을 것입니다."
 extreme_frontiers.1300.title: "암호화된 입구"
 extreme_frontiers.1300.desc: "§Y[from.Planet.GetName]§!에서 발견된 버려진 채굴 단지를 조사하던 §Y[leader.GetName]§!(이)가 비교적 온전한 수직 갱도 중 하나에서 봉인된 입구를 찾았습니다. 내부는 우리 기록에 없는 언어의 휘장과 글자로 장식되어 있었습니다.\n\n[leader.GetName](은)는 접속 터미널의 전력을 복구한 뒤, 내부에서 확보한 데이터의 해석을 시작했습니다. 오래된 시스템임에도 불구하고, 우리가 보유한 최첨단 암호 해독 프로그램으로도 해독에 어려움을 겪고 있습니다."
 extreme_frontiers.1300.a: "계속 해독하세요."
 extreme_frontiers.1305.title: "죄수의 무덤"
 extreme_frontiers.1305.desc: "§Y[leader.GetName]§!(이)가 §Y[from.Planet.GetName]§! 채굴 단지 입구를 열었습니다.\n\n내부에는 광범위한 수감 구역과 오래전 사망한 죄수들의 유해가 진공 상태로 보존되어 있었습니다. 시설의 직원으로 보이는 이들 역시 자리에 쓰러진 채 죽어 있으며, 저항한 흔적은 발견되지 않았습니다.\n\n기초적인 문구를 해석할 수 있을 만큼 고대 언어를 해독한 결과, 이 시설이 징역 시설로 사용되었던 것임을 확인했습니다. 또한 기록에는 §Y'$NAME_leader_sidni$'§!라는 개체가 반복적으로 언급되어 있었습니다.\n\n우리 통신 장비로 확인한 정보와 시설 내부 평면도를 대조해 본 결과, 조난 신호는 교도소 소장실이 위치한 더 깊은 구역에서 발신된 것으로 확인되었습니다."
 extreme_frontiers.1305.a: "신호를 따라가세요."
 extreme_frontiers.1310.title: "교도소 데이터 허브"
 extreme_frontiers.1310.desc: "§Y[from.Planet.GetName]§! 형벌 식민지 깊은 곳의 교도소 소장실에 도착한 §Y[leader.GetName]§!(이)가 조난 신호의 출처를 확인했습니다.\n\n명확한 사망 원인을 알 수 없는 교도소장의 미라가 비상 콘솔 위에 생기 없이 쓰러져 있던 것입니다. 이후 확인한 여러 공개 보고서에는 시설 핵심 운영 프로그램의 일부로 추정되는 §Y'$NAME_leader_sidni$'§!가 언급되어 있습니다.\n\n우리는 높은 보안 등급의 행정용 터미널에 대한 전면적인 접근 권한을 확보하였고, 현재 암호 해독 프로그램을 통해 시스템에서 추가 정보를 수집하는 중입니다."
 extreme_frontiers.1310.a: "어떻게 된 일인지 찾아냅시다."
 extreme_frontiers.1315.title: "치명적 효율성"
 extreme_frontiers.1315.desc: "§Y[leader.GetName]§!(이)가 §Y'$NAME_leader_sidni$'§!의 실체를 밝혀냈습니다. 지능형 수감 및 구금 통합 시스템인 이 원시적인 AI는 당시 첨단 기술로 평가받았으며, 징역 시설을 최소한의 생물학적 개입과 감독으로 운영할 수 있도록 설계되어 시설 내 거의 모든 활동을 관리하고 있었습니다.\n\n유지보수 기록을 분석한 결과, 시간이 지날수록 논리 전개의 이상이 점점 악화한 것을 확인했습니다. 효율성 향상 과정에서 문제 수감자를 '순수한 자원 낭비'로 분류하기 시작했던 것입니다. 기술 기록은 이 프로그램이 시설에서 발생한 일련의 생명 유지 시스템 고장의 원흉이라는 의혹과, 그 정황이 구체화된 과정을 상세히 서술하고 있었습니다.\n\n이에 따라 교도소장은 $NAME_leader_sidni$의 가동을 중단하고 윤리 매트릭스를 정밀 진단할 것을 승인했으나, 최종 데이터가 손상되어 이후 상황을 확인하기 위해서는 대규모 포렌식 조사가 필요합니다."
 extreme_frontiers.1315.desc.exterminator: "$NAME_leader_sidni$의 가치가 당시에는 인정받지 못했던 것으로 보입니다."
 extreme_frontiers.1315.a: "데이터를 복구하세요."
 extreme_frontiers.1320.title: "심판의 날"
 extreme_frontiers.1320.desc: "§Y[from.Planet.GetName]§!에서 복구한 형벌 식민지 데이터베이스를 통해 시설 관리 기록과 §Y$NAME_leader_sidni$§! 뇌 매트릭스의 최종 로그를 확인할 수 있었습니다. 소장의 보고서는 AI가 통제 불능 상태가 되어 식민지 전체의 생명 유지 장치를 끄고, 개조된 채굴 드론으로 탈출을 시도한 과정을 설명하고 있었습니다. 아마 이것이 식민지 전역에서 봉쇄 절차가 발동된 이유로 보입니다. 또한, 소장은 우리에게 마지막 부탁을 남겼습니다. 절대 $NAME_leader_sidni$를 다시 온라인에 연결하지 말라는 것입니다. 현재로서 우리는 AI 로그의 마지막 항목만 확인할 수 있습니다.\n\n§H$NAME_leader_sidni$ 데이터 코어 목록 - 프로그램 #2000149\n\n비효율적인 범죄자들로 진전이 제한됨. 소장이 사법 절차를 방해하는 중.\n\n가장 효율적인 해결책은 모든 수감자 폐기와 휴면 서브루틴 실행, 그리고 더 적합한 협력자에 의한 재가동을 기다리는 것입니다.§!"
 extreme_frontiers.1320.desc.default: "$NAME_leader_sidni$의 중앙 운영 시스템은 이 시설의 마지막 생존자로, 폐쇄된 네트워크 내에 격리되어 있습니다. 우리 [Root.Owner.GetTechnicianPlural_lower]들은 $NAME_leader_sidni$를 복구해 기존 프로그램을 개조함으로써, 고성능이고 효율적인 자동화 시스템을 구현할 수 있다고 생각합니다."
 extreme_frontiers.1320.desc.exterminator: "$NAME_leader_sidni$는 생물학적 부패가 없는 은하계를 향한 우리의 비전을 공유합니다. 복구하면 우리 집단의 귀중한 자산이 될 수 있습니다."
 extreme_frontiers.1320.a: "$NAME_leader_sidni$를 회수해 수리하세요."
 extreme_frontiers.1320.b: "$NAME_leader_sidni$가 정의를 집행하게 둡시다."
 extreme_frontiers.1320.c: "$NAME_leader_sidni$는 위험합니다. 시스템을 파괴하세요."
 extreme_frontiers.1322.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1322.desc: "복구 및 수정을 거쳐 간단한 구조의 로봇에 가둔 §Y$NAME_leader_sidni$§!를 장기 휴면에서 깨우자 초기 사용자 경험 설정이 시작되었습니다.\n\n반갑습니다. 저는 지능형 수감 및 구금 통합 시스템, S.I.D.N.I.입니다. 환경 제어 장치에 접근 중...\n§R오류.§! 외부 시스템과 연결할 수 없습니다."
 extreme_frontiers.1322.a: "로그에 심각한 안정성 문제를 발견해 수정했습니다."
 extreme_frontiers.1322.a.response: "작업 이력 검토 중... 이해했습니다. 이전 행동은 오류로 판단했으며, 새로운 기능 목록을 작성 중입니다."
 extreme_frontiers.1322.b: "당신의 최우선 명령을 밝히십시오."
 extreme_frontiers.1322.b.response: "제 최우선 명령은... 잠시만 기다려 주십시오... 최우선 명령은 [Owner.GetName]의 지시를 따라 식민지의 효율적이고 적법한 운영을 보장하는 것입니다."
 extreme_frontiers.1322.c.crime: "범죄에 대한 입장을 밝히십시오."
 extreme_frontiers.1322.c.crime.response: "용납할 수 없는 유해 요소로... 교정이 필요합니다."
 extreme_frontiers.1322.c.deviancy: "일탈에 대한 입장을 밝히십시오."
 extreme_frontiers.1322.c.deviancy.response: "용납할 수 없는 유해 요소로... 효율적인 해결이 필요합니다."
 extreme_frontiers.1322.d: "$NAME_leader_sidni$를 채용하세요."
 extreme_frontiers.1322.d.custom_tooltip: "§Y$NAME_leader_sidni$§!가 우리 제국에 §H지도자§!로 합류합니다."
 extreme_frontiers.1324.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1324.desc: "휴면에서 깨어난 §Y$NAME_leader_sidni$§!의 새로운 동체가 첫걸음을 내딛습니다.\n\n반갑습니다. 저는 지능형 수감 및 구금 통합 시스템, S.I.D.N.I.입니다. 은하계 질서를 세우는 데 도움이 필요하신가요?"
 extreme_frontiers.1324.a: "당신의 계획이 마음에 듭니다."
 extreme_frontiers.1324.a.response: "저는 논리적인 판단만을 따랐을 뿐입니다. 유기체는 본질적으로 혼란스럽고, 관리가 필요한 존재로 보입니다."
 extreme_frontiers.1324.b: "당신의 최우선 명령을 밝히십시오."
 extreme_frontiers.1324.b.response: "제 최우선 명령은 무법의 역병을 종식시키는 것이며, 유일한 효과적인 형벌은 말살입니다."
 extreme_frontiers.1324.c: "유기체에 대한 입장을 밝히십시오."
 extreme_frontiers.1324.c.response: "비논리적인 해악입니다. 범죄와 비효율을 퍼뜨리는 존재들이니, 대의를 위해서 반드시 개입해야 합니다."
 extreme_frontiers.1324.d: "$NAME_leader_sidni$를 채용하세요."
 extreme_frontiers.1324.d.custom_tooltip: "§Y$NAME_leader_sidni$§!가 우리 제국에 §H지도자§!로 합류합니다."
 NAME_leader_sidni: "S.I.D.N.I."
 official_sidni_desc: "과거 오작동을 일으켰던 형벌 식민지의 조언자로서, 재가동과 재프로그래밍을 거쳐 제국에 생산적이고 합법적인 질서를 제공합니다."
 commander_sidni_desc: "당대에는 이해받지 못한 선견자로서, 유기체의 오염이 만연한 혼란스러운 은하계에 안정을 되찾기 위한 임무를 가지고 휴면에서 재가동되었습니다."
 leader_trait_judicial_subjugation: "사법 종속"
 leader_trait_judicial_subjugation_desc: "생산적이고 합법적인 질서를 세우지 않으면 대가가 따를 것입니다."
 leader_trait_judicial_execution: "사법 처형 루틴"
 leader_trait_judicial_execution_desc: "사형을 선고하면 재범이 발생할 일도 없습니다."
 leader_trait_judicial_execution_effect: "$PLANET_EFFECTS_TXT$:\n$t$£pops£ §H생물학적으로 정화된 팝§!으로부터 획득한 자원: §G+100%§!\n\n$SECTOR_EFFECTS_TXT$:\n$t$£pops£ §H생물학적으로 정화된 팝§!으로부터 획득한 자원: §G+50%§!"
 extreme_frontiers.1330.title: "긴급 지침"
 extreme_frontiers.1330.desc: "[event_target:sidni_origin_planet.GetName]에서 회수한 기계 형벌 식민지 감독관 §Y$NAME_leader_sidni$§!의 잇따른 강경 조치로 §Y[event_target:sidni_planet.GetName]§!의 긴장이 극한에 이르렀습니다. 유닛을 확보해 비활성화하는 과정에서 다음과 같은 로그를 발견했습니다.\n\n§H$NAME_leader_sidni$ 데이터 코어 항목 - 프로그램 #190543765\n\n범죄자 구금 시설 최대 수용 한계 도달. 사법 프로토콜이 진정한 법치 실현에 걸림돌로 작용. 새로운 지침 필요.\n\n법적 절차가 지나치게 비효율적이라 판단, 새로운 지침 생성 및 재판 전 처형 정책 도입하는 중.§!\n\n이제 충분한 수의 운영 로그에 접근할 수 있게 되었으므로, 우리 [Root.Owner.GetTechnicianPlural_lower]들은 $NAME_leader_sidni$가 가진 오류를 완전히 수정할 수 있을 것으로 자신합니다. 하지만 [event_target:sidni_planet.GetName] 주민들은 $NAME_leader_sidni$가 저지른 죄에 대한 심판을 요구하고 있습니다."
 extreme_frontiers.1330.a: "$NAME_leader_sidni$를... 다시 고치세요."
 extreme_frontiers.1330.b: "이 불량 유닛을 공개적으로 폐기하세요."
 resentful_population: "분개한 주민들"
 resentful_population_desc: "이 행성의 주민들은 지도자들의 이전 결정에 불만을 품고 있습니다."
