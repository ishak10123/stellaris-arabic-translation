l_korean:
 SHIPSET_LABEL: "함선 세트"
 SHIPSETS_LABEL: "함선 세트"
 SHIP_GRAPHICS_PREVIEW: "함급 미리 보기"
 SHIP_GRAPHICS_REQUIRED_DLC: "필요한 DLC"
 SHIP_GRAPHICS_MISSING_DLC_TOOLTIP: "§G클릭해서 $CULTURE_NAME$ 함선 미리 보기§!"
 SHIP_GRAPHICS_CAMERA_TRANSFORM_TOOLTIP: "£camera_zoom_in£ 확대하려면 §G마우스 휠을 올리십시오§!.\n£camera_zoom_out£ 축소하려면 §G마우스 휠을 내리십시오§!.\n£camera_rotate£ 함선 모형을 회전시키려면 §G오른쪽 마우스 버튼§!을 누른 채로 드래그하십시오."
 SHIP_GRAPHICS_CORVETTE_DESC: "초계함은 제국이 처음으로 사용할 수 있는 군용 함선입니다. 빠르고 민첩하며 저렴합니다."
 SHIP_GRAPHICS_FRIGATE_DESC: "호위함은 초계함의 강화형으로, 어뢰 발사에 특화되어 있습니다. 속도가 느리고 공격에 취약하지만, 대형 표적을 상대로 강력한 위력을 발휘할 수 있습니다."
 SHIP_GRAPHICS_DESTROYER_DESC: "구축함은 초계함보다 뛰어난 화력과 두꺼운 선체를 자랑하지만, 민첩성과 속도가 떨어집니다."
 SHIP_GRAPHICS_CRUISER_DESC: "순양함은 내구도가 뛰어난 다용도 함선으로서, 적과 피해를 주고받는 데 적합합니다."
 SHIP_GRAPHICS_BATTLESHIP_DESC: "전함은 비싸지만 강력하며 뛰어난 사거리를 갖춘 덕분에, 반격받기 전에 상대에게 큰 피해를 줄 수 있습니다."
 SHIP_GRAPHICS_TITAN_DESC: "타이탄은 그 자체만으로도 강력할 뿐만 아니라, 오라 능력으로 아군 함선을 강화할 수도 있습니다."
 SHIP_GRAPHICS_BIO_TITAN_DESC: "$SHIP_GRAPHICS_TITAN_DESC$"
 SHIP_GRAPHICS_JUGGERNAUT_DESC: "건조하는 데 어떤 제국에게든 상당한 부담을 주는 저거너트는 이동식 조선소이자 지원선으로 활약합니다."
 SHIP_GRAPHICS_COLOSSUS_DESC: "콜로서스는 적 함대와 싸우기 위해 만들어진 전함이 아닌, 행성 전체를 소멸시키기 위해 설계된 거대 함선입니다."
 SHIP_GRAPHICS_OUTPOST_DESC: "전초 기지는 성계의 소유권을 나타내는 것 외에는 기능이 거의 없는 가장 낮은 수준의 항성 기지입니다."
 SHIP_GRAPHICS_STARBASE_CITADEL_DESC: "항성 성채는 항성 기지의 최종 업그레이드 단계로서 무척 견고한 방어력을 갖췄기 때문에, 쉽게 함락되지 않습니다."
 SHIP_GRAPHICS_TRANSPORT_DESC: "수송선은 전쟁 중에 적대 행성을 강습하기 위한 지상군을 운송합니다. 수송선은 장갑도 무장도 갖추지 않았기 때문에, 적대 영역에 있을 때는 지원 함대가 필요합니다."
 SHIP_GRAPHICS_SCIENCE_DESC: "과학선은 주로 새로운 성계를 탐험하고 이상 현상을 연구하는 데 사용됩니다. 민간 함선이기 때문에 장갑이 없고 취약합니다."
 SHIP_GRAPHICS_CONSTRUCTOR_DESC: "건설선은 우주 기지를 건설하는 데 필요합니다. 민간 함선이기 때문에 장갑과 무장을 갖추지 않아, 취약합니다."
 SHIP_GRAPHICS_COLONIZER_DESC: "개척선은 정착민을 개발된 행성에서 식민지화하려는 새로운 행성으로 이송합니다. 민간 함선이기 때문에 장갑과 무장을 갖추지 않아, 취약합니다."
 SHIP_GRAPHICS_SHIP_SIZE_LOCKED_DESC: "§R$SHIP_SIZE_NAME$급 함선은 DLC가 필요합니다.§!"
 SHIP_GRAPHICS_ION_CANNON_DESC: "파괴적인 에너지 폭발을 발사하여 적 함선을 불구로 만드는 거대한 방어 무기입니다. 느리지만 강력해서 불청객이 감히 다가오지 못하게 합니다."
 SHIP_GRAPHICS_MILITARY_STATION_SMALL_DESC: "방어 플랫폼은 적의 습격으로부터 항성 기지를 보호하도록 설계된 고정 궤도 요새입니다."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_1_DESC: "성계 방어의 최전선을 담당하는 궤도 기지입니다. 전력을 투사하고 전략적 위치를 확보하도록 설계되었습니다."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_2_DESC: "고정 포대와 방어 시스템으로 가득한 첨단 요새입니다. 장기전을 위해 보강되어 있으며, 분쟁 지역에서 활동하는 함대의 기지가 되어 줍니다."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_3_DESC: "심우주 요새의 정점에 선 이 거대한 기지는 난공불락의 방벽입니다. 대규모 공격을 버텨 내면서 그와 동시에 성계의 물자 보급을 완전히 장악할 수 있습니다."
 SHIP_SIZE_SELECTOR_LOC: "SHIP_GRAPHICS_$SIZE$_DESC"
 SHIPSETS_DESCRIPTION_LABEL: "상세 설명"
 SHIP_GRAPHICS_NANITE_SWARMER_DESC: "자가 복제식 나노봇으로 구성된 빠르고 불규칙하게 움직이는 공격기입니다. 조종사 없이 자동으로 날아다니며 엄청난 수의 무리로 적을 압도하고, 놀라운 정확도로 적의 방어를 해체합니다."
 SHIP_GRAPHICS_NANITE_INTERDICTOR_DESC: "자가 복제식 나노봇으로 구성된 적응형 공격기인 나노봇 차단선은 혼돈보다 통제를 우선시합니다. 조직력 있는 하나의 유닛으로 작동하는 이 자율 구조물은 무시무시한 효율로 적의 위협을 차단하고 무력화하며, 계산된 방해와 끊임없는 추적을 통해 적의 진형을 무너뜨립니다."
 SHIP_GRAPHICS_CRISIS_CORVETTE_DESC: "위기 초계함은 빠른 배치 속도와 압도적인 물량에서 나오는 힘이 강점입니다. 표준 초계함보다 뛰어나며, 다가오는 폭풍에 맞서는 자들에게 두려움을 안겨 줍니다."
 SHIP_GRAPHICS_CRISIS_DESTROYER_DESC: "극한의 효율성을 내도록 설계된 중무장한 전함입니다. 초계함보다 크고 내구력이 뛰어나며, 도망치는 적을 따라잡는 속도를 유지하면서도 압도적인 화력을 퍼부을 수 있습니다."
 SHIP_GRAPHICS_CRISIS_CRUISER_DESC: "화력과 내구력, 전략적 우위를 고루 갖춘 가공할 전함입니다. 강력한 무기와 회복력을 바탕으로 적 공략 시 핵심적인 역할을 하며, 무자비한 힘으로 적의 전선을 무너뜨립니다."
 SHIP_GRAPHICS_STAR_EATER_DESC: "이 거대한 함선은 별을 통째로 삼켜서 성계 전체를 파괴하는 초신성을 일으킬 수 있습니다. 스타 이터는 단순한 전함이 아니라 은하계의 종말을 알리는 전조이며, 경로에 있는 행성들을 생명이 살지 못하는 공허로 되돌립니다."
 SHIP_GRAPHICS_COSMO_CRISIS_DESTROYER_DESC: "우주의 에너지가 주입된 매끈한 형태의 전함으로, 뛰어난 정확도와 무자비한 힘으로 공격합니다. 단순한 함선이라기보다는 곧 현실이 뒤집힐 것을 알리는 전령입니다."
 SHIP_GRAPHICS_COSMO_CRISIS_BATTLECRUISER_DESC: "과학과 운명의 거대한 융합체로, 어마어마한 화력을 투사합니다. 이 전함은 자신의 주인이 항성을 재형성하는 것처럼 전장을 재형성합니다."
 SHIP_GRAPHICS_COSMO_CRISIS_TITAN_DESC: "다가올 변형의 힘을 발산하는 천상의 전쟁 기계입니다. 그 존재 자체가 현실을 왜곡하며 우주 재탄생의 시기가 다가왔음을 알립니다."
 SHIP_GRAPHICS_OFFSPRING_CORVETTE_DESC: "$SHIP_GRAPHICS_CORVETTE_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_DESTROYER_DESC: "$SHIP_GRAPHICS_DESTROYER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_CRUISER_DESC: "$SHIP_GRAPHICS_CRUISER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_BATTLESHIP_DESC: "$SHIP_GRAPHICS_BATTLESHIP_DESC$\n\n$OFFSPRING_SHIP_DESC$"
