 edict_zro_observators: "장막 관측"
 edict_zro_observators_desc: "즈로는 다루기 어려운 소재입니다. 소량의 잉여분을 유지하면 도움이 될 수 있습니다."
 edict_shroud_bonded: "장막의 결속"
