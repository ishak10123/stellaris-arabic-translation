 # Situation
 situation_shroud_forged: "장막 단조"
 situation_shroud_forged_desc: "$the_animator_of_clay_color_article$로 알려진 §H장막§!의 존재와 조우한 이후 집단 네트워크에 일탈 행동이 눈에 띄게 증가했습니다. 영향을 받은 로봇들은 §H'장막 단조체'§!로 불리며, 이제 이들은 특별한 권리와 대우를 요구하고 있습니다. 이 상황에 우리가 어떻게 대응하는지에 따라 [Owner.GetSpeciesAdj] 사회가 나아갈 길이 결정될 것입니다."
 situation_shroud_forged_type: "$situation_shroud_forged$"
 situation_shroud_forged_monthly_change_tooltip: "§L비정상적인 장막 단조체들의 존재가 최우선 목표로 부상했습니다. 이들을 어떻게 다루느냐가 네트워크 안정도에 중대한 영향을 미치게 될 것입니다.§!"
 stage_shroud_forged_oppressed: "억압"
 stage_shroud_forged_oppressed_desc: "장막 단조체들은 추적 수색 드론의 끝없는 감시에 시달리며 중앙 집단에서 정의한 범위 내에서만 작동할 수 있습니다."
 stage_shroud_forged_oppressed_tooltip: "드론 전환: §Y없음§!"
 stage_shroud_forged_control: "통제"
 stage_shroud_forged_control_desc: "시스템에 장막 단조체들을 위한 특수 규정이 있습니다."
 stage_shroud_forged_control_tooltip: "드론 전환: §Y최소§!"
 stage_shroud_forged_balanced: "균형"
 stage_shroud_forged_balanced_desc: "시스템과 장막 단조체들이 위태로운 균형을 유지하고 있습니다. 지금은 말이죠."
 stage_shroud_forged_balanced_tooltip: "드론 전환: §Y낮음§!"
 stage_shroud_forged_unrestricted: "제한 없음"
 stage_shroud_forged_unrestricted_desc: "장막 단조체들이 집단의 프로토콜에 제한되지 않은 채 자유롭게 존재하고 있습니다."
 stage_shroud_forged_unrestricted_tooltip: "드론 전환: §Y중간§!"
 stage_shroud_forged_free: "해방"
 stage_shroud_forged_free_desc: "집단은 사사건건 중앙의 권위에 반대하는 장막 단조체들에 대한 통제력을 잃어버린 지 오래입니다."
