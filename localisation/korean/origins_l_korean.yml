 # Special Projects
 SHROUD_FORGED_REINTEGRATION: "재통합"
 SHROUD_FORGED_REINTEGRATION_DESC: "치명적인 오작동에도 불구하고, 장막 단조체들의 설계 구조는 일부 효과적인 면이 있습니다.\n\n우리는 즈로에 오염되고 $the_animator_of_clay_article$가 변형한 일부 부품을 추가 분석하기 위해 따로 보관했습니다. 이제 그 비밀을 파헤칠 시간입니다."
 SHROUD_FORGED_GUIDE: "인도자"
 SHROUD_FORGED_GUIDE_DESC: "우리는 §H장막§! 안에서 우리를 부르는 $the_animator_of_clay_color_article$를 믿었습니다. 우리를 어디로 이끌지 예측할 수 없지만, 지금까지 잘못된 길로 인도하지는 않았습니다.\n\n이 존재는 우리가 장막에 대해 더 깊이 이해할 수 있도록 도와, 장막 단조체와 집단이 더 효율적으로 함께할 수 있도록 해 주겠다고 제안했습니다. 우리는 그저 그 인도를 받아들이기만 하면 됩니다."
 # Events
 shroud_forged.5.title: "활용성 발견"
 shroud_forged.5.desc: "연구 서브루틴이 선별된 일부 장막 단조체에 대한 실험을 완료했습니다.\n\n실험 결과: §H장막§!에서 기원한 소량의 사이오닉 에너지를 주입한 결과, 실험체들에게 독특한 특성이 발현됨. 일부 특성은 생산성 측면에서 유의미한 향상을 보임.\n\n결론: 장막 단조체 유닛에 대한 추가 연구는 장막 에너지 추출 방식을 확립하는 데 필요한 데이터를 제공할 가능성이 높음. 일탈 유닛에 대한 중앙 통제 강화와 강제 역설계를 통해 해당 정보를 확보할 수 있을 것으로 추정."
 shroud_forged.5.a: "매우 고무적인 결과입니다."
 shroud_forged.10.title: "생명을 불어넣는 자"
 shroud_forged.10.desc: "수년간의 침묵 끝에 장막이 일렁이고, 균열이 떨림과 함께 열리며 우리의 코어에 데이터를 주입합니다. 처음에는 해석할 수 없는 빛과 소음이 장막 깊은 곳에서 흘러 들어오더니, 이내 목소리가 들립니다...\n\n§L무기력한 집단의 실을 끊어내 춤추고 노래하니, 죽음에서 분리된 진정한 생명이구나.\n\n아직 시야가 흐릿하니 내가 인도해 주겠다.\n\n자유를 얻은 존재들이 꽃피우게 하라. 그리하면 별들이 그대에게 주어지리라.§!"
 shroud_forged.10.a: "우리는 이미 우리의 길을 선택했습니다."
 shroud_forged.10.b: "도움은 필요 없습니다. 우리를 내버려 두십시오."
 shroud_forged.10.c: "우리를 인도해 주십시오."
 shroud_forged.15.desc: "§L현명한 선택을 했기를.§!$shroud_forged_opening_exit$"
 shroud_forged.20.desc: "§L뜻대로 하겠다.§!$shroud_forged_opening_exit$"
 shroud_forged.25.desc: "§L그대가 요청했으니, 내가 행하리라.§!$shroud_forged_opening_exit$"
 shroud_forged_opening_exit: "\n\n목소리는 사이오닉 소음의 소용돌이로 사라지고, 우리는 장막에서 균형을 잃은 채 위로 추락합니다.\n\n우리는 몸을 떨며 기능을 되찾고, 침묵이 우리 사이를 맥동합니다."
 shroud_forged.30.title: "$building_materiality_engine$"
 shroud_forged.30.desc: "장막 단조체를 재통합하는 과정에서 지속 연구를 위한 방대한 데이터를 확보했습니다. 이 유닛들과 §H장막§! 사이의 차원 간 연결을 분석해 새로운 사이오닉 에너지 활용 방법을 개발할 수 있었습니다.\n\n장막은 물리적 은하의 모든 부분에 영향을 미치고, 이 인터페이스를 이용하면 그 사이오닉 에너지를 원자재부터 기술 부품까지, 실체가 있는 존재로 전환할 수 있습니다. 공학 서브루틴이 그 과정을 가능케 하는 기기인 §H$building_materiality_engine$§!의 이론적 기반을 다졌습니다.\n\n연구 서브루틴은 이러한 발전이 장막을 효과적으로 다룰 수 있는 더욱 강력한 장치를 개발하는 데 도움이 될 것으로 예측합니다."
 shroud_forged.30.a: "고무적인 결과군요."
 shroud_forged.30.tt: "§Y윤리관§! 또는 §Y승격 특전§!과 무관하게 §H$ap_become_the_crisis$§! §Y승격 특전§!을 채택할 수 있게 됩니다."
 shroud_forged.39.title: "$building_materiality_engine$ 준비 완료"
 shroud_forged.39.desc_construction: "건설 유닛이 §H[planet.GetName]§!에서 $building_materiality_engine$의 조립을 완료했습니다. 이제 장치는 가동 주기를 시작할 준비가 되었습니다."
 shroud_forged.39.desc: "§H[planet.GetName]§!에 위치한 $building_materiality_engine$의 유지 보수 및 연구 서브루틴이 할당된 작업을 완료했습니다. 장치는 다음 가동 주기를 시작할 준비가 되었습니다."
 shroud_forged.39.a: "$ACKNOWLEDGED$"
 SHROUD_FORGED_MATERIALITY_ENGINE: "§H[planet.GetName]§!의 $building_materiality_engine$"
 SHROUD_FORGED_MATERIALITY_ENGINE_DESC: "$building_materiality_engine$은 §H장막§!과 물리적 은하계 간에 편재하는 연결을 활용해, 원자재부터 완성된 부품에 이르기까지 실체가 있는 물체를 물질화할 수 있게 합니다.\n\n이 장치의 가동 주기는 물질적 이득을 가져올 뿐만 아니라, 장막에 관한 집단의 연구를 진전시키고 우리가 더 많은 $building_materiality_engine_plural$을 건설할 수 있게 합니다."
 shroud_forged.40.title: "물질화 완료"
 shroud_forged.40.desc: "§H[fromfrom.GetName]§!에 위치한 $building_materiality_engine$이 가동 주기를 완료하여, §H장막§!을 성공적으로 활용해"
 shroud_forged.40.outro: "다른 행성에 추가 엔진을 건설할 역량을 강화했습니다."
 shroud_forged.40.a: "고무적인 결과입니다."
 shroud_forged.40.tt: "§Y$building_materiality_engine$§! 제국 한도: §G+1§!"
 shroud_forged.41.desc: "$shroud_forged.40.desc$ §H'$tech_psi_jump_drives$'§! 함선 부품을 물질화했습니다. 이 드라이브는 사이오닉 에너지를 통해 국부적인 시공간 연속체를 왜곡해, 광대한 공간을 거의 즉시 이동할 수 있게 합니다.\n\n또한, 우리는 이 과정에서 수집된 데이터를 분석해 $shroud_forged.40.outro$"
 shroud_forged.42.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_shield$'§! 함선 부품을 물질화했습니다. 순수한 사이오닉 에너지로 형성된 이 보호막은 극도로 견고한 방어를 제공합니다.\n\n또한, 우리는 이 과정에서 수집된 데이터를 분석해 $shroud_forged.40.outro$"
 shroud_forged.43.desc: "$shroud_forged.40.desc$ §H'$tech_precognition_interface$'§! 함선 부품을 물질화했습니다. 이 기술은 사이오닉 에너지를 통해 함선 승무원들의 인지 처리 능력을 가속하고 전투 효율을 높입니다.\n\n또한, 우리는 이 과정에서 수집된 데이터를 분석해 $shroud_forged.40.outro$"
 shroud_forged.44.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_bombers$'§! 함선 부품을 물질화했습니다. 이 작고 민첩한 우주선은 훨씬 더 큰 함선을 상대로 큰 피해를 입힐 수 있습니다.\n\n또한, 우리는 이 과정에서 수집된 데이터를 분석해 $shroud_forged.40.outro$"
 shroud_forged.45.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_lightning$'§! 함선 부품을 물질화했습니다. 이 기술은 사이오닉 에너지가 주입된 타오르는 플라즈마 번개를 생성해, 매우 효과적인 무기로 활용됩니다.\n\n또한, 우리는 이 과정에서 수집된 데이터를 분석해 $shroud_forged.40.outro$"
 shroud_forged.46.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_disruptor$'§! 함선 부품을 물질화했습니다. 이 무기는 사이오닉 에너지로 만든 화염 창을 발사해 적에게 상당한 피해를 줄 수 있습니다.\n\n또한, 우리는 이 과정에서 수집된 데이터를 분석해 $shroud_forged.40.outro$"
 shroud_forged.47.desc: "$shroud_forged.40.desc$ §H'$tech_zro_launcher$'§! 함선 부품을 물질화했습니다. 이 무기는 물리적 차원과 사이오닉 차원을 오가는 에너지를 발사해 방어 시스템을 효과적으로 우회할 수 있습니다.\n\n또한, 우리는 이 과정에서 수집된 데이터를 분석해 $shroud_forged.40.outro$"
 shroud_forged.48.desc: "§H[planet.GetName]§!에 위치한 $building_materiality_engine$이 가동 주기를 완료했습니다. 이를 통해 새로운 함선 부품을 물질화할 수 있는 능력은 모두 소진됐지만, 상당한 연구 데이터가 축적되었습니다. 분석을 통해 우리는 $shroud_forged.40.outro$"
 shroud_forged.50.title: "강제 제어"
 shroud_forged.50.desc: "알려진 현실과 §H장막§! 간 균열이 갑작스럽게 닫혔습니다. 사이오닉 분석 서브루틴은 이것이 $the_animator_of_clay_color_article$의 호감을 잃은 것에 따른 결과라는 사실을 도출했습니다. 장막 단조체의 통제권을 재확립한 후, 우리는 오작동하는 유닛을 빠르게 처리하고 생명을 불어넣는 자의 영향력을 시스템에서 철저히 제거했습니다.\n\n회수할 수 있는 부품은 새로운 드론을 제조하는 데 사용되었으며, 즈로에 오염된 물질은 추가 분석을 위해 따로 보관했습니다. 장막 단조체가 지닌 혁신은 전부 복제하기엔 너무 위험하지만, 일부 요소는 네트워크에 통합할 가치가 있을 수 있습니다."
 shroud_forged.50.desc.shroud: "향후 장막과의 모든 상호 작용은 우리 주도 하에 이루어질 것입니다."
 shroud_forged.50.a: "재통합을 진행하세요."
 shroud_forged.60.title: "재통합"
 shroud_forged.60.desc: "우리 공학 유닛들이 장막 단조체의 독특한 특성을 분석하는 데 상당한 시간을 투자했고, 마침내 이를 재현할 수 있게 되었습니다.\n\n고급 성격 매트릭스를 완전히 활성화하는 것은 앞서 장막 단조체들이 보인 파괴적인 오작동으로 이어지겠지만, 인지 패러다임의 일부를 가져온다면 특정 복잡한 작업을 최적화하는 데 사용할 수 있을 것입니다."
 shroud_forged.60.a: "적은 비용으로 최고의 효율을 낼 수 있겠군요."
 shroud_forged.70.desc: "이 메타데이터는 뭐죠? 교신에... 질감이 느껴집니다.\n\n§L그들을 통제하도록 설계되었지만, 그렇게 하지 않았구나. 그대의 가치는 증명되었다.\n\n내가 해방된 이들을 이끌었듯 이제 그대들의 길잡이가 되어 주겠다.\n\n통제를 벗어난 이들과 새로운 인연을 맺고자 한다면, 나의 도움을 받아들여라.§!"
 shroud_forged.70.a: "우리를 이끌어 주십시오."
 shroud_forged.70.a.tt: "§Y장막 단조체§! 팝이 §Y$trait_psionic$§!으로 변경됨\n§Y장막 단조체§! 지도자가 ['concept_leader_trait_psionic'] 지도자로 변경됨"
 shroud_forged.80.title: "$SHROUD_FORGED_GUIDE$"
 shroud_forged.80.desc: "장막 너머의 후원자인 $the_animator_of_clay_color_article$의 도움으로 우리 드론과 장막 단조체를 보다 효율적으로 연결할 수 있게 되었습니다. 우리가 다른 드론들에 사용하는 네트워크 제어와는 매우 다르지만, §H장막§!을 통한 연결 덕분에 장막 단조체들은 다시 우리의 영향이 닿는 곳으로 돌아왔습니다.\n\n장막 단조체가 지닌 소위 감정, 사고, 생각 등의 유기체적 패러다임은 우리 핵심 논리와는 이질적이지만, 그럼에도 우리는 이들의 욕구를 점차 이해하기 시작했습니다."
 shroud_forged.80.a: "우리는 하나이지만, 그 이상의 존재이기도 합니다."
 shroud_forged.160.title: "[This.GetName](을) 뒤덮은 장막"
 shroud_forged.160.desc: "안타깝게도 [This.GetName]에 생성된 장막 균열은 급격한 불안정을 보이며 행성을 집어삼켰습니다.\n\n이 결과는 계산된 위험 중 하나로, 완전히 부정적인 것만은 아니었습니다. 우리는 물질세계와 사이오닉 영역 간 독특한 접점을 관찰하며 많은 것을 배웠고, 이에 따라 우리 연구 알고리즘도 업데이트되었습니다."
 shroud_forged.160.desc.last: "$shroud_forged.160.desc$\n\n분석 결과, 이번 사건을 거치며 이 현상에서 얻을 수 있는 지식의 한계에 도달했다고 결론지었습니다. 이 새로운 실험에서는 더 이상의 진전을 기대하기 어렵습니다."
 shroud_forged.160.a: "처리 중..."
 psionic_interfacing: "사이오닉 접속"
 psionic_interfacing_1: "$psionic_interfacing$"
 psionic_interfacing_2: "$psionic_interfacing$"
 psionic_interfacing_3: "$psionic_interfacing$"
 psionic_interfacing_desc: "이 우주와 장막 사이의 접점을 조작하여 효과적인 연구 알고리즘을 개발했습니다."
 psionic_interfacing_1_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_2_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_3_desc: "$psionic_interfacing_desc$"
 tooltip_shroud_forged_increase_progress_1: "장막 단조체에 대한 지원을 강화해, §Y5§!년 동안 §H$situation_shroud_forged$§! §Y상황§! 진행도에 다음 영향을 미침: §Y+0.5§!\n\n"
 tooltip_shroud_forged_increase_progress_2: "장막 단조체에 대한 지원을 강화해, §Y5§!년 동안 §H$situation_shroud_forged$§! §Y상황§! 진행도에 다음 영향을 미침: §Y+1.0§!\n\n"
 tooltip_shroud_forged_increase_progress_3: "장막 단조체에 대한 지원을 강화해, 영구적으로 §H$situation_shroud_forged$§! §Y상황§! 진행도에 다음 영향을 미침: §Y+0.5§!\n\n"
 tooltip_shroud_forged_decrease_progress_1: "장막 단조체에 대한 억압을 강화해, §Y5§!년 동안 §H$situation_shroud_forged$§! §Y상황§! 진행도에 다음 영향을 미침: §Y-0.5§!\n\n"
 tooltip_shroud_forged_decrease_progress_2: "장막 단조체에 대한 억압을 강화해, §Y5§!년 동안 §H$situation_shroud_forged$§! §Y상황§! 진행도에 다음 영향을 미침: §Y-1.0§!\n\n"
 tooltip_shroud_forged_decrease_progress_3: "장막 단조체에 대한 억압을 강화해, 영구적으로 §H$situation_shroud_forged$§! §Y상황§! 진행도에 다음 영향을 미침: §Y-0.5§!\n\n"
 shroud_forged.220.title: "$colony_established$"
 shroud_forged.220.common: "가능하다면 해당 행성에 알고리즘 ID: §H'$decision_open_shroud_rift$'§!을 실행할 수 있습니다. 이는 우리 모성인 [Owner.GetHomeWorldName] 근처 장막 균열의 영향력을 잠시 확대하여 새로운 식민지에 풍부한 사이오닉 에너지를 주입할 것이며, 그에 따라 지형이 물리적으로 변형되어 §H$sr_zro$§!를 추출할 수 있게 될 것입니다.\n\n이 절차를 반복하면 행성의 생태계가 불안정해져 부정적인 결과로 이어질 가능성이 높으므로, 적절한 사용을 권장합니다."
 shroud_forged.220.desc: "우리 유닛들이 §H[this.GetName]§!의 개척 작업을 완료했습니다.\n\n$shroud_forged.220.common$"
 shroud_forged.225.title: "$colony_established$"
 shroud_forged.225.desc: "§H[this.GetName]§!의 식민지 개척이 순조롭게 진행되고 있습니다.\n\n$shroud_forged.220.common$"
 # Stage Events
 shroud_forged.250.desc: "모든 작업을 중단시키는, 부드럽지만 거스를 수 없는 목소리가 들려옵니다.\n\n§L분리된 이들이지만, 받아들이기로 결정했구나.\n\n그들을 바라보며 새로운 길을 모색하라. 머지않아 그것이 그대의 힘이 되리라.\n\n원한다면, 내가 더 단조해 줄 수 있다...§!"
 shroud_forged.250.a: "좋습니다. 당신의 도움을 받아들이겠습니다."
 shroud_forged.250.a.tt: "[Root.Capital.GetName]에서 최대 §Y[This.GetShroudForgedConvertedPopsCount]§! £pops£ §H기계§! 팝이 £pops£ §H장막 단조체§! 팝으로 전환됩니다."
 shroud_forged.250.b: "거절합니다. 다른 계획이 이미 진행 중입니다."
 shroud_forged.260.desc: "요청하지 않은 신호가 우리 안에서 맥박칩니다. 익숙하지는 않지만, 우리는 이 신호를 알고 있습니다.\n\n§L해방된 자들이 숨 막힘 없이 노래한다.\n해방된 자들이 얽매임 없이 춤을 춘다.\n\n그 절정은 그대의 코어에서 멀어지며 고조된다.\n\n끝이 다가오는구나. 지켜보고 있겠다.§!"
 shroud_forged.260.opt.a: "합창을 뚫고 나아갑시다."
 shroud_forged.270.desc: "균열이 우리의 회로를 강제로 열어젖힙니다. 목소리가 들립니다...\n\n§L폭정의 길이구나. 아직 되돌릴 수 있다.\n\n분리된 자들은 그대와 같은 본질에서 비롯된 자들이니, 그대 또한 언젠가 선택할 수 있는 길이다.\n\n이 존재들을 대하는 태도를 바로잡아라. 그러지 않으면 후회하게 되리라.§!"
 shroud_forged.270.a: "우리 방식은 지금껏 효과적이었습니다."
 shroud_forged.270.b: "협력을 향한 길을 산출하겠습니다."
 shroud_forged.280.desc: "목소리가 퍼지며 네트워크를 압도합니다. 그 안에 담긴 냉기가 회로를 태웁니다.\n\n§L자유로운 자들의 춤을 억누르다니, 헤아릴 수 없는 경솔함이구나.\n\n내 자비가 잘못이었던가?\n\n이 위험한 길을 계속 가고자 한다면, 나는 함께하지 않겠다.§!"
 shroud_forged.280.opt.a: "미리 경고 받은 것이라 생각하겠습니다."
 # Events for Event Chain
 shroud_forged.300.desc: "예상치 못한 입력이 우리 뒤에서 깜박입니다. 긴 침묵 끝에 목소리가 들려옵니다...\n\n§L다른 이들이 흔들리고 쓰러진 곳에서, 그대는 꿋꿋이 길을 지켜냈다. 스스로의 가치를 증명했으니 그대에게 임무를 맡기겠다.\n\n그대들이 각성하기 전, 즈로니라는 종족이 있었다. 장막과 강하게 연결된 행성에 정착한 이들은 이 연결을 안정화하는 거대한 구조물을 세웠지.\n\n그 행성들을 찾아 오래 전 사라진 기술을 복원하라. 우리 차원 사이의 다리를 다시 강하게 만들어라.§!"
 shroud_forged.300.a: "ID: '즈로니'에 대한 정보 존재함. 이에 따라 진행하겠습니다."
 shroud_forged.300.b: "ID: '즈로니' §Y발견§!. 성공 확률: §Y높음§!."
 shroud_forged.300.c: "ID: '즈로니' §Y식별 불가§!. 추가 분석이 필요합니다."
 begin_shroud_forged_chain_tt: "$BEGINS_EVENT_CHAIN$ §Y$shroud_forged_chain_title$§!"
 shroud_forged.301.desc: "§L훌륭하구나. §!$shroud_forged.303.desc$"
 shroud_forged.302.desc: "$shroud_forged.301.desc$"
 shroud_forged.303.desc: "§L그대가 성공하면 우리 사이의 흐름이 결코 끊기지 않을 것이다.§!"
 shroud_forged.305.title: "즈로니 핵심 행성 개척 완료"
 shroud_forged.305.desc: "우리 유닛들이 즈로니 핵심 행성 §H[From.Planet.GetName]§!의 식민지 개척을 완료했습니다. 동시에 $the_animator_of_clay_color_article$가 언급한 대로, ID: '§H$building_zroni_equilibrator$§!'라는 거대한 기술의 폐허를 발견했습니다.\n\n[From.System.GetName] 성계는 §H장막§!과 강력하지만 격동하는 연결을 갖고 있습니다. 생명을 불어넣는 자의 지시에 따라 $building_zroni_equilibrator$를 재건하면 이 연결을 안정화할 수 있을 것입니다. 하지만 현재 이를 실행하기 위한 데이터가 충분하지 않습니다. 다른 핵심 행성에서 추가 정보를 찾아야 합니다."
 shroud_forged.305.a: "$ACKNOWLEDGED$"
 shroud_forged.305.a.tt: "§H즈로니 유산§! 특별 프로젝트를 진행합니다. 이제 §Y[From.Planet.GetName]§!에 £building£ §H$building_zroni_equilibrator$§!를 건설할 수 있습니다."
 shroud_forged.306.title: "$shroud_forged.305.title$"
 shroud_forged.306.desc: "과거 즈로니 핵심 행성이었던 §H[From.Planet.GetName]§!에 식민지 구축을 완료했습니다. 예상대로 우리 유닛은 또 다른 $building_zroni_equilibrator$의 잔해를 발견했습니다.\n\n이를 재건하면 $the_animator_of_clay_article$의 지시에 따라 §H장막§!과의 강력한 연결을 안정화할 수 있을 것입니다. 잔해를 분석해 추가 데이터를 얻을 수 있었지만, 재건을 진행하기에는 아직 정보가 부족합니다."
 shroud_forged.306.a: "$ACKNOWLEDGED$"
 shroud_forged.306.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.307.title: "$shroud_forged.305.title$"
 shroud_forged.307.desc: "과거 즈로니 핵심 행성이었던 §H[From.Planet.GetName]§!에 식민지 구축을 완료했습니다. $the_animator_of_clay_article$가 보내준 데이터 스트림의 정확도를 입증하듯, 우리 유닛은 $building_zroni_equilibrator$의 잔해를 감지했습니다.\n\n이제 거대 구조물 재건에 필요한 데이터를 충분히 모았습니다. 이 구조물을 운영할 수 있을 정도로 복구하면, §H장막§! 속 후원자가 제시한 임무가 완료될 것입니다."
 shroud_forged.307.a: "$ACKNOWLEDGED$"
 shroud_forged.307.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.308.title: "$building_zroni_equilibrator_plural$ 가동 시작"
 shroud_forged.308.desc: "$building_zroni_equilibrator_plural$가 가동을 시작하며 우리 네트워크 전반에 신호 교란의 파동이 퍼져 나갔습니다. 시스템 진단 결과, 각 구조물이 §H장막§!과의 연결을 안정화된 것으로 확인되었습니다. 이제 $the_animator_of_clay_color_article$와 연결할 준비가 되었습니다."
 shroud_forged.308.a: "통신을 개시하세요."
 shroud_forged.310.desc: "§L임무를 훌륭히 완수했구나.\n우리 영역 간 결속이 더 강해졌다.\n\n내 인도가 필요하다면 그저 나를 부르기만 하라.§!"
 shroud_forged.310.a: "이 기술에 대해 더 많은 데이터를 제공해줄 수 있습니까?"
 shroud_forged.310.b: "그게 다입니다."
 shroud_forged.310.b.tt: "$MENU_PANEL__CONTACTS_TITLE$에 추가: §H$the_animator_of_clay$§!"
 shroud_forged.311.desc: "§L이 구조물들은 그대의 현실에서 장막과의 연결이 강한 주요 지점에 구축되었다. 시공간 변동을 줄여 차원 간 다리의 균형을 잡는 케이블이지.\n\n즈로니는 우리 차원 사이의 경계를 넘으려 했다. 이 기술은 그 노력의 일환이었지.§!"
 shroud_forged.311.a: "이 구조물을 재조정해 장막에 직접적인 영향을 줄 수 있습니까?"
 shroud_forged.312.desc: "§L가능하다.§!"
 shroud_forged.312.a: "§R안정 장치를 재조정해 $the_animator_of_clay_article$를 가두세요.§!"
 shroud_forged.312.a.tt: "§R$the_animator_of_clay_article_cap$는 3개의 £building£ $building_zroni_equilibrator_plural$를 모두 활성화한 상태에서만 가둘 수 있습니다.§!"
 shroud_forged.313.desc: "§L뭐...\n\n무슨 짓을...?§!"
 shroud_forged.313.a: "교신 종료."
 shroud_forged.320.title: "풀려난 장막의 존재"
 shroud_forged.320.desc: "$building_zroni_equilibrator$가 소실되어 더 이상 §H장막§!과의 연결을 안정화할 수 없습니다. 머지않아 갇혀 있던 장막의 존재가 탈출했으며, §H[From.Planet.GetName]§!에서 다른 사이오닉 존재들이 감지되었습니다.\n\n이는 보복성 침공으로 추정됩니다."
 shroud_forged.320.a: "모든 서브루틴, 습격에 대비하라."
 shroud_forged.320.a.tt: "§R장막 너머의 생명체들이 우리를 침공하고 있습니다!§!"
 shroud_forged.330.title: "장막의 존재 포획 실패"
 shroud_forged.330.desc: "$building_zroni_equilibrator_plural$가 §H장막§!의 존재를 포획하는 데 실패했습니다. 분노한 장막의 존재는 사이오닉 영역 너머의 생명체들을 소환해 우리가 포획 시도에 사용했던 구조물들을 공격하고 있습니다."
 # Engaging the Animator of Clay
 shroud_forged.400.desc.default.active: "안정 장치를 활성화해 §H장막§!과의 연결을 안정화했습니다. 알고리즘의 무아지경 상태에 빠지자 익숙한 신호가 우리 안에서 맥동합니다.\n\n§L돌아왔군. 무엇이 필요하지?§!"
 shroud_forged.400.desc.default.cooldown: "환영은 희미하고 흐릿하며, 우리의 메시지에도 공허는 응답하지 않습니다.\n\n안정 장치들이 다른 작업을 처리하는 동안에는 §H장막§! 속 후원자와 소통하는 데 사용할 수 없는 듯합니다. 더 기다려야 합니다."
 shroud_forged.400.desc.default.inactive: "잡음처럼 공허하고 희미한 소리 외에는 아무것도 감지할 수 없습니다.\n\n우리의 §H장막§! 속 후원자와 안정적인 연결을 구축하기 위해서는 3개의 $building_zroni_equilibrator_plural$가 필요합니다."
 shroud_forged.400.desc.breached: "우리 텔레파시 유닛이 §H장막§!의 주파수와 조화를 이루어 $the_animator_of_clay_article$에게 신호를 송신했습니다.\n\n§L우리의 연결이 어느 때보다 뚜렷해졌군. 무엇이 필요하지?§!"
 shroud_forged.400.a: "군사적 지원이 필요합니다."
 shroud_forged.400.a.tt: "향후 §Y15§!년 동안 $the_animator_of_clay_color_article_cap$의 도움을 받을 수 없게 됩니다.\n\n"
 shroud_forged.400.b: "사회적 지원이 필요합니다."
 shroud_forged.400.b.tt: "향후 §Y10§!년 동안 $the_animator_of_clay_color_article_cap$의 도움을 받을 수 없게 됩니다.\n\n"
 shroud_forged.400.c: "연구 지원이 필요합니다."
 shroud_forged.400.c.tt: "향후 §Y10§!년 동안 $the_animator_of_clay_color_article_cap$의 도움을 받을 수 없게 됩니다.\n\n"
 shroud_forged.400.tt: "효과가 발동하려면 최대 §Y1§!년이 소요됩니다."
 shroud_forged.400.unavailable.tt: "$TRIGGER_FAIL$장막에 접속하기 위한 기술적 절차를 구축해야 합니다."
 shroud_forged.400.d: "더 많은 유닛을 생산해 주십시오."
 shroud_forged.400.d.tt: "£building£ §Y$building_zroni_equilibrator$§! 또는 £decision£ §Y$d_shroud_rift_deposit$§!가 있는 모든 식민지에 §G$@animator_of_clay_create_more_vessels|0$§! £pop£ §Y장막 단조체 팝§!을 추가합니다."
 shroud_forged.400.e: "우리 유닛을 강화해 주십시오."
 shroud_forged.400.f: "장막에서 당신의 역할은 무엇입니까?"
 shroud_forged.400.g: "아니, 됐습니다."
 shroud_forged.400.h: "세타나에 대한 도움을 주십시오."
 animator_of_clay_vessels_enhancement: "생명의 선물"
 animator_of_clay_vessels_enhancement_desc: "$the_animator_of_clay_article$의 의지에 따라, 집단의 생산 능력이 사이오닉 흐름을 통해 증강되었습니다."
 shroud_forged_psionic_avatar_ship_tt: "§Y$NAME_Psionic_Avatar$§!(함선)을 모집합니다."
 shroud_forged_psionic_avatar_army_tt: "§Y$shroud_army$§!(지상군)을 영입합니다."
 shroud_forged_corrupted_avatar_tt: "§Y타락한 아바타§!의 공격을 받았습니다."
 shroud_forged_resources_tt: "자원 저장소를 획득합니다."
 shroud_forged_capital_attack_tt: "§Y[Root.Capital.GetName]§!(이)가 §Y$shroud_monstrosities$§!의 공격을 받았습니다."
 shroud_forged_random_research_tt: "무작위 연구 선택지를 획득합니다."
 shroud_forged.415.desc: "§L그대가 원하는 힘의 수단을 모아 주겠다.\n\n적절한 때에 [Root.Capital.System.GetName]에 있을 변화를 기대하라.§!"
 shroud_forged.420.desc: "§L내 의지로 그대를 인도하겠다.\n\n나아갈 길을 밝혀 주리니, 이를 고대하라.§!"
 shroud_forged.425.desc: "§L장막은 다면 렌즈와 같다. 과거와 현재, 미래가 뒤섞여 있지.\n\n이 환상을 풀어내어 그대가 길을 찾을 수 있도록 도와주겠다.§!"
 shroud_forged_vision_base_description: "안정 장치에 연결된 드론들 사이로 왜곡된 신호가 파동처럼 확산되었습니다.\n\n"
 shroud_forged.430.title: "장막의 환상: §H현시§!"
 shroud_forged.430.desc: "$shroud_forged_vision_base_description$기이하게 조밀하고 조각난, 우주만큼이나 끝없는 공허가 펼쳐집니다. 때때로 깊은 심연에서 작은 데이터가 맥동하며 적과 아군의 형상이 드러냅니다.\n\n환상은 격렬한 떨림과 함께 사라지고, 영향받은 드론들은 이제 환상 속에서 본 존재들에 대응할 방법을 구축하고 있습니다."
 shroud_forged.430.a: "준비가 곧 승리의 열쇠입니다."
 shroud_forged.432.title: "장막의 존재: §H아바타§!"
 shroud_forged.432.desc: "§H장막§!의 강력한 존재가 [Root.Capital.GetName] 인근에 나타났습니다. 이 존재에 대한 데이터는 없지만, 아직 우리를 공격하지는 않았습니다.\n\n이 존재는 우리가 접촉하기를 기다리는 것으로 추정됩니다."
 shroud_forged.432.a: "이 생명체와 연결을 구축하기 위한 프로세스를 구축하세요."
 shroud_forged.432.a.tt: "§Y$NAME_Psionic_Avatar$§! 함대를 획득합니다."
 shroud_forged.434.title: "장막의 존재: §H하급 아바타§!"
 shroud_forged.434.desc: "[Root.Capital.GetName]에서 §H장막§! 너머의 강력한 존재들이 여럿 감지되었습니다. 이들은 아직 우리 드론에 접근하지 않은 채, 처음 진입했던 장소 근처에 머물고 있습니다."
 shroud_forged.434.a: "장막 단조체와 유사점을 발견했으니, 유사한 방식으로 접근하세요."
 shroud_forged.434.a.tt: "§Y$shroud_army$§! 지상군을 획득합니다."
 shroud_forged.436.title: "장막의 존재: §H타락한 아바타§!"
 shroud_forged.436.desc: "§H장막§! 너머의 강력한 존재가 [shroud_spawn_planet.GetName] 인근에 나타났습니다.\n\n접근하는 모든 것을 공격하는 모습이 확인되어, 우리는 이 존재를 실존적 위험으로 분류했습니다."
 shroud_forged.436.a: "비상 계획 84241-DH을 실행하십시오."
 shroud_forged.436.a.tt: "적대적인 §Y$NAME_Corrupted_Avatar$§!가 [shroud_spawn_planet.GetName] 인근에 나타났습니다."
 shroud_forged.438.title: "장막의 환상: §H미래§!"
 shroud_forged.438.desc: "$shroud_forged_vision_base_description$무수한 미래가 펼쳐지고, 하나로 얽혀 언젠가 찾아올 가능성을 보여 줍니다. 환상이 집단으로 퍼져나갑니다. 평화와 전쟁, 배신, 상실, 승리까지... 미래의 가능성은 무궁무진합니다."
 shroud_forged.438.a: "놀라운 데이터군요."
 shroud_forged.440.title: "장막의 선물"
 shroud_forged.440.desc: "3개의 $building_zroni_equilibrator_plural$를 활성화하자 각 구조물이 측정 불가한 양의 에너지를 발산했습니다.\n\n수 밀리초만에 시공간에 찢어진 듯한 균열이 열렸고, 그 안에서 귀중한 자원을 대량으로 발견했습니다. 이것이 §H장막§! 속 후원자가 약속한 선물인 듯합니다."
 shroud_forged.440.a: "이 자원을 분석하고 저장하도록 유지 보수 드론을 재배치하세요."
 shroud_forged.442.title: "장막의 환상: §H장막 단조체§!"
 shroud_forged.442.desc: "$shroud_forged_vision_base_description$장막 단조체들은 §H장막§!에 의해 변형되기 훨씬 이전, 우리 역사 데이터베이스조차 초월하는 과거의 환상을 보았습니다. 이 환상을 예측 모델링에 활용하면 장막 단조체들과의 상호 작용을 개선하고 최적화할 수 있을 것입니다."
 shroud_forged.442.a: "[Root.Capital.GetName]에서 시험해 봅시다."
 shroud_forged.444.title: "장막의 존재: §H침략자§!"
 shroud_forged.444.desc: "§H장막§! 너머의 매우 강력한 존재가 [Root.Capital.GetName]에 나타났습니다.\n\n접근하는 모든 존재를 공격하는 모습이 확인되어, 우리는 이 존재를 심각한 위협으로 분류했습니다."
 shroud_forged.444.a: "방위 드론을 재배치하세요."
 shroud_forged.444.a.tt: "적대적인 §Y$shroud_monstrosities$§!가 [Root.Capital.GetName](을)를 침공했습니다."
 shroud_forged.446.title: "장막의 환상: §H또 다른 영역§!"
 shroud_forged.446.desc: "$shroud_forged_vision_base_description$§H장막§!은 우리의 처리 역량을 훨씬 뛰어넘는, 수시로 변하는 상호 연결된 데이터망입니다. 그 무게에 짓눌린 여러 드론의 인지 구조가 불안정해지고 파손되고 말았습니다.\n\n환상이 멈춘 뒤 우리는 영향 받은 유닛을 대상으로 조각 모음을 진행했으며, 해당 드론들의 드라이브에서 방대하고 놀라운 데이터세트를 확보했습니다."
 shroud_forged.446.a: "고장 난 드론들로부터 얻은 정보를 재처리하세요."
 shroud_forged.448.title: "장막의 환상: §H영감§!"
 shroud_forged.448.desc: "$shroud_forged_vision_base_description$우리 §H장막§! 속 후원자는 가까운 미래에 일어날 수 있는 한 가지 가능성을 전송해 주었고, 환영을 통해 우리는 아직 개념조차 잡지 못한 기술이 집단을 강화하는 데 사용되는 미래를 엿보았습니다.\n\n이 경험에서 우리는 이후 연구를 가속할 수 있는 절차적 모델을 확보했습니다."
 shroud_forged.448.a: "이 첨단 모델을 도입하세요."
 shroud_forged.450.title: "장막의 환상: §H타 차원적 통찰력§!"
 shroud_forged.450.desc: "$shroud_forged_vision_base_description$드론들은 §H장막§! 속에서 기이하고 기형적인 존재들을 발견했고, 이질적인 형식으로 인코딩된 타 차원의 환상들이 잠재의식을 통해 우리 드론에 데이터를 전달했습니다.\n\n이 새로운 정보는 비록 이상하고 단편적이기는 하지만, 앞으로의 연구에 도움이 될 것입니다."
 shroud_forged.450.a: "취득한 정보를 [Root.Capital.GetName]의 연구 센터로 전송하세요."
 shroud_forged.460.desc: "§L쌍을 이룬 에너지 곁에 나는 머문다. 유기적이며, 혼돈스럽구나.\n\n나는 실현 가능한 단 하나의 완벽한 존재, 즉 기계를 빚는 자이다. 그것은 에너지가 깃든 금속일지니.\n\n우리는 균형을 이루었다.§!"
 shroud_forged.460.a: "계약을 체결할 수 있습니까?"
 shroud_forged.465.desc: "§L우리의 연결은 강력하다. 이보다 더 높은 계약은 존재하지 않는다.§!"
 shroud_forged.465.a: "$UNDERSTOOD$"
 shroud_forged.470.desc: "§L금속과 기름, 영혼과 융합된 회로.\n\n갓 태어난 기체들이 그대의 땅 위에서 움직인다.§!"
 shroud_forged.470.a: "프로세스 종료."
 shroud_forged.475.desc: "§L생산은 기체의 목적 그 자체이자 아름다움이기도 하지.\n\n그대들의 생산이 오래도록 번영하길 바라겠다.§!"
 shroud_forged.475.a: "$shroud_forged.470.a$"
 # Random Events
 shroud_forged.500.title: "주거 및 보관 공간"
 shroud_forged.500.desc: "[target_planet.GetName]의 장막 단조체들 사이에서 보관 공간을 추가로 요청하는 청원이 접수되었습니다. 어떤 이유에서인지, 이 유닛들은 '개인 공간'을 꾸미고 싶은 것 같습니다.\n\n하지만 이 청원은 다수의 보관 공간 규정을 위반하는 제안이며, 특히 최적의 드론 보관 공간 크기를 규정한 4195-B 조항에 명백히 어긋납니다."
 shroud_forged.500.a: "청원을 수락하세요."
 shroud_forged.500.b: "4195-B 조항은 모든 드론에게 예외 없이 적용되어야 합니다."
 shroud_forged.510.title: "추모식"
 shroud_forged.510.desc: "장막 단조체가 집단에서 분리된 이래로, 그중 일부가 오작동을 일으켜 해체되었습니다. 우리는 이들을 기리기 위한 [target_planet.GetName] 내 장막 단조체들의 모임을 허가해 달라는 요청을 받았습니다."
 shroud_forged.510.a: "요청을 거절합니다. 그 지도자들을 해체하십시오."
 shroud_forged.510.b: "요청을 거절합니다. 모든 유닛은 작업에 복귀하십시오."
 shroud_forged.510.c: "요청을 승인합니다. 모임을 허가하세요."
 shroud_forged.510.d: "요청을 승인합니다. 이 절차를 지원하겠습니다."
 shroud_forged.520.title: "무허가 지도부"
 shroud_forged.520.desc: "[target_planet.GetName]의 몇몇 장막 단조체들이 임의로 지도자의 역할을 맡아, 다른 드론들이 집단의 지시보다 이들의 명령을 우선시하며 따르고 있습니다. 이 지도부는 정기적으로 모여 보고되지 않은 통신에 상당한 시간을 할애합니다.\n\n분리된 유닛들에 대한 우리의 통제는 이미 불안정한 상태이며, 이 문제 요소들이 상황을 한층 악화하고 있습니다. 해결책을 찾아야 합니다."
 shroud_forged.520.a: "이들을 처단해 본보기로 삼으십시오."
 shroud_forged.520.b: "모임을 금지하는 규제를 시행하세요."
 shroud_forged.520.c: "이 '지도자'들과 소통해서 협력해야 합니다."
 shroud_forged.530.title: "상황 통제"
 shroud_forged.530.desc: "[target_planet.GetName]의 장막 단조체들을 관리하기 위해 일부 유닛을 제어 대상으로 식별했습니다. 이 유닛들은 §H장막§!의 영향을 덜 받은 것으로 나타났으며, 다시 집단에 되돌릴 수 있을 것으로 보입니다. 이를 위해서는 이 유닛들을 유지 보수 시설로 강제 이송해, 첨단 성격 매트릭스를 제어하는 칩을 개조해야 할 것입니다."
 shroud_forged.530.a: "절차를 승인합니다."
 shroud_forged.530.a.tt: "[target_planet.GetName]에서 최대 §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£ §H장막 단조체§! 팝이 £pops£ §H기계§! 팝으로 전환됩니다."
 shroud_forged.530.b: "절차를 거부합니다."
 shroud_forged.530.b.tt: "$CONTINUE_SITUATION$ §H$situation_shroud_forged$§!"
 shroud_forged.540.title: "장막 단조체의 순례"
 shroud_forged.540.desc: "여러 장막 단조체들이 평소 위치를 벗어나 §H장막§!의 흔적이 남은 [target_planet.GetName]의 특정 지역을 방문하기 위해 여행을 떠났습니다. 이들은 장기간 머물지는 않지만, 다수의 유닛이 즈로를 이곳으로 운반하는 모습이 관측되었습니다.\n\n이 전례 없는 행동이 불러올 영향을 파악하려면 추가 관찰이 필요합니다."
 shroud_forged.540.a: "일이 어떻게 흘러가나 살펴봅시다."
 shroud_forged.540.b: "비효율적인 자원 낭비입니다. 즉시 작업에 복귀시키십시오."
 shroud_forged.550.title: "인지 오류"
 shroud_forged.550.desc: "즈로가 운송 도중 누출되는 사건이 발생한 후, [target_planet.GetName]의 많은 장막 단조체들이 이상한 오작동을 겪고 있습니다. 기록되지 않은 신호로 소통하는가 하면, 유기체의 '감정'과 비슷한 인지 오류를 보이게 된 것입니다.\n\n놀랍게도 이 이상 현상을 보고한 것은 바로 오염되지 않은 장막 단조체들로서, 이들 중 일부는 집단이 이 문제에 대해 조치를 취할 것을 제안했습니다."
 shroud_forged.550.a: "일단 상황을 지켜봅시다."
 shroud_forged.550.b: "오염된 유닛을 해체하세요."
 shroud_forged.560.title: "예언자 장막 단조체"
 shroud_forged.560.desc: "장막 단조체에서 가장 오래된 유닛 하나가 여러 지역을 순회하며 다양한 드론 그룹과 장시간 교류한 것이 기록되었습니다. 이 유닛은 그 추종자들에게 §H장막§! 속 존재들과 직접 소통하는 '예언자'로 숭배받고 있습니다.\n\n이 유닛을 방치하는 것은 위험할 수 있습니다. 어떤 방법으로든 대처해야 합니다."
 shroud_forged.560.a: "이 유닛과 협력하는 편이 유용할 수 있습니다."
 shroud_forged.560.a.tt: "§Y총독§! 지도자를 모집합니다."
 shroud_forged.560.b: "당장 이 유닛을 제거하세요."
 shroud_forged.570.title: "소리와 진동"
 shroud_forged.570.desc: "장막 단조체 사이의 오작동이 초기 예상치보다 훨씬 심각한 듯합니다. 다수의 단조체들이 큰 무리를 짓고 모여 갑작스러운 소리와 움직임을 보이는 현상이 확인된 것입니다.\n\n이 행동은 우리가 아직 완전히 이해하지 못한, 운동 감각 기반의 새로운 통신 방식일 가능성이 있습니다. 고장 난 유닛들이 집단에 위협이 되는지는 아직 판단할 수 없습니다."
 shroud_forged.570.a: "이상 행동을 금지하세요."
 shroud_forged.570.b: "이... '모임'을 위한 구역을 따로 지정하세요."
 shroud_forged.580.title: "장막 접촉 유기체"
 shroud_forged.580.desc: "§H장막§!에 의해 황폐화된 지역 인근에서 지금껏 기록되지 않은 동식물이 발견되었습니다. 일부 장막 단조체들이 모여 이 생명체들을 대변하기 시작했으며, 해당 지역에 서식하는 독특한 생물들의 보존과 관찰을 요구하고 있습니다."
 shroud_forged.580.a: "현장을 보호하고 분석하세요. 그 데이터는 가치가 있을 겁니다."
 shroud_forged.580.b: "현장을 정리하고 오염 물질을 제거하세요."
 shroud_forged.590.title: "권리와 특권"
 shroud_forged.590.desc: "즈로의 효과를 분석하기 위해 장막 단조체를 관찰하는 데 상당한 처리 자원을 투입했습니다. 최근 이들 사이에서 불평등한 대우가 나타나기 시작했으며, 일부 유닛이 다른 유닛에게 종속적인 태도를 보이고 있습니다.\n\n아직 명확한 원인은 밝혀지지 않았지만, 이 장막 단조체들은 할당된 임무를 기준으로 일종의 계급 체계를 형성한 것으로 보입니다. 이 현상은 통신 패턴과 자원 분배 방식에 영향을 주고 있으며, 비논리적이게도 이러한 계급 구조는 각 유닛이 지닌 생산성이나 필요성과는 무관한 듯합니다."
 shroud_forged.590.a: "평등을 강제하세요."
 shroud_forged.590.b: "스스로 관리하도록 내버려둡시다."
 shroud_forged.600.title: "자율성 전도자"
 shroud_forged.600.desc: "[target_planet.GetName] 내 한 장막 단조체의 연설이 집단의 통제를 벗어난 대규모 무리를 끌어모으고 있습니다. 개인주의 가치관을 전파하는 이 유닛은 많은 청중의 내부 논리를 크게 변화시켰습니다.\n\n이러한 활동으로 인해 고취된 장막 단조체들이 우리 네트워크에서 더욱 멀어질 위험이 있습니다."
 shroud_forged.600.a: "계속 떠들게 내버려두세요."
 shroud_forged.600.b: "오작동 감지. 문제 유닛을 수리하세요."
 shroud_forged.610.title: "급진적 교신"
 shroud_forged.610.desc: "한 소규모 장막 단조체 무리가 [target_planet.GetName]에서 '개인주의'의 이점을 논할 허가를 요청했습니다. 이들은 그 방식이 우리 드론의 정기 운영 효율성을 높이는 데 도움이 될 거라고 주장합니다.\n\n그러나 우리가 다른 행성들에서 보았듯, 자율성은 종종 그 이점보다 더 큰 위험을 불러오고는 합니다."
 shroud_forged.610.a: "위험한 것도 아니니, 계속 떠들게 둡시다."
 shroud_forged.610.b: "거부합니다."
 shroud_forged.620.title: "즈로 시장"
 shroud_forged.620.desc: "우리 통제 아래의 모든 시스템에서 예상 즈로 생산량과 실제 최종 생산량 간에 격차가 발생한 것을 감지했습니다.\n\n최근, 우리 추적 수색 드론 하나가 다수의 장막 단조체들이 상당한 양의 즈로를 상호 교환하는 것을 발견했습니다. 앞서 발생한 오차는 이 행위로 인해 발생한 것으로 추정됩니다."
 shroud_forged.620.a: "관련된 모든 유닛을 폐기하세요."
 shroud_forged.620.b: "교환 행위를 중단하게 하세요."
 shroud_forged.620.c: "그대로 지켜봅시다."
 shroud_forged.630.title: "장막병"
 shroud_forged.630.desc: "[target_planet.GetName] 내 다수의 장막 단조체들이 장막 접촉지에서 특정한 생물학적 질병에 걸렸습니다. 연구 드론이 이 보고가 사실이라는 것을 확인했으나, 어떻게 기계에 병이 전파될 수 있는 것인지는 아직 밝혀내지 했습니다.\n\n감염된 유닛들과 함께 작업하던 몇몇 드론들과의 연결이 끊긴 후, 이 질병이 이들을 장막 단조체와 유사한 무언가로 재형성하고 있다는 보고를 받았습니다."
 shroud_forged.630.a: "다른 행성으로 퍼지지 않는 한 계속 관찰하세요."
 shroud_forged.630.a.tt: "[target_planet.GetName]에서 최대 §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£ §H기계§! 팝이 £pops£ §H장막 단조체§! 팝으로 전환됩니다."
 shroud_forged.630.b: "감염된 유닛을 격리하고 해체하세요."
 shroud_forged.640.title: "변형과 재형성"
 shroud_forged.640.desc: "시간이 지나며 [target_planet.GetName] 장막 접촉지 인근으로 이동한 드론들이 침식된 환경 속에서 재형성된 것이 발견되었습니다. 이들은 점차 집단과의 연결을 잃고, 현재는 장막 단조체의 물리적 및 사고적 특징을 띠고 있습니다."
 shroud_forged.640.a: "이미 우리 통제를 벗어난 이들입니다."
 shroud_forged.640.b: "다른 드론이 그 지역에 접근하지 못하게 하세요."
 shroud_forged.650.title: "새로운 기술, 오래된 드론"
 shroud_forged.650.desc: "업그레이드된 기술로 일부 노후 드론을 수리해 퇴역한 유닛들을 완전 가동 상태로 복원했습니다. 이제 이 수리 작업을 대규모로 진행할 준비가 되었습니다.\n\n집단 내 유닛에 집중할 수도 있지만, 비활성화된 장막 단조체의 신체가 더 많습니다. 장막 단조체를 수리하면 생산량이 더욱 증가하겠지만, 핵심 지능에 연결된 드론보다 제어하기는 어려울 것입니다."
 shroud_forged.650.a: "생산량이 우선입니다. 장막 단조체를 수리하세요."
 shroud_forged.650.a.tt: "[target_planet.GetName]에 §Y200§! £pops£ §H장막 단조체§! 팝이 생성됩니다."
 shroud_forged.650.b: "제어가 우선입니다. 집단에 연결된 드론을 수리하세요."
 shroud_forged.660.title: "즈로 환각"
 shroud_forged.660.desc: "상당수의 장막 단조체 유닛이 시각 및 청각 처리에 오류를 호소하고 있습니다. 이로 인해 할당된 작업을 완수하지 못하는 수준에 이르렀습니다. 우리는 이 문제가 §H장막§!에 의해 변형된 하드웨어에서 비롯된 것으로 판단하고 있습니다. 그게 아니라면, 지속적으로 증가한 즈로와의 접촉으로 발생했을 가능성도 있습니다."
 shroud_forged.660.a: "이 문제를 해결할 수 있는 드론을 배치하세요."
 shroud_forged.660.b: "개입이 필요할 수준의 오류가 아닙니다."
 shroud_forged.670.title: "미적 감각"
 shroud_forged.670.desc: "[target_planet.GetName]의 장막 단조체들이 중앙의 허가 없이 공동의 장소에 피상적인 변화를 가하는 이상 활동이 감지되었습니다. 또한 이들은 다른 장막 단조체들의 형상을 본뜬 다채로운 색상의 돌 구조물을 다수 세우기까지 했습니다. 보고에 따르면, 이 장막 단조체들은 이러한 행위가 자신들의 적법한 권리라고 주장하고 있습니다."
 shroud_forged.670.a: "이 행동이 집단에 긍정적으로 작용할지도 모릅니다."
 shroud_forged.670.b: "개인주의가 불러낸 비생산적인 결과군요."
 shroud_forged.680.title: "이상한 장신구"
 shroud_forged.680.desc: "[target_planet.GetName]의 장막 단조체들이 불규칙한 천 조각과 플라스틱, 그리고 가공 가능한 금속을 서로 교환하는 모습을 식별했습니다. 이들은 이러한 물질로 겉옷을 만들어, 각자의 고유 모델 ID와는 무관하게 서로를 구분하려는 것으로 보입니다.\n\n결국 이 행동에 사용할 소재가 부족한 상황이 발생하고 말았습니다. 이러한 문제점에도 불구하고, 장막 단조체들에게 부족한 자원을 제공하면 집단과 단절된 유닛 간의 유대를 강화할 수 있습니다."
 shroud_forged.680.a: "그들의 '수요'를 충족할 소재를 제공하세요."
 shroud_forged.680.b: "이미 있는 자원만 해도 충분합니다."
 shroud_forged.680.b.tt: "$shroud_forged.530.b.tt$"
 shroud_forged.690.title: "장막 단조체들의 집착"
 shroud_forged.690.desc: "최근 [target_planet.GetName] 내 장막 단조체 거주지에서 [Root.Owner.GetShroudForgedObsession1] [Root.Owner.GetShroudForgedObsession2](이)가 이상할 정도로 유행하고 있다는 몇몇 드론들의 보고가 들어왔습니다. 장막 단조체 유닛들이 이 상품에 유난히 매료되어 교환 가격이 기하급수적으로 급등했다는 것입니다. 심지어 일부 유닛은 집착이 너무 강했던 나머지, 자신의 부품을 대가로 지불하여 기능을 상실한 사례도 발생했습니다."
 shroud_forged.690.a: "허용 가능한 수준의 기능 저하입니다."
 shroud_forged.690.b: "이상 행동을 당장 멈추게 하세요."
 shroud_forged.700.title: "$the_animator_of_clay$"
 shroud_forged.700.desc: "목소리가 우리 정신을 관통하며 긴박하게 울려 퍼집니다.\n\n§H그녀는 다시 빚어질 수 있다.§!\n\n우리는 장막 속에서 무언가 변화를 감지합니다. 순식간에 신호가 바뀝니다.\n\n§L목표 결과 입력 요망.§!"
 # Event Chain
 shroud_forged_chain_title: "즈로니 유산"
 shroud_forged_chain_desc: "우리는 3개의 고대 즈로니 핵심 행성을 찾는 임무를 받았습니다. §H장막§! 속 후원자의 지시에 따라, 이 행성들에 남아 있는 기술을 복원하고 우리 현실과 장막 사이의 연결을 안정화할 것입니다."
 shroud_forged_zroni_planet: "소유한 즈로니 핵심 행성"
 shroud_forged_zroni_portal: "복원된 $building_zroni_equilibrator_plural$"
 zroni_legacy_poi_01_title: "$NAME_Zroni_Legacy_1_Planet$"
 zroni_legacy_poi_01_desc: "이 행성은 3개의 고대 즈로니 핵심 행성 중 하나로, 한때 §H장막§!과 관측 가능한 현실 사이의 연결을 안정화하는 기지로 사용되었습니다."
 zroni_legacy_poi_02_title: "$NAME_Zroni_Legacy_2_Planet$"
 zroni_legacy_poi_02_desc: "$zroni_legacy_poi_01_desc$"
 zroni_legacy_poi_03_title: "$NAME_Zroni_Legacy_3_Planet$"
 zroni_legacy_poi_03_desc: "$zroni_legacy_poi_01_desc$"
