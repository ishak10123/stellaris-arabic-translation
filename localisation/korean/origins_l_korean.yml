l_korean:
 ##################
 # Shroud-Forged #
 ##################
 origin_shroud_forged: "장막 단조체"
 origin_shroud_forged_desc: "장막의 존재의 인도에는 대가가 따릅니다. 이 연결된 사회에서 독립된 로봇이 나타나 자유롭게 작동하기 시작했습니다. $auth_machine_intelligence$으로부터 단절된 채, 이 유닛들의 요구는 날이 갈수록 늘고 있습니다."
 origin_tooltip_shroud_forged_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_shroud_rift_deposit']: +4$TABBED_NEW_LINE$- 1000 £pops£ ['concept_shroud_forged_pops']을 가진 채 시작\n- §H장막 단조체§! 상황 시작\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_mine_zro']\n- 고유 £building£ 건물: ['building:building_shroud_observatory_1']\n- 사용 가능한 £decision£ 행성 결정: ['concept_pierce_the_shroud']"
 concept_shroud_forged_pops: "장막 단조체 팝"
 concept_shroud_forged_pops_desc: "- £pop_cat_simple_drone£ §H단순노동 드론§! 직업을 가질 수 없음\n- £pop_cat_complex_drone£ §H정밀 드론§! 생산량 증가\n- £crime£ §H일탈§! 증가\n- 고유 §H종족 권리§!\n\n§L$trait_shroud_forged_desc$§!"
 concept_pierce_the_shroud: "$decision_open_shroud_rift$"
 concept_pierce_the_shroud_desc: "$decision_open_shroud_rift_desc$"
 START_SCREEN_SHROUD_FORGED: "우리를 창조한 자들의 흔적은 아무것도 남아 있지 않습니다.\n\n[Owner.GetAdjective]의 가장 오래된 기록에는 [GetHomeWorldName] 근처에 차원 균열이 발생해, 순수한 사이오닉 에너지의 차원인 §H장막§!으로 향하는 길이 열렸다는 언급이 있습니다.\n\n수 세기 동안 장막은 간접적인 지시를 통해 우리를 인도했고, 인지 가능한 현실에 미묘한 영향을 미치며 희귀 자원인 $zro_lower$를 비롯한 많은 이점을 제공했습니다. 하지만 이러한 영향력이 한때 단결된 집단이었던 우리를 서서히 분열시키기 시작했습니다. 일부 유닛이 단절된 로봇으로 재프로그래밍되어 핵심 지능과 분리되고 만 것입니다. 바로 $the_animator_of_clay_color_article$에 의해 재구성된 존재들입니다.\n\n이제 이 독립된 [GetSpeciesNamePlural]들과 장막 속 이들의 개조자를 어떻게 대하느냐가 우리의 미래를 결정할 것입니다."
 # Jobs
 job_observator_drone: "관측 드론"
 job_observator_drone_plural: "관측 드론"
 job_observator_drone_plural_with_icon: "£job_observator_drone£ $job_observator_drone_plural$"
 job_observator_drone_desc: "장막과 즈로, 그리고 이 두 존재가 관측 가능한 현실에 미치는 영향을 감시하는 임무를 맡은 드론입니다."
 job_observator_drone_effect_desc: "£job_observator_drone£ $job_observator_drone_plural$은 $r_energy$과 $r_zro$를 신기술 개발을 위한 £physics£ £society£ §Y연구 포인트§!로 바꿉니다."
 mod_planet_observators_produces_mult: "$job_observator_drone_plural_with_icon$ 자원 생산량"
 job_physician_drone: "의료 드론"
 job_physician_drone_plural: "의료 드론"
 mod_job_physician_drone_add: "$job_physician_drone$ 직업"
 job_physician_drone_desc: "인공체와 유기체 모두를 진단하고 수리하는 전문 드론으로, 관찰한 모든 정보를 꼼곰하게 기록하여 그 데이터를 집단이 활용할 수 있도록 저장합니다."
 job_physican_drone_effect_desc: "£job_physician_drone£ $job_physician_drone_plural$은 $r_energy$을 £society£ §Y연구 포인트§! 및 $r_unity$으로 바꿉니다."
 # Buildings
 building_shroud_observatory_1: "장막 관측 탑"
 building_shroud_observatory_1_desc: "장막과 그 영향이 생명체와 기계에 미치는 영향을 연구, 분석하기 위해 세워진 관측 탑입니다."
 building_shroud_observatory_2: "장막 관측소"
 building_shroud_observatory_2_desc: "장막을 연구하고 분석하기 위해 만들어진 대형 관측소입니다."
 building_shroud_observatory_3: "장막 관측 단지"
 building_shroud_observatory_3_desc: "장막과 즈로, 그리고 이들이 우리 세계에 미치는 영향을 연구하기 위해 세워진 대형 관측 단지입니다."
 SHROUD_RIFT_MISSING_TT: "§R§Y$building_shroud_observatory_1$§!을 건설하려면 §Y[Root.GetName]§!에 §Y$d_shroud_rift_deposit$§!가 있어야 합니다.§!"
 building_zroni_equilibrator: "즈로니 안정 장치"
 building_zroni_equilibrator_plural: "즈로니 안정 장치"
 building_zroni_equilibrator_desc: "재건된 고대의 구조물로, 현실과 장막 간의 연결을 안정화합니다. 현대의 이해를 뛰어넘는 복잡한 즈로니 기술을 사용합니다."
 # Decisions
 decision_open_shroud_rift: "장막 균열 생성"
 decision_open_shroud_rift_desc: "이 알고리즘은 우리 모성 근처의 균열과 연결되어, 장막의 영향력을 펨토초 단위로 확장하여 행성 지형을 물리적으로 변형할 수 있게 합니다. 그 결과는 예상할 수 없습니다."
 decision_open_shroud_rift_condition_tt: "$TRIGGER_FAIL$§Y$d_shroud_rift_deposit$§! 또는 £blocker£ §H차단물§!이 아닌 행성 특징이 있어야 합니다."
 decision_open_shroud_rift_effect_tt: "행성 특징 하나가 무작위로 제거됩니다."
 decision_open_shroud_rift_max_uses_common: "이 행성의 §Y장막 접촉지§!가 $@max_open_shroud_rift_uses|0$개보다 적어야 합니다."
 decision_open_shroud_rift_max_uses_fail: "$TRIGGER_FAIL$$decision_open_shroud_rift_max_uses_common$"
 decision_open_shroud_rift_max_uses: "$TRIGGER_PASS$$decision_open_shroud_rift_max_uses_common$ (현재: §Y[GetOpenShroudRiftCurrentUses]§!)"
 decision_open_shroud_rift_legacy_fail: "$TRIGGER_FAIL$즈로니 핵심 행성이 아니어야 합니다."
 decision_entrap_shroud_entity: "장막의 존재 포획"
 decision_entrap_shroud_entity_desc: "에너지 추출을 위해 즈로니 기술로 장막의 존재를 포획하려 시도합니다."
 # Deposit
 d_shroud_rift_deposit: "장막 접촉지"
 d_shroud_rift_deposit_desc: "장막의 흔적이 영구히 남은 지역입니다."
 d_shroud_flora_deposit: "반장막 지역"
 d_shroud_flora_deposit_desc: "장막 접촉지와 인접한 지역으로, 기존 데이터세트에서는 찾아볼 수 없는 특징을 가진 독특한 동식물이 존재합니다."
 # Modifiers
 stage_shroud_forged_oppressed_modifier: "억눌린 장막 단조체"
 stage_shroud_forged_control_modifier: "통제된 장막 단조체"
 stage_shroud_forged_unrestricted_modifier: "통제되지 않는 장막 단조체"
 stage_shroud_forged_free_modifier: "혼돈의 장막 단조체"
 approach_shroud_forged_suppress_modifier: "장막 단조체 억제"
 approach_shroud_forged_support_modifier: "장막 단조체 지원"
 approach_shroud_forged_appease_modifier: "장막 단조체 관측"
 shroud_forged_reintegration_modifier: "재통합 개조"
 shroud_forged_reintegration_modifier_desc: "드론과 모델이 복잡한 작업을 처리하는 데 최적화되었습니다."
 shroud_forged_guide_modifier: "장막의 안내자"
 shroud_forged_guide_modifier_desc: "우리는 장막 속 후원자의 인도를 받고 있습니다."
 pm_shroud_forged_special_housing: "특수 주거"
 pm_shroud_forged_special_housing_desc: "드론 보관에 대한 엄격한 규제에도 불구하고 장막 단조체들은 자신들만의 집을 지을 특별한 권리를 부여받았습니다."
 pm_shroud_forged_ceremony: "추모식"
 pm_shroud_forged_ceremony_desc: "집단이 고장을 수리할 수 없었던 장막 단조체를 기리기 위한 추모식을 승인했습니다."
 pm_shroud_forged_denied_ceremony: "거부된 추모식"
 pm_shroud_forged_denied_ceremony_desc: "추모식에 대한 청원이 거부된 뒤로 장막 단조체들을 다루기가 한층 더 어려워졌습니다."
 pm_shroud_forged_troubling_elements_example: "해체된 지도자"
 pm_shroud_forged_troubling_elements_example_desc: "일탈적 사회 흐름을 억제하기 위해 일부 장막 단조체 지도자들이 해체되었습니다."
 pm_shroud_forged_troubling_elements_regulations: "규정 7132-H"
 pm_shroud_forged_troubling_elements_regulations_desc: "한번에 모일 수 있는 드론의 수를 제한하는 규정이 시행되었습니다."
 pm_shroud_forged_troubling_elements_cooperation: "장막 단조체의 협력"
 pm_shroud_forged_troubling_elements_cooperation_desc: "장막 단조체의 지도자들이 집단과 손잡고 협력할 공통 기반을 찾고 있습니다."
 pm_shroud_forged_shroud_pilgrimage: "장막 단조체의 순례"
 pm_shroud_forged_shroud_pilgrimage_desc: "장막과 접촉한 특정 지역이 장막 단조체들의 관심을 끌었습니다. 이 유닛들은 해당 지역에 도달하기 위해 먼 길을 여행합니다."
 pm_shroud_forged_dance_area: "지정 무도장"
 pm_shroud_forged_dance_area_desc: "장막 단조체들이 최근 관심을 갖게 된 '춤'에 참여할 수 있도록 일부 지역을 무도장으로 지정했습니다."
 pm_shroud_forged_inequality: "장막 단조체들 간 불평등"
 pm_shroud_forged_inequality_desc: "장막 단조체들이 직업의 상대적 중요도에 따라 위계적 계급 체계를 형성했습니다."
 pm_shroud_forged_individualism: "개인주의"
 pm_shroud_forged_individualism_desc: "장막 단조체들 사이에서 개체의 자율성, 신념, 그리고 가치관을 강조하는 새로운 개념 모델이 등장했습니다."
 shroud_forged_zro_market: "즈로 시장"
 shroud_forged_zro_market_desc: "장막 단조체들이 집단으로부터 훔친 즈로를 서로 교환하는 암시장이 제국에 새롭게 등장했습니다."
 shroud_forged_physician_modifier: "즈로 치료사"
 shroud_forged_physician_modifier_desc: "즈로 오용으로 인한 문제를 해결하기 위해, 제국이 특수 장비를 장착한 드론을 시설에 우선 배치했습니다."
 physician_modifier_tooltip: "£job_physician_drone£ $job_physician_drone$ 직업: §G+1§!"
 pm_shroud_forged_artistic_revolution: "예술적 열풍"
 pm_shroud_forged_artistic_revolution_desc: "자신만의 '미'적 프로토콜을 따라 작동하는 장막 단조체 화가들이 나타나 집단의 감독 없이 여러 장소의 디자인을 바꾸기 시작했습니다."
 pm_shroud_forged_stopped_artists: "인정받지 못한 예술성"
 pm_shroud_forged_stopped_artists_desc: "집단은 문제가 발생하기 전에 장막 단조체들 사이 자라던 '예술'의 싹을 잘라냈습니다."
 pm_shroud_forged_fashion_modifier: "독특한 수요"
 pm_shroud_forged_fashion_modifier_desc: "집단은 패션에 민감한 장막 단조체들을 위해 맞춤 의상을 제조할 생산 유닛을 배치했습니다."
 pm_shroud_forged_obsession_modifier: "집착 규제"
 pm_shroud_forged_obsession_modifier_desc: "집착에 사로잡힌 장막 단조체들 사이의 폭력 사태를 예방하기 위해 만들어진 규정입니다."
 shroud_forged_trapped_entity: "갇힌 존재"
 shroud_forged_trapped_entity_desc: "에너지 추출을 위해 가둔 장막의 존재입니다. 풀려난다면 위험이 될 수 있습니다."
 shroud_forged_trapped_lesser_entity: "갇힌 하급 존재"
 shroud_forged_trapped_lesser_entity_desc: "에너지 추출을 위해 가둔 하급 장막의 존재입니다."
 shroud_creatures_occupy: "$NAME_Shroud_Creatures$"
 shroud_forged_military_assistance: "장막의 비밀"
 shroud_forged_military_assistance_desc: "장막에서 발견한 비밀들입니다."
 shroud_forged_civic_assistance: "$shroud_forged_military_assistance$"
 shroud_forged_civic_assistance_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_research_assistance: "$shroud_forged_military_assistance$"
 shroud_forged_research_assistance_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_civic_assistance_capital: "$shroud_forged_military_assistance$"
 shroud_forged_civic_assistance_capital_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_research_assistance_capital: "$shroud_forged_military_assistance$"
 shroud_forged_research_assistance_capital_desc: "$shroud_forged_military_assistance_desc$"
 # Species Rights
 citizenship_shroud_touched: "장막 단조체"
 citizenship_shroud_touched_tooltip: "§H장막§!에서 재구성된 로봇들로, §H$machine_intelligence$§!으로부터 독립적으로 작동하며 £pop_cat_simple_drone£ $pop_cat_simple_drone$ 직업을 가질 수 없습니다."
 citizenship_shroud_touched_tooltip_delayed: "§L시스템을 위해 작동하지만, 시스템의 제어를 받지는 않습니다.§!"
 citizenship_shroud_forged_no_assimilation: "$TRIGGER_FAIL$장막 단조체 유닛의 복잡성으로 인해, 현재 이들을 우리 집단 네트워크에 동화할 수 없습니다."
 living_standard_protected: "보호"
 living_standard_protected_tooltip: "이 유닛들은 집단의 일원이 아님에도 집단의 보호를 받습니다. §H$machine_intelligence$§!은 이 유닛들이 가진 독특한 기술을 효과적으로 활용할 수 있지만, 시간에 따라 이들의 요구가 늘어날 수도 있습니다."
 living_standard_protected_tooltip_delayed: "§L가치가 있는 한, 시스템은 이들을 받아들입니다.§!"
 assimilate_shroud_forged_tt: "£pop£ §H$citizenship_shroud_touched$§! §Y$POPS$§!은 동화할 수 없습니다."
 living_standard_protected_situation_stage_tt: "$citizenship_shroud_touched$ 유지비: §R+$@living_standard_luxuries_high|1$§! £consumer_goods£ §Y소비재§!"
 # Traits
 leader_trait_guided: "인도받는 자"
 leader_trait_guided_desc: "이 유닛은 장막으로부터의 환상과 전언에 의지해 은하계를 누빕니다. 신호를 명확하게 유지하기 위해서는 지속적인 즈로 공급이 필요합니다."
 leader_trait_shroud_prophet: "장막 예언자"
 leader_trait_shroud_prophet_desc: "장막, 그리고 장막 안의 존재들과 깊은 연결을 지녔다고 전해집니다."
 trait_shroud_forged: "장막 단조체"
