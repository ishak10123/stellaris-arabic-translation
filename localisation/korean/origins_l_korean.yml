 # Armies
 shroud_monstrosities: "외계의 존재"
 shroud_monstrosities_desc: "전장에서 이 존재를 목도하는 것은 광기 그 자체를 불러들이는 것과 같습니다. 그 형체는 꿈틀거리고, 일렁이고, 끊임없이 변화하며 결코 고정되지 않습니다."
