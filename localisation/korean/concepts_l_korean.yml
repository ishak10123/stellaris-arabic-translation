 concept_nexus_district_desc: "- £housing£ ['concept_housing']: §G+500§!\n- £building£ ['concept_building'] 슬롯: §G+1§!\n- [maintenance_drone.GetName] 직업: §G+300§!\n\n§L$district_nexus_desc$§!"
 #Singular: £district£ ['concept_industrial_district'] or £district£ §H$concept_industrial_district$§!
 #Plural: £district£ ['concept_industrial_districts'] or £district£ §H$concept_industrial_districts$§!
 concept_industrial_district: "$district_industrial$"
 concept_industrial_districts: "$district_industrial_plural$"
 concept_industrial_district_desc: "- £housing£ ['concept_housing']: §G+200§!\n- £mod_job_artisan_add£ ['concept_artisan'] 직업: §G+100§!\n- £mod_job_foundry_add£ ['concept_metallurgist'] 직업: §G+100§!\n\n§L$district_industrial_desc$§!"
 #Singular: £district£ ['concept_generator_district'] or £district£ §H$concept_generator_district$§!
 #Plural: £district£ ['concept_generator_districts'] or £district£ §H$concept_generator_districts$§!
 concept_generator_district: "$district_generator$"
 concept_generator_districts: "$district_generator_plural$"
 concept_generator_district_desc: "- £housing£ ['concept_housing']: §G+200§!\n- £mod_job_technician_add£ ['concept_technicians'] 직업: §G+200§!\n\n§L$district_generator_desc$§!"
 #Singular: £district£ ['concept_mining_district'] or £district£ §H$concept_mining_district$§!
 #Plural: £district£ ['concept_mining_districts'] or £district£ §H$concept_mining_districts$§!
 concept_mining_district: "$district_mining$"
 concept_mining_districts: "$district_mining_plural$"
 concept_mining_district_desc: "- £housing£ ['concept_housing']: §G+200§!\n- £mod_job_miner_add£ ['concept_miner'] 직업: §G+200§!\n\n§L$district_mining_desc$§!"
 #Singular: £district£ ['concept_farming_district'] or £district£ §H$concept_farming_district$§!
 #Plural: £district£ ['concept_farming_districts'] or £district£ §H$concept_farming_districts$§!
 concept_farming_district: "$district_farming$"
 concept_farming_districts: "$district_farming_plural$"
 concept_farming_district_desc: "- £housing£ ['concept_housing']: §G+200§!\n- £mod_job_farmer_add£ ['concept_farmer'] 직업: §G+200§!\n\n§L$district_farming_desc$§!"
 #Singular: ['concept_debris'] or §H$concept_debris$§!
 #Plural: -
 concept_debris: "잔해"
 concept_debris_desc: "우주를 떠다니는 고물과 산산이 부서진 선체. 잔해란 바로 우주전이 남긴 침묵의 메아리를 일컫습니다. 우주 전투로 발생한 §H$concept_debris$§!는 기간 제한 ['concept_special_project']를 통해 추적할 수 있습니다.\n\n£science_ship£ ['concept_science_ship']을 배정해 §H$concept_debris$§!를 조사하면 새로운 ['concept_technologies']에 대한 통찰을 얻을 수 있습니다."
 #Singular: ['concept_council'] or §H$concept_council$§!
 #Plural: -
 concept_council: "평의회"
 concept_council_desc: "['concept_empire']의 최고 지도부인 §H$concept_council$§!는 §H통치자§!와 최대 다섯의 §H평의원§!으로 구성됩니다. 각 평의회 의석에는 ['concept_leader']를 임명할 수 있고, 그 ['concept_leader_traits']에 따라 제국 전체가 혜택을 받기도 합니다.\n\n이 밖에도 §H$concept_council$§!는 ['concept_agendas'] 제정을 담당합니다.\n\n평의회 관리 및 평의원 임명은 £interface£ ['concept_government_view']의 §H평의회§! 탭에서 진행합니다."
 #Singular: ['concept_agenda'] or §H$concept_agenda$§!
 #Plural: ['concept_agendas'] or §H$concept_agendas$§!
 concept_agenda: "안건"
 concept_agendas: "안건"
 concept_agenda_desc: "§H$concept_agenda$§!은 ['concept_council']가 현재 추진하고 있는 전략적 중점으로, 제국의 우선 과제와 장기적인 목표를 결정합니다. 안건은 준비 중에도 일정한 혜택을 주지만, 시행되면 훨씬 강력한 효과를 발휘합니다.\n\n시행 가능한 §H$concept_agendas$§!과 그 효과는 통치 ['concept_authority'], 제국이 채택한 ['concept_traditions'] 등 다양한 요인에 따라 달라집니다.\n\n§H$concept_agendas$§!은 £interface£ ['concept_government_view']의 §H평의회§! 탭에서 관리합니다."
 #Singular: £research£ ['concept_research'] or £research£ §H$concept_research$§!
 #Plural: -
 concept_research: "연구"
 concept_research_desc: "£research£ §H$concept_research$§!를 통해 £physics£ ['concept_physics_research'], £society£ ['concept_society_research'], £engineering£ ['concept_engineering_research']로 이루어진 세 주요 분야의 과학적 지식수준을 진보시킬 수 있습니다. 각 분야는 개별적으로 발전하며, 발전에 따라 새로운 ['concept_technologies']을 제공합니다.\n\n연구 속도는 제국의 상황이나 ['concept_leader_traits'] 같은 내부 요인은 물론, ['concept_diplomatic_pacts', $concept_research_agreements$] 등 외부 요인에도 영향을 받을 수 있습니다."
 concept_research_tooltip: "$concept_research_desc$\n\n§G['concept_research'] 클릭해서 데이터 뱅크 열기\n메뉴에서 £research£ 클릭해서 목록 확장§!"
 #Singular 1: ['concept_modifier'] or §H$concept_modifier$§!
 #Plural 1: ['concept_modifiers'] or §H$concept_modifiers$§!
 #Singular 2: ['concept_empire_modifier'] or §H$concept_empire_modifier$§!
 #Plural 2: ['concept_empire_modifiers'] or §H$concept_empire_modifiers$§!
 #Singular 3: ['concept_planet_modifier'] or §H$concept_planet_modifier$§!
 #Plural 3: ['concept_planet_modifiers'] or §H$concept_planet_modifiers$§!
 concept_modifier: "보정치"
 concept_modifiers: "보정치"
 concept_empire_modifier: "제국 보정치"
 concept_empire_modifiers: "제국 보정치"
 concept_planet_modifier: "행성 보정치"
 concept_planet_modifiers: "행성 보정치"
 concept_modifier_desc: "§H$concept_modifiers$§!는 일반적으로 £anomaly£ ['concept_anomalies']이나 ['concept_event_chains'] 도중에 내린 결정으로 인해 나타나는 이익이나 불이익을 말합니다.\n\n이러한 보정치는 일시적이거나 영구적일 수 있으며, 제국 전체에 영향을 주거나 행성과 같은 일부 영역에만 적용될 수도 있습니다.\n\n제국 전체에 영향을 주는 §H$concept_modifiers$§!는 £interface£ ['concept_empire_view']의 §H$empire_view_tab_empire$§!에 표시되고, 특정 행성에 적용되는 보정치는 £interface£ ['concept_colony_view']에서 살펴볼 수 있습니다."
 #Singular: ['concept_diplomacy'] or §H$concept_diplomacy$§!
 #Plural: -
 concept_diplomacy: "외교"
 concept_diplomacy_desc: "§H$concept_diplomacy$§!는 무역 협정과 동맹부터 ['concept_rivals']와 ['concept_wars']에 이르기까지, 제국과 제국 사이의 다양한 상호 작용 방식을 좌우합니다. 외교 행동은 ['concept_ethics'], ['concept_authorities'], 상대적 전력, 상호 이해관계 등 여러 요소에 영향을 받습니다.\n\n['concept_envoys']을 통해 관계 개선을 도모할 수 있으며, ['concept_diplomatic_pacts']을 맺거나 ['concept_federation']과 ['concept_galactic_community']를 통해 은하계 정치에 참여할 수도 있습니다."
 #Singular: ['concept_subject_agreement'] or §H$concept_subject_agreement$§!
 #Plural: ['concept_subject_agreements'] or §H$concept_subject_agreements$§!
 concept_subject_agreement: "종속국 협정"
 concept_subject_agreements: "종속국 협정"
 concept_subject_agreement_desc: "§H$concept_subject_agreements$§!은 지배국과 속국 사이의 종속 관계를 정의하는 개념으로, 속국의 자치권 수준과 자원 기여량, 군사적 의무 등을 결정짓습니다. 협정의 내용을 어떻게 조정하느냐에 따라 속국을 완전히 통제하에 놓을 수도, 반독립적인 동맹국으로 둘 수도 있습니다.\n\n§H$concept_subject_agreements$§!은 £interface£ ['concept_contacts_view']의 $contacts_view_tab_agreements$ 탭에서 협상할 수 있습니다."
 #Singular: ['concept_relic'] or §H$concept_relic$§!
 #Plural: ['concept_relics'] or §H$concept_relics$§!
 concept_relic: "유물"
 concept_relics: "유물"
 concept_relic_desc: "고대 문명이 남긴 강력한 도구인 §H$concept_relics$§!은 소유자에게 특별한 혜택을 부여합니다.\n\n유물은 £archaeology£ ['concept_archaeology_site']을 발굴하거나 주요 ['concept_event_chains']를 완료해 획득할 수 있으며, 유물을 보유한 제국과의 전쟁에서 승리해 강탈할 수도 있습니다.\n\n§H$concept_relics$§!은 보유하는 것만으로도 지속 효과를 발휘하며, 활성화하여 강력한 일시적 효과를 얻을 수도 있습니다. 이러한 유물은 £interface£ ['concept_discoveries_view']의 $discoveries_view_tab_relics$ 탭에서 관리할 수 있습니다."
 #Singular: ['concept_astral_action'] or §H$concept_astral_action$§!
 #Plural: ['concept_astral_actions'] or §H$concept_astral_actions$§!
 concept_astral_action: "아스트랄 행동"
 concept_astral_actions: "아스트랄 행동"
 concept_astral_action_desc: "§H$concept_astral_actions$§!은 제국이 우주의 구조와 상호 작용할 수 있는 특별한 능력입니다. 아스트랄 현상을 적절히 활용하면 전략적 이점을 얻을 수 있습니다.\n\n§H$concept_astral_actions$§!은 일반적으로 ['concept_astral_rifts']을 탐사해 잠금 해제할 수 있습니다."
 #Singular: ['concept_minor_artifact'] or §H$concept_minor_artifact$§!
 #Plural: ['concept_minor_artifacts'] or §H$concept_minor_artifacts$§!
 concept_minor_artifact: "골동품"
 concept_minor_artifacts: "골동품"
 concept_minor_artifact_desc: "§H$concept_minor_artifacts$§!은 일반적으로 £archaeology£ ['concept_archaeology_site']을 발굴해 획득할 수 있는 고대 문명의 잔재입니다. §H$concept_relics$§!만큼 강력하지는 않지만, 특수한 제국 보너스를 활성화하거나 귀중한 자원으로 교환하는 등 다양한 방식으로 활용할 수 있습니다.\n\n골동품의 활용 방식은 제국의 기술 발전 정도나 정책에 따라 달라지며, 문화 강화, 과학적 돌파구 마련은 물론, 군사적으로도 활용될 수 있습니다. 골동품은 £interface£ ['concept_discoveries_view']에서 관리할 수 있습니다."
 #Singular: ['concept_crisis'] or §H$concept_crisis$§!
 #Plural: -
 concept_crisis: "위기"
 concept_crisis_desc: "§H$concept_crisis$§!는 제국이 금단의 힘과 파멸적인 기술을 통해 존재 자체에 대한 해악으로 거듭나고 전례 없는 위협으로 부상하는 것을 의미합니다.\n\n그렇게 위기의 화신이 된 제국은 온 은하계를 적으로 돌리고 피할 수 없는 심판을 받게 됩니다."
 #Singular: ['concept_overlord_holding'] or §H$concept_overlord_holding$§!
 #Plural: ['concept_overlord_holdings'] or §H$concept_overlord_holdings$§!
 concept_overlord_holding: "지배국 보유 자산"
 concept_overlord_holdings: "지배국 보유 자산"
 concept_overlord_holding_desc: "§H$concept_overlord_holdings$§!은 지배국이 종속국의 행성에 설립한 특수 시설입니다. 제국의 영향력을 과시하거나 자원을 추출하거나 서비스를 제공하는 등 다양하게 이용해 지배국의 권위를 강화할 수 있습니다.\n\n§H$concept_overlord_holdings$§!의 종류와 수는 ['concept_subject_agreement'] 내용의 영향을 받으며, 지배국의 ['concept_civics']와 ['concept_ethics']과 전략적 우선순위에 따라 효과가 달라집니다. 보유 자산은 지배국에 다양한 혜택을 주지만, 착취적이거나 침해적인 시설로 인식되면 종속국의 원성을 살 수 있습니다."
 #Singular: ['concept_branch_office'] or §H$concept_branch_office$§!
 #Plural: ['concept_branch_offices'] or §H$concept_branch_offices$§!
 concept_branch_office: "$BRANCH_OFFICE$"
 concept_branch_offices: "$BRANCH_OFFICES$"
 concept_branch_office_desc: "§H$BRANCH_OFFICES$§!는 설립된 행성의 £trade_value£ ['concept_trade']을 일정 비율만큼 £energy£ ['concept_energy']으로 변환해 기업 소유주에게 제공합니다.\n\n대상 행성의 £interface£ ['concept_colony_view']에서 최대 §Y4§!개의 지사 건물을 설립할 수 있으며, 수도를 업그레이드하면 추가 슬롯이 잠금 해제됩니다."
 #Singular 1: ['concept_war'] or §H$concept_war$§!
 #Plural 1: ['concept_wars'] or §H$concept_wars$§!
 #Singular 2: ['concept_subjugation_war'] or §H$concept_subjugation_war$§!
 #Plural 2: -
 #Singular 3: ['concept_total_war'] or §H$concept_total_war$§!
 #Plural 3: -
 concept_war: "전쟁"
 concept_wars: "전쟁"
 concept_subjugation_war: "종속 전쟁"
 concept_total_war: "총력전"
 concept_war_desc: "§H$concept_war$§!은 공식적으로 이루어지는 제국 간 무장 갈등으로, 특정 목표를 쟁취하거나, ['concept_claims']을 확고히 하거나, 원한을 갚거나, 은하의 질서를 바로잡기 위해 벌어지는 등 다양한 요소로 인해 발발됩니다. §H전쟁 명분§!은 전쟁을 정당화하며, 전쟁의 목적과 가능한 결과를 결정짓습니다.\n\n전쟁은 한쪽이 항복하고 상대의 요구를 들어주거나, §H현상 유지§! 협상을 맺어야만 끝나며, 이때 협상 시에 점령한 성계만 유지한 채 ['concept_peace']가 이루어집니다. 전쟁이 길어질수록 §H전쟁 피로도§!가 축적되며, 종전의 압박이 증가합니다. 전쟁은 비용이 많이 들지만 제국의 운명을 결정하는 데 매우 결정적인 역할을 합니다."
 #Singular: ['concept_peace'] or §H$concept_peace$§!
 #Plural: -
 concept_peace: "평화"
 concept_peace_desc: "§H$concept_peace$§!는 전쟁 당사국이 분쟁을 공식적으로 멈춘 상태를 의미합니다. 통상적으로 전쟁 목표가 강요되거나 영역이 교환되며, 새로운 정치적 조정이 이루어지기도 합니다. 상대를 항복시켜 강제로 평화를 실현하는 방법도 있지만, 양측 모두 전쟁에 지쳐 저절로 평화 협정을 맺게 되기도 합니다.\n\n평화 협정의 조건에 따라 전쟁 후 제국 간의 질서와 국경 및 지배 관계가 달라질 수 있으며, 이러한 협정이 또 다른 분쟁의 씨앗이 되기도 합니다."
 #Singular: ['concept_galactic_community'] or §H$concept_galactic_community$§!
 #Plural: -
 concept_galactic_community: "은하 공동체"
 concept_galactic_community_desc: "§H$concept_galactic_community$§!는 은하의 여러 제국이 협력을 도모하고, 성간 규범을 정립하고, 공동의 위협에 대처하기 위해 결성한 범은하적 입법 기구입니다. 은하 공동체는 결의안을 제안하고 이를 투표에 부쳐 온 은하에 ['concept_war'], 상업, 사회 가치관에 영향을 줌으로써 '연성 권력'을 행사합니다.\n\n은하 공동체의 회원국은 ['concept_envoys']을 배정하고 ['concept_diplomatic_weight']을 모아 공동체 내 영향력을 확보할 수 있습니다. 은하 공동체는 겉보기에는 통합의 장인 것 같지만, 사실 회원국끼리 경쟁하면서 권모술수를 꾸미거나, 공동 통치라는 명목으로 위계질서를 세우려는 일이 다반사입니다."
 #Singular: ['concept_galactic_council'] or §H$concept_galactic_council$§!
 #Plural: -
 concept_galactic_council: "은하 평의회"
 concept_galactic_council_desc: "§H$concept_galactic_council$§!는 ['concept_galactic_community'] 내에서 최고 지위를 지니고 있는 통치 기관이며, ['concept_diplomatic_weight']이 제일 강한 회원국으로 구성됩니다. 평의회 회원국은 긴급 조치를 제안하거나 결의안을 거부할 수 있고, 은하 안건을 주도할 수 있는 특혜를 받습니다.\n\n평의회 의석은 수가 제한된 데다 얼마든지 바뀔 수 있으며, 각국의 상대적 외교력에 따라 주어집니다. 평의회는 은하의 질서를 유지하기 위해 결성되지만, 강대국은 우위를 확고히 하기 위해, 그리고 약소국은 그런 강대국을 무너뜨리기 위해 평의회를 활용하는 등 야망의 장이 되기도 합니다."
 #Singular: ['concept_favor'] or §H$concept_favor$§!
 #Plural: ['concept_favors'] or §H$concept_favors$§!
 concept_favor: "호의"
 concept_favors: "호의"
 concept_favor_desc: "은하 이벤트에서 다른 제국을 도운 대가로 외교적 영향력을 행사할 수 있는 수단인 §H$concept_favors$§!를 얻을 수 있습니다. 호의는 §H$concept_galactic_community$§! 및 이 밖의 외교 무대에서 일종의 정치적 통화로 사용됩니다.\n\n호의를 이용해 투표 결과를 바꾸거나, 외교 제안을 강화하거나, 협상에서 이점을 얻을 수 있습니다."
 #Singular: ['concept_diplomatic_weight'] or §H$concept_diplomatic_weight$§!
 #Plural: -
 concept_diplomatic_weight: "외교적 영향력"
 concept_diplomatic_weight_desc: "§H$concept_diplomatic_weight$§!은 제국이 ['concept_galactic_community'] 내에 행사하는 영향력을 나타냅니다. 외교적 영향력이 크면 결의안 통과에 더 많은 영향력을 행사하며 ['concept_galactic_council']에 가입할 수도 있습니다. 외교적 영향력은 경제력, 기술력, 군사력, 그리고 공동체에 배정한 ['concept_envoys']의 수에 따라 결정됩니다.\n\n외교적 영향력은 제국의 지위에 따라 지속적으로 변하며, 제국은 외교적 영향력을 이용해 이익을 추구할 수도 있습니다."
 #Singular: ['concept_first_contact'] or §H$concept_first_contact$§!
 #Plural: ['concept_first_contacts'] or §H$concept_first_contacts$§!
 concept_first_contact: "첫 조우"
 concept_first_contacts: "첫 조우"
 concept_first_contact_desc: "이전에 조우한 적이 없는 문명 간의 첫 만남을 §H$concept_first_contact$§!라고 합니다. 첫 조우에 어떻게 대처했는지에 따라 ['concept_diplomacy']를 수립할 수 있으며, 반대로 상대방의 성향에 따라 의심이나 충돌을 살 수도 있습니다.\n\n§H$concept_first_contact$§! 과정에서는 외계 통신을 해독하고, 혹시 모를 사태에 대처하고, 제국이 미지의 세계를 어떻게 대할지 결정하게 됩니다."
 #Singular: ['concept_workforce'] or §H$concept_workforce$§!
 #Plural: -
 concept_workforce: "노동력"
 concept_workforce_desc: "§H$concept_workforce$§!은 £colony£ ['concept_colony']의 전반적인 노동 능력을 나타내는 지표로, 제국의 원활한 운영을 위해 다양한 직업에 종사할 수 있는 인구가 얼마나 되는지 보여 줍니다.\n\n£pop£ ['concept_pops']은 ['concept_species'], 사회 계층, ['concept_ethics'] 등 다양한 공동 특성에 따라 그룹으로 분리됩니다. 각 그룹은 행성의 §H$concept_workforce$§!에 포함되며, 이용 가능한 £job£ ['concept_jobs']에 할당됩니다."
 #Singular: £zone£ ['concept_district_specialization'] or £zone£ §H$concept_district_specialization$§!
 #Plural: £zone£ ['concept_district_specializations'] or £zone£ §H$concept_district_specializations$§!
 concept_district_specialization: "$planet_zone$"
 concept_district_specializations: "$planet_zones$"
 concept_district_specialization_desc: "지구 특성화는 각 £district£ ['concept_district']에서 제공하는 £job£ ['concept_jobs']을 결정하며, 대부분의 경우 이러한 특성화를 통해 £building£ ['concept_buildings']을 지을 수 있는 공간이 추가됩니다."
 concept_district_specializations_desc: "$concept_district_specialization_desc$"
 #Singular: -
 #Plural: £strategic_resource£ ['concept_strategic_resources'] or £strategic_resource£ §H$concept_strategic_resources$§!
 concept_strategic_resources: "전략적 자원"
 concept_strategic_resources_desc: "희귀하고 강력한 물질인 £strategic_resource£ §H$concept_strategic_resources$§!은 첨단 기술, 기반 시설, 우주선 시스템에 필수적인 소재입니다.\n\n예를 들어 £volatile_motes£ §H$volatile_motes$§!, £exotic_gases£ §H$exotic_gases$§!, £rare_crystals£ §H$rare_crystals$§! 등이 여기에 해당합니다.\n\n§H희귀 자원§!은 다루기 까다롭지만 더욱 높은 가치를 지닌 자원으로, 고도로 진보된 분야에서 사용됩니다. 이러한 희귀 및 전략적 자원은 다른 무엇보다도 ['concept_civilian_ships'], ['concept_military_ships'], ['concept_starbases'], ['concept_megastructures'] 건설에 사용됩니다.$tt_gain$- £zone£ §H$zone_industrial_plural$§! 또는 £zone£ §H$zone_foundry_plural$§!를 건설합니다.\n- 관련 건물을 건설합니다.\n- $tt_market$"
 concept_strategic_resources_tooltip: "$concept_strategic_resources_desc$\n\n§G['concept_strategic_resources'] 클릭해서 데이터 뱅크 열기\n메뉴에서 £strategic_resource£ 클릭해서 목록 확장§!"
 POLICY_OPTION_CONCEPT_BODY: "- ['policy:$POLICY$:$OPTION$',$OPTION_NAME$]"
