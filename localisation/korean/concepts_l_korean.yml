 concept_hive_district_desc: "- £housing£ ['concept_housing']: §G+600§!\n- £building£ ['concept_building'] 슬롯: §G+1§!\n- [maintenance_drone.GetName] 직업: §G+300§!\n\n§L$district_hive_desc$§!"
