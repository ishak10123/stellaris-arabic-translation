 concept_society_management_desc: "§H$concept_society_management_view$§!에서는 전통을 관리할 수 있습니다.$ui_available_tabs$[GetConceptSocietyManagement]"
 society_management_view_tab_traditions: "§H$TRADITIONS$§!"
 society_management_view_tab_crisis: "§H$CRISIS_TAB$§!"
 concept_society_management_view_crisis: "$concept_society_management_view_no_crisis$\n- $society_management_view_tab_crisis$: ['concept_crisis'] 진행 상황을 추적합니다."
 concept_society_management_view_no_crisis: "- $society_management_view_tab_traditions$: ['concept_traditions'] 및 ['concept_ascension_perks']을 선택합니다."
 # View: £interface£ ['concept_technology_view'] or £interface£ §H$concept_technology_view$§!
 concept_technology_view: "$TECHNOLOGY$ 화면"
 concept_technology_view_desc: "£interface£ §H$concept_technology_view$§!에는 £physics£ ['concept_physics_research'], £society£ ['concept_society_research'], £engineering£ ['concept_engineering_research'] 등 다양한 분야의 발전 상황이 표시됩니다. 이 인터페이스에서 연구 선택지와 기술 우선순위를 설정하고 관리할 수 있습니다.\n\n신규 ['concept_technologies'] 선택지는 과학 연구의 불확실성을 반영해 어느 정도 무작위로 등장합니다."
 # View: £interface£ ['concept_leaders_view'] or £interface£ §H$concept_leaders_view$§!
 concept_leaders_view: "$topbar_button_leaders_name$ 화면"
 concept_leaders_view_desc: "£interface£ §H$concept_leaders_view$§!은 제국에 고용된 ['concept_leaders']의 역할과 ['concept_leader_traits'], 경험치, 직책이 표시됩니다. 이 인터페이스에서 지도자를 새로 모집하거나, 기존 지도자를 재배정하거나, 해임할 수 있습니다."
 # View: £interface£ ['concept_species_view'] or £interface£ §H$concept_species_view$§!
 concept_species_view: "$topbar_button_species_name$ 화면"
 concept_species_view_desc: "£interface£ §H$concept_species_view$§!에는 제국 내 알려진 모든 ['concept_species']이 이해하기 쉽게 정리되어 있습니다. 이 인터페이스에서 ['concept_species_traits']을 확인하고 수정할 수 있으며, 시민권이나 병역, ['concept_living_standards'] 등 다양한 인구 권리를 관리할 수 있습니다.\n\n여러 정책과 신체적 특징, 사상이 한데 어우러져 구성된 다종족 제국이라면, 이 화면이 복잡다단한 제국을 관리하는 데 큰 도움이 됩니다."
 # View: £interface£ ['concept_planets_and_sector_view'] or £interface£ §H$concept_planets_and_sector_view$§!
 concept_planets_and_sector_view: "$PLANET_LIST$ 화면" # Use this alias when referring to the concept
 concept_planets_and_sector: "$PLANET_LIST$" # Left out 'View' to fit in the Databank UI
 concept_planets_and_sector_desc: "£interface£ §H$concept_planets_and_sector$§! 인터페이스는 제국 내 모든 £colony£ ['concept_colonies']와 £sector£ ['concept_sector']의 집약적 개요를 제공합니다.\n\n이 화면에서 ['concept_governors']을 배정할 수도 있습니다."
 # View: £interface£ ['concept_expansion_planner'] or
 concept_expansion_planner: "$MENU_PANEL__EXPANSION_PLANNER_TITLE$"
 concept_expansion_planner_desc: "£interface£ §H$concept_expansion_planner$§!에는 개척 기회가 있는 £planet£ ['concept_planets']이 표시됩니다. 이 화면에서 바로 개척을 진행할 수 있으며, 개척을 개시하면 자동으로 £colony_ship£ ['concept_colony_ship']을 건조합니다.\n\n£planet£ §H$concept_planets$§!을 개척하려면 먼저 £science_ship£ ['concept_science_ship']으로 탐사를 완료하고, 행성에 £anomaly£ ['concept_anomalies']이 있는 경우 조사를 마쳐야 합니다.\n\n또한, ['concept_starbase']를 건설해 대상 행성의 성계를 우리 제국의 국경 안에 포함시켜야 합니다."
 # View: £interface£ ['concept_fleet_management_view'] or £interface£ §H$concept_fleet_management_view$§!
 concept_fleet_management_view: "$topbar_button_fleet_manager_name$ 화면" # Use this alias when referring to the concept
 concept_fleet_management: "$topbar_button_fleet_manager_name$" # Left out 'View' to fit in the Databank UI
 concept_fleet_management_desc: "함선을 설계하고 함대를 생성합니다. 새로운 §H함선 크기§! 및 ['concept_components']은 필요한 ['concept_technologies']을 연구하면 잠금 해제됩니다.$ui_available_tabs$[GetConceptFleetManagement]"
 fleet_management_view_tab_fleet_manager: "§H$FLEET_MANAGER_VIEW$§!"
 fleet_management_view_tab_ship_designer: "§H$SHIP_DESIGNER$§!"
 concept_fleet_management_view_space_fauna: "$concept_fleet_management_view_no_space_fauna$\n- §H$CREATURE_DESIGNER$§!: ['concept_space_fauna']을 변경합니다."
 concept_fleet_management_view_no_space_fauna: "- $fleet_management_view_tab_fleet_manager$: ['concept_fleets']를 조직합니다.\n- $fleet_management_view_tab_ship_designer$: ['concept_military_ships']을 설계합니다."
 # View: £interface£ ['concept_contacts_view'] or £interface£ §H$concept_contacts_view$§!
 concept_contacts_view: "조우 화면"
 concept_contacts_view_desc: "£interface£ §H$concept_contacts_view$§!에는 조우한 제국과 독립 엔클레이브, 외계종이 모두 표시됩니다. 이곳은 성간 소통 및 외부 첩보의 중심 허브로서, 여기서 ['concept_diplomacy']를 시행하고 관계를 평가할 수 있습니다."
 contacts_view_tab_contacts: "§H$topbar_button_contacts_name$§!"
 contacts_view_tab_agreements: "§H$AGREEMENTS_LIST_TITLE$§!"
 contacts_view_tab_shroud: "§H$THE_SHROUD_TITLE$§!"
 concept_contacts_view_tabs: "- $contacts_view_tab_contacts$: ['concept_diplomacy']를 수행합니다.\n- $contacts_view_tab_agreements$: ['concept_subject_agreements']을 검토합니다.\n- $contacts_view_tab_shroud$: ['concept_psionic_ascension']을 수행합니다."
 # View: £interface£ ['concept_discoveries_view'] or £interface£ §H$concept_discoveries_view$§!
 concept_discoveries_view: "$topbar_button_discoveries_name$ 화면"
 concept_discoveries_view_desc: "£interface£ §H$concept_discoveries_view$§!에는 ['concept_relics'], 골동품을 비롯하여 시대가 지나도 그 중요성을 잃지 않을 각종 은하의 신비 등 은하 전역에서 발견된 특수한 물체나 현상이 분류되어 있습니다.$ui_available_tabs$[GetConceptDiscovery]"
 discoveries_view_tab_relics: "§H$relics$§!"
 discoveries_view_tab_collection: "§H$COLLECTION$§!"
 discoveries_view_tab_vivarium: "§H$VIVARIUM$§!"
 discoveries_view_tab_astral_actions: "§H$ASTRAL_ACTIONS$§!"
