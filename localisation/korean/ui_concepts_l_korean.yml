 concept_discovery_view_base_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$: ['concept_specimens']이 표시됩니다.\n- $discoveries_view_tab_vivarium$: ['concept_space_fauna']을 사육합니다."
 concept_discovery_view_base_ancrel_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$: ['concept_specimens'] 및 ['concept_minor_artifacts']이 표시됩니다.\n- $discoveries_view_tab_vivarium$: ['concept_space_fauna']을 사육합니다."
 concept_discovery_view_base_astral: "$concept_discovery_view_base$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_astral: "$concept_discovery_view_base_ancrel$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_archive_astral: "$concept_discovery_view_base_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_archive_astral: "$concept_discovery_view_base_ancrel_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_astral: "- $discoveries_view_tab_astral_actions$: ['concept_astral_actions']을 활성화합니다."
 # View: £interface£ ['concept_claims_view'] or £interface£ §H$concept_claims_view$§!
 concept_claims_view: "$CLAIMS_VIEW$ 화면"
 concept_claims_view_desc: "£interface£ §H$concept_claims_view$§!에는 제국이 주장한 모든 ['concept_claims']이 표시됩니다. ['concept_galaxy_map']의 외교 모드에서 분쟁 중인 성계와 향후 분쟁이 촉발될 만한 곳의 개요를 볼 수 있습니다."
 # View: £interface£ ['concept_market_view'] or £interface£ §H$concept_market_view$§!
 concept_market_view: "$MARKET_VIEW$ 화면"
 concept_market_view_desc: "£interface£ §H$concept_market_view$§!에서는 자원 매매나 월간 정기 거래의 시행 등 다양한 성간 무역 활동의 전체적인 틀을 살펴볼 수 있습니다."
 # View: £interface£ ['concept_colony_view'] or £interface£ §H$concept_colony_view$§!
 concept_colony_view: "식민지 화면"
 concept_colony_view_desc: "£interface£ §H$concept_colony_view$§!에서는 £colony£ ['concept_colony']를 관리할 수 있습니다. 거주에 적합하지만 아무도 살지 않는 £planet£ ['concept_planets']이나 ['concept_habitats']의 경우, 이 화면에서 §H개척§! 작업을 개시할 수 있습니다.$ui_available_tabs$$concept_colony_view_tabs$"
 colony_view_tab_planet_summary: "§H$PLANET_TAB$§!"
 colony_view_tab_management: "§H$MANAGEMENT_TAB$§!"
 colony_view_tab_population: "§H$POPULATION_TAB$§!"
 colony_view_tab_armies: "§H$GROUND_COMBAT_TAB$§!"
 colony_view_tab_holdings: "§H$CORPORATE_TAB$§!"
 concept_colony_view_tabs: "- $colony_view_tab_planet_summary$: 식민지의 £district£ ['concept_districts'], £building£ ['concept_buildings'], 배정된 ['concept_governor']을 확인합니다. 또한 ['concept_designation']를 설정하거나, ['concept_planet_automation']를 활성화할 수 있습니다.\n- $colony_view_tab_management$: 행성 특징과 인구 변화가 표시됩니다. 또한 ['concept_decisions'], ['concept_planetary_ascension']을 시행하거나 ['concept_terraforming']을 개시할 수 있습니다.\n- $colony_view_tab_population$: 식민지 인구를 £job£ ['concept_job'] 계층별로 확인할 수 있습니다.\n- $colony_view_tab_armies$: 식민지에 주둔 중인 지상군과 식민지의 ['concept_devastation']가 표시됩니다.\n- $colony_view_tab_holdings$: 식민지에 있는 모든 ['concept_overlord_holdings']의 개요가 제공됩니다."
 # View: £interface£ ['concept_starbase_view'] or £interface£ §H$concept_starbase_view$§!
 concept_starbase_view: "항성 기지 화면"
 concept_starbase_view_desc: "£interface£ §H$concept_starbase_view$§!에서는 ['concept_starbase']를 관리할 수 있습니다.$ui_available_tabs$$concept_starbase_view_tabs$"
 starbase_view_tab_command: "§H$STARBASE_STARBASE_TAB$§!"
 starbase_view_tab_defenses: "§H$STARBASE_DEFENSES_TAB$§!"
 starbase_view_tab_armies: "§H$MACRO_BUILDER_TAB$§!"
 starbase_view_tab_shipyard: "§H$STARBASE_SHIPYARD_TAB$§!"
 concept_starbase_view_tabs: "- $starbase_view_tab_command$: 항성 기지의 §H모듈§!과 §H건물§!을 확인하고, 필요한 ['concept_technology']을 연구하면 항성 기지를 다음 등급으로 업그레이드할 수 있습니다.\n$starbase_view_tab_defenses$: 모든 ['concept_defense_platforms']을 살펴보고, 설계를 클릭해 추가로 건설할 수 있습니다.\n- $starbase_view_tab_armies$: §H$assault_army_plural$§!을 대규모로 모집할 수 있습니다. 지상군은 £sector£ ['concept_sector']의 £colony£ ['concept_colonies'] 중 모집이 가능한 곳에서 차출하며, 모집한 병력은 항성 기지에 모이거나 §H병력 집결§!이 활성화된 §H지상군§!에 합류합니다.\n- $starbase_view_tab_shipyard$: ['concept_civilian_ships']과 ['concept_military_ships']을 모두 건조할 수 있습니다."
 # View: £interface£ ['concept_system_map'] or £interface£ §H$concept_system_map$§!
 concept_system_map: "성계 지도"
 concept_system_map_desc: "£interface£ §H$concept_system_map$§!는 성계 내부의 ['concept_celestial_objects'], ['concept_civilian_space_stations'], ['concept_fleets'], 궤도 기반 시설 등이 상세하게 표시된 지도입니다. 이 지도를 활용해 성계 내 건설이나 개척, 전투, 과학 활동 등을 세세하게 관리할 수 있습니다."
 # View: £interface£ ['concept_galaxy_map'] or £interface£ §H$concept_galaxy_map$§!
 concept_galaxy_map: "은하 지도"
 concept_galaxy_map_desc: "£interface£ §H$concept_galaxy_map$§!에서는 지금까지 알려진 은하계의 전략적인 개요를 살펴볼 수 있습니다. £system£ ['concept_systems']와 ['concept_empire'] 국경, ['concept_hyperlanes']가 표시되어 있어, 탐사나 확장을 관리하고 각종 천체의 위치를 확인하기 위한 주 인터페이스로 활용할 수 있습니다."
 # View: £interface£ ['concept_navigation_bar'] or £interface£ §H$concept_navigation_bar$§!
 concept_navigation_bar: "이동 막대"
 concept_navigation_bar_desc: "£interface£ §H$concept_navigation_bar$§!는 화면 왼쪽에 있습니다.\n\n상호 작용을 통해 확대할 수 있고, 최소화 상태로 고정시킬 수도 있습니다.\n\n또한, 확대 모드에서는 설정에서 메뉴 항목을 재배열할 수 있습니다. 이 경우 각 메뉴의 키보드 단축키도 변경됩니다."
 # View: £interface£ ['concept_resource_bar'] or £interface£ §H$concept_resource_bar$§!
 concept_resource_bar: "자원 막대"
 concept_resource_bar_desc: "£interface£ §H$concept_resource_bar$§!는 화면 위쪽에 있습니다.\n\n£energy£ ['concept_energy']을 비롯한 다양한 §H자원§!과 £trade_value£ ['concept_trade'], ['concept_research'], ['concept_starbase_capacity'], ['concept_naval_capacity'] 등 여러 지표가 여기에 표시됩니다.\n\n오른쪽에는 §H시간 제어§!로 게임의 속도를 높이거나 낮출 수 있고, 게임 일시 정지 및 해제도 가능합니다.\n\n§H시간 제어§! 아래에는 §H음악 플레이어§!가 있습니다."
 # View: £interface£ ['concept_outliner'] or £interface£ §H$concept_outliner$§!
 concept_outliner: "현황"
 concept_outliner_desc: "£interface£ §H$concept_outliner$§!은 제국의 주요 자산인 £colony£ ['concept_colonies'], ['concept_fleets'], ['concept_civilian_space_stations'] 등을 빠르게 확인할 수 있는 인터페이스입니다. 현황은 플레이어가 원하는 대로 조정할 수 있고 상태가 실시간으로 업데이트되기 때문에, 이를 통해 다양한 항목을 재빠르게 탐색 및 확인하고 중요한 작업을 직접 제어할 수 있습니다."
