 # View: £interface£ ['concept_government_view'] or £interface£ §H$concept_government_view$§!
 concept_government_view: "$topbar_button_council_name$ 화면"
 concept_government_view_desc: "§H$concept_government_view$§!에서는 정부를 관리할 수 있습니다.$ui_available_tabs$$concept_government_view_tabs$"
 government_view_tab_council: "§H$COUNCIL$§!"
 government_view_tab_factions: "§H$FACTIONS$§!"
 government_view_tab_policies_and_edicts: "§H$EDICTS_AND_POLICIES$§!"
 concept_government_view_tabs: "- $government_view_tab_council$: ['concept_council'] 및 ['concept_agendas']을 관리합니다.\n- $government_view_tab_factions$: ['concept_factions']을 확인합니다.\n- $government_view_tab_policies_and_edicts$: ['concept_policies'] 및 ['concept_edicts']을 선택합니다."
 # View: £interface£ ['concept_society_management_view'] or £interface£ §H$concept_society_management_view$§!
 concept_society_management_view: "$TRADITION_VIEW_TITLE$ 화면" # Use this alias when referring to the concept
