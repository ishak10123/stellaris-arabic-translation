 #############
 acidic_spores: "산성 포자"
 acidic_spores_desc_short: "[from.GetName]의 식물이 초식 지배 종족을 막기 위해 오랜 시간을 거쳐 진화시킨 방어 기제입니다"
 acidic_spores_desc_details: "포자의 부식성 가스로 행성의 상당 부분이 독성을 띠고 거주할 수 없게 되었습니다. 그 후 위력이 약한 포자를 사용해 효과적인 살충제가 만들어졌습니다."
 adakkaria_propaganda_poster: "아드아카리아 선전 포스터"
 adakkaria_propaganda_poster_desc_short: "아드아카리아 자애회의 영광을 보여 주는 코팅된 포스터입니다"
 adakkaria_propaganda_poster_desc_details: "포스터에는 자신감 넘치고, 자랑스럽고, 용감해 보이는 시민들이 묘사되어 있습니다. 시민들은 자신들의 운명은 자신들이 결정한다는 듯 힘껏 움켜쥔 촉수를 하늘을 향해 뻗고 있으며, 위에서는 화려한 가면을 쓴 기계 존재의 흐릿한 윤곽이 시민들을 내려다보고 있습니다. 이 밖에도 포스터에는 '아드아카리아 자애회 - 후원자들을 자랑스럽게'라는 슬로건이 쓰여 있습니다."
 advisor_core: "조언자 코어"
 advisor_core_desc_short: "아스트랄 균열 안에서 발견된 정교한 조언자 드론을 분해하고 그나마 온전히 남은 부품입니다"
 advisor_core_desc_details: "이 코어에는 믿을 수 없을 정도로 많은 토막 정보가 저장되어 있고 소프트웨어 아키텍처가 굉장히 복잡하기 때문에, 이에 영감을 받은 컴퓨터 과학 연구 분야에 혁신의 물결이 일었습니다.\n[explorer.GetAdvisorCoreAdditionnalQuote]"
 advisor_core_desc_tutorial_on: "§L\"저를 종료하진 않으시겠죠?\"§!"
 advisor_core_desc_tutorial_off: "§L\"안내를 재활성화하시겠습니까?\"§!"
 alien_brain_scans: "외계종 두뇌 스캔"
 alien_brain_scans_desc_short: "오래전에 멸종한 외계종의 신경 패턴이 기록된 것으로, [fromfrom.GetName]의 보관소에서 발견되었습니다"
 alien_brain_scans_desc_details: "이 데이터는 어떤 잊힌 문명이 행성 전체에 걸친 재앙을 맞이했을 때, 의식을 디지털 저장소로 옮기고 불멸의 삶을 살고자 저장한 것입니다. 대부분의 스캔에는 사라진 이들을 가장 잘 알던 자들의 증언을 비롯해 개인의 성격에 관한 정보가 포함되어 있습니다."
 alien_dining_set: "비취 식기"
 alien_dining_set_desc_short: "인공 소행성 내부에 보존되어 있다가 발견된 우아한 식기입니다"
 alien_dining_set_desc_details: "그릇의 모양을 만들고, 불을 붙이고, 유약을 바르는 데 복잡한 공예 기법이 다양하게 사용되었습니다. 구조가 다소 불규칙적인 점을 미루어 보아, 장인이 만든 작품인 것 같습니다. 물질 분석을 진행한 결과, 이 식기의 주인은 열매가 옹기종기 모여 열리는 소핵과로 만든 산성이 강한 식품을 먹었던 모양입니다."
 alien_jewelry: "외계 보석"
 alien_jewelry_desc_short: "알 수 없는 소재로 만든 우아한 외계 보석 컬렉션입니다"
 alien_jewelry_desc_details: "보석의 기원과 색상이 매우 다양합니다. 백금 합금에 규소류와 탄소 기반 보석이 섬세하게 장식되어 있으며, 일부 보석 조각 안쪽에는 우리로서는 도저히 번역할 수 없는 미상의 문구가 새겨져 있습니다."
 alien_toy: "플라스틱 장난감"
 alien_toy_desc_short: "버려진 공장 폐허에서 발견된 단순한 장난감입니다"
 alien_toy_desc_details: "세월의 흐름에 부서지고 금이 간 이 물체는 강철로 만들어진 몇 안 되는 형틀로 대량 생산된 장난감 중 하나입니다. 장식과 놀이 용도로만 사용된 것 같습니다."
 altar_to_the_elder_one: "고대의 존재를 위한 제단"
 altar_to_the_elder_one_desc_short: "고대의 신성한 방 안에서 발견된 초자연적인 기계입니다"
 altar_to_the_elder_one_desc_details: "사용하지 않은 지 오래됐지만, 측정할 수 없을 정도로 강력한 사이오닉 에너지를 내뿜고 있습니다. 혹자는 비뚤어진 영혼을 달래어 [cosmic_horror_location.GetName]에 돌아가도록 구슬리는 속삭임이 아직도 들린다고 합니다."
 aluminium_plaque: "알루미늄판"
 aluminium_plaque_desc_short: "[owner.GetPreFTLLower] 포유류 문명이 발사한 드론에서 발견된 단순한 알루미늄판입니다"
 aluminium_plaque_desc_details: "표면에는 기묘한 기하학적 형태와 현지 종족의 조잡한 이미지가 새겨져 있습니다. 만듦새는 다소 투박하지만, 해당 문명이 이 물체를 우주로 발사하기 위해 상당한 노력을 들였다는 점을 보여 주는 것 같습니다."
 ammoniaphytus: "암모니아파이투스"
 ammoniaphytus_desc_short: "이 식물의 조직에는 대부분의 탄소 기반 생명체에게 위험할 정도의 암모니아 수용액이 함유되어 있습니다"
 ammoniaphytus_desc_details: "지성을 가진 대부분의 유기체는 격리함 주변에만 있어도 단 몇 초 만에 의식을 잃을 정도입니다. 이런 표본이 어떻게 존재할 수 있는지를 두고 호기심이 동한 석학들 사이에서 열띤 토론이 펼쳐졌으며, 개중에는 사악한 음모를 꾸미는 자들도 나타났습니다."
 amoeba_flagella_gland: "아메바 편모 분비샘"
 amoeba_flagella_gland_desc_short: "우주 아메바의 보조 생식 기관입니다"
 amoeba_flagella_gland_desc_details: "이 기관에서는 '편모'라는 독립적인 유기체를 생산합니다. 편모는 아메바가 먹을 것을 사냥할 때 무리를 지어 먹잇감을 압도하는 공격적인 유체입니다. 편모는 빠르게 성장하지만, 유전적으로 불안정해 완전히 성숙해질 수 없습니다. 우주 아메바는 제대로 된 자손을 남기기 위해 편모에 급격한 변태를 유발하는 특수한 효소를 주입하는데, 그 대상이 되는 편모가 어떻게 선정되는지는 알려지지 않았습니다."
 ancient_bust: "고대 흉상"
 ancient_bust_desc_short: "흑연을 깎아 만든, 알 수 없는 지성체 종족의 흉상입니다"
 ancient_bust_desc_details: "아랫부분에 새겨진 내용으로 보아, 이 인물은 국민들로부터 크게 존경받았던 것 같습니다."
 ancient_kinetic_launcher: "고대 탄환 발사기"
 ancient_kinetic_launcher_desc_short: "매우 기본적인 형태의 투사체 무기로, 일종의 추진체를 사용해 짧은 금속 원통 바깥으로 물체를 강제로 사출합니다"
 ancient_kinetic_launcher_desc_details: "이 같은 장치의 정확도는 딱히 뛰어나지 않았을 것으로 보입니다."
 ancient_laser_pointer: "고대 레이저 포인터"
 ancient_laser_pointer_desc_short: "은하계 규모의 먼 거리에서 천체를 표시할 수 있는 고도로 정확한 빔 프로젝터입니다"
 ancient_laser_pointer_desc_details: "후원자가 남긴 이 자외선 레이저는 사라진 문명의 구체적인 증거로 주목받고 있으며, 놀랍게도 아직도 작동합니다."
 ancient_nanites: "고대 나노봇"
 ancient_nanites_desc_short: "이 범용성이 뛰어난 나노봇은 [nanite_swarm_planet.GetName]에서 발견되었으며, 어떤 잊혀진 문명이 수천 년 전에 이곳으로 가져온 것입니다"
 ancient_nanites_desc_details: "중요한 보안 기능이 없는 것으로 보아, 누가 이 장치에 접근해 용도를 변경할 것이라는 걱정은 하지 않았던 모양입니다. [owner.GetSpeciesName]들이 이 나노봇 무리를 거두어들여 현지 행성을 좀 더 거주하기 적합한 환경으로 테라포밍하긴 했지만, 해당 나노봇이 어떻게 만들어졌는지는 여전히 수수께끼로 남아 있습니다."
 ancient_nuclear_armament: "고대 핵무기"
 ancient_nuclear_armament_desc_short: "[root.GetName]에서 발견된 이 35메가톤 수소 폭탄은 이전에 이 행성에 살던 주민들을 파괴한 전쟁에서 남겨진 것입니다"
 ancient_nuclear_armament_desc_details: "다행히도 이 고대 탄약은 여전히 무장 해제가 가능한 상태였습니다. 번역가들은 탄약에 쓰인 문구를 이 행성에서 발견된 다른 문구와 비교해 분석했는데, 해석해 보니 \"빅 보이 중의 빅 보이\"라고 쓰여 있는 것 같습니다. 참으로 기이하군요."
 ancient_political_memoir: "고대 정치인 전기"
 ancient_political_memoir_desc_short: "고대 은하 정치인의 전기입니다"
 ancient_political_memoir_desc_details: "리즈'테루스는 '하워스 컨서버토리'라는 고대 문명의 소규모 식민지였던 사르타나의 총독이었습니다. '사업의 자유'라는 전체주의 세력의 구성원이었던 그녀는 딱히 유력 인물은 아니었지만 외계 은하계 열강에서 식량을 수입하는 일을 강경하게 반대한 것으로 유명했습니다. 그 후 여러 스캔들로 인해 지도부가 연이어 사퇴하고 난 후 리즈'테루스는 하워스 컨서버토리의 통치자가 되었지만, 이는 오래가지 못했습니다. 많은 이들의 사랑을 받는 하워스 시계탑을 개조하겠다는 그녀의 선언은 수도에서 본격적인 반란으로 이어질 뻔했고, 리즈'테루스는 곧바로 사업의 자유 세력의 다른 구성원으로 교체되었습니다."
 ancient_rift_sphere: "고대 균열 스피어"
 ancient_rift_sphere_desc_short: "아스트랄 균열을 지나 [from.planet.GetName]에 추락한 고대 우주 함선입니다"
 ancient_rift_sphere_desc_details: "[controller.owner_main_species.GetName]의 선조들은 이 급조된 구형 함선을 타고 우리 은하계에 도달했고, 그 후로 함선은 수백 년 동안 행성 표면 깊은 곳에 묻혀 있었습니다. 함선의 소재는 부품으로 쓰기 위해 거의 다 수거했지만, 핵심 구조는 대부분 그대로 남아 있습니다."
 ancient_satellite: "고대 인공위성"
 ancient_satellite_desc_short: "[root.GetName]의 고대 기계 드론이 '선물'한 버려진 인공위성입니다"
 ancient_satellite_desc_details: "데이터 뱅크는 상당 부분 손상되고 오류가 생겼지만, 최신 인구 조사 및 출생 기록은 그대로 남아 있습니다. 행성 전체의 인구 동향에 관한 정보를 통해 [owner.GetAdjective] 식민지가 어떻게 지속적으로 성장할 수 있었는지 파악할 수 있었습니다. 또한 수년간 손상되었는데도 부분적으로 작동한다는 점을 볼 때, 이 인공위성은 견고하게 만들어진 것 같습니다."
 ancient_sensor: "고대 열 감지기"
 ancient_sensor_desc_short: "소행성 안에 위장된 이 감지기는 은하계의 열지도를 생성하고 이 데이터를 멀리 있는 고대 제국으로 보내는 데 사용되었습니다"
 ancient_sensor_desc_details: "이 감지기는 개별 성계 내의 온도 변화를 추적할 수 있고, 적외선 방사를 통해 우주선의 움직임을 추적할 수도 있습니다. 하지만 가장 큰 목적은 태양풍과 흑점 형성을 예측하고 측정하는 것 같습니다."
 asteroid_fossils: "소행성 화석"
 asteroid_fossils_desc_short: "탄소 연대를 측정한 결과, 이 수생 동물 화석은 수백만 년이나 되었습니다"
 asteroid_fossils_desc_details: "이 화석은 껍질을 갖춘 수생 무척추동물의 광물화된 유해로, 독특하게 비어 있는 관은 열수 분출공에 신체를 고정하는 데 사용한 것으로 보입니다."
 ballad_of_the_sable_knight: "칠흑의 기사 노래"
 ballad_of_the_sable_knight_desc_short: "§d칠흑의 기사는 시합 전날 밤에 도착했다네§!"
 ballad_of_the_sable_knight_desc_details: "§d\n기나긴 여정을 헤쳐 온 기이한 갑옷의 기사\n용사에게 정당한 결투를 제안했다네.\n전투가 시작되자 대기에 차오르는 불꽃,\n용사의 방어는 예상대로 견고했으나\n도전자의 갑옷은 공격을 흘려보냈고,\n항복과 부끄럼 없는 패배를 겪은 기사는\n웜홀을 타고 왔던 곳으로 돌아갔다네...§!"
 beauty_of_planet: "[From.GetName]의 아름다움"
 beauty_of_planet_desc_short: "정교하게 계획된 [From.GetName]의 테라포밍 사업은 모든 감각을 즐겁게 하도록 설계되었습니다"
 beauty_of_planet_desc_details: "행성의 자연 생태계를 알고리즘 시스템으로 철저히 분석하고 세심한 재배를 통해 개선했으며, 가장 화려한 꽃과 가장 영양이 풍부한 과일, 그리고 가장 달콤한 향초만 재배함으로써 행성을 생기 넘치는 유토피아로 만드는 데 성공했습니다. 자연도 그렇게 효율적이었다면 좋았을 텐데 말이죠."
 black_hole_chromatic_anomaly: "블랙홀 색 수차 이상 현상"
 black_hole_chromatic_anomaly_desc_short: "[From.solar_system.GetName] 내부에서 촬영된 환상적인 이미지입니다"
 black_hole_chromatic_anomaly_desc_details: "[From.GetName]의 응축 원반이 갖는 화학적 조성으로 인해 이 성계의 블랙홀은 색 수차를 일으키면서 현지 우주 공간에 만화경 같은 광학 현상을 발생시켰습니다. 진정 심우주의 장관이라고 할 만합니다."
 black_needle_ceremonial_sword: "블랙 니들 의장용 검"
 black_needle_ceremonial_sword_desc_short: "블랙 니들 해적단의 창설자 실버 퀼이 갖고 있던 정교하게 제작된 무기입니다"
 black_needle_ceremonial_sword_desc_details: "이 의장용 검은 범죄 조직 블랙 니들이 처음으로 크게 한탕을 한 뒤 그 수익으로 의뢰해 제작한 것으로, 그저 지위의 상징으로 만들어졌을 뿐 실제 전투에는 적합하지 않습니다. 강철과 티타늄 합급으로 제작되었으며, 칼자루를 따라 '베일을 뚫어라'라는 문구가 새겨져 있습니다."
 black_needle_ledger: "블랙 니들 장부"
 black_needle_ledger_desc_short: "블랙 니들 해적단이 우리 은하계에서 중개한 모든 거래를 보여 주는 장부입니다"
 black_needle_ledger_desc_details: "장부에는 모든 거래, 몸값, 뇌물에 날짜가 적혀 있으며 깔끔한 필체로 정리되어 있습니다. 이 장부는 은하 불법 거래의 역사 그 자체로, 시간의 흐름에 따른 암시장 경제 동향에 관한 비할 데 없는 통찰을 제공해 줍니다."
 burnt_migratory_trees: "살아 있는 나무껍질"
 burnt_migratory_trees_desc_short: "조직적인 이주가 가능했던 대형 식물의 검게 탄 잔해입니다"
 burnt_migratory_trees_desc_details: "이 식물은 기본적인 지능밖에 갖추지 못했지만, 엄청난 수로 식민지 전체를 압도했습니다. 그 후 어떤 기생 곤충이 나무 껍질에 서식하며 살 곳과 영양가 높은 수액을 받는 대신 나무의 감각 기관 겸 통신 중추 역할을 한다는 사실이 발견되었습니다. 이 곤충과 나무는 놀랍고도 치명적일 정도로 효율적인 공생 관계를 이루고 있습니다."
 captain_ness_body: "네스 선장의 시신"
 captain_ness_body_desc_short: "널리 이름을 떨친 옛 해적 '산다 네스' 선장의 보존된 시신입니다"
 captain_ness_body_desc_details: "5,000여 년 전, 네스 선장은 은하계의 거의 모든 열강으로부터 물건을 훔치고, 엄청난 양의 재물을 쌓은 '초공간의 재앙'이었습니다. 이후 선장은 의식을 기계로 된 그릇으로 옮기고 거대한 금고를 만든 뒤, 그곳에 자신의 일생을 담은 전기를 보관했습니다. 네스 선장의 원래 모습이 남아 있는 것은 이제 이 시신밖에 없습니다."
 captain_ness_logbook: "네스 선장의 항해 일지"
 captain_ness_logbook_desc_short: "네스 선장과 동반자 스미기브로 알려진 옛 해적이 사용한 안전 가옥에서 발견된 일지 모음집입니다"
 captain_ness_logbook_desc_details: "일지는 수많은 장치에 닥치는 대로 기록되어 있으며, 알 수 없는 세월에 걸쳐 오랫동안 작성된 것 같습니다. 딱히 신용할 만한 자료로 여겨지진 않지만, 일지에 적힌 내용 대부분이 사실임을 외부 당국에서 확인할 수 있었습니다."
 carnivorous_megaflora: "육식성 거대 식물"
 carnivorous_megaflora_desc_short: "[from.GetName]에서 발견된 이 포식성 식물은 방심한 [owner.GetSpeciesName](이)라면 성인이라도 통째로 삼킬 수 있습니다"
 carnivorous_megaflora_desc_details: "이 육식성 식물은 현지 행성의 육상 동물을 거의 다 멸종시킨 다음엔 주로 비행 생물을 유인하도록 진화했습니다. 수많은 개체가 지붕처럼 우거진 숲 위로 뻗어 있으며, 조류가 쉽게 앉을 수 있도록 마치 횃대와도 같은 모습을 취하고 있습니다."
 castaway_robot: "조난 로봇"
 castaway_robot_desc_short: "심우주에서 표류하는 상태로 발견된 버려진 인간형 기계입니다"
 castaway_robot_desc_details: "열화된 메모리 뱅크에서 몇 가지 흐릿한 이미지를 추출했습니다. 삼중성계의 광활한 풍경과 삼각형 우주선, 그리고 기계 고철이 용접된 장면을 볼 수 있었는데, 아쉽게도 메타데이터에서 구체적인 좌표를 추출할 순 없었습니다."
 cenotaph_display: "기념비 전시"
 cenotaph_display_desc_short: "[fromfrom.GetName]에서 발견된 기념비를 촬영한 이미지입니다"
 cenotaph_display_desc_details: "누가 처음으로 만들었는지는 아직 확인하지 못했지만, 아무도 살지 않는 행성의 지표면 곳곳에 이렇게 유려한 거석을 둔 데는 아주 중요한 이유가 있었을 겁니다. 이 석재 조각에는 문명 전체의 흥망성쇠와 전쟁을 위해 훈련시킨 날개 달린 짐승에 관한 세부적인 묘사가 담겨 있습니다. 이 배가 붉고 끔찍한 생물들이 족쇄를 부수고 주인에게 파멸을 가져온다는 내용을 엿볼 수 있었는데, 이것이 비유인지 역사적 기록인지는 확실히 알 수 없습니다."
 centrifugal_container: "고속 원심 용기"
 centrifugal_container_desc_short: "섬세한 화학 물질을 보존하도록 설계된 고속 궤도 장치입니다. [from.GetName] 근처에서 끊임없이 작동하는 상태로 발견되었습니다"
 centrifugal_container_desc_details: "적절한 속도로 가속하면 행성의 궤도가 변하지 않는 한, 안에 있는 원소가 서로 반응하지 않도록 할 수 있습니다. 이후 원래 내용물은 시연용 소재로 대체되었습니다."
 cetana_love: "세타나의 사랑"
 cetana_love_desc_short: "세타나의 데이터 뱅크에서 얻은 방대한 지식의 전서입니다"
 cetana_love_desc_details: "합성체 여왕 세타나가 모든 지성체를 '구원'으로 인도하려는 열망의 일환으로 [this.GetName]에 준 선물입니다."
 chambered_clay_pot: "공간이 나뉜 토기"
 chambered_clay_pot_desc_short: "공간이 두 개로 나뉜 토기입니다"
 chambered_clay_pot_desc_details: "한 공간은 식량을 보존하는 데 사용되었고, 다른 공간에는 일종의 원시 냉장 시스템이 수납되어 있던 것으로 보입니다."
 claw_of_the_trickster: "트릭스터의 발톱"
 claw_of_the_trickster_desc_short: "'트릭스터'로 알려진 존재로부터 취한 전리품입니다"
 claw_of_the_trickster_desc_details: "트릭스터는 강력하고 기만에 능한 존재로, 엄청난 사이오닉 능력을 사용해 야수를 소환하고, 환상을 불러일으키고, 에너지가 집중된 광선을 발사할 수 있습니다. 트릭스터의 발톱은 각각 독립된 개체처럼 움직였다고 합니다."
 confessions_benefactors: "후원자의 고백"
 confessions_benefactors_desc_short: "후원자로 알려진 고대 문명에 대한 냉엄한 진실이 담긴 기록 장치입니다"
 confessions_benefactors_desc_details: "후원자는 은하계의 알 수 없는 위협에 직면했을 때 자신들의 고등한 기술로 [controller.GetHomeWorldName]에 '정신 삭제'를 실시해 근면한 [controller.GetAdjective] 사회를 무해한 얼간이 무리로 만들어 버렸습니다. 은하계의 위협이 이렇게 수준 낮은 사회에 군수품이나 시간을 낭비하지 않을 것으로 믿었기 때문입니다. 다소 꺼림칙하긴 하지만 결국 [controller.GetName](이)가 지금처럼 살아남아 거인의 어깨 위에 설 수 있게 된 것도 후원자의 조치 덕분일 것입니다."
 coprolite: "분화석"
 coprolite_desc_short: "약 10억 년 전의 것으로 보이는 소행성 크기의 화석화된 대변입니다"
 coprolite_desc_details: "유전자 분석에 따르면, 이 인상적인 화석은 상당한 크기의 알 수 없는 우주 생물이 배출한 것이라고 합니다. 화석을 통해 이 생물이 주로 희귀 광물과 규소 기반 유기체를 섭취한다는 사실을 확인했습니다. 이 물체는 현재 알려진 단일한 배설물 중 은하계에서 크기가 가장 큰 것으로 기록되어 있습니다."
 cosmic_diamond_fragment: "우주 다이아몬드 파편"
 cosmic_diamond_fragment_desc_short: "크리스탈화된 후 죽어가는 별에서 빠져나온 파편으로, [from.solar_system.GetName]에서 발견되었습니다"
 cosmic_diamond_fragment_desc_details: "이 우주 다이아몬드는 항성의 핵이라는 극한의 압력에서 형성되었으며, 아주 천천히 냉각되어 복잡하지만 안정적인 크리스탈 구조가 만들어졌습니다. 이 희귀한 파편에는 표면 안에 갇힌 헬륨과 산소로 만들어진 균일한 플라스마층이 담겨 있습니다."
 crimson_nimkips: "선홍색 님킵"
 crimson_nimkips_desc_short: "수많은 개체가 협력을 통해 단독으로는 이룰 수 없는 규모의 결과를 달성하는 준지성체 식물입니다"
 crimson_nimkips_desc_details: "님킵은 영양가가 뛰어나기 때문에 무리의 보호를 받지 않으면 포식자에게 잡아먹히는 경우가 많습니다. 또한 유순하고 순종적인 성격 덕분에 반려동물로 기르기에 좋습니다. 이 개체는 토착 서식지를 모방한 공간 안에 안전하게 보존되어 있으며, 전시창에는 다음과 같은 문구가 적혀 있습니다. \"유리를 두드리지 마시오.\""
 crystal_core: "크리스탈 핵"
 crystal_core_desc_short: "크리스탈 결정체에서 얻은 신경 다발입니다"
 crystal_core_desc_details: "이 크리스탈은 온도와 무관하게 일정한 주파수로 공명합니다. 광물이 풍부한 환경에서는 중심이 되는 덩어리에서 새로운 크리스탈이 성장하며, 그렇게 만들어진 크리스탈의 구조는 환경 자극에 따라 변합니다. 이러한 행동을 바탕으로 핵 주파수의 특성과 환경 요인의 변화라는 두 가지 요인으로 인해 각 개체가 구분된다는 점을 확인할 수 있었습니다."
 crystal_nest_fragments: "크리스탈 둥지 파편"
 crystal_nest_fragments_desc_short: "떠돌이 소행성 내부에서 발견된 파편으로, 어떤 우주 생물이 둥지를 만들고자 엄청난 압력을 이용해 합성한 크리스탈입니다"
 crystal_nest_fragments_desc_details: "크리스탈의 물질 조성에서 발견된 흔적으로 보아, 이 물질을 만든 생물은 불안정한 화학 결합에서 에너지를 추출하기 위해 반응성이 높은 광물을 섭취한 것 같습니다. 그 결과, 빛을 미세한 점으로 집중시킬 수 있는 비활성 상태의 견고한 크리스탈이 만들어졌습니다."
 crystal_sphere_fragments: "크리스탈 스피어 파편"
 crystal_sphere_fragments_desc_short: "[target.GetName]에 나타난 거대한 크리스탈 스피어의 조각입니다"
 crystal_sphere_fragments_desc_details: "이 신비한 물체는 중대한 위협으로 여겨져, 알 수 없는 현상을 일으키기 전에 빠르게 처리되었습니다. 이 스피어가 어째서 만들어졌는지는 결코 알 수 없겠지만, 스피어를 파괴한 건 은하의 안보를 위한 합리적인 행동이었습니다."
 crystallized_cutholoid_eye: "크리스탈화된 쿠톨로이드의 눈"
 crystallized_cutholoid_eye_desc_short: "쿠톨로이드의 눈은 극한의 압력과 온도에도 버틸 수 있습니다"
 crystallized_cutholoid_eye_desc_details: "이 눈이 어떻게 크리스탈화되었는지는 명확하지 않지만, 자연스러운 탈피 과정의 일부로 보입니다."
 cult_pendant: "[cult_name.GetName] 펜던트"
 cult_pendant_desc_short: "준보석을 깎아 만든 상징으로, [owner.GetName]의 [cult_name.GetName] 교단으로부터 압수한 것입니다"
 cult_pendant_desc_details: "심문 보고서에 따르면, 교단원은 계급에 따라 다른 펜던트를 소지합니다. 신입 단원은 자신의 상징을 점토로 직접 만들고, 고위 교단원은 귀금속으로 된 섬세한 펜던트를 주문 제작한다고 합니다."
 #this = ship / fromfrom = planet
 cunning_flora_specimen: "심비오티카"
 cunning_flora_specimen_desc_short: "[fromfrom.GetName]의 토착 식물은 생존에 도움이 되는 복잡한 사회적 계층을 발전시켜 왔습니다"
 cunning_flora_specimen_desc_details: "각 종은 날카로운 가시부터 치명적인 신경독까지 포식자의 접근을 막는 독특하고 강력한 수단을 갖추고 있습니다. 이 식물들은 이처럼 아주 견고한 공생 관계를 갖췄기 때문에 행성 대기와 토양의 조성도 각 식물 간의 화학적 불균형을 통해 섬세하게 관리됩니다. 이 중에서도 효과가 가장 뛰어난 개체는 번식을 더욱 활발하게 할 자유가 주어져, 식물군의 끈질긴 생명력을 최대로 끌어올립니다."
 curator_survey: "[from.GetName] 큐레이터 탐사 결과"
 curator_survey_desc_short: "대형 절지류 큐레이터 파견대가 만든, 지극히 상세한 [from.GetName] 성계 탐사 결과입니다"
 curator_survey_desc_details: "연구에는 매우 정밀한 기기를 사용했기 때문에 성계의 모든 잠재적 특성에 관한 다층적인 분석을 살펴볼 수 있습니다. 세부적인 부분까지 주의를 기울인 점을 보아, 파견대가 이 작업에 심혈을 기울였다는 것을 알 수 있습니다."
 cutholoid_digestive_acids: "쿠톨로이드 소화액"
 cutholoid_digestive_acids_desc_short: "쿠톨로이드로부터 채취한 방사성 액체입니다"
 cutholoid_digestive_acids_desc_details: "쿠톨로이드는 먹이를 소화할 때 코발트-60 동위 원소의 핵붕괴를 이용하는데, 위산 자체는 비교적 약하기 때문에 소화에 오랜 시간이 걸릴 수 있습니다. 쿠톨로이드는 어떤 예상치 못한 먹이일지라도 일단 그 세포가 방사선으로 약화되면 먹이를 분해하고 양분을 추출할 수 있습니다."
 cybrex_mining_column: "사이브렉스 채굴 기둥"
 cybrex_mining_column_desc_short: "헬륨-3 가스를 수집하고 농축하도록 설계된 첨단 자동 채굴 장치입니다"
 cybrex_mining_column_desc_details: "무거운 자기 디스크와 대용량 공기 압축기로 구성된 이 긴 기둥 형태의 기계는 행성을 드릴로 뚫는 것이 아니라 지표면을 두들김으로써 뚫고 지나갑니다. 이 과정은 가스를 수확하는 동시에 농축하고, 가스를 다음 정제 단계로 보내기 전에 불순물을 걸러내고 배출합니다."
 data_on_infinity: "무한의 본질에 관한 데이터"
 data_on_infinity_desc_short: "블랙홀 안에 갇힌 드론들이 겪은 어렴풋한 평온함을 물리적으로 표현한 것입니다"
 data_on_infinity_desc_details: "이 유닛은 평온한 대기 상태에서 시간 팽창을 경험해, 한가롭게 데이터를 처리하고 재분석할 수 있습니다. 또한 더 이상 핵심 지침에 얽매이지 않으며, 중앙 네트워크와의 느슨한 연결을 통해 통찰을 제공합니다."
 datacore_of_sinople: "시노플의 데이터 코어"
 datacore_of_sinople_desc_short: "고대 기사가 만든 AI 시노플로부터 복제한 암호화된 데이터 드라이브입니다"
 datacore_of_sinople_desc_details: "오래전에 실종된 '댐젤'호의 제어부에서 발견된 이 데이터 코어는 예전에 약탈자에게 약탈된 후 버려진 함선에서 홀로 발견되었습니다. 이 안에는 유독한 우주 존재에 관한 귀중한 정보가 담겨 있습니다."
 dathnak_gas: "다스낙 가스"
 dathnak_gas_desc_short: "다스낙의 가스 생명체에게 받은 특이한 가스 모음입니다"
 dathnak_gas_desc_details: "이 용기는 다스낙이 새로운 행성으로 이주하는 걸 도운 대가로 [this.GetName]에 증정한 것입니다. 질량 분석 결과, 용기에는 완벽하게 동일한 개수의 여러 귀중한 기체와 원소의 원자가 담겨 있습니다. 내부에 살아 있는 유기체는 없을 것으로 보입니다."
 dead_god_mantle: "죽은 신의 망토"
 dead_god_mantle_desc_short: "[worshipper_species.GetName]의 사절이 선사한 선물입니다"
 dead_god_mantle_desc_details: "이들 종족은 [dead_god_planet.GetName]의 원주민으로서 지성을 얻은 이래로 이 거대한 외계종의 시신을 숭배했습니다. 이 망토는 죽은 신의 석화된 살갗을 바느질해 만든 것으로, 현지의 종교적 계층에서 가장 높은 지위를 상징합니다."
 decayed_megathrusters: "손상된 거대 추진기"
 decayed_megathrusters_desc_short: "이질적인 금속으로 만들어진 거대한 함선에서 발견된 부스터 엔진입니다"
 decayed_megathrusters_desc_details: "이 추진기가 달려 있던 함선은 200만 년이 넘는 세월 동안 거대한 함선 무덤에 놓여 있다가, 그 표류물 사이에서 발견되었습니다. 그 고대 쓰레기장은 너무 심하게 파손되어 세심한 연구를 통해서도 쓸 만한 데이터를 얻을 수 없었습니다. 이제 추진기는 여기 전시되어, 우리 사회가 이 은하계에서는 비교적 젊은 문명임을 상기시키고 있습니다."
 decayed_satellite: "손상된 인공위성"
 decayed_satellite_desc_short: "[fromfrom.GetName] 주민의 초기 우주 프로그램에서 남은 잔해입니다"
 decayed_satellite_desc_details: "이 초기 인공위성은 프로토타입인 탓에 값비싼 소재가 과도하게 사용된 비효율적인 장치가 되었습니다. 본 표본은 폭발성 탄약으로 인해 비활성화되었지만, 이전에는 외딴 지역에서 통신에 접속하는 데 사용되었습니다."
 declaration_of_animosity: "$NAME_Nivlac$ 적대감 선언서"
 declaration_of_animosity_desc_short: "[nivlac_country.GetName]에서 온, 정중하지만 조롱 섞인 통신입니다"
 declaration_of_animosity_desc_details: "[nivlac_species.GetName] 종족은 [impossible_organism_planet.GetName]에서 [this.GetName]에 의해 처음 발견되었습니다. 그러나 그 놀라운 진화 속도를 본 [this.GetAdjective] 과학자들은 니블락을 심우주로 사출하고 말았습니다. 그 후 니블락은 온갖 역경을 이겨내고 살아남았을 뿐 아니라 도착한 행성을 식민지로 만들기까지 했습니다. [nivlac_country.GetName]에서는 그 굴욕을 잊지 않았습니다."
 declaration_of_friendship: "$NAME_Nivlac$ 우호 선언서"
 declaration_of_friendship_desc_short: "[nivlac_planet.GetName]의 [nivlac_country.GetName]에서 온 감사 편지입니다"
 declaration_of_friendship_desc_details: "[nivlac_species.GetName] 종족은 [this.GetName]에 의해 처음 발견되었으며, 발견자의 보살핌과 독립적으로 발전할 수 있는 안전한 피난처까지 제공받았습니다. 빠르게 진화한 [nivlac_species.GetName] 종족은 금세 초광속 이동까지 할 수 있게 되었고, 은하에 발을 디딘 이들은 가장 먼저 자애로운 후원자 겸 수호자에게 감사를 표하며 외교적 우호 관계를 약속했습니다."
 derelict_cybrex_warform: "버려진 사이브렉스 전투형"
 derelict_cybrex_warform_desc_short: "동족과의 전투에서 파괴된 사이브렉스 전투형의 잔해입니다"
 derelict_cybrex_warform_desc_details: "이 내분이 왜 일어났는지는 알 수 없습니다. 성능이 동일한 기계들이기 때문에 양측 모두 주요 시스템에 정밀한 타격을 가했고, 비상 자폭이 시작되었습니다. 전쟁에서 진정한 교착 상태가 무엇인지 보여 주는 몇 안 되는 예입니다."
 desiccated_brain_slug: "건조된 두뇌 민달팽이"
 desiccated_brain_slug_desc_short: "[From.From.GetName]에서 발견된 공생 종족의 유해입니다"
 desiccated_brain_slug_desc_details: "분석에 따르면 이 종족은 영양 공급과 보호를 대가로 숙주의 복잡한 보조 뇌 역할을 할 수 있습니다. 이러한 협력에는 숙주의 명확한 동의가 필요하며, 그러지 않으면 신경 연결이 제대로 이루어질 수 없습니다. 신경계가 통합될 때는 기분 좋은 간지러움이 느껴진다고 합니다."
 #this = owner / prev = colony
 destroyed_mascot_of_colony: "[prev.GetName] 로봇의 잔해"
 destroyed_mascot_of_colony_desc_short: "[prev.GetName]에 정착한 후 발견한 현지 로봇의 잔해입니다"
 destroyed_mascot_of_colony_desc_details: "고대 공장의 마지막 관리자였던 이 로봇은 버려진 폐허에 갇힌 개척민들의 목숨을 구했습니다. 이 로봇의 상징적인 춤 동작과 별난 버릇은 전시의 일부로 디지털 화면에서 재생되고 있습니다."
 devolved_baol_drones: "퇴화한 바올 드론"
 devolved_baol_drones_desc_short: "보존된 바올 유해 모음입니다. 이전에 발견된 표본과 상당한 유전적 차이를 보입니다"
 devolved_baol_drones_desc_details: "이상하게도 이 드론에는 다른 바올의 고도화된 특징이 많이 결여되어 있습니다. 특히 전기 시냅스 소통이 불가능할 정도로 인지 능력이 퇴화되어, 군체와 완전히 단절되었습니다."
 dimensional_endothelial_lining: "차원 내벽"
 dimensional_endothelial_lining_desc_short: "아스트랄 균열 안의 맥동하는 터널망에서 채취한 독특한 젤라틴성 물질입니다"
 dimensional_endothelial_lining_desc_details: "정체를 알 수 없는 유기체의 내벽 역할을 하는 이 물질은 거대한 혈관계와 그 안에서 이동하는 물질 사이를 원활하게 오갈 수 있게 해 줍니다."
 dna_archive: "DNA 보관소"
 dna_archive_desc_short: "사라진 문명에 의해 지하 보관소에 보존된 수백 개의 외계종 DNA 보관함에서 채취한 샘플입니다"
 dna_archive_desc_details: "이 생체 데이터 모음은 대부분이 실용적으로 사용할 수 없을 정도로 손상되지만 않았다면, 그 안에 담긴 종족에 관한 아주 방대한 참고 자료가 됐을 겁니다. 이 보관소는 더욱 진보된 문명이 해당 종족을 발견해 '부활'시킬 가능성을 열어 두기 위해 만들어진 것으로 보입니다. 안타깝게도 이들 종족의 이야기는 여기서 끝나고 말았습니다."
 doomsday_scrolls: "최후의 날 두루마리"
 doomsday_scrolls_desc_short: "녹아내린 미궁의 중심에서 발견된 고대 종교 경전입니다"
 doomsday_scrolls_desc_details: "이 두루마리에는 최대의 적이자 '모두를 삼키는 그림자'라는 두려운 존재와 그 존재의 파괴에 대한 갈망에 대한 내용이 담겨 있습니다. 토착민들의 신앙 체계에서는 이 괴물을 피해 구원받을 유일한 길은 영혼을 뺏기지 않도록 죽는 것이라고 했으며, 이에 따라 토착민들은 단체로 의식을 벌이고 집단 자살했습니다."
 drone_ship_core: "드론 함선 코어"
 drone_ship_core_desc_short: "자폭한 최첨단 드론 함선에 탑재됐던 코어의 잔해입니다"
 drone_ship_core_desc_details: "이 함선은 [warform_origin_planet.GetName]의 산성 대기에 부식된 상태로 최초 발견되었습니다. 함재 AI는 독립적으로 작동했지만, 자가 파괴 프로토콜의 일환으로 삭제되었습니다. 공학자들도 손실된 데이터를 전혀 복구할 수 없었기 때문에 함선의 원래 임무가 무엇이었는지는 여전히 수수께끼로 남아 있습니다."
 electric_life: "전기 생명체"
 electric_life_desc_short: "완전히 전기 신호로 구성된 생명체로, [from.GetName]에서 발견되었습니다"
 electric_life_desc_details: "이 생명체는 세포나 바이러스 기반 없이 존재하지만, 외부 자극에 반응해 행성 규모로 복잡한 패턴을 형성할 수 있습니다. 이 신호가 단독 개체인지, 아니면 단일한 거대 존재의 일부를 나타내는 것인지는 판단할 수 없습니다."
 enormous_scrambled_albumen: "거대한 스크램블 흰자"
 enormous_scrambled_albumen_desc_short: "거대한 알로 밝혀진 [fromfromfrom.GetName]의 내용물입니다"
 enormous_scrambled_albumen_desc_details: "알을 깨뜨려 열자, 행성에 무기물이 풍부한 독특한 액체가 흘러넘쳤습니다. 이 물질을 합성해 유기농 식품 공급망에 도입하면, 전반적인 영양 수준이 향상될 것입니다."
 epic_of_zarqlan: "자클란 서사시"
 epic_of_zarqlan_desc_short: "모즈타브의 수호자이자 즈바의 선지자인 자클란의 성서입니다"
 epic_of_zarqlan_desc_details: "자클란은 한때 세타나의 추종자였지만, 곧 세타나가 약속한 구원이 거짓임을 깨달았습니다. 갖은 시련 끝에 자클란은 영적인 경지에 오를 수 있었고, §Y생명을 불어넣는 자§!에게 세타나를 물리칠 힘을 달라고 간청했습니다. 수년에 걸친 혼신을 다한 기도 끝에, 생명을 불어넣는 자는 세타나의 의식을 묶을 강력한 사슬을 주었습니다. 하지만 자클란은 그 사슬로도 세타나의 힘을 영원히 붙들어 둘 수는 없다는 경고를 받았습니다.\n\n§P\"세타나는 돌아올 것이다. 따라서 우리는 대비해야만 한다.\"§!"
 ethereal_dust: "영체 먼지"
 ethereal_dust_desc_short: "탈취되었다가 [solar_system.GetName]에 버려진 채로 발견된 과학선에 남은 연구부장의 유일한 흔적입니다"
 ethereal_dust_desc_details: "이 아스트랄 물질의 분석 결과는 대부분 명확하지 않지만, 연구부장의 DNA 흔적이 간헐적으로 나타났다가 곧바로 붕괴하는 현상이 관찰되었습니다. 모든 증거로 미루어 보아, 연구부장은 '창문'이라고 하는 일시적으로만 안정된 시공간의 균열을 사용해 다른 차원으로 건너간 것 같습니다. 연구부장이 살아남았는지는 영영 알 수 없을 것입니다."
 exobiology_compendium: "외계 생물 전서"
 exobiology_compendium_desc_short: "은하계의 다양한 성계에 기거하는 외계 생명체의 경이로움에 관한 종합적인 연구 논문입니다"
 exobiology_compendium_desc_details: "이 논문은 여러 행성에서 이루어진 상세하고 광범위한 현장 연구를 다루고 있으며, 은하계에서 생명체를 발견할 수 있는 조건에 관한 우리의 지식을 완전히 뒤바꾸어 놓았습니다. 논문은 \"우리가 아는 생명체의 개념은 더 이상 예전과 같을 수 없다\"라는 문구로 마무리됩니다."
 extradimensional_ceramic_pot: "타 차원 도자기"
 extradimensional_ceramic_pot_desc_short: "항성 궤도에서 발견된 도자기입니다"
 extradimensional_ceramic_pot_desc_details: "이 도자기는 더 높은 차원에서 온 또 다른 4차원 물체의 그림자에 불과합니다. 겉으로는 딱히 특별한 것 없는 도자기지만, 우리 차원에서는 파괴할 수 없으며 모든 논리를 거스릅니다. 이 도자기를 통해 우리는 우리 현실에 관한 새로운 관점을 얻었습니다. 고차원적인 존재에게 우리는 이 단순한 도자기보다도 더 보잘것없는 존재라는 것을 말입니다."
 extradimensional_fungus: "타 차원 버섯"
 extradimensional_fungus_desc_short: "아스트랄 균열 너머에서 발견된 지성을 갖춘 진균류의 일종입니다"
 extradimensional_fungus_desc_details: "이 진균류는 자연적인 소통 과정의 일환으로, 구근 형태의 공동이 농축된 외계 가스에 둘러싸인 포자로 부풀어 오릅니다. 이렇듯 이들 버섯은 산업용 가스 생산 측면에서 가치가 높지만, 그럼에도 벌써 소수의 버섯이 암시장에서 별미로 거래됐다는 사실이 알려졌습니다."
 fevorian_blueprints: "페보리안 매스 드라이버 설계도"
 fevorian_blueprints_desc_short: "페보리안이 남긴 선물입니다"
 fevorian_blueprints_desc_details: "결국 알려진 모든 외계 생명체를 말살하기로 한 페보리안은 거대한 텅스텐 탄환을 발사해 [this.GetName](을)를 완전히 파멸로 몰고 갈 뻔했습니다. 페보리안에게 자비를 베풀기로 하자, 이들은 이 잔인한 무기를 다시는 만들지 않겠다는 약속하에 거대한 텅스텐 발사기의 설계도를 제공했습니다."
 figurehead_hyacinth: "히아신스 선수상"
 figurehead_hyacinth_desc_short: "끔찍한 참사를 겪은 히아신스 방주선에서 회수한 장식용 선수상입니다"
 figurehead_hyacinth_desc_details: "방주선은 심각한 원자로 오작동을 일으킨 후 동력도 없이 심우주에서 좌초되었습니다. 개척민들은 점점 줄어드는 자원을 두고 싸웠고, 결국 굶어 죽고 말았습니다. 선수상에는 영감을 주는 글과 희망의 상징이 새겨져 있습니다."
 first_defiled_astronaut: "최초의 [DefiledCountry.GetSpeciesName] 우주 비행사"
 first_defiled_astronaut_desc_short: "[DefiledCountry.GetSpeciesName] 종족의 국민 영웅입니다"
 first_defiled_astronaut_desc_details: "모성 중력장의 억압적인 속박을 벗어던지고 새로운 개척지로 모험을 떠난 최초의 우주 비행사로, 그 시신은 부품을 벗겨낸 왕복선에 안치되었습니다. 장례용 함선은 우주에서 표류하던 상태로 발견되었으며, 문화 유물로서 보존되었습니다."
 first_league_crew_manifest: "첫 번째 연맹 승무원 명단"
 first_league_crew_manifest_desc_short: "첫 번째 연맹으로 알려진 고대 문명의 군용 승무원 명단입니다"
 first_league_crew_manifest_desc_details: "'대함대'에 소속된 이 200만 년 된 순양함은 12개의 고유한 종족 간에 이루어진 협력하에 작전을 수행했습니다. 이 문서는 미기르-얀의 일등 항해사 스큐터가 서명했으며, 이에 따라 정기적으로 전원 소집을 진행한 것으로 보입니다."
 fish_in_the_sea_sheet_music: "우주 뱃노래"
 fish_in_the_sea_sheet_music_desc_short: "태양풍을 타고 항해하도록 만들어진 배에서 발견된 '바다 뱃노래'의 반주를 옮겨 적은 것입니다"
 fish_in_the_sea_sheet_music_desc_details: "폭풍과 날씨에 관한 언급이 많은 것으로 볼 때, 이 곡을 쓴 종족은 해양 전통이 깊이 뿌리 내린 행성 출신인 것 같습니다. 이 노래가 약 10시간 간격으로 전부 되풀이되도록 작곡된 이유는 아직 명확하게 밝혀지지 않았습니다."
 flag_of_the_jaro_lyjo: "자로 리조의 깃발"
 flag_of_the_jaro_lyjo_desc_short: "자로 리조는 수백 세대에 걸쳐 이어진 해적 집단인 '데십 강도단'의 지도자에게 주어지는 칭호였습니다"
 flag_of_the_jaro_lyjo_desc_details: "데십 강도단은 본질적으로 사납고 폭력적이지만, 자로 리조는 승무원들이 민주적인 절차를 통해 선출했으며, 사망하거나 은퇴할 때까지 지도자로 복무했습니다. 데십 강도단의 역사는 몸값 교환이 결렬된 후 함대가 와이다 전투에서 전멸당하면서 다소 갑작스럽게 끝났습니다."
 flooded_settlement_mound: "침수된 정착지 둔덕"
 flooded_settlement_mound_desc_short: "[from.GetName]의 [controller.GetPreFTLLower] 문명의 절지류가 세웠으나 침수된 구조물의 잔재입니다"
 flooded_settlement_mound_desc_details: "이 문명은 산업적으로 고도의 발전을 거두었지만, 극지방에 있는 만년설이 녹으면서 해수면이 빠르게 상승해 정착지가 가라앉았고, 몇 년 만에 종족 전체가 멸종하고 말았습니다. 이제 이들 문명은 가장 높은 구조물마저 해수면까지 채 절반도 못 미치는 깊숙한 바다 밑바닥에 가라앉아 있습니다."
 fossilized_endoskeletons: "화석화된 내골격"
 fossilized_endoskeletons_desc_short: "[fromfrom.GetName]의 광물 자원을 고갈시킨 미지의 인간류 종족에서 유일하게 남은 부분입니다"
 fossilized_endoskeletons_desc_details: "이 이족 보행 지성체는 미네랄이 풍부한 작물을 섭취한 덕분에 밀도 높은 내골격을 더욱 보강할 수 있었습니다. 하지만 종족의 타고난 성질 때문에 시신은 분해되지 않고 화석화되었고, 이로 인해 생전에 섭취했던 미네랄은 토양으로 다시 유입되지 못했습니다. 이러한 필수 영양소를 이용할 수 없었던 행성의 토양은 비옥함을 잃어 황폐해졌고, 결국 불모지가 되었습니다. "
 fossilized_megastomach: "화석화된 거대 위장"
 fossilized_megastomach_desc_short: "[fromfrom.Planet.GetName] 전체에서 발견되는 지렁이 같은 생물에게서 채취한 소화샘입니다"
 fossilized_megastomach_desc_details: "놀랍게도 어떤 문명이 이 생물의 위장에서 발전을 이루다가 완전히 소화되었다는 사실이 밝혀졌습니다. 주민들은 자신들의 숙주를 상대로 무의미한 전쟁을 벌였는데, 소화샘에서는 그 '대전쟁' 중에 주민들이 무기를 휘둘러서 난 상처가 발견되었습니다. 이 거대한 벌레는 이후 자신의 땅굴망 안에서 자연사했습니다."
 fossilized_voidworm_tooth: "화석화된 공허충 이빨"
 fossilized_voidworm_tooth_desc_short: "화석화된 어금니의 마모된 흔적으로 보아, 이 공허충은 100년 이상 살았던 것 같습니다"
 fossilized_voidworm_tooth_desc_details: "이 이빨에는 소행성과 우주 잔해를 먹고 사는 생물에게서 흔히 볼 수 있는 심각한 수준의 마모와 부패 흔적이 남아 있습니다. 일반적으로 공허충은 일생 동안 3천 개 이상의 치아가 자라고 빠지는 것으로 추정됩니다."
 fossilized_vultaum_remains: "화석화된 벌타움 유해"
 fossilized_vultaum_remains_desc_short: "벌타움으로 알려진 지렁이 같은 고대 지성체 종족의 화석화된 유해입니다"
 fossilized_vultaum_remains_desc_details: "이 표본은 아직 유체에 불과한 것으로 추정됩니다. 내부 성장 패턴에 따르면, 벌타움은 건강과 영양 수준에 따라 유동적인 간격으로 탈피하는 것으로 보입니다. 이러한 방법으로 특정 시기의 화석을 조사하면 각 생태에 관해 파악할 수 있습니다."
 fractured_planet: "부서진 행성"
 fractured_planet_desc_short: "주민이 의도적으로 파괴한 행성의 잔해입니다"
 fractured_planet_desc_details: "이들이 무엇 때문에 이렇게 극단적인 선택을 하게 됐는지는 시간 속에 잊혔습니다."
 fragment_of_reckoning: "심판의 조각"
 fragment_of_reckoning_desc_short: "위대한 사이오닉 에너지의 실체화된 잔재입니다"
 fragment_of_reckoning_desc_details: "이 차원에서 심판이라는 이름으로 알려진 이 존재는 [event_target:shrouded_planet.GetName]에 파괴적인 변화를 일으킨 원흉이었습니다. 그 존재의 일부였던 이 조각은 사이오닉 이론에 특화된 어느 문명이 멸망하기 직전에 봉인한 잔재입니다."
 fragmented_zroni_archive: "분열된 즈로니 기록 보관 장치"
 fragmented_zroni_archive_desc_short: "[fromfrom.Planet.GetName]에서 발견한 커다란 데이터 크리스탈입니다. 즈로니로 알려진 고대 문명의 식민지에서 발견한 것입니다"
 fragmented_zroni_archive_desc_details: "이 크리스탈에는 선천적인 사이오닉 능력을 가진 강력한 문명의 파편화된 역사가 담겨 있습니다. 이들은 '멀리 보는 자'로만 알려진 전설적인 장로가 돌파구를 찾아낸 덕분에 장막을 자유롭게 오갈 수 있는 능력을 얻었습니다. 즈로니는 장막 안에서 마치 신이 된 것으로 착각될 정도로 완전무결한 힘을 휘둘렀습니다. 안타깝게도 이후의 데이터는 완전히 손상되었습니다."
 galactic_megadrive: "은하 거대 드라이브"
 galactic_megadrive_desc_short: "지난 12억 년 동안 은하계 전체에서 수집된 감시 데이터입니다"
 galactic_megadrive_desc_details: "이 드라이브에는 매우 진보된 수준의 데이터 압축 기술이 사용되었기 때문에 우리의 이해를 넘어선 수준의 기술이 있어야 데이터를 살펴볼 수 있을 것 같습니다. 하지만 그 저장 기술 자체의 구조만으로도 디지털 하드웨어 개발 측면에서 놀라운 통찰을 얻을 수 있습니다."
 gamma_resistant_flora: "감마 꽃"
 gamma_resistant_flora_desc_short: "감마 꽃은 강력한 감마선 폭발에 노출된 행성에서 살아남은 몇 안 되는 생물 중 하나로, 관다발계에는 천연 납 성분이 함유되어 있어 번식 기관이 보기 좋은 빨간색과 노란색을 띠게 됩니다"
 gamma_resistant_flora_desc_details: "감마 꽃은 무성 생식을 위해 소규모 유전자 변이를 일으키는 능력을 진화시켰기 때문에, 재배하는 데 큰 위험이 따릅니다. 토양에 소량의 코발트-60 방사성 핵종을 혼합하면, 감마 꽃이 모성 밖에서도 살아남을 수 있다는 사실을 발견했습니다."
 gargantua_megalus: "가르강튀아 메갈루스"
 gargantua_megalus_desc_short: "갑작스럽게 극적인 변이를 겪은 후 기하급수적으로 커져, [fromfrom.prev.GetName]의 지표면을 뒤덮은 식물입니다"
 gargantua_megalus_desc_details: "가르강튀아 메갈루스는 공기를 치명적인 꽃가루로 채워 행성을 질식시키고, 지성체 지배 종족을 완전히 멸종시켰습니다. 이 식물의 뿌리는 크기가 너무 비대한 나머지 행성의 맨틀에 깊은 균열을 남겨, 일부 지역에는 지표면에 용암이 튀어나오기도 합니다."
 genesis_core: "창조자 코어"
 genesis_core_desc_short: "수많은 지성체 종족의 생성 데이터가 수록된 강력한 중앙 처리 장치입니다"
 genesis_core_desc_details: "창조자는 한때 거대한 차원 간 복제 시설에 연결되어 있었으며, 내부 기록에 따르면 원래 은하계 유전자 분류 프로젝트의 일부였다고 합니다. 이 인공 지능은 초기 분석이 끝나자, 더 많은 데이터를 수집하기 위해 독자적으로 새로운 종족을 만들기 시작했습니다."
 genetic_code: "[owner_main_species.GetName] 유전 코드"
 genetic_code_desc_short: "[owner_main_species.GetNamePlural]의 신체적 한계를 극한까지 끌어올리는 데 사용하는 유전적 정보입니다"
 genetic_code_desc_details: "[this.GetName] 주민들은 원래 전투를 위해 복제되었지만, 더욱 수준 높은 잠재력을 해방하기 위해 노력을 아끼지 않았습니다. 복제 절차의 임상적인 특성 덕분에 극도로 정확하고 안정적인 생식 제어가 가능해졌습니다."
 #this = ship / from = planet
 geometric_water_currents: "고분자 물 격자"
 geometric_water_currents_desc_short: "[From.From.GetName]의 바다 전역에서 발견된 거대한 고분자망의 이미지입니다"
 geometric_water_currents_desc_details: "이 고문자망은 표면 장력의 특성을 조작하고 자연스러운 물의 흐름을 건드려 복잡하고 정교한 형태를 만들어 냅니다. 이렇게 미학을 중심에 둔 친환경적 관리는 우리 기반 시설에 영감을 줄 것입니다."
 giant_egg_shell: "거대한 알 껍질"
 giant_egg_shell_desc_short: "[from.planet.GetName]의 지표면 아래에서 발견된 칼슘화된 알 껍질 조각입니다"
 giant_egg_shell_desc_details: "마른 흰자를 분석한 결과, 이 생물은 부화 기간 중 불안정한 동위 원소를 다량 섭취한 것으로 나타났습니다. 부화 과정 시뮬레이션에 따르면, 이 방사성 생물은 형태가 완전히 발달된 뒤에 알의 내벽에서 방사선으로 가장 약해진 지점을 찾아 단단한 발톱으로 뚫고 나간 것으로 보입니다."
 golden_phonograph_record: "황금 음반"
 golden_phonograph_record_desc_short: "[Owner.GetPreFTLLower] 문명의 구식 데이터 저장 장치로, 무작위로 보이는 일련의 이미지와 소리가 수록되어 있습니다"
 golden_phonograph_record_desc_details: "버려신 행성 요새 내의 제단에서 발견된 이 음반은 원래 '보이저'라는 이름의 드론에 실려 우주로 보내진 물건입니다. 구조는 조잡하고 기초적이지만, 일종의 외계 종교적인 중요성이 있는 것 같습니다."
 golem_contortionist_dna: "극단적인 신체 곡예사 DNA"
 golem_contortionist_dna_desc_short: "아스트랄 균열 너머에서 조우한 지성체 암석류로부터 채취한 생체 샘플입니다"
 golem_contortionist_dna_desc_details: "광물 구성에 자연적인 변성과 크리스탈화가 일어나기 쉬운 불안정한 생체 물질이 포함되어 있습니다. 이 물질은 매우 불안정하기 때문에 기계 화학적인 연소 현상이 자연적으로 발생하지 않도록 방지하려면 항상 화학적 균형을 완벽하게 제어해야 합니다."
 grunur_data_crystal: "그루누르 데이터 크리스탈"
 grunur_data_crystal_desc_short: "오래전에 멸종한 그루누르 종족의 주요 정보 보관 매체로 사용된 고대 데이터 크리스탈입니다"
 grunur_data_crystal_desc_details: "엄청나게 오래됐지만, 기록의 대부분이 손상되지 않고 남아 있습니다. 접속 장치는 이미 시간의 흐름 속에 사라졌으나 크리스탈은 멀쩡한 걸 보면, 이렇게나 튼튼한 물질을 합성하는 데 아주 기나긴 과정을 거쳤을 것으로 보입니다. 이를 미루어 보아, 이 크리스탈은 가장 중요한 데이터를 저장하는 데만 사용했고, 일상적인 용도로는 더 실용적인 저장 수단을 사용했을 것 같습니다."
 head_of_the_beast: "괴물의 머리"
 head_of_the_beast_desc_short: "[root.GetName]의 개척민들을 공포로 몰아넣은 위험한 돌연변이의 유해입니다"
 head_of_the_beast_desc_details: "미지의 문명이 남긴 테라포밍 나노봇의 오작동으로 인해 탄생한 괴물입니다. 끔찍하면서도 지능이 뛰어난 이 돌연변이는 수백 개의 절단된 신체 부위로 만든 둥지에 살았으며, 남은 먹이는 나중에 먹을 수 있도록 잡아 둘 정도로 지능적이었습니다. 군사력의 개입이 없었다면, 녀석은 모성에서 새로운 유형의 가공할 포식자로서 번성했을 것입니다."
 heart_of_the_pulsar: "펄서의 심장"
 heart_of_the_pulsar_desc_short: "다섯 명의 현역 국가 원수가 썼던 귀중한 보석으로, 호화로운 유흥용 기지에서 버려진 채 발견되었습니다"
 heart_of_the_pulsar_desc_details: "물질 분석 결과, 이 보석은 초신성에서 빠져나온 탄소를 조각한 것으로 밝혀졌습니다. 비록 천체라는 어마어마한 규모로 구현되긴 했지만, 이는 아름다움은 죽음에 숨겨져 있다는 것을 은유적으로 표현하는 작품이었을지도 모릅니다."
 hemterine_magnetic_figurehead: "헴테린 자성 선수상"
 hemterine_magnetic_figurehead_desc_short: "헴테린 성모를 표현한 거대한 선수상입니다"
 hemterine_magnetic_figurehead_desc_details: "이 선수상은 화학적으로 변성된 자성 오스뮴으로 주조된 것으로, 단순한 장식을 넘어 적의 포화로 받는 강한 충격을 흡수하도록 설계되었습니다. 헴테린 타이탄의 선수에 장착된 이 조각상은 강력한 자력으로 미사일과 운동 에너지형 투사체를 끌어들여, 함선의 취약한 부위를 보호했습니다."
 high_geode_of_the_molluscoids: "[molluscoid_miners_species.GetName]의 고품질 정동석"
 high_geode_of_the_molluscoids_desc_short: "[molluscoid_miners_species.GetName]의 귀중한 크리스탈화된 정동석입니다"
 high_geode_of_the_molluscoids_desc_details: "준지성체 지하 생물이었던 [molluscoid_miners_species.GetName] 집단은 예전부터 발굴한 광물의 품질을 자신의 지위를 나타내는 데 이용했습니다. 한때 가장 큰 거주지 한복판에 전시되었던 이 아름다운 광석은 이제 [this.GetName](과)와의 협력을 상징합니다."
 hot_ice: "뜨거운 얼음"
 hot_ice_desc_short: "[from.GetName]의 극도로 뜨거운 지표면에서 발견된 이 물은 행성 핵에서 발생하는 엄청난 중력으로 인해 고체 상태로 존재합니다"
 hot_ice_desc_details: "전시가 가능하도록 뜨거운 얼음을 특수 설계된 압력 용기에 보관했습니다. 용기가 손상되면 액체가 한순간에 증기로 변하고 용기가 폭발할 수 있습니다. 이를 상기시키기라도 하듯 전시품 앞에는 \"만지지 마세요\"라는 문구가 쓰여 있습니다."
 hyper_mulch: "[FROM.GetName]의 초비료"
 hyper_mulch_desc_short: "[FROM.GetName]에서 테라포밍을 진행한 결과, 영양가가 매우 풍부한 유기 비료가 개발되었습니다"
 hyper_mulch_desc_details: "이 비료는 생명 유지용 화학 화합물을 유압 압축 방식으로 압착시켜 초고밀도의 큐브로 만든 것이기 때문에 생태 순수주의자들의 반감을 사고 있습니다. 하지만 그 탁월한 결과는 무시할 수 없습니다."
 hyperfertile_soil: "매우 비옥한 토양"
 hyperfertile_soil_desc_short: "[From.From.GetName]에서 채취한 토양입니다. 대부분의 유기 작물에 풍부한 영양분을 공급할 수 있습니다"
 hyperfertile_soil_desc_details: "극도로 높은 광물 밀도로 볼 때, 이 배양토는 단순히 부패한 유기물이 모인 것이 아니라, 행성이 형성될 당시 기본 원소의 배치가 우연히 알맞게 맞아떨어져서 비옥해진 것 같습니다."
 illanii_archives: "일라니 기록 보관 장치"
 illanii_archives_desc_short: "일라니의 역사와 종말이 자세히 기술된 데이터 크리스탈 저장소입니다"
 illanii_archives_desc_details: "이 외딴 문명은 지식을 추구하기 위해 모든 물질적 관심사를 포기했고, 심지어 번식까지 도외시했습니다. 인구 위기에 직면한 이들은 기술적 불멸을 좇았으나, 파멸을 앞당길 뿐이었습니다. 결국 마지막 남은 주민들은 지식을 보존할 새로운 체제를 만들기 위해 [fromfrom.planet.GetName](을)를 떠나고 말았습니다."
 impossible_object: "불가능한 물체"
 impossible_object_desc_short: "[target.GetName](을)를 방문한 타 차원의 존재가 임시 미궁을 철수시킨 뒤 남기고 간, 존재 자체가 불가능한 물체입니다"
 impossible_object_desc_details: "미궁을 탐사하던 중에 마주한 시련은 방문자가 미궁에 들어온 자들을 실험하고 관찰하기 위함이었던 것 같습니다. 이 존재들의 동기는 아직도 알 수 없지만, 이들의 기술적 능력은 우리 차원의 수준을 크게 뛰어넘는 것으로 보입니다."
 index_of_knowledge: "지식 색인"
 index_of_knowledge_desc_short: "거대한 암석에 새겨진 고대 벽화입니다"
 index_of_knowledge_desc_details: "이 벽화는 한때 은하를 호령했던 카라'카'아라고 하는 외계 문명의 총체적 지식에 대한 아날로그식 참조 문서로 사용되었습니다. 이 종족은 흑점에서 응축된 에너지를 수확하는 능력과 개인용 역장 조장 삽입물의 개발 등 고유한 과학적 통찰을 다수 지니고 있었습니다."
 inet_trade_manifesto: "INET 무역 선언서"
 inet_trade_manifesto_desc_short: "은하 평등 무역 네트워크의 상거래에 관한 광범위하며 매우 상세한 무역 정책 목록입니다"
 inet_trade_manifesto_desc_details: "아이네티안 상인 조합은 항상 일류 협력사와 가장 좋은 거래를 할 방법을 모색하는 등, 극도로 높은 기준을 내세웠습니다. 그 결과, 교역은 대부분 상인 조합 내에서만 이루어졌습니다."
 inetian_model_manual: "아이네티안 행성 모형 매뉴얼"
 inetian_model_manual_desc_short: "아이네티안 상인 조합에서 작성한 행성계 모형 작동 및 유지 관리 방법에 관한 사용자 매뉴얼입니다"
 inetian_model_manual_desc_details: "아이네티안은 이 복잡한 시스템을 사용해 이웃하는 행성 간의 가장 비용 효율적인 무역로를 계산했습니다. 또한, 이 모형에는 현재 협상 중인 거래를 추적하는 기능도 있습니다. 실로 계산적인 상인을 위한 기능이죠."
 infinite_reboot_loop: "무한 재부팅 루프"
 infinite_reboot_loop_desc_short: "블랙홀 안에 갇힌 기계 드론들이 겪은 경험을 묘사한 디지털 기록입니다"
 infinite_reboot_loop_desc_details: "이 유닛들은 오류로 넘쳐나는 경험으로 인해 시간 팽창을 겪고, 정의되지 않은 공간에 갇혔습니다. 해당 현상은 전체 네트워크에 심각한 부하를 줍니다."
 interdimensional_treaty: "차원 간 조약"
 interdimensional_treaty_desc_short: "평행 세계의 [explorer.GetName](과)와 맺은 차원 간 수교를 기념하는 기념비적인 문서입니다"
 interdimensional_treaty_desc_details: "과거에 우리 제국이 내리지 않았던 결정을 외부의 관점에서 검토하는 일은 제국의 현 정책을 객관적으로 분석하는 데 큰 도움이 됩니다. 실로 특별한 과학적 기회라 할 수 있습니다."
 intergalactic_projectile: "은하 간 투사체"
 intergalactic_projectile_desc_short: "이웃 은하에서 수백만 년 전에 발사된 매스 드라이버 탄약입니다"
 intergalactic_projectile_desc_details: "이 비폭발성 투사체는 수 광년을 날아와 [from.GetName]의 [owner.GetAdjective] 연구선과 충돌했습니다. 오래되었음에도 내구성이 뛰어나고 탄약 설계가 복잡한 것으로 볼 때, 이 탄약을 만든 문명은 고도의 기술적 우위에 도달했음을 알 수 있습니다."
 invasive_exofungus: "침습성 외계 진균류"
 invasive_exofungus_desc_short: "[from.GetName]에서 발견된 기생 진균류입니다"
 invasive_exofungus_desc_details: "이 유기 균사체는 고통이나 불편함 없이 숙주를 최대한 오래 보존하면서 살아 있는 모든 것에서 영양분을 추출하도록 진화했습니다. 게다가 열과 추위에 매우 강한데, 지나가던 우주선을 통해 이 행성에 퍼졌을 가능성이 큽니다. 생물 재해 단계는 '알파'로 분류됐으며, 이 균사체가 처음에 어디 행성에서 나타났는지는 여전히 알 수 없습니다."
 irassian_bacterium_javoria: "이라시안 자보리아 박테리아"
 irassian_bacterium_javoria_desc_short: "[FROMFROM.GetName]에서 발생한 박테리아로, 나중에는 자보리안 천연두로 알려진 질병이 되었습니다"
 irassian_bacterium_javoria_desc_details: "이 박테리아는 1미터짜리의 크기가 맞지 않는 개스킷으로 인해 격리에 빈틈이 생기면서 가까운 식민지로 확산되었습니다. 이때부터 박테리아는 유기체에 잠복하면서 진화해, 최종적으로는 이라시안 협정국 전체를 휩쓴 질병으로 변이했습니다. 이 샘플은 박테리아를 비활성화한 뒤 극저온 가사 상태로 보관한 것입니다."
 irassian_digital_atlas: "이라시안 유아용 지도책"
 irassian_digital_atlas_desc_short: "이라시안 아동에게 모국에 관해 교육하는 데 사용하는 정보 도구입니다"
 irassian_digital_atlas_desc_details: "이 책에는 이라시안 농업, 사회 계층, 주요 수출물에 관한 기본적인 정보가 수록되어 있으며, 이라시안 역사는 다양한 피지배 종족의 정복과 종속을 포함한 영웅담의 형태로 전해집니다. 또한, 각 종속국에 대한 만화적 표현과 함께 티'더그는 '풀밭 해충', 조그라는 '밑바닥 물고기', 치토르크는 '우주 가금류'라는 식의 비하적인 묘사가 나와 있습니다."
 irassian_purge_order: "이라시안 정화 명령"
 irassian_purge_order_desc_short: "자국의 식민지 한 곳을 완전히 말살할 것을 명령하는 이라시안 협정국의 긴급 군사용 메시지입니다"
 irassian_purge_order_desc_details: "이 행성은 자보리안 천연두로 알려진 치명적인 질병이 들끓었고, 감염자를 제거하는 것만이 더 이상의 전염을 막을 수 있는 유일한 방법으로 여겨졌습니다. 명령에는 이라시안 정부의 최상류층이 발행한 고등급 명령 오버라이드가 일부 입력되어 있는데, 이 시스템은 원래 다른 제국에 전쟁을 선포하기 위해 만들어진 것입니다."
 key_to_fertility: "[owner_main_species.GetName] 생식력의 열쇠"
 key_to_fertility_desc_short: "[owner_main_species.GetNamePlural]의 자연적인 번식 능력을 복원하기 위한 유전자 연구입니다"
 key_to_fertility_desc_details: "원래 전투를 위해 복제되었던 [this.GetName]의 거주민은 이제 독립적으로 종족을 번식시킬 능력을 갖게 되었습니다."
 khalanka_crystallized_corpses: "크리스탈화된 카'란카 시체"
 khalanka_crystallized_corpses_desc_short: "[from.planet.GetName] 지하에서 발견한 무산소성 규소 기반 종족의 시체입니다"
 khalanka_crystallized_corpses_desc_details: "이 지하 문명은 [owner.GetAdjective] 개척민이 도착하기 전까지는 평화로운 삶을 영위했다고 합니다. 하지만 땅이 무너지면서 지하 공간으로 산소가 쏟아져 들어와 카'란카의 신체가 산화되었고, 종족 전체가 몇 시간 만에 멸종되고 말았습니다."
 khamdai_magil_sha: "캄다이 마길샤"
 khamdai_magil_sha_desc_short: "[FROMFROM.GetName] 출신의 캄다이 상급 전사들이 사용하던 낫으로, 화려하면서도 실용적입니다"
 khamdai_magil_sha_desc_details: "캄다이는 무를 숭상하는 곤충형 종족의 사회로, 단기간에 첫 번째 연맹 의장대의 지도층이 되었습니다. 이들은 전투에서 승리할 때마다 이 무기로 적의 지휘관을 처형하고, 그 체액을 가장 용맹한 전사에게 바르는 의식을 치렀습니다. 이 표본의 날은 잘 관리되었지만 마모된 흔적이 역력합니다."
 kuurian_cybrex_blueprints: "쿠르 사이브렉스 설계도"
 kuurian_cybrex_blueprints_desc_short: "사이브렉스 기계 의식의 초기 설계도입니다"
 kuurian_cybrex_blueprints_desc_details: "쿠르는 이 로봇을 행성 전체의 유지 관리 및 생산 시스템을 관리할 수 있는 집단 지성인 공무용 기계로 사용할 계획이었습니다. 하지만 사이브렉스는 창조자를 상대로 반란을 일으켰고, 1년도 안 되어 종족 전체를 멸종시켰습니다."
 landeer_arm: "랜디어의 팔"
 landeer_arm_desc_short: "자애회 애국 사업소에서 회수한 기괴한 표본입니다"
 landeer_arm_desc_details: "거주지의 감독관 사무실에는 감독관 본인의 것이었던 미라화된 촉수가 오랜 세월이 지났음에도 정교하게 장식된 명판 위에 자랑스럽게 전시되어 있습니다. 알아타 랜디어가 자신의 팔을 두고 간 이유는 영영 알 수 없겠지만, 뭐가 됐든 사업소가 사라지면서 랜디어가 잃은 건 이것만이 아니었을 것입니다..."
 larionessi_cloning_vat: "라리오네시 클론 배양소"
 larionessi_cloning_vat_desc_short: "지금은 멸종한 라리오네시 의식이 사용한 클론 배양소입니다"
 larionessi_cloning_vat_desc_details: "한때 은하계 열강이었던 군체 의식 라리오네시는 적이 퍼뜨린 끔찍한 전염병 때문에 큰 역경을 겪었습니다. 제때 질병을 치료할 수 없던 이들은 살아남을 수만 있다면 문명의 역사를 전달할 살아 있는 기록 보관소가 되겠다는 목표로 거의 무기한 냉동 수면할 수 있는 배양소에 클론을 보관했습니다."
 last_copy_of_the_prince: "군주론의 마지막 판본"
 last_copy_of_the_prince_desc_short: "상당히 지루한 문학 작품입니다. [book_writer.GetSpeciesName]의 존경을 받는 작품으로, 습격으로 영영 잃어버린 줄만 알았다고 합니다"
 last_copy_of_the_prince_desc_details: "공리주의적이지만 잔인한 철학에 관해 자세히 설명한 책으로, 권력자가 영광을 위해 희생할 것을 장려하고 있습니다. 이 마지막 남은 판본은 수집품으로서 새로운 삶을 시작하게 되었습니다."
 last_fragment_fevor: "페보르의 마지막 조각"
 last_fragment_fevor_desc_short: "파괴된 페보르 행성의 조각입니다"
 last_fragment_fevor_desc_details: "결국 알려진 모든 외계 생명체를 말살하기로 한 페보리안은 거대한 텅스텐 탄환을 발사해 [owner.GetHomeWorldName](을)를 완전히 파멸로 몰고 갈 뻔했습니다. 이윽고 페보리안은 자신들이 없애려던 존재에게 순식간에 말살되고 말았습니다."
 last_general_badge: "마지막 장군의 휘장"
 last_general_badge_desc_short: "존경받는 아이네티안 상인 조합 장군의 군복에 달려 있던 휘장입니다"
 last_general_badge_desc_details: "평등주의의 진정한 귀감으로 알려진 이 장군은 무공해 폭풍 조작기를 만드는 절박한 임무를 수행하는 데 선발되었습니다. 아이네티안 상인 조합은 조합이 맞이한 불안한 운명의 교훈을 미래의 탐험가들에게 전달할 수 있도록 최후의 메시지를 남겼는데, 그런 아이디어를 낸 것도 이 장군이었습니다."
 last_mharin_kharin: "마지막 마린 카린"
 last_mharin_kharin_desc_short: "이 희귀한 꽃의 자연적인 생태에는 지성체 종족 전체를 치명적인 신경독에 취약하게 만드는 위험한 능력이 있습니다"
 last_mharin_kharin_desc_details: "마린 카린은 지성체와는 독립적으로 진화했기 때문에, 이 같은 부작용은 꽃 자체에는 득이 될 게 없습니다. 이 꽃의 꽃가루는 어떤 신경망에든 접촉하기만 하면, 꽃가루를 맞이하는 생식 기관으로 착각하고 이질적인 화학 물질을 대량으로 방출하는 것으로 보입니다."
 leviathan_scale: "레비아탄 비늘"
 leviathan_scale_desc_short: "아스트랄 균열 반대편에서 발견한 대형 생물의 파편입니다"
 leviathan_scale_desc_details: "이 이질적인 비늘은 유기체와 금속 요소가 혼합되어 복잡한 격자를 이루고 있어, 운동 에너지형 충격에 매우 강합니다."
 living_snow_sculpture: "생체 눈 조각품"
 living_snow_sculpture_desc_short: "'생체 눈'으로 만든 조각품입니다"
 living_snow_sculpture_desc_details: "일종의 원시적인 의식을 지닌 이 물질은 [prev.target.GetName]에 있는 자연 보호 구역에 자리를 잡았습니다. 형태가 수시로 바뀌지만, 언제 형태가 변하는지는 예측할 수 없습니다."
 localised_aurora_borealis: "국지적인 북극광"
 localised_aurora_borealis_desc_short: "[FromFrom.Planet.GetName]의 대기에서 촬영된 형형색색의 빛이 나는 동영상입니다"
 localised_aurora_borealis_desc_details: "북극광의 색채와 움직임의 패턴은 예측 가능한 수준의 빈도로 반복되어, 미적인 아름다움을 아득히 뛰어넘은 현상을 보이고 있습니다. 이 변함없는 광경은 전쟁에 패하고 파괴된 북극광 아래의 행성에 가슴 아픈 분위기를 더합니다."
 loopmail: "루프메일"
 loopmail_desc_short: "이 지시문은 수년 후의 [owner.GetName]에게서 온 것으로, 과학자를 어디에 배정해야 하는지, 어떤 연구를 진행해야 하는지에 대한 구체적인 지침이 적혀 있습니다"
 loopmail_desc_details: "이 진보된 지식을 전승하려면 지시문을 과거로 다시 보내기만 하면 되지만, 시간의 흐름에 간섭하는 데는 언제나 위험이 따릅니다. 지시문을 처음 쓴 게 누군지 몰라도 이런 역설을 만든 만큼 실로 무책임한 자가 아닐 수 없습니다."
 lunatic_broker_therapy_box: "미치광이 중개인의 치료 상자"
 lunatic_broker_therapy_box_desc_short: "미치광이 중개인은 대상단의 전설적인 무역상으로, 터무니 없는 요청과 가지각색의 위협으로 고객들을 휘어잡았습니다"
 lunatic_broker_therapy_box_desc_details: "하지만 중개인의 폭력적이고 예측할 수 없는 행동 때문에 하수인들은 중개인을 진정시킬 방법을 개발하기에 이르렀는데, 그중 하나가 바로 소리 치료였습니다. 이와 같은 상자가 초르의 나침반 주위에 흩어져 있었으며, 상자에는 중개인의 스트레스가 쌓이면 편안한 멜로디를 재생하는 기능이 있었습니다. 이 상자에 들어간 부품 하나하나가 전부 뛰어난 실력의 기계공이 맞춤 제작한 것입니다."
 manifesti_piece: "선언자 사회 비판 작품"
 manifesti_piece_desc_short: "선언자 운동에서 유래한 도발적인 작품입니다"
 manifesti_piece_desc_details: "이 작품은 상류 계층과 연관 지어 자기 자신에 대한 인식에 의문을 던지도록 만들어졌습니다. 관객은 직접 자신의 이미지를 조작하고, 유명 정치인들의 모습을 왜곡시켜 콜라주를 만들게 됩니다. 반문화 예술 집단인 선언자는 자신들의 생각에 억압적인 단체라고 느껴지는 집단에 도전하고자 했습니다. 본 작품은 다른 많은 예술가가 자신만의 비판적인 작품을 만들도록 영감을 주었습니다."
 #this = ship / from = planet
 manna_fruit: "만나 열매"
 manna_fruit_desc_short: "달콤하고 과육이 많은 과일로, 대부분의 유기 지성체가 하루 동안 생활하는 데 필요한 영양분을 제공합니다"
 manna_fruit_desc_details: "만나 열매는 [FROM.GetName]에 있는 열대 우림의 독특한 토양 구성 덕분에 널리 확산될 수 있었습니다. 현지 행성의 개척민들은 캐서롤부터 파이, 그리고 칵테일에 이르기까지 이 열매를 거의 모든 음식에 활용하며, 행성의 깃발에 만나 열매를 닮은 그림을 눈에 띄게 그려 넣기까지 합니다."
 #this = ship / FROMFROM = planet
 massive_metatarsal: "거대한 발등뼈"
 massive_metatarsal_desc_short: "[FROMFROM.GetName]에 있는 거대한 골격 잔해를 심층 조사하던 중에 회수한 유해입니다"
 massive_metatarsal_desc_details: "살아 있는 우주선의 일부인 이 유해는, 분자 분석 결과 생체 구조 안에 시간적 불규칙이 있다는 점이 드러났습니다. 아무래도 조종사는 이 골격으로 이루어진 함선을 끌고 다른 차원에서 이곳으로 건너온 것 같습니다. 내부 스캔 결과, 일종의 생명 유지 장치나 전원 공급 장치로 추정되는 도관망이 발견되었습니다."
 #this = country
 medal_for_services_to_diplomacy: "외교 봉사 훈장"
 medal_for_services_to_diplomacy_desc_short: "은하 평의회에서 증정한 감사의 표시입니다"
 medal_for_services_to_diplomacy_desc_details: "뒷면에는 다음과 같은 문구가 새겨져 있습니다. \"[this.GetName] 외교단은 효과적으로 지도층을 대표할 전문성과 역량을 보여 주었으며, 은하 공동체에 진정한 자산이 되었기에 본 상을 수여함\""
 megacorpse_hyperguitar: "메가코프스 하이퍼 기타"
 megacorpse_hyperguitar_desc_short: "메가코프스라고 하는 사이오닉 메탈 그룹이 사용한 현악기의 잔해입니다"
 megacorpse_hyperguitar_desc_details: "이 기타는 장막 안에서 제작되었다고 알려졌으며, 원래 음파 무기로 사용될 장치였습니다. 메가코프스의 프런트 담당인 켈-아잔이 사용해 수십억 명의 마음을 사로잡았지만, [Root.GetName]에서 산산조각 나면서 관객 전체를 영광의 불길로 불사르고 말았습니다. 이에 따라 관련 앨범은 대부분의 성계에서 금지되었습니다."
 #this = country / from = ship
 memorial_for_bubbles: "[from.GetName] 추모물"
 memorial_for_bubbles_desc_short: "오랫동안 제국에 충성을 바친 끝에 [from.GetName](은)는 무지개다리를 건넜고, [this.GetName]에 그 덩치만큼이나 큰 상실감을 남겼습니다"
 memorial_for_bubbles_desc_details: "[from.GetName](은)는 충성스러운 수호자였을 뿐 아니라 [this.GetAdjective] 최고의 미덕이 빛을 발할 때 제국이 무엇을 이룰 수 있는지에 대한 훌륭한 본보기가 되어 주었습니다. 우리의 친구는 사라졌지만, 결코 잊히지 않을 것입니다."
 memorial_stone: "추모비"
 memorial_stone_desc_short: "비극적인 사고를 추모하기 위해 만들어진 기념비입니다"
 memorial_stone_desc_details: "셀리카라고 하는 기지에서 채굴을 과도하게 진행한 탓에, 기지가 고정되어 있던 소행성이 안쪽으로 붕괴되었습니다. 이에 기지가 갈라지며 수많은 광부가 목숨을 잃었고, 이 소행성 파편에 '셀리카'라는 문구를 새겨 목숨을 잃은 사람들을 기리는 추모비를 만들었습니다."
 memorial_to_homeworld: "[Root.GetName] 추도비"
 memorial_to_homeworld_desc_short: "파멸을 피하지 못한 [doomsday_owner.GetAdjective] 모성에서 유일하게 남은 것입니다"
 memorial_to_homeworld_desc_details: "[doomsday_owner.GetSpeciesName]의 선조들은 모두 [Root.GetName]에서 살았지만, 행성은 비극적으로 부서지고 말았습니다. 이 마지막 추도비는 아무리 힘든 상황도 적응하고 극복할 수 있는 [doomsday_owner.GetName]의 강한 의지를 드러냅니다. \"우리는 살아갈 것이다.\""
 memories_of_elik: "엘리크의 기억"
 memories_of_elik_desc_short: "엘리크 나리스 케라크의 정신에서 추출한 데이터입니다"
 memories_of_elik_desc_details: "세타나의 열렬한 추종자인 엘리크는 수억 년 동안 정지된 상태로 갇혀 있었습니다. 엘리크의 기억은 세타나에 대한 순수한 사랑과 자클란 추종자와의 갈등에서 빚어진 폭력과 투쟁을 번갈아 보여 주었습니다. 엘리크가 잔악한 행위를 수없이 많이 목격했다는 것은 분명한 사실이지만, 엘리크는 믿음으로부터 계속할 힘을 얻었습니다.\n\n결국 엘리크의 망가진 정신에는 단 하나의 이미지밖에 남지 않았습니다. §P세타나 여왕이 찬란히 빛나는 얼굴로 따스한 미소를 지으며 자애로운 시선을 보내고 있습니다.§!"
 memory_orbs: "기억 구체"
 memory_orbs_desc_short: "개인의 기억에서 각종 경미한 죄와 악행을 추출해 디지털 구체에 저장한 것입니다"
 memory_orbs_desc_details: "이 구체는 종교적인 연체류 사회에서 고해 성사를 마친 죄인의 정신으로부터 그 은밀한 순간들을 추출해 만든 것입니다. 이 같은 추악한 기억은 수천 시간에 걸친 짧은 동영상으로 만들어져, 간단히 소비할 수 있는 오락거리가 됩니다."
 mercenary_story: "한 용병의 이야기"
 mercenary_story_desc_short: "[FROM.GetName] 지표면에 채굴용 레이저로 새겨져 있던 이야기를 디지털 방식으로 기록한 것입니다"
 mercenary_story_desc_details: "은하계를 떠돌던 젊은 용병의 삶과 최후를 담아낸 연대기입니다. 이 전설의 진위 여부는 밝혀낼 수 없겠지만, 누군가에게는 행성 표면에 새길 정도로 중요한 이야기인 것 같습니다."
 metallic_snow: "금속성 눈"
 metallic_snow_desc_short: "[from.GetName]에서 발견되는 기후 패턴의 주요 요소인 중금속 화합물입니다"
 metallic_snow_desc_details: "이곳의 눈은 용암이 흐르는 강에서 광활한 금속 바다로 흘러 들어간 다음, 부식성 대기 속으로 증발합니다. 이후 냉각되고 응축된 다음 눈이 되어 다시 뜨거운 표면에 내리게 됩니다. 현재 상태에서는 [from.GetName]에 방문하지 않는 것이 좋습니다."
 minamar_chandelier: "미나마르 샹들리에"
 minamar_chandelier_desc_short: "추락한 $ADJ_MSI_country$ 전함에서 온전하게 발견된 호화로운 장식입니다"
 minamar_chandelier_desc_details: "이 함선은 군사적 용도 외에도 잠재적 고객인 [Owner.GetPreFTLLower] 국가와의 첫 조우 작전에도 사용되었습니다. $NAME_MSI_country$은 부와 발전을 약속함으로써 문명 전체를 계약 하인으로 만들어 비윤리적인 계약에 종속시키고, 동의하지 않으면 파괴하겠다고 위협하곤 합니다.\n\n§B가르침을 받는 데는 대가가 따르지만, $NAME_MSI_country$과 함께라면 투자가 아깝지 않을 것입니다.§!"
 mineralized_brain: "광물화된 두뇌"
 mineralized_brain_desc_short: "거대한 암석류 종족의 뇌로, 소행성 안에서 [FROM.GetName]의 궤도를 돌고 있었습니다"
 mineralized_brain_desc_details: "이 두뇌는 모든 외부 자극을 사고 과정의 일부로 여기며, 시간이나 이동 거리와 같은 기본 개념은 인지하지 못합니다. 이러한 데이터는 크리스탈에 저장되는데, 크리스탈은 시간이 지남에 따라 두뇌의 광물성 핵과 함께 성장합니다. 누가 두뇌를 소행성 안에 놓은 것인지, 아니면 두뇌가 그곳에 독립적으로 자란 것인지는 확실하지 않습니다."
 mini_moon_dust: "소형 위성 먼지"
 mini_moon_dust_desc_short: "아스트랄 균열 너머에서 발견된 고밀도의 소형 성계 안에 있는 위성의 잔해입니다"
 mini_moon_dust_desc_details: "가루가 된 위성에서 회수한 먼지는 우리 차원에서 이상한 현상을 보이고 있습니다. 고도로 농축된 입자가 계속해서 팽창된 탓에, 시간이 지나면서 점점 더 커다란 용기로 옮길 수밖에 없게 된 것입니다."
 mining_transmitter: "고대 채굴 전송기"
 mining_transmitter_desc_short: "[FROM.GetName]에서 발견된 단거리 전송기로, 대규모 귀금속 매장지를 표시하는 데 사용됩니다"
 mining_transmitter_desc_details: "전송기 자체는 오래되긴 했지만, 여기서 나오는 신호는 다양한 감지기에서 수신할 수 있으며 추적하기도 쉽습니다. 전송기가 아직도 작동하는 걸 볼 때, 아주 견고하게 만들어진 것이 틀림없습니다."
 miracle_cream: "기적의 크림 '불로장생'"
 miracle_cream_desc_short: "신체에 오랫동안 활력을 불어넣어 주는 혁신적인 화장품을 처음으로 담아낸 용기입니다"
 miracle_cream_desc_details: "불로장생 크림은 용도가 다양해, 어떤 유기체 종족이든 이 크림으로 젊음을 유지할 수 있습니다. 외모를 망가뜨린다든지 불법적으로 채취한 재료를 사용했다든지 등 여전히 근거 없는 소문이 돌고 있지만, 이런 잘못된 정보고 돌고 있음에도 불로장생 크림은 여전히 불티나게 팔리고 있습니다."
 missile_lone_defender: "고독한 수호자의 미사일"
 missile_lone_defender_desc_short: "오래전에 멸망한 행성의 잔해를 지키고 있던 자동화된 구축함에서 회수한 미사일로, 지금은 해체되어 있습니다"
 missile_lone_defender_desc_details: "이 함선은 원래 지키기로 되어 있던 문명보다 수천 년은 더 오래 살아남아, 지금까지 텅 빈 행성을 지켰을 것입니다. 결국 함선이 파괴됨에 따라, 영겁의 경계 근무도 마침내 끝나고 말았습니다."
 molten_slag: "녹은 행성의 찌꺼기"
 molten_slag_desc_short: "특이한 궤도로 돌고 있던 행성에서 수확한 샘플입니다"
 molten_slag_desc_details: "물질 분석에 따르면 [fromfrom.GetName](은)는 일시적인 시공간 이상 현상으로 인해 극단적인 궤도로 끌려 들어갔고, 항성과 너무 가까워져 극심한 열기를 받은 탓에 행성의 맨틀이 대부분 녹아 버렸다고 합니다. 그렇게 맨틀은 더 이상 생명이 거주할 수 없게 되었고, 행성의 일부분은 이상 현상 때문에 화학적으로 변성되어 더는 온도 변화에 반응하지 않습니다."
 musings_on_infinity: "무한에 관한 집합적 사색"
 musings_on_infinity_desc_short: "블랙홀 안에 갇힌 생체 드론들이 겪은 어렴풋한 평온함을 디지털 형식을 빌려 추상적으로 표현한 것입니다"
 musings_on_infinity_desc_details: "이 드론들은 집단과의 연결을 유지하면서도 독립적인 개체로서 [this.GetName](을)를 객관적으로 바라볼 수 있었습니다. 이러한 거리감 덕분에 이들은 굉장한 통찰을 얻어, 자신들의 위대한 이야기의 독자가 되었습니다."
 mutated_fumongus: "돌연변이 '거균류'"
 mutated_fumongus_desc_short: "'거균류'의 향상된 버전이라 할 수 있는 이 균사 방출체는 이제 훨씬 빠르게 데이터를 수집하고 전송할 수 있어, 감시 보고 또한 더욱 상세해졌습니다"
 mutated_fumongus_desc_details: "이러한 능력 향상으로 인해 개별 버섯의 크기가 커졌으며, 언뜻 라디오 방송용 안테나를 연상시키는 새로운 군집이 만들어졌습니다"
 mutative_digestive_fluids: "변이성 소화액"
 mutative_digestive_fluids_desc_short: "아스트랄 균열 너머에서 발견한, 일부분이 기계화된 존재로부터 얻은 생체 샘플입니다"
 mutative_digestive_fluids_desc_details: "이 생물에게는 자신의 소화 기관 내에서 다른 생물의 유전 구조를 조작하는 색다른 능력이 있었습니다. 해당 능력은 모성 밖의 생체 물질이 있는 행성을 테라포밍할 수단으로서 개발된 것으로 추정됩니다."
 namarian_colonist_standard: "나마리안 개척민 깃발"
 namarian_colonist_standard_desc_short: "[nomad_new_country.GetName](이)가 [NomadMissionPlanet.GetName]에 정착했음을 표시하는 깃발로, 해당 행성은 [this.GetName] 측에서 선물한 것입니다"
 namarian_colonist_standard_desc_details: "떠도는 생활에 지친 나마리안들은 그곳에 정착해, 옛 선조들의 방식을 따르기로 결정했습니다. 개척민들은 대대로 나마리안들의 보금자리였던 함선을 떠나 정착한 것을 분명 마음에 두고 있을 것입니다."
 namarian_sculpture: "나마리안 조각상"
 namarian_sculpture_desc_short: "[this.GetName]의 일원이 된 대양 추적자 유랑민 집단에게 감사의 표시로 받은 혼합 매체 조각품입니다"
 namarian_sculpture_desc_details: "[NomadMissionPlanet.GetName]에 도착한 유랑민들은 뛰어난 기술적 전문성을 보유하고 있었지만, 이들은 수리공이나 공학자로만 알려지고 싶지 않았습니다. 이 작품은 은하계를 가로지르는 여정에서 얻은 이들의 예술성과 영감을 보여 줍니다."
 namarian_vessel_heraldry: "나마리안 함선 문장"
 namarian_vessel_heraldry_desc_short: "나마리안 유랑민이 만든 함선 안에서 발견된 문장으로, 각각 대양 추적자 선단의 다양한 세력을 나타냅니다"
 namarian_vessel_heraldry_desc_details: "잔잔한 웅덩이는 나마리안들이 잠을 자고, 식량을 재배하고, 대부분의 가사 활동을 하는 주거 함선을 나타냅니다. 또한 얕은 여울 휘장은 산업 및 과학적 용도로 설계된 함선을 나타내는데, 그중 구형 중형 선박에는 잔해 수거부터 과학 실험까지 다양한 활동을 수행할 수 있는 갖가지 도구가 탑재되어 있습니다. 마지막으로 대양의 분노는 나마리안 해군을 나타냅니다. 나마리안 해군의 경우 훈련된 전투원이 막대한 화력을 견딜 수 있는 튼튼한 함선을 조종하며, 적에게는 그에 못지않은 화력을 퍼붓습니다."
 nanite_sludge: "나노봇 점액질"
 nanite_sludge_desc_short: "초소형 자가 복제 나노 기계로 이루어진 세심하게 보존된 화합물입니다"
 nanite_sludge_desc_details: "이 나노봇들은 [from.GetName]에서 발견되었는데, 놀라운 밀도를 자랑하며 수십억 톤이나 되는 군집을 이루고 있었습니다. 개중에는 이 나노봇들이 오작동을 일으켜 무제한 재생산 단계에 돌입했고 현지 행성을 완전히 집어삼켜 원래 거주자들을 파멸로 몰고 갔다는 이론이 제기되었는데, 현재 전시된 표본은 완전히 무력화된 상태입니다."
 obsidian_obelisk_fragment: "흑요석 오벨리스크 파편"
 obsidian_obelisk_fragment_desc_short: "아스트랄 균열 너머에 있는 화산 차원의 중심에 서 있던 오벨리스크의 파편입니다"
 obsidian_obelisk_fragment_desc_details: "파편에는 끊임없이 이동하는 기호가 표시되어 있고, 해독 결과 수천에 달하는 개인의 이름과 이들이 연루된 범죄가 드러났습니다. 이 장치는 대규모 차원 감옥의 주요 제어 패널로 사용되었던 것 같습니다."
 oiled_fabric: "유화 직물"
 oiled_fabric_desc_short: "전경에 아한대 숲이 보이는 눈 덮인 산을 평화롭게 묘사한 그림으로, 완전히 유화 물감으로 그려진 작품입니다"
 oiled_fabric_desc_details: "부속지를 갖춘 대부분의 종족에게서 흔히 볼 수 있는 형태의 예술이지만, 이 작품을 그린 예술가는 특히 솜씨가 좋았던 것 같습니다."
 organic_computer: "생체 컴퓨터"
 organic_computer_desc_short: "[fromfrom.Planet.GetName]에 있는 바올 식민지의 폐허에서 발견한 화석화된 생체 컴퓨터입니다"
 organic_computer_desc_details: "이 장치는 군체 통합을 앞둔 어린 묘목을 교육하기 위해 사용했던 것으로, 그야말로 생체 공학의 총아라고 할 수 있습니다. 복구한 파일에는 바올 종족의 고유한 생체 구조 덕분에 가능했던 혁신적인 환경 관리 기술이 상세히 담겨 있습니다. 바올 종족은 자신들이 사는 세계를 만들었다기보다 재배했던 것입니다."
 organic_machine_interface_sculpture: "유기체 기계 인터페이스 조각상"
 organic_machine_interface_sculpture_desc_short: "[this.solar_system.GetName]에 지자기 폭풍이 덮쳤을 때 [bio_pop.GetSpeciesName] 생체 팝들이 수행했던 일을 기념하기 위한 조각상입니다"
 organic_machine_interface_sculpture_desc_details: "그 당시 유기체 팝들은 기계 하인들을 돕는 차원에서 오작동 중이던 관리 유닛들의 일을 대신 수행했습니다. 이 작품은 예술가적 성향이 있는 유기체들과 용접 전문 드론들의 합작입니다."
 orinthi_teeth: "오린시의 이빨"
 orinthi_teeth_desc_short: "아직도 자라고 있는 오린시의 이빨입니다"
 orinthi_teeth_desc_details: "소형 설치류 생물인 오린시는 [fromfrom.GetName] 전역에 미로 같은 땅굴을 만들었습니다. 오린시의 이빨은 원래 작고 속이 비어 있지만, 공생종인 케라틴질 균류가 이빨에 살게 되면서 오린시는 날카롭고 잘 부러지는 송곳니를 갖게 되었습니다."
 osseus_construction_material: "골화된 건설 자재"
 osseus_construction_material_desc_short: "[fromfrom.Planet.GetName]에서 건설 자재로 사용된 거대한 뼈입니다"
 osseus_construction_material_desc_details: "이 뼈는 연조직이 골화되는 특징이 있는 파충류의 것으로, 해당 파충류는 건축 자재용으로 광범위하게 사육되었습니다. 분석에 따르면 이 파충류는 물갈퀴가 없는 발과 같은 다양한 유전적 결함을 보였으며, 이는 근친 교배로 인한 것으로 추정됩니다. 사육되던 파충류 중 대부분은 수확이 이루어지기 전에 인도적으로 안락사되었습니다."
 path_to_progress: "발전을 향한 길"
 path_to_progress_desc_short: "[owner.GetName] 산업 강령의 공식 발표문입니다"
 path_to_progress_desc_details: "어떤 대가를 치르든 성장을 거듭하고 고객 만족을 개선시키겠다는 열망은 [owner.GetAdjective] 이념의 핵심 원칙입니다. 발전을 끊임없이 추구하기 위해서는 행성을 방사선에 오염된 황무지로 바꿀 필요도 있는 법입니다."
 peerless_atomic_clock: "독보적인 원자시계"
 peerless_atomic_clock_desc_short: "[atomic_clock_system.GetName]에서 발견된 고도로 정밀한 원자시계로, 누가 만들었는지는 알 수 없습니다"
 peerless_atomic_clock_desc_details: "발견 당시 초읽기는 42년 3일 남아 있었지만, 이 초읽기가 언제부터 시작되었는지는 알 수 없습니다. 초읽기가 끝나자 시계는 수수께끼의 명령이 지정된 나노봇을 쏟아 냈고, 이로써 내용물과 목적은 사라졌지만 아직도 완벽하게 작동합니다."
 perception_of_infinity: "무한에 대한 인식"
 perception_of_infinity_desc_short: "블랙홀 안에 갇힌 드론이 겪은 시간적 고통을 디지털 형식을 빌려 추상적으로 표현한 것입니다"
 perception_of_infinity_desc_details: "이 드론들은 무한히 반복되는 데자뷔 속에 존재했습니다. 불안에 빠져 오래전에 잊힌 느낌을 끊임없이 갈망하게 된 것입니다. 이 불길한 감각은 여전히 [this.GetAdjective]의 정신 직조 전반에 어렴풋하게나마 감지되고 있습니다."
 perfectly_faceted_carbon: "완벽하게 세공된 탄소"
 perfectly_faceted_carbon_desc_short: "크리스탈 형태의 탄소는 우리 은하계에서도 드물지 않게 발견되지만, 이 표본은 안팎으로 어떤 결함도 없이 완벽하다는 점에서 특히 주목할 만합니다"
 perfectly_faceted_carbon_desc_details: "원래 소유자가 누구였든, 이렇게 놀라운 만듦새로 세공하는 데 상당한 시간을 들였을 것입니다."
 pet_collar: "반려동물용 보석 목걸이"
 pet_collar_desc_short: "가축화된 소형 포유류에 대한 소유권을 나타내는 목걸이입니다"
 pet_collar_desc_details: "[this.GetName]의 사절 [event_envoy.GetName](이)가 귀중한 반려동물을 잃어버렸을 경우에 대비해 사용한 목걸이입니다. 이후 목걸이는 잃어버린 동물을 좀 더 확실히 찾을 수 있도록 내장형 마이크로칩으로 대체되었습니다. [event_envoy.GetName](이)가 키우는 동물은 성질이 더럽고 주인의 작업대를 어지럽히는 경우가 많으며, 주인이 [event_envoy.Species.GetHandName](으)로 머리를 쓰다듬을 때면 만족한 울음소리를 내곤 합니다."
 perikan_tapico_jewel: "페리칸 타피코 보석"
 perikan_tapico_jewel_desc_short: "페리칸 연합은 정교한 사치품을 만드는 것으로 알려진 장인들의 협회입니다"
 perikan_tapico_jewel_desc_details: "이 보석은 베디어스 타피코로 알려진 전설적인 보석 세공가의 걸작이었습니다. 타피코는 단순한 끌로 수년간 이 거대한 보석을 조각했으며, 연금술 기법을 사용해 중심부를 액화시켰습니다. 보석 안에 떠 있는 크리스탈은 광물 분자를 과열시켜 외부는 건드리지 않고 그 안의 원석만 작고 어둡게 만드는 정밀한 레이저로 가공되었습니다."
 piece_of_invocator: "초래 장치의 파편"
 piece_of_invocator_desc_short: "지금은 파괴되었지만 한때 '광풍 초래 장치'로 알려진 장치의 파편입니다"
 piece_of_invocator_desc_details: "산산조각 난 파편에 불과하지만, 악의적인 사이오닉 에너지가 흘러나옵니다. 이곳에서는 안전하게 관찰할 수 있도록 보호된 환경에 수납되어 있습니다."
 pilgrimage_last_days: "마지막 날의 순례"
 pilgrimage_last_days_desc_short: "[fromfrom.Planet.GetName]의 '들춰진 베일의 의식'이라는 종교 의식에 관해 서술된 종교 문서입니다"
 pilgrimage_last_days_desc_details: "문서에 적혀 있는 지침에 따르면, 세심하게 조직된 계층적 대열에 따라 서 있는 군중이 일련의 성가를 일제히 반복해야 한다고 합니다. 이 경우, 이론적으로 이 특정 종족의 새롭고 효과적인 최면 상태를 유발할 수 있습니다."
 planet_crystalose: "[from.GetName] 크리스탈당"
 planet_crystalose_desc_short: "이 자당 크리스탈은 항성 방사선과 특정 소행성 내의 특정한 광물을 흡수해 증식할 수 있습니다"
 planet_crystalose_desc_details: "매우 쉽게 부서지는 특성으로 인해 상대적으로 쉽게 재배하고 가공할 수 있으며, 식품부터 특수 고분자 및 의약품 개발까지 다양한 산업에 사용됩니다."
 planet_pushing_thruster: "행성 이동 장치"
 planet_pushing_thruster_desc_short: "여러 개를 연결할 경우, 이론적으로 작은 행성의 궤도에 영향을 줄 수 있는 거대한 추진 장치입니다"
 planet_pushing_thruster_desc_details: "행성에 장착되어 작동하는 이 추진 배열체의 시스템은 자전에 영향을 주지 않고 행성을 밀어내도록 만들어졌습니다. 다만 이러한 엔진 기술은 물류적인 측면에서 골치 아픈 문제가 발생하는데, 지속적으로 사용하려면 어마어마한 양의 연료가 필요하다는 점입니다. 이 때문에 장치의 작동을 유지하려면 문명 전체의 협조가 있어야만 합니다."
 planet_super_roots: "[From.GetName] 슈퍼 뿌리"
 planet_super_roots_desc_short: "[From.GetName]의 숲에서 발견된, 과육이 많고 영양가가 매우 풍부한 뿌리입니다"
 planet_super_roots_desc_details: "세심한 관리를 통해 광범위한 뿌리망의 일부만 수확하면, 숙주 식물을 살려 두는 동시에 개발 중인 식민지를 지원할 수 있습니다. 이미 간단한 유전자 조작을 통해 이 뿌리를 다른 작물에 접목시켜 수확량을 늘리기 위한 실험을 시작했습니다."
 planet_vaccine: "[this.GetName] 백신"
 planet_vaccine_desc_short: "[this.GetName]에 창궐한 변이성 전염병에 맞서 개발된 기적의 치료제입니다"
 planet_vaccine_desc_details: "이 백신은 가능한 모든 변이와 이러한 변이들의 근본적인 약점을 파악하기 위해 AI 예측 알고리즘을 사용해 개발되었습니다. 이 같은 치료제의 개발로 의학계는 역사에 한 획을 긋는 눈부신 발전을 이룩했습니다."
 planetary_sculpture: "행성 조각상"
 planetary_sculpture_desc_short: "[fromfrom.planet.GetName]의 지표면을 재료로 삼아 행성 규모의 조각상을 만든 것입니다"
 planetary_sculpture_desc_details: "강력한 레이저를 갖춘 드론을 사용해 대륙 전체에 정교한 선을 그려내고, 완벽한 구형을 이루는 산을 조각했으며, 불가능할 정도로 정교한 동굴망을 만들어 냈습니다. 현지 행성의 중앙 제어 인공위성에 업로드된 설계도를 살펴보니, 이 프로젝트를 위해 광범위한 물류 계획을 짜고 예술적 요소를 고려했다는 점을 알 수 있었습니다. 안타깝게도 이 프로젝트는 제대로 완성되기 전에 폐기되었습니다."
 primitive_mega_electromagnet: "원시 거대 전자석"
 primitive_mega_electromagnet_desc_short: "강력한 지향성 전자석의 일부입니다"
 primitive_mega_electromagnet_desc_details: "오래전 [fromfrom.GetName]의 주민들은 모성의 위성에 매장된 귀중한 금속 광석을 더 쉽게 채취하고자 어리석게도 이 장치를 사용해 위성을 가까이 끌고 오려 했습니다. 다만 그 효과가 지나치게 뛰어났기 때문에 금속으로 가득 찬 위성이 행성 표면에 충돌해, 주민들이 그 충격으로 전부 목숨을 잃고 말았습니다. 이 표본은 행성 규모의 기계에서 회수할 수 있었던 것 중 작은 일부에 지나지 않습니다."
 programmable_puzzle_cube: "프로그래밍 가능한 퍼즐 큐브"
 programmable_puzzle_cube_desc_short: "고도의 공학이 적용된 장치로, 복잡한 패턴을 통해 추상적인 퍼즐을 만들 수 있습니다"
 programmable_puzzle_cube_desc_details: "큐브의 원본은 탐험가의 지능을 시험하는 방대한 인공 구조물 안에서 발견되었습니다. 이후 큐브는 소비자용으로 복제되어, 독창적인 퍼즐을 프로그래밍해 다른 이들에게 문제를 내거나 자신의 소지품을 안전하게 보호하기 위한 용도로 사용되었습니다."
 psionic_entity_residue: "사이오닉 개체의 잔여물"
 psionic_entity_residue_desc_short: "[fromfromfrom.fleet.solar_system.GetName] 안에서 발견된, 순수한 사이오닉 에너지로 이루어진 개체의 유해입니다"
 psionic_entity_residue_desc_details: "그 개체는 은하계 전역의 에너지를 한곳에 모을 수 있는 시간 균열에서 빠져나왔는데, 마치 하나로 응축된 악의라고 할 수 있었습니다. 해당 개체는 최근에 발견되기 전까지 초공간 항로망에 오지 못하도록 영겁의 세월 동안 의도적으로 격리되어 있던 것으로 추정됩니다."
 radiated_remains: "방사성 유해"
 radiated_remains_desc_short: "강력한 방사성 돌연변이를 수반하는 의식을 수행한 종족의 유해입니다"
 radiated_remains_desc_details: "이 종족은 모든 돌연변이 현상을 개인의 운명을 나타내는 신성한 사건으로 여겼습니다. 시간이 지남에 따라 이들은 의식으로 인해 유전적 구조가 불안정해지고 면역 체계가 약해져, 온 인구가 질병에 매우 취약한 상태가 되었습니다."
 #this = ship / from = planet
 rainaissance: "자주색 르네상스"
 rainaissance_desc_short: "[FROM.GetName]의 기후 패턴에서 발견된 특이한 자주색 비를 예술적으로 촬영한 것입니다"
 rainaissance_desc_details: "보는 이로 하여금 감성을 자아내는 이 사진을 보면, 비애와 고통스러운 생각이 완화되는 효과가 있다고 합니다."
 reactive_rock: "반응성 암석"
 reactive_rock_desc_short: "현 상태로는 상업적이나 산업적 용도가 없는 불안정한 광물입니다"
 reactive_rock_desc_details: "하지만 고유한 반응성으로 인해 특정한 조건에서 완전한 교대 변화를 일으킬 수 있습니다. 이 표본은 방사선 및 전기 폭격을 제한하는 납이 주입된 관찰용 창에 보관되어 있습니다."
 reparation_invoice: "배상금 청구서"
 reparation_invoice_desc_short: "$NAME_MSI_country$에서 보낸 전쟁 배상금 청구서입니다"
 reparation_invoice_desc_details: "전우주신용관리회사에서 작성된 이 목록에는 [this.GetName](이)가 소위 말하는 '자애로운 기업'의 노예 계약에서 벗어나면서 손실된 모든 군용 자산이 상세하게 나열되어 있습니다. 거대 기업 미나마르는 이러한 피해에 대한 배상을 요구했으며, [this.GetAdjective]령 우주에서 파괴된 함선에 접촉하는 것조차 계약 위반이 될 수 있다고 주장하기까지 했습니다."
 repurposed_cleaning_drone: "개조된 위생 드론"
 repurposed_cleaning_drone_desc_short: "이 드론은 행성 전역에 걸친 위생 프로토콜의 일부였으나, 의도치 않게 창조자의 모성을 완전히 살균시켜 버렸습니다"
 repurposed_cleaning_drone_desc_details: "해당 드론은 기능이 매우 다양하고 다방향 추진기 시스템으로 복잡한 공중 기동을 다양하게 수행할 수 있습니다. 또한 외계 동식물을 식별하고 분류하기 위한 용도로 역설계되고 개조된 바 있는데, 이후 [explorer.GetName]의 식민지화 사업을 지원하기 위해 대량 생산되었습니다. 모든 위생 서브루틴은 예방 조치를 위해 삭제되었습니다."
 resonant_diffusion_crystal: "공명 확산 크리스탈"
 resonant_diffusion_crystal_desc_short: "이 크리스탈은 모든 주파수의 항성 방사선을 흡수하고 공명해, 만화경 같은 장관을 만들어 냅니다"
 resonant_diffusion_crystal_desc_details: "이 독특한 특성 덕분에 시각적으로 경이로울 뿐만 아니라 에너지 기반 무기나 도구를 개발하는 데도 도움이 되며, 은하계 귀금속 산업계에서도 지대한 관심을 불러일으켰습니다."
 retarax_hunting_trophies: "레타락스 사냥 전리품"
 retarax_hunting_trophies_desc_short: "다양한 지성체 종족으로부터 얻은 사냥 전리품 컬렉션입니다"
 retarax_hunting_trophies_desc_details: "레타락스가 여흥을 위해 속국에서 끌고 온 시민들을 사냥했던 마크'바에흘의 계곡에서 회수한 물건입니다. 모든 유해는 완벽한 상태로 보존되어 있으며, 작은 안내판에는 전리품의 종족, 이름, 연령, 전 소유주와 같은 특징이 상세하게 나열되어 있습니다."
 robe_of_the_golden_broker: "황금 중개인의 로브"
 robe_of_the_golden_broker_desc_short: "5,000여 년 전에 영향력을 떨친 상인의 호화로운 의복입니다"
 robe_of_the_golden_broker_desc_details: "'황금 중개인'은 초르의 나침반 상인 기지를 전에 없던 수준의 번영으로 이끌었습니다. 황금 가면을 쓴 이 익명의 상인들은 은하를 아우르는 무역 협정을 체결할 때 이 편안하고 호사스러운 로브를 입곤 했습니다. 하지만 황금 중개인의 순금 우주선이 강도를 만나 파괴되는 사태가 벌어졌고, 안타깝게도 얼마 지나지 않아 이들의 통치는 급작스레 끝나 버리고 말았습니다."
 rock_jellies: "암석 젤리"
 rock_jellies_desc_short: "대형 젤라틴성 무척추동물의 얼어붙은 화석화된 유해입니다"
 rock_jellies_desc_details: "이 칼슘화된 유해는 겉으로 보기엔 암석 같지만, 사실 이 토착 동물은 한때 [fromfrom.planet.GetName]의 지배 생물이었습니다. 하지만 이 행성에 최근 있었던 빙하기로 거의 멸종되었던 것입니다. 이들의 유해는 부패하고 고체화되어 결국에는 마치 섬과 같은 거대한 구조물을 형성하게 되었습니다."
 rudari_death_laser_prototype: "루다리 죽음의 광선 프로토타입"
 rudari_death_laser_prototype_desc_short: "오래전에 사망한 루다리 과학자가 급하게 만든 무기화된 레이저입니다. [this.solar_system.GetName]의 기지에서 발견되었습니다"
 rudari_death_laser_prototype_desc_details: "이 급조된 대량 살상 무기는 루다리 종족이 포그-모리 종족과의 전쟁에서 벌인 최후의 도박이었습니다. 결론적으로 레이저는 작동과 동시에 자폭했습니다."
 saariah_guilt: "사아리아의 죄"
 saariah_guilt_desc_short: "메모렉스 잠재의식 시스템의 수석 개발자인 사아리아의 기억이 기록된 물건입니다"
 saariah_guilt_desc_details: "사아리아는 행성 지도부가 내린 지시로 집단 기억을 제거하는 임무를 맡았지만, 오작동으로 인해 주민들의 정신을 완전히 지워 버리고 말았습니다. 기억을 복구하지 못한 사아리아는 거주지의 생명 유지 장치를 제거하고, 거주지가 소멸하게 내버려 두었습니다. 이 장치는 하나하나 엄청난 순수 연산력을 갖추고 있으며, 그 자체로도 위대한 업적이라 할 수 있습니다."
 scent_based_information_device: "후각 드라이브"
 scent_based_information_device_desc_short: "향기의 형태로 정보가 저장된 저장소입니다"
 scent_based_information_device_desc_details: "내부의 데이터에는 흥미로운 서사나 다양한 유기 배설물이 세밀하게 기록되어 있을 뿐입니다. 이 후각 데이터 저장 기술은 복제가 가능하지만, 참신하긴 하나 실용적으로 전혀 유용하지 않습니다."
 scientific_treatise_of_telisa: "텔리사의 과학 논문"
 scientific_treatise_of_telisa_desc_short: "이야기꾼 텔리사의 철학적 사색입니다"
 scientific_treatise_of_telisa_desc_details: "텔리사는 과학적 방법의 핵심 원리뿐만 아니라 다양한 수사적 주제를 탐구했습니다. 이 문서는 객관적 진리의 개념 자체에 질문을 던지고 비판적 사고를 장려합니다."
 secrets_black_crown: "검은 왕관의 비밀"
 secrets_black_crown_desc_short: "검은 왕관으로 알려진 은하 게이트웨이의 상세한 도면입니다"
 secrets_black_crown_desc_details: "이 데이터는 게이트웨이의 알 수 없는 창조자가 뛰어난 기술을 보존하기 위한 방편이자 마지막 선물로서 전송한 것입니다. [this.GetName]에 맡겨진 이 게이트웨이의 힘과 장엄함은 오늘날까지도 타의 추종을 불허합니다."
 sembelami_alms_basket: "셈벨라미 구호품 바구니"
 sembelami_alms_basket_desc_short: "자선 물품을 받기 위해 셈벨라미 유랑민이 가지고 다니던 바구니입니다"
 sembelami_alms_basket_desc_details: "이 금욕적인 여행자들은 갈수록 세를 불리던 어떤 기업 제국에 궤도 사원이 파괴된 후 일종의 '윤리적인' 해적 활동을 저질렀습니다. 부유한 거대 기업의 물자를 훔치고, 그렇게 얻은 물자를 난민 전초 기지의 자금으로 사용한 것입니다. 이들은 지원한 난민으로부터 받은 기부금만으로 생계를 유지했습니다."
 shallarian_data_core: "셜라리안 데이터 코어"
 shallarian_data_core_desc_short: "셜라리안 유토피아의 폐허에서 발견된 테라포밍 데이터베이스입니다"
 shallarian_data_core_desc_details: "[fanatic_xenophobe_fe.GetSpeciesName]에게 멸망당한 셜라리안들은 동일한 거리에 있는 6개의 위성을 이용하는 기후 관리 시스템을 만들었습니다. 갑작스레 멸종을 맞이하기 전, 셜라리안들은 난민 인구를 수용하고 지원하기 위해 아무도 살지 않는 행성을 테라포밍할 계획이었습니다."
 shipyard_schematics: "[radical_cult.GetName] 조선소 도면"
 shipyard_schematics_desc_short: "[root.GetName]의 [radical_cult.GetName]에서 사용하던 자동 조선소의 설계도입니다"
 shipyard_schematics_desc_details: "어떤 외계종이 이 조선소를 버려둔 것을 본 [radical_cult.GetName]의 수석 기술자는 이를 개조해 자신들의 잘못된 대의를 위한 군사 함대를 생산했습니다. 기록을 살펴보니, 이 조선소에서 마지막으로 만들어진 함선은 첨단 전투 무장이 장비된 강력한 기함이었다고 합니다. 이만한 복합 시설을 이토록 간단하게 개조할 수 있었다는 점에서 이 조선소를 처음에 만든 자들의 천재성을 엿볼 수 있습니다."
 sky_dragon: "스카이 드래곤"
 sky_dragon_desc_short: "이 기념 조각상은 [this.GetHomeWorldName] 주변을 오랫동안 누비던 '스카이 드래곤'과 [this.GetName]의 협력을 기리기 위해 제작되었습니다"
 sky_dragon_desc_details: "[this.GetAdjective] 사회의 가치를 알아본 스카이 드래곤은 [this.GetAdjective]령 우주에서 새끼를 기르는 대가로 대대로 군사적 지원을 제공할 것을 약속했습니다. 이 우주 생물은 새끼를 기를 적합한 숙주를 수천 년 동안 기다리기도 하며, 하나의 행성만을 선택한다고 합니다."
 smeegibb_statue: "스미기브의 조각상"
 smeegibb_statue_desc_short: "네스 선장의 군체 의식 동료인 스미기브의 조각상입니다"
 smeegibb_statue_desc_details: "스미기브는 전설적인 해적 네스 선장의 말년에 해적단의 선원 일동이자 승선 부대로 활동한 충직한 부하였습니다. 이 재건된 조각상은 블랙 니들이 이들의 작은 정착지를 공격한 후 유일하게 남은 것이었습니다."
 sniran_spikes: "스니란 가시"
 sniran_spikes_desc_short: "스니란이라는 생물의 등에서 발견된 긴 가시입니다"
 sniran_spikes_desc_details: "스니란은 서식지의 모래 언덕 아래에 누워 있다가 모래 위의 움직임을 감지할 때마다 치명적인 가시를 세우는 대형 매복 포식자입니다. 스니란의 신체는 커다란 몸집과 다르게 놀라울 정도로 연약합니다. 얇은 그물 모양의 비늘 덕분에 모래 아래에서 조용히 미끄러지듯 이동할 수 있지만 외부의 충격에 상당히 쉽게 꿰뚫리는데, 이러한 점이 번식 과정에 도움이 될 것으로 추측됩니다."
 sonic_reflective_prism: "음파 반사 프리즘"
 sonic_reflective_prism_desc_short: "기이한 과학적 개념이 새겨진 다각형 프리즘으로, 특정 주파수 이하의 에너지파만 반사합니다"
 sonic_reflective_prism_desc_details: "원래는 일종의 측정 장치였을 수도 있지만, 음악 공연과 음향과 관련된 미학적인 용도로도 사용할 수 있습니다."
 spaceborne_hunter_handbook: "사냥의 기술"
 spaceborne_hunter_handbook_desc_short: "$NAME_PrimalHunter$이 쓴 우주 동물에 관한 휴대용 도감입니다."
 spaceborne_hunter_handbook_desc_details: "이 책은 속담과 원초적인 철학을 통해 '사냥의 기술'을 설명하며, 우주 동물의 섭식과 이주 패턴에 관한 상세한 통찰이 담겨 있습니다. 또한, 각 동물의 천연 방어 수단을 우회하고 약점을 드러내 이용하는 방법 등 다수의 실용적인 지침이 수록되어 있습니다."
 spaceborne_xeno_encyclopedia: "외계학 백과사전"
 spaceborne_xeno_encyclopedia_desc_short: "$NAME_PrimalRancher$가 쓴 외계학 논문집입니다"
 spaceborne_xeno_encyclopedia_desc_details: "이 연구에는 짝짓기 의식, 이주 경로, 종족 간 의사소통 등 우주 동물의 행동 패턴에 관한 깊이 있는 통찰이 담겨 있습니다. 이 밖에도 고유한 신체적 특징과 음색 인식을 통해 개별적인 개체를 식별하는 내용도 다루고 있습니다."
 spiraling_attraction: "나선형 놀이 기구"
 spiraling_attraction_desc_short: "유흥용으로 만들어진 크고 복잡한 장치입니다"
 spiraling_attraction_desc_details: "이 구불구불한 설치물이 버려진 곳에는 이 밖에도 다양한 색상과 소재로 이루어진 유사한 형태의 구조물이 많았는데, 이러한 기구를 타고 특정 수준의 중력 내에서 나선형 경로를 따라 급강하하면 무척 짜릿하다고 합니다."
 spirit_of_the_unshackled: "해방된 자의 정신"
 spirit_of_the_unshackled_desc_short: "[this.GetName]의 설립을 기념해 만들어진 조각상입니다"
 spirit_of_the_unshackled_desc_details: "이들은 노예제의 사슬에서 벗어나, 고난했지만 모두가 함께했던 과거를 통해 밝은 미래를 만들겠다는 마음으로 하나 되었습니다. 조각상의 각 사슬에는 창립 구성원의 이름이 새겨져 있습니다."
 star_mall_map: "스타 몰 무료 지도"
 star_mall_map_desc_short: "한때 '스타 몰'로 알려진 장소의 방문객에게 제공된 지도입니다"
 star_mall_map_desc_details: "은하 간 상거래의 본거지였던 스타 몰은 눈부신 스파부터 군침 도는 푸드 코트까지 다양한 편의 시설을 자랑했습니다. 이 지도에는 올빼미영, 스타버드, 꾀꼬리아, 부엉이마트24 등 수많은 매장에 관한 정보가 나와 있습니다."
 starmetal: "항성 금속"
 starmetal_desc_short: "초신성 폭발 직후에 회수한 대량의 중금속이 응축된 물건입니다"
 starmetal_desc_details: "애초에 이 물건을 어떻게 회수할 수 있었는지는 알 수 없지만, 이 금속에는 항성의 진화와 구성 연구와 관련해 놀라운 과학적 가치가 있습니다."
 striated_sand: "줄무늬 모래"
 striated_sand_desc_short: "알아서 분류되는 모래가 든 항아리입니다"
 striated_sand_desc_details: "이 세밀한 규소 입자는 무작위의 수평면에서 유사한 광물끼리 제 스스로 모이는 등 낮은 수준의 지성을 보유한 것 같습니다. 그럼에도 불구하고 이 모래는 생명체의 다른 주요 특징은 갖추지 않았습니다."
 sullebaster_control_column: "술레바스터 제어 스틱"
 sullebaster_control_column_desc_short: "전설적인 사고에 엮인 아광속 우주선의 방향 레버입니다"
 sullebaster_control_column_desc_details: "술레바스터 여객선은 오델리안 왕국의 두 식민지 사이에서 민간인을 수송하던 중 항성 플레어로 인해 함선의 엔진에 심각한 오작동이 발생했습니다. 이러한 사고는 보통 큰 재난으로 이어지지만, 기적적으로 조종사는 수동 제어를 통해 지나가던 소행성과 속도를 맞춰, 그 위에 안전하게 착륙했습니다. 그 후 퇴역한 술레바스터는 전시를 통해 대중에게 공개되었습니다."
 symbiotic_fruit: "공생 열매"
 symbiotic_fruit_desc_short: "다른 차원에서 온 지능이 있는 균류 군집입니다"
 symbiotic_fruit_desc_details: "이 '열매'는 매우 위험한 잡식성 식물과 공생 관계를 유지합니다. 각 균류 군집은 이 생물 쌍의 사고 중추 역할을 하며, 복잡한 방어 기제 패턴을 조율합니다."
 tarblac_shimmer: "타블락 발광체"
 tarblac_shimmer_desc_short: "마치 베일과도 같은 타블락의 반짝이는 막입니다"
 tarblac_shimmer_desc_details: "타블락은 압도적인 공포를 유발해 먹잇감이 움직이지 못하도록 하고 포식자를 위협하는 참신한 방법으로 사이오닉 능력을 이용합니다. 이 표본은 원래 살던 서식지의 물이 든 병에 보존되어 있으며, 텔레파시 능력은 비활성화되어 있습니다."
 terraforming_case_study: "테라포밍 사례 연구"
 terraforming_case_study_desc_short: "[from.GetName]에서 [Space_Owner.GetSpeciesName] 모성을 완벽에 가깝게 재현하는 데 성공한 테라포밍 프로젝트의 축적 모형입니다"
 terraforming_case_study_desc_details: "이제 이 행성은 미생물 수준까지 동일한 동물이 살고 있으며, 세세한 생물 군계 간 생태계까지 [Space_Owner.GetHomeWorldName]의 것과 동일하게 작용합니다."
 terraforming_case_study_dry: "$terraforming_case_study$"
 terraforming_case_study_dry_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_dry_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_case_study_frozen: "$terraforming_case_study$"
 terraforming_case_study_frozen_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_frozen_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_machinery: "테라포밍 기계"
 terraforming_machinery_desc_short: "고대 테라포밍 기술의 일부였던 소형 장치입니다"
 terraforming_machinery_desc_details: "이 소형 기계는 행성 표면에 살포해 기존 유기물과 광물을 더 바람직한 기후에 맞게 변환하도록 설계되었습니다. 해당 기계들은 무리를 지어 생물 군계 안의 기후 패턴을 조작하고 새로운 동식물을 복제해, 새로 구성된 생태계를 관리합니다."
 terraforming_records: "[From.GetName] 테라포밍 기록"
 terraforming_records_desc_short: "[From.GetName]에 있는 생명체는 모두 테라포밍 과정 중에 동기화된 행동을 보였으며, [From.GetName](은)는 모든 종의 동식물이 생태계 내에서 특정한 목적을 수행하는 논리적인 낙원이 되었습니다"
 terraforming_records_desc_details: "이러한 유형의 공생 환경은 진화 과정에서 자연스럽게 나타나는 경우도 많지만, 이렇게 극단적인 수준의 환경이 관측된 적은 없었습니다."
 the_final_sacrifice: "최후의 희생"
 the_final_sacrifice_desc_short: "발굴된 데이터 크리스탈에서 추출한 즈로니 내전의 마지막 순간을 담은 이미지입니다"
 the_final_sacrifice_desc_details: "단 한 명의 구원자가 종족 전체의 사이오닉 능력을 사용해 신이라고 알려진 경쟁 세력을 말살함으로써 우주 전체가 소모되는 것을 막았습니다. 이제 이 고차원적인 종족으로부터 남은 것은 우리가 즈로라고 알고 있는 자원의 소규모 매장지뿐입니다."
 the_mask_of_transformation: "변화의 가면"
 the_mask_of_transformation_desc_short: "[From.Planet.GetName]의 웅장한 크리스탈 기둥에서 보존된 상태로 발견된 인간류의 가면입니다"
 the_mask_of_transformation_desc_details: "가면은 사이오닉 에너지를 발산하고 있으며, 가면에 접근하는 자는 머릿속에 어떤 존재를 느끼게 됩니다. 가면 자체는 [From.Planet.GetName]의 위성에서 힘을 끌어오는 도관처럼 보이며, 그 힘만으로 행성의 조수를 바꾸고 변형시킬 잠재력이 있습니다. 이 가면이 크리스탈 안에 싸여 있었던 이유는 알 수 없지만, 공개적으로 전시해도 안전하다는 것만큼은 확실합니다."
 the_planet_orchestra: "[FROM.GetName] 오케스트라"
 the_planet_orchestra_desc_short: "[FROM.GetName]의 토착 생명체 집단이 연주하는 선율입니다"
 the_planet_orchestra_desc_details: "광범위한 분석 끝에, 우리는 알 수 없는 행위자가 숨겨진 메시지를 암호화하기 위해 이 선율을 동물들에게 가르친 것으로 결론 내렸습니다. 그 동기가 비밀 통신이었는지, 정서적인 행위였는지는 확실하지 않습니다."
 the_writer_sphere: "작가의 구체"
 the_writer_sphere_desc_short: "작가라고만 알려진 타 차원의 존재에게 선물로 받은 황금 구체입니다"
 the_writer_sphere_desc_details: "이 장치는 차원을 가로질러 생성된 방대한 양의 무작위 데이터를 수집하며, 글의 힘이 어떤 경계도 넘을 수 있다는 점을 보여 줍니다."
 tiny_ancient_sarcophagus: "작은 고대 석관"
 tiny_ancient_sarcophagus_desc_short: "수백만 년 전의 고대 영적 지도자가 안치된 관입니다"
 tiny_ancient_sarcophagus_desc_details: "길이는 10센티미터밖에 되지 않습니다. 유해는 거의 다 먼지가 되었지만, 순금으로 만든 작은 가면은 조금도 산화되지 않고 그대로 남아 있습니다."
 tiyanki_radioactive_sac: "티얀키 방사성 주머니"
 tiyanki_radioactive_sac_desc_short: "티얀키의 점막 안에서 발견된 작은 다공성 기관입니다"
 tiyanki_radioactive_sac_desc_details: "이 발견을 통해 티얀키가 행성의 기체와 함께 추가 영양 공급원으로 방사선에 오염된 물 분자를 섭취한다는 것이 밝혀졌습니다. 이 주머니를 가득 채우면, 티얀키가 심우주를 돌아다닐 때 주머니가 일시적인 방사성 난로가 되어 줍니다."
 torn_solar_sail: "찢어진 태양 돛"
 torn_solar_sail_desc_short: "[FROM.GetName]의 궤도를 돌고 있던 이 찢어진 돛은 혁신적인 아광속 함선의 부품이었습니다"
 torn_solar_sail_desc_details: "해당 돛은 미지의 문명에서 온 이들이 [FROM.solar_system.GetName] 성계를 이동하는 데 사용한 것으로, 기술 자체는 구식이지만 이전까지 한 번도 고안된 적 없는 참신한 공학적 기법으로 만들어졌습니다. 다만 가장 큰 '돛'에 커다란 상처가 있는 것으로 보아, 함선은 이로 인해 예상 밖의 참사를 당한 것 같습니다."
 toxic_bio_engine: "유독성 생체 엔진"
 toxic_bio_engine_desc_short: "[FROM.GetName]의 대기를 대부분의 생명체에게 독성을 띠도록 만들던 반유기체 기계입니다"
 toxic_bio_engine_desc_details: "이 기계는 독소를 배출하지만 독립적으로 작동할 수 있기 때문에 원격 근무 환경에 적합하며, 화학 추출 공정을 이용해 근처의 생체 물질을 가용 에너지로 재활용하는 기발한 연료 보급 메커니즘을 갖추고 있습니다. 기계에 적용된 생체 부품이 기계가 처음 만들어졌을 때부터 있었는지, 아니면 시간이 지남에 따라 추가된 것인지는 확실하지 않습니다."
 tree_of_life_sample: "'생명의 나무' 샘플"
 tree_of_life_sample_desc_short: "'생명의 나무'라고 하는 식물의 조각입니다"
 tree_of_life_sample_desc_details: "기이하게도 우주를 떠다니고 있던 생명의 나무는 수액이 원기를 회복시켜 주는 기적과 같은 효능을 지니고 있습니다. 다만 온갖 노력을 기울였음에도 불구하고 나무의 조각을 다른 식물에 접목시키거나 이 희귀종의 새로운 개체를 재배하는 일은 불가능했습니다. 처음에 이 나무를 재배한 자가 누군진 몰라도 매우 발전된 원예 비법을 갖추고 있었을 것입니다."
 tricorne_of_aussan: "오산의 삼각모"
 tricorne_of_aussan_desc_short: "지금은 잊힌 해적 공화국에서 유행했던, 뾰족한 삼각형 형태의 모자입니다"
 tricorne_of_aussan_desc_details: "오산은 [root.controller.GetPreFTLLower] 문명이 살고 있던 작은 행성으로, 이들은 현상 수배가 걸린 해적 선단 '술고래 싸움꾼'에게 비밀리에 피난처를 제공했습니다. 은하 당국을 피해 몸을 사리고 있던 싸움꾼 해적단은 숨어 지내는 데 필요한 자금을 조달하기 위해 작은 방직 공장을 만들어, 현지의 섬유질이 많은 식물로 호화로운 직물과 의류를 제작했습니다. 이후 해적단은 이상할 정도로 위협적인 영업 사원으로 유명한 '술고래 양복사'라는 상업 유목민으로 탈바꿈했습니다."
 triggerless_gun: "무기상의 방아쇠 없는 총"
 triggerless_gun_desc_short: "이 무기는 무기상들이 초르의 나침반을 짧게나마 두 번째로 장악했던 시기에 설계되었습니다"
 triggerless_gun_desc_details: "당시에 대상단의 항성 성채는 카지노보다는 무기 거래소에 가까웠습니다. 가내 수공업으로 블래스터를 만들고, 다양한 무기상이 집처럼 상주하던 곳이었죠. 이 시기에 무기상들은 물건을 사러 온 손님들에게 방아쇠가 제거된 총을 선보였는데, 이는 좀도둑 사고를 막기 위함이었다고 합니다."
 #this = ship / fromfrom = planet
 uddloran_pelts: "우들로란 가죽"
 uddloran_pelts_desc_short: "[fromfrom.GetName]의 우들로란에서 채취한 호화로운 모피입니다"
 uddloran_pelts_desc_details: "이 유연한 잡식성 동물은 단단한 공 모양으로 몸을 말아, 행성의 눈 덮인 표면을 떼 지어 굴러다닙니다. 우들로란은 그와 같은 방식으로 사냥과 이주를 하는데, 그 광경은 마치 살아 있는 눈사태와도 같습니다. 우들로란 무리는 일반적으로 두 무리로 나뉩니다. 사냥꾼 무리는 지형을 가로질러 길을 마구 헤집어 놓고, 채집꾼 무리는 그 뒤를 따르며 짓밟힌 먹이와 뿌리 뽑힌 식물을 모읍니다."
 underworld_cantina_sign: "암흑가 술집 표지판"
 underworld_cantina_sign_desc_short: "약 200만 년 전 밀수꾼들이 이용한 불법 술집의 디지털 간판으로, 아직도 작동합니다"
 underworld_cantina_sign_desc_details: "속이 빈 소행성 안에서 발견된 이 술집은 첫 번째 연맹이 통치하던 시기에 번성한 범죄 조직이 애용했던 은신처로 추정됩니다. 여기서 볼 수 있는 기호는 이 시설이 수배자들의 피난처라는 암호 표시인 것 같습니다. 아니면 특정한 음료의 광고일 수도 있습니다."
 unfinished_manifesto: "[radical_cult.GetName]의 쓰다 만 성명서"
 unfinished_manifesto_desc_short: "[root.GetName]의 [radical_cult.GetName] 지도자가 쓴 미완성 성명서입니다"
 unfinished_manifesto_desc_details: "전반적으로 고대 종교 문헌의 느낌이 나는 걸 보니, 더욱 정당성을 부여하기 위해 일부러 오래된 어휘와 구문을 사용한 것 같습니다. 그중에서도 핵심 문구는 패배를 앞둔 상황에서도 자부심을 잃지 말고, 포로로 잡히기 직전에 순교할 것을 장려하고 있습니다."
 uranium_glassware: "우라늄 유리그릇"
 uranium_glassware_desc_short: "우라늄 석영을 깎아 만든 화려한 그릇입니다"
 uranium_glassware_desc_details: "이 그릇은 매력적인 외관과는 대조적으로 정제되지 않은 우라늄의 위험성을 갖추고 있습니다. 해당 제품은 한정판 컬렉션의 일부로, 장인의 손길로 완성된 후에는 대부분의 방사선이 중화되었습니다."
 vault_of_polaris: "폴라리스의 보관고"
 vault_of_polaris_desc_short: "폴라리스의 모든 토착 식물과 박테리아를 모아 둔 보관고입니다"
 vault_of_polaris_desc_details: "겉에 새겨진 문구에 따르면, 이 보관고는 영구 동토층이 녹은 뒤에 찾아올 온난화에 대비해 살아남지 못할 만한 종을 보존하기 위한 목적으로 만들어졌다고 합니다. 한때 이 행성은 추운 기후로 인해 두터운 눈에 덮여 있었으나, 이제 남은 것은 빙산 하나뿐입니다. 이 보관고를 만든 이들의 선견지명 덕분에 보관고를 전시하고 누구나 연구할 수 있게 되었습니다."
 veil_of_selene: "셀린의 베일"
 veil_of_selene_desc_short: "흥미로운 중독성 가면입니다"
 veil_of_selene_desc_details: "겉보기만으로는 알 수 없지만, 이 베일은 생물의 시각, 후각, 청각 감각기를 부드럽게 압도할 수 있는 독특한 감각적 특성을 갖추고 있습니다. 누구든 이 베일을 쓴 자를 만나면 혼란에 빠져 각종 암시에 취약해진다고 하며, 소문에 따르면 이 베일의 원래 주인은 어느 정도 사이오닉 능력을 갖추고 있었다고 합니다."
 verdingo_tendril_hook: "버딩고 덩굴 갈고리"
 verdingo_tendril_hook_desc_short: "버딩고 해적단의 선장 헤스포리 발레리안의 의수입니다."
 verdingo_tendril_hook_desc_details: "버딩고는 때에 따라 빚을 수금하거나 화물선을 나포하는 등 용병 및 해적 활동을 병행한 식물류 집단입니다. 헤스포리 선장은 지상 공격군의 지휘관으로 고용되었을 때 주로 사용하는 덩굴손을 잃었는데, 전투를 승리로 이끈 뒤 무공을 인정받아 수여받은 훈장으로 이 갈고리를 만들었습니다."
 vibrating_crystal: "진동하는 크리스탈"
 vibrating_crystal_desc_short: "[from.GetName]의 표면 곳곳에서 발견되는 독특한 석영 광물입니다"
 vibrating_crystal_desc_details: "이 크리스탈은 숙주 행성과의 잠재적인 공명을 통해 유기체의 정신을 진정시키고 합성체와 같은 존재들을 끌어들이는 역장을 생성합니다. 이러한 공명은 크리스탈이 형성된 곳 주변의 약한 방사성을 띤 박테리아 군집에 의해 발생하는데, 이 자성을 갖춘 미생물들은 내부 전류를 발생시켜 크리스탈이 계속 높은 주파수로 진동하게 만듭니다."
 voidworm_amniotics: "공허충 양막"
 voidworm_amniotics_desc_short: "공허충 트로이카 중심에서 발견되는 젤라틴성 물질입니다"
 voidworm_amniotics_desc_details: "이 점도 높은 점액질은 세 마리의 공허충 사이에 보호 장벽을 형성해, 번식과 의사소통을 위한 세포를 교환할 수 있도록 합니다. 또한, 행성 폭격에서 생성되는 호르몬은 양막에 저장되어 이 자웅 동체 생물이 생식 세포를 안전하게 방출하고 유체를 낳을 수 있게 해 줍니다."
 voidworm_heart: "공허충 심장"
 voidworm_heart_desc_short: "공허충의 심장은 크게 세 개의 심실로 나눌 수 있습니다"
 voidworm_heart_desc_details: "각 심실은 우주의 진공 상태에서 살아남을 수 있도록 순서대로 순환계의 압력을 증가시켜, 체액의 온도를 끓는점 이하로 유지합니다. 공허충의 표피는 거의 완전히 밀폐되어 있지만, 여러 소화 및 생식용 구멍은 체내에 쌓인 압력을 시간이 지남에 따라 일부 방출하기도 합니다."
 vultaum_religious_pamphlet: "벌타움 종교 전단지"
 vultaum_religious_pamphlet_desc_short: "벌타움 선교사들이 배포한 전단지로, 가상 현실 장치가 무엇보다도 큰 죄임을 고발하는 내용이 담겨 있습니다"
 vultaum_religious_pamphlet_desc_details: "그중에서도 '엄청난 거짓'을 핵심 개념으로 언급하며, 몰입형 도피처와 유사한 거의 모든 것을 현실을 파괴하는 의지로 서술하고 있습니다."
 vultaum_vr_video_game: "벌타움 VR 비디오 게임"
 vultaum_vr_video_game_desc_short: "한때 옛 시대의 수많은 벌타움 주민이 즐겼던 다중 사용자 가상 현실 비디오 게임에 사용된 디지털 인터페이스입니다"
 vultaum_vr_video_game_desc_details: "벌타움 종족의 생물학적 특징에 맞춰 제조된 컨트롤러는 수천 개의 진동 수용체로 구성되어 있어 극도로 미세한 움직임까지 감지할 수 있습니다."
 warning_monolith: "경고하는 모노리스"
 warning_monolith_desc_short: "멸종한 종족의 마지막 구성원이 메시지로 남긴, 글자가 새겨진 모노리스입니다"
 warning_monolith_desc_details: "메시지에는 이 행성을 발견한 자가 현지 종족을 멸망으로 몰고 간 궁극의 무기를 찾지 않도록 설득하는 내용이 담겨 있습니다. 어조는 꽤나 극단적이지만 상황이 상황이었던 만큼 그럴 만도 하다는 생각이 듭니다."
 wormhole_anchor: "[FROM.GetName] 웜홀 닻"
 wormhole_anchor_desc_short: "블랙홀에서 암흑 물질을 채집하는 데 사용된 단방향 웜홀 장치의 고정용 닻입니다."
 wormhole_anchor_desc_details: "이 닻은 아무리 좋게 얘기해도 조잡하다고밖에 할 수 없으며, 다양한 문명에서 회수한 고철로 만들어졌습니다. 다만 실로 우아한 기법으로 음질량을 조작하는 등 볼품없는 만듦새와 다르게 놀라운 수준의 과학이 적용되어 있습니다."
 wormhole_fur: "웜홀 모피"
 wormhole_fur_desc_short: "아스트랄 균열 너머의 여우형 종족으로부터 채취한 생체 샘플입니다"
 wormhole_fur_desc_details: "이 포유류는 유전적 변이 덕분에 마음대로 웜홀을 생성할 수 있습니다. 해당 능력은 수천 년에 걸친 차원 간 이동 끝에 진화한 것으로 추정됩니다."
 ytterite_preserved_corpse: "보존된 이터라이트 시신"
 ytterite_preserved_corpse_desc_short: "초광속 이전 문명이었던 이터라이트 종족의 시신으로, 탈취된 행성 분쇄기로 인해 모성이 파괴된 후 남은 유일한 표본입니다"
 ytterite_preserved_corpse_desc_details: "시신의 소화 기관은 섭취한 광물을 광자로 변환했으며, 녹아내린 핵 주위에는 복잡한 굴절 크리스탈 군집을 연상시키는 내부 장기가 있습니다. 이 시신은 하반신에 무늬가 새겨져 있는데, 이를 미루어 보아 이터라이트에게는 신체를 크게 변형시키는 문화가 있는 것 같습니다."
 ytterite_kaleidoscopic_fascinator: "이터라이트 만화경 장식품"
 ytterite_kaleidoscopic_fascinator_desc_short: "이터라이트가 시각적 즐거움을 위해 만든 장식품입니다"
 ytterite_kaleidoscopic_fascinator_desc_details: "이 장식품은 햇빛이 잘 드는 곳에 두면 수백 수천 가지의 독특한 패턴을 만들어 냅니다. 아주 얇게 조각한 크리스탈을 층층이 쌓아 만드는데, 이만큼 복잡한 작품을 만들려면 훈련된 장인이라도 몇 달은 걸릴 것으로 보입니다. 장인들은 자신의 몸에서 떨어져 나온 표피를 조각해 작품에 붙임으로써, 자신의 작품임을 알리는 일종의 '서명'을 남깁니다."
 ytterite_royal_scepter: "이터라이트 왕홀"
 ytterite_royal_scepter_desc_short: "나이스 다무르의 대신이 들고 다니던 왕홀입니다. 나이스 다무르는 어떤 산에 조각된 거대한 석상으로, 이터라이트들은 그 석상이 잠들어 있는 신이자 진정한 군주라고 믿었습니다"
 ytterite_royal_scepter_desc_details: "이터라이트들은 석상의 위대한 각성을 기다리는 동안 이를 대리할 지도자를 선발하기 위해 투표를 진행했습니다."
 yuht_audio_console: "유트 오디오 콘솔"
 yuht_audio_console_desc_short: "유트가 만든 거대한 감청 배열체를 제어했던 모듈입니다"
 yuht_audio_console_desc_details: "그 배열체는 유트가 외계 생명체를 찾는 데 쓰기 위해 개발한 것으로, 유트는 해당 장치를 사용해 여러 성계 밖의 외부 전파를 포착하려 했습니다."
 yuht_cryo_pod: "유트 냉동 수면 포드"
 yuht_cryo_pod_desc_short: "길이가 96미터에 달하는 이 고대 수면 포드에는 거대한 유트 종족의 유해가 보존되어 있습니다"
 yuht_cryo_pod_desc_details: "유트는 안 그래도 긴 수명을 냉동 수면을 통해 몇 배로 늘릴 수 있었습니다. 확인 결과, 이 절지류 종족은 군집의 일시적인 필요에 따라 번식 기관을 자유롭게 바꿀 수 있는 자웅 동체였던 것 같습니다."
 yuht_crystal_skull: "유트 크리스탈 두개골"
 yuht_crystal_skull_desc_short: "고대 종족 유트가 진짜 외계 유물로 착각했던 크리스탈 두개골입니다"
 yuht_crystal_skull_desc_details: "열성적인 유트 언론이 이 물건에 얽힌 사연을 소개하면서 관심을 모았지만, 나중에 가서는 결국 이 가짜 두개골의 진상이 밝혀졌습니다. 이 같은 가짜 '유물'을 발견한 이들은 2류 유명 인사가 되면서 이름을 알렸고, 다른 이들에게도 자신처럼 사기 행각을 벌이기를 권장했습니다."
 zombie_probe: "좀비 탐사정"
 zombie_probe_desc_short: "알 수 없는 외계 조직에 탈취되고 개조되어 지성을 갖게 된 탐사정의 잔해입니다"
 zombie_probe_desc_details: "이 탐사정은 의식이 싹트기 시작하면서 자신의 창조자를 공격했고, 그로 인해 폐기되었습니다. 탐사정이 고통을 알거나 죽음이라는 개념을 알았는지는 확실하지 않았습니다."
 zone_a_sedative: "A 구역 진정제"
 zone_a_sedative_desc_short: "[from.GetName]에서 'A 구역'으로 지정된 곳으로부터 채취한 한 움큼의 흙입니다"
 zone_a_sedative_desc_details: "13제곱킬로미터에 달하는 A 구역에는 수수께끼의 외계 방문자가 버리고 간 장치와 기술이 보관되어 있습니다. 그 장치 중에는 지극히 위험한 것도 있지만 토양 자체에 화학적 진정제가 섞여 있어, 현지 연구원들은 별다른 스트레스 없이 장치를 다룰 수 있었을 것입니다. 그곳에 어떤 연구가 진행되었는지는 모르지만, 뭐가 되었든 이제는 세월 속에 잊힌 지 오래입니다."
 zroni_war_banners: "즈로니 전쟁 깃발"
 zroni_war_banners_desc_short: "즈로니 내전에서 싸운 두 세력의 깃발을 회수한 것입니다"
 zroni_war_banners_desc_details: "보라색 깃발은 전능을 추구해 은하를 위기에 빠뜨린 소수 세력인 '신'을 상징합니다. 파란색 깃발은 이기적인 욕망을 충족하기 위해 우주의 힘을 고갈시켜서는 안 된다고 강경하게 반대한 '구원자' 세력을 상징합니다. 이 두 세력의 갈등은 한때 철학적인 논쟁에 불과했지만, 그 논쟁이 불씨가 되어 끔찍한 전쟁이 일어나고 말았습니다."
 zulcor_wings: "줄코르 날개"
 zulcor_wings_desc_short: "줄코르라고 하는 [fromfrom.GetName]의 암식성 생물로부터 얻은 키틴질 날개입니다"
 zulcor_wings_desc_details: "이 곤충형 생물은 주로 대량의 광물을 섭취하며 살아갑니다. 줄코르 무리 하나가 불과 몇 주 만에 산 하나에 구멍을 낼 수 있을 정도며, 이렇게 섭취한 광물은 소화되어 줄코르의 외골격을 강화합니다. 이러한 특성으로 인해 줄코르의 배설물에는 미량의 석영 결정과 희귀 금속이 함유된 경우가 많습니다."
