 # Megastructure
 galactic_crucible_0: "은하 도가니 뼈대"
 galactic_crucible_0_DESC: "$galactic_crucible_4$의 기초가 되는 뼈대로서, 나머지 건설 작업을 지탱하고 이끌도록 설계되었습니다."
 galactic_crucible_0_MEGASTRUCTURE_DETAILS: "이 거대한 기지는 모항성으로부터 에너지를 흡수하여 자동화된 조선소에 동력을 공급하고, 그곳에서는 항성의 운명을 바꿀 수 있는 함선인 §Y$entropy_conduit_plural$§!이 생산됩니다."
 galactic_crucible_1: "$galactic_crucible_4$ 섀시"
 galactic_crucible_1_DESC: "핵심 기반 시설이 완공되어, $galactic_crucible_4$는 이제 작동 가능한 기지가 되었습니다. 엔트로피 크리스탈화 시스템의 건설이 이미 진행 중입니다."
 galactic_crucible_2: "$galactic_crucible_4$ 코어"
 galactic_crucible_2_DESC: "$galactic_crucible_4$가 이제 완전히 가동 준비를 마쳤으며 §Y$entropy_crystals$§!의 투입을 확대할 준비가 되었습니다. 향후 모든 업그레이드는 이 기반에서 이루어집니다.\n\n§H다음 단계를 잠금 해제하려면 특별 프로젝트를 완료하십시오.§!"
 galactic_crucible_3: "$galactic_crucible_4$ 허브"
 galactic_crucible_3_DESC: "확장 중인 $galactic_crucible_4$는 이제 원활한 재구성과 성장을 위해 설계된 모듈식 엔트로피 시스템을 갖추고 있습니다. 기술자들은 비효율성을 최소화하면서 수용력을 늘릴 수 있습니다."
 galactic_crucible_4: "은하 도가니"
 galactic_crucible_4_DESC: "$galactic_crucible_4$는 완전히 무장하고 가동 준비를 마친 채, 은하 전역을 불로 정화할 준비를 마쳤습니다. 엔트로피 유동 시스템은 이제 이론적으로 가능한 최고 효율로 작동하고 있습니다."
 galactic_crucible_5: "$galactic_crucible_4$ 기관"
 galactic_crucible_5_DESC: "$galactic_crucible_4$는 위험할 정도로 높은 에너지 출력을 방지하기 위해 되돌릴 수 없을 정도로 재설계되었으며, 제국의 번영을 위한 안정적이고 안전한 원천으로 남을 것입니다."
 galactic_crucible_ruined: "폐허가 된 $galactic_crucible_4$"
 galactic_crucible_ruined_DESC: "한때 몰락한 제국의 불타는 야망을 위해 건설되었던, 파괴된 조선소입니다."
 galactic_crucible_ruined_MEGASTRUCTURE_DETAILS: "이 거대한 폐허의 산산조각 난 잔해 곳곳에서는 여전히 간헐적인 열기가 불규칙하게 뿜어져 나오고 있습니다."
 SPAWN_CONDUITS: "$entropy_conduit_plural$"
 SPAWN_CONDUITS_DESC: "$galactic_crucible_4$는 자동으로 $entropy_conduit_plural$을 생산합니다. 생산된 후에는 §Y$pc_m_giant_star$§!으로 변환될 수 있는 항성을 향해 이동할 것입니다."
 megastructure_overclocking_desc: "이 거대 구조물은 전략적인 오버클럭을 통해 표준 작동 한계를 초과하고 고유한 효과를 이용할 수 있습니다."
 overclock_mode: "모드:"
 overclock_gc_default: "$overclock_mode$ §H기본§!"
 overclock_gc_default_desc: "엔트로피 크리스탈을 꾸준히, 소량으로 생산합니다.\n"
 overclock_gc_high: "$overclock_mode$ §H과충전§!"
 overclock_gc_high_desc: "막대한 에너지 비축분을 사용하여 도관 건설을 가속합니다.\n"
 overclock_gc_eco: "$overclock_mode$ §H생산§!"
 overclock_gc_eco_desc: "합금을 대량으로 투자하여 엔트로피 크리스탈을 더 빠른 속도로 생산할 수 있습니다.\n"
 overclock_gc_war: "$overclock_mode$ §H조정 센터§!"
 overclock_gc_war_desc: "$galactic_crucible_4$를 사용해 인근 함선에 충분한 양의 예비 에너지를 공급하고, 방어 함대의 전투력을 극대화할 수 있습니다.\n"
 # Event Chain
 galactic_hyperthermia_chain_title: "$ap_galactic_hyperthermia$"
 galactic_hyperthermia_chain_desc: "우리는 불길로 뒤덮인 미래를 선택했으며, 이제 은하계 전체를 불태우기 위해 움직입니다."
 # Special Projects
 INF_CRISIS_ENTROPY: "새로운 동력원"
 INF_CRISIS_ENTROPY_DESC: "불은 오랫동안 우리 사회에서 중요한 역할을 해 왔지만, 이제 우리는 그 혼돈의 힘을 새로운 방식으로 활용할 수 있게 되었습니다. 이는 과학자들이 오랫동안 꿈꿔왔던 것, 즉 현재의 문명을 유지하는 데 멈추지 않고 우리를 별들 사이로 이끌 에너지원일지도 모릅니다.\n\n§H효과:§! 새로운 £entropy_crystals£ §Y$entropy_crystals$§! 자원을 잠금 해제합니다."
 INF_CRISIS_ENTROPY_EVIL: "화염 폭풍 설계"
 INF_CRISIS_ENTROPY_EVIL_DESC: "도가니는 우리 종족에게 새로운 길을 보여 주었습니다. 받아들이지 않는 것은 어리석은 일이며 우리는 이를 용납하지 않을 것입니다. 이제 은하계를 불타오르는 새로운 모습으로 재창조하고, 이 비전을 거부하는 자는 누구든 태워 없애야 할 때입니다.\n\n§H효과:§!\n- §Y$galactic_crucible_4$§!의 다음 업그레이드를 잠금 해제합니다.\n- 이제 §Y$entropy_conduit_plural$§!이 적 영역에 있는 항성을 변환할 수 있습니다.\n\n" # Crystallized Entropy is used to its full potential
 INF_CRISIS_ENTROPY_GOOD: "예상치 못한 상관관계"
 INF_CRISIS_ENTROPY_GOOD_DESC: "도가니의 힘은 막강하지만, 동시에 불안정합니다. 만약 우리가 그 능력을 영구적으로 제한한다면, 은하계를 위험에 빠뜨리거나 이웃의 호의를 잃지 않으면서도 우리 자신을 위한 소소한 번영의 원천을 확보할 수 있을 것입니다." # Crystallized Entropy can be used for the economy
 # Countdown Situation
 situation_galactic_hyperthermia_timer: "동원"
 situation_galactic_hyperthermia_timer_type: "$situation_galactic_hyperthermia_timer$"
 situation_galactic_hyperthermia_timer_desc: "§Y$entropy_crystals$§!를 다루는 우리의 숙련도는 곧 은하계에 급진적인 변화를 가져다줄 것입니다. 우리는 은하 중심부 주변의 여섯 성계로 가는 웜홀을 열었습니다.\n만약 이들 각각에 §Y$entropy_conduit_plural$§!을 설치하고 우리 계획을 방해하려는 자들로부터 방어한다면, 은하계 자체를 불태울 수 있을 것입니다."
 situation_galactic_hyperthermia_timer_monthly_change_tooltip: "현재 은하 중심부로 방사되는 엔트로피의 수준입니다. 최고조에 달하면 은하계가 불타오를 것입니다."
 situation_gh_timer_outcome: "첩보에 따르면 많은 제국이 우리의 계획을 저지하기 위해 전쟁을 준비하고 있는 것으로 보입니다. 준비되지 않은 채 적과 마주한다면, 우리의 대업은 시작도 하기 전에 실패할 것입니다."
 situation_gh_approach_timer: "후폭풍에 맞서다"
 situation_gh_approach_timer_tt: "때가 왔습니다. 피할 수 없는 분쟁이 곧 은하계를 거대한 전쟁의 소용돌이로 휩쓸고 갈 것입니다."
 situation_gh_difficulty_progress: "난이도"
 situation_gh_opponent_progress: "대립하는 제국당 §G-0.1§!"
 # Crisis Situation
 situation_galactic_hyperthermia: "은하 화염 폭풍"
 situation_galactic_hyperthermia_type: "$situation_galactic_hyperthermia$"
 situation_galactic_hyperthermia_monthly_change_tooltip: "은하계가 완전한 발화에 도달하는 속도입니다."
 situation_hyperthermia_desc_perp: "§L우리는 타오르는 유토피아를 꿈꾸지만, 목표를 실현하기 위해서는 앞을 가로막는 모든 것을 불태워야 합니다. 첫 불꽃을 지폈으니 이제 온 은하계가 한 곳도 빠짐없이 소진될 때까지 불길을 키워야 합니다.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_desc: "§L§Y[event_target:hyperthermia_empire.GetName]§!(이)가 별들을 불태웠습니다. 이제 은하계가 마주한 가장 거대한 화마와 싸울 차례입니다. 두 번의 기회는 없습니다. 만약 우리가 실패한다면, 우리가 이룩한 모든 것은 잿더미가 될 것입니다.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_stats: "§H점령한 중심부 성계:§! [event_target:hyperthermia_empire.gh_crisis_core_var]"
 situation_galactic_hyperthermia_outcome: "[GetHyperthermiaOutcome]"
 situation_gh_outcome_perp: "우리가 성공한다면 불의 비가 은하계를 집어삼켜 잿더미 속에서 열기를 받아들인 자들만 남길 것입니다. 별들조차도 이를 피할 수 없으며, 수십억 년이 흐른 뒤에는 우리 모성의 모습을 본떠 재창조될 것입니다."
 situation_gh_outcome_other: "만약 §Y[hyperthermia_empire.GetName]§!(이)가 성공한다면, 은하계 전체가 잿더미로 변해 오직 호열체만이 살아남는 영역이 만들어질 것입니다."
 situation_galactic_hyperthermia_progress: "§Y$entropy_conduit_plural$§!이 점령한 은하 중심부 성계의 수에 따라 월간 진행도가 결정됩니다. \n$TABBED_NEW_LINE$- 성계 §Y3§!개 미만: §R-3§! $TABBED_NEW_LINE$- 성계 §Y3§!개 점령 중: §Y0§! $TABBED_NEW_LINE$- 성계 §Y3§!개 초과: §G+3§! \n\n현재 진행도"
 situation_galactic_hyperthermia_stage1: "최소치 도달($stage_1$)"
 situation_gh_approach_perp: "불에 기름 붓기"
 situation_gh_approach_perp_tt: "지금이 기회입니다. 우리는 반드시 성공해야 하며, 그렇지 않으면 지금까지 이룬 모든 것을 잃을 위험이 있습니다."
 situation_gh_approach_other: "불길 잠재우기"
 situation_gh_approach_other_tt: "이 제국은 은하계의 안정에 있어 실존적 위협입니다. 전면적 교전은 더 이상 선택이 아닌 필수입니다."
 # Events
 # NOTE: Remove most #comments below after texts are done
 infernals.1000.name: "새로운 힘"
 infernals.1000.desc: "[GetHyperthermiaIntroIfRedGiant]"
 infernals.1000.descNormal: "우리 [GetScientistPlural]들이 엔트로피를 고에너지 크리스탈 매트릭스에 결합하여 수집 및 저장하는 새로운 방법을 보고해 왔습니다. 이 §Y$entropy_crystals$§!은 상당한 열에너지를 저장하고 운반할 수 있어 산업과 경제, 은하 작전에 활용될 수 있습니다.\n\n모형 분석 결과, 이를 활용해 행성을 더 뜨거운 기후로 테라포밍하거나 항성 진화를 가속해 적색 거성으로 만들 수도 있는 것으로 나타났습니다. 이론에 따르면 은하계 전역의 흩어진 엔트로피를 회수해 사용할 수 있는 열로 전환하고, 은하 규모의 복합적인 열팽창을 유도하는 것이 가능합니다.\n\n§H특별 프로젝트 활성화:§! §Y$INF_CRISIS_ENTROPY$§!"
 infernals.1000.descRedGiant: "우리 [GetScientistPlural]들이 한때 적색 거성을 점화하는 데 사용되었던 §Y$entropy_crystals$§!을 분석했습니다. 이는 우리 문명이 시작되기도 전에 거의 종말을 맞이할 뻔한 사건이었습니다. 이제 우리는 이 불안정한 물질을 재설계하여 산업과 경제, 그리고 항성 규모의 용도로 사용할 수 있는 막대한 열에너지를 결합 및 운반할 수 있습니다.\n\n시뮬레이션 결과, 이를 활용해 기후를 더 뜨겁게 테라포밍하거나 항성 진화를 촉진해 적색 거성으로 만들 수도 있는 것으로 나타났습니다. 이론에 따르면 주변 은하의 엔트로피를 회수해 열로 전환하고, 성계의 열팽창을 유도하는 것이 가능합니다.\n\n§H특별 프로젝트 활성화:§! §Y$INF_CRISIS_ENTROPY$§!" # Intro if you've learned about entropy from the Red Giant Miners
 infernals.1005.name: "크리스탈화 성공"
 infernals.1005.desc1: "에너지를 수확하여 §Y$entropy_crystals$§!로 전환하는 최초의 가동 기반 시설을 완성했습니다. 이 크리스탈은 막대한 열에너지를 담고 있으며, 이미 우리 산업이 기존 방식보다 훨씬 효율적으로 전력을 저장하고 운송할 수 있게 하는 중입니다.\n\n광대한 방출 표면과 높은 열 출력을 가진 적색 거성은 이 과정에 이상적이며, 우리는 지배 중인 모든 성계에 이 기술을 배치할 준비가 되었습니다.\n\n이에 더해, 우리 기술자들은 주변 엔트로피를 활용하여 $entropy_crystals$을 합성하는 방법을 실험하며 산업용으로 개조하기 시작했습니다. 이 새로운 경제에 불이 붙는다면 부와 권력도 반드시 따라올 것입니다. 이미 [GetScientistPlural]들이 이미 생산을 확대 방안을 연구하기 시작했습니다.\n\n§H거대 구조물 잠금 해제:§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.desc2: "기존의 §Y$entropy_crystals$§! 표본을 사용하여, 우리는 모항성을 위험에 빠뜨리지 않고 이를 채취하고 합성할 수 있습니다. 이 크리스탈은 막대한 열에너지를 담고 있으며, 우리 산업이 기존 방식보다 훨씬 효율적으로 전력을 저장하고 운송할 수 있게 해줍니다.\n\n광대한 방출 표면과 높은 열 출력을 가진 적색 거성은 이 과정에 이상적이며, 우리는 지배 중인 모든 성계에 이 기술을 배치할 준비가 되었습니다.\n\n이에 더해, 우리 기술자들은 주변 엔트로피를 활용하여 $entropy_crystals$을 합성하는 방법을 실험하며 산업용으로 개조하기 시작했습니다. 이 새로운 경제에 불이 붙는다면 부와 권력도 반드시 따라올 것입니다. 이미 [GetScientistPlural]들이 이미 생산을 확대 방안을 연구하기 시작했습니다.\n\n§H거대 구조물 잠금 해제:§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.a: "건설을 시작해야 합니다."
 infernals.1005.a.tt: "$constructor$으로 항성 주위에 §Y$galactic_crucible_0$§!를 건설합니다."
 infernals.1005.b: "드론에게 건설 명령을 내리세요."
 infernals.1005.b.tt: "$constructor$으로 항성 주위에 §Y$galactic_crucible_0$§!를 건설합니다."
 infernals.1006.name: "호열성 진화"
 infernals.1006.desc: "은하계를 불태우는 길에 나서는 동안 우리 자신도 열기에 맞설 준비를 해야 합니다. 주민들이 더 높은 온도에 적응하게 하면 불길에 휩싸인 새로운 미래에서도 번성할 수 있을 것입니다."
 infernals.1006.descRedGiant: "항성의 변화를 되돌리기 위해 끊임없이 노력하는 동안 우리 자신도 열기에 맞설 준비를 해야 합니다. 주민들이 더 높은 온도에 적응하게 하면 불길에 휩싸인 항성의 새로운 미래에서도 번영할 수 있을 것입니다."
 infernals.1010.name: "$entropy_conduit_plural$ 발사"
 infernals.1010.desc: "$galactic_crucible_1$는 이제 항성 엔트로피를 유도하고 증폭하도록 설계된 자동화 시스템인 §Y$entropy_conduit_plural$§!을 배치할 준비가 되었습니다. 투입되고 나면, 이 시스템은 항성의 에너지 출력을 재활용하고 증강해 적색 거성으로 전환하고, 전체 성계를 가열해 확장 중인 제국의 기반 시설을 지원할 것입니다.\n\n§Y$entropy_conduit_plural$§!은 정기적으로 생산될 수 있으며 우리의 편의를 위해 자율적으로 작동합니다. 지금은 우리 영역 내에 머물겠지만, 때가 되면 은하계 전역으로 확산되도록 하는 편이 유리할 수 있습니다. 우리 제국은 절대 성장을 멈추지 않으니 말입니다.\n\n§H거대 구조물 업그레이드 가능:§! §Y$galactic_crucible_2$§!" # Reaching lv2
 infernals.1010.a: "$entropy_crystals$ 생산 속도가 향상될 것입니다."
 infernals.1010.b: "더 많은 항성을 정복해야 합니다."
 infernals.1015.name: "얼마나 뜨거워질 것인가?"
 infernals.1015.desc: "§Y$entropy_crystals$§!에 대한 계속된 연구에서 섬뜩한 가능성이 드러났습니다. 크리스탈을 고도로 농축하면 행성을 통째로 파괴할 수 있는 엄청난 규모의 무기 동력원으로 사용할 수 있다는 것입니다. 그런 힘이 있다면 은하계의 운명을 좌지우지할 수 있을 것입니다.\n\n하지만 이러한 군사적 활용을 탐구하면 우리와 이웃 사이에 남아 있는 최소한의 신뢰가 깨질 수 있습니다. 그리고 그런 무기가 언젠가 우리에게 향하지 않으리라고 누가 장담할 수 있을까요?\n\n공허한 평화의 말로는 충분하지 않습니다. 우리의 의도를 증명하고 싶다면, $galactic_crucible_2$를 공개적으로 제한해 그러한 무기를 절대 생산할 수 없도록 해야 합니다. 그렇지 않으면, 이 기술은 결국 우리 혹은 다른 누군가에 의해 무기화될 것이 분명합니다.\n\n§H이 결정은 특별 프로젝트를 잠금 해제합니다§!" # Reaching lv3 & decision
 infernals.1015.a: "전쟁의 불길을 지피세요!" # evil path
 infernals.1015.a.desc: "위기 단계 $crisis_hyperthermia_level_4$을 잠금 해제합니다.\n" #\n\n§HIssues Special Project:§! §Y$INF_CRISIS_ENTROPY_EVIL$§!
 infernals.1015.b: "야망을 줄이는 편이 좋겠군요." # good path
 infernals.1015.b.desc: "위기 단계 $crisis_hyperthermia_level_4$에 접근할 수 없게 막습니다. \n\n§H특별 프로젝트 활성화:§! §Y$INF_CRISIS_ENTROPY_GOOD$§!(§Y$galactic_crucible_2$§!를 §Y$galactic_crucible_5$§!으로 전환)"
 infernals.1020.name: "불 속으로"
 infernals.1020.desc: "§Y$entropy_crystals$§!과 §Y$INF_CRISIS_ENTROPY_EVIL$ 프로젝트§!에 대한 조사는 우리가 의심했던 바를 확인시켜 주었습니다. 파괴적인 무기의 가능성이 실재한다는 것입니다. 그런 힘을 손에 쥔 이상, 우리는 더 이상 외교적 체면을 위해 스스로를 억제할 필요가 없습니다.\n\n$galactic_crucible_3$의 확장은 가속화될 것이며, 특히 더... 공격적인 활용에 초점을 맞출 것입니다. 이 무기를 빨리 손에 넣을수록 은하계의 여론은 중요하지 않게 될 것입니다.\n\n§H거대 구조물 업그레이드 가능:§! §Y$galactic_crucible_4$§!" # Finishing special project for evil path
 infernals.1020.a: "전쟁에 대비해야 합니다."
 infernals.1020.a.tt: "- §Y$galactic_crucible_4$§! 확장을 우선시해야 합니다.\n- $unlocks_conduit_damage$"
 infernals.1020.b: "우리의 경쟁자들은 불쏘시개가 될 겁니다."
 infernals.1020.b.tt: "- §Y$galactic_crucible_4$§! 확장을 우선시해야 합니다.\n- $unlocks_conduit_damage$"
 infernals.1021.name: "지속되는 빛"
 infernals.1021.desc: "$galactic_crucible_3$의 기능을 성공적으로 줄여 더 이상 확장하거나 파괴적인 용도로 개조할 수 없게 되었습니다. 그 잠재력을 온전히 활용하지 못하는 것은 아쉽지만, 그 길을 계속 갔더라면 재앙의 위험과 모든 외교 관계의 붕괴를 감수해야 했을 것입니다.\n\n다행히도, $galactic_crucible_5$는 제한된 형태로나마 강력한 에너지와 번영의 원천으로 남을 것입니다. 우리는 선을 넘기 전에 한발 물러서서, 이 놀라운 과학의 혜택을 누리면서도 은하 공동체와 협력할 수 있는 미래를 확보했습니다.\n\n§H거대 구조물 업그레이드 가능:§! §Y$galactic_crucible_5$§!" # Finishing special project for good path
 infernals.1021.a: "협력은 모두에게 이롭기 마련이죠."
 infernals.1021.b: "조화 속에서 번영을 찾았군요."
 infernals.1025.name: "중심부 포위"
 infernals.1025.desc: "§Y$entropy_conduit_plural$§!과 항성을 적색 거성으로 변환하는 연구를 계속한 결과, 기존 작업을 확대해 은하 중심부 자체를 과열시키고 은하 전체에 열 연쇄 반응을 유발하여 우리에게 훨씬 유리한 환경으로 바꿀 가능성이 제시되었습니다.\n\n이 계획의 운영 거점으로 활용할 수 있는 중심부 주변의 여섯 성계를 확인했습니다. 이 성계들은 은하 초공간 항로망 너머에 있지만, 안정적인 웜홀을 생성하고 접근 경로를 확보하기 위한 노력이 진행 중입니다." # Reaching lv4
 infernals.1025.a: "우리만이 불길 속에서 살아남을 자격이 있습니다."
 infernals.1025.a.tt: "다른 종족들이 우리에게 맞서려 할 것입니다. 은하 전쟁에 대비하십시오."
 infernals.1025.b: "온 은하계가 조화롭게 타오를 것입니다."
 infernals.1025.b.tt: "다른 종족들이 우리에게 맞서려 할 것입니다. 은하 전쟁에 대비하십시오."
 infernals.1030.name: "점화를 향한 경주"
 infernals.1030.desc: "$galactic_crucible_4$는 이제 완전히 무장하고 가동 준비를 마쳤습니다. 웜홀 터널이 완성되어 우리는 은하 중심부의 여섯 전초 성계 모두에 대한 접근 경로를 확보했습니다.\n\n이제 중심부를 과열시키기 위한 작업을 시작할 수 있습니다. 다른 제국이 우리의 활동을 감지하고 이 성계들에 도달하려 할 수도 있지만, 지금은 우리가 우위를 점하고 있으며 중심부는 우리 의지 아래 있습니다.\n\n§H웜홀을 사용하여 은하 중심부 성계를 확보하십시오§!" # Reaching lv5, lanes open in 3 years!
 infernals.1030.a: "중심부 성계에서 설치 작업을 시작하세요."
 infernals.1030.a.tt: "여섯 개의 은하 중심부 성계에 §Y$entropy_conduit_plural$§!을 배치하면 은하계 전체를 단번에 과열시킬 수 있습니다. 준비를 시작해야 합니다."
 infernals.1030.b: "우리의 미래는 불꽃처럼 밝습니다."
 infernals.1030.b.tt: "$infernals.1030.a.tt$"
 infernals.1035.name: "은하 화재 경보"
 infernals.1035.desc: "경쟁 제국들이 은하 중심부 근처의 우리 전초 성계로 향하는 초공간 항로를 강제로 열었습니다. 중심부를 과열 상태로 유지하려면 이들의 저항에 대비해야 합니다.\n\n그럼에도 우리는 멈추지 않을 것입니다. 우주의 차가운 어둠은 씻겨 나가고, 승천하는 미래의 타오르는 영광으로 대체될 것입니다."
 # core is now connected with the galaxy!
 infernals.1035.a: "놈들은 우리의 불씨를 꺼뜨릴 수 없습니다."
 infernals.1035.b: "불길 속으로 몸을 던지게 놔둡시다."
 infernals.1040.name: "다가오는 폭풍"
 infernals.1040.desc: "은하 중심부가 요동치기 시작했습니다. 초거대 블랙홀 주변의 엔트로피 수준이 급증하며, 인근 성계로 열복사 파동을 내뿜고 있습니다.\n\n공포가 확산되는 가운데, 여러 행성에서 모인 용감한 과학자 팀이 중심부를 둘러싼 여섯 성계로 연결되는 새로운 초공간 항로를 밝혀냈습니다. 이 성계들에는 §Y[hyperthermia_empire.GetName]§!(이)가 운영 중인 시설이 있으며, 이들이 적극적으로 중심부를 과열시키고 있는 것으로 보입니다. 이 무모한 활동은 은하계 전역에 연쇄적인 화염 폭풍을 일으켜 [hyperthermia_empire.GetName]의 방화광적 야망을 막지 못하는 모든 존재를 집어삼킬 위험이 있습니다.\n\n살아남고 싶다면, 이 성계들을 돌파하고 놈들의 손아귀에서 통제권을 빼앗아야 합니다. 위기는 이미 시작되었으며, 온도는 계속 상승하고 있습니다." # other empires learn about the core, forming a coalition war
 infernals.1040.a: "반드시 막아야 합니다!" # generic reply (declares war)
 infernals.1040.a.tt: "§L전례 없는 규모의 위기가 은하계를 집어삼키려 합니다. 새로 결성된 동맹의 연합된 힘만이 우리를 구할 수 있습니다.§! \n\n위기에 맞서는 제국들의 §Y연합§!을 형성하여, 은하 전역의 분쟁을 초래합니다. 우리는 §Y[hyperthermia_empire.GetName]§!에 §R전쟁을 선포§!할 것입니다."
 infernals.1040.b: "나약한 자들이여, 불타 버려라!" # Genocidals reply
 infernals.1040.b.tt: "§L위기의 시대에는 각자도생해야 합니다. 우리는 스스로 이 문제를 해결할 힘이 있습니다.§!"
 infernals.1040.c: "우리와 비슷한 자들이군요." # Infernals reply
 infernals.1040.c.tt: "§L§Y[hyperthermia_empire.GetName]§!의 방식은 우리가 꿈꾸는 새로운 은하의 비전과 일치합니다. 이를 비추어 볼 때, 우리는 온 은하를 적으로 두는 이 재앙 같은 힘에서 일부나마 자유로울 수 있을지도 모릅니다.§!"
 infernals.1040.d: "우리가 걱정할 일은 아니군요." # neutral reply
 infernals.1040.d.tt: "§L불장난하는 제국은 그리 새롭지도 않습니다. 모든 것이 그렇듯, 이 또한 지나갈 것입니다. 우리가 관여할 이유는 찾기 어렵습니다.§!"
 infernals.1042.name: "고조: §R위기 선포§!"
 infernals.1042.desc: "역사의 가장 위대한 변혁에는 항상 희생이 따랐습니다. 그런데도 은하 공동체는 우리의 과업을 필연이 아닌 위협으로 간주하고 있습니다. 이에 따라, 통일된 군사 연합이 우리를 상대로 동원되었습니다.\n\n저들의 내건 목표가 말살인 이상, 우리에게는 다른 선택지가 없습니다. 압도적인 힘으로, 은하 중심부나 $galactic_crucible_4$에 대한 어떠한 접근도 막아 낼 것입니다.\n\n우리의 비전은 별들마저 불태웠습니다. 이에 맞서는 자들은 우리가 불러온 폭풍을 마주해야 할 것입니다.\n\n§H은하 중심부 성계를 방어하면 우리의 승리가 보장됩니다!§!"
 infernals.1042.a: "결과는 정해져 있습니다."
 infernals.1043.name: "모집령: §R위기 선포§!"
 infernals.1043.desc: "은하 중심부의 위협이 고조됨에 따라, 은하 공동체는 §Y[hyperthermia_empire.GetName]§!에 대한 통일된 대응책을 제정했습니다. 은하계의 온도를 높이려는 저들의 광적인 행위는 모든 알려진 생명체를 위험에 빠뜨립니다.\n\n그 야망을 저지하지 않는다면 수많은 문명이 멸종할 것입니다. 소위 §Y[hyperthermia_empire.GetName]§!(은)는 이제 필연에 의해 단결한 연합과 직접적으로 대립하고 있습니다.\n\n수조 명의 생명이 달린 전투가 시작되었습니다.\n\n§H은하 중심부 성계를 확보하지 못한다면 모든 것을 잃게 될 것입니다!§!"
 infernals.1043.a: "함대를 동원하세요!"
 infernals.1045.name: "시간과의 싸움"
 infernals.1045.desc1: "연쇄 화염 폭풍이 임박했습니다. 곧 은하 중심부가 폭발하여 적들을 정화하고, 별들에 대한 우리의 지배를 확고히 할 것입니다.\n\n하지만 은하계는 우리의 빛나는 미래를 거부하는 듯합니다. 새로 만들어진 초공간 항로를 통해 적들은 우리의 전초 기지를 침공하고, 우리가 쌓아 올린 모든 것을 무너뜨리려 하고 있습니다. 대체 왜 막으려 하는 걸까요? 차갑고, 정체된 어둠을 지키고 싶기 때문일까요?\n\n이런 방해는 용납할 수 없습니다. 화염 폭풍이 솟아올라 놈들을 잿더미로 만들 때까지, 우리는 중심부에서 전선을 지켜야 합니다." # last stage of global situation - crisis
 infernals.1045.desc2: "§Y[hyperthermia_empire.GetName]§!의 방화에 대한 집착으로 은하 중심부가 점점 더 뜨거워지고 있습니다. 이 속도라면 화염 폭풍이 모든 반대 세력을 쓸어 버리고 은하계에서 거의 모든 생명체를 제거해 버릴 것입니다.\n\n놈들과는 이성적인 대화가 통하지 않습니다. 우리가 살아남으려면, 그 근원을 공격해야 합니다. 그 힘이 가장 밝게 타오르는 은하 중심부 성계 말입니다. 그래야만 §Y[hyperthermia_empire.GetName]§!(을)를 막을 수 있습니다.\n\n은하계 전체의 운명이 위태롭습니다. 불장난하는 자는 그 불길에 삼켜지고 만다는 사실을 §Y[hyperthermia_empire.GetName]§! 놈들에게 보여줄 시간입니다." # last stage of global situation - others
 infernals.1045.a: "반드시 전선을 지켜야 합니다."
 infernals.1045.a.tooltip: "승리를 위해서는 여섯 개의 중심부 성계에 대한 통제권을 유지해야 합니다."
 infernals.1045.b: "놈들을 완전히 끝장내야 합니다."
 infernals.1045.b.tooltip: "여섯 개의 중심부 성계를 공격하여 그곳에 있는 §Y[hyperthermia_empire.GetName]§!의 도관을 파괴해야 합니다. 그렇지 않으면 우리가 소각될 것입니다."
 infernals.1055.name: "은하계는 우리 것이다!"
 infernals.1055.desc: "은하 중심부에서 가장 바깥쪽 별들까지, 승리의 불길을 지피는 데 성공했습니다. 화염 폭풍은 적들을 잿더미로 만들었습니다. 놈들은 우리가 차지한 영광스러운 미래를 받아들일 비전도, 용기도 없었습니다. 은하계는 우리의 것입니다.\n\n이 새로운 불과 분노의 질서 속에서 행성들은 마그마와 빛으로 끓어오르고, 부풀어 오르는 적색 거성의 열기로 빛납니다. 모든 성계에서 엔트로피가 급증하며, 우리 의지에 따라 사용됩니다. 날이 갈수록 우리 제국은 더욱 부유하고 강력해지며... 막을 수 없는 존재가 되어 갑니다.\n\n우리는 은하를 삼키고, 공허 속에서 불타는 횃불로 다시 창조했습니다. 그리고 아마도 언젠가는, 다른 은하들마저 장작더미 위로 던져 넣을 것입니다." # crisis won
 infernals.1055.a: "이 새로운 은하는 우리 차지입니다."
 infernals.1055.b: "결국, 모든 불은 하나로 합쳐지기 마련입니다."
 infernals.1055.c: "우리의 불타는 고향에 미지근한 약골은 필요 없습니다." #Scorched world heralds (genocidal Infernal)
 infernals.1055.d: "우리의 인내가 마침내 보상받았군요." #Infernal Fire Cult
 infernals.1055.e: "마침내 이 은하계에서 차가운 어둠을 몰아냈습니다." #Other Infernals
 infernals.1055.f: "마침내 우리의 비참한 경쟁자들이 잿더미가 되었군요." #Generic Genocidal
 infernals.1052.name: "$galactic_crucible_4$ 점령"
 infernals.1052.desc: "§H[crucible_system.GetName]§! 성계를 점령함으로써 우리 군은 해당 성계의 항성 주변에 건설 중이던 $galactic_crucible_4$에 대한 제어권도 확보했습니다.\n\n이 거대 구조물을 만든 자들은 은하계를 힘으로 장악하려 했겠지만, 구조물이 우리 손에 넘어옴으로써 그 꿈은 산산이 부서졌습니다."
 infernals.1052.a: "부숴 버리세요!"
 infernals.1052.a.tt: "§Y$galactic_crucible_4$§!를 복구 불가능한 수준으로 파괴합니다."
 infernals.1052.b: "이 구조물을 우리가 활용할 수 있겠군요."
 infernals.1052.b.tt: "§Y$galactic_crucible_4$§!를 §Y$galactic_crucible_5$§!으로 바꾸어 $r_alloys$을 생산합니다."
 infernals.1053.name: "$galactic_crucible_4$ 점령"
 infernals.1053.desc: "우리는 §H[crucible_system.GetName]§! 성계를 점령함으로써 유례없는 화염 폭풍으로 은하계 전체를 말살하려는 §H[crucible_builders.GetName]§!의 음흉한 계획을 밝혀냈습니다.\n\n대멸종을 일으킬 힘을 지닌 그 기계는 현재로서는 가동을 멈춘 상태입니다. 전쟁이 끝나는 대로 남은 자원과 힘을 모아 이 초거대 구조물을 영구히 무력화해야 할 것입니다."
 infernals.1053.a: "이 전쟁을 어서 끝냅시다!"
 infernals.1053.b: "아주 흥미로운 건축물이군요."
 infernals.1056.name: "다시 태어난 은하"
 infernals.1056.desc: "우리가 은하계 전체를 점화할 불꽃을 일으키는 데 몰두하던 사이, §Y[hyperthermia_empire.GetName]§!에서 이미 여러 항성을 무기로 바꾸어 은하의 모습을 영원히 바꾸어 버렸습니다.\n\n지금은 이 새로 만들어진 유토피아를 받아들여야겠지만, 저들이 앞으로 은하계에 대한 지배를 점차 공고히 하면서 어떠한 행보를 취할지 면밀히 지켜보아야 할 것입니다."
 infernals.1056.a: "막강한 힘은 분쟁으로 이어지는 법이죠."
 infernals.1056.b: "새로운 위협이 나타났군요."
 infernals.1056.c: "뜻밖의 전개로군요."
 # Relic
 r_crystallized_singularity: "결정화된 특이점"
 r_crystallized_singularity_desc: "불타는 은하계 속 뒤틀린 이 특이점은 매혹적인 열기를 내뿜습니다. 조심스럽게 봉인하지 않으면, 가장 황량한 세계에서조차 설명할 수 없는 매력으로 순례자들을 끌어들일 것입니다. 그 앞에 서는 자들은 더 단순하고, 불꽃에 가까운 삶을 받아들이고자 하는 강한 충동을 느낍니다."
 r_crystallized_singularity_effect_tt: "\n- £physics_research£ §Y$physics_research$§! 수입의 §G10%§!가 $r_energy$도 함께 생성합니다."
 r_crystallized_singularity_ls_effect_tt: "- 개척 가능한 행성에서 새로운 원시 문명을 창조하는 §Y$decision_gh_life_seeding$§! 결정을 잠금 해제합니다."
 crystallized_singularity_mod: "$r_crystallized_singularity$"
 crystallized_singularity_mod_desc: "$r_crystallized_singularity_desc$"
 decision_gh_life_seeding: "생명 파종"
 decision_gh_life_seeding_desc: "은하계를 재편하는 데 성공한 결과, 대부분의 행성에서 생명체가 빠르게 멸종했습니다. 이제 우리는 우리의 형상대로 생명을 재창조할 특권을 갖게 되었습니다."
 decision_gh_life_seeding_limit: "$TRIGGER_FAIL$§R이 행성에는 이미 원시 문명이 있습니다.§!"
 decision_gh_life_seeding_colony: "$TRIGGER_FAIL$§R식민지가 있는 성계에서는 실행할 수 없습니다.§!"
 decision_gh_life_seeding_effect: "우리의 형상대로 원시 문명을 창조합니다. \n\n§H활성화 한도:§! [from.gh_life_seeder_var] / 3"
 # Grand Archive Specimen
 infernal_burning_gem: "타오르는 보석"
 infernal_burning_gem_desc_short: "[GetName](이)가 엔트로피를 활용하려는 노력 중에 만들어낸 최초의 작동하는 시제품 중 하나입니다."
 infernal_burning_gem_desc_details: "대부분의 시각 체계에는 속임수처럼 흐릿하게 보이지만, 이 크리스탈 파편의 희미한 흰색 빛은 그 안에 간신히 담긴 엄청난 양의 에너지를 감추고 있습니다. 비록 최신 기술에 비해 뒤떨어졌을 수는 있지만, 그 구조와 특성은 여전히 많은 통찰을 제공합니다."
 # Timeline
 TIMELINE_EVENT_GH_START: "화염 폭풍\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_START_TOOLTIP: "§H위기의 화신§!\n§Y위기 이벤트§!\n\n[EVENT_TARGET_0.GetName](이)가 자신의 영역에 불을 붙여 은하계의 운명을 장악하기 시작했습니다. 이 비전을 공유하지 않는 자들은 타오르는 정복의 불길에 휩쓸려 잿더미만 남게 될 것입니다."
 TIMELINE_EVENT_GH_END: "집어삼키는 화염\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_END_TOOLTIP: "§H은하계의 패배§!\n§Y위기 이벤트§!\n\n불타는 야망으로 시작된 존재가 은하계를 정화한 불꽃이 되었습니다. 우리에게 반대했던 자들은 자신들의 역사와 함께 잿더미가 되었습니다."
