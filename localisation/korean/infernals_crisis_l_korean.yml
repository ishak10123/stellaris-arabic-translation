 # Weapon
 LENS_FLARE_BEAM: "마비 광선"
 LENS_FLARE_BEAM_DESC: "이 무기의 광선은 핵심 제어 시스템을 교란하도록 조정되어, 적의 저항 없이 공격할 수 있는 짧은 기회를 제공합니다."
 lfb_on_hit_stun_tt: "대상을 §G7§!일 동안 §Y무력화§!하여 이동하거나 반격할 수 없게 만듭니다."
