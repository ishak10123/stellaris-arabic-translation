 # Objectives
 crisobj_own_volcanics_name: "화산 행성 소유"
 crisobj_own_volcanics_desc: "성계의 열기가 상승하면 화산 활동이 증가해, 불의 임무를 추진하기에 완벽한 환경을 만듭니다. 앞서 나가기 위해 §Y화산 행성§! 개척을 우선해야 합니다.\n\n매년 §Y$pc_volcanic$§! 식민지 수에 비례하여 §Y$entropy_crystals$§! 수입을 지속적으로 제공합니다."
 crisobj_create_volcanics_name: "화산 행성 생성"
 crisobj_create_volcanics_desc: "은하 전역에 행성 화산 활동을 퍼뜨리면 우리의 엔트로피 크리스탈 경제에 활력이 더해질 것입니다. 올바른 테라포밍 기술이 있다면 원하는 곳 어디에서든 지속적인 화산 활동을 유발할 수 있습니다.\n\n행성을 §Y$pc_volcanic$§!으로 테라포밍하십시오."
 crisobj_own_red_stars_name: "적색 항성 소유"
 crisobj_own_red_stars_desc: "적색 항성 주변 성계에 정착하는 것을 우선해야 합니다. 적색 항성의 광대한 방출 표면은 열에너지를 수확하기에 이상적입니다.\n\n국경 내 각 §Y$pc_m_star$§! 또는 §Y$pc_m_giant_star$§!에 비례해 매달 §Y$entropy_crystals$§! 수입을 지속적으로 제공합니다."
 crisobj_create_red_stars_name: "적색 항성 생성"
 crisobj_create_red_stars_desc: "엔트로피 크리스탈을 주입하여 항성을 적색 거성으로 팽창시키고, 불타오르는 우리 신제국의 부흥에 박차를 가할 수 있습니다.\n\n§Y$entropy_conduit_plural$§!에 의해 테라포밍된 항성은 §Y$pc_m_giant_star$§!이 됩니다."
 crisobj_planet_firestorm_name: "행성 방화"
 crisobj_planet_firestorm_desc: "이제 경쟁자들에게 패권의 진정한 의미를 가르쳐 줄 시간입니다. 화염 폭풍 포격으로 적들의 행성을 잿더미로 만듭시다.\n\n§Y$bombardment_firestorm$§!으로 식민지를 포격하여 §R100%의 황폐도§!를 가하십시오."
 crisobj_lens_beam_impact_name: "방해 함선"
 crisobj_lens_beam_impact_desc: "냉대 및 온대 행성은 우리에게 아무 쓸모가 없습니다. 그 표면을 녹여 우리의 필요에 맞는 형태로 바꿔야 합니다.\n\n§Y$entropy_conduit_plural$§!과 §Y$ember_battleship_plural$§!에 장착된 £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§! 무기를 사용해 적 행성을 포격하십시오."
 crisobj_entropy_starbase_name: "중력 원심 분리기 소유"
 crisobj_entropy_starbase_desc: "중력 원심 분리기는 더 많은 $entropy_crystals$을 모으는 데 도움이 될 것입니다. \n\n§Y쌍성계§!, §Y삼중성계§!, 또는 §Y$pc_black_hole$§! 성계에 §Y$sm_gravitational_centrifuge$§! 항성 기지 건물을 건설하십시오."
