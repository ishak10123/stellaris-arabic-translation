l_korean:
 # Ascension Perk
 ap_galactic_hyperthermia: "은하계 과열"
 ap_galactic_hyperthermia_desc: "우주는 불길 속에서 시작되었지만, 차갑고 적대적인 어둠으로 식어 버렸습니다. 우리의 번영을 위해서는 우주의 온도를 다시 높여야 합니다. 비록 다른 희생자가 생길지라도 말입니다."
 must_be_infernals: "$TRIGGER_FAIL$우리 인구가 호열체여야 합니다."
 # UI
 entropy_crystals: "엔트로피 크리스탈"
 entropy_crystals_name: "$entropy_crystals$:"
 entropy_crystals_value: "£entropy_crystals£ $VAL|0$"
 entropy_crystals_gaining: "§H위기 목표§!를 완료해 더 많은 £entropy_crystals£ §Y$entropy_crystals$§!을 얻으십시오."
 entropy_crystals_desc: "날것의 에너지로 이루어진 이 날카롭고 반짝이는 매트릭스는 언뜻 불안정해 보이지만, 적당한 안정성을 지녀 연료로 사용하거나 장비에 내장할 수 있습니다."
 mod_country_base_entropy_crystals_produces_add: "월간 £entropy_crystals£ $entropy_crystals$"
 entropy_crystals_crisis_objective: "$menace_crisis_objective$"
 entropy_crystals_crisis_objective_gained: "£entropy_crystals£ 획득"
 entropy_crystals_crisis_objective_reward: "$REWARD$"
 entropy_crystals_crisis_objective_progress: "이 위기 목표로 $AMOUNT$ £entropy_crystals£을 획득했습니다."
 entropy_crystals_crisis_level_locked: "이 단계를 잠금 해제하기 위해 필요:\n" # remove?
 entropy_crystals_crisis_level_unlocked: "$LEVEL$에서 다음 보상을 획득:\n"
 entropy_crystals_crisis_level_desc: "위기 단계를 진행하려면 $entropy_crystals$을 축적하고 §Y$galactic_crucible_4$§!를 건설해야 합니다."
 entropy_crystals_crisis_level_unlock: "£entropy_crystals£ §Y$CURRENCY$§! $entropy_crystals$ 보유"
 entropy_crystals_current_value: "현재 수치: §Y$VALUE|0$§!"
 entropy_crystals_crisis_description_title: "$ap_galactic_hyperthermia$"
 entropy_crystals_crisis_description: "$menace_crisis_description_intro$\n\n에너지를 조작하는 새로운 방법은 막대한 힘을 가져다줄 것입니다. 이 시대를 불태우기 위해서는 항성의 불꽃 그 자체를 활용해야 합니다."
 entropy_crystals_crisis_howto_title: "힘의 원천"
 entropy_crystals_crisis_howto: "§H위기 목표§!를 추진하면 £entropy_crystals£ §H$entropy_crystals$§!이 생성되어, 이를 사용하여 $galactic_crucible_4$를 업그레이드하고 다음 위기 단계를 잠금 해제할 수 있게 됩니다."
 # Level
 crisis_hyperthermia_already_ongoing: "다른 제국이 이미 은하 중심부를 제어하고 있습니다."
 crisis_hyperthermia_already_happened: "다른 제국이 이미 은하 중심부를 제어해 은하의 모습을 바꾸고 있습니다."
 crisis_hyperthermia_level_1: "§R우려§!"
 crisis_hyperthermia_level_1_desc: "$crisis_level_1_desc$"
 crisis_hyperthermia_lv1_tt: "£trigger_yes£ §Y$INF_CRISIS_ENTROPY$§! 특별 프로젝트를 완료함"
 crisis_hyperthermia_lv1_req_tt: "£trigger_no£ §Y$INF_CRISIS_ENTROPY$§! 특별 프로젝트를 완료함"
 crisis_hyperthermia_level_2: "§R위험§!"
 crisis_hyperthermia_level_2_desc: "$crisis_level_2_desc$"
 crisis_hyperthermia_lv2_tt: "£trigger_yes£ §Y$galactic_crucible_0$§! 거대 구조물을 건설하고 §Y$galactic_crucible_1$§!로 업그레이드함"
 crisis_hyperthermia_lv2_req_tt: "£trigger_no£ §Y$galactic_crucible_0$§! 거대 구조물을 건설하고 §Y$galactic_crucible_1$§!로 업그레이드함"
 crisis_hyperthermia_level_3: "§R위해§!"
 crisis_hyperthermia_level_3_desc: "$crisis_level_3_desc$"
 crisis_hyperthermia_lv3_tt: "£trigger_yes£ §Y$galactic_crucible_1$§! 거대 구조물을 업그레이드함"
 crisis_hyperthermia_lv3_req_tt: "£trigger_no£ §Y$galactic_crucible_1$§! 거대 구조물을 업그레이드함"
 crisis_hyperthermia_level_4: "§R재난§!"
 crisis_hyperthermia_level_4_desc: "$crisis_level_4_desc$"
 crisis_hyperthermia_lv4_tt: "£trigger_yes£ §Y$galactic_crucible_2$§! 거대 구조물을 업그레이드함"
 crisis_hyperthermia_lv4_req_tt: "£trigger_no£ §Y$galactic_crucible_2$§! 거대 구조물을 업그레이드함"
 crisis_hyperthermia_dec_lv4_tt: "£trigger_yes£ §Y$INF_CRISIS_ENTROPY_EVIL$§! 특별 프로젝트를 완료함"
 crisis_hyperthermia_lv4_dec_req_tt: "£trigger_no£ §Y$INF_CRISIS_ENTROPY_EVIL$§! 특별 프로젝트를 완료함"
 crisis_hyperthermia_level_5: "§R실존적 위험§!"
 crisis_hyperthermia_level_5_desc: "$crisis_level_5_desc$"
 crisis_hyperthermia_lv5_tt: "£trigger_yes£ §Y$galactic_crucible_3$§! 거대 구조물을 업그레이드함"
 crisis_hyperthermia_lv5_req_tt: "£trigger_no£ §Y$galactic_crucible_3$§! 거대 구조물을 업그레이드함"
 # MPerks Level 1
 menp_hyperthermia_crystals: "$entropy_crystals$"
 menp_hyperthermia_crystals_desc: "§Y$entropy_crystals$§!은 통제된 에너지 불안정화의 새 돌파구를 열었습니다. 이 불안정한 자원을 확보함으로써 우리는 은하계의 질서를 새로이 설계할 수 있습니다."
 unlocks_entropy_objectives: "§H위기 목표§!를 달성하면 £entropy_crystals£ §Y$entropy_crystals$§!을 축적할 수 있습니다."
 menp_hyperthermia_harnessing: "엔트로피 활용"
 menp_hyperthermia_harnessing_desc: "§Y$entropy_crystals$§! 합성을 산업에 통합하면 이 불안정한 자원을 더욱 효율적으로 사용할 수 있게 되어, 우리 기술 중점을 전략 목표와 일치시킬 수 있습니다."
 unlocks_entropy_edict: "§H시행령 잠금 해제:§! $edict_entropy_harnessing$"
 menp_hyperthermia_crucible: "은하 도가니"
 menp_hyperthermia_crucible_desc: "현재 구상 중인 이 도가니는 이후 항성 엔트로피 활용의 핵심이 될 것입니다. 엔트로피를 크리스탈화하고 운반할 능력을 갖춘 도가니는 우리의 불타는 힘을 상징하는 봉화가 되어, 별들 사이로 그 힘을 퍼뜨릴 것입니다."
 unlocks_galactic_crucible: "§H거대 구조물 잠금 해제:§! $galactic_crucible_0$"
 # MPerks Level 2
 menp_hyperthermia_conc_entropy: "응축 엔트로피"
 menp_hyperthermia_conc_entropy_desc: "현 단계에서 우리의 힘을 확장하려면 $entropy_conduit_plural$이 필수적입니다. 도가니의 생산량을 늘리면 더 밝게 불타는 미래를 향한 우리의 행진이 빨라질 것입니다."
 unlocks_conduit_spawn: "§H$UNLOCKS_SHIP_TYPE$:§! $entropy_conduit$ \n- §Y$entropy_conduit_plural$§!은 §Y$galactic_crucible_4$§!에 의해 자동으로 생성되어 인근 성계로 이동합니다. \n- 대상 성계 내의 식민지는 보너스를 받습니다. \n- 공격 시 며칠 동안 적을 무력화하는 £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!을 장착합니다. \n\n"
 menp_hyperthermia_radiant: "찬란한 야망"
 menp_hyperthermia_radiant_desc: "은하를 불붙이는 불꽃이 된다는 것은 망설이거나 관료제에 얽매일 시간이 없다는 뜻입니다. 체계 재구성에 시간을 낭비할 여유가 없습니다. 목표 달성을 위해서는 우리의 건설 능력을 극적으로 향상해야 합니다."
 menp_hyperthermia_ignition: "강제 점화"
 menp_hyperthermia_ignition_desc: "노력만으로는 부족할 때가 있습니다. 우리의 기술을 한 단계 높여 잠재력을 최대한 활용해야 합니다. 이제 안전장치를 최소화하고 생산량을 극대화할 때입니다."
 unlocks_crucible_overclocking: "§Y$galactic_crucible_1$§! §H거대 구조물§!의 '오버클럭'을 활성화합니다."
 # MPerks Level 3
 menp_hyperthermia_cruiser: "$ember_cruiser$"
 menp_hyperthermia_cruiser_desc: "최첨단 기술을 탑재한 이 함선들은 불안정한 열 흐름을 제어된 파괴력으로 전환하여, 적들을 새까만 잿더미로 만들어 버립니다."
 unlocks_ember_cruiser: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_cruiser$"
 menp_hyperthermia_flames: "휘몰아치는 화염"
 menp_hyperthermia_flames_desc: "우리가 꿈꾸는 유토피아에서는 반대 의견에 시간을 낭비할 여유가 없습니다. 우리를 막는 자가 누구든, 자신의 저항이 곧 화염의 비로 바뀌어 고향에 쏟아지는 모습을 보게 될 것입니다."
 unlocks_firestorm_stance: "§H테라포밍 잠금 해제:§! $pc_volcanic$ \n§H폭격 태세 잠금 해제:§! $bombardment_firestorm$\n\n"
 menp_hyperthermia_coronal: "열기 방출"
 menp_hyperthermia_coronal_desc: "우리 $entropy_conduit_plural$은 현재 안정을 유지하기 위해 막대한 열을 뿜어내고 있습니다. 그 열을 주변 우주 공간으로 방출함으로써, $entropy_conduit_plural$을 적에게 치명적인 무기로 바꿀 수 있습니다."
 unlocks_conduit_damage: "§Y$entropy_conduit_plural$§!이 적대적인 함선과 정거장에 지속 피해를 줍니다. \n\n"
 # MPerks Level 4
 menp_hyperthermia_reactors: "태양 융합 반응로"
 menp_hyperthermia_reactors_desc: "군사 기술에 §Y$entropy_crystals$§!을 활용하면 비할 데 없이 강력한 추진 시스템을 얻을 수 있습니다. 우리 함선은 그 어느 때보다 빠르게 별들 사이를 질주하게 될 것입니다."
 menp_hyperthermia_solarflare: "인공 항성 플레어"
 menp_hyperthermia_solarflare_desc: "한때 은하계의 일부는 우리의 손이 닿지 않는 곳에 있었습니다. 그 환상은 이제 끝나 가고 있습니다. 곧 $entropy_conduit_plural$ 무리가 별들을 가득 메우고, 우리를 거스르는 모든 이들에게 정밀하게 계산된 파괴를 선사할 것입니다."
 unlocks_conduit_borders: "§Y$entropy_conduit_plural$§!이 자동으로 국경을 넘어 적 영역으로 진입합니다. \n\n"
 menp_hyperthermia_armada: "타오르는 함대"
 menp_hyperthermia_armada_desc: "은하계가 우리에 맞서 결집함에 따라 총동원이 불가피해졌습니다. 이제 모든 시민이 에너지 전선을 유지하고, 패권의 불길을 지피는 데 기여해야 합니다."
 unlocks_blazing_navalcap: "§Y[GetAlloyProducerPlural]§! 및 §Y[GetResearcherPlural]§!(은)는 £navy_size£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!을 증가시킵니다.\n\n"
 # MPerks Level 5
 menp_hyperthermia_battleship: "$ember_battleship$"
 menp_hyperthermia_battleship_desc: "금방이라도 은하계를 집어삼킬 듯한 화염 폭풍만큼이나 뜨거운 포신을 갖춘 이 대형 함선들이 도가니 인근 지역의 주력 방어 병력이 될 것입니다."
 unlocks_ember_battleship: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_battleship$ \n- £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§! 무기를 장착할 수 있습니다."
 menp_hyperthermia_critical_mass: "임계 질량"
 menp_hyperthermia_critical_mass_desc: "항성 외층에서 엔트로피 활동이 증가하면, 항성은 막대한 방사선을 방출하게 됩니다. 이로 인해 성계 전체가 더 빠르게 과열되고 있습니다."
 unlocks_conduit_boost: "§Y$entropy_conduit_plural$§!은 점령한 성계의 수에 따라 더 강해집니다.\n\n$hyperthermia_map_perc$\n\n"
 hyperthermia_map_perc: "은하계의 §G20%§!: $TABBED_NEW_LINE$- $entropy_conduit_plural$이 인근 식민지에 황폐도를 가함 $TABBED_NEW_LINE$- 영향을 받은 식민지에서 서서히 £pop£ $POPS$ 감소 $TABBED_NEW_LINE$- §Y호열체§!가 아닌 종족의 제국에만 영향을 미침 $TABBED_NEW_LINE$- 필요 성계: §Y[root.hyperthermia_own_systems_var]§!/§Y[root.hyperthermia_systems_var]§!"
 menp_hyperthermia_ammunition: "엔트로피 주입 탄약"
 menp_hyperthermia_ammunition_desc: "탄약 설계 개선: 이제 표준 포탄에 초소형 엔트로피 핵이 장착되어 명중 시 불안정한 열파를 방출합니다. 이로 인해 파괴력이 눈에 띄게 향상됩니다."
 # Misc
 entropy_crystals_deficit: "$entropy_crystals$ 부족"
 edict_entropy_harnessing: "엔트로피 활용"
 edict_entropy_harnessing_desc: "$entropy_crystals$ 생산을 기반 시설에 통합하면 우리의 기술력을 최대한 발휘하고, 이 불안정한 신규 자원의 잠재력을 최대한 활용할 수 있습니다."
 mod_planet_technician_entropy_crystals_produces_add: "£job_technician£ [GetTechnician](으)로 인한 £entropy_crystals£ §Y$entropy_crystals$§!"
 mod_shipsize_ember_cruiser_weapon_damage: "$MOD_SHIP_WEAPON_DAMAGE$($ember_cruiser$)"
 mod_shipsize_ember_battleship_weapon_damage: "$MOD_SHIP_WEAPON_DAMAGE$($ember_battleship$)"
 mod_conduit_spawnrate_add: "£time£ $entropy_conduit$ 건설 시간"
 mod_conduit_spawnrate_switch: "$entropy_conduit$ 건설: §R비활성화됨§!"
 mod_conduit_spawnrate_switch_short: "§R$entropy_conduit$ 건설 비활성화§!"
 mod_shipsize_ember_cruiser_speed_mult: "$MOD_SHIP_SPEED_MULT$($ember_cruiser$)"
 mod_shipsize_ember_battleship_speed_mult: "$MOD_SHIP_SPEED_MULT$($ember_battleship$)"
 ENTROPY_WORMHOLE: "$NATURAL_WORMHOLE_GALACTIC$"
 BYPASS_ENTROPY_WORMHOLE: "$ENTROPY_WORMHOLE_GALACTIC$"
 BYPASS_DESC_UNKNOWN_ENTROPY_WORMHOLE: "우리는 이런 유형의 형성물을 본 적이 없습니다."
 ENTROPY_WORMHOLE_GALACTIC: "이상 웜홀"
 ENTROPY_WORMHOLE_DESC: "이 성계에는 $DEST|Y$(으)로 연결된 §Y웜홀§!이 있습니다."
 ENTROPY_WORMHOLE_DESC_UNEXPLORED: "이 성계에는 §R아직 탐사하지 않은§! §Y웜홀§!이 있습니다."
 ENTRY_BYPASS_ENTROPY_WORMHOLE: "$BYPASS_TYPE$"
 EXIT_BYPASS_ENTROPY_WORMHOLE: "출구 $BYPASS_TYPE$"
 personality_hyperthermia_empire: "열치주의"
 personality_hyperthermia_empire_desc: "열치주의 제국의 통치는 에너지와 엔트로피, 그리고 항성의 불꽃을 숭상하는 이념에 기반합니다. 이 제국은 정복 행위 대신 불타는 열기와 의지로 은하계를 조형합니다."
 triggered_opinion_hyperthermia_empire: "$personality_hyperthermia_empire$ 제국"
 mod_job_metallurgist_naval_cap_add: "£job_foundry£ [GetAlloyProducer] 직업으로 인한 £mod_country_naval_cap_add£ $MOD_COUNTRY_NAVAL_CAP_ADD$"
 crisis_thermophile_adaptation: "호열성 적응"
 crisis_thermophile_adaptation_desc: ""
 crisis_conduit_stop: "$mod_conduit_spawnrate_switch$" # modifier is hidden
 crisis_conduit_stop_desc: ""
 sm_gravitational_centrifuge: "중력 원심 분리기"
 sm_gravitational_centrifuge_desc: "이 구조물은 강력한 중력 변동을 활용해 폐기물을 분자 수준으로 분해하고, 이를 엔트로피 플라스마로 만들어 재사용 가능한 형태로 크리스탈화합니다."
 gravitational_centrifuge_tt: "§H$crisobj_entropy_starbase_name$§! 위기 목표 완료"
 requires_multiple_stars_or_or_bh: "§R§Y쌍성계§!, §Y삼중성계§!, 또는 §Y$pc_black_hole$§!이 필요합니다.§!"
 # Conduit Starforming
 crisis_conduit_buff: "항성 감독"
 crisis_conduit_buff_desc: "지역 항성의 대기가 급격한 변화를 겪으며 성계 전체에 강렬한 항성 플레어가 쏟아지고 있습니다. 남들에게는 재앙과도 같은 일이지만, 우리에게는 번영할 수 있는 완벽한 기회입니다."
 TERRAFORM_ORDER: "항성 변환"
 TERRAFORM_ORDER_DESC: "대상 항성을 서서히 §Y$pc_m_giant_star$§!으로 바꿉니다."
 TERRAFORM_ORDER_RESEARCH: "엔트로피 크리스탈의 축적 에너지를 사용하여 작은 항성을 강력한 적색 거성으로 팽창시킬 수 있습니다."
 FLEETORDER_TERRAFORM_BUTTON: "$TERRAFORM_ORDER$"
 FLEETORDER_TERRAFORM: "$PLANET|Y$ 항성 제련 중($PROGRESS|Y%0$)"
 FLEETORDER_BOOST_STAR: "항성 점화"
 CAN_NOT_TERRAFORM_STAR: "$TRIGGER_FAIL$주 항성이어야 합니다."
