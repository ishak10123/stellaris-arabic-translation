 sm_refinery: "정제소"
 sm_synchronized_defenses: "통합 방어"
 sm_corvette_assembly_yards: "초계함 조립소"
 sm_destroyer_assembly_yards: "구축함 조립소"
 sm_cruiser_assembly_yards: "순양함 조립소"
 sm_battleship_assembly_yards: "전함 조립소"
 sm_reinforced_hull_layers: "강화된 선체 레이어"
 sm_observatory: "천문대"
 sm_engineering_bay: "공학 연구소"
 sm_crew_quarters: "승무원 거주 구역"
 sm_crew_quarters_desc: "승무원들을 위한 숙박 시설과 지원을 제공해, 정박 중인 함대의 병참 부담을 줄입니다.\n"
 sm_crew_quarters_machine_intelligence: "지원 연결부"
 sm_crew_quarters_desc_machine_intelligence: "지원 연결부는 정박한 함대를 기지의 핵심 인공 지능과 직접적으로 연결해, 함대의 수리 및 개조를 지원합니다.\n"
 sm_crew_quarters_hive_mind: "승무원 배양실"
 sm_crew_quarters_desc_hive_mind: "승무원 드론을 현장에서 직접 배양하고 출산하기 때문에, 지역 함대의 병참에 도움이 됩니다.\n"
 sm_hydroponic_farms: "궤도 수경 재배 농장"
 sm_orbital_mind_control_laser: "궤도 정신 지배 레이저"
 sm_fallen_empire_weapon: "타키온 랜스 방어 모듈"
 sm_pioneering_terminal: "개척 터미널"
 sm_solar_panel_network: "태양력 발전망"
 sm_neutronium_fission_plant: "뉴트로늄 핵분열 발전소"
 sm_fleet_academy: "함대 사관 학교"
 sm_fleet_academy_machine_intelligence: "전투 시뮬레이터"
 sm_fleet_academy_hive_mind: "$sm_fleet_academy_machine_intelligence$"
 sm_fleet_academy_desc: "신참 승무원들이 제대로 전투태세를 갖추려면, 유능한 장교들의 지도가 필요합니다. 함대 사관 학교의 장교들은 성간 전쟁의 교리와 경험에 관한 최신 지식을 갖추고 있습니다."
 sm_fleet_academy_desc_machine_intelligence: "다양한 전투 시나리오 시뮬레이션을 반복함으로써, 선상 전투 드론은 실제 전투에 더욱 잘 대비할 수 있을 것입니다."
 sm_fleet_academy_desc_hive_mind: "$sm_fleet_academy_desc_machine_intelligence$"
 sm_navigator_guild: "항해사 조합"
 sm_living_metal_armory: "생체 금속 무기고"
 sm_dark_matter_factory: "암흑 물질 반응로"
 sm_colossus_yards: "거대 조립소"
 sm_colossus_yards_desc: "거대 우주선은 기존의 건선거 방식이 아닌, 수많은 이동식 독립 건설 플랫폼에 의해 건조됩니다.\n"
 sm_colossus_yards_desc_modifier: "조선소: §Y콜로서스 건조 가능§!"
 sm_titan_yards: "타이탄 조립소"
 sm_titan_yards_desc: "항성 기지의 선체에 지어진 특수한 건선거로, 거대한 타이탄급 함선을 건조할 수 있습니다.\n"
 sm_titan_yards_desc_modifier: "조선소: §Y타이탄 건조 가능§!"
 sm_dockyard: "선거 시설"
 sm_shipyard: "조선소"
 sm_shipyard_desc: "조선소는 다른 조선소와 병행해, 한 번에 한 척씩 함선을 건조할 수 있습니다.\n"
 sm_gun_battery: "실탄 포대"
 sm_gun_battery_desc: "항성 기지에 두 개의 중형 무기 슬롯을 추가합니다.\n"
 sm_missile_battery: "어뢰 포대"
 sm_missile_battery_desc: "항성 기지에 두 개의 유도 무기 슬롯을 추가합니다.\n"
 sm_mining_terminal: "채굴 단말기(삭제?)"
 sm_trading_hub: "무역 허브"
 sm_trading_hub_plural: "무역 허브"
 sm_trading_hub_desc: "상인과 무역상이 사업 활동을 할 수 있는 민간 정박 구역입니다.\n"
 sm_anchorage: "정박소"
 sm_anchorage_desc: "함대 정박소는 해군의 성장을 지원하기 위해 필요합니다.\n"
 sm_hangar_bay: "격납고"
 sm_hangar_bay_desc: "항성 기지에 공격기를 위한 격납고를 추가합니다.\n"
 sm_astromining_bay: "우주 채굴소"
 sm_astromining_bay_desc: "성계 내 자원 채굴 사업을 지원하기 위한 격납고와 창고로 이루어져 있습니다."
 sm_ftl_inhibitor: "초광속 억제기"
 sm_ftl_inhibitor_desc: "항성 기지가 작동하는 동안, 초광속 억제기가 적 함선이 진입 경로 외의 다른 초공간 항로를 이용해 성계를 떠나는 것을 막습니다."
 sm_communications_jammer: "통신 방해기"
 sm_communications_jammer_desc: "통신 방해기는 적 함선 간의 통신을 방해해서 함대의 움직임을 조정하는 것을 어렵게 만듭니다.\n"
 sm_disruption_field: "분열장 생성기"
 sm_disruption_field_desc: "성계 내 적대적인 함선 주위에 불안정한 아원자 입자로 이루어진 국지적 역장을 생성해, 보호막의 성능을 현저히 떨어뜨립니다.\n"
 sm_warp_fluctuator: "초공간 항로 등록부"
 sm_warp_fluctuator_desc: "초공간 항로 진입을 위한 이상적인 조건을 물색하고 항행 경로를 최적화해, 성계 내 아군 함선들의 초광속 항행을 보조합니다.\n"
 warp_fluctuator_tt: "[Root.GetTradingHubPluralType](으)로 인한 $trade_with_icon$: §G+2§!"
 sm_transit_hub: "운송 허브"
 sm_transit_hub_desc: "민간 함선 전용 기반 시설로, 원활하고 편리한 운송망을 구축합니다.\n"
 sm_transit_hub_desc_modifier: "이 성계의 실업 §Y노동자§!와 §Y드론§! 팝은 다른 이주 통제가 적용되지 않는 한, 적절한 거주 적합도와 주거 공간 및 직업이 있고, §Y운송 허브§!가 있는 성계의 행성으로 자동 §Y이주§!합니다.\n\n"
 sm_transit_hub_migrate_effect_desc: "이 성계의 실업자 §Y$SLAVES$§! 및 지성이 없는 로봇이 다른 식민지로 §Y자동 재정착§! 할 수 있게 합니다."
 sm_command_center: "지휘소"
 sm_command_center_desc: "성계 방어를 위한 노력은 모두 항성 기지 선체 깊숙이 자리 잡고 있는 대형 시설에서 이루어집니다. 지도 배열과 3D 투사는 성계를 통과하는 모든 우주 교통량을 항시 추적합니다.\n"
 sm_defense_grid: "방위망 슈퍼컴퓨터"
 sm_defense_grid_desc: "항성 기지 방어 플랫폼의 상대 궤도와 발사각을 조절하는 강력한 슈퍼컴퓨터로, 지원 가능한 방어 플랫폼의 숫자를 증가시킵니다.\n"
 sm_science_division: "과학 부서"
 sm_science_division_desc: "§Y$sm_spire$§! 생산량이 §Y2£physics£ 2£society£ 2£engineering£ 증가합니다§!."
 sm_offworld_trading_company: "외우주 무역 상사"
 sm_offworld_trading_company_desc: "성간 무역의 환경을 개선하기 위해 노력하는 비정부 조직의 사무실입니다.\n"
 sm_offworld_trading_company_desc_modifier: "[Root.GetTradingHubPluralType](으)로 인한 $trade_with_icon$: §G+4§!\n\n"
 sm_nebula_refinery: "성운 정제소"
 sm_nebula_refinery_desc: "성운의 먼지구름을 가공해서 가치 있는 광물을 정제하고 추출할 수 있습니다.\n"
 sm_listening_post: "감청 기지"
 sm_listening_post_desc: "감청 기지에는 초공간 항로의 잔여를 분석하고, 항성 기지의 감지 범위를 기능적으로 확장시키는 전문 오퍼레이터들이 있습니다.\n"
 sm_naval_logistics_office: "해군 군수부"
 sm_naval_logistics_office_desc: "최소한이지만 잔존하는 관료층은 항성 기지 정박소의 이론적 수용력을 증가시킵니다.\n"
 sm_naval_logistics_office_desc_modifier: "정박소: §G+3§! §Y함대 수용력§!"
 sm_black_hole_observatory: "블랙홀 천문대"
 sm_black_hole_observatory_desc: "블랙홀을 연구하는 전문 과학 시설을 건설하면, 물리학에 대한 이해를 증진시킬 수 있을 것입니다.\n"
 sm_deep_space_black_site: "심우주 비밀 지역"
 sm_deep_space_black_site_desc: "항성 기지의 상당 부분은 공식적으로는 존재하지 않는 비밀 지역입니다. 이곳에서 성계 전체를 감시하고 있으며, 첩보원들은 능력껏 지역 매체와 사회적 사건들을 신중하게 조작하고 있습니다.\n"
 sm_resource_silo: "$building_resource_silo$"
 sm_resource_silo_desc: "$building_resource_silo_desc$\n"
 building_resource_silo: "자원 저장고"
 building_resource_silo_desc: "대량의 자원을 안전하게 보관할 수 있는 대규모 자원 저장 시설입니다."
 sm_hydroponics_bay: "수경 재배실"
 sm_hydroponics_bay_desc: "항성 기지에 수경 농업 구획을 지정해 자급자족하면서, 잉여 생산물은 다른 성계로 수출할 수 있습니다."
 sm_target_uplink_computer: "표적 업링크 컴퓨터"
 sm_target_uplink_computer_desc: "성계 내 모든 아군 감지 정보를 수집하고 분석하는 첨단 표적 컴퓨터입니다. 항성 기지는 이 컴퓨터를 이용해, 표적을 더욱 쉽게 조준할 수 있습니다.\n"
 sm_curator_think_tank: "큐레이터 싱크 탱크"
 sm_curator_think_tank_desc: "큐레이터들로부터 배우고 이들과 협력하기 위한 전용 연구 시설을 건설하면, 큰 과학적 진보를 이룩할 수 있을 것입니다.\n"
 sm_art_college: "예술 대학"
 sm_art_college_desc: "이웃한 예술가 엔클레이브와 공동으로 운영하는 이 무중력 예술 대학은 재능 있는 학생들이 제작한 작품을 통해 우주 공간의 아름다움을 기념합니다.\n"
 sm_salvager_workshop: "인양 작업장"
 sm_salvager_workshop_desc: "이 북적이는 부속 시설에서 우리 제국의 기술자들은 가지각색의 도구와 예비 부품을 갖추고 인근의 인양단 엔클레이브와 긴밀한 협업을 진행합니다.\n"
 sm_shroud_beacon: "장막 신호기"
 sm_shroud_beacon_desc: "이 성계 내에 장막 터널을 생성하기 위한 사이오닉 신호기입니다. 장막 신호기는 해체하거나 파괴할 수 있지만, 터널 자체는 제거할 수 없습니다.\n"
 sm_mercenary_garrison: "용병 주둔지"
 sm_mercenary_garrison_desc: "계약 군인들이 주둔하는 막사가 모여 있는 곳입니다. 이곳에 있는 잔뼈 굵은 군인들은 일반 승무원들을 대상으로 정기 훈련을 진행하고, 기지를 방어할 준비 태세를 갖추고 있습니다. 물론, 제국에서 돈이 들어오는 한 말이죠.\n"
 sm_astromining_hub: "우주 채굴 허브"
 sm_astromining_hub_desc: "각종 사무실과 처리 시설로 이루어진 곳으로, 성계 내 자원 채굴 작업을 위한 기술자들과 담당자들을 수용하고 있습니다. 세심한 최적화와 탁월한 저장 공정을 바탕으로 성계 안에 있는 매장지를 효율적으로 채굴할 수 있습니다.\n"
 sm_astromining_hub_office_desc_modifier: "우주 채굴소 모듈:\n 채굴 기지 생산량: §G+10%§!"
 requires_astromining_bay: "§Y$sm_astromining_bay$§! §R필요§!"
 TIME_LEFT_SECOND: "$SECONDS$초 남음"
 TIME_LEFT_SECONDS: "$SECONDS$초 남음"
 TIME_LEFT_DAYS: "£resource_time£ $DAYS$"
 TIME_COST_VALUE: "£resource_time£ $DAYS|0$"
 BUILD_TIME: "건설 시간: £resource_time£ $DAYS|Y0$"
 CLEAR_TIME: "제거 시간: £resource_time£ $DAYS|Y0$"
 ENACT_TIME: "활성화 시간: £resource_time£ $DAYS|Y0$"
 EST_YEARLY_DEV_INC: "연간 증가: §H$EST$%§!"
 EST_YEARLY_ENERGY: "연간 크레딧: §H$EST$§!"
 MACRO_BUILDER_TITLE: "§E강습군 허브§!"
 MACRO_BUILDER_DESC: "§Y강습군 허브§!를 이용하면 다수의 강습군을 손쉽게 창설할 수 있습니다. 강습군은 해당 구역에서 강습군을 생성할 수 있는 행성에 창설됩니다.\n\n창설이 완료된 강습군은 §Y병력 집결§!이 활성화되거나 이 항성 기지에 집결한 §Y지상군§!에 증원 병력으로 투입됩니다."
 MACRO_BUILDER_CAPACITY_DESC: "동시에 생성할 수 있는 지상군의 수는 이용 가능한 £planet£ §Y행성§! 수에 따라 달라집니다. 행성은 행성 화면의 지상군 탭에 있는 §Y강습군 허브§!에서 제외할 수 있습니다."
 MACRO_BUILDER_TAB: "지상군 허브"
 MACRO_BUILDER_QUEUE: "지상군 모집 대기열"
 DEPLOY_IN_ORBIT: "궤도에 배치"
 DEPLOY_IN_ORBIT_DESC: "새로 창설된 §Y지상군§!을 §Y궤도§! 또는 §Y행성§!에 배치할지 설정합니다.\n\n§Y항성 기지 지상군 생성기§!를 통해 창설한 §Y지상군§!은 §Y궤도§!에 배치됩니다."
 ARMY_BUILDER_CHECKBOX: "지상군 생성기에 포함"
 INCLUDE_IN_SECTOR_BUILDER_DESC: "이 행성을 §Y항성 기지 지상군 생성기§!에 이용 가능한 행성으로 포함시킵니다."
 STARBASE_MACRO_BUILDER_ARMIES: "지상군 유형"
 STARBASE_NO_SECTOR: "§R항성 기지가 구역에 없음§!"
 STARBASE_NO_PLANETS_IN_SECTOR: "§R구역에 행성이 없음§!"
 ARMIES_IN_ORBIT: "궤도에 지상군 배치 중"
 FLEETS_IN_ORBIT: "궤도 내 함대"
 MACROBUILDER_NO_DOCKED: "궤도에 지상군이 없습니다."
 QUEUED: "(대기열)"
 QUEUED_NUMBER: "#$NUMBER$"
 DISC_TOOLTIP: "§H$NAME$§!\n$DESC$\n\n£anomaly_level£ 레벨: $LEVEL|Y$"
