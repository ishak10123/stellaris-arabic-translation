 SET_SPECIES_POLICY: "정책 설정"
 SET_PRESAPIENTS_POLICY: "정책 설정"
 SET_SPECIES_RIGHTS: "종족 권리 설정"
 SET_SPECIES_DEFAULT: "기본으로 설정"
 DEFAULT_RIGHTS: "기본 권리"
 SPECIES_RIGHT_SLAVERY_TYPE: "노예제 유형"
 SPECIES_RIGHT_PURGE_TYPE: "정화 유형"
 CANT_ALL_SPECIES_SET_RIGHTS: "§R모든 종족 탭에서는 종족 권리를 설정할 수 없습니다.§!"
 CANT_ALL_SPECIES_SET_DEFAULT: "§R모든 종족 탭에서는 기본으로 설정할 수 없습니다.§!"
 CANT_ALL_SPECIES_CREATE_TEMPLATE: "§R모든 종족 탭에서는 견본을 생성하거나 변형할 수 없습니다.§!"
 CANT_ALL_SPECIES_APPLY_TEMPLATE: "§R모든 종족 탭에서는 견본을 적용할 수 없습니다.§!"
 purge_normal: "말살"
 purge_normal_tooltip: "질서 정연하게 대상 팝이 제거됩니다. 가장 빠른 정화 방법입니다."
 purge_normal_tooltip_delayed: "§L말살 전담반은 효율적입니다. 전 인구를 정화하려면 당연히 시간이 필요할 테지만, 어떻게든 일을 완수해낼 것입니다.§!"
 purge_displacement: "추방"
 purge_displacement_tooltip: "대상 팝은 점차 우리나라에서 추방되며, 우리 국경 밖의 피난처를 찾아 떠납니다."
 purge_displacement_tooltip_delayed: "§L이들을 집에서 쫓아내는 것이 아닙니다. 이들의 집이 더 이상 이들의 것이 아닐 뿐입니다.§!"
 purge_neutering: "중성화"
 purge_neutering_tooltip: "대상 팝은 더 이상 성장하지 않고 시간이 지나면 점차 사멸합니다만, 적당한 수준의 §R행복도§! 불이익만 받습니다."
 purge_neutering_tooltip_delayed: "§L단계적으로 줄인다고 생각하십시오. 우리는 미래를 향해 나아갈 것입니다. 오직 소수만이 우리와 함께하지 못할 뿐입니다.§!"
 purge_labor_camps: "강제 노동"
 purge_labor_camps_tooltip: "대상 팝은 사망할 때까지 노동하게 되며 £food£ §H식량§!(또는 상응하는 자원)을 생산할 수 있습니다."
 purge_labor_camps_tooltip_delayed: "§L이 희생으로, 이들도 최소한의 쓰임새를 찾은 셈입니다.§!"
 purge_processing: "가공"
 purge_processing_tooltip: "대상 팝은 사망할 때까지 가용 [Root.GetPurgeProcessingResource](으)로 취급되어 가공됩니다."
 purge_processing_tooltip_delayed: "§L더 나은 자들의 야망을 위해 연료로 쓰일 운명을 지닌 자들이 있습니다. 슬프지만 어쩔 수 없는 사실이지요.§!"
 purge_matrix: "화학적 가공"
 purge_matrix_tooltip: "대상 팝의 생리는 에너지망과 통합할 준비가 되었으며, 이들은 화학 공정을 통해 우리의 에너지 저장고를 풍부하게 할 겁니다. 치명적인 과정이지만, 곧바로 사망하지 않습니다."
 purge_matrix_tooltip_delayed: "§L머지않아 더 효율적인 형태에 도달할 것입니다.§!"
 purge_necrophage: "망령화"
 purge_necrophage_tooltip: "대상 팝은 점차 [From.GetSpeciesAdj] 종족에 포함됩니다. 그들이 원하든, 원하지 않든지 상관없습니다."
