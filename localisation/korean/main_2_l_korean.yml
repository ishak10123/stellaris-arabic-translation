 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_TITLE: "§H기지 잠금 해제:§! 우주항"
 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_DESC: "§H우주항§!\n우주항은 우주 전투가 가능한 모든 유형의 함선을 건조하는 데 필요한 건축물입니다. 추가 기능 업그레이드를 진행할 수 있고 기본 방어 장치를 설치할 수 있습니다."
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! 과학선"
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_DESC: "§H과학선§!\n과학선은 광활한 우주를 탐험할 준비를 마친 수석 과학자들의 작업 기지로 사용됩니다."
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! 건설선"
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_DESC: "§H건설선§!\n건설선은 강화 용접 드론을 사용해, 여러 종류의 우주 기지를 조립합니다."
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! 개척선"
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_DESC: "§H개척선§!\n개척선은 외계 행성에 정착하기 위해 사용하는 일회용 함선입니다. 개척이 끝난 뒤, 이 함선은 행성의 피난처이자 토대로 사용됩니다."
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! 초계함"
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_DESC: "§H초계함§!\n가장 기본적인 군용 함선인 초계함은 무장했으며 적대적인 조우 상황에 준비되어 있습니다."
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! 구축함"
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_DESC: "§H구축함§!\n구축함은 거대한 두 구획으로 구성된 설계이며, 다양하게 전략 무기를 배치할 수 있습니다."
 TECH_UNLOCK_CRUISER_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! 순양함"
 TECH_UNLOCK_CRUISER_CONSTRUCTION_DESC: "§H순양함§!\n순양함은 세 구획으로 구성된 설계 중 처음으로 이용 가능한 모델로, 합당한 대가에 따라 다양한 모듈 설정이 가능합니다."
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! 전함"
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_DESC: "§H전함§!\n전함은 가장 큰 선체를 구성할 수 있는 설계입니다. 엄청난 비용이 필요하고 기동성도 좋지 않지만 강력한 화력을 자랑합니다."
 TECH_UNLOCK_TITAN_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! 타이탄"
 TECH_UNLOCK_TITAN_CONSTRUCTION_DESC: "§H타이탄§!\n함대의 자랑이라고 할 수 있는 거대한 전투 함선입니다. 위협적인 무기로 무장했으며, 주로 기함 역할을 담당합니다."
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! 저거너트"
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_DESC: "§H저거너트§!\n이 거대한 건축물은 우주선이자 우주 기지입니다. 저거너트는 함선을 수리하고 건조할 수 있는 거대한 이동식 우주 기지로, 공격 작전에서 전진 기지 역할도 수행할 수 있습니다."
