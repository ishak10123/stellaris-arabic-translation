 building_robotics_assembly_plant: "로봇 조립 공장"
 building_robotics_assembly_plant_desc: "로봇 조립 공장은 로봇 군대를 만드는 데 필요합니다.\n매년 §Y100§! £pop£ §H$ROBOT_POP_SPECIES_1$ 팝§! 추가\n팝 유지비: £energy£ §Y1§!"
 building_robotics_assembly_plant_2: "드로이드 조립 공장"
 building_robotics_assembly_plant_2_desc: "드로이드 조립 공장은 로봇 군대를 만드는 데 필요합니다.\n매년 §Y100§! £pop£ §H$ROBOT_POP_SPECIES_2$ 팝§! 추가\n§H$ROBOT_POP_SPECIES_1$§! 팝을 §H$ROBOT_POP_SPECIES_2$§! 팝으로 업그레이드\n팝 유지비: £energy£ §Y2§!"
 building_robotics_assembly_plant_3: "합성체 조립 공장"
 building_robotics_assembly_plant_3_desc: "합성체 조립 공장은 로봇 군대를 만드는 데 필요합니다.\n매년 §Y100§! £pop£ §H$ROBOT_POP_SPECIES_3$ 팝§! 추가\n§H$ROBOT_POP_SPECIES_2$§! 팝을 §H$ROBOT_POP_SPECIES_3$§! 팝으로 업그레이드\n팝 유지비: £energy£ §Y5§!"
 building_colony_shelter: "재조립된 함선 주거지"
 building_colony_shelter_desc: "행성에서 사용하기 위해 개척선을 재조립한 것입니다."
 building_capital: "행성 행정부"
 building_capital_desc: "지역을 통치하는 엘리트층을 위한 곳입니다."
 building_major_capital: "행성 수도"
 building_major_capital_desc: "주요 식민지의 행정 중심지 역할을 수행하는 관료 건물의 복합 단지입니다."
 building_system_capital: "성계 수도 복합 단지"
 building_system_capital_desc: "여러 행정 부서와 기반 시설망으로 이루어진 대규모 복합 단지로, 이곳에 복잡한 관리를 필요로 하는 시설을 건설하고 운영할 수 있습니다."
 building_ancient_factory: "자율 제조기"
 building_ancient_factory_desc: "§L아득히 먼 옛날에 잊힌 기술로 만들어진 고대 복합 시설입니다.§!"
 building_ancient_archives: "선구자 기록 보관소"
