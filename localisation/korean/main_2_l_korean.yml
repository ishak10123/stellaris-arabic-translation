 bombardment_selective_desc: "$bombardment_selective$ 폭격 태세는 불필요한 민간인 사상자를 피하기 위해, 확인된 군사 지역만 폭격합니다.\n- §Y지상군§!에 §Y보통§! 피해\n- §Y행성§!에 §Y보통§! 피해\n- §Y팝§!에 §E경미한§! 피해\n- 무방비 행성은 폭격하지 §R않음§!\n- 마지막 §Y$MIN_POPS$§!팝은 죽이지 §R않음§!"
