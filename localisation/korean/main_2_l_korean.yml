 building_autochthon_monument: "원주민 기념물"
 building_autochthon_monument_plural: "원주민 기념물"
 building_autochthon_monument_desc: "우주를 탐험한 첫 번째 개척자를 위한 기념물입니다."
 building_autochthon_monument_effect: "우리 제국이 획득한 §Y승격 특전§!마다 §G1§! £unity£ 통합을 생산합니다.\n\n"
 building_heritage_site: "문화유산"
 building_heritage_site_desc: "우리 제국과 국민의 초기 역사에 헌정하는 지역입니다."
 building_heritage_site_effect: "우리 제국이 획득한 §Y승격 특전§!마다 §G2§! £unity£ 통합을 생산합니다.\n\n"
 building_hypercomms_forum: "초광속 통신 포럼"
 building_hypercomms_forum_desc: "혁신적인 대인 통신 장비를 갖춘 거대한 시설로, 이 포럼을 이용하면 일반적인 토론에서 다감각적으로 생각을 교환하고 빠르게 합의를 이룰 수 있습니다."
 building_hypercomms_forum_effect: "우리 제국이 획득한 §Y승격 특전§!마다 §G3§! £unity£ 통합을 생산합니다.\n\n"
 building_autocurating_vault: "자동 큐레이션 보존고"
 building_autocurating_vault_desc: "고도로 전문화된 컴퓨터망은 중요하다고 여겨질 일상적인 물건을 지속적으로 수집하고, 분석하고, 평가하고, 전시해, 현대의 살아 있는 박물관을 만들어 냅니다."
 building_temple: "신전"
 building_temple_desc: "아주 먼 옛날부터 세워진 단순한 건축물인 신전은 우리 모두를 단결시키는 고요한 명상과 교감의 장소입니다."
 building_holotemple: "홀로그램 신전"
 building_holotemple_desc: "기존의 투박한 신전을 개선한 곳입니다. 더욱 깊이 명상하고 독실히 헌신할 수 있도록, 최첨단 정신주의 기술로 홀로그램 신전에 변화무쌍한 현실을 담았습니다."
 building_sacred_nexus: "신성 연결체"
 building_sacred_nexus_desc: "최신 역장 기술의 발달로 신자들은 성지의 신성한 영향력을 직접 경험할 수 있습니다."
 building_citadel_of_faith: "신앙의 성채"
 building_citadel_of_faith_desc: "누구든 물질세계로부터 도피하고 은둔할 수 있는 장소인 거대한 복합 단지입니다."
 building_stronghold: "주둔지"
 building_stronghold_desc: "행성을 침공과 반란으로부터 보호하는 대규모 주둔군을 수용하는 거점입니다."
 building_fortress: "요새"
 building_fortress_desc: "더 많은 주둔군과 병사 훈련 시설을 갖춘 대규모 복합 요새입니다."
 building_bio_reactor: "생체 반응로"
 building_bio_reactor_desc: "고효율로 유기 물질을 에너지로 전환하는 시설입니다."
 tech_bio_reactor: "$building_bio_reactor$"
 tech_bio_reactor_desc: "$building_bio_reactor_desc$"
 building_bio_reactor_2: "첨단 생체 반응로"
 building_bio_reactor_2_desc: "고효율로 유기 물질을 에너지로 전환하는 시설입니다. 폐기물 수집이 개선되어, 유용한 가스 부산물을 채취할 수 있습니다."
 tech_bio_reactor_2: "$building_bio_reactor_2$"
 tech_bio_reactor_2_desc: "$building_bio_reactor_2_desc$"
 building_hab_stronghold: "보안 구역"
 building_hab_stronghold_desc: "내외부의 위협으로부터 거주지를 보호하기 위해 무장 치안 부대를 제공하는 보안 전용 거주지 구획입니다."
 building_crude_huts: "조잡한 오두막"
 building_crude_huts_desc: "석재나 점토 또는 다른 이용 가능한 자재로 지은 원시적 주거지입니다."
 building_primitive_dwellings: "원시 거주소"
 building_primitive_dwellings_desc: "최소한의 주거지이지만 각종 해로운 요소만큼은 막아주는 소형 건물입니다."
 building_stone_palace: "석재 궁전"
 building_stone_palace_desc: "지역을 통치하는 엘리트층의 거주지인 원시적 석재 궁전입니다."
 building_primitive_capital: "지역 수도"
 building_primitive_capital_desc: "이 원시 행성에 거주하는 다양한 민족 국가의 지역 수도 건물입니다."
 building_urban_dwellings: "도시 거주소"
 building_urban_dwellings_desc: "비좁고 더러운 콘크리트 정글입니다."
 building_pre_ftl_radio_telescope: "전파 망원경 배열체"
 building_pre_ftl_radio_telescope_desc: "외계 지성체를 발견하기 위한 전파 망원경 배열체입니다."
 awareness_gain_desc: "이 문명의 £awareness£ §Y인지§! 수준이 높아질 확률이 점차 증가합니다."
 building_hive_crude_huts: "간이 둥지"
 building_hive_crude_huts_desc: "주변에서 찾을 수 있는 가장 단순하고 수고가 적게 드는 재료로 만든 둥지로, 드론이 밤에 겨우 얼어 죽지 않을 정도는 됩니다."
 building_hive_primitive_dwellings: "초기 군락"
 building_hive_primitive_dwellings_desc: "가용 공간을 최적으로 활용하게 해 주는 이 육각형 모양의 건물들은, 얼추 군락이라 부를 수 있는 규모의 드론을 수용할 수 있습니다."
 building_hive_stone_palace: "석재 군체"
 building_hive_stone_palace_desc: "같은 종족의 다른 구성원들과 생존을 위해 경쟁해야 하는 세계에서, 돌로 된 벽이 있다는 것은 좋은 일입니다."
 building_hive_primitive_capital: "대륙 연결체"
 building_hive_primitive_capital_desc: "이 행성의 지배권을 두고 경쟁하는 대륙 규모의 군체들이 일반적으로 사용하는 중앙 거점입니다."
 building_hive_urban_dwellings: "드론 보관소"
 building_hive_urban_dwellings_desc: "휴식 주기에 있는 드론들을 수용하기 위한 실용적인 해법입니다. 군체의 재충전 과정을 극대화하기 위해 입구와 출구가 따로 있습니다."
 building_hive_primitive_factory: "$building_primitive_factory$"
 building_hive_primitive_factory_desc: "$building_primitive_factory_desc$"
 building_hive_primitive_mine: "$building_primitive_mine$"
 building_hive_primitive_mine_desc: "$building_primitive_mine_desc$"
 building_hive_primitive_power_plant: "$building_primitive_power_plant$"
 building_hive_primitive_power_plant_desc: "$building_primitive_power_plant_desc$"
 building_hive_primitive_farm: "$building_primitive_farm$"
 building_hive_primitive_farm_desc: "$building_primitive_farm_desc$"
 building_hive_primitive_node: "단순 시냅스 노드"
 building_hive_primitive_node_desc: "이 조잡한 시냅스 노드를 통해, 군체의 의지를 강화합니다."
 building_machine_primitive_node: "단순 업링크 노드"
 building_machine_primitive_node_desc: "행성 내 지연을 줄이는 조잡한 업링크 노드입니다."
 building_farming_districts_1: "작물 개발 허브"
 building_farming_districts_1_desc: "그리 크지 않은 규모의 관료 센터입니다. 경작 가능한 땅을 조사하고 행성 농업을 확대하는 업무를 담당합니다."
 building_farming_districts_2: "토양 간척 센터"
 building_farming_districts_2_desc: "이 센터에서는 변경지를 복원하고 생산량을 높여, 농업 지구의 성장을 촉진하는 데 주력합니다."
 building_farming_districts_3: "자동화 농업 단지"
 building_farming_districts_3_desc: "기계화 수확기, 드론 무리, 기후 제어 경작지를 통해 농업 지구의 빠른 확장을 촉진합니다."
 building_farming_districts_4: "행성 경작 개발망"
 building_farming_districts_4_desc: "방대한 규모의 통합 단지입니다. 고밀도의 집약적 농업 활동을 총괄함으로써 현지 행성이 수용할 수 있는 농업 지구의 수를 극대화합니다."
 building_mine_generic: "지표 채굴 저장소"
 building_mine_generic_desc: "지표면 부근의 굴착과 광석 채굴을 조율하는 기관으로, 채굴 지구를 초기에 확대할 수 있게 해 줍니다."
 building_mining_districts_1: "산업 채굴장"
 building_mining_districts_1_desc: "채굴 장비, 운반 시스템, 분류 배열체를 함께 운용해 안정적인 생산량을 유지하고, 채굴 지구의 초기 확장을 추진하는 곳입니다."
 building_mining_districts_2: "심부 시추 배열체"
 building_mining_districts_2_desc: "채굴장의 구조를 보강하고 대형 시추용 드릴을 사용해, 행성 깊은 곳까지 채굴함으로써 추가 매장지를 발굴하는 시설입니다."
 building_mining_districts_3: "지진 터널 굴착장"
 building_mining_districts_3_desc: "고성능 터널 굴착 설비 및 지하 안정화 장비를 갖춘 복합 시설로, 다른 방법으로는 닿을 수 없는 광맥까지 채굴 범위를 확대합니다."
 building_mining_districts_4: "지각 심부 채굴망"
 building_mining_districts_4_desc: "행성에서 채굴이 가능한 곳 중에서도 가장 깊은 곳에서 운영되는 광활한 시설입니다. 완전히 산업화된 채굴 지대를 운영함으로써 채굴 지구를 최대한 확대합니다."
 building_generator_generic: "동전기 발전장"
 building_generator_generic_desc: "대규모 에너지 발전을 위한 전용 건물입니다. 전력 셀, 플라스마 도관, 고출력 발전 배열체를 갖췄습니다."
 building_generator_districts_1: "전기 공사 복합 단지"
 building_generator_districts_1_desc: "이 시설에서는 기초 전력망 기반 시설과 에너지 취급 시스템을 배급함으로써 신규 발전 지구의 설립을 지원합니다."
 building_generator_districts_2: "변전소 중계 단지"
 building_generator_districts_2_desc: "이 시설은 고용량 중계기, 변압소, 전력망 안정화 노드 등을 보급함으로써 발전 지구 개발을 지원해, 현지 행성의 발전용 기반 시설을 확충합니다."
 building_generator_districts_3: "플라스마 조절 배열체"
 building_generator_districts_3_desc: "플라스마 흐름 안정화와 회로 공진 제어를 통해 행성 전체에 걸쳐 집약적인 발전 지구를 구현할 수 있게 해 주는 복합 시설입니다."
 building_generator_districts_4: "행성 연결체"
 building_generator_districts_4_desc: "이 통합 에너지 연결체는 행성 전체의 발전 작업을 조율함으로써 발전 지구를 최대로 확장할 수 있게 해 줍니다."
 ####################################
 #Wonders
 ####################################
 building_xeno_zoo: "외계종 동물원"
 building_xeno_zoo_plural: "외계종 동물원"
 building_xeno_zoo_desc: "현지 동물들을 보존하고 연구하기 위한 보존소입니다."
 building_fe_xeno_zoo: "외계종 보호 구역"
 building_hab_capital: "거주지 행정부"
 building_hab_capital_desc: "거주지의 행정 허브로, 지역 정부의 수도 역할을 합니다."
 building_hab_capital_tooltip: "대형 천체로 인한 £mod_planet_max_districts_add£ 최대 지구 슬롯: §G+0.25§!\n"
 building_hab_solar_power_processor: "태양력 처리기"
 building_hab_solar_power_processor_desc: "거주지 외부 선체의 방대한 태양 전지판 배열에 포착된 태양 에너지를 분배합니다."
 building_hab_astro_mining_facility: "우주 채굴소"
 building_hab_astro_mining_facility_desc: "천연자원이 없는 거주지에서 인근 소행성과 미행성에 매장된 광물을 채굴하고 가공하기 위한 시설입니다."
 building_hab_agri_bay: "농업 구역"
 building_hab_agri_bay_desc: "지역 주민들에게 필요한 다양한 식물과 동물을 기르기 위해 마련된 거주지 구획입니다."
 building_hab_cultural_center: "휴양 지구"
 building_hab_cultural_center_desc: "거주민의 문화 및 사회적 필요를 충족하기 위해 만들어진 대규모 복합 단지입니다."
 building_hab_laboratory_module: "실험 복합 단지"
 building_hab_laboratory_module_desc: "전적으로 과학적 연구를 위해 마련된 거주지 구획입니다."
 building_fe_xeno_zoo_desc: "'보존된' 외계종들의 자연 서식지를 완벽하게 유지하는 고도의 정교한 보호 구역입니다."
 building_paradise_dome: "낙원 돔"
 building_paradise_dome_desc: "자급자족적 생태계를 갖춘 주거용 돔으로, 이곳에 거주할 수 있을 정도로 부유하거나 운 좋은 이들을 위한 진정한 사적 낙원입니다."
 building_monument: "기념물"
 building_monument_desc: "위대한 통치자를 기리는 기념물입니다."
 building_monument_proper: "[GetRulerName]의 기념물"
 building_monument_desc_proper: "위대한 [GetRulerName](을)를 기리는 거대 기념물입니다."
 building_grand_mausoleum: "웅장한 영묘"
 building_grand_mausoleum_desc: "위대한 통치자를 안치하기 위해 만든 거대 영묘입니다."
 building_grand_mausoleum_proper: "[GetRulerName]의 웅장한 영묘"
 building_grand_mausoleum_desc_proper: "존경받는 [GetRulerName]의 성스러운 영묘입니다."
 building_grand_mausoleum_allowed_tooltip: "§Y통치자§!가 있어야 합니다.\n이 행성에\n§Y행성 행정부§!,\n§Y행성 수도§! 또는\n§Y제국 수도 복합 단지§!\n가 건설되어 있어야 합니다."
 building_royal_gardens: "황실 정원"
 building_royal_gardens_desc: "위대한 통치자를 기념하기 위해 사람들이 모이고 즐기는 거대한 위락 정원입니다."
 building_royal_gardens_proper: "[GetRulerName]의 황실 정원"
 building_royal_gardens_desc_proper: "위대한 [GetRulerName]에 의해 지어진 환상적인 정원입니다."
 building_galactic_stock_exchange: "은하 증권 거래소"
 building_galactic_stock_exchange_desc: "재화와 서비스의 자유 무역에 참여하면, 개인이 세부 분야에서 뛰어난 역량을 보이고 자신의 필요에 따라 거래하는 전문화된 경제를 구축할 수 있습니다."
 building_ministry_production: "생산부"
 building_ministry_production_desc: "생산부는 행성 전체의 제조 능력을 체계화하고 간소화하기 위해 끊임없이 운영됩니다."
 building_production_center: "자원 처리소"
 building_production_center_desc: "행성 전체의 자원 처리와 제조를 중앙에 집중시키는 방대한 시설입니다."
 building_supercomputer: "행성 슈퍼컴퓨터"
 building_supercomputer_desc: "극도로 복잡한 계산을 처리해, 행성 전체의 연구 생산량을 늘리는 거대한 단일 슈퍼컴퓨터입니다."
 building_hyper_entertainment_forum: "하이퍼 엔터테인먼트 포럼"
 building_hyper_entertainment_forum_desc: "꿈이 이루어지는 장소인 대규모 오락 복합 단지입니다. 쇼핑몰, 레스토랑, 놀이공원, 가상 오락실 등 다양한 시설이 한데 모였습니다. 여러분의 꿈이 현실이 됩니다!"
 building_institute: "연구 기관"
 building_institute_desc: "연구 기관은 각종 분야의 최첨단 기술을 한데 모아 전례 없는 시너지를 만들고, 행성 전체의 연구 생산량을 증진시키는 거대 복합 단지입니다."
 building_virtual_combat_arena: "가상 투기장"
 building_virtual_combat_arena_desc: "가상 투기장은 오락거리이자 공동체를 통합시키기 위한 수단입니다. 현지 군대 역시 가상훈련을 위해 가상 투기장을 이용하기도 합니다."
 building_monument_purity: "순수 기념물"
 building_monument_purity_desc: "$tech_purity_campaigns_desc$"
 building_orillium_factory: "오릴륨 폭발물 공장"
 building_orillium_factory_desc: "오릴륨은 그 독특한 특성 덕분에 심층 채굴 작업의 제어 발파를 위한 폭발물로 손쉽게 가공할 수 있습니다."
 building_pitharan_plant: "피타란 비료 공장"
 building_pitharan_plant_desc: "피타란 비료 공장은 피타란 분진을 첨가제로 사용해, 작물 생산량을 향상시키는 비료를 생산합니다."
 building_military_academy: "사관 학교"
 building_military_academy_desc: "사관 학교는 지역 모집률을 향상시키고 높은 수준의 훈련을 제공합니다."
 building_symbol_unity: "통합의 상징"
 building_symbol_unity_desc: "$tech_symbol_unity_desc$"
 building_visitor_center: "관광 안내소"
 building_visitor_center_desc: "$tech_visitor_center_desc$"
 building_alien_sanctuary: "외계인 보호처"
 building_alien_sanctuary_desc: "$tech_alien_sanctuary_desc$"
 building_psi_corps: "사이오닉단"
 building_psi_corps_desc: "제국 각지의 사이오닉 [GetIndividualNamePlural]들이 이곳에 배치되어 자신의 능력을 발휘합니다.\n\n§Y사이오닉단은 여러분의 [GetPsiCorpFriend]입니다. 사이오닉단을 믿으세요.§!"
 psionic_bonus_workforce_from_telepaths_tt: "$mod_psionic_pop_bonus_workforce_mult$은 [telepath.GetIcon] [telepath.GetName] 직업에 따라 증감"
 building_hive_synapse: "군체 시냅스"
 building_hive_synapse_desc: "군체 의식의 신호를 증폭시키면, 드론들이 더 효율적으로 작업할 것입니다."
 building_xenology_center: "외계학 연구소"
 building_xenology_center_desc: "열등 종족의 개체들을 한 곳으로 모아 이들을 연구하고 전시하면, 우리의 우월성을 입증할 수 있습니다."
 building_symbol_purity: "순수의 상징"
 building_symbol_purity_desc: "$tech_symbol_unity_desc$"
 building_control_center: "제어소"
 building_control_center_desc: "강력한 연산 허브를 구축하면, 드론 운영의 효율성을 최적화할 수 있습니다."
