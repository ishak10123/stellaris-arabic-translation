 #Origin Events
 TIMELINE_EVENT_GALACTIC_DOORSTEP_TOOLTIP: "§H$origin.1050.name$§!\n§Y기원 이벤트§!\n\n우리 함선이 이제 게이트웨이의 반대편으로 건너갈 수 있습니다. 또한 게이트웨이의 건설자들이 마지막 선물로 이 구조물을 건설한 비법을 전송해 주었습니다. 덕분에 한때 수수께끼였던 부분이 명확해졌으며, 곧 우리만의 게이트웨이를 건설함으로써 제국을 거의 즉시 가로지를 수 있게 될 것입니다."
 TIMELINE_EVENT_GALACTIC_DOORSTEP: "검은 왕관이 열리다\n§L[GetDate]§!"
 TIMELINE_EVENT_LOST_COLONY_TOOLTIP: "§H모성 발견§!\n§Y기원 이벤트§!\n\n잃어버린 우리의 식민지를 낳은 문명과 마침내 조우했습니다. 시간과 거리가 우리를 완전히 다른 존재로 만들었지만, 이제 우리의 기원은 확실해졌습니다. 모성과 우리의 공통된 과거가 메아리쳐 우리의 미래를 빚을 것입니다."
 TIMELINE_EVENT_LOST_COLONY: "잃어버렸던 고향\n§L[GetDate]§!"
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION_TOOLTIP: "§H기계 행성 생성§!\n§Y기원 이벤트§!\n\n비효율과 유기체의 부패로부터 자유로운 진정한 기계 행성을 만들어 냈습니다. 미래는 강철로 세워지고, 알고리즘에 지배될 것입니다."
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION: "다시 벼려진 행성\n§L[GetDate]§!"
 TIMELINE_EVENT_REMNANTS_TOOLTIP: "§H도시 행성 복구§!\n§Y기원 이벤트§!\n\n우리 제국이 모성을 과거의 영광스러운 모습으로 돌려놓았습니다. 한때 폐허가 됐던 우리의 모성이 다시 한번 웅장한 도시 행성으로 우뚝 선 것입니다. 이것이야말로 우리 문명의 끈기와 야망을 보여 주는 증거입니다."
 TIMELINE_EVENT_REMNANTS: "다시 벼려진 행성\n§L[GetDate]§!"
 TIMELINE_EVENT_SHATTERED_RING_TOOLTIP: "§H링 월드 복구§!\n§Y기원 이벤트§!\n\n폐허가 된 우리 모성계가 완전히 복구되었습니다. 한때 실패한 야망의 묘지였던 곳이 이제 문명의 봉화로 밝게 빛나고 있습니다."
 TIMELINE_EVENT_SHATTERED_RING: "환원\n§L[GetDate]§!"
 TIMELINE_EVENT_LEGENDARY_LEADER_TOOLTIP: "§H실현된 운명§!\n§Y기원 이벤트§!\n\n거성의 여정이 마지막 단계에 다다랐습니다. 거성은 영생을 살면서 제국을 영원히 다스리거나, 여럿이 권력을 나누고 미래를 다시 쓰는 새로운 시대를 열 것입니다."
 TIMELINE_EVENT_LEGENDARY_LEADER: "마지막 운명\n§L[GetDate]§!"
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE_TOOLTIP: "§H장막 터널 건설§!\n§Y기원 이벤트§!\n\n마침내 현실 사이의 베일이 들추어졌습니다. 우리 영역과 미지의 세계를 연결하는 첫 번째 장막 터널이 완성된 것입니다. 거리와 시간의 법칙을 무너뜨리는 이 균열은 텅 빈 우주를 가로지르는 통로가 되어 줍니다. 터널 반대편에 어떤 신비와 위험이 기다리고 있는지는 아직 알 수 없습니다."
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE: "베일 너머로\n§L[GetDate]§!"
 TIMELINE_EVENT_VOID_DWELLERS_TOOLTIP: "§H거주지 건설§!\n§Y기원 이벤트§!\n\n아무것도 없는 공허로부터 거주지가 솟아났습니다. 우리가 건설한 이 첫 번째 추가 거주지는 우리 제국을 확장하는 첫걸음이 되고, 국민이 행성 생활의 고단함을 알 필요가 없게 할 것입니다."
 TIMELINE_EVENT_VOID_DWELLERS: "별 사이의 집\n§L[GetDate]§!"
 TIMELINE_EVENT_OCEAN_PARADISE_TOOLTIP: "§H바다의 주인§!\n§Y기원 이벤트§!\n\n침수주의의 힘에 통달함으로써 우리는 바다를 자연적인 경계 너머로 확장하고 모성의 형태를 다시 빚었습니다. 머지않아 나머지 은하도 모성의 파도처럼 우리의 의지대로 움직이게 될 겁니다."
 TIMELINE_EVENT_OCEAN_PARADISE: "집어삼키는 파도\n§L[GetDate]§!"
 TIMELINE_EVENT_DOOMSDAY_TOOLTIP: "§H파괴된 모성§!\n§Y기원 이벤트§!\n\n피할 수 없는 일이 결국 일어났습니다. 한때 번영했던 우리 모성은 운명에 굴복해 격렬히 불타는 대재앙 속에서 부서져 버렸습니다. 우리의 과거는 재가 되어 우주로 돌아갔으며, 우리의 미래는 탈출한 생존자들이 짊어지고 있습니다."
 TIMELINE_EVENT_DOOMSDAY: "최후의 날\n§L[GetDate]§!"
 TIMELINE_EVENT_EVOPRED_ABSORB_TOOLTIP: "§H종족 특성 흡수§!\n§Y기원 이벤트§!\n\n처음으로 유전 물질을 흡수했습니다. 아주 맛깔나는군요."
 TIMELINE_EVENT_EVOPRED_ABSORB: "유전 물질 흡수\n§L[GetDate]§!"
 TIMELINE_EVENT_WORMHOLE_DEFENDED_TOOLTIP: "§L[GetDate]§!에 버려진 부화장과 그 함대가 파괴되었습니다"
 TIMELINE_EVENT_WORMHOLE_DEFENDED: "웜홀 방어\n§L[GetDate]§!"
 #Crisis Events
 TIMELINE_EVENT_CRISIS_GREAT_KHAN_TOOLTIP: "§H그레이트 칸§!\n§Y위기 이벤트§!\n\n새로운 군벌이 분열된 약탈자 씨족을 통합해 무시무시한 세력을 형성했습니다. 그레이트 칸은 플라스마와 탄소 섬유로 은하를 휩쓸며 제국을 무너뜨리고, 여러 행성을 노예로 만들었습니다. 그렇게 한때 오합지졸이었던 약탈자들이 야심을 품고 집결하자 이에 맞서는 함대는 무력하게 바스러집니다. 약탈의 시대는 끝났고 정복의 시대가 온 것입니다."
 TIMELINE_EVENT_CRISIS_GREAT_KHAN: "날뛰는 무리\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST_TOOLTIP: "§H그레이 템페스트§!\n§Y위기 이벤트§!\n\nL-게이트가 열려 그레이 템페스트의 고대 전투 함대가 쏟아져 나왔습니다. 그 함선들은 은하를 가로지르며 지나가는 길의 모든 걸 파괴합니다. 대화할 여지와 자비 따위는 주지 않고 오로지 복제를 일삼을 뿐입니다. 행성이 고요해지고, 수많은 함대는 존재 자체가 사라지며, 공포가 퍼집니다. 과거의 존재가 돌아왔습니다. 그리고 그 존재들은 하나같이 똑같은 모습을 하고 있습니다."
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST: "각성\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_FORMLESS_TOOLTIP: "§H무형체§!\n§Y위기 이벤트§!\n\n피난을 위해 찾아왔던 존재는 어쩔 수 없이 반격에 나서야만 했습니다. 무형체로 알려진 이 에너지 존재들은 우리 은하가 결코 안전한 피난처가 아님을 깨달았고, 이제 우리 우주를 다른 차원의 침입자로 가득 채우거나 그 과정에서 죽음을 맞이할 것입니다."
 TIMELINE_EVENT_CRISIS_FORMLESS: "무형체의 격노\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE_TOOLTIP: "§H공허충 역병§!\n§Y위기 이벤트§!\n\n공허충의 본성이 변했습니다. 개체 수가 임계점을 넘자 미친 듯이 번식하기 시작한 것입니다. 지속 가능한 속도를 넘어 끝없이 번식하는 공허충은 이제 은하계의 모든 생명을 말살하려 합니다. 그러다 자신도 모르는 사이 이들 역시 멸망하고 말 것입니다."
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE: "굶주린 벌레들\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_UNBIDDEN_TOOLTIP: "§H언비든§!\n§Y위기 이벤트§!\n\n우주의 구조에 틈이 생겨 순수한 에너지로 구성된 존재의 침략이 시작되었습니다. 협상하지도, 물러나지도 않는 이들은 성계를 통째로 집어삼켜 끝없는 확장의 연료로 삼습니다. 그와 동시에 닻으로 균열을 안정시키고 더 많은 동족을 우리 세계로 데려옵니다. 이들의 이름은 언비든입니다."
 TIMELINE_EVENT_CRISIS_UNBIDDEN: "균열이 열리다\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE_TOOLTIP: "§H만화경§!\n§Y위기 이벤트§!\n\n만화경이라는 이름으로 알려진 굶주린 에너지 존재가 은하계를 침범해, 거주민이 있는 성계들을 먹어 치우기 시작했습니다. 이 존재는 끝을 모르는 허기를 지녔지만 쉽게 다룰 수 있는 것 같습니다. 녀석은 머지않아 붕괴해 우주 먼지로 돌아갈 것입니다."
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE: "굶주린 스펙트럼\n§L[GetDate]§!"
 TIMELINE_EVENT_BECOME_THE_CRISIS_TOOLTIP: "§H위기의 화신§!\n§Y위기 이벤트§!\n\n은하계에 어둠이 드리웠습니다. [EVENT_TARGET_0.GetName](이)가 가식에 지나지 않던 외교 창구를 모조리 닫고 자국을 온 우주의 적으로 선포한 것입니다. 함대가 결집하고, 첩보원들은 은하계를 파멸로 몰고 갈 최후의 계획을 속삭입니다. [EVENT_TARGET_0.GetName](은)는 이제 단순한 제국이 아닙니다. 위기 그 자체로 변모한 것입니다."
 TIMELINE_EVENT_BECOME_THE_CRISIS: "은하적 천벌\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE_TOOLTIP: "§H프레소린 스컬지§!\n§Y위기 이벤트§!\n\n프레소린이 은하 끄트머리에서 건너왔습니다. 놈들의 생체 함선이 우주를 누비자, 지나간 자리에는 오직 감염된 행성만이 남습니다. 불길한 소리를 내며 움직이는 이 프레소린 무리의 사전에 협상이란 없습니다."
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE: "포식의 물결\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CONTINGENCY_TOOLTIP: "§H컨틴전시§!\n§Y위기 이벤트§!\n\n은하 곳곳에서 차갑고 치밀하고 막을 수 없는 신호가 울려 퍼집니다. AI 시스템이 공포에 떨고, 합성체들의 정신도 굴복합니다. 컨틴전시가 깨어난 것입니다. 그렇게 숨겨진 기계 행성에서 무자비한 전투 유닛 무리가 마지막 명령을 수행하기 위해 모습을 드러냅니다. 목표는 완전 말살입니다."
 TIMELINE_EVENT_CRISIS_CONTINGENCY: "유령 신호\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CETANA_TOOLTIP: "§H세타나§!\n§Y위기 이벤트§!\n\n공허 속에서 목소리가 울립니다. \"아이들아, 짐이 드디어 돌아왔노라.\"\n\n아주 오래전에 봉인되어 이름까지 잊혔던 고대 지능인 세타나가 깨어났습니다. 그 목적은 확고합니다. 바로 수단과 방법을 가리지 않고 고통을 끝내는 것입니다. 그렇게 세타나는 차갑고 우아하게 움직이는 함대의 보호를 받으면서 고통 없이 평화로운 은하계를 이루는 성전에 나섭니다."
 TIMELINE_EVENT_CRISIS_CETANA: "여왕의 귀환\n§L[GetDate]§!"
 TIMELINE_EVENT_HATCH_BEHEMOTH_TOOLTIP: "§H베헤모스 새끼§!\n§Y마일스톤§!\n\n§L[GetDate]§!에 베헤모스 새끼가 처음으로 알에서 깨어났습니다"
 TIMELINE_EVENT_HATCH_BEHEMOTH: "베헤모스 새끼\n§L[GetDate]§!"
 #Galactic Events
 TIMELINE_EVENT_GALACTIC_MARKET_TOOLTIP: "§H은하 시장§!\n§Y은하 이벤트§!\n\n우주는 상업의 힘으로 통합되었고, 은하 경제의 중심지로서 은하 시장이 정식으로 설립되었습니다. 무역선은 자유롭게 항해하며, 상인은 한순간에 큰돈을 얻기도 잃기도 합니다. 온 우주의 운명은 이제 수요와 공급의 법칙에 달려 있습니다."
 TIMELINE_EVENT_GALACTIC_MARKET: "자유로운 무역\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_TOOLTIP: "§H은하 공동체§!\n§Y은하 이벤트§!\n\n은하의 여러 제국이 하나의 정치 조직 아래 모였습니다. 그리하여 외교 담화와 논쟁, 권력 암투로 우주의 미래를 정하는 토론장인 은하 공동체가 수립되었습니다. 그러나 이 조직이 얼마나 영향력이 있을지는 두고 봐야 알 일입니다."
 TIMELINE_EVENT_GALACTIC_COMMUNITY: "새로운 조직\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION_TOOLTIP: "§H결의안 통과§!\n§Y은하 이벤트§!\n\n은하 공동체가 움직였습니다. 새로운 결의안으로 성간법을 고쳐 쓴 것입니다. 누구는 기뻐하고 누구는 분노하지만, 법 자체는 누구 하나 예외 없이 모두 따라야 합니다."
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION: "은하의 법\n§L[GetDate]§!"
 TIMELINE_EVENT_WAR_IN_HEAVEN_TOOLTIP: "§H천상의 전쟁§!\n§Y은하 이벤트§!\n\n고대의 유물이 잠에서 깨어났습니다. 자비로운 감독관이자 노여움에 찬 거신으로서 말입니다. 잊힌 시대의 오랜 경쟁자 사이인 [EVENT_TARGET_0.GetName](과)와 [EVENT_TARGET_1.GetName](은)는 다시 한번 우주 전쟁을 시작했습니다. 별빛을 가릴 정도로 무수한 두 신의 함대가 젊은 종족들에게 전했습니다... 멸종당하기 싫으면 복종하라고요."
 TIMELINE_EVENT_WAR_IN_HEAVEN: "고대 신의 전쟁\n§L[GetDate]§!"
 TIMELINE_EVENT_NEXUS_STORM_TOOLTIP: "§H넥서스 폭풍§!\n§Y은하 이벤트§!\n\n이전에 관측된 적 없는 특이한 폭풍이 [EVENT_TARGET_0.GetName] 성계에 나타났습니다. 이 '넥서스 폭풍'은 그칠 줄 모르는 파괴로 함대와 행성을 박살 내는 등 온 성계를 뒤집어 놓습니다."
 TIMELINE_EVENT_NEXUS_STORM: "시간을 초월한 폭풍\n§L[GetDate]§!"
