 building_dark_matter_power_plant: "암흑 물질 발전소"
 building_dark_matter_power_plant_desc: "§L아득히 먼 옛날에 잊힌 기술로 만들어진 고대 복합 시설입니다.§!"
 building_agri_processing_complex: "농업 가공 복합 단지"
 building_agri_processing_complex_desc: "§L아득히 먼 옛날에 잊힌 기술로 만들어진 고대 복합 시설입니다.§!"
 building_primitive_farm: "원시 농장"
 building_primitive_farm_desc: "땅을 경작해 소량의 작물을 생산하는 원시 농장입니다."
 building_primitive_factory: "기본 공장"
 building_primitive_factory_desc: "상품을 생산하면서 오염 물질을 배출하는 원시적이고 비효율적인 공장입니다."
 building_primitive_offices: "기본 사무실"
 building_primitive_offices_desc: "끝없이 펼쳐진 칸막이 너머에서 따분하고 의미 없는 업무를 바쁘게 처리하는 소리가 울려 퍼집니다."
 building_primitive_mine: "원시 광산"
 building_primitive_mine_desc: "터널이 땅속으로 길게 이어져 있는 원시 광산입니다."
 building_primitive_power_plant: "원시 발전소"
 building_primitive_power_plant_desc: "석탄 또는 초기 단계의 원자력을 사용하는 불안정한 원시 발전소로, 현지 대기를 오염시키고 있습니다."
 building_mutant_landfill: "돌연변이 매립지"
 building_mutant_landfill_desc: "온갖 끔찍한 돌연변이의 사체가 이곳에서 썩고 있습니다. 사체의 불안정한 유기 물질은 한데 뒤섞여, 하나의 건축물 형태를 갖췄습니다."
 building_vault: "지하 방공호"
 building_vault_desc: "이 가건물은 거대한 지하 방공호의 입구입니다. 지하 방공호는 과거 이 행성에 살던 원주민의 대피소로 쓰였는데, 이곳에 대피한 원주민들은 식량이 떨어지자 서로 해치기 시작했습니다."
 building_vault_2: "지하 방공호"
 building_vault_2_desc: "이 가건물은 거대한 지하 방공호의 입구입니다. 지하 방공호는 과거 이 행성에 살던 원주민의 대피소로 쓰였으며, 각종 기계와 채굴 장비가 잔뜩 보관되어 있습니다."
 building_particle_accelerator: "입자 가속기"
 building_particle_accelerator_desc: "독창적인 설계로 제작된 오래된 입자 가속기입니다. 입자 가속기에는 아직 작동하는 단말기가 있으며, 여기에 어떤 뛰어난 이론 물리학자가 정리한 것으로 보이는 방대한 양의 연구 자료가 들어있습니다."
 building_odd_factory: "기묘한 공장"
 building_odd_factory_desc: "다른 문명이 이 행성에 남긴 정교히 만들어진 시설로, 고가치의 자원을 생산합니다."
 building_quarantine: "전염병 연구 기지"
 building_quarantine_desc: "치료제를 개발하기 위해 감염자를 연구하는 임시 병원입니다."
 building_plague_memorial: "전염병 추모관"
 building_plague_memorial_desc: "한때 행성에 창궐했던 끔찍한 질병을 되새기기 위는 추모관입니다. 국가 생존의 증거로서 세워졌습니다."
 building_energy_grid: "에너지망"
 building_energy_grid_plural: "에너지망"
 building_energy_grid_desc: "시설망을 신중히 보정해, 발전기의 출력을 극대화합니다."
 building_energy_grid_effect_desc: "£energy£ §Y에너지§!를 생산하는 직업의 기본 생산량이 §G1§! 증가합니다."
 building_energy_nexus: "에너지 연결체"
 building_energy_nexus_desc: "이 거대한 시설은 행성의 모든 에너지망을 집중해, 효율성을 향상시킵니다."
 building_mineral_purification_plant: "광물 정제 공장"
 building_mineral_purification_plant_desc: "정제기로 최고 품질의 광물을 생산합니다."
 building_mineral_purification_hub: "광물 정제 허브"
 building_mineral_purification_hub_desc: "광물을 모아 정제기로 보내는 거대한 허브입니다."
 building_medical_1: "의료 센터"
 building_medical_1_desc: "$job_healthcare_desc$"
 building_medical_2: "유전자 진료소"
 building_medical_2_desc: "첨단 의학을 제공하는 유전자 진료소가 있으면, 인구는 통계적으로 더욱 건강하고 장수할 수 있습니다."
 building_medical_3: "세포 재생소"
 building_medical_3_desc: "수많은 인구에게 첨단 의학을 제공하는 세포 재생소가 있으면, 인구는 세포 수준에서 환자를 치료하는 첨단 의학 덕분에 더욱 건강하고 장수할 수 있습니다."
 building_mineral_silo_1: "광물 저장고 I"
 building_mineral_silo_1_desc: "광물 저장고는 우리 제국의 광물 저장 한도를 증가시킵니다."
 building_mineral_silo_2: "광물 저장고 II"
