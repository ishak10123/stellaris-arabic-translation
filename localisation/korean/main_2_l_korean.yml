 SPECIES_RIGHT_POPULATION_CONTROLS: "인구 통제"
 SPECIES_RIGHT_COLONIZATION_CONTROLS: "개척 권리"
 SPECIES_RIGHT_MIGRATION_CONTROLS: "이주 통제"
 SPECIES_RIGHT_STATUS: "$TYPE$: $STATUS|Y$"
 RESET_SPECIES_RIGHTS_CONFIRM: "종족 권리를 재설정하시겠습니까?"
 RESET_SPECIES_RIGHTS_CONFIRM_DESC: "§E주 종족이 아닌 다른 종족의 권리가 기본 권리로 변경됩니다.§!"
 RESET_THIS_SPECIES_RIGHTS_CONFIRM_DESC: "§E이 종족에 설정된 모든 권리가 기본 권리로 변경됩니다.§!"
 RESET_THIS_SPECIES_RIGHTS_TO_FOUNDER_CONFIRM_DESC: "§E이 종족에 설정된 모든 권리가 창립 종족의 권리로 변경됩니다.§!"
 RESET_THIS_SPECIES_RIGHTS_TO_ROBOT_CONFIRM_DESC: "§E이 종족에 설정된 모든 권리가 로봇 기본 종족의 권리로 변경됩니다.§!"
 CANT_RESET_SPECIES_RIGHTS: "§R종족 권리를 기본으로 초기화합니다.§!"
 RESET_RIGHTS: "제국 기본 권리로 초기화"
 RESET_RIGHTS_ALL: "모두 기본 권리로 초기화"
 RESET_RIGHTS_FOUNDER: "창립 종족 권리로 초기화"
 RESET_RIGHTS_ROBOT: "로봇 기본 종족 권리로 초기화"
