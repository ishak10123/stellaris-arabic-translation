 slavery_military: "전투 노예"
 slavery_military_tooltip: "§H전투 노예§!는 추가적인 자원을 생산하지 않지만, 지역 §H지상군§!의 훌륭한 군인이 될 수 있습니다. 이들은 [enforcer.GetIcon] §Y[enforcer.GetName]§!, [soldier.GetIcon] §Y[soldier.GetName]§! 또는 £pop_cat_worker£ §Y$pop_cat_worker$§! 직업에 고용될 수 있습니다."
 slavery_military_tooltip_delayed: "§L전투 노예는 병기화된 노예로, 태어날 때부터 무술 훈련과 절대적인 복종 훈련을 받습니다. 무조건적인 병역에 대한 대가로, 다른 노예보다 더 많은 자율성을 보장받으며 다양한 직업군에 종사할 수 있습니다.§!"
 slavery_livestock: "가축"
 slavery_livestock_tooltip: "£pop£ §H가축 팝§!은 자원을 생산할 수 없으며, £food£ §H식량§!으로 가공되기 위해 출하됩니다.\n\n암석류 가축의 경우, 식량 대신 £minerals£ §H광물§!을, 호열체 가축은 £alloys£ §H합금§!을 생산합니다.\n\n§H외계 동물원§!에 수용한 가축은 $r_amenities$를 생산합니다."
 slavery_livestock_tooltip_delayed: "§L우리가 먹던 가축이 팝이었어!§!"
 slavery_indentured: "계약 하인"
 slavery_indentured_tooltip: "§H계약 하인§!은 £pop_cat_worker£ §Y$pop_cat_worker$§! 혹은 £pop_cat_specialist£ §Y$pop_cat_specialist$§! 직업에 종사하며, 다른 노예에 비해 더 많은 정치력을 보유하고 있습니다. 이들은 [entertainer.GetIcon] §Y[entertainer.GetNamePlural]§! 또는 [enforcer.GetIcon] §Y[enforcer.GetNamePlural]§! 직업에 종사할 수 없습니다. 노예 관련 생산 보너스는 £pop_cat_worker£ §Y$pop_cat_worker_plural$§!로 일하는 경우에만 적용됩니다."
 slavery_indentured_tooltip_delayed: "§L이론상 이들은 채무를 변제하고 노예 상태에서 해방될 수 있습니다. 하지만 계약서에 기재된 이 항목은 문제가 되지 않도록 조작되었습니다.§!"
 living_standard_utopian: "유토피아적 풍요"
 living_standard_utopian_tooltip: "$living_standard_utopian$는 이 종족의 모든 구성원에게 상상할 수 있는 거의 모든 유형의 사치를 보장합니다.\n\n$UTOPIAN_ABUNDANCE_POP_EFFECTS$\n\n$CIVILIANS_PRODUCE_UNITY_RESEARCH$"
 living_standard_utopian_tooltip_delayed: "§L세상의 모든 재화를 제공하더라도, 모든 이들의 수요를 만족시키는 건 현실적으로 불가능합니다. 하지만 시도 정도는 해볼 수 있습니다.§!"
 living_standard_shared_burden: "나누어 진 짐"
 living_standard_shared_burden_tooltip: "$living_standard_shared_burden$은 사회의 모든 구성원에게 공평한 자원 분배를 보장합니다.\n\n$SHARED_BURDEN_POP_EFFECTS$\n\n$UNEMPLOYED_PRODUCE_UNITY$"
 living_standard_shared_burden_tooltip_delayed: "§L능력에 따라 일하고, 필요에 따라 분배해야 합니다.§!"
 living_standard_academic_privilege: "학술적 특권"
 living_standard_academic_privilege_tooltip: "$living_standard_academic_privilege$은 교육받은 인구를 우선시하여, 과학의 일반적인 이익을 도모합니다.\n\n$ACADEMIC_PRIVILEGE_POP_EFFECTS$"
 living_standard_academic_privilege_tooltip_delayed: "§L지식은 권력의 핵심입니다.§!"
 living_standard_good: "사회 복지"
 living_standard_good_tooltip: "$living_standard_good$는 관대한 사회 정책을 펼쳐 빈곤층의 삶을 개선하고자 노력합니다.\n\n$SOCIAL_WELFARE_POP_EFFECTS$\n\n$UNEMPLOYED_PRODUCE_UNITY$"
 living_standard_good_tooltip_delayed: "§L국가의 가장 중요한 책임은 국민의 요구를 파악하는 것입니다.§!"
 living_standard_normal: "적당한 여건"
 living_standard_normal_tooltip: "$living_standard_normal$은 이 종족의 구성원 대부분이 적당한 삶의 질을 영위할 수 있을 만큼 이들의 수요를 보장해줍니다.\n\n$DECENT_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_normal_tooltip_delayed: "§L구성원의 요구를 계속 무시하면, 장기적인 관점에선 결국 손해가 될 것입니다.§!"
 living_standard_stratified: "계층 경제"
 living_standard_stratified_tooltip: "$living_standard_stratified$는 빈곤한 대중을 희생시키면서 지배 계층을 우선시합니다.\n\n$STRATIFIED_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_stratified_tooltip_delayed: "§L자신의 운명을 개선하고 싶다면, 노력해야만 합니다.§!"
 living_standard_hive_mind: "드론"
 living_standard_hive_mind_tooltip: "이들은 사치품을 별로 사용하지 않지만 각 드론은 생체활동을 유지하기 위해 여전히 많은 자원을 필요로 합니다."
 living_standard_hive_mind_tooltip_delayed: "§L각 개체의 필요와 공동체의 필요는 하나이며 동일합니다.§!"
 living_standard_subsistence: "최저 생계"
 living_standard_subsistence_tooltip: "$living_standard_subsistence$는 이 종족의 팝에게 가장 필수적인 자원만을 제공합니다.\n\n$SUBSISTENCE_POP_EFFECTS$"
 living_standard_subsistence_tooltip_delayed: "§L최대한 굶주림에 시달리는 사람이 없도록 해야 합니다. 물론, 굶지만 않는다면 그 이상은 신경 쓰지 않습니다.§!"
 living_standard_none: "존재 불허"
 living_standard_none_tooltip: "이 종족은 정화되고 있으며, 이 종족의 팝은 유지비를 소모하지 않습니다."
 living_standard_none_tooltip_delayed: "§L우리는 죽은 자들에게 예산을 책정하지 않습니다.§!"
 living_standard_deassimilation: "군체 분열"
 living_standard_deassimilation_tooltip: "이 종족은 군체 의식으로부터 생리적 분열 중입니다."
 living_standard_deassimilation_tooltip_delayed: "§L구속에서 풀려난 것을 환영합니다.§!"
 living_standard_ego_assimilation: "정체성 승화"
 living_standard_ego_assimilation_tooltip: "이 종족은 통합된 의식과 하나가 되고 있습니다."
 living_standard_ego_assimilation_tooltip_delayed: "§L이 과정에서 자아는 존속하지 못합니다. 하지만 그게 바로 핵심입니다.§!"
 living_standard_ego_assimilation_psionic: "$living_standard_ego_assimilation$"
 living_standard_ego_assimilation_psionic_tooltip: "$living_standard_ego_assimilation_tooltip$\n\n§R개별 자아가 무너짐에 따라, 사이오닉 특성이 전부 제거됩니다.§!"
 living_standard_ego_assimilation_psionic_tooltip_delayed: "$living_standard_ego_assimilation_tooltip_delayed$"
 living_standard_cyborg_ego_assimilation: "$living_standard_ego_assimilation$"
 living_standard_cyborg_ego_assimilation_tooltip: "$living_standard_ego_assimilation_tooltip$"
 living_standard_cyborg_ego_assimilation_tooltip_delayed: " $living_standard_ego_assimilation_tooltip_delayed$"
 living_standard_cyborg_ego_assimilation_psionic: "$living_standard_ego_assimilation$"
 living_standard_cyborg_ego_assimilation_psionic_tooltip: "$living_standard_ego_assimilation_tooltip$\n\n§R개별 자아가 무너짐에 따라, 사이오닉 특성이 전부 제거됩니다.§!"
 living_standard_cyborg_ego_assimilation_psionic_tooltip_delayed: "$living_standard_ego_assimilation_tooltip_delayed$"
 living_standard_tech_assimilation: "실체변화 합성"
 living_standard_tech_assimilation_tooltip: "이 종족은 기계와 융합되고 있습니다."
 living_standard_tech_assimilation_tooltip_delayed: "§L단단하게. 향상되게. 빠르게. 강력하게.§!"
 living_standard_cyborg_assimilation: "$living_standard_tech_assimilation$"
 living_standard_cyborg_assimilation_tooltip: "$living_standard_tech_assimilation_tooltip$"
 living_standard_cyborg_assimilation_tooltip_delayed: "$living_standard_tech_assimilation_tooltip_delayed$"
 living_standard_cyborg_assimilation_psionic: "$living_standard_tech_assimilation$"
 living_standard_cyborg_assimilation_psionic_tooltip: "$living_standard_tech_assimilation_tooltip$\n\n§R사이버네틱 삽입물과 호환되지 않아, 사이오닉 특성이 전부 제거됩니다.§!"
 living_standard_cyborg_assimilation_psionic_tooltip_delayed: "$living_standard_tech_assimilation_tooltip_delayed$"
 living_standard_psi_assimilation: "초월 각성"
 living_standard_psi_assimilation_tooltip: "이 종족은 사이오닉 잠재력을 깨닫고 있습니다."
 living_standard_psi_assimilation_tooltip_delayed: "§L베일은 걷혔지만, 장막이 남아있습니다.§!"
 living_standard_psi_assimilation_cyborg: "$living_standard_psi_assimilation$"
 living_standard_psi_assimilation_cyborg_tooltip: "$living_standard_psi_assimilation_tooltip$\n\n§R순수한 영혼과 신체를 이루기 위해, 사이버네틱 특성이 전부 제거됩니다.§!"
 living_standard_psi_assimilation_cyborg_tooltip_delayed: "$living_standard_psi_assimilation_tooltip_delayed$"
 living_standard_organic_trophy: "의무적 보살핌"
 living_standard_organic_trophy_tooltip: "이 생활 수준은 소수의 유기체 인구를 아낌없이 보살피며, 전시품으로 소중히 모십니다.\n\n$ORGANIC_TROPHY_POP_EFFECTS$"
 living_standard_organic_trophy_tooltip_delayed: "§L누가 착한 생체 트로피일까? 너야! 그래, 바로 너!§!"
 living_standard_chemical_bliss: "화학적 쾌락"
 living_standard_chemical_bliss_tooltip: "쾌락으로 가득한 혼수상태를 유도하는 약물 요법과 함께 무료 오락 매체를 이용할 수 있습니다. 팝은 행복해지지만, 쓸모없어집니다.\n\n$living_standard_chemical_bliss_happiness_tooltip$"
 living_standard_chemical_bliss_tooltip_delayed: "§L모두가 이 변화와 오락을 환영하고 있습니다. 물론, 약물에 저항하는 자도 있습니다. 처음에는 말이지요.§!"
 living_standard_decadent: "퇴폐적 생활 방식"
 living_standard_decadent_tooltip: "$living_standard_decadent$은 우리 사회의 특권 계층에 더 많은 자원과 사치품을 우선적으로 배분합니다.\n\n$DECADENT_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_decadent_tooltip_delayed: "§L우리는 최고의 상품만을 대접받아 마땅합니다. 미천한 자들은 봉사하고, 우리는 즐겨야 합니다.§!"
 living_standard_dystopian_society: "디스토피아 사회"
 living_standard_dystopian_society_tooltip: "$living_standard_dystopian_society$는 통치 계급에게만 생필품을 지급하며, 하층 계급은 완전히 무시합니다.\n\n$DYSTOPIAN_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_dystopian_society_tooltip_delayed: "§L천한 것들은 자기 분수를 알아야 합니다. 분수를 모른다면, 우리가 깨우쳐 줄 수밖에요.§!"
 living_standard_worker_ownership: "사원 주주 회사"
 living_standard_worker_ownership_tooltip: "$living_standard_worker_ownership$는 모든 근로자에게 소속 기업에 대한 민주적인 지분을 보장합니다. 생활 비용과 사회적 책임은 모든 구성원에게 균등하게 분배됩니다."
 living_standard_worker_ownership_tooltip_delayed: "§L각자에게 목소리와 지분과 우리의 노동으로 건설한 사회로부터의 배당을.§!"
