 bombardment_raiding_desc: "$bombardment_raiding$ 폭격 태세는 민간인들이 밀집된 구역으로 약탈정을 보내, 이들을 우리 행성으로 납치하고 노예로 부립니다.\n- §Y지상군§!에 §E경미한§! 피해\n- §Y행성§!에 §E경미한§! 피해\n- 가능한 한 팝을 죽이는 대신 §Y납치§!\n- 마지막 팝은 죽이거나 납치하지 §R않습니다§!. 행성에 주둔한 지상군마다 보호받는 팝의 수가 증가합니다."
