 reanimator_effect_desc: "통제하에 있던 복제된 유기체 §Y우주 동물§!을 소생시킬 수 있습니다."
 FLEETORDER_REANIMATE_PROJECT_BUTTON: "우주 동물 함선 소생"
 MESSAGE_DEBRIS_REANIMATED_FINISH_MESSAGE_TYPE_TITLE: "우주 동물 소생"
 MESSAGE_DEBRIS_REANIMATED_FINISH: "$SYSTEM|Y$에서 사망한 우주 생명체가 소생되어, 우리 군대에 편입해 통제할 수 있게 되었습니다."
 DEBRIS_REANIMATOR_DESC: "$SYSTEM|Y$에서 일어난 교전으로 인해 사망한 우주 동물의 잔해가 부패하기 시작했습니다.\n$FLEET_SIZE$ 수의 생물을 소생시킬 수 있습니다."
 REANIMATED_FLEET_VERY_SMALL: "아주 적은"
 REANIMATED_FLEET_SMALL: "적은"
 REANIMATED_FLEET_MODERATE: "적당한"
 REANIMATED_FLEET_LARGE: "많은"
 REANIMATED_FLEET_VERY_LARGE: "아주 많은"
 REANIMATED_FLEET_VAST: "어마어마한"
 MOD_SPACE_FAUNA_REANIMATION_COST_MULT: "우주 동물 소생 비용"
 concept_space_fauna_ship_component: "우주 동물 함선 부품"
 concept_space_fauna_ship_component_desc: "다양한 우주 동물에 관한 특별 프로젝트를 진행하면 우주 동물 함선 부품을 획득할 수 있습니다. 이러한 부품에 적용되는 보너스는 부품을 우주 동물에 §H변이§!로 장착시켰을 경우에도 적용됩니다. 우주 동물 함선 부품의 예시는 다음과 같으며, 이 밖에도 다양한 부품이 있습니다:\n- §H$SPACE_WHALE_WEAPON_1$§!\n- §H$AMOEBA_STRIKE_CRAFT$§!"
 MOD_ATTACHED_SPACE_FAUNA_COMPONENT_DAMAGE_MULT: "['concept_space_fauna_ship_component', 우주 동물 함선 부품] 피해량"
