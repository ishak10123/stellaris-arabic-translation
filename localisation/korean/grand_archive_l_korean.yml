 frenzied_voidworms_pacified_modifier: "진정된 $NAME_Frenzied_Voidworms$"
 resolution_voidworm_eradication: "공허충 박멸"
 resolution_voidworm_eradication_desc: "기생 생물인 공허충은 은하계를 병들게 하고 행성에 있는 생명체들을 위협합니다. 공허충의 생태는 은하 생태계의 균형을 무너뜨리기 때문에, 녀석들을 모조리 박멸해야 합니다."
 resolution_voidworm_eradication_tooltip: "어떤 제국이라도 국경 내에 §Y$NAME_Voidworms$§!이 있다면, 이 생명체가 떠나거나 박멸되기 전까지는 §R은하법 위반§!을 저지르게 됩니다."
 resolution_repeal_voidworm_eradication: "§R$resolution_voidworm_eradication$ 폐지§!"
 resolution_repeal_voidworm_eradication_desc: "[global_event_country.GetGalCommunityOrGalImperium](이)라 해도 공허충이라는 종을 박멸할 권리를 가질 순 없습니다."
 resolution_repeal_voidworm_eradication_effect_success: "§Y$resolution_voidworm_eradication$§!을 폐지합니다."
 grand_archive.2103.name: "$resolution_voidworm_eradication$"
 grand_archive.2103.desc: "[global_event_country.GetGalCommunityOrGalImperium]에서 더 이상 회원국의 성계에 공허충을 남겨 둘 수 없다고 선언했습니다.\n\n공허충이 박멸되거나 자발적으로 우리 영역을 떠나기 전까지 [this.GetName](은)는 §R은하법 위반§!으로 간주됩니다."
 grand_archive.2105.name: "[this.GetSpeciesName] 영역의 $NAME_Voidworms$"
 grand_archive.2105.desc: "공허충 떼가 [from.GetName] 성계의 우리 영역을 침범했습니다. 우리는 [global_event_country.GetGalCommunityOrGalImperium]의 회원국이기에, 우리 영역에 있는 모든 공허충을 즉시 박멸해야 할 법적 의무가 있습니다.\n\n공허충이 영역을 벗어나거나 박멸되기 전까지 [this.GetName](은)는 §R은하법 위반§!으로 간주됩니다."
 grand_archive.2107.desc: "우리 소유의 [invaded_system.GetName] 성계에 아직도 공허충이 남아 있으며, 이는 $resolution_voidworm_eradication$ 결의안에 의해 심각한 §R은하법 위반§!으로 간주됩니다. 그 결과, [global_event_country.GetGalCommunityOrGalImperium]의 다른 회원국들이 [this.GetName]에 가할 제재 조치에 관해 투표할 수 있게 되었습니다."
 bombardment_damage_moderate: "§Y보통§!"
 bombardment_damage_massive: "§R막대한§!"
 bombardment_voidworm_invasion_desc_common: "$bombardment_voidworm_invasion$는 인구를 제거하고 새로운 공허충 유충을 생성합니다.\n- §Y지상군§!에 §Y보통§! 피해\n- §Y25%§! 황폐도까지 §Y행성§!에 [GetVoidwormFleetBombardmentDamageIntensity] 피해\n- §Y팝§!에 §Y보통§! 피해"
 bombardment_voidworm_invasion: "공허충 포자"
 bombardment_voidworm_invasion_desc: "$bombardment_voidworm_invasion_desc_common$\n- 마지막 §Y$MIN_POPS$§! £pop£ §H팝§!은 죽이지 §R않음§!"
 bombardment_voidworm_invasion_crisis: "$bombardment_voidworm_invasion$(위기)"
 bombardment_voidworm_invasion_crisis_desc: "$bombardment_voidworm_invasion_desc_common$"
 bombardment_frenzied_voidworm_invasion: "변이 $bombardment_voidworm_invasion$"
 bombardment_frenzied_voidworm_invasion_desc: "- 황폐화된 행성은 §Y$pc_shattered$§!으로 변합니다."
 alert_space_fauna_bombardment_title: "공허충 떼의 식민지 폭격!"
 alert_space_fauna_bombardment_instant: "우리 식민지가 은하 기생충의 폭격을 받고 있습니다!\n다만 인구가 밀집된 식민지에 살포할 수 있는 포자는 한정되어 있으니, 녀석들은 곧 떠날 것입니다."
 ALERT_SPACE_FAUNA_BOMBARDMENT_DETAIL: "$SYSTEM_NAME|Y$ 성계의 $PLANET_NAME|Y$, 남은 기생 예정 팝: §Y$POPS_TO_KILL$§!"
 grand_archive.2195.name: "은하 기생충"
 grand_archive.2195.desc.common_1: "[from.GetName](이)가 공격받고 있습니다.\n\n대규모 공허충 무리가 식민지의 궤도에서 기생 낭종으로 폭격을 가하고 있습니다."
 grand_archive.2195.desc.common_2: "공허충 군집을 생물학적으로 조사해 본 결과, 녀석들은 살포할 수 있는 낭종의 수가 한정되어 있기 때문에 이 낭종이 모두 고갈되면 떠날 가능성이 높다고 합니다. 하지만 공허충이 떠나기 전까지는 심각한 인구 손실을 겪게 될 것입니다."
 grand_archive.2195.desc.default: "$grand_archive.2195.desc.common_1$\n\n낭종에 들어 있는 독성 포자는 개척민을 포함한 모든 생명체에게 매우 위험합니다. 숙주의 몸에 들어간 포자는 매우 빠른 속도로 유충으로 성장하며, 성장을 마친 유충은 숙주의 몸을 뚫고 바깥으로 나옵니다. 그 과정에서 숙주의 신체는 완전히 파괴됩니다. 밖으로 나온 유충은 몸속의 공기주머니에 압축되어 있던 가스를 사용해 대기 상층부로 상승을 시작하는데, 대기권을 벗어나서도 계속해서 본능을 따라 미리 정해진 목적지를 향해 이동합니다.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.desc.rocks: "$grand_archive.2195.desc.common_1$\n\n낭종에 들어 있는 독성 포자는 모든 토착 동물에게 매우 위험합니다. 숙주의 몸에 들어간 포자는 매우 빠른 속도로 유충으로 성장하며, 성장을 마친 유충은 숙주의 몸을 뚫고 바깥으로 나옵니다. 그 과정에서 숙주의 신체는 완전히 파괴됩니다. 유충은 보통 소행성에 함유된 귀금속을 먹이로 삼지만, 우리의 연약한 [this.GetColonistPlural](을)를 사냥해 먹기도 합니다. 유충은 몸속의 공기주머니에 압축되어 있던 가스를 사용해 대기 상층부로 상승할 수 있는데, 상층부에 올라간 유충은 계속해서 본능을 따라 미리 정해진 목적지를 향해 이동합니다.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.a: "불안하군요."
 grand_archive.2195.a.homicidal: "다 죽여 버립시다."
 ap_galactic_contender_voidworms_tt: "$MOD_DIPLO_WEIGHT_MULT$: §G+20%§!\n$mod_damage_vs_country_type_fallen_empire_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_awakened_fallen_empire_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_gate_builders_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!"
 ap_defender_of_the_galaxy_voidworm_modifier_desc: "$mod_damage_vs_country_type_voidworms_mult$: §G+$@ap_defender_of_the_galaxy_voidworm_dmg_mult|0%$§!\n$ap_defender_of_the_galaxy_modifier_desc$"
