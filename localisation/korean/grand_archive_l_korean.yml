 grand_archive.5015.name: "보물고 설립"
 grand_archive.5015.desc: "§Y$celestial_chart$§!에는 모험 중에 찾은 보물에서 최대한의 가치를 끌어낼 수 있는 보물 감정 정보가 기록되어 있습니다. 우리 행성 하나에 §Y보물고§!를 설립하면 이러한 귀중품을 분류하고, 복원하고, 보존할 수 있을 것입니다. 현재 물류 상황을 고려했을 때, 다음 행성이 보물고를 설치하기에 적합할 것으로 보입니다."
