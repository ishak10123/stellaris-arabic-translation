 sm_voidlure: "공허 미끼"
 sm_voidlure_desc: "공허 미끼는 심우주에 신호를 보내 우주 공간 속에 숨어 있는 유기체를 유인할 수 있는 시설입니다."
 sm_voidlure_desc_know_fauna: "공허 미끼는 심우주에 신호를 보내 특정 우주 동물을 끌어들일 수 있는 시설로, 유인하고 싶은 동물이 선호하는 성계에 설치해야 합니다. 유인한 동물은 1년간 일시적으로 온순한 상태가 됩니다."
