 grand_archive.4515.name: "$grand_archive$ 손실"
 grand_archive.4515.desc.common_1: "[from.GetName](이)가 [fromfrom.GetName]에 위치한 우리 소유의 $grand_archive$를 파괴했습니다."
 grand_archive.4515.desc.common_2: "표본을 계속 전시하려면 다른 성계에 $grand_archive$를 재건해야 합니다."
 grand_archive.4515.stolen: "안타깝게도 비치되어 있던 귀중한 표본 몇 개가 유실되었습니다."
 grand_archive.4515.freed: "또한, 우리가 사로잡았던 우주 동물 몇 마리가 야생으로 풀려났습니다. 대부분이 혼란에 빠져 공격성을 보이고 있습니다."
