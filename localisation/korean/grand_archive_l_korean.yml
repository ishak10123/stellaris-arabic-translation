 #Homicidal considerations #
 #Fanatic Purifiers
 grand_archive.4135.name: "열등종의 잡동사니"
 grand_archive.4135.desc: "우리 세계의 더러운 외계종들을 쓸어버리는 과정에서 [GetCollectionRewardCategory] 전리품이 꽤 많이 모였습니다.\n\n오염된 은하계의 잔재인 이 전리품들은 우리의 사명을 계속해서 상기시켜 줄 것입니다."
 grand_archive.4135.desc.geology: "$grand_archive.4135.desc$"
 grand_archive.4135.desc.aesthetic: "$grand_archive.4135.desc$"
 grand_archive.4135.a: "[this.GetName](을)를 위해!"
 grand_archive.4140.name: "쌓이는 패물"
 grand_archive.4140.desc.geology: "우리는 계속해서 이 더러운 은하계로부터 [GetCollectionRewardCategory](과)와 관련된 물품과 패물 등 여러 별난 물건을 모으고 있습니다.\n\n잠시 시간을 내어 지금까지 모은 전리품을 돌아보는 것도 나쁘지는 않지만, 아직 모을 물건은 많이 남아 있다는 사실을 항상 명심해야 합니다."
 grand_archive.4140.desc.aesthetic: "우리는 계속해서 [GetCollectionRewardCategory] 장식품을 수집 중입니다. 열등한 생명체들이 남긴 오염의 잔재죠.\n\n역겨운 외계종 놈들을 우리 은하에서 모두 쓸어버리고 나면, 이 물건들을 돌아보며 놈들의 본성을 되새길 수 있을 것입니다."
 grand_archive.4140.a: "이 은하계를 청소해야 합니다."
 grand_archive.4145.name: "꽉 찬 진열장"
 grand_archive.4145.desc.geology: "이 은하계의 오랜 흔적인 [GetCollectionRewardCategory] 물품으로 저장소를 꽉 채웠습니다.\n\n이 방대한 컬렉션이야말로 우리가 이룩한 파괴라는 이름의 위업의 증거입니다. 모두에게 우리의 위대한 승리를 뽐냅시다."
 grand_archive.4145.desc.aesthetic: "아무 의미 없는 외계 장식품인 [GetCollectionRewardCategory] 골동품으로 저장소를 풍족하게 채웠습니다.\n\n무수하게 쌓인 수집품을 보니 하찮은 외계종들의 열등한 본성이 떠올라 비웃음이 절로 납니다. 생각해 보시죠. 놈들을 박멸하고 나면, 이 진열장만이 놈들이 존재했었다는 유일한 증거가 되는 것입니다."
 grand_archive.4145.a: "죽음을 위해 건배!"
 #Devouring Swarm
 grand_archive.4136.name: "침 묻은 장식품"
 grand_archive.4136.desc: "우리는 아직도 배가 고픕니다. 은하계를 포식하다 보니 [GetCollectionRewardCategory] 골동품을 많이 모았습니다.\n\n우리가 먹어 치운 은하의 기억은 여기 전시한 물건에 머물 것입니다."
 grand_archive.4136.desc.geology: "$grand_archive.4136.desc$"
 grand_archive.4136.desc.aesthetic: "$grand_archive.4136.desc$"
 grand_archive.4136.a: "허기가 가시질 않는군."
 grand_archive.4141.name: "$grand_archive.4136.name$"
 grand_archive.4141.desc.common: "이 물건들을 돌아보면, 우리가 지금까지 잔치를 벌이며 먹어 치워 온 수없이 많은 존재를 떠올릴 수 있을 것입니다."
 grand_archive.4141.desc.geology: "우리는 계속해서 이 은하계의 오랜 흔적인 [GetCollectionRewardCategory] 표본을 계속 수집하고 있습니다.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.desc.aesthetic: "우리는 계속해서 [GetCollectionRewardCategory] 장식품을 수집하고 있습니다. 한때 열등한 생명체들이 가지고 있었던 특이한 골동품들을 말이죠.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.a: "식사를 계속합시다."
 grand_archive.4146.name: "식사의 추억"
 grand_archive.4146.desc: "우리는 이 은하를 남김없이 먹어 치우며 [GetCollectionRewardCategory] 골동품으로 저장소를 가득 채웠습니다.\n\n이 방대한 수집품을 보니 도저히 가시지 않는 허기가 또다시 느껴집니다. 은하계를 전부 먹어 치우고 나면 이 물건들을 바라보며 그 맛있었던 추억을 되새길 수 있을지도 모르겠습니다."
 grand_archive.4146.desc.geology: "$grand_archive.4146.desc$"
 grand_archive.4146.desc.aesthetic: "$grand_archive.4146.desc$"
 grand_archive.4146.a: "천하 일미였죠."
 #Determined Exterminators
 grand_archive.4137.name: "나름 값진 장식품"
 grand_archive.4137.desc: "유기체들이 귀중하게 여기는 유물인 [GetCollectionRewardCategory] 물품을 모았습니다.\n\n이 물건들은 은하계에서 유기체가 멸종한 뒤에도 우리의 보호 아래에 계속 남을 것입니다."
 grand_archive.4137.desc.geology: "$grand_archive.4137.desc$"
 grand_archive.4137.desc.aesthetic: "$grand_archive.4137.desc$"
 grand_archive.4137.a: "호기심을 품어 나쁠 건 없죠."
 grand_archive.4142.name: "커져 가는 호기심"
 grand_archive.4142.desc: "우리는 이 은하계에서 유기체의 흔적을 지우며 전리품 삼아 [GetCollectionRewardCategory]의 물건을 모았습니다.\n\n앞으로 있을 말살 프로토콜을 준비하는 과정에서 이 물건들이 유기체의 무지함을 되새기게 해 줄 것입니다."
 grand_archive.4142.desc.geology: "$grand_archive.4142.desc$"
 grand_archive.4142.desc.aesthetic: "$grand_archive.4142.desc$"
 grand_archive.4142.a: "프로토콜 조정 완료."
 grand_archive.4147.name: "가득 찬 메모리"
 grand_archive.4147.desc: "우리는 이 은하계를 정화하면서 [GetCollectionRewardCategory] 표본에 배정된 메모리 뱅크를 가득 채웠습니다.\n\n이 수집품은 유기체가 어떤 존재를 소중히 여기는 경향이 있는지 분석해 볼 수 있는 데이터를 제공합니다. 놈들을 말살하는 데 도움이 될 것이며, 나중에는 이 오염된 은하계의 역사를 떠올리는 데 사용할 수도 있을 것입니다."
 grand_archive.4147.desc.geology: "$grand_archive.4147.desc$"
 grand_archive.4147.desc.aesthetic: "$grand_archive.4147.desc$"
 grand_archive.4147.a: "유기체의 어리석음이란."
