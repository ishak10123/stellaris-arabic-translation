 grand_archive.4105.name: "$leviathans.500.name$"
 grand_archive.4105.desc.common.aesthetic_wonder: "[GetCuratorsDesignation] 여러분이 신중하게 §Y$EXHIBITION_AESTHETIC_WONDERS$§! 표본을 수집하고 보존하는 모습을 봤습니다. 충분한 주의를 기울인다면, 은하계 어디에서나 아름다운 것을 볼 수 있는 법이죠."
 grand_archive.4105.desc.common.historical_item: "[GetCuratorsDesignation] 여러분이 신중하게 §Y$EXHIBITION_GALACTIC_HISTORY$§! 표본을 수집하고 보존하는 모습을 지켜봐 왔습니다. 여러분께서 모은 물건들은 여러분의 손안에서 영원히 살아가겠죠."
 grand_archive.4105.desc.common.xeno_geology: "[GetCuratorsDesignation] 여러분이 신중하게 §Y$EXHIBITION_XENO_GEOLOGY$§! 표본을 수집하고 보존하는 모습을 지켜봐 왔습니다. 때로는 암석이나 돌멩이 속에 은하계의 이야기가 담겨 있기도 하죠."
 grand_archive.4105.desc.1.common: "[GetStage1Description]\n\n이 도움을 통해 여러분이 계속해서 훌륭한 작업을 이어 나가시길 바랍니다."
 CURATORS_STAGE_1_DESC: "여러분은 초기 수집품은 매우 인상적이더군요. 좋은 걸 보았으니, 그 대가로 저희 서비스를 제공해 드리고자 합니다. 원하는 분야를 고르시면, 은하계의 보존을 위해 해당 분야의 전문가를 파견해 드리겠습니다."
 DEAD_CURATORS_STAGE_1_DESC: "비록 저희 엔클레이브는 파괴되고 말았지만, 은하계의 보존을 위해 여러분께 계속해서 서비스를 제공해 드리고자 합니다. 분야를 선택하시면 그 분야에서 도움을 드리겠습니다."
 grand_archive.4105.desc.1.xeno_geology: "$grand_archive.4105.desc.common.xeno_geology$\n\n$grand_archive.4105.desc.1.common$"
