 grand_archive.4555.name: "$grand_archive$ 해체"
 grand_archive.4555.desc: "[fromfrom.GetName] 성계를 차지하면서, 그곳에 존재하던 [from.GetName] 소유의 $grand_archive$를 해체했습니다.\n\n건축물이 차지하고 있던 공간을 되찾았습니다."
 grand_archive.4560.name: "$grand_archive.4555.name$"
 grand_archive.4560.desc.common_1: "[from.GetName] 성계를 포기하면서, 그곳에 존재했던 $grand_archive$가 해체되었습니다."
 grand_archive.4560.desc.common_2: "마지막으로 아카이브 건축에 사용되었던 합금의 대부분을 회수했습니다. 전시를 계속하려면 다른 성계에 $grand_archive$를 재건해야 합니다."
 grand_archive.4560.desc.specimen: "모든 표본을 회수했으며, 회수판 표본들은 새 $grand_archive$가 지어질 때까지 적절히 보관될 것입니다."
 grand_archive.4560.desc.fauna: "또한 그 과정에서 모든 우주 동물을 살처분해, 기본 자원을 획득했습니다."
