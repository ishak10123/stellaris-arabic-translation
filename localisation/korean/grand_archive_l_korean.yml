 cutholoids_hunting_buff_desc: "광물이 풍부한 쿠톨로이드의 껍데기가 전투가 끝나고 자동으로 회수되어, 파괴된 함대 하나당 §G$@cutholoids_hunting_buff_mineral_reward|0$§! £minerals£을 획득합니다."
