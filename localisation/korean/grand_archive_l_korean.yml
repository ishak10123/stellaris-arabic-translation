 grand_archive.6025.name: "해적 매복"
 grand_archive.6025.desc: "[from.GetName]에서 §Y$TREASURE_TROVE$§!를 수색하던 [fromfromfrom.Leader.GetName](이)가 해적 함대의 습격을 받았습니다!\n\n대체 어떻게 한 건지는 알 수 없지만, 이 무법자 녀석들은 몰래 우리 뒤를 밟은 뒤 보물을 빼앗을 생각이었던 것 같습니다. 보물을 차지하려면 녀석들이 보물을 먼저 손에 넣기 전에 해적 함대를 물리쳐야 합니다."
 grand_archive.6025.a: "전투를 준비하세요."
 TREASURE_TROVE_PIRATES: "$NAME_Treasure_Trove_Pirate_Ship$ 격파"
 TREASURE_TROVE_PIRATES_DESC: "해적 함대가 [this.GetName]에 위치한 §Y$TREASURE_TROVE$§!를 노리고 있습니다!"
 TREASURE_TROVE_EVENT_TOOLTIP: "§R이 약삭빠른 놈들이 귀중한 자원을 가로채기 전에 물리쳐야 합니다.§!"
 grand_archive.6031.name: "해적 격파"
 grand_archive.6031.desc: "약삭빠른 해적을 쫓아냈으니, 이제 안심하고 [event_target:treasure_trove_planet.GetName]의 보물 창고를 확보할 수 있게 되었습니다."
 grand_archive.6031.a: "수고한 보람이 있었군요."
 grand_archive.6035.name: "보물 창고 손실"
 grand_archive.6035.desc: "약삭빠른 해적이 [event_target:treasure_trove_planet.GetName]에 위치한 §Y$TREASURE_TROVE$§!를 약탈했습니다.\n\n우리가 가져갈 만한 것은 아무것도 남지 않았습니다."
 grand_archive.6035.a: "결국 이렇게 됐군요."
