 grand_archive.4105.desc.3.common: "보존에 누구보다 열심이군요. 그런 여러분께 아주 특별한 물건 하나를 맡기고 싶습니다. [GetStage3Description]"
 grand_archive.4105.desc.3.common_2: "물론 보통 귀한 물건이 아닌 만큼, 상당한 기부를 부탁드리겠습니다..."
 CURATORS_STAGE_3_DESC: "저희 컬렉션에서 가장 귀하고 강력한 물건 하나를 가져가시죠. 여러분이라면 안심하고 맡길 수 있을 것 같습니다.\n\n$grand_archive.4105.desc.3.common_2$"
 DEAD_CURATORS_STAGE_3_DESC: "은하계 전역에 흩어진 비밀 보관함에 넣어놓은 덕에 기지의 파괴 속에서도 유실되지 않았죠.\n\n$grand_archive.4105.desc.3.common_2$ 어쩔 수 없는 일입니다. 선심만으로는 재건을 이룰 수 없는 법이니까요."
 grand_archive.4105.desc.3.xeno_geology: "$grand_archive.4105.desc.common.xeno_geology$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.aesthetic_wonder: "$grand_archive.4105.desc.common.aesthetic_wonder$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.historical_item: "$grand_archive.4105.desc.common.historical_item$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.no_relic.common: "원래 저희가 가진 유물 중 제일 귀한 물건을 맡겨 드리려고 했습니다만, 다른 분이 선수를 치고 말았네요.\n\n대신이라고 하기엔 뭐하지만, 이 물건 중 하나를 가져가시죠."
 grand_archive.4105.desc.3.no_relic.xeno_geology: "§Y외계 지질학§! 보존에 정말로 열심이군요.\n\n$grand_archive.4105.desc.3.no_relic.common$"
 grand_archive.4105.desc.3.no_relic.aesthetic_wonder: "§Y미적 경이§! 보존에 정말로 열심이군요.\n\n$grand_archive.4105.desc.3.no_relic.common$"
 grand_archive.4105.desc.3.no_relic.historical_item: "§Y역사 유물§! 보존에 정말로 열심이군요.\n\n$grand_archive.4105.desc.3.no_relic.common$"
