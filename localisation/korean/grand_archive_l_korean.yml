l_korean:
 #################
 #Grand Archive #
 #################
 GRAND_ARCHIVE_TITLE: "Grand Archive" #Do not translate
 DLC_GRAND_ARCHIVE_RECOMMENDATION_DESC: "선택하신 요소 중 일부와 콘텐츠가 적합한 §S$GRAND_ARCHIVE_TITLE$§!를 추천합니다."
 grand_archive: "그랜드 아카이브"
 the_grand_archive: "그랜드 아카이브"
 grand_archive_0: "$grand_archive$"
 grand_archive_0_DESC: "살아 있는 §Y우주 동물§!을 비롯해 은하계 전역에서 수집한 주요 ['concept_specimen', 표본]을 보관 및 전시하기 위해 설계된 궤도 구조물입니다."
 grand_archive_0_MEGASTRUCTURE_DETAILS: "§Y$grand_archive$§!는 은하계 전역에서 수집한 귀중한 유물을 보존 및 전시합니다. 내부에는 살아 있는 §Y우주 동물§!을 격납하고 관찰하기 위한 전용 비바리움도 마련되어 있습니다."
 requires_grand_archive: "$dlc_requirement_string$ §IGrand Archive§!"
 GOTO_COLLECTION: "$COLLECTION$으로 이동"
 must_have_2500_pops: "최소 §Y2,500§! £pop£ §H팝§!이 존재하는 천체가 필요합니다."
 STARBASE_CANNOT_UPGRADE_CONSTRUCTION_TYPE: "§R이 함대는 우리가 보유 중인 항성 기지에서는 업그레이드할 수 없습니다.§!"
 VOIDWORMS_LABEL: "$voidworms_plural$"
 VOIDWORMS_LABEL_TOOLTIP: "§H$VOIDWORMS_LABEL$§!\n은하에 존재하는 $voidworms_plural$의 수를 조절합니다.$requires_grand_archive$"
 CUTHOLOIDS_LABEL: "$cutholoids_plural$"
 CUTHOLOIDS_LABEL_TOOLTIP: "§H$CUTHOLOIDS_LABEL$§!\n은하에 존재하는 $cutholoids_plural$의 수를 조절합니다.$requires_grand_archive$"
 ##################
 #Gravity Snares #
 ##################
 feature_unlock_gravity_snares: "중력 올가미"
 feature_unlock_gravity_snares_desc: "§Y우주 동물§!을 해치지 않고 포획해 수송합니다. §Y$grand_archive$§!가 건설되어 있을 경우 포획한 생명체를 비바리움에 수용합니다."
 feature_unlock_containment_vessels: "격납함"
 feature_unlock_containment_vessels_desc: "중력 올가미가 §Y우주 동물§!을 두 배로 포획합니다."
 gravity_snare: "중력 올가미"
 gravity_snare_plural: "중력 올가미"
 NAME_GravitySnare: "$gravity_snare$"
 FLEETORDER_SEND_SNARE_NAME: "$NAME$ 발사"
 FLEETORDER_SEND_SNARE_ON_COOLDOWN: "§R$TRIGGER_FAIL$ 중력 올가미는 §Y[This.GetGravitySnareCooldownForFleet]일§! 동안 쿨다운 중입니다.§!"
 FLEETORDER_GRAVITY_SNARE_NO_COMMUNICATIONS: "§R$TRIGGER_FAIL$ 포획하려는 우주 동물에 관한 정보를 충분히 수집하지 못했습니다.§!"
 FLEETORDER_MUST_BE_SPACE_CRITTER: "§R$TRIGGER_FAIL$ 해당 유형의 우주 동물을 포획할 능력을 갖추고 있지 않습니다.§!"
 GRAVITY_SNARE_CAPTURE_CHANCE_LEADER: "지도자 레벨: $VALUE|G%0$"
 FLEETORDER_CAPTURE_SPACE_CRITTER: "우주 동물 포획 중"
 FLEETORDER_CAPTURE_SPACE_CRITTER_PROGRESS: "우주 동물 포획 중: $PROGRESS|Y%0$"
 FLEETORDER_WAIT_FOR_GRAVITY_SNARE_TO_RELOAD: "§Y중력 올가미§! 재장전: $DAYS|Y$일"
 SNARE_SPEED: "포획 속도: $SPEED$"
 CAPTURE_CHANCE: "포획 성공 확률: $VALUE|Y%0$"
 CAPTURE_AMOUNT: "§Y$gravity_snare$§! 한 발로 최대 $VALUE|0G$마리의 §Y우주 동물§!을 포획할 수 있습니다."
 CAPTURE_AMOUNT_FULL_FLEET: "§Y$gravity_snare$§! 한 발로 §Y우주 동물§! 무리 전체를 포획할 수 있습니다."
 GRAVITY_SNARE_1: "$gravity_snare$"
 GRAVITY_SNARE_STANDARD: "$gravity_snare$"
 GRAVITY_SNARE_STANDARD_TOOLTIP: "중력 올가미는 양자 중력의 국지적인 폭발 상태를 유지해 초공간 드라이브 능력을 갖추지 못한 물체를 탈출하지 못하도록 붙듭니다. 올가미의 효력은 오랫동안 유지되는 덕분에 포획한 §Y우주 동물§!을 우리 성계로 송환해 심화 연구를 진행할 수 있습니다."
 SHIP_STAT_CONTRIBUTION_ADDATIVE_fauna_capture_chance: "$NAME$: $VALUE|Y0%$"
 SHIP_STAT_DESC_fauna_capture_chance: ""
 GRAVITY_SNARE_CLOAKING_EMPTY: "$SCIENCE_CLOAKING_EMPTY$"
 GRAVITY_SNARE_CLOAKING_1: "$SCIENCE_CLOAKING_1$"
 GRAVITY_SNARE_CLOAKING_2: "$SCIENCE_CLOAKING_2$"
 GRAVITY_SNARE_CLOAKING_3: "$SCIENCE_CLOAKING_3$"
 GRAVITY_SNARE_CLOAKING_DARK_MATTER: "$SCIENCE_CLOAKING_DARK_MATTER$"
 GRAVITY_SNARE_CLOAKING_PSI: "$SCIENCE_CLOAKING_PSI$"
 GRAVITY_SNARE_NO_EMERGENCY_FTL: "중력 올가미는 긴급 초광속 도약을 수행할 수 없습니다."
 FLEET_CANNOT_TAKE_ORDERS: "§R이 함대는 어떤 명령도 받을 수 없습니다.§!"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_TITLE: "우주 동물 포획 성공"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_DESC: "$SYSTEM|Y$ 성계에서 우주 동물을 포획하려는 시도가 성공했습니다! $gravity_snare$가 표본을 비바리움에 수용했습니다.\n\n새 우주 동물 획득:\n$CAPTURED_LIST$$RESOURCES_LIST$"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_NO_VIVARIUM_DESC: "$SYSTEM|Y$ 성계에서 우주 동물을 포획하려는 시도가 성공했습니다! §H비바리움§!에 여분의 공간이 존재하지 않아, 포획한 동물은 안락사 후 자원 확보를 위해 해부되었습니다.\n$CULLED_LIST$$RESOURCES_LIST$"
 MESSAGE_SPACE_CRITTER_CAPTURE_FAILURE_TITLE: "포획 시도 실패"
 MESSAGE_SPACE_CRITTER_CAPTURE_FAILURE_DESC: "$SYSTEM|Y$ 성계에서 우주 동물을 포획하려는 시도가 실패로 돌아갔습니다. $SHIP_NAME|Y$에서 발사한 $gravity_snare$는 분실되었습니다."
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_TITLE: "새로운 우주 동물"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC: "새로운 우주 동물을 비바리움에 수용했습니다.\n$NEWBORN_LIST$$CULLED_LIST$$RESOURCES_LIST$"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC_CULLED: "\n\n다음 우주 동물이 자원 확보를 위해 살처분되었습니다:\n$CULLED_LIST$"
 CULLED_CREATURES_RESOURCE_OUTPUT_DESC: "\n\n획득한 자원:\n $RESOURCES_LIST$"
 mod_gravity_snare_cooldown_mult: "중력 올가미 쿨다운"
 MOD_GRAVITY_SNARE_COST_MULT: "중력 올가미 비용"
 MOD_SPACE_FAUNA_CULLING_REWARD_MULT: "살처분으로 인한 자원"
 grand_archive.7210.name: "중력 올가미"
 grand_archive.7210.desc.common: "최근 §Y$tech_gravity_wells$§! 기술을 발견한 덕분에 [root.GetAdjective] 과학선이 $gravity_snare_plural$를 사용할 수 있게 되었습니다."
 grand_archive.7210.desc.vivarium: "이 비살상 투사체는 우주 동물을 안전하게 포획해 §Y비바리움§!으로 수송합니다. 비바리움에 수용된 우주 동물은 동종의 표본을 계속해서 재생산합니다.\n\n우주 동물을 살처분해 해부하면 복제용 §Y$genetic_material$§!과 기타 자원을 획득할 수 있습니다."
 grand_archive.7210.desc.no_vivarium: "이 비살상 투사체는 우주 동물을 안전하게 포획해 수송합니다. 포획한 생명체는 연구 재료로 사용되며, 해부하여 §Y$genetic_material$§!과 자원을 채취할 수도 있습니다.\n\n우주 동물을 살려 둔 채 번식시키려면 §Y비바리움§!이 필요합니다. 이를 위해서는 §Y$grand_archive$§!를 건설하거나 항성 기지에 §Y[GetHatcheryPlural]§!을 지어야 합니다."
 grand_archive.7220.name: "프레소린 야수"
 grand_archive.7220.desc: "우리가 보유한 §Y$gravity_snare_plural$§!로는 §Y$NAME_Prethoryn_Scourge$§!를 효과적으로 추적해 격리하는 것이 불가능합니다. 움직임의 패턴으로 미루어 보아 이 생명체들은 모종의 상위 의식에 통제받고 있으며, 엄밀히 말해 독립된 개체가 아닌 것으로 판단됩니다.\n\n이 생명체를 비바리움에 격납한다면, 다른 표본들은 물론이고 [this.GetName] 전체를 위험에 빠뜨릴 수 있습니다.\n\n이 생명체들의 포획 작업을 무기한 중지하겠습니다."
 grand_archive.7220.a: "신중한 조치로군요."
 ##############
 #Automation #
 ##############
 AUTOMATION_SEND_GRAVITY_SNARES_ENABLED: "$AUTOMATION_SEND_GRAVITY_SNARES$ £trigger_yes£"
 AUTOMATION_SEND_GRAVITY_SNARES: "우주 동물 포획"
 ################
 #Technologies #
 ################
 tech_galactic_archivism: "은하계 기록 보존술"
 tech_galactic_archivism_desc: "우리 은하의 역사는 선조들로부터 가르침을 얻을 수 있도록 적절히 보존되어야 마땅합니다. 거대한 아카이브를 건설한다면 이 목적을 달성할 수 있을 것입니다."
 tech_gravity_wells: "중력 올가미"
 tech_gravity_wells_desc: "국소적으로 응축된 양자 덩어리는 순간적으로 극심한 중력을 발생시킬 수 있습니다. 이 중력을 올바르게 조작한다면, 어떤 크기의 생명체든 해를 입히지 않고 포획해 격납할 수 있습니다."
 tech_containment_vessel: "큐레이터 격납 프로토콜"
 tech_containment_vessel_desc: "중력 올가미가 §Y우주 동물§!을 두 배로 포획합니다."
 TECH_UNLOCK_CONTAINMENT_VESSEL_TITLE: "$TECH_UNLOCK_COMPONENT_LINE$ $tech_containment_vessel$"
 TECH_UNLOCK_CONTAINMENT_VESSEL_DESC: "$tech_containment_vessel_desc$"
 tech_asteroidal_carapace: "소행성 외피"
 tech_asteroidal_carapace_desc: "쿠톨로이드의 껍데기는 광물로만 이루어진 것이 아니며, 튼튼한 생체 섬유로 보강되어 있습니다. 첨단 금속 공학 기술을 사용하면, 이 구조를 재현할 수 있습니다."
 ASTEROIDAL_CARAPACE_ARMOR: "$tech_asteroidal_carapace$"
 ASTEROIDAL_CARAPACE_ARMOR_DESC: "$tech_asteroidal_carapace_desc$"
 tech_gravity_snare_capacity_desc: "중력 올가미로 포획하는 §Y우주 동물§!의 수가 §G1§! 증가합니다."
 tech_gravity_snare_capacity_1: "미세 특이점 강화"
 tech_gravity_snare_capacity_1_desc: "$tech_gravity_snare_capacity_desc$"
 tech_gravity_snare_capacity_2: "중력 조작 최적화"
 tech_gravity_snare_capacity_2_desc: "$tech_gravity_snare_capacity_desc$"
 tech_gravity_snare_capacity_3: "격납 시스템 개선"
 tech_gravity_snare_capacity_3_desc: "$tech_gravity_snare_capacity_desc$"
 gateway_snare_capacity: "중력 올가미 수용력"
 gateway_gravity_snare_capacity: "§H중력 올가미 수용력 루트§!\n§E이 기술을 이용하면 중력 올가미 수용력 분야가 추가로 발전합니다.§!"
 tech_alien_cloning: "인공 번식"
 tech_alien_cloning_beastmasters: "$tech_alien_cloning$"
 tech_alien_cloning_desc: "세심한 환경 통제 속에서 살처분한 우주 동물로부터 채취한 $genetic_material$을 배양하면, 해당 동물종의 새로운 개체를 생산하여 우리 뜻대로 사용할 수 있습니다."
 feature_alien_cloning_unlocked: "§Y$policy_space_fauna_growth$§! 정책"
 feature_alien_cloning_unlocked_desc: "$policy_space_fauna_growth_desc$"
 tech_alien_cloning_tt: "§H기능 잠금 해제:§! 초계함급 우주 동물 복제"
 tech_improved_incubators: "인큐베이터 개선"
 tech_improved_incubators_beastmasters: "$tech_improved_incubators$"
 tech_improved_incubators_desc: "부화장의 인공 성장 과정을 개선함으로써 초기 발달 단계를 가속해, 더욱 성숙한 클론 개체를 생산합니다."
 tech_improved_incubators_tt: "§H기능 잠금 해제:§! 구축함급 우주 동물 복제"
 tech_improved_incubators_tt_desc: "이제 부화장이 구축함의 크기에 필적하는 §Y우주 동물§!을 복제할 수 있습니다."
 tech_metabolic_gases: "신진대사 가스"
 tech_metabolic_gases_beastmasters: "$tech_metabolic_gases$"
 tech_metabolic_gases_desc: "부화장 내부의 신진대사 가스를 개선하면, 각 표본을 더 양호한 발육 상태로 출하할 수 있습니다."
 tech_metabolic_gases_tt: "§H기능 잠금 해제:§! 전함급 우주 동물 복제"
 tech_metabolic_gases_tt_desc: "이제 부화장이 발육 단계나 크기에 상관없이 어떤 우주 동물이든 복제할 수 있습니다."
 BOARDING_CABLES: "나포 케이블"
 BOARDING_CABLES_MODULES: "$BOARDING_CABLES$"
 BOARDING_CABLES_TOOLTIP: "낮은 확률로 적 함선을 탈취하거나 적 사령관을 포로로 사로잡아 몸값과 교환할 수 있습니다."
 BOARDING_CABLES_DESC: "$BOARDING_CABLES_TOOLTIP$"
 tech_boarding_cables: "$BOARDING_CABLES$"
 tech_boarding_cables_desc: "소구경 함포를 개조한 것으로, 탄력 있는 탄소 섬유 케이블에 부착된 날카로운 갈고리를 발사해 적 함선을 고정하고 병력을 탑승시킵니다."
 tech_controlled_mutations: "변이 제어"
 tech_controlled_mutations_desc: "유전체를 수정해 인공적인 기술을 우주 동물의 생체 물질에 결합하면, 우주 동물의 활용도를 높일 수 있습니다."
 tech_controlled_mutations_2: "변이 제어 발전"
 tech_controlled_mutations_2_desc: "수준을 한층 끌어올려 우주 동물의 유전자를 더 정교하게 조작한다면, 특화된 부품을 훨씬 더 다양하게 결합할 수 있을 것입니다."
 ####################
 #Technology swaps #
 ####################
 tech_refit_standards_beastmasters: "부화장 최적화"
 tech_refit_standards_beastmasters_desc: "우주 동물 복제 과정을 최적화하면, 복제 효율성을 크게 높일 수 있습니다."
 tech_small_space_fauna_hull_1: "소형 우주 동물 조직 개선"
 tech_small_space_fauna_hull_1_desc: "복제 기술의 발달로, 더욱 튼튼하고 내구성이 뛰어난 소형 우주 동물을 만들 수 있게 되었습니다."
 tech_small_space_fauna_hull_2: "소형 우주 동물 조직 발전"
 tech_small_space_fauna_hull_2_desc: "소형 우주 동물의 생체 조직 강도를 현재 실현 가능한 최대 수준까지 끌어올렸습니다."
 tech_medium_space_fauna_hull_1: "중형 우주 동물 조직 개선"
 tech_medium_space_fauna_hull_1_desc: "복제 기술의 발달로, 더욱 튼튼하고 내구성이 뛰어난 중형 우주 동물을 만들 수 있게 되었습니다."
 tech_medium_space_fauna_hull_2: "중형 우주 동물 조직 발전"
 tech_medium_space_fauna_hull_2_desc: "중형 우주 동물의 생체 조직 강도를 현재 실현 가능한 최대 수준까지 끌어올렸습니다."
 tech_large_space_fauna_hull_1: "대형 우주 동물 조직 개선"
 tech_large_space_fauna_hull_1_desc: "복제 기술의 발달로, 더욱 튼튼하고 내구성이 뛰어난 대형 우주 동물을 만들 수 있게 되었습니다."
 tech_large_space_fauna_hull_2: "대형 우주 동물 조직 발전"
 tech_large_space_fauna_hull_2_desc: "대형 우주 동물 생체 조직 강도를 현재 실현 가능한 최대 수준까지 끌어올렸습니다."
