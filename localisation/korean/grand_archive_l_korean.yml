 grand_archive.4105.1.cultural_enrichment: "그 찬란함을 나눌 수 있도록 도와주시죠."
 grand_archive.4105.1.auctioneering_curation: "이 표본이 제 주인을 찾을 수 있도록 도와주시죠."
