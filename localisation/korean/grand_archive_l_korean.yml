 tr_domestication_bio_repurposing: "생체 재사용"
 tr_domestication_bio_repurposing_delayed: "이 세상에 낭비해도 되는 건 존재하지 않습니다."
 tr_domestication_bio_repurposing_blocker_tt: "£blocker£ §Y유기체 차단물§!을 제거할 때 §G$@bio_repurposing_blocker_clear_food|0$§! $r_food$ 획득"
 tr_domestication_bio_repurposing_tt: "전투에서 쓰러진 §Y우주 동물§!의 잔해를 연구해 생산 비용의 일부(§G10%§!)를 돌려받을 수 있습니다.\n$tr_domestication_bio_repurposing_blocker_tt$"
