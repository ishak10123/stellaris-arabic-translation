 CREATURE_DESIGNER_MUTATION_IS_UNIQUE: "이 변이는 설계마다 한 번씩만 적용할 수 있는 §Y특이§! 변이입니다."
 CREATURE_DESIGNER_ADD_ITEM_NOT_ALLOWED_UNIQUE_MUTATION: "§R하나의 생물에는 이 유형의 변이를 오직 하나만 적용할 수 있습니다.§!"
 FEDERATION_VIEW_CREATURE_DESIGNER: "연방 우주 동물"
 FEDERATION_VIEW_CREATURE_DESIGNER_BUTTON_DESC: "§G연방 함대의 §H우주 동물 설계§!를 엽니다§!!"
 FEDERATION_VIEW_CREATURE_DESIGNER_BUTTON_PRESIDENT_NOT_OUR_LEADER: "§R우리는 연방 의장국이 아닙니다§!"
 FEDERATION_VIEW_CREATURE_DESIGNER_BUTTON_CANNOT_USE_MUTATIONS: "§R연방 의장만 우주 동물의 변이를 설계할 수 있습니다. 하나 이상의 연방 회원국이 §Y인공 번식§! 기술을 가지고 있어야 합니다.§!"
 FEDERATION_CREATURE_FLEET_DESC: "§H연방 함대§!는 연방 의장국의 통제를 받는 특수 함대입니다. 연방 함대는 §H연방 $CREATURE_DESIGNER$§!를 통해 만들 수 있으며, 연방에 소속된 모든 회원국의 기술을 활용할 수 있습니다. 연방 함대는 유지비가 없지만, §H연방 함대 수용력§! 수치 이상으로 생산할 수 없습니다. 연방 회원국들은 각자의 §H함대 수용력§! 중 최소 §Y$PERC|0%$§!를 연방 함대 수용력에 지원합니다. 우주 동물 함대가 §H연방 함대 수용력§!을 초과해 성장할 경우, 초과분은 연방 의장국의 소유가 됩니다."
