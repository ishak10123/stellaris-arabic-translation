 tr_domestication_containment_protocols: "격납 프로토콜"
 tr_domestication_containment_protocols_delayed: "커다란 생명체를 격리하고 운반하는 작업에는 항상 생명체가 다치거나 자해할 위험성이 존재합니다. 진정 효과가 있는 가스와 프로토콜을 적절히 활용한다면 이 문제를 최소화할 수 있을 것입니다."
