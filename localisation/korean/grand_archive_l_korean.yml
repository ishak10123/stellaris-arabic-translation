 ###########################
 #Space Fauna Description #
 ###########################
 space_amoeba_desc: "우주 아메바는 보이는 것을 닥치는 대로 공격하는 고독한 포식자입니다. 또한 '편모'로 알려진 부분적으로 형성된 독립체의 지원을 받으며, 먹이를 추적하는 데 능숙합니다."
 tiyanki_desc: "티얀키는 '우주 고래'라고도 하며, 대기 가스를 포식하는 온순한 생물입니다. 또한 협동에 매우 적극적이며, 야생의 티얀키 무리는 엄격한 위계질서에 따라 조직되어 있습니다."
 voidworm_desc: "공허충은 적절한 생체 물질이 있고 생명체가 거주하는 행성에 포자를 퇴적시켜 번식하는 기생 유기체입니다. 성체는 '트로이카'라는 짝짓기 삼인조를 결성하며, 블랙홀 근처에 둥지를 지어 새끼를 지키고 양육합니다."
 cutholoid_desc: "쿠톨로이드는 부드러운 몸을 지키기 위해 소행성에 서식하는 거대한 유기체입니다. 이들은 먹이를 통째로 삼키고 방사성 소화액을 사용해 천천히 소화시킵니다."
 crystalline_entity_desc: "크리스탈 결정체는 우주를 자유롭게 누빌 수 있는 독특한 형태의 규소 기반 생물입니다. 각 결정체에서 나타나는 색의 변화는 연령이 아니라 내부 전하의 변동에 따른 것입니다."
 wild_tiyanki_ox_modifier: "야생 티얀키 아종"
 fauna_disengagement_modifier: "우주 동물 철수"
