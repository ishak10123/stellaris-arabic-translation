 grand_archive.4105.desc.2.common: "인상적인 성과로군요. [GetStage2Description]"
 CURATORS_STAGE_2_DESC: "여러분의 행성 하나에 특정 분야에 특화된 박물관을 건립할 수 있도록 도와드리고자 합니다."
 DEAD_CURATORS_STAGE_2_DESC: "비록 저희 터전은 파괴되었지만, 박물관 건설에 사용했던 도면은 아직 남아 있습니다. 이 도면을 여러분에게 공유해 드리고자 합니다."
