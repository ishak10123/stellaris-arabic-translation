 grand_archive.4510.name: "[fromfrom.GetName]의 $grand_archive$ 파괴"
 grand_archive.4510.desc.common: "[fromfrom.GetName]에 있는 [from.GetName] 소유의 $grand_archive$를 파괴했습니다."
 grand_archive.4510.stolen: "그 과정에서 안에 있던 귀중한 표본 몇 개를 회수할 수 있었습니다."
 grand_archive.4510.ancrel: "그 잔해에서 약간의 $r_minor_artifacts$을 회수할 수 있었습니다."
 grand_archive.4510.nothing: "안타깝게도 가치 있는 물건은 없었습니다."
 grand_archive.4510.freed: "또한, 비바리움에 갇혀 있던 우주 동물 몇 마리를 풀어 주었습니다. 풀려난 지 얼마 되지 않아 혼란스러운 상태이기 때문에 공격성을 보일 수 있습니다."
