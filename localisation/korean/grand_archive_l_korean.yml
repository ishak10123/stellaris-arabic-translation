 tr_domestication_astrozoology: "우주 동물학"
 tr_domestication_astrozoology_delayed: "우주 공간에 거주하는 생명체들은 저마다 독특한 방식으로 번식하며, 각기 다른 물질을 먹이로 삼습니다. 고립된 환경에서 이들이 잠재력을 최대한 발휘할 수 있게 사육하려면 세심한 주의가 필요합니다."
 tr_domestication_astrozoology_tt: "우주 동물 포획 또는 사육 시: $NEW_LINE$$t$- 획득한 살처분 자원: §G200%§!"
