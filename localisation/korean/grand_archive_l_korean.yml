 grand_archive.2053.name: "공허충 박멸"
 grand_archive.2053.desc: "공허충의 마지막 고향 성계가 파괴되었고 녀석들은 이제 완전히 박멸되었습니다.\n\n이제는 공허충의 기생충 폭격에 고심하지 않아도 됩니다."
 grand_archive.2054.name: "공허충 구덩이 파괴"
 grand_archive.2054.desc: "공허충의 모성계를 박멸했습니다.\n\n이제 공허충은 더 이상 이 성계에서 새끼를 키울 수 없습니다."
