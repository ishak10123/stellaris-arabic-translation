 #Boarding events #
 ###################
 LEADER_EXECUTED: "$LEADER|Y$ $CLASS|H$(은)는 곧바로 처형되었습니다."
 grand_archive.9005.name: "[fromfrom.GetName] 생포"
 grand_archive.9005.desc: "§Y[fromfrom.GetName]§! §H[fromfrom.GetClass]§!(이)가 [fromfromfrom.GetName]에서 싸우던 중 [from.GetName]에 포로로 붙잡혔습니다. 상대는 지도자의 신병과 맞바꿔 몸값을 요구하고 있습니다."
 grand_archive.9005.desc.second: "이전에 보고되었듯, 아군 사령관 [fromfrom.GetName](이)가 [from.GetName]에게 붙잡히고 말았습니다. 놈들은 사령관을 살려 보내는 대가로 몸값을 요구하고 있습니다."
 grand_archive.9005.a: "몸값을 지불하세요."
 grand_archive.9005.a.tt: "[fromfrom.GetName](이)가 석방되어 우리 군에 다시 합류합니다."
 grand_archive.9005.b: "조금 고민해 보죠."
 grand_archive.9005.c: "그럴 돈 없습니다."
 grand_archive.9010.name: "널빤지 위를 걸어라"
 grand_archive.9010.desc: "[from.GetName](은)는 [fromfrom.GetName]의 몸값을 지불하는 게 그다지 내키지 않는 모양입니다. 여전히 우리의 수중에 있는 이 녀석을 어떻게 처리해야 할까요?"
 grand_archive.9010.a: "공개 처형하세요."
 grand_archive.9010.b: "[this.GetHomeWorldName]에 풀어 주세요."
 grand_archive.9010.c: "계속 감금하세요."
 MESSAGE_LEADER_CAPTURED_TITLE: "적 사령관 생포"
 MESSAGE_LEADER_CAPTURED_DESC: "전투 중에 적 사령관을 생포했습니다. $COUNTRY$에 연락을 취해 사령관을 안전하게 돌려보내는 대가로 몸값을 요구했습니다."
 MESSAGE_LEADER_RANSOM_PAID_TITLE: "몸값 지불"
 MESSAGE_LEADER_RANSOM_PAID_DESC: "[this.GetName](이)가 사령관 [fromfrom.GetName]의 무사 귀환을 위해 몸값을 지불했습니다."
 alert_mia_ship_stolen_title: "적 함선 탈취"
 alert_mia_ship_stolen_instant: "적 함선의 통제권을 빼앗아 우리 수도로 보내는 중입니다. 곧 있으면 이 함선을 우리가 이용할 수 있습니다."
 DEBRIS_BIO_REPURPOSING_DESC: "$SYSTEM|Y$에서 일어난 교전으로 인해 사망한 우주 동물의 잔해가 부패하기 시작했습니다. 유해에서 $FLEET_SIZE$ 양의 유기물을 회수할 수 있습니다."
