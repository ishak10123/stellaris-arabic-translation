 #Event chain
 treasure_hunters_origin_story_chain_title: "수수께끼의 지도를 따라서"
 treasure_hunters_origin_story_chain_desc: "신비로운 우주 지도를 발견한 우리는 역사상 가장 위대한 모험길에 올랐습니다. §H$celestial_chart$§!의 끝에는 과연 무엇이 있을지, 여정 속에서 어떤 위험을 마주하게 될지는 아직 누구도 알 수 없습니다."
 treasure_hunters_hidden_system_1_poi: "[prev.GetName] 수색"
 treasure_hunters_hidden_system_1_poi_desc: "고대 궤도 캡슐에서 발견한 지도를 통해 [prev.GetName](이)라는 숨겨진 성계를 파악했습니다. 더 알아내려면 직접 가 보는 수밖에 없습니다."
 treasure_hunters_explore_system_1_poi: "[treasure_hunters_hidden_system_1.GetName] 탐사"
 treasure_hunters_explore_system_1_poi_desc: "§Y$NAME_BlackNeedle$§! 함대도 무찔렀으니, 수색을 재개할 수 있습니다. §H$celestial_chart$§!가 우리를 이 성계로 이끈 만큼, 여기 어딘가에 지도의 다음 조각이 숨겨져 있을지도 모릅니다."
 black_needle_fleet_poi: "블랙 니들 함대"
 black_needle_fleet_poi_desc: "[from.GetName] 성계에서 고도로 조직화된 해적 함대의 습격을 받았습니다. 놈들은 우리의 §H$celestial_chart$§!를 탈취하기 위해 매복한 채 우리가 도착하기를 기다리고 있었던 것 같습니다."
 smeegibb_shelter_system_1_poi: "[prev.GetName] 수색"
 smeegibb_shelter_system_1_poi_desc: "§H$celestial_chart$§!로 [prev.GetName](이)라는 또 다른 성계를 새로 발견했습니다. 그곳에 무엇이 기다리고 있을지 알아내려면 직접 가 봐야 합니다."
 smeegibb_shelter_system_2_poi: "[smeegibb_system.GetName](으)로 항행"
 smeegibb_shelter_system_2_poi_desc: "$NAME_Smeegibb$와의 통신을 복구하지 못했습니다. §H$celestial_chart$§!의 다음 조각에 관한 단서를 얻으려면 [smeegibb_system.GetName](으)로 돌아가는 수밖에 없습니다. 통신이 갑자기 끊어진 이유는 아직까지 밝혀지지 않았습니다."
 black_needle_fleet_2_poi: "$NAME_CaptainInax$ 격파"
 black_needle_fleet_2_poi_desc: "§Y$NAME_BlackNeedle$§!이 우리를 또 쫓아와 연락책인 $NAME_Smeegibb$를 살해하고 [from.GetName] 성계를 봉쇄했습니다. §H$celestial_chart$§!의 네 번째 조각은 [smeegibb_shelter.GetName] 어딘가에 숨겨져 있는 것 같습니다.\n\n캡슐을 찾으려면 먼저 적 함대부터 무찔러야 합니다."
