 ### Primal Calling
 origin_primal_calling: "원초적 소명"
 origin_primal_calling_desc: "날카로운 풀잎의 바스락거림. 한밤중의 소리 없는 아우성. 사냥꾼의 의지는 별빛처럼 선명하고 냉정하니...\n\n이 문명은 야생과 원초적으로 연결되어 있습니다. 모성에는 다양하고 흉포한 야생 동물이 서식하며, 이들 종족은 자신들을 그런 맹수들의 관리자로 생각하고 있습니다. 이제 이들의 시선은 하늘 너머를 향하고 있습니다. 동물을 부리고 기르는 일에 통달한 이 문명은 자신들만의 윤리관에 따라 동물과의 관계를 발전시켜 왔습니다. 그 유대가 은하적 규모에서 어떻게 진화할지는 아직 아무도 알지 못합니다."
 origin_tooltip_primal_calling_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$ ['concept_untamed_wilds_mod']\n- $HOME_SYSTEM$ 이웃 성계에 §Y우주 동물§! 존재\n- $AVAILABLE_BUILDINGS$ ['concept_wildlife_ranch', £building£ $wildlife_ranch$]\n- 첫 조우 시 §Y우주 동물§!과 관련된 특수 ['concept_primal_calling_stance'] 선택 가능\n- $ADDITIONAL_TECHNOLOGIES_STRING$ ['technology:tech_genome_mapping', £society_research£$tech_genome_mapping$]\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_alien_life_studies', £society£$tech_alien_life_studies$]\n- 우주 동물과 첫 조우 후 ['technology:tech_gravity_wells', £physics_research£$tech_gravity_wells$]에 대한 통찰 획득\n- 우주 동물 포획 후 ['technology:tech_alien_cloning', £society_research£$tech_alien_cloning$]에 대한 통찰 획득\n- 우주 동물 복제 후 ['technology:tech_controlled_mutations', £society_research£$tech_controlled_mutations$]에 대한 통찰 획득"
 START_SCREEN_PRIMAL_CALLING: "급격한 기술 발전에도 불구하고 우리는 여전히 우리 행성의 야생 동물과 긴밀히 연결되어 있습니다. 발전 과정 속에서 야생 동물들은 한결같이 우리의 동반자로 존재해 왔으며, 우리의 보호를 받는 만큼 우리에게 많은 가르침을 주었습니다. 우리는 동물들이 줄 수 있는 것 이상을 요구하지 않으며, 언제나 그들의 희생을 기억합니다.\n\n우주의 길들지 않은 광야 속에서 우리는 지금껏 보지 못한 야생을 발견하게 될 것입니다. 우리는 마주치는 모든 동물을 지금까지와 마찬가지로 존중으로 대할 것이며, 함께 자신의 역할을 배우고 이들과 더불어 강해질 것입니다.\n\n별이 우리를 부르고, 원초의 욕망이 내면에서 타오릅니다. 저 멀리 미지의 세상 속에 존재하는 것이 무엇이든 간에, 우리는 신념을 품고 의연히 마주할 뿐입니다."
 leader_trait_trophy_hunter: "전리품 사냥꾼"
 leader_trait_trophy_hunter_desc: "역경으로 단련되고 평생의 경험으로 무장한 이 지도자는 우주 동물과 관련해 남다른 수준의 이해도를 자랑합니다. 성공적인 사냥의 비결은 사냥감의 입장에서 생각하는 것이지만, 완벽한 전리품을 얻으려면 완벽한 사격 실력 또한 필요한 법입니다."
 leader_trait_gifted_trapper: "천부적인 덫 사냥꾼"
 leader_trait_gifted_trapper_desc: "생체 표본의 안전한 포획 및 운송에 세심한 주의를 기울이는 노련한 연구가입니다. 동물 복지를 향한 이 지도자의 헌신은 모든 학문 분야에서 연구 기준의 개선을 불러왔습니다."
 leader_trait_void_hunter: "공허 사냥꾼"
 leader_trait_void_hunter_desc: "커다란 사냥감을 쓰러뜨리는 데 특화된 박학다식한 사냥꾼입니다. 놀라울 정도의 인내심으로 접근해 정확한 공격을 가합니다."
 leader_trait_void_hunter_2: "$leader_trait_void_hunter$ II"
 leader_trait_void_hunter_2_desc: "$leader_trait_void_hunter_desc$"
 leader_trait_void_tracker: "공허 추적자"
 leader_trait_void_tracker_desc: "이 지도자는 야생 우주 동물을 효율적이고 안전하게 포획하는 데 독보적인 솜씨를 자랑합니다."
 leader_trait_void_tracker_2: "$leader_trait_void_tracker$ II"
 leader_trait_void_tracker_2_desc: "$leader_trait_void_tracker_desc$"
 #First Contacts
 first_contact_critters.15.desc.primal_calling: "§H티얀키§!의 가장 흥미로운 점은, 무리에 모계 서열이 존재하며 언제나 한 마리의 암컷이 무리를 이끈다는 것입니다. 암컷은 식량 자원에 대한 우선권을 갖춰, 새끼를 위해 가스를 생산하고 무리의 이동을 지휘합니다. 무리에 식량이 부족해졌을 경우 수컷은 영양분의 섭취를 포기하며, 무리가 휴식을 취하는 동안 더 많은 먹이를 찾아 주변 우주를 수색합니다."
 first_contact_critters.25.desc.primal_calling: "유체를 제외한 모든 개체는 언제나 '편모충'이라 불리는 준독립적 유기체를 데리고 다닙니다. 이 유기체는 RNA가 함유된 분비물로 철저히 통제되며, 매우 복잡한 공격 활동을 수행합니다. 이 지식을 통해 우리는 §H'우주 아메바'§!가 지능이 결여된 것처럼 보여도 실은 매우 능숙한 자연 포식자라는 사실을 알 수 있습니다."
 first_contact_critters.35.desc.primal_calling: "이 생명체는 굴절된 빛의 색채 변화를 통해 서로 소통하는 것으로 보입니다. 빛을 매개로 한 소통은 복잡한 표현까지도 능히 전달할 수 있지만, 이 준지성 생명체는 이를 오직 단순한 방식으로만 활용합니다. 예컨대 색상의 변화는 사회적 지위와 공격성, 생식 상태 등을 나타나는 데 활용됩니다."
 grand_archive.2005.desc.primal_calling: "§H'공허충'§!은 자연적인 번식 능력을 갖추지 못해 행성에서 자라난 숙주에 의존해 번식합니다. 거주 행성의 숙주로부터 충분한 유기물을 채취한 공허충은 '트로이카'라는 짝짓기 삼인조를 결성하는데, 이때 번식에 필요한 중요 호르몬을 생산합니다. 자웅 동체인 이 생명체는 비슷한 신체 크기와 상호 보완적인 신체적 특징을 고려해 짝을 선택합니다."
 grand_archive.2900.desc.primal_calling: "§H'쿠톨로이드'§!는 소행성을 선택할 때 크기 못지않게 광물 구성 또한 중요시하는 것으로 보입니다. 처음 발견한 표본의 경우 [GetCommonMineral]에 대한 생물학적 선호를 드러냈지만, 이러한 선호도는 각 개체가 체류한 환경에 따라 변화하는 것 같습니다. 스캔을 진행한 결과, 해당 금속의 흔적을 숙주인 소행성은 물론이고 쿠톨로이드의 신경계와 소화계 내에서도 발견할 수 있었습니다."
