 #Events
 grand_archive.8000.name: "고대 캡슐"
 grand_archive.8000.desc: "[this.GetHomeWorldName]의 궤도를 돌고 있던 고대 캡슐 분석에 진전이 있었습니다. [this.GetScientistPlural]들의 지칠 줄 모르는 노력 덕분에 마지막 디지털 보안 단계를 뚫을 수 있었고, 마침내 궁금해서 애가 탈 지경이었던 지도를 해독할 수 있게 되었습니다."
 grand_archive.8000.a: "안에 뭐가 들어 있나요?"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT: "고대 캡슐 분석"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT_DESC: "궤도 캡슐에 들어 있던 지도를 1차 분석한 결과, 우리 성계 밖에 있는 천체 몇 곳의 위치가 드러났습니다. 다만 정확한 좌표를 알아내려면 조금 시간이 걸릴 것 같습니다."
 grand_archive.8005.name: "고대 캡슐 분석 완료"
 grand_archive.8005.desc: "이 지도는 아직 완성되지 않았습니다!\n\n궤도 캡슐에 들어 있던 데이터는 조각조각으로 나뉘어 있으며, 곳곳이 빈 퍼즐과도 같은 상태이기에 이대로는 전체 형태를 파악할 수 없습니다. 지금까지 알려지지 않았던 성계의 좌표가 나와 있기는 하지만, 그곳에 무엇이 있는지에 대한 정보는 담겨 있지 않습니다.\n\n지도에는 초공간 항로의 침투점도 표시되어 있어 목적지까지 쉽게 이동할 수 있습니다."
 grand_archive.8005.a.lom: "모두 갑판으로!"
 grand_archive.8015.name: "천상 지도"
 grand_archive.8015.desc.common: "우리 함선이 또 다른 위대한 모험을 떠나기 위해 준비를 갖췄습니다."
 grand_archive.8015.desc.default: "[this.GetHomeWorldName]의 주민들도 얼마 전에 해독한 천체 지도에 열광하고 있습니다. 흔히 '§Y$celestial_chart$§!'라고 불리는 이 지도는 여전히 수수께끼 덩어리입니다. 대체 누가, 어디서, 왜 이 지도를 만든 걸까요? 그보다도 이 지도는 대체 어디로 이어지는 걸까요? 어쩌면 함정일까요?\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.desc.gestalt: "캡슐 안에서 발견한 지도에 드론들의 이목이 쏠렸습니다. 이 지도가 방대한 지도의 한 조각에 불과하다는 사실을 알게 된 현재, 자연스레 다음 의문이 떠오릅니다. 이 조각은 어디로 이어질까요? 그리고 그곳에는 무엇이 기다리고 있을까요? 우리는 반드시 이 '§Y$celestial_chart$§!'를 완성하겠다고 결심했습니다.\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.a.default: "모험을 향해 전진!"
 grand_archive.8015.a.lom: "닻을 올려라!"
 grand_archive.8020.name: "예상치 못한 조우"
 grand_archive.8020.desc: "정체불명의 깃발을 단 중무장 함대와 조우했습니다. 대형을 갖추고 있긴 하지만 각 함선의 설계는 뚜렷하게 차이가 납니다. 대다수의 함선이 운동 에너지형 발사기로 무장하고 있는데, 두꺼운 케이블의 끝에는 탄소강 갈고리와 어뢰가 부착되어 있습니다. 또한, 함대의 중앙에는 몇 척의 무장 수송선이 눈에 띕니다. 추측해 보건대 해적이나 용병단의 함대가 아닌가 싶습니다.\n\n선봉에 선 함선이 교신을 시도해 왔습니다."
 grand_archive.8020.a.lom: "협상을 하자는 거군요..."
 grand_archive.8025.name: "$NAME_BlackNeedle$의 $NAME_CaptainHoo$"
 grand_archive.8025.desc: "§H위엄 있고 오만한 자세를 취한 무법자 선장이 별 감흥이 없다는 듯 우리를 바라보았습니다. 눈을 마주치지 않고 부리를 내려다보며 이야기하는 모습을 보니, 마치 관심을 기울여 주는 것조차 아깝다는 티를 내고 싶은 것 같습니다. 깃털을 휘날리는 과장된 동작을 취하며 선장이 말했습니다.§!\n\n§Y$NAME_BlackNeedle$§! 해적단의 길을 가로막다니, 목숨 아까운 줄 모르는 놈들이군!\n\n최근 몸집을 키운 네 녀석들이 이 성계를 탐험할 거라는 소문을 들었다. 지도 하나를 발견한 것 같던데 그건 우리 것이니 험한 꼴을 보기 싫다면 순순히 넘기도록."
 grand_archive.8025.a: "당신은 누구지?"
 grand_archive.8025.a.reply: "이 몸이 누구냐고? 실버윙의 선장이자 그 유명한 §Y$NAME_BlackNeedle$§! 해적단의 이등항해사인 글리마후 젤멘드리온이다. §Y$NAME_CaptainHoo$§!이라고도 불리지. 수천 년 동안 온갖 불법 거래를 지배해 온 우리 해적단에 비한다면, 나 또한 미미한 존재이지만 말이야.\n\n내 이름을 똑똑히 기억해 두는 편이 좋을 거다. 네가 가진 지도를 빼앗고 우리의 위대한 대장님께 바쳐서 막대한 보물을 얻고 말 테니."
 grand_archive.8025.b: "지도에 관해 뭘 알고 있지?"
 grand_archive.8025.b.reply: "실력 좋고 몸값 비싼 정보 중개상이 네놈들이 얼마 전에 이상한 캡슐을 발견했다고 말해 주더군... 그 캡슐에는 숨겨진 성계로 이어지는 지침이 담겨 있는데, 우리가 찾고 있었거든.\n\n우리도 지도 조각 하나를 얻었지만, 그 캡슐에 담긴 정보 없이는 휴지 조각에 불과하단 말이야. 그건 §Y$NAME_CaptainNess$§!의 유산을 찾을 수 있는 열쇠다. 그 여자가 어째서 그걸 네놈한테 남긴 건지는 모르겠지만, 순순히 내놓는 게 좋을 것이다."
 grand_archive.8025.c: "왜 그렇게 이 지도를 원하는 거냐?"
 grand_archive.8025.c.reply: "하, 진짜 아무것도 모르는군. [this.GetCaptainHooSnarkyInsult] 귀찮지만 특별히 설명해 주마.\n\n그 지도는 특정한 목적지로 인도하는 일종의 항해 지침서다. 우리는 거기서 §Y$NAME_CaptainNess$§!의 보물을 차지하려는 거고."
 grand_archive.8025.d: "$NAME_CaptainNess$은 또 누구지?"
 grand_archive.8025.d.reply: "그것도 모르다니 한심하군. 그 지도를 만든 여자다. 악명을 떨치긴 했지만, 네놈처럼 머리가 텅 빈 녀석이었지.\n\n어차피 네놈은 신경 쓸 필요 없어. 정보를 넘기면 그 뒤로는 우리가 알아서 처리할 테니까."
 grand_archive.8025.e: "지도를 내줄 순 없다."
 grand_archive.8025.e.reply: "역시 그렇게 나오시는군. 이제 너흰 죽은 목숨이다.\n\n가진 걸 다 내놔라!"
 grand_archive.8025.f.lom: "어디 가져가 보시지, 이 비린내 나는 해적아!"
 CAPTAIN_HOO_INSULT_MACHINE: "기계 지능이라길래 똑똑할 줄 알았는데, 이거 실망인걸."
 CAPTAIN_HOO_INSULT_HIVE: "보통 여럿이 머리를 맞대면 더 똑똑해지지 않던가? 그런데 네놈들의 집단 지성은 왜 그런 거지?"
 CAPTAIN_HOO_INSULT_HUM: "상식이라고는 하나도 없는 유인원들이 대체 어떻게 성간 항행술을 개발한 거지?"
 CAPTAIN_HOO_INSULT_MAM: "너희 같은 짐승은 우리 위대한 대장님에 비하면 지능도 품위도 볼품없기 짝이 없어."
 CAPTAIN_HOO_INSULT_REP: "하긴, 도롱뇽 따위가 이렇게 간단한 상식을 모르는 것도 당연하지."
 CAPTAIN_HOO_INSULT_AVI: "너희 덜떨어진 지능은 닭대가리 선조들한테서 물려받았나 보지?"
 CAPTAIN_HOO_INSULT_ART: "그 잘난 외피가 있으면 뭐 하나. 머리를 제대로 쓸 줄도 모르는데."
 CAPTAIN_HOO_INSULT_MOL: "연체동물은 뇌가 없는 것이나 마찬가지라더니, 너희 종족을 보니 그 말이 맞는 것 같아."
 CAPTAIN_HOO_INSULT_FUN: "포자가 부족해서 지능이 생기다 말았나 보지?"
 CAPTAIN_HOO_INSULT_PLANT: "대부분의 행성에서 식물이 지능을 얻지 못한 이유를 알겠어."
 CAPTAIN_HOO_INSULT_LITHOID: "돌로 만들어진 종족이라 머리도 돌인 건가?"
 CAPTAIN_HOO_INSULT_NECROID: "살아 있을 적에는 생각이란 걸 하면서 살았을 텐데, 목숨을 잃을 때 지능도 같이 잃었나 보지?"
 CAPTAIN_HOO_INSULT_AQUATIC: "물 밖에 나온 고기 꼴이라는 게 이런 거로구만."
 CAPTAIN_HOO_INSULT_TOX: "허구한 날 오물에 둘러싸여 있으니까 머리가 어떻게 된 모양이야."
 CAPTAIN_HOO_INSULT_ROBOT: "개성 모듈을 구동하느라 처리 속도가 느려지기라도 한 거냐?"
 CAPTAIN_HOO_INSULT_DEFAULT: "못생긴 것도 서러운데 무식하기까지 한 종족이야."
 grand_archive.8045.name: "$grand_archive.8025.name$"
 grand_archive.8045.desc: "감히 이 몸과 §Y$NAME_BlackNeedle$§!을 조롱하다니! 가만두지 않겠다! 절대로!\n\n오늘 지도를 순순히 넘기지 않은 일은 결코 잊지 않을 것이다. $NAME_BlackNeedle$ 해적단을 총동원해 네놈들 문명의 싹을 잘라 주고 말 테다.\n\n그 지도를 손에 넣기 전까지는 절대 멈추지 않겠다! 두고 보자!"
 grand_archive.8045.a.lom: "다음에는 작작 떠들고 싸움에나 집중하시지!"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT: "여덟 조각난 행성"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT_DESC: "§H$celestial_chart$§!를 따라가다 보니 부서진 행성에 도착했습니다. 이 행성의 가장 큰 지각판에서 인공적인 땅굴을 탐지했습니다. 이 땅굴 속에 다음 지도 조각이 숨어 있을 것 같지만, 조각을 찾으려면 조심스럽게 발굴해야 합니다.\n\n건설선으로 이 지도 조각을 파내기 위한 장비를 만들 수 있습니다."
 grand_archive.8055.name: "발굴 성공"
 grand_archive.8055.desc: "떠다니는 행성 잔해에서 다량의 광물과 함께 캡슐을 추출하는 데 성공했습니다. 캡슐 안에는 §Y$celestial_chart$§!의 새로운 조각과 특이한 문화 유물이 몇 점 들어 있었습니다. 쪽지도 하나 있었는데, 해석하기 편하도록 다양한 언어로 쓰여 있었습니다.\n\n\"이것은 이터라이트의 모성인 $NAME_Soropegma$에 남아 있던 전부입니다. 우리는 어떤 결과를 야기할지 알지 못한 채, 도난당한 콜로서스의 파괴력을 부주의하게 해방했고, 그 결과 초광속 이전 종족이었던 이터라이트는 비극적인 사고로 인해 멸종하고 말았습니다. 부디 그들의 기억을 보존하고 추모해 주십시오.\""
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT: "지도 조각 해독"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT_DESC: "부서진 행성의 잔해에서 캡슐을 발견했으니, 이제는 안에 들어 있던 지도 데이터를 해독해야 합니다. 기존 지도 데이터베이스와의 교차 검증을 통해 지도에 표시된 천체를 이미 알려진 성계와 대조해 보겠습니다."
 grand_archive.8060.name: "지도 해독 완료"
 grand_archive.8060.desc: "여러 암호화 단계를 뚫은 끝에, 새로운 데이터를 §Y$celestial_chart$§!에 어렵지 않게 추가할 수 있었습니다. 조각이 결합되자 또다시 새로운 성계 하나가 드러나면서, 우리 여정의 다음 목적지가 정해졌습니다. 미지의 영역인 만큼 신중하게 접근해야 합니다."
 grand_archive.8075.name: "그랜드 아카이브"
 grand_archive.8075.desc: "손에 넣은 §Y[This.GetLastAcquiredSpecimenName]§!(을)를 본 우리 과학자들이 그 표본은 §Y$grand_archive$§!에서 공개적으로 전시할 가치가 있다고 주장했습니다. 이 건물에 우리가 모은 희귀한 유물들을 전시하면 상당한 문화적, 과학적 이익을 얻을 수 있을 것입니다. 위 목표를 달성하려면, 우선 은하계의 다양하면서도 섬세한 표본을 보존 및 전시할 기술을 연구하는 것부터 시작해야 합니다.\n\n다행히도 이터라이트 유물과 함께 청사진 하나가 발견되었습니다. 분석해 보니 혁신적인 대기 감지 기술이 적용된 첨단 진열장의 설계도였습니다. 이 설계를 더욱 발전시키면, 아카이브의 표본 보존 능력을 전반적으로 끌어올릴 수 있을 것입니다."
 grand_archive.8076.name: "이터라이트 표본"
 grand_archive.8076.desc: "사라진 이터라이트 문명의 마지막 흔적은 따로 전시해도 될 만큼 귀중합니다.\n\n게다가 이터라이트 유물과 함께 청사진 하나가 발견되었습니다. 분석해 보니 혁신적인 대기 감지 기술이 적용된 첨단 진열장의 설계도였습니다. 이 설계를 더욱 발전시키면, 아카이브의 표본 보존 능력을 전반적으로 끌어올릴 수 있을 것입니다."
 grand_archive.8076.a: "좋은 기회군요."
 TREASURE_HUNTERS_EXHIBITION_PROJECT: "전시 강화 청사진"
 TREASURE_HUNTERS_EXHIBITION_PROJECT_DESC: "이터라이트 표본과 함께 표본 보존에 도움이 될 복잡한 첨단 진열장 설계가 담긴 청사진을 발견했습니다.\n\n이 청사진에 담긴 기술을 연구하면, 향후 표본 보존 및 전시에 큰 도움이 될 것 같습니다."
 TREASURE_HUNTERS_EXHIBITION_PROJECT_TOOLTIP: "§Y건설선§!으로 2,500 £pop£ §H팝§! 이상을 보유한 행성 주변에 §Y그랜드 아카이브§!를 건설하십시오.\n§H£society_research£$tech_galactic_archivism$§!이 필요합니다."
 grand_archive.8080.name: "전시 강화"
 grand_archive.8080.desc: "이터라이트 청사진을 상세히 분석한 결과, 원자 단위로 대기 상태를 모니터링할 수 있는 정밀한 첨단 진열장을 만들 수 있었습니다. 이제 큐레이터들은 파손되기 쉬운 이터라이트 표본의 대기 상태를 세밀하게 모니터링할 수 있으며, 덕분에 부식의 징후가 보이면 즉시 조치할 수 있습니다. 처음 발견했을 때의 상태를 영원히 유지할 수 있게 된 것입니다.\n\n이 기술을 더 넓게 적용하면, 모든 수집품의 보관 상태를 더욱 개선할 수 있습니다."
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE: "그랜드 아카이브 건설"
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE_DESC: "우리는 우주를 누비며 독특한 유물과 문화재를 무수히 모았습니다. 이 표본들로 은하계의 온갖 지식을 전시 및 보존하는 최초의 전시회를 개최한다면, 분명 대중에게 깊은 감명을 안겨 줄 수 있을 것입니다.\n\n§H$grand_archive$§!를 건설하면 이 목표를 이룰 수 있습니다."
 grand_archive.8090.name: "그랜드 아카이브 개관"
 grand_archive.8090.desc: "오늘은 [fromfrom.GetName]의 §Y$grand_archive$§!를 개관하는 날로, [this.GetName]에 실로 경사스러운 날입니다. 온 은하계로부터 긁어모은 보물들을 바라보면 모험심이 자극되고, 과거로부터 교훈도 얻을 수 있습니다."
 d_black_needle_base: "숨겨진 블랙 니들 기지"
 d_black_needle_base_desc: "블랙 니들 해적단이 불법 작전을 구상하거나 노획품을 은닉하는 데 사용하는 비밀 기지입니다."
 d_abandoned_black_needle_base: "버려진 블랙 니들 기지"
 d_abandoned_black_needle_base_desc: "한때 블랙 니들 해적단이 수배범과 노획품을 안전하게 숨기는 데 사용했던, 버려진 전초 기지이자 은신처입니다."
 d_abandoned_black_needle_base_naval_cap: "군인 직업으로 인한 함대 수용력: §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 d_abandoned_black_needle_base_naval_cap_short: "£job_soldier£ 직업으로 인한 £mod_country_naval_cap_add£: §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 black_needle_base_system_poi: "천상 지도를 따라서"
 black_needle_base_system_poi_desc: "§H$celestial_chart$§!로 [Prev.GetName](이)라는 숨겨진 성계를 발견했습니다. 그곳에 무엇이 기다리고 있을지 알아내려면 직접 가 봐야 합니다."
 grand_archive.8100.name: "해적 소굴 발견"
 grand_archive.8100.desc: "[From.GetName]에서 §Y블랙 니들§!의 휘장이 걸린 비밀 지하 기지를 발견했습니다. 이 악명 높은 해적단이 다른 활동과는 별도로 운영하는 외부 기지인 것 같습니다. 이곳에 §Y$celestial_chart$§!의 다음 조각과 함께 수많은 보물이 숨겨져 있을 것입니다.\n\n이 기지를 궤도 폭격할 수 있지만, 그럴 경우 블랙 니들 해적단이 원군을 요청할 수도 있습니다. 아니면 지상 병력을 신속히 투입해 적에게 대처할 틈을 주지 않고 기지를 장악하는 방법도 있습니다.\n\n이보다 더 은밀한 방법은, 기지의 컴퓨터 시스템을 해킹해서 $celestial_chart$ 조각을 탈취하는 것입니다."
 grand_archive.8100.a: "고민되는군요."
 COLONIZATION_IMPOSSIBLE_DEFENDED_PLANET: "$TRIGGER_FAIL$§R이 행성은 고도로 방어되어 있어 식민지로 삼을 수 없습니다.§!"
 BLACK_NEEDLE_BASE_BOMBARD: "블랙 니들 기지 폭격"
 BLACK_NEEDLE_BASE_BOMBARD_DESC: "[This.GetName]의 지하 기지는 궤도 폭격을 잘 견딜 수 있게 설계되어 있지만, 강력한 화력으로 충분한 시간 동안 폭격할 수만 있다면 우리 함대만으로도 기지를 파괴할 수 있습니다. 기지가 무력화되면, 폐허를 수색해 §H$celestial_chart$§! 조각과 다른 보물을 회수할 수 있을 것입니다.\n\n하지만 전술 자문단은 이 방법을 사용할 경우 블랙 니들 해적단에게 원군을 요청할 시간을 벌어 주는 꼴이 될 수 있다며 경고했습니다."
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED: "$BLACK_NEEDLE_BASE_BOMBARD$"
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED_DESC: "$BLACK_NEEDLE_BASE_BOMBARD_DESC$"
 grand_archive.8103.name: "블랙 니들의 반격"
 grand_archive.8103.desc: "예상대로 블랙 니들 해적단은 [FromFrom.GetName]에 있는 기지를 보호하기 위해 함대를 보냈습니다.\n\n[FromFrom.System.GetName](을)를 확보하려면 이 함대부터 처리해야 합니다."
 grand_archive.8105.name: "잔해와 잿더미"
 grand_archive.8105.desc: "궤도 폭격을 마치자 해적 기지는 사람도, 건물도 없는 허허벌판으로 변했습니다. 모든 위협이 제거되었으니 이제 폐허에 과학자를 보내 조사를 진행하고 §Y$celestial_chart$§! 조각을 찾아오도록 지시할 수 있습니다."
 grand_archive.8105.a.custom_tooltip: "블랙 니들 기지가 파괴되었습니다. §Y[FromFrom.GetName]§!(을)를 자유롭게 탐사할 수 있습니다."
 grand_archive.8105.a.lom: "보물을 약탈합시다!"
 project_type_research: "$RESEARCH$"
 project_type_bombardment: "폭격"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES: "블랙 니들 기지 공격"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES_DESC: "[FromFrom.GetName]의 지하 기지는 꽤 많은 수의 병력과 경비 드론으로 보호받고 있습니다. 이 행성에 우리의 지상군을 투입하면 §Y블랙 니들§! 해적단에 대응할 틈을 주지 않고 기지를 장악할 수 있을 것입니다.\n\n기지를 확보하고 나면 지도 캡슐은 물론, 해적들이 불법적인 방식으로 모아 온 다른 보물도 함께 회수할 수 있습니다."
 grand_archive.8110.name: "방어 돌파"
 grand_archive.8110.desc: "우리 지상 병력이 §Y블랙 니들§! 기지를 장악했으며, 기지 및 주변 자원은 이제 우리의 통제하에 들어왔습니다. 모든 위협이 제거되었으니 이제 과학자를 보내서 다음 §Y$celestial_chart$§! 조각을 회수할 수 있습니다."
 grand_archive.8110.a.custom_tooltip: "블랙 니들의 지상 병력을 무력화했습니다. 이제 §Y[FromFromFrom.GetName]§!(을)를 자유롭게 탐사할 수 있습니다."
 grand_archive.8110.a.lom: "전리품을 나눌 시간이군요."
 BLACK_NEEDLE_BASE_HACK: "해적단 해킹"
 BLACK_NEEDLE_BASE_HACK_DESC: "해적들은 남의 기술을 훔쳐 용도만 바꿔 써먹다 보니 기지 보안이 매우 취약한 상태입니다. 연구선 한 척을 후 선장의 통제를 받는 §Y블랙 니들§! 수송선으로 위장한다면, 궤도에서 [FromFrom.GetName]의 네트워크를 해킹할 수 있을 것 같습니다. 이렇게 하면 불필요한 유혈 사태를 피하고 지도 캡슐의 소유권을 넘겨받을 수 있습니다."
 grand_archive.8115.name: "작전 성공"
 grand_archive.8115.desc.1: "몇 달 동안 준비한 끝에, [Leader.GetName] 과학 담당관은 통신 네트워크에 잠입해 §Y블랙 니들§! 함선으로 위장하는 데 성공했습니다. 담당관은 후 선장의 명령을 사칭해 해적들을 속이고, 지도 캡슐을 기지에서 다른 행성으로 비상 반출하도록 유도했습니다."
 grand_archive.8115.desc.slippery: "[Leader.GetName] 담당관은 위장이 발각될 경우를 대비해, 바로 탈출할 수 있는 완벽한 위치에 함선을 착륙시켰습니다."
 grand_archive.8115.desc.charismatic: "[Leader.GetName] 담당관은 자신의 카리스마와 매력으로 곤란한 질문을 능수능란하게 빠져나갔습니다."
 grand_archive.8115.desc.psionic_organic: "[Leader.GetName] 담당관은 [Leader.Species.GetHandName](을)를 한 번 휘젓는 것만으로 경비병들의 정신을 조종해 모든 의심을 잠재웠습니다."
 grand_archive.8115.desc.psionic_machine: "[Leader.GetName] 담당관은 사이오닉 강압 능력으로 경비병들의 열등한 정신을 손쉽게 조종해 더 이상의 의심을 피했습니다."
 grand_archive.8115.desc.2: "사상자를 내지 않고 캡슐을 안전하게 확보했습니다. 해적들은 우리에게 속았다는 사실조차도 아직 눈치채지 못한 것 같습니다."
 grand_archive.8115.a: "$EXCELLENT$"
 grand_archive.8120.name: "현장 발각"
 grand_archive.8120.desc: "안타깝게도 함선에 캡슐을 싣다가 경비병 하나에게 들키고 말았습니다. 곧이어 짧은 총격전이 벌어졌고, 우리는 캡슐을 단단하게 고정해 탈출하는 데 급급했습니다. 캡슐을 빼내 오는 데는 성공했지만, 과학자 [Leader.GetName](은)는 총격전에 휘말려 사망하고 말았습니다."
 grand_archive.8120.a: "$TERRIBLE$"
 grand_archive.8125.name: "버려진 해적 기지"
 grand_archive.8125.common: "[FromFromFromFrom.GetName] 기지의 약점이 노출되었다는 사실을 눈치챈 해적들은 재빨리 기지를 버리기로 결정하고, 보관되어 있던 다른 귀중품들을 챙겨 곧바로 탈출했습니다. 이제 이 거주 가능한 위성의 주인이 사라졌으니 식민지를 세울 수 있습니다."
 grand_archive.8125.desc.alive: "보안망이 뚫렸다는 사실을 발견한 §Y블랙 니들§!이 마침내 속았다는 것을 깨달았습니다.\n\n$grand_archive.8125.common$"
 grand_archive.8125.desc.dead: "우리가 §Y블랙 니들§!의 본거지에서 가까스로 빠져나가자, 우리가 세운 잠입 계획의 전모가 드러났습니다.\n\n$grand_archive.8125.common$"
 grand_archive.8125.a: "현명한 결정이군요."
 grand_archive.8125.a.custom_tooltip: "§Y[FromFromFromFrom.GetName]§!에 있던 주둔군이 행성을 떠났습니다. 이제 이 행성에 식민지를 세울 수 있습니다."
 grand_archive.8130.name: "블랙 니들 기지 약탈"
 grand_archive.8130.desc.common: "보물고 안에는 해적단의 역사를 드러내는 장식물을 포함해 매우 다양한 귀중품이 들어 있었습니다. 도난당한 예술품과 장신구, 암호화된 디지털 지갑 등 여러 보물 더미 사이에서 지도 캡슐을 발견했습니다.\n\n이곳에서 발견한 물건은 대부분 판매하기 어려울 것 같습니다. 예술품은 누가 봐도 한 눈에 알아볼 정도고, 디지털 지갑은 거래 내역을 추적당할 위험성이 있으며, 장신구는 팔아 치우려면 녹여서 금속 덩이로 만들어야 합니다. 물론, 이 물건의 원래 주인 중 일부는 이미 오래전에 사망했을 테지만, 아직까지 물건을 되찾고자 애쓰고 있는 이들이 분명 존재할 것입니다."
 grand_archive.8130.desc.bombarded: "§Y블랙 니들§! 기지의 폐허를 탐험하던 중에 지하 금고를 발견했습니다. 열어 본 결과, 이 금고는 놈들이 부정한 방식으로 축적한 물건이 가득한 작은 보물고로 드러났습니다.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.desc.landed: "폐허가 된 §Y블랙 니들§! 기지를 탐사하던 중에 기지 도면을 발견했습니다. 도면에는 지하 금고의 위치가 표시되어 있었고, 이를 따라 승강기를 타고 지하 깊숙이 내려간 우리는 작은 보물고에 출입 암호를 입력했습니다. 문이 열리자, 놈들이 부정한 방식으로 축적한 보물이 드러났습니다.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.a: "도난품의 반환을 시도해 보죠."
 grand_archive.8130.b: "모두 팔아 치우세요."
 grand_archive.8130.c.default: "도난품을 보관하세요."
 grand_archive.8130.c.lom: "찾은 사람이 임자죠."
 black_needle_base_sold_stolen_items: "블랙 니들 기지에서 약탈한 도난품을 판매함"
 opinion_black_needle_base_repatriate_stolen_items: "도난품을 반환함"
 opinion_black_needle_base_repatriate_stolen_items_tt: "우리와 전쟁 중이 아닌 비살육 제국의 £opinion£ 우호도 §G+$@opinion_black_needle_base_repatriate_stolen_items_value|0$§!"
 DECODE_THIRD_MAP_PIECE: "지도 조각 해독"
 DECODE_THIRD_MAP_PIECE_DESC: "§Y블랙 니들§! 기지에서 캡슐을 회수했으니, 이제 데이터를 해독하고 정보를 취득해 §H$celestial_chart$§!에 통합해야 합니다."
 grand_archive.8135.name: "지도 해독 완료"
 grand_archive.8135.desc: "여러 단계로 암호화된 캡슐을 해독하고, 취득한 정보를 §Y$celestial_chart$§!에 통합했습니다. 새로운 탐험지가 또 하나 드러났으며, 지도는 이제 거의 완성된 것처럼 보입니다. 한 조각만 더 모으면 지도를 완성하고 모험을 마무리할 수 있을 것 같은 예감이 듭니다.\n\n캡슐에 들어 있던 항로 데이터를 해독하던 중에, 문득 흠집 하나 없는 캡슐의 외관 자체도 조사해 볼 가치가 있다는 생각이 들었습니다. 캡슐을 이루고 있는 소재는 놀라울 정도로 튼튼한 것을 물론이고, 지속성 또한 매우 우수합니다. 이 소재를 똑같이 구현할 수만 있다면, 앞으로 많은 연구에 큰 도움이 될 것입니다."
 grand_archive.8135.a: "$GOOD$"
 d_hive_dwelling: "군체 의식 거주지"
 d_hive_dwelling_desc: "네스 선장의 동료 선원이었던 스미기브 군체가 살고 있는 고립된 정착지입니다."
 d_ruined_hive_dwelling: "군체 의식 거주지 폐허"
 d_ruined_hive_dwelling_desc: "네스 선장의 동료 선원이었던 스미기브 군체가 한때 거주한 고립된 정착지의 폐허입니다."
 COLONIZATION_IMPOSSIBLE_SMEEGIBB_PLANET: "§R이 행성은 $NAME_Smeegibb$의 소유입니다.§!"
 grand_archive.8200.name: "숨겨진 정착지"
 grand_archive.8200.desc.common_1: "[FROM.GetName]에서 연체류 지성체가 살고 있는 조그만 정착지를 발견했습니다. 인구수는 천 명에도 미치지 못합니다. 생물학적 예비 조사 결과, 이 종족은 아공간 시냅스 소통이 가능하며 군체 의식을 보유하고 있는 것 같습니다. 이 작은 정착지 외에 이 행성에서 다른 지성체는 감지되지 않았습니다."
 grand_archive.8200.desc.common_2: "§Y$celestial_chart$§!가 우리를 이곳으로 이끈 이유를 아직 발견하지 못한 만큼, 더 조사해 봐야 할 것 같습니다."
 grand_archive.8200.desc: "$grand_archive.8200.desc.common_1$\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8200.desc.alt: "$grand_archive.8200.desc.common_1$\n\n아마 이 종족에게서 소문으로만 들어 온 '§Y$NAME_CaptainNess$§!'이라는 작자에 관해 더 많은 정보를 얻을 수 있을 것 같습니다.\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8205.desc.common_1: "§H숨겨져 있던 [FROM.GetName] 성계에서 $NAME_Smeegibb$라는 군체 의식 노드를 발견했습니다. $NAME_Smeegibb$는 불편한 듯 안절부절못하는 모습입니다. 말을 걸면 시선을 낮추고는 하는데, 마치 복종에 익숙한 것처럼 보입니다.§!"
 grand_archive.8205.desc.common_2: "저희는 $NAME_Smeegibb$라고 해요. 이 성계는 수천 년 동안이나 그 누구의 눈에도 띄지 않았는데, 저희를 어떻게 발견하셨나요?\n\n오직 우리 §Y선장님§! 만이 이곳의 위치를 알아요. 그런데 뭘 찾고 계신 건가요?"
 grand_archive.8205.desc.default: "$grand_archive.8205.desc.common_1$\n\n스마라크! 단일 의식 생명체랑 이야기하는 건 정말 오랜만이네요.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.desc.gestalt: "$grand_archive.8205.desc.common_1$\n\n스마라크! 집단의식 생명체끼리 이야기하는 건 정말 오랜만이네요.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.a: "여긴 대체 뭐 하는 곳이죠?"
 grand_archive.8205.a.reply: "스마라크! 이 행성은 저희 집이에요. 폭력으로 어지러운 은하계에서 멀리 떨어진 안전한 곳이죠. 저희도 예전에는 폭력에 함께했어요. 살인이나 범죄, 해적질까지 전부 다요. 이젠 안 해요. 수경 재배하고 살아요.\n\n그전에는 난민이었어요. 아무도 받아 주지 않던 저희를 §Y선장님§!께서 받아 주시기 전까지는요. 선장님은 저희를 불우한 운명에서 구하고, 승무원으로 삼아 주셨어요. 저희는 선장님한테서 새 이름을 받은 대가로 함선을 돌봤어요.\n\n청소를 하고, 밥도 하고, 탄약이랑 화물도 관리하고, 수경 재배도 했어요. 다른 함선을 공격할 때도 함께했죠. 보물을 털거나 인질을 잡을 때는 선장님을 보호했고요. 선장님을 절대 배신하지 않았어요. 언제나 충성을 다했어요."
 grand_archive.8205.b: "§Y$celestial_chart$§!에 관해 뭔가 알고 있는 게 있나요?"
 grand_archive.8205.b.reply: "스마라크! 지도는 몰라요. 저흰 선실에만 있었어요. 하지만 §Y선장님§!께서 지도를 만들어서 여러분을 이곳으로 이끌었다면 분명 이유가 있었을 거예요. 저희를 돕길 바라셨거나... 해치길 바라셨겠죠. 저희도 잘은 모르겠어요. 선장님은 변덕스럽거든요.\n\n선장님께서 전에 한번 저희한테 메시지를 보내셨어요. 자기가 가장 아끼는 드론에게 주는 선물이라며 커다란 조각상을 보내셨죠. 예전에 구해 준 기억 속의 $NAME_Smeegibb$ 조각상을요. 멋진 조각상이었지만 왜 보내셨는지는 모르겠어요. 무언가 사과할 게 있으셨던 건가 싶지만, 쪽지 하나 없이 덜렁 도착했거든요."
 grand_archive.8205.c: "§Y선장§! 이야기를 더 해 주세요."
 grand_archive.8205.c.reply: "스마라크! 옛날에 §Y선장님§!께서 저희를 구해 주셨어요. 선장님은 저희 스승이자 대장이었어요. 함선을 돌보는 법을 가르쳐 주셨죠. \"$NAME_Smeegibb$, 너흰 꽤나 가치 있는 놈들이야. 물자 관리와 정비, 그리고 다른 일까지 모두 해내도록.\"이라고 했어요.\n\n선장님은 신조가 두 개예요. \"부는 독립이다\"랑 \"삶은 유산을 남기려고 사는 것이다\"죠. 저흰 선장님과 함께 부자부터 가난한 사람까지 모두를 노렸어요. 폭력적인 은하계에서 원하는 것을 모두 얻었죠.\n\n하지만 선장님은 욕심이 계속 커졌고, 더더욱 무자비해지셨어요. 현상금 때문에 승무원을 희생하고 배신했어요. 그래서 모두가 선장님 곁을 떠났지만, 저희 $NAME_Smeegibb$는 항상 선장님 편이었어요.\n\n선장님께서는 이 은하계가 얼마나 폭력적인지 보여 주셨어요. 그래서 이제는 멀리 떨어져 살길 원하는 거고요."
 grand_archive.8205.d: "왜 지도가 우리를 여기로 이끈 걸까요?"
 grand_archive.8205.d.reply: "스마라크! §Y선장님§!께서 왜 여러분을 여기로 이끄신 건지는 모르겠어요. 선장님께서는 저희한테 무엇 하나 이야기해 주시는 법이 없었거든요.\n\n아, 한 가지 떠올랐어요. 저희가 §Y선장님§!이랑 같이 숨었던 은신처가 하나 있는데, 거기에서 뭔가를 찾으실 수 있을지도 모르겠어요."
 grand_archive.8210.name: "은신처 발견"
 grand_archive.8210.desc: "[from.GetName]에서 만난 $NAME_Smeegibb$라는 생명체로부터 버려진 은신처의 좌표를 알아냈습니다. 예전에 §Y$NAME_CaptainNess$§!과 함께 이곳에 숨었던 적이 있다고 합니다. 이곳을 조사하면 다음 §Y$celestial_chart$§! 조각을 찾을 수 있을지도 모르며, 적어도 다음에 향해야 할 곳은 어디인지 단서를 제공해 줄 것입니다."
 grand_archive.8210.a: "어서 파헤쳐 보죠."
 smeegibb_digsite_poi: "은신처 탐험"
 smeegibb_digsite_poi_desc: "이 고고학 현장에 다음 §H$celestial_chart$§! 조각을 찾는 열쇠가 있을지도 모릅니다. §H$NAME_CaptainNess$§!의 잃어버린 $TREASURE_TROVE$를 찾으려면 이 버려진 은신처를 조사해야 합니다."
 NAME_Bemat_cruiser_inax_01: "헤베르"
 #Treasure Hunters Origin - Smeegibb
 smeegibb_digsite: "버려진 은신처"
 smeegibb_digsite_desc: "[fromfrom.planet.GetName]의 얼어붙은 황야에서 전원이 꺼진 생명 유지 장치와 주거 공간을 갖춘 조그만 조립형 가옥을 발견했습니다. 수천 년 동안 얼음 폭풍을 맞은 탓에 심하게 풍화된 상태로, 일부는 땅에 묻혀 있기까지 합니다."
 grand_archive.8220.name: "선장의 일지"
 grand_archive.8220.desc: "발굴된 구조물에는 오랜 세월 동안 활용된 흔적이 남아 있습니다. 예전에는 기본적인 편의 시설이 잘 갖춰져 있던 것 같습니다. 가옥 곳곳에는 잡동사니와 골동품이 흩어져 있었고, 어질러진 종이 뭉치 사이에서 §Y$NAME_CaptainNess$§!이 직접 쓴 것으로 보이는 일지를 발견했습니다.\n\n§L페리칸 자금 운송선을 또 하나 강탈하려고 했지만, 이번에는 놈들도 단단히 대비하고 있어 큰 피해를 입고 말았다. 하지만 문제없다. 이전처럼 이번에도 이겨 내리라. 이번 강탈로 돈은 꽤 벌었지만, 타피코 보석을 눈앞에서 또 놓치고 말았다. 설상가상으로 페리칸 놈들이 우리에게 붙은 현상금을 또 올린 탓에 이젠 연방까지 개입하기 시작했다. 매우 위험한 상황이니 일단은 잠시 몸을 숨기도록 하자.§!"
 grand_archive.8220.a: "계속 수색하세요."
 grand_archive.8225.name: "시간 때우기"
 grand_archive.8225.desc: "가옥 밑을 파헤쳐 기본 위생 시설과 함께 약간의 귀중품을 발견했습니다. 가옥 구석구석을 수색했지만, 안타깝게도 §Y$celestial_chart$§! 조각은 흔적조차 보이지 않았습니다.\n\n흩어져 있는 §Y$NAME_CaptainNess$§!의 일지 속에서 뭔가 단서를 찾을 수 있지 않을까 싶어 쪽지와 서류를 더 모아 보았습니다.\n\n§L$NAME_Smeegibb$ 같은 동료가 있으니 시간도 잘 가는 것 같다. 하지만 정말 이 녀석들과 영광을 나눌 가치가 있는 걸까? 물론 군체 의식은 동료로 정말 유용하긴 하다. 한 사람 몫으로 수백 마리의 드론을 부려 먹을 수 있다니, 거저나 다름없지 않나! 그런데도 자꾸 녀석한테 내 업적을 빼앗기고 있다는 생각이 든다. 내 유산을 나눈다는 게 이렇게 힘든 일일 줄이야. 조금 더 고민해 봐야겠다.§!"
 grand_archive.8225.a: "$grand_archive.8220.a$"
 grand_archive.8230.name: "증명할 것"
 grand_archive.8230.desc: "환풍구 안에 숨겨져 있던 §Y$NAME_CaptainNess$§!의 마지막 일지를 발견했습니다.\n\n§L이건 내가 원하는 바가 아니다. $NAME_Smeegibb$는 분명 내 충성스러운 수하지만, 내 업적이 이 녀석이 있었기에 가능했던 것이라고는 기억되고 싶지 않다. 나는 혼자서도 온 은하계를 상대할 수 있다. 나는 역사에 내 이름을 남길 것이며, 딸려 오는 모든 보물과 함께 그 영광을 독차지하고 말 것이다.\n\n아, 맞다. $NAME_Smeegibb$에게 날 떠올릴 수 있을 물건을 하나 주도록 하자.§!\n\n이게 다입니다. 더 이상 선장의 흔적이나 §Y$celestial_chart$§! 조각의 행방으로 이어질 단서는 보이지 않습니다.\n\n어쩌면 선장이 $NAME_Smeegibb$에게 선물했다는 물건에 마지막 지도 조각으로 이어지는 단서가 남아 있을지도 모릅니다. 아까 이야기를 나눴던 군체 의식과 다시 한번 연락을 취해야 합니다."
 grand_archive.8230.a: "현장 탐사 완료."
 grand_archive.8236.name: "사라진 $NAME_Smeegibb$"
 grand_archive.8236.desc.default: "$smeegibb_shelter_system_2_poi_desc$"
 grand_archive.8236.desc.xenophile: "$smeegibb_shelter_system_2_poi_desc$\n\n새로 사귄 친구가 무사하길 바랄 뿐입니다."
 grand_archive.8236.a: "[smeegibb_system.GetName](으)로 향하세요."
 grand_archive.8241.name: "$NAME_BlackNeedle$의 귀환"
 grand_archive.8241.desc: "꽤 커다란 규모의 함대가 §Y$NAME_BlackNeedle$§! 해적단의 깃발을 달고 [smeegibb_shelter.GetName]의 궤도를 돌고 있는 모습이 포착되었습니다. 보아하니, 이 해적 놈들이 우리의 뒤를 쫓은 끝에 $NAME_Smeegibb$ 군체가 살던 정착지를 발견하고는 약탈한 것 같습니다. 놈들도 여전히 §Y$celestial_chart$§!의 다음 조각을 찾고 있는 모양입니다.\n\n행성에서는 더 이상 지성체의 생명 신호를 찾아볼 수 없습니다.\n\n해적 기함으로부터 교신 요청이 들어왔습니다."
 grand_archive.8245.name: "$NAME_BlackNeedle$의 $NAME_CaptainInax$"
 grand_archive.8245.desc.inax.1: "§H절지류 개체 하나가 당당한 자태로 우뚝 서 겹눈을 번쩍이고 있습니다. 최대한 절도 있는 태도를 유지하려는 것 같지만, 흥분에 겨운 듯 턱을 딱딱거리고 있습니다.§!\n\n그래, 드디어 만나는군. 너희같이 연약한 놈들이 §Y후 서, 서, 선장§!을 대체 어떻게 이긴 거지? 그 느, 느, 늙다리도 참, 이 정도의 함대를 처리하지 못할 줄이야. 감히"
 grand_archive.8245.desc.inax.2: "이곳으로 안내해 줘서 고, 고, 고맙다. 덕분에 §Y$NAME_SilverQuill$§! 님께서 100번이 넘는 주기 동안 쫓고 계시던 그 한심한 $NAME_Smeegibb$ 놈들을 찾아낼 수 있었어. 그분의 오랜 원한을 풀어드렸으니 커다란 보상을 받을 수 있겠지... 물론, 너희를 처리하는 게 먼저겠지만."
 grand_archive.8245.desc.ransacked: "$grand_archive.8245.desc.inax.1$ 우리 [black_needle_base.GetName]의 기, 기, 기지를 턴 대가를 치르게 될 거다.\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.desc.stolen: "$grand_archive.8245.desc.inax.1$ 우리 §Y브, 브, 블랙 니들§!의 물건을 훔쳐 간 대가를 치르게 될 거다.\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.a: "당신은 누구지?"
 grand_archive.8245.a.reply: "§Y브, 브, 블랙 니들§! 해적단의 이낙스 소장이다.\n\n죽기 저, 저, 전에 널 죽일 자의 이름을 똑똑히 알아 두도록. 명예로운 죽음을 순순히 받아들이길 바라마.\n\n무, 무, 물론 오랜 관습대로 선제공격권을 양보하겠다."
 grand_archive.8245.b: "네놈들이 $NAME_Smeegibb$를 죽였구나..."
 grand_archive.8245.b.reply.common: "한주먹거리도 안 되더군. 그래, 우리가 그 흐느적거리는 놈들의 집에 그 푸, 푸, 푸른 피를 튀겨 줬다. 함대도 없고 무기도 없으니 어차피 느, 느, 늦든 빠르든 언젠가 그렇게 될 놈들이었어. 우리 §Y브, 브, 블랙 니들§! 해적단은 절대로 노린 적을 살려 보내지 않으니까.\n\n네 친구들이었다고? 애, 애, 애석하기도 해라. 그럼 외롭지 않게 같이 저승에 보내 주마. §Y$NAME_SilverQuill$§! 님의 이름으로 그 지도를 가져가겠다."
 grand_archive.8245.b.reply.default: "$grand_archive.8245.b.reply.common$ 네놈들의 꿈틀거리는 시, 시, 시체로부터 말이다."
 grand_archive.8245.b.reply.robot: "$grand_archive.8245.b.reply.common$ 희미하게 불빛만 깜박거리는 네놈들의 고, 고, 고철로부터 말이다."
 grand_archive.8245.c: "$NAME_SilverQuill$은 또 누구지?"
 grand_archive.8245.c.reply: "§Y$NAME_SilverQuill$§! 님이 누구냐고? 지, 지, 질문 한번 웃기군. 우리 해적단을 세우신 그 희대의 처, 처, 천재를 모르다니. 실버 퀼 님께서는 단 한 척의 함선으로 시작해 §Y브, 브, 블랙 니들§!을 은하계를 쥐락펴락하는 거대한 해적단으로 키워 내셨다.\n\n그리고 우리 브, 브, 블랙 니들 해적단은 그분의 유지를 이어받고 있지. 이제 우리를 위해 주, 주, 죽어 줘야겠다."
 grand_archive.8245.d: "$celestial_chart$로 대체 뭘 하려는 거지?"
 grand_archive.8245.d.reply: "그게 어떤 물건인지 모르는 거냐? §Y네, 네, 네스 선장§!이 보물을 숨긴 곳을 가리키는 지도라고! 네스가 평새, 새, 생 동안 모은 크레딧이랑 보물이 바로 그곳에 있단 말이다.\n\n그 보물은 우리 해적단의 차지다. 우리는 그 보물을 손에 넣고 역사에 이름을 남기리라. 온 우주가 §Y브, 브, 블랙 니들§!의 찬가를 부르게 되겠지... 그 첫 선율은 너희 성계에서 시작하게 해 주, 주, 주마. 어때, 자비롭지 않나?"
 grand_archive.8245.e: "우리가 그렇게 쉽게 포기할 것 같나?"
 grand_archive.8245.e.reply: "그럼 어서 전투를 시작하자! 너희의 [this.species.GetRemnantNamePlural](을)를 대장님께 서, 서, 선물로 바치고 말 테다."
 grand_archive.8265.name: "$grand_archive.8245.name$"
 grand_archive.8265.desc: "멋진 싸움이었다! 보기 보, 보, 보다 약하진 않군. 두 번이나 네놈들을 얕보고 말았지만, 더 이상은 없다. 다음에야말로 우리 §Y브, 브, 블랙 니들§!이 네놈들을 손봐 주고 말 테다.\n\n경고가 아니라 사형 선고로 여기도록."
 grand_archive.8265.a.scared: "불안하군요..."
 grand_archive.8265.a.homicidal: "어디 해 보시든가."
 grand_archive.8265.a.gestalt: "통신 종료."
 gateway_to_ness_treasure_system_poi: "지도의 X 표시"
 gateway_to_ness_treasure_system_poi_desc: "마침내 §H$celestial_chart$§!가 완성되었고, 숨겨져 있던 [Prev.GetName] 성계가 드러났습니다. 오랜 여정의 끝이 보입니다. 어서 그곳으로 향해, 우리를 기다리고 있는 게 과연 무엇인지 확인해 봅시다!"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT: "숨겨진 캡슐"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT_DESC: "지금까지 조사한 내용을 보건대, 다음 §H$celestial_chart$§! 조각은 [this.GetName]에 있는 폐허가 된 정착지의 어딘가에 숨겨져 있을 것으로 추정됩니다.\n\n이 캡슐도 다른 캡슐처럼 튼튼하게 만들어졌다면 폭격을 너끈히 견뎌 냈을 겁니다."
 grand_archive.8270.name: "조각상의 비밀"
 grand_archive.8270.desc: "[from.GetName]에서 네 번째 §Y$celestial_chart$§! 조각을 찾는 데 성공했습니다. 이제는 멸종하고 만 $NAME_Smeegibb$라는 군체가 가지고 있던 드론 석상 안에 숨겨져 있었습니다. 조각상에는 이런 글귀가 새겨져 있습니다.\n\n§L\"나의 충성스러운 동료 선원에게. 길고 평안한 고요를 즐길 수 있길.\"§!\n\n이 마지막 조각을 해독하면 계속해서 §Y$NAME_CaptainNess$§!의 보물을 찾아 나설 수 있습니다."
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT: "지도의 마지막 조각"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT_DESC: "$NAME_Smeegibb$ 정착지의 폐허에서 캡슐을 빼 왔으니, 이제 안에 든 데이터를 해독하고 §H$celestial_chart$§!를 완성하는 일만 남았습니다. 머지않아 §H$NAME_CaptainNess$§!이 남긴 길의 끝에 무엇이 기다리고 있을지 알 수 있을 것입니다."
 grand_archive.8280.name: "지도 완성"
 grand_archive.8280.desc: "마지막 조각을 해독해서 얻은 데이터로 마침내 §Y$celestial_chart$§!를 완성했습니다. 경로를 따라 우리가 지금까지 거쳐 온 중간 지점이 점멸하더니, 네 개의 광선이 일제히 깜빡이며 또 하나의 숨겨진 성계를 밝혔습니다.\n\n마지막 데이터 조각이 추가되자, 지도에 숨겨져 있던 새로운 기능이 드러났습니다. 알고 보니 이 §Y지도§!는 단순한 지도가 아니었고, §Y$NAME_CaptainNess$§!이 은하계를 누비며 축적했던 보물의 은닉처에 관한 정보가 들어 있었습니다. 이미 누군가가 털어간 곳도 있겠지만, 이 지도를 사용한다면 제국 치하의 모든 은하계에서 숨겨진 보물을 찾을 수 있을 것입니다.\n\n또, 이 §Y지도§!에는 네스 선장이 지금껏 발견했던 모든 보물의 감정 정보가 들어 있었는데, 이 정보는 보물을 식별하고, 감정하고, 구매자에게 최대한 비싸게 팔아 치울 수 있는 방법을 망라하고 있습니다. 이 장치를 재가동하면 특별한 보물고 설계를 얻을 수 있으며, 이로써 네스 선장의 특출난 지식을 식민지 사업에 활용하고 우리 제국의 수집품에 가치를 더할 수 있을 것입니다."
 grand_archive.8280.a.lom: "그야말로 가치를 헤아릴 수 없는 보물이군요."
 grand_archive.8285.name: "지도의 X 표시"
 grand_archive.8285.desc: "§Y$celestial_chart$§!의 완성은 [this.GetName]에 있어 길이 남을 위업입니다. 마침내 지도는 모든 비밀을 드러냈으며, 이제 우리를 모험의 마지막 장소로 이끌고 있습니다. 바로 [gateway_to_ness_treasure_system.GetName] 성계 말입니다.\n\n우린 그동안 수많은 역경을 헤쳐 왔고, 이제 보물을 코앞에 두고 있습니다. 하지만 §Y지도§!의 끝에 무엇이 기다리고 있을지는 아직 아무도 모릅니다.\n\n물론 반드시 성공한다는 보장은 없지만, 원래 모험이 그런 거 아니겠습니까. 어서 우리의 위대한 여정을 마무리하러 갑시다!"
 grand_archive.8285.a.default: "계속 나아갑시다."
 grand_archive.8285.a.lom: "전속 전진!"
 councilor_head_treasure_hunter: "수석 보물 사냥꾼"
 councilor_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_head_treasure_hunter_desc: "$TITLE$(은)는 §Y$celestial_chart$§!를 조심스레 살피며 숨겨진 보물을 추적하고 귀중한 유물을 감정합니다."
 councilor_corporate_head_treasure_hunter: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_desc: "$councilor_head_treasure_hunter_desc$"
 prospect_of_treasure_modifier: "보물의 잠재력"
 prospect_of_treasure_modifier_tt: "$ruler$ 레벨마다 §G+$@prospect_of_treasure_treasure_trove_reward|0%$§! $mod_treasure_trove_reward_mult$, §G+$@prospect_of_treasure_treasure_gatherers_produces|0%$§! $mod_planet_treasure_gatherers_produces_mult$, §G+$@prospect_of_treasure_energy_produces|0$§! $mod_country_base_energy_produces_add$\n\n"
 grand_archive.8290.name: "보물의 참맛"
 grand_archive.8290.desc.chart: "[from.GetName]에 보물고를 설립했으니, 이제 §Y$celestial_chart$§!를 활용해서 우리 경제를 크게 성장시킬 수 있을 것입니다."
 grand_archive.8290.desc.trove: "[from.GetName]에서 발견한 $TREASURE_TROVE$에 들어 있던 풍족한 자원을 분배했습니다. §Y$celestial_chart$§!를 활용해 우리 경제를 상당히 성장시킬 수 있다는 사실이 더욱 분명해졌습니다."
 grand_archive.8290.desc.default: "§Y지도§!의 능력을 최대한 활용하기 위해, 보물의 발견 및 수집을 주관하는 새로운 평의회 의석을 마련했습니다."
 grand_archive.8290.desc.gestalt: "§Y지도§!의 능력을 최대한 활용하기 위해, 보물을 찾고 모으는 일에 더 많은 자원을 투자할 방법을 마련했습니다."
 grand_archive.8290.desc.chart.default: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.chart.gestalt: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.desc.trove.default: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.trove.gestalt: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.tt: "\n§E평의회 의석 잠금 해제 가능:§!\n§H$t$$councilor_head_treasure_hunter$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_treasure_trove_reward_mult$: §G+$@councilor_head_treasure_hunter_treasure_trove_reward|0%$§!\n$ttt$$mod_planet_treasure_gatherers_produces_mult$: §G+$@councilor_head_treasure_hunter_treasure_gatherers_produces|0%$§!\n$ttt$$mod_country_base_energy_produces_add$: §G+$@councilor_head_treasure_hunter_energy_produces|0$§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$scientist_with_icon$ $commander_with_icon$"
 grand_archive.8300.name: "벌레가 들끓는 관문"
 grand_archive.8300.desc.common: "이 게이트웨이 너머에 우리가 애타게 찾던 보물이 있을 것 같습니다."
 grand_archive.8300.desc.did_encounter_voidworms: "지도를 따라가자 이전까지는 알려지지 않았던 블랙홀에 이르렀고, 그 성계 안에는 $NAME_Voidworms$이 우글거리고 있었습니다. 녀석들은 근처의 버려진 게이트웨이에 둥지를 틀었는데, 가장 큰 녀석은 마치 구조물의 주인이라도 되는 양 주위를 맴돌고 있습니다.\n\n$grand_archive.8300.desc.common$ 여정을 마무리하려면 $NAME_Voidworms$을 처리하고 게이트웨이를 수리해야 합니다."
 grand_archive.8300.desc.didnt_encounter_voidworms: "지도를 따라가자 이전까지는 알려지지 않았던 블랙홀에 이르렀고, 그 성계 안에는 괴상한 생물이 우글거리고 있었습니다. 녀석들은 근처의 버려진 게이트웨이에 둥지를 틀었는데, 가장 큰 녀석은 마치 구조물의 주인이라도 되는 양 주위를 맴돌고 있습니다.\n\n커다란 애벌레처럼 생긴 이 생물은 우리의 우주 동물 데이터베이스에 등록되어 있지 않으며, 조사를 위해 통신을 시도해 보는 중입니다. $grand_archive.8300.desc.common$ 여정을 마무리하려면 녀석들을 처리하고 게이트웨이를 수리해야 합니다."
 grand_archive.8300.a: "그 어떤 것도 우리 앞길을 막을 순 없습니다."
 grand_archive.8300.a.pacifist: "다른 방법이 없다면 어쩔 수 없죠."
 grand_archive.8300.a.lom: "다 쓸어버리세요!"
 GATEWAY_VOIDWORMS_KILL_PROJECT: "$grand_archive.8300.name$"
 GATEWAY_VOIDWORMS_KILL_PROJECT_DESC: "§H$celestial_chart$§!를 따라 항해한 결과, [this.solar_system.GetName] 성계의 벌레가 들끓는 §H게이트웨이§!에 도착했습니다. 게이트웨이를 재가동해서 반대편으로 넘어가려면 이 생명체들부터 처리해야 합니다."
 GATEWAY_VOIDWORMS_KILL_PROJECT_TT: "§R[this.solar_system.GetName]의 생명체 격파§!"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT: "$NAME_Voidworms$ 사체"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT_DESC: "[this.solar_system.GetName]의 공허충 사체에서 특이한 수치가 감지되었습니다. 감지기가 부패 중인 트로이카 사체 안에서 생명체의 징후를 감지한 것 같습니다. 추가 조사를 위해 과학선을 보내야 합니다."
 grand_archive.8310.name: "공허충 군집"
 grand_archive.8310.desc.did_encounter_voidworms: "공허충 사체 안에 둥지를 튼 유충 군집을 발견했습니다. 녀석들은 방금 막 동족을 잃었음에도 불구하고 겁 없게도 우리 함선에 접근했습니다. 그러고는 마치 간청이라도 하듯 우리 함대 근처를 따라 움직이기 시작했습니다.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.didnt_encounter_voidworms: "뱀처럼 기다란 사체 속에서 둥지를 튼 유체 군집을 발견했습니다. 녀석들은 방금 막 동족을 잃었음에도 불구하고 겁 없게도 우리 함선에 접근했습니다. 그러고는 마치 간청이라도 하듯 우리 함대 근처를 따라 움직이기 시작했습니다.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.common: "마음만 먹으면, 우리 함선을 따라다니는 녀석들의 본능을 이용할 수 있습니다. 이 어린 우주 생명체 군집은 자라나면 우리 군을 빛낼 유기체 함대가 되어 줄 것입니다."
 grand_archive.8310.a: "놀라운 발견이군요."
 grand_archive.8310.a.tt: "§Y$@gateway_voidworm_nymph_reward_count|0$마리의 §2$epic$§! $voidworms_small_plural$§!으로 이루어진 함대를 획득합니다."
 grand_archive.8310.b: "쉬운 먹잇감이군요."
 grand_archive.8315.name: "게이트웨이 기술 조사"
 grand_archive.8315.desc: "[FromFromFrom.System.GetName]의 게이트웨이는 비활성 상태입니다. 이 고대 구조물을 분석하는 과정에서, §Y$celestial_chart$§!는 이 잊힌 기술의 이해를 깊게 해 줄 일련의 통찰을 제공했습니다. 게이트웨이라는 이 고대 이동 수단의 원리를 익히면 다른 분야에서도 그 기술을 유용하게 활용할 수 있을 것입니다."
 RESEARCH_GATEWAY_ACTIVATION_PROJECT: "$grand_archive.8315.name$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_DESC: "$grand_archive.8315.desc$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_TT: "£physics£ §Y$tech_gateway_activation$§! 기술 연구"
 grand_archive.8325.name: "게이트웨이 가동"
 grand_archive.8325.desc.common: "지도에 표시된 성계를 순서대로 따라간 결과, 그 끝은 이 성계로 이어졌습니다. 이 지도가 무엇을 숨기고 있든 그 비밀은 머지않아 드러날 것입니다."
 grand_archive.8325.desc.tech: "적합한 기술을 연구했으니, 이제 [gateway_to_ness_treasure_system.GetName]에 있는 게이트웨이를 재가동할 수 있습니다.\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.known: "생명체들을 다 무찔렀으니, 이제 [gateway_to_ness_treasure_system.GetName]에 있는 게이트웨이를 재가동하는 일만 남았습니다.\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.unknown: "$NAME_Voidworms$을 다 무찔렀으니, 이제 [gateway_to_ness_treasure_system.GetName]에 있는 게이트웨이를 재가동하는 일만 남았습니다.\n\n$grand_archive.8325.desc.common$"
 ACTIVATE_GATEWAY_PROJECT: "$grand_archive.8325.name$"
 ACTIVATE_GATEWAY_PROJECT_DESC: "§H$celestial_chart$§!가 가리키던 마지막 목적지는 [this.solar_system.GetName]의 비활성화된 §H게이트웨이§!로 드러났습니다. 이 너머에는 중요한 무언가가 기다리고 있을 것입니다."
 ACTIVATE_GATEWAY_PROJECT_TT: "§H게이트웨이 가동§!"
 grand_archive.8400.name: "보물을 향해 전진!"
 grand_archive.8400.desc: "§Y$celestial_chart$§!의 마지막 목적지에 자리 잡고 있던 게이트웨이를 작동시켜 [ness_treasure_system.GetName] 성계를 드러냈습니다. 이곳의 천체 배치는 §Y$NAME_CaptainNess$§!의 항해 일지에서 발견한 스케치와 완전히 일치합니다.\n\n마침내 이 기나긴 여정의 끝이 다가왔습니다."
 grand_archive.8400.a: "계속 나아갑시다."
 ness_treasure_system_poi: "[from.solar_system.GetName]의 게이트웨이 통과하기"
 ness_treasure_system_poi_desc: "우리는 해적과 괴물을 물리치며 §H$celestial_chart$§!의 끝에 도달했습니다. 게이트웨이가 열렸으니, 이젠 그 너머에 무엇이 있는지 알아볼 차례입니다."
 #Megastructure
 gateway_ness_ruined: "$gateway_ruined$"
 gateway_ness_ruined_DESC: "$gateway_ruined_DESC$"
 gateway_ness_ruined_MEGASTRUCTURE_DETAILS: "$gateway_ruined_MEGASTRUCTURE_DETAILS$"
 gateway_ness_restored: "$gateway_final$"
 gateway_ness_restored_DESC: "$gateway_final_DESC$"
 gateway_ness_restored_MEGASTRUCTURE_DETAILS: "$gateway_final_MEGASTRUCTURE_DETAILS$"
 NESS_GRAND_ARCHIVE: "$NAME_CaptainNess$의 보물 더미"
 NESS_GRAND_ARCHIVE_HOARDED: "$NESS_GRAND_ARCHIVE$"
 grand_archive.8405.name: "복병이다!"
 grand_archive.8405.desc: "뒤를 밟힌 모양입니다.\n\n[ness_treasure_system.GetName]에서 위용 넘치는 §Y$NAME_BlackNeedle$§! 함대와 조우했습니다. 퇴역한 군용 함선과 고성능 무기로 재무장한 민간 함선 등, 지난번보다 전력이 크게 늘어난 포진입니다. 이번 전투를 위해 거의 모든 예비 함대를 소집한 것 같습니다. 함대의 중앙에는 놈들의 기함인 거대한 $titan$급 함선이 위치해 있습니다.\n\n전투 준비 대형을 갖추기는 했지만 대부분의 함선이 무기를 아직 장전하지 않은 것으로 보아, 우리와 협상할 의사가 있는 것 같습니다.\n\n놈들의 기함으로부터 교신을 수신했습니다."
 grand_archive.8405.a.lom: "한번 들어는 보죠."
 grand_archive.8410.name: "$NAME_BlackNeedle$ 선장, $NAME_CobaltQuill$"
 grand_archive.8410.desc: "§H작은 덩치에도 불구하고 매우 큰 위엄이 느껴지는 이 선장은 교활한 눈빛으로 우리를 계산하듯 살피고 있습니다.§!\n\n드디어 만나는군. §Y$NAME_BlackNeedle$§! 해적단의 $NAME_CobaltQuill$ 선장이라고 하네. 위대한 우리 해적단의 시조인 $NAME_SilverQuill$ 님의 피를 잇고 있지. 지난 세월 동안 자네들 때문에 시달린 걸 생각하면 치가 떨리지만, 난 무뢰한이 아니라네. 제안을 하나 하도록 하지.\n\n완성된 지도를 넘겨주게나. 그러면 그 목숨을 부지한 채로 상당한 보물을 갖고 떠나게 해 주겠네.\n\n거절한다면 우리는 무력을 사용해 그 지도를 빼앗을 수밖에 없네. 물론 우리 함대가 더 강력하긴 하지만 만일을 위해 자네 제국의 주요 지점에도 공작원을 심어 놓았지. 내 말 한마디면 제국이 몰락할 걸세."
 grand_archive.8410.a: "그 대가는 뭐죠?"
 grand_archive.8410.a.reply: "자네 때문에 시달린 걸 생각하면 지금도 머리가 아프지만, §Y$NAME_CaptainNess$§!의 완성된 유물만 넘겨준다면 보물을 두둑하게 챙겨 주겠네.\n\n이 제안을 받아들이면 지난 일은 다 잊겠다는 걸세. 계속 마찰을 일으킬 필요는 없지 않겠나?"
 grand_archive.8410.b: "협박이로군요..."
 grand_archive.8410.b.reply.common_1: "난 [this.GetName]의 안팎을 꿰뚫고 있다네. 보급망에서부터 자원 저장고의 위치와 항성 기지의 분포까지, 모든 걸 하나하나 세세하게 파악하고 있지."
 grand_archive.8410.b.reply.common_2: "내 부하들의 연구 덕분에 자네의 제국을 무너뜨릴 확실한 방법을 찾았네. 행성들을 굶겨 죽이고 보급품을 빼앗아, 모든 것을 흔적 하나 없이 파괴할 것이야. 물론, 자네가 내가 원하는 걸 내준다면 이 모든 일은 일어나지 않을 테지만 말이야..."
 grand_archive.8410.b.reply.default: "$grand_archive.8410.b.reply.common_1$\n\n자네의 심복이나 심지어 그 가족까지도, 내 눈이 닿지 않는 곳은 없다네.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.hive_mind: "$grand_archive.8410.b.reply.common_1$\n\n자네 집단의 주요 노드는 모두 우리의 주시하에 있다네. 새 노드를 생성하더라도 소용없어.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.machine: "$grand_archive.8410.b.reply.common_1$\n\n자네의 위치 매트릭스에 백도어를 심어 놨다네. 네트워크상의 모든 주요 노드를 추적할 수 있지.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.c: "왜 굳이 협상하려는 거죠?"
 grand_archive.8410.c.reply: "이 정도의 파괴 공작을 준비하는 데 얼마가 드는지 아나? 함선 유지비부터 인건비에, 뇌물에, 빠져나가는 곳은 많고 많은데 실행한다고 해서 돈을 벌 수 있는 것도 아냐. 쉽게 말해, 스위치 하나로 자네 제국을 쑥대밭으로 만들 수 있게 된 대신 나 또한 엄청난 기회비용을 쏟아부었다는 소리일세.\n\n나도 계속 이렇게 돈을 낭비하고 싶지는 않네. 더 이상의 무의미한 유혈 사태는 피하는 게 어떻겠나? 해적질은 우리 같은 전문가한테 맡기고, 어서 챙길 것을 챙겨 떠나게."
 grand_archive.8410.d: "단순히 크레딧 때문만은 아닌 것 같은데요?"
 grand_archive.8410.d.reply: "5000년 전, 내 조상인 $NAME_SilverQuill$ 님께서는 $NAME_CaptainNess$이 이끄는 해적단의 일원이셨네. 일등 항해사셨지. 그렇게 오랜 세월 동안 충성을 바친 대가가 뭐였는지 아나?\n\n배신이었네!\n\n그년은 당국에 $NAME_SilverQuill$ 님을 넘기고 현상금을 챙겼어! 하지만 $NAME_SilverQuill$ 님께서는 감방에 그냥 갇혀 있을 분이 아니었네.\n\n목숨을 건 탈옥 끝에 잿더미로부터 일어나, 수하를 모으고 오늘날 전설의 해적단으로 거듭난 $NAME_BlackNeedle$ 해적단을 세운 게야. $NAME_SilverQuill$ 님께서는 자신을 배신한 $NAME_CaptainNess$에게 복수하고 말겠다고 맹세하셨네. 평생에 걸쳐 $NAME_CaptainNess$의 보물을 약탈하고, $NAME_CaptainNess$보다 위대한 해적으로 기록되기 위해 힘쓰셨지.\n\n나는 내 선조가 시작한 일을 끝맺으려는 것뿐이라네. 그 지도만 있다면 우리의 정당한 소유물을 되찾을 수 있을 걸세.\n\n그러니 어서 넘겨주게나."
 grand_archive.8415.name: "담대한 제안"
 grand_archive.8415.desc: "§Y$NAME_BlackNeedle$§!의 지도자가 두둑한 보물과 §Y$celestial_chart$§!의 맞교환을 제안했습니다. 이 제안을 받아들이면 §Y$NAME_CaptainNess$§!의 보물을 얻을 수 있는 열쇠를 넘겨주게 됩니다.\n\n반대로, 이 제안을 거절할 경우 놈들의 분노를 사게 됩니다. 해적 놈들이 우리 제국 내부에 얼마나 침투했는지는 알 수 없지만, 이들은 [this.GetName](을)를 내부로부터 붕괴시킬 수 있다며 협박하고 있습니다. 지금으로서는 놈들의 말이 사실인지 허풍인지 알 수 없습니다."
 grand_archive.8415.a: "제안을 거절하세요."
 grand_archive.8415.b: "§Y$celestial_chart$§!를 판매하죠."
 grand_archive.8415.b.effect_tt: "§Y$celestial_chart$§!를 잃습니다.\n최대 $r_energy$의 §G$@max_credit_mult|0%$§!를 획득합니다.\n§Y$NAME_BlackNeedle$§!로부터 함선을 획득합니다."
 grand_archive.8500.name: "협상 타결"
 grand_archive.8500.desc: "§Y$celestial_chart$§!를 넘겨주는 대가로 어마어마한 $MONEY$과 §Y니들의 눈§!이라는 뛰어난 군사 기함을 받았습니다. §Y$NAME_BlackNeedle$§!과의 지긋지긋한 싸움도 이제 끝이 났습니다.\n\n해적 함대와의 총력전도 피했고 은하 규모의 파괴 공작도 막았습니다.\n\n역시 해적질은 해적에게 맡겨 두는 편이 더 나은 것 같습니다."
 grand_archive.8500.a: "이제 볼일은 다 봤군요."
 grand_archive.8500.a.tt: "모든 함선이 $TREASURE_TROVE$ 성계에서 방출됩니다."
 HOARD_LOOTED_BY_PIRATES: "이 구조물은 해적에게 이미 약탈당해 건질 만한 것이 없습니다"
 grand_archive.8505.name: "공작이다!"
 grand_archive.8505.desc: "§Y$NAME_BlackNeedle$§!이 총공격을 개시하며 우리 성계에 혼란이 일어났습니다. 조립 라인이 멈추고, 발전기는 타 버렸으며, 필수 행정 기반 시설은 비활성화되고 말았습니다. 운송 중이던 화물은 분실되고, 연구 기지의 데이터는 포맷되었으며, 심지어 광산조차 평소보다 다섯 배 빨리 무너지고 있습니다.\n\n수천 명의 적대적 공작원이 힘을 합쳐 우리 사회를 무차별적으로 파괴하고 있는 것입니다. 우리 식민지에 이미 커다란 공작망이 형성되어 있는 것으로 보이며, 이들이 우리보다 한 수 앞서고 있습니다."
 grand_archive.8505.a: "비상, 비상이다!"
 situation_sabotage: "블랙 니들 공작원"
 situation_sabotage_type: "$situation_sabotage$"
 situation_sabotage_desc: "§Y$NAME_BlackNeedle$§!에서 보낸 수많은 공작원이 우리 식민지에 숨어 [owner.GetName] 전역에서 커다란 혼란을 야기하고 있습니다. 이 공작원들을 제거하지 않으면 계속해서 피해를 보게 되며, 결국에는 공급망이 무너지고 말 것입니다."
 situation_sabotage_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 approach_sabotage_do_nothing: "아무것도 하지 않기"
 approach_sabotage_do_nothing_tt: "별다른 조치를 하지 않습니다."
 approach_sabotage_purge: "공작원 정화"
 approach_sabotage_purge_tt: "내부에 잠입한 요원의 색출을 시도하면, 어쩔 수 없이 어느 정도의 부수적 피해를 감수해야 합니다."
 approach_sabotage_mitigate: "피해 경감"
 approach_sabotage_mitigate_tt: "소모적인 파괴 공작을 받은 즉시 기반 시설을 재건할 수 있도록 대응 조치를 취합니다."
 finisher_effects_sabotage: "블랙 니들 공작원을 처리하고, 블랙 니들이 네스 선장의 보물 더미 주변에 구축한 방어선을 강화할 수 없도록 저지할 것입니다."
 finisher_effects_sabotage_fail: "우리 기반 시설이 복구할 수 없을 정도의 피해를 받고, 블랙 니들이 네스 선장의 보물 더미 주변에 구축한 방어선도 강화될 것입니다."
 grand_archive.8520.name: "공작망 발견"
 grand_archive.8520.desc.common: "§Y$NAME_BlackNeedle$§! 공작원이 우리 식민지에서 이용하고 있던 비밀 통신 주파수를 탈취했습니다. 놈들의 암호문을 해독한 끝에 우리 제국의 내부에 숨어 있던 배신자들의 정체를 확인할 수 있었습니다."
 grand_archive.8520.desc.machine: "$grand_archive.8520.desc.common$\n\n놈들의 공작원은 우리 운영 체제에 몰래 악성 코드를 퍼뜨려, 성계 전체에 걸쳐 다양한 요직을 점하는 반군 잠복 부대를 양성했습니다.\n\n[root.GetName]의 주요 독립 노드 중 하나인 §Y[traitor_leader.GetName] [traitor_leader.GetClass]§!도 이 악랄한 재프로그래밍 작전에 휘말려 손상되고 말았습니다."
 grand_archive.8520.desc.hive: "$grand_archive.8520.desc.common$\n\n놈들의 공작원은 거주지에 해리성 페로몬을 살포해 드론들이 근본적인 부분에서 일탈을 일으키도록 유도했습니다. 그리고 해적들은 분열을 일으킨 드론들을 자신들의 잠복 요원으로 재조직해 기반 시설을 무너뜨리는 데 사용했습니다.\n\n[root.GetName]의 주요 독립 노드 중 하나인 §Y[traitor_leader.GetName] [traitor_leader.GetClass]§!도 이 대규모 작전에 휘말려 오염되고 말았습니다."
 grand_archive.8520.desc.default: "$grand_archive.8520.desc.common$\n\n놈들의 공작원이 불만이 가득한 시민들을 자신들의 수하로 끌어들이고 있었다는 사실이 밝혀졌습니다. 이 공작은 이미 수년에 걸쳐 이루어졌으며, 이들은 우리를 언제든지 배신할 수 있는 잠복 요원과 다양한 자산을 사용해 대규모 공격을 계획하고 있었습니다.\n\n§Y[traitor_leader.GetName] [traitor_leader.GetClass]§!도 반역자로 드러났는데, 이는 심각한 안보 위협입니다. 우리는 사회의 안정을 유지하면서 비밀리에 이 공모자를 처리해야 합니다. 우리 사회가 이렇게나 부패했다는 사실이 대중들에게 알려진다면 정부가 큰 피해를 입을 수 있습니다."
 grand_archive.8520.a.default: "반역자들을 처형하세요."
 grand_archive.8520.a.machine: "일탈 유닛을 비활성화하세요."
 grand_archive.8520.a.hive: "일탈 드론을 제거하세요."
 grand_archive.8520.a.tt: "인구가 있는 모든 행성이 §R100§! £pop£ §H팝§!을 잃습니다."
 grand_archive.8520.b.default: "반역자들을 재교육하세요."
 grand_archive.8520.b.machine: "일탈 유닛을 재프로그래밍하세요."
 grand_archive.8520.b.hive: "일탈 드론을 재동화하세요."
 grand_archive.8520.c: "반역자들의 신상을 공개하세요."
 grand_archive.8525.name.default: "반역자 처형 완료"
 grand_archive.8525.name.hive: "일탈 드론 제거 완료"
 grand_archive.8525.name.machine: "유닛 제거 완료"
 grand_archive.8525.desc.common: "[traitor_leader.GetName](이)가 §Y$NAME_BlackNeedle$§!과 한통속이었다는 것이 밝혀졌고"
 grand_archive.8525.desc.default: "$grand_archive.8525.desc.common$, 그 결과 [traitor_leader.GetName](은)는 처형되었습니다.\n\n[traitor_leader.GetName]의 자세한 사인은 공개되지 않았습니다."
 grand_archive.8525.desc.hive: "$grand_archive.8525.desc.common$, 그 결과 [traitor_leader.GetName](은)는 제거되었습니다."
 grand_archive.8525.desc.machine: "$grand_archive.8525.desc.common$, 그 결과 [traitor_leader.GetName](은)는 제거되었습니다."
 grand_archive.8525.a: "어쩔 수 없는 선택이었습니다."
 grand_archive.8530.name.default: "반역자 재교육 완료"
 grand_archive.8530.name.hive: "일탈 드론 재교육 완료"
 grand_archive.8530.name.machine: "유닛 재프로그래밍 완료"
 grand_archive.8530.desc.default: "$grand_archive.8525.desc.common$, 그 결과 [traitor_leader.GetName](은)는 교화되었습니다.\n\n안타깝게도 이러한 재교육 과정은 [traitor_leader.GetName]에게 떨쳐낼 수 없는 부정적 인상을 남겼습니다."
 grand_archive.8530.desc.hive: "$grand_archive.8525.desc.common$, 그 결과 [traitor_leader.GetName](은)는 교화되었습니다.\n\n안타깝게도 이러한 재동화 과정은 [traitor_leader.GetName]에게 떨쳐낼 수 없는 부정적 인상을 남겼습니다."
 grand_archive.8530.desc.machine: "$grand_archive.8525.desc.common$, 그 결과 [traitor_leader.GetName](은)는 재프로그래밍되었습니다.\n\n안타깝게도 이러한 포맷 과정은 [traitor_leader.GetName]에게 떨쳐낼 수 없는 부정적 인상을 남겼습니다."
 grand_archive.8530.a.tt: "[traitor_leader.GetName](이)가 부정적 특성을 2단계 얻습니다."
 grand_archive.8535.name: "[traitor_leader.GetName] 사망 확인"
 grand_archive.8535.desc: "$grand_archive.8525.desc.common$, 그 사실을 알게 된 성난 [root.GetName] 시민들이 시위를 조직했습니다. 모여든 자경단은 지도자의 자택에 쳐들어갔고, [traitor_leader.GetName](은)는 현장에서 사망한 채로 발견되었습니다."
 grand_archive.8536.name: "배신자의 속죄"
 grand_archive.8536.desc: "$grand_archive.8525.desc.common$, [traitor_leader.GetName](은)는 자기 행동을 깊게 뉘우치는 공개 성명을 발표했습니다. 이번 일로 인해 지도자에게는 씻어낼 수 없는 오점이 남았습니다.\n\n다행히도 [root.GetName]의 시민들은 [traitor_leader.GetName]의 과오를 용서해 주려는 것 같습니다."
 grand_archive.8536.a: "반가운 소식이군요."
 grand_archive.8536.a.tt: "[traitor_leader.GetName](이)가 부정적 특성을 1단계 얻습니다."
 grand_archive.8545.name: "기반 시설 붕괴"
 grand_archive.8545.desc: "안타깝게도 §Y$NAME_BlackNeedle$§!의 파괴 작전을 저지할 수 없었습니다. 공작원이 우리의 물류 기반 시설을 복구할 수 없을 정도로 파손했고, 보급망을 재건하려면 수년의 세월이 필요할 것입니다. 놈들의 공작으로 인해 우리 성계는 걷잡을 수 없을 정도로 부패하고 말았습니다.\n\n하지만 이제 와서 §Y$NESS_GRAND_ARCHIVE$§!를 포기할 수는 없습니다. 해적 놈들을 무찌를 수만 있다면 보물은 우리의 차지가 될 것입니다."
 grand_archive.8545.a: "싸움은 아직 끝난 게 아닙니다."
 grand_archive.8550.name: "파괴 공작 이상의 노력"
 grand_archive.8550.desc: "§Y$NAME_BlackNeedle$§!이 우리의 기반 시설을 파괴하려고 끈질기게 노력했지만, 다행히도 금방 복구하고 안정을 찾을 수 있었습니다. 놈들의 공작원도 처리했으니, 이제 [hoard_system.GetName]에 모인 함대를 무찌르고 [root.GetName]의 이름으로 §Y$NESS_GRAND_ARCHIVE$§!를 차지하는 일만 남았습니다."
 grand_archive.8550.a: "진행하세요."
 grand_archive.8555.name: "$NAME_BlackNeedle$ 격파"
 grand_archive.8555.desc: "§Y$NAME_BlackNeedle$§!은 우리 군에게 상대도 되지 않았습니다. 힘겹게 모은 함대가 격파되었으니 놈들도 더 이상 우리 성계에 파괴 공작을 할 수 없을 것입니다. 이제 [root.GetName]의 이름으로 §Y$NESS_GRAND_ARCHIVE$§!를 마음 놓고 차지할 수 있습니다."
 grand_archive.8555.a: "시시해 죽겠군요."
 grand_archive.8555.a.lom: "한심한 풋내기들 같으니."
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT: "$NAME_BlackNeedle$의 최후의 저항"
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_DESC: "[root.GetName] 성계에 끈질기게 파괴 공작을 벌이던 $NAME_BlackNeedle$이 §H$NESS_GRAND_ARCHIVE$§! 주위에 방어선을 구축했습니다. 파괴 공작에 상당한 자원을 쏟아부은 만큼, 놈들도 분명 만전의 상태는 아닐 겁니다. 이 함대를 격파하면 해적단을 무너뜨릴 수 있으며, 그렇게 되면 보물도 마음 놓고 차지할 수 있을 것입니다."
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_TOOLTIP: "§R[solar_system.GetName]에 있는 $NAME_BlackNeedle$을 격파하세요.§!"
 grand_archive.8560.name: "$grand_archive.8410.name$"
 grand_archive.8560.desc: "네스의 아이들이라... 참으로 아이러니하군.\n\n네스는 네놈들을 선택했다는 건가...\n\n그 많은 종족 중에서 너희를 선택하다니, 너희에게서 특별한 뭔가를 보기라도 한 건가...? 뭐, 아니면 그냥 운이 좋았던 거일 수도 있겠지. 어느 쪽이든 결과는 결과인 법.\n\n그래, 당장은 네놈들의 승리를 인정하마. 이 승리를 절대 가벼이 여기지 마라. 네놈들은 우리한테 찍혔으니까. 우리 §Y$NAME_BlackNeedle$§!은 치욕을 잊지도, 용서하지도 않는다.\n\n우리는 선조가 그래왔듯 계속 살아남을 거다. 잃어버린 것을 하나하나 재건하고 말 테다. 수천, 아니, 수백만 년이 걸려도 다시 돌아와서 네놈들에게 빼앗긴 모든 걸 되찾으리라!\n\n$NAME_BlackNeedle$이여, 영원하여라! 영원하여라!"
 grand_archive.8560.a: "어디 두고 봅시다."
 grand_archive.8560.a.lom: "어서 꺼져라, 패배자 놈들."
 CAPTAIN_NESS_HOARD_PROJECT: "네스 선장의 보물 더미"
 CAPTAIN_NESS_HOARD_PROJECT_DESC: "§H$NESS_GRAND_ARCHIVE$§!는 이제 우리 것입니다.\n\n버려진 폐건물처럼 보이지만, 대부분의 시스템은 여전히 작동하고 있습니다. 지금까지 파악한 §H$NAME_CaptainNess$§!의 성격을 고려하면, 숨겨진 보안 장치를 조심해야 합니다.\n\n보물 창고 진입로에 있는 중앙 해치에 홈이 파여 있습니다. 여기에 §H$celestial_chart$§!를 삽입하면 이 수수께끼의 해치를 열 수 있습니다."
 grand_archive.8565.name: "$NAME_CaptainNess$의 보물"
 grand_archive.8565.desc: "§Y$celestial_chart$§!는 금고의 열쇠였습니다. 우리는 이 거대 구조물의 주 해치에 지도를 넣었습니다.\n\n지도가 활성화되자 우리가 거쳤던 항성을 따라 하나의 빛줄기가 일어났고, 이윽고 고대 기계의 삐걱거리는 소리와 함께 길이 열렸습니다.\n\n금고 안에는 수천 개의 행성에서 약탈해 온 어마어마한 보물이 벽이나 바닥이 보이지 않을 만큼 가득 차 있었습니다. 섬세한 조각상이 귀금속으로 만든 무기와 나란히 놓여 있으며, 반짝이는 장신구가 오래된 화석에 걸려 있고, 복잡한 기계 장치들은 아무렇게나 쌓여 있습니다.\n\n그때, 중앙 통로로부터 금속질의 발소리가 울려 퍼졌습니다. 이윽고 액체로 가득 찬 인간형 로봇이 나타나, 적대할 의사는 없다는 듯 두 손을 높이 든 채로 우리에게 다가왔습니다. 로봇의 음성 회로가 약간의 잡음과 함께 작동을 시작했습니다.\n\n§L\"그래, 지도 조각을 전부 모은 모양이로군. 제법인데?\"§!"
 grand_archive.8565.a: "통신을 연결하세요."
 grand_archive.8565.a.lom: "안녕하세요, 선장님!"
 grand_archive.8570.desc: "§H로봇 신체로 인해 표현력이 부족함에도 불구하고, 네스 선장은 뭔가 우쭐한 듯한 표정을 지으며 우리를 반겨 주었습니다. 선장의 금속 몸체는 방금 조립한 듯 흠집 하나 없는 모습입니다. 선장은 마치 부하에게 이야기하듯 침착하면서도 거들먹거리는 말투로 말을 시작했습니다.§!\n\n지금쯤이면 내가 누군지는 이미 알고 있겠지만, 정식으로 내 소개를 하지.\n\n나는 원래 '은하계의 해적 여왕' 산다 네스였던 존재야. 지금은 기계가 되었지만.\n\n§H기계 선장은 말을 잠시 멈추더니 우리 모습을 찬찬히 살펴봅니다.§!\n\n너희 종족은 정말 오랜만에 보는 것 같군. 원시 종족치고는 제법인데!\n\n너희가 여기까지 도달하다니 솔직히 꽤 놀랐어."
 grand_archive.8570.a: "어떻게 살아 있는 겁니까?"
 grand_archive.8570.a.reply_fallen_empire: "돈을 꽤 들였거든. [fallen_empire.GetRealName] 출신 과학자들한테 몇백만 크레딧을 쥐여 주고 내 의식을 아무도 모르게 옮겨달라고 했어. 춤을 추기에는 좀 불편해졌지만, 이 정도면 돈값은 하는 것 같네.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply_curator: "돈을 꽤 들였거든. $NAME_Curator_Order$ 출신 과학자들한테 몇백만 크레딧을 쥐여 주고 내 의식을 아무도 모르게 옮겨달라고 했어. 춤을 추기에는 좀 불편해졌지만, 이 정도면 돈값은 하는 것 같네.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply: "§H기계 선장이 콘솔을 작동시키자 벽 뒤에 숨어 있던 방이 드러났습니다. 고대 냉동 수면 장치 안에는 한 생명체의 유해가 들어 있습니다.§!\n\n봐, 이게 나야. 이젠 쓸모없는 껍데기이긴 하지만, 난 좀 감상적인 성격이거든. 어때, 예쁘지?\n\n정리를 마치고 이 금고를 잠근 뒤로 내 전원을 수천 년 동안 끄고 있었어. 너희가 문을 연 덕에 재가동되어서 이렇게 이야기하고 있는 거고. 잠에 빠진 게 엊그제 같은데 신기하네..."
 grand_archive.8570.b: "이 보물은 다 어디서 모은 거죠?"
 grand_archive.8570.b.reply: "거의 다 훔친 거지, 뭐. 훔친 물건과 교환해서 얻은 것도 있고. 이래 봬도 왕년에는 은하계의 큰손이란 큰손은 전부 뜯어먹고 다녔거든. 화물선이든, 콜로서스 함선이든, 물건이 있는 함선이라면 가리지 않고 강탈했지. 뭐, 그렇게 쉽게 뺏겼다는 거 자체가 애초에 그 물건을 가질 자격이 없었다는 의미 아니겠어?\n\n가끔은... 일이 조금 엉망진창이 되기도 했지. 이터라이트 녀석들이 어떻게 됐는지 봤을 거 아냐? 그 일을 계기로 나도 조금 생각이 바뀌었어.\n\n조금 즐기자고 한 일이 그런 결과를 낳을 줄이야..."
 grand_archive.8570.c: "왜 우리를 택한 겁니까?"
 grand_archive.8570.c.reply: "믿기지 않겠지만, 좀 외로웠거든.\n\n§H기계 선장의 음성 회로가 웃음소리처럼 치직거렸습니다.§!\n\n보물을 이렇게 많이 모으면 뭐 해? 죽으면 다 끝인데. 알고 보니 난 부유해지고 싶은 게 아니라, 역사에 내 유산을 남기고 싶었던 거야. 그런데 남의 유산을 훔칠 수는 없으니, 내가 스스로 남길 방법을 궁리해 봤지.\n\n결국 방법을 찾긴 했어. 원시 종족 중 제일 괜찮아 보이는 놈들을 골라서, 걔네가 사는 행성에 보물이랑 지도를 뿌렸지. 내 지도를 가장 먼저 완성하는 녀석한테 평생의 업적을 물려주려고 했는데, 너희가 성공했다는 소리야.\n\n너희라면 분명 나랑 달리 이 보물을 잘 쓸 수 있을 거야."
 grand_archive.8570.d: "왜 이 모든 걸 거저 주겠다는 거죠?"
 grand_archive.8570.d.reply: "내 자리를 이을 녀석을 찾는다고 했잖아. 난 돈을 뜯는 것만 잘하지, 쓰는 일에는 젬병이거든.\n\n그렇다고 아무한테나 넘기긴 싫었어. 이곳에 올 만큼 똑똑하고, 내가 봐도 대견한 녀석들한테만 주려고 했지. 내 이야기를 함께 나눌 수 있을 만한 녀석들에게 말이야..."
 grand_archive.8570.e: "무슨 이야기인데요?"
 grand_archive.8570.e.reply: "음, 궁금하다면야...\n\n§H기계 선장은 콘솔을 작동시켜 벽에 디지털 영상을 투영했습니다.§!\n\n이 금고는 내 자서전이나 마찬가지야. 내 삶에서 가장 기억에 남았던 순간을 남기기 위해 거금을 들여 작가를 고용했거든. 뭐, 돈값은 하는 것 같아.\n\n§H영상은 함선의 조종석을 비추다가 유기체 시절의 네스 선장이 해적들과 찍은 사진으로 넘어갔습니다. 네스 선장의 기계 음성 회로로부터 한숨처럼 무거운 잡음이 흘러나왔습니다.§!\n\n난 한때 은하계에서 가장 악명 높은 해적이었어. 거대 기업을 파산시키고, 행성을 볼모로 삼은 적도 있었고, 제국을 파괴하기도 했지. 나한테 겁 없이 맞서는 녀석들은 모두 [root.GetSpeciesOrganName]에 칼을 박아 주거나 포로로 팔아 치웠어. 내 현상금이 얼마였냐고? 그야말로 천문학적이었다고만 말해 둘게."
 grand_archive.8570.f: "계속 이야기해 주세요."
 grand_archive.8570.f.reply: "§H선장이 부하들과 함께 인질극을 벌이고, 강도질하고, 대담한 탈출극에 성공하는 영상이 웅장한 배경 음악과 함께 투영되었습니다.§!\n\n처음에는 털려도 싼 놈들만 신중하게 골랐어. 근데 날이 갈수록 재미가 붙더라고. 그렇게 계획을 세우고, 나쁜 구석을 찾고, 실행에 옮긴 다음 즐기는 과정을 반복했어. 그런데 문제가 하나 있었어. '나쁜' 놈만 찾아서 털려니까 시간이 너무 오래 걸리는 거야. 한 단계 더 나아갈 때가 된 거지.\n\n결국에는 갖고 싶은 게 생기면 전부 다 털어가기로 했어. 현상금이 오르고 보물이 쌓이는 걸 보니까 뿌듯하더라고. 세상에 내 이름을 널리 떨쳐 절대 잊히지 않을 악당이 되었다고 생각하니, 다른 건 전부 사소하게 느껴졌어."
 grand_archive.8570.g: "그런데 왜 심경이 바뀌었죠?"
 grand_archive.8570.g.reply: "§H쑥대밭이 된 이터라이트의 모성의 모습이 비칩니다.§!\n\n이터라이트 모성에서 일이 터졌거든... 너도 봤지? 아직까지도 무선을 통해 흘러나오던 녀석들의 단말마가 기억나. 이렇게까지 할 생각은 아니었는데, 난 선을 넘어 버리고 만 거야. 변화가 필요한 순간이었지.\n\n해적질을 하는 동안 내가 발견한 게 하나 있었어. 세상사란 반복되는 거더라고. 역사는 사라지고, 교훈은 잊히며, 이윽고 다른 사람이 그 자리를 차지하지. 난 그냥 내 후계자를 찾고 싶었던 거야.\n\n바로 너희 [root.GetSpeciesNamePlural] 말이야. 너희는 내 시험을 통과했어. 이젠 전부 너희의 몫이야."
 grand_archive.8575.name: "산더미 같은 보물"
 grand_archive.8575.desc.default: "§Y$NESS_GRAND_ARCHIVE$§!에는 보물이 산더미같이 쌓여 있었습니다. 하지만 이 보물을 차지했을 때 발생할 결과를 다시 한번 생각해 봐야 합니다.\n\n쌓여 있는 보물은 모두 불법적인 방법으로 취득한 것이며, 이 보물을 가져간다면 부에 욕심이 멀어 $NAME_CaptainNess$의 악행을 용인한 것처럼 여겨질지도 모릅니다.\n\n물론, $NAME_CaptainNess$에게 당한 억울한 피해자들은 이미 오래전에 세상을 떠난 만큼, 보물을 가져간다고 해서 새로운 피해자가 생겨나는 것은 아닙니다. 또한, 우리는 §Y$NAME_BlackNeedle$§!을 처리해 은하계의 안전을 다시금 보장했습니다. 위험으로 가득한 이 기나긴 여정을 마친 우리는 그 노력에 합당한 보상을 받을 자격이 있습니다.\n\n아무튼 이 보물을 어떻게 할지 지금 결정해야 합니다."
 grand_archive.8575.desc.lom: "우주 최고의 보물 창고인 §Y$NESS_GRAND_ARCHIVE$§!가 우리 차지가 되었다니, 기쁨이 넘쳐흐르는 듯합니다.\n\n§Y$NAME_BlackNeedle$§!을 물리친 보람이 있군요! [this.GetName] 만세!\n\n어서 보물을 모조리 챙깁시다. [This.Species.GetHandNamePlural], 모두 집합!"
 grand_archive.8575.a.default: "우리가 차지합시다."
 grand_archive.8575.a.lom: "노고의 대가를 차지하세요."
 grand_archive.8575.b: "주인을 찾을 수 있는 물건은 돌려주죠."
 grand_archive.8575.c: "은하계의 모든 이들에게 보물을 나눠 주도록 하죠."
 grand_archive.8580.name: "후원자"
 grand_archive.8580.desc.1: "§H기계가 된 §Y$NAME_CaptainNess$§!은 우리가 금고를 텅 비워 버리는 모습을 보고 그 속도에 감탄을 흘렸습니다.§!\n\n부담 갖지 말고 가져가. 너흰 그럴 자격이 있어. 아, 엉뚱한 곳에 다 쏟아붓지는 말아 줘. 내 피와 땀, 그리고 눈물이 스며든 보물이니까."
 grand_archive.8580.desc.2: "§H기계가 된 §Y$NAME_CaptainNess$§!은 자신이 힘들게 모은 보물의 일부를 주인에게 돌려주겠다는 우리의 말을 듣고 당황했습니다.§!\n\n이거 실망인데. 아무것도 모르는 15대손 녀석들이 보물을 거저 받게 된다니. 남은 보물은 더 좋은 데 쓰길 바라지. 방금 그것 때문에 좀 미심쩍긴 하지만, 그래도 잘 해낼 거라 믿어."
 grand_archive.8580.desc.3: "§H기계가 된 §Y$NAME_CaptainNess$§!은 보물을 전부 나눠 주겠다는 우리의 말을 듣고 질색했습니다.§!\n\n그게 네 계획이야? 보물을 공짜로 나눠 준다고? 그 녀석들이 대체 뭘 했다고? 쯧, 아깝게 됐네.\n\n이거 실망인데. 이렇게 된 거 나한테도 함대의 지휘권을 나눠 줘. 그러면 최소한 보물을 다시 모을 수라도 있겠지."
 grand_archive.8580.desc.default: "§H이제 $NAME_CaptainNess$을 어떻게 처리할지 결정해야 합니다. 산전수전을 다 겪은 베테랑 파일럿이니 우리 군대에 사령관으로 등용한다면 큰 도움이 될 것 같습니다. 아니면 전선에 세우는 대신 차세대 파일럿을 양성하기 위한 훈련 교관으로 등용할 수도 있습니다.§!"
 grand_archive.8580.desc.no_lom: "§H그것도 아니라면, 선장을 투옥해 죄인은 반드시 벌을 받는다는 좋은 선례를 남길 수도 있습니다. 선장도 오랜 시간에 걸쳐 자신이 지은 악독한 죄를 뉘우칠 수 있을 겁니다.§!"
 grand_archive.8580.desc.gestalt: "§H이제 $NAME_CaptainNess$의 처우를 결정하는 일만 남았습니다. 강하고 자유로운 발상력을 갖춘 인물이니, 사령관으로 등용하면 적의 허를 찌르는 기발한 계략을 제시해 우리 군에 큰 보탬이 될 것입니다. 아니면 선장의 전투 경험을 우리 집단 지성에 통합해 전쟁에 대한 이해 수준을 높일 수도 있습니다.\n\n물론, [this.GetName]에서는 범죄가 용납되지 않는다는 사실을 널리 알리기 위해 선장을 감금하는 것도 하나의 방법입니다.§!"
 grand_archive.8580.a: "파일럿이 되어 주시죠."
 grand_archive.8580.a.tt: "10레벨 §Y불멸자 제독§! 획득"
 grand_archive.8580.b: "§Y당신의 지식을 우리 의식에 통합하겠습니다.§!"
 grand_archive.8580.c: "§Y신입 파일럿을 훈련해 주세요.§!"
 grand_archive.8580.d: "§R감옥에서나 썩으시죠.§!"
 grand_archive.8585.desc: "겨우 이거냐?\n\n볼일 다 봤으니 이제 치우겠다고?\n\n... 좋아, 이만 가 보지.\n\n어디 잘해 보라고."
 grand_archive.8585.a: "당신한테 빚진 것 따위 없습니다."
 grand_archive.8590.desc: "이 머저리들 같으니! 이 모든 보물을 다 주었는데, 감히 날 감금하겠다고? 넌 내 은혜를 누릴 자격이 없어! 아니, 넌 벌레만도 못한 놈이야!\n\n[this.GetName](이)여, 저주받아라!\n\n네놈들의 [this.species.GetRemnantNamePlural](은)는 공허 속에서 썩어 문드러지고, 네놈들의 이름은 역사에서 잊히게 될 거다."
 grand_archive.8590.a: "죄를 지었으면 벌을 받아야 하는 법입니다."
 grand_archive.8595.name: "$NAME_CaptainNess$ 비활성화"
 grand_archive.8595.desc: "기계의 몸으로 포로가 된 §Y$NAME_CaptainNess$§!이 감방에서 작동을 멈춘 채로 발견되었습니다. 일부러 회로에 치명적인 오작동을 유발해, 주요 시스템을 차단하고 기계 몸뚱이로 옮겨진 의식에 저장되어 있던 모든 데이터를 삭제한 것 같습니다. 감방 벽에 선장이 남긴 메시지가 남아 있습니다.\n\n§L공허에나 떨어져라...§!"
 grand_archive.8595.a: "어울리는 결말이군요."
 grand_archive.8600.name: "무지개 건너"
 grand_archive.8600.desc.common: "우리 자신의 운명을 개척할 때가 찾아 왔습니다. 따라가야 할 지도는 사라졌지만 이제 별이 우리의 길잡이가 되어 줄 것입니다.\n\n우리는 과연 무엇을 이루게 될까요? 그리고 또 어떻게 기억될까요?"
 grand_archive.8600.desc.default: "§H네스 선장§!의 보물을 발견했으니, 험난했던 모험도 이제 끝이 났습니다.\n\n$grand_archive.8600.desc.common$\n\n바로 이 순간, [this.GetName]의 이야기가 진정으로 시작되었습니다."
 grand_archive.8600.desc.lom: "정말 짜릿하고 장대한 모험이었습니다! 우리는 마침내 네스 선장의 보물을 찾아냈으며 그 어떤 함대도 우리의 적수가 되지 못했습니다.\n\n$grand_archive.8600.desc.common$\n\n일단은 자부심을 품고 [this.GetName]의 뱃머리에 오르도록 합시다. 우리의 이야기는 이제부터가 진짜 시작입니다!"
 grand_archive.8600.a.default: "전속 전진!"
 grand_archive.8600.a.lom: "요-호!"
 valuable_insight: "귀중한 통찰이군요."
 grand_archive.9960.name: "$tech_alien_cloning$"
 grand_archive.9960.desc: "[from.solar_system.GetName]에서 야생 우주 동물을 처음으로 포획하는 데 성공했습니다. 이제 적절한 연구 분야에 계속해서 투자하면, 녀석들을 더 많이 복제할 수 있을 것입니다."
 grand_archive.9960.a: "$valuable_insight$"
 grand_archive.9970.name: "변이의 잠재력"
 grand_archive.9970.desc: "[from.solar_system.GetName]에서 처음으로 우주 동물 복제에 성공했습니다.\n\n외계 생물학자들의 연구에 따르면, 우리가 마음만 먹는다면 이 생물들을 얼마든지 더 개량할 수 있다고 합니다. 다시 말해, 생체 함대에 다양한 특화 무기를 장착할 수 있다는 것입니다."
 grand_archive.9970.a: "$valuable_insight$"
 opinion_return_traceable_items_tier_1: "은하 자선 활동가"
 opinion_return_traceable_items_tier_1_tt: "우리와 전쟁 중이 아닌 비살육 제국의 £opinion£ 우호도 §G+$@opinion_return_traceable_items_tier_1_value|0$§!"
 opinion_return_traceable_items_tier_2: "$opinion_return_traceable_items_tier_1$"
 opinion_return_traceable_items_tier_2_tt: "우리와 전쟁 중이 아닌 비살육 제국의 £opinion£ 우호도 §G+$@opinion_return_traceable_items_tier_2_value|0$§!"
 wealth_distribute_favor_tier_1_tt: "각 제국으로부터 호의를 §Y1§! 획득합니다."
 wealth_distribute_favor_tier_2_tt: "각 제국으로부터 호의를 §Y2§! 획득합니다."
 leader_trait_pirate_queen: "해적 여왕"
 leader_trait_pirate_queen_desc: "평생에 걸친 속임수와 기발한 약탈 행위 끝에, 눈독을 들인 것을 절대 놓치는 법 없는 지도자로 거듭났습니다."
 captain_ness_leader_desc: "온 우주를 누비며 수많은 보물을 흩뿌린 고대 해적 여왕의 의식이 깃든 기계입니다."
 captain_ness_leader_catch_phrase: "함께 유산을 만들어 나가자고!"
