 #Relics #
 ##########
 r_the_modularium: "모듈러리움"
 r_the_modularium_desc: "자율적으로 귀중한 자원을 생산하는 모듈식 정제 시스템으로, 생산 속도가 매우 빠르지만 그만큼 많은 에너지를 소모합니다."
 the_modularium_active_effect_tt: "모듈러리움의 다음 생산량이 두배로 늘어나지만, 다음 승전보 비용도 두 배로 증가합니다."
 r_flowmetal_alloy: "플로우메탈 합금"
 r_flowmetal_alloy_desc: "이 자가 복제 소재는 접촉한 모든 금속의 화학적 결합을 강화합니다. 조립 과정에 플로우메탈을 사용하면 대규모 기계 생산 공정을 크게 개선할 수 있습니다."
 flowmetal_alloy_active_effect_tt: "수도에 §G300§! §Y로봇 £pop£ 팝§!을 생성합니다."
 r_crystallinus_diffuser: "크리스탈리너스 살포기"
 r_crystallinus_diffuser_desc: "합성 크리스탈을 강력한 신체 능력 향상 약물로 변환할 수 있는 기계입니다. 이 화학 물질은 생물학적으로 불안정하며, 일부 사용자는 장기 부전을 일으킬 수 있습니다."
 crystallinus_diffuser_active_effect_tt: "제국 내 생체 팝의 생산량이 10년 동안 100% 증가합니다. 그 후, 영향을 받은 팝의 20%가 사망합니다."
 crystallinus_diffuser_machine_empire_active_effect_tt: "10년 동안 $r_energy$ §G+100§!."
 relic_crystallinus_diffuser_opinon: "§G생체§! 제국의 우호도를 §Y+25§! 획득합니다."
 triggered_opinion_relic_crystallinus_diffuser: "$r_crystallinus_diffuser$"
 crystallinus_diffuser_modifier: "$r_crystallinus_diffuser$ 승전보"
 r_everchanging_stone: "변화무쌍 암석"
 r_everchanging_stone_desc: "환경에 따라 색상과 화학적 조성이 바뀌도록 설계된 보석으로, 곁에 놓인 물체의 특성을 모방합니다. 이 특성을 이용해 여러 물체의 분자 구성을 더 잘 이해할 수 있습니다."
 everchanging_stone_modifier: "$r_everchanging_stone$ 승전보"
 everchanging_stone_modifier_tt: "$EXHIBITION_XENO_GEOLOGY$에 전시한 ['concept_specimen']마다 다른 두 범주의 생산량 §G+$@everchanging_stone_modifier|0%$§!"
 r_pulsestone: "펄스스톤"
 r_pulsestone_desc: "위험한 자기력 파장을 뿜어내는 고준위 방사성 암석입니다. 역장 조작 분야에 혁명을 불러올 잠재력이 있지만, 방출되는 에너지를 억제하는 것은 거의 불가능합니다."
 pulsestone_modifier: "$r_pulsestone$"
 mod_scientist_lifespan_add: "과학자 수명"
 r_gavel_of_the_tribunal: "위원회의 의사봉"
 r_gavel_of_the_tribunal_desc: "이 의사봉의 손잡이에는 지금은 이미 사라진 은하계를 한때 삼두 정치로 다스렸던 이들의 이름이 적혀 있습니다. 우리 종족이 사용하기에는 너무 크지만, 그 존재만으로도 경외감을 불러일으킵니다."
 gavel_of_the_tribunal_galcom: "$r_gavel_of_the_tribunal$"
 gavel_of_the_tribunal_galcom_tt: "다음 §Y결의안§!이 통과될 때까지 £diplo_weight£ 외교적 영향력 §G+$@gavel_of_the_tribunal_galcom_diplo_weight|0%$§!"
 gavel_of_the_tribunal_no_galcom: "$r_gavel_of_the_tribunal$"
 r_celestial_resonator: "천체 공명기"
 r_celestial_resonator_desc: "경이롭고 화려한 빛을 내뿜는 기이한 장치로, 표본 근처에 두면 위력이 더욱 증가합니다."
 celestial_resonator_tt: "전시한 ['concept_specimen']마다 10 $r_unity$ 생산"
 celestial_resonator_triumph_tt: "전시한 ['concept_specimen']마다 £happiness£ §Y행복도§! §G+$@celestial_resonator_happiness|0%$§! 및 £diplo_weight£ §Y외교적 영향력§! §G+$@celestial_resonator_diplo_weight|0%$§!"
 celestial_resonator_modifier: "$r_celestial_resonator$"
 r_entangled_relay: "얽힘 중계기"
 r_entangled_relay_desc: "양자 얽힘을 이용해 원격 정보 전송 네트워크에 연결하는 고대 유물로, 은하 간 통신을 원활하게 만들어 줍니다."
 entangled_relay_modifier: "$r_entangled_relay$"
 r_prototype_vir_core: "프로토타입 VIR 코어"
 r_prototype_vir_core_desc: "거의 모든 상황에서 도움을 줄 수 있는 독립 인공 지능으로, 교사나 멘토의 역할을 효과적으로 수행합니다. 복잡한 내용을 간단한 용어로 설명하는 데 특화되어 있으며, 사용자가 현명한 결정을 내릴 수 있도록 정보를 간결하게 정리해 제공합니다."
 prototype_vir_core_modifier: "$r_prototype_vir_core$"
 r_propagandosphere: "프로파간도스피어"
 r_propagandosphere_desc: "과거 문명의 선전 영화를 보관하고 있는 홀로그램 구체입니다. 안에 담긴 영상은 지금 봐도 상당히 기발하고, 빠져드는 매력이 있습니다. 이 영상을 우리에 맞춰 다시 제작하면 군대와 국민을 고무할 수 있을 것 같습니다."
 r_executus_compendium: "행정 개론"
 r_executus_compendium_desc: "고대 문명의 평의회가 남긴 방대한 기록으로, 봉인된 캡슐 안에 보존되어 있었습니다. 페이지만 해도 수조 페이지에 달하며, 그 안에는 관료제의 최적화 방안이나 혁신적인 조직 내 도구에 관한 자세한 설명이 담겨 있습니다. 우리 정부의 행정 절차에도 고대인들이 찾은 개선 방안을 적용할 수 있을 것 같습니다."
 executus_compendium_triumph_tt: "안건을 초기 실행 비용의 10%로 실행합니다(최소 비용 3000 £unity£)."
 r_the_pattern_maker: "패턴 제작기"
 r_the_pattern_maker_desc: "동적 궤적을 모니터링하고 적 함선의 행동을 예측하는 데 있어 독보적인 능력을 자랑하는 고대 계산기입니다. 이 장치의 예측 알고리즘이 생성한 데이터 패턴은 건축 장인의 도안처럼 매우 정교합니다. 충분한 전력과 소재만 있다면, 고성능 감지기를 탑재한 특수 정찰선을 생산할 수 있습니다."
 r_the_pattern_maker_effect_tt: "§Y패턴워커§!급 정찰선을 생성합니다.\n - 매우 높은 속도 및 넓은 초공간 항로 탐지 범위"
 NAME_Patternwalker: "패턴워커"
 NAME_Patternwalker_Cloak: "$NAME_Patternwalker$"
 SENSOR_PATTERNWALKER: "관측-패턴 감지기"
 r_vaporous_mega_orchid: "증기성 거대 난초"
 r_vaporous_mega_orchid_desc: "50년에 한 번씩만 꽃을 피우는 거대한 난초입니다. 향기에는 공격성이나 불신감을 유발하는 심리 시냅스를 잠시 동안 차단하는 진정 효과가 있습니다."
 r_vaporous_mega_orchid_effect_tt: "§Y$@vaporous_mega_orchid_opinion_duration_years|0$§!년 동안 모든 비살육, 비몰락, 비기계 제국의 £opinion£ 우호도 §G+$@vaporous_mega_orchid_opinion|0$§!"
 opinion_vaporous_mega_orchid: "$r_vaporous_mega_orchid$"
 r_tiyanki_matriarch_nerve_core: "티얀키 여왕 신경 중추"
 r_tiyanki_matriarch_nerve_core_desc: "고대 우주 고래의 두뇌 조직으로, 뉴런으로 암호화된 수백 년 분량의 진화 데이터가 담겨 있습니다. 이 신경 네트워크를 해석하면, 다른 초거대 포식자의 약점과 생존 비결을 알아낼 수 있습니다."
 tiyanki_matriarch_nerve_core: "$r_tiyanki_matriarch_nerve_core$"
 celestial_chart: "천상 지도"
 r_celestial_chart_0: "수수께끼의 궤도 캡슐"
 r_celestial_chart_0_desc: "수천 년 동안이나 우리 모성의 궤도를 돌고 있던 정체 모를 캡슐입니다. 어떤 정보가 담겨 있는지는 아직 밝혀지지 않았습니다."
 r_celestial_chart_1: "$celestial_chart$"
 r_celestial_chart_1_desc: "고대 캡슐 속에서 발견된 지도의 첫 번째 조각입니다."
 r_celestial_chart_2: "$celestial_chart$"
 r_celestial_chart_2_desc: "고대 캡슐 속에서 발견된 지도로, 부분적으로 복원된 상태입니다."
 r_celestial_chart_3: "$celestial_chart$"
 r_celestial_chart_3_desc: "고대 캡슐 속에서 발견된 지도로, 거의 전부 복원된 상태입니다."
 r_celestial_chart_4: "$celestial_chart$"
 r_celestial_chart_4_desc: "전설의 해적, $NAME_CaptainNess$이 만든 방대한 천체 지도이자 데이터 뱅크입니다."
 r_celestial_chart_4_effect_tt: "우리 식민지 중 한 곳에 ['concept_treasure_vault']를 설립합니다."
 celestial_chart_upgraded_tt: "§Y$celestial_chart$§!가 새 정보로 업그레이드되었습니다."
 r_mutated_voidworm_nest: "변이 공허충 둥지"
 r_mutated_voidworm_nest_desc: "기생충 감염 없이도 번식할 수 있도록 진화한 변이 공허충의 둥지입니다. 새끼 중 일부는 불과 며칠 만에 성체로 자라날 수 있기까지 합니다."
 r_mutated_voidworm_nest_effect_tt: "수도 성계에 성체 $NAME_Frenzied_Voidworms$ 함대 생성"
 ######################################
 #Collection - Curators Interactions #
 ######################################
 CURATORS_DESIGNATION: "저희는"
 DEAD_CURATORS_DESIGNATION: "저희는 큐레이터의 마지막 잔존자로서"
 grand_archive.4121.name: "$leviathans.500.name$"
 grand_archive.4121.desc.common: "여러분께서 수많은 사람을 수용할 수 있는 §Y$grand_archive$§!를 건설했다는 소식을 들었습니다. 우리 은하계의 역사를 탐구하는 이들과 만나 지식을 공유할 수 있는 훌륭한 사업이네요. 여러분은 저희와 같은 목적을 가지신 것처럼 보이는군요.\n\n여러분의 정보 수집 활동을 도와드리고 싶습니다."
 grand_archive.4121.desc.default: "$grand_archive.4121.desc.common$ 계속해서 §Y수집품§!을 늘려 주시기만 한다면, 저희가 할 수 있는 모든 지원을 아끼지 않겠습니다."
 grand_archive.4121.desc.dead: "$grand_archive.4121.desc.common$ 저희 큐레이터는 얼마 전에 해체되고 말았지만, 세력의 마지막 잔존자로서 남은 자산을 모두 투자해 여러분이 §Y수집품§!을 늘리는 것을 도와드리겠습니다."
 leviathans.4100.desc: "물론이죠!\n\n여러분의 노력은 저희도 잘 알고 있습니다. 여러분의 §Y수집품§! 현황을 보니, 약간의 기부를 해 주신다면 다음과 같은 지원을 제공해 드릴 수 있을 것 같습니다."
 leviathans.4100.a: "그럼"
 leviathans.4100.a.aesthetic_wonder: "$leviathans.4100.a$ §Y$EXHIBITION_AESTHETIC_WONDERS$§!에 관해 더 자세히 말해 주세요."
 leviathans.4100.a.historical_item: "$leviathans.4100.a$ §Y$EXHIBITION_GALACTIC_HISTORY$§!에 관해 더 자세히 말해 주세요."
 leviathans.4100.a.xeno_geology: "$leviathans.4100.a$ §Y$EXHIBITION_XENO_GEOLOGY$§!에 관해 더 자세히 말해 주세요."
 leviathans.4100.tooltip.no_pending_reward: "큐레이터의 도움을 더 받으려면 수집품을 늘려야 합니다."
