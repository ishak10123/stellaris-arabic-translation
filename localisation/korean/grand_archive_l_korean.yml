 mod_job_treasure_gatherer_per_pop_short: "\n$VALUE$ £pop£마다 $job_treasure_gatherer$ §G+1§!"
 job_treasure_gatherer_gestalt: "보물 드론"
 job_treasure_gatherer_gestalt_plural: "보물 드론"
 job_treasure_gatherer_gestalt_desc: "온갖 희귀하고 귀중한 물건을 감정하는 능력을 보유해, 은하계 전역에서 발견되는 보물 속에서 최고의 가치를 찾아냅니다."
 mod_job_treasure_gatherer_gestalt_add: "$job_treasure_gatherer_gestalt_plural$"
