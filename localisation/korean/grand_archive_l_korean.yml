 VOIDLURE_ATTRACTED_FAUNA_TITLE: "신규 우주 유기체"
 VOIDLURE_ATTRACTED_FAUNA_DESC: "공허 미끼 하나가 우주 동물을 유인했습니다."
 NAME_Lured_Fauna: "일시적으로 유인한 동물"
 wildlife_ranch: "야생 생물 목장"
 wildlife_ranch_desc: "우리는 최선을 다해 서식지를 보존하고 거주하는 모든 종의 지속적인 번식을 도모하는 등, 토착 생명체와 협력 관계를 이루며 살아갑니다."
 wildlife_ranch_2: "야생 생물 광역"
 wildlife_ranch_2_desc: "세심한 생태계 관리를 통해 토착 생물의 거주 환경을 개선하고 더 활발히 번식할 수 있도록 만듭니다."
 wildlife_ranch_3: "야생 생물 연결체"
 wildlife_ranch_3_desc: "동물이 마음껏 돌아다닐 수 있는 거대 시설로, 거주 중인 생물이 편안하고 풍족한 생활을 영위하며 최대한 높은 품질의 자원을 생산합니다."
 hunting_grounds: "사냥터"
 hunting_grounds_desc: "온갖 사냥 기술을 익힐 수 있는 훈련 시설입니다. 재래식 무기부터 최첨단 에너지형 무기까지 다양한 병기를 사용하고 독보적인 재주와 기술을 갖춰야만 무시무시한 포식자를 해치우고 전리품으로 삼을 수 있습니다."
 hunting_grounds_2: "사냥 광역"
 hunting_grounds_2_desc: "최적의 토착 동물 사냥 환경을 제공하는 훈련 및 감시 시설입니다. 열 감지 기술을 사용해 동물의 이동 흔적을 식별하고 사냥할 가치가 있는 표적을 추적합니다."
 hunting_grounds_3: "사냥 연결체"
 hunting_grounds_3_desc: "행성의 사냥꾼들을 아낌없이 지원하는 대규모 시설입니다. 최고 품질의 무기와 추적 장비를 갖추고 있으며, 사냥꾼들은 이곳에서 사냥감의 질과 양을 극대화하기 위해 고강도의 훈련을 받습니다."
 wildlife_sanctuary: "야생 생물 보호처"
 wildlife_sanctuary_desc: "자연 서식지 내의 야생 동물을 연구하는 보호 구역으로, 개체 수를 조절하고 질병을 예방하기 위한 안전장치가 마련되어 있습니다. 야생 동물에 관한 연구는 그 자체만으로도 충분한 학술적 성과를 가져다주지만, 우리 자신의 본성을 파악하는 데도 큰 도움이 됩니다."
 wildlife_sanctuary_2: "첨단 보호처"
 wildlife_sanctuary_2_desc: "자연 서식지에 대한 개입을 최소화하는 동시에 각 개체가 식량 및 의료적 필요를 충족할 수 있도록 개별적인 보살핌을 제공하는 보호 시설입니다. 특수한 생태계를 갖추고 있기 때문에 멸종 위기에 놓인 종조차 번식시켜 생태계에 다시 도입할 수 있습니다."
 wildlife_sanctuary_3: "보호처 연결체"
 wildlife_sanctuary_3_desc: "동물이 감시 및 관리 설비의 존재를 눈치채지 못하도록 세심하게 설계된 동물 보호 시설입니다. 거주 중인 동물의 자연적인 행동에 간섭하는 것이 금지되어 있기 때문에, 가장 높은 수준의 연구 데이터를 수집할 수 있습니다."
 primal_arena: "원초적 투기장"
 primal_arena_desc: "빼어난 전사들이 맹수에 맞서 원시적인 전투를 벌이는 투기장입니다. 영웅과 괴물 사이의 목숨을 건 싸움을 구경하는 것보다 즐거운 건 없죠."
 primal_arena_2: "원초적 경기장"
 primal_arena_2_desc: "어마어마한 규모를 자랑하는 경기장으로, 이곳에서 맹수들은 일사불란한 공격을 펼칠 수 있도록 노련한 조련사로부터 훈련을 받습니다. 비스트파이터들은 이제 단지 힘만으로는 살아남을 수 없습니다. 승리를 거머쥐려면 맹수들은 물론 그 조련사들의 허를 찌르는 전략을 구사해야 합니다."
 primal_arena_3: "원초적 콜로세움"
 primal_arena_3_desc: "용사와 맹수 사이의 서사시적인 전투가 벌어지는 어마어마한 경기장입니다. 수백만의 관중을 수용할 수 있으며, 매 경기는 몇 주에 걸쳐 철저한 사전 준비가 이루어집니다."
 symbiosis_nexus: "공생 노듈"
 symbiosis_nexus_desc: "야생 동물을 받아들이기 위한 자연 보호 구역입니다. 각 동물은 우리의 정신 직조에 다양한 사고 형태를 제공합니다."
 symbiosis_nexus_2: "공생 광역"
 symbiosis_nexus_2_desc: "야생 동물을 자생 가능한 무리로 묶어 유지하는 중앙 보호 구역입니다. 지능이 낮은 동물들의 정신을 조율해 전체 정신 직조에 더 안정적인 사고를 제공합니다."
 symbiosis_nexus_3: "공생 연결체"
 symbiosis_nexus_3_desc: "모든 생명체의 정신을 하나로 묶어 집단 지성을 강화하는 거대 허브입니다."
 edict_space_fauna_exhibition: "우주 동물 전시회"
 space_fauna_exhibition: "$edict_space_fauna_exhibition$"
 edict_space_fauna_exhibition_desc: "온 은하계에서 모여든 목장주들이 소중히 기른 가축을 선보이며, '최고의 동물'이라는 영예를 손에 넣기 위해 경쟁합니다."
 edict_beasts_burden: "동물 일꾼"
 beasts_burden: "$edict_beasts_burden$"
 edict_beasts_burden_desc: "힘이 세고 건장한 가축을 가장 노동 집약적인 업무에 투입합니다."
 edict_creature_welfare: "동물 복지"
 creature_welfare: "$edict_creature_welfare$"
 edict_creature_welfare_desc: "우리에게는 보호 아래 놓인 동물의 행복을 보장할 의무가 있습니다."
 edict_crack_the_whip: "채찍질"
 crack_the_whip: "$edict_crack_the_whip$"
 edict_crack_the_whip_desc: "종족을 불문하고 어떤 유기체든 통증을 받았을 때 유사한 반응을 보입니다. 적당한 고통을 적절하게 가할 방법을 익힌다면 이들을 원하는 대로 조련할 수 있습니다."
 edict_exotic_network: "외계 신경망"
 exotic_network: "$edict_exotic_network$"
 edict_exotic_network_desc: "우리의 보호 아래 놓인 생물은 우리보다는 열등하지만, 이들의 정신 속에는 복잡한 계산을 수행하는 데 도움이 될 충분한 대역폭이 존재합니다."
 edict_defensive_instincts: "자기 보존 본능"
 defensive_instincts: "$edict_defensive_instincts$"
 edict_defensive_instincts_desc: "우리는 모두 하나입니다. 차디찬 심우주 속에서 모두의 본능이 서로 얽히게 만듭시다."
 edict_biological_overdrive: "생체 과부하"
 biological_overdrive: "$edict_biological_overdrive$"
 edict_biological_overdrive_desc: "적절한 신경 수용체를 설치하면, 아무리 열등한 생물이라도 그 정신을 한계까지 몰아붙일 수 있습니다."
 grand_archive.1060.name: "[from.GetSpaceFaunaName] 사체"
 grand_archive.1060.desc: "[from.GetSpaceFaunaNamePlural](과)와 조우한 뒤, [fromfrom.GetName]에서 같은 종의 사체를 발견했습니다. 사체는 우주 공간에 너무 장기간 노출된 탓인지 메마르고 얼어붙어 있습니다.\n\n추측해 보건대, 앞서 조우한 녀석들은 자신들의 [from.GetSpaceFaunaGroup]에서 떨어져 나온 이 개체를 찾아다니고 있던 것으로 보입니다. 우주 공간에서 자연사한 [from.GetSpaceFaunaName](을)를 연구할 소중한 기회입니다."
 TIYANKI_GROUP_NAME: "떼거리"
 SPACE_AMOEBA_GROUP_NAME: "무리"
 CRYSTAL_GROUP_NAME: "군집"
 VOIDWORM_GROUP_NAME: "군락"
 CUTHOLOID_GROUP_NAME: "집단"
 voidworm_carcass_01_object: "공허충 유해"
 carcass_01_object: "우주 동물 사체"
 CARRION_DEBRIS_PROJECT: "[met_critter.GetSpaceFaunaName] 부검"
 CARRION_DEBRIS_PROJECT_DESC: "[contact_system.GetName]에서 [met_critter.GetSpaceFaunaName]의 사체를 발견했습니다. 자연적으로 사망한 이 유해를 연구한다면, 해당 동물에 대한 이해 수준을 높일 수 있을 것입니다."
 grand_archive.1065.name: "부검 완료"
 grand_archive.1065.desc: "[contact_system.GetName]에서 발견한 [met_critter.GetSpaceFaunaName] 사체의 부검을 완료했습니다. 사체로부터 보존 상태가 양호한 생체 표본을 회수했으며, 이 표본을 통해 녀석들의 생리학적 구조를 더 잘 이해할 수 있게 되었습니다."
 grand_archive.1065.specimen_tt: "특정 동물종의 §M에픽§! ['concept_specimen']"
 NAME_BoneShip: "뼈다귀 함선"
 NAME_BoneShip_desc: "성체 티얀키의 촉수와 공허충의 이빨, 그리고 난생처음 보는 생물의 머리뼈까지, 여러 생물체의 일부분이 함선을 화려하게 수놓고 있습니다. 함선은 다양한 정밀 무기로 무장된 상태입니다."
 grand_archive.1069.name: "$NAME_BoneShip$"
 grand_archive.1069.desc: "[from.GetName]에서 특이한 모습으로 개조된 우주 함선과 조우했습니다. $NAME_BoneShip_desc$\n\n이 함선은 순진하게도 우리의 협상 제안을 받아들였고, 조종사는 곧바로 [GetExecuted]. 차지한 함선은 즉시 부대에 합류했으며, 기존 승무원의 소지품에서 쓸 만한 사냥 도감을 발견할 수 있었습니다."
 grand_archive.1069.a: "반가운 선물이군요."
 EXECUTED: "처형되었습니다"
 DEVOURED: "우리의 먹이가 되었습니다"
 grand_archive.1070.name: "$NAME_BoneShip$"
 grand_archive.1070.desc: "[from.GetName]에서 특이한 모습으로 개조된 우주 함선과 조우했습니다. $NAME_BoneShip_desc$\n\n이 함선은 온갖 주파수로 우릴 호출하고 있습니다."
 grand_archive.1070.a: "통신을 연결하세요."
 NAME_PrimalHunter: "세리즈 트'살"
 primal_hunter_desc: "커다란 사냥감을 찾아 은하계를 떠도는 노련한 사냥꾼입니다."
 primal_hunter_catchphrase: "§L\"내 수집품에 넣을 전리품을 찾고 있소.\"§!"
 grand_archive.1075.name: "$grand_archive.1070.name$"
 grand_archive.1075.desc: "§H음산한 분위기를 휘감은 세리즈에게서 흘러나오는 목소리는 마치 몇 주 동안이나 말을 하지 않은 것처럼 건조하고 갈라져 있습니다. 말투는 매우 직설적이었으며, 이쪽을 가만히 응시하는 엄숙한 눈초리는 매우 위협적이었지만 나름의 경의가 깃들어 있는 것을 느낄 수 있었습니다.§!\n\n사냥꾼으로서 나를 감명시킬 수 있는 존재는 그다지 많지 않소. 하지만 그쪽의 국민들은 다르더군.\n\n서로 가르침을 주고받으며 이익을 제공한다고 약속한다면, 나는 기꺼이 귀국의 사냥에 동참하겠소."
 grand_archive.1075.a: "당신은 누구죠?"
 grand_archive.1075.a.reply: "$NAME_PrimalHunter$이라고 하오. 이 성계에서 오랜 세월 사냥을 해 왔지. 새로운 사냥감을 찾고 있소만, 보아하니 당신들은 사냥감을 추적하는 솜씨가 꽤 좋은 것 같더군.\n\n난 별다른 목표는 없소. 그저 사냥의 짜릿함을 즐기고 싶을 뿐."
 grand_archive.1075.b: "함선에 달린 저 머리뼈는 또 뭡니까?"
 grand_archive.1075.b.reply: "최후까지 저항한 녀석이오. 꽤나 잡을 보람이 있는 녀석이었지."
 grand_archive.1075.c: "얼마나 오랫동안 우린 지켜본 겁니까?"
 grand_archive.1075.c.reply: "척 봐도 그쪽 사냥꾼들은 아직 갈 길이 멀더군.\n\n모름지기 뛰어난 사냥꾼이라면 들키지 않고 언제까지든 사냥감을 추적할 수 있어야 하는 법이오. 발사되기 직전까지 보이지 않는 총이야말로 진정 치명적인 법. 그림자 속에 숨어 있던 시간은 전혀 중요하지 않소. 언제 모습을 드러내느냐가 중요하지."
 grand_archive.1075.d: "왜 우리에게 합류하려는 겁니까?"
 grand_archive.1075.d.reply: "나는 사냥터에서 경쟁하길 바라지 않소. 다른 이와 영역을 공유하는 것을 즐기는 편은 아니오만, 귀공들과 같은 사냥감을 두고 경쟁하기보다는 손을 잡는 편이 나을 것 같더군.\n\n당신들이 추적하면, 내가 사냥하겠소."
 grand_archive.1075.hire: "채용"
 grand_archive.1075.hire_tt: "§Y$NAME_PrimalHunter$§!이 우리 제국에 §H지도자§!로 합류합니다."
 grand_archive.1075.dismiss: "거절"
 grand_archive.1080.name: "방랑 외계학자"
 grand_archive.1080.desc: "[from.GetName]의 항성 기지에서 소속이 없는 연구선과 조우했습니다. 다양한 포획 장치와 분석 도구를 갖추고 있는 것으로 보아 우주 생물의 포획과 조사에 특화된 함선인 것 같습니다.\n\n이 함선은 온갖 주파수로 우릴 호출하고 있습니다."
 grand_archive.1080.a: "통신을 연결하세요."
 NAME_PrimalRancher: "루크 카브루크"
 primal_rancher_desc: "현장 조사를 향한 열정으로 가득 찬 외계학자로, 온갖 종류의 우주 동물에 관한 연구를 섭렵했습니다."
 primal_rancher_catchphrase: "§L\"모든 생물은 저마다 이야깃거리를 간직하고 있죠. 그리고 저는 그 이야기에 귀를 기울인답니다!\"§!"
 grand_archive.1085.desc: "§H루크의 호기심 많고 꼼꼼한 눈이 손에 든 조그만 장치를 분주히 살피고 있습니다. 인사를 나누는 동안에도 무언가를 계속해서 필기하고 있는 것으로 보아 정신이 다른 곳에 가 있는 것 같긴 하지만, 태도 자체는 매우 친절하고 전문적입니다.§!\n\n저 말고도 우주 생명체를 좋아하는 분이 또 있을 줄은 몰랐네요. [root.GetName]에서 진행하고 있는 연구 내용을 살펴봤는데, 정말 유망하더라고요. 혹시 제가 여러분의 과학 부서에 합류해서 연구를 도와드릴 수 있을까요? 아, 물론 허락해 주신다면요."
 grand_archive.1085.a: "당신은 누구인가요?"
 grand_archive.1085.a.reply: "아, 내 정신 좀 봐.\n\n전 루크예요. 우주 동물을 전문으로 연구하는 연구원이죠. 팀원들과 함께 동물의 이동 경로와 신체 구조, 각 은하계의 생물 다양성 등 각종 데이터를 수집하고 분석하는 일을 해요.\n\n전 어렸을 적부터 동물이 너무 좋았거든요. 어딜 가나 풀루프를 꼭 데리고 다닐 정도로요."
 grand_archive.1085.b: "풀루프는 또 누구죠?"
 grand_archive.1085.b.reply: "은하계에서 제가 제일 좋아하는 친구죠!\n\n화면으로 보여드리고 싶은데 지금은 자고 있어서 안 되겠네요. 제 모성에서는 이 친구들을 입양해서 반려동물로 길러요. 저번에 고향에 들렀을 때 풀루프를 입양했는데, 너무 귀엽지 뭐예요. 조그만 발굽이 금속 바닥 위를 또각또각 달리는 소리부터 제 깃털을 야금야금 깨무는 모습, 그리고 조그마한 눈 사이로 털이 불쑥 튀어나온 모습까지 너무나도 사랑스럽답니다. 제가 여러분 제국에 합류하면... 여러분도 분명 풀루프한테 푹 빠질 거예요."
 grand_archive.1085.c: "우리를 어떻게 찾은 건가요?"
 grand_archive.1085.c.reply: "추적하고 있던 개체 하나가 이상 행동을 하길래 뒤따라와 봤죠. 그랬더니 여러분의 연구팀이 그 개체랑 소통을 시도하고 있더라고요. 동물을 조심스럽게 다루는 모습을 보고 우주 생명체를 소중하게 여기는 분이라는 걸 알 수 있었어요. 그래서 연구 내용을 살펴봤는데, 정말 감명스럽더라고요. 저는 쭉 저와 생각이 맞는 동료를 찾고 있었는데, 그게 바로 여러분이라는 생각이 들었어요."
 grand_archive.1085.d: "왜 우리에게 합류하려는 겁니까?"
 grand_archive.1085.d.reply: "무소속 연구자는 언제나 수입이 불안정하거든요. 물론 저는 제 연구의 가치를 믿지만, 자금을 조달하려고 돌아다니다 보면 연구할 시간이 거의 다 없어지고 말죠.\n\n[root.GetName]에 합류하면 제 전문 분야인 우주 생물 연구에 완전히 몰두할 수 있지 않을까 했어요. 이용할 수 있는 자원도 더 많으니까, 여러분의 과학 부서랑 손을 잡는다면 분명 함께 더 많은 걸 이룰 수 있을 거예요."
 grand_archive.1085.hire: "채용"
 grand_archive.1085.hire_tt: "§Y$NAME_PrimalRancher$§!가 우리 제국에 §H지도자§!로 합류합니다."
 grand_archive.1085.dismiss: "거절"
 grand_archive.1100.name: "짐승의 괴성"
 grand_archive.1100.desc: "미지의 우주로부터 매우 특이한 전자기파가 대량으로 감지되었습니다.\n\n초기 분석 결과 §Y공허충§!이 내뿜는 신호와 유사했는데, 파장이 평소보다 훨씬 더 불규칙하며 진폭 또한 커다랍니다. 추가 조사가 필요합니다."
 grand_archive.1100.a: "우려스럽군요."
 grand_archive.1105.name: "울부짖는 공허충"
 grand_archive.1105.desc: "소름 끼치는 울음소리의 진원지를 찾았습니다. [frenzied_voidworms_target.solar_system.GetName] 근처의 숨겨진 성계에 §Y공허충§!이 둥지를 틀고 있었습니다.\n\n이 성계에 거주 중인 공허충은 이전에 발견한 녀석들과는 뭔가 다릅니다. 변이를 거친 것 같습니다. 트로이카는 찾아볼 수 없으며, 성체는 모두 발정이 났는지 폭력적인 행태를 보이고 있습니다.\n\n이는 행성에서 태어난 숙주에 기생할 필요 없이 이 군체가 자체적으로 번식을 할 수 있다는 뜻이며, 매우 우려해야 할 사태입니다."
 grand_archive.1105.desc_no_homicidal: "\n이 변종이 성계 밖으로 퍼져 나간다면 은하 생태계의 균형을 모조리 무너뜨릴지도 모릅니다. 공격성이 계속해서 증가하는 걸 보니, 녀석들은 [frenzied_voidworms_target.GetName](을)를 공격할 심산인 듯합니다."
 grand_archive.1105.desc_2: "\n어서 방어 준비를 해야 합니다."
 grand_archive.1105.a: "비상, 비상이다!"
 situation_frenzied_voidworms: "광분한 공허충"
 situation_frenzied_voidworms_type: "$situation_frenzied_voidworms$"
 situation_frenzied_voidworms_desc: "명백히 변이를 일으킨 것으로 보이는 공허충 군집을 발견했습니다. 이 변종은 공격성이 증진되어 있으며, 기생하지 않고도 번식을 할 수 있습니다.\n\n우리의 존재로 인해 둥지가 자극을 받은 것으로 보이니, 이번 일은 조심스럽게 접근해야 합니다.\n\n[GetVoidwormsHostility]"
 situation_frenzied_voidworms_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_frenzied_voidworms: "공격적인 공허충이 우리 수도를 공격할 수 있습니다."
 approach_frenzied_voidworms_do_nothing: "아무것도 하지 않기"
 approach_frenzied_voidworms_do_nothing_tt: "별다른 조치를 하지 않습니다."
 approach_frenzied_voidworms_hide_presence: "존재 감추기"
 approach_frenzied_voidworms_hide_presence_tt: "공허충의 둥지가 존재하는 성계 근처에서 진행 중이던 공사를 모두 중단합니다."
 approach_frenzied_voidworms_stir_nests: "둥지 흔들기"
 approach_frenzied_voidworms_stir_nests_tt: "녀석들을 자극해 더 공격적으로 나오게 만듭니다."
 approach_frenzied_voidworms_feed_nests: "둥지에 먹이 주기"
 approach_frenzied_voidworms_feed_nests_tt: "먹이를 통해 공격성을 충분히 낮춘다면 신뢰를 얻을 수 있을지도 모릅니다."
 #Strings for GetVoidwormsHostility trigger loc script
 voidworms_hostility_hostile: "변이 공허충은 §P매우 공격적§!인 상태입니다."
 voidworms_hostility_neutral: "변이 공허충은 §S공격적§!인 상태입니다."
 voidworms_hostility_pacified: "변이 공허충은 §B진정된§! 상태입니다."
 hide_presence_modifier: "$approach_frenzied_voidworms_hide_presence$"
 hide_presence_starbase_modifier: "$approach_frenzied_voidworms_hide_presence$"
 frenzied_voidworms_killed.desc.common: "이 기괴한 돌연변이의 가장 큰 둥지를 보존했습니다. 둥지를 적절히 통제하면, 이 특이한 녀석들이 은하계에 마구잡이로 퍼지는 것을 막으면서 그 수를 늘릴 수 있을 것입니다."
 grand_archive.1165.name: "변이 공허충 파괴"
 grand_archive.1165.desc.common: "가만히 앉아 변이 공허충 떼에 당하기 전에, 먼저 녀석들의 고향 성계에 병력을 보내 선제공격을 가했습니다. 녀석들은 더 이상 [frenzied_voidworms_target.GetName]에 위협이 되지 않을 것이며, 우리 행성"
 grand_archive.1165.desc.default: "$grand_archive.1165.desc.common$과 은하 생태계의 안전은 다시금 지켜졌습니다.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.desc.homicidal: "$grand_archive.1165.desc.common$의 안전은 다시금 지켜졌습니다.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.a: "해냈군요."
 grand_archive.1170.name: "변이 공허충 제거"
 grand_archive.1170.desc.common: "변이 공허충이 제거되었습니다. 녀석들은 더 이상 [frenzied_voidworms_target.GetName]의 위협이 되지 않을 것이며, 우리 행성"
 grand_archive.1170.desc.default: "$grand_archive.1170.desc.common$과 은하 생태계의 안전은 다시금 지켜졌습니다.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.desc.homicidal: "$grand_archive.1170.desc.common$의 안전은 다시금 지켜졌습니다.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.a: "$grand_archive.1165.a$"
 grand_archive.1180.name: "변이 공허충 발견"
 grand_archive.1180.desc: "공허충 군집 하나를 둥지 근처에서 제거했는데, 알고 보니 녀석들은 특이한 변이를 거친 변종이었습니다.\n\n기생할 필요 없이 번식할 수 있는 것은 물론이고, 공격성이 매우 증대된 탓인지 비정상적으로 강력하고 강인합니다.\n\n다행히도 전리품 삼아 보존한 둥지 하나가 남아 있습니다. 둥지를 적절히 통제하면, 이 특이한 녀석들이 은하계에 마구잡이로 퍼지는 것을 막으면서 그 수를 늘릴 수 있을 것입니다."
 grand_archive.1180.a: "뜻밖이지만 반가운 소식이로군요."
 grand_archive.1185.name: "공허충 박멸"
 grand_archive.1185.desc: "식민지를 위협하던 변이 공허충 무리가 제거되었다는 소식이 전해졌습니다.\n\n예상치 못한 사태였지만, 다행히도 잘 마무리된 것 같습니다. 그 괴물들이 더는 우리 성계를 괴롭히지 않을 거라는 사실만으로도 충분한 위안이 됩니다."
 grand_archive.1185.a: "은하계가 더욱 안전해졌네요."
 grand_archive.1200.name: "공허충의 습격"
 grand_archive.1200.desc: "광분한 공허충 무리가 [frenzied_voidworms_target.solar_system.GetName](을)를 습격했습니다!\n\n공격성이 하늘 높이 치솟아 있으며, 그중 가장 큰 무리가 [frenzied_voidworms_target.GetName](을)를 노리고 있습니다.\n\n단 한 사람도 살려 두지 않을 듯한 기세입니다."
 grand_archive.1200.a: "방어 준비를 하세요."
 grand_archive.1205.name: "너무나도 큰 대가"
 grand_archive.1205.desc_common: "최선을 다했지만, 변이 공허충이 [this.GetName](을)를 완전히 장악하는 것을 막지 못했습니다. 이 광분한 괴물들의 매서운 폭격에 행성의 핵에 균열이 생겨났고, 이윽고 행성은 쪼개져 파괴되고 말았습니다. 생존자는 전무합니다.\n\n일을 마친 공허충 무리는 둥지로 되돌아갔으며, 더 이상 우리의 존재를 신경 쓰지 않는 눈치입니다. 녀석들이 그곳에 그대로 머물러 주길 바랄 뿐입니다."
 grand_archive.1205.desc.default: "$grand_archive.1205.desc_common$\n\n이 비극에서 우리가 얻은 것은 단 하나, 실수를 딛고 살아가는 방법뿐입니다."
 grand_archive.1205.desc.gestalt: "$grand_archive.1205.desc_common$\n\n주요 군체를 잃어 [event_target:victim_country.GetName]에 막대한 타격이 발생했지만, 그래도 우리는 계속해서 살아갈 것입니다."
 grand_archive.1205.a: "재건을 시작합시다."
 grand_archive.1210.name: "변이 공허충 제거"
 grand_archive.1210.desc: "[From.GetName]에서 발견한 변이 공허충 무리가 제거되었습니다. 파괴된 [avenged_homeworld.GetName]의 복수를 달성한 것입니다.\n\n이 기괴한 돌연변이의 가장 큰 둥지를 보존했습니다. 둥지를 적절히 통제하면, 이 특이한 녀석들이 은하계에 마구잡이로 퍼지는 것을 막으면서 그 수를 늘릴 수 있을 것입니다.\n\n이리하여 우리 잃어버린 행성의 유산은 계속해서 살아가게 되었습니다."
 grand_archive.1210.a: "$grand_archive.1165.a$"
 grand_archive.1220.name: "진정된 공허충"
 grand_archive.1220.desc.common: "[frenzied_home_system.GetName]에 있는 광분한 공허충의 둥지에 녀석들이 먹이로 삼는 광물을 대량으로 보낸 결과, 녀석들과 나름대로 친밀한 관계를 형성할 수 있었습니다. 녀석들은 더 이상 [frenzied_voidworms_target.GetName]의 위협이 되지 않을 것이며, 우리 행성"
 grand_archive.1220.desc.common_2: "가장 노련한 조련사들이 각고의 노력을 기울여 변이 공허충 무리를 길들였습니다. 보아하니 녀석들도 이제는 우리와 협력할 의사가 있는 것 같습니다.\n\n녀석들이 지은 둥지 중 가장 큰 둥지를 확보했으며, 이제 우리는 변이 공허충이 야생에 방치되는 일이 없도록 직접 기를 수 있습니다."
 grand_archive.1220.desc.default: "$grand_archive.1220.desc.common$과 은하 생태계의 안전은 다시금 지켜졌습니다.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.desc.homicidal: "$grand_archive.1220.desc.common$의 안전은 다시금 지켜졌습니다.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.a: "함대에 든든한 동료가 늘었군요."
 grand_archive.1220.tt: "모든 광분한 공허충 함대가 제국에 합류했습니다."
 grand_archive.7010.name: "공허 미끼 개발 완료"
 grand_archive.7010.desc.common: "우주 유기체에 관한 지식을 통달한 결과, §Y공허 미끼§!라는 시설을 개발할 수 있었습니다."
 grand_archive.7010.desc: "$grand_archive.7010.desc.common$\n\n이 항성 기지 건물은 유인하려는 우주 동물의 주 서식 성계에 건설해야 합니다. 완공된 공허 미끼는 주기적으로 동물 무리를 항성 기지로 유인합니다.\n\n일부 동물은 공격성을 보일 수 있으므로 주의가 필요합니다."
 grand_archive.7010.desc.primal_calling: "$grand_archive.7010.desc.common$\n\n이 장치는 우주의 야생 속으로 신호를 보내 공허에 숨어 있는 생명체를 유인합니다. 어떤 동물을 유인할지는 아직 알 수 없지만, 주기적으로 되돌아오는 주파수는 우리가 송신한 주파수와 동일합니다.\n\n무언가가 이쪽으로 접근 중입니다."
 grand_archive.7020.name: "고래의 노래"
 grand_archive.7020.desc: "이전에 설치한 §Y공허 미끼§!가 우주 고래 무리를 유인했습니다. [This.Capital.System.GetName](과)와 마찬가지로 §Y거대 가스 행성§!이 존재하는 성계에 서식하던 무리로 보입니다.\n\n위 사실로 미루어 보아, 공허 미끼를 제대로 활용하려면 유인할 동물의 서식지와 비슷한 환경에 설치해야 하는 것 같습니다. 다른 야생 동물을 찾으면 그 서식지 근처에도 공허 미끼를 설치할 수 있을 것입니다."
 ### Treasure Hunters
 origin_treasure_hunters: "보물 사냥꾼"
 origin_treasure_hunters_desc: "뼛속까지 모험가의 피가 흐르는 이 문명은 이제 가장 위대하고 도전적인 모험에 나서고자 합니다. 이들은 수수께끼의 지도 한 장에 모든 걸 맡긴 채, 전설의 해적이 남긴 보물을 찾기 위해 온 우주를 누빕니다."
 origin_tooltip_treasure_hunters_effects: "- 비활성화된 ['r_celestial_chart_0_desc', $celestial_chart$]를 보유한 채 시작\n- 모든 모집된 지도자가 ['concept_adventurous_spirit_trait'] 보너스 특성을 보유$NEW_LINE$- 통치자 특성: $TABBED_NEW_LINE$- ['leader_trait:leader_trait_buccaneer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_trailblazer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_treasure_hoarder']"
 START_SCREEN_TREASURE_HUNTERS: "우리 문명은 뼛속까지 모험가의 피가 흐릅니다.\n\n선조들은 잃어버린 보물을 찾고, 고대 유적을 탐험하고, 먼 옛날의 유물을 발굴하는 모험담을 남겨 후손들의 가슴을 설레게 했습니다.\n\n그렇기에 우리의 첫 우주 진출이 모험으로 이어지게 된 것도 우연이 아닌 운명이라 할 수 있습니다. 우주 공간으로 나간 우리는 정체 모를 캡슐 하나가 우리 행성의 궤도에 돌고 있는 것을 발견했습니다. 캡슐 안에는 암호화된 우주 지도가 들어 있었습니다.\n\n오랜 노력 끝에 우리는 그 지도를 해독하고 미지의 우주 공간 속으로 향하는 항로를 개척할 기술을 개발할 수 있었습니다. 이제 우리는 역사상 가장 위험하면서도 위대한 모험에 나서겠다는 의지로 뭉쳐 은하계 너머로 떠납니다."
 d_treasure_planet: "보물고"
 d_treasure_planet_desc: "귀중품을 정리, 복원, 보존할 수 있는 안전한 보관소입니다."
 concept_treasure_vault: "$d_treasure_planet$"
 concept_treasure_vault_desc: "$d_treasure_planet_desc$"
 job_treasure_gatherer: "보물 큐레이터"
 job_treasure_gatherer_plural: "보물 큐레이터"
 job_treasure_gatherer_desc: "온갖 희귀하고 귀중한 물건을 감정하는 방법을 훈련받은 이들로, 은하계 전역에서 발견되는 보물 속에서 최고의 가치를 찾아냅니다."
 mod_job_treasure_gatherer_add: "$job_treasure_gatherer_plural$"
