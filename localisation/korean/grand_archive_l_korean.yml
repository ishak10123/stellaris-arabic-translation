 ###################
 #Treasure Troves #
 ###################
 TREASURE_TROVE: "보물 창고"
 TREASURE_TROVE_DESC: "[this.GetName] 어딘가에서 해적이 잃어버린 §Y$TREASURE_TROVE$§!가 탐지되었습니다. 과연 그 안에 얼마나 많은 보물이 담겨 있을까요?"
 treasure_troves_chain_title: "보물 창고"
 treasure_troves_chain_desc: "해적들은 이 은하계의 역사 내내 약탈한 보물을 비밀스러운 보물 창고에 숨겨 왔습니다. 그 비밀 금고 중 상당수는 기억에서 잊힌 채 버려지고 말았으나, 이제는 우리 손안에 들어온 것이나 다름없습니다."
 mod_treasure_trove_reward_mult: "보물 창고 보상"
 grand_archive.6010.name: "$TREASURE_TROVE$ 발견"
 grand_archive.6010.desc: "[event_target:treasure_trove_planet.GetName]에서 어딘가로부터 흘러나오는 희미한 신호를 감지했습니다. 암호화 수준이 단순한 걸 보니, 오래전에 잊힌 옛 해적의 §Y$TREASURE_TROVE$§!에서 나온 신호인 듯합니다.\n\n조금 수고가 들겠지만, 이 창고의 비밀을 밝혀낼 수 있을 것 같습니다."
 grand_archive.6010.a: "위치를 파악하세요."
 grand_archive.6015.name: "보물 회수 완료"
 grand_archive.6015.common.1: "[event_target:treasure_trove_planet.GetName]에 있던 해적의 비밀 §Y$TREASURE_TROVE$§!에서 방어 장치를 조심스레 해제한 뒤"
 grand_archive.6015.desc: "$grand_archive.6015.common.1$, 조사를 진행해 귀중한 자원을 발견했습니다.\n\n이 뜻밖의 횡재는 요긴하게 사용할 수 있을 듯합니다."
 grand_archive.6015.desc.specimen: "$grand_archive.6015.common.1$, 조사를 진행해 밀봉된 용기에 들어 있는 고대 해적 유물을 발견했습니다. 해적의 역사가 담긴 이 유물을 수집품에 추가하겠습니다."
 grand_archive.6015.desc.specimen_extra: "추가로 이 커다란 §Y$TREASURE_TROVE$§!에 숨겨져 있던 고대 해적 유물도 발견했습니다. 해적의 역사가 담긴 이 유물은 잘 복원하기만 하면 분명 우리의 수집품을 빛내 줄 것입니다."
 grand_archive.6015.desc.pirate_ship: "버려진 §Y$TREASURE_TROVE$§!의 방어 장치를 조심스레 해제한 뒤 조사를 진행한 결과, 밑에 있는 행성의 한 지점으로 이어지는 아날로그 지도를 발견했습니다. 그곳을 찾아가 보니, 탐지 방지 배열체로 보호된 멋진 해적 전함을 발견할 수 있었습니다.\n\n[treasure_trove_pirate_ship.GetName](이)라는 이름의 이 함선을 우리 군대에 편입했습니다."
 grand_archive.6015.desc.tech: "$grand_archive.6015.common.1$, 조사를 진행해 희귀하고 가치 있는 논문이 담긴 데이터 뱅크를 발견했습니다.\n\n해적들이 이 논문을 어디서 얻은 건지는 알 수 없지만, 꽤나 쓸모 있을 것 같습니다."
 grand_archive.6015.a: "$GOOD$"
 treasure_trove_specimen_tt: "$t$['concept_specimen']을 회수하세요."
 treasure_trove_pirate_ship_tt: "$t$군용 해적선을 회수하세요."
