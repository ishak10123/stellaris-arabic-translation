 CREATURE_DESIGN_RIGHT_CLICK_TO_CANCEL_MUTATION_PAINT: "§G우클릭해서 선택된 변이 제거§!"
 CREATURE_MUTATIONS_FILTER_OBSOLETE: "구세대 변이 숨기기"
 CREATURE_MUTATIONS_FILTER_OBSOLETE_DESC: "클릭해서 진보된 기술의 등장으로 퇴보된 구세대 변이를 숨깁니다."
 SELECT_MUTATION: "변이 추가"
