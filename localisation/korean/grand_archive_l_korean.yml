 grand_archive.1002.name: "별세계 속의 생명"
 grand_archive.1002.desc.default: "우주는 생명으로 가득합니다. 최근 발견한 [from.GetSpaceFaunaNamePlural](을) 시작으로 또 어떤 우주 생명체와 조우하게 될까요?\n\n우리가 [capital_scope.GetName]의 야생 동물과 맺은 긴밀한 유대 관계는 은하적 관점에서 본다면 그다지 이상적이지 않을지도 모릅니다. 우주 공간이라는 지금까지와 완전히 다른 생태계 앞에서 우리는 중요한 기로에 서 있습니다.\n\n이 생명체들을 어떤 존재로 대해야 할까요?\n\n어떤 선택을 내리든, 그 여파는 앞으로 오랫동안 남을 것입니다."
 grand_archive.1002.desc.homicidal: "우주는 말살할 수도, 이용할 수도 있는 생명으로 가득합니다. 최근 [from.GetSpaceFaunaNamePlural](이)라는 생명체를 발견한 우리는 이제 더 많은 생명체를 찾아 나서려 합니다. 이들이 새로운 사냥감이 될지, 우리를 위해 일할 일꾼이 될지는 오로지 우리의 선택에 달렸습니다."
 grand_archive.1002.a: "표본으로 전시합시다."
 grand_archive.1002.b: "가축으로 활용합시다."
 grand_archive.1002.c: "그 유기체들은 보호해야 합니다."
 grand_archive.1002.d: "새로운 사냥감이군요."
 grand_archive.1002.d.purifier: "시체 더미로 만드세요."
 grand_archive.1002.e: "동화할 지성체가 늘었군요."
 grand_archive.1002.f: "공생해야 합니다."
 grand_archive.1002.g: "먹잇감이자 사냥감이라."
 untamed_wilds: "야생의 땅"
 untamed_wilds_desc: "야생 동물이 번성할 수 있는 광활한 보호 구역으로, 토착 생물을 지속적으로 공급합니다."
 grand_archive.1010.desc: "[Root.GetName]에 위치한 우리 식민지가 토착 §Y거대 생명체§!의 자연 서식지를 존중하는 법을 익혔습니다.\n\n이 거대한 야수는 우리가 영역을 확장하고 개발하는 동안 우리 정착지에 지속적인 이익을 제공할 것입니다."
 grand_archive.1010.a: "우리 [owner.GetWranglerJobNamePlural](이)가 이곳에서 잘 해내리라 믿죠."
