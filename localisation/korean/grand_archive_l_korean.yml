 grand_archive.10010.name: "우주 아메바 변이 프로젝트 완료"
 grand_archive.10010.desc: "실험적인 §Y우주 아메바§! 변이 프로젝트를 진행한 결과, 흥미롭고 새로운 세포 기관인 배치형 §Y$tech_unique_mutation_space_amoeba$§!를 개발할 수 있었습니다.\n\n이 공생 유기체는 근처에 있는 물체에서 에너지를 흡수해 숙주로 전달할 수 있어, 생존 가능성과 재생력을 높여 줍니다."
 grand_archive.10015.name: "티얀키 변이 프로젝트 완료"
 grand_archive.10015.desc: "실험적인 §Y티얀키§! 변이 프로젝트를 진행한 결과, §Y$tech_unique_mutation_tiyanki$§!이라는 흥미로운 강화 수단을 개발할 수 있었습니다.\n\n티얀키가 무리 내에서 소통하는 데 사용하는 본능적인 진동을 지속 가능한 최대 수준으로 증폭시켜, 근처에 있는 다른 생물의 조직을 강화할 수 있는 통제형 역장을 만들 수 있게 된 것입니다."
 grand_archive.10020.name: "공허충 변이 프로젝트 완료"
 grand_archive.10020.desc: "실험적인 §Y공허충§! 변이 프로젝트를 진행한 결과, 흥미롭게도 §Y$tech_unique_mutation_voidworm$§!이라는 변형된 번식 주기를 개발할 수 있었습니다.\n\n그 덕분에 공허충이 숙주 행성을 폭격하는 데 사용하는 기생 낭종의 생산이 증대됐고, 유충의 숫자 또한 늘어났습니다."
 grand_archive.10025.name: "쿠톨로이드 변이 프로젝트 완료"
 grand_archive.10025.desc: "실험적인 §Y쿠톨로이드§! 변이 프로젝트를 진행한 결과, §Y$tech_unique_mutation_cutholoid$§!라는 흥미로운 성과를 얻을 수 있었습니다.\n\n쿠톨로이드의 거대한 소화 기관을 개조해 쿠톨로이드가 고속 장거리 투사체를 발사할 수 있게 되었지만, 개조된 개체는 생체 구조가 크게 변형된 탓에 더 이상 적 함대를 삼킬 수 없습니다."
 grand_archive.10030.name: "크리스탈 결정체 변이 프로젝트 완료"
 grand_archive.10030.desc: "실험적인 §Y크리스탈 결정체§! 변이 프로젝트를 진행한 결과, §Y$tech_unique_mutation_crystalline_entity$§!이라는 흥미로운 성과를 얻을 수 있었습니다.\n\n이로써 결정체의 유전자를 조작해, 결정체가 심각한 외상을 당했을 경우 두 개의 독립된 개체로 분열할 수 있게 되었습니다. 이를 통해 결정체의 전투 능력이 비약적으로 향상됩니다."
 grand_archive.10030.a: "$FASCINATING$"
 leviathan_unique_mutation_project_unlock_name: "[FromFromFrom.GetShipSizeName] 변이 프로젝트"
 leviathan_unique_mutation_project_unlock_desc: "[FromFrom.solar_system.GetName]에서 발견한 [FromFromFrom.GetShipSizeName]의 유전 물질을 회수했습니다.\n\n이 생물을 복제할 지식은 없지만, 그 고유한 생물학적 구조에서 귀중한 통찰을 얻을 수 있을지도 모릅니다."
 grand_archive.10055.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10055.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10060.name: "티얀키 여왕 변이 프로젝트 완료"
 grand_archive.10060.desc: "$NAME_Elderly_Tiyanki$의 유전 물질을 사용한 실험적인 변이 프로젝트를 진행한 결과, §H$restorative_enzymes$§!라는 흥미로운 성과를 얻을 수 있었습니다.\n\n여왕의 유전 물질에 있는 복원 효소는 다른 생물의 유사한 분비샘에서도 재생산할 수 있습니다. 이를 통해 해당 생물의 구조 조직은 재생성 소재로 변이되어, 밀집된 대형을 취한 상태에서 폭발이 발생했을 때 상당히 유용할 수 있습니다."
 grand_archive.10075.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10075.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10080.name: "공허 태생체 변이 프로젝트 완료"
 grand_archive.10080.desc: "$NAME_Voidspawn$의 유전 물질을 사용한 실험적인 변이 프로젝트를 진행한 결과, §H$starborne_biology$§!이라는 흥미로운 성과를 얻을 수 있었습니다.\n\n공허 태생체의 조직은 별빛에 강하게 반응하며 다른 유기체에서 성장시킬 수도 있습니다. 또한 조직을 유지하는 데 소량의 에너지가 필요한데, 밝은 항성 근처에 있으면 성장 속도가 비약적으로 증가합니다."
