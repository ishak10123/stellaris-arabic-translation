 grand_archive.2000.name: "수많은 목소리"
 grand_archive.2000.desc: "[This.System.GetName] 성계에서 단순한 형태의 신호를 은하계 전체에 송출하고 있는 존재가 감지되었습니다. 장거리 스캐너에도 똑같은 신호가 감지되었는데, 어디서 오는 신호인지는 아직 밝혀지지 않았습니다. 신호를 의도적으로 보내는 것인지는 아직 알 수 없지만, 더 조사해 봐야 할 것 같습니다."
 grand_archive.2000.a: "더 알아보세요."
 fcsum_voidworms_2: "§H[This.ContactCountry.GetName]§!(이)가 '공허충'이라고 알려진 은하 기생충임을 발견했습니다."
 grand_archive.2005.name: "$NAME_Voidworms$"
 grand_archive.2005.desc: "광범위하게 퍼져 나가던 신호가 §H$NAME_Voidworms$§!이라는 우주 생물에서 비롯되었다는 사실을 알아냈습니다. 녀석들은 은하계 전체에 창궐해 있는 것 같습니다. 신호의 파장이 각기 다른 것으로 보아, 녀석들은 완전한 성체가 되기까지 여러 단계를 거쳐 성장하는 것 같습니다. 공격적으로 보이지는 않지만, 서로 의사소통을 나누고 있는 것으로 보아 언제든 온 은하계의 개체들과 힘을 합칠 가능성이 존재합니다."
 grand_archive.2005.a.homicidal: "이 몰지각한 짐승들을 처분하세요."
 grand_archive.2015.name: "공허충 효소"
 grand_archive.2015.desc: "공허충은 '트로이카'라고 불리는 삼인조를 구성해 짝짓기를 합니다. 트로이카를 이룬 공허충 세 마리는 끝없는 짝짓기 의식을 통해 평생을 함께하지만, 새끼를 낳으려면 다른 생물에 기생해야 합니다.\n\n이 생물은 기생종입니다.\n\n성체가 된 공허충의 번식 기관에서는 다수의 낭종이 자라는데, 이 낭종 안에는 부식성이 강한 생식 세포가 들어 있습니다. 그리고 트로이카는 서로의 생식 세포를 결합하고 숙주가 될 생물이 많이 서식하는 행성으로 보내 유충을 낳도록 합니다. 이 과정에서 공허충의 숙주가 된 생물은 사망합니다. 그래서인지 녀석들이 은하계에 충분한 숙주를 남겨 둘 수 있도록 낭종의 폭격 정도를 조정한다는 증거 또한 발견되었습니다.\n\n어쨌든 공허충 번식 효소의 능력을 우리의 필요에 맞춰 활용할 수 있을 것 같습니다. 아니면 녀석들의 번식 활동에 대항할 면역력을 개발할 수도 있습니다."
 grand_archive.2015.a: "녀석들의 번식 능력을 필요에 맞춰 응용하도록 하죠."
 grand_archive.2015.b: "역겹군요. 치료법을 찾으세요."
