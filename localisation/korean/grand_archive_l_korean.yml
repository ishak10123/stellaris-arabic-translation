 VOIDWORMS_PROJECT_DESC: "공허충의 생리와 번식 방식은 더욱 연구해 볼 가치가 있습니다."
 tech_voidworm_immunity: "공허충 면역"
 tech_voidworm_immunity_desc: "공허충 기생 치료제를 개발할 수 있습니다. 우리의 모든 식민지가 공허충의 포자 폭격에 면역을 얻습니다."
 tech_voidworm_immunity_effect: "식민지가 공허충의 폭격에 면역을 얻습니다.\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!"
