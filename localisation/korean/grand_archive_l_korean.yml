 REPAIR_ARMOR_PERCENTAGE_EFFECT: "장갑 $VALUE|Y%$ 수리"
 space_amoeba_UNIQUE_MUTATION_PROJECT: "우주 아메바 변이 프로젝트"
 space_amoeba_UNIQUE_MUTATION_PROJECT_DESC: "새로 복제된 유기체를 훈련하는 과정 중에 부상당한 우주 아메바가 새로운 기술을 사용해서 상대를 쓰러뜨렸습니다. 아메바의 편모는 훈련 상대의 천연 방어 체계에서 영양분과 소재를 빨아들임으로써, 자신의 장갑에 난 구멍을 수선하고 전투력을 회복했습니다.\n\n이 현상을 추가로 연구하면, 우주 아메바의 생체에 관한 새로운 요소를 밝혀냄으로써 전에 없던 변이를 유발할 수 있을지도 모릅니다."
 tiyanki_UNIQUE_MUTATION_PROJECT: "티얀키 변이 프로젝트"
 tiyanki_UNIQUE_MUTATION_PROJECT_DESC: "최근에 복제된 티얀키 무리가 서로 교감하며 복잡한 음성을 반복적으로 방출하는 것이 발견되었습니다. 이 음파는 쉽게 감지되지 않으며, 근처에 있는 모든 생명체의 긴장을 이완하고 진정시키는 것으로 보입니다.\n\n이 현상을 추가로 연구하면, 티얀키의 생체에 관한 새로운 요소를 밝혀냄으로써 전에 없던 변이를 유발할 수 있을지도 모릅니다."
 voidworm_UNIQUE_MUTATION_PROJECT: "공허충 변이 프로젝트"
 voidworm_UNIQUE_MUTATION_PROJECT_DESC: "일부 공허충에게 성체가 되면서 작은 낭종 같은 종양이 생긴다는 사실을 알게 되었습니다. 추가 관찰 결과, 이 혐오스러운 낭종이 자라난 개체는 일반적으로 다른 개체보다 생식력이 뛰어난 것으로 나타났습니다.\n\n이 현상을 추가로 연구하면, 공허충의 생체에 관한 새로운 요소를 밝혀냄으로써 전에 없던 변이를 유발할 수 있을지도 모릅니다."
 cutholoid_UNIQUE_MUTATION_PROJECT: "쿠톨로이드 변이 프로젝트"
 cutholoid_UNIQUE_MUTATION_PROJECT_DESC: "복제된 쿠톨로이드 하나가 과식으로 인해 위장의 내용물을 격렬하게 배출하는 것이 기록되었습니다. 그로 인한 소화액은 배출된 뒤에도 상당 시간 방사능을 유지하는 치명적인 농축 투사체라는 사실이 밝혀졌습니다.\n\n이 현상을 추가로 연구하면, 쿠톨로이드의 생체에 관한 새로운 요소를 밝혀냄으로써 전에 없던 변이를 유발할 수 있을지도 모릅니다."
 crystalline_entity_UNIQUE_MUTATION_PROJECT: "크리스탈 결정체 변이 프로젝트"
 crystalline_entity_UNIQUE_MUTATION_PROJECT_DESC: "전투 시험 중에 다수의 크리스탈 결정체가 파괴된 후 완벽하게 둘로 분열한 것을 발견했습니다. 이렇게 분열된 개체들은 저마다 생명 징후를 보였으며, 짧은 시간 동안 목숨을 유지했습니다."
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT: "$NAME_Elderly_Tiyanki$ 변이 프로젝트"
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT_DESC: "$NAME_Elderly_Tiyanki$으로부터 회수한 유전 물질로 특별한 통찰을 얻어, 어떠한 우주 동물에든 적용이 가능한 실험적 변이 프로젝트를 진행할 수 있게 되었습니다."
 voidspawn_UNIQUE_MUTATION_PROJECT: "공허 태생체 변이 프로젝트"
 voidspawn_UNIQUE_MUTATION_PROJECT_DESC: "$NAME_Voidspawn$로부터 회수한 유전 물질로 특별한 통찰을 얻어, 어떠한 우주 동물에든 적용이 가능한 실험적 변이 프로젝트를 진행할 수 있게 되었습니다."
 unique_mutation_project_unlock_desc: "[From.GetShipCategoryName] 복제를 시도한 끝에 유전적 돌파구를 찾아낼 수 있었습니다. 이 생명체의 고유한 해부학적 구조와 유전자 조작에 관한 우리의 전문 지식을 결합하면 독특한 돌연변이를 만들 수 있을지도 모릅니다."
