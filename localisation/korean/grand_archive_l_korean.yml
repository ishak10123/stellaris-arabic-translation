 #Leader Traits #
 #################
 leader_trait_buccaneer: "버커니어"
 leader_trait_buccaneer_desc: "전장에서 약탈을 벌이는 데 도가 튼 이 지도자는 그 어떤 난파선에서도 노략할 자원을 찾아낼 수 있습니다."
 leader_trait_trailblazer: "개척가"
 leader_trait_trailblazer_desc: "은하계를 개척하는 즐거움에 매료된 이 지도자는 우주의 끝자락까지 탐험하고자 합니다."
 leader_trait_treasure_hoarder: "보물 수집광"
 leader_trait_treasure_hoarder_desc: "그 어떤 보물을 손에 넣더라도 만족하는 법이 없는, 야망으로 가득 찬 지도자입니다. 귀중한 자원을 모으고 또 모으기 위해 살아갑니다."
 mod_enemy_ship_destroyed_energy_add: "파괴한 적 함선의 크기마다 $r_energy$"
 mod_deposit_increase_on_survey_chance_mult: "탐사 완료 시:\n$t$확률에 따라 자원 매장지 크기 증가"
 ##########
 #Civics #
 ##########
 civic_galactic_curators: "은하 큐레이터"
 civic_galactic_curators_desc: "이 문명은 먼 옛날부터 역사적 유물을 꼼꼼하게 모으고 보존하는 일에 매료되어 있었습니다. 하지만 은하계의 수수께끼가 눈앞에 펼쳐진 지금은 완전히 새로운 분야의 지식을 쌓아야 합니다."
 civic_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$"
 civic_corporate_galactic_curators: "골동품의 대가"
 civic_corporate_galactic_curators_desc: "이 사회는 골동품이나 수집품이 돈이 된다는 사실을 그 누구보다도 잘 알고 있습니다. 실물 투자의 전문가인 이들은 이제 우주에서 투자 기회를 찾습니다."
 civic_corporate_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$\n- £building£ §Y$building_public_relations_office$§! $megacorp_civic_branch_office_building_effect$"
 civic_hive_galactic_curators: "관리인 네트워크"
 civic_hive_galactic_curators_desc: "이 집단은 진화 과정에서 물건을 취하고, 지키고, 유지하려는 강박적인 성향을 얻게 되었습니다. 이들은 이 행동 덕분에 과거에 살아남을 수 있었고, 이제는 수집해 온 물건들을 멋지게 전시하고자 합니다."
 civic_hive_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_machine_galactic_curators: "관리인 네트워크"
 civic_machine_galactic_curators_desc: "소스 코드에 '수집과 보존'이라는 핵심 지침이 프로그래밍된 기계 지능입니다."
 civic_machine_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_galactic_curators_effects_common: "- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_galactic_archivism', £society_research£$tech_galactic_archivism$]\n- 초기 ['concept_specimen', Specimens]: 수집품 범주마다 §0$common$§! 표본 1개 보유 \n- §Y표본§!을 발견하거나 §Y$ARCHAEOLOGICAL_SITE$§!을 완료할 때마다 $r_unity$ 획득 \n- §Y큐레이터 엔클레이브§! 거래 비용: §G$@galactic_curators_curator_enclave_purchase_cost|%0$§!\n- §Y$edict_decentralized_research$§! 시행령을 시행해, §Y연구 기지§!의 생산량을 증가시키고 £job_researcher£ §Y[GetResearcher]§! 직업의 생산량은 감소"
 edict_decentralized_research: "분산 연구"
 edict_decentralized_research_desc: "가장 위대한 지식은 우리 문명 밖에 존재합니다. 은하계라는 훨씬 더 커다란 전체에 집중함으로써 우리는 우리 자신을 더욱 깊이 이해할 수 있습니다."
 MOD_COUNTRY_SPECIMEN_ACQUIRE_CHANCE_MULT: "표본 발견 확률 증가"
 councilor_galactic_curators: "최고 큐레이터"
 councilor_galactic_curators_desc: "$TITLE$(은)는 모든 표본의 보존 품질을 감독합니다."
 councilor_corporate_galactic_curators: "큐레이션 담당관"
 councilor_corporate_galactic_curators_desc: "$TITLE$(은)는 표본의 전시 및 판매를 관리합니다."
 civic_beastmasters: "비스트마스터"
 civic_beastmasters_desc: "이 사회는 우주 아메바의 먹이가 가득한 성계에서 완전한 기술적 성숙을 이루며 녀석들의 생태에 대한 깊은 지식을 획득했습니다. 이제 이들은 상호 간의 이익을 위해 우주 아메바를 양육하고, 기르고, 최종적으로는 복제하고자 합니다."
 civic_machine_beastmasters: "바이오드론"
 civic_machine_beastmasters_desc: "이 기계 지능은 모성계에서 공허 태생 생명체와 직접 교류하며 서로에게 이득이 되는 관계를 구축했고, 그 강력한 생명체를 핵심 기능에 통합하는 데 성공했습니다."
 civic_hive_beastmasters: "야생 무리"
 civic_hive_beastmasters_desc: "이 매우 유연한 군체 의식은 진화 과정에서 모성계의 공허 태생 생명체와 공생 관계를 구축했습니다. 비록 그 생명체들과 의식을 공유하지는 않지만, 같은 목표를 이루기 위해 협력합니다."
 civic_wilderness_beastmasters: "$civic_hive_beastmasters$"
 civic_wilderness_beastmasters_desc: "이 광야 공생군은 자신의 모성계에서 우주 서식 동물과의 공생을 받아들였습니다. 아직 상리 공생 지능과 완전히 통합되지는 않았지만, 이 유기체들은 협력을 통해 공동의 목표를 추진하고 있습니다."
 civic_corporate_beastmasters: "우주 목축업자"
 civic_corporate_beastmasters_desc: "원래는 최정예 목축업자 길드였던 거대 기업으로, 모성계에 존재하는 공허 태생 생명체를 기르고 돌볼 수 있는 기술을 개발했습니다."
 civic_beastmasters_common_effects_1: "$t$- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$$t$- ['technology:tech_gravity_wells', £physics£$tech_gravity_wells$]$TABBED_NEW_LINE$$t$- ['technology:tech_alien_cloning', £society£$tech_alien_cloning$]$TABBED_NEW_LINE$- $AVAILABLE_STARBASE_BUILDINGS$ ['concept_beastport', 비스트포트]$TABBED_NEW_LINE$- $HOME_SYSTEM$ ['concept_beastport'] 하나를 보유한 채 시작"
 civic_beastmasters_ships: "$t$- 시작 §Y군용 함선§!이 §Y우주 아메바§!로 대체"
 civic_beastmasters_common_effects_2: "$t$- 시작 £genetic_material£ ['concept_dna']:$TABBED_NEW_LINE$$t$- §0일반§! 우주 아메바"
 civic_beastmasters_effects: "$civic_beastmasters_common_effects_1$\n$civic_beastmasters_ships$\n$civic_beastmasters_common_effects_2$"
 civic_corporate_beastmasters_effects: "$civic_beastmasters_common_effects_1$\n$civic_beastmasters_ships$\n$civic_beastmasters_common_effects_2$\n$t$- £building£ §Y$building_food_conglomerate$§! $megacorp_civic_branch_office_building_effect$"
 civic_cordyceptic_beastmasters_effects: "$civic_beastmasters_common_effects_1$$TABBED_NEW_LINE$- §Y불사자 우주 아메바§! 대신 §Y복제된 우주 아메바§!를 보유한 채 시작\n$civic_beastmasters_common_effects_2$"
 councilor_beastmasters: "비스트로드"
 councilor_beastmasters_desc: "$TITLE$(은)는 고도로 전문화된 명예로운 역할로, 주로 우주 동물 함선을 관리하고 전략적으로 배치하는 업무를 수행합니다."
 councilor_corporate_beastmasters: "수석 목축업자"
 councilor_corporate_beastmasters_desc: "$TITLE$(은)는 건강한 우주 동물 함선의 지속적인 공급을 보장합니다. 이 동적인 역할을 수행하는 데는 물류, 생태학, 축산 등 다양한 분야에 걸친 전문 지식이 요구됩니다."
 civic_tooltip_not_beastmasters: "['concept_beastmasters_civic'] 사회 제도를 보유하지 않음"
 concept_beastmasters_civic: "$civic_beastmasters$"
 concept_beastmasters_civic_desc: "$concept_beastmasters_civic$ 사회 제도는 다음으로 구성됨 $NEW_LINE$- ['civic:civic_beastmasters']$NEW_LINE$- ['civic:civic_hive_beastmasters'] $NEW_LINE$- ['civic:civic_machine_beastmasters'] $NEW_LINE$- ['civic:civic_corporate_beastmasters']"
