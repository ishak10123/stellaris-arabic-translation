 #Voidworms Plague Crisis #
 ###########################
 production_surge_modifier: "생산 급증"
 public_distrust_modifier: "대중 불신"
 test_subject_unwilling_modifier: "피험체"
 test_subject_volunteer_modifier: "$test_subject_unwilling_modifier$"
 test_subject_gestalt_modifier: "$test_subject_unwilling_modifier$"
 grand_archive.2310.name: "공허충 역병"
 grand_archive.2310.desc.default: "은하계의 $NAME_Voidworms$ 개체 수가 아주 위험한 수준에 도달했습니다. 녀석들의 행동이 뚜렷하게 변한 게 느껴집니다.\n\n이전까지와는 다르게, 더는 숙주로 삼은 개체군을 일부조차 살려 두지 않는 것 같습니다. 마치 번식지의 지속 가능성을 더 이상 신경 쓰지 않는 것처럼 말입니다.\n\n우리의 모든 식민지에 적색경보가 발령됐습니다. 어떤 성계든 성계 내에 $NAME_Voidworms$가 있다면 매우 신중히 대처해야 합니다.\n\n이대로면 온 은하계가 녀석들의 번식지가 되어 버릴지도 모릅니다."
 grand_archive.2310.desc.tech: "$grand_archive.2310.desc.default$\n\n이전에 확보했던 공허충 포자에 대한 면역은 효과가 예전만 하지 못합니다. 원점으로 돌아가 다시 시작해야 합니다."
 grand_archive.2310.desc.nocontact: "은하계 전역에 우려스러운 소식이 퍼지고 있습니다. '공허충'이라고 하는 처음 알려진 우주 동물이 닥치는 대로 번식해 대고 있다고 합니다. 보고에 따르면, 이 동물들은 적절한 방어 체계를 갖추지 않은 행성에 아주 심각한 위협이 될 수 있습니다. 우리 제국의 모든 식민지에 적색경보가 발령됐습니다."
 grand_archive.2310.a: "$DISTURBING$$DOTDOTDOT$"
 situation_voidworm_plague: "공허충 역병"
 situation_voidworm_plague_type: "$situation_voidworm_plague$"
 situation_voidworm_plague_desc: "$NAME_Voidworms$이 창궐했습니다.\n\n녀석들은 이제 숙주로 삼은 행성을 번식지로 남겨 두지 않습니다. 어서 녀석들을 박멸하지 않으면 모든 식민지가 위기에 처할 것입니다.\n\n§Y공허충을 제거할 때마다 상황의 진행도가 증가합니다.§!"
 situation_voidworm_plague_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_voidworm_plague: "소유한 식민지가 더 이상 공허충의 폭격에 당하지 않게 됩니다."
 approach_voidworm_plague_do_nothing: "아무것도 하지 않기"
 approach_voidworm_plague_do_nothing_tt: "별다른 조치를 하지 않습니다."
 approach_voidworm_plague_support_fleets: "함대 지원"
 approach_voidworm_plague_support_fleets_tt: "삶의 질을 다소 희생해서라도 군사 함대를 지원해 공허충의 위협에 맞섭니다.\n상황 $SITUATION_MONTHLY_CHANGE$: §G+0.5§!"
 approach_voidworm_plague_purge_infected_pops: "감염자 제거"
 approach_voidworm_plague_purge_infected_pops_tt: "$NAME_Voidworms$의 폭격을 맞은 식민지에서 더 이상 $NAME_Voidworms$이 생성되지 않습니다.\n상황 $SITUATION_MONTHLY_CHANGE$: §G+0.7§!"
 approach_voidworm_plague_search_for_cure: "치료제 모색"
 approach_voidworm_plague_search_for_cure_tt: "$NAME_Voidworms$의 생물학적 순환 구조를 깰 방법을 찾는다면, 녀석들은 더 이상 이 은하계에서 번식할 수 없게 될 것입니다.\n상황 $SITUATION_MONTHLY_CHANGE$: §G+1.0§!"
 change_approach_will_temporarily_lock: "§S이 접근 방식을 선택하면, 앞으로 §Y$@voidworm_plague_approach_cooldown_years|0$년§! 동안 다른 접근 방식을 이용할 수 없습니다.§!"
 too_early_to_change_approach: "§S상황 접근 방식을 바꾸기에는 너무 이릅니다.§!"
 voidworm_crisis_eradicate_chain_title: "$NAME_Voidworms$ 박멸"
 voidworm_crisis_eradicate_chain_desc: "공허충 개체 수가 지나치게 늘어나 은하계의 존속을 위협하는 수준에 이르렀습니다. 반드시 녀석들을 박멸해야 합니다.\n\n아직 파괴되지 않은 §Y공허충 둥지§!를 전부 발견했습니다."
 voidworm_system_poi_title: "[prev.GetName] 파괴"
 voidworm_system_poi_desc: "이 성계에서 §Y공허충 둥지§!가 발견되었습니다.\n\n기생충이 더 생성되는 것을 막으려면, 둥지를 파괴해야 합니다."
 #Voidworms Plague Crisis Random Events #
 grand_archive.2400.name: "여분의 부품"
 grand_archive.2400.desc: "$NAME_Voidworms$에 대항하기 위해 함대 지원을 늘리고 정비 프로토콜을 개선한 결과, 뜻밖에도 여분의 부품이 남았습니다. 이 소재를 사용하면 단기간에 새 함대를 만들 수 있을 것 같습니다."
 grand_archive.2400.a: "함대 충원에 투자하세요."
 grand_archive.2400.b: "그대로 남겨 두죠."
 grand_archive.2405.name: "모집령"
 grand_archive.2405.desc.default: "공허충의 위협을 극복하려고 계속 노력한 덕에, 이 노력에 영감을 받은 젊은 사령관들이 등장했습니다. [this.GetName]의 노련한 시민들은 위험에 빠진 은하계를 구하기 위해 기꺼이 힘을 빌려줄 것입니다."
 grand_archive.2405.desc.gestalt: "공허충의 위협을 극복하려고 계속 노력한 덕에 사령관급 지도자 노드를 더 생산할 수 있게 되었습니다. 함대에 추가 지원을 제공함으로써 더 많은 자원을 확보하였고, 이를 바탕으로 이 전투 중심 노드를 신속하게 군사력에 보탤 수 있게 되었습니다."
 grand_archive.2405.a: "멋지군요."
 grand_archive.2405.tt: "§H$RECRUITABLE_LEADERS$§!를 갱신하고, 레벨이 하나 더 높은 §H사령관§!을 3명 추가합니다."
 grand_archive.2410.name: "일선 개발"
 grand_archive.2410.desc.default: "[random_shipyard.GetName]에 배치된 기술자가 새로운 함선 방어 시스템을 고안해 냈습니다. 공허충과 싸우던 이 기술자는 여느 때처럼 정비를 하던 중에 함선의 내구도를 증대해 줄 새로운 부품을 구상했다는 듯합니다. 이 기술자가 연구 부서에 발표한 내용을 들어보니, 꽤 잠재력이 있어 보입니다."
 grand_archive.2410.desc.gestalt: "[random_shipyard.GetName]에 배치된 수리 [root.GetIndividualName] 하나가 함선 방어 시스템을 개선하는 데 도움이 될 영감을 주었습니다. 이 [root.GetIndividualName](은)는 여느 때처럼 정비를 하던 중 지시 사항이 잘못 전달되는 바람에 이상한 방식으로 소재를 조합한 끝에 새로운 방어 부품을 만들었습니다. 연구 가능성을 조사한 결과, 이 우연한 발견은 조금만 다듬으면 큰 잠재력을 발휘할 수 있을 것으로 보입니다."
 grand_archive.2420.name: "[infected_leader.GetName]의 감염"
 grand_archive.2420.desc: "[infected_leader.GetName](이)가 임무 수행 중에 활성화된 공허충 포자에 감염되었습니다. 지도자는 머지않아 몸속에서 자라난 유충에 의해 신체를 파괴당해 사망하고 말 것입니다.\n\n이미 가망이 없어 보이지만, 의료진의 말에 의하면 신경계에 완전히 엉겨 붙기 전에 [infected_leader.GetName]의 몸에서 유충을 떼어낼 수 있다고 합니다. 위험한 시술이기는 하지만, [infected_leader.GetName](은)는 그냥 죽을 바에는 이 조치를 받아 보겠다고 나섰습니다."
 grand_archive.2420.a: "그 지도자를 즉시 처분하세요."
 grand_archive.2420.b: "유충을 적출해 보죠."
 grand_archive.2425.name: "격리 실패"
 grand_archive.2425.desc.common: "감염된 소수의 [infected_planet_pop.species.GetName](이)가 [infected_planet.GetName]의 정화 작업에서 달아나 우리 성계 곳곳으로 흩어졌습니다. 시급히 조치하지 않으면 [this.GetName] 전역에 공허충 감염이 확산될 수 있습니다."
 grand_archive.2425.desc.default: "$grand_archive.2425.desc.common$ 우리 모두가 위험해지기 전에 도망친 자들을 처리해야 합니다."
 grand_archive.2425.desc.rogue: "$grand_archive.2425.desc.common$ 우리의 생체 트로피가 모두 위험해지기 전에 도망친 자들을 처리해야 합니다."
 grand_archive.2425.desc.gestalt: "$grand_archive.2425.desc.common$ 더 큰 집단이 위험해지기 전에 도망친 집단을 처리해야 합니다."
 grand_archive.2425.desc.robot: "감염된 동식물의 샘플이 어쩐 일인지 음식물로 가공된 것 같습니다. 이 실수 때문에 대량의 유기물이 공허충 기생체에 오염되었으며, 어쩔 수 없이 폐기해야 합니다."
 grand_archive.2425.a.default: "어서 쫓으세요."
 grand_archive.2425.a.default.tt: "보유한 식민지마다 유기체 팝 -1"
 grand_archive.2425.a.robot: "식량을 전부 불태우세요."
 grand_archive.2425.a.robot.tt: "감염되지 않은 모든 행성의 황폐도가 $@infected_devastation|0$ 증가"
 grand_archive.2425.b: "아무것도 하지 마세요."
 grand_archive.2425.b.tt: "우리 식민지 근처에 더 많은 공허충 유충이 나타날 수 있습니다!"
 grand_archive.2430.name: "직무 유기"
 grand_archive.2430.desc: "감염자를 정화하는 게 최선의 방안이라는 것엔 모두가 동의하지만, 많은 병사들이 이 명령을 실제로 수행하기 어려워하고 있습니다. 공허충의 위협을 받고 있다고는 해도, 도저히 같은 시민을 죽일 수는 없다고 합니다.\n\n무슨 수를 써서라도 식민지에 공허충 감염이 퍼지는 것을 막아야 합니다. 정화 과정의 일부를 자동화해서 투입되는 병사의 수를 줄일 수 있습니다. 아니면 홍보 활동을 통해 정부가 진행 중인 정화 활동의 윤리적 정당성과 필요성을 재확인시킬 수도 있습니다."
 grand_archive.2430.a: "정화 과정을 자동화하세요."
 grand_archive.2430.b: "홍보 캠페인을 개시하세요."
 grand_archive.2440.name: "옆길로 샌 돌파구"
 grand_archive.2440.desc: "공허충 역병에 대한 치료법을 찾는 과정에서 다른 생물학 분야의 연구가 더욱 진전되었습니다. 물론 기생충 박멸이 최우선 과제이긴 하지만, 앞으로 이 돌파구의 연구를 통해 분명 많은 수확을 얻을 수 있을 것으로 보입니다."
 grand_archive.2445.name: "초기 실험"
 grand_archive.2445.desc.common: "공허충 역병에 대한 이해 수준이 향상되어, 치료제의 개발로 이어질 기반이 마련되었습니다."
 grand_archive.2445.desc.default: "$grand_archive.2445.desc.common$ [owner_main_species.GetAdj](을)를 대상으로 초기 생체 실험을 진행한다면 연구를 더욱 진전시킬 수 있을 것 같습니다.\n\n윤리적인 문제가 있긴 하지만, 더 큰 목적을 달성하기 위해서라면 안전 규범을 조금 어기는 편이 현명한 처사일지도 모릅니다."
 grand_archive.2445.desc.gestalt: "$grand_archive.2445.desc.common$ 하지만 피험체로 사용할 유휴 [root.GetIndividualNamePlural]의 수급 문제로 인해 실험 과정이 계속해서 지연되고 있습니다. 아예 실험 대상으로 쓰일 [root.GetIndividualNamePlural]들을 미리 설정한다면, 치료법을 훨씬 더 빠른 속도로 개발할 수 있을 것입니다.\n\n그 과정에서 재배정된 [root.GetIndividualNamePlural]들이 이전의 직무를 수행할 수 없게 되기 때문에, 집단 전체에 피해가 발생할 수 있습니다."
 grand_archive.2445.a.default: "실험에 대해 모르는 [owner_main_species.GetNamePlural]에만 실험을 진행하세요."
 grand_archive.2445.a.gestalt: "실험을 우선하세요."
 grand_archive.2445.b.default: "자원한 대상에게만 실험을 진행하세요."
 grand_archive.2445.b.gestalt: "평소처럼 연구를 계속하세요."
 grand_archive.2445.c: "비윤리적인 실험은 안 됩니다."
 grand_archive.2450.name: "공허충 분비샘"
 grand_archive.2450.desc: "공허충의 생식 과정을 분석하던 중, 공허충 역병 치료제 개발에 큰 돌파구가 될지도 모르는 특성을 발견했습니다.\n\n이 가설을 입증하려면 야생 $voidworms_titan$의 번식 분비샘을 채취해 조사해야 하며, 활성 상태의 생식 세포를 보존하려면 $voidworms_titan$이 행성을 폭격하고 있을 때 처치해야 합니다."
 grand_archive.2450.a: "그럴 여유는 없습니다."
 grand_archive.2450.b: "분비샘을 준비하도록 하죠."
 VOIDWORM_GLANDS_PROJECT: "트로이카 번식 분비샘"
 VOIDWORM_GLANDS_PROJECT_DESC: "공허충 역병의 치료제 연구 과정에서 중대한 발견이 있었습니다. 번식 활동 중인 공허충 트로이카의 번식 분비샘을 채취하면 연구에 큰 도움이 될 것입니다."
 VOIDWORM_GLANDS_PROJECT_TOOLTIP: "§R행성을 폭격하고 있는 트로이카를 사살하고 그 잔해를 수확하십시오.§!"
 VOIDWORM_TITAN_DEBRIS_PROJECT: "$NAME_Voidworms_Troika$ 사체"
 VOIDWORM_TITAN_DEBRIS_PROJECT_DESC: "이 공허충 트로이카 사체에서 생식 능력이 남아 있는 번식 분비샘을 채취할 수 있습니다.\n\n이 기관을 연구하면 녀석들의 생물학적인 특성을 더 잘 이해할 수 있을 뿐만 아니라, 공허충 역병을 확실히 박멸하는 데에도 큰 도움이 될 것입니다."
 grand_archive.2455.name: "분비샘 회수 완료"
 grand_archive.2455.desc: "생식 능력이 남아 있는 공허충 트로이카에서 채취한 분비샘을 연구한 결과, 녀석들의 번식 주기에 관한 새로운 정보를 얻을 수 있었습니다.\n\n녀석들은 세 마리의 공허충이 한데 모여 죽을 때까지 이어지는 일종의 짝짓기 의식을 행하는데, 이때 세 마리는 각자의 유전 물질을 서로에게 균등히 분배합니다. 사실상 아예 새로운 유기체로 거듭나는 것입니다.\n\n어쩌면 이러한 유전적 변형 과정을 역이용할 수 있을지도 모르겠습니다."
 grand_archive.2500.name: "치료제 발견"
 grand_archive.2500.desc.default: "공허충 기생 감염의 치료제 개발이 완료되었습니다. 이제 우리 식민지는 공허충의 포자 폭격에 취약하지 않으며, 공허충이 은하계에서 날뛰더라도 걱정하지 않아도 됩니다."
 grand_archive.2500.desc.tech: "$grand_archive.2500.desc.default$\n\n이번에 개발한 치료제는 공허충이 어떤 변이를 거치더라도 놈들을 막아낼 수 있을 것이라고 확신합니다."
 #########################################
 #Voidworm Plague Crisis Galactic Focus #
 #########################################
 resolution_galactic_focus_crisis_voidworm_plague: "사안: 공허충 역병"
 resolution_galactic_focus_crisis_voidworm_plague_desc: "공허충 기생체는 우리 은하계를 위협합니다. 우리가 단결해서 녀석들을 막지 못한다면, 우리는 모두 먹히고 말 것입니다. 은하적 사안을 통해 이 위기에 대응해야 합니다."
 resolution_galactic_focus_crisis_voidworm_plague_effect_success: "$resolution_galactic_focus_crisis_effect_success$"
 galactic_focus_crisis_voidworm_plague: "공허충 역병 격파"
 galactic_focus_crisis_voidworm_plague_desc: "공허충 역병은 전 은하계의 위협입니다. 우리는 단결하여 이 위험한 기생충을 격파해야 합니다."
 gal_com_crisis_voidworm_pop_victims: "공허충은 영역 내의 인구에 심각한 피해를 줬습니다."
