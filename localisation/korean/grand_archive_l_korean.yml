 tech_hyper_drive_bio_integration_desc: "초공간 항로를 따라 이동하는 일은 우주 동물에게 위험할 수 있지만, 동물들의 능력을 강화하면 그런 걱정을 덜 수 있습니다."
 tech_hyper_drive_bio_integration_effect: "§H기능 잠금 해제:§! 우주 동물 초공간 드라이브 업그레이드"
 tech_sensors_bio_integration: "감지기 생체 통합"
 tech_sensors_bio_integration_desc: "우리 제국의 발달된 기술을 이용하면, 우주 동물에 주는 피해를 최소화하면서 대상의 다양한 감각 기관을 강화할 수 있습니다."
 tech_sensors_bio_integration_effect: "§H기능 잠금 해제:§! 우주 동물 감지기 업그레이드"
