 pc_cutholoid: "$pc_asteroid$"
 pc_cutholoid_desc: "$pc_asteroid_desc$"
 resolution_cutholoid_eradication: "$cutholoids$ 박멸"
 resolution_cutholoid_eradication_desc: "쿠톨로이드 무리가 문명화된 성계에서 함선을 먹어 치우도록 둬서는 안 됩니다. 무슨 수를 써서라도 녀석들을 박멸해야 합니다."
 resolution_cutholoid_eradication_tooltip: "어떤 제국이라도 국경 내에 §Y$cutholoids_plural$§!가 있다면, 이 생명체를 없애기 전까지는 §R은하법 위반§!을 저지르게 됩니다."
 resolution_repeal_cutholoid_eradication: "§R$resolution_cutholoid_eradication$ 폐지§!"
 resolution_repeal_cutholoid_eradication_desc: "[global_event_country.GetGalCommunityOrGalImperium](은)는 쿠톨로이드 종족의 무차별 학살을 명령하기 위해 존재하는 것이 아닙니다."
 resolution_repeal_cutholoid_eradication_effect_success: "§Y$resolution_cutholoid_eradication$§!을 폐지합니다."
 fcsum_cutholoids_1: "$fcsum_critters_1$"
 further_fc_cutholoids_completed: "$further_fc_amoebas_completed$"
 grand_archive.3103.name: "$resolution_cutholoid_eradication$"
 grand_archive.3103.desc: "[global_event_country.GetGalCommunityOrGalImperium]에서 더 이상 회원국의 성계에 쿠톨로이드를 남겨 둘 수 없다고 선언했습니다.\n\n[Root.GetName](은)는 쿠톨로이드를 발견한 즉시 박멸하지 않는다면 §R은하법 위반§!으로 간주됩니다."
 grand_archive.3105.name: "[this.GetSpeciesName] 영역의 $cutholoids_plural$"
 grand_archive.3105.desc: "쿠톨로이드가 [from.GetName] 성계에서 발견되었습니다. 쿠톨로이드가 위험한 해충으로 공식적으로 선언되어, 모든 [global_event_country.GetGalCommunityOrGalImperium] 회원국은 국경 내에 존재하는 모든 쿠톨로이드를 즉시 박멸해야 할 법적 의무가 있습니다.\n\n쿠톨로이드를 소유한 성계에서 쫓아내거나 박멸하기 전까지 [Root.GetName](은)는 §R은하법 위반§!으로 간주됩니다."
 grand_archive.3107.desc: "우리 소유의 [invaded_system.GetName] 성계에 아직도 쿠톨로이드가 남아 있으며, 이는 $resolution_cutholoid_eradication$ 결의안에 의해 심각한 §R은하법 위반§!으로 간주됩니다. 그 결과, [global_event_country.GetGalCommunityOrGalImperium]의 다른 회원국들이 [Root.GetName]에 가할 제재 조치에 관해 투표할 수 있게 되었습니다."
 grand_archive.3011.name: "과학선 실종"
 grand_archive.3011.desc: "한 과학선이 [cutholoid_under_radar.solar_system.GetName]에 있는 이상한 소행성을 조사하던 중에 갑자기 연락이 두절되었습니다.\n\n마지막으로 확인된 위치에서 약한 구조 신호가 감지되고 있습니다. 실종된 과학선을 찾으려면 추가 조사가 필요합니다."
 grand_archive.3011.a: "큰일이군요."
 grand_archive.3012.name: "소행성 생물 발견"
 grand_archive.3012.desc: "§H[from.solar_system.GetName]§!(을)를 둘러보던 중에 이 괴상한 소행성 생물이 또 하나 발견되었습니다.\n\n이 위험한 괴물들에 관해 더 알게 되기 전까지 §H과학선§!을 가급적 이 성계에 접근시키면 안 됩니다."
 grand_archive.3012.a: "계속 조사하세요."
 grand_archive.3016.name: "반갑지 않은 깜짝 선물"
 grand_archive.3016.desc.default: "[fromfrom.GetName]의 소행성 안에 거대한 생물이 소행성을 껍데기 삼아 살고 있었습니다.\n\n우리는 이 생물을 파괴하는 데 성공했고, [this.GetName](을)를 되찾았습니다. 앞으로는 소행성을 조사할 때 주의를 기울여야 할 것 같습니다.\n\n더 많은 녀석이 소행성 속에서 먹잇감을 기다리고 있을지도 모릅니다."
 grand_archive.3016.desc.leader_killed: "$grand_archive.3016.desc.default$ 안타깝게도, [leader.GetName](은)는 회복이 불가능한 부상을 입고 말았습니다."
 grand_archive.3018.name: "짐승의 배에서 나온 과학선"
 grand_archive.3018.desc: "§H[current_system.GetName]§!에서 실종되었던 과학선이 돌아왔습니다!\n\n§H[leader.GetName]§!의 보고에 의하면 소행성 안에 숨어 있던 우주 괴물이 함선을 통째로 삼켰는데, 선체가 부서지기 직전에 갑자기 뱉어냈다고 합니다. 우리가 개입하기 전에, 무언가 다른 것이 그 생명체를 놀라게 한 것 같습니다.\n\n자세한 정보를 알아내기 전까지는 소행성대 주변을 다닐 때 주의를 기울여야 할 것 같습니다."
 grand_archive.3018.a: "다행이군요."
 grand_archive.3020.name: "과학선 손실"
 grand_archive.3020.desc: "[from.GetName]에서 흘러나오던 구조 신호가 끊겼습니다. 아무래도 과학선 [from.GetName]호를 완전히 잃은 것 같습니다."
 alert_mia_fleet_eaten_title: "$alert_mia_title$"
 alert_mia_fleet_eaten_instant: "소행성을 조사하던 과학선의 연락이 두절되었습니다. 마지막으로 확인된 위치에서 미약한 구조 신호가 감지됩니다."
 cutholoid_discovered_chain_title: "[this.GetName] 회수"
 cutholoid_discovered_chain_desc: "[cutholoid_under_radar.solar_system.GetName]에서 과학선 [this.GetName]호와의 통신이 두절되었습니다.\n\n교신 내역을 확인한 결과, 근처에 있던 소행성인 [cutholoid_under_radar.GetName]의 탐사를 시작했다는 보고가 마지막었습니다.\n\n이 성계에 다시 진입하려면 주의가 필요할 것 같습니다."
 HIDDEN_CUTHOLOID_ATTACK_PROJECT: "소행성 파괴"
 HIDDEN_CUTHOLOID_ATTACK_PROJECT_DESC: "소행성 [cutholoid_under_radar.GetName]의 겉모습에 속아서는 안 됩니다. [this.GetName](을)를 완전히 잃기 전에 대규모의 군부대를 동원해서 과학선을 회수해야 합니다."
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT: "소행성 확보"
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT_DESC: "소행성 [cutholoid_under_radar.GetName]의 겉모습에 속아서는 안 됩니다. 적절한 기술을 활용하면, [this.GetName]호를 완전히 잃어버리기 전에 소행성을 확보하고 과학선을 되찾을 수 있을 것입니다."
 grand_archive.2800.name: "거짓 소행성"
 grand_archive.2800.desc: "§H[This.System.GetName]§!에서 조우한 특이한 소행성에는 지성이 있는 것 같습니다. 이 존재의 궤도에 함부로 들어가는 것은 매우 위험할 것으로 보이며, 정보를 더 얻기 전까지는 과학선도 이 생물이 서식하는 성계를 피하는 편이 좋겠습니다."
 grand_archive.2800.a: "계속 조사하세요."
 grand_archive.2900.name: "쿠톨로이드"
 grand_archive.2900.desc: "소행성 안에 숨어 사는 우주 생물을 발견했습니다. '§H쿠톨로이드§!'로 알려진 이 생물은 수년 동안 잠복해 있다가 먹잇감을 습격하는 포식자입니다. 함선 하나를 통째로 삼킬 수 있어 매우 위험하기 때문에, 확인되지 않은 소행성대에 접근할 때는 주의를 기울여야 합니다.\n\n녀석들은 무성 생식을 하는데, 다행히 개체 수는 그다지 많지 않으며 번식에는 수백 년이 걸리는 것 같습니다."
 grand_archive.2900.a: "이 생물을 더 연구해 봐야겠습니다."
 grand_archive.2900.b: "이 포식자들을 습격해서 전부 없애 버리세요."
 grand_archive.2900.b.homicidal: "포식자가 먹잇감이 될 시간이군요."
 grand_archive.2905.name: "쿠톨로이드 껍데기"
 grand_archive.2905.desc: "쿠톨로이드 껍데기는 광물에 생체 섬유질이 단단하게 결합해 만들어졌습니다. 이 섬유질은 계속해서 성장하며, 어떤 개체의 껍데기는 절반 이상이 생체 물질로 구성되어 있을 것으로 추정됩니다.\n\n쿠톨로이드는 원래 살던 소행성에서 살기 힘들 정도로 성장하면, 다른 소행성을 찾아 결합하고 다시금 같은 과정을 반복합니다. 영역 본능이 강한 것으로 보이나, 껍데기로 삼기에 최적인 소행성 지대에서는 여러 마리가 동시에 관찰되기도 했습니다. 덩치가 가장 큰 녀석이 비교적 새로 만들어진 소행성을 차지하며, 나머지 개체 또한 별 충돌 없이 크기순으로 소행성을 선택해 자리를 맞바꿉니다. 그 결과 어떤 소행성은 수많은 개체가 거쳐 가게 됩니다.\n\n위와 같은 원인으로 인해, 크기가 작은 소행성일수록 집 주인이 자주 바뀐 만큼 다양한 생명의 흔적이 남아 있습니다. 여기서 얻은 샘플은 연구할 가치가 꽤 높아 보입니다."
 grand_archive.2905.a: "우리 우주 동물을 개량하세요."
 grand_archive.2905.b: "우리 함선을 개량하세요."
