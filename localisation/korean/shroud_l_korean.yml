 # End of the Cycle
 shroud.4715.desc.intro: "됐습니다. $end_of_the_cycle_color_article$과 계약을 맺었습니다. 거래를 받아들이자, 우리 [GetTelepathPlural]들이 다시 말합니다. §R\"끝이 시작된다.\"§!"
 shroud.4715.desc.default: "$shroud.4715.desc.intro$\n\n그리고 침묵이 찾아왔습니다. 모든 [root.GetSpeciesAdj]의 정신을 채우는, 헤아릴 수 없는 고요입니다. 한때 §H장막§!의 무수한 에너지가 우리의 모든 의식 안에서 요동치던 것과 달리, 이제 사이오닉 영역은 죽음이 드리운 듯 조용합니다.\n\n우리는 스스로 선택한 미래의 결과를 숙고할 수밖에 없었습니다."
 shroud.4715.desc.hive: "$shroud.4715.desc.intro$\n\n그리고 침묵이 찾아왔습니다. 모든 [root.GetSpeciesAdj]의 정신을 채우는, 헤아릴 수 없는 고요입니다. 한때 §H장막§!의 무수한 에너지가 우리의 [GetBrainName] 안에서 요동치던 것과 달리, 이제 사이오닉 영역은 존재하지 않는 듯한 비활성에 빠졌습니다.\n\n우리는 스스로 선택한 미래의 결과를 추정할 수밖에 없었습니다."
 shroud.4715.desc.gestalt_machine: "$shroud.4715.desc.default$"
 shroud.4715.desc.individual_machine: "$shroud.4715.desc.default$"
 shroud.4715.a.default: "그 뜻이 자비롭기를 바랍니다."
 shroud.4715.a.gestalt: "$shroud.4715.a.default$"
 shroud_whisperers_covenant_chain_title: "$whisperers_covenant_chain_title$"
 shroud_whisperers_covenant_chain_desc: "$whisperers_in_the_void_color_article$이라는 장막의 존재와 계약을 맺었습니다. 도저히 가늠조차 할 수 없는 이 존재는 일정한 대가를 받고 우리에게 자기 힘의 극히 일부를 나누어 주기로 약속했습니다.\n\n[GetTelepathPlural]들의 이론에 따르면, 우리 행동을 새로운 후원자의 의지에 맞춤으로써 그 유대를 더욱 다질 수 있다고 합니다.\n\n공허의 속삭임은 새로운 지식, 소리 없는 비밀과 음모를 좋아합니다. 이들은 온갖 지식으로 가득 차 터질 듯한 정신을 지켜보는 단순한 즐거움을 탐닉합니다."
 shroud_whisperers_covenant_chain_begin: "$whisperers_covenant_chain_begin$"
 shroud_whisperers_covenant_chain_end: "$whisperers_covenant_chain_end$"
 robot_shroud_whisperers_covenant_chain_title: "$shroud_whisperers_covenant_chain_title$"
 robot_shroud_whisperers_covenant_chain_desc: "$shroud_whisperers_covenant_chain_desc$"
 shroud.11110.title: "계속되는 순환"
 shroud.11110.desc: "§H공허의 속삭임§!이 날카롭게 움직이며 우리 정신 속 모든 것을 흐려지게 합니다. 존재는 우리와 교감하고, 우리의 정신을 지식으로 가득 채우기를 갈망합니다.\n\n우리는 돌이킬 수 없는 선택을 해야 합니다."
 shroud.11110.a: "$the_eater_of_worlds_article$를 흡수합니다."
 shroud.11110.b: "$the_cradle_of_souls_article$을 흡수합니다."
 shroud.11110.c: "$the_instrument_of_desire_article$을 흡수합니다."
 shroud.11110.d: "$the_composer_of_strands_article$를 흡수합니다."
 shroud.11120.title: "[GetBetrayedPatronColour]의 복수"
 shroud.11120.title.eater: "$the_eater_of_worlds_color_article$의 복수"
 shroud.11120.title.cradle: "$the_cradle_of_souls_color_article$의 복수"
 shroud.11120.title.instrument: "$the_instrument_of_desire_color_article$의 복수"
 shroud.11120.title.composer: "$the_composer_of_strands_color_article$의 복수"
 shroud.11120.desc: "우리 [GetTelepathPlural]들이 §H장막§!에서 나타났을 때, 우리의 배신이 [GetBetrayedPatronColour]의 강한 반발을 불러왔음을 알게 되었습니다.\n\n이제는 끝없는 황무지가 된 §H[event_target:selected_planet_for_revenge.GetName]§! 인근에 $SHROUD_TUNNEL_GALACTIC$이 나타났습니다. 우리는 터널 너머에서 격렬한 분노를 [GetFeltLoc]합니다. 우리의 후원자였던 존재가 복수를 준비하고 있습니다."
 shroud.11120.a: "방비를 철저히 해야겠군요."
 shroud.11120.a.tt: "§H[event_target:selected_planet_for_revenge.GetName]§!(이)가 §Y$pc_shrouded$§!으로 변합니다.\n이 행성 인근에 $SHROUD_TUNNEL_GALACTIC$이 나타납니다."
 shroud_tunnel_object: "$SHROUD_TUNNEL_GALACTIC$"
 shroud.11130.title: "격렬한 복수"
 shroud.11130.desc_common: "[event_target:spawn_system.GetName] 성계의 $SHROUD_TUNNEL_GALACTIC$에서 §Y$NAME_Psionic_Avatar$§!가 출현했습니다. [GetBetrayedPatronColour]의 분노가 구현된 이 존재는 이제 [capital_scope.GetName](을)를 향해 이동 중입니다."
 shroud.11130.desc_success: "다가오는 위협에 맞서 병력을 모으는 데 성공했습니다. 우리 함대가 $SHROUD_TUNNEL_GALACTIC$ 안으로 사이오닉 에너지 파동을 방출해 현실을 침범하려는 적대적 존재를 약화했습니다."
 shroud.11130.success_tt: "$NAME_Psionic_Avatar$가 힘의 절반을 지닌 채 출현합니다."
 shroud.11250.title: "끝"
 shroud.11250.desc: "무아지경 상태에 빠지자 우리 정신은 고요함에 휩싸였습니다. 이처럼 고요한 장막은 지금껏 보지 못했습니다.\n\n공허에는 어떤 목소리도 들리지 않습니다.\n\n모든 것이 사라졌습니다."
 shroud.11250.a: "이것이 바로 '끝'이겠군요."
 shroud.11255.title: "[owner.GetName]의 재탄생"
 shroud.11255.desc: "$end_of_the_cycle_color_article$이 불러온 파괴 이후, 우리는 피해를 복구하기 위해 많은 노력을 기울였습니다. 이를 위해 §H[solar_system.Star.GetStarName]§! 성계에 §H$starbase_outpost$§!를 재건했으며, [owner.GetName]의 새로운 시작을 알렸습니다."
 ACCEPT_COVENANT: "$PATRON$(과)와 계약을 맺습니다.\n§C효과:§!\n$EFFECTS$"
 REFUSE_COVENANT: "$PATRON$(과)와의 계약을 거부합니다"
 CONFIRM_COVENANT: "$PATRON$(과)와의 계약을 확정합니다."
 RENOUNCE_COVENANT: "$PATRON$(과)와의 계약을 폐기합니다."
 CREATE_RELATION: "$PATRON$(과)와 관계를 형성합니다."
 CRADLE_MARK: "요람의 표식"
 CRADLE_MARK_DESC: "$COMPOSER_MARK_DESC$"
 tech_covenant_cradle: "$CRADLE_MARK$"
 tech_covenant_cradle_desc: "$tech_covenant_composer_desc$"
 leader_trait_cradle_chosen: "요람에게 선택받은 자"
 leader_trait_cradle_chosen_desc: "$leader_trait_whisperers_chosen_desc$"
 leader_trait_shroudshaper: "장막 조형가"
 leader_trait_shroudshaper_desc: "이 지도자는 영원한 존재로서, 놀라운 사이오닉 능력을 사용해 장막을 우리 의지에 따라 형성하는 데 도움을 줍니다."
 COVENANT_EFFECTS: "§E계약 효과:§!"
 COVENANT_EATER: "§H포식자의 계약§!"
 covenant_eater_desc: "$the_eater_of_worlds_article$와의 계약으로 정복과 파괴를 향한 끝없는 허기에 사로잡힙니다."
 COVENANT_CRADLE: "§H요람의 계약§!"
 covenant_cradle_desc: "$the_cradle_of_souls_article$과의 계약이 은하계에 퍼져, 다른 이들이 우리를 우호적으로 대하게 되었습니다."
 covenant_cradle_tt: "[GetCradleCovenantTooltip]"
 covenant_cradle_bonus_tt: "$covenant_cradle_telepath_tt$\n$covenant_cradle_no_bonus_tt$"
 covenant_cradle_no_bonus_tt: "§H$PSIONIC_AURA$§! 범위 내 제국의 우호도가 중립 이하일 때 직업 유지비: §R+[GetCradleCovenantUpkeepMult]%§!"
 COVENANT_INSTRUMENT: "§H하수인의 계약§!"
 covenant_instrument_desc: "$the_instrument_of_desire_article$과의 계약으로 사치스러운 환상이 사고를 물들이며, 우리는 더욱 깊은 정신의 낙원으로 이끌립니다."
 COVENANT_COMPOSER: "§H작곡가의 계약§!"
 covenant_composer_desc: "$the_composer_of_strands_article$와의 계약이 우리 내면에서 커지며 은하계를 변화시키기 위해 뿌리를 뻗고 있습니다."
 COVENANT_WITV: "§H속삭임의 계약§!"
 covenant_whisperers_desc: "$whisperers_in_the_void_article$과의 계약으로, 장막의 가장 깊은 영역에 잠들어 있던 비밀에 담긴 지혜가 우리에게 전해집니다."
 COVENANT_EOTC: "§H$NAME_The_End$의 계약§!"
