 the_composer_of_strands_REVENGE_PROJECT: "$PATRON_REVENGE_PROJECT$"
 the_composer_of_strands_REVENGE_PROJECT_DESC: "$the_composer_of_strands_color_article_cap$$PATRON_REVENGE_PROJECT_DESC$"
 DELVING_RITUAL: "탐사 의식"
 DELVING_RITUAL_DESC: "§Y[shroudwalker_enclave_country.GetName]§!(이)가 우리를 대신해 탐사 의식을 진행하고 §H장막§!에 접근할 준비를 마쳤습니다. 과연 저 집단이 우리를 어떠한 통찰로 이끌지는 짐작조차 할 수 없습니다."
 MINDWARDENS_THE_FIRST_ENCLAVE: "첫 번째 엔클레이브"
 MINDWARDENS_THE_FIRST_ENCLAVE_DESC: "우리는 은하계 전역에서 사이오닉 감염을 종식하겠다는 위대한 임무를 더욱 큰 규모로 실행하기 위해 독립적인 §H'$gov_mindwarden_enclave$'§!를 설립할 준비를 마쳤습니다.\n\n설립된 엔클레이브는 시설을 찾아오는 이들에게 반사이오닉 서비스를 제공하고, 그에 따라 발생한 수익과 자원의 일부를 우리에게 제공할 것입니다."
 MINDWARDENS_THE_FIRST_ENCLAVE_NOTE: "지배 중인 성계에서 30 이상 규모이며 §Y$commander$§!이 이끄는 §Y$FLEET$§!를 §Y$gov_mindwarden_enclave$§!로 변환하세요."
 SHROUD_SHAPING_PROJECT: "장막 조형"
 SHROUD_SHAPING_PROJECT_DESC: "§H장막§! 속에 자리한 다양한 존재는 하나하나가 모두 거대한 힘의 축적체입니다. 그 존재들은 돌이킬 수 없는 결속을 대가로 물질 세계의 존재에 은총을 하사합니다.\n\n하지만 우리는 우리만의 길을 개척할 수 있을 것으로 보입니다. 우리의 정신을 단일한 후원자와 연결하는 대신 사이오닉 [GetResearchers]들이 각 존재로부터 소량의 에너지를 끌어와, 장막을 우리의 의지대로 조형하는 것입니다."
 EXPLORE_BORDER_SYSTEM: "[exiled_system_border.GetName] 탐사"
 EXPLORE_BORDER_SYSTEM_DESC: "장거리 영상을 통해 §H[exiled_system_border.GetName]§! 성계에서 최근 발생한 이상한 에너지 흐름을 포착했습니다. 이는 [owner.GetHomeWorldName]의 $building_ancient_ward_1$가 포착한 불규칙한 신호와 일치합니다.\n\n이 현상을 이해하려면 [exiled_system_border.GetName](을)를 탐사해야 합니다."
 EXPLORE_BORDER_SYSTEM_TOOLTIP: "§Y[exiled_system_border.GetName]§!(을)를 탐사하려면 §Y함선§! 또는 §Y함대§!를 파견하십시오."
 #==========================
 # Traits
 #==========================
 trait_tankbound: "용기 결속"
 trait_tankbound_desc: "이 종족은 통 속에 담긴 특수 생체액 속에 잠긴 채 살아갑니다. 이들은 보조 장비에 크게 의존하기 때문에 직접적인 육체 노동이 불가능합니다."
 trait_tankbound_effects: "팝 식량(또는 상응하는 자원) 유지비: §G-50%§! $TABBED_NEW_LINE$- §R노동자 직업을 가질 수 없음§!$TABBED_NEW_LINE$- §R지상군으로 모집될 수 없음§!"
 trait_tankbound_portrait_override_tt: "격리 용기에서 생활하는 종족이 필요합니다."
 trait_robot_latent_psionic: "$trait_latent_psionic$"
 trait_robot_latent_psionic_desc: "§L이 종족은 잠재적인 사이오닉 프로세서를 갖추고 있지만, 대부분의 유닛은 아직 그 기능을 일깨우지 못했습니다. 상당히 드물긴 하지만, 일부 지도자는 이 기능을 발현하기도 합니다.§!\n"
 trait_robot_psionic: "$trait_psionic$"
 trait_robot_psionic_desc: "§L이 종족의 유닛은 모두 강력한 사이오닉 하드웨어를 갖추고 있습니다. 이들은 사고 처리만으로 물질계와 비물질계를 조작할 수 있습니다.§!\n"
 trait_default_psionic_desc: "§L이 종족의 구성원은 모두 강력한 사이오닉 능력을 가지고 있습니다. 그들은 일반적으로 텔레파시를 통해 서로 소통합니다.§!\n"
 trait_hive_psionic_desc: "§L이 종족의 구성원은 모두 강력한 사이오닉 능력을 가지고 있습니다. 이들은 정신력만을 활용해 물질계와 비물질계를 조작할 수 있습니다.§!\n"
 #==========================
