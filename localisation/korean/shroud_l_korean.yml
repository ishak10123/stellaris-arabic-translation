 shroud.first_contact_insert.instrument: "§H광란의 맥박§!"
 shroud.4035.title: "$the_instrument_of_desire_article_cap$ 등장"
 shroud.4035.desc.all.start: "몇 달간의 공허한 부름 끝에 §H[Root.Patron:the_instrument_of_desire.GetPreCommunicationName]§!(이)가 마침내 §H장막§! 깊은 곳에서 나타났습니다."
 shroud.4035.desc.default: "$shroud.4035.desc.all.start$\n\n메시지는 마치 거센 폭우와 같았습니다. 우리의 가장 광적인 욕망을 자극하는 생각이 강력한 힘으로 정신을 파고들었고, 끊임없이 쏟아지는 말들이 모든 것을 집어삼키며 의식을 장악했습니다. 그 권력과 탐닉에 대한 비전에는 묘한 매력이 있었습니다.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.default.end: "폭우가 빗방울로 잦아들었습니다. 그 존재는 대답을 바라지 않았습니다. 아직은 말입니다. 우리에게는 채울 수 없는 갈증만이 남았습니다.\n\n우리는 이 존재가 추구하는 한계 없는 부에 대한 비전을 명확히 이해했습니다. [GetTelepathPlural]들이 회복하면 다시금 이 $the_instrument_of_desire_color_article$과 접촉할 수 있을 것입니다."
 shroud.4035.desc.hive: "$shroud.4035.desc.all.start$\n\n메시지는 마치 거센 폭우와 같았습니다. 우리의 가장 광적인 욕망을 자극하는 생각이 강력한 힘으로 정신을 파고들었고, 끊임없이 쏟아지는 말들이 모든 것을 집어삼키며 의식을 장악했습니다. 그 끝없는 생산에 대한 비전에는 활기가 있었습니다.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.gestalt_machine: "$shroud.4035.desc.all.start$\n\n메시지는 마치 거센 폭우와 같았습니다. 회로를 뒤흔드는 데이터가 이전의 모든 입력값을 초월했고, 짧은 외계의 코드가 쏟아져 들어와 시스템을 잠식하며 다른 모든 정보를 집어삼켰습니다. 그 끝없는 생산에 대한 비전에는 활기가 있었습니다.\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.desc.machine.end: "폭우가 빗방울로 잦아들었습니다. 그 존재는 대답을 바라지 않았습니다. 아직은 말입니다. 우리에게는 정교한 입력이 필요한 파편적인 공허만이 남았습니다.\n\n우리는 이 존재가 추구하는 한계 없는 부에 대한 비전을 명확히 이해했습니다. [GetTelepathPlural]들이 재충전되면 다시금 이 $the_instrument_of_desire_color_article$과 접촉할 수 있을 것입니다."
 shroud.4035.desc.individual_machine: "$shroud.4035.desc.all.start$\n\n메시지는 마치 거센 폭우와 같았습니다. 우리의 가장 광적인 욕망을 자극하는 생각이 강력한 힘으로 정신을 파고들었고, 끊임없이 쏟아지는 말들이 모든 것을 집어삼키며 의식을 장악했습니다. 그 끝없는 생산에 대한 비전에는 활기가 있었습니다.\n\n$shroud.4035.desc.machine.end$"
