 # Tankbound
 civic_tankbound: "용기 결속"
 civic_tankbound_desc: "이 사회의 구성원은 통 속에 담긴 특수 생체액 속에 잠긴 채 살아갑니다. 이들은 보조 장비에 크게 의존하기 때문에 직접적인 육체노동이 불가능합니다."
 civic_tankbound_effects_base: "['trait:trait_tankbound'] 특성이 추가됩니다.\n$job_farmer_plural_with_icon$, $job_miner_plural_with_icon$, $job_technician_plural_with_icon$(이)가 완전 §Y자동화§!됩니다.\n['concept_colonist', $job_colonist$] 직업은 $SPECIALISTS$입니다.\n£district£ §Y도시§! 지구는 추가 §Y$job_production_overseer_with_icon$§! 직업을 가집니다."
 civic_tankbound_effects: "$civic_tankbound_effects_base$"
 civic_tankbound_negative_effects: "$t$- £pop£ 팝이 2,000만큼 적은 상태에서 게임을 시작합니다."
 civic_tankbound_corporate: "기업 싱크탱크"
 civic_tankbound_corporate_desc: "이 사회는 특별 제작한 거주용 수조 형태의 실험적 설비를 전면 도입했습니다. 구성원들은 보조 장비에 크게 의존하여 살아가기 때문에 직접적인 육체노동이 불가능합니다."
