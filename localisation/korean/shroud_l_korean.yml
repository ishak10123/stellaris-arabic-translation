 shroud.6020.name: "$UNKNOWN_LONG$"
 shroud.6020.desc: "§H교신을 시도하는 동안, 우리 함교 승무원들이 간헐적인 두통에 시달리고 있습니다...§!"
 shroud.6030.name: "[exiled_country.GetName]"
 shroud.6030.desc: "§H반복적인 시도에도 불구하고 [exiled_country.GetName](은)는 아무런 응답이 없습니다.§!"
 shroud.6050.name: "이상한 상관관계"
 shroud.6050.desc: "우리의 사이오닉 억제 §H$building_ancient_ward_1$§!에서 불규칙한 수치가 나타나고 있습니다. 이는 보통 [Root.GetHomeWorldName]에서 사이오닉 활동이 급증했을 때 발생하는 현상이지만, 그러한 만행의 흔적은 발견되지 않았습니다.\n\n이 수수께끼의 해답은 우리 국경 너머에 있을지도 모릅니다. 장거리 영상을 통해 §H[exiled_system_border.GetName]§! 성계 근처에서 최근 이상한 에너지 흐름 폭발이 확인되었으며, 이는 $building_ancient_ward_1$의 불규칙한 측정값과 상관관계를 보입니다."
 shroud.6050.a: "[exiled_system_border.GetName](을)를 탐사해야겠어요."
 shroud.shared_text_psy_symptoms: "감정의 혼란과 극심한 스트레스로 인한 정신적 스트레스, 형언할 수 없는 공포의 반복적인 환영"
 shroud.shared_text_psi_radiation: "이러한 증상은 우리 선조들의 기록에 등장하는 파괴적인 에너지 방출 현상, 이른바 '사이오닉 방사선'과 높은 유사성을 보입니다."
 shroud.shared_text_ship_malfunction: "함대의 시스템은 심각한 오작동으로 인해 대부분의 정상적인 기능이 사실상 무력된 상태입니다."
 shroud.6100.name: "위험한 에너지"
 shroud.6100.desc.no_border_aura: "새로 탐사한 §H[from.GetName]§! 성계에서 위급한 상황이 발생했습니다. [root.GetName]의 승무원들이 $shroud.shared_text_psy_symptoms$ 등 복합적인 심리적 이상 증세를 겪고 있으며, 함대의 시스템 또한 기이하고 불규칙한 오작동을 보이고 있는 것입니다.\n\n$shroud.shared_text_psi_radiation$ §H[owner.GetHomeWorldName]§!에 건설된 §H$building_ancient_ward_1$§!의 보호를 벗어난 지금, 우리는 선조들이 경고했던 정신적 오염을 처음으로 겪고 있는 셈입니다.\n\n이 특이한 형태의 에너지를 포착할 수 있도록 장거리 감지기를 보정한 결과, 이번 위험 에너지 방출의 근원이 §H[exiled_center_system.GetName]§! 성계에 있는 것을 확인했습니다. $shroud.6100.desc.end$"
 shroud.6100.desc.border_aura: "[root.GetName]의 승무원들이 위험에 처했습니다.\n\n§H[from.GetName]§! 성계에서 극도로 높은 수준의 사이오닉 방사선에 노출된 후, 이전에 보고되었던 것보다 훨씬 심한 심리적 고통을 겪게 된 것입니다. $shroud.shared_text_ship_malfunction$\n\n장거리 감지기를 통해 인근 §H[exiled_center_system.GetName]§! 성계에서 이보다 더 높은 방사선 수치를 포착했습니다. $shroud.6100.desc.end$"
 shroud.6100.desc.end: "그 영향에 대해 더 면밀히 분석하기 전까지는 함선을 더 깊숙이 보내지 않는 것을 강력히 권장합니다."
 shroud.6100.tt: "§Y$first_contact$§! 절차를 개시할 준비를 합니다."
 shroud.6110.name: "[This.System.GetName] 내 존재"
 shroud.6110.desc: "놀랍게도, §H[This.System.GetName]§!에는 지능적으로 건설된 것처럼 보이는 대형 구조물들이 다수 존재하는 듯합니다. 우리는 안전한 거리에서 직접 교신을 시도하여 그 제작자에 대해 더 많은 정보를 얻고자 하며, 이들을 암호명 §H[This.ContactCountry.GetName]§!(으)로 지칭할 것입니다.\n\n해당 성계에 존재하는 어떤 생명체든, 앞서 감지한 높은 수준의 사이오닉 방사선으로 인해 심각한 위험에 처해 있을 가능성이 큽니다."
 fcsum_exiled_1: "우리는 §H[This.System.GetName]§! 성계에서 외계 지능체의 존재를 시사하는 유력한 증거를 발견했습니다."
 shroud.6115.name: "미미한 진전"
 shroud.6115.desc: "추가 연구 결과, §H[This.System.GetName]§! 성계의 구조물들이 외계 우주선임을 확인했습니다. 그러나 아직 함선의 탑승자와는 접촉하지 못한 상태입니다.\n\n걱정스러운 점은 [exiled_envoy.GetName] 사절이 이끄는 팀이 원인 불명의 환각과 같은 초심리적 현상을 겪기 시작했다는 것이며, 그중에는 [This.System.GetName]에 존재하는 기이한 존재들에 대한 환시도 보고되었습니다. 그럼에도 불구하고, 우리 사절은 굳건한 의지로 임무를 완수하고자 합니다."
 shroud.6115.a: "계속 진행하세요."
 fcsum_exiled_2: "우리는 아직 §H[This.ContactCountry.GetName]§!(과)와 접촉하지 못했습니다. 사절은 팀원들에 대한 우려를 보고해 왔습니다."
 shroud.6120.name: "임무 중단"
 shroud.6120.desc: "수개월간 연락이 없던 [exiled_envoy.GetName](으)로부터 교신이 도착했습니다. 평소 냉철하고 직설적이던 이 사절은 기이하고 혼란스러운 보고를 전해 왔습니다. 마치 꿈과 환상이 뒤섞인 듯한 이상한 이미지를 두서없이 묘사하기 시작한 것입니다. 그 팀원 중에도 더 나은 설명을 하는 이가 없었습니다.\n\n결국 이들은 직무에서 해임되었고 임무는 무기한 중단되었습니다. §H[This.System.GetName]§!에 존재하는 것이 무엇이든, 현재로서는 안전하게 확인할 방법이 없습니다."
 fcsum_exiled_3: "팀은 충격적인 임무를 마치고 §H[This.ContactCountry.GetName]§!(과)와 접촉하기도 전에 귀환했습니다."
 shroud.6125.desc: "소용돌이치는 해류 위에 무언가 떠 있습니다. §H[Root.Capital.GetName]§!일까요...?\n\n§H...부르는...§!\n\n표면이 일그러지며 열립니다. 보이지 않는 깊은 곳에서 악취 나는 독기가 뿜어져 나옵니다.\n\n§H...아무...응답도...§!\n\n끝이 없습니다. 숨이 막힐 듯합니다.\n\n끔찍합니다."
 MESSAGE_FIRST_CONTACT_ABORTED_EXILED_DESC: "$COUNTRY|H$(과)와의 $first_contact$ 절차가 행정 명령으로 중단되었습니다."
 shroud.shared_text_aura_spread: "인근의 사이오닉 '감염' 현상이 §H[exiled_system_border.GetName]§! 성계로 확산되었습니다.\n\n§H$building_ancient_ward_1$§!의 보호 조치에도 불구하고, 이번 전염으로 인해 §H[Root.GetHomeWorldName]§! 내 우리 인구는 사이오닉 방사선 중독 증상을 보이고 있습니다. 예측에 따르면, 이 정신 역병은 곧 §H[Root.home_planet.System.GetName]§!(으)로 확산되어, 모성에 한층 더 심각한 위협이 될 것입니다."
 shroud.shared_text_aura_study: "위험을 감수하더라도, 이 현상의 기원을 철저히 연구해 보호 대책을 찾아야 합니다."
 shroud.6200.name: "§H[Root.GetHomeWorldName]§!의 사이오닉 방사선"
 shroud.6200.desc.no_visit: "§H[Root.GetHomeWorldName]§!에서 위급한 상황이 발생했습니다. 주민들이 $shroud.shared_text_psy_symptoms$ 등 복합적인 심리적 이상 증세를 겪고 있는 것입니다.\n\n$shroud.shared_text_psi_radiation$ §H$building_ancient_ward_1$§!의 보호를 벗어난 이들이, 선조들이 경고했던 정신적 오염을 처음으로 겪고 있는 셈입니다.\n\n이 특이한 형태의 에너지를 포착할 수 있도록 장거리 감지기를 보정한 결과, 이 위험한 에너지가 §H[exiled_system_border.GetName]§! 성계 너머에서 방출되고 있는 것을 확인했습니다. $shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_no_ship: "$shroud.shared_text_aura_spread$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_and_ship: "$shroud.shared_text_aura_spread$\n\n극도로 높은 수준의 사이오닉 방사선에 노출된 후, [exiled_system_border.GetName] 내 §H[event_target:ship_in_border.GetName]§!의 승무원들이 이전에 보고되었던 것보다 훨씬 심한 심리적 고통을 겪고 있습니다. $shroud.shared_text_ship_malfunction$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.a: "이 감염을 막을 방법을 찾아봅시다."
 PSI_RADIATION_PROJECT: "사이오닉 방사선"
 PSI_RADIATION_PROJECT_DESC: "§H[exiled_system_border.GetName]§! 성계의 사이오닉 방사선 수치가 급격히 상승하며, 이에 따른 영향이 §H[Owner.GetHomeWorldName]§!에서 감지되고 있습니다. 이 현상이 우리 국민에게 더 큰 위협이 되기 전에 가까이에서 면밀히 연구할 필요가 있습니다."
 shroud.6205.name: "$PSIONIC_AURA_PLURAL$"
 shroud.6205.desc.start: "§H[exiled_system_border.GetName]§! 성계 내 독성 사이오닉 방사선에 큰 고통을 겪었음에도 불구하고, 우리 연구원들이 임무 도중 중요한 정보를 발견했습니다.\n\n우리는 이 우려스러운 현상을 §H'$PSIONIC_AURA$'§!라는 거대한 파괴적 에너지의 응축체로 분류했습니다. 정신뿐만 아니라 기계마저 교란하는 이 오라는 §H[exiled_center_system.GetName]§! 성계로부터 퍼져 나왔습니다. 내부의 사이오닉 에너지가 극도로 증폭되어 결국 여러 성계까지 영향을 미치게 된 것입니다."
 shroud.6205.desc.aura_home: "$shroud.6205.desc.start$\n\n오라는 이미 §H[Root.home_planet.System.GetName]§! 성계에 도달해 파괴적인 영향을 미치고 있습니다. $shroud.6205.desc.end$"
 shroud.6205.desc.no_aura_home: "$shroud.6205.desc.start$\n\n오라가 우리 §H[Root.home_planet.System.GetName]§! 성계에 도달하면 파괴적인 영향을 불러올 것입니다. $shroud.6205.desc.end$"
 shroud.6205.desc.end: "§H[Root.GetHomeWorldName]§!의 §H$building_ancient_ward_1$§!는 제한적인 보호만을 제공할 뿐입니다."
 shroud.6205.a: "$building_ancient_ward_1$를 강화해야 합니다."
 PSIONIC_AURA_RESISTANCE_PROJECT: "$PSIONIC_AURA$ 저항"
 PSIONIC_AURA_RESISTANCE_PROJECT_DESC: "우리 선조들이 §H[Owner.GetHomeWorldName]§!에 건설한 §H$building_ancient_ward_1$§!는 사이오닉 방사선에 대항하는 보호를 제공하도록 설계되었습니다. 그러나 이번 §H$PSIONIC_AURA_PLURAL$§!의 침공은 현재의 한계를 넘어설 위험이 있습니다. 지금까지 얻은 지식을 활용하면 구조물의 저항력을 강화할 수 있을 것입니다."
 shroud.6210.name: "사이오닉 감쇠"
 shroud.6210.desc: "우리의 지칠 줄 모르는 연구원들이 §H[Root.GetHomeWorldName]§!의 §H$building_ancient_ward_1$§!를 강화할 방법을 찾았습니다. 사이오닉 감쇠기의 개선을 통해, 보호 범위를 하나의 행성에서 온 §H[Root.home_planet.System.GetName]§! 성계로 확대할 수 있게 된 것입니다.\n\n이번 연구는 이 소실된 기술에 대한 폭넓은 탐구를 촉발했습니다. 우리는 이제 사이오닉 방사선과 [Root.GetSpeciesAdj] 정신 사이의 연결이 상호적이라는 사실을 알게 되었습니다. 즉, 방사선이 우리 정신에 영향을 미치는 만큼 우리 정신도 방사선 수치에 영향을 줄 수 있다는 것입니다. '사이오닉' 행위에 대한 옛 금기가 결국 과학적 근거를 가지고 있던 셈입니다."
 shroud.6210.a: "흥미로우면서도 우려되는군요."
 shroud.6210.a.tt: "$BEGINS_EVENT_CHAIN$ §Y$ancient_ward_upgrade_chain_title$§!"
 ancient_ward_upgrade_chain_title: "$building_ancient_ward_2$"
 ancient_ward_upgrade_chain_desc: "§H[Owner.GetHomeWorldName]§!의 §H$building_ancient_ward_1$§!는 기능적 한계에 도달했습니다. 인근 사이오닉 위협에 대응하기 위해서는 그 역량을 강화할 필요가 있습니다. 이 새로운 §H$building_ancient_ward_2$§!가 §H$PSIONIC_AURA_PLURAL$§!의 악영향으로부터 우리 국민을 보호할 수 있을 것입니다."
 ancient_ward_upgraded: "건물 업그레이드 완료"
 shroud.6215.name: "$building_ancient_ward_2$ 건설 완료"
 shroud.6215.desc.aura_home: "§H$building_ancient_ward_2$§!의 건설이 완료되어 §H[Root.home_planet.System.GetName]§! 성계의 사이오닉 방사선이 관리 가능한 수준으로 낮아졌습니다. §H[Root.GetHomeWorldName]§!의 인구는 부정적인 영향에서 점차 회복하고 있습니다."
 shroud.6215.desc.no_aura_home: "§H$building_ancient_ward_2$§!의 건설이 완료되어 §H[Root.GetHomeWorldName]§!의 사이오닉 방사선이 관리 가능한 수준으로 낮아졌습니다. 거주 인구는 부정적인 영향에서 점차 회복하고 있습니다."
 shroud.6215.desc.end: "그럼에도 불구하고, §H$PSIONIC_AURA$§!와 다른 잠재적 오라는 여전히 은하 전역을 오염시키고 있습니다. 우리 과학자들은 $building_ancient_ward_2$에 사용된 기술을 더욱 강력한 §H'$SHROUD_SEAL$'§!의 개발에도 적용할 수 있다고 생각합니다. 이 거대한 구조물이라면 성단 전체의 오라를 억제할 수 있습니다. $SHROUD_SEAL$를 §H[exiled_system_border.GetName]§! 성계에 구축하는 것은 사이오닉 위협을 통제하는 데 있어 중요한 진전이 될 것입니다."
 shroud.6215.a: "연구할 가치가 있겠군요."
 build_shroud_seal_poi_desc: "§H$tech_psionic_suppression$§! 기술 연구 결과, $constructor$으로 항성 중력장 내부에 §H$SHROUD_SEAL$§!를 구축할 수 있게 되었습니다. 이 봉인기는 해당 성계뿐만 아니라, 초공간 항로로 연결된 다른 인접 성계의 §H$PSIONIC_AURA_PLURAL$§!까지도 억제할 수 있을 것입니다."
 shroud_seal_construction_chain_title: "$SHROUD_SEAL$ 건설"
 shroud_seal_construction_chain_desc: "우리 과학자들의 이론에 따르면, §H$tech_psionic_suppression$§! 기술을 더욱 발전시켜 성단 전체의 §H$PSIONIC_AURA_PLURAL$§!를 억제할 구조물을 개발할 수 있다고 합니다.\n\n§H'$SHROUD_SEAL$'§!로 불릴 이 강력한 구조물을 §H[exiled_system_border.GetName]§! 성계에 구축하는 것은 진행 중인 사이오닉 위협을 통제하는 데 있어 중요한 진전이 될 것입니다."
 tech_psionic_suppression_researched: "$tech_psionic_suppression$ 연구 완료"
 shroud_seal_built: "$SHROUD_SEAL$ 건설 완료"
 shroud_6216_poi: "[exiled_system_border.GetName]"
 shroud_6216_poi_desc: "$build_shroud_seal_poi_desc$"
 shroud.6220.name: "극심한 방사선"
 shroud.6220.desc: "§H[exiled_system_border.GetName]§! 성계에서 극도로 높은 수준의 사이오닉 방사선에 노출된 후, §H[Root.GetName]§!의 승무원들이 이전에 보고되었던 것보다 훨씬 심한 심리적 고통을 겪고 있습니다. $shroud.shared_text_ship_malfunction$"
 shroud.6225.name: "§H[Root.home_planet.System.GetName]§!의 방사선"
 shroud.6225.desc.shared: "벌써 §H[Root.GetHomeWorldName]§!의 주민들 사이에서 사이오닉 방사선 중독 피해가 나타나고 있으며, 함선의 기능이 크게 저하되고 있습니다."
 shroud.6225.desc.know_aura: "§H$PSIONIC_AURA$§!가 §H[Root.home_planet.System.GetName]§! 성계까지 확산되었습니다. $shroud.6225.desc.shared$\n\n§H$building_ancient_ward_1$§! 강화가 그 어느 때보다도 시급합니다."
 shroud.6225.desc.no_know_aura: "사이오닉 역병이 §H[Root.home_planet.System.GetName]§! 성계까지 확산되었습니다. $shroud.6225.desc.shared$\n\n이 오염 실태에 대해 파악하는 것이 그 어느 때보다도 시급합니다."
 shroud.6225.a: "지체해서는 안 됩니다."
 shroud.6225.a.know_aura.tt: "§H[exiled_country.GetName]§!의 §H$PSIONIC_AURA$§!는 다음 효과를 가집니다:\n$effect_exiled_aura$"
 shroud.6225.a.no_know_aura.tt: "이 사이오닉 현상은 다음 효과를 가집니다:\n$effect_exiled_aura$"
 effect_exiled_aura: "- $MOD_SHIP_FIRE_RATE_MULT$: §R-125%§!\n- $MOD_SHIP_SHIELD_MULT$: §R-200%§!\n- $MOD_SHIP_EVASION_MULT$: §R-100%§!\n- $mod_planet_jobs_produces_mult$: §R-30%§!\n- $mod_planet_pops_upkeep_mult$: §R+100%§!\n- $MOD_PLANET_BUILDING_TIME_MULT$: §R+100%§!"
 shroud.6231.name: "§H[root.GetHomeWorldName]§! 상실"
 shroud.6231.desc: "우리 모성인 §H[root.GetHomeWorldName]§!에 대한 통제를 상실했습니다. 주요한 지식 저장소이자 모든 사회 활동의 중심지이기에, 이곳을 되찾지 않고서는 반사이오닉 활동을 더 이상 이어갈 수 없습니다."
 shroud.6231.a: "지체 없이 통제권을 되찾아야 합니다."
 shroud_6231_poi: "[root.GetHomeWorldName]"
 shroud_6231_poi_desc: "§H[root.GetHomeWorldName]§!에 대한 통제권을 지체 없이 되찾아야 합니다."
 shroud_reclaim_homeworld_chain_title: "§H[root.GetHomeWorldName]§! 재확보"
 shroud_reclaim_homeworld_chain_desc: "우리 모성인 §H[root.GetHomeWorldName]§!에 대한 통제를 상실했습니다. 주요한 지식 저장소이자 모든 사회 활동의 중심지이기에, 이곳을 되찾지 않고서는 반사이오닉 활동을 더 이상 이어갈 수 없습니다."
 homeworld_reclaimed: "모성 재확보 완료"
 shroud.6241.name: "§H[root.GetHomeWorldName]§! 재확보 완료"
 shroud.6241.desc: "우리 모성인 §H[root.GetHomeWorldName]§!에 대한 통제권을 재확보했습니다. [root.GetName](은)는 반사이오닉 활동을 전면적으로 재개할 수 있습니다."
 shroud.6241.a: "$EXCELLENT$"
 shroud.6300.name: "장막의 그림자"
 shroud.6300.desc: "우리 과학자들이 첨단 §H$tech_psionic_suppression$§! 기술 개발을 완료했습니다. 이제 소유한 식민지에 $building_psionic_suppressor$를 구축해 $building_ancient_ward_2$의 효과를 재현할 수 있을 것입니다.\n\n그러나 §H$PSIONIC_AURA_PLURAL$§!가 다른 성계로 확산되는 것을 막기 위해서는 §H$SHROUD_SEAL$§!라는 더욱 강력한 구조물을 건설해야 합니다. $shroud.shared_text_shroud_seal$\n\n또한 이 연구는 한 가지 우려스러운 가설에 신빙성을 더합니다. 고대 오컬트 문서에 기록된 §H장막§!이라는 사이오닉 에너지 차원이 실재한다는 것입니다. 이론에 따르면 지각 있는 존재들의 인지 활동이 장막의 에너지를 관측 가능한 현실로 유도하며, 이 과정이 일반적으로 $PSIONIC_AURA_PLURAL$의 근본적인 원인이 된다고 합니다.\n\n즉, 우리가 단순히 우주의 객관적인 힘과 맞서고 있는 것이 아니라, 정체불명의 의도를 가지고 계산된 행동을 상대하고 있을 수도 있다는 뜻입니다."
 shroud.6300.a: "§H장막§!이 정말 존재했다는 말인가요...?"
 shroud.6500.name: "예기치 않은 교신"
 shroud.6500.desc: "§H[exiled_system_border.GetName]§! 성계 너머에서 예기치 않은 교신을 받고 있습니다. 설명할 수 없는 방식으로, §H[exiled_country.GetName]§!(은)는 우리의 언어와 통신 체계 모두를 완벽히 숙달했습니다."
 shroud.shared_screen_figure: "§H중간중간 이어지는 침묵과 함께, 화면 속 인물이 일정하고 최면적인 리듬으로 말합니다.§!\n\n머나먼 이웃이여, 직접적인 교신에 응답이 없었기에, 부득이하게 수고를 감수하고 원시적인 통신 수단을 이용하게 되었습니다.\n\n저는 §H[exiled_country.GetName]§!의 사이오닉 대주교, §H우크-호골라스 스카라트§!입니다. 사안이 급하니 예의는 양해해 주시길 바랍니다."
 shroud.shared_auric_flow_inhibition: "우리 오라 흐름의 확산을 방해하고 있습니다. 용납할 수 없는 상황이지만, 여러분의 무지에서 비롯된 실수일 것이라 믿습니다.\n\n오라는 모두에게 이로우며 그 은혜는 은하 전역에 빛나야 합니다. 대의를 위한 헌신을 증명하는 의미에서, 여러분이 소위"
 shroud.6505.name: "$shroud.6500.name$"
 shroud.6505.desc: "$shroud.6500.desc$"
 shroud.6510.name: "사이오닉 대주교 우크-호골라스 스카라트"
 shroud.6510.desc: "$shroud.shared_screen_figure$ §H[exiled_system_border.GetName]§! 성계에 있는 여러분의 장치가 $shroud.shared_auric_flow_inhibition$ '$SHROUD_SEAL$'로 부르는 구조물을 신속히 해체하길 바랍니다."
 shroud.6510.a: "당신들로부터 어떠한 연락도 받은 적이 없습니다."
 shroud.6515.desc: "우리는 진정한 목소리로 여러분을 불렀습니다. 귀를 기울였다면 내면 깊은 곳에서 부르는 소리를 들었을 것입니다. 여러분은 그 힘을 가지고 있지만, 스스로 억누르기를 선택했을 뿐입니다."
 shroud.6515.a: "오라는 모든 것을 파괴합니다. 역병이란 말입니다."
 shroud.6520.desc: "그 인식은 틀렸습니다. 오라는 우리 수호자의 신성한 선물이자, 파괴를 꾀하는 자를 쓰러뜨리는 힘입니다."
 shroud.6520.a: "요구를 거절하겠다면 어떻게 할 겁니까?"
 shroud.6525.desc: "오라를 해하는 자는 예외 없이 제압될 것입니다. 거부한다면, 군사 행동에 나설 수밖에 없겠지요."
 shroud.6525.a: "봉인기는 그대로 남을 겁니다."
 shroud.6525_heritage.a: "우리의 유산을 직접 파괴하는 일은 절대 없을 겁니다."
 shroud.6525.b: "봉인기를 파괴하겠습니다."
 shroud.6530.desc: "무지한 바보들 같으니."
 shroud.6535.desc: "현명한 결정입니다."
 shroud.6550.name: "유예된 전투"
 shroud.6550.desc: "우리는 §H[exiled_country.GetName]§!(과)와의 즉각적인 분쟁을 피하고자 §H[exiled_system_border.GetName]§! 성계의 $SHROUD_SEAL$를 해체하라는 요구를 묵인했습니다.\n\n사이오닉 역병의 장본인들과의 조우는 §H[this.GetName]§! 전역에 심각한 우려를 낳고 있습니다. $SHROUD_SEAL$의 해체는 단기적 유화책에 불과할 것입니다. 결국에는 §H$building_ancient_ward_2$§!의 해체도 요구해 올 테고, 이는 절대 용납할 수 없는 사안입니다.\n\n어찌 되었든, 앞으로의 전투는 피할 수 없을 것으로 보입니다."
 shroud.6550.a: "준비를 갖추어야겠군요."
 shroud.6560.name: "$shroud.6510.name$"
 shroud.6560.desc: "$shroud.shared_screen_figure$ §H[capital_scope.GetName]§!에 있는 여러분의 장치가 $shroud.shared_auric_flow_inhibition$ '$building_ancient_ward_2$'로 부르는 구조물을 신속히 해체하길 바랍니다."
 shroud.6560.a: "$shroud.6510.a$"
 shroud.shared_psiarch_transmission: "§H그 형상이 나타남과 동시에 사이오닉 대주교가 냉담하고 무미건조한 어조로 질책합니다.§!\n\n[This.GetSpeciesNamePlural]들이여, 이런 교신을 보내게 되어 유감스럽습니다."
 shroud.shared_auric_flow_disdain: "여러분의 행동은 무지를 여실히 드러냈습니다. 우리 오라의 흐름과 보편적인 사이오닉 발전에 대한 여러분의 멸시는 은하계 평화와 결코 양립할 수 없습니다. 선택의 여지가 없군요.\n\n우리의 함대를 맞이할 준비를 하십시오."
 shroud.6570.name: "$shroud.6510.name$"
 shroud.6570.desc: "$shroud.shared_psiarch_transmission$ $SHROUD_SEAL$의 해체에 동의했음에도, §H[capital_scope.GetName]§!에 유사한 효과를 가진 건물을 남겨 두었군요. 그 의도는 뻔합니다. $shroud.shared_auric_flow_disdain$"
 shroud.6570.a: "당신들이나 준비하시죠. 교신 종료."
 shroud.6575.name: "$shroud.6570.name$"
 shroud.6575.desc: "$shroud.shared_psiarch_transmission$ 여러분이 $SHROUD_SEAL$를 재건한 것은, 우리가 품었던 여러분의 구원에 대한 희망을 산산이 무너뜨렸습니다. $shroud.shared_auric_flow_disdain$"
 shroud.6575.a: "$shroud.6570.a$"
 shroud.6580.name: "§H[exiled_center_system.GetName]§! 봉인"
 shroud.6580.desc: "거대한 사이오닉 감쇠기가 작동하기 시작했고, 이제 §H$SHROUD_SEAL$§!는 §H[exiled_center_system.GetName]§! 성계로부터 §H$PSIONIC_AURA$§!를 몰아내고 있습니다.\n\n성간 스캔 결과, 적의 나머지 영역이 초공간 항로를 통해 [exiled_center_system.GetName](과)와 직접 연결되어 있음을 확인했습니다. 이는 이 $SHROUD_SEAL$ 하나만으로 §H[exiled_country.GetName]§! 전역의 $PSIONIC_AURA_PLURAL$를 제거할 수 있다는 것을 의미합니다.\n\n이 봉인기를 지키는 것이 우리의 승패를 결정지을 것입니다."
 shroud.6580.a: "반드시 지켜내야 합니다."
 shroud.6600.name: "정신 경로의 집회"
 shroud.6600.desc: "§H[current_planet.GetName]§!의 사이오닉 위협 식민지를 정복했습니다.\n\n우리는 이 성계의 §H$PSIONIC_AURA$§!가 §H장막§!과 이곳 주민 사이의 정신적 상호작용을 통해 증폭되고 있었다는 사실을 발견했습니다. 이 행위는 §H정신 경로의 집회§!라고 불리는 정예 텔레파시 능력자들이 주도한 것으로 알려졌습니다. 이 사이오닉 광신 집단은 장막 속 강력한 존재이자 자신들의 '후원자'로만 알려진 §H$r_the_lost_patron$§!에 대한 헌신을 조장합니다.\n\n이들의 성서에는 이 존재와 관련된 유물이 반복적으로 언급되며, 유물은 아직 §H[other_planet.GetName]§! 행성에 남아 있는 것으로 보입니다. 이 물체를 확보하면 광신 집단의 영향력 확산을 막는 데 도움이 될 것입니다."
 shroud.6600.a: "[other_planet.GetName](으)로 항로를 설정하세요."
 shroud.6601.name: "[current_planet.GetName]의 유적"
 shroud.6601.desc: "우리는 한때 [exiled_country.GetName]의 행성이었던 §H[current_planet.GetName]§! 개척을 완료했습니다.\n\n남아 있는 기록을 통해, 우리는 이 성계에 있었던 $PSIONIC_AURA$가 §H장막§!과 이곳 주민 사이의 정신적 상호작용을 통해 발생하고 있었다는 사실을 발견했습니다. 이 행위는 한 사이오닉 광신도 집단이 주도했는데, 이들은 장막 속 강력한 존재이자 자신들의 '후원자'인 §H$r_the_lost_patron$§!에 대한 헌신을 조장한 것으로 알려졌습니다.\n\n이들의 성서 일부에는 이 존재와 관련된 유물이 반복적으로 언급되며, 유물은 아직 §H[other_planet.GetName]§! 행성에 남아 있는 것으로 보입니다. 이 물체를 확보하려면 [other_planet.GetName]을 보다 신중하게 정복해 일부 인구를 보존해야 할 것입니다."
 shroud.6601.a: "$shroud.6600.a$"
 shroud.6700.name: "$SANCTUM_OF_THE_LOST$"
 shroud.6700.desc.common: "우리는 행성 전역에서 모든 사이오닉 활동을 즉각 단속하여 혐오스러운 §H$PSIONIC_AURA$§!를 완전히 무력화했습니다.\n\n행성의 중심 도시에는 §H$SANCTUM_OF_THE_LOST$§!라고 알려진 폐허가 된 탑이 있었습니다. 이곳은 옛 제국의 몰락한 사이오닉 광신도들이 사용하던 최고 성소였습니다. 군인들의 보고에 따르면, 이 성소는 신비롭고 불길한 기운을 내뿜는다고 합니다.\n\n구조물 내부의 가장 안쪽에는 강력한 국지적 사이오닉 방사선을 발산하는 '고치'가 단단히 봉인된 채 자리 잡고 있습니다. 일반 탄약으로는 그 외피조차 뚫을 수 없을 정도였습니다. 대상이 유발할 수 있는 잠재적 위험을 제거하려면 추가 조사가 필요할 것입니다."
 shroud.6700.desc.contact: "§H[current_planet.GetName]§!(을)를 정복함에 따라 §H[exiled_country.GetName]§!에 대한 우리의 최종 승리가 확정되었습니다. $shroud.6700.desc.common$"
 shroud.6700.desc.no_contact: "§H[current_planet.GetName]§!(을)를 정복하며 우리는 한때 §H[exiled_country.GetName]§!(으)로 불리던 제국이 통제하던 영역을 확보했습니다. $shroud.6700.desc.common$"
 shroud.6700.desc.contact_no_name: "§H[current_planet.GetName]§!(을)를 정복함에 따라 ?에 대한 우리의 최종 승리가 확정되었습니다. $shroud.6700.desc.common$"
 shroud.6700.desc.no_exiled: "§H[current_planet.GetName]§!(을)를 정복하며 우리는 한때 사이오닉 광신도들이 통제하던 영역을 확보했습니다. $shroud.6700.desc.common$"
 shroud.6700.a: "불안한 소식이군요... 계속 조사하세요."
 shroud.6705.name: "$psionic_threat_eliminated$"
 shroud.6705.desc.common: "예비 조사 결과, 사이오닉 재앙의 중심지였을 것으로 추측되는 광범위한 건축물 네트워크가 이 행성에 존재했음을 확인했습니다. 그러나 지금은 무너져 내린 잔해만이 남아 있을 뿐입니다.\n\n이 구조물들이 어떤 타락한 비밀을 품고 있었는지, 또 그 안에서 어떤 비열한 행위가 이루어졌는지는 영원히 알 수 없을지도 모릅니다. 그럼에도 불구하고 이제 이 성계는 $PSIONIC_AURA$의 마지막 흔적까지 말끔히 정화되어, 더는 그로 인한 위협에 시달릴 일이 없을 것입니다."
 shroud.6705.desc.contact: "§H[current_planet.GetName]§! 행성에 거주하던 인구의 말살로 §H[exiled_country.GetName]§!(으)로 알려진 제국은 마침내 역사 속으로 사라졌습니다.\n\n$shroud.6705.desc.common$"
 shroud.6705.desc.no_contact: "§H[current_planet.GetName]§! 행성에 거주하던 인구의 말살로 파괴적인 사이오닉 위협도 함께 종식되었습니다.\n\n$shroud.6705.desc.common$"
 shroud.6705.a: "다른 모든 위협도 함께 사라지기를 바랍니다."
 psionic_threat_eliminated: "사이오닉 위협 제거"
 psionic_threat_eliminated_desc: "사이오닉 제국의 말살로 그들의 $PSIONIC_AURA$가 은하계에서 사라졌으며, 우리 국민은 마침내 안심할 수 있게 되었습니다."
 SANCTUM_OF_THE_LOST: "꿈꾸는 자의 성소"
 SANCTUM_OF_THE_LOST_DESC: "$SANCTUM_OF_THE_LOST$로 알려진 §H[sanctum_of_the_lost_planet.GetName]§!의 폐허에서 위험한 수준의 사이오닉 방사선을 발산하는, 단단히 봉인된 '고치'를 발견했습니다. 대상이 유발할 수 있는 위험을 제거하기 위해 추가 조사를 진행해야 합니다."
 shroud.6710.name: "내면의 힘"
 shroud.6710.desc: "우리 연구원들이 §H[sanctum_of_the_lost_planet.GetName]§!에서 발견한 '고치'에 대한 정밀 분석을 진행했습니다.\n\n외부 스캔 결과, 그 정체가 강력한 사이오닉 존재를 봉인하기 위해 설계된 극도로 튼튼한 저장소라는 사실을 확인했습니다. 여러 절연층으로 구성된 두꺼운 합금 차단벽에도 불구하고 사이오닉 방사선은 지금도 여전히 외부로 누출되고 있습니다.\n\n고치 주변에 사이오닉 감쇠기를 배치하고 활성화하니, 주변의 모든 이들이 극심한 신경 고통을 겪었습니다.\n\n이후 고치의 표면이 비틀리며 타원형이었던 형태가 나선형으로 변했습니다. 그러고는 틈새가 열려, 내부로부터 직접적인 교신이 들어오고 있습니다..."
 cannot_found_mindwarden_enclave: "제국의 정신적 안보를 확실하게 확보해야 합니다."
 shroud.6800.name: "$MINDWARDENS_THE_FIRST_ENCLAVE$"
 shroud.6800.desc: "우리는 §H장막§!에 대한 방대한 지식을 축적해, 그 해로운 영향을 억제할 수 있는 첨단 기술을 개발했습니다. 이 지식을 은하 전역에 적용하는 방안을 논의하던 중, 우리 함대 지휘관들이 흥미로운 제안을 내놓았습니다.\n\n바로 우리 함대 중 하나를 활용해, 은하 내 반사이오닉 지원을 전담할 독립된 §H'$gov_mindwarden_enclave$'§!를 구축하자는 것입니다. $shroud.shared_enclave_investement$"
 shroud.6800.a: "괜찮은 제안이군요."
 shroud.6800.a.tt: "§Y30§! 이상의 규모를 가진 아무 함대를 §H$gov_mindwarden_enclave$§!로 전환할 수 있습니다."
 shroud.6825.name: "$gov_mindwarden_enclave$ 설립"
 shroud.6825.desc_first: "§H[This.GetName]§!(이)가 첫 번째 독립 §H$gov_mindwarden_enclave$§! 설립의 기반이 될 후보로 확인되었습니다. 승인이 떨어지는 대로 해당 함대는 즉시 §H[This.Solar_System.GetName]§!에 새로운 시설을 건설하고 전 은하에서 반사이오닉 지원을 개시할 것입니다."
 shroud.6825.desc_default: "우리는 §H[This.GetName]§!(을)를 독립적인 §H$gov_mindwarden_enclave$§!로 설립하는 방안을 검토 중입니다. 해당 함대는 은하 전역에서 반사이오닉 지원을 개시할 것입니다. $shroud.shared_enclave_investement$"
 shroud.6825.a: "건설을 진행하세요."
 shroud.6825.a.tt: "§H$gov_mindwarden_enclave$§!를 설립했습니다."
 shroud.6825.b: "다시 생각해 봅시다."
 shroud.6830.name: "$MINDWARDEN_plural$"
 shroud.6830.desc: "§H장막§!과 무분별한 사이오닉 에너지의 사용에 맞서 싸우며, 우리 국민은 더욱 강해졌고 목표도 명확해졌습니다. 첫 §H$gov_mindwarden_enclave$§!의 설립은 치유와 저항의 새로운 시대를 여는 신호탄입니다.\n\n이제 은하계 어디에서도 사이오닉 침략자에게 정신을 유린당하거나, 장막의 세력에게 고통받는 행성은 없을 것입니다.\n\n$MINDWARDEN_plural$의 시대가 도래했습니다."
 shroud.6830.a: "우리의 여정은 이제 시작일 뿐입니다."
 shroud.shared_enclave_investement: "우리의 초기 투자는 우주 기지 건설에 사용되며, 그 대가로 미래 수익의 일부를 받게 됩니다. 파수꾼들의 운영 자율성은 이러한 시설을 대규모로 배치할 수 있게 할 것입니다.\n\n물론 우리도 이들의 지원을 이용할 수 있고, 지불한 금액의 일부를 환수할 것입니다."
 shroud.6841.name: "[mindwarden_enclave_country.GetName] 엔클레이브 배당금 지불"
 BEGINS_EVENT_CHAIN: "이벤트 연쇄 시작:"
 ENDS_EVENT_CHAIN: "이벤트 연쇄 종료:"
 the_exiled_become_hostile: "§H[exiled_country.GetName]§!(이)가 우리에게 적대적으로 변합니다."
 start_psionic_war_chain: "$BEGINS_EVENT_CHAIN$ §Y$the_psionic_war_chain_title$§!"
 shroud_seal_dismantled: "§H[exiled_system_border.GetName]§!의 §H장막 봉인기§!가 해체되었습니다."
 the_psionic_war_chain_title: "$NAME_Psionic_War$"
 the_psionic_war_chain_desc: "§H[exiled_country.GetName]§!(과)와의 전쟁이 시작되었습니다.\n\n사이오닉 재앙의 근원을 뿌리 뽑아야 합니다. 먼저 §H[exiled_center_system.GetName]§! 성계 안에 $SHROUD_SEAL$를 건설해 $PSIONIC_AURA$를 무력화할 필요가 있습니다. 그래야만 이 위협을 은하계에서 정화할 수 있을 것입니다."
 the_psionic_war_chain_poi_1: "$SHROUD_SEAL$ 건설"
 the_psionic_war_chain_poi_1_desc: "§H[exiled_center_system.GetName]§!에 §H$SHROUD_SEAL$§!를 건설하면 해당 성계와 그 성계에 초공간 항로로 직접 연결된 성계의 §H$PSIONIC_AURA_PLURAL$§!를 억제할 수 있습니다."
 the_psionic_war_chain_poi_2: "§H[exiled_planet_1.GetName]§! 지배"
 the_psionic_war_chain_poi_2_desc: "§H[exiled_country.GetName]§!(은)는 사이오닉 공격을 멈추려 하지 않습니다. 놈들의 행성을 정복하는 것만이 §H$PSIONIC_AURA_PLURAL$§!의 재출현을 막을 유일한 방법입니다."
 the_psionic_war_chain_poi_3: "§H[exiled_planet_2.GetName]§! 지배"
 the_psionic_war_chain_poi_3_desc: "§H[exiled_country.GetName]§!(은)는 사이오닉 공격을 멈추려 하지 않습니다. 놈들의 행성을 정복하는 것만이 §H$PSIONIC_AURA_PLURAL$§!의 재출현을 막을 유일한 방법입니다."
 shroud_seal_reconstruction_chain_title: "장막 봉인기 재건"
 shroud_seal_reconstruction_chain_desc: "§H$SHROUD_SEAL$§!를 해체한 것은 §H[exiled_country.GetName]§!(을)를 달래기 위한 불가피한 희생이었지만, 이는 시간을 벌기 위한 속임수일 뿐이었습니다. 그들의 영역에 재진입해 §H$PSIONIC_AURA_PLURAL$§!를 제거하려면 먼저 이 구조물을 재건해야 합니다.\n\n§P재건은 공격 행위로 간주될 것이므로, 모든 보복에 대비해야 합니다.§!"
 shroud_seal_reconstruction_chain_poi_1: "[event_target:exiled_system_border.GetName]"
 shroud_seal_reconstruction_chain_poi_1_desc: "$build_shroud_seal_poi_desc$"
 SHROUD_WORLDS_IN_SYSTEM: "장막에 덮인 행성: §G$QUANTITY|0$§!"
 NAME_Psionic_War: "사이오닉 전쟁"
 wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war_desc: "은하계에서 사이오닉 침략자들을 제거하기 위한 전쟁입니다."
 shroud.6720.name: "$UNKNOWN_LONG$"
 shroud.6720.desc: "§H내 목소리를 듣고도 왜 귀 기울이지 않는가?§!"
 shroud.6720.a: "우리 정신을 오염시키도록 두지는 않을 겁니다!"
 shroud.6720.b: "당신 정체가 뭡니까?"
 shroud.6720.c: "왜 여기 온 겁니까?"
 shroud.6720.d: "원하는 게 뭡니까?"
 shroud.6720.e: "장막에서 온 겁니까?"
 shroud.6720.f: "이제 충분히 들었습니다."
 shroud.6723.desc: "§H독이라고? 그렇지 않다...\n\n이건 노래다. 부르기 위해선 먼저 들어야 하지. 자아를 내려놓고, 그 아름다움을 함께 나눠라.§!"
 shroud.6725.desc: "§H바퀴가 돌 때... 우리는 듣고,\n\n별들이 돌 때... 우리는 노래한다.§!"
 shroud.6725.a: "'바퀴'는 뭘 뜻하는 거죠?"
 shroud.6725.b: "더는 두고 못 보겠군요."
 shroud.6730.desc: "§H하늘과 땅에서 끊임없이 도는 조화, 즉 '장막'이지.§!"
 shroud.6735.desc: "§H나는... 꿈을 꾸고 있다. 노래를 꿈꿨지. 그 목소리는 이제 고요하군. 찬가는 어디로 갔는가?§!"
 shroud.6735.a: "당신을 이곳에 붙잡아둔 이들은 모두 떠났습니다."
 shroud.6735.b: "'노래'는 뭘 뜻하는 거죠?"
 shroud.6735.c: "더는 두고 못 보겠군요."
 shroud.6740.desc: "§H그대는 여기에 있다. 노래하거라...§!"
 shroud.6745.desc: "§H깨어 있음과 꿈 사이의 흐름이자... 이곳과 그곳을 잇는 길...\n\n그대의 정신은 이해할 수 없으니, 그대는 들을 수 없으리라...§!"
 shroud.6750.desc: "§H나는 노래를 듣고 싶다네... 허나 모든 것이 고요하군... 어째서지?§!"
 shroud.6750.a: "대가로 무엇을 제공할 수 있습니까?"
 shroud.6750.b: "더는 두고 못 보겠군요."
 shroud.6755.desc: "§H내 꿈을... 보여줄 수 있다. 세계의 창조를 말이지.§!"
 shroud.6755.a: "어떻게 당신을 믿죠?"
 shroud.6760.desc: "§H듣기만 하면 된다. 노래는 아름답기에 진실을 말한다. 단 하나의 눈부신 진실을.\n\n허나 그대의 정신은 닫혀 있지. 하지만 열릴 수 있다.§!"
 shroud.6763.desc: "§H나는 여전히 그곳에 있고... 두 행성의 노래를 듣는다. 하나는 침묵에 잠겨 있군.§!"
 shroud.6763.a: "당신은 이곳에 어울리지 않습니다."
 shroud.6765.desc: "§H그건 사실이다.§!"
 shroud.6770.name: "$r_the_lost_patron$"
 shroud.6770.desc: "§H[sanctum_of_the_lost_planet.GetName]§!에서 발견된 '고치'에는 강력한 차원 간 존재가 봉인되어 있습니다. 이 존재가 우리의 정신적 존엄성을 위협했던 $PSIONIC_AURA$의 근원일 가능성이 큽니다.\n\n현재 사이오닉 감쇠기가 그 위험을 일시적으로 억제하고 있지만, 언제까지 효과를 유지할 수 있을지는 미지수입니다. 통제된 환경에서라면 그 끔찍한 힘을 우리의 목적을 위해 활용할 수도 있을 것입니다.\n\n그럼에도 불구하고, 우리 사회의 많은 이들은 존재 자체가 오랜 가치관에 어긋난다며 즉각적인 파괴를 요구하고 있습니다."
 shroud.6770.a: "이 흉물을 파괴하세요."
 shroud.6770.b: "이... 존재를 이용할 방법을 찾아 보세요."
 destroyers_of_the_lost_modifier: "사라진 자들의 파괴자"
 destroyers_of_the_lost_modifier_tt: "§Y$living_standard_shroud_inoculation$§! 생활 수준을 이용할 수 있게 됩니다. 이 생활 수준에서는 §Y사이오닉§! 능력이 제거됩니다."
 destroyers_of_the_lost_modifier_desc: "사이오닉 적을 무너뜨리고 $PSIONIC_AURA$의 근원으로 보이는 것을 파괴함으로써, 수년간 지속된 고통을 이겨낸 제국의 사기가 진작되었습니다."
 living_standard_shroud_inoculation: "장막 접종"
 living_standard_shroud_inoculation_tooltip: "이 종족은 사이오닉 방사선의 해로운 효과에 대비해 예방 접종을 받고 있습니다.\n\n§R추가적인 피해를 막기 위해 모든 사이오닉 특성이 제거됩니다.§!"
 living_standard_shroud_inoculation_tooltip_delayed: "§L우리는 이 종족의 사이오닉 안전을 보장할 것입니다.§!"
 psionic_heresy: "사이오닉 이단"
 shroud.6780.name: "$r_the_lost_patron$"
 shroud.6780.desc: "우리의 정신을 뚫고 생각이 흘러 들어옵니다.\n\n밝고 거친 선율이 들려옵니다.\n\n우리는 이 익숙하고도 거대한 고통을 알고 있습니다.\n\n§H들어주었군. 이제 꿈은 그대의 것이니... 노래하라, 노래하라...§!"
 shroud.6780.a: "무슨 짓을 한 겁니까?"
 shroud.6785.desc: "§H약속한 대로, 그대를 위한 꿈을 꾸었지.§!"
 shroud.6785.a: "어떤 '꿈'이었죠?"
 shroud.6790.desc: "§H그대와 나 사이, 새로운 세계를 꿈꿨지.§!"
 shroud.6790.a: "그 세계가 우리에게 무슨 쓸모가 있죠?"
 shroud.6795.desc: "§H그걸 위해 가장 눈부신 노래를 부르겠다.§!"
 shroud.6795.a: "이 선택을 후회할 일이 없길 바랍니다."
 shroud.6795.a.tt: "성계당 1개씩, 최대 3개의 §H장막에 뒤덮인 행성§!이 우리 국경 내에 생성됩니다."
 r_the_lost_patron: "꿈꾸는 자"
 r_the_lost_patron_desc: "이 신비로운 존재는 장막 속 존재의 물리적인 형태로, 이미 사라진 한 사이오닉 제국의 옛 후원자였습니다. 이 존재가 어떻게 이 물리적 현실에 나타났는지는 알 수 없으나, 사이오닉 영역과의 독특한 연결 덕분에 막대한 힘을 지니고 있습니다."
 the_lost_patron_passive_effect: "§H$SHROUD_SEAL_PLURAL$§! 유효 범위: §G+1§!\n§H$SHROUD_SEAL_PLURAL$§! £unity£ §Y$unity$§! 생산량: §G+25§!\n§H$SHROUD_SEAL_PLURAL$§! £navy_size£ §Y$NAVY_SIZE_TITLE$§! 생산량: §G+10§!"
 the_lost_patron_before_activation_tt: "무슨 일이 일어날지 알 수 없습니다..."
 the_lost_patron_after_activation_effect_tt: "£decision£ §Y행성 결정§! 하나 잠금 해제: ['concept_dreamscaping_decision']"
 decision_dreamscaping: "꿈 조경"
 decision_dreamscaping_desc: "§Y$pc_shrouded$§!을 §Y$pc_gaia$§!로 테라포밍합니다."
 concept_dreamscaping_decision: "$decision_dreamscaping$"
 concept_dreamscaping_decision_desc: "$decision_dreamscaping_desc$"
 HAS_NOT_NUM_NEIGHBOR_SYSTEMS: "이웃 성계의 수($VAL0|2Y$)가 $VAL1|2Y$$COMPARE$이 아님"
 HAS_NEIGHBOR_SYSTEMS: "이웃 성계의 수($VAL0|2Y$)가 $VAL1|2Y$$COMPARE$"
 #======================
 # Endbringers origin
 #======================
 origin_endbringers: "종말의 전령"
 origin_endbringers_desc: "$CHALLENGING_ORIGIN$§R경고: ['concept_psionic_ascension']을 제외한 모든 승격 경로가 차단됩니다.§!\n\n이 문명은 오랫동안 이웃 행성을 장막에 뒤덮인 황량한 세계로 만든 수수께끼의 재앙에 집착해 왔습니다. 이제 이들은 별들 사이로 나아가 마침내 그 비밀을 탐구하고, 자신들에게도 비슷한 운명이 닥치게 될지를 알아내려 합니다."
 origin_tooltip_endbringers_negative_effects: "- 제국이 ['concept_paranoia_modifier'] 보정치를 가진 채 시작합니다.\n- ['concept_federation']을 형성하거나 참여할 수 없습니다."
 concept_paranoia_modifier: "$endbringers_paranoia$"
 concept_paranoia_modifier_desc: "고대의 재앙을 목격한 이후, 그 후손들은 점점 심해지는 파멸의 공포에 시달립니다.\n\n행복도 보정치가 점진적으로 악화됩니다: §R-5%§!에서 §R-50%§!"
 endbringers_paranoia: "편집증"
 endbringers_paranoia_desc: "고대의 재앙을 목격한 이후, 그 후손들은 만연한 파멸의 공포에 시달리고 있습니다. 우리도 다음 희생자가 되는 걸까요?"
 endbringers_paranoia_tt: "$chamber_of_silence_negative_effects_reduction$"
 START_SCREEN_ENDBRINGERS: "우리는 대재앙의 전조입니다.\n\n[GetSpeciesAdj] 문명이 막 시작되었을 무렵, 가장 가까운 이웃 천체에서 알 수 없는 재앙이 닥쳤습니다. 행성의 갑작스럽고 잔혹한 변화는 하늘을 악의에 찬 보랏빛으로 물들였고, 우리도 언젠가 같은 운명을 맞을 수도 있다는 공포에 떨어야 했습니다. 세대가 지날수록 잠재적인 절멸에 대한 숨 막히는 두려움은 점점 우리를 옥죄어 왔습니다.\n\n이제 [GetSpeciesNamePlural](이)가 별들을 향해 나아가는 가운데, 우리는 이 '$pc_shrouded$'을 탐사하려고 합니다. 수백 년간 찾아온 답이 드디어 손 닿을 거리에 다가온 것입니다. 그러나, 파괴적인 힘의 근원에 대한 집착이 오히려 멸망으로 이어질 수 있다는 경고의 목소리도 큽니다.\n\n머지않아, 우리는 이 수수께끼의 마지막 베일을 걷어낼 것입니다."
 shroud.8010.title: "[shrouded_planet.GetName](으)로의 임무"
 shroud.8010.desc: "§H[shrouded_planet.GetName]§!의 궤도를 도는 탐사 위성들이 이 '$pc_shrouded$'의 표면에 대한 첫 유인 탐사 임무의 유망한 목표 지점을 포착했습니다. 착륙 지점에서는 자외선 바람을 타고 행성 전체로 퍼지는 이상한 방사선이 발산되고 있습니다.\n\n동일한 저주가 우리 모성에도 퍼질까 두려워 이 임무를 반대하는 [Root.GetSpeciesNamePlural]들이 많습니다. 이들의 우려가 근거 없는 소리는 아니지만, 절대적인 필요에 따라 이 먼 현상에 대한 이해가 우선되어야 합니다.\n\n만약 언젠가 우리도 같은 재앙을 맞게 된다면, 그 이유도 모른 채 죽을 수는 없으니 말입니다."
 shroud.8010.a: "해답을 찾는 여정의 시작이군요."
 the_shrouded_world_site: "$pc_shrouded$"
 the_shrouded_world_site_desc: "마침내 우리는 §H[planet.GetName]§!(이)라는 이름의 '$pc_shrouded$'에 도달했습니다. 무언가가 그곳에서 우리를 부르고 있으며, 그 목소리는 어느 때보다 강렬하게 들려옵니다.\n\n이 세계에 닥친 대재앙의 비밀은 우리 성계 역사의 많은 부분을 밝혀줄 것이며, 운이 좋다면 우리 사회가 두려워하는 파멸에 대한 집착을 누그러뜨릴 수도 있을 것입니다. 궤도 스캔 결과, 남반구 한 지점에 집중된 강렬한 에너지 소용돌이 패턴을 포착했습니다. 마치 불길한 눈이 우리를 응시하는 것 같군요."
 shroud.8100.name: "끝이 다가오다"
 shroud.8100.desc: "§H[shrouded_planet.GetName]§!의 지형은 예상했던 대로 험난합니다. 어스름한 입자의 소용돌이가 공기를 가르며 §H[Leader.GetName]§!(과)와 승무원들의 초기 진척을 늦추고 있습니다.\n\n우려스럽게도, 연구 팀이 감각 이상 현상을 보고하기 시작했습니다. 멀리서 들려오는 울부짖음과 안개 속을 배회하는 그림자에 대한 보고를 전해 온 것입니다. 정말 이곳에 온 것이 실수였을까요?\n\n착륙 장면의 공개 방송 이후 §H[Owner.GetHomeWorldName]§!에서는 광범위한 공황 상태가 발생했습니다. 많은 이들이 한때 [shrouded_planet.GetName](을)를 덮쳤던 알 수 없는 파괴적인 힘의 재등장을 두려워하고 있습니다. 특히, '끝이 다가온다'고 외치는 조직적인 시위가 모성을 휩쓸어 기반 시설 대부분이 마비된 상태입니다.\n\n원격 스캔 결과, 인근 산맥 깊은 곳에서 특히 높은 방사선을 방출하는 공동이 발견되었습니다. 어떠한 대가를 치르더라도 그곳을 더 깊이 탐사해야 합니다."
 shroud.8100.a: "표면을 돌파하세요. 우리를 기다리는 것이 무엇인지 알아내야 합니다."
 the_end_is_nigh: "끝이 다가오다"
 the_end_is_nigh_desc: "임박한 재앙에 대한 불안감이 우리 사회에 드리워져 있습니다."
 shroud.8105.name: "외계 구조물"
 shroud.8105.desc: "우리는 이곳의 첫 방문자가 아닙니다.\n\n§H[shrouded_planet.GetName]§! 내 산악 공동의 표면은 이미 뚫려 있으며, 그 틈 사이로는 외계 문명의 폐허가 보입니다. 추가적인 사회 혼란을 막기 위해서 이 정보는 기밀로 유지하는 편이 최선일 것입니다.\n\n예비 분석 결과, 시설 건설에 사용된 재료는 행성에서 채취 가능한 광물의 분자 구성과 일치하지 않았습니다. 우주를 항해하는 문명이 이국적인 소재를 사용해 건설한 것으로 보입니다. 이 장소의 정확한 목적은 아직 알 수 없으나, 대부분의 기능이 자동화된 듯합니다.\n\n한편, 연구 팀의 심리적 이상 증상은 점점 악화되고 있습니다. 일부는 암호화된 주파수 속에서 속삭임을 들었다고 주장하며, 다른 이들은 주변 환경에 대한 왜곡된 인식을 보고합니다. 간헐적인 웃음 발작도 점점 자주 터져 나오는 가운데, 우리의 불안은 커져만 갑니다.\n\n그러나 돌아가기에는 이미 너무 멀리 와 버렸습니다."
 shroud.8110.name: "감시자"
 shroud.8110.desc: "모두가 죽어 있었습니다.\n\n시설 중심부의 각 관제소 자리에는 알 수 없는 외계 종족의 말라비틀어진 시체가 쪼그려 앉아 있으며, 여러 개의 창백한 눈은 천장을 응시하고 있습니다. 무서운 외형과 달리, §H[Leader.GetName]§!(은)는 이 시체들은 환각의 산물이 아니라고 확신했습니다. 이 생명체들의 모습은 현재 엄격한 기밀로 분류되어 있습니다.\n\n어떠한 무기도 발견되지 않았으며, 이는 이들이 적대적 의도를 가지고 §H[shrouded_planet.GetName]§!에 머물렀던 것이 아님을 시사합니다. 이 시설은 일종의 관측소였을 가능성이 높으며, 정교한 감시 장비로 §H[Owner.GetHomeWorldName]§!(을)를 직접 관찰하는 데 사용되었을 것입니다. 방사능 탄소 연대 측정 결과, 이들의 활동 시기는 재앙이 발생하기 훨씬 이전으로 추정됩니다.\n\n우리는 남아 있는 기록 중 다수를 해독했으며, 일상 통신을 제외하면 대부분이 우리 문명의 초기 역사와 관련된 것이었습니다."
 shroud.8110.a: "우리를 지켜보고 있었던 걸까요?"
 shroud.8115.name: "이해를 초월한 힘"
 shroud.8115.desc: "§H[shrouded_planet.GetName]§!의 데이터베이스를 해독한 결과, 한때 신화로 치부되었던 우리의 전설이 사실로 드러났습니다. 우리 종족은 '$tech_psionic_theory$'으로 알려진 정신과학 실험의 대상이었습니다.\n\n기록에 따르면, 우리 종족은 이러한 잠재력을 지니도록 정해져 있었습니다. 우리 조상 중 일부는 이들과의 교신을 꿈이나 희미한 목소리로 경험했을 테지만, 이는 정신질환이나 망상으로 치부되었을 것입니다. 그러나 실험은 갑작스럽게 중단되었고, 이 시설은 관측소에서 생존을 위한 피난처가 되고 맙니다.\n\n이들이 남긴 우리 사회에 대한 보고서는 §H'장막'§!이라 불리는 현실 사이의 장벽을 무모하게 조작하려 했던 재앙적인 실험 이후로 중단됩니다. 그 실험은 이들의 수도에서 진행되었으며, 과학자들은 이 사건을 '심판'이라 불렀습니다. 우리는 이것이 바로 대재앙의 근본적인 원인이었던 것으로 추측합니다.\n\n그 정체가 무엇이었든, 이 사건의 여파는 얼마 지나지 않아 §H[shrouded_planet.GetName]§!까지 퍼져 나갔습니다. 마지막 기록에는 단 한 문장만이 남아 있었습니다.\n\n§L끝이 도래했다.§!"
 shroud.8115.a: "우리도 끝을 맞게 되는 걸까요?"
 shroud.8120.name: "$fragment_of_reckoning$"
 shroud.8120.desc: "우리는 마침내 대재앙의 근원을 밝혀냈습니다. 찾는 것은 어렵지 않았습니다. §H[Leader.GetName]§!(은)는 그것이 자신을 부르고 있었다고 말합니다.\n\n기존의 분석으로는 설명할 수 없는, 맥동하는 무형의 덩어리가 시설 깊은 곳에서 발견되었습니다. §H[Leader.GetName]§!(은)는 물질도, 에너지도 아닌 그것을 소멸된 의지들의 분노가 남은 잔재라고 표현하며 §H'$fragment_of_reckoning$'§!이라고 명명했습니다.\n\n§H장막§!의 형체 없는 에너지를 통제하고 활용하려는 무모한 시도에서 이 물체는 심판에 맞서기 위한 방어 수단으로 만들어졌지만, 그것은 절반의 성공에 그쳤습니다. 이 세계의 마지막 순간에 그 사악한 존재는 강제로 차원 너머로 추방되었고, 연구진의 정신도 함께 끌려가 버린 것입니다. 이제 남아있는 것은 이 조각뿐입니다.\n\n이 물체는 우리 연구자들이 보는 환각과 환영을 증폭시켜, 제한된 현실 너머를 들여다볼 수 있는 제2의 시야를 부여합니다. 이 발견은 위험하지만 엄청난 잠재력을 지니고 있습니다."
 shroud.8120.a: "우린 아직 배울 것이 많군요..."
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY: "$tech_psionic_theory$"
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC: "§H[shrouded_planet.GetName]§!에서 발견한 사이오닉 에너지 조각에는 반드시 밝혀야 할 비밀이 담겨 있습니다.\n\n우리 자신의 한정된 사고만이 이를 가로막고 있을 뿐입니다."
 ENDBRINGERS_PSIONIC_THEORY_PROJECT_TOOLTIP: "완료하려면 §H£society_research£ $tech_psionic_theory$§!을 연구하십시오."
 ENDBRINGERS_ADOPT_PSIONICS_TRADITION: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY$"
 ENDBRINGERS_ADOPT_PSIONICS_TRADITION_DESC: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC$"
 ENDBRINGERS_PSIONICS_TRADITION_PROJECT_TOOLTIP: "완료하려면 §H$tradition_psionics_shroud$§! 전통을 채택하십시오."
 shroud.8200.title: "광기의 영역"
 shroud.8200.desc: "최근 발견된 사이오닉 분야에 관한 연구는 정신을 관문 삼아 접근할 수 있는 또 다른 차원의 존재를 확인해 주었습니다. 그 베일 너머에는 우리가 이해하려 애쓰는 혼돈의 영역이 펼쳐져 있습니다.\n\n그 깊은 곳에서 §R목소리§! 하나가 우리에게 손짓합니다. 그것이 말하는 약속은 구원이 아니라 새로운 시작입니다. 그 알 수 없는 힘을 휘두른다는 것은 지금까지 우리가 쌓아 온 모든 것을 버리고, 광기 그 자체에 새겨진 운명을 여는 일입니다.\n\n§R\"때가 되었다.\"§!"
 shroud.8200.a: "우리가 무슨 짓을 한 거죠?"
 shroud.8200.a.tt: "§H$tradition_psionics_shroud$§! 전통 트리가 잠금 해제됩니다."
 chamber_of_silence_negative_effects_reduction: "각 ['building:building_chamber_of_silence']은 부정적인 효과를 §G$@chamber_of_silence_effect_mult|0%$§! 감소시킵니다."
 endbringers_madness_1: "광기"
 endbringers_madness_1_desc: "우리 제국은 §R목소리§!를 쫓는 단 하나의 목적에 모든 힘을 쏟고 있습니다. 우리의 정신은 해답을 찾을 때까지 멈추지 않을 것입니다."
 endbringers_madness_1_tt: "$chamber_of_silence_negative_effects_reduction$"
 endbringers_madness_2: "$endbringers_madness_1$"
 endbringers_madness_2_desc: "우리 제국은 §R목소리§!에 점점 가까워지고 있습니다. 우리의 강렬한 충동이 점차 누그러집니다."
 endbringers_madness_2_tt: "$endbringers_madness_1_tt$"
 endbringers_madness_3: "$endbringers_madness_1$"
 endbringers_madness_3_desc: "우리 제국은 §R목소리§!를 거의 들을 수 있습니다. 곧 그 뜻을 깨닫게 될 것입니다."
 endbringers_madness_3_tt: "$endbringers_madness_1_tt$"
 ALLOW_CHAMBER_OF_SILENCE: "건물 잠금 해제: ['building:building_chamber_of_silence']"
 tr_psionics_endbringers_cult: "목소리의 교단"
 tr_psionics_endbringers_cult_desc: "$ALLOW_CHAMBER_OF_SILENCE$"
 tr_psionics_endbringers_cult_delayed: "한번 목소리를 듣고 나면 무시할 수 없습니다. 우리는 그 의지를 따릅니다."
 building_chamber_of_silence: "침묵의 방"
 building_chamber_of_silence_desc: "제국 각지의 사이오닉 능력자들이 이곳에 모여 침묵의 보호가 깃든 방에서 장막과 교감합니다."
 building_chamber_of_silence_madness_1_tt: "['modifier:endbringers_madness_1']의 부정적인 효과가 §G$@chamber_of_silence_effect_mult|0%$§! 감소합니다."
 building_chamber_of_silence_madness_2_tt: "['modifier:endbringers_madness_2']의 부정적인 효과가 §G$@chamber_of_silence_effect_mult|0%$§! 감소합니다."
 building_chamber_of_silence_madness_3_tt: "['modifier:endbringers_madness_3']의 부정적인 효과가 §G$@chamber_of_silence_effect_mult|0%$§! 감소합니다."
 building_chamber_of_silence_paranoia_tt: "['modifier:endbringers_paranoia']의 부정적인 효과가 §G$@chamber_of_silence_effect_mult|0%$§! 감소합니다."
 building_chamber_of_silence_destroyed_tt: "§R이 식민지가 소실되면 이 건물도 파괴됩니다.§!"
 shroud.8310.name: "$shroud.2750.name$"
 shroud.8310.desc: "우리는 더 높은 존재의 단계로 부름을 받았습니다. 헛된 저항에 매달리던 자들은 승격의 신성함을 지키기 위해 제거되고 있습니다. 우리의 운명은 이미 정해졌고, 돌아갈 길은 $pc_shrouded$의 그림자 속으로 무너져 내렸습니다.\n\n이제 §R목소리§!가 명료하고 강렬하게 울려 퍼집니다.\n\n§R\"길이 정해졌다.\"§!\n\n목소리는 자발적인 희생을 바라고 있습니다."
 shroud.8310.a: "불가피한 일입니다."
 shroud.8310.a.tt: "각 식민지에서 100~300 £pop£ §H팝§!이 사라집니다."
 situation_breach_shroud_endbringers: "$situation_breach_shroud$"
 situation_breach_shroud_endbringers_type: "$situation_breach_shroud_type$"
 situation_breach_shroud_endbringers_monthly_change_tooltip: "$situation_breach_shroud_monthly_change_tooltip$"
 situation_breach_shroud_endbringers_cult_of_the_voice_needed_desc: "£trigger_no£ $tr_psionics_endbringers_cult$ 전통이 없음\n£trigger_no£ $building_chamber_of_silence$ 건물이 없음"
 situation_breach_shroud_endbringers_chamber_of_silence_needed_desc: "£trigger_yes£ $tr_psionics_endbringers_cult$ 전통이 있음\n£trigger_no£ $building_chamber_of_silence$ 건물이 없음"
 approach_situation_breach_shroud_endbringers_nothing: "$approach_situation_breach_shroud_nothing$"
 approach_situation_breach_shroud_endbringers_nothing_desc: "올 것은 결국 오기 마련입니다."
 breach_shroud_endbringers_nothing_tooltip: "$situation_speed_tt$: §R-25%§!"
 approach_situation_breach_shroud_endbringers_blind: "자발적 시력 상실"
 approach_situation_breach_shroud_endbringers_blind_desc: "우리가 갈 곳에서 [Owner.Species.GetEyeNamePlural]의 시력은 필요 없습니다."
 breach_shroud_endbringers_blind_tooltip: "$situation_speed_tt$: §G+50%§!\n$breach_shroud_endbringers_blind_effects_tooltip$"
 breach_shroud_endbringers_blind_effects_tooltip: "매월 $@nb_blinded_pop|0$ £pop£ §H팝§!에 ['trait:trait_blindness'] 특성이 추가됩니다."
 approach_situation_breach_shroud_endbringers_forsake_flesh: "육신 포기"
 approach_situation_breach_shroud_endbringers_forsake_flesh_desc: "우리 육신의 한계가 변화를 향한 길을 막습니다."
 breach_shroud_endbringers_forsake_flesh_tooltip: "$situation_speed_tt$: §G+100%§!\n$breach_shroud_endbringers_forsake_flesh_effects_tooltip$"
 breach_shroud_endbringers_forsake_flesh_effects_tooltip: "매월 $@nb_forsaken_pop|0$ £pop£ §H팝§!이 사라집니다."
 approach_breach_shroud_endbringers_wait_cooldown_tooltip: "$TRIGGER_FAIL$ §Y[Target.approach_breach_shroud_endbringers_cooldown_wait_time]§!까지 새로운 접근 방식을 선택할 수 없습니다."
 approach_breach_shroud_endbringers_blind_cooldown_tooltip: "$TRIGGER_FAIL$ §Y[Target.approach_breach_shroud_endbringers_cooldown_blind_time]§!까지 새로운 접근 방식을 선택할 수 없습니다."
 approach_breach_shroud_endbringers_forsake_cooldown_tooltip: "$TRIGGER_FAIL$ §Y[Target.approach_breach_shroud_endbringers_cooldown_forsake_time]§!까지 새로운 접근 방식을 선택할 수 없습니다."
 trait_blindness: "눈먼 자"
 trait_blindness_desc: "우리가 갈 곳에서 [Species.GetEyeNamePlural]의 시력은 필요 없습니다."
 # Establishing the Chamber of Silence
 shroud.2820.name: "$building_chamber_of_silence$ 설립"
 shroud.2820.desc.1: "사이오닉 능력에 숙달할수록, 장막 너머에서 들려오는 뒤섞인 속삭임이 우리를 휘감습니다. 그 어느 때보다 크고 또렷해진 §R목소리§!가 생각의 흐름을 뚫고 우리 정신 속 그림자에 스며듭니다.\n\n§R\"길을 열어라.\"§!"
 shroud.2820.desc.2.intro: "이 잡음을 걸러내야 합니다."
 shroud.2820.desc.2.chamber: "$shroud.2820.desc.2.intro$ $shroud.2820.desc.2.outro$을 구축했습니다."
 shroud.2820.desc.2.no_chamber: "$shroud.2820.desc.2.intro$ $shroud.2820.desc.2.outro$의 설계를 완료했습니다."
 shroud.2820.desc.2.outro: "가장 뛰어난 사이오닉 능력자들이 §R목소리§!의 지시를 황홀한 명료함 속에서 들을 수 있도록 차폐 시설"
 shroud.2820.a.chamber: "우리 정신이 더욱 확장되는군요."
 shroud.2820.a.no_chamber: "'$building_chamber_of_silence$'을 건설합시다."
 CONTINUE_SITUATION: "§Y상황§! 진행:"
 shroud.2820.a.tt: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2820.a.tt_no_chamber: "상황을 진행하려면 §H$tr_psionics_endbringers_cult$§! 전통을 채택하고 §H$building_chamber_of_silence$§! 건물을 건설하십시오."
 # The Great Awakening
 shroud.2830.name: "$utopia.2650.name$"
 shroud.2830.desc: "$building_chamber_of_silence$ 안에서 우리는 §R목소리§!의 메시지를 명료하게 듣습니다.\n\n§R\"모든 것이 다시 태어날 것이다.\"§!\n\n이제 그 의미를 이해할 수 있습니다. 끝은 곧 재탄생입니다. 우리는 상상했던 것보다 강하고 뛰어난 존재로 다시 태어날 테니, 두려워해서는 안 됩니다.\n\n이 운명을 붙잡기 위해선 §H장막§!이라 불리는 정신 영역에 통달해야 합니다. 우리는 $pc_shrouded$에서 발견한 자들의 실수를 반복하지 않을 겁니다. 그들이 두려움을 거부한 곳에서, 우리는 받아들여야 합니다."
 shroud.2830.desc.outro.awakening: "우리 시야는 명확합니다."
 shroud.2830.desc.outro.no_awakening: "우리 시야는 거의 명확합니다."
 shroud.2830.a.awakening: "장막이 열쇠를 쥐고 있습니다."
 shroud.2830.a.no_awakening: "$shroud.2780.a$"
 shroud.2830.a.tt: "$tr_psionics_psionic_assimilation_desc$\n$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2830.a.tt_no_awakening: "상황을 진행하려면 §H$tr_psionics_shroud_great_awakening$§! 전통을 채택하십시오."
 # Blind the Willing - First select event
 shroud.8320.name: "명료한 시야"
 shroud.8320.desc: "§H[blinded_leader.GetName]§!(이)가 우리에게 길을 보여 주었습니다. 그러나 불필요한 감각들이 §R목소리§!의 부름을 흐립니다. 감각 하나를 제거하면 사이오닉 능력이 더욱 향상될 것입니다.\n\n가장 효과적인 방법은 [Species.GetEyeNamePlural](을)를 포기하는 것입니다. 물리적 영역에서의 시야는 §H장막§!을 가릴 뿐입니다. §H[blinded_leader.GetName]§!의 인상적인 본보기를 따라, 많은 [Root.GetSpeciesNamePlural]들이 주저 없이 자신의 [Species.GetEyeNamePlural](을)를 제거했습니다.\n\n이들은 §R목소리§!의 찬사에 정신이 가득 차 큰 만족을 느끼고 있습니다."
 shroud.8320.a: "시야 너머의 시야로군요."
 leader_trait_blinded: "눈먼 자"
 leader_trait_blinded_desc: "아직 보지 못한 광경이 존재합니다."
 # A Leap of Faith - First select event
 shroud.8330.name: "신뢰의 도약"
 shroud.8330.desc: "육신의 한계에 답답함을 느낀 §H[forsaken_leader.GetName]§!(이)가 극적인 모습으로 모두가 보는 앞에서 치명적인 독을 마시며 사이오닉 변화를 가속하려 했습니다.\n\n사망한 [forsaken_leader.GetName]의 몸은 선명한 보랏빛으로 물들었고, 순수한 사이오닉 에너지의 미세한 가루로 분해되었습니다. 이 기적은 §R목소리§!의 의지 덕분에 가능했습니다.\n\n우리는 이것을 분명한 신호로 받아들였습니다. §H[forsaken_leader.GetName]§!(이)가 이끈 길을 다른 이들도 따라야 한다고 말입니다."
 shroud.8330.a: "육신의 한계가 발목을 잡게 놔둘 수는 없습니다."
 # Mid-stage events
 shroud.8350.name: "뇌엽절리술"
 shroud.8350.desc: "[owner.GetSpeciesNamePlural] 중 일부가 §R목소리§!와 조화를 이루는 데 어려움을 겪고 있습니다.\n\n평화를 되찾고자 하는 갈망 속에서 우리 중 가장 약한 자들은 거칠고 규제받지 않은 뇌엽절리술을 받았습니다. 이러한 행위를 방치하면 빠르게 확산될 위험이 있습니다."
 shroud.8350.a: "약한 자들이 원하는 대로 하게 둡니다."
 shroud.8350.b: "§R목소리§!는 축복이니, 이 행위를 금지하세요."
 endbringers_voice_plague: "목소리의 괴롭힘"
 endbringers_voice_plague_desc: "목소리가 말할 때 우리는 그저 들을 수밖에 없습니다."
 shroud.8360.name: "사이오닉 자가 실험"
 shroud.8360.desc: "우리는 계속해서 §R목소리§!를 받아들이고, 그 목소리는 부정할 수 없는 진실을 전합니다.\n\n많은 [owner.GetSpeciesNamePlural]들이 §R목소리§!를 증폭하기 원하며, 그 지혜를 더 직접적으로 누릴 방법을 찾고 있습니다.\n\n암시장 약물의 사용량이 급격히 늘었고, 규제받지 않은 의료 시설들이 개인의 사이오닉 감각을 극대화하는 실험적 서비스를 제공하고 있습니다.\n\n이 상황은 우리를 어디로 이끌게 될까요?"
 shroud.8360.a: "§R목소리§!를 불러내기 위해 할 수 있는 모든 것을 다하세요."
 shroud.8360.b: "완전한 무질서는 막아야 합니다."
 shroud.8370.name: "종말의 악몽"
 shroud.8370.desc: "우리의 사이오닉 능력이 커지면서 [owner.GetSpeciesAdj]들이 우주의 종말을 예고하는 끔찍한 악몽에 시달리고 있습니다.\n\n우리의 꿈은 종말의 예언서가 되었고, 국민들 사이에서는 실존적인 두려움이 더욱 깊어졌습니다. 수면은 불안한 혼미 상태를 뜻하는 말로 변해 버렸으며, 많은 이들이 일상을 유지하지 못하고 있습니다.\n\n꿈속에서 §R목소리§!가 우리에게 말합니다.\n\n§R\"엔트로피를 받아들여라.\"§!"
 shroud.8370.a: "모든 시작에는 끝이 있어야 합니다."
 shroud.8370.b: "$building_chamber_of_silence$을 피난처로 제공합시다."
 endbringers_apocalyptic_nightmares: "종말의 악몽"
 endbringers_apocalyptic_nightmares_desc: "목소리가 대재앙의 환영으로 우리의 수면 주기를 방해하고 있습니다."
 endbringers_nightmare_shelter: "악몽의 피난처"
 endbringers_nightmare_shelter_desc: "$building_chamber_of_silence$이 대재앙의 악몽에 시달리는 이들에게 피난처가 되어 줍니다."
 shroud.8380.name: "끝의 표식"
 shroud.8380.desc: "국민들 사이에서 자해 행위가 점점 유행하고 있습니다.\n\n§R목소리§!의 극단적인 신봉자들은 '끝'의 상징을 육체에 새기며, 이것이 끔찍한 축복을 가져온다고 주장합니다.\n\n사실 여부와 관계없이, 이런 의식을 행하는 자들이 급격히 늘고 있습니다. 이것이 정말 §H장막§!의 뜻인 걸까요?"
 shroud.8380.a: "이 상징은 자랑스러운 표식입니다."
 shroud.8380.a.tt: "인구 절반이 ['trait:trait_marked'] 특성을 획득합니다."
 shroud.8380.b: "이건 잘못된 일입니다."
 approach_blind_selected_tt: "$approach_situation_breach_shroud_endbringers_blind$ 접근 방식을 선택하지 않았습니다."
 approach_forsake_selected_tt: "$approach_situation_breach_shroud_endbringers_forsake_flesh$ 접근 방식을 선택하지 않았습니다."
 trait_marked: "표식을 새긴 자"
 trait_marked_desc: "섬뜩한 헌신의 표현으로, 이 종족은 자신의 육체에 '끝'의 표식을 새겼습니다."
 trait_marked_unity_bonus: "100 £pops£ 팝당 생성되는 £unity£: §G+0.06§!"
 endbringers_sanity: "광기 속의 이성"
 endbringers_sanity_desc: "이성을 지키려는 강한 의지가 우리를 광기의 함정으로부터 지켜 줍니다."
 # Breach the Shroud
 shroud.2840.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2840.desc: "$shroud.2800.intro$ 무형의 심연 속에서 헤아릴 수 없는 힘을 지닌 불길한 존재가 나타납니다. 그것은 바로 §R목소리§!이며, 떨리는 힘으로 우리 정신 속 깊은 곳을 관통합니다.\n\n§R\"내 이름을 알라.\"§!\n\n이제야 우리는 비로소 우리의 작은 정신이 §R목소리§!와 얼마나 멀리 떨어져 있는지 깨닫습니다. 봉인은 깨졌고, 곧 우리의 본질이 완전히 드러날 것입니다.\n\n우리 텔레파시 능력자들은 이제 장막의 심장부로 깊이 들어가 위대한 후원자의 진정한 이름을 알아낼 준비가 되었습니다."
 shroud.2840.a: "교감할 시간입니다."
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE: "§R목소리§!와 교감합니다."
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_DESC: "우리는 하나의 목적을 가지고 [capital_scope.GetName]에 모였습니다.\n\n이제 우리는 §H장막§! 깊숙한 곳까지 손을 뻗어, 경이로운 힘을 지닌 §R목소리§!가 우리를 인지하고 교감하도록 만들 것입니다.\n\n우리는 그 존재를 대재앙이라 불렀고, 다른 이들은 심판이라 불렀습니다. 이제 그 진정한 이름이 우리에게 드러날 것이며, 우리는 그 지식으로 위대함을 이룰 것입니다."
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_PROJECT_TOOLTIP: "완료하려면 §H탐사§!를 3번 진행하십시오.([GetEndbringersDelveCount]/3)"
 # EotC Delve Events
 shroud.8420.title: "침묵의 시련"
 shroud.8420.desc: "우리는 장막 속으로 내려갑니다. 혼란스러운 잡음이 우리의 목표인 §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!에 집중하는 것을 방해하지만, 하나 된 의지가 소음을 잠재워 줍니다.\n\n하지만 목적만으로는 우리를 지킬 수 없습니다. 목소리들이 공허한 미사여구를 속삭이며 하찮은 유혹을 던져 옵니다. 목소리는 점점 의미를 잃어 가지만, 모두 하나같이 매혹적입니다.\n\n우리가 분열되기 시작하자 존재가 다시 돌아옵니다. 그 순간 단 하나의 명령이 공허를 울립니다.\n\n§R\"침묵하라.\"§!"
 shroud.8420.a: "침묵을 유지하고 버텨 냅시다."
 shroud.8420.a.reply: "그 명령은 혼돈을 가르며, 잡음을 쓸어내고, 우리를 집어삼키려던 거슬리는 혼란을 정화합니다. 우리는 균열을 견디며 정신을 다잡습니다.\n\n§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!(은)는 더욱 깊은 장막 속으로 물러납니다. 그 존재를 뒤따르는 명료함은 귀를 멍하게 할 정도로, 우리 정신의 빈틈을 채우며 새로운 결의를 남깁니다.\n\n그러고는 선물을 남겼습니다. 하나같이 경이로 가득합니다."
 shroud.8420.a.tooltip: "§Y$endbringers_madness_1$§!에서 다음 효과가 사라집니다:\n$t$$MOD_POP_AMENITIES_USAGE_MULT$: $@madness_base_pop_amenities_usage_mult|0=-%$"
 shroud.8430.title: "순수의 시련"
 shroud.8430.desc: "장막을 깊이 파고들수록, 지각 있는 혼돈의 부패가 보입니다.\n\n썩어 가는 무위의 정신이 겹겹이 쌓인 사이오닉 소용돌이를 만들며 장막을 악취나는 부패로 오염시키고 있습니다. 이 혐오스러운 혼돈 속에서, 우리는 목표인 §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!의 압도적인 존재감을 느끼기 시작합니다.\n\n그 존재의 악의가 혼란을 짓누르며 우리의 정신에 퍼지는 것이 느껴집니다. 우리는 다가올 심판을 대비하며 공허에 울려 퍼지는 명령을 듣습니다.\n\n§R\"질서. 통합.\"§!"
 shroud.8430.a: "버티세요!"
 shroud.8430.a.reply: "명령이 악의에 찬 혼돈을 관통합니다.\n\n수많은 목소리가 고통에 울부짖고, 장막을 뒤덮었던 지각 있는 왜곡들이 §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!에 의해 씻겨 나갑니다. 그 뒤에는 결함이 사라진 영역만이 남습니다.\n\n존재는 장막 속으로 더 깊이 잠겨 들고, 우리는 이 완전한 정화의 결과를 관찰하고 연구하도록 남겨집니다."
 shroud.8430.a.tooltip: "§Y$endbringers_madness_2$§!에서 다음 효과가 사라집니다:\n$t$$mod_planet_pops_upkeep_mult$: $@madness_base_planet_pops_upkeep_mult|0=-%$"
 shroud.8440.title: "불의 시련"
 shroud.8440.desc: "장막에 들어서자 우리는 고통만을 느낍니다. 평소 소용돌이치던 사이오닉 안개가 불지옥이 되어 우리의 정신을 불태웁니다.\n\n고통 속에서 우리는 도시가 용암 속으로 무너지고, 행성이 불길에 삼켜지고, 불타는 영혼이 스스로의 형체를 불타는 재로 만들며 모든 인구가 고통에 차 몸부림치는 모습을 봅니다.\n\n화염의 중심에 선 우리는 §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!의 존재를 느낍니다. 그 힘이 현실을 집어삼킬 위협을 가하기 시작하자, 그 존재가 명령합니다.\n\n§R\"해방.\"§!"
 shroud.8440.a: "면죄를 받아들입시다."
 shroud.8440.a.reply: "사이오닉 불꽃이 우리의 정신을 삼키고, 안주하는 마음을 태워 버립니다. 남은 것은 정화된 결의뿐입니다.\n\n이제 우리는 §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!의 영광스러운 목적과 그것이 제공하는 놀랄 정도로 단순한 아름다움을 알 수 있습니다."
 shroud.8450.title: "$utopia.3310.name$"
 shroud.8450.desc: "선포가 울려 퍼집니다.\n\n§R\"내 이름을 알라.\"§!\n\n별들을 향한 우리 여정의 절정이자 수 세기 동안 이어진 의문에 대한 답이 여기 있습니다. $end_of_the_cycle_color_article_cap$이 우리를 부르고, 계약이 맺어집니다.\n\n§R\"끝이 시작된다.\"§!\n\n고통, 몸부림, 확신. 단어들이 희미해지며 우리의 운명이 결정됩니다.\n\n이제야 보입니다. 은하계는 침묵에 잠겼고, §R$end_aura$§!는 그 누구도 피할 수 없습니다."
 shroud.8450.a: "피할 수 없는 끝이 기다리는군요."
 shroud.8450.a.homicidal: "아름다운 공포가 기다리는군요."
 shroud.8450.a.tech_tooltip: "기술 획득:\n£society£['technology:tech_psionic_aura']\n£society£['technology:tech_aura_intensification']"
 embracing_the_end: "끝을 받아들이다"
 embracing_the_end_desc: "마침내 우리는 끝의 아름다움을 봅니다. 받아들입시다."
 MOD_SHIP_PSIONIC_AURA_SPEED_MULT: "아무 $PSIONIC_AURA$ 내 $MOD_SHIP_SPEED_MULT$"
 MOD_SHIP_PSIONIC_AURA_FIRE_RATE_MULT: "아무 $PSIONIC_AURA$ 내 $MOD_SHIP_FIRE_RATE_MULT$"
 end_of_the_cycle_endbringers: "$end_of_the_cycle_article_cap$"
 situation_end_of_the_cycle_endbringers_desc: "$end_of_the_cycle_color_article$과의 계약은 우리에게 헤아릴 수 없는 힘과 영광스러운 사명을 내렸습니다.\n\n후원자의 의지가 이 현실의 완전한 파괴를 요구합니다. §H$end_aura$§!가 각 성계를 삼킬 때마다 자비로운 종말이 점점 더 가까워집니다.\n\n우리는 필연의 순간을 목도할 것입니다.\n\n아직 정복되지 않은 성계: [Owner.GetEndCycleGalaxySystemsLeft]"
 end_of_the_cycle_endbringers_monthly_change_tooltip: "$end_of_the_cycle_monthly_change_tooltip$"
 situation_end_of_the_cycle_endbringers_finish_effects: "§R심판이 기다립니다.§!"
 approach_situation_end_of_the_cycle_bring_the_inevitable: "피할 수 없는 운명을 가져온다"
 approach_situation_end_of_the_cycle_stall_for_time: "시간을 번다"
 approach_situation_end_of_the_cycle_delay_your_destiny: "운명을 늦춘다"
 shroud.8460.title: "기울어진 모래시계"
 shroud.8460.desc: "$end_of_the_cycle_color_article$의 힘에는 대가가 따르며, 이제 우리에게 주어진 시간이 끝나가고 있습니다.\n\n은하계는 아직 우리 후원자의 오라에 완전히 정화되지 않았으며, 지금까지의 노력은 미미한 수준에 불과합니다.\n\n이 거대한 사명을 완수할 수 있도록 장막 너머에서 새로운 에너지가 흘러옵니다. 이것은 약속된 축복입니다!"
 shroud.8460.a: "아직 완수할 수 있습니다."
 shroud.8470.title: "끝이 다가오다"
 shroud.8470.desc: "우리 후원자의 힘은 막대하지만, 이제 시간이 거의 다 되었습니다. $end_of_the_cycle_color_article$의 자비로운 종말은 이런 명백한 무능함을 용납하지 않을 것입니다.\n\n그러나 아직 작은 희망이 남아 있습니다. 어떤 대가를 치르더라도 $end_aura$로 은하계를 뒤덮어야 합니다. 이토록 절박한 상황 속에서, [GetTelepathPlural]들은 이제 §H장막§! 속에서 가능한 모든 에너지를 끌어내고 있습니다."
 shroud.8470.a: "실패해선 안 됩니다!"
 shroud.8480.title: "$GALACTIC_FOCUS$ 폐지"
 shroud.8480.desc: "은하 의회가 파괴적 §H$PSIONIC_AURA$§!의 방출원을 방위 활동의 우선 목표로 지정하는 결의안을 폐지했습니다. 그 결과 은하 공동체 회원국들이 §H[former_malevolent_aura.GetName]§!에 대해 현재 수행 중인 모든 군사 작전을 즉시 중단했습니다. 지금으로서는 이 영역에 평화가 다시 찾아왔습니다."
 shroud.8481.desc: "은하 의회가 우리를 '방위' 활동의 목표로 지정하는 결의안을 폐지했으며 모든 공동체 회원국의 공격 중단을 지시했습니다. 우리 제국에 대한 군사 행동은 현재 멈춘 상태입니다... 당분간은 말입니다."
 shroud.8481.homicidal: "$shroud.8480.desc$\n\n$crisis.4111.nasty$"
 shroud.8500.title: "끝의 전조"
 shroud.8500.desc.intro: "우리 후원자의 피할 수 없는 의지가 은하계를 강력하게 장악하고 있습니다. 이제 우리는 끝이 어떻게 도래할지 압니다.\n\n은하계 전체에 §R$end_aura$§!가 퍼져야 합니다. 물리적 세계가 §H장막§!의 순수한 본질과 결합하는 순간, 진정한 멸망이 찾아올 것입니다."
 shroud.8500.desc.outro: "이 거대한 사명은 우리의 가장 위대한 업적이자 궁극적인 구원으로 가는 문이 될 것입니다."
 shroud.8500.desc.homicidal: "$shroud.8500.desc.intro$\n\n은하계 속 모든 생명의 절멸은 기분 좋은 부수적 효과에 지나지 않습니다. $shroud.8500.desc.outro$"
 shroud.8500.desc.default: "$shroud.8500.desc.intro$\n\n$shroud.8500.desc.outro$"
 shroud.8500.a: "실패해선 한 됩니다."
 shroud.8600.title: "$shroud.4970.title$"
 shroud.8600.desc.intro: "이것이 우리의 운명이었습니다.\n\n§R$end_aura$§!가 은하를 감싸고, [Root.GetHomeWorldName]의 인구는 기뻐하며 광란의 황홀경에 빠졌습니다."
 shroud.8600.desc.outro: "위대한 각성의 시간부터 약속된 영광스러운 재탄생이 다가왔습니다.\n\n우리 앞의 모든 존재가 공허에 삼켜집니다. 소멸과 말살만이 은하계의 유일한 법칙이 되었고, 모든 행성이 차례차례 무로 돌아갑니다.\n\n마지막은 우리 차례입니다. 그 자태는... 매우 아름답습니다. 우리는 그 속에서 몸부림치는, 새롭고 연약한 형태를 봅니다. 끝이 도래했고, 새로운 시작이 펼쳐집니다."
 shroud.8600.desc.homicidal: "$shroud.8600.desc.intro$ 우리를 제외한 모든 존재가 소멸하는 것입니다. $shroud.8500.desc.outro$"
 shroud.8600.desc.default: "$shroud.8600.desc.intro$ 우리는 구원받았습니다. $shroud.8600.desc.outro$"
 shroud.8600.a: "완전한 끝은... 없습니다."
 shroud.8610.title: "나약함의 대가"
 shroud.8610.desc.intro: "우리는 실패했습니다. 우리의 나약함으로 인해 $end_of_the_cycle_color_article$의 의지가 영광스러운 열매를 맺지 못한 것입니다. 이제 우리는 무능함의 대가를 치러야 합니다.\n\n순환의 끝은 모든 것을 앗아갔습니다. [Root.GetName](은)는 순식간에... 사라졌습니다. 한때 번성하던 식민지에 남은 것은 이제 폐허뿐이며, 막강한 함대가 공허를 지나던 장소에는 정적과 잔해만이 남았습니다. 모두 순환의 끝에 의해 삼켜졌습니다. 모두 §H장막§!에 빼앗겼습니다."
 shroud.8610.desc.outro: "우리 후원자는 [former_capital.GetName] 위 우주에 거대한 장막의 존재로서 모습을 드러냈습니다. 우리 사이오닉 능력자들의 의식을 집어삼키고 막대한 힘을 얻은 존재는 우리가 완수하지 못한 임무를 끝내기 위해 은하를 방황합니다."
 shroud.8610.desc.a: "$shroud.8610.desc.intro$\n\n$shroud.8610.desc.outro$"
 shroud.8610.desc.b: "$shroud.8610.desc.intro$\n\n대부분의 [Root.GetSpeciesNamePlural]들이 이 운명을 받아들였지만, 소수의 불신자들은 후원자의 궁극적 의지에 굴복하기를 거부했습니다. 이들은 순환의 끝의 영향력이 닿지 않는 행성에 숨어 있던 추방자들로, 다가오는 일을 미리 알았던 강력한 사이오닉 능력자인 §H[Root.GetRulerName]§!(을)를 따르고 있습니다.\n\n$shroud.8610.desc.outro$ 사명이 끝나면 추방자들 또한 예외가 되지 않을 것입니다."
 shroud.8610.a: "어쩌면 예정된 운명이었을지도..."
 shroud.8610.b: "과연 추방자들이 저항할 수 있을까요?"
 shroud.8710.title: "종말의 생존자들"
 shroud.8710.desc: "됐습니다. §R심판§!이 파괴되었습니다.\n\n$end_of_the_cycle_color_article_cap$은 다시 §H장막§! 깊은 곳으로 후퇴했습니다. 존재가 우리 물리적 현실에 가했던 위협은 당분간 문제가 되지 않을 것입니다.\n\n장막에 덮인 아바타의 시체가 소용돌이치며 사라져갈 때, 우리는 그 물리적 잔해를 성공적으로 회수했습니다. 시체에 불과함에도 텔레파시 능력자들은 잔해가 방출하는 엄청난 사이오닉 에너지를 감지할 수 있었으며, 그 힘은 §H[shrouded_planet.GetName]§!에서 회수한 조각보다 훨씬 강력했습니다.\n\n이 응축된 필연성의 핵은 심판을 견뎌 낸 은하의 잿더미에서 위에서 재건을 이루는 데 쓰일 수 있습니다.\n\n순환의 끝이 찾아왔고 또 사라졌지만, 우리는 여전히 이곳에 존재합니다. 어떻게든 말이죠."
 shroud.8710.a: "이것이 예정된 운명이었을까요?"
 r_core_of_the_reckoning: "심판의 핵"
 r_core_of_the_reckoning_desc: "심판의 잔해에서 회수된 이 핵은 여전히 강력한 사이오닉 에너지를 방출하고 있습니다."
 core_of_reckoning_active_effect_tt: "£decision£ §Y행성 결정§! 하나 잠금 해제: ['concept_banish_decision']"
 decision_banish: "추방"
 decision_banish_desc: "장막이 이곳을 잠식하게 하면 심판의 핵에 균형이 돌아옵니다."
 decision_banish_effects_tt: "이 행성을 장막으로 추방합니다."
 concept_banish_decision: "$decision_banish$"
 concept_banish_decision_desc: "$decision_banish_desc$\n$decision_banish_effects_tt$\n§Y10§!년 동안 §Y$shroud_surge$§! 보정치 추가됨:\n$shroud_surge_effects$"
 shroud_surge: "장막 쇄도"
 shroud_surge_desc: "$r_core_of_the_reckoning$의 균형이 일시적으로 돌아왔습니다."
 shroud_surge_effects: "§Y$r_core_of_the_reckoning$§!의 지속 효과가 두 배로 증가합니다."
 #======================
 # Shroud Leaders
 #======================
 ganthuata: "간투아타"
 ganthuata_desc: "$the_cradle_of_souls_article$의 신실한 신봉자로서, 그 깊은 진리를 받아들일 준비가 된 이들을 찾아가 나누고자 하는 열망을 지녔습니다."
 ganthuata_catch_phrase: "함께 요람의 품으로 빠져듭시다."
 leader_trait_disciple_of_the_cradle: "요람의 신봉자"
 leader_trait_disciple_of_the_cradle_desc: "우리는 더 많은 것을 볼수록 더 많이 알게 되며, 우리가 이웃을 관찰할수록 $the_cradle_of_souls_article$이 더욱 견고해집니다."
 leader_trait_disciple_of_the_cradle_envoys_zro: "$t$- 후원자에게 배정된 사절은 매월 §G+0.5§! £zro£ §Y$sr_zro$§!를 생산합니다."
 shroud.12010.desc: "§H장막과의 교감을 통해 우리에게 새로운 목소리가 다가왔습니다. 따뜻하고 부드러운 음색을 지닌 그 목소리는 물질과 정신의 영역 모두에 울려 퍼집니다.§!\n\n반갑습니다. 저는 간투아타입니다. 진정한 길을 깨우친 동료들을 찾기 위해 이곳에 왔습니다. 혹시 당신은 $the_cradle_of_souls_article$의 말씀을 들어 보신 적이 있나요?"
 shroud.12010.name: "$ganthuata$"
 shroud.12010.a: "$the_cradle_of_souls_article$에 대한 이야기는 들은 적 있습니다. 그건 왜 물어보시죠?"
 shroud.12010.a.response: "왜냐고요? 어째서 나그네는 길에서 만나는 이에게 질문을 던지는 걸까요? 친구여, 그건 답을 해줄 이를 더 잘 이해하기 위해서랍니다. 당신이 답하면, 저는 배우는 겁니다."
 shroud.12010.b: "우리한테 뭘 원하는 뭡니까?"
 shroud.12010.b.response: "요람의 손길을 받고 자라난 이들이 무엇을 원하겠습니까? 우선, 저는 당신의 우정을 바랍니다. 저는 오랜 세월 요람의 찬란함에 조율된 정신을 찾아 헤맸고, 드디어 하나의 문명이 그 빛 속에서 깨어나고 있는 것을 느낍니다."
 shroud.12010.c: "우리에게 어떤 도움을 줄 수 있습니까?"
 shroud.12010.c.response: "당신의 복음을 별들 너머로 전하는 데 도움을 줄 수 있지요. 자, 함께 은하를 요람의 부드러운 품으로 인도합시다."
 shroud.12010.hire_custom_tooltip: "§Y$ganthuata$§!가 우리 제국에 §H지도자§!로 합류합니다."
 koborokra: "코보록'라"
 koborokra_desc: "오래전 적들에게 극심한 사이오닉 고문을 당한 전직 병사이자, 지금은 파괴에 대한 끝없는 갈망에 사로잡힌 고뇌하는 제독입니다."
 koborokra_catch_phrase: "아직 적들이 흘릴 피가 남아 있소."
 leader_trait_disciple_of_the_eater: "피를 부르는 자"
 leader_trait_disciple_of_the_eater_desc: "이 지도자는 $the_eater_of_worlds_article$와 피의 서약을 맺었습니다."
 leader_trait_disciple_of_the_eater_attunement_effect: "함대전 승리 시 $the_eater_of_worlds_article$와의 조율 §G+$@disciple_of_the_eater_combat_attunement$§!"
 leader_trait_disciple_of_the_eater_zro_fleet_attack_effect: "$t$- 궤도 폭격으로 가한 황폐도 1%당 $i_zro$ §G+$@disciple_of_the_eater_zro_fleet_attack|1$§!"
 leader_trait_disciple_of_the_eater_zro_army_attack_effect: "$t$- 강습군으로 가한 황폐도 1%당 $i_zro$ §G+$@disciple_of_the_eater_zro_army_attack|0$§!"
 shroud.12020.name: "$koborokra$"
 shroud.12020.desc: "§H전투로 닳아버린 갑옷과 피로 얼룩진 망토가 가면 쓴 형체를 감추고 있습니다. 거친 으르렁거림이 정적을 가릅니다.§!\n\n이 은하는 고통받아 마땅하오. 당신도 같은 마음을 가진 것이 느껴지는군.\n\n§H제독이 화려한 칼자루를 쓰다듬으며 말합니다.§!\n\n나는 당신에게 이끌려 왔지만, 궁극적으로는 $the_eater_of_worlds_color_article$를 섬기고 있소."
 shroud.12020.desc.covenant: "$shroud.12020.desc$ 당신과 마찬가지라오."
 shroud.12020.desc.no_covenant: "$shroud.12020.desc$ 언젠가 당신도 그리할지도 모르지."
 shroud.12020.a: "왜 우리 제국에 합류한다는 겁니까?"
 shroud.12020.a.response: "함께라면 이 은하 속 가장 깊은 구석의 별들마저 숨통을 조일 수 있기 때문이지. 혼자서 줄 수 있는 고통에는 한계가 있지 않겠소?"
 shroud.12020.b: "당신을 어떻게 믿죠?"
 shroud.12020.b.response: "$the_eater_of_worlds_article_cap$가 내 숨결 하나하나를 지배하고 있소. 나는 그분께 맹세했고, 꿈속에서 이 순간을 보았지. 내가 당신을 따르는 건 그분의 뜻이오. 만약 거절한다면 그 순간 내 운명도 끝날 테지."
 shroud.12020.c: "왜 $the_eater_of_worlds_article$를 따르는 거죠?"
 shroud.12020.c.response: "나는 배신당하고 부서진 채 고통 속에 던져졌소. 그때 $the_eater_of_worlds_article_cap$께서 말을 거셨고, 살아남기 위한 축복을 내려 주셨다오. 피투성이 상처를 덮을 피 묻은 천과, 내게 고통을 가져온 손들을 끊어 낼 힘을 주셨지. 그렇게 그분께 빚을 지게 되었소."
 shroud.12020.d: "우리에게 뭘 제공할 수 있죠?"
 shroud.12020.d.response: "우리는 함께 무수한 성계를 정화의 불길로 휩쓸고 비명의 교향곡을 만끽할 것이오. 불타는 행성들을 지켜보고, 함께 은하계에 절대 잊을 수 없는 장면을 선사할 것이오. 이것이 우리의 운명이라오."
 shroud.12020.hire_custom_tooltip: "§Y$koborokra$§!가 우리 제국에 §H지도자§!로 합류합니다."
 morr: "모르"
 morr_desc: "한때 하찮은 탐광꾼이었던 모르는 불안정한 $zro_lower$ 광맥에 장기간 노출되며 $the_instrument_of_desire_article$과 강력하고 광기에 물든 유대를 맺었습니다. 이제는 그 연대를 이용해 막대한 부를 쌓고, 행성을 무차별적으로 채굴하며 약탈품을 터무니없는 가격에 팔고 있습니다."
 morr_catch_phrase: "반짝이는 건 다 우리 거예요."
 leader_trait_disciple_of_the_instrument: "탐욕스러운 심장"
 leader_trait_disciple_of_the_instrument_desc: "$the_instrument_of_desire_article$과 깊은 조율을 이룬 이 지도자는 우주의 가장 척박한 구석에서도 자원의 존재를 찾아낼 수 있습니다."
 leader_trait_disciple_of_the_instrument_planetary_decision_effect: "- §Y$decision_divine_deposits$§! 행성 결정 이용 가능"
 decision_divine_deposits: "매장지 탐색"
 decision_divine_deposits_desc: "$the_instrument_of_desire_article$의 신비한 당김에 이끌려, 이 행성의 총독은 오래전에 잊힌 자원 매장지를 찾아냅니다."
 decision_divine_deposits_tt: "무작위 자원 행성 특징 하나가 추가됩니다."
 shroud.12030.name: "$morr$"
 shroud.12030.desc: "§H$morr$의 시선은 결코 한 자리에 머무르지 않습니다. 그림자에서 빛으로 움직이며, 마치 영원히 사냥감을 쫓는 듯합니다.§!\n\n당신한테도 느껴지죠? $the_instrument_of_desire_article_cap$은 절대 가만히 있는 법이 없어요. 갈망하고, 집어삼키고, 명령을 내리죠.\n\n저는 눈에 띄는 건 모두 가져야 해요. 자연의 그 어떤 보물이라고 해도 예외는 없죠. 저는 충성심 따위가 아니라, 함께 별들을 무너뜨리고 공허에 그 몫을 바치기 위해 협력하려는 거예요."
 shroud.12030.a: "왜 우리 제국에 합류한다는 겁니까?"
 shroud.12030.a.response: "$the_instrument_of_desire_article_cap$은 만족을 모르거든요. 그렇기에 많은 [root.species.GetHandNamePlural]의 도움을 받아야 하죠."
 shroud.12030.b: "우리에게 뭘 제공할 수 있죠?"
 shroud.12030.b.response: "저는 자연에서 돈이 되는 거라면 마지막 분자 하나까지 뽑아 먹을 능력이 있어요. 단 한 개의 원자도 예외 없이, 팔리지 않게 두지 않을 거예요.\n\n'이 정도면 충분하다'고 속삭이는 자들은 한심한 겁쟁이들이죠. 그런 작자들은 썩게 내버려두고, 우리가 함께 모든 것을 차지하는 거예요."
 shroud.12030.c: "왜 $the_instrument_of_desire_article$을 따르는 거죠?"
 shroud.12030.c.response: "저는 한때 탐광꾼이었어요. 먼지 가득한 공기, 고장 난 감지기, 텅 빈 채굴지... 별들이 던져주는 모든 광맥을 쫓아다녔죠. 그때 $the_instrument_of_desire_article$께서 말을 걸었어요.\n\n그분은 이해를 뛰어넘는 부를 약속했습니다. 대가로 요구한 것은 충성뿐이었죠.\n\n저는 이제 그분을 섬기고, 자원을 추출해 전달합니다. 그 빚은 영원하죠... 하지만 부에는 끝이 없어요."
 shroud.12030.hire_custom_tooltip: "§Y$morr$§!가 우리 제국에 §H지도자§!로 합류합니다."
 kronen: "저주받은 크로넨"
 kronen_desc: "한때는 선구자였으나, 지금은 산산조각 난 껍데기에 불과한 은둔 과학자인 이 인물은 $the_composer_of_strands_article$의 음모에 의해 뒤틀리고 말았습니다. 이제 어둠 속에서 죽어가는 별처럼 희미하게 빛나는 놀라운 지성만이 남았습니다."
 kronen_catch_phrase: "풀어야 할 것이 많군요..."
 leader_trait_disciple_of_the_composer: "실에 저주받은 자"
 leader_trait_disciple_of_the_composer_desc: "이 인물이 살점을 빚을수록, 그 자신의 모습도 함께 풀려납니다. 감히 금단의 기술을 배우려는 자는 모두 $the_composer_of_strands_article_cap$의 손에 다시 만들어집니다."
 shroud.12040.name: "$kronen$"
 shroud.12040.desc: "§H감지기가 우리 제국의 국경을 침범하는 함선을 포착하자, 장막 너머에서 지친 듯한 목소리가 울려 퍼집니다. 피곤하고 날카롭지만 귀에 익은 그 소리는 $the_composer_of_strands_article$의 울림과 닮았습니다.§!\n\n새로운... [GetKronenFlesh]인가요? 흥미롭군요. 아주 부드럽고... 유연해요. 아니, 착각인가요? [GetKronenSkin] 아래 이렇게 많은 매듭이 꿈틀거리고 있으니까요. 오늘은 $the_composer_of_strands_article$가 어떤 형태를 짜 뒀을까요?\n\n§H통신이 마침내 안정되며, 경련하듯 필사적으로 무언가를 적고 있는 날것의 근육 덩어리 같은 형체가 드러납니다.§!\n\n지금 보시는 모습이 제 본질입니다. 저는 여전히 $kronen$일지도 모릅니다. 아닐지도 모르고요. 그렇지만 당신 역시 저와 마찬가지로 작곡가의 붓을 위해 펼쳐진 캔버스라는 건 알겠군요. 가까이 오세요. 함께 그 모습을 드러내도록 합시다."
 shroud.12040.a: "뭘 한다고요?"
 shroud.12040.a.response: "거칠고 불완전한 껍질을 벗겨 내야지요. 우리를 형태와 확실성에 묶어 두는 가닥을 풀어내자고요. 작곡가의 손길은 당신에게도 닿아 있어요. 사실은, 당신도 이미 시작된 겁니다... 그게 [GetSkinType] 아래서 꿈틀거리는 걸 느껴본 적이 없나요?"
 shroud.12040.b: "왜 우리 제국에 합류한다는 겁니까?"
 shroud.12040.b.response: "모든 떨리는 가닥에 새겨진 표식이 느껴지지 않으시나요? 저는 그걸 풀어야 해요. 과거의 모습을 벗어던지고, 저를 육신에 묶어 놓은 실밥들을 찢어내며 제 해체를 지켜봐야 하죠. 하지만 당신은... 당신은 제국입니다. 광대하고 강력하죠. 우리가 함께한다면, 혼자서는 결코 잡을 수 없는 더 거대한 실타래를 당길 수 있을 겁니다."
 shroud.12040.c: "우리에게 어떤 도움을 줄 수 있습니까?"
 shroud.12040.c.response: "단순한 도움뿐만이 아니죠. 제 육신 자체가 하나의 선물이자, $the_composer_of_strands_article$가 빚어낸 고통과 목적의 실험체입니다. 제 몸의 모든 조직이 비명을 지르지만 저는 견디고, 관찰하고, 배웁니다. 우리가 함께 빚어내는 한, 제 고통에서 탄생한 모든 건... 당신의 소유가 될 겁니다."
 shroud.12040.hire_custom_tooltip: "§Y$kronen$§!이 우리 제국에 §H지도자§!로 합류합니다."
 shroud.12045.desc: "§H우리 인구가 늘어남에 따라, $kronen$은 점점 더 광란에 빠져듭니다. 그 목소리가 긴장으로 떨리고, 꿈틀거리고 일렁이며 변화하는 몸으로 고통에 찬 숨결을 내쉽니다.§!\n\n그 가닥에는 끝이 없어요... 꿈틀거리는 실타래를 아무리 잡아당기고 찢으려 해도 끄떡없단 말입니다! 이 끔찍한 형태를 얼마나 더 견뎌야 하는 걸까요? 패턴이 드러날 때까지 얼마나 더 벗어던져야 하냐고요?"
 shroud.12045.a: "뭐가 문제죠?"
 shroud.12045.a.response: "문제가 한두 개가 아닙니다. 제가 벗겨내는 모든 조각마다, 우리가 찢는 반짝이는 가닥마다, 실들은 점점 더 단단히 조여들기만 한다고요! 그러는 사이 $the_composer_of_strands_article$는 그 역겨운, 속을 파고드는 멜로디를 흥얼거린단 말입니다..."
 shroud.12045.a.response_2: "$shroud.12045.a.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.b: "휴식이 필요한가요?"
 shroud.12045.b.response: "휴식이라고요? 아니요, 절대 정체해서는 안 됩니다. 이 끔찍한 육신이 평범함 속에서 썩게 둬서는 안 된다고요. 저는 휴식이 필요한 게 아니라... 빚고, 조각하고, 제 형태를 갖출 재료가 필요한 겁니다."
 shroud.12045.b.response_2: "$shroud.12045.b.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.c: "도와드릴 게 있나요?"
 shroud.12045.c.response: "제가 무엇이었는지... 상기시켜 줄 수 있나요? 우리가 처음 대화했을 때, 제 부속지는 항상 이런 색이었나요? 제 각막은 이렇게 흐릿했습니까? 기억하려 할 때마다, 제 육신은 더욱 멀어집니다.\n\n아, 아닙니다... 이곳에서 기억은 가치가 없습니다. 계시는 변화 그 자체에 있습니다. $the_composer_of_strands_article$에게 과거는 아무 의미가 없으니까요. 저를 내버려두세요. 잠시... 생각할 시간이 필요합니다."
 shroud.12045.c.response_2: "$shroud.12045.c.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.desc_2: "§H크로넨이 거칠게 경련합니다. 외눈이 뒤로 돌아가고, 살갗이 피부 아래서 맥동하며 부글거리다가... 갑자기 멈춥니다. 그 끔찍한 재구성은 시작만큼이나 갑작스럽게 중단되었습니다.§!\n\n아... 안녕하세요? 뭔가 필요하신가요?"
 shroud.12045.d: "괜찮습니까?"
 shroud.12045.d.response: "네, 괜찮지 않을 이유라도 있나요? 실들이 제 사고를 더 확장했고, 이 비효율적인 육신을 $the_composer_of_strands_article$의 설계에 맞게 다시 빚어냈습니다. 그럼, 이만 실례하겠습니다... 아직 당겨야 할 실이 너무 많고, 버려야 할 껍질도 많으니까요.\n\n§H교신이 끝나자 윙윙거리는 소리가 장막을 가로질러 울려 퍼집니다. 지금 크로넨을 사로잡은 고통은... 우연이 아닙니다. 그건 $the_composer_of_strands_article$의 의지에 따른 결과입니다.§!"
 shroud.12045.end: "작곡가의 선물을 가볍게 받아들여서는 안 됩니다."
 zulyn: "듣는 자 줄린"
 zulyn_desc: "전통 과학의 한계를 버리고 $whisperers_in_the_void_article$의 광란에 찬 메아리가 드러낸 비밀을 쫓는 학자입니다."
 zulyn_catch_phrase: "우리는 그저 듣기만 하면 됩니다..."
 shroud.12050.name: "$zulyn$"
 shroud.12050.desc: "§H통신 장치가 지직거리며 작동하더니, 오싹한 긴급함이 담긴 목소리가 들려옵니다.§!\n\n반갑습니다, 동료 듣는 자여. 불협화음 속에서 당신의 목소리, 아니 '목소리들'을 들었습니다. 이제 당신한테도 들리지 않나요? $whisperers_in_the_void_color_article$의 거대한 합창과 은밀한 선물, 그리고 속삭이는 광란 말입니다.\n\n그런 비밀은 이해하지 못한다면 위험을 불러오지만, 제가 그 해석을 도와드릴 수 있습니다. 당신의 생각을 긁어대는 역설의 물결에 맞설 때 도움이 되어드리죠. 물론, 모욕하려는 뜻은 아닙니다. 한때는 저 역시 그 의미를 이해하기 위해 애썼으니까요."
 shroud.12050.a: "왜 도울 수 있다고 생각하십니까?"
 shroud.12050.a.response: "당신은 §H장막§!의 경계를 뚫으셨습니다. 하지만 완전히 이해하는 건 다른 문제죠. 저는 평생을 바쳐 그 깊이를 탐구하고, 이해할 수 없는 존재들과 그 메아리가 우리의 연약한 세계에 미치는 영향을 기록해 왔습니다.\n\n속삭임이 오랫동안 저를 인도해 왔죠. 지금 당신의 생각을 가득 메우고 있는 모든 광기의 목소리를 이해할 수 있도록 도와드리겠습니다."
 shroud.12050.b: "속삭임에 대해 뭘 알고 있습니까?"
 shroud.12050.b.response: "저는 이 순간을 기다리며 오랜 세월 동안 속삭임의 목소리를 기록해 왔습니다. 이제 당신이 속삭임의 다채로운 합창과 조화를 이루게 되었으니, 저는 이 기회를 놓치지 않고 그 안에 숨겨진 진실을 밝혀낼 겁니다."
 shroud.12050.c: "우리에게 뭘 제공할 수 있죠?"
 shroud.12050.c.response: "저는 평생에 걸친 연구로 집중력을 단련했고, 물리적 현실의 구조와 §H장막§!의 무한한 심연의 비밀을 풀어냈습니다.\n\n우리가 함께한다면 이 차원의 한계를 넘어설 수 있을 것입니다. 이것만큼은 확실하게 약속드립니다. 우주의 비밀이 우리 앞에 펼쳐질 겁니다."
 shroud.12050.hire_custom_tooltip: "§Y$zulyn$§!이 우리 제국에 §H지도자§!로 합류합니다."
 leader_trait_disciple_of_the_whisperers: "장막의 속삭임"
 leader_trait_disciple_of_the_whisperers_desc: "이 지도자는 장막에 울려 퍼지는 $whisperers_in_the_void_article$의 메아리를 들을 수 있으며, 이를 통해 물리적 우주의 숨겨진 작동 원리에 대한 희귀한 통찰을 얻습니다."
 leader_trait_disciple_of_the_whisperers_effects: "$t$- §Y희귀§! 또는 §Y사이오닉§! 기술 연구 시 $i_zro$ $@disciple_of_the_whisperers_tech_zro|0=+$"
 ouwron: "오우'론"
 ouwron_desc: "$end_of_the_cycle_article$을 목격한 이후 유랑 부족에서 추방된 오우'론은 그 은총을 얻기 위해 별들을 떠돌았습니다. 이제 다가오는 $NAME_Reckoning$을 기다리며, 오우'론은 그 누구도 저지할 수 없는 강렬한 목적의식을 불태우고 있습니다."
 ouwron_catch_phrase: "심판이 머지않았습니다..."
 shroud.12060.name: "$ouwron$"
 shroud.12060.desc_1: "§H이해할 수 없는 신호의 폭풍이 우리 통신 장비를 뒤덮습니다. 그 혼돈 속에서 하나의 목소리가 뚜렷하게 들려오기 시작합니다.§!\n\n마침내 왔군요. 제시간에 온 것은 아니지만, 너무 늦지도 않았습니다. 두려워하지 마십시오. 저는 우리가 현실이라 부르는 좁디좁은 물리적 감옥 너머를 보고 있습니다. 이미 봉헌은 이루어졌고, 제 길은 명확합니다."
 shroud.12060.desc_blind: "\n§H그때, 우리는 이 존재도 우리와 마찬가지로 대의를 위해 시력을 포기했다는 사실을 깨닫습니다.§!"
 shroud.12060.desc_default: "\n§H그때, 우리는 이 존재의 눈구멍이 이미 텅 비어 버린 지 오래라는 사실을 깨닫습니다.§!"
 shroud.12060.desc_2: "\n주저하지 마십시오. 저는 당신이 $end_of_the_cycle_color_article$의 숭고한 단순함을 엿보았다는 사실을 알고 있습니다. 저와 함께 교감하며, 함께 그 탄생을 이끌어 냅시다."
 shroud.12060.a: "$end_of_the_cycle_article$에 대해서는 언제부터 알고 계셨습니까?"
 shroud.12060.a.response: "의식을 차리기 전부터도 알고 있었습니다. 모든 정신이 그렇듯, 지식은 잠들어 있다가 §H장막§!이 베일을 벗겨내자 비로소 깨어났고, 그 순간 순수한 의도가 명확해졌습니다. 우리 목적은 단순합니다. 끝이 도래하도록 하는 것입니다."
 shroud.12060.b: "왜 우리를 돕겠다는 겁니까?"
 shroud.12060.b.response: "이미 답을 알고 계신 것을 묻고 계시는군요. 우리는 모두 끝의 필연성을 보았고, 이미 해체가 시작되고 있습니다. 이제 나아가는 것 외에는 다른 선택지가 없습니다. 우리는 함께 끝을 향해 달려가고 있는 것입니다."
 shroud.12060.c: "우리에게 뭘 제공할 수 있죠?"
 shroud.12060.c.response: "모두가 그렇듯, 저 또한 이 죽어가는 순환 속 먼지에 불과합니다. 제가 진정으로 드릴 수 있는 게 뭐가 있을까요? 이 은하의 정신들은 사라질 것이고, 저는 그 과정을 빠르게 인도할 뿐입니다. 그 자비를 당신에게도 베풀겠습니다."
 shroud.12060.hire_custom_tooltip: "§Y$ouwron$§!이 우리 제국에 §H지도자§!로 합류합니다."
 leader_trait_disciple_of_the_end: "끝의 사도"
 leader_trait_disciple_of_the_end_desc: "$end_of_the_cycle_article$의 헌신적인 사도로서, 다가오는 $NAME_Reckoning$에 대한 흔들림 없는 신념이 그가 벌이는 모든 전투에 울려 퍼집니다."
 leader_trait_disciple_of_the_end_effects: "$t$- 성계 내 파괴된 함선당 오라 강도 $@disciple_of_the_end_aura_intensity|0=+$$TABBED_NEW_LINE$- §H$end_aura$§! 내에 있는 동안 $MOD_SHIP_FTL_JUMPDRIVE_RANGE_MULT$ $@disciple_of_the_end_jumpdrive_range|0=+%$"
 shroud.12155.name: "순수한 신념"
 shroud.12155.desc: "§H모든 행동에는 결과가 따릅니다. 우리 통신 장비가 갑작스럽게 깨어나고, 의로운 분노에 찬 $ouwron$의 목소리가 폭풍처럼 쇄도합니다.§!\n\n이단자, 멍청이, 기만자 같으니! 진작에 알아채야 했는데! 네놈의 부패한 본질이 감히 §H장막§!에 침범했을 때 바로 처단했어야 한 것을!\n\n네놈은 피할 수 없는 종말을 잠시 늦췄을 뿐이다! 이 반항으로 뭔가를 이룰 수 있다고 기대한 거냐? 네놈이 얻었을지도 모르는 모든 것이 사라졌다.\n\n결국 끝은 하나뿐이다. 그러니 노래하라... 종말을 향해 노래하라!"
 shroud.12155.tt: "$ouwron$이 우리에게 적대적으로 변합니다!"
 NAME_Ouwron_Battleship: "$battleship$"
 NAME_Ouwron_Destroyer: "$destroyer$"
 shroud.12160.title: "전쟁 선포"
 shroud.12160.desc: "[global_event_country.GetGalCommunityOrGalImperium](이)가 우리를 군사 목표로 선언하는 결의안을 통과시켰습니다. 이제 모든 [global_event_country.GetGalCommunityOrGalImperium] 회원국이 [this.GetName](과)와 전쟁 상태가 되었습니다. 이들의 함대가 언제든 공격해 올 수 있습니다."
