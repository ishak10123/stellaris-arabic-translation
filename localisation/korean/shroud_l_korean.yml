 shroud.4015.title: "$the_cradle_of_souls_article_cap$ 등장"
 shroud.4015.desc.default: "§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§!의 힘이 §H장막§! 전역에 퍼져 있지만 그 근원은 찾기 어려웠습니다. 우리는 수시로 경로를 바꾸고 판단을 되짚으며 사이오닉 영역을 헤맸습니다.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.hive: "§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§!의 힘이 §H장막§! 전역에 퍼져 있지만, 그 근원은 찾기 어려웠습니다. 우리는 수시로 경로를 바꾸고 연산 능력을 되짚으며 사이오닉 영역을 헤맸습니다.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.default.end: "잠시 멈춰 생각에 잠겼을 때, 그 존재가 나타났습니다. 아무 소리도, 형체도 없었지만 그 어느 때보다 따뜻한 온기를 느낄 수 있었습니다.\n\n우리는 장막과 그 너머의 에너지가 융합해, 모여든 사고가 하나의 열기를 뿜어내는 그 존재의 핵심을 느꼈습니다. 여정에서 돌아온 우리는 그저 고요함에 잠겨 있을 뿐이었습니다.\n\n우리는 이 존재가 추구하는 [GetCradleEmergesEnding]"
 shroud.4015.desc.gestalt_machine: "§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§!의 힘은 §H장막§! 전역에 퍼져 있지만, 그 근원은 찾기 어려웠습니다. 우리는 수시로 경로를 바꾸고 연산 능력을 되짚으며 사이오닉 영역을 헤맸습니다.\n\n잠시 멈춰 연산을 처리하던 때, 그 존재가 나타났습니다. 어떤 메시지도 받지 못했지만 그 존재는 우리 코드의 더 깊은 부분을 활성화했습니다.\n\n우리는 장막과 그 너머의 에너지가 융합해, 모여든 사고가 하나의 열기를 뿜어내는 그 존재의 핵심을 감지했습니다.\n\n우리는 이 존재가 추구하는 [GetCradleEmergesEnding]"
 shroud.4015.desc.individual_machine: "$shroud.4015.desc.gestalt_machine$"
 shroud.4015.desc_outro_homicidal: "질서와 조화에 대한 왜곡된 전제를 본능적으로 거부합니다. 이 $the_cradle_of_souls_color_article$과 더 깊이 교감하는 것은 우리의 의지를 약하게 만들 것입니다."
 shroud.4015.desc_outro_robot: "질서와 조화에 대한 비전을 명확히 이해했습니다. [GetTelepathPlural]들이 재충전되면 다시금 이 $the_cradle_of_souls_color_article$과 접촉할 수 있을 것입니다."
 shroud.4015.desc_outro_organic: "우리는 이 존재가 추구하는 질서와 조화에 대한 비전을 명확히 이해했습니다. [GetTelepathPlural]들이 회복하면 다시금 이 $the_cradle_of_souls_color_article$과 접촉할 수 있을 것입니다."
