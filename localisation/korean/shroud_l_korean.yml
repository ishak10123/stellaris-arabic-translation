 shroud.4970.title: "끝이 도래하다"
 shroud.4970.desc.1: "차원 간의 경계가 잠시 사라지며, 장막의 모든 사이오닉 에너지가 현실로 쏟아져 나옵니다."
 shroud.4970.desc.2: "생명체와 기계를 구분하지 않고 모든 의식체가 소멸했습니다. 모든 행성이 황량한 껍데기로 전락했으며, 별들조차 우리의 마지막 빛에 숨을 죽입니다.\n\n마지막 순간, 우리가 느낄 수 있었던 것은 머릿속에 울려 퍼지는 단 하나의 목소리뿐이었습니다...\n\n§R\"끝의 종말이다.\"§!"
 shroud.4970.desc: "$end_of_the_cycle_color_article_cap$이 도래했습니다.\n\n$end_aura$가 은하계를 집어삼킨 것입니다. 최후의 성계마저 그 힘에 굴복하자, 헤아릴 수 없는 에너지의 폭발이 일어났습니다. $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
