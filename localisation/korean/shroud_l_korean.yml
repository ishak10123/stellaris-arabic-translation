 mindwarden_army: "강습 파수꾼"
 mindwarden_army_desc: "반사이오닉 기술과 기법에 대한 강도 높은 훈련을 받아, 정신을 침투하는 적을 상대로 강력한 위력을 발휘하는 전문 병력입니다."
