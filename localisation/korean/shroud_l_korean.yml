 ACTION_START_PROXY_WAR_TITLE: "대리전 개시"
 ACTION_START_PROXY_WAR_DESC: "다른 제국들이 §H[Recipient.GetName]§!(과)와 전쟁하도록 선동합니다."
 ACTION_START_PROXY_WAR_OFFER_DESC: "§H[Actor.GetName]§!(이)가 §H[Recipient.GetName]§!(을)를 상대로 대리전을 시작했습니다."
 ACTION_START_PROXY_WAR_NO_ATTACKERS: "§R$TRIGGER_FAIL$ 유효한 공격자를 선택해야 합니다.§!"
 NO_RELATION_CAN_DECLARE_WAR: "§R$TRIGGER_FAIL$ 이 제국에 전쟁을 선포할 수 있는 조우 대상이 없습니다.§!"
 PROXY_WAR_ON_COOLDOWN: "§R$TRIGGER_FAIL$새로운 대리전을 시작하려면 §Y[this.proxy_war_cooldown_timer]§!까지 기다려야 합니다.§!"
 SEND_TO_PROXY_WAR_NO_WAR_GOALS: "§R$COUNTRY|H$(은)는 $WHO|H$(을)를 상대로 선택할 수 있는 전쟁 목표가 없습니다.§!"
 SEND_TO_PROXY_WAR_MISSING_REQUIREMENTS: "§R$COUNTRY|H$(을)를 전쟁에 내세우려면 $opinion_trust$가 $@proxy_war_min_trust|Y0$ 이상이거나 $spy_network$이 $@proxy_war_min_infiltration|Y0$ 이상이어야 합니다.§!"
 PROXY_WAR_VIEW_DESC: "각각의 전쟁 목표를 가진 공격국을 선언해서 분쟁을 시작하십시오."
 PROXY_WAR_VIEW_ATTACKERS_DESC: "§G좌측 목록의 제안 공격국을 클릭해서 공격국을 추가하거나 제거하십시오.§!"
