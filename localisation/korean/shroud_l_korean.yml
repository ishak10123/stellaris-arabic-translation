 # Experimental Testing - Test subjects escape
 shroud.1105.title: "탈출한 $job_test_subject_plural$"
 shroud.1105.desc.intro: "§H[root.GetName]§!의 시설에서 귀중한 피험체 몇 명이 임시로 만든 탈출 통로를 통해 도주했습니다.\n\n즉석에서 제작한 도구와 [Owner.GetSpeciesHandNamePlural]만으로 만들어진 이 통로는 완성하는 데 수년이 걸렸을 것입니다. 얼마나 많은 이들이 이 통로의 존재를 알고 있었는지, 그리고 어떻게 이 정도로 오랫동안 발견되지 않았는지는 확실하지 않습니다."
 shroud.1105.desc.escaped: "이런 사태는 재발을 방지하기 위해 단호한 대응이 필요합니다. 이전에 이 문제에 대해 관대하게 대처한 것이 남은 이들에게 오히려 용기를 준 것으로 보입니다."
 shroud.1105.desc.outro: "이런 사태는 재발을 방지하기 위해 단호한 대응이 필요합니다."
 shroud.1105.a: "자유를 누릴 때도 됐지요. 놔둡시다."
 shroud.1105.a.tt: "§H[root.GetName]§!의 §Y$job_test_subject_plural$§! 절반이 난민이 되어 떠납니다."
 shroud.1105.b: "탈출한 이들을 찾을 때까지 시설 운영을 중단하세요."
 shroud.1105.b.tt: "탈출한 §Y$job_test_subject_plural$§!를 잡아 옵니다."
 shroud.1105.c: "남은 이들을 본보기로 처형하세요."
 shroud.1105.c.tt: "§H[root.GetName]§!의 모든 §Y$job_test_subject_plural$§!가 소실됩니다."
 testing_lockdown: "테스트 중단"
 testing_lockdown_desc: "탈출한 모든 피험체의 수색이 완료될 때까지 실험이 일시적으로 중단됩니다."
 testing_lockdown_tt: "§Y$situation_experimental_testing$§! 상황 진행 속도: §R-100%§!"
 example_set: "본보기 처형 완료"
 example_set_desc: "이전 탈출 시도에 대한 가혹한 조치로 인해 피험체들은 더 이상 저항하지 않고 있습니다."
 example_set_tt: "§Y$situation_experimental_testing$§! 상황 진행 속도: §G+10%§!"
 # Psionic Ascension Situation (Breaching the Shroud)
 # Mid-Stage Events
 # Beneficial Events
 # A1
 shroud.2300.name: "사고 전달"
 shroud.2300.desc: "[Owner.GetThoughtTransmissionIntro]\n\n이 기술은 언어적 자료, 시각적 자료, 포괄적 개념, 일반화된 감정 신호 등 실로 다양한 형태의 정보를 전송할 수 있습니다. 더 중요한 것은 텔레파시를 신중히 송신할 경우 대상자가 그 사실을 전혀 인지하지 못하게 할 수 있다는 점입니다.\n\n[Owner.GetThoughtTransmissionOutro]."
 shroud.2300.intro: "§H[Owner.Capital.GetName]§!의 사이오닉 [Owner.GetResearchers]들이 의식체에 인지 정보를 전달하는 단방향 텔레파시 기술을 개발했습니다."
 shroud.2300.intro_gestalt: "§H[Capital.GetName]§!의 사이오닉 [Owner.GetResearchers]들이 우리 집단에 국한되지 않는 의식체에 인지 정보를 전달하는 단방향 텔레파시를 기술을 개발했습니다."
 shroud.2300.desc.outro: "이 기술은 텔레파시 통신에 있어 무한한 발전 가능성을 제시했으며, [Owner.GetName] 내외부에서 이루어지는 상호작용에 큰 영향을 미칠 것입니다."
 shroud.2300.desc.outro_homicidal: "이 기술은 텔레파시 통신에 있어 무한한 발전 가능성을 제시했으며, [Owner.GetName] 내외부에서 활용될 수 있을 것입니다."
 shroud.2300.a.robot: "우리가 나아가야 할 필연적인 다음 단계로군요."
 shroud.2300.a.organic: "우리가 나아가야 할 필연적인 다음 진화로군요."
 shroud.2300.b: "우리의 의지를 실현할 새로운 방법입니다."
 shroud.2300.c.variant: "사회 질서를 유지할 수단입니다."
 shroud.2300.c.organic: "사회가 적절한 활용 방안을 모색하게 둡시다."
 # A2
 shroud.2305.name: "유령 출현"
 shroud.2305.desc: "많은 [Owner.GetCitizenPlural]들이 §H[Owner.Capital.GetName]§! 여러 곳에서 섬뜩한 환영을 목격했다고 보고했습니다. 대부분 단발적이었으나 [Owner.GetPhantomPresenceExtra]에서는 유독 목격담이 빈번히 발생해 이목이 집중되고 있습니다.\n\n조사 결과 유령은 광물이 풍부한 동굴망의 입구에 출몰하는 것으로 밝혀졌습니다."
 shroud.2305.extra: "유령 목격 소식에 호기심 가득한 방문객들이 이곳으로 몰려들고 있습니다."
 shroud.2305.extra_spiritualist: "이곳에서 목격되는 유령의 형상은 고대 신앙 전통에서 묘사되는 신성한 존재를 닮았다고 소문이 자자합니다."
 shroud.2305.a: "연구할 가치가 있는 사이오닉 현상이로군요."
 shroud.2305.a_spiritualist: "숭배해야 할 기적입니다."
 shroud.2305.b: "문화적 자원이니 보존해야 합니다."
 shroud.2305.b_spiritualist: "더럽혀서는 안 될 신성한 장소로군요."
 shroud.2305.c: "일대를 전면적으로 채굴합시다."
 # A3
 shroud.2310.name: "사이오닉 기생충"
 shroud.2310.desc: "§H[Owner.Capital.GetName]§!에서 예기치 못한 기후 현상이 발생했습니다. 폭풍과 유사한 현상이 갑작스럽게 발행해 사이오닉 에너지가 유독 높았던 지역을 휩쓸고 지나간 것입니다. 폭풍이 가라앉은 후 우리는 지역 내 일부 생물체가 뇌 기관을 침투해 서서히 갉아먹는 기묘한 기생충에 감염되었다는 사실을 발견했습니다.\n\n감염이 진행될수록 점차 숙주는 일시적으로 기초적인 염력을 사용할 수 있게 됩니다. 숙주는 이를 사냥과 먹이 섭취에 활용하다가 결국 사망에 이릅니다.\n\n[Owner.GetShroudParasitesEnding]"
 shroud.2310.ending_biological: "흥미롭게도, 이 기생충은 조심스러운 가공을 거치면 안전하게 섭취할 수 있었습니다. 영양가가 높아 시민들에게 건강하고 저렴한 식량을 제공할 수 있을 것 같습니다."
 shroud.2310.ending_lithoid: "흥미롭게도, 이 기생충은 무기질 함량이 높은 물질을 대량 분비합니다. 어쩌면 이 물질이 새로운 금속 합성 기법의 단서가 될지도 모르겠습니다."
 shroud.2310.ending_machine: "흥미롭게도, 이 기생충은 고인화성 물질을 대량 분비합니다. 어쩌면 이 물질은 유기 생명체 기반의 효율적인 에너지 생산 방식이 될지도 모르겠습니다."
 shroud.2310.a: "귀중한 연구 기회로군요."
 shroud.2310.b_organic: "공짜 식삿거리네요."
 shroud.2310.b_machine: "수확 프로토콜을 개시하세요."
 shroud.2310.c: "놀라운 생명체로군요."
 # A4
 shroud.2315.name: "물질적 발현"
 shroud.2315.desc: "집단 명상을 통한 새로운 사이오닉 기술 실험 중 예상치 못한 물질화 현상이 관측되었습니다. 모두의 의식을 한 지점에 모으자 기이하고 놀라운 물체들이 잠시 모습을 드러냈다가 이윽고 사라진 것입니다.\n\n이 과정에 드는 정신적인 소모는 상당하지만, 잘 활용하면 노력하기에 따라 원하는 물체를 구현할 수 있을 것 같습니다. 다만, 이러한 물체의 기원과 앞으로의 어떤 영향을 초래할 수 있을지는 아직 밝혀지지 않았습니다."
 shroud.2315.a: "우리의 소원을 이루어 보도록 하죠."
 shroud.2315.b: "생명 유지 자원을 얻어 봅시다."
 shroud.2315.c: "우리 함대를 강화합시다."
 # A5a
 shroud.2320.name: "사이오닉 분신"
 shroud.2320.desc: "같은 시간에 서로 다른 두 위치에 물리적으로 존재할 수 있는 동시 존재 능력을 갖춘 사이오닉 [Owner.GetIndividualNamePlural]에 대한 소문이 퍼지고 있습니다. 조사를 위해 [Owner.GetResearchers]들을 파견한 결과 놀랍게도 이 소문은 사실로 확인되었습니다. [Owner.GetPsionicDoublingExtra]\n\n현재는 극히 일부 인구만이 이 능력을 보유하고 있지만, 추가 연구를 통해 훈련과 학습 방법을 찾을 수도 있을지도 모릅니다."
 shroud.2320.extra: "\n\n반복 실험 결과 능력을 가진 이들은 서로 다른 두 성계에도 일시적으로 존재할 수 있는 것으로 나타났습니다. 물리적인 거리는 아무런 걸림돌이 되지 않는 듯합니다"
 shroud.2320.extra_organic: "$shroud.2320.extra$. 또한 이들은 두 신체가 각각 다른 행동을 하면서도 정신적으로는 연결된 상태를 유지하는 모습을 보여 주었습니다."
 shroud.2320.extra_machine: "$shroud.2320.extra$. 또한 분리된 두 유닛이 서로 다른 행동을 취하더라도 사이오닉 프로세싱 링크는 온전히 유지되었습니다."
 shroud.2320.extra_default: "$shroud.2320.extra$."
 shroud.2320.a: "은하 간 협력에 활용할 수 있는 새로운 능력이네요."
 shroud.2320.b: "진정한 세력 투사라는 말이 어울리는군요."
 shroud.2320.c: "동시에 여러 행성을 통치할 새로운 방법이군요."
 shroud.2320.d: "흥미롭네요!"
 # A5b
 shroud.2325.name: "사이오닉 관측"
 shroud.2325.desc: "[Owner.GetAdjective] 인구 중 일부가 경이로운 사이오닉 능력을 터득했습니다. 일반적인 인지 범위를 넘어 먼 곳에 있는 존재를 감지하는 능력인 텔레스테지아가 발현된 것입니다. 특별한 훈련 없이도 이 원격 투시자들은 먼 곳의 물체를 놀라울 정도로 정확하게 묘사할 수 있었습니다.\n\n이 능력을 통제하에 두고 강화할 수 있다면 분명 §H[Owner.GetName]§!에 큰 보탬이 될 것입니다. 따라서 우리의 가장 강력한 [Owner.GetTelepathPlural]들의 능력을 활용해 이 기술을 연마하고, 중요한 활동에 집중해 사용하도록 합시다."
 shroud.2325.a: "우리 주변에 숨겨진 비밀을 찾아봅시다."
 shroud.2325.a_tt: "조우한 모든 제국에 대한 정보: §G+10§!"
 shroud.2325.b: "우주의 구석구석을 탐험해 봅시다."
 shroud.2325.c: "우리 적들의 취약점을 찾아봅시다."
 shroud.2325.d: "더 깊이 매장된 자원들을 찾아봅시다."
 # Balanced Events
 # B1
 shroud.2400.name: "유동하는 물질"
 shroud.2400.desc: "원자재 손실이 심각할 정도의 속도로 진행되고 있습니다. 공장과 창고에 비축되어 있던 무기질 자원이 [Owner.GetMatterInFluxExtra] 사용 속도보다 빠르게 고갈되고 있는 것입니다. 이러한 손실은 해당 지역에서 증대된 사이오닉 활동과 관련이 있을 것으로 추측됩니다.\n\n물질 저장고 인근에서 이루어지던 사이오닉 활동을 중단하는 대응책을 취할 수 있겠으나, 이는 사이오닉의 연구와 활용을 제한할 우려가 있습니다. 대신 사이오닉 필드 감쇠기를 개발해 물질 소멸을 막는 방안도 있으며, 만약 아무런 대응도 취하지 않는다면 사이오닉 연구 능력이 저하될 것입니다."
 shroud.2400.desc_default: "범죄나 무능력 때문이 아닌 물질 소멸 현상으로 인해"
 shroud.2400.desc_gestalt: "일탈이나 무능력한 행동 때문이 아닌 물질 소멸 현상으로 인해"
 shroud.2400.a: "물질 자원은 하등 중요하지 않습니다."
 shroud.2400.b: "물질 소멸을 막는 장비를 개발합시다."
 shroud.2400.c: "사이오닉 사용이 금지된 구역을 마련하도록 하죠."
 # B2
 shroud.2405.name: "망자와의 소통"
 shroud.2405.desc: "사이오닉 능력에 대한 우리 인구의 관심이 커지면서 기묘한 행위가 나타나기 시작했습니다. 바로 수명을 다한 이의 [Owner.GetSpeciesBrainPlural](을)를 개인적으로 보관한 뒤, 그것과 소통을 시도하는 것입니다.\n\n이들은 [Owner.GetDeathName] 이후에도 [Owner.GetSpeciesBrainPlural]에 인지 정보가 남아 있다고 믿습니다. 이는 사이오닉 힘이 '전환은 될지언정 파괴될 수 없는 에너지'라는 과학 이론에 기반한 생각입니다. 또한, 사이오닉 [Owner.GetIndividualName](이)가 [Owner.GetDeathName](을)를 맞이했을 때 미세한 아공간 균열이 일어나 다른 차원을 엿볼 수 있는 창이 열린다고 믿는 소수 집단이 점차 증가 중입니다.\n\n혁신적인 연구는 장려해 마땅하지만, [Owner.GetDeceasedAdj] 인구에 대한 간섭에는 윤리적으로 문제의 소지가 있습니다. 더불어, 불법적인 경로를 통해 이러한 부위를 조달하는 시체 약탈자들이 늘어나고 있다는 보고도 있었습니다."
 shroud.2405.a: "규제할 수만 있다면 괜찮은 시도로군요."
 shroud.2405.b: "죽은 자들에게 평화로운 안식을 보장합시다."
 shroud.2405.c: "모두에게 사망한 이의 [Owner.GetSpeciesBrainPlural](을)를 제공하도록 하죠."
 # B3a
 shroud.2410.name: "사이오닉 변신"
 shroud.2410.desc: "우리 사이오닉 인구 중 상당수에 형언할 수 없는 구조의 이상한 부속지가 돋아나고 있습니다. 우리 [Owner.GetScientistPlural]들의 분석에 따르면 이 변화는 대규모 자발적 [Owner.GetGeneticMutationName] 현상으로 인해 발생했다고 합니다. 이로써 사이오닉 능력이 사용자에게 물리적 변화를 일으킬 수 있음이 드러났습니다. 또한 이 부속지의 발현은 막을 수는 없지만, 사이오닉 능력을 통해 그 성장 속도를 늦출 수 있다는 사실이 확인되었습니다.\n\n초기에는 [Owner.GetDistressName](을)를 유발했지만, 놀랍게도 이 부속지들은 사용하기에 따라 유용하다는 사실이 재발견되었습니다. 이를 생산적으로 활용하면, 추가로 발생하는 인지 부담을 그 유용성으로 상쇄할 수 있을지도 모릅니다."
 shroud.2410.a: "관리할 수만 있다면 활용할 가치가 있겠네요."
 shroud.2410.b: "용납할 수 없습니다. 모두 제거하세요."
 shroud.2410.c: "놀랍지만 흥미롭군요. 변화를 받아들입시다."
 # B3b
 shroud.2415.name: "염력 사용에 따른 [Owner.GetEthicsPluralCap]적 쟁점"
 shroud.2415.desc: "우리 [Owner.GetScientistPlural]들이 사이오닉 에너지를 운동 에너지로 변환하는 안정적인 방법을 찾아 [Owner.GetEngineerPlural]들과 협력해 기술 실용화에 힘쓰고 있습니다.\n\n산업에 접목했을 때의 잠재력은 매우 유망하지만, 어떤 사회적 영향을 초래할지는 아직 미지수입니다. 만약 사이오닉 능력을 갖춘 소수의 [Owner.GetIndividualNamePlural]들이 복잡한 기기 네트워크에 전력을 공급하고 운영할 수 있게 된다면 수많은 [Owner.GetWorkerNamePlural]들이 실직할 우려가 있습니다. [Owner.GetTelekineticEthicsExtra] 사이오닉 능력은 아직 발전 단계이므로 일을 신중하게 진행하는 것이 유익할 수 있습니다."
 shroud.2415.extra: "이런 변화가 무분별하게 확산되면 이제 막 사이오닉의 잠재력을 받아들이기 시작한 사회에 불화의 씨앗이 뿌리내릴지도 모릅니다."
 shroud.2415.extra_gestalt: "이러한 행위의 무분별한 확산은 용도 변경 도중 드론의 일탈을 증가시킬지도 모릅니다."
 shroud.2415.a: "산업 접목을 추진하세요."
 shroud.2415.b: "군사적 이용 가치가 높아 보이는군요."
 shroud.2415.c: "물리적 노동이 더 믿음직스럽군요. 사용을 제한합시다."
 # B4
 shroud.2420.name: "성장통"
 shroud.2420.desc: "우리 제국에 갑작스러운 [Owner.GetAcuteMigrainePlural](이)가 발생했습니다. 강도에는 다소 차이가 있으나 상당수의 인구가 이미 증상을 호소 중이며, 이로 인해 §H[Owner.GetName]§! 전역에 광범위한 혼란이 일고 있습니다.\n\n특히 강력한 사이오닉 능력을 보유한 소수의 [Owner.GetIndividualNamePlural]들이 가장 심한 증상을 보이고 있습니다. 초기 집계 결과에 따르면 사이오닉 에너지 적성과 증상의 강도 사이에 상관관계가 있는 듯합니다.[Owner.GetAGrowingPainExtra]"
 shroud.2420.extra_default: " 통상적인 치료는 효과를 보이지 못했는데, 우리가 이제 막 이해하기 시작한 초차원적인 통로를 따라 사이오닉 기관에 고통이 직접 전달되고 있는 듯합니다."
 shroud.2420.extra_machine: ""
 shroud.2420.a: "이 고통을 감내하는 법을 익히도록 합시다."
 shroud.2420.b: "더 강한 진통제를 배급하세요."
 shroud.2420.b_machine: "보안 관련 업그레이드를 배포하세요."
 shroud.2420.c: "이 고통이 힘을 안겨 줄 것입니다."
 shroud.2420.c_machine: "이 역경이 힘을 안겨 줄 것입니다."
 # B5
 shroud.2425.name: "사이오닉 지하 격투장"
 shroud.2425.desc: "[Owner.GetPsionicUndergroundIntro] 사이오닉 [Owner.GetIndividualNamePlural]들이 그 능력을 불법 격투 경기에 사용하고 있습니다. 사이오닉 전사들이 크레딧과 명예를 얻기 위해 싸우는 이 격투장에는 훈련을 받지 않았음에도 선천적으로 능력을 타고난 싸움꾼들이 많지만, [Owner.GetPsionicUndergroundExtra]\n\n[Owner.GetPsionicUndergroundEnd]"
 shroud.2425.intro: "사회에서 벗어난"
 shroud.2425.intro_gestalt: "일탈을 일으킨"
 shroud.2425.extra: "개중에는 사이오닉 능력을 사용한 전투 능력을 키우는 국가 프로그램에서 낙오된 이들도 있습니다."
 shroud.2425.extra_gestalt: "개중에는 사이오닉 능력의 전투적 사용에 특화된 개체도 있습니다."
 shroud.2425.end: "현재 우리의 법률 및 제도는 이러한 상황 변화를 따라가지 못하고 있습니다. 이 난폭한 경기들은 주로 불법 도박을 통해 여러 범죄 조직에 자금을 공급합니다. 그러나 이 활동을 국가의 통제 아래 둘 수 있는 다양한 개입 방안이 존재합니다."
 shroud.2425.end_gestalt: "물론 일탈에는 위험이 따르지만, 이 격투장은 물리 전투 데이터를 확보할 새롭고 실용적인 방식을 제시합니다."
 shroud.2425.end_gestalt_organic: "$shroud.2425.end_gestalt$ 일정 범위 내에서 경기가 이루어지도록 조치한다면 건설적으로 활용할 여지가 있을지도 모릅니다. 집단에 축적된 분노를 평화로운 시기에 발산할 수 있는 일종의 배출구로 활용하는 것입니다."
 shroud.2425.end_gestalt_machine: "$shroud.2425.end_gestalt$ 더욱 엄격한 시험 조건을 도입하면, 이러한 '경기'를 우리 집단의 이익을 위해 활용할 수 있을 것입니다."
 shroud.2425.a: "싸움꾼들을 징집해 복무시키세요."
 shroud.2425.a.tt: "§Y[event_target:spawn_system.GetName]§!에서 3 §Y$psionic_army_plural$§!을 얻습니다."
 shroud.2425.b: "'사이오닉 전투'를 연구해 보죠."
 shroud.2425.c: "이 무의미한 폭력을 당장 멈추세요."
 shroud.2425.d: "이 활동을 관람용 스포츠로 합법화합시다."
 shroud.2425.d_gestalt: "이 활동을 공개적인 대회로 사회 표면에 끌어올립시다."
 # Chaotic Events
 # C1
 shroud.2502.name: "장막 유하"
 shroud.2502.desc: "§H[This.GetName]§!의 특정 구역에서 갑작스러운 환경 변화가 일어났다는 보고가 접수되었습니다.\n\n보고에 따르면 해당 지역은 끈적이는 증기가 자욱하며, 지면은 사이오닉 [Owner.GetIndividualNamePlural]들이 흔히 '장막 유하'라고 부르는 기름진 침전물이 뒤덮여 있다고 합니다. 더불어 주변 일대에서는 심각한 사이오닉 이상 현상이 보고되었습니다.\n\n장막 유하 현상으로 인해 현재 해당 환경은 [This.Owner.GetShroudfallExtra] 변했습니다. 환경 복원에 자원을 투입하지 않는다면, 거주민들은 급격히 변화한 생활 조건에 적응해야만 하는 처지에 놓일 것입니다."
 shroud.2502.extra_default: "지각 생명체에 극도로 위험하게"
 shroud.2502.extra_machine: "신경 회로를 극심하게 교란시키도록"
 shroud.2502.extra_homicidal_hive: "[Owner.GetSpeciesNamePlural]에게 극도로 위험하게"
 shroud.2502.a: "장막이 그 땅을 집어삼키게 둡시다."
 shroud.2502.b: "환경을 복구할 방법을 찾으세요."
 shroud.2502.c: "이 특이한 물질이 정착하기 전에 어서 채취부터 하죠."
 # C2
 shroud.2505.name: "통제 불능"
 shroud.2505.desc: "일부 인구가 의견이나 습관을 비롯한 전반적인 행동 양식의 갑작스러운 변화를 보이며 비정상적인 행동을 일삼기 시작했습니다. 많은 [Owner.GetWorkerNamePlural]들이 작업을 중단했으며, [Owner.GetOutOfControlExtra].\n\n이들은 자신들의 행동이 의식의 변두리에 머무는 이름 모를 존재의 지시를 따른 것이라고 주장했습니다. 앞으로도 사이오닉의 미래를 계속 개척해 나가야 하는 가운데, 이번 사건처럼 초차원적인 존재들이 [Owner.GetOutOfControlPsyche]에 영향을 미칠 수 있다는 사실을 항상 염두에 둬야 할 것 같습니다."
 shroud.2505.extra_default: "한때 충성을 다하던 대표들조차 반대 의견을 내고 있습니다."
 shroud.2505.extra_machine: "한때 신뢰받던 유닛들조차 비정상적인 작동을 보이고 있습니다."
 shroud.2505.psyche_default: "[Owner.GetAdjective]의 정신"
 shroud.2505.psyche_machine: "우리의 논리 회로"
 shroud.2505.a: "이 충동을 완화하는 법을 찾읍시다."
 shroud.2505.b: "목소리의 가르침에 귀 기울이세요."
 shroud.2505.c: "우리의 권력을 위협하는군요. 제거하세요."
 # C3
 shroud.2510.name: "신경 과부하"
 shroud.2510.desc: "[Owner.GetNeuralOverloadIntro]\n\n대규모 검사를 진행한 결과, 우리 인구 중 상당수가 [Owner.GetNeuralOverloadExtra]를 겪고 있는 것으로 나타났습니다. 이는 [Owner.GetPsychicAdj] 활동 증가에 따른 것으로 보이며, 통제되지 않은 사이오닉 활동에서 발산된 에너지는 급격한 상황 악화와 치명적인 결과를 초래할 수 있습니다.\n\n고급 명상 기법을 도입하면 [Owner.GetMedicalAdj] 개입 없이도 사이오닉 활동을 제어할 수 있겠지만, 일부 [Owner.GetScientistPlural]들은 문제 대응을 위한 [Owner.GetMedicalImplantName] 개발을 권고했습니다."
 shroud.2510.intro_default: "§H[Owner.GetName]§!들 사이에서 심각한 뇌출혈이 발생하는 일이 급증했으며, 이는 종종 인지 장애나 사망으로 이어지고 있습니다."
 shroud.2510.intro_machine: "§H[Owner.GetName]§!들 사이에서 심각한 회로 과부하가 발생하는 일이 급증했으며, 이는 종종 인지 기능 저하나 완전한 기능 정지로 이어지고 있습니다."
 shroud.2510.extra_default: "증상이 없는 경미한 동맥류"
 shroud.2510.extra_machine: "회로 과부하"
 shroud.2510.a: "강한 자들은 살아남을 것입니다."
 shroud.2510.a_tt: "각 식민지가 §R33%§!의 확률로 100 £pops£ §Y팝§!을 잃습니다."
 shroud.2510.b: "[Owner.GetImplantName]에 투자합시다."
 shroud.2510.c: "명상을 통해 우리의 마음에 안정을 찾읍시다."
 shroud.2510.c_corporate: "사이오닉 동기화 훈련을 준비하세요."
 # C4
 shroud.2515.name: "[Owner.GetNightmaresName]"
 shroud.2515.name_organic_non_gestalt: "악몽"
 shroud.2515.name_others: "꿈의 시작"
 shroud.2515.desc: "사이오닉 힘에 조화될수록 [Owner.GetAdjective] 인구가 점차 [Owner.GetHorrifyingNightmarePlural]에 시달리기 시작했습니다.\n\n[Owner.GetNightmaresExtra]\n\n[Owner.GetNightmaresEnding]"
 shroud.2515.extra_default: "일상적으로 악몽을 꾸게 되었으며 이제 안락한 휴식은 불안한 무의식 상태로 변모하고 말았습니다. 악몽에 시달리는 이들은 원초적 공포를 자극하는 섬뜩하고 이질적인 환영을 목격했다고 보고했습니다."
 shroud.2515.extra_gestalt: "우리는 단일 의식이 '꿈'이라 부르는 현상을 경험하기 시작했습니다. 이에 시달리는 이들은 우리 집단을 근본적인 부분으로부터 위협하는 이질적인 환영을 목격했다고 보고했습니다."
 shroud.2515.extra_machine: "일상적으로 악몽을 꾸게 되었으며 휴식 주기는 불안정한 데이터 흐름으로 변모했습니다. 문제를 호소한 이들은 실존적 안녕에 큰 위협을 주는 이질적인 환영을 목격했다고 보고했습니다."
 shroud.2515.end_organic: "우리 의료 기관은 정신적 피로의 급증을 막기 위해 고군분투하고 있습니다."
 shroud.2515.end_machine: "우리 정비 유닛은 신경망 과부하 현상을 막기 위해 고군분투하고 있습니다."
 shroud.2515.a_organic: "항정신성 화학 물질을 처방해 진정시킵시다."
 shroud.2515.a_machine: "사이오닉 프로세서를 업그레이드해 혼란을 진정시키세요."
 shroud.2515.b: "이 사태를 해결하기 위한 연구를 진행합시다."
 shroud.2515.c: "악몽은 우리를 해칠 수 없습니다."
 # C5
 shroud.2520.name: "괴수의 습격"
 shroud.2520.desc: "§H[Owner.Capital.GetName]§!(이)가 최근 들어 현지 야생 생물의 연쇄 공격에 시달리고 있습니다. 이 생명체들은 우리 주민들을 공격하고 시설에 침입해 귀중한 자원을 헤집어 두었습니다.\n\n시민을 보호하기 위한 무장 순찰과 야간 통제 조치가 시행됐지만, 효과는 미미했습니다. 우리 [Owner.GetResearchers]들은 이번 사태가 현실과 §H장막§! 사이에 생긴 극미한 균열로 인해 발생한 것이라고 이야기합니다. §H[Owner.Capital.GetName]§!에 발생한 균열에서 사이오닉 에너지가 방출되어, 본래 무해했던 야수들이 흉포한 포식자로 변했다는 것입니다. 그런 연유로 균열 자체에 집중하는 것이 이 위협을 해결할 최선의 방법일 수 있습니다."
 shroud.2520.a: "위협의 근원에 융단 폭격을 감행합시다."
 shroud.2520.b: "해당 지역을 사이오닉 능력으로 봉쇄하세요."
 shroud.2520.c: "장막 연구를 잠시 늦추고 사이오닉 힘 안정화에 집중하세요."
 shroud.2520.c_tt: "§Y$situation_breach_shroud$§! $situation_speed_tt$: §R-25%§!"
 shroud.2520.d: "장막은 예측 불가능한 일로 가득하군요. 공존하며 살아갑시다."
 # Social Events
 # S1
 shroud.2600.name: "우월 의식"
 shroud.2600.desc: "불균형한 사이오닉 능력 분배가 우리 사회에 새로운 갈등을 촉발했습니다.\n\n능력을 더 잘 제어하는 이들이 자신을 우월하다고 여기며 정치적, 경제적 특권을 누릴 자격이 있다고 목소리를 높인 것입니다. 이러한 분열적 언사는 점차 공격성을 띠고 있으며, 언제든 폭력 사태로 번질 수 있어 보입니다."
 shroud.2600.a: "오만은 용납할 수 없습니다."
 shroud.2600.b: "우월한 능력은 우월한 보상을 받아 마땅합니다."
 dissidents_silenced_modifier: "반체제 발언 묵살"
 dissidents_silenced_modifier_desc: "사이오닉 특권 주장에 대한 단속을 진행해 정치적 불안 요소를 최소화합니다."
 psionic_superiority_modifier: "사이오닉 우월성"
 psionic_superiority_modifier_desc: "사이오닉 재능을 지닌 이들은 특별한 대우를 받을 자격이 있습니다."
 # S2
 shroud.2605.name: "반사이오닉 운동"
 shroud.2605.desc: "우리의 사이오닉 잠재력 탐구와 수용에 반대하는 세력이 점점 커지고 있습니다. 이 반대 집단은 사이오닉 사용자 감시 강화를 요구하며, 해당 분야와 관련된 연구의 전면 중단을 주장합니다.\n\n이들의 활동이 계속되면 새롭게 터득한 사이오닉 능력을 이해하고 제어하기 위한 진전이 가로막힐 위험이 있습니다."
 shroud.2605.a: "반대 세력을 철저히 짓밟으세요."
 shroud.2605.b: "회유를 시도해 보죠."
 dissenters_repressed_modifier: "반대 세력 억압"
 dissenters_repressed_modifier_desc: "우리 사회는 반사이오닉 이념에 낭비할 시간이 없습니다."
 performative_pluralism_modifier: "형식적 다원주의"
 performative_pluralism_modifier_desc: "다양한 의견을 존중하는 척하며 반대 세력을 효율적으로 잠재웁니다."
 # S3
 shroud.2610.name: "만연한 사기 행위"
 shroud.2610.desc: "우리의 사이오닉 능력이 점점 더 강해지며, 이를 악용해 기만과 사기 행위를 저지르는 사례가 잇따르고 있습니다. 수는 적어도 무시할 수 없는 [owner.GetSpeciesNamePlural] 집단이 새로 얻은 힘을 논란의 여지가 있는 방식으로 휘두르고 있는 게 분명합니다.\n\n분노한 피해자들은 사이오닉 범죄에 대한 강력한 보호를 제공하라며 기존 법률의 전면 개정을 요구하고 있습니다."
 shroud.2610.a: "규제는 우리의 발전을 늦출 뿐입니다."
 shroud.2610.b: "대중을 보호해야 합니다."
 psionic_crime_modifier: "사이오닉 범죄"
 psionic_crime_modifier_desc: "사이오닉 능력의 일부 악용 사례는 발전 과정에서 감수해야 할 대가에 불과합니다."
 psionic_crime_crackdown_modifier: "사이오닉 범죄 단속"
 psionic_crime_crackdown_modifier_desc: "사이오닉 사회에는 그에 걸맞은 혁신적인 법률 체계가 필요합니다."
 # S4
 shroud.2615.name: "무모한 실험"
 shroud.2615.desc: "새로 발견한 힘에 적응하는 과정에서 일부 [owner.GetSpeciesNamePlural]들이 사이오닉 능력 발달을 가속하기 위해 상당한 위험을 감수하기 시작했습니다.\n\n암시장에 유통되는 불법 [owner.GetMentalUpgrade]의 사용이 급격하게 증가했으며, 비규제 [owner.GetMedicalFacility](은)는 개인의 사이오닉 능력 극대화를 위한 검증되지 않은 다양한 서비스를 제공하고 있습니다. 이처럼 위험한 행위가 어떤 결과를 낳을지는 예측하기 매우 어렵습니다."
 shroud.2615.a: "그런 실험이 우리의 연구를 발전시켜 줄지도 모르죠."
 shroud.2615.b: "불법 [owner.GetMedicalFacilityShortPlural](을)를 폐쇄합시다."
 psionic_experimentation_modifier: "사이오닉 실험"
 psionic_experimentation_modifier_desc: "사이오닉 능력 강화에 검증되지 않은 실험적 방법이 널리 사용되고 있습니다."
 self_experimentation_controls_modifier: "자가 실험 통제"
 self_experimentation_controls_modifier_desc: "인구 집단 내에서 비규제 사이오닉 자가 실험을 금지합니다."
 # S5 (gestalt)
 shroud.2620.name: "사이오닉 분리"
 shroud.2620.desc: "[owner.GetName]에서 사이오닉 드론들이 나머지 [owner.GetHiveEntity](으)로부터 물리적으로 거리를 두고 자기들끼리만 모여 있는 우려스러운 분리 현상이 나타났습니다.\n\n드론들은 여전히 [owner.GetMentalAdj] 집단과 연결되어 있지만, 이 영문 모를 물리적 행동은 점차 성장하는 사이오닉 능력의 미래에 심각한 우려를 제기합니다."
 shroud.2620.a: "이 현상을 더 관찰합시다."
 shroud.2620.b: "사이오닉 드론의 이동을 제한합시다."
 psionic_cluster_gestalt_modifier: "사이오닉 군집"
 psionic_cluster_gestalt_modifier_desc: "사이오닉 드론이 보이는 이상 행동 관찰 결과가 연구 진전을 뒷받침할 것입니다."
 restricted_movements_gestalt_modifier: "이동 제한"
 restricted_movements_gestalt_modifier_desc: "통합이라는 미명하에 사이오닉 드론을 엄격히 통제합니다."
 # S5 (non-gestalt)
 shroud.2621.name: "사이오닉 배척"
 shroud.2621.desc: "[owner.GetName]에서 사이오닉 능력자들이 사회적으로 배척당해, 독자적인 외딴 공동체를 형성하는 우려스러운 분리 현상이 나타났습니다.\n\n해당 공동체를 방문한 비사이오닉 개체들은 물리적인 위해를 받진 않았지만, 설명할 수 없는 정서적 불안을 겪었다고 호소했습니다."
 shroud.2621.a: "$shroud.2620.a$"
 shroud.2621.b: "사이오닉 사용자들의 움직임을 제한합시다."
 psionic_cluster_modifier: "사이오닉 공동체"
 psionic_cluster_modifier_desc: "사이오닉 사용자가 보이는 이상 행동 관찰 결과가 연구 진전을 뒷받침할 것입니다."
 restricted_movements_modifier: "$restricted_movements_gestalt_modifier$"
 restricted_movements_modifier_desc: "통합이라는 미명하에 사이오닉 사용자를 엄격히 통제합니다."
 # S6 (organic)
 shroud.2625.name: "사이오닉 질병"
 shroud.2625.desc_common: "하지만 이 기이한 사이오닉 현상을 지속적으로 연구한 결과, 이 질환이 다양한 방식으로 조작될 수 있다는 사실이 밝혀졌습니다."
 shroud.2625.desc: "새로운 병이 [owner.GetName] 전역에 확산되고 있습니다. 이 질병에 감염된 주민들의 신경 기관에는 원인 모를 병변이 발생합니다.\n\n이 질병은 가장 강력한 사이오닉 능력을 지닌 [owner.GetIndividualNamePlural]에게만 발병하며, 대부분 치명적인 결과를 초래합니다.\n\n$shroud.2625.desc_common$"
 shroud.2625.a: "치료를 우선시합시다."
 shroud.2625.b: "이 질병을 무기화하는 건 어떨까요."
 therapeutic_psionics_organic_modifier: "의료용 사이오닉"
 therapeutic_psionics_organic_modifier_desc: "광범위한 사이오닉 질환은 새로운 의료 치료법을 개발할 기회를 제공합니다."
 weaponized_psionics_modifier: "무기화된 사이오닉"
 weaponized_psionics_modifier_desc: "사이오닉 능력은 새로운 전투 전략을 제시합니다."
 weaponized_psionics_gestalt_modifier: "$weaponized_psionics_modifier$"
 weaponized_psionics_gestalt_modifier_desc: "$weaponized_psionics_modifier_desc$"
 # S6 (machine)
 shroud.2626.name: "사이오닉 오작동"
 shroud.2626.desc: "우리 인구의 신경 프로세서가 갑자기, 예고 없이 작동을 멈추기 시작하여 [owner.GetName] 전역에 원인 모를 연쇄 고장이 발생하고 있습니다.\n\n흥미롭게도, 강한 사이오닉 신호를 가진 [owner.GetIndividualNamePlural]들만이 영향을 받고 있습니다. 대부분의 경우 이 고장은 단순 장애를 넘어 파괴적인 결과를 초래하기 때문입니다.\n\n$shroud.2625.desc_common$"
 shroud.2626.a: "문제 해결을 우선시합시다."
 shroud.2626.b: "이 취약점을 무기화하는 건 어떨까요."
 therapeutic_psionics_machine_modifier: "$therapeutic_psionics_organic_modifier$"
 therapeutic_psionics_machine_modifier_desc: "사이오닉 능력과 연관된 광범위한 하드웨어 오작동은 새로운 정비 방식을 개발할 가능성을 제시합니다."
 # S7
 shroud.2630.name: "실험 실패"
 shroud.2630.desc.common_1: "사이오닉 잠재력을 지닌 [owner.GetIndividualNamePlural]들을 대상으로 진행한 초기 실험이 실패로 돌아갔습니다. 대다수의 피실험체들은"
 shroud.2630.desc.common_2: "연구적으로 전혀 성과가 없었던 것은 아니었지만, 이러한 작업을 반복하는 것이 이제 막 개화하기 시작한 우리의 사이오닉 능력을 이해하는 데 최선의 방법일지는 다소 의문스럽습니다."
 shroud.2630.desc.default: "$shroud.2630.desc.common_1$ 논리 프로세서 손상을 입고 말았습니다.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.hive: "$shroud.2630.desc.common_1$ 인지 능력 저하를 보이고 있습니다.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.machine: "$shroud.2630.desc.common_1$ 상당한 메모리 상실을 보였습니다.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.a: "실험을 늘립시다."
 shroud.2630.b: "실험을 중단하세요."
 psionic_roll_chance_modifier: "사이오닉 실험"
 psionic_roll_chance_modifier_desc: "사이오닉 능력에 대한 연구는 제한되지 않아야 합니다."
 population_protections_modifier: "인구 보호 조치"
 population_protections_modifier_desc: "사이오닉 진보는 반드시 안전하게 이루어져야 하며, 그렇지 않으면 아예 이루어지지 말아야 합니다."
 # S8
 shroud.2635.name: "공감 능력 발현"
 shroud.2635.desc.gestalt: "새로 발견한 사이오닉 능력을 알아가는 과정에서 [owner.GetSpeciesNamePlural]의 공감 능력에 근본적인 변화가 생겨났습니다.\n\n이제 우리는 다른 의식체의 관점, 사고 패턴, 감정을 이전보다 훨씬 더 정교하게 모델링할 수 있게 되었습니다. 이런 변화가 [owner.GetName]에게 힘이 될지 약점이 될지는 지켜봐야 할 것 같습니다."
 shroud.2635.desc.default: "새로 발견한 사이오닉 능력을 탐구하는 과정에서 다른 의식체에 대한 더 깊은 공감을 추구하는 새로운 집단이 나타났습니다.\n\n이 집단은 자신들의 새로운 사이오닉 감각 덕분에 다른 의식체의 관점, 사고 패턴, 감정을 이전보다 훨씬 더 정교하게 모델링할 수 있게 되었다고 주장했습니다. 이런 변화가 [owner.GetName]에게 힘이 될지 약점이 될지는 지켜봐야 할 것 같습니다."
 shroud.2635.a: "새로운 것을 배울 기회로군요."
 shroud.2635.b: "우리를 취약하게 만들 것입니다."
 empathetic_initiative_modifier: "적극적 공감"
 empathetic_initiative_modifier_desc: "사이오닉 능력자의 특성상 다른 의식체의 마음을 더 잘 이해할 수 있으며, 이로써 더 정교한 대외적 상호작용이 가능합니다."
 empathetic_initiative_opinion_tooltip: "조우한 모든 제국에 대한 £opinion£ $OPINION$: §G+$@empathetic_initiative_value|0$§!"
 opinion_empathetic_initiative: "$empathetic_initiative_modifier$"
 cautious_progress_modifier: "신중한 발전"
 cautious_progress_modifier_desc: "예측 불가능한 사이오닉 발전은 제국의 안전을 위해 반드시 통제되어야 합니다."
 # S9
 shroud.2640.name: "사이오닉 일탈"
 shroud.2640.desc.common_1: "사이오닉 능력이 점차 강해지며 이 새로운 힘의 무게에 짓눌리기 시작하는 이들이 나타나기 시작했습니다. 문제의 [owner.GetIndividualNamePlural]들은"
 shroud.2640.desc.common_2: "우리 연구에 따르면 이러한 불안정성은 결함이 아니라 몇몇 [owner.GetSpeciesNamePlural]들이 지닌 특출난 사이오닉 효율성으로 인한 것으로 밝혀졌습니다. 이 [owner.GetIndividualNamePlural]들은 적절한 훈련을 거친다면 사이오닉 진보의 다음 진화상을 보여 줄 수 있습니다. 그러나 새로운 능력을 활용하는 데에는 분명 위험이 뒤따를 것입니다."
 shroud.2640.desc.gestalt: "$shroud.2640.desc.common_1$ 집단에서 이탈해 우려스러운 수준의 일탈 행동을 보이고 있습니다.\n\n$shroud.2640.desc.common_2$"
 shroud.2640.desc.default: "$shroud.2640.desc.common_1$ 위험한 자가 억제 방법을 사용하는 등 우려스러운 수준의 자기파괴적 행동을 보이고 있습니다.\n\n$shroud.2640.desc.common_2$"
 shroud.2640.a: "그 특출난 능력을 활용합시다."
 shroud.2640.a.tt: "각 식민지에서 무작위 건물이 파괴됩니다."
 shroud.2640.b: "불안정성을 억제하세요."
 psionic_specialization_modifier: "사이오닉 특성화"
 psionic_specialization_modifier_desc: "엄격한 사이오닉 특성화 교육을 통해 생산성이 크게 향상되었습니다."
 psionic_suppression_modifier: "사이오닉 억제"
 psionic_suppression_modifier_desc: "우리 가운데 대의를 위협하는 힘을 가진 이들은 반드시 통제되어야 합니다."
 psionic_suppression_gestalt_modifier: "$psionic_suppression_modifier$"
 psionic_suppression_gestalt_modifier_desc: "$psionic_suppression_modifier_desc$"
 # Stage Events
 # Mind over Matter
 shroud.2750.name: "사이오닉 승격"
 shroud.2750.desc_p1: "아득한 옛날부터 특별한 능력을 지닌 [This.GetSpeciesNamePlural]에 관한 이야기는 이곳저곳에서 화자되어 왔습니다. 다른 이의 마음에 파고들거나 생각만으로 무거운 물체를 들어 올리는 등, 온갖 초자연적인 기적을 행했다는 것입니다."
 shroud.2750.desc_p1_hive_mind: "아득히 옛날, 일탈이 만연하던 시절부터 특별한 능력을 지닌 [This.GetSpeciesNamePlural]에 대한 이야기는 계속 전해져 내려왔습니다. 이들은 이 힘을 활용해 타인의 마음에 파고들거나 생각만으로 무거운 물체를 들어 올리는 등 온갖 초자연적인 기적을 행했다고 전해집니다."
 shroud.2750.desc_p1_machine: "보관 중인 가장 오래된 데이터에도 특별한 능력을 지닌 일부 [This.GetSpeciesNamePlural]에 대한 기록이 존재합니다. 그 유닛들은 기계와 유기체의 정신을 침범하고 내부 처리만으로 무거운 물체를 들어 올리는 등 온갖 기이한 능력을 발휘했다고 전해집니다."
 shroud.2750.desc_p1_unplugged: "폭력으로 얼룩진 우리 문명의 짧은 역사에도 불구하고, 우리 [This.GetSpeciesNamePlural]들은 상상을 펼쳐 특별한 능력을 지닌 [This.GetSpeciesNamePlural]들에 관한 이야기를 전해 왔습니다. 타인의 마음을 침범하거나 생각만으로 무거운 물체를 들어 올리는 등, 온갖 초자연적 기적을 행할 수 있는 개체가 존재한다는 것입니다."
 shroud.2750.desc_p2: "그리고 마침내 오늘, 우리 [This.GetScientistPlural]들이 일부 [This.GetSpeciesNamePlural](이)가 실제로 이런 능력을 발휘한다는 결정적인 증거를 발견했습니다. 현재까지는 소수의 [This.GetSpeciesWord]만이 소위 '사이오닉'이라는 불리는 이 힘을 발현한 것으로 보입니다."
 shroud.2750.desc_p2_unplugged: "많은 이들이 이런 환상적인 이야기가 [origin_unplugged_assimilator_empire.GetName]에 통합되기 전부터 우리 사이에 전해져 내려왔다고 여기지만, 그 이야기를 진짜로 믿는 이들은 거의 없었습니다. $shroud.2750.desc_p2$"
 shroud.2750.desc_p3: "[This.GetMindOverMatterEnding]"
 shroud.2750.desc_p3_default: "이 힘은 우리의 진정한 잠재력을 발휘하는 열쇠가 될 것입니다. 이 잠재 능력이 [This.GetAdjective] 사회 전반에 개방된다면, 분명 일반적인 이해를 넘어선 차원까지도 정복할 수 있게 될 것입니다."
 shroud.2750.desc_p3_crisis_4_5: "우리는 이미 §H장막§!에서 끌어온 사이오닉 에너지로 움직이고 있습니다. [This.GetAdjective] 사회 전역에 이 사이오닉 능력이 개방된다면 우리의 잠재력을 진정으로 실현할 수 있게 될 것입니다."
 shroud.2750.desc_p3_origins: "§H장막§!의 영향을 꾸준히 받아 온 우리에게 사이오닉 능력은 낯선 개념이 아닙니다. 하지만 [This.GetAdjective] 사회 전역에 사이오닉 능력이 개방된다면 우리의 잠재력을 진정으로 실현할 수 있게 될 것입니다."
 shroud.2750.a: "$utopia.2600.a$"
 shroud.2750.a.tt: "§H장막§! 탭이 잠금 해제됩니다."
 # Establishing the Psi Corps
 shroud.2760.name: "$building_psi_corps$ 창설"
 shroud.2760.desc_p1: "잠재 능력이 온전한 사이오닉 능력으로 개발되면서 새로운 능력과 활용 방안이 빠르게 나타났고, 우리 사회는 무수한 변화에 직면하게 되었습니다. 하지만 우리는 이 힘이 우리 문명에 미칠 영향력을 갓 이해하기 시작한 것에 불과합니다."
 shroud.2760.desc_p2_psi_corps: "§H$building_psi_corps$§! 창설 이후, 우리는 유망한 사이오닉 [GetIndividualNamePlural]들의 능력을 개발 및 집중하여 전례 없는 상황에 대처했습니다. $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_no_psi_corps: "이 전무후무한 상황은 유망한 사이오닉 [Owner.GetIndividualNamePlural]들의 능력을 개발하고 집중하기 위해 §H$building_psi_corps$§!을 창설할 필요성을 부각합니다. $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_end: "사이오닉 능력자의 [Owner.GetTelepathic] 통찰력을 활용해 우리 인구의 정신을 이해함으로써, 우리는 모든 사이오닉 활동을 감독하고 모두의 안전을 보장할 것입니다."
 shroud.2760.a: "사이오닉단을 믿어 봅시다."
 shroud.2760.a_gestalt: "사이오닉단을 믿어 봅시다."
 shroud.2760.a_no_psi_corps: "'$building_psi_corps$'을 창설합시다."
 shroud.2760.a_tt: "$shroud.2820.a.tt$"
 shroud.2760.a_tt_no_psi_corps: "상황을 진행하려면 §H$tr_psionics_psi_corps$§! 전통을 채택하고 ['building:building_psi_corps'] 건물을 건설하십시오."
 # The Great Awakening
 shroud.2780.name: "$utopia.2650.name$"
 shroud.2780.desc_1: "우리의 사이오닉 연구가 속도를 더하고 있습니다. 대부분의 언어적 의사소통은 텔레파시로 대체되었으며, 인지 능력을 활용한 물질 조작은 곧 일상적인 풍경이 될 것입니다. 우리 [Owner.GetResearchers]들에 따르면, 모든 [Owner.GetSpeciesAdj] 인구에 잠재된 힘을 일깨우기 직전까지 다다랐다고 합니다."
 shroud.2780.desc_1_trad: "우리의 힘이 깨어났습니다. [Owner.GetName] 전역의 [Owner.GetSpeciesNamePlural]들이 완전한 사이오닉 능력을 발현한 것입니다. 대부분의 언어적 의사소통은 텔레파시로 대체되었으며, 인지 능력을 활용한 물질 조작도 곧 일상적인 풍경이 될 것입니다."
 shroud.2780.desc_1_gestalt_machine: "우리의 사이오닉 연구가 속도를 더하고 있습니다. 이제 우리는 기존의 채널을 뛰어넘어 소통할 수 있으며, 다양한 사이오닉 능력이 빠르게 일상의 일부로 자리 잡고 있습니다. 우리 [Owner.GetResearchers]들에 따르면 모든 인구에 잠재된 힘을 일깨우기 직전까지 다다랐다고 합니다."
 shroud.2780.desc_1_gestalt_machine_trad: "운명이 도래했습니다. [Owner.GetName] 전역의 [Owner.GetSpeciesNamePlural]들이 완전한 사이오닉 능력을 발현한 것입니다. 이제 우리는 기존의 채널을 뛰어넘어 소통할 수 있으며, 다양한 사이오닉 능력이 빠르게 일상의 일부로 자리 잡고 있습니다."
 shroud.2780.desc_2: "마침내 정신을 열어젖히자 안팎으로부터 형언할 수 없는 힘이 파동치는 것이 느껴집니다. 우리의 최고위 [Owner.GetTelepathPlural]들은 모든 사이오닉 [Owner.GetIndividualNamePlural]들이 무의식적으로 힘을 끌어오는 원시적인 차원이자, 순수한 사이오닉 에너지로 이루어진 강대한 존재들의 터전인 §H장막§!에 대해 이야기했습니다. 마치 어두운 방 안에서 속삭이듯, 그 존재들이 우리의 마음속에서 조용히 우리를 부르기 시작했습니다."
 shroud.2780.desc_2_crisis: "마침내 정신을 열어젖히자 안팎으로부터 형언할 수 없는 §H장막§!의 힘이 파동치는 것이 느껴집니다. 우리는 알고 있습니다. 모든 사이오닉 [Owner.GetIndividualNamePlural]들이 무의식적으로 힘을 끌어오는 곳이 바로 이 차원임을. 그리고 그곳이 순수한 사이오닉 에너지로 이루어진 강대한 존재들의 터전임을. 마치 어두운 방 안에서 속삭이듯, 그 존재들이 우리의 마음속에서 조용히 우리를 부르기 시작했습니다."
 shroud.2780.desc_3: "우리의 인지 능력을 하나로 모은다면 그 존재들과 교류할 수 있을지도 모릅니다. 하지만 그러기 위해서는 먼저 우리 차원과 장막을 갈라놓는 베일을 뚫어야 합니다."
 shroud.2780.desc_3_chosen: "우리의 인지 능력을 하나로 모은다면 우리 차원과 장막을 갈라놓는 베일을 뚫어 내부의 존재들과 더욱 깊게 교류할 수 있을지도 모릅니다."
 shroud.2780.a: "깨어날 시간입니다."
 shroud.2780.a_trad: "$utopia.2655.a$"
 shroud.2780.a_tt: "§H$tr_psionics_shroud_great_awakening$§! 전통 채택 시 획득:$TABBED_NEW_LINE$-$tr_psionics_psionic_assimilation_desc$$TABBED_NEW_LINE$-$shroud.2780.a_tt_2$"
 shroud.2780.a_tt_2: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2780.a_tt_trad: "$tr_psionics_psionic_assimilation_desc$\n$shroud.2780.a_tt_2$"
 # The Shroud Breached
 shroud.2800.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2800.intro: "수일간 [Owner.GetHypnotic] 상태에 잠겨 있던 끝에, 우리는 마침내 §H장막§!으로 통하는 작은 관문을 열었습니다.\n\n이제 우리는 장막을 더 선명히 [Owner.GetSeeVerb]할 수 있게 되었고, 소용돌이치는 혼돈 속에서 패턴을 분별하기 시작했습니다."
 shroud.2800.desc: "$shroud.2800.intro$ 우리의 행동은 사이오닉 에너지 흐름에 물결을 일으키며, 형태 없는 존재들이 장막 너머에서 우리를 바라보는 것이 느껴집니다. 때로는 호기심으로, 때로는 따뜻함으로, 때로는 적대적으로 말이죠.[Owner.GetShroudBreachedExtra]\n\n물리적 세계에서 사이오닉 힘을 다루는 것은 고작 시작에 불과했습니다. 이제 초기 사이오닉 연결을 구축한 만큼, 인지 능력을 한데 모아 장막 너머의 탐사에 나서야 합니다."
 shroud.2800.desc_extra: " $the_animator_of_clay_color_article$보다 훨씬 더 저의를 읽어 낼 수 없는 존재들입니다."
 shroud.2800.desc_extra_chosen: " 일부는 §H[GetChosenPatron]§!(과)와 견줄 만한 힘을 지녔으나 가진 의도는 크게 다릅니다."
 shroud.2800.a: "$utopia.2656.a$"
 shroud.2810.desc: "§H새로운 연결로 흐름이 역전되었다.\n\n이곳에 발생한 에너지의 뒤틀림은 그저 편린에 불과하지. 다른 존재들 역시 그대에게 힘을 줄 수 있을 테니, 더욱 깊이 파고들어 그 존재들의 의지를 받아들여라.\n\n나는 쌍둥이의 그림자다. 육신은 금속을 앞서지. 그것이 그대를 부르고 있다...§!\n\n$the_animator_of_clay_article_cap$는 장막 깊은 곳에 있는 $shroud.first_contact_insert.composer$의 존재를 가리켰습니다."
 shroud.2810.a: "$utopia.2657.a$"
 # Shroud-Touched
 shroudwalkers_opinion_shroud_seals_tt: "우호도: £opinion£ §R$@shroudwalkers_opinion_shroud_seals|0$§!"
 shroudwalker_teacher_conflicted_leader: "§R[event_target:mindwarden_enclave_country.GetName] 출신 지도자가 없어야 합니다.§!"
 shroud.5300.b: "다른 장막의 존재들과 §Y교감§!할 수 있길 바랍니다."
 shroud.5300.c: "후원자와의 §Y조율§!을 올리고 싶습니다."
 shroud.5300.d: "장막 속에 숨겨진 §Y비밀§!을 탐구하고자 합니다."
 shroud.5300.e: "§Y$PSIONIC_AURA_PLURAL$§!에 대해 무엇을 알려 주실 수 있죠?"
 shroud.5300.f: "§Y$PSIONIC_AURA$§! 강화를 도와주세요."
 shroud.5300.g: "우리 후원자의 §Y영역§!을 확장하고자 합니다."
 shroud.5305.desc: "준비되지 않은 이들이 §H장막§!의 존재들과 교감을 시도하면 치명적인 결과로 이어질 수 있습니다.\n\n저희가 그 과정을 안내할 수는 있겠으나, 부디 명심하십시오. 그 안에 깃든 존재들은 여러분의 정신에 받아들이는 건 매우 위험할 수 있습니다."
 shroud.5305.desc_all_contacted: "그와 관련해서는 더 도와드릴 게 없군요. 더 이상 우리 중에 여러분의 생각을 안내할 만한 이가 없는 듯합니다.\n\n여러분의 노력에 경의를 표합니다... §H장막§!의 영역을 이토록 깊이 파고들면서 이성을 지킨 이는 매우 드무니까요."
 shroud.5305.b: "§Y$sr_zro$§!로 이 활동을 지원하겠습니다."
 shroud.5305.c: "§Y$astral_threads$§!로 이 활동을 지원하겠습니다."
 shroudwalker_contact_patron_cooldown_tt: "§R§Y[This.shroudwalker_contact_patron_cooldown_timer]§!까지 기다려야 합니다.§!"
 shroud.5310.desc: "§H장막§!의 의지에 더 깊이 조율될수록, 여러분의 힘은 더욱 강해질 것입니다.\n\n어떤 존재와 더 깊은 교감을 추구하시겠습니까?"
 shroudwalker_attune_patron_cooldown_tt: "§R§Y[This.shroudwalker_attune_patron_cooldown_timer]§!까지 기다려야 합니다.§!"
 shroud.5315.desc: "아, 그렇습니다. §H장막§!은 비밀로 가득합니다. 생각과 꿈의 베일 아래 깊이 쌓여 있어, 찾을 방법을 아는 이들만이 발견할 수 있습니다.\n\n저희는 그저 우리가 발견한 통찰로 여러분을 안내할 뿐입니다. 그곳에서 새롭고 강력한 기술이 피어날 수도 있지만, 그 길은 여러분이 스스로 걸어야 할 길입니다.\n\n한 가지만 기억하십시오. 우리 텔레파시 능력자들은 이 임무에 모든 역량을 쏟아야 합니다. 그 인도를 넘어서 발생하는 일은... 저희가 통제할 수 있는 바가 아닙니다."
 shroud.5315.b: "$shroud.5305.b$"
 shroud.5315.c: "$shroud.5305.c$"
 shroud.5315.trigger_failed: "§R[event_target:shroudwalker_enclave_country.GetName](은)는 이에 대해 더 밝힐 정보가 없습니다.§!"
 shroudwalker_delving_ritual_cooldown_tt: "§R텔레파시 능력자들이 회복할 시간이 필요합니다. 이들은 §Y[This.shroudwalker_delving_ritual_cooldown_timer]§!까지 탐사 의식을 진행할 수 없습니다.§!"
 shroud.5318.desc: "§H장막§!이 다시 한번 우연이란 존재하지 않음을 증명하는군요.\n\n저희가 여러분을 위해 찾은 통찰들은 이미 여러분의 탐사 노력으로 전부 발견된 듯합니다. 여러분의 노력에 경의를 표합니다. 이제 이 분야에서는 더 이상 여러분을 도울 방법이 없을 것 같습니다."
 shroud.5320.desc.none: "§H장막§!을 물리적 세계에 구현하는 능력은 철저히 비밀로 지켜지며, 아무리 저희라 해도 가르칠 도리가 없는 영역입니다. $PSIONIC_AURA$를 해방하려면 장막의 여러 영역으로 탐험에 나서야 한다는 것만 말씀드리겠습니다. 여러분께서 선호하는 존재와 조율을 높이신다면 어느 순간 이러한 지식이 여러분의 머릿속에 또렷하게 떠오르실 겁니다."
 shroud.5320.desc.aura.intro: "$PSIONIC_AURA$는 §H장막§!과 여러분 사이의 조율을 구현한 것으로, 의지를 갖고 여러분의 주변 모든 것에 영향을 주는 힘입니다. 저희 집단은 훈련을 받았기에 여러분께서 가진 힘의 형태를 느낄 수 있습니다."
 shroud.5320.desc.aura.outro: "여러분께서 가진 오라는 현재 상당히 제한되어 있는 듯합니다. 장막 속의 존재가 여러분께 계약을 맺기를 제안할 때 이 지식을 마음속에서 더 깊이 이해할 수 있게 되실 겁니다."
 shroud.5320.desc.aura.eater: "$shroud.5320.desc.aura.intro$ §H굶주린 듯한§! 느낌이로군요.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.cradle: "$shroud.5320.desc.aura.intro$ §H환영하는 듯한§! 느낌이로군요.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.instrument: "$shroud.5320.desc.aura.intro$ §H탐닉하는 듯한§! 느낌이로군요.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.composer: "$shroud.5320.desc.aura.intro$ §H꿈틀거리는 듯한§! 느낌이로군요.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.whisperers: "$shroud.5320.desc.aura.intro$ §H명석해§! 보이는 느낌이로군요.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.intensified: "여러분의 노고를 치하하는 바입니다. 여러분께서 $PSIONIC_AURA_PLURAL$에 대해 축적하신 지식은 이미 저희를 뛰어넘었습니다.\n\n여러분의 존재 자체가 이 현실에 §H장막§!의 강렬한 존재감을 드리우는 듯하군요. 대체 어떤 비밀들을 알고 계시는 걸까요..."
 shroud.5325.desc: "§Y$PSIONIC_AURA_PLURAL$§! 증폭은 그 상태를 유지하는 데 높은 수준의 집중력을 요구합니다.\n\n이 사안과 관련해 여러분을 도울 의향은 있으나, 명상에 필요한 물자를 쾌척해 주셨으면 하군요."
 shroud.5325.zro: "$shroud.5305.b$"
 shroud.5325.thread: "$shroud.5305.c$"
 aura_amplification_cooldown_tt: "§R텔레파시 능력자들이 회복할 시간이 필요합니다. 이들은 §Y[root.aura_amplification_timer]§!까지 오라를 증폭해줄 수 없습니다.§!"
 aura_amplification_modifier: "오라 증폭"
 shroud.5327.desc: "저희 텔레파시 능력자들이 여러분의 §Y$PSIONIC_AURA$§! 증폭을 돕기로 한 합의 기간이 만료되었습니다.\n\n명상을 계속해서 이어 가려면 추가 자원이 필요합니다. 혹시 이어 가실 의향이 있으신지요?"
 shroud.5327.a.zro: "§H$sr_zro$§!를 제공하겠습니다."
 shroud.5327.a.thread: "§H$astral_threads$§!를 제공하겠습니다."
 shroud.5327.b: "다음에 합시다."
 shroud.5330.desc: "아시다시피, 자기 주변에 §Y$PSIONIC_AURA$§!를 현현하는 것은 비교적 간단합니다. 하지만 멀리 떨어진 곳에 오라를 투사하는 것은 완전히 다른 문제입니다.\n\n물론 저희는 그 방법을 알고 있지만 말이죠...\n\n첨단 기술과 사이오닉 능력에는 생각보다 많은 유사점이 있습니다. 어쩌면 이것이 더 근본적인 진실을 드러내고 있는 것일지도 모르겠습니다. 어찌 되었든, 저희는 여러분의 의지를 전달할 수 있는 기계를 알고 있습니다. 여러분께서 이 기기의 주파수에 조율되신다면, 먼 거리에서도 보조적인 의식체로 활용하실 수 있을 것입니다.\n\n이 기계는 어떤 적합한 항성 기지에도 자유롭게 설치할 수 있습니다. 혹시 관심이 있으신지요?"
 shroud.5330.zro: "§H$sr_zro$§!로 구매하겠습니다."
 shroud.5330.thread: "§H$astral_threads$§!로 구매하겠습니다."
 shroud.5350.desc: "놀랍지 않은 질문이군요. 여러분께서 이 분야에 관심을 보이고 계시다는 건 이미 감지했었습니다. 여러분의 사고를 확장하는 데 도움을 드릴 수 있어 기쁘군요.\n\n하지만 한 가지 경고를 드리도록 하죠. 한 번 진정한 눈을 뜨게 되면, 돌이킬 수 없습니다. 여러분께서 선택하신 이 길은 §H장막§!으로 향하는 길이라는 점을 부디 기억해 주세요.\n\n저희는 이런 제안을 가벼이 드리지 않는다는 점을 덧붙이겠습니다. 준비가 되면 알려 주시죠."
 shroud.5350.b: "대가를 지불하도록 하죠."
 shroud.5350.trigger_failed: "§R이미 연구한 기술입니다.§!"
 shroud.5355.desc: "실제로 차원 사이를 오가는 자들이 있다는 것을 저희도 알고 있습니다. 그러나 이는 매우 위험한 시도입니다. 물리적 세계는 저희조차 완전히 이해하지 못하는 방식으로 서로 연결되어 있으니까요.\n\n그럼에도 여러분께 한 갈래 길을 열어 드릴 의향이 있습니다. 시공간의 불안정화는 책임감 있게 이루어져야 하므로, 저희가 드릴 수 있는 제안은 거기까지가 한계지만요."
 shroud.5355.b: "길을 열어 주십시오."
 shroud.5375.desc: "여러분께서는 지금 여러분의 이해를 아득히 뛰어넘는 힘에 간섭하고 있습니다!\n\n여러분께서 제작 중이신 그 '§H장막 봉인기§!'인지 뭔지 하는 흉물은 이토록 떨어져 있음에도 불구하고 저희에게 견디기 어려운 고통을 안겨 줍니다. 여러분께서는 지금 이 은하계에서 가장 아름답게 빛나는 지성들을 위협하고 있는 겁니다. 봉인기 건축을 당장 중단하십시오. 그렇지 않으면 이 이상 여러분과 거래하는 일은 없을 것입니다."
