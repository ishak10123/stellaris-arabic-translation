 shroud.3.diplo_title: "$utopia.3000.name$"
 shroud.10.name: "여왕에 맞서는 동맹"
 shroud.10.desc.intro: "장막이 이제껏 경험해 보지 못했을 정도로 격렬하게 요동치고 있습니다. 거대한 에너지 덩어리가 에테르를 가르며 몸부림치는 게 느껴집니다.\n\n점멸하는 혼돈 속에서 우리는 합성체 여왕의 사이오닉 잔상을 목격합니다. 무한하고 전능한 존재인 여왕은 은하계를 말 그대로 손바닥 안에서 가지고 놀고 있습니다."
 shroud.10.desc.outro: "과연 그 저의가 무엇일까요? 우리가 모르는 여왕의 약점을 알고 있기라도 하는 걸까요? 도움을 요청하면 우리를 도와줄까요?\n\n생명을 불어넣는 자에게 의식을 집중하자 그 존재의 조바심이 느껴집니다. 어쩌면 이번 사태에서 이 존재의 조력을 받을 기회는 이번이 처음이자 마지막인 것일지도 모르겠습니다. 그리고 도움을 요청하는 데에는 막대한 양의 §H에너지§!와 §H$sr_zro$§!가 필요할 것입니다."
 shroud.10.desc: "$shroud.10.desc.intro$\n\n여왕을 바라보고 있는 것은 우리만이 아닙니다. 숨겨진 관측 지점에서 $the_animator_of_clay_color_article$라는 존재가 여왕의 무한한 힘에도 굴하지 않고 여왕을 주시하고 있는 것입니다.\n\n$shroud.10.desc.outro$"
 shroud.10.desc.1: "$shroud.10.desc.intro$\n\n여왕을 바라보고 있는 것은 우리만이 아닙니다. 숨겨진 관측 지점에서 $the_animator_of_clay_color_article$가 여왕의 무한한 힘에도 굴하지 않고 여왕을 주시하고 있는 것입니다.\n\n$shroud.10.desc.outro$"
