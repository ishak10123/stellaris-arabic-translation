 shroud.11225.title: "갑작스러운 실종"
 shroud.11225.desc.common_1: "찰나의 순간, 모든 것이 사라졌습니다.\n\n우리 성계에 자리하던 파괴적인 §R$end_aura$§!가 갑자기 사라지며 모든 것을 함께 휩쓸고 갔습니다. 수많은 별이 블랙홀로 붕괴되고, 행성들은 자취를 감추었으며 그 자리에 깊은 침묵만이 남았습니다."
 shroud.11225.desc.common_2: "이토록 파괴적인 힘을 불러일으킨 광기가 무엇이었는지는 영원히 수수께끼로 남을지도 모릅니다."
 shroud.11225.desc.default: "$shroud.11225.desc.common_1$\n\n$shroud.11225.desc.common_2$"
 shroud.11225.desc.mitigated: "$shroud.11225.desc.common_1$ 오라를 막기 위한 우리의 노력이 어느 정도 효과를 발휘한 덕분에 적어도 조금이나마 지켜낼 수 있었던 것 같습니다.\n\n$shroud.11225.desc.common_2$"
 shroud.11225.a: "어떻게 이런 일이 가능한 거죠?"
 SPECIAL_PROJECT_CALLING: "지식의 부름"
 SPECIAL_PROJECT_CALLING_DESC: "$whisperers_in_the_void_color_article_cap$은 기존 사고의 한계를 넘어선 지식을 갈망합니다. 우리는 [Owner.GetResearchers]들이 난해한 연구 분야에 집중할 수 있도록 광범위한 권한을 부여함으로써 속삭임의 열망을 충족시킬 수 있습니다."
 physics_technology_CALLING_PROJECT: "$SPECIAL_PROJECT_CALLING$"
 physics_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
 society_technology_CALLING_PROJECT: "$SPECIAL_PROJECT_CALLING$"
 society_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
 engineering_technology_CALLING_PROJECT: "$SPECIAL_PROJECT_CALLING$"
 engineering_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
 RECKONING_ARRIVAL_PROJECT: "심판과의 대면"
 RECKONING_ARRIVAL_PROJECT_DESC: "§R$NAME_Reckoning$§!이라는 이름으로 알려진 막대한 힘을 가진 존재가 은하계를 위협하고 있습니다. 순수한 에너지로 구성된 이 존재는 돌연 나타나 파괴의 행군을 시작했습니다.\n\n수집한 모든 데이터가 이 존재는 지금까지 마주한 어떤 상대와도 다르다는 사실을 가리키고 있습니다. 이 위협에 대응하려면 효과적인 대응책을 찾기 위한 긴급 연구가 필요합니다."
 shroud.11235.title: "$RECKONING_ARRIVAL_PROJECT$"
 shroud.11235.desc: "우리 [GetScientistPlural]들이 §R$NAME_Reckoning$§!이라는 막대한 힘을 가진 존재에 관한 연구를 완료했습니다.\n\n연구 결과를 바탕으로, 우리는 기존 기술을 활용해 이 위협에 대응할 수 있는 효과적인 방법을 찾아냈습니다. 에너지 보호막을 관통하도록 설계된 무기를 개조하면 $NAME_Reckoning$을 구성하는 에너지를 약화할 수 있을 것입니다.\n\n가공할 존재지만, 이제 우리는 이 위협에 맞설 더 나은 기회를 얻게 되었습니다."
 shroud.11235.a: "$extreme_frontiers.1531.i$"
 RECKONING_VULNERABILITY_PROJECT: "누구나 약점은 있다"
 RECKONING_VULNERABILITY_PROJECT_DESC: "비록 승리하지는 못했지만, §R$NAME_Reckoning$§!과의 대치에서 귀중한 연구 데이터를 획득했습니다.\n\n이 신비로운 에너지 존재에 대한 연구를 계속하면, 약점을 파악하고 더욱 효과적인 공격 방법을 개발할 수 있을 것입니다."
 shroud.11240.title: "패배에서 얻는 교훈"
 shroud.11240.desc: "§R$NAME_Reckoning$§!은 우리 함대의 대응력을 훨씬 뛰어넘는 힘을 가졌습니다. 비록 패배했지만, 이 신비로운 에너지 존재와의 대치는 직접 조우하지 않고서는 얻기 힘든 귀중한 데이터를 제공했습니다.\n\n예비 분석 결과, 우리는 이 존재의 구성을 모형화할 충분한 데이터 포인트를 확보했습니다. 추가 연구를 통해 약점을 파악하고 이에 맞춰 공격을 강화할 수 있을 것입니다."
 shroud.11240.a: "분명 약점이 있을 것입니다."
 shroud.11245.title: "$NAME_Reckoning$의 약점"
 shroud.11245.desc.1: "우리 [GetScientistPlural]들이 §R$NAME_Reckoning$§!이라고 불리는 에너지 존재의 연구 과정에서 돌파구를 찾아냈습니다."
 shroud.11245.desc.2.intro: "이 존재는"
 shroud.11245.desc.2.outro: "'사이오닉 억제' 특성을 지닌 레이저를 사용하면 우리 함대가 그 연결을 방해해 공격에 취약하게 만들 수 있을 것입니다."
 shroud.11245.desc.2.psionic: "$shroud.11245.desc.2.intro$ §H장막§!에서 생겨났을 뿐 아니라, 사이오닉 영역과의 차원 간 연결을 통해 보호 능력을 유지하고 있습니다. $shroud.11245.desc.2.outro$"
 shroud.11245.desc.2.non_psionic: "$shroud.11245.desc.2.intro$ 다른 차원에서 생겨났을 뿐 아니라, 이해하기 힘든 차원 간 연결을 통해 보호 능력을 유지하고 있습니다. $shroud.11245.desc.2.outro$"
 reckoning_insight_modifier: "심판에 대한 통찰"
 reckoning_insight_modifier_desc: "광범위한 연구를 통해 기존 무기들을 개조하여 $NAME_Reckoning$에 가장 효과적으로 피해를 입힐 방법을 찾아냈습니다."
 reckoning_vulnerability_modifier: "심판의 약점"
 reckoning_vulnerability_modifier_desc: "심판과의 조우에서 얻은 데이터를 바탕으로 '사이오닉 억제' 레이저를 활용하여 더 큰 피해를 입힐 방법을 찾아냈습니다."
