 shroud.4950.title: "악의 어린 오라"
 shroud.4950.desc.1: "수집한 데이터에 따르면 이 오라는 주변에 극도로 해로운 영향을 미칩니다. 어서 대책을 마련하지 않으면 이 오라가 은하계 전역으로 빠르게 확산되고 말 것입니다."
 shroud.4950.desc.2: "§H[from.GetName]§! 성계에서 강력한 $PSIONIC_AURA$를 감지했습니다"
 shroud.4950.desc.3.intro: "$shroud.4950.desc.2$. 우리 [GetTelepathPlural]들에 따르면 §H장막§!으로부터 뿜어져 나온 이 오라는"
 shroud.4950.desc.3.default: "$shroud.4950.desc.3.intro$ 외계 문명의 사이오닉 활동으로 인한 것이라고 합니다."
 shroud.4950.desc.3.contact: "$shroud.4950.desc.3.intro$ §H[fromfrom.GetName] §!의 사이오닉 활동으로 인한 것이라고 합니다"
 shroud.4950.desc.4: "$shroud.4190.desc.intro$ 이론적 기원에 따라 명명된 이른바 §H'$PSIONIC_AURA$'§!가 §H[from.GetName]§! 성계에서 감지되었습니다."
 shroud.4950.desc.5.intro: "$shroud.4950.desc.2$. 오라의 발원지를 추적한 결과"
 shroud.4950.desc.5.default: "$shroud.4950.desc.5.intro$ 외계 문명과의 국경으로 이어졌습니다."
 shroud.4950.desc.5.contact: "$shroud.4950.desc.5.intro$ §H[fromfrom.GetName]§!의 국경으로 이어졌습니다."
 shroud.4950.a: "$grand_archive.1100.a$"
 shroud.4955.title: "불길한 예감"
 shroud.4955.desc.1: "임박한 재앙에 대한 불안감이 우리 사회에 퍼지고 있습니다."
 shroud.4955.desc.1.gestalt: "$shroud.4955.desc.1$ [GetTelepathPlural]들은 심지어 §H장막§!의 에너지에서 동시다발적으로 발생하는 교란을 감지하기도 했습니다."
 shroud.4955.desc.1.non_gestalt: "$shroud.4955.desc.1$ [GetTelepathPlural]들에 따르면 §H장막§!조차 고요히 떨고 있는 것처럼 이상하리만치 불안정하다고 합니다."
 shroud.4955.desc.2.intro: "최근 몇 년 사이 은하계 전역에서 끔찍한 사건이 다발하고 있습니다."
 shroud.4955.desc.2.outro: "점점 더 기이한 현상이 잇따라 감지되는 가운데, [GetResearchers]들은 머지않아 이보다 심각한 현상이 발생할 것이라는 예측을 제시했습니다."
 shroud.4955.desc.2.contact_aura: "$shroud.4955.desc.2.intro$ 더불어 우리는 §H[from.GetName]§!의 설명할 수 없을 정도로 빠른 성장과 해로운 §H$PSIONIC_AURA$§!의 확산을 목격한 바 있습니다. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.contact_no_aura: "$shroud.4955.desc.2.intro$ 더불어 우리는 §H[from.GetName]§!의 설명할 수 없을 정도로 빠른 성장을 목격한 바 있습니다. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_aura: "$shroud.4955.desc.2.intro$ 더불어 우리는 해로운 §H$PSIONIC_AURA$§!의 확산을 목격한 바 있습니다. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_no_aura: "$shroud.4955.desc.2.intro$ $shroud.4955.desc.2.outro$"
 shroud.4955.desc.3: "정확히 무엇이 다가오고 있는 것인지는 알 수 없지만, 무언가가 다가오고 있다는 사실만은 분명합니다."
 shroud.4955.a: "최악의 사태를 대비해야겠군요."
 shroud.4955.a.tt: "§H$end_aura$§!가 은하계를 뒤덮으면 게임이 끝납니다."
 shroud.4960.title: "사이오닉 위협"
 shroud.4960.desc.1.intro: "악의 어린 §H$PSIONIC_AURA$§!가"
 shroud.4960.desc.1.outro: "위협적인 속도로 확산되고 있습니다. [GetResearchers]들의 관측에 따르면 이미 수많은 성계에 악영향을 끼쳤다고 합니다."
 shroud.4960.desc.1.contact: "§H[from.GetName]§!에서 방출된 $shroud.4960.desc.1.intro$ $shroud.4960.desc.1.outro$"
 shroud.4960.desc.1.no_contact: "조우하지 않은 외계 문명에서 방출된 $shroud.4960.desc.1.intro$ $shroud.4960.desc.1.outro$"
 shroud.4960.desc.2: "최신 데이터에 따르면 이 오라는 이미 초공간 항로에 연결된 은하 중 절반가량을 침식한 것 같습니다. 이 영문 모를 힘의 배후에 있는 존재는 은하계 규모의 파괴를 목표로 하는 듯하며, 신속히 대응하지 않는다면 그 뜻이 이루어지고 말 것입니다."
 shroud.4960.a: "오라를 막아야 합니다."
 shroud.4960.a.tt: "§H[from.GetName]§!에 ['concept_total_war']을 선포할 수 있습니다.\n$shroud.4955.a.tt$"
 shroud.4965.title: "임박한 파멸"
 shroud.4965.desc.1.intro: "악의 어린 §H$PSIONIC_AURA$§!가"
 shroud.4965.desc.1.outro: "계속해서 은하계 전역으로 퍼져 나가, 이제 우리 은하계 내에 존재하는 대부분의 성계를 잠식했습니다."
 shroud.4965.desc.1.contact: "§H[from.GetName]§!에서 방출된 $shroud.4960.desc.1.intro$ $shroud.4960.desc.1.outro$"
 shroud.4965.desc.1.no_contact: "조우하지 않은 외계 문명에서 방출된 $shroud.4960.desc.1.intro$ $shroud.4960.desc.1.outro$"
 shroud.4965.desc.2: "신속하고 강력한 대응책을 마련하지 못한다면 우리는 은하계 규모의 대재앙을 마주하게 될 것입니다."
 shroud.4965.a: "최후의 저항에 나설 때입니다."
 the_reckoning_chain_title: "심판의 날"
 the_reckoning_chain_desc: "$end_of_the_cycle_color_article$과의 계약이 §H[this.GetName]§!의 파괴를 초래해, 한때 강력했던 우리 제국은 이제 그 흔적만이 남았습니다.\n\n한때 우리의 후원자였던 존재의 파괴적인 의지는 이제 §R$NAME_Reckoning$§!이라는 이름의 거대한 에너지체로 형상을 갖추었습니다. 이 거대한 의지는 행성에서 행성으로 이동하며 각 행성의 인구를 섭취해 힘을 되찾고 있습니다."
 reckoning_consumed_worlds: "§Y집어삼킨 행성§!"
