 # Eater of Worlds accords
 ACCORD_FRENZY: "광란"
 ACCORD_FRENZY_desc: "$the_eater_of_worlds_article_cap$가 우리 병력에 광란의 분노를 불러일으킵니다."
 ACCORD_HUNGER: "굶주림"
 ACCORD_HUNGER_desc: "$the_eater_of_worlds_article_cap$가 갈등에 굶주려 있습니다."
 ACCORD_DOOM: "파멸"
 ACCORD_DOOM_desc: "적에게 $the_eater_of_worlds_article$의 파괴적인 의지를 해방합니다."
 ACCORD_DOOM_TT: "§Y$Name_Doom_Eater_Fleet$§! 함대를 현신시킵니다.\n\n이 함대의 전투력은 §Y파멸 강도§!에 비례합니다.\n현재 파멸 강도: §Y[GetEaterOfWorldsDoomIntensity]/50§!\n\n이용 가능한 함급: [GetEaterOfWorldsShipClasses]\n\n§R기존 §Y$Name_Doom_Eater_Fleet$§! 함대는 해산됩니다.§!"
 ACCORD_DIGEST: "소화"
 ACCORD_DIGEST_desc: "$the_eater_of_worlds_article$의 끝없는 식욕은 반드시 충족되어야 합니다."
 ACCORD_DIGEST_TT: "우리 §H$PSIONIC_AURA$§! 내 적 행성의 §Y$DEVASTATION$§!: §G+$@accord_digest_devastation|0$§!\n우리 §H$PSIONIC_AURA$§! 내 적 함선의 §Y$HULL$§! 및 §Y$ARMOR$§!: §G$@accord_digest_ship_malus|0%$§!\n$ACCORD_LOOSE_INTENSITY$"
 # Cradle of Souls accords
 ACCORD_CHARITY: "신뢰"
 ACCORD_CHARITY_desc: "$the_cradle_of_souls_article$의 전염되는 자애는 다른 이들이 우리를 더욱 신뢰하고 다가오게 합니다."
 ACCORD_TRUST: "계시"
 ACCORD_TRUST_desc: "$the_cradle_of_souls_article_cap$은 여러 입으로 말하며, 이제 우리는 그 목소리와 함께합니다."
 ACCORD_THOUGHTBOND: "통일된 사고"
 ACCORD_THOUGHTBOND_desc: "$the_cradle_of_souls_article_cap$은 유례없는 사고의 조화를 부여합니다."
 ACCORD_THOUGHTBOND_TT: "$mod_pop_factions_produces_mult$: §H$@accord_duration|0$§!년 동안 §G+$@accord_thoughtbond_faction_output|0%$§!"
 ACCORD_THOUGHTBOND_TT_gestalt: "$mod_planet_jobs_unity_produces_mult$: §H$@accord_duration|0$§!년 동안 §G+$@accord_thoughtbond_unity_from_jobs|0%$§!"
 ACCORD_FAVOR: "호의"
 ACCORD_FAVOR_desc: "$the_cradle_of_souls_article_cap$은 외교를 중대한 가치의 힘으로 판단합니다."
 ACCORD_FAVOR_TT: "§H$PSIONIC_AURA$§! 내 다른 제국으로부터 받은 호의를 모두 소모해 그에 비례한 통합과 영향력을 획득합니다.\n$ACCORD_LOOSE_INTENSITY$"
 # Composer of Strands accords
 ACCORD_LIFE: "성장"
 ACCORD_LIFE_desc: "$the_composer_of_strands_article_cap$가 열매를 맺고, 우리는 다시 씨앗을 심습니다."
 ACCORD_FERTILITY: "활기"
 ACCORD_FERTILITY_desc: "$the_composer_of_strands_article_cap$는 우리에게 풍요로운 영향력을 부여합니다."
 ACCORD_TRANSFORMATION: "변화"
 ACCORD_TRANSFORMATION_desc: "$the_composer_of_strands_article_cap$는 자신의 의지대로 세상을 조각합니다."
 ACCORD_TRANSFORMATION_TT: "국경 내 거주 불가능한 무작위 행성 1개가 §G$@accord_transformation_gaia_world_size|0$§! 규모의 §H$pc_gaia$§!으로 바뀝니다."
 ACCORD_GENERATION: "확장"
 ACCORD_GENERATION_desc: "$the_composer_of_strands_article$의 의지가 우리의 존재 속에서 꽃핍니다."
 ACCORD_GENERATION_TT: "우리 §H$PSIONIC_AURA$§! 내 모든 식민지에 $@accord_generation_pop_gain|0$ 주 종족 £pop£ §Y팝§! 추가\n$ACCORD_LOOSE_INTENSITY$"
 # Instrument of Desire accords
 ACCORD_PROGRESS: "진보"
 ACCORD_PROGRESS_desc: "$the_instrument_of_desire_article_cap$은 발전에서 큰 기쁨을 얻습니다."
 ACCORD_BLISS: "행복"
 ACCORD_BLISS_desc: "$the_instrument_of_desire_article_cap$이 우리를 지나칠 정도의 행복으로 채웁니다."
 ACCORD_ASCENSION: "승격"
 ACCORD_ASCENSION_desc: "$the_instrument_of_desire_article$이 가져오는 번영은 물리적 세계의 한계를 넘어섭니다."
 ACCORD_ASCENSION_TT: "다음 §Y행성 승격§! 비용을 제거합니다."
 ACCORD_ASCENSION_FAIL_TT: "$TRIGGER_FAIL$§R마지막 활성화 이후 행성을 승격시키지 않았습니다.§!"
 ACCORD_EXPLOITATION: "착취"
 ACCORD_EXPLOITATION_desc: "$the_instrument_of_desire_article_cap$은 단순히 필요가 채워지는 것으로 만족하지 않습니다. 넘칠 만큼의 과도한 생산을 원합니다."
 ACCORD_EXPLOITATION_TT: "§H$@accord_duration|0$§!년 동안 소유한 모든 식민지의 $pop_group_unit$ $job_entertainer_name_plural_with_icon$당 직업으로 인한 자원: §G+$@accord_exploitation_resources_from_jobs|0%$§!\n$ACCORD_LOOSE_INTENSITY$"
 ACCORD_EXPLOITATION_TT_gestalt: "§H$@accord_duration|0$§!년 동안 $mod_planet_jobs_complex_drone_produces_mult$: §G+$@accord_exploitation_complex_drones_resources|0%$§!\n$ACCORD_LOOSE_INTENSITY$"
 # Whisperers in the Void accords
 ACCORD_KNOWLEDGE: "지식"
 ACCORD_KNOWLEDGE_desc: "$whisperers_in_the_void_article_cap$이 우리에게 은밀한 비밀을 전합니다."
 ACCORD_WISDOM: "지혜"
 ACCORD_WISDOM_desc: "$whisperers_in_the_void_article_cap$은 장막 내 모든 영역에 관한 지식을 보유하고 있습니다."
 ACCORD_FORESIGHT: "예지"
 ACCORD_FORESIGHT_desc: "$whisperers_in_the_void_article_cap$은 시간의 흐름을 초월한 지식으로 메아리칩니다."
 ACCORD_FORESIGHT_TT: "현재 연구된 기술에 진행도 §G$@foresight_tech_progression|0%$§! 추가"
 ACCORD_HINDSIGHT: "뒤늦은 깨달음"
 ACCORD_HINDSIGHT_desc: "$whisperers_in_the_void_article_cap$는 우리가 알 수 없는 시공간 속 행성들의 기록을 지니고 있습니다. 우리는 그저 그 책의 한쪽을 넘기기만 하면 됩니다."
 ACCORD_HINDSIGHT_TT: "§H$PSIONIC_AURA$§! 내 소유한 식민지 하나를 선택해 모든 차단물이 제거된 §H유물 행성§!으로 바꿉니다.\n$ACCORD_LOOSE_INTENSITY$"
 accord_minor_patron_tt: "§I$PSIONIC_AURA$§!:"
 animator_of_clay_accord_tt: "$accord_minor_patron_tt$ 기계 및 유기체 팝 조립 §G+$@animator_of_clay_accord|0%$§!"
 outsider_accord_tt: "$accord_minor_patron_tt$ $MOD_SHIP_SHIELD_MULT$ §G+$@outsider_accord|0%$§!"
 endless_sands_accord_tt: "$accord_minor_patron_tt$ $MOD_PLANET_BUILDING_BUILD_SPEED_MULT$ §G+$@endless_sands_accord|0%$§!"
 pale_mountain_accord_tt: "$accord_minor_patron_tt$ 팝 성장 속도 §G+$@pale_mountain_accord|0%$§!."
 golden_dream_accord_tt: "$accord_minor_patron_tt$ $MOD_PLANET_AMENITIES_MULT$ §G+$@golden_dream_accord|0%$§!"
 bladeless_sword_accord_tt: "$accord_minor_patron_tt$ $MOD_POP_HAPPINESS$ §G+$@bladeless_sword_accord|0%$§!"
 bladeless_sword_accord_gestalt_tt: "$accord_minor_patron_tt$ $MOD_PLANET_STABILITY_MULT$ §G+$@bladeless_sword_accord|0%$§!"
 throne_shadow_accord_tt: "$accord_minor_patron_tt$ $mod_planet_jobs_worker_produces_mult$ §G$@throne_shadow_accord|0%$§!\n$accord_minor_patron_tt$ $mod_planet_jobs_slave_produces_mult$ §G$@throne_shadow_accord|0%$§!"
 throne_shadow_accord_gestalt_tt: "$accord_minor_patron_tt$ $planet_jobs_simple_drone_produces_mult$ §G$@throne_shadow_accord|0%$§!"
 black_river_accord_tt: "$accord_minor_patron_tt$ $MOD_SHIP_SPEED_MULT$ §G+$@black_river_accord|0%$§!"
 # End of the Cycle accords
 ACCORD_FRACTALIZATION: "프랙털화"
 ACCORD_FRACTALIZATION_desc: "$end_aura$는 물리적 현실의 일부를 엮어 장막으로 만들며, 외부로 뻗어나가게 해 줄 미지의 공간을 선사합니다. 한 번 형성된 실타래는 끝이 도래할 때까지 그 자리에 남을 것입니다."
 ACCORD_FRACTALIZATION_TT: "§H$PSIONIC_AURA$§! 내 §Y$mod_station_researchers_produces_mult$§! 및 §Y$mod_station_gatherers_produces_mult$§!: §G+100%§!"
 fractalization_effect_tt: "§Y$ACCORD_FRACTALIZATION$§!로 인한 값:$TABBED_NEW_LINE$$mod_station_researchers_produces_mult$: §G+[GetFractalizationValue]%§!$TABBED_NEW_LINE$$mod_station_gatherers_produces_mult$: §G+[GetFractalizationValue]%§!"
 ACCORD_FRACTALIZATION_TRIGGER: "£trigger_no£ §R§Y$situation_end_of_the_cycle$§! §H상황§!이 $stage_2$에 도달함§!"
 ACCORD_CREATION: "창조"
 ACCORD_CREATION_desc: "이 쇠퇴하는 시기에는 $end_of_the_cycle_article$의 현실에 대한 지배력이 한층 강해집니다. 다른 차원의 행성들이 통째로 이 차원에 끌려 들어와, 필연적인 무로 향하는 길을 더 빠르게 가속합니다."
 ACCORD_CREATION_TT: "£system£ §Y수도 성계§!에 §H1000§! £pop£ §Y$POPS$§!으로 시작하는 §H$pc_gaia$§!을 생성합니다."
 ACCORD_CREATION_TRIGGER: "£trigger_no£ §R§Y$situation_end_of_the_cycle$§! §H상황§!이 시작됨§!"
 ACCORD_DISTORTION: "왜곡"
 ACCORD_DISTORTION_desc: "$end_of_the_cycle_article_cap$의 영향력이 시공간의 구조를 왜곡하며 그 의지를 퍼뜨릴 새로운 길을 엽니다."
 ACCORD_DISTORTION_TT: "우리 함대는 향후 §H$@distortion_accord_duration|0$§!년 동안 부정적인 효과 없이 두 배 거리까지 초공간 도약할 수 있습니다."
