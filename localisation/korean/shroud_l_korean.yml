 shroud_seal: "$SHROUD_SEAL$"
 shroud_seal_DESC: "저주파 파동을 방출해 $PSIONIC_AURA_PLURAL$를 상쇄하고 분산시켜 궁극적으로 무효화할 수 있는 정교한 기기입니다."
 shroud_seal_MEGASTRUCTURE_DETAILS: "§Y$SHROUD_SEAL$§!는 주변의 §Y$PSIONIC_AURA_PLURAL$§!를 약화시키고 §Y사이오닉 함선 부품§!의 효율을 감소시킵니다."
