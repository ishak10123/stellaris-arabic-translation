 #==========================
 # Tutorials
 #==========================
 TUTORIAL_SHROUD_TAB_TITLE: "튜토리얼: $THE_SHROUD_TITLE$"
 TUTORIAL_SHROUD_TAB_DESC: "§S장막§! 탭입니다. 왼쪽 패널은 §S후원자§!라 불리는 네 사이오닉 존재의 §S영역§!을 통해 장막 내 우리 제국의 위치를 시각화하여 표시합니다.\n\n우리의 위치는 §S$concept_attunement$§!에 따라 결정되며, 이는 물리적 세계에서 후원자의 호감을 사는 행동을 할 때 획득할 수 있습니다. $concept_attunement$을 획득하면 후원자의 정체를 밝혀내는 과정이 시작됩니다. 정체를 밝혀내면 해당 후원자의 영역을 클릭해 후원자 패널을 열 수 있습니다.\n\n§S$DELVE$§! 또는 왼쪽 패널의 중앙을 클릭하면 장막에 진입해 사이오닉 영역을 탐사할 수 있습니다. 탐사 도중 발견하는 내용은 영역 내 우리의 $concept_attunement$ 위치에 따라 달라질 수 있습니다."
 TUTORIAL_SHROUD_PATRON_TITLE: "튜토리얼: 장막 후원자"
 TUTORIAL_SHROUD_PATRON_DESC: "§S후원자§! 패널은 장막 후원자와 관련된 정보와 선택지를 제공합니다. §S$concept_callings$§!과 §S$concept_deeds$§!을 완료하면 해당 존재와의 §S$concept_attunement$§!을 얻을 수 있습니다.\n\n$concept_attunement$이 증가하면 제국에 이득을 주는 §S$PASSIVE_ACCORDS$§!이 잠금 해제됩니다. 또한, 후원자와 상당한 $concept_attunement$을 쌓으면 §S계약§!을 맺는 과정을 시작할 수 있으며, 이는 훨씬 더 강력한 효과를 가져올 것입니다."
 TUTORIAL_SHROUD_COVENANT_TITLE: "튜토리얼: 계약"
 TUTORIAL_SHROUD_COVENANT_DESC: "장막 후원자와 §S계약§!을 맺으면 §S$ACTIVE_ACCORDS$§!을 이용할 수 있게 됩니다. $tutorial.shroud_covenant.shared$"
 tutorial.shroud_covenant.shared: "$ACTIVE_ACCORD$ 아이콘을 클릭하면 £sr_zro£ §S$sr_zro$§!를 소모해 협약 효과를 발동할 수 있습니다. 이 작업은 주 장막 패널이나 각 후원자 패널에서 수행할 수 있습니다.\n\n한 번 활성화된 $ACTIVE_ACCORD$은 일정 시간이 지나야 다시 사용할 수 있습니다."
 TUTORIAL_SHROUD_SHAPING_TITLE: "튜토리얼: 장막 조형"
 TUTORIAL_SHROUD_SHAPING_DESC: "일반적으로 §S후원자§!와의 §S계약§!이 필요한 특정 능력을 획득할 수단을 갖추게 되었습니다.\n\n한 후원자의 §S$PASSIVE_ACCORDS$§! 두 개를 모두 잠금 해제하면 §S$ACTIVE_ACCORD$§!을 사용할 수 있게 됩니다. $tutorial.shroud_covenant.shared$"
 tutorial.2600.name: "튜토리얼: $PSIONIC_AURA_PLURAL$"
 tutorial.2600.desc: "사이오닉 인구가 있는 식민지는 이제 §S$PSIONIC_AURA$§!를 방출할 수 있습니다. 이 오라는 현재 가장 높은 §S$concept_attunement$§!을 달성한 §S장막 후원자§!로부터 끌어옵니다.\n\n$PSIONIC_AURA_PLURAL$는 제국에 다양한 영향을 미치며, 우호적이거나 적대적인 제국에도 영향을 줄 수 있습니다. 더 많은 성계로 오라를 확장하려면 후원자와 더 깊은 조율을 맺어 £research£ §S$tech_aura_intensification$§! 기술을 잠금 해제해야 합니다.\n\n$PSIONIC_AURA$의 효과를 확인하려면 §S장막§! 탭을 열거나 £interface£ §S성계 둘러보기§! 하단 중앙 패널의 오라 아이콘에 마우스를 올리십시오."
 tutorial.2610.name: "튜토리얼: $tech_aura_intensification$"
 tutorial.2610.desc: "§S$PSIONIC_AURA$§!가 이제 §S강도§!를 얻어 다른 성계로 퍼질 수 있게 되었습니다.\n\n$PSIONIC_AURA_PLURAL$는 세 단계의 강도에 도달할 수 있으며, 단계마다 효과가 강화됩니다. $PSIONIC_AURA$가 새로운 단계에 도달하거나 최대 강도에 도달하면 인접 성계로 확산될 수 있습니다. 대부분의 $PSIONIC_AURA_PLURAL$는 그 방출원으로부터 퍼질 수 있는 최대 범위가 정해져 있습니다.\n\n오라의 강도는 $trait_psionic$ 특성을 가진 인구, £happiness£ §S행복도§!, £job_telepath£ [GetTelepathCap] 직업, 초능력자 총독이나 £sector£ 구역 £leader£ 지도자 등의 요소로 증가시킬 수 있습니다."
 tutorial.2620.name: "튜토리얼: 오라 충돌"
 tutorial.2620.desc: "우리 §S$PSIONIC_AURA$§!가 연결된 인접 성계에서 다른 오라와 만났습니다. 이때 두 오라는 어느 쪽의 성계로 확산될지를 두고 경쟁할 수 있습니다.\n\n경쟁은 각 오라의 월간 §S강도§! 증가량에 따라 결정되며, 이 수치는 £interface£ §S성계 둘러보기§! 하단 중앙 패널의 오라 아이콘에 마우스를 올리면 확인할 수 있습니다."
 #==========================
 # Technologies
 #==========================
 tech_psionic_aura: "$PSIONIC_AURA$"
 tech_psionic_aura_desc: "장막에서 뿜어져 나오는 사이오닉 에너지는 장막의 존재의 의지를 현실로 구현합니다. 장막 후원자와 조율을 이룬 제국은 사이오닉 인구가 밀집한 지역에서 $PSIONIC_AURA$를 방출합니다."
 feature_unlock_psionic_aura: "$PSIONIC_AURA_PLURAL$"
 feature_unlock_psionic_aura_desc: "장막 후원자와 조율을 이룬 제국이 사이오닉 인구가 밀집한 지역에서 $PSIONIC_AURA$를 방출하도록 합니다."
 psionic_aura_delve_success_tt: "탐사 성공 확률: §G+$@delve_success_tier_1|0$%§!"
 tech_aura_intensification: "$PSIONIC_AURA$ 증폭"
 tech_aura_intensification_desc: "장막에서 뿜어져 나오는 사이오닉 에너지는 더욱 확장되기를 갈망합니다. 이 새로운 이해를 바탕으로 제국의 $PSIONIC_AURA_PLURAL$를 강화하고 성계 전역으로 퍼뜨려 아군에게 이익을, 적에게는 불이익을 가져다줄 수 있습니다."
 feature_allow_psionic_aura_intensity_spread: "$PSIONIC_AURA$ 확산"
 feature_allow_psionic_aura_intensity_spread_desc: "$PSIONIC_AURA_PLURAL$가 방출원에서 최대 §Y[Owner.GetAuraHyperlaneRange]§! 초공간 항로 이내에 있는 이웃 성계까지 퍼지게 합니다."
 feature_allow_psionic_aura_intensity_growth: "$PSIONIC_AURA$ 강화"
 feature_allow_psionic_aura_intensity_growth_desc: "$PSIONIC_AURA_PLURAL$의 강도를 강화합니다."
 aura_intensification_delve_success_tt: "탐사 성공 확률: §G+$@delve_success_tier_2|0$%§!"
 tech_psionic_suppression: "사이오닉 억제"
 tech_psionic_suppression_desc: "사이오닉 에너지 약화 장치는 이해하기 어려운 만큼 제작하기도 어렵습니다. 차원 너머의 힘을 다룬다는 것은 이토록 복잡합니다."
 tech_psionic_suppression_feature_tt: "$i_unlocks_feature$ §Y장막 봉인기§! 및 §Y사이오닉 억제기§! 건설이 잠금 해제됩니다."
 tech_aura_resonation: "오라 공명기"
 tech_aura_resonation_desc: "$PSIONIC_AURA_PLURAL$를 거주 행성 너머로 방출할 방법이 존재합니다. $sm_aura_emitter$를 설치하면 항성 기지조차도 장막에서 흘러나오는 사이오닉 방출의 통로가 될 수 있습니다."
 tech_materiality_engine: "$building_materiality_engine$"
 tech_materiality_engine_desc: "$building_materiality_engine_desc$"
 tech_psionic_bombers: "사이오닉 폭격기"
 tech_psionic_bombers_desc: "집중 폭격에 특화된 소형 고기동 폭격기로, 탑재된 사이오닉 에너지 폭격탄은 표적이 클수록 강하게 공명해 더 큰 폭발을 일으킵니다."
 tech_bio_psionic_bombers: "$tech_psionic_bombers$"
 tech_psionic_lightning: "사이오닉 라이트닝"
 tech_psionic_lightning_desc: "함선 간에 일시적인 사이오닉 연결을 형성해 강력한 정신 에너지를 직접적으로 방출하여 막대한 피해를 줍니다. 방출된 원초적 에너지는 함선 시스템을 교란하고 승무원들의 정신에도 영향을 미칩니다."
 tech_bio_psionic_lightning: "$tech_psionic_lightning$"
 ship_terrify_tt: "확률로 표적 함선 크기에 따라 £time£ §Y5~10§!일 동안 군용 함선에 ['concept_terrify'] 유발"
 concept_terrify: "공포"
 concept_terrify_desc: "공포에 휩싸인 함선은 공격을 멈추고 공격자로부터 도주합니다."
 tech_psionic_disruptor: "사이오닉 분열기"
 tech_psionic_disruptor_desc: "강력한 사이오닉 에너지 창을 정밀하게 발사해 선체를 꿰뚫고 적의 무장을 무력화할 수 있는 첨단 분열기입니다."
 tech_bio_psionic_disruptor: "$tech_psionic_disruptor$"
 tech_zro_launcher: "즈로 발사기"
 tech_zro_launcher_desc: "고농축 $zro_lower$ 산탄을 발사하는 무기입니다. 산탄은 여러 차원을 넘나들며 적 방어막을 관통해 퍼져 나가다, 물리적 대상에 닿는 순간 기하급수적인 파괴력을 발휘합니다."
 tech_bio_zro_launcher: "$tech_zro_launcher$"
