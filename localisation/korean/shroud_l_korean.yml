 CASUS_BELLI_COST_TT: "이 §H전쟁 명분§!은 다음을 필요로 합니다:"
 casus_belli_cb_proxy_war: "대리전"
 war_goal_wg_proxy_war: "대리전"
 war_goal_wg_proxy_war_desc: "전쟁은 적대적인 소문과 은밀한 속삭임에서 시작됩니다. 승리 시 공격자는 영유권을 주장한 모든 성계의 통제권을 얻고, 정복한 성계마다 생성되는 §Y위협§!이 §Y33%§! 감소합니다."
 shroud.5055.title: "$proxy_war_busted_modifier$"
 shroud.5055.desc.common: "우리는 속았습니다.\n\n정보 요원들이 §H[from.GetName]§!의 은밀한 통신을 가로챘으며, 우리를 대리전으로 몰아넣으려 한 음모를 밝혀냈습니다.\n\n[from.GetName](은)는 자신들이 아무런 연관이 없다며 강력히 부인했지만 이미 양측의 관계는 돌이킬 수 없이 틀어졌습니다."
 shroud.5055.desc.galactic: "$shroud.5055.desc.common$ [from.GetName]의 이중성에 대한 소식은 빠르게 퍼져, 이들의 은하계 내 평판에 부정적인 영향을 미치고 있습니다."
 shroud.5060.title: "$proxy_war_busted_modifier$"
 shroud.5060.desc.common: "성공적으로 분쟁을 유발했지만, 작전이 완전히 계획대로 진행된 것은 아니었습니다. 우리 요원의 통신이 가로채져 당사자들에게 우리의 은밀한 활동이 드러나고 만 것입니다.\n\n이를 해명하려는 시도는 효과가 없었습니다."
 shroud.5060.desc.galactic: "$shroud.5060.desc.common$ 이 사건으로 인해 교전국과의 관계가 악화되었을 뿐만 아니라, 은하계 전반에서 우리의 평판이 떨어지게 되었습니다."
 shroud.5060.desc.default: "$shroud.5060.desc.common$ 이 사건으로 인해 교전국과의 관계가 크게 악화되었습니다."
 shroud.5060.a.tt: "우리 제국에 대한 §Y대리전§! 연루 제국들의 우호도 변동: §R-200§!"
 proxy_war_busted_modifier: "대리전 선동 적발"
 proxy_war_busted_modifier_desc: "대리전을 유발한 계략이 분쟁 당사자들에게 발각되었습니다. 이로 인해 우리의 평판이 광범위하게 떨어졌습니다."
 opinion_proxy_war_busted: "$proxy_war_busted_modifier$"
 PROXY_WAR_BUSTED_MESSAGE_TYPE_TITLE: "$proxy_war_busted_modifier$"
 PROXY_WAR_BUSTED_MESSAGE_TYPE_DESC: "연루된 교전국들이 우리가 대리전을 유발했다는 사실을 알아차렸습니다.\n$shroud.5060.a.tt$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_TITLE: "$proxy_war_busted_modifier$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_DESC: "§H$INSTIGATOR$§!(이)가 우리를 대리전으로 몰아넣으려 한 음모를 발견했습니다.\n§H$INSTIGATOR$§!에 대한 우리의 우호도 변동: §R-200§!"
