 song_of_steel: "강철의 노래"
 song_of_steel_desc: "산업을 찬양하는 사이오닉 찬송입니다.\n\n"
 song_of_luxury: "사치의 노래"
 song_of_luxury_desc: "황홀한 사치에 바치는 사이오닉 서사시입니다.\n\n"
 song_of_knowing: "지식의 노래"
 song_of_knowing_desc: "복잡한 패턴과 리듬으로 이루어진 사이오닉 공명입니다.\n\n"
 policy_psionic_suppression_policy: "사이오닉 억제"
 policy_psionic_suppression_policy_desc: "이 정책은 성계를 장악할 때 $PSIONIC_AURA_PLURAL$ 억제 장치의 해체 여부를 결정합니다."
 psionic_suppression_dismantle: "해체"
