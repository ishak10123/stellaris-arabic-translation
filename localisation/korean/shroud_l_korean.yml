 ATTUNEMENT_TT: "§H조율§!은 §H후원자§!가 제국에 관심을 보이는 정도를 나타냅니다. ['concept_deeds']을 수행하거나 ['concept_callings']을 완료해 조율을 높이십시오.\n\n한 후원자와의 조율을 높이면 해당 후원자와 대립하는 다른 존재와의 조율이 감소합니다."
