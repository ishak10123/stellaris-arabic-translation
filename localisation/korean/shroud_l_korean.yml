 # Energy Thralls (Normal)
 job_energy_thrall: "에너지 노예"
 job_energy_thrall_plural: "에너지 노예"
 job_energy_thrall_desc: "주민들의 잉여 에너지는 지도층의 능력을 높은 수준으로 유지하는 데 더 잘 활용될 수 있습니다. 각 $job_energy_thrall$에게는 특수 조정된 흡수 장치가 이식되어, 개체로부터 생명력을 수집해 운반하기 용이한 동력 셀에 저장합니다."
