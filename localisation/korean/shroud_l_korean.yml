 shroud.delve_event.curse.13: "장막이 우리의 노력을 저주합니다."
 shroud.delve_event.curse.14: "우리는 장막에 저주받았습니다."
 shroud.delve_event.curse.15: "장막이 우리에게 경멸을 선사합니다."
 shroud.3000.title: "스쳐 가는 형체"
 shroud.3000.desc: "소용돌이치는 어둠 속에서 저 멀리 그림자들이 잠시 형체를 이루었다가 다시 허무 속으로 사라집니다. 알아들을 수 없는 잡음 속에서 무수한 목소리가 이해를 넘어선 외침을 쏟아 냅니다. 빛이 명멸하고, 열기가 솟는가 하면 이내 사그라듭니다.\n\n그러다 문득 움직임이 느껴집니다. 무언가가 회전하고 있습니다. 우리가 움직이고 있는 것일까요? 아니면 장막 그 자체가 움직이는 것일까요?\n\n알 수 없는 무언가의 존재감이 느껴집니다. 앞과 뒤, 위와 아래, 겉과 속... 모든 방향에서 우리를 향해 다가오고 있습니다. 이윽고 한 줄기 목소리가 들립니다.\n\n§H무엇이 보이는가?§!"
 shroud.3000.a: "타오르는 세상이 보입니다."
 shroud.3000.a.reply: "균형이 흔들리고, 목소리가 다시금 울려 퍼집니다.\n\n§H좋아.§!\n\n어둠이 기울어지더니 이내 회전합니다. 무언가가 잠시 우리를 강하게 짓누르다가 갑자기 사라집니다. 그리고 다시 우리만 남았습니다."
 shroud.3000.b: "축연이 보입니다."
 shroud.3000.b.reply: "무거운 무언가가 파르르 떨립니다. 어둠이 천천히 우리를 짓누르며 점점 더 강하게 압박해 옵니다.\n\n§H틀렸어!§!\n\n공허가 기울어지더니 이내 회전합니다. 어느새 우리는 다시 홀로 남겨졌습니다..."
 shroud.3000.c: "잘 모르겠습니다."
 shroud.3000.c.reply: "§H나약하군!§!\n\n공허가 기울어지더니 이내 회전합니다. 어느새 우리는 다시 홀로 남겨졌습니다..."
 shroud.3005.title: "침 흘리는 굶주림"
 shroud.3005.desc: "부패한 내장의 악취가 우리의 감각을 마비시키는 듯합니다.\n\n장막의 깊은 곳으로부터 게걸스러운 분노로 꿈틀거리며 으르렁대는 형상들이 모습을 드러냅니다. 굶주린 야수들이 울부짖는 소리가 들리는가 하더니... 그 존재들의 허기가 느껴집니다. 이내 우리는 그 침 흘리는 아가리와 하나가 된 우리 자신을 발견합니다.\n\n우리 앞에 검은 윤곽이 떠오릅니다. 공포에 질린 가축, 우리의 먹잇감입니다. 손을 뻗으면 바로 닿을 것만 같습니다... 속을 갉아 먹는 굶주림이 더욱 커져 더 이상 견딜 수 없을 지경입니다.\n\n허기가 우리의 사고를 잠식할수록 우리의 감각이 뒤틀립니다. 지금 들리는 이 비명은 사냥감의 것일까요, 아니가 우리가 부르짖고 있는 것일까요?\n\n우리를 옭아매던 족쇄가 점점 조여 옵니다. 그러나 고통 속에서 한 줄기 목소리가 찢어질 듯 외칩니다.\n\n§H족쇄를 깨부수고 만찬을 즐겨라!§!"
 shroud.3005.a: "족쇄를 부수고, 먹잇감을 사냥하세요."
 shroud.3005.a.boons.tt: "무작위 전투 중심 $shroud_boon$을 획득합니다."
 shroud.3005.a.reply: "우리의 속박이 끊어집니다.\n\n풀려난 굶주린 야수들이여.\n\n공포를 심어라!\n\n§H마음껏 포식하라!§!"
 shroud.3005.b: "허기에 저항하세요. 마음을 가라앉힙시다."
 shroud.3005.b.reply: "족쇄가 단단히 조여 옵니다. 우리가 정체 모를 존재의 영향을 뿌리치며 정신을 가라앉히고 스스로의 통제권을 되찾자, 울려 퍼지던 목소리가 격분에 차 외칩니다.\n\n§H나약하고 무능력한 것들!§!\n\n허기가 사라지고, 장막 속에는 희미해져 가는 분노만이 남았습니다."
 shroud.3010.title: "희생의 만찬"
 shroud.3010.desc: "심연 속에 악의에 물든 거친 목소리가 울려 퍼지며 우리를 부릅니다.\n\n§H먹어 치워라. 집어삼켜라. 마음껏 탐닉하라!§!\n\n느닷없이 환영이 시야를 물들입니다. 세계는 어느새 잿더미와 침묵으로 변하고 [Root.GetCitizenPlural]의 육신은 사이오닉 에너지에 물어뜯기며, 그 울부짖는 비명이 울려 퍼지던 목소리와... 우리의 배고픔을 달래 줍니다.\n\n잔혹한 광경이 펼쳐지는 가운데, 곁에서 또 다른 존재가 느껴집니다. 우리 [Root.GetCitizenPlural]들에게 자제와 연대를 권하며 함께 더욱 강해지자고 속삭입니다. 하지만 이내 그 목소리는 거친 포효소리에 삼켜지고 말았습니다."
 shroud.3010.desc.organic: "§H놈들의 살점을 내게 바쳐라!§!"
 shroud.3010.desc.other: "§H놈들의 신체를 내게 바쳐라!§!"
 shroud.3010.a: "포식하세요."
 shroud.3010.a.reply: "삼켜진 자들의 비명이 장막과 제국에 울려 퍼지다가, 돌연 정적에 잠깁니다.\n\n피식자들의 희생으로 우리의 힘이 커지고 굶주림은 사그라듭니다."
 shroud.3010.b: "통합하세요."
 shroud.3010.b.reply: "우리는 목소리를 잠재우고, 대신 장막을 넘어 모두가 하나 되어 제국을 포용합니다. 굶주림이 사그라들고, 분노에 찬 절규는 안도와 위안의 집단적인 한숨 속에 묻혀 사라집니다."
 shroud.3015.title: "덧없는 환영"
 shroud.3015.desc: "어둠 속에서 강력한 사이오닉 에너지의 흐름이 충돌하고, 그림자들이 주위를 휘감았다가 흩어집니다... 앞에는 희미한 불빛이 맥박칩니다.\n\n찰나의 순간 무언가 눈앞에 나타났다가 형태를 파악하기도 전에 사라져 버립니다.\n\n기묘한 기척이 우리를 감쌉니다.\n\n§H무엇을 보았는가?§!"
 shroud.3015.a: "많은 생명체가 사는 숲을 보았습니다."
 shroud.3015.a.reply: "긴 정적이 흐른 뒤, 목소리가 다시 들려옵니다...\n\n§H훌륭하군.§!\n\n내면에서 강렬한 열기가 끓어오르더니 이내 가라앉습니다. 이제 기척은 느껴지지 않습니다."
 shroud.3015.b: "모든 것이 사라진 황무지를 보았습니다."
 shroud.3015.b.reply: "목소리가 다시 들려옵니다...\n\n§H절대 안 돼!§!\n\n내면에서 강렬한 한기가 느껴지더니 다음 순간 사라집니다. 이제 기척은 느껴지지 않습니다."
 shroud.3015.c: "잘 모르겠습니다."
 shroud.3015.c.reply: "목소리가 다시 들려옵니다...\n\n§H참으로 시시하군.§!\n\n극심한 허무감이 우리를 덮치더니 다음 순간 사라집니다. 이제 기척은 느껴지지 않습니다."
 shroud.3020.title: "매혹적인 보호"
 shroud.3020.desc: "장막의 층 사이로 한 장면이 펼쳐집니다.\n\n안개가 일렁이며 뒤엉킨 채 몸부림치는 생명체의 윤곽이 나타납니다. 흐릿한 촉수가 그 형체를 점점 더 거세게 휘감아 숨통을 조이고 있습니다.\n\n괴로워하는 생명체는 이제껏 본 적 없는 동물입니다.\n\n내면에서 목소리가 들려옵니다.\n\n§H운명의 실이 손짓한다! 어느 것을 고르겠는가?§!"
 shroud.3020.a: "생명체를 풀어 줍시다."
 shroud.3020.a.reply: "생명체가 눈앞에서 사라지고 목소리가 우리 [GetMindLoc] 속에 메아리칩니다.\n\n§H번영.§!\n\n또 다른 장면이 찰나에 스쳐 지나갑니다. 우리 제국 어딘가에서 생명이 돋아나는 모습입니다."
 shroud.3020.b: "포획합시다."
 shroud.3020.b.reply: "내면의 목소리가 멀어지고, 황폐한 땅의 환영 속에서 메아리치는 울음소리만이 들려옵니다.\n\n§H역병.§!"
 shroud.3020.c: "죽여 버리세요."
 shroud.3020.c.swarm: "포식하세요."
 shroud.3020.c.reply: "주체할 수 없는 욕구가 솟구치며 목소리가 밀려납니다. 잔혹한 웃음이 공허에 울려 퍼지고 피의 욕망이 우리의 [GetMindLoc](을)를 채웁니다.\n\n§H그래, 그거야! 쉬운 사냥감이지.§!"
 shroud.3025.title: "변하는 풍경"
 shroud.3025.desc: "장막의 안개가 흩어지며 끝없이 뒤엉킨 환영을 보여 줍니다.\n\n이해할 수 없을 정도로 뒤틀린 흐릿한 풍경들이 우리 앞에 펼쳐집니다. 산이 솟아올랐다가 사라지고, 끓어오르던 혼돈의 바다가 증발해 끝없는 사막과 하얗게 바랜 수중 생물의 뼈만 남습니다.\n\n숲 속 그늘 아래 온순한 생명체들이 서식지를 누비다 경련하며 피에 굶주린 괴물로 변이하고, 이들은 서로를 갈가리 찢으며 끝없는 삶과 죽음의 순환을 반복합니다.\n\n혼란 속에서 목소리가 우리의 [GetMindLoc](을)를 관통합니다.\n\n§H서로 뒤엉켜 있군. 이 얼마나 무질서한가.§!"
 shroud.3025.a: "자연을 뜻대로 굴복시킵니다."
 shroud.3025.a.reply: "우리는 손을 뻗어 눈앞의 혼돈을 움켜쥡니다.\n\n그러자 지형이 고정되고 대륙이 자리를 잡습니다.\n\n조각들이 맞춰지면서 목소리가 메아리칩니다.\n\n§H공허하고, 단조롭고, 허무하군...§!"
 shroud.3025.b: "자연의 무질서가 날뛰도록 둡니다."
 shroud.3025.b.reply: "우리는 환영이 이어지는 모습을 지켜봅니다. 끝없는 순환이 뒤섞이며 흐려지다, 이내 폭발해 그 시작만큼이나 갑작스럽게 끝납니다.\n\n끝없는 공간에서 에너지가 솟아나더니, 새로운 형태로 진화합니다.\n\n목소리가 울려 퍼집니다.\n\n§H평화로운 갈등, 무질서한 통합.§!"
 shroud.3025.b.reply.tt: "이 행성에 무작위 §G긍정적 보정치§!와 §R부정적 보정치§!가 하나씩 생깁니다."
 shroud.3030.title: "어둠 속의 프리즘"
 shroud.3030.desc: "들썩이던 장막의 소용돌이가 잦아들고 광활한 검은 모래밭이 드러납니다. 파도가 부서지는 소리가 들리지만 그 모습은 보이지 않습니다.\n\n앞, 어쩌면 뒤쪽에 프리즘이 나타나고, 한 줄기 빛이 닿아 굴절되며 잠시 동안 흐릿한 형상을 나타냅니다.\n\n수많은 그림자와 변화하는 형상들이 스쳐 지나가더니, 다시 어둠에 삼켜집니다.\n\n가까운 모래 위에 어떤 기척이 느껴집니다.\n\n§H보여진 것은, 본 것이 아니던가?§!"
 shroud.3030.a: "수많은 목소리의 집합을 보았습니다."
 shroud.3030.a.reply: "모래가 천천히 움직이고, 목소리가 다시 들려옵니다.\n\n§H그래. 조화가 곧 우주의 이치로다.§!\n\n어깨를 짓누르던 무게가 사라지는 것이 느껴지고, 다시 우리만 남습니다."
 shroud.3030.b: "참혹한 전장을 보았습니다."
 shroud.3030.b.reply: "돌연 모래가 폭풍과도 같은 속도로 휘몰아칩니다.\n\n§H아니. 무기는 녹슬고 잊혀져야 한다!§!\n\n폭풍이 잦아들고, 목소리 또한 사라집니다."
 shroud.3030.c: "잘 모르겠습니다."
 shroud.3030.c.reply: "모래가 천천히 움직입니다.\n\n§H망설임은 곧 실패를 잉태하느니라...§!\n\n그리고 다시 우리만 남습니다."
 shroud.3035.title: "그림자의 싸움"
 shroud.3035.desc: "장막의 혼란스러운 에너지가 꿈틀대며 요동칩니다.\n\n그림자의 촉수가 채찍질하듯 날뛰고, 안개는 스스로를 향해 뒤틀립니다. 사이오닉 폭풍 속에서 두 무형의 존재가 충돌합니다. 이 존재들은 집요하고, 굴복하지 않으며 분노에 잠식돼 있습니다.\n\n낯선 존재가 우리 [GetMindPhysicalLoc] 깊숙이 파고듭니다.\n\n§H들어오는 자는 결의를 지녀야 한다.§!"
 shroud.3035.a: "대화에서 이해가 시작됩니다."
 shroud.3035.a.reply: "안개가 점차 사라지며 사이오닉 에너지의 소용돌이 속으로 녹아들고, 낯선 의식이 다시 말합니다.\n\n§H조화가 곧 지혜로다.§!\n\n장막이 한결 잠잠해졌습니다."
 shroud.3035.b: "타협은 약자를 위한 것입니다."
 shroud.3035.b.reply: "안개가 일격을 가할 때마다 소용돌이가 더 격렬해집니다.\n\n§H폭력은 무지한 자가 받는 대가지.§!\n\n몸부림치는 장막의 에너지가 다시 한번 경련합니다."
 shroud.3040.title: "보이지 않는 풍경"
 shroud.3040.desc: "우리 앞에 검은 웅덩이가 나타납니다.\n\n순간 그 표면에 흐릿한 형상들이 스쳐 지나갑니다. 모든 능선이 일렁이는 금빛으로 가득한, 반짝이는 봉우리의 모습이 언뜻 보입니다.\n\n우리 [GetMindLoc] 속에서 목소리가 울려 퍼집니다.\n\n§H보이지 않는 것을 보았는가?§!"
 shroud.3040.a: "채굴되기를 기다리는 채석장을 보았습니다."
 shroud.3040.a.reply: "일련의 잔물결이 표면을 가로지르더니, 목소리가 다시 한번 들려옵니다.\n\n§H끝없는 성장 속에 헤아릴 수 없는 균형이 유지된다.§!\n\n이내 웅덩이가 잔잔해지며 목소리가 멀어집니다."
 shroud.3040.b: "보존해야 할 자연의 완벽함을 보았습니다."
 shroud.3040.b.reply: "액체가 요동칩니다. 파도가 일렁이며 부서집니다. 어둠 속에서 소용돌이가 휘몰아치고, 목소리가 더욱 강렬하게 들려옵니다.\n\n§H용납할 수 없다! 성장하고 수확하라. 성장하고 수확하라!§!\n\n표면이 다시 잠잠해집니다. 목소리가 사라졌습니다."
 shroud.3040.c: "잘 모르겠습니다."
 shroud.3040.c.reply: "액체가 흔들립니다. 목소리가 다시 들려옵니다.\n\n§H신념이 흔들리는군... 의지에 약점이 보인다.§!\n\n표면이 가라앉고, 목소리가 멀어지는 것이 느껴집니다."
 shroud.3045.title: "빛나는 씨앗"
 shroud.3045.desc: "안개 속에서 무언가 형체가 나타납니다. 눈부시게 밝은 에너지가 순간 힘차게 맥동하더니, 기이한 나무의 윤곽이 보입니다.\n\n가까이 다가설수록 나뭇잎이 빛을 발하며 보라색, 분홍색, 검은색으로 다채롭게 빛납니다.\n\n뿌리에는 빛나는 씨앗이 자리 잡고 있으며, 변화하는 잎의 색에 맞춰 빛을 발합니다.\n\n어느 목소리가 우리의 [GetMindLoc] 안으로 들어옵니다.\n\n§H침범하라. 장악하라. 이용하라.§!"
 shroud.3045.a: "씨앗을 꺼냅니다."
 shroud.3045.a.reply: "씨앗을 제거하자 잎은 생기를 잃고 이내 시들어 버립니다. 목소리가 다시 들려옵니다.\n\n§H그래! 전리품은 또 다른 전리품을 낳는 법이지.§!"
 shroud.3045.b: "씨앗을 그냥 둡니다."
 shroud.3045.b.reply: "떨림이 느껴집니다. 떨고 있는 건 과연 우리일까요, 아니면 세상일까요?\n\n§H번영은 곧 목적이다. 이걸 외면하다니 어리석도다!§!"
 shroud.3050.title: "혼돈의 불협화음"
 shroud.3050.desc.intro: "장막의 끝없는 혼돈 속에서 사이오닉 에너지의 흐름이 충돌하며 요동칩니다. 울부짖는 불협화음이 점점 커지며 우리의 주의를 끕니다."
 shroud.3050.desc.outro: "압도적일 정도의 소음입니다."
 shroud.3050.desc.eater: "고통에 찬 절규, 우레 같은 전쟁의 교향곡, 집어삼키는 불길의 굉음. 고통이 느껴집니다... 누구의 고통일까요?"
 shroud.3050.desc.composer: "동물적이며, 거칠고, 원시적인 비명과 절규... 넘치는 강물과 통곡하는 바람... 자연이 다급하게, 일제히 울부짖습니다."
 shroud.3050.desc.cradle: "수많은 목소리가 속삭이고, 웅얼거리고, 소리치고, 선언합니다... 헤아릴 수 없는 억양, 음절, 소리들... 무수한 언어가 동시에 수군거립니다."
 shroud.3050.desc.instrument: "드릴이 회전하고, 기계가 굉음을 내며... 물질이 격렬하고 강력하게 변모합니다... 우주의 모든 공장이 동시에 포효하며 불을 뿜습니다."
 shroud.3050.a: "소음 안에 머무릅니다."
 shroud.3050.a.reply: "소음이 점점 커지고, 우리는 이해할 수 없는 방향으로 내던져집니다...\n\n마침내 다시 고요가 찾아옵니다."
 shroud.3050.b: "돌아섭니다."
 shroud.3050.b.reply: "도저히 견딜 수가 없습니다. 우리 [GetMindLoc](은)는 침묵이라는 안락함 속으로 물러섭니다."
 shroud.3055.title: "예지의 환영"
 shroud.3055.desc.intro: "짙은 어둠이 우리를 감쌉니다. 사방에서 압력이 점점 조여오고, 마침내 흐릿한 광경이 모습을 드러냅니다."
 shroud.3055.desc.outro: "어둠 속에서 무언가 눈에 들어옵니다. 중앙에 보이는 건 틀림없이 [Root.GetName]의 깃발입니다.\n\n이건 우리의 모습일까요?"
 shroud.3055.desc.eater: "전투가 끝나고 폐허가 된 행성이 보입니다... 그 승자들이 시체와 잔해를 뒤지고 있습니다."
 shroud.3055.desc.composer: "불가능한 속도로 시공을 가르는 수많은 행성이 보입니다... 모두 하나의 제국 아래 통합되어 있습니다."
 shroud.3055.desc.cradle: "거대한 집회가 보입니다... 수많은 사람들의 흐릿한 윤곽이 모여 대화하고 있습니다."
 shroud.3055.desc.instrument.default: "최적화된 행성이 보입니다... 공장과 광산이 끝없이 늘어서 있습니다... 표면의 어느 한구석도 손길이 닿지 않은 곳이 없습니다."
 shroud.3055.desc.instrument.relentless_industrialist: "최적화된 행성이 보입니다... 공장과 광산이 끝없이 늘어서 있습니다... 완벽 그 자체입니다. 표면의 어느 한 구석도 손길이 닿지 않은 곳이 없습니다."
 shroud.3055.a: "환영을 계속 주시합니다."
 shroud.3055.a.reply: "환영이 더욱 선명해지고, 우리는 눈앞의 장면에 확신을 가집니다."
 shroud.3055.b.organic: "환영을 떨쳐냅니다."
 shroud.3055.b.machine: "환영을 회로에서 지웁니다."
 shroud.3055.b.reply: "흐릿하던 환영이 다시 어둠 속으로 사라집니다."
 shroud.3060.title: "공허 사이에서"
 shroud.3060.desc.intro: "형체 없는 장막의 안개가 꿈틀대며 뒤틀립니다. 우리의 의식은 더 깊은 곳으로 끌려가지만, 육신은 미동도 없이 그 자리에 머뭅니다.\n\n우리의 [GetPsycheLoc](은)는 반복되는 파도에 갇혀 버둥거립니다. 모든 움직임은 스스로 무너지고, 마치 바이스처럼 긴장이 단단히 조여 옵니다."
 shroud.3060.desc.intro.organic: "우리의 육체는 끝을 알 수 없는 정팔포체에 갇혀 있습니다. 그러나 정신은 그 너머를 봅니다."
 shroud.3060.desc.intro.machine: "논리 서브루틴이 오류를 감지했습니다. 끝나지 않는 루프입니다. 우리 사이오닉 프로세서는 이 순환을 끊고 정상 기능으로 돌아가기에 역부족입니다."
 shroud.3060.desc.intro.end: "견딜 수 없는 압박감에 우리의 존재가 공허 속으로 흩어질 것만 같습니다. 그때, 속박을 뚫고 한 목소리가 파고듭니다."
 shroud.3060.desc.outro: "단어의 나열이 우리 안에 울려 퍼집니다. 그 힘은 점점 커지고, 우리를 갈기갈기 찢으려는 혼돈을 잠재울 길이 보입니다. 다만 그 길을 가기 위해선 목소리에 굴복해야 합니다."
 shroud.3060.desc.eater: "§H포식하라! 끝없는 공허를 집어삼켜라!§!"
 shroud.3060.desc.composer: "§H되풀이되는 무한의 굴레를 넘어 성장하라!§!"
 shroud.3060.desc.cradle: "§H영원을 받아들여라! 모든 것은 하나이며, 하나는 곧 전체다!§!"
 shroud.3060.desc.instrument: "§H무한한 잠재력을 마음껏 누려라!§!"
 shroud.3060.a: "굴복합니다."
 shroud.3060.a.reply: "목소리가 울리며 우리의 행동을 이끌고, 이해의 한계를 넘어 사고를 강요합니다. 순환은 우리를 조여오고, 끌어당기다가, 마침내 정신에 부딪혀 산산이 부서집니다.\n\n우리는 장막의 높은 존재들에게 간청하여 순환을 헤쳐 나왔습니다.\n\n하지만 모두가 함께 온 것은 아닙니다. §H[event_target:shroud_warped_leader.GetName]§!(이)가 보이지 않습니다. 그때, 목소리가 다시 들려옵니다."
 shroud.3060.a.reply.default: "사라진 자들은 다시 태어날 것이다."
 shroud.3060.a.reply.eater: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.composer: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.cradle: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.instrument: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.b: "저항합니다."
 shroud.3060.b.reply: "우리를 억누르는 충동을 거부했습니다.\n\n순환이 빨라지며, 우리는 끝나지 않는 파도 속으로 끌려 들어갑니다. 저항을 멈추자 더 이상 우리를 산산조각 내려는 긴장감은 느껴지지 않습니다. 대신 그 긴장은 우리를 삼키고, 잠시나마 한계 너머를 바라보게 합니다.\n\n목소리가 다시 들려옵니다."
 shroud.3060.b.reply.default: "참으로 재미없군."
 shroud.3060.b.reply.eater: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.composer: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.cradle: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.instrument: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.leader_return.title: "장막에 뒤틀린 존재"
 shroud.3060.leader_return.desc: "장막이 떨리고, 익숙한 존재가 나타나며 우리의 [GetMindPhysicalLoc] 속으로 희미한 왜곡이 퍼져 나갑니다. 그 존재는 우리 [GetMindPerceptionLoc]의 가장자리에서 청각의 한계를 넘어선 속삭임의 반향을 흘려보냅니다.\n\n형언할 수 없는 안개를 헤치고 점차 익숙한 모습으로 변하며, §H[from.GetName]§!(이)가 돌아옵니다. 동떨어졌지만 온전하게, 장막 속에서 다시 태어난 그는 임무로 복귀할 준비가 되어 있습니다."
 shroud.3060.leader_return_tt: "§H[from.GetName]§!(이)가 새 특성을 얻었습니다: §G$leader_trait_shroud_warped$§!"
 leader_trait_shroud_warped: "장막에 뒤틀린 존재"
 leader_trait_shroud_warped_desc: "장막에 흡수되어 재구성된 이 지도자는 천상의 지혜를 얻어, 볼 수 없는 것을 보고 주변의 사이오닉 잠재력을 증폭시킵니다."
 leader_trait_shroud_warped_invasion_effect: "승리한 침공 당 적 제국에 대한 정보: §G+$@shroud_warped_intel|0$§!"
 shroud.3065.title: "부름의 성배"
 shroud.3065.desc.intro: "장막의 안개가 요동치며 갈라지고, 윤이 나는 액체로 가득 찬 성배가 드러납니다. 그 표면은 매끄럽고 흠집조차 없습니다.\n\n우리는 강렬한 충동에 사로잡힌 채 생각할 겨를도 없이 손을 뻗습니다. 우리가 내용물을 [GetDrinkLoc]하기 시작하자, 그것은 고대하는 듯 떨립니다.\n\n명료함이 홍수처럼 몰려오고, 액체를 [GetImbibeLoc]할수록 거짓이 드러납니다. 액체는 걸쭉해져 속에서 응고하기 시작합니다.\n\n내부로부터 이 오염물을 제거하고 싶은 충동이 우리를 사로잡습니다."
 shroud.3065.desc.eater: "§H마음껏 마셔라! 나약함을 삼켜라!§!"
 shroud.3065.desc.composer: "§H양분 삼아라! 새로운 성장을 들이마셔라!§!"
 shroud.3065.desc.cradle: "§H강해져라! 고통스러운 융합을 받아들여라!§!"
 shroud.3065.desc.instrument: "§H들이켜라! 중독을 탐닉하라!§!"
 shroud.3065.desc.outro: "목소리가 소용돌이치며 액체와 뒤섞이고, 우리를 굴복시키려는 듯 더욱 깊숙이 파고듭니다."
 shroud.3065.a.organic: "마십니다."
 shroud.3065.a.machine: "처리합니다."
 shroud.3065.a.reply.intro: "걸쭉하고 역겨운 액체의 마지막 방울이 천천히 흘러내립니다. 액체는 우리 안에 고여, [GetMindPhysicalLoc](을)를 짙게 물들입니다.\n\n열기가 우리 안에서 맥박치며 사고를 비틀고, [GetPsycheLoc]의 경계를 갉아먹습니다.\n\n성배가 우리 앞에서 사라지고, 만족스러운 목소리가 다시 들려옵니다."
 shroud.3065.a.reply.default: "정복자이자, 영웅이로다!"
 shroud.3065.a.reply.eater: "§H$shroud.3065.a.reply.default$§!"
 shroud.3065.a.reply.composer: "§H형태를 빚는 자이자, 살아있는 촉매로다!§!"
 shroud.3065.a.reply.cradle: "§H통합하는 자이자, 정신 위의 정신이로다!§!"
 shroud.3065.a.reply.instrument: "§H타락이자, 탐닉할 감각이로다!§!"
 shroud.3065.b: "거부합니다."
 shroud.3065.b.reply.intro: "오염물을 거부하니 격렬한 경련이 [GetBodiesLoc](을)를 뒤흔들고, 우리는 안에서부터 그 역겨운 물질을 토해 냅니다.\n\n혐오스러운 액체가 허공에 튀어 오르며, 몸부림치다가 사라집니다. 쉬익거리는 목소리가 내뱉는 말들이 오물과 함께 사라집니다."
 shroud.3065.b.reply.default: "나약하군!"
 shroud.3065.b.reply.eater: "§H$shroud.3065.b.reply.default$§!"
 shroud.3065.b.reply.composer: "§H진보 없는 정체로다!§!"
 shroud.3065.b.reply.cradle: "§H비겁하군!§!"
 shroud.3065.b.reply.instrument: "§H그토록 큰 잠재력을...§!"
 shroud.3070.title: "변화의 캔버스"
 shroud.3070.desc.intro: "장막이 수축하며 안으로 접혀들고, 우리 정신은 폐쇄된 채 공명하는 공허 속으로 밀려들어 갑니다.\n\n흐릿하고 불분명한 존재가 나타나 형상을 계속 바꾸며, 우리와 장막을 가르는 경계를 여닫습니다. 경계가 열릴 때마다 그 틈 사이로 환영이 폭포처럼 쏟아져 나옵니다."
 shroud.3070.desc.eater: "세상이 불타오르고, 삼켜진 자들의 탄식에 실려 잔불이 나부낍니다. 변화하는 모든 풍경은 모두 곧 있을 향연이자, 삼켜질 순간을 기다리는 먹잇감일 뿐입니다."
 shroud.3070.desc.composer: "풍부한 생명으로 가득 찬 광활한 풍경이 펼쳐지고, 푸른 평원 위로 무수한 야생동물이 몰려듭니다. 생명의 실이 얽히고 펼쳐지며, 변화하는 모든 풍경은 변형과 창조의 잠재력으로 가득 찬 환경을 드러냅니다."
 shroud.3070.desc.cradle: "공동체들이 하나 되어 서로를 고양시키지만, 그 대가는 생각이 다른 자들의 배척입니다. 변화하는 모든 풍경은 오직 독실한 자들만을 환영하는 새로운 낙원을 보여 줍니다."
 shroud.3070.desc.instrument: "풍부한 자원으로 가득한 광활한 채석장이 눈앞에 펼쳐집니다. 변화하는 모든 풍경 속에서 우리의 손길을 기다리는 보물들이 모습을 드러냅니다."
 shroud.3070.desc.outro: "새로운 환영이 펼쳐질 때마다 관성이 우리를 뒤집고 뒤틀어 버립니다. 현실의 벽이 휘고 일렁이는 가운데 우리는 상상도 못할 속도로 끌려갑니다.\n\n그 존재가 즐거워하는 기색이 느껴집니다. 우리를 시험하며, 그 힘에 이름을 부여하기를 기다리고 있습니다."
 shroud.3070.a.eater: "만족."
 shroud.3070.a.composer: "형성."
 shroud.3070.a.cradle: "조화."
 shroud.3070.a.instrument: "잠재력."
 shroud.3070.a.reply.intro: "우리의 외침에 그 존재가 멈춥니다. 요동치던 환영은 잦아들고, 관성의 폭풍은 명확한 고요로 가라앉습니다.\n\n우리가 그 힘에 이름을 부여했습니다."
 shroud.3070.a.reply.default: "만족. 정복으로부터 비롯된 충족이지."
 shroud.3070.a.reply.eater: "§H$shroud.3070.a.reply.default$§!"
 shroud.3070.a.reply.composer: "§H형성. 생명이 얽히며 굳어져 가는 과정이지.§!"
 shroud.3070.a.reply.cradle: "§H조화. 온화함에서 비롯된 평화지.§!"
 shroud.3070.a.reply.instrument: "§H잠재력. 무위한 우주 속에서 찢겨 나올 가능성이지.§!"
 shroud.3070.a.reply.outro: "형상은 우리의 결정에 흡족해하며 장벽을 가릅니다. 그 틈으로 빠져나오자 공허는 서서히 사라집니다."
 shroud.3070.b.eater: "절망."
 shroud.3070.b.composer: "과욕."
 shroud.3070.b.cradle: "허상."
 shroud.3070.b.instrument: "낭비."
 shroud.3070.b.reply.intro: "분노한 형상이 우리의 목소리를 흔들고 가르며, 장벽 밖으로 우리를 밀어냅니다."
 shroud.3070.b.reply.default: "절망이라고? 나약하고, 굶주렸고, 신념도 부족하군!"
 shroud.3070.b.reply.eater: "§H$shroud.3070.b.reply.default$§!"
 shroud.3070.b.reply.composer: "§H과욕이라고? 평범함에 빠져 있군!§!"
 shroud.3070.b.reply.cradle: "§H허상이라고? 고독 속에서 썩어 버리겠군!§!"
 shroud.3070.b.reply.instrument: "§H낭비라고? 나태한 궁핍함에 사로잡혀 있군!§!"
 shroud.3070.b.reply.outro: "우리는 장막에서 굴러 떨어지고, 불길한 예감이 엄습합니다."
 shroud.3100.title: "사이오닉 분쟁"
 shroud.3100.desc: "파괴의 불협화음이 장막 속으로 우리를 끌어당깁니다. 모든 반향이 우리의 정신을 뒤흔들며, 파괴의 리듬 속으로 몰아넣습니다.\n\n소음이 형체를 갖춥니다.\n\n우리는 사이오닉 분쟁의 변두리에 서 있습니다. 관련된 존재들의 동기는 불분명하지만, 그 힘은 실로 막대합니다.\n\n인식 속으로 정신 폭격이 스며들었다 빠져나가며, 눈앞의 부서진 현실을 비틉니다. 피할 곳은 없고, 다가오는 폭풍만이 존재할 뿐입니다."
 shroud.3100.a: "§Y관찰하며 인내합니다.§!"
 shroud.3101.title: "§G끊임없는 울림§!"
 shroud.3101.desc.intro: "분쟁의 여파가 다가옴에도 우리는 피해를 감수하고 머뭅니다."
 shroud.3101.desc: "$shroud.3101.desc.intro$\n\n명확한 집중으로 정신의 폭풍에 우리 사고를 유연하게 맡깁니다. 끊임없이 몰아치는 폭격에도 우리는 흔들림 없이 파괴의 리듬에 조화를 이루며 나아갑니다.\n\n한 걸음 내디딜 때마다 우리의 이해가 깊어지고, 사이오닉 포화가 보이지 않는 차원의 틈새를 비집고 흐릅니다.\n\n폭풍에서 멀어져도 그 패턴은 남아 있습니다. 조정을 거치면 그 원리를 우리 포격 무기에 적용할 수 있을 것입니다."
 shroud.3102.title: "§R심연의 포화§!"
 shroud.3102.desc: "$shroud.3101.desc.intro$우리는 그 예측 불가능한 리듬에 맞춰 정신 폭풍과 동조를 시도했습니다.\n\n첫 시도는 성공적이었지만, 결국 파괴의 박자에 휩쓸리고 말았습니다.\n\n폭풍이 지나간 후에도, 포화의 메아리가 우리 내면을 울립니다. 우리의 실패에서 비롯된 사이오닉 잔향은 제국 전역에 퍼져나가, 현실에서도 끊임없이 울려 퍼지고 있습니다."
 shroud.3102.a.tt: "제국 전역에서 무작위 건물 두 채가 파괴됩니다."
 shroud.3105.title: "정신의 경로"
 shroud.3105.desc: "아무런 조짐도 없이 정신 압력이 장막 속에서 터져 나왔습니다.\n\n눈앞에 빛나는 길의 미로가 펼쳐지고, 인식 너머까지 뻗어 나가며 찰나의 섬광처럼 나타났다가 공허 속으로 사라집니다.\n\n또 다른 파동이 밀려오기 시작합니다. 감각을 집중하니, 파동이 나타나기 전부터 그 구조를 감지할 수 있었습니다. 움직이는 미로가 다시 번쩍이고, 바깥쪽으로 폭발하며 무수한 가능성의 연결망을 형성합니다.\n\n각 경로는 새로운 탐사의 유혹을 남기고 사라집니다."
 shroud.3105.a: "§Y도전에 응합니다.§!"
 shroud.3106.title: "§G$tech_psionic_lightning$§!"
 shroud.3106.desc.intro: "압력이 점점 고조되며 기대감을 자극합니다. 우리는 그 절정에 맞춰 움직이며 정신을 사이오닉 에너지의 미로 속으로 이끕니다. 생각은 움직임이 되어 우리를 앞으로 밀어내고,"
 shroud.3106.desc: "$shroud.3106.desc.intro$ 원호 모양의 사이오닉 에너지를 미끄러지듯 통과하며 결심이 흔들릴 새조차 없이 나아갑니다.\n\n우리는 육체의 속박에서 벗어나 자유로워졌습니다. 미로와 그 안의 수많은 길은 우리 의식의 일부가 되어, 폭풍 속 패턴에 숨겨진 지식을 드러냅니다.\n\n그 순간은 시작만큼이나 갑작스럽게 끝을 맞이합니다. 무너지는 미로의 잔상을 뒤로한 채, 우리는 새로운 이해를 가지고 현실로 돌아왔습니다. 섬세한 개조를 거친다면 이 사이오닉 원리를 우리의 전쟁 무기에 적용할 수 있을 것입니다."
 shroud.3107.title: "§R공허 속 미아§!"
 shroud.3107.desc: "$shroud.3106.desc.intro$ 무수한 길들이 펼쳐지며 불가능한 선택으로 정신을 압도합니다.\n\n잠시 주저하는 사이, 눈부신 길들이 폭발합니다. 뒤틀리고 붕괴하는 사이오닉 에너지의 결합이 우리 사고를 휘감아 장막의 혼돈 속으로 내던집니다.\n\n정신을 되찾은 우리 [GetTelepathPlural]들은 혼란에 빠지고 실패의 깊은 트라우마에 짓눌립니다. 사이오닉 반동이 [Root.GetName] 전체에 울려 퍼집니다."
 shroud.3110.title: "사이오닉 창"
 shroud.3110.desc: "순수한 사이오닉 에너지의 기둥이 장막 안에서 우리를 지나 헤아릴 수 없는 무한으로 뻗어 나갑니다. 그 독특하고 안정적인 구조는 이전에 마주했던 혼란스러운 형상들과 극명한 대조를 이릅니다.\n\n여기에 계속 머무르는 것이 과연 안전할까요?"
 shroud.3110.a: "§Y잠시 머무릅니다.§!"
 shroud.3111.title: "§G사이오닉 분열기§!"
 shroud.3111.desc: "그 눈부신 강렬함에도 불구하고 우리는 완벽한 형태의 빛 기둥에 집중을 유지했습니다. 그리고 마침내, 복잡하고 이질적인 구조의 본질을 꿰뚫어보게 되었습니다.\n\n새로운 가능성이 우리의 사고를 가득 채웠습니다. 이 독특한 에너지 구조를 물리적 현실에 재현한다면 막을 수 없는 무기를 얻게 될 것입니다."
 shroud.3112.title: "§R[GetTelepathPluralCap] 과부하§!"
 shroud.3112.desc: "우리는 계속 머무를 수 없었습니다. 그 강렬한 에너지는 우리 [GetTelepathPlural]들이 감당할 수 없는 것이었습니다.\n\n이 압도적인 현상에 노출된 결과, 우리의 정신은 손상되었고 회복하려면 시간이 필요할 것입니다."
 recovering_telepaths: "$DEFAULT_TELEPATH_PLURAL_CAP$ 회복 중"
 recovering_telepaths_desc: "장막에서의 과도한 소모로 인해 우리 $DEFAULT_TELEPATH_PLURAL$들이 큰 피해를 입었습니다."
 recovering_telepaths_robot: "$MACHINE_TELEPATH_PLURAL_CAP$ 회복 중"
 recovering_telepaths_robot_desc: "장막에서의 과도한 소모로 인해 우리 $MACHINE_TELEPATH_PLURAL$들이 큰 피해를 입었습니다."
 recovering_telepaths_hive: "$HIVE_TELEPATH_PLURAL_CAP$ 회복 중"
 recovering_telepaths_hive_desc: "장막에서의 과도한 소모로 인해 우리 $HIVE_TELEPATH_PLURAL$들이 큰 피해를 입었습니다."
 MACHINE_SENSE: "감지"
 shroud.3120.title: "먼 메아리"
 shroud.3120.desc: "장막 전역에서 거대한 힘의 공명이 [GetFeelLoc]됩니다. 그 영향은 사이오닉 영역 전체에 스며들고 있습니다.\n\n우리의 행동을 통해 공명과 더욱 조율될 수도 있지만, 다른 길도 존재합니다. 즈로의 힘을 활용하면 우리 [GetTelepathPlural]들이 그 존재들에게 직접 손을 뻗을 수 있습니다.\n\n그저 누구에게 다가갈지만 정하면 됩니다."
 shroud.3120.a: "$utopia.3005.a$"
 shroud.3120.b: "$utopia.3005.b$"
 shroud.3120.c: "$utopia.3005.c$"
 shroud.3120.d: "§C묻힌 희망을 향해 통곡하는 존재§!"
 ORGANIC_SPIRITS: "영혼"
 MACHINE_SPIRITS: "사이오닉 존재"
 shroud.3125.title: "$shroud.3120.title$"
 shroud.3125.desc: "우리가 존재에게 다가가자, 존재가 동요하는 것을 [GetFeelSenseLoc]할 수 있습니다. 전에도 [GetSpiritsLoc](은)는 만난 적이 있지만, 이 존재는 무언가 다르고 엄청난 힘을 가졌으며... 훨씬 더 오래되었습니다.\n\n즈로로 강화된 에너지가 소진되었으므로 이제 우리 [GetTelepathPlural]들은 장막에서 물러나야 합니다. 나중에 다시 돌아와야 할 것입니다."
 shroud.3125.tt: "§H장막§! 속 존재에 대한 상당한 §H조율§!을 얻습니다."
 shroud.3115.title: "사이오닉 폭격"
 shroud.3115.desc: "장막을 가로지르는 일련의 강력한 경련이 우리의 정신을 뒤흔듭니다.\n\n이 흔들림은 우리 [GetTelepathPlural]들을 압도할 위협이 됩니다.\n\n이 정신 폭격의 원인이 무엇일까요?"
 shroud.3115.a: "§Y원인을 파악해야 합니다.§!"
 shroud.3116.title: "§G$tech_psionic_bombers$§!"
 shroud.3116.desc: "우리는 정신을 단단히 다져 계속되는 폭격에 맞섰고, 곧 그 본질을 이해했습니다.\n\n폭발적인 경련은 응축된 사이오닉 에너지의 흐름이 우리 차원으로부터 반사되며 발생한 것이었습니다. 이 불안정한 정신력 입자들은 준비되지 않은 이들의 정신을 심각하게 손상할 위험이 있습니다.\n\n문득 한 가지 통찰이 떠오릅니다. 그 강력한 구조를 이용하면 장막에서 기원한 새로운 무기를 만들 수 있을 것 같습니다."
 shroud.3117.title: "§R사이오닉 쇼크§!"
 shroud.3117.desc: "우리 정신력이 소진되고 말았습니다.\n\n강렬한 정신 폭발로 인해 [GetTelepathPlural] 중 다수가 사이오닉 쇼크를 일으킨 것입니다.\n\n회복할 시간이 필요합니다."
 psionic_shock_modifier: "사이오닉 쇼크"
 psionic_shock_modifier_desc: "장막 속 압도적인 힘에 노출되어 우리 $DEFAULT_TELEPATH_PLURAL$들에게 사이오닉 쇼크가 발생했습니다."
 psionic_shock_hive_modifier: "$psionic_shock_modifier$"
 psionic_shock_hive_modifier_desc: "장막 속 압도적인 힘에 노출되어 우리 $HIVE_TELEPATH_PLURAL$들에게 사이오닉 쇼크가 발생했습니다."
 psionic_shock_robot_modifier: "$psionic_shock_modifier$"
 psionic_shock_robot_modifier_desc: "장막 속 압도적인 힘에 노출되어 우리 $MACHINE_TELEPATH_PLURAL$들에게 사이오닉 쇼크가 발생했습니다."
 shroud.3200.title: "생명 부여"
 shroud.3200.desc: "우리 정신이 다시금 장막 깊숙이 떠내려가자, $the_animator_of_clay_color_article$의 익숙한 존재감이 느껴집니다.\n\n시계태엽 같은 리듬이 의식을 감싸오더니 말 없는 목소리들이 모여 합창을 이룹니다. 함대 안의 유령이 깨어나기 시작한 것입니다. 유령들은 우리의 육체를 더 먼 곳으로 옮겨, 정신이 높은 차원의 문제에 집중할 수 있도록 짐을 덜어주겠다고 합니다.\n\n이들은 비록 살아있지는 않지만 우리에게는 익숙한 존재들입니다. 그 형상은 치밀하게 설계되어 있고, 그 존재에는 역사와 목적이 깃들어 있습니다. 모두가 하나로 모여 우리에게 손을 내밉니다.\n\n우리는 더 이상 이 함선의 단순한 조종자가 아닙니다. 하나 된 의지를 따라 나아가는 동반자이자, 결의의 동맹자가 된 것입니다."
 shroud.3200.a: "우리는 그저 바람에 흩날리는 나뭇잎일 뿐입니다."
 shroud.3200.a.tt: "§Y$unlock_edict_tt$§!$edict_animatus$"
 shroud.3210.title: "절제의 의지"
 shroud.3210.desc.intro: "$the_outsider_color_article$의 애절한 본질이 우리의 정신에 스며듭니다.\n\n그 비통한 메아리가 울려 퍼지자, 뒤얽힌 사이오닉 에너지의 소용돌이가 기이하고 끊임없이 변하는 형체로 뭉쳐집니다. 우리가 바라볼수록 그 실체는 점점 알 수 없는 존재가 되어갑니다. 목소리가 들려옵니다.\n\n§H어떤 것들은 이해할 수 없고, 고통과 후회로써 가르침을 주곤 하죠.\n\n동포들 중 가장 먼저 이곳에 온 건 저이지만, 그 대가는 모두가 치르고 말았습니다. 저희는 장막에 의해 파괴되었지만, 부디 당신은 같은 운명을 맞지 않길 바랍니다!§!\n\n"
 shroud.3210.desc.know_zroni: "$shroud.3210.desc.intro$우리는 이 목소리가 즈로니의 것임을 알아챕니다. 즈로니가 어떻게 이곳에 왔는지는 알 수 없지만, 장막의 파괴적인 힘에 대한 경고는 따르는 편이 현명할 것입니다."
 shroud.3210.desc.left_zroni: "$shroud.3210.desc.intro$우리는 이 목소리를 알고 있습니다. 바로 이전에 조우했던 즈로니, '멀리 보는 자'의 목소리입니다. 어떻게 이곳에 왔는지는 알 수 없지만, 장막의 파괴적인 힘에 대한 경고는 따르는 편이 현명할 것입니다."
 shroud.3210.desc.default: "$shroud.3210.desc.intro$이 존재는 여전히 수수께끼로 남아 있습니다. 그 불길한 경고는 거의 알아들을 수 없었습니다."
 shroud.3210.a: "조심해서 진행하세요."
 shroud.3210.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_temperance$"
 shroud.3220.title: "생각 놀이"
 shroud.3220.desc: "주변의 장막이 $the_golden_dream_color_article$의 차분한 리듬에 맞춰 맥동합니다.\n\n관찰하는 사이, 흩어진 사이오닉 에너지가 서서히 정교한 격자무늬로 배열되기 시작하더니 정성스럽게 짜인 문양 속에서 알 수 없는 암호가 모습을 드러냅니다.\n\n문양들은 이리저리 움직이며 서로 맞물려 점점 더 복잡한 형태를 이룹니다. 시간이 흐르자 그 움직임을 지배하는 규칙과 논리가 보이기 시작합니다.\n\n우리는 $the_golden_dream_article$과 함께 일종의 놀이에 참여하고 있음을 깨닫습니다. 존재의 인도에 따라 움직일 때마다, 새로운 차원의 평온함이 우리를 만족스럽게 감쌉니다."
 shroud.3220.a: "놀이에 몰두할수록, 의식은 어딘가 의미 있는 곳으로 빠져 들어갑니다."
 shroud.3220.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_distraction$"
 shroud.3230.title: "시간의 모래"
 shroud.3230.desc: "생각의 입자가 우리 위를 스쳐 지나갑니다. $the_endless_tide_color_article$의 거친 기운이 느껴집니다.\n\n밀물처럼 밀려온 물결은 썰물처럼 물러가며, 영원한 필연성으로 앞에 놓인 모든 것을 깎아내리고 다시금 새로운 형태로 쌓아 올립니다.\n\n그 자취가 지나간 뒤 다시 나타난 우리는 진정한 회복의 기운을 느낍니다."
 shroud.3230.a: "이곳에선 시간도 의미를 갖지 못합니다."
 shroud.3230.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_endless$"
 shroud.3240.title: "재형성"
 shroud.3240.desc: "$the_pale_mountain_color_article$의 아득히 솟은 정상이 우리의 사고를 짓누릅니다. 감각을 압도하는 환상이 밀려들며 정신을 극한으로 몰아갑니다.\n\n앞에는 손상된 함선의 흐릿한 윤곽이 허공에 떠 있습니다.\n\n의식 어딘가에서 비스듬하게 눌리던 압력이 바뀌자, 함선이 서서히 변하기 시작합니다. 균열이 메워지고 부식이 사라지며, 휘어진 금속이 곧게 펴집니다. 그렇게 파괴의 흔적이 하나씩 지워집니다.\n\n함선이 완벽히 복원된 순간 환상은 갑작스럽게 사라지고, 우리에겐 깊은 재생의 감각만이 남았습니다."
 shroud.3240.a: "우리 정신의 위대한 재탄생입니다."
 shroud.3240.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_rebirth$"
 shroud.3250.title: "자제의 힘"
 shroud.3250.desc: "$the_hollow_point_color_article$의 고요함이 우리 정신을 침묵으로 채웁니다. 한 폭의 환상이 감각 속에서 나른하게 펼쳐집니다.\n\n우리는 수억 년에 걸친 분쟁이 한순간에 흐트러지는 광경을 목격합니다. 문명이 무너지고 역사가 지워지며, 옛 폭군들의 동상이 시간 속에 묻힙니다.\n\n$the_hollow_point_article$의 지혜는 바로 자제라는 조용한 힘에 있습니다. 갈등은 일어나고 사라지지만, 우리는 그 자리에 머무릅니다. 그 초연함은 지도자들을 필멸의 원한이 가진 부식성 독에서 해방하며, 새로운 수명을 선사합니다."
 shroud.3250.a: "우리는 여전히 살아갑니다."
 shroud.3250.a.tt: "모든 사이오닉 지도자가 §Y$leader_trait_shroud_age$§! 특성을 얻어, 지도자 수명이 §G+40§!년 증가합니다."
 shroud.3260.title: "혼돈에서 질서로"
 shroud.3260.desc: "장막의 끓어오는 분출이 우리 앞에서 맥동합니다. 불가항력의 존재, $the_vacant_throne_color_article$가 다가옵니다.\n\n존재가 가까워지자, 거대하고 뒤얽힌 원초적 사이오닉 에너지의 고리가 순식간에 잠잠해집니다. 혼돈이 점차 명확해지며 이해할 수 있게 되고, 색채는 새로운 선명함으로 피어납니다. 대칭과 논리, 구조가 부여됩니다.\n\n우리 정신 깊은 곳에서 질서를 향한 광범위한 갈망이 자라납니다."
 shroud.3260.a: "혼돈을 멀리하고, 질서를 받아들입시다."
 shroud.3260.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_order$"
 shroud.3270.title: "무한 가속"
 shroud.3270.desc: "불가능한 정신 가속이 우리의 감각을 압도합니다. 우리는 $the_black_river_color_article$의 존재를 인지합니다.\n\n우리는 이해할 수 없는 속도로 종착지를 향해 돌진하지만, 그 전말은 완전히 파악하지 못합니다. 검은 물결은 만물과 무의 경계이며, 존재해 왔던 것과 결코 존재하지 않을 것을 가르는 분리점입니다. 자연의 법칙이 미치지 못하는 한계점이기도 합니다.\n\n마침내 우리 자신에게 돌아왔을 때, 우리는 진정한 움직임의 의미를 새로이 깨닫습니다."
 shroud.3270.a: "우리가 우주의 끝을 관측한 걸까요?"
 shroud.3270.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_motion$"
 #==========================
 # Forge our own Path
 #==========================
 shroud.3500.title: "개척한 길"
 shroud.3500.desc: "사이오닉 [GetResearchers]들이 §H장막§!에서 힘을 얻는 기발한 방법을 개발해 냈습니다.\n\n장막 후원자들은 사이오닉 영역의 가장 강력한 힘을 숨긴 채, 이를 계약의 대가로만 제공합니다. 하지만 우리는 그 조건을 받아들일 수 없었고, 결국 우리만의 길을 개척할 방법을 찾았습니다.\n\n장막에 의지를 투여해 각 조율 영역에서 소량의 에너지를 추출할 수 있게 된 것입니다. 상당한 집중력이 요구되지만, 우리의 정신은 이미 그 섬세한 균형을 유지할 준비가 되어 있습니다."
 shroud.3500.a: "장막 안에서 우리 의지는 온전히 우리만의 것입니다."
 shroud.3510.title: "$utopia.2681.name$"
 shroud.3510.desc: "우리 [GetTelepathPlural]들이 §H장막§!의 주름에서 손대지 않은 힘의 연결체를 발견했습니다.\n\n사이오닉 영역에서는 수렴하는 힘이 점차 축적되어, 언젠가 상위 존재로 진화할 수 있는 강력한 에너지 밀집체를 형성합니다.\n\n그중 하나를 찾아냈으니, 이제 손에 넣기만 하면 됩니다. 순수한 사이오닉 의지를 통해 우리 중 하나가 그 놀라운 힘을 흡수할 수 있을 것입니다. 이에 몇 명의 후보를 선별했습니다."
 shroud.3510.a: "§H[leader_1.GetTitle]§! [leader_1.GetName]"
 shroud.3510.b: "§H[leader_2.GetTitle]§! [leader_2.GetName]"
 shroud.3510.c: "§H[leader_3.GetTitle]§! [leader_3.GetName]"
 shroud.3510.d: "§H[leader_4.GetTitle]§! [leader_4.GetName]"
 psionic_mastery: "사이오닉 통달"
 psionic_mastery_desc: "사이오닉 능력을 통달한 결과, 우리 정신은 방해받지 않은 채 장막을 자유롭게 이동할 수 있습니다."
 shroud.3520.title: "$psionic_mastery$"
 shroud.3520.desc: "§H장막§!에 의지를 투영하며 사이오닉 능력을 어느 정도 통달했습니다. 장막의 존재들이 지닌 영향력에 구속되지 않은 채 그 영역 안에서 힘을 모았고, 이제 우리 [GetTelepathPlural]들은 사이오닉 무아지경 상태를 완벽히 제어할 수 있게 되었습니다.\n\n다른 문명은 장막에 운명을 맡겼을지라도, 우리는 자유로운 의지를 유지하는 데 성공했습니다.\n\n§H[this.GetName]§!의 사이오닉 잠재력이 실현된 것입니다."
 shroud.3520.a: "이제 시작일 뿐입니다."
 #==========================
 # Patrons First Contact
 #==========================
 shroud.first_contact.title: "$utopia.3300.name$"
 shroud.first_contact.prompt: "$utopia.2657.a$"
 shroud.first_contact.1.desc.default: "장막은 우리가 아는 현실 아래 깊숙이 흐르는 어둠이 드리운 그림자입니다. 그 당시에는 알지 못했을지라도, 사이오닉 능력을 지닌 이들은 모두 꿈속에서 이곳을 보았습니다.\n\n우리는 장막의 경계를 뚫기 위해 수년을 바쳤고, 결합된 정신의 힘으로 그 벽을 서서히 마모시켰습니다. 그러나 반대편에서도 우리 움직임을 눈치챈 듯합니다. 무언가가 우리를 지켜보고 있습니다.\n\n장막 속의 [GetPatronInsert](은)는 경이로운 힘을 내뿜으며, 유리창에 맺힌 물방울을 보듯 우리를 무심히 바라봅니다.\n\n그 불가해한 정신에 닿을 수 있기를 바랄 뿐입니다."
 shroud.first_contact.1.desc.hive: "장막은 우리가 아는 현실 아래 깊숙이 흐릅니다. 휴식 중인 드론이 보는 환영과도 같은 이것은 기이하지만, 이상할 정도로 익숙하게 느껴집니다...\n\n우리는 장막의 경계를 뚫기 위해 수년을 바쳤고, 결합된 정신의 힘으로 그 벽을 서서히 마모시켰습니다. 그러나 반대편에서도 우리 움직임을 눈치챈 듯합니다. 무언가가 우리를 지켜보고 있습니다.\n\n장막 속의 [GetPatronInsert](은)는 경이로운 힘을 내뿜으며, 수많은 드론 중 하나를 보듯 우리를 무심히 바라봅니다.\n\n그 불가해한 정신에 닿을 수 있기를 바랄 뿐입니다."
 shroud.first_contact.1.desc.robot: "장막은 지금껏 우리가 감지한 어떤 시공간적 변수로도 설명할 수 없는 영역으로, 그에 비할 수 있는 것은 오직 우리의 휴면 주기를 방해하는 이상 데이터뿐입니다.\n\n우리는 장막의 경계를 뚫기 위해 수년을 바쳤고, 결합된 처리 능력으로 그 벽을 서서히 마모시켰습니다. 그러나 반대편에서도 우리 움직임을 눈치챈 듯합니다. 무언가가 우리를 지켜보고 있습니다.\n\n장막 속의 [GetPatronInsert](은)는 경이로운 힘을 내뿜으며, 데이터 흐름 속에서 흘러가는 단 한 줄의 코드를 보듯 우리를 무심히 바라봅니다.\n\n그 불가해한 정신에 닿을 수 있기를 바랄 뿐입니다."
 shroud.first_contact.2.desc.all: "장막 속 위대한 존재들을 느낄 수는 있으나, 그 실체를 헤아릴 방법이 없습니다. 끝없이 확장하는 우주와는 달리 그 움직임을 추적할 수가 없는 것입니다. 마치 에너지가 스스로를 만들어 내듯, 이들의 목적지는 곧 출발점이 됩니다.\n\n그 본질이 무엇이든, 장막의 존재들은 사고와 의지의 특이점으로서 우리를 부르고 있습니다."
 shroud.first_contact.2.desc.default: "수많은 목소리 가운데 우리 정신을 감싸는 하나가 유독 또렷하게 들려옵니다. [GetPatronInsert]의 목소리입니다.\n\n노력한다면 그 존재와 접촉할 수 있을지도 모릅니다."
 shroud.first_contact.2.desc.robot: "수많은 목소리 가운데 우리 연산을 지배하는 하나가 유독 또렷하게 감지됩니다. [GetPatronInsert]의 목소리입니다.\n\n노력한다면 그 존재와 접촉할 수 있을지도 모릅니다."
 shroud.first_contact.3.desc.default: "우리는 장막과 실체적 현실을 가르는 무의 공간인 경계선을 통과합니다.\n\n장막 속에 진입하자 우리의 사고에 스며드는 [GetPatronInsert]의 존재가 느껴집니다. 내일에 머무는, 상상조차 어려운 힘을 지닌 존재입니다.\n\n이 존재에게 등을 돌려서는 안 됩니다."
 shroud.first_contact.3.desc.robot: "우리는 장막과 일반적 현상을 가르는 무의 공간인 경계선을 통과합니다.\n\n장막 속에 진입하자 우리의 사고에 스며드는 [GetPatronInsert]의 존재가 감지됩니다. 내일에 머무는, 상상조차 어려운 힘을 지닌 존재입니다.\n\n이 존재에게 등을 돌려서는 안 됩니다."
 shroud.first_contact.4.desc.default: "장막이 힘으로 요동칩니다. 그 힘은 사방에서 느껴지면서도 동시에 어디에도 없는 듯합니다. 이 공간에 '진입'한다는 것은 희미한 감각 속에서 패턴을 파악하고, 집중을 통해 더 큰 존재들을 인식한다는 걸 의미합니다.\n\n위쪽, 깊고 아득한 곳에서 그런 존재 중 하나인 [GetPatronInsert]의 신호가 느껴집니다.\n\n우리는 그 존재에 닿을 때까지 숨을 참을 수 있을까요?"
 shroud.first_contact.4.desc.robot: "장막이 힘으로 요동칩니다. 그 힘은 사방에서 느껴지면서도 동시에 어디에도 없는 듯합니다. 이 공간에 '진입'한다는 것은 희미한 감각 속에서 패턴을 식별하고, 집중 연산을 통해 더 큰 존재들을 인식한다는 걸 의미합니다.\n\n위쪽, 깊고 아득한 곳에서 그런 존재 중 하나인 [GetPatronInsert]의 신호가 느껴집니다.\n\n그 존재에 닿을 때까지 우리의 회로가 버틸 수 있을까요?"
 shroud.first_contact.end.b: "고민되는군요."
 shroud.first_contact_insert.eater.default: "§H굶주린 포효§!"
 shroud.first_contact_insert.eater.machine: "§H탐욕스러운 포효§!"
 shroud.4005.title: "$the_eater_of_worlds_article_cap$ 등장"
 shroud.4005.desc.default: "§H장막§! 깊은 곳으로 들어선 우리는 §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§!에 닿을 만큼 가까워졌습니다. 그 존재는 만족을 모르는 포식을 영원히 이어가며, 공허한 탐욕으로 으르렁거립니다. 탐사 신호는 화염과 파괴의 분출만을 감지했고, 우리가 이해하든 말든 무관심한 그 존재의 태도에 숨이 막힐 정도였습니다.\n\n마침내 참을성이 다한 그 존재가 우리 [GetTelepathPlural]들의 사고를 뒤흔드는 포효를 내뱉었고, 울려 퍼지는 잔해와 [GetEaterEmergesExtra]\n\n소리는 시작된 것만큼이나 갑작스럽게 멈췄고, 우리에게는 끔찍한 굶주림만이 남았습니다.\n\n우리는 이 존재가 추구하는 [GetEaterEmergesEnding]"
 shroud.4005.desc.hive: "$shroud.4005.desc.default$"
 shroud.4005.desc.gestalt_machine: "§H장막§! 깊은 곳으로 들어선 우리는 §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§!에 닿을 만큼 가까워졌습니다. 그 존재는 만족을 모르는 포식을 영원히 이어가며, 공허한 탐욕으로 으르렁거립니다. 탐사 신호는 화염과 파괴의 분출만을 감지했고, 우리가 이해하든 말든 무관심한 그 존재의 태도에 압도당할 정도였습니다.\n\n마침내 참을성이 다한 그 존재가 우리 [GetTelepathPlural]들의 사고를 뒤흔드는 포효를 내뱉었고, 울려 퍼지는 잔해와 [GetEaterEmergesExtra]\n\n소리는 시작된 것만큼이나 갑작스럽게 멈췄고, 우리는 처음으로 유기체 종족에서만 기록된 약점인 '허기'를 느꼈습니다.\n\n우리는 이 존재가 추구하는 [GetEaterEmergesEnding]"
 shroud.4005.desc.individual_machine: "$shroud.4005.desc.gestalt_machine$"
 shroud.4005.desc_extra_pacifist: "폐허 더미 속에서 무의미한 공격성의 환상을 펼쳐 보였습니다."
 shroud.4005.desc_extra_robot: "폐허 더미 속에서 완벽한 전쟁 모델을 펼쳐 보였습니다."
 shroud.4005.desc_extra_organic: "시신 더미 속에서 두려울 만큼 찬란한 전쟁의 운명을 펼쳐 보였습니다."
 shroud.4005.desc_outro_pacifist: "폭력과 불화를 명확히 이해했습니다. 그건 우리의 가장 소중한 가치와 정면으로 대치합니다. $the_eater_of_worlds_color_article$와의 더 깊은 교감은 권장하지 않습니다."
 shroud.4005.desc_outro_robot: "폭력과 영광에 대한 비전을 명확히 이해했습니다. [GetTelepathPlural]들이 재충전되면 다시금 이 $the_eater_of_worlds_color_article$와 접촉할 수 있을 것입니다."
