 shroud.4025.title: "$the_composer_of_strands_article_cap$ 등장"
 shroud.4025.desc.default: "우리는 §H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§!의 향을 따라 §H장막§! 깊은 곳으로 나아갔습니다. 그 존재는 곳곳에 형상과 선율을 남겨 우리를 천천히 초대했습니다.\n\n마침내 그 존재에게 도달했을 때, 우리를 맞이한 것은 활기찬 성계와 기괴하게 뒤틀린 [Root.GetSpeciesAdj]의 모습을 그린 환영이었습니다. 그 품에 안긴 채, 우리는 날카롭게 뒤얽힌 형상들 속에서 길을 잃었습니다.\n\n우리는 실타래를 붙잡아 그 끝을 엮었고, 흩어진 징후들은 이내 패턴으로 드러났습니다. 에너지를 소진한 우리는 그 장엄한 형상과 모습 속에서 황홀경에 잠겼습니다. 이내 그 존재는 침묵 속으로 물러났습니다.\n\n우리는 이 존재가 추구하는 억제되지 않은 성장에 대한 비전을 명확히 이해했습니다. [GetTelepathPlural]들이 회복하면 다시금 이 $the_composer_of_strands_color_article$와 접촉할 수 있을 것입니다."
 shroud.4025.desc.hive: "$shroud.4025.desc.default$"
 shroud.4025.desc.gestalt_machine: "우리는 §H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§!의 분자 흔적을 따라 §H장막§! 깊은 곳으로 나아갔습니다. 그 존재는 곳곳에 형상과 선율을 남겨 우리를 천천히 초대했습니다.\n\n마침내 그 존재에게 도달했을 때, 우리를 맞이한 것은 활기찬 성계와 기괴하게 뒤틀린 [Root.GetSpeciesAdj]의 모습을 그린 환영이었습니다. 그 품에 안긴 채, 우리는 조화롭지 못하게 뒤얽힌 형상들 속에서 길을 잃었습니다.\n\n우리는 실타래를 붙잡아 그 끝을 엮었고, 흩어진 징후들은 이내 패턴으로 드러났습니다. 에너지를 소진한 우리는 그 놀라운 데이터의 분석을 시작했습니다. 이내 그 존재는 침묵 속으로 물러났습니다.\n\n우리는 이 존재가 추구하는 억제되지 않은 성장에 대한 비전을 명확히 이해했습니다. [GetTelepathPlural]들이 재충전되면 다시금 이 $the_composer_of_strands_color_article$와 접촉할 수 있을 것입니다."
