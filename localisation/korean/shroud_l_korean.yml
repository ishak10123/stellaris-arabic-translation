 shroud.4971.desc.2.2: "은하계 전체에 퍼져 나갔습니다. 최후의 성계마저 오라의 침식에 굴복하자, 헤아릴 수 없는 에너지의 폭발이 일어났습니다."
 shroud.4971.desc.2.3: "마치 현실의 다른 차원에서 온 것처럼, 이 거대한 파멸의 힘이 모든 것을 파괴했습니다."
