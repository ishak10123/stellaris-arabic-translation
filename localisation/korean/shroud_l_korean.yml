 #==========================
 # Shroud
 THE_SHROUD_TITLE: "장막"
 SHROUD_HEADER_INSIGHT_TT: "$SHROUD_HEADER_TT$\n\n일정량의 §H조율§!을 축적해 장막 속 존재의 호의를 얻음으로써 후원자들을 발견하십시오."
 SHROUD_HEADER_TT: "§H장막§!은 다양한 존재의 터전입니다."
 SHROUD_HEADER_DESC: "장막은 끊임없이 변화하고 순환하는 개념적 영역으로, 각 영역에는 강대한 존재가 거하고 있습니다. 전해지는 이야기에 따르면, 물질계에서 행한 행동이 비물질계에서의 위치에 영향을 준다고 합니다."
 DELVE: "탐사"
 COUNTRY_ON_SHROUD_PLANE_INSIGHT_TT: "§H장막 내 위치§!\n§H$PLAYER_COUNTRY$§!(과)와 장막의 동조 수준을 나타내며, 이는 장막 속 존재들과 나눈 §H조율§!에 따라 결정됩니다."
 COUNTRY_ON_SHROUD_PLANE_TT: "§H장막 내 위치§!\n§H$PLAYER_COUNTRY$§!(과)와 장막의 동조 수준을 나타냅니다."
 COUNTRY_ON_SHROUD_PLANE_TT_INPUT: "§G클릭해서 가장 높은 조율을 이룬 존재 선택§!"
 END_CYCLE_SITUATION_TT: "§H$SITUATION_NAME$§!\n§G좌클릭해서 §Y$SITUATION_NAME$§! 상황 확인§!"
 SHROUD_BACK_TT_INPUT: "§G클릭해서 전체 장막 화면으로 복귀§!"
 # Attunement
 ATTUNEMENT_VALUE: "§H조율§!: $ATTUNEMENT$"
 ATTUNEMENT_VALUE_FULL_SIMPLE: "$ATTUNEMENT$/$MAX_ATTUNEMENT$"
 ATTUNEMENT_VALUE_FULL: "§H조율§!: £attunement£§Y$ATTUNEMENT$/$MAX_ATTUNEMENT$§!"
 ATTUNEMENT_GAIN_LAST_MONTH: "지난달 변화: $VALUE|0=+$"
 ATTUNEMENT_MODIFIER: "$t$$MODIFIER$: $ATTUNEMENT$\n"
 MAX_ATTUNEMENT_PATRON_MODIFIER: "$t$조율 한도 도달: §Y$ATTUNEMENT$§!\n"
 MIN_ATTUNEMENT_PATRON_MODIFIER: "$t$최저 한도 도달: +§Y$ATTUNEMENT$§!\n"
