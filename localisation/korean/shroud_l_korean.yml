 councilor_grand_vessel_desc: "$TITLE$은 자동화 시설의 효율 극대화를 책임지며, 가장 큰 격납고 중 하나를 사용할 특권을 가집니다."
 # Executive Vessel
 councilor_executive_vessel: "경영 관리 유닛"
 councilor_executive_vessel_female: "$councilor_executive_vessel$"
 councilor_executive_vessel_desc: "$TITLE$은 자동화 시설의 수익성 극대화를 책임지며, 가장 큰 격납고 중 하나를 사용할 특권을 가집니다."
