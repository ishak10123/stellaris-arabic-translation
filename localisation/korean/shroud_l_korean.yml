 civic_tooltip_not_superstitious_beliefs: "['concept_superstitious_beliefs_civics'] 사회 제도를 보유하지 않음"
 civic_superstitious_beliefs_desc_common: "운명을 좌우하는 보이지 않는 힘과 조화를 이루려면 중대한 결정을 내리기 전에 반드시 적절한 의식을 거행해야 합니다."
 civic_superstitious_beliefs_common_effects: "['edict:galactic_dowsing',$edict_galactic_dowsing$]을 사용할 수 있게 됩니다.\n13년마다 ['concept_sb_cycle']가 변화합니다.\n주기적으로 행운 이벤트가 발생해 제국에 유리하거나 불리한 효과를 줍니다."
 civic_superstitious_beliefs: "미신"
 civic_superstitious_beliefs_desc: "이 사회는 난해한 패턴 식별과 주기적 이상 분석을 통해 미래를 내다보는 의식을 발견했다고 주장합니다. $civic_superstitious_beliefs_desc_common$"
 civic_superstitious_beliefs_effects: "\n$t$- £job_priest£ $job_priest_plural$를 £job_superstitious_beliefs_priest£ $job_superstitious_beliefs_priest_plural$로 대체합니다.\n$t$- £job_high_priest£ $job_high_priest_plural$를 £job_superstitious_beliefs_high_priest£ $job_superstitious_beliefs_high_priest_plural$로 대체합니다.\n$civic_superstitious_beliefs_common_effects$"
 civic_machine_superstitious_beliefs: "패턴 탐색기"
 civic_machine_superstitious_beliefs_desc: "이 기계 제국은 난해한 패턴 식별과 주기적 이상 분석을 통해 미지를 파헤칠 수 있다고 주장합니다. 중대한 결정을 내리기 전에는 최상의 예측 결과를 끌어낼 수 있도록 반드시 천체 정렬 분석을 진행해야 합니다."
 civic_machine_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_hive_superstitious_beliefs: "황도 연결체"
 civic_hive_superstitious_beliefs_desc: "이 집단은 난해한 패턴 식별과 주기적 이상 분석을 활용해 미래를 내다보는 의식을 발견했다고 주장합니다. $civic_superstitious_beliefs_desc_common$"
 civic_hive_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_corporate_superstitious_beliefs: "운세 컨설팅"
 civic_corporate_superstitious_beliefs_desc: "이 기업은 난해한 패턴 식별과 주기적 이상 분석을 활용해 미래를 내다보는 의식을 발견했다고 주장합니다. 이상적인 천체 정렬의 달성 수준을 나타내는 핵심 성과 지표를 잠재적인 이익 및 손실과 함께 평가해 산출을 극대화합니다."
 civic_corporate_superstitious_beliefs_effects: "\n$t$- £job_priest£ $job_priest_plural$를 £job_superstitious_beliefs_priest_corporate£ $job_superstitious_beliefs_priest_corporate_plural$로 대체합니다.\n$t$- £job_high_priest£ $job_high_priest_plural$를 £job_superstitious_beliefs_high_priest_corporate£ $job_superstitious_beliefs_high_priest_corporate_plural$로 대체합니다.\n$civic_superstitious_beliefs_common_effects$"
 # Twisted Experimenters
 civic_twisted_experimenters: "실험적 판결"
 civic_twisted_experimenters_desc: "이 사회에서는 사법 정의의 실현과 탐구 욕구의 충족이 같은 방식으로 달성됩니다. 연구진들은 암흑가에서 붙잡힌 피험체들을 실험대 삼아 가혹한 극비 실험을 진행하며, 그 과정에서 간혹 발생하는 사망자는 진보의 필요 경비로 간주됩니다."
 civic_twisted_experimenters_effects: "완료되면 기술 통찰을 제공하는 ['concept_experimental_testing'] 상황과 함께 시작합니다.\n건설 가능 및 시작 시 보유: £building£ ['building:building_experimentation_chambers_1']\n기계가 아닌 모든 노예는 ['concept_slave_orderly'] 직업을 가질 수 있음\n다음 ['concept_slave_army'] 이용 가능: §Y$abomination_army$§!"
 civic_twisted_experimenters_hive_mind: "의식 교정"
 civic_twisted_experimenters_hive_mind_desc: "이 집단의 일탈자들은 아무런 제약도 받지 않는 선구적인 과학 연구의 실험체로 사용됩니다. 이처럼 문제를 일으킨 드론을 소모성 자산으로 활용해 그 가치를 일부 보존합니다."
 civic_twisted_experimenters_hive_mind_effects: "완료되면 기술 통찰을 제공하는 ['concept_experimental_testing_hive_mind'] 상황과 함께 시작합니다.\n건설 가능 및 시작 시 보유: £building£ ['building:building_experimentation_chambers_1']"
 civic_twisted_experimenters_corporate: "사법적 연구 개발"
 civic_twisted_experimenters_corporate_desc: "이 $gov_megacorporation$은 사법 효율성 강화와 과학 혁신 극대화를 동시에 추진하기 위해 색다른 사업을 실시했습니다. 문제를 일으킨 시민들은 실험 연구 프로젝트에 재배치되어 강도 높은 실험의 피험체로서 기술적 발전에 기여합니다. 사망률 지표는 예상 범위 내로 유지됩니다."
 civic_twisted_experimenters_corporate_effects: "완료되면 기술 통찰을 제공하는 ['concept_experimental_testing_corporate'] 상황과 함께 시작합니다.\n건설 가능 및 시작 시 보유: £building£ ['building:building_experimentation_chambers_1']\n£building£ ['concept_building_carceral_test_facility'] $BRANCH_OFFICE_BUILDING$ 건설 가능\n기계가 아닌 모든 노예는 ['concept_slave_orderly'] 직업을 가질 수 있음\n다음 ['concept_slave_army'] 이용 가능: §Y$abomination_army$§!"
 experimenters_we_will_learn_1: "많은 것을 알아낼 수 있을 것입니다."
 experimenters_we_will_learn_2: "새로운 실험 경로입니다."
 experimenters_we_will_learn_3: "새로운 실험 조건입니다. 기대되는군요."
 experimenters_tragic_lesson_1: "이 참사로 많은 것을 배울 수 있을 것입니다."
 experimenters_tragic_lesson_2: "비극적인 사건이지만, 새로운 실험에 나설 기회이기도 합니다."
 experimenters_tragic_lesson_3: "뼈아픈 교훈과 함께 유용한 데이터를 얻었군요."
 experimenters_ermerging_crime_1: "이러한 환경은 우리 [GetExperimentalEngineerPlural]들에게 새로운 연구를 진행할 많은 기회를 제공할 것입니다."
 experimenters_ermerging_crime_2: "그래도 이 범죄자들을 써서 과학 연구 분야의 활로를 타개할 수 있을 것입니다."
 experimenters_ermerging_crime_3: "이 새로운 상황은 수많은 실험 기회를 제공할 것으로 보입니다."
 experimenters_ermerging_crime_4: "이와 같은 환경은 우리 [GetExperimentalEngineerPlural]들에게 풍부한 실험체를 제공합니다."
 # Secret Societies
 civic_tooltip_not_secret_societies: "['concept_secret_societies_civics'] 사회 제도를 보유하지 않음"
 civic_secret_societies: "비밀 사회"
 civic_secret_societies_desc: "이 사회에서는 극비리에 활동하는 엘리트 집단이 뒷무대에서 복잡한 정치적 관계를 엮어 내, 내정과 다른 행성의 정세를 교묘히 연결합니다."
 civic_secret_societies_effects: "다른 제국과 조우하면 비밀 ['concept_ss_factions']이 등장합니다.\n['concept_proxy_wars']을 유발할 수 있는 상태로 시작합니다.\n$job_bureaucrat_plural_with_icon$(은)는 성공적으로 진행 중인 §Y대리전§!마다 $i_unity$을 생산합니다.\n두 이웃 제국과 ['concept_first_contact'] 상태로 시작합니다.\n§Y$first_contact$§! 후 다른 제국을 상대로 획득하는 $INFILTRATION_LEVEL$: §G+$@secret_society_infiltration_gain|0$§!"
 civic_secret_societies_corporate: "유력 카르텔"
 civic_secret_societies_corporate_desc: "이 $gov_megacorporation$에서 가장 영향력 있는 부서는 초행성적 운영을 극비리에 처리합니다. 이들의 존재는 오직 알 자격이 있는 이들에게만 알려집니다."
 civic_secret_societies_corporate_effects: "다른 제국과 조우하면 비밀 ['concept_ss_factions']이 등장합니다.\n['concept_proxy_wars']을 유발할 수 있는 상태로 시작합니다.\n$job_bureaucrat_plural_with_icon$(은)는 성공적으로 진행 중인 §Y대리전§!마다 $i_unity$을 생산합니다.\n두 이웃 제국과 ['concept_first_contact'] 상태로 시작합니다.\n§Y$first_contact$§! 후 다른 제국을 상대로 획득하는 $INFILTRATION_LEVEL$: §G+$@secret_society_infiltration_gain|0$§!\n£building£ §Y$building_corporate_embassy$§! $megacorp_civic_branch_office_building_effect$"
 shroud.5012.title: "비밀 사회 등장"
 shroud.5012.desc: "우리의 의심이 사실로 드러났습니다. [first_neighbor.GetAdjective](과)와 [second_neighbor.GetAdjective] 문명 모두 공식적인 교신이 시작되기 전에 비공식적인 경로를 통한 접촉이 있었음을 확인한 것입니다.\n\n이제 이 §H세력§!들이 사회의 그림자에서 모습을 드러내며 스스로의 존재를 인정하고 있습니다. §H$pft_the_curtain$§!, §H$pft_the_masquerade$§!, §H$pft_the_grand_dance$§!로 알려진 이 비밀 단체들은 현재 우리에게 공식적인 대화를 요청하고 있습니다.\n\n이들이 원하는 바가 무엇인지, 그리고 그 모든 지식을 어떻게 알게 되었는지는 우리가 결코 완전히 이해하지 못할지도 모릅니다. 이들의 요구에 따라 움직이는 것이 우리에게 가장 유리한 길일 수도 있습니다."
 shroud.5012.a: "막이 오르는군요.."
 shroud.5012.tt: "§Y비밀 사회 세력§!이 곧 등장합니다:\n$t$§H$pft_the_curtain$§!\n$t$§H$pft_the_masquerade$§!\n$t$§H$pft_the_grand_dance$§!"
 shroud.5013.title: "이상한 조우"
 shroud.5013.desc: "우리 사회에는 외교의 이면에서 은밀하게 움직이는 이들이 존재합니다. 이제 우리는 그 영향력이 우리 모성에만 국한되지 않을 거라고 의심하고 있습니다.\n\n최근 막 우주에 진출한 새내기인 우리가 다른 생명체와 놀랍도록 원활히 소통할 수 있었던 것은 절대 단순한 우연이 아닙니다. 이러한 은하적 관계 수립의 뒷무대에서 우리 사회 깊숙이 뿌리내린 여러 비밀 §H세력§!이 암약했음은 명백합니다.\n\n이 세력들에 대해 더 알게 된다면 그림자 속에 숨어 있는 이들 또한 자신의 모습을 드러낼지도 모릅니다."
 shroud.5013.a: "과연 친구일까요, 아니면 적일까요?"
 # Chosen
 civic_ap_blockade_tt: "§R경고: ['concept_psionic_ascension']을 제외한 승격의 길이 전부 차단됩니다.§!"
 civic_chosen: "선택받은 사회"
 civic_chosen_desc: "$civic_ap_blockade_tt$\n\n역사의 서막에서부터 장막의 영향을 받은 이 사회는 강대한 존재와 후원 계약을 맺고 있습니다."
 civic_chosen_effects: "- §I장막 후원자§!와 조우한 상태로 시작합니다.\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_psionic_aura']"
 civic_chosen_effects_additional: "- 장막과의 ['concept_attunement']에 비례해 $i_unity$을 획득합니다"
 civic_hive_chosen: "선택받은 집단"
 civic_hive_chosen_desc: "$civic_ap_blockade_tt$\n\n역사의 서막에서부터 장막의 영향을 받은 이 집단은 강대한 존재와 후원 계약을 맺고 있습니다."
 civic_machine_chosen: "사도 네트워크"
 civic_machine_chosen_desc: "$civic_ap_blockade_tt$\n\n막 발전을 이루기 시작했을 때부터 장막의 영향을 받은 이 기계들은 강대한 존재와 후원 계약을 맺고 있습니다."
 civic_corporate_chosen: "선택받은 경영진"
 civic_corporate_chosen_desc: "$civic_ap_blockade_tt$\n\n설립 초창기부터 신비한 장막의 존재가 내린 은혜 덕분에 큰 성공을 거둔 이 기업은 그 이후로도 계속 후원 계약하에 운영되어 왔습니다."
 civic_corporate_chosen_effects: "$civic_chosen_effects$\n- £building£ §Y$building_psionic_offices$§! $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_chosen: "['concept_chosen_civics'] 사회 제도를 보유하지 않음"
 concept_chosen_civics: "선택받은 사회"
 concept_chosen_civics_desc: "$concept_chosen_civics$ 사회 제도는 다음으로 구성됨\n- ['civic:civic_chosen']$NEW_LINE$- ['civic:civic_hive_chosen']$NEW_LINE$- ['civic:civic_machine_chosen']$NEW_LINE$- ['civic:civic_corporate_chosen']"
 shroud.5105.title: "선택받은 사회"
 shroud.5105.desc: "우리는 언제나 알고 있었습니다... 형언할 수도, 이해할 수도 없는 존재와의 신비한 연결이 존재한다는 사실을.\n\n[This.GetTheChosenP2]\n\n역사가 기록되기 시작된 이래로 그 존재는 늘 우리 곁에 존재해 왔습니다. 우리가 선택받았다는 사실만은 분명하지만... 그 이유는 여전히 알 수 없습니다.\n\n이 [This.GetSensation](을)를 뭐라 불러야 할까요?"
 shroud.5105.desc_p2: "우리의 가장 깊은 의식 속에 그 존재가 자리하고 있다는 것을. 언제나 손이 닿지 않는 곳에 머물며, 우리 마음에 아른거린다는 것을."
 shroud.5105.desc_p2_machine: "가장 복잡한 계산을 행할 때 그 존재가 느껴진다는 것을. 언제나 손이 닿지 않는 곳에 머물며, 우리 회로에 아른거린다는 것을."
 shroud.5105.a: "$the_composer_of_strands_article_cap$"
 shroud.5105.b: "$the_eater_of_worlds_article_cap$"
 shroud.5105.c: "$the_cradle_of_souls_article_cap$"
 shroud.5105.d: "$the_instrument_of_desire_article_cap$"
 shroud.5110.title: "[GetChosenPatron]의 손짓"
 shroud.5110.desc_common: "역사의 어느 부분에서든 §H[GetChosenPatron]§!(이)라고 불리는 이 형언할 수 없는 존재는 늘 우리 곁에 존재해 왔습니다. 이제 광활한 은하가 우리를 기다리는 이 순간, [GetMindPhysicalLoc] 속에서 그 존재가 어느 때보다 분명히 [GetFeelLoc]됩니다.\n\n조금 더 가까이 다가오라는 듯 손짓하는 것만 같습니다. 지금까지 중 가장 가까워진 연결 속에서, 비로소 우리는 [GetMindLogicLoc] 깊은 곳에 자리한 심오하고도 신비한 공허의 윤곽을 처음으로 인지합니다. [GetChosenPatron](이)가 우리에게 손짓하고 있습니다."
 shroud.5110.desc_common_2: "마침내 우리는 스스로의 의지로 이 무형의 영역을 방문하는 법을 깨달았습니다."
 shroud.5110.desc_organic: "$shroud.5110.desc_common$ 마치 우리의 이해를 넘어선 경험으로 우리를 초대하는 듯합니다.\n\n$shroud.5110.desc_common_2$"
 shroud.5110.desc_robot: "$shroud.5110.desc_common$ 아직 밝혀지지 않은 원리에 맞춰 우리의 매개 변수를 최적화하는 듯합니다.\n\n$shroud.5110.desc_common_2$"
 shroud.5110.a: "우리의 지평은 내면으로 뻗어 나가리."
 shroud.5110.a.tt: "다음 존재와 §Y조율§!을 쌓습니다: $@chosen_patron_attunement_gift|0G$\n§Y장막§! 패널은 §Y조우§! 메뉴에서 확인할 수 있습니다."
 shroud.5115.title: "[GetChosenPatron]"
 shroud.5115.desc.intro: "장막은 우리가 아는 현실 아래 깊숙이 흐르는 어둠이 드리운 그림자입니다.\n\n우리는 오랫동안 이 사이오닉 영역에 발을 들여왔지만, 초기의 시도들은 모두 조심스러운 탐색에 불과했습니다. 그러나 여러 해에 걸쳐 하나 된 정신으로 차원을 가르는 장막을 서서히 허문 끝에, 이제는 그 존재를 명확하게 감지하며 목적을 가지고 탐사할 수 있게 되었습니다.\n\n그러나 반대편에서도 우리 움직임을 눈치챈 듯합니다. §H[GetChosenPatron]§!(이)가 우리를 기다리고 있습니다."
 shroud.5115.desc.outro: "무수한 존재들이 소용돌이치는 이 혼돈 속에서, 그 선명함은 약속처럼 빛납니다."
 shroud.5115.desc.composer: "$shroud.5115.desc.intro$\n\n§H펼치라. 감싸라. 팽창하라.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.eater: "$shroud.5115.desc.intro$\n\n§H진정한 허기를 느껴라.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.cradle: "$shroud.5115.desc.intro$\n\n§H모으고 끌어안아라.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.instrument: "$shroud.5115.desc.intro$\n\n§H욕망에 몸을 맡겨라.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.a: "우리는 돌아올 것입니다."
