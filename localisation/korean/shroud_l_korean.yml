 shroud.1510.title: "$PSIONIC_AURA$ 충돌"
 shroud.1510.desc: "[from.GetName] 성계의 §H$PSIONIC_AURA$§!가 인접 [fromfrom.GetName] 성계에서 발현된 다른 오라와 충돌해, 힘을 겨루고 있습니다. 사이오닉 [GetResearchers]들이 일전에 이런 현상을 이론적으로 예측한 적 있었지만, 실제로 경험하는 것은 이번이 처음입니다.\n\n이론적으로 강도가 더 높은 오라가 점차 반대쪽을 잠식할 것입니다. 오라를 완전히 잠식하면 우세한 오라가 빈 성계로 흘러 들어갈 수 있게 됩니다.\n\n그야말로 의식의 격돌이라 할 수 있겠군요."
 shroud.1510.a: "우리의 의지가 승리할 것입니다."
 shroud.1550.title: "의지의 힘"
 shroud.1550.desc.common_1: "우리가 §H장막§! 너머로 진출하자 장막의 에너지가 관측 가능한 현실에까지 영향을 미치고 있습니다. 영향력 자체는 상당하지만, 다행히도 이러한 현상들은 간헐적이고 국소적인 형태로만 발생했습니다."
 shroud.1550.desc.common_2: "우리의 행동이 장막 안에 물결을 일으키며 더욱 거대한 힘을 지닌 존재들에게 우리를 이끌고 있습니다. 장막 안에 자리한 존재의 호의를 얻을 수만 있다면 그 존재의 사이오닉 에너지를 물리적 현실에 투사할 수 있을 것입니다. 우리의 [GetTelepathPlural]들은 그 결과 생겨 나는 이른바 '오라'가 우리 제국"
 shroud.1550.desc_1.knows: "$shroud.1550.desc.common_1$ §H'$PSIONIC_AURA_PLURAL$'§!는 이러한 영향력을 지속적인 흐름으로 전환할 방법을 제시합니다."
 shroud.1550.desc_1.default: "$shroud.1550.desc.common_1$ §H'$PSIONIC_AURA_PLURAL$'§!에 관한 이론은 이러한 영향력을 지속적인 흐름으로 전환할 방법을 제시합니다."
 shroud.1550.desc.knows: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$과 동맹국들을 강화하고, 적들을 약화할 것이라고 확신에 찬 목소리로 이야기했습니다."
 shroud.1550.desc.knows.homicidal: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$을 강화하고, 적들을 약화할 것이라고 확신에 찬 목소리로 이야기했습니다."
 shroud.1550.desc.default: "$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$과 동맹국들을 강화하고, 적들을 약화할 것이라는 가설을 제시했습니다."
 shroud.1550.desc.default.homicidal: "$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$을 강화하고, 적들을 약화할 것이라는 가설을 제시했습니다."
 shroud.1550.a: "고무적인 결과로군요."
