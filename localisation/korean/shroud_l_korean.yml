 # Special Projects
 #==========================
 PATRON_REVENGE_PROJECT: "복수의 아바타"
 PATRON_REVENGE_PROJECT_DESC: "의 우리를 향한 격렬한 분노가 쏟아져 내렸습니다. [event_target:selected_planet_for_revenge.solar_system.GetName] 성계에 $SHROUD_TUNNEL_GALACTIC$이 출현했으며, 우리 [GetTelepathPlural]들은 입을 모아 한때 후원자였던 존재의 악의가 우리를 향해 뻗어 오는 것을 [GetFeelLoc]했다고 이야기했습니다.\n\n어서 스스로를 지키기 위한 준비에 나서야 합니다."
 the_eater_of_worlds_REVENGE_PROJECT: "$PATRON_REVENGE_PROJECT$"
 the_eater_of_worlds_REVENGE_PROJECT_DESC: "$the_eater_of_worlds_color_article_cap$$PATRON_REVENGE_PROJECT_DESC$"
 the_cradle_of_souls_REVENGE_PROJECT: "$PATRON_REVENGE_PROJECT$"
