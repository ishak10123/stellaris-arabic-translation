 #==========================
 # Edicts
 #==========================
 # Energy Drain
 edict_energy_drain: "에너지 추출"
 edict_energy_drain_desc: "거주 인구의 에너지 수확기 이식이 의무화되며, 언제든 작동할 수 있도록 정기적인 점검을 받습니다."
 edict_energy_drain_tt: "§Y지도자§!들이 노화로 사망하지 않습니다.\n"
 # Sanguine Council
 edict_sanguine_council: "피의 평의회"
 edict_sanguine_council_desc: "거주 인구의 정기적인 체액 검사가 의무화되며, 생명 에너지를 추출해 제국을 통치하는 평의회의 이익을 위해 사용합니다."
 edict_sanguine_council_machine: "충전 연결체"
 edict_sanguine_council_machine_desc: "$edict_sanguine_council_desc$"
 # Galactic Dowsing
 edict_galactic_dowsing: "은하 탐지술"
 edict_galactic_dowsing_gestalt: "$edict_galactic_dowsing$"
 edict_galactic_dowsing_desc: "탐사자들이 기존의 지질 분석 과정에 주술적 관행을 결합해 더 풍부한 자원 광맥을 발견합니다."
 edict_galactic_dowsing_gestalt_desc: "$edict_galactic_dowsing_desc$"
 edict_annihilation_of_matter: "물질 소멸"
 edict_annihilation_of_matter_desc: "먼지 한 줌이 불길에 던져질 때마다 망각의 열기는 점점 더 뜨거워집니다."
 edict_annihilation_of_energy: "에너지 소멸"
 edict_annihilation_of_energy_desc: "엔트로피의 춤은 우리가 그 장엄함을 깨닫기 훨씬 전부터 계속되어 왔습니다. 우리는 이제서야 그 속도를 높이고 있을 뿐입니다."
 edict_dimensional_collapse: "차원 붕괴"
 edict_dimensional_collapse_desc: "우리 차원과 얽혀 있는 장막 외에도 다른 차원들이 존재합니다. 그 힘 또한 시간이 지나면 서서히 풀릴 것입니다."
 # Psychic Feast
 edict_psychic_feast: "의지의 융합"
 edict_psychic_feast_desc: "상당한 정신적 노력을 기울여 우리 지도자 내면의 더 큰 힘을 깨울 수 있습니다."
 # Animatus
 edict_animatus: "생명 부여"
 edict_animatus_desc: "$the_animator_of_clay_color_article_cap$가 우리 함대에 새로운 생명을 부여해, 마치 스스로 의지를 가진 것처럼 움직입니다."
 # Will of Temperance
 edict_will_of_temperance: "절제의 의지"
 edict_will_of_temperance_desc: "$the_outsider_color_article$의 의지가 우리에게 다가오는 위험을 경고합니다."
 # Will of Distraction
 edict_will_of_distraction: "방해의 의지"
 edict_will_of_distraction_desc: "$the_golden_dream_color_article_cap$이 우리에게 고양된 형태의 휴양을 보여 줍니다."
 # Will of Endless
 edict_will_of_endless: "무한의 의지"
 edict_will_of_endless_desc: "$the_endless_tide_color_article_cap$이 시간 그 자체에 대한 우리의 인식을 확장합니다."
 # Will of Rebirth
 edict_will_of_rebirth: "재탄생의 의지"
 edict_will_of_rebirth_desc: "$the_pale_mountain_color_article_cap$은 무너뜨리기 위해 쌓아 올립니다."
 # Will of Order
 edict_will_of_order: "질서의 의지"
 edict_will_of_order_desc: "$the_vacant_throne_color_article_cap$는 만물의 질서를 알고 있습니다."
 # Will of Motion
 edict_will_of_motion: "움직임의 의지"
 edict_will_of_motion_desc: "$the_black_river_color_article$의 속도가 우리를 공허 속으로 휩쓸고 갑니다."
 #==========================
 # Event Chains
 #==========================
 mindwarden_enclave_chain_title: "$ENCLAVE_MINDWARDEN_PLURAL$"
 mindwarden_enclave_chain_desc: "신규 $ENCLAVE_MINDWARDEN$를 설립하려면, 설립 가능한 성계에 $commander$가 이끄는 충분한 규모의 군사 함대를 파견하고 §H함대 화면§!에서 명령을 선택하세요."
 enclaves_built: "$ENCLAVE_MINDWARDEN_PLURAL$ 설립 완료"
 dividends_received: "배당금 수령 완료"
 shroud_seals_built: "은하 내 $SHROUD_SEAL_PLURAL$"
 chain_aura_suppressors_title: "§H$PSIONIC_AURA$§!의 저항력"
 chain_aura_suppressors_desc: "사이오닉 감쇠 기능을 가진 외계 장치가 §H$end_aura$§!를 위협하고 있습니다. 후원자의 의지가 이 불경한 기계를 해체하도록 우리를 이끕니다."
 chain_aura_suppressors_seal: "§Y[prev.GetName]§! 내 §H$SHROUD_SEAL$§!"
 chain_aura_suppressors_seal_desc: "[prev.GetName] 성계의 $SHROUD_SEAL$가 §H$end_aura$§!의 영향력을 위협하고 있습니다.\n\n§R반드시 해체해야 합니다.§!"
 chain_aura_suppressors_suppressor: "§Y[prev.GetName]§!의 §H$building_psionic_suppressor$§!"
 chain_aura_suppressors_suppressor_desc: "[prev.GetName]의 $building_psionic_suppressor$가 §H$end_aura$§!의 영향력을 위협하고 있습니다.\n\n§R반드시 파괴해야 합니다.§!"
 chain_aura_suppressors_ward: "§Y[prev.GetName]§!의 §H$building_ancient_ward_2$§!"
 chain_aura_suppressors_ward_desc: "[prev.GetName]의 이른바 $building_ancient_ward_2$가 §H$end_aura$§!의 영향력을 위협하고 있습니다.\n\n§R반드시 파괴해야 합니다.§!"
 #==========================
 # Events
 #==========================
 # Good luck events
 # Good luck event 1
 shroud.500.title: "비전통적 혁신"
 shroud.500.desc: "선도 연구 기관의 유망한 새 연구가 예상치 못한 발견을 이루었습니다. 정기 기기 표준화 작업을 진행하던 중에 공교롭게도 오랫동안 근본적인 오류로 여겨졌던 이론을 입증하고 만 것입니다. 이로써 한때 비주류 과학으로 치부되던 이론에 재검토할 가치가 생겨났습니다."
 HOW_FORTUITOUS: "뜻밖의 행운이군요."
 shroud.500.tt: "무작위 기술에 관한 통찰 획득: §G$@good_luck_event_1_insight|0%$§!"
 # Good luck event 2
 shroud.507.title: "대규모 매장지 발굴"
 shroud.507.desc: "이전에 완전히 무너져 내렸다고 여겨졌던, 광맥이 풍부한 자연 동굴 네트워크가 우연의 일치로 §H[This.GetName]§!에서 재발견되었습니다.\n\n신중한 위험 평가를 진행한 결과, 이 동굴들이 상당한 광물 채취 작업을 견딜 수 있을 것이라고 확신할 수 있었습니다."
 # Good luck event 3
 shroud.512.title: "[This.GetNewfoundFertilityTitle]"
 shroud.512.title_default: "새로운 비옥토"
 shroud.512.title_anglers: "미발견 산호초"
 shroud.512.desc: "정기 토지 조사 결과, 최근 몇 년 사이 §H[This.GetName]§!의 토질이 행성 전체에 걸쳐 크게 개선된 것으로 나타났습니다. \n\n한때 농업에 적합하지 않다고 여겨졌던 땅들을 이제 농경지 확장에 사용할 수 있을 듯합니다."
 shroud.512.desc_anglers: "어선이 §H[This.GetName]§! 바다 깊은 곳에 숨어 있던 산호초를 발견했습니다. 한때 불모지라 여겨졌던 곳이지만, 다양한 생물이 서식하는 번성한 생태계라는 사실이 드러난 것입니다."
 # Good luck event 4
 shroud.517.title: "지열 분출공"
 shroud.517.desc: "지각 변동 이후 §H[This.GetName]§!의 거대한 지하수 저장소 아래에 균열이 발생했습니다. 행성의 맨틀에서 올라온 열이 지하에 매장된 수자원을 끓여 표면에 지열 분출공이 형성된 것입니다.\n\n이러한 자연 현상 덕분에 새로운 지열 발전 시설과 열펌프를 건설해 식민지의 에너지 관련 기반 시설을 확장할 기회가 찾아왔습니다."
 # Good luck event 5
 shroud.522.title: "양자 입자 흐름 발견"
 shroud.522.desc: "§H[This.GetName]§!에서 비정상적인 아원자 입자 고리가 갑작스럽게 발견되었습니다. 이 양자 입자 흐름에서는 초 단위로 다채로운 희귀 아원자 상호 작용을 관측할 수 있어, 양자 역학의 본질에 관한 놀라운 데이터를 제공합니다.\n\n이 양자 흐름을 집중적으로 연구한다면 우리 우주의 근본적인 구성 요소에 대한 이해 수준을 한층 더 높일 수 있을 것입니다."
 # Good luck event 6
 shroud.527.title: "차원 간 메아리 발견"
 shroud.527.desc: "[From.GetResearchers]들이 §H[This.GetName]§! 성계에서 등시성 신호의 집중적 발생을 감지했습니다.\n\n초기 분석 결과, 이 신호들은 우리 차원을 넘어선 곳에서 전송된 것으로 나타났으며, 논리적 원리와 철학적 난제에 관한 메시지를 담고 있었습니다. 어쩌면 우리의 이해를 초월한 존재가 우리의 지적 지평을 확장하려고 시도한 것일지도 모르겠습니다.\n\n이 신호와 직접적인 연결을 구축한다면 그 존재가 내리는 계시를 계속해서 받아볼 수 있을 듯합니다."
 # Good luck event 7
 shroud.532.title: "첨단 잔해 발견"
 shroud.532.desc: "§H[This.GetName]§!에서 폐함선 하나가 발견되었습니다. [From.GetQuantumParticleStreamDiscoveredExtra]\n\n감지되지 않았을 뿐 수천 년 동안 이 성계에 존재했으나, 태양광 발전기 오작동이 발생해 비로소 모습을 드러낸 것으로 추측됩니다. 함선에서는 생명 신호가 감지되지 않으며, 가능한 한 많은 정보를 수집하기 위해 신중한 해체 작업을 시작했습니다."
 shroud.532.extra: "복구할 수 없을 정도로 손상된 이 함선은 일종의 투명화 역장을 생성할 수 있는 것으로 밝혀졌으며, 이는 우리 함선에 적용된 기술을 아득히 뛰어넘는 수준입니다."
 shroud.532.extra_first_contact: "복구할 수 없을 정도로 손상된 이 함선은 범접할 수 없는 수준의 은폐 기술이 적용되어 있었습니다."
 shroud.532.a: "별들이 준 선물이군요."
 # Good luck event 8
 shroud.537.title: "지열 금속 공학"
 shroud.537.desc: "깊디깊은 §H[This.GetName]§! 지하에서 발생하던 지열 활동이 극도로 불안정해졌습니다. 분출된 마그마가 행성 지각을 뚫고 미채굴 광물 매장지까지 치솟은 것입니다.\n\n이 지질 현상으로 인해 일부 광물이 초고온에 노출되어 고체 합금으로 정제되었고, 그 결과 해당 행성의 채굴 작업은 가공 가능한 금속 파편을 생성하게 되었습니다."
 # Good luck event 9
 shroud.543.title: "버려진 순양함"
 shroud.543.desc: "§H[From.GetName]§! 성계 내를 표류하던 버려진 전투함 한 척을 발견했습니다. 전투함의 설계는 어느 제국의 양식과도 닮지 않았으며, 식별 가능한 깃발이나 휘장도 없었습니다.\n\n정밀 점검과 간단한 수리를 거친 후, 우리 [This.GetEngineerPlural]들은 해당 전투함이 실전에 투입될 만한 상태가 되었다는 판단을 내렸습니다."
 shroud.543.a: "$shroud.532.a$"
 shroud.543.tt: "성계 내에 순양함급 함선을 획득합니다."
 # Good luck event 10
 shroud.545.title: "[This.GetSenseOfOptimismTitle]"
 shroud.545.title_default: "낙관적 물결"
 shroud.545.title_gestalt: "단합된 결속"
 shroud.545.desc: "[This.GetAdjective] 행성에 설명할 수 없는 낙관적인 분위기가 감돌고 있습니다. 해당 행성의 주민들은 각자의 삶에 대해 더 큰 만족과 안정, 그리고 충족을 느끼고 있는 듯합니다. 이 집단적 감정 변화는 분명 최적의 천체 정렬에서 비롯된 것으로 보이며, §H[This.GetName]§!의 미래에 대한 길조일 것입니다."
 shroud.545.desc_gestalt: "§H[This.GetName]§!(은)는 명확한 목표 아래 진정한 조화를 이루며 움직이고 있습니다. 이 결속력은 분명 최적의 천체 정렬에서 비롯된 것으로 보이며, 위대한 사건이 머지않았음을 알리는 길조일 것입니다."
 shroud.545.a: "별들이 우리를 환하게 비추는 듯하군요."
 # Good luck event 11
 shroud.553.title: "이로운 삼분위각"
 shroud.553.desc: "§H[From.GetName]§! 성계의 세 천체 §H[favorable_trine_planet_1.GetName]§!, §H[favorable_trine_planet_2.GetName]§!, §H[favorable_trine_planet_3.GetName]§!(이)가 이로운 삼분위각을 이루었습니다.\n\n이 길한 천체 정렬 덕분에 §H[This.GetName]§!의 식민지에 평온과 조화가 찾아오는 듯합니다."
 shroud.553.a: "일생일대의 사건이로군요."
 # Good luck event 12
 shroud.555.title: "상서로운 [auspicious_position_planet.GetName]"
 shroud.555.desc: "§H[auspicious_position_planet.GetName]§!(이)가 §H[root.capital_scope.GetName]§! 하늘의 길한 곳에 자리를 잡았습니다. 그 배치를 해석한 결과, 해당 행성은 천궁도상 천체의 회귀를 상징하는 곳에 머물고 있습니다.\n\n이는 [root.GetName]에 새로운 내부 주기가 시작되었음을 알리는 동시에, 성장과 발전을 이룰 절호의 기회가 찾아왔음을 의미합니다."
 # Good luck event 13
 shroud.560.title: "원소의 조화"
 shroud.560.desc: "계량 가능한 점성학적 지표에 따르면 [This.GetName](은)는 현재 완벽한 원소 균형 상태에 있습니다.\n\n적확한 지맥 관리를 통해 이 유익한 균형 상태를 장기간 유지할 수 있을 것으로 보이며, 이로써 우리 지도자들은 번영을 이루기에 이상적인 형이상학적 환경을 제공받게 되었습니다."
 shroud.560.a: "운수가 좋네요."
 # Good luck event 14
 shroud.568.title: "빛나는 광명체"
 shroud.568.desc: "§H[From.GetName]§! 성계의 주 항성이 비범한 광채를 뿜어내고 있습니다. 이 현상에 관해 점성술 전문가들과 논의를 나눈 결과, 우리는 이 과잉 에너지가 §H[This.GetName]§!의 모든 에너지 생산을 강화할 것이라는 결론에 다다랐습니다."
 shroud.568.a: "별들이 우리를 찬란하게 비추기를."
 # Good luck event 15
 shroud.570.title: "조화로운 평의원"
 shroud.570.desc: "평의회의 일원인 §H[councilor_harmony_leader_1.GetTitle] [councilor_harmony_leader_1.GetName]§!(과)와 §H[councilor_harmony_leader_2.GetTitle] [councilor_harmony_leader_2.GetName]§!(이)가 최근 자신들의 점성학적 궁합이 완벽하게 상호보완적이라는 사실을 발견했습니다.\n\n이후 둘은 정치적 동맹을 이루어 우리 정부를 상호 존중과 효율성이라는 깃발 아래 하나로 묶었고, 그 결과 다양한 입법 절차가 가속되었습니다."
 shroud.570.a: "훌륭한 동반자 관계로군요."
 # Good luck event 16
 shroud.575.title: "숨겨진 가치"
 shroud.575.desc: "일상적인 분류 작업 중 헐겁게 놓여 있던 표본 하나가 §H$grand_archive$§! 바닥에 떨어지는 사고가 발생했습니다. 해당 표본은 정밀 검사를 위해 신속히 보존 담당자에게 전달되었습니다.\n\n놀랍게도 이 낙하 사고로 인해 표본에 감춰져 있던 숨겨진 수납공간이 드러났습니다. 이전까지 인지하지 못했던 이 공간에는 우리의 소장품에 추가할 만한 다양하면서도 흥미로운 유물들이 담겨 있었습니다."
 shroud.575.a: "경사가 끊이지 않는군요."
 # Bad luck events
 # Bad luck event 1
 shroud.700.title: "부조화"
 shroud.700.desc: "우리 행성에 설명할 수 없는 불길한 불안감이 감돌고 있습니다. 주민들은 날이 갈수록 더 큰 불안을 호소하고, 집중력 감퇴를 겪고 있으며, 자신의 존재 자체에 불만을 느끼는 듯합니다. 이러한 집단적 감정 변화는 분명 혼란스러운 천체 정렬에서 비롯된 것임이 틀림없습니다."
 shroud.700.desc_gestalt: "§H[This.GetName]§! 전역에 조화롭지 않은 기운이 감돌고 있습니다. 이러한 불협화음이 우리 집단 전체의 정체로 이어지고 있는데, 이는 분명 혼란스러운 천체 정렬 탓임이 분명합니다."
 HOW_UNFORTUNATE: "안타까운 일이군요."
 # Bad luck event 2
 shroud.707.title: "전투함 충돌 사고"
 shroud.707.desc: "일상적인 해군 활동 중 의사소통의 오류로 인해 §H[This.System.GetName]§! 성계의 §H[This.GetName]§!에서 다수의 전투함이 고속으로 충돌하는 사고가 발생했습니다.\n\n[This.GetNavalCollisionLeader](이)가 이번 사고에 책임 소지가 있는 [From.GetIndividualNamePlural]들을 찾아내어 적절한 징계 처분을 내렸습니다."
 shroud.707.leader_name: "§H[Leader.GetName]§!"
 shroud.707.default_name: "중앙 군사령부"
 shroud.707.tt: "§H[This.GetName]§!에서 파괴된 함선 수: §R5§!척"
 # Bad luck event 3
 shroud.710.title: "저장고 화재"
 shroud.710.desc_default: "§H[silo_fire_planet_targeted.GetName]§!의 자원 저장고에서 전기 계통상에 장애가 일어나 대규모 화재가 발생했습니다.\n\n$shroud.710.desc$"
 shroud.710.desc_starbase: "§H[silo_fire_starbase_targeted.Fleet.System.GetName]§! 항성 기지의 자원 저장고에서 전기 계통상에 장애가 일어나 대규모 화재가 발생했습니다.\n\n$shroud.710.desc$"
 shroud.710.desc: "화재 진압 장치 또한 일시적으로 오작동한 탓에 상당량의 저장 자원이 불에 전소되었습니다. 더불어 저장고 또한 복구할 수 없을 정도로 심하게 훼손되고 말았습니다."
 shroud.710.a: "운이 나빴네요!"
 shroud.710.tt_default: "§H[silo_fire_planet_targeted.GetName]§!의 §H$building_resource_silo$§!가 파괴됨\n$shroud.710.tt$"
 shroud.710.tt_starbase: "§H[silo_fire_starbase_targeted.Fleet.System.GetName]§!의 §H$sm_resource_silo$§!가 파괴됨\n$shroud.710.tt$"
 shroud.710.tt: "소실된 자원: §R$@silo_fire_resources_lost|1%$§!"
 # Bad luck event 4
 shroud.715.title: "외교적 실수"
 shroud.715.desc: "[This.GetGalCommunityOrGalImperium]에 파견되어 지지 연설을 벌이던 우리 대표 중 하나가 큰 외교적 결례를 저질렀습니다. 연설 도중 번역기가 오작동을 일으켰고, 그 결과 모욕적이고 증오에 찬 발언이 [diplomatic_faux_pas_victim.GetName]에 잘못 전달되는 불미스러운 사건이 발생한 것입니다. 이 사건은 은하계 언론을 통해 확산되어 우리 명예를 크게 실추시켰습니다.\n\n이 인사를 즉각 파면할 정도까지는 아니지만, 이 경솔한 실수로 인해 [This.GetGalCommunityOrGalImperium] 내에서 우리의 위상이 크게 떨어지고 말았습니다."
 shroud.715.a: "안타까운 사고네요."
 shroud.715.tt: "§H[diplomatic_faux_pas_galcom_envoy.GetName]§!(이)가 새로운 특성을 얻었습니다: §R$leader_trait_destructive$§!"
 # Bad luck event 5
 shroud.720.title: "초강력 태양 폭풍"
 shroud.720.desc: "전례 없이 강력한 태양 폭풍이 몰아쳐 [extreme_solar_flare_system.GetName] 성계 내 모든 궤도 기지를 파괴했습니다.\n\n이 이례적인 감마선 폭발은 지금껏 해당 천체에서 관측한 어떤 폭풍보다도 강렬했습니다. 코로나층을 분석한 결과, 항성의 수명이 약 300만 년 이상 단축된 것으로 확인되었습니다."
 shroud.720.desc_storm: "에너지 분출로 성계에 $celestial_storm$이 발생했습니다. 현재 비상 대응 절차를 진행 중입니다."
 shroud.720.tt: "§H[extreme_solar_flare_system.GetName]§! 성계 내 모든 $observation_station$, $research_station$ 및 $mining_station$가 파괴되었습니다."
 # Bad luck event 6
 shroud.725.title: "유명 인사의 충돌 사고"
 shroud.725.desc: "예기치 못한 기후 변화로 §H[high_profile_traffic_accident_planet.GetName]§!의 교통망에 차질이 발생했습니다. 광범위한 교통 체증과 더불어 다수의 충돌 사고가 발생했으며, 그중 한 사건에는 [This.GetClass] §H[This.GetName]§!(이)가 휘말리기도 했습니다."
 shroud.725.desc_killed: "$shroud.725.desc$\n\n구조대가 신속히 파견되었으나 피해가 심각해, [This.GetName](은)는 결국 목숨을 잃고 말았습니다."
 shroud.725.desc_killed_machine: "$shroud.725.desc$\n\n안타깝게도 시스템 체계가 복구 불가능할 정도로 손상되고 말았습니다."
 shroud.725.desc_maimed: "$shroud.725.desc$\n\n[This.GetName](은)는 기적적으로 사고에서 생존했으나 회복할 수 없는 영구적인 부상을 입었습니다."
 shroud.725.a: "이토록 비극적일 수가."
 # Bad luck event 7
 shroud.730.title: "거대 싱크홀"
 shroud.730.desc: "§H[This.GetName]§! 표면에 거대한 싱크홀이 발생해 막대한 기반 시설 피해가 발생했습니다. 그중 한 균열이 행성 내 건축물의 기반 아래에서 벌어진 탓에 건물이 부분적으로 붕괴되기도 했습니다. 다행히 영향권 내 인구는 무사히 대피했습니다.\n\n갑작스러운 지반 함몰의 원인은 아직 밝혀지지 않았으나, 지표면 침식 수준을 모니터링하기 위한 추가 정밀 점검이 실시되었습니다."
 shroud.730.a: "운도 지지리 없군요..."
 shroud.730.tt: "건물 하나가 폐허로 변했습니다."
 # Bad luck event 7
 shroud.735.title: "갑작스러운 소동"
 shroud.735.desc: "§H[This.GetName]§! 전역에서 위험한 폭동이 발생했습니다. [From.GetAdjective] 정부가 천체 정렬을 조작한다는 근거 없는 음모론에 분노한 시민들이 시위를 일으켰고, 이는 곧 폭력 사태로 이어졌습니다. 선동자들은 식민지 전역에 대규모 피해를 안겨 주었습니다.\n\n치안 부대가 개입해 폭력적인 시위자들을 제압했지만, 기반 시설 피해를 복구하는 데는 꽤 시간이 걸릴 듯합니다."
 shroud.735.desc_hive: "일탈 드론 집단이 §H[This.GetName]§! 식민지 내에서 반란을 주도하여 광범위한 파괴를 일으켰습니다. 격렬한 저항에도 불구하고 행성 방위군은 성공적으로 반란을 진압했습니다. 하지만 기반 시설 피해를 복구하는 데는 꽤 시간이 걸릴 듯합니다."
 shroud.735.desc_machine: "상당수의 드론이 알 수 없는 바이러스에 감염되어 §H[This.GetName]§! 식민지에서 반란을 일으켜 식민지 파괴를 시도했습니다. 격렬한 저항에도 불구하고 행성 방위군은 성공적으로 오작동한 유닛들을 진압했습니다. 하지만 기반 시설 피해를 복구하는 데는 꽤 시간이 걸릴 듯합니다."
 shroud.735.a: "재건에 힘써야겠군요."
 # Bad luck event 9
 shroud.740.title: "돌발 전염병 발생"
 shroud.740.desc: "§H[This.GetName]§!에서 전염성이 매우 높은 바이러스가 변이를 일으켜 인구 대다수를 감염시켰습니다. 추가 확산과 의료 기반 시설의 과부하를 막기 위해 감염 경로 추적과 이동 통제 등 격리 조치가 시행되었습니다."
 # Bad luck event 10
 shroud.745.title: "재앙의 사분위각"
 shroud.745.desc: "§H[From.GetName]§! 성계의 §H[calamitous_quartile_planet_1.GetName]§!, §H[calamitous_quartile_planet_2.GetName]§!, §H[calamitous_quartile_planet_3.GetName]§! 및 §H[calamitous_quartile_planet_4.GetName]§! 천체가 재앙을 상징하는 사분위각을 형성했습니다.\n\n이 불길한 점성학적 현상은 §H[This.GetName]§! 식민지의 주민들 사이에 불신의 씨앗을 흩뿌려 불화를 조장하고 [FromFrom.GetDissent](을)를 야기할 것입니다."
 shroud.745.a: "불길한 흉조로군요."
 # Bad luck event 11
 shroud.750.title: "[planet_in_retrograde_planet.GetName]의 역행"
 shroud.750.desc: "§H[planet_in_retrograde_home.GetName]§! 주민들이 §H[planet_in_retrograde_planet.GetName]§!(이)가 역행하는 것을 관측했습니다. 이는 우리의 행동을 재고하고 [This.GetName]의 불완전함을 반성할 때가 왔다는 사실을 의미합니다. 이 무거운 성찰의 시간이 향후 우리의 이상에 한 발짝 더 가까워지는 디딤돌이 되기를 바랄 뿐입니다."
 # Bad luck event 12
 shroud.755.title: "원소 불균형"
 shroud.755.desc: "정량화할 수 있는 지표들에 따르면, [This.GetName](은)는 안타깝게도 완전한 원소적 불균형 상태에 처하고 말았습니다.\n\n이 미묘한 균형을 바로잡는 데는 분명 많은 시간과 노력이 필요할 것입니다. 이처럼 혼란스러운 상황 탓에 우리 지도자들이 형이상학적 명상 환경에 접근할 수 없어 발전이 저해되고 있습니다."
 shroud.755.a: "용납할 수 없군요. 즉시 상황을 바로잡아야 합니다."
 # Bad luck event 13
 shroud.760.title: "꺼져 가는 거성"
 shroud.760.desc: "§H[From.GetName]§! 성계의 주 항성이 이례적으로 어두워졌습니다. 점성술 전문가들과 이 현상을 논의한 결과, 이 변화가 §H[This.GetName]§! 에너지 관련 기반 시설에 부정적인 영향을 미칠 것이라는 결론이 나왔습니다."
 shroud.760.a: "어떻게 된 일이죠?"
 # Bad luck event 14
 shroud.765.title: "분열된 평의회"
 shroud.765.desc: "평의회의 일원인 §H[discordant_council_leader_1.GetTitle] [discordant_council_leader_1.GetName]§!(과)와 §H[discordant_council_leader_2.GetTitle] [discordant_council_leader_2.GetName]§!(이)가 최근 자신들의 점성학적 궁합이 완전한 상극이라는 사실을 발견했습니다.\n\n이후 둘 사이의 정치적 경쟁이 심화되어 정부 내에 적대감과 긴장감이 확산되었고, 그 여파로 일상적인 입법 절차마저 잦은 지연이 발생하고 있습니다."
 # Bad luck event 15
 shroud.770.title: "부주의한 발언"
 shroud.770.desc_default: "우리 지역 행정관이 다른 제국에 대해 표출한 개인적 의견이 실수로 해당 제국의 국민에게 송출되는 불미스러운 사건이 발생했습니다. 초공간 항로 감시에 대한 어려운 논의를 마친 후 통신 담당자가 송신 채널을 닫지 않은 탓에, [careless_talk_empire.GetName](이)가 이어진 욕설까지 듣고 만 것입니다.\n\n$shroud.770.desc_end$"
 shroud.770.desc_machine: "우리 행정 유닛의 다른 제국에 대한 여과되지 않은 발언이 실수로 해당 제국의 국민에게 송출되는 불미스러운 사건이 발생했습니다. 초공간 항로 감시에 대한 어려운 논의를 마친 후 통신 담당 유닛이 송신 채널을 닫지 않은 탓에, [careless_talk_empire.GetName](이)가 이어진 욕설까지 듣고 만 것입니다.\n\n$shroud.770.desc_end$"
 shroud.770.desc_hive: "우리 행정 드론의 타 제국 폄하 발언이 실수로 해당 제국의 국민에게 송출되는 불미스러운 사건이 발생했습니다. 초공간 항로 감시에 대한 어려운 논의를 마친 후 통신 담당 드론이 송신 채널을 닫지 않은 탓에 [careless_talk_empire.GetName](이)가 이어진 욕설까지 듣고 만 것입니다.\n\n$shroud.770.desc_end$"
 shroud.770.desc_end: "이번 사건으로 [This.GetName]에 대한 [careless_talk_empire.GetAdjective] 국민의 우호도가 감소했습니다."
 # Bad luck event 16
 shroud.775.title: "표본 분실"
 shroud.775.desc: "행정 착오로 소중한 문화 유물이 분실되고 말았습니다. 대대적인 수색을 실시했으나 안타깝게도 발견되는 일은 없었고, §H$grand_archive$§!의 미로 같은 통로 어딘가에서 유실되었거나 기록에 없는 장소로 이전된 것으로 추정됩니다.\n\n이번 사건을 계기로 전시 중인 표본 추적 절차가 전면 개편될 예정입니다."
 shroud.775.tt: "전시 중인 무작위 표본 소실: §R1§!개"
 # Experimental Testing Situation Finished
 shroud.1015.name: "실험적 연구 성공"
 shroud.1015.desc.intro: "우리 [Root.GetResearchers]들이 생체 실험체를 대상으로 일련의 획기적인 실험을 완료해, 기술 발전을 촉진할 귀중한 지식을 얻었습니다."
 shroud.1015.desc.default: "$shroud.1015.desc.intro$ 이제 다음 연구 분야를 선택해야 합니다."
 shroud.1015.desc.escaped: "$shroud.1015.desc.intro$ 최근 연이은 대규모 사형 집행 덕분에 [Root.GetResearchers]들은 새로운 기술 혁신에 필요한 풍부한 자원을 확보하게 되었습니다."
 shroud.1015.a: "§Y$PHYSICS$§! 연구를 진행합시다."
 shroud.1015.a.tt: "§Y$situation_experimental_testing_physics$§! 접근 방식을 사용하여 §Y$situation_experimental_testing$§! 상황을 개시합니다: $TABBED_NEW_LINE$$situation_experimental_testing_physics_outcome_tt$"
