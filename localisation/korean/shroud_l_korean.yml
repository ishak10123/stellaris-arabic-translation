 the_reckoning_observer_chain_title: "[event_target:the_reckoning_observer_target.GetName]의 심판"
 the_reckoning_observer_chain_desc: "§H[event_target:the_reckoning_observer_target.GetName]§!의 심판이 은하계에 대혼란을 일으키고 있습니다!"
