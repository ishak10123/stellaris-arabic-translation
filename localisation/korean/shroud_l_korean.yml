 shroud.4040.title: "$utopia.3300.name$"
 shroud.4040.desc: "우리는 §H장막§! 속 어디에서나 울려 퍼지는 무수히 많은 목소리를 알고 있습니다. 최근 무아지경 상태에 빠졌던 우리 [GetTelepathPlural]들이 이전의 그 어떤 존재와도 비교할 수 없으며, 장막 정중앙에서 맥동하고 있는 §H다중적 진동§!의 존재를 보고했습니다.\n\n충분한 사이오닉 에너지가 있다면 [GetTelepathPlural] 사이에서 §H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§!(으)로 알려진 이 강력한 존재의 흔적을 따라갈 수 있을지도 모릅니다."
 shroud.4040.a: "$utopia.2657.a$"
 shroud.4045.title: "$whisperers_in_the_void_article_cap$"
 shroud.4045.desc.intro: "§H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§!(과)와 교감하기 위한 과정에서 우리는 장막의 가장 깊은 층에 도달했습니다. 이 내부 영역에서 장막은 정지해 있으며, 모든 순환에서 나온 모든 생각의 반향이 하나의 힘으로 모여듭니다. 시간을 초월한 소용돌이를 타고 목소리 없는 이들의 목소리가 들립니다. 바로 $whisperers_in_the_void_color_article$입니다.\n\n거친 불협화음에 둘러싸인 우리는 이 끝없는 목소리를 들으려 노력하고, 마침내 하나의 생각이 우리 [GetTelepathPlural]의 정신을 관통합니다.\n\n§H듣는 것은 희생이다.§!\n\n그 거대한 힘을 사용하기 위해서는 이 존재를 도와"
 shroud.4045.desc.covenant: "$shroud.4045.desc.intro$ [GetCovenantPatronColor]의 영역을 점령해야 합니다. 이 행동은 우리 후원자의 알려진 존재를 완전히 대체할 것이며, 기존의 계약을 파기할 것입니다.$shroud.4045.desc.outro$"
 shroud.4045.desc.no_covenant: "$shroud.4045.desc.intro$ 다른 후원자의 영역을 점령해 그 알려진 존재를 완전히 대체해야 합니다.$shroud.4045.desc.outro$"
 shroud.4045.desc.outro: "\n\n이 선택은 유의미한 결과를 초래할지 모릅니다."
 shroud.4045.a: "속삭임을 받아들입니다."
 shroud.4045.a.covenant.tt: "§R[GetCovenantPatronColor](과)와의 계약을 종료합니다.§!\n[GetCovenantPatronColor]의 영역을 $whisperers_in_the_void_color_article$의 영역으로 완전히 대체합니다.\n§R그에 따른 대가를 치르게 될 것입니다.§!"
 shroud.4045.a.no_covenant.tt: "$major_patron$의 영역을 $whisperers_in_the_void_color_article$의 영역으로 대체합니다.\n§R그에 따른 대가를 치르게 될 것입니다.§!"
 shroud.4045.b: "장막의 균형을 건드리지 않는 편이 현명할 겁니다."
 shroud.4046.title: "장막의 변화"
 shroud.4046.desc.1: "결정을 내리자, [GetTelepathPlural]들이 §H장막§!에서"
 shroud.4046.desc.2: "그 정신은 다양한 목소리의 메아리로 가득했습니다.\n\n우리의 선택이 사이오닉 영역에 대한 우리의 인식을 돌이킬 수 없게 재구성했습니다. $whisperers_in_the_void_color_article$이 우리의 정신으로 스며들면서, [GetCovenantPatronColor]의 존재를 더는 느낄 수 없게 되었습니다. 이제 그 영역은 존재하지 않는 것과 다름없습니다.\n\n우리는 한계 없는 지식에 대한 속삭임의 비전을 천천히 이해하고 있습니다. 우리 [GetTelepathPlural]들이"
 shroud.4046.desc.3: "다시금 이 무수한 존재와 접촉할 수 있을 것입니다."
 shroud.4046.desc.robot: "$shroud.4046.desc.1$ 격렬하게 깨어납니다. $shroud.4046.desc.2$ 회복하면 $shroud.4046.desc.3$"
 shroud.4046.desc.organic: "$shroud.4046.desc.1$ 격렬하게 깨어납니다. $shroud.4046.desc.2$ 재충전되면 $shroud.4046.desc.3$"
 shroud.whispers_in_the_shroud.title: "장막 속의 속삭임"
 shroud.whispers_in_the_shroud.a: "$utopia.2657.a$"
 minor_patron_instrument_cradle_intro: "우리는 $the_instrument_of_desire_article$과 $the_cradle_of_souls_article$의 영역 사이에 도달했습니다."
 minor_patron_cradle_composer_intro: "우리는 $the_cradle_of_souls_article$과 $the_composer_of_strands_article$의 영역 사이에 도달했습니다."
 minor_patron_composer_eater_intro: "우리는 $the_composer_of_strands_article$와 $the_eater_of_worlds_article$의 영역 사이에 도달했습니다."
 minor_patron_eater_instrument_intro: "우리는 $the_eater_of_worlds_article$와 $the_instrument_of_desire_article$의 영역 사이에 도달했습니다."
 minor_patron_default_intro: "우리는 장막 안 주요 존재들의 영역 사이에 도달했습니다."
 shroud.4050.desc: "[This.GetMinorPatronCradleComposerIntro]\n\n생명 없는 구조물들 사이에서 우리는 밀도 높은 에너지를 새롭고 흥미로운 형태로 빚는 §H$code_name_animator$§!를 감지했습니다.\n\n그 활동을 방해하자, 존재가 장막의 흐릿한 안개를 가르며 다가와 무언가를 내밀었습니다.\n\n이를 잡으면 무슨 일이 발생할까요?"
 shroud.4055.title: "$the_animator_of_clay_article_cap$ 등장"
 shroud.4055.desc: "장막의 격동하는 에너지에 정신을 맡기자 우리의 [GetSpeciesBodyPlural](이)가 이유 모를 경련을 일으킵니다. 순간적으로 §H$code_name_animator$§!가 우리를 사로잡은 것이 느껴집니다. 존재는 손짓하며 관찰을 권합니다.\n\n무언가 가득 찬 듯한 어둠이 걷히자 몸을 움직이는 실루엣이 드러납니다. 그 사지는 안개 같은 줄에 매달려 이리저리 날카롭게 끌려다니다가 줄이 사라지자 형체도 쓰러집니다.\n\n천천히 사지를 움찔거리며 다시 일어난 이 형체는, 이제는 줄이 없음에도 최면에 걸린 듯한 춤을 이어갑니다."
 shroud.4055.desc.know_animator: "그때 우리는 이 존재와 이전에 만난 적 있다는 사실이 떠올랐습니다. $the_animator_of_clay_color_article_cap$는 즐거워 보입니다. 무생물이 깨어나고, 둔한 물질에 영혼이 깃드는 곳이라면 어디든 그 또한 존재합니다."
 shroud.4055.a: "인형은 줄 없이 자유롭게 춤을 춥니다."
 shroud.4060.desc: "[This.GetMinorPatronCradleComposerIntro]\n\n어디선가 다른 존재가 느껴집니다. §H$code_name_outsider$§!가 주변에 사이오닉 에너지의 폭풍을 일으키며 우리 정신으로 접근합니다.\n\n집단 의식에 깊은 후회와 그리움이 밀려 들어오더니, 익숙한 성계들의 수천 년 전 모습이 펼쳐집니다.\n\n이 존재가 무엇이든, 우리의 은하계를 잘 알고 있는 듯합니다. 한때 이곳에 존재했던 걸까요?"
 shroud.4065.title: "$the_outsider_article_cap$ 등장"
 shroud.4065.desc.intro: "§H$code_name_outsider$§!로 알려진 아득한 존재가 §H장막§! 깊은 곳에서 우리 정신을 고통으로 불태웁니다. 존재는 말을 하지 않았지만, 분명한 경고를 보냈습니다.\n\n§H이 영역에서는 신중히 움직이세요. 여러분은 지금 어떤 힘을 건드리고 있는 건지 모릅니다. 파멸은 바로 한 걸음 앞에 있습니다...§!"
 shroud.4065.desc.outro_default: "이게 무엇을 의미하든, 이제 $the_outsider_color_article$의 존재를 알게 되었습니다. 우리 운명이 어떻게 얽혀 있는지는 아직 알 수 없습니다."
 shroud.4065.desc.outro_know_zroni: "이 존재는 우리 은하계에서 낯선 이가 아닙니다. 이전에 조우했던 즈로니 문명 특유의 정신 흔적을 지니고 있는 것입니다. 이런 일이 어떻게 가능한 걸까요?\n\n이게 무엇을 의미하든, 이제 $the_outsider_color_article$의 존재를 알게 되었습니다. 우리의 운명이 어떻게 얽혀 있는지는 아직 알 수 없습니다."
 shroud.4065.desc.outro_left_zroni: "우리는 이 존재를 이미 알고 있습니다. 바로 §H아스트랄 균열§! 너머에서 조우했던 멀리 보는 자입니다. 대체 어떤 운명이 닥쳤길래 $the_outsider_color_article$이 되어버린 걸까요?"
 shroud.4065.a.default: "어떤 공포를 겪어온 걸까요?"
 shroud.4065.a.know_zroni: "즈로니 문명이 아직 살아있는 걸까요?"
 shroud.4065.a.left_zroni: "같은 운명을 맞지 않도록 합시다."
 shroud.4070.desc: "[This.GetMinorPatronComposerEaterIntro]\n\n뒤엉킨 생각의 덩어리가 우리 정신을 휘감고, 거친 압력이 우리를 짓누르며 시간 감각을 왜곡합니다. 생각 하나하나가 이 낯선 영역의 결에 쓸리며 거칠게 갈려 나가는 듯합니다.\n\n이 감각이 잦아들자 §H$code_name_tide$§!가 천천히 흘러나오며 깊은 흔적을 남깁니다.\n\n눈앞에 남은 흔적은 마치 우리를 인도하는 것 같습니다."
 shroud.4075.title: "$the_endless_tide_article_cap$ 등장"
 shroud.4075.desc: "§H장막§! 속에서 §H$code_name_tide$§!가 나타났습니다. 형태가 없으면서도 거대한 이 존재는 우리 인식이 미치는 모든 영역에 끝없이 뻗어 있습니다.\n\n결이 느껴지는 속삭임이 우리를 타고 흐르며, 오랫동안 묻혀 있던 역사를 드러냅니다. 우리는 멈출 수 없는 시간의 흐름에 먼지로 사라진 잊힌 제국들을 봅니다. 기억은 알갱이가 되어 우리를 스쳐 지나갑니다.\n\n이 끝없는 기록의 보고 안에서 패턴이 떠오릅니다. 야망과 파멸, 승리와 부패의 순환. 이 깊은 곳에는 지혜가 깃들어 있습니다.\n\n$the_endless_tide_color_article_cap$은 시간을 초월해 뻗어 있으며, 무지를 깎아내고 오직 견딜 의지를 지닌 것만을 남겨 둡니다."
 shroud.4075.a: "그 지혜는 이제 우리의 것입니다."
 shroud.4080.desc: "[This.GetMinorPatronComposerEaterIntro]\n\n우리 자신의 행동이 무게를 가지고, 우리를 산처럼 거대한 억압적인 그림자 속으로 깊이 끌어당깁니다.\n\n그 회색빛 봉우리 위에서 흔들림 없는 시선이 우리 정신을 꿰뚫습니다. 눈앞에 펼쳐진 §H$code_name_mountain$§!의 규모를 이해해 보려고 하지만 쉽지 않습니다.\n\n가장 높이 솟은 봉우리가 우리를 부르며, 그 정점에 오를 준비가 되었는지 시험합니다."
 shroud.4085.title: "$the_pale_mountain_article_cap$ 등장"
 shroud.4085.desc: "§H장막§!의 아득한 높이로 올라가자, 마침내 그 닿을 수 없는 정상에 도달했습니다. §H$code_name_mountain$§!는 우리가 오기 전 모든 이들에게 그러했듯 우리를 시험했습니다.\n\n잊힌 제국의 우뚝 솟은 영묘가 부르는 희미한 역사의 합창이 울립니다. 모든 실패와 잘못된 야망이 다음 시대를 떠받치는 토대가 되어 있습니다.\n\n그러나 이곳은 고요한 무덤이 아니라 하나의 도가니로서, 파멸과 재생의 순환이 모여 과거의 실패를 기반 삼아 미래의 승리를 단련합니다. 파괴는 끝이 아닌, 새로운 시작입니다.\n\n우리 정신 안에서 $the_pale_mountain_color_article_cap$이 솟아납니다."
 shroud.4085.a: "산은 점점 자라날 것입니다."
 shroud.4090.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\n안락한 무게감이 우리의 사고를 느리지만 황홀한 안개 속으로 가라앉힙니다. 알아차리지 못했던 긴장이 녹아내리고, 그 자리에 서서히 번지는 깊은 평온이 자리합니다.\n\n이 금빛 포옹 속으로 더 깊이 잠겨 들자, 다가오는 §H$code_name_dream$§!가 보입니다. 그 압도적인 본질이 우리를 감싸며, 끝없는 만족을 약속하는 속삭임이 들려옵니다.\n\n그 나른한 탐닉은 묘하게도 매혹적입니다."
 shroud.4095.title: "$the_golden_dream_article_cap$ 등장"
 shroud.4095.desc: "§H장막§! 속 한가로운 고요의 공간 속으로 몸을 맡기자, 어느새 §H$code_name_dream$§!의 금빛 전당으로 이끌려 갑니다.\n\n비단결 같은 우리의 정신을 타고 흐르고, 화려한 장관이 양탄자처럼 우리 앞에 펼쳐집니다. 그 사치스러운 무게는 생각을 멈출 만큼의 방종과 태만을 품고 있습니다.\n\n$the_golden_dream_color_article_cap$은 상상조차 할 수 없는 사치를 우리 앞에 내밉니다."
 shroud.4095.a: "꿈은 곧 현실이 됩니다."
 shroud.4100.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\n장막의 혼란스러운 소용돌이가 뒤틀리며 사이오닉 에너지의 격류로 변모합니다. 갑자기 무수한 흐름이 펼쳐졌다 응축되며 어떤 보이지 않는 힘으로 진정됩니다. 소용돌이는 고요해지고 잔잔한 형태로 새롭게 감겨 들어갑니다.\n\n이 과정을 관찰하는 동안, 우리는 이 움직임을 조율하며 혼돈을 억눌러 질서로 바꾸는 §H$code_name_point$§!를 인식합니다.\n\n그 차분함이 우리를 부르고 있습니다."
 shroud.4105.title: "$the_hollow_point_article_cap$ 등장"
 shroud.4105.desc: "[GetTelepathPlural]들이 격렬하게 장막의 격동하는 혼돈 속으로 손을 뻗었지만, 아무런 성과가 없었습니다. 모든 노력을 멈추고 나서야 비로소 §H$code_name_point$§!의 품을 제대로 느낄 수 있었습니다.\n\n혼란과 분노로 가득 찬 수많은 전쟁의 이미지가 우리 정신 속으로 흘러 들어왔습니다.\n\n그 모든 소란 속에서 우리는 변함없이 지켜보는 $the_hollow_point_color_article$의 존재를 느낄 수 있었습니다. 그 존재는 고요한 인내 속에서 은하계의 끝없는 갈등이 끝나기를 기다립니다."
 shroud.4105.desc.outro_homicidal: "기본적인 본능에도 불구하고, 우리는 호기심을 자극하는 사고방식에 노출되었습니다."
 shroud.4105.a.default: "인내는 갈등을 이겨내는 법입니다."
 shroud.4105.a.homicidal: "애석한 꿈이군요... 우리는 진정한 목적을 알고 있습니다."
 shroud.4110.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\n혼란스러운 소음은 억압적인 어둠에 밀려나고, 누군가 우리의 의도를 세심히 감시하고 분석하며 심판하는 것이 느껴집니다.\n\n대적할 자 없는 절대적 질서의 무거운 기대감이 우리 내면을 깊이 들여다봅니다. §H$code_name_throne$§!가 우리 의도를 심판하고 있습니다.\n\n시선이 떠나자 어둠이 서서히 물러납니다. 전염되듯 퍼지는 감시의 시선이 우리의 순응을 강요합니다."
 shroud.4115.title: "$the_vacant_throne_article_cap$ 등장"
 shroud.4115.desc: "우리는 §H$code_name_throne$§! 앞에 무릎을 꿇었습니다.\n\n우리 정신은 타협 없는 권위의 차가운 무관심 속에 면밀히 들여다보였고, 그 심판 앞에서는 조금의 움직임도 허락되지 않았습니다.\n\n$the_vacant_throne_color_article$의 억압적인 공허는 자비도, 고통도 허락하지 않습니다. 이 존재는 오직 질서와 확실성만을 요구하며, 부족하다면 강제로 이를 부여합니다.\n\n우리는 이제 그 무게를 짊어지고 나아갑니다."
 shroud.4115.a: "심판은 끝나지 않습니다."
 shroud.4120.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\n순간적인 가속의 감각이 우리를 덮치고, 이해할 수 없는 정보의 폭풍이 우리를 압도합니다. 우리는 끝없는 지평선을 향해 맹렬히 나아가고 있는 것을 느낍니다.\n\n어떤 존재가 우리와 나란히 움직이고 있습니다. 이 §H$code_name_river$§!는 잠시 머무르다가, 이내 엄청난 속도로 우리 이해 너머를 향해 사라집니다.\n\n이 존재를 따라가야 합니다."
 shroud.4125.title: "$the_black_river_article_cap$ 등장"
 shroud.4125.desc: "§H장막§!의 익숙한 경계를 과감히 넘어서고 나서야 비로소 §H$code_name_river$§!에 닿을 수 있었습니다.\n\n사방으로 움직이는 듯한 감각이 우리를 덮쳤고, 그 속도는 기존의 어떤 방법으로도 설명할 수 없을 만큼 비논리적이었습니다.\n\n마침내, 우리는 $the_black_river_color_article$과 끝없는 여정을 이해하게 되었습니다. 이 광활한 은하가 곧 우리 앞에 열린 길입니다."
 shroud.4125.a: "속도의 순수한 형태군요."
 shroud.4135.title: "$end_of_the_cycle_article_cap$"
 shroud.4135.desc: "아무런 전조도 없이, 우리는 장막 속으로 찢겨져 들어갔습니다. 무시무시한 존재가 우리 정신을 공격합니다.\n\n$end_of_the_cycle_color_article$이라는 이 존재는 우리를 기다리고 있었습니다. 무아지경에 빠진 우리 [GetTelepathPlural]들이 갑자기 완벽한 하나가 되어 외쳤습니다. §R\"아직 너희의 때가 되지 않았다.\"§! 잠시 멈춥니다. §R\"하지만 그럴 수 있지.\"§!\n\n더 이상 말은 없지만, 거래를 제안했다는 것만큼은 알 수 있었습니다. 존재는 헤아릴 수 없을 정도의 권력과 지식, 재산을 주겠다고 합니다.\n\n§R우리가 종말을 앞당기기만 한다면 말입니다.§!"
 shroud.4135.a: "$utopia.3308.a$"
 shroud.4135.a.tt: "모든 후원자의 영역을 $end_of_the_cycle_color_article$으로 대체합니다.\n우리는 §H$end_aura$§!로 은하계를 삼킬 50년의 시간을 부여받습니다. 성공하면 게임이 끝납니다.\n$covenant.cycle.tooltip$$shroud.8450.a.tech_tooltip$\n$shroud.4135.psionic_components_insight$\n\n다른 모든 후원자와의 협약을 파기합니다.\n$eotc_opinion_modifier_tooltip$"
 shroud.4135.b: "장막에서 나와 최대한 잊어 봅시다."
 shroud.4135.b.forging_our_own_path: "길은 정해졌습니다. 우리는 홀로 나아갑니다."
 shroud.4135.psionic_components_insight: "모든 ['concept_psionic_components'] 기술 진행도 획득: §G+10%§!"
 concept_psionic_components: "사이오닉 부품"
 concept_psionic_components_desc: "$tech_psionic_bombers$\n$tech_psionic_lightning$\n$tech_psionic_disruptor$\n$tech_zro_launcher$\n$tech_psionic_shield$\n$tech_precognition_interface$\n$tech_psi_jump_drives$"
 triggered_opinion_eotc_situation_stage1: "끝의 소환"
 shroud.4140.title: "모 아니면 도"
 shroud.4140.desc: "우리의 운명은 $end_of_the_cycle_color_article$과 얽혀 있습니다. 그 존재의 오라가 번성하는 곳마다 우리의 인구도 함께 번성합니다. 그러니 결론은 명확합니다. 끝의 오라를 방해하는 자는 곧 [This.GetName](을)를 방해하는 것이며, 따라서 제거해야 할 대상입니다.\n\n원한다면 우리는 기존의 모든 군사적 제한을 거두고 적을 무자비하게 정복할 수 있습니다. 끝의 지배 앞에 그 무엇도 서 있어선 안 됩니다."
 shroud.4140.a: "운명이 이루어지기를."
 shroud.4140.a.tooltip: "['concept_total_war'] §H전쟁 명분§! 이용 가능\n$eotc_opinion_modifier_2_tooltip$"
 triggered_opinion_eotc_situation_stage2: "끝의 전조"
 shroud.4145.title: "절멸"
 shroud.4145.desc_1.common_1: "§R$end_aura$§!가 은하계에 퍼져 나가자, 저항도 거세지는 것이 느껴집니다."
 shroud.4145.desc_1.common_2: "하지만 그건 중요치 않습니다. 우리는 다른 이들이 $end_of_the_cycle_color_article$을 받아들이길 기다리지 않을 것입니다."
 shroud.4145.desc_1.default: "$shroud.4145.desc_1.common_1$ 먼 이웃들은 빠르게 우리에게 등을 돌리고 있습니다. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_1.homicidal: "$shroud.4145.desc_1.common_1$ 적들의 반감은 더욱 깊어지고 있습니다. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_2: "후원자의 의지에 힘입어, 우리는 오라를 강화하기 위해 에너지와 물질을 소비하는 새로운 방법을 고안했습니다. 우주의 본질마저도 끝을 앞당기기 위한 제물이 되는 것입니다."
 shroud.4145.a: "필요한 모든 것을 해야 합니다."
 shroud.4145.a.tooltip: "$eotc_opinion_modifier_3_tooltip$\n시행령 잠금 해제:\n$t$- ['edict:annihilation_of_matter', $edict_annihilation_of_matter$]\n$t$- ['edict:annihilation_of_energy', $edict_annihilation_of_energy$][GetDimensionalCollapseEdictGain]"
 shroud.4145.dimensional_collapse: "\n$t$- ['edict:dimensional_collapse', $edict_dimensional_collapse$]"
 triggered_opinion_eotc_situation_stage3: "$triggered_opinion_eotc_situation_stage2$"
 shroud.4150.title: "끝의 도래"
 shroud.4150.desc: "우리의 후원자가 조용히 말을 건넵니다. 우리는 순환의 끝이 가까워지며 [This.GetName] 전역에 새로운 에너지가 솟구치는 것을 느낍니다. 긴박감으로 우리의 활력이 차오릅니다.\n\n끝의 의지를 충족시키려면 모든 [This.GetSpeciesNamePlural]의 에너지를 하나의 목적에 쏟아야 합니다. 우리는 후원자의 힘을 실현해, 그 오라를 은하의 가장 먼 곳까지 퍼뜨려야 합니다."
 shroud.4150.a: "이제 우리의 시대가 왔습니다."
