 #==========================
 abomination_army: "혐오병대"
 abomination_army_desc: "공격성과 전투 능력을 높이는 극단적인 실험적 처치를 받은 끝에 생체 병기로 전락한 노예 병사들입니다. 주인에게는 매우 순종적이지만, 전장에서는 놀라울 정도로 무자비한 모습을 보여 줍니다."
