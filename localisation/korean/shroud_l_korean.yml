 civic_entropy_drinkers_machine: "에너지 추출기"
 civic_entropy_drinkers_machine_desc: "$civic_ap_blockade_tt$\n\n에너지의 적절한 배분은 상위 시스템을 효율적으로 운용하는 데 빼놓을 수 없는 요소입니다. 모든 유닛이 에너지의 효율적 배분을 염두에 두고 설계되어, 필요시 핵심 노드에 주기적인 오버클러킹이 가능합니다."
