 # Carceral Test Facility
 building_carceral_test_facility: "실험국"
 building_carceral_test_facility_desc: "유망한 이해관계자들에게 가맹 기회를 제공해 자체적인 실험 프로그램을 구축할 수 있도록 지원하는 행정 기관입니다. 범죄율을 낮추고 방위력을 강화합니다."
 building_psionic_offices: "사이오닉 청사"
 building_psionic_offices_desc: "외계 정신의 복잡한 사고방식은 물리적으로 존재할 때 더 효과적으로 파악할 수 있으며, 이를 통해 양측 모두에게 가장 수익성이 높은 무역 협정의 체결이 가능합니다."
 building_psionic_offices_tt: "\n성계 효과:\n$t$- $TRIGGER_BRANCH_OFFICE_OWNER$에 대해 $@psionic_offices_intensity|0+$의 월간 강도로 §Y$PSIONIC_AURA$§! 방출\n$t$- §R식민지의 소유주가 방출하는 아무 $PSIONIC_AURA$는 이 건물보다 높은 우선순위를 가집니다.§!"
 job_shroud_trader: "공감 마케터"
 job_shroud_trader_plural: "공감 마케터"
 job_shroud_trader_plural_with_icon: "£job_telepath£ $job_shroud_trader_plural$"
 job_shroud_trader_desc: "이 전문가들은 현지 시장의 정서적 흐름을 정확히 파악하여 계약을 성사시키고, 사고 리더십의 최신 트렌드에 관한 세미나를 개최합니다."
 mod_job_shroud_trader_add: "$job_shroud_trader$ 직업"
 mod_pop_shroud_trader_bonus_workforce_mult: "[shroud_trader.GetNamePlural] $BONUS_WORKFORCE_FOR$"
