 shroud.reject_covenant: "계약을 거부하고 떠납니다."
 shroud.reject_covenant.tt: "다시는 이런 제안을 받지 않게 됩니다."
 shroud.forge_our_own_path: "우리는 우리의 길을 갈 것입니다."
 shroud.forge_our_own_path.tt: "§R경고: 이 시점 이후, 어떤 후원자와도 계약을 맺을 수 없게 됩니다.§!"
 shroud.covenant_eater_accept_bonus.tt: "$the_eater_of_worlds_article$와의 계약을 확정합니다.\n§C추가 효과:§!\n$t$$covenant_eater_telepath_tt$"
 shroud.covenant_cradle_accept_bonus.tt: "$the_cradle_of_souls_article$과의 계약을 확정합니다.\n§C추가 효과:§!\n$t$$covenant_cradle_telepath_tt$"
 shroud.covenant_instrument_accept_bonus.tt: "$the_instrument_of_desire_article$과의 계약을 확정합니다.\n§C추가 효과:§!\n$t$$covenant_instrument_telepath_tt$"
 shroud.covenant_composer_accept_bonus.tt: "$the_composer_of_strands_article$와의 계약을 확정합니다.\n§C추가 효과:§!\n$t$$covenant_composer_telepath_tt$"
 shroud.covenant_whisperers_accept_bonus.tt: "$whisperers_in_the_void_article$과의 계약을 확정합니다.\n§C추가 효과:§!\n$t$$covenant_whisperers_telepath_tt$"
 shroud.unlock_covenant_accords.tt: "\n이 후원자가 지닌 §Y$ACTIVE_ACCORDS$§!을 잠금 해제하십시오. 쿨다운 후 활성화하면 유익한 효과를 발휘합니다.\n\n"
 # Eater of Worlds
 shroud.4500.title: "$utopia.3304.name$"
 shroud.4500.desc.default: "[GetEaterCovenantProposedEvent]"
 shroud.4500.desc.hive: "$shroud.4500.desc.default$"
 shroud.4500.desc.gestalt_machine: "$shroud.4500.desc.default$"
 shroud.4500.desc.individual_machine: "$shroud.4500.desc.default$"
 shroud.4500.desc.1: "장막에 다가가자 음울한 존재의 채워지지 않는 허기가 느껴집니다."
 shroud.4500.desc.pacifist: "$shroud.4500.desc.1$$utopia.3306.desc.2$\n\n그 성급함이 위협적으로 다가옵니다. 과연 우리의 정신이 그런 괴물을 받아들일 수 있을까요?"
 shroud.4500.desc.non_pacifist: "$shroud.4500.desc.1$$utopia.3306.desc.2$\n\n존재는 어서 우리를 먹고 싶어 하는 모양입니다."
 shroud.4500.a: "$the_eater_of_worlds_color_article$와 계약을 맺습니다."
 shroud.4505.desc.intro: "됐습니다. $the_eater_of_worlds_color_article$와 계약을 맺었습니다. 그 의지가 §H[Root.GetName]§! 전역에 흘러 나갑니다."
 shroud.4505.desc.outro: "계약에 따라 행성 포식자가 공물을 가져갔습니다. 도시 하나의 모든 주민이 갑자기 실종된 것입니다. 이 정도쯤이야 별거 아닌 대가입니다. 포식자가 다시 굶주리지 않는다면 말이죠."
 shroud.4505.desc.default: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.hive: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.gestalt_machine: "$shroud.4505.desc.hive$"
 shroud.4505.desc.individual_machine: "$shroud.4505.desc.intro$\n\n이미 우리 사회에 변화가 일어나는 것을 감지했습니다. 군사 유닛은 그 어느 때보다 전투에 집중하고 있지만, 평시에 강도 높은 전투 시뮬레이션을 진행하지 않는다면 그 갈망이 야만성으로 변질될 것입니다.\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc_2_pacifist: "이미 우리 사회에 변화가 나타나고 있습니다. 우리의 사고가 전투를 향한 욕구와 충돌하고 있습니다. 이 인지 부조화는 평소 평화를 추구해 왔던 대중에게 큰 불편함을 안겨주고 있습니다. 우리가 정말 올바른 선택을 한 걸까요?"
 shroud.4505.desc_2_organic_non_gestalt: "이미 우리 사회에 변화가 일어나고 있습니다. 장병들은 그 어느 때보다 전투에 굶주려 있지만, 평시에 강도 높은 훈련을 진행하지 않는다면 그 갈망이 야만성으로 변질될 것입니다."
 shroud.4505.desc_2_machine_non_gestalt: "이미 우리 사회에 변화가 일어나는 것을 감지했습니다. 군사 유닛은 그 어느 때보다 전투에 집중하고 있지만, 평시에 강도 높은 전투 시뮬레이션을 진행하지 않는다면 그 갈망이 야만성으로 변질될 것입니다."
 shroud.4505.desc_2_gestalt: "이미 우리 사회에 변화가 일어나는 것을 감지했습니다. 군사 [GetIndividualNamePlural]들은 그 어느 때보다 전투에 집중하고 있지만, 평시에 강도 높은 전투 시뮬레이션을 진행하지 않는다면 불필요한 공격성으로 변질될 것입니다."
 shroud.4505.a.default: "그러지 않기를 바랍시다."
 shroud.4505.a.gestalt: "위험을 감수할 가치가 있었습니다."
 shroud.4510.desc.intro: "(과)와 계약하기 위한 기초를 마련한 뒤로 꽤 시간이 흘렀습니다"
 shroud.4510.desc.outro: ". 연결은 아직 약하므로, 연결을 끊거나 강화할 기회는 남아 있습니다.\n\n[GetTelepathPlural]들의 말에 따르면, 계약을 확정하면 후원자가 부여하는 힘을 적극적으로 끌어낼 수 있을 뿐 아니라 함대와 $PSIONIC_AURA$에 대한 강화 효과도 얻을 수 있다고 합니다."
 shroud.4510.desc: "$the_eater_of_worlds_color_article$$shroud.4510.desc.intro$$shroud.4510.desc.outro$"
 shroud.4510.b: "$the_eater_of_worlds_color_article$를 거부합니다."
 shroud_eater_covenant_chain_title: "$eater_covenant_chain_title$"
 shroud_eater_covenant_chain_desc.intro: "$the_eater_of_worlds_color_article$라는 장막의 존재와 계약을 맺었습니다. 채울 수 없는 욕망을 지닌 이 존재는 일정한 대가를 받고 우리에게 자기 힘의 극히 일부를 나누어 주었습니다.\n\n우리 [GetTelepathPlural]들의 이론에 따르면, 우리 행동을 새로운 후원자의 의지에 맞춤으로써 그 유대를 더욱 다질 수 있다고 합니다."
 shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\n포식자가 배고픔에 인내심을 잃고 있습니다. 전쟁을, 불화와 탄식의 달콤한 맛을 갈망하고 있습니다."
 shroud_eater_covenant_chain_begin: "$eater_covenant_chain_begin$"
 shroud_eater_covenant_chain_end: "$eater_covenant_chain_end$"
 robot_shroud_eater_covenant_chain_title: "$shroud_eater_covenant_chain_title$"
 robot_shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\n포식자가 배고픔에 인내심을 잃고 있습니다. 전쟁을, 화염과 폐허의 달콤한 맛을 갈망하고 있습니다."
 # Instrument of Desire
 shroud.4550.title: "$utopia.3304.name$"
 shroud.4550.desc.default: "장막에 진입하는 순간 존재가 우리에게 먼저 접근했습니다. 존재의 생각은 우리 [GetTelepathPlural]들의 정신을 휘감아 뒤틀고는 협상하고 꼬드겼습니다. $the_instrument_of_desire_color_article$이라고 하는 이 존재는 우리에게 부와 권력, 명예는 물론... 우리가 원했던 것, 그리고 앞으로 원하는 것을 모두 제공하겠다고 합니다.\n\n대가요? 수수료 정도에 불과한 작은 보상만 원할 뿐입니다. 존재는 우리에게 가장 최선인 것만을 원하며, 우리를 돕고, 인도하고, 야망과 꿈을 알려줄 것입니다.\n\n§H단지 우리가 마음속으로 받아들이기만 한다면 말입니다.§!\n\n존재는 우리가 수락할 것이라고 확신합니다. 어떻게 거부할 수 있겠습니까?"
 shroud.4550.desc.hive: "$shroud.4550.desc.default$"
 shroud.4550.desc.gestalt_machine: "장막에 진입하는 순간 존재가 우리에게 먼저 접근했습니다. 존재의 생각은 우리 [GetTelepathPlural]들의 회로를 휘감아 뒤틀고는 협상하고 꼬드겼습니다. $the_instrument_of_desire_color_article$이라고 하는 이 존재는 우리에게 부와 권력, 명예는 물론... 우리가 원했던 것, 그리고 앞으로 원하는 것을 모두 제공하겠다고 합니다.\n\n대가요? 수수료 정도에 불과한 작은 보상만 원할 뿐입니다. 존재는 우리에게 가장 최선인 것만을 원하며, 우리를 돕고, 인도하고, 야망과 꿈을 알려줄 것입니다.\n\n§H단지 우리가 메인프레임 속으로 받아들이기만 한다면 말입니다.§!\n\n존재는 우리가 수락할 것이라고 확신합니다. 어떻게 거부할 수 있겠습니까?"
 shroud.4550.desc.individual_machine: "$shroud.4550.desc.gestalt_machine$"
 shroud.4550.a: "$the_instrument_of_desire_color_article$과 계약을 맺습니다."
 shroud.4555.desc.intro: "됐습니다. $the_instrument_of_desire_color_article$과 계약을 맺었습니다. 그 의지가 §H[Root.GetName]§! 전역에 흘러 나갑니다."
 shroud.4555.desc.outro: "이것이 계약에 따른 대가입니다. [GetTelepathPlural]들에 따르면, 하수인의 가장 큰 축복은 아직 실현되지 않았습니다."
 shroud.4555.desc.default: "$shroud.4555.desc.intro$\n\n이미 계약의 대가가 드러나고 있습니다. 약속된 부와 번영의 황금기를 기다리는 가운데, 주민들은 더 이상 기본 생필품만으로는 만족하지 못하게 되었습니다. [Root.GetSpeciesNamePlural]들은 이제 온갖 물질적 상품을 갈망하며, 우리 경제에 새로운 부담을 안겨주고 있습니다.\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.hive: "$shroud.4555.desc.intro$\n\n이미 계약의 대가가 감지되고 있습니다. 약속된 부와 번영의 황금기를 기다리는 가운데, 우리 드론의 기본 생필품 수요가 증가했습니다. [Root.GetSpeciesNamePlural]들은 이제 모든 곳에서 다양한 사치품을 요구하고 있으며, 우리 경제에 새로운 부담을 안겨주고 있습니다.\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.gestalt_machine: "$shroud.4555.desc.hive$"
 shroud.4555.desc.individual_machine: "$shroud.4555.desc.default$"
 shroud.4555.a.default: "그 말이 맞길 바랍시다."
 shroud.4555.a.gestalt: "그 말이 옳다고 믿습니다."
 shroud.4560.desc: "$the_instrument_of_desire_color_article$$shroud.4510.desc.intro$$shroud.4510.desc.outro$"
 shroud.4560.b: "$the_instrument_of_desire_color_article$를 거부합니다."
 shroud_instrument_covenant_chain_title: "$instrument_covenant_chain_title$"
 shroud_instrument_covenant_chain_desc.intro: "§H욕망의 하수인§!이라는 장막의 존재와 계약을 맺었습니다. 욕망을 부추기는 이 존재는 일정한 대가를 받고 우리에게 자기 힘의 극히 일부를 나누어 주었습니다. 이 관계는 앞으로도 계속될 가능성이 큽니다.\n\n[GetTelepathPlural]들의 이론에 따르면, 우리 행동을 새로운 후원자의 의지에 맞춤으로써 그 유대를 더욱 다질 수 있다고 합니다."
 shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\n하수인은 열망을 갈망합니다. 쾌락에 대한 탐닉, 타락, 그리고 노예제가 바로 하수인의 정체성입니다."
 shroud_instrument_covenant_chain_begin: "$instrument_covenant_chain_begin$"
 shroud_instrument_covenant_chain_end: "$instrument_covenant_chain_end$"
 robot_shroud_instrument_covenant_chain_title: "$shroud_instrument_covenant_chain_title$"
 robot_shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\n하수인은 열망을 갈망합니다. 억제되지 않은 소비와 착취, 그리고 노예제가 바로 하수인의 정체성입니다."
 # Cradle of Souls
 shroud.4600.title: "$utopia.3304.name$"
 shroud.4600.desc.default: "[GetCradleCovenantProposedDesc]"
 shroud.4600.desc.hive: "$shroud.4600.desc.default$"
 shroud.4600.desc.gestalt_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc.individual_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc_homicidal: "우리가 장막 속으로 가라앉자, 어떤 존재가 내면의 시야를 태웁니다. 빛이 사방에 퍼지며, 다른 모든 것을 가려 버립니다. $the_cradle_of_souls_color_article$이라고 하는 이 존재는 우리의 근원을 불태우고 있습니다.\n\n존재는 은하계 규모의 타협, 즉 서로 어울릴 수 없는 존재들의 절대적 평화를 요구합니다. 이 혐오스러운 비전을 받아들인다면, 큰 힘이 우리를 기다리고 있다고 약속합니다.\n\n§H단지 새로운 지평을 열도록 허락하기만 한다면 말입니다.§!\n\n요람의 빛은 가차 없으며, 그 힘은 부인할 수 없습니다. 과연 우리 정신이 이런 존재를 받아들일 수 있을까요? 혹시 우리의 의지를 약화시키진 않을까요?"
 shroud.4600.desc_non_homicidal: "의식이 장막 속으로 가라앉자, 내면에서 새로운 존재가 피어납니다. 우리는 질서와 균형을 발산하며 모든 것을 감싸는 빛을 감지합니다. $the_cradle_of_souls_color_article$이라고 하는 이 존재는 우리의 근원을 뒤흔들고 있습니다.\n\n존재는 영원한 평화, 즉 혼돈으로부터 해방된 은하계를 바랍니다. 그 비전을 공유한다면, 우리를 조화의 사자로 거듭나게 해 줄 수 있습니다. 존재는 깨지지 않을 신뢰의 유대를 약속합니다.\n\n§H단지 우리의 지평을 다듬을 수 있도록 허락하기만 한다면 말입니다.§!\n\n요람의 기대가 우리를 짓누르고 있습니다."
 shroud.4600.a: "$the_cradle_of_souls_color_article$과 계약을 맺습니다."
 shroud.4605.intro: "됐습니다. $the_cradle_of_souls_color_article$과 계약을 맺었습니다. 그 의지가 §H[Root.GetName]§! 전역에 흘러 나갑니다."
 shroud.4605.desc.default: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc.gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.non_gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.hive: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.gestalt_machine: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.individual_machine: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc_outro_homicidal: "이미 계약이 [Root.GetSpeciesAdj] 정신에 부정할 수 없는 영향을 보이고 있습니다. 많은 [Root.GetIndividualPlural]의 정신이 은하계의 평화에 관한 생각으로 오염되어, 우리 사회 전반에 깊은 불협화음을 일으키고 있습니다.\n\n[GetTelepathPlural]들에 따르면, 이 거래의 축복은 아직 실현되지 않았습니다. 그전까지는 끔찍한 갈등이 우리 정신을 괴롭힐 것입니다. 우리가 도대체 무슨 짓을 한 걸까요?"
 shroud.4605.desc_outro_gestalt: "이미 계약이 [Root.GetSpeciesAdj]의 정신에 미치는 영향이 감지되고 있습니다. 우리가 은하 전역에 걸쳐 평화로운 관계를 구축하려는 가운데, 이웃과의 사소한 불화조차 집단의식에 혼란을 일으키게 된 것입니다.\n\n이 작은 장애가 계약에 따른 대가입니다. [GetTelepathPlural]들에 따르면, 요람의 가장 큰 축복은 아직 실현되지 않았습니다."
 shroud.4605.desc_outro_non_gestalt: "이미 계약이 [Root.GetSpeciesAdj]의 정신에 미치는 영향이 나타나고 있습니다. 우리가 은하 전역에 걸쳐 평화로운 관계를 구축하려는 가운데, 이웃과의 사소한 불화조차 고통을 유발하게 된 것입니다.\n\n이 작은 장애가 계약에 따른 대가입니다. [GetTelepathPlural]들에 따르면, 요람의 가장 큰 축복은 아직 실현되지 않았습니다."
 shroud.4605.a.default: "[GetCradleCovenantFormedOption]"
 shroud.4605.a.gestalt: "[GetCradleCovenantFormedOption]"
 shroud.4605.opt.a.default: "그 말이 맞길 바랍시다."
 shroud.4605.opt.a.gestalt: "그 말이 옳다고 믿습니다."
 shroud.4605.opt.a.homicidal: "그러기만을 바랄 뿐입니다."
 shroud.4610.desc: "$the_cradle_of_souls_color_article$$shroud.4510.desc.intro$$shroud.4510.desc.outro$"
 shroud.4610.b: "$the_cradle_of_souls_color_article$을 거부합니다."
 shroud_cradle_covenant_chain_title: "$the_cradle_of_souls$"
 shroud_cradle_covenant_chain_desc: "$the_cradle_of_souls_color_article$이라는 장막의 존재와 계약을 맺었습니다. 조화를 추구하는 이 존재는 일정한 대가를 받고 우리에게 자기 힘의 극히 일부를 나누어 주었습니다.\n\n[GetTelepathPlural]들의 이론에 따르면, 우리 행동을 새로운 후원자의 의지에 맞춤으로써 그 유대를 더욱 다질 수 있다고 합니다.\n\n요람은 혼돈과 갈등이 없고, 그 안의 모든 존재가 평화라는 하나의 목표 아래 나아가기를 갈망합니다. 오직 완벽한 균형만이 그 바람을 충족할 수 있을 것입니다."
 shroud_cradle_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"
 shroud_cradle_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"
 robot_shroud_cradle_covenant_chain_title: "$shroud_cradle_covenant_chain_title$"
 robot_shroud_cradle_covenant_chain_desc: "$shroud_cradle_covenant_chain_desc$"
 # Composer of Strands
 shroud.4650.title: "$utopia.3304.name$"
 shroud.4650.desc.default: "장막 속 한 존재가 우리를 상냥한 익숙함으로 맞이하며, 언어가 아닌 시야, 개념, 생각으로 말했습니다. 이는 마치 처음부터 내재해 있었듯 [GetTelepathPlural]의 정신으로 너무나도 부드럽고 순조롭게 스며들었으며, 이들 앞에 무수히 많은 이미지가 떠올랐습니다.\n\n존재는 $the_composer_of_strands_color_article$로 알려져 있으며, 우리의 유기적 형태에 호기심을 보였습니다. 또한, 우리가 성장하고, 변화하고, 발전하고, 진화할 수 있는 다양한 방법을 보여줬습니다.\n\n§H단, 우리 육신에 존재를 받아들여야 한다고 합니다.§!\n\n존재는 인내심을 보이고 애정을 담아 답을 기다리고 있습니다. 마치 사랑하는 아이를 기다리는 부모처럼 말입니다."
 shroud.4650.desc.hive: "$shroud.4650.desc.default$"
 shroud.4650.desc.gestalt_machine: "장막 속 한 존재가 우리를 상냥한 익숙함으로 맞이하며, 언어가 아닌 시야, 개념, 생각으로 말했습니다. 이는 마치 처음부터 내재해 있었듯 [GetTelepathPlural]의 회로로 너무나도 부드럽고 순조롭게 스며들었으며, 이들 앞에 무수히 많은 이미지가 떠올랐습니다.\n\n존재는 $the_composer_of_strands_color_article$로 알려져 있으며, 우리의 기계 형태에 호기심을 보였습니다. 또한, 우리가 개조하고, 변화하고, 개선하고, 업그레이드할 수 있는 다양한 방법을 보여줬습니다.\n\n§H단, 우리 부품에 존재를 받아들여야 한다고 합니다.§!\n\n존재는 인내심을 보이고 애정을 담아 답을 기다리고 있습니다. 마치 사랑하는 아이를 기다리는 부모처럼 말입니다."
 shroud.4650.desc.individual_machine: "$shroud.4650.desc.gestalt_machine$"
 shroud.4650.a: "$the_composer_of_strands_color_article$와 계약을 맺습니다."
 shroud.4655.desc.intro: "됐습니다. $the_composer_of_strands_color_article$와 계약을 맺었습니다. 그 의지가 §H[Root.GetName]§! 전역에 흘러 나갑니다."
 shroud.4655.desc.outro: "우리는 [Root.GetSpeciesAdj] 형태에 대한 통제권 일부를 분명히 넘겨주게 되었으며, 이제 후원자는 우리의 모습을 뜻대로 바꿀 수 있게 되었습니다.\n\n이것은 우리의 새로운 계약에 따른 작은 희생일 뿐입니다. [GetTelepathPlural]들에 따르면, 작곡가의 가장 큰 축복은 아직 실현되지 않았습니다."
 shroud.4655.desc.default: "$shroud.4655.desc.intro$\n\n우리 [GetScientistPlural]들은 이미 [Root.GetSpeciesAdj] 실험 샘플의 유전 구조에서, 마치 하룻밤 사이 수 세대의 진화를 거친 듯한 이상 패턴을 발견했습니다. $shroud.4655.desc.outro$"
 shroud.4655.desc.hive: "$shroud.4655.desc.default$"
 shroud.4655.desc.individual_machine: "$shroud.4655.desc.intro$\n\n우리 [GetScientistPlural]들은 이미 [Root.GetSpeciesAdj] 실험 회로의 분자 구조에서, 마치 하룻밤 사이 수 세대의 시스템 업그레이드를 거친 듯한 이상 패턴을 발견했습니다. $shroud.4655.desc.outro$"
 shroud.4655.desc.gestalt_machine: "$shroud.4655.desc.individual_machine$"
 shroud.4655.a.default: "$covenant.composer.option$"
 shroud.4655.a.gestalt: "힘의 대가일 뿐입니다."
 shroud.4660.desc: "$the_composer_of_strands_color_article$$shroud.4510.desc.intro$$shroud.4510.desc.outro$"
 shroud.4660.b: "$the_composer_of_strands_color_article$를 거부합니다."
 shroud_composer_covenant_chain_title: "$composer_covenant_chain_title$"
 shroud_composer_covenant_chain_desc.intro: "$the_composer_of_strands_color_article$라는 장막의 존재와 계약을 맺었습니다. 모습을 숨기고 있는 이 존재는 일정한 대가를 받고 우리에게 자기 힘의 극히 일부를 나누어 주었습니다. 이 관계는 앞으로도 계속될 가능성이 큽니다.\n\n[GetTelepathPlural]들의 이론에 따르면, 우리 행동을 새로운 후원자의 의지에 맞춤으로써 그 유대를 더욱 다질 수 있다고 합니다."
 shroud_composer_covenant_chain_desc: "$shroud_composer_covenant_chain_desc.intro$\n\n작곡가는 유전자 조작과 진화의 제약에서 해방된 육체를 갈망하며, 동시에 생명과 자연, 그리고 육체의 신성함에 대한 존중을 이야기합니다."
 shroud_composer_covenant_chain_begin: "$composer_covenant_chain_begin$"
 shroud_composer_covenant_chain_end: "$composer_covenant_chain_end$"
 robot_shroud_composer_covenant_chain_title: "$shroud_composer_covenant_chain_title$"
 robot_shroud_composer_covenant_chain_desc: "$shroud_composer_covenant_chain_desc.intro$\n\n작곡가는 물리적 형태의 조작과 기존의 제약에서 해방된 성장을 갈망하며, 동시에 생명과 자연, 그리고 육체의 신성함에 대한 존중을 이야기합니다."
 # Whisperers in the Void
 shroud.4700.title: "$utopia.3304.name$"
 shroud.4700.desc: "$utopia.3304.desc.shroud$"
 shroud.4700.a: "$whisperers_in_the_void_color_article$과 계약을 맺습니다."
 shroud.4700.b: "$shroud.reject_covenant$"
 shroud_whisperers_in_the_void_covenant_formed_effect: "$t$£unity£ $mod_country_base_unity_produces_add$: §R-15%§!"
 shroud.4705.desc.intro: "됐습니다. $whisperers_in_the_void_color_article$과 계약을 맺었습니다. 그 의지가 §H[root.GetName]§! 전역에 흘러 나갑니다.\n\n새로운 후원자의 영향력이 빠르게 확산됩니다."
 shroud.4705.desc.outro: "이것이 이 강력한 계약에 따른 대가입니다. [GetTelepathPlural]들에 따르면, 속삭임의 가장 큰 축복은 아직 실현되지 않았습니다. 위대한 사이오닉 존재와의 직접적인 교감은 분명 그만한 가치가 있었을 겁니다."
 shroud.4705.desc.gestalt: "$shroud.4705.desc.intro$ 집단이 숨겨진 지식의 유입을 기다리는 가운데, 우리의 사고가 서로 다른 방향으로 갈라지고 있는 것을 감지했습니다. [GetNetworkName]의 안정적인 조화 위로, 점점 커져가는 내면의 불협화음이 덧씌워지고 있습니다.\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.non_gestalt: "$shroud.4705.desc.intro$ 숨겨진 지식을 향한 갈망이 커지면서, 사회 안의 사상과 견해가 점점 더 갈라지고 있습니다. 충돌하는 내면의 목소리들이 우리 정신을 갉아먹고 있으며, 모든 [root.GetSpeciesNamePlural]의 정신적 안녕을 위협하고 있습니다.\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.default: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.desc.hive: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.gestalt_machine: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.individual_machine: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.a.default: "감당할 수 있는 대가입니다."
 shroud.4705.a.gestalt: "$shroud.4705.a.default$"
 shroud.4710.title: "$utopia.2658.name$"
 shroud.4710.desc: "$whisperers_in_the_void_color_article$$shroud.4510.desc.intro$$shroud.4510.desc.outro$"
 shroud.4710.a: "$utopia.2658.a$"
 shroud.4710.b: "$whisperers_in_the_void_color_article$을 거부합니다."
