 # Experimentation Chambers
 building_experimentation_chambers_1: "실험 구역"
 building_experimentation_chambers_1_desc: "주로 수감실과 실험실로 이루어진 극비 실험 시설로, 교화할 가치가 없는 범죄자들을 대상으로 실험을 진행합니다."
 building_experimentation_chambers_2: "실험 복합 단지"
 building_experimentation_chambers_2_desc: "극비 기술 연구소와 수용 시설이 모인 단지로, 범법을 저지른 [Owner.GetIndividualNamePlural]들을 대상으로 제국에서 제일 가는 [Owner.GetResearchers]들이 실험을 진행합니다."
 building_experimentation_chambers_3: "실험 연결체"
 building_experimentation_chambers_3_desc: "최고 수준의 보안 기술이 적용된 수용 시설로 이루어진 시설망으로, 최정예 [Owner.GetResearchers] 집단이 범죄계 출신의 [Owner.GetIndividualNamePlural]들을 대상으로 선구적인 실험을 진행합니다."
 # Lifecrypt
 # Lifecrypt (Normal)
 building_lifecrypt_1: "에너지 흡수탑"
 building_lifecrypt_1_desc: "인근에 있는 특정 인구 집단의 잉여 에너지를 흡수하는 거대한 장치입니다. 대상 개체들은 착용한 특수 장비를 통해 생명력을 중앙 도관으로 보내며, 그렇게 모인 생명력은 고위 계층에 재분배됩니다."
 building_lifecrypt_2: "소울 사이펀"
 building_lifecrypt_2_desc: "오컬트적인 이름과 달리 실제 과학을 기반해 설계된 장치로, 물리적 연결선을 통해 개체로부터 에너지를 수확합니다. 개체의 생명을 위협하지 않는 범위 내에서 상당한 생체 에너지를 얻을 수 있습니다."
 building_lifecrypt_3: "에너지 정수 도관"
 building_lifecrypt_3_desc: "보호 장구 없이 접근하면 목숨이 위험할 수 있는 에너지 도관으로, 관리 규범상 영향 범위의 경계가 명확히 표시되어야 합니다. 도관을 관리하는 개체들은 과도한 에너지를 한 번에 흘려 넣는 일이 없도록 신진대사를 조절하는 훈련을 받습니다."
 # Lifecrypt (Machine)
 building_lifecrypt_machine_1: "사이펀 배터리"
 building_lifecrypt_machine_1_desc: "인근에 있는 특정 드론 집단의 과잉 처리 에너지를 흡수하는 거대한 장치입니다. 지정된 드론들은 착용한 특수 장비를 통해 에너지를 중앙 도관으로 보내며, 그렇게 모인 에너지는 상위 임무용 드론에 재분배됩니다."
 building_lifecrypt_machine_2: "배터리 복합체"
 building_lifecrypt_machine_2_desc: "물리적 연결선을 통해 드론으로부터 에너지를 수확하는 정밀 장치로, 치명적인 문제를 야기하는 일 없이 막대한 양의 잉여 처리물을 흡수합니다."
 building_lifecrypt_machine_3: "배터리 연결체"
 building_lifecrypt_machine_3_desc: "적합한 절연 장비를 갖추지 않은 유닛에게는 치명적인 결과를 초래할 수 있는 연결체로, 관리 규범상 영향 범위의 경계가 명확히 표시되어야 합니다."
 # Lifecrypt (Hive Mind)
 building_lifecrypt_hive_mind_1: "에너지 흡수탑"
 building_lifecrypt_hive_mind_1_desc: "인근에 있는 특정 드론 집단의 과잉 에너지를 흡수하는 거대 장치입니다. 지정된 드론들은 착용한 특수 장비를 통해 생명력을 중앙 도관으로 보내며, 그렇게 모인 생명력은 고위 등급 드론에 재분배됩니다."
 building_lifecrypt_hive_mind_2: "소울 사이펀"
 building_lifecrypt_hive_mind_2_desc: "오컬트적인 이름과 달리 실제 과학을 기반해 설계된 장치로, 물리적 연결선을 통해 드론으로부터 에너지를 수확합니다. 드론의 생명을 위협하지 않는 범위 내에서 상당한 생체 에너지를 얻을 수 있습니다."
 building_lifecrypt_hive_mind_3: "에너지 정수 도관"
 building_lifecrypt_hive_mind_3_desc: "보호 장구 없이 접근하면 목숨이 위험할 수 있는 에너지 도관으로, 관리 규범상 영향 범위의 경계가 명확히 표시되어야 합니다. 도관을 관리하는 드론들은 과도한 에너지를 한 번에 흘려 넣는 일이 없도록 신진대사를 조절하는 훈련을 받습니다."
 # Lifecrypt (Corporate)
 building_lifecrypt_corporate_1: "시너지 센터"
 building_lifecrypt_corporate_1_desc: "인근에 있는 특정 인턴 집단의 잉여 에너지를 흡수하는 거대한 장치입니다. 대상 개체들은 착용한 특수 장비를 통해 생명력을 중앙 도관으로 보내며, 그렇게 모인 생명력은 고위 직책자들에게 재분배됩니다."
 building_lifecrypt_corporate_2: "시너지 행정부"
 building_lifecrypt_corporate_2_desc: "물리적 연결선을 통해 개체로부터 에너지를 수확하는 정밀 시설로, 인턴의 생명을 크게 위협하지 않는 선에서 막대한 대사 에너지를 흡수합니다."
 building_lifecrypt_corporate_3: "시너지 연결체"
 building_lifecrypt_corporate_3_desc: "보호 장구 없이 접근하면 목숨이 위험할 수 있는 연결체 시설로, 관리 규범상 영향 범위의 경계가 명확히 표시되어야 합니다. 연결체를 관리하는 개체들은 해당 절차에서 생존할 수 있도록 고급 시너지 기술을 훈련받습니다."
 # Psionic Suppressor
 building_psionic_suppressor: "사이오닉 억제기"
 building_psionic_suppressor_desc: "장거리 사이오닉 감쇠기 배열체의 작동을 보조하는 복합 시설로, 성계 내에 존재하는 $PSIONIC_AURA_PLURAL$를 분산시켜 확산을 막습니다."
 building_psionic_suppressor_tt: "해당 성계 내 §Y$PSIONIC_AURA$§! §H강도§! 일일 감소량: $@building_psionic_suppressor_decrease|0$"
 # Materiality Engine
 building_materiality_engine: "물질화 엔진"
 building_materiality_engine_plural: "물질화 엔진"
 building_materiality_engine_desc: "장막의 사이오닉 에너지는 물리적 은하계의 모든 지점과 맞닿아 있습니다. $building_materiality_engine$은 이러한 접점을 활용해 차원 너머로 손을 뻗어 귀중한 부품과 자원을 물질화합니다."
 building_materiality_engine_tt: "§Y장막§!에서 사이오닉 ['concept_component'] 기술을 확보하기 위한 §H특별 프로젝트§!를 시작합니다. 프로젝트 완료 시 이 건물의 생산량과 건설 가능한 §H$building_materiality_engine_plural$§! 수가 증가합니다."
 biology_unit_is_observator_tt: "$t$£job_calculator_biologist£ $job_calculator_biologist_plural$이 $job_observator_drone_plural_with_icon$으로 전환"
