l_korean:
 ##################################
 # ENGLISH LOCALISATION - Shroud #
 ##################################
 SHROUD_TITLE: "Shadows of the Shroud"
 ap_interdimensional_processing: "차원 간 프로세싱"
 ap_interdimensional_processing_desc: "우리의 계산 잠재력이 물리적 3차원에 국한되면 최대의 능력을 발휘할 수 없습니다. 공허 너머의 공간으로 네트워크를 확장하면 더 많은 이점을 얻을 수 있습니다."
 requires_not_ap_interdimensional_processing: "$TRIGGER_FAIL$§Y$ap_interdimensional_processing$§! 승격 특전을 얻을 수 없습니다."
 vo_psionic_voice: "사이오닉"
 #==========================
 # Advanced Governments
 #==========================
 shroud.7099.name: "사이오닉 응답"
 shroud.7099.desc: "우리의 사고는 새로운 의지를 품고 §H장막§! 속을 나아갑니다. 우리가 밀어붙일수록 장막도 맞서 밀어냅니다. 처음엔 우리 존재를 거부하는 것으로 느껴졌지만, 이제는 알 수 있습니다. 장막은 우리에게 질문을 던지고 있습니다.\n\n그 의미는 모호하지만 가볍게 여길 수는 없습니다. [GetTelepathPlural]들의 말에 따르면, 우리의 대답이 우리 사회의 미래에 영향을 미칠 것입니다."
 shroud.7099.a: "질문에 답해야 합니다."
 # Shroud Songs events
 shroud.7100.title: "장막의 노래: [GetRolledShroudSongName]"
 shroud.7100.desc.common: "우리 [GetMindEyeLoc]에 환상이 펼쳐집니다. 우리는 §H[GetRolledShroudSongName]§!(을)를 봅니다.\n\n§P[GetRolledShroudSongDesc]§!"
 shroud.7100.desc: "우리는 §H장막§!과 강한 연결을 맺고 있으며, 언제든 장막의 부름에 응할 준비가 되어 있습니다. 장막의 메시지는 운율을 지니고 있어, 마치 우리에게 노래하는 듯합니다.\n\n$shroud.7100.desc.common$"
 shroud.7100.a: "[GetRolledShroudSongOptionA]"
 shroud.7100.b: "[GetRolledShroudSongOptionB]"
 shroud.7100.tt: "장막이 우리의 답을 기다리고 있습니다..."
 shroud.7105.desc: "보이지 않는 무언가가 움직이고, 속삭임과 함께 또 다른 생각이 떠오릅니다.\n\n$shroud.7100.desc.common$"
 shroud.7105.tt: "장막이 우리의 답을 갈망하고 있습니다..."
 shroud.7110.desc: "우리의 사고 안에서 합창이 울려 퍼집니다! 어떤 것은 우연이 아니라, 더 오래된 존재에 의해 선택됩니다.\n\n$shroud.7100.desc.common$"
 shroud.7110.tt: "장막이 우리의 답을 기대하며 떨고 있습니다..."
 shroud_song.1.name: "별"
 shroud_song.1.desc: "지식을 좇는 이들에게 존재의 과정은 곧 깨달음에 이르는 길이다."
 shroud_song.1.a: "앎은 우리의 감각 너머에 존재합니다."
 shroud_song.1.b: "앎은 우리 손이 닿는 곳에 있습니다."
 shroud_song.2.name: "빛"
 shroud_song.2.desc: "경계선은 마치 바다의 표면과도 같으며, 장막을 감싸는 미세한 공허이다. 이곳에서 진리를 엿볼 수 있을지니."
 shroud_song.2.a: "진리는 바다 깊은 곳에 있습니다."
 shroud_song.2.b: "진리는 수면에 비치는 법입니다."
 shroud_song.3.name: "생명"
 shroud_song.3.desc: "개화한 삶은 순식간에 저물고,\n자라난 생명은 지극히 연약하다."
 shroud_song.3.a.default: "장막 안에는 생명도 죽음도 없습니다."
 shroud_song.3.a.machine: "우리는 생명 너머에 존재합니다."
 shroud_song.3.b.default: "그래서 더 소중한 법입니다."
 shroud_song.3.b.machine: "우리는 아직 태어나지 않았습니다."
 shroud_song.3.b.homicidal: "연약한 것은 버려지기 마련입니다."
 shroud_song.4.name: "정신"
 shroud_song.4.desc: "마음은 샘과 같고, 생각은 시공을 넘어 흐른다. 우리는 다른 차원으로 스며든다."
 shroud_song.4.a: "그 흐름을 따릅시다."
 shroud_song.4.b: "우물을 파냅시다."
 shroud_song.5.name: "선"
 shroud_song.5.desc: "모든 원인에서든, 그 결과는 예견될 수 있다. 운명을 알기 위해선 그 흐름의 선만을 예측하면 되는 법."
 shroud_song.5.a: "우리는 꿈에서 그 흐름을 따라갑니다."
 shroud_song.5.b: "이 흐름은 계산되어야 합니다."
 shroud_song.6.name: "죽음"
 shroud_song.6.desc: "죽음을 앞둔 별은 은하보다도 찬란히 빛날 수 있다. 그러나 이 모든 것 또한 사라지리라."
 shroud_song.6.a.default: "죽음은 더 이상 걱정거리가 아닙니다."
 shroud_song.6.a.machine: "우리는 죽음을 모릅니다."
 shroud_song.6.b.default: "모든 것은 죽고, 살아가는 것은 소수에 불과합니다."
 shroud_song.6.b.machine: "죽음에 이르려면 일단 살아 있어야 합니다."
 shroud_song.7.name: "공허"
 shroud_song.7.desc: "은하가 모인 곳에선 혼돈이 군림하지만, 공허는 평온을 약속한다."
 shroud_song.7.a: "우리는 평온입니다."
 shroud_song.7.b: "우리는 혼돈입니다."
 shroud_song.8.name: "주름"
 shroud_song.8.desc: "다리는 어디에서든 무너질 수 있고, 어떤 다리든 무너질 수 있다."
 shroud_song.8.a: "반대편에 닿기를 바라며 다리를 건넙니다."
 shroud_song.8.b: "돌아가기를 바라며 다리를 건넙니다."
 shroud_song.9.name: "중력"
 shroud_song.9.desc: "모든 밀어냄에는 끌어당김이 함께하는 법."
 shroud_song.9.a: "밀어냅니다."
 shroud_song.9.b: "끌어당깁니다."
 shroud_song.10.name: "성운"
 shroud_song.10.desc: "별은 죽으며 먼지를 흩날리고, 그 먼지는 구름이 된다.\n구름 속에서 다시 별이 탄생하고, 별의 운명은 먼지로 돌아간다."
 shroud_song.10.a: "순환은 영원합니다."
 shroud_song.10.b: "모든 것은 끝나기 마련입니다."
 shroud_song.11.name: "혜성"
 shroud_song.11.desc: "탐험가는 미지를 갈망하지만, 결국 그들을 가두는 것은 탐험이다."
 shroud_song.11.a: "장막에는 경계가 없습니다."
 shroud_song.11.b: "장막은 우리 한계를 확장합니다."
 shroud_song.12.name: "블랙홀"
 shroud_song.12.desc: "그 안의 것은 알 길이 없고, 속으로 뛰어든 자는 돌아올 수 없다."
 shroud_song.12.a: "그 안으로 삼켜집니다."
 shroud_song.12.b: "거리를 둡니다."
 shroud_song.13.name: "에너지"
 shroud_song.13.desc: "움직이는 물체가 멈추기를 선택했다. 그에 대한 벌은 무엇이어야 하는가?"
 shroud_song.13.a: "우리가 그 벌을 내릴 자격이 있을까요?"
 shroud_song.13.b: "동등하지만 반대되는 반응입니다."
 shroud.7120.name: "사이오닉 초월"
 shroud.7120.desc.common: "§H장막§!은 침묵에 잠기지만, 그 정신적 무게감이 우리 사회에 드리워집니다. 우리가 제시한 답변이 새로운 기회를 열었고, 원한다면 그 길을 따를 수 있습니다."
 shroud.7120.desc: "$shroud.7120.desc.common$\n\n우리의 고양된 정신은 더 큰 변화를 맞을 준비가 되어 있습니다. 정신의 물리적 필요를 지탱하는 육신이라는 그릇의 중요성은 훨씬 줄어들 여지가 있습니다.\n\n이 길을 계속 걷는다면, 우리 국민들은 육체적인 문제를 초월해 장막 안에서 부분적으로 존재하기 위해 완전히 몰두하게 될 것입니다. 육체노동의 감소는 정신적 예리함을 얻기 위한 작은 대가에 불과합니다."
 shroud.7120.a.default: "사이오닉 초월을 기꺼이 받아들입시다."
 shroud.7120.a.gestalt: "사이오닉 초월이 집단에 이상적인 길입니다."
 shroud.7120.a.tt: "$change_auth_tt$ [GetTranscendedAuthority]"
 shroud.7120.b.default: "우린 그런 변화가 없어도 번영할 수 있습니다."
 shroud.7120.b.machine: "가동 방식 전환이 거부되었습니다."
 shroud.7121.name: "장막의 노래"
 shroud.7121.desc: "$shroud.7120.desc.common$\n\n우리의 고양된 형태는 이 물질 차원에서 막대한 잠재력을 지닙니다. 사이오닉 에너지를 주입받아 계속 힘을 키운다면 그 힘을 사회 전반에 더 널리 퍼뜨릴 수 있습니다.\n\n우리는 단순히 장막의 노래를 부르는 것에 그치지 않고, 그 노래가 우리 [GetGovBehaviourLoc]에까지 흐르게 할 것입니다."
 shroud.7121.a: "장막의 노래가 우리를 이끌도록 합시다."
 shroud.7121.a.tt: "$change_auth_tt$ [GetCorporealAuthority]"
 # Transcendent
 transcendent_trait_common_tt: "§Y$trait_psionic$§! 종족 특성이 다음 추가 효과 부여:$TABBED_NEW_LINE$- $pop_cat_ruler_plural$ 및 [GetSpecialist] 직업 효율성: §G+10%§!$TABBED_NEW_LINE$- [GetWorker] 직업 효율성: §R-10%§!"
 transcendent_trait_tt: "$mod_psionic_aura_hyperlane_range_add$: §G+2§!\n$transcendent_trait_common_tt$\n['concept_leader_trait_psionic'] 지도자 특성이 다음 추가 효과 부여: $TABBED_NEW_LINE$- 평의회 안건 속도 §G+$@transcendent_psionic_leader_speed_mult|0%$§! $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_ADD$: §G+60§! $TABBED_NEW_LINE$- 비초월 효과 §G50%§! 증가"
 auth_shroud_democratic_transcendent: "초월 민주주의"
 auth_shroud_democratic_transcendent_desc: "실체의 영역에서 선거로 평등을 보장하는 반면, 장막의 모든 초월의식은 동등한 지위를 가집니다. 시민들은 사이오닉 투표로 대표를 선출하고, 이 대표들은 비밀 통치 의회에서 텔레파시로 의견을 교환하며 의견의 일치를 추구합니다."
 transcendent_democratic_tt: "$transcendent_trait_tt$\n$mod_pop_factions_produces_mult$: §G+40%§!\n$MOD_LEADER_LIFESPAN_ADD$: §G+20년§!\n$mod_negative_traits_leader$: §G-1§!"
 gov_shroud_transcendent_democracy: "$auth_shroud_democratic_transcendent$"
 gov_shroud_transcendent_democracy_desc: "$auth_shroud_democratic_transcendent_desc$"
 auth_shroud_oligarchic_transcendent: "초월 귀족제"
 auth_shroud_oligarchic_transcendent_desc: "장막의 가장 깊은 심연은 가장 위대한 정신만이 접근할 수 있습니다. 이 영역에 조율하는 데 걸리는 시간은 그들의 임기에 포함됩니다."
 transcendent_oligarchic_tt: "$transcendent_trait_tt$\n$MOD_LEADER_SKILL_ADD$: §G+1§!\n$MOD_LEADER_COUNCILOR_EXP_GAIN$: §G+25%§!\n$mod_leaders_upkeep_mult$: §G-25%§!\n$MOD_ELECTION_TERM_YEARS_ADD$: §Y+20§!\n$mod_planet_telepaths_produces_mult$: 선거가 끝날 때마다 향후 §Y5§!년 동안 $@transcendent_oligarchic_telepath|0=+%$"
 gov_shroud_transcendent_oligarchy: "$auth_shroud_oligarchic_transcendent$"
 gov_shroud_transcendent_oligarchy_desc: "$auth_shroud_oligarchic_transcendent_desc$"
 transcendent_oligarchic_election_modifier: "$auth_shroud_oligarchic_transcendent$"
 auth_shroud_dictatorial_transcendent: "초월 신정제"
 auth_shroud_dictatorial_transcendent_desc: "이제는 위대한 통치자가 고양된 신이라는 진실을 받아들여야 합니다. 통치자는 장막의 힘으로 모든 것을 보고, 또 알고 있습니다."
 auth_shroud_dictatorial_transcendent_tt: "$transcendent_trait_tt$\n[telepath.GetName] §H$EDICT_FUND$§!: +1\n£job_politician£ $job_politician_plural$를 ['concept_high_priest']로 대체\n$mod_planet_bureaucrats_produces_mult$: §G+15%§!\n$mod_planet_enforcers_produces_mult$: §G+15%§!\n$mod_pop_ethic_spiritualist_attraction_mult$: §G+50%§!"
 gov_shroud_transcendent_dictatorial: "$auth_shroud_dictatorial_transcendent$"
 gov_shroud_transcendent_dictatorial_desc: "$auth_shroud_dictatorial_transcendent_desc$"
 auth_shroud_imperial_transcendent: "초월 은하 제국"
 auth_shroud_imperial_transcendent_desc: "통치자는 우리의 존재를 더 높은 차원으로 끌어올립니다. 장막의 순수한 힘이 황실의 의지에서 뿜어져 나와 갈망하는 민중의 정신에 스며듭니다."
 auth_shroud_imperial_transcendent_tt: "$transcendent_trait_tt$\n$imperial_heir$가 다음 추가 효과 획득:$TABBED_NEW_LINE$$scientist_plural_with_icon$ - §Y고고학§! 및 §Y아스트랄 균열 기술§!: $@transcendent_imperial_heir_skill|0=+$$TABBED_NEW_LINE$$official_plural_with_icon$ - $i_stability$: $@transcendent_imperial_heir_stability|0=+$$TABBED_NEW_LINE$$commander_plural_with_icon$ - §Y$HITPOINTS$§! 및 §Y$MOD_SHIP_SPEED_MULT$§!: $@transcendent_imperial_heir_mult|0=+%$\n£leader£ §Y$imperial_ruler$§! 또는 §Y후계자§!의 레벨이 증가할 때마다 $i_unity$ 획득\n$MOD_ENVOY_IMPROVE_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_HARM_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_ATTUNEMENT_MULT$: §G+50%§!\n$MOD_PLANET_CRIME_ADD$: §R+20§!"
 gov_shroud_transcendent_imperial: "$auth_shroud_imperial_transcendent$"
 gov_shroud_transcendent_imperial_desc: "$auth_shroud_imperial_transcendent_desc$"
 councilor_ruler_imperial_transcendent: "$imperial_ruler$"
 councilor_ruler_imperial_transcendent_desc: "$imperial_ruler_desc$"
 auth_shroud_corporate_transcendent: "초월 기업"
 auth_shroud_corporate_transcendent_desc: "초월한 기업은 핵심 목표를 마음에 품고 앞으로 나아갑니다. 장막의 그림자를 통해, 기업은 이해관계자와 경쟁자 모두의 정신을 분석하고 사이오닉 경영 전략을 펼칠 기회를 창출합니다."
 auth_shroud_corporate_transcendent_tt: "$transcendent_trait_tt$\n[telepath.GetName] $i_trade_value$: §G+$@corporate_government_telepaths_trade_value_mult|0%$§!\n$MOD_INTEL_DECRYPTION_ADD$: §G+1§!\n$mod_operations_influence_cost_mult$: §G-20%§!\n$MOD_BRANCH_OFFICE_VALUE_MULT$: §G+20%§!\n$MOD_COUNTRY_ENVOYS_ADD$: §G+1§!"
 gov_shroud_transcendent_corporate: "$auth_shroud_corporate_transcendent$"
 gov_shroud_transcendent_corporate_desc: "$auth_shroud_corporate_transcendent_desc$"
 auth_shroud_hive_transcendent: "초월 에테르 정신체"
 auth_shroud_hive_transcendent_desc: "하나가 되어 장막 속으로 나아간 이 집단은 물리적인 형태보다 장막 속에서 더 큰 편안함을 느낍니다. 장막 너머로의 여정 하나하나가 이 새로운 에테르 정신체의 집단적 지혜를 풍요롭게 합니다."
 transcendent_hive_mind_tt: "$transcendent_trait_tt$\n§Y지도자§!들은 각 $DELVE$가 끝날 때마다 §Y$@transcendent_hive_mind_leader_exp|0$§! 경험치를 획득합니다.\n$MOD_PLANET_STABILITY_MULT$: §G+10%§!\n$mod_planet_jobs_complex_drone_produces_mult$: §G+10%§!\n$MOD_EMPIRE_SIZE_MULT$: §G-10%§!\n$MOD_POP_ENVIRONMENT_TOLERANCE$: §R-10%§!"
 gov_shroud_transcendent_hive: "$auth_shroud_hive_transcendent$"
 gov_shroud_transcendent_hive_desc: "$auth_shroud_hive_transcendent_desc$"
 auth_shroud_machine_transcendent: "초월 메인프레임"
 auth_shroud_machine_transcendent_desc: "이 네트워크의 처리 능력 대부분이 장막으로 이전되어, 전례 없는 연산 능력을 자랑합니다. 이제 평범한 물질 영역에서의 시스템 운용은 느리고 낡은 방식으로 여겨집니다."
 transcendent_machine_tt: "$transcendent_trait_tt$\n조율 포인트당 연구 속도 $@transcendent_machine_research_per_attunement|2=+%$ \n§Y$DELVE$§!를 진행할 때마다 무작위 £physics_research£ £society_research£ £engineering_research£ 연구 획득\n$pop_group_unit$ $job_telepath_swap_plural_with_icon$당 §Y서브루틴§! 유지비: $@transcendent_machine_calculator_upkeep|0=-%$\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+25%§!\n['trait:trait_robot_psionic'] 특성이 있는 £pop£ 팝 유지비 $@transcendent_machine_pop_upkeep|0=-%$ 증가\n$mod_station_researchers_produces_mult$: §R-20%§!"
 gov_shroud_transcendent_machine: "$auth_shroud_machine_transcendent$"
 gov_shroud_transcendent_machine_desc: "$auth_shroud_machine_transcendent_desc$"
 transcendent_machine_research_modifier: "$auth_shroud_machine_transcendent$"
 AUTH_HIVE_MIND_GENEMODDING_ASCENDED: "£pop£ §H팝§!이 §H군체 의식§!이 되도록 유전자 변형 가능"
 MOD_ENVOY_ATTUNEMENT_MULT: "사절 장막 조율"
