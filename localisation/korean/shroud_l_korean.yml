 civic_mindwarden_enclave_desc: ""
 enclave_mindwarden_station: "$MINDWARDEN$ 기지"
 enclave_mindwarden_station_plural: "$MINDWARDEN$ 기지"
 leader_trait_iron_will: "철의 의지"
 leader_trait_iron_will_desc: "중무장 요새화와 정신 저항 분야의 전문가로 명성이 자자한 $MINDWARDEN_plural$의 숙련된 지휘관입니다."
 shroud.4190.name: "다가오는 $PSIONIC_AURA$"
 shroud.4190.desc.intro: "얼마 전, 우리 [GetScientistPlural]들이 먼 성계에 알 수 없는 기원의 에너지 흐름이 가득 차 다른 성계로 점차 퍼져 나가는 이례적인 현상을 관측했습니다."
 shroud.4190.desc: "$shroud.4190.desc.intro$ 그 출처에 대한 이론은 아직 확인되지 않았지만 우리는 이 현상을 §H'$PSIONIC_AURA_PLURAL$'§!라고 명명했으며, 이 흐름이 실질적인 위협인지는 아직 확실하지 않습니다.\n\n이 오라는 현재 §H[from.GetName]§! 성계에서 감지되었으며, 계속 확산될 경우 우리 국경을 침범할 가능성이 있습니다."
 shroud.4190.desc_mindwarden: "이 현상의 기원에 대한 이론이 정확하다면, §H[event_target:mindwarden_enclave_country.GetName]§!(이)가 사이오닉 오라의 영향에 대응할 방법을 알고 있을지도 모릅니다."
 shroud.4190.a: "머지않아 그 영향을 알게 될지도 모르겠군요."
 shroud.4191.name: "$shroud.4190.name$"
 shroud.4191.desc_1.common: "§H[from.GetName]§! 성계에서 높은 농도의 사이오닉 에너지를 감지했습니다. §H장막§! 속 메아리에 귀 기울인 우리 [GetTelepathPlural]들은 이 현상이"
 shroud.4191.desc_1.default: "$shroud.4191.desc_1.common$ 외계 문명의 사이오닉 활동에서 기원한 것으로 보고 있습니다."
 shroud.4191.desc_1.contact: "$shroud.4191.desc_1.common$ §H[fromfrom.GetName]§!의 사이오닉 활동에서 기원한 것으로 보고 있습니다."
 shroud.4191.desc_2.common: "관측 가능한 현실의 물질과 의식에 영향을 미칩니다. 관측 결과, 이러한 오라는 성계 간에 확산될 수 있는 것으로 나타났습니다."
 shroud.4191.desc_2.default: "§H'$PSIONIC_AURA$'§!로 불리게 된 이 에너지는 강력한 장막의 존재의 의지로부터 발생하며, $shroud.4191.desc_2.common$"
 shroud.4191.desc_2.knows_aura: "이 제국은 장막에서 기원하는 §H$PSIONIC_AURA$§!를 다루는 방법을 개발한 것으로 보이며, 이 에너지는 $shroud.4191.desc_2.common$"
 shroud.4191.desc_3.common: "방출원과의 관계가 변하지 않는 한 우리 영역에 미치는 영향이 [GetPositiveRivalAdj]일 것으로 예상됩니다."
 shroud.4191.desc_3.default: "[GetTelepathPlural]들에 따르면 이 에너지는 [GetBenevolentRivalAdj] 의도를 띄고 있기 때문에, $shroud.4191.desc_3.common$"
 shroud.4191.desc_3.contact: "[fromfrom.GetName](과)와의 [GetLessThanRivalAdj] 우호적인 관계를 고려할 때, $shroud.4191.desc_3.common$"
 shroud.4191.a.rival_organic: "$WORRYING$"
 shroud.4191.a.rival_default: "이상적이지 않은 전개군요."
 shroud.4191.a.organic: "장막에서 온 선물이군요."
 shroud.4191.a.default: "흥미로운 현상이군요."
 shroud.mindwarden.back: "$enclave.410.a$"
 shroud.4205.name: "[event_target:mindwarden_enclave_country.GetName]"
 shroud.4205.common: "반갑습니다. [event_target:mindwarden_enclave_country.GetName]의 대표로서 여러분께 말씀드리겠습니다."
 shroud.4205.desc: "$shroud.4205.common$\n\n저희의 임무는 §H장막§!과 그 해악을 퍼뜨리는 존재들의 위협으로부터 은하계를 수호하는 것입니다. 저희는 정신의 침공을 막고, 사이오닉 에너지로부터 안전한 은하계를 추구합니다.\n\n사이오닉 감지기 측정 결과에 따르면, 여러분은 무고한 것으로 보이는군요. 훌륭합니다. 저희가 여러분을 그러한 위협으로부터 기꺼이 보호해 드리겠습니다.\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.end: "반사이오닉 군사 지원이 필요하시거나 처분할 §H$zro_lower$§!가 있다면, 저희를 찾아 주시길 바랍니다."
 shroud.4205.desc.return: "다시 만나 반갑습니다. 저희 [event_target:mindwarden_enclave_country.GetName](은)는 귀하의 변함없는 협력을 소중히 여깁니다.\n\n사이오닉 감지기도 조용합니다. 여전히 §H장막§!에 물들지 않으신 것 같군요. 좋습니다. 아주 좋아요...\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.eotc: "암울한 시기입니다. 우리의 노력에도 불구하고, $end_of_the_cycle_color_article$이 도래하고야 말았습니다. 그 끔찍한 형상이 별들 사이를 배회하고 있습니다...\n\n$shroud.4205.desc.eotc.end$"
 shroud.4205.desc.eotc.end: "지금이야말로 우리가 하나로 뭉쳐 사이오닉 대재앙을 막아야 할 때입니다."
 shroud.4205.desc.merc_first: "파수꾼 동지 여러분, 좋은 소식이 있습니다. 첫 §H$gov_mindwarden_enclave$§! 설립이 완료되었습니다. $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_more: "파수꾼 동지 여러분, 좋은 소식이 있습니다. 우리의 §H$gov_mindwarden_enclave$§! 설립이 완료되었습니다. $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_back: "다시 만나 반갑습니다, 파수꾼 동지 여러분. 저희 §H[mindwarden_enclave_country.GetName]§!(은)는 귀하의 변함없는 협력을 소중히 여깁니다.\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning: "$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning.eotc: "$shroud.4205.desc.eotc.end$"
 shroud.4205.a: "장막이 무엇이죠?"
 shroud.4205.b: "§I$sr_zro$§!에 대해 논의하고 싶습니다."
 shroud.4205.c: "§Y$PSIONIC_AURA_PLURAL$§!에 어떻게 대응할 수 있습니까?"
 shroud.4205.d: "좋은 사이오닉 표적을 하나 알고 있습니다..."
 shroud.4205.e: "우리 내부의 £crime£ §Y[GetCrimeDeviancy]§!에 대한 도움이 필요합니다."
 shroud.4205.ef: "§Y군수 지원§!이 필요합니다."
 shroud.4205.f: "귀하의 병력을 활용하고자 합니다."
 shroud.4205.g: "§Y파수꾼§!을 한 명 보내주실 수 있습니까?"
 shroud.4205.h: "$end_of_the_cycle_article$에 관해 논의하고 싶습니다."
 shroud.4205.i: "귀하의 §Y창립 후원자§!로서 드릴 제안이 있습니다."
 shroud.shared_combating_the_shroud: "오늘부터 §H[mindwarden_enclave_country.GetName]§!(은)는 §H장막§!과 모든 형태의 사이오닉 악행에 대항하는 중요한 임무를 계속 수행할 것입니다.\n\n저희는 §H$zro_lower$§! 처분부터 병력 충원까지 다양한 반사이오닉 서비스를 신속하고 효과적으로 제공할 역량을 갖추고 있습니다."
 shroud.4210.desc: "§H장막§!은 일반적인 인지 영역 너머에 존재하는 현실의 또 다른 차원으로 이해하면 됩니다. 이곳은 전적으로 유해한 §H'사이오닉'§! 에너지로 이루어져 있으며 물리적인 은하 전역에 걸쳐 영향을 미치지만, 이를 의도적으로 인지할 수 있는 존재는 적습니다.\n\n장막의 에너지는 지각 있는 존재들의 인지 활동을 통해 물질 세계에 나타날 수 있으며, 그 힘은 극도로 위험하며 예측할 수 없습니다.\n\n귀국의 주민들이 안전을 보장받기 위해서는 장막에 대한 보호 조치가 필수적입니다. 저희가 그걸 도와드릴 수 있습니다."
 shroud.shared_text_shroud_seal: "이 정교한 기계들은 해당 성계와 그 성계에 초공간 항로로 직접 연결된 성계의 $PSIONIC_AURA$를 완전히 억제할 때까지 점진적으로 소멸시킬 것입니다."
 shroud.4230.desc: "§H$PSIONIC_AURA_PLURAL$§!를 억제하는 데는 두 가지 주요 방법이 있습니다.\n\n행성에 §H$building_psionic_suppressor$§!를 건설하면 성계 내 오라 강도를 점차 낮추고 추가 확산을 막을 수 있습니다.\n\n그보다 더 강력한 해결책은 §H$SHROUD_SEAL$§!입니다. $shroud.shared_text_shroud_seal$"
 shroud.4230.a: "아니, 됐습니다."
 shroud.4230.b: "§Y$tech_psionic_suppression$§!에 대해 가르쳐 주십시오."
 shroud.4231.desc: "물론입니다. 바로 데이터를 보내드리겠습니다.\n\n이 기술이 오라의 재앙으로부터 평화를 가져다주길 바랍니다."
 mindwarden_encourage_raid: "[event_target:mindwarden_enclave_country.species.GetNamePlural](을)를 고용해 우리가 아는 사이오닉 제국을 습격합니다."
 shroud.4240.need_psionics: "§Y$trait_psionic$§! 제국과 조우했습니다."
 shroud.4240.desc: "정말입니까? 은하계를 사이오닉으로 오염시키는 세력이 존재하는 한, 진정한 평화와 안전을 이룩할 순 없을 겁니다...\n\n집중적인 습격을 감행하면 이 위험한 행위에 대한 명확한 반대 의사를 보여줄 수 있을 겁니다. 여러분의 재정 지원과 함께라면, 저희는 기꺼이 습격을 강행할 준비가 되어 있습니다.\n\n동의하신다면 목표를 알려 주십시오."
 shroud.4240.a: "아, 방금 대화는 없던 걸로 하죠."
 shroud.4240.b: "§I[event_target:raid_target_1.GetName]§!"
 shroud.4240.c: "§I[event_target:raid_target_2.GetName]§!"
 shroud.4240.d: "§I[event_target:raid_target_3.GetName]§!"
 shroud.4240.e: "§I[event_target:raid_target_4.GetName]§!"
 mindwarden_raid_cooldown_tt: "§R§Y[root.mindwarden_raid_timer]§!까지 정신 파수꾼들에게 다른 습격을 요청할 수 없습니다.§!"
 mindwarden_hire_raid: "[event_target:mindwarden_enclave_country.GetName]를 고용해 해당 제국을 공격할 습격 함대를 파견합니다."
 shroud.4245.desc: "좋습니다. 그 사이오닉 활동에 대해서는 알고 있습니다. 습격을 감행하는 것이 타당하죠.\n\n지원에 감사드립니다. 곧 작전을 개시하겠습니다."
 mindwarden_raider_modifier: "정신 파수꾼 반사이오닉 습격자"
 shroud.4246.name: "$gov_mindwarden_enclave$ 습격"
 shroud.4246.common_1: "가로챈 통신에서, 이들이 우리 성계를 공격하도록 경쟁 세력에 의해 고용된 함대라는 것을 확인했습니다."
 shroud.4246.common_2: "공개 채널로 메시지를 보내며 우리와 직접 소통하려 하고 있습니다."
 shroud.4246.desc: "§H[event_target:mindwarden_enclave_country.GetSpeciesName]§!의 군사 함대가 우리 국경을 향해 다가오고 있습니다! $shroud.4246.common_1$ 그들은 $shroud.4246.common_2$"
 shroud.4247.desc: "알려지지 않은 군사 세력의 함대가 우리 국경을 다가오고 있습니다! $shroud.4246.common_1$ 자신들을 §H[event_target:mindwarden_enclave_country.GetSpeciesNamePlural]§!(이)라고 소개한 이들은 $shroud.4246.common_2$"
 NAME_Mindwarden_Corvette: "광신자"
 NAME_Mindwarden_Frigate: "감시자"
 NAME_Mindwarden_Destroyer: "심문관"
 NAME_Mindwarden_Cruiser: "퇴마사"
 NAME_Mindwarden_Battleship: "정화자"
 NAME_Mindwarden_Titan: "심판관"
 mindwarden_defense_modifier: "정신 파수꾼 방위군"
 shroud.4250.desc: "훌륭합니다. $zro_lower$를 저희에게 맡겨주시면, 이 강력하고도 널리 남용되는 물질에 관한 중요 연구를 진행할 수 있게 됩니다. 온 은하계에 도움이 되는 일이죠.\n\n그게 바로 우리가 은하 표준보다 훨씬 높은 가격으로 즈로를 매입하는 이유입니다."
 shroud.4250.a: "$shroud.mindwarden.back$"
 shroud.4250.b: "§I$sr_zro$§!가 뭐죠?"
 shroud.4250.c: "£sr_zro£ §I$sr_zro$§!를 넘겨 드리겠습니다."
 mindwarden_zro_explanation: "$resolution_category_galactic_market$ 표준가보다 5배 높은 가격으로 100 §Y$sr_zro$§!를 판매합니다."
 mindwarden_zro_cooldown_tt: "§R§Y[root.mindwarden_zro_timer]§!까지 정신 파수꾼들에게 $sr_zro$를 제공할 수 없습니다.§!"
 shroud.4251.desc: "§Y$sr_zro$§!는 희귀하고 극도로 불안정한 물질로, 그 효과를 제어하거나 예측하기가 어렵습니다. 의도했든 아니든, 즈로는 격렬한 에너지 폭발을 일으켜 대규모 파괴를 초래할 수 있습니다.\n\n이러한 특성은 §H장막§!과의 반응을 통해 생성되며, 이 때문에 사이오닉 능력자들 사이에서 약물로 섭취되는 등, 인기가 높습니다.\n\n저희는 $zro_lower$에 대해 더 깊이 연구하고 안전한 처분 방법을 개발하려고 합니다. 그래서 즈로에 대해 후한 대가를 지불하는 겁니다."
 shroud.4255.desc: "귀하의 기여에 감사드립니다."
 shroud.4260.desc: "그렇다면 [GetCriminalDeviant] 의도가 실제 행동으로 이어지기 전에 이를 감지할 수 있는 유능한 §Y$decision_thought_police$§!을 제공해 드리겠습니다.\n\n이들의 능력은 사이오닉 능력의 안전한 대체재로서 개발되었으며, 과학적인 기법을 통해 주민들의 인지 활동을 감시합니다. §H장막§!의 위험한 에너지를 활용하지 않고도 정신 상태에 대한 통찰을 제공하는 겁니다."
 shroud.4260.a: "$shroud.mindwarden.back$"
 shroud.4260.b: "§I$decision_thought_police$§!을 모집하겠습니다."
 mindwarden_decision_cooldown_tt: "§R§Y[root.mindwarden_decision_timer]§!까지 이 요청을 할 수 없습니다.§!"
 mindwarden_decision_explanation: "£decision£ §Y행성 결정§! 하나 잠금 해제: §Y$decision_thought_police$§!"
 shroud.4262.desc: "좋습니다. 그 방식이 매우 효과적이라는 걸 곧 알게 되실 것입니다."
 shroud.4265.desc: "물론입니다. 사실, 저희의 협력 과정에서 여러분의 군사 배치 전략에 개선할 수 있는 몇몇 부분을 이미 발견했습니다.\n\n물론 이 점은 여러분의 탓이 아니라, 단지 저희가 이 분야의 전문가이기 때문입니다. 이 문제에 관해 귀중한 협력자인 여러분께 기꺼이 도움을 드리고자 하니, 적절한 보상을 제공해 주신다면 영광으로 생각하겠습니다."
 shroud.4265.a: "$shroud.mindwarden.back$"
 shroud.4265.b: "좋습니다."
 mindwarden_logistics_cooldown_tt: "§R§Y[root.mindwarden_logistics_timer]§!까지 정신 파수꾼들에게 군수 지원을 요청할 수 없습니다.§!"
 shroud.4267.desc: "안녕하십니까, 귀중한 협력자 여러분.\n\n여러분의 함대 군수 활동 지원 계약이 만료되었음을 알려드립니다. 계속할 가치가 있다고 판단하신다면, 기꺼이 이 협력 관계를 이어 가고자 합니다."
 shroud.4267.a: "협력 관계를 이어 갑시다."
 shroud.4267.b: "지금은 거절하겠습니다."
 shroud.4266.desc: "좋습니다. 함대 지원 활동을 즉시 재개하겠습니다."
 shroud.4270.desc: "$NAME_Mindwarden_Army$은 탁월한 돌격 병사들입니다. 다양한 위협에 대응할 장비를 갖추고 있으며, 특히 사이오닉 적에게 효과적으로 맞설 수 있습니다.\n\n비용이 아깝지 않다고 느끼실 겁니다."
 shroud.4270.a: "$shroud.mindwarden.back$"
 shroud.4270.b: "§I$mindwarden_army$§!을 고용하겠습니다."
 mindwarden_army_cooldown_tt: "§R§Y[root.mindwarden_army_timer]§!까지 정신 파수꾼들에게 새로운 지상군을 요청할 수 없습니다.§!"
 mindwarden_army_explanation: "$transport$을 통해 수도 성계에 도착할 §Y$mindwarden_army$§! 지상군 하나를 채용합니다."
 shroud.4271.desc: "운이 좋으시군요. 배치 가능한 중대가 하나 준비되어 있습니다. 수송선으로 곧 도착할 겁니다."
 shroud.4280.desc: "기꺼이 그렇게 하겠습니다.\n\n§H장막§!과의 싸움에서는 효과적인 지도력이 아주 중요하죠. 저희 파수꾼들은 단호한 통치로 사이오닉 활동을 억제하는 데 능숙합니다."
 shroud.4280.a: "$shroud.mindwarden.back$"
 shroud.4280.b: "§I$subclass_commander_governor$§!을 고용하겠습니다."
 mindwarden_commander_explanation: "\n5레벨의 정신 파수꾼 $subclass_commander_governor$을 영입합니다."
 unlocks_mindwarden_council_position: "\n§E평의회 의석 잠금 해제 가능:§!\n§H$t$$councilor_mindwarden$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_country_unity_produces_mult$: §G+1%§!\n$ttt$$planet_crime$: §G-1%§!\n$ttt$$MOD_PSIONIC_AURA_RESISTANCE_MULT$: §G+5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$\n\n$COUNCIL_POSITION_REQUIREMENTS$$councilor_mindwarden_conditional_tooltip$"
 mindwarden_commander_already_bought: "§R이미 정신 파수꾼 엔클레이브에서 $subclass_commander_governor$을 데려왔습니다.§!"
 mindwarden_commander_conflicted_leader: "§R[event_target:shroudwalker_enclave_country.GetName] 출신 지도자가 없어야 합니다.§!"
 mindwarden_commander_cooldown_tt: "§R§Y[root.mindwarden_commander_timer]§!까지 정신 파수꾼들에게 다른 지도자를 요청할 수 없습니다.§!"
 mindwarden_commander_desc: "$gov_mindwarden_enclave$에서 영입된 이 지도자는 사이오닉 활동에 단호히 맞서며, 장막의 해로운 영향으로부터 주민을 보호합니다."
 mindwarden_commander_catch_phrase: "장막이 스며드는 상처는 지져서 없애야 합니다."
 shroud.4281.desc: "현명한 선택입니다. 그 통치가 앞으로 수년간 여러분의 주민을 안전하게 지켜주길 바랍니다."
 shroud.4286.name: "[FROM.GetName] 공격"
 mindwarden_farewell: "§L\"최근 $gov_mindwarden_enclave$에 대한 당신의 공격은 결코 용납할 수 없습니다. 어떤 형태로든 당신의 영역 안에서 활동하는 것은 도덕적, 윤리적으로 용납할 수 없습니다. 이 무의미한 적대적 행위를 즉각 중단할 것을 강력히 권고합니다. 그러나 당신이 앞으로 어떤 선택을 하든, 저는 이곳에 머물지 않을 것입니다.\"§!"
 shroud.4286.desc: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.end$"
 shroud.4286.desc.councilor: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.councilor_end$"
 shroud.4290.desc: "실로 중대한 사안입니다. $end_of_the_cycle_color_article$만큼 은하를 위협하는 재앙은 없으니까요."
 shroud.4290.a: "$marauder.31.e$"
 shroud.4290.b: "$end_of_the_cycle_color_article$이 뭐죠!?"
 shroud.4290.b.response: "우리 정보에 따르면 $end_of_the_cycle_color_article$는 §H장막§! 내부에서 찾아와 대재앙을 부르는 존재입니다. 그 힘은 권력을 탐하는 정신 침입자들의 공모를 통해 현실 세계에 모습을 드러내게 됩니다.\n\n순환의 끝은 §R$NAME_Reckoning$§!이라 불리는 사악한 존재를 통해 은하 전역에 파멸을 불러옵니다. 이 존재는 순수한 사이오닉 에너지로 이루어져 있으며, 그 궁극적인 목적은 세계의 완전한 말살입니다."
 shroud.4290.c: "어떻게 해야 §R$NAME_Reckoning$§!을 무찌를 수 있습니까?"
 shroud.4290.d: "§Y$mindwarden_tactics_modifier$§!에 대해 가르쳐 주십시오."
 shroud.4291.desc: "이 거대한 위협에 맞서 승리하시길 기원합니다. 그것은 이 은하를 고향이라 부르는 모든 생명을 위협하는 존재입니다."
 shroud.4292.desc: "저희가 §R$NAME_Reckoning$§!에 대한 공격을 강화할 수 있는 알고리즘을 개발했습니다. 이 알고리즘은 해당 유형의 사이오닉 존재에 대한 무기 조준 시스템을 조정하여 효율성을 높일 수 있습니다.\n\n단, 현재 상태로는 각 군사 기반 시설에 맞출 때마다 광범위한 코드 재구성을 거쳐야 합니다. 따라서 프리미엄 서비스로 제공되지만, 그만한 가치를 충분히 느끼실 수 있을 겁니다."
 mindwarden_tactics_modifier: "정신 파수꾼 전술"
 shroud.4295.desc: "$shroud.4205.common$\n\n저희는 여러분의 '$building_materiality_engine_plural$'에 관한 소식에 우려했지만, 추가 분석 결과 소위 §H'장막'§!의 비사이오닉 활용에 있어 잠재력을 지닌 발전으로 평가하고 있습니다.\n\n이 기술을 계속 개발하는 것을 장려하겠습니다. 여러분과 계속 협력하기를 기대합니다."
 mindwarden_opinion_materiality_engine_tt: "우호도: £opinion£ §G+$@mindwarden_opinion_materiality_engine|0$§!"
 shroud.4300.desc: "[mindwarden_enclave_country.GetName]의 대표로서 말씀드립니다.\n\n사이오닉 감지기 분석 결과, [Root.GetName] 전체가 §H장막§!에 되돌릴 수 없이 감염된 것으로 판단됩니다.\n\n당신의 행동이 파멸을 불러왔으며, 우리는 그 종말을 앞당길 것입니다."
 shroud.4300.a: "왜 장막을 두려워하는 거죠?"
 shroud.4310.desc: "우린 장막과 그 타락한 앞잡이들을 두려워하지 않습니다. 상대할 방법을 알고 있으니까요.\n\n그 영향에 빠져 광기에 사로잡힌 당신네 사회가 그걸 이해하리라 기대하지는 않습니다."
 shroud.4320.desc.psionic: "사이오닉으로 은하를 오염시킨 것으로도 모자랐습니까?"
 shroud.4320.desc.default: "우리는 은하계의 질서를 수호하는 세력입니다. 무엇을 위해 공격하는 겁니까? 우리는 적대 행위를 결코 좌시하지 않을 것입니다."
 shroud.4320.desc.common: "적대 행위를 완전히 중단하겠다는 확답 없이는 더 이상 대화하지 않겠습니다."
 shroud.4340.desc: "당신이 §H[shroudwalker_enclave_country.GetName]§!(과)와 거래한다는 사실을 알고 있습니다. 이는 그들의 잘못을 정당화할 뿐 아니라 §H장막§!의 감염 확산에 일조하는 행위입니다.\n\n놈들의 협력자로 남는 한 어떤 지원도 기대하지 마십시오."
 shroud.4350.desc: "§H[mindwarden_enclave_country.GetName]의 시설을 파괴한 뒤로 그들과 연락을 재개하지 못하고 있습니다.\n\n통신 채널에는 우주의 공허한 정적만이 흐를 뿐입니다.§!"
 enclave_opinion_tt: "우호도: £opinion£ §G+$@positive_opinion|0$§!"
 mindwarden_rival_opinion_tt: "[event_target:shroudwalker_enclave_country.GetName]에 대한 우호도: £opinion£ §R$@negative_opinion|0$§!"
 shroudwalker_rival_opinion_tt: "[event_target:mindwarden_enclave_country.GetName]에 대한 우호도: £opinion£ §R$@negative_opinion|0$§!"
 shroud.4405.title: "$gov_mindwarden_enclave$ 파괴"
 shroud.4405.desc_common: "[mindwarden_enclave_system.GetName] 성계에 대한 공격이 성공적이었습니다. §H[mindwarden_enclave_country.GetName]§!(은)는 더 이상 존재하지 않습니다."
 shroud.4405.desc.default: "$shroud.4405.desc_common$ 그들이 경멸하던 행위가 우리에게 큰 의미가 있는 건 아니었습니다. 하지만 §H장막§!에 대한 이들의 성전은 우리 은하에 설 자리가 없는 비과학적 독단주의에 불과했습니다."
 shroud.4405.desc.psionic: "$shroud.4405.desc_common$ 이번 공격으로 그들은 §H장막§!에 대한 무지한 독단주의를 더 이상 퍼뜨리지 못할 것입니다. 그 기지에 있던 사이오닉 감쇠기는 이제 잔해가 되었습니다."
 shroud.4405.desc_end: "기지 잔해에서 상당한 양의 자원을 회수해, 우리의 승리는 더욱 값졌습니다."
 shroud.4406.title: "$gov_mindwarden_enclave$ 파괴"
 shroud.4406.desc_common: "[mindwarden_enclave_system.GetName] 성계에 있던 §H[mindwarden_enclave_country.GetName]§!(이)가 더 이상 존재하지 않게 되었다는 보고가 들어왔습니다. $gov_mindwarden_enclave$는 §H[mindwarden_destroyer.GetName]§!의 공격에 무릎 꿇었고, 기지는 폐허가 되었으며 생존자도 없는 것으로 알려졌습니다."
 shroud.4406.desc.psionic: "은하계가 마침내 반사이오닉 성전의 고통에서 벗어났습니다. 물론, 그 자리를 대신할 존재가 나타나지 않는 한 말입니다."
 shroud.4406.desc.default: "은하계의 주민들은 당분간 반사이오닉 활동 없이 살아가야 할 것입니다."
 shroud.4406.a: "속이 시원하군요."
 shroud.6855.desc: "부디 다른 분들께도 전해 주십시오. [root.GetName](과)와 긴밀한 협력을 유지하게 되어 기쁩니다. 우리의 역사와 목표는 영원히 이어질 겁니다."
 shroud.6855.desc.1: "[mindwarden_enclave_country.GetName]에 대한 여러분의 기여에 진심으로 감사드립니다. 사이오닉 위협이 사라질 때까지 이 유대가 흔들리지 않기를 바랍니다."
 shroud.6855.desc.2: "다음 수익 분배금이 제때 지급될 것을 기대하셔도 좋습니다."
 shroud.6855.b: "엔클레이브 확장을 돕고 싶습니다."
 shroud.6855.b.timeout: "현재 엔클레이브가 신임 간부와 승무원을 모집하고 있습니다. §Y[mindwarden_enclave_country.upgraded_station_timer]§!까지는 추가적인 운영 개선을 시작할 수 없습니다."
 shroud.6855.c: "우리 기술을 공유하고 싶습니다."
 shroud.6855.c.timeout: "엔클레이브가 아직 이전에 제공한 우리 기술을 도입하고 있습니다. 새로운 기술 공유는 §Y[mindwarden_enclave_country.updating_databanks_timer]§! 이후에 가능합니다."
 shroud.6855.d: "우리 목적을 위해 활용할 §Y함대§!를 고용하고 싶습니다."
 shroud.6855.e: "$enclave.205.b$"
 shroud.6855.f: "정신 파수꾼 엔클레이브 수용력을 확장하고자 합니다."
 shroud.6855.f.timeout: "아직 엔클레이브 관련 기반 시설 변경 작업을 진행하고 있습니다. 정신 파수꾼 엔클레이브 수용력 확장은 §Y[mindwarden_enclave_country.mindwarden_enclave_capacity_bought_timer]§! 이후에 가능합니다."
 shroud.6860.1.desc: "추가 자금이 있다면 활동 규모를 크게 확장할 수 있습니다. 함대의 규모와 역량을 늘리고, 정신 보호 기술 개발을 위한 연구원도 더 많이 모집할 수 있을 것입니다. 궁극적으로는 여러분의 후원이 온 은하의 도움이 되는 겁니다."
 shroud.6860.2.desc: "끊임없이 변화하는 사이오닉 위협에 대한 경계를 늦춰서는 안 됩니다. 여러분의 아낌없는 기부는 저희가 이 문제에 대응하기 위해 활동을 크게 확장하는 데 큰 도움이 될 것입니다."
 shroud.6860.3.desc: "저희는 많은 성과를 이루었지만, 아직 안주하기에는 이릅니다. 더 많은 자원을 확보한다면 [mindwarden_enclave_country.GetName]의 함대는 은하계 곳곳에 더 광범위하게 배치되어, 사이오닉에 시달리는 더 많은 이들의 정신을 보호할 수 있을 것입니다."
 shroud.6860.4.desc: "여러분의 후원은 여정의 시작부터 큰 의미가 되어 주었으며, 사이오닉 위협을 완전히 근절해 정신적 건강을 증진하자는 저희의 공동 목표 역시 변함없습니다. 여러분의 도움 덕분에 저희는 한 걸음씩 목표에 가까워지고 있습니다."
 shroud.6860.5.desc: "만약 다시 한번 저희 활동에 투자해 주신다면, 저희는 은하계에서 가장 강력한 반사이오닉 세력으로 성장하여, 별들 사이의 모든 국가를 위해 정신 침입을 방어하는 최고의 요새로 거듭날 것입니다."
 shroud.6860.b: "거래 성립입니다."
 shroud.6861.desc: "감사합니다. 모든 지적 존재의 정신적 온전함을 지키기 위해 여러분과 일할 수 있어 자랑스럽습니다."
 shroud.6865.desc: "훌륭합니다. 은하계에 $ENCLAVE_MINDWARDEN_PLURAL$가 많아질수록, 모든 정신이 침입으로부터 더 안전해질 것입니다.\n\n더 많은 엔클레이브를 설립하고 관리할 수 있도록 여러분의 기반 시설 효율성을 개선하는 방법에 대한 자문도 제공해 드릴 수 있습니다."
 shroud.6865.b.tt: "$mindwarden_enclave_capacity$: §G+1§!"
 shroud.6870.desc: "연구 성과를 기꺼이 공유해 주셔서 감사합니다. 여러분이 제공하는 모든 지식은 은하계의 사이오닉 위협 방어력을 강화하는 데 큰 도움이 될 것입니다."
 shroud.6875.desc: "기꺼이 응하겠습니다. [mindwarden_enclave_country.GetName]의 함대는 반사이오닉 기술과 전술의 최전선에 서 있으며, 그 어떤 정신 침입 공격자라도 감히 이 함대에 맞설 수 없습니다. 각 함대에는 사이오닉 적을 상대하는 작전에 특별히 훈련된 지휘관이 배치되어 있습니다."
 mindwarden_tt_hirefleet: "이 엔클레이브의 §Y정신 파수꾼 함대§!를 10년 동안 지휘합니다."
 shroud.6876.desc: "§H[mercenary_fleet.GetName]§!(이)가 파괴적인 사이오닉 힘을 휘두르는 자들을 상대하는 데 효과적인 도구가 될 것이라 믿습니다."
 mindwarden_tt_managefleet: "§Y정신 파수꾼 함대§! 계약을 취소하거나 연장합니다."
 shroud.6880.desc: "물론입니다. §H[mercenary_fleet.GetName]§!(이)가 당신의 전력에 유용한 자산이 되었기를 바랍니다. 계약을 종료하시겠습니까, 아니면 연장하시겠습니까?"
 shroud.6880.a: "$marauder.31.e$"
 shroud.6881.desc: "알겠습니다. 계약은 무효화되며, §H[mercenary_fleet.GetName]§!(은)는 곧바로 저희에게 반환됩니다. 필요하실 때 언제든 저희 함대를 다시 고용하실 수 있습니다."
 #======================
 # Mindwardens origin
 #======================
 origin_mindwardens: "$MINDWARDEN_plural$"
 origin_mindwardens_desc: "$CHALLENGING_ORIGIN$§R경고: ['concept_psionic_ascension']이 차단됩니다.§!\n\n이 문명의 선조들은 정신을 침범하는 외계 세력에 시달렸으며, 반사이오닉 기술 개발에 많은 노력과 자원을 쏟았습니다.\n\n고대 장치들은 여전히 작동하지만, 더 큰 은하에서 오는 사이오닉 위협 상대로는 아직 검증되지 않았습니다."
 origin_tooltip_mindwardens_effects: "- $ADDITIONAL_TECHNOLOGIES_STRING$ £engineering£ ['technology:tech_starbase_3']\n- $HOME_SYSTEM$ §H$tech_starbase_3$§!을 가진 채 시작합니다.\n- $HOMEWORLD$ £building£ ['building:building_ancient_ward_1']\n- 사이오닉 승격을 이룬 제국들을 대상으로 §Y$casus_belli_cb_psionics_containment$§! §H전쟁 명분§!을 사용할 수 있게 됩니다.\n- §Y$FE_GUARANTEED_COLONIES$§!이 적용되지 않습니다.\n- §Y$ENCLAVE_MINDWARDEN_PLURAL$§!는 게임 시작 시 생성되지 않습니다."
 SPECIES_CLASS_MUST_USE_ORIGIN_MINDWARDENS: "§Y['civic:origin_mindwardens'] 기원§!이 필요합니다."
 START_SCREEN_MINDWARDENS: "우리 선조들의 기록에는 한때 [GetHomeWorldName](을)를 황폐화했던 정신 역병에 관한 이야기가 전해집니다. [GetSpeciesAdj] 사회 내부의 사이오닉 능력자들의 주도하에 이계의 힘이 선조들의 정신을 공격했고, 파괴적인 방사선이 대기 중에 퍼져 나갔습니다.\n\n이러한 위협에 맞서기 위해 우리 선조들은 정신 침투 세력을 차단하는 $building_ancient_ward_1$를 구축했습니다. 일상적인 유지보수만으로도 이 고대의 구조물은 모든 [GetSpeciesNamePlural](을)를 사이오닉 영향의 위협으로부터 견고히 지켜냈습니다. 또한, 이 핵심 기술은 다른 정신 방어 장치의 개발에 귀중한 정보를 제공했습니다.\n\n우리 문명이 [capital_scope.System.GetName]의 궤도를 넘어 미지의 세계로 나아갈 준비를 하는 지금, 우리는 알 수 없는 존재들과 마주하게 되었습니다. 과연 어떤 정신적 위협이 우리 이해 너머에 도사리고 있을까요?"
 mindwarden_system_init_NAME: "$origin_mindwardens$"
 mindwarden_system_init_DESC: "$origin_mindwardens$ 기원을 사용하면 항상 이것이 시작 성계가 될 것입니다.\n\n$system_initializer_DESC$"
 mindwarden_sol_system_init_NAME: "$origin_mindwardens$(태양)"
 mindwarden_sol_system_init_DESC: "$origin_mindwardens$ 기원 사용 시 선택할 수 있는 시작 성계로, 태양을 근거지로 삼습니다.\n\n$system_initializer_DESC$"
 building_ancient_ward_1: "고대 방어소"
 building_ancient_ward_1_desc: "이 고대 구조물은 사이오닉 감쇠기 배열체를 통해 정신을 침투하는 세력으로부터 행성 전체를 보호합니다."
 building_ancient_ward_2: "대방어소"
 building_ancient_ward_2_desc: "이 고대 구조물은 강화된 사이오닉 감쇠기로 업그레이드되어, $PSIONIC_AURA_PLURAL$로부터 성계 전체를 보호할 수 있습니다."
 psionic_auras_immunity: "성계 내 §Y$PSIONIC_AURA_PLURAL$§!를 점진적으로 소멸시킵니다."
 mindwarden_aura_immunity: ""
 war_goal_wg_end_threat_psionics: "$war_goal_wg_end_threat$"
 war_goal_wg_end_threat_psionics_desc: "사이오닉 감염의 위협에 맞서 은하를 수호하기 위한 전쟁입니다."
 casus_belli_cb_psionics_containment: "사이오닉 격리"
