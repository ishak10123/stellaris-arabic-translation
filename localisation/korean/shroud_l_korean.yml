 psi_fighting_conscription_desc: "지하에서 활동하던 사이오닉 싸움꾼들이 우리 군에 합류해 전력을 강화했습니다. 하지만 정규 절차를 밟아 입대한 신병이 모두 그 존재를 달갑게 여기는 것은 아닌 듯합니다."
 psi_fighting_conscription_gestalt: "$psi_fighting_conscription$"
 psi_fighting_conscription_gestalt_desc: "지하에서 활동하던 사이오닉 싸움꾼들이 우리 군에 합류해 전력을 강화했지만, 그 일탈 요소를 통합하는 일은 여전히 해결해야 할 과제로 남아 있습니다."
 psi_fighting_research: "사이오닉 전투 연구"
 psi_fighting_research_desc: "지하에서 활동하는 사이오닉 싸움꾼들은 흥미로운 연구 대상입니다."
 psi_fighting_prohibition: "사이오닉 전투 금지령"
 psi_fighting_prohibition_desc: "불법 사이오닉 전투 유행이 가라앉으며 우리 식민지는 더욱 안전해졌습니다."
 psi_fighting_competitions: "사이오닉 전투 대회"
 psi_fighting_competitions_desc: "사이오닉 전투는 최고의 관람형 스포츠가 될 잠재력이 있습니다."
 psi_fighting_competitions_gestalt: "$psi_fighting_competitions$"
 psi_fighting_competitions_gestalt_desc: "사이오닉 전투는 집단에 있어 수용 가능한 형태의 오락 수단이 되었습니다."
 shroudfall: "장막 유하"
 shroudfall_desc: "장막이 이 땅의 일부를 침식했습니다. 현재 이전 상태로 복구하기 위한 방법을 연구 중입니다."
 add_shroudfall_concept: "[This.GetName]에 ['concept_shroudfall'] 추가"
 impulse_mitigation: "충동 완화"
 impulse_mitigation_desc: "사이오닉 존재가 우리의 행동에 영향을 주고 있습니다. 이러한 충동을 완화할 방법을 찾기 위해 과학적 자원을 투입했습니다."
 shroud_influence: "들려오는 목소리"
 shroud_influence_desc: "우리의 정신은 사이오닉을 통해 우리와 교감하는 존재들의 영향을 받고 있습니다."
 shroud_suppression: "충동 억제"
 shroud_suppression_desc: "사이오닉 존재가 우리의 행동에 영향을 주고 있습니다. 이 이질적인 충동을 억눌러야 합니다."
 psionic_inhibitors: "사이오닉 억제기"
 psionic_inhibitors_desc: "우리는 사이오닉 활동으로 인해 발생하는 정신적 교란을 막아 줄 삽입물 개발에 투자하고 있습니다."
 psionic_inhibitors_machine: "$psionic_inhibitors$"
 psionic_inhibitors_machine_desc: "우리는 사이오닉 활동이 신경 회로에 미치는 교란 현상을 막아 줄 업그레이드 개발에 투자하고 있습니다."
 psionic_meditation: "사이오닉 명상"
 psionic_meditation_desc: "사이오닉 활동으로 인해 발생하는 정신적 교란을 완화하기 위해, 주민들을 위한 개선된 명상법을 연구 중입니다."
 psionic_meditation_machine: "$psionic_meditation$"
 psionic_meditation_machine_desc: "사이오닉 활동으로 인해 발생하는 신경 회로 교란을 완화하기 위해, 우리 인구를 위한 개선된 명상법을 연구 중입니다."
 psionic_training: "사이오닉 훈련"
 psionic_training_desc: "우리의 정신에 가해지는 사이오닉 간섭은 사이오닉 에너지를 성장시킬 기회이기도 합니다. 선제적인 접근 방식을 동원한다면 전반적으로 최적의 결과를 달성할 수 있는 효과적인 사이오닉 중심 전략을 수립할 수 있을 것입니다."
 sleep_disturbance_research: "수면 방해 연구"
 sleep_disturbance_research_desc: "사이오닉 에너지가 우리의 수면 주기를 방해하고 있습니다. 악몽을 막을 방법을 찾기 위해 자원을 투입했습니다."
 night_terrors: "밤의 공포"
 night_terrors_desc: "사이오닉 에너지가 섬뜩한 악몽을 선사하며 우리의 수면 주기를 방해하고 있습니다."
 night_terrors_gestalt: "$night_terrors$"
 night_terrors_gestalt_desc: "$night_terrors_desc$"
 shroud_portal: "장막 차원문"
 shroud_portal_desc: "장막으로의 침투를 시도하자 현지 야생 생물들이 식민지를 공격하기 시작했습니다. 아마도 이것이 우리가 사이오닉 발전을 위해 치러야 할 대가인 것 같습니다."
 shroud_portal_gestalt: "$shroud_portal$"
 shroud_portal_gestalt_desc: "$shroud_portal_desc$"
 mindwarden_enclave_capacity: "$gov_mindwarden_enclave$ 수용력"
 mindwarden_enclave_capacity_desc: "더 많은 독립적 $ENCLAVE_MINDWARDEN_PLURAL$를 건설할 능력을 확보함으로써, 은하계 전역에서 사이오닉 감염을 종식하기 위한 임무를 한층 더 진전시킬 수 있습니다."
 mindwarden_logistics: "정신 파수꾼 군수"
 mindwarden_logistics_desc: "정신 파수꾼의 군수 지원 덕분에 함대 운영이 한층 수월해졌습니다."
 survivors_of_the_end_modifier: "종말의 생존자들"
 survivors_of_the_end_modifier_desc: "막대한 피해에도 불구하고 우리는 파국적인 의도를 지닌 $PSIONIC_AURA$를 가까스로 버텨냈습니다."
 penal_experimental_sentencing: "이상적인 실험 환경"
 penal_experimental_sentencing_desc: "우리가 설립한 형벌 식민지는 고강도 실험을 수행하기에 이상적인 시험장입니다."
