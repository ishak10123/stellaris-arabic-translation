 policy_psionic_choir_desc: "텔레파시 능력자들이 모여 장막의 에너지와 조화를 이룹니다. 이들이 자아내는 선율은 제국의 사이오닉 인구와 공명하며, 모두의 의지를 한데 모으고 고양시킵니다."
 song_of_calming: "평온의 노래"
 song_of_calming_desc: "마음을 평온하게 만드는 사이오닉 발라드입니다.\n\n"
 song_of_plenty: "풍요의 노래"
