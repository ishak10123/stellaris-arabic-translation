 resolution_galactic_focus_repeal_crisis_malevolent_aura_desc: "여기까지입니다. 방위 활동의 우선 목표로 지정된 제국을 더 이상 표적으로 간주하지 않으며, 은하 공동체 회원국과의 적대행위를 즉시 중단합니다."
 resolution_galactic_focus_crisis_malevolent_aura: "사안: 악의 어린 오라"
 resolution_galactic_focus_crisis_malevolent_aura_desc: "악의 어린 사이오닉 오라가 은하계에 퍼지며 모두를 위협하고 있습니다. 이러한 사이오닉 오라에 맞서 방어하고, 이를 방출하는 제국과 싸우기 위해 단결할 필요가 있습니다. 이것을 우리의 은하적 사안으로 삼아야 합니다."
 resolution_galactic_focus_crisis_malevolent_aura_effect_success: "$resolution_galactic_focus_crisis_effect_success$\n[global_event_country.GetGalCommunityOrGalImperium] 내 모든 제국의 §H$tech_psionic_suppression$§! 기술 진행도: §G+25%§!"
