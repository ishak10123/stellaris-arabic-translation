 #MACHINE AGE TRAITS #
 ######################
 #CYBORG
 trait_cyborg_stainless_steel_smile: "화려한 증강물"
 trait_cyborg_stainless_steel_smile_desc: "이 종족은 시각적 효과를 극대화하는 커스텀 각인과 애프터 마켓 부품, 도색을 즐겨 찾습니다. 번쩍이는 크롬을 과시하는 게 유일한 해결책일 때도 있습니다."
 trait_cyborg_welded_countenance: "실용적 증강물"
 trait_cyborg_welded_countenance_desc: "이 사이보그들은 미적 요소에는 별다른 관심이 없어, 투박하지만 기능적인 부품들을 달고 살아갑니다. 맡은 일을 잘하는 게 최고입니다."
 trait_cyborg_apathy_loops: "거친 삽입물"
 trait_cyborg_apathy_loops_desc: "이 사이보그들에 장착된 삽입물은 거칠고 몸에 잘 맞지 않아, 피하 발진을 유발하는 데다 고장도 잘 납니다. 몸에 큰 이상은 없지만, 정신적으로는 끔찍합니다."
 trait_cyborg_bionic_engineers: "바이오닉 공학자"
 trait_cyborg_bionic_engineers_desc: "전용 정밀 도구와 개조 삽입물이 까다로운 공학 작업을 도와줍니다."
 trait_cyborg_bionic_physicists: "바이오닉 물리학자"
 trait_cyborg_bionic_physicists_desc: "통합 다중 모드 처리를 통해, 외부 연산 장치에 연결하지 않고도 즉석에서 물리학 계산을 시행합니다."
 trait_cyborg_bionic_sociologists: "바이오닉 사회학자"
 trait_cyborg_bionic_sociologists_desc: "공감 능력 드라이버와 행동 휴리스틱을 적용해 사회학 연구 속도를 높이고, 마치 제2의 뇌가 있는 것처럼 복잡한 분석을 수행합니다."
 trait_cyborg_integrated_weaponry: "일체형 무기"
 trait_cyborg_integrated_weaponry_desc: "사이버네틱 부속지에 각종 무기를 융합해, 지상군과 법 집행관에게 즉각적인 화력을 제공합니다."
 trait_cyborg_delicate_frames: "연약한 골격"
 trait_cyborg_delicate_frames_desc: "이 사이보그 몸체는 저질 부품과 수준 이하의 설치 작업으로 인해 약해진 상태입니다. 기본 작업에는 지장이 없지만, 신체적 외상이 발생할 가능성이 높은 상황은 피하는 것이 권장됩니다."
 trait_cyborg_scarcity_algorithms: "절약 알고리즘"
 trait_cyborg_scarcity_algorithms_desc: "비용을 민감하게 인식하는 코딩으로 인해 위험 감수 행동에 소극적인 태도를 보이며, 높은 수익을 올릴 기회를 거부합니다."
 trait_cyborg_limited_memory: "제한된 메모리"
 trait_cyborg_limited_memory_desc: "작업 메모리가 부족한 탓에 학습 능력에 병목 현상이 생겨, 사용자가 자기 경험을 모두 처리하지 못하고 있습니다."
 trait_cyborg_climate_adjustment_dry: "건조 기후용 개조"
 trait_cyborg_climate_adjustment_dry_desc: "액체 재활용이나 복사열 차폐막 등 맞춤형 개조 삽입물이 건조 기후를 완벽하게 견뎌낼 수 있게 해 주지만, 다른 기후에는 적합하지 않습니다."
 trait_cyborg_climate_adjustment_dry_tt: "저습 기후 거주 적합도: §G+$@cyborg_hab_preference|0%$§!\n$t$- 저습 기후를 가진 행성에서 거주 적합도를 최대 §G125%§! 부여하고, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_wet: "습윤 기후용 개조"
 trait_cyborg_climate_adjustment_wet_desc: "습한 기후에 적합한 강화 절연층 및 외계 생명체 대비 보호책이 적용되어 있으나, 다른 기후에서는 오히려 방해가 됩니다."
 trait_cyborg_climate_adjustment_wet_tt: "습윤 기후 거주 적합도: §G+$@cyborg_hab_preference|0%$§!\n$t$- 습윤 기후를 가진 행성에서 거주 적합도를 최대 §G125%§! 부여하고, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_cold: "냉대 기후용 개조"
 trait_cyborg_climate_adjustment_cold_desc: "발열 부품을 강화하고 내빙 윤활유를 적용해 냉대 기후에서는 도움이 되지만, 다른 기후에서는 방해가 됩니다."
 trait_cyborg_climate_adjustment_cold_tt: "냉대 기후 거주 적합도: §G+$@cyborg_hab_preference|0%$§!\n$t$- 냉대 기후를 가진 행성에서 거주 적합도를 최대 §G125%§! 부여하고, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_mass_produced: "삽입물 재활용"
 trait_cyborg_mass_produced_desc: "필수 삽입물에 하위 호환성을 강제하여 새로 태어난 시민에게 삽입물을 장착하는 비용이 크게 절감됩니다."
 trait_cyborg_propaganda_machines: "순응 필터"
 trait_cyborg_propaganda_machines_desc: "피질 분석 유닛은 선동적인 생각에 반응하여 그 즉시 사용자에게 충격을 가하고, 모범적인 시민에게는 호르몬 보상을 제공할 수 있습니다."
 #MACHINE
 trait_robot_artificial_engineers: "공학 코어"
 trait_robot_artificial_engineers_desc: "공학 관련 연구 전용 메모리 코어와 처리 자원 덕분에 계산 및 작업 속도가 향상됩니다."
 trait_robot_artificial_physicists: "물리학 코어"
 trait_robot_artificial_physicists_desc: "물리학 연구용 맞춤형 처리 장치와 메모리 서브루틴을 적용해, 외부 연산 장치에 대한 의존도를 줄였습니다."
 trait_robot_artificial_sociologists: "사회학 코어"
 trait_robot_artificial_sociologists_desc: "다양하고도 까다로운 사회학 연구를 위해, 첨단 처리 장치에 전용 연구 알고리즘을 설치했습니다."
 trait_robot_integrated_weaponry: "일체형 무기"
 trait_robot_integrated_weaponry_desc: "전쟁 무기를 기계 신체 내부에 일체화해, 끊임없이 변화하는 전투 환경에서의 운용 효율성과 유연성을 높입니다."
 trait_robot_delicate_frames: "연약한 뼈대"
 trait_robot_delicate_frames_desc: "이 기계 신체는 강도가 약한 재료와 저질 조립 공정으로 인해 매우 부서지기 쉽습니다. 물리적 위해 요인을 가급적 피하는 것을 권장합니다."
 trait_robot_scarcity_algorithms: "절약 서브루틴"
 trait_robot_scarcity_algorithms_desc: "이들은 근검절약에 중점을 두고 프로그래밍되었습니다. 그 결과 수익성 높은 거래 행위를 기피하는 해로운 행동 패턴에 빠질 때가 많습니다."
 #Pre-Scripted Empires
 EMPIRE_DESIGN_BASIDRIX_CYBER_ECCLESIA: "베이시드릭스 사이버 에클레시아"
 EMPIRE_DESIGN_basidrix_cyber_ecclesia_desc: "베이시드릭스 사이버 에클레시아는 이 신성한 우주 공간에서 불굴의 신앙적 상징으로 우뚝 서 있습니다. 거룩한 사명을 따르는 에클레시아는 섬유질 조직과 차갑고 정밀한 크롬 사이의 숭고한 융합을 숭상합니다.\n\n지금까지 걸어온 길에 시련이 없지는 않았습니다. 많은 종파의 탄생과 쇠퇴가 있었으며, 저마다 자신만이 진실을 알고 있다고 굳게 믿었습니다. 그와 같은 믿음은 반드시 불꽃을 일으킬 수밖에 없듯, 에클레시아의 역사는 피와 부서진 철로 쓰였습니다. 그러나 그러한 투쟁의 역사는 흔들리지 않는 신념으로 무장한 민족을 만들어 냈습니다.\n\n이제 에클레시아는 새로운 투쟁의 장이 무한히 펼쳐진 별들의 세계로 들어섭니다. 이들을 기다리는 것은 믿음의 시련일까요, 구원의 기회일까요? 신도들은 광활한 우주 공간으로 나아가며, 오직 한 가지 신념만을 가슴에 품습니다.\n\n융합은 신성한 것이며, 증강이 곧 경배입니다."
