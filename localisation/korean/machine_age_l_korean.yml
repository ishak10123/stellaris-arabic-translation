 EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE: "라세르탄 기술 보호국"
 EMPIRE_DESIGN_lacertan_techno_protectorate_desc: "라세르탄 문화는 철학과 과학의 교차점에 위치합니다. 라세르탄들이 궁극적으로 추구하는 것은 진정한 자신을 표현하는 것입니다. 정신을 진실하게 '나타낸다'는 것은 어떤 것일까요? 모방체가 과연 개인의 총체성을 진정하게 포착할 수 있을까요? 이러한 화두가 줄곧 라세르탄 전통의 주를 이뤘습니다.\n\n가상 현실이 등장하고 인공 지능이 획기적으로 발달하면서, 라세르탄들은 자신들의 예술적, 기술적 표현을 위한 새로운 개척지를 발견했습니다. 이들은 가상 세계를 캔버스 삼아 그 어느 때보다 야심 찬 작품을 만들어, 실제 현실의 한계를 뛰어넘는 몰입적 경험을 선사했습니다.\n\n그러던 중 쇠퇴가 찾아왔습니다. 불치의 유전병에 걸려 자연 생식을 할 수 없게 된 라세르탄들이 믿을 것은 이제 디지털 구원뿐입니다. 디지털 존재로의 전환이라는 과업은 생존을 위한 절박한 몸부림이지만, 동시에 라세르탄 문화에 있어 새로운 기회이기도 합니다. 라세르탄들은 디지털 영역에서 계속 존재의 의미를 묻고, 자신들의 문화를 보존하기 위해 정진할 것입니다."
