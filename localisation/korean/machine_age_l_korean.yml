 building_nanotech_cauldron_desc: "이 나노봇 무리는 분자 수준에서 작동해, 광물 구조를 격자형의 단단한 합금으로 재구성할 수 있습니다."
 d_nanotech_devastation: "£blocker£ 나노봇 수확 분지"
 d_nanotech_devastation_desc: "이 분지는 새로운 나노봇을 생성하기 위해 자원을 추출하고 남은 곳으로, 이 행성을 벌거숭이로 만든 무자비한 채취가 남긴 상흔을 보여 줍니다."
 situation_nanotech_consume_planet: "[Target.GetName]에서 나노봇 추출"
