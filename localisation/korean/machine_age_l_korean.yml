 district_cosmogenesis_world_science_plural: "신경 게이트"
 district_cosmogenesis_world_science_desc: "수많은 주민의 상상력을 취합해, 우리는 더욱 고차원적인 가설에 대한 모의 분석을 빠르게 수행할 수 있게 되었습니다. 논리 게이트와 유기체 기억 저장소로 이루어진 복잡한 구조를 통해 타의 추종을 불허하는 정확한 결과를 생성합니다."
 district_cosmogenesis_world_logic: "확장형 추측기"
 district_cosmogenesis_world_logic_plural: "확장형 추측기"
 district_cosmogenesis_world_logic_desc: "이 지구는 변증법적 형이상학이 낳은 경이로, 신경칩을 이용해 현실에 관한 형식적 진술에 내포된 진실을 확인합니다. 즉, 시냅스 가공기에 들어간 주민들의 집단정신이 만들어낸 한없이 복잡한 질문에 '예/아니오'로 대답하는 것입니다."
