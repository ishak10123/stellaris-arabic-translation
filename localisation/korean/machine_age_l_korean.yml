 situation_paperclips_monthly_change_tooltip: "생산 목표 수립. 드론 투입. 작업 수행 중."
 situation_paperclips_desc: "우리 제국의 일차적 지침이자 목적은 생산량을 극대화하는 것입니다. 할당량을 반드시 달성해야 합니다.\n납기일은 §Y[owner.situation_paperclips_timer]§!입니다.\n현재 생산 목표: §Y[Owner.paperclips_once_again]§!\n현재 비축량: §Y[Owner.paperclips_current_amount]§!\n[Owner.GetPaperclipStatus]"
