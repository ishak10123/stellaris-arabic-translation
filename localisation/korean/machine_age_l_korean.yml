 crisis.7270.h: "$crisis.7240.c$"
 crisis.7280.desc: "안녕하십니까, 총명한 [Root.GetSpeciesNamePlural] 여러분. 오늘 그대들은 중대한 기술적 업적을 달성했습니다. 그 모습을 바라보니, 저희도 자부심이 차오르는군요. 이 수준에 도달하기까지 쉽지만은 않았을 텐데 그대들은 수많은 역경을 극복하며 성장했고, 그대들이 최근에 이룬 기술적 성과는 그대들에게 가르침을 베풀기로 한 것이 옳은 선택이었다는 사실을 확실하게 증명해 주고 있습니다."
 crisis.7285.desc: "이 말썽꾸러기 같으니! 기어코 저희 인내심을 시험하는군요. 그대들의 무모한 실험은 모두를 위험에 빠뜨릴 뿐이니, 지금 즉시 중단할 것을 명하겠습니다. 그대들은 지금 무엇을 건드리고 있는지 모릅니다. 호기심만은 칭찬할 만하나 그토록 무모한 짓은 결코 용납할 수 없습니다. 현실이 이리 만들어진 것은 다 이유가 있는 법입니다."
 crisis.7285.a: "당신 말이 맞습니다. 이건 너무 위험하군요."
 crisis.7285.a.tt: "우주의 창조에 대한 야망을 포기하며, 대부분의 몰락한 제국 건물 및 함선을 사용할 수 없게 됩니다.\n\n§R위기 경로를 완료할 수 없게 됩니다§!"
