 cosmogenesis_needle_DESC: "우주의 법칙에 대한 저항을 현실화한 이 함선은 현실을 수정하는 능력을 갖추고 있습니다. 블랙홀에 있는 사건의 지평선을 관통해, 무한한 밀도가 무한한 중력을 낳는 특이점의 심장부로 뛰어들 수 있도록 설계되었습니다."
 cosmogenesis_needle_MEGASTRUCTURE_DETAILS: "우리가 스스로 만든 현실로 오르기 위해서는 우리 문명 전체를 지평의 바늘에 태워 이 우주를 영영 떠나야 합니다."
