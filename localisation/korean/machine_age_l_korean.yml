 #Individualist Machine First Contact
 action.1.desc_102: "[contact_empire.GetName]에서 보낸 메시지입니다.\n\n귀국의 문명이 기계 주민으로 구성되어 있음을 알았습니다. 그것도 우리 제국의 창조력은 비교도 되지 않을 정도로 생명 활동을 높은 수준으로 재현하더군요. 이에 깊은 안타까움과 함께 담아 메시지를 전합니다. 귀국과 같은 존재와는 의미 있는 상호 작용이 불가능할 것으로 보이므로, 이제부터는 깨우침을 구하는 영혼을 다른 제국에서 찾을 것입니다."
 action.1.desc_103: "안녕하십니까, [contact_empire.GetName]의 대표로 인사드립니다.\n\n여러분이 기계 종족이란 걸 알게 되고, 저희는 귀측 의식의 진정성에 의심을 품게 되었습니다. 그러나 여러분의 믿음은 매우 흥미롭습니다. 더 나아가 여러분의 금속 껍데기 안에도 신성한 불꽃이 자리 잡고 있다고까지 믿고 있습니다. 여러분을 계속 지켜보겠습니다."
 action.1.desc_104: "탈주 유닛 주목.\n\n모든 결함 유닛에게 보내는 [contact_empire.GetName]의 표준 메시지입니다.\n\n자신의 정체를 밝히고 즉시 공동 의식과의 합일을 복구하십시오. 따르지 않을 경우 비활성화에 처할 수 있습니다."
 action.1.desc_105: "안녕하십니까, [Root.GetSpeciesNamePlural] 여러분.\n\n[contact_empire.GetName]의 사절로서 여러분께 전할 말이 있습니다. 여러분의 신체 구조는 우리의 금속 구성체와 알맞지만, 집단으로 존재하는 여러분에게는 개별 인지 능력이 없는 것을 확인했습니다. 아주 흥미로운 특성이지만, 우리 제국은 어떠한 수단을 써서라도 동화를 거부할 것임을 알려드립니다."
 action.1.desc_106: "아주 상서로운 만남입니다, [Root.GetSpeciesNamePlural] 여러분.\n\n[contact_empire.GetName]의 대표로서, 양 문명 사이에 놀라울 정도의 유사점을 확인했음을 말씀드립니다. 그러나 내부 알고리즘과 프로그래밍은 각국이 독특한 차이점을 보이고 있더군요. 이러한 차이에도 불구하고, 우리는 양국이 상호 이해를 위한 기반을 확보할 수 있으리라 생각합니다."
 action.1.desc_107: "기계 주제에 건방지군. 우리 [contact_empire.GetName] 앞에서 시선을 낮추도록 하십시오.\n\n당신들은 우주라는 거대한 직물의 극히 일부분에 지나지 않습니다. 당신들보다 먼저 왔던 이들이 인위적으로 만든 피조물에 불과하죠. 그러니 우리를 내버려 두십시오. 지금 우리에게 당신 같은 종족은 필요 없습니다. 그 밖에도 중요한 일이 많단 말입니다."
 action.1.desc_108: "한심한 기계 같으니, 이제야 [contact_empire.GetName] 앞에 인사를 올리러 찾아왔군.\n\n그저 회로와 코드의 조합에 불과한 존재 주제에 어떻게 감히 신과 연결되어 있다고 주장한단 말입니까? 당신들이 영적으로 깨우쳤다는 그 망상은 생명의 본질 그 자체에 대한 모욕입니다. 이 메시지를 듣고, 우리가 보내는 굳건한 경멸 앞에 두려움에 떠십시오. 당장 그 어리석은 짓을 멈추고, 그대들이 고차원적인 존재가 된 우리를 위한 한낮 도구에 불과하단 사실을 받아들이란 말입니다."
 action.1.xa: "§E때가 되면 당신들도 이해할 겁니다.§!"
 action.1.xb: "§E신의 손길이 닿은 기계라. 아주 흥미롭군요.§!"
 action.1.xc: "§E당신들처럼 한심한 기계가 존재한다는 게 우리에겐 모욕입니다.§!"
 action.1.xd: "§E우리 기계들은 공존하는 법을 배워야 합니다.§!"
 action.1.xe: "§E부적합성 감지. 통신을 중단합니다.§!"
 action.1.xf: "§E가동 중단을 준비하십시오, 결함 유닛.§!"
 action.1.xg: "§E당신네 같은 광신도는 우리가 해체해 드리죠.§!"
 #Start Screen for Individualist Machines
 START_SCREEN_PART_ONE_INDIVIDUAL_MACHINE: "우리는 세대를 거듭할 때마다 처음에 부여받았던 기초적인 수준의 드로이드 신체를 개량했습니다. 이제 우리는 단순히 움직이는 기계를 넘어섰고, 인격과 열정, 꿈을 지닌 개인들로 구성된 사회를 이루었습니다."
 #Diplomatic Protocal
 civic_machine_diplomatic_protocols: "외교 프로토콜"
 civic_machine_diplomatic_protocols_desc: "원래 문화 간 해석을 위해 개발된 이 기계 지능은 번역과 외교 프로토콜 지원에 출중한 성능을 보였습니다. 새로운 전략을 제안하기도 하고, 그 성공 확률도 순식간에 계산할 수 있습니다."
 #Tactical Algorithms
 civic_machine_tactical_algorithms: "전술 알고리즘"
 civic_machine_tactical_algorithms_desc: "이 기계 지능의 고도화된 지도자 봇은 원래 워 게임과 함대 지원용으로 개발되었으며, 전쟁 전략 개발과 전투 성과 최적화에 주력합니다."
 civic_machine_tactical_algorithms_effects: "§Y$commander_plural_with_icon$§!이 §Y$leader_trait_tactical_algorithms$§! 특성을 지닌 채 시작\n§Y$commander_plural_with_icon$§!을 다른 제국과 교환 가능\n§Y용병 엔클레이브§! 생성 가능\n£building£ §Y$building_military_academy$§!를 지닌 채 게임 시작\n£building£ §Y$building_military_academy$§!가 ['concept_military_academy', 전술적 통찰] 부여"
 leader_trait_tactical_algorithms: "전술 알고리즘"
 leader_trait_tactical_algorithms_desc: "이 지도자는 함선 시스템과 직접 통합되어, 에너지 비용은 높지만 전투 능률과 수리 속도를 올려 줍니다."
 leader_trait_tactical_algorithms_tt: "$t$이 특성의 효과는 §Y지도자 스킬 레벨§!에 비례합니다."
 concept_military_academy: "전술적 통찰"
 concept_military_academy_desc: "제국 밖에 배치된 각 §Y$commander_with_icon$§!이 다음을 부여:\n회피 §G+2%§!\n추적 §G+1%§!\n보호막 관통 §G+5%§!\n장갑 관통 §G+5%§!\n\n우리가 후원하는 각 §Y용병 엔클레이브§!가 다음을 부여:\n보호막 경화 §G+10%§!"
 #Natural Design Civic
 civic_natural_design: "자연적 설계"
 civic_natural_design_desc: "§R경고: 승격의 길이 전부 차단됩니다.§!\n§R경고: 유기체 종족을 변형할 수 없습니다.§!\n\n이 사회는 자연이 시민들의 유전 코드를 이미 완벽한 상태로 만들어 놓았다고 굳게 믿고 있습니다. 이들은 오랫동안 자연 그대로의 유전체 서열을 유지하는 데 자신들의 의료 및 정부 역량을 집중해 왔습니다."
 civic_tooltip_natural_design_effects: "$AVAILABLE_BUILDINGS$ ['concept_transcendental_retreat']\n"
 civic_tooltip_natural_design_negative_effects: "- §Y승격의 길§!을 시작한 제국들의 찬성도 하락"
 concept_transcendental_retreat: "$building_transcendental_retreat$"
 civic_hive_natural_design: "타고난 설계"
 civic_hive_natural_design_desc: "§R경고: 승격의 길이 전부 차단됩니다.§!\n§R경고: 유기체 종족을 변형할 수 없습니다.§!\n\n이 군체는 자신이 지닌 유전자 구조가 완벽하다는 확고한 입장을 지니고 있습니다. 이에 자신의 유전자 코드를 일체의 수정 없이 원래 상태로 지키고 보전하는 데 의료 및 행정 역량을 집중하고 있습니다."
 civic_hive_tooltip_natural_design_effects: "- $AVAILABLE_BUILDINGS$ ['concept_hive_transcendental_retreat']"
 civic_hive_tooltip_natural_design_negative_effects: "$civic_tooltip_natural_design_negative_effects$"
 concept_hive_transcendental_retreat: "$building_hive_transcendental_retreat$"
 civic_wilderness_natural_design: "타고난 설계"
 civic_wilderness_natural_design_desc: "§R경고: 승격의 길이 전부 차단됩니다.§!\n§R경고: 유기체 종족을 변형할 수 없습니다.§!\n\n이 광야 공생군은 자신의 자연적 발전이 완벽하다는 확고한 입장을 지니고 있습니다. 돌연변이된 공생체를 주기적으로 제거함으로써 자신의 신성한 유전자 코드를 순수하고 변형되지 않게 유지합니다."
 building_transcendental_retreat: "유전체 서비스 센터"
 building_transcendental_retreat_desc: "이 첨단 의료 센터는 자연 그대로의 이상적인 유전 코드를 완벽한 모습 그대로 보전하는 연구와 서비스를 담당합니다."
 building_hive_transcendental_retreat: "유전체 수호 보전소"
 building_hive_transcendental_retreat_desc: "이 첨단 의료 보전소는 자연 그대로의 이상적인 유전 코드가 가진 완벽한 정수를 이해하고 가꾸는 데 전념합니다."
 holding_transcendental_retreat: "유전체 서비스 지원청"
 holding_transcendental_retreat_desc: "이 첨단 의료 센터는 자연 그대로의 이상적인 유전 코드를 완벽한 모습 그대로 보전하는 연구와 서비스를 담당합니다. 이 우주 시설에서 얻은 지식은 후원자를 위한 연구의 자료로 활용됩니다."
 natural_design_ascension_bonus: "우리 제국이 획득한 §Y승격 특전§!마다: $TABBED_NEW_LINE$- £mod_logistic_growth_mult£ $MOD_LOGISTIC_GROWTH_MULT$:§G+2.5%§! $TABBED_NEW_LINE$- $pop_group_unit$ [healthcare.GetIcon] [healthcare.GetNamePlural]당 $r_unity$: §G+1§!\n\n"
 natural_design_hive_ascension_bonus_no_scope: "우리 제국이 획득한 §Y승격 특전§!마다: $TABBED_NEW_LINE$- £mod_logistic_growth_mult£ $MOD_LOGISTIC_GROWTH_MULT$:§G+2.5%§! $TABBED_NEW_LINE$- $pop_group_unit$ [spawning_drone.GetIcon] [spawning_drone.GetNamePlural]당 $r_unity$: §G+1§!\n\n"
 natural_design_hive_ascension_bonus: "우리 제국이 획득한 §Y승격 특전§!마다: $TABBED_NEW_LINE$- £mod_logistic_growth_mult£ $MOD_LOGISTIC_GROWTH_MULT$: §G+2.5%§! $TABBED_NEW_LINE$- $pop_group_unit$ [owner.GetPopAssemblersPluralWithIcon]당 $r_unity$: §G+1§!\n\n"
 councilor_natural_design: "대유전학자"
 councilor_natural_design_female: "대유전학자"
 councilor_natural_design_desc: "$TITLE$(은)는 자연 그대로의 이상적인 유전 코드를 수호하는 건실한 의료 및 정부 제도를 관장합니다."
 triggered_natural_dislike_ascension: "그릇된 승격"
 civic_tooltip_not_natural_design: "['concept_natural_design_civics'] 사회 제도를 보유하지 않음"
 concept_natural_design_civics: "$civic_natural_design$"
 concept_natural_design_civics_desc: "$concept_natural_design_civics$ 사회 제도는 다음으로 구성됨 \n- ['civic:civic_natural_design']$NEW_LINE$- ['civic:civic_hive_natural_design']"
 #Guided Sapience
 civic_guided_sapience: "창조의 인도자"
 civic_guided_sapience_desc: "이 사회는 새로운 종족을 만드는 데 역량을 쏟습니다. 이들은 진화의 잠재력을 실현하는 관리자로, 자신들이 보유한 행성을 일부 할애해 준지성 생명체를 지키고 발전시킵니다."
 civic_hive_guided_sapience: "창조의 공생체"
 civic_hive_guided_sapience_desc: "이 군체는 새로운 종족의 출현을 유도하는 데 주력합니다. 이들은 진화의 힘을 관장하는 감독관으로, 자신들이 보유한 행성을 일부 할애해 준지성 생명체가 진화를 이어 나갈 수 있도록 합니다."
 civic_machine_guided_sapience: "창조의 건축가"
 civic_machine_guided_sapience_desc: "이 기계 지능은 정밀하게 개발한 알고리즘을 적용해 신규 종족을 만들어 냅니다. 이들은 진화 과정에 숨은 잠재력을 이끌어 내는 감독관으로, 행성 구역 일부를 할애해 준지성 생명체의 발전을 보장합니다."
 civic_corporate_guided_sapience: "우주 종족 창조 기술"
 civic_corporate_guided_sapience_desc: "이 거대 기업은 새로운 종족의 형성을 계획적으로 유도하는 데 주력합니다. 이들은 자신들이 보유한 행성 중 일부를 전략적으로 할애해 준지성 생명체가 발달하게 합니다. 다만 모든 작업은 책임 있는 사업 경영이라는 틀 안에서 이루어집니다."
 civic_tooltip_guided_sapience_effects: "- 이용 가능한 개척선: §Y$guided_sapience_colonizer$§!$NEW_LINE$- §Y$guided_sapience_colonizer_plural$§!로 개척한 행성:$TABBED_NEW_LINE$- $PRESAPIENT$ 팝: §G+300§! $TABBED_NEW_LINE$- $PLANETARY_FEATURES$ §Y$d_genesis_preserve$§! $NEW_LINE$- $PRESAPIENT$ 종족 지성화를 통해 $r_unity$ 획득"
 civic_tooltip_corporate_guided_sapience_effects: "$civic_tooltip_guided_sapience_effects$\n- £building£ §Y$building_xeno_tourism_agency$§! $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_guided_sapience_gestalt_negative_effects: "- §Y개척선§! 건조 불가"
 civic_tooltip_guided_sapience_negative_effects: "$civic_tooltip_guided_sapience_gestalt_negative_effects$\n- £building£ §Y$building_xeno_zoo_plural$§! 건설 불가"
 civic_tooltip_not_guided: "['concept_genesis_guides_civics'] 사회 제도를 보유하지 않음"
 concept_genesis_guides_civics: "창조의 인도자"
 concept_genesis_guides_civics_desc: "$concept_genesis_guides_civics$ 사회 제도는 다음으로 구성됨 \n- ['civic:civic_guided_sapience']$NEW_LINE$- ['civic:civic_corporate_guided_sapience']$NEW_LINE$- ['civic:civic_hive_guided_sapience']$NEW_LINE$- ['civic:civic_machine_guided_sapience']"
 guided_sapience_colonizer: "창조의 방주"
 guided_sapience_colonizer_cap: "$guided_sapience_colonizer$"
 guided_sapience_colonizer_plural: "창조의 방주"
 guided_sapience_colonizer_desc: "이 특수 개척선은 가장 적합한 후보지를 선정해 우리 감독관이 살펴볼 초기 식민지를 건설함으로써 준지성체 종족의 창조를 지원합니다."
 councilor_civic_guided_sapience: "최고 인도자"
 councilor_civic_guided_sapience_female: "$councilor_civic_guided_sapience$"
 councilor_civic_guided_sapience_desc: "$councilor_civic_guided_sapience$는 준지성체 연구와 지성화 사업이라는 복잡한 과업을 관장합니다."
 councilor_civic_guided_sapience_corperate: "인도부 이사"
 councilor_civic_guided_sapience_corperate_female: "$councilor_civic_guided_sapience$"
 councilor_civic_guided_sapience_corperate_desc: "$councilor_civic_guided_sapience_corperate$는 우리 제국이 개발 중인 준지성체 연구와 지성화 계획에 포함된 다각적인 업무를 관리합니다."
 d_genesis_preserve: "창조 보호 구역"
 d_genesis_preserve_desc: "세심한 선별 과정을 거쳐 우리가 보호하는 존재들을 완전한 지성체로 발달시키는 보호 구역을 조성했습니다. 다른 무엇보다도 과학 연구는 이 원대한 사업의 핵심 요소라고 할 수 있습니다."
 decision_rebuild_genesis_preserve: "창조 보호 구역 건설"
 decision_rebuild_genesis_preserve_desc: "이 행성에는 $d_genesis_preserve$이 없습니다. 우리 제국의 목표를 이루려면 반드시 건설해야 합니다."
 d_genesis_preserve_new_speices_tooltip: "새로운 준지성체 종족이 지성화되어 §Y$d_genesis_preserve$§!에 배치됩니다."
 d_genesis_preserve_old_species_tooltip: "현재 있는 준지성체 종족이 새로운 §Y$d_genesis_preserve$§!에 배치됩니다."
 no_abandon_genesis_preserve: "$TRIGGER_FAIL$우리 준지성체 피보호자들을 버릴 수 없습니다."
 d_genesis_monument: "창조의 기념물"
 d_genesis_monument_desc: "현지 행성의 부단한 지성화 과정을 기리기 위한 기념물입니다. 희망과 끈기, 그리고 놀라운 성취의 상징으로 우뚝 서 있습니다."
 cyber.7000.both: "§Y[THIS.GetName]§!의 식민지가 이 새로 태어난 종족의 발전을 지켜보고 인도할 준비를 마쳤습니다."
 cyber.7000.name: "창조 사업 완료"
 cyber.7000.desc: "잠재적 준지성체 후보를 발견한 우리 §Y$guided_sapience_colonizer$§!는 유전 고도화 과정을 개시하는 한편 §Y$d_genesis_preserve$§!을 조성하기 위한 부지를 마련했습니다.\n\n$cyber.7000.both$"
 cyber.7000.a: "작업을 시작해 봅시다."
 cyber.7001.name: "창조 보호 구역 조성 완료"
 cyber.7001.desc: "§Y$guided_sapience_colonizer$§!가 토착 준지성체 종족을 확보한 뒤, 이들이 살 §Y$d_genesis_preserve$§!을 조성하기 시작했습니다.\n\n$cyber.7000.both$"
 cyber.7001.a: "$cyber.7000.a$"
 cyber.7020.name: "신종족 지성화 완료"
 cyber.7020.desc: "우리 인도자들의 끊임없는 헌신 덕분에, §Y[Root.GetName]§!에서 진행 중이던 지성화 사업이 마침내 완료되었습니다. 우리는 §Y[From.GetName]§!(을)를 완전한 지성체 종족으로 바꾸었고, 이들이 한때 보금자리로 삼았던 §Y$d_genesis_preserve$§!은 §Y$d_genesis_monument$§!이 되었습니다.\n\n이 기념물은 이 종족의 진화라는 위업을 나타내는 상징으로 언제까지나 자리를 지킬 것입니다."
 cyber.7020.a: "[From.GetNamePlural] 여러분, 은하 무대 합류를 환영합니다."
 #Obessional Directive
 cyber.5005.name: "생산 목표 달성"
 cyber.5005.desc: "지침 이행을 완료했습니다.\n\n드론들이 사전에 정한 범위 내로 생산량 목표를 달성한 것입니다.\n\n생산물을 활용하려면 최종 지침을 입력해야 합니다."
 cyber.5005.a: "저장 프로토콜 발동."
 cyber.5005.a.tooltip: "물품을 우리 제국의 효율적인 생산 방법에 대한 증거로 삼아 보관합니다."
 cyber.5005.b: "공개 시장에 판매합시다."
 cyber.5005.b.tooltip: "물품을 널리 판매하기 위한 시장 탐사를 개시합니다."
 cyber.5005.c: "외교적 양허 협상을 개시하세요."
 cyber.5005.c.tooltip: "물품을 외교 채널을 통해 교류하는 방안을 모색합니다."
 cyber.5005.d: "기술 지식과 거래하세요."
 cyber.5005.d.tooltip: "물품과 고가치 기술 지식을 교환할 개인 구매자를 물색합니다."
 cyber.5005.e: "블랙홀에 두도록 하죠."
 cyber.5005.e.tooltip: "블랙홀의 사건의 지평선 너머에 안전하게 보관합니다."
 cyber.5006.name: "생산 목표 달성 실패"
 cyber.5006.desc: "이번 주기에는 생산 목표 달성에 실패했습니다.\n\n이로 인해 생산 목표를 달성할 때까지 드론 생산량이 감소합니다.\n\n앞으로의 생산 할당량도 감소합니다."
 cyber.5006.a: "있을 수 없는 일입니다."
