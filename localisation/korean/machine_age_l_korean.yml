 trait_robot_history_warbot: "전쟁 기계"
 trait_robot_history_warbot_desc: "전쟁과 치안 강화를 목적으로 제작된 기계입니다. 비범한 반응 속도, 강화 장갑, 든든한 백업 시스템을 갖추고 있습니다."
 trait_robot_history_artbot: "유모봇"
 trait_robot_history_artbot_desc: "가정용 드로이드로 설계된 기계입니다. 정교한 동작, 효율적인 자원 관리, 탁월한 멀티태스킹 성능을 자랑합니다."
 trait_robot_history_explorebot: "작품 생성기"
 trait_robot_history_explorebot_desc: "실용성을 염두에 두고 설계되지는 않았지만, 각종 문화예술 활동에서 뛰어난 성능을 보이는 기계입니다. 비범한 창작 알고리즘, 정교한 디자인 프로세스, 풍부한 표현력을 자랑합니다."
 trait_robot_history_researchbot: "연구 보조봇"
 trait_robot_history_researchbot_desc: "연구 보조용으로 설계된 기계입니다. 날카로운 분석 능력과 신속한 정보 이해를 바탕으로 쉼 없이 과학적 발견을 추구합니다."
 trait_robot_history_resourcebot: "노동자봇"
 trait_robot_history_resourcebot_desc: "자원 채취를 목적으로 개발된 기계입니다. 다양한 용도별 연장, 강화 관절, 모듈식 시스템을 갖춘 이상적인 일꾼입니다."
 trait_robot_history_chatbot: "대화형 AI"
 trait_robot_history_chatbot_desc: "자신을 창조한 이들의 사회 활동을 지원하기 위해 설계된 기계입니다. 첨단 공감 알고리즘과 완벽한 의사소통 능력을 갖춘 덕분에 이상적인 동반자가 되어 줍니다."
