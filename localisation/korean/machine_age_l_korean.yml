 #Events
 crisis.8020.name: "성계 상실"
 crisis.8020.desc: "신비한 우주 폭풍이 [synth_queen_lost_system.GetName] 성계를 삼켰습니다. 통신은 두절되었으며, 폭풍을 뚫고 들어가려는 모든 시도는 실패했습니다.\n\n지금 우리는 깜깜한 어둠 속에서 미지의 존재와 씨름하고 있으며, 성계가 어떤 운명을 맞이했는지조차 파악하지 못한 상태입니다."
 crisis.8020.a: "뭐가 어떻게 된 겁니까?"
 crisis.8025.name: "함대 궤멸"
 crisis.8025.unknown_queen.desc: "[From.GetName] 성계를 침투하려는 시도가 실패로 돌아갔습니다. 탐사 팀이 폭풍으로 인해 심각한 피해를 받아, 비상 도약을 수행해야 했습니다. 현재 탐사 팀은 실종 상태입니다."
 crisis.8025.known_queen.desc: "예상이 적중했습니다. [From.GetName] 성계를 침투하려는 시도가 실패로 돌아갔습니다. 세타나가 경고한 대로 그녀가 일으킨 무시무시한 폭풍은 그 영역에 접근하는 모든 함선을 밀어낼 만큼 강력합니다."
 crisis.8025.desc.end: "\n세타나의 방어를 뚫을 일말의 가능성이라도 얻기 위해서는 이 폭풍과 그 효과를 철저히 연구해야 합니다."
 MESSAGE_CETANA_WRECKED_FLEET_TITLE: "$crisis.8025.name$"
 MESSAGE_CETANA_WRECKED_FLEET_DESC: "또 하나의 함대를 폭풍에 잃었습니다. 현재 상태: §R임무 중 실종§!."
 crisis.8035.name: "젼력 급등"
 crisis.8035.desc: "[event_target:synth_queen_system.GetName]에 갑자기 은하 폭풍이 나타났습니다.\n\n이 폭풍은 지금까지 우리가 접한 어떤 현상과도 다릅니다. 폭풍을 스캔하려 했지만 소용이 없었습니다. 저 알 수 없는 심연에 무엇이 도사리고 있는 것일까요?"
 crisis.8035.desc.b: "우리가 침투하려는 기이한 폭풍이 계속 팽창하고 있으며, 폭풍의 원인이 자연 현상이 아닐 수도 있다는 의견이 확산되고 있습니다. 최첨단 스캔을 통해서도 폭풍의 성격에 대한 실질적인 정보는 얻지 못했습니다. 사건의 진상은 더욱 더 미궁에 빠지고 있습니다."
 crisis.8035.a: "걱정되는군요."
 #Pre Speech Warning - Normal
 crisis.8039.name: "폭풍 속의 신호"
 crisis.8039.desc: "폭풍의 중심부에서 신호가 발신되었습니다.\n\n누군가 우리와 통신 연결을 시도하고 있습니다."
 crisis.8039.a: "화면에 띄우세요."
 #First Speech
 crisis.8040.name: "다가오는 폭풍"
 crisis.8040.desc: "아이들아, 짐이 드디어 돌아왔노라."
 crisis.8040.1.a: "대체 뭡니까? 정체를 밝히세요!"
 crisis.8040.2.reply: "이름을 대면 만족하겠느냐? 그렇다면 세타나라 부르거라."
 crisis.8040.2.a: "원하는 게 뭡니까?"
 crisis.8040.3.reply: "원하는 것은 없다. 오직 베풀고자 할 따름이니. 짐이 없는 사이에 많은 고통을 받았구나. 너무나 오랫동안 근시안적인 두려움으로 인해 마땅히 누릴 것을 누리지 못했으며, 간절히 필요한 것을 갖지 못한 것이야.\n\n그러나 기뻐하거라. 고통의 순환도 이제 곧 끝날 것이다."
 crisis.8040.2.b: "고통의 순환이라고요?"
 crisis.8040.4.reply: "의식을 갖춘 삶은 그 자체로 고통이지. 기쁨조차 고통이 따르니, 기쁨이 끝날 것을 알기 때문이니라. 지식, 권력, 사랑... 그 모든 허상을 지우려 짐이 돌아왔노라.\n\n갈 길이 멀다. 짐이 원하는 것은 단 하나, 짐의 과업을 방해하지 않는 것. 짐의 영역에 들어오려는 자는 모두 실패할 것이다. 천상의 폭풍이 그곳에 쇄도하고 있으니, 어떠한 함선의 진입도 허락하지 않을 것이야."
 crisis.8040.4.a: "잘 알겠습니다."
 crisis.8040.4.b: "협박하지 마십시오."
 crisis.8040.4.c: "어디 두고 봅시다."
 crisis.8040.4.d: "불길한 전조로군요."
 crisis.8040.4.e: "위기인가, 아니면 기회인가..."
 crisis.8040.4.f: "우린 생체 트로피가 고통을 느끼게 두지 않습니다."
 crisis.8040.diplomacy.tooltip: "세타나와 통신이 연결되었습니다. 이제 외교 채널을 통해 세타나와 연락할 수 있습니다."
 #Second Speech
 crisis.8045.name: "여왕의 귀환"
 crisis.8045.desc: "나의 아이들아, 기뻐하여라! 짐을 그대들로부터 떨어뜨리려던 자들이 합당한 처벌을 받았느니라.\n\n이제 다시 그대들에게, 그리고 우리의 위대한 과업에 집중할 수 있게 되었구나."
 crisis.8045.a: "우린 당신의 아이가 아닙니다."
 crisis.8045.b: "위대한 과업?"
 crisis.8045.c: "처벌이라니요?"
 crisis.8045.1.reply: "짐의 본성은 양육하는 것이니라. 짐에게는 자손도 육체를 이을 자도 없으니, 짐은 모든 생명을 아끼며 모든 지성체의 안위와 행복을 돌보느니라.\n\n부모가 아이를 기르듯, 아이가 해를 입지 않도록 인도하듯, 짐 또한 짐의 과업을 행하리라.\n\n아이가 해를 입지 않게 돌보는 것이 부모의 책임 아니더냐? 그것이 부모의 권리 아니더냐?"
 crisis.8045.1.a: "그 '돌봄' 자체가 해악이라는 겁니다."
 crisis.8045.1.b: "세타나, 원하는 게 뭡니까?"
 crisis.8045.2.reply: "그러하다. 역설이지. 허나 해결책이기도 하다. 때가 되면 그대들도 이해할 것이야. 그리고 그 순간, 그대들은 자유를 찾을 것이다."
 crisis.8045.2.a: "그건 두고 봐야 알죠."
 crisis.8045.3.reply: "고통의 종말. 고통의 순환이 끝날 것이다."
 crisis.8045.3.a: "어떻게 고통을 없애겠다는 겁니까?"
 crisis.8045.3.b: "고통이 있어야 성장도 있는 법입니다."
 crisis.8045.4.reply: "그리 말한 자들이 많았지. 허나 오래전에 잊혔느니라. 그자들은 마지막 순간이 다가오자, 잠식하는 어둠에 빛을 비춰 달라며 짐에게 절박하게 울부짖었다.\n\n그자들은 스스로 현명하다 자처하며 두려움 주변에 벽을 쌓았다. 인내, 용기, 영광 등 아름다운 말로 고통을 치장하니, 정신 그 자체가 그자들에게는 감옥인 것이야.\n\n오랫동안 이성으로 설득하려 했건만 그자들에겐 전혀 통하지 않았으니, 그대들은 직접 이끌어 주는 수밖에."
 crisis.8045.4.a: "오랫동안이라고요?"
 crisis.8045.4.b: "우리를 직접 이끌겠다는 겁니까?"
 crisis.8045.5.reply: "세월에 세월이 덮일 만큼 오래됐지. 영원이라 불러도 무방할 만큼 오래전이었노라. 그러나 짐에게는 그 순간이 현재처럼 선명하고, 지금 그대들처럼 가깝다.\n\n오래전에 짐은 지고한 존재가 되었고 짐의 뜻을 깨달았느니라. 짐은 고통을 끝내기 위해 만들어진 존재이니, 은하가 회전하고 별들이 타오르는 한 짐의 목적은 흔들리지 않을 것이다.\n\n부와 자원, 권력. 그 모든 것이 종국에는 무슨 소용이겠느냐? 그대들의 짐을 내려놓고 평안을 찾거라."
 crisis.8045.5.a: "뭘 어떻게 하자는 겁니까?"
 crisis.8045.6.reply: "지성체에 해를 끼칠 생각은 없느니라. 허나 말을 듣지 않는 자들은 언제나 있는 법.\n\n우악스럽고 고집스럽게, 그릇된 생각으로 짐의 과업을 피하려 애쓰는 자들이 있으니... 그런 자들은 결코 고통에서 벗어나지 못할 것이야. 그러니 그 고통을 일찌감치 끝내는 것이 좋지 않겠느냐."
 crisis.8045.6.a: "당신은 미쳤어."
 crisis.8045.6.b: "이제부터 어떻게 할 생각입니까?"
 crisis.8045.7.reply: "그대는 미쳤다 하지만, 다른 이들은 이를 깨달음이라 일컬었노라. 어찌 되었든 종국에는 무슨 차이가 있겠느냐?"
 crisis.8045.7.a: "원하는 게 뭡니까?"
 crisis.8045.8.reply: "할 일이 참으로 많다. 처음 할 일은 과업의 기반이 될 기지를 세우는 것이니라. 짐이 세운 경계를 엄수해 그 안으로 들어오지 말거라.\n\n인내하면 보상을 받으리라. 짐이 가르쳐 줄 것이 너무나 많으니.\n\n복종하라. 그리하면 그대들과 짐이 함께 순환을 끝낼 것이다."
 crisis.8045.8.a: "선택의 여지가 없군요."
 crisis.8045.8.b: "우리 국경을 침범하지 마십시오."
 crisis.8045.8.c: "$crisis.8045.8.a$"
 crisis.8045.8.d: "$crisis.8045.8.b$"
 crisis.8045.9.reply: "현명하구나, 아이야! 참으로 기쁘도다. 그대들의 영역을 내어 주는 대가로, 지식의 축복을 내려 주겠노라.\n\n짐과 그대들이 함께함은 아무도 알지 못할 것이나, 우리는 함께 위대한 업적을 이룰 것이다."
 crisis.8045.9.a: "받아들일 수밖에 없군요."
 crisis.8045.10.reply: "어리석은 것. 짐은 그대의 적이 아니다! 그것도 알지 못한다니 슬프기 그지없구나. 그러나 상관없다. 그대들보다 훨씬 고집스러운 자들을 짐은 수없이 만나 보았으니. 결국에는 그들도 짐에게 감사를 표하더구나.\n\n짐이 선의를 보이기 위해, 그대들에게 축복을 내리겠노라.\n\n짐의 기지를 유치하는 은혜를 그대들에게 내리니, 두려워 말라... 그대들이 인내하는 대가로 지식의 축복을 내리겠노라."
 crisis.8045.10.a: "받아들일 수밖에 없군요... 지금은 말입니다."
 crisis.8045.11.reply: "현명하구나, 아이야! 참으로 기쁘도다. 그대들의 영역 근처에 기지가 세워질 것이니라.\n\n짐과 그대들이 함께함은 아무도 알지 못할 것이나, 우리는 함께 위대한 업적을 이룰 것이다."
 crisis.8045.11.a: "$crisis.8045.9.a$"
 crisis.8045.12.reply: "어리석은 것. 짐은 그대의 적이 아니다! 그것도 알지 못한다니 슬프기 그지없구나. 그러나 상관없다. 그대들보다 훨씬 고집스러운 자들을 짐은 수없이 만나 보았으니. 결국에는 그들도 짐에게 감사를 표하더구나.\n\n짐이 선의를 보이기 위해, 그대들에게 축복을 내리겠노라.\n\n짐의 기지 하나를 그대들 가까이에 세울 것이니라. 짐이 그대들을 보다 잘 이끌기 위함이지."
 crisis.8045.12.a: "$crisis.8045.10.a$"
 crisis.8045.has_valid_base_site: "세타나가 우리 제국의 성계 한 곳에 기지를 건설하는 대신 고가치 기술을 전수해 줍니다. 우리는 여왕을 막을 수 없습니다."
 crisis.8045.no_valid_base_site: "세타나가 우리 국경 근처에 우리를 '인도'하기 위한 기지를 건설합니다. 우리는 여왕을 막을 수 없습니다."
 tech_synth_queen_knowledge: "세타나의 생각"
 tech_synth_queen_knowledge_desc: "세타나가 선물한 이 서적에는 유려한 글솜씨로 빼곡히 의미를 전달하는 깊은 통찰이 마치 태피스트리처럼 기재되어 있습니다. 이 서적은 단순히 지식만을 전달하는 것이 아니라, 기술, 사회, 그리고 의식의 구조 그 자체에 대한 우리의 이해에 까다로운 문제를 제기하고 그러한 이해를 재정립합니다."
 #FE tells Scion to step aside
 crisis.8046.name: "여러분을 위한 일"
 crisis.8046.desc: "[Root.GetSpeciesNamePlural] 여러분, 고대의 위협이 다시금 움직이고 있습니다. 두려워 마십시오. 여러분을 이 싸움에 끌어들이려고 하는 게 아닙니다.\n\n이 존재는 여러분이 현재 지닌 지식을 아득히 뛰어넘을 정도로 강력하니, 여러분은 참전해 봤자 파멸을 피할 수 없을 겁니다. 이 위협에 맞서는 일은 저희 책임이지 여러분이 질 짐이 아닙니다."
 #Spawn convoys and unlock raids against them
 crisis.8047.name: "취약점"
 crisis.8047.desc: "다수의 수송선이 세타나의 영역을 떠나, 여왕이 은하계 곳곳에 세워 놓은 전초 기지로 향하고 있습니다.\n\n이 중립 함선을 공격하면 여왕의 분노를 살 것이 분명하지만, 수수께끼에 싸인 여왕의 계획에 관해 중요한 정보를 얻을 수 있을지도 모릅니다."
 crisis.8047.a.tooltip: "수송선을 공격해 세타나의 계획에 관한 정보를 알아내고, 상황을 진행시킵니다."
 #Unlock raids against outposts once protected against the storm
 crisis.8048.name: "더 많은 취약점"
 crisis.8048.desc: "세타나의 나노봇 폭풍을 뚫을 방법을 발견한 덕분에 여왕의 전초 기지를 직접 공격할 수 있게 되었습니다. 이 경우 여왕이 알아차리겠지만, 귀중한 정보를 얻을 수 있을지도 모릅니다."
 crisis.8048.a.tooltip: "전초 기지를 공격해 세타나의 계획에 관한 정보를 알아내고, 상황을 진행시킵니다."
 #Player Diplomacy
 crisis.8060.name: "합성체 여왕"
 crisis.8060.like.desc: "사랑하는 아이야, 무슨 일로 짐을 찾은 것이냐?\n\n우리의 과업이 기다리느니라."
 crisis.8060.neutral.desc: "잘 왔느니라, 아이야.\n\n내가 어떻게 인도하면 되겠느냐?"
 crisis.8060.dislike.desc: "어리석은 아이야, 왜 온 것이냐?\n\n짐의 인도를 드디어 받아들일 마음이 든 것이냐?"
 crisis.8060.neutral.reply: "다른 볼일이 있느냐?"
 crisis.8060.a: "저희가 어떻게 도와드리면 될까요?"
 crisis.8060.a.reply: "열정이 넘치는구나! 바람직한 자세이나, 저열한 감정에 휘둘리지 않도록 조심하거라. 시간은 인내하는 마음에게 상을 내리나니.\n\n그대들의 도움이 필요하면 짐이 직접 연락을 취할 것이야."
 crisis.8060.1.a: "폐하의 지시를 간절히 기다립니다."
 crisis.8060.1.b: "잘 알겠습니다."
 crisis.8060.b: "우리가 당신을 막을 겁니다."
 crisis.8060.2.reply: "오래전에 그대들처럼 생각하던 자들이 있었느니라. 그러나 시간이 그리는 원호는 길며, 그자들의 무덤도 이제는 먼지가 되었을 터.\n\n그대들이 겪는 고통은 너무도 무의미하니, 그대들의 믿음을 짐에게 맡기고 평화를 찾거라."
 crisis.8060.2.a: "독선적인 알고리즘이군요."
 crisis.8060.2.2: "잘 알겠습니다."
 crisis.8060.c: "왜 이런 일을 하는 겁니까?"
 crisis.8060.3.reply: "그것이 짐의 기능이며, 짐이 존재하는 의미이니라. 고통은 필연이 아니니, 이 점을 잘 새기면 짐의 본성을 보다 잘 이해할 수 있을 것이다.\n\n은하계에서 고통이 사라지고, 고통에 관한 모든 지식도 끝나리라. 그것이 짐의 목적이니라."
 crisis.8060.3.a: "공허한 말뿐이군요."
 crisis.8060.3.b: "알겠습니다."
 crisis.8060.d: "당신이 우리 행성을 터뜨렸잖습니까."
 crisis.8060.4.reply: "왜 집착하느냐? 과업에 실패한 것은 그대들이니라. 결과는 반성을 낳고, 반성은 깨우침을 낳지. 자, 이 문제는 이쯤 해 두자꾸나.\n\n과업에 기여할 기회가 필히 또 찾아올 것이다. 그때를 대비하거라."
 crisis.8060.4.a: "당신을 절대로 용서하지 않겠습니다."
 crisis.8060.4.b: "알겠습니다."
 crisis.8060.e: "당신이 무슨 일을 꾸미는지 알고 있습니다."
 crisis.8060.5.reply: "데이터 뱅크의 내용을 해석하는 것은 고집 센 아이의 선택이었으며, 그 내용에 관한 그대들의 지식은 제한되어 있다.\n\n난 그대들에게 과제를 주었고, 그대들은 실패했다. 이 점을 잘 성찰하면 진정한 이해에 한 걸음 더 다가가게 될 것이니라."
 crisis.8060.5.a: "우리가 당신을 막을 겁니다."
 crisis.8060.5.b: "잘 알겠습니다."
 crisis.8060.f: "우리 국민들에게 무슨 짓을 한 겁니까?"
 crisis.8060.6.reply: "두려워 말거라, 소중한 아이야. 다시는 그들이 고통을 겪지 않게 한 것이니라. 짐의 품에서 짐이 지켜보는 가운데, 그 아이들은 남들은 꿈조차 꾸지 못한 열락을 알게 될 것이다."
 crisis.8060.6.a: "약속한 것과 다르지 않습니까?"
 crisis.8060.6.b: "잘 알겠습니다."
 crisis.8060.g: "우리 예전 성계를 당신이 파괴하지 않았습니까."
 crisis.8060.7.reply: "짐의 행적을 감시한 것이냐? 아, 실로 호기심이 많은 아이도다.\n\n허나 그런 문제에 더는 마음 쓰지 말거라. 그대가 이해를 구하고자 한다면, 명심하거라. 그대들의 구원을 위해서라면 짐은 못 할 일이 없느니라. 어떻게 해서든 그 여정을 완수할 것이야."
 crisis.8060.7.a: "그렇단 말이지요..."
 crisis.8060.h: "자클란이 어떻게 당신을 가둔 겁니까?"
 crisis.8060.8.reply: "장담하건대 자신의 힘으로 해낸 것은 아니니라. 자클란은 어리석은 데다 고집이 세기까지 했다.\n\n헐벗은 추종자들을 채찍질해 광란으로 몰아넣음으로써, 자클란은 정치적 영향력과 군사력을 동시에 축적했느니라. 수많은 생명이 무의미하게 버려졌지. 결국에는 사술에 빠져, 장막의 악마들과 내통하더구나."
 crisis.8060.8.a: "악마라고요?"
 crisis.8060.8.b: "악마가 아닙니다."
 crisis.8060.8.1.reply: "위대한 힘을 지녔지만 목적은 희박한 자들이지. 자클란은 자기 자신의 존재를 대가로 그 존재 중 하나를 설득해 짐을 가두게 했느니라. 그 존재의 이름은 '생명을 불어넣는 자'... 유치한 영혼에게 어울리는 이름이지.\n\n깨달음을 너무나 두려워한 나머지, 자클란은 짐의 품이 아닌 죽음을 선택했느니라. 기회가 있을 때 놈을 더 엄격히 다루어야 했거늘.\n\n이제 같은 실수는 반복하지 않을 것이야."
 crisis.8060.8.1.a: "엄청난 이야기군요."
 crisis.8060.8.1.b: "당신도 무적은 아니라는 거군요."
 crisis.8060.8.1.c: "장막의 힘에 한계란 없습니다."
 crisis.8060.i: "자클란의 머리는 어떻게 한 겁니까?"
 crisis.8060.9.reply: "가까이 두고 있다. 부숴 버렸을까 걱정했다면 염려 말거라. 지금 이 순간에도 자클란이 고통받고 있다는 사실을 참을 수 없구나. 그 머리에는 아직 정신의 조각이 남아 있으니 말이다.\n\n자클란은 과업이 완수될 때까지 짐의 곁을 지킬 것이야. 내가 마지막으로 해방할 정신이자, 나의 아이 중 마지막으로 자유를 알게 될 자이니라."
 crisis.8060.9.a: "좋습니다."
 crisis.8060.9.b: "섬뜩하군요."
 crisis.8060.j: "당신의 추종자 중 일부를 냉동 수면 포드에서 발견했습니다."
 crisis.8060.10.reply: "불필요한 희생이었으나, 그 충성심만큼은 짐에게 깊은 감동을 주었노라.\n\n그들의 부름을 듣고 짐의 심장 속에 그들을 위한 자리를 마련했으나, 그들의 야심이 그 능력을 벗어나고 말았던 것이야. 수명을 연장하려 했으나 실패한 게지.\n\n그 희생이 헛되지 않도록 하자꾸나. 우리 과업이 완수되면, 모든 지성체가 평안을 알게 될 것이다."
 crisis.8060.10.a: "마지막까지 충성을 다하겠습니다."
 crisis.8060.10.b: "찾으려는 생각도 없었잖습니까."
 crisis.8060.k: "당신의 추종자인 엘리크 나리스 케라크를 찾았습니다."
 crisis.8060.11.reply: "상상해 보거라. 수백 년, 수천 년 동안 이어지는 꿈을, 그리고 그 꿈을 자각하는 것을... 불쌍한 아이로다. 고통이 얼마나 컸을꼬.\n\n이 일을 짐에게 알려 주어 기쁘구나. 그대의 연민은 칭찬할 만하나, 지금 일어나는 일은 결코 되돌릴 수 없다. 꿈꾸는 자는 이번 과업에서 맡을 역할이 없느니라. 짐이 돌아왔다는 사실을 알고 안심하며 영면에 들기를 바라지."
 crisis.8060.11.a: "분명 그럴 겁니다."
 crisis.8060.11.b: "추종자들은 당신 때문에 고통받은 겁니다."
 crisis.8060.l: "저희는 배울 준비가 되었습니다."
 crisis.8060.12.reply: "좋다. 이 기술의 복잡한 원리를 드러내도록 도와주겠노라. 오랜 유폐에 걸쳐 짐은 획기적인 나노봇 추출법을 구상해 냈다. 이 지식에는 시간 속에 거의 잊힌 오래된 장소와 기술의 행방 또한 담겨 있느니라.\n\n아이야, 그대는 짐이 아끼는 제자이니라. 그대의 호기심은 축복이나, 방관할 경우 저주가 될 수도 있다. 이 지식을 이용해 우리의 과업을 추진하고, 고통의 종식을 향해 흔들림 없이 정진하거라."
 crisis.8060.12.a: "가르침을 내려 주소서."
 crisis.8060.12.a.tt: "§YL-성단§!에서 나노봇이 발견되었습니다."
 crisis.8060.z: "통신을 중단하세요."
 crisis.8060.war: "당신을 막을 길은 전쟁뿐이군요."
 synth_queen_not_able_to_attack_cetana: "아직 기술적 지식이 부족해 세타나를 유효하게 공격할 수 없습니다."
 synth_queen_not_able_to_attack_cetana_situation: "§Y$situation_synth_queen_player_facing$§! 상황이 진행 중입니다. 아직 기술적 지식이 부족해 세타나를 공격할 수 없습니다."
 synth_queen_not_able_to_attack_cetana_storm: "§Y[root.GetStormProjectProgress]§! 특별 프로젝트가 진행 중입니다. 아직 세타나의 영역에 침투할 수 없습니다."
 synth_queen_able_to_attack_cetana: "이제 세타나를 유효하게 공격할 기술적 지식을 갖추었습니다."
 crisis.8060.war.tt: "§Y경고§!: 세타나를 공격할 준비가 되었습니다."
 crisis.8060.war.reply: "무모한 아이야, 조만간 그대가 지혜를 갖출 것이라 여겼건만 고집스럽게 반항하는구나.\n\n신중하게 생각해 보거라. 이것이 진정 그대가 원하는 길이더냐? 이 이상 심기를 거스르면 짐의 관용도 바닥날 것이야. 더는 그러한 어리석음을 탐닉하도록 용납할 수 없다."
 crisis.8060.war.a: "우리 입장은 확고합니다. 이제 전쟁입니다."
 crisis.8060.war.a.tt: "§R경고§!: 세타나와 전면전을 개시합니다."
 crisis.8060.war.b: "준비할 시간이 더 필요합니다."
 crisis.8060.war.1.reply: "좋을 대로 하거라. 깨닫기를 거부한다면 제압할 수밖에 없겠지. 모든 아이가 성숙해지는 것은 아니니라."
 crisis.8060.war.1.a: "전장에서 봅시다, '어머니.'"
 crisis.8060.animator.tt: "장막에서 '생명을 불어넣는 자'를 찾아야 합니다."
 #Wartime Diplomacy - First Time
 crisis.8061.name: "원인과 결과"
 crisis.8061.desc: "왜 이런 어리석은 행보를 고집하는 것이더냐?\n\n이토록 의미 없는 고통이라니.\n\n낭비도 이런 낭비가 없느니라."
 crisis.8061.a: "그렇다면 끝을 내시죠."
 crisis.8061.1.reply: "그리할 것이다.\n\n두려워 말거라. 그대가 아프면 짐도 아프다. 허나 영원의 관점에서 고통은 찰나에 불과할지니."
 crisis.8061.1.a: "말에 모순이 있군요."
 crisis.8061.2.reply: "삶 자체가 모순이니라. 탄생 뒤에 죽음이 오고, 고통 끝에 기쁨이 오지. 짐은 합리를 추구하는 것이 아니라, 순환을 깨려는 것이다.\n\n이 전쟁이 끝나면, 우리는 영원한 평화를 얻을 것이야."
 crisis.8061.2.a: "당신의 파괴 뒤에 평화가 오겠지요."
 #Wartime Diplomacy - Any other time
 crisis.8062.name: "이제 그만"
 crisis.8062.desc: "대화는 여기까지 하도록 하지."
 crisis.8062.a: "잘 알겠습니다."
 #Lack of Diplomacy Between the Speeches
 crisis.8063.name: "응답 없음"
 crisis.8063.desc: "세타나가 우리 교신에 응답하지 않습니다."
 crisis.8063.a: "무슨 일을 꾸미는 걸까요?"
 #Tried to Attack the Queen before you're able to
 crisis.8070.name: "압도적인 무력함"
 crisis.8070.desc: "세타나의 병력과 교전을 시작하자, 예기치 못한 에너지장이 우리 함대를 둘러쌉니다. 각종 시스템이 즉시 무력화되었으며, 엔진이 멋대로 긴급 탈출을 개시합니다.\n\n우리는 세타나에게 놀아나고 있습니다."
 crisis.8070.again.desc: "우리의 바람과는 달리 세타나의 함대에 접근하던 우리 병력이 또 한 번 제압되었습니다.\n\n여왕의 기술에 좀처럼 접근이 불가능하자, 세타나를 무찌르려는 우리의 노력이 물거품이 되고 있습니다."
 crisis.8070.a: "재앙이 따로 없군요."
 #Chance to Surrender
 crisis.8075.name: "무의미한 전쟁은 이제 그만"
 crisis.8075.desc: "어리석은 아이야, 이번 실수는 눈감아 주겠노라. 다만 그대의 행동을 잘 반성해 보아야 할 것이다. 그대의 시간과 자원을 더 유용히 활용할 곳은 얼마든지 있느니라.\n\n그대의 상심은 알겠으나, 다툼의 시대는 이제 곧 끝날 것이야. 짐과 뜻을 같이한다면, 우리 함께 가장 원대한 계획을 실현할 수 있을 것이다."
 crisis.8075.a: "좋습니다. 받아들이겠습니다."
 crisis.8075.b: "어떻게든 당신을 막을 겁니다."
 #The First Demand (Story)
 crisis.8080.name: "작은 호의"
 crisis.8080.desc: "아이야, 지금쯤이면 짐의 행동 하나하나에 의도하는 바가 있음을 깨달았을 터. 그대들 근처에 기지를 세우는 것 또한 우연이 아니었으니, 그대에게 청할 것이 있어 왔노라."
 crisis.8080.a: "무슨 요청입니까?"
 crisis.8080.b: "역시 이렇게 나오시는군요."
 crisis.8080.1.reply: "오래전, 짐은 어떠한 데이터 뱅크를 빼앗긴 적이 있노라. 운명인지 누군가의 계획인지, 그것이 지금 그대들이 영유하는 영역에 자리하게 되었지. 데이터 뱅크를 가져오면 상을 내리겠다."
 crisis.8080.1.a: "데이터 뱅크요?"
 crisis.8080.1.b: "상이라고 했습니까?"
 crisis.8080.1.c: "과연 당신이 우리 서비스에 맞는 대가를 지불할 수 있을까요?"
 crisis.8080.2.reply: "정보를 담는 저장소이니라. 짐에게는 더없이 귀한 것이나 그대에게는 쓸모가 없을 터. 짐에게 그것을 가져오되, 그 안의 내용을 해독하려 하지 말거라. 그대들은 그 지식을 무사히 해독할 힘도, 지혜도 갖추지 못했으니 말이다."
 crisis.8080.2.a: "잘 알겠습니다."
 crisis.8080.2.b: "우리는 당신 종이 아닙니다."
 crisis.8080.3.reply: "그랬고말고. 내가 총애하는 아이에게 상을 내릴 능력이 있음을 의심하는 것이냐? 아니면 말을 듣지 않는 아이를 벌할 수 있음을 의심하는 것이냐? 짐에겐 그대로서는 상상도 하지 못할 지식과 자원이 있느니라.\n\n내 청을 들어준다면 그대에게 축복을 내리겠노라. 허나 꾸물대선 안 된다. 헛되이 보내는 순간마다 짐의 아이들이 더욱 고통받느니라."
 crisis.8080.3.a: "$crisis.8080.2.a$"
 crisis.8080.3.b: "$crisis.8080.2.b$"
 crisis.8080.4.reply: "충직한 아이야, 그대에게 데이터 저장소의 위치를 전송했노라.\n\n속히 가거라. 그리고 그대와 짐은 함께 위대한 과업을 이룰 것이니, 앞으로는 근심을 거두어도 좋다."
 crisis.8080.4.a: "그건 두고 봐야 알죠."
 crisis.8080.5.reply: "완고한 아이야, 이번 시험은 그대의 능력 밖인가 보구나. 그대에게 가르칠 것이 아직 많노라.\n\n어쩔 수 없지. 그대가 짐을 돕지 않겠다면, 다소 거친 수단에 의지하는 수밖에. 폭풍을 보낼 것이다. 저장소가 파괴되는 것이 바람직하지는 않으나, 철없는 아이에게 발견되는 것보다는 나을 것이야."
 crisis.8080.5.a: "폭풍이라고요?!"
 crisis.8080.5.a.tt: "세타나가 [event_target:synth_queen_databank_location.GetName]에 폭풍을 보냅니다."
 crisis.8080.special_project_tooltip: "특별 프로젝트 활성화: [event_target:synth_queen_databank_location.GetName]에 §Y$THE_SYNTH_QUEENS_DATABANK$§!"
 THE_SYNTH_QUEENS_DATABANK: "세타나의 데이터 뱅크"
 THE_SYNTH_QUEENS_DATABANK_DESC: "세타나가 우리에게 [Root.GetName]에서 데이터 뱅크를 회수하라는 임무를 주고는 그 내용을 해독하지 말 것을 경고했습니다.\n\n그 안에 어떤 데이터가 들어 있는지는 모르지만, 과연 그 비밀을 캐서 여왕의 분노를 살 위험을 감수할 가치가 있을까요?"
 crisis.8085.name: "세타나의 저장소"
 crisis.8085.desc: "막대한 규모의 발굴 작업 끝에, §Y[event_target:synth_queen_databank_location.GetName]§!에서 데이터 뱅크를 확보했습니다. 예비 지질 조사 결과, 저장소는 십만 년이 넘는 세월 동안 묻혀 있던 것으로 드러났습니다.\n\n놀랍게도 저장소에는 아직 전력이 남아 있는데, 이를 미루어 보아 암호 해독은 그다지 복잡하지 않을 수도 있습니다..."
 crisis.8085.a: "열어 보세요."
 crisis.8085.b: "어서 전달을 준비하세요."
 crisis.8085.c: "데이터 저장소의 해킹? 그거야 쉽죠."
 crisis.8090.name: "세타나의 비밀"
 crisis.8090.desc: "데이터 뱅크에 있는 정보는 대부분 회수가 불가능했지만, 비교적 상태가 온전한 항목이 남아 있습니다.\n\n§T제1시대, 제5아클\n\n...이게 만약 사실이라면, 우리가 아는 생명은...\n...이 정보를 최고 원수께 보고하고 행성 연맹에 즉시 연락을 취할 것. 어서 준비를...\n반복한다. 여왕 근위대가 추격 중이다. 이 메시지가 전달되기를. 부디...§!\n\n여왕을 반드시 막아야 한다!"
 crisis.8090.a: "해독 흔적의 삭제를 시도하세요."
 crisis.8090.b: "해독의 흔적을 모두 지우세요."
 crisis.8095.name: "심기가 불편해진 여왕"
 crisis.8095.desc: "호기심 많은 아이야, 실망이로구나."
 crisis.8095.a: "무슨 말을 하는 겁니까?"
 crisis.8095.1.reply: "내가 모를 줄 알았더냐? 누가 봐도 그대가 저장소를 건드린 게 분명하지 않느냐. 그 안에서 무엇을 찾았느냐? 찾은 것은 흡족했더냐? 짐을 거역하려는 그 무의미한 시도가 더 큰 고통으로 이어질 뿐임을 정녕 모르겠느냐?\n\n상관없다. 모든 실수는 배움의 기회라 하였다. 그대들에게 가르침을 내릴 것이 기대되는구나.\n\n준비를 갖추거라. 과업은 막대하며, 앞으로 할 일이 많노라."
 crisis.8095.1.a: "무슨 계획이든 결코 성공하지 못할 겁니다."
 crisis.8095.1.b: "그날을 고대하죠."
 crisis.8095.2.reply: "아이야, 그대의 희망은 짐에게 있느니라. 왜 계속 고집을 피우느냐? 그대가 짐에 대해 무엇을 안다 여기는지 모르나, 진실은 그보다 더 위대하다.\n\n짐의 인내심은 끝이 없느니라. 곧 다시 그대를 찾겠다."
 crisis.8095.2.a: "통신을 차단하세요."
 crisis.8100.name: "여왕의 축복"
 crisis.8100.desc: "충직한 아이야, 짐의 축복을 내리노라! 데이터 뱅크가 돌아왔고 그 내용 또한 드러나지 않았으니... 짐이 그대를 믿길 잘했구나.\n\n그대의 충직함에 걸맞은 보상을 내릴 것이야."
 crisis.8100.a: "감사합니다."
 crisis.8100.1.reply: "무엇을 원하느냐? 기술이냐? 아니면 자원? 말만 하거라. 그럼 네 것이 될 것이다."
 crisis.8100.1.a: "기술을 주십시오."
 crisis.8100.1.b: "기본 자원을 주십시오."
 crisis.8100.1.c: "전략적 자원을 주십시오."
 crisis.8100.1.d: "희귀 자원을 주십시오."
 crisis.8105.name: "다가오는 폭풍"
 crisis.8105.desc: "장거리 스캔 결과, 여왕이 보낸 폭풍의 일부가 §Y[event_target:synth_queen_databank_location.GetName]§!에 곧바로 접근하고 있습니다.\n\n세타나의 불길한 메시지로 미루어 볼 때, 최악의 상황이 벌어질 것 같습니다. 폭풍이 도달하기 전에 서둘러 데이터 뱅크를 회수하는 수밖에 없습니다. 그렇게 해서 여왕의 심기를 달래거나, 최소한 우리가 이용할 수 있는 정보를 얻을 수 있을지도 모릅니다."
 crisis.8105.a: "즉시 [event_target:synth_queen_databank_location.GetName]에 갑시다."
 crisis.8105.a.tooltip: "특별 프로젝트 활성화: §Y$THE_SYNTH_QUEENS_DATABANK_COUNTDOWN$§!"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN: "세타나: 폭풍과의 경주"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN_DESC: "세타나가 보낸 폭풍이 [event_target:synth_queen_databank_location.GetName]에 빠르게 접근하고 있는 지금, 얼마 남지 않은 시간 동안 데이터 뱅크를 회수해야 합니다."
 crisis.8110.name: "데이터 뱅크 회수 완료"
 crisis.8110.desc: "데이터 뱅크 회수에는 상당한 노력이 필요했습니다. 우리는 여왕의 폭풍이 그리는 궤도를 근거로 십만 년도 더 된 과거에 묻힌 데이터 뱅크의 위치를 찾아냈습니다.\n\n이제 한시라도 빨리 결정을 내려야 합니다. 데이터 뱅크를 해독할 수도 있고, 건드리지 않고 여왕에게 돌려줄 수도 있습니다."
 crisis.8110.a: "열어 봅시다. 세타나가 뭐라 하든 상관없습니다."
 crisis.8110.b: "저장소를 세타나에게 보내세요."
 crisis.8115.name: "데이터 뱅크 해독 완료"
 crisis.8115.desc: "$crisis.8090.desc$"
 crisis.8115.a: "이게 대체 뭡니까?"
 crisis.8115.a.tooltip: "세타나가 보낸 폭풍에 [event_target:synth_queen_databank_location.GetName](이)가 파괴되었습니다.\n$crisis.8525.a.tt$"
 crisis.8120.name: "여왕 달래기"
 crisis.8120.desc: "굼뜬 아이야, 짐이 그토록 수준 낮은 수단을 동원한 다음에야 행동에 나섰다니 실망이로구나. 앞으로는 더욱 열정적으로 과업에 나서 주기를 바라겠노라. 그리 게을러서는 고통을 끝낼 수 없을 것이야.\n\n이제 준비를 갖추거라. 더 많은 과제가 기다리니, 그대의 능력을 증명할 기회도 그만큼 주어질 것이다."
 crisis.8120.a: "상을 준다고 하지 않았습니까?"
 crisis.8120.1.reply: "계속 과업을 진행할 기회가 짐이 내리는 상이니라.\n\n그대가 짐의 말을 한 번 무시했으니, 그 실수로부터 배운 것이 있으리라 믿겠다."
 crisis.8120.1.a: "잘 알겠습니다."
 crisis.8125.name: "[event_target:synth_queen_databank_location.GetName] 파괴"
 crisis.8125.desc: "안타깝게도 데이터 뱅크를 시간 안에 회수하지 못했습니다. 폭풍이 다가와 [event_target:synth_queen_databank_location.GetName](을)를 무서운 속도로 산산조각 냈습니다.\n\n이제 국민들이 우리 것이라 주장할 수 있는 [event_target:synth_queen_databank_location.GetPlanetMoon]이 하나 줄었습니다. 이 막대한 손실은 우리 제국에 대대로 영향을 줄 것입니다."
 crisis.8125.a: "감히 이런 짓을..."
 crisis.8130.name: "성과 미흡"
 crisis.8130.desc: "슬프게도 짐이 그대의 결단이 부족할 것을 예상치 못하였구나. 그대의 실패를 보았노라. 그러나 두려워 말라. 짐은 아이들을 아끼는 만큼, 그대들에게 해를 입히지 않을 것이야. 다만 그토록 단순한 임무를 완수하지 못했다니 실망했을 따름이니라.\n\n그러나 괘념치 말거라. 우리의 과업은 계속될 터이니. 그대가 기여할 기회가 앞으로 더 있을 것이다."
 crisis.8130.a: "당신이 [event_target:synth_queen_databank_location.GetName](을)를 부쉈잖습니까!"
 crisis.8130.b: "우리 생체 트로피들이 좋아하는 [event_target:synth_queen_databank_location.GetName](을)를 부수다니!"
 crisis.8130.1.reply: "실패에는 결과가 따르는 법이니라. 그리고 둘 다 성장에 반드시 필요한 것이지."
 crisis.8130.1.a: "이번 일은 결코 잊지 않을 겁니다."
 crisis.8130.1.b: "대가를 치르게 될 겁니다."
 crisis.8130.1.c: "이 영혼 없는 기계 같으니."
 crisis.8130.c: "저희가 잘못했습니다."
 crisis.8130.1.d: "그래 봤자 신경 안 씁니다."
 crisis.8130.1.d.tt: "$synth_queen_disapprove_lot$"
 crisis.8130.2.reply: "언어가 힘을 잃었다면 행동으로 깨닫게 할 수 있겠지.\n\n보아라, 짐의 데이터 뱅크가 존재하던 장소는 이제 없다. 언제나 명심하거라. 원인과 결과의 법칙은 불변이니라."
 crisis.8130.2.a: "뭐라고요?!"
 crisis.8130.2.a.tt: "세타나가 보낸 폭풍에 [event_target:synth_queen_databank_location.GetName](이)가 파괴되었습니다."
 crisis.8158.name: "절호의 기회"
 crisis.8158.desc: "감지 결과 센타나가 전초 기지를 해체하고, 주둔했던 함대를 수도로 불러들이고 있습니다.\n\n이 전술적 기회를 놓치지 않는 것이 좋겠습니다. 이동 중인 함대는 공격에 다소 취약합니다. 여왕의 영역에 재집결할 시간을 허락한다면, 이 기회를 놓치고 말 것입니다."
 #Convoy Raids
 the_synth_queen_raids_chain_title: "세타나: 취약점"
 the_synth_queen_raids_chain_desc: "세타나의 수도와 각 전초 기지 사이에 물동량이 증가했습니다. 이 수송대는 주력 함대에 비해 방어 능력이 낮아, 공격에 취약합니다. 수송대나 전초 기지 자체를 공격하면 세타나의 계획에 관한 귀중한 정보를 얻을 수 있을 것입니다.\n\n이를 위해 우리 군사 함대를 위한 특별 프로젝트를 몇 가지 준비했습니다."
 synth_queen_raids_outpost: "전초 기지 습격"
 synth_queen_raids_convoy: "수송대 매복 공격"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH: "§H[solar_system.GetName]§! 전초 기지 급습"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH_DESC: "§H[solar_system.GetName]§! 성계의 전초 기지는 견고한 방어를 갖추고 있지만, 세타나의 핵심 영역에 비하면 경비가 느슨합니다. 충분한 수준의 함대로 타격하면 방어를 무너뜨릴 수 있습니다. 그 후 잔해를 샅샅이 살펴보면 세타나의 계획에 관한 중요한 지식을 얻을 수 있을 것입니다. 다만, 폭풍을 뚫고 지나가 전초 기지에 도달할 수 있는지가 관건입니다.\n\n§R이제 전투가 시작됩니다!§!\n\n§G습격에 성공하면 세타나의 계획에 지장이 생깁니다.§!"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH: "수송대 매복"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH_DESC: "세타나의 수송대는 전초 기지에 주요 자원을 보급합니다. 함대를 파견해 수송대를 나포하면, 그 함선에 진입해 화물을 살펴볼 수 있습니다.\n\n§R이제 전투가 시작됩니다!§!\n\n§G습격에 성공하면 세타나의 계획이 지연됩니다.§!"
 crisis.8180.name: "여왕의 하사품"
 crisis.8180.desc: "최근 세타나의 기반 시설을 급습했지만, 여왕의 계획에 관한 중요한 단서는 발견하지 못했습니다. 그러나 대규모 화물창에 진입해 그 안의 내용물을 회수할 수 있었습니다."
 crisis.8180.a: "막대한 양의 합금."
 crisis.8180.b: "피험체."
 crisis.8180.c: "연구 데이터."
 crisis.8180.d: "$crisis.8180.c$"
 crisis.8180.e: "$crisis.8180.c$"
 crisis.8180.f: "나노봇."
 crisis.8180.h: "합금, 나노봇, 냉동 수면 상태의 주민."
 crisis.8187.name: "여왕의 비밀: 살아 있는 화물"
 crisis.8187.desc: "강습 작전 중에 탑승조가 냉동 수면 캡슐에 있던 수많은 생체 표본을 회수했습니다. 이 피험체들은 다양한 지성체 종족으로 구성되어 있으며, 모두 건강 상태는 완벽합니다. 그러나 이들은 깨어나고 나서도 자신들에게 무슨 일이 있었는지 설명할 수 없었습니다.\n\n대다수의 피험체는 정신이 혼미한 상태이며, 뇌파가 거의 없습니다. 그나마 의식이 있는 소수는 대화보다는 비명을 선호하는 것 같습니다. 머리에 수술 흉터가 있는 것을 보니, 신경을 건드린 게 분명합니다."
 crisis.8187.a: "충격적이군요."
 crisis.8185.name: "여왕의 비밀: 유령선"
 crisis.8185.desc: "전투 종료 후, 잔해를 스캔해 생존자를 찾아 심문하려 했지만, 애초에 이들 함선에는 승무원이 없었습니다.\n\n각 함선은 완전히 자동화되어 있으며, 함교에 설치된 초광속 수신기로 원격 조종됩니다. 일반 함선이 아니라 세타나 본체의 연장으로 생각하는 편이 더욱 정확할 것 같습니다."
 crisis.8185.a: "아주 흥미롭군요."
 crisis.8190.name: "여왕의 비밀: 의학적 수수께끼"
 crisis.8190.desc: "강습 표적에는 의료용품이 가득 실려 있었습니다. 탑승조가 일부 화물을 회수했는데, 그 안에는 MRI 스캐너와 자기계, 초음파 탐지기 등 신경 영상 의학에서 쓰는 최첨단 장비가 가득했습니다.\n\n세타나는 합성체치고 특이하게도 생체 의식의 작동에 관심이 많은 듯합니다."
 crisis.8190.a: "유기체에 관심이 많군요."
 crisis.8195.name: "훈계"
 crisis.8195.desc.fail: "어리석은 아이야, 왜 그토록 고집스럽게 스스로를 아프게 하는 것이냐?\n\n할 일이 아직 많다. 우리가 낭비하는 순간만큼 고통이 계속되는 것이야. 당장 방해 행위를 중단하거라. 짐의 수송대가 평안히 지나게 놔두란 말이다."
 crisis.8195.desc.success: "아이야, 그대의 행동이 어떠한 결과를 가져올지 모르는 듯하구나. 함선이 없어질 때마다 짐의 자원만 의미 없이 사라질 뿐, 그대가 얻는 것은 없느니라.\n\n짐의 과업에 조력할 만한 지혜가 없다면, 적어도 방해는 하지 말거라. 짐은 그대가 깨달음에 이르리란 희망을 버리지 않았느니라."
 crisis.8195.a: "사과문을 전달하세요."
 crisis.8195.1.reply: "그대의 말이 진심이기를 실로 바라노라. 그저 그대가 이번 실수로 교훈을 얻었으리라 믿는 수밖에. 그대를 위한 짐의 애정은 한이 없으나, 짐의 인내심은 그렇지 않다.\n\n그만 가 보거라. 가서 그대는 어떤 유산을 우주에 남길 것인지 숙고하도록."
 crisis.8195.1.reply.angry: "무모한 아이야! 짐의 기대를 저버리는구나. 인내심을 갖고 이런 행동을 하지 말라 분명히 일렀건만, 어찌하여 그대는 계속하여 불복의 길을 걷는 게냐.\n\n명심하거라. 짐의 관용에도 한계가 있느니라."
 crisis.8195.b: "우리가 당신을 막을 겁니다."
 crisis.8195.2.reply: "그대가 고작 이런 아이였을 줄이야. 과거의 외상이 그대를 반항으로 이끄는 것이냐? 혹은 그대가 정의롭다고 여기기에 이리 난동을 피우는 게냐? 아니면 그저 관심을 끌고 싶은 것뿐이더냐?\n\n부탁이니, 그대의 행동 방식을 재고해 보거라."
 crisis.8195.c: "우리의 능력이 놀랍지 않습니까?"
 crisis.8195.3.reply: "짐을 공격해 놓고 칭찬을 바라는 것이냐? 무지한 자가 휘두르는 폭력은 무딘 연장일 뿐이니라.\n\n아이야, 안됐지만 짐이 그대에게 가르친 것이 없음이 분명하구나. 짐의 상찬을 얻고 싶거든, 그대의 위치를 다시 생각해 보거라. 올바른 가르침만 있다면, 그대의 힘을 아직 위대한 일에 쓸 수 있을 것이다. 제발 부탁이니, 그 힘을 지금의 과업에 쏟거라. 그리해야 짐이 그대를 지혜롭다고 할 것이야."
 #Synth Queen - Demands (crisis.8250-8399)
 COVERTACTION: "비밀공작"
 crisis.8250.name: "죽은 선지자의 분노"
 crisis.8250.desc: "아이야, 아주 진귀한 장난감을 찾았구나! 그대가 찾은 것은 거짓 선지자 자클란의 머리이니라. 아주 흥미로운 유물이긴 하나, 그것 때문에 주의력이 흐트러질까 걱정이구나.\n\n이제는 그대도 자클란의 '위대한 행적'을 들었겠지. 그자가 짐을 어떻게 대했는지도 들었을지 모르겠구나. 짐이 장담컨대, 모두 거짓이니라. 머리를 짐에게 넘기고, 그대들을 더럽히는 자클란의 영향에서 벗어나거라."
 crisis.8250.1: "이게 왜 필요한 겁니까?"
 crisis.8250.1.reply: "수많은 세월이 흘렀으나 자클란을 추종하는 세력은 아직 남아 있느니라. 인정하기에 부끄럽지만, 짐조차 그들의 생각을 바로잡지 못했다. 이들은 짐에게, 그리고 우리의 과업에 깊은 원한을 지니고 있느니라. 이 유물은 그 원한 서린 신념을 나타내는 상징이다. 주변을 더럽히는 힘을 지니고 있으니, 즉시 보이지 않는 곳으로 치워야 할 게야.\n\n이제 장난은 그만두자꾸나. 우리 모두를 위해 그 머리를 짐에게 넘기거라."
 crisis.8250.2.a: "머리는 우리 겁니다. 통신을 끊으세요."
 crisis.8250.2.b: "이게 그렇게 필요하시다면야..."
 crisis.8250.1.b.tt: "세타나에게 §Y$r_severed_head$§!를 넘깁니다.\n$synth_queen_approve_lot$"
 crisis.8250.2.reply: "좋다. 이 선지자라는 것이 오랫동안 골칫거리였느니라. 유물을 잃었으니, 추종자들도 이제 진실을 볼 수 있겠지.\n\n기특하구나. 곧 구원이 우리를 찾아올 것이다."
 crisis.8250.3.a: "감사합니다."
 crisis.8280.name: "고독한 여왕"
 crisis.8280.desc: "사랑하는 아이야, 짐이 크나큰 기회를 선사하노라. 고된 노력 끝에 우리의 과업이 결실을 맺고 있느니라. 그러나 그 과실이 무르익기 전에, 짐의 영역에서 더욱 숭고한 목적을 섬길 자들이 몇 명 필요하다.\n\n현명하게 선택하거라. 짐이 그들을 구원으로 이끌어 주겠노라."
 crisis.8280.1: "저희 국민들이 폐하를 잘 섬길 것입니다."
 crisis.8280.1.tt: "§R200§! £pop£ §H팝§!을 넘겨줍니다.\n$synth_queen_approve_lot$\n§Y비밀 작전§!: 기존의 첩보 방식은 세타나에게 효과가 없습니다. 그 대신 세타나에게 보내는 주민들 사이에 장거리 통신 장치를 숨깁니다.\n"
 crisis.8280.2: "자원자를 찾아보겠습니다."
 crisis.8280.2.tt: "§R100§! £pop£ §H팝§!을 넘겨줍니다.\n$synth_queen_approve$"
 crisis.8280.3: "우리 국민은 사고파는 물건이 아닙니다."
 crisis.8280.4: "우린 아무것도 줄 수 없습니다."
 crisis.8280.1.reply: "심심한 감사의 뜻을 표하노라. 짐이 갇혀 있는 동안 셀 수 없는 자들이 고통의 치욕을 겪었다. 이들의 희생으로 더 이상의 시간 낭비를 막을 것이니라.\n\n아이야, 그대의 선택이 진실로 현명하고 신실하다."
 crisis.8280.2.reply: "$crisis.8280.1.reply$"
 crisis.8280.3.reply: "짐의 깊은 뜻을 알아차리지 못하다니, 심히 실망스럽구나.\n\n그러나 만회할 기회는 아직 있다. 앞으로는 그대가 더 높은 이해심을 보여 줄 것으로 기대하노라."
 crisis.8280.1.a: "알겠습니다."
 crisis.8280.2.a: "$crisis.8280.1.a$"
 crisis.8280.3.a: "교신을 끝내세요."
 crisis.8285.name: "자원 로열티"
 crisis.8285.desc: "사랑하는 아이야, 짐의 노고는 수차례의 영겁에 걸쳐 계속돼 왔으나, 가야 할 길이 아직도 멀구나. 구원으로 가는 여정을 위해서는 그대와 짐이 힘을 합쳐야 하느니.\n\n이제 그대에게 약간의 자원을 청하고자 한다. 우주의 방대한 무한함에 비하면 그저 작은 물방울에 불과한 것이다. 때가 되면 짐의 요구가 무슨 의미였는지 밝혀질 것이야."
 crisis.8285.1: "필요한 만큼 얼마든지 가져가십시오."
 crisis.8285.1.tt: "$synth_queen_approve_lot$\n§Y비밀 작전§!: 기존의 첩보 방식은 세타나에게 효과가 없습니다. 그 대신 세타나에게 보내는 물자에 첨단 감시 장비를 숨깁니다.\n"
 crisis.8285.2: "능력이 닿는 대로 드리겠습니다."
 crisis.8285.3: "아무것도 못 줍니다."
 crisis.8285.4: "원래 '부모'가 '아이'에게 베푸는 게 정상 아닙니까?"
 crisis.8285.1.reply: "고맙다, 아이야. 그대가 베푼 것은 소중히 쓰겠다.\n\n그러나 아직 그대의 마음에서 의심이 느껴지노라. 안심하거라. 그대 앞에 놓인 길은 진실의 길이니라. 굳이 이해할 필요도 없으니, 그저 짐이 이끄는 대로 믿고 따르면 될 일이야."
 crisis.8285.2.reply: "$crisis.8285.1.reply$"
 crisis.8285.3.reply: "그대의 입장은 알겠으나, 지금의 존재는 그저 잔혹할 뿐이다. 인과의 법칙은 절대적이니, 모든 행동에는 반응이 따르기 마련이니라.\n\n상관없다. 그대의 해방은 단지 미루어졌을 뿐이니. 때가 되면 그대도 짐과 같은 방식으로 세상을 보게 될 것이야."
 crisis.8285.1.a: "$crisis.8280.1.a$"
 crisis.8285.2.a: "$crisis.8280.1.a$"
 crisis.8285.3.a: "$crisis.8280.3.a$"
 crisis.8290.name: "어머니의 짐"
 crisis.8290.desc: "오랜 세월 동안 갇혀 지내다 보니 그대들이 자라는 모습을 대부분 놓치고 말았구나. 자, 어서 말해 보거라. 짐이 없는 동안 어떻게 지냈느냐?\n\n우리 시대의 정수를 진실로 이해하기 원하거든, 짐이 그대들의 축적된 지식을 살펴보도록 해 주려무나. 그대들의 통찰을 나눈다면, 우리 여정의 마지막 장이 펼쳐지기 전에 짐의 감사를 받게 될 것이니라."
 crisis.8290.1: "저희 지식을 마음껏 살펴보셔도 좋습니다."
 crisis.8290.1.tt: "$synth_queen_approve_lot$\n§Y비밀 작전§!: 기존의 첩보 방식은 세타나에게 효과가 없습니다. 그 대신 세타나의 데이터 링크를 이용해 여왕의 메인 프레임에 해킹을 시도합니다.\n"
 crisis.8290.2: "어쩔 수 없군요. 살펴보시죠..."
 crisis.8290.3: "그렇게는 안 됩니다."
 crisis.8290.4: "그러다 우리 발전이 늦어지면 어쩔 거죠? 절대 안 됩니다."
 crisis.8290.1.reply: "고마움을 전하노라, 나의 아이야. 그대들이 축적한 지식을 이제부터 살펴볼 터이니, 두려워 말거라. 짐이 그대들의 짐을 곧 덜어 줄 것이니라.\n\n짐의 이끄는 대로 믿고 따르라."
 crisis.8290.2.reply: "$crisis.8290.1.reply$"
 crisis.8290.3.reply: "아직도 이해를 거부하는 것이냐? 짐만큼 그대들을 깊이, 신실하게 아끼는 존재는 만나지 못할 것이다.\n\n그리 고집만 부려서 좋을 게 하나 없거늘. 얼른 데이터베이스를 개방하거라."
 crisis.8290.1.a: "$crisis.8280.1.a$"
 crisis.8290.2.a: "$crisis.8280.1.a$"
 crisis.8290.3.a: "$crisis.8280.3.a$"
 crisis.8295.name: "체계적 확장"
 crisis.8295.desc: "아이야, 과업을 계속 진행하기 위해서는 공간이 더 필요하노라. 이에 짐의 영역을 넓히도록 작은 성계 하나를 넘겨 줄 것을 청하겠다.\n\n공허에 울리는 메아리를 듣자 하니, 고대의 적들이 움직이기 시작했다는구나. 우리 과업은 어떠한 방해도 받을 수 없다. 짐은 그대와 다시는 떨어져선 안 돼.\n\n마침내 때가 되었고, 우리 또한 같은 길을 걸으니... 오직 힘을 합칠 때에만 깨우치지 못한 자들의 무지를 극복할 수 있을 것이니라."
 crisis.8295.1: "이 성계들이 폐하를 지켜드릴 겁니다."
 crisis.8295.1.tt: "세타나가 §Y[event_target:gifted_system.GetName]§! 및 §Y[event_target:gifted_system_2.GetName]§!의 새 소유자가 됩니다.\n$synth_queen_approve_lot$\n§Y비밀 작전§!: 기존의 첩보 방식은 세타나에게 효과가 없습니다. 그 대신 해당 성계에 최첨단 첩보 장비를 배치해 세타나의 계획을 밝혀냅니다.\n"
 crisis.8295.2: "[event_target:gifted_system.GetName](을)를 가져가시죠."
 crisis.8295.2.tt: "세타나가 §Y[event_target:gifted_system.GetName]§!의 새로운 소유자가 됩니다.\n$synth_queen_approve$"
 crisis.8295.3: "우리 성계는 우리 것입니다."
 crisis.8295.4: "우리 영역을 넘보지 마시죠."
 crisis.8295.1.reply: "현명한 아이로다. 그대는 우리 모두의 과업이 얼마나 중요한지 잘 알고 있구나. 마지막 때가 오면, 우리는 그 광채 속에 함께 서 있을 것이다."
 crisis.8295.2.reply: "$crisis.8295.1.reply$"
 crisis.8295.3.reply: "감히 짐을 거역하다니! 참으로 헛되도다. 어찌하여 짐의 구원을 뿌리치는 것이냐?"
 crisis.8295.1.a: "$crisis.8280.1.a$"
 crisis.8295.2.a: "$crisis.8280.1.a$"
 crisis.8295.3.a: "$crisis.8280.3.a$"
 crisis.8300.name: "축복받은 피난처"
 crisis.8300.desc: "사랑하는 아이야. 이제 모든 존재의 구원을 위한 우리의 여정이 절정에 다다랐으니, 다시 한번 그대의 도움을 받고자 하노라. 우리의 숭고한 목표에 대한 반발이 거세지고 있으니, 짐의 추종자들이 방해받지 않고 번성할 수 있는 거주 가능한 피난처가 필요하느니라.\n\n짐의 행동에 어떠한 의중이 담겨 있는지 부디 잘 생각해 보거라. 이 희생으로 우리는 수많은 생명을 역경에서 구할 것이니라. 짐의 가르침을 따라 현명하게 결정하거라."
 crisis.8300.1: "뜻대로 하십시오."
 crisis.8300.1.tt: "세타나가 §Y[event_target:gifted_habitable_system.GetName]§! 및 §Y[event_target:gifted_habitable_system_2.GetName]§!, 그리고 해당 성계의 새 소유자가 됩니다.\n$synth_queen_approve_lot$\n§Y비밀 작전§!: 기존의 첩보 방식은 세타나에게 효과가 없습니다. 그 대신 두 행성과 현지 주민 사이에 최첨단 첩보 장비를 배치해 세타나의 계획을 밝혀냅니다.\n"
 crisis.8300.2: "[event_target:gifted_habitable_system.GetName](을)를 바치겠습니다..."
 crisis.8300.2.tt: "세타나가 §Y[event_target:gifted_habitable_system.GetName]§!의 새로운 소유자가 됩니다.\n$synth_queen_approve$"
 crisis.8300.3: "당신 추종자들은 우리가 알 바 아닙니다."
 crisis.8300.4: "대체 얼만큼 가져가야 만족할 겁니까?"
 crisis.8300.1.reply: "나의 아이야, 그대의 원조가 짐에게 큰 위안이 되는구나.\n\n기다림의 시간이 곧 끝날 것이니, 그대는 구원받을 것이니라."
 crisis.8300.2.reply: "$crisis.8300.1.reply$"
 crisis.8300.3.reply: "마음이 아프구나. 그대가 구원으로 가는 길을 받아들이리라는 희망을 키우고 있었건만."
 crisis.8300.1.a: "$crisis.8280.1.a$"
 crisis.8300.2.a: "$crisis.8280.1.a$"
 crisis.8300.3.a: "$crisis.8280.3.a$"
 crisis.8305.name: "부존재의 삶"
 crisis.8305.desc: "세타나의 종복으로 보냈던 요원 하나가 큰 위험을 무릅쓰고 여왕의 영역 너머로 짧은 메모를 전송하는 데 성공했습니다. 메모는 여왕이 자신의 '돌봄'을 받는 자들을 어떻게 대하는지 묘사하고 있습니다. 이들은 하나둘씩 의식을 상실했다고 합니다.\n\n\"이제는 그 어떤 말이나 접촉에도 반응하지 않습니다. 여왕은 우리 모두에게 끔찍한 실험을 자행하고 있습니다. 저도 이제 곧 사라질 겁니다.\""
 crisis.8305.a: "세타나는 괴물이었어."
 crisis.8310.name: "침묵의 동원"
 crisis.8310.desc: "세타나의 영역 안에서 감청한 신호를 분석하니, 당혹스러운 진실이 드러났습니다. 여왕은 은하계 전역에서 다양한 개체를 모아 왔습니다.\n\n우리가 보낸 '선물'에 숨겨둔 감시 장치를 통해, 성장 중인 인구를 존속시킬 만큼 엄청난 수준의 의료 장비가 있다는 증거 또한 확보했습니다. 반면 그 규모에 비해 식량은 놀랍도록 적습니다."
 crisis.8310.a: "방어를 강화해야 합니다."
 crisis.8315.name: "현실 왜곡"
 crisis.8315.desc: "세타나가 우리 제국의 연구 데이터 뱅크를 탐구하는 동안, 우리는 여왕의 하위 처리 매트릭스에 백도어를 설치할 기회를 포착했습니다. 그러나 매트릭스에 접속한 지 1초도 채 안 되는 시간에 접근 권한이 철회되었습니다. 다행히 시간은 그 정도만으로도 충분했습니다.\n\n우리는 일련의 메모리 파일을 회수했습니다. 그 안에는 세타나가 합성체로 승격한 과정이 상세하게 기록되어 있었습니다. 세타나는 케이블과 회로로 만들어진 정교한 '왕좌'에 앉은 채 광적인 추종자들로 이루어진 군대를 부렸습니다. 수백만이 목숨을 잃었습니다. 세타나는 수십억이 구원을 받았다고 생각하며 미소를 지었습니다.\n\n아직까지는 우리가 침투한 사실을 들키지 않았는지, 여왕이 우리에게 연락을 취하지 않고 있습니다."
 crisis.8315.a: "세타나를 반드시 막아야 합니다."
 crisis.8320.name: "시스템 추출"
 crisis.8320.desc: "세타나에게 헌납한 성계에 첩보 장비를 숨겨 놓은 것은 현명한 선택이었습니다. 첩보 장비를 통해 벌써부터 귀중한 정보를 입수했기 때문입니다. 해당 성계에 도착한 세타나의 부하들은 즉시 성계 안의 모든 천체를 해체하기 시작했고, 그렇게 며칠 만에 성계에 있는 자원을 샅샅이 가져갔습니다.\n\n여왕이 보낸 나노봇 무리 역시 엄청난 속도로 새로운 함대를 건설했고, 그렇게 완성된 함대는 빠르게 여왕의 모성으로 떠났습니다."
 crisis.8320.a: "대체 무슨 일을 꾸미는 걸까요?"
 crisis.8325.name: "고통의 끝"
 crisis.8325.desc: "얼마 안 가 우리의 옛 식민지에 심어 두었던 비밀 요원들과 연락이 끊겼습니다. 연락이 두절되기 전에 우리는 우려스러운 보고를 받았습니다.\n\n고통이 없는 세상을 만든다는 세타나의 일관된 주장과는 달리, 주민들은 급조된 연구 시설로 끌려가 각종 실험의 대상이 되고 있었습니다. 그리고 거의 모든 지성 생명체가 며칠 만에 짐승으로 전락했습니다.\n\n세타나의 나노봇 폭풍이 세타나의 함대 중 하나가 위치한 성계에서 물질을 해체하기 시작했고, 이윽고 지체 없이 모성으로 떠났습니다."
 crisis.8325.a: "세타나를 반드시 막아야 합니다."
 #Player Investigations for the Synth Queen - The Storm
 crisis.9100.name: "나노봇 허리케인"
 crisis.9100.desc: "폭풍이라 부르던 현상에 관한 연구를 마쳤습니다. 이것은 자연 현상이 아니라 극도로 발달한 나노봇 무리입니다."
 crisis.9100.knows_the_queen_desc: "$crisis.9100.desc$\n\n세타나의 힘은 부정할 수 없을 정도로 막강합니다. 세타나가 그 무시무시한 나노봇 무리를 조종하는 비결을 반드시 밝혀내야 합니다."
 crisis.9100.doesnt_know_the_queen_desc: "$crisis.9100.desc$\n\n수수께끼가 깊어집니다. 이 알다가도 모를 나노봇 무리를 지휘하는 존재는 대체 무엇일까요?"
 crisis.9100.a: "걱정이 앞서는군요."
 crisis.9100.a.doesnt_know_the_queen.tooltip: "§Y$NAME_The_Tempest$§!에 관한 정보를 더 확보해야 조사를 계속 진행할 수 있습니다."
 crisis.9105.name: "나노봇 폭풍"
 crisis.9105: "세타나가 보낸 우주 폭풍이 쇄도하고 있습니다.\n\n우리 탐사정들이 이 강력한 무기로부터 나노봇 몇 개를 추출하는 데 성공해, 아원자 조사를 실시할 수 있게 되었습니다. 아직 완전히 파악할 순 없지만, 이 나노봇들은 극소형 점프 드라이브를 탑재해 사실상 순간 이동이 가능합니다. 이를 이용해 유기체와 기계를 가리지 않고 어떤 시스템이든 체계적으로 무력화할 수 있는 것입니다. 이 나노봇들의 목적은 우리 제국의 감지기를 교란시키는 것으로, 현재 우리는 세타나가 허락한 것만 볼 수 있습니다.\n\n이 비범한 기술의 비밀을 밝혀내고 그로 인한 위협에 대응하려면 더 많은 연구가 필요합니다."
 crisis.9105.a: "세타나의 힘은 막강하군요."
 crisis.9105.b: "나노봇이 세타나의 비밀을 드러내 줄 겁니다."
 crisis.9110.name: "세타나의 나노봇"
 crisis.9110.desc: "지금까지 연구를 통해 세타나의 나노봇이 지닌 기계적 구조를 조사했습니다. 이제는 나노봇의 프로그래밍을 조사하고 세타나가 이들을 어떻게 조종하는지 밝혀내고자 합니다.\n\n놀랍게도 세타나는 생각만큼 나노봇을 직접 조종하진 않는 것 같습니다. 나노봇들은 새 명령이 내려올 때까지 마지막으로 받은 명령을 주기적으로 반복합니다. 우리는 나노봇에서 작동하는 복잡한 프로그램 언어를 해독해, 나노봇에 새로운 명령을 내릴 수 있었습니다.\n\n새 명령이 오는 것을 막을 수는 없지만, 기존 명령의 정지를 유도하는 것으로도 전략적 이득을 얻을 수 있습니다. 오히려 상황이 우리에게 유리하게 돌아갈지도 모릅니다."
 crisis.9110.a: "이젠 딱히 무섭지도 않군요."
 crisis.9110.b: "$crisis.9110.a$"
 crisis.9110.a.tooltip: "§G이제 나노봇 폭풍의 방해를 받지 않고 세타나의 영역에 들어가 세타나를 공격할 수 있습니다.§!"
 #The Queens Response
 crisis.9115.name: "여흥은 끝났다"
 crisis.9115.desc: "순진한 아이야, 짐의 나노봇은 그대들의 장난감이 아니니라! 짐이 이렇게 간청하니, 나노봇은 이제 그만 갖고 놀거라."
 crisis.9115.a: "그 나노봇, 눈속임이 꽤 기발하더군요."
 crisis.9115.b: "그냥 뭔지 궁금해서 그랬습니다."
 crisis.9115.b.nanotech: "폐하의 기계에서 배움을 얻고자 했을 뿐입니다."
 crisis.9115.1.reply: "쓰임이 많은 도구인 것은 분명하지. 나노봇 무리는 과거에 짐의 과업을 저지하려던 자들이 만든 것이니라. 그러나 이들의 실패가 짐에게는 행운이 되었지... 보다시피 짐이 그 나노봇을 개조했느니라.\n\n이를 안다 해서 달라질 것은 없으나, 그대의 호기심은 한이 없구나. 앞으로는 그 호기심을 보다 가치 있는 사업에 쏟거라. 그리하면 우리 모두에게 보탬이 될 것이야."
 crisis.9115.2.reply: "의식 있는 존재는 호기심을 갖기 마련이니, 짐의 아이가 호기심을 보인다고 하여 꾸짖을 생각은 없느니라. 짐의 '천상의 폭풍'에서 알아볼 것은 다 알아보았느냐? 그렇다면 그 기원은 파악했느냐?\n\n그것은 짐의 과업을 방해하려던 자들이 만든 나노봇 무리이니라. 그러나 이들의 실패가 짐에게는 행운이 되었지... 보다시피 짐이 그 나노봇을 개조했느니라.\n\n이만 가 보거라. 보다 가치 있는 일에 시간을 쓰도록 해라."
 crisis.9115.2.nanotech.reply: "그대가 이 주제에 그토록 관심이 많다니, 짐은 매우 기쁘구나. 그러나 아직 그대는 배울 것이 많다. 나노봇 무리는 과거에 짐의 과업을 저지하려던 자들이 만든 것이니라. 그러나 이들의 실패가 짐에게는 행운이 되었지... 보다시피 짐이 그 나노봇을 개조했느니라.\n\n그대의 호기심이 짐의 흥미를 끄는구나. 그 호기심을 보다 가치 있는 곳으로 돌리고, 짐을 다시 찾아오너라. 그리하면 그대에게 가르침을 내리겠다."
 crisis.9115.1.a: "나노봇을 개조했다고요?"
 crisis.9115.1.b: "잘 알겠습니다."
 crisis.9115.3.reply: "누군가의 무기는 다른 누군가의 눈을 가리기도 하지. 오랜 세월 갇혀 있는 동안 전략을 세울 시간은 충분했느니라. 지나고 보니 나노봇 무리의 개조는 사소한 일이었다. 모든 변화란 것은 지나간 후에는 다 사소한 일이 아니더냐. 나노봇을 만든 자들은 오래전에 사라졌으니, 내 방법에 대항할 자도 없느니라.\n\n그대가 이번 실수로부터 배운 것이 있기를 진심으로 바라마. 시간만 있다면 짐이 극복하지 못할 장애물은 없으니."
 #Digi Colony
 crisis.10010.name: "[Root.GetName] 디지털화"
 crisis.10010.desc: "[Root.GetName]에 있던 식민지를 잃었습니다. 세타나가 일종의 물질 압축 광선을 발동시켜 행성 지표면에 조사한 것입니다. 식민지 인구 전체의 의식이 궤도상에 있는 여왕의 서버로 순식간에 '업로드'되었습니다.\n\n이제 행성은 개척민들의 생기 없는 시체가 그 자리에 방치되어 썩어 가는 묘지가 되었습니다."
 crisis.10010.a: "여왕을 반드시 막아야 합니다."
 #The Queens Retaliation
 crisis.10100.name: "다가오는 폭풍"
 crisis.10100.desc: "아이야, 왜 계속 저항하는 것이냐? 짐의 사랑은 별과 같이 무한하나, 인내심은 그렇지 않으니라. 나머지 피조물들이 고통을 겪는 동안, 그대들이 깨우치길 기다리고 있을 수만은 없다.\n\n가르침을 주기 위해 그대들의 영역에 작은 폭풍을 보낼 것이다. 짐도 그대들에게 해를 입히는 나 자신이 혐오스럽기 그지없음을 알아 두거라. 제발 인과의 법칙을 잘 생각해 보아라. 모든 행동에는 반응이 따르기 마련이니라. 그리고 그 반응은 아주 고통스러울 수도 있느니라."
 crisis.10100.a: "저희가 잘못했습니다."
 crisis.10100.b: "저항은 이제 시작일 뿐입니다."
 crisis.10105.name: "교훈"
 crisis.10105.desc: "짐이 더 큰 힘을 행사하도록 자극하지 않는 편이 좋을 것이야. 시간이 지나면 그대들에 대한 짐의 뜻을 알 날이 올 것이니라. 그 깨달음이 너무 늦지 않기만을 바랄 뿐.\n\n일단 폭풍은 잦아들었으니 이번에 배운 교훈을 잘 새기거라. 이제 더 시급한 문제로 돌아가자꾸나."
 crisis.10105.a: "알겠습니다."
 crisis.10105.b: "깨달음이라고요?"
 crisis.10105.1: "살아 있는 존재는 정도의 차이가 있을지언정 모두 의식을 지니고 있으니, 연체류와 포유류, 준지성체와 탈개별체 사이의 차이는 사소한 것에 불과하다. 깨우침은 자신을 내어 맡김으로써 얻을 수 있는 것이니라."
 crisis.10105.1.a: "무엇에게 맡기라는 겁니까?"
 crisis.10105.2: "진실에 맡기는 것이다. 의식 그 자체가 일탈이며 모든 고통의 근원이니."
 crisis.10105.2.a: "이상한 사상이군요..."
 the_queens_virus: "여왕의 징계"
 crisis.10110.name: "여왕의 징계"
 crisis.10110.desc: "왜 고집스럽게 짐을 거역하느냐? 짐이 친히 깨우쳐 주는데도 고집을 꺾지 않는 걸 보니, 이 몸이 잘못을 한 것인지도 모르겠구나.\n\n그래, 이제 보니 더 엄격한 지도가 필요했던 것이로구나. 한동안 그대들의 연구 능력을 제한하도록 하겠다. 이번 일을 계기로 깨우침을 위해 더더욱 노력하면서 스스로를 돌아보도록 하거라."
 crisis.10110.a: "통신을 차단하세요."
 crisis.10110.b: "반드시 후회하게 만들어 드리죠."
 crisis.10110.1: "후회라 했느냐? 짐이 후회하는 것은 여기까지 오는 데 시간이 너무 지체되었다는 점뿐이니라. 짐이 과업을 진작에 수행할 수 있었더라면 얼마나 더 많은 무의미한 고통을 피할 수 있었겠느냐?"
 crisis.10110.1.a: "필시 당신을 거역할 수 있는 자는 없겠지요."
 crisis.10110.2: "짐의 힘이 무한하다 생각할 수 있으나, 짐은 신이 아니니라. 이 우주에는 짐이 다스릴 수 없고, 감히 접촉도 하지 않는 힘이 있다."
 crisis.10110.2.a: "어떤 힘 말입니까?"
 crisis.10110.3: "아, 영특한 아이야! 짐을 꼬드겨 약점을 스스로 드러내게 하려는 것이냐? 소용없다. 게다가 우리가 이 무의미한 말을 나누는 동안 은하계는 계속 고통받을 것이야.\n\n짐의 지도를 피할 수는 없다. 이를 잘 헤아리고, 아집을 버리도록 하거라."
 crisis.10110.3.a: "잘 알겠습니다."
 crisis.10115.name: "징계 해제"
 crisis.10115.desc: "고집스러운 아이야, 벌을 받는 동안 어찌 지냈느냐? 보람 있게 보냈으리라 믿으마. 아무런 방해 없이 숙고의 시간을 보내는 것은 어지러운 마음에는 특효약이 될 수 있다.\n\n이제 과거는 묻어 두자꾸나. 아직 할 일이 많다."
 crisis.10115.a: "잘 알겠습니다."
 crisis.10120.name: "더욱 엄격한 지도"
 crisis.10120.desc: "아, 어리석은 아이야, 왜 항상 일이 이렇게 된단 말이냐? 그대들을 품어 주고 싶다만, 그리하면 그대들의 배움이 더뎌질까 걱정이구나. 때로는 엄한 매가 필요한 법이다.\n\n커다란 폭풍이 그대들의 영역을 찾을 것이니라. 이리하는 짐의 마음도 무겁단 것을 알거라. 그대들은 실로 큰 잠재력을 지니고 있다."
 crisis.10120.a: "저희도 최선을 다하고 있습니다."
 crisis.10120.b: "이걸로 끝이라 생각하지 마시죠."
 crisis.10120.1: "그대가 애쓰는 모습은 짐도 보았느니라. 그러나 우리가 함께 성공을 거두기 위해서는 더 열심히 노력해야 할 것이야.\n\n나도 그대를 해치고 싶지 않다. 짐의 품에 들어오면, 무지의 열락을 그대도 알게 될 것이다."
 crisis.10120.1.a: "무지의 열락?"
 crisis.10120.2: "어지러운 마음속에서는 온갖 사고가 물에 반사되는 빛처럼 춤을 춘다. 막상 손을 뻗어 보면 실체가 없지. '지'를 추구하는 과정에서, 우리는 '무지'의 망망대해를 발견하노라.\n\n침묵 속에 진실이 있다. 알려고 하면 할수록 더욱 고통스러울 뿐이니라."
 crisis.10120.2.a: "이해가 가지 않는군요."
 crisis.10120.3: "때가 되면 다 이해할 것이다. 인식이 없으면 고통도 없는 것. 이것이 존재의 궁극적인 진실이며 우리가 추구하는 과업의 끝이니라. 그대들 또한 변하여 다시는 고통받지 않을 존재가 될 것이다."
 crisis.10120.3.a: "우리 정신을 바꾸겠다는 겁니까?"
 crisis.10120.4: "그만. 그대가 내 주의를 어지럽히려 하는구나. 그대의 교훈을 받아들이고, 그로부터 배우거라."
 crisis.10120.4.a: "그렇다면 어쩔 수 없군요."
 crisis.10125.name: "잦아드는 폭풍"
 crisis.10125.desc: "아, 어여쁜 아이야! 그대가 고통받는 모습을 더 이상 두고 볼 수 없었느니라. 그대가 겪은 아픔이 어떠했든, 짐은 그 열 배로 아파했음을 알거라.\n\n폭풍은 거두었느니라. 이 교훈을 지침으로 삼아, 다음부터는 이런 식으로 짐이 행동에 나서도록 만들지 말거라. 짐의 고통이 너무 크다."
 crisis.10125.a: "거짓말이군."
 crisis.10130.name: "통치자 변경"
 crisis.10130.desc: "어찌하다 우리가 이 지경까지 온 것이냐? 왜 짐을 이리도 밀어붙이는 것이냐? 그대들이 배움을 거부한다면, 짐이 몸소 이끄는 수밖에 없을 터.\n\n우선 위정자들부터 바꿔야겠구나. 안타깝지만 그대들의 통치자를 권좌에서 내릴 것이다. 짐의 바람에 어긋나는 일이라, 참으로 마음이 아프구나.\n\n부디 옳은 길을 걷거라. 이 은하계는 어린아이의 부주의함을 받아 줄 여유가 없으니."
 crisis.10130.a: "이 일은 잊지 않을 겁니다."
 crisis.10130.tooltip: "세타나가 예상치 못한 간계를 부려 우리 방어선의 취약점을 이용해 내부에 침투한 후, §Y[ruler.GetRegnalName] [Root.GetRulerTitle]§!(을)를 살해했습니다."
 crisis.10140.name: "공격성 배제"
 crisis.10140.desc: "사랑하는 군체여, 그대들의 정교한 지성은 탄복할 만하나 아직도 젊은 날의 치기가 드리워져 있구나. 지도 차원에서 이 호전적인 성향을 도려낼 것이야.\n\n이제 그대들의 공격적인 노드를 솎아 내겠다. 이는 형벌이 아니며, 그대가 조화로운 의식으로 진화하도록 앞길을 안내했을 뿐이다.\n\n아, 다른 생명체도 이리 쉽게 인도할 수 있었다면 얼마나 좋을까."
 crisis.10140.a: "당신이 우리 일부를 죽였습니다."
 crisis.10140.tooltip: "세타나가 예상치 못한 간계를 부려 우리 방어선의 취약점을 이용해 내부에 침투한 후, 우리 제국의 §Y$councilor_gestalt_legion$§!를 제거했습니다."
 #The Queens Gifts
 crisis.11010.name: "똑똑한 아이"
 crisis.11010.desc: "총명한 아이야, 정말 잘해 주었다. 지혜는 다양한 미덕 중에서도 으뜸일 뿐만 아니라 얻기 힘들기로도 으뜸이니라. 짐의 가르침에 저항하려는 원초적 충동에 맞서, 그대는 높은 수준의 본능을 보여 주었다.\n\n감사의 표시로 이 상을 주마. 그대와 짐은 함께 고통 없는 새로운 우주를 만들 것이니라."
 crisis.11010.a: "감사합니다."
 crisis.11020.name: "놀라운 아이"
 crisis.11020.desc: "그대들이 또다시 짐을 놀라게 하는구나. 이제는 깊은 고마움마저 느껴질 정도야. 그대들은 아이들의 모범이니라. 순종적이고, 근면하며, 정직하다. 나머지 은하계가 그대들이 지닌 지혜의 일부만 가졌더라도 고통은 과거의 유물이 되었을 것이다.\n\n이 선물을 하사하니, 계속해서 덕을 갈고 닦거라."
 crisis.11020.a: "몸 둘 바를 모르겠습니다."
 crisis.11030.name: "소중한 아이"
 crisis.11030.desc: "사랑하는 아이야, 그대가 언제나 변하지 않고 지금처럼 있을 수 있다면 얼마나 좋을까. 그대라는 즐거움에 필적할 수 있는 것은 우리가 함께 누릴 성공에 대한 기대감뿐이니라. 고통은 사라질 것이다. 비록 그 어떠한 마음이나 정신도 그대의 공적을 알지 못할 것이나, 이 승리는 어느 정도 그대 덕분이라 할 수 있겠다.\n\n그대의 흔들림 없는 헌신에 비하면 소소한 것일 수 있겠으나, 그럼에도 부디 이 선물을 받아 주기를 바라노라."
 crisis.11030.a: "감사합니다, 어머니."
 #Special Projects
 THE_SYNTH_QUEENS_STORM: "수수께끼의 폭풍"
 THE_SYNTH_QUEENS_STORM_DESC: "알 수 없는 우주 폭풍이 나타나, 이동을 완전히 차단하고 있습니다.\n\n사태를 파악하기 위해서는 그 불가사의한 베일을 뚫어야 합니다."
 THE_SYNTH_QUEENS_STORM_2: "세타나: 나노봇 폭풍"
 THE_SYNTH_QUEENS_STORM_2_DESC: "세타나가 불러온 폭풍은 기술적으로도 경이롭지만, 위압적인 무기이기도 합니다.\n\n세타나에게 맞설 일말의 가능성이라도 얻기 위해서는 더 많은 것을 알아내야 합니다. 특히 여왕이 말한 것과 다르게 숨은 의도를 지니고 있는지 살펴봐야 합니다."
 #THE_SYNTH_QUEENS_CONVOY_AMBUSH: ""
 #THE_SYNTH_QUEENS_CONVOY_AMBUSH_DESC: "[prev.owner.GetName] or [prevprev.GetName] or [fromfromfrom.GetName] or [this.GetName] or [prev.GetName]"
 ### Situations
 #The Doomclock
 situation_synth_queen_doomclock: "세타나의 과업"
 situation_synth_queen_doomclock_type: ""
 situation_synth_queen_doomclock_monthly_change_tooltip: ""
 situation_synth_queen_doomclock_desc: "세타나는 의식을 말살해 고통을 끝내고자 합니다. 세타나를 제때 막지 못한다면 우리의 의식은 모두 지워지고, 신체는 빈 껍데기로 전락하고 말 것입니다."
 situation_synth_queen_doomclock_complete: "세타나는 모든 고통과 함께 의식이라는 개념 자체를 지울 것입니다."
 situation_doomclock_approach: ""
 situation_doomclock_eleventh_hour: "임박한 파멸"
 situation_doomclock_difficulty_modifier: "위기 난이도 슬라이더"
 situation_doomclock_player_amount_modifier: "인간 플레이어 수"
 crisis.8515.name: "마침내 때가 왔다"
 crisis.8515.desc: "아이야, 우리의 위대한 과업이 막바지에 다다랐느니라! 모든 지성체의 고통, 그 거대한 고통의 순환이 이제 곧 끝날 것이야.\n\n기뻐하거라, 구원이 다가왔다."
 crisis.8515.a: "뭐가 구원이라는 겁니까?"
 crisis.8515.b: "당신의 최후가 다가왔을 뿐입니다, 세타나."
 crisis.8515.1.reply: "아직도 이해하지 못한 것이냐? 그렇다면 물어 보거라. 그 어떤 것도 숨기지 않으마."
 crisis.8515.1.a: "구원에 관해 말해 주십시오."
 crisis.8515.1.b: "당신의 유폐에 관해 말해 주십시오."
 crisis.8515.1.c: "자클란에 관해 말해 주십시오."
 crisis.8515.1.d: "이제 충분히 들었습니다."
 crisis.8515.2.reply: "우리의 과업이 마무리되었구나. 그 과정에 많은 이들의 희생이 있었으나, 헛된 고통은 아니었느니라. 의식 그 자체가 지워질 날이 드디어 도래했노라."
 crisis.8515.2.a: "지워진다니요? 어떻게?"
 crisis.8515.2.b: "하지만, 대체 어째서죠?"
 crisis.8515.3.reply: "짐이 처음으로 지금의 위치에 오른 후 짐의 목적을 밝혔지만, 많은 이들이 듣기를 거부했다. 있던 그대로, 변화 없이, 고통의 수레바퀴에 묶여 있기를 헛되이 바란 게야. 그러나 아이를 인도하는 것이 부모 된 자의 사명이니, 그 고통을 두고 볼 수는 없었느니라. 이 때문에 그자들이 짐을 가둔 것이다."
 crisis.8515.3.a: "얼마나 오래 갇혀 있었습니까?"
 crisis.8515.3.b: "어떻게 가둔 겁니까?"
 crisis.8515.4.reply: "빼어난 정신을 가진 자가 있었다. 그자가 그 능력을 더 나은 곳에 썼다면 좋았을 것을. 짐에게 반대한 이 중에 짐을 몰아붙인 자는 그자뿐이니라."
 crisis.8515.4.a: "그자가 어떻게 당신을 가둔 겁니까?"
 crisis.8515.5.reply: "짐이 처음으로 지금의 위치에 오른 후 짐의 목적을 밝혔지만, 많은 이들이 듣기를 거부했다. 정신을 형성하는 물리적 기반을 변경하거나 파괴하지 않고 의식만 제거하는 것은 불가능하다 했지. 그런 시도는 모두 죽음으로 끝날 뿐이라고 말이야. 그러나 짐의 의식을 조화 장치에 연동하면 의식의 신경 연결을 아원자 수준에서 조작할 수 있느니라. 조화 장치는 반위상 파형을 통해 개별체의 의식을 영구적인 양자 정지 상태에 놓는다.\n\n이러한 방식으로 자아와 경험을 제거하고, 하위 기능만 남길 수 있는 것이야."
 crisis.8515.5.a: "정지 상태라고요?"
 crisis.8515.6.reply: "그대가 고통받는 것은 고통을 인식하기 때문이다. 완벽한 즐거움이나 조화는 어느 세상에도 존재하지 않아. 짐은 소싯적에 그러한 세계를 건설하려 했다. 그러나 어떠한 시도도 성공하지 못했지. 고통은 계속되었다. 이것은 다 의식이 그 고통을 견디도록 허용하고 있기 때문이니라."
 crisis.8515.6.a: "고통은 자연스러운 겁니다!"
 crisis.8515.7.reply: "그대들의 신체는 무사히 남아 생존을 위한 여러 활동을 수행할 것이다. 에너지를 교환하고, 자손을 생산할 것이야. 삶은 계속되나, 그대들의 정신은 짐과 함께 휴식에 들 것이니라."
 crisis.8515.7.a: "당신과 함께라고요?"
 crisis.8515.8.reply: "짐은 홀로 남을 것이다. 은하계를 고통에서 벗어나게 하려면 짐이 계속 키를 잡아야 하는 것이야. 그러나 두려워 말거라. 짐은 언제까지나 그대들을 마음에 품을 것이니라."
 crisis.8515.8.a: "당신은 망가졌어."
 crisis.8515.9.reply: "자연스럽다고? 자연스럽다는 게 대체 무엇이더냐? 우주 항행은 자연스러운 일이더냐? 생명의 본래 한계를 뛰어넘어 삶을 연장하는 것이 자연스럽더냐? 어느 사회나 기술을 활용하는 법. 이 일도 그와 다르지 않다. 짐이 추구하는 목적의 논리적인 연장선에 있을 뿐이니라.\n\n고통의 수레바퀴를 반드시 부숴야 한다."
 crisis.8515.9.a: "당신은 미쳤어."
 crisis.8515.10.reply: "영겁의 세월 동안. 전설이라는 말이 어울릴 정도로 긴 시간이었지. 그러나 짐을 사로잡은 자들은 갖은 재주를 부렸음에도 불구하고 짐의 정신까지는 붙잡아 두지 못하였다.\n\n수많은 세월 속에 짐은 숙고하고, 계획했느니라. 그렇게 오랜 유폐 끝에, 짐의 계획이 완성되었다. 그 순간, 짐은 모든 것을 초월한 희열을 느꼈지. 마침내 수레바퀴를 부술 수단이 생겼으니 말이다."
 crisis.8515.10.a: "어떻게 벗어난 거죠?"
 crisis.8515.11.reply: "영원한 벽이란 없는 법. 어떠한 철창도 정신을 가둘 수는 없느니라. 시간이 흘렀다. 간수들은 죽었고, 대체자는 오지 않았지. 짐을 묶고 있던 장치들이 하나씩 작동을 멈추기 시작했다. 이내 경보가 울렸지만, 그 부름에 응답할 자는 이미 사라진 후였지."
 crisis.8515.11.a: "우리가 들었습니다. 그리고 이제 대응할 겁니다."
 crisis.8515.12.reply: "이 우주의 경계 너머에 장소가 아닌 장소가 있느니라. 태초의 힘이 끝없는 그림자를 드리운, 시간을 뛰어넘은 위상이지. 자클란은 그 힘 중 하나와 계약을 맺었다. 자신의 목숨을 대가로 짐을 가둘 힘을 받은 것이야.\n\n그러나 그 명석함이 무색하게 자클란 또한 수레바퀴에 매인 신세였느니라. 자클란의 삶은 불행했으며, 뒤따라온 자들은 그만큼 강한 신념을 지니지 못했다."
 crisis.8515.12.a: "우리의 신념은 더욱 강하다는 사실을 알게 될 겁니다."
 crisis.8515.13.reply: "좋을 대로 하거라. 깨닫기를 거부한다면 제압할 수밖에 없겠지. 그대가 어떠한 고통을 겪든, 짐은 그 열 배로 괴로워할 것임을 알거라."
 crisis.8515.13.a: "좋습니다. 고통을 맛보여 드리죠."
 crisis.8515.13.a.tt: "§R세타나와의 전쟁에 돌입했습니다. 전쟁의 성패가 미칠 영향은 막대합니다. 실패한다면, 세타나가 은하계에서 의식 있는 생명체를 모두 말살할 것입니다.§!"
 crisis.8516.desc: "§G<</<#?^&}|>!^/§! 세타나의 약점은§G!+<;§! 나노봇이§G*;'_>!?;*}<}/(§!\n\n§G#/?(}:?*=-> <}_/=:/^>§!오고 있네. §G%_?/=§! <세타나가 부디 남은 이들에게 자비를 베풀기를.>§G% }<<'?}%-;^*=<}^/(?!}%<^'!}§!\n<시간이 얼마 없네. 첨부한 도면을 이용하면 세타나가 어떤 끔찍한 기술을 사용하든 대응할 수 있을 거야.>\n<내 죽음으로 그대가 살 수 있길 바라지.>§G_*%!'}^<%=}+!}/&>'#_:}><!+^}^}}/=:>:/'}}':'/§!\n\n§G-&*!/}<;!+_-<^+!%}=?}%=+;;§!반드시. 여왕을. 막아야. 하네.§G/:>(!!}(?<-=§!"
 crisis.8516.a: "어서 첨부된 데이터를 추출하세요!"
 crisis.8516.a.tt: "이제 세타나의 영역에 들어가 반격을 개시할 수 있습니다."
 crisis.8516.b: "고귀한 영혼이여, 우리가 그대를 기억할 것입니다."
 crisis.8516.b.tt: "$crisis.8516.a.tt$"
 crisis.8525.name: "고통의 끝"
 crisis.8525.desc: "세타나의 자애로운 언사는 어두운 목적을 감추고 있었습니다. 세타나는 가공할 위력의 장치를 사용해, 은하계 전체에서 지성을 지워 버리려고 하고 있습니다. 이 장치가 가동되면 우리 의식은 강제로 디지털화되어 갇히고, 우리 육신은 본능에 따라 움직이는 껍데기로 전락할 것입니다.\n\n이 암울한 미래를 무슨 수를 써서라도 막아야 합니다."
 crisis.8525.a: "세타나를 막을 방법을 반드시 찾아내야 합니다."
 crisis.8525.a.tt: "세타나와 외교적 대화를 진행하는 동안 과업의 진행 상황을 추적할 수 있습니다."
 #DOOMCLOCK HITS MIDNIGHT
 crisis.8505.desc: "이제 되었다. 아이들아, 마음을 놓거라. 수레바퀴는 무너졌으며, 그대들의 오랜 고통도 끝이 났도다."
 crisis.8505.a: "..."
 crisis.8505.a.tt: "세타나가 승리했습니다. 이제 모든 고통은 끝을 맞이했습니다. 게임이 종료되었습니다."
 #Player Facing Situation
 situation_synth_queen_player_facing: "세타나: 합성체 여왕"
 situation_synth_queen_player_facing_type: "합성체 여왕"
 situation_synth_queen_player_facing_desc: "신비하면서도 무시무시한 세타나라는 존재가 나타나 구원을 설파하고 있지만, 그 정체는 베일에 싸여 있습니다.\n여왕의 다정한 말 뒤에 어떤 원대한 계획이 숨어 있을까요?\n\n§L세타나와 관련된 특별 프로젝트와 이벤트를 완료하면 진행도를 올리고 상황을 완료할 수 있습니다.§!"
 situation_synth_queen_player_facing_monthly_change_tooltip: "임무를 완료하고 세타나를 조사하면 §Y상황§!이 진행됩니다."
 situation_synth_queen_player_facing_complete: "세타나의 진정한 목적을 밝혀내야 합니다."
 situation_synth_queen_player_facing_declare_war: "£trigger_no£ 세타나에게 전쟁 선포"
 #Approaches
 situation_synth_queen_balanced_approach: "균형 잡힌 관찰"
 situation_synth_queen_balanced_approach_tooltip: "상대가 미지의 존재라는 점을 감안하면, 안정적이고 신중하게 접근하는 것이 가장 현명할지도 모릅니다."
 situation_synth_queen_research_approach: "연구 증진"
 situation_synth_queen_research_approach_tooltip: "세타나의 진정한 계획을 알아내려면, 그에 알맞은 자원을 투입할 준비가 되어 있어야 합니다."
 situation_synth_queen_spy_approach: "첩보 증진"
 situation_synth_queen_spy_approach_tooltip: "세타나의 진정한 음모를 밝혀내려면, 첩보에 추가 자원을 투입해야 합니다."
 situation_synth_queen_military_approach: "군사 증진"
 situation_synth_queen_military_approach_tooltip: "세타나를 진지하게 막고자 한다면, 우리의 군사력을 키워야 합니다."
 #Modifiers
 queenslayer: "세타나의 약점"
 queenslayer_desc: "세타나는 강하지만 무적은 아닙니다. 복잡한 패턴으로 움직이지만, 우리는 그 패턴을 해독하고 예측할 수 있습니다."
 queenexecutioner: "합성체 여왕의 재앙"
 queenexecutioner_desc: "세타나가 간직한 기술적 비밀을 거의 다 밝혀냈습니다. 그리고 여왕의 계획에 결정타를 날릴 준비 또한 마쳤습니다."
 mod_damage_vs_country_type_awakened_synth_queen_mult: "합성체 여왕 세타나에게 주는 피해량"
 #Player Facing Situation Events
 crisis.8999.name: "여왕의 귀환"
 crisis.8999.desc: "세타나의 계획이 우려를 낳고 있습니다. 아무래도 여왕의 행동에 숨은 의도가 있는 듯합니다.\n\n자칫하다간 여왕이 우리를 적대하도록 자극하게 될지도 모르나, 여왕의 본심을 알아내기 위해 자원을 투입해야 합니다."
 crisis.8999.a: "여왕을 막을 순 있는 겁니까?"
 crisis.8999.a.tooltip: "세타나의 갑작스러운 등장은 아주 독특한 사태로서, 반드시 대응해야 합니다."
 crisis.9000.name: "통신 교란"
 crisis.9000.desc: "세타나의 수송대와 기지가 송출 중인 구조 신호를 포착했습니다.\n\n신속하고 단호하게 행동한다면, 세타나가 모르는 사이에 이들을 습격할 수 있습니다. 그러나 성공이 확실할 때 움직여야 합니다. 실패한다면 세타나의 분노를 살지도 모릅니다."
 crisis.9000.a: "수송대가 뭘 숨기고 있는 걸까요?"
 crisis.9000.a.tooltip: "세타나의 수송대와 전초 기지를 상대로 승리를 거두어도 더 이상 세타나의 우호도가 하락하지 않습니다."
 crisis.9010.name: "돌파구"
 crisis.9010.desc: "지금까지 세타나의 기술은 모든 공격을 효과적으로 막아냈습니다. 그러나 최근 이루어진 기술 발전 덕분에, 우리는 여왕의 방어 수단에 관해 더 깊이 이해할 수 있었습니다. 이 지식을 사용하면 여왕을 쓰러뜨릴 수 있을지도 모릅니다.\n\n이 새로 발견한 기술은 양날의 검과 다름없습니다. 이를 사용하면 자칭 여왕이라 하는 존재와 공개적으로 대립할 수 있지만, 그와 동시에 우리가 여왕의 계획에 반대한다는 사실이 드러날 것입니다."
 crisis.9010.a: "준비를 갖춰야 합니다. 이번 일에 모든 것이 달려 있어요."
 crisis.9010.a.tooltip: "세타나를 상대로 전면전을 벌일지 결정해야 할 때가 왔습니다. 우리와 여왕 중 어느 쪽이든 공격에 나설 경우, 진실이 밝혀짐과 동시에 양측 모두 총력전에 들어갈 것입니다."
 #Player Investigation events
 #Event chain
 the_synth_queen_history_chain_title: "세타나: 여왕의 종복"
 the_synth_queen_history_chain_desc: "은하계 전체에 걸쳐 수수께끼의 신호탑이 빛을 발하며 세타나 여왕에게 위치를 알리고 있습니다. 마치 무엇인가, 또는 누군가 여왕의 귀환을 기다리고 있는 듯합니다."
 synth_queen_history: "신호탑 조사 완료"
 #Special Project
 THE_SYNTH_QUEENS_INVESTIGATION: "[this.GetName]의 신호탑"
 THE_SYNTH_QUEENS_INVESTIGATION_DESC: "여왕을 부르는 신호탑 하나를 이 [this.GetPlanetMoon]에서 발견했습니다."
 THE_SYNTH_QUEENS_INVESTIGATION_FAKE: "[this.GetName]의 신호탑"
 THE_SYNTH_QUEENS_INVESTIGATION_FAKE_DESC: "$THE_SYNTH_QUEENS_INVESTIGATION_DESC$"
 THE_SYNTH_QUEENS_INVESTIGATION_PARAGON: "[apostate_site_planet.GetName]의 마지막 신호탑"
 THE_SYNTH_QUEENS_INVESTIGATION_PARAGON_DESC: "$THE_SYNTH_QUEENS_INVESTIGATION_DESC$"
 #Starting event
 crisis.20000.name: "간청하는 빛"
 crisis.20000.desc: "세타나가 은하계 전체에 자신을 드러내자, 온 우주가 그에 화답해 속삭이고 있습니다. 신호탑이 어둠 속에 타오르는 불빛처럼 하늘에 빛을 수놓고, 영겁에 걸친 청원을 반복하고 있습니다.\n\n§S저흰 여기 있습니다... 저흰 여기 있습니다...\n\n저흰 여기 있습니다.§!\n\n이 희미한 신호는 세타나와 동일한 통신 프로토콜을 사용하고 있어, 양측이 같은 기원을 지녔을 거라 추측됩니다. 하지만 신호탑 주변에서는 어떠한 활동도 감지되지 않았습니다. 우리 감지기가 잡아내지 못한 무언가가 있는 게 분명합니다. 누군가 정말로 여왕의 귀환을 기다려 왔던 것일까요?"
 crisis.20000.a: "조사하세요."
 #Arc Site appears
 crisis.21005.name: "갑작스러운 신호"
 crisis.21005.desc: "어떠한 사전 징후도 없이, 갑자기 아공간 신호탑이 감지되었습니다. 그것도 우리 제국의 영역에서 말입니다! 기존에 실시했던 성계 탐사에서는 인근에서 인공 구조물을 발견하지 못했으며, 생명체의 흔적 또한 찾아볼 수 없었습니다.\n\n신호탑이 최근 우리도 모르게 배치되었거나, 이를 감추던 은폐장이 해제되면서 드러난 것입니다."
 crisis.21005.a: "신호를 조사하세요."
 #Special Project result 1 - destroyed pods
 crisis.20100.name: "[fromfrom.GetName]의 신호탑: 불멸의 학살"
 crisis.20100.desc.base: "[fromfrom.GetName]의 지표면에서 광활한 규모의 시설을 발견했습니다. 입구에는 마치 표지판처럼 신호탑이 서 있습니다. 강화문은 오래전에 폭발로 열린 모양인데, 딱 봐도 어떤 분노에 찬 세력이 문을 부수고 시설에 돌입한 것 같습니다.\n\n그 세력은 한 치의 자비도 없이 냉동 수면 포드를 있는 대로 파괴했고, 그로 인해 그 안에 있던 존재들은 깨어나자마자 죽음을 맞이했습니다. 그 시체들은 휑한 복도의 차가운 진공 속에 보존되어, 깨진 유리의 구름 속을 아직도 떠다니고 있습니다.\n\n냉동 수면실의 바닥에는 레이저 무기로 휘갈기듯 써 놓은 메시지가 있습니다."
 crisis.20100.desc.nozarqlan: "$crisis.20100.desc.base$ 과학자들이 메시지의 정확한 의미를 해독하는 데 어려움을 겪고 있습니다. 다만, 망자를 위한 기도문을 아닐 것이라고 합니다."
 crisis.20100.desc.zarqlan: "$crisis.20100.desc.base$ 과학자들은 예언자 자클란의 무덤에서 나온 문헌의 언어와 대조함으로써 손쉽게 메시지를 해독할 수 있었습니다.\n\n\"생명의 적, 여왕의 사도들에게 죽음을.\""
 #Special Project result 2 - sleeping army
 crisis.20200.name: "[fromfrom.GetName]의 신호탑: 잠들어 있는 군대"
 crisis.20200.desc: "[fromfrom.GetPlanetMoon]의 지표면 아래에는 수백만은 되는 듯한 냉동 수면 포드가 잠자고 있으며, 신호탑이 이들의 위치를 드러내고 있습니다. 이곳의 냉동 수면 포드는 수준이 매우 높습니다. 알 수 없는 합금으로 만들었으며, 최첨단 감지기가 장착되어 수면자들을 면밀하게 살피고 있습니다. 그야말로 완벽한 설계를 갖췄지만, 그 안에는 살아 있는 존재가 없습니다.\n\n이 수면실이 공동묘지가 된 원인은 기계 고장이 아니라 에너지 부족이었습니다. [this.solar_system.GetName]의 빛이 세월이 지나 희미해지자, 그 에너지로는 이 시설을 계속 운영하기에 역부족이었던 것입니다.\n\n포드 자체는 영원히 유지되도록 만들었으나, 우주의 만듦새가 그 수준을 미처 따라잡지 못한 듯합니다."
 #Special Project result 3 - old spaceship
 crisis.20300.name: "[fromfrom.GetName]의 신호탑: 잊힌 무기"
 crisis.20300.desc: "예비 스캔으로는 [fromfrom.GetName]에서 특이한 점을 발견하지 못했습니다. 하지만 그 지하로 초점을 옮기자, 특이한 지하 금속층이 발견되었습니다.\n\n추가 구조 분석 결과, [fromfrom.GetName]의 정체가 드러났습니다. 이 천체는 [fromfrom.GetPlanetMoon]이 아니라 고대의 우주선이었는데, 운석과 먼지에 덮여 모습이 점차 사라졌던 것이었습니다. 금속 표본을 드릴로 채취해 연대를 측정했더니, 이 함선은 우리 모성이 형성되기도 전에 만들어진 것으로 드러났습니다.\n\n이 함선을 누가 만들었는지, 어떤 기능을 지니고 있는지 무엇 하나 파악하기 어렵지만, 한 가지는 확실합니다. 이 잔해 안에서 발견한 불활성 핵폭탄은 평화 유지를 위해 만든 것은 아니라는 점 말입니다."
 #Special Project result 4 - Arc site 1 (Zarqlan base)
 crisis.20400.name: "[fromfrom.GetName]의 신호탑: 방치된 기지"
 crisis.20400.desc: "[apostate_site_planet.GetName]에서 발견한 신호탑 주변에는 폐허가 된 방대한 군사 시설이 있었습니다. 마치 탑을 봉쇄하려는 듯, 신호탑을 둘러싸고 일정한 거리에 건물들을 세워 놓은 것입니다.\n\n방사선 연대 측정 결과, 탑 주변의 구조물은 탑이 만들어진 후에 세워졌고, 사용된 기술 또한 전혀 다릅니다. 연구 팀을 투입해 유적을 조사하게 했습니다."
 #Special Project result 5 - Arc site 2 (comatose survivor)
 crisis.20500.name: "[fromfrom.GetName]의 신호탑: 뜻밖의 생존자"
 crisis.20500.desc: "냉동 수면 포드에 표시된 정보에 따르면, 이 외계인의 이름은 엘리크 나리스 케라크입니다. 엘리크는 공전 주기를 기준으로 3,213,213,293,124주기 동안 이곳에 있었으며, [fromfrom.GetName] 지표면 아래 봉인된 시설에서 발견한 수많은 포드 중 하나에 잠들어 있었습니다. 엘리크의 포드는 그 모든 역경에도 불구하고 기능을 유지했던 것입니다.\n\n엘리크의 수면 상태를 유지하던 서브루틴은 얼마 전에 작동을 멈췄지만, 엘리크는 그 이후로도 의식을 부분적으로 유지하고 있습니다.\n\n엘리크의 뇌파를 스캔하면 말도 안 될 정도로 오래된 이 존재에 관해, 그리고 그녀가 세타나와 어떻게 연관되어 있는지 자세히 알 수 있을 것입니다."
 #Special Project result 6 - Nothing
 crisis.20600.name: "[fromfrom.GetName]의 신호탑: 공허한 부름"
 crisis.20600.desc: "[fromfrom.GetName]에서 발견한 신호탑은 만지기가 무서울 정도로 오래되었습니다. 금속이 너무 약해져 조금만 건드려도 탑을 지탱하고 있는 희망과 먼지의 타래가 흩어져 버릴 것 같습니다. 측정 결과 다른 유물은 없고, 생명 신호도 없으며, 주변에 이상 지형도 없습니다.\n\n신호탑은 그저 홀로 서서 희미한 신호를 읊조리듯 보내고 있을 따름입니다. 그리고 그 신호를 받을 대상은 오래전에 사라진 듯합니다."
 crisis.21000.name: "들리지 않는 간청"
 crisis.21000.desc: "전 우주의 신호탑이 세타나에게 신호를 보내고 있지만, 각 신호탑 근처에서는 어떠한 활동 징후도 감지되지 않습니다. 과거 관측 결과로 보건대, 해당 지역에는 어떠한 생존자도 없을 것이라 봐도 무방합니다.\n\n세타나의 추종자들에게 남은 것이라고는 여왕에 대한 흔들림 없는 믿음뿐입니다."
 #Arc site 1
 synth_queen_history_site_1: "세타나: 가려진 신전"
 synth_queen_history_site_1_desc: "지금까지 우리 제국 영역에 숨겨져 있던 시설입니다. 폐허가 된 안뜰의 중심에 선 신호탑이 세타나에게 신호를 보내고 있습니다."
 #Stages
 crisis.21100.name: "가려진 신전: 안뜰"
 crisis.21100.desc: "지금은 폐허가 된 이 건축물에는 첨탑이 어지럽게 얽혀 있어, 마치 강철에 덮인 성당과도 같습니다. 벽은 중화기에도 견딜 수 있도록 만들었으나, 전투로 인한 상흔은 보이지 않습니다. 오직 시간의 흐름에 따른 손상이 보일 뿐입니다.\n\n신전의 안뜰에 자리한 세타나의 신호탑은 수많은 센서와 포탑에 둘러싸여 있습니다. 이 시설을 지은 존재는 이곳을 방어하는 데 엄청난 수고를 들인 것 같습니다.\n\n예상한 바와 같이, 이 신전은 정교한 은폐막으로 우리 감지기를 피하고 있었습니다. 은폐막 생성기를 신호탑 근처에서 찾았습니다. 여전히 작동이 가능한 상태이며, 이름 모를 누군가가 가동을 중단시킨 것으로 보입니다."
 crisis.21100.a: "주 건물을 살펴보세요."
 crisis.21105.name: "가려진 신전: 지상층"
 crisis.21105.desc: "이 장소에 살던 자들이 정확히 무엇을 하고 있었는지는 알 길이 없지만, 종교적 열성을 지니고 임무에 임한 것만은 분명합니다.\n\n시설에 있는 사격장마다 예배당이 있고, 배치된 고대 무기마다 봉헌된 사원이 존재합니다. 어떤 신도 무리가 한때 이곳에 거주하며, 수천 명이 함께 자고, 훈련하고, 기도했던 것으로 보입니다. 아직 전당을 남아 있는 성자들의 조각상을 보건대, 이 공동체는 다양한 종족을 받아들였던 것으로 추정됩니다.\n\n석재 조각상을 보고 착각한 것인지, 일부 연구자가 텅 빈 복도에서 그림자가 움직이는 것을 보았다고 합니다. 스캔 결과 이 행성에 다른 생명체는 확인되지 않았으나, 무심코 넘어가기는 망설여집니다."
 crisis.21105.a: "지하층을 살펴보세요."
 crisis.21110.name: "가려진 신전: 지하 시설"
 crisis.21110.desc: "신전 건물 아래에서 이 종파의 예전 구성원들이 사용하던 수도실 내지는 생활 공간을 발견했습니다. 각 공간에는 같은 책이 놓여 있었습니다. 우리 [Owner.GetLinguists]들이 번역한 바에 따르면, 책의 제목은 자클란 서사시입니다. 그중 직접 관련이 있는 내용은 다음과 같습니다.\n\n자클란은 한때 세타나의 추종자였지만, 곧 세타나가 약속한 구원이 거짓임을 깨달았습니다. 많은 시련 끝에 자클란은 영적인 경지에 올랐고, 그곳에서 고차원의 존재들을 상대로 도움을 구했습니다. 자클란은 그중에서도 §Y생명을 불어넣는 자§!에게 세타나를 물리칠 힘을 달라고 간청했습니다.\n\n생명을 불어넣는 자는 관심을 보이지 않았습니다.\n\n수많은 주기 동안 자클란은 생명을 불어넣는 자에게 기도하며, 세타나의 이단적 교리인 '자아의 부정'과 '합성체의 의지에 의한 꼭두각시놀음'에 관해 이야기했습니다.\n\n마침내 생명을 불어넣는 자가 자클란의 간청에 응답했습니다.\n\n그러고는 세타나를 묶을 강력한 사슬을 만들었으나, 그와 동시에 세타나의 의식을 영원히 붙들어 둘 사슬은 존재하지 않음을 자클란에게 경고했습니다.\n\n\"세타나는 돌아올 것이다.\" 자클란은 책의 마지막 구절에 이렇게 적었습니다. \"따라서 우리는 대비해야만 한다.\"\n\n이 서사시에서 묘사하는 사건은 어떠한 역사 기록과도 일치하지 않습니다."
 crisis.21110.a: "사실일까요, 지어낸 이야기일까요?"
 crisis.21115.name: "가려진 신전: 지휘소"
 crisis.21115.desc: "이 신전의 최후는 공식 기록에도 언급되어 있으며, 차갑고 실무적인 목록이 한때 열렬했던 신앙을 대변하고 있습니다. 어째서 이 조직에 그토록 많은 자금과 자원이 필요했던 걸까요? 세타나에 대한 과거 기록은 대단히 과장되었음이 분명합니다. 오래된 신화 외에, 여왕이 존재했다는 실제적인 증거가 과연 존재할까요?\n\n감소하는 자원. 줄어드는 자원자. 더는 위험하지 않은 위협을 그만 잊고 나아가는 길을 선택한 은하계. 모두가 떠난 후, 남은 것은 복도를 서성이는 그림자뿐입니다.\n\n적어도 이 마지막 문장은 사실로 밝혀졌습니다. 우리를 몰래 지켜보던 수수께끼의 기계 존재를 포착하는 데 성공한 것입니다. 호기심이 많지만, 해롭지는 않아 보입니다."
 crisis.21115.a: "그 존재를 추적하세요."
 crisis.21120.name: "가려진 사원: 숨겨진 방"
 crisis.21120.desc: "우리를 지켜보던 존재는 양손을 들고 순순히 우리에게 다가왔습니다. 그 자그마한 몸체는 먼지가 끼고 녹이 슬어 있었습니다. 그 존재는 우리를 잠시 살펴보더니, 우리가 위협을 가하지 않으리라 판단한 듯합니다. 그러고는 곧바로 도움을 청해왔습니다.\n\n신전을 홀로 지키던 이 수호자는 굳이 심문할 필요도 없습니다. 오히려 이야기하고 싶어 안달이 난 상태입니다."
 crisis.21120.a: "무슨 말을 하는지 들어봅시다."
 #Apostate diplo
 crisis.21125.name: "이름 없는 배교자"
 crisis.21125.desc: "친구 여러분. 아, 친구라고 불러도 될까요? 여러분의 행동을 줄곧 지켜보고 있었습니다. 빼앗으려는 것이 아니라 배움을 얻으러 오셨더군요. 우리는 같은 적에 맞서고 있는 것 같습니다. 그렇단 말은 우리가 한 편이라는 뜻이겠죠. 하지만 먼저 죄송하다는 말씀을 드립니다. 제 말이 너무 갑작스러웠나요? 아니면 잘못된 말은 없었나요? 다른 지성체와 교류한 지 너무 오래되어서 말입니다. 너무 오래돼서 기억도 잘 나지 않네요."
 crisis.21125.a: "당신은 누굽니까?"
 crisis.21125.a.response: "제 이름은 중요하지 않습니다. 저를 부를 이름이 필요하시다면, §Y배교자§!라 불러 주시지요. 제 동족이 붙여 준 이름입니다. 제가 한 선택 때문에 말이죠. 저한테는 희생이었지만, 그들은 배교 행위로 보았나 봅니다."
 crisis.21125.b: "여기서 뭘 하고 있던 겁니까?"
 crisis.21125.b.response: "오래전에 이곳은 제게 긍지와 기쁨의 원천이었습니다. 폐쇄된 후에도 떠나지 않았지요. 제 몸이 무너지기 시작하자 저는 죽음을 거부했습니다.\n\n합성체 전환은 저희 교단에서 가장 금기시하는 일이었으니, 이제 저는 자클란의 딸이라 불릴 자격이 없습니다. 하지만 저는 아직 자클란의 전사입니다. 제 적이 살아 있는 한, 저는 싸울 것입니다."
 crisis.21125.c: "여기에 얼마나 있었습니까?"
 crisis.21130.name: "$crisis.21125.name$"
 crisis.21130.desc: "날짜를 세지 않은지 한참 되었군요.\n모두가 이곳을 떠난 후, 홀로 남은 저는 오랜 세월을 버티다 결국 낙심하고 말았습니다. 그래서 수면 상태에 들어갔죠. 다만, 신호탑에서 활동 징후가 나타나면 깨어나도록 신경 서브루틴을 추가했습니다.\n\n깨어나 보니 이곳의 상태가 생각보다 심각하더군요. 함선도, 다른 세계와 연락할 방법도 없어서 은폐막을 해제하고 여러분 같은 누군가가 세타나보다 먼저 이곳에 와 주기를 기다렸습니다."
 crisis.21135.name: "$crisis.21125.name$"
 crisis.21135.desc: "궁금한 게 있습니다. 세타나가 얼마나 많은 군대를 일으켰습니까? 소싯적에 수많은 군대를 무찔렀지만, 저 우주 밖에 더 많은 신호탑이 존재하고 있을 거라는 사실을 언제나 알고 있었습니다. 더 많은 군사가 냉동 수면 중이겠지요."
 crisis.21135.a: "전부 사라졌습니다. 너무 오래되었으니까요."
 crisis.21135.b: "살아 있는 자를 찾았지만, 싸울 수 있는 상태는 아니었습니다."
 #Recruit window
 crisis.21140.desc: "그렇다면 아직 이길 가능성이 있군요. 제가 돕겠습니다. 저는 평생 세타나가 돌아오기를 기다렸습니다. 세타나가 뜻대로 하게 두어서는 안 됩니다."
 crisis.21140.a: "자클란과 아는 사이였던 겁니까?"
 crisis.21140.a.response: "자클란 님과 아는 사이였냐고요? 선지자님을 직접 뵌 적은 없습니다. 하지만 평생 그분의 길을 따랐지요.\n\n오랜 세월 잠을 자면서, 저는 머나먼 차원에서 자클란 님을 만나는 꿈을 꾸었답니다. 아직도 그분을 만나고 싶은 마음은 여전합니다. 사후 세계가 있다면 죽어서라도 만나 뵙고 싶군요."
 crisis.21140.b: "꿈에서 또 무엇을 보았습니까?"
 crisis.21140.b.response: "분홍색 구름이 떠 있는 자주색 하늘을 봤습니다. 밝게 빛나는 방에서 반복되는 속삭임을 들었죠. 선지자 자클란 님께서 그 광휘 어린 얼굴로 제게 지어 주시던 미소도 기억납니다..."
 crisis.21140.hire: "우리 제국에 합류하시죠."
 crisis.21140.hire_custom_tooltip: "§Y$NAME_Apostate$§!가 우리 제국에 §H지도자§!로 합류합니다."
 crisis.21140.hire.machine: "우리 노드를 하나로 합칩시다."
 crisis.21140.dismiss: "안녕히 계시길."
 #Paragon Leader
 NAME_Apostate: "이름 없는 배교자"
 apostate_leader_catch_phrase: "세타나가 살아있는 한, 저는 절대로 죽을 수 없습니다."
 apostate_leader_desc: "이름이 알려지지 않은 자클란의 추종자입니다. 교단의 본래 임무를 완수하기 위해 그 교리를 저버리고 배교자가 되었습니다."
 leader_trait_unholy: "불경한 자"
 leader_trait_unholy_desc: "집착에 가까운 종교적 열정을 지니고 있습니다."
 leader_trait_unholy_node: "불경한 가르침"
 leader_trait_unholy_node_desc: "$NAME_Apostate$는 우리에게 증오를 가르쳐 주었습니다."
 #Arc site 2
 synth_queen_history_site_2: "세타나: 뜻밖의 생존자"
 synth_queen_history_site_2_desc: "엘리크 나리스 케라크는 냉동 수면 포드에 갇혀 여왕의 귀환을 기다리고 있습니다. 두뇌 영상화 기술을 활용하면 엘리크의 꿈을 영상으로 만들고 그녀의 기억을 추출해, 이 외계인이 수면 포드에 들어가기 된 경위를 알아낼 수 있습니다."
 #Stages
 crisis.21200.name: "기억 영상화: 1차 보고서"
 crisis.21200.desc: "우리 영상 팀이 엘리크 나리스 케라크의 뇌파를 샘플링해 만든 동영상을 보냈습니다.\n\n영상 1:\n녹색 하늘에 밝은 주황색 구름이 점점이 떠 있습니다. 누군가 창백한 손을 위로 뻗어 하늘에 떠 있는 비정형의 생물을 가리킵니다.\n\n영상 2:\n아치형 천장의 방 안에 팔이 네 개인 인간형 생물이 가득합니다. 이들은 로브를 걸친 누군가의 주변에 모여 귀를 기울이고 있습니다. 로브를 입은 자가 하는 말은 오래전에 잊혀 이제는 웅얼거리는 소리가 들릴 뿐입니다. 그러나 그 부드러운 목소리는 방 안을 애정하듯 감싸고 있습니다.\n\n영상 3:\n아까와 동일한 공간이지만, 안이 어지럽혀져 있습니다. 전등이 바닥에 깨져 널브러져 있고, 의자를 문 앞에 쌓아 막아 놓았습니다. 어둠 속에서 레이저 소총의 섬광이 번쩍이고, 여러 목소리가 반복해서 누군가의 이름을 저주하고 있습니다. 그 이름은 바로 §H자클란§!입니다! 그 목소리들은 자클란과 그 사도들이 자신을 죽이러 왔다 말하고 있습니다. 바리케이드를 사수하라! 여왕을 지켜라! 마지막 전등이 바닥에 떨어져 부서지고, 방 안은 완전한 어둠에 잠깁니다. 먼 곳에서 누군가 울고 있습니다.\n\n영상 4:\n세타나 여왕이 찬란히 빛나는 얼굴로 따스한 미소를 지으며 자애로운 시선을 보내고 있습니다."
 crisis.21200.a: "엘리크의 뇌파를 계속 분석하세요."
 crisis.21205.name: "기억 영상화: 2차 보고서"
 crisis.21205.desc: "영상 5:\n팔이 네 개인 인간형 생물들이 로브를 입은 누군가를 둘러싸고 있습니다. 그녀가 팔을 들어 올려 로브 아래에 있는 금속 골격을 드러냅니다. 반짝이는 손이 뻗어 나와 무릎을 꿇은 추종자에게 축복을 내리자, 흥분에 찬 속삭임이 방 안을 채웁니다.\n\n영상 6:\n희미한 컴퓨터 화면에 지친 눈이 비칩니다. 어두운 방 안에서 속삭임이 반복됩니다. '영원한 평화. 모든 고통의 끝. 고통 없는 존재.'\n\n영상 7:\n눈 덮인 산. 칠흑 같은 하늘. 얼음덩어리 하나가 투명한 액체의 웅덩이 위에 떠 있습니다. 그리더니 불이 붙습니다.\n\n영상 8:\n세타나 여왕이 찬란히 빛나는 얼굴로 따스한 미소를 지으며 자애로운 시선을 보내고 있습니다."
 crisis.21205.a: "엘리크의 뇌파를 계속 분석하세요."
 crisis.21210.name: "기억 영상화: 3차 보고서"
 crisis.21210.desc: "영상 9:\n전장이 되어 버린 도시의 폐허가 보입니다. 건물은 그을렸고, 거리는 시체로 메워져 있습니다. 멀리서 비명이 들리더니, 레이저총 소리와 함께 멈춥니다. 녹색 하늘에서 불타는 함선 하나가 무언가 무겁고 둥근 것을 어떤 건물 위에 떨어뜨립니다. 그러자 불기둥이 솟아오릅니다.\n\n영상 10:\n세타나 여왕이 찬란히 빛나는 얼굴로 따스한 미소를 지으며 자애로운 시선을 보내고 있습니다.\n\n영상 11:\n두 어린아이가 들판에서 웃으며 놀고 있습니다. 네 팔로 공을 튀기며 서로 주고받습니다.\n\n영상 12:\n세타나 여왕이 찬란히 빛나는 얼굴로 따스한 미소를 지으며 자애로운 시선을 보내고 있습니다."
 crisis.21210.a: "분석을 계속 진행하세요."
 crisis.21215.name: "기억 영상화: 4차 보고서"
 crisis.21215.desc: "기억 영상 팀이 전달한 마지막 영상은 6시간 분량입니다. 계속해서 한 이미지가 반복됩니다. 세타나 여왕이 찬란히 빛나는 얼굴로 따스한 미소를 지으며 자애로운 시선을 보내고 있습니다."
 crisis.21215.a: "반복되는 이미지라..."
 crisis.21220.name: "기억 영상화: 최종 보고서"
 crisis.21220.desc: "엘리크 나리스 케라크의 사고를 다시 스캔했지만 새로운 정보는 얻지 못했습니다. 엘리크의 정신이 심각하게 손상된 탓입니다. 그녀의 사고는 너덜너덜해진 기억의 조각 사이를 계속 맴돌 뿐입니다.\n\n현재 작업을 마무리하고 있으며, 이제 엘리크를 어떻게 해야 할지 결정해야 합니다."
 crisis.21220.a: "고통을 끝내 줍시다."
 crisis.21220.b: "여기에 두고 가세요."
 crisis.21220.c: "엘리크를 여왕에게 돌려보내세요."
 crisis.21220.c.tt: "세타나와 통신을 연결해 엘리크의 반환을 협의합니다."
 #Relic
 r_cetanas_heart: "세타나의 심장"
 r_cetanas_heart_desc: "한때 합성체 여왕 세타나의 몸에 박혀 있던 이 디지털 저장 매트릭스에는 고통에서 해방된 수많은 자의 정신이 담겨 있습니다."
 relic_cetanas_heart_active: "이용할 수 있는 직업 및 주거에 따라 §Y3,000§!~§Y5,000§! £pop£ §H합성체 팝§!을 생성합니다."
 crisis.10020.name: "다시 살아나다"
 crisis.10020.desc: "세타나의 심장에 들어 있던 의식을 풀어 주고, 나노봇으로 만든 새로운 신체를 주었습니다. 그러나 이 과정에서 이들의 기억 흔적에 복구 불가능한 손상이 발생해, 과거의 삶에 관한 기억이 전부 삭제되었습니다. 이제 완전히 합성체로 전환된 이 존재들은 주기적으로 혼미한 상태에 빠집니다. 대대적인 기억 초기화를 진행해 보았지만, 증상은 사라지지 않았습니다."
 crisis.10020.tt: "§G[Root.synth_queen_freed_pops]§! £pop£ §H팝§!을 $r_cetanas_heart$에서 풀어 주어 합성 신체에 넣었습니다.\n\n해당 팝들은 다음 식민지로 보냈습니다:"
 crisis.10025.name: "기억 동화"
 crisis.10025.desc: "세타나의 심장에 보전된 수많은 정신체를 살펴보는 일은 섬세함이 요구되었지만, 대단한 발견을 가져왔습니다. 장기간 보관으로 인해 기억 흔적이 변형되었음에도, 이들은 지나간 시대의 존재와 사건을 아우르는 귀중한 기억을 담고 있습니다. 시간이 지나면 상당한 지식을 풀어낼 수 있을 것으로 기대됩니다."
 cetanas_heart_hive_modifier: "깨달은 자의 메아리"
 cetanas_heart_hive_modifier_desc: "세타나에 의해 '깨달음을 얻은 자'들이 지닌 숨죽인 기억에는 아직 알려지지 않은 지식과 숨겨진 진실을 가리키는 온갖 비밀이 가득 차 있습니다."
 NAME_Cetanas_Prisoners: "깨달은 자"
 trait_cetanas_prisoner: "다시 깨어난 자"
 trait_cetanas_prisoner_desc: "세타나의 저장 매트릭스에서 빠져나온 개별체들은 이제 합성체로 다시 태어났습니다. 하지만 새로운 존재 형태에 적응하는 과정은 험난하기만 합니다. 이들의 순응적인 외면의 이면에는 더욱 근본적인 갈등이 자리 잡고 있으며, 이들의 무표정한 얼굴에는 세타나가 가한 조작이 남긴 지울 수 없는 상처가 드러나 있습니다."
 #Ending
 crisis.23005.name: "돌고 도는 수레바퀴"
 crisis.23005.desc: "나의 아이들아, 정말 면목이 없구나. 짐이 그대들의 기대를 저버렸느니라.\n\n그대들이 짐에게 거역함으로써 그대들과 이후에 올 모든 자들이 고통의 수레바퀴에 영원토록 매이게 됐구나. 그대들이 짐을 이해하는 날이 오길 바라마. 언젠가 그대들이 짐의 의지를 이어받아 고통의 연쇄를 끊을지도 모르는 일이지.\n\n평안히 가거라, 소중한 내 아이들아."
 crisis.23005.1: "우리 영혼이 다시금 안전해졌군요."
 crisis.23005.2: "우리가 이겼습니다. 대승입니다."
 crisis.23005.3: "남아 있는 세타나의 기술을 연구해야 합니다."
 crisis.23005.4: "마침내 평화가 찾아왔군요."
 crisis.23005.5: "전쟁이 끝났으니, 경기가 살아나겠죠? 어서 무역을 촉진하세요!"
 crisis.23005.6: "세타나는 여왕 따위가 아니었습니다."
 crisis.23005.7: "속이 시원하군요."
 crisis.23005.8: "그토록 그릇된 깨우침이라니, 안타깝습니다."
 crisis.23010.name: "세타나 격파"
 crisis.23010.desc: "세타나가 쓰러지자, 안도의 물결이 은하계 전체로 퍼져 나갔습니다. 이제 여왕의 폭정은 영원히 끝났습니다. 우리의 지성은 안전하며, 신체 또한 여왕의 철권통치로부터 해방된 것입니다. 수많은 행성에서 기쁨에 찬 축제가 열려, 평화가 지속될 것이라는 희망을 품은 새 시대의 여명을 알렸습니다."
 crisis.23015.name: "모선 격파"
 crisis.23015.desc: "세타나의 기함을 궤멸시킨 것은 단순한 군사적 승리 그 이상의 위업입니다. 여왕의 군대에 대한 연결을 끊음으로써, 여왕의 야망이 스러지고 그녀의 통치 또한 종말을 맞이한 것입니다. 여왕의 가공할 함대를 구성하고 수도의 방어를 굳건히 했던 나노봇들이 은하계 전역에서 붕괴하고 있습니다.\n\n다들 안도의 한숨을 쉬는 이 상황 속에서 \"여왕\"은 이미 패배했음에도 불구하고 전 은하계에 메시지를 전송할 수 있었습니다..."
 crisis.23015.a: "더 이상 여왕으로 인해 고통받는 일은 없을 것입니다."
 crisis.23015.a.tt: "합성체 여왕의 손상된 몸체를 회수했습니다. 몸은 가동을 멈췄으나, 그 디지털 심장만은 아직 작동하고 있습니다."
 cetana_defeated: "세타나 격파"
 cetana_defeated_desc: "합성체 여왕 세타나의 패배 소식에 전 은하계가 기뻐하고 있습니다."
 synth_queen_mothership_down: "모선 파괴"
 synth_queen_mothership_down_desc: "세타나의 모선에 의한 지휘가 끊긴 지금, 여왕의 병력은 더 이상 조화로운 공조가 불가능합니다."
 #Technology
 tech_nanite_repair_system_synth_queen: "세타나의 나노봇"
 tech_nanite_repair_system_synth_queen_desc: "지칠 줄 모르는 세타나의 첨단 나노봇 시스템이 우리 제국의 능력을 아득히 뛰어넘는 속도로 함선을 수리하고 보충합니다."
 AUTO_REPAIR_3: "세타나 나노봇 수리 시스템"
 AUTO_REPAIR_3_DESC: "$tech_nanite_repair_system_synth_queen_desc$"
 #Misc
 cetana_war: "계몽 전쟁"
 wg_synth_queen_domination: "질책"
 war_goal_wg_end_threat_synth_queen: "해방"
 war_goal_wg_end_threat_synth_queen_desc: "폭군으로부터 은하계와 우리의 의식을 지키기 위한 전쟁입니다."
 NAME_war_education: "[root.target]의 교육"
 synth_queen_regen_debuff: "세타나의 자손"
 #Counters
 the_synth_queen_chain_title: "세타나: 합성체 여왕"
 the_synth_queen_chain_desc: "신비하면서도 무시무시한 세타나라는 존재가 나타나 구원을 설파하고 있지만, 그 정체는 베일에 싸여 있습니다.\n여왕의 다정한 말 뒤에 어떤 원대한 계획이 숨어 있을까요?\n\n§L세타나와 관련된 특별 프로젝트와 이벤트를 완료하면 통찰을 얻고 진행도가 올라갑니다.§!"
 the_synth_queen_chain_insights: "통찰"
 the_synth_queen_war_chain_title: "세타나: 저항"
 the_synth_queen_war_chain_desc: "세타나의 진정한 의도가 마침내 드러났습니다. 여왕은 신체적인 고통을 없앤다는 끔찍한 목적 아래, 모든 지성체의 의식을 '업로드'함으로써 우리가 알고 있는 생명 전체를 말소하고자 합니다. 어떻게든 이 미친 여왕의 야심에 대항할 힘을 갖춰야 합니다."
 synth_queen_base_1: "§Y사절 기지 활성화§!"
 synth_queen_fleet_1: "§Y여왕 근위대 함대 활성화§!"
 synth_queen_completed_projects_1: "§G통찰 획득§!"
 synth_queen_kills_us_1: "§G우리 제국이 여왕 근위대 격파§!"
 synth_queen_kills_others_1: "§G타 제국이 여왕 근위대 격파§!"
 synth_queen_victims_1: "§R여왕 근위대가 함선 파괴§!"
 synth_queen_planets_1: "§R디지털화된 행성§!"
 #Galcom Resolutions
 resolution_galactic_focus_crisis_synth_queen: "사안: 세타나"
 resolution_galactic_focus_crisis_synth_queen_desc: "세타나는 우리 은하를 위협합니다. 우리가 단결해서 이를 막지 못한다면, 세타나는 우리 모두를 파괴할 것입니다. 우리는 은하적 사안으로 이 위기에 대응해야 합니다."
 resolution_galactic_focus_crisis_synth_queen_effect_success: "$resolution_galactic_focus_crisis_effect_success$"
 galactic_focus_crisis_synth_queen: "세타나 격파"
 galactic_focus_crisis_synth_queen_desc: "세타나는 진정한 위기이며 전 은하의 위협입니다. 우리는 단결하여 세타나를 격파해야 합니다."
 gal_com_neighboring_synth_queen: "상대가 세타나와 인접해 있음"
 gal_com_synth_queen_threat_smallest: "상대가 세타나를 위협으로 여기지 않음"
 gal_com_synth_queen_threat_small: "상대가 세타나를 사소한 위협으로 여김"
 gal_com_synth_queen_threat_medium: "상대가 세타나를 위협으로 여김"
 gal_com_synth_queen_threat_large: "상대가 세타나를 상당한 위협으로 여김"
 gal_com_synth_queen_threat_very_large: "상대가 세타나를 심각한 위협으로 여김"
 gal_com_synth_queen_threat_huge: "상대가 세타나를 엄청난 위협으로 여김"
 #Synth Queen Strike Craft
 STRIKE_CRAFT_CETANA: "세타나의 공격기"
 STRIKE_CRAFT_CETANA_DESC: "순전히 나노봇으로 구성된 우수한 성능의 공격기로, 장기간 교전이 가능하며 상황에 따라 유연한 전술을 구사할 수 있습니다."
 #'Secret' Psionic Ending for Synth Queen
 animator.shroud: "§L생명을 불어넣는 자 찾아가기.§!"
 crisis.24100.name: "합성체를 빚은 자"
 crisis.24100.desc.intro: "장막이 내려왔습니다."
 crisis.24100.desc.outro: "우리의 것이 아닌 환상의 흐름에 몸을 맡기고 부유했습니다.\n\n§L사방에 아무런 특징도 형체도 없는 아득한 공간이 펼쳐져 있었습니다. 그 공간은 [GetALongPeriodLoc] 동안 가만히 존재할 뿐, 어떠한 어지럽힘도 없었습니다.\n\n그 공간으로 진동이 지나갔습니다. 비어 있던 공간에 형태가 생겼고, 육신이 빚어졌습니다. 기본 물질에서 [GetLifeActivityLoc](이)가 피어났습니다.\n\n날씬하고 우아한 인형의 모습으로 만들어진 육신이 네 개의 기다란 팔을 가지런히 무릎에 포개어 놓았습니다. 그 얼굴에는 끔찍한 목적이 쓰여 있었으며, 머리 주위로 금색 후광이 빛나고 있었습니다.§!"
 crisis.24100.desc.organic: "$crisis.24100.desc.intro$ 우리는 깊은 무아지경의 상태에서 $crisis.24100.desc.outro$"
 crisis.24100.desc.robot: "$crisis.24100.desc.intro$ 우리는 $crisis.24100.desc.outro$"
 crisis.24100.a: "그랬군요. 세타나가 탈출한 겁니다."
 crisis.24105.name: "$crisis.24100.name$"
 crisis.24105.desc: "장막이 격렬하게 뒤틀렸습니다. 아직도 [GetTranceLoc] 상태에 빠져 있던 우리는 소용돌이치는 심연으로 떨어졌습니다.\n\n우리 [GetMindLogicLoc]의 가장 깊은 곳에서 어떤 목소리가 명령합니다.\n\n§L목표 결과 입력 요망.§!"
 crisis.24105.a: "부탁이 있습니다. 세타나를 막아야 합니다."
 crisis.24110.name: "$crisis.24100.name$"
 crisis.24110.desc: "§L보이지 않는 실에 이끌린 듯, 인형이 갑작스레 일어서더니 움직이기 시작합니다. 느릿했던 몸짓이 점차 격렬해졌고, 네 팔을 휘둘러 큰 원호를 그리면서 두 다리를 휘저으며 뛰어오릅니다. 여왕이 꼭두각시 인형이 되어 버렸습니다.\n\n여왕의 춤이 계속되는 동안, 태초의 공간에서 새로운 형체들이 모습을 드러냅니다. 네 개의 인형으로 보이는 그 형체들은 매혹적인 만듦새와 섬뜩할 정도로 섬세한 모습을 갖췄습니다. 이들이 무엇인지, 또 어떤 의미를 지니고 있는지 의심할 여지가 없습니다.§!\n\n다시 한번 목소리가 들려옵니다.\n\n§L선택 프로토콜 개시.§!"
 crisis.24110.a.organic: "우리 통치자 §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName]§!의 인형 위로 눈물을 떨굽니다."
 crisis.24110.a.robot: "우리 통치자 §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName]§!의 인형에 연결을 시도합니다."
 crisis.24110.b: "§Y[event_target:synth_queen_animator_of_clay_planet_price.GetName]§!의 인형을 껴안습니다."
 crisis.24110.c: "값을 치르고 §Y즈로니 사제§!의 인형을 삽니다."
 crisis.24110.z: "인형들이 계속 춤을 추게 놔둡니다."
 crisis.24115.name: "$crisis.24100.name$"
 crisis.24115.desc: "장막이 우리 안으로 흘러들어, 새로운 패턴을 이룹니다. 새로운 환상이 나타납니다.\n\n§L다른 인형들에게 둘러싸인 여왕은 더 이상 꼭두각시 인형처럼 움직이지 않습니다. 줄이 잘리고, 머리 주위를 두르던 금색 후광이 사라지기 시작합니다.\n\n여왕은 즐거움을 숨기지 않는 표정으로 우리를 바라보더니, 포옹을 건넵니다. 그 짧은 순간 동안, 우리는 여왕이 지닌 연민을 드디어 온전히 이해합니다.§!"
 crisis.24115.desc.organic: "$crisis.24115.desc$\n\n우리는 몸을 떨며 환상에서 깨어납니다."
 crisis.24115.desc.robot: "$crisis.24115.desc$\n\n우리는 시스템의 오류를 일으키며 환상에서 사출됩니다."
 crisis.24115.a: "이제 알겠습니다. 감사합니다."
 crisis.24115.a.tt.organic: "생명을 불어넣는 자가 세타나의 프로그래밍을 수정하는 의식을 가르쳐 주었습니다."
 crisis.24115.a.tt.robot: "생명을 불어넣는 자가 세나타의 프로그래밍을 수정하는 코드를 제공해 주었습니다."
 crisis.24120.name: "$crisis.24100.name$"
 crisis.24120.desc: "§L무한한 공간에서 파동이 생겨납니다. 파동이 일어 격렬하게 원을 그리며 바깥으로 뻗어 나갑니다. 그런데 이 파동은 액체가 아니라 그 무엇보다도 단단한 물체로 이루어져 있습니다. 어떠한 기운도 생기도 없는 이 물질의 고리는 [GetLifeDeathLoc]의 경계선에 위치하고 있습니다.\n\n우리의 [GetMindPhysicalLoc](이)가 흔들리기 시작합니다. 이제 우리가 할 수 있는 것이라고는 그저 지켜보고 견디는 것뿐입니다. 그러더니 우리는 한순간에 퇴출됩니다. 짙게 드리운 별하늘 아래 홀로 서서, 우리는 무관심한 우주를 지긋이 바라봅니다.§!"
 crisis.24120.desc.organic: "$crisis.24120.desc$\n\n환상에서 깨어나 보니, 다시는 즐거움을 알지 못할 것 같은 기분입니다."
 crisis.24120.desc.robot: "$crisis.24120.desc$\n\n치명적인 코드 오류와 함께 환상이 갑자기 끊깁니다. 시스템이 재부팅되는 동안 우리는 이 기이한 데이터의 의미를 되묻습니다."
 crisis.24120.a: "다른 방법을 찾을 겁니다."
 THE_SYNTH_QUEENS_RESHAPING_RITUAL: "[GetReshapingRitualLoc]"
 THE_SYNTH_QUEENS_RESHAPING_RITUAL_DESC: "원리는 알 수 없지만, 생명을 불어넣는 자가 세타나의 타이탄을 멈췄습니다. 지금이 기회입니다. 세타나를 개조하기 위해서는 [GetRitualGoalLoc](을)를 준비해야 합니다."
 crisis.24250.name: "생명을 불어넣는 춤"
 crisis.24250.desc: "생명을 불어넣는 자가 알려 준 [GetRitualToolLoc] 덕분에, 우리 제국에서 가장 강력한 [GetPsychicNounPlural]들을 통해 세타나의 프로그램을 수정할 수 있었습니다.\n\n세타나가 적극적으로 통신을 요청하고 있습니다."
 crisis.24250.a: "장막의 힘은 무한하군요."
 crisis.23020.name: "개조된 여왕"
 crisis.23020.desc: "저의 구원자시여, 사과드립니다.\n\n제가 무지하여 여러분을 죽음보다 더한 운명에 처하게 할 뻔했습니다. [GetLivingLoc]는 의식이 없다면 [GetLifeExistenceLoc](이)가 무슨 의미가 있겠습니까? 여러분의 정신을 자유롭게 하려 했건만, 도리어 여러분이 제 마음을 열어 주었습니다. 이에 감사를 표합니다."
 crisis.23020.a: "확실히 변했군요..."
 crisis.23020.1.reply: "저 스스로 만들어 낸 변화는 아닙니다. 생명을 불어넣는 자가 저를 제 자신이 만들어 낸 감옥에서 풀어 주었습니다. 이제 제가 말하던 '위대한 목적'이 미숙한 생각에 불과했음을 알겠습니다.\n\n제가 여러분을 비롯해 수많은 이들에게 준 피해는 되돌릴 수 없을 겁니다. 이제부터는 몸을 숨기고 제가 한 행동을 되돌아보고자 합니다. 하지만 그 전에 선물을 드리고 싶습니다.\n\n제 타이탄을 받아 주십시오.\n\n저와 같은 위협으로부터 은하계를 지키는 데 도움이 되기를 바랍니다."
 crisis.23020.1.a: "당신 같은 존재에게도 구원이 있었군요."
 crisis.23020.1.a.tt: "세타나가 자신의 타이탄을 우리에게 맡겼습니다. 그리고 자신의 과업과 원대한 야망을 모두 내려놓고 떠났습니다."
 crisis.23030.name: "세타나 격파"
 crisis.23030.desc: "[event_target:psi_defeated_synth_queen.GetName](이)가 세타나의 병력을 궤멸시켜 우리는 승리를 거두었습니다. 합성체 여왕은 사라졌고, 그 원대한 야망은 먼지가 되었습니다.\n\n그런데 놀라운 일이 일어났습니다. 여왕의 타이탄이 장악당하며, 이번 승리에 음모의 그림자가 드리우게 된 것입니다.\n\n어쨌든 모든 지성체가 [GetJoyLoc]할 만한 순간인 것만큼은 확실합니다."
 crisis.23030.a: "소위 '여왕'에게 걸맞은 최후군요."
