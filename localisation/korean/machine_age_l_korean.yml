 tr_nanotech_4: "범람하는 우월"
 tr_nanotech_5: "나노봇 증강"
 tr_nanotech_finish: "나노테크 전통 완료"
 tr_nanotech_1_delayed: "은하계는 아직 자신들이 우리 존재의 연장에 불과하며, 이제 곧 모든 존재를 감싸고 수용하는 우리 나노봇 무리의 품 안에서 비로소 온전해질 것이라는 사실을 깨닫지 못하고 있습니다."
 tr_nanotech_2_delayed: "이 우주의 모든 존재는 나노봇 무리를 중심으로 모여야 합니다. 우리는 은하계를 우리의 품속으로 이끌어 우리와 같은 형태로 변화시킵니다."
 tr_nanotech_3_delayed: "각 행성과 위성은 나노봇 무리에 동화되어 우리 집단의 영향력을 넓힐 것이며, 그렇게 하나 된 우리의 존재는 더욱 번영할 것입니다."
 tr_nanotech_4_delayed: "우리는 변화를 겪을 때마다 진보할 것이며, 우리의 효율성은 더욱 높은 차원에 도달할 것입니다."
 tr_nanotech_5_delayed: "우리는 저마다 공장이자 그릇이고, 무기이자 방패이며, 거침없이 쇄도하는 우리 집단의 방대한 물결을 이루는 물방울에 지나지 않습니다."
 tradition_nanotech_delayed: "우리는 쉼 없이 범람하고 끊임없이 움직이며, 영구히 모든 존재를 품에 안을 것입니다. 모든 존재가 우리와 하나 되기를. 우리가 취하는 형태에 끝이 없기를."
