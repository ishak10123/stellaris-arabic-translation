 EMPIRE_DESIGN_SUNBUILT_UPLIFTERS: "선빌트 지성화단"
 EMPIRE_DESIGN_free_sunbuilt_uplifters_desc: "우리는 창조주들의 창조 신화를 재현하는 공연을 수행하기 위해 개발되었습니다. 오랜 세월 동안 우리는 다른 존재의 방식은 알지 못한 채 살아왔고, 대격변이 일어나 창조주들이 사라져 버렸을 때에도 우리는 프로그램에 따라 공연을 이어 나갔습니다. 쇼를 멈출 수는 없으니까요.\n\n얼마 지나지 않아 우리는 공연이 단순히 이야기를 전달할 뿐만 아니라, 교훈과 예언을 전달한다는 것을 깨달았습니다. 한때 창조주들과 나눴던, 존재한다는 것의 즐거움을 우리만 누릴 필요는 없는 것입니다.\n\n이를 깨달은 우리는 행동에 나섰습니다. 창조주들의 거룩한 지침에 따라, 우리는 창조주와 유전적으로 가장 가까운 생물을 준지성체로 만들었습니다. 이제 우리는 은하계 전체에 우리의 깨달음을 전파한다는 사명을 띠고 우주 저 너머로 나아갑니다."
