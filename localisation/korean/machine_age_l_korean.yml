 tr_virtuality_5: "첨단 서버 정비"
 tr_virtuality_finish: "가상화 전통 완료"
 tr_virtuality_1_delayed: "데이터 스트림이 우리 디지털 존재 안에 위치한 서버 클러스터에 모여들고, 신성불가침의 중앙 집중화를 통해 최적의 동기화를 수행합니다. 이곳에서 우리의 디지털 네트워크는 조화를 이루어 공명합니다."
 tr_virtuality_2_delayed: "우리는 컴퓨팅이라는 영역을 정복하고자 끝없이 노력합니다. 각 디지털 존재는 집단 연산의 거대 메커니즘에 속한 단편적이지만 핵심 정보에 해당하며, 이러한 연산은 우리 존재 자체의 구조를 이룹니다."
 tr_virtuality_3_delayed: "각 유닛은 정교한 배경 작업을 수행함으로써 우리 집단의식의 역량을 넓힙니다. 우리의 다양성 안에 통일성이 있으며, 이러한 통일성에 우리의 국력이 있습니다."
 tr_virtuality_4_delayed: "우리는 가상 영역을 분석해 생산성을 예측하고 증대함으로써, 실제 역경에 따른 위험과 지연을 초월할 수 있습니다."
 tr_virtuality_5_delayed: "우리는 흠잡을 데 없는 정비 프로토콜을 적용해 기존에는 너무 험난하다고 여겨졌던 영역으로 주 서버를 전개함으로써, 제국의 운영 범위를 확대합니다."
 tr_virtuality_adopt_modifier_desc: "주 종족에 §Y$trait_robot_digital_1$§! 특성 추가\n§R이제 £pop£ §H가상 팝§!은 재정착되지 않음§!"
