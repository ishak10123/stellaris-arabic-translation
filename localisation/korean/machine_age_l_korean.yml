 concept_identity_repository_desc: "- 생산:$TABBED_NEWLINE$ £physics£ 6.00 £society£ 6.00 £engineering£ 6.00 £unity£ 6.00 $NEW_LINE$- 유지비: £energy£ 6.00 $NEW_LINE$- £trade£: §G+6§!\n\n이 보관소는 인격을 §Y300§!개 보관합니다. $building_identity_repository_scaling$\n\n§L$building_identity_repository_desc$§!"
 concept_abandoned_gene_clinic: "$building_abandoned_gene_clinic$"
