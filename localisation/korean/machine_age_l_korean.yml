 building_amphitheater_of_the_mind_desc: "준연결 상태의 정신 성가단은 이 국지적인 처리 사원을 통해 물질세계의 다양한 비밀을 빛의 속도로 토론하고, 공유하고, 탐구할 수 있습니다."
 building_grand_concert_hall_of_the_mind: "정신의 대공연장"
 building_grand_concert_hall_of_the_mind_desc: "공명을 만들어 내는 이 대형 공연장에는 최첨단 통신 배열체가 탑재되어 있습니다. 정신 성가단은 이 배열체를 통해 공동으로 신성을 탐구할 수 있으며, 사이버웨어의 힘을 빌린 이들의 찬양은 우주에 숨은 선율을 밝혀낼 것입니다."
 building_forge_of_the_fellowship: "조합 단조장"
 building_forge_of_the_fellowship_desc: "망치 조합의 첫 단조장인 이곳은 최고로 뛰어난 품질의 건설 자재를 생산합니다. 신성한 노동을 수행하는 신도들의 손에서 망치의 노래가 울려 퍼집니다."
 building_grand_forge_of_the_fellowship: "조합 대단조장"
 building_grand_forge_of_the_fellowship_desc: "망치 조합의 쉼 없는 망치질에서 울려나오는 기도문은 대단조장의 전당 너머에 있는 신도들에게까지 들립니다. 밤에는 이 주조소 겸 성당의 정교한 불빛이 별빛을 삼키고, 그 거룩한 불꽃은 신을 위해 타오릅니다."
 building_battlement_of_steel: "강철의 성첩"
 building_battlement_of_steel_desc: "이 요새 겸 교회는 언제나 싸울 준비를 갖춘 강철 기사단의 무기고이자 훈련장입니다. 기사단의 단원들은 우리의 신성한 육신을 지키기 위해 언제나 경계를 늦추지 않습니다."
 building_grand_battlements_of_steel: "강철의 대성첩"
 building_grand_battlements_of_steel_desc: "이 거대한 요새 겸 성당의 웅장한 벽은 결코 무너지지 않습니다. 안에 있는 무기고는 서임받을 강철의 기사들을 기다리는 고귀한 삽입물로 가득합니다. 이 공간에서는 육신과 강철의 연계 속에 신성이 깃들어 있습니다."
 building_sanctuary_of_toil: "노역의 안식처"
 building_sanctuary_of_toil_desc: "이 안식처는 공동 노역단의 육신과 증강 장치를 조율하고, 수리하고, 복원합니다."
 building_grand_cathedral_of_toil: "노역의 대성당"
 building_grand_cathedral_of_toil_desc: "신도들의 필요를 채우는 이들에게 축복 있으라. 그 지친 영혼이 노역의 대성당에서 휴식을 취하게 하라. 대성당에 위치한 작업장과 조율 센터는 신성한 의무를 수행하는 믿음의 일꾼들과 이들의 증강 장치를 인도하고 기운을 북돋아 줍니다."
 building_the_sanctum_of_augmentation: "증강의 성소"
 building_the_sanctum_of_augmentation_desc: "하나 된 신앙이라는 정신 아래, 이 성소는 합일의 상징으로서 자리를 지킵니다. 각각의 성스러운 방에서는 믿음 있는 자들이 동료 신도들의 영혼과 증강 장치를 돌보고 있습니다."
 building_the_united_sanctum_of_augmentation: "통일 증강의 성소"
 building_the_united_sanctum_of_augmentation_desc: "이 웅장한 성소는 그 무엇보다 거룩한 융합에 대한 숭상을 나타내는 살아 있는 증거입니다. 각각의 성스러운 방에서는 신도들이 모여 신성한 융합이라는 고귀한 대의를 흔들림 없이 헌신적으로 추진하고 있습니다."
 #Advanced Cyber Creed Authorities
 auth_cyber_creed_democratic: "증강주의 민주정"
 auth_cyber_creed_democratic_desc: "이 정부는 사이버네틱 민주정으로, 증강 시술을 받은 국민들에게 신성한 투표권을 부여해 다양한 정치 사안에 대한 의견을 표명하게 함으로써 신과의 교감을 가능하게 합니다."
 concept_auth_cyber_creed_democratic: "$auth_cyber_creed_democratic$"
 auth_cyber_creed_oligarchic: "사이버네틱주의 과두정"
 auth_cyber_creed_oligarchic_desc: "이 정부는 사이버네틱 과두정으로, 고도의 증강 시술을 받은 국민들로 특권 집단을 구성합니다. 이 집단은 완전한 참정권을 지니며, 다른 어떤 집단보다 정밀하게 사이버네틱 사회를 운영합니다."
 concept_auth_cyber_creed_oligarchic: "$auth_cyber_creed_oligarchic$"
 auth_cyber_creed_dictatorial: "합성체주의 독재정"
 auth_cyber_creed_dictatorial_desc: "이 정부는 사이버네틱 독재정으로, 첨단 사이버네틱 삽입물을 통해 절대적인 권력을 행사하며 사회의 운명을 결정할 종신 통치자를 선임합니다."
 concept_auth_cyber_creed_dictatorial: "$auth_cyber_creed_dictatorial$"
 auth_cyber_creed_imperial: "사이버네틱 제정"
 auth_cyber_creed_imperial_desc: "이 정부는 사이버네틱 제정으로, 최고 통치자가 자신이 지정한 계승자에게 통치자 지위를 물려줌으로써 원활한 권력 이양을 추진합니다. 또한, 정신주의와 첨단 사이버네틱을 통합해 국가를 흔들림 없이 통치합니다."
 concept_auth_cyber_creed_imperial: "$auth_cyber_creed_imperial$"
 auth_cyber_creed_corporate: "신성 기술 기업"
 auth_cyber_creed_corporate_desc: "이 기업은 사이버네틱 기업 정부로, 첨단 삽입물 및 신앙과 기술의 융합을 통해 기존의 국가 역할에서 벗어나 신성한 사업 기회를 모색합니다."
 concept_auth_cyber_creed_corporate: "$auth_cyber_creed_corporate$"
 #Advanced Cyber Creed Government Types
 gov_cyber_creed_monarchy: "사이버네틱 군주정"
 gov_cyber_creed_monarchy_desc: "이 정부는 기술 정신주의 군주정으로, 통치자와 그 후손은 거룩한 융합을 상징하는 신성한 존재입니다. 교단이 국가 기구를 직접 지원합니다."
 gov_cyber_creed_dictatorship: "기술주의 신정"
 gov_cyber_creed_dictatorship_desc: "이 정부는 기술 정신주의적 독재정으로, 공식 국교가 지원하는 권력 위계 구조에 속하며 증강 시술을 받은 단일 개체가 통치합니다."
 gov_cyber_creed_oligarchy: "테크노판트 의회"
 gov_cyber_creed_oligarchy_desc: "이 정부는 기술 정신주의적 과두정으로, 국가에서 가장 강력한 종교 세력들이 정치적 권력을 차지합니다."
 gov_cyber_creed_democracy: "초월 공화국"
 gov_cyber_creed_democracy_desc: "이 정부는 기술 정신주의적 민주정으로, 증강 시술을 받은 구성원으로 이루어진 종교 의회가 민주적 절차를 감독합니다."
 gov_cyber_creed_divine_empire: "신성 증강 제국"
 gov_cyber_creed_divine_empire_desc: "이 정부는 기술 정신주의 전제정의 한 형태로, 공식 국교가 공적 생활의 모든 측면에 관여하며, 국민들은 증강 시술을 받은 자신들의 통치자를 결코 오류를 범하지 않는 살아 있는 신으로 여깁니다."
 gov_cyber_creed_holy_tribunal: "테크노판트 위원회"
 gov_cyber_creed_holy_tribunal_desc: "이 정부는 기술 정신주의 과두정의 한 형태로, 신의 의지를 따르는 사제단이 모든 국정 운영을 장악하고 있습니다."
 gov_cyber_creed_megachurch: "증강 거대 교회"
 gov_cyber_creed_megachurch_desc: "이 정부는 상업과 기술 및 영적 가치의 혼합에 기반한 과두정으로, 성직자와 기업 임원의 지위가 하나로 합쳐져 있습니다."
 gov_cyber_creed_subversive_cult: "기계 숭배교"
 gov_cyber_creed_subversive_cult_desc: "이 정부는 광신 집단의 형태를 띠고 있으며, 사이버네틱에 주력하는 다양한 범죄 조직과 기업에 의존해 세력을 유지합니다."
 #Advanced Government Edicts
 edict_cybernetic_creed_construction_edict: "의로운 망치"
 edict_cybernetic_creed_construction_edict_desc: "우리는 신을 모시는 사회인 만큼, 신을 위한 미래를 건설하는 데 핵심인 망치 조합을 전폭적으로 지지해야 합니다."
 edict_cybernetic_creed_war_edict: "강철 십자군"
 edict_cybernetic_creed_war_edict_desc: "우리의 거룩한 신체를 공격하는 악마들에게 맞서려면, 강철 기사단을 전적으로 지지함으로써 우리 전사들이 언제나 준비를 갖출 수 있도록 해야 합니다."
 edict_cybernetic_creed_research_edict: "앎의 노래"
 edict_cybernetic_creed_research_edict_desc: "우리 국민들은 약동하는 지식의 노래를 불러야만 비로소 신에 대한 진정한 앎을 얻을 수 있습니다. 따라서 우리는 지혜로운 정신 성가단을 모든 방면에서 지원해야 합니다."
 edict_cybernetic_creed_construction_labor: "노동자 대중"
 edict_cybernetic_creed_construction_labor_desc: "우리의 진정한 힘은 노동자들로부터 나옵니다. 우리에게 노동자들을 떠받칠 힘이 없다면, 이들도 우리의 미래를 짊어질 힘을 갖지 못할 것입니다."
 edict_cybernetic_creed_general_edict: "조화의 교훈"
 edict_cybernetic_creed_general_edict_desc: "교단을 통합하는 과정에서 우리는 많은 교훈을 얻었습니다. 이로써 우리의 믿음은 그 어느 때보다 강해지고 깊어졌습니다."
 #Intro Events
 machine_age.2150.name: "종파"
 machine_age.2150.desc: "신의 의지에 따라 은하계로 진출하려는 다양한 종파가 새 정부에 영향력을 행사할 수 있기를 기대하고 있습니다.\n\n각 종파는 신도들에게 상당한 영향력을 행사하며, 자기 종파에 속한 신도들을 주요 직책에 앉힐 것을 적극 지지하는 한편, 저마다 서로 다른 영적 필요를 충족하고 있습니다.\n\n이러한 다양한 세력이 가하는 압력이 우리를 신에게 더 가까이 가게 할지, 아니면 혼란으로 빠뜨릴지 두고 볼 일입니다."
 machine_age.2150.a: "도움이 되었으면 좋겠군요."
 machine_age.2150.a.tooltip: "§Y세력 형성§!:\n- $cyber_creed_labor$\n- $cyber_creed_war$\n- $cyber_creed_research$\n- $cyber_creed_construction$"
 cyber_creed_please_labor: "§Y$cyber_creed_labor$§! 종파가 기뻐할 것입니다.\n다른 종파들의 반감을 얻습니다."
 cyber_creed_displease_labor: "§Y$cyber_creed_labor$§! 종파의 반감을 얻습니다.\n다른 종파들이 기뻐할 것입니다."
 cyber_creed_please_war: "§Y$cyber_creed_war$§! 종파가 기뻐할 것입니다.\n다른 종파들의 반감을 얻습니다."
 cyber_creed_displease_war: "§Y$cyber_creed_war$§! 종파의 반감을 얻습니다.\n다른 종파들이 기뻐할 것입니다."
 cyber_creed_please_construction: "§Y$cyber_creed_construction$§! 종파가 기뻐할 것입니다.\n다른 종파들의 반감을 얻습니다."
 cyber_creed_displease_construction: "§Y$cyber_creed_construction$§! 종파의 반감을 얻습니다.\n다른 종파들이 기뻐할 것입니다."
 cyber_creed_please_research: "§Y$cyber_creed_research$§! 종파가 기뻐할 것입니다.\n다른 종파들의 반감을 얻습니다."
 cyber_creed_displease_research: "§Y$cyber_creed_research$§! 종파의 반감을 얻습니다.\n다른 종파들이 기뻐할 것입니다."
 machine_age.2205.name: "역사 수정"
 machine_age.2205.desc: "최근 §Y강철 기사단§!에서 우리 제국이 전쟁에서 패배한 기록을 제국의 역사 기록과 종교 기록에서 전부 없애자는 운동을 개시했습니다.\n\n기사단은 패배에 관련된 기록 때문에 장병들의 사기가 저하되고 군에 대한 국민의 지지가 약해진다고 주장했습니다. 역사학자들은 이러한 입장을 일축하면서, 역사에서 배우는 것이 없는 국가는 같은 역사를 반복한다는 점을 상기시키고 있습니다.\n\n우리의 과거를 보다 긍정적으로 보려는 강철 기사단의 시각을 수용해야 할까요?"
 machine_age.2205.a: "승리를 위해서는 승자의 사고방식이 필요합니다."
 machine_age.2205.a.tooltip: "$cyber_creed_please_war$"
 machine_age.2205.b: "절대로 안 됩니다. 과거의 잘못에서 교훈을 얻어야 합니다."
 machine_age.2205.b.tooltip: "$cyber_creed_displease_war$"
 machine_age.2210.name: "용광로의 불은 꺼지고"
 machine_age.2210.desc: "§Y망치 조합§!의 수장인 수석 대장장이가 갑작스럽게 세상을 떠났습니다.\n\n거침없는 행보와 과감한 견해로 유명했지만, 해당 종파의 구성원들로부터는 숭배에 가까운 지지를 받던 지도자였습니다. 망치 조합에서는 수석 대장장이의 장례를 제국장으로 치를 것을 요청했습니다. 제국장은 지도자 중에서도 가장 사랑받던 이들에게만 허락되는 영예입니다.\n\n당연하게도 다른 종파들은 이 노골적인 성향을 가졌던 지도자의 장례에 국가가 개입해서는 안 된다고 주장했습니다.\n\n종파들의 요구에 어떻게 대응해야 할까요?"
 machine_age.2210.a: "제국장으로 진행시키세요."
 machine_age.2210.a.tooltip: "$cyber_creed_please_construction$"
 machine_age.2210.b: "다른 종파들을 자극할 이유가 없습니다."
 machine_age.2210.b.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2215.name: "논쟁적 유물"
 machine_age.2215.desc: "최근 한 고고학 연구진이 고대 유적지를 발견했습니다. 지금까지 신화에 불과한 것으로 여겨졌던 이 유적의 발견으로 인해, 우리는 우리 교단의 역사 기록을 일부 수정해야 했습니다.\n\n가장 놀라운 사실은 유적지에서 발굴한 유물 중 상당수에 §Y공동 노역단§!의 도상이 뚜렷하게 남아 있다는 것입니다. 교단에서는 우리 종교의 원래 해석과 관련해 뜨거운 논쟁을 벌여 왔는데, 이번 일은 공동 노역단의 교리가 그 해석에 부합한다는 주장을 뒷받침할 것입니다.\n\n이번 발견을 공식적으로 인정할 경우 §Y공동 노역단§!의 호감을 살 수 있겠지만, 전략적 침묵을 선택한다면 반대로 다른 종파들의 호감을 얻을 수 있습니다."
 machine_age.2215.a: "진실을 두려워해서는 안 됩니다."
 machine_age.2215.a.tooltip: "$cyber_creed_please_labor$"
 machine_age.2215.b: "다 이유가 있어서 묻힌 겁니다. 무시하세요."
 machine_age.2215.b.tooltip: "$cyber_creed_displease_labor$"
 machine_age.2221.name: "종파의 잠복 요원"
 machine_age.2221.desc: "§Y[cyber_creed_undercover_leader.GetName]§!(이)가 §Y[GetCyberCreed]§!과 깊이 연루되어 있으며, 해당 종파의 영향력을 넓히고자 각종 기금을 횡령하고 사업자 선정을 변경해 왔다는 사실이 드러났습니다.\n\n다른 종파들은 현 정부가 지켜보는 가운데 그토록 노골적인 권력 남용이 이루어졌다는 사실에 격분하면서, §Y[cyber_creed_undercover_leader.GetName]§!에 대한 즉각 해임을 요구했습니다.\n\n이 지도자를 어떻게 처분해야 할까요?"
 machine_age.2221.a: "당장 해임하세요."
 machine_age.2221.a.tooltip: "[cyber_creed_undercover_leader.GetName](을)를 해임합니다."
 machine_age.2221.b: "이번에 밝혀진 과오를 덮을 만큼의 공적이 있는 분입니다."
 machine_age.2225.name: "망치 조합 축일"
 machine_age.2225.desc: "§Y망치 조합§!의 축일을 기념하는 순례 행사가 시작을 앞두고 있습니다. 수많은 신도가 현지 단조장에서 출발해 수도에 있는 §Y$building_forge_of_the_fellowship$§!에 당도할 것입니다.\n\n과거에 망치 조합의 축일 순례는 수많은 교통 대란을 초래했으며, 다른 종파 신도들과의 충돌이 발생하면서 폭력 사태로 마무리되는 경우가 많았습니다.\n\n다른 종파와 수도 주민들로부터 이 순례 행사를 금지하자는 요구가 쇄도하고 있습니다."
 machine_age.2225.a: "순례를 영구히 금지하세요."
 machine_age.2225.a.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2225.b: "종교의 자유는 권리입니다."
 machine_age.2225.b.tooltip: "$cyber_creed_please_construction$"
 machine_age.2230.name: "연구 미흡 주장"
 machine_age.2230.desc: "최근 §Y정신 성가단§!을 이끄는 성가단장이 우리 교단에서 연구 자금 지원에 적극적으로 나서지 않는다며 공개적으로 입장을 표명했습니다.\n\n이번 입장 표명은 해당 종파 구성원들에게 돌아가는 자금 지원을 확대하려는 계책인 것으로 보입니다. 이들의 요구를 수용할 경우 §Y정신 성가단§!에 대한 특별 대우로 비칠 수 있습니다.\n\n과학 연구에 대한 자금 지원을 확대해야 할까요?"
 machine_age.2230.a: "성가단장한테 어디 목이 쉴 때까지 지저귀어 보라고 전하세요."
 machine_age.2230.a.tooltip: "$cyber_creed_displease_research$"
 machine_age.2230.b: "사태가 잠잠해질 때까지 자금 지원을 적당히 올려 줍시다."
 machine_age.2230.b.tooltip: "$cyber_creed_please_research$"
 machine_age.2230.c: "자금 지원을 크게 확대하세요."
 machine_age.2230.c.tooltip: "$cyber_creed_please_research$"
 cyber_creed_history_rewritten: "역사 수정"
 cyber_creed_history_rewritten_desc: "전쟁에서 패배한 내용을 역사 기록에서 전부 삭제했습니다. 역사학자들은 이번 일에 크게 실망하고 있습니다."
 cyber_creed_history_repeating: "역사 반복"
 cyber_creed_history_repeating_desc: "전쟁에서 패배한 내용을 역사 기록에서 전부 유지했습니다. 이 일로 강철 기사단이 불쾌함을 드러내고 있습니다."
 cyber_creed_no_choirmaster_funding: "성가단장의 요구 무시"
 cyber_creed_no_choirmaster_funding_desc: "연구 자금 지원을 개선해 달라는 정신 성가단의 요구를 무시했습니다."
 cyber_creed_low_choirmaster_funding: "성가단장 요구 일부 수용"
 cyber_creed_low_choirmaster_funding_desc: "정신 성가단의 불만을 무마하기 위해 과학 연구에 대한 자금 지원을 소폭 확대했습니다."
 cyber_creed_high_choirmaster_funding: "성가단장 요구 적극 수용"
 cyber_creed_high_choirmaster_funding_desc: "연구 자금 지원에 대한 정신 성가단의 요구를 적극적으로 수용했습니다."
 cyber_creed_state_funeral: "수석 대장장이 제국장"
 cyber_creed_state_funeral_desc: "최근 사망한 망치 조합 수장의 장례를 제국장으로 치렀습니다."
 cyber_creed_no_state_funeral: "제국장 거부"
 cyber_creed_no_state_funeral_desc: "최근 사망한 망치 조합 수장의 장례에 대한 제국장 요청을 거부했습니다."
 cyber_creed_relics_truth: "진실 규명"
 cyber_creed_relics_truth_desc: "공동 노역단의 연대에 관한 진실을 공개하도록 허용해, 다른 종파들의 분노를 초래했습니다."
 cyber_creed_relics_hidden: "진실 은폐"
 cyber_creed_relics_hidden_desc: "유물을 무시함으로써 대다수의 종파를 만족시켰지만, 일각에서는 현 교단의 지도부를 향한 불신이 생겼습니다."
 cyber_creed_leader_removed: "변절 지도자 해임"
 cyber_creed_leader_removed_desc: "한 종파의 내부자였던 지도자를 해임했습니다."
 cyber_creed_leader_stayed: "변절 지도자 유임"
 cyber_creed_leader_stayed_desc: "한 종파의 내부자였던 지도자를 해임하라는 요청이 있었지만, 해임하지 않았습니다."
 cyber_creed_pilgrimage_allowed: "조합 순례 행사 허용"
 cyber_creed_pilgrimage_allowed_desc: "망치 조합의 순례 행사를 허용했습니다. 예상대로 순례 행렬 뒤로 폭력과 시위가 잇따랐습니다."
 cyber_creed_pilgrimage_canceled: "조합 순례 행사 취소"
 cyber_creed_pilgrimage_canceled_desc: "망치 조합의 순례 행사를 금지해, 예상되는 폭력을 피할 수 있었습니다. 그러나 이 일로 해당 신도들의 심기를 건드렸습니다."
 POP_ATTRACTION_CYBER_CREED_WAR: "§G+ $CYBERCREED_war$에서 수용하는 £empire£ 윤리관§!"
 POP_ATTRACTION_CYBER_CREED_RESEARCH: "§G+ $CYBERCREED_research$에서 수용하는 £empire£ 윤리관§!"
