 pop_cat_chip_slave: "컴퓨터 부품"
 pop_cat_chip_slave_desc: "이 주민들은 초거대 컴퓨터의 칩으로 활용됩니다. 생명 유지 포드가 인위적인 혼수상태에 빠진 주민들의 수명을 최대한 연장하지만, 이들의 인지 기관은 연산 작업에 따른 엄청난 부담에 짓눌려 언젠가는 무너질 것입니다."
