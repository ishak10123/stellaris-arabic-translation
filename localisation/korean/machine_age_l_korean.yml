 cosmogenesis_superlight: "초광속"
 cosmogenesis_superlight_desc: "광자의 속도와 에너지에 대한 인위적 증폭으로 인해 태양 에너지 발전량이 증가했습니다."
 cosmogenesis_superlight_planet_1: "작열하는 열기"
