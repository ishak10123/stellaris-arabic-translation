 cosmogenesis_superconductor: "안정적인 초전도"
 cosmogenesis_superconductor_desc: "우리 제국에서 현실을 수정해 초전도 물질을 개량했습니다."
 cosmogenesis_space_compression: "아공간 압축"
 cosmogenesis_space_compression_desc: "함선의 일부를 압축된 아공간으로 옮기면, 이동 속도를 비약적으로 높일 수 있습니다."
 cosmogenesis_higher_yield_payloads: "폭발력 향상"
 cosmogenesis_higher_yield_payloads_desc: "우리 제국에서 현실을 수정해 탄두의 폭발력을 향상시켰습니다."
 cosmogenesis_slightly_bigger: "약간 더 크게"
 cosmogenesis_slightly_bigger_desc: "이 행성으로 물질을 위상 이동시키는 방법으로 행성의 크기를 영구히 키웠습니다."
 cosmogenesis_slowed_down: "시간 감속"
 cosmogenesis_slowed_down_desc: "$cosmogenesis_sped_up_desc$"
 cosmogenesis_slightly_smaller: "작게"
 cosmogenesis_slightly_smaller_desc: "이 행성으로 물질을 위상 이동시키는 방법으로 행성의 크기를 영구히 줄였습니다."
 cosmogenesis_research_slowdown: "연구 네트워크 장애"
 cosmogenesis_research_slowdown_desc: "연산 실험이 잘못되어 우리 제국의 연구 역량이 영향을 받았습니다."
 blipped_colony: "회춘 행성"
 blipped_colony_desc: "이 행성은 시간 이상 현상에 의해 근본적인 변화를 겪어, 시간을 살짝 거슬러 올라갔습니다."
 devastated_colony: "궤멸된 식민지"
 devastated_colony_desc: "이 식민지는 끔찍한 중력 이상 현상의 희생양이 되었습니다."
 cosmogenesis_victim: "여파"
 cosmogenesis_victim_desc: "은하 전체에 중력 이상 현상이 퍼져 끔찍한 파괴를 초래했습니다."
