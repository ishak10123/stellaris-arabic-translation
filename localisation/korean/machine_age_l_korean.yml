 COSMOGENESIS_LEAKING_ATMOSPHERE_DESC: "대응 팀을 보내 [root.location.getName]에서 발생한 중력 변화를 수정하고 행성의 대기를 복원합니다."
 cosmogenesis_sped_up: "시간 가속"
