 civic_tooltip_pleasure_seekers_effects_machines: "§Y$living_standard_decadent$§! 생활 수준을 허용해, 이에 영향받는 모든 £pop£ §H팝§!의 £happiness£ §Y행복도§!와 £consumer_goods£ §Y$consumer_goods$§! 유지비 상승\n연예인으로 인한 기계식 팝 조립: §G+1%§!\n£job_servant£ §Y$job_servant_plural$§!이 §Y5§! £amenities£ §Y편의§! 추가 생산"
