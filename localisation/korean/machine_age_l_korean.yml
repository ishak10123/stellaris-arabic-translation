 situation_paperclip_status_low_capacity: "저장 한도가 §R부족해§! 할당량을 달성할 수 없습니다."
 civic_machine_obsessional_directive: "강박적 지시"
 civic_machine_obsessional_directive_desc: "이 기계 지능의 일차적 목표는 물품을 쉬지 않고 생산해 영구적인 이익을 얻는 것입니다. 이 지능을 만든 이들은 오래전에 사라졌지만 상관없습니다. 날이 갈수록 늘어 가는 이 지능의 생산 목표는 아무도 막을 수 없습니다."
