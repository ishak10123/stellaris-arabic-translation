 ##########################
 #ARC WELDERS ORIGIN
 ##########################
 origin_arc_welders: "아크 용접공"
 origin_arc_welders_desc: "이들이 사는 행성은 불모지이지만, 그 성계는 온갖 자원의 보고입니다. 그 자원을 개발하기 위해, 이 기계들은 이제껏 보지 못한 규모의 시설을 만들었습니다. 그렇게 탄생한 §H$tech_orbital_arc_furnace$§!는 그 위용으로 하늘을 덮고 있지만, 이 공학의 대가들은 만족하지 않았습니다.\n\n은하계가 기다리며, 가능성은 무한합니다. 필요한 것은 오직 하나, 그 가능성을 실현할 번뜩임입니다."
 origin_tooltip_arc_builders_effects: "- $HOMEWORLD$ 초기 ['concept_mining_district', £district£ $district_mining_plural$]를 ['concept_generator_district', £district£ $district_generator_plural$]로 대체 $NEW_LINE$- $HOME_SYSTEM$ ['concept_pc_molten'] 주변에 ['concept_arc_furnace']가 존재 $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_orbital_arc_furnace',£engineering_research£ $tech_orbital_arc_furnace$] $NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ 두 번째 아크 용광로 건설 시 ['concept_mega_engineering', £engineering_research£ $tech_mega_engineering$] 선택지 보장"
 origin_tooltip_arc_builders_negative_effects: "- $INITIAL_POPS$ §R-300§! $NEW_LINE$- 모성 크기: £planetsize£ 15"
 START_SCREEN_ARC_WELDERS: "[Root.Capital.GetName]의 지표면은 오랜 자원 개발로 불모지가 되었습니다. 그러나 하늘 위에는 여전히 자원이 넘쳐납니다. 우리는 번뜩이는 재능에 걸맞은 높은 야심을 품고, 이제 우주에서 활로를 모색하고 있습니다.\n\n최초의 $tech_orbital_arc_furnace$ 건설은 초거대 사업이었으며, 잠재력 또한 막대합니다. 우리는 이제 용광로를 개량해 그 능력을 완전히 끌어내야 하며, 이를 위해서는 성계 전체에 걸친 자원 추출이 필요합니다. 하지만 우리는 성계 너머에 무엇이 펼쳐져 있는지 모릅니다. 과연 어떤 놀라운 기회가 우리 제국의 뛰어난 기술자들을 기다리고 있을까요?\n\n초광속 항행 기술의 출현으로, 우리는 단일 성계를 넘어선 계획을 설계할 수 있게 되었습니다. 은하계가 곧 우리의 설계 도면입니다. 작업을 시작할 때가 왔습니다."
 concept_arc_furnace: "$orbital_arc_furnace_1$"
 concept_arc_furnace_desc: "§E효과:§!$NEW_LINE$$orbital_arc_furnace_1_mod_tooltip$\n\n§L$tech_orbital_arc_furnace_desc$§!"
 concept_orbital_arc_furnace: "$tech_orbital_arc_furnace$"
 concept_orbital_arc_furnace_desc: "§I거대 구조물 잠금 해제:§! $orbital_arc_furnace_4$ $DOUBLE_NEW_LINE$§L$tech_orbital_arc_furnace_desc$§!"
 concept_mega_engineering: "$tech_mega_engineering$"
 concept_mega_engineering_desc: "- $MOD_COUNTRY_RESOURCE_MAX_ADD$: §G+20,000§! $NEW_LINE$- §I$UNLOCKS_FEATURE$§! 거대 구조물 복구 $DOUBLE_NEW_LINE$§L$tech_mega_engineering_desc$§!"
 machine_age.3400.name: "용광로에 연료를"
 machine_age.3400.desc: "[From.GetName](은)는 멀리서 보기만 해도 이상적인 후보지였습니다. 그리고 성계 탐사를 끝낸 지금, 모든 의심은 사라졌습니다. 용암 행성과 거대 가스 행성부터 풍부한 소행성과 위성까지... 새로운 아크 용광로를 건설하는 데 이보다 나은 곳은 없습니다.\n\n논리적으로 볼 때, 이다음으로는 건설선을 보내 공사를 시작해야 마땅합니다. 용광로에 불을 지필 시간입니다."
 ideal_furnace_system_poi: "이상적인 용광로 성계"
 ideal_furnace_system_name: "[From.GetName]"
 ideal_furnace_system_desc: "두 번째 $tech_orbital_arc_furnace$를 건설하기에 이상적인 성계입니다."
 ideal_furnace_system: "이상적인 성계 위치 확인"
 ideal_furnace_chain_title: "용광로에 연료를"
 ideal_furnace_chain_desc: "두 번째 $tech_orbital_arc_furnace$를 건설하기에 이상적인 성계를 발견했습니다."
 machine_age.3405.name: "용접의 지평선"
 machine_age.3405.desc: "우리 모성계의 아크 용광로는 아이디어를 실현한 훌륭한 사례로, 우리 제국의 야심과 번뜩이는 기술력을 보여 줍니다. 이제 [from.GetName] 성계에서 또 다른 용광로가 불을 지펴 우주의 공허를 밝히고 있습니다.\n\n이곳에서 생산될 자원도 중요하지만, 그보다 이번 사업으로 인해 다른 초거대 건설 사업의 문이 열렸다는 점에 주목해야 합니다. 이제 우리는 방대한 지평선의 가장자리에 서서 더욱 먼 미래를 내다볼 수 있습니다.\n\n상상력만 충분하다면 우리에게 한계란 없습니다."
 ##########################
 #SYNTHETIC FERTILITY
 ##########################
 #Event Chain
 synthetic_fertility_chain_title: "$origin_synthetic_fertility$"
 synthetic_fertility_chain_desc: "우리는 생식 능력을 상실했습니다. 우리 모성 전역의 교육 시설은 폐건물이 되었고, 놀이터는 텅 비어 버렸습니다. 우리 종족이 멸종하는 것도 시간문제입니다. 이제 우리의 희망은 인격 보관소의 디지털 저장 공간뿐입니다.\n\n다시 실제 세계로 돌아가려면, 반드시 합성체 골격과 양전자 뇌를 개발해야 합니다."
 #Origin Text
 origin_synthetic_fertility: "합성 생식"
 origin_synthetic_fertility_desc: "§R경고: ['concept_synthetic_ascension']을 제외한 승격의 길이 전부 차단됩니다.§!\n\n한때 융성한 사회를 이루었던 이 제국은 어떤 신종 유전병으로 인해 생식 능력을 상실했습니다. 제국의 멸망을 앞두고, 이들은 디지털 세계에 희망을 걸었습니다."
 origin_tooltip_synthetic_fertility_effects: "- $INITIAL_POPS$ §G+900§! $NEW_LINE$- $SPECIES_TRAITS$ ['concept_pathogenic_genes']\n- 모성: $TABBED_NEW_LINE$- 크기: £planetsize£ 20 $TABBED_NEW_LINE$- ['concept_abandoned_cities', £blocker£ $concept_abandoned_cities$]: +2 $TABBED_NEW_LINE$- ['concept_identity_repository',£building£ $concept_identity_repository$] $TABBED_NEW_LINE$- ['concept_abandoned_gene_clinic',£building£ $concept_abandoned_gene_clinic$] $NEW_LINE$- 상황: ['concept_identity_rescue'] $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_synth_ai'] $NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_robotic_workers', £engineering_research£ $tech_robotic_workers$]"
 origin_tooltip_synthetic_fertility_negative_effects: "- £pop£ §H팝§!: 감소 중"
 START_SCREEN_SYNTHETIC_FERTILITY: "인공 의식 분야를 일찍이 개발한 우리는 혁명적인 변화를 통해 완전한 디지털 공동체를 이루고 실제 세계와 가상 세계 사이의 경계를 허물었습니다. 하지만 너무나도 커다란 성공을 거둔 탓에 우리는 자기만족에 빠지고 말았습니다. 앞으로도 수많은 세대에 걸쳐 혁신과 탐험이 계속되리라 믿었습니다.\n\n잘못된 생각이었습니다.\n\n우리 유전 코드를 공격하는 신종 질병이 나타나, 우리는 생식 능력을 상실했습니다. 최고의 석학들도 치료법을 찾아내지 못했고, 인구가 고령화되고 감소함에 따라 사회는 점차 공황에 빠졌습니다.\n\n절박해진 우리는 디지털 공간을 확대해 인격을 보전할 충분한 '공간'을 조성했습니다. 하지만 이것이 진정 우리가 원하던 존재 방식일까요? 이제 우리는, 우리가 실제 세계에 남아 있을 수 있도록 정교한 합성 신체와 양전자 뇌 개발에 몰두해야 합니다."
 #Concepts
 concept_synthetic_ascension: "합성체 승격"
 concept_synthetic_ascension_desc: "$ap_synthetic_evolution_desc$"
 concept_pathogenic_genes: "$trait_pathogenic_genes$"
 concept_pathogenic_genes_desc: "- §R행성 개척 및 재정착 불가§! $NEW_LINE$- §R자연적인 생식 불가§!\n\n§L$trait_pathogenic_genes_desc$§!"
 concept_identity_rescue: "$situation_synthetic_fertility_digitization$"
 concept_identity_rescue_desc: "$concept_synthetic_ascension$을 잠금 해제하는 기술을 보상\n\n§L$situation_synthetic_fertility_digitization_desc$§!"
