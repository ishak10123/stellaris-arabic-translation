 beset_by_cetana: "세타나에게 공격받음"
 synth_queen_alloy_shipments: "여왕의 과세"
 synth_queen_alloy_shipments_desc: "우리 제국은 일부 합금 생산량을 세타나와 공유해, 여왕의 야망 실현을 지원하고 있습니다."
 synth_queen_large_alloy_shipments: "선의의 선물"
 synth_queen_large_alloy_shipments_desc: "우리는 환심을 사기 위해 합금 생산량 중 상당 부분을 세타나와 공유해, 여왕의 야망 실현을 지원하고 있습니다."
 synth_queen_shared_research: "여왕의 연구"
 synth_queen_shared_research_desc: "세타나가 우리 데이터 뱅크를 열람할 수 있도록 허락했습니다. 그 결과, 연구 생산이 일시적으로 지장을 받습니다."
 synth_queen_much_shared_research: "데이터베이스 과부하"
 synth_queen_much_shared_research_desc: "세타나가 우리 데이터베이스를 제한 없이 접근할 수 있도록 허락했습니다. 그 결과, 연구 속도가 심각하게 느려졌습니다."
 synth_queen_war_preparations: "다가오는 전쟁"
 synth_queen_war_preparations_desc: "세타나의 비밀 작전이 드러난 지금, 다른 어느 때보다 시급하게 우리 제국의 군사력을 강화해야 합니다."
 synth_queen_advanced_war_preparations: "생존을 위한 싸움"
 synth_queen_advanced_war_preparations_desc: "의식을 말살하려는 세타나의 음모를 어떠한 수단을 동원해서라도 막아야 합니다."
 synth_queen_nanite_apprentice: "세타나의 제자"
 synth_queen_nanite_apprentice_desc: "우리 또한 나노 기술에 매료되었다는 사실을 알게 된 세타나가 우리에게 큰 관심을 보이고 있습니다. 세타나를 실제로 믿지 않더라도, 그녀의 인도는 우리에게 이득이 될 수 있습니다."
 #Opinion
 synth_queen_approve: "세타나가 기뻐할 것입니다."
 synth_queen_approve_lot: "세타나가 상당히 기뻐할 것입니다."
 synth_queen_disapprove: "세타나가 불쾌해할 것입니다."
 synth_queen_disapprove_lot: "세타나가 상당히 불쾌해할 것입니다."
 synth_queen_gift_tt: "세타나의 선물을 더 많이 받으려면, 계속해서 세타나에게 충성심을 증명해야 합니다."
 synth_queen_punishment_tt: "세타나가 '교훈'을 줄 때마다, 그 분노는 잦아드는 것 같습니다."
