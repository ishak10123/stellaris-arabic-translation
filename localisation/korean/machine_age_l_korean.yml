 #CYBERNETIC CREED ORIGIN
 ##########################
 origin_cybernetic_creed: "사이버네틱 종파"
 origin_cybernetic_creed_desc: "§R경고: ['concept_cybernetic_ascension']을 제외한 승격의 길이 전부 차단됩니다§!.\n\n이 제국은 고귀한 신체와 거룩한 사이버네틱의 융합이라는 신성한 소명을 추구합니다. 증강이 곧 경배입니다."
 origin_tooltip_cybernetic_creed_effects: "- $HOMEWORLD$ 초기 건물을 ['concept_cybernetic_creed_infrastructure']로 대체 $NEW_LINE$- 게임이 시작되고 얼마 후 ['concept_cybernetic_creed'] 세력 형성\n- $SPECIES_TRAITS$ ['trait:trait_cyborg_ritualistic_implants']\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_integrated_cybernetics', £engineering£ $tech_integrated_cybernetics$]\n- ['concept_cybernetic_creed_jobs'] 직업"
 START_SCREEN_CYBERNETIC_CREED: "우리는 기계와 [Owner.Species.GetFleshTypeCyberCreed]의 합일이라는 숭고한 소명을 받듭니다. 우리의 역사는 수많은 실패로 점철되어 있으나, 신의 인도에 따라 마침내 축성 삽입물과의 신성한 공생으로 가는 첫 단계에 진입했습니다.\n\n그러나 우리는 사이버네틱의 무한한 잠재력을 이제 막 접하기 시작했을 뿐입니다. 앞으로 더욱 발전된 증강 기술이 출현할 것입니다.\n\n이러한 발전에도 불구하고 우리 신앙은 분열되었습니다. 서로 다른 교리를 따르는 종파들이 신성한 증강의 최종 목표가 무엇인지를 놓고 논쟁을 벌이고 있습니다. 이 문제에 대한 답을 찾는 날, 우리는 축복받은 기술과 거룩한 [Owner.Species.GetFleshTypeCyberCreed]의 완벽한 합일을 이룩함으로써 진화를 통한 설계의 한계를 뛰어넘을 수 있을 것입니다.\n\n$machine_age.1090.pray$"
