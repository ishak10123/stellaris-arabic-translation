 cosmogenesis_world_0_DESC: "비합리적일 정도의 규모를 갖춘 이 컴퓨터는 지성체를 연산 칩으로 활용해 연구를 수행하고 심화 논리를 생성하며, 이 과정에서 지성체는 결국 사망합니다. 이 컴퓨터의 효율성은 처리 장치를 더 많이 꽂을수록 비약적으로 상승합니다."
 cosmogenesis_world_0_MEGASTRUCTURE_DETAILS: "팝을 사실상 소모해 §Y연구§!와 §Y심층 논리§!를 생성하는 연산 구조물입니다."
