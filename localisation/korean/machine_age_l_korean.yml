l_korean:
 ###################
 #Cybernetics Pack
 ###################
 MACHINEAGE_TITLE: "The Machine Age" #Do not translate
 #### Cosmogenesis Crisis ####
 ap_cosmogenesis: "우주의 창조"
 ap_cosmogenesis_desc: "시간, 중력, 공간은 현실이라는 시계태엽을 이루는 톱니바퀴입니다. 이 세 가지를 다루는 법을 익힌다면, 온 우주와 그 비밀은 우리 차지가 될 것입니다."
 cosmogenesis_chain_title: "우주의 창조"
 cosmogenesis_chain_desc: "무지는 우리가 우주의 비밀에 닿지 못하게 속박하는 족쇄입니다.\n\n어떠한 대가를 치르더라도 이 속박을 끊어내야 합니다.\n\n§R몰락한 제국이 우리를 막으려 할 것입니다!§!"
 cosmogenesis_level_reached: "위기 단계 도달"
 cosmogenesis_aborted_tt: "\n£trigger_no£ §R우리는 우주의 창조에 대한 야망을 포기했습니다.§!"
 ### Crisis Stage Techs
 tech_cosmogenesis_crisis_1: "지수 학습 이론"
 tech_cosmogenesis_crisis_1_desc: "현실을 이루는 무한한 층위를 이해하려면 급격한 인식 전환이 필요하며, 이는 우리 제국의 최고 석학들에게도 쉽지 않은 과제입니다."
 cosmogenesis_level_1_tech_title: "§H우주의 창조§! 위기 §H단계 2§! 잠금 해제"
 cosmogenesis_level_1_tech_desc: "§H$tech_cosmogenesis_crisis_1$§!\n현실의 작동 원리를 밝혀내려면, 더욱 원대한 규모의 사고에 마음을 열어야 합니다."
 tech_cosmogenesis_crisis_2: "중력 붓"
 tech_cosmogenesis_crisis_2_desc: "중력과 시공간은 우주를 빚어냅니다. 중력을 시작으로, 우리는 우리 제국의 승격을 이룩할 수단을 통달할 것입니다."
 cosmogenesis_level_2_tech_title: "§H우주의 창조§! 위기 §H단계 3§! 잠금 해제"
 cosmogenesis_level_2_tech_desc: "§H$tech_cosmogenesis_crisis_2$§!\n중력은 우리가 현실이라는 캔버스에 그림을 그릴 때 사용할 붓 하나에 불과합니다."
 tech_cosmogenesis_crisis_3: "이론적 무한 테제"
 tech_cosmogenesis_crisis_3_desc: "중력을 정밀하고 아주 세밀하게 변조하면, 현실을 구성하는 코드에 명령을 주입할 수 있습니다. 다만 이 새롭고 놀라운 도구의 응용법을 배우는 과정에서는 각별히 주의를 기울여야 합니다."
 cosmogenesis_level_3_tech_title: "§H우주의 창조§! 위기 §H단계 4§! 잠금 해제"
 cosmogenesis_level_3_tech_desc: "§H$tech_cosmogenesis_crisis_3$§!\n중력에 뚫려 있는 세세한 구멍을 하나씩 통과하면, 시공간을 가로지를 수 있을 것입니다."
 tech_cosmogenesis_crisis_4: "현실의 규칙"
 tech_cosmogenesis_crisis_4_desc: "최근에 진행한 실험을 통해 우리가 현실을 수정한 것이 일시적인 변화에 불과하다는 것을 확인했습니다. 영구적인 변화를 위해서는 더욱 본격적인 변조가 필요할 것입니다."
 cosmogenesis_level_4_tech_title: "§H우주의 창조§! 위기 §H단계 5§! 잠금 해제"
 cosmogenesis_level_4_tech_desc: "§H$tech_cosmogenesis_crisis_4$§!\n현실이 신음 소리를 냅니다. 저항하고 불만을 터뜨리며, 우리가 만들어 내는 변조를 따르지 않고자 고집스럽게 형태를 바꿉니다. 이 예기치 못한 상황을 두고만 볼 수 없습니다."
 tech_cosmogenesis_crisis_5: "신생 우주"
 tech_cosmogenesis_crisis_5_desc: "다른 우주로의 대규모 이동은 결코 만만치 않은 과업입니다. 이를 위해서는 시공간의 구조를 뚫고 지나가도 살아남을 수 있는 우주선을 개발해야 합니다.\n\n§R몰락한 제국이 우리를 막으려 할 것입니다!§!"
 cosmogenesis_level_5_tech_title: "§H거대 구조물 잠금 해제:§! 지평의 바늘"
 cosmogenesis_level_5_tech_desc: "§H지평의 바늘§!\n첨단 기술의 경이인 지평의 바늘은 현실 그 자체를 조작하는 능력을 지닌 민간 함선입니다. 온 우주를 가로질러 우리 국민과 우리가 그간 축적한 지식을 안전하게 이주시킵니다."
 requires_capital: "£trigger_no£ 수도의 궤도에 건설해야 합니다."
 ### Crisis Tab
 crisobj_research_tech_name: "신기술 연구"
 crisobj_research_tech_desc: "크든 작든 새로운 기술을 발견하면, 현실의 작동 원리에 관한 통찰을 얻습니다.\n\n기술을 연구하면 해당 심층 논리 보상을 얻습니다."
 crisobj_research_thesis_name: "응용 무한 테제 연구"
 crisobj_research_thesis_desc: "현실의 행동 양식을 관장하는 법칙을 변화시키기 위해 대규모 실험을 진행하면, 귀중한 데이터를 확보할 수 있습니다.\n\n이 희귀 기술을 연구하면 해당 심층 논리 보상을 얻습니다."
 crisobj_have_scholarium_vassals_name: "학술국 유지"
 crisobj_have_scholarium_vassals_desc: "연구 중심 종속국은 절대적인 지식을 향한 우리의 여정에 도움을 줄 수 있습니다.\n\n§Y학술국§!을 유지하면, 해당 §Y연간§! 심층 논리 보상을 받습니다."
 crisobj_neural_chips_name: "신경칩 적용"
 crisobj_neural_chips_desc: "연구 규모가 너무 커진 탓에 일정한 희생 없이는 수용이 힘듭니다.\n\n팝을 §Y시냅스 가공기§!에 §Y신경칩§!으로 활용해 심층 논리를 얻습니다.\n\n§Y신경칩§!의 생산량은 §Y시냅스 가공기§!에 투입한 팝의 수에 따라 증가합니다. 또한 각종 지구와 건물을 통해 생산량을 추가로 확대할 수도 있습니다."
 crisobj_have_science_nexuses_name: "사이언스 넥서스 통제"
 crisobj_have_science_nexuses_desc: "중력 이상 현상으로부터 멀리 떨어져 있는 이 최첨단 연구 시설은 손상되지 않은 시공간 데이터를 검증하는 데 쓰입니다.\n\n완전히 업그레이드를 마친 §Y사이언스 넥서스§! 거대 구조물을 통제하면, 해당 §Y연간§! 심층 논리 보상을 받을 수 있습니다."
 crisobj_galcom_science_resolution_name: "은하 공동체 지원 확보"
 crisobj_galcom_science_resolution_desc: "은하 공동체 구성원들에게 우리가 진행 중인 연구의 필요성을 설득하면, 우리 계획을 이행하는 데 큰 도움이 될 것입니다.\n\n§Y은하 공동체§!가 해방된 지식 §Y결의안§!을 채택하게 하면, 해당 §Y연간§! 심층 논리 보상을 받을 수 있습니다."
 crisis_cosmogenesis_level_1: "§U우려§!"
 crisis_cosmogenesis_level_1_desc: "위기 단계 1"
 crisis_cosmogenesis_level_2: "§U위험§!"
 crisis_cosmogenesis_level_2_desc: "위기 단계 2"
 crisis_cosmogenesis_level_3: "§U위해§!"
 crisis_cosmogenesis_level_3_desc: "위기 단계 3"
 crisis_cosmogenesis_level_4: "§U재난§!"
 crisis_cosmogenesis_level_4_desc: "위기 단계 4"
 crisis_cosmogenesis_level_5: "§U실존적 위험§!"
 crisis_cosmogenesis_level_5_desc: "위기 단계 5"
 menp_cosmo_objectives: "심층 논리"
 unlocks_cosmo_objectives: "§H위기 목표§!를 달성하면 £advanced_logic£ §Y$menp_cosmo_objectives$§!를 축적할 수 있습니다.\n\n우리를 목표에 한층 가까이 다가가게 해 줄 §Y$tech_cosmogenesis_crisis_1$§! 기술이 잠금 해제됩니다.\n"
 menp_cosmo_objectives_desc: "심층 논리는 현실을 규율하는 법칙에 대한 우리의 이해 수준과 그 법칙에 영향을 줄 수 있는 능력을 나타냅니다."
 menp_cosmo_buildings_1: "완벽한 아콜로지"
 unlocks_buildings_1: "몰락한 제국의 기초적인 건물이 연구 선택지로 나타날 수 있습니다.\n"
 menp_cosmo_buildings_1_desc: "몰락한 제국이 자신들의 첨단 기술을 재현하는 방법을 잃었다 하더라도, 우리의 정신은 그들의 황금기에 얽힌 사라진 비밀을 밝혀낼 것입니다."
 menp_cosmo_techs_1: "반중입자 에너지"
 unlocks_techs_1: "§Y$tech_dark_matter_power_core$§! 함선 부품 기술이 잠금 해제됩니다.\n"
 menp_cosmo_techs_1_desc: "반중입자 에너지를 이용하는 방법을 습득하면, 발전기 초소형화를 위한 다음 단계에 진입할 수 있습니다."
 menp_cosmo_features_1: "두뇌 컴퓨터"
 unlocks_features_1: "§Y시냅스 가공기§! 거대 구조물 기술이 잠금 해제됩니다.\n"
 menp_cosmo_features_1_desc: "웅장한 규모를 자랑하는 시냅스 가공기는 축적 컴퓨터의 일종으로, 우리 국민의 정신으로 구성된 연결망의 연산력을 활용해 데이터를 연산하고 저장합니다. 분명한 이점을 지닌 시설이지만, 그릇된 사고를 지닌 일부 종족은 국민들을 컴퓨터 칩으로 변환하는 행위를 도덕적으로 문제가 있는 것으로 여길 수 있습니다."
 menp_cosmo_ship_2: "난해 경호함"
 unlocks_ship_2: "몰락한 제국의 §Y경호함§! 기술이 잠금 해제됩니다.\n"
 menp_cosmo_ship_2_desc: "[Get_menp_cosmo_ship_2]"
 menp_cosmo_ship_2_desc_regular: "시공간에 관한 우리의 지식을 최적화해 차원 초월을 실현한 함선으로, 겉으로 보기에는 크기가 크지 않지만 그보다 커다란 내부를 지녔습니다. 기존 함선 설계에 비해 화력이 강화되었음에도 보급 비용은 더 적습니다."
 menp_cosmo_buildings_2: "첨단 추수"
 unlocks_buildings_2: "몰락한 제국의 고급 건물이 연구 선택지로 나타날 수 있습니다.\n"
 menp_cosmo_buildings_2_desc: "몰락한 제국의 자원 생산 능력은 오랫동안 우리를 당혹스럽게 하는 수수께끼였으나, 이제는 아닙니다."
 menp_cosmo_techs_2: "반중입자 발전"
 unlocks_techs_2: "§Y$tech_enigmatic_decoder$§!와 §Y$tech_dark_matter_propulsion$§! 함선 부품 기술이 잠금 해제됩니다.\n"
 menp_cosmo_techs_2_desc: "암흑 물질과 그 활용법에 관한 이해가 깊어짐에 따라, 기술 발전의 새로운 방향이 나타날 것입니다."
 menp_cosmo_features_2: "중력 도구"
 unlocks_features_2: "우리를 목표에 한층 가까이 다가가게 해 줄 §Y$tech_cosmogenesis_crisis_2$§! 기술이 잠금 해제됩니다.\n"
 menp_cosmo_features_2_desc: "$tech_cosmogenesis_crisis_2_desc$\n"
 menp_cosmo_ship_3: "불가해 순양함"
 unlocks_ship_3: "몰락한 제국의 §Y순양 전함§! 기술이 잠금 해제됩니다.\n"
 menp_cosmo_ship_3_desc: "[Get_menp_cosmo_ship_3]"
 menp_cosmo_ship_3_desc_regular: "더욱 규모를 키운 최적화된 함선으로, 기존 전함을 장난감처럼 보이게 만듭니다."
 menp_cosmo_buildings_3: "복합 기반 시설"
 unlocks_buildings_3: "몰락한 제국의 복합 건물이 연구 선택지로 나타날 수 있습니다.\n"
 menp_cosmo_buildings_3_desc: "이제 몰락한 제국을 둘러싼 수수께끼가 밝혀지기 시작했으니, 계속해서 실마리를 풀어내야 합니다. 계속 풀다 보면 언젠가는 그 기술의 비밀이 드러날 것입니다."
 menp_cosmo_techs_3: "외계 반중입자"
 unlocks_techs_3: "§Y$tech_enigmatic_encoder$§!와 §Y$tech_dark_matter_deflector$§! 함선 부품 기술이 잠금 해제됩니다.\n"
 menp_cosmo_techs_3_desc: "방어 기술과 암호화에 암흑 물질을 적용하면, 무효화 역장과 쉽게 끊어지지 않는 통신 채널을 만들 수 있습니다."
 menp_cosmo_features_3: "영구 확장"
 unlocks_features_3: "우리를 목표에 한층 가까이 다가가게 해 줄 §Y$tech_cosmogenesis_crisis_3$§! 기술이 잠금 해제됩니다.\n"
 menp_cosmo_features_3_desc: "$tech_cosmogenesis_crisis_3_desc$\n"
 menp_cosmo_ship_4: "불가측 기함"
 unlocks_ship_4: "몰락한 제국의 §Y타이탄§! 함선 기술이 잠금 해제됩니다.\n"
 menp_cosmo_ship_4_desc: "[Get_menp_cosmo_ship_4]"
 menp_cosmo_ship_4_desc_regular: "엄청난 위압감을 주는 이 함선은 차라리 이동형 요새에 가까우며, 압도적인 맹공이 아니고서야 웬만해서는 피해를 받지 않습니다."
 menp_cosmo_buildings_4: "황금기"
 unlocks_buildings_4: "몰락한 제국의 최상위급 건물이 연구 선택지로 나타날 수 있습니다.\n"
 menp_cosmo_buildings_4_desc: "몰락한 제국은 차원 조작에 관해 가공할 만한 통찰을 지니고 있었습니다. 그러나 발견이 계속됨에 따라 아무리 신비해 보였던 기술조차 이제는 단순하게 느껴지기 시작합니다."
 menp_cosmo_techs_4: "장갑과 무장"
 unlocks_techs_4: "§Y$tech_energy_lance_2$§!와 §Y$tech_dragon_armor$§! 함선 부품 기술이 잠금 해제됩니다.\n"
 menp_cosmo_techs_4_desc: "최신 기술의 발전을 통해 더욱 치명적인 무기와 한층 더 강력한 장갑을 우리 함선에 적용할 수 있게 될 것입니다."
 menp_cosmo_features_4: "법칙 파괴자"
 unlocks_features_4: "우리를 목표에 한층 가까이 다가가게 해 줄 §Y$tech_cosmogenesis_crisis_4$§! 기술이 잠금 해제됩니다.\n또한, 반복 가능한 기술인 §Y$tech_cosmogenesis_thesis$§!가 잠금 해제됩니다. 이 기술을 이용해 상당한 양의 §Y심층 논리§!을 확보할 수 있습니다.\n"
 menp_cosmo_features_4_desc: "$tech_cosmogenesis_crisis_4_desc$"
 menp_cosmo_buildings_5: "기억과 창조"
 unlocks_buildings_5: "몰락한 제국의 비전급 건물이 연구 선택지로 나타날 수 있습니다.\n"
 menp_cosmo_buildings_5_desc: "몰락한 제국의 비밀이 마침내 드러나, 우리 국민들에게 새 시대를 선사합니다."
 menp_cosmo_techs_5: "나노 무리"
 unlocks_techs_5: "§Y$tech_nanite_repair_system$§!, §Y$tech_nanite_autocannon$§! 및 §Y$tech_nanite_flak_batteries$§! 함선 부품 기술이 잠금 해제됩니다.\n"
 menp_cosmo_techs_5_desc: "우리가 관점을 바꿀 때마다 새로운 기회가 모습을 드러냅니다. 아주 사소한 변화도 거대한 결과를 만들어낼 수 있습니다."
 menp_cosmo_features_5: "공허 여행자"
 unlocks_features_5: "우리가 §Y지평의 바늘§!을 건조하고 목표를 달성하게 해 줄 §Y$tech_cosmogenesis_crisis_5$§! 기술이 잠금 해제됩니다."
 menp_cosmo_features_5_desc: "$tech_cosmogenesis_crisis_5_desc$"
 cosmogenesis_level_2_req_clear_tooltip: "£trigger_yes£ §Y$tech_cosmogenesis_crisis_1$ 기술§!을 연구함"
