 civic_corporate_toxic_baths_individual_machine_desc: "창조주님께 감사를! 이 윤활제의 고급스럽고 부드러운 질감은 노후화된 뼈대에 드러난 마모의 흔적을 확실하게 줄여 줍니다. 최고급 열 활성 오일을 주입해 특수 제작한 이 제품 덕분에, 이 기계 제국의 구성원들은 '공장에서 갓 나온' 듯한 모습을 유지하고 만끽할 수 있습니다. 모델과 용도에 상관없이 완벽하게 작용합니다."
