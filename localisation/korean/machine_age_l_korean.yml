 building_lathe_capital: "처리 장치"
 building_lathe_capital_desc: "시냅스 가공기는 처리 장치의 양자 특성을 활용해 여러 개의 차원층에 걸친 병렬 연산을 수행할 수 있습니다."
 building_lathe_major_capital: "처리 장치: 병렬화"
 building_lathe_major_capital_desc: "이 개량형 처리 장치는 신경칩의 인지 메아리를 봉쇄된 감마 공간 포켓에서 반발시켜 더욱 향상된 병렬 연산 성능을 보여 줍니다."
 building_lathe_super_capital: "처리 장치: 벡터"
 building_lathe_super_capital_desc: "이 강화 처리 장치는 음의 공간 벡터를 만들어 연산을 간소화합니다. 이렇게 처리 과정을 차원에 따라 구획화함으로써 효율성과 안정성이 크게 상승합니다."
 building_lathe_resonator: "시냅스 공명기"
 building_lathe_resonator_desc: "공명기는 이탈한 사고와 자율 시스템의 인지 잠재력을 이용하고 전환시킴으로써, 각각의 칩이 가장 가까운 처리 유닛의 효율성을 높이게 만듭니다."
 lathe_resonator_tt: "§Y$job_neural_chip_plural$§! 생산량: §Y$job_neural_chip_plural$§!당 §G+1%§!\n(현재 수치: §G+[num_neural_chips]%§!)"
 building_lathe_stabilisator: "신경 안정기"
 building_lathe_stabilisator_desc: "안정화 시스템은 신경칩이 물리적 간섭을 이겨내지 못할 경우 생성되는 연산 노이즈를 걸러냅니다. 이렇게 간섭을 줄임으로써 전체 생산량이 증가합니다."
 building_lathe_overclocker: "시냅스 오버클러커"
 building_lathe_overclocker_desc: "시냅스 가공기는 설치된 신경칩을 보존해 생산성을 최대한 오래 유지하도록 설계되었습니다. 오버클러커는 이 명령을 무시하고 생산량과 생산 속도를 올리지만, 고장률이 증가합니다."
 building_lathe_preserver: "시냅스 보존기"
 building_lathe_preserver_desc: "네트워크를 이루는 유기체 부품은 에너지 변동에 따른 급성 축삭 변성에 특히 취약합니다. 보존기는 시냅스 가공기의 연약한 부품을 보호하기 위해 에너지 변동 완화를 추진합니다."
 building_lathe_reactor: "확장 반응로"
 building_lathe_reactor_desc: "네트워크에 꽂힌 칩이 많을수록 장비 유지에 많은 에너지가 소모됩니다. 반응로를 추가로 설치하면, 시냅스 가공기 운용에 필요한 복잡한 조달 과정이 줄어듭니다."
 building_lathe_life_support: "시냅스 유지기"
 building_lathe_life_support_desc: "전용 시설을 통해 시냅스 가공기의 핵심 부품을 체계적으로 정비합니다. 이로써 더욱 많은 칩을 운용하면서도 건강한 네트워크 환경을 조성할 수 있습니다."
 building_lathe_cogitator: "시냅스 숙고기"
 building_lathe_cogitator_desc: "초공간 공급망은 복잡한 계산을 필요로 합니다. 일부 연산력을 공급망 계산으로 돌리면, 아무리 큰 함대도 적의 영역에 더 깊이 침투할 수 있을 것입니다."
 building_lathe_cogitator_tt: "§Y함대 수용력§!: §Y$job_neural_chip_plural$§!당 §G+1%§!\n(현재 수치: §G+[num_neural_chips]%§!)\n§Y함선 경험치 획득량§!: §Y$job_neural_chip_plural$§!당 §G+2%§!\n(현재 수치: §G+[num_neural_chips_double]%§!)"
 building_lathe_validator: "시냅스 검증기"
 building_lathe_validator_desc: "검증기의 주된 용도는 무한 테제 구축을 지원하는 것이지만, 더욱 일반적인 연산 작업에도 적용이 가능합니다."
 building_lathe_validator_tt: "$mod_category_computing_research_speed_mult$: §Y$job_neural_chip_plural$§!당 §G+1%§!\n(현재 수치: §G+[num_neural_chips]%§!)"
 ### Synaptic Lathe UI
 SYNAPTIC_LATHE_STABILITY_DESC: "§E$r_stability$는 시냅스 가공기의 네트워크 전체에 걸친 안정성을 나타내는 지표이며, 주로 신경칩 전체의 £happiness£ §Y행복도§!에 따라 결정됩니다.\n\n안정도가 감소하는 요인으로는 £housing£ §R인구 과밀§! 및 £amenities£ §R낮은 편의§! 등이 있습니다. $PLANET_STABILITY_TITLE$가 높을 경우 자원 생산량이 증가하며, 반대로 $PLANET_STABILITY_TITLE$가 낮으면 생산량이 감소합니다. 시냅스 가공기에서는 다른 식민지와 달리 전면적인 §Y반란§!이 절대로 일어나지 않습니다.§!"
 SYNAPTIC_LATHE_RESISTANCE_DESC: "§E§Y저항§!은 불량 신경칩에 의해 전체적으로 얼마나 지장을 받는지 보여 주는 지표입니다. £crime£ §Y저항§! 수치가 높으면 §Y팝 감소§! 속도와 팝이 탈주할 확률이 증가합니다. 저항은 행성에 인구가 많을 때 자연스럽게 발생하며, £happiness£ §Y팝 행복도§!를 높이거나 £building£ §Y신경 안정기§!를 건설해 줄일 수 있습니다.§!"
 SYNAPTIC_LATHE_HOUSING_DESC: "§E§Y$PLANET_HOUSING_TITLE$§!는 신경칩을 수용하는 전용 기반 시설을 나타냅니다. 신경칩을 적절히 수용할 공간이 부족할 경우 $r_stability$ 감소로 이어집니다. §Y주거§!는 추가 £district£ §Y지구§!를 건설하거나, 가공기의 §Y처리 장치§!를 업그레이드하거나, £building£ §Y시냅스 유지기§!를 건설해 늘릴 수 있습니다.§!"
 SYNAPTIC_LATHE_AMENITIES_DESC: "§E§Y$PLANET_AMENITIES_TITLE$§!는 신경칩의 생명 유지를 충족하기 위한 전용 기반 시설을 나타냅니다. 주민들에게 필요한 양의 $PLANET_AMENITIES_TITLE$를 생산하지 못하는 행성은 £happiness£ §Y행복도§!에 불이익을 받습니다. §Y편의§!는 가공기의 §Y처리 장치§!를 업그레이드하거나 £building£ §Y시냅스 유지기§!를 건설해 늘릴 수 있습니다.§!"
 SYNAPTIC_LATHE_RESISTANCE_TITLE: "저항"
