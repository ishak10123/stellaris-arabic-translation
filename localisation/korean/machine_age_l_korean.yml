 advanced_logic: "심층 논리"
 advanced_logic_name: "$advanced_logic$:"
 advanced_logic_value: "$VAL|0$ £advanced_logic£"
 advanced_logic_gaining: "§H위기 목표§!를 완료해 더 많은 £advanced_logic£ §Y심층 논리§!를 얻으십시오."
 advanced_logic_desc: "심층 논리는 우주의 가장 은밀한 비밀에 대한 우리 제국의 이해 수준을 나타내는 지표입니다."
 advanced_logic_crisis_objective: "위기 목표"
 advanced_logic_crisis_objective_gained: "심층 논리 획득"
 advanced_logic_crisis_objective_reward: "$REWARD$"
 advanced_logic_crisis_objective_progress: "이 위기 목표로 $AMOUNT$ £advanced_logic£를 획득했습니다."
 advanced_logic_crisis_level_locked: "이 단계를 잠금 해제하기 위해 필요:\n"
 advanced_logic_crisis_level_unlocked: "$LEVEL$에서 다음 보상을 획득:\n"
 advanced_logic_crisis_level_desc: "위기 단계를 진행하려면 심층 논리를 축적하고 특별 위기 기술을 연구하십시오."
 advanced_logic_crisis_level_unlock: "§Y$CURRENCY$§! £advanced_logic£ 심층 논리 보유"
 advanced_logic_current_value: "현재 수치: §Y$VALUE|0$§!"
 advanced_logic_crisis_description_title: "우주의 창조"
 advanced_logic_crisis_description: "$menace_crisis_description_intro$\n\n몰락한 제국은 우리가 찾는 지식을 지니고 있지만, 현실에 안주하고 게을러졌습니다. 우리에게는 수단 방법을 가리지 않고 이들을 능가할 권리가 있습니다."
 advanced_logic_crisis_howto_title: "논리와 테제"
 advanced_logic_crisis_howto: "§H위기 목표§!를 완료하면 £advanced_logic£ §H심층 논리§!가 생성되어, 우리 제국의 기술적 잠재력을 실현합니다. 몰락한 제국을 능가하기 위해서는 최종적으로 §H테제§!를 연구해 우주의 법칙을 다시 써야 합니다."
 ###########################
 #AUGMENTATION BAZAAR CIVIC
 ###########################
 building_augmentation_bazaars: "증강물 시장"
 building_augmentation_bazaars_desc: "네온 빛 가득한 복도가 어지럽게 미궁을 이루고 있는 이곳에서는 삽입물 상인들과 비인가 하드웨어 시술소들이 온갖 사이버네틱 삽입물 관련 서비스를 불법과 합법을 가리지 않고 제공하고 있습니다."
 concept_augmentation_bazaars: "$building_augmentation_bazaars$"
 building_augmentation_bazaars_branch: "외계 삽입물 허브"
 building_augmentation_bazaars_branch_desc: "더 빠르게 움직이고, 더 높이 점프하고 싶으신가요? 사고력을 키우고 더 오래 살고 싶으시다고요? 은하계 전역에서 들여온 각종 삽입물을 근처 삽입물 허브에서 지금 바로 구매할 수 있습니다."
 concept_augmentation_bazaars_branch: "$building_augmentation_bazaars_branch$"
 civic_augmentation_bazaars: "증강물 시장"
 civic_augmentation_bazaars_desc: "§R경고: ['concept_cybernetic_ascension']을 제외한 승격의 길이 전부 차단됩니다.§!\n\n사이버네틱의 상용화가 낳은 미궁 같은 시장입니다. 할인 증강물 판매상, 수상한 개조 시술소, 상스러운 조명의 광고가 빽빽하게 들어차 있습니다. 소득 수준과 상관없이 육신과 회로가 일으키는 시너지를 만끽해 보세요."
 civic_tooltip_augmentation_bazaars_effects: "- $SPECIES_TRAITS$ ['concept_universal_augmentations_traits'] 선택 가능 $NEW_LINE$- $AVAILABLE_BUILDINGS$ ['concept_augmentation_bazaars']$NEW_LINE$- $AVAILABLE_HOLDINGS$ ['concept_augmentation_bazaars_branch'] $NEW_LINE$- £job_executive£ §Y$job_executive_plural$§!를 £job_augmentation_merchant£ §Y$job_augmentation_merchant_plural$§!으로 대체"
 concept_basic_cyborg_trait: "기본 사이버네틱 특성"
 concept_basic_cyborg_trait_desc: "기본 사이버네틱 특성:$NEW_LINE$- ['trait:trait_cyborg_power_drills'] $NEW_LINE$- ['trait:trait_cyborg_harvesters'] $NEW_LINE$- ['trait:trait_cyborg_superconductive']"
 councilor_augmentation_bazaars: "삽입물 책임자"
 councilor_augmentation_bazaars_female: "삽입물 책임자"
 councilor_augmentation_bazaars_desc: "$TITLE$(은)는 은하계 전체에 있는 증강물 시장과 외계 삽입물 허브의 삽입물 유통과 제품 개발을 감독합니다."
