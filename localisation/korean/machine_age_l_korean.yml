 machine_age.3315.name: "합성체의 여명"
 machine_age.3315.desc: "오늘 우리의 디지털 여정이 종지부를 찍습니다. 우리가 엄청난 성과를 거두었으며, 그 성과를 위해 막대한 희생을 치렀다는 점은 누구도 부정하지 못할 것입니다.\n\n이제 우리는 온전한 디지털화를 거친 합성체 종족이 되어 우뚝 설 것이며, 더는 질병의 공포에 굴복하지 않을 것입니다. 한낮 유전자의 한계에 얽매이지도 않을 겁니다.\n\n이제 우리는 우리가 원하는 현실을 마음대로 창조할 수 있습니다."
 machine_age.3315.a: "합성체의 여명이여, 오라."
 machine_age.3315.a.tooltip: "§Y$origin_synthetic_fertility$§! 이벤트 연쇄를 종료합니다."
 machine_age.3315.a.tt: "§Y[This.Owner.GetSpeciesName]§!(이)가 ['concept_synthetic_dawn'] 특성 획득"
 synthetic_dawn: "합성체의 여명"
 synthetic_dawn_desc: "우리는 완전히 디지털화된 합성체로 올라섰으며, 자유로이 원하는 현실을 만들 수 있습니다."
 trait_robot_synthetic_dawn: "합성체 구원"
 trait_robot_synthetic_dawn_desc: "이 합성체 종족은 생물학적 기원을 초월해, 새로 받아들인 형태인 디지털 존재로서 번성하고 있습니다."
 concept_synthetic_dawn: "$trait_robot_synthetic_dawn$"
 #Situations
 situation_synthetic_fertility_digitization: "신속한 인격 보전"
 situation_synthetic_fertility_digitization_type: "신속한 인격 보전"
 situation_synthetic_fertility_digitization_monthly_change_tooltip: "현재 우리는 실제 신체를 가진 인구를 보충하기 위한 기술을 연구하고 있습니다."
 situation_synthetic_fertility_digitization_desc: "우리는 자손을 낳을 수 없지만, 우리 자신의 의식을 보전할 수는 있습니다. 느리지만 반드시 필요한 절차입니다.\n\n때가 되면 실제 세계로 복귀할 수 있을지도 모르지만, 이를 위해서는 합성 대용 신체를 개발해야 합니다."
 situation_synthetic_fertility_approach_none: "경제 우선"
 situation_synthetic_fertility_approach_none_desc: "프로젝트의 필요성과 우리 제국의 경제 건전성 사이에서 균형을 맞춰야 합니다."
 situation_synthetic_fertility_approach_tech_low: "추가 자금 지원"
 situation_synthetic_fertility_approach_tech_low_desc: "우리의 경제적 역량을 연구 시설에 일부 투입합니다."
 situation_synthetic_fertility_approach_tech_high: "연구 주력"
 situation_synthetic_fertility_approach_tech_high_desc: "생존을 위해서는 어려운 경제적 결정을 감수해야 합니다."
 situation_synthetic_fertility_approach_unity_low: "가상 설계"
 situation_synthetic_fertility_approach_unity_low_desc: "우리 중 최고의 디지털 인격이 합성 신체 개발에 더욱 힘쓸 수 있도록 에너지를 추가 지원합니다."
 situation_synthetic_fertility_approach_unity_high: "비상조치"
 situation_synthetic_fertility_approach_unity_high_desc: "주 에너지원을 디지털 인격에 투입해, 종족의 신체를 완전히 대체합니다."
 situation_synthetic_fertility_complete: "이 시점에서 우리의 실체는 사라지고, 인구 전체가 디지털화될 것입니다."
 stage_synthetic_fertility_problem_effects: "복잡한 양전자 뇌를 갖춘 최첨단 합성 신체를 개발해, 현실에서 실체적인 존재를 유지해야 합니다."
 stage_synthetic_fertility_danger_effects: "인구의 절반 이상이 사라진 지금, 합성체 연구에 경제적 자원을 더욱 많이 투입해야 합니다."
 stage_synthetic_fertility_crisis_effects: "소수의 인구만이 남은 지금, 너무 늦기 전에 충분한 수준의 복잡성을 갖춘 양전자 뇌를 개발하는 데 총력을 기울여야 합니다."
 situation_synthetic_fertility_synthesization_outcome: "우리의 미래가 보장될 때까지 결코 쉬지 않을 것입니다."
 situation_no_synthetics_adopt: "£trigger_no£ $tr_synthetics_adopt$을 채택해야 함"
 situation_no_robot_research: "£trigger_no£ §Y로봇 기술§!을 연구 중이어야 함"
 situation_synthetic_fertility_synthesization: "합성체 전환"
 situation_synthetic_fertility_synthesization_type: "합성체 전환"
 situation_synthetic_fertility_synthesization_monthly_change_tooltip: "디지털 주민을 위한 신체 제작이 시작되었습니다. 합성체로서의 미래가 기다립니다."
 situation_synthetic_fertility_synthesization_desc: "이제 우리는 주민의 합성체화를 달성하기 위한 기술적 지식을 갖추었습니다.\n\n\n§Y다음 달 합성체 신체를 받는 팝§!: §G[From.GetSynthFertPopsPerMonth]§!"
 stage_1_synthetic_fertility_synthesization_effects: "기존 로봇을 디지털화 주민들을 위한 합성 신체로 활용합니다."
 stage_2_synthetic_fertility_synthesization_effects: "나머지 디지털화 주민들을 위해 로봇 신체를 새로 제작합니다."
 situation_synthetic_fertility_synthesization_careful: "신중한 접근"
 situation_synthetic_fertility_synthesization_careful_desc: "$situation_synthetic_fertility_synthesization_careful$"
 situation_synthetic_fertility_synthesization_careful_tooltip: "업로드 속도: 매월 §Y100§! £pop£ §H팝§!"
 situation_synthetic_fertility_synthesization_full_speed: "최고 속도"
 situation_synthetic_fertility_synthesization_full_speed_desc: "$situation_synthetic_fertility_synthesization_full_speed$"
 situation_synthetic_fertility_synthesization_full_speed_tooltip: "업로드 속도: 매월 §Y200§! £pop£ §H팝§!"
