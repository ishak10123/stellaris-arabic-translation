 councilor_individual_machine_predictive_analysis: "방법론 선임 분석가"
 councilor_individual_machine_predictive_analysis_desc: "$councilor_individual_machine_predictive_analysis$는 연구 방법론 분석에 앞장서는 이들로, 우리 제국이 가장 유망한 분야를 연구할 수 있도록 조치합니다."
 civic_individual_machine_warbots: "$civic_machine_warbots$"
 civic_individual_machine_warbots_desc: "이 사회는 다양한 전쟁 전략에 맞춰 군사, 경제, 교육 부문을 지속적으로 정비하고 있습니다. 각 기계는 제국의 전체적 국력 증강에 기여하며, 제국이 분쟁 상황에 적응하고 성과를 거둘 수 있도록 합니다."
 councilor_individual_machine_warbots: "전투 군수관"
 councilor_individual_machine_warbots_desc: "$councilor_individual_machine_warbots$은 다양한 공급망을 계획하고 관리해, 우리 제국이 어디에서 전투 작전을 펼치든 원활한 보급이 이루어지도록 조치합니다."
 civic_individual_machine_replication: "$civic_machine_replication$"
 civic_individual_machine_replication_desc: "이 사회는 자기 조립 수단을 확립했습니다. 기계가 기계를 만들게 함으로써, 끊임없는 연쇄를 통해 행성의 한계를 확장합니다."
 councilor_individual_machine_replication: "복제 조율 담당관"
 councilor_individual_machine_replication_desc: "$TITLE$(은)는 모든 조립 작업이 규제에 따라 안전하게 이루어지도록 조치합니다."
