 paperclip_failure: "생산 목표 달성 실패"
 paperclip_failure_desc: "생산 목표를 달성하지 못해, 모든 드론이 영향을 받고 있습니다."
 ###Auto-Modding Traits
 automodding_trait_tooltip_all: "['concept_automodding_traits', $concept_automodding_traits$]은 £pop£ 팝이 현재 지닌 직업에 맞춰 자동으로 조정됩니다."
 automodding_trait_biological_tooltip: "$automodding_trait_tooltip_all$\n\n§Y$trait_auto_mod_biological$§!는 ['concept_automodding_biological']에서 보정치를 선택합니다."
 automodding_trait_robotic_tooltip: "$automodding_trait_tooltip_all$\n\n§Y$trait_auto_mod_robotic$§!은 ['concept_automodding_robotic']에서 보정치를 선택합니다."
 automodding_trait_overtuned_tooltip: "$automodding_trait_tooltip_all$\n\n§Y$trait_auto_mod_overtuned$§!은 ['concept_automodding_overtuned']에서 보정치를 선택합니다."
 automodding_trait_cyborg_tooltip: "$automodding_trait_tooltip_all$\n\n§Y$trait_auto_mod_cyborg$§!는 ['concept_automodding_cyborg']에서 보정치를 선택합니다."
 trait_auto_mod_biological: "직업 유전체"
 trait_auto_mod_biological_desc: "직업적 필요에 재빨리 적응하는 후생적 변이 촉발 인자를 갖춘 최첨단 유전자 줄기입니다. 유전자 표현형을 주인의 작업 환경에 맞춰 동적으로 최적화합니다."
 trait_auto_mod_cyborg: "범용 증강 장치"
 trait_auto_mod_cyborg_desc: "범용 플러그 앤 플레이 연결 포트가 현재 수행 중인 작업이 필요로 하는 능력에 맞춰 증강물을 교체할 수 있게 해 줍니다."
 trait_auto_mod_robotic: "적응형 골격"
 trait_auto_mod_robotic_desc: "이 시스템은 하드웨어를 운영 요구 사항에 맞춰 동적으로 재구성해, 지정된 모든 작업의 수행 능력을 최적화합니다."
 trait_auto_mod_overtuned: "찰나의 우월함"
 trait_auto_mod_overtuned_desc: "진보된 후생적 변이 촉발 인자를 통해 일터에서의 신체 및 인지적 수행 능력을 증진하지만, 예상 수명은 급격히 줄어듭니다. 누가 뭐래도 천천히 시드는 것보다 화려하게 불타 없어지는 게 더 즐거운 법입니다."
 concept_automodding_trait: "자동 개조 특성"
 concept_automodding_traits: "자동 개조 특성"
 concept_automodding_trait_desc: "- 현재 종사 중인 직업에 맞춰, 보정치가 미리 정해진 특성 목록에 있는 항목과 자동으로 합쳐집니다.\n- 특성의 효과는 해당 특성을 지닌 팝 그룹의 비율에 비례합니다.\n- 식민지마다 매월 확인하는 §Y$concept_automodding_traits$§!을 지닌 £pop£ §H팝§!: §G100§!\n- 팝 성장 및 조립 £building£ 건물에 따라 매월 업데이트되는 £pop£ §H자동 개조 팝§!의 수가 증가"
 concept_automodding_biological: "생체 자동 개조 특성 목록"
 concept_automodding_biological_desc: "- ['trait:trait_traditional']\n- ['trait:trait_thrifty']\n- ['trait:trait_intelligent']\n- ['trait:trait_industrious']\n- ['trait:trait_agrarian']\n- ['trait:trait_ingenious']\n- ['trait:trait_charismatic']"
 concept_vocational_traits: "직업 특성"
 concept_vocational_traits_desc: "$concept_vocational_traits$은 ['trait:trait_auto_mod_biological'] 특성에 의해 자동 개조될 수 있는 종족 특성입니다.$NEW_LINE$$concept_automodding_biological_desc$"
 concept_fleeting_excellence_traits: "$trait_auto_mod_overtuned$ 특성"
 concept_fleeting_excellence_traits_desc: "$concept_fleeting_excellence_traits$은 ['trait:trait_auto_mod_overtuned'] 특성에 의해 자동 개조될 수 있는 종족 특성입니다.$NEW_LINE$$concept_automodding_overtuned_desc$"
 concept_automodding_overtuned: "과도한 개조 자동 개조 특성 목록"
 concept_automodding_overtuned_desc: "- ['trait:trait_expressed_tradition']\n- ['trait:trait_commercial_genius']\n- ['trait:trait_artificial_intelligence']\n- ['trait:trait_crack_miner']\n- ['trait:trait_farm_hands']\n- ['trait:trait_technical_skill']\n- ['trait:trait_crafted_smiles']"
 concept_adaptive_frames_traits: "$trait_auto_mod_robotic$ 특성"
 concept_adaptive_frames_traits_desc: "$concept_adaptive_frames_traits$은 ['trait:trait_auto_mod_robotic'] 특성에 의해 자동 개조될 수 있는 종족 특성입니다.$NEW_LINE$$concept_automodding_robotic_desc$"
 concept_automodding_robotic: "기계 자동 개조 특성 목록"
 concept_automodding_robotic_desc: "- ['trait:trait_robot_propaganda_machines']\n- ['trait:trait_robot_trading_algorithms']\n- ['trait:trait_robot_logic_engines']\n- ['trait:trait_robot_power_drills']\n- ['trait:trait_robot_harvesters']\n- ['trait:trait_robot_superconductive']\n- ['trait:trait_robot_emotion_emulators']"
