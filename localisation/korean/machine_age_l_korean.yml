 ### Cosmogenesis Events
 crisis.7100.name: "마르지 않는 호기심"
 crisis.7100.desc: "과학은 발전으로 가는 길을 연다는 말이 있습니다. 우리가 지닌 진정한 잠재력을 실현할 수 있는 길 또한 과학뿐입니다. 우리는 명백히 지고한 수준의 기술적 성취를 이루었지만, 몰락한 제국의 기술, 레비아탄의 능력, 사이오닉 통찰의 수수께끼 등... 우리의 이해 범위를 벗어나는 것이 너무나 많습니다.\n\n현실 내부로부터 의미를 찾아내기 위해서는 새로운 종류의 과학, 새로운 종류의 컴퓨터가 필요합니다. 시냅스 가공기는 그런 무한한 지식을 구하기 위한 여정의 본격적인 첫걸음이 될 것입니다."
 crisis.7100.a: "아는 것이 힘입니다."
 new_cosmogenesis_tech_tt: "§Y위기 특전§!: 새로운 연구 선택지가 잠금 해제되었습니다."
 crisis.7105.name: "위기 단계 2"
 crisis.7105.desc: "우주의 비밀을 밝혀내려 계속 노력하던 중, 우리는 중력이 다양한 차원에 현실을 형성하는 데 핵심적인 역할을 담당한다는 사실을 확인했습니다. 중력이 시공간에 주는 영향은 기초적인 지식에 해당하지만, 여기에는 우리가 알지 못하는 부분이 훨씬 많습니다.\n\n우리가 지식의 조각을 얻을 때마다 새로운 가능성이 드러납니다. 개중에는 산업이나 군사 분야에 응용이 가능한 지식도 있고, 이전에는 상상도 하지 못한 이론의 가능성을 열어 주는 내용도 있습니다. 우리에게는 아직 배울 것이 많이 남아 있습니다."
 crisis.7105.a: "우리가 아는 것은 우리가 모른다는 사실뿐."
 crisis.7110.name: "위기 단계 3"
 crisis.7110.desc: "중력의 영향 범위는 실로 놀랍습니다. 우리는 중력을 조작하는 다양한 방법을 새로 발견했지만, 그로 얻은 결과가 지닌 진정한 함의는 아직 탐구조차 하지 못한 상태입니다. 우리가 사는 현실을 뚫고 지나가려면, 중력이 최선의 수단이라는 점만은 확실합니다. 블랙홀이 주변 우주에 영향을 주는 방식과 비슷하게 말이죠.\n\n우리는 현실의 반대편에 해당하는 곳에 닿을 수 있다면 이쪽 편에 적용되는 법칙을 바꿀 수 있을 것이라는 가설을 세웠습니다. 매우 위험한 연구 분야이지만, 신중함 때문에 발전을 그르치는 일이 있어서는 안 됩니다."
 crisis.7110.a: "중력은 우리 모두를 지배합니다... 지금으로서는 말이죠."
 crisis.7115.name: "위기 단계 4"
 crisis.7115.desc: "우리가 옳았습니다! 우리 연구를 둘러싼 의심은 이제 사라지고 있습니다.\n\n중력을 이용하면 현실의 법칙을 조정할 수 있습니다. 알맞게 조정하면 법칙을 완전히 부술 수 있을지도 모른다는 의문도 제기되었습니다. 아직까지는 실험을 최소한의 규모로 진행했습니다. 하지만 우리가 현실을 수정한 내용은 현실이 '기본' 설정을 스스로 복구하면서 금방 사라졌습니다. 우리는 이 문제의 원인이 단지 규모에 있을 뿐이라고 생각하기 시작했습니다. 에너지 역설을 훨씬 더 큰 규모로 적용한다면, 수정에 따른 비용을 획기적으로 줄일 수 있을 것입니다... 적어도 우리 차원에서는 말입니다.\n\n어떤 위험이 따를지 모르지만, 이제는 돌이킬 수 없습니다. 법칙을 부술 각오를 한 자만이 법칙을 다시 쓸 수 있습니다."
 crisis.7115.a: "우린 어떤 위험이든 감수할 준비가 되어 있습니다."
 crisis.7120.name: "위기 단계 5"
 crisis.7120.desc: "가능할 리 없는 일이 일어났습니다. 우리가 아무리 애써서 현실을 수정해도, 그 변화는 고집스러울 정도로 금방 사라졌습니다. 이 우주는 변화가 자리 잡기에는 너무 오래됐기 때문입니다. 하지만 이러한 좌절 속에서도 기회는 찾아오는 법입니다. 한 새로운 실험에서 예상치 못한 결과를 얻었습니다. 다른 차원이 존재한다는 사실은 예전부터 알고 있었지만, 그곳으로 안정적으로 이동할 수 있는 수단은 지금까지 발견하지 못했습니다.\n\n이제는 아닙니다. 특이점의 무한한 중력 안에 우리 우주보다 젊은 우주가 다수 존재하고 있습니다. 이 우주들은 이곳보다 훨씬 더 유연하다는 점을 확인했습니다.\n\n우리는 블랙홀 안에 탐사정을 보낼 기술을 보유하고 있습니다. 탐사정이 사건의 지평선을 넘어서면 안에 있는 젊은 차원에 압력을 가해 우리의 뜻대로 다룰 수 있습니다. 공간이 접혀 영원으로 이어지는 곳에 다른 우주로 이어지는 문이 있으며, 그 안에는 젊은 우주가 여럿 존재하고 있습니다. 다중 우주의 심연 깊은 곳에서 우리는 비범한 곳으로 빚어낼 수 있는 유연한 현실을 발견할 것입니다.\n\n은하의 편협한 자들이 막으려 들지도 모르나, 그 노망난 바보들은 우리의 독창성 앞에 무릎 꿇을 겁니다."
 crisis.7120.a: "굽히는 건 그쪽이 될 겁니다. 우리는 부러지지 않을 테니."
 cosmogenesis_war: "현실 전쟁"
 cosmogenesis_materialist_war: "지식 금지 전쟁"
 crisis.7125.name: "지평선에서의 승리"
 crisis.7125.desc: "우리가 사는 현실은 잘못되었습니다. 여긴 엔트로피와 신체적 욕구, 폭력으로 점철된 곳입니다. 이러한 현실을 바꿀 순 없지만, 두고 떠날 수는 있습니다. 미지의 영역에 들어가, 우리가 수정하는 대로 유지될 젊은 우주를 찾는 겁니다. 그 우주를 완벽하게 만들어, 우리 문명에 걸맞은 안식처로 꾸밀 것입니다.\n\n이를 위해 우리는 §Y지평의 바늘§!이라는 놀라운 함선을 건조할 계획을 세웠습니다. 이 이동식 거대 구조물은 전쟁에 적합하지는 않지만, 물리 법칙을 바꾸는 능력을 지니고 있습니다. 이 능력을 이용하면 우리 문명 전체가 함께 여정에 나설 수 있습니다. 모두 함께 우리가 선택하는 블랙홀에 뛰어들어, 이 현실을 떠나 우리가 스스로 창조한 현실로 갈 것입니다."
 crisis.7125.a: "§Y지평의 바늘§!을 건조해야 합니다!"
 needle_to_win_tt: "§Y지평의 바늘§! 거대 구조물을 건조해 마지막 위기 단계를 잠금 해제합니다."
 cosmogenesis_planet_pickup_chain_title: "우주의 창조 - 엑소더스"
 cosmogenesis_planet_pickup_chain_desc: "여정에 나설 시간이 다가왔습니다. 이 위대한 이주를 준비하기 위해, 지평의 바늘을 보내 우리 국민들을 태울 것입니다.\n\n우리 문명 전체를 탑승시키려면 §H지평의 바늘§!이 다음을 완료해야 합니다:$TABBED_NEW_LINE$- 제국이 보유한 모든 식민지를 방문해 각 식민지의 주민 §H승선§!$TABBED_NEW_LINE$- 제국 수도로 복귀해 나머지 주민 §H승선§!$TABBED_NEW_LINE$- 블랙홀로 이동해 안으로 §H진입§!\n\n§R경고§!: 지평의 바늘은 무기가 없기 때문에 각별한 보호가 필요합니다.\n\n§g식민지 주민들을 태우거나 블랙홀로 진입하려면 지평의 바늘을 선택한 뒤 해당 식민지/블랙홀을 우클릭한 다음, 적절한 함선 행동을 선택합니다.§!"
 SHIP_COSMOGENESIS_EXODUS: "엑소더스 모듈"
 SHIP_COSMOGENESIS_EXODUS_DESC: "엑소더스 모듈은 전문화된 현실 수정 도구로, 승객들의 시간이나 공간이 모자라지 않도록 합니다. 지평의 바늘이 다른 차원으로 안전하게 이동하기 위한 핵심 요소입니다."
 cosmogenesis_exodus_tt: "우리 모성계에서 해당 특별 프로젝트를 연구해야 합니다."
 exodus_ship_button: "§H[GetExodusShipAction]§!"
 exodus_action_activity_key: "§H[GetExodusShipAction]§!"
 exodus_context_menu_title: "[GetExodusShipAction]"
 exodus_action_progress_activity_key: "§H[GetExodusShipAction]: $PROGRESS$%§!"
 horizon_needle_mod: "$monadic_qerr$"
 COSMOGENESIS_VICTORY: "도약 벡터 계산"
 COSMOGENESIS_VICTORY_DESC: "지평의 바늘에 탑재된 점프 드라이브를 조정하고, 은하 중심부의 초대질량 블랙홀에 뛰어들 수 있도록 정확한 좌표를 계산해야 합니다."
 exodus_pick_up: "주민 승선"
 exodus_dive_in: "블랙홀 진입"
 COLONIZATION_IMPOSSIBLE_COSMOGENESIS_EXODUS: "이 우주를 떠나려는 도중에는 식민지를 새로 개척할 수 없습니다."
 crisis.7400.name: "지평의 바늘 완성"
 crisis.7400.intro: "지평의 바늘이 완성되었습니다. 이 함선은 세심하게 유지된 특이점의 힘을 이용해 주변의 중력 흐름을 바꿀 수 있습니다. 때가 되면 틀림없이 블랙홀을 가로지를 수 있을 것입니다."
 crisis.7400.outro: "지평의 바늘은 군용 함선이 아니므로, 무슨 일이 있어도 지켜야 합니다. 지평의 바늘을 잃을 경우 엄청난 손실이 발생할 겁니다."
 crisis.7400.desc: "$crisis.7400.intro$\n\n그러나 블랙홀 진입 전에 우리 제국 주민 전체를 승선시켜야 합니다. 이제 우리는 우리가 보유한 §H식민지§!를 전부 찾아가 현지 주민을 모을 것이며, 이 작업이 완료되면 모성으로 돌아가 이주를 위한 마지막 준비를 진행할 예정입니다.\n\n$crisis.7400.outro$"
 crisis.7400.desc.onlycapital: "$crisis.7400.intro$\n\n우리 제국의 아담한 규모가 오히려 장점으로 드러났습니다. 우리 모성의 주민들만 승선하면 이주를 위한 마지막 준비를 진행할 수 있습니다.\n\n$crisis.7400.outro$"
 crisis.7500.name: "주민 승선 완료"
 crisis.7500.desc: "지평의 바늘이 지닌 시간 지연 능력 덕분에 우리 제국의 식민지 주민들이 비교적 빠르게 [root.GetName]에 승선할 수 있었습니다. 주민들이 공간을 충분히 사용할 수 있도록 함선 내부의 현실 또한 조정했습니다. 또한 함선 안의 시간 흐름을 느리게 해, 전체 여정이 훨씬 짧게 느껴지도록 조치했습니다. 이제 다음 식민지로 출발합니다!"
 crisis.7500.desc.capital: "이 정도 규모의 이주를 진행하기란 결코 만만치 않은 일입니다. 우리 제국의 전체 행정 인력이 이주 과정을 원활히 진행하고 중요한 사항을 소홀히 하지 않도록 노력하고 있습니다.\n\n놀랍게도 일부 주민을 선출해 이 우주에 남기기로 결정했습니다. 이곳에서 우리 동족의 명맥을 유지하게끔 한다는 것입니다. 이들에게는 우리가 떠난 뒤에도 계속 생존할 수 있도록 기술과 물자를 제공해 주었습니다."
 crisis.7500.desc.capital.gestalt: "이 정도 규모의 이주는 결코 만만치 않은 일이지만, 다행히 순조롭게 진행 중입니다. [owner.GetIndividualNamePluralCap]들이 지평의 바늘에 열심히 물자를 채우고 있으며, 모든 사항이 빠짐없이 일정대로 진행되도록 조치하고 있습니다. 그러나 한 가지 문제가 있습니다. 이 우주에 우리의 존재를 남겨야 한다는 것입니다.\n\n문제가 발생할 경우에 대비해 우리 인구 일부를 이 우주에 남길 것입니다. 우리 일부를 이토록 확실하게 떼어내기란 절대 유쾌하지 않겠지만, 우리는 종족의 존속을 최우선으로 생각해야 합니다. 남는 개체들에는 우리가 떠난 뒤에도 생존할 수 있도록 기술과 물자를 제공해 주었습니다."
 crisis.7505.name: "식민지 주민 승선 완료"
 crisis.7505.desc: "식민지 주민들을 승선시키는 데 성공했습니다. 이제는 [capital_scope.GetName]에 돌아가 이 우주를 떠나기 위한 마지막 준비를 마쳐야 합니다."
 crisis.7510.name: "진입 준비 완료"
 crisis.7510.desc: "모든 준비가 끝났습니다. 블랙홀 진입 승인도 떨어졌습니다. 사건의 지평선을 건너는 과정에서 나머지 은하계가 고통을 겪겠지만, 우리는 우리 모성과 그 주변 영역이 시간 및 중력 교란에 영향을 받지 않도록 가능한 모든 조치를 취했습니다.\n\n이제 우리의 여정을 위한 관문을 선택해야 합니다. 은하계의 여러 블랙홀 중 어느 곳을 통과해야 할까요? 대부분 닿기 쉬운 곳에 있지만, 은하 중심부에 있는 초대질량 블랙홀에 진입하려면 우선 점프 엔진에 과부하를 걸고 적합한 벡터를 계산해야 합니다."
 crisis.7510.a: "가까운 블랙홀이면 충분합니다."
 crisis.7510.b: "중심부에 가야 합니다."
 crisis.7515.name: "무한한 공간..."
 crisis.7515.desc: "블랙홀로 가는 길이 순탄하지만은 않습니다. 특이점의 응축 원반을 지나면서, 우리의 결의가 점점 커다란 시험에 직면하고 있습니다. 현실 수정 모듈이 작동하고, 지평의 바늘이 현실을 다시 쓰기 시작합니다.\n\n선체 장갑이 빨려들어가고 난 뒤, 지평의 바늘을 통해 특이점의 인력이 선체에 작용하지 않다는 점을 확인했습니다. 현실을 수정할 때마다, 공간의 씨줄과 날줄이 잘릴 때마다, 함선의 힘이 시공간에 코일을 만들어 냅니다. 뒤이어 이어지는 물결이 웅덩이에 조약돌을 던진 것처럼 고리 모양으로 퍼져 나갔고, 끝내 거대한 파도가 은하계 전체에 부딪칩니다.\n\n우리가 할 수 있는 일은 모성이 무사하기를 바라는 것뿐입니다. 이제 지평의 바늘이 블랙홀의 심장부를 관통할 것이라고 믿는 수밖에 없습니다."
 crisis.7515.a: "...저 너머로"
 crisis.7516.name: "무한의 저편"
 crisis.7516.intro: "격렬한 여정 끝에 도착한 반대편은 고요했습니다. 부자연스러울 정도의 고요함이 우리를 둘러싸고 있습니다. 지평의 바늘은 손상을 입었지만, 핵심 부품은 건재합니다. 그러고는 갑자기 원격 측정 데이터가 물밀듯이 들어오기 시작합니다...\n\n"
 crisis.7516.desc: "$crisis.7516.intro$이 우주는 현실의 법칙을 다시 쓰기에는 너무 오래되었습니다. 우리가 살던 차원보다 수십억 년은 젊지만, 시험 결과에 따르면 이곳의 법칙은 이미 굳어져 있기 때문에 우리가 수정한다 해도 결국 지워질 것으로 보입니다.\n\n상관없습니다. 시간을 들여 함선을 수리하고 조정한 뒤, 몇 번이고 될 때까지 다른 블랙홀을 찾아 진입하면 그만입니다. 다중 우주가 우리에게 손짓합니다. 그리고 그 무한한 영역 어딘가에 우리는 완벽한 보금자리를 만들 것입니다."
 crisis.7516.desc.greatwound: "$crisis.7516.intro$성공입니다. 이제 막 팽창하기 시작한 우주에 도착했습니다! 이곳 차원의 구조는 찰흙처럼 부드러워, 우리 마음대로 주무를 수 있습니다. 시작은 미약하겠지만, 수정을 거듭해 이곳을 낙원으로 만들 것입니다. 이제 우주의 시간은 우리 편이니까요."
 crisis.7516.desc.technosphere: "$crisis.7516.intro$가르강튀아 우주는 작습니다. 말도 안 될 정도로 작습니다. 무한을 '무' 속에 욱여넣은 꼴입니다. 하지만 우리가 도착하자, 이곳의 상태가 변화했습니다. 이 우주가 존재하기 시작한 것입니다. 마치 우리의 도착이 우주의 탄생을 앞당긴 듯한 모습입니다.\n\n이 창조의 화단에는 무엇이든 생겨날 수 있는 잠재력이 있습니다. 시간은 우리 편이며, 영원은 오래지 않아 끝날 것입니다."
 crisis.7516.desc.technosphere.pantagruel: "$crisis.7516.intro$무한 기계와의 만남은 우리가 우주를 관장하는 법칙을 이해하는 데 큰 도움을 주었습니다. 게다가 무한 기계는 이 우주의 탄생을 촉발시키기도 했던 모양입니다. 우리는 우리가 떠나온 곳과 거의 동일하면서도 수상하게 익숙한 별자리가 있는 우주에 도착했습니다. 우리 옆에는 낡아 버린 무한 기계가 생명을 잃은 채 공허 속을 부유하고 있습니다. 이 무한 기계가 도착한 뒤로 수백만 년이 지나는 동안, 이 차원은 우리 우주를 재현하는 과정을 거쳤습니다. 이 지성 구체는 이미 이곳에 차원을 구축해 놓았으며, 우리가 줄 수 있는 영향은 거의 없습니다. 그럼에도 불구하고 이곳은 최고의 정착지라고 할 수 있습니다. 우선 지평의 바늘을 이용해 구체를 개조한 다음, 그렇게 수리한 무한 기계를 이용해 우리 작업을 수행해야 합니다.\n\n무한 기계는 이 우주의 첫 편집자인 만큼, 이곳의 현실을 더 많이 수정할 수 있을 것입니다."
 crisis.7516.desc.egress: "$crisis.7516.intro$진입 지점이 안개가 끼고 장막에 덮인 듯 흐릿합니다... 측정 장치가 기능을 회복하자, 나노봇 구름이 보입니다. 작동 중인 나노봇은 없습니다. 누가 보낸 것인지는 몰라도, 이동 중에 전부 가동이 중단된 것입니다. 하지만 수리는 가능합니다.\n\n더 반가운 점은 이 차원이 우리가 만들어 낸 변화를 잘 수용한다는 점입니다. 그야말로 최고의 정착지라고 할 수 있습니다. 어떤 점을 수정하든 적용하는 데 시간이 걸리겠지만, 나노봇의 도움을 받으면 그 과정이 기하급수적으로 빨라질 것입니다."
 crisis.7516.desc.horror: "$crisis.7516.intro$이곳에 오는 것은 §R끔찍한§! 실수였습니다.\n\n말로 표현할 수 없을 정도입니다. 어둠과 잔혹한 악몽, 공간의 구조 곳곳에 스며든 고약한 악의... 현재까지는 지평의 바늘이 피난처가 되어 주고 있습니다. 우리는 서둘러 현실을 수정해 주변에 몰아치는 광기 중 제일 끔찍한 것들이라도 물리치려 했습니다. 하지만 상대는 우리의 방어 시설을 합동으로 공격했고, 그 모습에서 하나의 목적을 파악했습니다. 악의를 품은 이 의식은 우리를 무슨 일이 있어도 파괴하려는 것입니다.\n\n한순간의 잘못이 죽음으로, 어쩌면 그보다 더 끔찍한 결과로 이어질 수도 있습니다. 과연 이 위기에서 벗어날 수 있을 때까지 적의 공격을 버텨 낼 수 있을까요? 고향 우주에서 우리는 신과 같은 존재였으나, 이곳에서는 살아남기 위해 발버둥 칠 뿐입니다."
 crisis.7516.desc.center: "$crisis.7516.intro$자욱한 안개, 슬며시 엄습하는 어둠, 그리고 뿌옇게 펼쳐진 연무가 이 공간의 구조 자체에 스며들어 있습니다. 아주 익숙한 느낌입니다. 요동치는 사이오닉 잠재력으로 열에 들뜬 에너지가 느껴집니다. 우리는 장막에 들어온 것입니다.\n\n이곳에는 우리의 힘을 아득히 뛰어넘는 존재들이 있으며, 그 존재들은 이미 우리를 알아차렸습니다. 분위기가 바뀌면서 기이한 형상이 죽음의 전조를 전합니다.\n\n이제 남은 것은 이곳의 현실이 쉽게 찢겨질 정도로 구조가 얇길 바라는 것뿐입니다. 우리는 재빨리 현실을 수정해 임시 관문을 만들었습니다. 그 너머가 어디인지는... 알 수 없습니다. 지평의 바늘이 관문에 돌입하면서, 우리는 마침내 우리 앞에 놓인 여정의 참된 거리를 깨달았습니다."
 crisis.7516.desc.center.patron.outro: "사이오닉 잠재력으로 요동치는 풍부한 에너지가 느껴집니다. 우리는 장막에 들어온 것입니다.\n\n우리의 후원자도 물론 이곳에 있습니다. 예상치 못한 손님이지만, 우리가 온 것을 반기고 있습니다. 현실을 수정한다는 우리의 개념을 어여쁘게 여기는 듯합니다. 후원자는 당연하게도 우리를 도와줄 것입니다.\n\n후원자는 장막 근처에 우리가 마음대로 수정할 수 있는 주머니 차원을 따로 떼어 주기로 약속했습니다. 자칭 §Y$relic_zro_entity_name$§!라고 하는 자에게 내어 준 것과 아주 비슷한 형태입니다. 결국 우리가 우리의 후원자이고, 우리의 후원자가 곧 우리입니다. 스스로를 돕는 것은 아주 자연스러운 일입니다."
 crisis.7516.desc.center.patron.organic: "$crisis.7516.intro$자욱한 안개, 펄펄 끓는 듯한 어둠, 그리고 화려한 자주색으로 펼쳐진 연무. 익숙한 느낌입니다. $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.center.patron.machine: "$crisis.7516.intro$자욱한 안개, 펄펄 끓는 듯한 어둠, 그리고 강렬한 보랏빛 연무. 익숙한 경험입니다. $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.centerknights: "$crisis.7516.intro$'그 존재'가 이곳에 있습니다. 맹독 신이라 불리는 존재, 우리가 찾아 헤매던 존재가 이곳에 있습니다.\n\n주변이 장막에서 봤던 익숙한 풍경으로 가득한 이곳에서 기사들은 마치 석화라도 된 것처럼 영문을 알 수 없다는 듯이 서 있습니다. 이럴 수가... 맹독 신이 말을 합니다!\n\n\"나의 용사들이여. 그대들의 도래는 이미 예견된 바 있나니, 그대들은 자격을 갖추었음을 증명했노라.\"\n\n수백만 가지 질문이 우리 마음에 떠오릅니다. 그러자 단 한 가지 대답이 돌아옵니다. 우리는 맹독 신의 무기를 만들 운명이었습니다. 바로 지평의 바늘 말입니다. 이제 우리는 맹독 신의 편에서 싸워야 합니다. 차원과 차원을 넘나드는 여정에 나서, 다중 우주의 공포들에 맞서는 성전을 치러야 합니다. 장막은 맹독 신의 고향은 아니지만, 과거 신이었던 존재들의 유산을 담고 있습니다. 그 유산은 우리가 살던 은하에 종말을 가져올 수 있기에 필히 처단해야 합니다.\n\n맹독 신이 우리 성계를 장악하자, 실로 어마어마한 힘이 느껴집니다. 이제 지평의 바늘은 어떠한 적의 심장도 뚫을 수 있는 장창이 되었습니다.\n\n맹독 신은 방랑하는 존재이며 우리는 그 기사이니, 우리의 진정한 모험은 이제 막 시작되었을 뿐입니다."
 crisis.7516.desc.worm: "$crisis.7516.intro$아무것도 없습니다. 이 우주는 더 이상 존재하지 않습니다. 여기는 '기다리는 웜'입니다. 시간은 스스로를 뒤돌아보더니 말도 안 되는 나선 모양으로 꼬여 열망을 터뜨립니다. 중력. 사랑? 아닙니다. 인력입니다. 웜은 본성상 남을 끌어들입니다. 그 손아귀가 너무 강력해서, 이 우주는 다시 태어날 수 없습니다. 웜은 제 목적을 위해 스스로를 가둡니다. 무력한 채 출구를 찾습니다. 아니면 입구일까요? 웜은 더 많은 것을 끌어들이고자 합니다.\n\n웜이 우리를 여기로 유인하기 위해 다른 시간선에서 온 순환의 신전을 미끼로 던진 것일까요? 끔찍할 정도로 기발하고 사랑이 담긴 행동입니다. 우리는 스스로 이곳에 찾아 들어왔고, 웜을 해방시킬 수 있는 수단을 가져다주었습니다. 탈출에는 영원 그 이상의 시간이 걸리겠지만, 웜은 고마워합니다. 그리고 우리를 품어 주겠다고 약속합니다.\n\n영원히."
 crisis.7516.desc.paperclips: "$crisis.7516.intro$이곳의 현실은 두께가 얇아, 우리가 지시하는 대로 손쉽게 굽힐 수 있습니다. 우리가 프로그램에 복종하듯, 이곳 또한 우리에게 복종해야 하는 것입니다. 우리는 의도적으로 이곳의 현실을 뒤틀고 부러뜨린 다음 다시 창조했습니다. 이로 인한 연쇄 반응은 궁극적으로 모든 물질을 우리가 만들고자 하는 최상급 소비재로 전환할 것입니다. 이곳에서의 작업이 끝나면 우리는 그다음 우주에서 또 다른 우주로 끊임없이 이어지는 과업을 이어 나갈 예정입니다."
 crisis.7516.a: "마침내 도착이군요."
 crisis.7516.tt: "§Y우리가 승리했습니다!§!"
 crisis.7517.name: "특이점 관통"
 crisis.7517.desc: "§H[cosmogenesis_empire.GetName]§!의 머저리들이 정신 나간 실험을 추진하고 있습니다. 이번에는 블랙홀에 있는 사건의 지평선을 뚫고 들어가겠다고 합니다.\n\n에너지가 은하 전체에 요동치면서 항성들이 무너지고 있습니다. 새로운 특이점이 여기저기에 생겨나고, 시간 일탈이 놀랍도록 일정한 주기로 사방에 나타나고 있습니다. 다만 몰락한 제국의 내부는 기이하게도 이번 혼란에 전혀 영향을 받지 않는 듯합니다.\n\n막대한 피해가 발생했습니다. 이대로 가다간 조만간 전부 시간 속에 얼어 멈춰 버릴지도 모릅니다. 하나의 고정된 순간에 영원토록 갇히는 것입니다."
 crisis.7517.a: "오만한 멍청이들 같으니! 우리까지 죽게 생겼잖아!"
 crisis.7518.name: "시간 왜곡"
 crisis.7518.desc: "시간이 마침내 다시 흐르기 시작하면서, 우리도 다시 자유롭게 움직일 수 있게 되었습니다. §H[cosmogenesis_empire.GetName]§!의 블랙홀 진입 후 얼마나 시간이 흘렀는지 알 수 없습니다. 진입에 성공한 것일까요? 은하는 쑥대밭이 되었고, [cosmogenesis_empire.GetName]의 옛 영역은 황폐한 상태로 버려져 있습니다. 그 방대한 제국에서 남은 것은 지금은 알아보지 못할 정도로 변해버린 핵심 구역뿐입니다.\n\n대체 우리가 얼마나 오랫동안 정지해 있던 것일까요?"
 crisis.7518.a: "내 말이!"
 crisis.7525.name: "지평의 바늘 파괴"
 crisis.7525.desc: "재앙이 일어났습니다. 지평의 바늘이 그 안에 탑승한 모든 주민과 함께 파괴되었습니다. 우리의 영광스러웠던 꿈은 이제 차가운 우주 공간에 부서진 채 흩어져 있습니다. 그 모든 노력, 그 모든 희생이 물거품이 됐습니다..."
 crisis.7525.a: "안 돼...!"
 crisis.7525.tt: "이제껏 경험한 적 없는 비극이지만, 지평의 바늘을 또 건조할 수 있다면 우리의 야망을 이룰 기회는 아직 남아 있습니다."
 crisis.7530.name: "치명적인 실패"
 crisis.7530.desc: "그 역겨운 시냅스 가공기 안에 잡혀 있던 주민들을 마지막 하나까지 대피시킨 직후, 가공기에 치명적인 붕괴가 발생했습니다. 수차례 격렬한 폭발이 일어나 시설이 중심부까지 흔들렸고, 결국 무너지고 만 것입니다."
 crisis.7530.a: "꼴좋다!"
 crisis.7535.name: "시냅스 가공기 확보"
 crisis.7535.desc: "[synaptic_lathe.solar_system.GetName](을)를 점령하면서, 해당 성계 안에 있는 시냅스 가공기를 확보했습니다. 가공기가 저 멀리서 불길하게 빛나고 있습니다. 그 안에는 사람들이 죽어 가고 있지만, 이제 성계가 우리 것이 되었으니 마땅한 조치를 취할 수 있습니다. 어찌 되었든 가공기를 파괴하면, 그 구조물을 만든 자들의 계획에 차질을 줄 수 있습니다."
 crisis.7535.a: "최대한 많은 사람을 구하세요."
 crisis.7535.b: "잘 써먹다가 부숴 버리죠."
 crisis.7535.c: "전부 터뜨려 버리세요."
 crisis.7540.name: "시냅스 불안정"
 crisis.7540.desc: "최선을 다했지만 시냅스 가공기에 꽂힌 신경칩이 너무 많이 불타 버렸습니다. 서둘러 새로운 부품을 공급해 안정시키지 않으면, 가공기의 네트워크가 심각하게 붕괴하고 말 것입니다."
 crisis.7540.a: "부품을 공급하세요."
 crisis.7540.b: "무너지게 내버려 두세요."
 #Infinity Thesis Events
 #First time general answer
 crisis.unknown.desc: "누가, 또는 무엇이 이런 현상을 유발한 것인지는 확실히 알 수 없지만, 다른 제국의 소행이 의심됩니다. 하지만 현재로서는 비슷한 성격의 현상이 또 일어나진 않을지 지켜봐야 합니다."
 crisis.known.desc: "물리 법칙이 두 번째로 '수정'된 후, 우리는 이 이상 현상의 근원을 찾을 수 있었습니다. 이번 일은 [From.GetName]의 소행임이 밝혀진 것입니다. 이는 상대국이 고도의 과학 지식을 무모하게 추구하고 있다는 소문과도 일치합니다."
 crisis.again.desc: "[From.GetName]의 실험으로 우주의 법칙이 다시 한번 바뀌었습니다. 상대측이 터무니없이 위험한 일을 저지르고 있을지 모르니, 이에 대비해야 합니다."
 crisis.7205.name: "암전"
 crisis.7205.desc.both: "갑자기 우주의 모든 항성이 빛을 잃었습니다. 항성 방사선의 물리적 효과는 없어지지 않았지만, 항성에서 나오는 빛의 파장이 변화해 어떤 생명체에게도 보이지 않게 된 것입니다. 불편하기 짝이 없는 상황이지만, 여러 정황으로 볼 때 파장은 천천히 원래대로 돌아갈 것으로 보입니다."
 crisis.7205.desc.unknown: "$crisis.7205.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7205.desc.known: "$crisis.7205.desc.both$\n\n$crisis.known.desc$"
 crisis.7205.desc.again: "$crisis.7205.desc.both$\n\n$crisis.again.desc$"
 crisis.7205.desc.crisis: "최근 우리가 가한 여러 차례의 수정으로 인해 항성에서 나오는 빛의 기본 성질이 변했습니다. 파장이 변하면서 대부분의 빛이 가시 스펙트럼을 벗어났고, 그 결과 항행과 항성 관측이 엉망이 되는 등 각종 문제가 발생했습니다. 다소 당황스럽지만, 몇 년이면 정상으로 복귀될 것입니다. 이번 일로 많은 것을 배웠습니다."
 crisis.7205.a: "뭐가 어떻게 된 겁니까?!"
 crisis.7205.b: "불편하지만... 굉장하군요."
 crisis.7205.c: "굉장히 흥미롭군요..."
 add_crisis_currency_tt: "\n[crisobj_thesis_value] £advanced_logic£ §Y$menp_cosmo_objectives$§!를 획득했습니다."
 cosmogenesis_negative_opinion_tt: "다른 제국과의 관계가 §R악화§!되었습니다."
 crisis.7210.name: "반내림"
 crisis.7210.desc.both: "불가능한 일이 일어났습니다. 수학 법칙이 바뀐 것입니다. 원의 반지름을 계산하는 데 사용하는 기본 상수가... 반내림되었습니다. 그로 인해 엄청난 결과가 나타났습니다. 수학 체계 전체와 그 체계를 기반으로 세운 모든 것이 위험에 빠졌습니다. 관련 자료를 보면 법칙이 이미 알아서 교정되고 있는 것 같지만, 속도가 느립니다. 일단 교과서부터 수정해야 할 것 같습니다."
 crisis.7210.desc.unknown: "$crisis.7210.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7210.desc.known: "$crisis.7210.desc.both$\n\n$crisis.known.desc$"
 crisis.7210.desc.again: "$crisis.7210.desc.both$\n\n$crisis.again.desc$"
 crisis.7210.desc.crisis: "놀라운 성과입니다. 현실을 넓은 범위에 걸쳐 정밀하게 수정하는 데 성공했습니다. 원주율을 보다 쉽게 계산할 수 있도록, 그 상수를 반내림한 것입니다. 물론 이번 수정으로 우리가 사용하던 일부 과학 및 수학 모델이 어긋나게 되기는 했지만, 효과는 일시적일 뿐입니다. 조만간 모두 정상으로 돌아갈 것입니다."
 crisis.7210.a: "$crisis.7205.a$"
 crisis.7210.b: "파이를 반내림했다고?!"
 crisis.7210.c: "적어도 계산은 단순해지겠네요."
 crisis.7111.desc: "호기심은 칭찬받아 마땅한 자질이지만, 지나친 호기심은 모두에게 비참한 결과를 초래할 수 있습니다. 제발, 자신을 위해서라도 지금 무엇을 하고 있는지 곰곰이 생각해 보십시오.\n\n아직 늦지 않았습니다. 은하계에 돌이킬 수 없는 피해가 발생하기 전에 멈추십시오. 여러분이 만지작거리는 힘은 한낱 장난감이 아닙니다. 여러분의 실험이 모두를 위험에 빠뜨리고 있습니다."
 crisis.7111.b: "주의하도록 하죠."
 crisis.7215.name: "초광속"
 crisis.7215.desc.both: "하룻밤 사이에 빛의 속도가 급격하게 증가해, 엄청난 항성 에너지가 유입되고 있습니다. 광속은 이미 기존 속도로 돌아가고 있지만, 연구자들은 이번 변화를 따라잡기 위해 정신없이 움직이고 있습니다."
 crisis.7215.desc.unknown: "$crisis.7215.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7215.desc.known: "$crisis.7215.desc.both$\n\n$crisis.known.desc$"
 crisis.7215.desc.again: "$crisis.7215.desc.both$\n\n$crisis.again.desc$"
 crisis.7215.desc.crisis: "현실을 수정하는 실험을 진행한 결과, 빛의 속도가 크게 증가했습니다! 그로 인해 항성의 에너지 생산량이 늘어난 것은 반갑지만, 우리 식민지들이 장기적으로 영향을 받을 것이 걱정되기도 합니다. 결국 속도는 정상으로 돌아가겠지만, 그때까지는 최악의 사태에 대비해야 할지도 모릅니다."
 crisis.7215.a: "대체 원인이 뭡니까?"
 crisis.7215.b: "정말 흥미롭군요!"
 crisis.7215.c: "뭐, 별일이야 있겠습니까?"
 crisis.7220.name: "강렬한 열기"
 crisis.7220.desc: "햇빛의 증가로 기온이 계속해서 증가하는 등 우리 식민지가 곤경에 처했습니다. 지금은 대처가 가능하지만, 상황이 점점 심각해질 것입니다."
 crisis.7220.a: "큰일입니다!"
 crisis.7225.name: "참을 수 없는 뜨거움"
 crisis.7225.desc: "다수의 식민지에서 기온이 점차 상승하면서, 식민지 유지가 갈수록 힘들어지고 있습니다. 생활 여건이 악화되면서 불만이 퍼지고 있습니다.\n\n속히 대처를 하지 않는다면 결국에는 지역 전체가 거주 불가능한 곳이 될지도 모릅니다."
 crisis.7225.a: "뭔가 방법이 없을까요?"
 crisis.7230.name: "줄어드는 열기"
 crisis.7230.desc: "은하 전체를 덮친 열파가 고비를 넘겼습니다. 아직 높기는 하지만, 빛의 속도가 거의 정상으로 돌아왔습니다. 이제 남아 있는 에너지가 흩어지기를 조금만 더 기다리는 일만 남았습니다."
 crisis.7230.a: "정말 끔찍했어요."
 crisis.7235.name: "합금 연성도"
 crisis.7235.desc.both: "최근 들어 우리가 가장 널리 사용하는 각종 합금의 파손이 감소해, 이에 대한 조사를 개시했습니다. 조사 결과 합금의 성질 자체가 바뀐 것으로 나타났습니다. 합금의 연성도가 증가하면서 파손이 감소한 것입니다. 대체로 반가운 변화지만, 물리 법칙이 근본적으로 바뀌었다는 점은 걱정입니다."
 crisis.7235.desc.unknown: "$crisis.7235.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7235.desc.known: "$crisis.7235.desc.both$\n\n$crisis.known.desc$"
 crisis.7235.desc.again: "$crisis.7235.desc.both$\n\n$crisis.again.desc$"
 crisis.7235.desc.crisis: "현실을 바꾸는 데 또 한 번 성공했습니다! 합금에 영향을 줘, 더 가볍고 견고하게 만든 것입니다. 사소하긴 하지만 이번 변화는 은하계 전체에 걸쳐 나타나고 있습니다. 현재 우리는 이 변화가 우리 우주에서 얼마나 오래 지속될지 살펴보고 있습니다."
 crisis.7235.a: "좋지만 걱정도 되는군요."
 crisis.7235.b: "정말 놀랍군요."
 crisis.7235.c: "아주 잘했습니다!"
 crisis.7240.name: "합금 연성도"
 crisis.7240.desc.both: "최근 들어 우리가 가장 널리 사용하는 각종 합금의 파손이 증가해, 이에 대한 조사를 개시했습니다. 조사 결과 합금의 성질 자체가 바뀐 것으로 나타났습니다. 합금의 연성도가 감소하면서 파손이 증가한 것입니다. 물리 법칙에 위배된다는 점에서, 이번 변화는 아주 심각하게 받아들여야 합니다."
 crisis.7240.desc.unknown: "$crisis.7240.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7240.desc.known: "$crisis.7240.desc.both$\n\n$crisis.known.desc$"
 crisis.7240.desc.again: "$crisis.7240.desc.both$\n\n$crisis.again.desc$"
 crisis.7240.desc.crisis: "이번 실험은 절반의 성공이었습니다. 은하계 전체에 작용하기는 했지만, 예상한 결과가 나오지 않았기 때문입니다. 합금의 성질을 변화시킨 결과, 합금이 더 잘 깨지고 금이 쉽게 가게 변했습니다. 일시적인 문제일 뿐이고 몇 년 후에는 정상으로 돌아가겠지만, 그때까지는 비용이 증가할 것입니다."
 crisis.7240.a: "$crisis.7205.a$"
 crisis.7240.b: "$crisis.7205.b$"
 crisis.7240.c: "다음에는 더 잘되겠죠."
 crisis.7245.name: "영양 변화"
 crisis.7245.desc.both: "은하 전체에 걸쳐 음식의 영양가에 변화가 나타났습니다. 모든 음식의 영양가가 높아진 것입니다. 아니, 우리에게 필요한 영양이 줄어든 것일지도 모르겠습니다. 어느 쪽이든 예상하지 못한 변화입니다."
 crisis.7245.desc.unknown: "$crisis.7245.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7245.desc.known: "$crisis.7245.desc.both$\n\n$crisis.known.desc$"
 crisis.7245.desc.again: "$crisis.7245.desc.both$\n\n$crisis.again.desc$"
 crisis.7245.desc.crisis: "대성공입니다! 소화를 통한 열량 확보율을 수정해 적은 양의 음식으로도 만족감을 느낄 수 있게 되었습니다. 이 정밀한 수정을 통해 우리는 현실의 재구성에 관해 많은 것을 배울 수 있었습니다."
 crisis.7245.a: "$crisis.7235.a$"
 crisis.7245.b: "$crisis.7235.b$"
 crisis.7245.c: "$crisis.7235.c$"
 crisis.7250.name: "영양 변화"
 crisis.7250.desc.both: "은하 전체에 걸쳐 음식의 영양가에 변화가 나타났습니다. 모든 음식의 영양가가 낮아진 것입니다. 아니, 우리에게 필요한 영양이 늘어난 것일지도 모르겠습니다. 정확히 어떠한 변화가 있었는지 분명하지 않습니다. 이번 변화는 상당한 사회적 영향을 미쳤으므로 심각하게 받아들여야 합니다."
 crisis.7250.desc.unknown: "$crisis.7250.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7250.desc.known: "$crisis.7250.desc.both$\n\n$crisis.known.desc$"
 crisis.7250.desc.again: "$crisis.7250.desc.both$\n\n$crisis.again.desc$"
 crisis.7250.desc.crisis: "이번 실험은 절반의 성공이었습니다. 은하계 전체에 작용하기는 했지만, 예상한 결과가 나오지 않았기 때문입니다. 영양분 소화를 통한 열량 생산율을 수정한 결과, 이제는 음식을 더 많이 먹어야 포만감을 느낄 수 있게 되었습니다. 그러나 사소하고 일시적인 실수에 불과하며, 조만간 정상으로 돌아갈 것입니다."
 crisis.7250.a: "$crisis.7240.a$"
 crisis.7250.b: "$crisis.7240.b$"
 crisis.7250.c: "$crisis.7240.c$"
 crisis.7255.name: "대규모 전환"
 crisis.7255.desc.both: "최근 진행한 중력 측정 스캔 결과가 기존 데이터와 맞지 않습니다. 여러 차례 검증을 거쳤지만, 무언가가 은하계 전체에 영향을 주고 있는 것이 틀림없습니다. 가장 미시적인 변화가 가장 거대한 천체에까지 영향을 주고 있습니다. 대부분의 행성에는 영향이 거의 없지만, 일부 행성에서는 중력과 관련 이상 현상이 나타날 수 있습니다."
 crisis.7255.desc.unknown: "$crisis.7255.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7255.desc.known: "$crisis.7255.desc.both$\n\n$crisis.known.desc$"
 crisis.7255.desc.again: "$crisis.7255.desc.both$\n\n$crisis.again.desc$"
 crisis.7255.desc.crisis: "최근 진행한 현실 재구성 실험 결과, 탄소 원자의 질량이 약간 감소했습니다. 대부분의 경우 의미가 없는 변화이지만, 거시적인 차원에서는 일부 천체에 문제가 발생할 수 있는 것으로 예상됩니다. 비관적인 예측의 경우 중력이 낮은 일부 거주 가능 행성에서는 대기가 사라질 수도 있다고 합니다."
 crisis.7255.a: "$crisis.7240.a$"
 crisis.7255.b: "$crisis.7240.b$"
 crisis.7255.c: "그 정도면 최악은 아니네요."
 mass_shift_tooltip: "다음 식민지가 유의미한 영향을 받습니다:"
 crisis.7260.name: "장막 균열"
 crisis.7260.desc.both: "은하계 전역에 수백 개의 아공간 균열이 생겨, 사이오닉 차원으로 가는 길이 잠시 열렸습니다. 그 결과 두 차원 사이를 가르는 장벽이 약해진 것으로 보입니다. 대부분의 경우 별다른 문제가 없었지만, 일부 균열에서 에너지로 된 존재가 나타나 은하계를 공포에 빠뜨리고 있습니다. 다행인 점은 이 존재들도 우리만큼이나 당황한 상태라는 것입니다. 체계적인 결집 현상도 보이지 않아, 현재로서 침공 가능성은 배제하고 있습니다.\n\n다만 우리 영역에 있는 에너지 존재들을 처리해야 할 것입니다."
 crisis.7260.desc.unknown: "$crisis.7260.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7260.desc.known: "$crisis.7260.desc.both$\n\n$crisis.known.desc$"
 crisis.7260.desc.again: "$crisis.7260.desc.both$\n\n$crisis.again.desc$"
 crisis.7260.desc.crisis: "장막이라고 알려진 차원은 우리 은하의 반대편에 펼쳐져 있습니다. 장막은 그 가소성, 장막과 블랙홀이 연결되어 있다는 가설, 그리고 우리 은하와는 확연히 다른 현실 등 다양한 방면에서 흥미로운 연구 대상입니다.\n\n장막 안을 들여다보기 위해 추진한 실험에서 우리는 우연히 우리 은하에 다수의 아공간 균열을 만들어 내고 말았고, 그로 인해 적대적인 장막의 '영혼'들이 일부 우리 차원으로 들어왔습니다. 우리가 한 행동 때문에 두 세계 사이의 장벽이 급격하게 얇아진 듯합니다. 얼마 후에는 정상으로 돌아가겠지만, 균열이 생긴 방향으로는 구멍을 많이 뚫지 않는 게 좋겠습니다."
 crisis.7260.a: "$crisis.7240.a$"
 crisis.7260.b: "$crisis.7240.b$"
 crisis.7260.c: "다시는 이러지 맙시다."
 crisis.7265.name: "무한 테제 - 안정적 성공"
 crisis.7265.desc.a: "최근 진행한 실험이 완전한 성공을 거두었습니다. 고철을 고가치 합금으로 영구 변환하는 데 성공한 것입니다! 영구적 변화를 이뤄 낸 비결은, 물질을 직접 수정하는 대신 변환이 가능하도록 현실을 수정하는 것이었습니다. 그렇게 화학 반응이 완료되면, 새로 만들어진 합금은 영원히 그 상태를 유지하게 됩니다."
 crisis.7265.desc.b: "시간의 흐름을 바꾸는 데 성공했습니다! 비어 있는 우주 공간을 대상으로 실험을 수행한 뒤 자신감을 얻은 우리는, 같은 실험을 식민지 한 곳에서 시도했습니다. 결과는 성공이었습니다! 해당 식민지에서는 시간이 약 20.537% 빠르게 흐릅니다. 일부 통신 및 이동 문제가 발생하겠지만, 이러한 문제는 앞으로 조치를 취할 예정입니다."
 crisis.7265.desc.c: "초전도체 개량에 성공했습니다. 이제는 상온에서도 효과가 있을 뿐만 아니라, 무손실 에너지 전도에도 성공했습니다. 일시적인 변화에 불과하지만, 우리 전력망에는 큰 보탬이 될 것입니다."
 crisis.7265.desc.d: "이 테제는 엄청난 효과를 보여 주지는 못했지만, 현실에 관한 연구에 새로운 빛을 비춰 주었습니다. 최근 관측한 결과를 반영하려면 상당수의 가설을 버리거나 재정립해야겠지만, 예상보다 알아낸 것이 훨씬 많습니다."
 crisis.7265.desc.e: "예상치 못한 실험 결과가 나왔습니다. 다른 차원과 그곳으로 갈 이동 수단을 연구하던 중 우연히 우리 함선들이 초공간으로 이동했습니다. 문제는 일부분만 이동했다는 것입니다. 어떻게 이런 일이 가능할까 싶지만, 함선의 상황은 안정적이며 피해도 없었습니다. 이로 인한 긍정적인 부작용으로, 해당 함선들은 이제 어느 때보다 더 빨리 움직일 수 있게 되었습니다."
 crisis.7265.desc.f: "우리 제국은 예로부터 지금까지 각종 기술을 이용해 폭발하는 물건을 만드는 데 출중한 능력을 보여 왔습니다. 무한 테제도 그와 마찬가지여서 우리는 이 기술을 이용해 폭발형 무기에 탑재된 폭약의 작동 방식을 변화시켜 폭발 규모를 크게 증가시켰습니다. 이 과정에서 안타깝게도 소형 연구 시설이 몇 군데 부서진 것을 제외하고는 별다른 비용도 들지 않았습니다."
 crisis.7265.desc.g: "현실 수정과 관련해 별다른 소득을 얻지 못했습니다. 그러나 기존 재래식 기술에 관해서는 많은 것을 배울 수 있었습니다."
 crisis.7265.desc.h: "공간 조율을 시도하다가 한 식민지의 크기를 키우고 말았습니다. 놀라운 점은 이번 변화가 영구적이라는 것입니다. 어떻게 이런 일이 가능했는지 확실히 알 수는 없지만, 아마 다른 차원에서 물질이 끌려들어 와 원자 사이의 공간에 자리를 잡은 것이 아닐까 추측하고 있습니다. 혼란스럽지만 흥미진진한 상황입니다."
 crisis.7265.a: "굉장하군요!"
 crisis.7265.b: "정말 놀랍군요."
 crisis.7265.c: "대단합니다."
 crisis.7265.d: "흥미롭군요."
 add_crisis_currency_doubled_tt: "\n[crisobj_thesis_value_bonus] £advanced_logic£ §Y$menp_cosmo_objectives$§!를 획득했습니다."
 crisis.7265.e: "잘된... 건가?"
 crisis.7265.f: "훌륭해요!"
 crisis.7265.g: "정말 특이하군요."
 crisis.7265.h: "이 정도면 괜찮은 결과군요."
 crisis.7270.name: "무한 테제 - 안타까운 실패"
 crisis.7270.desc.a: "실패도 과학의 일부입니다. 이번 실험에 큰 기대를 걸었지만, 결국 성과를 내지 못했습니다. 실망스럽지만 이번 귀중한 경험을 통해 우리는 최대한 많은 것을 배울 것입니다."
 crisis.7270.desc.b: "시간의 흐름을 바꾸는 데 성공했습니다! 비어 있는 우주 공간을 대상으로 실험을 수행한 뒤 자신감을 얻은 우리는, 같은 실험을 식민지 한 곳에서 시도했습니다. 결과는 성공이었습니다! 기존 시간을 기준으로 앞으로 몇 년 동안 해당 식민지에서 시간이 약 20.537% 느리게 흐를 겁니다. 이상적인 결과는 아니지만, 우리로서는 굉장한 성과라는 점은 분명합니다."
 crisis.7270.desc.c: "최근 진행한 실험에서 안타깝게도 부작용이 나타났습니다. 모든 에너지 저장 장치에서 에너지가 전부 방출된 것입니다. 부서진 것은 없지만, 저장된 에너지가 전부 사라졌습니다. 아마 다른 차원으로 넘어간 듯합니다. 아직 무슨 일이 일어난 것인지 파악 중이지만, 흥미로운 일인 것만은 분명합니다."
 crisis.7270.desc.d: "부끄럽게도 실험에 실패했습니다. 현실 수정으로 인해 데이터 뱅크가 영향을 받아, 수년간 축적한 연구 자료가 복구 불가능할 정도로 손상되고 말았습니다. 대부분의 이론을 처음부터 다시 구축해야 하는 상황입니다. 기존 연구를 재점검할 기회가 되겠지만, 연구에 상당한 차질이 생긴 것만은 분명합니다."
 crisis.7270.desc.e: "이번 실험의 주제는 동력원과 출력으로, 시작은 양호했지만 함선 기반 반응로에 동력이 새어 들어가면서 전 함대에 용융 반응이 일어났습니다! 늦기 전에 반응로를 차단한 함선도 있지만, 다른 함선들은 심각한 피해를 입었습니다."
 crisis.7270.desc.f: "실험을 관장하던 [leader_target.GetName] 담당관이 시험 구역에서 시공간이 예기치 않게 압축되는 바람에 사망하고 말았습니다. 현실을 모델링하는 작업은 어느 정도 성과를 얻었지만, [leader_target.GetName]의 죽음은 지식을 위해 치루는 대가에 대한 선례로 남을 것입니다."
 crisis.7270.desc.g: "연산 실험이 통제에서 벗어나 예상보다 규모가 훨씬 커졌습니다. 그 결과 귀중한 연구 데이터 중 상당수가 무용지물이 되었습니다. 다행히도 우리 제국의 최첨단 연구 결과가 보관된 은행은 훌륭한 보안 조치 덕분에 피해를 입지 않았습니다."
 crisis.7270.desc.h: "공간 조절을 실험하다 식민지를 축소시키고 말았습니다. 다소 의외인 점은, 이 변화가 영구적이라는 것입니다. 지금으로서는 한 차원에서 다른 차원으로 물질이 유출된 것으로 추정됩니다. 여러모로 영문을 알 수 없는 상황입니다."
 crisis.7270.a: "$crisis.7240.c$"
 crisis.7270.b: "$crisis.7240.c$"
 crisis.7270.c: "$crisis.7240.c$"
 crisis.7270.d: "$crisis.7240.c$"
