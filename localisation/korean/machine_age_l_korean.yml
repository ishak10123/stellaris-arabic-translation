 #Cybernetic Special Traits
 trait_cyborg_creed_of_construction: "조합 증강"
 trait_cyborg_creed_of_construction_desc: "망치 조합은 신성한 증강 기술을 이용해 신도들에게 필요한 것은 무엇이든 제작합니다."
 trait_cyborg_creed_of_war: "기사단 증강"
 trait_cyborg_creed_of_war_desc: "강철 기사단이 가진 신성한 증강 기술은 우리 성전사들이 전장에서 무적의 힘을 발휘할 수 있게 합니다."
 trait_cyborg_creed_of_research: "성가단 증강"
 trait_cyborg_creed_of_research_desc: "정신 성가단은 반연결식 의식을 통해 연구자들 사이의 즉각적인 소통을 실현합니다."
 trait_cyborg_creed_of_labor: "노역단 증강"
 trait_cyborg_creed_of_labor_desc: "공동 노역단의 신성한 증강 기술은 기존의 작업 수단을 모든 측면에서 능가합니다."
 trait_cyborg_ritualistic_implants: "축성 삽입물"
 trait_cyborg_ritualistic_implants_desc: "이 삽입물은 신도들이 자랑스럽게 착용하는 증강 장치로서, 신에 대한 이들의 헌신은 모두에게 귀감이 됩니다."
 leader_trait_ritualistic_implants_cyborg: "$trait_cyborg_ritualistic_implants$"
 leader_trait_ritualistic_implants_cyborg_desc: "$trait_cyborg_ritualistic_implants_desc$"
 mod_planet_cyborg_jobs_unity_produces_mult: "사이보그 팝으로 인한 £unity£ $unity$"
 #Fallen Empire Reactions
 action.1.desc_111: "미숙하고 어리석은 존재들이여, 그대들은 신을 안다고 강변하지만 그대들의 [Owner.Species.GetFleshTypeCyberCreed]에는 더러움만 가득할 뿐. 잘 들으시오. 우리는 은하계의 선택받은 민족, [contact_empire.GetName]입니다. 그대들의 더러운 몸을 우리의 성지에서 치우시오. 그렇지 않으면 신속히 파괴해 드리겠습니다."
 action.1.desc_110: "우리는 이 은하계의 선택받은 민족, [contact_empire.GetName]입니다. 수백 년 동안 우리는 하등 종족의 영적 욕구를 방치해 왔습니다. 그대들과 그대들의 영혼이 담긴 불순한 그릇은 그러한 우리의 잘못을 여실히 보여 주고 있으니, 우리 교리를 받아들이고 개종하십시오. 그렇지 않으면 멸망할 것입니다."
 #Cybernetic Situation Events
 machine_age.90.name: "신성 삽입물"
 machine_age.90.desc: "믿음 있는 자들이 사이버네틱의 비밀을 밝혀냈습니다. 그러나 우리의 여정은 오늘 시작되었을 뿐입니다. 이제부터 우리는 신성한 융합을 받아들이는 데 전념해야 합니다."
 machine_age.90.a: "때가 되었습니다."
 machine_age.90.a.tooltip: "신성한 융합을 개시하려면 ['tradition_category:tradition_cybernetics'] 전통 트리를 채택해야 합니다."
 machine_age.100.name: "융합의 콘클라베"
 machine_age.100.desc: "과거부터 우리는 [Owner.Species.GetFleshTypeCyberCreed]에 대한 그릇된 증강을 시도하는 과정에서 신성한 신체를 돌이킬 수 없이 난도질하는 경우가 많았고, 이러한 과오는 신성한 융합에 대한 해석을 둘러싸고 서로 다른 종파가 경합하는 결과로 이어졌습니다.\n\n온전한 증강을 이룩할 수 있는 기술이 마침내 출현한 지금, 우리 종교의 최고 지도자인 테크노판트들은 콘클라베를 소집했습니다. 이번 종교 회의의 목적은 우리 교단의 핵심 원칙을 정립하고, 서로 다른 종파를 하나의 교리로 통일하는 것입니다."
 machine_age.100.a: "신께서 인도하시기를."
 machine_age.1000.name: "믿음의 융합"
 machine_age.1000.desc: "테크노판트 콘클라베는 소집 과정부터 험난했습니다. 주요 교리를 대표하는 종파들이 각각 회의에 대표를 파견하겠다며 나섰기 때문입니다. 협의 끝에 §Y$CYBERCREED_construction$§!, §Y$CYBERCREED_war$§!, §Y$CYBERCREED_research$§!, §Y$CYBERCREED_labor$§!, 이상 네 개의 종파가 소집을 받았습니다.\n\n이제 콘클라베는 열띤 신념을 지니고 자신들의 신성한 직무를 수행하고 있습니다. 콘클라베의 첫 칙령은 공물을 늘리거나 국민들로 하여금 의무적으로 봉사 활동을 수행하게 하는 것입니다."
 machine_age.1000.a: "콘클라베를 어떻게 지원할지 선택해야 합니다."
 machine_age.1000.a.tooltip: "해당 상황에 대한 접근 방식의 선택지가 추가됩니다."
 machine_age.1010.name: "증강 코덱스"
 machine_age.1010.desc: "테크노판트 콘클라베는 두 번째 칙령으로 우리의 신앙을 공식화하는 경전을 작성화할 것을 요청했습니다. 서로 다른 종파의 차이로 인해 너무도 오랫동안 우리 사회에서 마찰이 발생했기 때문입니다.\n\n주요 종파들은 교리 통일의 방향에 관해 설득력 있는 주장을 제기하고 있는 반면, 진정으로 열려 있고 포용적인 신앙을 주장하는 온건한 목소리도 존재합니다."
 machine_age.1010.a: "망치 조합은 보다 밝은 미래를 건설할 겁니다."
 machine_age.1010.a.tooltip: "§Y$CYBERCREED_construction$§!의 신조를 중심으로 교리를 형성합니다.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.b: "강철 기사단은 우리의 [Owner.Species.GetFleshTypeCyberCreed](을)를 지켜 줄 겁니다."
 machine_age.1010.b.tooltip: "§Y$CYBERCREED_war$§!의 신조를 중심으로 교리를 형성합니다.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.c: "정신 성가단은 진보를 노래할 것입니다."
 machine_age.1010.c.tooltip: "§Y$CYBERCREED_research$§!의 신조를 중심으로 교리를 형성합니다.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.d: "공동 노역단은 일꾼들에게 의미를 부여할 겁니다."
 machine_age.1010.d.tooltip: "§Y$CYBERCREED_labor$§!의 신조를 중심으로 교리를 형성합니다.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.e: "분열을 조장하는 이 교리들은 종식시켜야 합니다."
 machine_age.1010.e.tooltip: "각 신조를 §Y$pft_cyber_creed_general$§!로 변경해, 모든 신도의 신체 개조를 허용합니다.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.shared.tooltip: "다른 종파와 관련된 모든 건물이 §Y신전§!으로 대체됩니다.\n이 종파가 유일한 §Y정신주의 세력§!이 됩니다.\n§Y비정신주의§! 윤리관 세력의 형성이 허용됩니다."
 machine_age.1020.name: "거짓 신앙"
 machine_age.1020.desc.pickedacreed: "§Y[GetCyberCreed]§!(을)를 선택하자, 다른 종파들이 들고 일어났습니다. 콘클라베가 '진정한' 신앙에 등을 돌렸다고 생각하는 국민들이 많습니다.\n\n$machine_age.1020.both$"
 machine_age.1020.desc.nocreed: "다수의 종파가 들고 일어나 콘클라베가 신앙을 저버렸다고 주장하고 있습니다.\n\n$machine_age.1020.both$"
 machine_age.1020.both: "열띤 항의가 이어지고 있지만, 아직까지는 평화롭습니다. 지금 일어나는 불꽃이 불길로 이어질지는 시간이 지나야 알 수 있을 것입니다.\n\n앞으로 어떤 일이 생기든, 일단 다른 종파들의 처우를 결정해야 합니다. 즉시 이단으로 규정해 파면하자는 의견도 있습니다. 이들이 불러온 혼란은 그 자체로 신성 모독의 증거로 충분하다는 것입니다. 반면에 자비를 통해 앞으로 나아가야 한다며, 잘못된 길에 들어선 신도들에게 관용을 베풀어야 한다는 주장도 있습니다."
 machine_age.1020.a: "진정한 신앙은 오직 하나뿐입니다."
 machine_age.1020.a.tooltip: "테크노판트가 다른 종파를 억압합니다. 이로 인해 소요 사태가 발생할 수 있습니다."
 machine_age.1020.b: "우리의 신앙은 모두를 수용할 수 있습니다."
 machine_age.1020.b.tooltip: "공식적인 교리는 존재하지만, 테크노판트가 다른 종파의 종교 행위를 허용합니다."
 machine_age.1030.name: "신도들의 불만"
 machine_age.1030.desc: "제국 내 다양한 행성에서 소수 종파들의 시위가 번져, 우리가 신성한 융합이라는 목표를 저버렸다며 비난하고 있습니다. 테크노판트들은 대다수의 국민이 통일 교리를 지지하는 만큼 이번 소요 사태가 오래가지는 않을 것으로 보고 있습니다. 시간만 지나면, 보다 급진적인 시위대들도 신성한 진실을 받아들이리라는 것입니다."
 machine_age.1030.a: "진정한 신앙은 오직 하나뿐입니다."
 machine_age.1030.a.tooltip: "경쟁 관계에 있는 종파를 억압하려 하자, 일부 소요 사태가 발생했습니다."
 machine_age.1040.name: "자발적인 개종"
 machine_age.1040.desc: "점차 많은 국민이 통일 교리를 받아들이고 있으며, 각 종파를 따르던 신도 중 대부분이 기존 신앙을 버렸습니다.\n\n진정한 광신도들을 제외하고 모든 국민이 신성한 [Owner.Species.GetFleshTypeCyberCreed]의 마지막 전환을 준비하고 있습니다."
 machine_age.1040.a: "신성한 융합의 진실함이 승리를 거두었군요."
 machine_age.1040.a.tooltip: "교리를 통일하는 데 성공했습니다."
 machine_age.1050.name: "만족한 종파들"
 machine_age.1050.desc: "각 종파들에게 표현의 자유를 허락하는 방안이 결국 가장 화합적인 선택지였습니다. 시위는 소규모에 국한되었고, 그나마도 각 종파에서 가장 강경한 구성원들만 참여하고 있습니다.\n\n대부분의 신도가 우리의 공식 교리를 따르고 있는 만큼, 이제 우리는 신성한 융합에 역량을 집중할 준비가 되었습니다."
 machine_age.1050.a: "우리의 신앙은 분열되지 않습니다."
 machine_age.1050.a.tooltip: "다양한 교리를 인정함으로써 소요 사태를 방지했습니다."
 machine_age.1060.name: "비합리적인 타협"
 machine_age.1060.desc: "강경파의 요구에 손을 들어주자, 대다수의 중도파가 불만을 드러내고 있습니다. 어떠한 교리든 종파 간 폭력이 없던 적은 없었다고 주장하며, 많은 이들이 소수 종파를 반대하지 않은 것은 잘못된 선택이었다고 보고 있습니다.\n\n다수파는 여러 교리에 대한 공식 개혁을 요구하면서, 각 종파의 독립을 실질적으로 박탈할 것을 주장하고 있습니다."
 machine_age.1060.a: "신도들이 참고 넘어가야 할 일입니다."
 machine_age.1060.a.tooltip: "다양한 교리를 인정하자, 우리 종교 중 중도적인 입장의 종파들이 들고 일어나 소요 사태가 발생했습니다."
 machine_age.1060.b: "교리 개혁을 개시하세요."
 machine_age.1060.b.tooltip: "다양한 교리를 흡수하고 사소한 분쟁거리는 차단합니다."
 machine_age.1070.name: "시간의 공물"
 machine_age.1070.desc: "위대한 융합의 날이 다가오는 지금, 우리는 우리 종교의 아주 오래된 전통 하나를 돌아보고 있습니다. 바로 시간의 공물 전통입니다.\n\n수많은 세대에 걸쳐, 믿음 있는 모든 사회 구성원은 자신들의 시간과 에너지 일부를 교단에 헌납했습니다. 이 공물은 신성한 융합과 마찬가지로 우리 교단을 더욱 강성하게 만들 것입니다.\n\n신도들이 신성한 증강을 어떻게 지원하면 좋을까요?"
 machine_age.1070.intro: "매년 우리 인구 중 믿음 있는 자들이 자신의 시간 일부를"
 machine_age.1070.a: "채굴의 공물"
 machine_age.1070.a.tooltip: "$machine_age.1070.intro$ 채굴에 헌납합니다."
 machine_age.1070.b: "농업의 공물"
 machine_age.1070.b.tooltip: "$machine_age.1070.intro$ 농업에 헌납합니다."
 machine_age.1070.c: "강철의 공물"
 machine_age.1070.c.tooltip: "$machine_age.1070.intro$ 단조장 작업에 헌납합니다."
 machine_age.1070.d: "건설의 공물"
 machine_age.1070.d.tooltip: "$machine_age.1070.intro$ 건설 및 선박 건조에 헌납합니다."
 machine_age.1070.e: "지상군의 공물"
 machine_age.1070.e.tooltip: "$machine_age.1070.intro$ 지상군 복무에 헌납합니다."
 machine_age.1070.f: "해군의 공물"
 machine_age.1070.f.tooltip: "$machine_age.1070.intro$ 해군 복무에 헌납합니다."
 machine_age.1070.g: "증강의 공물"
 machine_age.1070.g.tooltip: "$machine_age.1070.intro$ 신성 사이버네틱 연구에 헌납합니다."
 machine_age.1070.h: "지식의 공물"
 machine_age.1070.h.tooltip: "$machine_age.1070.intro$ 우주의 비밀에 관한 연구에 헌납합니다."
 machine_age.1070.i: "노동의 공물"
 machine_age.1070.i.tooltip: "$machine_age.1070.intro$ 필수품 생산에 헌납합니다."
 machine_age.1070.j: "부의 공물"
 machine_age.1070.j.tooltip: "$machine_age.1070.intro$ 무역에 헌납합니다."
 machine_age.1070.k: "제조의 공물"
 machine_age.1070.k.tooltip: "$machine_age.1070.intro$ 고급품 제조에 헌납합니다."
 machine_age.1075.name: "피와 회로"
 machine_age.1075.desc: "드디어 신성한 융합의 때가 찾아왔습니다.\n\n우리 제국의 각 행성에 신성한 §Y$building_augmentation_center$§!를 건설해 융합 과정을 개시해야 합니다."
 machine_age.1075.a: "$machine_age.1090.pray$"
 machine_age.1075.a.tooltip: "신도들을 대상으로 전신 사이버네틱 증강을 개시합니다. 콘클라베의 다른 모든 활동은 신성한 융합이 완료될 때까지 중단됩니다.\n\n§R행동 필요:§!\n§Y$situation_cybernetic_creed_cyberization$§! 상황을 계속 진행하려면 $building_augmentation_center$를 건설해야 합니다."
 machine_age.1090.name: "육신의 미래"
 machine_age.1090.desc: "신성한 여정이 마무리되면서, 우리의 신체는 마침내 기계와 [Owner.Species.GetFleshTypeCyberCreed]의 거룩한 융합을 달성할 것입니다. 이제 신도들은 그 마지막 단계로 신성한 증강 장치를 삽입하는 것만 남았습니다."
 machine_age.1090.construction: "$machine_age.1090.desc$ §Y$CYBERCREED_construction$§!에 따르면, 우리의 신체는 신성한 도구가 되어야 합니다.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.war: "$machine_age.1090.desc$ §Y$CYBERCREED_war$§!에 따르면, 신도들은 거룩한 무기가 되어야 합니다.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.research: "$machine_age.1090.desc$ §Y$CYBERCREED_research$§!에서는 주민들의 의식을 연결망으로 구성해 우주의 비밀을 파헤칠 것입니다.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.labor: "$machine_age.1090.desc$ §Y$CYBERCREED_labor$§!에서는 우리의 식탁과 창고가 가득 찰 것이라 약속합니다.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.pray: "융합은 신성한 것이며, 증강이 곧 경배입니다."
 machine_age.1090.a: "[GetCyberCreed](이)가 새로운 시대를 열 것입니다."
 machine_age.1090.a.tooltip: "$machine_age.geneslockedtooltip$\n$cyber.21.a.end$\n$machine_age.democraticgovtooltip$\n시행령 잠금 해제: §Y[GetCyberCreedEdict]§!"
 machine_age.1090.b.tooltip: "$machine_age.geneslockedtooltip$\n$cyber.21.a.end$\n$machine_age.oligarchicgovtooltip$\n시행령 잠금 해제: §Y[GetCyberCreedEdict]§!"
 machine_age.1090.c.tooltip: "$machine_age.geneslockedtooltip$\n$cyber.21.a.end$\n$machine_age.dictatorialgovtooltip$\n시행령 잠금 해제: §Y[GetCyberCreedEdict]§!"
 machine_age.1090.d.tooltip: "$machine_age.geneslockedtooltip$\n$cyber.21.a.end$\n$machine_age.imperialgovtooltip$\n시행령 잠금 해제: §Y[GetCyberCreedEdict]§!"
 machine_age.1090.e.tooltip: "$machine_age.geneslockedtooltip$\n$cyber.21.a.end$\n$machine_age.corporategovtooltip$\n시행령 잠금 해제: §Y[GetCyberCreedEdict]§!"
 machine_age.1100.name: "신앙의 미래"
 machine_age.1100.desc: "오늘 우리는 신체와 영혼의 융합만이 아닌 신앙 그 자체의 합일을 이룬 존재로서 다시 일어섭니다. 우리는 더는 독단적인 교리에 휘둘리지 않으며, 신성한 융합은 모든 신도가 직접 참여하는 여정이 될 것입니다.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1100.a: "우리는 [Owner.Species.GetFleshTypeCyberCreed]도 하나, 신앙도 하나입니다."
 machine_age.1100.a.tooltip: "$machine_age.geneswaptooltip$\n$cyber.21.a.end$\n$machine_age.democraticgovtooltip$"
 machine_age.1100.b.tooltip: "$machine_age.geneswaptooltip$\n$cyber.21.a.end$\n$machine_age.oligarchicgovtooltip$"
 machine_age.1100.c.tooltip: "$machine_age.geneswaptooltip$\n$cyber.21.a.end$\n$machine_age.dictatorialgovtooltip$"
 machine_age.1100.d.tooltip: "$machine_age.geneswaptooltip$\n$cyber.21.a.end$\n$machine_age.imperialgovtooltip$"
 machine_age.1100.e.tooltip: "$machine_age.geneswaptooltip$\n$cyber.21.a.end$\n$machine_age.corporategovtooltip$"
 machine_age.govswapnotice: "신체 융합에 발맞춰, 정부 또한 사이버네틱을 완전히 도입해 구조 조정을 거칠 것입니다. 이로써 §Y[Owner.GetGovernmentName]§!(이)가 수립됩니다."
 machine_age.democraticgovtooltip: "우리 정부 체제가 사이버네틱 중심의 §Y['concept_auth_cyber_creed_democratic']§!으로 변경되었습니다."
