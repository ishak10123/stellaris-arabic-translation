 #Traits
 trait_pathogenic_genes: "병원성 유전자"
 trait_pathogenic_genes_desc: "이 종족은 신종 유전병 때문에 자손을 생산할 수 없습니다. 이 질병에는 현재까지 알려진 어떠한 유전자 치료 방법도 소용이 없습니다."
 PATHOGENIC_GENES_FORCE_DECLINE: "§Y$trait_pathogenic_genes$§!에 따라 §R종족 쇠퇴 진행 중§!"
 pathogenic_genes_tooltip: "§R행성 개척 및 재정착 불가§!"
 pathogenic_genes_warning: "$TRIGGER_FAIL$§Y§R$trait_pathogenic_genes$§! 특성이 있는 팝은 재정착 불가§!"
 leader_trait_robotic_surrogate: "대용 로봇"
 leader_trait_robotic_surrogate_desc: "거추장스럽고 느린 이 로봇은 $building_identity_repository$의 디지털화된 지도자가 사용하는 대용 신체입니다."
 #Buildings
 building_identity_repository: "인격 보관소"
 building_identity_repository_tt: "이 보관소는 인격을 §Y[Owner.GetTotalIdentities]§!개 보관 중입니다. $building_identity_repository_scaling$"
 building_identity_repository_scaling: "\n\n인격이 늘어날 때마다 보관소의 생산량과 유지비가 증가하고, 이는 우리 제국 전역의 모든 $building_identity_repository$에 분산됩니다.\n"
 building_identity_repository_desc: "신체가 수명을 다하기 전에 의식을 디지털화합니다. 디지털 공간 속에서 안전을 확보한 우리는 사회의 안녕을 위한 작업을 계속 진행합니다."
 building_abandoned_gene_clinic: "방치된 유전자 진료소"
 building_abandoned_gene_clinic_tt: "§R철거, 교체 및 수리 불가§!"
 building_abandoned_gene_clinic_desc: "주민들이 자연적으로 생식할 수 있는 능력을 상실하자, 의료계는 이 최첨단 유전자 진료소에 희망을 걸었습니다. 다른 다양한 기반 시설처럼 이 진료소 또한 방치되어, 지금은 우리의 고난과 새로운 해결책의 절실한 필요성을 끊임없이 상기시켜 줄 뿐입니다."
 #Situation Events
 machine_age.3100.name: "디지털 구원"
 machine_age.3100.desc: "의학적 해결책을 찾지 못한 우리에게 남은 최선의 생존 방안은 우리 주민들을 디지털화해 §Y인격 보관소§! 안에 수용하는 것뿐입니다. 그러나 이것은 임시방편에 불과하기에, 충분한 수준의 정교함을 갖춘 합성 신체와 양전자 뇌를 개발할 계획을 이미 진행 중입니다. 연구를 집중적으로 진행할 경우, 완료할 시간은 충분할 것으로 보입니다.\n\n이미 제국 내 최고의 전문가들이 최첨단 AI를 이용해 로봇 신체 제작을 위한 청사진을 그렸습니다. 합성체 전환이 가져다줄 구원으로 향하는 첫걸음을 뗀 것입니다."
 machine_age.3100.a: "반드시 성공해야 합니다."
 machine_age.3110.name: "로봇 노동자"
 machine_age.3110.desc: "로봇 신체 연구가 완료되었습니다. $building_abandoned_gene_clinic$를 $building_robot_assembly_plant$으로 바꿨고, 프로토타입의 업그레이드와 보급도 완료했습니다. 아직 기초적인 수준의 시스템이라 개별 의식을 보관할 만한 처리 능력은 없지만, 우리가 지금까지 상실한 노동력을 일부 대체할 수는 있습니다. 디지털 영역에 사는 주민들이 자신의 지식과 경험을 양전자 업링크를 통해 로봇에게 전송해, 일상 업무의 성능을 향상할 수 있는 것입니다.\n\n그와 동시에 우리 AI 시스템이 고도화된 안드로이드 설계를 개발했습니다. 점차 고령화되는 우리 공학자들 또한 작업 준비를 마친 상태입니다."
 machine_age.3110.a: "한 단계를 넘겼군요."
 machine_age.3110.a.tooltip: "[Root.Capital.GetName]:\n- §Y$building_robot_assembly_plant$§!: §G+1§! \n- £pop£ §H기계식 팝§!: §G+300§!"
 machine_age.3115.name: "드로이드 정복"
 machine_age.3115.desc: "로봇 기술의 중대한 업그레이드를 통해 이제 다른 행성을 개척할 수 있게 되었으며, 기계화된 주민들은 훨씬 복잡한 작업을 지원할 수 있게 되었습니다.\n\nAI 시스템에 따르면, 이다음으로는 양전자 매트릭스를 합성 신체 안에 재현해야 한다고 합니다. 이 유의미한 연구 프로젝트를 완료하면, 디지털 의식을 실제 세계로 돌려보낼 수 있게 될 것입니다."
 machine_age.3115.a: "이제 와서 포기할 순 없습니다."
 machine_age.3120.name: "마지막 한 걸음"
 machine_age.3120.desc: "끊임없는 고된 노력 끝에 우리는 마침내 성공했습니다. 우리의 인격을 담을 수 있을 정도로 정교하며 온전하게 기능하는 양전자 뇌를 설계한 것입니다.\n\n아직 죽음을 극복하지는 못했지만, 얼마 지나지 않아 유기체의 한계를 벗어날 수 있을 것입니다."
 machine_age.3120.a: "합성체로 각성할 때가 됐군요."
 machine_age.3120.a.tooltip: "이 이벤트를 진행하려면 §Y합성체 전통§!을 수용해야 합니다."
 machine_age.3125.name: "디지털 꿈"
 machine_age.3125.both: "우리 제국의 조립 공장과 합성체 전환 전문가들이 양전자 뇌와 합성 신체에 인격을 옮기는 중대한 과업을 시작할 준비를 마쳤습니다."
 machine_age.3125.desc: "$machine_age.3125.both$\n\n유전병을 완전히 종식하기 위해, 실제 세계에 아직 거주 중인 주민들을 중심으로 작업을 시작할 예정입니다. 합성체 두뇌의 높은 연산력을 활용하면, 우리는 유기 신체의 한계를 극복할 수 있습니다.$synth.105.end$"
 machine_age.3125.nobody.desc: "$machine_age.3125.both$\n\n실제 세계에 존재를 갖지 못하고 있는 만큼, 첫 프로토타입 제작을 서둘러야 합니다. 합성체 두뇌의 높은 연산력을 활용하면, 우리는 유기 신체의 한계를 극복할 수 있습니다.$synth.105.end$"
 machine_age.3125.a: "인격 이전을 개시합시다."
 machine_age.3125.a.tooltip: "남아 있는 생체 팝이 있는 경우, 먼저 이들을 대상으로 합성 신체로의 이전을 개시합니다."
 machine_age.3200.name: "디지털 연옥"
 machine_age.3200.desc: "최악의 우려가 현실이 되었습니다.\n\n우리 중 마지막 실제 신체가 수명을 다한 것입니다. 우리의 디지털 의식은 인격 보관소에 안전하게 수용되어 있지만, 의식을 인공 뇌에 옮길 기술이 아직 없습니다.\n\n연구를 완료할 때까지 우리 제국의 디지털 지도자들은 대리 로봇을 통해 실제 세계와 소통해야 할 것입니다."
 machine_age.3305.name: "가상 세계의 구원"
 machine_age.3305.desc: "모든 주민의 인격을 합성체 골격이나 인격 보관소로 이전해, 국민들의 존속을 확보하는 데 성공했습니다.\n\n그러나 새로운 문제가 발생했습니다. 우리 디지털 인격을 보관하기 위해 만든 디지털 '공간'은 원래 임시 거주 공간에 지나지 않았습니다. 그런데 이곳에서의 생활에 익숙해진 주민들이 실제 세계로의 복귀를 꺼리고 있는 것입니다.\n\n주민들이 디지털 영역에 계속 머무르게 할 수도 있지만, 이들을 새로운 로봇 신체에 강제로 이전하는 방안도 가능합니다."
 machine_age.3305.a: "계속 열반을 누리라고 하세요."
 machine_age.3305.a.tooltip: "남아 있는 디지털 인격들이 §Y$building_identity_repository$§!에 머무르며, 계속해서 그 안에서 다른 국민들을 돕습니다."
 machine_age.3305.b: "우리는 함께할 때 더 강합니다."
 machine_age.3305.b.tooltip: "남아 있는 디지털 인격을 현재 보유한 합성 신체에 이전하고, 나머지 인격을 위해 신규 골격을 제작합니다. §Y$building_identity_repository$§!는 철거합니다."
 machine_age.3310.name: "합성체 재탄생"
 machine_age.3310.desc: "[Root.Owner.GetSpeciesName] 신생아가 마지막으로 태어난 지 벌써 수십 년이 지났습니다. 아기를 품에 안는 느낌은 이제 다시는 누릴 수 없을지도 모르지만, 오늘 우리 종족에게 희망의 불씨가 다시 타올랐습니다.\n\n기존 인격을 복사해 사실상 새로운 주민을 만들 수 있는 첨단 시설인 §Y인격 개발 단지§!를 개발한 것입니다.\n\n서로 다른 주민으로부터 인격 요소를 무작위로 추출해 다양하게 조합하면, 새로운 인격을 만들 수 있을 것입니다. 아니면 자연에서의 의식 형성 과정을 모방해, 개방된 가상 공간에서 '정신 종자'를 육성하는 방법도 있습니다."
 machine_age.3310.a: "정신을 섞어 봅시다."
 machine_age.3310.building_tooltip.a.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.a.tt$\n§Y건물 잠금 해제:§! $building_identity_complex$"
 machine_age.3310.b: "가끔은 자연도 제대로 된 시스템을 만들 줄 아는군요."
