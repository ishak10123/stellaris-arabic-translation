 #Weather Manipulator
 r_weather_manipulator: "재난 제압기"
 r_weather_manipulator_desc: "아이네티안 상인 조합이 우주 폭풍을 조종하기 위해 사용했던 기계를 더욱 발전시킨 모델입니다. 이 장치는 기본적으로 모든 폭풍 관련 기술의 효과를 높여 주며, 적절하게 활용할 경우 모든 폭풍을 우리 제국의 국경 밖으로 몰아낼 수도 있습니다."
 storm_relic_repelling_field_modifier: "재난 제압기 가동"
 storm_relic_repelling_field_modifier_tt: "제국 수도 주변에 §M초대형§! §Y$default_storm$§! 차단 역장을 36개월 동안 형성합니다."
 #Temporary effect used by the Inetian Precursor Digsite C
 storm_timed_repelling_field_modifier: "국지적 재난 억제기 가동"
 storm_timed_repelling_field_modifier_tt: "제국 수도 주변에 §H중형§! §Y$default_storm$§! 차단 역장을 18개월 동안 형성합니다."
 #The Tempest Invocator
 r_the_tempest_invocator: "광풍 초래 장치"
 r_the_tempest_invocator_desc: "이 장치는 전원을 끈 대기 상태에서조차 느낄 수 있을 정도로 막대한 잠재력을 갖췄습니다. 과연 우리는 우리 제국의 최고 인재들 속에 잠들어 있는 격렬한 광풍을 감당할 수 있을까요? 제국의 영광을 위해서라면 희생은 필요한 법입니다."
 r_the_tempest_invocator_active_effect_tt: "선택한 성계에 ['concept_nexus_storm']을 생성합니다.\n$t$성계를 선택하면 $scientist_with_icon$ 한 명이 §P희생§!됩니다."
 r_the_tempest_invocator_requirement_fail_tt: "$TRIGGER_FAIL$§R희생할 수 있는 $scientist_with_icon$가 없습니다.§!"
 r_the_tempest_invocator_started_placing_fail_tt: "$TRIGGER_FAIL$§R폭풍 배치 시스템이 이미 가동 중입니다.§!"
 tempest_invocator_active_modifier: "광풍 차단"
 concept_nexus_storm: "$nexus_storm$"
