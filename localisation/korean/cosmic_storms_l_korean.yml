 cstorms.2000.name: "폭풍 준비"
 cstorms.2000.desc_common_1: "이제 §H[target.solar_system.GetName]§! 성계에 자리를 잡고 §Y$default_storm$§!을 만드는 데 필요한 사전 작업을 시작할 준비를 마쳤습니다.\n\n[target.GetName](을)를 일시적으로 초전하 상태로 만들면, 원하는 우주 기상 반응을 일으킬 이상적인 환경을 조성할 수 있습니다."
 cstorms.2000.desc_tech: "\n첨단 에너지 조작 방식을 이용하면 [target.GetName]에 원료를 과포화시켜 구조적으로 더욱 복잡한 폭풍을 형성할 수 있습니다."
 cstorms.2000.desc_common_2: "\n시간은 많이 걸리겠지만, 결과적으로 [owner.GetName]에 엄청난 성과를 가져다줄 것입니다. 작업이 완료된 후에도 항성 자체는 온전하게 남습니다."
 cstorms.2000.a: "항성을 초전하 상태로 만드세요."
 cstorms.2000.a.tt: "$approach_situation_initiate_storm_supercharge_tt$"
 cstorms.2000.b: "항성을 과포화 상태로 만드세요."
 cstorms.2000.b.tt: "$approach_situation_initiate_storm_overfeed_tt$"
 cstorms.2000.b.tt.allow: "다음 중 하나가 필요합니다:$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_agitate$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$£physics£ §Y$tech_basic_science_lab_3$§! 기술을 보유$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_volatile_motes_tt$$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_destabilize$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$£physics£ §Y$tech_mine_dark_matter$§! 기술을 보유$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_scramble$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$£physics£ §Y$tech_hyper_drive_3$§! 기술을 보유$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_rare_crystals_tt$"
 cstorms.2000.c: "프로젝트를 중단하세요."
 cstorms.2010.name: "폭풍 보정"
 cstorms.2010.desc_irradiate_only: "§H[target.solar_system.GetName]§! 성계의 $default_storm$을 위한 준비 과정이 중요한 단계에 이르렀습니다. 다음 단계는 §H[target.GetName]§!의 태양풍을 조작해 §Y$solar_storm$§!을 만드는 것으로, 고도의 집중과 새로운 자원의 투입이 필요합니다."
 cstorms.2010.desc_others: "§H[target.solar_system.GetName]§! 성계의 $default_storm$을 위한 준비 과정이 중대한 전환점에 도달했습니다. 다음 단계는 무척 중요하며, 자원을 더욱 집중해서 투입해야 원하는 결과를 이룰 수 있습니다."
 cstorms.2010.a: "태양풍을 강화하세요."
