 particle_storm_aftermath_custom_desc: "§Y$particle_storm$§!이 행성 전역에 부식성 입자를 남기고 떠났습니다."
 gravity_storm_aftermath_custom_desc: "§Y$gravity_storm$§!이 지나가자, 식민지 중 하나에서 중력 이상 현상이 발생했습니다."
