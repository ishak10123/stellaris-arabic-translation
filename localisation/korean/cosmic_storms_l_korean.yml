 NAME_adakkaria: "아드아카리아"
 patriotic_institute_true_potential_unleashed: "아드아카리아의 진정한 잠재력"
 patriotic_institute_true_potential_unleashed_desc: "아드아카리아 실험에 숨겨져 있던 진실은 우리에게 카타르시스를 불러일으켰습니다."
 storm_hunkered_down_modifier: "대비 태세"
 storm_hunkered_down_modifier_tt: "§R유지비§!가 2배로 증가하지만, §Y$building_storm_resistant_production$§! 및 §Y$building_advanced_storm_resistant_production$§!의 §G효과§! 또한 2배로 증가합니다."
 storm_hunkered_down_modifier_disabled_tt: "$decision_hunker_down$ 결정이 종료됩니다. §G유지비§!가 반으로 감소하고, §Y$building_storm_resistant_production$§! 및 §Y$building_advanced_storm_resistant_production$§!의 §R효과§! 또한 원래대로 돌아갑니다."
 cultivated_worldscaping_modifier: "$decision_cultivated_worldscaping$"
 cultivated_worldscaping_modifier_desc: "행성의 풍경을 변경해 생명보다는 형태에 중점을 둠으로써 고차원적인 기하학적 경험을 만들었습니다. 남아 있는 동식물은 일률적으로 획일화하여 혹시 모를 분란 요소를 차단했습니다."
 cultivated_worldscaping_modifier_tt: "- 최대 지구 §Y+3§!\n- 최대 자원 지구 §G+75%§!\n- §Y$default_storm$§! 보호 §G+10%§!\n- 거주 적합도 §R-20%§!"
 #Planetary Decisions
 decision_hunker_down: "대비 태세"
 decision_hunker_down_desc: "이 행성의 주민들은 우주 폭풍이 일으킬 수 있는 최악의 사태를 대비해 가능한 모든 조치를 취할 것입니다."
 decision_stop_hunker_down: "$decision_hunker_down$ 종료"
 decision_stop_hunker_down_desc: "우주 폭풍의 위험이 한풀 꺾였으니 이제 경계를 풀어도 될 것 같습니다. 하지만 모든 게 정말 '원래대로' 돌아갈 수 있는 걸까요?"
 decision_cultivated_worldscaping: "행성 조경 조성"
 decision_cultivated_worldscaping_desc: "이 행성을 완벽한 대칭을 기념하는 명소로 빚어냅시다. 눈앞에 펼쳐진 기하학적 순수함을 바라보노라면 평온을 얻을 수 있을 것입니다."
 decision_cultivated_worldscaping_natural_blockers_fail_tt: "§R먼저 모든 £blocker£ 차단물을 제거해야 합니다.§!"
 #Civics
 civic_astrometeorology: "우주 기상학"
 civic_astrometeorology_desc: "자연의 힘에 깊은 경외심을 느낀 이 종족은 자연 현상의 원리를 밝혀내기 위해서라면 어떠한 고난도 마다하지 않습니다. 이들은 우주 기상학에 지대한 관심을 지니고 우주 곳곳으로 나아갑니다. 이들이 추구하는 야심 찬 계획의 중심은 우주의 모든 현상 중에 가장 환상적이면서도 파괴적인 잠재력을 지닌 현상, 바로 우주 폭풍입니다.\n"
 civic_astrometeorology_effect_tooltip: "$t$- $AVAILABLE_BUILDINGS$ £building£ ['building:building_astrometeorology_observation_center']$TABBED_NEW_LINE$- $ADDITIONAL_BUILDINGS_STRING$ £building£ §Y$building_astrometeorology_observation_center$§!"
 civic_astrometeorology_hive: "기후 모형 분석"
 civic_astrometeorology_hive_desc: "우주적 규모의 기상 현상이 자아내는 광경이 별의 세계를 항해하던 드론 집단의 의식을 사로잡았습니다. 우주 폭풍에서조차 자연의 경이를 발견해 내는 이 드론들은, 환경 현상을 연구한다는 단 하나의 숭고한 목적을 위해 자신들의 영역을 확장합니다."
 civic_astrometeorology_hive_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_machine: "기후 모형 분석"
 civic_astrometeorology_machine_desc: "자연의 힘이 기계 제국에도 막대한 영향을 줄 수 있다는 사실을 깨달은 이 기계 집단은 각고의 노력을 기울여 자연 현상을 연구합니다. 이들의 기후 모형은 흥미로운 우주적 현상을 단 하나도 빠뜨리는 일 없이, 경건하다고 말할 수 있을 정도의 태도로 세심하게 묘사합니다. 그중에서도 이들이 가장 심혈을 기울여 연구하고 있는 것은, 우주의 모든 현상 중에 가장 환상적이면서도 파괴적인 잠재력을 지닌 현상, 바로 우주 폭풍입니다."
 civic_astrometeorology_machine_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_megacorp: "기상 활용"
