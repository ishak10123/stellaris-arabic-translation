 resolution_cosmic_storms_storm_encouragement_mandate: "폭풍 이동 명령"
 resolution_cosmic_storms_storm_encouragement_mandate_desc: "우주 폭풍은 중요한 입자와 에너지를 분산시킴으로써 은하계에 생명을 불어넣고, 접촉하는 행성과 성계를 새롭게 변화시킵니다. 이 자연스러운 흐름을 방해해서는 안 됩니다."
