 civic_storm_callers: "폭풍교도"
 civic_storm_callers_desc: "태곳적부터 이 사회는 폭풍을 불러오는 의식을 계승해 왔습니다. 그리고 시간이 흘러, 이들은 의식과 기술적 혁신을 결합해 그 효율성을 더욱 높였습니다. 우주 시대의 여명이 밝아오는 지금, 이들은 자신이 지닌 지식과 함께 별이 수놓인 세계로 발을 내딛고자 합니다."
 civic_storm_callers_effect_tooltip: "- $AVAILABLE_BUILDINGS$ £building£ ['building:building_storm_summoning_theater']\n- [entertainer.GetIcon] §H[entertainer.GetName]§! 직업을 £job_storm_dancer£ §H$job_storm_dancer$§! 직업으로 대체\n- $SPECIES_TRAITS$ ['trait:trait_storm_touched']"
 civic_storm_callers_megacorp: "폭풍 인플루언서"
 civic_storm_callers_megacorp_desc: "신성 의식을 중계하는 것으로 시작했을 뿐인 방송이 이제는 거대한 언론 복합 기업으로 거듭났습니다. 예언자와 사제는 카리스마 넘치는 연예인들로 대체되었고, 이들은 시청자들의 관심을 두고 경쟁을 벌이며 우주 폭풍의 도래를 호소합니다."
 civic_storm_callers_megacorp_effect_tooltip: "$civic_storm_callers_effect_tooltip$\n- £building£ §Y$building_amusement_megaplex$§! 기업 건물이 추가 §Y지사 가치§!를 생성하고 우리 수도에 £job_merchant£ §Y상인§! 직업을 §G50§! 추가"
 mod_capital_storm_diplo_weight_mult: "수도가 §Y우주 폭풍§!의 영향을 받는 동안 $MOD_DIPLO_WEIGHT_MULT$"
