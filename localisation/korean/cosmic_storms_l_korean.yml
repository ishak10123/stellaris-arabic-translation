 approach_stormfall_shredding_tt: "$situation_speed_tt$: §G+20%§!"
 situation_stormfall_pause_desc: "$situation_cyberization_pause_desc$"
 situation_stormfall_project_pause_desc: "특별 프로젝트"
 situation_stormfall_leader_ongoing: "지도자 폭풍 증폭"
 situation_stormfall_building: "폭풍 유인 건물"
 situation_stormfall_module: "$sm_storm_attraction_computer$"
 situation_stormfall_finish_project_tt: "특별 프로젝트를 완료해야 함: §Y$PROJECT_TEMPEST_BREWING$§!"
 #Modifiers for Stormfall event chain
 cs_storm_chasers_storm_fruition: "폭풍의 결실"
 cs_storm_chasers_storm_fruition_desc: "우리만의 우주 폭풍이 깨어남에 따라 앞으로 몇 년 동안 우리 국민들이 활력을 받습니다."
 cs_storm_chasers_storm_fruition_gestalt: "$cs_storm_chasers_storm_fruition$"
 cs_storm_chasers_storm_fruition_gestalt_desc: "우리만의 우주 폭풍이 깨어남에 따라 앞으로 몇 년 동안 우리 의식이 활력을 받습니다."
 cs_storm_chasers_homeworld_storm_attraction: "극단적 기후"
 cs_storm_chasers_homeworld_storm_attraction_desc: "쉼 없이 몰아치는 폭풍 때문에 이 행성에 사는 생명체는 전혀 다른 두 성향으로 갈라졌습니다. 한쪽은 혼돈에서 벗어날 피난처를 찾아다니며, 다른 한쪽은 광풍의 스릴을 한껏 만끽합니다."
 cs_storm_chasers_homeworld_storm_attraction_tt: "§Y$default_storm$§! 유인 강도: §P낮음§!"
 #Special project
 PROJECT_TEMPEST_BREWING: "광풍의 전조"
 PROJECT_TEMPEST_BREWING_DESC: "[Owner.Capital.GetName]에 위치한 이 일생일대의 폭풍은 특별한 성질을 갖춘 덕분에 조정 작업에 안성맞춤입니다. 그러나 우선은 폭풍의 기본 조성을 더 자세히 파악해야 합니다. 잘만 하면 우리가 또 어떤 굉장한 현상을 만들어 낼지 아무도 모르는 일입니다."
 #Events
 cstorms.3100.name: "폭풍 출현"
 cstorms.3100.desc: "§Y[owner.capital_scope.GetName]§!에서 자연적으로 발생한 폭풍에서 우리는 경이로운 자연의 힘을 엿볼 수 있었습니다. 전율이 이는 광풍의 격렬함과 파괴 후 이어지는 새로운 탄생은 그 전부가 장엄하기 그지없습니다.\n\n최근 행성 전역의 기상 관측소에서 놀라운 현상을 감지했습니다. 대폭풍들이 무리를 지어 온 행성을 휩쓸 태세를 갖추고 있었던 것입니다.\n\n우리 [Root.Owner.GetScientistPlural]들은 이를 '반가운 우연'이라고 기뻐하며, 이렇게 희귀한 광풍은 아주 파격적인 현상을 목격할 수 있는 최적의 환경을 만들어 줄 것이라고 평했습니다."
 cstorms.3100.a: "현장에 나갈 준비를 하세요!"
 cstorms.3105.name: "광풍의 전조"
 cstorms.3105.desc: "우리 [Root.Owner.GetScientistPlural]들이 폭풍 조작의 비밀을 밝혀냈습니다. 폭풍의 위력 예측치는 엄청난 수준으로, 우리 모두를 들뜨게 하기에 충분했습니다. 우리는 시험을 받을 것이며, 이를 통해 가장 가치 있는 존재로 거듭날 것입니다.\n\n특수 건물은 폭풍을 일으키는 조정 센터 역할을 할 수 있습니다. §Y[owner.capital_scope.GetName]§!에 폭풍을 끌어당기는 건물을 건설한다면 궁극의 폭풍을 향한 우리의 진보를 더욱 앞당길 수 있을 것입니다."
 cstorms.3105.a: "근사하네요."
 cstorms.3105.a.tt: "수도 행성의 §Y폭풍 유인 건물§!:\n$situation_speed_tt$: §G+10%§!\n\n수도 성계 기지의 §Y$sm_storm_attraction_computer$§!:\n$situation_speed_tt$: §G+10%§!\n\n"
 cstorms.3110.name: "폭풍의 도래"
 cstorms.3110.desc.outro: "자연 폭풍에 에너지를 주입해서 전기 폭풍이 발생할 조건을 인위적으로 형성할 수 있습니다.\n\n행성 핵을 조작하면 [owner.capital_scope.GetName]의 자기장 방향을 바꿔 자기 폭풍을 일으킬 수 있습니다.\n\n마지막으로 특정 행성 지점에서 타키온 극성을 역전시킨다면, 역장을 변화시켜 중력 폭풍을 만들어 낼 수 있습니다."
 cstorms.3110.desc.regular: "우리는 [owner.capital_scope.GetName]의 격렬한 진동에 박차를 가해 궁극의 경험으로 탈바꿈하는 방법을 익혔습니다. 그러나 어떤 폭풍이 가장 영광스러울지 결정해야 합니다.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.hive: "우리는 [owner.capital_scope.GetName]의 격렬한 진동에 박차를 가해 궁극의 경험으로 탈바꿈하는 방법을 익혔습니다. 그러나 어떤 폭풍이 가장 영광스러울지 아직 결정을 내리지 못했습니다.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.machine: "우리는 [owner.capital_scope.GetName]의 격렬한 진동에 박차를 가해 궁극의 경험으로 탈바꿈하는 방법을 익혔습니다. 그러나 우리의 가치 판단 프로세스는 어떤 폭풍이 가장 영광스러운지 결정하지 못하고 반복되는 루프에 갇혀 있습니다.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.a: "구름에 전기를 주입하세요."
 cstorms.3110.a.tt: "행성 §Y$electric_storm$§!을 일으킵니다."
 cstorms.3110.b: "핵을 자성화하세요."
 cstorms.3110.b.tt: "행성 §Y$magnetic_storm$§!을 일으킵니다."
 cstorms.3110.c: "중력파를 만드세요."
 cstorms.3110.c.tt: "행성 §Y$gravity_storm$§!을 일으킵니다."
 cstorms.3130.name: "일촉즉발"
 cstorms.3130.desc.electric: "하늘이 우르릉거리고, 사방에서 번개가 번쩍입니다!\n\n이 강력한 방전 현상은 행성 표면에 전기를 흘려보낼 뿐만 아니라 우리에게도 엄청난 흥분을 안겨 주었습니다! 전기 폭풍으로 농업은 어려움을 겪겠지만, 에너지 생산에는 상당한 보탬이 될 것입니다."
 cstorms.3130.desc.magnetic: "[owner.capital_scope.GetName]의 자기장이 요동치고, 나침반이 격렬하게 회전합니다.\n\n모성의 지각을 뚫은 우리는 자성화된 물질을 핵에 직접 주입했고, 자연 폭풍은 그로 인해 발생한 자기장 변동을 더욱 증폭했습니다. 이 현상으로 인해 에너지 생성에는 다소 곤란을 겪겠지만, 새로운 광물 매장지를 탐지하는 일은 한결 수월해질 것입니다."
 cstorms.3130.desc.gravity: "단순한 움직임이 이렇게나 흥겨웠던 적은 처음입니다! 중력이 순식간에 증가했다가 다시 감소합니다.\n\n[owner.capital_scope.GetName] 전역에 흩어져 있는 입자 조작 지점에서 타키온의 극성을 반대로 바꾸자, 타키온이 파지직거리는 에너지 구체 형태로 모여들었습니다. 이윽고 구체는 빠르게 소멸했으며([Root.Owner.GetScientistPlural]들은 시간을 역행한 것이라고 추측했습니다) 곧바로 중력파가 사방으로 파문을 일으켰습니다.\n\n이 변동으로 인해 행성 표면에서의 작업은 어려워지겠지만, 궤도 기지에서의 작업 능률은 개선될 것으로 보입니다."
 cstorms.3130.a: "장난 아니네요."
 cstorms.3130.a.tt.regular: "행성 폭풍이 지속되는 동안:\n$MOD_POP_HAPPINESS$: §G+20%§!"
 cstorms.3130.a.tt.gestalt: "행성 폭풍이 지속되는 동안:\n$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.name: "기분 좋은 떨림"
 cstorms.3140.desc.intro: "[Root.Owner.GetScientistPlural]들은 성계 전체가 격렬한 에너지로 소용돌이치는 지금, 행성 폭풍을 일으켰을 때 적용했던 개념을 훨씬 더 큰 규모로 적용할 수 있다고 확신에 찬 목소리로 말했습니다."
 cstorms.3140.desc.electric: "$cstorms.3140.desc.intro$\n\n우리는 기존의 지식과 기반 시설을 이용해 이를 $electric_storm$으로 변환할 수 있으며, 아니면 새롭고 흥미로운 것을 만들어 볼 수도 있습니다.\n\n특정 광물을 투입하면 폭풍의 자기 공명을 증폭할 수 있을 것으로 보이며, 합금을 활용한다면 폭풍을 중력 우물로 바꿔 놓을 수 있을 것입니다."
 cstorms.3140.desc.magnetic: "$cstorms.3140.desc.intro$\n\n우리는 기존의 지식과 기반 시설을 이용해 이를 $magnetic_storm$으로 변환할 수 있으며, 아니면 새롭고 흥미로운 것을 만들어 볼 수도 있습니다.\n\n태양을 충전하면 폭풍의 전위를 증폭할 수 있을 것으로 보이며, 합금을 활용한다면 폭풍을 중력 우물로 바꿔 놓을 수 있을 것입니다."
 cstorms.3140.desc.gravity: "$cstorms.3140.desc.intro$\n\n우리는 기존의 지식과 기반 시설을 이용해 이를 $gravity_storm$으로 변환할 수 있으며, 아니면 새롭고 흥미로운 것을 만들어 볼 수도 있습니다.\n\n특정 광물을 투입하면 폭풍의 자기 공명을 증폭할 수 있을 것으로 보이며, 태양을 충전하면 폭풍의 전위를 증폭할 수 있을 것입니다."
 cstorms.3140.a: "태양을 충전하세요."
 cstorms.3140.a.tt: "우주 §Y$electric_storm$§!을 일으킵니다.\n§Y2§!년 동안:$TABBED_NEW_LINE$$mod_country_energy_produces_mult$ : §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+20%§!"
 cstorms.3140.a.infra: "기존의 기반 시설을 사용하세요."
 cstorms.3140.a.tt.electric: "우주 §Y$electric_storm$§!을 일으킵니다.\n§Y2§!년 동안:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+5%§!"
 cstorms.3140.b: "자성화된 광물을 투입하세요."
 cstorms.3140.b.tt: "우주 §Y$magnetic_storm$§!을 일으킵니다.\n§Y2§!년 동안:$TABBED_NEW_LINE$$mod_country_minerals_produces_mult$ : §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+20%§!"
 cstorms.3140.b.tt.magnetic: "우주 §Y$magnetic_storm$§!을 일으킵니다.\n§Y2§!년 동안:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+5%§!"
 cstorms.3140.c: "특수 합금을 활용하세요."
 cstorms.3140.c.tt: "우주 §Y$gravity_storm$§!을 일으킵니다.\n§Y2§!년 동안:$TABBED_NEW_LINE$$mod_country_alloys_produces_mult$ : §R-25%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+20%§!"
 cstorms.3140.c.tt.gravity: "우주 §Y$gravity_storm$§!을 일으킵니다.\n§Y2§!년 동안:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+5%§!"
 cstorms.3160.name: "폭풍이 지난 후"
 cstorms.3160.desc: "행성 폭풍이 흩어지자 [owner.capital_scope.GetName]에 새로운 장기적 특성이 나타났습니다. 폭풍이 다시 한번 변화와 재탄생을 가져온 것입니다.\n\n국지적 폭풍도 이만큼 흥분됐는데, 진정한 우주 폭풍은 어떨지 상상만 해도 짜릿합니다. 하루빨리 만나 보고 싶군요."
 cstorms.3160.a: "정말 인상적이군요!"
 cstorms.3160.a.tt.electric: "폭풍으로 [owner.capital_scope.GetName]에 전기가 흐르는 §Y$d_buzzing_plains$§!이 생겼습니다."
 cstorms.3160.a.tt.magnetic: "폭풍으로 [owner.capital_scope.GetName]에 새로운 §Y$d_geothermal_vent$§!이 생겼습니다."
 cstorms.3160.a.tt.gravity: "폭풍으로 [owner.capital_scope.GetName]에 §Y$d_rich_mountain$§!이 드러났습니다."
 cstorms.3170.name: "우주의 형태"
 cstorms.3170.desc.intro: "우리는 [owner.capital_scope.GetStarName] 주변에서 어마어마한 우주 폭풍의 출현을 앞당길 수 있습니다. 이젠 결단을 내릴 때입니다. 우리는 진정 일생일대의 모험을 할 준비가 되었을까요?\n\n"
 cstorms.3170.desc.scientist.snippet: "§Y[event_target:storm_scientist.GetName]§!(이)가 이끄는 [Root.Owner.GetScientistPlural] 팀은 이러한 초기 우주 폭풍의 패턴을 연구하여 폭풍 형성을 조작하는 최적의 방법을 찾을 수 있습니다.\n\n"
 cstorms.3170.desc.commander.snippet: "§Y[event_target:storm_commander.GetName]§!(이)가 이끄는 군대를 보내면, 막 태어난 광풍을 터뜨려 에너지가 대량으로 쏟아지게 할 수 있습니다.\n\n"
 cstorms.3170.desc.outro: "이 지도자가 이끄는 팀은 돌아오지 못할 수도 있으나, 반대로 엄청난 성과를 거둘 수도 있습니다!"
 cstorms.3170.desc.both: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.scientist: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.commander: "$cstorms.3170.desc.intro$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.none: "이제 남은 일은 우주 폭풍이 구체화되기를 기다리는 것뿐입니다.\n\n너무 큰 기대감에 기다리기가 힘들지만, 그 보상은 더욱 클 것입니다."
 cstorms.3170.a: "[Root.Owner.GetScientistPlural]들을 파견하세요."
 cstorms.3170.a.tt: "과학자 §Y[event_target:storm_scientist.GetName]§!(이)가 일시적으로 연락이 두절되어 죽을 위기에 처했습니다."
 cstorms.3170.b: "군대에 진격 명령을 내리세요."
 cstorms.3170.b.tt: "사령관 §Y[event_target:storm_commander.GetName]§!(이)가 일시적으로 연락이 두절되어 죽을 위기에 처했습니다."
 cstorms.3170.c: "안전하게 기다립시다."
 cstorms.3190.name: "모든 것의 시작"
 cstorms.3190.desc.intro: "처음에는 우주라는 직물에 생겨난 작은 주름에 불과했습니다. 에너지가 춤을 추고, 합쳐지고, 충돌했고, 약간의 외계 입자와 질량을 더하자 마침내 우리 항성을 맴도는 갓 태어난 폭풍이 그 야수와도 같은 모습을 드러냈습니다.\n\n우리의 바람대로 빚어진 이 자연과 독창성의 선물이 하늘을 뒤덮습니다."
 cstorms.3190.desc.success: "$cstorms.3190.desc.intro$ 폭풍 속에서도 굳건한 우리 지도자의 모습은 열광적인 반응을 자아냅니다.\n\n해냈습니다. 오롯이 우리 힘만으로 해낸 것입니다. 어서 이 폭풍에 뛰어들어 평생 잊지 못할 전율을 만끽합시다!"
 cstorms.3190.desc.failure: "$cstorms.3190.desc.intro$ 우리 지도자는 폭풍 속에 사라지고 말았습니다. 허나 이 얼마나 멋진 죽음입니까!\n\n해냈습니다. 오롯이 우리 힘만으로 해낸 것입니다. 어서 이 폭풍에 뛰어들어 평생 잊지 못할 전율을 만끽합시다!"
 cstorms.3190.desc.wait: "$cstorms.3190.desc.intro$ 기나긴 기다림 끝에 드디어 그날이 왔습니다.\n\n해냈습니다. 오롯이 우리 힘만으로 해낸 것입니다. 어서 이 폭풍에 뛰어들어 평생 잊지 못할 전율을 만끽합시다!"
 cstorms.3190.a.success: "갑시다!"
 cstorms.3190.a.failure: "모두 목도하라!"
 cstorms.3190.a.failure.tt: "\n우리 지도자는 영광스럽게 세상을 떠났습니다."
 cstorms.3190.a.wait: "완벽하군요!"
 ### Storm Fever ###
 #Modifiers for Storm Fever event chain
 cs_storm_chasers_bad_vibes: "가라앉은 흥분"
 cs_storm_chasers_bad_vibes_desc: "갑자기 권태감이 밀려옵니다."
 cstorms.3205.name: "스릴의 목적이란"
 cstorms.3205.normal: "우주의 떨림이 멈췄습니다. 평소처럼 이런저런 시도를 해 봤지만, 스릴이 예전만 못합니다. 우리가 놀라운 업적을 달성한 것은 의심할 여지가 없지만, 무언가 빠진 느낌을 지울 수가 없습니다. 범위 면에서나, 야심 면에서나, 선조들의 전설적인 업적이 드리운 그림자가 너무 짙은 탓입니다.\n\n\"이 무기력함은 참으로 실존주의적이군!\" 우리 제국의 최고 석학 중 하나가 말했습니다. \"공허를 가로지르며, 우리는 우리 자신의 공허마저 열어젖혀 버린 것인가?\"\n\n이 불안은 합리적이며, 우리는 더 늦기 전에 행동해야만 합니다. 새로운 시작을 위해 초심으로 돌아갑니다. 아드레날린을 최대로 끌어내고자 설계된 도전들이 기다립니다!"
 cstorms.3205.gestalt: "우주의 떨림이 멈췄습니다. 평소처럼 이런저런 시도를 해 봤지만, 스릴이 예전만 못합니다. 우리가 놀라운 업적을 달성했다는 사실은 의심할 여지가 없지만, 무언가 빠진 듯한 느낌을 도저히 지울 수가 없습니다.\n\n불현듯 떠오른 여러 의문이 머릿속을 뒤흔듭니다. 우리는 우리 스스로를 제대로 파악하고 있는 걸까요? 우리의 전성기는 이미 지나 버린 걸까요? 하나 된 집단으로서, 우리는 계속 발전해야 할 책임이 있습니다.\n\n이 불안은 합리적이며, 우리는 더 늦기 전에 행동해야만 합니다. 새로운 시작을 위해 초심으로 돌아갑니다. 아드레날린을 최대로 끌어내고자 설계된 도전들이 기다립니다!"
 cstorms.3205.a: "스릴은 이제 막 시작되었을 뿐입니다."
 cstorms.3205.tooltip: "상황 일지에서 선조들이 남긴 도전을 확인하세요."
 cstorms.3215.name: "한계 돌파"
 cstorms.3215.intro: "해냈습니다!\n\n순수한 스릴 추구를 위해 내달린 끝에 모든 도전을 완료할 수 있었습니다. 지난 몇 년간 실로 놀라운 성과를 이뤄 냈습니다."
 cstorms.3215.desc: "$cstorms.3215.intro$\n\n우리는 역사상 가장 뛰어났던 모험가들처럼 우리 자신을 한계 너머로 몰아붙였습니다.\n\n그뿐만 아니라, 자연의 격노를 직접 맞닥뜨린 덕분에 우리 존재의 의미에 관해 놀라운 통찰을 얻을 수 있었습니다."
 cstorms.3215.a: "그야말로 최고의 컴백이군요!"
 ### Storm Frenzy ###
 cs_storm_chasers_storm_frenzy_1: "폭풍 광란"
 cs_storm_chasers_storm_frenzy_1_desc: "'끝판왕'의 출현은 우리를 열광의 도가니로 몰아넣었습니다."
 cs_storm_chasers_storm_frenzy_2: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_3: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_1_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_1_gestalt_desc: "'끝판왕'의 출현으로 우리 의식에 불이 붙었습니다."
 cs_storm_chasers_storm_frenzy_2_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_storm_frenzy_3_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_the_code: "규율"
 cs_storm_chasers_the_code_desc: "우리를 움직이는 원동력은 패권도, 물질적 이득도 아닙니다. 스스로의 한계를 시험하기 위해 살아가는 우리는 언제나 실존의 한계를 추구합니다."
 cs_storm_chasers_the_code_gestalt: "규율"
 cs_storm_chasers_the_code_gestalt_desc: "$cs_storm_chasers_the_code_desc$"
 every_empire_opinion_hit: "우리 제국에 대한 §Y[global_event_country.GetGalCommunityOrGalImperium]§!의 우호도 변동:"
 nexus_opinion_first_hit: "집합적 불안"
 nexus_opinion_first_hit_tt: "$every_empire_opinion_hit$ §R$@first_hit_opinion_change$§!"
 nexus_opinion_second_hit: "집합적 혼란"
 nexus_opinion_second_hit_tt: "$every_empire_opinion_hit$ §R$@second_hit_opinion_change$§!"
 nexus_opinion_third_hit: "집합적 공포"
 nexus_opinion_third_hit_tt: "$every_empire_opinion_hit$ §R$@third_hit_opinion_change$§!"
 nexus_opinion_summon_hit: "집합적 분노"
 nexus_opinion_summon_hit_tt: "$every_empire_opinion_hit$ §R$@nexus_hit_opinion_change$§!"
 nexus_opinion_the_code: "집합적 조화"
 cs_stormfrenzy_chain_title: "폭풍 광란"
 cs_stormfrenzy_chain_desc: "우리는 언제나 한계를 시험해 왔습니다. 선조들이 이룬 위업에서 영감을 받아, 이제 우리는 우리가 꿈꾸던 폭풍을 직접 만들어 내는 데 도전합니다."
 cstorms.3220.name: "구도자의 신조"
 cstorms.3220.desc: "우리는 언제 어디에서나 스릴을 추구합니다. 하루가 멀다 하고 놀라운 현상을 발견하고 매일같이 커다란 도전에 맞서고 있지만, [ruler.GetRegnalName](은)는 아직 멀었다고 생각하는 듯합니다.\n\n\"우주 폭풍의 핵심은 그 순수한 잠재력에 있습니다. 그 잠재력을 끌어낼 수만 있다면, 현상 유지라는 족쇄를 끊어내고 생에 다시 없을 흥분을 만들어 낼 수 있겠죠.\"\n\n때는 무르익었습니다. 진정한 역대급 규모의 폭풍, 흥겨운 대혼란의 연결체 '끝판왕'을 불러올 시간입니다. 이제 두 가지 사소한 세부 사항만이 남았는데, 첫째는 완벽한 폭풍을 불러일으킬 방법을 검증하기 위한 최종 연구고, 둘째는 외교 관계입니다.\n\n이런 계획을 실행에 옮긴다면 분명 온 은하계로부터 분노를 불러일으킬 것입니다."
 PROJECT_SOW_THE_BIG_ONE: "끝판왕 불러내기"
 PROJECT_SOW_THE_BIG_ONE_DESC: "폭풍을 키워 낼 기술은 있지만, 근처에 막 자라나기 시작한 폭풍이 없습니다. 손질할 폭풍을 직접 만들어 낼 방법을 연구해야 합니다."
 cstorms.3222.name: "암흑 물질 조성"
 cstorms.3222.desc: "암흑 물질의 독특한 성질은 끝판왕을 불러일으키기에 제격입니다. 우리 수도 성계를 둘러싼 우주 공간에 이 희귀한 물질을 주입했습니다. 이제 폭풍의 첫 물결이 나타나기를 기다릴 뿐입니다.\n\n하지만 벌써부터 원치 않았던 관심을 끌고 말았습니다. 이웃 제국들이 항의를 제기하기 시작한 것입니다. 우리 [Root.Owner.GetScientistPlural] 하나가 한숨을 쉬며 말했습니다. \"모두가 우리만큼 파도타기를 좋아하는 건 아닌가 봅니다.\""
 cstorms.3222.a: "어서 시작합시다."
 cstorms.3222.b: "자원을 좀 절약해야겠군요."
 PROJECT_DARK_SEEDING: "외계 미끼"
 PROJECT_DARK_SEEDING_DESC: "암흑 물질을 우주 공간에 조심스럽게 주입해, 해당 성계에 우리 뜻대로 손볼 수 있는 폭풍을 불러냅니다."
 cstorms.3224.name: "끝판왕의 조짐"
 cstorms.3224.desc: "믿기지 않는군요! 다가오고 있는 폭풍의 떨림이 벌써부터 느껴집니다. 아직 [Root.Owner.GetScientistPlural]들의 작업이 한창 진행 중이긴 하지만, 우리는 이미 끝판왕을 불러내는 데 한 걸음 더 다가갔습니다.\n\n그러나 이웃 제국들은 별로 반갑지 않은 눈치입니다. 우리가 이해하지도 못한 힘을 마구잡이로 다루고 있다며 항변하고 있으며, 이는 이미 우리 외교 관계에 영향을 주었습니다."
 cstorms.3224.a: "어쩔 수 없죠."
 cstorms.3225.name: "끝판왕 사육"
 cstorms.3225.desc: "데이터가 의미하는 바는 명확합니다. 우리가 무언가를 폭풍에 집어넣으면, 비슷한 무언가가 돌아옵니다. 즉, 우리가 알맞은 종류의 자원을 폭풍에 집어넣으면 폭풍이 그 성질을 띠게 되어, 어떤 유형의 폭풍이든 막대한 규모로 만들어 낼 수 있는 것입니다.\n\n은하계 사람들은 계속해서 우려를 표했지만, 세기의 폭풍이 이제 곧 태어날 텐데 그런 게 뭐가 중요하겠습니까. 가진 걸 모두 집어넣읍시다!"
 cstorms.3225.a: "폭풍에게 밥을 줍시다!"
 cstorms.3225.b: "자원이 더 많이 필요하겠군요."
 cstorms.3226.name: "궁극의 잔치"
 cstorms.3226.desc: "자라나기 시작한 폭풍에 다양한 물질을 주입하면 역대급 규모로 키워 낼 수 있습니다. 이 엄청난 작업을 진행하려면 우리가 보유한 자원을 일정한 규격으로 표본화해야 합니다."
 PROJECT_EVERY_ITEM_ON_THE_MENU: "히든 메뉴"
 PROJECT_EVERY_ITEM_ON_THE_MENU_DESC: "이제 우리는 알맞은 물질을 주입하면 우주 폭풍을 조작할 수 있다는 사실을 알게 되었습니다. 이 폭풍에 먹이를 주려면 일정한 규격으로 표본을 제작해야 합니다."
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT: "반복: $cstorms.3225.name$"
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT_DESC: "완벽한 폭풍을 만들어 내려면, 자원을 신중하고 정확하게 표본으로 제작해야 합니다."
 cstorms.3227.name: "마무리 작업"
 cstorms.3227.desc: "머릿속이 흥분으로 벅차오릅니다. 우리가 나아갈 길이 한층 더 명확해졌습니다. 더 멀리, 더 강하게, 끝까지 밀어붙여, 우주의 열기 그 자체와 하나가 되는 겁니다! 끝판왕을 불러일으킬 준비가 모두 끝났습니다. 이제 마무리 작업만을 남겨 두고 있습니다.\n\n이웃 제국들은 벌써부터 열불을 내며 우리가 불러낼 '$nexus_storm$'이라는 것이 은하계에 대혼란을 일으킬 것이라 주장하고 있습니다. 하여간 흥을 깨는 데에는 도가 튼 녀석들입니다. 이들이 우리의 역대급 프로젝트를 망치게 둬도 될까요? 지금 바로 선택해야 합니다."
 cstorms.3227.a: "끝판왕이야말로 우리 궁극의 운명입니다!"
 cstorms.3227.a.tt: "$nexus_storm$이 40일 안에 출현합니다.\n$nexus_opinion_third_hit_tt$"
 cstorms.3227.b: "그만두죠. 아무리 그래도 이건 아닌 것 같습니다!"
 cstorms.3227.b.tt: "$nexus_storm$ 생성을 중단했습니다.\n§Y[global_event_country.GetGalCommunityOrGalImperium]§!의 우리에 대한 우호도가 40일 안에 증가합니다."
 cstorms.3230.name: "끝판왕의 탄생"
 cstorms.3230.desc: "우리는 지금 새로운 경험으로 향하는 문턱에 서 있습니다. 궁극의 재난을 맞이할 시간입니다. 우리 폭풍 기수들이 맞서지 못할 것은 없으며, 우리는 어떠한 도전도 마다하지 않습니다.\n\n온 은하계가 이들의 활약을 보게 될 것입니다!"
 cstorms.3230.a: "실행하세요."
 has_spawned_nexus_storm_tt: "$TRIGGER_FAIL$§Y$nexus_storm$§!을 생성함"
 cstorms.3235.name: "폭풍 종결"
 cstorms.3235.desc: "우리는 많은 것을 배웠습니다. 은하계는 마음대로 갖고 노는 장난감이 아니라, 경험해야 할 모험의 장이라는 사실을 드디어 깨닫게 됐습니다.\n\n[ruler.GetRegnalName](이)가 좋은 말을 남겨 주었습니다. \"삶에는 항상 스릴이 넘쳐나죠. 우리는 언제나 다음 도전을 찾아 나서겠지만, 존중하는 자세를 잃지 말아야 합니다. 이것이 우리가 선택한 길이며, 추구해야 할 모습이니까요.\""
 cstorms.3235.a: "이제 긴장들 푸세요!"
 cstorms.3235.a.tt: "$every_empire_opinion_hit$ §G+$@the_code_total_change$§!"
 #Storm Fever Challenges
 cs_stormfever_chain_title: "폭풍의 열기"
 cs_stormfever_chain_desc: "새로운 경지에 다다르고, 즐거움을 깨닫고, 한계를 시험하기 위해 우리는 새로운 시련에 도전합니다. 한바탕 즐겨 봅시다!"
 challenges_completed: "도전 완료"
 MISSION_CS_STORM_FEVER_CHALLENGE_1: "폭풍 안에서 함대 격파"
 MISSION_CS_STORM_FEVER_CHALLENGE_1_DESC: "열띤 전장은 예로부터 우리의 능력을 가늠할 수 있는 시험장이었습니다. 격동하는 우주 폭풍의 심장부 안에서 치열한 전투를 펼친다고 상상해 보십시오! 은하계에 우리가 얼마나 거친 녀석들인지 보여 줍시다.\n\n다음 도전은 폭풍 안에서 적 함대를 물리치는 것입니다."
 fleets_defeated_in_storm: "폭풍 안에서 격파한 함대"
 MISSION_CS_STORM_FEVER_CHALLENGE_2: "은하 경계 탐사"
 MISSION_CS_STORM_FEVER_CHALLENGE_2_DESC: "우리 자신의 경계를 넘어 별세계의 가장자리 위에 올라 우주의 끝자락을 찾아 떠나는 것... 이보다 더 신나는 일이 있을까요?\n\n과학선을 지정된 성계에 보내야 합니다. 수단은 상관없습니다."
 far_edge_explored: "은하 경계 탐사"
 MISSION_CS_STORM_FEVER_CHALLENGE_3: "폭풍타기"
 MISSION_CS_STORM_FEVER_CHALLENGE_3_DESC: "최고 중의 최고라면 폭풍의 스릴을 갈망하는 법입니다. 폭풍 속을 누비며 영광을 누리리라!\n\n우리의 다음 도전은 폭풍 기수가 우주 폭풍을 180일 이상 견딜 수 있도록 돕는 것입니다."
 days_storm_rider_spend_in_storm: "폭풍 기수가 폭풍 속에서 보낸 일수"
 MISSION_CS_STORM_FEVER_CHALLENGE_4: "드러난 비밀에 대한 조사"
 MISSION_CS_STORM_FEVER_CHALLENGE_4_DESC: "은하계에는 온갖 보물과 고대의 비밀이 파묻혀 있습니다. 그리고 자비심 없는 폭풍은 가차 없이 그 비밀을 드러내죠! 어서 현장으로 향해 무엇이 숨겨져 있었는지 알아봅시다.\n\n다음 도전은 폭풍으로 드러난 이상 현상이나 고고학 현장을 조사하는 것입니다."
 storm_unraveled_event_investigated: "조사한 이상 현상 또는 발굴 현장"
 MISSION_CS_STORM_FEVER_CHALLENGE_5: "기쁨 나누기"
 MISSION_CS_STORM_FEVER_CHALLENGE_5_DESC: "이 즐거움을 우리만 누려선 안 됩니다! 모험이라는 건 모름지기 나누어야 더 즐거운 법이니까요.\n\n이웃이 소외감을 느끼지 않도록, 우주 폭풍이 주변 제국의 영토를 지나게 합시다."
 send_storm_to_other_empire: "다른 제국에 보낸 폭풍"
 MISSION_CS_STORM_FEVER_CHALLENGE_6: "광풍과 함께 사라지다"
 MISSION_CS_STORM_FEVER_CHALLENGE_6_DESC: "늙어 죽을 바에야 영광의 불꽃 속에서 모든 걸 불태우는 걸 택하는 게 우리의 스타일입니다!\n\n다음 도전은 폭풍 기수가 우주 폭풍 안에서 최후의 순간을 맞이하도록 하는 것입니다."
 rider_died_in_storm: "폭풍으로 사망 또는 실종된 폭풍 기수"
 #Challenge completed intro
 challenge_completed_intro: "새로운 경지에 도전하고, 한계를 깨부수는 것! 마음이 벅차오르다 못해 불타오르는 듯합니다. 도전을 완료했습니다!"
 #Challenge 1 completed
 challenge_completed: "도전 완료:"
 cstorms.305.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_1$"
 cstorms.305.desc: "$challenge_completed_intro$\n\n상대 함대를 압도적으로 격파하셨군요. 다음에는 또 어떤 함대가 감히 우리에게 도전해 올까요?"
 cstorms.305.a: "속이 시원하군요!"
 #Challenge 2 completed
 cstorms.310.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_2$"
 cstorms.310.desc: "$challenge_completed_intro$\n\n은하계에는 즐길 거리가 넘쳐납니다! 지루할 틈이 없는데, 멈출 이유는 더더욱 없죠. 다음 도전이 기다립니다!"
 cstorms.310.a: "옳소!"
 #Challenge 3 completed
 cstorms.315.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_3$"
 cstorms.315.desc.normal: "$challenge_completed_intro$\n\n우리 폭풍 기수들이 흥분에 찬 환호성과 함께 돌아왔습니다. 역시 우주 폭풍이 선사하는 스릴은 차원이 다른 모양입니다!"
 cstorms.315.desc.gestalt: "$challenge_completed_intro$\n\n고양감이 우리를 가득 채웠습니다. 우주 폭풍이 가져다주는 흥분은 역시 차원이 다른 듯합니다."
 cstorms.315.a: "지루할 틈이 없군요!"
 #Challenge 4 completed
 cstorms.320.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_4$"
 cstorms.320.desc: "$challenge_completed_intro$\n\n고대의 비밀을 파헤치고 묻혀 있는 보물을 발굴하는 일은 언제나 짜릿합니다. 저 우주 너머에 또 어떤 비밀이 우리를 기다리고 있을까요?"
 cstorms.320.a: "가능성이 무궁무진하군요!"
 #Challenge 5 completed
 cstorms.325.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_5$"
 cstorms.325.desc: "$challenge_completed_intro$\n\n폭풍은 이웃 제국의 영역을 거침없이 가로질렀고, 엄청난 스릴과 함께 그에 못지않은 혼란이 일어났습니다! 우리 이웃과 이 놀라운 경험을 공유할 수 있게 되어 이제야 마음이 좀 놓이는군요.\n\n상대 제국은 전혀 고맙지 않은 눈치지만, 결국 우리에게 감사하게 될 겁니다."
 cstorms.325.a: "나눔 정신하면 또 우리죠!"
 #Challenge 6 completed
 cstorms.330.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_6$"
 cstorms.330.desc.normal: "$challenge_completed_intro$\n\n거대한 폭풍이 이름을 부르자, 기수들은 환호성으로 응답했습니다. 위대한 폭풍 기수여, 영원하라! 저 너머의 미지의 세계로 향하는 그대의 여정이 그 마지막만큼이나 장엄하기를."
 cstorms.330.desc.gestalt: "$challenge_completed_intro$\n\n위대한 폭풍이 우리 일부에게 황홀한 대학살에 함께할 것을 청했습니다. 노드를 잃는다는 것이 이렇게나 뜻깊고 신날 줄이야! 이 웅장한 경험은 앞으로 오랫동안 우리 종족을 정의해 줄 것입니다."
 cstorms.330.a: "기수들이여 영원하라!"
 cstorms.331.desc.normal: "$challenge_completed_intro$\n\n거대한 폭풍이 이름을 부르자, 기수들은 환호성으로 응답했습니다. 위대한 폭풍 기수여, 영원하라!"
 cstorms.331.desc.gestalt: "$challenge_completed_intro$\n\n위대한 폭풍이 우리 일부에게 황홀한 대학살에 함께할 것을 청했습니다. 노드를 잃을 뻔한 것이 이렇게나 뜻깊고 신날 줄이야! 이 웅장한 경험은 앞으로 오랫동안 우리 종족을 정의해 줄 것입니다."
 electric_storm_desc: "잇따른 전자기장의 충돌이 이 우주 폭풍에 위험 수준에 가까운 전하를 불어넣었습니다. 보호막에는 해롭지만, 행성의 생산에는 도움이 됩니다."
 particle_storm_desc: "이 폭풍들은 마치 살아 있는 듯이 은하 공간을 넘나들며, 우주를 누비는 함선들을 쫓지도 피하지도 않습니다. 이 위험하고 불안정한 폭풍이 존재감을 드러내는 것만으로도 어떤 문명이든 자연의 힘에 맞서 하나로 규합하게 됩니다."
 gravity_storm_desc: "거대한 천체가 충돌하면, 그 충격의 여파가 중력파의 형태로 은하 전체에 퍼져 나갑니다. 그리고 이 파동이 붕괴하며 중력 폭풍이 탄생합니다. 중력 폭풍은 함선의 표적 시스템에 악영향을 주며, 중력 변동으로 인해 거의 모든 주민이 자택 밖으로 나오지 못하게 됩니다."
 magnetic_storm_desc: "우주를 떠도는 금속성 소행성대가 강력한 중력과 상호 작용하면 그 안에 자기장이 형성됩니다. 이렇게 생겨난 폭풍은 함선의 선체를 찢어발기며 건설 산업에도 지장을 주지만, 행성의 지각으로부터 고가치 광물을 캐내는 데는 도움이 됩니다."
 solar_storm_desc: "$solar_storm$은 공간의 구조 그 자체에 번쩍이는 듯한 변동을 일으키며, 그 존재에 영향을 받은 항성은 전례 없는 수준의 플레어를 일으킵니다. 그렇게 뿜어져 나온 방사선은 끔찍할 정도로 파괴적이지만, 우주 기지의 생산량을 비약적으로 높여 주는 동시에 함선이 은신하기 어려운 환경을 조성합니다."
 celestial_storm_desc: "수백만 행성에서 뿜어져 나온 먼지들은 시간과 장소를 가리지 않고 은하계를 정처 없이 떠돌아다니며, 때때로 이 입자들은 한곳으로 모여 먼지 폭풍으로 변하기도 합니다. 이 폭풍에 휩쓸린 물체는 스캐너로는 더 이상 파악할 수조차 없게 되고 폭풍으로 인해 행성 전역에서 통신 교란이 발생하지만, 이 현상으로 얻는 화학 원소는 자원 생산에 매우 유용합니다."
 shroud_storm_desc: "흔치 않은 일이지만, 장막의 속삭임은 때때로 물질세계에 희귀한 폭풍을 형성하는데, 이 폭풍에 닿은 지성체는 숭고하면서도 기괴한 환상에 사로잡힙니다. 장막과 교감을 나눌 수 있는 이들이라면 변덕스러운 시너지를 누릴 수도 있습니다."
 nexus_storm_desc: "나란히 정렬된 별은 작은 우주 폭풍이라도 기존의 한계를 넘어서는 거대 우주 폭풍으로 성장시킬 수 있습니다. 이 흔치 않은 현상은 대종말에 준하는 공포를 불러일으키기에 충분합니다. 이 재앙에 휩쓸린 모든 문명은 번성이 아니라 생존을 목표로 해야 할 것입니다."
 FROM_STORM: "폭풍에서"
 #Planetary modifiers
 hyper_ecosystem: "초생태계"
 hyper_ecosystem_desc: "이 행성의 토양은 지각에 있는 천연 광물들로부터 각종 성분을 흡수했기 때문에 질소와 인의 함유량이 유독 높습니다. 그 덕분에 식물의 생장 속도가 매우 빨라 농업에 굉장히 유리하지만, 건설 프로젝트는 큰 지장을 받습니다."
 docile_fauna: "유순한 생물들"
 docile_fauna_desc: "이 행성의 야생 동식물은 천적이 적어 매우 유순한 덕분에 함께 살아가기 좋습니다. 동식물의 개체 수는 적자생존의 투쟁이 아니라 폭풍으로 인한 피해를 통해 조절됩니다."
 obsidian_lakes: "흑요석 호수"
 obsidian_lakes_desc: "지각 활동으로 인해 마그마 호수가 냉각되어 어마어마한 크기의 흑요석 판이 생겼고, 지각 깊숙이 숨어 있던 귀중한 자원들이 지표면 가까이 끌려 올라왔습니다."
 obsidian_lakes_volcanic: "$obsidian_lakes$"
 obsidian_lakes_volcanic_desc: "$obsidian_lakes_desc$"
 crimson_crawlers: "선홍색 벌레 무리"
 crimson_crawlers_tt: "§R$COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS$§!"
 crimson_crawlers_desc: "선홍색 융단을 두른 듯한 이 행성의 지표면은 수조 마리에 이르는 작은 붉은색 벌레로 거의 빈틈없이 뒤덮여 있습니다. 엄청난 수에도 불구하고 무해해 보이는 이 벌레들은 행성의 생태계에서 아슬아슬한 균형을 이루는 데 성공했습니다."
 metal_planet: "금속 행성"
 metal_planet_desc: "이 행성은 자연적으로 형성된 금속에 완전히 뒤덮여 있습니다. 물이나 호흡이 가능한 대기 등 생활에 필수적인 기본 요소는 부족하지만, 그 대신 쓸모 있는 자원이 넘쳐납니다!"
 terraform_fail_is_metal_planet: "이 행성은 금속성 지각으로 인해 테라포밍할 수 없습니다."
 previously_terraformed_planet: "테라포밍되었던 행성"
 previously_terraformed_planet_desc: "질소와 산소로 이루어진 대기와 드넓은 바다가 펼쳐져 있는 바위 행성입니다. 옛 제국의 개척 흔적은 남아 있지만, 개척지 자체는 이미 사라진 지 오래입니다. 즉, 이 행성은 발견하거나 발굴할 요소가 많이 남아 있을 뿐만 아니라 식민지로서도 검증된 곳이라고 할 수 있습니다!"
 previously_terraformed_planet_tt: "이 행성은 과거에 테라포밍된 적이 있어, 더 쉽게 가이아 행성으로 전환할 수 있습니다."
 has_patriotic_institute: "$building_adakkaria_patriotic_institute$"
 has_patriotic_institut_desc: "먼 옛날, 이 행성은 아드아카리아 자애회의 기반을 이루었습니다. 한때 강성했던 문명은 스러지고, 지금 남아 있는 것은 $building_adakkaria_patriotic_institute$뿐입니다."
 has_patriotic_institute_tt: "$building_adakkaria_patriotic_institute$ 건물이 있으며, 해당 행성 개척 시 소유권을 획득합니다."
 adakkaria_patriotic_institute_desc.supercharged: "매년 일정 확률로 §Y100§! £pop£ §H팝§!이 사망하고 해당 성계에 폭풍이 발생합니다."
 #Planet Modifiers
 crimson_crawlers_sashimi_style: "선홍색 벌레 무리: 생식"
 crimson_crawlers_sashimi_style_desc: "진한 선홍색을 띠는 이 행성의 지표면은 수조 마리에 이르는 작은 붉은색 벌레로 거의 빈틈없이 뒤덮여 있습니다. 이 벌레들은 생으로 먹어도 맛이 아주 뛰어납니다."
 crimson_crawlers_bbq_them: "선홍색 벌레 무리: 조리 후 섭취"
 crimson_crawlers_bbq_them_desc: "진한 선홍색을 띠는 이 행성의 지표면은 수조 마리에 이르는 작은 붉은색 벌레로 거의 빈틈없이 뒤덮여 있습니다. 지금은 많은 주민들이 이 벌레들을 구워서 즐겨 먹게 되었습니다."
 COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS: "§R기계나 대지 포식자 제국은 이 행성을 개척할 수 없습니다.§!"
 #New planet types modifiers
 collided_planet: "충돌 행성"
 collided_planet_desc: "충돌한 두 행성이 부서지지 않고 서로 얽혀 하나가 되었습니다. 사용할 수 있는 표면적은 늘어났지만, 거주 및 건설 면에서 특유의 어려움을 안고 있습니다."
 wooden_planet: "수목 행성"
 wooden_planet_desc: "이 행성의 지각은 수천 년에 걸쳐 수 킬로미터의 깊이로 자라난 빽빽한 뿌리 층으로 이루어져 있어, 행성 전체가 거대한 유기 생명체나 다름없습니다."
 wooden_planet_tt: "주거 건설 및 유지에 $w_food$을 사용합니다.\n농장 건설에 $w_food$을 사용합니다."
 #Eruption Event
 recent_eruption: "최근 용암 분출 발생"
 eruption_report_tooltip: "\n보고가 30일 내로 올라올 예정입니다."
 colony_mod.31.name: "용암 분출!"
 colony_mod.31.desc: "[Root.GetName]에서 일어난 지각 변동으로 인해 흑요석 판 중 하나가 부서졌습니다. 지표면으로 흘러나온 용암으로 막심한 피해가 발생해, 식민지에서 다급한 내용의 보고를 보내왔습니다."
 colony_mod.31.a: "보고를 들어 봅시다."
 colony_mod.32.name: "용암 분출 피해 보고"
 colony_mod.32.desc: "최근 용암 분출로 [Root.GetName]의 식민지를 뒤흔들었던 흑요석 판이 활화산으로 변했습니다! 그곳에 한때 존재했던 것은 전부 용암 속에 파묻혔습니다."
 colony_mod.33.desc: "최근 흑요석 판에서 분출된 용암이 [Root.GetName]의 식민지를 뒤흔들었지만, 기적적으로 피해는 없었습니다. 게다가 운 좋게도 흑요석 판이 깨진 덕분에, 흑요석을 쉽게 채취할 수 있게 되었습니다!"
 colony_mod.34.desc: "최근 흑요석 판에서 분출된 용암이 [Root.GetName]의 식민지를 뒤흔들었지만, 기적적으로 피해는 없었습니다!"
 #Aftermath modifiers
 STORM_AFTERMATH: "§H후폭풍§!"
 STORM_AFTERMATH_DESC: "- 폭풍의 강도에 따라 식민지에 3년 동안 다음과 같은 보정치가 적용됩니다."
 electric_storm_aftermath_modifier: "대기 충전"
 electric_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$- §H$electric_storm_aftermath_modifier$§!:\n$tt$- $MOD_PLANET_BUILDING_BUILD_SPEED_MULT$ §R-25%§!에서 §R-65%§!\n$tt$- $mod_planet_jobs_energy_produces_mult$ §G+10%§!에서 §G+30%§!"
 electric_storm_aftermath_modifier_severity_desc: "$electric_storm$으로 인해 대기 중의 전압이 치솟아, 기계류의 출력이 불안정해졌습니다. 그 대신 에너지 생산량이 크게 치솟았습니다!"
 electric_storm_aftermath_modifier_severity_1: "후폭풍: $electric_storm_aftermath_modifier$"
 electric_storm_aftermath_modifier_severity_1_desc: "$electric_storm_aftermath_modifier_severity_desc$"
 electric_storm_aftermath_modifier_severity_2: "후폭풍: §H심각한§! $electric_storm_aftermath_modifier$"
 electric_storm_aftermath_modifier_severity_2_desc: "$electric_storm_aftermath_modifier_severity_desc$"
 electric_storm_aftermath_modifier_severity_3: "후폭풍: §R극심한§! $electric_storm_aftermath_modifier$"
 electric_storm_aftermath_modifier_severity_3_desc: "$electric_storm_aftermath_modifier_severity_desc$"
 particle_storm_aftermath_modifier: "침식성 바람"
 particle_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$- §H$particle_storm_aftermath_modifier$§!:\n$tt$- $MOD_PLANET_POP_ASSEMBLY_MULT$ §R-40%§!에서 §R-60%§!\n$tt$- $mod_planet_jobs_minerals_produces_mult$ §R-10%§!에서 §R-30%§!\n$tt$- 팝으로 인한 $r_volatile_motes$ §G+0.02§!에서 §G+0.06§!"
 particle_storm_aftermath_modifier_severity_desc: "$particle_storm$이 금속부터 유기체까지 모든 존재를 갈아 버리며 우리의 광물 생산에 크나큰 피해를 주고 있습니다. 그러나 그 잔여물에는 가치가 높은 물질이 섞여 있습니다."
 particle_storm_aftermath_modifier_severity_1: "후폭풍: $particle_storm_aftermath_modifier$"
 particle_storm_aftermath_modifier_severity_1_desc: "$particle_storm_aftermath_modifier_severity_desc$"
 particle_storm_aftermath_modifier_severity_2: "후폭풍: §H심각한§! $particle_storm_aftermath_modifier$"
 particle_storm_aftermath_modifier_severity_2_desc: "$particle_storm_aftermath_modifier_severity_desc$"
 particle_storm_aftermath_modifier_severity_3: "후폭풍: §R극심한§! $particle_storm_aftermath_modifier$"
 particle_storm_aftermath_modifier_severity_3_desc: "$particle_storm_aftermath_modifier_severity_desc$"
 gravity_storm_aftermath_modifier: "중력 변동"
 gravity_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$- §H$gravity_storm_aftermath_modifier$§!:\n$tt$- §R+25%§!에서 §R+100%§! $mod_planet_structures_cost_mult$\n$tt$- §G+20%§!에서 §G+60%§! $mod_planet_bureaucrats_unity_produces_mult$"
 gravity_storm_aftermath_modifier_severity_desc: "$gravity_storm$이 일으킨 중력 변동 때문에 건설에 어려움을 겪고 있지만, 중력과 시공간 연구 분야에서는 고유한 통찰을 얻을 수 있었습니다."
 gravity_storm_aftermath_modifier_severity_1: "후폭풍: $gravity_storm_aftermath_modifier$"
 gravity_storm_aftermath_modifier_severity_1_desc: "$gravity_storm_aftermath_modifier_severity_desc$"
 gravity_storm_aftermath_modifier_severity_2: "후폭풍: §H심각한§! $gravity_storm_aftermath_modifier$"
 gravity_storm_aftermath_modifier_severity_2_desc: "$gravity_storm_aftermath_modifier_severity_desc$"
 gravity_storm_aftermath_modifier_severity_3: "후폭풍: §R극심한§! $gravity_storm_aftermath_modifier$"
 gravity_storm_aftermath_modifier_severity_3_desc: "$gravity_storm_aftermath_modifier_severity_desc$"
 magnetic_storm_aftermath_modifier: "극지 교란"
 magnetic_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$- §H$magnetic_storm_aftermath_modifier$§!:\n$tt$- $mod_planet_metallurgists_upkeep_mult$ §G-10%§!에서 §G-30%§!\n$tt$- $MOD_PLANET_BUILDING_BUILD_SPEED_MULT$ §R-5%§!에서 §R-20%§!"
 magnetic_storm_aftermath_modifier_severity_desc: "$magnetic_storm$이 일으킨 자기 교란으로 인해 대기 중에 찬란한 빛의 향연이 펼쳐졌습니다. 잔류 자기장은 행성의 건설 프로젝트 진행 속도에도 영향을 미쳤습니다."
 magnetic_storm_aftermath_modifier_severity_1: "후폭풍: $magnetic_storm_aftermath_modifier$"
 magnetic_storm_aftermath_modifier_severity_1_desc: "$magnetic_storm_aftermath_modifier_severity_desc$"
 magnetic_storm_aftermath_modifier_severity_2: "후폭풍: §H심각한§! $magnetic_storm_aftermath_modifier$"
 magnetic_storm_aftermath_modifier_severity_2_desc: "$magnetic_storm_aftermath_modifier_severity_desc$"
 magnetic_storm_aftermath_modifier_severity_3: "후폭풍: §R극심한§! $magnetic_storm_aftermath_modifier$"
 magnetic_storm_aftermath_modifier_severity_3_desc: "$magnetic_storm_aftermath_modifier_severity_desc$"
 solar_storm_aftermath_modifier: "방사선 격리"
 solar_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$- §H$solar_storm_aftermath_modifier$§!:\n$tt$- §R-40%§!에서 §R-60%§! $MOD_LOGISTIC_GROWTH_MULT$\n$tt$- §R+10%§!에서 §R+30%§! $MOD_POP_AMENITIES_USAGE_MULT$\n$tt$- §G+20%§!에서 §G+40%§! $MOD_ARMY_DEFENSE_DAMAGE_MULT$"
 solar_storm_aftermath_modifier_severity_desc: "$solar_storm$으로 방사선 수치가 치솟아, 개척지를 영구적으로 외부와 격리해야 합니다. 생활 공간을 엄격하게 통제하므로 행성의 무력 통제가 상당히 수월해지지만, 대다수의 인구가 실의에 빠질 것입니다."
 solar_storm_aftermath_modifier_severity_1: "후폭풍: $solar_storm_aftermath_modifier$"
 solar_storm_aftermath_modifier_severity_1_desc: "$solar_storm_aftermath_modifier_severity_desc$"
 solar_storm_aftermath_modifier_severity_2: "후폭풍: §H심각한§! $solar_storm_aftermath_modifier$"
 solar_storm_aftermath_modifier_severity_2_desc: "$solar_storm_aftermath_modifier_severity_desc$"
 solar_storm_aftermath_modifier_severity_3: "후폭풍: §R극심한§! $solar_storm_aftermath_modifier$"
