 #Digsites #
 ###########################################
 ### Green Skies
 site_green_skies: "녹색 하늘"
 site_green_skies_intro: "스캔 장치가 행성의 이 지역에서 흥미로운 신호를 포착했습니다. 신호 구성으로 볼 때, 고대 문명의 유적이 잠들어 있을 가능성이 높습니다."
 cstorms.1400.name: "흥미로운 콜라주"
 cstorms.1400.desc: "베이스캠프 근처에서 특이한 도시 유적을 발견했습니다.\n\n이곳의 건축물은 우리가 지금까지 접한 모든 문명은 물론이고, 심지어 우리 문명의 특징까지 보이고 있습니다!\n\n그러나 물질 조성은 우리가 행성 개척 중에 베이스캠프 건설을 위해 사용했던 물질과 비슷합니다. 이상한 일입니다. 이런 물질이라면 스캐너로 측정한 유적의 연대는커녕 수십 년조차 버티지 못할 것입니다.\n\n한 마디로, 이 유적이 수수께끼의 선구자 종족이 살던 곳일 가능성은 거의 없습니다. 하지만 스캔을 몇 번이나 진행해도 결과는 동일합니다. 대체 무슨 일이 벌어지고 있는 걸까요?"
 cstorms.1405.name: "풍화된 현장"
 cstorms.1405.desc: "신호를 단서로 나아가자, 폐허가 된 도시의 하층부로 내려가는 길이 나왔습니다. 보통 이런 유형의 고고학 현장은 지하 교통망이나 대피소가 있기 마련이지만, 이곳에는 작은 동굴망이 있을 뿐입니다. 그리고 그 안에는 여러 천 조각과 폴리머 용기, 유기 폐기물이 늘어져 있습니다. 아무래도 이 현장을 먼저 탐사한 자가 있는 모양입니다.\n\n걱정스럽게도 [Root.GetLeaderName](이)가 바깥 하늘이 녹색으로 변하고 있다고 보고했습니다. [Fromfrom.getName]에서 곧 우주 폭풍이 생겨날 것이라는 뜻입니다. 하지만 우리는 신호의 발신지를 찾아 계속 나아갔습니다."
 cstorms.1410.name: "판단 미스"
 cstorms.1410.desc: "탐사를 이어 나가자 몹시 파손된 금속 문이 길을 가로막았습니다. 가볍게 장애물을 뚫고 나아가니 원시적인 저장 시설이 나타났습니다.\n\n시설 안의 선반에는 오래된 각종 장비가 가득했고, 벽에는 유명 기업들의 화물 상자가 정성스레 쌓아 올려져 있었습니다. 그리고 마침내, 그토록 찾아 헤매던 신호의 발신지를 발견했습니다. 우리 제국에서 사용하는 것과 별반 달라 보이지 않는 통신용 컴퓨터입니다.\n\n장치에 접속해 데이터베이스를 훑어본 우리 [Root.Owner.GetEngineerPlural]들이 다소 황당한 결론을 내놓았습니다. 이 신호는 다른 문명의 특징을 모방하고 조합해 최대한 신비롭고 흥미로워 보이도록 의도적으로 만들어 낸 신호라는 것입니다.\n\n아니나 다를까 상자 안에는 지상에서 발견한 유적의 제작 키트가 들어 있었습니다.\n\n발견한 내용을 보고하기 위해 베이스캠프와 연락을 시도했지만, 우주 폭풍이 이미 통신을 방해하기 시작했습니다. 우리가 [Root.GetLeaderName](으)로부터 들을 수 있었던 마지막 말은, 우려스러운 일련의 명령이었습니다. 베이스캠프가 습격을 받은 것 같습니다!"
 cstorms.1410.a: "어서 대처하세요!"
 cstorms.1415.name: "해적이다!"
 cstorms.1415.desc: "[Fromfrom.getName]에 발생한 우주 폭풍에 해적 함대가 숨어 있었습니다! 우리 베이스캠프를 공격한 것도 해적선의 선원들이었습니다. 해적이 다음과 같은 메시지를 전송했습니다.\n\n§L친애하는 얼간이 여러분,\n\n먼저 우리의 은밀한 거처를 찾아줘서 고맙다는 인사부터 하지.\n\n참 놀랍지 않나? 머리깨나 좋다는 녀석들이 고대 유적이니 유물이니 그런 것만 보면 눈이 돌아가니까 말이야. 뭘 기대한 거지? 거대한 적을 부숴 버릴 무기? 사건의 지평선을 가득 메울 함대를 만들 기술? 아니면 그냥 국민들을 위해 뭐라도 좋은 일을 하고 싶었나? 역시 대단들 하시다니까.\n\n너무 상심할 것 없어. 당신들이 처음인 것도 아니니까. 우리 사업은 당신네 같은 머저리가 많아서 돌아가는 거거든.\n\n자, 더도 말고 덜도 말고 2,000 에너지 크레딧만 넘겨. 그럼 빼앗은 걸 되돌려 주지.\n\n제안을 거절하는 건 그쪽 마음이지만, 행성에 갇힌 그 친구들은 그럼 어떻게 될까?\n\n아무쪼록 신중한 선택을 기대하지.§!\n\n동굴 안은 아직 안전하지만, 이 상태가 얼마나 오래갈지는 알 수 없습니다. 이 도둑놈들이 시키는 대로 해야 할까요?"
 cstorms.1415.a: "크레딧을 지불합시다."
 cstorms.1415.b: "지옥에나 가라고 전하세요!"
 cstorms.1415.b.tt: "[Root.GetLeaderName](이)가 인질로 잡혔습니다."
 cstorms.1416.name: "반격"
 cstorms.1416.desc: "새 메시지가 도착했습니다.\n\n§L아쉽구만. 그 돈으로 뭘 하고 놀지 이미 계획을 다 세워 놨는데 말이야.\n\n그 지도자랑 승무원들은 걱정 마. 우리 통치자님께서는 목숨보다 크레딧이 더 소중한 모양이라고 대신 전해 줄 테니까. 근처에 있는 노예상이나 의욕적 동화자가 관심을 가질지도 모르겠어. 요즘에 신경 고문이 핫하다던데...\n\n아무튼 그럼 이만.§!\n\n우리는 주변의 물체를 있는 대로 끌어모아 바리케이드를 만들었습니다. 보급품이 있어 당분간은 안전합니다. 하지만 해적들은 결국 언젠가는 우리 방어선을 뚫고 들어오고 말 것입니다!"
 cstorms.1420.name: "다시는 당하지 않아"
 cstorms.1420.desc: "이 해적들은 말만 번지르르했던 모양입니다. 남아 있던 해적 함대는 얼마 안 가 은하 생태계의 일부가 되었습니다.\n\n우리는 곧바로 지상의 대원들과 통신을 재개했습니다. 지상에 있던 인원들은 이번 사건으로 다소 충격을 받은 듯하나 다행히도 피해를 입지는 않았습니다.\n\n이곳에서 고대 문명에 대한 통찰을 얻지는 못했지만, 이번 사건을 계기로 경계의 필요성을 절실히 느낄 수 있었습니다. 이번에는 탐사대장이 위험을 알아채는 데는 실패했으나, 우리는 다신 같은 실수를 반복하지 않을 것입니다."
 cstorms.1420.a: "우리 모두 이번 일을 교훈으로 삼도록 하죠."
 cstorms.1420.b: "그 지도자가 우리를 실망시킬 일은 다시는 없을 겁니다."
 cstorms.1425.name: "훌륭한 거래"
 cstorms.1425.desc: "답신이 도착했습니다.\n\n§L내 입으로 말하긴 좀 그렇지만, 훌륭한 선택이야!\n\n이번 '불우 사업가 리조트 행성 마련 기금' 기부는 공식적으로 수령 및 접수되었어.\n\n그쪽 지도자와 부하들은 곧 돌려보내지.\n\n다른 무역 파트너들한테도 우리 얘기 좀 잘 부탁할게.§!\n\n얼마 지나지 않아, 우리는 지상의 대원들과 통신을 재개할 수 있었습니다. 지상에 있던 인원들은 이번 사건으로 다소 충격을 받은 듯하나 다행히도 피해를 입지는 않았습니다.\n\n이곳에서 고대 문명에 대한 통찰을 얻지는 못했지만, 이번 사건을 계기로 경계의 필요성을 절실히 느낄 수 있었습니다. 이번에는 탐사대장이 위험을 알아채는 데는 실패했으나, 우리는 다신 같은 실수를 반복하지 않을 것입니다."
 cstorms.1425.a: "$cstorms.1420.a$"
 cstorms.1425.b: "$cstorms.1420.b$"
 NAME_green_skies_pirate_country: "리조트"
 NAME_green_skies_pirate_fleet: "기이한 사업가"
 KILL_EXILED_LEADER_EFFECT: "$LEADER$(이)가 무능력을 이유로 처분되었습니다."
 FREE_HOSTAGED_LEADER_EFFECT: "$LEADER$(이)가 돌아왔습니다."
 green_skies_outcome_modifier: "이제부터 다가오는 위험에 대한 경계를 한층 더 강화합니다."
 requires_cosmic_storms: "$dlc_requirement_string$ §ICosmic Storms§!"
 ### Hold the Line
 site_hold_the_line: "인내의 선물"
 site_hold_the_line_intro: "우주 폭풍이 지나가면서 흥미로운 선물을 남겼습니다. 오래된 거주지 성계에서 궤도 복합 단지가 떠내려온 것입니다. 어쩌면 그 안에 들어가 시설을 재가동할 수 있을지도 모릅니다."
 cstorms.1275.name: "당혹스러운 신상품"
 cstorms.1275.desc: "우주 폭풍에 휩쓸려 은하계를 가로질러 왔음에도 불구하고, 이 궤도 복합 단지는 거의 손상이 없습니다. 특히 생활 공간과 상업 공간은 거의 완벽한 상태로, 예전에 있던 자들의 생활 흔적이 남아 있어야 할 곳에서는 먼지 한 톨 발견되지 않았습니다. 마치 한 번도 사용된 적이 없는 것 같습니다.\n\n중앙 제어 허브에는 영문 모를 입력 장치가 놓여 있습니다. 어떠한 설명도 없는 다이얼, 일관성이라고는 찾아볼 수 없는 레버, 그리고 마구잡이로 배열된 온갖 색상의 버튼이 우리를 맞아 주었습니다. 다행히도 얼마 지나지 않아 사용 설명서를 발견할 수 있었습니다. 설명서의 번역을 완료하면 이 거주지를 다시 가동할 수 있을 것입니다."
 cstorms.1280.name: "설명 과부하"
 cstorms.1280.desc: "안타깝게도 우리가 너무 낙관적이었던 것 같습니다. 이 설명서는 그 제어 장치만큼이나 난해하기 짝이 없습니다. 절반가량의 페이지가 누락된 것처럼 느껴지는 것은 물론이고, 그림으로 된 설명은 특정 기호 체계를 전제하고 있습니다. 게다가 설명서의 나머지 반은 해석하기 어려운 상형 문자의 나열입니다.\n\n그런데, 마지막 페이지에 '고객 센터'로 번역되는 일련의 문자열과 함께 통신 주파수가 하나 적혀 있었습니다. 지금 이 주파수로 통신을 시도하는 중입니다."
 cstorms.1285.name: "고객님의 소중한 의견 감사합니다"
 cstorms.1285.desc: "사용 설명서에 적힌 통신 주파수로 연락하니 스카이가든이라는 기업의 고객 센터 메인 프레임으로 연결되었습니다.\n\n고객 센터 AI는 친절하지만 무미건조한 어조로 인사를 하고는, 어떤 도움이 필요한지 물었습니다. AI가 제시한 선택지는 '가입 문의 답변', '신규 스마트 방어 체계 제품군 정보' 등이 있었으며, 해당 기업의 '사회 책임 사업'에 관심이 있는지 물어보기도 했습니다.\n\n그러나 이어지는 선택지는 계속해서 우리를 완전히 관계없는 주제로 끌어갔습니다. 최악인 점은, AI가 자꾸 우리 [Root.Owner.GetEngineerPlural]들에게 잠시만 기다려 달라고 말했다가 갑자기 연락을 끊어 버렸다는 것입니다. 이 서비스 AI는 거주지의 나머지 부분처럼 세월의 뭇매를 정통으로 맞은 것이 분명합니다.\n\n하지만 우리는 포기하지 않고 이 비밀스러운 시스템을 다루는 법을 계속 알아볼 것입니다."
 cstorms.1290.name: "고객 서비스의 미로"
 cstorms.1290.desc: "[Root.Owner.GetEngineerPlural]들의 보고에 따르면, 고객 센터 AI에게 무슨 말을 하든 메뉴 몇 개만 지나면 전에 말했던 내용으로 돌아가 버린다고 합니다.\n\n정확한 안내 체계를 파악하기 위해 여러 차례 시뮬레이션을 진행해 보았지만, 오류만 반복되었고, 문제 해결과 해결 방법 검증을 동시에 수행할 수 없다는 사실만을 알아낼 수 있었습니다. 심지어 양자 모형 분석으로도 원하는 결과를 얻지 못했습니다. 게다가 그 과정에서 우연히 파동 함수 몇 가지를 붕괴시키고 만 것 같습니다.\n\n뭘 어쩌라는 건지 모르겠습니다."
 cstorms.1290.a: "AI한테, 가서 §R검열 삭제§!나 §R검열 삭제§!라고 하세요."
 cstorms.1290.b: "그냥 아무 말도 하지 말아 봅시다."
 cstorms.1290.c: "이렇게 된 거 아무 버튼이나 마구 눌러 보죠."
 cstorms.1295.name: "프로토콜 준수"
 cstorms.1295.desc.a: "드디어 돌파구를 찾았습니다! AI가 부적절한 언어를 사용했다고 정색하면서 고객 서비스 담당자가 연결될 때까지 기다려 달라고 부탁했습니다.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.b: "드디어 돌파구를 찾았습니다! 우리가 오랫동안 아무 말도 하지 않자, AI가 당황했는지 고객 서비스 담당자를 연결해 주었습니다.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.c: "드디어 돌파구를 찾았습니다! AI가 제어 패널을 마구 눌러서는 안 된다고 경고하며 고객 서비스 담당자가 연결될 때까지 기다려 달라고 부탁했습니다.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.followup: "한참 동안 기다리고 있었더니 통신 회선이 다시 열렸습니다. 상대방은 자신을 스카이가든사의 기록 담당자로 소개했습니다. 고객 센터 AI는 전임 기록 담당자로부터 인수인계받은 것이라고 합니다. 그녀가 말하길, 수십 년 전에 스카이가든이 파산한 이래로 해당 통신 기지를 사용한 사람은 없었다고 합니다. 왜 파산한 회사에서 계속 일하고 있는 건지 물어보자, 계약 내용이 그렇다는 짤막한 대답만이 돌아왔습니다.\n\n우리가 처한 상황을 들은 기록 담당자는 거주지의 간편 설명서를 찾아왔습니다. 설명서의 디지털 복사본을 곧 보내 주겠다고 합니다."
 cstorms.1300.name: "무너지는 건 한순간"
 cstorms.1300.desc: "새 매뉴얼 덕에 별다른 어려움 없이 거주지를 가동할 수 있었습니다.\n\n기계의 작동 소음이 천천히 잦아들자, 우리는 기록 담당자에게 다시 한번 연락해 감사 인사를 하기로 했습니다.\n\n그러자 기록 담당자는 이 기지에 관해 알아낸 추가적인 정보를 전해 주었습니다. 이 기지는 500년도 더 전에 시제품으로 제작한 것인데, 유난히 끔찍했던 한 우주 폭풍이 몰고 온 우주급 혼란 속에서 유실되고 말았다고 합니다. 한순간에 하늘로 날아간 기지와 그 개발 비용은 스카이가든사를 파산시키기에 충분했습니다.\n\n기록 담당자는 우리를 도우며 오랜만에 의미 있는 일을 할 수 있어 보람찼다고 말했습니다.\n\n\"게다가,\" 기록 담당자가 말했습니다. \"AI에 불과하긴 하지만 증조할머니 목소리를 다시 들으니 좋네요.\""
 ### Repowered Complex
 site_repowered_complex: "전력이 복구된 복합 단지"
 site_repowered_complex_intro: "최근, §Y$electric_storm$§!이 지나간 이후로 §H[From.Planet.GetName]§!의 지표면 아래에서 원인을 알 수 없는 전력 급증이 감지되었습니다. 추가 스캔 결과, 노후화된 지하 단지를 발견했으며, 폭풍으로 발전기가 재가동되면서 시설에 다시 전력이 공급되기 시작했다는 사실이 밝혀졌습니다."
 cstorms.1845.name: "요새화된 입구"
 cstorms.1845.desc: "§H[From.Planet.GetName]§! 외딴곳에 있는 단지의 입구는 유난히 튼튼한 구조로 되어 있습니다. 견고함을 뽐내는 외관 위로 설치된 두꺼운 장갑판과 방사선 차폐막, 그리고 여러 대기 감지기가 시선을 잡아끕니다. §H[Leader.GetName]§!(은)는 이곳이 극한의 환경에서도 견딜 수 있도록 건설되었다고 추정했습니다.\n\n스캔 결과, 폐쇄된 보안 문을 몇 개 통과하면 커다란 지하실에 들어갈 수 있을 것으로 보입니다."
 cstorms.1850.name: "비상 대피소"
 cstorms.1850.desc: "중앙 시설로 들어간 §H[Leader.GetName]§!(은)는 우리가 발견한 것이 오래전 미지의 유기체 종족을 위해 지어진 미사용 비상 대피소라는 결론을 내렸습니다.\n\n이곳에는 수면 포드, 여가 공간, 의무실로 구성된 안락한 거주 구역이 갖춰져 있으며, 각 층의 보관함에는 개봉되지 않은 영양제 팩, 배터리, 도구 등이 가득 들어 있습니다. 이 숨겨진 보물 창고에 든 물건은 전부 새것처럼 상태가 양호합니다.\n\n이제 닫힌 보안 문은 마지막 한 세트뿐입니다. 이 문들만 열면 시설의 지휘실에 마침내 발을 디딜 수 있을 것입니다."
 cstorms.1850.a: "계속 진행하세요."
 cstorms.1855.name: "호화 대피소 패키지"
 cstorms.1855.desc: "대피소의 지휘실에는 지표면의 대기 감지기를 통해 정보를 수집하는 것으로 보이는 인상적인 §Y$default_storm$§! 감시 설비가 늘어서 있었습니다. 대기 모드로 작동 중이던 콘솔에는 수 세기에 걸친 과거의 폭풍 데이터가 담겨 있어, 우주 기상학 분야에 대한 이해를 크게 높일 수 있을 것으로 보입니다.\n\n또한, §H[Leader.GetName]§!(은)는 작고 낡은 홀로 프로젝터를 하나 발견했는데, 작동시키자 3D 연체동물 형상이 나타나 기업 로고 아래에서 대피소의 주요 특징을 소개하며 상품을 홍보했습니다.\n\n이 서바이벌 상품이 구매자를 찾았는지는 알 수 없으나, 긴 세월 동안 이곳에서 사용되지 않은 채로 방치된 것만은 분명합니다."
 cstorms.1855.desc.megacorp: "우리 마케팅 부서는 이미 이 상품의 문제점에 대해 분석을 시작했습니다."
 ###############################
 #### The Weather Manipulators #
 ###############################
 STORMS_PREC_WM_ONE: "고대 대피소"
 STORMS_PREC_WM_ONE_DESC: "[From.Planet.GetName]에서 상당히 오래되어 보이는 지하 구조물을 여럿 발견했습니다. 추가 조사가 필요합니다."
 cstorms.105.name: "고대 대피소"
 cstorms.105.desc: "[From.GetStarName] 성계에 위치한 [From.Planet.GetName](은)는 폐허 그 자체입니다. 먼 옛날 존재했던 제국의 잔재인 듯합니다. 우리가 관심을 가졌던 지하 구조물도 마찬가지로 오래되었지만, 상태는 비교적 양호합니다.\n\n음파 공명 영상 기술로 조사한 결과, 해당 구조물은 자연재해를 견디기 위해 설계된 대피소와 저장 공간으로 구성된 복잡한 지하 시설로 드러났습니다. 피난처가 있는 것으로 미루어 보아, 행성의 표면을 파괴한 것은 우주 폭풍이 분명합니다.\n\n그러나 잔해가 많아 이 이상 조사를 진행하기는 어렵습니다. 발굴을 진행하면 더 자세한 사정을 알 수 있을지도 모릅니다."
 #arcsite The Ancient Storm Shelters
 site_weathermanipulators_the_ancient_storm_shelters: "고대 대피소"
 site_weathermanipulators_the_ancient_storm_shelters_intro: "폭풍이 휩쓸고 지나간 행성의 잔해 속에 파묻힌 대피소입니다. 지표면의 참상 때문에 조사가 쉽지는 않아 보이나, 내부는 상태가 온전해 보입니다."
 cstorms.110.name: "먼지에서 폐허까지"
 cstorms.110.desc: "지상에서 대피소로 접근하자, 무너진 두 개의 탑 아래에서 작은 틈을 발견할 수 있었습니다. 그 너머의 기계는 아직도 작동 중인 듯, 틈새 사이로 희미한 빛이 흘러나왔습니다.\n\n이 구멍은 우리 [Root.Owner.GetScientistPlural]들이 시설의 규모를 파악할 고정점이 되어 줄 것입니다. 언제라도 무너질 듯한 이 시설의 구조적 안정성에 영향을 주지 않고 입구를 만들 방법을 찾아내는 것이 당장의 목표입니다.\n\n이 시설을 덮고 있는 폐허는 우주 폭풍이 강타한 지역에서 찾아볼 수 있는 전형적인 피해 흔적의 총집합이나 다름없습니다. 신기한 점은, 도시 주민들이 스스로를 지키려 한 흔적이 없다는 것입니다.\n\n재난 속에서 가만히 오래 버티다가 서둘러 대피한 것처럼 말입니다. 어쩌면 이 의문에 대한 해답은 폐허가 된 [From.Planet.GetName]의 지표면 밑에 숨어 있을지도 모릅니다."
 cstorms.110.a: "알겠습니다."
 cstorms.115.name: "탑 아래"
 cstorms.115.desc: "겹겹이 쌓인 잔해와 먼지를 걷어내자, 탑 아래의 틈은 우리 [Root.Owner.GetScientistPlural]들이 대피소에 들어갈 수 있을 만큼 넓어졌습니다.\n\n대피소는 단순하고 실용적인 형태로, 여러 방이 뻗어 나와 있지만 대부분 비어 있습니다. 사실대로 말하자면, 지나치게 단순해 보이기까지 합니다. 일종의 대피소인 것은 분명하지만 우주 폭풍을 견딜 수 있을 것 같지는 않습니다. 벽은 너무 얇아 지지력이 거의 없고 천장과 바닥은 보강조차 되어있지 않습니다. 이 대피소가 남아 있는 것은 순전히 운이 좋았을 뿐입니다. 위에 있는 두 탑과 시설 전체를 한 번에 옮겨버린 산사태가 아니었다면 이 '폭풍' 대피소는 진작에 사라졌을 것입니다.\n\n바깥에서 보이던 빛은 오작동을 일으킨 경보 장치에서 흘러나오고 있었으며, 더 깊이 들어가자 단말기 몇 대를 발견할 수 있었습니다. 이 시설의 예전 소유자와 이곳에서 벌어졌던 흥미로운 상황에 관해 알아보기에는 더할 나위 없이 좋은 기회입니다."
 cstorms.120.name: "낡고 빛바랜 기록"
 cstorms.120.desc: "단말기로 가는 길은 곳곳이 붕괴되어 생각보다 접근이 힘들었습니다. 게다가 몇몇 잔해는 최근에 발생한 것으로 보이며, 이는 대피소가 재난으로 인해 당장이라도 무너질 위태로운 상태에 처했다는 사실을 의미합니다. 주의해야 합니다.\n\n유감스럽게도 이 고대 데이터 처리 장치는 간직한 비밀을 쉬이 털어놓지 않았습니다. 모든 내용이 지금은 이미 사라진 언어로 기록되어 있습니다. 어쩌면 인터페이스에 남아 있는 은하 간 통신 기록이 돌파구가 될지도 모르겠습니다. 통신 기록을 대피소 곳곳에 흩어져 있는 물리 매체와 대조하면 기본적인 번역을 완료할 수 있을 것으로 보이며, 조사할 방도 아직 많이 남아 있습니다. 물론 모두 대피소가 붕괴하지 않는다는 전제하에 말입니다."
 cstorms.120.a: "조심해서 진행하세요."
 cstorms.120.b: "작업 속도를 올려 보죠."
 cstorms.120.c: "다른 건 신경 쓰지 말고 서둘러 진행하세요."
 cstorms.125.name: "자산 보험"
 cstorms.125.desc: "더 깊은 곳의 방은 입구 쪽만큼 횅하지는 않았습니다. 바닥에서 천장까지 깔끔하게 포장된 상품 상자가 가득 쌓여 있었는데, 초벌 번역을 해 보니 그 상자는 미가공 원자재와 미완성 전자 부품으로 드러났습니다. 어느 쪽도 생존에 필수적인 물건이라고 말하기는 어렵습니다. 목록에는 이곳에 존재하는 각 품목의 수량이 빼곡히 적혀 있으며, 은하 평등 교역 네트워크, 줄여서 INET이라 불리는 곳에서 거래할 경우의 예상 수익도 기재되어 있습니다.\n\n그 거대 교역소에 관해 기록된 내용을 살펴보니, 잘 정돈된 거래 장부에서부터 품목별 수익에 이르기까지, 오가는 돈의 흐름을 거의 황홀경에 빠진 듯한 어조로 묘사해 두었습니다. 아니나 다를까, 이곳에 존재했던 옛 문명은 교역소의 이름을 따 자신들을 '아이네티안 상인 조합'이라 불렀던 모양입니다.\n\n그렇습니다. 이 대피소는 주민을 지키기 위한 것이 아니라 물품 창고였던 겁니다. 그렇다면 이상한 점이 있습니다. 왜 이 대피소는 폭풍을 대비했다기에는 턱없이 설비가 부족한 것일까요?\n\n번역을 더 진행하면 그 사정을 알 수 있겠지만, 구조물에서 삐걱대는 불안한 소리가 들리는 걸 보니 이곳에 있을 수 있는 시간이 얼마 남지 않은 듯합니다."
 cstorms.125.a: "주의해서 진행하세요."
 cstorms.125.b: "데이터 회수를 우선하죠."
 cstorms.125.c: "조사를 지원하겠습니다."
 cstorms.130.name: "시장의 음모"
 cstorms.130.desc: "갈라지고 삐걱대는 소리가 점점 커져만 갑니다. 그럼에도 불구하고 [From.Planet.GetName]의 대피소에서는 번역 작업이 계속 진행되었습니다. 이곳에 비축된 물품에 대한 조사는 별다른 소득이 없었지만, 아직도 작동 중인 단말기를 통해 많은 것을 알 수 있었습니다.\n\n암호화된 일련의 좌표를 발견했는데, 근처 행성에 숨겨진 '막대한 힘'을 지닌 장치의 위치를 가리키는 듯합니다. 지금까지 이해한 바에 따르면 이 장치는 우주 폭풍을 '조작'하는 장치로, 사실이라면 도저히 믿을 수가 없는 일입니다.\n\n대피소가 점점 위태로워졌기 때문에, 발굴 팀은 좌표를 궤도에 있는 우리 함선에 전송하고는 재빨리 현장을 빠져나갔습니다. 아직 해결되지 않은 의문이 많지만, 추적은 계속됩니다."
 cstorms.130.a: "그냥 넘어가기에는 너무나 달콤한 이야기로군요."
 #Special Project Descramble the Coordinates
 INETIAN_PROJECTS_01: "좌표 해독"
 INETIAN_PROJECTS_01_DESC: "대피소가 붕괴하기 전에 [wm_storm_shelter_planet.GetName]에서 암호화된 일련의 좌표를 회수했습니다. 이 좌표 중 하나가 아이네티안 상인 조합이 우주 폭풍을 조작하는 데 사용했던 기계의 위치를 가리키고 있을 것으로 파악됩니다. 그 기술을 위해서라면 수색 비용을 들일 가치가 있을지도 모릅니다."
 #Special project completed
 cstorms.135.name: "노다지 성계"
 cstorms.135.desc: "다행스럽게도 [wm_storm_shelter_planet.GetName]에 있던 우리 [Root.Owner.GetScientistPlural]들이 대피소가 붕괴하기 전에 암호화된 일련의 좌표를 확보할 수 있었습니다. 데이터를 해독해, 탐사 위치를 세 곳으로 좁혔습니다.\n\n바로 [wm_digsite_A.GetName], [wm_digsite_B.GetName], [wm_digsite_C.GetName]입니다. 추가 분석 결과, 각 행성은 [wm_storm_shelter_planet.GetName]의 대피소에 기록될 정도로 아이네티안 상인 조합에서 핵심적인 역할을 수행했던 것으로 추정됩니다."
 #Precursors Event Chain
 cs_inetian_chain_title: "선구자 - 아이네티안 상인 조합"
 cs_inetian_chain_desc: "수백만 년 전 번창했던 문명이 건설한 고대 대피소의 잔해를 발견했습니다. 이 문명에 대한 기록은 우리 제국 어디에도 남아 있지 않습니다. 마치 누군가가 역사에서 일부러 지워버린 것만 같습니다. 조사를 진행하면 그 이유를 알 수 있을지도 모릅니다."
 #Arcsite Coordinates A
 site_weathermanipulators_CoordinatesA_Residential_Planet: "좌표 A: 개척 행성"
 site_weathermanipulators_CoordinatesA_Residential_Planet_intro: "고대 폭풍 대피소에서 찾은 세 좌표 중 하나를 따라가니, 그곳에는 [From.Planet.GetName](이)가 있었습니다. 행성에 있는 유적의 규모로 볼 때, 이곳에는 한때 여러 거대 도심지가 자리 잡고 있었던 것이 분명합니다. 아마도 아주 오래전에 아이네티안 상인 조합의 주민들이 거주했던 곳으로 보입니다. 이 좌표가 폭풍 대피소 안에 꼭꼭 숨겨져 있던 이유를 알아내려면 추가 조사가 필요합니다."
 cstorms.140.name: "종교적 의도"
 cstorms.140.desc: "한때 [From.Planet.GetName]에 존재했었던 도시들은 이제 자취를 찾아보는 것조차 어렵습니다. 세월도 세월이지만, 지표면 곳곳에 우뚝 솟아있던 화려한 건물들이 폭풍에 휩쓸려 무너진 탓이 가장 큽니다. 남아 있는 건축물의 특징은 [wm_storm_shelter_planet.GetName]에서 발견된 것과 일치합니다. 폭풍이 휩쓸고 지나갔다는 증거는 무수히 존재하지만, 이에 비해 재난에 대한 대비는 이상할 정도로 부족합니다. 워낙 철저히 파괴된 탓에 쓸 만한 기록을 찾기란 어려워 보이나, 불가능한 일은 아니길 바랄 뿐입니다.\n\n[Root.Owner.GetScientistPlural]들은 착륙지 근처에 있는 세 지점을 조사 후보로 올렸습니다. 하나는 비교적 온전한 공공 서비스 건물이며, 다른 둘은 일종의 신전과 거대한 중앙 광장입니다. 아이네티안 상인 조합의 비밀을 파헤치기에는 이만한 장소가 없을 겁니다."
 cstorms.145.name: "경제의 심장"
 cstorms.145.desc: "탐사대를 여러 조로 나누어 유망해 보이는 세 지점을 조사했습니다. 공공 서비스 건물과 광장도 문화적, 건축적 측면에서는 흥미로웠지만, 특기할 만한 곳은 신전뿐이었습니다.\n\n무너져 가는 외벽은 공동과도 같은 전당을 감추고 있었습니다. 우리는 그 안에서 동심원을 그리도록 배치된 521개의 연산 단말기와 정중앙에서 위용을 뽐내는 완벽하게 작동하는 성계 모형을 발견했습니다. 모형을 이루는 세밀한 나노 부품은 행성의 전자기장에 맞춰 세심하게 조율되어 있었으며, 엄청난 세월이 흘렀음에도 모형은 이 성계의 천체를 정확하게 그려 냈습니다.\n\n또한, 전당의 원형 바닥을 따라 모든 단말기에서 볼 수 있도록 인터페이스가 길게 늘어서 있었습니다. 이 인터페이스의 화상에는 일련의 기업과 그 주가가 각인되어 있습니다. 이곳은 종교 시설이 아니었습니다. 아이네트의 교역 허브이자 주식 거래소였던 것입니다.\n\n이를 미루어 보아, 이 건물에는 한때 중요한 자료가 보관되어 있었을 것입니다. 그 자료를 반드시 찾아내야 합니다."
 cstorms.145.a: "샅샅이 뒤질 시간이군요."
 cstorms.150.name: "참고 자료"
 cstorms.150.intro: "계속해서 조사를 진행한 결과, [From.Planet.GetName]에 위치한 교역 허브를 누군가가 깨끗이 약탈해 갔다는 점을 알 수 있었습니다. 단말기는 작동하지 않으며, 모형의 인터페이스에 각인된 이미지 외에는 어떠한 거래 정보도 남아 있지 않습니다.\n\n그런데 전당 구석에 숨겨져 있던 저장 장치에 일종의 사용자 매뉴얼이 담겨 있었습니다. 우리는 [wm_storm_shelter_planet.GetName] 탐사 중에 개발한 번역 키를 사용해 매뉴얼을 대략적으로나마 번역했습니다.\n\n매뉴얼에는 단말기 작동법, 성계 모형 조율 방법, 그리고 국지적 재난 억제기라는 이름의 기계에 지원을 요청하는 방법이 적혀 있었습니다. 이 기계의 시동과 조준, 그리고 활성화 방법이 아주 자세히 서술되어 있습니다.\n\n고대 폭풍 대피소에서 언급된 장치임이 분명하며, 우리가 찾는 바로 그 장치일지도 모릅니다."
 cstorms.150.outro: "이제 우리는 아이네티안 상인 조합의 의도를 이해하고 이 기계의 힘을 우리 것으로 삼는 데 한 발짝 더 다가섰습니다."
 cstorms.150.desc.a: "$cstorms.150.intro$ $cstorms.150.outro$"
 cstorms.150.desc.b: "$cstorms.150.intro$ 이 매뉴얼은 우리가 [wm_digsite_B.GetName]에서 발견한 부품 중 하나를 언급하며, 그 설치 방법을 설명하고 있습니다. $cstorms.150.outro$"
 cstorms.150.desc.c: "$cstorms.150.intro$ 이 매뉴얼은 우리가 [wm_digsite_C.GetName]에서 발견한 기계를 언급하고 있으나, 아직 핵심 부품을 갖추지 못했습니다. 하지만 $cstorms.150.outro$"
 cstorms.150.desc.d: "$cstorms.150.intro$ 매뉴얼은 우리가 [wm_digsite_C.GetName]에서 발견한 기계를 언급하며, [wm_digsite_B.GetName]에서 찾은 부품의 설치 방법을 설명하고 있습니다. 이제 남은 것은 국지적 재난 억제기를 가동하는 것뿐입니다. 이 장치의 힘을 우리가 직접 사용할 순간이 마침내 찾아왔습니다!"
 cstorms.150.a: "계속 진행하세요."
 #Arcsite Coordinates B
 site_weathermanipulators_CoordinatesB_Industrial_Planet: "좌표 B: 산업 행성"
 site_weathermanipulators_CoordinatesB_Industrial_Planet_intro: "고대 폭풍 대피소에서 찾은 세 좌표 중 하나를 따라가자, 아이네티안 상인 조합이 소유했던 산업 행성인 [From.Planet.GetName]에 도달했습니다. 남아 있는 건물을 보니 거주용 행성이 아니었던 것만은 명백합니다. 다만 이 산업 행성이 정확히 무엇을 생산했는지는 아직 확실하지 않습니다."
 cstorms.155.name: "산업 효율성"
 cstorms.155.desc: "아직까지 공장 주변을 감돌고 있는 짙은 스모그 때문에 [From.Planet.GetName]의 표면을 확인하기란 쉽지 않았습니다. 행성 표면은 대부분 우주 폭풍에 유린당한 듯, 지표면을 균일하게 덮은 산업 시설 곳곳에는 커다란 균열이 존재했습니다. 우리는 그 균열 중 한 곳에서 알맞은 착륙 장소를 발견했습니다.\n\n이 생산 시설은 누군가가 해체하려 한 흔적은 없고, 그저 버려졌을 뿐입니다. 시설 안에는 각종 생산 자재가 그대로 남아 있습니다. 이 자재를 분석하면 이 행성이 고대 문명의 상업 인프라에서 어떤 역할을 담당했는지 파악할 수 있을지도 모릅니다. 그리고 어쩌면 [wm_storm_shelter_planet.GetName]에서 그토록 숭상하던 기계에 관해서도 뭔가 알아낼 수 있겠죠."
 cstorms.160.name: "취급 주의"
 cstorms.160.desc: "초도 분석을 진행한 결과, [From.Planet.GetName]에서 사용되었던 산업 자재가 상당히 휘발성이 높은 물질로 구성되었다는 사실을 알아냈습니다. 이 제품들은 더욱 거대한 공정의 일부분에 불과했으며, 단독으로 사용하는 물건은 아니었던 것 같습니다. 그리고 이 물질들은 운반 시스템을 통해 중앙의 수집 저장소로 옮겨졌습니다.\n\n주위에 그을음 자국이 있는 것을 보니, 이 저장소에는 항상 행성 간 수송선이 오갔던 게 분명합니다. 그렇다면 물건을 어디로 납품했던 것일까요? 화물의 폭발 위험성을 생각한다면 먼 곳은 아니었을 겁니다.\n\n근처에서 운송용 상자를 몇 개 발견했습니다. 상자 측면에 남아 있는 경고 라벨의 잔해로 미루어 보아, 이 상자는 각별히 주의를 기울여 포장된 것이 분명합니다. 라벨에서는 오직 한 단어만을 알아볼 수 있었습니다. '취급 주의'"
 cstorms.165.name: "미싱 링크"
 cstorms.165.intro: "우리 [Root.Owner.GetScientistPlural]들은 당장이라도 포장이 뜯어질 것 같은 상자들을 재빨리 해체했습니다.\n\n첫 번째 상자를 열자, 상자 내부는 기압이 다르게 유지됐던 듯 바람 빠지는 소리가 들렸습니다. 다들 이 소리를 듣고 내용물이 불안정해지지는 않을까 동요했지만, 다행히 손상은 없었습니다.\n\n더 자세히 살펴보니, 상자 안에는 훌륭한 만듦새의 기계 부품이 조심스럽게 담겨 있었습니다. 그리고 그 부품 안에는 공장에서 제조하던 휘발성 물질이 가득 들어 있습니다."
 cstorms.165.outro: "\n\n따라서, 부품을 함선으로 옮겨 추가 연구를 진행하고자 합니다. [Root.Owner.GetScientistPlural]들을 [From.Planet.GetName]의 험난한 지표면에 필요 이상으로 오래 머무르게 해서는 안 됩니다."
 cstorms.165.desc.a: "$cstorms.165.intro$\n\n상자 안에 있는 운송장에는 '국지적 재난 억제기'라는 장치가 언급되어 있습니다. 우리 [Root.Owner.GetScientistPlural]들은 아직 이 말이 무엇을 뜻하는지 파악하지 못했지만, 고내구성 용기를 사용하고 겉면에 경고 문구까지 붙여 놨다는 점을 고려하면 무언가 중요한 것임은 틀림없습니다.$cstorms.165.outro$" #A & C sites not yet visited
 cstorms.165.desc.b: "$cstorms.165.intro$\n\n부품을 보자마자 알아볼 수 있었습니다. 승무원들은 [wm_digsite_A.GetName]에서 찾은 매뉴얼을 가져와 부품과 대조했습니다. 예상했던 대로, 상자 안에 있는 정교한 기계 장치는 국지적 재난 억제기의 핵심 부품이었습니다.$cstorms.165.outro$" #A site visited & C site not visited
 cstorms.165.desc.c: "$cstorms.165.intro$\n\n그 독특한 외형과 액체가 담긴 코어를 볼 때, 이 부품이 [wm_digsite_C.GetName]에서 발견한 장치를 완성할 마지막 조각이라는 확신을 얻을 수 있었습니다. 안에 있는 물질은 분명 국지적 재난 억제기를 가동하는 데 쓰일 연료일 것입니다. 그러나 안전하게 부품을 설치하려면 특별한 지식이 필요할 것으로 보입니다.$cstorms.165.outro$" #A site not visited & C site visited
 cstorms.165.desc.d: "$cstorms.165.intro$\n\n이 부품은 [wm_digsite_C.GetName]에서 발견한 국지적 재난 억제기의 마지막 부품인 것으로 보입니다. [wm_digsite_A.GetName]에서 찾은 매뉴얼을 참고하면 부품을 올바르게 설치해 마침내 장치를 가동할 수 있을지도 모릅니다.$cstorms.165.outro$" #A & C sites visited
 cstorms.165.a: "고생 많았습니다."
 #Arcsite Coordinates C
 site_weathermanipulators_CoordinatesC_Barren_Planet: "좌표 C: 불모 행성"
 site_weathermanipulators_CoordinatesC_Barren_Planet_intro: "고대 폭풍 대피소에서 찾은 세 좌표 중 하나를 따라간 우리는 [From.Planet.GetName]에 도착했습니다. 지표면에는 눈과 먼지 외에는 거의 아무것도 존재하지 않으나, 1차 스캔 결과 한때는 거주가 가능했던 것으로 추정됩니다. 이 행성은 황폐해지기 전에는 아이네티안 상인 조합에게 중요한 곳이었던 걸까요? 아니면 엉망이 되고 나서야 중요해진 것일까요?"
 cstorms.170.name: "끊임없는 끝"
 cstorms.170.desc: "[From.Planet.GetName]의 지표면은 영원히 지속될 듯한 눈보라에 시달리고 있습니다. 그것만으로는 부족했는지, 이 행성의 설경은 뜻밖의 기이한 모습을 감추고 있었습니다.\n\n겹겹이 쌓인 먼지가 층을 이루고, 그 안에 한때 이곳에 거주했던 생명체들의 흔적이 남아 있습니다. 유해가 묻힌 시점이 모두 같은 것으로 볼 때, 대멸종이 있었던 모양입니다. 생태계가 붕괴하며 [From.Planet.GetName]의 대기는 점점 옅어졌고, 그 결과 빙하기가 찾아와 행성 전체가 불모지로 변해 버린 것입니다.\n\n이 행성에 모래 먼지와 얼음 외에도 무언가가 숨겨져 있을 것이라는 사실만은 명백하지만, 지표면에서는 답을 찾을 수 없어 보입니다. [Root.Owner.GetScientistPlural]들은 더 깊이 파고들어 조사해 봐야 한다고 보고했습니다."
 cstorms.170.a: "조사를 시작하세요."
 cstorms.171.name: "생명의 뿌리"
 cstorms.171.desc: "보호 장구와 내한성 중장비로 무장한 우리 [Root.Owner.GetScientistPlural]들은 지표면에 덮인 눈과 흙을 치워내는 지루한 단순 작업을 금세 끝마쳤습니다. 이윽고 그 밑에서 특이한 문양을 그리듯 일대를 뒤덮은, 마치 뿌리처럼 뻗어 나온 도랑이 드러났습니다.\n\n도랑 안에는 식물과 동물을 포함해 온갖 유기 생명체의 사체가 바싹 말라 버린 채 놓여 있습니다. 원리는 알 수 없지만 도랑벽이 움직여 유기물을 분쇄하고 영양분을 추출해 한 지점으로 운송하고 있는 것 같습니다. 마치 소화 과정을 보는 듯합니다. 그 공정 속에서 도랑이 뱉어 낸 먼지가 [From.Planet.GetName]의 지형 대부분을 덮고 있습니다.\n\n그렇다면 자연스럽게 의문이 하나 떠오릅니다. 이 도랑은 대체 어디에 영양분을 공급하고 있는 것일까요?"
 cstorms.171.a: "발원지를 찾아봅시다."
 cstorms.172.name: "먼 옛날의 기계"
 cstorms.172.intro: "지하 균열망의 규모는 실로 방대했습니다. 우리 [Root.Owner.GetScientistPlural]들이 도랑을 따라 나아가자 길은 점점 모여들었고, 마침내 모든 길이 [From.Planet.GetName]에 남아 있던 몇 안 되는 산 중 하나로 이어졌습니다. 산 정상은 한눈에 봐도 부자연스러울 정도로 평평했으며, 그 위에는 커다란 기계 세 개가 일정한 간격으로 늘어서 있었습니다. 적혀 있는 아이네티안 언어와 일전의 시설에서 본 익숙한 아이네티안 양식으로 볼 때, 이 기계는 아이네티안 문명이 남긴 물건인 게 분명합니다. 산 정상을 채찍처럼 때리는 강풍을 오랜 시간 견뎌 왔음에도 불구하고, 기계의 보존 상태는 매우 훌륭합니다."
 cstorms.172.outro: "\n\n어찌 되었든, 우리는 원하던 것을 찾았습니다. 이제 우리는 엄청난 발견의 순간을 눈앞에 두고 있습니다."
 cstorms.172.desc.a: "$cstorms.172.intro$ 이 기계는 [From.Planet.GetName]에서 언급되었던 기계임이 틀림없습니다. 안타깝게도, 우리에게는 이 장치의 복잡한 내부 원리를 파악할 지식이 없습니다. 그뿐만 아니라, 기계 중 하나의 기단부에서 발견한 제어 콘솔에는 명백히 핵심 부품으로 보이는 부분이 누락되어 있습니다. 그리고 어떤 작은 판에 새겨진 글자를 해독해 보니, 다음과 같은 글귀가 적혀 있었습니다. '국지적 재난 억제기.'\n\n가동할 수만 있다면 기계의 용도를 알아낼 수 있을 테지만, 그렇게 하려면 남은 좌표를 탐사해야 합니다. $cstorms.172.outro$" #A&B not visited
 cstorms.172.desc.b: "$cstorms.172.intro$ \n\n[wm_digsite_A.GetName]에서 발견한 매뉴얼에 담긴 도면은 눈앞에 있는 장치와 일치합니다. 그렇다면 결론은 하나입니다. 이 장치가 바로 [wm_storm_shelter_planet.GetName]에서 발견한 폭풍 대피소에 기록되어 있던 그 기계, 국지적 재난 억제기임이 틀림없습니다.\n\n매뉴얼에 따르면 이 기계들은 제어 패널로 작동시킬 수 있는 것으로 보입니다. [Root.Owner.GetScientistPlural]들이 기계 중 하나의 기단부에서 패널을 찾았지만, 아쉽게도 핵심 부품이 빠져 있습니다. 하지만 좌표 중 한 곳을 아직 탐사하지 않았으니, 그곳에 이 상황을 타개할 열쇠가 있을지도 모릅니다. $cstorms.172.outro$" #A visited & B not visited
 cstorms.172.desc.c: "$cstorms.172.intro$ \n\n이 장치가 [wm_storm_shelter_planet.GetName]에서 언급되었던 바로 그 기계, 국지적 재난 억제기인 게 틀림없습니다! 게다가 [wm_digsite_B.GetName]에서 발견한 부품을 기계 중 하나의 기단부에 있는 제어 패널에 넣으니, 마치 제자리를 찾았다는 듯이 쉽게 들어갔습니다.\n\n그러나 부품의 복잡도와 연식을 고려하면 이 이상 수리를 진행하는 것은 위험할지도 모릅니다. [Root.Owner.GetScientistPlural]들은 정보를 더 찾고 나서 수리를 진행할 것을 권고했습니다. $cstorms.172.outro$" #A not visited & B visited
 cstorms.172.desc.d: "$cstorms.172.intro$ \n\n틀림없습니다. 이 장치가 바로 [wm_storm_shelter_planet.GetName]에서 언급되었으며, [wm_digsite_A.GetName]에서 발견한 매뉴얼이 설명하고 있던 그 기계, 국지적 재난 억제기입니다. 이제 남은 일은 [wm_digsite_B.GetName]에서 발견한 부품을 설치하고, 기계가 아직 작동되기를 바라는 것뿐입니다. 그때 비로소 이 기계의 용도를 알아낼 수 있을 것입니다. $cstorms.172.outro$" #A&B visited
 cstorms.172.a: "이 기계의 능력을 확인할 차례로군요." #Finished sites A and B
 cstorms.172.b: "그냥 넘어가세요." #Did not finish sites A and B
 #Special Project 2
 INETIAN_PROJECTS_02: "기계의 비밀"
 INETIAN_PROJECTS_02_DESC: "[wm_storm_shelter_planet.GetName]에서 발견한 세 좌표를 탐사해 고대의 수수께끼를 풀었습니다. 이제 남은 일은 국지적 재난 억제기를 가동하는 것뿐입니다. 드디어 기계의 용도를 알아낼 때가 왔습니다."
 cstorms.176.name: "기계의 비밀"
 cstorms.176.desc: "마지막 퍼즐 조각을 찾은 [Root.Owner.GetScientistPlural]들이 즉시 작업에 들어갔습니다. [wm_digsite_B.GetName]에서 발견한 부품은 제어 콘솔에 깔끔하게 들어맞았고, [wm_digsite_A.GetName]에서 회수한 매뉴얼을 참고해 부품을 올바르게 설치했습니다. 부품을 설치하자, 세 기계가 모두 가동을 시작했습니다.\n\n천둥 같은 진동이 일어나 산 정상에서 먼지와 눈을 털어 냈고, 번개가 지직거리는 듯한 소리와 함께 [Root.Owner.GetScientist](이)가 그 자리에서 증발하고 말았습니다. 조금 전까지만 해도 육체를 이루고 있었던 먼지의 소용돌이가 도랑 속으로 빨려 들어가 국지적 재난 억제기로 향했습니다.\n\n이때 비로소 [wm_digsite_C.GetName](이)가 어떤 운명을 맞이했었는지 알 수 있었습니다. 기계의 밑부분으로 이어지는 도랑은 일종의 연료 관으로, 주변의 생체 물질을 빨아들입니다. 그리고 그 과정에서 행성 전체에 파괴의 흔적을 남겼습니다.\n\n국지적 재난 억제기는 완전히 가동되었으며, 1번 사용할 연료가 남아 있습니다. 남은 건 버튼을 누르는 것뿐입니다."
 cstorms.176.a: "기계를 가동하세요."
 cstorms.176.b: "버튼을 누르지 마세요."
 #Delayed Event 1
 cstorms.180.name: "잔해 속 재발견"
 cstorms.180.desc: "국지적 재난 억제기의 비밀을 밝혀낸 것을 끝으로, 아이네티안 상인 조합이 맞이한 운명에 대한 단서는 자취를 감췄습니다. 그러나 기존 자료를 철저하게 재검토한 결과, 몇 가지 새로운 정보를 알아낼 수 있었습니다.\n\n[wm_digsite_A.GetName]에서 회수한 거래 기록을 살펴보니 아이네티안들은 평등주의에 열렬히 심취했던 모양입니다. 이는 행성에 아직까지 남아 있는 풍부한 호화 시설과 그로부터 드러나는 높은 생활 수준을 통해서도 파악할 수 있습니다. 모든 국민이 직업, 사회적 지위, 혈통과 관계없이 동등한 안락함과 기회를 누렸던 것입니다.\n\n[wm_digsite_B.GetName]에서는 각 공장의 활용 내역을 자세히 보여 주는 색인 자료를 발견했습니다. 이 공장들은 제국 주민의 풍족한 생활을 뒷받침하는 데 필요한 물자를 제공하기 위해 구축된 거대한 생산망의 일부였습니다. 이러한 혜택을 균등하게 분배하기 위해서는 엄청난 양의 물자와 식량을 번개 같은 속도로 생산해야 했을 것입니다.\n\n[wm_digsite_C.GetName]에서 발견하고 수리를 마친 국지적 재난 억제기에서도 장치가 완전히 가동을 멈추기 전에 몇 가지 정보를 알아낼 수 있었습니다. 이 장치의 정확한 용도는 여전히 베일에 싸여 있지만, 추적 가능한 데이터 신호를 회수해 알아보니 이 장치의 목표물은 자유롭게 움직이는 대상이 아니었습니다.\n\n[Root.Owner.GetScientistPlural]들은 인근 구역을 탐사해 해당 신호에 대한 응답 신호를 찾아볼 것을 제안했습니다."
 cstorms.180.a: "목표물을 찾아봅시다."
 #Digsite 5
 site_weathermanipulators_storm_formation: "퍼져 나간 기원"
 site_weathermanipulators_storm_formation_intro: "국지적 재난 억제기의 제어 콘솔에 저장되어 있던 데이터 신호를 발견했습니다. 다소 어려움이 따랐지만, 우리는 신호 패턴을 복제한 다음 그 패턴과 일치하는 신호를 찾아 은하계를 탐사했습니다. 그렇게 흔적을 따라가 도착한 곳은 생명체가 없는 한 행성이었습니다. 이제 아이네티안 상인 조합이 목표로 한 것이 무엇인지, 그리고 그 이유는 어떠한지 알아볼 시간입니다."
 cstorms.181.name: "별다를 것 없는 평원"
 cstorms.181.desc: "언뜻 보기에 [From.Planet.GetName]에는 이상한 점이 없습니다. 은하 전체에 퍼져 있는 수백 개의 다른 행성과 다를 바 없는 평범한 행성입니다. 우리가 찾은 신호의 발신지로 이어질 만한 단서는 없었고, 몇 성계나 떨어진 곳에서도 감지할 수 있는 신호를 보낼 만큼 강력한 송신기나 그에 준하는 장치도 눈에 띄지 않습니다.\n\n수색을 계속 진행하겠습니다."
 cstorms.182.name: "국지적 재난"
 cstorms.182.desc: "지표면에 착륙하고 얼마 지나지 않아, 우리는 위치에 따라 신호의 강도가 달라진다는 사실을 알아냈습니다. 이 간단한 패턴을 따라 마침내 다다른 곳은 행성 반대편에 있는 높다란 산맥이었습니다.\n\n하늘을 향해 우뚝 선 산악 지대에 다가갈수록 주변은 점점 황폐한 불모지로 변해 갔습니다. 마치 엄청난 힘을 지닌 무언가가 행성의 이 부분만을 휩쓸고 지나간 듯한 모습이며, 훼손 양상으로 보건대 우주 먼지 폭풍이 강타한 것 같습니다. 하지만 그렇다면, 논리적으로 행성 전체가 피해를 봤어야 정상입니다. 그 정도 규모의 폭풍이 이처럼 국지적인 피해를 주다니 처음 보는 현상입니다. 더 자세한 사정을 알아보기 위해서는 저 위풍당당한 산봉우리를 등반해 볼 필요가 있을 것 같습니다."
 cstorms.183.name: "일렁이는 에너지"
 cstorms.183.desc: "황폐해진 산맥에는 수많은 봉우리와 계곡이 있었지만, 유독 특이하게 생긴 크레이터 하나가 가장 먼저 우리의 관심을 끌었습니다. 표면은 매끄럽고, 중앙의 바닥에는 여러 개의 동심원이 새겨져 있습니다.\n\n크레이터 안쪽으로 내려가자, 도무지 벗어날 수 없을 정도로 강력한 힘이 우리를 잡아끌기 시작했습니다. 이 힘은 분명히 원의 중심으로부터 새어 나오고 있습니다. 원의 고리를 따라 에너지 줄기가 일렁이고 있으며, 일부는 행성 대기권 너머에까지 뻗어나갑니다. 신호의 발신지는 이곳이었습니다.\n\n[Root.Owner.GetScientistPlural]들이 이 행성에서 무슨 일이 있었는지 알아보기 위해 해당 크레이터와 크레이터의 에너지 파동을 분석할 것을 제안했습니다."
 cstorms.184.name: "불확실한 기원"
 cstorms.184.desc: "환경 데이터와 세부 모의실험 결과를 놓고 볼 때, 과거 이 산악 지대를 휩쓸었던 것은 우주급 입자 폭풍이었던 것이 확실합니다. 아니, 정확히 말하자면 폭풍이 바로 이곳에서 생겨났습니다! 그 과정에서 행성 전체가 휩쓸리지 않은 것은, 아마도 폭풍이 너무나도 작았기 때문일 것입니다. 분석 결과에 따르면 이 폭풍은 일반적인 폭풍에 비해서도 아주 작았던 것으로 추정됩니다.\n\n아이네티안 상인 조합이 국지적 재난 억제기를 '조작 장치'라고 불렀다는 사실, 그리고 이곳에서 발생한 폭풍의 에너지 신호가 상인 조합의 데이터 뱅크에 기록되어 있었다는 사실을 고려한다면, 상인 조합이 이곳의 우주 폭풍을 조종하려 했을 가능성이 높아 보입니다. 폭풍이 이 행성을 떠나 이동한 경로를 계산해 보면 크게 도움이 될 정보를 얻을 수 있을지도 모릅니다."
 cstorms.184.a: "계속 진행하세요."
 #Special Project 3
 INETIAN_PROJECTS_03: "상인 조합 추적"
 INETIAN_PROJECTS_03_DESC: "오래전에 우주급 입자 폭풍이 형성된 지점을 찾았지만, 발견한 증거에 의하면 그 규모는 일반적인 재해보다 훨씬 작았던 것으로 보입니다. 그렇다면 아이네티안 상인 조합은 어째서 국지적 재난 억제기를 사용해서까지 폭풍을 제어할 필요가 있다고 판단했던 걸까요?\n\n폭풍의 경로를 추적해 보면 이 사업에 그토록 많은 시간을 투자한 이유를 알 수 있을지도 모릅니다."
 cstorms.186.name: "상인 조합 추적"
 cstorms.186.desc: "우주급 입자 폭풍의 경로를 추적하는 것은 생각처럼 간단하지 않았지만, 발원지로부터 몇 성계 떨어진 곳에서 폭풍의 강도와 크기, 그리고 경로가 급격하게 변화한 것을 발견했습니다. [Root.Owner.GetScientistPlural]들은 바로 이때 국지적 재난 억제기가 폭풍에 명중한 것으로 추측했습니다. 억제기가 폭풍을 원래 경로에서 튕겨 내며, [wm_digsite_C.GetName]의 표면에서 긁어모은 곤죽이 된 야생 동물의 유해를 폭풍 내부에 유입시켰다는 것입니다.\n\n폭풍은 은하를 계속 휩쓸고 다니면서 여러 성계를 집어삼켜 끔찍한 피해를 남겼습니다.\n\n이 모든 게 그저 작은 폭풍이 특정 성계에 진입하지 못하도록 막는 과정에서 발생한 일입니다... 감지기가 앞서 말한 성계에서 버려진 우주 기지를 포착했습니다. 아이네티안 상인 조합은 이 기지를 지키기 위해 수차례의 대멸종을 불러일으켰습니다.\n\n이 기지는 우리가 찾던 수도 성계는 아니지만, 상인 조합이 이곳에 취한 조치를 생각한다면 틀림없이 수도 성계만큼이나 중요한 곳이었을 게 분명합니다."
 cstorms.186.a: "항로를 설정하세요."
 #Digsite 6
 site_weathermanipulators_last_shelter: "스러지기 전에"
 site_weathermanipulators_last_shelter_intro: "아이네티안 상인 조합은 이 성계에 있는 우주 기지를 작은 우주급 입자 폭풍으로부터 지켜 내려 했습니다. 그러나 예상과는 달리 폭풍의 크기가 너무 커졌고, 그 결과 인근에 있는 여러 성계가 파괴되었습니다. 왜 이렇게 하면서까지 이 기지를 지켜 내려 한 것일까요?"
 cstorms.190.name: "안정적인 궤도"
 cstorms.190.desc: "[From.Planet.GetName] 궤도에 위치한 이 우주 기지는 예상했던 것보다 훨씬 규모가 컸습니다. 게다가 여러 연구 설비와 정교한 생명 유지 시스템, 그리고 대규모 심우주 감지기를 갖춘 것으로 보아 단순한 기지가 아닌 것은 분명합니다. 이를 미루어 보아, 이 기지는 중간 지점을 넘어 장기 식민지로 활용되었을 가능성이 높아 보입니다.\n\n하지만 보존 상태는 암울합니다. 외벽 손상으로 폭발적인 감압이 발생해 여러 구역이 터져 나갔습니다. 이 손상이 내부에서 발생한 것인지, 아니면 외부에서 발생한 것인지는 분명하지 않습니다. 다행스럽게도 궤도 제어 및 축 안정화 기능은 정상 작동 중이며, 그 덕분에 시설이 별들 사이로 표류하거나 멈출 수 없는 회전을 일으키지는 않았습니다.\n\n이 위태롭기 짝이 없는 균형을 흐트러뜨리지 않고 안에 진입하기란 상당히 어려워 보입니다."
 cstorms.191.name: "인상적인 압력"
 cstorms.191.desc: "[This.System.GetName] 성계의 기지에 진입하기 위해서는 폭발에 주의하며 손상을 피한 에어록을 비집어 열어야만 했습니다. 기지 내부에는 아직 압력이 남아 있었고, 오랜 세월이 지났음에도 불구하고 전형적인 행성 대기를 제대로 모방하고 있었습니다.\n\n우리 함선과 기지 사이의 기압을 완벽히 일치시키기 위한 밀봉 작업에만 며칠이 걸렸지만, 결국 우리는 안전하게 문을 열 수 있었습니다. 하지만 들어가자마자 또 다른 장애물이 우리를 반겨 주었습니다. 인근 구역의 감압으로 인해 생긴 잔해 더미와 비틀린 기둥이 복도를 가로막은 것입니다. 더 깊이 들어가려면 시간이 필요할 것 같습니다."
 cstorms.192.name: "내부의 묘소"
 cstorms.192.desc: "나아갈 길을 확보한 우리는 궁금증에 대한 답을 찾아 기지를 탐사했습니다.\n\n철저한 조사를 실시한 결과, 이 기지는 우주를 관측하기 위해서가 아니라 무언가를 보호하기 위해 만들어졌다는 사실을 알 수 있었습니다. 실제로 비치된 정교한 스캔 장비의 대부분은 내부를 향하고 있습니다. 아이네티안 상인 조합 주민들의 개인 물품도 찾을 수 있었고, 기지에서의 생활 내용을 담은 기록도 나왔습니다. 해당 기록에서 기지 내 어딘가에 중요한 물건이 삼엄한 경비 아래 보관되어 있다는 내용을 발견할 수 있었습니다. 얼마 지나지 않아 발견한 그 방은 다름 아닌 무덤이었습니다.\n\n방 안에는 바싹 말라 거의 미라화된 시신들이 놓여 있었는데, 전부 아이네티안 상인 조합의 구성원들이었습니다. 자세가 평안한 것을 보면 가만히 앉아 죽음을 받아들인 것 같습니다. 여기서 대체 무슨 일이 있었던 걸까요?"
 cstorms.193.name: "오만"
 cstorms.193.desc: "주민들의 기록에서 언급된 그 물체는 방 중앙에 가지런히 놓여 있었습니다. 일종의 장치로 보이며, 사용한 흔적이 없는 새 물건입니다. 아이네티안이 만든 장치인 건 확실하지만, 우리가 지금까지 봤던 그 어떤 장치보다 발전된 모습입니다.\n\n물체의 옆면에 붙어 있는 단말기는 같은 문구를 몇 번이고 계속 반복해 출력하고 있습니다. 번역은 금방 완료할 수 있었습니다.\n\n§L이곳을 찾은 여러분께. 이 글을 읽고 계신다면 우리의 오만이 낳은 결과를 보셨겠지요. 우리는 평등이라는 고상한 이상을 추구하다, 창조와 파괴야말로 진정한 평등을 불러오는 힘이라는 사실을 잊고 말았습니다.\n\n우리는 우리 무역로가 우주 폭풍에 무너지는 일을 막고자 자연에 손을 댔습니다. 그렇게 한때는 작은 재난에 불과했던 것이 이제는 걷잡을 수 없이 자라났습니다. 자라난 우주 폭풍은 우리 행성들을 휩쓸었고, 이윽고 우리는 이것이 우연이 아니라 보복이라는 사실을 깨달았습니다. 이후, 우리는 우리 스스로를 이 기지 속에 가뒀습니다. 너무나도 늦어 버린 최후의 저항이었죠. 더 이상 억제기를 사용하지 않았음에도 불구하고 더 강력하고 사나운 폭풍이 연이어 생겨났습니다. 우리가 마지막으로 해야 할 일은 자명했습니다.\n\n우리는 열과 성을 다해 이 기계를 만들었습니다. 바로 이곳을 찾은 여러분을 위해서 말입니다. 이 기계가 있으면 폭풍의 화를 돋우는 일 없이 재앙을 면할 수 있을 겁니다. 우리는 죽음으로 용서를 구하지만, 여러분은 다른 길을 걸을 수 있기를.§!\n\n아이네티안 상인 조합은 이 방에서 자신들의 운명을 매듭지었습니다. 이들은 비록 부주의했으나, 그만큼 자애로운 자들이었습니다. 우리는 이들의 작별 선물을 가지고 기지를 떠났습니다."
 cstorms.193.a: "편히 쉬시길."
 cstorms.193.b: "어리석은 자들에게 어울리는 결말입니다."
 #Artifact action
 artifact_inetian_research: "아이네티안 상인 조합의 비밀"
 artifact_inetian_research_desc: "아이네티안 상인 조합의 비밀을 더욱 깊게 파고듭니다."
 artifact_inetian_research_completed: "$artifact_inetian_research$"
 artifact_inetian_research_completed_desc: "우리는 아이네티안 상인 조합의 고대 지식을 사용하기로 했습니다."
 INETIAN_PROJECTS_04: "아이네티안 상인 조합의 비밀에 대한 탐구"
 INETIAN_PROJECTS_04_DESC: "아이네티안 상인 조합의 마지막 안식처를 발견했지만, 그 광대했던 제국에 관해 알아야 할 것은 아직 많이 남아 있습니다. 한 번 더 조사를 진행하고자 합니다."
 cstorms.195.name: "아이네티안 상인 조합의 비밀에 대한 탐구"
 cstorms.195.desc: "아이네티안 상인 조합의 마지막 안식처는 최첨단 우주 기지였습니다. 자신들이 불러온 끔찍한 우주 폭풍으로부터 벗어나기 위해 상인 조합은 피난처로 이 우주 기지를 만들었습니다. 놀라울 정도의 거주 적합도 제어 기능부터 막강한 보호 시스템까지, 이 독특한 거주지는 아이네티안 기술의 정점입니다. 하지만 이 시설도 상인 조합의 주민들을 언제까지나 지켜 줄 수는 없었습니다.\n\n결국 시설은 세월에 세월을 거쳐 축적된 손상으로 인해 더 이상 안전하게 거주할 수 없게 되었지만, 우리 [Root.Owner.GetScientistPlural]들은 그 시스템으로부터 수많은 지식을 추출할 수 있었습니다. 아이네티안 상인 조합의 주요 무역로가 담긴 데이터 뱅크는 물론, 효율성은 높이고 행성에는 부담이 적은 기후 제어 장치의 프로토타입 또한 발견했습니다.\n\n아이네티안 상인 조합이 보여 줬던 집념은 끝끝내 살아남아 조그마한 열매를 맺었습니다. 그리고 그 과실은 우리가 이 폭풍을 이겨낼 수 있도록 도와줄 것입니다."
 secrets_of_the_inetian_traders: "아이네티안 상인 조합의 비밀"
 secrets_of_the_inetian_traders_hive_mach: "아이네티안 상인 조합의 비밀"
 secrets_of_the_inetian_traders_desc: "아이네티안 상인 조합이 남긴 고대 지식이 다시 한번 우리에게 도움이 되었습니다. 상인 조합이 남긴 유산 덕분에 시장 수수료가 감소했습니다."
 secrets_of_the_inetian_traders_hive_mach_desc: "아이네티안 상인 조합의 보존된 데이터가 다시 한번 우리 집단에 도움이 되었습니다. 이제 시장 수수료가 감소됩니다."
 #Hyperlane Detailer - Secrets Of Inetian Traders Reward
 sm_hyperlane_detailer: "초공간 항로 세부 조절기"
 NAME_inetian: "아이네티안 상인 조합"
 ###########################################
 #The adAkkaria Convention of Benevolence #
 ###########################################
 cs_adAkkaria_chain_title: "선구자 - 아드아카리아"
 cs_adAkkaria_chain_desc: "이 기묘한 고대 문명이 맞이한 운명을 알아내려면 일련의 단서를 따라가야 합니다. 그 끝에 무엇이 있을지는 아직 알 수 없습니다."
 #Anomaly: Ancient Signals
 STORMS_PREC_ONE: "고대 신호"
 STORMS_PREC_ONE_DESC: "이 성계에서 일련의 특이한 전기 신호가 감지되었습니다. 예비 분석 결과, 수천 년 이상 전의 신호일 가능성이 있습니다. 승무원들이 이 신호의 발신지를 꼭 찾아보고 싶다고 요청했습니다."
 cstorms.205.name: "자애의 신호"
 cstorms.205.desc: "이 성계에서 감지한 이상한 신호는 [FromFrom.GetName] 궤도상의 고대 통신 기지에서 발신되고 있습니다. 신호의 정체는 지금은 잊힌 문명이 송출하던 오래된 방송 메시지인 듯합니다.\n\n이 때문에 우리 [Root.Owner.GetScientistPlural]들이 메시지를 해독하는 데 애를 먹고 있습니다. 연구진은 기지에 들어가 전송용 메인프레임에 직접 접속하는 방법을 제안했습니다."
 #Digsite: The Propaganda Station
 site_adakkaria_the_propaganda_station: "선전 기지"
 site_adakkaria_the_propaganda_station_intro: "이 고대 통신 기지는 여전히 가동 중입니다. 기지에 들어가 시스템과 직접 연결하면 이전에 수신한 방송을 해독할 수 있을지도 모릅니다."
 cstorms.215.name: "과거와의 접촉"
 cstorms.215.desc: "기지에 들어가는 데에는 큰 문제가 없었지만, 시설 내부를 탐색하는 일은 쉽지 않았습니다. 첨단 물질로 구성된 외부 차폐막 덕분에 보존 상태는 놀라울 정도로 좋으나, 복도가 좁고 천장이 낮아 대원들의 고생이 이만저만이 아니었습니다.\n\n이곳의 전 주인에 관해 알려 줄 단서를 찾아봤지만, 종이와 플라스틱의 혼합물로 만들어진 포스터가 벽에 장식되어 있을 뿐 기지 내부에서는 아무것도 발견하지 못했습니다. 포스터에는 알 수 없는 유기체 종족이 정형화된 모습으로 묘사되어 있습니다. 정복과 기념을 나타내는 배경 앞에서 의연한 모습으로 우뚝 서 있는 것으로 보아, 종족의 자긍심과 유대감을 고취하려는 의도로 제작된 것이 분명합니다.\n\n전송용 메인프레임 자체도 수수께끼투성이였습니다. 우리 [Root.Owner.GetEngineerPlural]들은 이 장치가 [Root.Owner.GetPreFTLLowerPlural]의 장치와 마찬가지로 아날로그적인 구조를 하고 있을 것으로 추측했습니다. 하지만 겉면의 버튼과 다이얼 밑에는 복잡한 전자 회로가 배열되어 있었고, 심지어 그 소재는 우리가 알지 못하는 미지의 합금이었습니다. [Root.Owner.GetScientistPlural]들은 이 문명이 컴퓨터 공학 면에서는 발전 단계를 몇 단계 뛰어넘었을 것이라는 가설을 세웠습니다. 그렇다면 시대가 서로 어긋난 듯한 기술이 뒤섞여 있는 것도 설명이 됩니다.\n\n어쨌든 몇 번의 시도와 실패 끝에 우리 [Root.Owner.GetLinguists]들이 드디어 여러 방송 기록 중 첫 번째 기록의 해독에 성공했습니다."
 cstorms.220.name: "최고 지엄 지도부의 메시지"
 cstorms.220.desc: "고대 전송용 메인프레임 접속에 성공한 우리 [Root.Owner.GetLinguists]들이 첫 번째 방송의 녹취록을 보내왔습니다.\n\n§L아드아카리아 자애회의 친우들이여!\n\n오늘은 영도자로서가 아니라 친우이자 조언가로서 여러분에게 말을 전하고자 하오.\n\n그대들도 이미 느끼고 있을 것이오. 우리를 비추던 해는 저물고, 하늘 또한 씁쓸함만을 더해가는 듯하구려. 지금은 별마저도 우리에게 등을 돌리는 것만 같소.\n\n그러나 본인은 믿고 있소. 우리의 후원자들이 우리를 믿어 주었듯, 본인은 우리의 대의를 믿소. 그리고 무엇보다 그대들을 믿소.\n\n수백 년 동안 우리 국민들은 극악무도한 야만 종족 무리로부터 이 우주를 지켜 냈소. 그 악의에 찬 세력으로부터 이 은하를 지켜 내는 것이 우리의 운명인 것이오. 그리고 운명이라는 것은 한 번의 실패로 좌절되지 않는 법. 우리를 해치려 작당하는 그 간악한 무리는 우리에게 생채기 하나 낼 수 없을 것이오.\n\n본인은 우리의 사명을 믿소. 아드아카리아 자애회는 모든 문명에 진실과 자유를 선사하니, 우리는 운명의 힘으로 승리하고 번성할 것이오!\n\n그러니 친우들이여, 의심에 굴복하지 마시오. 희생된 이들을 애도하고, 스러진 자들을 기리시오. 그 후에, 다시 한번 하나 되어 모입시다. 우리 후원자들을 위해. 아드아카리아 자애회를 위해. 자애를 위해!§!"
 cstorms.225.name: "범공의 최후통첩"
 cstorms.225.desc: "고대 기지에서 회수한 데이터를 분류하는 일은 우리 [Root.Owner.GetLinguists]들에게도 매우 벅찬 작업이었습니다. 그러나 몇몇 방송에서 주목할 만한 내용을 발견할 수 있었고, 그중 일부에는 대화의 녹음까지 담겨 있었습니다.\n\n§S일사프네 투에르티 - 앵커§!\n§L - - 최근 발생한 범우주공동체의 준동에 관해 말씀 나눠 보겠습니다. 아크마니 산도 존엄 교수님, 그리고 엠에크 인나 만물박사님께서 자리에 나와 주셨습니다. 존엄 교수님, 범우주공동체, 줄여서 범공의 요구 사항을 어떻게 생각하시는지요?§!\n\n§S아크마니 산도 - 존엄 교수§!\n§L말도 안 되는 요구요! 범공은 문명화되지 않은 행성들을 철저하게 무시하고 있소. 그렇다면 은하계의 도덕을 수호한다고 자처하는 그들에게 이렇게 물어보십시다. 생명을 구하는 기술을 썩히는 것이 더 윤리에 어긋나는 일 아니오? 우리 부강한 사회의 초석이 된 이상을 그저 묵혀 두라는 거냔 말이오! 어떤 세계가 자멸을 향해 나아가고 있다면 마땅히 손을 뻗어 막아야지 그냥 보고만 있을 뿐이라니, 만행도 이런 만행이 없소!§!\n\n§S일사프네 투에르티 - 앵커§!\n§L훌륭한 말씀 잘 들었습니다! 만물박사님, 우리의 운명을 좌우하려는 범공에 대해 마찬가지로 분노하고 계시리라 생각합니다만, 어떠신가요?§!\n\n§S엠에쿠 인나 - 만물박사§!\n§L이 말씀을 드리면 충격을 받으실지도 모르겠군요. 범공이 완고한 기구라는 것에는 동의하지만, 범공이 제기하는 우려는 일단 검토는 해 볼...§!\n\n§T방송은 여기에서 중단된 것 같습니다.§!"
 cstorms.225.a: "참으로 독단적인 이들이로군요."
 cstorms.225.a.hive: "사공이 저리 많아서야."
 cstorms.225.a.machine: "삶은 원래 논쟁의 연속입니다."
 cstorms.230.name: "성자와 능력자"
 cstorms.230.desc: "주목할 만한 가치가 있는 방송이 또 확인되었습니다. 매우 극적인 작품이며, 우리의 조사에도 유용한 맥락을 제공해 줍니다.\n\n§S아크타미안 리완§!\n§L듣자 하니 당신, 어젯밤에 엔툴라 사만을 만났다더군. 그자를 버리고 이 몸과 사랑을 맹세했던 게 아니었소?§!\n\n§S인엘카 우테이§!\n§L그저 예의상 방문한 것이에요. 믿어 주셔요. 제게는 오직 당신뿐이에요!§!\n\n§S아크타미안 리완§!\n§L그대의 입은 그리 말하지. 하지만 그대의 마음은! 다른 이야기를 하고 있소. 무언가 다르단 말이오.§!\n\n§S인엘카 우테이§!\n§L설마 당신도!§!\n\n§S아크타미안 리완§!\n§L그래, 맞소! 바로 어젯밤 내 사이오닉 능력을 발견했지! 그것으로 우리 사이의 깊은 감정을 확인하고 기쁨에 잠기려 했건만, 기쁨은커녕 절망만 느낄 뿐이오! 그대의 생각에 깃든 바로 그 배신 때문에!§!\n\n§S인엘카 우테이§!\n§L어찌 그런 말씀을! 제 생각은 저도 어쩔 수 없답니다. 저도 이치에 맞는 길을 따를 수밖에 없다고요! 오, 리완, 사이오닉 능력으로 내 생각은 읽을 수 있어도 내 마음은 읽지 못하는군요!§!"
 cstorms.230.a: "사이오닉 능력? 흥미롭군요."
 cstorms.230.b: "쓸데없는 헛소리군요!"
 cstorms.230.b.hive: "이토록 개인주의적인 형태의 오락이라니. 흥미롭습니다."
 cstorms.230.b.machine: "하여간 유기체들이란."
 dramatic_enthusiasm: "외계 드라마 애호가"
 melodramatic_much: "외계 드라마 혐오자"
 cstorms.235.name: "옛 방송"
 cstorms.235.desc: "[Root.Owner.GetLinguists]들은 앞서 말한 방송 외에도 각종 뉴스를 번역했는데, 그중에 다음 방송을 들어볼 것을 권했습니다.\n\n§L할리오스 성계에서 연이어 들어오는 제보에 따르면 상황이 점점 급박해지고 있다고 합니다. 비겁한 솔파니 정부가 엔입살 지점에서 용감한 우리 계몽군을 급습했다는 듯합니다! 그럼에도 불구하고, 우리의 최고 지엄 지도부는 계몽 과정을 멈추는 일은 결코 없을 것이라며 이렇게 발표했습니다. \"우리의 후원자들은 우리를 포기하지 않았소. 그리고 우리는 어떤 개발 도상 문명도 낙오되지 않게 할 것이오.\"\n\n사악한 야만 종족 정부와 범공 대표단이 손을 잡을지도 모른다는 소문이 퍼지고 있습니다. 하지만 범공 대사는 범우주공동체는 야만족의 압제자들과 내통한 바가 없다고 부인하며, 우리 최고 지엄 지도부가 이번에도 '편리한 편집증'을 일으킨 것이라고 평했습니다.\n\n하지만 강력한 동맹이 있든 없든 간에, 솔파니에 대한 계몽 과정은 현재 위기에 봉착했습니다. 상황을 반전시키기는 쉽지 않은 것으로 보이나...§!\n\n§T유감스럽게도 방송의 나머지 부분은 손상이 심해 해독할 수 없었습니다. 우리 [Root.Owner.GetEngineerPlural]들이 이미 해당 데이터베이스의 사본을 만들었습니다. 머지않아 시간의 그늘에 가렸던 이 문명에서 더 많은 정보를 회수할 수 있기를 바랍니다.§!"
 cstorms.235.a: "앞으로 알아낼 정보를 기대하죠."
 #Event: A Site Barren and Bare
 cstorms.245.name: "척박하고 황량한 현장"
 cstorms.245.desc: "[planet_windswept_fates.System.GetName] 성계를 휩쓸고 지나간 우주 폭풍이 [planet_windswept_fates.GetName]에서 유적을 드러냈습니다. 고고학적으로 중요한 유적일지도 모릅니다.\n\n§Y[planet_windswept_fates.GetName]§!에 대해 예비 스캔을 진행한 결과, 막대한 크기의 행성 폭풍이 휘몰아치는 매우 불안정한 대기를 확인할 수 있었습니다. 우리 [Root.Owner.GetScientistPlural]들은 이런 행성에 문명의 잔재가 남아 있을 것이라고는 상상도 하지 못했다며, 이곳을 조사하면 많은 것을 알아낼 수 있을 것이라고 확신했습니다."
 cstorms.245.a: "상륙 팀을 소집하세요!"
 #Digsite: Windswept Fates
 site_adakarria_windswept_fates: "바람에 휩쓸린 운명"
 site_adakarria_windswept_fates_intro: "우주 폭풍 중에서도 압도적인 파괴력을 지닌 이번 폭풍 덕분에 외계 문명의 증거를 발견할 수 있었습니다. 행성 대기는 매우 불안정하지만, 상륙 팀을 파견하면 이 고대 문명이 과연 어떤 끔찍한 운명을 맞이했는지 알아낼 수 있을지도 모릅니다."
 cstorms.2105.name: "혹독한 환경"
 cstorms.2105.desc: "상륙 팀이 [From.Planet.GetName]에 안전하게 착륙해 재빨리 주변 지역 탐사에 나섰습니다.\n\n내려가서 살펴보니, 최근 이 성계에 불어닥친 격렬한 우주 폭풍으로 인해 먼지와 토양층이 날아가 땅에 묻혀 있던 고대 문명의 잔재가 드러난 것 같습니다.\n\n이 고고학 현장을 탐사하던 과학자들은 잔해를 덮은 모래층이 주변 토양과 완전히 다른 물질로 이루어져 있다는 사실을 깨닫고는 놀라움을 금치 못했습니다. 행성 스캔 결과, 이 퇴적물은 수백 마일 떨어진 사막에서 온 것으로 밝혀졌습니다. 이 정도의 물질이 그만한 거리를 이동하려면 엄청난 힘이 필요했을 것입니다. 예컨대, 극도로 불안정한 행성 폭풍처럼 말입니다."
 cstorms.2105.a: "계속 진행하세요."
 cstorms.2110.name: "스러진 자들"
 cstorms.2110.desc: "현지 행성을 괴롭히는 기묘한 기상 조건에도 불구하고, 우리 [Root.Owner.GetScientistPlural]들이 커다란 진전을 이루었습니다. 하지만 드러나는 내용은 날이 갈수록 당황스럽고 충격적이기만 합니다.\n\n처음에는 석조 건물의 잔해와 탄화된 유기 물질이 발견되었습니다. 찢긴 섬유와 가죽, 폴리머 소재를 덧댄 조끼가 뒤를 이었고, 마침내 이 행성에 거주했던 유기체 주민들의 시신이 발굴되었습니다.\n\n연이어 발굴된 시신들의 말라 버린 장기에는 모래가 가득했으며, 몸부림치는 과정에서 손톱은 모두 닳아 없어졌습니다. 시신은 전부 [Root.Owner.GetPreFTLLowerPlural] 양식의 군용 장비로 중무장했으며, 투사체 무기를 들고 있습니다. 버려진 도시인 줄 알았던 이곳은 집단 무덤으로 드러났습니다.\n\n영겁의 세월을 보내온 시신들이지만, 자외선이나 반응성 화학 물질과 접촉하지 않았기 때문에 시신과 장비 모두 보존 상태가 완벽합니다. 다만 이들이 무슨 일을 겪은 것인지는 아직 알 수 없습니다."
 cstorms.2110.a: "참으로 끔찍한 최후로군요."
 cstorms.2115.name: "하늘에서 내려온 폭력"
 cstorms.2115.desc: "[From.Planet.GetName]에서 충격적인 발견이 이어지고 있습니다. [Root.GetLeaderName]의 의견에 따르면 이곳이 매장지일 가능성은 작다고 합니다. 이 외계인들은 양호한 상태였다가 삽시간에 모래에 질식한 것으로 보이기 때문입니다.\n\n게다가 대규모 포격을 실시할 수 있는 무기 설비도 다수 발견되었습니다. 놀랍게도 이 무기들은 지표면이 아니라 우주 너머를 향하고 있습니다.\n\n이곳의 주민들이 어떤 적을 상대했었는지는 아직 알 수 없지만, 그 침략자는 우주에서 왔을 가능성이 높습니다."
 cstorms.2120.name: "영원한 광풍"
 cstorms.2120.desc: "[From.Planet.GetName]에서 발견한 기이한 집단 무덤에 대해 여러 가설을 세워 봤지만, 유용한 결론을 도출하지는 못했습니다. 이제 남은 단서는 이 부대를 통째로 삼켜 버린 모래 폭풍의 발원지뿐입니다.\n\n여러 차례 복잡한 계산과 모의실험을 수행한 결과, 이곳에 모래를 가져온 폭풍이 계속해서 이 행성의 다른 곳을 유린하고 있다는 결론을 내릴 수 있었습니다. 검증을 위해 우리는 소규모 원정 팀을 조직해 탐사에 나섰습니다.\n\n이윽고 사나운 폭풍이 원정 팀을 맞이해 주었습니다. 계속해서 휘몰아치는 격한 바람은 지면을 깎아내다 못해 파고 들어가 있습니다. 이 행성에서 무언가 답을 찾을 수 있다면, 그 답은 분명히 폭풍의 눈이 자리 잡은 저 심연 속에 있을 것입니다."
 cstorms.2120.a: "최대한 주의해서 진행하세요!"
 cstorms.2125.name: "유골"
 cstorms.2125.desc: "몰아치는 폭풍의 한복판으로 향하는 것은 결코 쉽지 않았습니다. 기술을 있는 대로 동원하고 주의력을 최대한 발휘해 간신히 도달한 크레이터의 중심부에는 아주 특이한 유골이 놓여 있었습니다. 집단 무덤의 시신들과 마찬가지로 오래되었지만, 표현형과 유전자형이 그것들과는 전혀 달랐습니다.\n\n이 유골이 입은 유니폼은 보존 상태가 놀라울 정도로 훌륭했는데, 그 디자인 또한 군인들의 복장과는 뚜렷한 차이를 보였습니다. 게다가 부속지의 일부를 의도적으로 잘라낸 듯한 흔적까지 존재합니다...\n\n이것만으로도 아주 흥미로웠지만, 감지기의 측정 결과는 상상을 뛰어넘었습니다. 유골 주변과 내부에서 에너지 파동이 감지된 것입니다. 그 신호는 이 거대 폭풍은 물론이고, 이번에 집단 무덤을 드러내 주었던 우주 폭풍에서 나오던 신호와 놀랍도록 비슷합니다.\n\n자연스레 한 가지 가설이 떠오릅니다. 이 유골의 주인은 우리가 지금까지 만난 폭풍과 긴밀히 연결되어 있는 게 아닐까요? 어쩌면 이 존재가 그 부대를 땅에 파묻은 게 아닐까요? 아무리 생각해도 괴상한 가설이지만, 지금까지 드러난 사실을 고려하면 그렇게 생각할 수밖에 없습니다."
 cstorms.2130.name: "다시 먼지로 돌아가리라"
 cstorms.2130.desc: "유니폼에 있는 기호를 우리 데이터베이스와 교차 대조했더니 당황스러운 결과가 나왔습니다. 이 유골의 주인은 아드아카리아 자애회의 주민이었습니다! 우리가 얼마 전 탐사했던 방송 기지를 운영했던 바로 그 문명입니다. 더욱 놀라운 것은, 이 유니폼과 유골의 연대, 그리고 방송의 내용 모두가 아주 일관된 사실 하나를 가리키고 있다는 점입니다. 이 행성이 방송에서 언급되었던 바로 그 행성인 게 분명합니다.\n\n선전 기지에서 얻은 언어 지식을 바탕으로, [Root.GetLeaderName](은)는 그 유골이 살아 있을 적에는 §S하투르 가일론§!이라 불렸다는 사실을 알아냈습니다.\n\n그 후 얼마 지나지 않아 주변을 휘감고 있던 폭풍의 규모와 세기가 급격히 커지기 시작했습니다. 예측할 수 없는 기상 상태로 인해 이 이상 머무는 것은 매우 위험했고, 우리는 어쩔 수 없이 거대한 소용돌이에 유린당하는 행성을 내버려 두고 떠날 수밖에 없었습니다. 이렇게 아드아카리아 자애회로 이어질 실마리를 또다시 놓치고 말았습니다."
 #Storm to Signal
 cstorms.2140.name: "폭풍에서 신호로"
 cstorms.2140.desc: "§Y[planet_windswept_fates.GetName]§!에서 발견한 외계인 유골과 행성을 휩쓰는 거대 소용돌이의 에너지 신호는 땅에 묻혀 있던 부대를 드러낸 우주 폭풍에서 나오는 신호와 일치했습니다. 스캔 기록을 살펴보니 이전에 탐사했던 성계에서도 같은 에너지 파동을 발견할 수 있었습니다. 그런데 그 신호는 아드아카리아 자애회의 방송 신호와 일치합니다!\n\n탐사선을 보내 조사해야 합니다."
 #Fleets of the Trice Damned
 site_adakkaria_fleets_of_the_thrice_damned: "세 번 저주받은 자들의 함대"
 site_adakkaria_fleets_of_the_thrice_damned_intro: "이 지역에서 검출된 기이한 에너지 파동은 거대한 함선 무덤의 존재를 감추고 있었습니다. 고분자 물질과 금속으로 이루어진 이 거대 묘소에 아드아카리아 자애회가 어떤 단체인지 알려 줄 단서가 숨어 있을지도 모릅니다."
 cstorms.2150.name: "산산조각 난 잔해"
 cstorms.2150.desc: "이곳에는 직사각형의 목제 선박에서부터 결정체로 이루어진 우주 방주와 실체 없는 함선에 이르기까지 온갖 종류의 함선이 가득했습니다. 그중 상당수가 아드아카리아 방송 기지의 방송 기록에서 묘사된 이미지와 일치합니다.\n\n이곳에서 수천 년 전 은하의 평화 유지군을 자처했던 범공 함대와 자애회 함대가 충돌했던 것으로 추측됩니다.\n\n이곳에 있는 함선들은 수리가 불가능할 정도로 파손되었지만, 일반 무기나 기능 고장 등으로 인해 난파한 것은 아닙니다. 선체와 내부 모두가 거대한 파쇄기로 부순 듯 찢어발겨져 있습니다."
 cstorms.2155.name: "의무의 한계"
 cstorms.2155.desc: "우리 [Root.Owner.GetEngineerPlural]들이 함선 무덤에서 조심스럽게 데이터 뱅크를 회수했습니다. 대부분은 시간의 흐름을 견디지 못하고 망가졌지만, 아드아카리아의 데이터베이스 중 하나가 정상적으로 작동했습니다.\n\n§L- 매복이다. 반복한다. 매복에 걸렸다. 범공 측이 로쿠코라 원시 문명의 승급 절차를 중단하지 않으면 전멸시키겠다고 한다. 제발 응답해. 당장 후퇴하지 않으면 다 죽는다고! 아니면 증원 병력이라도 보내!\n\n- 거부한다. 귀함의 희생을 기억하겠다. 이상.§!"
 cstorms.2155.a: "목숨보다 대의를 중시했군요!"
 cstorms.2160.name: "두고 볼 유해"
 cstorms.2160.desc: "우리 [Root.Owner.GetLinguists]들이 새로 찾은 방송 내용을 번역하는 동안, 또 하나 놀라운 발견이 있었습니다. 무덤 한가운데에 얼어붙은 시체 하나가 떠다니고 있었던 것입니다!\n\n거의 말라비틀어진 시신은 자애회 장교 제복을 입고 있었습니다.\n\n신기하게도 작은 파편들이 고리를 이루듯 시신 주변을 맴돌고 있습니다. 마치 파편이 시신의 중력장에 붙잡혀 있는 듯한 모습입니다. 시신을 함선 안으로 옮겨 추가 분석을 진행했습니다."
 cstorms.2165.name: "망자의 목소리"
 cstorms.2165.desc.intro: "얼어붙은 시신의 명찰을 번역해, 그 주인이 §S알아타 랜디어§!라는 아드아카리아 구성원임을 알아낼 수 있었습니다. [planet_windswept_fates.GetName]에서 발견한 유골과 마찬가지로 사망하기 전에 부속지 몇 개가 외과적으로 제거된 것 같습니다. 거기에 더해 시신은 심하게 그을리기까지 했습니다. 극심한 화상 흉터가 서서히, 그리고 고통스럽게 회복된 듯한 흔적이 상체에 남아 있습니다.\n\n우리 [Root.Owner.GetScientist]들은 이 흉터가 [Root.Owner.GetPreFTLLowerPlural] 문명의 심문 방식과 소름 끼칠 정도로 일치한다는 안타까운 결론에 도달했습니다. 알아타 랜디어는 참전 용사였을까요? 아니면 혹시 전쟁보다 더 끔찍한 일을 겪었던 걸까요?"
 cstorms.2165.desc.def: "$cstorms.2165.desc.intro$\n\n흉터의 정체를 알아내자마자, 함선의 측정 장치에 전력이 급증하더니 [Root.GetLeaderName](이)가 비명을 지르기 시작했습니다.\n\n한참을 지나 진정을 되찾은 지도자에게서 들은 설명에 의하면, 몸을 불태우는 듯한 강렬한 빛과 함께 끔찍한 고통이 파도처럼 몰려왔다고 합니다. 마치 무언가가 지도자의 정신을... 안에서 바깥으로 찢고 나오려 한 것처럼 말입니다."
 cstorms.2165.desc.psio: "$cstorms.2165.desc.intro$\n\n흉터의 정체를 알아내자마자, 함선의 측정 장치에 전력이 급증하더니 사이오닉 능력이 있는 승무원들이 비명을 지르기 시작했습니다.\n\n한참을 지나 진정을 되찾은 승무원들이 보고하기로는, 한순간 정신이 맑아지더니 모든 것을 태워 버릴 듯한 분노가 파도처럼 밀려왔다고 합니다. [Root.GetLeaderName]의 설명에 따르면 그 분노 밑에는 끔찍한 충격과 깊은 배신감이 자리 잡고 있었다고 합니다. 그리고 불현듯 떠오른 한 가지 생각이 그들의 머릿속을 사로잡았습니다. §L'그들이 나를 불러냈다!'§!"
 cstorms.2165.desc.psio_robot: "$cstorms.2165.desc.intro$\n\n흉터의 정체를 알아내자마자 함선의 측정 장치에 전력이 급증하더니, 우리 유닛이 내부 전력 급증 현상을 겪었습니다.\n\n한참을 지나, 이들은 자신의 사이오닉 프로세서가 이 순간을 극도의 분노로 분류했다고 보고했습니다. [Root.GetLeaderName]의 설명에 따르면 이 감정 반응은 한 가지 생각과 함께 발생했다고 합니다. §L'그들이 나를 불러냈다!'§!"
 cstorms.2165.desc.gestalt: "$cstorms.2165.desc.intro$\n\n이 발견 직후, 정체를 알 수 없는 힘이 작용해 우리 승무원들의 데이터 뱅크를 손상시켰습니다. [controller.GetIndividualNamePlural] 중 일부는 순간적인 전력 급증으로 몸의 제어를 잃었고, 다른 [controller.GetIndividualNamePlural]들은 혼란스럽게 뒤섞인 이미지가 음성 조절기를 자극한 탓에 120데시벨을 넘는 찢어지는 듯한 소리를 낼 수밖에 없었다고 합니다."
 cstorms.2165.a: "-- 신호 상실 --"
 cstorms.2170.name: "랜디어의 유산"
 cstorms.2170.desc.def: "§Y[Root.GetFleetName]§! 과학선과 통신이 다시 연결되자, 장치 너머로 승무원들이 울부짖는 소리가 울려 퍼졌습니다. 한참이 지나 상황이 비교적 진정되고 알아보니, 그 비명의 원인은 바로 과학선에 들여놓았던 외계인의 시신이었습니다.\n\n시신에서 흘러나온 이상한 힘이 승무원들의 정신을 건드렸던 것입니다. 작은 물체들이 공중으로 떠올라 시신 주변을 돌기 시작했습니다. 그리고 내벽 곳곳이 압력을 받아 비틀리고 구부러졌습니다.\n\n너무 늦기 전에 가까스로 마비 상태에서 벗어난 §Y[Root.GetLeaderName]§!(은)는 시신을 함선에서 내던졌습니다. 그 빠른 대응 덕분에 과학선은 갑자기 나타난 우주 폭풍을 피할 수 있었습니다. 그 활약이 없었다면 무덤에 새 함선이 추가되었을 것입니다.\n\n[Root.GetLeaderName](은)는 자신이 겪은 일을 돌아보다가 또 다른 특이 사항을 언급했습니다. 시신이 지닌 기묘한 힘의 근원은 여전히 알 수 없지만, 그 힘으로 인해 함선의 제어 화면에 아주 특이한 문양이 나타났었다는 것입니다. 혹시 우리와 소통을 시도했던 것일까요? 아니면 그저 무덤 속에서 흘러나온 비명에 불과했을까요?\n\n어느 쪽이든 지금으로서는 알 길이 없습니다."
 cstorms.2170.desc.gestalt: "우리 탐사 [controller.GetIndividualNamePlural] 중 일부를 망가뜨린 어지러운 이미지를 해독했더니, 어떤 고대 거주지의 화상이 드러났습니다. 그 안에서는 한 개체가 잔혹한 고문을 받고 있습니다. 몸이 불타고, 내장이 익는 그 생생한 광경과 음성이 우리 [controller.GetScientistCapital]들을 압도했습니다.\n\n그 시청각적 공격에서 가까스로 빠져나온 [controller.GetIndividualNamePlural]들의 말에 따르면, 작은 물체들이 떠올라 시신 주변을 돌기 시작했다고 합니다. 원리는 알 수 없지만, 유기체의 시신이 자체적인 중력장을 형성한 것입니다.\n\n이 알 수 없는 힘은 점차 강해졌고, 내벽 곳곳이 압력을 받아 비틀리고 구부러지기 시작했습니다. 다행히도 때마침 함선의 안전 시스템이 재가동되어, 시신을 우주 공간으로 사출했습니다.\n\n이윽고 해당 성계에 우주 폭풍이 나타났습니다. 과학선은 가까스로 무사히 빠져나올 수 있었습니다.\n\n그곳에서 일어난 일은 우리에게 해답은커녕 더 많은 질문을 던져 주었습니다."
 #Special Project: Assembling the Past
 cstorms.2180.name: "과거를 잇다"
 cstorms.2180.desc: "§Y[planet_assembling_the_past.System.GetName]§! 성계에서 [FromFrom.Leader.GetName]에게 생긴 일에 자극을 받은 우리 과학자들이, 아드아카리아 자애회에게 대체 무슨 일이 일어났었는지 알아내기 위해 분투하고 있습니다. 우리가 [planet_windswept_fates.GetName] 및 함선 무덤 탐사를 통해 얻은 정보를 종합한 결과, 온 은하계에 아드아카리아의 선전 기지가 가득하다는 사실이 드러났습니다.\n\n그리고 오랜 토론 끝에, 과학자들은 [Root.GetName]에서 오류가 발생했을 때 화면에 떠오른 문양이 아직 발견하지 못한 성계로 이어지는 일종의 이정표일 수 있다는 결론을 내렸습니다!\n\n이 새로운 성계를 조사하기 위한 특별 프로젝트를 마련했습니다."
 project_adakkaria_tracing_history: "역사를 따라"
 project_adakkaria_tracing_history_DESC: "좌표는 [planet_assembling_the_past.System.GetName] 성계의 한 행성을 가리키고 있습니다. 탐사선을 보내 이 행성이 아드아카리아 자애회와 어떤 관련이 있는지 조사해야 합니다."
 NAME_adSalivul: "아드살리불"
 NAME_Patriotic_Institute_of_Exalted_Benevolence: "지고의 자애"
 cstorms.2185.name: "고대 거주지"
 cstorms.2185.desc: "처음에는 [From.solar_system.GetName] 성계에 대한 조사가 막다른 골목에 다다른 것은 아닌지 걱정이 앞섰습니다. 좌표가 가리키는 행성은 극도로 불안정한 자기장의 영향으로 지표면상의 거의 모든 것이 파괴되어 있었기 때문입니다. 그토록 엄청난 재앙이 휩쓸고 지나간 만큼, 건질 만한 물건은 아무것도 없을 것으로 예상되었습니다.\n\n하지만 예상과 다르게 오래된 거주지 하나가 행성 궤도를 돌고 있었고, 그 건축 양식은 아드아카리아 방송 기지와 비슷합니다. 기지는 바깥에서 밀봉된 상태였지만, 아드아카리아 데이터베이스에서 찾아낸 정보를 바탕으로 출입 신호를 생성할 수 있었습니다.\n\n오랜 세월이 흐르는 동안 어떠한 존재도 발을 들인 적이 없는 곳입니다. 그 안에 무엇이 도사리고 있을지는 전혀 알 길이 없습니다."
 cstorms.2185.a: "신중하게 접근합시다."
 #The Patriotic Institute of Exalted Benevolence
 site_adakkaria_the_patriotic_institute: "지고의 자애 사업소"
 site_adakkaria_the_patriotic_institute_intro: "황량한 행성 궤도를 돌고 있는 이 고대 거주지는 아드아카리아 자애회의 산물입니다. 고품질 건축 자재로 제작된 덕분에 거의 완벽한 상태로 보존되어 있습니다.\n\n송신 주파수를 맞추자 우렁찬 음악과 함께 하나의 메시지가 흘러나옵니다. §L\"지고의 자애회 애국 사업소를 방문하신 것을 환영합니다.\"§!"
 cstorms.2200.name: "자애 사업소 진입"
 cstorms.2200.desc: "에어록 너머로 작은 터널이 그물처럼 이어졌습니다. 터널을 따라 나아가자, 인공 태양광이 비추는 거대한 광장이 드러났습니다. 이상하게도 이 거주지의 건축물들은 첨단 과학 기지라기보다는 거주 행성의 교외 지역을 보는 듯했습니다. 아파트 단지, 쇼핑센터, 학교는 물론이고 유람지나 공원 등 다양한 시설이 늘어선 이 거주지는 쉽게 말해 호화 주거 시설이라 할 수 있었습니다.\n\n하지만 지금은 완전히 비어 있습니다. 거주지 어디에서도 유기 생명체를 찾아볼 수 없습니다. 탐사를 계속 진행해 보았지만, 인기척이라고는 느껴지지 않는 공허한 공간과 삭막하고 음산한 대기만이 우리를 반겨 줄 뿐이었습니다.\n\n인공 태양광은 이따금 오류를 일으켜 기지 전체가 암흑에 휩싸였고, 전자 장치는 대부분 가동 중이기는 했지만 이 역시 때때로 작동을 멈췄습니다. 하지만 가장 흥미로웠던 점은 따로 있습니다. 시설 내 아파트에서 감시 장치 네트워크를 발견한 것입니다. 모든 주민이 철저한 감시를 받았던 것으로 보이며, 보안 시설 같은 곳을 찾을 수만 있다면 더 많은 정보를 얻을 수 있을 듯합니다."
 cstorms.2205.name: "영원한 오류"
 cstorms.2205.desc.intro: "거주지 내부의 도시 전체를 돌아보며 목록을 만들고 감시 장치를 수색하는 데에는 상당한 시일이 소요되었습니다. 알고 보니 보안 시설 전체가 거주지의 나머지 부분과 격리되어 있었고, 진입하려면 전혀 다른 코드가 필요했습니다.\n\n그렇게 발을 디딘 보안 시설에서 우리는 엄청난 규모의 감시 설비를 발견했습니다. 장치와 연결된 모니터가 끝없이 늘어서 있습니다. 아직까지 작동 중인 모니터들은 기지를 구석구석 비추고 있지만, 이곳도 거주지 전체에 발생한 전기 장애의 영향을 받은 듯합니다."
 cstorms.2205.desc.mach: "$cstorms.2205.desc.intro$\n\n우리 드론들은 이 혼란스러운 광경을 목격하자 우려를 표했습니다. 고대 함선 무덤에서 아드아카리아 자애회 장교와 조우했을 당시의 경험이 떠올랐기 때문입니다.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.def: "$cstorms.2205.desc.intro$\n\n[Root.GetLeaderName](은)는 이 혼란스러운 광경을 목격하자 막연한 불안감을 호소했습니다. 고대 함선 무덤에서 아드아카리아 자애회 장교와 조우했을 당시의 경험이 떠올랐기 때문입니다.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.outro: "하지만 중앙 보안 허브가 더 큰 충격을 안겨 주었습니다. 허브의 제어 화면에 표시된 경고 메시지에 따르면, 이 거주지는 자폭 명령을 받은 것 같습니다!\n\n[Root.Owner.GetEngineerPlural]들은 이 도시에 발생한 모종의 기능 장애 탓에 자폭 명령이 제대로 실행되지 않은 것 같다고 추측했습니다. 우리는 재빨리 자폭 루틴을 비활성화하고 [Root.Owner.GetLinguists]들에게 발견한 기록의 해독을 지시했습니다. 흥미롭게도 이 보안 시설의 기록은 선전 기지에서 마지막 방송이 송출되기 거의 1년 가까이 전에 먼저 끊겼습니다."
 cstorms.2210.name: "지고의 탐문"
 cstorms.2210.desc: "[Root.Owner.GetLinguists]들이 [From.Planet.GetName] 궤도에 떠 있는 거주지의 건설 목적을 알아내는 데에는 그리 오랜 시간이 걸리지 않았습니다. 주민과 직원이 남긴 기록 및 메시지는 모두 아드아카리아 시민들이 새로 발현한 사이오닉 능력에 대한 조사를 언급하고 있습니다. 이곳의 주민들은 자애회의 '최고 지엄 지도부'로부터 초대를 받아 이곳으로 왔고, 자유로운 자기표현 기회와 호화로운 생활을 약속받는 대신 기지에서 진행하는 실험에 참여하는 데 동의했습니다.\n\n대부분은 들뜬 마음으로 프로그램에 참여했습니다. 보안 기록에 따르면 그중 상당수가 장애를 얻은 참전 용사였습니다. 이들은 진료와 금전적 지원, 그리고 남아 있는 법적 문제에 관한 사면을 약속받았습니다.\n\n게다가 이 기지의 거주민 목록에서 아주 익숙한 이름을 발견할 수 있었습니다. §S알아타 랜디어§!. 바로 함선 무덤에서 부속지가 절단된 채로 발견된 과학자이자 상이용사가 언급된 것입니다."
 cstorms.2210.a: "드디어 진전이 있군요."
 cstorms.2215.name: "피험체가 남긴 말"
 cstorms.2215.desc: "거주지가 전송한 마지막 메시지 중 일부를 해독했습니다.\n\n§g메시지 - 발신일: 02100363 - 발신: §S시다니 아이템피어§! - 수신: 시줄 아이템피어§!\n§L놀랐지? 나 아직 살아 있어! 늦어서 미안해. 그 일이 있고 나서 하필 기지가 오작동한 탓에 메시지 보내기가 힘들었어. 직원들은 그 일이랑 상관없다고 하는데, 우리가 보기엔 그 친구는 사이오닉 능력을 타고난 것 같아. 반면에 나는 저번에도 말했지만 별 진전이 없어서... 좀 더 과감한 방법을 써 보자더라. 우주 폭풍 말이야. 무슨 생각 하는지 알아. 걱정하지 않아도 돼. 그냥 손가락 하나만 잘랐을 뿐이야. 다시 자라날지도 모르잖아? 그보다 그때 엄청난 감각이 느껴졌어...!\n사랑하는 시다니가\n- 전송§! §Y검열됨(질문이 있으신가요? 감독관에게 문의해 주세요)§!\n\n§g메시지 - 발신일: 02100365 - 발신: §S하투르 가일론§! - 수신: 에이달 아스두르§!§L\n에이달에게.\n여기는 꽤 지낼 만해. 다른 참전 용사들도 몇 명 만났어. 서로 이야기를 나눈 건 아니지만, 그냥 다들 알아. 굳이 얘기를 나눌 필요가 없어서 좋더라.\n오늘은 생각만으로 컵을 들어 올리려 해 봤는데 이게 정말 되더라. 오른쪽 부속지를 잃은 건 아쉽긴 하지만, 여기 생활이 걱정했던 것만큼 나쁘지는 않을지도 모르겠어. 얘기를 들어 보니, 나를 어디 다른 곳에 보낸다는 거 같아... 내가 사이오닉에 재능이 있다나? 나... 다시 현장에 나가고 싶어.\n애국절에는 집에 돌아갈 수 있었으면 좋겠다. 그렇게 되면 연락할게.\n그럼 이만, 하투르가\n- 전송§! §Y검열됨(질문이 있으신가요? 감독관에게 문의해 주세요.)§!\n\n§g메시지 - 발신일: 02100367 - 발신: §S엔리다 디린§! - 수신: 온리다 디린§!\n§L내가 생각만으로 불을 껐어!!!\n다른 참가자가 갑자기 난리를 치더니 식당에 화재를 일으켰어. 전부 놀라서 어쩔 줄 몰라 하는데 도망칠 곳이 없는 거야! 나도 완전 무서웠는데, 갑자기 내 안에서 뭔가 일어나는 것 같더니 그냥 불을 꺼 버렸지 뭐야!\n내가 모두를 구했어!! 원로들한테 내가 그저 글러 먹은 녀석은 아닌 것 같다고 꼭 좀 전해 줘!\n- 전송§! §R차단(즉시 감독관에게 출두 요망)§!\n\n특히 눈길이 가는 것은 두 번째 메시지입니다. §S하투르 가일론§!은 바로 우리가 [Root.Owner.GetPreFTLLowerPlural]에서 고고학 탐사 중에 발견한 시신의 이름입니다."
 cstorms.2215.a: "아주 잘했습니다!"
 cstorms.2220.name: "파급된 오류"
 cstorms.2220.desc: "이 메시지는 거주지에서 주민들이 철수하기 며칠 전에 작성되었습니다.\n\n§g메시지 - 발신일: 02100359 - 발신: 최고박사 - 수신: 경애제독§!\n§L제독께서 최근 전달해 주신 내용을 놓고 저희 쪽에서 우려가 제기되고 있습니다. 지난 몇 년 동안 아무 말씀 없이 후원을 계속해 주시다가 갑자기 시설을 폐쇄하겠다고 위협하시는 이유를 설명해 주실 수 있을지요?\n- 전송§! §G발신 완료§!\n\n§g메시지 - 발신일: 02100360 - 발신: 경애제독 - 수신: 최고박사§!\n§L지금 장난하자는 거요? 몇 달 동안이나 그쪽에 경고를 보냈소. 그 위험천만한 행성 위를 떠돈 탓에 기억 상실증에라도 걸린 모양이군. 그래도 범공이 우리 존재 자체를 위협하고 있다는 사실까지 잊지는 않았을 거 아니오? 전운이 고조되고 있는 이 상황에 하루 종일 가축이나 쳐다보고 있는 당신네 피험자들한테 막대한 자원을 쏟아붓는 걸 더는 두둔할 수 없단 말이오. 실질적이고 즉시 적용 가능한 결과를 내놓으시오. 지금 당장.\n- 전송§! §G수신 완료§!\n\n§g메시지 - 발신일 02100360 - 발신: 최고박사 - 수신: 경애제독§!\n§L송구스럽게도 일전에 주셨다는 메시지는 받지 못했습니다. 저희 기지에 기술적 오류가 발생해 골머리를 앓았는데, 교신도 그 영향을 받았던 것 같습니다. 결과를 내려면 시간이 더 필요합니다. 이곳에도 절차란 것이 있습니다. 피험자들을 그냥 내버려 둘 수는 없지 않습니까!\n- 전송§! §G전송 완료§!\n\n§g메시지 - 발신일: 02100361 - 발신: 경애제독 - 수신: 최고박사§!\n§L일주일 주겠소. 그 안에 결과를 못 내면 즉시 시설을 폐쇄할 것이오. 만일이니 하지만이니 더는 듣기 싫소. 결과를 가져오시오!\n- 전송§! §G수신 완료§!\n\n§g메시지 - 발신일: 02100368 - 발신: 최고박사 - 수신: 경애제독§!\n§L최근 성과를 기록한 보고서를 첨부합니다. 사이오닉 능력을 지닌 피험자들이 우주 폭풍에 영향을 줄 수 있다는 사실을 입증하는 영상입니다. 군사적으로 엄청난 의미를 갖는 발견이지요. 시간만 충분히 주신다면 신체적, 정신적 외상을 가하지 않고도 사이오닉 발현을 증폭할 수 있을 겁니다.\n- 전송§! §R전송 실패(원인: 전송 매트릭스 손상)§!"
 cstorms.2220.a: "마지막 메시지는 전송되지 못했군요."
 cstorms.2225.name: "미완성된 운명"
 cstorms.2225.desc: "마지막으로 복구된 메시지입니다.§L\n\n친애하는 동료 여러분.\n\n무거운 마음으로 이 말을 전합니다. 지엄 사령부에서 지고의 자애회 애국 사업소의 모든 활동을 중단하기로 결정했습니다.\n\n이번 결정이 여러분의 부족함 탓이라고는 여기지 마시길 바랍니다. 여러분 모두와 함께 일할 수 있어 영광이었습니다. 궁금한 점이 많으실 겁니다. 간단히 줄이자면, 지엄 사령부의 기대가 우리 연구 목적과 부합하지 않았던 것 같습니다.\n\n주민 중 일부는 지엄 사령부가 아드술에 있는 $building_adakkaria_patriotic_institute$에서 진행하는 프로그램에 초청될 예정입니다. 대상자 전원의 명단을 첨부했으니 참고 바랍니다. 보고서에도 해당 내용을 반영해 주세요.\n\n그리고 나머지는... 안타깝지만 극비로 진행된 우리 연구의 성격상, 참여자들을 완전히 사회로 복귀시킬 수는 없는 노릇입니다. 지엄 사령부가 참여자들을 처분할 특수 부대를 파견하겠다고 약속했습니다. 여러분이 현장을 직접 볼 일은 없으니, 이것만은 다행일지도 모르겠습니다. 유족에게는 최대한 보상하겠다고 합니다.\n\n이만 줄이겠습니다. \n최고박사, §!§S알아타 랜디어§!\n\n첨부된 목록은 부분적으로 손상됐지만, §S하투르 가일론§!과 §S엔리다 디린§!의 이름은 확인할 수 있었습니다. 이 둘은 아드아카리아 자애회의 수도인 아드술로 이송된 것 같습니다. 이를 통해 해당 행성의 좌표를 손에 넣었습니다."
 cstorms.2225.a: "자애회의 모성으로 항로를 설정하세요."
 #Special Project: Eye of the Convention / The Void Calls
 cstorms.2240.name: "자애회의 눈"
 cstorms.2240.desc: "좌표는 지금까지 감춰져 있던 성계를 드러내 주었습니다. 이제 아드아카리아 자애회와 대면할 시간입니다. 다른 누가 선수를 치기 전에 말이죠.\n\n새로운 특별 프로젝트를 발족했습니다."
 cstorms.2245.name: "공허의 부름"
 cstorms.2245.desc: "거주지를 떠나고 얼마 지나지 않아 [event_target:leader_patriotic_institute.GetName](이)가 갑자기 충격적인 결정을 내렸습니다. 마치 외부의 힘에 휘둘리기라도 한 듯, 일반적으로 대규모 사이오닉 현상이나 우주 폭풍이 나타났을 때 감지되는 주파수로 통신 채널을 연 것입니다.\n\n이 통신 채널은 아드아카리아 자애회의 모성계와 동일한 좌표를 가리키고 있었으며, 거의 곧바로 교신이 들어왔습니다."
 cstorms.2245.desc.gestalt: "거주지를 떠나고 얼마 지나지 않아 우리의 집단의식에 여느 때와는 다른 진동이 느껴졌습니다. 멀리 떨어진 무언가가 우리와 교신을 시도하고 있는 것 같습니다. 이 신호는 아드아카리아 자애회의 모성계 좌표와 일치하는 곳에서 나오고 있으며, 일반적으로 대규모 사이오닉 현상이나 우주 폭풍이 나타났을 때 감지되는 주파수로 발신되고 있습니다.\n\n교신에 조심스레 답신을 보내자, 신호는 곧바로 응답했습니다."
 cstorms.2250.name: "폭풍의 부름"
 cstorms.2250.desc: "온갖 수단을 동원했지만, 아드술에는 좀처럼 쉽게 다다를 수 없었습니다. 해당 성계 전체가 알 수 없는 물질로 구성된 우주 폭풍에 둘러싸여, 행성에 도무지 가까이 다가갈 수 없기 때문입니다.\n\n그런데 이 폭풍, 설마 지금 우리에게... 통신을 요청하고 있는 건가요?"
 #The Storm
 cstorms.2260.name: "폭풍"
 cstorms.2260.desc: "우리의 이름을 불러줘\n\n우리의 이름을 불러줘\n\n우리의 | 이름을 | 불러줘"
 cstorms.2260.a: "당신들은 누구죠?"
 cstorms.2260.b: "여기서 무슨 일이 있었던 겁니까?"
 cstorms.2260.c: "이름이라뇨?"
 cstorms.2260.a.resp: "있다 | 없다 | 없어진다\n\n몰아치는 광풍 치솟는 격노\n\n아픔과 분노와 슬픔과 공포\n\n우리의 이름을 불러줘"
 cstorms.2260.b.resp: "촉발 | 환기 | 초래\n\n우리의 이름을 불러줘"
 cstorms.2265.name: "$cstorms.2260.name$"
 cstorms.2265.desc: "우리는 할 수 없다 | 생각 | 말 | 소망 | 희망\n\n이름이 일깨운다 | 자아를 돌려다오 | 우리는 잊힌 존재\n\n우리의 이름을 불러줘"
 cstorms.2265.c.resp: "$cstorms.2265.desc$"
 cstorms.2265.d: "어디에서 여러분의 이름을 찾을 수 있습니까?"
 cstorms.2265.e: "그 기념이란 게 뭔지 알려 주시죠."
 cstorms.2270.name: "$cstorms.2260.name$"
 cstorms.2270.desc: "기념한다\n\n기념한다\n\n아픔 | 분노 | 슬픔 | 공포\n\n기념한다\n\n우리의 이름을 불러줘"
 NAME_adSul: "아드술"
 project_adakkaria_benevolent_grounds: "자애의 땅"
 project_adakkaria_benevolent_grounds_DESC: "아드아카리아 자애회의 모성을 가리키는 좌표를 발견했습니다.\n\n해당 성계와 행성을 탐사하면 마침내 아드아카리아 문명이 맞이한 운명을 밝혀낼 수 있을지도 모릅니다."
 #Celebration
 site_adakkaria_celebration: "기념 사업소"
 site_adakkaria_celebration_intro: "우주 폭풍과 교신을 마치니, 아드술의 일부가 모습을 드러냈습니다. 미처 흩어지지 않은 구름 사이로 거대한 구조물이 엿보입니다. 버려졌지만 지난 세월을 생각하면 이상할 정도로 건재한 모습입니다. 스캔 결과 내부에 유기 물질이 존재합니다.\n\n그 거대한 건물 앞에는 같은 내용을 반복해 선포하는 깃발들이 늘어서 있습니다. \"때가 되었다. 기념하라.\""
 cstorms.2285.name: "강요된 허무"
 cstorms.2285.desc: "기념 사업소의 전당은 세월의 먼지만이 쌓여 있었습니다. 한때 두려움의 대상이 될 정도로 번성했던 제국은 온데간데없고, 남은 것은 오직 아드아카리아 자애회의 용맹을 칭송하는 선전 포스터뿐입니다.\n\n그러나 우리 언어학자들의 노력이 빛을 발했습니다. 보안 시설은 형식에 불과했고, 메인프레임에서 손쉽게 비밀 자료를 추출할 수 있었습니다.\n\n그렇게 회수한 기록에는 온갖 활동이 빼곡히 적혀 있었는데, 마지막 기록일은 선전 기지가 마지막으로 방송을 송출한 그 날짜와 정확히 일치합니다.\n\n바로 그날, 아드아카리아 자애회의 존재 자체가 송두리째 사라진 것으로 보입니다."
 cstorms.2290.name: "저주받은 공간으로"
 cstorms.2290.desc: "약간의 두려움과 호기심을 안고 우리는 구조물의 지하층으로 내려갔습니다. 그곳에서 우리를 맞이해 준 것은 마치 그물망처럼 세심하게 배치된 각종 실험실이었습니다. 탐사 팀을 둘로 나눠, 한쪽은 실험실을 조사해 기념 사업소의 목적을 좀 더 자세히 알아보기로 했습니다. 그리고 남은 한쪽은 계속해서 지하로 향했습니다.\n\n얼마 지나지 않아 스캔에서 유기 물질이 감지되었던 이유를 깨달을 수 있었습니다. 전당의 지하는 오직 관측용 수용실로만 이루어진 것 같습니다. 아드아카리아의 주민들이 말라붙은 시체가 되어서까지 비좁은 방 안에 갇혀 있습니다. 각 수용실 옆에 있는 디지털 인터페이스에는 피수용자의 이름과 현재 진행 중인 시험 단계, 그리고 관찰 담당의 주석이 기록되어 있습니다.\n\n한편, 우리는 다음과 같은 메시지를 발견했습니다.\n§L할리오스 성계에서의 시험 운영은 완전하고 철저한 실패로 끝났다. 피험체 §S하투르 가일론§!의 초기 투입은 계획대로 진행되었지만, 솔파니 야만족의 군대와 조우하자마자 피험체가 통제력을 상실했다. 폭풍은 야만족 군대를 궤멸에 이르게 했지만, 아군도 전멸하고 말았다.\n\n피험체들은 그 무엇보다도 사악하며 또한 뒤틀려 있다는 사실을 다시 한번 알게 되었다. 초래 장치를 한시라도 빨리 가동해야 한다.§!"
 cstorms.2290.a: "여기서 대체 뭘 하고 있던 것일까요?"
 cstorms.2290.a.gen: "이토록 많은 죽음이라니, 인상적이군요."
 cstorms.2295.name: "뒤틀린 기념"
 cstorms.2295.desc.start.authgen: "아드아카리아 자애회가 자행한 실험은 아주 흥미로웠습니다. 각 피수용자에게는 단계가 할당되었고, 그 단계가 올라갈수록 더 잔혹한 실험이 가해졌습니다. 그중에서도 특히 혁신적인 방법 몇 가지가 눈에 띄었습니다. 불과 전기를 활용해 신체의 사이오닉 생성을 촉진하는 방법이 있는가 하면 필수 장기를 제거해 새로운 능력의 발현을 촉발하고 다른 감각을 활용하게 하는 방법도 있있고, 향정신성 약물을 투여해 가사 상태에 빠지게 하는 실험도 있었습니다.\n\n이곳에서 무언가 영감을 얻을 수 있을 것 같습니다. 이곳의 전문가들도 우리가 공감할 수 있는 목표, 즉 아드아카리아의 은하계 패권 장악이라는 목표를 향해 정진하고 있었으니 말입니다.\n\n그런데 관련 보고에 따르면 피험체들은 이러한 실험으로 인해 사망한 것이 아닌 듯합니다. §S하투르 가일론§!과 마찬가지로 많은 이들이 스스로 본인의 삶을 포기한 것입니다."
 cstorms.2295.desc.start.default: "피해자들의 유해를 목격한 우리는 도저히 말로 설명할 수 없을 정도의 공포와 혼란에 빠졌으나 자애회가 자행한 실험의 규모와 목적을 파악하려는 욕구가 우리를 계속 움직였습니다.\n\n아드아카리아 과학자들은 딱딱하고 무미건조한 어조로 생체 실험에 대한 기록을 남겼습니다. 각 피험자에게는 단계가 할당되었고, 그 단계가 올라갈수록 더 잔혹한 실험이 가해졌습니다. 불과 전기를 사용한 고문, 신체 훼손, 감각 및 영양 공급의 차단... 그 잔인함에 한계란 보이지 않습니다. 이 모든 만행은 아드아카리아의 은하계 패권을 유지한다는 영광스러운 명분하에 이루어졌습니다. 그런데 관련 보고에 따르면 피험자들은 이 끔찍한 행각 탓에 사망한 것이 아니었습니다. §S하투르 가일론§!과 마찬가지로 많은 피험자가 스스로 본인의 삶을 포기했던 것입니다."
 cstorms.2295.desc.end.default: "조사를 시작하고 얼마 지나지 않아 [Root.GetLeaderName](이)가 쓰러졌습니다. 그러고는 고통에 찬 외마디 비명을 지르며 무언가가 자신의 정신을 비집어 열고 있다고 소리쳤습니다!\n\n지금은 안정되었지만, 어떤 존재가 [Root.GetLeaderName]의 정신에 침입해 과격한 생각을 심으려 한 것 같습니다. 정작 [Root.GetLeaderName](은)는 이런 체험이 궁극적으로 중대한 영향을 불러일으킬 수 있다며, 같은 현상이 다시 발생하기를 기대하고 있습니다."
 cstorms.2295.desc.end.psionic: "유해를 돌아보던 [Root.GetLeaderName]에게 갑자기 이상한 속삭임이 들리기 시작했습니다. 이 정체 모를 목소리에는 깊은 갈망이 담겨 있습니다.\n§L우리는 충성을 바쳤다! 우리는 자애회를 찬미했고, 그 사명에 헌신했다.\n폭풍이 계속 우리를 불렀다. 우리를 집어삼키고, 우리를 갈구했다!\n우리는 그들의 말을 따랐다. 재능과 끈기를 보였다!\n그런데 그들은 우리를 사악하다고 말한다. 우리를 반역자라 부른다. 우리의 동족을 죽였다!\n\n\"기념\"이란 말은 거짓이었는가!§!\n\n속삭이는 소리를 따라 나아가니 '최종 단계'라는 표지판이 붙은 복도가 나왔습니다. 하지만 다른 곳보다 한층 높은 보안 조치가 적용되어 쉬이 발을 들일 수 없습니다."
 cstorms.2295.desc.end.psionic_individual_robot: "유해를 분석하던 [Root.GetLeaderName](이)가 갑자기 해석 가능한 사이오닉 신호를 감지했습니다.\n§L우리는 충성을 바쳤다! 우리는 자애회를 찬미했고, 그 사명에 헌신했다.\n폭풍이 계속 우리를 불렀다. 우리를 집어삼키고, 우리를 갈구했다!\n우리는 그들의 말을 따랐다. 재능과 끈기를 보였다!\n그런데 그들은 우리를 사악하다고 말한다. 우리를 반역자라 부른다. 우리의 동족을 죽였다!\n\n\"기념\"이란 말은 거짓이었는가!§!\n\n신호를 따라가다 보니 '최종 단계'라는 표지판이 붙은 복도가 나왔습니다. 하지만 다른 곳보다 한층 높은 보안 조치가 적용되어 쉬이 발을 들일 수 없습니다."
 cstorms.2295.desc.end.psionic_gestalt: "유해를 조사하던 사이, 갑자기 [Root.GetLeaderName](을)를 매개로 군체에 새로운 목소리가 흘러 들어왔습니다.\n§L우리는 충성을 바쳤다! 우리는 자애회를 찬미했고, 그 사명에 헌신했다.\n폭풍이 계속 우리를 불렀다. 우리를 집어삼키고, 우리를 갈구했다!\n우리는 그들의 말을 따랐다. 재능과 끈기를 보였다!\n그런데 그들은 우리를 사악하다고 말한다. 우리를 반역자라고 부른다. 우리의 동족을 죽였다!\n\n\"기념\"이란 말은 거짓이었는가!§!\n\n목소리는 '최종 단계'라는 표지판이 붙은 복도로 우리를 인도했습니다. 하지만 다른 곳보다 한층 높은 보안 조치가 적용되어 쉬이 발을 들일 수 없습니다."
 cstorms.2295.desc.end.gestalt: "우리 [controller.GetIndividualNamePlural]들의 인지 프로세스가 아주 기묘한 방식으로 왜곡되어, 우리 것이 아닌 사고가 촉발되었습니다. 그 사고를 통해 우리는 사업소에 있던 피험자들이 비물리적 수단을 통해 즉각적인 대화를 나누고 있었다는 사실을 알아냈습니다. 이제 막 생겨난 군체 의식과 비슷한 형태입니다.\n\n그 정확한 내용까지는 해독할 수 없었지만, 논의의 목적만은 분명합니다. 이들은 반란을 준비하고 있었습니다."
