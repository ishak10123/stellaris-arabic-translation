 building_storm_attraction_center: "폭풍 유인 센터"
 building_storm_attraction_center_desc: "중력을 세심하게 조작해 근처의 우주 폭풍을 끌어오는 시설입니다."
 building_advanced_storm_attraction_center: "첨단 폭풍 유인 센터"
 building_advanced_storm_attraction_center_desc: "암흑 에너지에 대한 첨단 지식을 활용해 각 $building_storm_attraction_center$를 초전하 상태로 만들어, 우주 폭풍을 더욱 효율적으로 끌어들입니다."
 building_storm_repellent_center: "폭풍 차단 센터"
 building_storm_repellent_center_desc: "폭풍이 멀어질수록 우리 국민의 안녕과 평안이 지켜집니다. 이 센터는 복합 우주 기상 측정 설비를 이용해 다가오는 폭풍을 격퇴합니다."
 building_advanced_storm_repellent_center: "첨단 폭풍 차단 센터"
 building_advanced_storm_repellent_center_desc: "우주를 휩쓰는 광풍으로부터 행성을 지키기 위해서라면 시공간 조작쯤은 정당화될 수 있는 법입니다. 이 센터가 바로 그 임무를 수행합니다."
 building_storm_resistant_production: "폭풍 구호 센터"
 building_storm_resistant_production_desc: "$building_storm_resistant_production$는 우주 폭풍으로 인해 행성의 생산성이 악화되는 것을 막을 수 있도록 현지 활동을 지원합니다. 효율적인 공조와 소통을 통해 구호대를 신속하게 파견하는 동시에 행성 전역의 무역 여건을 개선합니다."
 building_storm_resistant_production_tt: "§Y$default_storm$§!이 행성 생산량에 주는 부정적 효과가 §G30%§! 감소합니다.\n\n§Y$default_storm$§! 출현 시:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+0.5§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+0.5§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+0.5§! \n\n다음 행성 결정 이용 가능: §Y$decision_hunker_down$§!"
 building_advanced_storm_resistant_production: "폭풍 차단 시스템"
 building_advanced_storm_resistant_production_desc: "각 $building_storm_resistant_production$에 기상 제어 시스템을 추가해 우주 폭풍으로 인한 부정적 효과를 크게 완화합니다. 또한 구조대의 파견 효율성이 크게 증가하며, 행성 내 무역이 현지 기상 조건의 영향을 거의 받지 않게 됩니다."
 building_advanced_storm_resistant_production_tt: "§Y$default_storm$§!이 행성 생산량에 주는 부정적 효과가 §G45%§! 감소합니다.\n\n§Y$default_storm$§! 출현 시:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+1§! \n\n다음 행성 결정 이용 가능: §Y$decision_hunker_down$§!"
 building_adakkaria_patriotic_institute: "애국 기념 사업소"
 building_adakkaria_patriotic_institute_desc: "$building_adakkaria_patriotic_institute$는 지각 상태에 관한 첨단 지식의 보고입니다. 이곳에서 우리는 자애회의 유혹에 흔들리지 않고 국민들이 내면의 폭풍을 키울 수 있도록 인도합니다."
 building_adakkaria_patriotic_institute_effect_desc: "우주 폭풍이 이 성계를 통과할 경우, 10% 확률로 £pop£ §H팝§!이 $Name_Storm_Fused$ 특성을 얻습니다."
 building_adakkaria_patriotic_institute_effect_upgrade_desc: "우주 폭풍이 이 성계를 통과할 경우, 40% 확률로 £pop£ §H팝§!이 $Name_Storm_Fused$ 특성을 얻습니다. 또한, 10년마다 20% 확률로 §Y100§! £pop£ §H팝§!이 우주 폭풍으로 변화합니다."
 building_astrometeorology_observation_center: "우주 기상 관측소"
 building_astrometeorology_observation_center_desc: "정교한 감지 장치를 갖춘 관측 시설로, 다양한 환경 조건에 대한 연구를 진행해 우주의 자연에 관한 우리의 이해 수준을 높여 줍니다."
 concept_building_astrometeorology_observation_center: "$building_astrometeorology_observation_center$"
 building_storm_summoning_theater: "폭풍 소환 극장"
 building_storm_summoning_theater_desc: "예술과 기술을 결합한 오락 시설로, $job_storm_dancer_plural$들은 이곳에서 열띤 춤사위를 선보여 우주 폭풍을 우리 쪽으로 유도합니다."
 building_storm_holo_theater: "폭풍 홀로그램 전당"
 building_storm_holo_theater_desc: "$building_storm_holo_theater$의 공연은 온 행성을 넘어 그 너머까지 송출됩니다. 이를 통해 $job_storm_dancer_plural$들의 영향력은 전 은하계로 뻗어 나갑니다."
 building_storm_grand_theater: "폭풍 대극장"
 building_storm_grand_theater_desc: "예술과 기술의 최첨단을 달리는 대형 극장으로, 궁극의 춤사위를 펼칠 수 있는 완벽한 무대를 선사합니다."
 sm_storm_attraction_computer: "폭풍 유인 배열체"
 sm_storm_attraction_computer_desc: "이 시설을 사용하면 국소적인 중력 조건을 조작해 우주 깊은 곳에 있는 폭풍까지도 끌어올 수 있습니다."
 sm_storm_repelling_computer: "폭풍 차단 배열체"
 sm_storm_repelling_computer_desc: "강력한 레이저를 발사하는 배열체로, 국지적인 고전하 자성 입자를 형성해 우주 폭풍을 막는 천연 역장을 생성합니다."
 #Jobs
 astrometeorologist: "$job_astrometeorologist$"
 job_astrometeorologist: "우주 기상학자"
 job_astrometeorologist_plural: "우주 기상학자"
 job_astrometeorologist_desc: "$job_astrometeorologist_plural$는 우주의 다양한 환경 효과를 전문적으로 연구합니다."
 job_astrometeorologist_effect_desc: "$job_astrometeorologist_plural_with_icon$는 $r_consumer_goods$를 $r_physics$로 바꿉니다.\n\n성계 안에 §Y환경 효과§!가 있으면 직업 생산량이 증가합니다."
 job_astrometeorologist_with_icon: "£job_astrometeorologist£ $job_astrometeorologist$"
 job_astrometeorologist_plural_with_icon: "£job_astrometeorologist£ $job_astrometeorologist_plural$"
 physicist_is_astrometeorologist_tt: "\n£job_physicist£ $job_physicist_plural$가 $job_astrometeorologist_plural_with_icon$로 전환됩니다.\n\n성계 안에 §Y환경 효과§!가 있으면 §Y$job_astrometeorologist_with_icon$§!의 생산량이 증가합니다."
 astrometeorologist_hive: "$job_astrometeorologist_hive$"
 job_astrometeorologist_hive: "$job_astrometeorologist$ 드론"
 job_astrometeorologist_hive_plural: "$job_astrometeorologist$ 드론"
 job_astrometeorologist_hive_desc: "우주 폭풍의 영향을 탐지하고 기록하는 전문 연구 드론입니다."
 job_astrometeorologist_hive_effect_desc: "$job_astrometeorologist_hive_plural_with_icon$은 $r_minerals$을 $r_research$로 바꿉니다.\n\n성계 안에 §Y환경 효과§!가 있으면 직업 생산량이 증가합니다."
 job_astrometeorologist_hive_with_icon: "£job_astrometeorologist£ $job_astrometeorologist_hive$"
 job_astrometeorologist_hive_plural_with_icon: "£job_astrometeorologist_hive£ $job_astrometeorologist_hive_plural$"
 physics_brain_drone_is_astrometeorologist_tt: "\n£job_brain_drone_physicist£ $job_brain_drone_physicist$이 $job_astrometeorologist_hive_plural_with_icon$으로 전환됩니다.\n\n성계 안에 §Y환경 효과§!가 있으면 §Y$job_astrometeorologist_hive_with_icon$§!의 생산량이 증가합니다."
 astrometeorologist_machine: "$job_astrometeorologist_machine$"
 job_astrometeorologist_machine: "$job_astrometeorologist$ 유닛"
 job_astrometeorologist_machine_plural: "$job_astrometeorologist$ 유닛"
 job_astrometeorologist_machine_desc: "더 많은 지식을 알아내기 위해 모든 우주 현상을 하나도 빠뜨리는 일 없이 정성껏 조사하는 연구 유닛입니다."
 job_astrometeorologist_machine_effect_desc: "$job_astrometeorologist_machine_plural_with_icon$은 $r_energy$을 $r_research$로 바꿉니다.\n\n성계 안에 §Y환경 효과§!가 있으면 직업 생산량이 증가합니다."
 job_astrometeorologist_machine_with_icon: "£job_astrometeorologist_machine£ $job_astrometeorologist_machine$"
 job_astrometeorologist_machine_plural_with_icon: "£job_astrometeorologist_machine£ $job_astrometeorologist_machine_plural$"
 physics_calculator_is_astrometeorologist_tt: "\n£job_calculator_physicist£ $job_calculator_physicist_plural$이 $job_astrometeorologist_machine_plural_with_icon$으로 전환됩니다.\n\n성계 안에 §Y환경 효과§!가 있으면 §Y$job_astrometeorologist_machine_with_icon$§!의 생산량이 증가합니다."
 storm_dancer: "$job_storm_dancer$"
 job_storm_dancer: "폭풍 무용가"
 job_storm_dancer_plural: "폭풍 무용가"
 job_storm_dancer_desc: "$job_storm_dancer$는 단순한 여흥을 넘어 폭풍의 정수를 그 몸에 담아낸 무용을 선보입니다."
 job_storm_dancer_effect_desc: "[entertainer.GetIcon] [entertainer.GetNamePlural]은 $r_consumer_goods$를 $r_unity$ 및 $r_amenities$로 바꿉니다."
 job_storm_dancer_with_icon: "£job_storm_dancer£ $job_storm_dancer$"
 job_storm_dancer_plural_with_icon: "£job_storm_dancer£ $job_storm_dancer_plural$"
 storm_duelist: "$job_storm_duelist$"
 job_storm_duelist: "폭풍 격투가"
 job_storm_duelist_plural: "폭풍 격투가"
 job_storm_duelist_desc: "폭풍 격투가들은 폭풍의 맹렬한 기운을 몸에 두르고, 무술과 의례가 하나 된 격투장에서 격렬한 몸사위와 짜릿한 전투를 선보입니다."
 job_storm_duelist_effect_desc: "[entertainer.GetIcon] [entertainer.GetNamePlural]은 $r_consumer_goods$를 $r_unity$, $r_amenities$, 및 £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!으로 바꿉니다."
 job_storm_duelist_with_icon: "£job_storm_duelist£ $job_storm_duelist$"
 job_storm_duelist_plural_with_icon: "£job_storm_duelist£ $job_storm_duelist_plural$"
 reenactor: "$job_reenactor$"
 job_reenactor: "역사 재현가"
 job_reenactor_plural: "역사 재현가"
 job_reenactor_desc: "배우이자 박물관 큐레이터이며 전사이기도 한 이 전문가들은 과거를 이해하는 가장 좋은 방법이 직접 경험하는 것임을 잘 알고 있습니다."
