 civic_environmental_architects: "행성 조경사"
 civic_environmental_architects_desc: "오랜 세월에 걸친 세심한 손길로 모성에 완벽한 균형을 일구어 낸 이 사회는 이제 은하계에서 가장 황폐한 행성조차 가꿀 준비가 되어 있습니다. 이들의 근간에는 자연 또한 가꾸고, 통제하고, 완벽하게 다듬을 수 있다는 믿음이 자리합니다. 자연을 길들이는 것이 아니라, 그 완벽한 아름다움을 위해 기꺼이 봉사하는 것입니다."
 civic_environmental_architects_negative_effect_tooltip: "- $HOMEWORLD$ 두 개의 £blocker£ §H천연 차단물§!을 보유한 채 시작"
