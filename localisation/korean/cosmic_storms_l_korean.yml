 #Storm in a Box
 cstorms.1816.name: "표류하는 캡슐"
 cstorms.1816.desc: "§H[this.GetName]§!에 정체불명의 캡슐이 표류 중입니다. 캡슐에는 뚜렷한 공격 수단이 없어 보이며 신호에도 반응하지 않습니다.\n\n1차 스캔 결과, 손상된 외관은 첨단 소재와 생소한 공학 기술을 사용하여 제작된 것으로 밝혀졌습니다. 추가 분석이 필요합니다."
 cstorms.1816.a: "조사하세요."
 STORM_IN_A_BOX_INVESTIGATE_PROJECT: "캡슐 조사"
 STORM_IN_A_BOX_INVESTIGATE_PROJECT_DESC: "눈에 띄게 손상된 정체불명의 캡슐이 §H[this.GetName]§! 성계를 떠돌고 있습니다. 캡슐은 기원과 기능을 알 수 없으며 딱히 무기는 갖추지 않은 것으로 보이니, 캡슐의 첨단 구조를 자세히 분석한다면 안전하게 값진 정보를 알아낼 수 있을 것으로 보입니다."
 cstorms.1820.name: "폭풍 덫"
 cstorms.1820.desc: "[this.leader.GetName] 담당관은 [solar_system.GetName] 성계를 표류하는 이 정체불명의 캡슐이 대규모 방어망의 일부였던 고대의 '폭풍 덫'이라고 생각합니다.\n\n장치의 흡입구는 단단히 봉인되어 있으나, 내부를 측정해 보니 우주 폭풍의 압축된 에너지와 물질이 들어 있는 것으로 보입니다.\n\n이 놀라운 용기를 열 방법을 찾는다면 폭풍을 완화할 방법을 알아내는 데 큰 도움이 되겠지만, 내부에 들어있는 힘이 방출될 위험이 있습니다."
 cstorms.1820.a: "많은 것을 배울 수 있겠군요."
 cstorms.1820.b: "너무 위험합니다. 그대로 두세요."
 STORM_IN_A_BOX_TRAP_PROJECT: "폭풍 덫 열기"
 STORM_IN_A_BOX_TRAP_PROJECT_DESC: "고대의 '폭풍 덫'이 압축된 우주 폭풍을 품은 채 우주를 자유로이 떠돌고 있습니다. 이것을 열면 폭풍 관리 및 완화에 대한 귀중한 정보를 얻을 수 있으나, 내부에 갇혀 있는 힘이 방출될 위험이 있습니다."
 cstorms.1826.name: "풀려난 폭풍"
 cstorms.1826.desc: "[leader.GetName] 담당관이 고대 폭풍 덫의 작동 원리를 분석하고 흡기 장치의 잠금을 해제하는 데 성공했습니다. 흡입구가 열리자 내부에 갇혀 있던 §H[from.GetStormType]§!이 [solar_system.GetName] 성계의 빈 우주로 방출되었습니다.\n\n덫의 복잡한 공학적 설계를 연구해 폭풍에 강한 소재와 구조에 대한 흥미로운 정보를 얻었으나, 이 장치가 어떻게 폭풍을 완전히 억제할 수 있었는지는 여전히 이해할 수 없었습니다. 이 지식은 미래에 있을 우주적 이상 현상을 극복하는 데 큰 도움이 될 것입니다."
 cstorms.1826.storm_tt: "[solar_system.GetName] 성계에 낮은 수준의 소형 §Y$default_storm$§! 생성"
 storm_trap_insight_modifier: "폭풍 덫 통찰"
 storm_trap_insight_modifier_tt: "§Y우주 폭풍§!의 부정적인 효과가 §G10%§! 감소합니다."
 cstorms.1835.desc: "[this.GetSpeciesNamePlural] 여러분께 위로의 말씀을 드립니다! 우연히 대형 폭풍이 [this.GetName](을)를 강타하는 장면을 목격했습니다.\n\n그곳의 피해 소식을 듣고 얼마나 슬펐던지요. 정말이지 펑펑 울고 말았습니다! 그래서 큰 피해를 본 여러분을 돕고자... 특별한 일회성 특가 행사를 마련했습니다!\n\n도구, 그것도 1등급 도구를 준비했습니다. 모두 최상품이죠! 이것들만 있다면 다음 폭풍을 걱정하지 않으셔도 될 겁니다. 그럼 어떻게 하시겠습니까?"
 cstorms.1835.a: "받아들이죠."
 cstorms.1835.b: "관심 없습니다."
