 #Eye of the Storm
 cstorms.1801.name: "폭풍의 눈"
 cstorms.1801.desc: "스캔 결과, [from.GetName]에서 발생한 [fromfrom.GetName]의 눈에 이상한 부분이 감지되었고, 그 중심에 기이한 덩어리가 있음이 밝혀졌습니다. 특이한 결과인 만큼 폭풍이 소멸하거나 성계를 떠나기 전에 면밀히 조사해 봐야 합니다."
 EYE_OF_THE_STORM_PROJECT: "$cstorms.1801.name$"
 EYE_OF_THE_STORM_PROJECT_DESC: "[this.GetName]의 [fromfrom.GetName]을 스캔한 결과, 내부 소용돌이 안에 큰 덩어리가 있는 것으로 나타났습니다. 장거리 감지기로는 이 특이한 현상에 대한 결정적인 답을 얻지 못했습니다. 더 자세히 이해하려면 폭풍의 눈 속으로 현장 탐사를 진행해야 합니다."
 cstorms.1805.name: "소용돌이 속으로"
 cstorms.1805.desc: "[from.GetName]에 있는 우주 폭풍의 눈을 탐색한 끝에 [leader.GetName] 담당관이 스캔 결과가 이상하게 나온 원인을 발견했습니다. 이 비정상적인 폭풍은 중앙에 엄청나게 집중된 [from.star.GetEarnedResources]에 힘입은 것이었습니다.\n\n이에 우리 과학선은 자원을 있는 대로 채취하다가 거칠게 튕겨져 나와 버렸으나, 가까스로 철수하면서 얻은 감지 데이터는 우리 공학자들이 극한의 폭풍 환경에서 운용하는 함선의 성능을 개선하는 데 도움이 될 것입니다."
 cstorms.1805.desc.traumatized: "안타깝게도 이 위험한 경험은 [leader.GetName]에게 장기적인 영향을 주었습니다."
 energy_lower: "에너지"
 exotic_gases_lower: "외계 가스"
