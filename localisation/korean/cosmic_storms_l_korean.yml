 pm_magnetized_planetary_core: "초자성화된 행성 핵"
 pm_magnetized_planetary_core_desc: "심부 맨틀의 전자기 활동 덕분에 자기 채굴이 가능해졌으나 그로 인해 기술 기반 시설에 장애가 발생합니다."
 cstorms.1705.name: "$pm_magnetized_planetary_core$"
 cstorms.1705.desc: "[this.GetName]에서 최근 발생한 §Y$magnetic_storm$§!의 여파로 특이한 문제가 보고되고 있습니다. 폭풍의 강력한 에너지 역장이 행성 융핵의 자기 변동성을 증가시키는 바람에 기술 기반 시설 전반에 걸쳐 장애가 발생했습니다.\n\n그러나 그 덕분에 자원을 확보할 기회가 마련되었습니다. 행성 맨틀 아래에 흐르는 금속이 풍부한 용암이 이제 전자기적으로 전하를 띠게 되어서 채굴용 자석으로 채취할 수 있게 되었습니다."
 #Electrified Oceans
 d_electrified_oceans: "전기가 흐르는 바다"
 d_electrified_oceans_desc: "행성의 광활한 바다에 끊임없이 전류가 흐르고 있습니다."
 GLACIAL_OCEANS: "빙하 밑 바다"
 DEFAULT_OCEANS: "바다"
 cstorms.1715.name: "$d_electrified_oceans$"
 cstorms.1715.desc.common: "최근 발생한 §Y$electric_storm$§!의 여파로 [this.GetName]에서 특이한 현상이 관찰되었습니다. 이 행성의 [GetOceansState]가 충전되어 끊임없이 전류가 흐르게 된 것입니다. 현재 이 광활한 수역을 순환하는 전류로 인해 수중 생물이 절체절명의 위기에 빠졌습니다."
 cstorms.1715.desc.aquatic: "이는 우리 식민지의 생존 가능성에 심각한 악영향을 주기 때문에 조속히 해결해야 합니다."
 cstorms.1715.desc.non_aquatic: "이 현상은 우리에게 직접적인 피해를 주진 않으나, 향후 우리 식민지의 발전에 걸림돌이 될 것입니다."
 cstorms.1715.a: "전류를 방전시키세요."
 cstorms.1715.b: "그냥 놔두세요."
 #Ghostly Apparitions
 d_ghostly_canyon: "유령 협곡"
 d_ghostly_canyon_desc: "이 협곡에서 실체가 없는 유령을 봤다는 목격담이 들립니다."
 cstorms.1725.name: "괴이한 유령"
 cstorms.1725.desc.common: "최근 [this.solar_system.GetName]에서 §Y$shroud_storm$§!이 발생한 후, 우리 [owner.GetColonistPlural]들이 고립된 협곡에서 설명할 수 없는 유령을 목격하고 있습니다. 이 유령 같은 푸른빛 형체는 잠깐 나타나서는, [owner.GetColonistPlural]들과 소통할 능력이나 의지가 없는지 정처 없이 방황하다가 사라집니다."
 cstorms.1725.desc.psionic: "유령은 사이오닉 존재처럼 보이지만, 우리는 이 존재들과 어떠한 정신적 소통도 할 수 없었습니다. 그러나 이들의 존재가 우리의 텔레파시 능력을 간접적으로 강화한다는 사실을 발견했습니다."
 cstorms.1725.desc.psionic_robot: "유령은 사이오닉 존재처럼 보이지만, 우리는 이 존재들과 어떠한 사이오닉 소통도 할 수 없었습니다. 그러나 시스템을 통해 이들의 존재가 우리의 텔레파시 능력을 간접적으로 강화한다는 사실을 확인했습니다."
 cstorms.1725.desc.spiritualist: "이 놀라운 현상은 우리 존재가 품은 보이지 않는 경이로움을 다시금 일깨워 줍니다."
 cstorms.1725.desc.gestalt: "아직까지 물리적 상해나 공격적인 행동은 보고되지 않았습니다."
 cstorms.1725.desc.default: "아직까지 물리적 상해나 피해는 보고되지 않았습니다. 그럼에도 이 기이한 현상은 불안감을 자아내고 있습니다."
 cstorms.1725.a: "협곡을 흙으로 채우세요. 죽은 자는 묻혀 있어야죠."
 #Volcanic Inactivity
 cstorms.1735.name: "화산 활동 정지"
 cstorms.1735.desc: "최근 발생한 §Y[this.GetAffectedStormType]§!의 잔류 방사선으로 인해 §H[this.GetName]§! 전역에 변덕스러운 지질 활동이 발생하고 있습니다.\n\n특히, 폭풍의 영향으로 활화산 활동이 중단되어 지질학적 열점과 단절되고 마그마 공급이 중단된 점이 가장 주목할 만합니다.\n\n냉각된 마그마로 새 땅이 생겨나고 있으니, 이러한 변화는 행성을 더욱 발전시킬 수 있는 새로운 기회가 될 것입니다."
 #Mountain in the Sky
 d_sky_mountain: "하늘 위의 산맥"
 d_sky_mountain_desc: "거대한 산맥이 행성의 대기권 상층에서 허공에 뜬 채로 새로운 광석 매장지를 드러내고 있습니다."
 unlocks_zone_minerals_physics: "$t$지구 특성화 잠금 해제: §Y$zone_minerals_physics$§!"
 cstorms.1745.name: "$d_sky_mountain$"
 cstorms.1745.desc: "강력한 §Y$gravity_storm$§!이 §H[this.GetName]§!에 인상적인 진풍경을 연출했습니다. 폭풍의 강력한 중력 변동으로 행성에서 가장 큰 산맥이 지각에서 분리되어 행성 위로 수직으로 들어 올려진 것입니다.\n\n이 산맥은 폭풍의 잔류 중력 효과로 대기권 상층에 계속 떠 있습니다. 경이로운 대격변 덕분에 이전에는 접근할 수 없었던 지하 암반의 광석 매장지가 드러났을 뿐만 아니라 [owner.GetResearchers]들에게도 분석할 거리가 많이 생겼습니다."
 #Melting Glaciers
 cstorms.1755.name: "녹아내리는 빙하"
 cstorms.1755.desc.common: "최근 발생한 §Y[this.GetAffectedStormType]§!이 [this.GetName]의 기후에 예상치 못한 영향을 끼쳤습니다."
 cstorms.1755.desc.electric: "대기 중의 전하가 증가하면서 극지방의 기온이 급격하게 변화하여, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.particle: "폭풍 입자의 부식 작용이 극지방에 심각한 영향을 주어, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.gravity: "폭풍으로 인한 중력 변화로 여러 층의 수중 얼음이 산산조각 나, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.magnetic: "폭풍으로 유발된 행성 자기장 교란으로 급격한 지각 변동이 발생하여, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.solar: "폭풍의 엄청난 열 때문에 폭풍이 지속되는 동안 행성 전체의 기온이 상승하여, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.celestial: "대량으로 모인 과열된 우주 먼지가 극지방에 심각한 영향을 주어, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.common_2: "이전에는 진입이 불가능했던 얼어붙은 동토가 녹았습니다.\n\n이제 새롭게 드러난 이 땅을 개발할 수 있습니다."
 #Dusty Drink
 cstorms.1761.name: "우주적 막힘"
 cstorms.1761.desc.common: "§H[this.GetName]§!의 [Owner.GetEngineerPlural]들로부터 §Y$celestial_storm$§!이 물 여과 장치에 악영향을 준다는 보고가 들어왔습니다. 입자가 행성의 지하수에 침전되면서 형성된 광물 슬러리 때문에 주요 기반 시설 지점이 막혔다고 합니다."
 cstorms.1761.desc.default: "이로 인해 수경 재배가 어려워지면서 행성의 농업에 심각한 타격을 입었으며, 식수 부족 사태까지 일어난 상황입니다.\n\n이 문제를 해결하지 않으면 물 공급에 장기적인 여파가 있을 수 있습니다. 다행히도 우리 [owner.GetEngineerPlural]들은 더욱 튼튼한 여과 장치를 개발하여 이 문제를 해결할 수 있다고 자신하고 있습니다."
 cstorms.1761.desc.lithoid: "수경 재배 막힘 문제를 조사하던 중, [Owner.GetColonistPlural]들이 광물화된 슬러리가 암석류 생리를 가진 이들에게는 맛과 영양을 모두 갖춘 훌륭한 식품이라는 사실을 발견했습니다. 그리하여 식민지의 여과 장치에 약간의 조정을 가한 후, 주민들은 폭풍이 멎기를 기다리는 동안 마실 새로운 계절 음료를 대량 생산했습니다."
 cstorms.1761.a: "진행하세요."
 cstorms.1761.b: "예상치 못한 수확이군요."
 pm_satured_filtration: "포화된 여과 장치"
 pm_satured_filtration_desc: "현지의 수자원에 천체 우주 먼지가 녹아 수경 재배망이 막혔습니다."
 filtration_insight_modifier: "수경 재배 여과 통찰"
 CLEAR_DUSTY_PIPES_PROJECT: "파이프 청소"
 CLEAR_DUSTY_PIPES_PROJECT_DESC: "§Y$celestial_storm$§!의 영향으로 §H[this.GetName]§!의 물 여과 장치가 물에 녹지 않는 광물 슬러리로 막혔습니다. 이 문제를 해결하려면 더욱 강력한 여과 장치를 다시 설계해야 합니다."
 cstorms.1765.name: "뻥 뚫린 여과 장치"
 cstorms.1765.desc: "[Owner.GetEngineerPlural]들이 §H[this.GetName]§!의 수경 재배 막힘과 물 부족 문제를 해결했습니다. 식민지의 물 공급망이 개선되어 이제 $celestial_storm$에서 유입되는 복잡한 불순물을 걸러 낼 수 있게 되었습니다.\n\n이렇게 개선된 수자원 기반 시설은 개조를 통해 [Owner.GetName] 전역의 관개 작업을 개선하는 용도로도 사용할 수 있습니다."
 #Flightless Fauna
 cstorms.1771.name: "하늘을 날 수 없게 된 새"
 cstorms.1771.desc.common: "[this.GetName]의 [Owner.GetScientistPlural]들이 관찰한 결과, §Y$gravity_storm$§!이 현지 조류 야생 동물에 심대한 악영향을 주고 있다고 합니다.\n\n폭풍이 일으킨 중력 변동으로 대기 상태가 불규칙해져 여러 종의 조류가 비행할 수 없게 되었습니다."
 cstorms.1771.desc.default: "이로 인해 그 조류들은 정상적으로 사냥할 수 없을 뿐만 아니라 포식자에게 취약한 상태가 되고 말았습니다.\n\n우리가 개입하지 않으면 피해를 본 종들이 멸종될지도 모른다는 우려의 목소리가 나오고 있습니다."
 cstorms.1771.desc.swarm: "제대로 포식 한번 하겠군요."
 cstorms.1771.a: "쉬운 먹잇감이군요."
 cstorms.1771.b: "자연의 순리에 맡기세요."
 cstorms.1771.c: "그 동물들을 보호 구역으로 옮기세요."
 cstorms.1771.evopred: "완전히 멸종하기 전에 DNA를 확보하세요."
 d_avian_reserve: "조류 보호 구역"
 d_avian_reserve_desc: "취약한 조류종을 보호하기 위해 조성된 한적한 자연 보호 구역입니다."
 cstorms.1776.name: "다시 하늘로"
 cstorms.1776.desc: "§Y$gravity_storm$§!이 지나간 후 일시적으로 날지 못하게 된 [this.GetName]의 동물들은 조류 보호 구역으로 옮겨져 다시 하늘로 날아오르게 되었습니다.\n\n현재는 많은 동물이 이전 서식지로 돌아갔으나, 여전히 상당수의 동물이 보호 구역에 남아 안락함과 안전함을 만끽하고 있는 것으로 보입니다.\n\n덕분에 행성의 야생 조류를 가까이에서 관찰할 수 있는 특별한 기회가 생겼습니다."
 cstorms.1776.a: "멋진 소식이군요."
