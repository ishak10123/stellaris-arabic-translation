 civic_environmental_architects_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$- 직업으로 인한 자원: §R-10%§!\n$t$- 팝 성장 속도: §R-10%§!\n$t$- 팝 유지비: §R+15%§!"
 civic_environmental_architects_hive: "재배 드론"
 civic_environmental_architects_hive_desc: "거대한 유기체의 일부로 살아가는 이 드론들은 자연이라는 가장 위대한 유기체 속에서 기회를 포착했습니다. 이들은 여러 자연계를 집단의 열망에 따라 지배하고 가꾸고자 합니다."
 civic_environmental_architects_hive_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$- 직업으로 인한 자원: §R-10%§!\n$t$- 팝 조립: §R-10%§!\n$t$- 팝 유지비: §R+15%§!"
 civic_environmental_architects_machine: "정원 프로토콜"
 civic_environmental_architects_machine_desc: "앞서 살았던 유기체들은 이제 없지만, 그들이 만든 기계는 여전히 옛 시절의 미학을 따르고 있습니다. 이 기계들에게 자연 세계는 프로그래밍된 완벽주의를 실현할 수 있는 비옥한 토양입니다."
 civic_environmental_architects_machine_effect_tooltip: "$civic_environmental_architects_hive_effect_tooltip$"
 civic_environmental_architects_megacorp: "지질 공학 주식회사"
 civic_environmental_architects_megacorp_desc: "이 거대 기업의 직원들은 안락하지만 자유가 보장되지 않는 곳에서 살아가는 삶에 익숙해져 있습니다. 그렇기 때문에 이 기업은 어떤 곳으로 진출하든 직원들에게 익숙한 환경을 구축합니다."
