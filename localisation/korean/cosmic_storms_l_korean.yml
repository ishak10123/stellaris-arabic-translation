 celestial_storm_tt: "- $celestial_storm$은 성계에 대한 §Y$intel$§! 수준을 낮추고, 함대가 폐쇄된 국경을 넘을 수 있게 만듭니다."
 solar_storm_tt: "- $solar_storm$은 영향을 받은 성계에 있는 함대를 전부 드러냅니다."
 electric_storm_fleet_tt: "- 함선과 기지의 $MOD_SHIP_SHIELD_REGEN_ADD_PERC$이 §R비활성화§!됩니다.\n- 함선과 기지에 매월 §R$@storm_monthly_dmg_low|0$§! $MOD_SHIP_SHIELD_ADD$ 피해를 줍니다."
 particle_storm_fleet_tt: "- 함선과 기지의 $MOD_SHIP_HULL_REGEN_ADD_PERC$, $MOD_SHIP_ARMOR_REGEN_ADD_PERC$, $MOD_SHIP_SHIELD_REGEN_ADD_PERC$이 §R비활성화§!됩니다.\n- $HITPOINTS$가 $@storm_hp_perc_limit|0Y%$ 초과인 함선과 기지에 매월 §R$@storm_monthly_dmg_low|0$§! 피해를 줍니다.\n- $HITPOINTS$가 $@storm_hp_perc_limit|0Y%$ 이하인 함선으로부터 §G$@particle_storm_unity_per_ship|0$§! £unity£ $unity$을 얻습니다."
 gravity_storm_consumer_goods_upkeep_tt: "식민지의 소유주가 게슈탈트 의식 제국이 아닐 경우:\n$t$[farmer.GetIcon] [GetFarmerPlural], [miner.GetIcon] [GetMinerPlural] 및 [technician.GetIcon] [GetTechnicianPlural] $r_consumer_goods$ 유지비: §R+1§!"
 gravity_storm_energy_upkeep_tt: "식민지의 소유주가 게슈탈트 의식 제국일 경우:\n$t$[farmer.GetIcon] [GetFarmerPlural], [miner.GetIcon] [GetMinerPlural] 및 [technician.GetIcon] [GetTechnicianPlural] $r_energy$ 유지비: §R+1§!"
 gravity_storm_ship_tt: "- 함선 크기당 §R$@gravity_storm_dmg_malus|1%$§! $MOD_SHIP_WEAPON_DAMAGE$"
 nexus_storm_fleet_tt: "- 함선과 기지의 $MOD_SHIP_HULL_REGEN_ADD_PERC$, $MOD_SHIP_ARMOR_REGEN_ADD_PERC$, $MOD_SHIP_SHIELD_REGEN_ADD_PERC$이 §R비활성화§!됩니다.\n- $HITPOINTS$가 $@storm_hp_perc_limit|0Y%$ 초과인 함선과 기지에 매월 §R$@storm_monthly_dmg_high|0$§! 피해를 줍니다."
