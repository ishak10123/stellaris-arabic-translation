 gov_storm_chasers: "원로회"
 gov_storm_chasers_desc: "원로회는 죽음을 농락하는 신체적 기예에 능한 자들로 구성된 최고 통치 기구입니다. 이들은 높디높은 봉우리를 오르고 어마어마한 크기의 파도를 타는 등 원초적인 경험을 가감 없이 추구하는 데 인생을 바치며, 이러한 위업을 통해 공동체의 신뢰와 함께 공동체가 나아갈 길을 결정할 권리를 얻었습니다.\n\n원로회 구성원은 그 행적으로 인해 전설의 반열에 올랐기 때문에, 나이와 상관없이 원로라 불립니다. 이들의 이름은 오래도록 기억될 것입니다."
