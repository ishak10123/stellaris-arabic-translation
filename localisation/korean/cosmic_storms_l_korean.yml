 #### Storm Chasers #
 ########################################
 origin_storm_chasers: "폭풍 추적자"
 origin_storm_chasers_desc: "폭풍 추적자들에게 불가능한 도전이란 없습니다. 이들은 어떤 도전도 마다하지 않으며, 아무리 매서운 폭풍이라도 당당히 마주합니다.\n\n이 문명은 스릴에 대한 추구를 바탕으로 살아가며, 이는 장점이 될 수도 단점이 될 수도 있습니다."
 origin_tooltip_storm_chasers_effects: "- $LEADERS_TRAITS$ ['concept_storm_rider']\n- §Y폭풍 건물§!당 행성 $mod_planet_jobs_unity_produces_mult$: §G+$@storm_chasers_storm_building_unity_produces_mult|%0$§!\n- 필요한 기술의 연구가 완료되면 수도 건물이 자동으로 §Y폭풍 대피소§! 보정치를 제공합니다. \n- 국경 내 §Y$default_storm$§! 출현 확률: §G+100%§! \n- §Y우주 폭풍 기술§! 연구 선택지 출현 확률: §G+175%§!\n- ['concept_weather_forecasting_mode'] 이용 가능\n- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$- £physics£ ['technology:tech_storm_prediction_1']"
 START_SCREEN_STORM_CHASERS: "스릴 없는 삶은 삶이라 부를 수 없는 법입니다. 빠르게 불태우고 화려하게 죽는다... 그것이 우리의 방식이었습니다. 하지만 모든 길을 개척하고 가장 높은 봉우리마저 정복해 버렸다면, 그다음에는 무엇을 해야 할까요?\n\n우리가 사는 행성에는 늘 폭풍이 몰아쳤으며, 걸핏하면 온갖 광풍과 홍수가 발생하고는 했습니다. 이 독특한 환경을 이용할 방법을 찾는다면 성난 우주 폭풍을 소환할 수 있을지도 모릅니다.\n\n우리의 전설적인 선조들은 이미 오래전에 모성에서의 도전을 모두 완수했습니다. 그러니 이제는 저 우주 공간으로 환호성을 지르며 날아갈 때입니다. 절대 쉽지는 않겠지만, 옛말대로 대담한 자만이 한계를 뛰어넘을 수 있는 법입니다."
 #Storm Rider Trait
 leader_trait_storm_rider_desc: "솟구치는 아드레날린에 희열을 느끼는 폭풍 기수는 우주 폭풍의 격렬한 흐름 속에서 진정한 능력을 발휘합니다. 평의회 의석에 배정할 경우, 전문 분야 보너스가 평의회 보너스로 대체됩니다."
 mod_trait_storm_rider: "\n$t$지도자가 우주 폭풍 안에 있는 동안 특성 효과가 증가합니다."
 leader_trait_storm_rider_name: "폭풍 기수"
 leader_trait_storm_rider_commander: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_commander_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_scientist: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_scientist_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_official: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_official_desc: "$leader_trait_storm_rider_desc$"
 #Storm Chasers specific Progress Events
 progress.2.desc.storm.normal: "어떤 [Root.Owner.GetScientist](이)가 말했습니다. \"이 쪼그만 녀석 좀 봐요!\"\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.gestalt: "흥분으로 떨림이 가시지 않습니다.\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.outro: "바로 여기 [From.GetName]에 외계 생명체가 있습니다! 이 야생의 존재들이 우리에게 말을 걸어 올 일은 당분간 없겠지만, 이 우주에는 우리 말고도 다른 존재들이 있다는 사실만은 분명해졌습니다.\n\n어쩌면 은하계는 온갖 생명체로 가득 차 있을지도 모르겠습니다."
 progress.3.desc.storm.normal: "\"놀랍군.\" [ruler.GetRegnalName](이)가 탄성을 내질렀습니다. \"기회로 가득 찬 새 행성이라니!\"\n\n개척선을 베이스캠프로 전환하는 사이에, 선발 탐사대는 벌써부터 이 새로운 행성의 모든 것을 경험하고자 장비를 갖췄습니다."
 progress.3.desc.storm.gestalt: "신나는 발견입니다! 기회로 가득 찬 새 행성이라니!!\n\n개척선을 베이스캠프로 전환하는 사이에, 탐사 노드들은 벌써부터 이 새로운 행성의 모든 것을 경험하고자 장비를 갖췄습니다."
 progress.3.a.storm: "가 봅시다."
 progress.4.desc.storm: "우주의 정적 속으로 퍼져 나가던 우리의 외침이 마침내 보답을 받았습니다! 상대는 우리와 동등한 기술 수준을 갖춘 외계 문명입니다. 아마 우리와 거의 비슷한 시기에 이 은하 무대로 뛰어든 것 같습니다.\n\n드디어 새로운 경험의 지평이 열렸습니다. 저들이 같은 생각을 지닌 동맹이 될지, 기개를 시험하는 경쟁자가 될지는 몰라도, 우리는 미지에 대한 설렘을 안고 앞으로 나아갑니다."
 progress.4.h.storm: "굉장히 흥미롭군요."
 progress.5.desc.storm.normal: "[From.Planet.GetName]에서 준지성 생명체를 발견했습니다. 우리 [Root.Owner.GetScientistPlural] 중 하나가 말했습니다. \"얘들이 지금은 별거 없어 보여도, 잠재력은 대단하다니까요!\"\n\n하지만 지금은 그저 준지성체일 뿐입니다. 그래도 이 생물들은 앞으로 번성하는 모습을 지켜보는 재미가 있을 것 같습니다."
 progress.5.desc.storm.gestalt: "[From.Planet.GetName]에서 준지성 생명체를 발견했습니다.\n\n이들이 어떤 잠재력을 발휘할지 정말 기대되지만, 지금은 준지성체일 뿐입니다. 그래도 이 생물들은 앞으로 번성하는 모습을 지켜보는 재미가 있을 것 같습니다."
 progress.5.h.storm: "멋지군요."
 progress.6.desc.storm: "우주의 정적 속으로 퍼져 나가던 우리의 외침이 마침내 보답을 받았습니다! 하지만 찾아왔던 흥분은 이내 완전히 식어 버렸습니다. 상대는 우리의 방식에 공감하지 않으며, 그저 자기들끼리만 지내고 싶어 합니다. 지금은 물러나는 게 좋겠습니다."
 progress.6.h.storm: "시대에 맞춰 갈 줄도 알아야 하는데 말이죠."
 pirate.1.desc.storm: "우주 해적이라니! 정말이지 짜릿한 울림이 아닐 수 없지만, 자칭 §S[pirate_band.GetName]§!(이)라 하는 해적 집단이 우리를 노리고 있습니다.\n\n이 친구들이 선택한 삶의 방식은 존중해야 마땅하지만, 그 때문에 우리 무역망이 피해를 보게 되니 곤란할 따름입니다."
 pirate.2.j.storm: "유감이군요."
 ### STORMFALL SITUATION START ###
 situation_stormfall: "폭풍 출현"
 situation_stormfall_type: "기원 상황"
 situation_stormfall_desc: "[owner.capital_scope.GetName]의 혹독한 기후 속에서 폭풍의 가공할 위력이 드러났습니다. 행성의 기상을 통제하는 방법을 터득하면, 그 지식을 우주적 규모로 활용할 수 있습니다. 폭풍 유인 건물을 건설하면, 궁극의 폭풍을 향한 우리의 진보를 가속할 수 있을 것입니다."
 situation_stormfall_monthly_change_tooltip: "이 폭풍을 다루는 법을 익혀 봅시다."
 situation_stormfall_outcome: "우주 폭풍의 탄생이군요."
 stage_stormfall_effects: "우주 폭풍을 조종하는 법을 익혀야 합니다."
