 #Storm Tech Insight events
 cstorms.505.name: "광풍과 마주하다"
 cstorms.505.desc: "§H[this.GetAffectedStormType]§!의 참사를 겪은 후, 이러한 은하 현상에 대한 특별한 통찰을 얻을 수 있었습니다.\n\n우주 기상학을 연구하면 미래에는 이런 피해를 더욱 잘 막을 수 있을 것이며, 이 새로운 연구 분야를 통해 궁극적으로 폭풍을 통제하는 수단을 개발할 수 있을지도 모릅니다."
