 ###########################################
 #Anomalies #
 ###########################################
 STORMS_ANOM_ANTS: "유기 혜성"
 STORMS_ANOM_ANTS_DESC: "우주 폭풍이 지나간 자리에서 특이한 물질 조성으로 이루어진 혜성이 발견되었습니다. 이 혜성은 유기 물질로 이루어진 것으로 보입니다. 우리 [solar_system.Owner.GetScientistPlural]들이 신속한 조사를 바라고 있습니다."
 cstorms.5020.name: "(개)미행성"
 cstorms.5020.desc: "혜성의 정체는 작은 곤충들이 가득 찬 거대 둥지로 밝혀졌습니다. 혜성의 꼬리는 얼음이 녹아서 생긴 수증기가 아니라, 곤충 군집 안쪽 깊숙한 곳에서 일어난 화학 작용으로 인해 생성된 기체가 바깥으로 방출되는 것이었습니다.\n\n둥지의 바깥층은 사망한 개체들로 이루어져, 안에 있는 개체를 가혹한 우주 환경으로부터 지켜 줍니다. 둥지 내부와 그 주변에서는 각종 균류도 확인되었습니다. 균류는 내부로부터 배출되는 기체를 섭취하고 곤충들은 그 균류를 섭취하는 등, 이 혜성의 생태계는 복잡한 공생 관계로 이루어져 있습니다."
 cstorms.5020.a: "둥지를 채취하세요."
 cstorms.5020.b: "보기만 하고 만지지는 마세요."
 STORMS_ANOM_STAT: "혼란스러운 물질 조성"
 STORMS_ANOM_STAT_DESC: "일정한 궤도를 선회하는 이 천체는 우주 폭풍이 지나가며 남겨 놓은 것입니다. 우주 기지처럼 보이지만, 구성 물질을 스캔해 보니 혼란스러운 결과가 도출되었습니다. 조사를 권고합니다."
 cstorms.5030.name: "문구로 남은 종말"
 cstorms.5030.desc: "[Root.Owner.GetScientistPluralCapital]들의 보고에 따르면 이 우주 기지는 대부분 일상에서 사용하는 각종 문구류가 위태롭게 뭉쳐 이루어진 구조물입니다. 구조물 내부로 깊이 들어갈수록 구성 물질이 합금에서 플라스틱 및 여러 다른 물질로 변화합니다.\n\n구조물의 심장부에는 기계 하나가 자리 잡고 있었습니다. 아직도 작동 중인 이 기계는 효율적으로 유기물을 분해해 지금까지 이곳에서 발견된 다양한 물체를 만들어 내고 있습니다.\n\nDNA 모의 분석을 실시한 결과, [Root.Owner.GetScientistPlural]들은 이 유기물이 원래 해당 전초 기지의 주민들이었다는 씁쓸한 결론을 내릴 수밖에 없었습니다."
 cstorms.5030.evopred: "우리가 얻어 갈 것이 없나 알아봅시다."
 STORMS_ANOM_BRAIN: "실존주의적 소멸"
 STORMS_ANOM_BRAIN_DESC: "$shroud_storm$이 이 성계를 휩쓸고 지나간 뒤로 이상한 신호가 수신되기 시작했습니다. 그러나 이 불협화음과도 같은 신호는 우리 [Root.Owner.GetScientistPlural]들이 응답하려는 순간 흩어져 버리고 말았습니다. 과학자들이 과학선의 파견을 제안했습니다."
 cstorms.5025.name: "브레인스톰"
 cstorms.5025.desc: "우리의 예상을 아득히 뛰어넘는 결과가 나왔습니다. 이것은 뇌입니다. 온갖 생물종에서 찾아볼 수 있는 그 물컹물컹한 유기체 중앙 처리 기관이 수백 개씩 서로 연결되어 풍선처럼 생긴 거대 캡슐 안을 둥둥 떠다니고 있습니다. 최근 한 $shroud_storm$이 소멸하면서, 그대로 버려져 우주 공간을 떠다니고 있던 것 같습니다.\n\n풍선 캡슐과 그 안의 뇌에는 놀라운 규모의 감지기 배열체가 부착되어 있으며, 일전에 우리에게 신호를 보냈듯 함선에 통신을 요청해 정보를 전송할 수 있는 통신 모듈도 있습니다.\n\n이 뇌들이 직접 우리에게 연락을 취한 것 같습니다. 그렇다면 그 불협화음 같은 메시지도 설명이 됩니다. 우리 [Root.Owner.GetScientistPlural]들은 이 구성물을 $shroud_storm$에 대한 유기체의 반응을 측정하기 위해 만들어진 것으로 추정했습니다. 떠다니는 뇌들의 의식에 남아 있는 불안정한 사이오닉 잔상으로 보건대, 이들과 소통을 시도할 경우 오히려 끔찍한 결과가 초래될 수 있습니다."
 #Terrestrial Telescopes
 terrestial_telescope_category: "거대 망원경"
 terrestial_telescope_category_desc: "[fleet.GetName]의 스캔 결과, [From.GetStarName] 성계에서 버려진 우주 기지를 발견했습니다.\n\n이곳을 휩쓴 우주 폭풍이 남기고 떠난 듯합니다. 생명 신호는 보이지 않으며, 어떠한 종류의 동력 신호도 관측되지 않습니다. 기지의 양쪽에는 거대한 망원경 2개가 튀어나와 있습니다. 고도의 기술적 산물로 추정되는 이 광학 장치는 기지와 비교했을 때 너무나도 거대하며, 우리 제국이 파악하지 못한 기술과 설계가 적용되어 있습니다.\n\n이 망원경의 재가동을 시도해 볼 수 있습니다. 어쩌면 아주 흥미로운 정보를 얻을 수 있을지도 모릅니다."
 cstorms.1605.name: "거대 망원경"
 cstorms.1605.desc: "기지에 진입해 망원경을 작동시키는 것은 상당히 까다로운 과제였지만 우리 [Root.Owner.GetScientistPlural]들은 능숙하게 그 과업을 완수했습니다. 하지만 망원경이 향하고 있는 은하계의 구석에서는 특기할 만한 것이라고는 아무것도 발견할 수 없었습니다.\n\n다만 기지 곳곳에서 흥미로운 유물을 몇 가지 발견했습니다. 망원경으로 촬영한 것으로 추정되는 사진이 장식 액자에 전시되어 있었는데, 모두 우주 폭풍에 초점을 맞추고 있는 것으로 보아 이 성계를 지나간 모든 폭풍을 여러 차례 촬영한 듯합니다. 망원경 기사는 다양한 각도와 배율에서, 심지어 예술적으로 프레임을 기울여가면서까지 폭풍을 최대한 아름답게 담아내기 위해 노력했습니다.\n\n계속해서 조사를 진행해 봤지만, 이 버려진 기지에서 발견할 수 있었던 것은 오직 그 사진들뿐이었습니다. 우리는 흔치 않은 박력과 아름다움을 느낄 수 있는 이 사진들을 앞으로 국민들이 대대손손 즐길 수 있도록 보존하기로 했습니다."
 STORMS_ANOM_POLYCHROMATIC: "다색성 항성"
 STORMS_ANOM_POLYCHROMATIC_DESC: "[from.solar_system.GetName] 성계를 통과하는 우주 폭풍으로 인해 성계 항성의 시각적 외형이 변화했습니다. 폭풍의 여파로 항성의 코로나층은 끊임없이 변화하는 색의 소용돌이처럼 보이며, 사방으로 온갖 색상의 플레어를 방출합니다. 이 현상에 대한 추가 분석이 필요합니다."
 cstorms.5035.name: "$STORMS_ANOM_POLYCHROMATIC$"
 cstorms.5035.desc: "[root.leader.GetName] 담당관이 [from.GetAffectedStormType]이 지나간 이후 [From.GetStarName]의 핵융합 반응에 흥미로운 변화가 일어났다고 보고했습니다.\n\n폭풍으로 항성의 중심부에서 예상치 못한 핵반응이 일어나 대류 영역에서 [from.GetEarnedResources](을)를 꾸준히 방출하는 것으로 보입니다.\n\n저번에 관측된 독특한 다색성 플레어도 이 복잡하고 특이한 반응으로 인해 나타난 것입니다. 어쨌든 이 항성은 당분간 계속 면밀히 연구할 가치가 있을 듯합니다."
 cstorms.5035.a: "이 새로운 현상을 조사하세요."
 cstorms.5035.b: "거기서 나오는 자원을 채취하세요."
 STORMS_ANOM_TRIPLETS: "세쌍둥이 소행성"
 STORMS_ANOM_TRIPLETS_DESC: "지나가는 우주 폭풍이 [from.solar_system.GetName] 성계에 새로운 소행성 세 개를 놓고 갔습니다. 이 천체들은 어찌 된 영문인지 수시로 방향을 전환하고 있어서 궤도를 예측하기가 불가능합니다. 추가 연구가 필요합니다."
 cstorms.5040.name: "$STORMS_ANOM_TRIPLETS$"
 cstorms.5040.desc: "[root.leader.GetName] 담당관이 발견한 사실에 따르면, [from.solar_system.GetName] 성계에 떨어진 소행성들은 매우 불안정한 자기장을 지니고 있어 성계의 기존 자기권에서 무작위로 튕겨져 나간다고 합니다.\n\n[root.leader.GetName] 담당관이 각 소행성에 자기 보정기를 달아 궤도를 조절함으로써, 소행성이 자원을 채취할 수 있을 만큼 안정화되었습니다."
 STORMS_ANOM_TRAVELLERS: "후폭풍 조난 신호"
 STORMS_ANOM_TRAVELLERS_DESC: "§H[from.GetAffectedStormType]§!의 여파로 §H[from.solar_system.GetName]§! 성계에서 미확인 조난 신호가 감지되었습니다."
 cstorms.5050.name: "조난당한 여행자"
 cstorms.5050.desc: "§H[from.solar_system.GetName]§! 성계에서 조난 신호의 출처를 확인한 결과, 그 정체는 심하게 손상되었으나 여전히 작동 중인 상업용 선박으로 밝혀졌습니다.\n\n승무원들은 §H[from.GetAffectedStormType]§! 때문에 항로를 크게 벗어났으며, 폭풍으로 엔진이 타 버려 함선과 화물째로 우리 우주에 좌초되었다고 주장했습니다.\n\n그러면서 자신들을 도와준다면 기꺼이 화물 일부를 나눠 주겠다고 했습니다."
 cstorms.5050.a: "도와주겠다고 하세요."
 cstorms.5050.evopred: "DNA 표본을 주면 도와주겠다고 하세요."
 cstorms.5050.b: "알아서 하라고 하세요."
 cstorms.5050.c.genocide: "승무원들의 목숨을 뺏고 화물을 챙기세요."
 cstorms.5050.d.devouring_swarm: "공짜 밥이군요."
 STORMS_COSMIC_SLUDGE: "우주 점액질"
 STORMS_COSMIC_SLUDGE_DESC: "§H[from.GetAffectedStormType]§!이 출현한 이래로 §H[from.solar_system.GetName]§!를 감시하는 질량 감지기에서 불규칙한 수치가 검출되기 시작했습니다.\n\n시스템 진단 결과 장비에 기술적인 오류의 흔적은 보이지 않습니다. 추가적인 조사가 필요합니다."
 cstorms.5060.name: "$STORMS_COSMIC_SLUDGE$"
 cstorms.5060.desc: "§H[from.solar_system.GetName]§! 성계의 불규칙한 수치는 §H[from.GetAffectedStormType]§!의 여파로 형성된 비정상적인 잔해 덩어리에서 비롯된 것이었습니다.\n\n표류 중인 이 물체는 폭풍의 극심한 압력으로 인해 빚어진 무정형의 우주 점액질 덩어리입니다. 내부에서는 무수히 많은 구성 원소가 독특한 반응성 화합물을 형성하고 있습니다.\n\n해당 물체의 화학적 성질을 면밀히 연구한다면 어떠한 환경에서 이런 물질이 생성될 수 있는지 밝혀 귀중한 우주 기상학적 통찰을 얻을 수 있을 것입니다."
 cstorms.5060.a: "물질 조성을 분석하세요."
 cstorms.5060.b: "부숴 버리세요."
 STORMS_SHATTERED_SATTELITE: "부서진 인공위성"
 STORMS_SHATTERED_SATTELITE_DESC: "§H[from.GetAffectedStormType]§!의 여파로 §H[from.solar_system.GetName]§! 성계에서 미확인 물체가 감지되었습니다. 이 잔해에 추가 분석을 진행한다면 귀중한 지식을 얻을 수 있을 것입니다."
 cstorms.5070.name: "$STORMS_SHATTERED_SATTELITE$"
 cstorms.5070.desc: "§H[from.solar_system.GetName]§! 성계에서 발견된 물체는 복잡한 우주 기상 감지 배열망을 탑재한 고대 인공위성의 잔해였습니다. §H[from.GetAffectedStormType]§!에 휘말리는 바람에 은하계를 가로지르며 먼 거리를 이동해 온 것으로 추정됩니다.\n\n손상이 극심해 수리는 불가능할 것으로 보이지만, 중앙 데이터베이스에는 여러 용도로 활용할 수 있을 법한 방대한 정보가 저장되어 있었습니다.\n\n그 밖의 나머지 부분은 솔직히 말해 고철덩이에 지나지 않습니다."
 STORMS_EVISCERATED_FAUNA: "낯선 물체"
 STORMS_EVISCERATED_FAUNA_DESC: "§H[from.solar_system.GetName]§! 성계에서 최근 §H[from.GetAffectedStormType]§!에 의해 유입된 것으로 보이는 미지의 물체가 감지되었습니다.\n\n추가 조사를 진행해 이 기이한 물체의 정체를 확인해야 합니다."
 cstorms.5080.name: "유기체 잔해"
 cstorms.5080.desc.common: "§H[from.solar_system.GetName]§! 성계의 낯선 물체는 어떤 우주 동물의 유해에서 떨어져 나온 거대한 덩어리로 밝혀졌습니다. 우주 폭풍으로 인한 엄청난 손상 탓에 종을 식별할 수 있을 만한 특징은 거의 남아 있지 않으며, 그렇기 때문에 이 생물학적 잔해가 원래 어떤 생물이었는지 정확히 분류하는 것은 불가능해 보입니다."
 cstorms.5080.desc.swarm: "하지만, 다행히도 유해는 대체로 식용 가능한 상태로 보존된 것 같습니다."
 cstorms.5080.desc.default: "[leader.GetName](은)는 이 생물의 유해를 법의학적으로 자세히 분석한다면 그 기원의 본질과 §Y[from.GetAffectedStormType]§!이 유사한 우주 생명체에 미치는 영향에 대해 많은 사실을 밝혀낼 수 있을 것이라고 확신에 찬 목소리로 말했습니다."
 cstorms.5080.a: "허기를 채웁시다."
 cstorms.5080.b: "현장에서 부검을 실시하세요."
 cstorms.5080.c: "유해를 처분하세요."
 FORENSIC_DISSECTION_PROJECT: "법의학적 해부"
 FORENSIC_DISSECTION_PROJECT_DESC: "§H[solar_system.GetName]§! 성계에서 우주 폭풍에 휘말려 은하계를 가로질러 온 알 수 없는 생물의 유해를 발견했습니다. 사체를 법의학적으로 해부한다면 더 많은 정보를 알 수 있을 것입니다."
 cstorms.5085.name: "$FORENSIC_DISSECTION_PROJECT$"
 cstorms.5085.desc: "세심한 해부에도 불구하고 이 내장 덩어리가 원래 어떤 생물종이었는지는 알아낼 수 없었습니다. 폭풍의 중심지에서 받은 어마어마한 손상으로 인해, 종을 식별할 만한 특징이나 유전적 형질이라고는 단 하나조차 온전히 남아 있지 않습니다.\n\n그러나 이 연구 과정에서 우리는 §Y우주 폭풍§!의 조성과 우주 폭풍이 외계 생물에 미치는 파괴적인 영향에 대해 통찰을 얻을 수 있었습니다."
 cstorms.5085.evopred: "아주 흥미로운 먹잇감이로군요."
 STORMS_DISPLACED_TIYANKI: "표류하는 티얀키"
 STORMS_DISPLACED_TIYANKI_DESC: "$default_storm$이 지나가고 난 뒤 §H[solar_system.GetName]§! 성계에서 티얀키 신호 세 개가 감지되었습니다."
 cstorms.5090.name: "$STORMS_DISPLACED_TIYANKI$"
 cstorms.5090.desc.common: "§H[solar_system.GetName]§! 성계에서 감지된 세 개의 티얀키 신호는 표류한 탓에 영양실조까지 걸려 버린 새끼 티얀키들로 밝혀졌습니다.\n\n§Y$default_storm$§!으로 인해 무리에서 떨어져 나오게 된 모양입니다.\n\n이 녀석들은 광활한 우주에서 그다지 오래 살아남지 못할 것으로 보이며, 감지기로 확인한 결과 자기 무리를 애타게 부르고 있지만 아직까지는 아무런 소득도 없습니다."
 cstorms.5090.desc.swarm: "도움을 찾는 저 울음소리를 증폭한다면 더 큰 먹잇감을 유인할 수 있을지도 모르겠습니다."
 cstorms.5090.desc.default: "우리의 통신 시스템을 사용하면 울음소리를 증폭할 수 있으며, 그러면 티얀키 무리를 성계로 불러들일 수 있을지도 모릅니다."
 cstorms.5090.a.default: "신호를 증폭하세요."
 cstorms.5090.a.swarm: "덫을 놓으세요."
 cstorms.5090.b.default: "자연은 잔혹한 법입니다."
 cstorms.5090.b.machine: "말살 프로토콜을 시작하세요."
 cstorms.5090.b.swarm: "공짜 밥이군요."
 cstorms.5090.c: "새로운 보금자리를 주도록 하죠."
 cstorms.5090.c.tt: "['concept_vivarium']에 무작위 희귀도의 §Y$NAME_Tiyanki_Hatchling$§! 3마리 추가"
 REUNITE_POD_PROJECT: "무리와의 재결합"
 REUNITE_POD_PROJECT_DESC: "새끼 티얀키 세 마리가 우주 폭풍으로 인해 무리에서 떨어져 나와 [this.solar_system.GetName] 성계를 떠돌고 있습니다. 우리는 녀석들의 울음소리를 증폭시켜 무리와 다시 만날 수 있도록 도울 수 있습니다."
 cstorms.5095.name: "티얀키 상봉"
 cstorms.5095.desc.common: "새끼 티얀키의 증폭된 울음소리를 들었는지, 암컷과 수컷으로 이루어진 티얀키 한 쌍이 §H[solar_system.GetName]§!에 모습을 드러냈습니다.\n\n다시 무리에 합류한 게 얼마나 기쁜지, 어린 티얀키들이 벌써부터 훨씬 건강해 보입니다.\n\n암컷은 일종의 사례라는 듯 우리의 과학선 근처에 커다란 잔해 덩어리를 놔두었는데, 놀랍게도 이 별난 선물에는 몇 가지 쓸만한 재료가 들어 있었습니다."
 cstorms.5095.desc.swarm: "물론 진짜 선물은 도축하기 딱 좋게 살이 통통 오른 이 커다란 짐승이지만 말입니다."
 ###########################################
 #Event Chains #
 ###########################################
 ### Collided Planet Event Chain
 collided_planets_category: "충돌 행성"
 collided_planets_category_desc: "아주 오래전에 두 행성이 충돌했습니다. 그리고 이들이 있던 자리에 독특한 행성 하나가 탄생했습니다."
 cs_collided_planet_chain_title: "충돌 행성"
 cs_collided_planet_chain_desc: "이 독특한 행성이 유지하고 있는 위태로운 균형이 재난으로 인해 무너질 위기에 처했습니다."
 cstorms.1200.name: "두 행성 이야기"
 cstorms.1200.desc: "[From.Planet.GetName](은)는 발견과 동시에 그 존재만으로 학계를 들썩이게 했습니다.\n\n이 은하계는 광활하고 혼돈으로 가득 찬 만큼 두 천체의 충돌 정도는 흔히 볼 수 있는 일이지만, 이 경우 반드시 천체 중 한쪽이나 양쪽 모두가 파괴되기 마련입니다.\n\n하지만 [From.Planet.GetName](은)는 충돌이 발생한 지 수백만 년이 지났음에도 불구하고, 두 행성 간의 기이한 평형 상태를 지금까지 유지하고 있습니다. 심지어 그 과정에서 생명체가 거주할 수 있는 대기까지 형성되었습니다."
 cstorms.1205.name: "위태로운 균형"
 cstorms.1205.desc: "소위 '충돌 행성'이라 불리는 이 천체의 상황은 예상보다 훨씬 위태로운 것으로 드러났습니다. 최근 지진이 연달아 발생하면서 충돌 지역의 옛 흉터가 다시 벌어졌고, 그 결과 지표면으로 다량의 마그마가 분출되었습니다. 그로 인해 기온이 상승하고 화산재가 하늘을 가리면서 행성의 여러 생물권이 벌써부터 피해를 받고 있습니다.\n\n설상가상으로 측정 결과에 따르면 이 결합형 행성의 지각 활동은 점점 격화될 전망으로, 앞으로 50년 내에 안정화되지 않을 경우 결국 [From.Planet.GetName](은)는 완전히 분해될 것입니다!"
 cstorms.1210.name: "고삐 풀린 변신"
 cstorms.1210.desc: "우리 제국의 일류 지질학자들이 지혜를 모아 [From.Planet.GetName](을)를 가공할 만한 지각 활동으로부터 구해낼 수 있는 두 가지 계획을 수립했습니다.\n\n첫 번째 계획은 충돌 행성을 안정화하는 것입니다. 충돌 지역 주변의 화산 활동으로 인한 피해를 완전히 회복하려면 수백 년이 걸리겠지만, 신중한 지각 천공 작업을 통해 행성의 지각에 가해지는 압력을 완화한다면 지각판이 더 이상 불안정해지지 않도록 만들 수 있을 것입니다. 그리고 남아 있는 화산 활동 부산물은 테라포밍을 통해 안정적인 생물권을 조성하는 데 활용하면 됩니다.\n\n두 번째 계획은 훨씬 과감합니다. 행성 지각에 가해지는 압력을 완화하는 대신, 화산 분출로 생성된 에너지와 물질을 활용해 맞춤형 테라포밍 작업을 추진하는 것입니다.\n\n이 방식을 택할 경우 온갖 종류의 생명체를 수용할 수 있는 다양한 생물권을 조성함으로써, 이 행성을 낙원으로 변화시킬 수 있습니다. 그러나 이 작업은 실패할 확률도 상당히 높습니다. 실패할 경우, 이 독특한 천체가 흔적도 없이 완전히 사라질 수도 있습니다."
 cstorms.1210.a: "충돌 행성을 안정화합시다."
 cstorms.1210.b: "배출되는 물질과 에너지를 활용합시다."
 cstorms.1210.c: "그냥 지켜보기만 하죠."
 collided_planet_collapsing: "행성 붕괴"
 collided_planet_collapsing_desc: "궤멸적인 지각 활동으로 인해 충돌 행성이 분리되고 있으며, 그 과정에서 두 행성은 모두 파괴될 것입니다."
 collided_planet_collapsing_tt: "이 행성은 50년 후에 붕괴합니다."
 project_cosmic_storms_collidedplanet_stabilize: "충돌 행성 안정화"
 project_cosmic_storms_collidedplanet_stabilize_DESC: "충돌 행성의 붕괴를 막기 위해 행성을 안정화합니다."
 project_cosmic_storms_collidedplanet_harmonize: "충돌 행성 조율"
 project_cosmic_storms_collidedplanet_harmonize_DESC: "충돌 행성에 조화로운 생물권을 조성하는 과감한 계획을 실행합니다. 성공할 경우 모든 생물에게 적합한 행성이 탄생하지만, 실패할 경우 행성은 멸망합니다."
 cstorms.1220.name: "충돌 유지"
 cstorms.1220.desc: "충돌 행성 안정화 계획이 성과를 거두었습니다! [From.Planet.GetName]의 존재 자체를 위협하던 지진은 잠잠해졌으며, 화산 폭발의 부산물 또한 빠르게 감소 중입니다. 이렇게 이 행성의 위태로운 균형은 지켜졌습니다.\n\n다만 최종 테라포밍 단계를 진행하기 전에 확인할 것이 한 가지 남아 있습니다. [From.Planet.GetName](을)를 어떤 유형의 행성으로 만들어야 할까요?"
 cstorms.1220.a: "대륙 행성으로 유지하세요."
 cstorms.1220.b: "초원 행성으로 테라포밍합시다."
 cstorms.1220.c: "고산 행성으로 만듭시다."
 cstorms.1225.name: "모두를 위한 행성"
 cstorms.1225.desc.stabalize: "놀라운 결과입니다! 이번 작업의 목표는 [collided_planets.GetName]의 안정화에 불과했지만, 그 목표를 훨씬 뛰어넘는 성과를 거두었습니다!\n\n$cstorms.1225.desc.def$"
 cstorms.1225.desc.def: "보십시오, 낙원입니다. 이제 이 행성은 상상할 수 있는 거의 모든 생명체가 거주할 수 있는 곳으로 변했습니다.\n\n멸망을 앞둔 행성을 구하는 데 그치지 않고 이토록 깊은 영감을 주는 곳으로 탈바꿈시키다니... 이 이상의 위업이 과연 존재할까요? 행운의 여신이 우리에게 미소를 짓는 것이 분명합니다."
 cstorms.1230.name: "리모델링 사업"
 cstorms.1230.desc: "행성 자체를 구하는 데는 성공했지만, 충돌 행성을 낙원으로 테라포밍하려는 시도는 실패로 돌아갔습니다.\n\n맞춤형 생물권을 개발하려는 시도는 결국 이 행성의 극심한 지각 활동에 가로막히고 말았습니다. 다만 다행히도 최악의 불안정화 사태로 이어지지는 않았습니다. 화산 활동은 최근 사태가 발생하기 전의 수준으로 돌아갔으며, 충돌 지역에서는 여전히 활동이 활발하지만 당분간 악화하지는 않을 것으로 보입니다.\n\n최악의 사태는 피했습니다. 이제 남은 과제는 행성을 재건하는 것입니다."
 cstorms.1235.name: "갈라진 보금자리"
 cstorms.1235.desc: "충돌 행성을 임박한 파멸에서 구하려 했지만 처참하게 실패하고 말았습니다. 우리 과학자들이 가능한 모든 선제 조치를 취했지만, 현재 분석 모델로 모든 우발 사태를 고려하는 것은 애초에 불가능했습니다.\n\n행성의 잔해가 우주의 공허 속으로 멀어져 갑니다. 온 은하계가 이 독특한 행성의 종말을 애도하는 듯합니다."
 cstorms.1240.name: "충돌, 그리고 붕괴"
 cstorms.1240.desc: "충돌 행성은 정확히 우리가 예상한 시점에 붕괴했습니다. 한때 우리 은하계를 풍요롭게 해주었던 이 고유한 우주 현상은 사라졌으며, 그 자리에 남은 것은 오직 암석 덩어리뿐입니다."
 collided_planets_destroyed_tt: "[collided_planets.GetName](이)가 파괴되었습니다."
 ### Crimson crawlers Event Chain
 cs_crimson_crawlers_chain_desc: "선홍색 벌레 무리"
 cs_crimson_crawlers_chain_title: "붉은색 벌레 수조 마리가 지표면을 뒤덮고 있는 행성을 발견했습니다. 병충해일까요, 아니면 기회일까요?"
 crimson_crawlers_category: "선홍색 지표면"
 crimson_crawlers_category_desc: "[From.GetStarName] 성계에서 지표면이 선홍색인 행성이 관측되었습니다. 놀라울 정도로 강렬한 색상입니다. 조사가 필요합니다."
 cstorms.1255.name: "선홍색 벌레 무리"
 cstorms.1255.desc: "멀리서 보면 [From.GetName]의 표면은 마치 선홍색 보석처럼 반짝입니다. 이러한 지리적 이상 현상은 일반적으로 점토나 기타 유형의 토양에 경금속이 함유된 것으로 인해 발생합니다. 그러나 드러난 진실은 훨씬 엽기적이었습니다.\n\n그 정체는 벌레였습니다. 수조 마리를 훌쩍 뛰어넘는 벌레의 무수한 다리가 서로 뒤엉켜, 마치 융단과도 같이 [From.GetName]의 지표면을 거의 빈틈 없이 뒤덮고 있습니다.\n\n얼마 지나지 않아 \"선홍 다족류\"로 불리게 된 이 무척추동물은 생식 주기가 놀라울 정도로 활발합니다. 이 벌레들은 행성의 자연환경에는 해를 끼치지 않으나, 녀석들이 우글거리는 만큼 [From.GetName](은)는 식민지를 개척하기에 적합하다고는 말할 수 없습니다.\n\n그런데 한 연구원이 이 곤충들을 처리할 다소 특이한 방안을 제안했습니다. 1차 스캔 결과, 이 벌레는 식용이 가능한 것으로 드러났습니다. 그렇다면 벌레들을 새로운 식량 공급원으로 활용할 수 있지 않을까요? 최소한 그 가능성을 조사해 볼 가치는 있을 것 같습니다."
 project_cosmic_storms_crimson_crawlers: "먹거리 생각거리"
 project_cosmic_storms_crimson_crawlers_DESC: "[From.Planet.GetName](은)는 얌전한 선홍색 곤충으로 완전히 뒤덮여 있습니다. 이 벌레들을 처리하면 이 행성에 거주할 수 있을지도 모릅니다. 게다가 이 벌레들은 괜찮은 식량 자원인 것 같습니다. 좋은 타개책을 발견할 수 있을 듯한 예감이 듭니다."
 cstorms.1260.name: "흔치 않은 미식"
 cstorms.1260.desc: "이 선홍색 벌레를 식재로 활용한다니 처음에는 말도 안 되는 생각이라 여겼지만, 표본을 함선에 가져와 놓고 보니 생각보다 먹을 만한 것 같습니다.\n\n이 곤충은 정말 신기합니다. 극도로 발달한 신경계를 갖추었지만 정작 중앙 처리 기관은 없습니다. 더 중요한 점은 희멀건 육질이 놀라울 정도로 부드럽고 촉촉하며, 선홍색이 감도는 외피는 생으로 먹어도 바삭바삭하고 기분 좋은 식감이 느껴진다는 것입니다.\n\n이제 한 가지 결정할 사항이 있습니다. 이 벌레들을 연구 소재로 삼는 것이 좋을까요, 아니면 맛깔나는 식량으로 삼는 것이 더 나을까요? 식량으로 삼을 경우 조리를 거치면 풍미와 재미를 더할 수 있겠지만, 생으로 먹는 편이 더 빠르고 간편할 것입니다. 알맞은 양념을 곁들이면 금상첨화일 테고요."
 cstorms.1260.a: "벌레를 연구하세요."
 cstorms.1260.b: "생으로 먹읍시다!"
 cstorms.1260.c: "어서 조리해 보세요!"
 ### Stormbound Event Chain
 cs_stormbound_chain_title: "폭풍 동반자"
 cs_stormbound_chain_desc: "꺼림칙한 느낌의 함선이 감지기에 포착되었습니다. 그런데 발신원이 우주 폭풍 속에 자리 잡고 있습니다. 대체 무슨 일이 벌어지고 있는 걸까요?"
 letters_of_the_manifold: "틈새 너머에서 온 편지"
 stormbound_event_ship_object: "$cs_stormbound_chain_title$"
 cstorms.1310.name: "폭풍 동반자의 출현"
 cstorms.1310.desc: "[This.GetName] 성계에서 이상한 보고가 들어왔습니다. 해당 구역을 최근 강타했던 우주 폭풍에서 출신을 알 수 없는 함선 하나가 발견되었다고 합니다. 식별 부호도 없는 이 함선은 주변에 휘몰아치는 격류를 전혀 개의치 않는 듯, 폭풍을 뚫고 유유히 순항했습니다.\n\n통신을 요청했지만 응답이 없었고, 폭풍이 흩어지자 함선도 사라졌습니다. 관측 장치의 오작동으로 넘기기에는 시각적 증거를 부정할 수 없습니다.\n\n아득히 발달한 기술적 산물인 것일까요? 아니면 그보다 훨씬 더 불길한 무언가일까요? 일단, 이 수수께끼의 함선이 다시 나타나면 바로 보고드리도록 하겠습니다."
 cstorms.1313.name: "다시 나타난 폭풍 동반자"
 cstorms.1313.desc: "[This.GetName]에 위치한 연구 기지 한 곳에서 깜짝 놀랄 만한 보고를 보내왔습니다. 최근 우주 폭풍이 기지를 지나던 도중 이상한 함선이 전초 기지와 충돌할 뻔했다는 것입니다. 시각 자료를 확인한 결과, 그 함선은 일전에 보고되었던 꺼림칙한 함선과 일치했습니다.\n\n해당 우주 기지에 따르면, 그 함선의 선체는 유기 화합물과 칼슘 광물, 그리고 합금이 기이하게 뒤섞인 물질로 이루어져 있었다고 합니다.\n\n유기 생명체의 신호는 감지되지 않았기 때문에, 우리는 이 함선이 자동 항행 중이거나 오작동을 일으킨 것으로 추측하고 있습니다.\n\n그런데 가장 당황스러운 일은 그다음에 일어났습니다. 해당 함선의 추진 계통 대부분이 이미 우주 잔해에 부딪혀 산산조각 난 상태였던 것입니다. 이 함선은 진작에 우주에서 좌초되었어야 마땅합니다.\n\n과학선을 배정해 다음에 있을 우주 폭풍을 살펴본다면, 이 수수께끼의 함선에 관해 더 많은 것을 알아낼 수 있을지도 모릅니다."
 cstorms.1313.a: "이런 말도 안 되는 것에 낭비할 시간은 없습니다."
 cstorms.1316.name: "광풍 속의 속삭임"
 cstorms.1316.desc: "[stormbound_science.GetName]의 시야 저 멀리에서, 겹겹이 몰아치는 폭풍 사이로 그 꺼림칙한 함선이 모습을 드러냈습니다. 함선이 우리의 곁을 유영하듯 지나치자, 우주를 이루는 구조 그 자체로부터 나오는 거친 신호가 어지럽게 감지되었습니다.\n\n드디어 우리는 왜 우리 감지기가 이 함선을 관측하지 못했는지 그 답을 찾을 수 있었습니다. 이 함선의 물리적 발현 형태는 겹겹이 쌓인 우주의 주름 너머에 존재합니다. 웜홀에 진입한 동시에 진입하지 않은, 그런 모순이 이 함선에서는 성립하고 있습니다. 이 함선이 우리 우주로 돌아올 수 있었던 것은 아마도 우주 폭풍의 초차원적 성질 덕분이었던 것 같습니다.\n\n이 사실을 알게 되었으니, 다음에 함선이 나타나면 즉시 감지하고, 나아가 함선을 우리가 사는 현실로 다시 끌어올 수 있을 것입니다."
 cstorms.1317.name: "폭풍 동반자 목격"
 cstorms.1317.desc: "일전의 그 꺼림칙한 함선이 §Y[this.GetName]§!에서 목격되었습니다."
 cstorms.1320.name: "고향으로"
 cstorms.1320.desc: "드디어 접촉에 성공했습니다! 그 꺼림칙한 함선이 [Root.Fleet.GetName] 앞에 나타나, 통신을 요청해 왔습니다. 이윽고 화면에 정교한 가면을 쓴 기계 개체가 나타났습니다. 자신을 브'티인이라 소개한 이 존재는 놀라운 이야기를 들려주었습니다.\n\n브티인은 한때 후원자 협의회라는 단체의 귀감으로 여겨지는 명망 높은 장교였습니다. 브'티인은 순찰 중에 승무원들과 함께 우주 폭풍에 휘말렸고, 생존을 위해 과감한 결정을 내렸습니다. 함선에 탑재된 '브리치 드라이브'를 과충전한 것입니다. 브리치 드라이브는 검증을 거치지 않은 실험 단계의 기술이었고, 결국 함선과 승무원 모두 폭풍의 초차원 영역에 갇히고 말았습니다.\n\n이야기를 마친 브'티인은 엉망이 된 함선에서 작은 상자 하나를 보내왔습니다. 그 안에는 여러 문서가 들어 있었습니다. \"이것을 고향으로 돌려보내 주길 바라오.\" 브'티인의 부탁과 함께 통신은 종료되었고, 함선 또한 다차원 공간의 틈새 사이로 사라졌습니다.\n\n문서는 외계 문자로 적혀 있어 해독에는 시간이 걸릴 것 같습니다."
 cstorms.1320.a: "번역을 시작하세요."
 cstorms.1321.name: "틈새를 넘어온 편지"
 cstorms.1321.desc: "그 기이한 상자의 내용물을 해독했습니다. 그중 한 문서에는 그 함선에 탑재되어 있던 이른바 '브리치 드라이브'의 도면이 그려져 있었습니다. 우리의 기술 수준을 넘어선 장치지만, 그 구축 원리를 세심하게 살펴보는 것만으로도 초공간 이동에 관한 우리 제국의 이해 수준을 높일 수 있었습니다.\n\n실질적인 도움은 되지 않겠지만 자못 마음을 움직이는 문서도 있었습니다. 승무원 개개인이 사랑하는 이들에게 보내는 편지에는, 저마다의 애정과 희망, 그리고 회한이 담겨 있었습니다.\n\n아마도 브'티인은 승무원들에게 마지막으로 외부와 연락을 취할 기회를 주고자 한 듯합니다. 하지만 안타깝게도 이 편지들을 어디로 전해 줘야 할지 우리로서는 알 길이 없습니다. 차라리 우리 국민들에게 내용을 공개하면 이들의 기이한 유산을 보전할 수 있을 것입니다. 아니면 아예 파기하는 것이 현명할 수도 있습니다. 기이한 함선과 오싹한 편지에 관한 소식은 불안을 조장할지도 모릅니다."
 cstorms.1321.a: "후대를 위해 편지를 보존 처리합시다."
 cstorms.1321.b: "편지를 없애 버리세요."
 project_cosmic_storms_stormbound: "폭풍의 망령"
 project_cosmic_storms_stormbound_DESC: "일전의 그 꺼림칙한 함선이 이 폭풍 안에 출현할 것이라는 감지 결과가 나왔습니다.\n\n당장 과학선을 보내서 함선을 끌어내고 탈취해야 합니다!"
 ### But They're Cute Event Chain
 cs_but_they_are_cute_chain_title: "이렇게나 귀여운데?"
 cs_but_they_are_cute_chain_desc: "[From.Planet.GetName] 탐사 결과, 신기한 생물을 발견했습니다. 녀석들을 어떻게 해야 할까요?"
 but_they_are_cute_category: "이렇게나 귀여운데?"
 but_they_are_cute_category_desc: "[From.Planet.GetName] 탐사 결과, 신기한 생물을 발견했습니다. 함께 지낸 지 얼마 되지도 않은 이 생물은 벌써부터 우리 마음 깊은 곳에서 양육 욕구와 보호 본능을 불러일으키고 있습니다. 추가 조사가 필요합니다."
 cstorms.1500.name: "이렇게나 귀여운데?"
 cstorms.1500.desc: "이 생물은 발견 즉시 우리 마음속 애정과 헌신을 자극하는 등 엄청난 영향을 불러일으켰습니다. 순진하게 똘망거리는 네 개의 눈은 그 구름처럼 부드러운 털을 얼마든지 만져도 좋다고 말하는 듯했습니다. 이 생물은 특히 [Root.GetLeaderName]에게 애착을 느끼는 듯, 대부분의 시간을 그 무릎 위에서 보내며 애정을 독차지하고 있습니다. 공격성이나 위험 징후는 전혀 보이지 않습니다. 마치 상대에게 불쾌한 감정을 전혀 주지 않도록 완벽하게 설계된 것만 같습니다.\n\n하지만 희외적인 시각을 지닌 일부 인원은 미발견 생명체를 사전 승인 없이 함선에 태우는 것은 무책임한 일이라고 지적했습니다. [Root.GetLeaderName](은)는 이 생물이 분명 안전할 것이라고 장담했지만, 결국 정식 조사를 요청하는 데 동의했습니다."
 cstorms.1500.a: "어떤 생물인지 알아보세요."
 cstorms.1500.b: "거부합니다. 당장 없애 버리세요."
 cstorms.1500.evopred: "거부합니다. 먹어 버리세요."
 project_cosmic_storms_but_they_are_cute: "생물학적 경이"
 project_cosmic_storms_but_they_are_cute_DESC: "우리 과학선에서 그 어느 생물보다 매혹적이고 부정할 수 없을 정도로 사랑스러운 동물을 발견했습니다. 키울지 말지 결정하기 전에, 녀석의 생물학적 특징을 조사해야 합니다."
 cstorms.1505.name: "생물학적 경이"
 cstorms.1505.desc: "이 온순한 육족 보행 동물은 검사와 스캔을 위해 진정제를 투여할 필요도, 애초에 강제로 끌고 올 필요도 없었습니다. 이 동물은 이상할 정도로 유순합니다. 승무원들은 녀석을 쓰다듬었을 때 내는 부드러운 울음소리에서 따와 '구르르'라는 별명을 붙여 주었습니다.\n\n검사 결과 구르르는 잡식성이며, 털은 우리에게도 친숙한 부드러운 케라틴 기반 섬유로 이루어져 있습니다. 하지만 가장 경이롭고 놀라운 일은 이 사랑스러운 생물의 몸안에서 일어나고 있었습니다. 녀석은 세포를 완전히 재생하는 데 한 달이 채 걸리지 않습니다. 여기에는 신경계도 포함됩니다. 다시 말해, 완전히 기능하는 신체 부위가 며칠 만에 다시 자라난다는 것입니다.\n\n이렇게나 정교한 생물학적 구성을 갖춘 생물이 자연 진화의 산물일 가능성은 작아 보입니다. 녀석은 지금까지 본 어떤 생물과도 달라, 그 성격을 확신할 수 없습니다. 겉보기에는 온순하지만 언제든 공격성을 드러낼 수 있다는 것입니다. 이렇게 말은 했지만, 녀석이 나타난 이후로 [Root.GetLeaderName]의 업무 의욕이 그 어느 때보다 강해진 것 같습니다.\n\n구르르를 어떻게 할까요? 길러도 될까요?"
 cstorms.1505.a: "산책이랑 배변 훈련을 미루지 않겠다고 약속하면 말이죠."
 cstorms.1505.b: "아뇨, 없애 버리세요."
 cstorms.1510.name: "정서적 지원 반려동물 구르르"
 cstorms.1510.desc: "이 사랑스러운 생물을 과학선에서 키우도록 허락했습니다. 녀석은 선상 생활에 잘 적응하고 있습니다. [Root.GetLeaderName]의 마음을 달래주는 것은 물론이고, 총총대며 돌아다니는 곳마다 분위기를 밝혀 줍니다. 승무원들의 사기가 그 어느 때보다 높습니다!\n\n이 '자연'의 기적과도 같은 생물이 언제까지나 우리 모두에게 귀엽고 온순한 친구로 남아 주기를 바랄 뿐입니다. 지금부터 영원토록 우리 곁에 있을 친구. 그 친구의 이름은 구르르입니다."
 cstorms.1510.a: "멋지군요!"
 cstorms.1515.name: "구르르의 최후"
 cstorms.1515.desc: "유전자 조작이 가해진 것이 명백한 비정상적인 신체를 감안했을 때, 과학선에서 구르르를 키우게 둘 수는 없었습니다. 녀석이 승무원에게 악영향을 주거나, 분노한 주인이 나타나 반환을 요구할 위험이 너무 크기 때문입니다. 조치는 신속하고 자비롭게 이루어졌습니다. 이윽고 '구르르'거리던 소리는 어느새 영원히 잠잠해졌습니다.\n\n납득할 수 있는 결정이지만, 이 일로 [Root.GetLeaderName] 및 승무원들은 정서적 타격을 받은 듯합니다. 이 사랑스럽지만 기괴한 생물을 잃은 상실감을 극복하려면 어느 정도 시간이 필요할 것 같습니다."
 cstorms.1515.a: "어쩔 수 없는 일이었습니다."
 cstorms.1515.evopred: "DNA 표본을 확보합시다."
 cstorms.1520.name: "구르르의 최후?"
 cstorms.1520.desc: "이 사랑스러운 생물을 처분하면 그걸로 끝일 거라고 생각했지만, 녀석의 재생 능력은 우리의 추측을 훨씬 뛰어넘었습니다.\n\n녀석이 숨을 거두고 얼마 지나지 않아, 활동을 멈춘 신체 조직으로부터 똑같은 모습의 복제본 두 마리가 생겨났습니다. 새로 나타난 녀석들은 우리가 모체를 살처분했음에도 불구하고 전혀 공격성을 표출하지 않고 있습니다.\n\n구르르 무리가 더 커지지 않도록 우리는 현 상태를 유지하기로 했습니다. [Root.GetLeaderName](을)를 비롯한 승무원들은 녀석들을 키울 수 있게 되었다며 기뻐했습니다."
 cstorms.1520.a: "이걸로 교훈을 하나 얻었군요."
 ### The Imitator Event Chain
 cstorms.1550.name: "흉내쟁이"
 cstorms.1550.desc: "[From.Planet.GetName]에서 발견한 구명정은 폭풍에 꼼짝없이 휘말린 상태였습니다. 구명정이 보내온 데이터 신호는 우리의 것과 동일했지만, 포드 자체는 아무리 봐도 외계에서 온 것임이 분명했습니다. 우리는 조심스럽게 상대방의 통신 요청에 응답했고, 캡슐 안의 존재는 우리를 보고 크게 반색했습니다.\n\n이야기를 들어 보니, 그 조난자는 한동안 폭풍에 휘말린 채로 도움의 손길만을 애타게 기다리고 있었으며, 함선의 생명 유지 장치가 꺼지기 직전이었다고 합니다.\n\n신원을 밝히라고 요청하자 이 낯선 존재에게서 자신이 우리 승무원 중 하나라는 얼토당토않은 대답이 돌아왔습니다. 민망할 정도로 뻔한 거짓말입니다. 그도 그럴 것이, 우리 함선의 승무원 중에서 사라진 인원은 단 한 명도 없었기 때문입니다."
 cstorms.1550.a: "장난은 그만. 구명정을 파괴하세요."
 cstorms.1550.b: "구명정을 안으로 들여 보죠."
 cstorms.1555.name: "흉내쟁이"
 cstorms.1555.desc: "구명정을 함선 안으로 들여왔습니다. 서툰 거짓말은 캡슐의 봉인문이 열리자마자 끝이 났습니다. 안에 있던 외계인이 곧바로 필사적으로 호소하기 시작한 것입니다.\n\n이 외계인은 자신이 있던 모선에서 구명정을 점검하던 중에 안에 갇혀 우주 공간으로 사출되었다고 합니다. 안타까운 점은 승무원 중 그 누구도 이 외계인이 없어졌다는 사실을 알아채지 못했다는 것입니다.\n\n몇 달 동안이나 표류한 끝에, 이 외계인은 구명정에 있던 장비들을 긁어모아 지나가는 함선들의 에너지 신호를 흉내 내는 일종의 유인 장치를 만들었습니다. 하지만 이것으로도 도와줄 함선을 끌어들이는 데 실패했고, 엎친 데 덮친 격으로 우주 폭풍이 구명정을 휘감아 외계인의 모성계에서 몇 광년은 떨어진 곳까지 끌어오고 말았습니다. 외로움과 두려움으로 극한까지 내몰린 외계인은 지나가는 함선의 실종된 승무원을 사칭한다는 계획을 세웠습니다. 외계인은 우리를 속인 것을 사과하기는 했지만, 목숨을 건진 기쁨을 도저히 억누를 수 없는 모양입니다."
 cstorms.1555.a: "위기 대처 능력이 뛰어나군요. 쓸모가 많겠어요."
 cstorms.1555.b: "근처의 지성체가 거주하는 행성으로 가는 수송편을 마련해 줍시다."
 cstorms.1555.c: "외계인은 내버려 두세요. 구명정은 챙기고요."
 the_imitator_category_desc: "최근 탐사 중에 홀로 떠도는 구명정을 하나 발견했습니다. 이상하게도 이 구명정이 보내온 데이터 신호는 우리의 것과 일치했습니다. 이 구명정은 얼마 전 이 성계를 휩쓸고 지나간 우주 폭풍에 휘말려 떠내려온 것으로 추정됩니다. 조사를 권장합니다."
 #The Imitator Leader
 the_imitator_category: "흉내쟁이"
 the_imitator_catch_phrase: "받아 주셔서 정말 감사해요!"
 the_imitator_leader_desc: "우주 폭풍에 휘말려 우리 함선까지 떠내려온 이 재주 넘치지만 기이한 천재는, 어떠한 상황조차 뒤바꿀 수 있는 잠재력을 갖추고 있습니다. 물론 대개 좋은 방향으로 말입니다."
