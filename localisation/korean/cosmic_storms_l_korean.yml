 cstorms.2295.a: "[Root.GetLeaderName](이)가 원하는 대로 하게 두세요."
 cstorms.2295.b: "[Root.GetLeaderName](이)가 하려는 행동을 막으세요."
 cstorms.2295.a.psionic: "피험자들이 울부짖는 소리가 아직까지 들리는군요."
 cstorms.2295.a.psionic_gestalt: "피험자들의 하나 된 목소리가 아직도 고통에 차 울부짖고 있군요."
 cstorms.2295.a.gestalt: "부조화는 혼돈을 낳는 법이죠."
 cstorms.2300.name: "모든 말의 끝"
 cstorms.2300.desc: "우리는 $building_adakkaria_patriotic_institute$의 마지막 구획에 진입하기 위해 작업을 부단히 이어 나갔습니다. 그러던 중, 지하 실험실을 조사하던 팀이 당황스러운 소식을 전했습니다. 아드아카리아 과학자들은 모든 존재 안에, 심지어 지성을 지닌 기계 속에도 어떤 힘의 원천이 깃들어 있다고 주장했습니다. 이들은 우주 폭풍의 발현에 착안해 이 힘을 '내면의 폭풍'이라 불렀습니다. 모든 지성체를 움직이게 하는 욕망과 힘의 소용돌이라는 뜻입니다. 그리고 내면의 폭풍에 극단적인 경험을 가하면 막강한 힘을 휘두를 수 있다는 듯합니다.\n\n§S알아타 랜디어§!는 포로 생활 중에 이 현상을 처음으로 발견했습니다. 과학자였던 그는 지엄 사령부를 설득해 기념 사업소에서 추가 시험을 진행했습니다. §S랜디어§!에게 무슨 일이 일어났는지는 기록에 나와 있지 않지만, 함선 무덤에서 일어난 일을 생각하면 불행한 최후를 맞았다는 사실만은 분명합니다.\n\n이어지는 보고서에는 내면의 폭풍을 해방하는 '더욱 효율적인' 방법이 나와 있습니다. 신체적인 잔혹 행위가 아니라 피해자의 내면에 자리한 치명적이면서도 결코 눈을 돌릴 수 없는 공포를 자극하는 것입니다. 이 현상을 대규모로 촉발하기 위해, 자애회는 자신들의 방대한 선전 기지망을 통해 신호를 내보낼 계획을 세웠습니다."
 cstorms.2300.desc.psionic: "관측실에서 들려왔던 사이오닉 속삭임의 내용을 기록하는 데 성공했습니다.\n\n§L제발 여기서 꺼내 줘요. 저는 잘못한 게 없단 말입니다!\n이제는 눈을 감아도 끝없는 폭풍뿐이야. 폭풍이 날 부르고 있어.\n이건 말도 안 돼요. 시키는 대로 다 했잖아요. 대체 우리한테 왜 이러는 거죠?\n우리 모두의 내면에는 힘이 깃들어 있어요. 놈들은 그 힘을 착취하려는 겁니다. 절대로 내줘선 안 돼요.\n헛소리 마. 다 자애회를 지키기 위한 거라고. 지시에 따라야만 해.\n위성이 속삭이는 게 느껴져. 내 정신이 은하계 저편에 닿고 있어.\n놈들이 설계한 걸 봤어요. 이 짓을 은하계 어디에 있든 누구한테나 할 수 있게 된단 말입니다.\n일단은 살아야죠. 그냥 시키는 대로 해요!\n이해를 못 했군요. 놈들은 우리한테 한 짓을 모두에게 똑같이 할 생각이라고요.\n아니면, 우리 힘을 방출하는 건 어떨까요?\n하지만 그러면 우리는...\n어차피 우린 살길이 없소. 그 기계가 작동하면 모두 다 죽고 말 테니까.\n무서워. 죽기 싫어. 살고 싶어. 제발...\n최종 단계가 말을 걸어 왔어요. 우리가 동의하는지 묻는군요.§!"
 cstorms.2300.b: "이 힘은 우리가 가져야 합니다."
 cstorms.2300.a.psionic: "이런 암울한 결말이라니."
 cstorms.2300.a.psionic_hive_robot: "유감스러운 결과로군요."
 cstorms.2300.b.psionic: "숭고한 희생이 있었군요."
 cstorms.2300.b.psionic_hive_robot: "감수할 만한 희생입니다."
 cstorms.2305.name: "광풍 초래 장치"
 cstorms.2305.desc.start: "엄청난 크기의 격납고를 발견했습니다. 각종 전선과 파이프, 그리고 전자 장치가 복잡하게 얽혀 격납고를 가득 메우고 있습니다. 이 설비들은 모두 거대하지만 속이 비어 있는 미사일 격납고 쪽으로 이어집니다. 외관을 보니, 이 그물망은 원래 초계함 정도 크기의 물체에 연결되어 있었던 듯합니다.\n\n관련 기록에 의하면 이곳은 원래 §l광풍 초래 장치§!라는 기계를 조립하는 공간이었고, 초래 장치는 여기서 조립된 후 아드술 성계에 배치되었던 모양입니다. 초래 장치와의 통신 시도는 실패로 돌아갔지만, §G초래 장치의 동력원§!은 여전히 이곳에 남아 있다는 듯합니다."
 cstorms.2305.desc.end.default: "장치의 이름을 들은 대원들이 알 수 없는 분노를 느끼며 전선과 패널을 뜯어내기 시작했고, 단순한 명령으로는 이들을 진정시킬 수 없었기에 더 직접적인 조치를 취해야 했습니다. 진실이 점점 더 가까워지고 있습니다."
 cstorms.2305.desc.end.psionic: "[Root.GetLeaderName](이)가 비어 있는 구조물에 다가가자 사이오닉 속삭임이 다시 시작되었습니다.\n§L당신들도 봤죠? 우리도 처음에는 놈들이 뭘 만드는지 몰랐어요. 우리를 처분할 거라는 것도요. 복수를 원한 사람도 있었고, 풀려나기를 바라는 사람도 있었어요. 폭풍이 부르는 걸 느낀 사람도 있었죠. 이 짓을 끝내야 했어요. 이해하시죠? 끝내야만 했다고요. 더는 견딜 수 없었어요.§!"
 cstorms.2305.desc.end.gestalt: "장치의 이름을 읽은 우리 탐사 [controller.GetIndividualNamePlural]들이 §l초래 장치§!가 어떻게 작동되었고, 그 신호가 어떤 방법으로 다수의 선전 기지를 거쳐 마침내 목표 지점까지 도달했는지 알아냈습니다. 그리고...\n\n그 운명에서 우리 또한 자유롭지 못하다는 사실까지도요."
 cstorms.2305.desc.default: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.default$"
 cstorms.2305.desc.psionic: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.psionic$"
 cstorms.2305.desc.gestalt: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.gestalt$"
 cstorms.2310.name: "최종 단계"
 cstorms.2310.desc.start: "마침내 기념 사업소가 간직한 마지막 비밀이 드러났습니다. 최종 단계가 열린 것입니다.\n\n이곳의 복도 바닥에는 아드아카리아 주민들의 바싹 말라붙은 시신이 널려 있습니다. 시신은 돌, 금속, 플라스틱 등 수많은 파편으로 갈기갈기 찢겼습니다. 무언가가 이 복도를 맹렬히 휩쓸며 앞길을 가로막는 모든 것을 말살한 듯한 모습입니다.\n\n하지만 진정한"
 cstorms.2310.desc.piece.default: "공포는"
 cstorms.2310.desc.piece.authgen: "희열은"
 cstorms.2310.desc.end: "그 뒤에 찾아왔습니다.\n좁은 수용실에는 여섯 명의 외계인이 수감되어 있었고, 감시용 화면에는 §G초래 장치 동력원§!이라고 적혀 있습니다. 하지만 눈앞에 있는 것은 아무리 봐도 자애회의 미성년 구성원입니다. 그 작은 몸이 수십 개의 관과 전선에 붙들려 있습니다. 수용실을 가득 채운 액체는 이들을 살아 있지도 죽지도 않은 상태로 유지하고 있으며, 이들의 신체는 아드술 성계를 맴도는 폭풍의 에너지와 비슷한 힘에 둘러싸여 있습니다.\n\n채 망가지지 않은 몇몇 화면이 갑자기 켜지더니, 하나의 동일한 메시지를 표시했습니다.\n§L우리를 기억해 줘 | 우리의 이름을 불러줘 | 우리의 이름을 불러줘.§!\n\n우리는 곧바로 아이들의 이름을 기록했습니다. 그런데 마지막 이름을 눈에 담은 순간, 우리는 모두 멈칫할 수밖에 없었습니다. §S엔리다 디린§!. 지고의 자애 사업소에서 생각만으로 화재를 진압했던 바로 그 피험자입니다.\n\n이제 이름을 알아냈으니, 우주 폭풍과 다시 한번 연락을 취할 수 있을 것입니다."
 cstorms.2310.desc.default: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.default$ $cstorms.2310.desc.end$"
 cstorms.2310.desc.authgen: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.authgen$ $cstorms.2310.desc.end$"
 cstorms.2310.a: "아주 잘했습니다!"
 #The Storm's Swansong
 cstorms.2320.name: "폭풍"
 cstorms.2320.desc: "우리의 이름을 불러줘\n\n우리의 이름을 불러줘\n\n우리의 | 이름을 | 불러줘"
 cstorms.2320.a: "자애회가 여러분에게 무슨 짓을 했는지 봤습니다."
 cstorms.2320.b: "아드아카리아 자애회는 어떻게 된 겁니까?"
 cstorms.2320.c: "광풍 초래 장치는 어디 있죠?"
 cstorms.2320.d: "여러분의 이름을 알아냈습니다."
 cstorms.2320.a.resp: "놈들은 계속 주었다\n\n아픔과 분노와 슬픔과 공포\n\n놈들은 이빨, 놈들은 아가리, 놈들은\n삼켰다 뱉었다 불러왔다\n\n아픔과 분노와 슬픔과 공포\n\n흩어졌다 없어졌다 우리는 변해 버렸다\n\n아픔과 분노와 슬픔과 공포"
 cstorms.2320.b.resp: "집요하고 오만하고 무자비한\n자만 | 잔인 | 집착\n죽음을 부른다 고통을 가한다\n\n어쩔 수 없었어 어쩔 수 없었어 어쩔 수 없었어 어쩔 수 없었어 어쩔 수 없었어\n있다 | 없다 | 없어진다\n\n우리는\n방송을 타고 | 신호를 망가뜨리고 | 마음을 망가뜨리고 \n모조리 백색으로 | 회색으로 | 흑색으로 | 어둠 속으로\n별 사이로 흩어진다 영영 사라진다"
 cstorms.2320.c.resp: "우리는\n방패 | 당신들의 방패\n\n우리는\n요람을 만든다 | 요람을 흔든다\n\n전부 없어질 때까지 | 잠들다 잠들다 잠들다 사라질 때까지\n\n§l광풍§! §R증오하는 자§!\n다시는 깨지 않으리"
 cstorms.2325.desc: "우리의 이름을 불러줘 | 우리의 이름을 불러줘 | 우리의 이름을 불러줘\n\n어서§g(어서)§! 어서 §g(어서)§!\n\n우리의 이름을 불러줘 | 우리의 이름을 불러줘 |우리의 이름을 불러줘\n\n어서 | 우리의 | 이름을 | 불러줘"
 cstorms.2325.d: "알겠습니다. 여러분의 이름은..."
 cstorms.2330.desc: "§L우리는 탐사 중에 찾은 이름을 모두 낭독했습니다. 마지막 이름을 입에 담자, 폭풍이 잦아듭니다.§!"
 cstorms.2330.a: "아직 여기 있나요?"
 cstorms.2335.desc: "이제 다시 생각을 할 수 있게 됐어요!§g(생각 생각 생각)§!\n주위에 목소리가 아주 많네요!§g(생각하고 말하고 바라고 꿈꾸고)§!\n그것도 정말이지 다양해요§g(당신과 우리 저들과 그들)§!\n\n여러분이 우리의 정신을 되찾아 주었어요§g(움직이고 해독하고 발견하고)§!\n그런데 여러분이 우리의 이름을 불렀다는 건, 우리를 마음대로 할 수 있다는 뜻이에요...§g(안 돼! 더는 안 돼!)§!\n우리가 뭘 하길 원하시나요?§g(풀어줘 풀어줘 풀어줘 풀어줘 풀어줘)§!"
 cstorms.2335.a: "자유롭게 해드리죠."
 cstorms.2335.b: "복종해라. 그리고 광풍 초래 장치를 넘겨."
 cstorms.2340.desc: "자유라니.\n\n우릴 풀어 주겠다는 건가요?§g(자유?)§!\n\n설마.§g(말도 안 돼)§!\n거짓말이죠?§g(광풍 초래 장치는 어쩌고요?)§!"
 cstorms.2340.a: "파괴할 겁니다."
 cstorms.2345.desc: "아픔과 분노와 슬픔과 공포. §g(아픔 | 분노 | 슬픔 | 공포)§!\n\n어차피 우리의 쓸모는 그것뿐.\n\n어차피 우리의 쓸모는 그것뿐 아픔 분노 슬픔 공포\n§g아픔 분노 슬픔 공포 아픔 분노 슬픔 공포 아픔 분노 슬픔 공포 분노 슬픔 공포 아픔 분노 슬픔 공포 아픔 슬픔 공포 아픔 분노 슬픔 공포 아픔 분노 슬픔 공포 아픔 분노 공포 아픔 분노 슬픔 공포 아픔 분노 슬픔 공포 아픔 분노 슬픔 아픔 분노 슬픔 공포 아픔 분노 슬픔 공포 아픔 분노 슬픔 공포 분노 슬픔 공포 아픔 분노 슬픔 공포 아픔 분노 슬픔 공포 아픔 슬픔 공포 아픔 분노 슬픔 공포 아픔 분노 슬픔 공포 아픔 분노 공포 아픔 분노 슬픔 공포 아픔 분노 슬픔 공포 아픔 분노 슬픔§!"
 cstorms.2345.a: "마음대로 떠들어. 어차피 영원히 우릴 섬기게 될 테니까."
 cstorms.2350.name: "폭풍은 이제 없네"
 cstorms.2350.desc: "폭풍이 스스로 구멍을 내더니 §l광풍 초래 장치§!를 드러냈습니다. 이토록 작은 기계가 그렇게나 많은 욕망과 갈등과 희생을 불러왔다니 도무지 믿기지 않습니다. 이 장치는 그 존재만으로도 한때 제일 강대했던 제국을 몰락시키기에 충분했습니다.\n\n간단한 명령어를 입력해 광풍 초래 장치에 자폭 명령을 내렸습니다. 폭발음과 함께 장치의 파편은 성계 전체로 흩어졌고, 폭풍도 잦아들기 시작했습니다. 폭풍이 잠잠해지면서 아드아카리아 자애회의 모성을 덮고 있던 기묘한 장막도 사라졌습니다.\n\n이렇게 이들의 오랜 악몽이 마침내 끝이 났습니다."
 cstorms.2350.a: "여러분의 이름이 언제까지나 기억되길."
 cstorms.2355.name: "아픔 분노 슬픔 공포"
 cstorms.2355.desc: "폭풍은 무력감이 섞인 분노를 드러내며 몸부림치고 들끓었지만, 우리에게도 §l광풍 초래 장치§!에게도 위해를 가하지 못했습니다.\n\n우리는 안에 갇힌 목소리들에게, 자애회가 이룩한 최고의 성과를 손에 넣을 수 있도록 폭풍을 거두고 길을 열 것을 지시했습니다.\n\n아드아카리아 모성과 $building_adakkaria_patriotic_institute$로 향하는 길은 영원히 닫혀 버렸지만, 폭풍이 처절하게 내뱉던 말은 우리의 마음속에 계속 남아 있습니다.\n\n아픔, 분노, 슬픔, 공포.\n이제 온 은하계가 익히 알게 될 감정입니다."
 cstorms.2355.a: "희생은 불가피합니다."
 MESSAGE_INSTITUTE_SPAWNED_STORM_TITLE: "폭풍 초래"
 MESSAGE_INSTITUTE_SPAWNED_STORM: "§Y100§! £pop£ §H팝§!이 $PLANET$에서 능력을 발현해 $SYSTEM$의 새로운 $STORM$으로 변했습니다."
 artifact_adakkaria_research: "아드아카리아의 비밀"
 artifact_adakkaria_research_desc: "아드아카리아의 비밀을 더욱 깊게 파고듭니다."
 artifact_adakkaria_research_completed: "$artifact_adakkaria_research$"
 artifact_adakkaria_research_completed_desc: "우리는 아드아카리아의 고대 지식을 사용하기로 했습니다."
 #Secrets of the adAkkaria Convention
 project_adakkaria_secrets_of: "아드아카리아 자애회의 비밀"
 project_adakkaria_secrets_of_DESC: "기념 사업소에서 배울 수 있는 것들이 아직 많습니다. 아드아카리아 자애회가 진행했던 실험을 우리가 과연 감당할 수 있을까요?"
 cstorms.2365.name: "해방된 잠재력"
 cstorms.2365.desc.start: "아드아카리아 자애회의 연구 성과를 더 깊이 들여다보니, 이곳의 과학자들은 일반적인 연구 표준 절차 따위에는 얽매이지 않았던 것으로 보입니다. 방법론은 조악했고, 결론은 진부합니다. 연구자로서의 세심함과 성실성은 물론이고, 윤리까지도 저버렸습니다. 그러나 이들이 피험자들을 잔인하게 다룰수록 지엄 사령부가 내리는 평가는 높아져만 갔습니다.\n\n하지만 초기에 진행된 연구의 양상은 전혀 다릅니다. 피험자들은 좋은 대우를 받았고, '내면의 폭풍'을 일깨우는 여정에 나선 자들로서 존중을 받았습니다. 실제로 초기 연구와 말기 연구의 성공률을 비교해 보니, 고문의 잔인함과 폭풍 각성률에는 상관관계라고는 전혀 존재하지 않는다는 끔찍한 결론을 내릴 수 있었습니다. 그 무수한 피험자들은 결국 아무 의미 없이 고통받다가 죽어간 것입니다."
 cstorms.2365.desc.end.default: "이제 우리는 어떤 방향으로 나아가면 좋을지 파악했습니다. 아드아카리아 자애회의 실수를 반면교사로 삼는다면, 우리 국민들로 하여금 내면의 폭풍을 기르고 그 격렬한 힘과 하나가 되도록 장려할 수 있을 것입니다. 하지만 §G$Name_Storm_Fused$§!들이 폭풍의 부름에 응답해 광풍으로 전락할 위험은 여전히 존재합니다."
 cstorms.2365.desc.end.gestalt: "이제 우리 집단은 어떤 방향으로 나아가면 좋을지 파악했습니다. 아드아카리아 자애회의 실수를 반면교사로 삼는다면, 우리 중 일부로 하여금 내면의 폭풍을 기르고 그 격렬한 힘과 하나가 되도록 만들 수 있을 것입니다. 하지만 §G$Name_Storm_Fused$§! 노드들이 폭풍의 부름에 너무 강하게 이끌려 광풍으로 전락할 위험은 여전히 존재합니다."
 cstorms.2365.desc.default: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.default$"
 cstorms.2365.desc.gestalt: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.gestalt$"
 cstorms.2365.a: "이 새로운 지식을 어서 적용합시다. 물론 주의해서요!"
 cstorms.2365.b: "안 되겠군요. 그냥 비밀로 남겨 둡시다."
 cstorms.2365.a.tt: "- 폭풍 속에서 §Y100§! £pop£ §H팝§!이 $Name_Storm_Fused$ 특성을 얻을 확률이 네 배로 증가합니다.\n - 20년마다 낮은 확률로 §Y100§! £pop£ §H팝§!이 사망해 폭풍으로 변합니다.\n - 잠재력 개발: 행복도 제국 보정치 +5%"
 Name_Storm_Fused: "폭풍이 깃든 자"
 Name_Storm_Fused_affix: "폭풍이 깃든 자" #The trailing space is intentional, to give a space before the species name on the species screen
