 cstorms.2010.b: "전자장을 절단하세요."
 cstorms.2010.b.tt: "$approach_situation_initiate_storm_sever_tt$\n월간 비용 $@sever_energy_upkeep|0$ $r_energy$, 월간 진행도 $@default_monthly_progress$"
 cstorms.2010.c: "이온을 자성화하세요."
 cstorms.2010.c.tt: "$approach_situation_initiate_storm_magnetize_tt$\n월간 비용 $@magnetize_mineral_upkeep|0$ $r_minerals$, 월간 진행도 $@default_monthly_progress$"
 cstorms.2010.d: "프로젝트를 종료하세요."
 cstorms.2015.name: "$cstorms.2010.name$"
 cstorms.2015.desc_one_tech_only: "§H[target.solar_system.GetName]§! 성계의 $default_storm$을 위한 준비 과정이 중요한 단계에 이르렀습니다. [storm_researcher.GetName]의 다음 작업은 [target.GetName]의 팽창 상태를 이용하는 것으로, 고도의 집중과 새로운 자원의 투입이 필요합니다."
 cstorms.2015.desc_others: "§H[target.solar_system.GetName]§! 성계의 $default_storm$을 위한 준비 과정이 중대한 전환점에 도달했습니다. [storm_researcher.GetName]의 다음 작업은 무척 중요하며, [target.GetName]의 팽창 상태를 제대로 이용하려면 자원을 더욱 집중해서 투입해야 합니다."
 cstorms.2015.a: "입자를 휘저으세요."
 cstorms.2015.a.tt: "$approach_situation_initiate_storm_agitate_tt$\n월간 비용 $@rare_resource_upkeep|0$ $r_volatile_motes$, 월간 진행도 $@default_monthly_progress$"
 cstorms.2015.b: "중력장을 불안정하게 만드세요."
 cstorms.2015.b.tt: "$approach_situation_initiate_storm_destabilize_tt$\n월간 비용 $@rare_resource_upkeep|0$ $r_dark_matter$, 월간 진행도 $@default_monthly_progress$"
 cstorms.2015.c: "우주 먼지를 섞으세요."
 cstorms.2015.c.tt: "$approach_situation_initiate_storm_scramble_tt$\n월간 비용 $@rare_resource_upkeep|0$ $r_rare_crystals$, 월간 진행도 $@default_monthly_progress$"
 cstorms.2015.d: "$cstorms.2010.d$"
 cstorms.storm_gathered.final_word: "$default_storm$의 힘을 활용하는 것은 쉬운 일이 아니었습니다. 드디어 오랫동안 기다려온 노력의 결실을 거둘 때가 왔습니다."
 cstorms.storm_gathered.a: "훌륭합니다."
 cstorms.2020.name: "폭풍 일으키기"
 cstorms.2020.desc: "§H[target.GetName]§!의 강화된 태양풍이 임계 질량에 도달했습니다.\n\n§Y$solar_storm$§!이 발생하기 직전입니다.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2025.name: "$cstorms.2020.name$"
 cstorms.2025.desc: "§H[target.GetName]§!의 전자장이 완전히 절단되었습니다.\n\n§Y$electric_storm$§!이 발생하기 직전입니다.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2030.name: "$cstorms.2020.name$"
 cstorms.2030.desc: "§H[target.GetName]§!의 이온을 자성화하는 데 성공했습니다.\n\n§Y$magnetic_storm$§!이 발생하기 직전입니다.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2035.name: "$cstorms.2020.name$"
 cstorms.2035.desc: "§H[target.GetName]§!의 포화 입자가 한계점에 도달했습니다.\n\n§Y$particle_storm$§!이 발생하기 직전입니다.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2040.name: "$cstorms.2020.name$"
 cstorms.2040.desc: "§H[target.GetName]§!의 중력장이 충분히 불안정해졌습니다.\n\n§Y$gravity_storm$§!이 발생하기 직전입니다.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2045.name: "$cstorms.2020.name$"
 cstorms.2045.desc: "§H[target.GetName]§!의 우주 먼지가 완전히 뒤섞였습니다.\n\n§Y$celestial_storm$§!이 발생하기 직전입니다.\n\n$cstorms.storm_gathered.final_word$"
 ### Aftermath Deposits ###
 d_magnetic_storm_1_minerals: "자성화된 광석"
 d_magnetic_storm_1_minerals_desc: "지나가는 우주 폭풍 덕분에 이전에는 개발되지 않았던 엄청난 양의 광물 매장지가 자성을 띠게 되어, 채굴 작업으로 매우 손쉽게 이 새로운 자원을 얻을 수 있게 되었습니다."
 d_magnetic_storm_2_alloys: "폭풍으로 벼려진 주조소"
 d_magnetic_storm_2_alloys_desc: "이 행성을 휩쓴 우주 폭풍이 지나가며, 상당수의 주조 장비가 기이하게 충전된 상태가 되었습니다. 비록 정확한 원리는 이해하지 못하지만, 합금 생산이 대폭 개선되었습니다."
 d_magnetic_storm_3_mix: "공중 고원"
 d_magnetic_storm_3_mix_desc: "지나가는 우주 폭풍의 중력 효과로 자성을 띠게 된 이 웅장한 땅덩어리는 공중에 떠 있어서 기존 산업 단지 위로 바로 이동할 수 있습니다."
 cstorms.8000.title: "우주적 변형"
 cstorms.8000.desc: "지나가는 우주 폭풍의 여파는 단순한 파괴에서 그치지 않았습니다. [Planet.GetName]에 완전히 새로운 지형이 만들어졌습니다."
 cstorms.8000.a: "놀랍군요."
 d_electric_storm_1_engineering: "번개 치는 폐허"
 d_electric_storm_1_engineering_desc: "지나가는 우주 폭풍의 엄청난 분노는 한때 번성했던 정착지를 번개 치는 폐허로 만들고, 평범한 건축 자재를 희귀하고 특이한 화합물로 바꾸어 놓았습니다."
 d_electric_storm_2_unity: "행성의 흉터"
 d_electric_storm_2_unity_desc: "지나가는 우주 폭풍이 행성의 일부를 매우 집중적으로 파괴하여 우주에서도 보이는 흉터를 남겼습니다."
 d_electric_storm_3_physics: "침묵의 함대"
 d_electric_storm_3_physics_desc: "지나가는 우주 폭풍이 수많은 민간 함선의 항로 시스템에 심각한 손상을 입혔습니다. 가장 큰 피해를 본 지역은 부서진 선체와 파손된 기계의 무덤이 되고 말았습니다."
 d_particle_storm_1_society: "폭풍으로 황폐해진 교외 지역"
 d_particle_storm_1_society_desc: "우주 폭풍으로 일부 교외 지역이 유적 연구에나 적합한 폐허로 변해 버렸습니다."
 d_particle_storm_2_unity: "끝판왕"
 d_particle_storm_2_unity_desc: "우주 폭풍이 이 행성에 거대한 크레이터를 남겼습니다. 마치 우리 존재에 대한 우주의 무정함을 적나라하게 보여 주는 듯합니다."
 d_particle_storm_3_motes: "불안정한 차원"
 d_particle_storm_3_motes_desc: "우주 폭풍으로 여러 방대한 차원이 지각 활동이 활발한 지역으로 바뀌었고, 공교롭게도 위험성이 증가하면서 불안정 분말도 증가했습니다."
 particle_storm_aftermath_1_tt: "로봇 조립 속도: §R-40%§!\n직업으로 인한 £minerals£ §Y광물§!: §R-10%§!\n팝으로 인한 £volatile_motes£ §Y불안정 분말§!: §G+0.02§!"
 particle_storm_aftermath_2_tt: "로봇 조립 속도: §R-50%§!\n직업으로 인한 £minerals£ §Y광물§!: §R-20%§!\n팝으로 인한 £volatile_motes£ §Y불안정 분말§!: §G+0.04§!"
 particle_storm_aftermath_3_tt: "로봇 조립 속도: §R-60%§!\n직업으로 인한 £minerals£ §Y광물§!: §R-30%§!\n팝으로 인한 £volatile_motes£ §Y불안정 분말§!: §G+0.06§!"
 d_solar_storm_1_energy: "분해된 오존층"
 d_solar_storm_1_energy_desc: "우주 폭풍이 이 행성 대기의 오존층에 구멍을 냈습니다. 이로 인하여 비록 삶의 질은 심각한 악영향을 받았지만, 생산의 질은 높아졌습니다."
 d_solar_storm_2_districts: "방사능 고원"
 d_solar_storm_2_districts_desc: "우주 폭풍이 이 행성의 고지대를 방사선으로 뒤덮는 바람에 에너지를 생산하기 좋은 절묘한 땅이 탄생했습니다."
 d_solar_storm_3_output: "빛나는 사막"
 d_solar_storm_3_output_desc: "우주 폭풍 이후 사막 전체가 환하게 빛나고 있습니다. 위험천만한 광경이지만, 적절한 안전 조치를 취한다면 수익성 있는 관광 명소로 거듭날 수 있을 것입니다."
 d_celestial_storm_1_mines: "크리스탈 가시"
 d_celestial_storm_1_mines_desc: "지나가는 우주 폭풍의 파괴적인 폭발로 들쭉날쭉하고 뾰족한 크리스탈이 행성에 박혀, 매우 위험하지만 돈이 될 만한 지형이 형성되었습니다."
 d_celestial_storm_2_society: "퇴적된 역사"
 d_celestial_storm_2_society_desc: "지나가는 우주 폭풍이 퇴적층 전체를 날려 버려, 지금까지 연구할 수 없었던 오랜 세월의 흔적이 드러났습니다."
 d_celestial_storm_3_crystal: "우주 먼지 언덕"
 d_celestial_storm_3_crystal_desc: "지나가는 우주 폭풍이 거대한 파도처럼 이 행성을 휩쓸고 지나갔습니다. 그 여파로 반짝이는 우주 먼지 언덕들이 생겨 환상적인 경관이 연출됐습니다."
 celestial_storm_aftermath_1_tt: "행성 범죄: §R+10%§!\n직업으로 인한 £food£ §Y식량§!: §R-10%§!\n팝으로 인한 £rare_crystals£ §Y희귀 크리스탈§!: §G+0.02§!"
 celestial_storm_aftermath_2_tt: "행성 범죄: §R+20%§!\n직업으로 인한 £food£ §Y식량§!: §R-20%§!\n팝으로 인한 £rare_crystals£ §Y희귀 크리스탈§!: §G+0.04§!"
 celestial_storm_aftermath_3_tt: "행성 범죄: §R+30%§!\n직업으로 인한 £food£ §Y식량§!: §R-30%§!\n팝으로 인한 £rare_crystals£ §Y희귀 크리스탈§!: §G+0.06§!"
 d_gravity_storm_1_districts: "압축된 평원"
 d_gravity_storm_1_districts_desc: "지나쳐 간 우주 폭풍의 압도적인 중력 작용으로 인해 건설 목적으로 사용하기에는 너무 불안정하다고 여겨졌던 여러 지역이 압축되었고, 사실상 공짜 땅을 얻게 되었습니다."
 d_gravity_storm_2_unity: "분쇄된 기념물"
 d_gravity_storm_2_unity_desc: "지나쳐 간 우주 폭풍이 특히나 취약했던 일부 기념물에 엄청난 압력을 가해 먼지로 만들어 버렸습니다. 새삼 저 밖에 도사리는 힘이 얼마나 무시무시한지 떠올리게 됩니다."
 d_gravity_storm_3_engineering: "중력 동굴"
 d_gravity_storm_3_engineering_desc: "지나쳐 간 우주 폭풍으로 인해 일부 채굴 단지가 무너져 내려, 극도로 압축된 물질로 이루어진 갱도가 되고 말았습니다. 채굴 재개를 시도하는 과정에서 공학 및 시추 분야에 새로운 이론이 등장했지만, 갱도 복구 자체는 거의 진전을 이루지 못했습니다."
 d_shroud_storm_1_society: "장막 기생충"
 d_shroud_storm_1_society_desc: "지나쳐 간 우주 폭풍이 가축에 기생충을 퍼뜨렸습니다. 현실과 장막 사이를 오가는 이 기생충은 먹을 수 있고 건강에도 좋으며 놀랍도록 맛있다는 사실이 밝혀졌습니다."
 d_shroud_storm_2_zro: "즈로 지대"
 d_shroud_storm_2_zro_desc: "지나쳐 간 우주 폭풍으로 인해 이 행성에서 가장 푸르렀던 생물 군계가 불안정하게 흔들리는 즈로 지대로 변해 버렸습니다. 무려 지금까지 발견했던 것 중에서 가장 순도가 높은 매장지입니다."
 d_shroud_storm_3_happy: "호수 속의 존재"
 d_shroud_storm_3_happy_desc: "지나쳐 간 우주 폭풍이 우리에게 기이하고 멋진 선물을 남겼습니다. 이 행성에서 가장 큰 호수가 잔물결을 일으키더니, 중요한 함의를 담은 듯한 패턴과 상징을 그리며 놀라운 지혜로 우리의 질문에 대해 답하기 시작했습니다."
 ### Shroud Storm Events
 shroud_switched: "장막에 가려지다"
 shroud_switched_tt: "이 천체에는 장막의 베일이 드리워져 있습니다. 이 부자연스러운 모습은 엄청난 균열이나 장막 폭풍이 발생했었다는 사실을 암시합니다."
 cstorms.8510.title: "사이오닉 교환"
 cstorms.8510.desc: "정신없는 사이오닉 활동 속에서 [from.GetName](이)가 정체불명의 [from.GetClassName](으)로 바뀌었습니다."
 cstorms.8510.a: "기이한 운명이군요."
 cstorms.8515.title: "대규모 변형"
 cstorms.8515.desc: "급증한 사이오닉 에너지가 [from.GetName](을)를 휩쓸고 지나가면서 인구 일부가 자연법칙을 거스르는 모습으로 변해 버렸습니다. 집단 전체가 재구축되어 이질적이고 낯선 형태가 되었는데, 마치 우리의 이해를 초월한 무언가가 이들의 본질을 고쳐 쓴 것만 같습니다."
 cstorms.8515.a: "소름 돋는 미지의 힘이군요..."
 cstorms.8520.title: "항성 변화"
 cstorms.8520.desc: "사이오닉 에너지의 급증으로 [from.GetName](이)가 재창조되어, 완전히 새로운 성질의 항성으로 변화했습니다. 이제 [from.GetClassName](은)는 마치 현실 자체가 변화해 버린 것처럼 [from.solar_system.GetName] 성계에 기이한 빛을 비춥니다."
 cstorms.8520.a: "항성조차도 벗어날 수 없는 힘이라니..."
 ### Building custom requirements
 storm_repellent_allow: "$TRIGGER_FAIL$§Y폭풍 유인§! 건물이 있는 성계에는 지을 수 없습니다"
 storm_attracting_allow: "$TRIGGER_FAIL$§Y폭풍 차단§! 건물이 있는 성계에는 지을 수 없습니다"
 TOO_IMPERIAL: "제국주의 세력이 있음"
 executive: "$job_executive$"
 noble: "$job_noble$"
 merchant: "$job_merchant$"
 head_researcher: "$job_head_researcher$"
 high_priest: "$job_high_priest$"
 technophant: "$job_technophant$"
 warden: "$job_warden$"
 noble_researcher: "$job_noble_researcher$"
 job_noble_researcher: "귀족 과학자"
 job_noble_researcher_plural: "귀족 과학자"
 job_noble_researcher_desc: "자손 중 가장 총명하고 고귀한 이들에게 예절과 과학적 방법론을 가르쳐, 자신들의 우월성을 더 잘 설명할 수 있게 합니다."
 sacred_noble: "$job_sacred_noble$"
 job_sacred_noble: "신성 귀족"
 job_sacred_noble_plural: "신성 귀족"
 job_sacred_noble_desc: "대물림을 통한 신성이야말로 옳은 길이며, 신성을 통한 대물림이야말로 옳은 방법입니다. 그렇게 우리는 고귀함의 축복을 받았습니다."
 augmentation_merchant: "$job_augmentation_merchant$"
 job_augmentation_merchant: "증강물 상인"
 job_augmentation_merchant_plural: "증강물 상인"
 job_augmentation_merchant_desc: "우리 자신을 개선할 수 있는 수단을 합리적인 가격에 보증 연장 혜택까지 제공하는 자들이야말로 우리 제국을 이끌 인재입니다."
 visionary: "$job_visionary$"
 job_visionary: "기술 선각자"
 job_visionary_plural: "기술 선각자"
 job_visionary_desc: "관습에 얽매이지 않으며 겸손함에 짓눌리지 않는 이 미래의 몽상가들은 대담한 상상력을 수익성 있는 현실로 바꾸어 놓습니다. 진정한 선각자에게 진보란 단순한 원칙이 아니라 하나의 상품입니다."
 noble_merchant: "$job_noble_merchant$"
 job_noble_merchant: "파트리키"
 job_noble_merchant_plural: "파트리키"
 job_noble_merchant_desc: "통치권은 가문이 아니라 개인의 가치에 따라 결정됩니다. 그리고 대차 대조표의 총합보다 개인의 가치를 더 잘 측정할 방법이 어디 있겠습니까?"
