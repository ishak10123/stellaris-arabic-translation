 TEMPEST_INVOCATOR_VIEW_BODY: "이 장치는 전원이 분명 꺼져 있음에도 불구하고, 눈에 보일 정도로 어마어마한 잠재력을 갖추고 있습니다. 이 힘을 감당할 용기만 있다면 폭풍 그 자체의 힘을 부릴 수 있습니다.\n\n$nexus_storm_color_tooltip$을 생성할 위치를 선택하십시오."
 #Tutorial Localisation
 cstorms_tutorial.a: "알겠습니다."
 cstorms_tutorial.1.name: "튜토리얼: 폭풍 조작"
 cstorms_tutorial.1.desc: "§Y$default_storm$§!의 §S경로§!를 우리에게 이익이 되는 방향으로 §S조작§!할 수 있습니다. 우리 성계에서 §S격퇴§!하는 것은 물론이고, 폭풍을 §S유인§!해 그 긍정적인 효과를 누릴 수도 있습니다."
 TUTORIAL_STORM_FORECAST_MAP_MODE_TITLE: "튜토리얼: 기상 예보"
 TUTORIAL_STORM_FORECAST_MAP_MODE_DESC: "이 지도 모드는 은하의 모든 §S우주 폭풍§!을 시각화하여 각각의 효과와 함께 표시합니다.\n\n£storm_forecast_map£\n\n기상 예보 지도 모드를 열려면 화면 우측 하단의 지도 아이콘을 클릭하세요.\n\n기술이 발전하면 지도를 업그레이드해 예측의 정확도를 높일 수 있습니다. 이를 통해 §S$default_storm$§!의 위치와 경로뿐만 아니라, 앞으로 발생할 폭풍의 유형까지도 예측할 수 있습니다."
 concept_weather_forecasting_mode: "기상 예보 모드"
 concept_weather_forecasting_mode_desc: "$TUTORIAL_STORM_FORECAST_MAP_MODE_DESC$"
 TUTORIAL_STORM_PROTECTION_TITLE: "튜토리얼: 우주 폭풍"
 TUTORIAL_STORM_PROTECTION_DESC: "§S우주 폭풍§!은 막강한 힘을 지닌 자연 현상으로, 제국의 함대와 경제, 심지어 국민들에게까지 막대한 피해를 줄 수 있습니다. 그러나 폭풍은 곧 엄청난 기회이기도 합니다.\n\n§S폭풍 기술§!을 연구하면 폭풍의 부정적 §S효과§!를 크게 §S줄이는§! 건물과 기술을 얻을 수 있습니다. 또한, §S추가 연구§!를 진행하면 폭풍이 가져다주는 §S이점§!을 누릴 수 있습니다."
