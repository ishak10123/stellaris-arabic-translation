 resolution_cosmic_storms_control_restrictions: "폭풍 조작 통제"
 resolution_cosmic_storms_control_restrictions_desc: "은하계는 유기적으로 연결된 거대한 생태계이며, 우주 폭풍은 그 안에서 핵심적인 역할을 수행합니다. 폭풍의 습성에 영향을 주는 행위는 법으로 금지해야 합니다."
