 #Ascension Perk
 ap_weather_control: "은하 기상 제어"
 ap_weather_control_desc: "최근에 이루어진 우주 기상학의 발전으로 인해, 지시를 내리는 것만으로도 우주 폭풍을 생성할 수 있게 되었습니다. 적절한 기술이 있다면 생성할 폭풍의 유형까지도 선택할 수 있습니다."
