 #Storm Visible Events
 MESSAGE_COSMIC_STORM_SPOTTED_DESC: "스캐너로 $TYPE|Y$ 유형의 우주 폭풍을 감지했습니다! 이 폭풍을 $NAME|Y$(이)라고 이름 붙였습니다.\n\n"
 MESSAGE_COSMIC_STORM_SPOTTED_EVENT_CONFIRM: "흥미롭군요."
 MESSAGE_STORM_INTRO: "이 폭풍은 식민지에 어마어마한 피해를 주는 것은 물론이고 함대의 긴급 초광속 도약 시행에도 장애를 일으킬 것입니다. 선제적 조치를 취할 것을 강력히 권고합니다.\n\n"
 MESSAGE_ELECTRIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$폭풍에 실려 온 극한의 전하가 우리 함대의 보호막 체계에 위험을 초래할 수 있습니다. 그러나 폭풍에 포함된 풍부한 에너지 덕분에 식민지의 생산량과 함선 속도가 대폭 증가할 것으로 예상됩니다."
 MESSAGE_SOLAR_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$이 폭풍의 방사선 때문에 내부에 갇힌 함대가 스캐너로 폭풍을 보는 모든 이에게 노출됩니다. 이에 따라 약간의 보안 위험이 발생할 수 있으나, 기지를 효율적으로 운영하기에 좋은 조건이 만들어졌습니다."
 MESSAGE_CELESTIAL_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$이런 유형의 폭풍은 감지기를 방해하여 이 성계 내의 다른 함대를 감지하지 못하게 하고 이동 속도를 늦춥니다. 그러나 이러한 위험성에도 우리는 이 상황을 유리하게 활용해, 폭풍이 지속되는 동안 특정 직업의 생산량을 늘릴 수 있습니다."
 MESSAGE_NEXUS_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$이런 유형의 폭풍은 식민지, 함대, 기지에 극심한 위험을 초래합니다. 폭풍이 지나갈 때까지 큰 피해를 받습니다."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$이 폭풍의 고농도 사이오닉 에너지는 식민지의 안정도를 대폭 감소시키지만, 함대 회피의 효율을 높이는 데 도움이 됩니다."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_SHROUD_BREACHED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$이 폭풍의 고농도 사이오닉 에너지는 식민지의 안정도를 대폭 감소시키지만, 장막을 다루는 우리의 지식을 활용한다면 함대와 텔레파시 능력자의 효율을 높이는 데 도움이 될 것입니다.\n\n장막이 요동칩니다... 만반의 준비를 갖춰야 합니다."
 MESSAGE_GRAVITY_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$이 폭풍의 강력한 중력 영향으로 함대 운영에 점진적인 어려움이 발생할 것이며, 특히 대형 함선이 가장 큰 위험에 처할 것입니다.\n\n그러나 이러한 문제에도, 우리 식민지는 그 극한의 환경을 유리하게 활용하여 특정 업무의 효율성을 높일 수 있습니다."
 MESSAGE_MAGNETIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$이 폭풍의 극심한 자력으로 인해 함대와 구조물 정비 체계가 혼란에 빠질 것입니다.\n\n그런데 폭풍의 자력이 우리의 첨단 야금 기술과 예상치 못한 시너지 효과를 일으켰습니다. 덕분에 이 은하적 사건이 지속되는 동안 우리 금속 공학자들과 관련된 비용이 감소합니다."
 MESSAGE_PARTICLE_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$이 폭풍에 들어 있는 고밀도의 입자 잔해는 함선과 기지에 파괴적인 영향을 끼쳐 보호막 재생을 완전히 무효화합니다. 내부에 머무를 만큼 용감한 함대가 있다면 매우 위험한 환경에 대비하는 것이 좋습니다."
