 utopia.3000.intro.desc:0 ".ﻥﻮﺒﻗﺍﺮﻣ ﻦﺤﻧ ،ﻥﻵﺍ ﻰﺘﺣ ...ﻥﻭﺎﻬﺘﻧ ﻥﺃ ﺎﻨﻟ ﻲﻐﺒﻨﻳ ﻻ .ﺔﻗﺎﻄﻟﺍ ﻦﻣ ﺓﺮﻴﺒﻛ ﺔﻴﻤﻛ ﻦﻋ ﻼﻀﻓ ،telepaths ﺎﻨﺒﻧﺎﺟ ﻦﻣ ﺍﺮﻴﺒﻛ ﺍﺪﻬﺟ ﺐﻠﻄﺘﺗ ﻑﻮﺳ ﻦﻔﻜﻟﺍ ﻲﻓ ﻖﻤﻋﺃ ﻞﻜﺸﺑ ﺓﺮﻣﺎﻐﻤﻟﺍ\n\n.ﻲﻘﻴﻘﺤﻟﺍ ﻢﻟﺎﻌﻟﺍ ﻪﻴﻤﺴﻧ ﺎﻣ ﻭﺃ - ﻲﻌﻴﺒﻄﻟﺍ ﺀﺎﻀﻔﻟﺍﻭ ﺎﻨﻫ ﻦﻴﺑ ﺪﺤﻟﺍ ﻞﺜﻤﻳ ﻱﺬﻟﺍ ﻂﺳﻮﻟﺍ ﻲﻓ ﻍﺭﺎﻔﻟﺍ ﻍﺍﺮﻔﻟﺍ ﻦﻋ ﺍﺪﻴﻌﺑ ﺲﻴﻟﻭ ،ﻢﻟﺎﻌﻟﺍ ﺍﺬﻫ ﺔﻓﺎﺣ ﻰﻠﻋ ﻥﻵﺍ ﻊﺒﻘﻧ ﻦﺤﻧ\n\n.ﺖﻗﻮﻟﺍ ﻚﻟﺫ ﻲﻓ ﻪﻓﺮﻌﻳ ﻢﻟ ﻪﻧﺃ ﻞﻤﺘﺤﻤﻟﺍ ﻦﻣ ﻪﻧﺃ ﻦﻣ ﻢﻏﺮﻟﺍ ﻰﻠﻋ ،ﻪﻣﻼﺣﺃ ﻲﻓ ﻥﺎﻜﻤﻟﺍ ﺍﺬﻫ ﻯﺃﺭ ﺪﻗ ﺔﻴﻨﻫﺫ ﺕﺍﺭﺪﻘﺑ ﻊﺘﻤﺘﻳ ﺺﺨﺷ ﻱﺃ ﻥﺃ ﺪﻛﺆﻤﻟﺍ ﻦﻣ .ﺭﻮﻔﻟﺍ ﻰﻠﻋ ﻑﻮﻟﺄﻣ ...ﺎﻀﻳﺃ ﻪﻨﻜﻟﻭ ،ﻕﺪﺼﻳ ﻻ ﻞﻜﺸﺑ ﻖﻠﻘﻣﻭ ﺐﻳﺮﻏ ﺮﻣﺃ ﻪﻧﺇ .ﻦﻔﻜﻟﺍ"
