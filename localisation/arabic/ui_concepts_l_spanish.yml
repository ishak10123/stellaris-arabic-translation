 concept_leaders_view_desc: ".ﺔﻣﺪﺨﻟﺍ ﻦﻣ ﻢﻫﺪﻋﺎﻘﺗ ﻭﺃ ،ﻦﻴﻴﻟﺎﺤﻟﺍ ﺓﺩﺎﻘﻟﺍ ﻦﻴﻴﻌﺗ ﺓﺩﺎﻋﺇ ﻭﺃ ،ﺩﺪﺟ ﺓﺩﺎﻗ ﻦﻴﻴﻌﺗ ﻦﻜﻤﻳ ،ﺔﻬﺟﺍﻮﻟﺍ ﻩﺬﻫ ﻝﻼﺧ ﻦﻣﻭ .ﺔﻴﻟﺎﺤﻟﺍ ﻡﺎﻬﻤﻟﺍﻭ ﺓﺮﺒﺨﻟﺍ ﺕﺎﻳﻮﺘﺴﻣﻭ ['concept_leader_traits']ﻭ ﻢﻫﺭﺍﻭﺩﺃ ﻚﻟﺫ ﻲﻓ ﺎﻤﺑ ،ﺔﻳﺭﻮﻃﺍﺮﺒﻣﻹﺍ ﻞﺧﺍﺩ ﻦﻴﻄﺸﻨﻟﺍ ['concept_leaders'] ﻊﻴﻤﺟ ﻰﻠﻋ ﺔﻣﺎﻋ ﺓﺮﻈﻧ §H$concept_leaders_view$§! £interface£ ﺮﻓﻮﻳ"

