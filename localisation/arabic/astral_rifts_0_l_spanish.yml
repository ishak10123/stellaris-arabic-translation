 astral_rift.535.answer.a: ".ﺄﻄﺨﻟﺍ ﻖﻳﺮﻃ ﻦﻋ ﻪﻴﻟﺇ ﺓﺭﺎﺷﻹﺍ ﻭﺃ ﻢﻜﺤﺘﻟﺍ ﺓﺪﺣﻭ ﻰﻠﻋ ﺭﺍﺬﻧﺇ ﻞﻛ ﻂﻴﺸﻨﺗ ﻢﺗ .ﺎﻨﺘﻨﻴﻔﺳ ﺕﺰﺘﻫﺍﻭ ،ﻲﺴﻴﻃﺎﻨﻐﻣﻭﺮﻬﻜﻟﺍ ﻉﺎﻌﺷﻹﺍ ﻦﻣ ﺔﻀﺒﻧ ﻚﻟﺫ ﺪﻌﺑ ﺕﺮﺠﻔﻧﺍ \n\n .ﺎﻨﻫﺎﺠﺗﺍ ﻲﻓ ﺓﺪﻳﺪﺷ ﺓﺭﺍﺮﺣ ﻪﻨﻣ ﺚﻌﺒﻨﻳﻭ ﺎﻧﻮﺤﻧ ﺀﻂﺒﺑ ﺭﻭﺪﻳ ،ﻢﺴﺠﻟﺍ ﻦﻣ ﻂﻘﻓ ﺪﺣﺍﻭ ﺐﻧﺎﺟ ﻰﻠﻋ ﺩﻮﺟﻮﻤﻟﺍ ،ﻥﺮﻔﻟﺍ ﺍﺬﻫ .ﻪﻌﻄﻗ ﻞﺧﺍﺩ ﻦﻣ ،ﺮﻴﻐﺻ ﻢﺠﻧ ﻞﺜﻣ ،ﺔﻳﺭﺎﻧ ﺓﺮﻛ ﺕﺮﻬﻇ\n\n .ﻝﺎﻋ ﻉﺭﺎﺴﺘﺑ ﻡﺎﻣﻸﻟ ﺎﻨﺒﺤﺳ ﻢﺗﻭ ،ﺮﻴﺒﻛ ﻞﻜﺸﺑ ﻪﺘﻴﺑﺫﺎﺟ ﺕﺩﺍﺯ .ﺔﻠﻫﺬﻣ ﺔﻋﺮﺴﺑ ﺭﻭﺪﺗﻭ ﺝﺭﺎﺨﻟﺍ ﻰﻟﺇ ﺎﻬﻌﻄﻗ ﺖﺒﺤﺴﻧﺍ ﺪﻘﻟ .ﺓﺄﺠﻓ ﻆﻘﻴﺘﺳﺍ ﺪﻗ ﻦﺋﺎﻜﻟﺍ"
 astral_rift.535.answer.b: "§E".ﺎﻨﻛﺮﺗﺍ .ﻥﺰﺣ"§! :ﻲﺋﺎﻨﺜﻟﺍ ﺰﻣﺮﻟﺎﺑ ﺔﺑﻮﺘﻜﻣ ،ﺔﻓﻭﺮﻌﻤﻟﺍ ﺎﻨﺗﺎﻐﻟ ﻦﻣ ﺪﻳﺪﻌﻟﺍ ﻲﻓ ﺓﺭﺎﺒﻌﻟﺍ ﻞﻴﺠﺴﺗ ﻢﺗ\n\n.ﻢﺟﺮﺘﻤﻟﺍ ﺀﺎﻨﺜﺘﺳﺎﺑ - ﺄﻄﺨﻟﺍ ﻖﻳﺮﻃ ﻦﻋ ﻪﻴﻟﺇ ﺓﺭﺎﺷﻹﺍ ﻢﺗ ﻭﺃ ،ﻢﻜﺤﺘﻟﺍ ﺓﺪﺣﻭ ﻰﻠﻋ ﺭﺍﺬﻧﺇ ﻞﻛ ﻂﻴﺸﻨﺗ ﻢﺗ .ﺎﻨﺘﻨﻴﻔﺳ ﺕﺰﺘﻫﺍﻭ ،ﻲﺴﻴﻃﺎﻨﻐﻣﻭﺮﻬﻜﻟﺍ ﻉﺎﻌﺷﻹﺍ ﻦﻣ ﺔﻀﺒﻧ ﻚﻟﺫ ﺪﻌﺑ ﺕﺮﺠﻔﻧﺍ \n\n .ﺎﻨﻫﺎﺠﺗﺍ ﻲﻓ ﺓﺪﻳﺪﺷ ﺓﺭﺍﺮﺣ ﻪﻨﻣ ﺚﻌﺒﻨﻳﻭ ﺎﻧﻮﺤﻧ ﺀﻂﺒﺑ ﺭﻭﺪﻳ ،ﻢﺴﺠﻟﺍ ﻦﻣ ﻂﻘﻓ ﺪﺣﺍﻭ ﺐﻧﺎﺟ ﻰﻠﻋ ﺩﻮﺟﻮﻤﻟﺍ ،ﻥﺮﻔﻟﺍ ﺍﺬﻫ .ﻪﻌﻄﻗ ﻞﺧﺍﺩ ﻦﻣ ،ﺮﻴﻐﺻ ﻢﺠﻧ ﻞﺜﻣ ،ﺔﻳﺭﺎﻧ ﺓﺮﻛ ﺕﺮﻬﻇ\n\n .ﻝﺎﻋ ﻉﺭﺎﺴﺘﺑ ﻡﺎﻣﻸﻟ ﺎﻨﺒﺤﺳ ﻢﺗﻭ ،ﺮﻴﺒﻛ ﻞﻜﺸﺑ ﻪﺘﻴﺑﺫﺎﺟ ﺕﺩﺍﺯ .ﺔﻠﻫﺬﻣ ﺔﻋﺮﺴﺑ ﺭﻭﺪﺗﻭ ﺝﺭﺎﺨﻟﺍ ﻰﻟﺇ ﺎﻬﻌﻄﻗ ﺖﺒﺤﺴﻧﺍ ﺪﻘﻟ .ﺓﺄﺠﻓ ﻆﻘﻴﺘﺳﺍ ﺪﻗ ﻦﺋﺎﻜﻟﺍ"
 astral_rift.535.answer.c: "§E".ﻥﻵﺍ .ﺭﺩﺎﻐﺗ ﺖﻧﺃ .ﺩﺍﺪﺣ ﺎﻧﺃ .ﻞﻣﺃ ﻻ"§! :ﻲﺋﺎﻨﺜﻟﺍ ﺰﻣﺮﻟﺎﺑ ﺔﺑﻮﺘﻜﻣ ،ﺔﻓﻭﺮﻌﻤﻟﺍ ﺎﻨﺗﺎﻐﻟ ﻦﻣ ﺪﻳﺪﻌﻟﺍ ﻲﻓ ﺓﺭﺎﺒﻌﻟﺍ ﻞﻴﺠﺴﺗ ﻢﺗ\n\n.ﻢﺟﺮﺘﻤﻟﺍ ﺀﺎﻨﺜﺘﺳﺎﺑ - ﺄﻄﺨﻟﺍ ﻖﻳﺮﻃ ﻦﻋ ﻪﻴﻟﺇ ﺓﺭﺎﺷﻹﺍ ﻢﺗ ﻭﺃ ،ﻢﻜﺤﺘﻟﺍ ﺓﺪﺣﻭ ﻰﻠﻋ ﺭﺍﺬﻧﺇ ﻞﻛ ﻂﻴﺸﻨﺗ ﻢﺗ .ﺎﻨﺘﻨﻴﻔﺳ ﺕﺰﺘﻫﺍﻭ ،ﻲﺴﻴﻃﺎﻨﻐﻣﻭﺮﻬﻜﻟﺍ ﻉﺎﻌﺷﻹﺍ ﻦﻣ ﺔﻀﺒﻧ ﻚﻟﺫ ﺪﻌﺑ ﺕﺮﺠﻔﻧﺍ \n\n .ﺎﻨﻫﺎﺠﺗﺍ ﻲﻓ ﺓﺪﻳﺪﺷ ﺓﺭﺍﺮﺣ ﻪﻨﻣ ﺚﻌﺒﻨﻳﻭ ﺎﻧﻮﺤﻧ ﺀﻂﺒﺑ ﺭﻭﺪﻳ ،ﻢﺴﺠﻟﺍ ﻦﻣ ﻂﻘﻓ ﺪﺣﺍﻭ ﺐﻧﺎﺟ ﻰﻠﻋ ﺩﻮﺟﻮﻤﻟﺍ ،ﻥﺮﻔﻟﺍ ﺍﺬﻫ .ﻪﻌﻄﻗ ﻞﺧﺍﺩ ﻦﻣ ،ﺮﻴﻐﺻ ﻢﺠﻧ ﻞﺜﻣ ،ﺔﻳﺭﺎﻧ ﺓﺮﻛ ﺕﺮﻬﻇ\n\n .ﻝﺎﻋ ﻉﺭﺎﺴﺘﺑ ﻡﺎﻣﻸﻟ ﺎﻨﺒﺤﺳ ﻢﺗﻭ ،ﺮﻴﺒﻛ ﻞﻜﺸﺑ ﻪﺘﻴﺑﺫﺎﺟ ﺕﺩﺍﺯ .ﺔﻠﻫﺬﻣ ﺔﻋﺮﺴﺑ ﺭﻭﺪﺗﻭ ﺝﺭﺎﺨﻟﺍ ﻰﻟﺇ ﺎﻬﻌﻄﻗ ﺖﺒﺤﺴﻧﺍ ﺪﻘﻟ .ﺓﺄﺠﻓ ﻆﻘﻴﺘﺳﺍ ﺪﻗ ﻦﺋﺎﻜﻟﺍ"
