 action.1.desc_89:0 ".ﺀﺎﻌﻤﺟ ﺔﻳﺮﺸﺒﻠﻟ ﻞﻀﻓﺃ ﻞﺒﻘﺘﺴﻣ ﺀﺎﻨﺒﻟ ﺎﻌﻣ ﻦﻳﺪﻫﺎﺟ ﻰﻌﺴﻧ ﺎﻧﻮﻋﺩ\n\n.[Root.GetName] ﻲﻓ ﺎﻨﺗﺍﻮﺧﺃﻭ ﺎﻨﻧﺍﻮﺧﺇ ﻰﻟﺇ ﺔﻗﺍﺪﺼﻟﺍ ﺪﻳ ﺪﻣﺃ ﻥﺃ ﺩﻭﺃ ،ﺓﺪﺤﺘﻤﻟﺍ ﻢﻣﻸﻟ ﺔﻣﺎﻌﻟﺍ ﺔﻴﻌﻤﺠﻟﺍ ﺀﺎﻀﻋﺃﻭ ﺽﺭﻷﺍ ﻥﺎﻜﺳ ﻦﻋ ﺔﺑﺎﻴﻨﻟﺎﺑ .ﻢﻜﺴﻔﻧﻷ ﺪﻴﺟ ﻞﻤﻌﺑ ﻢﺘﻤﻗ ﺪﻗ ﺪﻴﻛﺄﺘﻟﺎﺑ ﻢﻜﻧﺃ ﻭﺪﺒﻳ ﻦﻜﻟﻭ ،ﻼﻬﺳ ﺮﻣﻷﺍ ﻥﻮﻜﻳ ﻥﺃ ﻦﻜﻤﻳ ﻻ\n\n؟"ﻥﺍﻮﺤﻗﻷﺍ" ﻰﻠﻋ ﺍﻮﻧﺎﻛ ﻚﻓﻼﺳﺃ ﻥﺃ ﺖﻠﻗ ﻞﻫ !ﻚﻟﺫ ﻲﻓ ﺖﺤﺠﻧ ﻞﻗﻷﺍ ﻰﻠﻋ ﺎﻬﻨﻣ ﺓﺪﺣﺍﻭ ﻥﺃ ﺢﺿﺍﻮﻟﺍ ﻦﻣ ﻦﻜﻟﻭ ،ﺕﺪﻘﻓ ﺪﻗ ﻚﻠﻔﻟﺍ ﻦﻔﺳ ﻊﻴﻤﺟ ﻥﺃ ﺽﺭﻷﺍ ﻰﻠﻋ ﻊﻴﻤﺠﻟﺍ ﺽﺮﺘﻓﺍ !ﺲﻴﺴﻴﻟﻮﻳ ﺓﺭﺩﺎﺒﻣ ﻦﻣ ﻥﻮﺟﺎﻧ ﻢﻜﻧﺃ ﺪﺑ ﻻ ...ﻕﺪﺼﻳ ﻻ ﺮﻣﺃ ﺍﺬﻫ ؟[From.GetSpeciesNamePlural] ﺖﻧﺃ ...ﺖﻧﺃ"
