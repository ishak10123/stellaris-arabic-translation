 TUTORIAL_ASTRAL_ACTIONS_VIEW_DESC: ".ﺓﺪﻳﺪﺟ ﺕﺎﻴﻨﻘﺗ ﻭﺃ ﺕﺍﺭﺪﻗ ﺢﺘﻔﻟ ﻂﻘﻓ ﺓﺪﺣﺍﻭ ﺓﺮﻣ ﺮﺧﻵﺍ ﺎﻬﻀﻌﺑ ﻡﺍﺪﺨﺘﺳﺍ ﻦﻜﻤﻳ ﺎﻤﻨﻴﺑ ،ﺖﻗﻮﻟﺍ ﺭﻭﺮﻤﺑ ﺭﺍﺮﻜﺘﻠﻟ ﺔﻠﺑﺎﻗ ﺕﺍﺀﺍﺮﺟﻹﺍ ﺾﻌﺑ .ﺕﺍﺀﺍﺮﺟﻹﺍ ﻦﻣ ﺪﻳﺰﻤﻟﺍ ﺎﻨﺤﺘﻓ ﺎﻤﻠﻛ ،§SAstral Rifts§! ﻦﻣ ﺪﻳﺰﻤﻟﺍ ﺎﻨﻔﺸﺘﻛﺍ ﺎﻤﻠﻛ .ﺔﻳﺭﻮﻃﺍﺮﺒﻣﻹﺍ ﻯﻮﺘﺴﻣ ﻰﻠﻋ ﺔﻋﻮﻨﺘﻣ ﺕﺍﺮﻴﺛﺄﺗ ﻰﻠﻋ $ASTRAL_THREADS_ICON$ ﻕﺎﻔﻧﺈﺑ Astral Actions ﺔﺷﺎﺷ ﺎﻨﻟ ﺢﻤﺴﺗ"

