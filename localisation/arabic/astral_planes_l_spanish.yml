 TUTORIAL_ASTRAL_RIFT_VIEW_DESC: ".ﺔﺧﻮﺨﻴﺸﻟﺍ ﺐﺒﺴﺑ ﺍﻮﺗﻮﻤﻳ ﻥﺃ ﻦﻜﻤﻳ ﻻ ،ﺔﻘﻳﺮﻄﻟﺍ ﻩﺬﻬﺑ ﻥﺎﻜﻤﻟﺍﻭ ﻥﺎﻣﺰﻟﺍ ﻦﻴﺑ ﻢﻬﻋﻮﻗﻮﻟ ﺔﺠﻴﺘﻧﻭ .ﻑﺎﺸﻜﺘﺳﻻﺍ ﻞﻤﺘﻜﻳ ﻰﺘﺣ ﻢﻬﺘﻟﺍﺯﺇ ﻦﻜﻤﻳ ﻻﻭ ﺮﺧﺁ ﺪﻌﺒﺑ ﻦﻳﺪﻴﻘﻣ ﺀﺎﻤﻠﻌﻟﺍ ﻥﻮﻜﻳ ،§SAstral Rift§! ﻑﺎﺸﻜﺘﺳﺍ ﺀﺎﻨﺛﺃ\n\n.ﻕﺍﺮﺘﺧﺍ ﺙﻭﺪﺣ ﺔﻴﻟﺎﻤﺘﺣﺍ ﻦﻣ ﺪﻳﺰﻳ ﺎﻤﻣ §SClues§! ﻊﻤﺠﻴﺳ ﺔﻴﻓﺎﻛ ﺓﺮﺘﻔﻟ ﻉﺪﺼﻟﺍ ﻲﻓ ﺚﺤﺒﻳ ﻢﻟﺎﻋ ﻱﺃ .ﺎﻬﺌﻄﺒﻴﺳ ﺭﺎﺴﻤﻟﺍ ﺭﺎﻴﺘﺧﻻ ﻰﻠﻋﻷﺍ ﺔﺑﻮﻌﺼﻟﺍ ﻒﻴﻨﺼﺗ ﻥﺃ ﻦﻴﺣ ﻲﻓ ،ﺔﻴﻟﺎﺘﻟﺍ ﺔﻠﺣﺮﻤﻟﺍ ﻰﻟﺇ ﻡﺪﻘﺘﻟﺍ ﺔﻴﻠﻤﻋ ﻊﻳﺮﺴﺗ ﻰﻠﻋ ﻰﻠﻋﻷﺍ §SSkill ﺓﺭﺎﻬﻣﻭ ﺔﻠﺼﻟﺍ ﺕﺍﺫ §! ﺕﺎﻤﺴﺑ ﻥﻮﻌﺘﻤﺘﻳ ﻦﻳﺬﻟﺍ ﺀﺎﻤﻠﻌﻟﺍ ﻞﻤﻌﻳ .ﻉﺪﺼﻟﺍ ﻞﺣﺍﺮﻣ ﻦﻣ ﺔﻠﺣﺮﻣ ﻞﻛ ﻝﻼﺧ ﻡﺪﻘﺘﻠﻟ §Sﻕﺍﺮﺘﺧﺍ§! ﺀﺍﺮﺟﺇ ﻢﻟﺎﻌﻟﺍ ﻰﻠﻋ ﺐﺠﻳ ،ﻲﻤﺠﻨﻟﺍ ﻉﺪﺼﻟﺍ ﺭﺍﺮﺳﺃ ﻒﺸﻜﻟ\n\n.ﺎﻬﻋﺎﺒﺗﺍ ﺐﺠﻳ ﺓﺩﺪﻌﺘﻣ ﺕﺍﺭﺎﺴﻣ ﻰﻠﻋ Astral Rifts ﺪﻌﺑ ﺎﻣ ﻰﻟﺇ ﺔﻴﻓﺎﺸﻜﺘﺳﻻﺍ ﺕﻼﺣﺮﻟﺍ ﻢﻈﻌﻣ ﻱﻮﺘﺤﺗ .ﻥﺎﻴﺣﻷﺍ ﺾﻌﺑ ﻲﻓ ﺔﻌﻗﻮﺘﻣ ﺮﻴﻏﻭ ﺔﻔﻠﺘﺨﻣ ﺞﺋﺎﺘﻧ ﻰﻟﺇ ﻱﺩﺆﺗ ﺎﻨﺋﺎﻤﻠﻌﻟ ﺮﻣﺍﻭﺃ ﺭﺍﺪﺻﺇ ﻚﻨﻣ ﺐﻠﻄﻳ ﺪﻗ ،ﻡﺪﻘﺘﻟﺍ ﻞﺣﺍﺮﻣ ﻦﻣ ﺔﻠﺣﺮﻣ ﻞﻛ ﻲﻓ .ﺎﻴﻟﺎﺣ ﺓﺩﺪﺤﻤﻟﺍ §SAstral Rift§! ﻞﻴﺻﺎﻔﺗ Astral Rift ﺓﺬﻓﺎﻧ ﺽﺮﻌﺗ"

