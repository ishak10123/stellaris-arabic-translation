 #war_goal_wg_conquest_desc: "Wage war to seize enemy systems that we have claims on."
 war_goal_wg_conquest_desc:1 ".ﻪﻟﻼﺘﺣﺍ ﻢﺗ ﻡﺎﻈﻧ ﻞﻜﻟ §YThreat§! ﻦﻣ ﻞﻗﺃ §!%XYZT_025 ﺪﻴﻟﻮﺗ ﻰﻟﺇ ﺕﺎﺒﻟﺎﻄﻤﻟﺍ ﻲﻘﻠﺘﻟ ﻲﺑﺮﺤﻟﺍ ﻑﺪﻬﻟﺍ ﺍﺬﻫ ﻡﺍﺪﺨﺘﺳﺍ ﻱﺩﺆﻳ .ﺔﻣﻮﻋﺰﻤﻟﺍ ﻭﺪﻌﻟﺍ ﺔﻤﻈﻧﺃ ﻰﻠﻋ ﺀﻼﻴﺘﺳﻼﻟ ﺏﺮﺤﻟﺍ ﻦﺷ ﻢﺘﻳ"
