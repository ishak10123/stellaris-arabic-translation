 #war_goal_wg_subjugation_desc: "Wage war to subjugate the enemy as a Vassal."
 war_goal_wg_subjugation_desc:2 ".ﺎﻨﺑ ﺔﺻﺎﺨﻟﺍ §Y$policy_subjugation_war_terms$§! ﺔﺳﺎﻴﺳ ﻝﻼﺧ ﻦﻣ ﻊﺑﺎﺘﻠﻟ ﺔﻴﻟﻭﻷﺍ ﺔﻴﻗﺎﻔﺗﻻﺍ ﻁﻭﺮﺷ ﺪﻳﺪﺤﺗ ﻢﺘﻳ\n\n.ﻞﻗﻷﺍ ﻰﻠﻋ ﺍﺪﺣﺍﻭ ﺎﺒﻛﻮﻛ ﻦﻤﻀﺘﺗ ﺖﻧﺎﻛ ﺍﺫﺇ ﺓﺪﻳﺪﺟ ﺔﻌﺑﺎﺗ ﺎﻫﺭﺎﺒﺘﻋﺎﺑ ﺎﻬﻠﺘﺤﻧ ﻲﺘﻟﺍ ﺔﻤﻈﻧﻷﺍ ﻕﻼﻃﺇ ﻢﺘﻴﺳ ،ﻦﻫﺍﺮﻟﺍ ﻊﺿﻮﻟﺍ ﻡﻼﺳ ﺔﻟﺎﺣ ﻲﻓ\n\n.ﺎﻌﺑﺎﺗ ﻩﺭﺎﺒﺘﻋﺎﺑ ﻭﺪﻌﻟﺍ ﻉﺎﻀﺧﻹ ﺏﺮﺤﻟﺍ ﻦﺷ ﻢﺘﻳ"
