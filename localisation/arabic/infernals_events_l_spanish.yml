infernals.2510.desc.a: "$infernals.2510.outro$\n\n.ﻢﻬﻨﻣ ﺔﺑﺎﺟﻹﺍ ﻰﻟﺇ ﺏﺮﻗﺃ ﺎﻨﻧﺃ ﻲﻋﺪﻧ ﻥﺃ ﺎﻨﻨﻜﻤﻳ ﻻ ،ﺪﻳﺍﺰﺘﻣ ﻞﻜﺸﺑ ﺭﻮﻄﺘﻤﻟﺍ ﻊﻤﺘﺠﻤﻟﺍﻭ ﺦﻳﺭﺎﺘﻟﺍ ﻦﻣ ﻥﻭﺮﻗ ﻦﻣ ﻢﻏﺮﻟﺍ ﻰﻠﻋ\n\n؟ﺖﻧﺃ ﻦﻣ :ﻥﻵﺍ ﻪﻴﻓ ﺮﻜﻔﻧ ﻱﺬﻟﺍ ﻝﺍﺆﺴﻟﺍ ﺲﻔﻧ ﺎﺜﻳﺪﺣ ﻦﻴﻈﻘﻴﺘﺴﻤﻟﺍ ﺎﻨﺑﺭﺎﻗﺃ ﺾﻌﺑ ﺡﺮﻃ ﺪﻘﻟ\n\n$infernals.2510.intro$"
infernals.2510.desc.b: "$infernals.2510.outro$\n\n.ﺦﻳﺭﺎﺘﻟﺍ ﺮﺒﻋ ﺎﻧﺭﺎﺴﻣ ﻢﺳﺭ ﻰﻟﺇ ﻥﻭﺮﻄﻀﻣ ﺎﻨﻧﺈﻓ ،ﺕﺎﺑﺎﺟﻹﺍ ﺏﺎﻴﻏ ﻲﻓ .ﻦﻳﺮﺧﻵﺍ ﻊﻣ ﻝﺎﺤﻟﺍ ﻮﻫ ﺎﻤﻛ ،ﺎﻨﻟﻮﺻﺄﺑ ﺔﻠﺼﻟﺍ ﺕﺍﺫ ﺕﺎﻳﺮﻛﺬﻟﺍ ﻰﻟﺇ ﻥﻭﺮﻘﺘﻔﻳ ﺍﻮﻟﺍﺯ ﺎﻣ ،ﻦﻴﻤﺋﺎﻨﻟﺍ ﺏﺭﺎﻗﻷﺍ ﺀﻻﺆﻫ ﻅﺎﻘﻴﺘﺳﺍ ﺩﺮﺠﻤﺑ\n\n$infernals.2510.intro$"
