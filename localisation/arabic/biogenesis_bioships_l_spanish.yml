 cybernetics_01_shipset_desc: ".ﻥﺎﺘﻛﻭﻷﺍ ﺔﻴﻟﺎﻋﻭ ﺔﻴﻘﻧ ﺔﻗﺩ ﻂﻘﻓ - ﺩﻭﺪﺣ ﻭﺃ ﺮﻴﺧﺄﺗ ﻱﺃ ﺩﻮﺟﻭ ﻡﺪﻋ ﻲﻨﻌﺗ ﺓﺮﺷﺎﺒﻤﻟﺍ ﺔﻴﺒﺼﻌﻟﺍ ﺕﻼﺻﻮﻟﺍ .ﻲﺿﺎﻤﻟﺍ ﻦﻣ ﯫﻴﺷ ﻞﻌﻔﻟﺍ ﺩﻭﺩﺭﻭ ﺮﺋﺍﻭﺪﻟﺍ ﺮﺋﺍﻭﺩﻭ ﻡﻭﺮﻜﻟﺍ ﺾﻴﻣﻭ ﺢﺒﺻﺃ"

