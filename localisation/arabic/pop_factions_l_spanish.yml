 pft_progressive:0 "ﻲﻣﺪﻘﺘﻟﺍ ﻞﻴﺼﻔﻟﺍ"
 pft_progressive_desc:2 "§Lﺓﺍﻭﺎﺴﻤﻟﺍ ﻕﻼﺧﺃ§!\n\n.ﻯﺮﺧﻷﺍ ﺕﺎﻳﺭﻮﻃﺍﺮﺒﻣﻹﺍ ﻊﻣ ﻱﻭﺎﺴﺘﻤﻟﺍ ﻥﻭﺎﻌﺘﻟﺍ ﻥﻭﺭﺪﻘﻳﻭ ،ﺔﻴﻠﻴﺜﻤﺘﻟﺍ ﺮﻴﻏ ﻢﻜﺤﻟﺍ ﻝﺎﻜﺷﺃ ﻥﻮﺿﺭﺎﻌﻳ ﻢﻬﻧﺇ .ﺔﻤﺋﺎﻘﻟﺍ ﺔﻴﻋﺎﻤﺘﺟﻻﺍ ﻞﻛﺎﻴﻬﻟﺍ ﻞﺧﺍﺩ ﺓﺍﻭﺎﺴﻤﻟﺍ ﻞﺟﺃ ﻦﻣ ﺔﻠﻤﺤﺑ ﺔﻴﻣﺪﻘﺘﻟﺍ ﻞﺋﺎﺼﻔﻟﺍ ﻡﻮﻘﺗ"
 pft_imperialist:0 "ﻲﻟﺎﻳﺮﺒﻣﻹﺍ ﻞﻴﺼﻔﻟﺍ"
 pft_imperialist_desc:2 "§Lﺔﻳﺮﻜﺴﻌﻟﺍﻭ ﺔﻳﺩﺍﺪﺒﺘﺳﻻﺍ ﻕﻼﺧﻷﺍ§!\n\n.ﻦﻳﺮﺧﻵﺍ ﻰﻠﻋ ﺩﺎﻤﺘﻋﻻﺍ ﻥﻮﻫﺮﻜﻳﻭ ،ﻯﺮﺧﻷﺍ ﺕﺎﻳﺭﻮﻃﺍﺮﺒﻣﻹﺍ ﺮﻬﻗﻭ ﺕﺎﺴﻓﺎﻨﻤﻟﺍ ﻝﻼﺧ ﻦﻣ ﻥﻭﺮﻫﺩﺰﻳ ﻢﻬﻧﺇ .ﻯﺮﺧﻷﺍ ﺕﺎﻳﺭﻮﻃﺍﺮﺒﻣﻹﺍ ﻰﻠﻋﻭ ،ﺎﻧﺩﻭﺪﺣ ﻞﺧﺍﺩ ﺔﻨﻤﻴﻬﻟﺍ ﻰﻟﺇ ﺔﻴﻟﺎﻳﺮﺒﻣﻹﺍ ﻞﺋﺎﺼﻔﻟﺍ ﻕﻮﺘﺗ"
 pft_isolationist:0 "ﻲﻟﺍﺰﻌﻧﻻﺍ ﻞﻴﺼﻔﻟﺍ"
 pft_isolationist_desc:3 "§Lﻡﻼﺴﻟﺍ ﺕﺎﻴﻗﻼﺧﺃﻭ ﺐﻧﺎﺟﻷﺍ ﺏﺎﻫﺭ§!\n\n.ﻼﻬﺳ ﺎﻓﺪﻫ ﺢﺒﺼﻧ ﻥﺃ ﺏﺎﺴﺣ ﻰﻠﻋ ﺲﻴﻟ ﻦﻜﻟﻭ - ﺔﻴﻧﺍﻭﺪﻌﻟﺍ ﺏﻭﺮﺤﻟﺍ ﺐﻨﺠﺗﻭ ،ﻰﻧﺩﻷﺍ ﺪﺤﻟﺍ ﺪﻨﻋ ﻯﺮﺧﻷﺍ ﺕﺎﻳﺭﻮﻃﺍﺮﺒﻣﻹﺍ ﻊﻣ ﺭﺍﻮﺤﻟﺍ ﻰﻠﻋ ﻅﺎﻔﺤﻠﻟ ﺕﻼﻤﺤﺑ ﻥﻮﻣﻮﻘﻳ ﻢﻬﻧﺇ .ﺔﻴﻠﺧﺍﺪﻟﺍ ﺎﻨﻧﻭﺆﺷ ﺝﺭﺎﺧ ﻊﺳﻭﻷﺍ ﺓﺮﺠﻤﻟﺍ ﺀﺎﻘﺑﺇ ﺔﻴﻟﺍﺰﻌﻧﻻﺍ ﻞﺋﺎﺼﻔﻟﺍ ﻞﻀﻔﺗ"
