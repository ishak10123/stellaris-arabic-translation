 action.1.desc_102: ".ﺮﻳﻮﻨﺘﻟﺍ ﻰﻟﺇ ﻰﻌﺴﺗ ﻲﺘﻟﺍ ﺱﻮﻔﻨﻟﺍ ﻦﻋ ﺎﺜﺤﺑ ﻯﺮﺧﻷﺍ ﻢﻣﻷﺍ ﻮﺤﻧ ﺎﻨﻫﺎﺒﺘﻧﺍ ﻝﻮﺤﻧ ﻑﻮﺴﻓ ،ﻑﺩﺎﻬﻟﺍ ﻞﻋﺎﻔﺘﻟﺍ ﻲﻓ ﻞﻣﺃ ﻱﺃ ﻞﻤﺤﻳ ﻻ ﻢﻛﺩﻮﺟﻭ ﻥﺃ ﺎﻤﺑﻭ .ﺪﻳﺪﺸﻟﺍ ﻒﺳﻷﺍ ﻊﻣ ﻝﺎﺳﺭﻹﺍ ﺍﺬﻬﺑ ﻡﻮﻘﻧ ﺎﻨﻧﺈﻓ ،ﺔﻴﻋﺍﺪﺑﻹﺍ ﺎﻧﺩﻮﻬﺟ ﻦﻣ ﻞﻠﻘﺗ ﺔﻘﻳﺮﻄﺑ ﺓﺎﻴﺤﻟﺍ ﻲﻛﺎﺤﺗ ﺔﻴﻜﻴﻧﺎﻜﻴﻣ ﺕﺎﻨﺋﺎﻛ ﻦﻣ ﻥﻮﻜﺘﺗ ﻢﻜﺗﺭﺎﻀﺣ ﻥﺃ ﺎﻨﻓﺎﺸﺘﻛﺍ ﺪﻨﻋ\n\n.[contact_empire.GetName] ﻦﻣ ﺔﻟﺎﺳﺭ ﻩﺬﻫ"
 action.1.desc_103: "ﻚﺒﻗﺍﺮﻧ ﻑﻮﺳ .ﺔﻴﻧﺪﻌﻤﻟﺍ ﻙﺭﻮﺸﻗ ﺩﻭﺪﺣ ﻞﺧﺍﺩ ﺓﺩﻮﺟﻮﻣ ﻥﻮﻜﺗ ﺪﻗ ﺔﻴﻬﻟﺇ ﺓﺭﺍﺮﺷ ﻥﺄﺑ ﺩﺎﻘﺘﻋﻻﺍ ﻰﻠﻋ ﺅﺮﺠﻧ ﻦﺤﻧ .ﻡﺎﻤﺘﻫﻼﻟ ﺍﺮﻴﺜﻣ ﻚﻧﺎﻤﻳﺇ ﺪﺠﻧ ،ﻚﻟﺫ ﻊﻣﻭ .ﻚﻴﻋﻭ ﺔﺤﺻ ﻝﻮﺣ ﻙﻮﻜﺸﻟﺍ ﺮﻴﺜﺗ ﻲﻜﻴﻧﺎﻜﻴﻣ ﻚﻋﻮﻧ ﻥﺄﺑ ﺔﻓﺮﻌﻤﻟﺍ ﻥﺇ\n\n.[contact_empire.GetName] ﻮﻠﺜﻤﻣ ﻦﺤﻧ ،ﻲﺗﺎﻴﺤﺗ"
