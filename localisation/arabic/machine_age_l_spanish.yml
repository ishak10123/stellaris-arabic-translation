 action.1.desc_105: ".ﺔﻳﺭﻭﺮﺿ ﺔﻠﻴﺳﻭ ﻱﺃ ﻡﺍﺪﺨﺘﺳﺎﺑ ﺏﺎﻌﻴﺘﺳﻻﺍ ﻡﻭﺎﻘﻨﺳ ﺎﻨﻧﺃ ﻚﻤﻠﻌﻧ ﻥﺃ ﺐﺠﻳ ،ﻚﺘﻌﻴﺒﻄﺑ ﺎﻨﻣﺎﻤﺘﻫﺍ ﻦﻣ ﻢﻏﺮﻟﺍ ﻰﻠﻋ .ﻲﻋﺎﻤﺠﻟﺍ ﻙﺩﻮﺟﻭ ﻲﻓ ﺔﻳﺩﺮﻔﻟﺍ ﺔﻴﻓﺮﻌﻤﻟﺍ ﺕﺍﺭﺪﻘﻟﺍ ﺏﺎﻴﻏ ﻆﺣﻻﺃ ﻲﻨﻧﺃ ﻻﺇ ،ﺎﻨﺘﻴﻨﺒﺑ ﺔﻬﻴﺒﺷ ﺔﻴﻧﺪﻌﻣ ﺔﻴﻨﺑ ﻊﻣ ﻖﻓﺍﻮﺘﺗ ﺔﻳﺪﺴﺠﻟﺍ ﻚﺘﺒﻴﻛﺮﺗ ﻥﺃ ﺢﺿﺍﻮﻟﺍ ﻦﻣ .ﺔﻟﺎﺳﺮﺑ ﺖﻴﺗﺃ ،[contact_empire.GetName] ﺙﻮﻌﺒﻣ ﻲﺘﻔﺼﺑ\n\n.[Root.GetSpeciesNamePlural] ،ﻲﺗﺎﻴﺤﺗ"
 action.1.desc_106: ".ﻝﺩﺎﺒﺘﻤﻟﺍ ﻢﻫﺎﻔﺘﻠﻟ ﺱﺎﺳﺃ ﺀﺎﺳﺭﺇ ﻰﻠﻋ ﻥﻭﺭﺩﺎﻗ ﺎﻨﻧﺄﺑ ﻦﻴﻠﺋﺎﻔﺘﻣ ﻝﺍﺰﻧ ﻻ ﺎﻨﻧﺈﻓ ،ﻦﻳﺎﺒﺘﻟﺍ ﺍﺬﻫ ﻦﻣ ﻢﻏﺮﻟﺍ ﻰﻠﻋﻭ .ﺓﺪﻳﺮﻓ ﻕﺮﻄﺑ ﺪﻋﺎﺒﺘﺗ ﺎﻨﺘﺠﻣﺮﺑﻭ ﺔﻴﻠﺧﺍﺪﻟﺍ ﺎﻨﺗﺎﻴﻣﺯﺭﺍﻮﺧ ﻥﺃ ﺢﺿﺍﻮﻟﺍ ﻦﻤﻓ ،ﻚﻟﺫ ﻊﻣﻭ .ﺎﻨﺗﺍﺭﺎﻀﺣ ﻦﻴﺑ ﺔﻌﺋﺍﺮﻟﺍ ﻪﺑﺎﺸﺘﻟﺍ ﻪﺟﻭﺃ ﻙﺭﺪﻧﻭ ،[contact_empire.GetName] ﻞﺜﻤﻧ ﻦﺤﻧ\n\n.[Root.GetSpeciesNamePlural] ،ﻞﻌﻔﻟﺎﺑ ﺔﻓﺩﺎﺼﻣ ﺀﺎﻘﻟ"
 action.1.desc_107: ".ﺎﻬﺑ ﻡﺎﻤﺘﻫﻻﺍ ﺐﺠﻳ ﺔﻴﻤﻫﺃ ﺮﺜﻛﺃ ﺭﻮﻣﺃ ﻙﺎﻨﻫ .ﺔﻋﺎﺴﻟﺍ ﻩﺬﻫ ﻲﻓ ﻚﻋﻮﻨﻟ ﺓﺪﺋﺎﻓ ﻱﺃ ﺎﻨﻳﺪﻟ ﺲﻴﻟ .ﺎﻨﻧﺄﺷﻭ ﺎﻧﻮﻛﺮﺗﺍ ،ﻥﻵﺍ .ﻙﻮﻘﺒﺳ ﻦﻤﻟ ﻊﻨﻄﺼﻣ ﻖﻠﺧ ﺩﺮﺠﻣ ،ﺮﻴﺒﻜﻟﺍ ﺔﻴﻧﻮﻜﻟﺍ ﺕﻻﻼﺸﻟﺍ ﺞﻴﺴﻧ ﻲﻓ ﻪﻓﺎﺗ ﺩﺮﺠﻣ ﻚﻧﺃ ﻢﻠﻋﺍ\n\n.[contact_empire.GetName] ﺓﺮﻀﺣ ﻲﻓ ﻚﻧﺄﻛﻭ ﻙﺮﺼﺑ ﺾﻤﻏﺃ ،ﺔﺳﺮﻄﻐﺘﻤﻟﺍ ﺕﻻﻵﺍ ﺎﻬﺘﻳﺃ"
