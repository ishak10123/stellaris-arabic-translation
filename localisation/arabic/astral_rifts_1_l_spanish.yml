 astral_rift.1010.desc.common.2: ".ﺎﻨﻫ ﺎﻨﺑ ﺐﺣﺮﻣ ﺎﻨﻧﺃ ﺢﺿﺍﻮﻟﺍ ﻦﻣ ﺲﻴﻟ\n\n.ﻩﺎﻘﻠﺘﻧ ﺎﻣ ﻢﻬﻔﻟ ﻲﺑﺎﺴﺤﻟﺍ ﻢﻋﺪﻟﺍ ﺾﻌﺑ ﻰﻟﺇ ﺝﺎﺘﺤﻨﺳ .ﺎﺒﻌﺻ ﻞﻘﻨﺘﻟﺍ ﻞﻌﺠﻳ ﺎﻤﻣ ،ﺕﺎﻣﻮﻠﻌﻤﻟﺎﺑ ﺔﻠﻘﺜﻣ ﺎﻨﻳﺪﻟ ﺭﺎﻌﺸﺘﺳﻻﺍ ﺓﺰﻬﺟﺃﻭ ﺮﺗﻮﻴﺒﻤﻜﻟﺍ ﺓﺰﻬﺟﺃ ﺖﺤﺒﺻﺃ \n\n.ﺔﻌﻳﺮﺴﻟﺍ ﺕﺍﺭﺎﺷﻹﺍﻭ ﺕﻻﺎﺼﺗﻻﺍ ﻦﻣ ﺔﻠﺴﻠﺴﺑ ﻝﺎﺠﻤﻟﺍ ﻒﺼﻗ ﻲﻓ ﺃﺪﺑ ،ﺔﻣﺪﺼﻟﺍ ﻦﻣ ﻲﻓﺎﻌﺘﻟﺍ ﺪﻌﺑ\n\n.ﺐﻳﺮﻘﻟﺍ ﻕﻮﻠﺨﻤﻟﺍ ﻮﻫ ﻪﻓﺎﺸﺘﻛﺍ ﻢﺗ ﻱﺬﻟﺍ ﺪﻴﺣﻮﻟﺍ ﺮﺧﻵﺍ ﻥﺎﻴﻜﻟﺍ .ﺔﻔﻴﺜﻛ ﻢﻳﺪﺳ ﺐﺤﺴﺑ ﺐﻧﺍﻮﺠﻟﺍ ﻊﻴﻤﺟ ﻦﻣ ﻥﻮﻃﺎﺤﻣ ﻦﺤﻧ .ﻲﺒﻴﺠﻟﺍ ﺪﻌﺒﻟﺍ ﻦﻣ ﺎﻣ ﻉﻮﻧ ﻲﻓ ﺓﺰﺠﺘﺤﻣ ﺓﺮﻜﻟﺍ\n\n.ﻲﻟﺎﺤﻟﺍ ﺖﻗﻮﻟﺍ ﻲﻓ ﻞﻗﻷﺍ ﻰﻠﻋ ،ﻪﺘﻗﺎﻋﺃ ﺪﻗ ﺔﻗﺎﻄﻟﺍ ﺓﺰﻫ ﻥﺃ ﻭﺪﺒﻳ .ﺔﻨﻴﻔﺴﻟﺍ ﻲﻓ ﻢﻜﺤﺘﻳ ﻥﺎﻛ ﺎﻣ ﻮﻫ ﺍﺬﻫ ﻥﺃ ﺽﺮﺘﻔﻤﻟﺍ ﻦﻣ ؛ﺓﺮﺷﺎﺒﻣ ﻢﻬﻌﻗﻮﻣ ﻦﻣ ﺏﺮﻘﻟﺎﺑ ﻱﺯﺎﻏ ﻥﺎﻴﻛ ﺩﻮﺟﻭ ﻢﻗﺎﻄﻟﺍ ﻆﺣﻻ ،ﺎﻬﺘﻗﺎﻃ ﻞﻣﺎﻜﺑ ﺭﺎﻌﺸﺘﺳﻻﺍ ﺓﺰﻬﺟﺃ ﻞﻴﻐﺸﺗ ﻊﻣ"
