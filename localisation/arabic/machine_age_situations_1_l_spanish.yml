# DICTATORIAL
 cyber.515.name: "ﺪﺸﺤﻟﺍ ﻰﻠﻋ ﺓﺮﻄﻴﺴﻟﺍ"
 cyber.515.desc.gov: ".ﺮﻴﻫﺎﻤﺠﻟﺍ ﻰﻠﻋ ﺮﻴﺛﺄﺘﻟﺎﺑ ﺔﻌﺸﻤﻟﺍ §Y[Ruler.GetTitle]§! ﺔﻴﺼﺨﺸﻟ ﺢﻤﺴﻳ ﺩﻮﻛ ﺖﻴﺒﺜﺗ ﺎﻨﻨﻜﻤﻳ ﻭﺃ ،ﺔﻴﺼﺨﺸﻟﺍ ﺕﺎﻋﺭﺰﻠﻟ ﺔﻴﻔﻠﺧ ﺏﺍﻮﺑﺃﻭ ﺔﺒﻗﺍﺮﻣ ﺕﺍﻭﺩﺃ ﺔﻓﺎﺿﺇ ﻖﻳﺮﻃ ﻦﻋ ﺎﻨﻳﺪﻟ ﺔﺒﻗﺍﺮﻤﻟﺍ ﺔﻴﻄﻐﺗ ﺓﺩﺎﻳﺯ ﺎﻨﻨﻜﻤﻳ\n\n.ﺔﻠﻀﻔﻤﻟﺍ ﺔﺠﻴﺘﻨﻟﺍ ﻮﺤﻧ ﻥﺎﻜﺴﻟﺍ ﻪﻴﺟﻮﺘﻟ ﺍﺮﺳ ﺕﺎﻴﻣﺯﺭﺍﻮﺨﻟﺍ ﺖﻴﺒﺜﺗ ﻞﻬﺴﻟﺍ ﻦﻣ ﻥﻮﻜﻴﺳ ،ﺎﻨﻧﺎﻜﺳ ﻦﻴﺑ ﺎﻬﺘﻴﺒﺜﺗﻭ ﺔﻣﻮﻜﺤﻟﺍ ﺎﻫﺭﺪﺼﺗ ﻲﺘﻟﺍ ﺕﺎﺳﺮﻐﻟﺍ ﻊﻴﻨﺼﺘﺑ ﻡﻮﻘﻧ ﺎﻤﻨﻴﺑ .ﺎﻨﺑ ﺹﺎﺨﻟﺍ ﺰﻳﺰﻌﺘﻟﺍ ﺞﻣﺎﻧﺮﺑ ﻦﻤﺿ ﻢﻜﺤﺘﻟﺍﻭ ﺭﺍﺮﻘﺘﺳﻻﺍ ﺓﺩﺎﻳﺰﻟ ﺹﺮﻔﻟﺍ ﻦﻣ ﺪﻳﺪﻌﻟﺍ ﺕﺮﻬﻇ"
 cyber.515.desc.cor: ".ﺮﻴﻫﺎﻤﺠﻠﻟ §Y[Ruler.GetTitle]§! ﺓﺩﺍﺭﺇ ﻊﺒﻄﺗ ﻲﺘﻟﺍ ﺔﻴﺼﺨﺸﻟﺍ ﺯﻭﺎﺠﺗ ﺔﻔﻴﻇﻭ ﺀﺎﺸﻧﺇ ﺎﻨﻨﻜﻤﻳ ،ﻚﻟﺫ ﻦﻣ ﻻﺪﺑﻭ .ﻞﻛﺎﺸﻣ ﻦﻣ ﻥﻮﻧﺎﻌﻳ ﻦﻳﺬﻟﺍ ﺩﺍﺮﻓﻷﺍ ﺙﺎﺜﺘﺟﺎﺑ ﺎﻨﻟ ﺢﻤﺴﻳ ﺎﻤﻣ ،ﺔﻴﺼﺨﺸﻟﺍ ﺰﻳﺰﻌﺘﻟﺍ ﺓﺰﻬﺟﺃ ﻲﻓ ﺔﻴﻔﺨﻤﻟﺍ ﺔﺒﻗﺍﺮﻤﻟﺍ ﺕﺍﻭﺩﺃ ﻦﻴﻤﻀﺗ ﺎﻨﻨﻜﻤﻳ\n\n.ﺓﺪﻳﺮﻓ ﺔﺻﺮﻓ ﻡﺩﺎﻘﻟﺍ ﺖﺑﺎﺜﻟﺍ ﺞﻣﺎﻧﺮﺒﻟﺍ ﺚﻳﺪﺤﺗ ﺎﻨﻟ ﺮﻓﻮﻳﻭ ،ﻲﻌﻤﺘﺠﻣ ﻕﺎﻄﻧ ﻰﻠﻋ ﺔﻴﻧﺍﺮﺒﻴﺴﻟﺍ ﺕﺎﺳﺮﻐﻟﺍ ﺖﻴﺒﺜﺗﻭ ﻊﻳﺯﻮﺗﻭ ﻊﻴﻨﺼﺘﻟ ﺓﺪﻌﺘﺴﻣ ﺎﻨﻟ ﺔﻜﻳﺮﺸﻟﺍ ﺕﺎﻛﺮﺸﻟﺍ"
 cyber.515.desc.ind: ".ﺔﻤﻈﻌﻟﺍ ﻮﺤﻧ ﻲﻋﻭ ﻥﻭﺩ ﺎﻨﺒﻌﺷ ﻪﻴﺟﻮﺘﺑ §Y[Ruler.GetTitle]§! ﺓﺩﺍﺭﻹ ﺢﻤﺴﺘﺳ ﻲﺘﻟﺍﻭ ﺔﻴﺼﺨﺸﻟﺍ ﺯﻭﺎﺠﺘﺗ ﺕﺎﻴﻣﺯﺭﺍﻮﺧ ﺖﻴﺒﺜﺗ ﺎﻨﻨﻜﻤﻳ ،ﻚﻟﺫ ﻦﻣ ﻻﺪﺑﻭ .ﻞﻛﺎﺸﻣ ﻦﻣ ﻥﻮﻧﺎﻌﻳ ﻦﻳﺬﻟﺍ ﺩﺍﺮﻓﻷﺍ ﺔﺒﻗﺍﺮﻣ ﻦﻣ ﻦﻜﻤﺘﻧ ﻰﺘﺣ ،ﺎﻬﻠﺧﺍﺪﺑ ﺔﻴﻔﺨﻤﻟﺍ ﺎﻨﺑ ﺔﺻﺎﺨﻟﺍ ﺔﻳﺮﺴﻟﺍ ﺔﺒﻗﺍﺮﻤﻟﺍ ﺕﺍﻭﺩﺃ ﻊﻣ ،ﻉﺭﺰﻠﻟ ﺔﺼﺼﺨﻣ ﺕﻼﻳﺪﻌﺗ ﺮﻴﻓﻮﺗ ﺎﻨﻨﻜﻤﻳ\n\n.ﻞﻣﺎﻛ ﻞﻜﺸﺑ ﺓﺮﻴﺜﻤﻟﺍﻭ ﺓﺪﻳﺪﺠﻟﺍ ﺎﻴﺟﻮﻟﻮﻨﻜﺘﻟﺍ ﻩﺬﻫ ﻰﻠﻋ ﺎﻨﺘﻄﻠﺳ ﻰﻠﻋ ﺔﻳﺰﻛﺮﻣﻼﻟﺍ ﺀﺎﻔﺿﺇ ﻰﻟﺇ ﺔﺟﺎﺣ ﻙﺎﻨﻫ ﺖﺴﻴﻟ ﻦﻜﻟﻭ .ﻥﺎﻜﺴﻟﺍ ﻰﻠﻋ ﺔﻴﻧﻭﺮﺘﻜﻟﺇ ﻉﺭﺯ ﺕﺎﻴﻠﻤﻋ ﺖﻴﺒﺜﺗﻭ ﻊﻳﺯﻮﺘﻟ ﻥﻵﺍ ﺓﺰﻫﺎﺟ ﺔﻨﺻﺍﺮﻘﻟﺍ ﺕﺎﻌﻤﺘﺠﻣﻭ ﺓﺮﻴﻐﺼﻟﺍ ﺮﺟﺎﺘﻤﻟﺍﻭ ﺔﻣﺎﻌﻟﺍ ﺕﺎﻴﻔﺸﺘﺴﻤﻟﺍ ﺖﺤﺒﺻﺃ"
