 cyber.525.name: "ﺪﺘﻳﺭﻮﺑﺭﻮﻜﻧﺇ ﻉﺭﺰﻳ"
 cyber.525.desc.gov: "؟ﺪﻳﺍﺰﺘﻤﻟﺍ ﻥﺎﻜﺴﻟﺍ ﺩﺪﻌﻟ ﺔﻤﻈﺘﻨﻣ ﺕﺎﻴﻗﺮﺗ ﺀﺍﺮﺟﺇ ﺽﺮﻔﺗ ﻭﺃ ،ﺔﻴﻠﺒﻘﺘﺴﻤﻟﺍ ﻦﻴﻌﻟﺍ ﺔﻋﺍﺭﺯ ﺕﺎﻴﻠﻤﻋ ﻊﻴﻤﺟ ﻲﻓ ﺕﺎﻧﻼﻋﻹﺍ ﻦﻴﻤﻀﺗ ﺐﻠﻄﺗ ﻥﺃ ﺔﻣﻮﻜﺤﻠﻟ ﻲﻐﺒﻨﻳ ﻞﻫ\n\n.ﺎﻤﻬﺑ ﺔﺻﺎﺨﻟﺍ ﺕﺂﻓﺎﻜﻤﻟﺍﻭ ﺮﻃﺎﺨﻤﻟﺍ ﺎﻤﻬﻨﻣ ﻞﻜﻟ ،ﻞﺧﺪﻠﻟ ﻦﻴﻠﻤﺘﺤﻣ ﻦﻳﺭﺪﺼﻣ ﺎﻨﻳﺪﻟ ﺕﻼﻴﻠﺤﺘﻟﺍ ﻖﻳﺮﻓ ﺡﺮﺘﻘﻳ .ﻕﻮﺒﺴﻤﻟﺍ ﺮﻴﻏ ﺞﺘﻨﻤﻟﺍ ﺍﺬﻫ ﻕﻼﻃﺈﺑ ﻖﻠﻌﺘﻳ ﺎﻤﻴﻓ ﺮﺒﻛﺃ ﻞﻜﺸﺑ ﺕﺍﺩﺍﺮﻳﻹﺍ ﺭﺩﺎﺼﻣ ﻊﻴﺳﻮﺘﻟ ﺔﺻﺮﻓ ﺎﻨﻟ ﺢﻴﺘﻳ ﺎﻤﻣ ،ﻝﺎﻤﺘﻛﻻﺍ ﻦﻣ ﻝﺎﻌﻔﻟﺍ ﺮﻴﻏﻭ ﻊﺳﻮﻤﻟﺍ ﻲﻣﻮﻜﺤﻟﺍ ﻉﺭﺰﻟﺍ ﺞﻣﺎﻧﺮﺑ ﺏﺮﺘﻘﻳ"
 cyber.525.desc.cor: "؟ﺪﻳﺍﺰﺘﻤﻟﺍ ﻥﺎﻜﺴﻟﺍ ﺩﺪﻌﻟ ﺔﻤﻈﺘﻨﻣ ﺕﺎﻴﻗﺮﺗ ﺀﺍﺮﺟﺇ ﺽﺮﻔﻧ ﻭﺃ ،ﻞﺒﻘﺘﺴﻤﻟﺍ ﻲﻓ ﻦﻴﻌﻟﺍ ﻉﺭﺯ ﺕﺎﻴﻠﻤﻋ ﻊﻴﻤﺟ ﻲﻓ ﺕﺎﻧﻼﻋﻹﺍ ﺝﺍﺭﺩﺈﺑ ﺐﻟﺎﻄﻧ ﻥﺃ ﺎﻨﻟ ﻲﻐﺒﻨﻳ ﻞﻫ ،ﻮﻫ ﻝﺍﺆﺴﻟﺍﻭ \n\n .ﺓﺯﺎﺘﻤﻣ ﺢﺑﺭ ﺶﻣﺍﻮﻫ ﻊﻗﻮﺘﻳ ﺎﻤﻫﻼﻛ ﻥﺃ ﻻﺇ ،ﻲﻓﺎﻨﺘﻣ ﺎﻤﻬﻨﻣ ﻞﻛ ﻥﺃ ﻦﻣ ﻢﻏﺮﻟﺍ ﻰﻠﻋ .ﺎﻤﻬﻴﺴﻔﻧ ﻥﺎﻣﺪﻘﺗ ﺹﺎﺧ ﻞﻜﺸﺑ ﻥﺎﺗﺪﻋﺍﻭ ﻥﺎﺘﻘﻳﺮﻃ ﻙﺎﻨﻫ\n\n.ﺎﻴﻠﻤﻋ ﺎﻬﻟ ﺮﺼﺣ ﻻ ﺓﺪﻳﺪﺠﻟﺍ ﺕﺎﺳﺮﻐﻟﺍ ﻩﺬﻬﻟ ﺔﻳﺭﺎﺠﺘﻟﺍ ﺹﺮﻔﻟﺍ ﻥﺇ .ﺎﻨﻳﺪﻟ ﺔﻳﺎﻐﻠﻟ ﺔﻨﺴﺤﻤﻟﺍ ﺔﻴﺴﺳﺆﻤﻟﺍ ﺔﻴﺘﺤﺘﻟﺍ ﺔﻴﻨﺒﻟﺍ ﻝﻼﺧ ﻦﻣ ﻊﻗﻮﺘﻣ ﻮﻫ ﺎﻤﻛ ﺓﺀﺎﻔﻜﺑ ﺕﺎﺳﺮﻐﻟﺍ ﺐﻴﻛﺮﺗﻭ ﺝﺎﺘﻧﺇ ﻢﺘﻳ"
