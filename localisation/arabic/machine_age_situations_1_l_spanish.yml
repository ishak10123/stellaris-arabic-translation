 cyber.510.desc.gov: "؟ﺔﻤﺋﺎﻨﻟﺍ ﻝﻮﻘﻌﻠﻟ ﺔﻠﻣﺎﺨﻟﺍ ﺔﻴﺑﺎﺴﺤﻟﺍ ﺓﻮﻘﻟﺍ ﻞﻐﺘﺴﻧ ﻭﺃ ﺓﺪﻳﺪﺟ ﻕﺎﻓﺁ ﻰﻟﺇ ﺎﻨﻟﺎﻤﻋ ﻊﻓﺮﺗ ﺔﺳﺮﺸﻟﺍ ﺔﺴﻓﺎﻨﻤﻟﺍ ﺚﻴﺣ ﻊﻤﺘﺠﻣ ﻮﺤﻧ ﻊﻓﺪﻧ ﻥﺃ ﺎﻨﻟ ﻲﻐﺒﻨﻳ ﻞﻫ \n\n .ﻥﻵﺍ ﻖﺋﺎﻗﺮﻟﺍ ﻩﺬﻫ ﺎﻫﺮﻓﻮﺗ ﻲﺘﻟﺍ ﺔﻠﻐﺘﺴﻤﻟﺍ ﺮﻴﻏ ﺹﺮﻔﻟﺍ ﻑﺎﺸﻜﺘﺳﻻ ﺓﺪﻳﺮﻓ ﺔﺻﺮﻓ ﺎﻨﻳﺪﻟﻭ ،ﺔﻣﻮﻜﺤﻟﺍ ﻦﻋ ﺓﺭﺩﺎﺻ ﺔﻴﻧﻭﺮﺘﻜﻟﺇ ﺕﺎﺳﺮﻐﺑ ﺓﺩﻭﺰﻣ §Y[Species.GetNamePlural]§! ﻥﺃ ﻦﻴﺣ ﻲﻓ .ﺎﻧﺎﻳﺎﻋﺭ ﻦﻴﺑ ﺕﺎﻓﻼﺨﻟﺍﻭ ﻙﺎﺒﺗﺭﻻﺍ ﻰﻟﺇ ﻱﺩﺆﻳ ﻥﺃ ﺔﻴﺸﺧ ،ﻊﻤﺘﺠﻤﻟﺍ ﻦﻣ ﺎﻴﻠﻌﻟﺍ ﺔﻘﺒﻄﻟﺍ ﻞﺒﻗ ﻦﻣ ﻻﺇ ﻪﻠﻴﻌﻔﺗﻭ ﻞﺋﺎﻬﻟﺍ ﻝﻮﺤﺘﻟﺍ ﺍﺬﻫ ﻢﻬﻓ ﻦﻜﻤﻳ ﻻ"
 cyber.510.desc.cor: "؟ﻢﺋﺎﻨﻟﺍ ﻍﺎﻣﺪﻠﻟ ﺔﻠﻐﺘﺴﻤﻟﺍ ﺮﻴﻏ ﺕﺎﻧﺎﻜﻣﻹﺍ ﺔﻳﺎﻋﺭ ﻭﺃ ،ﻂﻘﻓ ﻯﻮﻗﻸﻟ ﺀﺎﻘﺒﻟﺍ ﺚﻴﺣ ،ﺔﻌﻴﺒﻄﻟﺍ ﺪﻴﻠﻘﺗ ﺎﻨﻴﻠﻋ ﻲﻐﺒﻨﻳ ﻞﻫ \n\n.ﻞﻫﺬﻤﻟﺍ ﻲﻌﻤﺘﺠﻤﻟﺍ ﺮﻴﻴﻐﺘﻟﺍ ﺍﺬﻫ ﻦﻣ ﺓﺩﺎﻔﺘﺳﻼﻟ ﺔﻘﻳﺮﻃ ﻞﻀﻓﺃ ﻥﺄﺸﺑ ﺍﺭﺍﺮﻗ ﺬﺨﺘﻧ ﻥﺃ ﺎﻨﻴﻠﻋ ﺐﺠﻳ ،ﻦﻴﺴﺤﺘﻟﺍ ﺔﻤﺋﺍﺩ ﺔﻳﻮﻴﺣ ﻖﺋﺎﻗﺭ ﺔﻣﻮﻜﺤﻟﺍ ﺔﻘﻓﺍﻮﻤﺑ ﻰﻈﺤﺗ ﻲﺘﻟﺍ ﺕﺎﻛﺮﺸﻟﺍ ﺞﺘﻨﺗ ﺎﻤﻨﻴﺑﻭ"
 cyber.510.desc.ind: ".ﻊﻗﻮﺘﻤﻟﺍ ﺮﻴﻏ ﻲﻌﻤﺘﺠﻤﻟﺍ ﻝﻮﺤﺘﻟﺍ ﺍﺬﻫ ﻦﻣ ﺓﺩﺎﻔﺘﺳﺍ ﻰﺼﻗﺃ ﻖﻴﻘﺤﺗ ﺔﻴﻔﻴﻛﻭ ﺓﺮﻴﺒﻜﻟﺍ ﺓﺭﻮﺼﻟﺍ ﻲﻓ ﺮﻈﻨﻠﻟ ﺎﻧﺭﺮﺤﻳ ﺎﻤﻣ ،ﻲﻧﺍﺮﺒﻴﺴﻟﺍ ﺰﻳﺰﻌﺘﻟﺍ ﺓﺰﻬﺟﺃ ﻊﻳﺯﻮﺗﻭ ﻊﻴﻨﺼﺗ ﻲﻓ ﻢﻬﺴﻔﻧﺃ ﺕﺎﺒﺛﺈﺑ ﺱﺎﻨﻠﻟ ﺢﻤﺴﻳ ﻑﻮﺳ ،ﺀﺍﺮﻀﻟﺍﻭ ﺀﺍﺮﺴﻟﺍ ﻲﻓ"
