 cyber.520.desc.gov: ".ﺔﺜﻳﺪﺤﻟﺍ ﺔﻳﻮﻣﺪﻟﺍ ﺕﺎﺿﺎﻳﺮﻟﺍ ﺙﺍﺪﺣﺃ ﻲﻓ ﻦﻴﻛﺭﺎﺸﻤﻟﺍ ﺎﻴﻧﻭﺮﺘﻜﻟﺇ ﻦﻳﺯﺰﻌﻤﻟﺍ ﻦﻴﻴﺿﺎﻳﺮﻟﺍ ﻊﻣ ﻪﻴﻓﺮﺘﻟﺍﻭ ﺔﻤﺻﺎﻌﻟﺍ ﻯﻮﺘﺴﻣ ﻊﻓﺭ ﺔﻳﺭﻮﻃﺍﺮﺒﻣﻺﻟ ﻦﻜﻤﻳ ﻭﺃ .ﺱﺎﻘﻳ ﻻ ﺭﺍﺮﻘﺘﺳﺍ ﺮﻓﻮﻳ ﺎﻤﻣ ،ﻝﺎﻴﺟﻷﺍ ﻦﻴﺑ ﺔﻓﺮﻌﻤﻟﺍ ﻰﻠﻋ ﻅﺎﻔﺤﻟﺎﺑ ﺎﻨﺗﺩﺎﻴﻘﻟ ﺢﻤﺴﻳ ﻥﺃ ﻦﻜﻤﻳ ﺎﻨﺘﻟﻼﺴﻟ ﺔﺣﺎﺘﻤﻟﺍ ﺓﺩﻮﺠﻟﺍ ﺔﻴﻟﺎﻋ ﺕﺎﺳﺮﻐﻟﺍ ﺩﻮﺟﻭ ﻥﺇ\n\n.ﻢﻬﺗﺩﺎﻴﻗ ﺖﺤﺗ ﻥﻮﻠﻤﻌﻳ ﻦﻳﺬﻟﺍ ﻚﺌﻟﻭﺃ ﺀﺎﻬﻟﺇﻭ ﻪﻴﻓﺮﺘﻠﻟ ﺔﻠﻴﺳﻮﻛ ﻭﺃ ﻞﻌﻔﻟﺎﺑ ﺔﻌﺋﺍﺮﻟﺍ ﺎﻨﺗﺩﺎﻴﻗ ﺰﻳﺰﻌﺗ ﻰﻠﻋ ﺰﻛﺮﺗ ﻥﺃ ﺐﺠﻳ ﺕﺎﺳﺮﻐﻠﻟ ﺔﻴﻠﻌﻔﻟﺍ ﺔﻤﻴﻘﻟﺍ ﺖﻧﺎﻛ ﺍﺫﺇ ﺎﻣ ﻮﻫ ﻝﺍﺆﺴﻟﺍ\n\n .ﺔﺤﻴﺤﺼﻟﺍ ﺔﻧﺎﻴﺼﻟﺍﻭ ﻡﺍﺪﺨﺘﺳﻻﺍ ﺕﺎﺳﺭﺎﻤﻣ ﻝﻮﺣ ﺹﺎﺨﺷﻷﺍ ﺩﺎﺷﺭﺇ ﻢﺘﻳﻭ ،ﺍﺭﺎﻬﻧﻭ ﻼﻴﻟ ﺕﺎﺳﺮﻐﻟﺍ ﺖﻴﺒﺜﺘﺑ ﺕﺎﺑﻮﻘﻌﻠﻟ ﺔﻌﺿﺎﺨﻟﺍ ﺰﻳﺰﻌﺘﻟﺍ ﺰﻛﺍﺮﻣ ﻡﻮﻘﺗ .ﺓﺀﺎﻔﻜﺑ ﻥﺎﻜﺴﻟﺍ ﺩﺪﻋ ﺓﺩﺎﻳﺰﻟ ﺔﻠﺋﺎﻬﻟﺍ ﺎﻫﺩﺭﺍﻮﻣ ﺔﻣﻮﻜﺤﻟﺍ ﺖﻣﺪﺨﺘﺳﺍ ﺪﻗﻭ"
 cyber.520.desc.cor: ".ﺔﺜﻳﺪﺤﻟﺍ ﺔﻳﻮﻣﺪﻟﺍ ﺕﺎﺿﺎﻳﺮﻟﺍ ﺙﺍﺪﺣﺃ ﻲﻓ ﻦﻴﻛﺭﺎﺸﻤﻟﺍ ﺎﻴﻧﻭﺮﺘﻜﻟﺇ ﻦﻳﺯﺰﻌﻤﻟﺍ ﻦﻴﻴﺿﺎﻳﺮﻟﺍ ﻊﻣ ﻪﻴﻓﺮﺘﻟﺍﻭ ﺔﻤﺻﺎﻌﻟﺍ ﻯﻮﺘﺴﻣ ﻊﻓﺭ ﺔﻳﺭﻮﻃﺍﺮﺒﻣﻺﻟ ﻦﻜﻤﻳ ﻭﺃ .ﺱﺎﻘﻳ ﻻ ﺍﺭﺍﺮﻘﺘﺳﺍ ﺮﻓﻮﻳ ﺎﻤﻣ ،ﻝﺎﻴﺟﻷﺍ ﻦﻴﺑ ﺔﻓﺮﻌﻤﻟﺍ ﻰﻠﻋ ﻅﺎﻔﺤﻟﺎﺑ ﺎﻨﺗﺩﺎﻴﻘﻟ ﺢﻤﺴﻳ ﻥﺃ ﻦﻜﻤﻳ ﺎﻨﺘﻟﻼﺴﻟ ﺔﺣﺎﺘﻤﻟﺍ ﺕﺎﺳﺮﻐﻟﺍ ﻦﻣ ﺓﺩﻮﺟ ﻰﻠﻋﺃ ﻰﻠﻋ ﻝﻮﺼﺤﻟﺍ ﻥﺇ\n\n.ﺕﺎﺳﺮﻐﻠﻟ ﺔﻴﻠﻌﻔﻟﺍ ﺔﻤﻴﻘﻟﺍ ﻰﻠﻋ ﺰﻴﻛﺮﺘﻟﺍ ﻲﻐﺒﻨﻳ ﻦﻳﺃ ﻮﻫ ﻥﻵﺍ ﻝﺍﺆﺴﻟﺍﻭ \n\n .ﻰﻀﻣ ﺖﻗﻭ ﻱﺃ ﻦﻣ ﺮﺒﻛﺃ ﺓﺀﺎﻔﻜﺑ ﺔﻣﺪﺨﻠﻟ ﻦﻳﺰﻫﺎﺟ ﺍﻮﺤﺒﺻﺃﻭ ﺔﻴﻧﻭﺮﺘﻜﻟﺇ ﺕﺎﺳﺮﻐﺑ ﻞﻣﺎﻜﻟﺎﺑ ﻥﺎﻜﺴﻟﺍ ﺩﺪﻋ ﺰﻳﺰﻌﺗ ﻢﺗ ﺪﻘﻟ .ﺔﻴﻠﻴﻐﺸﺘﻟﺍ ﺕﺎﻬﻴﺟﻮﺘﻟﺍ ﻦﻤﺿ ﺎﻴﻤﺳﺭ ﺓﺪﻤﺘﻌﻤﻟﺍ ﺕﺎﻛﺮﺸﻟﺍ ﺀﺍﺩﺃ ﻥﺎﻛ ﺪﻘﻟ"
 cyber.520.desc.ind: ".ﻞﺒﻗ ﻦﻣ ﺔﻴﻨﻴﻋ ﺔﻋﺍﺭﺯ ﻱﺃ ﺎﻫﺪﻫﺎﺸﺗ ﻢﻟ ﻲﺘﻟﺍ ﺀﺎﻴﺷﻷﺍ ﻲﻫﻭ ،ﺔﻴﻏﺭﻮﺒﻳﺎﺴﻟﺍ ﻡﺪﻟﺍ ﺔﺿﺎﻳﺮﺑ ﺮﻴﻫﺎﻤﺠﻟﺍ ﺪﻳﻭﺰﺗ ﻭﺃ ﻝﺎﻴﺟﻷﺍ ﻦﻴﺑ ﻉﺭﺯ ﺕﺎﻴﻠﻤﻋ ﻦﻤﺿ ﺔﻳﺭﻮﻃﺍﺮﺒﻣﻹﺍ ﺔﻓﺮﻌﻤﻟﺍ ﻰﻠﻋ ﻅﺎﻔﺤﻟﺍ ﺍﺬﻫ ﻲﻨﻌﻳ ﺪﻗ .ﺕﺎﻋﺭﺰﻠﻟ ﺔﻴﻠﻌﻔﻟﺍ ﺔﻤﻴﻘﻟﺍ ﺰﻴﻛﺮﺗ ﺐﺠﻳ ﻦﻳﺃ ﻮﻫ ﻥﻵﺍ ﻝﺍﺆﺴﻟﺍﻭ \n\n .ﺎﻨﻧﺎﻜﺳ ﺩﺪﻋ ﻦﻴﺴﺤﺘﻟ ﻞﻠﻛ ﻼﺑ ﻢﻟﺎﻌﻟﺍ ﺀﺎﺤﻧﺃ ﻊﻴﻤﺟ ﻲﻓ ﺓﺮﻴﻐﺼﻟﺍ ﺕﺍﺩﺎﻴﻌﻟﺍ ﻦﻣ ﺪﻳﺪﻌﻟﺍ ﻞﻤﻌﺗ .ﺎﺤﺟﺎﻧ ﺔﻴﻧﺍﺮﺒﻴﺴﻟﺍ ﺕﺎﺳﺮﻐﻟﺍ ﺐﻴﻛﺮﺗﻭ ﻱﺰﻛﺮﻣﻼﻟﺍ ﻊﻳﺯﻮﺘﻟﺍ ﻥﺎﻛ ﺪﻘﻓ ،ﻦﻴﻳﺭﻮﻃﺍﺮﺒﻣﻹﺍ ﻦﻴﻟﻭﺆﺴﻤﻟﺍ ﻦﻣ ﺓﺪﻳﺪﻌﻟﺍ ﺕﺎﻈﻔﺤﺘﻟﺍ ﻦﻣ ﻢﻏﺮﻟﺍ ﻰﻠﻋ"
