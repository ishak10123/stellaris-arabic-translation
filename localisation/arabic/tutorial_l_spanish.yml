 advisor.15.desc:1 ".ﺭﺎﻤﻌﺘﺳﻻﺍ ﺔﻴﻠﻤﻋ ﻲﻓ ﺀﺪﺒﻟﺍ ﺎﻨﻨﻜﻤﻳ ،§SSystem§! ـﺑ ﺔﺒﻟﺎﻄﻤﻟﺍ ﺩﺮﺠﻤﺑ\n\n£colonizable£$tttt$$ttt$\n\n§S Starbase[GetBuildGrowCap]§! ﺩﺪﺣ £dot_green£\nﺔﻠﻤﺘﺤﻣ ﺓﺮﻤﻌﺘﺴﻣ ﻰﻠﻋ ﻱﻮﺘﺤﻳ ﻱﺬﻟﺍ §SSystem§! £system£ ﻰﻠﻋ ﻦﻤﻳﻷﺍ ﺱﻭﺎﻤﻟﺍ ﺭﺰﺑ ﺮﻘﻧﺍ £dot_green£\n\n Selected;§Sﺀﺎﻨﺒﻟﺍ ﺔﻨﻴﻔﺳ§! £construction_ship£ ﻊﻣ\n\n.ﺎﻧﺩﻭﺪﺣ ﻊﻴﺳﻮﺗ ﺎﻨﻴﻠﻋ ﺐﺠﻳ ،ﻢﻟﺎﻌﻟﺍ ﺍﺬﻫ ﺭﺎﻤﻌﺘﺳﺍ ﻞﺒﻗ\n\n.ﻙﺎﻨﻫ ﺔﻣﺎﺗ ﺔﺣﺍﺮﺑ ﺎﻧﻭﺮﻤﻌﺘﺴﻣ ﺮﻌﺸﻳ ﻥﺃ ﺐﺠﻳ ﺍﺬﻟ ،ﻲﻠﺻﻷﺍ ﺎﻨﻤﻟﺎﻋ ﻞﺜﻣ §S§! ﺐﻛﻮﻜﻟﺍ ﺔﺌﻓ ﺲﻔﻧ ﻦﻣ ﻪﻧﺇ .§SColony§! £colony£ ﻝﻭﻷ ﺍﺯﺎﺘﻤﻣ ﺎﺤﺷﺮﻣ ﻥﻮﻜﻳ ﻥﺃ ﻦﻜﻤﻳ ﻢﻟﺎﻌﻟ ﺢﺴﻣ ﺀﺍﺮﺟﺈﺑ §S§! £science_ship£ ﺔﻴﻤﻠﻌﻟﺍ ﺎﻨﻨﻔﺳ ﻯﺪﺣﺇ ﺖﻣﺎﻗ"
