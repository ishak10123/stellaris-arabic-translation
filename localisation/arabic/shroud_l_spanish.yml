 shroud.1510.title: "$PSIONIC_AURA$ ﺏﺭﺎﻀﺘﻣ"
 shroud.1510.desc: ".ﺔﻴﻘﻴﻘﺣ ﻝﻮﻘﻋ ﺔﻛﺮﻌﻣ ﺎﻬﻧﺇ\n\n.ﺮﻏﺎﺸﻟﺍ ﻡﺎﻈﻨﻟﺍ ﻰﻟﺇ ﺓﺪﺋﺎﺴﻟﺍ ﺔﻟﺎﻬﻟﺍ ﻖﻓﺪﺘﺗ ﺪﻘﻓ ،ﻖﻠﻄﻤﻟﺍ ﻝﻼﺤﻧﻻﺍ ﻰﻟﺇ ﻉﺍﺮﺼﻟﺍ ﺍﺬﻫ ﻯﺩﺃ ﺍﺫﺇ .ﺔﺴﻛﺎﻌﻤﻟﺍ ﺓﻮﻘﻟﺍ ﻦﻣ ﺎﻴﺠﻳﺭﺪﺗ ﻞﻠﻘﺗ ﻑﻮﺳ - ﺮﺒﻛﺃ ﺔﻓﺎﺜﻜﺑ ﺎﻬﺿﺮﻋ ﻢﺘﻳ ﻲﺘﻟﺍ ﻚﻠﺗ - ﺓﻮﻗ ﺮﺜﻛﻷﺍ ﺔﻟﺎﻬﻟﺍ ﻥﺈﻓ ،ﺔﻳﺮﻈﻨﻠﻟ ﺎﻘﻓﻭ \n\n .ﺮﺷﺎﺒﻣ ﻞﻜﺸﺑ ﺓﺮﻫﺎﻈﻟﺍ ﻩﺬﻫ ﺎﻬﻴﻓ ﺮﺒﺘﺨﻧ ﻲﺘﻟﺍ ﻰﻟﻭﻷﺍ ﺓﺮﻤﻟﺍ ﻲﻫ ﻩﺬﻫ ﻥﺃ ﻦﻣ ﻢﻏﺮﻟﺍ ﻰﻠﻋ ،ﻙﻮﻠﺴﻟﺍ ﺍﺬﻫ ﻞﺜﻤﻟ ﺎﻘﺑﺎﺳ ﺎﺟﺫﻮﻤﻧ ﺎﻨﻳﺪﻟ ﺔﻴﻨﻫﺬﻟﺍ [GetResearchers] ﺖﻤﻤﺻ ﺪﻘﻟ .ﺐﻳﺮﻘﻟﺍ [fromfrom.GetName] ﻡﺎﻈﻧ ﻦﻣ ﺄﺸﻨﺗ ﺔﺴﻛﺎﻌﻣ ﺔﻟﺎﻫ ﺪﺿ ﺢﻓﺎﻜﻳ [from.GetName] ﻡﺎﻈﻧ ﻲﻓ §H$PSIONIC_AURA$§! ﺎﻨﻳﺪﻟ"
