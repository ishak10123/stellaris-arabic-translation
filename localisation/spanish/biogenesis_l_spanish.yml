 DLC_BIOGENESIS_RECOMMENDATION_DESC: "Recomendamos §S$BIOGENESIS_TITLE$§!, ya que algunas de las opciones que has seleccionado se adaptan a su contenido."
 ############################
 #Phenotype Species Traits #
 ############################
 #Species traits localized tags
 SPECIES_TRAIT_CATEGORY_HEADER: "§HCategorías de rasgo§!\nEste rasgo pertenece a las siguientes categorías:"
 SPECIES_TRAIT_HUMANOID: "['concept_humanoid_phenotype_traits']"
 SPECIES_TRAIT_MAMMALIAN: "['concept_mammalian_phenotype_traits']"
 SPECIES_TRAIT_REPTILIAN: "['concept_reptilian_phenotype_traits']"
 SPECIES_TRAIT_ARTHROPOID: "['concept_arthropoid_phenotype_traits']"
 SPECIES_TRAIT_AVIAN: "['concept_avian_phenotype_traits']"
 SPECIES_TRAIT_MOLLUSCOID: "['concept_molluscoid_phenotype_traits']"
 SPECIES_TRAIT_PLANTOID: "['concept_plantoid_phenotype_traits']"
 SPECIES_TRAIT_FUNGOID: "['concept_fungoid_phenotype_traits']"
 SPECIES_TRAIT_LITHOID: "['concept_lithoid_phenotype_traits']"
 SPECIES_TRAIT_NECROID: "['concept_necroid_phenotype_traits']"
 SPECIES_TRAIT_AQUATIC: "['concept_aquatic_phenotype_traits']"
 SPECIES_TRAIT_TOXOID: "['concept_toxoid_phenotype_traits']"
 SPECIES_TRAIT_INFERNAL: "['concept_infernal_phenotype_traits']"
 SPECIES_TRAIT_VOCATIONAL: "['concept_vocational_traits']"
 SPECIES_TRAIT_OVERTUNED: "['concept_overtuned_traits']"
 SPECIES_TRAIT_FLEETING_EXCELLENCE: "['concept_fleeting_excellence_traits']"
 SPECIES_TRAIT_CYBORG: "['concept_cybernetic_traits']"
 SPECIES_TRAIT_UNIVERSAL_AUGMENTATIONS: "['concept_universal_augmentations_traits']"
 SPECIES_TRAIT_ADAPTIVE_FRAMES: "['concept_adaptive_frames_traits']"
 trait_egg_laying: "Puesta de huevos"
 trait_egg_laying_desc: "Las crías de esta especie no se desarrollan dentro de un progenitor, sino en el interior de la cáscara protectora del huevo. Esto permite un crecimiento rápido en épocas de abundancia."
 trait_egg_laying_effect: "Velocidad de crecimiento de poblaciones: §G+15%§! al vivir en un planeta con un §Gexcedente de producción§! de $r_food$ (o equivalente)"
 trait_egg_laying_portrait_override_tt: "O cualquier especie ovípara"
 trait_seasonal_dormancy: "Letargo estacional"
 trait_seasonal_dormancy_desc: "Esta especie ha evolucionado en un planeta con estaciones cíclicas que favorecen la hibernación. En la actualidad, los elementos que propician el cambio de estación se pueden emular de forma artificial para almacenar a los miembros menos productivos de la sociedad."
 trait_seasonal_dormancy_effect: "Manten. población empleada: §G-15%§!\nManten. población no empleada y ['concept_denizen']: §G-75%§!"
 trait_seasonal_dormancy_portrait_override_tt: "O cualquier especie de hibernación"
 trait_hollow_bones: "Huesos huecos"
 trait_hollow_bones_desc: "Los frágiles huesos de esta especie les permite desplazarse de forma ligera y elegante. Sin embargo, también son más susceptibles a los efectos gravitacionales de su mundo."
 trait_hollow_bones_effect: "$BONUS_WORKFORCE_FOR$ Trabajos de soldado, $pop_cat_worker_plural$ y $pop_cat_simple_drone_plural$ por tamaño del planeta: §R-0,67%§!"
 trait_rooted: "Arraigado"
 trait_rooted_desc: "Esta especie echa raíces en cualquier entorno en el que se encuentre, lo que hace que su retirada sea una experiencia muy traumática."
 AUTO_MIGRATE_ROOTED: "§RLas poblaciones arraigadas no pueden migrar.§!"
 trait_rooted_effect: "§RLas poblaciones no se reasentarán automáticamente§!\n- Coste de reasentamiento: §R+200%§!"
 trait_rooted_portrait_override_tt: "O cualquier especie ambiental"
 trait_acidic_vascularity: "Vascularización ácida"
 trait_acidic_vascularity_desc: "Los fluidos internos de esta especie son su principal defensa. Estos líquidos altamente corrosivos y letales consiguen que cualquier enemigo se arrepienta de hacer algún agujero."
 trait_acidic_vascularity_effect: "Los ejércitos §Yexplotan al morir§! e infligen §G250§! de daño a los enemigos.\n- Producción de recursos por población purgada: §R-75%§!"
 DAMAGE_ARMY: "Daños $ARMY|Y$"
 trait_shelled: "Protección"
 trait_shelled_desc: "Esta especie lleva su casa a cuestas, las cuales crecen de forma natural o encuentran por casualidad (o por diseño). Estos caparazones son un santuario protector que les garantiza un sitio en el que cobijarse durante la noche."
 trait_shelled_portrait_override_tt: "O cualquier especie con caparazón"
 trait_camouflage: "Camuflaje"
 trait_camouflage_desc: "Esta especie es una maestra del disfraz: se fusiona con el entorno y es prácticamente invisible a ojos de sus depredadores y presas. Su entendimiento innato de la óptica les da una ventaja en la guerra de guerrillas."
 trait_camouflage_portrait_override_tt: "O cualquier especie con camuflaje"
 trait_chromalogs: "Registros cromáticos"
 trait_chromalogs_desc: "Esta especie domina el arte del color y ha transcendido el simple camuflaje. Como resultado, ha evolucionado de manera que se puede comunicar a través de patrones dinámicos e intrincados que se muestran sobre sus cuerpos."
 trait_chromalogs_portrait_override_tt: "O cualquier especie que use la pigmentación de su cuerpo para comunicarse"
 trait_brittle: "Quebradizo"
 trait_brittle_desc: "Esta especie sufre una inherente fragilidad, por lo que tiene que extremar precauciones a la hora de llevar a cabo actividades diarias a fin de evitar romperse durante incluso las tareas más cotidianas."
 trait_familial: "Familiar"
 trait_familial_desc: "A esta especie le une una estrecha y duradera relación con sus parientes más cercanos, de ahí que forme colectivos muy eficientes y cohesionados."
 trait_familial_effect: "Felicidad por cada §Y100§! £pop£ poblaciones con este rasgo en el mismo planeta: §G0,1%§! (máx.: §G+20%§!)"
 trait_familial_portrait_override_tt: "O cualquier especie familiar"
 trait_permeable_skin: "Piel permeable"
 trait_permeable_skin_desc: "Esta especie está recubierta por una piel desarrollada con fines específicos y que requiere unas condiciones ideales. Mientras esta especie no se aleje mucho de su clima natal, eso no debería ser un problema."
 trait_permeable_skin_effect: "Habitabilidad en planetas con una ['concept_climate_category'] diferente a nuestras preferencias: §R-20%§!"
 concept_climate_category: "Categoría climática"
 concept_climate_category_desc: "Los planetas habitables se dividen en tres categorías climáticas:\n- Húmedo:\n$t$- Continental\n$t$- Oceánico\n$t$- Tropical\n- Frío:\n$t$- Alpino\n$t$- Ártico\n$t$- Tundra\n- Seco:\n$t$- Árido\n$t$- Desierto\n$t$- Sabana"
 trait_genetic_memory: "Memoria genética"
 trait_genetic_memory_desc: "El inicio de muchas civilizaciones se ha producido al pasar conocimientos y aprendizajes de una generación a otra. Esta especie ha ido un paso más allá al codificar conocimientos de supervivencia directamente en su código genético, lo que garantiza que cada generación nazca con la sabiduría acumulada de sus antepasados."
 trait_genetic_memory_effect: "Habitabilidad por edad de la colonia: §G+0,5%§! por año (§G+25%§! máx.)"
 trait_genetic_memory_portrait_override_tt: "O cualquier especie con instintos de supervivencia heredados"
 trait_nascent_stage: "Etapa incipiente"
 trait_nascent_stage_desc: "Esta especie da a luz en una etapa temprana de su desarrollo, lo cual da como resultado periodos prolongados durante los que las crías son incapaces de contribuir a la sociedad. Durante este tiempo, permanecen ajenas a las responsabilidades y cargas que conlleva la sapiencia."
 trait_nascent_stage_effect: "Las poblaciones recién nacidas que tengan este rasgo pasarán §Y5§! años tras su crecimiento como preinteligentes."
 trait_nascent_stage_portrait_override_tt: "O cualquier especie con una infancia prolongada"
 trait_presapient_stage: "Presintiente"
 trait_presapient_stage_desc: "Tras un breve periodo sin pensamiento consciente, esta especie no tardará en transformarse en un ser totalmente inteligente."
 trait_flight: "Vuelo"
 trait_flight_desc: "Esta especie se eleva por encima de los límites de la tierra y navega libremente por los cielos. Sus ciudades cuentan con diseños únicos y frondosos que están optimizados para habitantes aéreos. En los conflictos, se muestra elusiva y es un objetivo difícil."
 trait_flight_portrait_override_tt: "O cualquier especie adaptada a la vida aérea"
 trait_spatial_mastery: "Maestría espacial"
 trait_spatial_mastery_desc: "Esta especie no solo es capaz de volar, sino que, además, posee adaptaciones cerebrales únicas que le permite procesar y navegar espacios tridimensionales de forma instintiva. Estas capacidades hacen que no tenga rival a la hora de planificar batallas, estudiar planetas y gestionar ciudades."
 trait_spatial_mastery_portrait_override_tt: "O cualquier especie dotada con navegación tridimensional"
 trait_spare_organs: "Órganos de repuesto"
 trait_spare_organs_desc: "A esta especie le han crecido órganos de más para sobrevivir a las lesiones más graves; una adaptación exitosa, como demuestra su existencia continuada."
 trait_spare_organs_effect: "Los líderes sobrevivirán a su primera muerte\nAl morir el ejército ofensivo: §G20%§! de probabilidades de regenerar un ejército de reemplazo\n£job_livestock£Rendimiento de §Y$job_livestock$§!: §G+50%§!"
 mod_planet_livestock_produces_mult: "Rendimiento de £job_livestock£ §Y$job_livestock$§!"
 trait_leader_second_chanced: "Segunda oportunidad"
 trait_leader_second_chanced_desc: "Este líder se salvó de una muerte segura gracias a su biología única. No volverá a suceder."
 #################################
 #Evolutionary Predators Origin #
 #Written by Victor Haeggman  #
 #################################
 #Origin and Start of Game
 origin_evolutionary_predators: "Depredadores evolutivos"
 origin_evolutionary_predators_desc: "§RAVISO: Bloquea todos los caminos de ascensión, excepto ['concept_mutation_ascension'].§!\n\nEsta especie siempre ha cazado a las criaturas más excepcionales, guiada por un instinto que jamás comprendió bien del todo. Posee una insólita capacidad para integrar los genes de sus presas, de ahí que se convirtiera en el superdepredador de su mundo al absorber todas las ventajas genéticas disponibles. Su hambre le ha conducido ahora a las estrellas."
 origin_tooltip_evolutionary_predators_effects: "- $SPECIES_TRAITS$ ['concept_malleable_genes']\n- Situación: ['concept_adaptive_evolution']\n- Mundo natal: ['concept_genetic_soup']"
 START_SCREEN_EVOLUTIONARY_PREDATORS_BASE: "Los [GetSpeciesNamePlural] siempre han sido cazadores. Buscamos presas en cualquier rincón posible, desafiando incluso los entornos más extremos con tal de probar algo nuevo. Cuando eres lo que comes, ningún esfuerzo es en vano.\n\n"
 START_SCREEN_EVOLUTIONARY_PREDATORS_REGULAR: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Siempre hemos sabido que la carne de nuestra presa nos moldea; cada caza y cada asesinato nos ha hecho más fuertes.\n\nNuestro pasado violento no es una carga, sino la esencia de nuestro ser. Nos hemos refinado a través de la lente de la ciencia moderna, así que ya no necesitamos darnos un festín para evolucionar; basta con un mero rastro de material genético para entretejer su fuerza con la nuestra.\n\nEl ansia por evolucionar sigue latente en nosotros, y con el surgimiento del [GetStartingDrive], estamos listos para acechar la galaxia y saborear todo lo que tiene que ofrecer."
 START_SCREEN_EVOLUTIONARY_PREDATORS_HIVE: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Nuestra inteligencia compartida siempre ha comprendido el potencial de nuestra genética: podemos absorber y adaptar la esencia de nuestra presa e integrar sus puntos fuertes a nuestro colectivo.\n\nAún conservamos ese instinto depredador primitivo, aunque ahora está equilibrado y controlado. Ya no necesitamos cazar para evolucionar; nuestros laboratorios pueden sintetizar cualquier material genético y distribuirlo sin problemas por nuestra colmena.\n\nCon la llegada del [GetStartingDrive], estamos listos para esparcirnos por la galaxia y saborear todo lo que tiene que ofrecer."
 START_SCREEN_EVOLUTIONARY_PREDATORS_DEVOURING_SWARM: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Nos dimos cuenta de nuestra necedad cuando consumimos la última forma de vida de [GetHomeWorldName]. ¿Cómo vamos a conseguir ahora nuevas adaptaciones? Así que miramos hacia arriba.\n\nSomos los últimos depredadores. Otros cazan para sobrevivir, pero nosotros lo hacemos para perfeccionarnos a nosotros mismos.\n\nCon la llegada del [GetStartingDrive], estamos listos para salir al acecho una vez más. La galaxia es inmensa y está llena de alimento."
 #Traits
 trait_malleable_genes: "Genes modificables"
 trait_malleable_genes_desc: "§LEsta especie no se adhiere estrictamente a unas características y órganos identificables como el resto de especies, sino que desarrollan el mejor apéndice para hacer el trabajo. Sin embargo, esta inestabilidad tiene inconvenientes.§!"
 trait_malleable_genes_cant_modify: "§RLas especies con este rasgo no pueden modificarse genéticamente§!\n$automodding_trait_tooltip_all$ §Y$trait_malleable_genes$§! escoge modificadores de ['concept_automodding_malleable']"
 CANNOT_MODIFY_MALLEABLE_GENES_SPECIES: "$TRIGGER_FAIL$Esta especie no puede modificarse genéticamente debido a la inestabilidad de sus genes."
 concept_malleable_genes: "$trait_malleable_genes$"
 concept_malleable_genes_desc: "$trait_malleable_genes_cant_modify$"
 concept_automodding_malleable: "Lista de rasgos de automodificación de genes modificables"
 concept_automodding_malleable_desc: "- ['trait:trait_malleable_minerals']\n- ['trait:trait_malleable_energy']\n- ['trait:trait_malleable_food']\n- ['trait:trait_malleable_research']\n- ['trait:trait_malleable_unity']\n- ['trait:trait_malleable_forge']\n- ['trait:trait_malleable_trade']\n- ['trait:trait_malleable_ameneties']"
 concept_adaptive_evolution: "Evolución adaptativa"
 concept_adaptive_evolution_desc: "La situación avanza cuando se consume el ADN de otras formas de vida.\n§GAl completarse:§!\n$t$- Escoge un nuevo rasgo basado en la última especie consumida\n§YProgreso:§!\n$t$- Colonizar nuevos planetas\n$t$- Purgar otras especies o mantenerlas como ganado\n$t$- Mantener a otras especies dentro de tu imperio como esclavas o en un nivel más alto\n$t$- Emplear a líderes alienígenas en tu Consejo\n$t$- Mantener vasallos biológicos\n$t$- Formar pactos comerciales como una megacorporación\n$t$- Encontrar vida alienígena gracias a eventos"
 concept_genetic_soup: "$genetic_soup$"
 concept_genetic_soup_desc: "$fresh_biosphere_tt$\n\n§L$genetic_soup_desc$§!"
 trait_malleable_minerals: "Garras modificables"
 trait_malleable_minerals_desc: "§LCon falanges de dureza diamantina, esta adaptación permite una mejor extracción de los minerales.§!"
 trait_malleable_energy: "Aislantes modificables"
 trait_malleable_energy_desc: "§LUna gruesa capa aislante protege contra accidentes, concretamente en entornos de gran energía.§!"
 trait_malleable_food: "Barredora modificable"
 trait_malleable_food_desc: "§LApéndice adicional con una falange endurecida en forma de pala que acelera la plantación y el labrado. Estas barredoras modificables se adaptan a diferentes tipos de terreno y son la herramienta perfecta para este trabajo.§!"
 trait_malleable_research: "Córtex modificable"
 trait_malleable_research_desc: "§LUna corteza central dilatada resulta algo incómoda, pero acelera enormemente la resolución de problemas y la innovación.§!"
 trait_malleable_unity: "Órganos sensoriales modificables"
 trait_malleable_unity_desc: "§LLos órganos sensoriales mejorados facilitan un mayor entendimiento y apreciación de las distintas perspectivas. Antes de poder prosperar, tienes que observar.§!"
 trait_malleable_forge: "Durezas modificables"
 trait_malleable_forge_desc: "§LTener callosidades de mayor dureza resulta un rasgo valiosísimo a la hora de manipular materiales ardientes o corrosivos.§!"
 trait_malleable_trade: "Feromonas modificables"
 trait_malleable_trade_desc: "§LLas feromonas altamente adaptativas pueden resultar muy persuasivas durante las negociaciones.§!"
 trait_malleable_ameneties: "Armónicos modificables"
 trait_malleable_ameneties_desc: "§LUna serie de agujeros bien calibrados permite que esta especie produzca sonidos relajantes y armoniosos con solo moverse.§!"
 #Democratic Effects
 concept_genetic_electorate_effect: "Efecto del electorado genético"
 concept_genetic_electorate_effect_desc: "$trait_malleable_imperialist_effect$\n$trait_malleable_isolationist_effect$\n$trait_malleable_progressive_effect$\n$trait_malleable_prosperity_effect$\n$trait_malleable_supremacist_effect$\n$trait_malleable_technologist_effect$\n$trait_malleable_totalitarian_effect$\n$trait_malleable_traditionalist_effect$\n$trait_malleable_xenoist_effect$\n$trait_malleable_manifesti_effect$"
 trait_malleable_imperialist_effect: "Efecto de §Yfacción dominante§! (imperialista):\n$t$$mod_planet_jobs_alloys_produces_mult$: §G+10%§!"
 trait_malleable_isolationist_effect: "Efecto de §Yfacción dominante§! (aislacionista):\n$t$$mod_planet_jobs_unity_produces_mult$: §G+10%§!"
 trait_malleable_progressive_effect: "Efecto de §Yfacción dominante§! (progresista):\n$t$£happiness£ Felicidad: §G+10%§!"
 trait_malleable_prosperity_effect: "Efecto de §Yfacción dominante§! (prosperidad):\n$t$$r_trade$ por £job£ trabajos: §G+20%§!"
 trait_malleable_supremacist_effect: "Efecto de §Yfacción dominante§! (supremacista):\n$t$$mod_planet_jobs_specialist_produces_mult$: §G+5%§!\n$t$$mod_planet_jobs_ruler_produces_mult$: §G+5%§!"
 trait_malleable_technologist_effect: "Efecto de §Yfacción dominante§! (tecnóloga):\n$t$£research£ Investigación de £job£ trabajos: §G+10%§!"
 trait_malleable_totalitarian_effect: "Efecto de §Yfacción dominante§! (totalitaria):\n$t$£pop_cat_worker£ $mod_pop_cat_worker_bonus_workforce_mult$: §G+15%§!"
 trait_malleable_traditionalist_effect: "Efecto de §Yfacción dominante§! (tradicionalista):\n$t$£pop£ $MOD_POP_HOUSING_USAGE_ADD$: §G-0,5§!"
 trait_malleable_xenoist_effect: "Efecto de §Yfacción dominante§! (xenoísta):\n$t$Habitabilidad §G+15%§!"
 trait_malleable_manifesti_effect: "Efecto de §Yfacción dominante§! (manifiesto):\n$t$£pop£ $MOD_POP_AMENITIES_USAGE_BASE$: §G-1§!"
 #Dictatorial Effects
 trait_ruler_apex_predator: "Depredador alfa"
 trait_ruler_apex_predator_desc: "Un pueblo definido por la depredación evolutiva no permitiría que nadie más que sus miembros más adaptables lo lideraran. Este gobernante supremo no solo cosecha los genomas de los enemigos derrotados, sino que también se apropia de su astucia y determinación, convirtiendo cada victoria en un paso hacia el dominio perfecto."
 trait_ruler_apex_predator_tt: "Gana ['concept_apex_predator_effects',conocimientos] adicionales por ['concept_apex_predator_victories']."
 concept_apex_predator_effects: "Conocimientos de depredador alfa"
 concept_apex_predator_effects_desc: "§YHumanoides§!: $mod_country_trade_produces_mult$ §G+5%§!\n§YMamíferos§!: $MOD_LOGISTIC_GROWTH_MULT$ §G+5%§!\n§YReptiloides§!: $MOD_SHIP_SHIELD_HARDENING_ADD$ §G+5%§!\n§YAviarioides§!: $MOD_SHIP_EVASION_ADD$ §G5%§!\n§YArtropoides§!: $MOD_SHIP_ARMOR_HARDENING_ADD$ §G+5%§!\n§YMoluscoides§!: $MOD_SHIP_SENSOR_RANGE_ADD$ §G+1§!\n§YFungoides§!: $mod_country_food_produces_mult$ §G+5%§!\n§YPlantoides§!: $mod_country_energy_produces_mult$ §G+5%§!\n§YLitoideos§!: $mod_country_minerals_produces_mult$ §G+5%§!\n§YNecroides§!: $MOD_PLANET_CRIME_ADD$ §G-10§!\n§YAcuáticos§!: $MOD_SHIP_HULL_ADD$ §G+100§!\n§YToxoides§!: $mod_country_exotic_gases_produces_mult$ §G+10%§!\n§YTermófilos§!: $mod_country_alloys_produces_mult$ §G+5%§!\n§YMáquinas§!: $mod_country_alloys_produces_mult$ §G+5%§!"
 concept_apex_predator_victories: "Victorias de depredador alfa"
 concept_apex_predator_victories_desc: "El depredador alfa crece cuando:\n$t$Vence en §Yguerras§!\n$t$§YSomete§! a otros\n$t$Provoca que las resoluciones de la §Ycomunidad galáctica§! fracasen"
 APEX_PREDATOR_GAINED_TITLE: "Depredador alfa"
 MESSAGE_APEX_PREDATOR_GAINED: "Nuestro depredador alfa $LEADER|Y$ ha derrotado a los §Y[This.GetApexDefeatedSpecies]§! y ha aumentado de tamaño."
 #Hive Effects
 EVOPRED_TERRAFORM_STARTED_TITLE: "Terraformación en marcha"
 MESSAGE_EVOPRED_TERRAFORM_STARTED: "Hemos dado comienzo al proceso para terraformar $PLANET|Y$ en un §Ymundo colmena§!."
 decision_evopred_no_hive_world: "Evitar el crecimiento del mundo colmena"
 decision_evopred_no_hive_world_desc: "Es mejor que algunos mundos no pasen a formar parte del colectivo."
 evopred_no_hive_world_tt: "Evita que nuestra §Yautoridad§! convierta esto en un §Ymundo colmena§!."
 decision_evopred_hive_world: "Permitir el crecimiento del mundo colmena"
 decision_evopred_hive_world_desc: "Este planeta es digno de ser parte de nosotros."
 evopred_hive_world_tt: "Permite que nuestra §Yautoridad§! convierta esto en un §Ymundo colmena§!."
 #Situation
 evolutionary_predators_situation: "Evolución adaptativa"
 evolutionary_predators_situation_type: "Evolución adaptativa"
 evolutionary_predators_situation_desc: "Los ['concept_evopred_genetic_insights'] únicos se analizan y se divulgan a medida que encontramos nuevas especies. Cuando hayamos terminado, evolucionaremos y añadiremos de forma permanente un nuevo §Yrasgo de especie§! positivo a nuestro código genético."
 evolutionary_predators_situation_monthly_change_tooltip: "El progreso de esta §Ysituación§! depende de cuántos ['concept_evopred_genetic_insights'] consumamos. Puede progresar más rápido en función del §Yenfoque§!."
 evolutionary_predators_situation_outcome: "Obtendremos un nuevo rasgo de especie permanente en función del material genético que hayamos consumido. [Owner.GetConsumedGenes]"
 evopred_outcome_list: "\nHemos consumido:[GetHumanoidGenes][GetMammalianGenes][GetReptilianGenes][GetAvianGenes][GetArthropoidGenes][GetMolluscoidGenes][GetFungoidGenes][GetPlantoidGenes][GetLithoidGenes][GetNecroidGenes][GetAquaticGenes][GetToxoidGenes][GetInfernalGenes]"
 humanoid_genes_list: "\n$t$['concept_humanoid_genes']"
 mammalian_genes_list: "\n$t$['concept_mammalian_genes']"
 reptilian_genes_list: "\n$t$['concept_reptilian_genes']"
 avian_genes_list: "\n$t$['concept_avian_genes']"
 arthropoid_genes_list: "\n$t$['concept_arthropoid_genes']"
 molluscoid_genes_list: "\n$t$['concept_molluscoid_genes']"
