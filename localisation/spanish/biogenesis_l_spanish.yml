 voidspawn_boss_buffs: "Poder primario"
 voidspawn_system_mod: "Tormenta del vacío"
 voidspawn_colony_mod: "Conflicto colonial"
 voidspawn_colony_mod_desc: "Los mundos se descomponen a la sombra del engendro del vacío anciano."
 VOIDSPAWN_FORCE_DECLINE: "§RPoblación en declive§!"
 elder_voidspawn_chain_title: "Engendro del vacío desenfrenado"
 elder_voidspawn_chain_desc: "Hay un enorme engendro del vacío surcando la galaxia. Quiere cazar grandes gigantes, así que, si los matamos por él, puede que nos deje en paz.\n\nOBJETIVO: Encuentra y mata a todos los gigantes de nivel 4 de la galaxia."
 behemoth_victory_chain_title: "Rey de los monstruos"
 behemoth_victory_chain_desc: "Efectuada la fusión mental, ya solo nos separan de nuestras ambiciones unos pocos pasos. Debemos aclimatarnos a nuestro nuevo cuerpo común y seguir trasvasando las mentes de nuestro pueblo. No obstante, más importante aún es que aplastemos a cualquier rival que ose hacernos sombra, sea quien sea.\n\n§HOBJETIVOS§!:\n- Buscar a otros gigantes de nivel 4 que haya en la galaxia y acabar con ellos\n- Completar la situación Dolor creciente\n- Aniquilar al engendro del vacío anciano"
 behemoth_transference: "Transferencia de gigante"
 behemoth_transference_desc: "El vínculo que ahora existe entre la bestia y nuestra población arroja una nueva luz sobre la existencia planetaria, una de inutilidad en comparación con convertirse en uno con la bestia. Ahora todos anhelan la unidad con la bestia y se sienten... hambrientos."
