 unlocks_ship_2_bio: "Desbloquea la tecnología para las naves §YMacero§! y §YTejedor§! del imperio caído."
 menp_cosmo_ship_2_desc_bio: "Al distorsionar la relación espacio-tiempo, estas naves trascienden las limitaciones normales. Sus estructuras compactas ocultan capacidades que ninguna nave que respete las leyes de la física puede igualar."
 menp_cosmo_ship_3_desc_bio: "$tech_cosmogenesis_harbinger_desc$"
 unlocks_ship_3_bio: "Desbloquea la tecnología para la nave §YHeraldo§! del imperio caído."
