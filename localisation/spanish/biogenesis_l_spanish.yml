 #Mutation
 auth_mutation_habitability_tt: "Las especies orgánicas pueden llegar al §G175%§! de habitabilidad."
 auth_bio_democratic_mutation: "Libertad biodiversa"
 auth_bio_democratic_mutation_desc: "Esta sociedad sostiene el principio de que el cuerpo de cada individuo es su templo, totalmente bajo su propio diseño y control. Dentro de un marco de libertad y apoyo inquebrantable, los ciudadanos gozan de plena potestad para extraer todo su potencial y moldearse a sí mismos y a su futuro como mejor les parezca."
 auth_bio_oligarchic_mutation: "Mando catalítico"
 auth_bio_oligarchic_mutation_desc: "El poder se concentra en manos de una élite dotada de mutaciones genéticas superiores que le confieren una autoridad inigualable. Operan más allá de los límites del derecho común y ejercen sus habilidades para proteger y guiar a la sociedad, tomando todas las medidas que se consideren necesarias para garantizar su supervivencia y prosperidad."
 auth_bio_dictatorial_mutation: "Mando híbrido"
 auth_bio_dictatorial_mutation_desc: "La mutación genética es la clave del avance en este modelo de sociedad. A quienes se conforman con permanecer tal y como los creó la naturaleza se les sentencia de inmediato a internamiento o muerte, de manera que tan solo los individuos superiores en lo que a genética respecta contribuyen a la incansable búsqueda de la perfección de la especie."
 auth_bio_dictatorial_mutation_tt: "\n£crime£ Crimen por [enforcer.GetIcon] [enforcer.GetName]s: §G-5§!\n$auth_mutation_habitability_tt$"
 auth_bio_imperial_mutation: "Expansionista del genoma"
 auth_bio_imperial_mutation_desc: "Adepto del poder impredecible de la mutación aleatoria, este imperio extrae de su población un potencial inaudito que propicia avances y habilidades inaccesibles con métodos tradicionales. En la carrera por el dominio, el caos de la mutación es su mejor recurso, e impulsa al imperio a una supremacía sin par."
 auth_bio_corporate_mutation: "Préstamo de órganos"
 auth_bio_corporate_mutation_desc: "En virtud de esta autoridad, la financiación de órganos y partes del cuerpo se pone a disposición del público mediante planes de pago flexibles. En caso de adeudo, la entidad se reserva el derecho de recuperar el elemento prestado o incautar un bien designado como garantía. Este sistema fomenta un ciclo de suministro y demanda constantes que hace de las partes corporales bienes de mercado y compromiso."
 auth_bio_corporate_mutation_tt: "$organic_leaders_have_trade_upkeep$\n$r_trade$ por £pop£ poblaciones de $pop_group_unit$ por ['trait:trait_spare_organs']: §G+0,5§!\n$auth_mutation_habitability_tt$"
 auth_bio_democratic_evopred: "Electorado genético"
 auth_bio_democratic_evopred_desc: "Esta sociedad ha adquirido un control parcial, aunque difícil de gestionar, de su genoma maleable. El pueblo decidirá cómo se manifiestan sus mutaciones."
 auth_bio_democratic_evopred_tt: "$auth_bio_evopred_tt$\nAñade ['concept_genetic_electorate_effect', efectos] adicionales a ['trait:trait_malleable_genes'] en función de cuál ['concept_faction'] sea más fuerte\nAumenta §G+100%§! el progreso de ['concept_adaptive_evolution'] en el caso de §Yespecies§! alienígenas esclavas o en una situación mejor"
 auth_bio_oligarchic_evopred: "Biomagnates"
 auth_bio_oligarchic_evopred_desc: "Esta sociedad se ha zafado del tiempo y su decadencia. Gracias a una selección de los ejemplares genéticos más prístinos, las élites dominantes gozan de una existencia atemporal. Sin embargo, basta un paso en falso para perder esa eternidad vital y, para los de abajo, la ambición y la evolución son dos caras de una misma moneda..."
 auth_bio_oligarchic_evopred_tt: "$auth_bio_evopred_tt$\nLos consejeros son §Yinmortales§!"
 auth_bio_dictatorial_evopred: "Principado de supremacía"
 auth_bio_dictatorial_evopred_desc: "Una civilización fruto de una evolución constante y regida por los designios de una mente suprema. No existe Consejo ni constitución que eclipse la voluntad superior del principado. Aquí, cada victoria genética impulsa la ascensión al trono."
 auth_bio_dictatorial_evopred_tt: "$auth_bio_evopred_tt$\nRasgo de gobernador: ['leader_trait:trait_ruler_apex_predator']"
 apex_predator_male: "$trait_ruler_apex_predator$"
 apex_predator_female: "$trait_ruler_apex_predator$"
 auth_bio_imperial_evopred: "Dinastía inmortal"
 auth_bio_imperial_evopred_desc: "En la $auth_bio_imperial_evopred$, el pasado no descansa, se consume. Cada generación nutre a la siguiente, mientras los restos de los líderes fallecidos sostienen el gobierno eterno del imperio. El servicio conlleva sacrificio y, tras la muerte, todo súbdito se entrega al legado común como lo hicieron sus ancestros."
 eternal_ancestor_male: "$eternal_ancestor_female$"
 eternal_ancestor_female: "Antepasada eterna"
 auth_bio_imperial_evopred_tt: "$auth_bio_evopred_tt$\nPermite al gobernante consumir a grandes líderes cuando mueren."
 auth_bio_corporate_evopred: "Biodepredación GLC" #Galactic Limited Incorporated
 auth_bio_corporate_evopred_desc: "En Biodepredación GLC, la clave del progreso es la adaptación, tanto genética como económica. Con cada nuevo genoma agregado a la cartera corporativa, la megacorporación refina su posición en el mercado, adaptando productos y negociaciones a la biología única de cada especie. Al fin y al cabo, cuando se conoce bien al cliente, las ventas se cierran de forma prácticamente… instintiva."
 auth_bio_corporate_evopred_tt: "$auth_bio_evopred_tt$\n$organic_leaders_have_trade_upkeep$\nEfectividad de los pactos comerciales por cada rasgo de especie: §G+1%§!\nAumenta un §G+100%§! el progreso de la ['concept_adaptive_evolution'] por §Ypactos comerciales§!"
 auth_bio_hive_mind_evopred: "Consciencia quimérica"
 auth_bio_hive_mind_evopred_desc: "Esta mente colmena se ha cansado de transformarse sin más. Cada colonia asimilada entra a formar parte de un mosaico viviente, una amalgama de paisajes y carne que cambia constantemente. Los confines se disuelven poco a poco en la consciencia quimérica, y sus criaturas y mundos se vuelven uno."
 auth_bio_hive_mind_evopred_tt: "$auth_bio_evopred_tt$\nTerraforma colonias automáticamente para convertirlas en §Ymundos colmena§!\nAumenta §G+100%§! el progreso de ['concept_adaptive_evolution'] al purgar §Yespecies§! alienígenas"
 auth_bio_evopred_tt: "$EMPIRE_SIZE$ de poblaciones por cada rasgo de especie: §G-1%§!\n$auth_mutation_habitability_tt$"
 #Hive Advanced Authorities
 auth_bio_hive_purity: "Paradigma de pureza"
 auth_bio_hive_purity_desc: "Esta colmena florece gracias a una pureza genética que asegura que cada dron se ciña a la plantilla biológica ideal. La manipulación genética de precisión incentiva la unidad y reafirma el poder colectivo, creando una fuerza imparable perfeccionada para la eficiencia y la supervivencia."
 auth_bio_hive_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £unity£ $unity$ que se produce por $pop_group_unit$ £pop£ poblaciones: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_hive_cloning: "Horda replicadora"
 auth_bio_hive_cloning_desc: "Avanzadas tecnologías de clonación facilitan la producción de drones genéticamente idénticos, todos ellos creados a conciencia para conseguir una eficacia y una unidad perfectas. Fieles a su impulso innato de multiplicarse y propagarse, esta colmena eclipsará el mismísimo firmamento."
 auth_bio_hive_cloning_tt: "$ENABLES_BACKUP_CLONES$\nLa ['concept_clone_leader_degradation', degradación de clones] se reduce en £society£['technology:tech_node_culling_1']"
 tech_node_culling_1_cloning: "$tech_node_culling_1$"
 tech_node_culling_1_cloning_desc: "$tech_node_culling_1_desc$"
 REDUCED_CLONE_DEGRADATION_TITLE: "§HDesbloquea la función:§! Degradación de clones reducida"
 REDUCED_CLONE_DEGRADATION_DESC: "Los §Y$leader_trait_backup_clone_default_plural$§! sufren menos ['concept_clone_leader_degradation', degradación]."
 auth_bio_hive_mutation: "Dominio adaptable"
 auth_bio_hive_mutation_desc: "Los drones hiperadaptativos de esta colmena forman una fuerza dinámica y en constante evolución, pues aprovechan la mutación constante para superar los desafíos ambientales y tácticos. Cada adaptación fortalece el colectivo, dotando a la mente colmena de una versatilidad y una resistencia sin precedentes que le permiten prosperar en las condiciones más inhóspitas."
 concept_auth_bio_hive_purity: "Paradigma de pureza"
 concept_auth_bio_hive_cloning: "Horda replicadora"
 concept_auth_bio_hive_mutation: "Dominio adaptable"
