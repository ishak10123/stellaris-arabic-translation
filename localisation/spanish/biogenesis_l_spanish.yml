 bio.1005.name: "Capacidad retenida"
 bio.1005.desc: "Nuestra especie es cada vez más compleja. Tras recorrer las estrellas en busca de nuevo material genético, ya estamos listos para adoptar un nuevo aspecto. Gracias a los grandes esfuerzos de nuestros [Owner.GetScientistPlural], ahora tenemos una opción.\n\nSea cual sea la decisión que tomemos, esta afectará al futuro de los [Owner.GetSpeciesName] durante generaciones."
 bio.1005.tt: "Añade un nuevo rasgo de especie a nuestra especie principal"
 bio.1005.pop_growth: "¡Nuestra especie tiene que crecer más rápido!"
 bio.1005.pop_output: "¿Podemos volvernos más productivos?"
 bio.1005.leader: "Nuestros líderes tienen que contar con cualquier ventaja."
 bio.1005.habitability: "Tenemos que adaptarnos a los climas cambiantes."
 bio.1005.upkeep: "Reducid el mantenimiento requerido para sustentar a nuestro pueblo."
