 bio.1050.name: "Al acecho"
 bio.1050.desc: "Nuestros agentes están merodeando los asentamientos de los [Target.GetSpeciesName] y pronto podrán acceder a sus estructuras. Todo a su debido tiempo. Somos una raza paciente; los mejores cazadores nunca se precipitan."
 bio.1055.name: "Preparados"
 bio.1055.desc: "Nuestra presa está a la vista. Los cazadores que enviamos para que se infiltraran en [Target.GetName] están confiados. Pronto obtendrán acceso a la residencia de los [Target.GetSpeciesName] y a todo el maravilloso ADN que hay en ella."
 bio.1060.name: "Abalanzar"
 bio.1060.desc: "Nuestros agentes están preparados. Han podido acceder a la residencia de los [Target.GetSpeciesName] y han conseguido un camuflaje acorde. Como es lógico y natural en cualquier buen cazador, también han asegurado varias rutas de escape, algunas más aceptables que otras. Sería una desgracia que tuviéramos que hacer uso de las alcantarillas."
 bio.1065.name: "Genes robados"
 bio.1065.desc: "¡Ya está! Nuestros agentes han escapado con una buena cantidad de material genético. Estamos seguros de que se producirán importantes avances en nuestra próxima mutación. Igual le cogemos el gustillo a los [From.Target.GetSpeciesName] y todo."
