 ### Behemoth Crisis ###
 ap_behemoths: "Furia de gigante"
 ap_behemoths_desc: "Los depredadores más temibles de las estrellas no están sujetos a ridículas limitaciones. Con el mismo espíritu, nos despojaremos de las debilidades biológicas que nos frenan y nos convertiremos en una fuerza de la naturaleza."
 must_use_bioships: "£trigger_no£ Requiere el uso de un conjunto de naves §Ybiológicas§!."
 behemoth_crisis_chain_title: "Crisis gigante"
 behemoth_crisis_chain_desc: "Las estrellas no son más que el combustible de nuestra hambre, y la calamidad no es más que el suelo donde florece nuestra ambición. Desafiaremos el orden natural, forjando una bestia tan inmensa, tan imparable, que remodelará el cosmos."
 crisis_behemoth_level_1: "§HPreocupante§!"
 crisis_behemoth_level_1_desc: "Nivel de crisis 1"
 crisis_behemoth_level_2: "§HRiesgo§!"
 crisis_behemoth_level_2_desc: "Nivel de crisis 2"
 crisis_behemoth_level_3: "§HPeligro§!"
 crisis_behemoth_level_3_desc: "Nivel de crisis 3"
 crisis_behemoth_level_4: "§HCatástrofe§!"
 crisis_behemoth_level_4_desc: "Nivel de crisis 4"
 crisis_behemoth_level_5: "§HAmenaza existencial§!"
 crisis_behemoth_level_5_desc: "Nivel de crisis 5"
 behemoth_crisis_level_5_req_tooltip: "£trigger_no£ Ha completado el proyecto especial §Y$BEHEMOTH_CRISIS_SPECIAL_PROJECT_4$§! §H$become_the_crisis_chain$§!"
 feral_insight: "Conocimiento salvaje"
 feral_insight_name: "$feral_insight$:"
 feral_insight_value: "£feral_insight£ $VAL|0$"
 feral_insight_current_value: "Valor actual: §Y$VALUE|0$§!"
 feral_insight_gaining: "Completa §Hobjetivos de crisis§! para conseguir más £feral_insight£ §Y$feral_insight$§!."
 feral_insight_desc: "Estamos estudiando la alimentación y los ciclos conductuales de los megaorganismos."
 feral_insight_crisis_objective: "Objetivos de la crisis"
 feral_insight_crisis_objective_gained: "$feral_insight$ obtenido"
 feral_insight_crisis_objective_reward: "$REWARD$"
 feral_insight_crisis_objective_progress: "Hemos conseguido $AMOUNT$ £feral_insight£ con este objetivo de crisis."
 feral_insight_crisis_description_title: "Crisis gigante"
 feral_insight_crisis_description: "$menace_crisis_description_intro$\n\nLos leviatanes que moran en el vacío son criaturas formidables de un poder sin igual, si bien adolecen de propósito y ambición. La unión de su portentosa fisiología con nuestra fortaleza mental daría lugar a una nueva generación de fauna espacial que nos llevará a la supremacía galáctica."
 feral_insight_crisis_howto_title: "Gigantes de parto"
 feral_insight_crisis_howto: "Cumplir §Hobjetivos de crisis§! genera un £feral_insight£§Hconocimiento salvaje§! que nos permitirá desbloquear todo nuestro potencial biológico."
 feral_insight_crisis_level_unlocked: "En el nivel $LEVEL$, obtendrás las recompensas:\n"
 feral_insight_crisis_level_locked: "Se necesita para desbloquear este nivel:\n"
 feral_insight_crisis_level_unlock: "Tiene £feral_insight£ §Y$CURRENCY$§! de conocimiento salvaje"
 feral_insight_crisis_level_desc: "Para avanzar por los niveles de crisis, acumula £feral_insight£§Hconocimiento salvaje§!, investiga proyectos especiales de crisis y desarrolla a tu gigante."
 #Crisis Perks
 menp_behemoth_objectives: "Conocimiento salvaje"
 unlocks_behemoth_objectives: "Permite la acumulación de £feral_insight£ §Y$menp_behemoth_objectives$§! al completar §Hobjetivos de crisis§!.\n"
 menp_behemoth_objectives_desc: "Examinar el comportamiento del gigante ayudará a nuestro objetivo final de trascendencia. Nos desprenderemos de las restricciones biológicas que rigen la vida planetaria."
 menp_behemoth_bioship_1: "Quitina endurecida"
 menp_behemoth_bioship_1_desc: "Para soportar las inclemencias del espacio, precisamos un exterior resistente. La fortaleza externa nos permitirá sobrevivir hasta en las condiciones más adversas."
 menp_behemoth_society_1: "Pruebas aceleradas de campo"
 menp_behemoth_society_1_desc: "Los experimentos de laboratorio son un buen punto de partida, pero los verdaderos avances requieren pruebas prácticas de campo de alto riesgo."
 menp_behemoth_food_1: "Cultivos sobredimensionados"
 menp_behemoth_food_1_desc: "Saciar el voraz apetito de un gigante es una lucha cuesta arriba. La producción de alimentos genéticamente modificados a gran escala es solo el comienzo."
 menp_behemoth_egg: "Criaderos ciclópeos"
 unlocks_behemoth_egg: "Desbloquea la megaestructura §YHuevo de gigante§!.\n"
 menp_behemoth_egg_desc: "Para un huevo colosal, se necesita un criadero más colosal todavía. Este criadero orbital ha de colocarse a una distancia prudencial de la estrella a fin de acomodar las enormes proporciones que se necesitan para criar a un gigante."
 menp_behemoth_bioship_2: "Estimulación mejorada de glándulas"
 menp_behemoth_bioship_2_desc: "Gracias a unas sondas construidas para la ocasión, estimularemos las glándulas endocrinas del gigante de manera artificial para producir hormonas de crecimiento y acelerar su desarrollo."
 menp_behemoth_society_2: "Investigaciones transversales"
 menp_behemoth_society_2_desc: "En la intersección de la selección natural con la bioingeniería, ha nacido una fuerza sin parangón."
 menp_behemoth_food_2: "Sobrecarga de nutrientes"
 menp_behemoth_food_2_desc: "Saciar el voraz apetito de un gigante se antoja una quimera. La producción masiva de alimentos genéticamente modificados es solo el comienzo."
 menp_behemoth_hatchling: "Camada gigantesca"
 unlocks_behemoth_hatchling: "Nos permite §Ycriar§! huevos de gigante como megaestructuras.\n"
 menp_behemoth_hatchling_desc: "Una camada de gigantes abarca varios sistemas estelares. Nuestros vecinos galácticos respetarán la autonomía de nuestra prole o se convertirán en alimento."
 menp_behemoth_bioships_3: "Ciclos de crecimiento más rápidos"
 menp_behemoth_bioships_3_desc: "Acelerar el desarrollo de una fauna espacial gigante es esencial para consumar nuestro objetivo final. Nuestras infraestructuras han de desarrollarse en paralelo."
 menp_behemoth_society_3: "Maestría en bioingeniería"
 menp_behemoth_society_3_desc: "Gracias a unas rigurosas pruebas de ensayo y error, hemos mejorado nuestras competencias científicas. Ya podemos considerarnos los bioingenieros más destacados de la galaxia."
 menp_behemoth_mind_control: "Moldeando el pensamiento profundo"
 unlocks_behemoth_mind_control: "Nos permite influir en los pensamientos de los §Ygigantes§!.\n"
 menp_behemoth_mind_control_desc: "Nuestra inteligencia colectiva se inquieta y busca algo más grande y mejor. Nuestra ambición no conoce límites."
 menp_behemoth_hatchling_2: "Crecimiento desenfrenado"
 unlocks_behemoth_hatchling_2: "Permite a los §Ygigantes§! alimentados transformarse en crisálida para desarrollar aún más su poder y tamaño.\n"
 menp_behemoth_hatchling_2_desc: "La bestia se ha liberado. La criatura que otrora fue una simple cría se está convirtiendo rápidamente en una fuerza salvaje e implacable de la naturaleza."
 menp_behemoth_bioship_4: "Organismos más fuertes"
 menp_behemoth_bioship_4_desc: "Motivados por un hambre voraz y una furia inquebrantable, los gigantes están alcanzando un nivel de poder caótico. Sus armas biológicas están preparadas para causar estragos tanto en enemigos como en transeúntes."
 menp_behemoth_mutation_research: "Mutaciones gigantescas"
 unlocks_behemoth_mutation_research: "Desbloquea un §Yproyecto especial§! para moldear el desarrollo genético de los §Ygigantes§!.\n"
 menp_behemoth_mutation_research_desc: "Vamos a reorganizar el material genético de los gigantes durante su desarrollo para estimular los rasgos fisiológicos más beneficiosos."
 menp_behemoth_mind_control_2: "Despliegue de especímenes alfa"
 unlocks_behemoth_mind_control_2: "Estableceremos conexiones psíquicas más profundas con nuestros §Ygigantes§!.\n"
 menp_behemoth_mind_control_2_desc: "El pináculo de la perfección genética no se verá limitado por nuestras fronteras actuales. Ha de compartirse con el resto de la galaxia."
 menp_behemoth_mind_meld: "Fusión mental"
 unlocks_behemoth_mind_meld: "Asume el control total de un poderoso §Ygigante de clase IV§!, una criatura inigualable en su capacidad para dominar la galaxia.\n"
 menp_behemoth_mind_meld_desc: "Compartimos nuestra mente con el gigante, y el gigante comparte su mente con nosotros. Su ira es la nuestra. Hemos dejado que nos consuma y, a medida que la bestia se empacha con nuestra consciencia colectiva, sentimos su furia. La bestia se convierte en nosotros, y nosotros nos convertimos en la bestia."
 menp_behemoth_primal_roar: "Rugido primordial"
 unlocks_behemoth_primal_roar: "Invoca a la más mastodóntica de las bestias y desafíala por la soberanía del vacío.\n"
 menp_behemoth_primal_roar_desc: "Un furioso rugido primordial nos atraviesa, abrasa, desgarra y quema. La galaxia arderá en las llamas de nuestra ira."
 menp_behemoth_ever_hungry: "Hambre insaciable"
 unlocks_behemoth_ever_hungry: "Desbloquea la situación $behemoth_finale_situation$. Date un homenaje con esta galaxia para aumentar tu tamaño y poder y conviértete en el depredador estelar por excelencia.\n"
 menp_behemoth_ever_hungry_desc: "Nuestra agónica y constante necesidad de alimentarnos se ha convertido en nuestra única razón de ser. Por mucho que consumamos, en nuestro interior hay un agujero imposible de llenar. Necesitamos devorar una galaxia entera para paliar este sufrimiento."
 menp_behemoth_egg_2: "Progenie voraz"
 unlocks_behemoth_egg_2: "Otorga a los §Ygigantes de clase IV§! la capacidad de poner §Yhuevos§! y perpetuar su especie.\n"
 menp_behemoth_egg_2_desc: "Nuestras crías se atiborrarán con los restos de la galaxia. Su hambre no conoce límites. En la perpetuidad del tiempo, seguirán devorando."
 mod_shipclass_military_hull_mult: "Casco de naves militares"
 mod_country_resource_max_food_add: "Capac. de almacen. alimento"
 mod_starbase_shipyard_build_alloys_cost_mult: "Coste de aleaciones de naves"
