 #STAGE EVENTS
 bio.25.name: "Desarrollo colectivo" #STAGE ONE
 bio.25.desc.no_options: "El/La [owner.GetGovernmentName] se transforma. Estamos a punto de alcanzar todo nuestro potencial y somos conscientes de que esta empresa podría alterar nuestra misma esencia. El control de nuestra evolución es una tarea fundamental. Los cambios que implementemos se notarán en el futuro."
 bio.25.desc.has_options: "$bio.25.desc.no_options$\n\nHay que elegir un enfoque para la primera fase de nuestro desarrollo."
 bio.25.a: "$bio.5.a$"
 bio.25.b: "$bio.5.b$"
 bio.25.c: "$bio.5.c$"
 bio.30.name: "Convergencia de colmenas" #STAGE TWO
 bio.30.desc.no_options: "El control de nuestra propia evolución ha producido grandes cambios. Ahora poseemos un mayor entendimiento de los rasgos genéticos, la reproducción y la secuenciación del ADN.\n\nLa culminación de nuestros progresos está al alcance.\n\nPronto nos convertiremos en aquello que estamos destinados a ser."
 bio.30.desc.has_options: "$bio.30.desc.no_options$ Se nos presenta la oportunidad de seguir recorriendo nuestro camino actual o cambiar de enfoque."
 bio.30.a: "$bio.10.a$"
 bio.30.b: "$bio.10.b$"
 bio.30.c: "$bio.10.c$"
 bio.35.name: "Coalescencia evolutiva" #STAGE THREE
 bio.35.desc.no_options: "Estamos a punto de realizar un gran descubrimiento evolutivo. Muy pronto, deberemos tomar una decisión fundamental sobre el camino que emprenderemos para alcanzar todo nuestro potencial evolutivo."
 bio.35.desc.has_options: "$bio.35.desc.no_options$\n\nUna vez más, toca decidir nuestras prioridades."
 bio.35.a: "$bio.15.a$"
 bio.35.b: "$bio.15.b$"
 bio.35.c: "$bio.15.c$"
