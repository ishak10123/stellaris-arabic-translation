 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #PURITY
 bio.200.name: "Abrazando nuestro legado"
 bio.200.desc: "Además de concentrarnos en purificar nuestra genética, nos estamos dando cuenta de todas las cosas que hacen grande a nuestra civilización.\n\nAhora que somos más puros que nunca, estamos muy orgullosos de nuestra herencia superior.\n\nExpertos de todos los campos, las artes, la ciencia y los negocios, animan nuestros esfuerzos colectivos y esperan abrirnos el camino hacia la gloria."
 bio.200.a: "¡Celebraremos este hito financiando las artes!"
 bio.200.b: "La investigación científica debe ser siempre lo primero."
 bio.200.c: "El consumo es el núcleo de la economía."
 bio.210.name: "¡No seremos purificados!"
 bio.210.desc: "Los cánticos de los manifestantes resuenan en nuestras ciudades. Una facción rebelde de nuestro imperio ha decidido rechazar nuestra causa y apartarse de nuestro camino hacia la pureza.\n\nEstos alborotadores predican la supuesta necesidad de la diversidad genética y la integración cultural.\n\nSi su activismo sigue sin ser atajado, corremos el riesgo de que nuestro avance hacia la pureza se tambalee."
 bio.210.a: "¡Acabad con estos disidentes!"
 bio.210.b: "Aplacadlos con promesas vacías."
 bio.215.name: "Secretos del pasado"
 bio.215.desc: "Los arqueólogos han descubierto pruebas de una antigua civilización en nuestro mundo natal ancestral.\n\nSe ha descubierto una bóveda enterrada hace mucho tiempo, y en su interior hay pruebas sorprendentes de experimentos genéticos realizados en el pasado.\n\nSi esta noticia se hiciera pública, podría diluir nuestras modernas pretensiones de alcanzar la pureza genética."
 bio.215.a: "Integrad esta investigación con la nuestra. Construid sobre el pasado."
 bio.215.b: "Destruid las pruebas. Nadie debe saberlo."
 bio.220.name: "Ciencia extraña"
 bio.220.desc: "Hemos descubierto a [event_target:rogue_geneticist.GetName], genetista rebelde, realizando experimentos biológicos no autorizados. Eludiendo cualquier pauta de seguridad, su objetivo era crear una raza de seres superiores que encarnaran los ideales de pureza por los que luchamos, pero, en su lugar, ha dado a luz a una abominación.\n\nUna subespecie de criaturas de corta vida que comparte algunos aspectos de nuestro perfil genético, pero que en su mayoría son horrores plagados de enfermedades, se está marchitando bajo nuestra custodia. Aunque el estudio de su composición genética ha resultado fructífero, el pronóstico es terminal. [event_target:rogue_geneticist.GetName] no se arrepiente de sus actos."
 bio.220.a: "¡Que abandone su puesto inmediatamente!"
 bio.220.a.tt: "Hemos obligado a [event_target:rogue_geneticist.GetName] a renunciar a su puesto."
 bio.220.b: "\"Silenciad\" a [event_target:rogue_geneticist.GetName]."
 bio.220.c: "¡Este es justo el tipo de iniciativa que necesitamos!"
 bio.225.name: "¡Qué escándalo!"
 bio.225.desc: "El ADN de \"alta calidad\" se ha convertido en algo de lo que presumir, después de haber implementado pruebas genéticas periódicas para agilizar nuestro camino hacia la pureza e identificar los valores genómicos atípicos.\n\nSupuestamente, ciertos oficiales del imperio han estado mintiendo sobre su composición biológica, falsificando resultados de pruebas que sugieren que tienen más rasgos deseables de los que tienen en realidad. Si sale a la luz, esta ocultación de la verdad amenaza con indignar a la opinión pública."
 bio.225.a: "Necesitamos pruebas más precisas y fiables."
 bio.225.b: "Quizás este oficial cometió un error..."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #CLONING
 bio.230.name: "El dilema de los clones"
 bio.230.desc: "Los clones caminan entre nosotros. Viven en nuestras ciudades, trabajan en nuestras fábricas. Algunos ocupan incluso puestos de poder, dando forma a las políticas que rigen nuestras vidas.\n\nCon la integración de individuos clonados en nuestra sociedad, surgen muchas preguntas. ¿Cuáles son sus derechos? ¿Son iguales a los no clones o deberían mantenerse a raya como subordinados?"
 bio.230.a: "¡Ciudadanía plena para todos los clones!"
 bio.230.b: "En el mejor de los casos, son ciudadanos de segunda clase."
 bio.235.name: "¡Sabotaje en la fábrica de clones!"
 bio.235.desc: "La producción de clones en una de nuestras instalaciones más productivas se ha detenido repentinamente debido a un incidente que ha causado importantes daños.\n\nComo muchas de nuestras operaciones están automatizadas en aras de la eficacia, no hubo nadie que interviniera en el momento clave que provocó la perturbación.\n\nRecién salido de la cinta transportadora, uno de los clones resbaló y quedó atrapado en los mecanismos, triturándolos, provocando un amontonamiento y obligando a detener por completo la producción."
 bio.235.a: "¡Esto requiere una investigación a fondo!"
 bio.235.a.tt: "Velocidad de avance de la situación §Y$genetic_ascension_situation$§! durante §Y12§! meses: §R-50%§!"
 biomorphosis_stalled_tt: "Velocidad de avance de la situación §Y$genetic_ascension_situation$§! durante §Y12§! meses:"
 bio.235.b: "¡Reanudad la producción lo antes posible!"
 bio.240.name: "Crisis de identidad"
 bio.240.desc: "Los clones de todo el imperio informan de dificultades, pues luchan con su sentido del yo.\n\nAnhelan una identidad más allá de la de sus donantes genéticos. Cuestionan su propio propósito, sintiéndose apáticos respecto a sus objetivos y aspiraciones vitales."
 bio.240.a: "Es normal. Que vayan a terapia."
 bio.240.b: "Deberían buscar la satisfacción en su trabajo."
 bio.240.b.tt: "Cada §Y£leader£ líder§! de la especie principal del imperio obtiene §G+200§! de experiencia."
 bio.250.name: "¡Clones por todas partes!"
 bio.250.desc: "A medida que más clones se integran en nuestra población, los recursos adicionales necesarios para mantenerlos empiezan a poner a prueba la economía.\n\nAunque los retos inmediatos son considerables, el dinamismo económico derivado del aumento de la población activa y de la base de consumidores podría sentar las bases de una prosperidad a largo plazo, siempre que sepamos gestionar la transición con eficacia."
 bio.250.a: "Nuestras infraestructuras deben crecer para satisfacer la demanda."
 bio.250.b: "Que disfruten de la vida en las colonias de otros planetas."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #MUTATION
 bio.260.name: "Mutaciones descontroladas"
 bio.260.desc: "Crecimiento espontáneo de las extremidades. Fluctuaciones entre estados de la materia. Metamorfosis repentina. Estos informes son escasos y poco frecuentes, pero no pueden ignorarse.\n\nNuestros experimentos con la mutación están obteniendo resultados poco deseables a lo largo de nuestra civilización. Tal vez el descubrimiento de las herramientas para modificar los genes a voluntad ha sido más de lo que esperábamos inicialmente."
 bio.260.a: "Las mutaciones inusuales pueden estimular nuestra investigación."
 bio_260_opinion_tt: "La opinión de los imperios §Yespiritualistas§! sobre nosotros cambia en §R-50§!."
 bio.260.b: "Sacrificad a las abominaciones."
 bio.260.b.tt: "Cada §Y£leader£ líder autoritario§! obtiene el rasgo §Y$leader_trait_eager$§!."
 bio.265.name: "Excelencia mutante"
 bio.265.desc: "Un pequeño porcentaje de nuestra población ha desarrollado capacidades extraordinarias y mejoras físicas debido a sus propios experimentos con mutaciones.\n\nAl ser individuos excepcionalmente fuertes y dotados, están formando una comunidad y llamando mucho la atención del público."
 bio.265.a: "Su éxito podría inspirar a otros."
 bio.265.b: "Seguro que serían buenos soldados."
 bio.265.b.tt: "Crea un §Y$gene_warrior_army$§! en §Y[Owner.capital_scope.GetName]§!."
 bio_265_opinion_tt: "La opinión de los imperios §Ymilitaristas§! sobre nosotros cambia en §G+50§!."
 bio.265.c: "Averiguad cómo lo han conseguido y replicadlo."
 bio.270.name: "Las leyendas urbanas cobran vida"
 bio.270.desc: "La vigilancia ha confirmado la existencia de una población de individuos genéticamente alterados que habitan en los sistemas de alcantarillado urbano, lo que constituye un eco inquietante de leyendas urbanas olvidadas hace tiempo.\n\nEste descubrimiento ha agudizado las tensiones sociales, y los ciudadanos visiblemente mutados denuncian una mayor discriminación a medida que aumenta el temor a lo desconocido. Sin embargo, estos individuos han demostrado un ingenio notable, pues aprovechan los gases de alcantarillado para la producción de recursos y adaptar su entorno de maneras inesperadas."
 bio.270.a: "¡Limpiad las alcantarillas!"
 bio.270.b: "Puede que estos mutantes hayan planeado algo..."
 bio.280.name: "Contagio mutante"
 bio.280.desc: "Un brote de una nueva enfermedad se extiende por nuestro imperio. La enfermedad provoca una serie de síntomas desagradables, entre los que se incluyen: evacuaciones involuntarias de aire y líquido, fatiga debilitante y, en algunos casos, pérdida de la vida.\n\nLo más curioso es que esta enfermedad solo afecta a quienes han alterado su fisiología de determinadas formas con mutaciones genéticas. El estudio en curso de su genoma modificado ha dado lugar a algunas revelaciones sorprendentes."
 bio.280.a: "Encontrad una aplicación terapéutica."
 bio.280.b: "Convertid la enfermedad en un arma."
 bio_280_opinion_tt: "La opinión de los imperios §Ymaterialistas§! sobre nosotros cambia en §R-50§!."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #ANY APPROACH
 bio.295.name: "Célula rebelde"
 bio.295.desc: "Nuestras instalaciones de investigación genómica han permitido que toda nuestra civilización acceda a una alteración fisiológica sin precedentes.\n\nSin embargo, los ciudadanos de nuestro imperio quieren más. Se pide la disolución de los recursos centralizados y que se permita a los llamados \"biohackers\" el acceso libre y sin restricciones a la tecnología genética."
 bio.295.a: "Dad más autonomía a los biohackers."
 bio.295.b: "El ciudadano medio ya tiene demasiada libertad."
 bio_295_opinion_tt: "La opinión de los imperios §Yigualitarios§! sobre nosotros cambia en §G+50§!."
 bio.300.name: "Genialidad científica"
 bio.300.desc: "[event_target:genius_geneticist.GetName], [Owner.GetScientist], acaba de publicar una investigación académica que podría utilizarse para acelerar y mejorar drásticamente la eficiencia y eficacia de nuestros experimentos genéticos.\n\nEl nuevo método, puramente teórico, no se ha puesto a prueba, por lo que habrá que estudiarlo detenidamente para aplicarlo con seguridad a nuestros procesos."
 bio.300.a: "Que se reconozcan los méritos de [event_target:genius_geneticist.GetName]."
 bio.300.b: "Las ideas y los individuos frívolos no serán tolerados."
 bio.300.c: "Que todo el mundo vuelva al trabajo."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #PURITY
 bio.310.name: "Fallo de pureza en la [target.GetGestaltEntityName]"
 bio.310.desc: "Nuestra especie se ha visto infiltrada por un fragmento de código genético extraño, consecuencia de nuestra persistente experimentación con la modificación genética. Nos estamos poniendo enfermos a un ritmo alarmante, desestabilizados por la interacción no regulada de esta secuencia extraña con nuestro propio material genético.\n\nDebemos ocuparnos de este comportamiento biológico anómalo antes de que sea demasiado tarde."
 bio.310.a: "Purgad la contaminación."
 bio.310.b: "Estudiemos el código extraño."
 bio.315.name: "Comprometidos con la causa"
 bio.315.desc: "Si queremos que nuestra civilización sea pura, primero debemos tener en cuenta el bienestar de la [target.GetGestaltEntityName]. El proceso de modificación genética debe garantizar que cada adaptación mejore la resistencia del colectivo.\n\nEmprender el camino equivocado, introduciendo cambios que provoquen inestabilidad o socaven la cohesión, podría ser desastroso y amenazar los cimientos de nuestra unidad."
 bio.315.a: "Centraos en la resistencia física."
 bio.315.b: "La eficacia cognitiva es primordial."
 bio.325.name: "Más allá del presente"
 bio.325.desc: "Para garantizar la longevidad y pureza de nuestra especie, debemos aplicar una cría más selectiva y protocolos de cribado genético más estrictos.\n\nSolo si seleccionamos cuidadosamente a los drones dignos de continuar nuestro linaje, podremos trascender más allá de la evolución natural."
 bio.325.desc.wilderness: "Para garantizar la longevidad y pureza de nuestra multitud simbiótica, debemos aplicar una cría más selectiva y protocolos de cribado genético más estrictos.\n\nSolo si seleccionamos simbiontes aptos con rasgos de interés para el colectivo, podremos trascender nuestros límites iniciales."
 bio.325.a: "Haremos un cribado en función de la inteligencia."
 bio.325.b: "Nos reproducimos para expandirnos."
 bio.330.name: "Ascensión con recursos"
 bio.330.desc: "Las recompensas de la modificación genética asegurarán nuestro legado, pero el papel de cada [target.GetIndividualName], cada gramo de esfuerzo, debe estar alineado con nuestra visión de la pureza.\n\nAhora nos enfrentamos a una decisión crítica: ¿debemos optimizar la perfección a costa de la adaptabilidad? ¿O debemos adoptar una estrategia más amplia, dando prioridad a la infraestructura necesaria para sostener estos esfuerzos?"
 bio.330.a: "Alcanzar la pureza debe ser nuestro único objetivo."
 bio.330.b: "Debemos dedicar tiempo a desarrollar nuestras infraestructuras."
 bio.335.name: "Purgar imperfecciones"
 bio.335.desc: "Hemos aislado una serie de impurezas genéticas y anomalías dentro de la [target.GetGestaltEntityName].\n\nA medida que nos esforzamos por alcanzar nuestros objetivos más amplios, debemos eliminar estos rasgos defectuosos y recuperar el control de nuestro desarrollo físico a partir de la evolución natural."
 bio.335.a: "Sacrificad a los débiles para fortalecer al conjunto."
 bio.335.b: "Reparad a los defectuosos."
 bio_335_opinion_tt: "La opinión de los imperios §Ybenevolentes§! sobre nosotros cambia en §R-50§!."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #CLONING
 bio.340.name: "¡Demasiados clones!"
 bio.340.desc: "Nuestras instalaciones de clonación funcionan de manera más eficiente de lo que esperábamos inicialmente, por lo que ahora tenemos un excedente de clones.\n\nIntegrar a tantos drones está resultando todo un desafío."
 bio.340.a: "Las nuevas incorporaciones a la colmena deberían ser migradas."
 bio.340.b: "Incrementad la producción. Fabricad clones en serie."
 bio.350.name: "Cáscaras VACÍAS"
 bio.350.desc: "Varios drones se han visto afectados tras una avería en uno de nuestros principales centros de clonación. De algún modo, se han introducido contaminantes genéticos en el proceso de duplicación, lo que ha provocado el crecimiento de un lote de clones sin capacidad de pensamiento.\n\nEran objetos esencialmente biológicos, completamente no sintientes y sin funciones cognitivas superiores. Hasta que no se resuelva el asunto y se solucionen los problemas de producción, se reduce la productividad en las instalaciones."
 bio.350.a: "Suena tranquilizador..."
 bio.350.a.tt: "Se crean 100 £pop£ §Hpoblaciones preinteligentes§! en §Y[owner.capital_scope.GetName]§!."
 bio.350.b: "Cread un nuevo lote."
 bio.365.name: "Metafísica de la colmena"
 bio.365.desc: "Desde el interior de la consciencia, surge una pregunta: ¿nos sustituirán algún día los clones?\n\nNuestros esfuerzos iniciales en materia de duplicación genética van bien, hasta el punto de que tenemos curiosidad por saber si este eficaz método de reproducción podría acabar superando a nuestra práctica natural.\n\nSi es así, puede que un día la colmena ya no contenga donantes originales, solo clones de clones de clones... ¿Qué significa esto para nosotros como especie? Una pregunta sin respuesta y que suscita discrepancias. Pero nos vemos obligados a formularla."
 bio.365.a: "La pregunta tiene valor en sí misma."
 bio.365.b: "Tales preguntas son una distracción."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #MUTATION
 bio.375.name: "Conexión profunda"
 bio.375.desc: "Hemos hecho un descubrimiento. Al manipular genes específicos, podemos ampliar el alcance de nuestra consciencia para dotarnos de sentidos más agudos, más allá de lo que antes considerábamos los límites de nuestra especie.\n\nImplementar estas mutaciones en toda la colmena requerirá mucha energía, pero hacerlo puede profundizar nuestra comprensión del universo y de nuestro lugar en él."
 bio.375.a: "El coste es insignificante. Proceded."
 bio.375.b: "No conviene precipitarse con este proceso."
 mod_planet_evaluators_physics_research_produces_add: "£physics_research£ $physics_research$ por $pop_group_unit$ [evaluator.GetIcon] [evaluator.GetNamePlural]"
 bio.380.name: "Sobrecarga emocional"
 bio.380.desc: "Secciones enteras de la colmena están experimentando oleadas de ira incontrolada, una marejada de emociones que se ha propagado a través de la consciencia compartida, amplificando nuestro dolor y frustración colectivos.\n\nUna mutación introducida recientemente parece estar sobreestimulando los neurocitos de los centros de control de la agresividad de nuestros drones, lo que altera el equilibrio emocional de la colmena. Los conflictos son cada vez más frecuentes y algunos drones han abandonado sus tareas para atacar a otros."
 bio.380.a: "Como un solo ser, extremaremos la cautela."
 bio.380.b: "Demos cabida a esa rabia."
 bio.385.name: "Intolerancia medioambiental"
 bio.385.desc: "Si bien algunas mutaciones nos estimulan y mejoran, nos hemos percatado de que otras conllevan efectos secundarios desagradables.\n\nLas mejoras destinadas a prolongar nuestra existencia se están implementando con eficacia, pero esas mismas mutaciones merman nuestra tolerancia a climas extremos.\n\nQuienes nos hemos sometido a estos aumentos biológicos tenemos dificultades para regular nuestros sistemas termorreguladores internos, y el malestar se siente en toda la colmena."
 bio.385.a: "Debemos mejorar nuestros sistemas de protección climática."
 bio.385.b: "Cambiamos, y es natural que lo hagan también nuestras inclinaciones ambientales."
 uncomfortable_drones: "Drones incómodos"
 uncomfortable_drones_desc: "Nuestros drones deben luchar contra la incomodidad provocada por la mutación."
 bio.390.name: "Fuerza o agudeza"
 bio.390.desc: "Se han identificado dos mutaciones excluyentes. Una variante aumenta la fuerza de los drones sirvientes, lo que redunda en una eficiencia superior. La otra acrecienta el intelecto de los drones complejos, potenciando la resolución de problemas y sus capacidades estratégicas.\n\nLa colmena debe decidir qué camino emprender."
 bio.390.a: "La fuerza es progreso."
 bio.390.b: "Pensamos, luego prosperamos."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #ANY APPROACH
 bio.405.name: "Genoma enfermo"
 bio.405.desc: "A duras penas hemos logrado contener un brote inesperado de un trastorno genético.\n\nLa manipulación de nuestra propia biología ha desencadenado mutaciones no autorizadas en nuestro ADN, lo que ha provocado que muchos [target.GetIndividualNamePlural] se vean físicamente comprometidos.\n\nSe ha puesto en cuarentena a los [target.GetIndividualNamePlural] afectados, y ahora hemos de decidir cómo proceder."
 bio.405.a: "Erradicados los [target.GetIndividualNamePlural], erradicada la plaga."
 bio.405.b: "Estudiaremos a los afectados."
 bio.410.name: "Desgaste celular"
 bio.410.desc: "A causa de un fallo en nuestros cálculos, la integridad genética de nuestros drones se ha visto degradada en un número sustancial de casos. Por desgracia, no hemos logrado identificar aún en qué etapa del proceso se pudo dar el error.\n\nTras repasar los cálculos biológicos involucrados en la elevación de nuestra especie y enmendar ciertos procedimientos que podrían ocasionar problemas, ya estamos preparados para retomar nuestros esfuerzos.\n\nNo obstante, aún no sabemos a ciencia cierta si se ha subsanado o no el error o si, en el peor de los casos, hemos provocado otros."
 bio.410.desc.wilderness: "A causa de un fallo en nuestros cálculos, la integridad genética de nuestros simbiontes se ha visto degradada en un número considerable de casos. Por desgracia, no hemos logrado identificar aún en qué etapa del proceso se pudo dar el error.\n\nTras repasar los cálculos involucrados en la adaptación de nuestras partes constituyentes y enmendar desbarajustes de enzimas, ya estamos preparados para retomar nuestros esfuerzos.\n\nNo obstante, aún no sabemos a ciencia cierta si se ha subsanado o no el error o si, en el peor de los casos, hemos provocado otros."
 bio.410.a: "Algo aprenderemos de lo que suceda a continuación."
 bio.410.b: "Quedan suspendidos los experimentos por ahora."
 bio.410.b.tt: "$bio.235.a.tt$"
