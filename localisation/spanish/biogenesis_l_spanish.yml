 concept_genetic_purity: "Perfección genética de especie"
 concept_genetic_purity_desc: "Las autoridades que se han inclinado por la ['tradition_category:tradition_purity'] gozan de modificadores y efectos graduales que se aplican a sus £pop£ §Hpoblaciones orgánicas§! y sus £leader£ §Hlíderes§!.$TABBED_NEW_LINE$- Aumenta al gastar puntos de rasgo en rasgos de especie §Gpositivos§!.$TABBED_NEW_LINE$- Se reduce al adquirir puntos de rasgo derivados de rasgos de especie §Rnegativos§!."
 trait_leader_genetic_purist: "Purista de la genética"
 trait_leader_genetic_purist_desc: "Líder cuya labor está guiada por su inamovible visión de la perfección genética y su intolerancia a la imperfección en todas sus formas."
 auth_bio_democratic_purity: "Autonomía fenotípica"
 auth_bio_democratic_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £mod_pop_happiness£ $MOD_POP_HAPPINESS$: $plus_minus_icon$§Y$@purity_traits_happiness|1%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $mod_leaders_upkeep_mult$ $minus_plus_icon$§Y2,5%§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$ $plus_minus_icon$§Y2,5%§!"
 auth_bio_democratic_purity_desc: "La autodeterminación corporal es un derecho. El estado pone a disposición de los individuos el poder de modificar sus manifestaciones físicas como estimen oportuno. Con la imaginación como único límite, el cuerpo se convierte en el lienzo por excelencia."
 auth_bio_oligarchic_purity: "Jerarquía eugénica"
 auth_bio_oligarchic_purity_tt: "$eugenic_political_power_effects$"
 auth_bio_oligarchic_purity_desc: "El poder absoluto debe confiarse a la élite genéticamente consagrada, los administradores más puros y capaces del destino de esta civilización. Bajo su mandato, cada ciudadano desempeñará una función predefinida, a la exacta medida de su potencial genético heredado. La satisfacción no derivará de la ambición, sino de aceptar el propósito asignado."
 eugenic_political_power_effects: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $MOD_POP_BONUS_WORKFORCE_MULT$: $plus_minus_icon$§Y$@purity_traits_bonus_workforce_mult|2%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: $plus_minus_icon$§Y$@purity_traits_council_speed|Y1%$§!"
 auth_bio_dictatorial_purity: "Poder judicial nucleico"
 auth_bio_dictatorial_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$£society£ Investigación social producida por cada $pop_group_unit$ £pop£ poblaciones: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $MOD_PLANET_CRIME_ADD$ en el planeta: $minus_plus_icon$§Y5,0§! $TABBED_NEW_LINE$- $MOD_PLANET_CRIME_ADD$ en el sector: $minus_plus_icon$§Y2,5§! $TABBED_NEW_LINE$- $MOD_PLANET_STABILITY_ADD$ en el planeta: $plus_minus_icon$§Y5,0§! $TABBED_NEW_LINE$- $MOD_PLANET_STABILITY_ADD$ en el sector: $plus_minus_icon$§Y2,5§!"
 auth_bio_dictatorial_purity_desc: "Este gobierno maneja datos genéticos y biométricos como herramienta de justicia preventiva, escrutando el código genético de cada ciudadano a fin de detectar predisposición a la delincuencia. Al intervenir antes de que se produzcan infracciones, se garantiza un orden posible únicamente gracias a una supervisión meticulosa. La verdadera justicia no es reactiva sino preventiva, por lo que eliminar los delitos de raíz es la mejor forma de proteger a la sociedad."
 auth_bio_imperial_purity: "Dominio biótico"
 auth_bio_imperial_purity_tt: "Efectos de ['concept_genetic_purity'] en £leader£ §Y$imperial_ruler$§! y §Yherederos§!:$TABBED_NEW_LINE$- $MOD_LEADER_SKILL_ADD$: $plus_minus_icon$§Y$@purity_traits_imperial_level|2$§! $DOUBLE_NEW_LINE$£leader£Los líderes de la §Yespecie de nuestro [Ruler.GetTitle]§! adquieren el rasgo §Y$imperial_bloodline$§!\n£leader£Efectos de ['concept_genetic_purity'] en §Ylinaje imperial§!: $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_MULT$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§!"
 auth_bio_imperial_purity_desc: "Este gobierno, acérrimo partidario de la excelencia genética, prolonga la vida de sus líderes y destina todos los medios posibles a lograr la perfección biótica. La prosperidad de la sociedad gira en torno a la supervivencia y la propagación en de los genes de mejor calidad en exclusiva, propiciando así una superioridad colectiva en el futuro. Cincelando a conciencia el acervo génico, esta especie se asegura el progreso con miras a la longevidad y la perfección."
 auth_bio_corporate_purity: "Sindicato orgánico"
 auth_bio_corporate_purity_tt: "$organic_leaders_have_trade_upkeep$\n\n$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $r_trade$ que se produce por cada $pop_group_unit$ £pop£ poblaciones: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_corporate_purity_desc: "Esta megacorporación ha perfeccionado la mercantilización de la vida misma, cultivando órganos con ánimo de lucro. Por órganos de calidad máxima se pagan sumas altísimas, mientras que los artículos \"redundantes\" pueden desembocar en el mercado negro. Proliferan intermediarios de dudosa honestidad y cirujanos clandestinos, que atienden a compradores desesperados y garantizan que ningún activo se desperdicie realmente."
 #Cloning
 auth_bio_democratic_cloning: "Multiplicidad armónica"
 auth_bio_democratic_cloning_tt: "$ENABLES_BACKUP_CLONES$\n§Y$leader_trait_backup_clone_default$§!Mantenimiento de : §G$@cordant_multiplicity_clone_upkeep|0%$§!\n§Y$leader_trait_backup_clone_default_plural$§!Los  poseen ['concept_clone_leader_degradation', degradación] reducida y no pueden tener §Y$leader_trait_has_backup_clone_plural$§!"
 auth_bio_democratic_cloning_desc: "Este gobierno entiende la tecnología de clonación como una baza en favor de la igualdad y el progreso. Los clones están en el mismo orden jerárquico que los individuos nacidos de forma natural, y su voz y voto se valoran por igual. La diversidad de perspectivas, pertenezcan o no a clones, enriquece la voluntad del pueblo."
 auth_bio_oligarchic_cloning: "Regencia de replicación"
 auth_bio_oligarchic_cloning_tt: "$ENABLES_BACKUP_CLONES$\nEl rasgo §Y$leader_trait_has_backup_clone$§! procura efectos adicionales a consejeros\n§Y$leader_trait_backup_clone_default_plural$§!La ['concept_clone_leader_degradation', degradación] de los  se reduce mientras estén en el Consejo\n"
 auth_bio_oligarchic_cloning_desc: "Esta sociedad asegura el reinado eterno de sus élites al anclar el poder al linaje ininterrumpido de clones superiores. La tecnología de clonación preserva y perfecciona su legado genético, propiciando así una continuidad fluida en lo que a liderazgo respecta. Cada cargo de influencia lo ocupa una iteración mejorada del mismo linaje ensalzado, lo que apuntala su poder de generación en generación."
 auth_bio_dictatorial_cloning: "Sumisión homogénea"
 auth_bio_dictatorial_cloning_tt: "$ENABLES_BACKUP_CLONES$\n$AVAILABLE_POLICIES$ §Y$policy_homogenous_class$§!"
 auth_bio_dictatorial_cloning_desc: "A través de una selección genética meticulosa en la que solo se selecciona como ejemplares dignos de clonación a quienes poseen un genotipo de obediencia intrínseca e indefectible, se consigue la lealtad plena de la población. Se crea así una sociedad que se perpetúa a sí misma en la que la rebeldía, más allá de improbable, es biológicamente imposible, lo que garantiza una armonía inalterable que está presente en toda la urdimbre de la civilización."
 auth_bio_imperial_cloning: "Continuidad hereditaria"
 auth_bio_imperial_cloning_tt: "$ENABLES_BACKUP_CLONES$\nEl rasgo §Y$leader_trait_backup_clone_imperial$§! no puede aumentar por penalizaciones"
 auth_bio_imperial_cloning_desc: "La virtud incuestionable del gobernante se conserva gracias a la clonación, pues cada iteración del excelso soberano hereda la sabiduría y los triunfos de sus vidas pasadas. Esta provechosa continuidad en el liderazgo asegura el avance incesante de la sociedad, en perpetua edad de oro propiciada por un mandato brillante que jamás termina."
 auth_bio_corporate_cloning: "Asociación replicadora"
 auth_bio_corporate_cloning_tt: "$organic_leaders_have_trade_upkeep$\n$ENABLES_BACKUP_CLONES$\n$mod_planet_jobs_trade_produces_mult$ por £building£ ['building:building_clone_vats']: §G+$@replicatory_association_trade_mult|0%$§!\n£mod_planet_amenities_add£ servicios planetarios por £building£ §Y$building_clone_vats$§!: §G+$@replicatory_association_amenities_add|0$§!\n$AVAILABLE_POLICIES$ §Y$policy_replicatory_association_insurance$§!"
 auth_bio_corporate_cloning_desc: "La comodidad y el confort inigualables ya están a tu alcance. Adquiere un clon de ti mismo para recambios o encarga una copia de un ser querido. Esta megacorporación garantiza un índice de precisión del 93% en todas las duplicaciones, combinando lo último en tecnología de clonación con promesas de gozo y deleite a través de una replicación precisa."
 AUTHORITY_HAS_CLONE: "$t$Al §Ymorir un gobernante§!, un §Y$leader_trait_backup_clone_imperial$§! pasa a ser el nuevo gobernante. $TABBED_NEW_LINE$§Y$leader_trait_backup_clone_imperial_plural$§!Los  tienen una ['concept_clone_leader_degradation', degradación] menor."
 policy_replicatory_association_insurance: "Seguro de replicantes"
 policy_replicatory_association_insurance_desc: "Como beneficio asociado a su cargo, se concede acceso prioritario a tratamientos de clonación a miembros del Consejo y otros individuos considerados de vital importancia."
 replicatory_association_insurance_stellar: "Póliza estelar"
 replicatory_association_insurance_stellar_name: "$replicatory_association_insurance_stellar$"
 replicatory_association_insurance_stellar_desc: "$leader_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\nLos §Y$leader_trait_has_backup_clone_plural$§! de §Ylíderes§! gozan de menor ['concept_clone_leader_degradation', degradación]."
 replicatory_association_insurance_platinium: "Póliza platino"
 replicatory_association_insurance_platinium_name: "$replicatory_association_insurance_platinium$"
 replicatory_association_insurance_platinium_desc: "$councilor_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\nLos §Y$leader_trait_has_backup_clone_plural$§! de §Yconsejeros§! gozan de menor ['concept_clone_leader_degradation', degradación]."
 replicatory_association_insurance_basic: "Póliza básica"
 replicatory_association_insurance_basic_name: "$replicatory_association_insurance_basic$"
 replicatory_association_insurance_basic_desc: "$ruler_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\nLos §Y$leader_trait_has_backup_clone_plural$§! del §Ygobernante del imperio§! gozan de menor ['concept_clone_leader_degradation', degradación]."
 leader_upkeep_skill_header_energy: "Mantenimiento en $i_energy$ de £leader£ líder por nivel de habilidad:"
 councilor_upkeep_skill_header_energy: "Mantenimiento en $i_energy$ de £leader£ consejero por nivel de habilidad:"
 ruler_upkeep_skill_header_energy: "Mantenimiento en $i_energy$ de £leader£ gobernante por nivel de habilidad:"
 policy_homogenous_class: "Confección genómica"
 policy_homogenous_class_desc: "Una meticulosa modificación del genoma básico empleado para mantener los clones de nuestros líderes nos permite optimizar una élite selecta."
 homogenous_class_scientists: "Códice científico"
 homogenous_class_scientists_name: "$homogenous_class_scientists$"
 homogenous_class_scientists_desc: "Efectos de $scientist_plural_with_icon$ en §Y$leader_trait_has_backup_clone_plural$§!: $TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- Sufren menos ['concept_clone_leader_degradation', degradación]."
 homogenous_class_officials: "Registros administrativos"
 homogenous_class_officials_name: "$homogenous_class_officials$"
 homogenous_class_officials_desc: "Efectos de $official_plural_with_icon$ en §Y$leader_trait_has_backup_clone_plural$§!: $TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- Sufren menos ['concept_clone_leader_degradation', degradación]."
 homogenous_class_commanders: "Protocolo marcial"
 homogenous_class_commanders_name: "$homogenous_class_commanders$"
 homogenous_class_commanders_desc: "Efectos de $commander_plural_with_icon$ en §Y$leader_trait_has_backup_clone_plural$§!: $TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- Sufren menos ['concept_clone_leader_degradation', degradación]"
