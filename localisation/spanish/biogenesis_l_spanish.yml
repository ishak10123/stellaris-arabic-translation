 ### BIOMORPHOSIS (GENETIC ASCENSION) SITUATION(S)
 ## REGULAR EMPIRE SITUATION
 #SET-UP / PREAMBLE
 genetic_ascension_situation: "Biomorfosis"
 genetic_ascension_situation_type: "$genetic_ascension_situation$"
 genetic_ascension_situation_desc: "La selección natural y la deriva genética ya no se interponen entre nosotros y la dominación biológica. Estamos a punto de redefinir el futuro de nuestra especie como civilización. Nuestro [Owner.Species.GetFleshTypeCyberCreed] es arcilla y nosotros somos sus alfareros."
 genetic_ascension_situation_monthly_change_tooltip: "Nuestros genetistas progresan adecuadamente con la investigación."
 genetic_ascension_situation_outcome: "Desbloquearemos todo el potencial de la manipulación genética para garantizar la evolución de nuestra especie.\n\nNos decantaremos por la biomorfosis en su máxima expresión."
 genetic_ascension_situation_pause_desc: "Situación en pausa"
 genetic_ascension_approach_selected: "$TRIGGER_FAIL$Nuestra decisión para esta fase ya está tomada."
 situation_gene_tailoring_needed_desc: "$TRIGGER_FAIL$NO tiene la tecnología ['concept_gene_tailoring']"
 mod_biomorphosis_progress_mult: "$genetic_ascension_situation$ Progreso mensual"
 #STAGE EVENTS
 bio.5.name: "Alteración de la esencia" #STAGE ONE
 bio.5.desc.no_options: "A fin de consumar nuestra evolución, hemos de elegir el camino que determinará nuestro viaje. Al empezar a desarrollar todo nuestro potencial, somos conscientes de que esta empresa podría alterar nuestra mismísima esencia.\n\nControlar la evolución es una tarea de lo más trascendental. Las alteraciones que implementemos remodelarán nuestro futuro."
 bio.5.desc.has_options: "$bio.5.desc.no_options$\n\nSi queremos elevarnos, tenemos que elegir un punto de partida."
 bio.5.a: "El camino de la pureza."
 bio.5.b: "El camino de la clonación."
 bio.5.c: "El camino de la mutación."
 bio.10.name: "Punto de inflexión" #STAGE TWO
 bio.10.desc.no_options: "El control de nuestra propia evolución ha producido grandes avances. Ahora poseemos un mayor entendimiento de los rasgos genéticos, la reproducción y la secuenciación del ADN.\n\nLa culminación de nuestros progresos está al alcance. De aquí a unos pocos años, alcanzaremos nuestro potencial como especie."
 bio.10.desc.has_options: "$bio.10.desc.no_options$\n\nSin embargo, llegamos a un punto en el que podemos seguir recorriendo nuestro camino o llevar la siguiente fase evolutiva por otros derroteros."
 bio.10.a: "Centrarse en la pureza."
 bio.10.b: "Centrarse en la clonación."
 bio.10.c: "Centrarse en la mutación."
 bio.15.name: "Encrucijadas evolutivas" #STAGE THREE
 bio.15.desc.no_options: "Nuestro empeño nos ha llevado a los albores de un gran cambio evolutivo. Muy pronto, deberemos tomar una decisión fundamental sobre el camino que emprenderemos para alcanzar todo nuestro potencial evolutivo."
 bio.15.desc.has_options: "$bio.15.desc.no_options$\n\nUna vez más, toca decidir cómo enfocar nuestros esfuerzos."
 bio.15.a: "Elegimos la pureza."
 bio.15.b: "Dominaremos la clonación."
 bio.15.c: "La mutación es el futuro."
 genetic_ascension_approach_purity: "Pureza"
 genetic_ascension_approach_cloning: "Clonación"
 genetic_ascension_approach_mutation: "Mutación"
 genetic_ascension_approach_purity_desc: "Nos volcaremos en la pureza."
 genetic_ascension_approach_cloning_desc: "La investigación sobre clonación nos permitirá crecer."
 genetic_ascension_approach_mutation_desc: "Nuestro futuro reside en la mutación genética."
 bio.20.name: "El camino elegido" #FINAL STAGE - TRADITION TREE CHOICE
 bio.20.desc: "Ya sea que nos esforcemos por alcanzar nuestra forma más pura, nos abramos paso hacia el éxito a base de clonaciones o nos aumentemos genéticamente mediante una mutación deliberada, este momento marca un punto sin retorno."
 bio.20.desc.evopred: "Nuestra naturaleza siempre ha sido moldeable. Somos la forma de vida más compleja del universo y, con la ayuda de nuestra investigación, seguiremos cambiando.\n\nEl futuro es caótico, y eso a nosotros nos va perfecto."
 bio.20.a: "Sabremos lo que significa ser puros."
 bio.20.b: "Nos clonaremos para alcanzar el éxito."
 bio.20.c: "Dominaremos los poderes de la mutación."
 #Random Events
 bio.50.name: "Unos más iguales que otros"
 bio.50.desc: "Tras centrarnos en la purificación genética, los ciudadanos aumentados han empezado a verse como seres superiores al resto de la población. Ahora exigen días laborales más cortos, más servicios y un poder político mayor de acuerdo con su autoproclamada superioridad. Sus protestas son cada vez más agresivas y están provocando un gran malestar social."
 bio.50.a: "Pongámonos duros con los manifestantes."
 bio.50.b: "Les concederemos sus derechos."
 bio.55.name: "Mitosis social"
 bio.55.desc: "Los boletines de noticias están plagados de retórica divisiva, y los desacuerdos destrozan la unidad social. Los que se sometieron a modificaciones genéticas gozan de más oportunidades, propiciando un nuevo tipo de lucha de clases.\n\nLos genéticamente mejorados creen que representan el futuro de nuestra especie, mientras que los tradicionalistas sienten que nos estamos desviando demasiado hacia un territorio antinatural."
 bio.55.a: "Individuos superiores para un mundo superior."
 bio.55.b: "Puede que nos estemos precipitando."
 bio.60.name: "Disparidad ácida"
 bio.60.desc: "En algunas industrias, las pruebas arbitrarias de pureza son cada vez más comunes. Los que presentan trazas de superioridad genética están recibiendo un trato de favor en el trabajo y en la educación, y acceden con mucha más facilidad a cargos de poder.\n\nMientras que algunos sostienen que los individuos con mejoras biológicas son más fuertes y saludables, otros sostienen que esta mentalidad crea una discriminación indebida contra aquellos que no quieren o no pueden alterar sus genomas para alcanzar la perfección genética."
 bio.60.a: "Debemos brindar igualdad de oportunidades para todos."
 bio.60.b: "Es la supervivencia del más fuerte."
 bio.65.name: "Héroes y villanos"
 bio.65.desc: "Nuestra campaña por la pureza ha alentado a ciertos individuos a asumir un papel destacado en la seguridad pública. Mejorados con una fuerza, agilidad y resistencia sobrenaturales, han formado pequeñas bandas de bienhechores que se perfilan como campeones que se toman la ley por sus [owner.species.GetHandNamePlural].\n\nSin embargo, este nuevo auge tiene su contraparte. Unos adversarios sometidos a las mismas mejoras emergen de las sombras, y sus malvadas intenciones vienen motivadas por el deseo de equilibrar la balanza del poder. Los enfrentamientos entre ambos bandos están causando daños graves a la propiedad y poniendo en peligro a los civiles."
 bio.65.a: "Los justicieros no tienen cabida en nuestras calles."
 bio.65.b: "Que se peleen."
 MAVERICK_CITIZENS_MOD: "Los [enforcer.GetIcon] §Y[enforcer.GetNamePlural]§! producen §G+2§! de $r_stability$ y §G+2§! de $r_unity$ por cada 100 trabajos."
 bio.66.name: "Restricciones a los súper"
 bio.66.desc: "Hemos tomado medidas drásticas contra las actividades de individuos superpoderosos. Ahora, estos seres están sometidos a duras restricciones y regulaciones. Nuestra operación de vigilancia nos ha permitido controlar y frenar sus actividades.\n\nSi bien hemos trabajado duro para que pongan sus poderes al servicio del imperio, el miedo y el desprecio crecen entre los superpoderosos y los no aumentados. Nuestra población está cada vez más polarizada."
 bio.66.a: "Vamos a crear un regimiento de superpoderosos."
 bio.66.b: "Rehabilitemos a los marginados."
 bio.67.name: "Superdependencia"
 bio.67.desc: "El creciente apoyo a los justicieros mejorados genéticamente se ha tornado un arma de doble filo. Aunque estos seres producen una sensación de seguridad y bienestar, somos conscientes de cuánto hemos llegado a depender de ellos.\n\nLa gente está agradecida, pero ahora recurre a estos individuos superpoderosos en busca de orientación y apoyo, evitando el proceso judicial e ignorando a los funcionarios. Se ha difuminado la línea que separa a los héroes y al gobierno. Hay un equilibrio de poderes."
 bio.67.a: "¡Convoquemos un consejo de superpoderosos!"
 bio.67.b: "Limitemos la implicación de los \"héroes\" en asuntos gubernamentales."
 bio.70.name: "Dos por uno"
 bio.70.desc: "Se ha descubierto que un líder prominente, célebre en toda la galaxia por su incansable ética de trabajo, no es uno, sino dos individuos.\n\nSe ha desvelado que este líder recibió un clon perfecto con el que puede turnarse para trabajar. Mientras una versión se afanaba en tareas públicas y administrativas, la otra descansaba y reponía fuerzas en secreto.\n\nEsta revelación ha hecho temblar el panorama político al poner en duda la verdadera naturaleza del liderazgo y las barreras éticas de la tecnología de clonación."
 bio.70.a: "Es una forma eficiente de usar la clonación."
 bio.70.b: "Destituyamos a ambas versiones por su engaño."
 bio.75.name: "Clones sublevados"
 bio.75.desc: "La práctica de crear clones para cosechar sus órganos ya está deviniendo en complicaciones. Varios clones, obviamente sintientes, se están rebelando mediante una prolongada huelga de hambre.\n\nSi bien muchos opinan que la salud y longevidad del original deben priorizarse, otros aseveran que cada ser racional tiene derecho a la autonomía personal. Esta polémica está suscitando intensos debates."
 bio.75.a: "Pongamos fin a los trasplantes."
 bio.75.b: "Los derechos de los originales tienen prioridad."
 bio.80.name: "La carga de la prueba"
 bio.80.desc: "Las fuerzas de la ley se hallan en un dilema. Con el crimen de nuestra capital al alza, cada vez menos se enfrentan a la justicia. Los sospechosos se declaran no culpables y achacan la culpa de sus crímenes a sus clones.\n\nResulta casi imposible demostrar la culpabilidad de aquellos sospechosos no son cazados in fraganti. Ahora, algunas judicaturas apelan a la despenalización de casi todas las actividades ilícitas."
 bio.80.a: "Reforcemos los sistemas de vigilancia."
 bio.80.b: "Menos leyes es sinónimo de menos delitos."
 bio.85.name: "Parecidos asombrosos"
 bio.85.desc: "Se ha descubierto una inmensa instalación de clonación no autorizada en nuestras fronteras que alberga a miles de dobles replicados a semejanza de nuestro/a [Owner.Leader.GetTitle], [Owner.Leader.GetName]. Hemos detenido a los científicos civiles del complejo, aunque ninguno se muestra con ánimo de cooperar y alegan que no saben quién encargó los clones.\n\nLas escasas pruebas indican que [Owner.Leader.GetName] estaría detrás de la operación. Por desgracia, ha desaparecido sin dejar rastro."
 bio.85.a: "Apliquemos la eutanasia a los clones."
 bio.85.b: "Hemos heredado un ejército clon."
 bio.85.b.tt: "([owner.capital_scope.GetName]):\nse ha creado un §Y$clone_army$§!."
 bio.85.c: "Liberemos a los clones."
 bio.85.c.tt: "Obtendremos un grupo de §Ypoblaciones§!."
 bio.86.name: "Oposición inesperada"
 bio.86.desc: "Aplicar la eutanasia a tantos clones ha supuesto un escándalo que ha suscitado debates serios. Los disgustados activistas [Owner.GetSpeciesAdj], así como grupos religiosos, han iniciado multitudinarias protestas.\n\nEntretanto, circulan rumores sobre clones fugados que se han mezclado entre la población."
 bio.86.a: "Esto nos puede servir de lección..."
 bio.86.b: "Desplegad a las fuerzas de seguridad para acallar a esa turba."
 bio.86.b.tt: "([owner.capital_scope.GetName]):\nSe han creado tres §Y$assault_army_plural$§!."
 bio.90.name: "Comuna mutante"
 bio.90.desc: "Muchos individuos con mutaciones genéticas prominentes o no convencionales han sido excluidos de la sociedad. Obligados a morar en el subsuelo, estos mutantes han formado sus propios enclaves.\n\nLos que se adentran en esas zonas raras veces vuelven."
 bio.90.a: "Eliminemos los enclaves."
 bio.90.b: "Sigamos sus progresos... de lejos."
 bio.95.name: "Rebelión transgénica"
 bio.95.desc: "Los jóvenes marginados han empezado a alterar drásticamente su aspecto por puro entretenimiento.\n\nLas últimas modas incluyen una obsesión por los ojos compuestos, además de competir por ver quién puede ponerse más extremidades en un cuerpo. El récord actual está en 156.\n\nEstos biohackers han llamado la atención del público, lo que ha generado preocupaciones de seguridad. A medida que aumenta la petición de que se impongan restricciones estrictas a las mutaciones genéticas, debemos decidir nuestra postura oficial."
 bio.95.a: "Solo es una forma inocente de divertirse."
 bio.95.b: "156 extremidades son demasiadas."
 bio.100.name: "Inconvenientes inesperados"
 bio.100.desc: "La implementación general de la manipulación genética en nuestra civilización ha producido toda clase de desconcertantes variaciones.\n\nLos procesos biológicos, antaño predecibles, ahora muestran divergencias inesperadas, convirtiendo la estandarización en una quimera.\n\nLa percepción común de la normalidad física que había unificado nuestra especie se ha disuelto y, en su lugar, hay un caleidoscopio de formas y funciones que tensan la cohesión social."
 bio.100.a: "Fomentemos la diversidad."
 bio.100.a.tt: "§Y400§! £pop£ §Hpoblaciones§! al azar recibirán el rasgo ['trait:trait_bioadaptability'], ['trait:trait_social_pheromones'] o ['trait:trait_limited_regeneration']."
 bio.100.b: "Impongamos una plantilla genética estándar."
 bio.105.name: "Indefinición celular"
 bio.105.desc: "Un experimento transgénico ha degenerado en catástrofe. Los científicos intentaron empalmar el ADN de los sujetos de prueba con el de otros organismos multicelulares para activar una respuesta hiperinmune hacia cualquier virus.\n\nNo obstante, lo que crearon fue una criatura que disuelve las paredes celulares de todo organismo con el que entra en contacto, fusionándose con él hasta convertirse en una gran masa amorfa de material biológico.\n\nEste amasijo escapó rodando del laboratorio, absorbiéndolo todo a su paso. De momento, lo hemos contenido, aunque sigue representando un peligro para la salud pública. Eso sí, parece bastante comestible..."
 bio.105.a: "¡Neutralicemos al amasijo!"
 bio.105.b: "Vale la pena correr el riesgo de estudiarlo."
