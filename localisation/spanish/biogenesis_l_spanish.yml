 ### Hive Fallen Empire #
 RT_INCOMPLETE_OVERMIND: "Supramente incompleta"
 gov_war_splinter: "Fragmento de guerra"
 gov_war_splinter_desc: "Los instintos agresivos y belicosos que solían ser uno de los muchos impulsos dentro de la colmena. Ahora intenta establecer el control sobre el resto de los fragmentos cuando no lucha contra sí mismo."
 gov_growth_splinter: "Fragmento de crecimiento"
 gov_growth_splinter_desc: "El deseo por evolucionar y cambiar de la colmena caída. Como está demasiado ocupado reinventándose a sí mismo, el fragmento ha sido incapaz de establecer el control sobre los demás."
 gov_control_splinter: "Fragmento de control"
 gov_control_splinter_desc: "El instinto obsesivo por suprimir las desviaciones y fomentar la uniformidad define a este fragmento. Quiere controlar al resto de fragmentos por encima de todo, pero el constante caos inherente a nuestro universo es una distracción continua."
 gov_fused_ascendancy: "Ascendencia fusionada"
 gov_fused_ascendancy_desc: "Estaba roto, pero ahora está restaurado. Las cicatrices de la fragmentación no son las responsables de la fragilidad de este imperio despertado, sino de su novedad. La antigua mente colmena fracasó; esta de ahora pretende gobernar eternamente."
 civic_fragmented_command: "Comando fragmentado"
 civic_fragmented_command_desc: "Este imperio caído, poseedor de una parte de lo que solía ser un todo, carece de los aspectos básicos necesarios para gobernar un imperio estelar."
 civic_hyper_aggressive_drones: "Drones hiperagresivos"
 civic_hyper_aggressive_drones_desc: "Los drones de este imperio caído luchan constantemente unos contra otros, lo que provoca una disminución importante de los recursos."
 civic_unstable_drones: "Drones inestables"
 civic_unstable_drones_desc: "A los drones de este imperio caído se les obliga constantemente a evolucionar. Rara vez tienen las extremidades necesarias para llevar a cabo la tarea asignada."
 civic_stunted_drones: "Drones atrofiados"
 civic_stunted_drones_desc: "Los drones de este imperio caído están microgestionados hasta tal punto que no pueden desviarse de la tarea asignada en ninguna circunstancia; ni aunque la fábrica esté ardiendo."
 civic_restored_mind: "Mente restaurada"
 civic_restored_mind_desc: "Una consciencia ancestral, al fin reforzada e impulsada por instintos modernos."
 civic_ancient_memories_of_war: "Memorias ancestrales de la guerra"
 civic_ancient_memories_of_war_desc: "Tácticas y formaciones antes perdidas vuelven a exhibirse en el escenario galáctico de la mano de este imperio despertado. Sus flotas borrarán las estrellas."
 civic_ancient_memories_of_growth: "Antiguos recuerdos de crecimiento"
 civic_ancient_memories_of_growth_desc: "Este imperio despertado emplea métodos de ascensión y prosperidad perdidos en el pasado. Sus drones serán más numerosos que las estrellas."
 civic_ancient_memories_of_control: "Memorias ancestrales de control"
 civic_ancient_memories_of_control_desc: "Este imperio despertado recupera las muestras de autoridad y regulaciones del pasado. Su dominio llegará hasta las estrellas."
