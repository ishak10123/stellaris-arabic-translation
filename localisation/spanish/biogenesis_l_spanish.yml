 SHIP_BEHEMOTH_RAGE: "Glándulas de agresión"
 SHIP_BEHEMOTH_RAGE_DESC: "Los gigantes son indómitos mastodontes con voluntad propia que no toleran que se les controle mucho tiempo. Tarde o temprano, acaban dando rienda suelta a esa furia que albergan, provocando una tormenta cósmica irrefrenable. Tal vez, en lugar de esperar el fatídico momento, lo más idóneo sea hacer saltar la chispa de la tormenta cuando más nos convenga."
 behemoth_rage_ship_button: "§HCólera§!\n\nDa rienda suelta al §Ygigante§!.\nEl gigante furioso se dirigirá hacia la §Ycolonia§! o el §Yhuevo de gigante§! más cercano e intentará destruirlo.\nNormalmente, la cólera dura §Y180 días§!, pero hay varios factores que pueden prolongar su duración.$TABBED_NEW_LINE$- Un gigante nunca se apacigua si se encuentra en §Rcombate§! o §Rbombardeando§!.$TABBED_NEW_LINE$- Si §Gderrotamos§! en combate a un gigante furioso, lo controlaremos de nuevo."
 behemoth_rage_activity_key: "En cólera"
 behemoth_rage_menu_title: "Cólera"
 behemoth_rage_progress_activity_key: "En cólera"
 MESSAGE_BEHEMOTH_RAGE_TITLE: "Gigante en cólera"
 MESSAGE_BEHEMOTH_RAGE_DESC: "¡La furia se ha adueñado de un gigante! Esperemos que se calme pasados unos meses."
 MESSAGE_BEHEMOTH_CALM_TITLE: "La furia aminora"
 MESSAGE_BEHEMOTH_CALM_DESC: "Un gigante se ha calmado y ya responde de nuevo a nuestro control."
 SHIP_BEHEMOTH_COCOON: "Girador holometabólico"
 SHIP_BEHEMOTH_COCOON_DESC: "Los §Ygigantes§! son capaces de anclarse entre los estratos turbulentos de un gigante gaseoso y subsistir a base de los elementos pesados y compuestos moleculares complejos que abundan en su atmósfera. Con el tiempo, este alimento impulsa su crecimiento y fortalece su inmensa fuerza."
 SHIP_BEHEMOTH_COCOON_TT: "$UNLOCKS_BEHEMOTH_SHIP_ACTION_TITLE$ $behemoth_cocoon_menu_title$\n$behemoth_cocoon_effect$"
 behemoth_cocoon_ship_button: "§H$behemoth_cocoon_menu_title$§!\n\n$behemoth_cocoon_effect$"
 behemoth_cocoon_activity_key: "Preparando la transformación en crisálida"
 behemoth_cocoon_menu_title: "Adulto y desarrollado"
 behemoth_cocoon_effect: "Un §Ygigante§! bien alimentado puede anidar en un gigante gaseoso durante §Y3 años§! para convertirse en una forma de vida todavía más fuerte."
 behemoth_cocoon_progress_activity_key: "En un capullo"
 behemoth_cocoon_tt: "§RDebemos desbloquear la ventaja de crisis §H$menp_behemoth_hatchling_2$§!.§!"
 MESSAGE_BEHEMOTH_GROWTH_TITLE: "Más grande y enfadado"
 MESSAGE_BEHEMOTH_GROWTH_DESC: "Hemos logrado que eclosione un huevo de §Ygigante§! de tamaño y poder aún mayores."
 behemoth_incubation_poi_name: "Incubación de gigante"
 behemoth_incubation_poi_desc: "Uno de nuestros gigantes está incubando en el gigante gaseoso §H[incubation_planet.GetName]§!. Esperamos que haya madurado por completo en esta fecha: §H[incubation_planet.behemoth_incubation_timer]§!."
 incubating_behemoth_modifier: "Gigante en incubación"
 incubating_behemoth_modifier_desc: "Se está desarrollando una metamorfosis sobrecogedora."
 voidspawn_boss_invincible: "Indomable Señor de las bestias"
 voidspawn_boss_invincible_desc: "Se dice que ningún engendro del vacío adulto ha sido abatido jamás. Acabar con su presa sería nuestra mejor baza para detenerlo."
