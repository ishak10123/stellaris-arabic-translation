 ### NEW CIVICS ###
 civic_genetic_identification: "Identificación genética"
 civic_genetic_identification_desc: "Esta sociedad necesita que todos los ciudadanos se registren al nacer en un índice genético que se usa en todos los niveles burocráticos."
 civic_corporate_genetic_identification: "Valores secuenciados"
 civic_corporate_genetic_identification_desc: "La secuenciación genética de todos los clientes y empleados se registra en una base de datos a la que puede acceder cualquiera a cambio de una modesta tasa. Los organismos de seguridad confían mucho en este servicio para identificar a delincuentes incluso a partir de residuos minúsculos."
 civic_corporate_genetic_identification_effects: "- La £building£ §Y$building_private_security$§! $megacorp_civic_branch_office_building_effect$"
 councilor_genetic_identification: "Indexador"
 councilor_genetic_identification_desc: "El $TITLE$ se encarga de mantener y salvaguardar el índice genético para que la burocracia fluya y sea eficiente."
 councilor_corporate_genetic_identification: "Corredor de secuencia"
 councilor_corporate_genetic_identification_desc: "El $TITLE$ tiene la tarea de evaluar las solicitudes de acceso y los planes de monetización, por eso puede obtener la identificación genética de cualquier individuo."
 civic_crowdsourcing: "Colaboración colectiva"
 civic_crowdsourcing_desc: "Esta sociedad se ha dado cuenta de que la inspiración individual es el origen de la verdadera innovación. Las patentes de código abierto, una actitud tolerante, las colaboraciones espontáneas y las subvenciones a la innovación allanan el camino hacia el progreso."
 civic_crowdsourcing_effects: "$t$- Las facciones producen $r_research$ en lugar de $r_unity$ $TABBED_NEW_LINE$- Las facciones se formarán en tu imperio poco después de que comience la partida, pero su producción se verá reducida en los primeros diez años."
 civic_corporate_crowdsourcing: "Investigación y desarrollo descentralizado"
 civic_corporate_crowdsourcing_desc: "Los concursos interdepartamentales de innovación impulsan las iniciativas de I+D de esta empresa."
 civic_corporate_crowdsourcing_effects: "$civic_crowdsourcing_effects$ $TABBED_NEW_LINE$- La £building£ §Y$building_private_research_initiative$§! $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_crowdsourcing: "NO tiene un principio ['concept_crowdsourcing_civics']"
 concept_crowdsourcing_civics: "Colaboración colectiva"
 concept_crowdsourcing_civics_desc: "Los principios $concept_crowdsourcing_civics$ se componen de $NEW_LINE$- ['civic:civic_crowdsourcing']$NEW_LINE$- ['civic:civic_corporate_crowdsourcing']"
 councilor_crowdsourcing: "Coordinador de innovación"
 councilor_crowdsourcing_desc: "El $TITLE$ tiene la tarea de supervisar que se haga un uso justo de las patentes y de crear incentivos de investigación que se adecuen a los intereses tecnológicos del gobierno."
 councilor_corporate_crowdsourcing: "Árbitro de ideas"
 councilor_corporate_crowdsourcing_desc: "No todos los proyectos merecen inversión, y el deber del $TITLE$ es evaluar su comercialización y rentabilidad."
 civic_civil_education: "Educación civil"
 civic_civil_education_desc: "En este imperio, la educación ha suplantado a la aplicación de la ley. Con una preparación integral y una estricta corrección del rumbo, se garantiza que ningún individuo se quede fuera del alcance del aprendizaje. Al fin y al cabo, no hay malos ciudadanos, sino malos educadores."
 civic_civil_education_effects: "$t$- Sustituye todos los £job_enforcer£ ['concept_enforcer'] por £job_educator£ ['concept_educator'] $TABBED_NEW_LINE$- Sustituye £building£ ['building:building_precinct_house'] por £building£ ['building:building_state_academy']"
 councilor_head_of_education: "Responsable de educación"
 councilor_head_of_education_desc: "El $TITLE$ es el encargado de equipar a los ciudadanos con el conocimiento necesario no solo para llevar a cabo su trabajo, sino también para manejarse ante las situaciones complicadas de la vida. Una buena pedagogía fomenta una sociedad próspera."
 educator: "$job_educator$"
 job_educator: "Educador"
 job_educator_plural: "Educadores"
 job_educator_desc: "Estos incansables adalides del conocimiento, los cuales se dedican a preparar a la juventud, realizan el servicio irreemplazable de garantizar que todos los ciudadanos estén preparados para hacer frente a la galaxia."
 job_educator_effect_desc: "Los £job_educator£ $job_educator_plural$ usan $r_consumer_goods$ para producir $r_unity$, reducen el £crime£ §Y$PLANET_CRIME_TITLE$§!, aumentan la §YAtracción de la ética gobernante§! y generan £defense_army£ §Yejércitos de defensa§!."
 mod_job_educator_add: "Trabajos de $job_educator$"
 building_state_academy: "Academia del estado"
 building_state_academy_desc: "Aquí se enseñan los fundamentos que se consideran necesarios para una sociedad sana."
 concept_state_academy: "$building_state_academy$"
 concept_state_academy_desc: "Trabajos de $job_educator$: §G+200§!\n\n$job_educator_effect_desc$\n$h_line$§L$building_state_academy_desc$§!"
 building_center_of_guidance: "Centro de orientación"
 building_center_of_guidance_desc: "Cubre todos los aspectos de la vida en sociedad. Dentro de este gigantesco complejo de escuelas e instalaciones de formación se puede corregir cualquier desviación."
 mod_planet_jobs_citizen_produces_mult: "Producción de recursos de población de ciudadanía completa"
 civic_hive_familiar_face: "Cara familiar"
 civic_hive_familiar_face_desc: "Se prefiere la cooperación a la confrontación directa. Esta mente colmena tiene drones diplomáticos evolucionados capaces de adoptar la forma y hacer los mismos gestos que sus interlocutores."
 civic_wilderness_familiar_face: "$civic_hive_familiar_face$"
 civic_wilderness_familiar_face_desc: "Se prefiere la cooperación a la confrontación directa. En esta natura han surgido avatares diplomáticos capaces de adoptar la forma y los gestos de sus interlocutores."
 civic_hive_familiar_face_effects: "Los enviados y los oficiales adoptan la forma física de los imperios a los que se les ha asignado.\n§YConfianza§! necesaria para llevar a cabo §Yacciones diplomáticas§!: §G-50%§!"
 #Bioship Civics
 civic_hive_shared_genetics: "Genética compartida"
 civic_hive_shared_genetics_desc: "El genoma mutado de esta colmena se utilizó como base para crear sus naves biológicas, y sus flotas están intrínsicamente conectadas a sus drones, ya que extraen su fuerza de la singularidad de esta especie."
 civic_wilderness_shared_genetics: "$civic_hive_shared_genetics$"
 civic_wilderness_shared_genetics_desc: "Un genoma de la natura mutado hasta convertirse en una base adecuada para el cultivo de naves biológicas. Sus flotas comparten una conexión intrínseca con los demás simbiontes, y cada especie obtiene fuerza de la otra."
 civic_hive_shared_genetics_effects: "- Por cada rasgo de especie principal que sea §Gpositivo§!: §G+2,5%§! de casco de nave, §R+0,5%§! de mantenimiento.\n- Por cada rasgo de especie principal que sea §Rnegativo§!: §G+1,5%§! de cadencia de fuego de naves, §R+0,5%§! de mantenimiento."
 shared_genetics_fire_rate: "$civic_hive_shared_genetics$: Cadencia de fuego"
 shared_genetics_fire_rate_desc: "Nuestras naves se benefician de los centros de agresión sobreestimulados, impulsados por una mezcla saludable de hormonas y resentimiento."
 shared_genetics_hull: "$civic_hive_shared_genetics$: Casco"
 shared_genetics_hull_desc: "La masa muscular y ósea de nuestras naves se beneficia de la superioridad genética de nuestra especie."
 civic_hive_aerospace_adaptation: "Adaptación aeroespacial"
 civic_hive_aerospace_adaptation_desc: "Las naves biológicas de este colectivo están especialmente adaptadas a los vuelos interatmosféricos, por eso pueden llevar a cabo misiones aéreas de apoyo e incluso ayudar con la logística planetaria."
 civic_hive_aerospace_adaptation_effects: "- Las §Ynaves biológicas§! en la órbita de colonias §Galiadas§! tienen un §G-50%§! de mantenimiento de naves.\n- Las colonias §Galiadas§! con §Ynaves biológicas§! en órbita aumentan su §Yvelocidad de construcción§!, los §Yservicios§!, la §Yvelocidad para despejar barreras§! y puede que el §Yrendimiento de trabajo§!, dependiendo del tamaño de la flota.\n- Las §Ynaves biológicas§! en la órbita de colonias §Rhostiles§! tienen un §G-85%§! de mantenimiento de naves."
 aa_ship_upkeep_friendly: "$civic_hive_aerospace_adaptation$"
 aa_ship_upkeep_bombing: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1_desc: "Las naves biológicas que orbitan este planeta entran y salen de forma rutinaria de la atmósfera para descansar, alimentarse y ayudar a drones del planeta."
 aa_ship_planet_support_2: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_2_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_3: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_3_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_4: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_4_desc: "$aa_ship_planet_support_1_desc:$"
 civic_machine_stalwart_network: "Red incondicional"
 civic_machine_stalwart_network_desc: "Esta inteligencia mecánica está especializada en procedimientos militares defensivos que combinan la defensa pura y dura con protocolos de ataque y retirada."
 defensive_stations_tracking_add: "$t$- Seguimiento de estaciones defensivas y base estelar"
 defensive_stations_tracking_add_tt: "$defensive_stations_tracking_add$: $VARIABLE|0=+$"
 defensive_stations_weapon_range_mult: "Alcance de arma de estaciones defensivas y base estelar"
 defensive_stations_weapon_range_mult_tt: "$defensive_stations_weapon_range_mult$: $VARIABLE|1%=+$"
 #Bodysnatcher
 civic_hive_bodysnatcher: "Invasores de cuerpos"
 civic_hive_bodysnatcher_desc: "Lo que cuenta es lo que hay en el interior. Esta colmena se especializa en la infiltración, apropiándose de los cuerpos de los orgánicos desafortunados. Inevitablemente, a medida que crece el número de marionetas, la civilización anfitriona es absorbida por el colectivo."
 civic_hive_bodysnatcher_effects: "Comienza el juego con §Y1000§! £pop£ poblaciones asimiladas y con la habilidad de §Yasimilar§! orgánicos en la mente colmena.\nTiene acceso a la misión de espionaje ['concept_operation_bodysnatcher_prepare_invasion'].\nObtiene £pop£ poblaciones extra de la misión de espionaje ['concept_operation_smuggle_pops']."
 civic_hive_bodysnatcher_secondary_species: "Impostores"
 NAME_Bodysnatchers: "Ladrones de cuerpos"
 operation_bodysnatcher_prepare_invasion: "Preparar la invasión"
 operation_bodysnatcher_prepare_invasion_desc: "Nuestros vecinos tienen mentes muy maleables. Si enviamos cuerpos preparados, ya integrados en nuestras consciencias, podremos atraerlos más fácilmente al redil."
 operation_bodysnatcher_prepare_invasion_on_success: "$IF_SUCCESSFUL|E$\nContaremos con la ayuda de agentes internos cuando declaremos la guerra a §Y[Target.GetName]§!."
 operation_invasion_prepared: "$TRIGGER_FAIL$ §RYa hemos preparado una invasión contra este país. Declara una guerra para desencadenarla.§!"
 operation_invasion_impossible: "$TRIGGER_FAIL$ §REste país está demasiado preparado contra intentos de infiltración. ¡No podemos poner en marcha esta operación!§!"
 concept_operation_bodysnatcher_prepare_invasion: "$operation_bodysnatcher_prepare_invasion$"
 concept_operation_bodysnatcher_prepare_invasion_desc: "Operación en la que poblaciones asimiladas de la especie objetivo se infiltran en el imperio a fin de prepararse para un sabotaje masivo una vez estalle la guerra."
 bio.800.name: "Trabajo nuevo"
 bio.800.desc: "Nuestros cuerpos infiltrados tienen que situarse en ubicaciones estratégicas antes de que implementemos nuestro gran proyecto. La información que recopilamos reveló que los principales objetivos eran bases estelares con poco personal y planetas mal defendidos. Pronto nos pondremos manos a la obra."
 bio.805.name: "Personal adicional"
 bio.805.desc: "El trabajo sigue desarrollándose con normalidad, nuestros cuerpos han encontrado más huéspedes, y la implicación de [Target.GetName] en la materia se ha consolidado. Nuestros drones pronto habrán absorbido cualquier mente inquisitiva."
 bio.810.name: "Nuevas oportunidades"
 bio.810.desc: "Los [Target.GetSpeciesName] que no pudimos reemplazar han sido eliminados de sus puestos, lo que ha creado varias vacantes dentro de la estructura de §Y[Target.GetName]§!. Nuestros títeres están listos para abrir la puerta a nuestra infiltración completa, tan solo hay que darles el visto bueno."
 bio.815.name: "Nuevos reclutas"
 bio.815.desc: "Los §Y[From.Target.GetName]§! se han visto comprometidos. Están preparados para la invasión, y lo único que tenemos que decidir es cuántos impostores enviaremos para que se infiltren en su imperio. Pronto, todos seremos [Owner.GetAdj]."
 bio.815.tt: "No tenemos suficientes poblaciones de las especies objetivo para llevar a cabo esta acción."
 bio.815.a: "Hemos enviado todo lo que hemos podido."
 bio.815.b: "Asegurad que sus puestos de avanzada son nuestros."
 bio.815.b.tt: "Enviad §Y100§! £pop£ §Hpoblaciones§!.\n$bio.815.reminder$"
 bio.815.c: "Preparad las invasiones de sus planetas."
 bio.815.c.tt: "Enviad §Y300§! £pop£ §Hpoblaciones§!.\n$bio.815.reminder$"
 bio.815.d: "¡Infiltraos en sus fortalezas!"
 bio.815.d.tt: "Enviad §Y500§! £pop£ §Hpoblaciones§!.\n$bio.815.reminder$"
 bio.815.e: "¡Convertidlos en nosotros!"
 bio.815.e.tt: "Enviad §Y2000§! £pop£ §Hpoblaciones§!.\n$bio.815.reminder$"
 bio.815.reminder: "La próxima guerra que declaremos contra §Y[From.Target.GetName]§!, o que se declare contra nosotros, en los próximos §G10§! años, usará a nuestros infiltrados preparados."
 bio.825.name: "Invasión de los [From.GetSpeciesNamePlural]"
 bio.825.desc.small: "Los insidiosos de [From.GetName] se han infiltrado en nuestro imperio. Nuestras estaciones espaciales están comprometidas y ya están invadiendo nuestras colonias. ¡Tenemos que eliminar a los impostores!"
 bio.825.desc.large: "Al principio, pensamos que era un error. La mitad de nuestra red de comunicaciones quedó fuera de servicio.\n\nPero no, los tramposos de [From.GetName] reemplazaron sectores enteros de personal clave. Nuestro imperio está fracturado y están invadiendo las colonias.\n\n¡No creáis a nadie!"
 #Smuggle pops operation
 operation_smuggle_pops: "Tráfico de población"
 operation_smuggle_pops_desc: "Nuestros agentes realizarán tareas de extracción a gran escala en elementos aislados de [target.GetName]."
 operation_smuggle_pops_on_success: "$IF_SUCCESSFUL|E$\nVarias £pops£ poblaciones se trasladan a tu imperio."
 smuggle_pops_also_fanatic_egalitarians: "$TRIGGER_FAIL$ §REn [Target.GetName] también son igualitarios fanáticos y su pueblo ya es libre.§!"
 smuggle_pops_not_enough_pops: "$TRIGGER_FAIL$ §R[Target.GetName] no tiene suficientes £pops£ poblaciones a las que sea rentable robar§!"
 mod_operation_smuggle_pops_difficulty_add: "Dificultad de la operación $operation_smuggle_pops$"
 concept_operation_smuggle_pops: "$operation_smuggle_pops$"
 concept_operation_smuggle_pops_desc: "Operación para robar poblaciones al objetivo."
 bio.900.name: "Adquisición de talentos"
 bio.900.desc: "Nuestros agentes han establecido varios frentes y escondites desde los que supervisan la población de [target.GetName]. Estudiarán a disidentes, solitarios e individuos altamente cualificados y los marcarán para su extracción."
 bio.905.name: "El truco de la desaparición"
 bio.905.desc: "Nuestros agentes han comenzado a reunir objetivos y a ocultarlos en lugares secretos. Siempre que es posible, simulan incidentes para distraer a las autoridades y borrar nuestras huellas."
 bio.910.name: "Lanzaderas"
 bio.910.desc: "La operación ha entrado en una fase crítica en la que debemos trasladar a la órbita a todos los que hemos reunido. El plan actual es sincronizar la salida desde todas las instalaciones y abrumar a las fuerzas de seguridad con señuelos y distracciones."
 bio.915.name: "Extraídos"
 bio.915.desc: "Hemos logrado sacar a muchos de los objetivos, pero la operación no ha sido perfecta y han quedado atrás muchas naves llenas de individuos prometedores."
 bio.915.desc.detected: "$bio.915.desc$\n\nUn desplazamiento de población tan grande no habrá pasado inadvertido."
 bio.915.desc.cosmogenesis: "Hemos logrado extraer a muchos de los objetivos y ya los estamos enviando al torno, pero la operación no ha sido perfecta y han quedado atrás muchas naves llenas de individuos prometedores."
 bio.915.desc.cosmogenesis.detected: "$bio.915.desc.cosmogenesis$\n\nUn desplazamiento de población tan grande no habrá pasado inadvertido."
 bio.915.a: "Hemos hecho lo que hemos podido."
 bio.915.b: "Hay que centrarse en liberar a más [Root.GetSpeciesNamePlural]."
 bio.915.c: "¡Tenemos que sacar a más!"
 bio.915.d: "Que no quede atrás ni un individuo de [GetSpeciesName]."
 bio.915.tt: "Llevad las £pop£ §Hpoblaciones§! desatendidas a mundos apropiados."
 bio.915.asset.tt: "$bio.915.tt$\nSi §Y[From.Target.GetName]§! no conocía nuestra existencia, §Rahora ya la conocen.§!"
 MESSAGE_POPS_SMUGGLED_TITLE: "Pueblos robados"
 MESSAGE_POPS_SMUGGLED_DESC: "¡Esa gente traicionera de $COUNTRY|Y$ ha traspasado la frontera y se ha llevado a nuestro pueblo!"
 opinion_smuggled_pops: "¡Han robado nuestras poblaciones!"
 #Disconnected Drones #
 disconnected_drones_name: "$policy_disconnected_drones$"
 policy_disconnected_drones: "Drones desconectados"
 policy_disconnected_drones_desc: "Podemos decidir si permitimos o no que los drones desconectados de la consciencia central vivan en nuestras colonias."
 disconnected_drones_sustain: "Apoyo"
 disconnected_drones_sustain_name: "Apoyar los drones desconectados"
 disconnected_drones_sustain_desc: "Aunque estén separados de una consciencia colectiva, estos drones se pueden mantener con vida.\n\n§EDesbloquea §Ytipos de ciudadanía§! para drones desconectados.§!"
 disconnected_drones_purge: "Exterminio"
 disconnected_drones_purge_name: "Exterminar a los drones desconectados"
 disconnected_drones_purge_desc: "Los derechos de un ser inteligente no se extienden a los que carecen de razón. Sin una consciencia central que los guíe, estos drones son poco más que animales, y un animal que se interpone es una plaga.\n\n§ESe §Rpurgará§! a todos los drones desconectados que vivan en nuestras colonias.§!"
 disconnected_drones_purged_citizenship: "$TRIGGER_FAIL$Estamos purgando a los drones desconectados en nuestro imperio."
 disconnected_drones_kill_themselves_purge_type: "$TRIGGER_FAIL$Las poblaciones de esta especie, separadas de su consciencia colectiva, morirán."
 citizenship_protected_drone: "Drones protegidos"
 citizenship_protected_drone_tooltip: "$living_standard_disconnected_drone_tooltip$"
 citizenship_protected_drone_tooltip_delayed: "§L$job_disconnected_drone_desc$§!"
 citizenship_symbiotic_drone: "Drones simbióticos"
 citizenship_symbiotic_drone_tooltip: "$living_standard_symbiotic_drone_tooltip$"
 citizenship_symbiotic_drone_tooltip_delayed: "§LEstos drones, separados de la consciencia colectiva, pueden ayudarnos en nuestras colonias.§!"
 citizenship_exploited_drone: "Drones explotados"
 citizenship_exploited_drone_tooltip: "$living_standard_exploited_drone_tooltip$"
 citizenship_exploited_drone_tooltip_delayed: "§LEstos drones, separados de la consciencia colectiva, pueden manipularse para que se conviertan en servidumbre.§!"
 living_standard_disconnected_drone: "Protection"
 living_standard_disconnected_drone_tooltip: "Las poblaciones de estas especies pueden emplearse en £building£ §Yzoológicos alienígenas§!"
 living_standard_disconnected_drone_tooltip_delayed: "$citizenship_protected_drone_tooltip_delayed$"
 living_standard_symbiotic_drone: "Simbiosis"
 living_standard_symbiotic_drone_tooltip: "Las poblaciones de esta especie pueden emplearse como §Ytrabajadores§!."
