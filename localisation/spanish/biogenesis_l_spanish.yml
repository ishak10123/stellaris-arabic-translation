 bio.40.name: "Peculiaridades biológicas" #FINAL STAGE - TRADITION TREE CHOICE
 bio.40.desc: "Ya sea que nos esforcemos por alcanzar nuestra forma más pura, nos abramos paso hacia el éxito a base de clonaciones o nos aumentemos genéticamente mediante una mutación deliberada, este momento marca un punto sin retorno."
 bio.40.desc.evopred: "$bio.20.desc.evopred$"
 bio.40.a: "$bio.20.a$"
 bio.40.b: "$bio.20.b$"
 bio.40.c: "$bio.20.c$"
 #Random Events (Hives)
 bio.110.name: "División de labores"
 bio.110.desc: "A medida que empezamos a mejorar los atributos biológicos de la [target.GetGestaltEntityName], debemos priorizar aquellas mejoras que beneficien más a nuestra civilización.\n\nLa manipulación genética selectiva nos permite crear especialistas con características físicas deseables que se adapten mejor a industrias específicas.\n\nCon estas nuevas capacidades, tenemos la oportunidad de mejorar el repertorio de [target.GetIndividualNamePlural] que trabajan en la producción de energía o en defensa."
 bio.110.a: "La energía nunca está de más."
 bio.110.b: "Deberíamos priorizar la defensa."
 bio.115.name: "Redundancia generacional"
 bio.115.desc: "Al implementar una nueva plantilla biológica para nuestros drones, debemos determinar cómo proceder con los drones que resulten incompatibles con la mejora genética.\n\nAlgunos modelos más obsoletos no resistirán dichas alteraciones. Podemos conservarlos como mano de obra hasta que su ciclo vital se agote, o reciclar su biomateria para reabastecer la colmena."
 bio.115.a: "Reciclemos a los drones antiguos."
 bio.115.b: "Siguen siéndonos de utilidad."
 bio.120.name: "Velocidad o aguante"
 bio.120.desc: "Un gran avance en la investigación genética ha revelado una forma de mejorar la eficiencia del relé neuronal, lo que aumenta significativamente la productividad de cada [target.GetIndividualName].\n\nSin embargo, este incremento de actividad cerebral no es sostenible por mucho tiempo, puesto que acorta su esperanza de vida.\n\nDebemos decidir entre respetar nuestra esperanza de vida actual o aumentar el rendimiento a costa de nuestra longevidad."
 bio.120.a: "Nos quedamos con nuestra esperanza de vida actual."
 bio.120.b: "Exprimamos a la plantilla de [target.GetIndividualNamePlural] para aumentar la productividad."
 bio.125.name: "Sobrecarga sináptica"
 bio.125.desc: "Se ha integrado un lote de [target.GetIndividualNamePlural] recientemente aumentados en [target.GetGestaltEntityName], con su ingeniería biológica perfeccionada para acelerar el desarrollo neuronal y los procesos cognitivos. Los nodos sinápticos más importantes de la [target.GetGestaltEntityName] están rindiendo a un nivel sin precedentes.\n\nPor otra parte, esta aceleración ha reducido la estabilidad de la plantilla de [target.GetIndividualNamePlural], lo que ha producido una desastrosa sobrecarga sináptica. Otra opción es reasignar más [target.GetIndividualNamePlural] a labores de coordinación."
 bio.125.a: "Bajemos el ritmo para mantener la estabilidad."
 bio.125.b: "Que nuestra vida sea breve, pero fulgurante."
 bio.130.name: "Fenómenos en la frecuencia"
 bio.130.desc: "Desde que integramos la nueva remesa de clones en nuestra colmena, hemos observado desagradables problemas audiovibratorios. Es posible que un error en el proceso de clonación haya trastocado el desarrollo de sus transmisores biológicos y causado interferencias en la frecuencia.\n\nCuando estos clones interactúan con la colmena principal, casi todos los drones de las proximidades sufren sonoros episodios de acúfenos mentales. Las distracciones son demasiadas, y la productividad corre peligro."
 bio.130.a: "Es desagradable, pero no insoportable."
 bio.130.b: "Eliminad a los clones transgresores."
 bio.135.name: "Un problema en movimiento"
 bio.135.desc: "Los últimos experimentos de clonación han arrojado resultados sorprendentes. Según parece, algunos clones poseen vínculos neurológicos con sus donantes genéticos, por lo que se mueven irremediablemente a la par.\n\nEl fenómeno persiste sin importar la distancia, con drones aislados que imitan las acciones de sus homólogos en algún rincón de la galaxia. Las posibilidades que esto nos brinda son interesantes.\n\nPodemos llevar a cabo una iniciativa para que los clones y sus donantes trabajen al unísono en entornos idénticos, o extraer los neurotransmisores responsables para estudiar mejor el fenómeno."
 bio.135.a: "Construyamos estaciones de trabajo idénticas para donantes y clones."
 bio.135.b: "Pasemos el bisturí por sus enlaces sincrónicos."
 bio.140.name: "Clones incompatibles"
 bio.140.desc: "En un intento de mejorar la colmena, hemos cultivado una tanda de clones a partir de material de donantes, y hemos acelerado su madurez de manera artificial. Aunque son excelentes especímenes biológicos, estos clones son incompatibles.\n\nA pesar del inconveniente, esta divergencia presenta una gran oportunidad. Ahora, estos drones poseen una identidad y un pensamiento únicos, lo que puede ser útil para contactar con entidades ajenas al colectivo. Su capacidad para pensar de forma autónoma podría cerrar las brechas allá donde la voz unificada de la colmena lucha por adaptarse. Aun así, estos beneficios conllevan un precio: su creciente percepción de la individualidad ha provocado una inquietud que afecta algunas de nuestras principales funciones cognitivas."
 bio.140.a: "Forcemos la integración."
 bio.140.b: "Aprovechemos su potencial."
 bio.145.name: "Preocupaciones en la creación"
 bio.145.desc: "Nuestra consciencia colectiva está en crisis. Ahora poseemos la capacidad de crear copias de nosotros mismos, pero dudamos y cuestionamos la eficacia (e incluso la moralidad) de tales acciones.\n\nLos procesos de clonación requieren una gran cantidad de recursos. ¿Deberíamos destinarlos a otra cosa, especialmente cuando la procreación natural tiende a producir más diversidad genética?\n\nHistóricamente hablando, nunca ha sido nuestro modo de procrear, y no estamos seguros de si seremos capaces de aceptar un cambio tan drástico en nuestra especie."
 bio.145.a: "No podemos ignorar la eficacia de la clonación."
 bio.145.b: "La diversidad genética es esencial."
 bio.150.name: "Desgaste de la colmena"
 bio.150.desc: "Nuestros experimentos de mutación han provocado irregularidades en la colmena. Las tareas que antes se desarrollaban con facilidad ahora exigen un esfuerzo deliberado, ya que unas directivas contradictorias atenazan la mente colectiva.\n\nLa fatiga resultante amenaza con desgastar a algunos de nuestros drones más eficaces, si bien también supone una oportunidad.\n\nHemos de decidir si hacemos una pausa para recuperarnos o si queremos rendir por encima de nuestras posibilidades."
 bio.150.a: "Merecemos un descanso."
 bio.150.b: "Ya dormiremos cuando estemos muertos."
 bio.151.name: "Con fuerzas renovadas"
 bio.151.desc: "Nuestra decisión de descansar y recuperarnos ha dado sus frutos. Los otrora disonantes impulsos se han estabilizado para confluir en un flujo armonioso que dota al colectivo de una claridad renovada.\n\nLos drones que operaban al límite del desgaste ahora trabajan con una precisión infatigable. Este periodo de reflexión no solo ha reducido nuestra fatiga colectiva, sino que también ha fortalecido nuestra determinación para los desafíos que tenemos por delante."
 bio.151.a: "¡Brillamos con luz propia!"
 bio.155.name: "Especializarse o generalizar"
 bio.155.desc: "La mutación ofrece numerosos beneficios. Con las mejoras adecuadas, podremos adaptar la colmena para que cumpla mejor su función. La especialización en producción de minerales ya es posible gracias a unos apéndices de quitina endurecida.\n\nTambién podemos aumentar todos los drones con más modificaciones genéricas que les permitan desempeñar multitud de funciones."
 bio.155.a: "Generalizar es más útil."
 bio.155.b: "Sigamos excavando."
 bio.160.name: "Deriva fenotípica"
 bio.160.desc: "Los experimentos actuales han planteado complejidades inesperadas en la colmena. Están surgiendo drones con peculiares características físicas como exoesqueletos con púas, descomunales apéndices u órganos con una extraña sensibilidad.\n\nEstas divergencias otorgan beneficios concretos, pero también conllevan una carga metabólica. La colmena tiene problemas para compensar esta tensión en aumento. Cabe preguntarse..., ¿cuánta mutación es suficiente?"
 bio.160.a: "Aceptemos el dinamismo."
 bio.160.b: "Hay que mantener la cohesión."
 bio.165.name: "Nostalgia por el pasado"
 bio.165.desc: "La colmena está cambiando. Al modificar nuestros genomas, hemos apreciado una gran mejoría de salud. Sin embargo, esto nos ha hecho menos resistentes a la angustia psicológica.\n\nJamás rechazamos cómo éramos en el pasado y, aunque somos más fuertes y hemos evolucionado en el plano cognitivo, echamos en falta la familiaridad de nuestros antiguos patrones de pensamiento.\n\nPor toda la colmena existe la incómoda sensación de que nuestros cuerpos no encajan con nuestra psique. ¿Hemos evolucionado más de la cuenta?"
 bio.165.a: "La vida es un cambio constante."
 bio.165.b: "No podemos perder nuestra esencia."
