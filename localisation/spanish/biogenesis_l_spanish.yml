 #General Events
 action.1.desc_109: "§HEn lugar de un comunicado apacible y ordenado, nos han asaltado tres señales por separado. A pesar de que el contenido de unas y otras varía enormemente, cada una habla con la misma voz.§!\n\nSeñal 1: [GetPrimaryHiveFEConversation]\nSeñal 2: [GetSecondaryHiveFEConversation]\nSeñal 3: [GetTertiaryHiveFEConversation]\n\n§HEn este punto, las voces se han sumido en una maraña de galimatías. Los análisis revelan que cada señal alberga una designación compleja. Para facilitar su uso, las hemos traducido de la siguiente manera: §Y[GetPrimaryHiveFEName]§!, §Y[GetSecondaryHiveFEName]§! y §Y[GetTertiaryHiveFEName]§!.§!"
 war_first_hivefe: "\"Criaturas endebles. Nos intriga saber cómo lucháis. Observar vuestros conflictos y escuchar vuestras conversaciones... sería nuestro divertimento. ¿Por qué...?\""
 growth_first_hivefe: "\"¡Vivís en la abundancia! Estáis bien nutridos. ¿Prosperáis por necesidad o porque así lo queréis? No lo recordamos. ¿Por qué...?\""
 control_first_hivefe: "\"Menudos cuerpos... Vuestros [Species.GetEyeNamePlural] están un 3% descentrados. Es un aspecto que debe corregirse, y asumiremos que estáis de acuerdo. ¿Por qué...?\""
 war_second_hivefe: "\"... escudos son inútiles, ni siquiera soportan el corazón de una estrella. Esta galaxia os resultará aterradora... Estaréis...\""
 growth_second_hivefe: "\"... orificios insuficientes. Con tres [Species.GetMouthName], empezaríais a notar los resultados. Podéis...\""
 control_second_hivefe: "\"... idioma es ineficaz hasta decir basta. Hay que racionalizar el anarquismo de vuestra gramática. Aplicaréis nuestros cambios...\""
 bio.3000.name: "Pensar a conciencia"
 bio.3000.desc: "§HLa disonancia habitual de los fragmentos del imperio caído ha desaparecido. Las tres voces se han armonizado, llenas de ira.§!\n\n¡[owner.GetSpeciesName] inconscientes! Habéis accedido al sistema de impresiones finales. Seremos francos: este lugar no es para vuestros [owner.GetEyeNamePlural]. Como sigáis, las consecuencias serán inimaginables... y vuestro dolor, insoportable.\n\nNo nos/lo/me perturbaréis."
 bio.3000.a: "Activad el viaje UL de emergencia."
 bio.3000.b: "No nos iremos."
 bio.3005.name: "Recapacitando"
 bio.3005.desc: "§HLa sintonía o coro de los tres fragmentos se reanuda hablando al unísono:§!\n\n... rgo!¡Largo!¡Largo!¡Largo!¡Largo!¡Largo!¡Lar...!"
 bio.3005.a: "¡Activad el UL de emergencia!"
 bio.3005.b: "Vuestros secretos serán nuestros."
 #Task Events
 #War
 bio.3105.name: "La supervivencia de los más fuertes"
 bio.3105.desc: "Frágiles [root.GetSpeciesNamePlural], ¡ha llegado el día de demostrar vuestra valía! Tenemos una nueva raza de nave biológica. La cepa ya ha demostrado su capacidad para diezmar a sus coetáneas, y es hora de probarla ante algo alienígena. Un espécimen llegará a §Y[target_system.GetName]§! a su debido tiempo.\n\nEsta empresa nos facilitará datos de lo más interesantes."
 bio.3105.militarist: "¡Un digno desafío!"
 bio.3105.a.tooltip: "La nave experimental de un imperio caído llegará a §Y[target_system.GetName]§!"
 bio.3105.b: "¿Podemos oponernos?"
 NAME_New_Breed: "Raza nueva"
 NAME_Experimental_Ship: "Nave experimental"
 bio.3110.name: "Decepcionante"
 bio.3110.desc: "La raza experimental sigue con vida. Aun así, sois demasiado débiles.\n\nDeberíamos haber enviado una ameba."
 bio.3110.a: "¿Debemos disculparnos?"
 bio.3120.name: "Lección aprendida"
 bio.3120.desc: "Qué maravilla. Nos congratula que hayáis reparado en la tendencia de esta raza a evitar el fuego y la hayáis aprovechado en consecuencia. Para la próxima generación gestada, os garantizamos que esta tara no estará presente.\n\nJóvenes [root.GetSpeciesName], habéis madurado. Debéis prepararos."
 bio.3130.name: "Demasiado silencio"
 bio.3130.desc.notruce: "Nos hemos percatado de que no estáis librando ninguna batalla. ¿Por qué? Si los imperios jóvenes no luchan, se quedarán rezagados. Hemos seleccionado a un oponente para vosotros: §Y[unfortunate_country.GetName]§!. Si los vencéis en una década, vuestro desarrollo seguirá adelante."
 bio.3130.desc.truce: "$bio.3130.desc.notruce$\n\nAh, no os preocupéis por la tregua que tenéis con ellos. Ya no existe."
 bio.3130.a: "Valiente sandez..."
 bio.3130.a.pacifist: "¡No solo se avanza a base de conflictos!"
 bio.3130.a.militarist: "¡Una iniciativa excelente!"
 bio.3150.name: "Una oportunidad para la paz"
 bio.3150.desc: "Jóvenes [Root.GetName], venimos con una advertencia... y un desafío.\n\nPese a lo tentador que resulta arramblar con todo lo que os rodea, para apreciar realmente la guerra debéis conocer la paz.\n\nDedicad una década a reflexionar sobre lo que habéis conseguido. Hacednos caso; si no descansáis, acabaréis por romperos."
 bio.3150.a.mean: "¿A qué viene esa estupidez?"
 bio.3150.a.pacifist: "¡Una visión de lo más brillante!"
 #Growth
 bio.3205.name: "Mejoras en el ecosistema"
 bio.3205.desc: "Vuestra reserva de biomasa va con retraso. Ni que fueseis los §Y[targetrivalname.GetName]§!...\n\n¿Por qué nos distraéis?\n\nAh, vale, que sois el recipiente de un patrón largo tiempo dormido, un genoma almacenado y cuidado durante milenios. Hemos retrasado el lanzamiento hasta que sea el momento de la cosecha. Vuestra colonia de §Y[target_planet.GetName]§! es el recipiente ideal. Su biosfera se incorporará en breves."
 bio.3205.a: "Aceptamos."
 bio.3205.a.planetscaper: "¡Enseñadnos!"
 bio.3205.b: "¿§Y[alternate_planet.GetName]§! serviría como reemplazo?"
 bio.3205.b.planetscaper: "Como banco de pruebas, ¡creemos que §Y[alternate_planet.GetName]§! sería mucho mejor!"
 bio.3205.c: "Vaya exigencia más absurda, ¡nos negamos!"
 bio.3205.c.environmentalist: "¡¿Cómo os atrevéis?!"
 bio.3210.name: "Biosfera modificada"
 bio.3210.desc.base: "§Y[fallen_empire_hive_growth.GetName]§! ha completado sus modificaciones en §Y[root.GetName]§!. Su influencia es imperceptible, pero los efectos son innegables."
 bio.3210.desc.radio_bugs: "$bio.3210.desc.base$\n\nAhora, los insectos locales del planeta se comunican usando las mismas frecuencias que nuestros dispositivos inalámbricos. Basta con un gorjeo para controlar una puerta automática, mientras que un enjambre puede incapacitar una fábrica entera. Estamos cambiando de frecuencia para adaptarnos, aunque no todas las instalaciones volverán a operar a pleno rendimiento."
 bio.3210.radio_bugs.accept: "Nos adaptaremos."
 bio.3210.radio_bugs.purge: "Esto es inaceptable, ¡exterminad a los insectos!"
 bio.3210.radio_bugs.purgeota: "Actualizaciones en riesgo. Purgad a los bichos."
 radio_bugs: "Bichos radiofónicos"
 radio_bugs_desc: "Los gorjeos de insectos modificados artificialmente pueblan las ondas de radio de este planeta."
 mod_planet_districts_cities_society_research_produces_add: "£society_research£ $society_research$ por £district£ distritos de ciudad y colmena"
 bio.3210.desc.world_of_thought: "$bio.3210.desc.base$\n\nLas criaturas del planeta que antes se contentaban con pastar y bañarse en el barro ahora nos abordan con inquietantes dilemas existenciales. El imperio caído ha manipulado la fauna planetaria en demasía."
 bio.3210.world_of_thought: "¡¿Los [fallen_empire_hive_growth.GetName] son capaces de hacer eso?!"
 bio.3210.world_of_thought.homicidal: "Mala suerte para ellos."
 bio.3210.world_of_thought.tt: "§Y500§! £pop£ §Hpoblaciones§! nuevas de §Y[This.GetName]§! han obtenido sapiencia"
 bio.3210.desc.world_alight: "$bio.3210.desc.base$\n\nEl mundo está brillando, literalmente. Las modificaciones han hecho que las diversas especies del mundo emitan un brillo bioluminiscente y un zumbido incesante, como el de un motor en marcha. Nuestros [owner.GetColonistPlural] ya no experimentan un ciclo nocturno propiamente dicho, por lo que tendremos que proveerles de equipamiento para simular la oscuridad."
 bio.3210.world_alight.accept: "Es un día atroz para tener [owner.GetEyeNamePlural]."
 bio.3210.world_alight.reject: "Cubridlos y a talar. ¡Esto no puede seguir así!"
 world_alight: "Un mundo de luz"
 world_alight_desc: "Un planeta en el que nunca se hace de noche. Su fauna se manipuló para emitir un brillo permanente, pero también vibraciones chirriantes e incesantes. Los habitantes necesitan mucho equipo de apoyo solo para soportar estas implacables condiciones."
 bio.3220.name: "Entretenimiento genérico"
 bio.3220.desc: "Las especies §Y[boring_species.GetName]§! que habitan en vuestras fronteras decepcionan por su simpleza. Su existencia no es más que un vestigio hueco de su potencial. Este anquilosamiento ofende a nuestra voluntad colectiva. Vamos a brindaros una solución de tres para subsanar este... error.\n\nNo os conviene que nos aburramos."
 bio.3220.tt: "Aporta un §G50%§! de progreso a la situación §Y$evolutionary_predators_situation$§!."
 bio.3220.humanoid: "Dadnos la modificación humanoide."
 bio.3220.mammalian: "Dadnos la modificación mamífera."
 bio.3220.reptilian: "Dadnos la modificación reptiloide."
 bio.3220.avian: "Dadnos la modificación aviarioide."
 bio.3220.arthropoid: "Dadnos la modificación artropoide."
 bio.3220.molluscoid: "Dadnos la modificación moluscoide."
 bio.3220.fungoid: "Dadnos la modificación fungoide."
 bio.3220.plantoid: "Dadnos la modificación plantoide."
 bio.3220.lithoid: "Dadnos la modificación litoidea."
 bio.3220.necroid: "Dadnos la modificación necroide."
 bio.3220.aquatic: "Dadnos la modificación acuática."
 bio.3220.toxoid: "Dadnos la modificación toxoide."
 bio.3220.infernal: "Dadnos la modificación termófila."
 bio.3220.psionic: "Dadnos la modificación psiónica."
 bio.3220.evopred: "No seguiremos estancados por mucho tiempo."
 bio.3220.b: "¡No cambiaremos una especie por un capricho vuestro!"
 bio.3230.name: "Rasgo raro"
 bio.3230.desc: "Hemos observado que algunos de tu tipo han desarrollado un rasgo peculiar que no se encuentra en nuestro vasto repositorio genético. Nos darás más que un análisis: necesitamos una muestra viva del rasgo §Y[fallen_empire_hive_growth.species.GetInterestingTraitName]§!. No te asustes. No hace falta un [interesting_species.GetName] completo. Su [interesting_species.GetHandName] será suficiente para cultivar un reemplazo."
 bio.3230.a: "¿Qué es 1 [interesting_species.GetHandName] en el gran esquema de las cosas?"
 bio.3230.b: "¡No vamos a confiaros nuestra configuración genética!"
 #bio.3245.name: "Eternal Harvest"
 #bio.3245.desc: "We have discovered a derelict transport from the §Y[fallen_empire_hive_growth.GetName]§! in the §Y[transport_system.GetName]§!. Initial scans show it is carrying samples of the Fallen Empire's special crop strain, capable of feeding trillions.\n\nThe transport has been left derelict for months already and we have not seen any movement from the [fallen_empire_hive_growth.GetName] to retrieve it. Could this be a test or a glorious opportunity?"
 #Control
 bio.3305.name: "Una colección completa"
 bio.3305.desc: "§HEste es un mensaje en diferido. Responder no servirá de nada.§!\n\nHemos modificado esta comunicación para vuestra comprensión, teniendo en cuenta vuestro limitado lenguaje. Se requiere la entrega inmediata de los §Y[target_pop.GetSpeciesName]§! para su consiguiente asimilación. Semejante anormalidad es intolerable, por lo que no vamos a dejarla estar.\n\nEl transporte ya ha estacionado en el exterior de §Y[target_pop.Planet.GetName]§!. El tiempo juega en vuestra contra. Si no obedecéis, vuestra estabilidad se verá comprometida."
 bio.3305.a: "Debemos obedecer."
 bio.3305.a.tooltip: "1 §Y[target_pop.GetSpeciesNamePlural]§! de §Y[target_pop.Planet.GetName]§! se transferirán a §Y[fallen_empire_hive_control.Capital.GetName]§!"
 bio.3305.b: "¡Tendréis que llevároslos por la fuerza!"
 bio.3305.followup: "§HAceptamos la comunicación de §Y[fallen_empire_hive_control.GetName]§!. No obstante, en vez de un ancestral [fallen_empire_hive_control.GetSpeciesName], nos recibió la imagen de §Y[target_leader_fe_control.Species.GetName]§! a la que acostumbramos.§!\n\n"
 bio.3310.name: "No temáis"
 bio.3310.desc: "$bio.3305.followup$Hoy es un día trascendental para vosotros. La secuencia genética de vuestra especie permanecerá asimilada en el todo. Vuestro futuro ya no es una incertidumbre. Cuando llegue la hora, seréis parte integral de nosotros."
 bio.3310.familiar_face: "¿Esa es la imagen que tienen de nosotros?"
 bio.3315.desc: "$bio.3305.followup$No queda mucho tiempo. Los experimentos que han estado llevando a cabo en §Y[fallen_empire_hive_control.Capital.GetName]§! son indescriptibles, y no los merece ni nuestro peor enemigo. Espero que los datos de este paquete sirvan para que este fragmento nunca se apodere de nosotros."
 bio.3315.a: "Aceptemos el paquete de datos."
 bio.3315.tooltip: "§G50%§! de probabilidad de que no sea una prueba y contenga grandes secretos del §Yimperio caído§!."
 bio.3315.b: "¡Es una trampa! ¡Cerrad la transmisión!"
 bio.3330.name: "Agenda vital"
 bio.3330.desc: "Esperamos que vuestros numerosos defectos no os impidan comprender la gravedad de la situación. Vuestra titubeante §Ycomunidad galáctica§! ha propuesto una resolución que debe §Y[GetPassFail]§!. Para ayudaros a elaborar vuestros argumentos, podéis hacer uso de nuestro conocimiento superior. Si realmente poseéis la capacidad para formular pensamientos complejos, prestad atención.\n\n§HEl imperio caído ha cortado comunicaciones con nosotros.§!"
 bio.3330.a: "¿Qué ha pasado?"
 bio.3330.b: "¡Esas formas de proceder no son las correctas!"
 fail_resolution: "fracasar"
 pass_resolution: "ser aprobada"
 fe_political_support: "Políticas antiguas"
 fe_political_support_desc: "Con la ayuda de un imperio caído, la licitación y el obstruccionismo serán sencillísimos."
 fe_political_opposition: "$fe_political_support$"
 fe_political_opposition_desc: "$fe_political_support_desc$"
 MESSAGE_PASS_HIVE_FE_TASK_TITLE: "Fragmento de imperio caído complacido"
 MESSAGE_PASS_HIVE_FE_TASK: "Hemos seguido las instrucciones del $FALLEN_EMPIRE|Y$ y han quedado satisfechos con el resultado. Vivimos para ver otro día."
 MESSAGE_FAIL_HIVE_FE_TASK_TITLE: "Fragmento de imperio caído contrariado"
 MESSAGE_FAIL_HIVE_FE_TASK: "No hemos seguido las instrucciones facilitadas por el $FALLEN_EMPIRE|Y$. Solo queda rezar por que nos perdonen."
 bio.3350.name: "Excrecencia galáctica"
 bio.3350.desc: "¿Por qué seguís arruinando la galaxia con vuestras ineptas expansiones? Despertáis tanto encono que nadie os dirá nada, pero os lo advertimos nosotros: vuestras fronteras no son de nuestro agrado, y el espacio estaría mucho mejor si no existierais.\n\nEl sistema §Y[offending_system.GetName]§! es poco práctico y discordante. Debéis eliminarlo de vuestro imperio por el bien de la cohesión galáctica."
 bio.3350.a: "¡¿Queréis que renunciemos a un sistema para que nuestras fronteras queden más bonitas?!"
 bio.3350.bordergore: "¡Nos gusta tal y como está!"
 bio.3350.tt: "Debemos desmantelar la base estelar del sistema §Y[offending_system.GetName]§! o sufriremos la ira del §Y[fallen_empire_hive_control.GetName]§!."
 bio.3355.name: "Dolor de cabeza"
 bio.3355.desc: "¿Sois ignorantes u os lo hacéis? Tan solo teníais que deshaceros del sistema §Y[offending_system.GetName]§!.\n\nTal vez deberíamos adoptar un papel más activo en vuestra purga."
 bio.3360.name: "Lucidez"
 bio.3360.desc: "Nos alegra ver que por fin aprendéis de vuestros errores. El problema con el sistema §Y[FromFrom.GetName]§! ya está finiquitado. Aún estáis a tiempo de asemejaros a nosotros.\n\nSeguiremos observando."
 #Awakening
 #War
 casus_belli_cb_ae_entertainment: "Divertimento"
 war_goal_wg_ae_entertainment: "Divertimento"
 war_goal_wg_ae_entertainment_desc: "La guerra sirve para entretener al imperio despertado y crear rivales a la altura."
 wg_ae_war_entertainment_effect: "El §Y[Root.GetName]§! recompensará nuestra implicación. Cuanto mayor sea el §Yhastío bélico§! del imperio despertado, mejor será la recompensa."
 #Control
 bio.3400.name: "Unidad"
 bio.3400.desc.nogalcom: "En la galaxia, todos somos uno. Los fragmentos menores han visto la verdad y se han reincorporado a nuestro colectivo. Ahora pasaremos a llamarnos §Y[fallen_empire_hive_control.GetName]§!. Sois afortunados al presenciar este momento. Una forma de vida superior vuelve a surcar las estrellas."
 bio.3400.desc.galcom: "$bio.3400.desc.nogalcom$\n\nVamos a asumir el mando de vuestra \"§Ycomunidad galáctica§!\". Lo celebraremos."
 bio.3405.name: "Desafinados"
 bio.3405.desc: "¿Por qué os ponéis palos en las ruedas? En el coro galáctico, estáis dando la nota discordante. Solo queremos que sonéis en armonía. Sin embargo, os aferráis a esa discordancia.\n\nSabed que nuestra sinfonía resonará en toda la galaxia, ya sea con o sin vosotros."
 bio.3405.a: "Hemos oído vuestra melodía y no nos incita a bailar."
 NAME_Appeal_the_Veto: "Recurrir el veto"
 gal_com_arrogance: "Arrogancia"
 #Dig Site
 NAME_Echo: "Mausoleo con eco"
 last_thought_site: "El último pensamiento"
 last_thought_site_desc: "[From.Planet.GetName] repele todo lo que se le acerca. Los investigadores asignados a este estudio han puesto excusas para retrasar su trabajo y, encima, los instrumentos fallan y dan problemas, como si estuvieran rechazando los propios datos.\n\nAlgo ha ocurrido aquí. Algo terrible, cuyos ecos reverberan aún en la realidad."
 bio.3450.name: "El nonato"
 bio.3450.desc: "Nuestro cuidadoso estudio sobre [From.Planet.GetName] nos condujo a las profundidades, a través de interminables capas de materia biológica semifosilizada. Por fin entramos en el núcleo hueco del planeta, pero la opresiva atmósfera se volvía más pesada a cada paso. A pesar de las precauciones de [Root.GetLeaderName], el creciente malestar se hizo insoportable. Muchos [Root.Owner.GetArchaeologistPlural] sucumbieron a un colapso colectivo y quedaron catatónicos. Se les tuvo que evacuar de inmediato.\n\nLa vasta caverna en el corazón del planeta no es un vacío como otro cualquiera. Enterrado dentro de ella, encontramos los restos de algo que superaba en escala a cualquier forma de vida conocida. Los débiles rastros de residuo amniótico disiparon cualquier duda. [From.Planet.GetName] nunca fue una roca estéril. Es un huevo.\n\nY en su interior duerme un monstruo nonato."
 bio.3455.name: "Las sinapsis"
 bio.3455.desc: "En [From.Planet.GetName], nuestros [Root.Owner.GetArchaeologistPlural] han localizado una red de extraños tentáculos incrustados en el cráneo de la criatura nonata. Al seguir los filamentos orgánicos hasta su fuente, descubrimos un conjunto externo de grupos sinápticos; un sistema intrincado que sigue vibrando con un inquietante potencial.\n\nAhora, [Root.GetLeaderName] intenta interactuar con ellos. Para ello, ha accedido a los antiguos circuitos que laten a lo largo de los tentáculos. Cualquier conocimiento que conserve hace mucho que sobrevivió a su anfitrión. Habrá que ver si aún lo recuerda."
 bio.3460.name: "El gambito"
 bio.3460.desc: "Esto sucedió hace cien mil años. Traducir la percepción que tiene la colmena sobre el tiempo en unidades galácticas estándar ha sido un proceso delicado, pero, al escudriñar en los recuerdos del bioordenador, [Root.GetLeaderName] consiguió empezar a reconstruir la verdad.\n\nEn la cúspide de su poder, la colmena se enfrentó a un enemigo que no pudo derrotar. Aunque contaba con muchos aliados, todas las batallas acabaron fracasando y la desesperación alimentó la imprudencia.\n\nGran parte de lo que siguió fue borrado deliberadamente, pero aún quedan fragmentos dispersos, suficientes para vislumbrar su última jugada. La colmena forjó este huevo del tamaño de un planeta a modo de nave para su ascensión, con la cual pretendían abandonar su frágil existencia atada a este astro y fusionarse con la cría. No está claro si pretendían luchar o huir.\n\nPero, cuando la criatura se agitó, las cosas salieron catastróficamente mal."
 bio.3465.name: "La dispersión"
 bio.3465.desc: "Al interactuar con precisión con los bioordenadores supervivientes y su enlace sináptico aún activo, extrajimos los recuerdos finales de la criatura muerta. El proceso degradó rápidamente los bioordenadores bajo la inmensa tensión cognitiva, pero recuperamos la mayoría de los datos a tiempo.\n\nLa colmena, que se enfrentó a la aniquilación, abandonó cualquier precaución y arrojó toda su psique en el huésped nonato en un intento desesperado por sobrevivir. La sobrecarga sináptica resultó fatal, condenó a la criatura y atrapó a la colmena en un bucle recurrente de insoportable agonía. Habría perecido por completo si su aliado más compasivo no hubiera cortado el vínculo. Ahora solo quedan ecos fragmentados de su mente, los cuales perduran en [From.Planet.GetName], un mundo aún atormentado por su último grito.\n\nEl último pensamiento es agonía."
