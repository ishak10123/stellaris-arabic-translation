 #Siege of the Citadel Event Chain
 bio.2005.name: "Fluctuaciones inusuales"
 bio.2005.desc: "Nuestros $job_skywatcher_plural$ han notificado un cambio alarmante.\n\nEn el portal de §Y[Root.Capital.System.GetName]§! se han detectado últimamente unas fluctuaciones sutiles pero inconfundibles. En el pasado, unas perturbaciones similares anunciaron olas de naves biológicas hostiles.\n\nDe ser ciertas estas lecturas, es posible que se produzca un asalto en cuestión de meses. La supervivencia de nuestro pueblo puede depender, una vez más, de la determinación de nuestros defensores."
 abandoned_hatchery_chain_1: "Asedio de la ciudadela"
 abandoned_hatchery_chain_1_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_1_desc: "Los [GetInvadersLower] nos han atacado durante décadas. Nuestra $starbase_deep_space_citadel_1$ es la primera línea de defensa, aunque solo podremos alcanzar la verdadera seguridad cuando descubramos la verdad acerca de nuestros enemigos.\n\nCon cada descubrimiento, estamos más cerca del día en el que llevemos nuestra lucha y largo asedio ante ellos."
 bio.2015.name: "Restos del enemigo"
 bio.2015.desc: "Los restos que dejó la flota biológica aniquilada vagan ominosamente por §Y[Root.Capital.System.GetName]§!. Aunque retorcido y carbonizado, gran parte del material orgánico permanece intacto, lo que ofrece una oportunidad de estudio única.\n\nCon un análisis meticuloso, podremos descubrir los secretos de su grotesca construcción y tal vez obtener alguna idea del enigmático portal del que emergen."
 PROJECT_HATCHERY_SHIP_REMAINS: "Estudiar los restos de la nave biológica"
 PROJECT_HATCHERY_SHIP_REMAINS_DESC: "Los restos de la flota de [GetInvadersLower] ofrecen una rara oportunidad para el estudio. Es posible que tengamos que aprender bastante para garantizar nuestra supervivencia."
 bio.2015.a: "Por fin hay avances."
 bio.2020.name: "Enemigo analizado"
 bio.2020.desc: "Tras un minucioso estudio de los restos biológicos dejados en §Y[Root.Capital.System.GetName]§!, nuestros [Root.GetScientistPlural] creen que pueden tener la clave para comprender el portal que se cierne en la frontera de nuestro sistema.\n\nSe ha identificado un patrón orgánico en lo más profundo del tejido de las criaturas, el cual parece resonar con las fluctuaciones del portal. Si aplicamos ingeniería inversa a esta frecuencia, podríamos atravesar la enigmática grieta nosotros mismos.\n\nHabrá que seguir investigando, pero por primera vez tenemos al alcance de la mano la posibilidad de luchar contra el enemigo."
 abandoned_hatchery_chain_2: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_desc: "Estamos un paso más cerca de descubrir los misterios del portal. Aunque el paso aún no es posible, tenemos los conocimientos necesarios para desarrollar la tecnología pertinente.\n\nPara luchar contra el enemigo necesitamos §Y$tech_wormhole_stabilization$§!."
 bio.2025.name: "Cuna del enemigo"
 bio.2025.desc: "Gracias a nuestros últimos avances en §Y$tech_wormhole_stabilization$§!, hemos llegado a atisbar el extraño sistema §Y[event_target:starlit_sealed_system.GetName]§!.\n\nUna flota de naves biológicas agresivas y una base estelar fortificada nos esperan al otro lado. Se recomienda extremar las precauciones.\n\nHemos encontrado la cuna del enemigo."
 abandoned_hatchery_chain_3: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_desc: "Aunque hemos hallado la cuna de nuestro enemigo, tendremos que descubrir sus secretos para hacer frente a sus defensas.\n\nLa batalla no será fácil, pero después podremos explorar el sistema §Y[event_target:starlit_sealed_system.GetName]§!."
 bio.2027.name: "Crepúsculo del miedo"
 bio.2027.desc: "La flota que protegía §Y[starlit_sealed_system.GetName]§! ha sido destruida. Justo antes de su final, recibimos una inquietante transmisión procedente de la base estelar del sistema. Acabamos de aproximar la siguiente traducción:\n\n§H\"¡Hemos perdido el control! Las naves se están reproduciendo solas. Quienquiera que seas, ¡ayúdanos, por favor!\".§!\n\nToda comunicación cesó desde entonces. Si esto es una victoria, la base de operaciones de nuestro enemigo se alza como una oportunidad estratégica. Una nueva $starbase_deep_space_citadel_1$ puede brillar a la luz del §Y[starlit_sealed_system.GetName]§! para asegurar que una amenaza así jamás vuelva a poner en peligro nuestra civilización."
 bio.2027.a: "Por fin se acaba nuestro asedio."
 citadel_siege_lifted: "Asedio concluido"
 citadel_siege_lifted_desc: "Nuestros valientes defensores han derrotado a los [GetInvadersLower]; por fin ha terminado nuestro largo asedio."
 citadel_siege_lifted_machine: "$citadel_siege_lifted$"
 citadel_siege_lifted_machine_desc: "$citadel_siege_lifted_desc$"
 abandoned_hatchery_chain_4: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_desc: "Se ha purgado a los [GetInvadersLower] del sistema §Y[starlit_sealed_system.GetName]§!, pero la situación aquí es muy diferente a la esperada.\n\nAl parecer, lo único que queda de nuestros verdugos es un mundo destruido."
 PROJECT_BIOMECHANICAL_WORLD: "Hogar del enemigo"
 PROJECT_BIOMECHANICAL_WORLD_DESC: "El mundo natal de los [GetInvadersLower]. ¿Quién era esta gente y qué quería de nosotros?"
 bio.2030.name: "Plaga biomecánica"
 bio.2030.desc: "§Y[event_target:biomechanical_world_target.GetName]§! es una tumba abierta.\n\nLa especie dominante del planeta fue completamente destruida por una forma de vida extraña y agresiva. Una investigación más minuciosa ha revelado que estos no eran organismos naturales, sino máquinas biológicas que fueron criadas en lugar de construidas.\n\n¿Es posible que al creador de estas criaturas le abrumara su propia creación? ¿Podría nuestro enemigo haber sido completamente desconocedor de sus acciones contra nosotros o incluso de nuestra existencia?\n\nLo único que está claro es que las medidas que adoptaron para contener la plaga acabaron destruyéndolos junto a sus abominaciones automatizadas."
 bio.2030.a: "Así que no fuimos las únicas víctimas..."
 smarter_hatchery: "Flotas mejoradas"
 smarter_hatchery_desc: "Han aprendido, se han adaptado... y ya vienen."
 bio.2030.tt: "\n§EDesbloquea el puesto del Consejo:§!\n§H$t$$councilor_warden_of_the_citadel$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$MOD_SHIP_FRIENDLY_TERRITORY_ARMOR_MULT$: §G+1%§!\n$ttt$$mod_shipsize_starbase_deep_space_citadel_1_hull_mult$ §G+2%§!\n$ttt$$mod_starbases_upkeep_mult$: §G-5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$"
 councilor_warden_of_the_citadel: "Alcaide de la ciudadela"
 councilor_warden_of_the_citadel_desc: "El $TITLE$ es nuestro fiel guardián. Su misión es reforzar las defensas, supervisar la preparación militar y asegurarse de que la civilización salga indemne de cualquier amenaza."
 mod_shipsize_starbase_deep_space_citadel_1_hull_mult: "$starbase_deep_space_citadel_1$ $HITPOINTS$"
 mod_shipsize_starbase_deep_space_citadel_2_hull_mult: "$starbase_deep_space_citadel_2$ $HITPOINTS$"
 mod_shipsize_starbase_deep_space_citadel_3_hull_mult: "$starbase_deep_space_citadel_3$ $HITPOINTS$"
 siege_node: "Nodo de asedio"
 siege_node_desc: "Hemos aprendido y nos hemos adaptado. Nuestras defensas resistirán."
 bio.2036.name: "Han aprendido"
 bio.2036.desc: "Hemos detectado una preocupante tendencia en los ataques de las naves biológicas. Cada oleada se muestra más coordinada, con tácticas adaptativas que ponen a prueba sistemáticamente nuestras defensas. Los registros de sensores revelan cambios en las señales de energía y prioridades de apuntado, evidencia de estrategias en evolución.\n\nYa sea por instinto o por una inteligencia colectiva, estas criaturas se vuelven cada vez más formidables. A este ritmo, la próxima oleada será más dura."
 bio.2036.a: "Recemos por los defensores."
 bio.2036.b: "Reforzad los defensores."
 bio.2036.tt: "Con cada nueva oleada, las flotas que llegan a través del §Y$STARLIT_WORMHOLE_GALACTIC$§! crecen en potencia."
 bio.2040.name: "Enemigo perdido"
 bio.2040.desc: "La telemetría que entra del portal revela un acontecimiento crítico en §Y[event_target:starlit_sealed_system.GetName]§!: una fuerza desconocida ha destruido tanto la flota de naves biológicas como su criadero.\n\nAunque saber que los [GetInvadersLower] han encontrado su fin es motivo de regocijo, no podemos ignorar el riesgo que supone que otra potencia pueda hacerse algún día con el control del sistema [event_target:starlit_sealed_system.GetName].\n\nTenemos que darnos prisa para asegurar esta ubicación estratégica antes de que nos enfrentemos a otro asedio."
 bio.2040.a: "Amigos... ¿o nuevos enemigos?"
 citadel_siege_cancelled: "Asedio cancelado"
 citadel_siege_cancelled_desc: "Los [GetInvadersLower] han sido destruidos. ¿Ha terminado por fin nuestro largo asedio?"
