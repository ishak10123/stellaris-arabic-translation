 unlocks_ship_4_bio: "Desbloquea la tecnología para la nave §YTitán tejedor§! del imperio caído."
 tech_cosmogenesis_mauler: "Macero cifrador"
 tech_cosmogenesis_mauler_desc: "A través del trascendentalismo orgánico espaciotemporal-dimensional, este macero es más grande dentro de su compacta estructura, que oculta una densa maraña de musculatura. Su mordida puede resultar más letal que cualquier cosa físicamente imaginable."
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_TITLE: "§HDesbloquea tipo de nave:§! Macero cifrador"
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_DESC: "§HMacero cifrador§!\n$tech_cosmogenesis_mauler_desc$"
 tech_cosmogenesis_weaver: "Tejedor de dilemas"
 tech_cosmogenesis_weaver_desc: "Equipado con conjuntos de armas de apoyo que superan su anatomía visible, el tejedor de dilemas reescribe las normas espaciales. Él solo es capaz de cambiar el curso de batallas enteras."
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_TITLE: "§HDesbloquea tipo de nave:§! Tejedor de dilemas"
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_DESC: "§HTejedor de dilemas§!\n$tech_cosmogenesis_weaver_desc$"
 tech_cosmogenesis_harbinger: "Heraldo de laberintos"
 tech_cosmogenesis_harbinger_desc: "Estos heraldos depositan sus naves de ataque en pequeñas dimensiones entrelazadas. Cada nave es un laberinto de hangares imposibles con la capacidad de desplegar la potencia de fuego de toda una flota."
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_TITLE: "§HDesbloquea tipo de nave:§! Heraldo de laberintos"
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_DESC: "§HHeraldo de laberintos§!\n$tech_cosmogenesis_harbinger_desc$"
 tech_cosmogenesis_stinger: "Aguijón críptico"
 tech_cosmogenesis_stinger_desc: "Equipado con más sistemas de armas de los que su fuente de energía debería soportar, este aguijón no debería funcionar y, aun así, dispara. Sin cesar."
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_TITLE: "§HDesbloquea tipo de nave:§! Aguijón críptico"
