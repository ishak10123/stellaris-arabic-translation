 death_world: "Mundo de muerte"
 death_world_desc: "Si bien este mundo es técnicamente habitable, vivir en él es una auténtica pesadilla. Desde la flora hasta la fauna, pasando por las criaturas más insignificantes, todos los especímenes son más peligrosos que los depredadores más temibles de nuestro planeta natal."
 d_lethal_ecosphere_blocker: "£blocker£ Ecosfera letal"
 d_lethal_ecosphere_blocker_desc: "Los especímenes y experimentos descartados del fragmento de la guerra compiten por la supervivencia en un sangriento acto de selección antinatural. Si bien estos peligrosísimos campos de entrenamiento acabarán con buena parte de los soldados, los supervivientes acabarán convirtiéndose en imparables máquinas de matar."
