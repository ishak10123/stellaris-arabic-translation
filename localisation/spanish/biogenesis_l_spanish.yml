 performative_reformation: "Reforma performativa"
 performative_reformation_desc: "Dejemos que hagan realidad sus fantasías revolucionarias, si eso los hace felices."
 ancestral_inheritance: "Herencia ancestral"
 ancestral_inheritance_desc: "El conocimiento de nuestros antepasados nos guiará hacia el futuro."
 buried_secrets: "Secretos enterrados"
 buried_secrets_desc: "No podemos permitir que nuestras hazañas ancestrales afloren en la actualidad."
 specimen_study: "Estudio de especímenes"
 specimen_study_desc: "La investigación incautada complementará el desarrollo oficial."
 purity_tests: "Pruebas de pureza"
 purity_tests_desc: "Las pretensiones de pureza genética deben verificarse con inspecciones rigurosas del genoma."
 clone_rights: "Derechos de los clones"
 clone_rights_desc: "Respetaremos la autonomía de los individuos clonados."
 class_system: "Sistema de clases"
 class_system_desc: "Debe existir una clara distinción jerárquica entre los ciudadanos y sus clones."
 thorough_inspections: "Inspecciones minuciosas"
 thorough_inspections_desc: "Debemos asegurarnos de que no se produzcan más incidentes en el proceso de producción de clones."
 swift_recovery: "Recuperación veloz"
 swift_recovery_desc: "Nuestra prioridad es la productividad."
 well_adjusted: "Bien adaptados"
 well_adjusted_desc: "Los problemas emocionales deberían ser la menor de nuestras preocupaciones."
 strict_discipline: "Disciplina estricta"
 strict_discipline_desc: "El trabajo duro y la disciplina harán que todos seamos ciudadanos modelo."
 infinite_growth: "Crecimiento infinito"
 infinite_growth_desc: "Aumentaremos la producción de nuestras industrias a pesar de los costes adicionales."
 clone_colonies: "Colonias de clones"
 clone_colonies_desc: "Los ciudadanos duplicados pueden acelerar nuestro proceso de desarrollo de colonias."
 mutant_studies: "Estudios mutantes"
 mutant_studies_desc: "Utilizaremos a estos mutantes como sujetos de prueba para mejorar nuestra comprensión de la mutación."
 aspirational_striving: "Esfuerzo aspiracional"
 aspirational_striving_desc: "Los individuos extraordinarios deben servir de ejemplo, de ideal al que aspirar."
 militaristic_fortitude: "Fortaleza militarista"
 militaristic_fortitude_desc: "La excelencia genética nos llevará a la gloria."
 replicated_success: "Éxito replicado"
 replicated_success_desc: "Estas extraordinarias capacidades no pueden limitarse a una minoría. Deben compartirse con todos los ciudadanos."
 sewer_sweep: "Barrido de alcantarillas"
 sewer_sweep_desc: "Sea lo que sea lo que se arrastra por ahí abajo... no nos gusta."
 weaponized_plague: "Plaga ofensiva"
 weaponized_plague_desc: "Una plaga es una herramienta eficaz que podemos utilizar para reducir el rebaño."
 biohacker_haven: "Refugio de biohackers"
 biohacker_haven_desc: "Nuestro gobierno trabajará para desmantelar las restricciones a la modificación del genoma."
 limited_autonomy: "Autonomía limitada"
 limited_autonomy_desc: "Mantendremos cierto orden y restringiremos el acceso a la manipulación biológica autorizada por el gobierno."
 proactive_management: "Gestión proactiva"
 proactive_management_desc: "La ciencia teórica no es más que especulación. Nuestros líderes deberían centrarse en las tareas que tienen asignadas."
 really_proactive_management: "$proactive_management$"
 really_proactive_management_desc: "En nuestro imperio no hay lugar para trabajadores frívolos."
 #Hive Modifiers
 energetic_manipulation: "Manipulación energética"
 energetic_manipulation_desc: "Las mejoras biológicas aumentan la eficacia."
 defensive_focus: "Enfoque defensivo"
 defensive_focus_desc: "Nuestra prioridad es la defensa. La fuerza y la resistencia son la piedra angular de nuestros ejércitos."
 grunt_retention: "Retención de obreros"
 grunt_retention_desc: "Drones de todas las edades contribuyen a nuestra investigación y desarrollo tecnológico."
 assured_longevity: "Longevidad asegurada"
 assured_longevity_desc: "Con una cohesión y una moral colectivas cada vez mayores, priorizamos activamente nuestro bienestar."
 hyper_charged: "Hipercarga"
 hyper_charged_desc: "El aumento de la eficacia de los relés neuronales nos proporciona periodos de productividad más cortos e intensos."
 hyper_charged_wilderness: "$hyper_charged$"
 hyper_charged_wilderness_desc: "$hyper_charged_desc$"
 vitality_conservation: "Conservación de la vitalidad"
 vitality_conservation_desc: "A medida que se perfeccionan los procesos de aumento, debemos tomarnos tiempo para considerar nuestro bienestar."
 accelerated_growth: "Crecimiento acelerado"
 accelerated_growth_desc: "La productividad se dispara al aumentar nuestra eficiencia."
 interference_perseverance: "Perseverancia ante las interferencias"
 interference_perseverance_desc: "La colmena resiste y se adapta a las interferencias neuronales. Mantenemos la eficiencia operativa a pesar de las molestias."
 tandem_workers: "Trabajadores en tándem"
 tandem_workers_desc: "Estamos sacando el máximo partido a nuestros problemas de coordinación."
 mandated_integration: "Integración obligatoria"
 mandated_integration_desc: "La integración forzosa de los drones rebeldes sofocará cualquier rebelión."
 methodic_procreation: "Procreación metódica"
 methodic_procreation_desc: "Nos centramos en optimizar la tecnología de clonación y abordar las implicaciones éticas y sociales."
 genetic_diversification: "Diversificación genética"
 genetic_diversification_desc: "Deliberamos colectivamente sobre el futuro de nuestra especie, adoptando un enfoque cuidadoso y calculado."
 hive_spa_day: "Descansar para recuperarse"
 hive_spa_day_desc: "Daremos prioridad a nuestro bienestar colectivo con un año de descanso."
 cousin_of_death: "No podemos ni queremos parar"
 cousin_of_death_desc: "No hay tiempo para descansar. Tenemos trabajo que hacer."
 positively_glowing: "Brillo positivo"
 positively_glowing_desc: "Hemos descansado y nos sentimos renovados."
 multi_functionality: "Multifuncionalidad"
 multi_functionality_desc: "La productividad está mejorando y la versatilidad de los drones es alta."
 optimized_workforce: "Mano de obra optimizada"
 optimized_workforce_desc: "La colmena está satisfecha y se especializa en función de las capacidades de cada uno."
 change_is_growth: "Cambiar es crecer"
 change_is_growth_desc: "Crecer es cambiar, y cambiar es crecer. Estamos aprendiendo a un ritmo acelerado."
 maintain_the_essence: "Mantener la esencia"
 maintain_the_essence_desc: "Aunque evolucionemos, debemos preservar nuestra esencia. Somos fuertes y estamos comprometidos."
 strengthened_focus: "Enfoque reforzado"
 strengthened_focus_desc: "Los drones están más sanos y la colmena, más feliz."
 evolutionary_diversion: "Desvío evolutivo"
 evolutionary_diversion_desc: "La colmena se ha visto afectada por cambios significativos. Ahora, nuestra atención debe centrarse en la biomodificación segura."
 biological_corrections: "Correcciones biológicas"
 biological_corrections_desc: "No podemos permitir que anomalías genéticas malintencionadas comprometan nuestras aspiraciones mutacionales."
 cellular_degradation: "Degradación celular"
 cellular_degradation_desc: "Debemos estar abiertos a adoptar nuevas direcciones evolutivas."
 cellular_degradation_wilderness: "$cellular_degradation$"
 cellular_degradation_wilderness_desc: "$cellular_degradation_desc$"
 resilient_hive: "Consciencia resistente"
 resilient_hive_desc: "Nos centramos en los rasgos que mejoran la resistencia física y la adaptabilidad, garantizando la supervivencia de la [GetGestaltEntityName] en entornos hostiles."
 cognizant_hive: "Consciencia consciente"
 cognizant_hive_desc: "Damos prioridad a la capacidad mental y a la coordinación de la plantilla de [GetIndividualNamePlural], fomentando una mejor toma de decisiones y la eficacia operativa."
 pristine_lineage: "Linaje inmaculado"
 pristine_lineage_desc: "Se da prioridad a [GetIndividualNamePlural] de procesamiento y a los nodos de liderazgo."
 breed_for_growth: "Criar para crecer"
 breed_for_growth_desc: "Seleccionamos los rasgos más beneficiosos para la fertilidad y la producción de [GetIndividualNamePlural] saludables."
 breed_for_growth_wilderness: "$breed_for_growth$"
 breed_for_growth_wilderness_desc: "$breed_for_growth_desc$"
 relentless_focus: "Enfoque implacable"
 relentless_focus_desc: "No podemos permitirnos desprendernos de nuestros intereses. La pureza es nuestro objetivo, y debemos desprendernos de todo lo demás."
 infrastructural_bolstering: "Refuerzo de infraestructuras"
 infrastructural_bolstering_desc: "Los medios de producción de la [GetGestaltEntityName] no deben verse comprometidos en nuestra búsqueda de la pureza."
 anomaly_purging: "Purga de anomalías"
 anomaly_purging_desc: "No se debe jugar con el azar. Cualquier anomalía debe eliminarse inmediatamente."
 anomaly_purging_wilderness: "$anomaly_purging$"
 anomaly_purging_wilderness_desc: "$anomaly_purging_desc$"
 rigorous_examination: "Examen riguroso"
 rigorous_examination_desc: "Algunas de estas supuestas impurezas pueden ser beneficiosas para la [GetGestaltEntityName]. No debemos apresurarnos a erradicarlas."
 rigorous_examination_wilderness: "$rigorous_examination$"
 rigorous_examination_wilderness_desc: "$rigorous_examination_desc$"
 population_relocation: "Reubicación de la población"
 population_relocation_desc: "Podemos equilibrar la posible presión sobre la colmena debido al crecimiento de la población relacionado con los clones si reubicamos a los ciudadanos excedentes."
 factotum_reserves: "Reservas de factótum"
 factotum_reserves_desc: "La producción de energía de la colmena se verá reforzada con clones de trabajo versátiles."
 simple_minds: "Mentes simples"
 simple_minds_desc: "La colmena se deleita con las calmantes propiedades de unas cuantas mentes sencillas."
 the_new_batch: "Clones: la nueva remesa"
 the_new_batch_desc: "Adiós a la remesa vieja y hola a la nueva."
 metaphysical_hive: "Colmena metafísica"
 metaphysical_hive_desc: "Reflexionamos sobre la naturaleza de la existencia y su propósito, aunque ello cause disonancias."
 metaphysics_rejected: "Metafísica rechazada"
 metaphysics_rejected_desc: "Las cuestiones metafísicas son distracciones de la mente solitaria; no hallamos el propósito en ponderar la existencia, sino en vivir como uno."
 boosted_neurology: "Neurología potenciada"
 boosted_neurology_desc: "Hemos deliberado durante demasiado tiempo. Debemos comprometernos con la transformación de nuestra especie, independientemente de los posibles inconvenientes."
 balanced_advancement: "Avance equilibrado"
 balanced_advancement_desc: "Nuestra experimentación mutacional no tiene por qué alterar la forma en que estamos conectados."
 rage_quitting: "Supresión de la ira"
 rage_quitting_desc: "La agresividad desenfrenada no tiene cabida en la colmena."
 fury_embracing: "Abrazando la furia"
 fury_embracing_desc: "Aceptamos el caos imprevisto del futuro."
 decisive_meditation: "Meditación decisiva"
 decisive_meditation_desc: "Elegimos aceptar primero la naturaleza tumultuosa de nuestra consciencia y avanzar juntos hacia una perspectiva general más equilibrada."
 meteorological_adaptations: "Adaptaciones meteorológicas"
 meteorological_adaptations_desc: "Debemos dedicar tiempo y recursos a aumentar nuestra resistencia climatológica."
 body_builders: "Culturistas"
 body_builders_desc: "La fuerza física es la cima de la evolución."
 deep_thinkers: "Pensadores profundos"
 deep_thinkers_desc: "Lo que nos sostiene es nuestra capacidad de pensar en profundidad."
 sensible_supremacy: "Supremacía sensata"
 sensible_supremacy_desc: "Podemos ser audaces y precavidos a la vez."
 decisive_termination: "Terminación decisiva"
 decisive_termination_desc: "Para contener un brote de plaga, acabaremos con los afectados."
 survival_study: "Estudio de supervivencia"
 survival_study_desc: "El estudio minucioso de [GetIndividualNamePlural] que padezcan la plaga nos acercará a la cura."
 survival_study_wilderness: "$survival_study$"
 survival_study_wilderness_desc: "$survival_study_desc$"
 uncorrected_blunders: "Errores no subsanados"
 uncorrected_blunders_desc: "Es posible que no hayamos verificado nuestros cálculos."
 maverick_citizens: "Ciudadanos inconformistas"
 maverick_citizens_desc: "Si no has hecho nada malo, no hay nada que temer."
 #Advanced Governments
 #Purity
 bio.170.name: "Pureza: ¿Reforma del Gobierno?"
 bio.170.desc: "Nuestra especie se encuentra al borde de su próxima gran frontera. Ahora debemos tomar una decisión.\n\n¿Abrazaremos nuestro destino, purificando nuestro linaje genético para elevar nuestra civilización a nuevas cotas de excelencia genética? ¿O aprenderemos de las lecciones del pasado y proseguiremos en nuestra forma actual, sin refinar?"
 bio.170.a: "¡Abracemos la pureza y avancemos hacia nuevas alturas!"
 bio.170.a.tt: "$change_auth_tt$[GetPurityAuthority]"
 bio.170.b: "No hace falta que cambiemos nuestra forma de gobernarnos."
 #Cloning
 bio.175.name: "Clonación: ¿Reforma del Gobierno?"
 bio.175.desc: "Nuestra especie ha llegado a un momento crucial. Hay que tomar una decisión.\n\n¿Abrazaremos nuestro destino aprovechando el poder de la clonación, transformándonos irrevocablemente en una civilización de perfección replicada? ¿O asimilaremos las lecciones de nuestro viaje hasta la fecha y persistiremos en nuestra innecesaria diferenciación?"
 bio.175.a: "Aceptamos la clonación como una parte vital de nuestro futuro."
 bio.175.a.tt: "$change_auth_tt$[GetCloningAuthority]\n$LEADERS_GAIN_CLONES$"
 bio.175.b: "$bio.170.b$"
 #Mutation
 bio.180.name: "Mutación: ¿Reforma del Gobierno?"
 bio.180.desc: "Estamos en la cúspide de una frontera biológica crucial. Nos espera una elección importante.\n\nPodemos abrazar nuestro destino aprovechando el poder de la mutación biológica avanzada, transformando irrevocablemente nuestra civilización mediante la evolución deliberada de nuestro código genético. O podemos preservar las lecciones aprendidas de nuestras hazañas pasadas y continuar en nuestra forma mundana actual."
 bio.180.a: "Podemos serlo todo y cualquier cosa."
 bio.180.a.tt: "$change_auth_tt$[GetMutationAuthority]"
 bio.180.b: "$bio.170.b$"
