 bio.1005.avian: "Los aviarioides podrían otorgarnos una agilidad sin parangón."
 bio.1005.arthropoid: "Los artropoides son deliciosamente crujientes."
 bio.1005.molluscoid: "Hasta un moluscoide puede enseñarnos algo."
 bio.1005.fungoid: "Los fungoides se expanden rápido. Nosotros podríamos hacer lo mismo."
 bio.1005.plantoid: "La eficiencia energética de los plantoides podría sernos útil."
 bio.1005.lithoid: "El ADN litoideo es difícil de consumir, pero nos aporta deliciosas oportunidades."
 bio.1005.necroid: "La carne necrótica no deja de ser carne."
 bio.1005.aquatic: "Las adaptaciones acuáticas brindan estrategias de supervivencia más allá del mar."
 bio.1005.toxoid: "Los toxoides son §Gamargos§!."
 bio.1005.infernal: "Los termófilos §Rqueman§!, pero ahora podremos soportarlo."
 bio.1005.plasmic: "Estabilizar el ADN plasmático sería una hazaña increíble."
 bio.1005.leviathan: "¿Qué pueden enseñarnos los titanes de la galaxia?"
 bio.1005.psionic: "¿Qué contiene el genoma psiónico para nutrir semejante proeza cognitiva?"
 bio.1005.random: "Unámonos al caos y dejemos que nuestros instintos nos guíen."
