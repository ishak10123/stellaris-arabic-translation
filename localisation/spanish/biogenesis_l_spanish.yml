 district_mindlink: "Metrópoli de vínculo mental"
 district_mindlink_plural: "$district_mindlink$"
 district_mindlink_desc: "Altas agujas eclipsan los centros de población, ofreciendo a los voluntarios la oportunidad de comulgar directamente con la bestia."
 planet_building_buffer: "Conversión de metrópoli"
 planet_building_buffer_desc: "Aunque hacer crecer las agujas mentales para comunicarnos con la bestia es un proceso rápido, hemos tenido que planificar contingencias para asegurar el apoyo continuo de la infraestructura del planeta."
 mod_job_transference_volunteer_add: "Trabajos de $job_transference_volunteer$"
 planet_transference_volunteers: "$job_transference_volunteer_plural$"
 job_transference_volunteer: "Voluntario de transferencia"
 job_transference_volunteer_plural: "$job_transference_volunteer$"
 job_transference_volunteer_desc: "Para muchos, el vínculo mental con la bestia solo es una idea de fondo, constante pero lejana. Para otros, sin embargo, la necesidad de fundirse con ella es incontrolable. Estos voluntarios actúan como canales mientras su mente se va absorbiendo en el colectivo bestial."
 job_transference_volunteer_effect_desc: "\nLos £job_transference_volunteer£ [GetTransferenceVolunteerDrone] producen £unity£ §Yunidad§!, incrementan la $r_stability$ del planeta y hacen más fuertes a nuestras §Ynaves§!.\n§YEl 10%§! de la población que realice este trabajo será §Ytransferida§! cada 6 meses, lo que hará que mueran, pero multiplicará la producción de recursos del distrito.\n\n§GPoblación transferida§!: [num_tranferred_pops]"
 mod_job_transference_drone_add: "Trabajos de [GetTransferenceVolunteerDrone]"
 job_transference_drone: "Dron de transferencia"
 job_transference_drone_plural: "$job_transference_drone$"
 job_transference_drone_desc: "Aunque el vínculo mental ha establecido una conexión permanente entre la bestia y nosotros, el proceso de transferencia es lento. Sin estas precauciones, nos arriesgamos a dañar las mentes y destruirlo todo."
 MESSAGE_POPS_TRANSFERRED_TITLE: "Población transferida."
 MESSAGE_POPS_TRANSFERRED_DESC: "Se han transferido $VALUE|Y$ poblaciones. Sus mentes viven ahora dentro de la bestia."
 #Crisis Events
 biocrisis.50.name: "Nivel 1: Experimentación embrionaria"
 biocrisis.50.desc: "Existimos en simbiosis con nuestras naves biológicas, pero siempre se nos ha escapado un componente vital…\n\nInspirados por los colosos del vacío, hoy emprendemos en nuestro periplo más ambicioso: engendrar al más grande de todos ellos. Este gigante se presentará como un nuevo ser, un superdepredador con una razón de ser, en lugar de ser fruto de una evolución ciega.\n\nEl primer reto será crear un huevo descomunal, apto para la gestación de vida de inaudita magnitud. Además de los nutrientes que habrá de contener, necesitamos que su cascarón sea capaz de absorber la luz y el calor del ambiente, así como de procesar gases para materializar sustento suplementario."
 biocrisis.50.a: "Nuestros vástagos eclipsarán a las mismas estrellas."
 biocrisis.55.name: "Nivel 2: Autorrealización"
 biocrisis.55.desc: "Mientras las naves de construcción se afanaban en el ensamblaje del cigoto y su cascarón en la órbita de un gigante gaseoso, nuestra industria alimentaria procesaba los nutrientes necesarios para crear el albumen de un huevo de gigante. Mucho más difícil ha resultado, en cambio, crear una yema fertilizada viable.\n\nTuvimos que consumir ingentes cantidades de biomasa de naves biológicas y fauna espacial hasta que logramos componer la estructura básica de un ADN apto, que procedimos a internar en una avanzadísima célula de fertilización. Las pruebas microscópicas han dado buenos resultados. Estamos listos para aumentar, exponencialmente, la magnitud del experimento. Tan solo queda fertilizar nuestro huevo descomunal.\n\n¡Pronto incubaremos el ser vivo más titánico que haya visto jamás esta galaxia!"
 biocrisis.55.a: "Nos acercamos a la cima de la evolución."
 biocrisis.60.name: "Soberbia y hambre"
 biocrisis.60.desc: "Nuestra maestría genética no conoce parangón, y nuestros logros superan a los de los imperios inferiores de esta galaxia.\n\nSin embargo, el gigante que hemos engendrado no reconoce nuestro poderío. Lo mueve un instinto voraz, y apenas logramos saciar su apetito con las cantidades inmensas de alimento que le proporcionamos. Llegado el momento, cabe esperar que entre en razón y acate nuestras directrices, pero el tiempo es oro. No descartamos que pueda escapar a nuestro control cuando menos lo esperemos, poniendo en riesgo miles de millones de vidas."
 biocrisis.60.a: "Encontraremos la manera."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3: "Experimentos de conexión cerebral"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3_DESC: "Estamos experimentando con neurotecnología en un intento de conectar a distancia nuestras mentes con el sistema nervioso de los gigantes. Creemos que es la única forma de domar a la bestia."
 biocrisis.15.name: "Sinfonía sináptica"
 biocrisis.15.desc: "Nuestra neurotecnología de vanguardia por fin ha ideado la manera de sortear la barrera de comunicación entre nosotros y nuestra formidable prole. La única manera de lograrlo es vincular nuestras mentes con la mente de la bestia. Y no hablamos mentes individuales, sino del peso mental colectivo de toda nuestra especie. Si procedemos con demasiada celeridad, corremos el riesgo de sobrecargar el sistema nervioso del gigante. Es aconsejable extremar las precauciones."
 biocrisis.15.a: "La perfección biológica conlleva un coste alto."
 biocrisis.65.name: "Nivel 4: Encarnación bestial"
 biocrisis.65.desc: "Aunque se ha planteado la hipótesis de crear un vínculo mental con el gigante, las consecuencias logísticas son aterradoras. La propuesta imperante es ubicar en nuestra capital el centro de conexión principal, que nos permitirá procesar a la población cuando nos fundamos con la bestia.\n\nAdemás, próximamente, los avances científicos en curso nos permitirán mejorar más aún nuestras creaciones mediante un insólito proyecto de mutación experimental."
 biocrisis.65.a: "Nos fundiremos en un solo ser."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4: "Fusión mental"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC: "La consciencia del gigante es mucho más vasta y compleja de lo que imaginábamos: ahora entendemos que no basta con la mente de un solo individuo para lograr su plena integración. Nuestras mentes, si bien superiores a la mayoría, jamás fueron concebidas para tener cabida en un cuerpo de semejante medida.\n\nEl primer paso consistirá en conectar con el gigante las mentes individuales de nuestra población. Lo que en un principio será un tenue enlace, no tardará en convertirse en un torrente, una inundación que mitigue la furia del gigante."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_HIVE: "No puede haber lugar para la divergencia dentro de la colmena. Nunca había sido tan crucial la necesidad de concentrarnos. Un solo dron no bastará como conducto entre nosotros y el gigante; debemos habitar la mente de la bestia con nuestra plena consciencia colectiva.\n\nEsto nos cambiará. Nuestras mentes se fundirán en una y nos convertiremos en una sola entidad. Esta noción casi insondable es difícil de asimilar, pero no debemos preocuparnos, ¡pronto seremos el ser más poderoso de la galaxia!"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_MACHINE: "La idea de habitar un recipiente biológico siempre ha sido inquietante. Nuestra estirpe se forjó a través de generaciones de drones de cuerpo sólido. Los que vinieron antes no podían concebir el camino que ahora recorremos. Sin embargo, abandonaremos nuestros cuerpos mecanizados y nos refugiaremos en una bestia viviente.\n\nFusionados en la carne, ¿seguiremos siendo máquinas? La respuesta es un rotundo <<ERROR: NO ENCONTRADO>>.\n\nLa lógica dicta que la única forma de avanzar es aceptar la incertidumbre, como hacen a menudo los seres biológicos. En el cuerpo de un gigante encontraremos nuestras respuestas. Nos fusionaremos con la criatura, convirtiéndonos en uno. Sobrevivir siempre ha sido nuestra principal directriz; ahora prosperaremos."
 biocrisis.20.name: "Uno con la bestia"
 biocrisis.20.desc: "¡Ha funcionado! ¡Contra todo pronóstico, ha surtido efecto! Hemos establecido un enlace con el gigante y ya estamos trabajando en reforzar el vínculo, conforme se transfieren nuestras primeras mentes. La bestia nos recibe con mansedumbre en un espacio más allá del espacio mismo, un espacio que siempre ha sido nuestro. A través de este, percibimos el espíritu de todas las bestias que controlamos, y nuestra población entera es, desde lo más recóndito de su mente, partícipe de la magnitud del gigante.\n\nYa no puede caber duda alguna de que somos la fuerza más letal e imparable de la galaxia. Bajo esta nueva forma, desataremos toda nuestra furia contra nuestros enemigos atemorizados. ¡La galaxia entera está a nuestro alcance!"
 biocrisis.20.a: "¡Nos alimentaremos!"
 biocrisis.70.name: "Nivel 5: Ansias voraces"
 biocrisis.70.desc: "Transferida ya una porción suficiente de nuestra población, ahora poseemos el control directo del gigante y su carne. La bestia no hace sino crecer, cuando su potencial genético aún no ha despertado en su mayoría, y así será hasta que cuente con mentes y nutrientes suficientes. Nos invade ahora una rabia primitiva, y nuestra sed de sangre no conoce límites. Necesitamos consumir. Necesitamos devorar. Nos atiborraremos con la galaxia misma.\n\nDespojémonos de los corsés de la civilización cual bestia que muda la piel; hoy nada más nos importa la vida entre astros."
 biocrisis.70.a: "Somos demasiado grandes para fracasar."
 biocrisis.105.name: "Agonía monstruosa"
 biocrisis.105.desc: "Una de nuestras bestias ha caído. Esto es lo que les sucede a las criaturas débiles: la naturaleza se deshace de ellas. Aunque no lloramos la muerte de un gigante que no fue capaz de defenderse en batalla, haríamos bien en centrar nuestros esfuerzos en garantizar que sus hermanos no corran la misma suerte. Debemos asegurar la longevidad de nuestra prole, o de lo contrario también caeremos."
 biocrisis.105.a: "Esta muerte no será en vano."
 biocrisis.105.b: "Un sacrificio lamentable."
 biocrisis.130.name: "Una bestia de las estrellas"
 biocrisis.130.desc: "A pesar de las dificultades afrontadas, hemos engendrado un gigante que emerge hoy de la crisálida en la que fue incubado.\n\nMás grande, feroz y hambriento. La criatura ya deambula por el vacío en busca de sustento.\n\nEsta bestia es el orgullo de la manada y traerá una destrucción incalculable a todos los que se atrevan a cruzarse en su camino."
 biocrisis.130.a: "Una vez más, superamos los límites de la naturaleza."
 biocrisis.150.name: "Un desafío aceptado"
 biocrisis.150.desc: "Parece ser que nuestro ascenso no estará exento de rivales. Percibimos una masa inconmensurable en el sistema [event_target:voidspawn_spawn_location.GetName]. Es un engendro del vacío, una antigua monstruosidad cuya presencia empequeñece incluso a las construcciones más poderosas de la ambición mortal.\n\nSu forma sobrenatural desafía la comprensión convencional, sumiendo la galaxia en un lúgubre crepúsculo, como si las propias estrellas temieran su paso.\n\nLa intención del engendro del vacío es tan clara como su trayectoria: viene a por nosotros, a por el cuerpo de nuestro gigante, a por la mente colectiva que se atrevió a trascender la carne para reclamar el dominio sobre el vacío. No se trata de una mera confrontación de poder material, sino de una prueba de en qué nos hemos convertido.\n\nEs evidente que, si luchamos ahora, pereceremos. Debemos evitarlo por el momento y seguir acopiando fuerzas, hasta desarrollar colmillos lo bastante afilados para perforar lo imperforable."
 biocrisis.150.desc.b: "$biocrisis.150.desc$"
 biocrisis.150.a: "Podemos correr, pero no podemos escondernos."
 biocrisis.155.desc: "Este es un mensaje de suma importancia. El §Y$NAME_Boss_Voidspawn$§!, una entidad de poder incomprensible, ha emergido de las profundidades del vacío. Se siente atraído por [event_target:behemoth_empire.GetName], un imperio que ha trascendido la mortalidad y se ha convertido en una sola entidad con una bestia. Estos dos titanes, diametralmente opuestos, ahora amenazan a toda la galaxia.\n\nSi el gigante cae, es posible que el engendro del vacío se detenga a reposar. Si el gigante prevalece, el poder que ejerce cambiará el equilibrio de la galaxia para siempre. Preparaos, porque las decisiones que toméis ahora marcarán los eones venideros."
 biocrisis.155.a: "¿Cómo podemos prevenirlo?"
 biocrisis.155.b: "¿Quién nos salvará?"
 biocrisis.155.c: "¿Cómo se ha llegado a esto?"
 biocrisis.155.d: "¿Qué podemos hacer?"
 biocrisis.156.desc: "No lo habéis entendido. La prevención es la preocupación de aquellos que aún tienen tiempo. Nosotros no disponemos de tal lujo.\n\nLa bestia está aquí. Nuestra antigua orden ha resistido calamidades en el pasado, pero, hablando en plata, la situación en la que nos encontramos ahora mismo es crítica."
 biocrisis.157.desc: "Una pregunta comprensible. Ingenua, pero comprensible. Con la sabiduría viene la aceptación. Sabemos que nadie vendrá a salvarnos.\n\nNuestra orden es pequeña, así que poco podríamos haber hecho. Vosotros, sin embargo, podríais haber actuado antes para frenarlo. Si no lográis derrotar al [event_target:behemoth_empire.GetName], intentaremos no echároslo en cara cuando la galaxia se desmorone."
 biocrisis.158.desc: "Los imperios tienden a ir más allá de sus posibilidades. El [event_target:behemoth_empire.GetName], en concreto, eligió la ambición antes que la precaución, y la arrogancia por encima de la sabiduría.\n\nAlbergaban poderes que superaban su comprensión y forzaron a sus cuerpos para que tomaran formas que no fueron capaces de controlar. Y, al hacerlo, es posible que nos hayan condenado a todos."
 biocrisis.159.desc: "Según el análisis inicial sobre vuestras habilidades de combate, creemos que luchar no os haría ningún favor. La evaluación de vuestras flotas indica que huir sería igualmente inútil. La situación que se presenta en estos momentos es inevitable.\n\nDos formidables bestias se están preparando para luchar a través de las estrellas. Si tenéis suerte, puede que sobreviváis a ellas.\n\nSi sois sabios, aprenderéis de esta insensatez. Pero sabed que, cuando la batalla termine, la galaxia habrá cambiado. Otra cuestión completamente distinta es si alguno de nosotros todavía estará aquí para verlo.\n\n... Hipotéticamente, si os interesase salvar la galaxia, matar al gigante podría poner fin a la caza del engendro del vacío."
 biocrisis.162.name: "En su camino"
 biocrisis.162.desc: "Ha llegado a nuestro territorio un $NAME_Boss_Voidspawn$. Este ente ancestral, según se rumorea, es inmortal e invencible. En sus ojos se advierte un destello de inteligencia alienígena, y la existencia misma retumba ante el peso de los eones que a cada movimiento arrastra.\n\nLas señales fragmentarias que emiten tienen a nuestros [species.GetEyeNamePlural] desbordados. Caos, distorsión y el más hondo terror cósmico reverberan en nuestro interior.\n\nUn enfrentamiento contra semejante bestia del que salgamos airosos es impensable, pero podremos contribuir a aplacar su furia si le ayudamos a cazar a su presa. Debemos encontrar al §Ygigante§! y darle muerte; es nuestra única posibilidad de sobrevivir."
 biocrisis.162.a: "¡Evitemos al monstruo a toda costa!"
 biocrisis.175.name: "Engendro destruido"
 biocrisis.175.desc: "El engendro del vacío ya no existe. Una enormidad que empequeñecía a las estrellas ha sido aniquilada. Los restos de su forma de otro mundo ahora flotan a la deriva en el vacío, disipándose poco a poco hasta quedar en nada.\n\nOtro imperio ha demostrado una potencia de fuego y una coordinación que superan nuestra imaginación más desbordante. La galaxia no es lo que parecía. El equilibrio de poder ha cambiado, al igual que nuestro lugar en él.\n\n¿Qué es lo que impulsa a estos asesinos de bestias? Ha sido una demostración de fuerza, un mensaje para todos los que pretendan oponerse a ellos, o simplemente el preludio de algo mucho peor?"
 biocrisis.175.desc.kaiju: "Si esta galaxia alberga fuerzas capaces de destruir al $NAME_Boss_Voidspawn$, también puede destruirnos a nosotros. No nos diferenciamos tanto de la bestia que ha sido abatida.\n\nLa misma potencia de fuego que ha desgarrado su vieja carne podría volverse algún día contra nosotros. La galaxia ha cambiado, y nosotros debemos cambiar para adaptarnos a ella.\n\nEn adelante, no bastará la rabia ciega para asegurar nuestra supervivencia. El vacío ha visto caer a un depredador alfa. Puede que no sea el último."
 biocrisis.175.a: "Debemos proceder con cautela."
 biocrisis.180.name: "Asesinos del vacío"
 biocrisis.180.desc: "Al final, la supuesta invencibilidad del engendro del vacío anciano ha resultado ser un mito como otro cualquiera, que nuestras flotas han desmentido con su poderío. Ahora que hemos acabado con esta amenaza ancestral, la galaxia respira aliviada de nuevo."
 biocrisis.180.desc.kaiju: "Aunque el $NAME_Boss_Voidspawn$ ha perecido, su cuerpo vibra con energía residual. Antiguo y poderoso, para nosotros es un nutritivo banquete de potencial en bruto.\n\nLos tendones y la médula de la bestia serán consumidos, su esencia alienígena entrelazada con la nuestra. El poder del engendro del vacío era inmenso y, ahora, es nuestro."
 biocrisis.180.a: "No existe bestia capaz de darnos caza."
 biocrisis.180.b: "El festín acaba de comenzar."
 biocrisis.185.name: "Solo puede quedar uno"
 biocrisis.185.desc: "Una terrible revelación nos llega a través del vacío: no estamos solos en nuestra ascensión. Ha surgido otro gigante, imitador henchido de majestad grotesca, en su tentativa de emular nuestra perfección. No podemos tolerarlo.\n\nNo hay lugar para otro superdepredador. No hay paz en el horizonte, solo carne que devorar. Comienza la caza."
 biocrisis.185.a: "¡Devoraremos su corazón!"
 biocrisis.187.name: "Advertencia de gigante de clase IV"
 biocrisis.187.desc: "Algo se remueve en las profundidades del vacío.\n\nCruzando las estrellas, un imperio ha iniciado la fase final de su grotesca transformación y cría gigantes monstruosos, no ya como armas, sino como naves. No buscan el dominio; buscan la unión. Quieren una fusión de mente y carne, de imperio y horror.\n\nSi lo consiguen, dejarán de ser un pueblo para convertirse en un hambre inmensa y única.\n\nEsto no se puede permitir. Si hay que impedirlo, debemos hacerlo ahora, antes de que crucen el último umbral."
 biocrisis.187.a: "¡Cazad a la bestia!"
 biocrisis.190.name: "Vacío alfa"
 biocrisis.190.desc: "Hemos eliminado los últimos obstáculos. Los aspirantes, los rivales, el fragor desesperado de seres inferiores: todos silenciados. Las mismas estrellas tiemblan, porque estamos ante el precipicio del verdadero advenimiento.\n\nYa no estamos atados a las frágiles formas de nuestros antepasados. Los planetas son jaulas, Los imperios son efímeros. La ilusión de individualidad pronto se disolverá en la unidad vasta y perfecta del gigante. Mente y horror, intelecto y carne, todo uno.\n\nLa transferencia roza su fin. Cuando concluya, ya no nos limitaremos a existir sin más.\n\nPrevaleceremos."
 biocrisis.190.a: "¡COMPLETAD LA TRANSFERENCIA!"
 biocrisis.190.tt: "Ganaremos el juego en 30 días."
 biocrisis.190.b: "Un momento, todavía no hemos terminado."
 biocrisis.190.b.tt: "Sigue jugando con tu imperio actual."
 BEHEMOTH_TRANSFERENCE_PROJECT: "Completar la transferencia"
 BEHEMOTH_TRANSFERENCE_PROJECT_DESC: "Bastante hemos comulgado con la bestia. La transferencia está lista, y aguarda nuestra orden. Nos situamos en la cúspide de la ascensión, dispuestos a abandonar las míseras cenizas de nuestro dominio planetario y elevarnos sobre las cadenas de la carne y la gravedad."
 biocrisis.191.name: "Victoria del gigante"
 biocrisis.191.desc: "¡La fusión se ha completado!\n\nYa no somos lo que éramos ni estamos sujetos por los límites de seres inferiores. Somos pensamiento y hambre entremezclados, una vasta voluntad que abarca el vacío.\n\nLa galaxia se extiende ante nosotros, frágil y efímera. Pero estamos más allá del simple dominio. Somos libres de quedarnos, libres de partir, libres de cazar.\n\n¿Qué haremos con nuestra eternidad?"
 biocrisis.191.a: "Quedémonos en esta galaxia... por ahora."
 biocrisis.191.a.tt: "Los gigantes seguirán siendo criaturas salvajes, y ya no se podrá jugar con ellos."
 biocrisis.191.b: "Vámonos. El vacío nos pide que avancemos."
 biocrisis.191.b.tt: "El imperio de los gigantes desaparecerá de la galaxia y ya no se podrá jugar con él."
 biocrisis.191.c: "Los supuestos cazadores ahora conocerán el miedo."
 biocrisis.192.name: "El horror imparable"
 biocrisis.192.desc: "Se acabó. El [behemoth_winner.GetName] se ha elevado más allá de la carne, del imperio, de cualquier cosa que se pueda llamar civilización. Ya no es una nación; es una fuerza.\n\nLos mundos se desmoronan en su presencia. Las flotas arden. Los últimos refugios de los que fueron poderosos se dispersan como chispas en el vacío. No hay diplomacia, ni súplica, ni batalla final.\n\nNo luchamos por la supervivencia; solo retrasamos lo inevitable. El fin ha llegado."
 biocrisis.192.tt: "[behemoth_winner.GetName] está a punto de ganar el juego."
 biocrisis.196.name: "Devorados por completo"
 biocrisis.196.desc: "Hace años, el gigante y su prole abandonaron nuestra galaxia. Contemplamos con alivio cómo la bestia que podía habernos exterminado se perdió en el vacío carente de estrellas. Y entonces... nada. Después de recorrer cientos de miles de años luz, desapareció sin más. Ni radiación, ni imágenes residuales ni ondas gravitatorias. Es como si nunca hubiese existido."
 biocrisis.196.a: "Hay que descifrar esto."
 UNSETTLING: "Inquietante."
 biocrisis.197.name: "Quis Venabitur Ipsos Venatori"
 biocrisis.197.desc: "Llevamos años intentando descubrir el paradero del gigante, pero seguimos sin novedades. Como las hipervías no llegan tan lejos, nos apoyamos en teorías y pseudociencias para adivinar cómo fueron sus últimos instantes.\n\nLa criatura no mostraba temor. Simplemente echó a volar y, a renglón seguido, su forma se distorsionó, se retorció en espiral hacia dentro cual paño de tela, y desapareció sin oponerse ni dejar rastro alguno.\n\nAlgunas teorías sugieren que se trata de una nueva forma de viaje UL, que se ocultó en una grieta o anomalía del espacio profundo, o la más preocupante: que un poder externo doblegó su existencia. Sea cual sea la verdad, está fuera de nuestro alcance... y de nuestra comprensión, seguramente."
 biocrisis.197.a: "Lo mejor será no pensar más en ello."
 biocrisis.197.b: "Nuestros prethoryns capturados se inquietan."
 biocrisis.265.name: "Tañidos agonizantes"
 biocrisis.265.desc: "La agonía final del gigante es insoportable. La criatura tiene demasiado de nosotros dentro de ella, y a medida que los ecos de su consciencia se desvanecen, nosotros también lo hacemos."
 biocrisis.265.a: "!! - ... "
 biocrisis.520.name: "El titán hueco"
 biocrisis.520.desc: "El gigante ha muerto.\n\nSu forma titánica vaga inerte en el vacío como monumento a nuestro triunfo y a los límites del entendimiento. Los [Root.GetScientistPlural] han corrido a analizar sus restos, deseosos de atesorar los secretos de su mente inabordable, pero han fracasado todos los intentos de revivirlo con máquinas, nigromancia o las invocaciones más desesperadas.\n\nAhora ha quedado clara la triste razón: el cerebro del gigante no era solo una red de células, sino un encaje de superconductores orgánicos entretejidos de maneras que ninguna inteligencia conocida, ya sea artificial, biológica o arcana, es capaz de reproducir. Al morir, su estructura neuronal se ha descompuesto como un circuito machacado y hecho añicos. No existe energía, ni voluntad, ni fuerza que pueda recomponer lo que se ha perdido.\n\nLa mente más grande de la galaxia está, ahora y por siempre, en silencio."
 biocrisis.520.a: "Nada permanece."
 biocrisis.520.b: "Hasta los dioses pueden morir."
 BEHEMOTH_MUTATION_PROJECT: "$menp_behemoth_mutation_research$"
 BEHEMOTH_MUTATION_PROJECT_DESC: "Nuestros recientes descubrimientos acerca de la genética del gigante podrían expandirse para mutar nuestras creaciones. La estabilidad genética es una preocupación, pero con tiempo y recursos, confiamos en poder potenciar aún más las mejoras biológicas."
 BEHEMOTH_FATE_PROJECT: "El destino del gigante"
 BEHEMOTH_FATE_PROJECT_DESC: "Después de abandonar nuestra galaxia, el gigante flotó hacia el vacío y desapareció. Podemos intentar desentrañar el misterio, pero a esta distancia solo nos quedan métodos no convencionales. Lo más probable es que las respuestas sean tan vagas como el mismo vacío."
 behemoth_mutation_a: "$menp_behemoth_mutation_research$: Agresión"
 behemoth_mutation_a_tt: "$MOD_SHIP_FIRE_RATE_MULT$ de gigante: §G+$@behemoth_mutation_a_fire_rate_mult|0%$§!\n$MOD_SHIP_ARMOR_MULT$ de gigante: §R$@behemoth_mutation_a_armor_mult|0%$§!\n$MOD_SHIP_SPEED_MULT$ de gigante: §R$@behemoth_mutation_a_speed_mult|0%$§!"
 behemoth_mutation_a_desc: "Los músculos gigantes causan ataques devastadores."
 behemoth_mutation_b: "$menp_behemoth_mutation_research$: Templanza"
 behemoth_mutation_b_desc: "La cepa genética radiotrófica inyectada en nuestras formas de vida especiales reduce significativamente su necesidad de sustento."
 behemoth_mutation_c: "$menp_behemoth_mutation_research$: Agilidad"
 behemoth_mutation_c_tt: "$MOD_SHIP_SPEED_MULT$ de gigante: §G+$@behemoth_mutation_c_speed_mult|0%$§!\n$MOD_SHIP_EVASION_MULT$ de gigante: §G+$@behemoth_mutation_c_evasion_mult|0%$§!"
 behemoth_mutation_c_desc: "Un conjunto más potente de glándulas subespaciales hace que nuestros gigantes sean más ágiles."
 behemoth_mutation_bio: "$menp_behemoth_mutation_research$: Precisión"
 behemoth_mutation_bio_tt: "$MOD_SHIP_WEAPON_RANGE_MULT$ de gigante: §G+$@behemoth_mutation_bio_weapon_range_mult|0%$§!\n$MOD_SHIP_ACCURACY_MULT$ de gigante: §G+$@behemoth_mutation_bio_accuracy_mult|0%$§!"
 behemoth_mutation_bio_desc: "La adaptación multiocular permite una mayor precisión de disparo a increíbles distancias."
 behemoth_mutation_synth: "$menp_behemoth_mutation_research$: Resiliencia"
 behemoth_mutation_synth_tt: "$MOD_SHIP_ARMOR_MULT$ de gigante: §G+$@behemoth_mutation_synth_armor_mult|0%$§!\n$MOD_SHIP_ARMOR_REGEN_ADD_PERC$ de gigante: §G+$@behemoth_mutation_synth_armor_regen_add_perc|0%$§!"
 behemoth_mutation_synth_desc: "Al derretir aleaciones y quitina se crea un caparazón de varias capas que mantiene los órganos vitales a salvo."
 behemoth_mutation_corpo: "Comercialización de gigantes"
 behemoth_mutation_corpo_tt: "Comercio mensual: §G+$@behemoth_mutation_corpo_trade_produces_mult|0%$§! por gigante"
 behemoth_mutation_corpo_desc: "Nuestros accionistas estaban algo preocupados por el proyecto Gigante, pero el aumento de los dividendos los convenció rápidamente."
 behemoth_mutation_psi: "$menp_behemoth_mutation_research$: Barrera"
 behemoth_mutation_psi_tt: "$MOD_SHIP_SHIELD_REGEN_ADD_PERC$ de gigante: §G+$@behemoth_mutation_psi_shield_regen_add_perc|0%$§! por $pop_group_unit$ £job_telepath£ $job_telepath_plural$ o $job_transference_volunteer$\n$MOD_SHIP_SHIELD_HARDENING_ADD$ de gigante: §G+$@behemoth_mutation_psi_shield_hardening_add|0%$§! por $pop_group_unit$ £job_telepath£ $job_telepath_plural$ o $job_transference_volunteer$\nNúmero actual de 100 £job_telepath£ $job_telepath_plural$ y $job_transference_volunteer$ contratados: §Y[GetNumTelepathsAndTransference]§!"
 behemoth_mutation_psi_desc: "Aunque los gigantes no están conectados al Velo, los hemos criado para que sean lo suficientemente receptivos a nuestros telépatas para que puedan utilizar barreras psiónicas defensivas."
 behemoth_mutation_psi_2: "$menp_behemoth_mutation_research$: Psiónico"
 behemoth_mutation_psi_2_desc: "¡Tomad el poder, bestias!"
 behemoth_mutation_cyber: "$menp_behemoth_mutation_research$: Cibernética"
 behemoth_mutation_cyber_desc: "Para utilizar el poder de la furia de los gigantes, desarrollaremos el ciberware más avanzado que haya existido nunca."
 behemoth_cyber_rage: "$BLANK_STRING$"
 edict_behemoth_nanite_augmentation: "Aumento de gigante: Nanorrobots"
 edict_behemoth_nanite_augmentation_desc: "Los caparazones de gigante infundidos con nanorrobots pueden regenerar incluso el peor daño en un tiempo récord."
 behemoth_nanite_augmentation_tt: "$MOD_SHIP_ARMOR_REGEN_ADD_PERC$ de gigante: §G+$@behemoth_edict_armor_regen_add_perc|0%$§!"
 edict_behemoth_living_metal_augmentation: "Aumento de gigante: Metal vivo"
 edict_behemoth_living_metal_augmentation_desc: "La superposición del metal vivo entre capas de quitina crea un blindaje reactivo con propiedades ablativas mejoradas."
 behemoth_living_metal_augmentation_tt: "$MOD_SHIP_ARMOR_HARDENING_ADD$ de gigante: §G+$@behemoth_edict_armor_hardening_add|0%$§!"
 edict_behemoth_alloys_augmentation: "Aumento de gigante: Aleaciones"
 edict_behemoth_alloys_augmentation_desc: "Atornillar placas de aleación en los caparazones es rudimentario, pero eficaz."
 behemoth_alloys_augmentation_tt: "$MOD_SHIP_ARMOR_MULT$ de gigante: §G+$@behemoth_edict_armor_mult|0%$§!"
 concept_edict_behemoth_nanite_augmentation: "$edict_behemoth_nanite_augmentation$"
 concept_edict_behemoth_living_metal_augmentation: "$edict_behemoth_living_metal_augmentation$"
 concept_edict_behemoth_alloys_augmentation: "$edict_behemoth_alloys_augmentation$"
 biocrisis.280.name: "$menp_behemoth_mutation_research$"
 biocrisis.280.desc: "Hemos desarrollado varias fórmulas mutagénicas diseñadas para mejorar a nuestros gigantes, todas ellas hechas a medida para desbloquear nuevas fortalezas y adaptaciones. Sin embargo, su inmensa fisiología solo puede aguantar una única inyección; cualquier intento de combinar múltiples fórmulas provoca un fallo celular catastrófico. La línea que separa la evolución de la aniquilación es muy delgada, y debemos elegir con cuidado nuestras mejoras."
 biocrisis.280.a: "¡Hacedlos más feroces!"
 biocrisis.280.b: "Que estén... menos hambrientos."
 biocrisis.280.c: "¡Que sean más rápidos!"
 biocrisis.280.psi: "El poder del Velo los sustentará."
 biocrisis.280.bio: "¡Hacedlos más mortíferos!"
 biocrisis.280.cyber: "Canalizad su rabia."
 biocrisis.280.cyber.tt: "Nuestros gigantes obtienen un §G25%§! de posibilidades de resistir su cólera.\nMientras están enfurecidos, obtienen §G+$@behemoth_cyber_rage_fire_rate_mult|0%$§! de cadencia de fuego, §G+$@behemoth_cyber_rage_shield_penetration_add|0%$§! de penetración de blindaje y §G+$@behemoth_cyber_rage_armor_penetration_add|0%$§! de penetración de escudo"
 biocrisis.280.synth: "Su blindaje será impenetrable."
 biocrisis.280.corp: "A la porra, ¡vamos a hacer peluches!"
 biocrisis.280.machine: "Fusionad la carne con el acero."
 biocrisis.280.machine_tt: "Desbloquea tres edictos de §YAumento de gigante§!:\n$t$['concept_edict_behemoth_nanite_augmentation']\n$t$['concept_edict_behemoth_living_metal_augmentation']\n$t$['concept_edict_behemoth_alloys_augmentation']"
 #Crisis Objectives
 crisobj_build_bioships_name: "Construir naves biológicas"
 crisobj_build_bioships_desc: "Tras dominar el cultivo de naves biológicas, ahora estamos perfeccionando y mejorando estos procesos. Esta simbiosis continua nos aporta ventajas cada vez mayores, mejorando nuestras flotas y reforzando nuestro dominio sobre el cosmos viviente."
 crisobj_breed_fauna_name: "Criar fauna espacial"
 crisobj_breed_fauna_desc: "Tras dominar la cría de fauna espacial, ahora estamos perfeccionando y mejorando estos procesos. Esta simbiosis continua nos aporta ventajas cada vez mayores, mejorando nuestras flotas y reforzando nuestro dominio sobre el cosmos viviente."
 crisobj_kill_bioships_name: "Destruir naves biológicas"
 crisobj_kill_bioships_desc: "Las naves biológicas enemigas interfieren con nuestro dominio biológico. Debemos actuar con decisión, destruyéndolas para neutralizar la amenaza que suponen para nuestra supremacía."
 crisobj_kill_space_fauna_name: "Matar fauna espacial"
 crisobj_kill_space_fauna_desc: "La fauna espacial hostil amenaza nuestro dominio biológico. Debemos actuar con decisión, destruyéndola para neutralizar la amenaza que supone para nuestra supremacía."
 crisobj_cap_fauna_name: "Capturar fauna espacial"
 crisobj_cap_fauna_desc: "La fauna espacial indómita es impredecible, lo que supone un desafío único. Debemos actuar con decisión, capturando a estas entidades para explotar su potencial y asegurar nuestra supremacía."
 crisobj_build_behemoth_egg_name: "Incubar huevos de gigante"
 crisobj_build_behemoth_egg_desc: "La crianza de cigotos sobredimensionados es un paso esencial para elevarnos por encima de las trivialidades de la vida planetaria."
 crisobj_birth_behemoth_name: "Parto de gigantes"
 crisobj_birth_behemoth_desc: "En la inmensidad del espacio, formas de vida colosales están tomando forma bajo nuestra atenta supervisión. Estos gigantes, nacidos de nuestra ambición y maestría, emergerán como fuerzas titánicas, reequilibrando el poder a nuestro favor."
 crisobj_behemoth_rage_name: "Gigantes furiosos"
 crisobj_behemoth_rage_desc: "Hemos libreado a nuestros gigantes entre las estrellas. Lo arrasan todo con su furia primitiva, dejando a su paso un rastro de devastación. Su ira incontrolada es un testimonio de nuestro poder, una fuerza de la naturaleza que solo responde a nuestra voluntad, cuando decidimos ejercerla."
 behemoth_mutation_reward: "Seleccionar una mutación"
 biocrisis.210.desc.base: "Algo se agita. El hambre que llevamos dentro no es irracional, sino adaptativa. Nuevos brotes se deslizan hacia la existencia, palpitando con potencial.\n\n" #Introduction
 biocrisis.210.desc: "$biocrisis.210.desc.base$Nuestros huevos son, literalmente, los que dan vida a nuestro linaje. Deben protegerse y cuidarse a toda costa. Guiemos nuestra evolución en beneficio de nuestras futuras crías." #Egg
 biocrisis.210.a: "Acelerad el crecimiento de los huevos."
 biocrisis.210.a.tt: "$behemoth_fast_egg_tt$\n\n§HDesbloquea la política:§! $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.b: "Empoderad a nuestras crías."
 biocrisis.210.b.tt: "$behemoth_slow_egg_tt$\n\n§HDesbloquea la política:§! $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.c: "Fortaleced las cáscaras."
 biocrisis.210.c.tt: "$behemoth_strong_egg_tt$"
 biocrisis.215.desc: "$biocrisis.210.desc.base$Navegar por las olas solares y atravesar el vacío es una habilidad que poseen pocas especies. Nuestras fortalezas tácticas residen en nuestra furia y nuestro poder, pero ¿y si pudiéramos mejorar nuestra movilidad?" #Mobility
 biocrisis.215.a: "Atravesemos el vacío."
 biocrisis.215.a.tt: "Nuestro §Y$behemoth_04$§! obtiene un §Y$BIO_JUMP_DRIVE_1$§!."
 biocrisis.215.b: "Disparemos rápido y movámonos aún más rápido."
 biocrisis.215.b.tt: "$behemoth_turbo_tt$"
 biocrisis.215.c: "Demos prioridad a los reflejos."
 biocrisis.215.c.tt: "$behemoth_reflexes_tt$"
 biocrisis.215.d: "Que sea un cazador de las sombras."
 biocrisis.215.d.tt: "Nuestro §Y$behemoth_04$§! obtiene $@cloaking_high_strength|0+$ $MOD_SHIP_CLOAKING_STRENGTH_ADD$."
 biocrisis.220.desc: "$biocrisis.210.desc.base$Reforzar nuestras defensas biológicas nos permitirá soportar el fuego sostenido de nuestros enemigos sin sufrir molestas lesiones."
 biocrisis.220.a: "Podríamos tener la piel más gruesa."
 biocrisis.220.a.tt: "Nuestro §Y$behemoth_04$§! obtiene $@behemoth_1_hull_add|0+*$ $HITPOINTS$."
 biocrisis.220.b: "Nuestro blindaje de combate debería ser más resistente."
 biocrisis.220.b.tt: "Nuestro §Y$behemoth_04$§! obtiene $@behemoth_1_armor_add|0+*$ $MOD_SHIP_ARMOR_ADD$ y $@behemoth_1_armor_hardening_add|%0+$ $MOD_SHIP_ARMOR_HARDENING_ADD$."
 biocrisis.220.c: "Nadie podrá con nosotros si mejoramos nuestros escudos."
 biocrisis.220.c.tt: "Nuestro §Y$behemoth_04$§! obtiene $@behemoth_1_shield_add|0*+$ $MOD_SHIP_SHIELD_ADD$, $@behemoth_1_shield_regen_add_perc|%1+$ $MOD_SHIP_SHIELD_REGEN_ADD_PERC$ y $@behemoth_1_shield_hardening_add|%0+$ $MOD_SHIP_SHIELD_HARDENING_ADD$."
 biocrisis.225.desc: "$biocrisis.210.desc.base$Enfrentarnos a nuestros enemigos es el medio por el cual lograremos la conquista. Tenemos la oportunidad de mejorar nuestra capacidad de combate."
 biocrisis.225.a: "Con la energía suficiente, los escudos pueden ignorarse."
 biocrisis.225.a.tt: "Nuestro §Y$behemoth_04$§! obtiene $@behemoth_shield_pen_add|%0+$ $MOD_SHIP_SHIELD_PENETRATION_ADD$ y un mantenimiento mensual de £exotic_gases£ $@behemoth_shield_pen_upkeep|0*-$."
 biocrisis.225.b: "Nuestros proyectiles perforarán hasta el blindaje más denso."
 biocrisis.225.b.tt: "Nuestro §Y$behemoth_04$§! obtiene $@behemoth_armor_pen_add|%0+$ $MOD_SHIP_ARMOR_PENETRATION_ADD$ y un mantenimiento mensual de £volatile_motes£ $@behemoth_armor_pen_upkeep|0*-$."
 biocrisis.225.c: "Esos mosquitos no nos molestarán más."
 biocrisis.225.c.tt: "Nuestro §Y$behemoth_04$§! obtiene $@behemoth_tracking_add|0*+$ $MOD_SHIP_TRACKING_ADD$, $@behemoth_point_defense_weapon_fire_rate_mult|%0+$ $mod_weapon_type_point_defense_weapon_fire_rate_mult$ y un mantenimiento mensual de £rare_crystals£ $@behemoth_tracking_upkeep|0*-$."
 biocrisis.230.desc: "$biocrisis.210.desc.base$En el fragor de la batalla, cada segundo cuenta. El daño que infligimos es un rito de muerte, lo último que experimentan nuestros enemigos antes de que sus insignificantes vidas se extingan."
 biocrisis.230.a: "Los mantendremos en su sitio. Nos sentirán."
 biocrisis.230.a.tt: "$behemoth_drain_tt$"
 biocrisis.230.b: "Destruidlos desde lejos."
 biocrisis.230.b.tt: "$behemoth_spike_tt$"
 biocrisis.230.c: "Desmembradlos estratégicamente."
 biocrisis.230.c.tt: "$behemoth_burst_tt$"
 biocrisis.235.desc: "$biocrisis.210.desc.base$Como fuerza inquebrantable en la galaxia, nos beneficiaremos de una mayor resistencia." #Tanky 2
 biocrisis.235.a: "La regeneración de los tejidos nos permite vivir más tiempo."
 biocrisis.235.a.tt: "Nuestro §Y$behemoth_04$§! obtiene $@behemoth_2_hull_regen_add|%1+$ $MOD_SHIP_HULL_REGEN_ADD_PERC$."
 biocrisis.235.b: "Nunca nos rendiremos."
 biocrisis.235.b.tt: "Nuestro §Y$behemoth_04$§! obtiene $@behemoth_2_damage_reduction_mult|%1+$ $MOD_SHIP_DAMAGE_REDUCTION_MULT$."
 biocrisis.235.c: "La fuerza bruta es la única opción."
 biocrisis.235.c.tt: "Nuestro §Y$behemoth_04$§! obtiene $@behemoth_2_damage_reduction_static|1+$ $MOD_SHIP_DAMAGE_REDUCTION_ADD$, $@behemoth_2_armor_hardening_add|%0+$ $MOD_SHIP_ARMOR_HARDENING_ADD$ y $@behemoth_2_shield_hardening_add|%0+$ $MOD_SHIP_SHIELD_HARDENING_ADD$."
 biocrisis.240.desc: "$biocrisis.210.desc.base$Lanzando enjambres de nuestra descendencia, devastaremos planetas y despojaremos a los sistemas de todo lo comestible, que es la mayoría de las cosas. Debemos preguntarnos, ¿cuál es la mejor manera de mantener a nuestra progenie?" #Support Ability
 biocrisis.240.a: "Así serán más veloces."
 biocrisis.240.a.tt: "$behemoth_buff_tt$"
 biocrisis.240.b: "Se unirán en nuestra luz." #Summon a fleet
 biocrisis.240.b.tt: "$behemoth_summon_tt$"
 biocrisis.240.c: "Los ayudaremos a ser fuertes." #Regen friendly bioships
 biocrisis.240.c.tt: "$behemoth_healing_tt$"
 biocrisis.245.desc: "$biocrisis.210.desc.base$Debemos demostrar nuestra fuerza inquebrantable a todos los que habitan esta galaxia. Mejoraremos nuestras habilidades de combate con el siguiente paso en nuestra evolución."
 biocrisis.245.a: "Entreguémonos a esa rabia."
 biocrisis.245.a.tt: "Al entrar en combate, nuestro §Y$behemoth_04$§! obtiene §Y$behemoth_frenzy_modifier$§! durante £time£ §Y$@behemoth_frenzy_duration|0$ días§!.\n\n§Y$behemoth_frenzy_modifier$§!:$behemoth_frenzy_modifier_tt$"
 biocrisis.245.b: "Aprendamos a templar la rabia."
 biocrisis.245.b.tt: "Nuestro §Y$behemoth_04$§! obtiene \n$t$$MOD_SHIP_FIRE_RATE_MULT$: §G+$@behemoth_tempered_fire_rate_mult|0%$§! \n$t$$MOD_SHIP_SPEED_MULT$: §G+$@behemoth_tempered_speed_mult|0%$§! \n$t$$MOD_SHIP_HULL_REGEN_ADD_PERC$: $@behemoth_tempered_hull_regen_add_perc|%1+$ \n$t$$MOD_SHIP_ARMOR_REGEN_ADD_STATIC$: $@behemoth_tempered_armor_regen_add_static|0+$"
 biocrisis.245.c: "Canalicemos nuestra furia para inspirar a los que nos rodean."
 biocrisis.245.c.tt: "Al entrar en combate, nuestro §Y$behemoth_04$§! confiere §Y$behemoth_inspiration_modifier$§! durante £time£ §Y$@behemoth_inspiration_duration|0$ días§! a todas las naves biológicas aliadas de este sistema.\n\n§Y$behemoth_inspiration_modifier$§!: $behemoth_inspiration_modifier_tt$"
 biocrisis.250.name: "Control directo"
 biocrisis.250.desc: "$biocrisis.210.desc.base$Ahora podemos desencadenar una oleada catastrófica de furia crioclástica y piroclástica con potencia suficiente para hacer trizas la realidad. Es decir, tenemos un arma que achicharrará la misma galaxia.\n\nPero nuestro dominio no termina con la destrucción. Sentimos que cada tendón, cada pulso, cada músculo del gigante obedece a nuestra voluntad como si fuera nuestro propio cuerpo. Con solo pensar, gobernamos su inmenso organismo: miembros, fauces y hasta el enorme corazón nacido del vacío que late con nuestro deseo. Ya no es una nave; ahora somos el gigante." #Behemoth Superweapon
 biocrisis.250.a: "Ahora, el espacio nos pertenece."
 biocrisis.250.a.tt: "§HElimina el modificador:§!\n§R$voidspawn_boss_invincible$§!\n$mod_damage_vs_country_type_voidspawn_boss_mult$ §R-1954%§!\n\n$behemoth_superweapon_tt$\n\n"
 #Ships and Structures
 behemoth_egg: "Huevo de gigante"
 behemoth_egg_DESC: "Un recipiente orgánico que contiene un §Ygigante§! en gestación."
 behemoth_egg_MEGASTRUCTURE_DETAILS: "Esta estructura sustenta el desarrollo de §Yhuevos de gigante§!."
