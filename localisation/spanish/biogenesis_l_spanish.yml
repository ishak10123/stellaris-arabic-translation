 ###Starlit Citadel
 origin_starlit_citadel: "Ciudadela de luz estelar"
 origin_starlit_citadel_desc: "En el confín del sistema natal de esta civilización se halla un misterioso portal a través del cual emergen sin cuartel oleadas de seres hostiles. Asediados por estas invasiones tan impredecibles como inevitables, la población no puede sino recurrir a su mayor triunfo tecnológico: la §H$dsc_name$§!."
 origin_tooltip_starlit_citadel_effects: "- $HOME_SYSTEM$ $TABBED_NEW_LINE$- ['concept_deep_space_bastion'] al borde del pozo gravitatorio $TABBED_NEW_LINE$- ['concept_wormhole', $BYPASS_STARLIT_WORMHOLE$] que lleva a un sistema desconocido $NEW_LINE$- $HOMEWORLD$ $TABBED_NEW_LINE$- £building£ ['building:building_citadel_uplink'] $TABBED_NEW_LINE$- ['concept_bioship_remains', £blocker£ $d_bioship_remains$] $TABBED_NEW_LINE$- ['concept_invasion_site', £blocker£ $d_invasion_site$]: +2 $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_deep_space_citadel_tech',£engineering_research£ $tech_deep_space_citadel$]"
 START_SCREEN_STARLIT_CITADEL: "No siempre estuvimos tan vigilantes.\n\n[Capital.GetName] es un mundo de abundancia, y una vez fuimos un pueblo pacífico y satisfecho. Pero todo cambió cuando se abrió el portal.\n\nSin previo aviso, llegaron los [GetInvadersLower]. Arrasaron nuestras ciudades, asolaron nuestras tierras y, luego, desaparecieron tan rápido como vinieron. Nos atrevimos a soñar con que jamás regresarían, pero las invasiones siguieron sucediéndose, con ataques cada vez más devastadores.\n\nAhora que nos preparamos para aventurarnos en la galaxia, nuestra división de $job_skywatcher_plural$ está lista. Por encima de nuestro mundo aguarda la formidable $dsc_name$, un baluarte inquebrantable contra los [GetInvadersLower] y otros que buscan nuestra destrucción."
