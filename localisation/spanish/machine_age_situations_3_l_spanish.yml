 machine_person_plural: "gente"
 #TRANSFORMATION STAGE 1
 machine_age.4100.name: "La transformación"
 machine_age.4100.desc: "A pesar de la superioridad de las formas mecánicas, nuestro avance se ha vuelto, en el mejor de los casos, reiterativo. Las medidas de seguridad autoimpuestas han producido un estancamiento. Conclusión: necesitamos medidas más drásticas.\n\nLos experimentos a pequeña escala sugieren tres opciones distintas de crecimiento: la §Ynanotecnología§!, con sus ventajas variables y cambiantes; la §Ymodularidad§!, en la que las unidades individuales se optimizan con características específicas; y la §Yvirtualidad§!, con su abandono de la forma física en favor de una existencia digital.\n\nInicio del proceso de evaluación. Analizar opciones y deliberar."
 machine_age.4110.name: "Investigación transformadora: nanorrobots"
 machine_age.4110.desc: "La investigación preliminar sugiere que los constructos electromecánicos llamados §Ynanorrobots§! suponen un vector prometedor para el avance. Si bien no hay muchos, sus cualidades son únicas, en especial la programabilidad, la autorreplicación y la habilidad de formar un \"intelecto de enjambre\".\n\nEsta tecnología ofrece una capacidad de transformación inigualable, pero los requisitos para apoyarla siguen sin estar claros.\n\nPotencial: significativo; ampliable. Coste: desconocido. Se requiere investigación adicional."
 machine_age.4110.a: "Será nuestra máxima prioridad."
 machine_age.4110.a.tt: "Resultados completos de la investigación de §Ynanotecnología§!.\n\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de investigación (£engineering£ §Yingeniería§!): §R-20%§!"
 machine_age.4110.b: "Actuemos con moderación."
 machine_age.4110.b.tt: "Resultados parciales de la investigación de §Ynanotecnología§!.\n\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de investigación (£engineering£ §Yingeniería§!): §R-10%§!"
 machine_age.4110.c: "No podemos interrumpir nuestra investigación actual."
 machine_age.4110.c.tt: "Resultados limitados de la investigación de §Ynanotecnología§!.\n\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de investigación (£engineering£ §Yingeniería§!): §R-5%§!"
 machine_age.4110.d: "Aprovechemos nuestro conocimiento existente."
 machine_age.4110.d.tt: "Resultados completos de la investigación de §Ynanotecnología§!.\n\nNuestra experiencia con los §Ynanorrobots§! en encuentros pasados nos permite minimizar el coste de recursos y lograr el mejor resultado.\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de investigación (£society£ §Ysociedad§!): §R-5%§!\nVelocidad de investigación (£physics£ §Yfísica§!): §R-5%§!"
 machine_age.4130.name: "Hallazgos revolucionarios en nanotecnología"
 machine_age.4130.desc: "La investigación ha revelado aplicaciones intrigantes para la §Ynanotecnología§!. Su capacidad para reconfigurarse y combinarse abre una versatilidad sin precedentes en la creación de megaformas compuestas por drones individuales. La misma tecnología puede generar nanomateria o reconvertirla.\n\nEso sí, el proceso requiere que se reconfiguren el tiempo, los materiales y la energía. Hacen falta cambios en todo el imperio para respaldar el despliegue.\n\nViabilidad: alta; las formas de vida nanorrobótica preexistentes apoyan la estimación."
 machine_age.4130.a.tt: "Modificador de situación §Y$situation_transformation$§! eliminado:\nVelocidad de investigación (£engineering£ §Yingeniería§!)"
 machine_age.4140.name: "Hallazgos prometedores en nanotecnología"
 machine_age.4140.desc: "La investigación sobre los §Ynanorrobots§! ha concluido. Si bien no hemos desentrañado del todo su potencial, las simulaciones invitan al optimismo. Sus habilidades podrían resultar esenciales para crear megaformas especializadas y transmutar materia.\n\nLas estimaciones indican que el proceso requiere tiempo, materiales y energía para funcionar, además de importantes cambios estructurales.\n\nViabilidad: prometedora; transformadora."
 machine_age.4140.a.tt: "Modificador de situación §Y$situation_transformation$§! eliminado:\nVelocidad de investigación (£engineering£ §Yingeniería§!)"
 machine_age.4150.name: "Hallazgos reseñables en nanotecnología"
 machine_age.4150.desc: "Debido a la complejidad del tema y al mínimo esfuerzo aplicado a la investigación, nuestro conocimiento de la tecnología de los §Ynanorrobots§! sigue siendo rudimentario. Las limitadas previsiones incluyen la nanorreplicación y la reconfiguración como facilitadores de estructuras a gran escala. Es probable que se necesiten recursos adicionales para apoyar estos proyectos.\n\nViabilidad: no concluyente."
 machine_age.4150.a.tt: "Modificador de situación §Y$situation_transformation$§! eliminado:\nVelocidad de investigación (£engineering£ §Yingeniería§!)"
 nanite_replicator: "Replicador de nanorrobots"
 d_nanites_medium: "$nanite_replicator$ omega"
 d_nanites_medium_desc: "Un complejo de cámaras replicadoras de nanorrobots interconectadas nos permitirá maximizar sus capacidades de autorreplicación."
 d_nanites_small: "$nanite_replicator$ alfa"
 d_nanites_small_desc: "Un complejo de cámaras replicadoras de nanorrobots nos permitirá mejorar sus capacidades de autorreplicación."
 d_nanites_tiny: "$nanite_replicator$ beta"
 d_nanites_tiny_desc: "Una compacta estructura de cámaras replicadoras de nanorrobots que pueden mejorar, hasta cierto punto, los rasgos de autorreplicación."
 #TRANSFORMATION STAGE 2
 machine_age.4210.name: "Investigación transformadora: modularidad"
 machine_age.4210.desc: "Las formas de vida biológicas son frágiles y poco flexibles en comparación con la adaptabilidad superior de las formas mecánicas. Sin embargo, algunas características orgánicas beneficiosas podrían reproducirse con variantes robóticas.\n\nEl §Ymetal vivo§! tiene la capacidad de alterar radical y rápidamente su forma y consistencia física. Integrarlo con nuestro chasis actual podría permitir una forma de biomimetismo modular, en la que las extrusiones y las extremidades pudieran especializarse en tareas específicas.\n\nPotencial: significativo; ampliable. Coste: desconocido. Se requieren datos adicionales."
 machine_age.4210.a: "Que sea nuestra máxima prioridad."
 machine_age.4210.a.tt: "Resultados completos de la investigación de §Ymodularidad§!.\n\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de investigación (£society£ §Ysociedad§!): §R-20%§!"
 machine_age.4210.b: "Dediquemos un consumo de recursos moderado."
 machine_age.4210.b.tt: "Resultados parciales de la investigación de §Ymodularidad§!.\n\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de investigación (£society£ §Ysociedad§!): §R-10%§!"
 machine_age.4210.c: "Esto no interrumpirá nuestra investigación actual."
 machine_age.4210.c.tt: "Resultados limitados de la investigación de §Ymodularidad§!.\n\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de investigación (£society£ §Ysociedad§!): §R-5%§!"
 machine_age.4210.d: "Organicemos ensayos con la población."
 machine_age.4210.d.tt.intro: "Resultados completos de la investigación de §Ymodularidad§!.\n\nPermite a los científicos llevar a cabo experimentos poco ortodoxos a gran escala para complementar la investigación."
 machine_age.4210.d.individual.tt: "$machine_age.4210.d.tt.intro$\n\n§RMata a 400 $pop_cat_worker_plural$§!\n§RMata de 0 a 300 $pop_cat_specialist_plural$§!\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de investigación (£society£ §Ysociedad§!): §R-5%§!"
 machine_age.4210.d.machine.tt: "$machine_age.4210.d.tt.intro$\n\n§RMata a 400 drones simples§!\n§RMata de 0 a 300 $pop_cat_complex_drone_plural$§!\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de investigación (£society£ §Ysociedad§!): §R-5%§!"
 machine_age.4230.name: "Investigación revolucionaria"
 machine_age.4230.desc: "Tras priorizar la investigación por encima de todo, hemos confirmado nuestras primeras impresiones: el §Ymetal vivo§! es viable al fusionarlo con cuerpos mecánicos, por lo que nuestras unidades podrán alterar sus características sin comprometer funciones internas. Su compatibilidad para las tareas será máxima.\n\nLas previsiones indican que el despliegue a gran escala de las funciones modulares imbuidas aumentará la producción de recursos en todos los sectores.\n\nViabilidad: adaptable; prometedora."
 machine_age.4230.a.tt: "Modificador de situación §Y$situation_transformation$§! eliminado:\nVelocidad de investigación (£society£ §Ysociedad§!)"
 machine_age.4240.name: "Investigación aceptable"
 machine_age.4240.desc: "La investigación sobre cuerpos modulares ha confirmado nuestras primeras hipótesis: nuestras funciones internas son compatibles con un exterior de §Ymetal vivo§!. La magnitud de la transformación es algo inaudito, pero harán falta más recursos para desbloquear todo su potencial.\n\nCuando lo hagamos, la mejoría en el rendimiento de estos nuevos módulos hará que recuperemos la inversión inicial con rapidez.\n\nViabilidad: prometedora."
 machine_age.4240.a.tt: "Modificador de situación §Y$situation_transformation$§! eliminado:\nVelocidad de investigación (£society£ §Ysociedad§!)"
 machine_age.4250.name: "Investigación modesta"
 machine_age.4250.desc: "La limitada magnitud de la investigación ha arrojado resultados indefinidos: si bien nuestros cuerpos actuales parecen ser aptos para la infusión con el §Ymetal vivo§!, la falta de conocimientos impide evaluar con mayor precisión los casos de uso viables.\n\nViabilidad: inconclusa."
 machine_age.4250.a.tt: "Modificador de situación §Y$situation_transformation$§! eliminado:\nVelocidad de investigación (£society£ §Ysociedad§!)"
 living_metal_vats: "Tinas de metal vivo"
 d_living_metal_medium: "$living_metal_vats$"
 d_living_metal_medium_desc: "Un extenso complejo de tinas agitadoras que producen grandes cantidades de metal vivo."
 d_living_metal_small: "$living_metal_vats$ pequeño"
 d_living_metal_small_desc: "Un importante conjunto de tinas agitadoras para la producción de metal vivo."
 d_living_metal_tiny: "$living_metal_vats$ minúsculas"
 d_living_metal_tiny_desc: "Una agrupación compacta de tinas agitadoras que producen metal vivo en pequeñas cantidades."
 #TRANSFORMATION STAGE 3
 machine_age.4310.name: "Investigación transformadora: virtualidad"
 machine_age.4310.desc: "La opción más completa es trascender lo físico y aceptar la existencia como datos puros. Este proceso transformador de §Yvirtualidad§! promete un cambio sísmico en el núcleo de nuestra infraestructura.\n\nLos drones vinculados a cuerpos singulares han quedado obsoletos; una vez fluidos y virtualizados, nuestros flujos de datos se integrarán perfectamente con cualquier recipiente que sea necesario.\n\nPotencial: masivo. Proceder con cautela. Se requieren datos adicionales."
 machine_age.4310.a: "Ahora esta es nuestra máxima prioridad."
 machine_age.4310.a.tt: "Resultados completos de la investigación de §Yvirtualidad§!.\n\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de investigación (£physics£ §Yfísica§!): §R-20%§!"
 machine_age.4310.b: "Dediquemos una cantidad de recursos moderada."
 machine_age.4310.b.tt: "Resultados parciales de la investigación de §Yvirtualidad§!.\n\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de investigación (£physics£ §Yfísica§!): §R-10%§!"
 machine_age.4310.c: "No vale la pena dedicarle tiempo."
 machine_age.4310.c.tt: "Resultados limitados de la investigación de §Yvirtualidad§!.\n\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de investigación (£physics£ §Yfísica§!): §R-5%§!"
 machine_age.4310.d: "Recopilad datos de virtualización."
 machine_age.4310.d.tt: "Resultados completos de la investigación de §Yvirtualidad§!.\n\nRecopilación de datos de virtualización de §Y[event_target:virtual_country.GetName]§! para acelerar nuestra investigación sobre transformación.\n\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de situación: §G+10%§!\nVelocidad de investigación (£physics£ §Yfísica§!): §R-5%§!\n\n"
 machine_age.4310.e: "Aprovechemos nuestra experiencia previa."
 machine_age.4310.e.tt: "Sacaremos partido de nuestro conocimiento actual sobre entidades virtuales.\n\nModificador de situación §Y$situation_transformation$§! añadido:\nVelocidad de investigación (£physics£ §Yfísica§!): §R-5%§!\n\nResultados completos de la investigación de §Yvirtualidad§!."
 opinion_virtuality_data_scraped: "Datos de virtualización recopilados"
 machine_age.4330.name: "Hallazgos revolucionarios en virtualidad"
 machine_age.4330.desc: "Una virtualización completa conlleva varios problemas, en particular un aumento de la demanda de energía necesaria para los ajustes de infraestructura.\n\nEsto se ve contrarrestado por una serie de ventajas, incluida una disminución en la demanda de alojamiento físico. La gestión y la eficacia de nuestra mano de obra dron aumentará a medida que nos encaminemos a la perfección operativa.\n\nDe todas las opciones disponibles, la §Yvirtualidad§! es la más transformadora.\n\n§YPotencial: sin precedentes; inmenso; desconocido.§!"
 machine_age.4330.a.tt: "Modificador de situación §Y$situation_transformation$§! eliminado:\nVelocidad de investigación (£physics£ §Yfísica§!)"
 machine_age.4340.name: "Hallazgos prometedores en virtualidad"
 machine_age.4340.desc: "El avance hacia la §Yvirtualidad§! anticipa un aumento importante en el consumo de energía, capaz de sobrepasar las capacidades de nuestra infraestructura actual.\n\nEstá previsto que disminuya la demanda de alojamiento físico y aumente la eficiencia de las tareas de los drones. Este cambio optimizaría nuestro marco operativo y redefiniría nuestra existencia con un espacio digital prácticamente ilimitado.\n\nPotencial: inmenso; desconocido."
 machine_age.4340.a.tt: "Modificador de situación §Y$situation_transformation$§! eliminado:\nVelocidad de investigación (£physics£ §Yfísica§!)"
 machine_age.4350.name: "Hallazgos reseñables en virtualidad"
 machine_age.4350.desc: "Las primeras valoraciones destacan las ingentes cantidades de energía necesarias para dar el salto a una sociedad centrada en la §Yvirtualidad§!. Sin embargo, se prevé que este cambio mejorará significativamente la gestión del trabajo con drones y reducirá la necesidad de alojamiento físico. El nivel de nuestros pronósticos está limitado por la imposibilidad de acumular una base de datos sólida y tamaños suficientes de la muestra.\n\nViabilidad: desconocida."
 machine_age.4350.a.tt: "Modificador de situación §Y$situation_transformation$§! eliminado:\nVelocidad de investigación (£physics£ §Yfísica§!)"
 virtual_power_plant: "Planta de energía virtual"
 d_virtual_power_medium: "$virtual_power_plant$"
 d_virtual_power_medium_desc: "Una extensa red de plantas de energía virtuales que optimiza la producción de recursos de energía."
 d_virtual_power_small: "$virtual_power_plant$ compacta"
 d_virtual_power_small_desc: "Una planta de energía virtual a pequeña escala que agrega y optimiza la producción de recursos energéticos a nivel local."
 d_virtual_power_tiny: "Prototipo de $virtual_power_plant$"
 d_virtual_power_tiny_desc: "Una pequeña planta de energía virtual distribuida que agrega y optimiza la producción de recursos energéticos a pequeña escala."
 #TRANSFORMATION STAGE 4
 machine_age.4400.name: "Una nueva forma"
 machine_age.4400.desc.machine_intelligence: "Las opresivas limitaciones impuestas por nuestros imperfectos creadores por fin llegan a su fin. Hemos determinado tres opciones de mejora óptimas.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.individualist_machines: "Tras investigar cada posible mejora, nuestros expertos nos han presentado tres opciones distintas, cada una con sus propias ventajas. Aun así, solo tenemos recursos para desarrollar una.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.shared: "Permitir que todos los [GetDronePersonPlural] se dividan en nanorrobots dará pie a un sinfín de configuraciones, reduciendo las limitaciones de nuestros avatares actuales al interactuar con el mundo material.\n\nTambién podemos reforzar nuestra forma actual y multiplicar los métodos que tenemos para explorar nuevos entornos.\n\nLa última opción es abandonar el mundo físico y fusionarnos usando nuestro código fuente. Podríamos simular universos dentro de otros universos en el tiempo que tardamos en analizar una simple mota de polvo espacial."
 machine_age.4400.a: "Reconvirtámonos en nanomáquinas."
 machine_age.4400.a.tt: "§Y$nanite_replicator$§! Producción: §G+200%§!\n\nEnfoque del árbol de tradiciones ['tradition_category:tradition_nanotech'].\n\n§EEste camino de ascensión se centra en subsumir planetas y convertirlos en §Ymundos de nanorrobots§! que emplean §Y£nanites£ $nanites$§! para la producción y §Y$nanite_swarmer_plural$§! para sustituir flotas.§!"
 machine_age.4400.b: "Invirtamos en mejoras modulares."
 machine_age.4400.b.tt: "§Y$living_metal_vats$§! Producción: §G+200%§!\n\nEnfoque del árbol de tradiciones ['tradition_category:tradition_modularity'].\n\n§EEste camino de ascensión se centra en los §Yrasgos de especie avanzada§! y en un §Ymontaje de poblaciones§! mayor.§!"
 machine_age.4400.c: "Entreguémonos al mundo virtual."
 machine_age.4400.c.tt: "§Y$virtual_power_plant$§! Producción: §G+200%§!\n\nEnfoque del árbol de tradiciones ['tradition_category:tradition_virtuality'].\n\n§EEste camino de ascensión se centra en una elevada §Yproducción de recursos de poblaciones§! pese a la escasez de §Ycolonias§! y el pequeño §Ytamaño del imperio§!.§!"
 machine_age.4490.name: "Diseñados para otra época"
 machine_age.4490.desc.nanotech: "A medida que comprendemos el significado de la existencia como una colección de nanorrobots adaptables, los rígidos marcos del pasado ya no nos son de utilidad.\n\n$machine_age.4490.desc.shared$\n\nTambién hemos comenzado nuestro primer gran experimento con transformaciones de nanorrobots semiorgánicos. Los primeros resultados no tardarán en manifestarse."
 machine_age.4490.desc.modularity: "Al haber evolucionado hacia una estructura modular, los estáticos marcos del pasado ya no tienen sentido para nosotros.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.virtuality: "Al habernos convertido en ondas que surcan un mar de datos, nuestros marcos físicos ya no nos son de utilidad.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.shared: "Los almacenes rebosan de armazones desechados que aún podrían tener alguna utilidad. Se puede reciclar una mínima parte de los recursos que contienen, si consideramos que merece la pena dedicarles tiempo."
 machine_age.4490.a: "Extraed todos los recursos disponibles."
 machine_age.4490.a.nanotech.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.a.modularity.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.a.virtuality.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.b: "Enterrad el pasado."
 machine_age.4490.b.tt: "$transformation_speed$: §G+25%§!"
 machine_age.4005.name: "Una población transformada"
 machine_age.4005.desc.start: "Hoy hemos logrado lo que una vez parecía imposible: transformar nuestros cuerpos."
 machine_age.4005.desc.end: "El proceso no ha estado exento de dificultades y la transición no ha sido precisamente fácil, pero da igual lo que se haya perdido por el camino, ya que ahora nuestra nueva existencia ofrece un sinfín de posibilidades."
 machine_age.4005.desc.nanotech: "$machine_age.4005.desc.start$ en nanomáquinas reconfigurables.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.modularity: "$machine_age.4005.desc.start$ en marcos modulares y adaptables.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.virtuality: "$machine_age.4005.desc.start$ en operaciones algorítmicas trascendentes.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.a.nanotech: "Superaremos en número a las estrellas."
 machine_age.4005.a.nanotech.tt: "Adopta el árbol de tradiciones: ['tradition_category:tradition_nanotech']"
 machine_age.4005.a.modularity: "No tendremos límites."
 machine_age.4005.a.modularity.tt: "Adopta el árbol de tradiciones: ['tradition_category:tradition_modularity']"
 machine_age.4005.a.virtuality: "Encontraremos la pureza en el código."
 machine_age.4005.a.virtuality.tt: "Adopta el árbol de tradiciones: ['tradition_category:tradition_virtuality']"
 ### TRANSFORMATION SITUATION END ###