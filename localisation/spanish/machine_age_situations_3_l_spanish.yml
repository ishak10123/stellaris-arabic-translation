 ### TRANSFORMATION SITUATION START ###
 situation_transformation: "Transformación"
 situation_transformation_type: "Situación de ascenso"
 situation_transformation_desc: "La iteración pasiva del cuerpo mecánico ha llegado a su conclusión lógica e inevitable. Se avecina una era de transformación, desencadenada por la innovación y engrasada por las oportunidades."
 situation_transformation_monthly_change_tooltip: "Nuestros cuerpos mecánicos se preparan para la transformación."
 situation_transformation_outcome: "Una población mecánica transformada."
 stage_transformation_effects: "Debemos evaluar los resultados y aplicar el proceso óptimo para transformarnos."
