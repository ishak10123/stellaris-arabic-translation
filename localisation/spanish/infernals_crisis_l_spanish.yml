 crisis_conduit_stop_desc: ""
 sm_gravitational_centrifuge: "Centrifugado gravitacional"
 sm_gravitational_centrifuge_desc: "Esta estructura aprovecha fuertes gradientes gravitacionales para separar el material de desecho a nivel molecular, creando un plasma entrópico que puede cristalizarse para su uso posterior."
 gravitational_centrifuge_tt: "Completa el objetivo de crisis §H$crisobj_entropy_starbase_name$§!"
 requires_multiple_stars_or_or_bh: "§RRequiere un sistema §Ybinario§!, §Yternario§! o un §Y$pc_black_hole$§!.§!"
 # Conduit Starforming
 crisis_conduit_buff: "Supervisión estelar"
 crisis_conduit_buff_desc: "La atmósfera de la estrella local está experimentando cambios rápidos, lo cual está causando una avalancha de erupciones solares en todo el sistema. Aunque para algunos esto sea una catástrofe, a nosotros nos viene bien para prosperar."
 TERRAFORM_ORDER: "Transformar estrella"
 TERRAFORM_ORDER_DESC: "La estrella objetivo se transformará poco a poco en una §Y$pc_m_giant_star$§!."
 TERRAFORM_ORDER_RESEARCH: "Aprovechando el potencial energético compuesto de la entropía cristalizada, las estrellas menores pueden expandirse hasta convertirse en poderosas gigantes rojas."
 FLEETORDER_TERRAFORM_BUTTON: "$TERRAFORM_ORDER$"
 FLEETORDER_TERRAFORM: "Formación estelar $PLANET|Y$ ($PROGRESS|Y%0$)"
 FLEETORDER_BOOST_STAR: "Estrella encendida"
 CAN_NOT_TERRAFORM_STAR: "$TRIGGER_FAIL$Tiene que ser una estrella principal."
 CAN_NOT_CRISIS_TERRAFORM_STAR_CLASS: "$TRIGGER_FAIL$La clase de estrella no es válida para la transformación."
 CAN_NOT_CRISIS_TERRAFORM_STAR_MEGASTRUCTURE: "$TRIGGER_FAIL$La megaestructura en órbita bloquea la transformación."
 VALID_TERRAFORM_STAR: "La estrella puede terraformarse."
 STATION_CAN_NOT_TERRAFORM_STAR: "La estación del conducto tiene que estar en órbita."
 # Objectives
 crisobj_own_volcanics_name: "Mundos volcánicos en posesión"
 crisobj_own_volcanics_desc: "El aumento del calor en el sistema alimenta la actividad volcánica, lo cual es perfecto para avanzar en nuestra candente misión. Deberíamos priorizar la colonización de §Ymundos volcánicos§! para ir un paso por delante.\n\nProporciona ingresos pasivos de §Y$entropy_crystals$§! cada año, que aumentan en función del número de colonias de tipo §Y$pc_volcanic$§!."
 crisobj_create_volcanics_name: "Crea mundos volcánicos"
 crisobj_create_volcanics_desc: "La propagación del vulcanismo planetario por la galaxia impulsará nuestra economía basada en los cristales de entropía. Con las técnicas adecuadas de terraformación, podremos propiciar una actividad volcánica sostenida cada vez que queramos.\n\nTerraforma un planeta en uno §Y$pc_volcanic$§!."
 crisobj_own_red_stars_name: "Estrellas rojas en posesión"
 crisobj_own_red_stars_desc: "Deberíamos priorizar el asentamiento de sistemas alrededor de las estrellas rojas. Sus extensas superficies de emisión son ideales para recoger energía termal.\n\nProporciona ingresos pasivos de §Y$entropy_crystals$§! todos los meses, que aumentan con cada §Y$pc_m_star$§! o §Y$pc_m_giant_star$§! que esté entre nuestras fronteras."
 crisobj_create_red_stars_name: "Crea estrellas rojas"
 crisobj_create_red_stars_desc: "Al canalizar cristales de entropía, podemos convertir las estrellas en gigantes rojas para que aumente nuestro nuevo y resplandeciente imperio.\n\nLas estrellas terraformadas por los §Y$entropy_conduit_plural$§! se convierten en §Y$pc_m_giant_star$§!"
 crisobj_planet_firestorm_name: "Piromanía planetaria"
 crisobj_planet_firestorm_desc: "Es hora de enseñarles a nuestros rivales el verdadero significado de la supremacía con un bombardeo de fuego que deje su mundo hecho cenizas.\n\nBombardea una colonia con §Y$bombardment_firestorm$§! para infligir un §R100% de devastación§!"
 crisobj_lens_beam_impact_name: "Naves disruptoras"
 crisobj_lens_beam_impact_desc: "Los mundos fríos y templados no nos sirven de nada. Tenemos que derretir sus superficies para transformarlos a fin de que puedan suplir nuestras necesidades.\n\nUsa el arma £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!, que está equipada en los §Y$entropy_conduit_plural$§! y en los §Y$ember_battleship_plural$§!, para bombardear los mundos enemigos."
 crisobj_entropy_starbase_name: "Centrifugadores gravitacionales en posesión"
 crisobj_entropy_starbase_desc: "Los centrifugadores gravitacionales nos ayudarán a conseguir más $entropy_crystals$.\n\nConstruye el edificio de la base estelar §Y$sm_gravitational_centrifuge$§! en sistemas §Ybinarios§!, §Yternarios§! o §Y$pc_black_hole$§!."
