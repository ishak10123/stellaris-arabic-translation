 crisis_hyperthermia_level_3_desc: "$crisis_level_3_desc$"
 crisis_hyperthermia_lv3_tt: "£trigger_yes£ Ha mejorado la megaestructura §Y$galactic_crucible_1$§!"
 crisis_hyperthermia_lv3_req_tt: "£trigger_no£ Ha mejorado la megaestructura §Y$galactic_crucible_1$§!"
