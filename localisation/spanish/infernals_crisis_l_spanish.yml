 personality_hyperthermia_empire: "Termarquía"
 personality_hyperthermia_empire_desc: "Los imperios termárquicos están gobernados por una ideología que exalta la energía, la entropía y el fuego estelar. Ellos no conquistan; cauterizan y esculpen la galaxia con calor y deseo."
 triggered_opinion_hyperthermia_empire: "Imperio de $personality_hyperthermia_empire$"
 mod_job_metallurgist_naval_cap_add: "£mod_country_naval_cap_add£ $MOD_COUNTRY_NAVAL_CAP_ADD$ de trabajos £job_foundry£ [GetAlloyProducer]"
