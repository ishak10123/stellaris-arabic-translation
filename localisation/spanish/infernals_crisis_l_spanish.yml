 lf_weapon_stun_effect_desc: "   " # not visible
 # Megastructure
 galactic_crucible_0: "Marco del crisol galáctico"
 galactic_crucible_0_DESC: "La estructura base de un $galactic_crucible_4$, construida para apoyar y guiar al resto de la construcción de la estación."
 galactic_crucible_0_MEGASTRUCTURE_DETAILS: "Esta enorme estación extrae energía de su estrella huésped, la cual alimenta a los astilleros automáticos que producen §Y$entropy_conduit_plural$§!, naves capaces de remodelar los destinos estelares."
 galactic_crucible_1: "Chasis de $galactic_crucible_4$"
 galactic_crucible_1_DESC: "Ahora que la infraestructura principal ya está completa, el $galactic_crucible_4$ ha pasado a ser una estación funcional. La construcción de los sistemas de cristalización de entropía ya está en curso."
 galactic_crucible_2: "Núcleo de $galactic_crucible_4$"
 galactic_crucible_2_DESC: "El $galactic_crucible_4$ se encuentra totalmente operativo y listo para ampliar el despliegue de §Y$entropy_crystals$§!. Todas las mejoras futuras dependerán de esta base.\n\n§HCompleta el proyecto especial para desbloquear la siguiente fase.§!"
 galactic_crucible_3: "Centro de $galactic_crucible_4$"
 galactic_crucible_3_DESC: "El $galactic_crucible_4$ en expansión ahora incluye sistemas entrópicos modulares diseñados para llevar a cabo una reconfiguración y un crecimiento exentos de problemas. Los técnicos pueden aumentar su capacidad a la par que minimizan las ineficiencias."
 galactic_crucible_4: "Crisol galáctico"
 galactic_crucible_4_DESC: "El $galactic_crucible_4$, el cual está completamente equipado y operativo, se encuentra listo para desatar su ardiente azote por la galaxia. Los sistemas de flujo entrópico operan a su máxima eficiencia teórica."
 galactic_crucible_5: "Instituto de $galactic_crucible_4$"
 galactic_crucible_5_DESC: "Se ha rediseñado el $galactic_crucible_4$ de manera irreversible para prevenir una producción de energía peligrosamente alta. Seguirá siendo una fuente estable y segura de prosperidad para el imperio."
 galactic_crucible_ruined: "$galactic_crucible_4$ destrozado"
 galactic_crucible_ruined_DESC: "Un astillero destrozado, que se forjó en su día para estar al servicio de las ardientes ambiciones de un imperio caído."
 galactic_crucible_ruined_MEGASTRUCTURE_DETAILS: "Esta vasta ruina aún irradia focos de calor parpadeantes que laten de forma impredecible a través de los restos destrozados."
 SPAWN_CONDUITS: "$entropy_conduit_plural$"
 SPAWN_CONDUITS_DESC: "El $galactic_crucible_4$ construye $entropy_conduit_plural$ automáticamente. Llegarán a una estrella que pueda convertirse en una §Y$pc_m_giant_star$§!."
 megastructure_overclocking_desc: "Esta megaestructura puede exceder los límites operacionales establecidos y desbloquear efectos únicos gracias a una aceleración estratégica."
 overclock_mode: "Modo:"
 overclock_gc_default: "$overclock_mode$ §HPredeterminado§!"
 overclock_gc_default_desc: "Produce un suministro constante y módico de entropía cristalizada.\n"
 overclock_gc_high: "$overclock_mode$ §HSobrecargado§!"
 overclock_gc_high_desc: "Usa reservas de energía enormes para mejorar la construcción del conducto.\n"
 overclock_gc_eco: "$overclock_mode$ §HProducción§!"
 overclock_gc_eco_desc: "Las grandes inversiones en aleaciones permiten que se produzca entropía cristalizada a mayor velocidad.\n"
 overclock_gc_war: "$overclock_mode$ §HCentro de coordinación§!"
 overclock_gc_war_desc: "El $galactic_crucible_4$ puede usarse para suministrar a las naves cercanas enormes cantidades de energía sobrante, lo cual optimiza la fuerza de combate de las flotas defensivas.\n"
 # Event Chain
 galactic_hyperthermia_chain_title: "$ap_galactic_hyperthermia$"
 galactic_hyperthermia_chain_desc: "Hemos decidido que el futuro está envuelto en llamas, por eso estamos resueltos a prender fuego a toda la galaxia."
 # Special Projects
 INF_CRISIS_ENTROPY: "Nueva fuente de energía"
 INF_CRISIS_ENTROPY_DESC: "El fuego ha desempeñado un papel importante en nuestra sociedad desde hace mucho tiempo, aunque quizá ahora podamos aprovechar su caótico poder de nuevas formas. Podría convertirse en eso que los científicos llevan tanto tiempo soñando: una fuente de energía que no solo nutre a nuestra civilización, sino que puede catapultarnos hasta las estrellas.\n\n§HEfecto:§! Desbloquea el nuevo recurso £entropy_crystals£ §Y$entropy_crystals$§!."
 INF_CRISIS_ENTROPY_EVIL: "Tormenta de fuego destinada"
 INF_CRISIS_ENTROPY_EVIL_DESC: "El crisol ha mostrado un nuevo camino a nuestra especie. Sería un despropósito no seguirlo, y no deberíamos tolerar a los insensatos. Es hora de rehacer la galaxia con una nueva imagen resplandeciente y calcinar a cualquiera que rechace nuestra idea.\n\n§HEfectos:§!\n- Desbloquea la siguiente mejora del §Y$galactic_crucible_4$§!.\n- Los §Y$entropy_conduit_plural$§! ahora pueden convertir las estrellas en territorio enemigo.\n\n" # Crystallized Entropy is used to its full potential
 INF_CRISIS_ENTROPY_GOOD: "Correlación no contemplada"
 INF_CRISIS_ENTROPY_GOOD_DESC: "A pesar de que el poder del crisol es inmenso, también es volátil. Si inutilizamos sus capacidades de manera permanente, aseguraremos una fuente modesta de prosperidad para todos nosotros sin poner en peligro a la galaxia y tampoco perderemos el favor de nuestros vecinos." # Crystallized Entropy can be used for the economy
 # Countdown Situation
 situation_galactic_hyperthermia_timer: "Movilización"
 situation_galactic_hyperthermia_timer_type: "$situation_galactic_hyperthermia_timer$"
 situation_galactic_hyperthermia_timer_desc: "Nuestro dominio de los §Y$entropy_crystals$§! pronto nos permitirá comenzar una transformación radical de la galaxia. Hemos abierto agujeros de gusano en seis sistemas alrededor del núcleo galáctico.\nSi instalamos §Y$entropy_conduit_plural$§! en cada uno de ellos y los defendemos de cualquiera que quiera interferir en nuestros planes, podremos prender fuego a la mismísima galaxia."
 situation_galactic_hyperthermia_timer_monthly_change_tooltip: "Nivel actual de entropía que irradia hacia el núcleo galáctico. Cuando alcance su punto máximo, la galaxia arderá."
 situation_gh_timer_outcome: "Nuestros informes de inteligencia indican que varias naciones podrían estar preparándose para una guerra con el fin de frustrar nuestros planes. Si nos enfrentamos a ellas sin estar preparados, nuestra empresa fracasará antes de comenzar."
 situation_gh_approach_timer: "Afrontado las consecuencias"
 situation_gh_approach_timer_tt: "Ha llegado la hora. Un conflicto inevitable está a punto de engullir la galaxia en una guerra de proporciones épicas."
 situation_gh_difficulty_progress: "Dificultad"
 situation_gh_opponent_progress: "§G-0,1§! por cada imperio enemigo"
 # Crisis Situation
 situation_galactic_hyperthermia: "Tormenta de fuego galáctica"
 situation_galactic_hyperthermia_type: "$situation_galactic_hyperthermia$"
 situation_galactic_hyperthermia_monthly_change_tooltip: "La velocidad a la que la galaxia se aproxima a la calcinación total."
 situation_hyperthermia_desc_perp: "§LImaginamos una utopía ardiente, pero para crearla tenemos que incinerar todo aquello que se interponga en nuestro camino. Hemos encendido las primeras chispas, y ahora debemos avivar las llamas hasta que todos los rincones de la galaxia queden consumidos.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_desc: "El §L§Y[event_target:hyperthermia_empire.GetName]§! ha incendiado las estrellas. Ahora nos toca luchar contra el mayor fuego al que se ha enfrentado la galaxia. No hay segundas oportunidades: si fracasamos, todo lo que hemos logrado quedará reducido a cenizas.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_stats: "§HSistemas centrales capturados:§! [event_target:hyperthermia_empire.gh_crisis_core_var]"
 situation_galactic_hyperthermia_outcome: "[GetHyperthermiaOutcome]"
 situation_gh_outcome_perp: "Si lo logramos, una lluvia de fuego consumirá la galaxia y solo quedarán en pie entre las cenizas aquellos que hayan aceptado el calor. Ni siquiera las estrellas son inmunes; tras miles de millones de años, se reestructurarán a imagen y semejanza de nuestra estrella natal."
 situation_gh_outcome_other: "Si el §Y[hyperthermia_empire.GetName]§! triunfa, la galaxia entera arderá hasta convertirse en cenizas y se creará un reino donde únicamente puedan sobrevivir las formas de vida termófilas."
 situation_galactic_hyperthermia_progress: "El número de sistemas del núcleo galáctico ocupados por §Y$entropy_conduit_plural$§! determinan el progreso mensual. \n$TABBED_NEW_LINE$- Menos de §Y3§! sistemas: §R-3§! $TABBED_NEW_LINE$- Ocupando §Y3§! sistemas: §Y0§! $TABBED_NEW_LINE$- Más de §Y3§! sistemas: §G+3§! \n\nProgreso actual"
 situation_galactic_hyperthermia_stage1: "Ha alcanzado el mínimo ($stage_1$)"
 situation_gh_approach_perp: "Leña al fuego"
 situation_gh_approach_perp_tt: "Es ahora o nunca. Debemos triunfar. De lo contrario, nos arriesgamos a perder todo lo que hemos logrado hasta ahora."
 situation_gh_approach_other: "Extinguir la llama"
 situation_gh_approach_other_tt: "El imperio representa una amenaza existencial para la estabilidad galáctica. El compromiso total ya no es una opción, sino una necesidad."
 # Events
 # NOTE: Remove most #comments below after texts are done
 infernals.1000.name: "Un nuevo poder"
 infernals.1000.desc: "[GetHyperthermiaIntroIfRedGiant]"
 infernals.1000.descNormal: "Nuestros [GetScientistPlural] han informado de un nuevo método para recolectar y almacenar entropía, el cual consiste en unirla a una matriz cristalina de alta potencia. Estos §Y$entropy_crystals$§! son capaces de almacenar y transportar bastante energía termal para su aplicación en operaciones industriales, económicas e interestelares.\n\nLos modelos sugieren que podría utilizarse para terraformar planetas y que estos adquieran climas más cálidos, o incluso para acelerar la evolución estelar hasta su transformación en gigantes rojas. En principio, la entropía dispersa por la galaxia podría reclamarse y convertirse en calor utilizable, lo cual impulsaría una expansión térmica compuesta a escala galáctica.\n\n§HInicia un proyecto especial:§! §Y$INF_CRISIS_ENTROPY$§!"
 infernals.1000.descRedGiant: "Nuestros [GetScientistPlural] han analizado los §Y$entropy_crystals$§! que se usaron en su día para encender una gigante roja; un gesto que casi acaba con nuestra civilización antes de que pudiera dar sus primeros pasos. Ahora podemos aplicar ingeniería inversa sobre esta sustancia volátil para vincular y transportar una enorme cantidad de energía térmica y usarla con fines industriales, económicos y a escala estelar.\n\nLas simulaciones sugieren que podrían permitir la terraformación en climas más cálidos o desencadenar la evolución de las estrellas en gigantes rojas. En teoría, la entropía galáctica ambiental podría recuperarse para convertirse en calor, lo cual impulsaría la expansión térmica sistémica.\n\n§HInicia el proyecto especial:§! §Y$INF_CRISIS_ENTROPY$§!" # Intro if you've learned about entropy from the Red Giant Miners
 infernals.1005.name: "Cristalización alcanzada"
 infernals.1005.desc1: "Hemos completado nuestra primera infraestructura operativa para recolectar energía y convertirla en §Y$entropy_crystals$§!. Estos cristales contienen inmensas cantidades de energía térmica; de hecho, ya está permitiendo que nuestra industria almacene y transporte la energía de manera mucho más eficiente que con los métodos convencionales.\n\nLas gigantes rojas, gracias a sus enormes superficies emisoras y producción térmica, son ideales para este proceso, y nosotros ya estamos preparados para desplegar dicha tecnología en todos los sistemas bajo nuestro control.\n\nNuestros técnicos también han comenzado a adaptar el proceso para su uso industrial, experimentando con formas de sintetizar $entropy_crystals$ mediante el aprovechamiento de la entropía ambiental. Con el auge de esta nueva economía, la riqueza y el poder no tardarán en llegar. Nuestros [GetScientistPlural] ya están investigando cómo aumentar aún más la producción.\n\n§HDesbloquea la megaestructura:§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.desc2: "Con las muestras de los §Y$entropy_crystals$§!, podemos recolectarlos y sintetizarlos sin poner en peligro nuestra estrella natal. Los cristales contienen inmensas cantidades de energía térmica; de hecho, ya están permitiendo que nuestra industria almacene y transporte la energía de manera mucho más eficiente que con los métodos convencionales.\n\nLas gigantes rojas, gracias a sus enormes superficies emisoras y producción térmica, son ideales para este proceso, y nosotros ya estamos preparados para desplegar dicha tecnología en todos los sistemas bajo nuestro control.\n\nNuestros técnicos también han comenzado a adaptar el proceso para su uso industrial, experimentando con formas de sintetizar $entropy_crystals$ mediante el aprovechamiento de la entropía ambiental. Con el auge de esta nueva economía, la riqueza y el poder no tardarán en llegar. Nuestros [GetScientistPlural] ya están investigando cómo escalar aún más la producción.\n\n§HDesbloquea la megaestructura:§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.a: "Tenemos que iniciar la construcción."
 infernals.1005.a.tt: "Usa un $constructor$ para construir el §Y$galactic_crucible_0$§! alrededor de una estrella."
 infernals.1005.b: "Ordenad a los drones que inicien la construcción."
 infernals.1005.b.tt: "Usa un $constructor$ para construir el §Y$galactic_crucible_0$§! alrededor de una estrella."
 infernals.1006.name: "Evolución termofílica"
 infernals.1006.desc: "A la vez que nos disponemos a prender fuego a la galaxia, debemos aprestarnos para resistir al calor por medios propios. Con una población adaptada a temperaturas más altas, nos será más fácil perdurar en un nuevo futuro tórrido."
 infernals.1006.descRedGiant: "A la vez que trabajamos a destajo para revertir los cambios de nuestra estrella, debemos aprestarnos para resistir al calor por medios propios. Adaptar nuestra población a temperaturas más altas nos ayudará a prosperar junto al nuevo y ardiente futuro de nuestra estrella."
 infernals.1010.name: "Lanzando $entropy_conduit_plural$"
 infernals.1010.desc: "El $galactic_crucible_1$ está listo para desplegar los §Y$entropy_conduit_plural$§!: sistemas automáticos diseñados para canalizar y ampliar la entropía estelar. Una vez liberados, reciclarán e intensificarán la producción de energía de una estrella y la convertirán en una gigante roja, que calentará sistemas enteros a fin de poder contribuir a la infraestructura en expansión de nuestro imperio.\n\nEstos §Y$entropy_conduit_plural$§! pueden producirse en intervalos regulares y operar de forma autónoma para nuestra comodidad. Por ahora, permanecerán en nuestro territorio, aunque con el tiempo quizá nos convenga dejar que se extiendan por toda la galaxia. Después de todo, nuestro imperio no cesa en su crecimiento.\n\n§HMejora de megaestructura disponible:§! §Y$galactic_crucible_2$§!" # Reaching lv2
 infernals.1010.a: "La producción de $entropy_crystals$ se acelerará."
 infernals.1010.b: "Necesitamos conquistar más estrellas."
 infernals.1015.name: "¿Qué temperatura alcanzará?"
 infernals.1015.desc: "Nuestra investigación incesante sobre los §Y$entropy_crystals$§! ha desvelado una aterradora posibilidad: si se concentran en grandes cantidades, pueden potenciar armas de una escala inimaginable, capaces de arrasar planetas enteros. Con semejante poder, la galaxia podría caer bajo nuestra merced.\n\nSin embargo, si exploramos estas aplicaciones militares, la poca confianza que queda entre nosotros y nuestros vecinos se resquebrajaría. Además, ¿quién dice que esas armas no se volverán en contra de nosotros en el futuro?\n\nLas palabras vanas de paz no bastarán. Si deseamos demostrar cuáles son nuestras intenciones, tenemos que paralizar públicamente el $galactic_crucible_2$ para asegurarnos de que jamás se produzca ese tipo de armamento. De lo contrario, será cuestión de tiempo hasta que nosotros, o cualquiera, convierta dicha tecnología en un arma.\n\n§HEsta decisión desbloquea un proyecto especial§!" # Reaching lv3 & decision
 infernals.1015.a: "¡Avivad las llamas de la guerra!" # evil path
 infernals.1015.a.desc: "Desbloquea el nivel de crisis $crisis_hyperthermia_level_4$.\n" #\n\n§HIssues Special Project:§! §Y$INF_CRISIS_ENTROPY_EVIL$§!
 infernals.1015.b: "Moderemos nuestras ambiciones." # good path
 infernals.1015.b.desc: "Previene el acceso al nivel de crisis $crisis_hyperthermia_level_4$. \n\n§HInicia un proyecto especial:§! §Y$INF_CRISIS_ENTROPY_GOOD$§! para convertir el §Y$galactic_crucible_2$§! en un §Y$galactic_crucible_5$§!."
 infernals.1020.name: "Hacia el fuego"
 infernals.1020.desc: "Nuestra investigación sobre los §Y$entropy_crystals$§! y el proyecto §Y$INF_CRISIS_ENTROPY_EVIL$§! ha confirmado nuestras sospechas: el potencial para crear armas devastadoras es real. Con un poder así en nuestras manos, no necesitaríamos moderarnos por el bien de las sutilezas diplomáticas.\n\nLa expansión del $galactic_crucible_3$ se acelerará, con un especial hincapié en sus... aplicaciones más agresivas. Cuanto antes desbloqueemos estas armas, menos importarán las opiniones de la galaxia.\n\n§HMejora de megaestructura disponible:§! §Y$galactic_crucible_4$§!" # Finishing special project for evil path
 infernals.1020.a: "Debemos prepararnos para la guerra."
 infernals.1020.a.tt: "- La expansión del §Y$galactic_crucible_4$§! debería ser la prioridad.\n- $unlocks_conduit_damage$"
 infernals.1020.b: "Nuestros rivales serán leña para el fuego."
 infernals.1020.b.tt: "- La expansión del §Y$galactic_crucible_4$§! debería ser la prioridad.\n- $unlocks_conduit_damage$"
 infernals.1021.name: "Un brillo continuo"
 infernals.1021.desc: "El $galactic_crucible_3$ se ha neutralizado con éxito. De esta manera se garantiza que no pueda expandirse o modificarse con fines destructivos. Aunque es una pena que se haya perdido su máximo potencial, si hubiéramos seguido en esa dirección nos habríamos arriesgado a una catástrofe y al colapso de todas las relaciones diplomáticas.\n\nPor suerte, incluso en su forma limitada, el $galactic_crucible_5$ sigue siendo una poderosa fuente de energía y prosperidad. Hemos retrocedido antes de cruzar la línea, lo que nos ha garantizado un futuro en el cual podremos colaborar con la comunidad galáctica, y todo mientras nos seguimos beneficiando de esta extraordinaria ciencia.\n\n§HMejora de megaestructura disponible:§! §Y$galactic_crucible_5$§!" # Finishing special project for good path
 infernals.1021.a: "Todos nos beneficiamos de la colaboración."
 infernals.1021.b: "En la armonía hallamos prosperidad."
 infernals.1025.name: "Rodeando el núcleo"
 infernals.1025.desc: "Nuestra investigación en curso sobre los §Y$entropy_conduit_plural$§! y la transformación de estrellas en gigantes rojas sugiere que podríamos ampliar nuestras operaciones para sobrecalentar el propio núcleo galáctico, desencadenando una cascada térmica en toda la galaxia, transformándola así en un lugar mucho más acogedor para nosotros.\n\nHemos identificado seis sistemas alrededor del núcleo que podrían servirnos como centros de operaciones en esta empresa. Dichos sistemas se encuentran más allá de la red galáctica de hipervías, pero estamos llevando a cabo trabajos para generar agujeros de gusano estables e instaurar el acceso." # Reaching lv4
 infernals.1025.a: "Somos los únicos capaces de sobrevivir a las llamas."
 infernals.1025.a.tt: "Otras especies intentarán oponerse. Preparaos para la guerra galáctica."
 infernals.1025.b: "La galaxia entera arderá en armonía."
 infernals.1025.b.tt: "Otras especies intentarán oponerse. Preparaos para la guerra galáctica."
 infernals.1030.name: "Carrera a la calcinación"
 infernals.1030.desc: "El $galactic_crucible_4$ está completamente equipado y operativo. Ahora que los túneles de los agujeros de gusano están terminados, hemos podido asegurar el acceso a los seis sistemas de preparación alrededor del núcleo galáctico.\n\nNuestro trabajo para sobrecalentar el núcleo puede dar comienzo. Es posible que otros imperios detecten nuestra actividad y traten de alcanzar dichos sistemas, pero, por ahora, les llevamos ventaja, y el núcleo se doblega a nuestra voluntad.\n\n§HUsad el agujero de gusano para asegurar los sistemas del núcleo galáctico.§!" # Reaching lv5, lanes open in 3 years!
 infernals.1030.a: "Comenzad la instalación en los sistemas centrales."
 infernals.1030.a.tt: "Si desplegamos los §Y$entropy_conduit_plural$§! en los seis sistemas del núcleo galáctico, podremos sobrecalentar toda la galaxia a la vez. Debemos empezar con los preparativos."
 infernals.1030.b: "Nuestro futuro brilla con fuego."
 infernals.1030.b.tt: "$infernals.1030.a.tt$"
 infernals.1035.name: "Alarma de incendio galáctica"
 infernals.1035.desc: "Los imperios rivales han forzado la apertura de hipervías hacia nuestros centros de operaciones cerca del núcleo galáctico. Mientras continuamos sobrecalentando el núcleo, hemos de prepararnos para oponer resistencia.\n\nNo nos pararán. La fría oscuridad del espacio será barrida y sustituida con la ardiente gloria de nuestro futuro ascendente."
 # core is now connected with the galaxy!
 infernals.1035.a: "Nunca nos eliminarán."
 infernals.1035.b: "Dejad que se precipiten a nuestro fuego abrasador."
 infernals.1040.name: "Se avecina tormenta"
 infernals.1040.desc: "El núcleo galáctico ha comenzado a agitarse. Los niveles de entropía que rodean al agujero negro supermasivo están aumentando, y eso provoca olas de radiación térmica en los sistemas cercanos.\n\nJusto en medio del pánico, un equipo de valientes científicos procedentes de muchos mundos ha desvelado unas hipervías de reciente formación que conectan con seis sistemas que rodean al núcleo. Parece ser que dichos sistemas albergan instalaciones operadas por el §Y[hyperthermia_empire.GetName]§!, las cuales están sobrecalentando el núcleo de manera activa. Esta imprudente manipulación amenaza con desencadenar una tormenta de fuego a lo largo de la galaxia que carbonizará a todos aquellos que no logren detener sus ambiciones pirómanas.\n\nSi queremos sobrevivir, tenemos que romper estos sistemas y arrebatarles el control. La crisis ha llegado, y la temperatura no para de subir." # other empires learn about the core, forming a coalition war
 infernals.1040.a: "¡Tenemos que detenerlo!" # generic reply (declares war)
 infernals.1040.a.tt: "§LUna crisis de proporciones sin precedentes está a punto de engullir nuestra galaxia. Solo la fuerza combinada de una nueva alianza puede salvarnos.§! \n\nSe formará una §Ycoalición§! de imperios en contra de la crisis, lo cual resultará en un conflicto que afectará a toda la galaxia. §RDeclararemos la guerra§! contra el §Y[hyperthermia_empire.GetName]§!."
 infernals.1040.b: "¡Arded, blandengues!" # Genocidals reply
 infernals.1040.b.tt: "§LEn tiempos de crisis, cada especie vela por sí misma. Tenemos la fuerza para resolver esto por nuestra cuenta.§!"
 infernals.1040.c: "Son como nosotros." # Infernals reply
 infernals.1040.c.tt: "§LLos métodos del §Y[hyperthermia_empire.GetName]§! se ajustan a nuestra idea de una galaxia renovada. Tras haber salido a la luz esta alineación, podríamos quedar a salvo del impacto total de lo que otros considerarán una catástrofe.§!"
 infernals.1040.d: "No es nuestro problema." # neutral reply
 infernals.1040.d.tt: "§LUn imperio que juega con fuego no es ninguna novedad. Esta revolución pasará, como todo en esta vida. No hay motivos para inmiscuirnos.§!"
 infernals.1042.name: "Escalada: §Rcrisis declarada§!"
 infernals.1042.desc: "Las mayores transformaciones de la historia siempre han exigido sacrificios. Sin embargo, la comunidad galáctica ve nuestra obra como una amenaza en lugar de una necesidad. En respuesta, una coalición militar unificada se ha movilizado en nuestra contra.\n\nCon el exterminio han dejado claro su objetivo, así que no nos han dejado otra alternativa: cualquier acercamiento al núcleo galáctico o al $galactic_crucible_4$ se combatirá con una fuerza aplastante.\n\nNuestra visión ha encendido las propias estrellas. Dejad que nuestros oponentes luchen contra la tormenta que hemos invocado.\n\n§H¡Defended los sistemas del núcleo galáctico y nuestra victoria estará asegurada!§!"
 infernals.1042.a: "El desenlace es inevitable."
 infernals.1043.name: "Llamada a las armas: §Rcrisis declarada§!"
 infernals.1043.desc: "A la luz de las amenazas crecientes en el núcleo galáctico, la comunidad galáctica ha promulgado una respuesta unificada en contra del §Y[hyperthermia_empire.GetName]§!, cuyos esfuerzos radicales por aumentar la temperatura galáctica están poniendo en peligro a toda la existencia.\n\nSi no se vigilan estas ambiciones, incontables civilizaciones se enfrentarían a la extinción. El autoproclamado §Y[hyperthermia_empire.GetName]§! se encuentra en oposición directa a una coalición unida por la necesidad.\n\nLa batalla ha comenzado, y billones de vidas penden de un hilo.\n\n§H¡Capturad los sistemas del núcleo galáctico o lo perderemos todo!§!"
 infernals.1043.a: "¡Movilizad las flotas!"
 infernals.1045.name: "Carrera contrarreloj"
 infernals.1045.desc1: "Se avecina una tormenta de fuego en cascada. Pronto, el núcleo galáctico erupcionará, purificará a nuestros enemigos y cimentará nuestro dominio sobre las estrellas.\n\nPero la galaxia se niega a aceptar nuestro radiante futuro. A través de las hipervías recientemente forjadas, planean invadir nuestros centros de operaciones y deshacer todo lo que hemos construido. ¿Para qué? ¿Para preservar su fría y estancada oscuridad?\n\nNo podemos permitir que interfieran. Debemos mantenernos firmes en el núcleo hasta que la tormenta de fuego arda y reduzca todo a cenizas." # last stage of global situation - crisis
 infernals.1045.desc2: "El núcleo galáctico se calienta cada vez más por el impulso de la fanática obsesión del §Y[hyperthermia_empire.GetName]§! por incendiar las estrellas. A este ritmo, su tormenta de fuego aniquilará toda oposición y purgará la galaxia de casi toda la vida.\n\nNo se puede razonar con ellos. Si queremos sobrevivir, debemos atacar la fuente: los sistemas del núcleo galáctico, donde su poder brilla con más intensidad. Solo entonces podremos frenar al §Y[hyperthermia_empire.GetName]§!.\n\nEl destino de toda la galaxia pende de un hilo. Es hora de demostrar al §Y[hyperthermia_empire.GetName]§! que los que juegan con fuego... acaban quemándose." # last stage of global situation - others
 infernals.1045.a: "No daremos nuestro brazo a torcer."
 infernals.1045.a.tooltip: "Debemos mantener el control de los seis sistemas del núcleo para alcanzar la victoria."
 infernals.1045.b: "Tenemos que acabar con ellos de una vez por todas."
 infernals.1045.b.tooltip: "Tenemos que atacar los seis sistemas del núcleo y destruir los conductos del §Y[hyperthermia_empire.GetName]§!, o acabaremos incinerados."
 infernals.1055.name: "¡La galaxia es nuestra!"
 infernals.1055.desc: "Hemos avivado las llamas de la victoria desde el núcleo galáctico hasta las estrellas más lejanas. La tormenta de fuego ha reducido a nuestros enemigos a cenizas. Carecían de la visión y del coraje necesarios para aceptar el glorioso futuro que aclamábamos. La galaxia es nuestra.\n\nEn este nuevo orden de fuego y furia, los planetas hierven con magma y luz, iluminados por el calor creciente de las gigantes rojas. La entropía se extiende por todos los sistemas, y nosotros podemos aprovecharla y moldearla a nuestra voluntad. Con cada día que pasa, nuestro imperio se vuelve más rico, fuerte..., imparable.\n\nHemos consumido la galaxia y la hemos reconvertido en el faro resplandeciente de nuestro dominio sobre el vacío. Y algún día, quizá, arrojemos a otras galaxias a la pira." # crisis won
 infernals.1055.a: "Esta nueva galaxia está a nuestro alcance."
 infernals.1055.b: "Al fin y al cabo, todos los fuegos se unen para ser uno solo."
 infernals.1055.c: "Nuestros candentes hogares no necesitan a los débiles." #Scorched world heralds (genocidal Infernal)
 infernals.1055.d: "Nuestro aguante ha sido por fin recompensado." #Infernal Fire Cult
 infernals.1055.e: "Por fin hemos expulsado la fría oscuridad de la galaxia." #Other Infernals
 infernals.1055.f: "Por fin nuestros miserables rivales han quedado reducidos a cenizas." #Generic Genocidal
 infernals.1052.name: "$galactic_crucible_4$ capturado"
 infernals.1052.desc: "Gracias a la captura del sistema §H[crucible_system.GetName]§!, nuestras fuerzas se han hecho con el control del $galactic_crucible_4$ que estaba construyéndose en torno a la estrella local.\n\nLa pérdida de esta megaestructura derrumba cualquier esperanza que tuvieran sus creadores de retomar la galaxia por la fuerza."
 infernals.1052.a: "¡Destruidla!"
 infernals.1052.a.tt: "Se destruirá el §Y$galactic_crucible_4$§! sin opción posterior de reparación."
 infernals.1052.b: "Podemos usarlo."
 infernals.1052.b.tt: "Convierte el §Y$galactic_crucible_4$§! en un §Y$galactic_crucible_5$§! para producir $r_alloys$."
 infernals.1053.name: "$galactic_crucible_4$ capturado"
 infernals.1053.desc: "La captura del sistema §H[crucible_system.GetName]§! destapó los siniestros planes de los §H[crucible_builders.GetName]§!, que incluían la total aniquilación de la galaxia mediante una tormenta de fuego sin precedentes.\n\nPor el momento, se ha detenido la máquina que alberga el potencial de generar un evento de extinción masiva. Tan pronto como termine la guerra, deberemos emplear nuestros recursos y fuerza restantes en la desactivación definitiva de semejante megaestructura."
 infernals.1053.a: "¡Debemos poner fin a esta guerra de inmediato!"
 infernals.1053.b: "Una construcción fascinante."
 infernals.1056.name: "Renacimiento galáctico"
 infernals.1056.desc: "Mientras nosotros nos dedicábamos a prender la mecha que incendiaría la galaxia, los §Y[hyperthermia_empire.GetName]§! ya habían convertido estrellas en armas, reconfigurando la galaxia para siempre.\n\nPor ahora, lo que podemos hacer es acoger esta recién forjada utopía, pero no deberíamos dejar de vigilar sus movimientos conforme van reforzando su control de la galaxia."
 infernals.1056.a: "El poder desenfrenado genera conflictos."
 infernals.1056.b: "Ha surgido una nueva amenaza."
 infernals.1056.c: "Un inesperado giro de los acontecimientos."
 # Relic
 r_crystallized_singularity: "Singularidad cristalizada"
 r_crystallized_singularity_desc: "Esta singularidad deformada por una galaxia ardiente crepita con un calor seductor. Si no se sella con cuidado, atraerá inexplicablemente a los peregrinos, incluso hasta los mundos más desolados. Aquellos que quedan ante ella se sienten impulsados a llevar una vida más sencilla..., más cercana a las llamas."
 r_crystallized_singularity_effect_tt: "\n- §G10%§! o nuestro ingreso por £physics_research£ §Y$physics_research$§! también generará $r_energy$."
 r_crystallized_singularity_ls_effect_tt: "- Desbloquea la decisión §Y$decision_gh_life_seeding$§! en mundos colonizables para crear una nueva civilización primitiva."
 crystallized_singularity_mod: "$r_crystallized_singularity$"
 crystallized_singularity_mod_desc: "$r_crystallized_singularity_desc$"
 decision_gh_life_seeding: "Siembra de vida"
 decision_gh_life_seeding_desc: "Nuestra exitosa remodelación de la galaxia ha provocado la rápida desaparición de las especies en la mayoría de los planetas. Ahora, contamos con el privilegio de recrear la vida a nuestra imagen."
 decision_gh_life_seeding_limit: "$TRIGGER_FAIL$§REste planeta ya tiene una civilización primitiva.§!"
 decision_gh_life_seeding_colony: "$TRIGGER_FAIL$§RNo se puede llevar a cabo en un sistema con una colonia.§!"
 decision_gh_life_seeding_effect: "Crea una civilización primitiva a nuestra imagen. \n\n§HLímite de activación:§! [from.gh_life_seeder_var] / 3"
 # Grand Archive Specimen
 infernal_burning_gem: "Gema ardiente"
 infernal_burning_gem_desc_short: "Uno de los primeros prototipos funcionales que se crearon durante nuestras labores de [GetName] para aprovechar la entropía."
 infernal_burning_gem_desc_details: "Engañosamente débil para la mayoría de los sistemas visuales, el ligero brillo blanquecino de este fragmento de cristal oculta la increíble cantidad de energía que apenas puede contener. Aunque puede verse superada por técnicas más recientes, su construcción y propiedades aún tienen mucho que enseñar."
 # Timeline
 TIMELINE_EVENT_GH_START: "Tormenta de fuego\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_START_TOOLTIP: "§HSé la crisis§!\n§YEvento de crisis§!\n\n[EVENT_TARGET_0.GetName] ha encendido su dominio y ha comenzado a tomar el control del destino de la galaxia. Aquellos que no comparten esta visión quedarán atrapados en la ardiente senda de la conquista y solo dejarán cenizas tras de sí."
 TIMELINE_EVENT_GH_END: "Llamas devoradoras\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_END_TOOLTIP: "§HGalaxia derrotada§!\n§YEvento de crisis§!\n\nLo que comenzó como una ardiente ambición se ha convertido en la chispa que ha incendiado la galaxia. Aquellos que se opusieron a nosotros han sido reducidos a cenizas, y también su historia."
