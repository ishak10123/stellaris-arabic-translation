 # Weapon
 LENS_FLARE_BEAM: "Paralizador con lente"
 LENS_FLARE_BEAM_DESC: "El rayo de esta arma está calibrado para interrumpir sistemas de control críticos, lo que permite una ventana de oportunidad limitada para ataques sin oposición."
 lfb_on_hit_stun_tt: "§YDesactiva§! el objetivo durante §G7§! días e impide que se mueva o contraataque."
