 entropy_crystals_crisis_description: "$menace_crisis_description_intro$\n\nUna nueva forma de manipular la energía, la cual nos permitirá aumentar drásticamente nuestro poder. Tendremos que aprovechar el fuego de las estrellas para encender esta zona."
 entropy_crystals_crisis_howto_title: "Fuente de poder"
 entropy_crystals_crisis_howto: "Perseguir los §Hobjetivos de crisis§! genera £entropy_crystals£ §H$entropy_crystals$§!, los cuales se pueden usar para mejorar el $galactic_crucible_4$ y desbloquear el siguiente nivel de crisis."
 # Level
 crisis_hyperthermia_already_ongoing: "Otro imperio ya está haciéndose con el control del núcleo galáctico."
 crisis_hyperthermia_already_happened: "Otro imperio ya controla el núcleo galáctico y ha transformado la galaxia."
