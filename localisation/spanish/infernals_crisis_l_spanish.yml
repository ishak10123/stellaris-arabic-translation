 entropy_crystals_gaining: "Completa §Hobjetivos de crisis§! para conseguir más £entropy_crystals£ §Y$entropy_crystals$§!."
 entropy_crystals_desc: "Esta matriz irregular y brillante, compuesta de energía bruta, se encuentra estable; lo bastante como para transportarla a modo de combustible o incorporada en equipos."
