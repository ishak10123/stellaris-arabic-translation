 crisis_hyperthermia_level_5_desc: "$crisis_level_5_desc$"
 crisis_hyperthermia_lv5_tt: "£trigger_yes£ Ha mejorado la megaestructura §Y$galactic_crucible_3$§!"
 crisis_hyperthermia_lv5_req_tt: "£trigger_no£ Ha mejorado la megaestructura §Y$galactic_crucible_3$§!"
 # MPerks Level 1
 menp_hyperthermia_crystals: "$entropy_crystals$"
 menp_hyperthermia_crystals_desc: "Los §Y$entropy_crystals$§! marcan un descubrimiento en la desestabilización controlada de la energía. Con este recurso volátil a nuestro servicio, podremos remodelar el mismísimo orden galáctico."
 unlocks_entropy_objectives: "Permite la acumulación de £entropy_crystals£ §Y$entropy_crystals$§! al completar los §Hobjetivos de crisis§!."
 menp_hyperthermia_harnessing: "Aprovechamiento de la entropía"
 menp_hyperthermia_harnessing_desc: "La integración de la síntesis de los §Y$entropy_crystals$§! en nuestra industria permite hacer un uso más eficiente de este recurso volátil, y nos permite alinear nuestro enfoque técnico con los objetivos estratégicos."
 unlocks_entropy_edict: "§HDesbloquea el edicto:§! $edict_entropy_harnessing$"
 menp_hyperthermia_crucible: "Crisol galáctico"
 menp_hyperthermia_crucible_desc: "El crisol propuesto serviría como motor central para aprovechar la entropía estelar. Gracias a la capacidad de cristalizarla y transportarla, el crisol podría convertirse en una baliza para nuestro ardiente poder al diseminarla por todas las estrellas."
 unlocks_galactic_crucible: "§HDesbloquea la megaestructura:§! $galactic_crucible_0$"
 # MPerks Level 2
 menp_hyperthermia_conc_entropy: "Entropía concentrada"
 menp_hyperthermia_conc_entropy_desc: "Los $entropy_conduit_plural$ son vitales para expandir nuestro poder en esta etapa. El aumento de la producción del crisol acelerará nuestra marcha hacia un futuro más brillante y resplandeciente."
 unlocks_conduit_spawn: "§H$UNLOCKS_SHIP_TYPE$:§! $entropy_conduit$ \n- §Y$entropy_conduit_plural$§! se crean automáticamente con el §Y$galactic_crucible_4$§! y viajan a sistemas estelares cercanos. \n- Las colonias del sistema objetivo reciben bonificaciones. \n- Están equipados con el arma £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!, que incapacita a los enemigos tras el impacto durante varios días. \n\n"
 menp_hyperthermia_radiant: "Ambiciones radiantes"
 menp_hyperthermia_radiant_desc: "Convertirse en la chispa que encienda la galaxia no deja espacio para conjeturas o burocracia. No podemos permitirnos perder tiempo remodelando incontables sistemas. Para alcanzar nuestros objetivos, tenemos que aumentar drásticamente nuestra capacidad de construcción."
 menp_hyperthermia_ignition: "Calcinación forzada"
 menp_hyperthermia_ignition_desc: "A veces, no basta con esforzarse. Necesitamos llevar nuestra tecnología al siguiente nivel y explotar su máximo potencial. Es hora de minimizar la seguridad y aumentar la producción."
 unlocks_crucible_overclocking: "Permite la aceleración de la §Hmegaestructura§! §Y$galactic_crucible_1$§!."
 # MPerks Level 3
 menp_hyperthermia_cruiser: "$ember_cruiser$"
 menp_hyperthermia_cruiser_desc: "Estas naves, equipadas con tecnología punta, convierten el flujo de calor volátil en aniquilación dirigida, lo cual reduce a nuestros enemigos a cenizas carbonizadas."
 unlocks_ember_cruiser: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_cruiser$"
 menp_hyperthermia_flames: "Llamas envolventes"
 menp_hyperthermia_flames_desc: "En la utopía que imaginamos, no hay cabida para quienes se oponen a nuestros objetivos. Aquellos que intenten detenernos, comprobarán que la resistencia se combate con una lluvia de fuego sobre sus mundos natales."
 unlocks_firestorm_stance: "§HDesbloquea la terraformación:§! $pc_volcanic$ \n§HDesbloquea la implicación de bombardeo:§! $bombardment_firestorm$\n\n"
 menp_hyperthermia_coronal: "Ventilación coronaria"
 menp_hyperthermia_coronal_desc: "Nuestros $entropy_conduit_plural$ actualmente disipan una gran cantidad de calor para mantenerse estables. Al liberar ese calor en el espacio circundante, podemos transformar los $entropy_conduit_plural$ en armas devastadoras y usarlas contra nuestros enemigos."
 unlocks_conduit_damage: "§Y$entropy_conduit_plural$§! infligen daño pasivo a las naves y estaciones hostiles. \n\n"
 # MPerks Level 4
 menp_hyperthermia_reactors: "Reactores de heliofusión"
 menp_hyperthermia_reactors_desc: "Aprovechar los §Y$entropy_crystals$§! en la tecnología militar permite desarrollar sistemas de propulsión con una potencia sin parangón. Nuestras naves surcarán las estrellas como nunca."
 menp_hyperthermia_solarflare: "Erupción solar artificial"
 menp_hyperthermia_solarflare_desc: "Hubo un tiempo en el que algunas partes de la galaxia estaban fuera de nuestro alcance. Eso dejará de ser una ilusión. Pronto, enjambres de nuestros $entropy_conduit_plural$ saturarán las estrellas y traerán una devastación calibrada a todos aquellos que se opongan a nosotros."
 unlocks_conduit_borders: "Los §Y$entropy_conduit_plural$§! cruzan la frontera automáticamente hacia territorio enemigo. \n\n"
 menp_hyperthermia_armada: "Armada ardiente"
 menp_hyperthermia_armada_desc: "A medida que la galaxia se consolida en nuestra contra, la movilización es imperativa. Todo ciudadano ha de contribuir para sustentar el frente energético, avivando las llamas de nuestro ascenso."
 unlocks_blazing_navalcap: "§Y[GetAlloyProducerPlural]§! y §Y[GetResearcherPlural]§! aumentan el £navy_size£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!.\n\n"
 # MPerks Level 5
 menp_hyperthermia_battleship: "$ember_battleship$"
 menp_hyperthermia_battleship_desc: "Estas enormes naves, poseedoras de unos cañones tan candentes como la tormenta de fuego a punto de engullir la galaxia, constituirán el grueso de nuestras fuerzas defensivas en el crisol."
 unlocks_ember_battleship: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_battleship$ \n- Puede equipar el arma £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!."
 menp_hyperthermia_critical_mass: "Masa crítica"
 menp_hyperthermia_critical_mass_desc: "El aumento de la actividad entrópica en la capa exterior de una estrella provoca que esta emita una gran cantidad de radiación. Esto ha causado que sistemas enteros se hayan calentado a mayor velocidad."
 unlocks_conduit_boost: "§Y$entropy_conduit_plural$§! aumenta su dependencia en función de la cantidad se sistemas capturados.\n\n$hyperthermia_map_perc$\n\n"
 hyperthermia_map_perc: "§G20%§! de la galaxia: $TABBED_NEW_LINE$- Los $entropy_conduit_plural$ causan devastación en las colonias cercanas. $TABBED_NEW_LINE$- Las colonias afectadas perderán lentamente £pop£ $POPS$. $TABBED_NEW_LINE$- Solo afecta a imperios de especies no §Ytermófilas§!. $TABBED_NEW_LINE$- Sistemas requeridos: §Y[root.hyperthermia_own_systems_var]§!/§Y[root.hyperthermia_systems_var]§!"
 menp_hyperthermia_ammunition: "Munición imbuida"
 menp_hyperthermia_ammunition_desc: "Refinamiento en el diseño de la munición: la munición estándar ahora ha mejorado gracias a los núcleos de entropía a microescala, liberando oleadas térmicas desestabilizadas al impactar. El resultado es una destrucción notablemente mayor."
 # Misc
 entropy_crystals_deficit: "Escasez de $entropy_crystals$"
 edict_entropy_harnessing: "Aprovechamiento de la entropía"
 edict_entropy_harnessing_desc: "Integrar la producción de $entropy_crystals$ en nuestra infraestructura nos permite aprovechar al completo nuestras capacidades técnicas y explotar al máximo el potencial de este nuevo recurso volátil."
 mod_planet_technician_entropy_crystals_produces_add: "£entropy_crystals£ §Y$entropy_crystals$§! de £job_technician£ [GetTechnician]"
