 crisis_hyperthermia_level_4_desc: "$crisis_level_4_desc$"
 crisis_hyperthermia_lv4_tt: "£trigger_yes£ Ha mejorado la megaestructura §Y$galactic_crucible_2$§!"
 crisis_hyperthermia_lv4_req_tt: "£trigger_no£ Ha mejorado la megaestructura §Y$galactic_crucible_2$§!"
