l_spanish:
 # Ascension Perk
 ap_galactic_hyperthermia: "Hipertermia galáctica"
 ap_galactic_hyperthermia_desc: "El universo comenzó con fuego, pero se ha enfriado hasta convertirse en un lugar oscuro y hostil. Para progresar, tenemos que aumentar la temperatura, aunque eso signifique la muerte de otros."
 must_be_infernals: "$TRIGGER_FAIL$Requiere que nuestra población esté compuesta de termófilos."
 # UI
 entropy_crystals: "Entropía cristalizada"
 entropy_crystals_name: "$entropy_crystals$:"
