l_spanish:
 ####################################
 # Anomaly Events
 ####################################
 # useful refs:
 # [From.GetName] planet
 # [From.GetStarName]
 # [Leader.GetName] scientist
 spires_of_light_category: "Agujas de luz"
 spires_of_light_category_desc: "En los escaneos iniciales se atisba un entramado de inmensas estructuras luminiscentes que se alzan sobre un paraje, por lo demás, anodino. Se desconoce aún su origen y función, pero el resplandor espectral que irradian apunta a que el fenómeno escapa a lo natural."
 infernals.500.name: "$spires_of_light_category$"
 infernals.500.desc: "Las sondas desplegadas con el fin de investigar los puntales rutilantes han determinado que se componen de un magma de silicato maleable. El material se conduce hacia arriba por conductos presentes en el lecho de roca, y acaba solidificado antes de fracturar la superficie. El fruto de este proceso son estructuras que se elevan cientos de metros antes de desmoronarse por su propio peso.\n\nEl resultado es un auténtico bosque de torres compuestas de vidrio volcánico casi puro y transparente, cada una de las cuales refracta el cálido resplandor naranja del magma fundido que aún se agita debajo.\n\n[Leader.GetName], de la división científica, aventura que los restos de las agujas derrumbadas podrían aprovecharse como un recurso de valor."
 #EXCELLENT:0 (first option has default answer)
 infernals.500.a: "No perturbemos este paisaje divino."
 infernals.500.b: "Se subastará un permiso de explotación."
 infernals.500.c: "Nos servirán para hacer prácticas de tiro."
 lava_whirlpool_category: "Remolino de lava"
 lava_whirlpool_category_desc: "El primer estudio de [Planet.GetName] reveló una extraña forma similar a una tormenta en el océano de lava principal del planeta. Se trata de un fenómeno de lo más insólito y, por tanto, digno de investigar."
 infernals.56.name: "Remolino de lava"
 infernals.56.desc: "[Leader.GetName] ha podido corroborar que la extraña forma que apreciábamos es un remolino de lava. Un fenómeno de suma rareza, y el primero con estas proporciones que se documenta. Presa del estupor al descubrir semejante prodigio, [Leader.GetName] envió una misión de muestreo.\n\nLas muestras obtenidas han esclarecido que el remolino se mantiene en parte gracias a una acumulación estable de metal vivo que, al sufrir el desgarro constante de las corrientes, intenta reconstituirse a perpetuidad. Esa reconstitución agita la lava, de ahí el remolino incesante. El muestreo ha puesto también de relieve la facilidad con que se puede extraer el metal vivo."
 infernals.56.a: "Que den comienzo las operaciones de extracción."
 outgassing_category: "Emisiones gaseosas"
 outgassing_category_desc: "A raíz de un escáner rutinario, se han detectado drásticas fluctuaciones químicas en la atmósfera de [Planet.GetName]. Un estudio más detallado podría explicar lo que está sucediendo aquí."
 infernals.1001.name: "Emisiones gaseosas"
 infernals.1001.desc: "Se han confirmado fluctuaciones químicas en la atmósfera tanto a lo largo del tiempo como en la superficie. Se ha observado una mayor intensidad en el gran océano magmático del planeta, y ya hay una sonda asignada a la recogida de muestras.\n\nTras un análisis más detallado, [Leader.GetName] ha determinado que el océano de magma de [Planet.GetName] está liberando gases exóticos valiosos. Si somos capaces de explotar este inesperado hallazgo, el planeta alberga un gran potencial de abastecimiento industrial."
 infernals.1001.a: "Empezad los procedimientos de extracción."
 crystal_lava_lakes_category: "Lagos de lava cristalina"
 crystal_lava_lakes_category_desc: "Se han observado en la superficie de este planeta grandes masas de lava. Merece la pena investigar, por si acaso presentaran oportunidades de extracción de recursos."
 infernals.1002.name: "Lagos de lava cristalina"
 infernals.1002.desc: "En las primeras imágenes de la superficie de [Planet.GetName] que hemos recabado se aprecian magníficas formaciones geológicas inusitadas a las que hemos llamado \"lagos de lava cristalina\". Se trata de longevas masas de magma ricas en extraños minerales que, expuestas a una horquilla de temperaturas específica, componen matrices cristalinas de manera natural. Esto dota a dichos lagos de una transparencia excepcional y una gama cromática de tonos rojizos iridiscentes. Dada la órbita del planeta, este efecto visualmente impactante fluye y refluye según un ciclo estacional a medida que fluctúan las temperaturas.\n\nPor su atractivo estético, los lagos de lava cristalina podrían constituir un reclamo turístico muy rentable. Además, tampoco está descartado que los minerales cristalinos se puedan extraer de la superficie durante su algidez, y ser de provecho en materia de almacenamiento de energía."
 infernals.1002.a: "Se desarrollará un resort en el yacimiento."
 infernals.1002.b: "Cosechad la energía de los lagos."
 crystal_lava_resort: "Resort de la lava cristalina"
 crystal_lava_resort_desc: "Los fulgentes lagos de este planeta se han convertido en un destino turístico de lujo al que acuden visitantes de toda la galaxia."
 bioadaptive_flora_category: "Flora bioadaptable"
 bioadaptive_flora_category_desc: "A simpe vista, [Planet.GetName] es un páramo volcánico de tantos otros, pero se han registrado niveles de oxígeno más altos de lo normal. Un fenómeno atípico debe de estar produciendo ese oxígeno."
 infernals.1003.name: "Flora bioadaptable"
 infernals.1003.desc: "La evaluación inicial de [Planet.GetName] lo caracterizó como un mundo de magma y fuego, pero los estudios han revelado un ecosistema nativo de flora compleja que habita en una red de fosas tectónicas en todo el planeta. Estas plantas producen oxígeno y recogen la escasa humedad de la atmósfera, creando reductos de microclimas con temperaturas cuasi templadas en lo que por lo demás es un yermo ígneo.\n\nLos biomas que propicia esa flora bien podrían resultar habitables para especies incapaces de medrar en cualquier otro mundo volcánico, y es posible que la misma flora sea apta para su explotación agrícola. Sería beneficioso para cualquier colono explorar a fondo qué es lo que vive en esos cañones exactamente."
 infernals.1003.a: "La región queda declarada zona de colonización viable."
 infernals.1003.tooltip_a: "Añade un modificador planetario que aumenta la tolerancia a la habitabilidad y el crecimiento."
 bioadaptive_flora_modifier: "Flora bioadaptable"
 bioadaptive_flora_modifier_desc: "Una flora autóctona resistente cubre los valles de fisuras de este planeta, creando microclimas más fríos y en los que se puede respirar y favoreciendo una habitabilidad limitada aun siendo un entorno volcánico."
 tectonic_icebreaker_category: "Rompehielos tectónico"
 tectonic_icebreaker_category_desc: "Se han detectado en el regolito de [Planet.GetName] extrañas anomalías térmicas que dan a entender que partes de la superficie se están enfriando a causa de algún proceso o elemento. Una excavación arrojará más detalles al respecto."
 infernals.1004.name: "Rompehielos tectónico"
 infernals.1004.desc: "[Leader.GetName] informa de que bajo la superficie volcánica de §Y[from.GetName]§! hay inmensos glaciares. Estos se encuentran confinados en insólitas formaciones rocosas compuestas de minerales con propiedades aislantes inauditas. La actividad tectónica está degradando poco a poco estas capas aislantes, y [Leader.GetName] pronostica que, si se llegaran a equilibrar las temperaturas entre los glaciares y el resto del planeta, este se enfriaría lo suficiente para considerarlo un mundo árido, abandonando la categoría de volcánico.\n\nPodemos acelerar este proceso para hacer que el planeta sea algo más habitable. Sin embargo, el fenómeno en sí posee gran interés científico, y es mucho lo que podríamos aprender al estudiar el desarrollo natural del proceso."
 infernals.1004.a: "Estabilicemos el fenómeno tectónico."
 infernals.1004.b: "Aceleremos la fusión."
 infernal_oasis_category: "Oasis infernal"
 infernal_oasis_category_desc: "Tenemos imágenes asombrosas de §Y[from.GetName]§! que muestran un mundo ardiente y fundido interrumpido por una franja verde sorprendentemente brillante, del tamaño de un continente. Un extraordinario espectáculo que da a entender que en la superficie está ocurriendo algo insospechado."
 infernals.505.name: "Un remanso de paz en pleno cataclismo"
 infernals.505.desc: "La peculiar composición de §Y[from.GetName]§! y su configuración tectónica han dado lugar a una maravilla sin parangón. Si bien el planeta es, en su mayoría, un tórrido desierto a rebosar de gases volcánicos y lava, una inmensa placa continental de roca sólida se eleva decenas de kilómetros sobre el nivel de la superficie. En ese altiplano, ajeno a las nubes tóxicas de más abajo, enverdece un ecosistema rico en flora y fauna autóctonas.\n\nEsta meseta sería fácilmente habitable para muchas especies y podría albergar numerosos conocimientos científicos fascinantes si se estudiara."
 infernals.505.a: "Sorprendente descubrimiento."
 NAME_Vermilion: "Bermellón"
 NAME_Kira: "Kira"
 mysterious_ringing_category: "Resonancia misteriosa"
 mysterious_ringing_category_desc: "Nuestros científicos han detectado picos de radiofrecuencia regulares que proceden de un punto fijo en [Planet.GetName]. Parecen coincidir con el momento en el que la fuente de la señal pasa de la noche al día."
 infernals.3210.name: "Resonancia misteriosa"
 infernals.3210.desc: "Un equipo científico llegó a [from.GetName] para rastrear la señal y determinó que provenía de un sistema de cuevas subterráneas dotado de equipo de observación científica.\n\nCon [Leader.GetName] al frente, el equipo se adentró en las cavernas y allí encontró una cámara sellada con aleaciones desconocidas, de cuyo interior salía un tenue timbre. [GetMysteriousRingingDesc3210]\n\nUna vez suministrado el material de protección auditiva, el equipo entró en la cámara, donde una criatura de una especie aún por identificar hibernaba junto al origen de la señal: un extraño artefacto cilíndrico.\n\nSegún los análisis, el artefacto irradia ondas con una frecuencia regular, intercaladas por varias horas de ruidos melódicos con vocalizaciones superpuestas que parecen ser compatibles con la anatomía fonadora de la criatura. [Leader.GetName] especula que el dispositivo puede estar programado para sacar a la criatura de su letargo a intervalos determinados."
 infernals.3210.individual: "Los exploradores hallaron una debilidad en el sellado que les permitió acceder. Al hacerlo, sin embargo, el timbre se volvió ensordecedor, y los miembros del equipo fueron presa de ataques de pánico y arrebatos de furia."
 infernals.3210.gestalt: "Los exploradores hallaron una debilidad en el sellado que les permitió acceder. Al hacerlo, sin embargo, el timbre se volvió ensordecedor, lo que provocó una sobrecarga sensorial y un colapso cognitivo entre los drones."
 infernals.3210.a: "Que copien los datos de la investigación y salgan de allí."
 infernals.3210.b: "Que despierten a la criatura y traten de reclutarla."
 infernals.3210.btt: "Líder obtenido: £scientist£ §Y$scientist$§! con §G4§! de nivel inicial."
 infernals.3210.c: "Que roben el artefacto."
 infernals.3210.ctt: "A nuestros trabajadores les vendrá bien un recordatorio de vez en cuando para que vuelvan al trabajo. Se desbloquea una decisión que aumenta §G+10%§! la producción de los £job£ ['concept_jobs'] a costa de una penalización de §R-5%§! a la £happiness£ ['concept_happiness']."
 decision_planetary_workshift: "Imponer turnos de trabajo planetarios"
 decision_planetary_workshift_desc: "$planetary_workshift_deployed_desc$"
 planetary_workshift_deployed: "Turnos de trabajo planetarios impuestos"
 planetary_workshift_deployed_desc: "Si la operatividad de todo el planeta se ciñe a una misma zona horaria, mejorará la comunicación entre equipos y su eficiencia, a expensas de hacer una leve mella en la felicidad."
 ####################################
 # Origin Events
 ####################################
 # Red Giant Origin
 infernals.45.name: "Tendencias preocupantes"
 infernals.45.desc: "Durante mucho tiempo hemos considerado §Y[capital_star.GetName]§! una gigante roja típica, pero algunos análisis recientes indican que su tamaño y sus emisiones de radiación están aumentando. Estos cambios ya se han hecho notar en nuestro clima, y cunde la inquietud entre la población.\n\nNo parece que la tendencia vaya a aminorar. La supervivencia de nuestra especie depende de que se investigue la causa de este fenómeno."
 infernals.45.desc.gestalt: "Durante mucho tiempo hemos considerado §Y[capital_star.GetName]§! una gigante roja típica, pero algunos análisis recientes indican que su tamaño y sus emisiones de radiación están aumentando. Estos cambios ya se han hecho notar en nuestro clima.\n\nNo parece que la tendencia vaya a cambiar por el momento. La supervivencia de nuestra especie depende de que se investigue la causa de este fenómeno."
 infernals.45.a: "Mantengamos la calma y restémosle importancia al problema."
 infernals.45.b: "Debemos ponernos a investigar cuanto antes."
 infernals.45.c: "Tenemos otras prioridades."
 infernals.45.d: "Que nuestro equipo de RR. PP. se ponga manos a la obra."
 infernals.45.public.tt: "\n§HSituación:§! $situation_red_giant_expansion$ \n- Cambia el enfoque de situación a §Y$approach_reassure_public$§! \n- Ganancia mensual de recursos: §G10§! £unity£"
 infernals.45.cause.tt: "\n§HSituación:§! $situation_red_giant_expansion$ \n- Cambia el enfoque de situación a §Y$approach_find_the_cause$§!"
 infernals.50.name: "Nova estelar"
 infernals.50.desc: "[GetRedGiantEndingExplode]"
 infernals.50.totalIgnorance: "Lo que provocó la calamidad de la gigante roja carece ya de importancia; no podemos hacer más que asumir nuestra situación y reconstruir a partir de los escombros."
 infernals.50.semiIgnorance: "Los estragos de la explosión estelar no dejaron prueba alguna que nos permita hallar al culpable.\n\nLo único que podemos hacer ahora es asumir nuestra situación y reconstruir a partir de los escombros."
 infernals.50.defaultEnding: "El proceso que un reducto de población alienígena inició en una estación minera decadente ha llegado al fin a su desenlace: §Y[Target.GetStarName]§! ha entrado en estadio de nova, tras envolver el sistema casi por completo. Un torrente de plasma multicolor y radiación ha asolado §Y[event_target:red_giant_homeworld_tmp.GetName]§! por completo, junto con todo nuestro sistema natal.\n\n[GetMegacorpDesc50]\n\n[GetLususMiningDesc]"
 infernals.50.megacorp: "Nuestro mundo natal ha quedado convertido en un inmenso campo de minerales dispersos por el sistema, a modo de yacimiento especialmente accesible. La extracción de estos recursos es mucho más económica de lo que nos costaría si aún siguieran contenidos en sus respectivos planetas y lunas. Cabe esperar que nuestros beneficios se disparen gracias a esta fuente de recursos baratos."
 infernals.50.nonmegacorp: "Aunque de nuestro mundo natal ya no quedan más que escombros, la nova ha sacado a relucir una plétora de recursos minerales que ocupa el sistema entero, fácilmente accesible con instrumental de minería convencional. Con estas riquezas, podremos construir un futuro nuevo."
 infernals.50.lususExists: "Una última ráfaga de energía recorre la estación, y luego esta se apaga por completo. Nos hemos quedado solos, entre los pedazos del que fuera nuestro mundo natal."
 infernals.50.lususGone: "Dado que la estación ya no existe, §Y[event_target:red_giant_homeworld_tmp.GetName]§! puede despreocuparse, pues el desastre no se repetirá jamás."
 infernals.50.a: "Debemos hacer cuanto podamos para recuperar nuestro hogar."
 infernals.51.name: "Nova mitigada"
 infernals.51.desc: "Tras las titánicas labores de limpieza, la superficie de §Y[this.GetName]§! vuelve a ser habitable para $trait_infernal_plural$. Aunque siempre quedarán cicatrices permanentes, se pueden aprovechar al máximo para generar oportunidades de investigación únicas."
 infernals.60.name: "Vuelta a la normalidad"
 infernals.60.desc: "Al ajustar el sifón, extraer hidrógeno de la envoltura y adecuar el volumen de circulación de gases, hemos conseguido revertir la expansión de §Y[Target.GetStarName]§!, evitando todo peligro. De tal manera, la estrella ha vuelto al estadio de gigante roja, serena y cálida.\n\nYa se ha registrado una estabilización climática en §Y[Target.GetStarName]§!, y de cara al futuro podemos esperar que nuestro planeta natal siga siendo el núcleo habitable del imperio.\n\n[GetRedGiantEndingKalmStationStatus]"
 infernals.60.lususDestroyed: "Sin la estación, es posible que jamás lleguemos a entender con exactitud qué sucedió. No obstante, sí que podemos sacar el máximo provecho de los materiales que ha ido dejando la estrella al menguar."
 infernals.60.lususAlive: "Ahora que sabemos controlar la estación, nos corresponde decidir a qué fin servirá en lo sucesivo."
 infernals.60.a: "Desmantelad la estación de inmediato."
 infernals.60.b: "Sigamos estudiando la estación."
 infernals.60.c: "La conservaremos a modo de monumento triunfal."
 infernals.60.d: "Un poco de alivio, al fin."
 infernals.65.name: "Expansión estelar"
 infernals.65.desc: "Las observaciones en curso lo confirman: §Y[Target.system_star.GetName]§! se expande a pasos agigantados. También se informa de efectos físicos por el aumento de la radiación. O nos las ingeniamos para ponerle freno, o §Y[Target.system_star.GetName]§! nos habrá erradicado antes incluso de consumir el planeta.\n\n[GetMegacorpDesc65]"
 infernals.65.nonmegacorp: "Ganaremos algo más de tiempo si nos protegemos de la radiación estelar. Un plan más arriesgado pero potencialmente lucrativo sería aprovechar el aumento de la radiación para impulsar nuestros sectores energético e industrial."
 infernals.65.megacorp: "Podríamos invertir en la protección planetaria, lo que nos aseguraría en cierta medida contra la volatilidad y la pérdida de activos por cataclismos. No obstante, existe también la opción de incrementar la generación de energía y nuestro rendimiento industrial si lográsemos canalizar ese excedente de radiación."
 infernals.65.a: "Protejamos nuestro mundo natal."
 infernals.65.b: "Hay que aprovechar este fenómeno."
 infernals.70.name: "Una estrella hambrienta"
 infernals.70.desc: "§Y[Target.GetName]§! se ha cobrado su primera víctima importante, engullendo el mundo más interno de nuestro sistema. Aunque los materiales en bruto que albergaba aún existen, estos se encuentran ahora inmersos en las abrasadoras profundidades de la estrella.\n\nEste revés económico inmediato lo podemos capear, pero tan solo es un adelanto perturbador de lo que le aguarda a §Y[Owner.Capital.GetName]§!."
 infernals.75.name: "Daño colateral"
 infernals.75.desc: "En su crecimiento inusitado, nuestra gigante roja ha consumido otro planeta más. Sus valiosos recursos quedan para siempre fuera de nuestro alcance, a menos que la estrella se desprenda de sus capas externas en una violenta nova."
 infernals.95.name: "Galerías estelares"
 infernals.95.desc: "La explicación a la anomalía de §Y[capital_star.GetName]§! es más extraña aún de lo que imaginamos. De la investigación aún en curso se ha inferido que existe una dupla de túneles en las profundidades de nuestra estrella.\n\nUna de las galerías canaliza material rico en hidrógeno directamente al estrato exterior, lo que acelera la fusión y la producción de helio. Este proceso debería llevar a una compresión del núcleo, efecto que observaríamos de no ser por la segunda galería, que extrae energía a modo de sifón, contrarrestando el efecto. El resultado: la expansión de la estrella.\n\nLos primeros análisis telemétricos desde ambas galerías subespaciales indican que estas conectan con diversas salidas a lo largo y ancho de la galaxia. Debemos investigarlas cuanto antes, pues de ello depende nuestra supervivencia."
 infernals.95.a: "Tendremos que investigar las tres ubicaciones."
 infernals.95.a.tt: "Se han detectado objetivos viables para la triangulación del origen subespacial."
 infernals.105.name: "Cicatrices subespaciales"
 infernals.105.desc: "Escaneos astrométicos en torno a §Y[FromFromFrom.GetName]§! han revelado la presencia de enigmáticas cicatrices subespaciales. Si bien actualmente no hay un punto de salida en este lugar, es posible que se haya abierto un túnel en la órbita de este gigante gaseoso. De los datos recabados hemos extraído valiosos conocimientos de física que bien se podrán aplicar en otros ámbitos. \n\nHasta entonces, seguiremos investigando en otras áreas a fin de identificar el origen de esas galerías subespaciales que atraviesan nuestra estrella."
 infernals.105.a: "Seguid buscando."
 infernals.110.name: "Restos de chatarra alienígenas"
 infernals.110.desc: "Los análisis de §Y[FromFromFrom.GetName]§! han delatado la existencia de cicatrices subespaciales. Además, se han identificado cerca del planeta antiguos cúmulos de chatarra metálica alienígena. Se trata de formaciones inmóviles en su posición orbital, por lo que tal vez expliquen las cicatrices. \n\nEl estudio ya en curso de esas fluctuaciones subespaciales nos ayudará, creemos, a optimizar los paneles solares que usamos en nuestra estrella.\n\nSi bien estos datos han sido útiles, necesitamos al menos una ubicación de estudio más para identificar el origen actual de nuestros problemas."
 infernals.110.a: "Que se subaste la chatarra."
 infernals.115.name: "Triangulación completada"
 infernals.115.desc: "Al fin, el hallazgo que esperábamos.\n\nLas nuevas cicatrices encontradas en torno a §Y[FromFromFrom.GetName]§! nos han permitido triangular el origen de la perturbación que afecta a nuestra estrella: se trata de un sistema con señales hostiles que hasta hoy había pasado desapercibido a nuestros análisis.\n\nEsta investigación podría ayudarnos a contrarrestar lo que está afectando a nuestra estrella.\n\nCuando lleguemos al sistema §YLusus§!, tal vez podamos reencauzar el porvenir de §Y[FromFromFromFrom.Target.solar_system.GetName]§! y, por ende, el de nuestra civilización."
 infernals.115.a: "Abordémoslos con cautela."
 infernals.115.b: "Prepararemos un despliegue de fuerza."
 infernals.115.c: "Antes de entrar en contacto, que se pronuncie una bendición."
 red_giant_lusus_triangulated_tt: "Se ha revelado un nuevo sistema."
 infernals.2115.name: "Equipo de abordaje"
 infernals.2115.desc: "Nuestras fuerzas han tomado el control de la estación. Sus habitantes han opuesto cierta resistencia, pero su armamento era tan exiguo como su formación marcial. Un escrutinio ha puesto de relieve la juventud de la mayoría. Se ha confinado a los que no han perecido en el abordaje.\n\nSe ha iniciado el análisis sobre cómo podemos controlar los túneles subespaciales, que parecen ser una especie de sifón de extracción de energía. Con el tiempo, podremos abordar la situación en nuestro sistema natal."
 infernals.2115.a: "Demoledla."
 infernals.2115.b: "Interrogad a los supervivientes."
 infernals.2115.c: "Esclavizadlos."
 infernals.2115.d: "Los supervivientes conllevan un peligro. Eliminadlos."
 infernals.2115.e: "Hablad con los supervivientes."
 infernals.2115.f: "Purgad la estación."
 infernals.2115.g: "Devoradlos."
 infernals.400pops: "Se crean §G400§! £pop£ $POPS$ en [this.GetName]"
 infernals.300pops: "Se crean §G300§! £pop£ $POPS$ en [this.GetName]"
 infernals.2121.name: "Alienígenas aniquilados"
 infernals.2121.desc: "Se ha destruido la estación minera subespacial, matando a toda su tripulación.\n\nLa destrucción de la estación ha detonado un almacén de energía desconocido. La energía resultante se ha filtrado a través del túnel subespacial colapsado hacia §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!, empeorando considerablemente la situación en casa.\n\nNo todo es tragedia: ha cesado la transmisión de hidrógeno a nuestra estrella. Por grave que sea nuestra tesitura, esta ya no irá a peor. Lo más seguro es que nunca lleguemos a conocer el origen de esta estación ni su diseño, pero al menos viviremos con la seguridad de que un poder de tal magnitud nunca caerá en manos de nuestros rivales.\n\nPor desgracia, no tenemos cómo devolver §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! a su estado original de manera inmediata. Si queremos alterar de nuevo el estado de nuestra estrella, tendremos que buscar en nuestros registros pistas de la actividad que desempeñaba la estación."
 infernals.2121.a: "Vamos a limpiar este desastre."
 infernals.2122.name: "Estación destruida"
 infernals.2122.desc: "Aún quedan restos de la estación a la deriva por el espacio. Su destrucción nos brinda otra oportunidad de cambiar el rumbo de §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!. No será accionando un interruptor, sino mediante trabajo duro y oneroso."
 infernals.2125.name: "Negociación con los alienígenas"
 infernals.2125.desc: "Tras un proceso prolongado y tortuoso, disponemos por fin de un intérprete rudimentario con el que comunicarnos con los moradores de la estación.\n\nSus instalaciones llevan generaciones en funcionamiento, pasando de un gigante gaseoso a otro y valiéndose de su sifón para extraer energía de estrellas lejanas, energía que alimenta sus sistemas de soporte vital y su potente motor de salto.\n\nLos alienígenas no entienden en su plenitud los complejos mecanismos que operan, ni eran conscientes de que la extracción ocasionaba la destrucción de una estrella tras otra.\n\nPasado el desconcierto inicial, parecen deseosos de dejar la estación y han prometido enseñarnos cuanto saben a cambio de un lugar seguro donde vivir y criar a sus crías."
 infernals.2125.a: "Proporcionadles un santuario."
 infernals.2125.b: "Les ofrecemos una nave, y que busquen su propio camino."
 infernals.2125.c: "Abrid las escotillas de la estación por control remoto."
 infernals.2125.d: "Antes, dejaremos que se formen una opinión de nosotros."
 infernals.2130.name: "Operación minera subespacial"
 infernals.2130.desc: "La estación extrae hidrógeno de un gigante gaseoso y lo canaliza a través del subespacio hasta el manto exterior de nuestra estrella. La fusión de helio resultante provoca una reacción exotérmica, y esa energía se convierte en §Y$entropy_crystals$§! que alimentan los sistemas de la estación.\n\nLa inestabilidad de §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! es el resultado de errores de calibración y degradación del equipo que los habitantes no notaron o no supieron cómo solucionar.\n\nCon su tecnología arcaica, es posible que logremos revertir el proceso, pero no será fácil. Alternativamente, forzar a nuestra estrella a convertirse en nova podría exponer innumerables depósitos y transformar nuestro patrimonio en un tesoro de recursos explotables."
 infernals.2130.a: "Pongámonos manos a la obra."
 infernals.2131.desc: "La estación extrae hidrógeno de un gigante gaseoso y lo canaliza a través del subespacio hasta el manto exterior de nuestra estrella. La fusión de helio resultante provoca una reacción exotérmica, y esa energía se convierte en §Y$entropy_crystals$§! que alimentan los sistemas de la estación.\n\nLos habitantes de la estación solo conservan una distorsionada tradición oral sobre su funcionamiento. Perdieron el contacto con su civilización originaria hace miles de años, quizá porque cayó en declive o fue destruida. Una acumulación de errores de calibración y degradación del equipo ha motivado una inestabilidad cada vez mayor que ahora amenaza con destruir §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!.\n\nCon su tecnología arcaica, es posible que logremos revertir el proceso, pero no será fácil. Alternativamente, forzar a nuestra estrella a convertirse en nova podría exponer innumerables depósitos, transformando nuestro patrimonio en un tesoro de recursos explotables."
 infernals.2135.name: "El fin de la amenaza"
 infernals.2135.desc: "Al explicarles nuestro grave apuro, los habitantes de la estación manifestaron preocupación y desconsuelo. Se suponían solos y no sabían que en la galaxia había otras especies.\n\nEn un arrebato de culpabilidad y antes de que entendiéramos lo que hacían, empezaron a desmantelar la estación, destruyendo casi todos sus componentes de forma irreversible.\n\nComo resultado, será difícil controlar la expansión de la estrella. Y aún debemos decidir qué hacemos con estos alienígenas volátiles y si les ofrecemos el perdón que desean."
 infernals.2135.a: "Acogedlos y recuperad cuanto se pueda de la estación."
 infernals.2135.b: "Deshaceos de ellos y de la estación."
 infernals.2135.c: "Esclavizadlos y destruid la estación."
 infernals.2140.name: "Visos de estabilidad"
 infernals.2140.desc: "Tras una ardua labor, por fin somos plenos soberanos del porvenir de §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!. Si no intervenimos, proseguirá con su ciclo natural de desarrollo, solo que con su tamaño actual.\n\nCabe tener en cuenta que la estación, antigua y decadente, no soportará muchas reconfiguraciones. Cada ajuste es tentar a los límites de su capacidad. Ahora, tan solo nos queda una opción.\n\nPodemos hacer que la estrella mengüe hasta recobrar sus dimensiones, o bien forzar su expansión, transformando el sistema en un extenso campo colmado de recursos que podremos extraer con facilidad.\n\nNuestra división de [GetScientistPlural] efectuará una última reconfiguración. Luego, el único protocolo viable será desmantelar la estación con la máxima celeridad, es decir, haciendo uso de fuerza externa."
 infernals.2140.a: "Estabilizad la estrella con su tamaño actual."
 infernals.2140.b: "Acelerad la expansión de la estrella."
 infernals.2140.bdesc: "§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! crecerá de manera irreversible."
 infernals.2140.c: "Devolved la estrella a la normalidad."
 infernals.2140.cdesc: "§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! menguará de manera irreversible."
 infernals.2145.name: "Estabilidad lograda"
 infernals.2145.desc: "Ahora que ostentamos un control total sobre las oscilaciones en tamaño y energía de nuestra estrella, §Y[Target.GetStarName]§! goza de plena estabilidad. Auguramos millones de años sin alteración alguna, y nuestra gente podrá volver a disfrutar de la estabilidad y previsibilidad de nuestro sistema natal.\n\nEl aumento de tamaño de nuestra estrella tiene consecuencias claras en cómo gestionamos nuestra infraestructura. Podemos aprovechar al máximo estos cambios, explotando su mayor producción energética y manteniendo una presencia viable en el sistema al mismo tiempo."
 infernals.2145.a: "Al fin somos dueños de nuestro destino."
 infernals.2151.name: "Una estación misteriosa"
 infernals.2151.desc: "Al entrar en el sistema, nuestras naves se toparon con una resistencia limitada por parte de un grupo de drones automatizados. Neutralizados estos sin demora, nada nos impedía escrutar la insólita estación.\n\nLa estructura sigue operativa, aunque en su casco se aprecian indicios de reparaciones varias. Al tratar de acceder a un muelle de atraque, entramos en contacto con una especie alienígena desconocida hasta la fecha. Aunque aún existen barreras lingüísticas, hemos confirmado que esta instalación es el origen de los túneles que afectan a §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!.\n\nYa se está trabajando en la comunicación con sus moradores, y no descartamos una posible resolución diplomática. De fracasar esa tentativa, tal vez tendremos que recurrir a métodos más drásticos, como abordar la estación o destruirla sin miramientos. Sin embargo, sin una comprensión profunda de su propósito, tales acciones pueden conllevar un riesgo significativo para nuestra estrella."
 infernals.2151.a: "Hay que traducir su idioma."
 infernals.2151.b: "Abordad la estación por la fuerza."
 infernals.2151.c: "Destruid la estación."
 infernals.2160.name: "Una chispa de crisis"
 infernals.2160.desc: "Un estudio en curso de la estación minera subespacial sugiere que almacena cantidades masivas de energía térmica en una forma exótica, que nuestros [GetScientistPlural] llaman §Y$entropy_crystals$§!. La dinámica consiste en canalizar bucles de retroalimentación térmica para sobredimensionar la producción de energía.\n\nSi logramos emular esta tecnología, nada nos impedirá obtener un poder inimaginable hasta hoy; un poder que muchos considerarían antinatural y peligroso. Esta práctica puede resultar en una emisión desmedida de calor residual, pero si somos capaces de resistir al incremento térmico, la galaxia podría acabar rendida a nuestros pies."
 infernals.2160.a: "Sigamos investigando."
 infernals.2160.a.tt: "[GetRedgiantAlreadyHyperthermiaPickable]Descubre §Y$entropy_crystals$§! para progresar hacia una hipertermia galáctica."
 infernals.2160.a.ttunlock: "Permite adoptar la ventaja de ascenso $ap_galactic_hyperthermia$.\n"
 infernals.2160.b: "Una tecnología tan peligrosa no se debe desarrollar."
 infernals.2160.c: "Un uso de §Y$entropy_crystals$§! de lo más primitivo."
 situation_red_giant_expansion: "Expansión de la gigante roja"
 situation_red_giant_expansion_type: "$situation_red_giant_expansion$"
 situation_red_giant_expansion_desc: "Los rápidos cambios en las emisiones de nuestra estrella amenazan la estabilidad de nuestro mundo natal. De seguir así, §Y[Owner.Capital.GetStarName]§! se acabará tornando en nova y pulverizará por completo el sistema."
 situation_red_giant_expansion_monthly_change_tooltip: "El avance de la expansión depende de nuestra capacidad de dar con el detonante y anularlo."
 situation_red_giant_expansion_fail_tooltip: "§Y[Target.solar_system.GetName]§! se convertirá en supernova."
 situation_red_giant_expansion_finish_tooltip: "§Y[Target.solar_system.GetName]§! volverá a su estado normal."
 situation_red_giant_expansion_stage_1: "Nuestra estrella se encuentra en un estado de calma relativa, pero está emitiendo más radiación de lo habitual."
 situation_red_giant_expansion_stage_2: "Nuestra estrella es más grande que en nuestro pasado evolutivo, y esto está teniendo claras repercusiones en nuestro mundo natal."
 situation_red_giant_expansion_stage_3: "Nuestra estrella es peligrosamente grande y su actividad extrema amenaza la estabilidad de nuestro mundo natal."
 situation_red_giant_expansion_stage_4: "La estrella gigante roja está quemando gran parte de nuestro sistema estelar, haciendo la vida extremadamente difícil."
 situation_red_giant_expansion_stage_5: "Nuestra estrella está a punto de explotar, lo que abocaría nuestro sistema natal a una catástrofe total."
