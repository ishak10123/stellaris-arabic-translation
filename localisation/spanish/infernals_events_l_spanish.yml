 # RG Timeline events
 TIMELINE_EVENT_ORIGIN_RG_START: "$origin_red_giant$\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_START_TOOLTIP: "§HGalerías estelares§!\n§YEvento de origen§!\n\nHemos descubierto una serie de anomalías subespaciales. Ha comenzado la búsqueda de la fuente de la peligrosa inestabilidad de nuestra estrella."
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA: "Muerte de una gigante\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA_TOOLTIP: "§HSupernova presenciada§!\n§YEvento de origen§!\n\nNuestra estrella se expandió hasta engullir todo el sistema, dejando planetas en ruinas fundidas y esparciendo recursos por el vacío. Ahora no tenemos más remedio que forjar un nuevo futuro entre las estrellas."
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE: "Gigante apaciguada\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE_TOOLTIP: "§HMundo natal salvado§!\n§YEvento de origen§!\n\nSe ha logrado una estabilización a escala estelar que evitará otro descalabro catastrófico. Habrá que adaptarse a la mayor producción de la estrella, pero al hacer frente a estos desafíos nos volveremos más fuertes que nunca."
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL: "Gigante pacífica\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL_TOOLTIP: "§HMundo natal salvado§!\n§YEvento de origen§!\n\nContrarrestamos la transformación devastadora que había sufrido nuestra estrella, devolviéndola a su sereno estado previo a la evolución. Hemos demostrado que podemos superar incluso la amenaza más apocalíptica y ahora estamos preparados para afrontar lo que el universo nos depare."
 # COSMIC DAWN
 # All strings below are in order of their appearance ingame
 infernals.2500.name: "Señales en las profundidades" # intro
 infernals.2500.desc: "Los escaneos de precisión han sacado a relucir sofisticadas instalaciones sepultadas bajo la superficie de §Y[root.capital_scope.GetName]§!. Su tamaño y complejidad aumentan al aproximarse al núcleo. Sus firmas materiales y energéticas coinciden con las de la cámara de estasis en la que despertamos.\n\nEstos deben de ser restos de nuestra civilización anterior. Si logramos acceder al interior, estas instalaciones nos procurarán respuestas a los grandes interrogantes de nuestro pasado: quiénes somos y qué nos sucedió."
 infernals.2500.a: "Comienza nuestro viaje."
 INF_ORIGIN_COSMIC_DAWN_DRILLING: "Perforación de la corteza" # from 2500
 INF_ORIGIN_COSMIC_DAWN_DRILLING_DESC: "Si deseamos entender quiénes somos, es vital averiguar de dónde venimos. Tenemos que excavar las instalaciones enterradas bajo la superficie de §Y[owner.Capital.GetName]§!."
 infernals.2505.name: "Nuestra gente despierta"
 infernals.2505.desc.a: "Hemos descubierto más cápsulas de estasis en cuyo interior hibernan §Y[root.GetSpeciesNamePlural]§! aún con vida. Hemos puesto en marcha el despertar, pero parecen tan desconocedores de su pasado como nosotros."
 infernals.2505.desc.b: "Hemos descubierto más cápsulas de estasis en cuyo interior hibernan §Y[root.GetSpeciesNamePlural]§! aún con vida. Aun tras su integración, es evidente que no albergan recuerdos útiles."
 infernals.2505.a: "Queda autorizada una excavación a gran escala."
 infernals.2505.b: "Limitaos a sustraer lo necesario."
 infernals.2505.c: "Subcontrataremos personal excavador."
 situation_cosmic_dawn: "Excavación profunda"
 situation_cosmic_dawn_type: "$situation_cosmic_dawn$"
 situation_cosmic_dawn_monthly_change_tooltip: "El progreso actual de nuestra excavación profunda."
 situation_cosmic_dawn_desc: "Nuestra excavación ha servido para revelar instalaciones subterráneas que albergan tecnología avanzada, registros archivados y cápsulas de estasis en las que hibernan nuestros congéneres. Nuestra historia se encuentra en el subsuelo; si logramos desenterrarla, tal vez al fin averigüemos quiénes somos."
 situation_cosmic_dawn_finish_tt: "Para conocer mejor nuestra especie, debemos reencontrarnos con nuestro pasado olvidado."
 situation_cd_mod_mining: "$approach_cd_mining$"
 situation_cd_mod_drilling: "$approach_cd_drilling$"
 situation_cd_mod_financial: "$approach_cd_financial$"
 situation_cd_mod_storm: "$TRIGGER_FAIL$ Proyecto especial §Y$INF_ORIGIN_COSMIC_DAWN_STORM$§! sin terminar"
 situation_cd_mod_bribe: "$TRIGGER_FAIL$ Proyecto especial §Y$INF_ORIGIN_COSMIC_DAWN_BRIBE$§! sin terminar"
 sit_cd_stage1_tt: "Hemos empezado a perforar la corteza planetaria."
 sit_cd_stage2_tt: "Ya no se ve la superficie desde aquí."
 sit_cd_stage3_tt: "A mitad de la corteza, empieza a subir la temperatura."
 sit_cd_stage4_tt: "A esta altura de la corteza podemos oír el movimiento del núcleo."
 sit_cd_stage5_tt: "No podemos seguir ahondando, o se nos tragará el núcleo."
 approach_cd_mining: "Minería a cielo abierto"
 approach_cd_mining_tt: "Que todo el mundo se ponga a excavar. De paso, aprovechamos para extraer recursos minerales. \nProgreso mensual: §Y+$@approach_cd_mining$§!\n\n"
 approach_cd_drilling: "Perforación quirúrgica"
 approach_cd_drilling_tt: "Desplegaremos el instrumental de excavación más preciso del que dispongamos. Excavaremos lo justo y necesario, nada más. \nProgreso mensual: §Y+$@approach_cd_drilling$§!\n\n"
 approach_cd_financial: "Incentivos económicos"
 approach_cd_financial_tt: "Emplearemos a nuestros mineros subcontratados en esta excavación, y nos embolsaremos parte de los beneficios. \nProgreso mensual: §Y+$@approach_cd_financial$§!\n\n"
 # Stage 2
 infernals.2510.name: "Amnesia y datos"
 infernals.2510.intro: "A medida que descubrimos cápsulas de estasis, va quedando patente que la pérdida de memoria es prácticamente total."
 infernals.2510.desc.a: "$infernals.2510.intro$\n\nAl despertar, algunos de nuestros congéneres formulan la misma pregunta que nos invade: \"¿Quiénes sois?\".\n\nAun tras siglos de historia en los que hemos desarrollado una sociedad avanzada, nos encontramos tan lejos de la respuesta como ellos.\n\n$infernals.2510.outro$"
 infernals.2510.desc.b: "$infernals.2510.intro$\n\nAl despertar, nuestros congéneres no poseen recuerdos relevantes acerca de nuestros orígenes, al igual que el resto. Sin las respuestas que buscábamos, nos vemos obligados a buscar nuestra estela en las aguas de la historia.\n\n$infernals.2510.outro$"
 infernals.2510.outro: "A diferencia de nuestros parientes aletargados, sus bases de datos son una mina asombrosa de información. Se han reiterado los análisis para corroborar los resultados, pero estos son inequívocos: todos los datos apuntan a que nos sumimos en el sueño del estasis hace más de doce mil millones de años.\n\nEsto sitúa nuestros orígenes cerca del inicio del universo, en medio de la formación de las primeras estrellas y planetas. Puede que la nuestra fuera de las primeras especies sintientes que evolucionaron en todo el cosmos."
 infernals.2510.a: "Averigüemos qué más nos hemos perdido."
 infernals.2510.b: "Este universo nos pertenece por derecho."
 # Stage 3
 infernals.2515.name: "Fallo del soporte vital"
 infernals.2515.desc: "Hemos exhumado una tragedia. Los registros de esta cápsula de estasis intacta revelan que §Y[event_target:homeworld.GetName]§! pasó miles de millones de años a la deriva antes de entrar en la órbita de su estrella actual. Aquella incorporación desencadenó una marejada extrema.\n\nAunque aquellas fuerzas gravitatorias forjaron el paraíso volcánico que es hoy nuestro hogar, la onda de choque inicial destrozó las células de energía que sustentaban estas instalaciones. Sus sistemas automáticos, priorizando a los individuos de mayor rango, desactivaron las cápsulas inferiores, así como el mantenimiento de la estructura. \n\nNuestros [GetScientistPlural] estiman que solo pueden rescatar a un sujeto antes de que la activación ponga en peligro la fuente de alimentación dañada y degenere en el derrumbe total del túnel. \n\nDe no haber sido por el cribado jerárquico, tal vez se habrían podido salvar muchos más."
 infernals.2515.a: "El progreso científico es lo primordial."
 infernals.2515.a.tt: "Líder obtenido: £scientist£ §Y$scientist$§!"
 infernals.2515.b: "Priorizar a los expertos fue buena decisión."
 infernals.2515.b.tt: "Líder obtenido: £official£ §Y$official$§!"
 infernals.2515.c: "Sofocad las células sin activarlas."
 infernals.2515.c.tt: "Los sujetos se pueden sustituir, pero nuestro imperio necesita espacio para crecer."
 infernals.2520.name: "Refugios interestelares"
 infernals.2520.desc: "§Y[event_target:leader.GetName]§! está restituyendo sus archivos de estasis. Según hemos sabido por sus hallazgos más recientes, debe haber multitud de pequeñas poblaciones de [root.GetSpeciesNamePlural] dispersas por la galaxia, hibernando en el mismo estasis que antaño nos conservó a nosotros.\n\nLos archivos registraron las posiciones de estos mundos, pero, como desde entonces han nacido y se han perdido estrellas enteras, hace falta una interpolación compleja para localizarlos. A modo de prueba de concepto, [event_target:leader.GetName] ha identificado uno de los planetas, aunque el proceso de traducción de datos apenas ha dado comienzo.\n\nEntre tanto, se nos ocurre un pensamiento estremecedor: [root.Capital.GetStarName] bien podría no ser nuestro mundo natal, sino un refugio de tantos otros. En tal caso, ¿de dónde procedemos? Y ¿acaso importa?"
 infernals.2520.a: "Debemos hallar a nuestra especie."
 infernals.2520.b: "Nuestro hogar ahora es este mundo."
 cosmic_dawn_anomalies_event_chain_title: "Refugios interestelares"
 cosmic_dawn_anomalies_event_chain_desc: "Debe haber multitud de poblaciones [root.GetSpeciesNamePlural] ocultas dispersas por la galaxia, hibernando en el mismo estasis que antaño nos conservó a nosotros.\n\nLos archivos registraron las posiciones de estos mundos, pero, como desde entonces han nacido y se han perdido estrellas enteras, hace falta una interpolación compleja para localizarlos."
 # Anomaly 2
 cosmic_dawn_sleepers_category: "Durmientes aislados"
 cosmic_dawn_sleepers_category_desc: "Si no nos engañan los datos, en estas coordenadas hay un planeta que alberga una reserva oculta de durmientes y tecnología. Deberíamos investigar a fondo."
 infernals.2525.name: "$cosmic_dawn_sleepers_category$"
 infernals.2525.desc: "§Y[root.leader.GetName]§! descubrió una instalación subterránea que albergaba a más de los nuestros en estasis y logró despertarlos. Estos, a diferencia de nosotros, conservan recuerdos desdibujados de la que fue su cotidianidad, y evocan relatos de un imperio espacial excelso que algún día volverá para rescatarlos.\n\nNo sin cierta cautela, nos reconocen como a sus congéneres. Podríamos presentarnos como los salvadores que esperaban, herederos de aquella gloria ancestral, o bien podemos contarles la verdad: que estamos construyendo algo nuevo y que nuestra intención de aprender de ellos se equipara a la voluntad de enseñarles lo que sabemos.\n\nLas sucesivas referencias de estos archivos nos han permitido localizar a un segundo candidato con cápsulas de estasis."
 infernals.2525.a: "Somos sus salvadores de otrora."
 infernals.2525.b: "Estamos construyendo algo nuevo."
 infernals.2525.c: "Asimilémoslos."
 # Anomaly 3
 cosmic_dawn_sleepers2_category: "Durmientes suspicaces"
 cosmic_dawn_sleepers2_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2530.name: "$cosmic_dawn_sleepers2_category$"
 infernals.2530.desc: "§Y[root.leader.GetName]§! ha encontrado más miembros de nuestra especie hibernando en estasis y los ha despertado, pero estos, aterrorizados, exigen que nos marchemos. No nos reconocen como a sus congéneres, ni es bien recibida nuestra presencia.\n\nTras una tensa negociación, han manifestado su voluntad de salir a explorar la galaxia. Podemos ofrecerles una nave sencilla a un módico precio, o bien, dado que la mano de obra nunca está de más, podemos trasladarlos a la colonia más cercana. Tal vez así acaben entrando en razón.\n\nLos archivos de esta instalación muestran la ubicación de otro mundo con más cápsulas de estasis."
 infernals.2530.a: "Cedámosles una nave."
 infernals.2530.b: "Nos los llevamos a casa."
 infernals.2530.b.tt: "£pop£ $POPS$ obtenidas: §G+200§!"
 infernals.2530.c: "Asimilémoslos."
 # Ship returns
 infernals.2531.name: "Retorno"
 infernals.2531.desc: "Los durmientes que partieron en una nave nuestra han regresado, ni más ni menos que a bordo de una nave de guerra descomunal. Su periplo a través de la galaxia los llevó a entrar en conflicto con piratas, a quienes superaron y finalmente derrotaron.\n\nEl apoderarse de la nave enemiga les despertó una curiosa inclinación por la piratería. Sus incursiones se fueron volviendo cada vez más audaces, y sus objetivos, más poderosos. Sin embargo, la piratería acaba fatigando, por muy lucrativa que sea.\n\nRegresan hoy al hogar en busca de estabilidad y, tal vez, algo más trascendental. Con su nave, su experiencia y su botín, es mucho lo que nos pueden aportar."
 infernals.2531.a: "La inversión ha valido la pena."
 infernals.2531.a.tt: "A nuestra flota le vendrá muy bien esa nave. Conseguimos un crucero."
 infernals.2531.b: "Readaptaremos su nave para que colonice un nuevo mundo."
 infernals.2531.b.tt: "Conseguimos un ejemplar de §H$colonizer$§!."
 infernals.2531.c: "En nuestra capital hay donde alojarlos."
 infernals.2531.c.tt: "£pop£ $POPS$ obtenidas: §G+200§!"
 # Anomaly 4
 cosmic_dawn_sleepers3_category: "Puerto estelar de durmientes"
 cosmic_dawn_sleepers3_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2535.name: "$cosmic_dawn_sleepers3_category$"
 infernals.2535.desc: "§Y[root.leader.GetName]§! ha descubierto un pequeño complejo de estasis dotado de puerto estelar, donde se encuentra una nave científica funcional. Bastarán apenas un par de reparaciones.\n\nEl lugar cuenta además con una gran reserva de datos científicos, que incluyen especímenes de otras especies[GetInterstellarRefugiaDesc2535] Se desconoce a ciencia cierta si los especímenes se sustrajeron por la fuerza o se entregaron de buena gana, pero la nave cuenta con celdas diseñadas para confinar a seres sintientes.\n\nPodemos ganar mucho si los estudiamos, tal vez incluso haya más formas de vida esperando a ser descubiertas ahí fuera."
 infernals.2535.contact: " Es probable que algunos sean ancestros de especies hoy inteligentes." # prints this in [GetInterstellarRefugiaDesc2535] above
 infernals.2535.nocontact: "." # Can't be empty, so holds the full stop.
 infernals.2535.a: "Estudiemos los especímenes."
 infernals.2535.b: "Se devolverán los especímenes a sus descendientes."
 infernals.2535.c: "Deshagámonos de las pruebas."
 # Random Stasis Pods discovered
 infernals.2536.1: "Después de meses de trabajo, los nuevos [root.GetSpeciesNamePlural] que dormían en [planet.GetName] se han unido a nuestras filas."
 infernals.2536.1.a: "¡Poned rumbo al sistema!"
 infernals.2536.1.b: "Ya no tenemos tiempo para esto." # ends the chance to spawn more pods.
 infernals.2536.2: "Hemos logrado abrir otra cápsula de estasis y hemos trasladado a sus habitantes a casa."
 infernals.2536.3: "Hemos liberado a más [root.GetSpeciesNamePlural]. Ahora, los estamos ayudando a adaptarse a un universo más frío en el que el calor estelar es esencial para sobrevivir."
 infernals.2536.4: "Hemos despertado con éxito a más [root.GetSpeciesNamePlural] en [planet.GetName]."
 infernals.2536.5: "Hemos encontrado otra cápsula de estasis."
 infernals.2536.6: "[root.leader.GetName] ha descubierto otra cápsula de estasis, por lo que más [root.GetSpeciesNamePlural] nacidos hace eones han llegado a nuestro presente."
 infernals.2536.7: "[root.leader.GetName] ha encontrado otra cápsula con [root.GetSpeciesNamePlural] preservados en estasis."
 infernals.2536.8: "[root.leader.GetName] ha abierto una antigua cápsula de estasis en [planet.GetName] y está tratando la drástica exposición al frío de sus habitantes."
 infernals.2536.9: "Se ha hallado otra cápsula de estasis con [root.GetSpeciesNamePlural] en [planet.GetName]."
 infernals.2536.10: "Más [root.GetSpeciesNamePlural] de hace eones han despertado para unirse a nosotros."
 # Stage 4
 infernals.2540.name: "Una prisión antigua"
 infernals.2540.desc: "Nuestra última excavación nos deparaba una sorpresa: este grupo de durmientes despertó hace siglos, pero nunca abandonó las instalaciones.\n\nUn análisis arquitectónico ha revelado que las instalaciones se cierran por fuera, quedando confinados sus moradores. Al echar abajo las puertas blindadas, de inmediato se nos recibió con hostilidad, aunque los durmientes han retrocedido tras la toma de contacto.\n\nPuede que los archivos nos esclarezcan este enigma, pero nos arriesgamos a provocar a nuestros congéneres si accedemos a ellos. Podemos tomar el centro y atajar el problema con violencia, o bien tratar de congraciarnos con ellos con sobornos para que colaboren."
 infernals.2540.a: "Asaltad la instalación."
 infernals.2540.b: "Ofreced regalos y nuestra amistad."
 INF_ORIGIN_COSMIC_DAWN_STORM: "Asalto al centro de estasis"
 INF_ORIGIN_COSMIC_DAWN_STORM_DESC: "Necesitamos acceder a las instalaciones, pero nuestros semejantes se interponen. Hay que neutralizarlos por la fuerza."
 infernals.2545.name: "Invasión de la prisión"
 infernals.2545.desc: "Nuestras fuerzas se han abierto paso por las instalaciones y no han tardado en someter a la mayoría de sus habitantes, que apenas oponían resistencia.\n\nLos archivos revelan que era una prisión. Los reclusos eran extremistas que abogaban por el uso radical de la tecnología para recalentar un universo que se enfría, lo que supondría resultados descabelladamente imprácticos o catastróficos.\n\nAlgunos líderes carcelarios §Y[root.GetSpeciesNamePlural]§! se han atrincherado en una cámara central con explosivos y exigen que todos los habitantes se queden y que se vuelva a sellar la zona.\n\nEl túnel podría llenarse de un gas invisible que anularía los explosivos, salvando la estructura, pero casi todos sus habitantes se ahogarían al poco tiempo."
 infernals.2545.a: "Llenad el túnel con gas."
 infernals.2545.a.tt: "£pop£ $POPS$ obtenidas: §G+100§!"
 infernals.2545.b: "Evacuad de inmediato."
 infernals.2545.b.tt: "£pop£ $POPS$ obtenidas: §G+400§!"
 INF_ORIGIN_COSMIC_DAWN_BRIBE: "Soborno en el centro de estasis"
 INF_ORIGIN_COSMIC_DAWN_BRIBE_DESC: "Si conseguimos que los habitantes de este centro acaben dependiendo de nosotros, podremos exigirles acceso a las instalaciones. Nos conviene suministrarles todo tipo de bienes y recursos útiles y de primera necesidad."
 infernals.2550.name: "Invasión de la prisión"
 infernals.2550.desc: "Tras meses de vínculo comercial, los reclusos de estasis dependen de nuestros suministros. Ante la amenaza de privarles de estos, cundió el pánico y nos cedieron el control del centro.\n\nLos archivos escrutados corroboran que se trataba de una prisión, y a estos individuos se les confinó aquí por promover tecnologías radicales que caldeasen un universo en vías de enfriamiento, con ideas descabelladas, cuando no peligrosísimas.\n\nPor suerte, no albergan recuerdo alguno de aquello. Mientras nuestros científicos estudian las instalaciones, los exreclusos ya se van integrando en nuestra sociedad y su asimilación avanza sin incidencias."
 infernals.2550.a: "Bien hecho."
 infernals.2550.a.tt: "£pop£ $POPS$ obtenidas: §G+300§!"
 # Stage 5
 infernals.2555.name: "Un accidente trágico"
 infernals.2555.intro: "Se ha producido un accidente en las inmediaciones de nuestra excavación más reciente. La central de energía que abastecía a la excavación ha sufrido daños, aunque las cápsulas de estasis siguen funcionando por el momento."
 infernals.2555.outro: "No está claro cuánto tiempo más permanecerán operativos los sistemas. Si pretendemos salvar a los durmientes, nos conviene mover ficha antes de que se agote la reserva energética del centro."
 infernals.2555.desc.a: "$infernals.2555.intro$\n\nLas sospechas han recaído sobre algunos de los termófilos recientemente asimilados de la instalación anterior. Se rumorea que tal vez no hayan sido los trabajadores más diligentes.\n\n$infernals.2555.outro$"
 infernals.2555.desc.b: "$infernals.2555.intro$\n\nAl saber de la catástrofe, la última comunidad de termófilos que rescatamos se ha ofrecido a agilizar el proceso de rescate.\n\n$infernals.2555.outro$"
 infernals.2555.a: "Purguemos a todos los trabajadores desleales."
 infernals.2555.b: "Pagaremos para contar con más mano de obra."
 infernals.2555.c: "Rescatémoslos sin demora."
 infernals.2555.d: "Procedamos con cautela."
 # Option events from above (Stage 4)
 infernals.2560.name: "Salvando la situación"
 infernals.2560.desc: "El acceso quedó restringido a nuestros trabajadores más leales en exclusiva, evitando así todo trastorno de sus labores.\n\nPor desgracia, el cribado de seguridad mermaba drásticamente la mano de obra a disposición, y no hemos logrado salvar las instalaciones. Los durmientes han fallecido.\n\nEl único consuelo que tenemos ahora reside en el estudio de su tecnología. De su degrado y ulterior colapso quizá podamos extraer conclusiones valiosas."
 infernals.2560.a: "Lástima."
 infernals.2565.name: "$infernals.2560.name$"
 infernals.2565.desc: "Al ofrecer una recompensa monetaria por las labores de salvamento, recibimos una oleada de candidaturas.\n\nPor desgracia, esas labores se han visto saboteadas por los exreclusos, indignados al ver que todo lo logramos controlar gracias a nuestras riquezas. El sabotaje se ha saldado con la muerte de quienes hibernaban en las cápsulas de estasis.\n\nNuestro pírrico consuelo es que al menos el ataque estuvo circunscrito a su objetivo. Aún podemos estudiar la tecnología y archivos, y este revés ha puesto de manifiesto taras en nuestros protocolos de cribado, que no dudaremos en solventar."
 infernals.2565.a: "¡Qué vileza la suya!"
 infernals.2570.name: "$infernals.2560.name$"
 infernals.2570.intro: "Desplegando toda una legión de trabajadores y personal de rescate en las instalaciones subterráneas, hemos conseguido sacar con celeridad y a salvo a todos los [Species.GetName] aletargados antes de que sus cápsulas de estasis cortocircuitasen. Tras saber de la funesta suerte que han esquivado, estos nuevos ciudadanos agradecen el rescate."
 infernals.2570.outro: "Por desgracia, en el trascurso del rescate precipitado hubo que abrir muchas cápsulas de estasis mediante cortes y otros medios destructivos, en menoscabo de su valor científico."
 infernals.2570.desc.a: "$infernals.2570.intro$\n\n$infernals.2570.outro$"
 infernals.2570.desc.b: "$infernals.2570.intro$\n\nAdemás, parece que los voluntarios de la prisión han estado ayudando a los recién llegados con diálogo y materiales, facilitando su integración en la sociedad.\n\n$infernals.2570.outro$"
 infernals.2570.a: "Suerte que contábamos con esos voluntarios de más."
 infernals.2570.a.tt: "£pop£ $POPS$ obtenidas: §G+400§!"
 infernals.2570.b: "Bien hecho."
 infernals.2570.b.tt: "£pop£ $POPS$ obtenidas: §G+400§!"
 infernals.2570.c: "$ACKNOWLEDGED$"
 infernals.2570.c.tt: "£pop£ $POPS$ obtenidas: §G+400§!"
 infernals.2575.name: "$infernals.2560.name$"
 infernals.2575.desc: "Nuestros científicos analizaron con detenimiento los sistemas, procurándonos una comprensión plena del instrumental antes de abordar el rescate de la población durmiente.\n\nLamentablemente, el proceso (desde el análisis hasta la publicación y los estudios de seguimiento) se demoró demasiado. Cuando nos vimos preparados, el sistema de soporte vital había fallado ya, cobrándose las vidas de todos los ocupantes.\n\nA pesar de la tragedia, al rescate le debemos grandes avances científicos, y la tecnología recuperada ya está dando sus frutos."
 infernals.2575.a: "Suerte que los vivos aún pueden sacarle provecho."
 infernals.2575.b: "$ACKNOWLEDGED$"
 # Situation completed
 infernals.2580.name: "Nuestra historia revelada"
 infernals.2580.desc: "Por fin hemos llegado al núcleo planetario, y su magnitud se antoja inverosímil. Dentro del planeta se encuentra una vasta arcología, alimentada por magma, que alberga a miles de durmientes.\n\nHemos hallado también un inmenso sistema de archivos que narran nuestro pasado: el surgimiento de un imperio galáctico y los relatos del gran enfriamiento universal. Algunos eligieron el sueño en estasis, otros trataron de combatir lo inexorable, y muchos optaron por volver la espalda a la realidad y perecieron sin más.\n\nLas verdades que aquí se nos revelan llevaban mucho tiempo enterradas. Algunos creen que demuestra quiénes somos realmente y quiénes podríamos llegar a ser. Otros sostienen que nos hemos forjado ya una nueva identidad, boyante por sí misma, y que la sociedad de nuestros antepasados no tiene cabida en el universo de hoy.\n\nEn todo caso, la vasta red de túneles queda a nuestra disposición."
 infernals.2580.a: "Deberíamos reconstruir nuestro antiguo imperio."
 infernals.2580.b: "El resto de los imperios deberían respetar nuestro legado."
 infernals.2580.b.tt: "Líder obtenido: £commander£ §Y$commander$§! con §G5§! de nivel inicial"
 infernals.2580.c: "Deberíamos mirar hacia el futuro."
 infernals.2580.d: "Lo único que importa es que hagamos el bien."
 # Relic & Specimen
 r_pyroglyphic_codex: "Códice piroglífico"
 r_pyroglyphic_codex_desc: "Un intrincado planetario de cristal que contiene abundante información sobre una civilización del origen de los tiempos. Su contenido tiene mucho que enseñarnos acerca de cómo crear una sociedad mejor."
 r_pyroglyphic_codex_effect_tt: "\nSi se activa el $r_pyroglyphic_codex$ por §Yprimera vez§!, se añadirá permanentemente el modificador §Y$infernal_library$§! a nuestra capital con los siguientes efectos: $TABBED_NEW_LINE$- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+5§! $TABBED_NEW_LINE$- $MOD_PLANET_HOUSING_MULT$: §G+20%§! $TABBED_NEW_LINE$- $MOD_PLANET_AMENITIES_ADD$: §G+10%§!"
 infernal_library: "Arquitectura subterránea"
 infernal_library_desc: "El redescubrimiento de unas antiguas técnicas de construcción en este mundo ha abierto nuevas posibilidades para edificar vastas ciudades cavernosas. Estos detalles y arquitectura, nunca vistos, son dignos de admirar, y se alzan como un recordatorio de los verdaderos orígenes de sus ciudadanos."
 pyroglyphic_codex_mod: "$r_pyroglyphic_codex$"
 pyroglyphic_codex_mod_desc: "Los fascinantes secretos que se hallan en el códice piroglífico están estimulando nuevas vías de investigación, y lo seguirán haciendo durante muchos años."
 infernal_stasispod: "Antigua cápsula de estasis"
 infernal_stasispod_desc_short: "Un ataúd de piedra sintética equipado con controles térmicos de una precisión asombrosa."
 infernal_stasispod_desc_details: "Los antiguos [Species.GetName] usaban las cápsulas para entrar en estasis durante miles de millones de años, y solo despertaban a sus habitantes si la temperatura era lo bastante cálida como para hacer vida. Esta cápsula proviene de una instalación en la que muchos sistemas fallaron y provocaron la muerte de sus habitantes. Sirve como firme y solemne recordatorio de las pruebas que tuvieron que superar los [Species.GetName] supervivientes."
 ####################################
 # Colony Events
 ####################################
 # Imminent Eruption
 infernals.3000.name: "Erupción inminente"
 infernals.3000.desc: "Los sistemas de alerta geológica advierten de que es posible que se produzca una erupción volcánica cerca del principal asentamiento de §Y[planet.GetName]§! en algún momento del próximo año.\n\nInvertir en una liberación controlada de presión podría permitir el aprovechamiento del flujo de lava para la producción de energía. Las tripulaciones podrían también cesar su actividad para recolectar magma directamente de la erupción y filtrarlo para conseguir metales preciosos. Otra opción es centrarnos en evacuar a civiles y hacer lo propio con los suministros a fin de minimizar los riesgos.\n\nTambién podemos continuar monitorizando la situación antes de emprender cualquier acción, por si las predicciones no son acertadas."
 infernals.3000.a: "¡Evacuad!"
 infernals.3000.a.tt: "Tiene §Y500§! de $energy$."
 infernals.3000.b: "Esperemos a ver qué pasa."
 infernals.3000.c: "Centraos en la generación de energía."
 infernals.3000.d: "Recolectad el magma."
 infernals.3005.name: "Justo a tiempo"
 infernals.3005.desc: "La evacuación temprana de la colonia resultó ser una buena decisión. El volcán entró en erupción antes de lo previsto y causó daños graves en los edificios de la zona. Los colonos pueden regresar y empezar a reconstruirlo todo de forma segura ahora que la presión volcánica subterránea es mínima."
 infernals.3010.name: "Ira volcánica"
 infernals.3010.desc: "El volcán erupcionó antes de lo previsto, y la colonia no estaba preparada para afrontar semejante catástrofe. Las infraestructuras han sufrido daños graves y se han perdido muchas vidas."
 infernals.3015.name: "Esperar y observar"
 infernals.3015.desc: "Tras varios meses, la actividad volcánica cerca de la colonia §Y[planet.GetName]§! ha vuelto a disminuir. Aunque el riesgo a largo plazo no ha desaparecido, parece que la colonia se encuentra segura por el momento."
 infernals.3015.a: "El riesgo ha merecido la pena."
 infernals.3020.name: "Red eléctrica mejorada"
 infernals.3020.desc: "Los equipos de ingeniería lograron establecer un sistema de seguridad para liberar poco a poco la lava presurizada que estaba bajo las cámaras y la han desviado hasta generadores de energía a su paso. Esto ha resultado en un beneficio a corto plazo para la red eléctrica de la colonia."
 infernals.3025.name: "Recolección de magma"
 infernals.3025.desc: "Una combinación de alteradores ultrasónicos y barreras físicas ha interrumpido la erupción volcánica, lo cual ha dado como resultado un gran campo de magma contenida y endurecida en su superficie. Los equipos mineros ya han empezado a recolectar este botín mineral."
 # Lava Sports
 infernals.3030.name: "Deportes de lava"
 infernals.3030.desc: "Lo normal es que nadie quiera estar cerca de los ríos rápidos de lava. Pero en §Y[planet.GetName]§! no es así.\n\nLos colonos compiten con aerodeslizadores utilitarios a lo largo de los ríos de lava activa mientras esquivan rocas flotantes y saltan cascadas de magma. Otros apuestan por los resultados de estas carreras, y las casas de apuestas han llamado la atención del crimen organizado. Algunos pilotos han llegado incluso a perder la vida en diversos accidentes.\n\nLa colonia no cuenta con leyes que prohíban esta práctica, pues nadie podía imaginar que alguien haría algo así. Podríamos aceptar este entusiasmo de los colonos y darles carta blanca, pero esto podría conducir a hazañas cada vez más peligrosas y a un posible componente delictivo, ya que las apuestas en estos eventos están aumentando. Otra opción sería regular el deporte; aunque podría causar algunas quejas, es una forma de minimizar las muertes y el crimen a largo plazo. O también podríamos prohibirlo por completo, algo que, aunque podría resultar efectivo, también conlleva un alto precio."
 infernals.3030.a: "Que fluya."
 infernals.3030.b: "Regulad este deporte."
 infernals.3030.c: "¡Prohibid esta sandez!"
 lava_surfboard: "Tabla de surf sobre lava"
 lava_surfboard_desc_short: "Una placa de acero rectangular con un mecanismo de flotación improvisado que se encuentra soldado en la parte inferior."
 lava_surfboard_desc_details: "Esta tabla de surf, claramente fabricada con piezas de repuesto, se usa en los deportes de lava de [Event.Planet.GetName]. Cuenta con una elaboración cuidada y nunca vista a la par que ingeniosa. Su sistema de flotación y los protectores térmicos son excelentes, y su estética evoca a la robusta autosuficiencia de los colonos fronterizos."
 infernals.3035.name: "¡Que fluya!"
 infernals.3035.desc: "Se ha generado un gran entusiasmo por los deportes de lava tras permitir que los colonos sigan esta tendencia. Las imágenes de pilotos conduciendo sus aerodeslizadores por los ríos de lava no han tardado en convertirse en un símbolo de la cultura local de §Y[planet.GetName]§!.\n\nPor desgracia, este entusiasmo ha opacado la seguridad. Siguen llegando informes esporádicos de muertes producidas durante las carreras, y parece que los prestamistas ilegales están aprovechando los hábitos de juego de los entusiastas de este tipo de deporte. Aunque la aprobación pública sigue siendo alta, no deberíamos olvidarnos de las consecuencias negativas que estos deportes pueden ocasionar en el futuro."
 infernals.3035.a: "Inquietante."
 infernals.3040.name: "Medidas de seguridad"
 infernals.3040.desc: "Aunque al principio los colonos se resentían ante la llegada de las autoridades imperiales para regular su querido pasatiempo, las nuevas medidas de seguridad exigidas para los vehículos de carreras han conseguido eliminar casi por completo las lesiones y los fallecimientos. Los pilotos de carreras ahora se muestran a favor de los beneficios que traen estas regulaciones para su seguridad, lo cual está generando un gran apoyo entre el público.\n\nTambién se ha impuesto la transparencia financiera y la tributación en las apuestas de los deportes de lava, cuyos ingresos se están destinando a la seguridad del equipamiento que usan los corredores. La ilegalidad ha desaparecido prácticamente entre las casas de apuesta, aunque algunos colonos se quejan de que las tasas establecidas por las autoridades son injustas."
 infernals.3040.a: "Mejor seguridad que lamentos."
 infernals.3045.name: "Deporte prohibido"
 infernals.3045.desc: "Se han desplegado fuerzas del orden para poner fin a esta peligrosa práctica. La indignación pública ha sido aplastante y se han sucedido las protestas por toda la colonia. Ahora que los ríos de lava están bajo vigilancia constante y no hay competidores que puedan participar, las muertes se han reducido a cero, y las apuestas han desaparecido por completo."
 infernals.3045.a: "No había otra opción."
 lava_sports_flow: "Deportes de lava: §Gpermitidos§!"
 lava_sports_flow_desc: "Se ha generado un gran entusiasmo por los deportes de lava tras permitir que los colonos sigan esta tendencia."
 lava_sports_regulated: "Deportes de lava: §Yregulados§!"
 lava_sports_regulated_desc: "Aunque al principio los colonos se resentían ante la llegada de las autoridades imperiales para regular su querido pasatiempo, las nuevas medidas de seguridad exigidas para los vehículos de carreras han conseguido eliminar casi por completo las lesiones y los fallecimientos. Los pilotos de carreras ahora se muestran a favor de los beneficios que traen estas regulaciones para su seguridad, lo cual está generando un gran apoyo entre el público."
 lava_sports_banned: "Deportes de lava: §Rprohibidos§!"
 lava_sports_banned_desc: "Se han desplegado fuerzas del orden para poner fin a esta peligrosa práctica."
 # Kindled Myths
 infernals.3055.name: "Mitos avivados"
 infernals.3055.desc: "Los miembros de la especie pre-UL de §Y[pre_ftl_planet.GetName]§! guardan cierto parecido a las criaturas mitológicas de algunas de nuestras leyendas más antiguas. Esto podría explicarse, en parte, con las tendencias generales de la evolución convergente y la psicología. Aunque cuanto más aprendemos de esta especie, más conexiones encontramos.\n\n¿Podrían tratarse de los mismos seres de nuestros mitos y leyendas? Se ha producido un creciente entusiasmo ante dicha posibilidad, así que podríamos invertir para seguir este camino de investigación. Sin embargo, a veces las coincidencias se acumulan sin razón aparente, y fisgonear demasiado podría revelar nuestra presencia ante esta sociedad, lo cual traería unas consecuencias indeseadas."
 infernals.3055.a: "Ignorad esta coincidencia."
 infernals.3055.b: "Seguid investigando."
 infernals.3060.name: "Una suposición absurda"
 infernals.3060.desc: "A pesar de haber hecho algunos llamamientos a la investigación, creemos que no sería prudente seguir esta hipótesis de los alienígenas mitológicos. Al fin y al cabo, es una especie con su propia mitología, leyendas y con una concepción propia de sí misma, las cuales podrían no encajar del todo con nuestras ideas preconcebidas. Se han pausado las investigaciones al respecto y los fondos se han destinado a otros asuntos."
 infernals.3060.a: "Familiar a la par que ajeno."
 infernals.3065.name: "Disturbios primitivos"
 infernals.3065.desc: "El afán por vincular a esta especie con nuestros mitos provocó que nuestros agentes descuidaran el protocolo de seguridad pre-UL para establecer contactos. Lugareños de todo el planeta registraron múltiples avistamientos de nuestras naves, robaron equipo y en una ocasión incluso secuestraron a uno de nuestros agentes para estudiarlo. El descubrimiento de nuestra existencia ha provocado malestar y respuestas polarizadas.\n\nA pesar del caos en las operaciones, la emoción por las vinculaciones mitológicas persiste entre nuestro pueblo. En el imperio se percibe a esta especie de una manera cada vez más espiritual."
 infernals.3065.a: "Tendríamos que haber tenido más cuidado."
 infernals.3070.name: "Descubrimiento sorprendente"
 infernals.3070.desc: "El estudio intensivo de los habitantes de §Y[pre_ftl_planet.GetName]§! ha enfriado la hipótesis mitológica. Aunque hemos hallado muchos paralelismos entre nuestras historias antiguas y estos seres, también hemos descubierto diferencias irreconciliables.\n\nA pesar del panorama más complicado que se presenta, nuestro entusiasmo por esta especie no ha disminuido. Se ha sugerido que podrían ser una población remanente de los seres originales de nuestras historias, y que las diferencias pueden haberse originado por el vasto lapso transcurrido desde entonces. Aunque estamos obligados a reconocerlos como una sociedad independiente, muchos en nuestro imperio sienten una fuerte conexión espiritual con ellos."
 infernals.3070.a: "Un momento enriquecedor para todos nosotros."
 # Molten Core Grand Archive specimen
 infernals.3200.name: "Núcleo fundido"
 infernals.3200.desc: "A medida que la colonia de §Y[planet.GetName]§! crecía, también lo hacían las evidencias de una civilización extinta que usaba $sr_living_metal$, aunque no había pista alguna que indicara de dónde obtenían dicho material.\n\nRecientemente, ha aflorado una respuesta en forma de extraña esfera brillante envuelta en un campo de fuerza que emergió de flujos de magma del núcleo profundo. Su propósito y construcción originales no resultan obvios de inmediato, pero produce un goteo constante de $sr_living_metal$ cuando se expone a temperaturas extremadamente altas. Si bien esto resuelve el enigma arqueológico, ahora nos toca decidir qué hacemos con ella."
 infernals.3200.a: "Conservad el artefacto."
 infernals.3200.a.accept: "Este extraño objeto no se parece a nada que hayamos producido. No solo es una buena fuente de $sr_living_metal$, sino que también sirve como curiosidad científica e histórica, por lo que merece la pena estudiarlo."
 infernals.3200.b: "Lanzad eso de nuevo a la lava."
 infernals.3200.b.deny: "Una civilización que fracasó en su adaptación y que se extinguió no merece admiración alguna. Hay que deshacerse de este artefacto y olvidarnos de él."
 infernal_molten_core: "Núcleo fundido"
 infernal_molten_core_desc_short: "Un orbe plateado de textura ondulada y fluida que se encuentra envuelto en un campo de fuerza que emite un leve silbido."
 infernal_molten_core_desc_details: "El campo de fuerza del núcleo solo se debilita cuando se expone a altas temperaturas, y eso provoca que se escape una gota de $r_living_metal$. Sus creadores originales ya no están, pero este núcleo sigue siendo un testimonio de su ciencia e ingenio."
 # CD Timeline events
 TIMELINE_EVENT_ORIGIN_CD_START: "Ecos profundos\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_START_TOOLTIP: "§HSiguiendo las pistas§!\n§YEvento de origen§!\n\nHemos detectado unas señales complejas y débiles procedentes de las profundidades de la superficie del planeta. Tienen su origen en una red de estructuras antiguas incrustadas en la corteza terrestre; construcciones que preceden a nuestros largos eones de estasis."
 TIMELINE_EVENT_ORIGIN_CD_END: "Historia revelada\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_END_TOOLTIP: "§HFinaliza la cadena de eventos§!\n§YEvento de origen§!\n\nHemos descubierto una enorme y antigua instalación en las profundidades del planeta, de la que hemos extraído un códice con información perdida y perteneciente a un tiempo lejano. Somos los herederos de un legado antiguo y poderoso, y estamos listos para reclamar lo que es nuestro."
