 approach_reassure_public_effect: "La información sobre esta crisis podría desestabilizar a la sociedad. Que no se sepa nada.$rg_default_progress$"
 approach_find_the_cause_effect: "La expansión de la estrella no se puede detener. Urge llevar a cabo de inmediato una investigación exhaustiva que determine la causa subyacente.$rg_default_progress$"
 approach_suppress_unrest2_effect: "Una resolución efectiva es imposible en medio del malestar social. Nuestra prioridad ahora no debe ser otra que restablecer el orden y la estabilidad.$rg_default_progress$"
 approach_disrupt_subspace_tunnels2_effect: "En aras de la integridad de nuestra estrella, debemos apremiarnos a tomar medidas inmediatas. Es imperioso alterar las galerías subespaciales.$rg_small_progress$"
 approach_add_fuel_to_the_fire3_effect: "Esta novedad nos brinda la ocasión de emprender operaciones de extracción concienzuda en los planetas de nuestro sistema natal, exacerbando así la adquisición de minerales.$rg_high_progress$"
 approach_wait_and_see3_effect: "Debemos dejar de tomar decisiones precipitadas. Debemos ser pacientes y observar.$rg_small_negative_progress$"
 approach_siphon_stellar_material3_effect: "Cabe la posibilidad de que la vuelta a la normalidad se acelere si extraemos material directamente de la estrella.$rg_medium_negative_progress$"
 approach_continue_siphoning4_effect: "Esta energía puede servirnos para incinerar nuestro sistema natal y, a posteriori, enriquecernos con sus restos.$rg_high_progress$"
 approach_stabilize_the_star4_effect: "Podemos estabilizar la estrella en su estado actual, y nuestras soluciones de adaptación seguirán en vigor.$rg_no_progress$"
 approach_cease_activity4_effect: "Tenemos la opción de desactivar la plataforma minera, y la estrella recobrará su templanza habitual.$rg_small_negative_progress$"
 approach_reverse_inflation4_effect: "Podemos hacer que la estrella merme hasta recuperar su tamaño anterior, y nuestro mundo natal volverá a ser habitable.$rg_high_negative_progress$"
 approach_at_any_cost_effect: "Debemos cortar de raíz la expansión para evitar un desastre, cueste lo que cueste.\nCrecimiento mensual: §G+0,5§!\n\n"
 INF_ORIGIN_RED_GIANT_TRIANGULATION: "Triangular la interferencia subespacial"
 INF_ORIGIN_RED_GIANT_TRIANGULATION_DESC: "Ubicación viable para triangular el origen de la interferencia."
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD: "Proteger el mundo natal"
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD_DESC: "A la vez que trabajamos a destajo para revertir los cambios de nuestra estrella, debemos aprestarnos para resistir al calor por medios propios. Adaptar nuestra población a temperaturas más altas nos ayudará a prosperar junto al nuevo y ardiente futuro de nuestra estrella."
 INF_ORIGIN_RED_GIANT_EXPLOIT: "Aprovechamiento térmico"
 INF_ORIGIN_RED_GIANT_EXPLOIT_DESC: "El aumento de la radiación solar entraña problemáticas muy graves a largo plazo. A corto plazo, en cambio, podemos aprovecharla para potenciar nuestra capacidad industrial y energética."
 INF_ORIGIN_RED_GIANT_BOARD_STATION: "Abordaje de la estación"
 INF_ORIGIN_RED_GIANT_BOARD_STATION_DESC: "Estos alienígenas imprudentes están explotando nuestra estrella. Debemos abordar su estación de inmediato y tomar el control."
 INF_ORIGIN_RED_GIANT_PARLAY: "Xenolingüística de emergencia"
 INF_ORIGIN_RED_GIANT_PARLAY_DESC: "Los moradores de la estación controlan el sifón subespacial que está acabando con nuestra estrella. Debemos establecer comunicaciones para asegurar su cooperación en la solución de este problema."
 INF_THERMOPHILE_ADAPTATION: "Evolución termofílica"
 INF_THERMOPHILE_ADAPTATION_DESC: "A la vez que nos disponemos a prender fuego a la galaxia, debemos aprestarnos para resistir al calor por medios propios. Con una población adaptada a temperaturas más altas, nos será más fácil perdurar en un nuevo futuro tórrido. \n\n§HAl completarse:§!$TABBED_NEW_LINE$- Añade el modificador §Y$crisis_thermophile_adaptation$§!$TABBED_NEW_LINE$- Aumenta la §Y$mod_pc_volcanic_habitability$§! en §G+50%§!"
