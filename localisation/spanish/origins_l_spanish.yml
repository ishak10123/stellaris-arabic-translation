 shroud_forged_research_assistance_capital_desc: "$shroud_forged_military_assistance_desc$"
 # Species Rights
 citizenship_shroud_touched: "Forjados por el Velo"
 citizenship_shroud_touched_tooltip: "Grupo de autómatas que han sido modificados de manera única por el §HVelo§!. Actúan de forma independiente de la §H$machine_intelligence$§! y son incapaces de hacer trabajos de £pop_cat_simple_drone£ $pop_cat_simple_drone$."
 citizenship_shroud_touched_tooltip_delayed: "§LAunque trabajan para el sistema, este no los controla.§!"
 citizenship_shroud_forged_no_assimilation: "$TRIGGER_FAIL$Debido a la complejidad de las unidades forjadas por el Velo, en estos momentos somos incapaces de asimilarlas en nuestra red colectiva."
 living_standard_protected: "Protegidos"
 living_standard_protected_tooltip: "Estas unidades están protegidas por el colectivo, aunque no formen parte de él. La §H$machine_intelligence$§! puede hacer un gran uso de sus habilidades únicas, pero es posible que sus necesidades adicionales aumenten con el tiempo."
 living_standard_protected_tooltip_delayed: "§LSon aceptadas por el sistema mientras sean valiosas.§!"
 assimilate_shroud_forged_tt: "No pueden asimilar £pop£ §H$citizenship_shroud_touched$§! §Y$POPS$§!"
 living_standard_protected_situation_stage_tt: "Mantenimiento de $citizenship_shroud_touched$: §R+$@living_standard_luxuries_high|1$§! £consumer_goods£ §Ybienes de consumo§!."
 # Traits
 leader_trait_guided: "Guiada"
 leader_trait_guided_desc: "Esta unidad recorre la galaxia guiada por las visiones y los mensajes que provienen del Velo. Necesita un suministro constante de zro para que las señales sean claras y comprensibles."
 leader_trait_shroud_prophet: "Profeta del Velo"
 leader_trait_shroud_prophet_desc: "Se dice que esta unidad tiene una conexión profunda con el Velo, así como con las entidades que existen en él."
 trait_shroud_forged: "Forjados por el Velo"
 trait_shroud_forged_desc: "§LUna entidad del Velo ha rediseñado a estas unidades.§!"
 trait_shroud_forged_tooltip: "§YNo pueden hacer trabajos de drones sirvientes§!"
 # Edicts
 edict_zro_observators: "Observación del Velo"
 edict_zro_observators_desc: "El zro es un material complicado de trabajar. Mantener un pequeño excedente puede ser beneficioso."
 edict_shroud_bonded: "Vinculados al Velo"
 edict_shroud_bonded_desc: "Ahora que el Velo ha posibilitado nuestras conexiones, estamos más cerca que nunca."
