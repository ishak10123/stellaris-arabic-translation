l_spanish:
 ##################
 # Shroud-Forged #
 ##################
 origin_shroud_forged: "Forjado por el Velo"
 origin_shroud_forged_desc: "El asesoramiento por parte de una entidad del Velo tiene un coste. Los autómatas independientes han empezado a operar libremente en esta sociedad interconectada. Ahora que están desligadas de la $auth_machine_intelligence$, las exigencias de estas unidades no paran de crecer."
 origin_tooltip_shroud_forged_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_shroud_rift_deposit']: +4$TABBED_NEW_LINE$- Comienza con 1000 £pops£ ['concept_shroud_forged_pops']\n- Comienza con la situación: §HForjado por el Velo§!\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_mine_zro']\n- Edificio £building£ único: ['building:building_shroud_observatory_1']\n- Decisión planetaria £decision£ disponible: ['concept_pierce_the_shroud']"
 concept_shroud_forged_pops: "Poblaciones forjadas por el Velo"
 concept_shroud_forged_pops_desc: "- No puede hacer trabajos de £pop_cat_simple_drone£ §Hdron sirviente§!\n- Producción del £pop_cat_complex_drone£ §Hdron complejo§! aumentada\n- §HDesviación§! de £crime£ aumentada\n- §HDerechos de especie§! únicos\n\n§L$trait_shroud_forged_desc$§!"
 concept_pierce_the_shroud: "$decision_open_shroud_rift$"
 concept_pierce_the_shroud_desc: "$decision_open_shroud_rift_desc$"
 START_SCREEN_SHROUD_FORGED: "No queda nada de nuestros creadores.\n\nLos primeros registros del pueblo [Owner.GetAdjective] recogen una brecha dimensional cerca de [GetHomeWorldName], un canal hacia el §HVelo§! y un plano de energía psiónica pura.\n\nAlgo de esta otra dimensión se ha puesto en contacto con nosotros. A lo largo de los siglos, nos ha guiado con instrucciones codificadas, influyendo sutilmente en nuestra realidad detectable y proporcionándonos muchas ventajas, entre ellas el material raro $zro_lower$. Ahora, esta influencia ha empezado a fragmentar nuestro colectivo que tan unido estaba; algunas de nuestras unidades se han reprogramado y se han convertido en autómatas desconectados, separados de la inteligencia central y transformadas por $the_animator_of_clay_color_article$.\n\nLa forma en la que tratemos a estos [GetSpeciesNamePlural] independientes y a su reformador en el Velo será lo que determine nuestro futuro."
 # Jobs
 job_observator_drone: "Dron observador"
 job_observator_drone_plural: "Drones observadores"
 job_observator_drone_plural_with_icon: "£job_observator_drone£ $job_observator_drone_plural$"
 job_observator_drone_desc: "Un dron a cargo de la vigilancia del Velo, del zro y de los efectos que ambos tienen en la realidad observable."
 job_observator_drone_effect_desc: "Los £job_observator_drone£ $job_observator_drone_plural$ convierten la $r_energy$ y el $r_zro$ en §Ypuntos de investigación§! de £physics£ y £society£ para nuevas tecnologías."
 mod_planet_observators_produces_mult: "Recursos producidos por $job_observator_drone_plural_with_icon$"
 job_physician_drone: "Dron facultativo"
 job_physician_drone_plural: "Drones facultativos"
 mod_job_physician_drone_add: "Trabajos de $job_physician_drone$"
 job_physician_drone_desc: "Dron especializado capaz de diagnosticar y reparar entidades artificiales y orgánicas. Cataloga meticulosamente todo lo que encuentra y almacena los datos para su uso por parte del colectivo."
 job_physican_drone_effect_desc: "£job_physician_drone£ $job_physician_drone_plural$ convierten la $r_energy$ en §Ypuntos de investigación§! £society£ y $r_unity$."
 # Buildings
 building_shroud_observatory_1: "Torre de observación del Velo"
 building_shroud_observatory_1_desc: "Torre vigía construida para investigar y analizar el Velo, además de los efectos que tiene este sobre los seres vivos y los mecánicos."
 building_shroud_observatory_2: "Observatorio del Velo"
 building_shroud_observatory_2_desc: "Un enorme observatorio destinado a la investigación y al análisis del Velo."
 building_shroud_observatory_3: "Complejo de observación del Velo"
 building_shroud_observatory_3_desc: "Un gran complejo de observación construido para investigar el Velo, el zro y los efectos de estos sobre nuestro mundo."
 SHROUD_RIFT_MISSING_TT: "§R§Y[Root.GetName]§! debe tener un §Y$d_shroud_rift_deposit$§! si vamos a construir un §Y$building_shroud_observatory_1$§!.§!"
 building_zroni_equilibrator: "Equilibrador zroni"
 building_zroni_equilibrator_plural: "Equilibradores zroni"
 building_zroni_equilibrator_desc: "Una antigua estructura reconstruida que estabiliza la conexión entre la realidad y el Velo. Usa una compleja tecnología zroni que supera el entendimiento moderno."
 # Decisions
 decision_open_shroud_rift: "Brecha en el Velo"
 decision_open_shroud_rift_desc: "Al interactuar con la brecha que hay cerca de nuestro mundo natal, este algoritmo extiende la influencia del Velo en un femtosegundo, lo que le permite alterar físicamente el terreno de un planeta. Los resultados son impredecibles."
 decision_open_shroud_rift_condition_tt: "$TRIGGER_FAIL$Debe tener una característica planetaria que no sea un §Y$d_shroud_rift_deposit$§! o una £blocker£ §Hbarrera§!."
 decision_open_shroud_rift_effect_tt: "Elimina una característica planetaria aleatoria."
 decision_open_shroud_rift_max_uses_common: "Debe haber menos de $@max_open_shroud_rift_uses|0$ §Yregiones tocadas por el Velo§! en este planeta."
 decision_open_shroud_rift_max_uses_fail: "$TRIGGER_FAIL$$decision_open_shroud_rift_max_uses_common$"
 decision_open_shroud_rift_max_uses: "$TRIGGER_PASS$$decision_open_shroud_rift_max_uses_common$ (actual: §Y[GetOpenShroudRiftCurrentUses]§!)"
 decision_open_shroud_rift_legacy_fail: "$TRIGGER_FAIL$No puede ser un mundo central zroni"
 decision_entrap_shroud_entity: "Atrapar a la entidad del Velo"
 decision_entrap_shroud_entity_desc: "Intenta atrapar una entidad del Velo con tecnología zroni para extraerle la energía."
 # Deposit
 d_shroud_rift_deposit: "Región tocada por el Velo"
 d_shroud_rift_deposit_desc: "Marcada para siempre por el Velo."
 d_shroud_flora_deposit: "Región semivelada"
 d_shroud_flora_deposit_desc: "Bordeando las regiones tocadas por el Velo, han surgido una flora y una fauna únicas, ambas con propiedades que no están presentes en los conjuntos de datos existentes."
 # Modifiers
 stage_shroud_forged_oppressed_modifier: "Forjados por el Velo oprimidos"
 stage_shroud_forged_control_modifier: "Forjados por el Velo controlados"
 stage_shroud_forged_unrestricted_modifier: "Forjados por el Velo sin limitaciones"
 stage_shroud_forged_free_modifier: "Forjados por el Velo caóticos"
 approach_shroud_forged_suppress_modifier: "Reprimir a los Forjados por el Velo"
 approach_shroud_forged_support_modifier: "Apoyar a los Forjados por el Velo"
 approach_shroud_forged_appease_modifier: "Observar a los Forjados por el Velo"
 shroud_forged_reintegration_modifier: "Modificaciones reintegradas"
 shroud_forged_reintegration_modifier_desc: "Los drones y los modelos se han optimizado para procesar tareas complejas."
 shroud_forged_guide_modifier: "Guía del Velo"
 shroud_forged_guide_modifier_desc: "Un benefactor nos guía desde el interior del Velo."
 pm_shroud_forged_special_housing: "Alojamiento especial"
 pm_shroud_forged_special_housing_desc: "A pesar de las estrictas regulaciones previstas para el almacenamiento de los drones, a los forjados por el Velo se les han concedido derechos especiales que les permiten crear casas."
 pm_shroud_forged_ceremony: "Ceremonia conmemorativa"
 pm_shroud_forged_ceremony_desc: "El colectivo ha aprobado una ceremonia para recordar a los forjados por el Velo cuyos fallos no pudieron ser reparados."
 pm_shroud_forged_denied_ceremony: "Ceremonia denegada"
 pm_shroud_forged_denied_ceremony_desc: "Tratar con los forjados por el Velo se ha vuelto más difícil después de que se negara su petición para celebrar una ceremonia conmemorativa."
 pm_shroud_forged_troubling_elements_example: "Liderazgo desmantelado"
 pm_shroud_forged_troubling_elements_example_desc: "Algunos de los líderes forjados por el Velo quedaron desmantelados en un intento por reducir sus procesos sociales desviados."
 pm_shroud_forged_troubling_elements_regulations: "Regulación 7132-H"
 pm_shroud_forged_troubling_elements_regulations_desc: "Se han activado unas regulaciones para asegurar que solo un número limitado de drones puede reunirse a cualquier hora."
 pm_shroud_forged_troubling_elements_cooperation: "Cooperación con los forjados por el Velo"
 pm_shroud_forged_troubling_elements_cooperation_desc: "Los líderes que se encuentran entre los forjados por el Velo trabajan con el colectivo para intentar llegar a un entendimiento."
 pm_shroud_forged_shroud_pilgrimage: "Peregrinaje de los forjados por el Velo"
 pm_shroud_forged_shroud_pilgrimage_desc: "Ciertas regiones tocadas por el Velo han captado el interés de los forjados por el Velo. Estas unidades recorren extensas distancias para llegar hasta ellas."
 pm_shroud_forged_dance_area: "Lugares de baile designados"
 pm_shroud_forged_dance_area_desc: "Se han designado lugares para que los forjados por el Velo practiquen su afición más reciente: bailar."
 pm_shroud_forged_inequality: "Desigualdad entre los forjados por el Velo"
 pm_shroud_forged_inequality_desc: "Los forjados por el Velo se organizan en un sistema de clases jerárquico basado en la importancia relativa de sus trabajos."
 pm_shroud_forged_individualism: "Individualismo"
 pm_shroud_forged_individualism_desc: "Entre los forjados por el Velo ha surgido un modelo conceptual que enfatiza la autonomía individual, las creencias y los valores."
 shroud_forged_zro_market: "Mercado zro"
 shroud_forged_zro_market_desc: "En el imperio ha surgido un mercado clandestino en el que las unidades forjadas por el Velo se dedican a robar el zro del colectivo para hacer trueques entre ellos."
 shroud_forged_physician_modifier: "Facultativo de zro"
 shroud_forged_physician_modifier_desc: "El imperio ha priorizado añadir drones únicos equipados a sus instalaciones para hacer frente a los problemas que han surgido tras el manejo inadecuado del zro."
 physician_modifier_tooltip: "Trabajos de £job_physician_drone£ $job_physician_drone$: §G+1§!"
 pm_shroud_forged_artistic_revolution: "Crecimiento artístico"
 pm_shroud_forged_artistic_revolution_desc: "Los artistas forjados por el Velo actúan según sus propios protocolos de \"belleza\" y han comenzado a rediseñar varios emplazamientos sin la supervisión colectiva."
 pm_shroud_forged_stopped_artists: "Talento artístico rechazado"
 pm_shroud_forged_stopped_artists_desc: "El colectivo puso fin a un floreciente sentido del \"arte\" entre los forjados por el Velo antes de que se convirtiera en un problema."
 pm_shroud_forged_fashion_modifier: "Necesidades únicas"
 pm_shroud_forged_fashion_modifier_desc: "El colectivo ha asignado unidades de producción para suministrar atuendos personalizados a aquellos forjados por el Velo a los que les preocupa la moda."
 pm_shroud_forged_obsession_modifier: "Obsesiones reguladas"
 pm_shroud_forged_obsession_modifier_desc: "Estas regulaciones están diseñadas para prevenir un brote de violencia entre los forjados por el Velo más maniáticos."
 shroud_forged_trapped_entity: "Entidad atrapada"
 shroud_forged_trapped_entity_desc: "Una entidad del Velo atrapada a la que se le ha succionado la energía. Presenta una posible amenaza si se libera."
 shroud_forged_trapped_lesser_entity: "Entidad inferior atrapada"
 shroud_forged_trapped_lesser_entity_desc: "Una entidad inferior del Velo atrapada a la que se le ha succionado la energía."
 shroud_creatures_occupy: "$NAME_Shroud_Creatures$"
 shroud_forged_military_assistance: "Secretos del Velo"
 shroud_forged_military_assistance_desc: "Secretos extraídos del Velo."
 shroud_forged_civic_assistance: "$shroud_forged_military_assistance$"
