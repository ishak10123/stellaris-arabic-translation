 # Situation
 situation_shroud_forged: "Forjado por el Velo"
 situation_shroud_forged_desc: "Tras nuestro encuentro con la entidad del §HVelo§!, conocida como $the_animator_of_clay_color_article$, se ha producido un aumento significativo de los comportamientos desviados en toda la red colectiva. Los autómatas afectados (los §Hforjados por el Velo§!) ahora reclaman derechos y tratos especiales. Nuestra respuesta definirá el curso de la sociedad [Owner.GetSpeciesAdj]."
 situation_shroud_forged_type: "$situation_shroud_forged$"
 situation_shroud_forged_monthly_change_tooltip: "§LLa anómala presencia de los forjados por el Velo es preocupante. La manera en la que procesemos su existencia continuada tendrá importantes consecuencias para la estabilidad de la red.§!"
 stage_shroud_forged_oppressed: "Oprimidos"
 stage_shroud_forged_oppressed_desc: "Acosados por la continua mirada de los drones cazadores-buscadores, los forjados por el Velo están obligados a obrar dentro de los parámetros definidos por el colectivo central."
 stage_shroud_forged_oppressed_tooltip: "Conversión dron: §Yninguna§!"
 stage_shroud_forged_control: "Controlado"
 stage_shroud_forged_control_desc: "El sistema tiene normas especiales para los forjados por el Velo."
 stage_shroud_forged_control_tooltip: "Conversión dron: §Ymínima§!"
 stage_shroud_forged_balanced: "Equilibrado"
 stage_shroud_forged_balanced_desc: "El sistema y los forjados por el Velo viven en un equilibrio precario. Por ahora."
 stage_shroud_forged_balanced_tooltip: "Conversión dron: §Ybaja§!"
 stage_shroud_forged_unrestricted: "Sin restricciones"
 stage_shroud_forged_unrestricted_desc: "Los forjados por el Velo existen libremente, sin restricciones por parte de los protocolos del colectivo."
 stage_shroud_forged_unrestricted_tooltip: "Conversión dron: §Ymedia§!"
 stage_shroud_forged_free: "Liberado"
 stage_shroud_forged_free_desc: "El colectivo perdió hace tiempo el control sobre los forjados por el Velo, quienes se oponen a una autoridad central en cualquier oportunidad."
 stage_shroud_forged_free_tooltip: "Conversión dron: §Yalta§!\nEnfoque bloqueado: §Y$approach_shroud_forged_appease$§!"
 approach_shroud_forged_suppress: "Reprimir"
 approach_shroud_forged_suppress_desc: "El colectivo oprime a los forjados por el Velo y los obliga a someterse a los drones cazadores-buscadores."
 progress_shroud_forged_suppress: "Oprimiendo a los forjados por el Velo"
 approach_shroud_forged_suppress_tooltip: "Progreso mensual: §Y$@situation_suppress_progress|0$§!"
 approach_shroud_forged_support: "Apoyo"
 approach_shroud_forged_support_desc: "A los forjados por el Velo se les permite una existencia libre, sin restricciones por parte del colectivo, y se les apoya en sus tareas diarias."
 progress_shroud_forged_support: "Apoyando a los forjados por el Velo"
