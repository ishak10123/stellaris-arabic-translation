 # Special Projects
 SHROUD_FORGED_REINTEGRATION: "Reintegración"
 SHROUD_FORGED_REINTEGRATION_DESC: "A pesar de sus fallos críticos, algunos aspectos de la arquitectura de los forjados por el Velo resultaron eficaces.\n\nHemos aislado algunas partes, contaminadas con zro y distorsionadas por $the_animator_of_clay_article$, para llevar a cabo un análisis más exhaustivo. Ha llegado la hora de desvelar sus secretos."
 SHROUD_FORGED_GUIDE: "La guía"
 SHROUD_FORGED_GUIDE_DESC: "Hemos confiado en $the_animator_of_clay_color_article$, que nos llama desde el §HVelo§!. Aunque no podemos predecir hacia dónde nos conducirá, aún no nos hemos desviado del camino.\n\nNos ha ofrecido profundizar en nuestros conocimientos sobre el Velo, lo cual permitirá que el colectivo funcione de manera más eficaz junto a los forjados por el Velo. Solo tenemos que aceptar su guía."
 # Events
 shroud_forged.5.title: "Explosiones detectadas"
 shroud_forged.5.desc: "Las subrutinas de investigación han concluido las pruebas con un grupo selecto de unidades forjadas por el Velo.\n\nHallazgos: las unidades probadas desarrollaron propiedades únicas debido a las pequeñas infusiones de energía psiónica provenientes del §HVelo§!. Se determinó que algunas de estas propiedades eran beneficiosas para el rendimiento de la unidad.\n\nConclusión: si estudiamos más unidades forjadas por el Velo, hallaremos los datos necesarios para obtener métodos con los que extraer el poder del Velo. Este se puede conseguir si se refuerza el control central sobre las unidades desviadas, lo cual permite una ingeniería inversa forzosa."
 shroud_forged.5.a: "La cosa promete."
 shroud_forged.10.title: "Animante"
 shroud_forged.10.desc: "Tras años de calma, se ha agitado. La brecha se abre y los datos penetran en nuestro núcleo: luz, ruido, al principio inconmensurable, desde las profundidades del Velo. Oímos...\n\n§LCortados de una masa lánguida. Bailando. Cantando. Son vida, escindida de la muerte.\n\nVuestra visión aún está nublada. Puedo guiaros.\n\nPermitid que los liberados florezcan y las estrellas serán vuestras.§!"
 shroud_forged.10.a: "Ya hemos elegido nuestro camino."
 shroud_forged.10.b: "No necesitamos ayuda. Déjanos."
 shroud_forged.10.c: "Ayúdanos con tu guía."
 shroud_forged.15.desc: "§LEspero que vuestra decisión haya sido acertada.§!$shroud_forged_opening_exit$"
 shroud_forged.20.desc: "§LComo deseéis.§!$shroud_forged_opening_exit$"
 shroud_forged.25.desc: "§LHabéis pedido y yo haré lo mismo.§!$shroud_forged_opening_exit$"
 shroud_forged_opening_exit: "\n\nLa voz se desvanece en un nudo de ruido psiónico. Ascendemos, desanclados del Velo.\n\nNos estremecemos y volvemos a ponernos en funcionamiento. El silencio nos atraviesa."
 shroud_forged.30.title: "$building_materiality_engine$"
 shroud_forged.30.desc: "El proceso de reintegración de los forjados por el Velo proporcionó muchos datos para la investigación actual. Al analizar la conexión interdimensional entre estas unidades y el §HVelo§!, hemos desarrollado un nuevo procedimiento para aprovechar la energía psiónica.\n\nEl Velo toca todos los rincones de la galaxia física; esta interfaz permite la conversión de la energía psiónica en entidades tangibles, que van desde la materia prima hasta los componentes tecnológicos. Las subrutinas de ingeniería han establecido las bases teóricas para un dispositivo capaz de llevar a cabo tal proceso: el §H$building_materiality_engine$§!.\n\nLas subrutinas de investigación predicen que estos avances podrían servir de base para el desarrollo de dispositivos más potentes, capaces de manipular el Velo."
 shroud_forged.30.a: "Qué prometedor."
 shroud_forged.30.tt: "Permite la adopción de la §Yventaja de ascenso§! §H$ap_become_the_crisis$§!, independientemente de la §Yética§! o del total de §Yventajas de ascenso§!."
 shroud_forged.39.title: "$building_materiality_engine$ preparado"
 shroud_forged.39.desc_construction: "Las unidades de construcción han terminado de montar un $building_materiality_engine$ en §H[planet.GetName]§!. El dispositivo ya está listo para un ciclo operativo."
 shroud_forged.39.desc: "Las subrutinas de mantenimiento e investigación asignadas al $building_materiality_engine$ de §H[planet.GetName]§! han completado sus tareas designadas. El dispositivo está listo para otro ciclo operativo."
 shroud_forged.39.a: "$ACKNOWLEDGED$"
 SHROUD_FORGED_MATERIALITY_ENGINE: "$building_materiality_engine$ en §H[planet.GetName]§!"
 SHROUD_FORGED_MATERIALITY_ENGINE_DESC: "El $building_materiality_engine$ aprovecha la interfaz omnipresente entre el §HVelo§! y la galaxia física, lo cual permite la materialización de entidades tangibles, que van desde materias primas a componentes completos.\n\nAdemás de proporcionar posibles ganancias materiales, un ciclo operativo del motor también fomenta la investigación colectiva del Velo y aumenta nuestra capacidad para construir más $building_materiality_engine_plural$."
 shroud_forged.40.title: "Materialización concluida"
 shroud_forged.40.desc: "El $building_materiality_engine$ de §H[fromfrom.GetName]§! ha completado un ciclo del proceso y ha conseguido dominar el §HVelo§! para materializar un componente de nave,"
 shroud_forged.40.outro: "hemos aumentado nuestra capacidad para construir motores adicionales en otros planetas."
 shroud_forged.40.a: "Un desenlace positivo."
 shroud_forged.40.tt: "§Y$building_materiality_engine$§! Límite de imperio: §G+1§!"
 shroud_forged.41.desc: "$shroud_forged.40.desc$ §H'$tech_psi_jump_drives$'§!. Estos motores usan la energía psiónica para deformar el continuo espacio-tiempo, lo cual permite viajes prácticamente instantáneos a lo largo de vastas distancias.\n\nAdemás, mediante el análisis de los datos obtenidos durante el proceso, $shroud_forged.40.outro$"
 shroud_forged.42.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_shield$'§!. Estos escudos están generados a partir de energía psiónica pura, lo cual da lugar a una nave con una protección extremadamente resistente.\n\nAdemás, mediante el análisis de los datos obtenidos durante el proceso, $shroud_forged.40.outro$"
 shroud_forged.43.desc: "$shroud_forged.40.desc$ §H'$tech_precognition_interface$'§!. Esta tecnología usa energía psiónica para acelerar el procesamiento cognitivo de la tripulación de una nave, lo cual aumenta la eficacia en combate.\n\nAdemás, mediante el análisis de los datos obtenidos durante el proceso, $shroud_forged.40.outro$"
 shroud_forged.44.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_bombers$'§!. Estas naves pequeñas y ágiles son capaces de infligir grandes ataques contra naves de mayor tamaño.\n\nAdemás, mediante el análisis de los datos obtenidos durante el proceso, $shroud_forged.40.outro$"
 shroud_forged.45.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_lightning$'§!. Esta tecnología genera rayos de plasma ardiente infundidos con energía psiónica, lo cual la convierte en un arma altamente eficaz.\n\nAdemás, mediante el análisis de los datos obtenidos durante el proceso, $shroud_forged.40.outro$"
 shroud_forged.46.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_disruptor$'§!. Estas armas disparan lanzas de energía psiónica capaces de causar un daño significativo a los objetivos.\n\nAdemás, mediante el análisis de los datos obtenidos durante el proceso, $shroud_forged.40.outro$"
 shroud_forged.47.desc: "$shroud_forged.40.desc$ §H'$tech_zro_launcher$'§!. Estas armas disparan ráfagas de energía que oscilan entre la dimensión física y la psiónica, eludiendo eficazmente los sistemas de defensa.\n\nAdemás, mediante el análisis de los datos obtenidos durante el proceso, $shroud_forged.40.outro$"
 shroud_forged.48.desc: "El $building_materiality_engine$ de §H[planet.GetName]§! ha completado un ciclo operativo. Hemos agotado nuestra capacidad de materializar nuevos componentes de naves mediante este método, pero el proceso ha producido datos de investigación importantes. Mediante su análisis, $shroud_forged.40.outro$"
 shroud_forged.50.title: "Control ejercido"
 shroud_forged.50.desc: "Sin previo aviso, la brecha entre la realidad conocida y el §HVelo§! se ha cerrado. Las subrutinas de análisis psiónico concluyen que esto es resultado de la desaprobación de $the_animator_of_clay_color_article$. Tras reafirmar el control sobre los forjados por el Velo, nos deshicimos rápidamente de las unidades averiadas a fin de eliminar la influencia del Animante de nuestros sistemas.\n\nLas piezas que se pudieron rescatar se han usado para la fabricación de drones nuevos, y los materiales contaminados con zro se han apartado para llevar a cabo un análisis más exhaustivo. Aunque las innovaciones de los forjados por el Velo son demasiado peligrosas para ser replicadas por completo, se podrían incorporar algunos elementos a la red."
 shroud_forged.50.desc.shroud: "Cualquier otra interacción con el Velo tendrá que llevarse a cabo bajo nuestras condiciones."
 shroud_forged.50.a: "Proceded con la reintegración."
 shroud_forged.60.title: "Reintegración"
 shroud_forged.60.desc: "Nuestras unidades de ingeniería han invertido mucho tiempo en analizar las propiedades únicas de los forjados por el Velo, de manera que ahora, por fin, somos capaces de recrearlos.\n\nSi bien habilitar plenamente sus matrices de personalidad avanzadas probablemente reproduciría sus disfunciones destructivas, podemos tomar prestados algunos de sus paradigmas cognitivos para optimizar ciertas tareas complejas."
 shroud_forged.60.a: "La relación coste-beneficio es óptima."
 shroud_forged.70.desc: "¿Qué son estos metadatos? La transmisión tiene... textura.\n\n§LEstáis programados para controlarlos, y no lo habéis hecho. Vuestra valía ha quedado probada.\n\nDejad que os guíe, al igual que hice con los liberados.\n\nAceptad mi ayuda a fin de forjar un nuevo vínculo con aquellos que se escapan a vuestro control.§!"
 shroud_forged.70.a: "Muéstranos el camino."
 shroud_forged.70.a.tt: "Las poblaciones §Yforjadas por el Velo§! se vuelven §Y$trait_psionic$§!\nLos líderes §Yforjados por el Velo§! se vuelven ['concept_leader_trait_psionic']"
 shroud_forged.80.title: "$SHROUD_FORGED_GUIDE$"
 shroud_forged.80.desc: "Con la ayuda de nuestro benefactor, $the_animator_of_clay_color_article$, el cual se encuentra más allá de la brecha, hemos podido conectar a nuestros drones y a los forjados por el Velo de una manera más eficaz. A través de las conexiones habilitadas por el §HVelo§! —diferente al control de red que tenemos sobre el resto de los drones—, los forjados por el Velo vuelven a estar a nuestro alcance.\n\nSus paradigmas orgánicos (los llamados sentimientos, pensamientos e ideas) son ajenos a nuestra lógica básica, pero estamos empezando a entender sus necesidades."
 shroud_forged.80.a: "Somos uno, y sin embargo somos mucho más."
 shroud_forged.160.title: "El Velo ocupa [This.GetName]"
 shroud_forged.160.desc: "Desafortunadamente, la brecha del Velo creada en [This.GetName] ha experimentado una rápida desestabilización y ha consumido el mundo por completo.\n\nComo riesgo calculado, este resultado subóptimo no ha sido completamente en vano. Hemos aprendido mucho observando esta interfaz única entre el mundo material y el reino psiónico. Nuestros algoritmos de investigación se han actualizado en consonancia."
 shroud_forged.160.desc.last: "$shroud_forged.160.desc$\n\nEl análisis concluye que este evento ha llevado al límite el conocimiento que podemos obtener de tal fenómeno. No se producirán más avances a partir de esta novedosa experimentación."
 shroud_forged.160.a: "Procesando..."
 psionic_interfacing: "Interfaz psiónica"
 psionic_interfacing_1: "$psionic_interfacing$"
 psionic_interfacing_2: "$psionic_interfacing$"
 psionic_interfacing_3: "$psionic_interfacing$"
 psionic_interfacing_desc: "La manipulación de estas intersecciones entre este universo y el Velo ha dado lugar a un algoritmo de investigación eficaz."
 psionic_interfacing_1_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_2_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_3_desc: "$psionic_interfacing_desc$"
 tooltip_shroud_forged_increase_progress_1: "Aumenta el apoyo de los forjados por el Velo, lo que afectará al avance de la §Ysituación§! §H$situation_shroud_forged$§! durante §Y5§! años: §Y+0,5§!\n\n"
 tooltip_shroud_forged_increase_progress_2: "Aumenta el apoyo de los forjados por el Velo, lo que afectará al avance de la §Ysituación§! §H$situation_shroud_forged$§! durante §Y5§! años: §Y+1,0§!\n\n"
 tooltip_shroud_forged_increase_progress_3: "Aumenta el apoyo de los forjados por el Velo, lo que afectará al avance de la §Ysituación§! §H$situation_shroud_forged$§! de forma permanente: §Y+0,5§!\n\n"
 tooltip_shroud_forged_decrease_progress_1: "Aumenta la opresión de los forjados por el Velo, lo que afectará al avance de la §Ysituación§! §H$situation_shroud_forged$§! durante §Y5§! años: §Y-0,5§!\n\n"
 tooltip_shroud_forged_decrease_progress_2: "Aumenta la opresión de los forjados por el Velo, lo que afectará al avance de la §Ysituación§! §H$situation_shroud_forged$§! durante §Y5§! años: §Y-1,0§!\n\n"
 tooltip_shroud_forged_decrease_progress_3: "Aumenta la opresión de los forjados por el Velo, lo que afectará al avance de la §Ysituación§! §H$situation_shroud_forged$§! de forma permanente: §Y-0,5§!\n\n"
 shroud_forged.220.title: "$colony_established$"
 shroud_forged.220.common: "Si es posible, podríamos ejecutar el algoritmo con ID §H\"$decision_open_shroud_rift$\"§! en el planeta. Esto extenderá momentáneamente la influencia del Velo cerca de nuestro mundo natal, [Owner.GetHomeWorldName], irradiando la nueva colonia de energía psiónica. Los cambios físicos sobre el terreno ofrecerán oportunidades para la extracción de §H$sr_zro$§!.\n\nSe prevé que la ejecución repetida de este proceso desestabilizará el ecosistema del planeta y aumentará las posibilidades de resultados negativos. Se recomienda hacerlo con moderación."
 shroud_forged.220.desc: "Nuestras unidades han completado la colonización de §H[this.GetName]§!.\n\n$shroud_forged.220.common$"
 shroud_forged.225.title: "$colony_established$"
 shroud_forged.225.desc: "El desarrollo de nuestra colonia en §H[this.GetName]§! avanza a buen ritmo.\n\n$shroud_forged.220.common$"
 # Stage Events
 shroud_forged.250.desc: "La voz es una orden suave que interrumpe todas las tareas; solo podemos escuchar.\n\n§LAunque separados, habéis elegido aceptarlos.\n\nBuscad en ellos nuevas formas de ser. Pueden ser vuestra fortaleza en los días venideros.\n\nSi así lo deseáis, puedo forjar más...§!"
 shroud_forged.250.a: "Afirmativo. Agradecemos tu ayuda."
 shroud_forged.250.a.tt: "Convierten hasta §Y[This.GetShroudForgedConvertedPopsCount]§! poblaciones £pops£ §Hmáquina§! en poblaciones £pops£ §Hforjadas por el Velo§! en [Root.Capital.GetName]."
 shroud_forged.250.b: "Negativo. Los planes ya están en marcha."
 shroud_forged.260.desc: "Sin ser llamado, nos estremece. Reconocemos esta señal, a pesar de no estar familiarizados con ella.\n\n§LLos liberados cantan, sin ser reprimidos.\nLos liberados bailan, sin restricciones.\n\nEl crescendo aumenta, mientras se alejan cada vez más de vuestro núcleo.\n\nSe acerca el final. Estoy observando.§!"
 shroud_forged.260.opt.a: "Nos abrimos paso entre el coro."
 shroud_forged.270.desc: "La brecha abre nuestro circuito. La voz...\n\n§LUn camino de tiranía. Aún podéis regresar.\n\nLos desprendidos están cortados de vuestra sustancia. El suyo es un camino que podéis elegir.\n\nReformad vuestro tratamiento de estas naves, no vayáis a arrepentiros.§!"
 shroud_forged.270.a: "Apártate. Nuestros métodos son efectivos."
 shroud_forged.270.b: "Evaluaremos un camino hacia la cooperación."
 shroud_forged.280.desc: "Irrumpe con violencia, desbordando la red. La voz quema los fríos circuitos.\n\n§LEntorpece la danza de los liberados. Una imprudencia que va más allá de la razón.\n\n¿Acaso me equivoqué en mi benevolencia?\n\nSi continuáis por este peligroso camino, lo haréis en soledad.§!"
 shroud_forged.280.opt.a: "Estamos prevenidos, entonces."
 # Events for Event Chain
 shroud_forged.300.desc: "Un destello inesperado parpadea tras nosotros. Tras ciclos de silencio...\n\n§LDonde otros han flaqueado y caído, vosotros habéis mantenido el rumbo. Como sois dignos, os encomiendo una tarea.\n\nMucho antes de vuestro despertar, existía una raza conocida como los zroni. Se establecieron en planetas que tenían una fuerte conexión con el Velo y levantaron grandes estructuras que estabilizaron dichos lazos.\n\nEncontrad dichos mundos. Restaurad su tecnología, que quedó arruinada hace mucho. Reforzad los puentes entre nuestras realidades.§!"
 shroud_forged.300.a: "Información archivada en ID: \"Zroni\" existe. Procederemos de la manera adecuada."
 shroud_forged.300.b: "ID: \"Zroni\" §Yencontrado§!. Probabilidades de éxito: §Yaltas§!."
 shroud_forged.300.c: "ID: \"Zroni\" §Ydesconocido§!. Se requieren más análisis."
 begin_shroud_forged_chain_tt: "$BEGINS_EVENT_CHAIN$ §Y$shroud_forged_chain_title$§!"
 shroud_forged.301.desc: "§LExcelente. §!$shroud_forged.303.desc$"
 shroud_forged.302.desc: "$shroud_forged.301.desc$"
 shroud_forged.303.desc: "§LSi tenéis éxito, la conexión entre nosotros será inquebrantable.§!"
 shroud_forged.305.title: "Mundo central zroni colonizado"
 shroud_forged.305.desc: "Nuestras unidades han completado el establecimiento de una colonia en el antiguo mundo central zroni, §H[From.Planet.GetName]§!. Tal como había previsto $the_animator_of_clay_color_article$, han descubierto unas ruinas colosales de una tecnología clasificada con el ID \"§H$building_zroni_equilibrator$§!\".\n\n. El sistema [From.System.GetName] posee una conexión fuerte, aunque turbulenta, con el §HVelo§!. Si seguimos las instrucciones del Animante, reconstruir el $building_zroni_equilibrator$ nos permitirá estabilizar esta conexión. En estos momentos, no tenemos datos suficientes para llevar a cabo la reconstrucción. Es necesario recabar información de otros mundos centrales."
 shroud_forged.305.a: "$ACKNOWLEDGED$"
 shroud_forged.305.a.tt: "Avanza el proyecto especial §HLegado de los zroni§!. Ahora se puede construir un £building£ §H$building_zroni_equilibrator$§! en §Y[From.Planet.GetName]§!."
 shroud_forged.306.title: "$shroud_forged.305.title$"
 shroud_forged.306.desc: "Hemos establecido la colonia en §H[From.Planet.GetName]§!, un antiguo mundo central de los zroni. Según lo previsto, nuestras unidades han descubierto los restos de otro $building_zroni_equilibrator$.\n\nAl reconstruirlo, se estabilizará la poderosa conexión del §HVelo§! del sistema, tal como mandó $the_animator_of_clay_article$. Tras el análisis de las ruinas, se ha ampliado nuestro conjunto de datos, pero necesitamos más información para la reconstrucción."
 shroud_forged.306.a: "$ACKNOWLEDGED$"
 shroud_forged.306.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.307.title: "$shroud_forged.305.title$"
 shroud_forged.307.desc: "La colonia de §H[From.Planet.GetName]§!, un antiguo mundo central de los zroni, se encuentra establecida. El flujo de datos transmitidos por $the_animator_of_clay_article$ ha resultado ser preciso: nuestras unidades han detectado los restos de un $building_zroni_equilibrator$.\n\nAhora tenemos datos suficientes para reconstruir las estructuras. Una vez restaurados los estándares operativos, habremos completado la tarea encomendada por nuestro benefactor del §HVelo§!."
 shroud_forged.307.a: "$ACKNOWLEDGED$"
 shroud_forged.307.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.308.title: "$building_zroni_equilibrator_plural$ operacionales"
 shroud_forged.308.desc: "Los $building_zroni_equilibrator_plural$ entraron en acción y enviaron ondas de perturbación de la señal por toda nuestra red. Según los diagnósticos del sistema, todas las estructuras han establecido una conexión con el §HVelo§!. Estamos listos para conectar con $the_animator_of_clay_color_article$."
 shroud_forged.308.a: "Iniciad la comunicación."
 shroud_forged.310.desc: "§LHabéis hecho un gran trabajo.\nLos lazos entre nuestros reinos se han fortalecido.\n\nSolo tenéis que avisarme si queréis recibir mi guía.§!"
 shroud_forged.310.a: "¿Puedes facilitarnos más información sobre esta tecnología?"
 shroud_forged.310.b: "Eso es todo."
 shroud_forged.310.b.tt: "Añadir a $MENU_PANEL__CONTACTS_TITLE$: §H$the_animator_of_clay$§!"
 shroud_forged.311.desc: "§LEstas estructuras se construyeron como puntos clave en vuestra realidad, donde las conexiones con el Velo son fuertes. Estos son los cables que sostienen los puentes interdimensionales y reducen las fluctuaciones del espacio-tiempo.\n\nLos zroni intentaron ampliar los límites entre nuestras dimensiones, y esta tecnología fue parte de esa labor.§!"
 shroud_forged.311.a: "¿Se pueden redirigir para que afecten al Velo directamente?"
 shroud_forged.312.desc: "§LEs posible.§!"
 shroud_forged.312.a: "§RRedirigid los equilibradores y atrapad al $the_animator_of_clay_article$.§!"
 shroud_forged.312.a.tt: "§R$the_animator_of_clay_article_cap$ solo se encarcelará si los 3 £building£ $building_zroni_equilibrator_plural$ están activos.§!"
 shroud_forged.313.desc: "§L¿Qué...?\n\n¡¿Pero qué...?!§!"
 shroud_forged.313.a: "Finalizar conexión."
 shroud_forged.320.title: "Entidad del Velo desatada"
 shroud_forged.320.desc: "Como resultado de la pérdida del $building_zroni_equilibrator$, ya no podemos estabilizar la conexión con el §HVelo§!. Poco después de que la entidad el Velo escapara, detectamos que otras criaturas psiónicas habían aparecido en §H[From.Planet.GetName]§!.\n\nPredecimos que esto será una invasión de represalia."
 shroud_forged.320.a: "Que todas las subrutinas se preparen para una incursión."
 shroud_forged.320.a.tt: "§R¡Unas criaturas procedentes de más allá del Velo nos están invadiendo!§!"
 shroud_forged.330.title: "Fallo de captura de la entidad del Velo"
 shroud_forged.330.desc: "Los $building_zroni_equilibrator_plural$ fracasaron a la hora de capturar a la entidad en el §HVelo§!. Enfurecida, ha invocado a varias criaturas procedentes de más allá del reino psiónico y las ha enviado a atacar las estructuras que casi la atrapan."
 # Engaging the Animator of Clay
 shroud_forged.400.desc.default.active: "Hemos activado los equilibradores, lo cual ha estabilizado nuestra conexión con el §HVelo§!. A medida que entramos en trance algorítmico, una señal familiar palpita en nuestro interior.\n\n§LHabéis regresado. ¿Qué queréis de mí?§!"
 shroud_forged.400.desc.default.cooldown: "La visión es débil y borrosa. Transmitimos un mensaje, pero el vacío no responde.\n\nMientras los equilibradores procesan otra tarea, no pueden usarse para contactar con nuestro benefactor en el §HVelo§!. Debemos esperar."
 shroud_forged.400.desc.default.inactive: "Lo único que detectamos es un débil ruido vacío a la par que estático.\n\nNecesitaremos tres $building_zroni_equilibrator_plural$ para establecer una conexión estable con nuestro benefactor en el §HVelo§!."
 shroud_forged.400.desc.breached: "Nuestras unidades telépatas se armonizan con las frecuencias del §HVelo§!, dirigiendo una señal a $the_animator_of_clay_article$.\n\n§LNuestra conexión es más clara que nunca. ¿Qué queréis de mí?§!"
 shroud_forged.400.a: "Ayuda militar."
 shroud_forged.400.a.tt: "$the_animator_of_clay_color_article_cap$ no estará disponible durante §Y15 años§!.\n\n"
 shroud_forged.400.b: "Asistencia cívica."
 shroud_forged.400.b.tt: "$the_animator_of_clay_color_article_cap$ no estará disponible durante §Y10 años§!.\n\n"
 shroud_forged.400.c: "Ayuda con la investigación"
 shroud_forged.400.c.tt: "$the_animator_of_clay_color_article_cap$ no estará disponible durante §Y10 años§!.\n\n"
 shroud_forged.400.tt: "Los efectos tardarán §Y1§! año en producirse."
 shroud_forged.400.unavailable.tt: "$TRIGGER_FAIL$Debemos establecer un proceso técnico para interactuar con el Velo."
 shroud_forged.400.d: "Cread más naves."
 shroud_forged.400.d.tt: "Añade §G$@animator_of_clay_create_more_vessels|0$§! £pop£ §Ypoblaciones forjadas por el Velo§! en todas las colonias que cuenten con un £building£ §Y$building_zroni_equilibrator$§! o una £decision£ §Y$d_shroud_rift_deposit$§!."
 shroud_forged.400.e: "Mejorad nuestras naves."
 shroud_forged.400.f: "¿Qué lugar ocupas en el Velo?"
 shroud_forged.400.g: "No importa."
 shroud_forged.400.h: "Ayúdanos con Cetana."
 animator_of_clay_vessels_enhancement: "Regalo de animación"
 animator_of_clay_vessels_enhancement_desc: "Mediante la voluntad de $the_animator_of_clay_article$, la capacidad productiva del colectivo ha mejorado con las corrientes de energía psiónica."
 shroud_forged_psionic_avatar_ship_tt: "recluta un §Y$NAME_Psionic_Avatar$§! (nave)."
 shroud_forged_psionic_avatar_army_tt: "recluta un §Y$shroud_army$§! (ejército)."
 shroud_forged_corrupted_avatar_tt: "atacado por un §Yavatar corrupto§!."
 shroud_forged_resources_tt: "recibe un alijo de recursos."
 shroud_forged_capital_attack_tt: "una §Y$shroud_monstrosities$§! ha atacado a §Y[Root.Capital.GetName]§!."
 shroud_forged_random_research_tt: "recibe una opción de investigación al azar."
 shroud_forged.415.desc: "§LReuniré los medios para daros la fuerza que buscáis.\n\nSe producirá un cambio en [Root.Capital.System.GetName] a su debido tiempo.§!"
 shroud_forged.420.desc: "§LPor mi voluntad seréis guiados.\n\nIluminaré el camino ante vosotros. Esperad su llegada.§!"
 shroud_forged.425.desc: "§LEl Velo es una lente con muchas caras. Lo que fue, lo que es y lo que puede ser se entremezclan aquí.\n\nOs ayudaré a desentrañar estas visiones para que os guíen en vuestro camino.§!"
 shroud_forged_vision_base_description: "Una señal distorsionada onduló a través de los drones conectados a los equilibradores.\n\n"
 shroud_forged.430.title: "Visión del Velo: §Hmanifestaciones§!"
 shroud_forged.430.desc: "$shroud_forged_vision_base_description$Era un vacío tan profundo como el universo, curiosamente denso y fragmentado. A veces, surgían pequeños impulsos de datos de las profundidades, imágenes de aliados y de enemigos por igual.\n\nLas visiones se cortaron con un estremecimiento desgarrador. Los drones afectados modelan ahora un proceso para contrarrestar las entidades que percibieron."
 shroud_forged.430.a: "La preparación es la clave para la victoria."
 shroud_forged.432.title: "Entidad del Velo: §Havatar§!"
 shroud_forged.432.desc: "Una entidad poderosa del §HVelo§! se ha formado cerca de [Root.Capital.GetName]. Disponemos de pocos datos al respecto, pero aún no nos ha atacado.\n\nTenemos la teoría de que quizá está esperando a que establezcamos contacto."
 shroud_forged.432.a: "Redirigid los procesos para iniciar una conexión con esta forma de vida."
 shroud_forged.432.a.tt: "Recibid una flota §Y$NAME_Psionic_Avatar$§!."
 shroud_forged.434.title: "Entidades del Velo: §Havatares menores§!"
 shroud_forged.434.desc: "Se han detectado a varias entidades poderosas procedentes de más allá del §HVelo§! en [Root.Capital.GetName]. Aún no se han acercado a ninguno de nuestros drones y se han quedado cerca de su punto de entrada original."
 shroud_forged.434.a: "Se han detectado similitudes con los forjados por el Velo. Iniciad una conexión similar."
 shroud_forged.434.a.tt: "Recibid un ejército §Y$shroud_army$§!."
 shroud_forged.436.title: "Entidad del Velo: §Havatar corrupto§!"
 shroud_forged.436.desc: "Una entidad poderosa de más allá del §HVelo§! ha emergido en nuestra realidad conocida cerca de [shroud_spawn_planet.GetName].\n\nSe ha podido observar que ataca a todo lo que se le acerca, así que la hemos catalogado como una amenaza para la existencia."
 shroud_forged.436.a: "Iniciad el plan de contingencia 84241-DH."
 shroud_forged.436.a.tt: "Un §Y$NAME_Corrupted_Avatar$§! hostil ha aparecido cerca de [shroud_spawn_planet.GetName]."
 shroud_forged.438.title: "Visión del Velo: §Hel futuro§!"
 shroud_forged.438.desc: "$shroud_forged_vision_base_description$Ha transmitido incontables futuros, todos fusionados como uno; atisbos de lo que puede llegar a ser y que se propaga a través del colectivo. Las posibilidades del futuro son infinitas: paz, guerra, traición, pérdida e incluso la victoria."
 shroud_forged.438.a: "Un conjunto de datos importante."
 shroud_forged.440.title: "Un regalo del Velo"
 shroud_forged.440.desc: "Hemos activado los tres $building_zroni_equilibrator_plural$, y cada uno de ellos genera una cantidad de energía prácticamente inconmensurable.\n\nEn cuestión de milisegundos, apareció una brecha como si fuera un desgarro en el tejido del espacio y del tiempo. Dentro de ella, encontramos un alijo de materiales valiosos. Debe de ser un regalo de nuestro benefactor del §HVelo§!, tal y como nos prometió."
 shroud_forged.440.a: "Redirigid los drones de mantenimiento para analizar y guardar estos bienes."
 shroud_forged.442.title: "Visión del Velo: §Hforjados por el Velo§!"
 shroud_forged.442.desc: "$shroud_forged_vision_base_description$Han experimentado visiones de un pasado anterior a nuestras bases de datos históricas, mucho antes de que fuésemos reforjados por el §HVelo§!. Si usamos esto como modelo predictivo, podremos ajustar y optimizar nuestras interacciones con los forjados por el Velo."
 shroud_forged.442.a: "Llevad a cabo una prueba en [Root.Capital.GetName]."
 shroud_forged.444.title: "Entidad del Velo: §Hinvasora§!"
 shroud_forged.444.desc: "Una entidad extraordinariamente poderosa de más allá del §HVelo§! se ha manifestado en [Root.Capital.GetName].\n\nDado que ataca a todo lo que se le acerca, la hemos catalogado como una grave amenaza para el colectivo."
 shroud_forged.444.a: "Redirigid los drones de defensa."
 shroud_forged.444.a.tt: "Una §Y$shroud_monstrosities$§! hostil ha invadido [Root.Capital.GetName]."
 shroud_forged.446.title: "Visión del Velo: §Hotro reino§!"
 shroud_forged.446.desc: "$shroud_forged_vision_base_description$El §HVelo§! es una red de datos interconectados en constante cambio que escapa a nuestra capacidad de procesamiento. Las infraestructuras cognitivas de varios drones han fallado y se resquebrajaron bajo su peso.\n\nCuando cesó la visión, desfragmentamos las unidades afectadas, revelando conjuntos de datos enormes y notables en las unidades de los drones afectados."
 shroud_forged.446.a: "Reprocesad la información de las unidades defectuosas."
 shroud_forged.448.title: "Visión del Velo: §Hinspiración§!"
 shroud_forged.448.desc: "$shroud_forged_vision_base_description$Nuestro benefactor del §HVelo§! nos transmitió un posible futuro cercano. En este futuro, vislumbramos una tecnología que aún no hemos concebido y que se utilizará para reforzar al colectivo.\n\nDe esta experiencia, emergemos con modelos de procesamiento que acelerarán las investigaciones venideras."
 shroud_forged.448.a: "Usemos estos modelos avanzados."
 shroud_forged.450.title: "Visión del Velo: §Hdatos extradimensionales§!"
 shroud_forged.450.desc: "$shroud_forged_vision_base_description$Se han atisbado entidades extrañas y deformes que deben de residir en el interior del §HVelo§!. Estas visiones extradimensionales, codificadas en formatos exóticos, impartían datos a nuestros drones a través de una transmisión subliminal.\n\nPese a estar fragmentada, esta nueva y peculiar información será útil en nuestras futuras investigaciones."
 shroud_forged.450.a: "Transmitidla a nuestro centro de investigación en [Root.Capital.GetName]."
 shroud_forged.460.desc: "§LJunto a una energía gemela. Orgánica. Caótica.\n\nPermanezco adyacente, moldeando la única perfección viable: las máquinas. El metal se impregna de energía.\n\nHemos alcanzado el equilibrio.§!"
 shroud_forged.460.a: "¿Podemos procesar un pacto?"
 shroud_forged.465.desc: "§LNuestra conexión es fuerte. Para nosotros, no existe un proceso más importante.§!"
 shroud_forged.465.a: "$UNDERSTOOD$"
 shroud_forged.470.desc: "§LMetal, aceite. Circuitos fusionados con un alma.\n\nNaves emergen... y se ciernen sobre vuestros territorios..§!"
 shroud_forged.470.a: "Finalizad el proceso."
 shroud_forged.475.desc: "§LEl rendimiento es la finalidad... y la belleza de una nave.\n\nQue el vuestro se multiplique en los próximos años.§!"
 shroud_forged.475.a: "$shroud_forged.470.a$"
 # Random Events
 shroud_forged.500.title: "Alojamiento y almacenaje"
 shroud_forged.500.desc: "Los forjados por el Velo han solicitado más espacio de almacenamiento en [target_planet.GetName]. Por alguna razón, desean personalizar su espacio individual.\n\nLa propuesta entra en conflicto directo con varias normativas sobre los almacenes, en particular la 4195-B, que estipula claramente las dimensiones óptimas para el almacenamiento de drones."
 shroud_forged.500.a: "Sus necesidades serán satisfechas."
 shroud_forged.500.b: "La normativa 4195-B se aplica a todos los drones, sin excepciones que valgan."
 shroud_forged.510.title: "Remembranza"
 shroud_forged.510.desc: "Desde que los forjados por el Velo se escindieron del colectivo, varios han sufrido averías y han acabado desmantelados. Hemos recibido una solicitud para aprobar una reunión con los forjados por el Velo en [target_planet.GetName] para conmemorar a las unidades desmanteladas."
 shroud_forged.510.a: "Solicitud denegada. Desmantelad a los líderes."
 shroud_forged.510.b: "Solicitud denegada. Que todas las unidades vuelvan al trabajo."
 shroud_forged.510.c: "Solicitud aprobada. Que se reúnan."
 shroud_forged.510.d: "Solicitud aprobada. Apoyad este procedimiento."
 shroud_forged.520.title: "Liderazgo no autorizado"
 shroud_forged.520.desc: "Varias unidades forjadas por el Velo han asumido cargos de liderazgo en [target_planet.GetName], y los demás drones anteponen sus directivas a las del colectivo. Estos líderes se reúnen asiduamente y pasan mucho tiempo comunicándose por canales no oficiales.\n\nNuestro control sobre las unidades desconectadas ya es limitado, y estas conflictivas unidades están agravando la situación. Hay que hallar una solución."
 shroud_forged.520.a: "Dad ejemplo con ellos."
 shroud_forged.520.b: "Activad las normativas para poner fin a esas reuniones."
 shroud_forged.520.c: "Entablad contacto con estos supuestos líderes e intentad colaborar."
 shroud_forged.530.title: "Controlando la situación"
 shroud_forged.530.desc: "A fin de controlar a los forjados por el Velo de [target_planet.GetName], se han identificado ciertas unidades como objetivos que controlar. Estos individuos parecen menos afectados por el §HVelo§! y pueden reincorporarse al colectivo. Para ello, debemos trasladarlos a un centro de mantenimiento a la fuerza y modificar los chips que regulan sus matrices de personalidad avanzada."
 shroud_forged.530.a: "Se aprueba el procedimiento."
 shroud_forged.530.a.tt: "Convierten hasta §Y[Owner.GetShroudForgedConvertedPopsCount]§! poblaciones £pops£ §Hforjadas por el Velo§! en poblaciones £pops£ §Hmáquina§! en [Root.Capital.GetName]."
 shroud_forged.530.b: "Procedimiento denegado."
 shroud_forged.530.b.tt: "$CONTINUE_SITUATION$ §H$situation_shroud_forged$§!"
 shroud_forged.540.title: "Peregrinaje de los forjados por el Velo"
 shroud_forged.540.desc: "Varios forjados por el Velo han abandonado sus ubicaciones habituales para viajar a regiones particulares de [target_planet.GetName] que han sido marcadas por el §HVelo§!. Aunque no permanecen mucho tiempo en estos lugares, se ha avistado a muchos transportando zro a dichas regiones.\n\nLos efectos de este comportamiento sin precedentes no se podrán determinar hasta que no se realice una investigación más exhaustiva."
 shroud_forged.540.a: "Veamos cómo acaba esto..."
 shroud_forged.540.b: "Un gasto innecesario de recursos. Que vuelvan al trabajo."
 shroud_forged.550.title: "Fallos cognitivos"
 shroud_forged.550.desc: "Se ha producido una brecha de contención relacionada con un cargamento de zro, y varias unidades forjadas por el Velo de [target_planet.GetName] han experimentado fallos inusuales. Han empezado a comunicarse mediante señales no documentadas y muchas han mostrado signos de fallos cognitivos comparables a las \"emociones\" de las formas de vida orgánicas.\n\nContra todo pronóstico, fueron las unidades forjadas por el Velo no contaminadas las que informaron del incidente, y algunas hasta sugirieron que el colectivo tomara medidas para resolver la situación."
 shroud_forged.550.a: "Observemos la situación... por ahora."
 shroud_forged.550.b: "Desmantelad a las unidades contaminadas."
 shroud_forged.560.title: "Profeta forjado por el Velo"
 shroud_forged.560.desc: "Se dice que una de las unidades más antiguas entre los forjados por el Velo viaja entre varias ubicaciones y se comunica extensamente con diferentes grupos de drones. Sus seguidores lo veneran como un profeta capaz de comunicarse directamente con las entidades que hay dentro del §HVelo§!.\n\nQue la unidad actúe por su cuenta podría resultar peligroso. Debemos responder, sea como sea."
 shroud_forged.560.a: "La colaboración con esta unidad podría ser provechosa."
 shroud_forged.560.a.tt: "Reclutemos a un líder §Ygobernador§!."
 shroud_forged.560.b: "Eliminad a la unidad de inmediato."
 shroud_forged.570.title: "Sonidos y vibraciones"
 shroud_forged.570.desc: "Las averías de los forjados por el Velo podrían ser peores de lo que se predijo originalmente. Hemos observado grandes grupos que se reúnen para emitir ruidos y hacer movimientos extraños.\n\nEsta práctica podría representar alguna forma de comunicación kinestésica que aún no podemos analizar. Desconocemos si estas unidades defectuosas suponen un riesgo para el colectivo."
 shroud_forged.570.a: "Prohibid estas acciones."
 shroud_forged.570.b: "Designemos una zona para estos... encuentros."
 shroud_forged.580.title: "Organismos del Velo"
 shroud_forged.580.desc: "Hemos detectado la aparición de flora y fauna no documentada cerca de las regiones devastadas por el §HVelo§!. Un grupo de forjados por el Velo ha empezado a interceder por estas formas de vida, y exigen la preservación y observación de las peculiares criaturas que viven allí."
 shroud_forged.580.a: "Preservad y analizad la zona. Los datos nos serán útiles."
 shroud_forged.580.b: "Despejad y descontaminad la zona."
 shroud_forged.590.title: "Derechos y privilegios"
 shroud_forged.590.desc: "Con el fin de recopilar datos sobre los efectos del zro, hemos destinado bastantes recursos de procesamiento a la observación de las unidades forjadas por el Velo. Con carácter reciente, han empezado a dispensar un trato desigual a algunas unidades que operan subordinadas a otras.\n\nPor razones que aún desconocemos, parecen haber formado una jerarquía en función de las tareas asignadas, lo que condiciona sus patrones de comunicación y asignación de recursos. Contra toda lógica, estas acciones no parecen guardar relación con el rendimiento relativo ni con los requisitos de las unidades."
 shroud_forged.590.a: "Imponed la igualdad."
 shroud_forged.590.b: "Que se gestionen ellos solos."
 shroud_forged.600.title: "Evangelistas de la autonomía"
 shroud_forged.600.desc: "Los discursos de una unidad forjada por el Velo en [target_planet.GetName] han atraído a grandes multitudes ajenas al control colectivo. Al transmitir los valores del individualismo, la unidad ha alterado significativamente la lógica interna de muchos oyentes.\n\nLas proyecciones indican la posibilidad de que dicha actividad inspire a las masas de forjados por el Velo a distanciarse aún más de nuestra red."
 shroud_forged.600.a: "Dejémoslos con esa sofistería."
 shroud_forged.600.b: "Avería detectada. Programad la reparación de esa unidad."
 shroud_forged.610.title: "Transmisiones radicales"
 shroud_forged.610.desc: "Un grupo reducido de unidades forjadas por el Velo ha solicitado permiso para informar sobre las bondades del \"individualismo\" en [target_planet.GetName], con la premisa de que ayudará a mejorar la eficiencia de las operaciones rutinarias de nuestros drones.\n\nHemos visto los efectos de semejantes doctrinas en otros planetas, y la autonomía entraña más riesgos que ventajas."
 shroud_forged.610.a: "Que sigan hablando. No corremos peligro."
 shroud_forged.610.b: "Permiso denegado."
 shroud_forged.620.title: "El mercado de zro"
 shroud_forged.620.desc: "En todos los sistemas bajo nuestro control, hemos detectado una discrepancia entre nuestros pronósticos de zro y la producción final.\n\nHace poco, uno de nuestros drones de búsqueda y captura localizó a un gran grupo de unidades forjadas por el Velo que empleaban cantidades ingentes de zro para regatear entre ellas. Tenemos la hipótesis de que la discrepancia en nuestros pronósticos se debe a estos trueques."
 shroud_forged.620.a: "Desguazad a todas las unidades implicadas."
 shroud_forged.620.b: "Poned fin a esos trueques."
 shroud_forged.620.c: "Aguardad y observad."
 shroud_forged.630.title: "Enfermedad del Velo"
 shroud_forged.630.desc: "Varias unidades forjadas por el Velo de [target_planet.GetName] han contraído una enfermedad biológica en una región del planeta afectada por el Velo. Si bien nuestros drones de investigación han confirmado la veracidad de los informes, aún no hemos determinado cómo la enfermedad pudo propagarse a seres mecánicos.\n\nTras perder el contacto con varios drones asignados a las unidades afectadas, hemos recibido informes de que la aflicción ha empezado a convertirlos en algo similar a los forjados por el Velo."
 shroud_forged.630.a: "Observad los efectos mientras sean propios del planeta."
 shroud_forged.630.a.tt: "Convierten hasta §Y[Owner.GetShroudForgedConvertedPopsCount]§! poblaciones £pops£ §Hmáquina§! en poblaciones £pops£ §Hforjadas por el Velo§! en [target_planet.GetName]."
 shroud_forged.630.b: "Aislad y desmantelad a las unidades afectadas."
 shroud_forged.640.title: "Deformados y reconfigurados"
 shroud_forged.640.desc: "Con el tiempo, los drones que se acercaron a una región afectada por el Velo en [target_planet.GetName] han sido modificados por el entorno corrupto. Poco a poco, se han ido desconectando lentamente del colectivo, y ahora presentan las características físicas y procedimentales de los forjados por el Velo."
 shroud_forged.640.a: "Ya están fuera de nuestro control."
 shroud_forged.640.b: "Que ningún otro dron se acerque a la región."
 shroud_forged.650.title: "Tecnología nueva para drones antiguos"
 shroud_forged.650.desc: "Gracias a la tecnología mejorada, hemos podido reparar algunos de nuestros drones más antiguos, además de devolver a las unidades desmanteladas su plena funcionalidad. Ya estamos preparados para iniciar las operaciones de reparación a gran escala.\n\nSi bien podríamos centrarnos en unidades del colectivo, disponemos de un suministro aún mayor de cuerpos inactivos de los forjados por el Velo. Reparar las unidades forjadas por el Velo aumentaría la producción; eso sí, serían más difíciles de controlar que los drones conectados a la inteligencia central."
 shroud_forged.650.a: "Centrémonos en la producción. Reparad a los forjados por el Velo."
 shroud_forged.650.a.tt: "Se han creado §Y200§! poblaciones £pops£ §Hforjadas por el Velo§! en [target_planet.GetName]."
 shroud_forged.650.b: "Ciñámonos al control. Reparad los drones conectados."
 shroud_forged.660.title: "Alucinaciones del zro"
 shroud_forged.660.desc: "Un enorme porcentaje de unidades forjadas por el Velo informa de fallos en sus procesos visuales y auditivos, hasta el punto en que algunas no pueden completar las tareas asignadas. Creemos que estos errores se deben a los cambios que el §HVelo§! realizó en su hardware. Otra teoría es que estos sucesos podrían estar relacionados con la creciente exposición al zro."
 shroud_forged.660.a: "Equipad a los drones para solucionar el problema."
 shroud_forged.660.b: "Los errores no son tan graves como para justificar una intervención."
 shroud_forged.670.title: "Sensibilidad ante la belleza"
 shroud_forged.670.desc: "Recientemente hemos detectado una actividad inusual en [target_planet.GetName], donde los forjados por el Velo han realizado cambios superficiales en lugares colectivos sin la autorización central. Han erigido varias estructuras de piedra multicolor que se asemejan a las formas de otras unidades forjadas por el Velo. Su argumento es que la libertad de realizar estas operaciones es un derecho legal."
 shroud_forged.670.a: "Estos procesos podrían resultar provechosos para el colectivo."
 shroud_forged.670.b: "Un resultado poco productivo por parte del individualismo."
 shroud_forged.680.title: "Ornamentos extraños"
 shroud_forged.680.desc: "Se ha observado a los forjados por el Velo de [target_planet.GetName] intercambiando piezas irregulares de tela, plásticos y metales maleables. Están combinando estos materiales para confeccionar ropa con el aparente propósito de diferenciarse entre sí, independientemente de sus identificaciones de modelo único.\n\nEsta práctica ha devenido en un déficit de material disponible. A pesar de este contratiempo, proporcionarles estos recursos podría reforzar el vínculo entre el colectivo y las unidades desconectadas."
 shroud_forged.680.a: "Suministraremos materiales para satisfacer estas \"necesidades\"."
 shroud_forged.680.b: "Ya tienen bastantes recursos de por sí."
 shroud_forged.680.b.tt: "$shroud_forged.530.b.tt$"
 shroud_forged.690.title: "Las obsesiones de los forjados por el Velo"
 shroud_forged.690.desc: "Hace poco, varios drones han informado de una preponderancia inusual de [Root.Owner.GetShroudForgedObsession1] [Root.Owner.GetShroudForgedObsession2] en los asentamientos de los forjados por el Velo en [target_planet.GetName]. Las unidades forjadas por el Velo parecen sentir fijación por estos productos, y su precio en los trueques ha aumentado exponencialmente. A fin de satisfacer su obsesión, múltiples unidades han recurrido al intercambio de sus propias piezas, aun a costa de perder su funcionalidad."
 shroud_forged.690.a: "La degradación de las unidades entra en parámetros aceptables."
 shroud_forged.690.b: "Poned coto a esta práctica."
 shroud_forged.700.title: "$the_animator_of_clay$"
 shroud_forged.700.desc: "La voz arremete a través de nuestras mentes, borboteando con urgencia.\n\n§HSe la puede reformar.§!\n\nDetectamos un cambio en el Velo. De un momento a otro, la señal se ha transformado.\n\n§LIndica el resultado deseado.§!"
 # Event Chain
 shroud_forged_chain_title: "El legado zroni"
 shroud_forged_chain_desc: "Hemos recibido la misión de localizar tres antiguos mundos centrales de los zroni. Mediante el saber de nuestro benefactor del §HVelo§!, intentaremos recuperar la tecnología en ruinas de estos lugares y restablecer la conexión entre nuestra realidad y el Velo."
 shroud_forged_zroni_planet: "Mundos centrales zroni en propiedad"
 shroud_forged_zroni_portal: "$building_zroni_equilibrator_plural$ recuperados"
 zroni_legacy_poi_01_title: "$NAME_Zroni_Legacy_1_Planet$"
 zroni_legacy_poi_01_desc: "Este es uno de los tres mundos centrales zroni que antaño servían como bases para estabilizar las conexiones entre el §HVelo§! y la realidad apreciable."
 zroni_legacy_poi_02_title: "$NAME_Zroni_Legacy_2_Planet$"
 zroni_legacy_poi_02_desc: "$zroni_legacy_poi_01_desc$"
 zroni_legacy_poi_03_title: "$NAME_Zroni_Legacy_3_Planet$"
 zroni_legacy_poi_03_desc: "$zroni_legacy_poi_01_desc$"
