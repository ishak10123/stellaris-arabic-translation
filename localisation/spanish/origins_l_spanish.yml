 # Armies
 shroud_monstrosities: "Entidad de otro mundo"
 shroud_monstrosities_desc: "Contemplar estas entidades en el campo de batalla es una invitación a la locura; sus formas se retuercen y brillan, siempre cambiantes, nunca fijas."
