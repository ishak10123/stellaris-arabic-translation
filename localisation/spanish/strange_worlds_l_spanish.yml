l_spanish:
 ##THE WORLD IS BLEEDING
 strange_worlds.1.name: "El mundo sangra"
 strange_worlds.1.desc: "La superficie de §Y[Root.GetName]§! está manifestando una reacción inaudita a nuestras operaciones de construcción. Los cimientos de las estructuras mayores están empezando a rezumar una sustancia viscosa que no identificamos.\n\nEl flujo es una especie de líquido carmesí, de aspecto gelatinoso, pero extremadamente adhesivo al tacto.\n\nNuestros [Owner.GetScientistPlural] están deseando estudiar más a fondo esta secreción, pues, si bien ahora apenas supone una molestia, podría acabar poniendo en riesgo a las divisiones de [Owner.GetColonistPlural]."
 strange_worlds.5.name: "Hemorragia copiosa"
 strange_worlds.5.desc: "Llegan de §Y[Root.GetName]§! noticias inquietantes en lo que respecta al extraño flujo carmesí.\n\nLa sustancia empieza a ser difícil de gestionar y un caudal ya considerable emana por las zonas afectadas.\n\nEl extraño fango tiene ciertos beneficios, ya que, al coagular, adquiere más adhesividad, por lo que funciona como un cemento natural que puede aportar solidez a nuestras construcciones.\n\nSin embargo, lo preocupante es que resulta casi imposible eliminar la sustancia en casos en los que [Owner.GetColonistPlural] han entrado en contacto con ella. Si intentamos tratar y estudiar a los afectados, podríamos recopilar más información, pero ralentizaría el progreso de la construcción."
 strange_worlds.5.a: "Debemos tratar y estudiar a los afectados."
 strange_worlds.5.b: "Sigamos construyendo."
 strange_worlds.15.name: "Cúmulo de sangre"
 strange_worlds.15.desc: "Las construcciones avanzan en §Y[Root.GetName]§! a un ritmo asombroso, pero la sustancia viscosa ya no solo emana de los cimientos de nuestras instalaciones.\n\nSe han descubierto fisuras hemorrágicas en varias ubicaciones. Si inicialmente el flujo solo afectaba a elementos ajenos a [Root.GetName], este ahora se propaga de manera indiscriminada.\n\nEl material ha consumido ya gran parte de la superficie de [Root.GetName], y está cuajando a un ritmo alarmante, envolviendo [Root.GetName] con un coágulo mineral.\n\nA través de costosas pruebas y errores, nuestros ingenieros han encontrado una manera de mitigar daños mayores y de recolectar la sustancia de manera eficiente. Para lograrlo, no obstante, era inevitable ceder al fluido una extensión de terreno considerable."
 strange_worlds.15.a: "Un desarrollo interesante."
 strange_worlds.20.name: "Parásito"
 strange_worlds.20.desc: "Después de un intenso estudio y tratamiento de los trabajadores afectados en §Y[Root.GetName]§!, nuestros científicos han aislado la causa raíz del problema.\n\nLo que parecía una sustancia gelatinosa es en realidad un conglomerado de microorganismos parasitarios que forman una relación simbiótica con el planeta. Los parásitos descomponen la materia orgánica presente bajo la corteza de [Root.GetName] y la convierten en un material distinto.\n\nEl desarrollo de [Root.GetName] debió de perturbar su ciclo natural, desencadenando la reacción observada a las sustancias ajenas que introdujimos en su ecosistema.\n\nNuestro equipo científico confía en que, con el tiempo, encontraremos la forma de trabajar en armonía con estas formas de vida, así como de integrar su biología única en los procesos de producción de [Root.GetName]."
 strange_worlds.20.a: "Fascinante. Que prosigan los estudios."
 strange_worlds.25.name: "Relación productiva"
 strange_worlds.25.desc: "Tras un dilatado proceso de investigación, nuestros científicos han sintetizado una variante de los microorganismos parasitarios hallados en §Y[Root.GetName]§!. Esta mutación está diseñada para reconocer nuestros propios materiales como adiciones inofensivas a su ecología natural, lo que nos permite reanudar la construcción sin más problemas.\n\nAl introducirlos en la biosfera planetaria, nuestros parásitos transgénicos se han integrado adecuadamente.\n\nAdemás, al reutilizar los efectos de descomposición originales de los microorganismos, hemos logrado aprovechar las propiedades adhesivas de la sustancia para impulsar los procesos de producción de nuestro planeta."
 strange_worlds.25.a.evopred: "¿Y qué pueden enseñarnos?"
 strange_worlds.30.name: "Aparición inusitada"
 strange_worlds.30.desc: "Cuando preparábamos el terreno para nuestra expansión en §Y[Root.GetName]§!, de repente y de manera inexplicable, se ha materializado una estructura de gran tamaño.\n\nEmite ondas de energía muy inestables, posible causa de su presencia intermitente, ya que aparece y desaparece de la vista. Esto explicaría por qué no se detectó durante los escaneos preliminares del sector.\n\nCuando se encuentra visible, su exterior hermético lo adornan símbolos ininteligibles, distintos a todo lenguaje que conste en nuestros registros.\n\nNo hay indicios de la que podría ser la función de esta estructura y, aunque no ha resultado perniciosa de por sí, entorpece nuestro desarrollo."
 strange_worlds.30.a: "Investigad."
 strange_worlds.35.name: "Anomalías visuales"
 strange_worlds.35.desc.no_cloak: "El análisis del edificio titilante de §Y[Root.GetName]§! nos lleva a suponer que el objeto está doblando o distorsionando la luz de alguna manera.$strange_worlds.35.desc.common_1$Aunque sabemos más que antes acerca de las propiedades del edificio, aún no hemos podido acceder a su interior, si es que es siquiera posible.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.cloak: "El análisis del edificio titilante de §Y[Root.GetName]§! nos lleva a suponer que el objeto está produciendo, de alguna manera, un efecto de camuflaje intermitente.$strange_worlds.35.desc.common_1$Si bien nuestra comprensión de los efectos de ocultación del edificio ha aumentado, hasta ahora no hemos podido entrar en él, si es que esto es posible.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.common_1: "\n\nEn el manto de silicato subyacente se ha detectado actividad geotérmica insólita. Esta potente fuente de energía alimenta la estructura aislada, pero sus fluctuaciones son drásticas e imprevisibles.\n\n"
 strange_worlds.35.desc.common_2: "\n\nSu exterior estanco se compone de materiales de alta reactividad que nos son desconocidos. Los intentos iniciales de forzar la entrada a la estructura solo han servido para desestabilizar más los campos electromagnéticos del edificio. Podríamos practicarle una incisión a fin de seguir indagando, pero el riesgo de desestabilización imprevista es elevado."
 strange_worlds.35.a: "Por la fuerza bruta tendrá que ser."
 strange_worlds.35.b: "Sigamos estudiando el exterior."
 strange_worlds.40.name: "Fuga explosiva"
 strange_worlds.40.desc: "Las tentativas de entrar por la fuerza en la misteriosa estructura de §Y[Root.GetName]§! han desembocado en catástrofe. Nuestro instrumental desestabilizó más aún los patrones de energía del edificio, provocando una serie de explosiones devastadoras. Ahora queda poco más que escombros y ceniza.\n\nTampoco esperábamos lo que ha sucedido tras la destrucción: en un valle cercano han aparecido las ruinas asoladas de un asentamiento alienígena abandonado hace eones.\n\nParece que el objeto proyectaba un poderoso campo de camuflaje sobre la antigua colonia. Desconocemos de qué se escondían, pero lo que está claro es que perecieron a pesar de sus esfuerzos. No queda intacto nada de valor arqueológico.\n\nAún desconocemos el funcionamiento exacto de esta tecnología inusual, pero hemos adquirido algunos conocimientos gracias a la experiencia. Esta potente energía geotérmica servirá para alimentar nuestra colonia."
 strange_worlds.40.a: "Un descubrimiento de gran valor."
 strange_worlds.40.a_ct: "Barrera §YEstructura titilante§! eliminada"
 strange_worlds.45.name: "Cámara de mando"
 strange_worlds.45.desc.intro: "Al someter a un riguroso estudio las enigmáticas marcas que recubren el exterior de la estructura alienígena de §Y[Root.GetName]§!, parece ser que se trata de una interfaz. Hemos conseguido manipularlas para abrir una compuerta oculta que da al interior del edificio vacío, donde se abre una espaciosa cámara de control.\n\nAunque ignoramos su funcionamiento más profundo, hemos logrado adquirir ciertas nociones básicas mediante prueba y error. Interrumpir sus funciones ha dado pie a otro suceso inesperado: en un valle cercano han aparecido las ruinas asoladas de un asentamiento alienígena abandonado hace eones.\n\nParece que el objeto proyectaba un poderoso campo de camuflaje sobre la antigua colonia. Desconocemos de qué se escondían, pero lo que está claro es que perecieron a pesar de sus esfuerzos. Aunque no queda intacto nada de valor arqueológico, nuestros científicos han podido sacar un gran partido a la cámara de control."
 strange_worlds.45.desc.a: "$strange_worlds.45.desc.intro$\n\nAhora podemos estabilizar el extraño efecto de camuflaje del edificio y aplicarlo al valle entero. Será una gran mejora para la seguridad de nuestra colonia."
 strange_worlds.45.desc.b: "$strange_worlds.45.desc.intro$\n\nAhora podemos estabilizar el extraño efecto de camuflaje del edificio y aplicarlo al valle entero. Además, hemos adquirido conocimientos ingentes en materia de tecnologías de camuflaje."
 strange_worlds.45.a: "Un descubrimiento de gran valor."
 strange_worlds.55.name: "Shock natural"
 strange_worlds.55.desc.intro: "Una numerosa especie de megafauna herbívora ha empezado a perturbar la producción de energía en §Y[Root.GetName]§!. En lo que se pueden considerar estremecedores suicidios en masa, las criaturas se agolpan en nuestras centrales de energía, donde la corriente las fríe.\n\nLos animales manifiestan una vehemencia extrema, y hacen mella en las cercas de nuestras redes eléctricas con tal de alcanzar su objetivo. La generación de energía se resiente como resultado de este peculiar comportamiento.\n\n"
 strange_worlds.55.desc.outro: "La especie desempeña un papel fundamental en el ecosistema planetario y no tardará en extinguirse si las muertes se siguen sucediendo."
 strange_worlds.55.desc.a: "$strange_worlds.55.desc.intro$Sin embargo, y de forma inesperada, esto ha generado una mayor producción de alimentos, y hay [Owner.GetColonistPlural] que ya han descubierto que la carne de estas criaturas es muy deliciosa.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.desc.b: "$strange_worlds.55.desc.intro$Aunque este hecho se traduce en un aumento de la biomasa que podemos cosechar, resulta bastante engorroso.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.a: "Estudiemos esta conducta."
 strange_worlds.60.name: "Fisiología catalítica"
 strange_worlds.60.desc: "Hemos adquirido conocimientos valiosos sobre la especie de megafauna suicida de §Y[Root.GetName]§!.\n\nSe trata de animales carentes de visión funcional que se sirven de la ecolocalización para identificarse entre sí. Sospechamos que nuestras redes eléctricas emiten una frecuencia que abruma su oído agudo, lo que desencadena este comportamiento agresivo hacia nuestras centrales eléctricas.\n\nAdemás, hemos descubierto que poseen enzimas digestivas especiales que pueden servir de catalizador en procesos de refinamiento metalúrgico. A juzgar por las primeras pruebas, se cree que podrían mejorar nuestra producción de aleaciones.\n\nA pesar de estos descubrimientos, todavía estamos muy lejos de reanudar la producción normal de energía. Nuestros científicos siguen investigando el problema."
 strange_worlds.60.a: "$FASCINATING$"
 strange_worlds.65.name: "Magnetismo animal"
 strange_worlds.65.desc.intro: "Hemos investigado la causa de los impulsos suicidas agresivos que exhiben las criaturas de [Root.GetName].\n\nUn estudio observacional más detallado de su ecolocalización y comportamientos sociales ha revelado la impactante verdad: sus llamadas de apareamiento comparten una frecuencia casi idéntica a los sonidos generados por nuestras redes eléctricas.\n\n"
 strange_worlds.65.desc.common: "Podríamos recrear los bramidos de estas bestias a fin de desviar sus rutas migratorias lejos de nuestra colonia, estabilizando así su población. Esto nos permitirá recolectar enzimas catalíticas de sus excrementos para impulsar la producción de aleaciones, mientras continuamos nuestro estudio de su fisiología única.\n\nPor otro lado,\n\n"
 strange_worlds.65.desc.outro: "No nos llevaría mucho esfuerzo crear cosechadoras eléctricas especializadas que gestionen y procesen a los animales sin que la producción de energía se vea afectada."
 strange_worlds.65.desc.devouring_swarm: "$strange_worlds.65.desc.intro$por suerte, podemos hacer uso de estos conocimientos para llevar a las criaturas a cosechadoras especializadas. Saciemos nuestra hambre."
 strange_worlds.65.desc.food: "$strange_worlds.65.desc.intro$$strange_worlds.65.desc.common$estas criaturas son ahora un alimento fundamental en la dieta de §Y[Root.GetName]§!.\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.desc.no_food: "$strange_worlds.65.desc.intro$estas criaturas son una fuente de biomasa abundante y sostenible en §Y[Root.GetName]§!\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.a: "Cosechemos sus heces."
 strange_worlds.65.b_devouring_swarm: "¡Hora de saciarse!"
 strange_worlds.65.b_default: "Cosechemos su carne."
 strange_worlds.75.name: "Arenas extrañas"
 strange_worlds.75.desc: "Son ya varios los informes de [Owner.GetColonistPlural] que han observado extraños fenómenos en las arenas de §Y[Root.GetName]§!.\n\nCerca de nuestra colonia, y en días que se pronosticaban apacibles, se han gestado súbitamente atroces tormentas de arena. Sin previo aviso aparecen ríos de arenas que discurren a altas velocidades, para luego detenerse en seco, con la misma brusquedad con la que aparecieron. También hay informes de dunas de arena que se desplazan lateralmente en días sin viento.\n\nPor el momento, no se han identificado motivos atmosféricos o geológicos que expliquen estos hechos.\n\nAunque estas extrañas arenas no nos causan un daño directo, ponen trabas a las operaciones de nuestra colonia. El estudio del asombroso fenómeno aún prosigue."
 strange_worlds.75.a: "Curioso."
 strange_worlds.80.name: "Arenas cantarinas"
 strange_worlds.80.desc: "Las tormentas de arena de §Y[Root.GetName]§! han empezado a emitir un fuerte zumbido. La frecuencia cambia con regularidad de tono y la modulación tiene patrones recurrentes.\n\nAunque este fenómeno de \"arenas cantarinas\" puede atribuirse a las propiedades conocidas de las partículas libres, la regularidad de estas modulaciones no se puede explicar atendiendo únicamente a la fricción.\n\nTambién hemos encontrado un valle lleno de dunas grabadas con símbolos extraños. Estos jeroglíficos aparecen fugazmente en formaciones elevadas y luego se dispersan casi al instante.\n\nNo está claro qué es lo que da vida a la arena, pero el carácter sistemático de sus patrones sugiere que existe un propósito o que hay una intención tras su comportamiento."
 strange_worlds.80.a: "Estudiad los patrones."
 strange_worlds.85.name: "Arena psiónica"
 strange_worlds.85.desc_part1_no_zro: "El equipo de [Owner.GetScientistPlural] que estudia las tormentas de arena de §Y[Root.GetName]§! ha descubierto que una nueva forma de materia exótica se encuentra repartida por el material de silicato."
 strange_worlds.85.desc_part1_zro: "El equipo de [Owner.GetScientistPlural] que estudia las tormentas de arena de §Y[Root.GetName]§! ha descubierto que hay zro repartido por el material de silicato."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_zroni: "\nMientras los [Owner.GetResearchers] manipulaban las muestras, estos experimentaron unas fuertes visiones de breve duración. Fueron testigos de la aparición de figuras zroni que deambulaban por las dunas del planeta grabadas con jeroglíficos."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_no_zroni: "\nMientras los [Owner.GetResearchers] manipulaban las muestras, estos experimentaron unas fuertes visiones de breve duración. Fueron testigos de la aparición de figuras alienígenas desconocidas que deambulaban por las dunas del planeta grabadas con jeroglíficos."
 strange_worlds.85.desc_part2_non_machine_common_psionic_zroni: "\nMientras los [Owner.GetResearchers] manipulaban las muestras, estos experimentaron unas fuertes visiones psiónicas de breve duración. Fueron testigos de la aparición de figuras zroni que deambulaban por las dunas del planeta grabadas con jeroglíficos."
 strange_worlds.85.desc_part2_non_machine_common_psionic_no_zroni: "\nMientras los [Owner.GetResearchers] manipulaban las muestras, estos experimentaron unas fuertes visiones psiónicas de breve duración. Fueron testigos de la aparición de figuras alienígenas desconocidas que deambulaban por las dunas del planeta grabadas con jeroglíficos."
 strange_worlds.85.desc_part2_machine_common: "\nMientras los [Owner.GetResearchers] manipulaban las muestras, estos experimentaron interferencias en sus circuitos internos.\n\n"
 strange_worlds.85.desc_part2_machine_zroni: "$strange_worlds.85.desc_part2_machine_common$Estas fuertes disrupciones causaron fallos en el procesamiento visual, lo cual dio lugar a la aparición de figuras zroni deambulando por las dunas del planeta grabadas con jeroglíficos."
 strange_worlds.85.desc_part2_machine_no_zroni: "$strange_worlds.85.desc_part2_machine_common$Estas fuertes disrupciones causaron fallos en el procesamiento visual, lo cual dio lugar a la aparición de figuras alienígenas desconocidas deambulando por las dunas del planeta grabadas con jeroglíficos."
 strange_worlds.85.desc_part3_common: "\nParece que estas apariciones son el origen de los jeroglíficos. La decodificación de estos símbolos es una tarea extenuante, pero no tenemos dudas de que se trata de algún tipo de lengua escrita.\n\n"
 strange_worlds.85.desc_part3_zro: "$strange_worlds.85.desc_part3_common$Podríamos extraer el zro de la arena y listo, pero lo más probable es que al hacerlo se disipen las apariciones. Sin embargo, hay una gran cantidad de esta sustancia tan valiosa."
 strange_worlds.85.desc_part3_no_zro: "$strange_worlds.85.desc_part3_common$Podríamos extraer el material exótico de la arena y listo, pero lo más probable es que al hacerlo se disipen las apariciones. Sin embargo, es posible que esta sustancia que desafía a la física sea bastante valiosa."
 strange_worlds.85.a: "Continuad con las labores de traducción."
 strange_worlds.85.b_no_zro: "Extraed el material exótico de inmediato."
 strange_worlds.85.b_zro: "Extraed el zro de inmediato."
 strange_worlds.90.name: "Espectáculo de arena"
 strange_worlds.90.desc_intro_zroni: "Usamos todo el conocimiento previo sobre la cultura zroni para marcar un nuevo jeroglífico en las arenas de §Y[Root.GetName]§!; el símbolo zroni para el saludo. La respuesta llegó de inmediato."
 strange_worlds.90.desc_intro_no_zroni: "Con la ayuda de nuestras bases de datos de idiomas, hemos marcado cientos de símbolos sobre las arenas de §Y[Root.GetName]§! que representan saludos en todas las escrituras alienígenas conocidas. Finalmente, ha llegado una respuesta."
 strange_worlds.90.desc_common: "\nLas tormentas de arena se disiparon, el suelo del valle se asentó y el canto de las dunas quedó en silencio. Luego, se elevaron en el aire dunas enteras de arena, adquiriendo nuevas formas en el proceso. Las figuras que se formaron a partir de las arenas animadas se arremolinaron en un intrincado espectáculo aéreo.\n\n"
 strange_worlds.90.desc_storyline_started: "$strange_worlds.90.desc_common$Reconocimos de inmediato que se trataba de una historia de los zroni, una visión de un nuevo poder y un terrible conflicto. Animadas por el zro interior, estas arenas formaron un eco cósmico de la antigua raza zroni.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_finished: "$strange_worlds.90.desc_common$Reconocimos de inmediato que se trataba de la historia de los zroni, su ascenso hasta el Velo y su posterior destrucción. Animadas por el zro interior, estas arenas formaron un eco cósmico del trágico destino de los zroni.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_not_started: "$strange_worlds.90.desc_common$Lo único que entendimos es que se trata de la historia de una raza alienígena que descubrió un nuevo poder que terminó dividiéndola y destruyéndola.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_outro: "\n\nDespués de esto, las arenas psiónicas volvieron a asentarse. Las tormentas no han regresado; solo nos queda creer que las arenas se han vuelto más amables ante nuestra presencia en §Y[Root.GetName]§!."
 strange_worlds.90.a: "$FASCINATING$"
 strange_worlds.95.name: "Operaciones de cosecha"
 strange_worlds.95.desc_zroni_tech: "Gracias a nuestra experiencia en destilación del zro, hemos extraído una cantidad considerable de las arenas de §Y[Root.GetName]§!, y hemos aprendido mucho durante el proceso.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_no_zroni_tech: "La cosecha de zro que se ha llevado a cabo en §Y[Root.GetName]§! ha tenido resultados dispares. Conseguimos extraer una pequeña cantidad, pero se perdió buena parte de ella en el transcurso de nuestros experimentos. Aun así, aprendimos bastante durante el proceso.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_outro: "\n\nParece que las arenas de aquí han vuelto a la normalidad tras eliminar la contaminación de zro. Nuestra colonia ya no ha experimentado ese fenómeno de tormenta de arena impredecible. Lo que sea que estuviera manipulando estas arenas se ha perdido en el éter."
 strange_worlds.105.name: "Desaparición repentina"
 strange_worlds.105.desc_intro: "Se han perdido las comunicaciones con un [Owner.GetExplorer] de §Y[Root.GetName]§! poco después de que informara de un posible descubrimiento de §Ygas exótico§! en un valle no cartografiado anteriormente.\n\n"
 strange_worlds.105.desc_gestalt_non_machine: "Sentimos un breve pero agonizante dolor antes de que los nodos se quedaran en silencio."
 strange_worlds.105.desc_gestalt_machine: "Los datos de los nodos se corrompieron antes de desconectarse. Ya no están conectados a nuestra red."
 strange_worlds.105.desc_non_gestalt: "Lo más preocupante es que su última transmisión se cortó de forma abrupta con lo que parecen gritos de angustia. Nos tememos lo peor."
 strange_worlds.105.a: "Preocupante."
 strange_worlds.110.name: "Piscinas cáusticas"
 strange_worlds.110.desc: "Mientras investigábamos la última ubicación conocida del [Owner.GetExplorer] desaparecido de §Y[Root.GetName]§!, descubrimos un paisaje de ciénagas muy ácidas que exudan una niebla de §Ygas exótico§! puro. Estos pantanos son el hogar de una especie de flora autóctona resistente que es capaz de sobrevivir a la acidez extrema.\n\nAunque el paisaje es bastante nocivo, llevar a cabo más investigaciones sobre las nubes de gas podría resultar beneficioso para los recursos de la colonia."
 strange_worlds.110.a: "Estudiad las neblinas."
 strange_worlds.115.name: "Pantano digestivo"
 strange_worlds.115.desc: "Mientras estudiaba los pantanos ácidos de §Y[Root.GetName]§!, uno de nuestros [Owner.GetScientistPlural] y su equipo de observación quedaron atrapados por los zarcillos de la flora nativa antes de ser arrastrados a una piscina altamente cáustica. Se disolvieron prácticamente al instante. Creemos que el [Owner.GetExplorer] desaparecido tuvo un destino similar.\n\nPoco después, los zarcillos de las plantas se inflaron y afloraron trazas de §Ygas exótico§!. Parece que esta flora depredadora utiliza las ciénagas ácidas como sistema digestivo externo, de ahí que arrastre a las presas con los zarcillos cazadores para disolverlas a fin de absorber sus nutrientes. Este proceso libera una pequeña cantidad de gas exótico cosechable.\n\nCreemos que podríamos explotar la biología de este organismo si lo alimentamos con deshechos de la colonia para que produzca más gases. Otra alternativa sería neutralizar las ciénagas ácidas para reconvertir estas tierras ricas en nutrientes y destinarlas a la agricultura."
 strange_worlds.115.a: "Cultivad estos organismos."
 strange_worlds.115.b: "Reconvirtamos la tierra."
 strange_worlds.120.name: "Plantas de pantano neutralizadas"
 strange_worlds.120.desc: "Hemos conseguido neutralizar los pantanos ácidos de §Y[Root.GetName]§! y, de paso, nos hemos cargado a la especie de flora que vivía en ellos. Como resultado, las nubes de §Ygas exótico§! han desaparecido también.\n\nEstas tierras que hemos recuperado son sorprendentemente fértiles, debido a los nutrientes sobrantes del proceso de alimentación de la flora autóctona. Hemos creado un valioso espacio agrícola adicional."
 strange_worlds.120.a_ct: "Añade §G2§! §Y$district_farming_plural$§! a [This.GetName]"
 strange_worlds.120.b.evopred: "Excelente. Cosechemos también los restos."
 strange_worlds.130.name: "Erupción de materia oscura"
 strange_worlds.130.desc: "Lo que creíamos que era un géiser que había estado inactivo mucho tiempo en §Y[Root.GetName]§! ha entrado en erupción violentamente y ha arrojado gas infundido de §Ymateria oscura§! a la atmósfera.\n\nLa erupción ha saturado los cielos y ha provocado anomalías gravitacionales severas que están bloqueando los viajes extraterrestres y las comunicaciones.\n\nCreemos que la materia oscura proviene del núcleo singular de este planeta. Los sifones orbitales se han desplegado para extraer el miasma de la estratosfera, ya que estas condiciones extremas suponen un peligro para nuestros [Owner.GetColonistPlural]."
 strange_worlds.130.a: "Vigiladlo de cerca."
 strange_worlds.135.name: "Oscuridad líquida"
 strange_worlds.135.desc_common_1: "Hemos conseguido desviar el miasma de §Ymateria oscura§! de la atmósfera de §Y[Root.GetName]§! y estamos empezando a evaluar los daños."
 strange_worlds.135.desc_common_2: "\nCuando reestablecimos el contacto con la colonia descubrimos que los [Owner.GetColonistPlural] quedaron petrificados por lo que parece ser materia oscura solidificada."
 strange_worlds.135.desc_organic_non_gestalt: "$strange_worlds.135.desc_common_2$ Decidimos extraer los cascarones con cuidado al detectar que había señales de vida en su interior."
 strange_worlds.135.desc_machine: "$strange_worlds.135.desc_common_2$ Hemos liberado estos cascarones al detectar señales electrónicas funcionales en su interior."
 strange_worlds.135.desc_gestalt: "$strange_worlds.135.desc_common_2$ Los liberamos de su tumba física al sentir sus intentos por reintegrarse en el colectivo."
 strange_worlds.135.desc_outro: "\nContra todo pronóstico, parece que los [Owner.GetColonistPlural] no se han visto afectados por su prolongada exposición ni por su estasis.\n\nEl géiser responsable del incidente original se ha colapsado en un lago de materia oscura líquida.\n\nSe trata de un evento sin precedentes que requiere un estudio minucioso. Nuestros [Owner.GetScientistPlural] no saben en qué deberían concentrar sus ya escasos recursos."
 strange_worlds.135.a: "Aislad a la población y estudiadla."
 strange_worlds.135.b: "Priorizad el estudio de la materia oscura."
 strange_worlds.140.name: "Contaminación de materia oscura"
 strange_worlds.140_intro: "Nuestros [Owner.GetScientistPlural] confían en que el lago de §Ymateria oscura§! de §Y[Root.GetName]§! representa un peligro mínimo para el planeta. No se puede decir lo mismo de los síntomas emergentes que afectan a la población.\n\nMientras estudiamos a los [Owner.GetColonistPlural] en cuarentena, hemos identificado cambios físicos continuos que resultan de su sepultura en la sustancia."
 strange_worlds.140_common: "\nLa exposición prolongada ha saturado las moléculas de sus cuerpos con materia oscura "
 strange_worlds.140_machine_1: "$strange_worlds.140_common$y ha corrompido sus sistemas por completo."
 strange_worlds.140_non_machine_1: "$strange_worlds.140_common$y ha contaminado sus sistemas circulatorios."
 strange_worlds.140_machine_2: "\nAunque estos contaminantes presentan el riesgo de desencadenar en un fallo del sistema prematuro, permitirán que las unidades construidas en este mundo puedan procesar y cosechar materia oscura de manera eficiente como parte de una subrutina si se integra en sus procedimientos de ensamblaje."
 strange_worlds.140_non_machine_2: "\nPodemos cultivar estas anomalías si permitimos que los cuerpos de nuestros [Owner.GetColonistPlural] procesen y segreguen materia oscura cosechable a costa de disminuir su esperanza de vida."
 strange_worlds.140.a.dc_empire: "Agradezcamos este regalo."
 strange_worlds.140.a.machine_empire: "Cultivad las anomalías."
 strange_worlds.140.a.normal: "Procesad los contaminantes."
 strange_worlds.140.b: "Purgad la contaminación."
 strange_worlds.145.name: "Microagujero negro"
 strange_worlds.145.desc: "Los estudios complementarios sobre el lago de materia oscura de §Y[Root.GetName]§! han desvelado información geológica importante que puede explicar la causa del incidente inicial.\n\nEl núcleo del planeta alberga un microagujero negro de menos de un metro de longitud. La masa más grande del planeta anula las fuerzas gravitatorias esperadas que habríamos detectado de tal anomalía. Parece que esta relación entre masas ha llegado a un delicado equilibrio que debería mantenerse durante bastante tiempo.\n\nLa reciente actividad sísmica ha desplazado el manto interior y eso ha causado la primera erupción del géiser. El lago de materia oscura actuó como un tapón que estabilizó el núcleo del planeta y evitó nuevos estallidos.\n\nSin embargo, la saturación a largo plazo de la materia oscura no está exenta de peligros, como parecía ser el caso en un principio.\n\nEn el centro de la masa de los [Owner.GetColonistPlural] se han formado microagujeros negros inestables que han provocado que sus cuerpos exploten violentamente. Lo único que quedó fue un cascarón sin vida hecho de materia oscura cristalizada. Los escáneres no han detectado señales de actividad en su interior.\n\nNuestros recuentos finales muestran que hemos perdido aproximadamente a un cuarto de la población de §Y[Root.GetName]§! en un instante. Ahora la sustituyen estatuas de materia oscura que pueblan el planeta en diversas posturas."
 strange_worlds.145.a.no_gestalt: "Desafortunado."
 strange_worlds.145.a.gestalt: "Horripilante."
 strange_worlds.155.name: "Plagas repugnantes"
 strange_worlds.155.desc_homicidal: "Hemos encontrado una especie de fauna bastante asquerosa que es autóctona de §Y[Root.GetName]§!.\n\nResulta que ha desarrollado un mecanismo de defensa que utiliza como método principal para conseguir alimento. Como está desprovista de las enzimas digestivas necesarias para descomponer los alimentos sólidos, esta fauna emite un gas potente y repulsivo que induce al vómito cuando otros organismos que tienen un intestino funcional lo inhalan. Luego consumen estas sustancias emitidas a modo de principal fuente de nutrientes.\n\nEl sacrificio de estas asquerosas criaturas proporcionará una útil ganancia inesperada de §Ygas exótico§! y §Yalimentos§!."
 strange_worlds.155.desc_normal: "Nuestro contingente de [Owner.GetColonistPlural] en §Y[Root.GetName]§! ha encontrado una especie de fauna autóctona de este planeta que tiene un... particular método de recolectar sus alimentos.\n\nAunque estas criaturas se mostraron tímidas al principio, ya se han acostumbrado a nuestra presencia, y su naturaleza amigable incluso se ha ganado el cariño de los [Root.Owner.GetSpeciesNamePlural] más inmaduros.\n\nA pesar de que no suponen ningún peligro inminente, han desarrollado un mecanismo de defensa que también les sirve como principal método de obtención de alimentos. Como están desprovistas de las enzimas digestivas necesarias para descomponer los alimentos sólidos, estas criaturas emiten un gas potente y repulsivo que induce al vómito cuando otros organismos que tienen un intestino funcional lo inhalan. Luego consumen estas sustancias emitidas a modo de principal fuente de nutrientes.\n\nLa situación en general conlleva el riesgo de que se puedan propagar enfermedades contagiosas, así que los líderes locales han pedido a los equipos de [Owner.GetColonistPlural] que no se acerquen a estas rarezas."
 strange_worlds.155.a: "Qué xenobiología tan singular."
 strange_worlds.155.b_purifiers: "Qué cosa tan asquerosa."
 strange_worlds.155.b_swarm: "¡Es un gusto adquirido!"
 strange_worlds.155.b_normal: "Disparad a todas las que veáis."
 strange_worlds.160.name: "Acontecimientos asquerosos"
 strange_worlds.160.desc: "Deshacernos de las asquerosas plagas de §Y[Root.GetName]§! es complicado. Los miembros más jóvenes de la colonia continúan jugando con los animales a pesar de los avisos oficiales.\n\nComo resultado, nuestras proteínas [Root.Owner.GetSpeciesOrganName] se han convertido en su fuente preferida de alimento. Nuestra colonia se ha convertido en un objetivo mucho más fácil que el resto de la fauna planetaria, que sabe evitar sus repugnantes gases. Estas criaturas se han adaptado bastante a nuestra presencia y se las ha visto emplear tácticas de emboscada contra cualquier [Owner.GetColonist] que deambule por ahí a solas después de comer.\n\nSin embargo, por raro que suene, la situación tiene sus ventajas. Nuestros científicos han descubierto que los humos eméticos que emiten estas criaturas contienen partículas valiosas de §Ygas exótico§! que se podrían cosechar si domesticamos a las bestias y las metemos en instalaciones aisladas.\n\nLa mayoría de la colonia, sin embargo, ha propuesto su erradicación total."
 strange_worlds.160.a: "Haceos con ellas."
 strange_worlds.160.b: "Ya está bien. Disparad a todas."
 strange_worlds.165.name: "Un soplo de aire fresco"
 strange_worlds.165.desc: "Las criaturas de §Y[Root.GetName]§! han dejado de causar regurgitaciones en masa.\n\nCon el desarrollo de una pasta de nutrientes sintética adaptada a su xenobiología, hemos conseguido regular sus ciclos dietéticos y hemos puesto fin a las emboscadas oportunistas contra [Owner.GetColonistPlural] a nuestro servicio.\n\nLas hemos realojado en una reserva cuidadosamente diseñada donde el público puede disfrutar de estos animales en un entorno seguro. Los encargados especializados han recibido formación para extraer su §Ygas exótico§! sin riesgos."
 strange_worlds.165.a: "Qué alivio."
 strange_worlds.165.a.evopred: "Más nos vale no incorporar ese olor a nuestra evolución."
 strange_worlds.170.name: "Disparar a matar"
 strange_worlds.170.desc: "Han transcurrido varios meses desde que se vio por última vez a la especie infractora de §Y[Root.GetName]§! cerca de la colonia después de que se adoptara una política oficial que permitía disparar a estas criaturas nada más toparte con una.\n\nAunque hay [Owner.GetColonistPlural] que echan de menos la presencia de estos peluditos, la gente está más contenta en general, ya que ahora puede viajar con tranquilidad y sin miedo a regurgitar a la fuerza.\n\nNuestros científicos han recogido los cuerpos de los animales y han extraído cierta cantidad de §Ygas exótico§! directamente de sus órganos internos."
 strange_worlds.170.a: "Lo estaban pidiendo a gritos."
 strange_worlds.185.name: "Hostilidad entre distritos"
 strange_worlds.185.desc: "Los informes de §Y[Root.GetName]§! muestran que han surgido alarmantes hostilidades entre distritos de las poblaciones rurales y urbanas. No hay una causa clara a la que se le pueda achacar esta animadversión, quitando la arbitrariedad de su ubicación geográfica.\n\nA los nuevos inmigrantes se les trata al principio con hostilidad, pero pocas semanas después de asignarlos a sus respectivos distritos son bien acogidos por el redil. Nuestros científicos están convencidos de que este extraño comportamiento se debe a factores localizados en los distritos.\n\nMientras investigamos este asunto, necesitamos estabilizar la situación para prevenir su aumento. Podemos elegir entre apoyar oficialmente a los distritos rurales o urbanos, o desplegar fuerzas de seguridad adicionales para mantener la paz."
 strange_worlds.185.a: "Apoyad a los distritos urbanos."
 strange_worlds.185.b: "Apoyad a los distritos rurales."
 strange_worlds.185.c: "Desplegad fuerzas de seguridad adicionales."
 strange_worlds.190.name: "Algo en el agua"
 strange_worlds.190.desc_intro: "Después de extensos estudios ambientales en §Y[Root.GetName]§!, nuestros científicos han identificado la causa de la hostilidad entre distritos.\n\nEn las profundidades del manto planetario yace el cadáver en descomposición de un organismo gigante. Tras milenios en ese estado, el fluido espinal de esta criatura se ha filtrado en las aguas subterráneas del planeta y se ha mezclado con una bacteria psiónica. Este microbio capaz de alterar la mente ha entrado en los sistemas nerviosos de nuestros [Owner.GetColonistPlural] y les ha inducido fuertes instintos territoriales que probablemente fueran propiedades del animal original.\n\n"
 strange_worlds.190.desc_non_psionic: "Se podría resolver el problema si pasamos el suministro de agua por una compleja serie de filtros de alta calidad con este propósito exclusivo.\n\n"
 strange_worlds.190.desc_psionic: "Esta impureza exótica interfiere con nuestras habilidades psiónicas naturales.$strange_worlds.190.desc_non_psionic$"
 strange_worlds.190.desc_outro_non_psionic: "Por otra parte, nuestros científicos están seguros de que la bacteria se puede modificar genéticamente a nivel celular y redirigir las tendencias territoriales hacia fines más productivos."
 strange_worlds.190.a: "Filtrad el agua subterránea."
 strange_worlds.190.b: "Intentad alterar genéticamente la bacteria."
 strange_worlds.195.name: "Habilidades emergentes"
 strange_worlds.195.desc_intro: "La instalación de estaciones de filtrado de agua en §Y[Root.GetName]§! ha sido un éxito rotundo.\n\n"
 strange_worlds.195.desc_psionic: "Las agresiones hiperterritoriales han desaparecido, y no solo se ha puesto fin a las interferencias con nuestras capacidades psiónicas, sino que han mejorado aún más con probióticos naturales que fomentan una §Yefapsis psiónica§! entre individuos de §Y[Root.GetName]§!. Esto refuerza nuestra conexión telepática compartida y fomenta un sentido de la comunidad más amplio mientras se mejora la productividad."
 strange_worlds.195.desc_non_psionic: "A pesar de que las agresiones hiperterritorriales han desaparecido, la población se ha quedado con algunos efectos secundarios residuales que son potencialmente útiles en forma de probióticos naturales que fomentan una §Yefapsis psiónica§! entre individuos de §Y[Root.GetName]§!. Esto permite que nuestros equipos de [Owner.GetColonistPlural] se comuniquen telepáticamente, lo cual fomenta una mayor sensación de comunidad y mejora la productividad."
 strange_worlds.195.a: "Muy bien."
 strange_worlds.195.a_ct: "Todas las poblaciones de §Y[Root.GetName]§! reciben §Yefapsis psiónica§!"
 strange_worlds.195.a.evopred: "Sabe... §Mraro§!."
 strange_worlds.195.a_ct.evopred: "Nuestra especie principal recibe §Yefapsis psiónica§!"
 strange_worlds.200.name: "Resecuenciación bacteriana"
 strange_worlds.200.desc: "Hemos neutralizado los efectos negativos del organismo bacteriano de §Y[Root.GetName]§!. Las luchas internas entre [Owner.GetColonistPlural] han remitido y ya muestran signos de una mayor productividad.\n\nNuestros científicos confían en poder ir a más al editar el código genético del microbio. Con la secuenciación correcta de su genoma, podríamos mejorar aún más un aspecto del rendimiento de nuestros [Owner.GetColonistPlural].\n\nSin embargo, el microorganismo resultante no sobrevivirá por mucho tiempo si sale del mundo. La conexión psiónica entre sus mitocondrias y el recipiente alienígena debe permanecer intacta para que la bacteria se reproduzca. Aún desconocemos la razón de esto."
 strange_worlds.200.a: "Mejoremos sus capacidades reproductivas."
 strange_worlds.200.b: "Mejoremos su fortaleza."
 strange_worlds.200.c: "Mejoremos su cognición."
 strange_worlds.1000.name: "Tubos de lava mineralizada"
 strange_worlds.1000.desc: "Al secar el clima de §Y[From.GetName]§!, se descubrió una vasta red de tubos de lava en todo el fondo oceánico recientemente expuesto del planeta.\n\nEl magma que fluye y forma estos profundos túneles se ha enfriado, dejando un rico depósito de minerales forjados hace mucho a tiempo por el calor y la presión del núcleo fundido de §Y[From.GetName]§!.\n\nEstos depósitos de piroductos son extremadamente densos. Las operaciones de extracción aquí serán costosas, pero muy lucrativas."
 strange_worlds.1005.name: "Huevos hidroactivos"
 strange_worlds.1005.desc: "La terraformación de §Y[From.GetName]§! ha provocado un aumento inesperado en la población de fauna nativa.\n\nHemos dilucidado que los ciclos reproductivos de muchas especies locales están intrínsecamente ligados a la presencia de agua en su entorno. Los huevos que antes yacían enterrados en el suelo durante meses antes de absorber suficiente agua para eclosionar ahora plagan la superficie. El número de la fauna planetaria está creciendo exponencialmente.\n\nEstas criaturas son muy nutritivas en su mayoría; suponen una gran fuente de alimento para §Y[From.GetName]§!, así como oportunidades para estudiar un ecosistema extremadamente activo. Los visitantes de este planeta ahora deberán someterse a un extenso examen a su salida para evitar la contaminación del exterior."
 strange_worlds.1005.evopred: "¿Será posible replicar este lugar?"
 strange_worlds.1010.name: "Suspendidos en el hielo"
 strange_worlds.1010.intro: "Nuestros esfuerzos por terraformar §Y[From.GetName]§! han revelado una sorprendente cantidad de fauna nativa enterrada bajo el hielo de la superficie. Lo más asombroso es que estas criaturas siguen vivas de algún modo. \n\nLa especie parece hallarse en mitad de una profunda hibernación, un método muy efectivo para sobrevivir a las longevas edades de hielo en §Y[From.GetName]§!. El deshielo provocado por el proceso de terraformación ha puesto fin prematuramente a su estasis.\n\nNada más despertar de su gélido sueño, las criaturas ya muestran signos de inteligencia al emplear herramientas sencillas para la recolección de alimentos.\n\n"
 strange_worlds.1010.desc_exterminate: "$strange_worlds.1010.intro$Vamos a exterminarlos de inmediato. Destinaremos la biomasa resultante a otras finalidades."
 strange_worlds.1010.desc_hunted: "$strange_worlds.1010.intro$Su fisiología única supondrá una rica fuente de alimento."
 strange_worlds.1010.desc_tolerated: "$strange_worlds.1010.intro$Podemos estudiar las impresionantes capacidades de esta especie para hibernar, o cosechar su biomasa."
 strange_worlds.1010.desc_protected: "$strange_worlds.1010.intro$Deberíamos proteger a estas formas de vida. Sus excelentes capacidades de hibernación son dignas de estudio."
 strange_worlds.1010.a.purge: "Purgadlas."
 strange_worlds.1010.b.hunted: "Dadles caza."
 strange_worlds.1010.c.study: "Estudiadlas."
 strange_worlds.1010.d.purge: "Purgadlas."
 strange_worlds.1010.e.protect: "Protejámoslas."
 strange_worlds.1015.name: "Montañas de acero"
 strange_worlds.1015.desc: "Nuestros especialistas en terraformación han señalado un problema inminente en §Y[From.GetName]§!.\n\nPor debajo de las cadenas montañosas del planeta se encuentran unos enormes y densos depósitos de hierro y carbón, sobrecalentados a causa del proceso de terraformación.\n\nAhora que están casi fundidos, podemos extraer los recursos o permitir que sigan sobrecalentándose para conseguir un suministro constante de aleaciones (a costa de espacio habitable, claro está)."
 strange_worlds.1015.a: "Los recursos tienen prioridad."
 strange_worlds.1015.b: "No hagáis nada."
 strange_worlds.1020.name: "Atmósfera combustible"
 strange_worlds.1020.desc: "Terraformar §Y[From.GetName]§! ha producido unos resultados imprevistos. Para nuestra ignorancia, la capa superior del suelo del planeta se componía de una fina mezcla de partículas, con una alta concentración de §Ymotas volátiles§! que nuestro proceso de terraformación ha perturbado, esparciéndolas por la atmósfera del planeta.\n\nPor desgracia, estas partículas aéreas de gran energía aumentan el riesgo de combustiones no intencionales en la superficie. Las colonias futuras tendrán que priorizar la prevención de accidentes y conflictos para evitar consecuencias devastadoras.\n\nNo obstante, si logramos sortear esos peligros, la atmósfera de §Y[From.GetName]§! se convertiría en una fuente rica en materiales raros."
 strange_worlds.1025.name: "Lava azul"
 strange_worlds.1025.desc: "La corteza planetaria de §Y[From.GetName]§! ha cambiado como resultado del proceso de terraformación y ha dado lugar a un extraño fenómeno natural.\n\nEl movimiento de las placas tectónicas ha desplazado varios depósitos de §Ygases exóticos§!. Al entrar en contacto con los depósitos minerales de §Yaleaciones§! en los volcanes del planeta, se han producido erupciones de lava con un tono azul vivo.\n\nLa naturaleza volátil de este fenómeno ha hecho que el planeta sea menos favorable y, como resultado, nuestros planes para crear un espacio habitable para [Root.GetColonistPlural] se han visto afectados.\n\nComo beneficio adicional, la tierra alrededor de estos volcanes ahora es rica en recursos que podemos aprovechar."
 strange_worlds.1030.name: "Rayos perpetuos"
 strange_worlds.1030.desc: "Hemos recibido informes sobre un nuevo fenómeno meteorológico en §Y[From.GetName]§!.\n\nLa terraformación ha revelado unos depósitos de cristal en el lecho rocoso del planeta que reaccionan a los compuestos químicos empleados en el proceso y se irradian. Las fluctuaciones resultantes en la temperatura del aire han creado una tormenta eléctrica perpetua en todo el planeta.\n\nEstas condiciones climáticas únicas afectarán inevitablemente al desarrollo de la infraestructura, y los cristales irradiados seguramente tendrán consecuencias para la habitabilidad a largo plazo. Sin embargo, nuestros [Owner.GetScientistPlural] confían en que podrán aprovechar la energía de las tormentas una vez que se complete la terraformación.\n\nComo alternativa, los [Owner.GetEngineerPlural] han esbozado algunos planes para neutralizar la carga de los depósitos de cristal de forma segura. Esto debería disipar las tormentas y permitirnos aprovecharlas de forma segura para otros usos."
 strange_worlds.1030.a: "Aprovechemos la energía de las tormentas."
 strange_worlds.1030.b: "Neutralicemos los cristales."
 strange_worlds.1035.name: "Hibernadores"
 strange_worlds.1035.desc: "Los estudios sobre la población preinteligente de §Y[event_target:hibernator_planet.GetName]§! han arrojado información sobre sus impresionantes patrones de hibernación. Los regula una enzima que activa o desactiva su profundo sueño en estasis. Cuando se hallan en este estado, las reacciones químicas de sus cuerpos se reducen a cantidades cuasi ínfimas.\n\nHemos extraído la enzima y hemos podido administrarla a través de un compuesto sedante a otros organismos. Todas las especies que antes no podían hibernar lograron sumirse en un largo letargo, con un envejecimiento de células notoriamente más lento.\n\nEste magnífico descubrimiento sienta las bases de un criosueño mejorado artificialmente que mitigará el desgaste físico de las especies orgánicas durante viajes espaciales de larga distancia."
 strange_worlds.1040.name: "Enterramientos en el cielo"
 strange_worlds.1040.desc: "Cuando terminamos de terraformar §Y[From.GetName]§!, varios cuerpos empezaron a caer del cielo.\n\nDesde tales alturas, estos antiguos cadáveres quedan reducidos a una masa sanguinolenta al impactar. Entre las vísceras encontramos trazas de pequeños objetos: ornamentos y extrañas reliquias, provenientes de las densas nubes que hay en la alta atmósfera.\n\nSuponemos que estas espesas nubes sirvieron como lugar de descanso final para alguna raza alienígena desconocida. Ahora se están disipando como resultado de nuestros cambios de terraformación, por lo que liberan el contenido que antes estaba suspendido en su interior. Es de esperar que sigan cayendo restos hasta que la atmósfera se estabilice y las tumbas nubosas queden vacías del todo."
 strange_worlds.1040.a: "Una atrocidad que podría resultar rentable."
 strange_worlds.1040.b: "No es nada higiénico. Quitémoslo todo de inmediato."
 strange_worlds.1050.name: "Restos orbitales"
 strange_worlds.1050.desc: "Nuestros ingenieros terraformadores de §Y[event_target:junk_moon_planet.GetName]§! están trabajando en condiciones muy peligrosas por motivo de los diversos trozos de basura espacial y demás detritos que orbitan en torno al planeta. La alta concentración de artefactos representa un peligro para las lanzaderas que entran y salen de la superficie.\n\nDada la gran densidad del material, hemos elaborado propuestas para magnetizar el mayor de estos fragmentos para que atraiga a otros mientras orbitan, consolidándolo todo gradualmente en una entidad única y más manejable. Hasta tenemos la teoría de poder crear una luna artificial.\n\nSi bien esto retrasaría la terraformación, también facilitaríamos el acceso de las lanzaderas a la superficie y eliminaríamos el riesgo de que restos orbitales más grandes penetren en la atmósfera del planeta."
 strange_worlds.1050.a: "Construyamos una luna."
 strange_worlds.1050.b: "Ya echará a arder."
 strange_worlds.1060.name: "Luna de chatarra"
 strange_worlds.1060.desc: "Hemos logrado consolidar la basura espacial que orbita alrededor de §Y[event_target:junk_moon_planet.GetName]§!.\n\nAl magnetizar muchas de las piezas más grandes, fuimos recogiéndolo todo hasta formar un gigantesco cuerpo de chatarra. Su densidad ha crecido hasta tal punto que ha desarrollado su propia atracción gravitatoria. Desde entonces, esta luna recién creada se ha asentado en una órbita estable.\n\nEl acceso a la superficie de §Y[event_target:junk_moon_planet.GetName]§! es mucho más fácil sin los peligrosos desechos orbitales, y ya no tenemos que preocuparnos por su posible entrada a la atmósfera. Por si fuera poco, nuestros ingenieros tienen la certeza de que la nueva luna podrá albergar una estación minera."
 strange_worlds.1060.create_moon_ct: "[event_target:junk_moon_planet.GetName] tiene una nueva luna: Luna de chatarra"
 site_abandoned_bio_lab: "Instalación antigua"
 abandoned_bio_lab_desc: "Los análisis en §Y[fromfrom.planet.GetName]§! han descubierto una recóndita instalación en la región más inaccesible del planeta. La estructura parece estar abandonada o en hibernación. No hay lecturas de energía ni rastros de deterioro prolongado. Una expedición arqueológica podría arrojar más datos."
 strange_worlds.2000.name: "Laboratorio biológico abandonado"
 strange_worlds.2000.desc: "La instalación alberga un surtido de máquinas médicas, cámaras de tratamiento y una morgue abandonadas. En las cápsulas para almacenar cadáveres, hallamos unos restos orgánicos preservados parcialmente, pero con signos de enfermedad y deformaciones. La presencia de puertas de seguridad, equipos de vigilancia y celdas de contención lleva a los §H[universal_macrophage_scientist.GetName]§! a concluir que algunos estaban retenidos contra su voluntad.\n\nHemos rescatado algunas piezas de equipo, pero casi todo se ha deteriorado notablemente. Los sistemas informáticos tampoco ofrecían gran cosa; solo hemos recuperado algunos archivos para su traducción."
 strange_worlds.2005.name: "Investigación antigua sobre inmunología"
 strange_worlds.2005.desc: "§H[universal_macrophage_scientist.GetName]§! ha traducido parte de uno de los archivos de datos recuperados en la instalación de §Y[fromfrom.planet.GetName]§!.\n\n§LInforme de estado del laboratorio 17 (por Gelebor, investigador principal)\n\nEl nuevo prototipo resulta prometedor. Los sistemas inmunitarios de los sujetos multiplicaron su efectividad por un millón y todos los patógenos fueron exterminados. Persisten los efectos secundarios: las posteriores mutaciones fueron letales, no hubo supervivientes. Volveremos a intentarlo. El macrófago universal está a nuestro alcance, no me cabe duda.§!"
 strange_worlds.2010.name: "La decisión de Gelebor"
 strange_worlds.2010.desc: "§H[universal_macrophage_scientist.GetName]§! ha traducido otro archivo del laboratorio abandonado de §Y[fromfrom.planet.GetName]§!.\n\n§LAviso para el personal del laboratorio 17 (por Gelebor, investigador principal)\n\nCompañeros, hoy han ordenado la cancelación del proyecto; al dominador se le ha agotado la paciencia. ¡Con lo cerca que estamos de nuestro objetivo...! El macrófago universal es mucho más importante que los caprichos de un individuo cualquiera. ¡Podemos tener un futuro sin enfermedades! ¿Qué son unas pocas vidas a cambio de semejante avance?\n\nSi no envían a más sujetos de prueba, yo probaré el último prototipo. ¿Quién me acompaña?§!"
 strange_worlds.2010.a: "Procedamos con cuidado."
 strange_worlds.2015.name: "El macrófago universal"
 strange_worlds.2015.desc: "§H[universal_macrophage_scientist.GetName]§! ha traducido la última entrada de los ordenadores del laboratorio biológico de §Y[fromfrom.planet.GetName]§!.\n\n§LInforme final del laboratorio 17 (por Filidor, asistente de investigación)\n\nTal era la confianza que teníamos en Gelebor que lo seguimos sin vacilar.\n\nCuando probamos el prototipo en nosotros mismos, nuestros sistemas inmunitarios se fortalecieron de primeras; éramos prácticamente inmunes a cualquier patógeno externo. Fue entonces cuando empezaron las mutaciones.\n\nGelebor feneció el primero. Fue un espectáculo horroroso. Ahora, todo el equipo yace en la morgue, y muy pronto me uniré a ellos.\n\nHemos fracasado. La fórmula defectuosa de Gelebor nos ha costado la vida. El macrófago universal funciona tan bien que ataca hasta al anfitrión. Hay que destruirlo todo.§!"
 strange_worlds.2015.a: "Destruidlo todo."
 strange_worlds.2015.b: "Completemos la investigación de Gelebor. La cosa promete."
 strange_worlds.2015.b.mutation: "Somos maestros de la mutación. Acabemos con esto."
 has_tr_mutation_finish_tt: "Esta opción está disponible porque hemos completado el árbol de tradiciones §Y$Mutation$§!."
 strange_worlds.2015.c: "Esta investigación fallida podría servirnos."
 strange_worlds.2030.name: "Mutaciones fatales"
 strange_worlds.2030.desc: "Los ciudadanos de §Y[Root.GetName]§! están sufriendo graves mutaciones que interrumpen el funcionamiento de las células y los órganos vitales. En algunos casos, estos cambios han aumentado la eficacia metabólica, pero en los demás están resultando letales.\n\nEstos efectos secundarios se adecúan a los descritos en las notas de la investigación original sobre el §Ymacrófago universal§!. A pesar de nuestros esfuerzos, parece que las mutaciones provocadas por la fórmula son inevitables. Esta tecnología es perjudicial. Dejaremos de usarla y destruiremos los suministros restantes de la fórmula."
 strange_worlds.2030.ct: "§Y[Root.GetName]§! pierde 100 £pop£ poblaciones, y otras 100 £pop£ poblaciones por cada £pop£ población de $@macrophage_kill_pop_every_x$ presente.\nTodas las £pop£ poblaciones orgánicas de §Y[Root.GetName]§! reciben §Ymutaciones gelebóricas§!, y su fisiología se ve drásticamente alterada."
 site_anomalous_cube: "Cubo anómalo"
 anomalous_cube_desc: "Se ha avistado un gigantesco cubo metálico en §Y[Planet.GetName]§!. Su forma perfecta sugiere capacidades tecnológicas avanzadas, aunque no podemos determinar su origen o función. Una expedición arqueológica podría esclarecer algo."
 strange_worlds.2035.name: "Metal ondeante"
 strange_worlds.2035.desc_intro: "Tras estudiar detenidamente el misterioso cubo gigante de [fromfrom.planet.GetName], tenemos más preguntas que respuestas. Las superficies exteriores son lisas, perfectas e impenetrables para nuestros escáneres. Al acercarnos al cubo, la imponente fachada parece ondular suavemente, reaccionando a nuestra presencia."
 strange_worlds.2035.desc_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! ha concluido que se fabricó con una especie de §Ymetal vivo§!."
 strange_worlds.2035.desc_no_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! ha concluido que se fabricó con un extraño metal que jamás habíamos visto."
 strange_worlds.2035.a: "Seguid investigando."
 strange_worlds.2040.name: "El interior del cubo"
 strange_worlds.2040.desc: "Mientras §H[event_target:anomalous_cube_scientist.GetName]§! examinaba el cubo metálico de [fromfrom.planet.GetName], una de sus superficies se onduló sin previo aviso y se dividió para abrir una entrada al artefacto. Al adentrarnos, vimos una consola de mando ocupada por el cadáver de un moluscoide en descomposición. La carne que contenía en el pasado ha sido reducida a un polvo blanquecino.\n\nEn la consola había un extraño contenedor que emitía unos golpes secos y metálicos, como si algo se moviera en su interior. Sin embargo, el sello del contenedor es complejo, y §H[event_target:anomalous_cube_scientist.GetName]§! no ha conseguido abrirlo por el momento."
 strange_worlds.2040.evopred: "Algo podremos recuperar, aunque sea polvo."
 strange_worlds.2045.name: "Registros de sonido descubiertos"
 strange_worlds.2045.desc: "Mientras extraía los datos de la consola central del cubo, §H[event_target:anomalous_cube_scientist.GetName]§! logró recuperar y descifrar dos breves registros de sonido. Reproducen una serie de chasquidos guturales y bruscas interrupciones glotales emitidos por una sola criatura. Al cotejarlos con nuestra base lingüística, §H[event_target:anomalous_cube_scientist.GetName]§! halló un idioma antiguo compatible y ofreció una traducción preliminar del primer registro:\n\n§L\"Mi presidio, escuchad mi ruego. Aún estamos a tiempo de impedir la guerra. Las dinastías se exceden en su confianza, no podemos vencer a [event_target:anomalous_cube_fallen_empire.GetName]. ¡Acabará por destruirnos!\".\n\n\"Nuestra única opción es conciliar. Mi contenedor porta un obsequio como ofrenda para la paz: los secretos de nuestra maestría con el metal vivo. Entregarlos es la única solución para no caer en el olvido\".§!"
 strange_worlds.2045.a: "Traduzcamos el segundo registro de sonido."
 strange_worlds.2050.name: "El prodigioso metal vivo"
 strange_worlds.2050.desc_intro: "Se ha traducido el segundo registro de sonido recuperado en la consola de mando del cubo.\n\n§L\"Mi presidio, os he fallado. Nuestra aniquilación está próxima y es inexorable.\n\nHan saboteado mi nave hexaédrica. Intentaré efectuar un aterrizaje de emergencia en [fromfrom.planet.GetName]. Aunque sobreviva, la ofrenda de paz no llegará a su destino. Tal y como temíamos, [event_target:anomalous_cube_fallen_empire.GetName] atacará\".§!\n\n§H[event_target:anomalous_cube_scientist.GetName]§! ha conseguido descifrar el mecanismo de cierre del contenedor. En su interior había una curiosa pepita de metal. Es especialmente maleable e hiperactiva, y no deja de adoptar nuevas e intrincadas formas cada pocos segundos."
 strange_worlds.2050.desc_no_war_lm: "\nPodemos quedarnos esta curiosidad para seguir estudiando el metal vivo, o podemos hacer lo que se proponían su antiguos dueños: ofrecérsela como regalo a [event_target:anomalous_cube_fallen_empire.GetName] para ganarnos su favor."
 strange_worlds.2050.desc_no_war_no_lm: "\nPodemos quedarnos esta curiosidad para seguir estudiando este impresionante metal, o podemos hacer lo que se proponían su antiguos dueños: ofrecérsela como regalo a [event_target:anomalous_cube_fallen_empire.GetName] para ganarnos su favor."
 strange_worlds.2050.desc_war_lm: "\nEntre el impresionante artefacto y la nave cuboide, podremos seguir ampliando nuestros conocimientos sobre el metal vivo."
 strange_worlds.2050.desc_war_no_lm: "\nEntre el impresionante artefacto y la nave cuboide, podremos seguir ampliando nuestros conocimientos sobre los compuestos metálicos y sus estructuras."
 strange_worlds.2050.a_no_war: "Se la daremos a [event_target:anomalous_cube_fallen_empire.GetName]."
 strange_worlds.2050.b_fallen_not_defeated_no_war: "Nos la quedamos."
 strange_worlds.3005.name: "Profeta sospechoso"
 strange_worlds.3005.desc: "Mientras observaba a la población local de §Y[event_target:pre_ftl_planet.GetName]§!, nuestro equipo externo realizó un interesante hallazgo.\n\nEn la capital, no paran de hablar de un \"Elegido\" que ha descendido de las estrellas para cumplir una antigua profecía y propiciar una nueva era de esplendor para los [event_target:pre_ftl_planet.Owner.GetSpeciesName].\n\nTodo nuestro personal está localizado, por lo que vale la pena investigar más a fondo a quienquiera que esté visitando este planeta."
 strange_worlds.3005.a: "Averiguad más."
 strange_worlds.3010.name: "Falso profeta"
 strange_worlds.3010.desc_intro: "El equipo externo encargado de investigar al \"Elegido\" de §Y[event_target:pre_ftl_planet.GetName]§! ha descubierto su verdadera identidad.\n\n"
 strange_worlds.3010.desc_no_megacorp: "Un §Ynómada namariano§! se hizo pasar por una figura central de la mitología [event_target:pre_ftl_planet.Owner.GetSpeciesName] tras haber \"descendido de las estrellas\"."
 strange_worlds.3010.desc_megacorp: "Un caravanero §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§! se hizo pasar por una figura central de la mitología [event_target:pre_ftl_planet.Owner.GetSpeciesName] tras haber \"descendido de las estrellas\"."
 strange_worlds.3010.desc_outro: "\nUna mayor exploración del planeta ha revelado que su nave estrellada e inoperable está escondida en un valle inaccesible a cierta distancia de la capital. A juzgar por el modelo anticuado de los hiperimpulsores, ya lleva algún tiempo aquí.\n\nTras quedar varado, parece que se aprovechó de las supersticiones locales. Aceptó de buena gana los cánticos y alabanzas de los lugareños, que lo proclamaron como el sabio gobernante del \"conocimiento celestial\".\n\nSi no se controla, la presencia de este charlatán en el planeta probablemente tendrá graves consecuencias para la sociedad en desarrollo. Será mejor que intervengamos."
 strange_worlds.3010.a: "Vamos a exponer su pantomima."
 strange_worlds.3010.b: "Ofrezcámonos a rescatarlo."
 strange_worlds.3015.name: "Verdad revelada"
 strange_worlds.3015.desc_no_megacorp: "Hemos conseguido deponer en §Y[event_target:pre_ftl_planet.GetName]§! al §Ynómada namariano§! que se hacía pasar por \"el Elegido\" de la mitología [event_target:pre_ftl_planet.Owner.GetSpeciesName]."
 strange_worlds.3015.desc_megacorp: "Hemos conseguido deponer en §Y[event_target:pre_ftl_planet.GetName]§! al §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§! que se hacía pasar por \"el Elegido\" de la mitología [event_target:pre_ftl_planet.Owner.GetSpeciesName]."
 strange_worlds.3015.desc_outro: "\nDespués de investigar las leyendas locales con más detalle, hemos podido convencer a la clase dirigente de que su supuesto Elegido era en realidad un demonio enviado para engañarlos y sumir al planeta en mil años de oscuridad.\n\nHemos conseguido desguazar la nave estrellada para obtener repuestos, y no hemos dejado rastro para que los lugareños no la encuentren. Sin embargo, ya se habían descubierto algunos objetos personales que han dado a esta especie la oportunidad de vislumbrar una tecnología que va más allá de su comprensión actual."
 strange_worlds.3015.a: "Desafortunado."
 strange_worlds.3020.name: "De vuelta a casa"
 strange_worlds.3020.desc_intro: "Nuestro equipo externo ha podido reunirse en privado con el \"Elegido\" de §Y[event_target:pre_ftl_planet.GetName]§! y ofrecerle nuestros servicios para reparar su nave y devolverla al espacio.\n\n"
 strange_worlds.3020.desc_no_megacorp: "El §Ynómada namariano§! estaba ansioso por aceptar la oferta, y explicó que, tras quedar varado en §Y[event_target:pre_ftl_planet.GetName]§!, lo habían confundido con un dios y, desde entonces, vivía con el temor de que le hicieran daño si era desenmascarado. "
 strange_worlds.3020.desc_megacorp: "El §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§! estaba ansioso por aceptar la oferta, y explicó que, tras quedar varado en §Y[event_target:pre_ftl_planet.GetName]§!, lo habían confundido con un dios y, desde entonces, vivía con el temor de que le hicieran daño si era desenmascarado."
 strange_worlds.3020.desc_outro: "\nDespués de llevarlo hasta nuestro puesto de investigación y reparar su nave, el agradecido viajero nos ha regalado una buena parte de su inventario antes de despedirse.\n\nEl vacío de poder que ha generado su partida ha provocado un breve pero intenso conflicto entre varias sectas religiosas de §Y[event_target:pre_ftl_planet.GetName]§! que ya se ha calmado."
 strange_worlds.3020.a: "Fascinante."
 strange_worlds.3025.name: "[event_target:nomad01_country.GetName]"
 strange_worlds.3025.desc: "Saludos [Owner.GetSpeciesName]. Tenemos entendido que habéis tratado con un namariano renegado que se había apartado de nuestra flota.\n\nNos habéis prestado un servicio. Este individuo descarriado era una molestia constante y sus ambiciones salvajes suponían un riesgo para nuestro viaje.\n\nPor favor, aceptad este regalo como agradecimiento."
 strange_worlds.3025.a: "Muchas gracias."
 strange_worlds.3030.name: "[event_target:caravaneer_home_country.GetName]"
 strange_worlds.3030.desc: "¿Que los [Owner.GetSpeciesNamePlural] se han encargado del §Yestafador§! ambulante? ¡Qué gran noticia! Ese idiota no nos causaba más que problemas. Sus desvaríos eran bochornosos, y es la quinta vez que esto ocurre. La verdad es que nos alegra que se haya ido.\nPor favor, aceptad este regalo por deshaceros de nuestro problema. Es muy valioso, y solo os lo ofreceremos una vez."
 strange_worlds.3030.a: "Muchas gracias."
 strange_worlds.3040.name: "Lo que dejamos atrás"
 strange_worlds.3040.desc: "Nuestro puesto de observación sobre §Y[event_target:pre_ftl_planet.GetName]§! ha informado de que faltan cajas de suministros, tras un reciente estudio geológico en la superficie.\n\nAl rastrear los geolocalizadores de los suministros, hemos descubierto que un pueblo local había encontrado dichos recursos y se los había apropiado.\n\nEl descubrimiento de nuestros contenedores de almacenamiento puede tener un efecto adverso en el desarrollo de la sociedad [event_target:pre_ftl_planet.Owner.GetSpeciesAdj]."
 strange_worlds.3040.a: "Desafortunado."
 strange_worlds.3045.name: "Devolver al remitente"
 strange_worlds.3045.desc_common: "Parece que el inventario extraviado en §Y[event_target:pre_ftl_planet.GetName]§! ha tenido un extraño impacto en la cultura nativa.\n\nLa población [Root.GetPreFTLUpper] ha construido burdas imitaciones de nuestras lanzaderas de observación. Aunque estas \"naves\" obviamente no funcionan, esto demuestra que nuestros investigadores fueron descubiertos por los lugareños durante su estudio.\n\nBajo la dirección de un anciano local, se puede ver a los [event_target:pre_ftl_planet.Owner.GetSpeciesName] realizando una imitación de nuestro procedimiento de análisis geológico del suelo: llenan de tierra y rocas nuestras cajas extraviadas, las cargan en sus \"naves\" y esperan pacientemente."
 strange_worlds.3045.desc_non_homicidal: "\nLos [event_target:pre_ftl_planet.Owner.GetSpeciesName] tienen la impresión de que aparecerán más suministros si imitan nuestros procesos. Deberíamos intervenir antes de que este comportamiento afecte a su sociedad en general."
 strange_worlds.3045.desc_homicidal: "\nEn última instancia, esta práctica es inútil; solo les espera la muerte."
 strange_worlds.3045.a_normal: "Recuperemos nuestros contenedores en secreto."
 strange_worlds.3045.a_megacorp: "Recuperemos discretamente nuestros activos."
 strange_worlds.3045.b_normal: "Cambiaremos alimentos por sus minerales."
 strange_worlds.3045.b_megacorp: "¡Hagamos un trueque!"
 strange_worlds.3045.c: "Sacrificad a estos primitivos."
 strange_worlds.3045.ct: "El puesto de observación que vigila §Y[event_target:pre_ftl_planet.GetName]§! ahora produce $@observation_outpost_crate_minerals_production$ $i_minerals$ con un mantenimiento de $@observation_outpost_crate_food_upkeep$ $i_food$."
 strange_worlds.3050.name: "Ausencia resentida"
 strange_worlds.3050.desc: "Tras recuperar nuestros contenedores perdidos en §Y[event_target:pre_ftl_planet.GetName]§!, el ritual de carga de la \"nave\" se han prolongado durante un rato, hasta que los enfurecidos lugareños [event_target:pre_ftl_planet.Owner.GetSpeciesName] se han vuelto contra el anciano de su aldea, arrojándolo a la lanzadera improvisada antes de reducirla a cenizas.\n\nAunque la población ha vuelto a sus rutinas previas, su cultura conserva un persistente resentimiento hacia la \"gente del cielo\"."
 strange_worlds.3050.a: "Lo tendremos en cuenta."
 strange_worlds.3060.name: "Servicio cancelado"
 strange_worlds.3060.desc: "Dado el avance de la sociedad [Root.GetPreFTLLower] [event_target:pre_ftl_planet.Owner.GetSpeciesName], hemos dejado de intercambiar alimentos por minerales desde nuestro puesto de observación.\n\nA pesar de ser un experimento interesante, la continua interferencia con su civilización conlleva el riesgo de exponer prematuramente nuestra presencia ante ellos."
 strange_worlds.3060.a: "Una medida razonable."
 strange_worlds.3060.ct: "El puesto de observación ya no produce minerales y ya no requiere un mantenimiento de alimentos."
 strange_worlds.3070.name: "Anomalía orbital"
 strange_worlds.3070.desc: "Una anomalía gravitatoria ha sacado de órbita nuestro puesto de observación sobre §Y[event_target:pre_ftl_planet.GetName]§!, haciéndolo caer brevemente en la atmósfera inferior del planeta.\n\nAunque nuestra tripulación está ilesa y nuestra trayectoria original ha sido restaurada, existe la preocupación de que la estación haya podido ser detectada desde la superficie por los [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural].\n\nSolo el tiempo dirá si nos hemos expuesto a los lugareños, y hasta qué punto eso repercutirá en su sociedad."
 strange_worlds.3070.a: "Continuad observándolos."
 strange_worlds.3075.name: "Escaleras al cielo"
 strange_worlds.3075.desc_common: "Con una primitiva tecnología de captura de imágenes han conseguido grabar nuestro puesto de observación mientras estaba en la órbita baja de §Y[event_target:pre_ftl_planet.GetName]§!. Junto con los testimonios de testigos, estas fotografías han inspirado a algunas naciones a construir \"escaleras al cielo\" para seguir investigando.\n\nAunque obviamente se trata de un esfuerzo fútil, la competencia entre naciones estado está teniendo un efecto desestabilizador. Viejas tensiones se agudizan en la carrera por completar la primera \"escalera\", alimentadas por el orgullo nacional y la escasez de recursos."
 strange_worlds.3075.desc_non_homicidal: "\nSi logramos desacreditar sus pruebas sobre nuestra supuesta existencia, quizá podamos calmar las tensiones antes de que la situación se descontrole.\n\nAlternativamente, esta postura diplomática entre poderes políticos [Root.GetPreFTLUpper] podría ser un estudio de caso sociológico interesante, aunque conlleva el riesgo de una escalada violenta."
 strange_worlds.3075.desc_homicidal: "\nEl caos inminente debería generar una excelente oportunidad de investigación."
 strange_worlds.3075.a: "Desacreditad las pruebas de nuestra existencia."
 strange_worlds.3075.b: "Continuad observándolos."
 strange_worlds.3075.b_ct: "El rendimiento de investigación £society£ §Ysocial§! del puesto de observación se multiplica por dos."
 strange_worlds.3080.name: "La verdad está ahí fuera"
 strange_worlds.3080.desc: "Nuestros agentes han logrado desacreditar las pruebas de nuestra existencia en §Y[event_target:pre_ftl_planet.GetName]§!.\n\nUna vez refutadas las imágenes y destruida la credibilidad de los testigos oculares, se ha interrumpido la construcción de las \"escaleras al cielo\". Avergonzadas por su insensatez, las naciones antes divididas se han comprometido a seguir la investigación racional y el método científico.\n\nLas obras de construcción de las escaleras se han reconvertido en centros de enseñanza superior, a medida que una nueva oleada de eruditos se reúne para desmontar los mitos de la \"ciudadela del cielo\"."
 strange_worlds.3080.a: "$FASCINATING$"
 strange_worlds.3080.a_ct: "[event_target:pre_ftl_country.GetName] avanza un 50% hacia la siguiente edad.\n[event_target:pre_ftl_country.GetName] se convierte en materialista."
 strange_worlds.3085.name: "La gran guerra de las escaleras"
 strange_worlds.3085.desc: "En su empeño por construir \"escaleras al cielo\", las tensiones entre las naciones [Root.GetPreFTLLower] de §Y[event_target:pre_ftl_planet.GetName]§! desembocaron en un conflicto global. Los últimos dos años de la carnicería conocida como la \"gran guerra de las escaleras\", durante los que han tenido que luchar por los recursos cada vez más escasos, por fin han llegado a su fin.\n\nLas condiciones clave del tratado de paz incluyen formar un frente unido contra su enemigo común, la \"ciudadela del cielo\". A medida que los [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] reconstruyen su mundo devastado, su creciente paranoia y odio a lo desconocido harán que las futuras interacciones con ellos sean más difíciles."
 strange_worlds.3085.a: "Lidiaremos con ese problema cuando se presente."
 strange_worlds.3085.a_ct: "La producción de investigación £society£ §Ysocial§! desde el puesto de observación vuelve a la normalidad."
 create_hibernators_pops_ct: "Crea $@hibernators_pops_created|*0$ poblaciones £job_pre_sapient£ preinteligentes con el rasgo §Y$trait_seasonal_dormancy$§!"
 pm_bleeding_planet: "El planeta se desangra"
 pm_bleeding_planet_desc: "La propia tierra sangra. Se recomienda precaución al remover el suelo que pisan los colonos.\n"
 pm_contruction_coagulate: "Construcciones coagulares"
 pm_contruction_coagulate_desc: "La propia tierra sangra a causa de la presencia colonizadora. El viscoso lodo actúa como un adhesivo natural que parece peligroso.\n"
 pm_hemosymbiosis: "Hemosimbiosis"
 pm_hemosymbiosis_desc: "Un extraño efluvio del interior de este planeta influye en el desarrollo. Los tiempos de construcción y los esfuerzos mineros se benefician de esta sustancia a costa del crecimiento de la colonia.\n"
 pm_parasitic_production: "Producción parasitaria"
 pm_parasitic_production_desc: "Las formas de vida parasitaria de este planeta se han reutilizado, aumentando la productividad de todos los trabajadores.\n"
 pm_frying_fauna: "Fauna frita"
 pm_frying_fauna_desc: "La megafauna de este mundo prospera en condiciones optimizadas. Sus enzimas digestivas únicas son útiles para refinar las aleaciones. "
 pm_frying_fauna_machine: "$pm_frying_fauna$"
 pm_frying_fauna_machine_desc: "$pm_frying_fauna_desc$"
 pm_frying_fauna_2: "$pm_frying_fauna$"
 pm_frying_fauna_2_desc: "Los cosechadores electrificados convierten la megafauna de este mundo en un suministro constante de nutrientes."
 pm_frying_fauna_2_machine: "$pm_frying_fauna$"
 pm_frying_fauna_2_machine_desc: "$pm_frying_fauna_2_desc$"
 pm_catalytic_excrement: "Excrementos catalíticos"
 pm_catalytic_excrement_ct: "La megafauna de este mundo prospera en condiciones optimizadas. Sus enzimas digestivas únicas son útiles para refinar las aleaciones."
 pm_strange_sandstorm: "Extrañas tormentas de arena"
 pm_strange_sandstorm_ct: "Los fenómenos singulares que se producen en las arenas del planeta afectan a las operaciones de esta colonia."
 pm_perpetual_lightning: "Rayos perpetuos"
 pm_perpetual_lightning_desc: "Los cristales irradiados expuestos durante una anomalía en la terraformación han creado el entorno meteorológico perfecto para una tormenta eléctrica perpetua en todo el planeta."
 pm_dark_matter_geyser: "Géiser de materia oscura"
 pm_dark_matter_geyser_desc: "El planeta se hunde en un miasma de materia oscura."
 pm_population_quarantine: "Cuarentena de la población"
 pm_population_quarantine_desc: "La población está en cuarentena mientras se investigan los efectos de la petrificación de la materia oscura."
 pm_dark_matter_statue: "Estatuas de materia oscura"
 pm_dark_matter_statue_desc: "Se pueden encontrar cascarones petrificados de materia oscura solidificada esparcidos por todo el planeta. Estos lúgubres restos de una antigua población brindan cierta oportunidad de investigación."
 pm_raining_corpses: "Lluvia de cadáveres"
 pm_raining_corpses_desc: "Las densas nubes que antaño fueron utilizadas como lugar de enterramiento por una raza alienígena ahora se están disolviendo, lo que provoca que el contenido de las tumbas de nubes caiga a la superficie planetaria."
 pm_raining_corpses_tt: "£minor_artifacts£ $minor_artifacts$ por trabajos de $WORKERS$ £job£"
 pm_raining_corpses_no_ancrel: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_desc: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_tt: "£consumer_goods£ $consumer_goods$ por trabajos £pop_cat_worker£ $pop_cat_worker$ £job£"
 pm_revolting_pests: "Plagas repugnantes"
 pm_revolting_pests_desc: "Los animales de este planeta son fascinantes, pero repugnantes. No es recomendable acercarse a estas criaturas."
 pm_gaseous_fauna: "Fauna gaseosa"
 pm_gaseous_fauna_desc: "Una especie domesticada de fauna autóctona proporciona entretenimiento y secreciones gaseosas aprovechables para la población planetaria."
 pm_gaseous_fauna_ct: "Toda la £pop£ población produce §G$@gaseous_fauna_exotic_gases_production$§! $i_exotic_gases$"
 pm_urban_privilege_regular: "Privilegio urbano"
 pm_urban_privilege_regular_desc: "Tomar partido por los distritos urbanos en una disputa local ha puesto nerviosos a los distritos rurales."
 pm_urban_privilege_broken_shackles: "$pm_urban_privilege_regular$"
 pm_urban_privilege_broken_shackles_desc: "$pm_urban_privilege_regular_desc$"
 pm_rural_privilege_regular: "Privilegio rural"
 pm_rural_privilege_regular_desc: "Tomar partido por los distritos rurales en una disputa local ha puesto nerviosos a los distritos urbanos."
 pm_rural_privilege_broken_shackles: "$pm_rural_privilege_regular$"
 pm_rural_privilege_broken_shackles_desc: "$pm_rural_privilege_regular_desc$"
 pm_peacekeeper_deployment: "Despliegue del personal de paz"
 pm_peacekeeper_deployment_desc: "Se están llevando a cabo esfuerzos adicionales de mantenimiento de la paz mientras resolvemos las disputas del distrito."
 bacterial_drive_modifier_desc: "Los suministros de agua infundidos con suplementos bacterianos modificados genéticamente inspiran un extraordinario compromiso de la población con un objetivo común singular."
 pm_bd_reproduction: "Impulso bacteriano: reproducción"
