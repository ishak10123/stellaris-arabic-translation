 pm_bd_creativity: "Impulso bacteriano: creatividad"
 pm_bd_creativity_desc: "$bacterial_drive_modifier_desc$"
 ladder_wars_pre_ftl: "El legado de la gran guerra de las escaleras"
 ladder_wars_pre_ftl_desc: "A medida que este mundo devastado por la guerra se reconstruye, su creciente paranoia hace que las interacciones con los demás sean un desafío para todos los involucrados."
 living_metal_mega_construction_insight: "Conocimientos de megaconstrucción con metal vivo"
 living_metal_mega_construction_insight_desc: "El artefacto de metal vivo que recuperamos nos ha proporcionado un conocimiento increíble sobre el desarrollo de megaestructuras."
 living_metal_mega_construction_insight_ct: "Coste básico del edicto de megaconstrucción con metal vivo: §G-50%§!"
 d_coagulated_landscape: "Paisaje coagulado"
 d_coagulated_landscape_desc: "Un exudado viscoso surge de la superficie planetaria y se solidifica para formar un material peligroso casi impenetrable. Esto reduce el espacio disponible para construir de forma segura."
 d_shimmering_structure: "Estructura titilante"
 d_shimmering_structure_desc: "Una estructura grande y titilante de origen desconocido."
 d_geothermal_hotspot: "Punto de acceso geotérmico"
 d_geothermal_hotspot_desc: "Este planeta cuenta con un yacimiento geotérmico excepcional que proporciona energía y oportunidades de investigación."
 d_ancient_cloaking_array: "Dispositivo de camuflaje antiguo"
 d_ancient_cloaking_array_desc: "La colonia se beneficia de la presencia de un antiguo dispositivo de camuflaje alienígena. A los enemigos no les resultará fácil lanzar un ataque. Los colonos pueden sentirse seguros aquí."
 d_psionic_sands: "Arenas psiónicas"
 d_psionic_sands_desc: "Las arenas de este planeta tienen altas concentraciones de zro presentes en todas partes. Es posible comunicarse con ellas."
 d_mountains_of_steel: "Montañas de acero"
 d_mountains_of_steel_desc: "Forjadas en el calor extremo de la terraformación, estas vastas e inflexibles montañas sirven como ricos depósitos de recursos."
 d_lava_tubes: "Túneles de lava"
 d_lava_tubes_desc: "El magma fluye y forja aquí túneles profundos y ricos en minerales. Estos productos presentan lucrativas oportunidades mineras."
 d_lava_tubes_ct: "$t$Coste de mantenimiento de £energy£ por trabajos de [miner.GetIcon] [miner.GetName]: §R+$@lava_tubes_mining_job_upkeep$§!"
 d_lava_tubes_ct_short: "§R+$@lava_tubes_mining_job_upkeep$§! al coste de mantenimiento de £energy£ por trabajos de [miner.GetIcon] [miner.GetName]"
 d_hydroactive_eggs: "Huevos hidroactivos"
 d_hydroactive_eggs_desc: "Aquí el agua está fácilmente disponible en el entorno natural, lo que da lugar a tasas de reproducción de la fauna autóctona extraordinariamente altas."
 d_explosive_atmosphere: "Atmósfera explosiva"
 d_explosive_atmosphere_desc: "La concentración de motas volátiles en el aire hace que la atmósfera de este planeta sea altamente combustible."
 d_explosive_atmosphere_ct: "$t$£volatile_motes£ §Y$volatile_motes$§! por trabajos de [mote_harvester.GetIcon] $mote_harvester$: §G+50%§!"
 d_explosive_atmosphere_ct_short: "§G+50%§! de £volatile_motes£ §Y$volatile_motes$§! por trabajos de [mote_harvester.GetIcon] $mote_harvester$"
 d_blue_lava: "Lava azul"
 d_blue_lava_desc: "El proceso de terraformación ha provocado una reacción entre el gas enriquecido y los depósitos de aleación en las profundidades del planeta, cubriendo su superficie con una fascinante lava azul."
 d_crystaline_growths: "Formaciones cristalinas"
 d_crystaline_growths_desc: "En este planeta hay una gran cantidad de formaciones cristalinas que pueden recolectarse para ser utilizadas."
 d_bogplants: "Plantas de pantano"
 d_bogplants_desc: "Los pantanos superácidos albergan una especie única de flora que segrega gases exóticos mientras se alimenta."
 d_liquid_dark_matter: "Materia oscura líquida"
 d_liquid_dark_matter_desc: "Un extraño géiser se ha convertido en un charco de materia oscura líquida."
 d_space_junk_hazards: "Basura espacial peligrosa"
 d_space_junk_hazards_desc: "Los desechos espaciales en órbita suponen un peligro para el acceso de las lanzaderas y las estructuras de superficie cuando caen a la atmósfera del planeta."
 trait_inner_darkness: "Oscuridad interior"
 trait_inner_darkness_desc: "Sus cuerpos, mejorados tras la saturación de materia oscura, ahora emiten trazas de partículas no bariónicas a intervalos regulares, pero agotarán su esperanza de vida más rápidamente."
 trait_inner_darkness_tt: "£sr_dark_matter£ $produced_per_pop_group_unit$ £pop£ Poblaciones: §G+$@inner_darkness_dark_matter_production$§!"
 trait_geleboric_mutations: "Mutaciones gelebóricas"
 trait_geleboric_mutations_desc: "Reacciones desafortunadas a la experimentación alteraron drásticamente la fisiología de esta especie."
 trait_psionic_ephapse: "Efapsis psiónica"
 trait_psionic_ephapse_desc: "Tras una exposición prolongada a bacterias que alteran la mente, el sistema digestivo de esta especie produce probióticos psiónicos que promueven la comunicación telepática entre los individuos afectados."
