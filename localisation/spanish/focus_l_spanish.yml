 core.132.desc: ""
 core.132.hint: "Construye un £district£ ['concept_generator_district'] en la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view']."
 core.132.lore: "§L\"La energía es el medio por el cual todo cobra forma\". - El Abdbaal§!"
 core.132.req: "Ha construido un distrito generador"
 core.132.fail: "£trigger_no£ $core.132.req$"
 core.132.success: "£trigger_yes£ $core.132.req$"
 core.132_1.name: "Construir un campo fotosintético"
 core.132_1.hint: "Construye un £district£ §Ccampo fotosintético§! en la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view']."
 core.132_1.lore: "§L\"El mundo se bebió la luz como nosotros nos bebemos el agua\".- Zosira K'Tun§!"
 core.132_1.req: "Ha construido un distrito de campo fotosintético"
 core.132_1.fail: "£trigger_no£ $core.132_1.req$"
 core.132_1.success: "£trigger_yes£ $core.132_1.req$"
 core.134.name: "Construir un distrito minero"
 core.134.desc: ""
 core.134.hint: "Construye un £district£ ['concept_mining_district'] en la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view']."
 core.134.lore: "§L\"Un mundo no es rico por su cielo, sino por su tierra. Excavemos hondo, y la prosperidad vendrá sola\".§!"
 core.134.req: "Ha construido un distrito minero"
 core.134.fail: "£trigger_no£ $core.134.req$"
 core.134.success: "£trigger_yes£ $core.134.req$"
 core.134_1.name: "Construir una montaña hueca"
 core.134_1.hint: "Construye una £district£ §Cmontaña hueca§! en la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view']."
 core.134_1.lore: "§LAl igual que un árbol, una montaña alberga maná que se puede aprovechar\".§!"
 core.134_1.req: "Ha construido un distrito de montaña hueca"
 core.134_1.fail: "£trigger_no£ $core.134_1.req$"
 core.134_1.success: "£trigger_yes£ $core.134_1.req$"
 core.136.name: "Construir un distrito agrícola"
 core.136.desc: ""
 core.136.hint: "Construye un £district£ ['concept_farming_district'] en la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view']."
 core.136.lore: "§L\"La primera cosecha fue escasa, pero fue probar el primer grano y saber que este mundo podría sustentarnos\".§!"
 core.136.req: "Ha construido un distrito agrícola"
 core.136.fail: "£trigger_no£ $core.136.req$"
 core.136.success: "£trigger_yes£ $core.136.req$"
 core.136_1.name: "Construir un vergel boscoso"
 core.136_1.hint: "Construye un £district£ §Cvergel boscoso§! en la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view']."
 core.136_1.lore: "§L\"Si se respeta su abundancia, el mundo prosperará\".§!"
 core.136_1.req: "Ha construido un distrito de vergel boscoso"
 core.136_1.fail: "£trigger_no£ $core.136_1.req$"
 core.136_1.success: "£trigger_yes£ $core.136_1.req$"
 core.138.name: "Promulgar una decisión planetaria"
 core.138.desc: ""
 core.138.hint: "Abre la lista de ['concept_decisions'] planetarias en la sección $colony_view_tab_management$ de la £interface£ ['concept_colony_view'] para activar una."
 core.138.lore: "§L\"A los colonos les encanta el liderazgo decisivo, hasta que no están de acuerdo con la decisión\".§!"
 core.138.req: "Ha promulgado una decisión planetaria"
 core.138.fail: "£trigger_no£ $core.138.req$"
 core.138.success: "£trigger_yes£ $core.138.req$"
 ##########################
 # Exploration Focus Cards
 ##########################
 exploration.100.name: "Investigar una anomalía"
 exploration.100.desc: ""
 exploration.100.hint: "Tras descubrir una £anomaly£ ['concept_anomaly'], asigna a un £scientist£ ['concept_scientist'] para que la investigue a fondo."
 exploration.100.lore: "§L\"Las señales ordinarias no existen. Cada destello y eco significa algo. La cuestión es qué significan\".§!"
 exploration.100.req: "Ha investigado una anomalía"
 exploration.100.fail: "£trigger_no£ $exploration.100.req$"
 exploration.100.success: "£trigger_yes£ $exploration.100.req$"
 exploration.105.name: "Sondear un sistema"
 exploration.105.desc: ""
 exploration.105.hint: "Usa una £science_ship£ ['concept_science_ship'] para sondear por completo un nuevo £system£ ['concept_system']."
 exploration.105.lore: "§L\"Si no entendemos las estrellas que deseamos reclamar, no habrá expansión que valga\". - Introducción a la cartografía estelar, Edición n.º 7§!"
 exploration.105.req: "Ha sondeado un sistema"
 exploration.105.fail: "£trigger_no£ $exploration.105.req$"
 exploration.105.success: "£trigger_yes£ $exploration.105.req$"
 exploration.110.name: "Terminar un proyecto especial"
 exploration.110.desc: ""
 exploration.110.hint: "En la sección $situation_log_view_tab_situation_log$ de la £interface£ ['concept_situation_log_view'], busca un ['concept_special_project'] e investígalo."
 exploration.110.lore: "§L\"La gente piensa que lo peor es descifrar los datos, pero no. Lo peor es convencer a la gente de la importancia de nuestro hallazgo\".§!"
 exploration.110.req: "Ha terminado un proyecto especial"
 exploration.110.fail: "£trigger_no£ $exploration.110.req$"
 exploration.110.success: "£trigger_yes£ $exploration.110.req$"
 exploration.115.name: "Encontrar vida alienígena"
 exploration.115.desc: ""
 exploration.115.hint: "Usa una £science_ship£ ['concept_science_ship'] para sondear nuevos £system£ ['concept_systems'] hasta descubrir vida alienígena."
 exploration.115.lore: "§L\"La búsqueda de vida alienígena no es una cuestión de si existe, sino de cuándo la encontraremos. Eso sí, una vez la encontremos, debemos preguntarnos si sabremos reconocerla\".§!"
 exploration.115.req: "Ha encontrado vida alienígena"
 exploration.115.fail: "£trigger_no£ $exploration.115.req$"
 exploration.115.success: "£trigger_yes£ $exploration.115.req$"
 exploration.120.name: "Obtener una opción de investigación permanente"
 exploration.120.desc: ""
 exploration.120.hint: "Investiga £anomaly£ ['concept_anomalies'], £archaeology£ ['concept_archaeology_site'] y ['concept_debris'] de batallas espaciales. En algunos casos, obtendrás una §Hopción de investigación permanente§! que estará disponible hasta que concluya la investigación."
 exploration.120.lore: "§L\"El verdadero progreso, más que un salto, son mil pasos calculados hacia lo desconocido\". - Principios de la investigación científica, Vol. III§!"
 exploration.120.req: "Tiene una opción de investigación permanente"
 exploration.120.fail: "£trigger_no£ $exploration.120.req$"
 exploration.120.success: "£trigger_yes£ $exploration.120.req$"
 exploration.125.name: "Contratar a un científico"
 exploration.125.desc: ""
 exploration.125.hint: "Contrata a un ['concept_leader'] de la clase £scientist£ ['concept_scientist'] en la £interface£ ['concept_leaders_view'].$focus_other$"
 exploration.125.lore: "§L\"¿Buscas a alguien capaz de cuadrar una singularidad cuántica y unos presupuestos? Pues buena suerte\".§!"
 exploration.125.req: "Ha contratado a un científico"
 exploration.125.fail: "£trigger_no£ $exploration.125.req$"
 exploration.125.success: "£trigger_yes£ $exploration.125.req$"
 exploration.200.name: "Acabar un yacimiento arqueológico"
 exploration.200.desc: ""
 exploration.200.hint: "Asigna a un £scientist£ ['concept_scientist'] a un £archaeology£ ['concept_archaeology_site'], y guíalo en lo que suceda."
 exploration.200.lore: "§L\"Otra ominosa advertencia de otro imperio antiguo... Lo suyo es que hubieran aprendido la lección\".§!"
 exploration.200.req: "Ha acabado un yacimiento arqueológico"
 exploration.200.fail: "£trigger_no£ $exploration.200.req$"
 exploration.200.success: "£trigger_yes£ $exploration.200.req$"
 exploration.205.name: "Subir de nivel a un científico"
 exploration.205.desc: ""
 exploration.205.hint: "Asigna una £science_ship£ ['concept_science_ship'] dirigida por un £scientist£ ['concept_scientist'] para sondear £system£ ['concept_systems'] e investigar £anomaly£ ['concept_anomalies']. También puedes nombrarlo ['concept_governor'] o asignarlo al ['concept_council'].\n\nEstos cargos otorgan una gran experiencia que le permitirá subir de nivel y desarrollar ['concept_leader_traits'] nuevos."
