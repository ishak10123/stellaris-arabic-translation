 ###################
 # Core Focus Cards
 ###################
 core.100.name: "Se ha encontrado una colonia"
 core.100.desc: ""
 core.100.hint: "Usa una £colony_ship£ ['concept_colony_ship'] para colonizar un £planet£ ['concept_planet'] habitable."
 core.100.lore: "§L\"Un mundo nuevo no es solo un activo, sino una responsabilidad\". - Manual de operaciones coloniales, Edición n.º 223§!"
 core.100.req: "Ha fundado una colonia"
 core.100.fail: "£trigger_no£ $core.100.req$"
 core.100.success: "£trigger_yes£ $core.100.req$"
 core.102.name: "Determinar la designación de una colonia"
 core.102.desc: "(Que no sea la capital)"
 core.102.hint: "En una colonia que no sea la capital, ve a la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view'] y cambia la ['concept_designation']."
 core.102.lore: "§L\"Oficialmente, las designaciones de colonias mejoran la eficiencia. Extraoficialmente, son una forma de vender «las piedrecitas» como una estrategia económica\".§!"
 core.102.req: "Ha cambiado la designación de la colonia de un planeta"
 core.102.fail: "£trigger_no£ $core.102.req$"
 core.102.success: "£trigger_yes£ $core.102.req$"
 core.104.name: "Construir una estación minera"
 core.104.desc: ""
 core.104.hint: "Usa una £construction_ship£ ['concept_construction_ship'] para construir una £mining_station£ ['concept_mining_station'] sobre un ['concept_celestial_object'] apto."
 core.104.lore: "§L\"Donde unos ven un asteroide, nosotros vemos una montaña de créditos con la forma equivocada\".§!"
 core.104.req: "Ha construido una estación minera"
 core.104.fail: "£trigger_no£ $core.104.req$"
 core.104.success: "£trigger_yes£ $core.104.req$"
 core.106.name: "Construir un edificio"
 core.106.desc: ""
 core.106.hint: "En la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view'], haz clic en un §Hespacio de construcción§! y selecciona el £building£ ['concept_building'] que quieras construir."
 core.106.lore: "§L\"Lo que hoy es una zona en obras, mañana será una civilización\".§!"
 core.106.req: "Ha construido un edificio"
 core.106.fail: "£trigger_no£ $core.106.req$"
 core.106.success: "£trigger_yes£ $core.106.req$"
 core.108.name: "Construir un módulo de base estelar"
 core.108.desc: ""
 core.108.hint: "En la sección $starbase_view_tab_command$ de la £interface£ ['concept_starbase_view'], selecciona el §Hmódulo de base estelar§! disponible que desees construir."
 core.108.lore: "§L\"Nos prometieron aventuras, pero no nos dijeron nada de los meses en silencio y aire reciclado. Menos mal que el centro de comercio ya está operativo; por fin algo por lo que vale la pena quedarse\".§!"
 core.108.req: "Ha construido un módulo de base estelar"
 core.108.fail: "£trigger_no£ $core.108.req$"
 core.108.success: "£trigger_yes£ $core.108.req$"
 core.110.name: "Construir un edificio de base estelar"
 core.110.desc: ""
 core.110.hint: "En la sección $starbase_view_tab_command$ de la £interface£ ['concept_starbase_view'], selecciona la §Hbase estelar§! disponible que desees construir."
 core.110.lore: "§L\"La postura galáctica define la función de una base estelar; los edificios la refinan\". - Teoría y aplicaciones de la ingeniería orbital§!"
 core.110.req: "Ha construido un edificio de base estelar"
 core.110.fail: "£trigger_no£ $core.110.req$"
 core.110.success: "£trigger_yes£ $core.110.req$"
 core.112.name: "Adoptar una tradición"
 core.112.desc: ""
 core.112.hint: "Adopta una ['concept_tradition'] en la sección $society_management_view_tab_traditions$ de la £interface£ ['concept_society_management_view']."
 core.112.lore: "§L\"Un pueblo sin tradición no tiene rumbo, pero un pueblo ligado a ella se estanca. La sabiduría estriba en saber con cuál proceder\".§!"
 core.112.req: "Ha adoptado una tradición"
 core.112.fail: "£trigger_no£ $core.112.req$"
 core.112.success: "£trigger_yes£ $core.112.req$"
 core.114.name: "Activar un edicto"
 core.114.desc: ""
 core.114.hint: "Activa un ['concept_edict'] en la sección §H$government_view_tab_policies_and_edicts$§! de la £interface£ ['concept_society_management_view']."
 core.114.lore: "§L\"A la atención de los ciudadanos: el edicto 827-B se ha aprobado oficialmente. Consulten el párrafo 34, subsección 12, para informarse sobre todas las directrices que se han de cumplir. ¡Que pasen un día productivo!\".§!"
 core.114.req: "Ha activado un edicto"
 core.114.fail: "£trigger_no£ $core.114.req$"
 core.114.success: "£trigger_yes£ $core.114.req$"
 core.116.name: "Completar 3 órdenes del día"
 core.116.desc: ""
 core.116.hint: "Al completar un ['concept_agenda'], ejecútalo en la sección $government_view_tab_council$ de la £interface£ ['concept_government_view'] y selecciona otro."
 core.116.lore: "§L\"Un gobernante sin órdenes del día es como una nave estelar a la deriva\".§!"
 core.116.req: "Ha completado 3 órdenes del día"
 core.116.fail: "£trigger_no£ $core.116.req$"
 core.116.success: "£trigger_yes£ $core.116.req$"
 core.118.name: "Tener 1000 créditos energéticos"
 core.118.desc: ""
 core.118.hint: "Para recabar £energy£ ['concept_energy'], construye £district£ ['concept_generator_districts'] en la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view'].\n\nTambién puedes construir £mining_station£ ['concept_mining_stations'] en torno a ['concept_celestial_objects'] ricos en energía, comprar £energy£ §H$concept_energy$§! en el £market£ ['concept_market'] o a otros ['concept_empires'].$focus_other$"
 core.118.lore: "§L\"Los créditos no dan la felicidad, ¡pero puede que el comercio sí!\".§!"
 core.118.req: "Tiene 1000 créditos energéticos"
 core.118.fail: "£trigger_no£ $core.118.req$"
 core.118.success: "£trigger_yes£ $core.118.req$"
 core.120.name: "Tener 1000 minerales"
 core.120.desc: ""
 core.120.hint: "Para recabar £minerals£ ['concept_minerals'], construye £district£ ['concept_mining_districts'] en la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view'].\n\nTambién puedes construir £mining_station£ ['concept_mining_stations'] en torno a ['concept_celestial_objects'] ricos en minerales, comprar £minerals£ §H$concept_minerals$§! en el £market£ ['concept_market'] o a otros ['concept_empires'].$focus_other$"
 core.120.lore: "§L\"Si respiras demasiado hondo, los pulmones se te llenan de silicato, y si respiras demasiado suave, te desmayas. Pase lo que pase, la compañía lo descontará de tu sueldo\".§!"
 core.120.req: "Tiene 1000 minerales"
 core.120.fail: "£trigger_no£ $core.120.req$"
 core.120.success: "£trigger_yes£ $core.120.req$"
 core.122.name: "Tener 1000 de alimento"
 core.122.desc: ""
 core.122.hint: "Para recabar £food£ ['concept_food'], construye £district£ ['concept_farming_districts'] en la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view'].\n\nTambién puedes comprar £food£ §H$concept_food$§! en el £market£ ['concept_market'] o a otros ['concept_empires'].$focus_other$"
 core.122.lore: "§L\"Un imperio bien alimentado es un imperio fuerte. Un imperio que pasa hambre no tardará en ser propiedad de otro\".§!"
 core.122.req: "Tiene 1000 de alimento"
 core.122.fail: "£trigger_no£ $core.122.req$"
 core.122.success: "£trigger_yes£ $core.122.req$"
 core.124.name: "Tener 1000 bienes de consumo"
 core.124.desc: ""
 core.124.hint: "Para recabar £consumer_goods£ ['concept_consumer_goods'], construye £district£ ['concept_industrial_districts'] en la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view'], compra £consumer_goods£ §H$concept_consumer_goods$§! en el £market£ ['concept_market'] o a otros ['concept_empires'].$focus_other$"
 core.124.lore: "§L\"Los bienes de consumo promueven la innovación, la cultura y el entusiasmo general, ya sea un artículo de lujo, una herramienta avanzada o un sombrero bien chulo\".§!"
 core.124.req: "Tiene 1000 bienes de consumo"
 core.124.fail: "£trigger_no£ $core.124.req$"
 core.124.success: "£trigger_yes£ $core.124.req$"
 core.126.name: "Tener 1000 aleaciones"
 core.126.desc: ""
 core.126.hint: "Para recabar £alloys£ ['concept_alloys'], construye £district£ ['concept_industrial_districts'] en la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view'].\n\nTambién puedes comprar £alloys£ §H$concept_alloys$§! en el £market£ ['concept_market'] o a otros ['concept_empires'].$focus_other$"
 core.126.lore: "§L\"Puede que las aleaciones no sean el recurso más elegante, pero un acorazado no se construye con buenas intenciones\".§!"
 core.126.req: "Tiene 1000 aleaciones"
 core.126.fail: "£trigger_no£ $core.126.req$"
 core.126.success: "£trigger_yes£ $core.126.req$"
 core.127.name: "Construir un distrito colmena"
 core.127.desc: ""
 core.127.hint: "Construye un £district£ ['concept_hive_district'] en una £colony£ ['concept_colony']."
 core.127.lore: "§L\"Más túneles, más drones, más colmenas... No paran\".§!"
 core.127.req: "Ha construido un distrito colmena"
 core.127.fail: "£trigger_no£ $core.127.req$"
 core.127.success: "£trigger_yes£ $core.127.req$"
 core.127_1.name: "Construir un bioma comunal"
 core.127_1.hint: "Construye un £district£ §C$district_craglands$§! en una £colony£ ['concept_colony']."
 core.127_1.lore: "§LEl planeta ha sido...§!"
 core.127_1.req: "Ha construido un distrito de bioma comunal"
 core.127_1.fail: "£trigger_no£ $core.127_1.req$"
 core.127_1.success: "£trigger_yes£ $core.127_1.req$"
 core.128.name: "Construir un distrito urbano"
 core.128.desc: ""
 core.128.hint: "Construye un £district£ ['concept_city_district'] en la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view']."
 core.128.lore: "§L\"Una torre mide la ambición de su pueblo. Cuanto más alta la construyamos, más grandes serán sus sueños\".§!"
 core.128.req: "Ha construido un distrito urbano"
 core.128.fail: "£trigger_no£ $core.128.req$"
 core.128.success: "£trigger_yes£ $core.128.req$"
 core.129.name: "Construir un distrito nexo"
 core.129.desc: ""
 core.129.hint: "Construye un £district£ ['concept_nexus_district'] en una £colony£ ['concept_colony']."
 core.129.lore: "§L\"Más distritos nexo equivalen a más unidades. Es un plan sin fisuras, salvo que se detecte una divergencia. Entonces, toca recalibrar\".§!"
 core.129.req: "Ha construido un distrito nexo"
 core.129.fail: "£trigger_no£ $core.129.req$"
 core.129.success: "£trigger_yes£ $core.129.req$"
 core.130.name: "Construir un distrito industrial"
 core.130.desc: ""
 core.130.hint: "Construye un £district£ ['concept_industrial_district'] en la sección $colony_view_tab_planet_summary$ de la £interface£ ['concept_colony_view']."
 core.130.lore: "§L\"Nada representa mejor el progreso que una buena neblina industrial\".§!"
 core.130.req: "Ha construido un distrito industrial"
 core.130.fail: "£trigger_no£ $core.130.req$"
 core.130.success: "£trigger_yes£ $core.130.req$"
