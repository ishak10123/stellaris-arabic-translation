 whisperers_covenant_chain_title: "Los Susurradores del Vacío"
 whisperers_covenant_chain_desc: "Hemos creado un vínculo con una entidad del Velo llamada $whisperers_in_the_void_color_article$. Nos ha concedido migajas de su insondable poder por un precio, y seguramente no sean las últimas.\n\nNuestros [GetTelepathPlural] creen que el vínculo puede profundizarse más fácilmente si alineamos nuestras acciones con la voluntad de nuestro mecenas.\n\nLos Susurradores aprecian los conocimientos nuevos, los secretos y las conspiraciones. Se deleitan con la dicha de una mente tan rebosante que se agrieta."
 whisperers_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 whisperers_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 eater_covenant_chain_title: "El Devorador de Mundos"
 eater_covenant_chain_desc.intro: "Hemos creado un vínculo con una entidad del Velo llamada $the_eater_of_worlds_color_article$. Insaciable, nos concede migajas de su poder por un precio, y seguramente no serán las últimas.\n\nNuestros [GetTelepathPlural] creen que el vínculo se puede reforzar si alineamos nuestras acciones con la voluntad de nuestro mecenas."
 eater_covenant_chain_desc: "$eater_covenant_chain_desc.intro$\n\nEl hambre del Devorador no entiende de paciencia. Ansía la guerra y el dulce sabor de la lucha y el lamento."
 eater_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 eater_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 composer_covenant_chain_title: "El Compositor de Hebras"
 composer_covenant_chain_desc.intro: "Hemos creado un vínculo con una entidad del Velo llamada $the_composer_of_strands_color_article$. Como un refugio, nos concede migajas de su poder por un precio, y seguramente no serán las últimas.\n\nNuestros [GetTelepathPlural] creen que el vínculo se puede reforzar si alineamos nuestras acciones con la voluntad de nuestro mecenas."
 composer_covenant_chain_desc: "$composer_covenant_chain_desc.intro$\n\nEl Compositor ansía manipulaciones genéticas y que la carne sea libre de las ataduras de la evolución. Nos conmina a respetar la vida, la naturaleza y la carne como algo sagrado."
 composer_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 composer_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 instrument_covenant_chain_title: "El Instrumento del Deseo"
 instrument_covenant_chain_desc.intro: "Hemos creado un vínculo con una entidad del Velo llamada $the_instrument_of_desire_color_article$. Para consentirnos, nos concede migajas de su poder por un precio, y seguramente no serán las últimas.\n\nNuestros [GetTelepathPlural] creen que el vínculo se puede reforzar si alineamos nuestras acciones con la voluntad de nuestro mecenas."
 instrument_covenant_chain_desc: "$instrument_covenant_chain_desc.intro$\n\nEl Instrumento vive por y para los anhelos. Los placeres consentidos, la decadencia y la esclavitud claman al firmamento el nombre del Instrumento."
 instrument_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 instrument_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 utopia.2671.name: "Nuestro vínculo se estrecha más"
 utopia.2671.desc: "Cada vez comprendemos mejor a nuestro patrón. Para él, hemos pasado de ser una ocurrencia tardía a unos insectos en su hogar. Sin embargo, nos ha cogido aprecio, y en esta ocasión nos ha bendecido con otra pizca de su poder.\n\nNuestros telépatas están en mayor armonía con nuestro patrón, y su inspiración nos ha llevado a erigir un monumento que honre nuestro pacto: un lugar donde nuestros mejores telépatas puedan intentar comulgar con §Y[GetShroudPatron]§!."
 utopia.2671.a: "Nos sentimos más seguros al amparo del Compositor."
 utopia.2671.a.tt: "Ahora, nuestros telépatas producen un £pop£ §Ycrecimiento de población§! mayor.\n\nYa podemos construir un £building£ §Ysantuario del Compositor§! en uno de nuestros planetas."
 utopia.2671.b: "Nosotros también estamos hambrientos. La guerra puede saciarnos."
 utopia.2671.b.tt: "Ahora, nuestros telépatas producen una £mod_country_naval_cap_add£ capacidad naval mayor.\n\nYa podemos construir un £building£ §Ysantuario del Devorador§! en uno de nuestros planetas."
 utopia.2671.c: "No hay nada más hermoso que el deseo."
 utopia.2671.c.tt: "Ahora, nuestros telépatas producen más £amenities£ servicios.\n\nYa podemos construir un £building£ §Ysantuario del Instrumento§! en uno de nuestros planetas."
 utopia.2671.d: "En una mente llena, no hay espacio para la duda."
 utopia.2671.d.tt: "Ahora, nuestros telépatas producen más $r_research$.\n\nYa podemos construir un £building£ §Ysantuario de los Susurradores§! en uno de nuestros planetas."
 utopia.2676.name: "Potencial alcanzado"
 utopia.2676.desc: "Los misterios del §HVelo§! son demasiado extraños como para que nosotros los desvelemos, si bien nos hemos vuelto más afines a §Y[GetShroudPatron]§!. Allá donde vamos, lo sentimos detrás de nuestra mente, y su poder se filtra en nuestra realidad a través de las rendijas de nuestra psique."
 utopia.2676.a: "La voluntad de la carne es sagrada."
 utopia.2676.b: "La lucha es devoción."
 utopia.2676.c: "La ambición os obnubilará."
 utopia.2676.d: "El secretismo es seguridad."
 utopia.2681.name: "Retazos de poder"
 utopia.2681.desc: "Nuestro mecenas, §H[GetShroudPatron]§!, ha depositado una fracción de su energía en un pliegue del §HVelo§!, listo para quien la quiera. Nuestro estrecho vínculo permitirá a uno de los nuestros absorber y usar su poder con seguridad.\n\nSe han seleccionado a varios candidatos, pero solo a uno de ellos se le puede conceder el privilegio de ejercer el poder de nuestro mecenas. Tenemos que decidir quién será."
 utopia.2681.a: "§H[leader_1.GetTitle]§! [leader_1.GetName]"
 utopia.2681.b: "§H[leader_2.GetTitle]§! [leader_2.GetName]"
 utopia.2681.c: "§H[leader_3.GetTitle]§! [leader_3.GetName]"
 utopia.2681.d: "§H[leader_4.GetTitle]§! [leader_4.GetName]"
 utopia.2682.name: "Ascendente"
 utopia.2682.desc.intro: "Está hecho. A medida que el poder se invertía en [chosen_leader.GetName], todos los que estaban a su alrededor pudieron [GetFeelLoc] el peso de su presencia psiónica. Es poderosa y exige respeto. Ahora, será [GetImmortalLoc]."
 utopia.2682.desc.patron_champion: "$utopia.2682.desc.intro$ campeón del §H[GetShroudPatron]§!."
 utopia.2682.desc.shroudshaper_champion: "$utopia.2682.desc.intro$ $leader_trait_shroudshaper$ del §H[This.GetName]§!."
 utopia.2682.desc.previous_chosen_killed: "El acontecimiento ha tenido un efecto devastador en el hereje §H[previous_chosen_leader.GetName]§!, que en su día fue el Elegido de nuestro anterior mecenas. En su lugar de exilio, falleció en silencio cuando los últimos vestigios del poder psiónico de su quebrado organismo se desvanecieron."
 utopia.2682.desc.previous_chosen_lost_patron: "El evento ha afectado ostensiblemente a §H[chosen_leader_lost_patron.GetName]§!. Si bien todavía conserva una gran cantidad de energía psiónica, ha perdido el poder que le otorgó nuestro antiguo mecenas."
 utopia.2682.a: "Su destino era ser de los elegidos."
 utopia.2682.a.shroudshaper: "Este es su destino."
 utopia.2686.name: "Armamentos bendecidos"
 utopia.2686.desc: "El cónclave de Telépatas ha hecho progresos a la hora de dominar los poderes de nuestro mecenas, §H[GetShroudPatron]§!. Antes, nuestros individuos psiónicos eran los únicos capaces de comprender el alcance del pacto en toda su plenitud, pero ahora hemos diseñado un plan para que su poder fluya por naves enteras a una escala nunca vista.\n\nSi nos lo proponemos, la marca de §H[GetShroudPatron]§! hará que nuestras naves avancen más que nunca."
 utopia.2686.a: "¿Qué es un cascarón, aparte de carne?"
 utopia.2686.b: "Nuestras naves también están famélicas."
 utopia.2686.c: "Estos recipientes anhelan un propósito."
 utopia.2686.d: "Los secretos son unas armas sin parangón."
 building_composer_sanctum: "Santuario del Compositor"
 building_composer_sanctum_desc: "El santuario es un lugar dedicado a la comunión con el Compositor. [GetComposerSanctumDesc]"
 building_composer_sanctum_desc_default: "Aquí, la carne vaga tan libremente como el pensamiento, permitiendo que el Velo nos rehaga más allá de nuestras posibilidades."
 building_composer_sanctum_desc_machine: "Aquí, los circuitos funcionan sin impedimentos físicos. El Velo es capaz de optimizar nuestros procesadores más allá de nuestros parámetros convencionales."
 building_eater_sanctum: "Santuario del Devorador"
 building_eater_sanctum_desc: "El santuario es un lugar dedicado a la comunión con el Devorador. Aquí, el Velo nos prepara para la guerra mientras planeamos nuestro próxima [GetEaterSanctumDesc]."
 building_eater_sanctum_desc_machine: "conquista"
 building_eater_sanctum_desc_default: "comilona"
 building_instrument_sanctum: "Santuario del Instrumento"
 building_instrument_sanctum_desc: "El santuario es un lugar dedicado a la comunión con el Instrumento. [GetInstrumentSanctumDesc]"
 building_instrument_sanctum_desc_gestalt: "Aquí los excesos se acumulan, se sanean y se redistribuyen para promover la estabilidad de nuestro colectivo."
 building_instrument_sanctum_desc_default: "Aquí, amasamos las riquezas para después comerciar con ellas en un frenesí consumista que no nos acerca a la realización."
 building_whisperers_sanctum: "Santuario de los Susurradores"
 building_whisperers_sanctum_desc: "El santuario es un lugar dedicado a la comunión con los Susurradores. [GetWhisperersSanctumDesc]"
 building_whisperers_sanctum_desc_machine: "Aquí, intercambiamos secretos de manera críptica, traemos los nuevos conocimientos para sellarlos y sumamos nuestras señales al coro."
 building_whisperers_sanctum_desc_default: "Aquí, intercambiamos secretos mediante cuchicheos, traemos los nuevos conocimientos para sellarlos y sumamos nuestros murmullos al coro."
