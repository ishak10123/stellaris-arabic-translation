 opinion_invaded_mind: "Intento de invasión mental"
 utopia.3100.name: "Llamas y escombros"
 utopia.3100.desc_prefix: "[Root.Capital.GetName]... La visión se presenta borrosa, imprecisa. Sin embargo, no cabe duda: es [Root.Capital.GetName], nuestra capital."
 utopia.3100.desc_suffix: "\n\n§HNO UNO DE MUCHOS. SUCEDERÁ. TAN SEGURO COMO QUE EL SOL SE ALZA. ES VUESTRO DESTINO.§!\n\nLa visión termina tan rápido como empezó, dejando tras de sí un miasma de arremolinadas energías psiónicas."
 utopia.3100.desc_default: "$utopia.3100.desc_prefix$Las grandes ciudades parecen distintas, aunque familiares, a pesar del muro de llamas y humo que las oscurece. Miles... no, millones de cuerpos mutilados por las calles, todos [Root.GetSpeciesName]. El olor a podrido es insoportable.\n\n§HVUESTRO FUTURO.§!\n\nNo queda nada con vida en las ruinas. En el cielo sobre nuestras cabezas hay enormes instalaciones orbitales que han empezado a descender lenta e inexorablemente hacia el planeta, dejando una estela de humo tras de sí. ¿Estamos contemplando un posible futuro de muchos?$utopia.3100.desc_suffix$"
 utopia.3100.desc_hive: "$utopia.3100.desc_prefix$Las grandes ciudades parecen distintas, aunque familiares, a pesar del muro de llamas y humo que las oscurece. Miles... no, millones de cuerpos mutilados por las calles, todos [Root.GetSpeciesName]. Flota un penetrante olor a podrido.\n\n§HVUESTRO FUTURO.§!\n\nNo queda nada con vida en las ruinas. En el cielo sobre nuestras cabezas hay enormes instalaciones orbitales que han empezado a descender lenta e inexorablemente hacia el planeta, dejando una estela de humo tras de sí. ¿Estamos contemplando un posible futuro de muchos?$utopia.3100.desc_suffix$"
 utopia.3100.desc_machine: "$utopia.3100.desc_prefix$Las grandes ciudades parecen diferentes pero reconocibles, incluso a través del muro de llamas y humo. Miles... no, millones de unidades desmanteladas abarrotan las calles, todas ellas [Root.GetSpeciesName]. Nos cerca la destrucción.\n\n§HVUESTRO FUTURO.§!\n\nNo queda nada funcional en las ruinas. En el cielo sobre nuestras cabezas hay enormes instalaciones orbitales que han empezado a descender lenta e inexorablemente hacia el planeta, dejando una estela de humo tras de sí. ¿Estamos asistiendo a un posible futuro de muchos?$utopia.3100.desc_suffix$"
 utopia.3100.a: "§GCanalizar las energías en un avatar.§!"
 utopia.3100.b: "§YBeneficio: alcance de sensores aumentado.§!"
 utopia.3100.c: "§RBeneficio: fuerza de escudos aumentada.§!"
 utopia.3110.name: "Apariciones beligerantes"
 utopia.3110.desc: "El Velo se muestra tempestuoso en esta zona. A medida que se canalizan corrientes masivas de energía psiónica pura, las reacciones violentas dan lugar a apariciones semiinteligentes.\n\nEstos confusos espíritus a menudo chocan entre sí y liberan portentosas cantidades de poder psíquico en combates que pueden durar milenios. De hecho, parece que ahora mismo están teniendo lugar varios duelos.\n\nDebemos ser cautelosos."
 utopia.3120.name: "Visitantes psiónicos"
 utopia.3120.desc_suffix: "Son visitantes, como nosotros, una poderosa sonda psiónica hecha con mentes extremadamente alienígenas tanto para nosotros como para el Velo.\n\nCuando su eco psiónico toca el nuestro, se manifiesta en nuestro interior una tenue imagen: enormes criaturas orgánicas flotan en una densa atmósfera gaseosa, atendidas por criaturas más pequeñas."
 utopia.3120.desc_machine: "En las regiones más profundas del Velo, detectamos una presencia. $utopia.3120.desc_suffix$"
 utopia.3120.desc_default: "En las regiones más profundas del Velo, se hace notar de repente una presencia. $utopia.3120.desc_suffix$"
 utopia.3130.name: "Arenas eternas"
 utopia.3130.desc: "Un desierto infinito se extiende ante nosotros. Hemos estado aquí antes.\n\n§H\"¿Shala'kul milem zunak?\"§!\n\nAlgo emerge de la arena. Es difícil distinguirlo.\n\n§H\"Zharabi, melasuk.\"§!\n\nLas palabras, dichas por una boca para la que no fueron diseñadas, son como truenos. Sentimos que debemos responder."
 utopia.3130.a: "Shashka malak."
 utopia.3130.b: "¡Tirit nali dasumara!"
 utopia.3130.c: "Kunak de'Kirak."
 utopia.3140.name: "Las multitudes"
 utopia.3140.desc_common: "la naturaleza de nuestra existencia se expone ante nosotros. Un multiverso en el que miles de galaxias como la nuestra están enzarzadas en un ciclo sin fin de conflicto.\n\nComienza, finaliza y comienza de nuevo. Cada vez con billones de"
 utopia.3140.desc_suffix: "§H\"Así es\"§!, susurra una voz, §H\"y así será siempre\"§!."
 utopia.3140.desc_default: "De repente, en un lacerante arrebato de clarividencia, $utopia.3140.desc_common$ vidas que penden de un hilo.\n\n$utopia.3140.desc_suffix$"
 utopia.3140.desc_machine: "De repente, en un pasmoso arrebato de clarividencia, $utopia.3140.desc_common$ variables que penden de un hilo.\n\n$utopia.3140.desc_suffix$"
 utopia.3150.name: "Voces de los caídos"
 utopia.3150.desc: "Estamos contemplando nuestra galaxia desde lo que parecen cientos de miles de años luz. De repente, la corriente psiónica nos precipita por una miríada de estrellas a una velocidad increíble, hasta llegar a una región del espacio que pertenece a uno de los imperios caídos: el [fallen_empire.GetName].\n\nPasamos estrellas, luego planetas y finalmente llegamos a una ciudad [fallen_empire.GetSpeciesName]. Torres increíbles se alzan hacia el cielo mediante una tecnología antigravitatoria avanzadísima. La corriente nos lleva a una de estas torres, a través de sus muros, hasta que entramos en una especie de gran sala de reuniones. Está ocupada por dos [fallen_empire.GetSpeciesNamePlural], que flotan con comodidad en sillas de gravedad cero mientras conversan entre sí con voces suaves.\n\nNo se percatan de nuestra presencia."
 utopia.3150.a: "§YSondead sus mentes para buscar secretos.§!"
 utopia.3151.name: "§GSecretos tecnológicos§!"
 utopia.3151.v1.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.1.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.4.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v2.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.2.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.5.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v3.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.3.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.6.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.a.desc: "Los [fallen_empire.GetSpeciesNamePlural] son claramente dignatarios de algún tipo que discuten cuestiones de estado. Lentamente, la visión se cierne sobre ellos mientras su conversación alienígena se transforma gradualmente en palabras que entendemos."
 utopia.3151.b.desc: "El brillo mental de los dos [fallen_empire.GetSpeciesNamePlural] es abrumador. Como si floreciesen, sus mentes se abren y quedan expuestas. Sería muy fácil sondearlas."
 utopia.3151.c.desc: "Ahí están. Secretos tecnológicos arrancados de los rincones de sus mentes, tan fácil como copiar un archivo de un ordenador abierto. Los [fallen_empire.GetSpeciesNamePlural] no se percatan del robo que ha tenido lugar dentro de sus cabezas."
 utopia.3151.1.desc: "§H\"... está loca. Si se cree que la gente estaría dispuesta a aceptar una pérdida siquiera momentánea del nivel de vida al que se ha acostumbrado, hay...\"§!"
 utopia.3151.2.desc: "§H\"... un escándalo. ¡Imagina que las razas más jóvenes sospechasen siquiera que ya no comprendemos del todo nuestra propia tecnología! Debemos...\"§!"
 utopia.3151.3.desc: "§H\"... se hacen cada vez más poderosos. Hay elementos del Consejo que están convencidos de que si no actuamos...\"§!"
 utopia.3151.4.desc: "§H\"... me da igual lo que diga el Consejo. A esos advenedizos les faltan milenios para alcanzarnos, y sus miserables flotas son tan amenazantes como un mosquito gazuriano para un lagarto de fuego hilaxi. No hay necesidad de...\"§!"
 utopia.3151.5.desc: "§H\"... sigo pensando que las acciones punitivas son innecesarias. Son jóvenes e imprudentes, pero también nosotros lo fuimos hace un tiempo. Todavía tienen tiempo de...\"§!"
 utopia.3151.6.desc: "§H\"... y que quizá deberíamos haber reducido la población de las razas menores antes de que se hiciesen más poderosas. Debo admitir que estoy de acuerdo con él, pero el Concilio cree que ya es demasiado tarde para...\"§!"
 utopia.3152.name: "Secretos inauditos"
 utopia.3152.desc: "Los [fallen_empire.GetSpeciesNamePlural] son claramente dignatarios de algún tipo que discuten cuestiones de estado. Lentamente, la visión se cierne sobre ellos mientras su conversación alienígena se transforma gradualmente en palabras que entendemos.\n\nDe repente, los alienígenas se callan y quedan inmóviles.\n\n§H\"¿Lo notas?\".\n\n\"Sí. Alguien nos observa\".§!\n\nExploran la habitación hasta que ambos nos miran directamente.\n\n§H\"Qué interesante. Una sonda psiónica\".§!\n\n§H\"Parece de origen [Root.GetSpeciesName]. Rápido, activa el escudo transplanar§!\".\n\nLa visión finaliza de golpe."
 utopia.3153.desc: "[Root.GetSpeciesNamePlural].\n\nNo penséis que vuestro odioso intento de invadir las mentes de nuestros líderes quedará impune.\n\nHabrá consecuencias."
 utopia.3153.a: "P-pero... ¡podemos explicarlo!"
 utopia.3153.b: "Tiene que haber una lógica que lo explique..."
 utopia.3160.name: "Titileo en el vacío"
 utopia.3160.desc: "Una pequeña y parpadeante estrella se materializa dentro del Velo. Pasa volando a una velocidad increíble y, por un segundo, vemos que se trata de una nave alienígena de configuración desconocida. Luego se desvanece en una nube de energía psiónica tan rápido como apareció.\n\n¿Es posible? ¿Se puede entrar físicamente en el Velo y emerger en otro punto distinto del espacio normal?"
 utopia.3160.a: "§YEsperad un rato.§!"
 utopia.3161.desc: "Otra estrella parpadeante aparece de repente, pero esta vez estamos listos. Está claro que es una nave alienígena, pero distinta a las que se han visto en nuestra galaxia. Al pasar, sentimos el brillo mental de su tripulación y nos apoderamos de sus secretos.\n\nUn motor de salto psiónico. Qué ingenioso."
 utopia.3161.name: "§GMotores de salto psiónicos§!"
 utopia.3162.desc: "Aparece otra estrella parpadeante, pero esta vez estamos listos. Está claro que es una nave alienígena, pero distinta a las que se han visto en nuestra galaxia. Al pasar, intentamos unirnos al brillo mental de su tripulación, pero sus intelectos son más oscuros y extraños que cualquiera de los que nos hemos encontrado antes.\n\n¡No solo somos expulsados de su nave, sino que su contragolpe psiónico nos sigue fuera del Velo! La velocidad sublumínica de nuestras naves se ha reducido momentáneamente."
 utopia.3170.name: "Entidad escudada"
 utopia.3170.desc: "Siguiendo un lánguido eco en el Velo, encontramos un espíritu que se ha resguardado tras una especie de potente escudo psiónico.\n\n§HMARCHAOS.§!"
 utopia.3170.a: "§YIntentad atravesar el escudo.§!"
 utopia.3171.name: "§GEscudos psiónicos§!"
 utopia.3171.desc_suffix: "No obstante, al atravesar el escudo hemos averiguado cómo generar un campo de fuerza similar. Si perfeccionamos la técnica, podríamos formar escudos psiónicos alrededor de naves enteras."
 utopia.3171.desc_machine_gestalt: "No nos hemos adentrado tanto en el Velo para darnos ahora la vuelta. Canalizando nuestro poder psiónico colectivo, hemos logrado abrir una brecha en el escudo lo bastante grande como para echar un efímero vistazo a través de ella.\n\nNo alcanzamos a entender qué reside al otro lado del escudo, pero ha saturado por completo varios de nuestros procesadores psiónicos. $utopia.3171.desc_suffix$"
 utopia.3171.desc_organic: "No hemos llegado tan lejos dentro del Velo para dar ahora la vuelta. Tras canalizar toda su fuerza psiónica, nuestros telépatas lograron abrir una brecha en el escudo lo bastante grande como para que algunos de ellos se asomaran dentro.\n\nNo sabemos lo que esos telépatas vieron al otro lado del escudo, pero lo que fuese bastó para trastornar sus mentes permanentemente. Su sacrificio no fue en vano. $utopia.3171.desc_suffix$"
 utopia.3172.name: "Escudo íntegro"
 utopia.3172.desc_machine_gestalt: "Nuestro equipo de [GetTelepathPlural], ya saturado por su profunda incursión en el Velo, no logró canalizar suficiente fuerza psiónica como para atravesar el escudo. Tras el fiasco, hemos recibido el siguiente comunicado."
 utopia.3172.desc_machine_non_gestalt: "Nuestro equipo de [GetTelepathPlural], ya saturado por su profunda incursión en el Velo, no logró canalizar suficiente fuerza psiónica como para atravesar el escudo. Al parecer, la tentativa fallida ha provocado al espíritu."
 utopia.3172.desc_organic_gestalt: "Nuestro equipo de [GetTelepathPlural], agotado por su profunda incursión en el Velo, no logró canalizar suficiente fuerza psiónica como para atravesar el escudo. Tras el fiasco, hemos recibido el siguiente comunicado."
 utopia.3172.desc_organic_non_gestalt: "Nuestro equipo de [GetTelepathPlural], agotado por su profunda incursión en el Velo, no logró canalizar suficiente fuerza psiónica como para atravesar el escudo. Al parecer, la tentativa fallida ha provocado al espíritu."
 utopia.3180.name: "A la espera del futuro"
 utopia.3180.desc.intro: "El concepto de tiempo, tal y como lo conocemos, es ajeno al Velo. Lo que aquí pueden parecer siglos, en el mundo real pueden ser meras horas o incluso minutos."
 utopia.3180.desc_gestalt: "$utopia.3180.desc.intro$ Si se sabe dónde mirar, tal vez sea posible alcanzar la precognición.\n\nEse don entraña también riesgos para nuestro colectivo. En caso de proceder, debemos extremar las precauciones."
 utopia.3180.desc_machine_non_gestalt: "$utopia.3180.desc.intro$ Si se sabe dónde mirar, es posible incluso ver el futuro...\n\nEl concepto de precognición conlleva un gran riesgo de sobrecarga para nuestros procesadores psiónicos. Procedamos con cautela."
 utopia.3180.desc_organic_non_gestalt: "$utopia.3180.desc.intro$ Si se sabe dónde mirar, es posible incluso ver el futuro...\n\nLa precognición es uno de los caminos más seguros a la locura para un telépata, así que debemos tener cuidado."
 utopia.3180.a: "§YMedita aquí por el momento.§!"
 utopia.3181.desc_gestalt: "Nuestras unidades pueden mantener una limitada conexión precognitiva con el Velo sin sufrir una sobrecarga, pero el influjo masivo de datos de probabilidad es demasiado abrumador como para darle un uso práctico.\n\nSin embargo, nuestros nodos de investigación han encontrado aplicaciones menores para estos datos, aplicándolos a nuestras flotas para mejorar su eficiencia en combate."
 utopia.3181.desc_machine_non_gestalt: "Nuestras unidades pueden mantener una limitada conexión precognitiva con el Velo sin sufrir una sobrecarga, pero el influjo masivo de datos de probabilidad es demasiado abrumador como para darle un uso práctico.\n\nPese a todo, si pudiésemos diseñar una interfaz digital para interpretar estos datos, teóricamente podríamos mejorar el rendimiento de los ordenadores de combate de las naves."
 utopia.3181.desc_organic_non_gestalt: "Se puede mantener una limitada conexión precognitiva con el Velo sin provocar la locura, pero el influjo masivo de datos de probabilidad es demasiado abrumador como para darle un uso práctico.\n\nPese a todo, si pudiésemos diseñar una interfaz digital para interpretar estos datos, teóricamente podríamos mejorar el rendimiento de los ordenadores de combate de las naves."
 utopia.3181.name: "§GInterfaz precognitiva§!"
 utopia.3182.name: "§RLocura del Velo§!"
 utopia.3182.desc_gestalt: "Tal y como ya nos veníamos temiendo, intentar comprender la multitud inabarcable de opciones y probabilidades que existen tanto en el pasado como en el futuro ha provocado a nuestros drones psiónicos graves cuadros de catatonia.\n\nEl infortunio los ha escindido de la supramente, privándolos de propósito existencial. Si pretendemos adentrarnos de nuevo en el Velo, no tendremos más remedio que reciclar los cascarones defectuosos y recuperar nuestra fuerza colectiva."
 utopia.3182.desc.non_gestalt.1: "multitud inconcebible de opciones y probabilidades que existen tanto en el pasado como en el futuro.\n\nCada escenario y variación, por colosal o minúscula que sea la diferencia, se repite dentro de sus [GetSpeciesBrainPlural] sin cesar. Han quedado reducidos a un estado de catatonia permanente.\n\n"
 utopia.3182.desc.non_gestalt.2: " más [GetTelepathPlural], tardaremos cierto tiempo en recuperar potencia psiónica suficiente para penetrar el Velo una vez más."
 utopia.3182.desc_machine_non_gestalt: "Como esperábamos, nuestros procesadores psiónicos no han sido capaces de procesar la $utopia.3182.desc.non_gestalt.1$Puesto que tendremos que construir$utopia.3182.desc.non_gestalt.2$"
 utopia.3182.desc_organic_non_gestalt: "Como temíamos, nuestros telépatas se han vuelto locos. De repente, sus mentes se abrieron a una $utopia.3182.desc.non_gestalt.1$Dado que tendremos que reclutar a$utopia.3182.desc.non_gestalt.2$"
 utopia.3190.name: "Energía concentrada"
 utopia.3190.desc.intro: "Hemos encontrado un espacio minúsculo dentro del Velo con una concentración de energía psiónica cuya magnitud nunca antes habíamos visto."
 utopia.3190.desc_gestalt: "$utopia.3190.desc.intro$ Si se llegara a extraer semejante torrente psiónico, acabaría diseminándose por el colectivo con una repercusión imperceptible. Sin embargo, podríamos designar un solo dron \"elegido\" para que actúe como conducto directo para esta energía, volviéndose inmensamente poderoso en el proceso.\n\nDesconocemos si él solo será capaz de manejar tales volúmenes de energía sin repercusiones fatales. Hemos computado una selección de candidatos."
 utopia.3190.desc_non_gestalt: "$utopia.3190.desc.intro$ Cualquier [GetPsychicNoun] que logre acceder a esta concentración de energía pura se volvería inmensamente poderoso... Pero solo hay suficiente para un solo individuo, y es arriesgado.\n\nSolo hay unos pocos individuos en todo [Root.GetName] con la fuerza psiónica necesaria para acceder a esta concentración de energía con alguna esperanza de supervivencia. ¿A quién mandamos?"
 utopia.3190.1.a: "§G[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.2.a: "§Y[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.3.a: "§R[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.1.b: "§G[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.2.b: "§Y[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.3.b: "§R[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.1.c: "§G[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.2.c: "§Y[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.3.c: "§R[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.1.d: "§G[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.2.d: "§Y[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.3.d: "§R[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3191.name: "[GetChosenName]"
 utopia.3191.desc_organic_non_gestalt: "$utopia.3191.desc_machine_non_gestalt$ Que los espíritus se apiaden de nuestras almas."
 utopia.3191.desc_machine_non_gestalt: "Está... Está hecho. Todo el Velo parece estremecerse cuando se drena la concentración de energía psiónica y su poder se transfiere a [chosen_leader.GetName].\n\nSolo unos pocos individuos en toda la historia de la galaxia han sido dotados de una fuerza psiónica de esta magnitud."
 utopia.3191.desc_gestalt: "Hemos conseguido transmitir toda la energía psiónica concentrada al objetivo que designamos, [chosen_leader.GetName].\n\nLo que habría supuesto apenas una gota en nuestro océano colectivo es en lugar de ello una potente herramienta para el [Root.GetName], ahora que [chosen_leader.GetName] la pone al servicio de todos los [Root.Species.GetName]."
 utopia.3192.name: "§RMuerte de un líder§!"
 utopia.3192.desc_gestalt: "Todo el Velo parece estremecerse cuando se drena la concentración de energía psiónica y su poder se trasvasa a [chosen_leader.GetName].\n\nNo obstante, como se sospechaba, tal poder trasciende la capacidad de una entidad individual. La forma física de [chosen_leader.GetName] erupcionó en un tremebundo estallido de energía psiónica que desvinculó su voz de su [GetBrainName]."
 utopia.3192.desc_non_gestalt: "Todo el Velo parece estremecerse cuando se drena la concentración de energía psiónica y su poder se transfiere a [chosen_leader.GetName].\n\nPor desgracia, su [GetSpeciesBrain] no pudo soportar la presión desgarradora. Quizá es imposible que una entidad física albergue tanto poder. [chosen_leader.GetName] se consumió en un gran estallido de energía psiónica que mató a todo el que se encontraba cerca."
 utopia.3193.name: "§RTransformación psiónica§!"
 utopia.3193.desc.intro: "Todo el Velo parece estremecerse cuando se drena la concentración de energía psiónica y su poder se transfiere a [chosen_leader.GetName].\n\nAunque la transferencia tuvo éxito, [chosen_leader.GetName] se ha... transformado..."
 utopia.3193.desc.outro: "\n\n§HINMUNDICIA... ¿QUÉ...? ¿QUÉ ME HABÉIS... HECHO?§!\n\n§HVUESTRA... SOBERBIA... OS SALDRÁ CARA...§!"
 utopia.3193.desc_gestalt: "$utopia.3193.desc.intro$ Su presencia se ha desvinculado del colectivo, y una entidad desconocida habita su forma física y la posee.$utopia.3193.desc.outro$"
 utopia.3193.desc_non_gestalt: "$utopia.3193.desc.intro$ Un constructo de energía pura habita su cuerpo y lo posee.$utopia.3193.desc.outro$"
 utopia.3200.name: "Una visión"
 utopia.3200.1.desc_organic: "Aquí el vacío resplandece con poder. Vamos a descansar un rato."
 utopia.3200.1.desc_machine: "Aquí el vacío resplandece con poder. Paremos a cargar baterías."
 utopia.3200.2.desc: "El camino que hemos seguido llega a un brusco final. No podemos ir más allá."
 utopia.3200.3.desc_organic: "Aquí hay algo que nos habla. Algo maravilloso."
 utopia.3200.3.desc_machine: "Aquí hay algo que nos habla. Algo portentoso."
 utopia.3200.4.desc: "Por razones que no podemos imaginar, nos han arrastrado a esta veta de energía en el Velo. ¿Por qué?"
 utopia.3200.5.desc.outro: "nos invade cuando imaginamos una eternidad dentro del Velo. Luego recuperamos nuestro asidero y el terror retrocede."
 utopia.3200.5.desc_organic: "Por un breve instante, nos perdemos y un sentimiento de pánico absoluto $utopia.3200.5.desc.outro$"
 utopia.3200.5.desc_machine: "Por un breve instante, nos perdemos y una incertidumbre creciente $utopia.3200.5.desc.outro$"
 utopia.3200.6.desc.intro: "Nos seguimos adentrando en el Velo, y un tropel de espíritus pasa varias horas danzando a nuestro alrededor. Relumbran con magníficos colores, jamás percibidos en el espacio normal.\n\n"
 utopia.3200.6.desc_organic: "$utopia.3200.6.desc.intro$Es un bonito espectáculo, hasta que comprendemos que nos están conduciendo como a ganado."
 utopia.3200.6.desc_machine: "$utopia.3200.6.desc.intro$Es un espectáculo fascinante, hasta que comprendemos que nos están conduciendo como a ganado."
 utopia.3200.7.desc: "Aquí flota un fragmento de cristal perfecto que gira lentamente sobre su propio eje. Cuando nos acercamos, se rompe en mil pedazos."
 utopia.3200.8.desc_organic: "El cadáver de un [Root.GetSpeciesName] flota en el vacío ante nosotros. La pútrida carcasa emite un agudo chillido antes de desaparecer de nuestra vista."
 utopia.3200.8.desc_machine: "El cascarón de un [Root.GetSpeciesName] estropeado flota en el vacío ante nosotros. La devastada carcasa emite un agudo chirrido antes de desaparecer de nuestra vista."
 utopia.3200.9.desc.intro: "No podemos estar seguros de lo que pasa. ¿Estamos realmente en el Velo o"
 utopia.3200.9.desc_hive: "$utopia.3200.9.desc.intro$ acaso habremos sufrido una avería sensorial grave?"
 utopia.3200.9.desc_organic_non_hive: "$utopia.3200.9.desc.intro$ es que alguno de nosotros está sufriendo un episodio psicótico?"
 utopia.3200.9.desc_machine_non_hive: "$utopia.3200.9.desc.intro$ acaso hemos sufrido una avería procesal grave?"
 terraforming_candidate_category: "Antiguos signos de vida"
 terraforming_candidate_category_desc: "Este mundo baldío y sin vida muestra signos de haber tenido una biosfera."
 MESSAGE_TERRAFORM_FOUND_TITLE: "$anomaly.2575.name$"
 MESSAGE_TERRAFORM_FOUND_DESC: "Se ha identificado a [From.GetName] como candidato a la terraformación. Se rastreará [From.GetPlanetMoon] como objetivo potencial de colonización de cara al futuro."
 anomaly.2575.name: "Encontrado candidato para terraformar"
 anomaly.2575.desc.intro: "Nuestro detallado sondeo de [From.GetName] ha revelado que quizá albergó vida en el pasado. Hay importantes depósitos de agua congelada en los casquetes polares y bajo la superficie del [From.GetPlanetMoon]. La existencia de redes de valles sugiere que antaño el agua pudo haber fluido por ellos con libertad."
 anomaly.2575.desc.1: "$anomaly.2575.desc.intro$\n\nEn teoría, sería posible terraformar este [From.GetPlanetMoon], pero todavía no tenemos la tecnología para conseguir esta tarea monumental en un tiempo razonable."
 anomaly.2575.desc.2: "$anomaly.2575.desc.intro$\n\nLos costes de energía serían abrumadores, pero tenemos la tecnología para terraformar gradualmente este [From.GetPlanetMoon] y convertirlo en algo que vuelva a albergar vida."
 anomaly.2575.desc.3: "$anomaly.2575.desc.intro$\n\nPor desgracia, la §Yesfera Dyson§! de este sistema no permite restaurar el planeta."
 anomaly.2575.a: "Con el tiempo, quizá podamos volver a despertarlo."
 utopia.3300.name: "Una presencia en el Velo"
 utopia.3300.desc: "Aquí hay una presencia que ocupa toda esta parte del Velo. Ya nos hemos encontrado con espíritus antes, pero esto es mucho más poderoso... y antiguo.\n\nParece que no se ha percatado de nuestra presencia. Quizá esté durmiendo. Quizá le parezcamos insignificantes.\n\nQuizá deberíamos irnos."
 utopia.3300.1.a: "§GIntentad comunicaros con la presencia.§!"
 utopia.3300.1.b: "§YIntentad comunicaros con la presencia.§!"
 utopia.3300.1.c: "§RIntentad comunicaros con la presencia.§!"
 utopia.3300.1.d: "§G[chosen_one.GetName] hablará con la presencia§!"
 utopia.3301.name: "§RComunión rechazada§!"
 utopia.3301.desc: "Cuando contactamos con la presencia, la sentimos revolverse; ahora su atención se centra en nosotros. No parece complacida de que la molesten.\n\nUna onda de energía golpea a nuestros telépatas, causando una gran agonía a algunos y dejando inconscientes a otros. Por ahora no nos queda más remedio que retirarnos del Velo."
 utopia.3302.desc: "Cuando intentamos contactar con la presencia, la sentimos revolverse; ahora su atención se centra en nosotros. No parece complacida de que la molesten.\n\nUna enorme onda de energía psiónica nos golpea y deja inconscientes a nuestros telépatas. Cuando vuelven en sí, se dan cuenta de que falta alguien del equipo. §Y[leader_to_kill.GetName]§! no está por ninguna parte, y en su lugar ahora solo queda la huella psiónica de una pequeña brecha, como si la entidad hubiese entrado en nuestro mundo y hubiese arrastrado a [leader_to_kill.GetName] al Velo para... bueno, vete a saber para qué.\n\nLa razón no importa, pero es dudoso que volvamos a ver a [leader_to_kill.GetName]."
 utopia.3304.name: "Pacto propuesto"
 utopia.3304.desc.start.default: "Al intentar contactar con la presencia,"
 utopia.3304.desc.start.shroud: "Al asomarnos al Velo,"
 utopia.3304.desc.common: "las mentes de nuestros telépatas se llenan con un coro de voces. Al principio no son más que suaves susurros, pero la cacofonía va creciendo en intensidad, mil voces hablando al unísono.\n\nLas voces se presentan como $whisperers_in_the_void_color_article$. Los miembros individuales del coro se dan a conocer: Murmur de Secretos,"
 utopia.3304.desc.throne.default: "Sombra del Trono"
 utopia.3304.desc.throne.shroud: "$the_vacant_throne$"
 utopia.3304.desc.end: ", Maestro de las Marionetas... Son muchísimos, todos unidos en el coro de los Susurradores. Afirman estar al tanto de todo el conocimiento susurrado en secreto de un mortal a otro, y se ofrecen a compartir algunos de estos secretos con nosotros...\n\n§HSi les permitimos acceder a nuestra consciencia.§!\n\nAseguran que es un precio insignificante. Apenas notaremos su presencia.\n\nEn su tono se advierte cierta urgencia."
 utopia.3304.desc: "$utopia.3304.desc.start.default$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.default$$utopia.3304.desc.end$"
 utopia.3304.desc.shroud: "$utopia.3304.desc.start.shroud$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.shroud$$utopia.3304.desc.end$"
 utopia.3304.a: "§YEstableced un pacto con los Susurradores del Vacío§!"
 utopia.3305.desc: "La presencia nos da la bienvenida con afable familiaridad. No habla con palabras, sino con visiones, conceptos e ideas. Se filtra en las mentes de nuestros telépatas tan suavemente que se podría pensar que siempre ha estado allí. Una serie de imágenes aparecen ante ellos.\n\nA la presencia se la conoce como $the_composer_of_strands_color_article$, y observa nuestras formas orgánicas con curioso interés. Nos muestra diversos modos en los que estas podrían crecer y cambiar. Mejorar. Evolucionar.\n\n§HSolo tenemos que aceptarla en nuestra carne.§!\n\nEspera nuestra respuesta con paciencia, afectuosamente, cual progenitor amoroso que aguarda a su vástago predilecto. Detrás se encuentra su gemelo, el Animante. No está interesado en nuestras mentes orgánicas. Anhela crear almas, fusionar circuitos en espíritu.\n\nEl Compositor espera nuestra respuesta."
 utopia.3305.a: "§YEstableced un pacto con el Compositor de Hebras§!"
 utopia.3306.desc.1: "Al intentar contactar con la presencia, sentimos un apetito voraz."
 utopia.3306.desc.2: "La presencia no pierde el tiempo ni malgasta palabras. Es $the_eater_of_worlds_color_article$ y desea devorarnos.\n\nPero solo a unos cuantos. No más de los que podemos permitirnos. A cambio, nos ofrece grandes poderes. Nos enseñará su hambre, su ira. Formará con ellos armas psiónicas para vencer a cualquier enemigo.\n\n§HSolo tenemos que dejar que se alimente de nosotros.§!"
 utopia.3306.desc.3: "$utopia.3306.desc.2$\n\nParece impaciente por empezar."
 utopia.3306.desc: "$utopia.3306.desc.1$$utopia.3306.desc.3$"
 utopia.3306.a: "§YEstableced un pacto con el Devorador de Mundos§!"
 utopia.3307.desc: "Antes de que podamos situar a la presencia, ella contacta con nosotros. Sus pensamientos se retuercen alrededor de las mentes de nuestros telépatas, regateando y engatusando. Es $the_instrument_of_desire_color_article$ y nos concederá riqueza, poder, prestigio... todo lo que hayamos deseado. Y todo lo que podamos desear.\n\n¿El coste? Poca cosa, una mera cuota nominal. Solo quiere lo mejor para nosotros. Nos ayudará, nos guiará y dirigirá nuestras ambiciones y sueños.\n\n§HSolo tenemos que aceptarlo en nuestros corazones.§!\n\nConfía en que aceptemos. ¿Cómo podríamos no aceptar?"
 utopia.3307.a: "§YEstableced un pacto con el Instrumento del Deseo§!"
 utopia.3308.desc: "La presencia nos estaba esperando. Es el §RFin del Ciclo§! y siempre nos ha estado esperando. De repente nuestros telépatas hablan al unísono, una docena de voces en un coro perfecto: §R\"TODAVÍA NO ES VUESTRO MOMENTO.\"§! Una pausa. §R\"PERO PODRÍA SERLO.\"§!\n\nNo dice nada más, pero nos ha hecho una oferta, eso está claro. Poder, conocimiento y riquezas sin medida están a nuestro alcance.\n\n§RSolo tenemos que traer el Fin.§!"
 utopia.3308.a: "§REstableced un pacto con el Fin del Ciclo§!"
 utopia.3310.name: "Pacto establecido"
 utopia.3320.name: "El Fin del Ciclo: §RDía del Juicio§!"
 utopia.3320.desc.intro: "Se nos ha acabado el tiempo. Durante un breve periodo nos hemos beneficiado del inmenso poder otorgado por $end_of_the_cycle_color_article$. Sabíamos que habría que pagar el precio, pero pensábamos que podríamos permitírnoslo o que encontraríamos el modo de evitar pagarlo.\n\nNo hemos podido.\n\nEl precio pagado es todo. En un instante, tan rápido que no hubo tiempo de reaccionar, el [Root.GetName] ha... desaparecido. Donde había ricas colonias, ahora solo hay muerte. Donde había poderosas flotas que cruzaban el vacío, ahora solo hay fantasmas y escombros. Todo consumido por el Fin. Todo tomado por el §HVelo§!."
 utopia.3320.desc.outro: "se ha materializado cerca de [former_capital.GetName]. Se hizo tremendamente poderoso tras devorar las consciencias de nuestros [GetPsychicNounPlural] y ahora vaga por la galaxia buscando más presas."
 utopia.3320.desc.a.1.gestalt: "Lo único que queda de nuestro imperio es un grupo de exiliados capitaneados por §H[Root.GetRulerName]§!, un poderoso [GetPsychicNoun] que se desvió del colectivo y encabezó un pequeño grupo de [GetIndividualPlural] con el fin de esconderse en un mundo que no estuviera marcado por el Fin."
 utopia.3320.desc.a.1.non_gestalt: "Lo único que queda de nuestro imperio es un grupo de exiliados capitaneados por §H[Root.GetRulerName]§!, un poderoso [GetPsychicNoun] que vio lo que estaba por venir y llevó a una pequeña parte de la población a esconderse en un mundo que no estuviera marcado por el Fin."
 utopia.3320.desc.a.outro: "Por si la destrucción de nuestro imperio de la noche a la mañana fuera poco, una entidad psiónica masiva $utopia.3320.desc.outro$"
 utopia.3320.desc.a.gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.a.non_gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.non_gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.b: "$utopia.3320.desc.intro$\n\nNuestro imperio ha sido prácticamente destruido y una entidad psiónica gigante se ha materializado cerca de [former_capital.GetName]. Se hizo tremendamente poderosa tras devorar las consciencias de nuestros [GetPsychicNounPlural] y ahora vaga por la galaxia buscando más presas. Al menos, no estaremos allí para ver cómo termina lo que empezamos."
 utopia.3320.opt.a: "¿Qué hemos hecho...?"
 utopia.3320.opt.a.shroud.tt: "$BEGINS_EVENT_CHAIN$ §Y$the_reckoning_chain_title$§!"
 utopia.3321.desc.1: "Durante muchos años supimos que algo raro pasaba con el §H[From.GetName]§!. Hace tiempo, sus industrias, su ciencia..., todo lo concerniente a su imperio de repente experimentó un enorme aumento de productividad y eficacia, como si les bendijese un poder invisible.\n\nResulta que era una maldición y no una bendición. El [Root.GetName] firmó su futuro y ahora la deuda ha vencido.\n\nEl [From.GetName] desapareció... en un instante. Donde una vez hubo prósperas colonias solo quedan ruinas. Donde antaño poderosas flotas cruzaban el vacío, ahora hay silencio y escombros."
 utopia.3321.desc.2: "Ahora, un ser de energía inmensamente poderoso se ha materializado cerca de su antigua capital."
 utopia.3321.desc.3: "Décadas atrás, empezamos a detectar actividades anómalas en algunos sistemas solares lejanos. Nuestros [GetResearchers] pensaban que el aumento del movimiento y la radiación indicaban que una civilización alienígena estaba experimentando un enorme auge en su productividad. Dado que no hemos establecido contacto alguno con esta supuesta sociedad, no podemos confirmar dicha teoría.\n\nEntonces, casi de forma instantánea, la actividad cesó. El silencio ahora reina en aquellas regiones del espacio que un día estuvieron tan activas."
 utopia.3321.desc.4: "Los escáneres de largo alcance han detectado un fenómeno extraño en esos sistemas lejanos. Si los informes son ciertos, solo se puede describir como una entidad inmensamente poderosa compuesta de energía pura, que causa gran destrucción a medida que se mueve por el espacio."
 utopia.3321.desc.a.contact: "$utopia.3321.desc.1$ El desastre incluso ha azotado nuestras fronteras y ha destruido algunos de nuestros mundos que se encontraban bajo el gobierno [From.GetAdj].\n\n$utopia.3321.desc.2$\n\nParece que tiene hambre."
 utopia.3321.desc.a.no_contact: "$utopia.3321.desc.3$ Por motivos que no podemos confirmar, algunos mundos que se hallan dentro de nuestras fronteras acabaron en ruinas en ese mismo momento.\n\n$utopia.3321.desc.4$"
 utopia.3321.desc.b.contact: "$utopia.3321.desc.1$\n\n$utopia.3321.desc.2$ Se desplaza de un mundo a otro y destruye todo lo que encuentra a su paso."
 utopia.3321.desc.b.no_contact: "$utopia.3321.desc.3$\n\n$utopia.3321.desc.4$"
 utopia.3321.opt.a.contact: "¡¿Pero qué han hecho?!"
 utopia.3321.opt.a.no_contact: "¡¿Qué significa esto?!"
 utopia.3325.name: "El Fin del Ciclo: §RTomado por el Velo§!"
 utopia.3325.desc.organic: "No hemos logrado impedir que la monstruosa criatura de energía envolviese §H[Root.GetName]§!. El §HVelo§! ha consumido todo el planeta y su población."
 utopia.3325.desc.machine: "No hemos logrado impedir que la monstruosa criatura de energía envolviese §H[Root.GetName]§!. El §HVelo§! ha consumido todo el planeta y su población."
 utopia.3325.opt.a.organic_non_gestalt: "¡Horrible!"
 utopia.3325.opt.a.machine_or_gestalt: "Una catástrofe."
 utopia.3331.name: "Susurradores del Vacío: §RSoportando§!"
 utopia.3331.desc.intro: "Aunque los secretos impartidos a nuestro pueblo por los §HSusurradores§! son muy útiles, algunos resultan bastante perturbadores"
 utopia.3331.desc: "$utopia.3331.desc.intro$. Lidiar con el estrés de saber demasiado puede ser difícil y ha provocado que una porción cada vez mayor de nuestra población (§H[leader_target.GetTitle] [leader_target.GetName]§! también) recurran al abuso de sustancias como un medio para afrontarlo."
 utopia.3331.opt.a: "Qué le vamos a hacer."
 utopia.3332.name: "Susurradores del Vacío: §RSuicidio§!"
 utopia.3332.desc.intro: "$utopia.3331.desc.intro$, en concreto aquellos compartidos con individuos importantes. §H[leader_target.GetTitle] [leader_target.GetName]§!, incapaz de"
 utopia.3332.desc.organic_non_gestalt: "$utopia.3332.desc.intro$ seguir viviendo con tanto estrés, se ha quitado la vida."
 utopia.3332.desc.machine_non_gestalt: "$utopia.3332.desc.intro$ procesar estos detalles con eficacia, se ha autodestruido y se ha desconectado de forma permanente."
 utopia.3332.desc.gestalt: "Aunque los secretos que los §HSusurradores§! impartieron a nuestro pueblo son muy útiles, algunos de ellos poseen una naturaleza individualista preocupante. La exposición prolongada a tal desviación ha hecho que §H[leader_target.GetName], [leader_target.GetTitle]§! se separe del colectivo y haya dejado tras de sí un cascarón podrido."
 utopia.3332.opt.a.non_gestalt: "Qué tragedia."
 utopia.3332.opt.a.gestalt: "Lo reciclaremos."
 utopia.3333.name: "Susurradores del Vacío: §RLocura§!"
 utopia.3333.desc.intro: "Desde que permitimos que los §HSusurradores§! se comuniquen con la [GetBrainName], hemos empezado a notar un aumento preocupante de la desviación dentro del colectivo."
 utopia.3333.desc.gestalt: "$utopia.3333.desc.intro$\n\nLos drones arremeten unos contra otros mientras llevan a cabo tareas básicas y, además, se exceden en el uso de servicios hasta alcanzar un grado prácticamente individualista.\n\nSi queremos restaurar el orden, habrá que purgar las naves afectadas."
 utopia.3333.desc.outro: "y los inexplicables actos de violencia entre nuestra población psiónica han aumentado. En general, estos problemas han sido manejables, pero han aumentado recientemente hasta quedar fuera de nuestro control. En todo el imperio han surgido facciones radicales y divergentes que luchan entre ellas con ferocidad."
 utopia.3333.desc.organic_non_gestalt: "Desde que invitamos a los §HSusurradores§! a entrar en nuestra mente, las enfermedades mentales $utopia.3333.desc.outro$"
 utopia.3333.desc.machine_non_gestalt: "Desde que invitamos a los §HSusurradores§! a entrar en nuestra mente, los errores de programación erráticos $utopia.3333.desc.outro$"
 utopia.3333.opt.a: "¡Tenemos que restablecer el orden!"
 utopia.3334.name: "Susurradores del Vacío: §RPsicosis§!"
 utopia.3334.desc.gestalt: "$utopia.3333.desc.intro$\n\nPara empeorar aún más las cosas, nuestro sentido de la unidad ha empezado a tambalearse. El colectivo es incapaz de comunicarse eficazmente debido a un aumento inducido psiónicamente en la desviación individualista.\n\nSi queremos restaurar el orden, debemos purgar estos excesos."
 utopia.3334.desc.outro: "y los brotes agresivos entre nuestra población psiónica han aumentado. En general ha sido manejable, pero recientemente los problemas empiezan a descontrolarse. Ya han aparecido sociedades secretas por todo el imperio. Algunas son inofensivas, pero otras tienen objetivos más nefastos, por lo que la desconfianza ha arraigado en nuestra sociedad."
 utopia.3334.desc.organic_non_gestalt: "Desde que invitamos a los §HSusurradores§! a entrar en nuestra mente, las enfermedades mentales $utopia.3334.desc.outro$"
 utopia.3334.desc.machine_non_gestalt: "Desde que invitamos a los §HSusurradores§! a entrar en nuestra mente, los errores de programación erráticos $utopia.3334.desc.outro$"
 utopia.3334.opt.a: "¡Terrible!"
 utopia.3335.name: "Devorador de Mundos: §RPicoteo§!"
 utopia.3335.desc.common: "§H[devoured_leader.GetTitle] [devoured_leader.GetName]§! ha desaparecido de repente y dejado atrás nada más que ecos de actividad psiónica."
 utopia.3335.desc.gestalt: "$utopia.3335.desc.common$ Al parecer, ha sido pasto de $the_eater_of_worlds_color_article$. Aunque haya perdonado a los demás líderes, no podemos predecir cuándo va a volver a por más."
 utopia.3335.desc.non_gestalt: "$utopia.3335.desc.common$ Creemos que has sido pasto de $the_eater_of_worlds_color_article$. Hemos logrado encubrir este suceso con la esperanza de que el Devorador haya quedado saciado por una temporada."
 utopia.3335.opt.a: "Un pequeño precio a pagar."
 utopia.3336.name: "Devorador de Mundos: §RHambre§!"
 utopia.3336.desc.intro: "De nuevo, el §HDevorador§! ha regresado para reclamar su tributo"
 utopia.3336.desc.gestalt: "$utopia.3336.desc.intro$, engullendo a una parte importante de la población de §Y[planet_target.GetName]§!.\n\nAunque entendemos los beneficios que se derivan de nuestro pacto con el Devorador, los sacrificios cada vez mayores que se producen en nuestro colectivo han empezado a sembrar disturbios e inestabilidad, lo cual nos ha fragmentado aún más."
 utopia.3336.desc.non_gestalt: "$utopia.3336.desc.intro$, consumiendo una parte importante de la población de §Y[planet_target.GetName]§!.\n\nAunque hemos podido mantener en secreto nuestro pacto con el Devorador frente a la población general, las personas que quedan en el planeta se muestran comprensiblemente temerosas y enfadadas por estas \"desapariciones misteriosas\" y exigen una explicación al gobierno."
 utopia.3336.opt.a: "Lamentable, pero inevitable."
 utopia.3337.name: "Devorador de Mundos: §RAvidez§!"
 utopia.3337.desc: "Una vez más, el Devorador ha vuelto para reclamar su tributo. No contento con solo una parte de la población, ha consumido el planeta entero. §Y[planet_target.GetName]§! ha quedado envuelto en una espesa niebla psiónica y las naves de rescate enviadas a la atmósfera no han regresado. Por suerte, el mundo no estaba habitado, pero la idea de que el próximo pueda estarlo por una de nuestras prósperas colonias nos estremece."
 utopia.3337.desc.shadows: "$utopia.3336.desc.intro$, devorando un planeta entero.\n\n§H[planet_target.GetName]§! se encuentra en estos momentos envuelto en una espesa niebla psiónica, y cualquier intento por atravesar la atmósfera no ha servido de nada. Este mundo estaba deshabitado; las consecuencias serán graves si el próximo objetivo es una colonia próspera."
 utopia.3337.opt.a: "¿Hasta dónde llegará esto?"
 utopia.3337.opt.tt: "[shrouded_planet.GetName] se convierte en §Y$pc_shrouded$§!"
 #utopia.3338.name: "Instrument of Desire: §RParticularism§!"
 #utopia.3338.desc: "The desires inflicted upon our people by the Instrument are strong. The people of §Y[planet_target.GetName]§! have become convinced that their own particular customs are of distinct and paramount importance over those of our society as a whole. Alternative political movements are springing up like wildfire, and the political situation on the planet has become unpredictable, to say the least."
 utopia.3338.opt.a: "Desafortunado."
 #utopia.3339.name: "Instrument of Desire: §RDeviance§!"
 #utopia.3339.desc: "The desires inflicted upon our people by the Instrument are strong. As if overnight, the population of our empire appear to have turned against both the government and the very traditions of our people, questioning ages-old customs and breaking social taboos. Support for government positions are rapidly dropping, and it seems we may be in for a period of considerable political turmoil."
 #utopia.3339.opt.a: "Terrible!"
 utopia.3340.name: "Instrumento del Deseo: §RDecadencia§!"
 utopia.3340.desc.gestalt: "La influencia del §HInstrumento§! se puede sentir por toda la [GetBrainName]: sus deseos supramundanos de corromper nuestro colectivo con nociones abstractas individualistas, tales como \"exclusividad\", \"decadencia\" y \"riqueza\".\n\nDichos conceptos están enfermando a nuestros drones, haciendo que se desvíen de los propósitos unificadores que nos impulsan. Quizás tengamos que caer en estos vicios para recomponernos."
 utopia.3340.desc.organic_non_gestalt: "El §HInstrumento§! inflige fuertes deseos. Nuestra población ha caído presa de un frenesí de consumismo y decadencia, exigiendo bienes cada vez más exclusivos y alimentos cada vez más raros y exóticos. En varios distritos comerciales hay revueltas.\n\nPuede que nos veamos obligados a aumentar la producción de §H[GetInstrumentCraving]§! para aplacar a las masas."
 utopia.3340.desc.machine_non_gestalt: "Los deseos que surgen a raíz de la influencia del §HInstrumento§! en nuestra programación están anulando los centros lógicos de nuestra población.\n\nEl consumismo y la decadencia han empezado a restar eficiencia operativa, y las unidades se esfuerzan por modificar sus piezas con fines estéticos en lugar de cumplir con su funcionalidad prevista. La escasez de piezas de alta demanda ha provocado pequeños enfrentamientos entre las líneas de montaje.\n\nTendremos que aumentar la producción de §H[GetInstrumentCraving]§! para resolver el problema."
 utopia.3340.opt.a.organic_non_gestalt: "Pero ¿por qué?"
 utopia.3340.opt.a.machine_or_gestalt: "Ese es el precio del éxito."
 instrument_cravings: "Antojos salvajes"
 instrument_cravings_tooltip: "§RNuestras £pops£ poblaciones están en pleno mantenimiento de§! [GetInstrumentCravingIconAndName]"
 instrument_cravings_desc: "$the_instrument_of_desire_color_article_cap$ ha propiciado una nueva moda en nuestra población. Todo el mundo desea lo mismo, aunque es más bien por su propio beneficio en lugar de por la utilidad que tenga."
 instrument_cravings_gestalt: "$instrument_cravings$"
 instrument_cravings_gestalt_desc: "$the_instrument_of_desire_color_article_cap$ ha introducido la enfermedad del deseo compulsivo, una nueva sensación para nuestro colectivo. Todos ansiamos lo mismo, sea cual sea su propósito."
 utopia.3341.name: "[GetComposerMutationName]"
 utopia.3341.name.organic: "$name_composer$: §RMutación§!"
 utopia.3341.name.machine: "$name_composer$: §RReconfiguración§!"
 utopia.3341.desc.machine: "$the_composer_of_strands_color_article_cap$ nos ha concedido su bendición y ha alterado algunos de nuestros componentes cableados. Los circuitos han dado paso a nuevas configuraciones. El metal sólido se ha fundido y ha tomado formas completamente nuevas. Lo más llamativo es que nuestros neuroprocesadores siguen funcionando sin problemas."
 utopia.3341.desc.organic_gestalt: "$the_composer_of_strands_color_article_cap$ nos ha otorgado sus bendiciones, alterando el código genético de la especie §H[Root.GetSpeciesAdj]§!. Curiosamente, las rápidas e impredecibles mutaciones apenas han provocado reacciones. Parece que las mutaciones aleatorias e impredecibles pueden considerarse una parte normal de la vida y difícilmente dignas de indignación o alarma."
 utopia.3341.desc.organic_non_gestalt: "$the_composer_of_strands_color_article_cap$ nos ha otorgado sus bendiciones, alterando el código genético de la especie §H[Root.GetSpeciesAdj]§!. Curiosamente, las rápidas e impredecibles mutaciones apenas han provocado reacciones. Parece que nuestra población ha llegado a tratar las mutaciones aleatorias e impredecibles como una parte más de la vida, algo que difícilmente merece indignación o incluso discusión."
 utopia.3341.opt.a: "Veamos cuáles son los resultados..."
 utopia.3342.name: "Devorador de Mundos: §RHambre§!"
 utopia.3342.desc.intro: "El §HDevorador§! nunca quedará saciado del todo. Esta vez, ha probado una de nuestras colonias."
 utopia.3342.desc.outro: "ahora solo queda un cráter de un tamaño descomunal, plagado de remolinos de niebla morada."
 utopia.3342.desc.gestalt: "$utopia.3342.desc.intro$ En lo que antes era una parte importante de espacio físico ocupado por el colectivo $utopia.3342.desc.outro$"
 utopia.3342.desc.non_gestalt: "$utopia.3342.desc.intro$ Una parte importante del mundo ha desaparecido de nuestra realidad y $utopia.3342.desc.outro$"
 utopia.3342.opt.a.non_gestalt: "No será fácil encubrirlo..."
 utopia.3342.opt.a.gestalt: "Es el precio del poder."
 utopia.3343.name: "Devorador de Mundos: §RApetito§!"
 utopia.3343.desc.gestalt: "El §HDevorador§! ha vuelto para reclamar su tributo y ha devorado una ciudad entera en §Y[planet_target.GetName]§!. Con la pérdida de tantos drones, el colectivo ha pagado un alto precio por nuestro pacto con el Devorador."
 utopia.3343.desc.organic_non_gestalt: "Una vez más, el §HDevorador§! ha vuelto para reclamar su tributo y ha consumido una ciudad entera en §Y[planet_target.GetName]§!. Aunque hemos ocultado nuestro pacto con el Devorador a la mayor parte de la población, la gente que queda en el planeta, como es natural, está furiosa y asustada por estas \"misteriosas desapariciones\" y exigen una explicación al gobierno."
 utopia.3343.desc.machine_non_gestalt: "Una vez más, el §HDevorador§! ha vuelto para reclamar su tributo y ha consumido una ciudad entera en §Y[planet_target.GetName]§!. Aunque hemos ocultado nuestro pacto con el Devorador a la mayor parte de la población, la gente que queda en el planeta está descontenta por estas \"misteriosas desapariciones\" y exigen una explicación al gobierno."
 utopia.3343.opt.a.organic_non_gestalt: "Trágico, pero inevitable."
 utopia.3343.opt.a.machine_or_gestalt: "Lamentable, pero inevitable."
 utopia.3345.name: "[GetComposerDegenerationName]"
 utopia.3345.name.organic: "$name_composer$: §RDegeneración§!"
 utopia.3345.name.machine: "$name_composer$: §RDegradación irreparable§!"
 utopia.3345.desc.organic_1: "Las bendiciones de $the_composer_of_strands_color_article$ son impredecibles. Uno de nuestros líderes tuvo una experiencia desafortunada cuando su"
 utopia.3345.desc.organic_2: "cobró voluntad propia. En cuestión de minutos, degeneró en una masa retorcida. Como no tenemos esperanzas de poder revertir el proceso, hemos dado al líder"
 utopia.3345.desc.organic_3: "por muerto."
 utopia.3345.desc.organic_individual_lithoid: "$utopia.3345.desc.organic_1$ forma física $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_lithoid: "$utopia.3345.desc.organic_1$ forma física $utopia.3345.desc.organic_2$ dron $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_individual_non_lithoid: "carne $utopia.3345.desc.organic_1$ $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_non_lithoid: "$utopia.3345.desc.organic_1$ carne $utopia.3345.desc.organic_2$ dron $utopia.3345.desc.organic_3$"
 utopia.3345.desc.machine_non_gestalt: "Las bendiciones de $the_composer_of_strands_color_article$ son impredecibles. Uno de nuestros líderes experimentó un increíble fallo crítico cuando sus componentes físicos adquirieron voluntad propia y se fusionaron de forma espontánea en una nueva y extraña forma. [Root.GetName], el cual ha quedado reducido a una pieza de metal con averías e irreparable, ya no tiene utilidad para este líder."
 utopia.3345.desc.machine_gestalt: "Las bendiciones de $the_composer_of_strands_color_article$ son impredecibles. Uno de nuestros nodos líderes experimentó un increíble fallo crítico cuando sus componentes físicos adquirieron voluntad propia y se fusionaron de forma espontánea en una nueva y extraña forma. [Root.GetName], el cual ha quedado reducido a una pieza de metal con averías e irreparable, ya no tiene utilidad para este nodo líder."
 utopia.3345.opt.a.organic: "Ahora, su vida es más sencilla."
 utopia.3345.opt.a.machine: "Llega un momento en el que el hardware queda obsoleto."
 utopia.3346.name: "Compositor de Hebras: §RRegresión§!"
 utopia.3346.desc: "Los benevolentes regalos de $the_composer_of_strands_color_article$ han llegado a [devolved_species_planet.GetName], donde varias poblaciones han sufrido una grave mutación que las ha devuelto a un estado preinteligente."
 utopia.3346.opt.a.non_gestalt: "Fascinante, pero desafortunado."
 utopia.3346.opt.a.gestalt: "Desafortunado."
 utopia.3346.opt.a.tt: "§Y500§! £pop£ §Hpoblaciones§! de [devolved_species_planet.GetName] se han vuelto §Ypreinteligentes§!.\n\nCon la tecnología adecuada, podrán §Yevolucionar§! en la pestaña Especie."
 utopia.3347.name: "$name_cradle$: §RDesmilitarización§!"
 utopia.3347.desc: "La §HCuna§! busca el equilibrio en todas las cosas. Según nuestros [GetTelepathPlural], eso también incluye un ejército con fines de paz. El tamaño de nuestra armada debe de haber despertado la ira de nuestra mecenas, pues varias naves de §H[demilitarized_fleet.GetFleetName]§! han desaparecido de repente en un violento estallido de energía psiónica."
 utopia.3347.opt.a: "$UNFORTUNATE$"
 utopia.3347.opt.a.tt: "Una flota al azar bajo nuestro control pierde hasta 12 de §Hcapacidad naval§!."
 utopia.3348.name: "[GetCradleChaoticAnguishName]"
 utopia.3348.name.organic_non_gestalt: "$name_cradle$: §RAngustia§!"
 utopia.3348.name.machine_or_gestalt: "$name_cradle$: §RDisrupción§!"
 utopia.3348.desc.intro: "[GetCradleAnguishIntro]"
 utopia.3348.desc.organic_non_gestalt: "$utopia.3348.desc.intro$ angustia existencial."
 utopia.3348.desc.machine_or_gestalt: "$utopia.3348.desc.intro$ alteración cognitiva."
 utopia.3348.desc_intro_homicidal: "En sintonía con la voluntad de la §HCuna§!, la psique [root.GetSpeciesAdj] es víctima de la disonancia y alimenta la absurdidad de una coexistencia armoniosa entre todas las mentes. Como respuesta al actual caos de asuntos galácticos, una nueva ola de perturbaciones psiónicas se ha extendido por la población y ha causado una amplia"
 utopia.3348.desc_intro_default: "En sintonía con la voluntad de la §HCuna§!, los [root.GetSpeciesAdj] han llegado a favorecer una coexistencia armoniosa entre todas las mentes. Como respuesta al actual caos de asuntos galácticos, una nueva ola de perturbaciones psiónicas se ha extendido por la población y ha causado una amplia"
 utopia.3348.opt.a: "Debemos aguantar."
 anguish_of_the_cradle: "Angustia de la Cuna"
 anguish_of_the_cradle_desc: "$the_cradle_of_souls_article_cap$ ha enviado una ola de perturbaciones psiónicas a la población."
 anguish_of_the_cradle_gestalt: "$anguish_of_the_cradle$"
 anguish_of_the_cradle_gestalt_desc: "$anguish_of_the_cradle_desc$"
 utopia.3349.name: "$name_cradle$: §RLimitación§!"
 utopia.3349.desc: "Apoyar y mantener nuestras flotas militares se antoja cada vez más difícil en §H[root.GetName]§!.\n\nNuestros [GetTelepathPlural] perciben que esta interrupción la ha causado la §HCuna§!, quien anhela el orden galáctico. Nuestras inversiones en infraestructura militar se han ganado su descontento, por pequeñas que fueran."
 utopia.3349.opt.a: "Deberíamos limitar nuestra presencia en el vacío."
 limit_of_the_cradle: "Límite de la Cuna"
 limit_of_the_cradle_desc: "Nuestra infraestructura de apoyo militar se ha visto limitada por $the_cradle_of_souls_article$."
 utopia.3350.name: "[GetLavishLifestyleEventName]"
 utopia.3350.name.individual: "$name_instrument$: §REstilo de vida lujoso§!"
 utopia.3350.name.gestalt: "$name_instrument$: §RConsumo excesivo§!"
 utopia.3350.desc.individual: "Nuestro vínculo con el §HInstrumento§! está provocando que parte de los líderes [Root.GetSpeciesAdj] desarrollen hábitos de consumo caros.\n\nSe ha visto a [lavish_leader.GetName] gastando grandes sumas de créditos energéticos en objetos extravagantes. Así, apoya un estilo de vida personal cada vez más indulgente."
 utopia.3350.desc.gestalt: "Nuestro estrecho vínculo con el §HInstrumento§! está aumentando el consumo de recursos de algunos drones líderes [Root.GetSpeciesAdj].\n\n[lavish_leader.GetName] ha estado empleando más energía de la necesaria para su funcionamiento básico. Esto carece de base científica, por lo que podemos concluir que este indulgente uso de los recursos es preferencial."
 utopia.3350.opt.a: "Ese es el precio del deseo."
 utopia.3351.name: "$name_instrument$: §RDistracciones de mano de obra§!"
 utopia.3351.desc.individual: "A medida que la influencia de nuestro mecenas se extiende por [Root.GetName], las nuevas actividades de ocio distraen y desvían la energía de la población del trabajo productivo.\n\nAnte la pérdida de motivación, para lograr los mismos resultados de la fuerza laboral ahora hace falta una mayor inversión."
 utopia.3351.desc.gestalt: "A medida que la influencia de nuestro mecenas se extiende cada vez más a través de [Root.GetName], ha surgido una desviación progresiva dentro del colectivo [Root.GetSpeciesAdj].\n\nLos impulsos individualistas momentáneos y la propensión a la distracción se dan con regularidad durante el trabajo. Mantener la cohesión y la disciplina de la mano de obra ahora requiere mayor inversión."
 utopia.3351.opt.a: "Un capricho temporal del §HInstrumento§!."
 distracted_workforce: "Mano de obra distraída"
 distracted_workforce_desc: "Esta mano de obra es propensa a distraerse y requiere supervisión constante."
 utopia.200.name: "Una nueva presencia en el Velo"
 utopia.200.desc.a: "Se ha producido un cambio en los [target_species.GetNamePlural] que viven en nuestro imperio. Comenzó como una tenue onda en el Velo. Ahora es como si vibrasen a otro nivel. Todos notamos que los [target_species.GetNamePlural] están a punto de desarrollar habilidades psiónicas latentes, similares a las nuestras.\n\nQuizá se deba a su proximidad a nosotros. Quizá el Velo los haya elegido. El Cónclave de Telépatas, nuestros expertos psiónicos, nos avisa de que quizá sea nuestra última oportunidad de intervenir. Podemos cortar esto por lo sano o ayudarles a despertar. No llegarán lejos sin nuestra guía."
 utopia.200.desc.b: "Actividades inusuales en el Velo sugieren que otra especie de nuestra nación, los [target_species.GetNamePlural], empiezan a manifestar habilidades psiónicas latentes. Ahora nos enfrentamos a la misma elección de antes. ¿Reprimiremos o desataremos sus incipientes poderes?"
 utopia.200.a: "Vamos a desbloquear su potencial."
 utopia.200.a.tooltip: "Todas las poblaciones [target_species.GetAdj] ganarán el rasgo §Y$trait_latent_psionic$§!."
 utopia.200.b: "No son dignos."
 utopia.203.name: "El despertar"
 utopia.203.desc.a: "Bajo la guía del Cónclave de Telépatas, los [target_species.GetNamePlural] han desarrollado una conexión más profunda con el Velo de lo que podíamos imaginar. Es como si estos poderes hubieran estado destinados para ellos desde el principio.\n\nAhora dicen que están listos para desbloquear todo su potencial psiónico. El Cónclave, sin embargo, está dividido. A algunos les preocupa que la rapidez del cambio vuelva sus mentes inestables, a otros que los nuevos poderes se les suban a la cabeza. Pero si no actuamos ahora, quizá no tengamos otra oportunidad."
 utopia.203.desc.b: "Los [target_species.GetNamePlural] también dicen estar listos para dar los pasos necesarios para desarrollar todo su potencial psiónico y despertar."
 utopia.203.a: "Están listos."
 utopia.203.a.tooltip: "Todas las poblaciones [target_species.GetAdj] ganarán el rasgo §Y$trait_psionic$§!."
 utopia.203.b: "No son dignos."
 utopia.203.c: "Es demasiado peligroso."
 utopia.204.name: "Un rudo despertar"
 utopia.204.desc.a: "Últimamente, nuestros investigadores están perplejos ante la inesperada manifestación de habilidades psiónicas en algunos [original_species.GetSpeciesNamePlural]. Tras investigar, averiguaron que los cambios coincidieron con un importante despertar psiónico de sus hermanos en el [target_country.GetName], una nación que cuenta con poderes psiónicos hace tiempo.\n\nDebemos asumir que algunas de sus capacidades se han transmitido a sus parientes lejanos en nuestro imperio, por un medio que no entendemos todavía."
 utopia.204.desc.b: "Últimamente, nuestros investigadores están perplejos ante la inesperada manifestación de habilidades psiónicas en algunos [original_species.GetSpeciesNamePlural]. Tras un examen más atento, descubrieron que están vinculados telepáticamente con sus parientes de una nación previamente desconocida, los [target_country.GetName], con los que ya hemos establecido comunicaciones. Parece que los cambios se han debido a un efecto de onda, causado por un importante despertar psiónico de todos los [original_species.GetSpeciesNamePlural] en [target_country.GetName]."
 utopia.204.a.tooltip: "Hasta 4 poblaciones [original_species.GetSpeciesAdj] ganarán el rasgo §Ypsiónico latente§!."
 utopia.205.name: "Un despertar inesperado"
 utopia.205.desc: "Tras el despertar psiónico de los [target_species.GetName], nuestros informadores dicen que algunos individuos de la misma especie en otros lugares han comenzado a mostrar signos de habilidades psiónicas latentes. Es como si su ascendencia común les uniese con el Velo, sin importar la distancia física entre sí.\n\nSin embargo, a diferencia de sus parientes lejanos en nuestra nación, son escasos y es poco probable que alcancen un despertar pleno."
 whisperers_madness: "Locura del Velo"
 whisperers_madness_desc: "La población de nuestro imperio está dividida como resultado de la locura provocada por $whisperers_in_the_void_color_article$."
 whisperers_madness_gestalt: "$whisperers_madness$"
 whisperers_madness_gestalt_desc: "Nuestros drones están divididos como resultado de la histeria colectiva provocada por $whisperers_in_the_void_color_article$."
 whisperers_psychosis: "Psicosis del Velo"
 whisperers_psychosis_desc: "Nuestro imperio ha caído víctima de disputas internas como resultado de la locura provocada por $whisperers_in_the_void_color_article$."
 whisperers_psychosis_gestalt: "$whisperers_psychosis$"
 whisperers_psychosis_gestalt_desc: "Nuestro imperio ha caído víctima de la discordia interna como resultado de los desequilibrios provocados por $whisperers_in_the_void_color_article$."
 eater_unhappiness_planet_1: "Población devorada por el Velo"
 eater_unhappiness_planet_1_desc: "El $the_eater_of_worlds_color_article$ ha devorado una parte de la población de este planeta."
 eater_unhappiness_planet_1_gestalt: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_1_gestalt_desc: "$eater_unhappiness_planet_1_desc$"
 eater_unhappiness_planet_2: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_2_desc: "$eater_unhappiness_planet_1_desc$"
 eater_unhappiness_planet_2_gestalt: "$eater_unhappiness_planet_2$"
 eater_unhappiness_planet_2_gestalt_desc: "$eater_unhappiness_planet_2_desc$"
 eater_unhappiness_empire: "Mundo devorado por el Velo"
 eater_unhappiness_empire_desc: "Todo un planeta de nuestro imperio fue consumido por $the_eater_of_worlds_color_article$."
 eater_unhappiness_empire_gestalt: "$eater_unhappiness_empire$"
 eater_unhappiness_empire_gestalt_desc: "$eater_unhappiness_empire_desc$"
 instrument_deviance_planet: "Degeneración del Velo"
 instrument_deviance_planet_desc: "La población de este planeta se aparta de las éticas del gobierno y buscan sus propias metas. Esto se debe sin duda al §YInstrumento del Deseo§!."
 instrument_deviance_empire: "Degeneración del Velo"
 instrument_deviance_empire_desc: "La población de todo el imperio ha empezado a cuestionar las éticas y políticas de nuestro imperio. Esto se debe sin duda al §YInstrumento del Deseo§!."
 instrument_consumer_goods: "Decadencia del Velo"
 instrument_consumer_goods_desc: "La población de este planeta se ha sumido en el consumismo decadente y solo quiere comidas exclusivas y mercancías exóticas. Esto se debe sin duda al §YInstrumento del Deseo§!."
 d_eater_deposit: "Cráter velado"
 d_eater_deposit_desc: "Una entidad del §HVelo§! ha devorado parte de este planeta. En el cráter resultante hay remolinos de niebla morada, y aquellos que se aventuran cerca de ellos no suelen regresar."
 opinion_doomed_us_all: "Trajo el Fin"
 absorbed_consciousness_1: "Consciencia absorbida"
 absorbed_consciousness_2: "$absorbed_consciousness_1$"
