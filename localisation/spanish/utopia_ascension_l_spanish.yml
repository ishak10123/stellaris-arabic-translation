 utopia.3000.name: "El Velo"
 utopia.3000.a: "Adentraros en el Velo."
 utopia.3000.intro.desc: "El Velo. Es increíblemente extraño y turbador, pero también... inmediatamente familiar. Cualquiera con poderes psiónicos habrá visto este lugar en sus sueños, aunque probablemente no supiera lo que era.\n\nAhora permanecemos en el mismo borde de este reino, no muy lejos del vacío intermedio y que sirve de frontera con el espacio normal, o lo que llamaríamos el mundo real.\n\nAventurarse más profundamente en el Velo requerirá un gran esfuerzo por parte de nuestros telépatas, así como una gran cantidad de energía. No debemos demorarnos. Incluso ahora, nos observan."
 utopia.3000.1.desc: "Hoy el Velo está tranquilo."
 utopia.3000.2.desc: "Algo nos está observando."
 utopia.3000.3.desc: "Todo parece distinto desde este lado."
 utopia.3000.4.desc: "Deberían haber enviado a un poeta..."
 utopia.3000.5.desc: "Algo oscuro se acerca."
 utopia.3000.6.desc: "¿Todavía estamos soñando?"
 utopia.3000.7.desc: "Lo... lo logramos. ¡Estamos dentro!"
 utopia.3000.8.desc: "Hay una... especie de presencia cercana. Nos invita a profundizar en el Velo..."
 utopia.3000.9.desc: "¿Tú también escuchas las voces?"
 utopia.3000.10.desc: "El Velo palpita con poder. Se siente como... el hogar."
 utopia.3000.11.desc: "¿Crees que eso que respiras ahora es aire?"
 utopia.3000.12.desc: "Vemos, y sin embargo no vemos. Hay mucho que aprender de este lugar."
 utopia.3000.13.desc: "¿De qué sentidos carecemos que no vemos ni oímos este otro mundo que nos rodea?"
 utopia.3000.14.desc: "Ten mucho cuidado. Cualquier pensamiento aleatorio puede cobrar forma tangible en este espacio... y, en la mayoría de los casos, volverse contra uno."
 utopia.3000.15.desc: "No deberíamos estar aquí."
 utopia.3000.16.desc: "Tanto... poder..."
 utopia.3000.17.desc: "Debo... concentrarme..."
 utopia.3000.18.desc: "¿Podría ser esto donde comenzó todo?"
 utopia.3000.19.desc: "El horror... el horror tiene rostro."
 utopia.3000.b: "§MContactemos con un poder superior.§!"
 utopia.3005.desc: "Somos conscientes de la existencia de grandes poderes. Aunque por lo general no llamamos la atención, podríamos intentar entablar contacto a través de los poderes de Zro. Nuestros telépatas sienten la influencia de estas entidades por todo el Velo. ¿Con quién deberíamos contactar?"
 utopia.3005.a: "§GCon alguien que apesta a carne desprendida.§!"
 utopia.3005.b: "§PCon alguien que grita con un vacío insaciable.§!"
 utopia.3005.c: "§HCon alguien que susurra sobre anhelo y posesión.§!"
 utopia.3005.d: "§BCon alguien que sabe a confianza rota.§!"
 utopia.3010.desc: "El Cónclave de Telépatas todavía no se ha recuperado del esfuerzo de nuestra anterior visita al Velo. Sin sus poderes psiónicos combinados, solo podemos ver breves atisbos de este efímero sueño, como los bordes borrosos de un recuerdo que yace justo más allá del alcance.\n\nAquí no hay nada para nosotros. Tendremos que volver más tarde."
 boon.bestowed: "§GBeneficio otorgado§!"
 curse.bestowed: "§RMaldición infligida§!"
 boon.psi.link.machine: "Las poderosas energías del §HVelo§! han inundado el centro de procesamiento psiónico común que comparten todos los [Root.GetSpeciesNamePlural]."
 boon.psi.link.organic_non_gestalt: "Las poderosas energías del §HVelo§! han inundado el vínculo psiónico común que comparten todos los [Root.GetSpeciesNamePlural]."
 boon.psi.link.hive: "Las poderosas energías del §HVelo§! han inundado el vínculo psiónico común que se extiende por toda la supramente [Root.GetAdjective]."
 boon.psi.link: "[GetBoonPsiLink]"
 boon.ship.link: "Nuestra división de [GetTelepathPlural] ha logrado establecer un conducto temporal entre el §HVelo§! y nuestras naves."
 utopia.3030.desc.gestalt: "$boon.psi.link$\n\nEstas energías recorren toda la red colectiva, garantizando una estabilidad óptima mientras nuestros drones cumplen su cometido."
 utopia.3030.desc.organic_non_gestalt: "$boon.psi.link$\n\nUna serenidad insondable se extiende por todo el [Root.GetName], llegando a afectar incluso a los individuos carentes de habilidades psiónicas."
 utopia.3030.desc.machine_non_gestalt: "$boon.psi.link$\n\nUn insondable equilibrio operativo se extiende por todo el [Root.GetName], llegando a afectar incluso a los ejemplares carentes de componentes psiónicos."
 utopia.3031.desc: "$boon.ship.link$\n\nPor dilatado que sea su historial de servicio, nuestras flotas no presentan deterioro alguno. Como resultado, nuestros costes de mantenimiento se han reducido significativamente."
 utopia.3032.desc.non_gestalt: "$boon.psi.link$\n\nSe ha establecido una base de conocimientos colectiva que toda nuestra comunidad de [GetScientistPlural] comparte telepáticamente, lo que aumenta mucho la eficacia de su trabajo."
 utopia.3032.desc.organic_gestalt: "$boon.psi.link$\n\nLos nodos de investigación de la supramente [Root.GetSpeciesNamePlural] operan en perfecta sincronía y aumentan nuestra eficiencia cognitiva."
 utopia.3032.desc.machine_gestalt: "$boon.psi.link$\n\nLos bucles de renderizado psiónico permiten que nuestra matriz de investigación funcione más allá de la máxima eficiencia, mejorando enormemente la eficiencia del aprendizaje."
 utopia.3033.desc: "$boon.ship.link$\n\nLas tripulaciones de nuestras naves de guerra pueden ahora mejorar la fuerza de nuestros sistemas de escudos mediante sus poderes psiónicos."
 utopia.3034.desc: "$boon.ship.link$\n\nMediante sus poderes psiónicos, nuestra tripulación ahora es capaz de mejorar la fuerza de nuestros sistemas de armas."
 utopia.3035.desc: "$boon.ship.link$\n\nMediante sus poderes psiónicos, nuestra tripulación ahora puede aumentar la cadencia de fuego de nuestros sistemas de armas."
 utopia.3036.desc.organic_non_gestalt: "$boon.psi.link$\n\nHa surgido un nuevo sentido de solidaridad en los corazones y las mentes de nuestros ciudadanos, ahora más dispuestos que nunca a trabajar unidos en pos de objetivos mutuos establecidos por nuestro gobierno."
 utopia.3036.desc.machine_non_gestalt: "$boon.psi.link$\n\nHa surgido un nuevo sentido de solidaridad en los núcleos procesadores de nuestros ciudadanos, ahora más dispuestos que nunca a trabajar unidos en pos de objetivos mutuos establecidos por nuestro gobierno."
 utopia.3036.desc.gestalt: "$boon.psi.link$\n\nEstas energías se extienden por todo el colectivo, agilizando el desempeño eficiente de nuestros drones y reduciendo toda desviación latente que, de existir, nos distraería de nuestros objetivos."
 utopia.3037.desc.organic_non_genocidal: "$boon.psi.link$\n\nNuestros émpatas son más fuertes que nunca, así que tenemos una mayor influencia política."
 utopia.3037.desc.machine_non_genocidal: "$boon.psi.link$\n\nNuestras unidades diplomáticas operan a máxima eficiencia empática, factor que a su vez aumenta su influencia política."
 utopia.3037.desc.genocidal: "$boon.psi.link$\n\nNuestra voluntad se impone a la galaxia en una magnitud como nunca antes."
 utopia.3038.desc.gestalt: "$boon.psi.link$\n\nNunca hemos experimentado tanta claridad y unidad de propósito."
 utopia.3038.desc.non_gestalt: "$boon.psi.link$\n\nNunca habíamos tenido mayor sentido de unidad."
 utopia.3039.desc: "$boon.ship.link$\n\nMediante sus poderes psiónicos, nuestra tripulación ahora puede afectar directamente al movimiento de nuestras naves, aumentando su capacidad de evasión ante el fuego enemigo."
 utopia.3040.desc.organic: "$boon.ship.link$\n\nMediante sus poderes psiónicos, nuestra tripulación ahora puede realizar reparaciones limitadas sobre el terreno y cerrar brechas en el casco solo con sus mentes."
 utopia.3040.desc.machine: "$boon.ship.link$\n\nMediante sus poderes psiónicos, nuestra tripulación ahora puede realizar reparaciones limitadas sobre el terreno y cerrar brechas en el casco sin más herramientas que sus neuroprocesadores."
 utopia.3041.desc.machine: "$boon.psi.link$\n\nNuestra división de [GetTelepathPlural] se ha servido de este poder para aumentar, aunque sea de forma pasajera, el rendimiento funcional de nuestros líderes más prominentes, aplazando varias décadas la obsolescencia de dichas unidades. Lástima que el volumen de energía psiónica no baste para mejorar a toda la población."
 utopia.3041.desc.organic_gestalt: "$boon.psi.link$\n\nNuestros [GetTelepathPlural] han usado este poder para ralentizar momentáneamente el proceso de envejecimiento de nuestros drones líderes más destacados, añadiendo décadas a sus vidas naturales. Lástima que el volumen de energía psiónica no baste para mejorar a toda la población."
 utopia.3041.desc.organic_non_gestalt: "$boon.psi.link$\n\nNuestra división de [GetTelepathPlural] se ha servido de este poder para aumentar, aunque sea de forma pasajera, el deterioro de nuestros líderes más prominentes, sumando décadas a su esperanza de vida natural. Lástima que el volumen de energía psiónica no baste para mejorar a toda la población."
 utopia.3041.tooltip: "Todos los líderes obtienen el rasgo §Y$leader_trait_shroud_age$§!, que otorga §G+40§! años de vida útil del líder."
 utopia.3042.desc: "$boon.ship.link$\n\nMediante sus poderes psiónicos, nuestra tripulación ahora puede mejorar la fuerza de los propulsores de sus naves, lo que aumenta en gran medida su velocidad sublumínica."
 utopia.3043.desc.organic: "$boon.psi.link$\n\nEsto ha fortalecido las mentes de nuestros soldados frente a cualquier peligro del campo de batalla. Su moral no conoce parangón."
 utopia.3043.desc.machine_or_gestalt: "$boon.psi.link$\n\nEsto ha reforzado el compromiso de nuestros drones de combate respecto a su propósito, optimizando su eficiencia en el campo."
 utopia.3044.desc: "$boon.psi.link$\n\nAhora podemos detectar las naves que se mueven por el espacio desde más distancia que la de cualquier sensor convencional."
 utopia.3045.name: "Expulsión del Velo"
 utopia.3045.1.desc: "De repente, varias capas de energía del reino psíquico cambiaron sin previo aviso y se colapsó el conducto con el que nuestro equipo de [GetTelepathPlural] conectaba con el Velo.\n\nEstamos siendo expulsados de vuelta al espacio normal."
 utopia.3045.2.desc: "Nuestro equipo de [GetTelepathPlural] se encuentra extenuado a causa del intenso esfuerzo que conllevó nuestra comunión con el Velo.\n\nNo pueden seguir manteniendo el vínculo."
 utopia.3045.3.desc_organic: "Lentamente al principio, luego cada vez más rápido, el Velo se nos está yendo de las manos. Nuestro equipo de [GetTelepathPlural] grita presa de la angustia al perder la estabilidad mientras algo nos expulsa de vuelta al espacio normal."
 utopia.3045.3.desc_machine: "Lentamente al principio, luego cada vez más rápido, el Velo se nos está yendo de las manos. Nuestra división de [GetTelepathPlural] comienza a fallar al perder la estabilidad, mientras algo nos expulsa de vuelta al espacio normal."
 curse.psi.link.organic: "Un poderoso contragolpe psíquico ha rebotado por nuestro conducto del Velo y por el vínculo psiónico compartido por todos los [Root.GetSpeciesNamePlural]."
 curse.psi.link.machine: "Un poderoso contragolpe neural ha rebotado por nuestro conducto del Velo y por el vínculo psiónico compartido por todos los [Root.GetSpeciesNamePlural]."
 curse.psi.link: "[GetCursePsiLink]"
 curse.ship.link: "Un potente contragolpe psiónico ha rebotado por nuestro conducto del Velo y parece que está afectando a nuestras naves."
 utopia.3050.desc.gestalt: "$curse.psi.link$\n\nEl fenómeno ha provocado una perturbación en el colectivo de [Root.GetName], desestabilizando a todo el imperio."
 utopia.3050.desc.non_gestalt: "$curse.psi.link$\n\nEsto ha tenido un profundo efecto en la felicidad de nuestros ciudadanos, y un sentido de pesadumbre se extiende por el [Root.GetName]."
 utopia.3051.desc.gestalt: "$curse.psi.link$\n\nEsto ha desencadenado ondas de choque que atraviesan todo el colectivo, lo que a su vez ha provocado un comportamiento desviado entre nuestros drones."
 utopia.3051.desc.non_gestalt: "$curse.psi.link$\n\nEsta energía negativa ha sembrado la duda en las mentes de nuestros ciudadanos. Muchos adoptan nuevas ideas radicales que no coinciden con las de nuestro gobierno. ¡El efecto incluso se ha extendido a nuestros ciudadanos no psíquicos!"
 utopia.3052.desc: "$curse.ship.link$\n\nSus blindajes se han debilitado y ya no pueden soportar el mismo castigo que antes."
 utopia.3053.desc.machine: "$curse.psi.link$\n\nLa tensión resultante en nuestra red neural ha provocado una caída notable en la construcción de unidades en [Root.GetName]."
 utopia.3053.desc.organic_gestalt: "$curse.psi.link$\n\nEl dolor resultante que se siente en todo el colectivo ha causado una disminución notable en nuestra capacidad de producir nuevos drones físicos."
 utopia.3053.desc.organic_non_gestalt: "$curse.psi.link$\n\nPor alguna razón, esto ha tenido un efecto negativo en la tasa de nacimientos del [Root.GetName]. ¡Afecta incluso a otras razas que carecen de habilidades psiónicas inherentes!"
 utopia.3054.desc.machine_gestalt: "$curse.psi.link$\n\nLos bucles de retroalimentación de representación psiónica resultantes están impidiendo que nuestra matriz de investigación funcione de manera eficiente a su máxima capacidad."
 utopia.3054.desc.machine_non_gestalt: "$curse.psi.link$\n\nLos sistemas de [GetMindPhysicalLoc] de nuestros investigadores se ha sobrecargado, de manera que su eficiencia laboral se ha resentido."
 utopia.3054.desc.organic_gestalt: "$curse.psi.link$\n\nLos nodos centrados en la investigación del colectivo de [Root.GetSpeciesNamePlural] están sobrecargados, lo que nos impide procesar descubrimientos de manera eficiente."
 utopia.3054.desc.organic_non_gestalt: "$curse.psi.link$\n\nNuestros investigadores advierten que sus [GetMindPhysicalLoc] padecen una extraña obnubilación, lo que va en detrimento de su eficiencia laboral."
 utopia.3055.desc: "$curse.psi.link$\n\nLa velocidad a la que acumulamos influencia política se ha reducido mucho."
 utopia.3056.desc.organic_non_gestalt: "$curse.psi.link$\n\nEl sentido de unidad que una vez existió entre nuestros ciudadanos se ha perdido."
 utopia.3056.desc.machine_or_gestalt: "$curse.psi.link$\n\nEl sentido de unidad que otrora reinaba en el [Root.GetName] se tambalea, amenazando con provocar una descoordinación generalizada."
 utopia.3057.desc: "$curse.ship.link$\n\nNuestras naves se mueven como si una fuerza invisible las lastrara, lo que entorpece de forma palpable los viajes sublumínicos."
 utopia.3058.desc.organic_non_gestalt: "$curse.psi.link$\n\nEsta energía negativa ha perjudicado a la moral de nuestras tropas terrestres, que serán mucho menos efectivas en combate durante un tiempo."
 utopia.3058.desc.machine_or_gestalt: "$curse.psi.link$\n\nLos bucles de retroalimentación que han derivado del exceso de energía han restado eficiencia operativa a nuestras tropas terrestres."
 utopia.3059.desc: "Un potente contragolpe psiónico ha rebotado por nuestro conducto del Velo y parece que interfiere con nuestros sensores interestelares.\n\nHay una gran reducción en la resolución del sensor y ahora el alcance es mucho más corto."
