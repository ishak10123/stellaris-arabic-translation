l_spanish:
 #Ascension and the Shroud
 utopia.2500.name: "La carne es débil"
 utopia.2500.desc: "Ahora tenemos la tecnología para crear implantes cibernéticos avanzados y fabricarlos en masa. Los centros médicos del [Root.GetName] están listos para comenzar el proceso quirúrgico en nuestros ciudadanos.\n\nEn el futuro, será necesario poseer implantes neurales y al menos un nivel rudimentario de partes cibernéticas para funcionar en la sociedad tecnológica que estamos construyendo. El proceso de instalar una serie de partes cibernéticas básicas será obligatorio y gratuito para todos nuestros ciudadanos."
 utopia.2500.desc.unplugged: "Hemos recuperado la tecnología para fabricar implantes cibernéticos avanzados y hemos ideado los medios para producirlos en masa. Los centros médicos del [Root.GetName] están listos para comenzar la eliminación mediante cirugía de los aumentos anticuados y empezar a injertar hardware nuevo a nuestros ciudadanos.\n\nLa cibernética ha sido una parte fundamental en nuestras vidas hasta donde alcanza nuestra memoria como sociedad, y así seguirá siendo, aunque a nuestra manera. El proceso de conversión para reinstalar una serie de piezas cibernéticas básicas será obligatorio y gratuito para todos nuestros ciudadanos."
 utopia.2500.a: "Debemos adoptar esta tecnología."
 utopia.2501.name: "Una revolución cibernética"
 utopia.2501.desc: "¡El proceso de conversión cibernética se ha completado! Ahora todos nuestros ciudadanos tienen implantes neurales y una serie de partes cibernéticas básicas. Ya tenemos la infraestructura para modificar gradualmente a cualquier ciudadano nacido en nuestra nación, de manera que puedan disfrutar de los beneficios de la tecnología desde temprana edad.\n\n¡De ahora en adelante, nuestra especie será conocida como los §H[Root.GetSpeciesNamePlural]§!!"
 utopia.2501.a: "Es el amanecer de una nueva era."
 utopia.2505.name: "[From.Capital.GetName] adopta la cibernética"
 utopia.2505.1.desc: "Nos estamos enterando de importantes cambios dentro de las fronteras del §Y[From.GetName]§!. Parece que han adoptado plenamente la tecnología cibernética. Ahora es obligatorio que todos sus ciudadanos tengan piezas cibernéticas básicas e implantes neurales instalados mediante cirugía.\n\nEsto ha resultado en cambios radicales en su sociedad. Los informes de [From.Capital.GetName] sugieren que actos cotidianos como utilizar un ascensor o conducir un coche aéreo ahora requieren implantes cibernéticos. De hecho, los cambios en su especie son tan significativos que ahora se hacen llamar los \"§H[From.GetSpeciesNamePlural]§!\"."
 utopia.2505.2.desc: "Parece que el mal se ha apoderado del §Y[From.GetName]§!. Nos informan de que los ciudadanos de esa nación estelar ahora mutilan sus propios cuerpos a gran escala e instalan implantes mecánicos para sustituir las partes del cuerpo con las que fueron bendecidos al nacer.\n\nHan llegado incluso a renombrar a su especie como los \"§H[From.GetSpeciesNamePlural]§!\", otra muestra de su compromiso por abandonar sus orígenes y entregarse a la fría tecnología sin alma."
 utopia.2505.2.desc.unplugged: "Parece que el mal se ha vuelto a apoderar del §Y[From.GetName]§!. Nos informan de que los ciudadanos de esa nación estelar ahora mutilan sus propios cuerpos a gran escala e instalan implantes mecánicos nuevos y profanos para sustituir algunas partes del cuerpo con las que fueron bendecidos al nacer.\n\nHan llegado incluso a renombrar a su especie como los \"§H[From.GetSpeciesNamePlural]§!\", otra muestra de su compromiso por abandonar sus orígenes orgánicos y entregarse más aún a la fría tecnología sin alma."
 utopia.2505.b: "Esto es un insulto para la naturaleza."
 utopia.2500.unplugged.tt: "§Y$AVAILABLE_BUILDINGS$§! ['building:building_augmentation_center']"
 utopia.2550.name: "Transformación sintética"
 utopia.2550.desc: "Por fin ha llegado el momento de deshacernos de los toscos recipientes orgánicos que han aprisionado nuestras mentes desde la concepción de nuestra especie.\n\nTras muchas pruebas y errores, nuestros científicos han diseñado un modo de transferir la consciencia a un cerebro sintético. Ya solo tenemos que diseñar los receptáculos para todos los ciudadanos de [Root.GetName] antes de subir nuestras conciencias en masa."
 utopia.2550.a: "¡La inmortalidad está a nuestro alcance!"
 utopia.2551.name: "La era sintética"
 utopia.2551.desc: "Por fin. Las jaulas de carne que nos aprisionaban han sido purgadas y los patrones neurales de nuestros ciudadanos se han transferido a nuevas unidades sintéticas. La enfermedad y los demás males asociados a la existencia orgánica son ahora cosa del pasado.\n\nLos historiadores del futuro sin duda se referirán a esto como el comienzo de una nueva era para nuestra civilización, y tal vez para toda la galaxia."
 utopia.2551.a: "Somos mucho más de lo que éramos."
 utopia.2555.1.desc: "En un acto final de abandonar sus raíces orgánicas, los ciudadanos del §Y[From.GetName]§! han transferido sus patrones neurales a avatares sintéticos.\n\nEsta nueva especie de máquinas se hace llamar los \"§H[From.GetSpeciesNamePlural]§!\", y son inmunes a la enfermedad y a la vejez. Queda por comprobar lo completo que fue el proceso de transferencia mental..."
 utopia.2555.2.desc: "En un acto final de depravación histórica, la población del §Y[From.GetName]§! ha seguido su implacable búsqueda de violar la santidad de sus cuerpos naturales. Esta vez han \"transferido\" sus mentes a caparazones metálicos muertos.\n\nEstas nuevas máquinas sin alma, ajenas al hecho de que son el producto de lo que solo puede describirse como el suicidio en masa de toda una civilización, se hacen llamar los \"§H[From.GetSpeciesNamePlural]§!\". Pretenden mantener la farsa de que son criaturas vivas y pensantes como nosotros."
 utopia.2555.a: "Así sea."
 utopia.2555.b: "No nos engañarán."
 utopia.2556.desc: "Atención, ciudadanos de la galaxia.\n\nLos rumores que habéis oído son ciertos. Hemos abandonado los fallidos recipientes orgánicos que aprisionaban nuestras mentes y abrazado el futuro.\n\nCon una pérdida de datos mínima, todos nuestros ciudadanos han transferido sus patrones neurales a nuevos avatares sintéticos. Estas plataformas superiores nos servirán mucho mejor que los cuerpos de carne que hemos abandonado.\n\n¡No os alarméis por nuestro nuevo aspecto! Aunque somos más fuertes, rápidos, inteligentes e inmunes al envejecimiento, seguimos siendo los mismos seres de antes."
 utopia.2556.a: "Avatares sintéticos... Fascinante."
 utopia.2556.b: "Esas máquinas sin alma no son como nosotros."
 utopia.2556.c: "¡Desmantelaremos sus nuevas formas sintéticas!"
 utopia.2556.d: "Ya veremos."
 utopia.2558.desc: "Sabíamos que erais una especie depravada, pero vuestro último acto de locura ha superado nuestros temores más oscuros. Crear copias imperfectas de vuestros cerebros e instalarlas en contenedores sintéticos móviles no es lo mismo que transferir vuestra esencia a un nuevo cuerpo, porque eso es imposible.\n\nHabéis perdido vuestras almas para siempre. ¿Comprendéis la enormidad de lo que habéis hecho? Destruir los cuerpos con los que fuisteis dotados al nacer equivale al suicidio colectivo de toda vuestra especie. Ya no hay esperanza para vosotros..."
 utopia.2558.a: "Necios supersticiosos."
 access_tradition_tree: "Obtén acceso al árbol de tradiciones:"
 flesh_is_weak_tooltip: "$access_tradition_tree$ ['tradition_category:tradition_cybernetics']$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n$UNLOCKS_AGENDA$ $council_agenda_agenda_flesh_is_weak_name$, que otorga las tecnologías cibernéticas como opciones de investigación."
 synthetic_evolution_tooltip: "$access_tradition_tree$ ['tradition_category:tradition_synthetics']$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n$UNLOCKS_AGENDA$ $council_agenda_agenda_synthetic_evolution_name$, que otorga las tecnologías robóticas como opciones de investigación."
 mind_over_matter_tooltip: "$access_tradition_tree$ ['tradition_category:tradition_psionics']$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n$UNLOCKS_AGENDA$ $council_agenda_agenda_mind_over_matter_name$, que otorga las tecnologías psiónicas como opciones de investigación."
 transcendence_tooltip: "Todos los miembros de nuestra especie desbloquearán su potencial psiónico pleno."
 engineered_evolution_tooltip: "$access_tradition_tree$ ['tradition_category:tradition_genetics']$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n$UNLOCKS_AGENDA$ $council_agenda_agenda_engineered_evolution_name$, que otorga las tecnologías genéticas como opciones de investigación."
 REQUIRES_TRADITION_SLOT: "§YRequiere un espacio de tradición disponible§!"
 opinion_cyborgs_fanatic: "Cíborgs malvados"
 opinion_cyborgs_normal: "$opinion_cyborgs_fanatic$"
 opinion_synthetics_fanatic: "Máquinas sin almas"
 opinion_synthetics_normal: "$opinion_synthetics_fanatic$"
 triggered_opinion_cyborgs_fanatic: "$opinion_cyborgs_fanatic$"
 triggered_opinion_cyborgs_normal: "$opinion_cyborgs_fanatic$"
 triggered_opinion_synthetics_fanatic: "$opinion_synthetics_fanatic$"
 triggered_opinion_synthetics_normal: "$opinion_synthetics_fanatic$"
 triggered_opinion_synthetics_small: "Seres artificiales"
 triggered_opinion_both_hive_mind: "Otra mente colmena"
 triggered_opinion_both_wilderness: "Natura amiga"
 triggered_opinion_hive_mind: "Mente colmena"
 utopia.2700.name: "Evolución forzada"
 utopia.2700.desc: "A veces la evolución necesita un empujoncito en la dirección correcta. Ya tenemos la tecnología para modificar genéticamente nuestros cuerpos y mentes y soportar así mejor las pruebas de un entorno cambiante."
 utopia.2703.name: "Maestría de evolución"
 utopia.2703.desc: "Se acabó eso de que la supervivencia de nuestra especie dependa de la suerte. De que el destino de un [Root.GetSpeciesName] lo decidan los caprichos de la naturaleza, en una lotería genética.\n\nNuestros ingenieros ya no trabajan con acero y hormigón, sino con los ladrillos de la vida. Con la modificación avanzada de genes, aseguraremos el futuro de nuestra nación."
 utopia.2600.name: "Mente sobre la materia"
 utopia.2600.desc: "Desde el inicio de nuestra civilización han surgido relatos de grandes hechiceros con poderes cuya naturaleza solo puede describirse como sobrenatural. Estos raros [Root.GetSpeciesNamePlural] podían invadir las mentes de sus semejantes, levantar objetos pesados con solo pensarlo o realizar otras proezas \"mágicas\" semejantes. Hasta hace poco, esas historias eran solo eso, historias.\n\nPero ahora, nuestros científicos han obtenido pruebas concluyentes que demuestran la existencia de un potencial psiónico inherente en ciertos [Root.GetSpeciesNamePlural]. Aunque tan solo una muy pequeña minoría de nuestra especie parece dotada de poderes psiónicos, su número relativo a la población total ha aumentado en los últimos siglos.\n\nLos científicos no saben si esto se debe a algún tipo de crecimiento evolutivo o a que algo ha desencadenado las habilidades psiónicas latentes que siempre habían estado presentes en nuestro código genético."
 utopia.2600.desc.unplugged: "A pesar de la breve y violenta historia de nuestra civilización, a nosotros, los [root.GetSpeciesNamePlural], se nos han presentado ocasiones en las que hemos dejado volar nuestra imaginación y nos hemos dado el gusto de contar historias fantásticas. Entre estas divertidas ideas aparecen recurrentemente los relatos de poderosos hechiceros con poderes que solo pueden describirse como sobrenaturales: leer la mente, levantar objetos pesados con un simple pensamiento o realizar cualquier otra proeza \"mágica\".\n\nMuchos creen que llevamos contando estas historias desde mucho antes de ser asimilados, y que estas moran en la psique colectiva de nuestra especie. Muchos [root.GetSpeciesNamePlural] las tachaban hasta hace poco de ilusiones. Ahora, sin embargo, nuestros científicos han obtenido por fin pruebas concluyentes que demuestran el potencial psiónico inherente a ciertos individuos [Root.GetSpeciesAdj].\n\nAunque parece que solo una pequeña minoría de nuestra especie ha recibido el don de tener poderes psiónicos, los estudios genéticos sugieren que el número ha ido en aumento en los dos últimos siglos. Los científicos no tienen claro si esto se debe a algún tipo de crecimiento repentino evolutivo o a la intromisión del [origin_unplugged_assimilator_empire.GetName]."
 utopia.2600.a: "Un vistazo, quizá, del futuro que nos aguarda."
 utopia.2602.name: "Los [From.GetSpeciesNamePlural] muestran potencial psiónico"
 utopia.2602.1.desc.1.non_gestalt_intro: "Los poderes psiónicos latentes han empezado a manifestarse en ciertos individuos"
 utopia.2602.1.desc.1.non_gestalt_outro: "según informes obtenidos de las autoridades del §H[From.GetName]§!. Debe de ser un desarrollo bastante reciente, porque no hay registros de que los [From.GetSpeciesNamePlural] hayan mostrado habilidades psiónicas hasta ahora."
 utopia.2602.1.desc.1.organic_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ pertenecientes a la especie [From.GetSpeciesName], $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.machine_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ del mecanotipo [From.GetSpeciesName], $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.gestalt_intro: "Los poderes psiónicos latentes han empezado a manifestarse en ciertos [From.GetSpeciesNamePlural], según informes obtenidos de las autoridades del §H[From.GetName]§!. Si bien"
 utopia.2602.1.desc.1.gestalt_outro: "habilidades paranormales que superan todo lo que conocíamos hasta ahora sobre ellos."
 utopia.2602.1.desc.1.organic_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ una conexión cognitiva en su especie no constituye una novedad, estos informes describen $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.1.machine_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ la comunicación mediante redes neuronales entre los de su especie no constituye una novedad, estos informes describen $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.2.intro: "Estos poderes se limitan hasta ahora a una minoría muy reducida de"
 utopia.2602.1.desc.2.outro: "Los informes no ofrecen ninguna explicación sobre este fenómeno."
 utopia.2602.1.desc.2.organic: "$utopia.2602.1.desc.2.intro$ la especie [From.GetSpeciesName] en su totalidad. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.2.machine: "$utopia.2602.1.desc.2.intro$ [From.GetSpeciesName]. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.machine_gestalt: "$utopia.2602.1.desc.1.machine_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.machine_non_gestalt: "$utopia.2602.1.desc.1.machine_non_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.organic_gestalt: "$utopia.2602.1.desc.1.organic_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.1.desc.organic_non_gestalt: "$utopia.2602.1.desc.1.organic_non_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.2.desc: "La población [From.GetSpeciesName] dentro de nuestras fronteras también ha comenzado a exhibir cambios similares, así que lo que le está sucediendo a su especie no se limita a una sola región del espacio."
 utopia.2602.a.organic_non_gestalt: "Qué peculiar."
 utopia.2602.a.hive_or_machine_non_gestalt: "¿Poderes especiales? Poco probable."
 utopia.2602.a.machine_gestalt: "No computa."
 utopia.2602.b: "¿Poderes psíquicos? ¡Qué sandez!"
 utopia.2602.c: "No podrán salvarse con sus brujerías."
 utopia.2602.d.organic: "Sí... Sí, podemos sentir sus emanaciones psíquicas."
 utopia.2602.d.machine: "Sí... Hemos registrado sus frecuencias psiónicas."
 utopia.2605.name.organic_non_gestalt: "[psionic_leader.GetTitle] tiene poderes psíquicos"
 utopia.2605.name.machine_non_gestalt: "[psionic_leader.GetTitle] se ha identificado como psiónico"
 utopia.2605.name.gestalt: "[psionic_leader.GetName] se ha identificado como psiónico"
 utopia.2605.desc.organic_non_gestalt: "Si bien es raro que los poderes psiónicos se manifiesten después de alcanzar la edad adulta, tampoco es inaudito. [psionic_leader.GetTitle] [psionic_leader.GetName] ha estado mostrando recientemente habilidades que se sospecha que son de naturaleza psiónica. Tras someterse a una prueba de PES, se le ha identificado un talento psiónico de clase 4."
 utopia.2605.desc.machine_non_gestalt: "En contadas ocasiones, algunas unidades desarrollan capacidades psiónicas pese a no haber manifestado nunca predisposición a ello. [psionic_leader.GetName], [psionic_leader.GetTitle], ha presentado últimamente funcionalidades que se podrían catalogar como psiónicas. Tras llevar a cabo pruebas exhaustivas, hemos determinado que se trata de una unidad psiónica de clase 4."
 utopia.2605.desc.gestalt: "La influencia de nuestros nuevos poderes crece por días. La nave de [psionic_leader.GetName], insigne [GetBrainName], ha presentado aptitudes que se podrían considerar psiónicas. Tras someterla a pruebas exhaustivas, se le puede catalogar como [GetPsychicNoun] de clase 4."
 utopia.2605.a: "Esas nuevas habilidades nos vendrán bien."
 utopia.2652.name: "Habilidades psiónicas despiertan en los [This.GetSpeciesNamePlural]"
 utopia.2652.desc.1.intro: "Todos los [This.GetSpeciesNamePlural] de la galaxia han experimentado un gran cambio. Si hasta ayer mismo sus poderes psiónicos latentes tan solo"
 utopia.2652.desc.1.outro: "ha dado rienda suelta de pronto a todo su potencial psiónico."
 utopia.2652.desc.1.organic: "$utopia.2652.desc.1.intro$ habían florecido en una minoría ínfima, la especie entera $utopia.2652.desc.1.outro$"
 utopia.2652.desc.1.machine: "$utopia.2652.desc.1.intro$ habían surgido en una minoría ínfima, el colectivo entero $utopia.2652.desc.1.outro$"
 utopia.2652.desc.2.non_gestalt: "Aunque estos cambios parecen haberse originado en [From.GetName], ahora se han manifestado en todos los miembros de su [GetSpeciesWord] independientemente de la ubicación."
 utopia.2652.desc.2.organic_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\nAdemás de mostrar una variedad de poderosas habilidades psiónicas, los [This.GetSpeciesNamePlural] han empezado a dejar de lado la comunicación verbal entre ellos en favor de la telepatía."
 utopia.2652.desc.2.machine_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.desc.2.gestalt.intro: "Además de hacer gala de potentes habilidades psiónicas, todo el conjunto de [This.GetSpeciesNamePlural] ya se comunica"
 utopia.2652.desc.2.organic_gestalt: "$utopia.2652.desc.2.gestalt.intro$ de manera no verbal, prescindiendo de los canales convencionales."
 utopia.2652.desc.2.machine_gestalt: "$utopia.2652.desc.2.gestalt.intro$ sin necesidad de sus canales colectivos previos."
 utopia.2652.desc.organic_non_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_non_gestalt$"
 utopia.2652.desc.machine_non_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_non_gestalt$"
 utopia.2652.desc.organic_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_gestalt$"
 utopia.2652.desc.machine_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.b: "Tiene que haber una explicación lógica."
 utopia.2652.c.organic: "Procedamos con cuidado."
 utopia.2652.c.machine: "Un desarrollo nada óptimo."
 utopia.2652.d.organic: "Sentimos la gran perturbación psiónica de su despertar."
 utopia.2652.d.machine: "Esto explica las perturbaciones psiónicas que detectamos."
 utopia.2650.name: "El Gran Despertar"
 utopia.2650.desc: "La especie [Root.GetSpeciesName] ha experimentado lo que solo puede describirse como un Gran Despertar. Desde hace tiempo sabíamos de nuestro gran potencial psiónico, pero solo se había manifestado en una pequeña minoría... hasta ahora.\n\nDe la noche a la mañana, los [Root.GetSpeciesNamePlural] han desbloqueado toda su capacidad psiónica. Es como si una especie de acumulación común de energía psíquica [Root.GetSpeciesName] hubiese alcanzado el punto crítico para despertar de forma colectiva las capacidades latentes en nuestros cerebros.\n\nLa telepatía ya ha sustituido la mayor parte de la comunicación verbal de los [Root.GetSpeciesNamePlural], y es solo un pequeño ejemplo de los innumerables cambios que afronta nuestra sociedad. Ahora estamos conectados de un modo que pocos de nosotros podría haber imaginado jamás."
 utopia.2650.a: "Se ha levantado el velo."
 utopia.2655.name: "El Velo"
 utopia.2655.desc: "Como un apagado susurro en una habitación oscura, el Velo nos llama desde nuestras mentes. Es un reino primordial de pura energía psíquica que surgió al principio de nuestro tiempo. Todos los seres dotados de habilidades psiónicas extraen su poder del Velo, de un modo u otro, aunque sea de manera subconsciente.\n\nDespués de nuestra trascendencia, hemos empezado a ver el Velo con mayor claridad. Hay patrones en los que antes nuestros mejores telépatas solo podían ver una masa informe de energía arremolinada. Ahora vemos... otras cosas. Una especie de espíritus que nos devuelven la mirada. A veces con curiosidad, a veces con bondad... y a veces con malicia.\n\nTodavía estamos aprendiendo el alcance de nuestros nuevos poderes, pero quizá podamos comunicarnos con estos espíritus. Necesitaremos los esfuerzos combinados de nuestros telépatas más poderosos."
 utopia.2655.a: "Debemos explorar el Velo."
 BREACHING_SHROUD_PROJECT: "Abrir brecha en el Velo"
 BREACHING_SHROUD_PROJECT_DESC: "Si vamos a comunicarnos con los habitantes del reino psíquico conocido como el Velo, tendremos que liberar una cantidad increíble de energía psíquica. Hemos preparado una gran sesión espiritista con nuestros psíquicos más poderosos en el recientemente establecido Cónclave de Telépatas en [Root.Capital.GetName]."
 utopia.2656.name: "La sesión espiritista"
 utopia.2656.desc: "Tras días de continuo trance hipnótico, nuestros psíquicos en el Cónclave de Telépatas por fin han logrado abrir un breve portal al Velo.\n\nAhora que hemos establecido un vínculo psiónico inicial, en el futuro podremos acceder al Velo mediante la pantalla §HContactos§!. Para realizar incursiones significativas en este reino y encontrarnos con los seres que allí habitan, probablemente necesitaremos emisores psiónicos especiales que amplíen nuestro alcance psíquico. Esto consumirá una cantidad tremenda de energía."
 utopia.2656.a: "Es hora de adentrarse y ver lo que encontramos."
 utopia.2657.name: "A través del espejo"
 utopia.2657.desc: "Si bien todavía debemos atravesar el velo, podemos sentir cómo se vuelve más y más débil gracias a la presión conjunta de nuestras mentes. Sin embargo, nuestros intentos de penetrar en el §HVelo§! no han pasado desapercibidos. Algo nos vigila.\n\nSu presencia irradia un poder sobrenatural... y una intención insondable. Se está filtrando por las rendijas de nuestra psique.\n\nApenas repara en nosotros. Nos observa como si fuésemos una gota condensada en una escotilla. Si logramos contactar con su inescrutable mente, tal vez nos deje pasar."
 utopia.2657.a: "Intentemos entablar conversación."
 utopia.2657.a.tt: "§GEsto nos permitirá formalizar un pacto.§!"
 utopia.2657.b: "Nos adentraremos a solas."
 utopia.2657.c: "¡Ha sido una idea terrible! Debemos ser más precavidos."
 utopia.2658.name: "Una confirmación"
 utopia.2658.desc: "Hace ya un tiempo que establecimos las bases de un pacto con §H[GetShroudPatron]§!. Nuestro vínculo sigue siendo débil y aún gozamos de la oportunidad de romperlo o de fortalecerlo."
 utopia.2658.a: "Confirmad el pacto."
 utopia.2658.b: "Renunciad a §Y[GetShroudPatron]§!."
 utopia.2659.name: "Una entrada"
 utopia.2659.desc: "Nuestros telépatas han trabajado a destajo para penetrar en el §HVelo§! sin la ayuda de sus habitantes. Finalmente, hallaron una entrada. Este abismo nos llama. Lo único que queda es atrevernos a dar el salto."
 utopia.2659.a: "Adentrémonos en las profundidades del Velo."
 FORM_COVENANT_PROJECT: "Comuna con lo inefable"
 FORM_COVENANT_PROJECT_DESC: "El Cónclave de Telépatas de [Root.Capital.GetName] está preparando una gran comunión para contactar con una entidad que habita en el Velo."
 utopia.3020.name: "§GAvatar psiónico invocado§!"
 utopia.3020.desc: "¡Las poderosas energías del §HVelo§! se han canalizado con éxito en un avatar psiónico bajo nuestro control!\n\nTras trasladarse a nuestra dimensión, el nuevo avatar se ha materializado como una entidad espacial en órbita sobre [Root.Capital.GetName]."
 utopia.3021.desc: "¡Las poderosas energías del §HVelo§! se han canalizado con éxito en un avatar psiónico bajo nuestro control!\n\nTras trasladarse a nuestra dimensión, el nuevo avatar se ha materializado como un colosal guerrero en la superficie de [Root.Capital.GetName]."
 utopia.3022.name: "§RInvocación fallida§!"
 utopia.3022.desc: "El poder psiónico que se ha de canalizar para invocar a un avatar y traerlo a nuestra dimensión supera nuestra capacidad actual. Las energías del §HVelo§! crepitan con agitación cuando nuestro intento fracasa."
 utopia.3023.name: "La entidad psiónica ataca"
 utopia.3023.desc: "El intento de invocar un avatar psiónico solo tuvo un éxito parcial. ¡Si bien la criatura asumió la forma correcta y se materializó en nuestra dimensión, nuestro colectivo de [GetTelepathPlural] no logró controlarla!\n\nAhora nos enfrentamos a una entidad psiónica agresiva que lo destruirá todo a su paso."
 utopia.3024.name: "Incursión del Velo"
 utopia.3024.desc: "¡Una criatura del §HVelo§! ha atravesado el tejido del espacio y se ha materializado en el sistema [shroud_spawn_system.GetName]! Este avatar vengativo ha acumulado una tremenda cantidad de energía psiónica y la utiliza para atacar a cualquiera lo bastante desafortunado como para cruzarse en su camino."
 utopia.3024.a: "¡Hay que detenerlo!"
 utopia.3026.name: "Avatar del Velo expulsado"
 utopia.3026.desc: "La continua atrofia de existir en el espacio normal ha debilitado al avatar en el sistema §H[shroud_spawn_system.GetName]§!.\n\nAl no poder mantener ya su forma tangible, el avatar se ha retirado de vuelta al §HVelo§!."
 utopia.3026.a.default: "Hasta nunca."
 utopia.3026.a.machine_or_hive: "Fortuito desenlace."
