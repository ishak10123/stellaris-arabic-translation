 utopia.3400.name: "Un/a soberano/a divino/a"
 utopia.3400.desc: "La entidad [GetImmortalLoc] conocida como §H[chosen_one.GetName]§!, que antes fuera [chosen_one_species.GetName] pero que ahora es mucho más, ha atraído a un gran número de devotos seguidores en el [Root.GetName]. Adorado por muchos como una deidad suprema, se ha hecho un llamamiento para coronar oficialmente al [chosen_one.GetTitle] como gobernante permanente de nuestro gran imperio, ahora y a perpetuidad."
 utopia.3400.a: "Es un/a psíquico/a poderoso/a, pero ¿una divinidad? Ni en broma."
 utopia.3400.b: "Que su reinado se extienda hasta el infinito... ¡y más allá!"
 reject_god_emperor: "[chosen_one.GetName] seguirá siendo [chosen_one.GetTitle]."
 utopia.3401.name: "[chosen_one.GetTitle] coronado/a en [From.Capital.GetName]"
 utopia.3401.desc.intro: "¡Un poderosísimo [GetPsychicNoun] [chosen_one_species.GetAdj] se ha hecho con el poder del §H[From.GetName]§!! Este"
 utopia.3401.desc.outro: "ser, a quien sus seguidores llaman entre susurros \"el Elegido\", ha sido coronado en [From.Capital.GetName] en una fastuosa ceremonia esta mañana. Poco después, se ha enviado un comunicado a todos los gobiernos interestelares anunciando el gobierno eterno del/de la §H[chosen_one.GetRulerTitle] [chosen_one.GetRegnalName]§!."
