 tech_covenant_composer: "$COMPOSER_MARK$"
 tech_covenant_composer_desc: "Hemos descubierto un método para que la energía psiónica fluya por nuestras naves. Armados con este conocimiento, ya podemos imbuir nuestras naves con los poderes de nuestro patrón."
