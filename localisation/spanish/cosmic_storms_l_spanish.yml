 resolution_cosmic_storms_preservation_initiative: "Iniciativa para la preservación de las tormentas"
 resolution_cosmic_storms_preservation_initiative_desc: "Controlar las tormentas, sea como sea, es un insulto a la naturaleza."
 resolution_cosmic_storms_preservation_initiative_tooltip: "$emergency_fund_contribution$ §R15%§! \n\n$storm_tech_cost$ §R+80%§!\n\n$breach_galactic_law_intro$$TABBED_NEW_LINE$- §YTecnología de repulsión de tormentas§!$TABBED_NEW_LINE$- §YTecnología de atracción de tormentas§!$TABBED_NEW_LINE$- §YEdicto para $edict_storm_repel_field$§!$TABBED_NEW_LINE$- §YEdicto para $edict_storm_attraction_field$§!"
