 ### Collided Planet Event Chain
 collided_planets_category: "El planeta estrellado"
 collided_planets_category_desc: "Hace eones, dos planetas chocaron, y de la destrucción de ambos nació un mundo único."
 cs_collided_planet_chain_title: "El planeta estrellado"
 cs_collided_planet_chain_desc: "Una catástrofe amenaza con romper el frágil equilibrio de este peculiar planeta."
 cstorms.1200.name: "La historia de dos planetas"
 cstorms.1200.desc: "Desde el momento en que detectamos [From.Planet.GetName], su mera presencia ya nos fascinó.\n\nNo porque la colisión de dos artefactos celestiales fuese un fenómeno poco común, pues la galaxia es un lugar enorme y caótico. Sin embargo, en todos los impactos conocidos, uno o los dos cuerpos quedaron destruidos.\n\nLa colisión que dio origen a [From.Planet.GetName] tuvo lugar hace millones de años, pero ambos mundos mantienen un equilibrio tan extraño que hasta ha creado una atmósfera apta para la vida."
 cstorms.1205.name: "Equilibrio precario"
 cstorms.1205.desc: "La situación del denominado \"planeta estrellado\" se ha vuelto más precaria de lo que preveíamos. Una serie de terremotos abrió las viejas cicatrices alrededor de la zona de impacto, provocando que una cantidad significativa de magma brotara del suelo. Varios biomas planetarios ya están empezando a sufrir el aumento de las temperaturas globales y las cenizas volcánicas que nublan los cielos.\n\nPara colmo de males, si los planetas colisionados no se estabilizan en los próximos 50 años, ¡nuestras lecturas vaticinan que la actividad tectónica seguirá creciendo hasta provocar la desintegración total de [From.Planet.GetName]!"
 cstorms.1210.name: "Metamorfosis desencadenada"
 cstorms.1210.desc: "Nuestros mejores geólogos se han reunido y han elaborado dos posibles planes para que [From.Planet.GetName] no sucumba al cataclismo tectónico.\n\nEl primero es estabilizar la colisión. Si bien tardaríamos siglos en sanar las heridas volcánicas en torno a la zona de impacto, si trepanamos la superficie con cuidado, podremos aliviar la presión sobre la corteza del planeta, frenando así la inestabilidad tectónica. Los residuos volcánicos servirán para terraformar el planeta y crear un bioma estable.\n\nEl segundo plan es mucho más ambicioso: en vez de aliviar la presión sobre la corteza del planeta, podríamos adaptar la energía y los materiales generados por la erupción volcánica para confeccionar un proceso de terraformación a medida.\n\nEste enfoque nos permite esculpir numerosos biomas capaces de sustentar cualquier forma de vida y convertir este mundo en un paraíso. Eso sí, es bastante probable que el proceso fracase y acabe por destruir completamente este cuerpo celeste."
 cstorms.1210.a: "Vamos a estabilizar la colisión."
 cstorms.1210.b: "Hagamos uso de las emisiones."
 cstorms.1210.c: "Limitémonos a observar."
 collided_planet_collapsing: "Desintegración planetaria"
 collided_planet_collapsing_desc: "La devastadora actividad tectónica hará pedazos el planeta estrellado, llevándose a ambos mundos por delante."
 collided_planet_collapsing_tt: "Este mundo se destruirá dentro de 50 años."
 project_cosmic_storms_collidedplanet_stabilize: "Estabilizar la colisión"
 project_cosmic_storms_collidedplanet_stabilize_DESC: "Necesitamos estabilizar el planeta estrellado para evitar su destrucción."
 project_cosmic_storms_collidedplanet_harmonize: "Armonizar la colisión"
 project_cosmic_storms_collidedplanet_harmonize_DESC: "Ejecutemos el ambicioso plan de harmonizar los biomas del planeta estrellado. Crearemos un mundo para todos, o lo condenaremos sin remedio."
 cstorms.1220.name: "Colisión estabilizada"
 cstorms.1220.desc: "¡Nuestros esfuerzos de estabilizar el mundo estrellado han dado sus frutos! Los temblores que antes amenazaban la existencia de [From.Planet.GetName] han cesado, y los residuos volcánicos se reducen por momentos para restablecer el frágil equilibrio del mundo.\n\nSolo queda una duda antes de nuestro último impulso de terraformación: ¿qué clase de planeta será [From.Planet.GetName]?"
 cstorms.1220.a: "Que siga siendo continental."
 cstorms.1220.b: "Terraformémoslo en un mundo sabana."
 cstorms.1220.c: "Creemos un mundo alpino."
 cstorms.1225.name: "Un mundo para todos"
 cstorms.1225.desc.stabalize: "¡Es extraordinario! Nuestra idea solo era estabilizar [collided_planets.GetName], ¡pero hemos hecho mucho más que eso!\n\n$cstorms.1225.desc.def$"
 cstorms.1225.desc.def: "He aquí un planeta paradisíaco capaz de albergar prácticamente cualquier forma de vida imaginable.\n\nHemos sido capaces de salvar un mundo de la extinción y transformarlo en algo inspirador; ¿acaso hay una proeza mayor? La suerte nos sonríe."
 cstorms.1230.name: "Un apaño"
 cstorms.1230.desc: "Aunque hayamos salvado el mundo, nuestra empresa de terraformar el planeta estrellado para convertirlo en un paraíso ha fracasado.\n\nLa intensa actividad tectónica del planeta nos ha impedido personalizar el bioma, aunque la peor parte de la desestabilización ha terminado. La actividad volcánica ha vuelto a los niveles que presenciamos antes de la última convulsión. Si bien todavía detectamos actividad en la zona del impacto, es poco probable que vaya más.\n\nParece que ya ha pasado lo peor. El siguiente desafío será reconstruir este mundo."
 cstorms.1235.name: "Un hogar hecho pedazos"
 cstorms.1235.desc: "Nuestra tentativa de salvar el planeta estrellado ha fracasado estrepitosamente. Los científicos tomaron todas las precauciones necesarias, pero sus modelos no pudieron abordar todas las contingencias.\n\nA medida que los restos de estos mundos se adentran cada vez más en el vacío, la galaxia lamenta la pérdida de este fenómeno único."
 cstorms.1240.name: "Tocado y destruido"
 cstorms.1240.desc: "La destrucción del planeta estrellado cumplió nuestras predicciones a rajatabla. Un fenómeno único y maravilloso en la galaxia, reducido a un puñado de rocas."
 collided_planets_destroyed_tt: "El planeta [collided_planets.GetName] ha quedado destruido."
 ### Crimson crawlers Event Chain
 cs_crimson_crawlers_chain_desc: "Insectos carmesíes"
 cs_crimson_crawlers_chain_title: "Hemos encontrado un planeta cubierto de billones de insectos rojos. ¿Será una plaga o una oportunidad?"
 crimson_crawlers_category: "Cobertura carmesí"
 crimson_crawlers_category_desc: "Se ha detectado un planeta escarlata en el sistema [From.GetStarName]. La intensidad del color es extraordinaria. Deberíamos investigarlo."
 cstorms.1255.name: "Insectos carmesíes"
 cstorms.1255.desc: "En la lejanía, [From.GetName] brillaba como una preciosa gema carmesí. La explicación más razonable para una anomalía geográfica así sería un suelo de arcilla u otro tipo de tierra con metales duros, pero la verdad era mucho más extraña.\n\nBillones y billones de bichos enjambran la superficie [From.GetName], formando una alfombra casi indestructible de seres miriápodos.\n\nNada más verlos, los bautizamos como \"insectos carmesíes\". Estos invertebrados poseen un ciclo de reproducción de lo más hiperactivo. Si bien no son dañinas para el entorno del que provienen, la presencia de estas criaturas complica la colonización de [From.GetName].\n\nSe ha propuesto un método bastante poco ortodoxo para manipular los insectos. Los análisis preliminares concluyen que son comestibles; ¿es posible que hayamos encontrado una nueva fuente de alimento? Recomendamos investigar la oportunidad, aunque sea."
 project_cosmic_storms_crimson_crawlers: "Es para reflexionar (o para comer)"
 project_cosmic_storms_crimson_crawlers_DESC: "[From.Planet.GetName] está cubierto de unos insectos rojos y pacíficos. El planeta podría ser habitable si nos ocupamos de los bichos. A su vez, parecen ser una gran fuente de alimento. Puede que tengamos la solución."
 cstorms.1260.name: "Un plato poco común"
 cstorms.1260.desc: "A priori, la idea de consumir a los insectos carmesíes podría parecer ridícula, pero, cuando llevamos los especímenes a bordo, se volvió bastante más apetecible.\n\nLos insectos son criaturas maravillosas que presentan un sistema nervioso sumamente avanzado, sin necesidad de un órgano de procesamiento central. Y lo que es más importante: su carne pálida es sorprendentemente tierna y jugosa aun cruda. Su exoesqueleto bermellón estaba crujiente y delicioso.\n\nSolo queda resolver si los bichos servirían mejor como material de investigación o como una suculenta fuente de alimento. Podríamos darle más sabor y vidilla si los cocinamos, pero ingerirlos tal cual viene a ser más rápido y sencillo, sobre todo si se condimentan como es debido."
 cstorms.1260.a: "Estudiemos a los insectos."
 cstorms.1260.b: "¡Nos los comemos crudos!"
 cstorms.1260.c: "¡A cocinarlos!"
 ### Stormbound Event Chain
 cs_stormbound_chain_title: "La Tempestuosa"
 cs_stormbound_chain_desc: "Los sensores han detectado una amenazante nave, pero solo en el interior de las tormentas cósmicas. ¿A qué habrá venido?"
 letters_of_the_manifold: "Intercambio de misivas"
 stormbound_event_ship_object: "$cs_stormbound_chain_title$"
 cstorms.1310.name: "El vuelo de la Tempestuosa"
 cstorms.1310.desc: "Estamos recibiendo extraños informes del sistema [This.GetName]. Por lo visto, la última tormenta cósmica que asoló ese sector reveló una nave de origen desconocido. Pese a las turbulencias de alrededor, atravesó la tempestad como si no le afectase para nada, sin emitir señal alguna.\n\nNo respondía a las llamadas y, en cuanto la tormenta se disipó, la nave desapareció con ella. Podríamos descartarla como un artefacto de la tormenta, pero las pruebas visuales indican lo contrario.\n\n¿Podría tratarse de una tecnología increíblemente avanzada, o acaso el presagio de algo peor? Seguiremos informando acerca de esta misteriosa nave."
 cstorms.1313.name: "La Tempestuosa regresa"
 cstorms.1313.desc: "Una de las estaciones de investigación de [This.GetName] acudió a nosotros con un informe preocupante: durante la última tormenta cósmica, una extraña nave casi se estrella contra el puesto avanzado. Las imágenes muestran la misma nave de la que dimos parte con anterioridad.\n\nSegún la estación espacial, el casco de la nave estaba formado por una extraña amalgama de compuestos orgánicos, minerales de calcio y aleaciones metálicas.\n\nNo se ha detectado vida orgánica, lo que da a entender que la nave funcionaba automáticamente... o que se había independizado.\n\nNo obstante, lo más desconcertante estaba por suceder: grandes secciones de su sistema de propulsión habían sido destrozadas por la basura espacial. Esta nave debería haber quedado inerte en el espacio.\n\nSi asignamos una nave científica para estudiar la siguiente tormenta cósmica, podríamos averiguar más sobre esta misteriosa nave."
 cstorms.1313.a: "No tenemos tiempo para tonterías."
 cstorms.1316.name: "Susurros en la tempestad"
 cstorms.1316.desc: "A lo lejos, [stormbound_science.GetName] presenció la aparición de una amenazante nave en mitad de la tormenta. Mientras pasaba, detectamos lecturas disparatadas que emanaban del tejido cósmico.\n\nEsto explicaría por qué la nave pasó desapercibida a nuestros sensores. Su manifestación física se había extendido más allá del cúmulo, como si hubiera entrado en un agujero de gusano, pero a la vez no. Si la nave logró volver a nuestro espacio, la causa más probable es que fuese por los orígenes hiperdimensionales de las tormentas cósmicas.\n\nCon este descubrimiento, deberíamos poder predecir el siguiente fenómeno, y quizás traer la nave de vuelta a nuestra realidad."
 cstorms.1317.name: "Tempestuosa avistada"
 cstorms.1317.desc: "Se ha avistado a la nave amenazante en §Y[this.GetName]§!."
 cstorms.1320.name: "Vuelta a casa"
 cstorms.1320.desc: "¡Lo conseguimos! Después de colocarse delante de [Root.Fleet.GetName], la amenazante nave nos saludó. Una entidad mecánica ornamentada con una máscara apareció en pantalla. Se identificó como B'Tiin, y nos contó una historia fascinante.\n\nEn el pasado, era una reputada oficial; una gran figura en una organización conocida como la Convención de Benefactores. Durante una patrulla, quedó atrapada junto con su tripulación en una tormenta cósmica y, en un desesperado intento por sobrevivir, tomó la decisión de sobrecargar el \"motor de intrusión\", una tecnología experimental que no se había puesto a prueba, y la nave y su tripulación quedaron atrapados en el campo hiperdimensional de la tormenta.\n\nCuando terminó su relato, un pequeño contenedor se desprendió de la deteriorada nave. En su interior, había una colección de documentos. \"Llevadlos a casa\", fue la petición de B'Tiin, y la transmisión se cortó. La nave desapareció en el cúmulo espacial.\n\nLos documentos estaban escritos en un idioma desconocido, por lo que llevará un tiempo descifrarlos."
 cstorms.1320.a: "Empecemos a traducirlos."
 cstorms.1321.name: "Cartas del cúmulo"
 cstorms.1321.desc: "Hemos descifrado los documentos del extraño contenedor. Uno contenía un esquema del llamado \"motor de intrusión\" de la nave. Pese a ser superior a nuestra tecnología, el estudio detallado de sus principios de construcción ha mejorado nuestro entendimiento del viaje hiperespacial.\n\nTambién había cartas personales que, más que provechosas, resultaron ser emotivas. Cada una está dirigida a un ser querido, y en ellas hay palabras de bondad, esperanza y arrepentimiento.\n\nParece que B'Tiin tenía la intención de dar a su tripulación una última oportunidad para comunicarse. Por desgracia, no tenemos idea de los destinatarios de estas cartas. Podríamos exponerlas a nuestro pueblo para preservar su extraño legado, aunque también sería prudente destruirlas. Las noticias de naves desconocidas y cartas de fantasmas podría alarmarlos."
 cstorms.1321.a: "Archivemos las cartas para la posteridad."
 cstorms.1321.b: "Destruyamos las cartas."
 project_cosmic_storms_stormbound: "Espíritus de la tormenta"
 project_cosmic_storms_stormbound_DESC: "Hemos averiguado que la amenazante nave aparecerá en el interior de esta tormenta.\n\n¡Enviemos una nave científica para atraerla e interceptarla!"
 ### But They're Cute Event Chain
 cs_but_they_are_cute_chain_title: "¡Pero qué cosa más linda!"
 cs_but_they_are_cute_chain_desc: "Tras estudiar [From.Planet.GetName], descubrimos una extraña criatura. ¿Qué hacemos con ella?"
 but_they_are_cute_category: "¡Pero qué cosa más linda!"
 but_they_are_cute_category_desc: "Tras estudiar [From.Planet.GetName], descubrimos una extraña criatura. A pesar de llevar con nosotros solo un rato, ya nos ha inspirado un profundo deseo de cuidarla y protegerla. Recomendamos seguir estudiando."
 cstorms.1500.name: "¡Pero qué cosa más linda!"
 cstorms.1500.desc: "En el momento en el que descubrimos a la criatura, nos inspiró un sentimiento de amor y devoción casi al instante. Tiene cuatro ojos saltones que irradian inocencia e invitan a estrujar su suave y esponjoso pelaje. Parece que ha desarrollado un vínculo especial con [Root.GetLeaderName], pues ha pasado casi todo el tiempo en su regazo, disfrutando de sus carantoñas y sin mostrar ningún ápice de agresividad o peligro. Es como si se hubiera diseñado a conciencia para ser lo más inofensiva posible.\n\nAun así, los más escépticos han señalado la irresponsabilidad que supondría subir una forma de vida nunca antes vista a bordo de la nave sin una aprobación previa. [Root.GetLeaderName] ha determinado que es perfectamente seguro, pero ha accedido a solicitar un examen oficial."
 cstorms.1500.a: "Averigüemos qué es."
 cstorms.1500.b: "Solicitud denegada. Deshaceos de ella."
 cstorms.1500.evopred: "Solicitud denegada. Coméosla."
 project_cosmic_storms_but_they_are_cute: "Maravilla biológica"
 project_cosmic_storms_but_they_are_cute_DESC: "Un animal tan intrigante como adorable ha sido hallado a bordo de una de nuestras naves científicas. Precisamos una investigación sobre las cualidades biológicas de la criatura para decidir si podemos quedárnosla."
 cstorms.1505.name: "Maravilla biológica"
 cstorms.1505.desc: "El hexápodo era dócil y no hizo falta sedarlo ni forzarlo para su correspondiente análisis. Su disposición era extrañamente afable. La tripulación le puso el apodo de Gurr, por el ruidito que hace al acariciarlo.\n\nHemos concluido que Gurr es omnívoro, y que su pelaje se compone de filamentos de queratina de lo más mullidos. Aun con todo, lo verdaderamente maravilloso y misterioso de la adorable criatura residía en un interior: una regeneración celular total en tan solo un mes, incluido su sistema nervioso. Por tanto, es capaz de regenerar todas las partes de su cuerpo en cuestión de días.\n\nQue una estructura biológica tan sofisticada sea fruto de la evolución natural es harto dudoso. Jamás hemos presenciado algo así, y no podemos cerciorarnos de su comportamiento. Pese a su aparente docilidad, podría atacarnos en cualquier momento. Eso sí, desde su llegada, [Root.GetLeaderName] está trabajando con más motivación que nunca.\n\n¿Qué hacemos con Gurr? ¿Nos quedamos con la criatura?"
 cstorms.1505.a: "Mientras limpiéis la porquería que deje..."
 cstorms.1505.b: "Deshaceos de ella."
 cstorms.1510.name: "Apoyo emocional de Gurr"
 cstorms.1510.desc: "Tras recibir la autorización para quedarse en la nave científica, la adorable criatura se ha asentado a la perfección. ¡Lo mismo tranquiliza a [Root.GetLeaderName] como levanta la moral de la tripulación allá donde corretea!\n\nCon suerte, esta increíble maravilla de la \"naturaleza\" seguirá siendo un amiguito dócil y adorable. De ahora en adelante, será nuestra mascota, y se llamará Gurr."
 cstorms.1510.a: "¡Espléndido!"
 cstorms.1515.name: "El fin de Gurr"
 cstorms.1515.desc: "A causa de su extraño cuerpo modificado genéticamente, la criatura no podía quedarse a bordo de la nave científica. El riesgo de que perjudicara a la tripulación o de que un furibundo dueño apareciese para reclamarla era demasiado elevado. Lo sacrificamos de manera rápida e indolora. En un instante, su tierno \"gurr\" no volvió a sonar más.\n\nEra una decisión comprensible, pero ha sido un varapalo emocional para [Root.GetLeaderName] y la tripulación. Tardarán un tiempo en superar la pérdida de esta adorable creación de la naturaleza."
 cstorms.1515.a: "No había alternativa."
 cstorms.1515.evopred: "Tomemos una muestra de ADN."
 cstorms.1520.name: "¿El fin de Gurr?"
 cstorms.1520.desc: "Al neutralizar a la adorable criatura, deberíamos haber puesto fin a su vida, pero sus impresionantes propiedades regeneradoras parecen haber superado nuestros pronósticos.\n\nPoco después de su defunción, dos copias idénticas de la criatura emergieron de su tejido, en apariencia inerte. Aunque hayamos decidido acabar con la vida de su progenitor, las formas de vida resultantes no muestran ninguna señal de agresividad.\n\nMejor lo dejamos así, no vayamos a crear un ejército de Gurr. [Root.GetLeaderName] y la tripulación están exultantes por poder adoptar a la pareja."
 cstorms.1520.a: "Lección aprendida."
 ### The Imitator Event Chain
 cstorms.1550.name: "El Mímico"
 cstorms.1550.desc: "La cápsula que descubrimos en [From.Planet.GetName] ha quedado a merced de la tormenta. Aunque las lecturas de datos son muy similares a las nuestras, la cápsula es, sin duda, alienígena. Hemos respondido a la solicitud de comunicación con cautela, pero su tripulante respondió con euforia.\n\nNos explicó que la tempestad arrastró la cápsula durante un tiempo y que precisa un rescate, ya que los sistemas de soporte vital de su nave están en las últimas.\n\nCuando le pedimos que se identificara, afirmó ser miembro de la tripulación, para nuestro asombro. El engaño es obvio, y más después de haber pasado revista a toda la tripulación."
 cstorms.1550.a: "Basta de juegos. Destruid la cápsula."
 cstorms.1550.b: "Subamos la cápsula a bordo."
 cstorms.1555.name: "El Mímico"
 cstorms.1555.desc: "Hemos subido la cápsula de escape a bordo de nuestra nave. La farsa llegó a su fin cuando la cápsula se abrió y un alienígena se abalanzó, suplicante.\n\nDurante una inspección rutinaria de las cápsulas de escape en su nave nodriza, el alienígena quedó atrapado en una y salió despedido al espacio. Para su desgracia, ningún otro tripulante de la nave reparó en su desaparición.\n\nEstuvo a la deriva durante meses, y usó la escasa tecnología de a bordo para replicar las señales de energía de las naves a modo de señuelo. Sin embargo, su intento de pedir ayuda también fracasó. Lo peor vino cuando una tormenta cósmica tomó el control de la cápsula y la arrastró a años luz de su sistema natal. Presa de la soledad y el miedo, urdió el plan de hacerse pasar por un miembro extraviado de la tripulación de toda nave que pasara. El alienígena de la cápsula se disculpó por el embuste, pero se alegra de seguir con vida."
 cstorms.1555.a: "Su ingenio nos vendrá de perlas."
 cstorms.1555.b: "Llevémoslo al planeta habitado más cercano."
 cstorms.1555.c: "Lo soltamos y nos quedamos con la cápsula."
 the_imitator_category_desc: "Durante un estudio reciente se detectó una cápsula de escape solitaria. Curiosamente, la cápsula nos saludó usando unas lecturas de datos idénticas a las nuestras. La cápsula parece haber sido arrastrada por una tormenta cósmica que pasó hace poco por el sistema. Recomendamos seguir investigando."
 #The Imitator Leader
 the_imitator_category: "El Mímico"
 the_imitator_catch_phrase: "¡Cómo me alegra estar aquí!"
 the_imitator_leader_desc: "Tras sacarlo de una tormenta cósmica y subirlo a bordo, este hábil pero excéntrico genio alienígena sabe cómo dar la vuelta a cualquier situación (generalmente, a mejor)."
