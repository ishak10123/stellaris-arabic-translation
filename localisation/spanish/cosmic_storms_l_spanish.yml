 resolution_cosmic_storms_manipulation_mandate_tooltip: "$output_from_storm_protection_buildings$ §G+15%§! \n\n$storm_tech_cost$ §G-80%§!\n\n$storm_tech_draw_guaranteed$\n\n$unity_from_storms$ §G+3§!\n\n$breach_galactic_law_intro$$TABBED_NEW_LINE$- Naves sin §Yprotección ante tormentas cósmicas§!$TABBED_NEW_LINE$- Planetas sin §Yedificios de tormenta cósmica§!"
