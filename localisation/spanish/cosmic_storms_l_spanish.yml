 magnetic_storm_aftermath_modifier_severity_desc: "Las irregularidades magnéticas que ha dejado a su paso la $magnetic_storm$ causan destellos lumínicos espectaculares en la atmósfera. A su vez, los campos magnéticos remanentes afectan a la velocidad de los proyectos de construcción planetaria."
