 #Civics
 civic_astrometeorology: "Astrometeorología"
 civic_astrometeorology_desc: "Esta especie profesa un profundo respeto a las fuerzas de la naturaleza y vuelca sus esfuerzos en desentrañar el comportamiento de los fenómenos ambientales. En su viaje por las estrellas, desarrollaron un interés especial en la astrometeorología. En el centro de sus ambiciones reside el fenómeno astronómico más fantástico y potencialmente destructivo de todos: las tormentas cósmicas.\n"
 civic_astrometeorology_effect_tooltip: "$t$- $AVAILABLE_BUILDINGS$ £building£ ['building:building_astrometeorology_observation_center']$TABBED_NEW_LINE$- $ADDITIONAL_BUILDINGS_STRING$ £building£ §Y$building_astrometeorology_observation_center$§!"
 civic_astrometeorology_hive: "Clima moldeado"
 civic_astrometeorology_hive_desc: "En su viaje a las estrellas, la consciencia del colectivo se ha visto cautivada por cierto fenómeno astrometeorológico. Estos drones expanden su hogar con un noble propósito: estudiar los efectos ambientales y descubrir maravillas hasta en el interior de las tormentas cósmicas."
 civic_astrometeorology_hive_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_machine: "Clima moldeado"
 civic_astrometeorology_machine_desc: "Este colectivo es consciente de los grandes efectos que podrían tener las fuerzas de la naturaleza en un imperio mecánico, y vuelca sus esfuerzos en estudiarlas. Sus modelos describen eventos astronómicos peculiares con un nivel de detalle que roza lo religioso. En el centro de sus ambiciones reside el fenómeno astronómico más fantástico y potencialmente destructivo de todos: las tormentas cósmicas."
 civic_astrometeorology_machine_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_megacorp: "Explotación climática"
 civic_astrometeorology_megacorp_desc: "¿Qué son los efectos ambientales, sino otro recurso que explotar? Esta megacorporación se especializa en adquirir tantos conocimientos sobre los fenómenos astrometeorológicos como sea posible para vendérselos al mejor postor."
 civic_astrometeorology_megacorp_effect_tooltip: "$civic_astrometeorology_effect_tooltip$ $TABBED_NEW_LINE$- La £building£ §Y$building_private_research_initiative$§! $megacorp_civic_branch_office_building_effect$"
 civic_storm_callers: "Devoción por las tormentas"
 civic_storm_callers_desc: "Aun en tiempos, esta sociedad ha sido capaz de atraer tempestades mediante sus rituales. Con el paso de los años, añadieron innovaciones técnicas para mejorar su eficacia. Ahora, en los inicios de su era espacial, buscan llevar este conocimiento a las estrellas."
 civic_storm_callers_effect_tooltip: "- $AVAILABLE_BUILDINGS$ £building£ ['building:building_storm_summoning_theater']\n- Sustituye los trabajos de [entertainer.GetIcon] §H[entertainer.GetName]§! por trabajos de £job_storm_dancer£ §H$job_storm_dancer$§!\n- $SPECIES_TRAITS$ ['trait:trait_storm_touched']"
 civic_storm_callers_megacorp: "Influencers de las tormentas"
 civic_storm_callers_megacorp_desc: "Lo que empezó como una simple retransmisión de los rituales sagrados ha evolucionado en un gigantesco conglomerado mediático. Los videntes y sacerdotes han dado paso a presentadores carismáticos que compiten por la más mínima atención, tanto de la audiencia como de las propias tormentas cósmicas."
 civic_storm_callers_megacorp_effect_tooltip: "$civic_storm_callers_effect_tooltip$\n- El edificio corporativo £building£ §Y$building_amusement_megaplex$§! genera §Yvalor de sucursal§! adicional y añade §G+50§! £job_merchant£ trabajos de §Ycomerciante§! a nuestra capital."
 mod_capital_storm_diplo_weight_mult: "$MOD_DIPLO_WEIGHT_MULT$ mientras la capital está afectada por una §Ytormenta cósmica§!"
 storm_devotion_diplo_weight_modifier: "$civic_storm_callers$"
 storm_devotion_corporate_diplo_weight_modifier: "$civic_storm_callers_megacorp$"
 civic_environmental_architects: "Jardineros espaciales"
 civic_environmental_architects_desc: "Tras pasar eones cultivando un equilibrio perfecto en su mundo natal, esta sociedad está lista para cuidar hasta de los entornos más inhóspitos en las estrellas. En su fuero interno, este pueblo cree que la naturaleza se puede moldear, controlar y perfeccionar, pero nunca doblegar (a menos que sea en favor de la belleza ideal)."
 civic_environmental_architects_negative_effect_tooltip: "- $HOMEWORLD$ empieza con dos £blocker£ §Hbarreras naturales§!"
 civic_environmental_architects_effect_start: "- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ §HTecnologías§! para eliminar las £blocker£ ['concept_natural_blockers'] en el §Hmundo natal§!\n- Las £society£ §Htecnologías§! para eliminar las £blocker£ §Hbarreras naturales§! se otorgan como §Hopciones de investigación permanente§! al colonizar\n- La ['concept_ascension_perk'] §HDominio de la naturaleza§! se sustituye por la ['concept_decision'] planetaria §H$decision_cultivated_worldscaping$§!\n- Por cada £blocker£ §Hbarrera natural§! en £planet£ ['concept_planets'] colonizados:"
 civic_environmental_architects_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$- Recursos por trabajos: §R-10%§!\n$t$- Velocidad de crecimiento de población: §R-10%§!\n$t$- Mantenimiento de población: §R+15%§!"
 civic_environmental_architects_hive: "Drones de cultivo"
 civic_environmental_architects_hive_desc: "Al formar parte de un organismo mayor, estos drones pueden identificar oportunidades dentro del organismo más grande de todos: la naturaleza. Su intención es controlar y moldear los sistemas naturales para satisfacer los deseos del colectivo."
 civic_environmental_architects_hive_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$- Recursos por trabajos: §R-10%§!\n$t$- Montaje de poblaciones: §R-10%§!\n$t$- Mantenimiento de población: §R+15%§!"
 civic_environmental_architects_machine: "Protocolos de jardinería"
 civic_environmental_architects_machine_desc: "Aunque desaparecieron sus precursores orgánicos, estas creaciones mecánicas siguen abogando por la estética antigua. El mundo natural es un suelo fértil para la perfección programada."
 civic_environmental_architects_machine_effect_tooltip: "$civic_environmental_architects_hive_effect_tooltip$"
 civic_environmental_architects_megacorp: "Geoingeniería S. A."
 civic_environmental_architects_megacorp_desc: "Los empleados de esta megacorporación están habituados a vivir en una jaula de oro. En consecuencia, la corporación construirá una donde quiera que vayan."
