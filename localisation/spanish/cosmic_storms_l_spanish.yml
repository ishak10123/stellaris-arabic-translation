 resolution_cosmic_storms_storm_encouragement_mandate_repeal_effect_success: "Deroga la resolución §Y$resolution_cosmic_storms_storm_encouragement_mandate$§! y deja la §Y$resolution_cosmic_storms_galactic_emergency_relief$§! como ley galáctica."
 resolution_cosmic_storms_control_restrictions: "Controles de manipulación de tormentas"
 resolution_cosmic_storms_control_restrictions_desc: "La galaxia es un vasto ecosistema interconectado en el que las tormentas cósmicas juegan un papel esencial. Hay que prohibir cualquier alteración de su comportamiento."
 resolution_cosmic_storms_control_restrictions_tooltip: "$storm_tech_cost$ §R+65%§!\n\n$breach_galactic_law_intro$$TABBED_NEW_LINE$- §YTecnología de repulsión de tormentas§!$TABBED_NEW_LINE$- §YTecnología de atracción de tormentas§!"
 resolution_cosmic_storms_control_restrictions_repeal: "Derogar $resolution_cosmic_storms_control_restrictions$"
