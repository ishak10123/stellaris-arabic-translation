 #Storm Technology
 tech_storm_manipulation: "Manipulación de tormentas"
 tech_storm_manipulation_desc: "Aprovechando los principios subyacentes a las tecnologías de negación de tormentas, podemos empezar a manipular la naturaleza astrometeorológica de la galaxia según nuestras necesidades."
 tech_advanced_storm_manipulation: "Manipulación avanzada de tormentas"
 tech_advanced_storm_manipulation_desc: "El estudio continuado de la astrometeorología nos permite manipular las §Ytormentas cósmicas§! y someterlas a nuestras necesidades con mayor precisión."
 tech_industrial_storm_protection: "Negación de tormentas planetarias"
 tech_industrial_storm_protection_desc: "Este nexo de comunicación climática mitiga los daños causados por los desastres de la climatología cósmica. La producción se resentirá menos en presencia de una tempestad galáctica."
 tech_advanced_industrial_storm_protection: "Anulación de tormentas planetarias"
 tech_advanced_industrial_storm_protection_desc: "Al consolidar los sistemas locales de control climático, los patrones de la climatología planetaria pueden manipularse para reducir casi todos los efectos perjudiciales de las tormentas cósmicas sobre la producción."
 tech_storm_prediction_1: "Modelos de climatología cósmica"
 tech_storm_prediction_1_desc: "Mediante el uso de modelos climáticos científicos, podemos supervisar el movimiento y la formación de §Ytormentas cósmicas§! inminentes."
 tech_storm_prediction_1_title: "§HDesbloquea la función§! Pronóstico meteorológico cósmico"
 tech_storm_prediction_1_tooltip: "Desbloquea la capacidad de ver §Ypredicciones de formación de tormentas cósmicas§! y §Ypredicciones de movimiento de tormentas cósmicas§! en el §Ymodo de mapa de pronóstico meteorológico§!"
 tech_storm_prediction_2: "Corriente de probabilidad"
 tech_storm_prediction_2_desc: "Al aplicar corrientes de probabilidad a nuestros modelos climáticos científicos, nuestra capacidad de supervisar el movimiento y la formación de §Ytormentas cósmicas§! inminentes ha aumentado enormemente."
 tech_storm_prediction_2_title: "§HMejora la función§! Pronóstico meteorológico cósmico"
 tech_storm_prediction_2_tooltip: "Mejora al máximo el alcance de las §Ypredicciones de formación de tormentas cósmicas§! y de las §Ypredicciones de movimiento de tormentas cósmicas§! en el §Ymodo de mapa de pronóstico meteorológico§!"
 tech_ship_hull_storm_breaker_1: "Generadores de amortiguación de tormentas"
 tech_ship_hull_storm_breaker_1_desc: "Estos generadores de campo de amortiguación ofrecen una protección muy necesaria a las naves que atraviesan tormentas cósmicas."
 tech_ship_hull_storm_breaker_2: "Revestimiento antitormentas"
 tech_ship_hull_storm_breaker_2_desc: "Este revestimiento especial carga el exterior de la nave con un campo amortiguador de tormentas que brinda una protección más eficaz ante estos fenómenos."
 tech_ship_storm_weapons_1: "Acolchado de carga"
 tech_ship_storm_weapons_1_desc: "Un nuevo enfoque para el uso de aleaciones en aplicaciones militares reduce significativamente la capacidad de las tormentas cósmicas de interferir con el armamento energético y las cargas explosivas."
 tech_ship_storm_weapons_2: "Arquitectura de captura de tempestades"
 tech_ship_storm_weapons_2_desc: "Este novedoso enfoque de la arquitectura de las naves reducirá significativamente los efectos negativos que tienen las tormentas cósmicas en nuestros sistemas de armas."
 feature_sustain_cosmic_storm_unlocked: "Mantener tormentas cósmicas"
 feature_sustain_cosmic_storm_unlocked_desc: "Permite que tus naves científicas detengan o mantengan §Y$default_storm$§! indefinidamente."
 FLEETORDER_SUSTAIN_COSMIC_STORM: "Manteniendo tormenta cósmica $STORM|Y$ en $SYSTEM|Y$"
 FLEETORDER_SUSTAIN_COSMIC_STORM_BUTTON: "Mantener §Ytormenta cósmica§!"
 FLEETORDER_SUSTAIN_COSMIC_STORM_CANCELLED: "§RLa tormenta cósmica en seguimiento se ha desvanecido.§!"
 #Map Mode
