 job_astrometeorologist_hive: "Dron $job_astrometeorologist$"
 job_astrometeorologist_hive_plural: "Drones $job_astrometeorologist$"
 job_astrometeorologist_hive_desc: "Estos drones de investigación se especializan en detectar y catalogar los efectos de las tormentas cósmicas."
 job_astrometeorologist_hive_effect_desc: "Los $job_astrometeorologist_hive_plural_with_icon$ convierten $r_minerals$ en $r_research$\n\nEl rendimiento del trabajo aumenta cuando este sistema presenta un §Yefecto ambiental§!"
