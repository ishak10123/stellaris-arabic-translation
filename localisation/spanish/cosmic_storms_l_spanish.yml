 cstorms.2000.name: "Preparación de tormentas"
 cstorms.2000.desc_common_1: "Ya estamos en el sistema §H[target.solar_system.GetName]§! con todos los preparativos listos para generar una §Y$default_storm$§!.\n\nAl sobrecargar temporalmente [target.GetName], podemos crear las condiciones ideales para provocar la reacción astrometeorológica que tengamos a bien."
 cstorms.2000.desc_tech: "\nAl emplear métodos avanzados de manipulación energética, podríamos sobresaturar [target.GetName] con materias primas para formar una tormenta con una estructura más compleja."
 cstorms.2000.desc_common_2: "\nEsta tarea llevará su tiempo, pero el resultado será un auténtico logro para [owner.GetName]. La estrella quedará completamente intacta al término de la operación."
 cstorms.2000.a: "Sobrecargad la estrella."
 cstorms.2000.a.tt: "$approach_situation_initiate_storm_supercharge_tt$"
 cstorms.2000.b: "Sobresaturad la estrella."
 cstorms.2000.b.tt: "$approach_situation_initiate_storm_overfeed_tt$"
 cstorms.2000.b.tt.allow: "Requiere algo de lo siguiente:$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_agitate$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$Posee tecnología de £physics£ §Y$tech_basic_science_lab_3$§! $TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_volatile_motes_tt$$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_destabilize$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$Posee tecnología de £physics£ §Y$tech_mine_dark_matter$§!$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_scramble$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$Posee tecnología de £physics£ §Y$tech_hyper_drive_3$§! $TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_rare_crystals_tt$"
 cstorms.2000.c: "Cancelad el proyecto."
 cstorms.2010.name: "Calibración de tormentas"
 cstorms.2010.desc_irradiate_only: "Los preparativos para la $default_storm$ en el sistema §H[target.solar_system.GetName]§! han alcanzado una etapa crucial. Las próximas acciones requieren una intensa concentración y nuevas inversiones de recursos para forjar una §Y$solar_storm$§! manipulando los vientos solares de §H[target.GetName]§!."
 cstorms.2010.desc_others: "Los preparativos para la $default_storm$ del sistema §H[target.solar_system.GetName]§! han llegado a un punto crítico. Las próximas acciones serán decisivas y requerirán una mayor inversión de recursos para la causa."
 cstorms.2010.a: "Intensificad los vientos solares."
 cstorms.2010.a.tt: "$approach_situation_initiate_storm_irradiate_tt$\nCoste mensual de $@irradiate_alloy_upkeep|0$ $r_alloys$, $@default_monthly_progress$ progreso/mes"
 cstorms.2010.b: "Dividid los campos de electrones."
 cstorms.2010.b.tt: "$approach_situation_initiate_storm_sever_tt$\nCoste mensual de $@sever_energy_upkeep|0$ $r_energy$, $@default_monthly_progress$ progreso/mes"
 cstorms.2010.c: "Magnetizad los iones."
 cstorms.2010.c.tt: "$approach_situation_initiate_storm_magnetize_tt$\nCoste mensual de $@magnetize_mineral_upkeep|0$ $r_minerals$, $@default_monthly_progress$ progreso/mes"
 cstorms.2010.d: "Abandonad el proyecto."
 cstorms.2015.name: "$cstorms.2010.name$"
 cstorms.2015.desc_one_tech_only: "Los preparativos para la $default_storm$ del sistema §H[target.solar_system.GetName]§! han alcanzado una fase crucial. Las próximas acciones de [storm_researcher.GetName] requerirán una gran concentración y una inversión de recursos mayor para sacar partido del hinchamiento de [target.GetName]."
 cstorms.2015.desc_others: "Los preparativos para la $default_storm$ del sistema §H[target.solar_system.GetName]§! han llegado a un punto crítico. Las próximas acciones de [storm_researcher.GetName] serán decisivas y requerirán una mayor inversión de recursos para la causa si queremos sacar partido del hinchamiento de [target.GetName]."
 cstorms.2015.a: "Agitad las partículas."
 cstorms.2015.a.tt: "$approach_situation_initiate_storm_agitate_tt$\nCoste mensual de $@rare_resource_upkeep|0$ $r_volatile_motes$, $@default_monthly_progress$ progreso/mes"
 cstorms.2015.b: "Desestabilizad los campos gravitacionales."
 cstorms.2015.b.tt: "$approach_situation_initiate_storm_destabilize_tt$\nCoste mensual de $@rare_resource_upkeep|0$ $r_dark_matter$, $@default_monthly_progress$ progreso/mes"
 cstorms.2015.c: "Batid el polvo estelar."
 cstorms.2015.c.tt: "$approach_situation_initiate_storm_scramble_tt$\nCoste mensual de $@rare_resource_upkeep|0$ $r_rare_crystals$, $@default_monthly_progress$ progreso/mes"
 cstorms.2015.d: "$cstorms.2010.d$"
 cstorms.storm_gathered.final_word: "Controlar el poder de la $default_storm$ no ha sido fácil. Por fin podemos recoger los frutos de nuestra labor que tanto ansiábamos."
 cstorms.storm_gathered.a: "¡Excelente trabajo!"
 cstorms.2020.name: "Desatar la tormenta"
 cstorms.2020.desc: "La intensificación de los vientos solares en §H[target.GetName]§! ha alcanzado un punto crítico.\n\nEstamos a punto de desatar una §Y$solar_storm$§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2025.name: "$cstorms.2020.name$"
 cstorms.2025.desc: "Los campos de electrones de §H[target.GetName]§! se han dividido por completo.\n\nEstamos a punto de desatar una §Y$electric_storm$§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2030.name: "$cstorms.2020.name$"
 cstorms.2030.desc: "Los iones de §H[target.GetName]§! se han magnetizado con éxito.\n\nEstamos a punto de desatar una §Y$magnetic_storm$§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2035.name: "$cstorms.2020.name$"
 cstorms.2035.desc: "Las partículas saturadas de §H[target.GetName]§! han alcanzado su punto de ruptura.\n\nEstamos a punto de desatar una §Y$particle_storm$§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2040.name: "$cstorms.2020.name$"
 cstorms.2040.desc: "El campo gravitacional de §H[target.GetName]§! se ha desestabilizado con éxito.\n\nEstamos a punto de desatar una §Y$gravity_storm$§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2045.name: "$cstorms.2020.name$"
 cstorms.2045.desc: "El polvo estelar de §H[target.GetName]§! se ha batido por completo.\n\nEstamos a punto de desatar una §Y$celestial_storm$§!.\n\n$cstorms.storm_gathered.final_word$"
 ### Aftermath Deposits ###
 d_magnetic_storm_1_minerals: "Mineral magnetizado"
 d_magnetic_storm_1_minerals_desc: "Una tormenta cósmica ha magnetizado a su paso una inmensa cantidad de depósitos de minerales sin explotar, lo que ha facilitado muchísimo nuestras operaciones de minería para acceder a nuevos recursos."
 d_magnetic_storm_2_alloys: "Fundición forjada por la tormenta"
 d_magnetic_storm_2_alloys_desc: "La tormenta cósmica que ha asolado este planeta ha dejado una carga extraña en el equipamiento de fundición. Aunque no comprendemos del todo el mecanismo, la producción de aleaciones ha mejorado significativamente."
 d_magnetic_storm_3_mix: "Altiplanos aéreos"
 d_magnetic_storm_3_mix_desc: "Al magnetizar los efectos gravitacionales de una tormenta cósmica, podemos manipular las majestuosas masas continentales que flotan sobre los complejos industriales existentes."
 cstorms.8000.title: "Alteración cósmica"
 cstorms.8000.desc: "Una tormenta cósmica ha dejado algo más que una mera devastación a su paso. En [Planet.GetName] se ha formado un accidente geográfico completamente inaudito."
 cstorms.8000.a: "Fascinante"
 d_electric_storm_1_engineering: "Ruinas azotadas por rayos"
 d_electric_storm_1_engineering_desc: "La increíble furia de una tormenta cósmica ha reducido un asentamiento otrora próspero a unas ruinas azotadas por rayos, transmutando nuestros mundanos materiales de construcción en compuestos poco comunes."
 d_electric_storm_2_unity: "Cicatriz planetaria"
 d_electric_storm_2_unity_desc: "Una tormenta cósmica ha sembrado una devastación tan concentrada en el planeta que ha dejado una cicatriz visible desde el espacio."
 d_electric_storm_3_physics: "Armada silenciosa"
 d_electric_storm_3_physics_desc: "Una tormenta cósmica ha sembrado el caos en los sistemas de navegación de incontables naves civiles, convirtiendo las zonas más afectadas en inquietantes cementerios de armazones rotos y maquinaria destruida."
 d_particle_storm_1_society: "Suburbios devastados por la tormenta"
 d_particle_storm_1_society_desc: "La tormenta cósmica ha convertido algunos de nuestros suburbios en ruinas, sólo aptas para el estudio de los restos."
 d_particle_storm_2_unity: "El colosal"
 d_particle_storm_2_unity_desc: "La tormenta cósmica ha dejado un tremendo cráter en este mundo; un brutal recordatorio de la indiferencia cósmica sobre nuestra existencia."
 d_particle_storm_3_motes: "Planos inestables"
 d_particle_storm_3_motes_desc: "La tormenta cósmica ha convertido numerosas y extensas llanuras en zonas de gran actividad tectónica. Casualmente, el aumento del peligro también ha venido acompañado de un aumento de motas volátiles."
 particle_storm_aftermath_1_tt: "Velocidad de montaje de robots: §R-40%§!\n£minerals£ §YMinerales§! por trabajos: §R-10%§!\n£volatile_motes£ §YMotas volátiles§! por poblaciones: §G+0,02§!"
 particle_storm_aftermath_2_tt: "Velocidad de montaje de robots: §R-50%§!\n£minerals£ §YMinerales§! por trabajos: §R-20%§!\n£volatile_motes£ §YMotas volátiles§! por poblaciones: §G+0,04§!"
 particle_storm_aftermath_3_tt: "Velocidad de montaje de robots: §R-60%§!\n£minerals£ §YMinerales§! por trabajos: §R-30%§!\n£volatile_motes£ §YMotas volátiles§! por poblaciones: §G+0,06§!"
 d_solar_storm_1_energy: "Capa de ozono dañada"
 d_solar_storm_1_energy_desc: "La tormenta cósmica ha abierto un agujero en la capa de ozono de la atmósfera de este planeta. Aunque esto ha afectado gravemente a nuestra calidad de vida, la calidad de la producción ha aumentado."
 d_solar_storm_2_districts: "Zonas montañosas irradiadas"
 d_solar_storm_2_districts_desc: "La tormenta cósmica ha cubierto de radiación las zonas montañosas de este mundo, lo que ha creado un extraordinario terreno para la producción de energía."
 d_solar_storm_3_output: "Desierto resplandeciente"
 d_solar_storm_3_output_desc: "La tormenta cósmica ha dejado un desierto refulgente. Mata con solo verlo, pero, con las medidas de seguridad adecuadas, podríamos convertirlo en una atracción turística de lo más rentable."
 d_celestial_storm_1_mines: "Púas cristalinas"
 d_celestial_storm_1_mines_desc: "Las devastadoras explosiones de una tormenta cósmica han dejado a su paso un dentado paisaje de cristales puntiagudos, creando un terreno tan peligroso como potencialmente rentable."
 d_celestial_storm_2_society: "Sedimentación histórica"
 d_celestial_storm_2_society_desc: "Una tormenta cósmica ha dinamitado capas enteras de sedimentos y ha revelado trazas de eones que no habíamos podido estudiar con anterioridad."
 d_celestial_storm_3_crystal: "Dunas de polvo estelar"
 d_celestial_storm_3_crystal_desc: "Una tormenta cósmica ha pasado por este mundo como una gran ola que ha dejado a su paso un paisaje etéreo de brillantes dunas de polvo estelar."
 celestial_storm_aftermath_1_tt: "Crimen en planeta: §R+10%§!\n£food£ §YComida§! por trabajos: §R-10%§!\n£rare_crystals£ §YCristales raros§! por poblaciones: §G+0,02§!"
 celestial_storm_aftermath_2_tt: "Crimen en planeta: §R+20%§!\n£food£ §YComida§! por trabajos: §R-20%§!\n£rare_crystals£ §YCristales raros§! por poblaciones: §G+0,04§!"
 celestial_storm_aftermath_3_tt: "Crimen en planeta: §R+30%§!\n£food£ §YComida§! por trabajos: §R-30%§!\n£rare_crystals£ §YCristales raros§! por poblaciones: §G+0,06§!"
 d_gravity_storm_1_districts: "Llanuras compactadas"
 d_gravity_storm_1_districts_desc: "Los aplastantes efectos gravitatorios de una tormenta cósmica han compactado varias zonas que antes se consideraban demasiado inestables para la construcción, lo que nos ha proporcionado suelo edificable."
 d_gravity_storm_2_unity: "Monumentos pulverizados"
 d_gravity_storm_2_unity_desc: "Una tormenta cósmica ha aplicado una presión tremenda en algunos de nuestros monumentos más frágiles y los ha reducido a polvo y escombros; un simple recordatorio de las terroríficas fuerzas que nos aguardan ahí fuera."
 d_gravity_storm_3_engineering: "Cuevas gravitacionales"
 d_gravity_storm_3_engineering_desc: "Una tormenta cósmica ha transformado parte de nuestros complejos de minería en fosas de materiales hipercompactados. Si bien nuestros intentos de reabrirlas han generado nuevas teorías de ingeniería y excavación, poco se ha avanzado en la recuperación de las minas."
 d_shroud_storm_1_society: "Parásitos del Velo"
 d_shroud_storm_1_society_desc: "Una tormenta cósmica ha propagado parásitos entre nuestro ganado. Aunque pueden alternar entre nuestra realidad y la del Velo, han resultado ser comestibles, sanos y sorprendentemente deliciosos."
 d_shroud_storm_2_zro: "Campos de zro"
 d_shroud_storm_2_zro_desc: "Una tormenta cósmica ha transformado los biomas más verdes de este planeta en campos de zro, dando lugar a algunos de los depósitos más puros que hemos encontrado."
 d_shroud_storm_3_happy: "La entidad del lago"
 d_shroud_storm_3_happy_desc: "Una tormenta cósmica nos ha dejado un regalo tan extraño como maravilloso: la masa de agua más grande de este planeta forma pequeñas olas que dibujan patrones y símbolos de una importancia reseñable, y capaces de responder a nuestras preguntas con una sabiduría sorprendente."
 ### Shroud Storm Events
 shroud_switched: "Cubiertos por el Velo"
 shroud_switched_tt: "El Velo permanece suspendido sobre este cuerpo celeste; su presencia sobrenatural apunta o bien a un gran desgarro, o bien al paso de una catastrófica tormenta del Velo."
 cstorms.8510.title: "Permutación psiónica"
 cstorms.8510.desc: "En un torrente de actividad psiónica, [from.GetName] se ha cambiado por un/a [from.GetClassName] de naturaleza desconocida."
 cstorms.8510.a: "Un curioso destino."
 cstorms.8515.title: "Transfiguración en masa"
 cstorms.8515.desc: "Una descarga de energía psiónica se ha extendido por [from.GetName], y parte de su población se ha visto alterada de formas que desafían las leyes de la naturaleza. Se han remodelado grupos enteros con formas alienígenas y extrañas, como si algo que escapa a nuestra comprensión hubiese reescrito su misma esencia."
 cstorms.8515.a: "Fuerzas desconocidas se agitan..."
 cstorms.8520.title: "Transmutación estelar"
 cstorms.8520.desc: "Una descarga de energía psiónica ha remodelado [from.GetName], que se ha transformado en una estrella de una naturaleza completamente nueva. Ahora, un/a [from.GetClassName] proyecta su extraña luz sobre el sistema [from.solar_system.GetName]. Es como si la realidad misma se hubiese alterado."
 cstorms.8520.a: "Ni siquiera las estrellas son inmunes..."
 ### Building custom requirements
 storm_repellent_allow: "$TRIGGER_FAIL$No se puede construir si hay un edificio de §Yatracción de tormentas§! en el sistema"
 storm_attracting_allow: "$TRIGGER_FAIL$No se puede construir si hay un edificio de §Yrepulsión de tormentas§! en el sistema"
 TOO_IMPERIAL: "Posee una facción imperialista"
 executive: "$job_executive$"
 noble: "$job_noble$"
 merchant: "$job_merchant$"
 head_researcher: "$job_head_researcher$"
 high_priest: "$job_high_priest$"
 technophant: "$job_technophant$"
 warden: "$job_warden$"
 noble_researcher: "$job_noble_researcher$"
 job_noble_researcher: "Científico noble"
 job_noble_researcher_plural: "Científicos nobles"
 job_noble_researcher_desc: "A los vástagos más brillantes y nobles se les educa en decoro y método científico para brindarles la capacidad de exponer con exactitud el intríngulis de su supremacía."
 sacred_noble: "$job_sacred_noble$"
 job_sacred_noble: "Noble sacro"
 job_sacred_noble_plural: "Nobles sacros"
 job_sacred_noble_desc: "La divinidad por herencia se transmite. La herencia a la divinidad se debe. Así, la nobleza es una bendición que de buena gana recibimos."
 augmentation_merchant: "$job_augmentation_merchant$"
 job_augmentation_merchant: "Comerciante de aumentos"
 job_augmentation_merchant_plural: "Comerciantes de aumentos"
 job_augmentation_merchant_desc: "Los únicos que pueden guiar a nuestro imperio son aquellos que ofrecen la automejora a un precio asequible y, además, con garantía ampliada."
 visionary: "$job_visionary$"
 job_visionary: "Visionario tecnológico"
 job_visionary_plural: "Visionarios tecnológicos"
 job_visionary_desc: "Sin dejarse llevar por precedentes y sin humildad que les frene, estos soñadores del mañana transmutan la especulación drástica en realidades comercializables. Para un auténtico visionario, el progreso no es solamente un principio; es todo un producto."
 noble_merchant: "$job_noble_merchant$"
 job_noble_merchant: "Patricio"
 job_noble_merchant_plural: "Patricios"
 job_noble_merchant_desc: "El derecho a gobernar no es hereditario, sino que lo determina la propia valía. ¿Y qué mejor índice de la valía de alguien que la suma total de sus saldos?"
