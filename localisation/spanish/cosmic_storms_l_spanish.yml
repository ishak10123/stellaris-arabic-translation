 #Storm Visible Events
 MESSAGE_COSMIC_STORM_SPOTTED_DESC: "Nuestros escáneres han detectado una tormenta cósmica del tipo $TYPE|Y$. La hemos bautizado como $NAME|Y$.\n\n"
 MESSAGE_COSMIC_STORM_SPOTTED_EVENT_CONFIRM: "Interesante."
 MESSAGE_STORM_INTRO: "Esta tormenta tendrá efectos devastadores en las colonias y entorpecerá el uso de UL de emergencia por parte de nuestras flotas. Se aconseja encarecidamente tomar medidas de prevención.\n\n"
 MESSAGE_ELECTRIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Las extremas cargas eléctricas que transportaba la tormenta supondrán un peligro para los sistemas de escudos de nuestras flotas. Por otra parte, esperamos un notable aumento en la producción de la colonia y la velocidad de las naves gracias a la abundante energía de la tormenta."
 MESSAGE_SOLAR_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$La radiación de esta tormenta expondrá a las flotas que se hallen en su interior ante cualquier escáner que la analice. Si bien estas condiciones implican algunos riesgos de seguridad, nuestras estaciones operarán con una eficacia mucho mayor."
 MESSAGE_CELESTIAL_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Este tipo de tormenta inhibirá nuestros sensores, por lo que no podremos detectar a otras flotas en los sistemas. Además, el viaje espacial se ralentizará. A pesar de los riesgos, deberíamos poder aprovechar estas condiciones para mejorar el rendimiento de ciertas tareas mientras dure la tormenta."
 MESSAGE_NEXUS_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Este tipo de tormenta supone un peligro extremo para nuestras colonias, flotas y estaciones, que sufrirán grandes daños hasta que amaine."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$La alta concentración de energía psiónica de esta tormenta reducirá enormemente la estabilidad de nuestras colonias, aunque hará más eficaz la evasión de flotas."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_SHROUD_BREACHED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$La alta concentración de energía psiónica de esta tormenta reducirá enormemente la estabilidad de nuestras colonias, aunque nuestros conocimientos de navegación por el Velo nos ayudarán a mejorar la eficacia de las flotas y los telépatas.\n\nEl Velo se agita... Hemos de prepararnos para lo que pueda ocurrir."
 MESSAGE_GRAVITY_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Las influencias gravitatorias de esta tormenta aumentarán progresivamente la dificultad operacional de las flotas, y las naves más grandes asumirán un riesgo mayor.\n\nA pesar de estos problemas, nuestras colonias podrán sacar partido de estas condiciones extremas y potenciar la eficacia de ciertas tareas."
 MESSAGE_MAGNETIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Las extremas fuerzas magnéticas de esta tormenta producirán un desbarajuste en nuestra flota y los sistemas de mantenimiento estructural.\n\nLas fuerzas magnéticas de la tormenta han dado lugar a una sorprendente sinergia con nuestras avanzadas técnicas metalúrgicas. Dicha interacción debería reducir los costes derivados de nuestra metalúrgica mientras persista este evento galáctico."
 MESSAGE_PARTICLE_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$La densidad de los detritos de partículas en esta tormenta infligirán efectos devastadores en naves y estaciones, anulando por completo la regeneración de sus escudos. Las flotas con la osadía suficiente como para permanecer en su interior deberían prepararse para un entorno sumamente peligroso."
