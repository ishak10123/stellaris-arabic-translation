 gov_storm_chasers: "Consejo de ancianos"
 gov_storm_chasers_desc: "Los miembros del excelso Consejo regente destacan en temerarias acciones de habilidad física. Ya sea escalando el pico más alto o montando sobre la ola más grande, dedican su vida a la inquebrantable búsqueda de experiencias puras. Así se ganan la confianza de su comunidad y el derecho a trazar el camino a seguir.\n\nLos miembros del Consejo reciben el título de ancianos independientemente de la edad, pues sus hazañas son consideradas legendarias y sus nombres perdurarán en el tiempo."
