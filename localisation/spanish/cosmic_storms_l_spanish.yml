 ### Green Skies
 site_green_skies: "Cielos verdes"
 site_green_skies_intro: "Nuestros escáneres han detectado una interesante serie de señales provenientes de esta sección del planeta. Por su composición, todo apunta a que son los restos de una antigua civilización a la espera de ser descubierta."
 cstorms.1400.name: "Un curioso collage"
 cstorms.1400.desc: "Cerca de nuestro campamento base, las peculiares ruinas de una ciudad nos dieron la bienvenida.\n\nLa arquitectura mostraba características de todas las civilizaciones que hemos conocido hasta ahora, ¡incluida la nuestra!\n\nPor otra parte, la composición de los materiales es similar a la que utilizamos para montar campamentos base durante la colonización planetaria, lo cual nos extraña, pues dichos materiales no aguantarían décadas, ni mucho menos la antigüedad que nuestros escáneres han revelado.\n\nAunque es poco probable que estas ruinas hayan pertenecido a un misterioso precursor, los escáneres se empeñan en indicar lo contrario. ¿Qué nos estamos jugando aquí?"
 cstorms.1405.name: "Situación precaria"
 cstorms.1405.desc: "El rastro de las señales llevaba a un camino que conducía a los niveles inferiores de la ciudad en ruinas. Los yacimientos arqueológicos de este tipo suelen contar con una red de transporte subterránea o con un conjunto de búnkeres de seguridad. En cambio, encontramos un pequeño sistema de cuevas lleno de restos de tela, contenedores de polímeros e incluso desechos orgánicos. Parece que no somos los primeros en explorar este yacimiento.\n\nLo más preocupante es que [Root.GetLeaderName] nos ha informado de que los cielos exteriores se están tornando de color verde; una tormenta cósmica está a punto de formarse en [Fromfrom.getName]. Aun así, continuamos hacia el punto de origen de las señales."
 cstorms.1410.name: "Insensatez"
 cstorms.1410.desc: "Unas puertas metálicas en mal estado detuvieron brevemente nuestro avance. Con poco esfuerzo superamos este obstáculo y descubrimos un rudimentario almacén.\n\nSus estanterías estaban hasta los topes de un buen surtido de tecnologías abandonadas, y había cajas de corporaciones muy famosas apiladas cuidadosamente contra la pared. Finalmente, descubrimos la fuente de las señales que tanto tiempo llevábamos siguiendo: un ordenador transpondedor no muy distinto al nuestro.\n\nCuando nos metimos en el dispositivo y buscamos en sus bases de datos, nuestros [Root.Owner.GetEngineerPlural] empezaron a llegar a conclusiones disparatadas: la señal se construyó de forma deliberada para que resultara lo más misteriosa e intrigante posible. Para ello se valieron de la imitación y la combinación de las características de otras civilizaciones.\n\nEs más, dentro de las cajas, encontramos kits de construcción de las ruinas que hallamos en la superficie.\n\nNos pusimos en contacto con nuestro campamento base para informar de nuestros hallazgos, pero la tormenta cósmica ya había empezado a interrumpir nuestras líneas de comunicación. Lo último que escuchamos de [Root.GetLeaderName] fue una serie de órdenes preocupantes; ¡parece que están atacando a nuestro campamento base!"
 cstorms.1410.a: "¡Preparad nuestra respuesta!"
 cstorms.1415.name: "¡Piratas!"
 cstorms.1415.desc: "¡Resulta que la tormenta cósmica dentro de [Fromfrom.getName] servía para ocultar una flota pirata! Su tripulación es la que ha atacado a nuestro campamento base. Los piratas nos han pedido que os transmitamos este mensaje:\n\n§LQueridos pringados:\n\nGracias por acompañarnos en nuestro escondite más difícil de localizar.\n\n¿No es fascinante lo rápido que los seres aparentemente inteligentes abandonan toda razón en cuanto detectan el más mínimo olor a artefactos antiguos y a reliquias siniestras? ¿Acaso esperabais encontrar el medio para destruir a un terrible enemigo? ¿Queráis construir flotas hasta donde alcanza el horizonte de sucesos? ¿O estabais intentando ser amables con vuestro propio pueblo? Qué curioso.\n\nNo os sintáis mal, por favor. Muchos otros os han precedido y nuestro modelo de negocio depende de quienes se sumen a seguir vuestros pasos.\n\nPor una módica suma de 2000 créditos energéticos os devolveremos algo que habéis perdido.\n\nNo queráis saber la de cosas terribles que le podrían sucederle a esa persona y a su escasamente armada tripulación, aún atrapada en el planeta, si decidís rechazar nuestra oferta.\n\nElegid con cabeza.§!\n\nPor ahora, estamos seguros en estas cavernas, aunque no sabemos por cuánto tiempo. ¿Acaso vamos a dejar que estos bandidos se salgan con la suya?"
 cstorms.1415.a: "Pagaremos."
 cstorms.1415.b: "¡Decidles que se pudran en el olvido!"
 cstorms.1415.b.tt: "Han tomado a [Root.GetLeaderName] como rehén."
 cstorms.1416.name: "Retroceso"
 cstorms.1416.desc: "Hemos recibido otro mensaje:\n\n§LEs una pena. Nos podríamos haber divertido mucho con esos recursos.\n\nInformaremos al líder y a su tripulación de que sus vidas no valían el esfuerzo ni los créditos. Quizá un esclavista cercano o algún asimilador decidido pueda estar interesado. Hemos oído que el pinzamiento nervioso es la nueva moda.\n\nFin de la comunicación.§!\n\nHemos usado todo lo que hemos encontrado para atrincherarnos, y hay suficientes suministros para mantenernos a salvo durante un tiempo, aunque la flota pirata acabará atravesando nuestras defensas en cualquier momento."
 cstorms.1420.name: "No nos volverán a tomar el pelo"
 cstorms.1420.desc: "Esos piratas no tenían las habilidades necesarias para respaldar sus arrogantes discursos. En poco tiempo, lo que quedaba de su flota pasó a formar parte del ecosistema galáctico.\n\nPoco después, reestablecimos el contacto con la tripulación de la superficie; estaban bastante conmocionados por lo sucedido, pero no sufrieron ningún daño.\n\nSi bien aquí no descubrimos ningún indicio sobre civilizaciones antiguas, nuestra experiencia nos empujó a estar alerta. El líder de la expedición no supo ver el peligro que se avecinaba. Nosotros no cometeremos el mismo error."
 cstorms.1420.a: "Que esto nos sirva de lección."
 cstorms.1420.b: "El líder no nos volverá a fallar."
 cstorms.1425.name: "El placer de hacer negocios"
 cstorms.1425.desc: "Hemos recibido un mensaje en respuesta:\n\n§LMaravillosa elección, si nos permitís el atrevimiento.\n\nQue sepáis que vuestra contribución a nuestro \"fondo para empresarios desfavorecidos que necesitan un planeta resort\" se ha recibido y está siendo procesada.\n\nPronto tendréis a vuestro líder y a su tripulación.\n\nAh, y recomendadnos a todos vuestros socios comerciales.§!\n\nPoco después pudimos reestablecer el contacto con la tripulación en la superficie. Nos dijeron que estaban bastante conmocionados por la experiencia, pero que no habían sufrido ningún daño.\n\nAunque aquí no descubrimos indicios sobre civilizaciones antiguas, nuestra experiencia nos empujó a permanecer alerta. El líder de la expedición no supo ver el peligro que se avecinaba. No volveremos a cometer ese error."
 cstorms.1425.a: "$cstorms.1420.a$"
 cstorms.1425.b: "$cstorms.1420.b$"
 NAME_green_skies_pirate_country: "El resort"
 NAME_green_skies_pirate_fleet: "Emprendedores excéntricos"
 KILL_EXILED_LEADER_EFFECT: "$LEADER$ ha muerto por su incompetencia."
 FREE_HOSTAGED_LEADER_EFFECT: "$LEADER$ ha regresado."
 green_skies_outcome_modifier: "Ahora estamos más atentos ante peligros inminentes."
 requires_cosmic_storms: "$dlc_requirement_string$ §ITormentas cósmicas§!"
 ### Hold the Line
 site_hold_the_line: "Al abordaje"
 site_hold_the_line_intro: "La tormenta cósmica dejó un curioso regalo: un complejo orbital de un antiguo sistema de hábitat. Su abordaje quizá nos permita reactivarlo."
 cstorms.1275.name: "Nuevo desconcierto"
 cstorms.1275.desc: "A pesar de que la tormenta cósmica lo arrastró por la galaxia, el complejo orbital sufrió muy pocos daños. Los espacios habitables y comerciales estaban casi en perfectas condiciones. No había ni una mota de polvo sobre la superficie que delatara una ocupación anterior; era como si jamás se hubiese usado.\n\nEn el centro de control principal nos recibió un desconcertarte sistema de entrada de datos: diales sin explicación, palancas con configuraciones contradictorias y un montón de botones con un amplio espectro de colores durante lo que parecían intervalos al azar. Por suerte, al final encontramos un manual. Estamos convencidos de que podremos reactivar el hábitat en cuanto lo traduzcamos."
 cstorms.1280.name: "Anulación manual"
 cstorms.1280.desc: "Por desgracia, parece que nuestras estimaciones previas fueron demasiado optimistas: el manual resultó ser tan incomprensible como el sistema de control. Parecía que faltaban la mitad de las páginas, y las pictóricas instrucciones hacen importantes suposiciones semióticas. La otra mitad del manual está escrita con unos jeroglíficos difíciles de interpretar.\n\nSin embargo, la última página mostraba una frecuencia de comunicación acompañada de un conjunto de caracteres traducidos como \"asistencia técnica\". Ahora estamos probando dicha frecuencia."
 cstorms.1285.name: "Tu llamada es importante para nosotros"
 cstorms.1285.desc: "La frecuencia de comunicación del manual nos conectó con el ordenador central del servicio de asistencia de una entidad comercial conocida como Skygarden.\n\nCon un tono amigable y neutro, la IA del asistente nos informó de que se alegraba de que nos pusiéramos en contacto con ella y nos preguntó si podía ayudarnos con algo. Entre las opciones disponibles estaban \"respuestas a preguntas sobre las suscripciones\", \"información sobre la nueva línea de sistemas de defensa inteligentes\", y también nos ofrecía saber más sobre \"las iniciativas de responsabilidad social\" de la empresa.\n\nSin embargo, las siguientes opciones nos mandaban a temas que no tenían nada que ver. Lo peor de todo es que a menudo ponía a nuestros [Root.Owner.GetEngineerPlural] en espera y luego colgaba. Está claro que la IA del servicio no ha logrado sobrevivir al paso del tiempo tan bien como el resto del hábitat.\n\nAun así, seguiremos intentando hacernos con este arcaico sistema."
 cstorms.1290.name: "Entramado de opciones"
 cstorms.1290.desc: "Nuestros [Root.Owner.GetEngineerPlural] informan de que, independientemente de lo que le dijeran a la IA, tras pasar por varios menús, el sistema volvía a un enunciado previo.\n\nIntentamos llevar a cabo varias simulaciones para poder mapear el árbol de menú exacto, pero nuestros esfuerzos nos llevaron a cometer errores recurrentes y fuimos incapaces de resolver y comprobar la solución al mismo tiempo. Ni siquiera se obtuvieron los resultados deseados al ejecutar un modelo cuántico. Sospechamos que hemos colapsado accidentalmente algunas funciones de onda durante el proceso.\n\nNo sabemos qué hacer."
 cstorms.1290.a: "Decidle a la IA que es §RCENSURADO§! y §RCENSURADO§!."
 cstorms.1290.b: "Manteneos en línea en silencio."
 cstorms.1290.c: "Toquetead todos los botones."
 cstorms.1295.name: "Siguiendo el protocolo"
 cstorms.1295.desc.a: "¡Por fin, un avance! La IA nos amonestó por usar un lenguaje inapropiado y nos dijo que debíamos esperar hasta que un representante del servicio de atención al cliente se pusiera en contacto con nosotros.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.b: "¡Por fin, un avance! Al parecer, nuestro prolongado silencio ha desconcertado a la IA y nos va a referir a un representante del servicio de atención al cliente.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.c: "¡Por fin, un avance! La IA nos amonestó por abusar del panel de control y dijo que esperásemos hasta que un representante del servicio de atención al cliente se pusiera en contacto con nosotros.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.followup: "Nos dejaron a la espera un rato, hasta que la línea de comunicación se volvió a abrir. La entidad al otro lado se presentó como la encargada de los registros de Skygarden Corporation. Resulta que el servicio de asistencia era un programa de IA que había heredado del último responsable del registro. Hasta donde ella sabe, la estación de comunicación no ha vuelto a usarse desde que Skygarden cayera en bancarrota hace varias décadas. Cuando le preguntamos por qué seguía trabajando para una organización en quiebra, simplemente nos dijo que así lo estipulaba su contrato.\n\nAl explicarle nuestra situación, la responsable del registro buscó una vieja guía rápida sobre el hábitat. Enseguida nos transferirá las imágenes digitales de las páginas."
 cstorms.1300.name: "Años que ganar, segundos que perder"
 cstorms.1300.desc: "Con la nueva guía en nuestra posesión, reiniciar el hábitat nos costó poco esfuerzo.\n\nCuando se apagó lentamente el ruido de la reactivación de las máquinas, decidimos ponernos en contacto una vez más con la responsable del registro para darle las gracias.\n\nEsta nos dijo que había logrado recuperar cierta información sobre la estación. Al parecer, se construyó hace cinco siglos a modo de prototipo, aunque se perdió tras un caos astrológico que se produjo a consecuencia de una terrible tormenta cósmica. La pérdida de la propiedad y los costes de desarrollo fueron motivos suficientes para llevar a Skygarden a la bancarrota.\n\nAyudarnos fue la primera tarea de provecho que la responsable había llevado a cabo en años.\n\n\"Además\", dijo, \"me ha gustado oír la voz de mi bisabuela en línea, aunque solo fuese una IA\"."
 ### Repowered Complex
 site_repowered_complex: "Complejo realimentado"
 site_repowered_complex_intro: "Se ha detectado un pico de energía inexplicable en la superficie §H[From.Planet.GetName]§! tras el paso de la última §Y$electric_storm$§!. Los escáneres han revelado un viejo complejo subterráneo cuyos generadores se han reactivado con la tormenta, de modo que la instalación vuelve a estar en funcionamiento."
 cstorms.1845.name: "Entrada fortificada"
 cstorms.1845.desc: "La entrada del complejo aislado de §H[From.Planet.GetName]§! es de construcción excepcionalmente robusta. Está claramente hecha para durar, ya que cuenta con un revestimiento de blindaje pesado en el exterior, escudos de radiación y un conjunto de sensores atmosféricos. §H[Leader.GetName]§! cree que se diseñó para resistir condiciones extremas.\n\nLos escáneres apuntan a una gran cámara subterránea a la que se puede acceder atravesando una serie de puertas de seguridad selladas."
 cstorms.1850.name: "Refugio de supervivencia"
 cstorms.1850.desc: "Tras acceder al habitáculo principal, la conclusión de §H[Leader.GetName]§! es que hemos descubierto un refugio de supervivencia en desuso construido hace mucho tiempo por alguna especie orgánica desconocida.\n\nCuenta con sectores residenciales bien equipados con cápsulas de sueño, zonas de recreo y una plataforma médica. En cada nivel hay armarios que almacenan gran cantidad de paquetes de nutrientes sin abrir, baterías y herramientas. Todo el contenido de esta cámara oculta se encuentra en un estado impoluto.\n\nFalta por abrir un último juego de puertas de seguridad. Creemos que conduce al puente de mando de la instalación."
 cstorms.1850.a: "Continuad."
 cstorms.1855.name: "Refugio de lujo"
 cstorms.1855.desc: "El puente de mando del refugio está equipado con un conjunto impresionante de monitores de §Y$default_storm$§!, todos ellos alimentados por los sensores atmosféricos de la superficie. Estas consolas, que han estado funcionando en modo de espera, contienen siglos de datos históricos sobre tormentas que impulsarán con fuerza nuestra comprensión de la astrometeorología.\n\n§H[Leader.GetName]§! ha encontrado también un pequeño proyector holográfico muy usado. Cuando se activa, proyecta en 3D una figura moluscoide que presenta un mensaje de promoción, repasando las principales características del refugio bajo un logotipo corporativo.\n\nNo es posible saber si este producto de supervivencia encontró comprador, pero es evidente que ha estado muchos años sin usarse."
 cstorms.1855.desc.megacorp: "Nuestros departamentos de marketing ya están analizando en qué se equivocaron."
 ###############################
 #### The Weather Manipulators #
 ###############################
 STORMS_PREC_WM_ONE: "Antiguo refugio"
 STORMS_PREC_WM_ONE_DESC: "Hemos identificado varias estructuras subterráneas ocultas y de una antigüedad considerable en [From.Planet.GetName]. Deberíamos aprovechar esta oportunidad para investigar."
 cstorms.105.name: "Los antiguos refugios"
 cstorms.105.desc: "El planeta [From.Planet.GetName] del sistema [From.GetStarName] es un mundo en ruinas; al parecer, son los vestigios de un imperio perdido en la antigüedad. Las estructuras subterráneas que llamaron nuestra atención son también antiguas y están relativamente intactas.\n\nLas imágenes de ecolocalización mostraron una compleja estructura subterránea con salas de almacenamiento y refugios diseñados para resistir a las fuerzas de la naturaleza. La destrucción de la superficie del planeta es, sin duda, el resultado de tormentas cósmicas, las cuales se alinearían con la existencia del santuario.\n\nSin embargo, la cantidad de restos que hay está dificultando la investigación. Una excavación arqueológica podría revelarnos más cosas."
 #arcsite The Ancient Storm Shelters
 site_weathermanipulators_the_ancient_storm_shelters: "Los antiguos refugios"
 site_weathermanipulators_the_ancient_storm_shelters_intro: "Un refugio enterrado bajo los escombros de un mundo devastado por una tormenta. La devastación dificulta la investigación, pero el interior parece intacto."
 cstorms.110.name: "Del polvo a la devastación"
 cstorms.110.desc: "Al acercarnos al refugio desde el nivel del suelo, se reveló una pequeña apertura debajo de dos torres derrumbadas, a través de la cual se podía observar el débil resplandor de la maquinaria operativa.\n\nLa apertura sirve como punto de anclaje para que nuestros [Root.Owner.GetScientistPlural] determinen el tamaño del complejo y, posiblemente, encuentren una forma de abrirlo sin dañar la integridad de la delicada estructura.\n\nLas ruinas que sepultan este sitio tienen toda la pinta de haber sufrido el daño de una tormenta cósmica. Lo más curioso es que no hay señales que indiquen que los habitantes intentaran protegerse.\n\nEs como si hubieran soportado la violencia el mayor tiempo posible para luego evacuar a toda prisa. Quizá las respuestas se encuentren bajo el suelo en ruinas de [From.Planet.GetName]."
 cstorms.110.a: "Entendido"
 cstorms.115.name: "Bajo las torres"
 cstorms.115.desc: "Tras retirar muchas capas de escombros y polvo, la abertura bajo de las torres se agrandó lo suficiente como para que nuestros [Root.Owner.GetScientistPlural] pudiesen acceder al refugio.\n\nEl santuario es sencillo y utilitario, con muchas salas anexas, la mayoría de ellas vacías. De hecho, parece demasiado simple. Está claro que parece un refugio de algún tipo, aunque no resistiría a las tormentas cósmicas. Las paredes son demasiado finas y ofrecen muy poca resistencia, y los techos y los suelos no están reforzados; se ha salvado de chiripa. Si no hubiera sido por las dos torres de arriba y el corrimiento de tierras que desplazó el complejo de golpe, este refugio contra tormentas habría desaparecido hace mucho.\n\nEl brillo que se ve desde fuera se debe al mal funcionamiento de algunos sistemas de alarma, y se pueden ver varios terminales operativos en las profundidades del refugio. Esta podría ser una oportunidad perfecta para aprender más sobre los antiguos dueños de estas instalaciones, así como de las curiosas circunstancias que las rodean."
 cstorms.120.name: "Transcripciones desgastadas"
 cstorms.120.desc: "Llegar a los terminales ha sido más difícil de lo que pensábamos, ya que estaban parcialmente obstruidos por derrumbamientos. Algunos de los escombros eran más recientes, lo cual indica un fallo crítico del refugio ahora que ha sido alterado. Se recomienda ejercer precaución.\n\nPor desgracia, los antiguos procesadores de datos no quieren desvelar sus secretos tan fácilmente. Todo está registrado en un idioma perdido, aunque los registros de comunicación intergaláctica que se muestran en la interfaz podrían ayudarnos. Si combinamos esto con los soportes físicos abandonados y esparcidos por el refugio, creo que seremos capaces de hacer una traducción básica. Además, aún hay más salas que investigar, siempre y cuando el refugio no se derrumbe."
 cstorms.120.a: "Procedamos con cuidado."
 cstorms.120.b: "Podemos agilizar el trabajo."
 cstorms.120.c: "Redoblad vuestros esfuerzos y olvidaos de todo lo demás."
 cstorms.125.name: "Seguro de activos"
 cstorms.125.desc: "Las estancias y las cámaras situadas más abajo no están tan descuidadas como la entrada. Cajas de mercancías las llenan de arriba abajo, todas cuidadosamente empaquetadas y apiladas. Las primeras traducciones describen materiales no procesados y componentes eléctricos sin terminar, ninguno de los cuales son imprescindibles para la supervivencia. La lista también detalla la cantidad de objetos de esta ubicación, y los beneficios previstos que hubieran generado en algo llamado Red Intergaláctica de Comercio Igualitario, o RICI, para abreviar.\n\nEl lenguaje que rodea a este vasto intercambio comercial es casi extático, con meticulosas notas sobre transacciones e índices detallados de los beneficios. De hecho, parece que esta civilización desaparecida basó su nombre en este intercambio, de ahí que se llamaran comerciantes ricinos.\n\nEste refugio no se construyó para proteger a la población general, sino más bien como un almacén de mercancías glorificado. Esto nos plantea la pregunta de por qué sus refugios estaban tan mal equipados para hacer frente a las tormentas.\n\nOtras traducciones deberían arrojar más luz al respecto, pero estamos en el tiempo de descuento, tal y como demuestra el inquietante crujido de la infraestructura."
 cstorms.125.a: "Tened cuidado ahí abajo."
 cstorms.125.b: "Priorizad la recuperación de datos."
 cstorms.125.c: "Podemos ayudar a la investigación."
 cstorms.130.name: "Maquinaciones en el mercado"
 cstorms.130.desc: "El sonido de desgarros y crujidos se ha intensificado. Sin embargo, los trabajos de traducción continúan dentro del refugio de [From.Planet.GetName]. Aunque la mercancía almacenada resultó infructuosa como fuente de investigación, los terminales en funcionamiento revelaron más cosas.\n\nUn conjunto de coordenadas codificadas apuntan a la ubicación de un aparato de \"gran poder\" situado en un planeta cercano. Al parecer, este dispositivo poseía la capacidad de \"manipular\" una tormenta cósmica, una afirmación que sería increíble de ser cierta.\n\nSin embargo, hemos evacuado el sitio en vista de la menguante estabilidad del refugio y tras haber logrado transmitir una copia de las coordenadas a nuestra nave en órbita. Muchas preguntas siguen sin respuesta, pero la búsqueda continúa."
 cstorms.130.a: "Una oportunidad demasiado buena para dejarla pasar."
 #Special Project Descramble the Coordinates
 INETIAN_PROJECTS_01: "Descifrar las coordenadas"
 INETIAN_PROJECTS_01_DESC: "Antes de que el refugio se viniera abajo, pudimos recuperar un conjunto de coordenadas codificadas de [wm_storm_shelter_planet.GetName]. Tenemos razones para creer que una de estas podría conducir a una máquina que los comerciantes ricinos usaban para manipular tormentas cósmicas; una tecnología que valdría la pena encontrar."
 #Special project completed
 cstorms.135.name: "Sistema generoso"
 cstorms.135.desc: "Por suerte, nuestros [Root.Owner.GetScientistPlural] lograron salir del refugio derrumbado de [wm_storm_shelter_planet.GetName] con un conjunto de coordenadas codificadas bajo el brazo. Se han restaurado los datos, que señalan a tres ubicaciones que debemos explorar:\n\n[wm_digsite_A.GetName], [wm_digsite_B.GetName] y [wm_digsite_C.GetName]. Otros análisis indican que cada planeta desempeñaba un rol importante en la red de los comerciantes ricinos, tanto como para que se encontraran recogidos en el refugio de [wm_storm_shelter_planet.GetName]."
 #Precursors Event Chain
 cs_inetian_chain_title: "Precursores: los comerciantes ricinos"
 cs_inetian_chain_desc: "Hemos encontrado los restos de un antiguo refugio que pertenecía a una civilización que prosperó hace millones de años, una que no aparece en ninguno de nuestros registros, como si la hubieran borrado meticulosamente de la historia. Si investigamos, quizá encontremos los motivos."
 #Arcsite Coordinates A
 site_weathermanipulators_CoordinatesA_Residential_Planet: "Coordenadas A: planeta colonizado"
 site_weathermanipulators_CoordinatesA_Residential_Planet_intro: "Uno de los conjuntos de coordenadas que se encontraron en el antiguo refugio para tormentas nos ha conducido a [From.Planet.GetName]. Dada la extensión de las ruinas, está claro que el planeta llegó a contar con numerosos centros urbanos en expansión. Probablemente aquí es donde habrían vivido los comerciantes ricinos hace eones. Habrá que investigar por qué se almacenaron las coordenadas de forma segura en un refugio para tormentas."
 cstorms.140.name: "Propósito religioso"
 cstorms.140.desc: "Apenas queda nada de las ciudades de [From.Planet.GetName]. Además del paso del tiempo, las estructuras más impresionantes que salpican el paisaje se han visto arrasadas por las tormentas. Las características arquitectónicas en pie están en armonía con aquellas que se ven en [wm_storm_shelter_planet.GetName]; en concreto, destaca la particular falta de preparación ante los desastres a pesar de la amplia evidencia de la violencia de las tormentas. La increíble destrucción dificultará el hallazgo de algo que pueda resultar de utilidad, aunque ojalá no sea una tarea imposible.\n\nNuestros [Root.Owner.GetScientistPlural] han decretado tres puntos de interés alrededor del sitio de aterrizaje: una estructura para el servicio público relativamente intacta, una especie de templo y una enorme plaza central. Estos deberían ser buenos lugares para seguir indagando en los secretos de los comerciantes ricinos."
 cstorms.145.name: "Epicentro económico"
 cstorms.145.desc: "Varios equipos se desplegaron para investigar los tres lugares más prometedores. Aunque la estructura de servicios y la plaza pública se alzaban como interesantes ejemplos culturales y arquitectónicos, solo el lugar de reverencia resultó destacable.\n\nSu cochambrosa fachada oculta una sala cavernosa. En su interior, 521 terminales de cálculo se encuentran dispuestos en círculos concéntricos, en cuyo centro exacto descansa un impresionante modelo de este sistema estelar totalmente funcional. Los delicados nanocomponentes del modelo están sintonizados con los campos electromagnéticos del planeta. A pesar de su increíble antigüedad, el modelo sigue siendo una representación exacta de los objetos celestes de este sistema.\n\nAdemás, a lo largo de su base circular discurre una interfaz visible desde cada terminal. En los elementos de la imagen de esta interfaz hay una lista de entidades corporativas y valores bursátiles. No se trata de un lugar de reverencia religiosa, sino de un centro de comercio y un mercado de valores de RICI\n\nEs lógico pensar que este edificio albergó en su día datos importantes. Hay que encontrarlos."
 cstorms.145.a: "Poned el lugar patas arriba."
 cstorms.150.name: "Libro de referencia"
 cstorms.150.intro: "Tras una investigación más exhaustiva, nos hemos dado cuenta de que el centro de comercio de [From.Planet.GetName] está desvalijado. Los terminales están inoperativos y, a pesar de la imagen grabada en la interfaz del modelo, no se halla ninguna información comercial.\n\nSin embargo, una unidad de almacenamiento escondida en un rincón de la sala contenía lo que parecen ser manuales de usuario. Con las rudimentarias claves de traducción desarrolladas durante nuestras excavaciones en [wm_storm_shelter_planet.GetName], hemos logrado llevar a cabo una interpretación aproximada de estos manuales.\n\nContienen instrucciones para operar los terminales, para sintonizar el modelo de sistema y para solicitar ayuda de una máquina apodada como depresor de perturbación sectorial. Los detalles sobre cómo operar, dirigir y activar esta máquina son explícitos.\n\nDebe de ser el dispositivo mencionado en el antiguo refugio para tormentas, y puede que se trate de lo que estábamos buscando."
 cstorms.150.outro: "estamos un paso más cerca de entender las intenciones de los comerciantes ricinos y tal vez de aprovechar el poder de esta máquina para nosotros mismos."
 cstorms.150.desc.a: "$cstorms.150.intro$ Esto significa que $cstorms.150.outro$"
 cstorms.150.desc.b: "$cstorms.150.intro$ El manual hace referencia a uno de los componentes que encontramos en [wm_digsite_B.GetName] y a cómo instalarlo. Esto significa que $cstorms.150.outro$"
 cstorms.150.desc.c: "$cstorms.150.intro$ El manual hace referencia a la máquina que encontramos en [wm_digsite_C.GetName], pero aún nos falta un componente importante. Aun así, $cstorms.150.outro$"
 cstorms.150.desc.d: "$cstorms.150.intro$ El manual hace referencia a la máquina que encontramos en [wm_digsite_C.GetName] y a la manera en la que hay que instalar la pieza de [wm_digsite_B.GetName]. El último paso consiste únicamente en activar el depresor de perturbación sectorial. Entonces, ¡podemos aprovechar su poder en nuestro beneficio!"
 cstorms.150.a: "Adelante."
 #Arcsite Coordinates B
 site_weathermanipulators_CoordinatesB_Industrial_Planet: "Coordinadas B: planeta industrial"
 site_weathermanipulators_CoordinatesB_Industrial_Planet_intro: "Una de las tres coordinadas halladas en el antiguo refugio contra tormentas nos ha conducido hasta [From.Planet.GetName], un mundo industrial del imperio de los comerciantes ricinos. A juzgar por su arquitectura, está claro que no se trata de un planeta residencial. Sin embargo, no queda del todo claro qué pretendía producir esta potencia industrial."
 cstorms.155.name: "Eficiencia industrial"
 cstorms.155.desc: "Era difícil ver la superficie de [From.Planet.GetName] a través de la espesa niebla tóxica que aún circulaba sobre sus fábricas. Buena parte de la superficie del planeta quedó arrasada por los daños que ocasionó la tormenta cósmica, la cual dejó grandes grietas en el homogéneo paisaje industrial. Una de ellas nos brindó una estupenda oportunidad para aterrizar nuestra nave.\n\nNo hay señales de que hayan intentado desmantelar estas instalaciones de producción; simplemente las abandonaron, y muchas de ellas aún contienen materiales de producción. Si analizamos esto, quizá podamos entender el propósito de este planeta dentro de la infraestructura mercantil de la antigua civilización. También podría brindarnos más datos sobre la famosa máquina a la que se hace referencia en [wm_storm_shelter_planet.GetName]."
 cstorms.160.name: "Transmitir lo esencial"
 cstorms.160.desc: "Los primeros análisis de los materiales industriales que se usaron en [From.Planet.GetName] indican que tienen una composición altamente volátil. Estos productos formaban parte de un proceso más dilatado y no estaban diseñados para usarse de forma independiente. Las sustancias se transportaban finalmente a través de un sistema de cintas transportadoras hacia un depósito centralizado de recogida.\n\nA juzgar por las marcas de quemaduras circundantes, está claro que el transporte interplanetario usó este depósito de manera continuada. La pregunta es: ¿dónde se entregaba el producto? Dada la naturaleza explosiva de la carga, no pudo haber sido muy lejos.\n\nCerca encontramos varias cajas de embalaje. Está claro que se esmeraron en empaquetar de forma segura el contenido, puesto que sigue habiendo restos de las etiquetas de aviso impresas en los lados. Solo una palabra sigue siendo legible: \"Crítico\"."
 cstorms.165.name: "Eslabón perdido"
 cstorms.165.intro: "Nuestros [Root.Owner.GetScientistPlural] no tardaron en desmantelar las rudimentarias cajas de embalaje.\n\nAl abrir la primera, un fuerte silbido denotó la presencia de una cámara interior climatizada, lo cual provocó un pánico momentáneo ante la posibilidad de que el contenido se desestabilizara. Por suerte, quedó intacto.\n\nUna inspección más profunda reveló el componente de una máquina maravillosamente elaborado y cuidadosamente colocado, en cuyo interior había una cantidad del material volátil producido en la fábrica."
 cstorms.165.outro: "\n\nSubiremos la pieza a bordo para estudiarla en más profundidad. Nuestros [Root.Owner.GetScientistPlural] no deberían pasar más tiempo del necesario sobre la superficie hostil de [From.Planet.GetName]."
 cstorms.165.desc.a: "$cstorms.165.intro$\n\nUna etiqueta de envío ubicada dentro de la caja menciona algo denominado \"depresores de perturbaciones sectoriales\". Nuestros [Root.Owner.GetScientistPlural] no saben a ciencia cierta qué significa, pero, a juzgar por el contenedor de almacenamiento de alta resistencia y los avisos pegados en el exterior de la caja, debe de haber sido algo importante.$cstorms.165.outro$" #A & C sites not yet visited
 cstorms.165.desc.b: "$cstorms.165.intro$\n\nLa pieza enseguida nos resultó familiar, y la tripulación recuperó un manual que se encontró en [wm_digsite_A.GetName] para comparar. El intrincado objeto fabricado de dentro de la caja es un componente vital de los depresores de perturbaciones sectoriales.$cstorms.165.outro$" #A site visited & C site not visited
 cstorms.165.desc.c: "$cstorms.165.intro$\n\nSu forma única y su núcleo lleno de líquido revelaron que podría tratarse de la pieza exacta que se necesita para completar la instalación en [wm_digsite_C.GetName]. La sustancia interna tiene que usarse para dar energía a los depresores de perturbaciones sectoriales. Sin embargo, parece que harán falta conocimientos específicos para instalarlo de forma segura.$cstorms.165.outro$" #A site not visited & C site visited
 cstorms.165.desc.d: "$cstorms.165.intro$\n\nParece que esta es la pieza que faltaba de los depresores de perturbaciones sectoriales en [wm_digsite_C.GetName]. Con el manual que encontramos en [wm_digsite_A.GetName], podremos instalarlo correctamente y, quizás, activarlo por fin.$cstorms.165.outro$" #A & C sites visited
 cstorms.165.a: "Un trabajo bien hecho."
 #Arcsite Coordinates C
 site_weathermanipulators_CoordinatesC_Barren_Planet: "Coordinadas C: planeta yermo"
 site_weathermanipulators_CoordinatesC_Barren_Planet_intro: "Una de las tres coordenadas halladas en el antiguo refugio para tormentas nos condujo a [From.Planet.GetName]. La superficie no es más que nieve y polvo, aunque los análisis iniciales muestran que el planeta fue habitable en su día. ¿Fue un lugar importante para los comerciantes ricinos antes o después de que quedara destrozado?"
 cstorms.170.name: "Infinito e implacable"
 cstorms.170.desc: "Ventiscas interminables azotan la superficie de [From.Planet.GetName]. Por si eso no fuese suficiente, el paisaje cubierto de nieve ocultaba una extraña sorpresa.\n\nCapas y capas de polvo nos aguardaban debajo. En su interior se encontraban evidencias de formas de vida que una vez habitaron este mundo. Todas quedaron sepultadas al mismo tiempo, lo cual sugiere un evento de extinción masiva singular. El colapso de los ecosistemas de [From.Planet.GetName] debió de haber disminuido la atmósfera, provocando una edad de hielo que convirtió el planeta en un páramo.\n\nEn este lugar debe de haber algo más que gravilla y capas de hielo, pero está claro que la superficie no va a proporcionar más respuestas. Nuestros [Root.Owner.GetScientistPlural] aconsejan buscar a más profundidad."
 cstorms.170.a: "Empezad a cribar."
 cstorms.171.name: "Raíces de vida"
 cstorms.171.desc: "Nuestros [Root.Owner.GetScientistPlural], equipados con equipos de protección y maquinaria pesada resistente a las heladas, llevaron a cabo en poco tiempo el tedioso pero sencillo proceso de retirar las capas de nieve y polvo fino. Poco después, se descubrieron unos extraños patrones; una serie de zanjas que se extendían en forma de raíz cubriendo una vasta franja del territorio.\n\nDentro de esas grietas encontramos restos disecados de todo tipo de organismos; todo lo que se pudo sacar de la superficie del planeta, desde vegetación hasta vida salvaje, entre otras cosas. De alguna manera, las zanjas trituran a los orgánicos, pulverizándolos entre sus paredes rocosas, extrayendo los nutrientes útiles y transportándolos a un punto de convergencia en un proceso similar a la digestión. El polvo que escupieron cubre ahora la mayor parte de los paisajes de [From.Planet.GetName]\n\nEsto nos lleva a preguntarnos a quién o a qué alimentaban las grietas."
 cstorms.171.a: "Encontrad el origen."
 cstorms.172.name: "Máquinas de antaño"
 cstorms.172.intro: "La red de zanjas subterráneas es grande. Cuanto más descendían nuestros [Root.Owner.GetScientistPlural], más se concentraban estos comederos. Todos ellos convergían en una de las últimas montañas que quedaban en [From.Planet.GetName]. En la cima hay una meseta claramente artificial con tres grandes máquinas colocadas a una distancia igual entre ellas. Parecen ser de origen ricino, ya que están marcadas en su lengua y son coherentes con el diseño de lo que conocemos de su sociedad. A pesar de la notable antigüedad de estas y de los vientos extremos que azotan la meseta, se conservan en una condición excelente."
 cstorms.172.outro: "\n\nAun así, hemos encontrado lo que estábamos buscando. Estamos a punto de llevar a cabo un increíble descubrimiento."
 cstorms.172.desc.a: "$cstorms.172.intro$ Estas deben de ser las máquinas que se mencionan en [wm_storm_shelter_planet.GetName]. Por desgracia, no disponemos del conocimiento necesario para entender el complejo funcionamiento interno de estos dispositivos. Y no solo eso, se nota que a la consola de control descubierta en la base de una de las máquinas le faltan componentes esenciales. Las palabras \"depresores de perturbaciones sectoriales\" se encuentran grabadas en una pequeña placa.\n\nSi logramos activar las máquinas, quizá descubramos por fin su propósito. Para ello, necesitaremos explorar el resto de coordenadas. $cstorms.172.outro$" #A&B not visited
 cstorms.172.desc.b: "$cstorms.172.intro$ \n\nLos esquemas que observamos en el manual encontrado en [wm_digsite_A.GetName] parecen cuadrar con los instrumentos que tenemos delante, así que tienen que ser los depresores de perturbaciones sectoriales y, por tanto, la instalación de la máquina mencionada en el refugio contra tormentas que se encuentra en [wm_storm_shelter_planet.GetName].\n\nEl manual indica que estas máquinas requieren un panel de control para su funcionamiento. Nuestros [Root.Owner.GetScientistPlural] lo hallaron a los pies de una de estas máquinas, pero parece que le falta una pieza importante. Sin embargo, aún hay un conjunto de coordenadas que no hemos explorado, el cual podría tener la clave para resolver este dilema. $cstorms.172.outro$" #A visited & B not visited
 cstorms.172.desc.c: "$cstorms.172.intro$ \n\n¡Estas deben de ser las máquinas mencionadas en [wm_storm_shelter_planet.GetName], apodadas como depresores de perturbaciones sectoriales! Es más, la pieza de la máquina que encontramos en [wm_digsite_B.GetName] encaja perfectamente en el panel de control a los pies de una de las máquinas.\n\nSin embargo, cualquier intento de reparación entraña sus riesgos debido a la complejidad y la antigüedad de los componentes. Nuestros [Root.Owner.GetScientistPlural] han recomendado que busquemos más información antes de proceder. $cstorms.172.outro$" #A not visited & B visited
 cstorms.172.desc.d: "$cstorms.172.intro$ \n\nSin duda, son las máquinas que se mencionan en [wm_storm_shelter_planet.GetName], así como los temas del manual de [wm_digsite_A.GetName], que ahora conocemos como depresores de perturbaciones sectoriales. Solo nos queda instalar la pieza que encontramos en [wm_digsite_B.GetName] y rezar por que las máquinas funcionen. Solo entonces descubriremos por fin su cometido. $cstorms.172.outro$" #A&B visited
 cstorms.172.a: "Es hora de ver de qué son capaces las máquinas." #Finished sites A and B
 cstorms.172.b: "Ahora no." #Did not finish sites A and B
 #Special Project 2
 INETIAN_PROJECTS_02: "El significado de la máquina"
 INETIAN_PROJECTS_02_DESC: "Las tres coordenadas de [wm_storm_shelter_planet.GetName] completaban un antiguo rompecabezas. Lo único que falta es activar los depresores de perturbaciones sectoriales. Ha llegado la hora de descubrir su propósito."
 cstorms.176.name: "El significado de la máquina"
 cstorms.176.desc: "Una vez encontrada la última pieza del puzle, nuestros [Root.Owner.GetScientistPlural] se pusieron manos a la obra. El componente de [wm_digsite_B.GetName] encajó a la perfección en la consola de control. Se empleó el manual de [wm_digsite_A.GetName] para instalarlo correctamente. Una vez hecho, las tres máquinas cobraron vida.\n\nEstruendosas vibraciones sacudieron el polvo y la nieve de la meseta. Con un crujido como el de un relámpago, un [Root.Owner.GetScientist] acabó vaporizado al instante; el remolino de polvo que una vez fue un cuerpo acabó rápidamente succionado por las zanjas hacia los depresores de perturbaciones sectoriales.\n\nAquí yace la clave de lo ocurrido en [wm_digsite_C.GetName]: las zanjas que conducen a la parte inferior de las máquinas son conductos de combustible que atraen la biomateria de su entorno. El resultado es un reguero de destrucción por todo el planeta.\n\nLos depresores de perturbaciones sectoriales están ahora completamente operativos. Hay combustible suficiente para un uso más. Tan solo hay que pulsar un botón."
 cstorms.176.a: "Activad la máquina."
 cstorms.176.b: "No pulséis el botón."
 #Delayed Event 1
 cstorms.180.name: "Restos redescubiertos"
 cstorms.180.desc: "Tras descubrir los secretos de los depresores de perturbaciones sectoriales, se enfriaron las pistas acerca del destino de los comerciantes ricinos. Sin embargo, una reevaluación exhaustiva de los datos brindó nuevos indicios.\n\nLos registros comerciales de [wm_digsite_A.GetName] demuestran que esta gente tenía fuertes creencias igualitaristas. Esta conclusión se ve respaldada por el alto nivel de vida y la abundancia de lujosas instalaciones que aún pueblan el planeta; con un pequeño grado de variación, todos los ciudadanos disfrutaban de las mismas comodidades y oportunidades sin importar su profesión, posición social o linaje.\n\nEn [wm_digsite_B.GetName] encontramos índices que detallan el caso de cada fábrica. Estas formaban parte de cadenas de producción mucho mayores, confeccionadas para proporcionar al vasto imperio los medios necesarios para sustentar su opulento estilo de vida. La distribución equitativa de estos beneficios requería un consumo realmente asombroso de materiales y comida, todo producido a velocidades vertiginosas.\n\nLos depresores de perturbaciones sectoriales reparados en [wm_digsite_C.GetName] proporcionaron más información antes de que los desmantelásemos. Aunque el propósito exacto de su función sigue siendo un misterio, pudimos recuperar una señal de datos rastreable; las máquinas no estaban dirigidas a una entidad de libre circulación.\n\nNuestros [Root.Owner.GetScientistPlural] recomiendan buscar en sectores cercanos una respuesta que cuadre con esta señal."
 cstorms.180.a: "Busquemos la entidad."
 #Digsite 5
 site_weathermanipulators_storm_formation: "Orígenes de la omnipresencia"
 site_weathermanipulators_storm_formation_intro: "En la consola de mando de los depresores de perturbaciones sectoriales se encontraba guardada una señal de datos. Aunque costó lo suyo, conseguimos clonar su patrón y buscar por la galaxia alguna coincidencia. El rastro conducía a un planeta deshabitado. Es hora de descubrir lo que buscaban los comerciantes ricinos y sus motivos."
 cstorms.181.name: "Llanuras desnudas"
 cstorms.181.desc: "A simple vista, no parece que haya nada raro en [From.Planet.GetName]; un planeta como cientos de otros que hay en la galaxia. No hay nada que indique de dónde procede la señal exactamente. Tampoco hay un transmisor visible ni una pieza de tecnología lo bastante fuerte como para que su llamada se registre desde sistemas lejanos.\n\nContinuaremos con la búsqueda."
 cstorms.182.name: "Catástrofe concentrada"
 cstorms.182.desc: "Tras llegar a la superficie, descubrimos que la señal se hacía más fuerte o débil dependiendo de nuestra posición. Siguiendo este sencillo patrón, por fin terminamos en una imponente cadena montañosa situada en el otro extremo del planeta.\n\nA medida que nos acercábamos a las imponentes montañas, el paisaje se tornaba cada vez más desolado, estéril, en ruinas; como si una fuerza devastadora hubiese arrasado esta parte del mundo. A juzgar por el patrón de daños, creemos que este lugar quedó devastado en algún momento por una tormenta de polvo cósmico. De ser eso cierto, lo lógico es que el planeta entero se hubiese visto afectado. Jamás habíamos visto semejante destrucción tan concentrada a raíz de una tempestad. Si queremos averiguar más, habrá que escalar los imponentes picos."
 cstorms.183.name: "Energía fugaz"
 cstorms.183.desc: "La cadena montañosa devastada constaba de muchos picos y valles, pero un cráter de extraña forma no tardó en llamar nuestra atención. Las paredes de la fosa eran lisas y en su centro había una serie de anillos concéntricos grabados en el suelo.\n\nA medida que descendíamos por el cuenco, empezamos a sentir la atracción de una fuerza profundamente irresistible, ineludible e inequívocamente procedente del punto de origen del círculo. De los anillos surgieron hilos de energía parpadeantes, algunos de los cuales se alejaron tanto que acabaron escapando de la atmósfera del planeta. Esta es la fuente de la señal.\n\nNuestros [Root.Owner.GetScientistPlural] sugieren que analicemos el cráter y las fluctuaciones de energía para poder entender mejor lo sucedido en este lugar."
 cstorms.184.name: "Comienzos inciertos"
 cstorms.184.desc: "Basándonos en datos ambientales y en simulaciones detalladas, podemos concluir sin dudas que lo que pasó por aquí fue una tormenta de polvo celeste. De hecho, ¡se formó aquí mismo! Creemos que no llegó a engullir todo el planeta porque era demasiado pequeña; los análisis describen una tormenta que era una fracción del tamaño de incluso una tempestad media.\n\nBasándonos en el hecho de que los comerciantes ricinos se refirieron a los depresores de perturbaciones sectoriales como \"dispositivos de manipulación\", y que la señal de energía de esta tormenta específica estaba almacenada en sus bancos de datos, parece probable que estuvieran intentando controlar la tormenta cósmica. Si calculamos la trayectoria que siguió tras abandonar este lugar, podríamos aprender mucho en nuestro beneficio."
 cstorms.184.a: "Prosigamos."
 #Special Project 3
 INETIAN_PROJECTS_03: "Tras la pista de los comerciantes"
 INETIAN_PROJECTS_03_DESC: "Hemos encontrado el punto en el que se formó una antigua tormenta de polvo celeste, aunque las evidencias sugieren que tuvo que ser mucho más pequeña que la típica perturbación. Dado su tamaño, es curioso que los comerciantes ricinos sintieran la necesidad de controlar la tormenta con sus depresores de perturbaciones sectoriales.\n\nSi rastreamos la trayectoria de la tormenta, es posible que descubramos por qué invirtieron tanto tiempo en este proyecto."
 cstorms.186.name: "Tras la pista de los comerciantes"
 cstorms.186.desc: "Rastrear la trayectoria de la tormenta de polvo celestial resultó ser menos sencillo de lo previsto. A solo unos pocos sistemas del punto de origen, algo radical afectó a su fuerza, tamaño y curso. Nuestros [Root.Owner.GetScientistPlural] sospechan que los depresores de perturbaciones sectoriales alcanzaron la tormenta en este punto. Esto desequilibró la tormenta y contaminó su vórtice interno con los restos pulverizados de la fauna arrastrada desde la superficie de [wm_digsite_C.GetName].\n\nA medida que la tormenta siguió su curso a través de la galaxia, engulló múltiples sistemas con unas repercusiones devastadoras.\n\nTodo esto para alterar el curso de una perturbación menor y llevarla lejos de un sistema particular... Los sensores han detectado la presencia de una estación espacial abandonada en ese sistema. Para proteger este lugar, los comerciantes ricinos dejaron múltiples extinciones masivas a su paso.\n\nPuede que la estación no sea el mundo capital que esperábamos, pero tiene que ser igual de importante para justificar tales medidas."
 cstorms.186.a: "Trazad un rumbo."
 #Digsite 6
 site_weathermanipulators_last_shelter: "Antes de la caída"
 site_weathermanipulators_last_shelter_intro: "Los comerciantes ricinos intentaron proteger una estación espacial de su sistema ante una pequeña tormenta de polvo celeste. Como consecuencia inesperada, la tormenta acabó haciéndose tan grande que muchos de sus sistemas quedaron destruidos. ¿Por qué estaban tan desesperados por proteger esta instalación?"
 cstorms.190.name: "Órbita estable"
 cstorms.190.desc: "La estación espacial que orbita alrededor de [From.Planet.GetName] es mucho más grande de lo que pensábamos. Parece ser algo más que una estalación, ya que posee instrumentos de investigación, así como sofisticados sistemas de soporte vital y sensores de espacio profundo. Quizá esto sea un indicador de que la instalación se usaba más como una colonia a largo plazo que como punto de paso sin importancia.\n\nSin embargo, está en un estado deplorable. El casco está dañado y una descompresión catastrófica ha destruido sectores enteros. No está claro si el daño fue causado desde el exterior o desde el interior. Por suerte, el control de la órbita y la estabilización de los ejes siguen funcionando, lo cual explica por qué la estructura no ha derivado hacia la estrella ni ha entrado en un remolino imparable.\n\nSerá complicado entrar sin desestabilizar el meticuloso equilibrio que mantiene."
 cstorms.191.name: "Presión importante"
 cstorms.191.desc: "Para acceder a la estación del sistema [This.System.GetName] hubo que abrir una esclusa de aire intacta sin causar más implosiones. El interior de la estación seguía presurizado, imitando la atmósfera planetaria típica, a pesar de su impresionante antigüedad.\n\nNos llevó varios días crear el sellado perfecto entre nuestra nave y la estación, para lo cual hubo que igualar meticulosamente la presión del aire. Tras esto, por fin pudimos abrir la puerta de forma segura. Por desgracia, nos topamos con otro obstáculo casi de inmediato: un pasillo bloqueado y atascado con vigas de soporte retorcidas y escombros procedentes de la despresurización cercana. Pasará algún tiempo antes de que podamos continuar."
 cstorms.192.name: "Tumba interna"
 cstorms.192.desc: "Tras despejar el camino, empezamos a explorar la estación en busca de respuestas.\n\nUna minuciosa investigación reveló que la estación no se construyó para observar el cosmos, sino para proteger algo, de ahí que gran parte de su elaborado equipo de exploración estuviera dirigido internamente. Encontramos efectos personales pertenecientes a los comerciantes ricinos, así como registros que describían la vida en la estación. En ellos se hablaba de una importante carga útil, guardada en una cámara fuertemente custodiada en algún lugar de la base. Aunque no se tardó mucho en localizarla, la estancia resultó ser una tumba.\n\nRestos disecados y casi momificados ocupaban el espacio, todos ellos pertenecientes a miembros del imperio de comerciantes ricinos. Dada la posición mundana en la que se hallaban, no parece que pusieran mucha resistencia; simplemente se sentaron a esperar su muerte. ¿Qué ocurrió aquí?"
 cstorms.193.name: "Arrogancia"
 cstorms.193.desc: "La carga útil descrita por los ciudadanos estaba colocada justo en el centro de la sala. Es un dispositivo singular, aparentemente nuevo y sin usar. Sin duda es ricino, aunque es más avanzado que cualquier cosa que hayamos visto de ellos hasta ahora.\n\nLos terminales que flanquean al objeto muestran unos cuántos párrafos del mismo texto repetidos una y otra vez. La traducción no se hizo esperar:\n\n§LQuerido visitante, si estás leyendo esto es porque eres testigo de nuestra arrogancia. En nuestra noble búsqueda por la igualdad, olvidamos el verdadero ecualizador: creación y destrucción.\n\nManipulamos la naturaleza tratando de liberar las rutas comerciales de los estragos causados por las tempestades cósmicas. Lo que al principio fueron pequeñas perturbaciones, al final terminaron adquiriendo mayor magnitud. Las tormentas cósmicas arrasaron nuestros mundos, y no fue una coincidencia, sino venganza. Nos encerramos en esta estación. Era nuestra última defensa, ya que era demasiado tarde. A pesar de no usar ya los depresores, se formaron nuevas tormentas, más fuertes y salvajes. Estaba claro cuál era nuestra última misión.\n\nTrabajamos sin descanso para completar esta máquina, y la construimos para ti, visitante. Esta te salvará de las tormentas cósmicas sin encolerizarlas más. Nuestra muerte es nuestra absolución, y no tiene por qué ser la tuya.§!\n\nEn esta sala, los comerciantes ricinos sellaron su destino. Su generosidad fue tan grande como su imprudencia. Al salir de la estación, volvimos con su regalo de despedida."
 cstorms.193.a: "Dejadles descansar."
 cstorms.193.b: "El final que se merecían estos necios."
 #Artifact action
 artifact_inetian_research: "Secretos de los comerciantes ricinos"
 artifact_inetian_research_desc: "Profundizad en los secretos de los comerciantes ricinos."
 artifact_inetian_research_completed: "$artifact_inetian_research$"
 artifact_inetian_research_completed_desc: "Hemos puesto en práctica los antiguos conocimientos de los comerciantes ricinos para nuestro propio beneficio."
 INETIAN_PROJECTS_04: "Profundizar en los secretos de los comerciantes ricinos"
 INETIAN_PROJECTS_04_DESC: "Después de descubrir el último lugar de descanso de los comerciantes ricinos, aún nos quedan más cosas por conocer sobre su vasto imperio. Nos gustaría investigarlos una vez más."
 cstorms.195.name: "Profundizar en los secretos de los comerciantes ricinos"
 cstorms.195.desc: "El último lugar de descanso de los comerciantes ricinos resultó ser una estación espacial que albergaba tecnología muy avanzada. La construyeron como refugio contra las terribles tormentas cósmicas que ellos mismos provocaron. Este hábitat único es un verdadero cenit de la tecnología ricina, con increíbles sistemas de control de habitabilidad y protección. Aun así, ni siquiera eso pudo salvarlos.\n\nAunque ya no es seguro habitar la estación debido a los eones que lleva en decadencia, nuestros [Root.Owner.GetScientistPlural] fueron capaces de extraer verdaderas perlas de conocimiento de sus sistemas. Y no solo eso, también encontraron las rutas comerciales más importantes de los comerciantes ricinos almacenadas en una base de datos, así como delicados prototipos de máquinas de control climático más eficientes y menos destructivas para el planeta, las cuales se encontraban en una estación de trabajo.\n\nParece que al menos parte de la tenacidad de los comerciantes ricinos ha prevalecido y seguirá ayudándonos a superar estas tormentas."
 secrets_of_the_inetian_traders: "Secretos de los comerciantes ricinos"
 secrets_of_the_inetian_traders_hive_mach: "Secretos de los comerciantes ricinos"
 secrets_of_the_inetian_traders_desc: "El conocimiento de los comerciantes ricinos ha vuelto a ayudarnos. Ahora disfrutamos de una reducción en las tasas de mercado gracias a su influencia."
 secrets_of_the_inetian_traders_hive_mach_desc: "Los datos conservados de los comerciantes ricinos han vuelto a ayudar al colectivo. Ahora se aplican reducciones de tasas de mercado."
 #Hyperlane Detailer - Secrets Of Inetian Traders Reward
 sm_hyperlane_detailer: "Desglosador de hipervías"
 NAME_inetian: "Comerciantes ricinos"
 ###########################################
 #The adAkkaria Convention of Benevolence #
 ###########################################
 cs_adAkkaria_chain_title: "Precursores: adAkkaria"
 cs_adAkkaria_chain_desc: "Para comprender el destino de esta extraña y antigua civilización, tenemos que seguir una serie de pistas, sin importar a dónde nos lleven."
 #Anomaly: Ancient Signals
 STORMS_PREC_ONE: "Antiguas señales"
 STORMS_PREC_ONE_DESC: "Hemos captado una serie de extrañas señales electrónicas que proceden de dentro del sistema. Los datos preliminares muestran que estas transmisiones podrían tener miles de años. Nuestra tripulación está dispuesta a encontrar el origen."
 cstorms.205.name: "Una señal de benevolencia"
 cstorms.205.desc: "Las extrañas señales que hemos detectado en el sistema provienen de una antigua estación de comunicación que orbita [FromFrom.GetName]. Los mensajes parecen ser viejas transmisiones de una civilización olvidada.\n\nComo resultado, nuestros [Root.Owner.GetScientistPlural] están teniendo dificultades a la hora de descifrarlos. Sugieren abordar la estación para interactuar directamente con el ordenador central de transmisión."
 #Digsite: The Propaganda Station
 site_adakkaria_the_propaganda_station: "La estación de propaganda"
 site_adakkaria_the_propaganda_station_intro: "La antigua estación de comunicación sigue activa. Si abordamos el lugar e interferimos directamente con sus sistemas, es posible que logremos descifrar sus transmisiones pasadas."
 cstorms.215.name: "Una interfaz al pasado"
 cstorms.215.desc: "El embarque en la estación apenas causó algunos problemas, aunque navegar por la estructura resultó complicado. A pesar de que estaba increíblemente bien preservada, en parte gracias a la avanzada composición del blindaje exterior, los estrechos pasillos y los bajos techos resultaron ser todo un reto para nuestro equipo.\n\nEl interior del puesto de avanzada ofrece pocas pistas sobre la naturaleza de sus antiguos propietarios, salvo por las grandes hojas que decoran las paredes y que son una mezcla de papel y plástico. Estos carteles muestran imágenes estilizadas de individuos de una especie orgánica desconocida. Su apariencia llama la atención; erguida y con determinación ante un fondo de conquista y celebración. Las imágenes están claramente diseñadas para infundir cierto sentimiento de orgullo y pertenencia.\n\nEl propio ordenador central de transmisión es todo un misterio. Al principio, nuestros [Root.Owner.GetEngineerPlural] pensaban que era de una naturaleza analógica, similar a lo que habíamos visto en [Root.Owner.GetPreFTLLowerPlural]. Sin embargo, bajo los botones y diales se encontraba una compleja disposición de circuitos electrónicos, hechos de aleaciones desconocidas para nosotros. Nuestros [Root.Owner.GetScientistPlural] sospechan que esta civilización quizá se saltara varios pasos del desarrollo en ciencias informáticas, lo cual explicaría la mezcla anacrónica de tecnología.\n\nAun así, tras una serie de ensayos y errores, nuestros [Root.Owner.GetLinguists] consiguieron descifrar la primera de las muchas emisiones grabadas."
 cstorms.220.name: "Del liderazgo exaltado"
 cstorms.220.desc: "Tras lograr conectarse con el antiguo ordenador central de transmisión, nuestros [Root.Owner.GetLinguists] han obtenido una transcripción de la primera emisión:\n\n§L¡Gentes de la Convención de adAkkaria!\n\nNo me dirijo a vosotros como líder, sino como amigo y mentor.\n\nNo puede haberos pasado desapercibido que los días se están oscureciendo y los cielos se están volviendo sombríos. Hasta las propias estrellas se muestran hostiles.\n\nPero tengo fe. Al igual que nuestros benefactores tuvieron fe en nosotros, yo tengo fe en nuestro propósito. Tengo fe en vosotros.\n\nDurante siglos, nuestro pueblo ha protegido las estrellas de las hordas bárbaras. Nuestro destino es salvar a la galaxia de esas fuerzas malignas. Y el destino no se desvanece por un solo revés. No nos dejaremos vencer por las malévolas legiones que conspiran contra nosotros.\n\nCreo en nuestra misión. La Convención de Benevolencia de adAkkaria lleva la verdad y la libertad a todas las civilizaciones. Es nuestra misión la que nos preserva. Es nuestro destino lo que nos permite triunfar y prosperar.\n\nAsí que, amigos míos, no nos dejemos vencer por la duda. Lloremos nuestras pérdidas, sí. Honremos a los caídos. Y luego unámonos como siempre lo hemos hecho. Por nuestros benefactores. Por la Convención de adAkkaria. ¡Por la benevolencia!§!"
 cstorms.225.name: "Ultimátum de la ComUni"
 cstorms.225.desc: "Clasificar los datos descubiertos en la antigua estación ha resultado una ardua tarea para nuestros [Root.Owner.GetLinguists]. Sin embargo, se han detectado varias transmisiones especialmente reveladoras, algunas de las cuales permiten atisbar conversaciones grabadas:\n\n§SilSapne Tuerthi - Presentador§!\n§LY para hablar de la reciente injerencia de la Comunidad Universal, aquí están el excelentísimo profesor akMani Sando y el doctor de Toda Existencia Percibida emEk Inna. Excelentísimo profesor, ¿cuál es su interpretación de las exigencias de la ComUni?§!\n\n§SakMani Sando - Excelentísimo profesor§!\n§L¡Sus exigencias son escandalosas! La Comunidad Universal sigue tratando a los mundos subcivilizados con sumo desprecio. Pero permítanme preguntar a estos autoproclamados guardianes de la moralidad galáctica: ¿no es acaso menos ético ocultar tecnologías que salvan vidas? ¿Reprimir aquellos ideales que forman la piedra angular de nuestra sociedad triunfante? ¿Cuán viles seríamos si permitiéramos que un mundo se precipitara hacia su propia desaparición y no tendiéramos la mano para salvarlo?§!\n\n§SilSapne Tuerthi - Presentador§!\n§L¡Excelentes argumentos! Doctor de Toda Existencia Percibida, imagino que debe estar igualmente indignado por la manipulación de nuestro destino por parte de la ComUni.§!\n\n§SemEk Inna - Doctor de Toda Existencia Percibida§!\n§LLo que tengo que decir podría sorprenderle. A pesar de la tozudez de la organización, creo que debería hacerse un esfuerzo por estudiar los...§!\n\n§TParece que la transmisión se corta en este punto.§!"
 cstorms.225.a: "Era un pueblo dogmático."
 cstorms.225.a.hive: "Demasiadas voces conducen al caos."
 cstorms.225.a.machine: "La vida es profundamente argumentativa."
 cstorms.230.name: "Santos y psiónicos"
 cstorms.230.desc: "Otra transmisión ha sido considerada como digna de estudio. Aunque se trata de una obra dramática, ofrece contexto útil para nuestras investigaciones:\n\n§SakTamian Riwan§!\n§LMe he enterado de que anoche volviste a visitar a enTulla Saman. Pensé que lo habías abandonado en favor de nuestro amor.§!\n\n§SinElka Utae§!\n§LTe aseguro que fue una visita de cortesía. Debes saber que me he comprometido contigo y con nadie más.§!\n\n§SakTamian Riwan§!\n§LEso es lo que dice tu boca, pero ¡tu mente dice otra cosa!§!\n\n§SinElka Utae§!\n§L¡No! ¿Tú también?§!\n\n§SakTamian Riwan§!\n§L¡Sí, yo también! ¡Descubrí mis dones psiónicos anoche mismo! ¡Y lo que imaginé que sería una alegre exploración de nuestros sentimientos más profundos se ha convertido en desesperación! ¡La traición en tus pensamientos!§!\n\n§SinElka Utae§!\n§L¡No lo entiendes! Es mi mente, no puedo evitarlo. No puedo evitar ver este camino como algo racional. ¡Oh, Riwan, ojalá tus nuevos dones psiónicos te permitieran leer mi corazón en vez de mi mente!§!"
 cstorms.230.a: "¿Capacidades psiónicas? Qué curioso."
 cstorms.230.b: "¡Palabrería inútil!"
 cstorms.230.b.hive: "Una forma de entretenimiento curiosamente individualista."
 cstorms.230.b.machine: "A los orgánicos les encanta el drama."
 dramatic_enthusiasm: "Entusiastas del drama alienígena"
 melodramatic_much: "Enemigos del drama alienígena"
 cstorms.235.name: "Transmisión antigua"
 cstorms.235.desc: "Nuestros [Root.Owner.GetLinguists] también han traducido varias noticias. Creen que merece la pena prestar atención a esta transmisión en particular:\n\n§LLos informes que llegan del sistema Haliios dibujan un panorama cada vez más funesto. La cobarde autoridad Solphani tendió una emboscada a nuestras valientes Fuerzas de la Iluminación en el emplazamiento enYpsal. Sin embargo, nuestro Exaltado Liderazgo declaró que el proceso no será interrumpido. Según palabras textuales: \"Nuestros mecenas no nos abandonaron, así que nosotros tampoco dejaremos atrás a ninguna civilización subdesarrollada\".\n\nTambién han surgido rumores de una posible colaboración entre las malvadas autoridades bárbaras y representantes de la ComUni. Sin embargo, el embajador de la ComUni niega que la comunidad interestelar se haya puesto en contacto con ninguno de los opresores bárbaros y afirma que se trata de otro caso más de \"paranoia oportunista\" por parte de nuestro Exaltado Liderazgo.\n\nPero, con o sin aliados poderosos, el Proceso de Iluminación de Solphani se encuentra en un estado crítico. No será fácil revertir la situación, pero...§!\n\n§TPor desgracia, el resto de la transmisión está demasiado deteriorada para ser descifrada. Nuestros [Root.Owner.GetEngineerPlural] ya han creado una copia de la base de datos. Con el tiempo, esperamos recuperar más información de esta civilización olvidada hace tiempo.§!"
 cstorms.235.a: "Esperaremos futuras conclusiones."
 #Event: A Site Barren and Bare
 cstorms.245.name: "Un lugar yermo y desnudo"
 cstorms.245.desc: "El paso de una tormenta cósmica por el sistema [planet_windswept_fates.System.GetName] ha dejado al descubierto un yacimiento de posible importancia arqueológica en [planet_windswept_fates.GetName].\n\nLos escaneos preliminares de §Y[planet_windswept_fates.GetName]§! revelan una atmósfera extremadamente inestable en la que vastas tormentas planetarias dominan el paisaje. Nuestros [Root.Owner.GetScientistPlural] nunca habrían esperado encontrar restos de una civilización en un mundo como este, y creen que podríamos aprender mucho si investigamos."
 cstorms.245.a: "¡Que aterrice un destacamento!"
 #Digsite: Windswept Fates
 site_adakarria_windswept_fates: "Destinos azotados por el viento"
 site_adakarria_windswept_fates_intro: "A pesar de lo destructivas que pueden ser las tormentas cósmicas, esta ha revelado pruebas de la existencia de una civilización alienígena. Aunque la atmósfera del planeta es increíblemente inestable, si enviamos un destacamento, podríamos descubrir qué terrible destino corrió esta antigua cultura."
 cstorms.2105.name: "Condiciones extremas"
 cstorms.2105.desc: "Nuestro equipo ha llegado sano y salvo a [From.Planet.GetName] y se ha puesto a trabajar rápidamente para inspeccionar el terreno.\n\nPor lo que parece, la reciente y violenta tormenta cósmica que azotó este sistema también eliminó suficientes capas de polvo y tierra como para revelar los restos de una antigua civilización.\n\nA medida que nuestros científicos han ido profundizando en estos hallazgos arqueológicos, les ha llamado la atención el hecho de que las capas de arena que cubrían los restos tenían una composición totalmente distinta a la del suelo circundante. Los escáneres planetarios indican que estos depósitos provenían de un desierto a cientos de kilómetros de distancia y que solo pudieron haber terminado aquí a través de una gran fuerza, como una tormenta planetaria extremadamente volátil."
 cstorms.2105.a: "Continuad."
 cstorms.2110.name: "Lo que se ha perdido"
 cstorms.2110.desc: "A pesar de las extrañas condiciones meteorológicas que asolan este planeta, nuestros [Root.Owner.GetScientistPlural] han hecho grandes progresos. Pero, cada día que pasa, sus descubrimientos son más desconcertantes e inquietantes.\n\nPrimero hallaron restos de piedra y materiales orgánicos carbonizados. Luego, telas desgarradas, trabajos de cuero, chalecos con capas de polímeros y, finalmente, los restos orgánicos de los antiguos habitantes del planeta.\n\nLos cadáveres tenían los órganos disecados llenos de arena y las uñas desgastadas por la lucha. Iban ataviados con pesados equipos militares [Root.Owner.GetPreFTLLowerPlural] y portaban armas de proyectiles. Lo que creíamos que era una ciudad abandonada era en realidad una fosa común.\n\nEs posible que estos especímenes tengan eones de antigüedad, pero, debido a su completo aislamiento de la radiación ultravioleta y los productos químicos reactivos, tanto los restos orgánicos como el equipo se han conservado en perfecto estado. Aún se desconoce qué les ocurrió."
 cstorms.2110.a: "Qué manera tan cruel de morir."
 cstorms.2115.name: "Violencia desde el cielo"
 cstorms.2115.desc: "Los hallazgos realizados en [From.Planet.GetName] siguen siendo inquietantes. [Root.GetLeaderName] cree que es improbable que el lugar fuera un cementerio, ya que estos alienígenas parecían estar en buen estado físico hasta que fueron asfixiados por las arenas.\n\nAdemás, hemos descubierto varias instalaciones de armamento capaces de disparar artillería pesada. Sorprendentemente, no apuntan a la superficie, sino a las profundidades del espacio.\n\nFuera cual fuera el enemigo al que se enfrentaban, probablemente procedía de las estrellas."
 cstorms.2120.name: "La tempestad eterna"
 cstorms.2120.desc: "Nuestras teorías sobre la extraña fosa común que hemos encontrado en [From.Planet.GetName] no han arrojado ninguna conclusión útil. La única pista que nos quedaba era el origen de las arenas que se tragaron a este ejército.\n\nTras realizar una serie de cálculos y simulaciones inmensamente complejos, hemos determinado que la misma tormenta que trajo las arenas hasta aquí sigue causando estragos en otros lugares del planeta. Hemos enviado una pequeña fuerza de expedición a explorar.\n\nUna violenta tempestad los ha recibido, y sus brutales vientos han excavado una profunda hendidura en el suelo. Si hay respuestas, sin duda se encuentran en este abismo, justo donde habita el ojo de la tormenta."
 cstorms.2120.a: "¡Tomad todas las precauciones necesarias!"
 cstorms.2125.name: "El cuerpo"
 cstorms.2125.desc: "Llegar al lugar ha sido difícil y ha requerido suma habilidad y atención. Sin embargo, en el centro del cráter y en medio de la furiosa tormenta hemos descubierto un esqueleto de lo más inusual. Los restos son tan antiguos como los de la fosa común, aunque tanto el fenotipo como el genotipo del cuerpo son totalmente distintos a los de los cadáveres que encontramos allí.\n\nEl uniforme del esqueleto está sorprendentemente bien conservado, y presenta diferencias significativas en su diseño. También hay indicios de que algunos de los apéndices fueron eliminados deliberadamente...\n\nPero lo más curioso son las lecturas de nuestros sensores: hemos detectado fluctuaciones de energía alrededor del cuerpo y en su interior. Estas señales guardan una sorprendente similitud con las del interior de esta tormenta masiva, así como con la tormenta cósmica que originalmente destapó la fosa común.\n\nPoco a poco se ha ido formando una teoría: ¿estaba este individuo relacionado con las tormentas que hemos encontrado hasta ahora? ¿Podría incluso haber sido responsable del sepultamiento del ejército? Resulta extraño pensarlo, pero los hechos nos llevan en esa dirección."
 cstorms.2130.name: "Y al polvo una vez más"
 cstorms.2130.desc: "Al cotejar los símbolos del uniforme con nuestra base de datos hemos obtenido un resultado desconcertante: ¡el cadáver pertenece a un ciudadano de la Convención de adAkkaria! La misma civilización cuya estación de transmisión exploramos no hace mucho. Para nuestra sorpresa, el uniforme, la edad del cuerpo y la información de las transmisiones dibujan un cuadro sorprendentemente coherente. Ahora creemos que este es el mundo mencionado en esas transmisiones.\n\nCon los conocimientos lingüísticos de la estación de propaganda en la mano, [Root.GetLeaderName] ha descifrado el nombre de la víctima: §ShaToor Gailon§!.\n\nInstantes después, la tormenta que nos rodeaba aumentó rápidamente de tamaño e intensidad. Dada la naturaleza altamente impredecible del clima, permanecer aquí se volvió demasiado peligroso y nos vimos obligados a abandonar este mundo a la vorágine. El rastro de la Convención de adAkkaria ha vuelto a enfriarse."
 #Storm to Signal
 cstorms.2140.name: "Señales y tormentas"
 cstorms.2140.desc: "Las señales de energía del cuerpo alienígena y de la vorágine destructora de planetas de §Y[planet_windswept_fates.GetName]§! coinciden con las de la tormenta cósmica responsable de desenterrar al ejército sepultado. El registro de exploración ha revelado un sistema previamente explorado que alberga fluctuaciones correspondientes. ¡Son idénticas a las transmisiones de la Convención de adAkkaria!\n\nDeberíamos enviar una nave de exploración a investigar."
 #Fleets of the Trice Damned
 site_adakkaria_fleets_of_the_thrice_damned: "Flotas de los tres veces condenados"
 site_adakkaria_fleets_of_the_thrice_damned_intro: "Las extrañas fluctuaciones de energía en esta zona eclipsaban un enorme cementerio naval. Esta necrópolis de polímero y metal puede albergar las claves para comprender la Convención de adAkkaria."
 cstorms.2150.name: "Restos destrozados"
 cstorms.2150.desc: "Aquí descansan naves de todo tipo, desde embarcaciones oblongas de madera hasta arcas cristalinas de lo cósmico y lo etéreo. Muchas comparten similitudes con las imágenes que aparecen en las transmisiones y los diarios de la estación de transmisión adAkkaria.\n\nSospechamos que aquí tuvo lugar un enfrentamiento entre la flota de la Convención y la de la ComUni, la antigua fuerza de paz galáctica.\n\nY, sin embargo, aunque estas naves no pueden repararse, no parecen haber sido abandonadas por la acción de ningún arma común, ni por averías o desastres similares. Por el contrario, los cascos y los interiores parecen despedazados, como si hubieran sido atacados por una enorme trituradora."
 cstorms.2155.name: "Los límites del deber"
 cstorms.2155.desc: "Nuestros [Root.Owner.GetEngineerPlural] han recuperado cuidadosamente los bancos de datos de las naves del cementerio. Aunque gran parte ha sido devastada por el tiempo, una base de datos adAkkaria ha sobrevivido:\n\n§L- Nos han asaltado. Repito, nos han asaltado. La ComUni exige que dejemos de elevar a los primitivos Rokukora o seremos eliminados. Por favor, responded. ¡Si no nos retiramos, seremos destruidos! ¡Por favor, al menos enviad refuerzos!\n\n- Negativo. Vuestro sacrificio será recordado.§!"
 cstorms.2155.a: "¡Antepusieron el deber a la vida!"
 cstorms.2160.name: "Restos que examinar"
 cstorms.2160.desc: "Mientras nuestros [Root.Owner.GetLinguists] transcribían las nuevas transmisiones, hemos realizado otro asombroso descubrimiento: ¡un cuerpo congelado que flotaba en el centro del cementerio!\n\nAunque gran parte del cadáver se ha descompuesto, su atuendo es el de un oficial de la Convención.\n\nCuriosamente, una corona de pequeños restos orbitaba alrededor del cuerpo, como si este ejerciera algún tipo de atracción gravitacional sobre ellos. Los restos han sido trasladados a bordo para su posterior análisis."
 cstorms.2165.name: "Los muertos hablan"
 cstorms.2165.desc.intro: "La traducción de la etiqueta identificativa del cadáver congelado ha revelado que se trataba de un miembro de adAkkaria llamado §SalAtta Landeer§!. Al igual que el cadáver encontrado en [planet_windswept_fates.GetName], varios de sus apéndices habían sido extirpados quirúrgicamente antes de morir. Sin embargo, en este caso, el cuerpo de alAtta Landeer también está muy quemado. Especialmente su torso, que muestra señales de daño por calor extremo, así como una lenta, y seguramente dolorosa, recuperación.\n\nNuestros [Root.Owner.GetScientist] han llegado a la desafortunada conclusión de que estas heridas guardan inquietantes similitudes con los métodos [Root.Owner.GetPreFTLLowerPlural] de extracción de información de sujetos involuntarios. ¿Era un veterano de guerra o le ocurrió algo más siniestro?"
 cstorms.2165.desc.def: "$cstorms.2165.desc.intro$\n\nNada más identificar la naturaleza de estas heridas, los instrumentos de nuestra nave experimentaron una repentina y aguda subida de tensión y [Root.GetLeaderName] empezó a gritar.\n\nMás tarde, [Root.GetLeaderName] ha descrito la experiencia como una intensa luz abrasadora seguida de una oleada de dolor devastador. Era como si algo intentara abrir su mente desde el interior..."
 cstorms.2165.desc.psio: "$cstorms.2165.desc.intro$\n\nNada más identificar la naturaleza de estas heridas, los instrumentos de nuestra nave experimentaron una repentina y aguda subida de tensión y los miembros de la tripulación con capacidades psiónicas comenzaron a gritar.\n\nMás tarde, han descrito la experiencia como un momento de claridad suprema, seguido de una oleada tras otra de ira desgarradora. [Root.GetLeaderName] ha declarado que, bajo esa ira, se ocultaba una horrible sorpresa y un profundo sentimiento de traición. Llegó el pensamiento singular: §L¡Me han invocado!§!"
 cstorms.2165.desc.psio_robot: "$cstorms.2165.desc.intro$\n\nNada más identificar la naturaleza de estas heridas, los instrumentos de nuestra nave experimentaron una repentina y aguda subida de tensión, y nuestras unidades equipadas experimentaron picos de energía.\n\nMás tarde, hubo un momento en que los procesadores psiónicos alertaron de un peligro extremo. [Root.GetLeaderName] ha declarado que la respuesta emocional llegó junto a un pensamiento singular que se transcribió de esta forma: §L¡Me han invocado!§!"
 cstorms.2165.desc.gestalt: "$cstorms.2165.desc.intro$\n\nTras este descubrimiento, los bancos de datos de nuestra tripulación quedaron corrompidos por una fuerza imposible de rastrear. Varios [controller.GetIndividualNamePlural] recordaron haber experimentado una breve y debilitante subida de tensión, mientras que otros fueron expuestos a imágenes codificadas e inconexas que provocaron que sus moduladores de voz emitieran un sonido penetrante a más de 120 decibelios."
 cstorms.2165.a: "-- Señal perdida --"
 cstorms.2170.name: "El legado de Landeer"
 cstorms.2170.desc.def: "Nada más restablecer la comunicación con la nave científica §Y[Root.GetFleetName]§!, escuchamos los gritos de su tripulación. Mucho más tarde, una vez restablecida una calma relativa, descubrimos que los gritos procedían del cuerpo alienígena que habían subido a bordo.\n\nAdemás, el cadáver estaba ejerciendo un extraño poder sobre sus mentes. Pequeños objetos se elevaron en el aire y comenzaron a orbitar alrededor del cuerpo. Varias secciones de las paredes interiores se deformaron y se rasgaron por la presión.\n\n§Y[Root.GetLeaderName]§! consiguió despertar de su estado catatónico justo a tiempo para expulsar el cadáver de la nave. Gracias a su rápida reacción, la nave científica pudo escapar de la repentina aparición de una tormenta cósmica. De no haber sido así, el cementerio habría dado la bienvenida a una nueva nave.\n\nMientras [Root.GetLeaderName] relataba su experiencia, observó algo más: fuera cual fuera la fuente del extraño poder del cadáver, también provocó la formación de un patrón muy particular en las pantallas de mando de la nave. ¿Se trataba de un intento de comunicación? ¿Un grito de ultratumba?\n\nPor ahora, no tenemos respuestas."
 cstorms.2170.desc.gestalt: "Las imágenes codificadas que corrompían algunos de nuestros [controller.GetIndividualNamePlural] de exploración fueron decodificadas. Formaban la imagen de un antiguo hábitat. Los [controller.GetScientistCapital] se vieron acosados por la visión y el sonido de un individuo sometido a un tratamiento cada vez más cruel. Su cuerpo estaba quemado, sus órganos cocidos.\n\nAlgunos [controller.GetIndividualNamePlural] lograron escapar del asalto audiovisual. Afirmaron que varios objetos pequeños empezaron a flotar en órbita cercana al cuerpo. Los restos orgánicos habían desarrollado de algún modo su propio campo gravitatorio.\n\nEsta fuerza desconocida creció en intensidad hasta que algunas secciones de las paredes interiores se deformaron y se desgarraron por la presión. Fue entonces cuando nuestros sistemas de seguridad volvieron a funcionar y el cuerpo fue arrojado al espacio.\n\nPoco después, se desató una tormenta cósmica en el sistema. Nuestra nave logró salir intacta a duras penas.\n\nLo ocurrido ha suscitado más preguntas que respuestas."
 #Special Project: Assembling the Past
 cstorms.2180.name: "Reconstruir el pasado"
 cstorms.2180.desc: "Tras la experiencia de [FromFrom.Leader.GetName] en el sistema §Y[planet_assembling_the_past.System.GetName]§!, nuestros científicos están aún más motivados para descubrir qué ocurrió exactamente con la Convención de adAkkaria. Los datos que recopilamos durante nuestra exploración de [planet_windswept_fates.GetName] y el cementerio de flotillas nos han revelado que la galaxia estaba plagada de estaciones de propaganda adAkkaria.\n\nEs más, tras una serie de largas discusiones, ¡también sospechan que el patrón observado en el fallo de [Root.GetName] eran indicaciones para dirigirse un sistema no descubierto hasta ahora!\n\nSe ha creado un proyecto especial para investigar este nuevo sistema."
 project_adakkaria_tracing_history: "Rastrear la historia"
 project_adakkaria_tracing_history_DESC: "Las coordenadas corresponden a un planeta del sistema [planet_assembling_the_past.System.GetName]. Deberíamos enviar una nave de exploración para investigar qué relevancia puede haber tenido este planeta para la Convención de adAkkaria."
 NAME_adSalivul: "adSalivul"
 NAME_Patriotic_Institute_of_Exalted_Benevolence: "Benevolencia exaltada"
 cstorms.2185.name: "El antiguo hábitat"
 cstorms.2185.desc: "Al principio temimos que nuestra investigación sobre el sistema [From.solar_system.GetName] nos hubiera conducido a un callejón sin salida. Las indicaciones apuntaban a un planeta que soportaba campos magnéticos inestables de tal gravedad que su paisaje estaba prácticamente arrasado. Era poco probable que algo de valor pudiera sobrevivir a semejantes condiciones.\n\nSin embargo, orbitando el planeta hemos encontrado un antiguo hábitat arquitectónicamente similar a la estación de transmisión adAkkaria. Aunque estaba herméticamente cerrado desde el exterior, hemos podido generar una señal de entrada a partir de la información recuperada de las bases de datos de adAkkaria.\n\nHan pasado eones desde la última vez que alguien entró en esta estación. No hay forma de saber lo que aguarda en su interior."
 cstorms.2185.a: "Actuemos con precaución."
 #The Patriotic Institute of Exalted Benevolence
 site_adakkaria_the_patriotic_institute: "Instituto de la Benevolencia Exaltada"
 site_adakkaria_the_patriotic_institute_intro: "Este antiguo hábitat, que orbita alrededor de un planeta desolado, fue construido por la Convención de adAkkaria. Los materiales de alta calidad utilizados en su construcción han permitido que la estación se encuentre en un estado casi impecable.\n\nAl sintonizar la frecuencia de transmisión, captamos un único mensaje, seguido de un rimbombante soniquete: §LBienvenidos al Instituto Patriótico de la Benevolencia Exaltada§!."
 cstorms.2200.name: "Entrar en la benevolencia"
 cstorms.2200.desc: "Tras la esclusa de aire se extendía una pequeña red de túneles. Por fin llegamos a una enorme plaza iluminada por luz artificial. Extrañamente, la arquitectura del hábitat se asemejaba más a la de los suburbios de algunos mundos residenciales que a la de una prestigiosa estación científica. El hábitat fue construido para albergar complejos enteros de apartamentos, centros comerciales y escuelas, pero también jardines de recreo, parques y otras instalaciones. Se trataba de un lugar diseñado para llevar una vida llena de lujos.\n\nSin embargo, ahora está totalmente abandonado. No se ha detectado ni una sola forma de vida orgánica en todo el hábitat. Mientras seguíamos explorando, nos sorprendió el vacío de este lugar y la lúgubre frialdad de su atmósfera.\n\nLa luz solar artificial sufre fallos ocasionales que cubren la estación de oscuridad y, aunque otros dispositivos electrónicos siguen funcionando en gran medida, también se ven afectados por estas mismas interrupciones. Pero lo más curioso es la red de dispositivos de vigilancia que se encuentra dentro de los apartamentos del hábitat. Parece que todos los ciudadanos estaban bajo estricta supervisión. Encontrar una estación de seguridad de algún tipo podría proporcionar más información."
 cstorms.2205.name: "Fallos eléctricos"
 cstorms.2205.desc.intro: "Llevó muchos días recorrer y catalogar la ciudad a bordo de la estación y descubrir su aparato de vigilancia. La estación de seguridad resultó estar completamente separada del resto del hábitat y requería un código de entrada diferente.\n\nAllí encontramos filas y filas de monitores, todavía conectados a los aparatos de vigilancia masiva. Los que aún funcionaban nos mostraban todos los rincones de la estación, aunque también estaban afectados por fallos eléctricos."
 cstorms.2205.desc.mach: "$cstorms.2205.desc.intro$\n\nNuestros drones manifestaron su preocupación al presenciar las interferencias, ya que les recordaron su anterior encuentro con la Convención de adAkkaria en el antiguo cementerio naval.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.def: "$cstorms.2205.desc.intro$\n\n[Root.GetLeaderName] declaró haber sentido malestar al presenciar los disturbios, ya que le recordaron nuestro anterior encuentro con la Convención de adAkkaria en el cementerio naval.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.outro: "Pero lo más inquietante fue descubrir el centro de seguridad central: según los alarmantes mensajes mostrados en las pantallas, ¡este hábitat estaba a punto de autodestruirse!\n\nNuestros [Root.Owner.GetEngineerPlural] dedujeron que las averías que asolaban la ciudad habían impedido que se ejecutara el comando. Desactivamos rápidamente la rutina de autodestrucción y pusimos a nuestros [Root.Owner.GetLinguists] a descifrar cualquier registro que pudiéramos recuperar. Curiosamente, los informes de la estación cesaron casi un año antes que los últimos registros recuperados de la estación de propaganda."
 cstorms.2210.name: "Indagaciones exaltadas"
 cstorms.2210.desc: "Nuestros [Root.Owner.GetLinguists] no tardaron en descubrir el propósito del hábitat que orbita [From.Planet.GetName]: los registros y mensajes, tanto de los ciudadanos como del personal, describen investigaciones sobre los poderes psiónicos recién surgidos en los ciudadanos de adAkkaria. Todos los que vivían aquí recibieron invitaciones del \"exaltado liderazgo\" de la Convención para disfrutar de una vida de lujo y autoexpresión a bordo del hábitat. A cambio, aceptaron participar en los experimentos de la estación.\n\nLa mayoría de los ciudadanos se mostraron dispuestos a participar en el programa. Los registros de seguridad indican que muchos eran veteranos de guerra discapacitados. Se les prometió atención, asistencia financiera e indultos por cualquier problema legal pendiente que pudieran tener.\n\nAdemás, la lista de personal de la estación contenía un nombre muy familiar: §SalAtta Landeer§!, científico y veterano discapacitado, cuyo cuerpo amputado recuperamos en el cementerio naval."
 cstorms.2210.a: "Por fin hay avances."
 cstorms.2215.name: "Unas palabras de nuestros sujetos"
 cstorms.2215.desc: "Hemos descifrado uno de los últimos mensajes enviados desde el hábitat:\n\n§gMensaje - Fecha 02100363 - Remitente: §SsiDani Itempeer§! - Destinatario: siZul Itempeer§!\n§L¡Hola! ¡Sigo vivo! Perdón por los retrasos. Desde entonces..., el hábitat se comporta de forma extraña, así que enviar mensajes ha sido difícil. Dicen que no tiene nada que ver con eso, pero creemos que, después de todo, estaba dotado psiónicamente. En cuanto a mí, ya te dije que no estaba llegando a ninguna parte, con todo lo anterior... Así que sugirieron probar algo más radical: ... tormentas cósmicas. Sé lo que estás pensando, pero es solo un dedo y tal vez incluso vuelva a crecer. ¡Pero las sensaciones que he desbloqueado cuando...!\nCon cariño, siDani\n- TRANSMISIÓN§! §YCENSURADA (Si tienes alguna pregunta, habla con tu supervisor)§!\n\n§gMensaje - Fecha 02100365 - Remitente: §ShaToor Gailon§! - Destinatario: aeDal Asduur§!§L\nQuerido aeDal:\nLa vida me trata bien. He conocido a otros veteranos. No hablamos. Pero todos lo sabemos. Es agradable no tener que hablar.\nHoy solo he tenido que pensar en levantar una taza, y lo he conseguido. Sigo echando de menos mi apéndice derecho, pero quizá esta nueva vida no sea tan mala como me temía. Los he oído hablar de enviarme a... Aparentemente soy un prodigio psiónico... Quiero... ser movilizado de nuevo.\nEspero estar en casa para el Día de los Patriotas. A ver si nos vemos.\nUn saludo, haToor\n- TRANSMISIÓN§! §YCENSURADA (Si tienes alguna pregunta, habla con tu supervisor)§!\n\n§gMensaje - Fecha 02100367 - Remitente: §SenRida Direen§! - Destinatario: onRida Direen§!\n§L¡HE EXTINGUIDO UN FUEGO CON MI MENTE!\nUno de los otros sujetos se puso histérico por alguna razón y provocó un incendio en el comedor. Todo el mundo entró en pánico, pero no podíamos ir a ninguna parte. Yo también me asusté mucho, pero, entonces, algo pasó dentro de mí y ¡lo hice desaparecer!\n¡SALVÉ A TODO EL MUNDO! Diles a los ancianos que no soy un caso perdido.\n- TRANSMISIÓN§! §RBLOQUEADA (INFORMA A TU SUPERVISOR INMEDIATAMENTE)§!\n\nLa segunda transmisión es notable: el cuerpo de §ShaToor Gailon§! fue descubierto durante nuestra misión arqueológica en el mundo de los [Root.Owner.GetPreFTLLowerPlural]."
 cstorms.2215.a: "¡Excelente trabajo!"
 cstorms.2220.name: "Las consecuencias de las averías"
 cstorms.2220.desc: "Estos mensajes están fechados unos días antes de la evacuación del hábitat:\n\n§gMensaje - Fecha 02100359 - Remitente: Doctor supremo - Destinatario: Venerado almirante§!\n§LSu último mensaje causó cierta inquietud aquí. ¿Sería tan amable de explicarnos por qué, después de apoyarnos durante todos estos años sin rechistar, de repente amenaza con cerrarnos?\n- TRANSMISIÓN§! §GENVIADA§!\n\n§gMensaje - Fecha 02100360 - Remitente: Venerado almirante - Destinatario: Doctor supremo§!\n§LTiene que ser una broma. Llevamos meses enviándoles avisos, pero supongo que orbitar un mundo caprichoso debe de haberles causado una conveniente amnesia. Es consciente de que la ComUni está amenazando nuestra existencia, ¿verdad? Y, con esta guerra en marcha, ya no puedo justificar los exorbitantes recursos que cuesta que sus sujetos se pasen el día mirando al ganado. Necesito resultados tangibles y aplicables. AHORA.\n- TRANSMISIÓN§! §GRECIBIDA§!\n\n§gMensaje - Fecha 02100360 - Remitente: Doctor supremo - Destinatario: Venerado almirante§!\n§LPerdónenos, pero no recibimos sus mensajes anteriores. Nuestra estación ha sufrido problemas técnicos, y deben de haber afectado a nuestras transmisiones también. En cualquier caso, necesitamos más tiempo. Tenemos procesos y protocolos en marcha, ¡no podemos abandonarlos!\n- TRANSMISIÓN§! §GENVIADA§!\n\n§gMensaje - Fecha 02100361 - Remitente: Venerado almirante - Destinatario: Doctor supremo§!\n§LDispone de una semana o procederemos al cierre inmediato. Sin peros, sin segundas oportunidades. ¡RESULTADOS!\n- TRANSMISIÓN§! §GRECIBIDA§!\n\n§gMensaje - Fecha 02100368 - Remitente: Doctor supremo - Destinatario: Venerado almirante§!\n§LAdjunto encontrará un informe de nuestros logros recientes. Estos vídeos prueban que las tormentas cósmicas pueden ser influenciadas por nuestros sujetos dotados psiónicamente. Esto podría tener asombrosas aplicaciones militares. Con tiempo suficiente, podemos sobrecargar su expresión psiónica sin tener que someterlos a traumas físicos y mentales.\n- TRANSMISIÓN§! §RFALLIDA (Causa: Corrupción de la matriz de transmisión)§!"
 cstorms.2220.a: "El último mensaje nunca llegó a enviarse."
 cstorms.2225.name: "Destino incompleto"
 cstorms.2225.desc: "Este es el último mensaje recuperado:§L\n\nEstimados compañeros:\n\nMe dirijo a vosotros con el corazón encogido. El Mando Exaltado ha decidido cesar todas las operaciones dentro del Instituto Patriótico de la Benevolencia Exaltada.\n\nEsto no debe tomarse como una crítica contra vosotros o contra el trabajo que hemos realizado aquí. Ha sido un honor servir con todos y cada uno de vosotros. Sé que tendréis muchas preguntas, pero, en resumen, las expectativas del Mando Exaltado no se ajustaban a nuestros objetivos de investigación.\n\nEn cuanto a nuestros ciudadanos, el Mando Exaltado los ha invitado a unirse al programa del $building_adakkaria_patriotic_institute$ en adSul. A continuación, encontraréis una lista completa del personal. Por favor, informad a vuestros subordinados como corresponde.\n\nEn cuanto a los demás... Lamentablemente, la naturaleza secreta de nuestra investigación impide que los participantes puedan regresar a la sociedad. El Mando Exaltado ha prometido enviarnos una unidad especial para ocuparse de ellos. No tendréis que encargaros vosotros mismos, lo que, en cierto modo, es una bendición. Sus familiares serán compensados con creces.\n\nFirmado:\nDoctor supremo §!§SalAtta Landeer§!\n\nLa lista adjunta, aunque está parcialmente dañada, menciona a los sujetos §ShaToor Gailon§! y §SenRida Direen§!. Parece que fueron transferidos a la capital de la Convención de adAkkaria, adSul. Las coordenadas de este mundo están ahora en nuestro poder."
 cstorms.2225.a: "Poned rumbo al mundo natal de la Convención."
 #Special Project: Eye of the Convention / The Void Calls
 cstorms.2240.name: "El ojo de la Convención"
 cstorms.2240.desc: "Las coordenadas han revelado un sistema hasta ahora oculto a nuestros escáneres. Ha llegado el momento de visitar la Convención de adAkkaria antes de que lo hagan otros.\n\nSe ha aprobado un nuevo proyecto especial."
 cstorms.2245.name: "La llamada del vacío"
 cstorms.2245.desc: "Apenas unos instantes después de abandonar el hábitat, [event_target:leader_patriotic_institute.GetName] tomó una decisión abrupta y sorprendente. Como si estuviera bajo el influjo de una fuerza exterior, ordenó a la nave abrir un canal de comunicación en una frecuencia típicamente asociada a eventos psiónicos masivos o al paso de una tormenta cósmica evanescente.\n\nEl canal fue dirigido a las mismas coordenadas que el sistema natal de la Convención de adAkkaria. Nuestros saludos tardaron solo un instante en ser respondidos."
 cstorms.2245.desc.gestalt: "Momentos después de abandonar el hábitat, la consciencia de nuestro grupo se vio perturbada por una vibración inusual, como si algo intentara comunicarse con nosotros a gran distancia. La señal procedía de las mismas coordenadas que el sistema natal de la Convención de adAkkaria, y se emitía en una frecuencia típicamente asociada a acontecimientos psiónicos masivos o al paso de una tormenta cósmica evanescente.\n\nNuestra llamada de respuesta fue atendida al instante."
 cstorms.2250.name: "La llamada de la tormenta"
 cstorms.2250.desc: "Hemos hecho todo lo posible, pero llegar a adSul ha resultado ser un reto mucho mayor de lo previsto. Todo el sistema está envuelto por una tormenta cósmica de composición desconocida, lo que nos impide acercarnos al planeta.\n\nLa tormenta parece estar llamándonos..."
 #The Storm
 cstorms.2260.name: "La tormenta"
 cstorms.2260.desc: "DECID NUESTROS NOMBRES\n\nDECID NUESTROS NOMBRES\n\nDECID | NUESTROS | NOMBRES"
 cstorms.2260.a: "¿Quiénes sois?"
 cstorms.2260.b: "¿Qué ha pasado aquí?"
 cstorms.2260.c: "¿Nombres?"
 cstorms.2260.a.resp: "SER | NO SER | DEJAR DE SER\n\nRUGIENTE TEMPESTAD Y FURIA\n\nDOLOR Y RABIA Y PENA Y MIEDO\n\nDECID NUESTROS NOMBRES"
 cstorms.2260.b.resp: "PROVOCAR | EVOCAR | INVOCAR\n\nDECID NUESTROS NOMBRES"
 cstorms.2265.name: "$cstorms.2260.name$"
 cstorms.2265.desc: "NO PODEMOS PENSAR | HABLAR | DESEAR | SOÑAR\n\nNUESTROS NOMBRES NOS INVOCAN | DEVOLVEDNOS A NOSOTROS MISMOS | HEMOS SIDO OLVIDADOS\n\nDECID NUESTROS NOMBRES"
 cstorms.2265.c.resp: "$cstorms.2265.desc$"
 cstorms.2265.d: "¿Dónde podemos encontrar vuestros nombres?"
 cstorms.2265.e: "Mostradnos esta celebración."
 cstorms.2270.name: "$cstorms.2260.name$"
 cstorms.2270.desc: "ES UNA CELEBRACIÓN\n\nES UNA CELEBRACIÓN\n\nDOLOR | RABIA | PENA | MIEDO\n\nCELEBRACIÓN\n\nDECID NUESTROS NOMBRES"
 NAME_adSul: "adSul"
 project_adakkaria_benevolent_grounds: "Tierras benévolas"
 project_adakkaria_benevolent_grounds_DESC: "Hemos recuperado las coordenadas del planeta natal de la Convención de adAkkaria.\n\nExplorar el sistema y el planeta podría revelar finalmente el destino de la civilización adAkkaria."
 #Celebration
 site_adakkaria_celebration: "Celebración"
 site_adakkaria_celebration_intro: "Tras la comunicación con la tormenta cósmica, hemos podido ver una pequeña parte de AdSul. Entre las nubes restantes se alza un enorme complejo. Abandonado, pero extrañamente inalterado por los eones; los escáneres revelan material orgánico en su interior.\n\nAnte el inmenso edificio se alzan una serie de pancartas con una sola proclama: Es hora de celebrar."
 cstorms.2285.name: "Nihilismo forzoso"
 cstorms.2285.desc: "Los vacíos salones del instituto no contienen más que el polvo acumulado de los siglos. Los carteles de propaganda, siempre exaltando el valor de la Convención de adAkkaria, son todo lo que queda de este imperio antaño próspero y temido.\n\nSin embargo, nuestros esfuerzos lingüísticos han dado sus frutos; el ordenador central ha entregado sus secretos con facilidad.\n\nLos registros que hemos recuperado bullen de actividad hasta la última de las emisiones de la estación de propaganda.\n\nEn esa fecha, la Convención de Benevolencia de adAkkaria simplemente dejó de existir."
 cstorms.2290.name: "Descenso al planeta maldito"
 cstorms.2290.desc: "Nos adentramos en los niveles subterráneos del complejo con una pizca de temor y curiosidad. Nos recibió una extensa red de laboratorios cuidadosamente planificada. Nuestra unidad se dividió en dos: una mitad fue enviada a investigar los laboratorios para conocer mejor el propósito de Celebración. La otra continuó su descenso.\n\nNuestros escáneres confirmaron la presencia de material orgánico, y no tardamos en descubrir por qué: los niveles inferiores de Celebración están dedicados exclusivamente a celdas de observación. Los restos momificados de los ciudadanos de adAkkaria siguen encerrados en estos estrechos compartimentos. Una interfaz digital junto a cada cámara mostraba el nombre de cada ocupante, la fase del juicio a la que estaban sometidos y las notas de los observadores.\n\nMientras tanto, recuperamos el siguiente mensaje:\n§LNuestro ensayo en el sistema Haliios fue un desastre total y absoluto. El despliegue inicial del sujeto conocido como §ShaToor Gailon§! transcurrió según lo previsto. En cuanto nos enfrentamos a las fuerzas bárbaras Solphani, el sujeto perdió el control. Mientras la tempestad aniquilaba a los ejércitos primitivos, los nuestros también fueron diezmados.\n\nHay que entender que, por encima de todo, estos sujetos son viles y están trastornados. Cuanto antes se conecte el Invocador, mejor.§!"
 cstorms.2290.a: "¿Qué están haciendo aquí?"
 cstorms.2290.a.gen: "Cuánta muerte... Qué inspirador."
 cstorms.2295.name: "Una especie de celebración"
 cstorms.2295.desc.start.authgen: "Los experimentos llevados a cabo por la Convención de adAkkaria eran fascinantes. A cada prisionero se le asignaba una fase y, a medida que aumentaban las fases, también lo hacía la brutalidad del tratamiento. Destacan algunos métodos especialmente innovadores: la utilización de fuego y electricidad para poner en marcha la acumulación psiónica del cuerpo; la extirpación de órganos esenciales para provocar poderes embrionarios y el uso de otros sentidos; y la aplicación de sustancias que alteran la mente para invocar un estado cercano a la muerte.\n\nCiertamente, podemos inspirarnos en ellos. Estos expertos se esforzaban por alcanzar un objetivo encomiable: el advenimiento de la supremacía adAkkariana en la galaxia.\n\nSin embargo, los informes indican que puede que no fuera este tratamiento lo que mató a los sujetos. Al igual que en el caso de §ShaToor Gailon§!, parece que muchos simplemente se dieron por vencidos."
 cstorms.2295.desc.start.default: "El pavor y la confusión que experimentamos al presenciar los restos de las víctimas fueron sobrecogedores. Pero también lo es nuestro deseo de comprender el alcance y la finalidad de los experimentos de la Convención.\n\nEn un tono descarnado y estéril, los científicos adAkkarianos informaban de lo que les habían hecho a estos sujetos. A cada víctima se le asignaba una fase y, a medida que aumentaban las fases, también lo hacía la brutalidad de su tratamiento. Fuego, electricidad, mutilaciones, privación de sentidos y sustento... Nada era demasiado cruel. Todo por el bien de la gloriosa misión de mantener la supremacía adAkkariana en la galaxia. Aun así, los informes indican que es posible que estas obscenidades no acabaran con los sujetos. Al igual que con §ShaToor Gailon§!, muchos parecían simplemente haberse dado por vencidos."
 cstorms.2295.desc.end.default: "Instantes después de nuestras observaciones, [Root.GetLeaderName] se desplomó. ¡Entre lamentos de dolor, gritó que algo le estaba abriendo la mente!\n\nAunque se mantiene estable por ahora, parece como si alguna entidad invasora hubiera intentado inculcarle una profunda revelación. [Root.GetLeaderName] quiere volver a intentarlo, ya que cree que la experiencia podría tener una importante repercusión."
 cstorms.2295.desc.end.psionic: "Mientras observaba estos cuerpos, [Root.GetLeaderName] empezó a oír extraños susurros, una voz incorpórea que repetía con gran anhelo:\n§LÉramos leales. Alabábamos la Convención y creíamos en su misión.\nLas tormentas seguían llamándonos. Nos envolvían, ¡nos deseaban!\nHicimos lo que nos pidieron. Éramos talentosos y tenaces.\n¡Nos llaman malvados, nos llaman traidores, matan a nuestros amigos!\n\nSE SUPONÍA QUE ESTO IBA A SER UNA CELEBRACIÓN§!\n\nLos susurros nos condujeron a un pasillo con la etiqueta \"La fase final\". Pero las medidas de seguridad, más avanzadas, no permitían el acceso."
 cstorms.2295.desc.end.psionic_individual_robot: "Mientras analizaba estos cuerpos, [Root.GetLeaderName] empezó a detectar una transmisión psiónica entendible:\n§LÉramos leales. Alabábamos la Convención y creíamos en su misión.\nLas tormentas seguían llamándonos. Nos envolvían, ¡nos deseaban!\nHicimos lo que nos pidieron. Éramos talentosos y tenaces.\n¡Nos llaman malvados, nos llaman traidores, matan a nuestros amigos!\n\nSE SUPONÍA QUE ESTO IBA A SER UNA CELEBRACIÓN§!\n\nLa transmisión nos condujo a un pasillo con la etiqueta \"La fase final\". Pero las medidas de seguridad, más avanzadas, no permitían el acceso."
 cstorms.2295.desc.end.psionic_gestalt: "Mientras inspeccionábamos los cuerpos, una nueva voz resonó en el colectivo, canalizando a [Root.GetLeaderName] como medio de comunicación:\n§LÉramos leales. Alabábamos la Convención y creíamos en su misión.\nLas tormentas seguían llamándonos. Nos envolvían, ¡nos deseaban!\nHicimos lo que nos pidieron. Éramos talentosos y tenaces.\n¡Nos llaman malvados, nos llaman traidores, matan a nuestros amigos!\n\nSE SUPONÍA QUE ESTO IBA A SER UNA CELEBRACIÓN§!\n\nLa voz nos condujo a un pasillo con la etiqueta \"La fase final\". Pero las medidas de seguridad, más avanzadas, no permitían el acceso."
 cstorms.2295.desc.end.gestalt: "Se produjeron más distorsiones extrañas en los procesos cognitivos de nuestros [controller.GetIndividualNamePlural], suscitando pensamientos que no eran los nuestros. A través de ellos, nos enteramos de que los sujetos de prueba del instituto hablaban entre sí a través de medios no físicos, una transmisión casi instantánea similar a una mente colmena incipiente.\n\nAunque no pudimos descifrar el texto exacto, el propósito de la discusión estaba claro: se estaba gestando una revuelta dentro de Celebración."
