 gravity_storm_aftermath_modifier_severity_desc: "Aunque las fluctuaciones gravitatorias que han sucedido a la $gravity_storm$ dificultan la edificación, han proporcionado conocimientos muy valiosos sobre la gravedad y el espacio-tiempo."
