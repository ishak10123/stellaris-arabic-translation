 #Magnetized Planetary Core
 pm_magnetized_planetary_core: "Núcleo planetario de gran magnetismo"
 pm_magnetized_planetary_core_desc: "La actividad electromagnética del manto profundo permite la minería magnética, aunque también sabotea las infraestructuras técnicas."
 cstorms.1705.name: "$pm_magnetized_planetary_core$"
 cstorms.1705.desc: "Se ha informado de unos efectos inusuales en [this.GetName] tras la última §Y$magnetic_storm$§!. Los potentes campos de energía de la tormenta han aumentado la inestabilidad magnética del núcleo fundido del planeta, provocando un fallo general en las infraestructuras tecnológicas.\n\nSin embargo, esta situación también supone una oportunidad única para extraer recursos. Por debajo del manto del planeta fluye una lava rica en metales y carga electromagnética que puede recolectarse con la ayuda de imanes de minería."
 #Electrified Oceans
 d_electrified_oceans: "Océanos electrificados"
 d_electrified_oceans_desc: "Una corriente eléctrica constante atraviesa el vasto océano del planeta."
 GLACIAL_OCEANS: "océanos subglaciales"
 DEFAULT_OCEANS: "océanos"
 cstorms.1715.name: "$d_electrified_oceans$"
 cstorms.1715.desc.common: "Tras la última §Y$electric_storm$§!, se ha apreciado un fenómeno inusual en [this.GetName]. El planeta se ha cargado con una corriente eléctrica que circula constantemente por sus [GetOceansState], lo que supone un peligro mortal para la vida acuática."
 cstorms.1715.desc.aquatic: "Esto amenaza gravemente las opciones de supervivencia de nuestra colonia. Hay que ponerle solución cuanto antes."
 cstorms.1715.desc.non_aquatic: "Este fenómeno no nos perjudica directamente, pero dificulta el futuro desarrollo de nuestra colonia."
 cstorms.1715.a: "Descargad la corriente."
 cstorms.1715.b: "Que aprendan a vivir con ello."
 #Ghostly Apparitions
 d_ghostly_canyon: "Cañón fantasmal"
 d_ghostly_canyon_desc: "Los visitantes de este cañón han avistado unas apariciones etéreas."
 cstorms.1725.name: "Apariciones fantasmales"
 cstorms.1725.desc.common: "A tenor de la última §Y$shroud_storm$§! en [this.solar_system.GetName], los [owner.GetColonistPlural] informan de inexplicables avistamientos de apariciones etéreas en un recóndito cañón. Estas fantasmales figuras azules aparecen brevemente, y no pueden —o no quieren— interactuar con nuestros [owner.GetColonistPlural], limitándose a vagar sin rumbo para después esfumarse."
 cstorms.1725.desc.psionic: "Si bien las apariciones parecen ser de naturaleza psiónica, no hemos podido establecer ningún tipo de comunicación mental con estas entidades. Eso sí, hemos descubierto que su presencia refuerza de forma pasiva nuestras capacidades telepáticas."
 cstorms.1725.desc.psionic_robot: "Si bien las apariciones parecen ser de naturaleza psiónica, no hemos podido establecer ningún tipo de comunicación psiónica con estas entidades. Eso sí, las comprobaciones del sistema nos confirman que su presencia refuerza de forma pasiva nuestras capacidades telepáticas."
 cstorms.1725.desc.spiritualist: "Este impresionante fenómeno es un bonito recordatorio de las intangibles maravillas de nuestra existencia."
 cstorms.1725.desc.gestalt: "Por ahora, no hay constancia de una actitud perjudicial u hostil."
 cstorms.1725.desc.default: "Por el momento, no hay constancia de daños físicos. Por otra parte, el extraño fenómeno resulta ser una distracción de lo más inquietante."
 cstorms.1725.a: "Llenemos el cañón de tierra. Los muertos deben seguir enterrados."
 #Volcanic Inactivity
 cstorms.1735.name: "Inactividad volcánica"
 cstorms.1735.desc: "La radiación residual de la última §Y[this.GetAffectedStormType]§! ha provocado una actividad geológica errática en §H[this.GetName]§!.\n\nY, lo que es más, el impacto de la tormenta ha extinguido toda actividad volcánica, privándole de su principal reclamo geológico y cortando el suministro de magma.\n\nEstos cambios brindan nuevas oportunidades para seguir desarrollando el planeta, mientras que el magma enfriado da lugar a nuevas tierras."
 #Mountain in the Sky
 d_sky_mountain: "Montañas en el cielo"
 d_sky_mountain_desc: "Una colosal cordillera se halla suspendida en el fino aire de la atmósfera superior del planeta, revelando nuevos yacimientos de minerales."
 unlocks_zone_minerals_physics: "$t$Desbloquea la especialización de distrito: §Y$zone_minerals_physics$§!"
 cstorms.1745.name: "$d_sky_mountain$"
 cstorms.1745.desc: "Una fuerte §Y$gravity_storm$§! ha transformado extraordinariamente el paisaje de §H[this.GetName]§!. Las potentes fluctuaciones gravitacionales de la tormenta han dividido la cordillera más grande del planeta por su placa tectónica, elevándola verticalmente sobre la superficie.\n\nEn este instante, permanece suspendida en la atmósfera superior a causa de un efecto gravitatorio residual de la tormenta. Esta notoria turbulencia ha expuesto reservas de minerales en el lecho rocoso, además de proporcionar multitud de datos para que los [owner.GetResearchers] los analicen."
 #Melting Glaciers
 cstorms.1755.name: "Deshielo de glaciares"
 cstorms.1755.desc.common: "La reciente §Y[this.GetAffectedStormType]§! ha tenido un impacto sorprendente sobre el clima de [this.GetName]."
 cstorms.1755.desc.electric: "La mayor carga eléctrica de la atmósfera ha producido un cambio repentino en las temperaturas de la región polar, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.particle: "El efecto corrosivo de las partículas de la tormenta ha afectado significativamente las regiones polares, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.gravity: "Las alteraciones gravitacionales provocadas por la tormenta han quebrantado varias capas de hielo subacuático, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.magnetic: "Las consiguientes perturbaciones en los campos magnéticos de los planetas han producido movimientos sísmicos repentinos, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.solar: "El calor extremo de la tormenta ha elevado las temperaturas en todo el planeta durante el transcurso de la misma, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.celestial: "Las enormes concentraciones de polvo celestial sobrecalentado han afectado enormemente a las regiones polares, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.common_2: "lo que ha provocado el deshielo de la tundra helada, que antes nos era inaccesible.\n\nEste territorio recién descubierto está listo para ser desarrollado."
 #Dusty Drink
 cstorms.1761.name: "Obstrucción cósmica"
 cstorms.1761.desc.common: "Nuestros [Owner.GetEngineerPlural] en §H[this.GetName]§! informan que la §Y$celestial_storm$§! está produciendo efectos adversos en los sistemas de filtrado de agua. La acumulación de partículas en el agua subterránea del planeta está formando un lodo de minerales que obstruyen puntos clave en las infraestructuras."
 cstorms.1761.desc.default: "Los fracasos hidropónicos resultantes están afectando gravemente a la agricultura del planeta, además de provocar escasez de agua potable.\n\nSi no solucionamos el problema, las consecuencias podrían traer cola. Por suerte, nuestros [owner.GetEngineerPlural] confían en crear unos sistemas de filtrado más robustos."
 cstorms.1761.desc.lithoid: "Mientras investigábamos las obstrucciones hidropónicas, nuestros [Owner.GetColonistPlural] descubrieron que el lodo mineralizado es, en realidad, delicioso, a la par que nutritivo para la fisiología litoidea. Después de realizar algunos pequeños ajustes en los sistemas de filtrado de la colonia, han logrado producir en masa una nueva bebida de temporada mientras esperamos a que la tormenta amaine."
 cstorms.1761.a: "Continuad."
 cstorms.1761.b: "Una amenaza inesperada."
 pm_satured_filtration: "Filtración saturada"
 pm_satured_filtration_desc: "El suministro local de agua está saturado por un polvo cósmico celestial que obstruye la red hidropónica."
 filtration_insight_modifier: "Conocimientos sobre filtración hidropónica"
 CLEAR_DUSTY_PIPES_PROJECT: "Limpiar los conductos"
 CLEAR_DUSTY_PIPES_PROJECT_DESC: "La §Y$celestial_storm$§! en §H[this.GetName]§! ha obstruido los sistemas de filtrado de agua con un lodo mineral indisoluble. Debemos diseñar un sistema de filtrado más robusto para resolver el problema."
 cstorms.1765.name: "Filtros desatascados"
 cstorms.1765.desc: "Los [Owner.GetEngineerPlural] se han ocupado de las obstrucciones hidropónicas y la escasez de agua en §H[this.GetName]§!. El suministro de agua de la colonia se ha mejorado y ya puede filtrar impurezas complejas como las que introdujo la $celestial_storm$.\n\nEstas mejoras en nuestras infraestructuras de agua pueden reacondicionarse para mejorar la irrigación por todo [Owner.GetName]."
 #Flightless Fauna
 cstorms.1771.name: "Fauna incapaz de volar"
 cstorms.1771.desc.common: "Los [Owner.GetScientistPlural] de [this.GetName] han detectado graves repercusiones en la población aviarioide local tras la §Y$gravity_storm$§!.\n\nLas fluctuaciones gravitacionales provocadas por la tormenta están induciendo condiciones atmosféricas erráticas que privan a la fauna aviarioide de su capacidad de volar."
 cstorms.1771.desc.default: "Además de no poder cazar con normalidad, estas criaturas se han vuelto más vulnerables a los depredadores.\n\nSi no intervenimos, cabe el riesgo de que la especie afligida se extinga."
 cstorms.1771.desc.swarm: "Nos vamos a dar un auténtico homenaje."
 cstorms.1771.a: "Una presa fácil."
 cstorms.1771.b: "Que la naturaleza siga su curso."
 cstorms.1771.c: "Metamos a las criaturas en una reserva."
 cstorms.1771.evopred: "Registrad su ADN antes de que sea demasiado tarde."
 d_avian_reserve: "Reserva aviarioide"
 d_avian_reserve_desc: "Una apartada reserva natural pensada para alojar especies de fauna aviarioide en peligro."
 cstorms.1776.name: "A volar de nuevo"
 cstorms.1776.desc: "Una vez pasada la §Y$gravity_storm$§!, la fauna de [this.GetName] que había quedado incapacitada temporalmente ha vuelto a alzar el vuelo en nuestra reserva aviarioide.\n\nSi bien muchas criaturas han vuelto a sus hábitats originales, multitud de ellas se ha quedado en la reserva, de cuya comodidad y protección parecen disfrutar.\n\nSe nos presenta una oportunidad única para estudiar de cerca la fauna aviarioide."
 cstorms.1776.a: "Excelentes noticias."
 ################
 #Storm Events #
 ################
 #Eye of the Storm
 cstorms.1801.name: "El ojo de la tormenta"
 cstorms.1801.desc: "Los escáneres detectan irregularidades en el ojo de [fromfrom.GetName], que asola [from.GetName], e indican que la formación presenta una extraña masa en el centro. Estas inusuales lecturas requieren una investigación más a fondo antes de que la tormenta se disipe o abandone el sistema."
 EYE_OF_THE_STORM_PROJECT: "$cstorms.1801.name$"
 EYE_OF_THE_STORM_PROJECT_DESC: "Los escáneres de [fromfrom.GetName] en [this.GetName] indican la presencia de una masa enorme en su vórtice interno. Los sensores de largo alcance no han podido proporcionar respuestas concluyentes sobre este fenómeno inusual. Se requiere una expedición de campo al ojo de la tormenta para comprenderlo mejor."
 cstorms.1805.name: "Hacia el vórtice"
 cstorms.1805.desc: "Al adentrarse en el ojo de la tormenta cósmica de [from.GetName], [leader.GetName] descubrió el origen de las irregularidades en nuestros escáneres. Esta inusual tormenta viene motivada por una altísima concentración de [from.star.GetEarnedResources] en su centro.\n\nNuestra nave científica recolectó todos los recursos posibles antes de ser expulsada con violencia. Los datos de los sensores durante su retirada forzosa ayudarán a nuestros ingenieros a mejorar el rendimiento de las naves en condiciones climáticas extremas."
 cstorms.1805.desc.traumatized: "Por desgracia, este peligroso calvario ha dejado huella en [leader.GetName]."
