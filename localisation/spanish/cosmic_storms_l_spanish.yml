 physicist_is_astrometeorologist_tt: "Los \n£job_physicist£ $job_physicist_plural$ se convierten en $job_astrometeorologist_plural_with_icon$.\n\nEl rendimiento de los §Y$job_astrometeorologist_with_icon$§! aumenta cuando este sistema presenta un §Yefecto ambiental§!."
