 situation_stormfall_leader_ongoing: "Impulso de líder a tormentas"
 situation_stormfall_building: "Edificio de atracción de tormentas"
 situation_stormfall_module: "$sm_storm_attraction_computer$"
 situation_stormfall_finish_project_tt: "Se debe finalizar el proyecto especial: §Y$PROJECT_TEMPEST_BREWING$§!"
 #Modifiers for Stormfall event chain
 cs_storm_chasers_storm_fruition: "Fruición de la tormenta"
 cs_storm_chasers_storm_fruition_desc: "Despertar nuestra propia tormenta cósmica impulsará a nuestra gente durante siglos."
 cs_storm_chasers_storm_fruition_gestalt: "$cs_storm_chasers_storm_fruition$"
 cs_storm_chasers_storm_fruition_gestalt_desc: "Despertar nuestra propia tormenta cósmica elevará nuestra consciencia durante siglos."
 cs_storm_chasers_homeworld_storm_attraction: "Clima extremo"
 cs_storm_chasers_homeworld_storm_attraction_desc: "Las implacables tormentas de este planeta han impuesto a sus formas de vida dos caminos distintos: unas buscan refugio frente al caos y otras disfrutan la emoción de la tempestad."
 cs_storm_chasers_homeworld_storm_attraction_tt: "Intensidad de atracción de §Y$default_storm$§!: §Pbaja§!"
 #Special project
 PROJECT_TEMPEST_BREWING: "Tempestad en ciernes"
 PROJECT_TEMPEST_BREWING_DESC: "El sistema de tormentas anómalo de [Owner.Capital.GetName] posee propiedades especiales que lo hacen idóneo para su modulación. Pero antes, debemos estudiar a fondo su composición subyacente. ¡Quién sabe qué soberbias singularidades derivarán de ello!"
 #Events
 cstorms.3100.name: "Tormenta incipiente"
 cstorms.3100.desc: "Las tormentas que se generan espontáneamente en §Y[owner.capital_scope.GetName]§! nos han mostrado el asombroso poder de la naturaleza, la intensidad emocionante de la tempestad y la renovación que sigue a su senda de destrucción.\n\nRecientemente, varias estaciones meteorológicas del planeta han detectado un fenómeno extraordinario: una red de supertormentas a punto de barrer su superficie.\n\nNuestros [Root.Owner.GetScientistPlural] llaman a esto \"casualidad benéfica\". Estas raras tempestades establecen las condiciones perfectas para presenciar algo realmente radical."
 cstorms.3100.a: "¡Preparemos el equipo de campo!"
 cstorms.3105.name: "Tempestad en ciernes"
 cstorms.3105.desc: "Nuestros [Root.Owner.GetScientistPlural] han descubierto los secretos de la manipulación de tormentas. Las proyecciones de energía de las tormentas superan todos los límites y son el motivo por el que estamos aquí. Se nos pondrá a prueba y se nos hallará dignos.\n\nSe pueden usar edificios especiales como centros de coordinación para provocar tormentas. Tener un edificio en §Y[owner.capital_scope.GetName]§! que aumente la atracción de tormentas acelerará nuestro progreso hacia la tormenta total."
 cstorms.3105.a: "Fenomenal."
 cstorms.3105.a.tt: "Un §Yedificio de atracción de tormentas§! en el planeta capital:\n$situation_speed_tt$: §G+10%§!\n\nA §Y$sm_storm_attraction_computer$§! en la estación del sistema capital:\n$situation_speed_tt$: §G+10%§!\n\n"
 cstorms.3110.name: "Advenimiento"
 cstorms.3110.desc.outro: "Si inyectamos energía en las tormentas naturales, podemos generar las condiciones de las tormentas eléctricas.\n\nLa manipulación del núcleo del planeta podría reorientar el campo magnético de [owner.capital_scope.GetName] y dar lugar a tormentas magnéticas.\n\nPor último, si invertimos la polaridad de los taquiones en determinados puntos del planeta, los cambios de campo pueden producir tormentas gravitatorias."
 cstorms.3110.desc.regular: "Hemos aprendido a poner en marcha las vibraciones tempestuosas de [owner.capital_scope.GetName] y a darles la forma de una experiencia insuperable. Pero debemos decidir qué tipo de tormenta es el más glorioso.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.hive: "Hemos aprendido a poner en marcha las vibraciones tempestuosas de [owner.capital_scope.GetName] y a darles la forma de una experiencia insuperable. Pero aún tenemos que decidir qué tipo de tormenta es el más glorioso.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.machine: "Hemos aprendido a poner en marcha las vibraciones tempestuosas de [owner.capital_scope.GetName] y a darles la forma de una experiencia insuperable. Pero nuestros procesos de juicio de valor están atascados en bucles recursivos para intentar decidir qué tipo de tormenta es el más glorioso.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.a: "Carguemos las nubes."
 cstorms.3110.a.tt: "Generemos una §Y$electric_storm$§! planetaria."
 cstorms.3110.b: "Magneticemos el núcleo."
 cstorms.3110.b.tt: "Generemos una §Y$magnetic_storm$§! planetaria."
 cstorms.3110.c: "Creemos ondas gravitatorias."
 cstorms.3110.c.tt: "Generemos una §Y$gravity_storm$§! planetaria."
 cstorms.3130.name: "En acción"
 cstorms.3130.desc.electric: "El cielo retumba, ¡los rayos brillan a nuestro alrededor!\n\nEstas poderosas descargas, además de electrificar la superficie del planeta, ¡nos han regalado su potencia! Aunque la producción agrícola se resienta con las tormentas eléctricas, es innegable su potencial para generar energía."
 cstorms.3130.desc.magnetic: "Las brújulas giran descontroladas mientras el campo magnético de [owner.capital_scope.GetName] se retuerce.\n\nPor medio de una perforación a través de la corteza de nuestro mundo natal, hemos logrado inyectar materia magnetizada en el núcleo y las tormentas naturales han amplificado las fluctuaciones de campo. Esto perjudicará a la generación de energía, pero mejorará la detección de nuevos depósitos de minerales."
 cstorms.3130.desc.gravity: "¡Nunca había sido tan emocionante el simple movimiento! La gravedad aumenta y disminuye sin previo aviso.\n\nLos puntos de manipulación de partículas repartidos por [owner.capital_scope.GetName] han invertido la polaridad de los taquiones hasta concentrarlos en esferas crepitantes de energía. Las esferas desaparecieron rápidamente (los [Root.Owner.GetScientistPlural] creen que viajaron hacia atrás en el tiempo) y en ese momento las ondas gravitatorias se expandieron en todas direcciones.\n\nLas fluctuaciones resultantes dificultarán el trabajo en la superficie del planeta, pero podrían mejorarlo en las estaciones orbitales."
 cstorms.3130.a: "Menudo viaje."
 cstorms.3130.a.tt.regular: "Durante la tormenta planetaria:\n$MOD_POP_HAPPINESS$: §G+20%§!"
 cstorms.3130.a.tt.gestalt: "Durante la tormenta planetaria:\n$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.name: "Buenas vibraciones"
 cstorms.3140.desc.intro: "Nuestros [Root.Owner.GetScientistPlural] están convencidos de que las mismas ideas que empleamos para provocar tormentas planetarias se pueden aplicar a una escala mucho mayor ahora que todo el sistema vibra con energía tempestuosa."
 cstorms.3140.desc.electric: "$cstorms.3140.desc.intro$\n\nPodemos usar el conocimiento y la infraestructura que ya tenemos para transformarla en una $electric_storm$ o podemos crear algo nuevo y estimulante.\n\nSi introducimos ciertos minerales, amplificaremos la resonancia magnética de la tormenta, mientras que si empleamos aleaciones la convertiremos en un pozo gravitatorio."
 cstorms.3140.desc.magnetic: "$cstorms.3140.desc.intro$\n\nPodemos usar el conocimiento y la infraestructura que ya tenemos para transformarla en una $magnetic_storm$ o podemos crear algo nuevo y estimulante.\n\nSi cargamos nuestro sol, amplificaremos el potencial eléctrico de la tormenta, mientras que si empleamos aleaciones la convertiremos en un pozo gravitatorio."
 cstorms.3140.desc.gravity: "$cstorms.3140.desc.intro$\n\nPodemos usar el conocimiento y la infraestructura que ya tenemos para transformarla en una $gravity_storm$ o podemos crear algo nuevo y estimulante.\n\nSi introducimos ciertos minerales, amplificaremos la resonancia magnética de la tormenta, mientras que si cargamos nuestro sol amplificaremos su potencial eléctrico."
 cstorms.3140.a: "Carguemos nuestro sol."
 cstorms.3140.a.tt: "Genera una §Y$electric_storm$§! cósmica.\nDurante §Y2§! años:$TABBED_NEW_LINE$$mod_country_energy_produces_mult$: §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.a.infra: "Usemos la infraestructura existente."
 cstorms.3140.a.tt.electric: "Genera una §Y$electric_storm$§! cósmica.\nDurante §Y2§! años:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.b: "Despleguemos minerales magnetizados."
 cstorms.3140.b.tt: "Genera una §Y$magnetic_storm$§! cósmica.\nDurante §Y2§! años:$TABBED_NEW_LINE$$mod_country_minerals_produces_mult$: §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.b.tt.magnetic: "Genera una §Y$magnetic_storm$§! cósmica.\nDurante §Y2§! años:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.c: "Usemos aleaciones especiales."
 cstorms.3140.c.tt: "Genera una §Y$gravity_storm$§! cósmica.\nDurante §Y2§! años:$TABBED_NEW_LINE$$mod_country_alloys_produces_mult$: §R-25%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.c.tt.gravity: "Genera una §Y$gravity_storm$§! cósmica.\nDurante §Y2§! años:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3160.name: "Tras la tormenta"
 cstorms.3160.desc: "Cuando se dispersó la tormenta planetaria, un nuevo accidente permanente en [owner.capital_scope.GetName]. De nuevo, una tormenta trae el cambio y el renacimiento.\n\nPor muy estimulante que fuera esta tormenta local, sólo podemos imaginar las posibilidades de una verdadera tormenta cósmica. ¿Por qué tardará tanto?"
 cstorms.3160.a: "¡Qué gran recuerdo!"
 cstorms.3160.a.tt.electric: "La tormenta ha dejado a su paso §Y$d_buzzing_plains$§! con carga eléctrica en [owner.capital_scope.GetName]."
 cstorms.3160.a.tt.magnetic: "La tormenta ha dejado a su paso §Y$d_geothermal_vent$§! de nueva creación en [owner.capital_scope.GetName]."
 cstorms.3160.a.tt.gravity: "La tormenta ha revelado §Y$d_rich_mountain$§! en [owner.capital_scope.GetName]."
 cstorms.3170.name: "Formas cósmicas"
 cstorms.3170.desc.intro: "Podemos adelantar la aparición de la inmensa tormenta cósmica que envuelve [owner.capital_scope.GetStarName], pero debemos preguntarnos si estamos preparados para el viaje de nuestras vidas.\n\n"
 cstorms.3170.desc.scientist.snippet: "Un equipo de [Root.Owner.GetScientistPlural] dirigido por §Y[event_target:storm_scientist.GetName]§! podría investigar los patrones iniciales de esta tormenta cósmica para buscar la mejor forma de manipular su formación.\n\n"
 cstorms.3170.desc.commander.snippet: "Liderado por §Y[event_target:storm_commander.GetName]§!, el ejército podría hacer estallar la tempestad incipiente y provocar una reacción en cadena.\n\n"
 cstorms.3170.desc.outro: "Este equipo se arriesga a un regreso incierto. Aun así, ¡podrían conseguir algo pasmoso!"
 cstorms.3170.desc.both: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.scientist: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.commander: "$cstorms.3170.desc.intro$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.none: "Lo único que podemos hacer ahora es esperar a que la tormenta cósmica tome forma.\n\nLa tensión de la espera es casi insoportable, pero hará que el premio se disfrute más."
 cstorms.3170.a: "Enviemos a los [Root.Owner.GetScientistPlural]."
 cstorms.3170.a.tt: "El equipo científico ha perdido a §Y[event_target:storm_scientist.GetName]§!, que corre riesgo de morir."
 cstorms.3170.b: "Ordenemos al ejército que avance."
 cstorms.3170.b.tt: "El ejército ha perdido a su comandante §Y[event_target:storm_commander.GetName]§!, que corre riesgo de morir."
 cstorms.3170.c: "Seamos prudentes y esperemos."
 cstorms.3190.name: "La primera de muchas"
 cstorms.3190.desc.intro: "Comenzó siendo un leve pliegue en el tejido cósmico. Las energías bailaron, se amalgamaron y chocaron. Una pizca de partículas exóticas, un poco de masa y... al fin, la tormenta incipiente que rodea nuestra estrella dio lugar al colosal fenómeno.\n\nEste regalo de la naturaleza y el ingenio domina los cielos esculpido según nuestros designios."
 cstorms.3190.desc.success: "$cstorms.3190.desc.intro$ Ver a nuestro líder emerger de la tormenta ha provocado un entusiasmo frenético.\n\nLo hemos logrado. Lo hemos hecho nosotros. ¡Cabalguemos esta tormenta y dejémonos llevar por la emoción de nuestra vida!"
 cstorms.3190.desc.failure: "$cstorms.3190.desc.intro$ La tormenta nos dejó sin líder, pero ¡qué gran manera de morir!\n\nLo hemos logrado. Lo hemos hecho nosotros. ¡Cabalguemos esta tormenta y dejémonos llevar por la emoción de nuestra vida!"
 cstorms.3190.desc.wait: "$cstorms.3190.desc.intro$ La espera ha sido larga, pero al fin ha llegado el día.\n\nLo hemos logrado. Lo hemos hecho nosotros. ¡Cabalguemos esta tormenta y dejémonos llevar por la emoción de nuestra vida!"
 cstorms.3190.a.success: "¡Que nada nos pare!"
 cstorms.3190.a.failure: "¡Seamos testigos!"
 cstorms.3190.a.failure.tt: "\nNos quedamos sin líder, pero se fue con gloria."
 cstorms.3190.a.wait: "¡Inmaculada!"
 ### Storm Fever ###
 #Modifiers for Storm Fever event chain
 cs_storm_chasers_bad_vibes: "Malas vibras"
 cs_storm_chasers_bad_vibes_desc: "Repentinamente, nos asalta un hastío generalizado."
 cstorms.3205.name: "Por la furia"
 cstorms.3205.normal: "Las vibraciones cósmicas están desafinadas y las hazañas de siempre ya no suscitan la misma emoción de antes. Es indudable que hemos alcanzado cotas increíbles, pero cunde el sentimiento de que falta algo. Los logros de nuestros antepasados, legendarios en alcance y ambición, arrojan una sombra larga.\n\n\"Se trata de una problemática existencial\", ha aventurado una de nuestras mentes más brillantes. \"Al atravesar el vacío, ¿habremos abierto un vacío en nuestro interior?\".\n\nLa angustia es real y ha llegado el momento de actuar. Para empezar desde cero, volvemos al principio: ¡una serie de desafíos diseñados para generar el máximo de adrenalina!"
 cstorms.3205.gestalt: "Las vibraciones cósmicas están desafinadas y las hazañas de siempre ya no suscitan la misma emoción de antes. Es indudable que hemos alcanzado cotas increíbles, pero cunde el sentimiento de que falta algo.\n\nNos ahogan las preguntas: ¿sabemos realmente quiénes somos? ¿Han quedado atrás nuestros tiempos de gloria? Como colectivo, tenemos la responsabilidad de ser la mejor versión de nosotros mismos.\n\nLa angustia es real y ha llegado el momento de actuar. Para empezar desde cero, volvemos al principio: ¡una serie de desafíos diseñados para generar el máximo de adrenalina!"
 cstorms.3205.a: "Las emociones no han hecho más que empezar."
 cstorms.3205.tooltip: "Descubre los desafíos del ayer en el diario de situación."
 cstorms.3215.name: "La fiebre decae"
 cstorms.3215.intro: "¡Misión cumplida!\n\nVolcados en la más pura búsqueda de emociones, hemos conseguido superar todos los desafíos. ¡Que todos contemplen lo que hemos logrado en estos años!"
 cstorms.3215.desc: "$cstorms.3215.intro$\n\nComo los pioneros más notables de nuestro mundo natal, nos hemos obligado a rebasar nuestros límites.\n\nY lo que es mejor: gracias a nuestro compromiso con la furia de la naturaleza, hemos adquirido una increíble comprensión del significado de nuestra existencia."
 cstorms.3215.a: "¡Remontada épica!"
 ### Storm Frenzy ###
 cs_storm_chasers_storm_frenzy_1: "Tormenta frenética"
 cs_storm_chasers_storm_frenzy_1_desc: "La llegada de La Grande nos sume en un estado de frenesí."
 cs_storm_chasers_storm_frenzy_2: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_3: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_1_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_1_gestalt_desc: "La llegada de La Grande desborda nuestra consciencia."
 cs_storm_chasers_storm_frenzy_2_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_storm_frenzy_3_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_the_code: "El código"
 cs_storm_chasers_the_code_desc: "No es la búsqueda de la supremacía lo que nos motiva, ni de ganancias materiales. Vivimos para poner a prueba nuestros límites como discípulos de la vanguardia existencial."
 cs_storm_chasers_the_code_gestalt: "El código"
 cs_storm_chasers_the_code_gestalt_desc: "$cs_storm_chasers_the_code_desc$"
 every_empire_opinion_hit: "La opinión de §Y[global_event_country.GetGalCommunityOrGalImperium]§! sobre nosotros cambia:"
 nexus_opinion_first_hit: "Ansiedad por el nexo"
 nexus_opinion_first_hit_tt: "$every_empire_opinion_hit$ §R$@first_hit_opinion_change$§!"
 nexus_opinion_second_hit: "Desaliento por el nexo"
 nexus_opinion_second_hit_tt: "$every_empire_opinion_hit$ §R$@second_hit_opinion_change$§!"
 nexus_opinion_third_hit: "Miedo por el nexo"
 nexus_opinion_third_hit_tt: "$every_empire_opinion_hit$ §R$@third_hit_opinion_change$§!"
 nexus_opinion_summon_hit: "Rabia por el nexo"
 nexus_opinion_summon_hit_tt: "$every_empire_opinion_hit$ §R$@nexus_hit_opinion_change$§!"
 nexus_opinion_the_code: "Reconciliación con el nexo"
 cs_stormfrenzy_chain_title: "Tormenta frenética"
 cs_stormfrenzy_chain_desc: "Siempre hemos tratado de rebasar todo límite. Con las gestas de nuestros predecesores como ejemplo, hoy tenemos al fin la oportunidad de esculpir la tormenta con la que siempre hemos soñado."
 cstorms.3220.name: "El credo del buscador"
 cstorms.3220.desc: "Nuestra gente vive por y para la búsqueda de emociones fuertes. Cada día descubrimos situaciones increíbles y hacemos frente a desafíos mayores, pero [ruler.GetRegnalName] cree que podemos ir aún más lejos:\n\n\"El núcleo de una tormenta cósmica es potencial en estado puro; la auténtica vanguardia insuperable. Tanto, que podría pulverizar el statu quo y dar lugar a un éxtasis inaudito\".\n\nEs al fin el momento idóneo de generar una tormenta de proporciones épicas, un maremágnum de júbilo: La Grande. Sólo quedan dos detalles menores: un estudio final para determinar exactamente cómo invocar la tormenta perfecta, y la opinión del resto de la galaxia en caso de que decidamos hacerlo.\n\nTraer al mundo algo así va a levantar algunas ampollas."
 PROJECT_SOW_THE_BIG_ONE: "Azuzar a La Grande"
 PROJECT_SOW_THE_BIG_ONE_DESC: "Aunque ya poseemos la tecnología, a falta de una tormenta incipiente cerca, debemos investigar cómo sembrar una tormenta para poder esculpirla después."
 cstorms.3222.name: "Cultivo de materia oscura"
 cstorms.3222.desc: "Por sus singulares propiedades, la materia oscura es el elemento perfecto para gestar La Grande. Inyectaremos este escaso material en el tejido espacial que envuelve nuestro sistema capital y aguardaremos a que emerjan las primeras olas de la tormenta.\n\nSin embargo, esta iniciativa ya atrae atención indeseada: nuestros vecinos han empezado a protestar. \"No estamos todos tan dispuestos a cabalgar esta ola en concreto\", se ha quejado uno de nuestros [Root.Owner.GetScientistPlural]."
 cstorms.3222.a: "Manos a la obra."
 cstorms.3222.b: "Tenemos que hacer acopio de recursos."
 PROJECT_DARK_SEEDING: "Estímulos exóticos"
 PROJECT_DARK_SEEDING_DESC: "Se puede provocar en este sistema una tormenta maleable si inyectamos con diligencia materia oscura en el tejido espacial."
 cstorms.3224.name: "El surgimiento de La Grande"
 cstorms.3224.desc: "¡Increíble! Ya se sienten, aunque tenues, las primeras vibraciones de la tormenta que se avecina. Nuestros [Root.Owner.GetScientistPlural] siguen afanados en lo suyo, pero estamos un paso más cerca de conjurar La Grande.\n\nNuestros vecinos, en cambio, no lo celebran tanto. Alegan que estamos interfiriendo con fuerzas inescrutables para nuestro entendimiento, y nuestras relaciones ya se resienten a causa de esa discrepancia."
 cstorms.3224.a: "Qué se le va a hacer."
 cstorms.3225.name: "Alimentando a La Grande"
 cstorms.3225.desc: "Los datos son inequívocos: si introducimos algo en la tormenta, esta nos devolverá algo parecido. Por consiguiente, si la nutrimos con los recursos apropiados, adquirirá propiedades (y proporciones épicas) de tormentas de todo tipo.\n\nLa galaxia sigue manifestando su preocupación, pero está a punto de nacer el fenómeno del siglo. ¡Entreguémosle todo lo que poseemos!"
 cstorms.3225.a: "¡Nutramos la tormenta!"
 cstorms.3225.b: "Vamos a necesitar más recursos."
 cstorms.3226.name: "El festín definitivo"
 cstorms.3226.desc: "Si deseamos que nuestra tormenta en ciernes cobre proporciones épicas, debemos suministrarle una amplia variedad de nutrientes. Para abordar esta proeza inconcebible necesitamos un muestreo específico de los recursos que tenemos a nuestra disposición."
 PROJECT_EVERY_ITEM_ON_THE_MENU: "Fuera de carta"
 PROJECT_EVERY_ITEM_ON_THE_MENU_DESC: "Sabemos que, si se le procura la dieta correcta, una tormenta cósmica se puede volver maleable. Para alimentarla, necesitamos una muestra concreta."
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT: "Bis: $cstorms.3225.name$"
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT_DESC: "Para crear la tormenta perfecta se necesita un repertorio de recursos medido al milímetro."
 cstorms.3227.name: "El último empujón"
 cstorms.3227.desc: "La expectación es palpable, y el camino que debemos seguir está cada vez más claro: perseverando y padeciendo, triunfaremos. ¡Fundámonos con el mismísimo frenesí cósmico! Ya está todo dispuesto para La Grande; tan solo falta un empujoncito.\n\nLa indignación de nuestros vecinos es ya inconmensurable, y afirman que eso que llamamos \"$nexus_storm$\" tan solo traerá catástrofes a nuestra galaxia. Pero ¿cómo vamos a dejar que esos aguafiestas saboteen un proyecto de tal magnitud? Es hora de tomar una decisión."
 cstorms.3227.a: "¡La Grande es nuestro destino definitivo!"
 cstorms.3227.a.tt: "$nexus_storm$ llegará dentro de 40 días.\n$nexus_opinion_third_hit_tt$"
 cstorms.3227.b: "¡No! ¡Somos mejores que esto!"
 cstorms.3227.b.tt: "Proyecto $nexus_storm$ abortado.\n§YLa opinión de [global_event_country.GetGalCommunityOrGalImperium]§! mejorará al cabo de 40 días."
 cstorms.3230.name: "Génesis de La Grande"
 cstorms.3230.desc: "Henos aquí, al borde de una nueva experiencia. Ha llegado la calamidad de todas las calamidades. Nuestros jinetes de tormentas no se amedrentan ante nada. No rehuiremos ningún desafío.\n\n¡Ponemos a la galaxia por testigo!"
 cstorms.3230.a: "Adelante."
 has_spawned_nexus_storm_tt: "$TRIGGER_FAIL$Ha generado una §Y$nexus_storm$§!"
 cstorms.3235.name: "Coda tempestuosa"
 cstorms.3235.desc: "Hemos aprendido mucho. Por fin comprendemos que la galaxia no es un juguete con el que entretenernos, sino una aventura que vivir.\n\nYa lo dijo [ruler.GetRegnalName]: \"Esta vida está repleta de emociones. Nunca dejaremos de buscar el siguiente desafío, pero debemos hacerlo con respeto\". Es nuestra elección. Es lo que estamos destinados a ser."
 cstorms.3235.a: "¡Relajando, que es gerundio!"
 cstorms.3235.a.tt: "$every_empire_opinion_hit$ §G+$@the_code_total_change$§!"
 #Storm Fever Challenges
 cs_stormfever_chain_title: "Fiebre de la tormenta"
 cs_stormfever_chain_desc: "Con el fin de alcanzar nuevas cotas, hallar alborozo y rebasar nuestros límites, hoy nos embarcamos en una serie de pruebas. ¡Comienza la diversión!"
 challenges_completed: "Desafíos superados"
 MISSION_CS_STORM_FEVER_CHALLENGE_1: "Derrotar una flota dentro de una tormenta"
 MISSION_CS_STORM_FEVER_CHALLENGE_1_DESC: "El fragor de la batalla es un caldo de cultivo idóneo para proezas. ¡Ahora imagina cómo será experimentarlo desde el corazón de una tormenta cósmica! Demostremos a la galaxia entera que nos va la marcha más que a nadie.\n\nNuestro objetivo ahora es vencer a una flota enemiga dentro de una tormenta."
 fleets_defeated_in_storm: "Flotas derrotadas dentro de una tormenta"
 MISSION_CS_STORM_FEVER_CHALLENGE_2: "Explorar el confín de la galaxia"
 MISSION_CS_STORM_FEVER_CHALLENGE_2_DESC: "Ir más allá de las fronteras que nosotros mismos nos imponemos, hacer funambulismo en el borde del firmamento, explorar los rincones más remotos del espacio... No existe nada más gratificante.\n\nTenemos que enviar una nave científica al sistema designado, a toda costa."
 far_edge_explored: "Confines lejanos explorados"
 MISSION_CS_STORM_FEVER_CHALLENGE_3: "Afrontar tormentas"
 MISSION_CS_STORM_FEVER_CHALLENGE_3_DESC: "Los más curtidos anhelan la emoción de la tormenta. ¡Que nadie les refrene!\n\nNuestro próximo desafío es lograr que un jinete de tormentas pase más de 180 días capeando una tormenta cósmica."
 days_storm_rider_spend_in_storm: "Días que un jinete ha pasado en una tormenta"
 MISSION_CS_STORM_FEVER_CHALLENGE_4: "Investigar lo que ha salido a flote"
 MISSION_CS_STORM_FEVER_CHALLENGE_4_DESC: "En una galaxia a rebosar de tesoros enterrados y secretos ancestrales, ¡nada como un buen vendaval para hurgar en sus entrañas! Vamos a ver qué encontramos por ahí.\n\nNos propondremos el desafío de investigar una anomalía o un yacimiento arqueológico descubierto por una tormenta."
 storm_unraveled_event_investigated: "Anomalías o yacimientos investigados"
 MISSION_CS_STORM_FEVER_CHALLENGE_5: "Difundir el júbilo"
 MISSION_CS_STORM_FEVER_CHALLENGE_5_DESC: "¿Qué gracia tiene si solo nos divertimos nosotros? Las aventuras son mejores si se comparten.\n\nPara que nuestros vecinos se sientan incluidos, nuestro desafío ahora es dirigir una tormenta cósmica para que entre en su espacio."
 send_storm_to_other_empire: "Tormentas enviadas a otros imperios"
 MISSION_CS_STORM_FEVER_CHALLENGE_6: "Sucumbir a la tempestad"
 MISSION_CS_STORM_FEVER_CHALLENGE_6_DESC: "Envejecer y descomponernos no nos pega nada; ¡es mucho mejor consumirse cual gloriosa centella!\n\nEl siguiente desafío será ayudar a un jinete de tormentas a vivir sus últimos momentos dentro de una tormenta cósmica."
 rider_died_in_storm: "Jinetes de tormentas muertos o desaparecidos en las tormentas"
 #Challenge completed intro
 challenge_completed_intro: "¡Hemos alcanzado nuevas cotas y pulverizado límites! Justo lo que necesitábamos para estimular nuestras emociones. ¡Hemos superado la prueba!"
 #Challenge 1 completed
 challenge_completed: "Desafío superado:"
 cstorms.305.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_1$"
 cstorms.305.desc: "$challenge_completed_intro$\n\nEsa flota ni siquiera podía oponer resistencia. ¿Quién osa desafiarnos ahora?"
 cstorms.305.a: "¡Qué gozada!"
 #Challenge 2 completed
 cstorms.310.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_2$"
 cstorms.310.desc: "$challenge_completed_intro$\n\n¡La galaxia tiene muchísimo que ofrecer! Con tanto que descubrir y vivir, detenernos ahora carece de lógica. ¡A por el siguiente desafío!"
 cstorms.310.a: "¡Eso es!"
 #Challenge 3 completed
 cstorms.315.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_3$"
 cstorms.315.desc.normal: "$challenge_completed_intro$\n\nA su regreso, la euforia embarga a nuestro jinete de tormentas. ¡Las tormentas cósmicas nos brindan emociones sin precedentes!"
 cstorms.315.desc.gestalt: "$challenge_completed_intro$\n\nEstamos exultantes. Las tormentas cósmicas llevan la emoción a un nivel completamente nuevo."
 cstorms.315.a: "¡No hay quien se aburra!"
 #Challenge 4 completed
 cstorms.320.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_4$"
 cstorms.320.desc: "$challenge_completed_intro$\n\nDesentrañar secretos ancestrales y desenterrar tesoros son fuentes fiables de entusiasmo. ¡A saber qué más maravillas aguardarán a que las encontremos!"
 cstorms.320.a: "¡Un sinfín de posibilidades!"
 #Challenge 5 completed
 cstorms.325.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_5$"
 cstorms.325.desc: "$challenge_completed_intro$\n\n¡La tormenta ha azotado su espacio de pleno, haciendo cundir éxtasis y descontrol a partes iguales! Podemos estar tranquilos sabiendo que hemos brindado a nuestros vecinos una experiencia increíble.\n\nAhora mismo no saben apreciar nuestro regalo, ¡pero nos lo acabarán agradeciendo!"
 cstorms.325.a: "¡Qué generosidad la nuestra!"
 #Challenge 6 completed
 cstorms.330.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_6$"
 cstorms.330.desc.normal: "$challenge_completed_intro$\n\nCuando la grandiosa tormenta clamó su nombre, respondió con alborozo. ¡Honor a ti, jinete de tormentas, leyenda de leyendas! Que tu viaje al más allá sea igual de épico que tu despedida."
 cstorms.330.desc.gestalt: "$challenge_completed_intro$\n\nParte de nuestro ser se ha fundido con la gran tormenta en una espiral de júbilo y violencia. ¡Nunca había resultado tan esclarecedor y edificante perder un nodo! Esta experiencia memorable definirá a nuestra especie durante muchos años."
 cstorms.330.a: "¡Que nada nos pare!"
 cstorms.331.desc.normal: "$challenge_completed_intro$\n\nCuando la grandiosa tormenta clamó su nombre, respondió con alborozo. ¡Honor a ti, jinete de tormentas, leyenda de leyendas!"
 cstorms.331.desc.gestalt: "$challenge_completed_intro$\n\nParte de nuestro ser se ha fundido con la gran tormenta en una espiral de júbilo y violencia. ¡Estar a punto de perder un nodo nunca había resultado tan esclarecedor y edificante! Esta experiencia memorable definirá a nuestra especie durante muchos años."
 electric_storm_desc: "La colisión de campos electromagnéticos imbuye a esta tormenta cósmica de un nivel casi peligroso de carga eléctrica. No hará ningún bien a los escudos, pero mejorará la producción planetaria."
 particle_storm_desc: "Como dotadas de vida propia, estas tormentas vagan por el tejido galáctico, sin hacer esfuerzo alguno por engullir ni evitar naves. Peligrosas e inestables, basta su mera presencia para que toda una civilización una fuerzas frente a los elementos."
 gravity_storm_desc: "Cuando chocan cuerpos celestes inmensos, las ondas gravitatorias resultantes sacuden toda la galaxia. Cuando estas a su vez chocan, nace una tormenta gravitatoria. Los sistemas de apuntado de las naves se resienten, y la fluctuación de la gravedad obliga a casi todos a permanecer en sus hogares."
 magnetic_storm_desc: "Cuando cinturones de asteroides metálicos a la deriva entran en contacto con fuerzas gravitatorias de gran intensidad, se forman en su interior campos magnéticos. Las tormentas de esta índole hacen estragos en los cascos e interrumpen la construcción industrial, pero sacan a la luz los valiosos minerales que subyacen en la corteza planetaria."
 solar_storm_desc: "Una $solar_storm$ crea una fluctuación brillante dentro del tejido espacial. Su presencia provoca que las estrellas produzcan llamaradas sin precedentes. La radiación resultante es sumamente perjudicial, pero eleva exponencialmente el rendimiento de la estación espacial y dificulta la ocultación de las naves."
 celestial_storm_desc: "La galaxia está, en todo momento, repleta del polvo de millones de planetas flotando sin rumbo. En ocasiones, la concentración de estos gránulos es tal, que se produce una tormenta de polvo. Entorpece la comunicación en todo el planeta, aunque los elementos químicos resultantes son útiles para la producción de recursos. Los objetos que se encuentran estas tempestades son inexistentes para nuestros escáneres."
 shroud_storm_desc: "En inusitadas ocasiones, al plano físico llegan susurros del Velo. En proximidad de estas insólitas tormentas, los seres sintientes experimentan visiones sublimes y grotescas a la vez. Quienes han entrado en comunión con el Velo pueden llegar incluso a gozar de un tenue vínculo."
 nexus_storm_desc: "Cuando se alinean los astros, la más leve de las tormentas cósmicas puede adquirir dimensiones extraordinarias. Este infrecuente fenómeno desembocará en terror apocalíptico. Dentro de esta abominación, no se puede prosperar; la única opción es sobrevivir."
 FROM_STORM: "Desde la tormenta"
 #Planetary modifiers
 hyper_ecosystem: "Hiperecosistema"
 hyper_ecosystem_desc: "El suelo de este planeta contiene nitrógeno y fósforo en concentraciones altísimas, ya que ha ido reabsorbiéndolo de los minerales que se forman en la corteza de forma natural. Esto da lugar a un crecimiento de la vegetación particularmente rápido que, sin embargo, entorpece los proyectos de construcción."
 docile_fauna: "Fauna dócil"
 docile_fauna_desc: "La falta de depredadores naturales característica de este planeta hace que su flora y fauna sean especialmente dóciles, por lo que la convivencia con ellas es muy agradable. En lugar de la ley del más fuerte, son los estragos de la tormenta lo que controla el crecimiento poblacional aquí."
 obsidian_lakes: "Lagos de obsidiana"
 obsidian_lakes_desc: "Las pozas de magma se han enfriado a causa de la actividad tectónica, convirtiéndose en inmensas láminas de obsidiana que han traído recursos valiosos a estratos de la superficie planetaria."
 obsidian_lakes_volcanic: "$obsidian_lakes$"
 obsidian_lakes_volcanic_desc: "$obsidian_lakes_desc$"
 crimson_crawlers: "Insectos carmesíes"
 crimson_crawlers_tt: "§R$COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS$§!"
 crimson_crawlers_desc: "A causa de los billones de insectos rojos que la pueblan, un manto carmesí recubre la superficie del planeta. Aunque su número intimida, parecen ser inofensivos y han logrado hallar un delicado equilibrio con el ecosistema del planeta."
 metal_planet: "Planeta de metal"
 metal_planet_desc: "Este planeta está completamente cubierto de metales en bruto de origen natural. Carece de recursos vitales básicos como agua o una atmósfera respirable, ¡pero está a rebosar de recursos muy útiles!"
 terraform_fail_is_metal_planet: "La corteza metálica de este planeta impide terraformarlo."
 previously_terraformed_planet: "Planeta terraformado con anterioridad"
 previously_terraformed_planet_desc: "Un mundo rocoso con una atmósfera de nitrógeno y oxígeno y muchos océanos. Existen indicios de que imperios antiguos ya colonizaron este planeta en su día, pero ya no queda rastro de civilización. Aún queda mucho por descubrir, ¡pero el planeta ya está acondicionado para colonizarlo!"
 previously_terraformed_planet_tt: "Gracias a los intentos de terraformación anteriores, convertir este planeta en un mundo Gaia será mucho más fácil."
 has_patriotic_institute: "$building_adakkaria_patriotic_institute$"
 has_patriotic_institut_desc: "Antaño, este planeta constituyó los cimientos de la Convención de adAkkaria. De aquella civilización imponente, hoy no queda más que el $building_adakkaria_patriotic_institute$."
 has_patriotic_institute_tt: "Tiene el edificio: $building_adakkaria_patriotic_institute$. Coloniza este planeta, y pasará a ser tuyo."
 adakkaria_patriotic_institute_desc.supercharged: "Probabilidad de que cada año surja una tormenta en el sistema a cambio de §Y100§! £pop£ §Hpoblaciones§!."
 #Planet Modifiers
 crimson_crawlers_sashimi_style: "Insectos carmesíes: consumo en crudo"
 crimson_crawlers_sashimi_style_desc: "A causa de los billones de insectos rojos que la pueblan, la superficie del planeta está teñida de un intenso carmesí. Incluso crudos, son una fuente de nutrición exquisita."
 crimson_crawlers_bbq_them: "Insectos carmesíes: consumo cocinados"
 crimson_crawlers_bbq_them_desc: "A causa de los billones de insectos rojos que la pueblan, la superficie del planeta está teñida de un intenso carmesí. Asados, se han convertido en un manjar para la población."
 COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS: "§REste planeta no lo pueden colonizar imperios de máquinas ni terrávoros.§!"
 #New planet types modifiers
 collided_planet: "Planeta colisionado"
 collided_planet_desc: "Dos planetas chocaron y, en lugar de destruirse mutuamente, formaron un entramado único. Aunque la superficie aprovechable es muy extensa, este mundo plantea dificultades muy inusuales de habitabilidad y construcción."
 wooden_planet: "Mundo arbóreo"
 wooden_planet_desc: "Con el paso de los milenios, la corteza de este planeta fue quedando recubierta de raíces de varios kilómetros de espesor, convirtiéndose en un organismo viviente titánico."
 wooden_planet_tt: "Construir y mantener alojamientos cuesta $w_food$.\nConstruir granjas cuesta $w_food$."
 #Eruption Event
 recent_eruption: "Erupción reciente"
 eruption_report_tooltip: "\nLos informes llegarán dentro de 30 días."
 colony_mod.31.name: "¡Erupción!"
 colony_mod.31.desc: "A causa de los fenómenos tectónicos en [Root.GetName], se han resquebrajado las láminas de obsidiana de una placa, y la lava resultante que emana a la superficie lo está asolando todo. De la colonia llegan informes nefastos."
 colony_mod.31.a: "Veamos esos informes."
 colony_mod.32.name: "Informe de daños de la erupción"
 colony_mod.32.desc: "¡La erupción en los campos de obsidiana que hace poco sacudió nuestra colonia en [Root.GetName] se ha tornado en un volcán activo! La roca fundida recubre ahora todo lo que existió en la zona."
 colony_mod.33.desc: "Milagrosamente, la erupción en los campos de obsidiana que hace poco sacudió nuestra colonia en [Root.GetName] no ha provocado daños. Además, por inesperada suerte, la capa de obsidiana ha quedado troceada; ¡su recolección es ahora de lo más sencilla!"
 colony_mod.34.desc: "Milagrosamente, la erupción en los campos de obsidiana que hace poco sacudió nuestra colonia en [Root.GetName] no ha provocado daños."
