 cstorms.2295.a: "Dejad que [Root.GetLeaderName] se dé el gusto."
 cstorms.2295.b: "No dejéis que [Root.GetLeaderName] se dé el gusto."
 cstorms.2295.a.psionic: "Sus víctimas todavía lloran."
 cstorms.2295.a.psionic_gestalt: "Sus voces unificadas gemirán de agonía."
 cstorms.2295.a.gestalt: "La falta de armonía siembra el caos."
 cstorms.2300.name: "Todo está dicho"
 cstorms.2300.desc: "Hemos estado trabajando duro para desbloquear la última sección del $building_adakkaria_patriotic_institute$. Mientras tanto, nos ha llegado un informe desconcertante de los laboratorios inferiores. Los científicos de adAkkaria afirmaban que en todos y cada uno de los seres, quizá incluso dentro de las máquinas sintientes, existe una chispa. Inspirándose en el inicio de las tormentas cósmicas, denominaron a este poder la \"tormenta interior\": una vorágine de deseo y potencia que impulsa toda vida sintiente. Al someter a la tormenta interior a experiencias extremas, podría desatarse un gran poder.\n\nDurante su estancia como prisionero de guerra, §SalAtta Landeer§! había sido el primero en descubrir este efecto. Como científico, convenció al Mando Exaltado para que financiara más ensayos en Celebración. Aunque los registros no nos dicen qué le ocurrió a §SLandeer§!, sabemos por los sucesos del cementerio naval que su destino final fue desafortunado.\n\nInformes posteriores hacen referencia a una forma \"más eficiente\" de desencadenar la tormenta interior. Un medio que no requería una crueldad física extrema, sino que se basaba en la invocación de un terror ineludible y letal en el interior de la víctima. Para iniciar el efecto a gran escala, la Convención pensaba emitir una señal a través de su extensa red de estaciones de propaganda."
 cstorms.2300.desc.psionic: "Hemos logrado grabar los susurros psiónicos de las cubiertas de observación:\n\n§LSacadme de aquí, por favor. ¡Yo era un ciudadano ejemplar!\nMis sueños ahora no son más que una tormenta sin fin. Me llama.\nNo lo entiendo. Hemos destacado en nuestras tareas. ¿Por qué nos hacen esto?\nDentro de todos nosotros hay un poder. Quieren explotar ese poder. No debemos dárselo.\nTonterías; lo hacen para salvar la Convención Benévola. Debemos cumplir.\nLos satélites me susurran. Ahora puedo extender mi mente a través de la galaxia.\nHe visto que han diseñado algo. Algo que podría hacer esto a cualquiera, en cualquier lugar.\nNos salvaremos; ¡solo hay que darles lo que quieren!\nNo lo entiendes; si nos hacen esto a nosotros, se lo harán a todo el mundo.\nPodríamos liberarnos.\nPero eso significa que...\nNos matarán de todos modos. Una vez que esa cosa funcione. Nos matarán a todos.\nTengo miedo; no quiero morir. Quiero vivir. Por favor.\nLa fase final me está hablando. Quieren saber si estamos de acuerdo.§!"
 cstorms.2300.b: "Debemos hacernos con este poder."
 cstorms.2300.a.psionic: "Qué final tan triste."
 cstorms.2300.a.psionic_hive_robot: "Un resultado desafortunado."
 cstorms.2300.b.psionic: "No hay nada más noble que el sacrificio."
 cstorms.2300.b.psionic_hive_robot: "El sacrificio vale la pena."
 cstorms.2305.name: "Invocador de tempestades"
 cstorms.2305.desc.start: "Hemos descubierto un hangar enorme. Una constelación increíblemente compleja de cables, tuberías y componentes electrónicos domina el lugar, y todo conduce a un silo de misiles enorme, aunque vacío. Por lo que parece, esta red estaba conectada a un objeto del tamaño aproximado de una corbeta.\n\nLos registros indican que este lugar se utilizó para montar un aparato llamado §lInvocador de tempestades§!, que ya se había instalado con éxito en el sistema adSul. Aunque se interrumpió el contacto con el Invocador, la §Gfuente de alimentación§! sigue en su sitio."
 cstorms.2305.desc.end.default: "Al leer el nombre, la tripulación se sintió invadida por una ira irracional y empezó a arrancar cables y paneles. Hizo falta algo más que una simple orden para calmarlos. Nos acercamos cada vez más a la verdad."
 cstorms.2305.desc.end.psionic: "A medida que [Root.GetLeaderName] se acercaba al constructo vacío, los susurros psiónicos comenzaron de nuevo.\n§LLo ves, ¿verdad? Al principio, no sabíamos lo que estaban construyendo. No sabíamos que se desharían de nosotros. Algunos querían venganza. Otros queríamos ser libres. Otros sintieron la llamada de las tormentas. Tenía que terminar, ¿entiendes? Teníamos que hacerlo. No podíamos soportarlo más.§!"
 cstorms.2305.desc.end.gestalt: "Al leer el nombre de este dispositivo, nuestros [controller.GetIndividualNamePlural] de exploración determinaron cómo se activaba el §lInvocador§!, y el método por el que su señal rebotaba a través de las numerosas estaciones de propaganda hasta llegar por fin a su objetivo.\n\nY nosotros no fuimos inmunes a ese destino."
 cstorms.2305.desc.default: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.default$"
 cstorms.2305.desc.psionic: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.psionic$"
 cstorms.2305.desc.gestalt: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.gestalt$"
 cstorms.2310.name: "La fase final"
 cstorms.2310.desc.start: "Por fin, Celebración nos ha desvelado el último de sus secretos: la fase final.\n\nEn los pasillos yacían esparcidos los cadáveres disecados del personal de adAkkaria, destrozados por trozos de piedra, metal, plástico y otra basura. Algo había hecho estragos en estos corredores, diezmando todo y a cualquiera en su camino.\n\nPero el verdadero"
 cstorms.2310.desc.piece.default: "horror"
 cstorms.2310.desc.piece.authgen: "deleite"
 cstorms.2310.desc.end: "todavía estaba por llegar.\nUnas estrechas celdas aprisionaban a media docena de individuos. En la pantalla de visualización se podía leer §GFuente de alimentación del Invocador§!. Se trataba claramente de jóvenes ciudadanos de la Convención. Sus pequeños cuerpos estaban suspendidos por docenas de tubos y cables. El fluido de las celdas los mantenía en un estado intermedio entre la vida y la muerte, rodeados por una fuerza similar a las energías de la tormenta latente del sistema adSul.\n\nLas pocas pantallas que quedaban cobraron vida, mostrando cada una de ellas una única petición:\n§LRECORDADNOS | DECID NUESTROS NOMBRES | DECID NUESTROS NOMBRES.§!\n\nAnotamos los nombres de estos jóvenes. El último, sin embargo, nos hizo reflexionar: §SenRida Direen§!, quien había apagado el fuego con su mente.\n\nAhora, armados con estos nombres, deberíamos poder contactar de nuevo con la tormenta cósmica."
 cstorms.2310.desc.default: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.default$ $cstorms.2310.desc.end$"
 cstorms.2310.desc.authgen: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.authgen$ $cstorms.2310.desc.end$"
 cstorms.2310.a: "¡Excelente trabajo!"
 #The Storm's Swansong
 cstorms.2320.name: "La tormenta"
 cstorms.2320.desc: "DECID NUESTROS NOMBRES\n\nDECID NUESTROS NOMBRES\n\nDECID | NUESTROS | NOMBRES"
 cstorms.2320.a: "Hemos visto lo que os hizo la Convención."
 cstorms.2320.b: "¿Qué pasó con la Convención de adAkkaria?"
 cstorms.2320.c: "¿Dónde está el Invocador de tempestades?"
 cstorms.2320.d: "Tenemos vuestros nombres."
 cstorms.2320.a.resp: "NO PARABAN DE PROVOCAR\n\nDOLOR Y RABIA Y PENA Y MIEDO\n\nERAN DIENTES ERAN MANDÍBULAS ESTABAN\nDEVORÁNDONOS ESCUPIÉNDONOS PROVOCÁNDONOS\n\nDOLOR Y RABIA Y PENA Y MIEDO\n\nNOS DESHICIMOS NOS DESUNIMOS NOS CONVERTIMOS EN\n\nDOLOR Y RABIA Y PENA Y MIEDO"
 cstorms.2320.b.resp: "INDULGENTES Y AUTORITARIOS Y DESPIADADOS\nORGULLOSOS | CRUELES | DECIDIDOS\nTRAYENDO MUERTE TRAYENDO SUFRIMIENTO\n\nTUVIMOS QUE TUVIMOS QUE TUVIMOS QUE TUVIMOS QUE TUVIMOS QUE\nSER | NO SER | DEJAR DE SER\n\nNOSOTROS\nVIAJAMOS POR LAS TRANSMISIONES | CORROMPEMOS LA SEÑAL | CORROMPEMOS LAS MENTES \nAPAGÓN BLANCO | APAGÓN GRIS | APAGÓN NEGRO | SUCUMBIMOS A LA OSCURIDAD\nDISPERSARNOS POR LAS ESTRELLAS Y NUNCA MÁS SE SUPO"
 cstorms.2320.c.resp: "NOSOTROS\nSOMOS UN ESCUDO | ESCUDARTE\n\nNOSOTROS\nFORMAMOS UNA CUNA | ACUNARLO\n\nY MECERLO HASTA EL OLVIDO | DORMIR DORMIR DORMIR PERECER\n\n§lTEMPESTAD§! §RABOMINADOR§!\nY NUNCA MÁS DESPERTAR"
 cstorms.2325.desc: "DECID NUESTROS NOMBRES | DECID NUESTROS NOMBRES | DECID NUESTROS NOMBRES\n\nAHORA §g(AHORA)§! AHORA §g(AHORA)§!\n\nDECID NUESTROS NOMBRES | DECID NUESTROS NOMBRES | DECID NUESTROS NOMBRES\n\nDECID | NUESTROS | NOMBRES | AHORA"
 cstorms.2325.d: "De acuerdo, vuestros nombres son..."
 cstorms.2330.desc: "§LRecitamos todos los nombres que encontramos durante nuestra excavación. Cuando pronunciamos el último, la tormenta se calma.§!"
 cstorms.2330.a: "¿Seguís ahí?"
 cstorms.2335.desc: "¡Podemos volver a pensar! §g(pensar pensar pensar)§!\n¡Tantas voces a nuestro alrededor! §g(pensar hablar desear soñar)§!\nTantas personas únicas §g(tú y yo y ellos y ellas)§!\n\nNos habéis devuelto la cordura §g(viajar descifrar descubrir)§!\nSin embargo, pronunciar nuestros nombres os ha dado cierto control sobre nosotros... §g(¡No, otra vez no!)§!\n¿Qué queréis de nosotros? §g(dejadnos ir dejadnos ir dejadnos ir)§!"
 cstorms.2335.a: "Es hora de que seáis libres."
 cstorms.2335.b: "Someteos y dadnos el Invocador de tempestades."
 cstorms.2340.desc: "Libres.\n\n¿Queréis dejarnos ir? §g(¿Libres?)§!\n\nImposible. §g(Es imposible.)§!\nNo podéis decirlo en serio. §g(¿Y el Invocador de tempestades?)§!"
 cstorms.2340.a: "Lo destruiremos."
 cstorms.2345.desc: "Dolor y rabia y pena y miedo. §g(DOLOR | RABIA | PENA | MIEDO)§!\n\nEs para lo único que hemos servido.\n\nES PARA LO ÚNICO QUE HEMOS SERVIDO DOLOR RABIA PENA MIEDO\n§gDOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA MIEDO DOLOR RABIA PENA DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA MIEDO DOLOR RABIA PENA§!"
 cstorms.2345.a: "Gritad cuanto queráis. Sois nuestros siervos."
 cstorms.2350.name: "Se acabó la tormenta"
 cstorms.2350.desc: "La tormenta creó un agujero en su interior, revelándonos el §lInvocador de tempestades§!. Es extraño que un aparato tan pequeño haya sido objeto de tanto deseo, lucha y sacrificio. Su mera existencia inició la caída de un imperio antaño majestuoso.\n\nCon una simple serie de órdenes, activamos la rutina de autodestrucción del Invocador de tempestades. Cuando la explosión se desvaneció y los escombros se esparcieron por el sistema, la tormenta empezó a amainar. Al desaparecer, también lo hizo el extraño velo que cubría el mundo natal de la Convención de adAkkaria.\n\nSu larga pesadilla por fin ha llegado a su fin."
 cstorms.2350.a: "Que sus nombres sean siempre recordados."
 cstorms.2355.name: "Dolor Rabia Pena Miedo"
 cstorms.2355.desc: "La tormenta se revolvía furibunda cual fiera rabiosa presa de la impotencia, incapaz de hacernos daño alguno a nosotros ni al §lInvocador de tempestades§!.\n\nOrdenamos a las voces confinadas en su interior que nos abriesen un camino entre la vorágine y nos atribuimos el mayor logro de la Convención.\n\nSin embargo, el mundo natal de adAkkaria ha quedado inaccesible; cualquier ruta hacia el $building_adakkaria_patriotic_institute$ se ha cerrado para siempre. Aun así, las palabras que bramaba la tormenta han quedado grabadas en nuestra memoria.\n\nDolor, rabia, pena y miedo.\nLa galaxia las aprenderá también."
 cstorms.2355.a: "Es preciso hacer sacrificios."
 MESSAGE_INSTITUTE_SPAWNED_STORM_TITLE: "Tormenta invocada"
 MESSAGE_INSTITUTE_SPAWNED_STORM: "§Y100§! £pop£ §Hpoblaciones§! se han invocado a sí mismas en $PLANET$, lo que ha generado una nueva $STORM$ en $SYSTEM$."
 artifact_adakkaria_research: "Secretos de adAkkaria"
 artifact_adakkaria_research_desc: "Profundiza en los secretos de adAkkaria."
 artifact_adakkaria_research_completed: "$artifact_adakkaria_research$"
 artifact_adakkaria_research_completed_desc: "Hemos dado uso a los antiguos conocimientos de adAkkaria."
 #Secrets of the adAkkaria Convention
 project_adakkaria_secrets_of: "Secretos de la Convención de adAkkaria"
 project_adakkaria_secrets_of_DESC: "Aún nos queda muchísimo que aprender del Instituto de Celebración. ¿Osamos llevar aún más lejos los experimentos adAkkarianos?"
 cstorms.2365.name: "Potencial desatado"
 cstorms.2365.desc.start: "Al analizar la investigación de la Convención de adAkkaria, parece ser que sus científicos no se atuvieron a ningún criterio estandarizado que reconozcamos: su metodología era chapucera, y sus conclusiones casi triviales. Renunciaron a una investigación meticulosa y diligente en favor de la depravación. Aun así, cuanto más escandalosas eran las crueldades a las que sometían a sus sujetos de pruebas, más elogios recibían del Mando Exaltado.\n\nLas primeras etapas de la investigación, en cambio, eran otro cantar: se trataba dignamente a los sujetos y se les respetaba en su andadura hacia el despertar de la \"tormenta interior\". De hecho, si comparamos los resultados entre inicios y finales de la investigación, es inevitable llegar a una conclusión atroz: nunca hubo correlación entre la tortura y el número de seres que despertaban. Una miríada de sujetos sufrió lo indecible y murió por nada."
 cstorms.2365.desc.end.default: "Hoy entendemos los principios pertinentes y, con los errores de la Convención de adAkkaria como ejemplo de mala praxis, no nos costará incitar a nuestras gentes a desarrollar sus tormentas interiores a fin de adquirir ese vigor tempestuoso. Tal acercamiento entraña un peligro, y es que algunos de estos individuos §G$Name_Storm_Fused$§! podrían acabar respondiendo a su llamamiento, precipitándose así a una tempestad."
 cstorms.2365.desc.end.gestalt: "Hoy nuestro colectivo entiende los principios pertinentes y, con los errores de la Convención de adAkkaria como ejemplo de mala praxis, parte de nosotros podrá desarrollar su tormenta interior a fin de adquirir ese vigor tempestuoso. Tal acercamiento entraña un peligro, y es que algunos nodos §G$Name_Storm_Fused$§! pueden sucumbir al llamamiento de la tormenta, precipitándose así a una tempestad."
 cstorms.2365.desc.default: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.default$"
 cstorms.2365.desc.gestalt: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.gestalt$"
 cstorms.2365.a: "Asimilemos este nuevo saber. ¡Con cautela!"
 cstorms.2365.b: "No. Que los secretos sigan siéndolo."
 cstorms.2365.a.tt: "- Se cuadruplica la probabilidad de que §Y100§! £pop£ §Hpoblaciones§! obtengan el rasgo $Name_Storm_Fused$ durante una tormenta.\n - Cada 20 años, existe una leve posibilidad de que §Y100§! £pop£ §Hpoblaciones§! mueran y se conviertan en tormenta.\n - Potencial de cultivación: +5% de felicidad por modificador del imperio."
 Name_Storm_Fused: "Fundido con la tormenta"
 Name_Storm_Fused_affix: "Fundido con la tormenta" #The trailing space is intentional, to give a space before the species name on the species screen
 ########################################
 #### Storm Chasers #
 ########################################
 origin_storm_chasers: "Buscadores de tormentas"
 origin_storm_chasers_desc: "No existe desafío que les amilane, rastro que se les resista ni tormenta que pasen por alto.\n\nLa esencia misma de esta civilización es la búsqueda infatigable de peripecias. Para bien, y también para mal."
 origin_tooltip_storm_chasers_effects: "- $LEADERS_TRAITS$ ['concept_storm_rider']\n- El planeta $mod_planet_jobs_unity_produces_mult$ por cada §Yedificio de tormenta§!: §G+$@storm_chasers_storm_building_unity_produces_mult|%0$§!\n- Los edificios capitales aportan automáticamente modificadores de §Yrefugios contra tormentas§! una vez investigadas las tecnologías pertinentes. \n- Probabilidad de aparición de §Y$default_storm$§! dentro de las fronteras: §G+100%§! \n- Probabilidad de opción de investigación de §Ytecnología de tormentas cósmicas§!: §G+175%§!\n- Acceso a ['concept_weather_forecasting_mode']\n- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$- £physics£ ['technology:tech_storm_prediction_1']"
 START_SCREEN_STORM_CHASERS: "¿Qué sería la vida sin frenesí? Quemarnos rápido y morir brutalmente: ese ha sido nuestro camino. Pero, trilladas todas las sendas y conquistada la cumbre más alta, ¿qué será lo próximo?\n\nNuestro planeta siempre ha sido tormentoso, con tendencia a las tempestades y diluvios de todo tipo. Si encontramos formas de utilizar estas condiciones únicas, tendremos la oportunidad de invocar una furiosa tormenta cósmica.\n\nHace mucho que dominamos los desafíos de nuestro mundo natal, y ha llegado el momento de lanzarnos entre aullidos al vacío. No será fácil, pero, como reza un antiguo dicho, \"solo los audaces alcanzan el horizonte\"."
 #Storm Rider Trait
 leader_trait_storm_rider_desc: "Los jinetes de tormentas viven por y para la adrenalina, y su potencial más recóndito sale a flote en pleno torrente de una tormenta cósmica. Los que ocupan puestos en el Consejo sustituyen sus bonificaciones de campo por bonificaciones del Consejo."
 mod_trait_storm_rider: "\n$t$Los efectos de los rasgos se amplifican mientras este líder resida dentro de una tormenta cósmica."
 leader_trait_storm_rider_name: "Jinete de tormentas"
 leader_trait_storm_rider_commander: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_commander_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_scientist: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_scientist_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_official: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_official_desc: "$leader_trait_storm_rider_desc$"
 #Storm Chasers specific Progress Events
 progress.2.desc.storm.normal: "Citando textualmente a un [Root.Owner.GetScientist]: \"¡Mirad qué cosita!\".\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.gestalt: "Nuestras almas vibran de entusiasmo.\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.outro: "¡Formas de vida alienígenas aquí, en [From.GetName]! Si bien tardaremos en poder entablar una conversación con estos seres asilvestrados, al menos ahora sabemos que no estamos solos en nuestro viaje cósmico.\n\nQuién sabe; tal vez la galaxia esté repleta de formas de vida que aún desconocemos."
 progress.3.desc.storm.normal: "\"¡Increíble!\", exclamó [ruler.GetRegnalName]. \"¡Un mundo nuevo cargado de oportunidades!\".\n\nMientras convertimos nuestra nave colonia en campamento base, los primeros exploradores ya se pertrechan para la experiencia que este mundo les depara."
 progress.3.desc.storm.gestalt: "\"¡Un hallazgo emocionante! ¡Un mundo nuevo cargado de oportunidades!\".\n\nMientras convertimos nuestra nave colonia en campamento base, los nodos exploradores ya se pertrechan para la experiencia que este mundo les depara."
 progress.3.a.storm: "¡Hacia delante!"
 progress.4.desc.storm: "El silencio sepulcral del espacio se ha roto: ¡nuestras llamadas reciben respuesta! Se trata de una civilización alienígena con tecnología equivalente; debieron de entrar en la refriega galáctica justo cuando lo hicimos nosotros.\n\nSu aparición anuncia una nueva frontera de experiencias. ¿Estamos ante posibles aliados, o ante rivales que nos pondrán a prueba? En cualquier caso, la emoción de lo desconocido nos insta a continuar."
 progress.4.h.storm: "Qué intrigante."
 progress.5.desc.storm.normal: "Hemos descubierto formas de vida preinteligente en [From.Planet.GetName]. Como ha formulado uno de nuestros [Root.Owner.GetScientistPlural], \"por insignificantes que puedan parecer estos seres ahora, ¡poseen un potencial inmenso!\".\n\nPor ahora, no obstante, siguen siendo preinteligentes. Resultará de lo más interesante observar su desarrollo."
 progress.5.desc.storm.gestalt: "Hemos descubierto formas de vida preinteligente en [From.Planet.GetName].\n\nAunque no vemos la hora de presenciar el florecer de su potencial, por ahora siguen siendo preinteligentes. Resultará de lo más interesante observar el desarrollo de estas criaturas."
 progress.5.h.storm: "Flipante."
 progress.6.desc.storm: "¡Una respuesta a nuestras llamadas quebranta el silencio sepulcral del espacio! Sin embargo, la primera impresión no es muy positiva que se diga. Estos seres no comparten nuestras costumbres y prefieren evitarnos. Será mejor no insistir por el momento."
 progress.6.h.storm: "Les convendría modernizarse."
 pirate.1.desc.storm: "¡Piratas espaciales! Aunque suene épico, un colectivo que se hace llamar §S[pirate_band.GetName]§! nos tiene en el punto de mira.\n\nAunque respetamos su elección de estilo de vida, el efecto que tiene en nuestras redes comerciales es de todo menos ideal."
 pirate.2.j.storm: "Qué desgracia."
 ### STORMFALL SITUATION START ###
 situation_stormfall: "Tormenta incipiente"
 situation_stormfall_type: "Situación de origen"
 situation_stormfall_desc: "El clima intenso de [owner.capital_scope.GetName] nos ha revelado el estimulante poder de las tormentas. Si perfeccionamos el control del clima planetario, podremos utilizar ese conocimiento a escala cósmica. La construcción de edificios de atracción de tormentas acelerarán nuestros progresos de cara a crear la madre de todas las tormentas."
 situation_stormfall_monthly_change_tooltip: "Aprenderemos a controlar esas tormentas."
 situation_stormfall_outcome: "El nacimiento de una tormenta cósmica."
 stage_stormfall_effects: "Debemos aprender a manipular las tormentas cósmicas."
