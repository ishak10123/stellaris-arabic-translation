 TEMPEST_INVOCATOR_VIEW_HEADER: "Generar tormenta"
 TEMPEST_INVOCATOR_VIEW_BODY: "Aun en estado letárgico, el potencial que alberga este dispositivo es tangible. Si reunimos el valor para usarlo, aprovecharemos el poder de las mismísimas tormentas.\n\nElige una ubicación para generar una $nexus_storm_color_tooltip$."
 #Tutorial Localisation
 cstorms_tutorial.a: "Entendido"
 cstorms_tutorial.1.name: "Tutorial: manipulación de tormentas"
 cstorms_tutorial.1.desc: "Podemos §Smanipular§! la §Strayectoria§! de una §Y$default_storm$§! para nuestro beneficio, ya sea §Sdesviándola§! de nuestros sistemas, o bien §Satrayéndola§! para aprovechar sus efectos positivos."
 TUTORIAL_STORM_FORECAST_MAP_MODE_TITLE: "Tutorial: pronóstico meteorológico"
 TUTORIAL_STORM_FORECAST_MAP_MODE_DESC: "Este modo de mapa muestra todas las §Stormentas cósmicas§! de la galaxia, así como información sobre sus efectos.\n\n£storm_forecast_map£\n\nPara acceder al modo de mapa Pronóstico meteorológico, haz clic en el icono del mapa que hay abajo a la derecha.\n\nAl avanzar la tecnología, el mapa se puede mejorar para ofrecer predicciones más precisas no solo de la posición y el rumbo de una §S$default_storm$§!, sino también del tipo de tormenta que cabe esperar."
 concept_weather_forecasting_mode: "Modo Pronóstico meteorológico"
 concept_weather_forecasting_mode_desc: "$TUTORIAL_STORM_FORECAST_MAP_MODE_DESC$"
 TUTORIAL_STORM_PROTECTION_TITLE: "Tutorial: tormentas cósmicas"
 TUTORIAL_STORM_PROTECTION_DESC: "Las §Stormentas cósmicas§! son una fuerza de la naturaleza formidable. Su efecto puede ser devastador para nuestras flotas, economía e incluso población, pero también pueden ofrecernos oportunidades magníficas.\n\nAl investigar §Stecnologías de tormentas§!, podremos obtener edificios y tecnologías que §Sreduzcan§! en gran medida los §Sefectos§! negativos de una tormenta. Con §Sinvestigación adicional§!, tal vez logremos incluso §Ssacar provecho§! de las tormentas."
