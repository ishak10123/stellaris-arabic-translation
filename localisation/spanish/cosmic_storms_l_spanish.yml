 particle_storm_fleet_tt: "- $MOD_SHIP_HULL_REGEN_ADD_PERC$, $MOD_SHIP_ARMOR_REGEN_ADD_PERC$ y $MOD_SHIP_SHIELD_REGEN_ADD_PERC$ se §Rdesactivan§! para naves y estaciones.\n- Provoca §R$@storm_monthly_dmg_low|0$§! de daño por mes a naves y estaciones con más de $@storm_hp_perc_limit|0Y%$ $HITPOINTS$.\n- Gana §G+$@particle_storm_unity_per_ship|0$§! £unity£ $unity$ de naves con $@storm_hp_perc_limit|0Y%$ $HITPOINTS$ o menos."
