 #Storm Tech Insight events
 cstorms.505.name: "Capear la tempestad"
 cstorms.505.desc: "Tras la devastadora §H[this.GetAffectedStormType]§!, hemos obtenido información única sobre estos fenómenos galácticos.\n\nEl estudio de la astrometeorología nos permitirá protegernos mejor de cara al futuro. Este nuevo campo de investigación podría crear medios para controlar las tormentas."
 #Storm Buildings
 building_storm_attraction_center: "Centro de atracción de tormentas"
 building_storm_attraction_center_desc: "Gracias a una meticulosa manipulación de las fuerzas gravitatorias, estas instalaciones atraerán las tormentas cósmicas cercanas."
 building_advanced_storm_attraction_center: "Centro avanzado de atracción de tormentas"
 building_advanced_storm_attraction_center_desc: "Los conocimientos avanzados sobre energía oscura nos permiten cargar a tope cada $building_storm_attraction_center$ y atraer tormentas cósmicas con más eficacia."
 building_storm_repellent_center: "Centro de repulsión de tormentas"
 building_storm_repellent_center_desc: "Cuanto más dure una tormenta, más segura y tranquila se sentirá nuestra población. Los complejos instrumentos astrometeorológicos de estos centros repelerán las tormentas cercanas."
 building_advanced_storm_repellent_center: "Centro avanzado de repulsión de tormentas"
 building_advanced_storm_repellent_center_desc: "Este centro se encarga de producir manipulaciones espaciotemporales para que nuestro mundo quede libre de tempestades cósmicas."
 building_storm_resistant_production: "Centro mitigador de tormentas"
 building_storm_resistant_production_desc: "Este centro de ayuda asiste a los esfuerzos locales para anular el impacto de una tormenta cósmica en la producción planetaria. Gracias a su eficacia en la coordinación y la comunicación, el $building_storm_resistant_production$ permite el rápido despliegue de equipos de rescate. Además, mejora las condiciones para el comercio en todo el planeta."
 building_storm_resistant_production_tt: "Los efectos negativos de la §Y$default_storm$§! que afectan a la producción del planeta se reducen en un §G30%§!.\n\nDurante una §Y$default_storm$§!:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+0,5§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+0,5§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+0,5§! \n\nPermite la decisión planetaria §Y$decision_hunker_down$§!"
 building_advanced_storm_resistant_production: "Anulador de tormentas"
 building_advanced_storm_resistant_production_desc: "Al incorporar sistemas de control climático en cada $building_storm_resistant_production$, los efectos negativos de las tormentas cósmicas se reducen significativamente. Además, los equipos de rescate pueden desplegarse de manera aún más eficiente y el comercio planetario es prácticamente inmune a las condiciones climáticas locales."
 building_advanced_storm_resistant_production_tt: "Los efectos negativos de la §Y$default_storm$§! que afectan a la producción del planeta se reducen en un §G45%§!.\n\nDurante una §Y$default_storm$§!:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+1§! \n\nPermite la decisión planetaria §Y$decision_hunker_down$§!"
 building_adakkaria_patriotic_institute: "Instituto Patriótico de Celebración"
 building_adakkaria_patriotic_institute_desc: "El $building_adakkaria_patriotic_institute$ es una cámara de conocimientos avanzados sobre la condición sintiente. Aquí, animamos a la gente a cultivar su tempestad interna mientras evitan el seductor canto de la cruel Convención."
 building_adakkaria_patriotic_institute_effect_desc: "Si una tormenta cósmica pasa por este sistema, existe un 10% de probabilidad de que £pop£ §Hpoblaciones§! obtengan el rasgo $Name_Storm_Fused$."
 building_adakkaria_patriotic_institute_effect_upgrade_desc: "Si una tormenta cósmica pasa por este sistema, existe un 40% de probabilidad de que £pop£ §Hpoblaciones§! obtengan el rasgo $Name_Storm_Fused$. Además, hay un 20% de probabilidad de que, cada 10 años, §Y100§! £pop£ §Hpoblaciones§! se conviertan en una tormenta cósmica."
 building_astrometeorology_observation_center: "Observatorio astrometeorológico"
 building_astrometeorology_observation_center_desc: "Gracias a unos delicados sensores, este centro de observación estudia las condiciones del entorno para mejorar nuestro entendimiento del universo natural."
 concept_building_astrometeorology_observation_center: "$building_astrometeorology_observation_center$"
 building_storm_summoning_theater: "Teatro invocador de tormentas"
 building_storm_summoning_theater_desc: "Con una mezcla de júbilo, arte y tecnología, los giros de nuestros $job_storm_dancer_plural$ atraen tormentas cósmicas."
 building_storm_holo_theater: "Holosalón de tormentas"
 building_storm_holo_theater_desc: "El $building_storm_holo_theater$ retransmite a todo el planeta y más allá, a fin de expandir el alcance de nuestros hipnóticos $job_storm_dancer_plural$."
 building_storm_grand_theater: "Gran teatro de tormentas"
 building_storm_grand_theater_desc: "Estos grandes teatros aúnan las proezas artísticas y tecnológicas de vanguardia, además de ser el recinto perfecto para el baile supremo."
 sm_storm_attraction_computer: "Matriz de atracción de tormentas"
 sm_storm_attraction_computer_desc: "Este componente nos permite manipular las condiciones gravitatorias locales para atraer las tormentas de las profundidades del espacio."
 sm_storm_repelling_computer: "Matriz de repulsión de tormentas"
 sm_storm_repelling_computer_desc: "Esta matriz de potentes láseres es capaz de crear espacios con partículas de alta carga magnética, lo que genera una fuerza natural que repele las tormentas cósmicas."
 #Jobs
 astrometeorologist: "$job_astrometeorologist$"
 job_astrometeorologist: "Astrometeorólogo"
 job_astrometeorologist_plural: "Astrometeorólogos"
 job_astrometeorologist_desc: "Los $job_astrometeorologist_plural$ se especializan en investigar los efectos ambientales cósmicos."
 job_astrometeorologist_effect_desc: "Las $job_astrometeorologist_plural_with_icon$ convierten $r_consumer_goods$ en $r_physics$\n\nEl rendimiento del trabajo aumenta cuando este sistema presenta un §Yefecto ambiental§!"
 job_astrometeorologist_with_icon: "£job_astrometeorologist£ $job_astrometeorologist$"
