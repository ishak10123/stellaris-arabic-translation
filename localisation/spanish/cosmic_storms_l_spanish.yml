 resolution_category_storm_environmentalists_stances: "Ambientalistas de las tormentas"
 resolution_space_storm_environmentalists_stances_repeal_desc: "La comunidad galáctica no debería dictar la respuesta de un imperio a las tormentas cósmicas."
 resolution_cosmic_storms_advanced_storm_studies: "Estudios avanzados sobre tormentas"
 resolution_cosmic_storms_advanced_storm_studies_desc: "Las tormentas son hermosas y respetables fuerzas de la naturaleza de las que conviene aprender."
 resolution_cosmic_storms_advanced_storm_studies_tooltip: "$storm_tech_cost$ §R+20%§!"
 resolution_cosmic_storms_advanced_storm_studies_repeal: "Derogar $resolution_cosmic_storms_advanced_storm_studies$"
 resolution_cosmic_storms_advanced_storm_studies_repeal_desc: "$resolution_space_storm_environmentalists_stances_repeal_desc$"
 resolution_cosmic_storms_advanced_storm_studies_repeal_effect_success: "Deroga la resolución §Y$resolution_cosmic_storms_advanced_storm_studies$§!."
 resolution_cosmic_storms_galactic_emergency_relief: "Asistencia en emergencias galácticas"
 resolution_cosmic_storms_galactic_emergency_relief_desc: "Debemos brindar ayuda a los más afectados por los efectos de las tormentas cósmicas."
 resolution_cosmic_storms_galactic_emergency_relief_tooltip: "Desbloquea el §Yfondo de emergencia§!, que requiere que cada miembro de [global_event_country.GetCommunityOrImperium] contribuya con el §R5%§! de su producción de $r_energy$.\n\nLos miembros de [global_event_country.GetCommunityOrImperium] afectados por una §Y$default_storm$§! recibirán §G+3§! de $r_energy$ al mes por cada sistema afectado.\n\n$storm_tech_cost$ §R+30%§!"
 resolution_cosmic_storms_galactic_emergency_relief_repeal: "Derogar $resolution_cosmic_storms_galactic_emergency_relief$"
 resolution_cosmic_storms_galactic_emergency_relief_repeal_desc: "$resolution_space_storm_environmentalists_stances_repeal_desc$"
 resolution_cosmic_storms_galactic_emergency_relief_repeal_effect_success: "Deroga la resolución §Y$resolution_cosmic_storms_galactic_emergency_relief$§! y deja la §Y$resolution_cosmic_storms_advanced_storm_studies$§! como ley galáctica."
 resolution_cosmic_storms_storm_encouragement_mandate: "Mandato del movimiento de las tormentas"
 resolution_cosmic_storms_storm_encouragement_mandate_desc: "Al dispersar las partículas vitales y la energía, las tormentas cósmicas insuflan vida en la galaxia, revitalizando los planetas y los sistemas a su paso. No pongamos trabas a este conducto natural."
 resolution_cosmic_storms_storm_encouragement_mandate_tooltip: "$emergency_fund_contribution$ §R10%§! \n\n$storm_tech_cost$ §R+50%§!\n\n$breach_galactic_law_intro$$TABBED_NEW_LINE$- §YTecnología de repulsión de tormentas§!"
 resolution_cosmic_storms_storm_encouragement_mandate_repeal: "Derogar $resolution_cosmic_storms_storm_encouragement_mandate$"
