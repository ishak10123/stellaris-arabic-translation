 ###########################################
 #Anomalies #
 ###########################################
 STORMS_ANOM_ANTS: "El cometa orgánico"
 STORMS_ANOM_ANTS_DESC: "Una tormenta cósmica ha dejado un cometa con una composición inusual. Parece estar compuesto de un material orgánico. Nuestros [solar_system.Owner.GetScientistPlural] están ansiosos por investigarlo."
 cstorms.5020.name: "Hormigasteroide"
 cstorms.5020.desc: "El cometa ha resultado ser un nido gigante de diminutos insectos. La estela del cometa no es hielo desgasificado, sino restos de los procesos químicos que se producen en el interior de la colmena.\n\nLa capa exterior del nido está compuesta por individuos muertos que protegen a los vivos del interior de las duras condiciones del espacio. También hemos detectado varios tipos de hongos viviendo tanto dentro como alrededor del nido. Se trata de una simbiosis muy compleja en la que los hongos se alimentan de los gases del escape y los insectos —a su vez— de los hongos."
 cstorms.5020.a: "Cosechemos el nido."
 cstorms.5020.b: "Se mira, pero no se toca."
 STORMS_ANOM_STAT: "Composición confusa"
 STORMS_ANOM_STAT_DESC: "Una tormenta cósmica ha dejado este artefacto orbital. Parece una estación espacial, pero los análisis de su composición estructural arrojan resultados muy confusos. Recomendamos su investigación."
 cstorms.5030.name: "Apocalipsis inerte"
 cstorms.5030.desc: "Los [Root.Owner.GetScientistPlural] informan de que gran parte de la estación espacial se ha construido con objetos inertes y apenas se sostiene. Por dentro de la estructura, los materiales están transicionando de aleaciones de metal a plásticos y otras sustancias.\n\nEn el interior de la construcción, encontramos una máquina que seguía afanada en el proceso de deconstruir materiales orgánicos con eficacia y convertirlos en los artefactos que habíamos visto.\n\nTras realizar un modelo de simulación de ADN, nuestros [Root.Owner.GetScientistPlural] confirman que el material procedía de los habitantes de este puesto."
 cstorms.5030.evopred: "A ver si podemos sacar algo de provecho."
 STORMS_ANOM_BRAIN: "Disipación existencialista"
 STORMS_ANOM_BRAIN_DESC: "Desde que una $shroud_storm$ asolara este sistema, captamos unas extrañas señales. No obstante, en cuanto nuestros [Root.Owner.GetScientistPlural] tratan de responder a esta cacofonía de mensajes, vuelve a disiparse. Recomiendan enviar una nave científica."
 cstorms.5025.name: "Tormenta de ideas"
 cstorms.5025.desc: "Lo que descubrimos sobrepasó toda lógica: cerebros. Órganos cárnicos de procesamiento central de toda clase de especies. Los había por centenares, y todos estaban conectados y suspendidos en una gran cápsula con forma de globo. Según parece, ha estado vagando por las profundidades del espacio desde que una $shroud_storm$ reciente se disipó.\n\nLa cápsula contiene una increíble variedad de sensores conectados al cerebro y al globo, y también hay un módulo de comunicación capaz de llamar a naves y transmitir información, tal como hizo con nosotros.\n\nLos más probable es que fueran los cerebros los que entablaron contacto, lo que explicaría la cacofonía de mensajes. Nuestros [Root.Owner.GetScientistPlural] opinan que la estructura se diseñó para medir las respuestas orgánicas a una $shroud_storm$. Dado el residuo psiónico inestable de estas mentes flotantes, interactuar con ellas solo conduciría al desastre."
 #Terrestrial Telescopes
 terrestial_telescope_category: "Telescopios terrestres"
 terrestial_telescope_category_desc: "Los análisis realizados por [fleet.GetName] señalan la presencia de una estación espacial flotando a la deriva en el sistema [From.GetStarName].\n\nParece que acabó aquí tras una tormenta cósmica. No se detectan señales de vida, ni tampoco de energía. Dos gigantescos telescopios sobresalen a ambos lados de la estación. Estos instrumentos ópticos parecen avanzados y demasiado grandes en relación con el tamaño de la estación. Su tecnología y arquitectura no nos resultan familiares.\n\nPodríamos intentar reactivar los telescopios con la esperanza de obtener información de valor."
 cstorms.1605.name: "Telescopios terrestres"
 cstorms.1605.desc: "Abordar la estación y activar los telescopios requirió cierta sutileza por parte de nuestros [Root.Owner.GetScientistPlural], pero no fue nada que no pudieran manejar. Sin embargo, los instrumentos apuntaban a un rincón de la galaxia sin nada reseñable.\n\nPor la estación había desperdigados unos artefactos de lo más interesantes; eran imágenes detalladas grabadas con los telescopios, cuidadosamente presentadas en marcos decorativos. Cada imagen se centraba en las tormentas cósmicas que pasaban por este sistema e ilustraban las numerosas huellas de cada una. Quien manejaba el telescopio hizo uso de varios ángulos, niveles de zoom e incluso planos artísticos para mostrar las tormentas en todo su esplendor.\n\nSeguimos investigando, pero las obras fueron lo más interesante que encontramos a bordo de la estación abandonada. Archivaremos estas imágenes para que las futuras generaciones puedan admirar su extraño poder y belleza."
 STORMS_ANOM_POLYCHROMATIC: "Estrella policromática"
 STORMS_ANOM_POLYCHROMATIC_DESC: "El paso de una tormenta cósmica a través del sistema [from.solar_system.GetName] ha transformado la apariencia visual de la estrella del sistema. Su capa coronaria muestra un remolino de colores cambiantes que emite fulgores policromáticos en todas las direcciones. El fenómeno merece un análisis más profundo."
 cstorms.5035.name: "$STORMS_ANOM_POLYCHROMATIC$"
 cstorms.5035.desc: "[root.leader.GetName] informa de unos cambios fascinantes en las reacciones de fusión de [From.GetStarName] tras el paso de la [from.GetAffectedStormType].\n\nSegún parece, la tormenta ha provocado unas sorprendentes reacciones nucleares en el núcleo de la estrella, cuyas zonas convectivas liberan [from.GetEarnedResources] de manera constante.\n\nEstas complejas reacciones idiosincrásicas emiten los peculiares fulgores policromáticos que hemos estado observando. En todo caso, será una materia digna de estudio por una temporada."
 cstorms.5035.a: "Estudiemos estos nuevos procesos."
 cstorms.5035.b: "Cosechemos estos nuevos recursos."
 STORMS_ANOM_TRIPLETS: "Trío de asteroides"
 STORMS_ANOM_TRIPLETS_DESC: "Una tormenta cósmica ha dejado a su paso tres nuevos asteroides en el sistema [from.solar_system.GetName]. Estos cuerpos celestes tienden a cambiar de dirección de manera inexplicable, por lo que resulta imposible predecir sus trayectorias. Hay que seguir investigando."
 cstorms.5040.name: "$STORMS_ANOM_TRIPLETS$"
 cstorms.5040.desc: "[root.leader.GetName] ha descubierto que los asteroides depositados en el sistema [from.solar_system.GetName] cuentan con unos campos magnéticos muy inestables que los hacen rebotar al azar contra las magnetosferas del sistema.\n\n[root.leader.GetName] los ha estabilizado al instalar compensadores magnéticos en cada asteroide para regular sus trayectorias y facilitar la extracción de recursos."
 STORMS_ANOM_TRAVELLERS: "Señal de socorro tras la tormenta"
 STORMS_ANOM_TRAVELLERS_DESC: "A raíz de la §H[from.GetAffectedStormType]§!, se ha detectado una señal de socorro no identificada en el sistema §H[from.solar_system.GetName]§!."
 cstorms.5050.name: "Viajeros desplazados"
 cstorms.5050.desc: "Hemos identificado la fuente de la señal de socorro proveniente del sistema §H[from.solar_system.GetName]§!. Se trata de una nave mercante muy dañada, pero aún operativa.\n\nLos ocupantes afirman que la §H[from.GetAffectedStormType]§! los desvió de su rumbo. Además, la tormenta quemó los motores de la nave, que quedó a la deriva en nuestro espacio.\n\nEstán dispuestos a compartir parte de su cargamento si los ayudamos."
 cstorms.5050.a: "Vamos a ayudarlos."
 cstorms.5050.evopred: "Ayudaremos a cambio de algunas muestras de ADN."
 cstorms.5050.b: "Les deseamos suerte."
 cstorms.5050.c.genocide: "Arrebatémosles la vida y el cargamento."
 cstorms.5050.d.devouring_swarm: "Comida gratis."
 STORMS_COSMIC_SLUDGE: "Lodo cósmico"
 STORMS_COSMIC_SLUDGE_DESC: "Los sensores de masa que supervisan §H[from.solar_system.GetName]§! muestran lecturas erráticas como secuela de la §H[from.GetAffectedStormType]§!.\n\nEl diagnóstico del sistema no detecta ningún error técnico en el equipo. Estas lecturas requieren más investigación."
 cstorms.5060.name: "$STORMS_COSMIC_SLUDGE$"
 cstorms.5060.desc: "Las lecturas erráticas de los sensores del sistema §H[from.solar_system.GetName]§! se deben a una formación excepcional de detritos dejada por la §H[from.GetAffectedStormType]§!.\n\nEsta entidad a la deriva es una acumulación informe de lodo cósmico formada entre las inmensas presiones de la tormenta. Sus múltiples componentes han dado lugar a un compuesto de reactividad única.\n\nUn estudio serio de su composición química podría ofrecernos valiosa información astrometeorológica sobre las circunstancias que la produjeron."
 cstorms.5060.a: "Estudiad su composición."
 cstorms.5060.b: "Recicladla."
 STORMS_SHATTERED_SATTELITE: "Satélite destrozado"
 STORMS_SHATTERED_SATTELITE_DESC: "A raíz de la §H[from.GetAffectedStormType]§!, se ha detectado un objeto no identificado en el sistema §H[from.solar_system.GetName]§!. Un análisis de estos restos podría ofrecer información valiosa."
 cstorms.5070.name: "$STORMS_SHATTERED_SATTELITE$"
 cstorms.5070.desc: "El objeto del sistema §H[from.solar_system.GetName]§! está compuesto por los restos de un satélite antiguo que estaba equipado con complejos sensores astrometeorológicos. Creemos que la §H[from.GetAffectedStormType]§! lo arrastró a gran distancia a través la galaxia.\n\nAunque está tan dañado que es imposible repararlo, sus bases de datos centrales contienen gran cantidad de información que podemos reutilizar para nuestro provecho.\n\nEl resto del satélite solo sirve como chatarra."
 STORMS_EVISCERATED_FAUNA: "Artefacto extraño"
 STORMS_EVISCERATED_FAUNA_DESC: "Los sensores del sistema §H[from.solar_system.GetName]§! han detectado un objeto desconocido que fue arrastrado al sistema por la reciente §H[from.GetAffectedStormType]§!.\n\nEs necesaria una inspección para determinar la naturaleza de la anomalía."
 cstorms.5080.name: "Detritos orgánicos"
 cstorms.5080.desc.common: "El objeto extraño del sistema §H[from.solar_system.GetName]§! ha resultado ser una gran masa de restos orgánicos procedentes de alguna clase de fauna espacial. Dado que la tormenta cósmica ha destruido todo rasgo identificable, es imposible catalogar correctamente los restos biológicos."
 cstorms.5080.desc.swarm: "Por suerte, es comestible en gran parte."
 cstorms.5080.desc.default: "[leader.GetName] confía en que un análisis forense más detallado de los restos revele más información sobre la naturaleza de su origen y sobre los efectos de una §Y[from.GetAffectedStormType]§! en organismos espaciales similares."
 cstorms.5080.a: "Tenemos hambre."
 cstorms.5080.b: "Realicemos una autopsia in situ."
 cstorms.5080.c: "Nos desharemos de los restos."
 FORENSIC_DISSECTION_PROJECT: "Disección forense"
 FORENSIC_DISSECTION_PROJECT_DESC: "Hemos encontrado los restos de un ser desconocido en el sistema §H[solar_system.GetName]§!, los cuales fueron arrastrados por una tormenta cósmica. Una disección forense del cadáver revelará más información."
 cstorms.5085.name: "$FORENSIC_DISSECTION_PROJECT$"
 cstorms.5085.desc: "Tras una disección minuciosa, sigue siendo un misterio la especie que dio origen a esta masa de vísceras. Los daños en el centro de la tormenta la han desprovisto de rasgos reconocibles y marcadores genéticos.\n\nSin embargo, durante su estudio hemos obtenido información sobre la composición de las §Ytormentas cósmicas§! y sus devastadores efectos sobre la materia xenobiológica."
 cstorms.5085.evopred: "Una comida fascinante."
 STORMS_DISPLACED_TIYANKI: "Tiyanki desplazados"
 STORMS_DISPLACED_TIYANKI_DESC: "Después de la $default_storm$, nuestros sensores han detectado tres señales tiyanki en el sistema §H[solar_system.GetName]§!."
 cstorms.5090.name: "$STORMS_DISPLACED_TIYANKI$"
 cstorms.5090.desc.common: "Se han identificado las tres señales tiyanki en el sistema §H[solar_system.GetName]§! como un grupo de terneros desplazados y desnutridos.\n\nLa §Y$default_storm$§! los ha separado de su cápsula y los ha dejado indefensos.\n\nSerá difícil que sobrevivan en el espacio abierto. Nuestros sensores indican que están intentando llamar a su cápsula, pero sin éxito."
 cstorms.5090.desc.swarm: "Podemos amplificar sus gritos de auxilio como cebo para atraer más alimento."
 cstorms.5090.desc.default: "Nuestros sistemas de comunicación pueden servir para amplificar sus gritos de auxilio y atraer a su cápsula a este sistema."
 cstorms.5090.a.default: "Amplifiquemos su señal."
 cstorms.5090.a.swarm: "Que sirvan de cebo."
 cstorms.5090.b.default: "La naturaleza es cruel."
 cstorms.5090.b.machine: "Iniciad los protocolos de exterminio."
 cstorms.5090.b.swarm: "Comida gratis."
 cstorms.5090.c: "Démosles un nuevo hogar."
 cstorms.5090.c.tt: "Añade 3 §Y$NAME_Tiyanki_Hatchling$§! de rareza aleatoria a tu ['concept_vivarium']"
 REUNITE_POD_PROJECT: "Reunión con la cápsula"
 REUNITE_POD_PROJECT_DESC: "Tres terneros tiyanki se han perdido y vagan por el sistema [this.solar_system.GetName] separados de su cápsula por una tormenta cósmica. Si amplificamos sus gritos, podemos atraer a este sistema al resto de su cápsula y ayudarlos a reunirse."
 cstorms.5095.name: "Tiyanki reunidos"
 cstorms.5095.desc.common: "Han aparecido una vaca y un toro tiyanki en el sistema §H[solar_system.GetName]§! porque han captado los gritos amplificados de los tres terneros perdidos.\n\nLas crías de tiyanki han regresado a su cápsula y ya tienen un aspecto más sano y feliz.\n\nLa vaca ha depositado una gran masa de restos junto a nuestro navío científico como una especie de agradecimiento por la ayuda. Para nuestra sorpresa, este curioso regalo contiene varios materiales útiles."
 cstorms.5095.desc.swarm: "Por supuesto, el verdadero premio son estas grandes bestias, cebadas y listas para la matanza."
