 solar_storm_aftermath_modifier_severity_desc: "Habida cuenta de los altos niveles de radiación que ha causado la $solar_storm$, se ha vuelto necesario vivir en un confinamiento cuasi perenne. Debido al estricto control de los espacios habitables, el control armado del planeta se ha vuelto mucho más sencillo en detrimento de una población desalentada."
