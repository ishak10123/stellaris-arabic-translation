 #Weather Manipulator
 r_weather_manipulator: "Opresor de perturbaciones"
 r_weather_manipulator_desc: "Una versión más avanzada de la máquina que usaban los comerciantes ricinos para manipular las tormentas cósmicas. Este dispositivo tiene como función predeterminada aumentar la efectividad de toda nuestra tecnología de tormentas. No obstante, si le damos un uso adecuado, podremos hasta alejar las tormentas de nuestras fronteras."
 storm_relic_repelling_field_modifier: "Activación de opresor de perturbaciones"
 storm_relic_repelling_field_modifier_tt: "Genera un campo §Mextragrande§! de repulsión de §Y$default_storm$§! que cubrirá la capital del imperio durante 36 meses."
 #Temporary effect used by the Inetian Precursor Digsite C
 storm_timed_repelling_field_modifier: "Activación de depresores de perturbaciones sectoriales"
 storm_timed_repelling_field_modifier_tt: "Genera un campo §Hmediano§! de repulsión de §Y$default_storm$§! que cubrirá la capital del imperio durante 18 meses."
 #The Tempest Invocator
 r_the_tempest_invocator: "Invocador de tempestades"
 r_the_tempest_invocator_desc: "El potencial de este dispositivo es evidente incluso cuando está apagado. ¿Nos atreveremos a invocar una furia tempestuosa en el cuerpo de una de nuestras mentes más brillantes? La gloria de nuestra nación exige sacrificios."
 r_the_tempest_invocator_active_effect_tt: "Genera una ['concept_nexus_storm'] en el sistema de tu elección.\n$t$Cuando se seleccione un sistema, se §Psacrificará§! un $scientist_with_icon$."
 r_the_tempest_invocator_requirement_fail_tt: "$TRIGGER_FAIL$§RNo puede sacrificarse ningún $scientist_with_icon$.§!"
 r_the_tempest_invocator_started_placing_fail_tt: "$TRIGGER_FAIL$§REl sistema de colocación de tormentas ya está activado.§!"
 tempest_invocator_active_modifier: "Repulsión de tempestad"
