 #Storm in a Box
 cstorms.1816.name: "Cápsula a la deriva"
 cstorms.1816.desc: "Una misteriosa cápsula flota a la deriva por §H[this.GetName]§!. A simple vista, carece de armamento ofensivo y no responde a nuestras señales.\n\nLos escáneres iniciales muestran que su deteriorado exterior se construyó con materiales avanzados y técnicas de ingeniería desconocidas. Se requieren más análisis."
 cstorms.1816.a: "Investigad."
 STORM_IN_A_BOX_INVESTIGATE_PROJECT: "Estudiar la cápsula"
 STORM_IN_A_BOX_INVESTIGATE_PROJECT_DESC: "Una misteriosa cápsula con daños visibles flota a la deriva por el sistema §H[this.GetName]§!. Desconocemos su origen y función. A simple vista, no posee armamento y creemos que un análisis más detallado de su avanzada construcción sería una empresa segura y beneficiosa."
 cstorms.1820.name: "Atrapatormentas"
 cstorms.1820.desc: "[this.leader.GetName] cree que la misteriosa cápsula que flota a la deriva por el sistema [solar_system.GetName] es un antiguo \"atrapatormentas\" que podría haber pertenecido a una red defensiva más grande.\n\nEl puerto de entrada del dispositivo está sellado a cal y canto, si bien nuestras lecturas sugieren que alberga la energía y la materia comprimidas de una tormenta cósmica atrapada en su interior.\n\nSi hallamos el modo de abrir este impresionante contenedor, podremos aprender mucho sobre la mitigación de tormentas, aun con el riesgo de liberar la fuerza que ahora mismo encierra."
 cstorms.1820.a: "Tenemos mucho que aprender."
 cstorms.1820.b: "Es demasiado peligroso. Mejor lo dejamos."
 STORM_IN_A_BOX_TRAP_PROJECT: "Abrir el atrapatormentas"
 STORM_IN_A_BOX_TRAP_PROJECT_DESC: "Un antiguo \"atrapatormentas\" flota a la deriva por el espacio con una tormenta cósmica comprimida en su interior. Abrirlo arrojaría información valiosa sobre la gestión y mitigación de las tormentas, a riesgo de liberar la fuerza que contiene."
 cstorms.1826.name: "Tormenta liberada"
 cstorms.1826.desc: "Tras completar el análisis del funcionamiento del antiguo atrapatormentas, [leader.GetName] ha podido desbloquear el mecanismo de entrada. Cuando los puertos se abrieron, la §H[from.GetStormType]§! que contenía se liberó en el vacío del sistema [solar_system.GetName].\n\nEl estudio de la compleja ingeniería del artilugio ha arrojado resultados fascinantes sobre materiales y estructuras resistentes a las tormentas. No obstante, seguimos sin comprender cómo hace el dispositivo para encerrar las tormentas en su totalidad. Este conocimiento nos será de gran utilidad para aplacar futuras perturbaciones cósmicas."
 cstorms.1826.storm_tt: "Una pequeña §Y$default_storm$§! de nivel bajo se ha generado en el sistema [solar_system.GetName]."
 storm_trap_insight_modifier: "Conocimientos sobre atrapatormentas"
 storm_trap_insight_modifier_tt: "Reduce los efectos negativos de las §Ytormentas cósmicas§! en un §G10%§!."
 cstorms.1835.desc: "¡Nuestras condolencias, [this.GetSpeciesNamePlural]! Hemos presenciado cómo una gran tormenta ha sembrado el caos en [this.GetName].\n\nHuelga decir que nos entristecimos al ver los daños que ha causado. Hemos llorado, ¡vaya si lo hemos hecho! Rogamos que aceptéis nuestra ayuda... ¡con una ofertaza única!\n\nPodemos abasteceros de artilugios de categoría. ¡Lo mejor de nuestra cosecha! Con ellos, estaréis preparados para la siguiente tormenta. ¿Y bien? ¿Hay trato?"
 cstorms.1835.a: "Aceptamos."
 cstorms.1835.b: "No nos interesa."
