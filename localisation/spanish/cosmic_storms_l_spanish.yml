 gravity_storm_energy_upkeep_tt: "Si el propietario de una colonia es un imperio de conciencia gestalt:\n$t$Mantenimiento de $r_energy$ de [farmer.GetIcon] [GetFarmerPlural], [miner.GetIcon] [GetMinerPlural] y [technician.GetIcon] [GetTechnicianPlural]: §R+1§!"
