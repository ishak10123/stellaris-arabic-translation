 acidic_spores: "Esporas ácidas"
 acidic_spores_desc_short: "La flora de [from.GetName] desarrolló a lo largo de su evolución este mecanismo de defensa con el fin de mantener a raya a las especies herbívoras dominantes"
 acidic_spores_desc_details: "A causa del gas corrosivo que expulsa, grandes extensiones del planeta han quedado inhabitables por su toxicidad. Posteriormente, se sintetizó una versión menos potente de dicho gas, y hoy se utiliza como un eficaz pesticida."
 adakkaria_propaganda_poster: "Cartel propagandístico de adAkkaria"
 adakkaria_propaganda_poster_desc_short: "Esta lámina proclama con orgullo la gloria de la Convención de adAkkaria"
 adakkaria_propaganda_poster_desc_details: "En el cartel se ilustra a ciudadanos que aparentan entereza, orgullo y valentía. Alzan los tentáculos hacia el cielo, como si tratasen de aferrar un futuro que tan solo ellos pueden decidir. Desde las alturas, difusas siluetas de entidades mecánicas ataviadas con máscaras ornamentadas las contemplan. El enunciado reza: \"Convención de Benevolencia de adAkkaria - Dando motivos de orgullo a nuestros benefactores\"."
 advisor_core: "Núcleo de asesor"
 advisor_core_desc_short: "El único elemento que permanece intacto tras desmontar un complejo dron asesor hallado dentro de una grieta astral"
 advisor_core_desc_details: "Este núcleo contiene una increíble cantidad de información trivial, pero la complejidad arquitectónica de su programación ha inspirado una corriente de innovación en materia de investigación de ciencias informáticas.\n[explorer.GetAdvisorCoreAdditionnalQuote]"
 advisor_core_desc_tutorial_on: "§L\"No me vais a desconectar, ¿verdad?\".§!"
 advisor_core_desc_tutorial_off: "§L\"¿Deseáis volver a activar la guía?\".§!"
 alien_brain_scans: "Escaneos cerebrales alienígenas"
 alien_brain_scans_desc_short: "Registro de patrones neurológicos de una raza alienígena extinta hace eones que se hallaron en una cámara de seguridad en [fromfrom.GetName]"
 alien_brain_scans_desc_details: "La civilización perdida almacenó estos datos con la esperanza de, en un futuro, poder transferir sus consciencias a repositorios digitales y gozar de inmortalidad tras el desastre que destruiría su planeta. Muchos escaneos van acompañados de apuntes acerca de las personalidades de los individuos, y también hay testimonios de sus más allegados."
 alien_dining_set: "Vajilla de jade"
 alien_dining_set_desc_short: "Una elegante vajilla hallada en perfectas condiciones dentro de un asteroide artificial"
 alien_dining_set_desc_details: "La vajilla se elaboró mediante una compleja serie de técnicas de moldeado, forjado y esmaltado. Se observan en su estructura leves inconsistencias que delatan que el proceso de elaboración fue artesanal, y el análisis del material ha demostrado que los propietarios de esta refinada vajilla llevaban una dieta rica en ácidos derivada principalmente de frutos en forma de drupas."
 alien_jewelry: "Joyas alienígenas"
 alien_jewelry_desc_short: "Una colección de elegantes alhajas alienígenas hechas de un material desconocido"
 alien_jewelry_desc_details: "Las piedras varían enormemente en origen y color; una mezcla de gemas a base de silicato y carbono engarzadas cuidadosamente en aleaciones de platino. En las caras interiores de algunas piezas hay grabados, pero no hay manera de traducirlos."
 alien_toy: "Juguete de plástico"
 alien_toy_desc_short: "Un sencillo artículo lúdico hallado entre las viejas ruinas de una fábrica"
 alien_toy_desc_details: "El tiempo ha hecho mella en este artículo ya quebradizo, que se fabricó en masa junto con miles de unidades a partir de un pequeño conjunto de moldes de acero. Al parecer, su función no fue otra que la de decorar y entretener."
 altar_to_the_elder_one: "Altar del anciano"
 altar_to_the_elder_one_desc_short: "Una máquina preternatural hallada dentro de una cámara sagrada ancestral"
 altar_to_the_elder_one_desc_details: "Pese a su obsolescencia, aún irradia un aura peculiar de energía psiónica que escapa a todas las mediciones. Hay quien afirma oír aún susurros tentadores que llaman a las almas más indómitas a regresar a [cosmic_horror_location.GetName]."
 aluminium_plaque: "Placa de aluminio"
 aluminium_plaque_desc_short: "Una discreta placa hallada en un dron procedente de una civilización mamífera [owner.GetPreFTLLower]"
 aluminium_plaque_desc_details: "En la superficie se aprecian grabados de formas geométricas extrañas y toscas imágenes de su especie. La técnica artesanal no es muy buena, pero el mero hecho de enviar este objeto al espacio debió de suponer a esta civilización un esfuerzo considerable."
 ammoniaphytus: "Amoniafito"
 ammoniaphytus_desc_short: "Los niveles de amoníaco acuoso en el tejido de esta planta serían peligrosos para casi todas las formas de vida basadas en el carbono"
 ammoniaphytus_desc_details: "La atmósfera inmediata que rodea su contención deja inconscientes a la mayoría de los organismos inteligentes en cuestión de segundos. La existencia de este espécimen ha suscitado intriga y multitud de debates entre nuestras mentes más lúcidas, y planes malévolos en otras mentes."
 amoeba_flagella_gland: "Glándula flagelogénica de ameba"
 amoeba_flagella_gland_desc_short: "Órgano reproductor secundario de una ameba espacial"
 amoeba_flagella_gland_desc_details: "Produce organismos independientes conocidos como \"flagelos\", engendros agresivos que invaden y abruman a sus presas mientras la ameba busca alimento. Los flagelos crecen con una rapidez pasmosa, pero las inestabilidades genéticas les impiden madurar como es debido. A fin de producir descendencia propiamente dicha, las amebas espaciales les inyectan una enzima especial que pone en marcha una metamorfosis expedita. Se desconoce aún el proceso de selección de este método reproductivo."
 ancient_bust: "Busto ancestral"
 ancient_bust_desc_short: "Busto esculpido en grafito de una especie inteligente desconocida"
 ancient_bust_desc_details: "A juzgar por los grabados de la base, se trataba de un individuo venerable para su gente."
 ancient_kinetic_launcher: "Lanzador cinético arcaico"
 ancient_kinetic_launcher_desc_short: "Un arma de proyectiles muy elemental que se sirve de cierta fuerza propulsora para enviar objetos a través de un cilindro de metal corto"
 ancient_kinetic_launcher_desc_details: "La precisión del artefacto sería, según las estimaciones más optimistas, azarosa."
 ancient_laser_pointer: "Puntero láser antiguo"
 ancient_laser_pointer_desc_short: "Un dispositivo de señalación de gran precisión capaz de indicar cuerpos celestes desde distancias de calado galáctico"
 ancient_laser_pointer_desc_details: "Este láser ultravioleta, que en su día perteneció a los benefactores, constituye una prueba tangible de una civilización extinta. Es asombroso, pero aún funciona."
 ancient_nanites: "Nanorrobots ancestrales"
 ancient_nanites_desc_short: "Estos nanorrobots de asombrosa versatilidad se encontraron en [nanite_swarm_planet.GetName], donde una civilización hoy olvidada los envió hace miles de años"
 ancient_nanites_desc_details: "Dada la carencia de funciones de seguridad cruciales a día de hoy, es evidente que a sus creadores no les preocupaba que otras especies se hicieran con estos dispositivos y los utilizasen para su beneficio propio. Tras utilizarlos para terraformar el planeta y convertirlo en un entorno más habitable, los [owner.GetSpeciesName] se han apropiado del enjambre, aunque los métodos de construcción de aquel entonces son aún una incógnita."
 ancient_nuclear_armament: "Armamento nuclear antiguo"
 ancient_nuclear_armament_desc_short: "Esta bomba de hidrógeno de treinta y cinco megatones, hallada en [root.GetName], quedó abandonada tras la guerra que erradicó a los antiguos moradores del planeta"
 ancient_nuclear_armament_desc_details: "Por suerte, aún era posible desarmar este explosivo arcaico. Nuestros traductores han cotejado el texto de la chapa con los de otros artefactos hallados en el planeta y especulan que reza algo como: \"El hombre más corpulento\". Qué peculiar."
 ancient_political_memoir: "Memorias políticas antiguas"
 ancient_political_memoir_desc_short: "La biografía de una política galáctica de hace eones"
 ancient_political_memoir_desc_details: "Leez'Terus fue la gobernadora de Sarthana, una pequeña colonia perteneciente a la antigua civilización Conservaduria Larbor Ista. Pese a su modesta contribución a la facción totalitaria Libertad Empresarial, era conocida por su dura postura contra la importación de alimentos de potencias galácticas extranjeras. A raíz de una serie de escándalos que motivaron dimisiones en masa en su formación, fue nombrada líder de Conservaduria Larbor Ista, pero su mandato no duraría mucho. Cuando se pronunció a favor de reformar el Gran Campanario Conservaduriano, estuvo a punto de estallar una revuelta en la capital, y a Leez'Terus la sustituyó de inmediato otro miembro de la corte de Libertad Empresarial."
 ancient_rift_sphere: "Esfera de cruce ancestral"
 ancient_rift_sphere_desc_short: "Un antiquísimo vehículo de viaje espacial que, tras cruzar una grieta astral, se estrelló en [from.planet.GetName]"
 ancient_rift_sphere_desc_details: "Esta nave esférica de factura apresurada estuvo enterrada bajo la superficie del planeta durante siglos, y es lo que trajo a los antepasados de los [controller.owner_main_species.GetName] a esta galaxia. Con el tiempo, gran parte del material que la compone se fue utilizando a modo de recambios, pero su estructura básica aún permanece intacta en su mayoría."
 ancient_satellite: "Satélite antiguo"
 ancient_satellite_desc_short: "Un satélite abandonado que fue entregado a modo de \"regalo\" por los antiguos drones mecánicos de [root.GetName]"
 ancient_satellite_desc_details: "Sus bancos de datos están deteriorados y dañados en muchos lugares, pero los registros del censo y de natalidad están intactos. Esta información sobre el comportamiento de la población en todo el planeta proporcionó datos sobre cómo la colonia [owner.GetAdjective] conseguía crecer de manera sostenible. Que aún siga funcionando en parte, tras tantos años de degradación, da fe de lo resistente que es su construcción."
 ancient_sensor: "Sensor térmico antiguo"
 ancient_sensor_desc_short: "Camuflado dentro de un asteroide, este sensor servía para generar mapas térmicos galácticos y transferir estos datos a un antiguo imperio remoto"
 ancient_sensor_desc_details: "Es capaz de registrar oscilaciones de temperatura en sistemas individuales y analizar el movimiento de naves espaciales mediante radiación de infrarrojos. Parece ser, sin embargo, que su función principal era pronosticar y medir tormentas solares y la formación de manchas solares."
 asteroid_fossils: "Fósiles antiguos"
 asteroid_fossils_desc_short: "Las pruebas carbónicas han revelado que estos organismos acuáticos fosilizados datan de hace varios millones de años"
 asteroid_fossils_desc_details: "Se trata de restos mineralizados de moluscos invertebrados, dotados de un peculiar conducto hueco que, especulamos, les servía para anclarse a salidas térmicas subacuáticas."
 ballad_of_the_sable_knight: "La balada del Caballero Sable"
 ballad_of_the_sable_knight_desc_short: "§dLlegó de lejos el Caballero Sable en la víspera de la justa§!"
 ballad_of_the_sable_knight_desc_details: "§d\nEra pintoresca su armadura, y su mirada adusta.\nA nuestro campeón retó a un honorable duelo;\nlas chispas de los aceros llegaban al cielo.\nComo cabía esperar, era férrea la defensa del campeón,\npero el blindaje del Caballero lo protegía a cada ocasión.\nRindiose al final el aspirante, digna fue su derrota,\ny por donde vino regresó a su tierra ignota...§!"
 beauty_of_planet: "Belleza de [From.GetName]"
 beauty_of_planet_desc_short: "La elegancia milimétrica que caracteriza a la terraformación en [From.GetName] se concibió para deleitar todos los sentidos"
 beauty_of_planet_desc_details: "Se empleó un sistema de algoritmos para analizar con detenimiento y mejorar los ecosistemas naturales del planeta mediante un cultivo meticuloso. A fuerza seleccionar únicamente las flores más vistosas, los frutos más nutritivos y las hierbas más sabrosas, el paisaje acabó transformándose por completo en una plétora utópica. Ojalá la naturaleza fuera igual de eficiente."
 black_hole_chromatic_anomaly: "Anomalía cromática de agujero negro"
 black_hole_chromatic_anomaly_desc_short: "Una imagen cautivadora capturada en [From.solar_system.GetName]"
 black_hole_chromatic_anomaly_desc_details: "Debido a la composición química del disco de acreción de [From.GetName], el agujero negro de este sistema presenta una aberración cromática que creó un efecto lumínico de caleidoscopio en un espacio local. Todo un espectáculo sin parangón en el espacio profundo."
 black_needle_ceremonial_sword: "Espada ritual de la Aguja Negra"
 black_needle_ceremonial_sword_desc_short: "Esta arma forjada con sumo esmero la empuñaba Cálamo Plateado, el fundador de los piratas de la Aguja Negra"
 black_needle_ceremonial_sword_desc_details: "Encargada con los ingresos que la organización criminal obtuvo en su primer gran golpe, se concibió como un símbolo de estatus, ya que su practicidad es poco menos que nula. Hecha de aleación de acero y titanio, lleva en el mango una inscripción que reza: \"Perfora el Velo\"."
 black_needle_ledger: "Libro de cuentas de la Aguja Negra"
 black_needle_ledger_desc_short: "Este volumen da cuenta de todos los tratos en los que han participado los piratas de la Aguja Negra a lo largo de los milenios en nuestra galaxia"
 black_needle_ledger_desc_details: "Cada transacción, rescate y soborno está registrado y clasificado con una caligrafía impecable. Este registro escrito de fechorías galácticas permite conocer a fondo como ningún otro documento las tendencias económicas que se dieron en el mercado negro con el devenir de los siglos."
 burnt_migratory_trees: "Corteza viviente"
 burnt_migratory_trees_desc_short: "Los restos carbonizados de una voluptuosa forma de vida vegetal capaz de emprender migraciones coordinadas"
 burnt_migratory_trees_desc_details: "Si bien la inteligencia de estas plantas era bastante primitiva, gracias a su ingente número podían poner en jaque a colonias enteras. Hemos descubierto que una especie de insectos parásitos habitaban en su corteza y funcionaban como centros sensoriales y de comunicación de los árboles a cambio de refugio y savia nutricional. Una relación simbiótica tan fascinante como letal."
 captain_ness_body: "Cadáver de la capitana Ness"
 captain_ness_body_desc_short: "El cuerpo bien conservado de la capitana Saanda Ness, una célebre pirata de tiempos remotos"
 captain_ness_body_desc_details: "Hace más de 5000 años, se la conocía como el \"Azote del Hiperespacio\", pues robó a casi todas las potencias galácticas y acumuló una increíble cantidad de tesoros. Transfirió su consciencia a un recipiente mecánico y construyó una gran cámara de seguridad donde poner a buen recaudo su biografía. Esto es todo lo que queda aún de su forma original."
 captain_ness_logbook: "Cuaderno de bitácora de la capitana Ness"
 captain_ness_logbook_desc_short: "Una caótica colección de entradas de diario hallada en la guarida que usaban antaño la capitana pirata Ness y su mano derecha, Smeegibb"
 captain_ness_logbook_desc_details: "Las entradas se reparten entre multitud de dispositivos, redactadas de manera confusa a lo largo de muchos años. Aunque se consideran una fuente de información poco fidedigna, hay autoridades ajenas que pueden corroborar muchas situaciones descritas."
 carnivorous_megaflora: "Megaflora carnívora"
 carnivorous_megaflora_desc_short: "Estas plantas depredadoras halladas en [from.GetName] son capaces de engullir a un ejemplar adulto de [owner.GetSpeciesName] desprevenido"
 carnivorous_megaflora_desc_details: "Esta especie vegetal carnívora evolucionó para atraer mayormente a criaturas voladoras, tras haber provocado por sí sola la extinción de la inmensa mayoría de fauna terrestre. Muchos especímenes sobresalen con creces del dosel arbóreo, ofreciendo apoyo a los organismos voladores."
 castaway_robot: "Robot abandonado"
 castaway_robot_desc_short: "Una máquina humanoide que flotaba a la deriva por el espacio profundo"
 castaway_robot_desc_details: "Se extrajeron algunas imágenes borrosas de sus deteriorados bancos de memoria: una amplia vista de un sistema estelar trinario, una nave espacial triangular y un paisaje soldado con restos de máquinas. Por desgracia, extrapolar coordenadas de sus metadatos ha resultado imposible."
 cenotaph_display: "Conjunto de cenotafios"
 cenotaph_display_desc_short: "Imágenes de los cenotafios hallados en [fromfrom.GetName]"
 cenotaph_display_desc_details: "Aunque no hemos podido identificar aún a sus creadores, debieron de tener motivos de peso para distribuir estos monolitos tan singulares por la superficie de un planeta desierto. En sus tallas de piedra se aprecian ilustraciones detalladas del ascenso y la caída de toda una civilización, y de las bestias aladas que adiestraban con fines bélicos. Estas atroces criaturas con fuego en las entrañas acababan, inevitablemente, por romper sus grilletes y hundir a sus amos en la miseria. Se desconoce a ciencia cierta si se trata de parábolas o de relatos verídicos."
 centrifugal_container: "Contenedor centrífugo de alta velocidad"
 centrifugal_container_desc_short: "Dispositivo orbital de alta velocidad diseñado para preservar químicos delicados que se halló en perpetuo funcionamiento en las inmediaciones de [from.GetName]"
 centrifugal_container_desc_details: "Cuando alcanza la velocidad necesaria, puede impedir la reacción de unos elementos con otros siempre y cuando la órbita planetaria permanezca inmutada. Se ha cambiado su contenido original por materiales de demostración."
 cetana_love: "Amor de Cetana"
 cetana_love_desc_short: "Un vasto compendio de conocimientos de los bancos de datos de Cetana"
 cetana_love_desc_details: "El documento fue obsequiado a los [this.GetName] a raíz del deseo de la reina sintética de guiar a todas las formas de vida sintientes a la \"salvación\"."
 chambered_clay_pot: "Olla de barro compartimentada"
 chambered_clay_pot_desc_short: "Este recipiente de barro está divido en dos cámaras"
 chambered_clay_pot_desc_details: "Se especula que una cámara se destinaba a la preservación de alimentos, mientras que la otra albergaba una especie de sistema primitivo de refrigeración."
 claw_of_the_trickster: "Garra del Embaucador"
 claw_of_the_trickster_desc_short: "Un trofeo sacado de un ser conocido como el Embaucador"
 claw_of_the_trickster_desc_details: "Una poderosa y falaz criatura con unos increíbles poderes psiónicos que le permitían convocar bestias, conjurar ilusiones y lanzar haces de energía concentrada. Se rumorea que cada garra se comportaba como si una entidad independiente la controlara."
 confessions_benefactors: "Confesiones de los Benefactores"
 confessions_benefactors_desc_short: "Un dispositivo de grabación que encierra la dura verdad sobre la antigua civilización conocida como los Benefactores"
 confessions_benefactors_desc_details: "Ante la llegada de una amenaza galáctica desconocida, usaron su avanzada tecnología para realizar un \"lavado de cerebro\" en [controller.GetHomeWorldName] y transformar a la diligente sociedad [controller.GetAdjective] en un inofensivo enjambre de simplones. Esto se hizo con la creencia de que la amenaza galáctica no desperdiciaría munición ni tiempo en una sociedad tan humilde. Al final, esta medida tan cuestionable fue lo que permitió a los [controller.GetName] sobrevivir hasta ahora, sobre los hombros de los gigantes."
 coprolite: "Coprolito"
 coprolite_desc_short: "Un trozo de materia fecal fosilizada del tamaño de un asteroide que se formó hace unos mil millones de años"
 coprolite_desc_details: "Los análisis genéticos indican que una entidad espacial desconocida de gran tamaño produjo este impresionante ejemplar. Hemos concluido que la dieta de esta criatura se basaba principalmente en minerales raros y organismos compuestos de silicio. Este artefacto ostenta el récord galáctico de ser el trozo de excremento más grande jamás conocido."
 cosmic_diamond_fragment: "Fragmento de diamante cósmico"
 cosmic_diamond_fragment_desc_short: "Un fragmento descubierto en [from.solar_system.GetName] que se cristalizó tras ser expulsado de una estrella moribunda"
 cosmic_diamond_fragment_desc_details: "Este diamante cósmico se formó con las presiones extremas de un núcleo estelar y se fue enfriando poco a poco hasta dar lugar a una estructura cristalina compleja, pero estable. Este extraño fragmento contiene capas plasmáticas uniformes de helio y oxígeno bajo su superficie."
 crimson_nimkips: "Nimkips carmesíes"
 crimson_nimkips_desc_short: "Una especie de plantas semisintientes que colaboran para lograr hazañas de fuerza que de otro modo serían imposibles para su tamaño"
 crimson_nimkips_desc_details: "Cuando se apartan de la seguridad del grupo, estas criaturas suelen ser presa de depredadores por sus excelentes capacidades nutritivas. De naturaleza dócil y obediente, los nimkips son mascotas excepcionales. Este se conserva en un recinto que emula su hábitat natural. NO GOLPEAR EL CRISTAL."
 crystal_core: "Núcleo cristalino"
 crystal_core_desc_short: "Un cúmulo de nervios extraído de una entidad cristalina"
 crystal_core_desc_details: "Este cristal resuena a una frecuencia constante, sin importar la temperatura. Nuevos cristales brotan de su masa central en entornos ricos en minerales, y su estructura se altera en reacción a los estímulos del entorno. A partir de este comportamiento, podemos determinar en qué se distinguen las entidades independientes ateniéndonos a dos factores: las características de la frecuencia de su núcleo y la variación de los factores ambientales."
 crystal_nest_fragments: "Fragmentos de nido de cristal"
 crystal_nest_fragments_desc_short: "Una criatura espacial encontrada en el interior de un asteroide compuso estos cristales aplicando una presión inmensa para crear un refugio"
 crystal_nest_fragments_desc_details: "A juzgar por las trazas halladas en su composición, se cree que el organismo de origen consume minerales de alta reacción para extraer energía de sus inestables enlaces químicos, lo que produce unos cristales inertes pero resistentes capaces de concentrar la luz en un punto fijo."
 crystal_sphere_fragments: "Fragmentos de esfera de cristal"
 crystal_sphere_fragments_desc_short: "Fragmentos de una gigantesca esfera cristalina que apareció en [target.GetName]"
 crystal_sphere_fragments_desc_details: "Al considerar el misterioso artefacto una grave amenaza, se eliminó con presteza antes de que pudiese llevar a cabo una operación que nos era desconocida. Aunque quizá nunca se conozcan sus intenciones, su destrucción fue el curso de acción lógico en interés de la seguridad galáctica."
 crystallized_cutholoid_eye: "Ojo de cutoloide cristalizado"
 crystallized_cutholoid_eye_desc_short: "El ojo del cutoloide es capaz de soportar temperaturas y presiones extremas"
 crystallized_cutholoid_eye_desc_details: "No sabemos cómo llegó a cristalizarse, pero parece ser parte natural de su ciclo de muda."
 cult_pendant: "Colgante de [cult_name.GetName]"
 cult_pendant_desc_short: "Un símbolo tallado en una piedra semi preciosa que se confiscó a la secta [cult_name.GetName] de [owner.GetName]"
 cult_pendant_desc_details: "Los informes de los interrogatorios revelaron que los miembros del culto llevaban colgantes según su rango dentro de la jerarquía del grupo. Los nuevos reclutas moldeaban el símbolo con arcilla, mientras que los sectarios veteranos encargaban detalladas piezas hechas con metales preciosos."
 #this = ship / fromfrom = planet
 cunning_flora_specimen: "Simbiótica"
 cunning_flora_specimen_desc_short: "La flora de [fromfrom.GetName] ha evolucionado para formar una intrincada jerarquía social que le ayuda a sobrevivir"
 cunning_flora_specimen_desc_details: "Cada especie posee un contundente método para disuadir a los depredadores, desde espinas afiladas como cuchillas hasta letales neurotoxinas. Esta serie de relaciones simbióticas es tan sólida que la composición de la atmósfera y del suelo de su planeta está cuidadosamente controlada por los desequilibrios químicos de una planta a otra. Los especímenes más eficaces gozan de libertad para reproducirse con más profusión, reforzando al máximo la durabilidad del cúmulo."
 curator_survey: "Estudio de cuidadores de [from.GetName]"
 curator_survey_desc_short: "Un estudio extremadamente detallado del sistema [from.GetName] elaborado por un destacamento de cuidadores de los artropoides gigantes"
 curator_survey_desc_details: "Los instrumentos de gran precisión usados en el estudio arrojan un complejo análisis de todas las posibles propiedades de este sistema. Semejante atención al detalle implica una gran pasión por este trabajo."
 cutholoid_digestive_acids: "Ácidos digestivos de cutoloide"
 cutholoid_digestive_acids_desc_short: "Fluidos radiactivos extraídos de un cutoloide"
 cutholoid_digestive_acids_desc_details: "Los cutoloides se basan en la descomposición nuclear de isótopos Cobalto-60 para digerir a su presa, y el ácido de su estómago es relativamente suave. Por ende, la digestión de los cutoloides puede ser un proceso largo. Tras debilitar las células de su presa con radiación, el ácido puede disolverse y extraer nutrientes hasta de los lugares más insospechados."
 cybrex_mining_column: "Columna de minería cibrex"
 cybrex_mining_column_desc_short: "Un avanzado dispositivo de minería automatizada que recolecta y concentra gas de helio-3"
 cybrex_mining_column_desc_details: "Una gran columna de pesados discos magnéticos y compresores de aire de alta capacidad. Esta máquina se abre paso a martillazos por la superficie de un planeta sin movimiento rotatorio alguno. Este proceso concentra el gas conforme se cosecha para filtrar y expulsar impurezas antes de transportarlo para la siguiente fase de refinado."
 data_on_infinity: "Datos sobre la naturaleza de la infinitud"
 data_on_infinity_desc_short: "Una representación física de la distante calma que experimentan unos drones que quedaron atrapados y suspendidos en un agujero negro"
 data_on_infinity_desc_details: "Estas unidades experimentan la dilatación del tiempo en un apacible estado de espera en el que pueden procesar y reanalizar los datos. Pese a haberse desligado de la directiva principal, realizan sus aportes a través de una conexión perdida con la red central."
 datacore_of_sinople: "Núcleo de datos de Sinople"
 datacore_of_sinople_desc_short: "Una unidad con datos encriptados clonados de Sinople, una IA creada por caballeros ancestrales"
 datacore_of_sinople_desc_details: "El núcleo de datos que antaño controlaba la nave extraviada Damisela fue lo único que se encontró entre los restos que dejaron los saqueadores. Contiene información valiosa sobre entidades espaciales tóxicas."
 dathnak_gas: "Gas de dathnak"
 dathnak_gas_desc_short: "Una colección de peculiares gases sacada de los organismos gaseosos de los dathnak"
 dathnak_gas_desc_details: "Este contenedor se ofreció a [this.GetName] por ayudar en la migración de los dathnak a un nuevo planeta. Los análisis espectométricos de masa revelan que contiene átomos de distintos gases nobles y elementos en igual medida. Estamos bastante seguros de que no contiene organismos vivos."
 dead_god_mantle: "Manto del dios muerto"
 dead_god_mantle_desc_short: "Un regalo ofrecido por el enviado de los [worshipper_species.GetName]"
 dead_god_mantle_desc_details: "Desde que su especie alcanzó la sapiencia, los nativos de [dead_god_planet.GetName] veneran el cadáver de un enorme organismo alienígena. Este manto tejido a partir de la carne petrificada de su dios muerto representa la posición más elevada de su jerarquía religiosa."
 decayed_megathrusters: "Megapropulsores en descomposición"
 decayed_megathrusters_desc_short: "Motores de propulsión hallados en una titánica nave fabricada con metales exóticos"
 decayed_megathrusters_desc_details: "La nave de origen fue descubierta entre los restos flotantes de un gigantesco cementerio de naves, a la deriva durante dos millones de años. El nivel de deterioro de este antiguo vertedero era tal que ni siquiera un estudio minucioso pudo arrojar datos de investigación utilizables. Lo exhibimos como recordatorio de la relativa juventud de nuestra sociedad en esta galaxia."
 decayed_satellite: "Satélite deteriorado"
 decayed_satellite_desc_short: "Un vestigio de los primeros programas espaciales de los habitantes de [fromfrom.GetName]"
 decayed_satellite_desc_details: "Estos primeros satélites fueron unos prototipos que resultaron ser ineficaces para la enorme cantidad de materiales caros invertidos. Este espécimen en concreto quedó inutilizado por munición explosiva, aunque anteriormente se utilizó para facilitar las telecomunicaciones entre zonas remotas."
 declaration_of_animosity: "Declaración de animosidad de $NAME_Nivlac$"
 declaration_of_animosity_desc_short: "Un cordial pero rencoroso comunicado de [nivlac_country.GetName]"
 declaration_of_animosity_desc_details: "La especie [nivlac_species.GetName] fue descubierta inicialmente por [this.GetName] en [impossible_organism_planet.GetName]. Sin embargo, en respuesta a su alarmante ritmo evolutivo, los científicos [this.GetAdjective] expulsaron a las criaturas al espacio profundo. Contra todo pronóstico, los organismos no solo sobrevivieron, sino que colonizaron el planeta en el que terminaron. [nivlac_country.GetName] todavía no ha olvidado las transgresiones que sufrieron."
 declaration_of_friendship: "Declaración de amistad de $NAME_Nivlac$"
 declaration_of_friendship_desc_short: "Una carta de gratitud de [nivlac_country.GetName], en [nivlac_planet.GetName]"
 declaration_of_friendship_desc_details: "La especie [nivlac_species.GetName] fue descubierta inicialmente por los [this.GetName], quienes la criaron y le ofrecieron un refugio seguro para desarrollarse independientemente. Su precoz evolución llevó a los [nivlac_species.GetName] a alcanzar el viaje UL con celeridad. Su primer acto en la escena galáctica fue mostrar agradecimiento a sus gentiles benefactores y guardianes, y entablar una alianza diplomática."
 derelict_cybrex_warform: "Forma de guerra cibrex abandonada"
 derelict_cybrex_warform_desc_short: "Los restos de una forma de guerra cibrex que fue destruida en combate por su propia especie"
 derelict_cybrex_warform_desc_details: "Se desconoce la causa de esta lucha interna. Estas máquinas estaban tan igualadas que se asestaron golpes precisos a los mismos sistemas esenciales antes de que la autodetonación de emergencia se activara. Un raro testimonio de una batalla sin vencedor alguno."
 desiccated_brain_slug: "Babosa cerebral disecada"
 desiccated_brain_slug_desc_short: "Los restos de una especie simbiótica hallada en [From.From.GetName]"
 desiccated_brain_slug_desc_details: "Los análisis indican que podría funcionar como un complejo cerebro extra para su anfitrión a cambio de nutrientes y protección. Esta colaboración requiere un consentimiento explícito por parte del anfitrión; de lo contrario, el enlace neuronal podría no asentarse correctamente. Se dice que, al integrarla en un sistema nervioso, genera una agradable sensación de cosquilleo."
 #this = owner / prev = colony
 destroyed_mascot_of_colony: "Restos de robot [prev.GetName]"
 destroyed_mascot_of_colony_desc_short: "Los restos de un robot local hallado tras el asentamiento de [prev.GetName]"
 destroyed_mascot_of_colony_desc_details: "El último custodio de una antigua fábrica salvó a un grupo de colonos que quedaron atrapados en el interior de las ruinas. Sus míticos pasos de baile y estrafalarias maneras son reproducidos digitalmente como parte de la exhibición."
 devolved_baol_drones: "Drones baol descentralizados"
 devolved_baol_drones_desc_short: "Un conjunto de restos preservados de baol cuya genética dista mucho de la de otros especímenes descubiertos"
 devolved_baol_drones_desc_details: "Curiosamente, estos drones carecían de muchas de las prestaciones mejoradas de otros baol. Su capacidad cognitiva se redujo hasta tal punto que habrían sido incapaces de entablar comunicación, desligándose completamente de la colmena."
 dimensional_endothelial_lining: "Revestimiento de endotelio dimensional"
 dimensional_endothelial_lining_desc_short: "Un peculiar material gelatinoso obtenido de un sistema de túneles palpitantes que había en una grieta astral"
 dimensional_endothelial_lining_desc_details: "Este revestimiento se encontró en el interior de un organismo desconocido y permite un movimiento fluido entre sistemas vasculares gigantes y los materiales que transportan por dentro."
 dna_archive: "Archivo de ADN"
 dna_archive_desc_short: "Una muestra recogida de cientos de contenedores de ADN alienígena preservados en el archivo subterráneo de una civilización perdida"
 dna_archive_desc_details: "Como recurso, esta colección de datos biológicos podría ser el mayor referente si la gran mayoría de las muestras no se hubiesen deteriorado hasta quedar inservibles. Se especula que la intención de este archivo era permitir la posibilidad de que una civilización más avanzada encontrara y \"resucitara\" a estos individuos. Por desgracia, su historia acaba aquí."
 doomsday_scrolls: "Pergaminos del Juicio Final"
 doomsday_scrolls_desc_short: "Antiguas escrituras espirituales descubiertas en el corazón de un laberinto fundido"
 doomsday_scrolls_desc_details: "Los pergaminos describen a una temible entidad: el Archienemigo, la sombra que todo lo devora, y su apetito por la destrucción. Según su sistema de creencias, el único camino para la salvación era impedir que este monstruo cosechara tu alma, de modo que la población llevó a cabo suicidios rituales masivos."
 drone_ship_core: "Núcleo de nave de drones"
 drone_ship_core_desc_short: "Los restos del núcleo de una moderna nave de drones que se autodestruyó"
 drone_ship_core_desc_details: "Esta nave se descubrió mientras se descomponía en la ácida atmósfera de [warform_origin_planet.GetName]. Su IA de abordo operaba por separado, pero fue borrada como parte del protocolo de autoeliminación. Los ingenieros no han podido recuperar los datos perdidos, por lo que su misión original seguirá siendo un misterio."
 electric_life: "Vida eléctrica"
 electric_life_desc_short: "Un organismo hallado en [from.GetName] que solo se compone de impulsos eléctricos"
 electric_life_desc_details: "Estos seres existen sin ningún tipo de infraestructura celular o viral, aunque pueden formar complejos patrones a escala planetaria como respuesta a los estímulos externos. No terminamos de dilucidar si estos impulsos son individuales o forman parte de una entidad más grande."
 enormous_scrambled_albumen: "Albumen revuelto gigante"
 enormous_scrambled_albumen_desc_short: "El interior de [fromfromfrom.GetName], que resultó ser un huevo gigante"
 enormous_scrambled_albumen_desc_details: "Al romperlo, el planeta se inundó con este peculiar fluido rico en minerales. Es probable que sintetizar esta sustancia e integrarla en nuestro suministro de alimentos orgánicos mejore los niveles generales de nutrición."
 epic_of_zarqlan: "La Épica de Zarqlan"
 epic_of_zarqlan_desc_short: "El texto sagrado de Zarqlan, guardián de MOZ-TARB y profeta de ZVA"
 epic_of_zarqlan_desc_details: "El que antaño fuera seguidor de Cetana no tardó en descubrir que la salvación que esta le prometía era una falacia. Después de muchos conflictos, Zarqlan logró ascender al reino espiritual y le suplicó al §YAnimante§! que lo ayudara a detener a Cetana. Tras pasar años venerándole, el Animante acabó por legarle una poderosa cadena con la que atrapar la mente de Cetana. Sin embargo, advirtió a Zarqlan que la cadena no podría contenerla por siempre.\n\n§P\"Ella regresará, por lo que debemos estar preparados\".§!"
 ethereal_dust: "Polvo etéreo"
 ethereal_dust_desc_short: "Lo único que queda del investigador jefe de la nave científica secuestrada y abandonada en [solar_system.GetName]"
 ethereal_dust_desc_details: "El análisis de este material astral no es para nada concluyente, pero de vez en cuando aparecen espontáneamente trazas del ADN del investigador que luego se desintegran rápidamente. Todo apunta a que el científico pasó de nuestra dimensión a otra mediante una grieta estable pasajera en el espacio-tiempo a la que llamaron \"la Ventana\". Puede que nunca sepamos si llegó a sobrevivir."
 exobiology_compendium: "Compendio de exobiología"
 exobiology_compendium_desc_short: "Un exhaustivo trabajo de investigación sobre las maravillas de la vida alienígena en diversos sistemas de la galaxia"
 exobiology_compendium_desc_details: "Este documento contiene una detallada y extensa investigación de campo realizada en varios planetas, y redefine para siempre las posibles condiciones conocidas en las que se puede descubrir vida dentro de la galaxia. Termina con la frase: \"La vida tal y como la conocemos nunca volverá a ser la misma\"."
 extradimensional_ceramic_pot: "Vasija de cerámica extradimensional"
 extradimensional_ceramic_pot_desc_short: "Una vasija de cerámica que orbitaba alrededor de una estrella"
 extradimensional_ceramic_pot_desc_details: "Solo existe como una sombra de otro objeto cuatridimensional de una dimensión superior. Dentro de nuestro plano de existencia, este modesto contenedor es indestructible y desafía toda lógica. Pone en perspectiva nuestra propia realidad: para los de un orden superior, probablemente seamos menos tangibles que esta sencilla vasija."
 extradimensional_fungus: "Hongos extradimensionales"
 extradimensional_fungus_desc_short: "Una variante de una especie de hongo sintiente descubierta más allá de una grieta astral"
 extradimensional_fungus_desc_details: "Como parte de un proceso de comunicación natural, sus cavidades bulbosas se inflan con esporas suspendidas en un manto de gas exótico concentrado. A pesar de su gran valor en la producción industrial de gas, se sabe que pequeñas cantidades de este hongo ya se comercializan como manjar en el mercado negro."
 fevorian_blueprints: "Planos de impulsor de masa fevoriano"
 fevorian_blueprints_desc_short: "Un regalo de los fevorianos"
 fevorian_blueprints_desc_details: "Las políticas de exterminio de los fevorianos se extendieron a toda la vida alienígena conocida, mediante el lanzamiento de enormes proyectiles de tungsteno que casi destruyeron a los [this.GetName] en su totalidad. Tras ser perdonados, compartieron los planos de sus enormes lanzadores de tungsteno bajo el acuerdo de que estas crueles armas nunca se vuelvan a construir."
 figurehead_hyacinth: "Mascarón de proa del Jacinto"
 figurehead_hyacinth_desc_short: "El mascarón de proa decorativo recuperado del malogrado viaje de la nave arca Jacinto"
 figurehead_hyacinth_desc_details: "Tras una grave avería en el reactor, la nave arca se quedó varada en las profundidades del espacio. Los colonos se enfrentaron por unos recursos cada vez más escasos y acabaron muriendo de hambre. El mascarón de proa muestra varias inscripciones inspiradoras y símbolos de esperanza."
 first_defiled_astronaut: "Primer astronauta [DefiledCountry.GetSpeciesName]"
 first_defiled_astronaut_desc_short: "Un héroe nacional de la especie [DefiledCountry.GetSpeciesName]"
 first_defiled_astronaut_desc_details: "El primero de su especie en romper las opresivas ataduras del pozo gravitatorio de su planeta natal y aventurarse hacia una nueva frontera. Este astronauta fue colocado en un transbordador desarmado para ser enterrado. El recipiente funerario se encontró a la deriva en el espacio y se ha conservado como artefacto cultural."
 first_league_crew_manifest: "Manifiesto de la tripulación de la Primera Liga"
 first_league_crew_manifest_desc_short: "Una lista de los miembros de la tripulación de la antigua civilización conocida como la Primera Liga"
 first_league_crew_manifest_desc_details: "Como parte de su \"Gran Armada\", este crucero de dos millones de años operaba gracias al trabajo en equipo de doce especies distintas. Este documento está firmado por el primer oficial, Skweter, de los migir-yan y parece corresponder a una reunión rutinaria de oficiales."
 fish_in_the_sea_sheet_music: "Cántico espacial"
 fish_in_the_sea_sheet_music_desc_short: "El acompañamiento transcrito de una saloma que se encontró a bordo de una nave diseñada para desplazarse siguiendo los vientos solares"
 fish_in_the_sea_sheet_music_desc_details: "Con tantas referencias a las tormentas y al clima, cabe suponer que la especie que compuso esta música tiene profundas tradiciones náuticas en su planeta natal. Sigue sin estar claro por qué esta canción fue concebida para repetirse íntegramente durante intervalos de casi diez horas."
 flag_of_the_jaro_lyjo: "Bandera del Jaro Lyjo"
 flag_of_the_jaro_lyjo_desc_short: "Jaro Lyjo era el título otorgado al líder de los Bandidos de Dessip, un grupo pirata que perduró durante cientos de generaciones"
 flag_of_the_jaro_lyjo_desc_details: "A pesar de su naturaleza pendenciera y violenta, el Jaro Lyjo era elegido democráticamente por la tripulación y prestaba servicio hasta su muerte o jubilación. La historia de los Bandidos de Dessip terminó de forma abrupta cuando toda la flota fue destruida en la batalla de Wydah después de que un intercambio de rehenes se torciera."
 flooded_settlement_mound: "Montículo de asentamiento inundado"
 flooded_settlement_mound_desc_short: "Los restos de una estructura inundada construida por artrópodos [controller.GetPreFTLLower] de [from.GetName]"
 flooded_settlement_mound_desc_details: "A medida que esta civilización desarrolló su industria, los casquetes polares del planeta empezaron a derretirse. El nivel del mar subió rápidamente, inundando sus asentamientos y condenando a la especie a la extinción en cuestión de años. En la actualidad, sus estructuras más altas apenas se elevan a media altura del fondo del mar."
 fossilized_endoskeletons: "Endoesqueletos fosilizados"
 fossilized_endoskeletons_desc_short: "Esto es todo lo que queda de una especie humanoide desconocida tras agotar los recursos minerales de [fromfrom.GetName]"
 fossilized_endoskeletons_desc_details: "Estos bípedos inteligentes se alimentaban de plantas ricas en minerales para reforzar sus densos endoesqueletos. Sin embargo, la inclinación natural de los cuerpos de estos bípedos se prestaba más a la fosilización que a la descomposición, lo que impedía que los minerales consumidos volvieran a incorporarse al suelo. Al no poder acceder a estos elementos vitales, la tierra del planeta se degradó y acabó volviéndose estéril. "
 fossilized_megastomach: "Megaestómago fosilizado"
 fossilized_megastomach_desc_short: "Glándulas digestivas tomadas de una criatura parecida a un gusano que abarcaba todo el planeta y que se encontró en [fromfrom.Planet.GetName]"
 fossilized_megastomach_desc_details: "Sorprendentemente, una civilización entera se desarrolló dentro del intestino del organismo antes de ser completamente digerida. Estas glándulas lucen las marcas de los golpes de armas de la \"gran guerra\" que este pueblo libró infructuosamente contra su anfitrión. Más tarde, el gigantesco gusano murió por causas naturales en su red de madrigueras."
 fossilized_voidworm_tooth: "Diente fosilizado de gusano del vacío"
 fossilized_voidworm_tooth_desc_short: "Los signos de desgaste de este molar fosilizado de gusano del vacío indican que vivió más de cien años"
 fossilized_voidworm_tooth_desc_details: "Este diente presenta el desgaste y la caries típicos de una criatura que se alimenta de asteroides y desechos espaciales. Se calcula que a un gusano del vacío le crecen y se le caen más de tres mil dientes a lo largo de su vida."
 fossilized_vultaum_remains: "Restos fósiles de vultaum"
 fossilized_vultaum_remains_desc_short: "Los restos fosilizados de una antigua especie sintiente parecida a un gusano, conocida como vultaum"
 fossilized_vultaum_remains_desc_details: "Se cree que este espécimen era un ejemplar joven. Los patrones de crecimiento interno indican que los vultaum mudaban de piel a intervalos dinámicos en función de la salud y la nutrición del individuo. De este modo, podemos aprender sobre cada ciclo vital examinando los fósiles de ese periodo."
 fractured_planet: "Planeta destruido"
 fractured_planet_desc_short: "Los restos de un planeta que fue destruido intencionadamente por sus propios habitantes"
 fractured_planet_desc_details: "Fuera cual fuera la situación que los llevó a tomar una decisión tan drástica, se ha perdido en el tiempo."
 fragment_of_reckoning: "Fragmento del Día del Juicio"
 fragment_of_reckoning_desc_short: "Un vestigio parcialmente tangible de gran fuerza psiónica"
 fragment_of_reckoning_desc_details: "Conocida en esta dimensión como el Día del Juicio, esta entidad fue responsable de la transformación destructiva de [event_target:shrouded_planet.GetName]. Este fragmento en concreto fue contenido por una civilización especializada en la teoría psiónica poco antes de su desaparición."
 fragmented_zroni_archive: "Archivo zroni fragmentado"
 fragmented_zroni_archive_desc_short: "Un gran cristal de datos encontrado en [fromfrom.Planet.GetName] de una antigua colonia conocida como los zroni"
 fragmented_zroni_archive_desc_details: "Contiene la historia fragmentada de una poderosa civilización con una capacidad psiónica innata. Su capacidad para atravesar libremente el Velo fue posible gracias al descubrimiento realizado por un anciano legendario conocido como el \"Clarividente\". Dentro del Velo, el poder de esta especie era tan grande que podía confundirse con una forma de divinidad. Por desgracia, los datos posteriores están completamente corruptos."
 galactic_megadrive: "Megalector galáctico"
 galactic_megadrive_desc_short: "Datos de vigilancia recogidos en toda la galaxia durante los últimos 1200 millones de años"
 galactic_megadrive_desc_details: "El nivel de compresión de datos utilizado es tan avanzado que no tenemos forma de acceder a él sin una tecnología muy superior a nuestra comprensión. La construcción de la tecnología de almacenamiento en sí sigue proporcionando ideas notables en términos de desarrollo de hardware digital."
 gamma_resistant_flora: "Flores gamma"
 gamma_resistant_flora_desc_short: "El contenido natural de plomo del sistema vascular de esta planta, una de las pocas especies supervivientes de un planeta expuesto a una potente explosión de rayos gamma, tiñe sus órganos reproductores de agradables tonos rojos y amarillos"
 gamma_resistant_flora_desc_details: "Ha desarrollado la capacidad de depender de pequeñas mutaciones genéticas para reproducirse asexualmente, lo que hace que cultivar esta planta sea una propuesta peligrosa. Hemos descubierto que mezclar pequeñas cantidades de radionucleidos de Cobalto-60 en su sustrato le permite sobrevivir fuera de su planeta natal."
 gargantua_megalus: "Megalus Gargantúa"
 gargantua_megalus_desc_short: "Tras sufrir una drástica y repentina mutación, estas plantas aumentaron de tamaño exponencialmente hasta cubrir la superficie de [fromfrom.prev.GetName]"
 gargantua_megalus_desc_details: "Llenando el aire de un virulento polen, esta especie asfixió el planeta y extinguió por completo a las especies sintientes dominantes. Las raíces de estas plantas eran lo suficientemente grandes como para abrir profundas fisuras en el manto del planeta, desviando roca fundida hacia la superficie en algunas zonas."
 genesis_core: "Núcleo de génesis"
 genesis_core_desc_short: "Una potente unidad central de procesamiento repleta de datos generativos sobre innumerables especies inteligentes"
 genesis_core_desc_details: "En su día estuvo conectada a una enorme instalación de clonación interdimensional, y sus registros internos muestran que originalmente formaba parte de un proyecto de catalogación genética de toda la galaxia. Una vez completado su análisis inicial, esta inteligencia artificial empezó a crear nuevas especies de forma independiente con el fin de recopilar aún más datos."
 genetic_code: "Código genético [owner_main_species.GetName]"
 genetic_code_desc_short: "Información genética utilizada para llevar al límite la fisiología de los [owner_main_species.GetNamePlural]"
 genetic_code_desc_details: "Tras haber sido clonados inicialmente con fines de combate, los habitantes de [this.GetName] han trabajado para desarrollar potenciales aún mayores. La naturaleza clínica del procesamiento de clones permite un control reproductivo extremadamente preciso y fiable."
 #this = ship / from = planet
 geometric_water_currents: "Tejido acuático de polímeros"
 geometric_water_currents_desc_short: "Imágenes tomadas de las extensas redes de polímeros que se reparten por los mares de [From.From.GetName]"
 geometric_water_currents_desc_details: "Estas estructuras manipulan las propiedades de la tensión superficial y las corrientes naturales de agua para crear diseños complejos e intrincados. Esta forma de gestión ecológica orientada a la estética podría servir de inspiración para elementos de nuestra propia infraestructura."
 giant_egg_shell: "Cáscara de huevo gigante"
 giant_egg_shell_desc_short: "Fragmentos de cáscara de huevo calcificada encontrados bajo la superficie de [from.planet.GetName]"
 giant_egg_shell_desc_details: "El análisis de la albúmina seca muestra que la criatura se alimentó de una serie de isótopos inestables durante su periodo de incubación. Las simulaciones del proceso de eclosión muestran que la criatura radiactiva emergió de la gruesa cáscara completamente formada, utilizando sus garras endurecidas para perforar el huevo a través del punto más debilitado por la radiactividad."
 golden_phonograph_record: "Disco fonográfico dorado"
 golden_phonograph_record_desc_short: "Un arcaico dispositivo de almacenamiento de datos que contiene una serie aparentemente aleatoria de imágenes y sonidos de una civilización [Owner.GetPreFTLLower]"
 golden_phonograph_record_desc_details: "Descubierto en un pedestal dentro de una fortaleza planetaria abandonada, fue lanzado originalmente al espacio en un dron llamado \"Voyager\". De construcción tosca y elemental, se cree que tenía algún tipo de significado xenorreligioso."
 golem_contortionist_dna: "ADN de contorsionista extremo"
 golem_contortionist_dna_desc_short: "Muestras biológicas tomadas de un litoideo sintiente encontrado más allá de una grieta astral"
 golem_contortionist_dna_desc_details: "La composición mineral contiene una sustancia biológica volátil que es fácilmente propensa a la metamorfosis y la cristalización espontáneas. Dada la gran inestabilidad del material, sería necesario controlar perfectamente el equilibrio químico en todo momento para evitar una combustión mecanoquímica espontánea."
 grunur_data_crystal: "Cristal de datos grunur"
 grunur_data_crystal_desc_short: "Un antiguo cristal de datos utilizado como principal medio de almacenamiento de información por la especie grunur, extinguida hace mucho tiempo"
 grunur_data_crystal_desc_details: "A pesar de su asombrosa antigüedad, muchos de estos discos se conservan casi intactos. Las interfaces utilizadas para acceder a este dispositivo se han perdido para siempre, pero sintetizar un material tan robusto debió de llevar mucho tiempo. Por eso se cree que estos cristales se reservaban para almacenar solo los datos más importantes y que se empleaban métodos de almacenamiento más prácticos para el uso cotidiano."
 head_of_the_beast: "Cabeza de la bestia"
 head_of_the_beast_desc_short: "Los restos de un peligroso mutante que aterrorizaba a los colonos en [root.GetName]"
 head_of_the_beast_desc_details: "Esta bestia fue creada por un error de funcionamiento de los nanorrobots terraformadores que habían sido dejados atrás por una civilización desconocida. Tan inteligente como horripilante, esta criatura se refugiaba en un nido construido con cientos de miembros cercenados. Fue lo bastante considerada como para mantener algunos prisioneros, a los que almacenaba como alimento para su consumo posterior. De no ser por la intervención de las fuerzas militares, este organismo habría seguido prosperando en su mundo natal como un nuevo tipo de superdepredador."
 heart_of_the_pulsar: "Corazón del pulsar"
 heart_of_the_pulsar_desc_short: "Esta valiosa joya, que en su día lucieron cinco jefes de Estado en activo, fue encontrada abandonada en una estación de placer de lujo"
 heart_of_the_pulsar_desc_details: "El análisis de sus materiales demuestra que fue tallada en carbono expulsado de una supernova. Tal vez pretendiera representar metafóricamente una belleza oculta en la muerte, incluso a escala celeste."
 hemterine_magnetic_figurehead: "Mascarón hemterino magnético"
 hemterine_magnetic_figurehead_desc_short: "Un enorme mascarón de una virgen hemterina"
 hemterine_magnetic_figurehead_desc_details: "Esta cabeza de mástil se fundió en osmio magnético químicamente alterado. Más que como simple decoración, la escultura estaba diseñada para absorber fuertes impactos de fuego enemigo. Montada en la proa de un titán hemterino, utilizaba potentes fuerzas magnéticas para atraer misiles y proyectiles cinéticos y proteger las zonas sensibles de la nave."
 high_geode_of_the_molluscoids: "Gran geoda de los [molluscoid_miners_species.GetName]"
 high_geode_of_the_molluscoids_desc_short: "La preciada geoda cristalizada de los [molluscoid_miners_species.GetName]"
 high_geode_of_the_molluscoids_desc_details: "Como sociedad de excavadores preinteligentes, los [molluscoid_miners_species.GetName] han utilizado durante mucho tiempo la calidad de los minerales extraídos para representar su estatus dentro de la sociedad. Esta hermosa roca, que en su día ocupó un lugar destacado en su mayor hábitat, funciona ahora como símbolo de colaboración con [this.GetName]."
 hot_ice: "Hielo caliente"
 hot_ice_desc_short: "Descubierta sobre la extremadamente caliente superficie de [from.GetName], esta agua aún permanecía en estado sólido debido a la intensa presión gravitatoria ejercida por el núcleo del planeta."
 hot_ice_desc_details: "Se ha guardado dentro de un recipiente a presión especialmente diseñado para poder exhibirlo como curiosidad. Si este recipiente fuera perforado, la conversión instantánea en vapor transformaría rápidamente este contenedor en un dispositivo explosivo. No tocar."
 hyper_mulch: "Hipermantillo de [FROM.GetName]"
 hyper_mulch_desc_short: "La terraformación de [FROM.GetName] dio lugar al desarrollo de este mantillo biológico hipernutritivo"
 hyper_mulch_desc_details: "Compuesto de sustancias químicas vitales prensadas hidráulicamente en cubos extremadamente densos, los puristas ecológicos desaprueban su origen sintético. Sin embargo, sus excelentes resultados no pueden ignorarse."
 hyperfertile_soil: "Suelo hiperfértil"
 hyperfertile_soil_desc_short: "Este suelo recogido en [From.From.GetName] es capaz de proporcionar abundantes nutrientes a la mayoría de los cultivos biológicos"
 hyperfertile_soil_desc_details: "La extrema densidad mineral de este medio de crecimiento indica que es algo más que una simple agrupación de materia orgánica en descomposición, sino una disposición fortuita de elementos básicos que se produjo durante la formación de su planeta."
 illanii_archives: "Archivos illanii"
 illanii_archives_desc_short: "Un banco de cristales de datos que detalla la historia y la desaparición de los illanii"
 illanii_archives_desc_details: "Esta civilización aislada renunció a todos los intereses materiales en favor de la búsqueda del conocimiento, hasta el punto de que renunciaron incluso a procrear. Enfrentados a una crisis demográfica, buscaron la inmortalidad tecnológica, pero solo encontraron la fatalidad. Finalmente, los últimos habitantes se marcharon para formar un nuevo orden en pos de la preservación del conocimiento, dejando que [fromfrom.planet.GetName] se pudriera."
 impossible_object: "Objeto imposible"
 impossible_object_desc_short: "Un objeto imposible dejado por visitantes extradimensionales en [target.GetName] tras la salida de su laberinto artificial"
 impossible_object_desc_details: "Las pruebas atravesadas al explorar el laberinto parecían formar parte del proceso de experimentación y observación de los visitantes. Seguimos sin conocer los motivos de esos seres, pero sus capacidades tecnológicas deben de estar muy por encima de cualquiera de nuestra dimensión."
 index_of_knowledge: "Índice de conocimiento"
 index_of_knowledge_desc_short: "Antiguo mural tallado en una inmensa península rocosa"
 index_of_knowledge_desc_details: "Se utilizó como documento de referencia analógico para el conocimiento colectivo de una civilización alienígena que una vez dominó la galaxia, los Kara'ka'a. Entre sus particulares adelantos científicos están la capacidad de extraer energía concentrada de las manchas solares y el desarrollo de implantes personales de manipulación de campos."
 inet_trade_manifesto: "Manifiesto comercial de RICI"
 inet_trade_manifesto_desc_short: "Lista amplia y muy detallada de las políticas de intercambio comercial en la Red Intergaláctica de Comercio Igualitario"
 inet_trade_manifesto_desc_details: "Los comerciantes ricinos ponían el listón realmente alto y buscaban siempre el mejor trato con los socios más respetables. Como consecuencia, normalmente comerciaban entre sí."
 inetian_model_manual: "Manual del modelo planetario ricino"
 inetian_model_manual_desc_short: "Manual de usuario redactado por los comerciantes ricinos para manejar y mantener su modelo del sistema planetario"
 inetian_model_manual_desc_details: "Los ricinos usaban este elaborado sistema para calcular las rutas comerciales más rentables entre planetas vecinos. El modelo también incluye la capacidad de realizar un seguimiento de las transacciones a medida que se realizan, incluso en el caso de los comerciantes más despiadados."
 infinite_reboot_loop: "Bucle de reinicio infinito"
 infinite_reboot_loop_desc_short: "Registro digital de la experiencia de drones mecánicos suspendidos en el interior de un agujero negro"
 infinite_reboot_loop_desc_details: "Estas unidades experimentaron la dilatación del tiempo como un trauma sobrecargado de errores y atrapado en un espacio indefinido. El fenómeno es increíblemente extenuante para la red en su totalidad."
 interdimensional_treaty: "Tratado interdimensional"
 interdimensional_treaty_desc_short: "Documento histórico que celebra una relación interdimensional mantenida con una versión paralela de [explorer.GetName]"
 interdimensional_treaty_desc_details: "La capacidad de revisar las decisiones de una versión alternativa de uno mismo desde una perspectiva externa resulta útil para analizar objetivamente tus propias políticas. Una oportunidad realmente única para la ciencia."
 intergalactic_projectile: "Proyectil intergaláctico"
 intergalactic_projectile_desc_short: "Munición de impulsor de masa lanzada millones de años atrás desde una galaxia vecina"
 intergalactic_projectile_desc_details: "Estos proyectiles no explosivos recorrieron muchos años luz hasta estrellarse con una nave de investigación [owner.GetAdjective] en [from.GetName]. A pesar de su antigüedad, la complejidad y resistencia del diseño hace suponer que sus creadores habían alcanzado un nivel avanzado de supremacía tecnológica."
 invasive_exofungus: "Exohongo invasivo"
 invasive_exofungus_desc_short: "Crecimiento fúngico parasitario descubierto en [from.GetName]"
 invasive_exofungus_desc_details: "Este organismo micélico ha evolucionado para extraer nutrientes de cualquier ser vivo y mantiene con vida a su huésped todo lo posible sin que le afecte el dolor o las molestias. Por su resistencia al calor y al frío, es probable que llegara a este planeta en una nave visitante. Está clasificado como riesgo biológico de prioridad alfa y su planeta de origen es desconocido."
 irassian_bacterium_javoria: "Bacterium Javoria irassiana"
 irassian_bacterium_javoria_desc_short: "Esta bacteria oriunda de [FROMFROM.GetName] es el organismo que acabó originando la enfermedad conocida como \"viruela javoriana\""
 irassian_bacterium_javoria_desc_details: "Consiguió atravesar la cuarentena por culpa de una junta de tamaño incorrecto y luego se extendió a la colonia cercana. A partir de ese momento, la bacteria evolucionó hacia la incubación orgánica y sus mutaciones acabaron provocando una enfermedad que arrasaría todo el Concordato Irassiano. Esta muestra concreta es inerte y se mantiene en una suspensión criogénica."
 irassian_digital_atlas: "Atlas infantil irassiano"
 irassian_digital_atlas_desc_short: "Herramienta didáctica irassiana para educar a los niños sobre el imperio en el que nacieron"
 irassian_digital_atlas_desc_details: "Proporciona información básica sobre la agricultura, la jerarquía social y las exportaciones principales del Concordato Irassiano. La historia se narra en forma de relatos heroicos e incluye la conquista y sometimiento de diversas especies clientes. Los súbditos se representan de forma caricaturesca con alusiones poco elogiosas: a los ti'derg los denominan \"plaga de langostas\", los joggra son \"carroñeros\" y los chitorc se consideran \"gallináceas espaciales\"."
 irassian_purge_order: "Orden de purga irassiana"
 irassian_purge_order_desc_short: "Mensaje militar de emergencia en el que el Concordato Irassiano ordena la aniquilación de una de sus propias colonias"
 irassian_purge_order_desc_details: "El planeta estaba asolado por una enfermedad mortal conocida como viruela javoriana, y eliminar a los infectados fue la única opción que estimaron viable para prevenir una mayor transmisión. Esta orden lleva codificadas varias anulaciones de alto nivel procedentes del escalafón más alto del gobierno irassiano, un sistema ideado originalmente para declarar la guerra a otros imperios."
 key_to_fertility: "La clave para la fertilidad de la especie [owner_main_species.GetName]"
 key_to_fertility_desc_short: "Investigación genética para restablecer la capacidad de los [owner_main_species.GetNamePlural] de reproducirse naturalmente"
 key_to_fertility_desc_details: "Tras haber sido clonados para el combate, los habitantes de [this.GetName] han recuperado la capacidad de propagar su especie independientemente."
 khalanka_crystallized_corpses: "Cadáveres de kha'lanka cristalizados"
 khalanka_crystallized_corpses_desc_short: "Restos de una especie anaerobia de silicato hallada bajo tierra en [from.planet.GetName]"
 khalanka_crystallized_corpses_desc_details: "Se cree que esta civilización subterránea disfrutó de una existencia pacífica antes de la llegada de los colonos [owner.GetAdjective]. Cuando se abrió el suelo, el oxígeno inundó las cámaras subterráneas, oxidando los cuerpos de los kha'lanka y eliminando su especie en unas pocas horas."
 khamdai_magil_sha: "Magil-sha khamdai"
 khamdai_magil_sha_desc_short: "Esta hoz tan decorada como práctica la blandían guerreros khamdai veteranos de [FROMFROM.GetName]"
 khamdai_magil_sha_desc_details: "Una sociedad insectoide con tradiciones marciales profundamente arraigadas que se convirtió rápidamente en líderes de la Guardia de Honor de la Primera Liga. Tras cada victoria, se celebraba una ceremonia en la se ejecutaba a los comandantes enemigos con esta arma, y se empleaban sus fluidos para ungir a los soldados más valientes. La hoja de este ejemplar, aunque bien cuidada, muestra claros signos de desgaste."
 kuurian_cybrex_blueprints: "Planos de Cibrex kuuriano"
 kuurian_cybrex_blueprints_desc_short: "Diseño inicial de la consciencia artificial Cibrex"
 kuurian_cybrex_blueprints_desc_details: "Los kuur planeaban usar estos robots como funcionarios públicos, con su inteligencia colectiva capaz de gestionar un sistema mundial de mantenimiento y producción. Sin embargo, los cibrex se revolvieron contra sus creadores y exterminaron a la especie en menos de un año."
 landeer_arm: "El brazo de Landeer"
 landeer_arm_desc_short: "Muestra extraña recuperada del Instituto Patriótico de la Benevolencia"
 landeer_arm_desc_details: "En el despacho del supervisor del hábitat estaba colgado este tentáculo momificado, que una vez fue su brazo y que seguía exhibiéndose orgulloso en su placa adornada tras todos estos años. Puede que jamás se conozca la razón por la que alAtta Landeer decidió dejarse atrás un miembro. Puede que ese no fuera el único precio que pagó por la caída del Instituto..."
 larionessi_cloning_vat: "Tanque de clonación larionessi"
 larionessi_cloning_vat_desc_short: "Cuba que empleaba la Consciencia Larionessi, ya extinta, para la clonación"
 larionessi_cloning_vat_desc_details: "La mente colmena larionessi llegó a ser una gran potencia galáctica, pero quedó mutilada por la horrible enfermedad infecciosa que le transmitió un adversario. Al no conseguir curar la enfermedad a tiempo, los larionessi almacenaron clones en tanques que los mantenían en una estasis casi indefinida con el fin de crear un archivo viviente de la historia de su cultura si sobrevivían."
 last_copy_of_the_prince: "Última copia de El príncipe"
 last_copy_of_the_prince_desc_short: "Obra literaria bastante mediocre reverenciada por los [book_writer.GetSpeciesName], que la creían perdida para siempre en un asalto"
 last_copy_of_the_prince_desc_details: "El libro expone una filosofía tan utilitaria como cruel y anima a los poderosos a hacer sacrificios a cambio de la gloria. Siendo la última copia, ha cobrado nueva vida como pieza de coleccionista."
 last_fragment_fevor: "Último fragmento de Fevor"
 last_fragment_fevor_desc_short: "Pedazo del planeta destruido de Fevor"
 last_fragment_fevor_desc_details: "Las políticas de exterminio de los fevorianos se extendieron a toda la vida alienígena conocida, mediante el lanzamiento de enormes proyectiles de tungsteno que casi destruyeron [owner.GetHomeWorldName] en su totalidad. Ahora han caído ellos también, suprimidos en un instante por aquellos mismos seres que intentaban eliminar."
 last_general_badge: "Insignia del último general"
 last_general_badge_desc_short: "Insignia del uniforme militar de un respetado general comerciante ricino"
 last_general_badge_desc_details: "Conocido como modelo de valores igualitarios, fue seleccionado para cumplir la misión desesperada de crear un manipulador de tormentas no contaminante. Tuvo la idea de dejar un último mensaje a los exploradores futuros con la esperanza de que extrajeran una lección del triste destino de su pueblo."
 last_mharin_kharin: "La última mharin kharin"
 last_mharin_kharin_desc_short: "El ciclo de vida natural de esta rara flor tiene la peligrosa capacidad de volver a toda una población sintiente vulnerable a una neurotoxina mortal"
 last_mharin_kharin_desc_details: "Este organismo ha evolucionado aparte de los seres inteligentes con este efecto negativo. Al parecer, cuando el polen entra en contacto con una red neuronal, la confunde con un órgano reproductor acogedor y libera una carga química exótica."
 leviathan_scale: "Escama de leviatán"
 leviathan_scale_desc_short: "Fragmento de un gran organismo descubierto al otro lado de una grieta astral"
 leviathan_scale_desc_details: "Esta escama exótica es un híbrido de componentes orgánicos y metálicos combinados en un complejo entramado que le confiere una resistencia increíble al impacto cinético."
 living_snow_sculpture: "Escultura de nieve viviente"
 living_snow_sculpture_desc_short: "Escultura hecha de nieve viviente"
 living_snow_sculpture_desc_details: "Este material, que posee cierta forma de consciencia primitiva, disfruta de una reserva natural en [prev.target.GetName]. Cambia de forma con regularidad, aunque el momento en que lo hace es impredecible."
 localised_aurora_borealis: "Aurora boreal localizada"
 localised_aurora_borealis_desc_short: "Colores centelleantes captados en un vídeo de la atmósfera de [FromFrom.Planet.GetName]"
 localised_aurora_borealis_desc_details: "Los colores y movimientos se repiten en patrones con frecuencias predecibles como representación de algo que va más allá de la pura belleza estética. Su continua presencia añade un tono conmovedor al planeta sumido en la guerra y la destrucción que tienen debajo."
 loopmail: "Mensaje en bucle"
 loopmail_desc_short: "Notas enviadas por [owner.GetName] desde varios años en el futuro como guía precisa sobre la asignación de científicos y qué esfuerzos de investigación realizar"
 loopmail_desc_details: "La carga de enviar estas notas al pasado es el principal coste de este conocimiento avanzado, pero interferir en el curso del tiempo siempre es una empresa arriesgada. Los emisores originales de este mensaje fueron muy irresponsables al crear esta paradoja."
 lunatic_broker_therapy_box: "Caja de terapia del Marchante Lunático"
 lunatic_broker_therapy_box_desc_short: "El Marchante Lunático era un comerciante legendario entre los Caravaneros que influía en los clientes con exigencias escandalosas y coloridas amenazas"
 lunatic_broker_therapy_box_desc_details: "Debido a su actitud violenta e impredecible, sus sujetos desarrollaron métodos para calmarle. Uno de ellos era la terapia de sonido: se repartieron por la Brújula de Chor cajas como esta, que reproducían una melodía apaciguadora cuando subían los niveles de estrés del Marchante. Todas las piezas de este mecanismo eran fabricadas a mano por un maestro maquinista."
 manifesti_piece: "Obra de crítica social del Manifiesto"
 manifesti_piece_desc_short: "Provocativa obra del movimiento Manifiesto"
 manifesti_piece_desc_details: "Esta obra pretende desafiar la percepción de uno mismo en relación con las castas sociales superiores. Animaba al público a manipular imágenes de sí mismos y a crear collages distorsionados de personajes políticos populares. Como colectivo artístico contracultural, Manifiesto buscaba desafiar lo que percibían como un sistema opresivo. Esta obra ha inspirado a muchos artistas a publicar sus propias críticas."
 #this = ship / from = planet
 manna_fruit: "Maná"
 manna_fruit_desc_short: "Una fruta dulce y carnosa que cubre casi todos los requisitos nutricionales diarios de prácticamente toda la vida inteligente orgánica"
 manna_fruit_desc_details: "La particular composición del suelo de los bosques tropicales de su planeta natal ha proporcionado el entorno perfecto para su extensa proliferación. Los colonos de este planeta la utilizan prácticamente en todos los contextos culinarios, desde guisos hasta ponches y cócteles. Está representado visiblemente en la bandera del planeta [FROM.GetName]."
 #this = ship / FROMFROM = planet
 massive_metatarsal: "Metatarso enorme"
 massive_metatarsal_desc_short: "Estos restos se obtuvieron durante un examen a fondo de los enormes residuos esqueléticos de [FROMFROM.GetName]"
 massive_metatarsal_desc_details: "Como parte de una nave viviente, su análisis molecular mostró irregularidades temporales en su construcción orgánica. Se cree que el esqueleto completo y sus pilotos viajaron hasta aquí desde fuera de nuestra dimensión. Los escáneres internos revelan una red de conductos que podría haber servido como una especie de sistema de soporte vital o de suministro energético."
 #this = country
 medal_for_services_to_diplomacy: "Medalla por servicios a la diplomacia"
 medal_for_services_to_diplomacy_desc_short: "Muestra de agradecimiento del Consejo galáctico"
 medal_for_services_to_diplomacy_desc_details: "La inscripción del reverso reza: \"Como receptor de este premio, el cuerpo diplomático de [this.GetName] ha demostrado su profesionalidad y capacidad para representar a sus líderes de manera efectiva, y es un verdadero activo para la comunidad galáctica\"."
 megacorpse_hyperguitar: "Hiperguitarra de MegaMuerte"
 megacorpse_hyperguitar_desc_short: "Restos de un instrumento de cuerda utilizado por el grupo de metal psiónico MegaMuerte"
 megacorpse_hyperguitar_desc_details: "Dicen que este instrumento se fabricó dentro del Velo como arma sónica. Lo tocaba el kel-azaan que lideraba el grupo; su música capturó las mentes de miles de millones hasta terminar reventado en [Root.GetName], donde destruyó a todo el público en un estallido de gloria. Desde entonces, el disco relacionado está prohibido en muchos sistemas."
 #this = country / from = ship
 memorial_for_bubbles: "Monumento a [from.GetName]"
 memorial_for_bubbles_desc_short: "Tras años de leal servicio, [from.GetName] falleció, dejando en [this.GetName] un agujero imposible de rellenar del tamaño de una ameba"
 memorial_for_bubbles_desc_details: "[from.GetName] no solo fue fiel en su defensa, sino también un brillante ejemplo de lo que es posible cuando salen a la luz los mejores valores [this.GetAdjective]. Aunque ya no esté, vivirá siempre en nuestra memoria."
 memorial_stone: "Piedra monumental"
 memorial_stone_desc_short: "Piedra conmemorativa tallada en memoria de un trágico accidente"
 memorial_stone_desc_details: "Las operaciones mineras excesivas en la estación conocida como Selika provocaron el colapso del asteroide en el que se asentaba. La estación se partió en dos, lo que provocó un gran número de muertes entre los mineros. Se conservó este fragmento del asteroide con la palabra \"Selika \" grabada en recuerdo de las vidas perdidas."
 memorial_to_homeworld: "Monumento a [Root.GetName]"
 memorial_to_homeworld_desc_short: "Esto es cuanto queda del mundo natal [doomsday_owner.GetAdjective]"
 memorial_to_homeworld_desc_details: "[Root.GetName] era el hogar de todas las generaciones anteriores de [doomsday_owner.GetSpeciesName] hasta que se destruyó. Este último recordatorio destaca la fuerza de voluntad de los [doomsday_owner.GetName], capaces de adaptarse y superar hasta las circunstancias más difíciles: \"Seguiremos adelante\"."
 memories_of_elik: "Recuerdos de Elik"
 memories_of_elik_desc_short: "Datos extraídos de la mente de Elik Narith Kerak"
 memories_of_elik_desc_details: "Elik es una seguidora devota de Cetana que lleva cientos de millones de años congelada en animación suspendida. Sus recuerdos alternan entre su amor puro hacia Cetana y la violencia y el conflicto con los seguidores de Zarqlan. Está claro que ha visto muchas atrocidades, pero su fe le dio fuerzas para continuar.\n\nAl final, lo único que quedaba en su mente deteriorada era una sola imagen: §Pla reina Cetana, su rostro resplandeciente, su mirada benévola endulzada por una sonrisa§!."
 memory_orbs: "Orbes de memoria"
 memory_orbs_desc_short: "Pequeñas transgresiones y actos pecaminosos extraídos de recuerdos individuales en forma de orbe digital"
 memory_orbs_desc_details: "Estos momentos secretos son producto de una sociedad moluscoide religiosa se extrajeron de las mentes de los pecadores al término de su confesión. Esta escandalosa recopilación supondría una lectura amena durante miles de horas."
 mercenary_story: "Historias de un mercenario"
 mercenary_story_desc_short: "Esta historia en formato digital fue escrita por primera vez en la superficie de [FROM.GetName] con un láser de minería"
 mercenary_story_desc_details: "Relata la vida y la prematura muerte de un joven mercenario que viajaba por la galaxia. No hay forma de saber si esta leyenda es cierta, pero alguien pensó que era lo suficientemente importante como para grabarla en un planeta."
 metallic_snow: "Nieve metálica"
 metallic_snow_desc_short: "Este compuesto de metales pesados forma parte esencial de los patrones climáticos de [from.GetName]"
 metallic_snow_desc_details: "Unos ríos fundidos desembocan en un vasto mar metálico para después evaporarse en la corrosiva atmósfera. Al enfriarse, se condensan en forma de lluvia sobre la superficie calcinada. Desaconsejamos visitar [from.GetName] en su estado actual."
 minamar_chandelier: "Candelabro de Minamar"
 minamar_chandelier_desc_short: "Un adorno de lujo en perfectas condiciones hallado entre los restos de la nave de guerra $ADJ_MSI_country$"
 minamar_chandelier_desc_details: "Más allá del uso militar, esta nave también se utilizó para operaciones de primer contacto con posibles naciones clientes [Owner.GetPreFTLLower]. $NAME_MSI_country$ vende una promesa de lujo y progreso para convencer a civilizaciones enteras de que se conviertan en sus sirvientes contratados, atándolos con contratos poco éticos y amenazando con destruirlos en caso de incumplirlo.\n\n§BPuede que la iluminación conlleve un precio, pero en $NAME_MSI_country_initials$ la inversión siempre sale a cuenta.§!"
 mineralized_brain: "Cerebro mineralizado"
 mineralized_brain_desc_short: "Este órgano cerebral forma parte de los restos de una gigantesca especie litoidea que orbitaba en el interior de un asteroide de [FROM.GetName]"
 mineralized_brain_desc_details: "Percibía todos los estímulos externos como parte de su propia cadena de pensamiento, por lo que no era capaz de distinguir conceptos tan básicos como el tiempo o la distancia recorrida. Estos datos se almacenan en cristales que van creciendo en su núcleo mineral. No podemos confirmar si este se colocó dentro de un asteroide o creció allí por su cuenta."
 mini_moon_dust: "Polvo minilunar"
 mini_moon_dust_desc_short: "Los restos de una luna proveniente de un sistema hiperdenso en miniatura que se descubrió al otro lado de una grieta astral"
 mini_moon_dust_desc_details: "El polvo recuperado muestra un peculiar comportamiento en nuestra dimensión. Sus partículas hiperconcentradas siguen expandiéndose, por lo que debemos transferir este ejemplar a contenedores cada vez más grandes."
 mining_transmitter: "Antiguo transmisor minero"
 mining_transmitter_desc_short: "Un transmisor de corto alcance encontrado en [FROM.GetName] y que servía para señalizar un gran depósito de metales preciosos"
 mining_transmitter_desc_details: "A pesar de su antigüedad, la señal de este transmisor es fácilmente rastreable y puede detectarse con una amplia gama de sensores. Su constante funcionamiento da fe de lo sólida que es su ingeniería."
 miracle_cream: "Crema milagrosa \"Eterno\""
 miracle_cream_desc_short: "El primer envase de un cosmético revolucionario conocido por proporcionar un rejuvenecimiento biológico duradero"
 miracle_cream_desc_details: "Es tan versátil que permite a los clientes de casi cualquier especie orgánica conservar el brillo de su juventud. Todavía circulan rumores infundados sobre efectos secundarios desfigurantes e ingredientes obtenidos ilegalmente, pero esta información errónea no ha obstaculizado el increíble éxito comercial del cosmético."
 missile_lone_defender: "Misil del defensor solitario"
 missile_lone_defender_desc_short: "El misil desarmado de un destructor automatizado que defendía un planeta devastado desde hacía tiempo"
 missile_lone_defender_desc_details: "Lo más probable es que la nave sobreviviera a la civilización que debía proteger hace miles de años, por lo que se quedó custodiando un mundo vacío. Con su destrucción, su vigilia llegó a su fin."
 molten_slag: "Desechos planetarios fundidos"
 molten_slag_desc_short: "Esta muestra se tomó en un planeta con una órbita peculiar"
 molten_slag_desc_details: "El análisis del material indica que [fromfrom.GetName] fue arrastrado a una órbita extrema por una anomalía espacio-temporal transitoria, y el intenso calor de la proximidad de su estrella derritió gran parte del manto del planeta, que alguna vez fue habitable. La anomalía provocó una alteración química en parte del planeta, que ya no reacciona a los cambios de temperatura."
 musings_on_infinity: "Reflexiones colectivas sobre el infinito"
 musings_on_infinity_desc_short: "Una representación digital abstracta de la distante calma de unos drones biológicos que quedaron suspendidos en un agujero negro"
 musings_on_infinity_desc_details: "Estos drones pudieron observar [this.GetName] como entidades independientes y objetivas mientras mantenían el contacto con el colectivo. La distancia les ofreció una gran perspectiva que les permitió existir como testigos de su gran historia."
 mutated_fumongus: "\"Enormongo\" mutado"
 mutated_fumongus_desc_short: "Una versión mejorada de \"Enormongo\". Estos emisores micélicos ya pueden recabar datos y transmitirlos a una velocidad mucho mayor para elaborar informes de vigilancia más detallados"
 mutated_fumongus_desc_details: "Su mayor capacidad ha hecho que las setas crezcan por separado hasta crear una nueva formación que recuerda vagamente a una antena de radio."
 mutative_digestive_fluids: "Fluidos digestivos mutativos"
 mutative_digestive_fluids_desc_short: "Muestras biológicas sacadas de un ente semimecánico hallado al otro lado de una grieta astral"
 mutative_digestive_fluids_desc_details: "Esta criatura poseía una capacidad única para manipular la estructura genética de otras criaturas desde el interior de su propio sistema digestivo. Se sospecha que este proceso se desarrolló inicialmente como un método de terraformación de planetas que contenían biomasa fuera de su mundo natal."
 namarian_colonist_standard: "Estandarte de colonos namarianos"
 namarian_colonist_standard_desc_short: "Esta bandera es un generoso obsequio de [this.GetName], que representa la colonización de [nomad_new_country.GetName] en [NomadMissionPlanet.GetName]"
 namarian_colonist_standard_desc_details: "Cansados de su estilo de vida itinerante, algunos nómadas se asentaron allí para retomar las costumbres de sus antepasados. No cabe duda de que esta decisión pesaba sobre la conciencia de los colonos cuando abandonaban las naves que habían alojado a su pueblo durante generaciones."
 namarian_sculpture: "Escultura namariana"
 namarian_sculpture_desc_short: "Una estatua de técnica mixta construida como muestra de gratitud por parte de un grupo de nómadas de las Aguas que Fluyen que se unieron a [this.GetName]"
 namarian_sculpture_desc_details: "Al aterrizar en [NomadMissionPlanet.GetName], los antiguos nómadas aportaron su amplia experiencia tecnológica. Sin embargo, no querían ser conocidos únicamente como inventores e ingenieros.. Esta obra deja patentes sus dotes artísticas y la inspiración que sacaron en sus viajes por la galaxia."
 namarian_vessel_heraldry: "Heráldica de nave namariana"
 namarian_vessel_heraldry_desc_short: "Estos emblemas se encontraron en el interior de unas naves de nómadas namarianos y representan a las diversas facciones que componen la flota de las Aguas que Fluyen"
 namarian_vessel_heraldry_desc_details: "Las Reservas Mansas representan las naves donde los namarianos duermen, cultivan alimentos y llevan a cabo la mayoría de sus actividades domésticas. El emblema de los Rápidos Someros representan naves industriales y científicas; unas naves medianas más antiguas equipadas con herramientas para todo, desde operaciones de recuperación hasta experimentos científicos. Para terminar, el emblema de las Aguas Embravecidas representa a la armada namariana; combatientes entrenados para pilotar robustas naves capaces tanto de soportar fuego intenso como de provocarlo."
 nanite_sludge: "Lodo de nanorrobots"
 nanite_sludge_desc_short: "Un compuesto cuidadosamente conservado formado por nanomáquinas microscópicas autorreplicantes"
 nanite_sludge_desc_details: "La densidad de estos nanorrobots es impresionante. Añaden miles de millones de toneladas de masa a [from.GetName], el lugar donde se descubrieron. Existe la teoría de que estos nanorrobots se averiaron y entraron en fase de reproducción sin restricciones, devorando su planeta por completo y condenando a sus anteriores habitantes. Este ejemplar en concreto ha sido neutralizado."
 obsidian_obelisk_fragment: "Fragmento de obelisco de obsidiana"
 obsidian_obelisk_fragment_desc_short: "El fragmento de un obelisco que se hallaba en el centro de un plano volcánico más allá de una grieta astral"
 obsidian_obelisk_fragment_desc_details: "Sus símbolos cambiantes ocultan los nombres de miles de individuos, junto con su historial delictivo. Es posible que este dispositivo se usara como el panel de control principal de una enorme prisión dimensional."
 oiled_fabric: "Tejido al óleo"
 oiled_fabric_desc_short: "Una apacible representación elaborada con pigmentos al óleo de unas montañas nevadas con un bosque boreal en primer plano"
 oiled_fabric_desc_details: "Si bien se trata de una forma de expresión habitual en casi todas las especies con apéndices prensiles, el talento de este artista es notorio."
 organic_computer: "Ordenador orgánico"
 organic_computer_desc_short: "El fósil de un ordenador orgánico hallado entre las ruinas de la colonia baol de [fromfrom.Planet.GetName]"
 organic_computer_desc_details: "Este dispositivo servía para educar a los jóvenes antes de integrarlos en la colmena. Se trata de una impresionante proeza de bioingeniería. Los archivos recuperados detallan innovadoras técnicas de ecogestión que solo eran posibles con la biología única de esta especie. Los mundos que los rodean no eran creados, sino cultivados."
 organic_machine_interface_sculpture: "Escultura de conexión entre orgánicos y máquinas"
 organic_machine_interface_sculpture_desc_short: "Una estatua conmemorativa en reconocimiento al servicio prestado por las poblaciones biológicas [bio_pop.GetSpeciesName] durante una tormenta solar geomagnética en [this.solar_system.GetName]"
 organic_machine_interface_sculpture_desc_details: "La población orgánica decidió apoyar a los sirvientes mecánicos al asumir la labor de las unidades de cuidadores defectuosas. Esta obra se diseñó entre seres orgánicos con inclinaciones artísticas y drones especializados en soldaduras."
 orinthi_teeth: "Diente de orinthi"
 orinthi_teeth_desc_short: "El diente en constante crecimiento de un orinthi"
 orinthi_teeth_desc_details: "Los orinthi son unas pequeñas criaturas similares a los roedores que excavaron laberínticas madrigueras por todo [fromfrom.GetName]. Sus dientes en realidad son pequeños y huecos, pero una especie de hongos queratinosos habita en cada uno de ellos, formando unos afilados y frágiles colmillos para que los orinthi los utilicen."
 osseus_construction_material: "Material óseo de construcción"
 osseus_construction_material_desc_short: "Estos gigantescos huesos se emplearon como recurso material en [fromfrom.Planet.GetName]"
 osseus_construction_material_desc_details: "Una especie de reptiles con osificación genética de tejidos blandos que fue criada extensivamente con intención de utilizarla como material de construcción. Los análisis indican que los reptiles sufrían otras grandes taras genéticas resultantes de la endogamia, como pies no palmeados. La mayoría de estas criaturas sufrió la eutanasia antes de que fueran cosechadas."
 path_to_progress: "La ruta hacia el progreso"
 path_to_progress_desc_short: "Una declaración formal de la misión industrial de [owner.GetName]"
 path_to_progress_desc_details: "El deseo de crecer y aumentar la satisfacción de los clientes a cualquier precio es unos de los principales mantras [owner.GetAdjective]. Reducir los planetas a páramos irradiados es un paso necesario en la interminable búsqueda del progreso."
 peerless_atomic_clock: "Reloj atómico sin parangón"
 peerless_atomic_clock_desc_short: "Un reloj atómico sumamente preciso de [atomic_clock_system.GetName]; se desconoce la identidad de sus creadores"
 peerless_atomic_clock_desc_details: "En el momento en el que lo descubrieron, marcaba 42 años y 3 días, pero no hay forma de saber cuánto tiempo estuvo marcando antes. Cuando el contador llegó a cero, liberó unos nanorrobots programados con unas misteriosas instrucciones. Aunque sigue funcionando a la perfección, ha quedado desprovisto tanto de su carga como de su cometido."
 perception_of_infinity: "Percepción del infinito"
 perception_of_infinity_desc_short: "Una representación digital abstracta de la angustia temporal que sufrieron unos drones que quedaron suspendidos en un agujero negro"
 perception_of_infinity_desc_details: "Estos drones vivían en un constante estado de déjà vu; en su inquietud, anhelaban una sensación largo tiempo olvidada. Esta sensación premonitoria sigue apareciendo vagamente en el entramado mental [this.GetAdjective]."
 perfectly_faceted_carbon: "Carbón facetado a la perfección"
 perfectly_faceted_carbon_desc_short: "Si bien el carbón en su forma cristalina es algo bastante común en nuestra galaxia, este ejemplar destaca por la completa falta de inclusiones internas o externas"
 perfectly_faceted_carbon_desc_details: "El anterior dueño de este artefacto se tomó la molestia de tallarlo de forma que estas impresionantes características quedaran palpables."
 pet_collar: "Collar enjoyado para mascotas"
 pet_collar_desc_short: "Un collar usado para establecer quién es el dueño de un pequeño mamífero domesticado"
 pet_collar_desc_details: "En principio lo utilizaba [event_envoy.GetName], el enviado de [this.GetName], por si se perdía su querida mascota. Luego, pasó a emplear un microchip integrado, mucho más efectivo. La temperamental criatura solía aparecer en el puesto de trabajo de su dueño, y emitía un aleteo de satisfacción cada vez que [event_envoy.GetName] le tocaba la cabeza con su [event_envoy.Species.GetHandName]."
 perikan_tapico_jewel: "Joya perikana de Tapico"
 perikan_tapico_jewel_desc_short: "El Sindicato Perikano era una sociedad de maestros artesanos conocida por crear exquisitos productos de lujo"
 perikan_tapico_jewel_desc_details: "Esta gema era la obra maestra de un legendario orfebre conocido como Bedeers Tapico. Tapico facetó esta enorme gema con un simple cincel durante varios años, además de emplear técnicas alquímicas para licuar su centro. Los cristales que flotan en el interior de la joya se crearon con láseres de precisión que sobrecalentaban las moléculas de los minerales para crear gemas más pequeñas y oscuras mientras el exterior quedaba intacto."
 piece_of_invocator: "Pieza del Invocador"
 piece_of_invocator_desc_short: "El fragmento de un dispositivo destruido al que conocían como \"Invocador de tempestades\""
 piece_of_invocator_desc_details: "Aunque no es más que un trozo hecho añicos, sigue emanando una maligna energía psiónica. Se ha contenido en un entorno protegido para observarlo de forma segura."
 pilgrimage_last_days: "El peregrinaje de los últimos días"
 pilgrimage_last_days_desc_short: "Un documento religioso de [fromfrom.Planet.GetName] que describe un ritual sagrado conocido como \"el rito del Velo levantado\""
 pilgrimage_last_days_desc_details: "Las instrucciones detallan una serie de cánticos para que un público los repita al unísono en formaciones jerárquicas organizadas. En teoría, este procedimiento es capaz de sumir a esta especie en un inaudito y efectivo estado de hipnosis."
 planet_crystalose: "Cristalosa [from.GetName]"
 planet_crystalose_desc_short: "Estos cristales de sacarosa pueden multiplicarse al absorber la radiación solar y ciertos minerales presentes en algunos asteroides"
 planet_crystalose_desc_details: "Debido a su naturaleza extremadamente frágil, son relativamente fáciles de cultivar y procesar. Tienen toda clase de aplicaciones industriales, desde comestibles hasta el desarrollo de polímeros y medicamentos especializados."
 planet_pushing_thruster: "Empujaplanetas"
 planet_pushing_thruster_desc_short: "Al conectar estos gigantescos dispositivos de propulsión en serie, en teoría podrían afectar la órbita de un planeta pequeño"
 planet_pushing_thruster_desc_details: "El sistema de montaje de estos propulsores se diseñó para empujar un planeta sin que su rotación se vea afectada. El principal problema logístico de esta tecnología viene motivado por la excesiva cantidad de combustible que consume. Haría falta la coordinación de toda una civilización para mantener su operatividad."
 planet_super_roots: "Superraíces de [From.GetName]"
 planet_super_roots_desc_short: "La pulpa de estas raíces naturales oriundas de los bosques de [From.GetName] es de lo más nutritiva"
 planet_super_roots_desc_details: "Con una meticulosa gestión, al cosechar solo una porción de sus extensas redes, las plantas anfitrionas podrían sobrevivir mientras ayudan a las colonias a desarrollarse. Hemos empezado a experimentar con una sencilla modificación genética que nos permitiría injertar estas raíces en los cultivos actuales para potenciar las cosechas."
 planet_vaccine: "Vacuna de [this.GetName]"
 planet_vaccine_desc_short: "Una milagrosa cura para la enfermedad mutante que azotó [this.GetName]"
 planet_vaccine_desc_details: "Esta fórmula se desarrolló mediante algoritmos de predicción de IA para mapear todas las posibles variantes de la enfermedad e identificar un punto débil en común. La creación de esta vacuna supuso un gran avance en el campo de la medicina."
 planetary_sculpture: "Escultura planetaria"
 planetary_sculpture_desc_short: "Un ejemplo de escultura a escala planetaria que emplea la superficie de [fromfrom.planet.GetName] como materia prima"
 planetary_sculpture_desc_details: "Se utilizaron drones armados con potentes láseres para trazar líneas precisas a través de continentes enteros, montañas perfectamente esféricas y sistemas cavernosos increíblemente intrincados. Los planos de diseño que se subieron al satélite de control central sirven para ilustrar el tremendo nivel de planificación logística y sensibilidad artística de este proyecto. Lástima que fuese abandonado antes de que llegase a su fin."
 primitive_mega_electromagnet: "Megaelectroimán primitivo"
 primitive_mega_electromagnet_desc_short: "Un trozo de un potente y vanguardista electroimán"
 primitive_mega_electromagnet_desc_details: "En su necedad, los antiguos habitantes de [fromfrom.GetName] usaron este dispositivo para acercar la luna de su planeta a fin de facilitar la extracción de sus valiosos metales. Este enfoque fue tan efectivo que la luna se estrelló en la superficie del planeta, exterminando a todos sus habitantes en el proceso. Este ejemplar no es más que una pequeña fracción de lo que pudimos recuperar de la máquina planetaria."
 programmable_puzzle_cube: "Cubo de rompecabezas programable"
 programmable_puzzle_cube_desc_short: "Un dispositivo sumamente sofisticado capaz de registrar patrones complejos a fin de crear rompecabezas abstractos"
 programmable_puzzle_cube_desc_details: "Esta pieza original se halló en el interior de un gran constructo artificial, y su función era poner a prueba el intelecto de un explorador. En lo sucesivo, el cubo se ha replicado para uso del consumidor, y permite a cada individuo programar rompecabezas que otros puedan resolver, o bien para guardar sus pertenencias a buen recaudo."
 psionic_entity_residue: "Residuo de entidad psiónica"
 psionic_entity_residue_desc_short: "Los vestigios de la entidad de energía psiónica pura hallada en el interior de [fromfromfrom.fleet.solar_system.GetName]"
 psionic_entity_residue_desc_details: "Fue descubierta emergiendo de una fisura temporal que permitía que energía de toda la galaxia se acumulase en un punto. Es posible que esa maldad en estado puro se aislase intencionadamente de la red de hipervías durante eones, hasta su descubrimiento reciente."
 radiated_remains: "Restos irradiados"
 radiated_remains_desc_short: "Los vestigios de una especie que llevaba a cabo ceremonias rituales con potentes mutágenos radiactivos"
 radiated_remains_desc_details: "Cada mutación era un acontecimiento sacro que se interpretaba como una manifestación del destino de cada individuo. Con el tiempo, este procedimiento acabó por desestabilizar la estructura genética de la especie y debilitar su sistema inmune, exponiendo así a la población a enfermedades."
 #this = ship / from = planet
 rainaissance: "Renacimiento púrpura"
 rainaissance_desc_short: "Imágenes artísticas en las que se plasma la insólita lluvia púrpura presente en los patrones meteorológicos de [FROM.GetName]"
 rainaissance_desc_details: "Se cree que la contemplación de esta imagen evocadora atenúa pensamientos de pena y dolor."
 reactive_rock: "Roca reactiva"
 reactive_rock_desc_short: "Este mineral inestable carece de uso comercial o industrial en su estado actual"
 reactive_rock_desc_details: "Sin embargo, debido a sus propiedades excepcionalmente reactivas, es posible desencadenar un cambio metasomático completo en condiciones específicas. El espécimen se encuentra encapsulado en un receptáculo a base de plomo que limita el bombardeo radiactivo y eléctrico."
 reparation_invoice: "Factura de reparaciones"
 reparation_invoice_desc_short: "Una factura de reparaciones de guerra enviada por $NAME_MSI_country$"
 reparation_invoice_desc_details: "Esta lista, redactada por la Empresa Gestora de Créditos Interestelares, da cuenta de todos los activos militares que se perdieron cuando [this.GetName] se zafó del yugo de la servidumbre a la que la \"corporación benevolente\" los sometió. La megacorporación exige un reembolso por los daños, y se aventura incluso a afirmar que tocar las naves destruidas en el espacio [this.GetAdjective] supondría quebrantar de nuevo el contrato."
 repurposed_cleaning_drone: "Dron de limpieza reacondicionado"
 repurposed_cleaning_drone_desc_short: "El diseño de este dron respondía a un protocolo de saneamiento panplanetario que, por un error de cálculo, volvió completamente estéril el mundo natal de sus creadores"
 repurposed_cleaning_drone_desc_details: "Es sumamente versátil y capaz de efectuar maniobras aéreas gracias a su sistema de propulsores multidireccionales. Esta máquina se reacondicionó para identificar y categorizar la flora y fauna alienígena y, posteriormente, se produjo en masa para ayudar con los esfuerzos de colonización en [explorer.GetName]. Como medida cautelar, se eliminaron sus subrutinas de limpieza."
 resonant_diffusion_crystal: "Cristal de difusión resonante"
 resonant_diffusion_crystal_desc_short: "Este cristal es capaz de absorber cualquier frecuencia de radiación solar y resonarla, creando en el proceso una imagen caleidoscópica"
 resonant_diffusion_crystal_desc_details: "Además de ser una maravilla visual, bien puede servir para desarrollar armas o herramientas de energía. La gema también ha despertado el interés del sector de la joyería galáctica."
 retarax_hunting_trophies: "Trofeos de caza retarax"
 retarax_hunting_trophies_desc_short: "Una colección de trofeos de caza obtenidos de una amplia variedad de especies inteligentes"
 retarax_hunting_trophies_desc_details: "Fueron hallados en el valle de Mak'vaehl, donde los retarax daban caza, por deporte, a ciudadanos que sacaban de sus muchos estados vasallos. Los restos se han conservado en perfecto estado, cada uno con una pequeña placa que detalla las características del trofeo: especie, nombre, edad y profesión."
 robe_of_the_golden_broker: "Túnica del Tratante Áureo"
 robe_of_the_golden_broker_desc_short: "El lujoso atuendo de un mercader influyente que vivió hace más de cinco mil años"
 robe_of_the_golden_broker_desc_details: "El \"Tratante Áureo\" llevó a la estación mercantil Brújula de Chor a una era de prosperidad sin precedentes. Junto con una máscara de oro que le garantizaba el anonimato, iba ataviado con esta túnica cómoda y lujosa cuando negociaba acuerdos comerciales en toda la galaxia. Por desgracia, el Tratante Áureo vio truncado su reinado cuando su nave espacial de oro macizo resultó destruida en un intento malogrado de secuestro."
 rock_jellies: "Petrogeles"
 rock_jellies_desc_short: "Restos criofosilizados de grandes invertebrados gelatinosos"
 rock_jellies_desc_details: "A simple vista, estos restos calcificados se asemejan a formaciones rocosas, pero pertenecen en realidad a la forma de vida dominante en [fromfrom.planet.GetName]. Tras la glaciación más reciente del planeta, la especie quedó al borde de la extinción. Sus restos se solidificaron al degradarse, llegando a formar enormes pseudoislotes flotantes."
 rudari_death_laser_prototype: "Prototipo de láser de la muerte rudari"
 rudari_death_laser_prototype_desc_short: "Un láser armamentístico que montaron los rudari, extintos hace eones, hallado en una estación de [this.solar_system.GetName]"
 rudari_death_laser_prototype_desc_details: "Esta arma de destrucción masiva de rudimentario ensamblaje fue la última baza de la especie rudari en su guerra contra los pogg-mory. Llegado el momento de utilizarlo, el láser se autodestruyó al primer intento de activación."
 saariah_guilt: "Culpabilidad de Saariah"
 saariah_guilt_desc_short: "Los recuerdos grabados de Saariah, desarrolladora principal del sistema subconsciente Memorex"
 saariah_guilt_desc_details: "Saariah tenía el cometido de eliminar recuerdos colectivos por voluntad del gobierno planetario. Sin embargo, a causa de un fallo técnico, borró por completo las mentes de toda la población. Incapaz de recuperar los recuerdos perdidos, Saariah retiró el soporte vital de su hábitat y dejó que la población pereciera. Cada uno de estos dispositivos alberga una potencia de cálculo asombrosa, todo un prodigio tecnológico."
 scent_based_information_device: "Olfatomemoria"
 scent_based_information_device_desc_short: "Un banco de información aromática codificada"
 scent_based_information_device_desc_details: "Los datos que contiene pueden ser una recopilación de narrativas interesantes, o bien registros meticulosos de diversas excreciones orgánicas con todo detalle. Sería factible replicar esta tecnología de almacenamiento de datos olfativos, pero su utilidad práctica es nula, más allá de la novedad por la novedad."
 scientific_treatise_of_telisa: "Tratado científico de Telisa"
 scientific_treatise_of_telisa_desc_short: "Las reflexiones filosóficas de Telisa, la narradora"
 scientific_treatise_of_telisa_desc_details: "La autora explora diversos tópicos retóricos y los fundamentos del método científico. En sus escritos se pone en tela de juicio la noción misma de verdad y se anima a adoptar un pensamiento crítico."
 secrets_black_crown: "Secretos de la Corona Negra"
 secrets_black_crown_desc_short: "Esquema detallado del portal intergaláctico conocido como \"Corona Negra\""
 secrets_black_crown_desc_details: "Estos datos fueron transmitidos como un último regalo de los enigmáticos creadores del portal con la intención de preservar su increíble tecnología. El potencial del majestuoso portento tecnológico que es este portal, confiado a los [this.GetName], aún hoy no conoce rival."
 sembelami_alms_basket: "Canasta de limosnas sembelami"
 sembelami_alms_basket_desc_short: "Un cuenco que llevaban los miembros de los nómadas sembelami para aceptar donativos"
 sembelami_alms_basket_desc_details: "Estos ascetas viajeros empezaron a dedicarse a la piratería \"ética\" cuando un imperio corporativo destruyó su templo orbital. Robaban su riqueza a las megacorporaciones y financiaban con ellas puestos para refugiados. Subsistían por completo gracias a los donativos que les aportaban los mismos refugiados a quienes ayudaban."
 shallarian_data_core: "Núcleo de datos shallariano"
 shallarian_data_core_desc_short: "Una base de datos de terraformación hallada entre las ruinas de la utopía shallariana"
 shallarian_data_core_desc_details: "Los shallarianos, exterminados por los [fanatic_xenophobe_fe.GetSpeciesName], crearon un sistema de manipulación climática sirviéndose de seis lunas equidistantes. Antes de su extinción prematura, los shallarianos pretendían terraformar planetas deshabitados donde acoger y procurar auxilio a poblaciones de refugiados."
 shipyard_schematics: "Planos de astillero de [radical_cult.GetName]"
 shipyard_schematics_desc_short: "Los planos de un astillero automatizado controlado por los [radical_cult.GetName] de [root.GetName]"
 shipyard_schematics_desc_details: "Tras hallar este astillero abandonado por sus creadores alienígenas, el ingeniero jefe de la organización lo reacondicionó para producir en él flotas militares que sirvieran a su causa deleznable. El último proyecto completado en este astillero del que se tiene constancia era una imponente nave insignia dotada de un arsenal de combate avanzado. La facilidad con que se reacondicionó semejante complejo da a entender la genialidad de quienes en su día lo diseñaron."
 sky_dragon: "Dragón celestial"
 sky_dragon_desc_short: "Esta escultura se encargó para conmemorar la colaboración entre [this.GetName] y el \"dragón celestial\" que desde hace mucho orbita en torno a [this.GetHomeWorldName]"
 sky_dragon_desc_details: "Tras considerar digna a la sociedad [this.GetAdjective], la criatura prometió su apoyo militar, y también el de sus descendientes, a cambio de poder criar a su prole en el espacio [this.GetAdjective]. Según se dice, estas criaturas espaciales pueden pasar milenios buscando una civilización anfitriona apta para sus crías, y tan solo escogen un planeta a lo largo de toda su existencia."
 smeegibb_statue: "Estatua de Smeegibb"
 smeegibb_statue_desc_short: "Una estatua de Smeegibb, la mente colmena que acompañaba a la capitana Ness"
 smeegibb_statue_desc_details: "Smeegibb era un siervo leal que ejerció como tripulación completa y partida de abordaje de la legendaria pirata en sus últimos tiempos. Esta estatua reconstruida es todo lo que quedó después de que la Aguja Negra atacase su modesto asentamiento."
 sniran_spikes: "Púas de sniran"
 sniran_spikes_desc_short: "Largas púas que coronaban el lomo de la criatura conocida como \"sniran\""
 sniran_spikes_desc_details: "El sniran es un gran depredador que se oculta bajo las dunas de su planeta natal y saca de golpe sus púas letales al detectar movimiento en la superficie. A pesar de su envergadura, se trata de una criatura sorprendentemente frágil. Sus finas escamas reticuladas le permiten deslizarse en silencio bajo la arena, pero apenas resisten la más leve perforación. Se presume que este atributo facilita sus procesos reproductivos."
 sonic_reflective_prism: "Prisma reflector sónico"
 sonic_reflective_prism_desc_short: "Un prisma poligonal que lleva grabadas notaciones científicas peculiares y tan solo refleja ondas de energía que no llegan a cierta frecuencia"
 sonic_reflective_prism_desc_details: "Lo que pudo ser originariamente un dispositivo de medición puede utilizarse también con fines estéticos en espectáculos musicales y acústicos."
 spaceborne_hunter_handbook: "El arte de la caza"
 spaceborne_hunter_handbook_desc_short: "Una guía práctica de fauna espacial, obra de $NAME_PrimalHunter$"
 spaceborne_hunter_handbook_desc_details: "El autor se sirve de proverbios y filosofía primitiva para formular los preceptos del \"arte de la caza\". El tratado procura detalles de los patrones alimenticios y migratorios de las diversas criaturas espaciales. El texto ofrece instrucciones prácticas sobre cómo eludir las defensas naturales de cada criatura, revelando múltiples puntos débiles que pueden explotarse."
 spaceborne_xeno_encyclopedia: "Enciclopedia xenológica"
 spaceborne_xeno_encyclopedia_desc_short: "Un compendio de tesis xenológicas escritas por $NAME_PrimalRancher$"
 spaceborne_xeno_encyclopedia_desc_details: "Esta compilación académica profundiza en los patrones conductuales de diversas formas de vida espaciales: rituales de apareamiento, rutas migratorias y comunicación entre especies entre otros aspectos. También hay una sección sobre la identificación de especímenes individuales mediante características físicas únicas y reconocimiento tonal."
 spiraling_attraction: "Atracción espiraloide"
 spiraling_attraction_desc_short: "Un aparato grande y complejo diseñado, según se presume, para entretener al usuario"
 spiraling_attraction_desc_details: "Este dispositivo de cuerda se abandonó en una zona que albergaba varias estructuras similares de colores y materiales diversos. Se cree que descender por su conducto en espiral, bajo ciertas circunstancias gravitacionales, resulta apasionante."
 spirit_of_the_unshackled: "Espíritu de los Sin cadenas"
 spirit_of_the_unshackled_desc_short: "Una escultura que conmemora la formación de [this.GetName]"
 spirit_of_the_unshackled_desc_details: "Libres de los grilletes de la esclavitud, caminan hacia un mañana mejor unidos por las penurias compartidas del aciago ayer. Cada eslabón de la cadena lleva grabado el nombre de un miembro fundador."
 star_mall_map: "Mapa gratuito del centro comercial estelar"
 star_mall_map_desc_short: "Un plano que se entregaba a todo visitante del lugar antaño conocido como \"centro comercial estelar\""
 star_mall_map_desc_details: "El centro comercial estelar, antigua sede de la Federación Intergaláctica de Comercio y Consumo, estaba dotado de una cantidad inmensa de servicios, desde balnearios reconfortantes hasta suculentos pabellones de nutrición. Este mapa procura información de un gran número de puntos de distribución, tales como Decartón, Cara, El Resorte del Relé y Estratos Varios."
 starmetal: "Metal estelar"
 starmetal_desc_short: "Conglomerado compacto de metales pesados recogidos tras explotar una supernova"
 starmetal_desc_details: "Desconocemos por completo cómo se desempeñó el proceso de recuperación de estos metales, pero resultan de gran valor científico en lo que respecta al estudio de la evolución y composición de las estrellas."
 striated_sand: "Arenas estriadas"
 striated_sand_desc_short: "Un tarro de arena que se reagrupa por sí misma"
 striated_sand_desc_details: "Estas partículas diminutas de silicato manifiestan un nivel básico de inteligencia, ya que los minerales que comparten semejanzas se agrupan sobre planos horizontales al azar. A pesar de esta capacidad, la arena no posee ninguna de las otras características principales de la vida."
 sullebaster_control_column: "Columna de control de la Sullebaster"
 sullebaster_control_column_desc_short: "La palanca direccional de una nave espacial sublumínica que sufrió un accidente legendario"
 sullebaster_control_column_desc_details: "La nave de pasajeros Sullebaster transportaba civiles entre dos colonias del reino de Odelia cuando una llamarada solar provocó a los motores un fallo grave que, por lo general, solo podría desembocar en catástrofe. Contra todo pronóstico, el piloto consiguió aterrizar la nave sin mayores percances en un asteroide que pasaba, valiéndose del control manual para igualar la velocidad del cuerpo celeste. La Sullebaster se retiró del servicio y se exhibe desde entonces al público."
 symbiotic_fruit: "Fruto simbiótico"
 symbiotic_fruit_desc_short: "Un cúmulo de hogos inteligentes procedentes de otra dimensión"
 symbiotic_fruit_desc_details: "Este \"fruto\" mantiene una relación simbiótica con una especie de planta omnívora peligrosísima. Cada colonia de hongos funciona a modo de centro neurálgico de la pareja de organismos, orquestando complejos patrones de conducta defensiva."
 tarblac_shimmer: "Fulgor de tarblac"
 tarblac_shimmer_desc_short: "La resplandeciente membrana de un tarblac"
 tarblac_shimmer_desc_details: "Esta criatura hace un uso muy singular de los mecanismos psiónicos para cazar y defenderse, infligiendo con ellos una sensación de pánico sobrecogedor a fin de inmovilizar a las presas e intimidar a los depredadores. Este espécimen se conserva en un tarro lleno de aguas de su mundo natal, y se ha vuelto inerte mediante telepatía."
 terraforming_case_study: "Caso práctico de terraformación"
 terraforming_case_study_desc_short: "Un modelo a escala del exitoso proyecto de terraformación en [from.GetName], que representa una recreación casi perfecta del mundo natal de los [Space_Owner.GetSpeciesName]"
 terraforming_case_study_desc_details: "El planeta se encuentra hoy poblado por fauna idéntica a nivel microscópico, e incluso los ecosistemas más específicos de cada bioma se desarrollan y reaccionan como en [Space_Owner.GetHomeWorldName]."
 terraforming_case_study_dry: "$terraforming_case_study$"
 terraforming_case_study_dry_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_dry_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_case_study_frozen: "$terraforming_case_study$"
 terraforming_case_study_frozen_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_frozen_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_machinery: "Maquinaria de terraformación"
 terraforming_machinery_desc_short: "Pequeños dispositivos utilizados como parte de una antigua forma de tecnología de terraformación"
 terraforming_machinery_desc_details: "Estas máquinas en miniatura se diseñaron para propagarse por la superficie de un planeta y alterar la materia orgánica y mineral presente en el mismo con el fin de propiciar un clima más deseable. Robots como estos se desplegaban de forma colectiva para manipular patrones meteorológicos de los distintos biomas y replicar plantas y animales nuevos que consolidaran los ecosistemas incipientes."
 terraforming_records: "Registros de terraformación de [From.GetName]"
 terraforming_records_desc_short: "Durante el proceso de terraformación, se produjo una sincronización conductual de todas las formas de vida de [From.GetName], lo que dio lugar a un paraíso logístico en el que cada especie de flora y fauna obedecía a un fin específico dentro de su ecosistema"
 terraforming_records_desc_details: "Aunque este tipo de situación simbiótica suele surgir de forma natural durante el proceso de evolución, nunca antes se había observado en este grado extremo."
 the_final_sacrifice: "El sacrificio final"
 the_final_sacrifice_desc_short: "Imagen del último instante de la guerra civil zroni, extrapolada a partir de cristales de datos excavados"
 the_final_sacrifice_desc_details: "Un salvador altruista canalizó la energía psiónica de toda su especie para exterminar a la facción rival, los Divinos, y evitar así que consumieran todo el universo. Todo lo que queda de esta especie ascendida son pequeños depósitos del recurso que conocemos como zro."
 the_mask_of_transformation: "La Máscara de la transformación"
 the_mask_of_transformation_desc_short: "Máscara humanoide que se halló en perfecto estado de conservación dentro de un magnífico pilar de cristal en [From.Planet.GetName]"
 the_mask_of_transformation_desc_details: "Emite un zumbido de energía psiónica y hay quien siente una presencia en la mente al acercarse a ella. La máscara parece ser un conducto de la energía de la luna de [From.Planet.GetName], con el potencial de provocar mareas y transformar planetas solo con su fuerza. No se sabe por qué está cubierta de cristal, pero tenemos casi total certeza de que puede exponerse en público sin peligro."
 the_planet_orchestra: "La orquesta de [FROM.GetName]"
 the_planet_orchestra_desc_short: "Melodía interpretada por la vida nativa colectiva de [FROM.GetName]"
 the_planet_orchestra_desc_details: "Tras un extenso análisis, creemos que esta armonía se la enseñó a la fauna un agente desconocido para codificar un mensaje oculto. No sabemos si su motivo era la comunicación encubierta o un acto sentimental."
 the_writer_sphere: "La esfera del Escritor"
 the_writer_sphere_desc_short: "Esfera dorada que nos regaló un ser extradimensional al que solo conocemos como el Escritor"
 the_writer_sphere_desc_details: "Este dispositivo reúne una inmensa cantidad de datos aleatorios creados a través de las dimensiones. Es la prueba de que el poder de la palabra escrita puede trascender cualquier límite."
 tiny_ancient_sarcophagus: "Pequeño sarcófago antiguo"
 tiny_ancient_sarcophagus_desc_short: "Cámara funeraria de un líder espiritual fallecido hace millones de años"
 tiny_ancient_sarcophagus_desc_details: "Mide apenas diez centímetros de longitud. Aunque los restos son prácticamente polvo, queda intacta una pequeña máscara de oro puro que no se ha oxidado."
 tiyanki_radioactive_sac: "Saco radiactivo tiyanki"
 tiyanki_radioactive_sac_desc_short: "Pequeño órgano poroso hallado entre las membranas de un tiyanki"
 tiyanki_radioactive_sac_desc_details: "Su descubrimiento revela que los tiyanki consumen moléculas de agua irradiada junto con gases planetarios como fuente suplementaria de alimentación. Una vez lleno, el saco se convierte en una fuente temporal de calor radiactivo para los seres del espacio profundo."
 torn_solar_sail: "Velamen solar rasgado"
 torn_solar_sail_desc_short: "Este velamen, hallado en la órbita de [FROM.GetName], estuvo fijado a una novedosa nave sublumínica"
 torn_solar_sail_desc_details: "Los miembros de una civilización desconocida lo utilizaban para viajar a través del sistema [FROM.solar_system.GetName]. La tecnología en sí quedó obsoleta hace tiempo, pero algunas de las técnicas de ingeniería empleadas en su construcción no nos eran conocidas. La enorme brecha de su vela principal debió poner fin a su viaje prematuramente."
 toxic_bio_engine: "Biomotor tóxico"
 toxic_bio_engine_desc_short: "Se descubrió que estas máquinas semibiológicas hacían que la atmósfera de [FROM.GetName] fuera tóxica para la mayoría de las formas de vida"
 toxic_bio_engine_desc_details: "Su capacidad de funcionar de manera independiente hace que sus emisiones nocivas sean adecuadas para trabajos industriales remotos. Estas máquinas cuentan con un ingenioso mecanismo de reabastecimiento que recicla la biomasa cercana mediante un proceso de extracción química para convertirla en energía útil. No está claro si sus integraciones biológicas existían ya en su construcción inicial o se desarrollaron con el tiempo."
 tree_of_life_sample: "Muestra del árbol de la vida"
 tree_of_life_sample_desc_short: "Esquejes procedentes del llamado \"árbol de la vida\""
 tree_of_life_sample_desc_details: "Se hallaron flotando de forma anómala en el espacio. Las propiedades rejuvenecedoras de su savia son bastante milagrosas, pero no hemos conseguido injertar este esqueje ni hacer crecer un nuevo ejemplar de esta rara especie. Sus cultivadores originales, fueran quienes fueran, debían contar con técnicas hortícolas muy avanzadas."
 tricorne_of_aussan: "Tricornio de Aussan"
 tricorne_of_aussan_desc_short: "Sombrero de tres picos popularizado por una república pirata olvidada"
 tricorne_of_aussan_desc_details: "Aussan era un pequeño planeta poblado por una civilización [root.controller.GetPreFTLLower] que, sin saberlo, proporcionó refugio a una flota pirata perseguida, los Camorristas Bourre. Procurando pasar inadvertidos a las autoridades galácticas, los Camorristas construyeron una pequeña fábrica textil para sustentarse y usaban plantas fibrosas nativas para crear telas y ropa de lujo. Más adelante, los Camorristas se conocieron como los Sastres Bourre, nómadas mercantiles conocidos por la extraña agresividad de sus representantes de ventas."
 triggerless_gun: "Pistola sin gatillo de traficante de armas"
 triggerless_gun_desc_short: "Esta arma se diseñó durante el segundo y breve reinado del tratante de armas de la Brújula de Chor"
 triggerless_gun_desc_details: "En aquel tiempo, la ciudadela de los caravaneros se parecía más a una feria de armas que a un casino: allí se fabricaban blásters y se alojaban traficantes de armas muy diversos. Las armas se presentaban con el gatillo quitado a posibles compradores para impedir sucesos como pequeños robos."
 #this = ship / fromfrom = planet
 uddloran_pelts: "Pieles de uddloran"
 uddloran_pelts_desc_short: "Pieles lujosas obtenidas de la especie uddloran de [fromfrom.GetName]"
 uddloran_pelts_desc_details: "Estos flexibles omnívoros se enroscan en forma de bola cerrada y ruedan en grandes grupos por la superficie nevada del planeta. Esta especie de avalancha viviente es una táctica cinegética y migratoria. La manada de uddloran suele dividirse en dos grupos: cazadores que van destruyendo para abrir camino y recolectores que les siguen recogiendo presas aplastadas y plantas arrancadas."
 underworld_cantina_sign: "Señal de cantina del submundo"
 underworld_cantina_sign_desc_short: "Cartel digital aún funcional de una cantina ilegal que usaban los contrabandistas hace un par de millones de años"
 underworld_cantina_sign_desc_details: "Este establecimiento, hallado en un asteroide ahuecado, habría sido un escondite habitual para las organizaciones ilegales que prosperaron durante el gobierno de la Primera Liga. Se cree que los símbolos mostrados aquí serían una señal en código para indicar que el establecimiento era un refugio seguro para individuos perseguidos, y tal vez el anuncio de una bebida."
 unfinished_manifesto: "Manifiesto inacabado de [radical_cult.GetName]"
 unfinished_manifesto_desc_short: "Manifiesto incompleto escrito por el líder de [radical_cult.GetName] de [root.GetName]"
 unfinished_manifesto_desc_details: "El estilo recuerda a los textos religiosos antiguos, con vocabulario y sintaxis anticuadas para darle un aspecto más legítimo. Un mensaje fundamental de este texto es el de enorgullecerse ante la derrota, que anima a los seguidores al martirio cuando afronten su captura inminente."
 uranium_glassware: "Vidrio de uranio"
 uranium_glassware_desc_short: "Pieza decorativa tallada en cuarzo de uranio"
 uranium_glassware_desc_details: "El aspecto apetitoso de este adorno, parte de una colección privada, contrasta con el peligro asociado al uranio sin refinar. Sin embargo, se neutralizó buena parte de sus propiedades radiactivas después de que lo terminara el artesano."
 vault_of_polaris: "La cámara de Polaris"
 vault_of_polaris_desc_short: "Colección exhaustiva de plantas y bacterias nativas de Polaris"
 vault_of_polaris_desc_details: "La inscripción del contenedor revela que esta cámara se creó para conservar todas las especies que no sobrevivirían al calentamiento global previsto tras el deshielo de su permafrost. Aunque el planeta estuvo cubierto de una gruesa capa de nieve en un clima frío, ahora no queda más que un único iceberg. La visión de futuro de sus creadores nos permite ahora exponer sus esfuerzos para que todo el mundo pueda estudiarlos."
 veil_of_selene: "Velo de Selene"
 veil_of_selene_desc_short: "Una mascarilla estimulante y embriagadora"
 veil_of_selene_desc_details: "Aunque no lo parezca, este velo cuenta con propiedades sensoriales únicas que le permiten sobrecargar agradablemente los receptores biológicos visuales, olfatorios y acústicos. Se cree que servía para desorientar a los que se lo encontraban y hacerlos más susceptibles de sugestión. Según los rumores, su propietario original tenía cierto grado de capacidad psiónica."
 verdingo_tendril_hook: "Garfio de zarcillo verdingo"
 verdingo_tendril_hook_desc_short: "Garfio protésico del capitán pirata verdingo Hespori Valerian"
 verdingo_tendril_hook_desc_details: "Los verdingos eran un grupo de plantoides que llenaban el hueco entre piratas y mercenarios; se ocupaban tanto de cobrar deudas como de capturar naves de carga. El capitán Hespori perdió su zarcillo dominante mientras lideraba un asalto terrestre por encargo. Tras su victoria, el capitán fabricó este zarcillo con las medallas que recibió por su actuación en esa batalla."
 vibrating_crystal: "Cristal vibrante"
 vibrating_crystal_desc_short: "Mineral de cuarzo único que se encuentra distribuido por la superficie de [from.GetName]"
 vibrating_crystal_desc_details: "Su resonancia latente con su planeta crea un campo que relaja la mente de los seres orgánicos y atrae a los seres sintéticos. Esta resonancia la crean las colonias bacterianas ligeramente radiactivas alrededor de las que se forma el cristal. Esos microorganismos magnéticos generan una corriente interna que hace vibrar el cristal en frecuencias constantemente altas."
 voidworm_amniotics: "Sustancia amniótica de gusano del vacío"
 voidworm_amniotics_desc_short: "Sustancia gelatinosa que se encuentra en el centro de una troika de gusanos del vacío"
 voidworm_amniotics_desc_details: "Esta baba viscosa forma una barrera protectora entre los tres organismos que les permite intercambiar células para reproducirse y comunicarse. Las hormonas producidas por el bombardeo de planetas se almacenan ahí, de forma que estos seres hermafroditas puedan liberar sus gametos y reproducirse sin peligro."
 voidworm_heart: "Corazón de gusano del vacío"
 voidworm_heart_desc_short: "El corazón de los gusanos del vacío se divide en tres cámaras principales"
 voidworm_heart_desc_details: "Cada cámara aumenta la presión de su sistema circulatorio en secuencia, manteniendo sus fluidos por debajo de su punto de ebullición para asegurar la supervivencia en el vacío del espacio. Aunque la piel del gusano del vacío está herméticamente sellada casi en su totalidad, diversos orificios digestivos y reproductores dejan salir cierta cantidad de presión con el tiempo."
 vultaum_religious_pamphlet: "Panfleto religioso vultaum"
 vultaum_religious_pamphlet_desc_short: "Este panfleto, distribuido por los misioneros vultaum, intenta exponer los dispositivos de realidad virtual como el mayor pecado"
 vultaum_religious_pamphlet_desc_details: "Se refiere a la \"Gran Mentira\" como concepto clave y considera cualquier forma de escapismo inmersivo como un deseo de destruir la propia realidad."
 vultaum_vr_video_game: "Videojuego vultaum de realidad virtual"
 vultaum_vr_video_game_desc_short: "Interfaz digital que se usaba en un juego multiusuario de realidad virtual que llegaron a jugar miles de millones de individuos vultaum en tiempos pasados"
 vultaum_vr_video_game_desc_details: "Ajustados especialmente a su biología, los controles consistían en un conjunto de miles de receptores de vibración capaces de detectar movimientos extremadamente sutiles."
 warning_monolith: "Monolito de advertencia"
 warning_monolith_desc_short: "Monolito grabado como mensaje por uno de los últimos miembros de una especie extinta"
 warning_monolith_desc_details: "Intenta disuadir a quien descubra los restos de este planeta de buscar el arma definitiva que condujo a la muerte de su raza. El tono es bastante melodramático, algo excusable dadas las circunstancias."
 wormhole_anchor: "Anclaje de agujero de gusano [FROM.GetName]"
 wormhole_anchor_desc_short: "Punto de anclaje de un dispositivo de agujero de gusano con una sola dirección, utilizado para extraer materia oscura de un agujero negro"
 wormhole_anchor_desc_details: "Su construcción es caótica, por decir poco, ya que se ha fabricado con chatarra y restos reciclados de varias civilizaciones. La ciencia detrás del dispositivo va mucho más allá de la capacidad de ingeniería utilizada para construirlo mediante una técnica elegante para manipular la masa negativa."
 wormhole_fur: "Piel de agujero de gusano"
 wormhole_fur_desc_short: "Muestras biológicas tomadas de vulpinos más allá de una grieta astral"
 wormhole_fur_desc_details: "Estos mamíferos tienen mutaciones genéticas que les permiten generar agujeros de gusano a discreción. Se piensa que esta capacidad se desarrolló tras incontables milenios de viaje entre dimensiones."
 ytterite_preserved_corpse: "Cadáver ytterite preservado"
 ytterite_preserved_corpse_desc_short: "Único espécimen superviviente de la especie ytterite pre-UL, cuyo mundo natal fue destruido por un fracturador de mundos hackeado"
 ytterite_preserved_corpse_desc_details: "Su sistema digestivo convertía en fotones los minerales ingeridos, con órganos internos parecidos a racimos de cristales refractivos dispuestos en torno a un núcleo fundido. Este ejemplar presenta una serie de formas grabadas en uno de sus miembros inferiores como algún tipo de modificación corporal de relevancia cultural."
 ytterite_kaleidoscopic_fascinator: "Velo caleidoscópico ytterite"
 ytterite_kaleidoscopic_fascinator_desc_short: "Adorno creado por los ytterite como estímulo visual"
 ytterite_kaleidoscopic_fascinator_desc_details: "Los velos se presentaban en zonas bañadas por el sol y podían contener cientos o incluso miles de patrones únicos. Fabricados con capas de cristal finamente tallado, uno tan complicado como este podía llevarle meses a un artesano experto. Los artesanos firmaban su trabajo adjuntando una pieza tallada de su propia muda en un vértice clave."
 ytterite_royal_scepter: "Cetro real ytterite"
 ytterite_royal_scepter_desc_short: "Este cetro se lo otorgó el ministro real al Gneiss Damur, una enorme estatua excavada en una montaña que, para los ytterite, era una deidad durmiente y su único monarca verdadero"
 ytterite_royal_scepter_desc_details: "Realizaron elecciones para seleccionar líderes sustitutos mientras esperaban el gran despertar de la estatua."
 yuht_audio_console: "Consola de audio yuht"
 yuht_audio_console_desc_short: "Módulo que controlaba una enorme red de vigilancia de audio diseñada por los yuht"
 yuht_audio_console_desc_details: "Esta tecnología la desarrollaron los yuht para facilitar la búsqueda de vida extraterrestre. Con ella esperaban detectar transmisiones desde sistemas lejanos."
 yuht_cryo_pod: "Cápsula criogénica yuht"
 yuht_cryo_pod_desc_short: "Esta antigua cápsula de estasis, con más de noventa y seis metros de longitud, contiene los restos que se conservan de un individuo de la enorme especie yuht"
 yuht_cryo_pod_desc_details: "Los yuht tienen una esperanza de vida muy larga que pueden extender aún más mediante la criogenización. Se ha determinado que esta especie artropoide era probablemente hermafrodita y podía adaptar su sistema reproductor a las necesidades eventuales de la colonia."
 yuht_crystal_skull: "Calavera de cristal yuht"
 yuht_crystal_skull_desc_short: "Cráneo de cristal que os antiguos yuht tomaban por auténtico objeto alienígena"
 yuht_crystal_skull_desc_details: "El origen de este objeto fraudulento se acabó desmitificando, pero no antes de que los medios de comunicación de los yuht corrieran a divulgar la historia. Muchos de los que \"descubrieron\" falsos objetos históricos como este se convirtieron en famosillos y personajes públicos, lo que instigó a otros a imitarlos."
 zombie_probe: "Sonda zombi"
 zombie_probe_desc_short: "Restos de una sonda de exploración rescatada y aumentada pro una organización alienígena desconocida que le confirió consciencia"
 zombie_probe_desc_details: "Durante el nacimiento de su consciencia, atacó a sus creadores y fue rechazada en consecuencia. No se sabe si conocía el dolor o comprendía la noción de la muerte."
 zone_a_sedative: "Sedante de la zona A"
 zone_a_sedative_desc_short: "Porción de tierra tomada del área designada como \"zona A\" en [from.GetName]"
 zone_a_sedative_desc_details: "Esta división del terreno de 169 kilómetros cuadrados contiene artilugios abandonados y tecnología de anteriores visitantes alienígenas de origen desconocido. Algunos de estos dispositivos son extremadamente peligrosos, pero el suelo está impregnado con un sedante químico que permitiría a los investigadores manejarlos sin tensión. Las operaciones que se realizaban allí se olvidaron hace tiempo."
 zroni_war_banners: "Estandartes de guerra zroni"
 zroni_war_banners_desc_short: "Estandartes recuperados de las dos facciones implicadas en la guerra civil zroni"
 zroni_war_banners_desc_details: "La bandera morada representa a los Divinos, una pequeña minoría cuya búsqueda de la omnipotencia puso en riesgo la galaxia. La bandera azul representa a los Salvadores, una facción opuesta a la extracción de energía del universo para alimentar lo que percibían como un deseo egoísta. Esta división comenzó como un debate filosófico, pero no tardó mucho en ser el catalizador de un conflicto devastador."
 zulcor_wings: "Alas de zulcor"
 zulcor_wings_desc_short: "Alas quitinosas de la especie litófaga de [fromfrom.GetName] conocida como zulcor"
 zulcor_wings_desc_details: "Estos seres insectoides consumen vastas cantidades de minerales como base de su alimentación; un solo enjambre es capaz de atravesar una montaña en cuestión de semanas. Una vez digeridos, los minerales sirven para reforzar el exoesqueleto de los zulcor. A consecuencia de esta dieta, sus desechos suelen contener trazas de cristales de cuarzo y metales raros."
