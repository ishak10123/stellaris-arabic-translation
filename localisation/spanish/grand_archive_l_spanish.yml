 grand_archive.4555.desc: "El $grand_archive$ que [from.GetName] tenía en [fromfrom.GetName] ha sido desmantelado tras hacernos con el sistema.\n\nHemos recuperado el espacio que ocupaba."
 grand_archive.4560.name: "$grand_archive.4555.name$"
 grand_archive.4560.desc.common_1: "Nuestro $grand_archive$ de [from.GetName] ha sido desmantelado tras nuestro abandono del sistema."
 grand_archive.4560.desc.common_2: "Hemos podido rescatar buena parte de las aleaciones empleadas en su construcción. Tendremos que reconstruir la estructura por completo en otro sistema para continuar con las exposiciones."
 grand_archive.4560.desc.specimen: "Todos los especímenes se han recuperado y almacenado adecuadamente hasta que podamos construir un $grand_archive$ nuevo."
 grand_archive.4560.desc.fauna: "Se ha sacrificado toda la fauna espacial para obtener sus recursos básicos."
