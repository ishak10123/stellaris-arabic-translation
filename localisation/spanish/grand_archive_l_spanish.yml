 r_prototype_vir_core: "Prototipo de núcleo VIR"
 r_prototype_vir_core_desc: "Esta inteligencia artificial aislada es un maestro y mentor especialmente eficaz, capaz de ayudar en casi todas las situaciones. Destaca a la hora de describir explicaciones complicadas en términos sencillos, exponiendo la información con claridad para que el usuario pueda tomar decisiones con conocimiento de causa."
 prototype_vir_core_modifier: "$r_prototype_vir_core$"
 r_propagandosphere: "Propagandosfera"
 r_propagandosphere_desc: "Esta esfera holográfica contiene un archivo de películas de propaganda de una civilización desaparecida. Son increíblemente ingeniosas y cautivadoras, y podrían rehacerse a nuestra imagen para inspirar a nuestras tropas y a nuestro pueblo."
 r_executus_compendium: "Executus Compendium"
 r_executus_compendium_desc: "Estos extensos registros del Consejo de una antigua civilización se conservaron en una cápsula sellada. Entre sus billones de páginas se encuentran relatos detallados de optimizaciones burocráticas y herramientas organizativas innovadoras. Muchas de estas mejoras podrían aplicarse a nuestros propios procesos de gobierno."
 executus_compendium_triumph_tt: "Lanza el orden del día por un 10% del coste de lanzamiento anticipado. (Coste mínimo de 3000 £unity£)."
 r_the_pattern_maker: "El creador de patrones"
 r_the_pattern_maker_desc: "Esta calculadora antigua tiene una capacidad inigualable para controlar trayectorias dinámicas y predecir cómo se comportarán objetos como las naves enemigas. Los patrones de datos generados a partir de sus algoritmos de predicción son tan complejos como los diseños de un arquitecto. Si dispone de potencia y materiales suficientes, puede fabricar una nave de exploración especializada equipada con sensores de alta potencia."
 r_the_pattern_maker_effect_tt: "Crea una nave de exploración de clase §YNavegapatrones§!.\n - Velocidad muy alta y rango de detección de hipervías"
 NAME_Patternwalker: "Navegapatrones"
 NAME_Patternwalker_Cloak: "$NAME_Patternwalker$"
 SENSOR_PATTERNWALKER: "Sensores de patrón de vidente"
 r_vaporous_mega_orchid: "Megaorquídea vaporosa"
 r_vaporous_mega_orchid_desc: "Esta orquídea particularmente grande florece solo una vez cada 50 años. Se ha demostrado que su aroma tiene un efecto apaciguador que bloquea temporalmente las sinapsis mentales que provocan agresividad y desconfianza."
 r_vaporous_mega_orchid_effect_tt: "§G+$@vaporous_mega_orchid_opinion|0$§! £opinion£ de opinión con todos los imperios no homicidas, los no caídos y los que no sean de máquinas durante §Y$@vaporous_mega_orchid_opinion_duration_years|0$§! años."
 opinion_vaporous_mega_orchid: "$r_vaporous_mega_orchid$"
 r_tiyanki_matriarch_nerve_core: "Núcleo nervioso de matriarca tiyanki"
 r_tiyanki_matriarch_nerve_core_desc: "La materia cerebral de esta antigua ballena espacial contiene siglos de datos evolutivos codificados en sus neuronas. Al descodificar su red, podremos encontrar vulnerabilidades en otros superdepredadores, así como descubrir los secretos de su supervivencia."
 tiyanki_matriarch_nerve_core: "$r_tiyanki_matriarch_nerve_core$"
 celestial_chart: "Carta celeste"
 r_celestial_chart_0: "Cápsula orbital misteriosa"
 r_celestial_chart_0_desc: "Una peculiar cápsula que orbita nuestro mundo natal desde hace miles de años. Aún no hemos determinado qué información contiene."
 r_celestial_chart_1: "$celestial_chart$"
 r_celestial_chart_1_desc: "La primera parte de un extenso mapa hallado en el interior de una antigua cápsula."
 r_celestial_chart_2: "$celestial_chart$"
 r_celestial_chart_2_desc: "Un mapa parcialmente terminado hallado en el interior de una antigua cápsula."
 r_celestial_chart_3: "$celestial_chart$"
 r_celestial_chart_3_desc: "Un mapa casi completo hallado en el interior de una antigua cápsula."
 r_celestial_chart_4: "$celestial_chart$"
 r_celestial_chart_4_desc: "Un extenso mapa estelar y banco de datos creado por el legendario pirata $NAME_CaptainNess$."
 r_celestial_chart_4_effect_tt: "Crea una ['concept_treasure_vault'] en una de nuestras colonias."
 celestial_chart_upgraded_tt: "La §Y$celestial_chart$§! ha sido actualizada con nueva información."
 r_mutated_voidworm_nest: "Nido de gusanos del vacío mutantes"
 r_mutated_voidworm_nest_desc: "Un nido de gusanos del vacío mutantes que han evolucionado para reproducirse sin necesidad de infección parasitaria. Algunos de estos engendros son capaces de madurar completamente en cuestión de días."
 r_mutated_voidworm_nest_effect_tt: "Crea una flota de $NAME_Frenzied_Voidworms$ adultos en el sistema capital"
