 grand_archive.4105.name: "$leviathans.500.name$"
 grand_archive.4105.desc.common.aesthetic_wonder: "[GetCuratorsDesignation] han observado vuestro esmero en la recogida y conservación de especímenes que son §Y$EXHIBITION_AESTHETIC_WONDERS$§!. Cuando se mira bien, se encuentra belleza en cada rincón de la galaxia."
 grand_archive.4105.desc.common.historical_item: "[GetCuratorsDesignation] han observado vuestro esmero en la recogida y conservación de la §Y$EXHIBITION_GALACTIC_HISTORY$§!. Garantizáis el don de la inmortalidad a aquellos cuyos objetos preserváis."
 grand_archive.4105.desc.common.xeno_geology: "[GetCuratorsDesignation] han observado vuestro esmero en la recogida y conservación de especímenes de §Y$EXHIBITION_XENO_GEOLOGY$§!. La historia de nuestra galaxia se oculta a menudo en sus piedras y rocas."
