 grand_archive.10010.name: "Proyecto de mutación de amebas espaciales completado"
 grand_archive.10010.desc: "Nuestro proyecto de mutación experimental de §Yamebas espaciales§! ha concluido y ha dado lugar a nuevos orgánulos interesantes: §Y$tech_unique_mutation_space_amoeba$§!.\n\nEstos organismos simbióticos son capaces de drenar la energía de los objetos cercanos y devolvérsela a su huésped, mejorando la supervivencia y la regeneración."
 grand_archive.10015.name: "Proyecto de mutación de tiyanki completado"
 grand_archive.10015.desc: "Nuestro proyecto de mutación experimental de §Ytiyanki§! ha concluido y ha dado lugar a nuevas mejoras interesantes: §Y$tech_unique_mutation_tiyanki$§!\n\nHemos amplificado al máximo nivel sostenible las vibraciones naturales que estas criaturas utilizan para comunicarse dentro de sus rebaños. El resultado es un campo controlable que refuerza el tejido de otras criaturas cercanas."
 grand_archive.10020.name: "Proyecto de mutación de gusanos del vacío completado"
 grand_archive.10020.desc: "Nuestro proyecto de mutación experimental de §Ygusanos del vacío§! ha concluido y ha dado lugar a algunas variaciones interesantes de sus ciclos reproductivos: §Y$tech_unique_mutation_voidworm$§!\n\nHemos logrado aumentar la fertilidad de los quistes parasitarios con los que estas criaturas bombardean sus planetas huéspedes. El resultado es un aumento del rendimiento de las ninfas generadas."
 grand_archive.10025.name: "Proyecto de mutación de cutoloides completado"
 grand_archive.10025.desc: "Nuestro proyecto de mutación experimental de §Ycutoloides§! ha concluido y ha dado lugar a algunos resultados interesantes: §Y$tech_unique_mutation_cutholoid$§!\n\nHemos encontrado una forma de adaptar su enorme sistema digestivo para disparar proyectiles de alta velocidad y largo alcance. Por desgracia, esta importante modificación biológica les impedirá engullir flotas enemigas."
 grand_archive.10030.name: "Proyecto de mutación de entidades cristalinas completado"
 grand_archive.10030.desc: "Nuestro proyecto de mutación experimental de §Yentidades cristalinas§! ha concluido y ha dado lugar a algunos resultados interesantes: §Y$tech_unique_mutation_crystalline_entity$§!\n\nCon esta modificación de su genética cristalina, cada criatura es capaz de dividirse en dos organismos independientes en caso de traumatismo grave. Esto debería mejorar drásticamente sus habilidades de combate."
 grand_archive.10030.a: "$FASCINATING$"
 leviathan_unique_mutation_project_unlock_name: "Proyecto de mutación de [FromFromFrom.GetShipSizeName]"
 leviathan_unique_mutation_project_unlock_desc: "Hemos recuperado el material genético de la [FromFrom.GetSizeName] que encontramos en [FromFrom.solar_system.GetName].\n\nAunque carezcamos de los conocimientos necesarios para clonar una criatura así, quizá podamos extraer información valiosa de su singular biología."
 grand_archive.10055.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10055.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10060.name: "Proyecto de mutación de matriarcas completado"
 grand_archive.10060.desc: "Nuestro proyecto experimental de mutación con material genético de $NAME_Elderly_Tiyanki$ ha concluido y ha arrojado algunos resultados interesantes: §H$restorative_enzymes$§!\n\nLas enzimas restauradoras presentes en el material genético de la matriarca pueden reproducirse en glándulas similares de otras criaturas. Esto transforma su tejido estructural en material regenerativo, lo que resultaría muy útil en formaciones cerradas tras una explosión."
 grand_archive.10075.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10075.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10080.name: "Proyecto de mutación de engendros del vacío completado"
 grand_archive.10080.desc: "Nuestro proyecto de mutación experimental con material genético de $NAME_Voidspawn$ ha concluido y ha dado lugar a un descubrimiento interesante: §H$starborne_biology$§!\n\nEl tejido de estas criaturas reacciona fuertemente a la luz estelar, y puede ser estimulado para crecer en otros organismos. Esto requiere una pequeña cantidad de energía para mantenerse, pero mejora enormemente su tasa de crecimiento cerca de las estrellas más brillantes."
