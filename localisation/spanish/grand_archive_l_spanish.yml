 treasure_hunters_hidden_system_1_poi: "Buscar [prev.GetName]"
 treasure_hunters_hidden_system_1_poi_desc: "La carta hallada en la antigua cápsula orbital ha desvelado el paradero de un sistema oculto, [prev.GetName]. Debemos viajar allí a fin de indagar más."
