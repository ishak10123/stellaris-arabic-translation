 #Voidworms Plague Crisis #
 ###########################
 production_surge_modifier: "Aumento en la producción"
 public_distrust_modifier: "Desconfianza pública"
 test_subject_unwilling_modifier: "Sujetos de prueba"
 test_subject_volunteer_modifier: "$test_subject_unwilling_modifier$"
 test_subject_gestalt_modifier: "$test_subject_unwilling_modifier$"
 grand_archive.2310.name: "Plaga de gusanos del vacío"
 grand_archive.2310.desc.default: "La población de $NAME_Voidworms$ en la galaxia ha alcanzado un nivel crítico. Su comportamiento ha cambiado notablemente.\n\nLa fase de su ciclo de vida en la que perdonan a las poblaciones anfitrionas se ha visto perturbada. Ya no muestran preocupación por la sostenibilidad de sus áreas de reproducción.\n\nTodas nuestras colonias se encuentran en alerta roja. La presencia de $NAME_Voidworms$ en cualquier sistema debe afrontarse con una precaución extrema.\n\nSe avecina un frenesí reproductor a escala galáctica."
 grand_archive.2310.desc.tech: "$grand_archive.2310.desc.default$\n\nLa inmunidad que desarrollamos ante estos parásitos ya no funciona al mismo nivel. Habrá que volver a la mesa de laboratorio."
 grand_archive.2310.desc.nocontact: "Hemos interceptado inquietantes informes en toda la galaxia sobre una especie de fauna espacial previamente desconocida: los gusanos del vacío. Estas criaturas han entrado en un frenesí reproductivo y suponen una gran amenaza para los planetas que carecen de los sistemas defensivos adecuados. Todas nuestras colonias se encuentran en alerta roja."
 grand_archive.2310.a: "$DISTURBING$$DOTDOTDOT$"
 situation_voidworm_plague: "Plaga de gusanos del vacío"
 situation_voidworm_plague_type: "$situation_voidworm_plague$"
 situation_voidworm_plague_desc: "Se avecina una plaga de $NAME_Voidworms$.\n\nEstas criaturas ya no tendrán piedad con los planetas anfitriones que actúen como áreas de reproducción. Debemos trabajar para erradicarlos o nuestras colonias correrán peligro.\n\n§YPor cada gusano del vacío destruido, el progreso de la situación se acelerará.§!"
 situation_voidworm_plague_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_voidworm_plague: "Tus colonias ya no serán vulnerables al bombardeo de los gusanos del vacío."
 approach_voidworm_plague_do_nothing: "No hacer nada"
 approach_voidworm_plague_do_nothing_tt: "No actuaremos a este respecto."
 approach_voidworm_plague_support_fleets: "Apoyar a nuestras flotas"
 approach_voidworm_plague_support_fleets_tt: "Podemos sacrificar una pequeña cantidad de calidad de vida para ayudar a nuestras flotas militares contra la amenaza de los gusanos del vacío.\nSituación $SITUATION_MONTHLY_CHANGE$: §G+0,5§!"
 approach_voidworm_plague_purge_infected_pops: "Purgar infectados"
 approach_voidworm_plague_purge_infected_pops_tt: "Los $NAME_Voidworms$ que bombardean tus colonias ya no generarán más $NAME_Voidworms$.\nSituación $SITUATION_MONTHLY_CHANGE$: §G+0,7§!"
 approach_voidworm_plague_search_for_cure: "Buscar un remedio"
 approach_voidworm_plague_search_for_cure_tt: "Si logramos romper su ciclo biológico, los $NAME_Voidworms$ ya no podrán reproducirse en esta galaxia.\nSituación $SITUATION_MONTHLY_CHANGE$: §G+1§!"
 change_approach_will_temporarily_lock: "§SAl adoptar este enfoque, los demás se bloquearán durante §Y$@voidworm_plague_approach_cooldown_years|0$ años§!.§!"
 too_early_to_change_approach: "§SEs muy pronto para volver a cambiar los enfoques de situación.§!"
 voidworm_crisis_eradicate_chain_title: "Erradicar a los $NAME_Voidworms$"
 voidworm_crisis_eradicate_chain_desc: "La población de gusanos del vacío ha alcanzado niveles insostenibles en la galaxia, por lo que deben ser erradicados.\n\nHemos localizado los §Ynidos de gusanos del vacío§! que quedan por destruir."
 voidworm_system_poi_title: "Destruir [prev.GetName]"
 voidworm_system_poi_desc: "Se han detectado §Ynidos de gusanos del vacío§! en este sistema.\n\nDestrúyelos para impedir que generen más parásitos."
 #Voidworms Plague Crisis Random Events #
 grand_archive.2400.name: "Exceso de componentes"
 grand_archive.2400.desc: "Al aumentar el apoyo a nuestras flotas contra los $NAME_Voidworms$, las mejoras en los protocolos de mantenimiento han dado lugar a un inesperado superávit de componentes. Tenemos la oportunidad de invertir estos materiales para mejorar nuestra producción a corto plazo de nuevas flotas."
 grand_archive.2400.a: "Invirtamos en refuerzos."
 grand_archive.2400.b: "Mantengamos las reservas."
 grand_archive.2405.name: "Zafarrancho de combate"
 grand_archive.2405.desc.default: "Los constantes preparativos para combatir a los gusanos del vacío han propiciado una nueva generación de comandantes. Los experimentados ciudadanos de [this.GetName] han elegido poner su talento al servicio de la eliminación de esta amenaza galáctica."
 grand_archive.2405.desc.gestalt: "Nuestros continuos preparativos contra la amenaza de los gusanos del vacío nos han permitido producir nodos de liderazgo de clase Comandante adicionales. Al ofrecer más apoyo a nuestras flotas, estos nodos de combate han recibido más recursos para facilitar su veloz integración en nuestras campañas militares."
 grand_archive.2405.a: "Resulta inspirador."
 grand_archive.2405.tt: "Actualiza nuestros §H$RECRUITABLE_LEADERS$§! y añade 3 §Hcomandantes§! más con un nivel adicional."
 grand_archive.2410.name: "Desarrollo del frente"
 grand_archive.2410.desc.default: "Uno de los ingenieros apostados en [random_shipyard.GetName] ha desarrollado un nuevo plano conceptual para las defensas de las naves. Estaba realizando reparaciones rutinarias en la lucha contra los gusanos del vacío cuando se le ocurrió crear un nuevo componente que aumentaría la durabilidad de nuestras naves. Tras presentar esta idea en nuestro departamento de investigación, vimos su enorme potencial."
 grand_archive.2410.desc.gestalt: "Un [root.GetIndividualName] de reparación destinado en [random_shipyard.GetName] ha propiciado nuevos datos de investigación para mejorar las defensas de las naves. Tras un fallo en las comunicaciones durante unas labores rutinarias de reparación, el [root.GetIndividualName] utilizó una combinación peculiar de métodos y materiales para crear un nuevo componente protector. Tras estudiar las posibilidades de investigación, este descubrimiento accidental ha mostrado un gran potencial una vez refinado."
 grand_archive.2420.name: "[infected_leader.GetName] se ha infectado"
 grand_archive.2420.desc: "Mientras ejercía sus responsabilidades, [infected_leader.GetName] se contagió con las esporas activas de los gusanos del vacío. Las nuevas ninfas no tardarán en emerger y destruir a su anfitrión.\n\nPuede que sea un caso perdido, pero el personal médico teoriza con la idea de extraer la larva antes de que se instale por completo en su sistema nervioso. Es una operación arriesgada, pero [infected_leader.GetName] nos da su consentimiento."
 grand_archive.2420.a: "A purgar."
 grand_archive.2420.b: "Extraed la larva."
 grand_archive.2425.name: "Violación de cuarentena"
 grand_archive.2425.desc.common: "Un pequeño grupo de [infected_planet_pop.species.GetName] infectados huyó de la purga en [infected_planet.GetName] y se dispersó por nuestros sistemas. Si los dejamos en libertad, la infección de los gusanos del vacío podría propagarse por todo [this.GetName]."
 grand_archive.2425.desc.default: "$grand_archive.2425.desc.common$ Hay que ocuparse de los que huyeron antes de que nos pongan en peligro a todos."
 grand_archive.2425.desc.rogue: "$grand_archive.2425.desc.common$ Hay que ocuparse de los que huyeron antes de que pongan en peligro a nuestros otros biotrofeos."
 grand_archive.2425.desc.gestalt: "$grand_archive.2425.desc.common$ Hay que ocuparse de los que huyeron antes de que nos pongan en peligro a un colectivo mayor."
 grand_archive.2425.desc.robot: "Las muestras de flora y fauna infectadas que marcamos para su análisis quedaron catalogadas por error como alimentos cotidianos. Como consecuencia, una gran cantidad de materia orgánica se ha contaminado con parásitos de gusanos del vacío y ahora hay que deshacerse de ella."
 grand_archive.2425.a.default: "Dadles caza."
 grand_archive.2425.a.default.tt: "-1 población orgánica por cada colonia en propiedad"
 grand_archive.2425.a.robot: "Quemad el suministro de alimentos."
 grand_archive.2425.a.robot.tt: "$@infected_devastation|0$ de devastación en todos los planetas no infectados"
 grand_archive.2425.b: "No hagáis nada."
 grand_archive.2425.b.tt: "¡Es posible que aparezcan más ninfas de gusanos del vacío cerca de nuestras colonias!"
 grand_archive.2430.name: "Incumplimiento del deber"
 grand_archive.2430.desc: "Si bien hemos acordado que purgar a los infectados es el mejor curso de acción, muchos soldados tienen problemas para cumplir las órdenes. A pesar del peligro que entrañan los parásitos de los gusanos del vacío, muchos no son capaces de eliminar a sus conciudadanos por un bien mayor.\n\nHay que tomar medidas para detener la plaga de los gusanos del vacío en nuestras colonias. Es posible que tengamos que automatizar ciertos aspectos de la purga para no necesitar a tantos soldados. También podemos lanzar una pequeña campaña publicitaria para promover los valores éticos de las purgas y reafirmar la necesidad de las mismas."
 grand_archive.2430.a: "Automaticemos los procesos de purga."
 grand_archive.2430.b: "Iniciemos una campaña publicitaria."
 grand_archive.2440.name: "Avance tangencial"
 grand_archive.2440.desc: "Nuestra búsqueda de la cura para la plaga de gusanos del vacío ha permitido que la investigación en otros campos biológicos avance en paralelo. Los parásitos siguen siendo nuestra máxima prioridad, pero el estudio de este nuevo avance resulta de lo más prometedor."
 grand_archive.2445.name: "Pruebas preliminares"
 grand_archive.2445.desc.common: "Ahora comprendemos mejor la plaga de gusanos del vacío. Se han sentado los cimientos de una cura."
 grand_archive.2445.desc.default: "$grand_archive.2445.desc.common$ Sin embargo, la investigación podría avanzar a un ritmo mucho mayor si realizamos pruebas preliminares en los participantes [owner_main_species.GetAdj].\n\nMás allá de las implicaciones éticas, lo más recomendable sería ignorar ciertos protocolos de seguridad por un bien mayor."
 grand_archive.2445.desc.gestalt: "$grand_archive.2445.desc.common$ Sin embargo, las pruebas consumen bastante tiempo, sobre todo por la necesidad constante de [root.GetIndividualNamePlural] desocupados como sujetos. Si pudiéramos reasignar [root.GetIndividualNamePlural] como sujetos de prueba, la cura se desarrollaría a una velocidad mayor.\n\nLas consecuencias se sentirían en todo el colectivo, pues los [root.GetIndividualNamePlural] reasignados abandonarían su labor anterior de forma descuidada."
 grand_archive.2445.a.default: "Hagamos pruebas en [owner_main_species.GetNamePlural] inconscientes."
 grand_archive.2445.a.gestalt: "Demos prioridad a las pruebas."
 grand_archive.2445.b.default: "Limitemos las pruebas a los voluntarios."
 grand_archive.2445.b.gestalt: "Reanudemos la investigación como si nada."
 grand_archive.2445.c: "Nada de pruebas poco éticas."
 grand_archive.2450.name: "Glándulas de gusanos del vacío"
 grand_archive.2450.desc: "Hemos descubierto un patrón en el ciclo de reproducción de los gusanos del vacío que podría suponer un gran avance en la síntesis de una cura para la plaga que producen.\n\nPara confirmar esta hipótesis, es necesario recolectar las glándulas reproductivas de un $voidworms_titan$ salvaje para analizarlas. El inconveniente es que habría que matar a ese $voidworms_titan$ mientras bombardea un planeta, a fin de preservar los gametos reproductivos activos."
 grand_archive.2450.a: "No tenemos tiempo para esto."
 grand_archive.2450.b: "Conseguiremos esas glándulas."
 VOIDWORM_GLANDS_PROJECT: "Glándulas reproductoras de troika"
 VOIDWORM_GLANDS_PROJECT_DESC: "Hemos realizado un importante descubrimiento mientras investigábamos una cura para la plaga de gusanos del vacío. Solo necesitamos las glándulas reproductoras de una troika de gusanos del vacío en plena fertilidad."
 VOIDWORM_GLANDS_PROJECT_TOOLTIP: "§RRecojamos los restos de una troika mientras bombardea un planeta.§!"
 VOIDWORM_TITAN_DEBRIS_PROJECT: "Restos de $NAME_Voidworms_Troika$"
 VOIDWORM_TITAN_DEBRIS_PROJECT_DESC: "Podemos recoger los restos de esta troika de gusanos del vacío para obtener sus fértiles glándulas reproductoras.\n\nEstos órganos podrían mejorar enormemente nuestra comprensión de la biología de estas criaturas para poder exterminar la plaga de gusanos del vacío de una vez por todas."
 grand_archive.2455.name: "Glándulas recuperadas"
 grand_archive.2455.desc: "Las glándulas recuperadas de la troika fértil de los gusanos del vacío han arrojado nueva información sobre sus ciclos reproductivos.\n\nLos tres gusanos del vacío están enfrascados en un ritual de apareamiento hasta su muerte, y cada uno distribuye su material genético por igual entre ellos, conformando un organismo completamente nuevo.\n\nPodemos volver este proceso de maleabilidad genética en su contra."
 grand_archive.2500.name: "Cura descubierta"
 grand_archive.2500.desc.default: "Hemos completado el desarrollo de una cura para la infección parasitaria de los gusanos del vacío. Nuestras colonias ya no son vulnerables a sus bombardeos de esporas, y su presencia en la galaxia ha dejado de ser un motivo de preocupación."
 grand_archive.2500.desc.tech: "$grand_archive.2500.desc.default$\n\nEsta vez, tenemos la certeza que nuestra cura está preparada para las futuras mutaciones de su biología."
 #########################################
 #Voidworm Plague Crisis Galactic Focus #
 #########################################
 resolution_galactic_focus_crisis_voidworm_plague: "Enfoque: Plaga de gusanos del vacío"
 resolution_galactic_focus_crisis_voidworm_plague_desc: "Los parásitos de los gusanos del vacío son un peligro para la galaxia. Si no nos unimos para detenerlos, nos consumirán a todos. Lidiar con esta crisis debería ser el enfoque galáctico."
 resolution_galactic_focus_crisis_voidworm_plague_effect_success: "$resolution_galactic_focus_crisis_effect_success$"
 galactic_focus_crisis_voidworm_plague: "Derrotar a la plaga de gusanos del vacío"
 galactic_focus_crisis_voidworm_plague_desc: "La plaga de gusanos del vacío es un peligro para toda la galaxia. Unámonos para derrotar a esta amenaza parasitaria."
 gal_com_crisis_voidworm_pop_victims: "Los gusanos del vacío han causado grandes daños a las poblaciones que se hallan en su territorio."
