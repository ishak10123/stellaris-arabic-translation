 voidworms_hostility_hostile: "Los gusanos del vacío mutantes parecen §Pmuy agresivos§!."
 voidworms_hostility_neutral: "Los gusanos del vacío mutantes parecen §Sagresivos§!."
 voidworms_hostility_pacified: "Los gusanos del vacío mutantes parecen §Btranquilos§!."
 hide_presence_modifier: "$approach_frenzied_voidworms_hide_presence$"
 hide_presence_starbase_modifier: "$approach_frenzied_voidworms_hide_presence$"
 frenzied_voidworms_killed.desc.common: "Hemos respetado el nido más grande de esos mutantes extraños. Bajo nuestro control, podremos criar estos seres especiales sin arriesgarnos a que se propaguen desmesuradamente por la galaxia."
 grand_archive.1165.name: "Gusanos del vacío mutantes destruidos"
 grand_archive.1165.desc.common: "Por no esperar a su inevitable ataque, hemos lanzado una campaña militar contra los gusanos del vacío mutantes en su sistema natal. La campaña ha tenido éxito: esos seres ya no amenazan [frenzied_voidworms_target.GetName] y nuestro planeta está a salvo."
 grand_archive.1165.desc.default: "$grand_archive.1165.desc.common$ y el ecosistema galáctico están a salvo.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.desc.homicidal: "$grand_archive.1165.desc.common$ está a salvo.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.a: "Todo un triunfo."
 grand_archive.1170.name: "Gusanos del vacío mutantes eliminados"
 grand_archive.1170.desc.common: "Los gusanos del vacío mutantes han sido eliminados. Esos seres ya no amenazan [frenzied_voidworms_target.GetName] y nuestro planeta está a salvo."
 grand_archive.1170.desc.default: "$grand_archive.1170.desc.common$ y el ecosistema galáctico están a salvo.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.desc.homicidal: "$grand_archive.1170.desc.common$ está a salvo.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.a: "$grand_archive.1165.a$"
 grand_archive.1180.name: "Gusanos del vacío mutantes encontrados"
 grand_archive.1180.desc: "Tras eliminar un saco de gusanos del vacío junto a sus nidos, hemos descubierto que esos seres han sufrido una mutación peculiar.\n\nAl parecer, han conseguido reproducirse por medios no parasitarios y se encuentran en un estado permanentemente agresivo, lo que explicaría su fuerza y resistencia inauditas.\n\nPor suerte, hemos conservado como trofeo uno de sus nidos. Bajo nuestro control, podremos criar estos seres especiales sin arriesgarnos a que se propaguen desmesuradamente por la galaxia."
 grand_archive.1180.a: "Es algo inesperado, pero bienvenido."
 grand_archive.1185.name: "Gusanos del vacío exterminados"
 grand_archive.1185.desc: "Hemos sabido que ya se han eliminado los gusanos del vacío mutantes que amenazaban nuestra colonia.\n\nEs una conclusión inesperada, pero bienvenida. Podemos congratularnos de que esos seres hayan dejado de hostigar nuestros sistemas."
 grand_archive.1185.a: "La galaxia ya es más segura."
 grand_archive.1200.name: "Ataque de gusano del vacío"
 grand_archive.1200.desc: "¡Los gusanos del vacío frenéticos están atacando [frenzied_voidworms_target.solar_system.GetName]!\n\nSu agresividad es ya pura exaltación y el enjambre principal se dirige directamente hacia [frenzied_voidworms_target.GetName].\n\nNo creemos que quieran dejar supervivientes."
 grand_archive.1200.a: "Preparad las defensas."
 grand_archive.1205.name: "El precio más alto"
 grand_archive.1205.desc_common: "Pese a todos nuestros esfuerzos, los gusanos del vacío mutantes han superado por completo a [this.GetName]. El bombardeo de estos seres frenéticos fue tan violento que reventó el núcleo del planeta y lo hizo añicos. No hubo supervivientes.\n\nDespués volvieron a sus nidos y ya no se agitan ante nuestra presencia. Con suerte, se quedarán allí."
 grand_archive.1205.desc.default: "$grand_archive.1205.desc_common$\n\nFrente a esta tragedia, no tenemos más remedio que seguir viviendo y aprender de nuestros errores."
 grand_archive.1205.desc.gestalt: "$grand_archive.1205.desc_common$\n\nLa pérdida de nuestra colmena principal es un duro golpe para [event_target:victim_country.GetName], pero seguimos con vida."
 grand_archive.1205.a: "Es el momento de reconstruir."
 grand_archive.1210.name: "Gusanos del vacío mutantes eliminados"
 grand_archive.1210.desc: "Los gusanos del vacío que descubrimos en [From.GetName] ya han sido eliminados. Nos hemos vengado de la destrucción de [avenged_homeworld.GetName].\n\nHemos respetado el nido más grande de esos mutantes extraños. Bajo nuestro control, podremos criar estos seres especiales sin arriesgarnos a que se propaguen desmesuradamente por la galaxia.\n\nDe esta forma, el legado de nuestro mundo perdido seguirá vivo."
 grand_archive.1210.a: "$grand_archive.1165.a$"
 grand_archive.1220.name: "Gusanos del vacío pacificados"
 grand_archive.1220.desc.common: "Tras enviar cantidades importantes de sustento mineral directamente a sus nidos, hemos logrado establecer una relación con los gusanos del vacío mutantes de [frenzied_home_system.GetName]. Esos seres ya no amenazan [frenzied_voidworms_target.GetName] y nuestro planeta está a salvo."
 grand_archive.1220.desc.common_2: "Nuestros cuidadores de animales más experimentados han estado ocupándose de estos bichos y hemos llegado a un punto en el que parecen dispuestos a cooperar.\n\nNos hemos traído uno de sus nidos más grandes. Eso nos permitirá criar más gusanos del vacío mutantes en lugar de dejarlos en estado salvaje."
 grand_archive.1220.desc.default: "$grand_archive.1220.desc.common$ y el ecosistema galáctico están a salvo.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.desc.homicidal: "$grand_archive.1220.desc.common$ está a salvo.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.a: "Una adición a la flota."
 grand_archive.1220.tt: "Todas las flotas de gusanos del vacío frenéticos se añaden a tu imperio"
 grand_archive.7010.name: "Señuelos del vacío desarrollados"
 grand_archive.7010.desc.common: "Nuestro dominio de los organismos espaciales ha propiciado el desarrollo de lo que hemos llamado §Yseñuelos del vacío§!."
 grand_archive.7010.desc: "$grand_archive.7010.desc.common$\n\nEstos edificios de la base estelar deben construirse dentro del sistema nativo de cada clase de fauna espacial. Una vez erigidos, atraerán periódicamente flotas de esos seres a la base estelar.\n\nDebemos tener cuidado, ya que ciertos tipos de organismos podrían volverse agresivos."
 grand_archive.7010.desc.primal_calling: "$grand_archive.7010.desc.common$\n\nEstos dispositivos están pensados para enviar llamadas al espacio salvaje y atraer organismos que se refugian en el vacío. No sabemos lo que atraeremos, pero las frecuencias que estamos emitiendo reciben respuesta de forma sistemática y regular.\n\nAlgo viene hacia nosotros."
 grand_archive.7020.name: "Canto de ballenas"
 grand_archive.7020.desc: "El §Yseñuelo del vacío§! que habíamos desarrollado atrajo a un grupo de ballenas espaciales originarias de sistemas con §Ygigantes gaseosos§! similares a [This.Capital.System.GetName].\n\nParece que es necesario construir los dispositivos en esos entornos para que funcionen correctamente. Si descubrimos más fauna salvaje, podremos construir señuelos del vacío cerca de sus hábitats naturales."
 ### Treasure Hunters
 origin_treasure_hunters: "Cazatesoros"
 origin_treasure_hunters_desc: "Esta civilización, imbuida de sed de aventura, está dispuesta a partir en su expedición más grandiosa y complicada. Armados solo con un mapa misterioso, sus exploradores corren entre las estrellas para hacerse con un tesoro pirata legendario."
 origin_tooltip_treasure_hunters_effects: "- Comienza con una ['r_celestial_chart_0_desc', $celestial_chart$] inactiva\n- Todos los líderes reclutados tienen el rasgo extra de ['concept_adventurous_spirit_trait'].$NEW_LINE$- Rasgos de gobernante:$TABBED_NEW_LINE$- ['leader_trait:leader_trait_buccaneer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_trailblazer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_treasure_hoarder']"
 START_SCREEN_TREASURE_HUNTERS: "Lo que define a nuestra civilización es su sed de aventura.\n\nDescubrir tesoros olvidados, explorar ruinas antiguas y desenterrar objetos de épocas pasadas: esos son los acontecimientos que componen nuestras historias más celebradas y que han inspirado durante generaciones a nuestra sociedad.\n\n¿Sería la casualidad o el destino lo que hizo que nuestra primera incursión espacial fuera una llamada a la aventura? Descubrimos una cápsula misteriosa de procedencia desconocida en la órbita de nuestro planeta. Contenía un mapa cifrado de las estrellas.\n\nTras años de ardua labor, ahora tenemos la tecnología que nos permite descifrarlo y trazar una ruta hacia lo inexplorado. Zarpamos hacia la frontera galáctica unidos en nuestra determinación de realizar la expedición más grande y arriesgada de nuestra existencia."
 d_treasure_planet: "Cámara del tesoro"
 d_treasure_planet_desc: "Un depósito seguro en el que se pueden ordenar, restaurar y conservar objetos valiosos."
 concept_treasure_vault: "$d_treasure_planet$"
 concept_treasure_vault_desc: "$d_treasure_planet_desc$"
 job_treasure_gatherer: "Cuidador del tesoro"
 job_treasure_gatherer_plural: "Cuidadores del tesoro"
 job_treasure_gatherer_desc: "Entrenados para tasar toda clase de artículos raros y valiosos, consiguen extraer el mayor valor de los tesoros hallados por toda la galaxia."
 mod_job_treasure_gatherer_add: "$job_treasure_gatherer_plural$"
 mod_job_treasure_gatherer_per_pop: "§G+1§! trabajo de $job_treasure_gatherer$ por $VALUE$ poblaciones"
 mod_job_treasure_gatherer_per_pop_short: "\n§G+1§! trabajo de $job_treasure_gatherer$ por $VALUE$ £pop£"
 job_treasure_gatherer_gestalt: "Dron del tesoro"
 job_treasure_gatherer_gestalt_plural: "Drones del tesoro"
 job_treasure_gatherer_gestalt_desc: "Capaces tasar toda clase de artículos raros y valiosos, consiguen extraer la mayor utilidad posible de los tesoros hallados por toda la galaxia."
 mod_job_treasure_gatherer_gestalt_add: "$job_treasure_gatherer_gestalt_plural$"
 mod_job_treasure_gatherer_gestalt_per_pop: "§G+1§! trabajo de $job_treasure_gatherer_gestalt$ por $VALUE$ poblaciones"
 mod_job_treasure_gatherer_gestalt_per_pop_short: "\n§G+1§! trabajo de $job_treasure_gatherer_gestalt$ por $VALUE$ £pop£"
 planet_treasure_gatherers: "$job_treasure_gatherer_plural$"
 mod_planet_treasure_gatherers_produces_mult: "Rendimiento de £job_treasure_gatherer£ $planet_treasure_gatherers$"
 grand_archive.5015.name: "Establecimiento de la cámara del tesoro"
 grand_archive.5015.desc: "La §Y$celestial_chart$§! nos ha proporcionado información de tasación archivada útil para extraer un mayor valor de los tesoros que descubrimos. Deberíamos establecer una §Ycámara del tesoro§! en uno de nuestros planetas donde ordenar, restaurar y conservar los objetos de valiosos. Según la logística actual, estos son los planetas adecuados para esta nueva instalación."
 grand_archive.5015.a: "Crea una $d_treasure_planet$ en §Y[event_target:treasure_planet_candidate_1.GetName]§!."
 grand_archive.5015.b: "Crea una $d_treasure_planet$ en §Y[event_target:treasure_planet_candidate_2.GetName]§!."
 grand_archive.5015.c: "Crea una $d_treasure_planet$ en §Y[event_target:treasure_planet_candidate_3.GetName]§!."
