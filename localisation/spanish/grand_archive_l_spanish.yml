 grand_archive.4105.desc.3.no_relic.common: "Normalmente, os confiaríamos uno de nuestros artefactos más preciados, pero ya los reclamaron antes otros de la galaxia.\n\nEn compensación, podéis quedaros uno de estos objetos."
 grand_archive.4105.desc.3.no_relic.xeno_geology: "Vuestra dedicación a la conservación de la §Yxenogeología§! es de las mejores.\n\n$grand_archive.4105.desc.3.no_relic.common$"
 grand_archive.4105.desc.3.no_relic.aesthetic_wonder: "Vuestra dedicación a la conservación de §Ymaravillas estéticas§! es de las mejores.\n\n$grand_archive.4105.desc.3.no_relic.common$"
