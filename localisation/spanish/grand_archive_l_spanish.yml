 ASTEROIDAL_CARAPACE_ARMOR_DESC: "$tech_asteroidal_carapace_desc$"
 tech_gravity_snare_capacity_desc: "Aumenta en §G1§! la cantidad de §Yfauna espacial§! que pueden capturar los cepos gravitatorios"
