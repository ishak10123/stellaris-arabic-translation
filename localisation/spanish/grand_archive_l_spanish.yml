 #Homicidal considerations #
 #Fanatic Purifiers
 grand_archive.4135.name: "Baratijas de nuestros inferiores"
 grand_archive.4135.desc: "Mientras continuamos la labor de purificar este mundo de la escoria xeno, nuestra colección de trofeos de [GetCollectionRewardCategory] no deja de crecer.\n\nEstas exposiciones mostrarán el cadáver de esta galaxia contaminada y seguirán inspirando la misión a la que nos consagramos."
 grand_archive.4135.desc.geology: "$grand_archive.4135.desc$"
 grand_archive.4135.desc.aesthetic: "$grand_archive.4135.desc$"
 grand_archive.4135.a: "¡Por [this.GetName]!"
 grand_archive.4140.name: "Baratijas acumuladas"
 grand_archive.4140.desc.geology: "Seguimos acumulando objetos de [GetCollectionRewardCategory], baratijas y curiosidades de esta galaxia inmunda.\n\nDediquemos un momento a admirar nuestros trofeos, pero quedan muchos más ahí fuera."
 grand_archive.4140.desc.aesthetic: "Seguimos acumulando baratijas de [GetCollectionRewardCategory], restos de la contaminación sembrada por formas de vida inferiores.\n\nCuando hayamos purgado hasta el último xeno de las estrellas, estos objetos nos recordarán su naturaleza inferior."
 grand_archive.4140.a: "Hay que purificar la galaxia."
 grand_archive.4145.name: "Vitrina de trofeos llena"
 grand_archive.4145.desc.geology: "Tenemos los almacenes llenos de objetos de [GetCollectionRewardCategory], la antigua carne de esta galaxia.\n\nEsta inmensa colección es un registro de nuestra labor de destrucción. Contemplemos nuestros triunfos."
 grand_archive.4145.desc.aesthetic: "Tenemos los almacenes llenos de [GetCollectionRewardCategory], una auténtica profusión de ornamentos xeno inútiles.\n\nContemplamos esta vasta colección y nos reímos de la naturaleza lastimosa de estos seres inferiores. Cuando los hayamos exterminado, estas vitrinas serán lo único que quede de ellos."
 grand_archive.4145.a: "¡Brindemos por la muerte!"
 #Devouring Swarm
 grand_archive.4136.name: "Alimento de baratijas"
 grand_archive.4136.desc: "El hambre no mengua. Nuestra colección de [GetCollectionRewardCategory] ha aumentado durante nuestra campaña de consumo.\n\nEstas piezas de exhibición servirán como último recuerdo de la galaxia que hemos devorado."
 grand_archive.4136.desc.geology: "$grand_archive.4136.desc$"
 grand_archive.4136.desc.aesthetic: "$grand_archive.4136.desc$"
 grand_archive.4136.a: "Hambre incesante."
 grand_archive.4141.name: "$grand_archive.4136.name$"
 grand_archive.4141.desc.common: "Mientras nos atiborramos, estos objetos servirán para recordarnos la abundancia de alimento que hemos consumido."
 grand_archive.4141.desc.geology: "Seguimos acumulando especímenes de [GetCollectionRewardCategory], trozos antiguos de la carne de esta galaxia.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.desc.aesthetic: "Seguimos acumulando [GetCollectionRewardCategory], curiosidades peculiares que fueron muy estimadas por formas de vida inferiores.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.a: "El festín continúa."
 grand_archive.4146.name: "Recuerdos de la comida"
 grand_archive.4146.desc: "Mientras nos dábamos un festín con esta galaxia, hemos ido llenando los almacenes con muestras de [GetCollectionRewardCategory].\n\nEsta enorme colección sirve solo como recordatorio de que el hambre nunca se sacia. Cuanto terminemos de devorar esta galaxia, contemplaremos estos objetos para saborear el recuerdo de su sabor."
 grand_archive.4146.desc.geology: "$grand_archive.4146.desc$"
 grand_archive.4146.desc.aesthetic: "$grand_archive.4146.desc$"
 grand_archive.4146.a: "Delicioso."
 #Determined Exterminators
 grand_archive.4137.name: "Baratijas con supuesto valor"
 grand_archive.4137.desc: "Hemos reunido muestras selectas de [GetCollectionRewardCategory] que los seres orgánicos tenían en gran valor como objetos únicos.\n\nBajo nuestra supervisión, estos objetos perdurarán mucho después de que la vida orgánica haya sido exterminada en la galaxia."
 grand_archive.4137.desc.geology: "$grand_archive.4137.desc$"
 grand_archive.4137.desc.aesthetic: "$grand_archive.4137.desc$"
 grand_archive.4137.a: "Curiosidades inocuas."
 grand_archive.4142.name: "Curiosidades acumuladas"
 grand_archive.4142.desc: "Seguimos acumulando trofeos de [GetCollectionRewardCategory] mientras limpiamos la mancha de la vida orgánica en esta galaxia.\n\nEstos objetos servirán para recordarnos la falta de lógica de la vida orgánica y nos ayudarán a preparar futuros protocolos de exterminio."
 grand_archive.4142.desc.geology: "$grand_archive.4142.desc$"
 grand_archive.4142.desc.aesthetic: "$grand_archive.4142.desc$"
 grand_archive.4142.a: "Protocolos rediseñados."
 grand_archive.4147.name: "Espacio de memoria lleno"
 grand_archive.4147.desc: "Mientras purgábamos esta galaxia, hemos llenado nuestros bancos de memoria con especímenes de [GetCollectionRewardCategory].\n\nEsta colección nos proporciona datos sobre lo que tienen a estimar los seres orgánicos. Servirá para facilitar su erradicación y como punto de referencia en la historia de esta galaxia infectada."
 grand_archive.4147.desc.geology: "$grand_archive.4147.desc$"
 grand_archive.4147.desc.aesthetic: "$grand_archive.4147.desc$"
 grand_archive.4147.a: "Los disparates de la vida orgánica."
