 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_DESC: "¡El intento de captura en el sistema $SYSTEM|Y$ ha sido un éxito! El $gravity_snare$ ha depositado el espécimen en el vivero.\n\nHas conseguido nueva fauna espacial:\n$CAPTURED_LIST$$RESOURCES_LIST$"
