 treasure_hunters_explore_system_1_poi_desc: "Ya derrotada la flota §Y$NAME_BlackNeedle$§!, podemos retomar nuestra búsqueda. Si la §H$celestial_chart$§! nos ha traído a este sistema, no podemos sino suponer que aquí se esconde el siguiente fragmento de carta."
 black_needle_fleet_poi: "La flota Aguja Negra"
 black_needle_fleet_poi_desc: "En el sistema [from.GetName] nos ha emboscado una flota bien organizada de piratas que aguardaban nuestra llegada con la intención de robarnos la §H$celestial_chart$§!."
 smeegibb_shelter_system_1_poi: "Buscar [prev.GetName]"
 smeegibb_shelter_system_1_poi_desc: "La §H$celestial_chart$§! nos ha revelado otro sistema recóndito, [prev.GetName]. Debemos poner rumbo a él y descubrir qué nos aguarda allí."
 smeegibb_shelter_system_2_poi: "Viajar a [smeegibb_system.GetName]"
 smeegibb_shelter_system_2_poi_desc: "No hemos logrado restablecer las comunicaciones con $NAME_Smeegibb$. Puesto que no tenemos más pistas que nos lleven al siguiente fragmento de §H$celestial_chart$§!, debemos regresar a [smeegibb_system.GetName] para investigar la situación. Por el momento, se desconoce qué ha causado la pérdida de contacto."
 black_needle_fleet_2_poi: "Derrotar al $NAME_CaptainInax$"
 black_needle_fleet_2_poi_desc: "La §Y$NAME_BlackNeedle$§! ha vuelto a la carga, liquidando a $NAME_Smeegibb$, nuestro contacto, y cerrándonos el paso al sistema [from.GetName]. Conjeturamos que el cuarto fragmento de §H$celestial_chart$§! se encuentra escondido en la superficie de [smeegibb_shelter.GetName].\n\nPara poder buscar la cápsula, antes debemos derrotar a la flota enemiga."
