 tech_thrusters_bio_integration_desc: "Los propulsores artificiales pueden integrarse en los organismos espaciales si se tienen en cuenta el suministro de energía y las conexiones con los centros motores neuronales."
 tech_thrusters_bio_integration_effect: "§HDesbloquea la función:§! Mejora de propulsores para fauna espacial"
 tech_hyper_drive_bio_integration: "Biointegración de hiperimpulso"
 tech_hyper_drive_bio_integration_desc: "Viajar por hipervías puede ser peligroso para la vida espacial, pero podemos mejorar sus habilidades."
 tech_hyper_drive_bio_integration_effect: "§HDesbloquea la función:§! Mejora de hiperimpulsos para fauna espacial"
 tech_sensors_bio_integration: "Biointegración de sensores"
 tech_sensors_bio_integration_desc: "Los diversos órganos sensoriales de la vida espacial pueden mejorarse mediante nuestras tecnologías desarrolladas con un daño mínimo al organismo."
 tech_sensors_bio_integration_effect: "§HDesbloquea la función:§! Mejora de sensores para fauna espacial"
 tech_combat_computers_bio_integration: "Biointegración de ordenadores de combate"
 tech_combat_computers_bio_integration_desc: "Podemos desarrollar neurochips especializados para influir en el comportamiento de la fauna espacial que interviene en los combates de flotas a gran escala."
 tech_combat_computers_bio_integration_effect: "§HDesbloquea la función:§! Mejora de ordenadores de combate para fauna espacial"
