 ### Primal Calling
 origin_primal_calling: "Vocación primigenia"
 origin_primal_calling_desc: "El susurro de las afiladas hierbas. El rugiente silencio de la noche. La voluntad del cazador, fría y cortante como la luz estelar...\n\nEsta civilización guarda una conexión primigenia con la naturaleza. Se consideran portavoces de la diversa —y a menudo letal— fauna nativa de su mundo, y ahora han puesto su vista en las estrellas. Dominan la domesticación y crianza de animales. Su relación con la fauna se ha desarrollado según su ética. Queda por ver cómo evolucionará este vínculo a escala galáctica."
 origin_tooltip_primal_calling_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$ ['concept_untamed_wilds_mod']\n- $HOME_SYSTEM$ §YFauna espacial§! en un sistema vecino.\n- $AVAILABLE_BUILDINGS$ ['concept_wildlife_ranch', £building£ $wildlife_ranch$]\n- Puede elegir una ['concept_primal_calling_stance'] sobre la §Yfauna espacial§! tras el primer contacto.\n- $ADDITIONAL_TECHNOLOGIES_STRING$ ['technology:tech_genome_mapping', £society_research£$tech_genome_mapping$]\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_alien_life_studies', £society£$tech_alien_life_studies$]\n- Recopila información sobre ['technology:tech_gravity_wells', £physics_research£$tech_gravity_wells$] tras el primer contacto con la fauna espacial\n- Recopila información sobre ['technology:tech_alien_cloning', £society_research£$tech_alien_cloning$] tras capturar a la fauna espacial\n- Recopila información sobre ['technology:tech_controlled_mutations', £society_research£$tech_controlled_mutations$] tras clonar a la fauna espacial"
 START_SCREEN_PRIMAL_CALLING: "A pesar del veloz progreso tecnológico, seguimos ligados a las criaturas salvajes de nuestro mundo. Han sido nuestras inseparables acompañantes durante nuestra evolución, y son tanto nuestras maestras como nosotros sus guardianes. No les arrebatamos más de lo que pueden prescindir, y sus sacrificios son venerados.\n\nEn la indómita vastedad del espacio, podríamos descubrir otras criaturas salvajes. Si se da el caso, les profesaremos el mismo respeto que a las criaturas de nuestro mundo. Ellas aprenderán a comportarse mientras nosotros aprendemos a hacer lo mismo, y juntos creceremos más fuertes.\n\nLas estrellas nos llaman, y un deseo primigenio arde en nuestro interior. No sabemos qué nos aguarda fuera, pero lo afrontaremos con convicción."
 leader_trait_trophy_hunter: "Cazador de trofeos"
 leader_trait_trophy_hunter_desc: "Curtido por las adversidades y armado con una vida de experiencias, este comandante posee una comprensión insólita de la fauna espacial. La clave de toda cacería es pensar como la presa, aunque solo una ejecución perfecta dará lugar al trofeo perfecto."
 leader_trait_gifted_trapper: "Trampero talentoso"
 leader_trait_gifted_trapper_desc: "Un investigador experto que pone el máximo cuidado en la captura y transporte seguro de especímenes vivos. El compromiso de este líder con el bienestar de las criaturas inspira a otros a mejorar los estándares de investigación en todas las disciplinas."
 leader_trait_void_hunter: "Cazador del vacío"
 leader_trait_void_hunter_desc: "Un cazador experto con el equipo adecuado para cazar grandes presas. Sabe actuar con paciencia y atacar con precisión."
 leader_trait_void_hunter_2: "$leader_trait_void_hunter$ II"
 leader_trait_void_hunter_2_desc: "$leader_trait_void_hunter_desc$"
 leader_trait_void_tracker: "Rastreador del vacío"
 leader_trait_void_tracker_desc: "El talento de este líder para capturar fauna espacial salvaje con eficacia y seguridad no tiene rival."
 leader_trait_void_tracker_2: "$leader_trait_void_tracker$ II"
 leader_trait_void_tracker_2_desc: "$leader_trait_void_tracker_desc$"
 #First Contacts
 first_contact_critters.15.desc.primal_calling: "Cabe destacar que hay una jerarquía matriarcal en el centro de cada manda §Htiyanki§!, con una vaca singular liderando el grupo en todo momento. Las hembras tienen prioridad en todos los recursos alimentarios para que puedan producir gases maternales para sus crías y dirigir las migraciones de la manada. Por esto, los toros pueden renunciar a la alimentación cuando los recursos son escasos, lo que los anima a buscar más comida mientras la manada descansa."
 first_contact_critters.25.desc.primal_calling: "Solo los especímenes más jóvenes se hallan acompañados de organismos cuasi independientes controlados por secreciones ligadas al ARN. Pese a su aparente falta de sapiencia, estos \"flagelos\" atacan con patrones complejos. Por tanto, la §H\"ameba espacial\"§! es un auténtico depredador natural."
 first_contact_critters.35.desc.primal_calling: "Estas criaturas parecen comunicarse entre ellas por medio de cambios cromáticos en la luz refractada. Aunque este canal posee mucho potencial para las expresiones complejas, estas formas de vida seminteligentes lo emplean de forma básica. Los cambios de color sirven para indicar estratos sociales, agresividad e incluso condiciones de fertilidad."
 grand_archive.2005.desc.primal_calling: "Estas criaturas parásitas carecen de la capacidad natural de reproducirse y deben depender de la adquisición de huéspedes planetarios. Para que los §H\"gusanos del vacío\"§! produzcan una hormona esencial en los tríos de apareamiento — también conocidos como \"troikas\"—, necesitan recolectar suficiente materia orgánica de los planetas habitados. Al ser estas criaturas hermafroditas, la selección de compañeros de apareamiento suele estar condicionada por rasgos físicos complementarios y un tamaño en consonancia."
 grand_archive.2900.desc.primal_calling: "Tenemos la creencia de que las criaturas seleccionan sus asteroides en función de su composición mineral y su tamaño. Si bien el primer espécimen que descubrimos siente predilección biológica por el mineral de [GetCommonMineral], lo más probable es que cada individuo desarrolle esta adaptación con el tiempo y según su entorno actual. Los escáneres detectan trazas de este metal en todo el asteroide anfitrión, así como en el interior del sistema nervioso y el tracto digestivo del mismo §H\"cutoloide\"§!."
 COMMON_MINERAL_1: "cobalto"
 COMMON_MINERAL_2: "platino"
 COMMON_MINERAL_3: "oro"
 COMMON_MINERAL_4: "plata"
 COMMON_MINERAL_5: "hierro"
 COMMON_MINERAL_6: "níquel"
 crystalline_entity_plural: "Entidades cristalinas"
 grand_archive.1002.name: "Vida en las estrellas"
 grand_archive.1002.desc.default: "El vacío está lleno de vida. Hemos descubierto la existencia de [from.GetSpaceFaunaNamePlural], pero ¿qué más nos aguarda ahí fuera?\n\nNuestra estrecha relación con la fauna salvaje de [capital_scope.GetName] podría no ser apropiada a escala galáctica. El vacío de espacio es un ecosistema completamente nuevo, y nosotros nos hallamos en una encrucijada.\n\n¿Qué son estas criaturas para nosotros?\n\nSea cual sea nuestra decisión, las consecuencias se sentirán en los años venideros."
 grand_archive.1002.desc.homicidal: "Es muy posible que el vacío esté lleno de vida. Debemos decidir si queremos acabar con ella o utilizarla. Tras descubrir la existencia de [from.GetSpaceFaunaNamePlural], estamos ansiosos por encontrar más. Presas o bestias de carga, la elección depende de nosotros."
 grand_archive.1002.a: "Especímenes para exponer."
 grand_archive.1002.b: "Ganado por explotar."
 grand_archive.1002.c: "Organismos que deben ser protegidos."
 grand_archive.1002.d: "Nuevas presas que cazar."
 grand_archive.1002.d.purifier: "Más cuerpos para el montón."
 grand_archive.1002.e: "Más mentes que asimilar."
 grand_archive.1002.f: "Socios en simbiosis."
 grand_archive.1002.g: "Caza y presa."
 untamed_wilds: "Tierras salvajes"
 untamed_wilds_desc: "Vastas extensiones de territorio protegido en las que se permite que la vida salvaje prospere, lo que proporciona un suministro sostenible de criaturas autóctonas."
 grand_archive.1010.desc: "Nuestra colonia en [Root.GetName] ha aprendido a respetar los límites del territorio natural de la §Yvida titánica§! autóctona.\n\nEstas enormes bestias seguirán siendo un beneficio para nuestro asentamiento a medida que ampliemos fronteras y desarrollemos la tierra."
 grand_archive.1010.a: "A nuestros [owner.GetWranglerJobNamePlural] les irá bien aquí."
