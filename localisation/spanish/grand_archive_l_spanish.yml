 space_amoeba_UNIQUE_MUTATION_PROJECT: "Proyecto de mutación de amebas espaciales"
 space_amoeba_UNIQUE_MUTATION_PROJECT_DESC: "Durante nuestro proceso de entrenamiento de organismos recién clonados, una ameba espacial herida utilizó una novedosa técnica para derrotar a su oponente. Los flagelos de la ameba fueron capaces de extraer nutrientes y materiales de las defensas naturales de su compañera de entrenamiento, utilizándolos para reparar los agujeros de su propio blindaje y recuperar la fuerza de combate.\n\nLa investigación adicional de este fenómeno puede revelar un nuevo elemento de la biología de la ameba espacial que puede potenciarse para desarrollar una nueva mutación específica de la especie."
 tiyanki_UNIQUE_MUTATION_PROJECT: "Proyecto de mutación de tiyanki"
 tiyanki_UNIQUE_MUTATION_PROJECT_DESC: "Se ha observado una flota recientemente clonada de tiyanki en comunicación, emitiendo repetidamente una serie de vocalizaciones complejas. Los sonidos, apenas detectables, parecían reconfortar y calmar a todas las criaturas cercanas.\n\nLa investigación adicional de este fenómeno puede revelar un nuevo elemento de la biología tiyanki que puede potenciarse para desarrollar una mutación específica de la especie."
 voidworm_UNIQUE_MUTATION_PROJECT: "Proyecto de mutación de gusanos del vacío"
 voidworm_UNIQUE_MUTATION_PROJECT_DESC: "Hemos observado que algunos de nuestros gusanos del vacío tienden a desarrollar pequeños quistes a medida que alcanzan la madurez. Observaciones posteriores mostraron que los especímenes con estas antiestéticas ampollas suelen ser más fértiles que sus contrapartes.\n\nLa investigación adicional de este fenómeno puede revelar un nuevo elemento de la biología del gusano del vacío que puede mejorarse para desarrollar una mutación específica de la especie."
 cutholoid_UNIQUE_MUTATION_PROJECT: "Proyecto de mutación de cutoloides"
 cutholoid_UNIQUE_MUTATION_PROJECT_DESC: "Debido a la sobrealimentación, uno de nuestros cutoloides clonados fue grabado mientras expulsaba violentamente el contenido de su estómago. Los fluidos digestivos resultantes resultaron ser bastante mortíferos, ya que mantienen sus cualidades radiactivas durante un tiempo considerable fuera del cuerpo de la criatura.\n\nLa investigación adicional de este fenómeno podría revelar un nuevo elemento de la biología cutoloide que podría potenciarse para desarrollar una mutación específica de la especie."
 crystalline_entity_UNIQUE_MUTATION_PROJECT: "Proyecto de mutación de entidades cristalinas"
 crystalline_entity_UNIQUE_MUTATION_PROJECT_DESC: "En las pruebas de combate, varias de nuestras entidades cristalinas se han partido perfectamente en dos tras ser destruidas. Estas mitades fragmentadas han mantenido las constantes vitales y han seguido viviendo durante un breve periodo de tiempo."
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT: "Proyecto de mutación de $NAME_Elderly_Tiyanki$"
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT_DESC: "El material genético que hemos recuperado de los $NAME_Elderly_Tiyanki$ nos ha proporcionado unos conocimientos únicos que nos permitirán seguir adelante con un proyecto de mutación experimental que podría aplicarse a cualquier fauna espacial."
 voidspawn_UNIQUE_MUTATION_PROJECT: "Proyecto de mutación de engendros del vacío"
 voidspawn_UNIQUE_MUTATION_PROJECT_DESC: "El material genético que hemos recuperado de los $NAME_Voidspawn$ nos ha proporcionado unos conocimientos únicos que nos permitirán seguir adelante con un proyecto de mutación experimental que podría aplicarse a cualquier fauna espacial."
 unique_mutation_project_unlock_desc: "Nuestros esfuerzos de clonación de [From.GetShipCategoryName] han dado como resultado un gran avance genético. Podría ser posible combinar la anatomía única de estas criaturas con nuestra experiencia en la manipulación de genes para crear un tipo único de mutación."
