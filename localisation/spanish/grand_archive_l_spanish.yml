 gateway_snare_capacity: "Capacidad de cepo gravitatorio"
 gateway_gravity_snare_capacity: "§HSenda de capacidad de cepo gravitatorio§!\n§EEsta tecnología llevará a más avances en la capacidad de captura de los cepos gravitatorios.§!"
 tech_alien_cloning: "Reproducción artificial"
 tech_alien_cloning_beastmasters: "$tech_alien_cloning$"
 tech_alien_cloning_desc: "Podemos incubar el $genetic_material$ extraído de la fauna espacial sacrificada en un entorno controlado para producir nuevos miembros de cada especie bajo nuestro mando."
 feature_alien_cloning_unlocked: "Políticas de §Y$policy_space_fauna_growth$§!"
 feature_alien_cloning_unlocked_desc: "$policy_space_fauna_growth_desc$"
 tech_alien_cloning_tt: "§HDesbloquea la función:§! Clonación de fauna espacial a escala de corbeta"
 tech_improved_incubators: "Incubadoras mejoradas"
 tech_improved_incubators_beastmasters: "$tech_improved_incubators$"
 tech_improved_incubators_desc: "Podemos mejorar los procesos de reproducción artificial en nuestros criaderos para acelerar las primeras fases de desarrollo y producir más clones adultos."
 tech_improved_incubators_tt: "§HDesbloquea la función:§! Clonación de fauna espacial a escala de destructor"
 tech_improved_incubators_tt_desc: "Ahora los criaderos pueden clonar especímenes de §Yfauna espacial§! comparables en tamaño a los destructores más tradicionales."
 tech_metabolic_gases: "Gases metabólicos"
 tech_metabolic_gases_beastmasters: "$tech_metabolic_gases$"
 tech_metabolic_gases_desc: "Las mejoras en los gases metabólicos de nuestros criaderos harán que los especímenes maduren aún más antes de salir a este mundo."
 tech_metabolic_gases_tt: "§HDesbloquea la función:§! Clonación de fauna espacial a escala de acorazado"
 tech_metabolic_gases_tt_desc: "Ahora los criaderos pueden clonar naves de fauna espacial de cualquier edad o tamaño."
 BOARDING_CABLES: "Cables de abordaje"
 BOARDING_CABLES_MODULES: "$BOARDING_CABLES$"
 BOARDING_CABLES_TOOLTIP: "Otorga una pequeña probabilidad de robar una nave enemiga o capturar a un comandante enemigo y exigir su rescate."
 BOARDING_CABLES_DESC: "$BOARDING_CABLES_TOOLTIP$"
 tech_boarding_cables: "$BOARDING_CABLES$"
 tech_boarding_cables_desc: "Artillería de pequeño calibre reacondicionada para disparar ganchos perforantes unidos a unos resistentes cables de fibra de carbono, ideal para inmovilizar y abordar naves enemigas."
 tech_controlled_mutations: "Mutaciones controladas"
 tech_controlled_mutations_desc: "Podemos mejorar la eficacia de nuestras naves de fauna espacial al modificar sus genomas para que podamos integrar tecnología artificial en su biomasa."
 tech_controlled_mutations_2: "Mutaciones controladas avanzadas"
 tech_controlled_mutations_2_desc: "Podemos ir a más. La manipulación avanzada de la genética de la fauna espacial nos permite integrar un abanico aún más amplio de componentes especializados."
