 tech_galactic_archivism: "Archivismo galáctico"
 tech_galactic_archivism_desc: "Hay que preservar la historia de nuestra galaxia para aprender de aquellos que nos precedieron. Lo ideal sería construir un archivo a máxima escala para semejante tarea."
 tech_gravity_wells: "Cepos gravitatorios"
 tech_gravity_wells_desc: "Podemos emplear concentraciones focalizadas de masa cuántica para generar ráfagas breves de gravedad extrema. En teoría, si se manipula correctamente, esta fuerza gravitacional podría capturar y contener a una criatura de cualquier tamaño sin que resulte herida."
 tech_containment_vessel: "Protocolos de contención para cuidadores"
 tech_containment_vessel_desc: "Los cepos gravitatorios capturan el doble de §Yfauna espacial§!."
