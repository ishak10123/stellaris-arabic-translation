 sm_voidlure: "Señuelo del vacío"
 sm_voidlure_desc: "Los señuelos del vacío transmiten señales al espacio profundo capaces de atraer a los organismos que se refugian en el vacío."
 sm_voidlure_desc_know_fauna: "Los señuelos del vacío transmiten señales al espacio profundo capaces de atraer a determinados tipos de fauna espacial a lo largo del tiempo. Cada instalación debe construirse en el tipo de sistema preferido de la criatura. Las criaturas atraídas serán dóciles durante un año."
