 ###################
 TREASURE_TROVE: "Tesoro oculto"
 TREASURE_TROVE_DESC: "Han detectado un §Y$TREASURE_TROVE$§! pirata perdido en alguna parte de [this.GetName]. A saber las riquezas que contiene..."
 treasure_troves_chain_title: "Tesoros ocultos"
 treasure_troves_chain_desc: "A lo largo de la historia de esta galaxia, los piratas han escondido sus riquezas ilegales como tesoros bien ocultos. Muchos de estos alijos quedaron abandonados y se creían perdidos, pero ahora están a nuestra disposición."
 mod_treasure_trove_reward_mult: "Recompensas de tesoro oculto"
 grand_archive.6010.name: "$TREASURE_TROVE$ descubiertos"
 grand_archive.6010.desc: "Hemos detectado una débil señal procedente de [event_target:treasure_trove_planet.GetName]. A juzgar por su rudimentaria criptografía, creemos que procede de un §Y$TREASURE_TROVE$§! pirata perdido.\n\nCostará un poco de esfuerzo, pero confiamos en poder desenterrar sus secretos."
 grand_archive.6010.a: "Revelad su ubicación."
 grand_archive.6015.name: "Tesoro recuperado"
 grand_archive.6015.common.1: "Tras desarmar cuidadosamente las defensas del §Y$TREASURE_TROVE$§! pirata de [event_target:treasure_trove_planet.GetName]"
 grand_archive.6015.desc: "$grand_archive.6015.common.1$, hemos descubierto un alijo de valiosos recursos.\n\nHaremos buen uso de esta recompensa inesperada."
 grand_archive.6015.desc.specimen: "$grand_archive.6015.common.1$, hemos descubierto un objeto pirata antiguo protegido en un contenedor sellado. Esta muestra de la historia de los bucaneros se añadirá a nuestra colección."
 grand_archive.6015.desc.specimen_extra: "Además, hemos descubierto un objeto pirata antiguo escondido entre el enorme §Y$TREASURE_TROVE$§!. Con una cuidada restauración, esta muestra de la historia de los bucaneros será un añadido maravilloso para nuestra colección."
 grand_archive.6015.desc.pirate_ship: "Después de desarmar cuidadosamente el §Y$TREASURE_TROVE$§! perdido, descubrimos direcciones análogas que conducen a un punto en el planeta de abajo. Allí encontramos un increíble acorazado pirata protegido por un sistema antidetección.\n\nEsta nave, llamada [treasure_trove_pirate_ship.GetName], se ha incorporado a nuestro ejército."
 grand_archive.6015.desc.tech: "$grand_archive.6015.common.1$, hemos descubierto un banco de datos con valiosos documentos de investigación.\n\nIgnoramos cómo se obtuvieron, pero podemos hacer buen uso de ellos."
 grand_archive.6015.a: "$GOOD$"
 treasure_trove_specimen_tt: "$t$Recupera un ['concept_specimen']."
 treasure_trove_pirate_ship_tt: "$t$Recupera una nave pirata militar."
