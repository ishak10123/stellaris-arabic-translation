 grand_archive.4105.desc.3.common: "Vuestra dedicación a la conservación no tiene igual. Nos gustaría confiar un artículo muy especial a vuestro cuidado. [GetStage3Description]"
 grand_archive.4105.desc.3.common_2: "Naturalmente, un objeto de tal valor requerirá un donativo considerable como compensación..."
 CURATORS_STAGE_3_DESC: "Podéis elegir un objeto poderoso de nuestra colección más preciada. Estamos seguros de que estará en buenas manos.\n\n$grand_archive.4105.desc.3.common_2$"
 DEAD_CURATORS_STAGE_3_DESC: "Estos objetos poderosos estaban guardados en lugares secretos por toda la galaxia y por eso sobrevivieron a la destrucción de nuestra estación.\n\n$grand_archive.4105.desc.3.common_2$ La reconstrucción no es posible solo con buenos deseos."
