 grand_archive.4510.desc.common: "Hemos destruido el $grand_archive$ de [fromfrom.GetName], propiedad de [from.GetName]."
 grand_archive.4510.stolen: "Conseguimos recuperar algunos de los valiosos especímenes que contenía."
 grand_archive.4510.ancrel: "Conseguimos recuperar un pequeño número de $r_minor_artifacts$ de entre los restos."
 grand_archive.4510.nothing: "Por desgracia, no contenía nada de gran valor."
