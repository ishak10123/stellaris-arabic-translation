 VOIDLURE_ATTRACTED_FAUNA_TITLE: "Nuevos organismos espaciales"
 VOIDLURE_ATTRACTED_FAUNA_DESC: "Uno de nuestros señuelos del vacío ha atraído a la fauna espacial."
 NAME_Lured_Fauna: "Fauna atraída temporalmente"
 wildlife_ranch: "Rancho de fauna salvaje"
 wildlife_ranch_desc: "Vivimos en asociación con nuestras criaturas autóctonas, poniendo el máximo cuidado en la protección de su hábitat y el crecimiento sostenible de su especie."
 wildlife_ranch_2: "Extensión de fauna salvaje"
 wildlife_ranch_2_desc: "Una gestión cuidadosa del ecosistema mejora las condiciones para las criaturas autóctonas y facilita las labores ganaderas."
 wildlife_ranch_3: "Nexo de fauna salvaje"
 wildlife_ranch_3_desc: "Una amplia instalación donde los animales pueden campar a sus anchas. Se les ofrece comodidad y lujo en un esfuerzo por maximizar la calidad de los recursos que proporcionan."
 hunting_grounds: "Terrenos de caza"
 hunting_grounds_desc: "Un complejo de entrenamiento utilizado para dominar todo tipo de técnicas de caza. Se necesitan una destreza y una habilidad inigualables para vencer a temibles depredadores y convertirlos en trofeos, ya sea con armas de energía modernas o con utensilios marciales tradicionales."
 hunting_grounds_2: "Extensión de caza"
 hunting_grounds_2_desc: "Un centro de adiestramiento y vigilancia que ofrece condiciones de caza óptimas para la fauna local. La tecnología de mapeo térmico ayuda a identificar rastros recientes de animales y a adquirir piezas de caza de gran calidad."
 hunting_grounds_3: "Nexo de caza"
 hunting_grounds_3_desc: "Una vasta extensión que acoge partidas de caza planetarias a gran escala. Provistos de armas y equipos de rastreo de la más alta calidad, los cazadores reciben formación de alto nivel para maximizar la cantidad y calidad de las piezas abatidas."
 wildlife_sanctuary: "Santuario de fauna salvaje"
 wildlife_sanctuary_desc: "Una reserva protegida donde se estudia a los animales salvajes dentro de sus hábitats naturales. Se toman medidas para evitar la inestabilidad de la población o un exceso de enfermedades. El estudio de estas criaturas es en sí mismo un valioso trabajo académico, pero sobre todo nos enseña más sobre nuestra propia naturaleza."
 wildlife_sanctuary_2: "Santuario avanzado"
 wildlife_sanctuary_2_desc: "Aquí se cuida a las criaturas de forma individualizada y se atienden sus necesidades dietéticas y médicas con la mínima alteración de sus hábitats naturales. Los ecosistemas especializados permiten la propagación y reintroducción de especies amenazadas."
 wildlife_sanctuary_3: "Nexo santuario"
 wildlife_sanctuary_3_desc: "Aquí se vigila y cuida a los animales mediante una infraestructura cuidadosamente diseñada para que parezca que no existe. Los investigadores tienen prohibido interferir en el comportamiento natural de los sujetos, lo que garantiza la obtención de datos de investigación de la mayor calidad posible."
 primal_arena: "Arena primaria"
 primal_arena_desc: "Un coliseo donde nuestros guerreros más fuertes se enfrentan a feroces criaturas en un primitivo combate. No hay mayor entretenimiento que ver a los héroes triunfar sobre bestias salvajes... o morir en el intento."
 primal_arena_2: "Estadio primario"
 primal_arena_2_desc: "En este enorme estadio, manadas de animales son entrenadas por adiestradores expertos para coordinar sus ataques. Los que luchan contra las fieras ya no pueden confiar simplemente en dominar a su presa: para sobrevivir, deben ser más inteligentes que sus entrenadores."
 primal_arena_3: "Coliseo primario"
 primal_arena_3_desc: "Una impresionante arena diseñada para albergar batallas a muerte de proporciones monumentales. Cada enfrentamiento lleva semanas de preparación y puede albergar a millones de individuos."
 symbiosis_nexus: "Nódulo de simbiosis"
 symbiosis_nexus_desc: "Una reserva natural donde los compañeros salvajes son bienvenidos a nuestro redil. Cada criatura tiene algo único que ofrecer al entramado mental."
 symbiosis_nexus_2: "Extensión de simbiosis"
 symbiosis_nexus_2_desc: "Una reserva central que sirve para agrupar a nuestros socios salvajes en vainas que se mantienen solas. La coordinación de sus capacidades mentales menores proporciona estabilidad de pensamiento al entramado mental mayor."
 symbiosis_nexus_3: "Nexo de simbiosis"
 symbiosis_nexus_3_desc: "Un centro extensivo que sirve para unir las mentes de todas las criaturas y potenciar nuestro pensamiento colectivo."
 edict_space_fauna_exhibition: "Exposición de fauna espacial"
 space_fauna_exhibition: "$edict_space_fauna_exhibition$"
 edict_space_fauna_exhibition_desc: "Ganaderos de toda la galaxia exponen su preciado ganado y compiten por el codiciado premio."
 edict_beasts_burden: "Bestias de carga"
 beasts_burden: "$edict_beasts_burden$"
 edict_beasts_burden_desc: "Nuestro ganado más resistente debe contribuir a algunas de nuestras tareas más laboriosas."
 edict_creature_welfare: "Bienestar de las criaturas"
 creature_welfare: "$edict_creature_welfare$"
 edict_creature_welfare_desc: "Es nuestra responsabilidad garantizar la máxima calidad de vida a las criaturas bajo nuestro cuidado."
 edict_crack_the_whip: "El sonido del látigo"
 crack_the_whip: "$edict_crack_the_whip$"
 edict_crack_the_whip_desc: "Todos los organismos, sea cual sea su especie, reaccionan de forma parecida al dolor. El truco está en aprender a infligirlo correctamente."
 edict_exotic_network: "Red neural exótica"
 exotic_network: "$edict_exotic_network$"
 edict_exotic_network_desc: "Las mentes de los organismos menores bajo nuestro cuidado tienen capacidad suficiente para prestar ancho de banda en cálculos más exigentes."
 edict_defensive_instincts: "Instintos de autopreservación"
 defensive_instincts: "$edict_defensive_instincts$"
 edict_defensive_instincts_desc: "Somos uno. Dejemos que nuestros instintos se entrelacen en el frío del espacio profundo."
 edict_biological_overdrive: "Sobrecarga biológica"
 biological_overdrive: "$edict_biological_overdrive$"
 edict_biological_overdrive_desc: "Con los receptores neuronales adecuados, podemos llevar a las criaturas inferiores a sus límites máximos. "
 grand_archive.1060.name: "Carroña [from.GetSpaceFaunaName]"
 grand_archive.1060.desc: "Tras establecer contacto con los [from.GetSpaceFaunaNamePlural], detectamos el cadáver en descomposición de un miembro de su especie en [fromfrom.GetName]. Los restos están putrefactos y congelados tras una exposición prolongada al espacio abierto.\n\nSuponemos que este cadáver es lo que atrajo inicialmente a otros miembros de su especie; tal vez habían estado buscando a un miembro perdido de su [from.GetSpaceFaunaGroup]. Esta es una rara oportunidad para estudiar la biología de un [from.GetSpaceFaunaName] que ha muerto por causas naturales en el vacío."
 TIYANKI_GROUP_NAME: "manada"
 SPACE_AMOEBA_GROUP_NAME: "rebaño"
 CRYSTAL_GROUP_NAME: "nidada"
 VOIDWORM_GROUP_NAME: "camada"
 CUTHOLOID_GROUP_NAME: "jauría"
 voidworm_carcass_01_object: "Restos de gusano del vacío"
 carcass_01_object: "Cadáver de fauna espacial"
 CARRION_DEBRIS_PROJECT: "Autopsia de [met_critter.GetSpaceFaunaName]"
 CARRION_DEBRIS_PROJECT_DESC: "Se ha descubierto el cadáver de un [met_critter.GetSpaceFaunaName] en [contact_system.GetName]. El estudio de estos restos en la naturaleza ampliará nuestro entendimiento sobre estas criaturas espaciales."
 grand_archive.1065.name: "Autopsia completa"
 grand_archive.1065.desc: "La autopsia del cadáver de [met_critter.GetSpaceFaunaName] en [contact_system.GetName] ha finalizado. Hemos recuperado un espécimen biológico bien conservado de entre los restos que aporta una visión única de su fisiología."
 grand_archive.1065.specimen_tt: "['concept_specimen'] específico de fauna §Mépico§!"
 NAME_BoneShip: "Nave de huesos"
 NAME_BoneShip_desc: "La nave está adornada con zarcillos de tiyanki adulto, hileras de dientes de gusano del vacío y el cráneo de una criatura que nunca antes habíamos visto. Está equipada con varias armas de precisión."
 grand_archive.1069.name: "$NAME_BoneShip$"
 grand_archive.1069.desc: "Nos ha contactado una nave espacial con extrañas modificaciones en [from.GetName]. $NAME_BoneShip_desc$\n\nTras aceptar ingenuamente nuestra invitación a dialogar, hemos [GetExecuted] al piloto en el acto. Nos hemos hecho con su peculiar nave y la hemos añadido a nuestras filas. Hemos descubierto una útil guía de campo para cazadores entre sus efectos personales."
 grand_archive.1069.a: "Un regalo de bienvenida."
 EXECUTED: "ejecutado"
 DEVOURED: "devorado"
 grand_archive.1070.name: "$NAME_BoneShip$"
 grand_archive.1070.desc: "Nos ha contactado una nave espacial con extrañas modificaciones en [from.GetName]. $NAME_BoneShip_desc$\n\nEstá llamándonos en todas las frecuencias."
 grand_archive.1070.a: "Abrid las comunicaciones."
 NAME_PrimalHunter: "Ceriz t'Xal"
 primal_hunter_desc: "Un hábil cazador que recorre la galaxia en busca de caza mayor."
 primal_hunter_catchphrase: "§L\"Busco otro trofeo para mi colección\".§!"
 grand_archive.1075.name: "$grand_archive.1070.name$"
 grand_archive.1075.desc: "§HLa voz del melancólico Ceriz es seca y quebradiza, como si llevara semanas sin hablar. Sus modales son directos y mantiene un contacto visual estoico de una manera que se intuye respetuosa e intimidante a partes iguales.§!\n\nComo cazador de trofeos, hace falta mucho para impresionarme. Vuestra gente lo ha hecho.\n\nEstoy dispuesto a unirme a vuestras partidas de caza sabiendo que nuestra colaboración será de conveniencia e instrucción mutua."
 grand_archive.1075.a: "¿Quién eres?"
 grand_archive.1075.a.reply: "Soy $NAME_PrimalHunter$. He cazado en estos sistemas durante muchos años. Busco nuevas presas, y vuestra gente parece ser capaz de rastrearlas.\n\nMi motivación es simple: la emoción de la caza."
 grand_archive.1075.b: "¿Qué es esa calavera que llevas en la nave?"
 grand_archive.1075.b.reply: "Era el último de su especie. Se defendió bastante bien."
 grand_archive.1075.c: "¿Cuánto tiempo llevas observándonos?"
 grand_archive.1075.c.reply: "Es evidente que vuestro pueblo tiene mucho que aprender.\n\nUn buen cazador puede rastrear a su presa durante el tiempo que sea necesario en perfecto sigilo. Para ser verdaderamente letal, uno debe permanecer oculto hasta el momento del disparo. El tiempo que he pasado en la sombra no importa, lo que cuenta es mi decisión de dejarme ver."
 grand_archive.1075.d: "¿Por qué quieres unirte a nosotros?"
 grand_archive.1075.d.reply: "No busco competencia en el terreno. Aunque me resisto a compartir territorio, prefiero trabajar junto a vuestros cazadores que luchar por la misma presa.\n\nLo que sea que rastreéis, lo mataré."
 grand_archive.1075.hire: "Reclutar"
 grand_archive.1075.hire_tt: "§Y$NAME_PrimalHunter$§! se une a nuestro imperio como §Hlíder§!."
 grand_archive.1075.dismiss: "Cesar"
 grand_archive.1080.name: "Xenóloga errante"
 grand_archive.1080.desc: "Nuestra base estelar de [from.GetName] ha recibido un mensaje de una nave de investigación independiente. Equipada con un arsenal de dispositivos de caza y herramientas analíticas, esta nave está específicamente adaptada para la captura y el examen de la vida en el espacio.\n\nEstá llamándonos en todas las frecuencias."
 grand_archive.1080.a: "Abrid las comunicaciones."
 NAME_PrimalRancher: "Ruuk Qabruuk"
 primal_rancher_desc: "Una xenóloga apasionada por el trabajo de campo que ha estudiado todo tipo de bestias espaciales."
 primal_rancher_catchphrase: "§L\"Cada criatura tiene una historia que contar, ¡y yo soy una ávida oyente!\".§!"
 grand_archive.1085.desc: "§HInquisitiva y analítica, Ruuk mira constantemente un pequeño dispositivo portátil. Incluso cuando nos saluda, parece estar tomando notas. A pesar de ello, sus modales son cordiales y profesionales, aunque ligeramente distantes.§!\n\nVeo que no soy la única interesada en las criaturas espaciales. He estudiado la investigación que [root.GetName] ha estado llevando a cabo y es sumamente esclarecedora. Nada me gustaría más que colaborar en esta labor como parte de vuestro departamento científico. Si me aceptáis, claro."
 grand_archive.1085.a: "¿Quién eres?"
 grand_archive.1085.a.reply: "Lo siento, me estoy adelantando.\n\nMe llamo Ruuk. Soy una investigadora especializada en el estudio de campo de la fauna espacial. Mi equipo y yo recopilamos datos sobre patrones migratorios, composición corporal y biodiversidad a nivel galáctico.\n\nPersonalmente, me encantan los animales desde que era una cría. Nunca voy a ningún sitio sin Fuluff."
 grand_archive.1085.b: "¿Quién es Fuluff?"
 grand_archive.1085.b.reply: "¡Mi bichito favorito de toda la galaxia!\n\nOs lo mostraría en pantalla, pero ahora está dormido. En mi planeta natal, criamos esta especie como mascota y lo adopté en mi última visita. Es adorable oír cómo patinan sus pezuñitas en el suelo metálico, cómo mordisquea mis plumas, el mechón de lana que le sobresale entre los ojitos... Estoy segura de que a vosotros también os conquistará cuando... si empezamos a trabajar juntos."
 grand_archive.1085.c: "¿Cómo nos has encontrado?"
 grand_archive.1085.c.reply: "Uno de los especímenes que estábamos rastreando mostraba un comportamiento anómalo, así que seguimos su rastro. Allí encontramos a vuestro equipo científico, que estaba estudiando a nuestro sujeto. El gran cuidado que tuvieron con la criatura demostró un verdadero respeto por la vida en el espacio, y eso me inspiró a indagar en vuestras investigaciones, que me impresionaron aún más. Siempre estoy buscando colegas con ideas afines."
 grand_archive.1085.d: "¿Por qué quieres unirte a nosotros?"
 grand_archive.1085.d.reply: "Sinceramente, la investigación científica independiente no es una fuente de ingresos constante. Yo creo en mi trabajo, pero pasar la vida buscando financiación me quita demasiado tiempo del trabajo científico.\n\nSi me uno a [root.GetName], podré dedicar todo el tiempo a hacer lo que mejor se me da: estudiar la vida en el espacio. Tendría acceso a mayores recursos y podría colaborar con vuestro equipo científico en nuestros objetivos comunes."
 grand_archive.1085.hire: "Reclutar"
 grand_archive.1085.hire_tt: "§Y$NAME_PrimalRancher$§! se une a nuestro imperio como §Hlíder§!."
 grand_archive.1085.dismiss: "Cesar"
 grand_archive.1100.name: "Chillido salvaje"
 grand_archive.1100.desc: "Hemos detectado un gran número de ondas electromagnéticas extrañas que provenían del espacio inexplorado.\n\nLos primeros análisis indican cierta semejanza con las señales de comunicación de los §Ygusanos del vacío§!, aunque estas son más irregulares y tienen mayor amplitud. Seguiremos investigando."
 grand_archive.1100.a: "Es preocupante."
 grand_archive.1105.name: "Gusanos del vacío chillones"
 grand_archive.1105.desc: "Hemos detectado el origen de esos chillidos animales: un sistema oculto poblado por §Ygusanos del vacío§! junto a [frenzied_voidworms_target.solar_system.GetName].\n\nLos gusanos del vacío de ese sistema son distintos de los que conocemos. Estos han mutado, no forman troikas y los especímenes maduros se dedican a lo que podríamos describir como un frenesí de apareamiento violento.\n\nEsto es preocupante, ya que el comportamiento no parásito significa que esta colmena puede reproducirse de forma independiente, sin necesidad de huéspedes planetarios."
 grand_archive.1105.desc_no_homicidal: "\nSi permitiéramos que esta variante de la especie se propagara sin control, podría alterar el equilibrio de todo el ecosistema galáctico. A juzgar por su agresividad creciente, creemos que estos seres están preparando un asalto a [frenzied_voidworms_target.GetName]."
 grand_archive.1105.desc_2: "\nDebemos preparar nuestras defensas."
 grand_archive.1105.a: "¡Alerta roja!"
 situation_frenzied_voidworms: "Gusanos del vacío frenéticos"
 situation_frenzied_voidworms_type: "$situation_frenzied_voidworms$"
 situation_frenzied_voidworms_desc: "Hemos descubierto una gran colmena de gusanos del vacío con mutaciones evidentes. Viven en un estado permanentemente agresivo y parecen tener la capacidad de reproducirse por medios no parasitarios.\n\nNuestra presencia puede haber agitado sus nidos. Debemos proceder con cuidado.\n\n[GetVoidwormsHostility]"
 situation_frenzied_voidworms_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_frenzied_voidworms: "Los gusanos del vacío agresivos podrían atacar nuestra capital."
 approach_frenzied_voidworms_do_nothing: "No hacer nada"
 approach_frenzied_voidworms_do_nothing_tt: "No actuaremos a este respecto."
 approach_frenzied_voidworms_hide_presence: "Ocultar nuestra presencia"
 approach_frenzied_voidworms_hide_presence_tt: "Se detienen todas las actividades de construcción próximas a su sistema natal."
 approach_frenzied_voidworms_stir_nests: "Agitar los nidos"
 approach_frenzied_voidworms_stir_nests_tt: "Provocar a estos seres aumentará su hostilidad hacia nosotros."
 approach_frenzied_voidworms_feed_nests: "Alimentar los nidos"
 approach_frenzied_voidworms_feed_nests_tt: "Si reducimos su agresividad lo suficiente, podríamos ganarnos su confianza."
