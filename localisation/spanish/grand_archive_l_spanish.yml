 #Leader Traits #
 #################
 leader_trait_buccaneer: "Bucanero"
 leader_trait_buccaneer_desc: "Este líder, maestro del saqueo en el campo de combate, es capaz de sacarle hasta el último gramo de valor a la chatarra más dañada."
 leader_trait_trailblazer: "Precursor"
 leader_trait_trailblazer_desc: "Este líder, encandilado con las promesas de la frontera galáctica, espera trazar el mapa de los confines del espacio."
 leader_trait_treasure_hoarder: "Acaparador de tesoros"
 leader_trait_treasure_hoarder_desc: "Ninguna recompensa es lo suficientemente alta para satisfacer la ambición de este líder. La acumulación de recursos valiosos es su principal motivación."
 mod_enemy_ship_destroyed_energy_add: "$r_energy$ por tamaño de nave enemiga destruida"
 mod_deposit_increase_on_survey_chance_mult: "Al completar el estudio:\n$t$Probabilidad de aumentar el tamaño del depósito de recursos"
 ##########
 #Civics #
 ##########
 civic_galactic_curators: "Cuidadores galácticos"
 civic_galactic_curators_desc: "Esta civilización siempre ha sentido debilidad por recopilar objetos históricos y conservarlos cuidadosamente. Ahora, con los misterios de la galaxia en sus puertas, encuentra mucho que estudiar."
 civic_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n -"
 civic_corporate_galactic_curators: "Anticuarios expertos"
 civic_corporate_galactic_curators_desc: "Esta sociedad sabe, mejor que ninguna, que las antigüedades y las colecciones traen dinero. Son expertos en la especulación con materiales que ahora buscan en el cielo más oportunidades de inversión."
 civic_corporate_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$\n- La £building£ §Y$building_public_relations_office$§! $megacorp_civic_branch_office_building_effect$"
 civic_hive_galactic_curators: "Red de cuidadores"
 civic_hive_galactic_curators_desc: "Este colectivo ha desarrollado una compulsión abrumadora por obtener, conservar y mantener. Este comportamiento, al que deben su supervivencia, los empuja a exhibir las muestras obtenidas con gran boato."
 civic_hive_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_machine_galactic_curators: "Red de cuidadores"
 civic_machine_galactic_curators_desc: "El código fuente de esta inteligencia mecánica especifica una directiva principal: recolectar y preservar."
 civic_machine_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_galactic_curators_effects_common: "- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_galactic_archivism', £society_research£$tech_galactic_archivism$]\n- ['concept_specimen', Especímenes] de inicio: 1 §0$common$§! de cada categoría de colección \n- Adquieres $r_unity$ cada vez que encuentras un §Yespécimen§! o completas un §Y$ARCHAEOLOGICAL_SITE$§! \n- Compras en el §Yenclave de Cuidadores§!: §G$@galactic_curators_curator_enclave_purchase_cost|%0$§!\n- Habilita el edicto §Y$edict_decentralized_research$§!, que aumenta el rendimiento del §Ypuesto de investigación§!, a costa del rendimiento en el trabajo de £job_researcher£ §Y[GetResearcher]§!"
 edict_decentralized_research: "Investigación descentralizada"
 edict_decentralized_research_desc: "El conocimiento más hondo se halla más allá de los confines de nuestra civilización. Al poner la vista en la inmensidad de la galaxia en conjunto, podemos llegar a un entendimiento más íntegro de nosotros mismos."
 MOD_COUNTRY_SPECIMEN_ACQUIRE_CHANCE_MULT: "Mayor probabilidad de descubrir especímenes"
 councilor_galactic_curators: "Cuidador supremo"
 councilor_galactic_curators_desc: "La tarea del $TITLE$ consiste en velar por la calidad de preservación de todos los especímenes."
 councilor_corporate_galactic_curators: "Oficial de cuidados"
 councilor_corporate_galactic_curators_desc: "El $TITLE$ se ocupa de administrar la exposición y venta de especímenes."
 civic_beastmasters: "Maestros de bestias"
 civic_beastmasters_desc: "En el proceso de alcanzar la plenitud tecnológica en un sistema del que se nutren las amebas espaciales, el conocimiento de su ciclo vital que ha adquirido esta sociedad es inconmensurable. Sus individuos se esmeran en criar, mantener y clonar a estas criaturas para su beneficio mutuo."
 civic_machine_beastmasters: "Biodrones"
 civic_machine_beastmasters_desc: "Gracias al contacto directo con organismos biológicos del vacío en su sistema natal, esta inteligencia mecánica ha integrado a estas poderosas criaturas en su funcionamiento troncal. El resultado: una relación de beneficio mutuo."
 civic_hive_beastmasters: "Enjambre salvaje"
 civic_hive_beastmasters_desc: "Esta mente colmena, una colonia altamente adaptable, ha evolucionado hacia una relación simbiótica con los organismos biológicos del vacío que se encuentran en su sistema natal. Aun siendo mentes separadas, trabajan juntas para lograr objetivos comunes."
 civic_wilderness_beastmasters: "$civic_hive_beastmasters$"
 civic_wilderness_beastmasters_desc: "Esta natura ha optado por entrar en simbiosis con fauna espacial de su sistema natal. Si bien su integración con la inteligencia mutualista no es plena aún, estos organismos cooperan para lograr objetivos comunes."
 civic_corporate_beastmasters: "Rancheros espaciales"
 civic_corporate_beastmasters_desc: "Esta megacorporación, originalmente un gremio de élite de criadores de animales, ha desarrollado la tecnología para criar y cuidar a las criaturas del vacío en su sistema natal."
