 FEDERATION_CREATURE_FLEET_DESC: "Las §Hflotas de la federación§! son flotas especiales controladas por el presidente de la federación. Están diseñadas en el §H$CREATURE_DESIGNER$ de la federación§! y pueden aprovechar cualquier tecnología disponible para los miembros de la federación. Las flotas de la federación no tienen coste de mantenimiento, pero no pueden exceder la §Hcapacidad naval de la federación§!, a la que cada miembro aporta un §Y$PERC|0%$§! de su propia §Hcapacidad naval§!. Si las flotas de la fauna espacial crecen hasta superar la §Hcapacidad naval de la federación§!, se entregarán criaturas adicionales al presidente de la federación."
