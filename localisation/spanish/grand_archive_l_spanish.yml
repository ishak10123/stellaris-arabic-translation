 #Events
 grand_archive.8000.name: "Cápsula ancestral"
 grand_archive.8000.desc: "Hemos dado un gran salto adelante en lo que respecta a la cápsula ancestral que orbitaba en torno a [this.GetHomeWorldName]. Gracias al esfuerzo infatigable de nuestros [this.GetScientistPlural], ahora poseemos la capacidad de desencriptar el último estrato de seguridad digital y descifrar la carta estelar que tanto nos intriga."
 grand_archive.8000.a: "¿Qué contendrá?"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT: "Análisis de cápsula ancestral"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT_DESC: "El primer análisis de la carta que contenía la cápsula orbital nos ha revelado la ubicación de diversos cuerpos celestes que no están presentes en nuestro sistema natal. Tardaremos en extraer las coordenadas exactas."
 grand_archive.8005.name: "Cápsula ancestral analizada"
 grand_archive.8005.desc: "¡La carta no está completa!\n\nLa cápsula orbital tan solo contenía un fragmento de los datos, y cada vacío en la información es una pieza del rompecabezas que aún no tenemos. No obstante, hemos logrado inferir del material disponible las coordenadas de un sistema estelar que no conocíamos, aunque desconocemos por completo qué nos aguardará allí.\n\nEn la carta se indican también diversos puntos de entrada que nos facilitarán el viaje a dicho destino mediante hipervías."
 grand_archive.8005.a.lom: "¡Manos a la obra!"
 grand_archive.8015.name: "La carta celeste"
 grand_archive.8015.desc.common: "Ya están dispuestas nuestras naves para emprender la nueva gran aventura de nuestra civilización."
 grand_archive.8015.desc.default: "Reina la euforia entre la población de [this.GetHomeWorldName], exultante al saber descifrada la carta estelar, que ya recibe el apelativo común de \"§Y$celestial_chart$§!\", aunque por ahora ha dado más interrogantes que respuestas. ¿De dónde ha salido? ¿Quién la creó y con qué fin? Y, lo más importante tal vez: ¿nos llevará a una trampa?\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.desc.gestalt: "El descubrimiento de la carta dentro de la cápsula ha despertado el interés de nuestra sociedad. Ahora que sabemos que no es más que una pieza de un gran rompecabezas, no podemos sino preguntarnos adónde nos llevará y qué encontraremos. Una cosa está clara, y es que no cejaremos en nuestro empeño de completar esta \"§Y$celestial_chart$§!\".\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.a.default: "¡Que comience la aventura!"
 grand_archive.8015.a.lom: "¡Que zarpen las naves!"
 grand_archive.8020.name: "Un encuentro inesperado"
 grand_archive.8020.desc: "Nos hemos topado con una flota fuertemente armada y con una bandera desconocida. Sus naves parecen organizadas de conformidad con cierta formación, pero su diseño no es uniforme. Muchas están dotadas de lanzadores cinéticos acoplados a gruesos filamentos que en sus extremos tienen garfios y arpones de carbono. Además, en el seno de la flota se cobija un grupo de cargueros blindados. Tan solo podemos suponer que estas naves están controladas por un grupo de piratas o mercenarios.\n\nNos llega una transmisión de su nave insignia."
 grand_archive.8020.a.lom: "Pues hablemos..."
 grand_archive.8025.name: "$NAME_CaptainHoo$ de la $NAME_BlackNeedle$"
 grand_archive.8025.desc: "§HDe porte elegante y altivo, este capitán forajido finge cierta apatía. A lo largo de la conversación, evita que nuestras miradas se crucen, como si no fuéramos dignos de su atención. Gesticula con sus plumas de forma ostentosa, casi cómica, aun sin pretenderlo.§!\n\nOs habéis topado con la §Y$NAME_BlackNeedle$§!; ¡craso error por vuestra parte!\n\nNos llegaron rumores de que vuestra nimia sociedad en ciernes exploraría este sistema; es evidente que habéis encontrado una carta que nos pertenece, y eso es irrefutable. Entregádnosla, o tendremos que recurrir a la violencia."
 grand_archive.8025.a: "¿Quiénes sois?"
 grand_archive.8025.a.reply: "¿Que quién soy? Mi nombre es Glimarhoo Zelmendrion, pero me podéis llamar §Y$NAME_CaptainHoo$§!, capitán de la Alaplata y segundo oficial de a bordo de los ilustres piratas de la §Y$NAME_BlackNeedle$§!. Llevamos milenios metiendo el pico en toda clase de tejemanejes ilícitos, y yo no soy más que una hebra del majestuoso tapiz de nuestro legado.\n\nHaríais bien en recordar mi nombre, ya que espero una recompensa significativa por presentar esta carta a nuestro incomparable líder."
 grand_archive.8025.b: "¿Qué sabéis de la carta?"
 grand_archive.8025.b.reply: "Un informador de gran talento y precio astronómico nos reveló que habéis encontrado una cápsula muy peculiar... Una cápsula que, por lo que sabemos, contenía indicaciones para encontrar un sistema recóndito de gran interés para nuestra organización.\n\nNosotros también poseemos una pieza de esa misma carta, pero carece de utilidad sin los datos de vuestra cápsula. No alcanzo a imaginar siquiera por qué la §Y$NAME_CaptainNess$§! decidió entregaros la clave de su legado, pero ya nos encargamos nosotros de libraros de tan pesada carga."
 grand_archive.8025.c: "¿Cómo es que codiciáis tanto esta carta?"
 grand_archive.8025.c.reply: "¿Tan cortos de miras sois? [this.GetCaptainHooSnarkyInsult] Tendré que explicarlo con plumas y señales.\n\nUna carta es un artefacto que procura directrices de navegación y acceso a un destino específico. Nosotros deseamos visitar dicho destino y hacernos con el tesoro de la §Y$NAME_CaptainNess$§!, perdido hace eones."
 grand_archive.8025.d: "¿Quién es esa tal $NAME_CaptainNess$?"
 grand_archive.8025.d.reply: "Os imaginaba mejor informados. Es la creadora de esta carta. Era una negligente de cuidado, así que tal vez empatizó con la ignorancia de vuestra especie.\n\nEn todo caso, no es asunto vuestro. Entregad la información, y del resto ya nos encargamos nosotros."
 grand_archive.8025.e: "La carta es nuestra, y nos la quedamos."
 grand_archive.8025.e.reply: "Ya lo suponía. Preparaos, pues es vuestro fin.\n\n¡Ataque a discreción!"
 grand_archive.8025.f.lom: "¡Ven a por ella si te atreves, lamechatarra!"
 CAPTAIN_HOO_INSULT_MACHINE: "Pensé que una inteligencia mecánica sería inteligente, pero parece que no es así."
 CAPTAIN_HOO_INSULT_HIVE: "Yo creía que muchas mentes juntas pensaban mejor, pero vuestra inteligencia colectiva os ha servido de muy poco."
 CAPTAIN_HOO_INSULT_HUM: "Habéis desarrollado el viaje interestelar, engendros de gruesa osamenta y fina piel, pero veo que el sentido común os supone todavía un enigma."
 CAPTAIN_HOO_INSULT_MAM: "Las bestias como vosotros carecéis del intelecto y la sofisticación de nuestro gran líder."
 CAPTAIN_HOO_INSULT_REP: "Ahora bien, no esperaría yo que unos ineptos simplones como vosotros entendierais conceptos tan sencillos."
 CAPTAIN_HOO_INSULT_AVI: "Puede que vuestros antepasados recibieran demasiados picotazos en el cráneo."
 CAPTAIN_HOO_INSULT_ART: "No me sorprendería que la capacidad de pensamiento crítico no penetrara en el denso exoesqueleto de vuestra especie."
 CAPTAIN_HOO_INSULT_MOL: "Contrastado está que los moluscoides carecen de un cerebro per se, y vuestra especie lo pone de manifiesto."
 CAPTAIN_HOO_INSULT_FUN: "Unas cuantas esporas menos, y no se os distinguiría de las setas."
 CAPTAIN_HOO_INSULT_PLANT: "Cada vez resulta más obvia la razón por la que las plantas no han desarrollado inteligencia en casi ningún mundo."
 CAPTAIN_HOO_INSULT_LITHOID: "Vuestra especie es más tonta que una piedra."
 CAPTAIN_HOO_INSULT_NECROID: "Seguramente seáis los cascarones de una especie otrora inteligente."
 CAPTAIN_HOO_INSULT_AQUATIC: "Es evidente que sois como peces fuera del agua."
 CAPTAIN_HOO_INSULT_TOX: "Quizás una existencia sumergida en la inmundicia haya enturbiado vuestra mente."
 CAPTAIN_HOO_INSULT_ROBOT: "Quizás vuestros módulos de individualidad consuman la mayor parte de vuestra capacidad de procesamiento."
 CAPTAIN_HOO_INSULT_DEFAULT: "Tal vez vuestra especie atraviese problemas intelectuales tan graves como vuestra desfiguración."
 grand_archive.8045.name: "$grand_archive.8025.name$"
 grand_archive.8045.desc: "Habéis osado burlaros de la §Y$NAME_BlackNeedle$§! y de mí, ¡y de ninguna manera vamos a consentirlo!\n\nNo olvidaremos vuestra escasa disposición a cooperar. La $NAME_BlackNeedle$ irá a por vosotros con todo. Vuestra enclenque civilización no sobrevivirá a nuestra ira.\n\n¡No cesaremos hasta hacernos con esa carta! Y, ahora, ¡que paséis un buen día!"
 grand_archive.8045.a.lom: "La próxima vez, ¡menos hablar y más luchar!"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT: "Un planeta dividido en ocho"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT_DESC: "La §H$celestial_chart$§! nos ha llevado a un mundo hecho añicos. Hemos detectado un túnel antinatural que se excavó hasta la última capa de corteza planetaria. Confiamos en que el siguiente fragmento de la carta se oculte en su interior, aunque para llegar hasta ella tengamos que excavar con cuidado.\n\nUna nave de construcción podría construir el equipamiento necesario para extraer el fragmento."
 grand_archive.8055.name: "Éxito en la excavación"
 grand_archive.8055.desc: "Hemos extraído con éxito una cápsula de los detritos planetarios a la deriva, así como un cargamento de minerales. Al abrirla, descubrimos un nuevo fragmento de la §Y$celestial_chart$§! y una selección de artefactos culturales únicos. Además, hallamos una nota en su interior escrita en varios idiomas para facilitar su traducción.\n\n\"Esto es todo lo que queda de $NAME_Soropegma$, el mundo natal de los ytterite, una especie pre-UL que se extinguió como resultado de un trágico accidente. Ajenos a las consecuencias, activamos por error el poder destructivo de un Coloso robado. Rogamos que preserven y respeten su memoria\"."
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT: "Descifrar el fragmento de carta"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT_DESC: "Después de excavar la cápsula de los restos del planeta fragmentado, necesitamos descifrar los datos de navegación que contiene. Para este proceso, es necesario cotejar nuestra base de datos cartográficos y trazar los cuerpos celestes marcados en los sistemas conocidos."
 grand_archive.8060.name: "Carta descifrada"
 grand_archive.8060.desc: "Tras descodificar varias capas, los nuevos datos se han añadido sin problema a la §Y$celestial_chart$§!. Al combinar los fragmentos, se ha revelado otro sistema más; el siguiente destino de nuestro viaje. Deberíamos extremar las precauciones al aproximarnos a esta región inexplorada del espacio."
 grand_archive.8075.name: "Un Gran Archivo"
 grand_archive.8075.desc: "Tras la adquisición del §Y[This.GetLastAcquiredSpecimenName]§!, nuestros científicos opinan que deberíamos exhibirlo al público en un §Y$grand_archive$§!. Esta estructura albergaría nuestra futura colección de artefactos extraños, la cual aportaría grandes beneficios científicos y culturales. Una inversión preliminar pondría en marcha la investigación de las técnicas y tecnologías necesarias para preservar y exhibir los diversos y delicados especímenes de la galaxia.\n\nPor si fuera poco, hemos encontrado un plano junto al artefacto ytterite que contiene el avanzado diseño de una vitrina con una innovadora tecnología de monitorización atmosférica. Si desarrollamos esta idea, mejoraríamos aún más la preservación del archivo en general."
 grand_archive.8076.name: "El espécimen ytterite"
 grand_archive.8076.desc: "El último vestigio de la civilización ytterite merece su propia exposición.\n\nPor suerte, hemos encontrado un plano junto al artefacto ytterite que contiene el avanzado diseño de una vitrina con una innovadora tecnología de monitorización atmosférica. Si desarrollamos esta idea, mejoraríamos aún más la preservación del archivo en general."
 grand_archive.8076.a: "Es una gran oportunidad."
 TREASURE_HUNTERS_EXHIBITION_PROJECT: "Plano de mejora de exposición"
 TREASURE_HUNTERS_EXHIBITION_PROJECT_DESC: "Además del espécimen ytterite, hemos descubierto el avanzado diseño de una compleja vitrina que nos ayudaría a preservarlo.\n\nInvestigar las técnicas de este plano contribuirá a las futuras tareas de conservación y exposición."
 TREASURE_HUNTERS_EXHIBITION_PROJECT_TOOLTIP: "Usa una §Ynave de construcción§! para crear un §YGran Archivo§! en torno a un planeta con 2500 £pop£ §Hpoblaciones§! o más.\nRequiere: §H£society_research£$tech_galactic_archivism$§!."
 grand_archive.8080.name: "Mejora de exposición"
 grand_archive.8080.desc: "Tras un cuidadoso análisis del plano ytterite, hemos construido una unidad de contención avanzada con una monitorización atmosférica precisa hasta el átomo. Esto permite a los cuidadores regular las condiciones atmosféricas del delicado espécimen ytterite con un alto grado de detalle, además de detectar cualquier posible signo de deterioro. Permanecerá como ha sido siempre, por siempre jamás.\n\nPodemos aplicar estas técnicas para seguir mejorando las condiciones de almacenamiento de cada artículo de nuestra colección."
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE: "Construir el Gran Archivo"
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE_DESC: "Mientras explorábamos el cosmos, hemos recopilado un sinfín de artefactos y rarezas culturales. Estos especímenes inspirarán a la población y harán de nuestra exposición la primera en mostrar y conservar todos los campos del conocimiento galáctico.\n\nLa construcción de un §H$grand_archive$§! serviría a este propósito."
 grand_archive.8090.name: "Inauguración del Gran Archivo"
 grand_archive.8090.desc: "La inauguración del §Y$grand_archive$§! en [fromfrom.GetName] es un gran día para los [this.GetName]. Esta exposición de tesoros provenientes de toda la galaxia incentiva la exploración y nos conmina a aprender del pasado."
 d_black_needle_base: "Base oculta de la Aguja Negra"
 d_black_needle_base_desc: "Una base oculta que los piratas de la Aguja Negra usaban para realizar operaciones ilegales y almacenar mercancía robada."
 d_abandoned_black_needle_base: "Base abandonada de la Aguja Negra"
 d_abandoned_black_needle_base_desc: "Los piratas de la Aguja Negra usaban esta base como puesto avanzado y refugio para criminales fugados y mercancías robadas."
 d_abandoned_black_needle_base_naval_cap: "Capacidad naval por trabajos de soldado: §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 d_abandoned_black_needle_base_naval_cap_short: "£mod_country_naval_cap_add£ por trabajos de £job_soldier£: §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 black_needle_base_system_poi: "Seguir la carta celeste"
 black_needle_base_system_poi_desc: "La §H$celestial_chart$§! ha revelado un sistema oculto, [Prev.GetName]. Debemos poner rumbo a él y descubrir qué nos aguarda allí."
 grand_archive.8100.name: "Guarida de piratas descubierta"
 grand_archive.8100.desc: "Hemos encontrado una base subterránea oculta en [From.GetName] con el emblema de la §YAguja Negra§!. Creemos que se trata de una base externa del grupo pirata, aislada de sus otras operaciones. El siguiente fragmento de la §Y$celestial_chart$§! debe de estar aquí, junto a otras riquezas y baratijas.\n\nPodríamos ir a lo fácil e iniciar un bombardeo orbital contra la base, pero concederíamos a la Aguja Negra el tiempo necesario para pedir refuerzos. Otra opción sería el veloz despliegue de tropas terrestres para incautar la base con rapidez y que al enemigo apenas le dé tiempo a reaccionar.\n\nUn enfoque más discreto sería hackear los sistemas informáticos de la base y orquestar un osado golpe para asegurar el fragmento de la $celestial_chart$."
 grand_archive.8100.a: "Hay mucho que pensar."
 COLONIZATION_IMPOSSIBLE_DEFENDED_PLANET: "$TRIGGER_FAIL$§REste planeta está fuertemente protegido y no se puede colonizar.§!"
 BLACK_NEEDLE_BASE_BOMBARD: "Bombardear la base de la Aguja Negra"
 BLACK_NEEDLE_BASE_BOMBARD_DESC: "La base subterránea de [This.GetName] resiste muy bien los bombardeos orbitales, aunque con el tiempo y la potencia de fuego suficientes, es posible destruirla usando solo nuestra flota. Una vez la base haya sido neutralizada, podremos investigar las ruinas para recuperar el fragmento de la §H$celestial_chart$§! y demás artefactos de valor.\n\nLos asesores tácticos advierten que este enfoque puede darle a la Aguja Negra tiempo suficiente para pedir refuerzos."
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED: "$BLACK_NEEDLE_BASE_BOMBARD$"
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED_DESC: "$BLACK_NEEDLE_BASE_BOMBARD_DESC$"
 grand_archive.8103.name: "Contraataque de la Aguja Negra"
 grand_archive.8103.desc: "Como era de esperar, la Aguja Negra ha enviado una flota para proteger su base de [FromFrom.GetName].\n\nVamos a tener que enfrentarnos a estas naves si queremos hacernos con [FromFrom.System.GetName]."
 grand_archive.8105.name: "Ruinas y ceniza"
 grand_archive.8105.desc: "Hemos asaltado la base pirata con munición orbital, y por fin ha sido reducida a cenizas junto con sus anteriores habitantes. Al neutralizar todas las amenazas, ya podemos enviar a un científico a explorar lo que queda de la base y extraer el siguiente fragmento de la §Y$celestial_chart$§!."
 grand_archive.8105.a.custom_tooltip: "Base de la Aguja Negra destruida. Ya se puede explorar §Y[FromFrom.GetName]§!."
 grand_archive.8105.a.lom: "¡A saquear se ha dicho!"
 project_type_research: "$RESEARCH$"
 project_type_bombardment: "Bombarda"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES: "Asaltar la base de la Aguja Negra"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES_DESC: "La base subterránea de [FromFrom.GetName] está protegida por un enorme destacamento de tropas y drones de seguridad. Si desplegamos a los ejércitos en la superficie del planeta, podríamos apoderarnos de la base con rapidez para que a la §YAguja Negra§! apenas le dé tiempo a reaccionar.\n\nCuando hayamos asegurado la base, podremos extraer la cápsula de la carta, junto con la mercancía ilícita que los piratas hayan amasado."
 grand_archive.8110.name: "Defensas inutilizadas"
 grand_archive.8110.desc: "Nuestras fuerzas terrestres han tomado la base de la §YAguja Negra§! y están asegurando el edificio y los recursos circundantes. Tras neutralizar todas las amenazas, podemos enviar a un científico para que extraiga el siguiente fragmento de la §Y$celestial_chart$§!."
 grand_archive.8110.a.custom_tooltip: "Tropas terrestres de la Aguja Negra neutralizadas. §Y[FromFromFrom.GetName]§! ya se puede explorar."
 grand_archive.8110.a.lom: "Hora de repartir las ganancias."
 BLACK_NEEDLE_BASE_HACK: "Pirateando a los piratas"
 BLACK_NEEDLE_BASE_HACK_DESC: "La dependencia excesiva de los piratas de tecnología robada y reutilizada ha dejado su base vulnerable a la infiltración. Con una sola nave de investigación, podríamos hackear la red de [FromFrom.GetName] desde la órbita para que se haga pasar por un transporte de la §YAguja Negra§! bajo el mando del capitán Hoo. Así, los convenceremos para que transfieran la custodia de la cápsula con el mapa sin derramar sangre."
 grand_archive.8115.name: "Éxito en la operación"
 grand_archive.8115.desc.1: "Tras meses de preparación, [Leader.GetName] ha conseguido infiltrarse en la red de comunicaciones y se ha hecho pasar por una nave de la §YAguja Negra§!. Gracias a unas órdenes falsificadas del capitán Hoo, ha engañado a los operadores de la base para que preparen la cápsula para una transferencia espacial de emergencia."
 grand_archive.8115.desc.slippery: "[Leader.GetName] ha aterrizado su nave en un lugar perfecto por si descubren su tapadera y tiene que huir con presteza."
 grand_archive.8115.desc.charismatic: "Gracias a su carisma y encanto, [Leader.GetName] ha podido sortear las preguntas más capciosas."
 grand_archive.8115.desc.psionic_organic: "Con un sencillo y raudo movimiento de [Leader.Species.GetHandName], [Leader.GetName] ha manipulado la mente de los guardias para no levantar sospechas."
 grand_archive.8115.desc.psionic_machine: "A través de la coacción psiónica, [Leader.GetName] fue capaz de manipular las mentes inferiores de los guardias para evitar más sospechas."
 grand_archive.8115.desc.2: "Hemos asegurado la cápsula sin sufrir bajas. Los piratas todavía no se han percatado del engaño."
 grand_archive.8115.a: "$EXCELLENT$"
 grand_archive.8120.name: "Con las manos en la masa"
 grand_archive.8120.desc: "Lamentablemente, uno de los guardias descubrió nuestro plan mientras cargábamos la cápsula en la nave. Tras un breve tiroteo, nos vimos obligados a huir con el preciado cargamento a remolque. Hemos logrado extraer la cápsula, pero [Leader.GetName] murió en el fuego cruzado."
 grand_archive.8120.a: "$TERRIBLE$"
 grand_archive.8125.name: "Base pirata abandonada"
 grand_archive.8125.common: "Cuando expusimos sus puntos débiles, los piratas decidieron evacuar su base en [FromFromFromFrom.GetName] y llevarse los artefactos de valor almacenados allí. Ahora que esta luna habitable está desocupada, podemos colonizarla."
 grand_archive.8125.desc.alive: "La §YAguja Negra§! ha acabado dándose cuenta del engaño al descubrir los agujeros en su red de seguridad cerrada.\n\n$grand_archive.8125.common$"
 grand_archive.8125.desc.dead: "Nada más escapar de la fortaleza de la §YAguja Negra§!, descubrieron nuestra operación de infiltración en toda su magnitud.\n\n$grand_archive.8125.common$"
 grand_archive.8125.a: "Una decisión lógica."
 grand_archive.8125.a.custom_tooltip: "Los ejércitos de §Y[FromFromFromFrom.GetName]§! han abandonado el planeta. Ya se puede colonizar."
 grand_archive.8130.name: "Saqueo de la base de la Aguja Negra"
 grand_archive.8130.desc.common: "La sala segura contenía una amplia variedad de artefactos valiosos, así como abalorios sentimentales ligados a la historia de la banda de piratas. Hemos encontrado la cápsula de la carta entre obras robadas, joyas personalizadas y carteras digitales encriptadas.\n\nSospechamos que buena parte de la mercancía descubierta es difícil de vender. Las obras son reconocibles, las joyas pueden fundirse, y las transacciones con carteras digitales son bastante rastreables. Los anteriores dueños de estos artículos podrían llevar muertos una temporada, mientras que otros seguirían buscando sus posesiones robadas."
 grand_archive.8130.desc.bombarded: "Mientras explorábamos las ruinas de la base de la §YAguja Negra§!, encontramos una cámara subterránea. Al abrirla, hallamos un pequeño tesoro con sus ilícitas expropiaciones.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.desc.landed: "Al explorar la maltrecha base de la §YAguja Negra§!, hallamos un plano de la instalación que reveló la existencia de una cámara subterránea. Después de bajar al subsuelo con el ascensor de servicio, introdujimos el código de acceso para revelar un pequeño tesoro con sus ilícitas expropiaciones.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.a: "Intentemos repatriar los artefactos robados."
 grand_archive.8130.b: "Vendámoslo todo."
 grand_archive.8130.c.default: "Quedémonos con los artefactos robados."
 grand_archive.8130.c.lom: "Quien lo encuentra se lo queda."
 black_needle_base_sold_stolen_items: "Se han vendido los artefactos robados de la Aguja Negra"
 opinion_black_needle_base_repatriate_stolen_items: "Se han repatriado los artefactos robados"
 opinion_black_needle_base_repatriate_stolen_items_tt: "§G+$@opinion_black_needle_base_repatriate_stolen_items_value|0$§! £opinion£ de opinión con todos los imperios no homicidas con los que no estamos en guerra."
 DECODE_THIRD_MAP_PIECE: "Descodificar el fragmento de carta"
 DECODE_THIRD_MAP_PIECE_DESC: "Después de extraer la cápsula de la base de la §YAguja Negra§!, nos han pedido que descifremos los datos que contiene e integremos la nueva información en la §H$celestial_chart$§!."
 grand_archive.8135.name: "Carta descifrada"
 grand_archive.8135.desc: "Hemos superado las capas de codificación digital e integrado nueva información en la §Y$celestial_chart$§!, que ha revelado otro destino que explorar. La carta ya está casi completa. Creemos que solo falta una pieza del rompecabezas, y tenemos la comedida esperanza de que el fin de nuestra empresa está cerca.\n\nMientras se decodificaban los datos de navegación, el exterior impecable de la cápsula se consideró digno de análisis. Nos sorprendió la resistencia y durabilidad del contenedor; la capacidad de replicar este material podría brindar muchas oportunidades para futuras investigaciones."
 grand_archive.8135.a: "$GOOD$"
 d_hive_dwelling: "Morada de mente colmena"
 d_hive_dwelling_desc: "Un aislado asentamiento ocupado por el colectivo Smeegibb, que está formado por antiguos camaradas de la capitana Ness."
 d_ruined_hive_dwelling: "Morada de mente colmena en ruinas"
 d_ruined_hive_dwelling_desc: "Un devastado asentamiento del colectivo Smeegibb, que está formado por antiguos camaradas de la capitana Ness."
 COLONIZATION_IMPOSSIBLE_SMEEGIBB_PLANET: "§REste planeta pertenece a $NAME_Smeegibb$.§!"
 grand_archive.8200.name: "Asentamiento oculto"
 grand_archive.8200.desc.common_1: "Hemos encontrado un pequeño asentamiento en [FROM.GetName] con una población inferior al millar de moluscoides sintientes. El análisis biológico preliminar de la especie muestra una capacidad de comunicación en efapsis subespacial, lo que indica la existencia de una mente colmena. Aparte de este remoto campamento, el planeta no está poblado por más vida sintiente."
 grand_archive.8200.desc.common_2: "Seguimos sin conocer la razón por la que la §Y$celestial_chart$§! nos ha traído aquí. Hay que seguir investigando."
 grand_archive.8200.desc: "$grand_archive.8200.desc.common_1$\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8200.desc.alt: "$grand_archive.8200.desc.common_1$\n\nQuizás esta especie tenga más información sobre la \"§Y$NAME_CaptainNess$§!\" de la que tanto hemos oído hablar.\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8205.desc.common_1: "§HHemos encontrado un nodo de la mente colmena en el sistema oculto de [FROM.GetName]. $NAME_Smeegibb$ parece inquietarse. Tiene la manía de agachar la cabeza cuando le hablamos, como si se hubiera habituado al servilismo.§!"
 grand_archive.8205.desc.common_2: "Nuestro nombre es $NAME_Smeegibb$. Nos intriga saber cómo nos habéis encontrado. Este sistema lleva miles de años oculto a ojos de la galaxia.\n\nSolo §Yla capitana§! conoce este lugar. ¿Qué es lo que buscáis?"
 grand_archive.8205.desc.default: "$grand_archive.8205.desc.common_1$\n\n¡Smarak! Hace un periodo duplongitudinal que no hablamos con unimentes.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.desc.gestalt: "$grand_archive.8205.desc.common_1$\n\n¡Smarak! Hace un periodo duplongitudinal que no hablamos con otra mente grupal.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.a: "¿Qué es este lugar?"
 grand_archive.8205.a.reply: "¡Smarak! Este planeta es nuestro hogar. Vivimos a salvo, lejos de una galaxia violenta. Antes, nos unimos a la violencia. Matar, el crimen, la piratería... Lo hacemos todo. Ya no más. Cuidamos nuestras hidropónicas.\n\nAntes de eso, somos refugiados. Nadie nos acoge, hasta que llega §Yla capitana§!. Ella nos salva de un mal destino y nos permite unirnos a su tripulación. La capitana nos da un nuevo nombre y a cambio cuidamos de la nave.\n\nHacemos limpieza, cocina, municiones, hidropónicas y carga. Trabajamos. Luego nos unimos al grupo de abordaje. Proteger a la capitana cuando roba tesoros o hace secuestros. Nunca traicionamos a la capitana. Siempre somos leales."
 grand_archive.8205.b: "¿Qué sabes de la §Y$celestial_chart$§!?"
 grand_archive.8205.b.reply: "¡Smarak! No conocemos ninguna carta, solo permanecemos en nuestro hogar. Si §Yla capitana§! hace una carta para traeros aquí, debe haber una razón... Quiere ayudarnos o hacernos daño. Nunca estamos seguros. La capitana puede ser traicionera.\n\nElla nos manda un mensaje en un momento. La capitana nos envía una estatua gigante de su dron favorito, el $NAME_Smeegibb$ que ella recuerda y guarda de antes. Es impresionante, pero no sabemos por qué lo envía. Tal vez quiere disculparse, pero no da ninguna nota."
 grand_archive.8205.c: "Háblanos más sobre §Yla capitana§!."
 grand_archive.8205.c.reply: "¡Smarak! Antes, §Yla capitana§! nos salva. Antes es nuestra mentora y líder. Ella nos enseña a cuidar de la nave. Ella dice \"$NAME_Smeegibb$, trabaja como intendente, mecánico y obrero. Eres de gran valor\".\n\nLa capitana vive según dos credos: \"La riqueza es independencia\" y \"La vida existe para dejar un legado\". Juntos cazamos a pobres y ricos. Tomamos lo que queremos de la galaxia violenta.\n\nPero entonces la capitana es dos veces codiciosa y dos veces temeraria. Sacrifica a compañeros de tripulación o los traiciona por recompensas. La capitana pierde a todos menos a $NAME_Smeegibb$. Siempre somos leales.\n\nNos muestra lo violenta que es la galaxia. Ahora preferimos mantenernos alejados."
 grand_archive.8205.d: "¿Por qué nos ha traído aquí nuestra carta?"
 grand_archive.8205.d.reply: "¡Smarak! No estamos seguros de por qué §Yla capitana§! os trae aquí. No nos dice nada.\n\nHay una idea. Hay un lugar donde juntos §Yla capitana§! y nosotros nos escondemos de los cazarrecompensas. Un lugar seguro. Tal vez encontréis algo allí."
 grand_archive.8210.name: "Refugio descubierto"
 grand_archive.8210.desc: "El ser que encontramos en [from.GetName], $NAME_Smeegibb$, nos ha revelado las coordenadas de un refugio abandonado anteriormente ocupado por él y por §Y$NAME_CaptainNess$§!. Investigar esta ubicación puede llevarnos al siguiente fragmento de la §Y$celestial_chart$§!, o al menos a una pista que nos oriente en la dirección correcta."
 grand_archive.8210.a: "Empecemos a cavar."
 smeegibb_digsite_poi: "Explorar refugio"
 smeegibb_digsite_poi_desc: "Este yacimiento arqueológico puede contener la clave de la siguiente pieza de la §H$celestial_chart$§!. Debemos investigar el refugio abandonado si queremos proseguir nuestra búsqueda del $TREASURE_TROVE$ de §H$NAME_CaptainNess$§!."
 NAME_Bemat_cruiser_inax_01: "Hebehr"
 #Treasure Hunters Origin - Smeegibb
 smeegibb_digsite: "Refugio abandonado"
 smeegibb_digsite_desc: "En los gélidos páramos de [fromfrom.planet.GetName], hemos detectado un pequeño refugio prefabricado equipado con dispositivos de soporte vital inactivos y habitáculos. Están muy erosionados y parcialmente enterrados tras milenios de tormentas de hielo."
 grand_archive.8220.name: "Diario de la capitana"
 grand_archive.8220.desc: "La estructura excavada mostraba indicios de largos periodos de uso. En su día estuvo bien provista de servicios básicos. Se han descubierto baratijas y curiosidades esparcidas por todo el edificio. Entre un montón de papeles desordenados, recuperamos una entrada del diario escrito por la propia §Y$NAME_CaptainNess$§!.\n\n§LHemos abordado y secuestrado otro transporte del tesoro perikano, pero esta vez estaban listos para recibirnos. Hemos sufrido más pérdidas de las que me gustaría, pero nos hemos enfrentado a cosas peores. Pago decente, pero la Joya de Tapico se nos sigue escapando. Desafortunadamente, ahora los perikanos han aumentado su recompensa de nuevo y la Federación se ha involucrado. Las cosas están un poco tensas. Puede que necesitemos pasar desapercibidos por un tiempo.§!"
 grand_archive.8220.a: "Seguid buscando."
 grand_archive.8225.name: "Matar el tiempo"
 grand_archive.8225.desc: "Al excavar bajo la estructura descubrimos un pequeño alijo de objetos de valor y sistemas sanitarios básicos. Desgraciadamente, después de rastrear la zona al completo, no pudimos encontrar ningún indicio del fragmento de la §Y$celestial_chart$§!.\n\nHemos recopilado más cuadernos y papeles con la esperanza de descubrir una pista entre las dispersas entradas del diario de la §Y$NAME_CaptainNess$§!.\n\n§LEl tiempo pasa menos despacio con un compañero como $NAME_Smeegibb$, pero ¿merece la pena repartirse la gloria? Claro, trabajar con una mente colmena tiene un valor increíble. ¿Acceso a cientos de drones a cambio de una parte de los beneficios? ¡Vaya trato! Pero quizá el trabajo que ellos hacen me resta logros a mí. No estoy segura de poder vivir con la idea de compartir mi legado. Tendré que pensármelo mejor.§!"
 grand_archive.8225.a: "$grand_archive.8220.a$"
 grand_archive.8230.name: "Algo que demostrar"
 grand_archive.8230.desc: "Oculta en una rejilla de ventilación, hemos descubierto la última entrada del diario de la §Y$NAME_CaptainNess$§!.\n\n§LNo es así como quiero que me recuerden. $NAME_Smeegibb$ ha sido un compañero leal, pero que nunca se diga que lo he necesitado. Puedo enfrentarme a la galaxia en solitario. Dejaré mi huella, y la gloria será mía. Así como las riquezas.\n\nNota para mí misma: Debería enviar algo a $NAME_Smeegibb$ para que me recuerde.§!\n\nEsto es todo lo que quedaba por encontrar. No hay ningún otro rastro de la capitana ni señal de la §Y$celestial_chart$§!.\n\nQuizá el regalo para $NAME_Smeegibb$ que se menciona oculte alguna pista sobre el paradero del fragmento final. Debemos reabrir las comunicaciones con él."
 grand_archive.8230.a: "Área despejada."
 grand_archive.8236.name: "$NAME_Smeegibb$ ha desaparecido"
 grand_archive.8236.desc.default: "$smeegibb_shelter_system_2_poi_desc$"
 grand_archive.8236.desc.xenophile: "$smeegibb_shelter_system_2_poi_desc$\n\nEsperamos que nuestro nuevo amigo esté a salvo."
 grand_archive.8236.a: "Para [smeegibb_system.GetName]"
 grand_archive.8241.name: "Regreso de la $NAME_BlackNeedle$"
 grand_archive.8241.desc: "Una flota considerable con la bandera de la organización pirata conocida como la §Y$NAME_BlackNeedle$§! ha sido avistada orbitando [smeegibb_shelter.GetName]. Creemos que estos piratas han estado siguiendo nuestros movimientos y han arrasado el asentamiento que alberga al colectivo conocido como $NAME_Smeegibb$. Deben de estar buscando el siguiente fragmento de la §Y$celestial_chart$§!.\n\nNo quedan señales de vida sintiente en el planeta.\n\nEstamos recibiendo una transmisión de su nave principal."
 grand_archive.8245.name: "$NAME_CaptainInax$ de la $NAME_BlackNeedle$"
 grand_archive.8245.desc.inax.1: "§HEste artropoide es alto y sus ojos compuestos brillan intensamente. Su disciplinado comportamiento contrasta con el inquieto movimiento de sus mandíbulas, que chasquean irregularmente y tiemblan de excitación.§!\n\nPor fin nos conocemos. ¿Cómo os las habéis arreglado para derrotar al §Yk-k-kapitán Hoo§!? Incluso ese viejo k-k-kretino debería haber eliminado fácilmente vuestra lamentable flota. Pagaréis por"
 grand_archive.8245.desc.inax.2: "G-g-gracias por guiarnos hasta aquí. §Y$NAME_SilverQuill$§! ha estado persiguiendo a ese miserable $NAME_Smeegibb$ durante más de cien ciclos. Saldar sus cuentas pendientes me hará merecedor de una gran recompensa... una vez que haya acabado con vosotros."
 grand_archive.8245.desc.ransacked: "$grand_archive.8245.desc.inax.1$ haber sak-k-keado nuestra base en [black_needle_base.GetName].\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.desc.stolen: "$grand_archive.8245.desc.inax.1$ haber robado a la §YAguja Negra§!.\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.a: "¿Quiénes sois?"
 grand_archive.8245.a.reply: "M-m-me llamo Inax, almirante de la §YAguja Negra§!.\n\nAhora ya sabéis el nombre de quien os matará. Esta es una muerte honorable. Os ak-k-konsejo que la aceptéis.\n\nComo es k-k-kostumbre, incluso podéis disparar primero."
 grand_archive.8245.b: "Tú mataste a $NAME_Smeegibb$..."
 grand_archive.8245.b.reply.common: "No supuso ningún desafío. Pintamos su k-k-kuchitril con sangre azul de molusk-k-koide. Sin flota, sin armas... Alguien lo iba a atak-k-kar tarde o temprano. Nadie sobrevive tras ser atravesado por la §YAguja Negra§!.\n\n¿Era vuestro amigo? K-k-ke curioso. Os uniréis a él muy pronto. En el nombre de §Y$NAME_SilverQuill$§!, tomaremos esa k-k-karta"
 grand_archive.8245.b.reply.default: "$grand_archive.8245.b.reply.common$ de vuestros k-k-kuerpos moribundos."
 grand_archive.8245.b.reply.robot: "$grand_archive.8245.b.reply.common$ mientras vuestras luces se apagan y morís."
 grand_archive.8245.c: "¿Quién es $NAME_SilverQuill$?"
 grand_archive.8245.c.reply: "¿Que k-k-kién es §Y$NAME_SilverQuill$§!? Vaya pregunta. Nuestro legendario fundador era un genio. A partir de una sola nave, convirtió la §YAguja Negra§! en una organización que abark-k-kaba toda la galaxia.\n\nLa Aguja Negra vive para k-k-kargar con su legado. Vuestra muerte será la siguiente nota de nuestra k-k-kanción."
 grand_archive.8245.d: "¿Para qué queréis la $celestial_chart$?"
 grand_archive.8245.d.reply: "¿Es que no sabéis lo que tenéis en vuestro poder? ¡La carta indica la ubicación del tesoro de la §Yk-k-kapitana Ness§!! Cada k-k-krédito y joya robada a lo largo de su vida.\n\nSu riqueza nos pertenece. Una vez que la tengamos, grabaremos nuestros nombres en la historia. Todos los sistemas temerán a la §YAguja Negra§!... y la primera nota en el k-k-koro será vuestra. ¿A k-k-ke somos generosos?"
 grand_archive.8245.e: "No nos rendimos tan fácilmente."
 grand_archive.8245.e.reply: "¡Entonces cantemos! Haré un trofeo con vuestros [this.species.GetRemnantNamePlural] y se lo regalaré a mi k-k-komandante."
 grand_archive.8265.name: "$grand_archive.8245.name$"
 grand_archive.8265.desc: "¡Una batalla memorable! No sois tan débiles k-k-komo parecéis. Os hemos subestimado dos veces, pero nunca más. La próxima vez que nos encontremos, la §YAguja Negra§! no se k-k-kontendrá.\n\nNo es un aviso. Es una sentencia de muerte."
 grand_archive.8265.a.scared: "Inquietante..."
 grand_archive.8265.a.homicidal: "Adelante."
 grand_archive.8265.a.gestalt: "Comunicación finalizada."
 gateway_to_ness_treasure_system_poi: "La X marca la carta"
 gateway_to_ness_treasure_system_poi_desc: "La §H$celestial_chart$§! ya está completa. Ha revelado un último sistema oculto, [Prev.GetName]. Nuestra larga búsqueda casi ha llegado a su fin: ¡viajemos hasta allí para descubrir lo que nos espera!"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT: "Cápsula oculta"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT_DESC: "Basándonos en nuestra investigación, creemos que el siguiente fragmento de la §H$celestial_chart$§! está escondido en algún lugar dentro del asentamiento en ruinas de [this.GetName].\n\nDada la robusta construcción de las otras cápsulas, podemos suponer que ha sobrevivido al reciente bombardeo."
 grand_archive.8270.name: "Secreto de la estatua"
 grand_archive.8270.desc: "Nuestra búsqueda del cuarto fragmento de la §Y$celestial_chart$§! en [from.GetName] ha concluido con éxito. La cápsula ha sido hallada incrustada dentro de una estatua de piedra de un dron del ya extinto colectivo conocido como $NAME_Smeegibb$. La inscripción de la estatua reza así:\n\n§L\"A mi leal compañero de tripulación: una muestra de mi aprecio. Que tu soledad sea larga y pacífica\".§!\n\nUna vez descifrado este último fragmento de la carta, podremos continuar la búsqueda del tesoro de la §Y$NAME_CaptainNess$§!."
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT: "El último fragmento de la carta"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT_DESC: "Tras extraer la cápsula de las ruinas del asentamiento de $NAME_Smeegibb$, solo queda desencriptar los datos de su interior y completar la §H$celestial_chart$§!. Pronto descubriremos qué nos espera al final del rastro de la §H$NAME_CaptainNess$§!."
 grand_archive.8280.name: "Carta completa"
 grand_archive.8280.desc: "Una vez descodificado, el nuevo fragmento de datos completa nuestra §Y$celestial_chart$§!. Se han encendido algunos puntos de luz en varios nodos que indican los destinos intermedios que hemos descubierto por el camino. A continuación, las cuatro luces han parpadeado al unísono antes de revelar otro sistema oculto.\n\nAñadir el último fragmento de los datos ha desbloqueado capacidades adicionales. La §Ycarta§! no es un simple mapa, sino que contiene información sobre riquezas perdidas y tesoros ilícitos de toda la galaxia recopilada por la §Y$NAME_CaptainNess$§!. Puede que algunos de los datos hayan quedado obsoletos, pero es factible que este dispositivo detecte alijos ocultos de valiosos tesoros en todos nuestros sistemas.\n\nAdemás, la §Ycarta§! contiene información sobre la tasación de cada tesoro que la capitana descubrió a lo largo de su carrera. Estas notas detalladas explican cómo identificar, tasar y presentar los objetos de valor adquiridos a posibles vendedores para obtener el máximo beneficio. La reactivación del dispositivo proporcionará diseños para una cámara del tesoro única que permitirá a nuestras colonias aprovechar la incomparable perspicacia de la capitana y añadir valor a nuestro tesoro."
 grand_archive.8280.a.lom: "Un tesoro inconmensurable."
 grand_archive.8285.name: "La X marca la carta"
 grand_archive.8285.desc: "La conclusión de la §Y$celestial_chart$§! es un momento trascendental para [this.GetName]. Con todos sus secretos desvelados, se nos señala un destino ineludible: el sistema [gateway_to_ness_treasure_system.GetName].\n\nTras superar muchos obstáculos, estamos a un solo paso. Solo queda una pregunta: ¿qué hay al final de la §Ycarta§!?\n\nNo hay garantías de éxito, pero no querríamos que fuera de otro modo. Lancémonos a la aventura."
 grand_archive.8285.a.default: "Adelante."
 grand_archive.8285.a.lom: "¡Adelante!"
 councilor_head_treasure_hunter: "Cazatesoros principal"
 councilor_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_head_treasure_hunter_desc: "El $TITLE$ analiza minuciosamente la §Y$celestial_chart$§! para localizar alijos ocultos y tasar artefactos valiosos."
 councilor_corporate_head_treasure_hunter: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_desc: "$councilor_head_treasure_hunter_desc$"
 prospect_of_treasure_modifier: "Perspectiva de tesoro"
 prospect_of_treasure_modifier_tt: "Otorga §G+$@prospect_of_treasure_treasure_trove_reward|0%$§! $mod_treasure_trove_reward_mult$, §G+$@prospect_of_treasure_treasure_gatherers_produces|0%$§! $mod_planet_treasure_gatherers_produces_mult$ y §G+$@prospect_of_treasure_energy_produces|0$§! $mod_country_base_energy_produces_add$ por nivel de $ruler$:\n\n"
 grand_archive.8290.name: "Gusto por el tesoro"
 grand_archive.8290.desc.chart: "Con la creación de la cámara del tesoro en [from.GetName], creemos que la §Y$celestial_chart$§! tiene el potencial de contribuir significativamente a nuestra economía."
 grand_archive.8290.desc.trove: "Al distribuir los recursos del $TREASURE_TROVE$ descubierto en [from.GetName], ha quedado claro que la §Y$celestial_chart$§! tiene el potencial de contribuir significativamente a nuestra economía."
 grand_archive.8290.desc.default: "Para aprovechar al máximo las posibilidades de la §Ycarta§!, hemos concebido un nuevo puesto en el Consejo para una persona que dirija nuestros esfuerzos en el descubrimiento y la recolección de tesoros."
 grand_archive.8290.desc.gestalt: "Para aprovechar al máximo las posibilidades de la §Ycarta§!, hemos tomado medidas que permiten asignar más recursos al descubrimiento y la recolección de tesoros."
 grand_archive.8290.desc.chart.default: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.chart.gestalt: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.desc.trove.default: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.trove.gestalt: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.tt: "\n§EPermite desbloquear el cargo del Consejo:§!\n§H$t$$councilor_head_treasure_hunter$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_treasure_trove_reward_mult$: §G+$@councilor_head_treasure_hunter_treasure_trove_reward|0%$§!\n$ttt$$mod_planet_treasure_gatherers_produces_mult$: §G+$@councilor_head_treasure_hunter_treasure_gatherers_produces|0%$§!\n$ttt$$mod_country_base_energy_produces_add$: §G+$@councilor_head_treasure_hunter_energy_produces|0$§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$scientist_with_icon$ $commander_with_icon$"
 grand_archive.8300.name: "Puerta infestada de gusanos"
 grand_archive.8300.desc.common: "Este debe ser el portal que nos conducirá al tesoro que tanto buscamos."
 grand_archive.8300.desc.did_encounter_voidworms: "El mapa nos ha llevado a un agujero negro inexplorado hasta ahora y a un sistema infestado de $NAME_Voidworms$. Han anidado en un portal abandonado cercano y los más grandes rodean posesivamente la estructura.\n\n$grand_archive.8300.desc.common$ Si queremos llegar al final del camino, debemos eliminar a los $NAME_Voidworms$ y reparar la puerta."
 grand_archive.8300.desc.didnt_encounter_voidworms: "El mapa nos ha llevado a un agujero negro inexplorado hasta ahora y a un sistema infestado de extrañas criaturas. Se han reunido en torno a un portal abandonado cercano y los más grandes rodean posesivamente la estructura.\n\nEstas gigantescas entidades parecidas a gusanos no están presentes en nuestras bases de datos de fauna espacial. Actualmente estamos intentando establecer comunicaciones. $grand_archive.8300.desc.common$ Si queremos llegar al final del camino, debemos ocuparnos de estas criaturas y reparar la puerta."
 grand_archive.8300.a: "Nada se interpondrá en nuestro camino."
 grand_archive.8300.a.pacifist: "Si es necesario."
 grand_archive.8300.a.lom: "¡Dadles caña!"
 GATEWAY_VOIDWORMS_KILL_PROJECT: "$grand_archive.8300.name$"
 GATEWAY_VOIDWORMS_KILL_PROJECT_DESC: "Hemos seguido la §H$celestial_chart$§! hasta un §Hportal§! infestado en el sistema [this.solar_system.GetName]. Hay que ocuparse de estas criaturas antes de poder reactivar el portal y ver qué hay al otro lado."
 GATEWAY_VOIDWORMS_KILL_PROJECT_TT: "§RDerrotar a las criaturas del sistema [this.solar_system.GetName]§!"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT: "Restos de $NAME_Voidworms$"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT_DESC: "Los restos de los gusanos del vacío en [this.solar_system.GetName] están arrojando lecturas inusuales. Nuestros escáneres parecen detectar señales de vida dentro de una de las troikas en descomposición. Deberíamos enviar una nave científica para investigar este asunto más a fondo."
 grand_archive.8310.name: "Nidada de gusanos del vacío"
 grand_archive.8310.desc.did_encounter_voidworms: "Encontramos una nidada de ninfas dentro de uno de los cadáveres de gusano del vacío. A pesar de las bajas sufridas por su especie, se acercaron a nuestras naves y se pusieron a rondar a nuestra flota en actitud suplicante.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.didnt_encounter_voidworms: "Encontramos una nidada de crías dentro de uno de los cadáveres serpentinos. A pesar de las bajas sufridas por su especie, se acercaron a nuestras naves y se pusieron a rondar a nuestra flota en actitud suplicante.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.common: "Si queremos, podemos sacar provecho de su apego instintivo: cuando estos seres espaciales se hagan adultos, la nidada podría ser una flota orgánica impresionante bajo nuestro mando."
 grand_archive.8310.a: "Un hallazgo notable."
 grand_archive.8310.a.tt: "Obtendremos una flota de §Y$@gateway_voidworm_nymph_reward_count|0$ §2$epic$§! $voidworms_small_plural$§!."
 grand_archive.8310.b: "Una presa fácil."
 grand_archive.8315.name: "Investigar la tecnología del portal"
 grand_archive.8315.desc: "El portal de [FromFromFrom.System.GetName] está inactivo. Al acercarnos a esta estructura ancestral, la §Y$celestial_chart$§! nos ofreció información sobre su tecnología olvidada. Comprender este antiguo método de transporte podría sernos muy útil en otras empresas."
 RESEARCH_GATEWAY_ACTIVATION_PROJECT: "$grand_archive.8315.name$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_DESC: "$grand_archive.8315.desc$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_TT: "Investigar tecnología £physics£§Y$tech_gateway_activation$§!"
 grand_archive.8325.name: "Activar el portal"
 grand_archive.8325.desc.common: "El mapa no va más allá una vez restablecido el enlace entre los sistemas. Si esta carta guarda algún secreto, pronto lo conoceremos."
 grand_archive.8325.desc.tech: "Tras investigar la tecnología apropiada, ya podemos reactivar el portal ancestral de [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.known: "Ahora que nos hemos ocupado de esos seres, solo falta reactivar el portal ancestral de [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.unknown: "Ahora que nos hemos ocupado de los $NAME_Voidworms$, solo falta reactivar el portal ancestral de [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 ACTIVATE_GATEWAY_PROJECT: "$grand_archive.8325.name$"
 ACTIVATE_GATEWAY_PROJECT_DESC: "Siendo, como es, el destino final de la §H$celestial_chart$§!, el §Hportal§! inactivo de [this.solar_system.GetName] tiene que conducir a algo muy importante."
 ACTIVATE_GATEWAY_PROJECT_TT: "§HActivar el portal§!"
 grand_archive.8400.name: "¡Un tesoro!"
 grand_archive.8400.desc: "Al activar el portal que había al final de la §Y$celestial_chart$§!, hemos revelado el sistema [ness_treasure_system.GetName]. La distribución de los cuerpos celestes coincide con los bocetos que hemos encontrado en el cuaderno de bitácora de la §Y$NAME_CaptainNess$§!.\n\nNuestro largo viaje se acerca a su final."
 grand_archive.8400.a: "Adelante."
 ness_treasure_system_poi: "Viajar por el portal de [from.solar_system.GetName]"
 ness_treasure_system_poi_desc: "Hemos seguido la §H$celestial_chart$§! hasta el final, defendiéndonos de piratas y seres monstruosos. El portal ya está activo y solo falta descubrir lo que hay al otro lado."
 #Megastructure
 gateway_ness_ruined: "$gateway_ruined$"
 gateway_ness_ruined_DESC: "$gateway_ruined_DESC$"
 gateway_ness_ruined_MEGASTRUCTURE_DETAILS: "$gateway_ruined_MEGASTRUCTURE_DETAILS$"
 gateway_ness_restored: "$gateway_final$"
 gateway_ness_restored_DESC: "$gateway_final_DESC$"
 gateway_ness_restored_MEGASTRUCTURE_DETAILS: "$gateway_final_MEGASTRUCTURE_DETAILS$"
 NESS_GRAND_ARCHIVE: "Botín de la $NAME_CaptainNess$"
 NESS_GRAND_ARCHIVE_HOARDED: "$NESS_GRAND_ARCHIVE$"
 grand_archive.8405.name: "¡Emboscada!"
 grand_archive.8405.desc: "Nos han seguido.\n\nAhora nos vemos frente a una imponente flota de la §Y$NAME_BlackNeedle$§! en [ness_treasure_system.GetName]. En comparación con nuestro último encontronazo, ha engrosado sus filas considerablemente: ahora incluye naves militares incautadas y naves civiles equipadas con armamento de alto grado. Parece que ha reunido el grueso de sus flotas de reserva para este enfrentamiento. En el centro de la flota está su nave insignia, un enorme navío de clase $titan$.\n\nAunque están en formación de combate, muchas naves aún tienen las armas sin preparar. Parece que pretenden negociar.\n\nRecibimos una transmisión de la nave insignia."
 grand_archive.8405.a.lom: "Parlamentemos."
 grand_archive.8410.name: "$NAME_CobaltQuill$, capitán del $NAME_BlackNeedle$"
 grand_archive.8410.desc: "§HA pesar de su corta estatura, este capitán pirata emana solemnidad. Tiene unos ojos calculadores que nos examinan como si fuéramos parte de una ecuación compleja.§!\n\nPor fin nos conocemos. $NAME_CobaltQuill$ a vuestro servicio. Soy capitán de la ilustre §Y$NAME_BlackNeedle$§! y humilde descendiente de nuestro fundador, $NAME_SilverQuill$. Habéis sido un dolor de cabeza durante bastantes años, pero soy razonable. Vengo con una oferta.\n\nOs daremos una recompensa importante por vuestra carta completa y os perdonaremos vuestras insignificantes vidas.\n\nSi os negáis, no nos quedará más opción que tomar por la fuerza lo que queramos. Además de nuestra superioridad naval, nos hemos infiltrado en varios puntos de vuestro imperio; una orden mía es lo único que os separa de la devastación."
 grand_archive.8410.a: "¿Qué ofrecéis?"
 grand_archive.8410.a.reply: "Aunque me habéis causado considerable irritación, quiero ofreceros una recompensa importante a cambio de la reliquia completa de la §Y$NAME_CaptainNess$§!.\n\nSi aceptáis mi generosa oferta, estoy dispuesto a olvidar las fechorías del pasado. No hay necesidad de prolongar este conflicto ni de aumentarlo."
 grand_archive.8410.b: "Nos estás amenazado..."
 grand_archive.8410.b.reply.common_1: "Conozco todo lo que hay que conocer de [this.GetName]: vuestras cadenas de suministro, la ubicación de vuestros silos de recursos, la distribución de vuestras bases estelares... Todo se ha tenido en cuenta."
 grand_archive.8410.b.reply.common_2: "Mi gente ha investigado y sé exactamente cómo desmantelar vuestro imperio. Cercaré vuestros planetas, os robaré los suministros y destruiré lo que quede. Salvo que me deis lo que deseo, claro."
 grand_archive.8410.b.reply.default: "$grand_archive.8410.b.reply.common_1$\n\nTengo vigilados a todos vuestros líderes de confianza, así como a sus seres queridos.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.hive_mind: "$grand_archive.8410.b.reply.common_1$\n\nEstoy haciendo seguimiento de todos los nodos importantes de tu colectivo y recibo alertas cada vez que se crea uno nuevo.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.machine: "$grand_archive.8410.b.reply.common_1$\n\nTengo una puerta trasera en vuestra matriz de localización y rastreo la posición de los nodos principales de vuestra red.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.c: "¿Qué sentido tiene negociar?"
 grand_archive.8410.c.reply: "Una operación de sabotaje de esta envergadura no sale barata. Mantenimiento de naves, salarios, sobornos... Todo eso cuesta dinero, y yo no me he enriquecido por gastar sin necesidad. La tremenda escala de la destrucción que os espera con solo apretar un botón supone un coste de oportunidad.\n\nTengo mejores formas de gastar el fruto de mi esfuerzo. Vamos, evitemos otro derramamiento de sangre sin sentido. Coged vuestras nuevas riquezas y dejad la piratería a los expertos."
 grand_archive.8410.d: "Esto no es solo por los créditos, ¿verdad?"
 grand_archive.8410.d.reply: "Hace 5000 años, mi antepasado, el gran $NAME_SilverQuill$, era el segundo de a bordo de la $NAME_CaptainNess$. Le dedicó años de servicio leal, pero ¿qué recibió a cambio?\n\n¡Traición!\n\n¡Ella lo entregó a las autoridades y se embolsó la recompensa! Aunque, por supuesto, no había prisión capaz de retener al poderoso $NAME_SilverQuill$.\n\nTras una arriesgada fuga, renació de sus cenizas y convirtió su variopinta tripulación en la legendaria $NAME_BlackNeedle$ que tienes delante. Habiendo jurado venganza contra la traidora $NAME_CaptainNess$, dedicó su vida a saquear su tesoro y enterrar su legado bajo el peso de su propio éxito.\n\nYo solo estoy terminando lo que él empezó. Esta carta es la clave para reclamar lo que legítimamente nos pertenece.\n\nY, ahora, entrégamela."
 grand_archive.8415.name: "Una propuesta descarada"
 grand_archive.8415.desc: "El líder de la §Y$NAME_BlackNeedle$§! nos ha hecho una propuesta: ofrece una recompensa importante a cambio de la §Y$celestial_chart$§!. Si aceptamos el trato, le daremos la llave del tesoro de la §Y$NAME_CaptainNess$§!.\n\nRechazar esta propuesta provocará toda su ira. Ignoramos hasta qué punto se han infiltrado estos piratas entre nuestras filas, pero amenazan con desmantelar [this.GetName] por completo desde dentro. Está por ver si se trata de un farol."
 grand_archive.8415.a: "Rechazad la oferta."
 grand_archive.8415.b: "Vended la §Y$celestial_chart$§!."
 grand_archive.8415.b.effect_tt: "Pierdes la §Y$celestial_chart$§!\nGanas el §G+$@max_credit_mult|0%$§! de tu $r_energy$ máxima\nGanas una nave de la §Y$NAME_BlackNeedle$§!"
 grand_archive.8500.name: "Trato hecho"
 grand_archive.8500.desc: "Hemos entregado la §Y$celestial_chart$§! a cambio de una gran suma de $MONEY$ y una nave insignia excepcional conocida como §YEl Ojo de la Aguja§!. Podemos considerar zanjada nuestra disputa con la §Y$NAME_BlackNeedle$§! de una vez por todas.\n\nHemos evitado un enfrentamiento significativo con toda la fuerza de sus flotas y un intento de sabotaje a escala galáctica.\n\nEs mejor que dejemos la piratería a los piratas."
 grand_archive.8500.a: "Aquí ya hemos terminado."
 grand_archive.8500.a.tt: "Todas las naves abandonan el sistema $TREASURE_TROVE$."
 HOARD_LOOTED_BY_PIRATES: "Los piratas han saqueado esta estructura, que ya no contiene nada de valor"
 grand_archive.8505.name: "¡Sabotaje!"
 grand_archive.8505.desc: "La §Y$NAME_BlackNeedle$§! ha lanzado un asalto con todas sus fuerzas y sumido nuestros sistemas en el caos. Las cadenas de montaje están detenidas, los generadores se han quemado y la infraestructura administrativa esencial está desconectada. Desaparecen cargamentos, se borran datos de las estaciones de investigación y las minas se hunden a una velocidad multiplicada por cinco.\n\nEsta destrucción generalizada se debe a la insidiosa labor de miles de agentes malintencionados en colaboración. Hay una red enorme de saboteadores oculta en nuestras colonias y parecen llevarnos la delantera."
 grand_archive.8505.a: "¡Alerta roja!"
 situation_sabotage: "Saboteadores de la Aguja Negra"
 situation_sabotage_type: "$situation_sabotage$"
 situation_sabotage_desc: "Hay una red enorme de saboteadores de la §Y$NAME_BlackNeedle$§! oculta en nuestras colonias y está provocando incidentes generalizados en [owner.GetName]. Si no eliminamos a los saboteadores, el daño continuará hasta que las cadenas de suministro se desplomen."
 situation_sabotage_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 approach_sabotage_do_nothing: "No hacer nada"
 approach_sabotage_do_nothing_tt: "No actuaremos a este respecto."
 approach_sabotage_purge: "Purgar a los saboteadores"
 approach_sabotage_purge_tt: "Cazar a los agentes infiltrados en nuestras filas provocará daños colaterales inevitables."
 approach_sabotage_mitigate: "Mitigar los daños"
 approach_sabotage_mitigate_tt: "Podemos tomar las medidas pertinentes para reconstruir nuestra infraestructura y esperar que resista esta guerra de desgaste."
 finisher_effects_sabotage: "Eliminaremos a los saboteadores de la Aguja Negra e impediremos que refuercen su cerco en torno al tesoro de la capitana Ness."
 finisher_effects_sabotage_fail: "Nuestra infraestructura sufrirá daños irreparables y la Aguja Negra reforzará su cerco en torno al tesoro de la capitana Ness."
 grand_archive.8520.name: "Red de saboteadores expuesta"
 grand_archive.8520.desc.common: "Hemos interceptado una frecuencia de comunicaciones oculta que §Y$NAME_BlackNeedle$§! usaba en nuestras colonias. Tras descifrar sus mensajes, hemos identificado a todos los conspiradores y saboteadores infiltrados."
 grand_archive.8520.desc.machine: "$grand_archive.8520.desc.common$\n\nSus agentes han estado propagando malware en nuestros sistemas operativos hasta crear un ejército durmiente de unidades rebeldes en distintas posiciones de nuestros sistemas.\n\nEsta reprogramación malintencionada ha llegado a dañar uno de nuestros nodos independientes más importantes en [root.GetName], §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!."
 grand_archive.8520.desc.hive: "$grand_archive.8520.desc.common$\n\nSus agentes han estado inundando los hábitats de feromonas disociativas que han provocado desviaciones subyacentes a muchos de nuestros drones. Tras desorientarlos, los piratas han reorganizado nuestros drones en células de agentes durmientes, que ahora están derribando nuestra infraestructura.\n\nEste amplio plan ha llegado a dañar uno de nuestros nodos independientes más importantes en [root.GetName], §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!."
 grand_archive.8520.desc.default: "$grand_archive.8520.desc.common$\n\nHemos sabido que sus agentes llevan años reclutando ciudadanos descontentos, preparándose para este ataque extenso con células durmientes y una varios activos listos para volverse contra nosotros.\n\nPor lo visto, entre los traidores está §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!, lo que supone un riesgo considerable. Debemos ocuparnos de este asunto al tiempo que mantenemos la sensación de estabilidad. El conocimiento público de este nivel de corrupción tendría graves repercusiones para nuestro gobierno."
 grand_archive.8520.a.default: "Ejecutemos a los traidores."
 grand_archive.8520.a.machine: "Desactivemos las unidades desviadas."
 grand_archive.8520.a.hive: "Eliminemos a los drones desviados."
 grand_archive.8520.a.tt: "Mueren §R100§! £pop£ §Hpoblaciones§! en cada planeta poblado."
 grand_archive.8520.b.default: "Reeduquemos a los traidores."
 grand_archive.8520.b.machine: "Reprogramemos las unidades desviadas."
 grand_archive.8520.b.hive: "Reasimilemos a los drones desviados."
 grand_archive.8520.c: "Expongamos la identidad de los traidores."
 grand_archive.8525.name.default: "Traidor ejecutado"
 grand_archive.8525.name.hive: "Desviado eliminado"
 grand_archive.8525.name.machine: "Unidad liquidada"
 grand_archive.8525.desc.common: "Tras conocerse su lealtad a los piratas de la §Y$NAME_BlackNeedle$§!"
 grand_archive.8525.desc.default: "$grand_archive.8525.desc.common$, se ha ejecutado a [traitor_leader.GetName].\n\nNo se han mencionado las circunstancias de su muerte."
 grand_archive.8525.desc.hive: "$grand_archive.8525.desc.common$, se ha eliminado a [traitor_leader.GetName]."
 grand_archive.8525.desc.machine: "$grand_archive.8525.desc.common$, se ha eliminado a [traitor_leader.GetName]."
 grand_archive.8525.a: "Una medida necesaria."
 grand_archive.8530.name.default: "Traidor reeducado"
 grand_archive.8530.name.hive: "Desviado reeducado"
 grand_archive.8530.name.machine: "Unidad reprogramada"
 grand_archive.8530.desc.default: "$grand_archive.8525.desc.common$, [traitor_leader.GetName] se ha sometido a una corrección.\n\nDesafortunadamente, este proceso de reeducación ha dejado una impresión negativa duradera en [traitor_leader.GetName]."
 grand_archive.8530.desc.hive: "$grand_archive.8525.desc.common$, [traitor_leader.GetName] se ha sometido a una corrección.\n\nDesafortunadamente, este proceso de reasimilación ha dejado una impresión negativa duradera en [traitor_leader.GetName]."
 grand_archive.8530.desc.machine: "$grand_archive.8525.desc.common$, [traitor_leader.GetName] se ha sometido a reprogramación.\n\nDesafortunadamente, este proceso de reformateo ha dejado una impresión negativa duradera en [traitor_leader.GetName]."
 grand_archive.8530.a.tt: "[traitor_leader.GetName] gana 2 niveles de rasgos negativos"
 grand_archive.8535.name: "[traitor_leader.GetName] aparece sin vida"
 grand_archive.8535.desc: "$grand_archive.8525.desc.common$, ciudadanos furiosos de [root.GetName] han organizado protestas públicas. La turba ha irrumpido en su domicilio y poco después se ha certificado su muerte."
 grand_archive.8536.name: "Expiación tras la traición"
 grand_archive.8536.desc: "$grand_archive.8525.desc.common$, emitió una declaración pública en la que expresaba un profundo pesar por sus acciones. Esta dura prueba ha causado un efecto duradero en su capacidad para gobernar.\n\nA pesar de sus pasados actos, el pueblo de [root.GetName] está dispuesto a perdonarlo todo."
 grand_archive.8536.a: "Es de agradecer."
 grand_archive.8536.a.tt: "[traitor_leader.GetName] gana un nivel de rasgos negativos"
 grand_archive.8545.name: "Colapso de infraestructura"
 grand_archive.8545.desc: "Por desgracia, no hemos conseguido desbaratar las operaciones destructivas de la §Y$NAME_BlackNeedle$§!. Sus saboteadores han dañado irreparablemente nuestra infraestructura logística y podríamos tardar años en reconstruir las cadenas de suministro. Su corrupción de nuestros sistemas alcanza tal nivel que no es posible mitigarla.\n\nSin embargo, eso no nos impedirá reivindicar como nuestro el §Y$NESS_GRAND_ARCHIVE$§!. Solo tenemos que derrotar a los piratas en combate y el tesoro será nuestro."
 grand_archive.8545.a: "La pelea no ha terminado."
 grand_archive.8550.name: "Más fuertes que el sabotaje"
 grand_archive.8550.desc: "Pese al empeño de la §Y$NAME_BlackNeedle$§! por sabotear nuestra infraestructura, nos hemos recuperado y estabilizado. Tras derrotar a sus agentes, ya solo nos falta enfrentarnos a la flota que han reunido en [hoard_system.GetName] y reclamar el §Y$NESS_GRAND_ARCHIVE$§! en nombre de [root.GetName]."
 grand_archive.8550.a: "Hagámoslo."
 grand_archive.8555.name: "$NAME_BlackNeedle$ derrotada"
 grand_archive.8555.desc: "La §Y$NAME_BlackNeedle$§! no podía competir con el poder de nuestro ejército. Una vez derrotadas sus flotas, no pueden seguir apoyando el sabotaje dentro de nuestros sistemas. Ya podemos reclamar el §Y$NESS_GRAND_ARCHIVE$§! en nombre de [root.GetName]."
 grand_archive.8555.a: "Un esfuerzo lastimoso."
 grand_archive.8555.a.lom: "Pobres bribones."
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT: "Último esfuerzo de la $NAME_BlackNeedle$"
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_DESC: "Tras amplios ataques de sabotaje en los sistemas de [root.GetName], la $NAME_BlackNeedle$ ha mantenido el cerco al §H$NESS_GRAND_ARCHIVE$§!. Han agotado buena parte de sus recursos y ahora están en una posición vulnerable, Si los derrotamos aquí, caerá toda su organización y podremos apoderarnos del tesoro."
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_TOOLTIP: "§RDerrota a la $NAME_BlackNeedle$ en [solar_system.GetName].§!"
 grand_archive.8560.name: "$grand_archive.8410.name$"
 grand_archive.8560.desc: "Los hijos de Ness... Tiene gracia.\n\nElla os eligió, ¿lo sabías?\n\nHabía cientos de especies para elegir y optó por la vuestra. Tal vez viera algo especial o puede que solo fuera casualidad. En cualquier caso, aquí estamos.\n\nHabéis ganado..., por ahora. No vayáis a tomaros esta victoria a la ligera: ahora somos un poderoso enemigo. La §Y$NAME_BlackNeedle$§! no perdona ni olvida.\n\nTal como hicieron mis antepasados, perseveraremos. Reconstruiremos pedazo a pedazo lo que hemos perdido. Así tardemos mil años o un millón, regresaremos para recuperar todo lo que nos habéis robado.\n\n¡La $NAME_BlackNeedle$ vivirá por siempre! ¡Por siempre!"
 grand_archive.8560.a: "El tiempo lo dirá."
 grand_archive.8560.a.lom: "Largo, pelmazos."
 CAPTAIN_NESS_HOARD_PROJECT: "Tesoro de la capitana Ness"
 CAPTAIN_NESS_HOARD_PROJECT_DESC: "El §H$NESS_GRAND_ARCHIVE$§! es nuestro.\n\nPese a su aspecto de abandono, muchos de los sistemas del edificio siguen activos. Dada la reputación de la §H$NAME_CaptainNess$§!, debemos prestar atención a medidas de seguridad inesperadas.\n\nLa peculiar entrada al tesoro tiene una muesca en la escotilla central. Podemos insertar la §H$celestial_chart$§! para abrir esta instalación misteriosa."
 grand_archive.8565.name: "Tesoro de la $NAME_CaptainNess$"
 grand_archive.8565.desc: "La §Y$celestial_chart$§! era la llave, y la cámara su cierre. La hemos insertado en la compuerta principal de la megaestructura.\n\nLa carta se activó, y por dentro empezó a trazar un haz de luz hacia cada una de las estrellas que visitamos en nuestro viaje. La antigua maquinaria cobró vida, y al poco nos encontramos en su interior.\n\nIncreíbles tesoros sacados de un millar de mundos pueblan el suelo y las paredes. Junto a las delicadas estatuas hay armas de asalto forjadas con metales preciosos. Una elegante joyería cuelga de las extremidades de antiguos fósiles, y complejos dispositivos se amontonan sin ton ni son.\n\nUnas pisadas metálicas resuenan desde la pasarela central. Una máquina humanoide llena de fluidos se acerca a nosotros con los brazos levantados en señal de rendición. Sus circuitos vocales restallan cuando se activan:\n\n§L\"Vaya, al final encontrasteis mi carta. Estáis hechos unas lumbreras, ¿eh?\".§!"
 grand_archive.8565.a: "Abrid las comunicaciones."
 grand_archive.8565.a.lom: "¡Capitana a la vista!"
 grand_archive.8570.desc: "§HPese a las limitadas expresiones que exhibe su forma robótica, la máquina conocida como capitana Ness nos contempla con cierto engreimiento. Su cuerpo metálico no muestra signos de deterioro, como si lo hubieran montado hace nada. Su tono es paciente, a la par que condescendiente, como si se dirigiera a sus inferiores.§!\n\nSupongo que lo suyo es presentarme, aunque ya imaginaréis quién soy.\n\nMe llamo Saanda Ness, o ese era mi nombre al menos. Antaño fui la \"Reina Pirata de la Galaxia\", y ahora no soy más que la ocupante de este frío montón de tornillos.\n\n§HLa máquina se detiene por un instante, estudiando nuestra presencia.§!\n\nHa pasado mucho tiempo desde que vi a vuestra especie por última vez. ¡Parece que vuestros ancestros han madurado!\n\nA decir verdad, me impresiona que hayáis llegado hasta aquí."
 grand_archive.8570.a: "¿Cómo es que sigues con vida?"
 grand_archive.8570.a.reply_fallen_empire: "La inmortalidad sale cara. Desembolsé unos cuantos millones de créditos para que unos científicos de [fallen_empire.GetRealName] transfirieran mi consciencia de tapadillo. Hicieron un trabajo estupendo, aunque ya no puedo bailar como acostumbraba.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply_curator: "La inmortalidad sale cara. Desembolsé cuantos pocos millones de créditos para que unos científicos de $NAME_Curator_Order$ transfirieran mi consciencia de tapadillo. Hicieron un trabajo estupendo, aunque ya no puedo bailar como acostumbraba.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply: "§HLa máquina activa una consola que revela una cámara oculta en la pared. En el interior de una antigua cápsula criogénica se encuentran los restos de un ser orgánico.§!\n\nEsta era yo. Un adorno inútil, pero podéis llamarme sentimental. ¿No tengo buen aspecto?\n\nEn cuanto comprobé que todo estaba en orden, cerré esta cámara y la desconecté durante mil años. Es todo lo que sé, hasta que abristeis la puerta e iniciamos este diálogo. Parece que fue ayer cuando me eché a dormir..."
 grand_archive.8570.b: "¿De dónde sacaste tantos tesoros?"
 grand_archive.8570.b.reply: "La mayoría los robé. O los cambié por otra mercancía de estraperlo. En mis tiempos, desplumaba a los mayores jugadores de la galaxia. He secuestrado naves de carga, armas de Colosos..., lo que me echasen. Mi lógica era que si podía quitarte algo fácilmente, no te importaba tanto como para merecerlo.\n\nA veces, la situación se ponía... tensa. Ya viste lo que pasó con los ytterite. Ahí fue cuando abrí los ojos.\n\nTodo son risas y diversión, hasta que todo se acaba..."
 grand_archive.8570.c: "¿Por qué nos elegiste a nosotros?"
 grand_archive.8570.c.reply: "¿Me creeríais si os dijera que me sentía sola?\n\n§HLos circuitos vocales de la máquina restallaron en lo que sonó a risotada.§!\n\nTantos tesoros, ¿para qué? ¿Qué han hecho por mí al final? Me di cuenta de que lo que ansiaba no eran riquezas, sino un legado. Como robarlo no puedo, ¿cómo hago para crear uno?\n\nPues eso fue lo que me propuse. Encontré a una especie primitiva de lo más prometedora y dejé en sus mundos algunos tesoros... y el mapa, por supuesto. Quien lograra recomponer mi carta superaría la prueba, sería digno de heredar el trabajo de mi vida... y aquí estamos.\n\nTal vez vosotros seáis capaces de hacer lo que yo no pude y darle un buen uso."
 grand_archive.8570.d: "¿Por qué lo regalas todo?"
 grand_archive.8570.d.reply: "Como ya he dicho, estoy pasando el testigo. Solo soy buena robando el dinero, no gastándolo.\n\nAunque no podía dárselo a cualquiera. Tenía que ser lo bastante inteligente como para llegar aquí; una tripulación de la cual sentirme orgullosa... y con la cual pueda compartir mi historia."
 grand_archive.8570.e: "¿Nos cuentas tu historia?"
 grand_archive.8570.e.reply: "Pues ya que surge el tema...\n\n§HLa máquina activa una consola, y una serie de grabaciones digitales se proyectan en la pared.§!\n\nToda esta cámara es mi biografía. Pagué una grandiosa suma para que un equipo de autores registrase cada momento de mi vida para la posteridad. Su trabajo fue bastante decente, la verdad.\n\n§HLas imágenes muestran la cabina de una tripulación pirata, con la forma biológica de la capitana Ness al mando. Un breve crujido emana de los circuitos vocales de la máquina, como si fuese un suspiro.§!\n\nEn el pasado, era la pirata más temible de la galaxia. Dejé a megacorporaciones en quiebra, liberé planetas y reduje imperios a escombros. Cualquiera que tuviese la necedad de oponerse recibía una cuchillada en su [root.GetSpeciesOrganName]. O eso, o me cobraba su recompensa. La que pedían por mi cabeza era astronómica."
 grand_archive.8570.f: "Prosigue, por favor."
 grand_archive.8570.f.reply: "§HMientras se proyectan grabaciones digitales de robos, atracos y fugas, suena una música heroica.§!\n\nAl principio, escogía a mis objetivos con cuidado y hallaba una justificación por la que se lo merecían. Cada trabajo era más emocionante que el anterior. Era un ciclo constante de planificación, demonización, robo y celebración. El problema era que la búsqueda de objetivos \"malvados\" consumía mucho tiempo, y necesitaba ampliar mis horizontes.\n\nSi deseaba algo, tarde o temprano era mío. Disfrutaba viendo cómo el precio por mi cabeza y la de toda mi tripulación subía. Estaba dejando una huella que nadie olvidaría. Todo lo demás carecía de importancia."
 grand_archive.8570.g: "¿Qué cambió?"
 grand_archive.8570.g.reply: "§HEl mundo natal de los ytterite aparece en ruinas.§!\n\nEntonces ocurrió el incidente con los yterrite... Lo visteis, ¿cierto? Aún recuerdo los gritos por radio mientras sus vidas se apagaban una a una. Había ido demasiado lejos, y era el momento de cambiar.\n\nDurante mi carrera, descubrí cierto patrón: la historia se desvanece, las lecciones se olvidan y otro ocupa tu lugar. Lo único que quería era conocer a mis sucesores.\n\nEsos sois vosotros. Habéis superado la prueba, [root.GetSpeciesNamePlural]. Lo que suceda a continuación dependerá de vosotros."
 grand_archive.8575.name: "Riquezas incuantificables"
 grand_archive.8575.desc.default: "El §Y$NESS_GRAND_ARCHIVE$§! contiene una increíble cantidad de riquezas. Eso sí, debemos sopesar las consecuencias por reclamarlas.\n\nCada crédito de su tesoro se adquirió por medios fraudulentos. Al aceptar estos recursos, estaríamos tolerando los excesos delictivos de $NAME_CaptainNess$ a cambio de riquezas materiales.\n\nAun así, muchas víctimas de la $NAME_CaptainNess$ desaparecieron hace tiempo, y reclamar este tesoro ya no haría daño a nadie. Es más, hemos derrotado a la §Y$NAME_BlackNeedle$§! y hemos hecho de la galaxia un lugar más seguro. Hemos recorrido un camino plagado de peligros, y no cabe duda de que nuestro empeño merece una generosa recompensa.\n\nDebemos decidir qué vamos a hacer con sus riquezas."
 grand_archive.8575.desc.lom: "El §Y$NESS_GRAND_ARCHIVE$§! es la cámara del tesoro definitiva, y para nosotros es un honor reclamar todo su botín.\n\nUna recompensa más que merecida por derrotar a la §Y$NAME_BlackNeedle$§!; ¡tres hurras por [this.GetName]!\n\nProcedamos a limpiar la cámara. ¡[This.Species.GetHandNamePlural] a la obra!"
 grand_archive.8575.a.default: "Reclamémoslo todo en nuestro nombre."
 grand_archive.8575.a.lom: "Reclamemos nuestra más que merecida recompensa."
 grand_archive.8575.b: "Devolvamos los artículos rastreables a sus legítimos propietarios."
 grand_archive.8575.c: "Repartamos estas riquezas por toda la galaxia."
 grand_archive.8580.name: "Nuestra mecenas"
 grand_archive.8580.desc.1: "§HLa máquina conocida como §Y$NAME_CaptainNess$§! ha quedado impresionada con lo rápido que hemos desvalijado su cámara.§!\n\nAdelante, os lo merecéis. Este tesoro ha costado sangre, sudor y lágrimas. No os lo gastéis todo de golpe."
 grand_archive.8580.desc.2: "§HLa máquina conocida como §Y$NAME_CaptainNess$§! estaba contrariada por nuestro deseo de repatriar parte del tesoro que tanto le costó conseguir.§!\n\nMenudo chasco. Unos herederos de decimoquinta generación, recibiendo las viejas joyas de sus antepasados... Bueno, espero que uséis el resto en un proyecto más valioso. Pese a lo visto hasta ahora, confío en que lo haréis."
 grand_archive.8580.desc.3: "§HLa máquina conocida como §Y$NAME_CaptainNess$§! se molestó cuando vio que íbamos a entregar todo su botín.§!\n\n¿Este es vuestro plan maestro? ¿Cosas gratis para todos? ¿Qué han hecho para merecerlo? ¡Valiente desperdicio!\n\nEsperaba más de vosotros... Lo menos es que me concedáis el mando de una de vuestras flotas para empezar de cero."
 grand_archive.8580.desc.default: "§HSolo queda preguntarnos qué hacer con la $NAME_CaptainNess$. Es una experimentada piloto que ha sobrevivido a multitud de enfrentamientos, a cada cuál más peligroso, por lo que sería un activo excelente para nuestro ejército en calidad de comandante. Otra opción es que desempeñe un rol más auxiliar al entrenar a la próxima generación de pilotos.§!"
 grand_archive.8580.desc.no_lom: "§HTambién podemos encarcelarla para que sirva de ejemplo a nuestros ciudadanos y comprendan que nadie sale indemne de sus delitos. Desde luego, tiempo ha tenido para reflexionar sobre lo que ha hecho.§!"
 grand_archive.8580.desc.gestalt: "§HLo único que queda por decidir es la suerte de la $NAME_CaptainNess$. Al ser una mente poderosa e independiente, sería un activo único como comandante, puesto que puede proponer estrategias creativas para pillar a los oponentes con la guardia baja. También podríamos integrar su vasta experiencia de combate en nuestro conocimiento colectivo y utilizarla para ampliar nuestro entendimiento de la guerra.\n\nTambién podemos encarcelarla para dejar patente que las divergencias y la criminalidad no son de recibo en [this.GetName].§!"
 grand_archive.8580.a: "Nos vendrías bien como piloto."
 grand_archive.8580.a.tt: "Consigues una §Yalmirante inmortal§! de nivel 10"
 grand_archive.8580.b: "§YIntegraremos tus conocimientos en nuestra consciencia.§!"
 grand_archive.8580.c: "§YAyúdanos a entrenar a los nuevos pilotos.§!"
 grand_archive.8580.d: "§RTe pudrirás en la cárcel.§!"
 grand_archive.8585.desc: "¿Y ya está?\n\n¿Vais a apartarme así, sin más?\n\nQué decepción... Pues nada, me pondré en marcha.\n\nBuena suerte, supongo."
 grand_archive.8585.a: "No te debemos nada."
 grand_archive.8590.desc: "¡Vaya unos cabezas huecas! Os ofrezco el mundo, ¿y lo que recibo a cambio son unas esposas? ¡No merecéis lo que os he dado! ¡No merecéis ni limpiarme las botas!\n\nSois la lacra de [this.GetName], ¡os maldigo a todos!\n\nQue vuestros [this.species.GetRemnantNamePlural] se marchiten en el vacío y vuestros nombres pasen al olvido."
 grand_archive.8590.a: "Ningún delito queda impune."
 grand_archive.8595.name: "$NAME_CaptainNess$ desactivada"
 grand_archive.8595.desc: "La máquina prisionera conocida como §Y$NAME_CaptainNess$§! ha aparecido desconectada en su celda. Creemos que ha causado intencionalmente una avería crítica en sus circuitos, apagando sistemas cruciales y borrando todos los datos almacenados de su consciencia transferida. En las paredes de su celda había un mensaje escrito:\n\n§LAl vacío con vosotros...§!"
 grand_archive.8595.a: "Un final apropiado."
 grand_archive.8600.name: "El fin del arcoíris"
 grand_archive.8600.desc.common: "Ha llegado el momento de forjar nuestro propio destino. A falta de una carta estelar, las estrellas serán las que nos guíen.\n\n¿Qué proezas realizaremos? ¿Por qué nos recordarán?"
 grand_archive.8600.desc.default: "Esta aventura ha tocado a su fin. La búsqueda del tesoro de la §Hcapitana Ness§! ha terminado.\n\n$grand_archive.8600.desc.common$\n\nAquí es donde realmente comienza la historia de [this.GetName]."
 grand_archive.8600.desc.lom: "¡La de historias que contarán sobre esta aventura! Hemos descubierto el tesoro escondido de la capitana Ness y no permitimos que ninguna tripulación se interpusiera en nuestro camino.\n\n$grand_archive.8600.desc.common$\n\n¡Izad bien alta la bandera de [this.GetName], porque nuestra leyenda empieza ahora!"
 grand_archive.8600.a.default: "¡Adelante!"
 grand_archive.8600.a.lom: "¡Arrrr!"
 valuable_insight: "Una lección valiosa."
 grand_archive.9960.name: "$tech_alien_cloning$"
 grand_archive.9960.desc: "Con nuestra primera captura exitosa de fauna espacial salvaje en [from.solar_system.GetName], creemos que es posible clonar más de estas criaturas con una inversión científica adecuada."
 grand_archive.9960.a: "$valuable_insight$"
 grand_archive.9970.name: "Potencial de mutación"
 grand_archive.9970.desc: "Por primera vez, hemos clonado con éxito a la fauna espacial en [from.solar_system.GetName].\n\nNuestra investigación xenobiológica indica que podemos mejorar aún más la fisiología de estas criaturas, si así lo queremos. Esto nos permitirá adecuar las flotas biológicas con componentes de combate especializados."
 grand_archive.9970.a: "$valuable_insight$"
