 grand_archive.2053.name: "Gusanos del vacío erradicados"
 grand_archive.2053.desc: "El último de los sistemas natales de los gusanos del vacío ha sido destruido y su especie se ha erradicado.\n\nYa no tenemos que preocuparnos por sus bombardeos parasitarios."
 grand_archive.2054.name: "Madriguera de gusanos del vacío destruida"
 grand_archive.2054.desc: "Hemos arrasado un sistema natal de los gusanos del vacío.\n\nYa no podrán usar ese territorio para criar a su progenie."
