 NAME_Treasure_Trove_Pirate_Ship: "Bandidos de [event_target:pirate_system.GetName]"
 NAME_Treasure_Trove_Pirate_Ship_Design: "Filibustero"
 grand_archive.6025.name: "Emboscada pirata"
 grand_archive.6025.desc: "Mientras buscábamos el §Y$TREASURE_TROVE$§! de [from.GetName], ¡una flota pirata asaltó a [fromfromfrom.Leader.GetName]!\n\nEstos forajidos han debido de estar siguiendo nuestros avances y quieren quedarse con el tesoro. Si queremos cobrar esta recompensa, debemos derrotar a su flota antes de que puedan hacerse con los objetos de valor."
 grand_archive.6025.a: "Preparaos para el combate."
 TREASURE_TROVE_PIRATES: "Derrotar a la $NAME_Treasure_Trove_Pirate_Ship$"
 TREASURE_TROVE_PIRATES_DESC: "¡Una flota pirata va tras el §Y$TREASURE_TROVE$§! de [this.GetName]!"
 TREASURE_TROVE_EVENT_TOOLTIP: "§RDebemos derrotar a esos aprovechados antes de que se lleven esos valiosos recursos.§!"
 grand_archive.6031.name: "Piratas derrotados"
 grand_archive.6031.desc: "Ahora que hemos acabado con los piratas aprovechados, podemos apoderarnos del tesoro oculto de [event_target:treasure_trove_planet.GetName]."
 grand_archive.6031.a: "Una recompensa bien merecida."
 grand_archive.6035.name: "Tesoro oculto perdido"
 grand_archive.6035.desc: "Los piratas aprovechados han saqueado el §Y$TREASURE_TROVE$§! de [event_target:treasure_trove_planet.GetName].\n\nNo queda nada de valor que podamos llevarnos."
 grand_archive.6035.a: "Así son las cosas."
