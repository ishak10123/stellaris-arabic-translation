 grand_archive.7210.name: "Cepos gravitatorios"
 grand_archive.7210.desc.common: "Tras el descubrimiento de §Y$tech_gravity_wells$§!, las naves científicas [root.GetAdjective]s ya pueden desplegar $gravity_snare_plural$."
 grand_archive.7210.desc.vivarium: "Estos proyectiles no letales permiten capturar y transportar fauna espacial al §Yvivero§! de forma segura, donde podrá seguir reproduciéndose para concebir más especímenes.\n\nAl sacrificar y diseccionar estas criaturas, podremos extraer su §Y$genetic_material$§! para clonarlos y obtener otros recursos."
 grand_archive.7210.desc.no_vivarium: "Estos proyectiles no letales permiten capturar y transportar fauna espacial para estudiarla y diseccionarla con el fin de extraer su §Y$genetic_material$§! y obtener recursos.\n\nSi queremos mantenerla con vida para que siga reproduciéndose, tendremos que construir un §Yvivero§!. Para ello, podemos construir un §Y$grand_archive$§! o §Y[GetHatcheryPlural]§! en nuestras bases estelares."
 grand_archive.7220.name: "Bestias prethoryn"
 grand_archive.7220.desc: "Nuestros §Y$gravity_snare_plural$§! no pueden rastrear y encerrar al §Y$NAME_Prethoryn_Scourge$§!. A tenor de sus patrones de movimiento, sospechamos que estos seres son controlados por una consciencia superior, por lo que no son entidades completamente independientes.\n\nSi intentamos contener uno de estos organismos en un vivero, pondríamos en peligro a otros especímenes, e incluso a [this.GetName] al completo.\n\nHemos suspendido indefinidamente las operaciones de captura de estos organismos."
 grand_archive.7220.a: "Una medida prudente."
