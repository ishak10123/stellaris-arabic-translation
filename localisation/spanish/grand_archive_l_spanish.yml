 leviathans.4105.desc: "Por supuesto.\n\n¿Qué os gustaría saber?"
 leviathans.4105.a: "Nos interesa vuestra orientación en materias específicas."
 leviathans.4105.b.common: "Os compraríamos los planos para hacer"
 leviathans.4105.b.aesthetic_wonder: "$leviathans.4105.b.common$ un museo de §Y$EXHIBITION_AESTHETIC_WONDERS$§!."
 leviathans.4105.b.historical_item: "$leviathans.4105.b.common$ un museo de §Y$EXHIBITION_GALACTIC_HISTORY$§!."
 leviathans.4105.b.xeno_geology: "$leviathans.4105.b.common$ un museo de §Y$EXHIBITION_XENO_GEOLOGY$§!."
 leviathans.4105.c: "Nos gustaría comprar una §Yreliquia§!."
 leviathans.506.g: "¿Qué más ayuda podéis ofrecernos con nuestra §Ycolección§!?"
 leviathans.4110.desc: "Solo podemos prestaros experiencia en una materia. Somos pocos y la galaxia es grande.\n\n¿Con qué necesitáis ayuda?"
 leviathans.4111.desc: "$leviathans.4110.desc$"
 leviathans.4112.desc: "$leviathans.4110.desc$"
 leviathans.4115.desc: "Muy bien. Os confiaremos una pieza de nuestra colección privada.\n\nLo que pedís no es poca cosa y esperamos un donativo considerable como compensación."
 leviathans.4116.desc: "$leviathans.4115.desc$"
 leviathans.4117.desc: "$leviathans.4115.desc$"
