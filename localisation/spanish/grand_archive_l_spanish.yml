 TECH_UNLOCK_CONTAINMENT_VESSEL_DESC: "$tech_containment_vessel_desc$"
 tech_asteroidal_carapace: "Caparazón de asteroides"
 tech_asteroidal_carapace_desc: "El caparazón de un cutoloide no solo está compuesto de minerales, sino que está reforzado con robustas fibras biológicas. Podemos sintetizar este proceso con técnicas metalúrgicas avanzadas."
