 voidworm_nest_plural: "Nidos de gusanos del vacío"
 voidworm_broken_nest: "Nido de gusanos del vacío destruido"
 voidworm_broken_nest_desc: "Restos de un nido creado por gusanos del vacío para criar y proteger a su progenie."
