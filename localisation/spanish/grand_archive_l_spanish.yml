 VOIDWORMS_PROJECT: "Investigación sobre gusanos del vacío"
 VOIDWORMS_PROJECT_DESC: "La biología y los patrones reproductivos de los gusanos del vacío requieren más estudio."
 tech_voidworm_immunity: "Inmunidad a gusanos del vacío"
 tech_voidworm_immunity_desc: "Podemos desarrollar una cura para la infección parasitaria de los gusanos del vacío. Todas nuestras colonias se volverán inmunes a la cepa actual del bombardeo de esporas."
 tech_voidworm_immunity_effect: "Las colonias son inmunes al bombardeo de gusanos del vacío.\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!"
 tech_voidworm_immunity_effect_during_situation: "§RLa inmunidad a los bombarderos no es eficaz durante la plaga de gusanos del vacío.§!\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!\nHace avanzar la situación §Y$situation_voidworm_plague$§! en §G+$@vaccine_situation_advancement|0$§!"
