 CURATORS_DESIGNATION: "Nuestro grupo"
 DEAD_CURATORS_DESIGNATION: "Nuestro grupo, formado por los últimos supervivientes de nuestra orden,"
 grand_archive.4121.name: "$leviathans.500.name$"
 grand_archive.4121.desc.common: "dispone de información de que habéis construido un §Y$grand_archive$§! capaz de albergar a un gran número de asistentes. Es una iniciativa encomiable para compartir la historia de nuestra galaxia con todos los que buscan ese conocimiento. Compartimos objetivos comunes en este sentido.\n\nEstamos interesados en ayudaros a llevar a cabo esta iniciativa."
 grand_archive.4121.desc.default: "Nuestro grupo $grand_archive.4121.desc.common$ Seguid ampliando vuestra §Ycolección§! y a cambio ofreceremos nuestra ayuda en lo que podamos."
 grand_archive.4121.desc.dead: "El grupo conformado por los últimos supervivientes de nuestra orden $grand_archive.4121.desc.common$ Aunque nuestra orden se desmanteló hace poco, usaremos los activos restantes para brindaros asistencia a medida que expandís vuestra §Ycolección§!."
 leviathans.4100.desc: "¡Desde luego!\n\nVuestra labor no ha pasado inadvertida. Si tenemos en cuenta vuestra §Ycolección§! actual, y a cambio de un pequeño donativo, podemos ofreceros asistencia con lo siguiente."
 leviathans.4100.a: "Cuéntanos más sobre"
 leviathans.4100.a.aesthetic_wonder: "$leviathans.4100.a$ §Y$EXHIBITION_AESTHETIC_WONDERS$§!"
 leviathans.4100.a.historical_item: "$leviathans.4100.a$ §Y$EXHIBITION_GALACTIC_HISTORY$§!"
 leviathans.4100.a.xeno_geology: "$leviathans.4100.a$ §Y$EXHIBITION_XENO_GEOLOGY$§!"
 leviathans.4100.tooltip.no_pending_reward: "Debes ampliar tu colección para recibir más ayuda de los cuidadores."
 leviathans.4100.tooltip.no_reward: "Ya has solicitado toda la ayuda posible con"
 leviathans.4100.tooltip.no_reward.aesthetic_wonder: "$leviathans.4100.tooltip.no_reward$ $EXHIBITION_AESTHETIC_WONDERS$"
