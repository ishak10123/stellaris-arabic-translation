 grand_archive.2000.name: "Una multitud de voces"
 grand_archive.2000.desc: "Los sensores indican una presencia en el sistema [This.System.GetName] que está enviando señales rudimentarias por la galaxia. Los escáneres de largo alcance han registrado esos mismos patrones procedentes de zonas desconocidas. Aunque no está claro si estas señales son intencionadas, merece la pena investigarlas."
 grand_archive.2000.a: "Averiguad más."
 fcsum_voidworms_2: "Las señales de §H[This.ContactCountry.GetName]§! se han identificado como los parásitos galácticos llamados \"gusanos del vacío\"."
 grand_archive.2005.name: "$NAME_Voidworms$"
 grand_archive.2005.desc: "Hemos descubierto que las señales de largo alcance las producía un organismo espacial simple que hemos denominado §H\"$NAME_Voidworms$\"§!. Al parecer, la galaxia está plagada de estos seres. Las variaciones en la longitud de onda de las señales nos indican que estos seres atraviesan varias etapas de crecimiento antes de alcanzar la madurez final. Aunque en principio no parecen agresivos, sus patrones de comunicación apuntan a que se coordinan a escala galáctica."
 grand_archive.2005.a.homicidal: "Bichos sin conciencia que hay que sacrificar."
 grand_archive.2015.name: "Enzimas de gusano del vacío"
 grand_archive.2015.desc: "Los gusanos del vacío se aparean en grupos de tres, una formación conocida como \"troika\". Se unen de por vida en un ritual interminable de apareamiento, pero necesitan un huésped biológico externo para generar crías.\n\nSon parásitos.\n\nAl alcanzar la madurez, cada gusano del vacío desarrolla un saco de quistes dentro de su sistema reproductivo. Estos quistes protectores contienen gametos muy corrosivos que, tras combinarse con otros en una troika, se pueden enviar a un planeta que contenga la biomasa apropiada para incubar sus ninfas. El huésped no sobrevive al proceso. Tenemos indicios de que los gusanos del vacío coordinan sus bombardeos para mantener una cantidad sostenible de huéspedes viables en la galaxia.\n\nEn cualquier caso, creemos que podemos aprovechar el poder de sus enzimas reproductoras. Es posible, incluso, que desarrollemos inmunidad a su esfuerzo reproductor."
 grand_archive.2015.a: "Aprovechad su fertilidad para nuestros fines."
 grand_archive.2015.b: "Es asqueroso. Buscad una cura."
