 frenzied_voidworms_pacified_modifier: "$NAME_Frenzied_Voidworms$ pacificados"
 resolution_voidworm_eradication: "Erradicación de gusanos del vacío"
 resolution_voidworm_eradication_desc: "Los gusanos del vacío parasitarios son una plaga de la galaxia y una amenaza para los mundos poblados. Su ciclo de vida perturba el equilibrio del ecosistema galáctico y hay que eliminarlos a todos."
 resolution_voidworm_eradication_tooltip: "Cualquier imperio que tenga §Y$NAME_Voidworms$§! dentro de sus fronteras §Rquebrantará la ley galáctica§! hasta que las criaturas se marchen por su cuenta o sean destruidas."
 resolution_repeal_voidworm_eradication: "§RDerogar $resolution_voidworm_eradication$§!"
 resolution_repeal_voidworm_eradication_desc: "[global_event_country.GetGalCommunityOrGalImperium] no debería tener derecho a aniquilar la especie de los gusanos del vacío."
 resolution_repeal_voidworm_eradication_effect_success: "Deroga la §Y$resolution_voidworm_eradication$§!."
 grand_archive.2103.name: "$resolution_voidworm_eradication$"
 grand_archive.2103.desc: "[global_event_country.GetGalCommunityOrGalImperium] ha declarado que los gusanos del vacío no tienen permitido existir en los sistemas miembros.\n\nHasta que sean eliminados o abandonen nuestro espacio por su cuenta, se considerará que [this.GetName] §Rha quebrantado la ley galáctica§!."
 grand_archive.2105.name: "$NAME_Voidworms$ en el espacio [this.GetSpeciesName]"
 grand_archive.2105.desc: "Una flota de gusanos del vacío ha entrado en nuestro espacio en el sistema [from.GetName]. Como miembros de [global_event_country.GetGalCommunityOrGalImperium], tenemos la obligación legal de matar inmediatamente a cualquier gusano del vacío presente dentro de nuestras fronteras.\n\n[this.GetName] estará §Rquebrantando la ley galáctica§! hasta que los gusanos del vacío abandonen nuestro espacio o sean exterminados."
 grand_archive.2107.desc: "La constante presencia de gusanos del vacío en el sistema [invaded_system.GetName] supone un grave §Rincumplimiento de la ley galáctica§! de acuerdo con la resolución $resolution_voidworm_eradication$. Por consiguiente, [global_event_country.GetGalCommunityOrGalImperium] permite que sus miembros voten por sanciones contra [this.GetName]."
 bombardment_damage_moderate: "§YModerado§!"
 bombardment_damage_massive: "§REnorme§!"
 bombardment_voidworm_invasion_desc_common: "$bombardment_voidworm_invasion$ destruye población y crea nuevas ninfas de gusano del vacío.\n- Daño §Ymoderado§! a los §Yejércitos§!\n- Daño [GetVoidwormFleetBombardmentDamageIntensity] al §Yplaneta§! hasta el §Y25%§! de devastación\n- Daño §Ymoderado§! a la §Ypoblación§!"
 bombardment_voidworm_invasion: "Esporas de gusano del vacío"
 bombardment_voidworm_invasion_desc: "$bombardment_voidworm_invasion_desc_common$\n- §RNO§! matará a las últimas §Y$MIN_POPS$§! £pop£ §Hpoblaciones§!"
 bombardment_voidworm_invasion_crisis: "$bombardment_voidworm_invasion$ (Crisis)"
 bombardment_voidworm_invasion_crisis_desc: "$bombardment_voidworm_invasion_desc_common$"
 bombardment_frenzied_voidworm_invasion: "$bombardment_voidworm_invasion$ mutante"
 bombardment_frenzied_voidworm_invasion_desc: "- Los planetas devastados se convertirán en §Y$pc_shattered$§!"
 alert_space_fauna_bombardment_title: "¡Los gusanos del vacío bombardean nuestra colonia!"
 alert_space_fauna_bombardment_instant: "¡Los parásitos galácticos bombardean nuestra colonia!\nPortan una cantidad limitada de esporas para esparcirlas por las colonias pobladas, y muy pronto se irán."
 ALERT_SPACE_FAUNA_BOMBARDMENT_DETAIL: "$PLANET_NAME|Y$ en $SYSTEM_NAME|Y$. Poblaciones restantes por consumir: §Y$POPS_TO_KILL$§!."
 grand_archive.2195.name: "Parásitos galácticos"
 grand_archive.2195.desc.common_1: "Están atacando [from.GetName].\n\nUn gran grupo de gusanos del vacío está orbitando la colonia, bombardeándola con quistes parasitarios."
 grand_archive.2195.desc.common_2: "El análisis biológico indica que cada nidada de gusanos del vacío posee una cantidad limitada de quistes para propagarlos. Lo más probable es que se marchen en cuanto se acaben. Hasta entonces, sufriremos muchas bajas entre la población."
 grand_archive.2195.desc.default: "$grand_archive.2195.desc.common_1$\n\nCada quiste contiene una espora tóxica extremadamente letal no solo para nuestros colonos, sino para la vida en general. Tras su ingesta, se convertirá instantáneamente en una ninfa que emergerá abruptamente, destruyendo completamente a su anfitrión. Estas ninfas contienen una vejiga de gases comprimidos que les permite acceder a la atmósfera superior, donde se propulsan instintivamente a una ubicación predeterminada.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.desc.rocks: "$grand_archive.2195.desc.common_1$\n\nCada quiste contiene una espora tóxica extremadamente letal para toda la fauna nativa. Tras su ingesta, se convierte instantáneamente en una ninfa que emerge abruptamente y destruye por completo a su anfitrión. Estas ninfas suelen alimentarse de los metales preciosos de los asteroides, pero de vez en cuando cazan y se alimentan de los [this.GetColonistPlural] vulnerables. Cada cría contiene una vejiga de gases comprimidos que le permite acceder a la atmósfera superior, donde se propulsa instintivamente a una ubicación predeterminada.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.a: "Inquietante."
 grand_archive.2195.a.homicidal: "Acabarán muriendo."
