 ###########################
 #Space Fauna Description #
 ###########################
 space_amoeba_desc: "Las amebas espaciales son depredadores solitarios y agresivos hacia todo lo que encuentran. Estas criaturas, que se apoyan en unos flagelos parcialmente formados, son expertas en perseguir a sus presas."
 tiyanki_desc: "Los tiyanki, también conocidas como \"ballenas espaciales\", son dóciles criaturas que se alimentan de gases atmosféricos. Estas criaturas son extremadamente colaborativas y los grupos en la naturaleza están organizados bajo una estricta jerarquía."
 voidworm_desc: "Los gusanos del vacío son organismos parasitarios que deben depositar esporas en mundos habitados con biomasa adecuada para reproducirse. Los individuos maduros forman tríos de apareamiento, conocidos como \"troikas\", y construyen nidos cerca de los agujeros negros para cobijar y criar a su descendencia."
 cutholoid_desc: "Los cutoloides son organismos gigantescos que habitan en los asteroides para proteger sus blandos cuerpos. Estas criaturas se tragan a sus presas enteras, utilizando un fluido digestivo radiactivo para consumirlas lentamente."
 crystalline_entity_desc: "Las entidades cristalinas son una forma única de seres animados de silicato que pueden propulsarse libremente por el espacio. La tonalidad de cada entidad varía no debido a la edad, sino como reflejo de su carga interna latente."
 wild_tiyanki_ox_modifier: "Buey tiyanki salvaje"
 fauna_disengagement_modifier: "Retirada de fauna espacial"
