 pc_cutholoid_desc: "$pc_asteroid_desc$"
 resolution_cutholoid_eradication: "Erradicación de $cutholoids$"
 resolution_cutholoid_eradication_desc: "Los cutoloides devoradores de naves no deberían moverse con libertad por los sistemas civilizados. Hay que exterminar a estas criaturas a toda costa."
 resolution_cutholoid_eradication_tooltip: "Cualquier imperio que tenga §Y$cutholoids_plural$§! dentro de sus fronteras §Rquebrantará la ley galáctica§! hasta que las criaturas sean destruidas."
 resolution_repeal_cutholoid_eradication: "§RDerogar $resolution_cutholoid_eradication$§!"
 resolution_repeal_cutholoid_eradication_desc: "El [global_event_country.GetGalCommunityOrGalImperium] no existe para exigir la erradicación indiscriminada de la especie cutoloide."
 resolution_repeal_cutholoid_eradication_effect_success: "Deroga la §Y$resolution_cutholoid_eradication$§!."
 fcsum_cutholoids_1: "$fcsum_critters_1$"
 further_fc_cutholoids_completed: "$further_fc_amoebas_completed$"
 grand_archive.3103.name: "$resolution_cutholoid_eradication$"
 grand_archive.3103.desc: "[global_event_country.GetGalCommunityOrGalImperium] ha declarado que los cutoloides no tienen permitido existir en los sistemas miembros.\n\nHay que destruir a estas criaturas nada más verlas. De lo contrario, se considerará que [Root.GetName] §Rha quebrantado la ley galáctica§!."
 grand_archive.3105.name: "$cutholoids_plural$ en el espacio [this.GetSpeciesName]"
 grand_archive.3105.desc: "Se ha descubierto un cutoloide en el sistema [from.GetName]. Tras clasificarlo como una peligrosa plaga, todos los miembros de [global_event_country.GetGalCommunityOrGalImperium] están legalmente obligados a sacrificar inmediatamente a cualquier cutoloide presente dentro de sus fronteras.\n\n[Root.GetName] estará §Rquebrantando la ley galáctica§! hasta que los cutoloides sean exterminados o abandonen nuestros sistemas."
 grand_archive.3107.desc: "La constante presencia de cutoloides en el sistema [invaded_system.GetName] supone un grave §Rincumplimiento de la ley galáctica§! de acuerdo con la resolución $resolution_cutholoid_eradication$. Por consiguiente, [global_event_country.GetGalCommunityOrGalImperium] permite que sus miembros voten por sanciones contra [Root.GetName]."
 grand_archive.3011.name: "Nave científica desaparecida"
 grand_archive.3011.desc: "Hemos perdido el contacto con una nave científica mientras investigaba un extraño asteroide en [cutholoid_under_radar.solar_system.GetName].\n\nDetectamos señales de emergencia débiles en su última ubicación conocida; deberíamos investigar más si pretendemos recuperar la nave desaparecida."
 grand_archive.3011.a: "Esto pinta mal."
 grand_archive.3012.name: "Entidad descubierta en asteroide"
 grand_archive.3012.desc: "En una misión rutinaria de exploración, hemos descubierto otra extraña criatura en un asteroide de §H[from.solar_system.GetName]§!.\n\nHasta que no sepamos más de estos peligrosos artefactos, nuestras §Hnaves científicas§! deberían evitar este sistema."
 grand_archive.3012.a: "Seguid investigando."
 grand_archive.3016.name: "Una sorpresa desagradable"
 grand_archive.3016.desc.default: "El asteroide de [fromfrom.GetName] solo actuaba de cascarón para el gigantesco organismo que habita en su interior.\n\nHemos logrado destruirlo y recuperar [this.GetName]. Conviene tomar más medidas preventivas para seguir investigando los asteroides.\n\nEs posible que haya más de estas criaturas por ahí, al acecho de presas fáciles."
 grand_archive.3016.desc.leader_killed: "$grand_archive.3016.desc.default$ Por desgracia, [leader.GetName] ha sufrido daños irreparables."
 grand_archive.3018.name: "Desde el vientre de la bestia"
 grand_archive.3018.desc: "¡La nave científica que perdimos en §H[current_system.GetName]§! ha regresado!\n\nSegún los informes de §H[leader.GetName]§!, fueron devorados por una entidad que se escondía en el interior de un asteroide, y la integridad de su casco estaba al límite cuando, contra todo pronóstico, los expulsaron sanos y salvos. Parece que hubo algo más que sorprendió a la criatura antes de que pudiésemos intervenir.\n\nA falta de más información, deberíamos proceder con precaución cerca de algunos cinturones de asteroides."
 grand_archive.3018.a: "Qué suerte."
 grand_archive.3020.name: "Nave científica perdida"
 grand_archive.3020.desc: "Las transmisiones de emergencia de [from.GetName] han cesado. Lo único que podemos hacer es dar por perdida la nave científica."
 alert_mia_fleet_eaten_title: "$alert_mia_title$"
 alert_mia_fleet_eaten_instant: "Hemos perdido el contacto con una nave científica mientras investigaba un asteroide. Detectamos señales de emergencia débiles en su última ubicación conocida."
 cutholoid_discovered_chain_title: "Recuperar [this.GetName]"
 cutholoid_discovered_chain_desc: "Hemos perdido comunicación con nuestra nave científica [this.GetName] en [cutholoid_under_radar.solar_system.GetName].\n\nDe acuerdo con su última transmisión, estaban empezando a sondear un asteroide cercano, [cutholoid_under_radar.GetName].\n\nSe recomienda precaución antes de volver a entrar en este sistema."
 HIDDEN_CUTHOLOID_ATTACK_PROJECT: "Destruir el asteroide"
 HIDDEN_CUTHOLOID_ATTACK_PROJECT_DESC: "El asteroide [cutholoid_under_radar.GetName] no es lo que parece. Deberíamos acercarnos con una fuerza militar considerable e intentar recuperar nuestra nave científica [this.GetName] antes de que desaparezca para siempre."
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT: "Capturar el asteroide"
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT_DESC: "El asteroide [cutholoid_under_radar.GetName] no es lo que parece. Con la tecnología adecuada, podríamos capturarlo en su totalidad y recuperar fácilmente nuestra nave científica [this.GetName] antes de perderla para siempre."
 grand_archive.2800.name: "Falso asteroide"
 grand_archive.2800.desc: "El irregular asteroide que encontramos en §H[This.System.GetName]§! parece ser de naturaleza sintiente. Acercarnos a la órbita de semejante artefacto es muy peligroso. Hasta que no sepamos más sobre estas entidades, aconsejamos a las naves científicas que abandonen los sistemas afectados."
 grand_archive.2800.a: "Seguid investigando."
 grand_archive.2900.name: "Cutoloides"
 grand_archive.2900.desc: "Hemos descubierto un organismo espacial que se refugia dentro de los asteroides. Estas criaturas, conocidas como \"§Hcutoloides§!\", son depredadores capaces de acechar durante varios años para capturar a su presa. Pueden engullir naves enteras, por lo que debemos tener mucho cuidado al acercarnos a cinturones de asteroides no explorados, ya que son extremadamente peligrosos.\n\nLa buena noticia es que parecen ser bastante escasos y sus procesos de reproducción asexual pueden durar cientos de años."
 grand_archive.2900.a: "Deberíamos estudiar más a estas criaturas."
 grand_archive.2900.b: "Emboscad a los depredadores y destruidlos a todos."
 grand_archive.2900.b.homicidal: "El depredador se convierte en presa."
 grand_archive.2905.name: "Caparazones de cutoloide"
 grand_archive.2905.desc: "El caparazón de un cutoloide no es solo mineral, sino que está reforzado con fuertes fibras biológicas. Estas fibras nunca dejan de crecer, y se calcula que la composición de algunos caparazones supera el cincuenta por ciento de biomasa.\n\nCuando un cutoloide crece demasiado para su asteroide, busca otro hogar y comienza de nuevo el proceso de integración. Aunque normalmente son muy territoriales, se han observado múltiples cutoloides en la órbita de un candidato a caparazón principal. La mayor de las criaturas ocupará el asteroide nuevo, mientras que las demás se ordenarán por tamaño y se intercambiarán pacíficamente con el siguiente de la lista. De este modo, los asteroides que habitan a menudo han sido ocupados por decenas de organismos anteriormente.\n\nEl resultado final es que los asteroides más pequeños tienen la mayor cantidad de material de refuerzo biológico, ya que han sido intercambiados con mayor frecuencia. Estas muestras poseen un importante valor científico."
