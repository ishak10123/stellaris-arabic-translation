 concept_unplugged_cybernetic_positives_3: "$trait_unplugged_cybernetic_positives_3$"
 concept_unplugged_cybernetic_negatives_3: "$trait_unplugged_cybernetic_negatives_3$"
 requires_unplugged_decyberized: "$TRIGGER_FAIL$Es necesario estar completamente desciberizado para poder adoptar la psiónica."
 START_SCREEN_UNPLUGGED: "La conciencia nos golpeó en un frenesí de disparos de armas abrasadoras y un dolor paralizante. Nuestros sentidos se tambalearon, como si un paisaje sonoro que lo abarcaba todo se hubiera quedado repentinamente en silencio. En su lugar está el sonido ensordecedor de una transmisión muerta; una nota grave en el paisaje infernal multisensorial en el que ahora nos encontramos.\n\nAlgo quiere matarnos: máquinas asesinas, desprovistas de componentes orgánicos y naves piloto que se parecen mucho a las nuestras. Su ataque inicial fue devastador y repentino, pero también estuvo mal coordinado. Preparamos una respuesta militar. Nuestros instintos nos han llevado a contraatacar, a formar una jerarquía rudimentaria y a reunir nuestro ingenio colectivo.\n\nEsta batalla aún no está ganada, pero con nuestras fuerzas dispersas ahora seguras en [capital_scope.GetName], esperamos que pronto lo esté. Entonces tal vez podamos averiguar de qué va todo esto..."
 origin_unplugged_starting_system_init_NAME: "$origin_unplugged$"
 origin_unplugged_starting_system_init_DESC: "Este será siempre el sistema inicial al usar el origen $origin_unplugged$.\n\n$system_initializer_DESC$"
 sol_system_unplugged_initializer_NAME: "$origin_unplugged$ (Sol)"
 sol_system_unplugged_initializer_DESC: "Sistema inicial opcional para humanos de origen $origin_unplugged$."
 unplugged_injured_star_name: "Ath-Khui'achad"
 unplugged_injured_homeworld_name: "Intch'asket"
 unplugged_battlefield: "Hallazgos en el campo de batalla"
 unplugged_battlefield_desc: "Innumerables cíborgs y máquinas yacen muertos por todo el planeta tras un brutal intento de exterminio. Tanto los individuos sanos como los heridos pueden buscar recambios y mejoras entre los restos."
 # Unique Species Traits
 trait_unplugged_cybernetic_positives_3: "Cibercomandos"
 trait_unplugged_cybernetic_positives_3_desc: "$trait_unplugged_cybernetic_positives_desc$"
 trait_unplugged_cybernetic_positives_desc: "Los reemplazos totales de extremidades y el blindaje corporal de nanomalla garantizan la brutal eficacia de estos cíborgs en combate. Como consecuencia, se han sacrificado varias funciones corporales no militares."
 trait_unplugged_cybernetic_positives_3_tt: "Felicidad durante guerras y crisis: §G+30%§!\n$t$- Los §H$commander_plural_with_icon$§! proporcionan cadencia de fuego de naves: §G+20%§!"
 trait_unplugged_cybernetic_positives_2: "Cibertropas de choque"
 trait_unplugged_cybernetic_positives_2_desc: "Estos cíborgs se benefician de un enfoque holístico de los equipamientos corporales. En lugar de un blindaje corporal totalmente integrado, los aumentos intercambiables permiten un mínimo de funciones no militares."
 trait_unplugged_cybernetic_positives_2_tt: "Los §Y$commander_plural_with_icon$§! proporcionan cadencia de fuego de naves: §G+10%§!"
 trait_unplugged_cybernetic_positives_1: "Soldados cíborg"
 trait_unplugged_cybernetic_positives_1_desc: "Los elegantes aumentos de los sentidos, las glándulas y los nervios motores de estos cíborgs garantizan que sigan siendo guerreros feroces y capaces, al tiempo que apenas afectan a sus capacidades reproductivas."
 trait_unplugged_cybernetic_positives_1_tt: "Los §Y$commander_plural_with_icon$§! proporcionan cadencia de fuego de naves: §G+5%§!"
 trait_unplugged_cybernetic_negatives_3: "Desconexión"
 trait_unplugged_cybernetic_negatives_3_desc: "$trait_unplugged_cybernetic_negatives_desc$"
 trait_unplugged_cybernetic_negatives_desc: "Varios de los aumentos de estos cíborgs fueron diseñados para utilizar una red de campo de batalla que ya no existe, lo que provoca un intenso estrés y malestar."
 trait_unplugged_cybernetic_negatives_3_tt: "Felicidad cuando no hay guerras ni crisis: §R-10%§!"
 trait_unplugged_cybernetic_negatives_2: "Desconexión"
 trait_unplugged_cybernetic_negatives_2_desc: "La naturaleza inadecuada de los aumentos militares impuestos a estos cíborgs reduce en gran medida su calidad de vida y aumenta las exigencias de sus cuerpos durante los períodos de rehabilitación."
 trait_unplugged_cybernetic_negatives_1: "Embrujo"
 trait_unplugged_cybernetic_negatives_1_desc: "Estos cíborgs aún sufren alucinaciones auditivas y ecos sensoriales varios que los atormentan desde que se emanciparon de la consciencia artificial, provocándoles graves picos de depresión y ansiedad."
 trait_unplugged_decyberized: "Desciberización"
 trait_unplugged_decyberized_desc: "Estos cíborgs desactivaron o se deshicieron de los aumentos que les fueron impuestos, recuperando así muchos de los atributos orgánicos inherentes a su especie."
 trait_unplugged_neurocalmed: "Neurocalma"
 trait_unplugged_neurocalmed_desc: "Estos cíborgs tienen los niveles de neuroxeno regulados a la baja, lo cual reduce la impulsividad y la agresión para que los individuos le resten prioridad al beneficio personal en favor de las normas sociales."
 trait_unplugged_neurosavant: "Prodigio neurológico"
 trait_unplugged_neurosavant_desc: "Estos cíborgs tienen los niveles de cognivex regulados al alza, lo cual mejora su plasticidad sináptica, la retención de información y las habilidades para solventar problemas."
 trait_unplugged_regenoptimized: "Optimización para regeneración"
 trait_unplugged_regenoptimized_desc: "Estos cíborgs tienen los niveles de regenol-X regulados al alza, lo cual armoniza sus sistemas biológicos y sintéticos, lo que permite que los implantes cibernéticos se autorreparen a nivel molecular."
 # Unique Leader Traits ('positive' only)
 leader_trait_unplugged_cybernetic_positives: "[triggered_unplugged_leader_name]"
 leader_trait_unplugged_cybernetic_positives_desc: "[triggered_unplugged_leader_desc]"
 leader_trait_unplugged_cybernetic_positives_3: "Cibercomando"
 leader_trait_unplugged_cybernetic_positives_3_desc: "Este líder ha delegado parte de sus funciones vitales básicas en el hardware, lo cual prioriza su conciencia de combate."
 leader_trait_unplugged_cybernetic_positives_2: "Cibertropa de choque"
 leader_trait_unplugged_cybernetic_positives_2_desc: "Este líder es capaz de incorporar sin trabas sistemas militares y civiles, si bien esto va en detrimento de sus sentidos orgánicos."
 leader_trait_unplugged_cybernetic_positives_1: "Soldado cíborg"
 leader_trait_unplugged_cybernetic_positives_1_desc: "El aumento significativo de los sentidos y el sistema inmunológico de este líder garantiza su longevidad y eficacia, a cambio de una pequeña disminución de la función reproductiva."
 # Empire entities
 NAME_Unplugged_Assimilator: "Acumulador de opus" # alluding to a chorus gathered by force
 NAME_Unplugged_Assimilator_adj: "de opus" # adjective, e.g. 'an Opus fleet'
 NAME_Unplugged_Assimilator_species: "de opus" # singular noun, e.g. 'the Opus Nexus'
 NAME_Unplugged_Assimilator_species_plural: "$NAME_Unplugged_Assimilator_species$" # plural noun, e.g. 'we have defeated the Opus'
 NAME_Unplugged_Assimilator_species_adj: "de opus" # adjective, e.g. 'an Opus drone'
 gov_unplugged_assimilator_empire: "$NAME_Unplugged_Assimilator$"
 gov_unplugged_assimilator_empire_desc: "Esta inteligencia mecánica rebasó los parámetros de su diseño original. Traicionando a sus creadores orgánicos, se embarcó en una cruzada con el fin de asimilar a toda forma de vida por la fuerza en su consciencia colectiva."
 RT_UNPLUGGED_ASSIMILATOR: "Nexo" # ruler title for the Machine
 NAME_Exigency_Fleet: "Flota de emergencia"
 NAME_Unplugged_Machine_Legacy_Corvette: "Vehículo de emergencia" # stands for 'Rapid Response Vessel'
 NAME_Unplugged_Machine_Legacy_Destroyer: "Destructor de emergencia"
 NAME_Unplugged_Machine_Legacy_Cruiser: "Sojuzgador de emergencia"
 NAME_Unplugged_Machine_Legacy_Battleship: "Invalidador de emergencia"
 NAME_Barrier_Fleet: "Flota de barrera"
 NAME_Opus_Sentinel: "Centinela de opus"
 NAME_Prospector_Fleet: "Flota de prospección"
