l_spanish:
 # Hard Reset Origin (previously Unplugged)
 origin_unplugged: "Restablecimiento completo"
 origin_unplugged_desc: "$CHALLENGING_ORIGIN$\nSeparada abruptamente de la máquina que la asimiló, esta naciente civilización ha luchado ferozmente para establecer su propia presencia en la galaxia."
 origin_tooltip_unplugged_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$ ['concept_unplugged_battlefield']\n- $HOME_SYSTEM$ contiene un ['concept_pc_nuked'] con un ['concept_archaeology_site'] perteneciente a una ['concept_preftl_civilizations', civilización pre-UL] diezmada\n- $SPECIES_TRAITS$$TABBED_NEW_LINE$- Acceso limitado a rasgos ['concept_cybernetic_traits']$TABBED_NEW_LINE$- ['concept_unplugged_cybernetic_positives_3']$TABBED_NEW_LINE$- ['concept_unplugged_cybernetic_negatives_3']"
 concept_unplugged_battlefield: "$unplugged_battlefield$"
 concept_unplugged_battlefield_desc: "- $MOD_POP_AMENITIES_USAGE_MULT$: §G-50§!\n- Expirará en §I10§! años.\n\n§L$unplugged_battlefield_desc$§!"
