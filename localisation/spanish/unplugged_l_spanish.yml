 concept_heritage_civics_desc: "Los principios de $concept_heritage_civics$ consisten en \n- ['civic:civic_aristocratic_elite']$NEW_LINE$- ['civic:civic_heroic_tales']$NEW_LINE$- ['concept_pleasure_seekers_civics']$NEW_LINE$- ['concept_storm_callers_civics']$NEW_LINE$- ['concept_environmental_architects_civics']"
 civic_tooltip_not_pleasure_seekers: "No tiene un principio ['concept_pleasure_seekers_civics']"
 concept_pleasure_seekers_civics: "Buscadores de placer"
 concept_pleasure_seekers_civics_desc: "Los principios de $concept_pleasure_seekers_civics$ consisten en \n- ['civic:civic_pleasure_seekers']$NEW_LINE$- ['civic:civic_corporate_hedonism']"
 civic_tooltip_not_storm_callers: "No tiene un principio ['concept_storm_callers_civics']"
 concept_storm_callers_civics: "Invocadores de tormenta"
 concept_storm_callers_civics_desc: "Los principios de $concept_storm_callers_civics$ están compuestos por \n['civic:civic_storm_callers']$NEW_LINE$- ['civic:civic_storm_callers_megacorp']"
