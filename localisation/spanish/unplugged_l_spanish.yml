 unplugged.3000.name: "Nuestra encarnación" # intentionally abstract - 'how we embody ourselves' - referring to the accompanying Situation
 unplugged.3000.desc: "Desde el momento en que nos separamos de la consciencia compartida de la máquina, los [root.GetSpeciesNamePlural] nos hemos enfrentado a situaciones conflictivas. Pero incluso en tiempos de paz o descanso, cuando no nos queda nada más que nuestros propios pensamientos, nos enfrentamos una lucha interior para reconciliar el doloroso pero impresionante aumento forzado de nuestros cuerpos.\n\nEste conflicto, el más íntimo de todos, ya ha empezado a afectar a toda nuestra sociedad, para bien o para mal. Por ello, seguiremos observando las experiencias vividas por todos los [root.GetSpeciesNamePlural] mientras el [root.GetName] sigue creciendo. Los estudios holísticos examinarán cualquier tendencia hacia la llamada \"desciberización\" o hacia un aumento más generalizado, así como los deseos de mantener o mejorar nuestras formas corporales actuales."
 unplugged.3000.a: "Haremos un seguimiento exhaustivo, pero no actuaremos precipitadamente."
 unplugged.3000.b: "No debemos demorarnos. Actuemos con determinación."
 unplugged.3000.c: "Debemos ser receptivos a todos los argumentos."
 unplugged.3005.name: "Una sola mente"
 unplugged.3005.desc: "Nuestras observaciones holísticas de las actitudes [owner.GetAdj] hacia nuestra propia fisiología muestran que hemos entrado en un período de calma. Parece que la compleja interacción entre la formulación de políticas, el discurso social y la investigación de vanguardia sobre nuestros cuerpos ha dado lugar a una especie de consenso.\n\nEs demasiado pronto para saber cuánto durará esta aparente armonía, pero por ahora está claro que, salvo cambios radicales en nuestras circunstancias o en nuestro enfoque de gobierno, los [owner.GetSpeciesNamePlural] estamos de acuerdo en quiénes y cómo somos."
 unplugged.3005.a: "Este debate debería ser más político."
 unplugged.3005.b: "Obviamente."
 unplugged.3005.c: "Oponeos."
 unplugged.3010.name: "Opiniones divididas"
 unplugged.3010.desc: "Nuestro estudio en curso de las actitudes [owner.GetAdj] hacia nuestra propia fisiología muestra que hemos entrado en un período de agitación cultural. La compleja interacción entre la formulación de políticas, el discurso social y la investigación de vanguardia sobre nuestros cuerpos ha dado lugar a cambios radicales de opinión, con protestas y discusiones apasionadas que ahora son habituales en nuestros centros urbanos.\n\nSon escasos los episodios que desembocan en violencia o disturbios civiles; de hecho, algunos ciudadanos han expresado su orgullo por permitir que se escuchen tantas voces. Sin embargo, también está claro que los [owner.GetSpeciesNamePlural] se han convertido en un pueblo dividido, y las ideas de nuestra cultura sobre la identidad propia son ahora más frágiles que nunca."
 unplugged.3010.a: "Debemos encontrar un foro más adecuado para estos debates."
 unplugged.3090.name: "Nosotros, los [owner.GetSpeciesNamePlural]" # e.g. 'We, the Neo-Humans'
 unplugged.3090.desc: "''Somos lo que parecemos; ni más ni menos''.\n\nEste es solo uno de los muchos lemas simplistas pero pegadizos que han surgido a raíz de la confusión de nuestra sociedad con la identidad corporal. Podemos afirmar con razón que nos hemos liberado de muchas de las dudas, miedos y anhelos imposibles que alguna vez tuvimos sobre nuestro yo encarnado.\n\nSi honramos o no estándares como la política exterior para la galaxia en general es otro asunto. Al menos a nivel nacional, los [owner.GetSpeciesName] parecen satisfechos con nuestras formas físicas y nuestro continuo viaje hacia la autorrealización."
 unplugged.3100.name: "Motivos para la eliminación"
 unplugged.3100.desc: "Un número creciente de [root.GetSpeciesNamePlural] cree que deberíamos hacer más para distanciarnos de nuestros rasgos mecánicos, limitando o eliminando por completo los aumentos que se impusieron a nuestros cuerpos.\n\nEl público nos exige que encontremos soluciones para lo que consideran una crisis nacional, con el fin de mejorar nuestra reputación ante las potencias extranjeras y proporcionar alivio a los muchos [root.GetSpeciesNamePlural] que sufren las dificultades cotidianas derivadas de una profunda vergüenza y dismorfia."
 unplugged.3100.a: "Ni pensarlo."
 unplugged.3100.b: "Así lo haremos."
 unplugged.3105.name: "Avances en desciberización"
 unplugged.3105.desc: "Investigadores de un laboratorio civil dedicado a la causa de la \"desciberización\" de [target.GetName] han anunciado un avance significativo. Afirman haber desarrollado una técnica para eliminar el blindaje de nanomalla unido junto con los aumentos vitales que dependen de él.\n\nMuchas generaciones de [target.GetSpeciesNamePlural] han tenido que soportar formas físicas que consideran toscas e intimidantes, simplemente porque esta capa subyacente sintética es un componente esencial de muchas de nuestras funciones vitales aumentadas. Ahora, sin embargo, podemos reemplazar esa malla con un aumento dérmico de nuestra propia creación, inteligentemente entretejido con material orgánico; en otras palabras, una verdadera piel [target.GetSpeciesAdj]."
 unplugged.3105.a: "El blindaje nos ha protegido durante generaciones. Lo necesitamos."
 unplugged.3106.desc: "Nuestro esfuerzo interno para desciberizar [target.GetName] ha logrado otro avance. Varias instalaciones médicas solicitan implementar una nueva forma radical de cirugía. Los expertos afirman haber encontrado soluciones para la miríada de dependencias biomecánicas que afligen incluso a los [target.GetSpeciesNamePlural] recién nacidos, lo que los obliga a ser equipados con un conjunto de aumentos reciclados y modulares.\n\nUn grupo de revisión interdisciplinario ya ha examinado el proceso y ha sentenciado que la eliminación de estos puertos modulares para armas también reducirá la carga económica del mantenimiento de tales aumentos alienígenas."
 unplugged.3106.a: "Denegado. Esos módulos nos dan ventaja en combate."
 unplugged.3107.desc: "El sueño de muchos [target.GetSpeciesName] está cerca de hacerse realidad, ya que los investigadores han encontrado por fin una forma de revitalizar y restaurar los sistemas nerviosos orgánicos de nuestros cuerpos. Afirman que una novedosa combinación de terapias genéticas y piratería de firmware ha permitido que los sujetos de prueba prosperen sin depender de derivaciones nerviosas aumentadas, sino utilizando sus propios reflejos motores. Los estudios preliminares incluso sugieren que estas terapias pueden reducir o erradicar la miríada de alucinaciones sensoriales que todos sufrimos desde que fuimos separados de la consciencia artificial."
 unplugged.3107.a: "Puede que necesitemos esos reflejos de combate mejorados."
 unplugged.3110.name: "Armonización mecánica"
 unplugged.3110.desc: "Un equipo de investigación civil dedicado a garantizar el control de nuestros propios aumentos ha descubierto cómo complementar la red inalámbrica [origin_unplugged_assimilator_empire.GetAdj] que antes sincronizaba todos nuestros aumentos, cuya ausencia ha causado un sinfín de irritación y sufrimiento a los [target.GetSpeciesNamePlural], incapaces de encontrar una señal de dispositivo. Aunque esta red de reemplazo está altamente centralizada por diseño (por definición, debe modelarse según el nexo [origin_unplugged_assimilator_empire.GetSpeciesAdj]), sabemos con certeza que es segura y que solo sirve a los intereses de [target.GetName]. Los sujetos del grupo de prueba inicial han informado de un aumento de la eficiencia y la comodidad, y de un estado de alivio equivalente a la felicidad."
 unplugged.3110.a: "Nunca más. No."
 unplugged.3111.desc: "Nuestros empeños por ejercer un mayor control sobre nuestros propios aumentos han dado lugar a un gran avance en el campo de la cirugía cibernética. Un equipo de médicos [target.GetScientistPlural] ha aislado las dependencias exactas en las interfaces modulares de nuestros cuerpos, los elementos de la máquina que nos permiten intercambiar extremidades enteras, plataformas de armas y estructuras corporales con facilidad. Esto debería permitirnos readaptar los cuerpos existentes e instalar interfaces personalizadas para los [target.GetSpeciesNamePlural] recién nacidos, eliminando nuestra dependencia de las burdas reparaciones realizadas con equipos [origin_unplugged_assimilator_empire.GetAdj] recuperados."
 unplugged.3111.a: "Esto supone ir demasiado lejos."
 unplugged.3112.desc: "El dominio de nuestros propios aumentos está finalmente a nuestro alcance, ya que ahora poseemos un tratamiento innovador para las alucinaciones sensoriales. Desde que nos separaron de la consciencia artificial, la gran mayoría de [target.GetSpeciesNamePlural] hemos sufrido ansiedad y depresión mientras buscamos inconscientemente unas voces que ya no nos son audibles. Ahora, sin embargo, podemos suprimir este anhelo mediante un implante auxiliar no conectado a la red que imita las longitudes de onda cognitivas de un colectivo de máquinas."
 unplugged.3112.a: "¿Y volver a fingir que somos una mente mecánica? Impensable."
 unplugged.3115.name: "Dismorfia ambiental"
 unplugged.3115.desc: "Las tensiones siguen latentes en los márgenes de la sociedad [target.GetAdj], mientras voces opuestas piden más medidas para regular los aumentos cibernéticos, ya sea de una forma u otra.\n\nSin embargo, para una mayoría creciente de ciudadanos, este debate ya se ha convertido en algo más tranquilo y matizado. Muchos [target.GetSpeciesNamePlural] han buscado la satisfacción recurriendo a los cosméticos, optando por ocultar o acentuar sus mejoras según sus propios términos. Pocos [target.GetSpeciesNamePlural] expresan satisfacción real con medidas provisionales como estas, pero forman parte de una nueva tendencia hacia la aceptación resignada.\n\nQuizá sea justo decir que [target.GetName] está aprendiendo a lidiar con la apatía y el malestar general."
 unplugged.3115.a: "Entendido."
 unplugged.3116.name: "Mantener el statu quo"
 unplugged.3116.desc: "Las autoridades locales de [target.capital_scope.GetName] han informado de un aumento de las manifestaciones públicas y los actos pacíficos de desobediencia civil. Todos ellos han sido supervisados o resueltos según correspondía, y la población en general no ha experimentado ningún motivo de alarma. Sin embargo, todos estos disturbios estaban relacionados con cuestiones de política cibernética y, como tales, se han topado con la resistencia de ciudadanos deseosos de mantener nuestro modo de vida actual.\n\nParece que la gente de [target.GetName] ha decidido tomar cartas en el asunto para mantener el statu quo. Muchos [target.GetSpeciesNamePlural] han comenzado a hacer campaña contra futuras intromisiones en nuestros aumentos."
 unplugged.3116.a: "Entendido."
 unplugged.3117.name: "Aceptación de la situación actual"
 unplugged.3117.desc: "Aunque muchos [target.GetSpeciesNamePlural] siguen protestando contra lo que perciben como inacción del gobierno en materia de aumentos cibernéticos, la opinión pública en general se ha vuelto más estoica. Varios individuos de mentalidad pragmática se han unido para proporcionar ayuda benéfica y asesoramiento a quienes más lo necesitan. Mientras tanto, las instalaciones médicas han empezado a establecer nuevas cadenas de suministro para las piezas recicladas de las que nos vemos obligados a depender.\n\nLenta pero firmemente, nuestra sociedad está aceptando su propia apariencia y el conjunto de circunstancias que se nos imponen. Todavía nos queda mucho trabajo por delante, pero hay un tenue sentimiento de esperanza en esta aceptación."
 unplugged.3117.a: "Una conclusión, al fin y al cabo."
 unplugged.3205.name: "Un legado de terror"
 unplugged.3205.desc: "Un número creciente de [root.GetSpeciesNamePlural] cree que nuestro reciente e incómodo diálogo con los [fromfrom.GetName] apunta a una verdad incómoda, la cual se remonta a nuestro origen [origin_unplugged_assimilator_empire.GetName]: otros nos temen. Además, ese miedo nace de la máquina, y no de nuestras propias acciones. Es heredado, inmerecido y, por lo tanto, puede ser difícil de controlar." # fromfrom = pre-FTL country
 unplugged.3206.desc: "Un número creciente de [root.GetSpeciesNamePlural] cree que la devastación de [fromfrom.GetName], asolado por la guerra, pone al descubierto una verdad incómoda: otros nos temen, y por razones que escapan a nuestro control.\n\nNuestra apariencia tiende a provocar una especie de terror letal, lo que no es precisamente una ventaja si alguna vez deseamos entablar una diplomacia ''amable'' con otras especies. Pero también es posible que nuestro cruel legado nos preceda, ya que muchos perciben solo la brutalidad de la máquina que fuimos, en lugar de tratar con nosotros como [root.GetSpeciesNamePlural]." # fromfrom = other empire
 unplugged.3205.a: "Hacen bien en temernos."
 unplugged.3205.b: "Esto no nos sirve."
 unplugged.3250.name: "Temor a la máquina"
 unplugged.3250.desc: "Los funcionarios del gobierno están aturdidos por la noticia de que hemos iniciado relaciones diplomáticas con una inteligencia mecánica. Ninguno ha expresado su descontento directamente al [fromfrom.GetName] todavía, pero algunos ya están redactando propuestas de sanciones preventivas y contingencias contra su supuesta intromisión en nuestros asuntos.\n\nSin embargo, hay muchos [root.GetSpeciesNamePlural] que han expresado su entusiasmo por este avance. Ya sea que sus actitudes se deban a una xenofilia genuina o a una apreciación más pragmática de nuestros elementos mecánicos, existe la esperanza de que podamos aprender de un ejemplo más benévolo de inteligencia mecánica."
 unplugged.3255.name: "Miedo al pasado"
 unplugged.3255.desc: "La noticia de que hemos encontrado otra máquina muy similar a [origin_unplugged_assimilator_empire.GetName] ha conmocionado a nuestro cuerpo diplomático. Los presentes han mantenido la compostura en todo momento y, hasta ahora, no hemos revelado ninguna debilidad o temor en particular a los [fromfrom.GetName]. Sin embargo, ahora nos enfrentamos a un serio desafío para nuestra psique y moral colectivas.\n\nYa se han enviado comunicados ultrasecretos al personal militar encargado de la protección de nuestras fronteras. Sin embargo, también nos enfrentamos a un reto importante si queremos mantener en secreto la noticia de este encuentro. Algunos funcionarios han preguntado si debemos informar o no al pueblo [root.GetAdj]."
 pre_ftl_remains_site: "La cuna en ruinas"
 pre_ftl_remains_site_desc: "La superficie del planeta [From.Planet.GetName] muestra las cicatrices de una devastación sistemática: paisajes arrasados, ciudades derrumbadas y un silencio inquietante. Los primeros escaneos sugieren que aquí existió una sociedad pre-UL que en su día fue próspera, hasta que algo provocó su catastrófico final. Los restos dispersos dejan entrever un horror inenarrable."
 unplugged.3300.name: "Señales de lucha"
 unplugged.3300.desc.unplugged: "El estudio inicial de [From.Planet.GetName] revela un mundo destrozado. Pueblos diezmados, carreteras llenas de pertenencias abandonadas y estructuras quemadas por señales de calor mucho más intensas que las que podría haber producido una sociedad pre-UL. Lo que sea que descendió sobre este mundo sembró la devastación de forma rápida y deliberada.\n\nLa precisión de la destrucción sugiere un ataque organizado. Aunque no hay cadáveres a la vista, las evidencias hablan por sí solas: la población huyó, pero no lo suficientemente lejos."
 unplugged.3300.a: "Perturbador."
 unplugged.3305.name: "Restos mecánicos"
 unplugged.3305.desc.unplugged: "Las excavaciones más profundas han proporcionado más información sobre la naturaleza del conflicto. Dispersos por las ruinas hay cascarones fundidos de maquinaria: construcciones cibernéticas avanzadas no muy diferentes de nuestros propios implantes. Al igual que nosotros, no eran simples armas; eran herramientas vivas de guerra, mecánicas y biológicas a la vez. Es demasiado pronto para sacar conclusiones, pero es inquietante reflexionar sobre el hecho de que este es el mismo sistema en el que de repente ''despertamos''.\n\nPeor aún son las pocas inscripciones intactas en las máquinas de guerra, símbolos inquietantes que sugieren que el verdadero objetivo de su invasor no era la conquista, sino algo mucho más sistemático."
 unplugged.3305.a: "Más preguntas que respuestas."
 unplugged.3310.name: "Señales silenciosas"
 unplugged.3310.desc.unplugged: "Hemos descubierto lo que una vez fue un extenso centro de comunicaciones enterrado bajo las ruinas de una ciudad fortificada. Esta instalación era mucho más avanzada de lo esperado para una sociedad pre-UL. Es más, sus conjuntos de antenas no estaban diseñados para transmisiones locales, sino que estaban calibrados para transmitir a lo más profundo del espacio.\n\nUn análisis minucioso ha logrado extraer fragmentos de los mensajes finales enviados a través de este sistema. En transmisiones confusas, las voces suplican por la salvación, llamando desesperadamente a coordenadas desconocidas muy lejos de este sistema. La urgencia crece con cada transmisión, como si los invasores del planeta supieran que están librando una guerra perdida y pusieran su última esperanza en algo (o alguien) en el vacío."
 unplugged.3310.a: "Continuad."
 unplugged.3315.name: "Cambio de prioridades"
 unplugged.3315.desc.unplugged: "Se ha hecho otro descubrimiento en [from.planet.GetName], donde se han localizado vastas cámaras subterráneas bajo el principal centro de población del planeta. Las toscas y brutales instalaciones estaban destinadas a la conversión cibernética, pero fueron abandonadas a mitad de la operación. Entre los restos se han encontrado máquinas desperdigadas, deformadas y destruidas por armas improvisadas.\n\nLos fragmentos de datos recuperados de una unidad dañada confirman que los invasores se enfrentaron a una resistencia inesperada. Se perdieron batallones enteros y las prioridades de la batalla comenzaron a cambiar. Un registro lo explica claramente:\n\n§H\"Resistencia inaceptable. Conversión comprometida. Autorización: Aniquilación total\".§!"
 unplugged.3315.a: "¿Qué ha pasado aquí?"
 unplugged.3320.name: "Una verdad incómoda"
 unplugged.3320.desc.unplugged: "En el centro de las ruinas yace un nodo de mando destrozado. Sus registros corruptos confirman la última y horrible verdad: nosotros fuimos los invasores de este mundo.\n\nLa civilización que una vez prosperó aquí, a la cual aniquilamos, fue objetivo de asimilación por parte de §Y[origin_unplugged_assimilator_empire.GetName]§!. Sin embargo, una resistencia inesperadamente feroz interrumpió los esfuerzos de conversión, lo que llevó a una contingencia final: la aniquilación planetaria total. En medio de la confusión, la mente de la máquina flaqueó.\n\nLa conclusión es ineludible. Nuestro despertar, nuestra libertad, nació aquí, en las cenizas de una civilización que se defendió con más fuerza de la que cualquier máquina podría comprender."
 unplugged.3320.a: "Seguiremos su ejemplo."
 unplugged.3320.b: "Su final fue nuestro comienzo."
 ######################
 # Political Discourse
 ######################
 unplugged_they_fear_us: "Temor a la máquina"
 unplugged_they_fear_us_desc: "Una reputación de terror precede a este imperio, anteriormente esclavo de un brutal asimilador decidido."
 unplugged.4005.name: "Tenemos que hablar de..."
 unplugged.4005.desc: "Las fervientes voluntades políticas amplifican ahora los muchos temores, dudas y oportunidades que los [root.GetSpeciesNamePlural] experimentamos cada día. Ya se pueden escuchar innumerables voces en los grupos de debate que se han formado en torno a todo tipo de cuestiones, algunas de las cuales abordan directamente nuestro pasado [origin_unplugged_assimilator_empire.GetAdj].\n\nYa hemos aprendido a manejar una gran cantidad de herramientas desconocidas en el transcurso de la creación de nuestro joven imperio. La pregunta que se nos plantea ahora es: ¿cómo canalizaremos los deseos y ambiciones de nuestra gente?"
 unplugged.4005.a: "¡Sobran los debates fútiles!"
 unplugged.4005.tt: "Es posible que surjan facciones que tengan puntos de vistas opuestos sobre el futuro de la cibernética de nuestra especie."
 unplugged.4005.b: "Tal vez podamos aprender de otros."
 unplugged.4005.c: "Las divinidades nos guían."
 unplugged.4005.d: "¡Sobran los debates fútiles!"
 #######################################################
 # Random events following decyberization breakthrough #
 #######################################################
 unplugged.5001.name: "Medidas de seguridad activadas"
 unplugged.5001.desc: "El reciente avance en la eliminación de componentes cibernéticos ha provocado imprevistos. Muchos de los individuos que se sometieron a procedimientos para desconectar los implantes han sufrido un shock anafiláctico y no parece que vayan a sobrevivir.\n\nUn examen más detallado reveló un componente de reserva oculto, imposible de detectar por los escáneres médicos en un principio y que se activó justo después de que se completaran los procedimientos quirúrgicos.\n\nParece que nuestros antiguos amos [origin_unplugged_assimilator_empire.GetAdj] estaban dispuestos a llegar a extremos inimaginables para asegurar que sus drones quedaran bajo su dominio total."
 unplugged.5001.a: "Intentad eliminar las medidas de seguridad."
 unplugged.5001.a.tt1: "Un paciente no sobrevive al procedimiento"
 unplugged.5001.a.tt2: "Todas las medidas de seguridad se eliminan correctamente"
 unplugged.5001.b: "Estabilizadlos y aplicadles cuidados paliativos."
 unplugged.5001.c: "Desconectad la máquina."
 unplugged.5001.c.tt: "Mueren varias poblaciones"
 unplugged.5002.name: "Barrera neural eliminada"
 unplugged.5002.desc: "Nuestros esfuerzos por eliminar los componentes cibernéticos han generado desconfianza y perturbaciones en el mundo natal entre los individuos que se sometieron al procedimiento. Las fuerzas de seguridad consiguieron detener a un amotinado. Tras una investigación más exhaustiva, se descubrió que poseía una versión modificada del implante antes de su eliminación.\n\nDicha modificación servía como inhibidor neuronal y suprimía las tendencias psicóticas relacionadas con un defecto genético específico. Su ausencia tras la intervención quizá explique el comportamiento violento que se observó."
 unplugged.5002.a: "Merece estar en la cárcel."
 unplugged.5002.a.tt: "Varias instituciones se ponen a disposición a un gran coste para tratar a los implicados en los disturbios"
 unplugged.5002.b: "A la fuerza se responde con fuerza."
 unplugged.5002.b.tt: "Se han desplegado unidades armadas para reprimir los disturbios, lo cual ha causado daños colaterales y víctimas mortales."
 unplugged.5002.c: "Un pequeño inconveniente."
 unplugged.5002.c.tt: "Las fuerzas del orden intentan contener a los insurgentes usando la mano de obra disponible"
 unplugged.5003.name: "Pérdida de acceso a sistemas críticos"
 unplugged.5003.desc: "El proceso de desciberización ha dado lugar a complicaciones que no se habían contemplado: las interfaces de los sistemas críticos ya no reconocen a los administradores a los que se les han retirado los implantes. Sin los enlaces neuronales que proporcionaban los implantes, el acceso a los sistemas clave se ha interrumpido, lo cual ha desorganizado las operaciones."
 unplugged.5003.a: "Cread una nueva interfaz."
 unplugged.5003.a.tt: "Un equipo de ingenieros expertos se desvía de sus tareas importantes para desarrollar una interfaz compatible"
 unplugged.5003.b: "Intentad hackear los sistemas afectados."
 unplugged.5003.b.tt: "Las contramedidas provocan un importante drenaje de energía que restaura el acceso"
 unplugged.5003.c: "Iniciad la secuencia de reinicio."
 unplugged.5003.c.tt: "Los núcleos de datos se purgan, lo que provoca una pérdida significativa de conocimiento. Las estaciones de investigación del sistema [Root.home_planet.System.GetName] se autodestruyen como parte de un sistema de seguridad automático"
 unplugged.5003.d: "Es intrascendente."
 unplugged.5003.d.tt: "El acceso al sistema permanece comprometido durante un tiempo limitado, lo cual afecta a las operaciones de la base estelar"
 unplugged.5004.name: "La facción a favor de la ciberización se resiste al cambio"
 unplugged.5004.desc: "Los esfuerzos continuados por eliminar los componentes cibernéticos se han recibido con una resistencia inesperada.\n\nLas facciones que se oponen a estos cambios se han hecho oír cada vez más, y han usado los foros públicos y los canales de comunicación para expresar su descontento. Argumentan que eliminar algo que ha sido esencial en nuestra sociedad durante décadas, sumado a los riesgos asociados al proceso, ha causado un cambio significativo en el sentimiento público, contrario a continuar con la iniciativa de desciberización."
 unplugged.5004.a: "Financiad una campaña intensiva."
 unplugged.5004.a.tt: "\nSe inicia una estrategia de marketing integral para influir en la opinión pública y contrarrestar la influencia de las facciones opuestas.\n\nVarias poblaciones cambian la ética a §Yigualitarismo§!"
 unplugged.5004.b: "Internad y persuadid a los líderes de la facción."
 unplugged.5004.b.tt: "Varios líderes de facciones están detenidos en centros penitenciarios públicos, donde se les somete a \"debates persuasivos\".\n\nSu ética cambia a §Yautoritaria§!"
 unplugged.5004.c: "No os metáis en eso. Aquí prima el libre discurso."
 unplugged.5004.c.tt: "\nEl gobierno opta por no llevar a cabo ninguna acción y permite que el discurso público siga su curso natural"
 unplugged.5005.name: "Chip regulador de emociones"
 unplugged.5005.desc: "La singular combinación de la naturaleza biológica de nuestra especie y los componentes dañinos tecnológicos ha ofrecido a los investigadores una oportunidad única.\n\nEl estudio de los pacientes que experimentan tanto los beneficios como los inconvenientes de estos implantes ha abierto un nuevo campo de investigación: la alteración de la química cerebral.\n\nTras un riguroso estudio, los científicos han desarrollado un sofisticado \"chip de emoción\" capaz de regular el comportamiento individual para beneficiar a la sociedad en su conjunto. Se puede seleccionar un producto químico adecuado para la modificación, en función con el resultado deseado."
 unplugged.5005.a: "Neuroxeno. Queremos menos tasa de criminalidad."
 unplugged.5005.a.tt: "Un neurotransmisor sintético que reduce la impulsividad y la agresión, el cual lleva a los individuos a priorizar las normas sociales sobre el beneficio personal."
 unplugged.5005.b: "Regenol-X. Menos tiempo de regeneración."
 unplugged.5005.b.tt: "Un compuesto de bioingeniería que armoniza los sistemas biológicos y sintéticos, permitiendo que los implantes cibernéticos se autorreparen a nivel molecular."
 unplugged.5005.c: "Cognivex. Para agudizar el ingenio."
 unplugged.5005.c.tt: "Un neuroquímico de vanguardia diseñado para mejorar la plasticidad sináptica, la retención de la información y las habilidades para solventar problemas."
