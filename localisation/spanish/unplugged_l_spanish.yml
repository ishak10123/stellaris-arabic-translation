 # tooltips for related events:
 situation_unplugged_change_trend_tt: "Podemos cambiar la tendencia de la situación §Y$situation_unplugged_identity$§! si apoyamos las facciones de la población que están en contra de la tendencia actual y adoptamos la postura \"Apoyar tendencia\"."
