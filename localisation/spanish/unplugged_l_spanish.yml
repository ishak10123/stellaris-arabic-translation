 situation_unplugged_identity: "Identidad incorporada"
 situation_unplugged_identity_desc: "Tras librarnos del yugo del [origin_unplugged_assimilator_empire.GetName], hemos de decidir cómo presentarnos ante la galaxia. ¿Aceptamos el temible poder de la máquina, o nos despojamos de nuestros estigmatizados aumentos? Muchas voces [owner.GetSpeciesAdj] desean pronunciarse."
 situation_unplugged_identity_type: "Situación de identidad incorporada"
 unplugged_identity_stage_1: "Desciberización" # describes an outcome of the Situation
 situation_unplugged_stage_decyberize: "Rechazamos nuestros aumentos, así como el poder y el temor que imponen."
 unplugged_identity_stage_2: "Statu quo" # describes an outcome of the Situation
 situation_unplugged_stage_remain: "Nos reconocemos y nos aceptamos tal como somos."
