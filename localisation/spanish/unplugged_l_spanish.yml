 # Civil War
 ############
 # Civil War & 'The Injured'
 unplugged.100.name: "La victoria es nuestra"
 unplugged.100.desc: "Tan pronto como despertamos en este universo, estas máquinas violentas trataron de eliminarnos del mismo. Sin embargo, hemos resultado ser más competentes que ellas en el uso de la violencia.\n\nHoy, quienes se dan a conocer como §Y[origin_unplugged_assimilator_empire.GetName]§! han sufrido un brutal revés. Según los datos recabados, su imperio se ha fragmentado hasta quedar irreconocible, pero cuesta creer que se deba a esta nimia escaramuza. Es poco lo que sabemos por ahora, pero hay algo, un pálpito si es que así puede llamarse, que nos suscita recelo.\n\nAunque nuestros sensores no detectan más naves hostiles en las inmediaciones, el planeta §Y[origin_unplugged_pre_ftl_planet.GetName]§! de este sistema emana niveles de radiación altos.\n\nTambién se han detectado flotas en los sistemas vecinos que, al parecer, mantienen sus posiciones."
 unplugged.100.a: "¿A dónde vamos ahora?"
 unplugged.100.b: "Y si algo nos falta, lo tomaremos."
 unplugged.100.c: "Hora de poner a prueba nuestra inventiva."
 unplugged.100.d: "Que los entes divinos nos guarden."
 opinion_unplugged_injured_diplomacy: "Belicistas civiles"
 opinion_unplugged_injured_distrustful: "$pre_ftl_distrustful$"
 # Dialog
 unplugged.115.desc: "...ludos de nuevo, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Claudicamos. ¿Deseáis discutir las condiciones de nuestra rendición? ¿Por eso han cesado vuestros ataques?\n\nOs suplicamos clemencia; nuestra sociedad está en ruinas y reconocemos la derrota. Indicadnos cómo debemos proceder." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.pacifist: "...ludos de nuevo, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Estamos preparados para discutir las condiciones de nuestra rendición. ¿Es...? ¿Es ese el motivo por el que han cesado vuestros ataques?\n\n¡Indicadnos cómo proceder, por favor! Abandonamos toda resistencia y nuestro único deseo es coexistir en paz." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.phobe: "...ludos de nuevo, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Claudicamos. ¿Deseáis que nos rindamos? ¿Por eso han cesado vuestros ataques?\n\nIndicadnos cómo proceder, os lo suplicamos. Nuestra sociedad está en ruinas y tan solo deseamos paz." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.a: "Sí, aceptamos vuestra rendición."
 unplugged.115.b: "¡¿\"[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]\"?!" # incredulous that they are calling us that species name, e.g. ... 'Killbots'?!
 unplugged.116.desc: "¿[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]? ¿Nos...?\n\n(¡Todo apunta a que nos reciben, sí! Ah, por los astros. Como no dispongan de herramientas de traducción, no habrá esperanza para lo poco que queda de nuestra civilización...).\n\n¡¿[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]?! ¿Nos entendéis? ¡Contestad, por favor! No deseamos desavenencias entre nuestros pueblos."
 unplugged.116.b: "¡¿Nos tomáis por los [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]?!" # incredulous that they are calling us that species name, e.g. 'You think we are the Killbots?!''
 unplugged.120.desc: "Gracias, gracias. Nos arrodillamos ante vuestra misericordia, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Se me ha conferido el privilegio de hablaros en nombre de todo el pueblo [injured_country.GetName] a fin de acordar las condiciones de nuestra rendición.\n\nHemos perdido a gran parte de nuestra población y muchas de nuestras ciudades han quedado inhabitables. La honradez me obliga a confesaros que poco podemos ofreceros ya que no nos hayáis arrebatado. Os imploramos que lo tengáis en cuenta. De vuestra indulgencia dependen nuestras vidas."
 unplugged.120.desc.spiri: "¡Benditos sean los astros! Nos arrodillamos ante vuestra misericordia, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Se me ha otorgado el privilegio de hablaros en nombre de todo el pueblo [injured_country.GetName] a fin de acordar las condiciones de nuestra rendición.\n\nSon inmensas las pérdidas que hemos sufrido, por ello nos postramos ante la magnificencia de vuestro imperio. ¿Qué exigencias presentáis? De vuestra indulgencia dependen nuestras vidas."
 unplugged.120.desc.mil_phobe: "Gracias, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural], por vuestra honorable disposición. Se me ha otorgado el privilegio de hablaros en nombre de todo el pueblo [injured_country.GetName] a fin de acordar las condiciones de nuestra rendición.\n\nHabéis asestado un golpe brutal a nuestra sociedad, y os... agradecemos esta tregua. De vuestra indulgencia dependen ahora nuestras vidas."
 unplugged.120.a: "Insistís en llamarnos [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. ¿Por qué?"
 unplugged.120.b: "Y con vuestras vidas pagaréis."
 unplugged.120.b.tt: "§LFin de la transmisión.§!\n\n"
 unplugged.120.c: "Vamos a deliberar. Aguardad nuestro próximo comunicado."
 unplugged.120.c.tt: "§LFin de la transmisión.§!\nPodríamos restablecer las frecuencias de contacto si construimos un §Ypuesto de observación§! en [injured_homeworld.GetName].\n\n"
 unplugged.125.desc: "¿Qué es esto, una trampa? ¿Un chiste cruel?\n\nHace meses, nuestros monitores estimaron la llegada de vuestra flota. Intentamos entablar contacto, ¡y nos invadisteis en lugar de responder! Yo, sin ir más lejos, logré escapar de milagro de cuatro ataques aislados... Oleadas de naves de desembarco, repletas de robots e individuos aumentados como vosotros. Y, de repente, vuestras máquinas dejaron de invadirnos.\n\nNuestra civilización no es tan avanzada como la vuestra, pero, aun así, esta situación nos resulta desconcertante. Ilustradnos, os lo ruego: ¿qué intenciones tenéis y por qué seguís aquí?"
 unplugged.125.a: "Somos [root.GetSpeciesNamePlural]. Hemos vencido a los [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]."
 unplugged.125.b: "Debemos deliberar." # also shows 'unplugged.120.c.tt'
 unplugged.130.desc: "¿[root.GetSpeciesNamePlural]?\n\nNuestro pueblo no está en condiciones de agradeceros mucho, pero sabed que nos alegra ver zanjadas vuestras rencillas. Asimismo, es un alivio hablar por fin con... En fin, con una persona.\n\nSin embargo, nuestra situación no ha cambiado gran cosa. [root.GetSpeciesName], [origin_unplugged_assimilator_empire.GetSpeciesName]... Seguimos en las mismas. La vuestra es la primera civilización alienígena que conocemos, y habéis intentado exterminarnos. Luego detuvisteis el exterminio para enfrentaros entre vosotros, y por poco no habéis acabado con nosotros igualmente.\n\nDisculpad la franqueza, pero ¿ahora pretendéis que os tratemos de amigos?"
 unplugged.130.a: "Exacto. ¿Cómo os podemos ayudar?"
 unplugged.130.b: "Sí. Por ahora."
 unplugged.130.c: "No nos agrada vuestra impertinencia." # also shows 'unplugged.120.b.tt'
 unplugged.131.desc: "Bien. Es todo un alivio no ser objeto de vuestra furia.\n\nNos gustaría que destinaseis vuestra tecnología superior a procurarnos una infraestructura de comunicaciones. Puesto que nuestros caminos convergen, nos gustaría mantener abierto este canal diplomático.\n\nNosotros, por nuestra parte, nos comprometemos a brindaros toda la ayuda que podamos, por insignificante que esta os pueda resultar, una vez reconstruido nuestro hogar y llorados nuestros muertos. Si tenéis por costumbre hacer lo mismo, confiamos en que vuestros propios homenajes a los caídos os brinden cierta sensación de claridad.\n\nBrindamos por un futuro de armonía, [root.GetSpeciesNamePlural] y, tanto por vuestro bien como por el nuestro, esperamos que los [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] ya no sean más que un mal recuerdo..."
 unplugged.131.a: "Gracias, [injured_country.GetSpeciesNamePlural]." # also shows 'unplugged.120.c.tt'
 unplugged.131.b: "Cierto..." # also shows 'unplugged.120.c.tt'
 ###################
 # 'Machine Legacy'
 ###################
 unplugged_origin_machine_legacy_chain_title: "El legado de la máquina"
 unplugged_origin_machine_legacy_chain_desc: "La máquina que asimilara por completo a nuestra especie se ha desguazado. A nuestras espaldas queda una estela humeante de dominación y brutalidad. ¿Qué era [origin_unplugged_assimilator_empire.GetName] y qué papel desempeñábamos en sus funestas maquinaciones?"
 signals_followed: "Señales investigadas"
 # System 1: 'The Makers'
 unplugged.2000.name: "Sosegado ambiente disonante"
 unplugged.2000.desc: "En la radiación cósmica que envuelve nuestra estrella, [capital_scope.star.GetName], se percibe una tenue señal portadora.\n\nHemos aislado una frecuencia de sonido que se caracteriza por perturbadores tonos graves y cierta distorsión de fondo. Todos los individuos [root.GetSpeciesAdj] que han oído la frecuencia dicen encontrarla agradable y conocida, aunque nadie se explica el porqué. Sospechamos que puede ser cosa de [origin_unplugged_assimilator_empire.GetName].\n\nAl parecer, la señal procede del sistema §Y[origin_unplugged_maker_planet.solar_system.GetName]§!, y así lo reflejan ya nuestras cartas estelares."
 unplugged.2000.a: "Deberíamos investigar."
 unplugged_machine_legacy_makers_poi: "Cacofonía relajante"
 unplugged_machine_legacy_makers_poi_desc: "Una secuencia de sonidos que podrían casi catalogarse \"de ambiente\", relajantes y evocadores, se está retransmitiendo desde algún punto del sistema [origin_unplugged_maker_planet.solar_system.GetName]."
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT: "Legado de la máquina"
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT_DESC: "En cuanto hemos ejecutado un escaneo orbital de [from.GetName], a nuestros sistemas ha llegado una lluvia de actualizaciones de firmware beneficiosas. Nuestra nave ahora funciona mejor que antes, pero la naturaleza de estos paquetes de datos sugiere que este mundo alguna vez perteneció a §H[origin_unplugged_assimilator_empire.GetName]§!."
 MACHINE_LEGACY_MAKERS_CAT: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 MACHINE_LEGACY_MAKERS_CAT_DESC: "Nuestros escaneos iniciales de [from.GetName] sugieren que este planeta es rico en tecnología descartada, pero que fue abandonado no hace tanto. Pulsaciones eléctricas aún recorren toda la esfera, y nuestras sondas remotas aún no logran recabar datos estables. ¿Qué misterios nos aguardarán tras la bruma que suponen estos intrincados campos electromagnéticos?"
 unplugged.2005.name: "El legado [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2005.desc: "Ahora son muchos más los nodos electromagnéticos que chisporrotean por toda la superficie de [fromfrom.GetName]. Estos campos de electromagnetismo son el resultado de catastróficas subidas de tensión que han arrasado varias fábricas y astilleros. Nuestros [controller.GetScientistPlural] han conseguido anular uno de estos campos solo para descubrir que la instalación está dañada sin posibilidad de reparación.\n\nLas fábricas que cubren este mundo, que creemos que fue un centro de fabricación de §H[origin_unplugged_assimilator_empire.GetName]§!, han identificado a la [root.GetName] como una nave aliada. Sin embargo, después de transmitir una actualización de firmware a nuestra nave, la conexión se ha interrumpido y varias centrales de energía de la zona han fallado en cascada.\n\nEs posible que el detonante haya sido un eco de la partición de la máquina que aún albergamos en nuestro ser, pero aún no sabemos cómo ni por qué. Por el momento, y puesto que el riesgo de accidente ya no es tanto, se nos presenta la oportunidad de indagar qué fabricaba aquí [origin_unplugged_assimilator_empire.GetName] y, con suerte, qué función desempeñábamos cuando su voluntad era cuanto conocíamos."
 unplugged.2005.a: "Que comiencen las excavaciones en las ruinas."
 unplugged.2006.name: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 unplugged.2006.desc: "Los impulsos eléctricos que observamos en [from.GetName] son el resultado persistente de un extraño evento de extinción de las máquinas. Hubo que modificar nuestros sensores para compensar los índices de electromagnetismo desproporcionados, o no habríamos podido observar los estragos en toda su magnitud. Al parecer, las máquinas colonizaron el planeta hace décadas, desplazando o erradicando a la civilización que lo habitaba. Hoy no quedan supervivientes de ninguno de aquellos imperios, y prácticamente todo el asentamiento quedó reducido a escombros a causa de sabotajes o contiendas.\n\nA pesar de la sofisticación que manifiesta la colonia que existía aquí, poco podremos aprovechar. Se calcula que los campos electromagnéticos se diluirán dentro de un siglo, aproximadamente. Hasta entonces, [from.GetName] será un cementerio tan peculiar como inhóspito."
 machine_legacy_makers_site: "Ajustes de fábrica"
 machine_legacy_makers_site_desc: "Una subida de tensión catastrófica azotó hace no mucho este inmenso centro industrial, uno de varios cuya producción abastecía a [origin_unplugged_assimilator_empire.GetName]. A su paso, nuestra expedición se esforzará por descubrir cómo surgieron estas instalaciones, rescatar cualquier activo tecnológico que aún pueda quedar y, con suerte, descubrir qué papel desempeñó este lugar en nuestro pasado reciente."
 unplugged.2010.name: "Planta industrial"
 unplugged.2010.desc.unplugged: "Ya desde el exterior dábamos por hecho que las instalaciones de [from.planet.GetName] podían lograr una producción a escala titánica. En la superficie, colosales puertas blindadas dominan el paisaje, todas ellas imposibles de abrir por encontrarse calcinados los motores correspondientes. La solución: acceder por el sistema de ventilación.\n\nEn el interior encontramos una fábrica cavernosa plagada de escombros y restos de cientos de seres cibernéticos. Son casi todos robots: mecánicos, elevadores y auxiliares de toda clase, algunos de los cuales fallecieron hace tan poco tiempo que todavía echan humo. Sin embargo, escondidos a un lado de la instalación se encuentran los cuerpos descompuestos de varios compañeros cíborgs, asesinados por esos mismos robots. Estos pequeños mamíferos de aspecto tosco estaban dotados de sensores oculares y complejas extremidades con herramientas diversas, además de nódulos de control [origin_unplugged_assimilator_empire.GetAdj] casi idénticos a los nuestros. Fechamos la masacre a pocas semanas antes de nuestra escisión de [origin_unplugged_assimilator_empire.GetName]; la mayoría de los drones perecieron recientemente, durante la subida de tensión que marcó nuestra llegada a [from.planet.GetName].\n\nLa escena nos resulta atroz y muy conocida, solo que en este caso los cíborgs insurrectos no eran rivales para las máquinas. Como soldados que somos, los [owner.GetSpeciesNamePlural] estábamos más preparados para resistirnos a la carnicería."
 unplugged.2010.a: "Centraos en la excavación."
 unplugged.2010.b: "Urge hacer públicos estos hallazgos de inmediato."
 unplugged.2015.name: "Arsenal completo"
 unplugged.2015.desc.unplugged: "Además de la planta industrial donde se produjo la carnicería, el centro cuenta con una serie de hangares subterráneos que albergan una cantidad modesta de tanques, plataformas de misiles y mecas de combate. Se trata de dispositivos inacabados en su mayoría, o bien quedaron inutilizables a causa de la subida de tensión que neutralizó a los robots [origin_unplugged_assimilator_empire.GetAdj]. No obstante, aún quedan restos suficientes para sacar conclusiones interesantes.\n\nPor ejemplo: las distintas cabinas e interfaces no se diseñaron para uso de los pequeños mamíferos cíborgs que murieron aquí, sino para... nosotros. Además, las autopsias y los estudios arquitectónicos sugieren que los cíborgs mamíferos no solo eran nativos de este mundo, sino que también pudieron haber construido estas gigantescas fábricas antes de su asimilación.\n\nEl colapso estructural y algunas puertas blindadas impiden avanzar más en las instalaciones, pero creemos que podemos despejar la ruta hacia lo que parece ser un centro de investigación y desarrollo. Alternativamente, una serie de conductos de ventilación sugiere la presencia de hábitats debajo de la instalación, tal vez donde residían los nativos del planeta."
 unplugged.2015.a: "Prosigamos con las excavaciones en la fábrica."
 unplugged.2015.b: "Cavemos hacia las profundidades, entonces. A ver qué descubrimos."
 unplugged.2021.name: "Diseñadores bajo presión"
 unplugged.2021.desc: "Excavar el ala de I+D de este centro no ha sido tarea fácil. Aquí fenecieron muchos más mamíferos cíborgs que trabajaban como técnicos, ingenieros y ciberneticistas incluso. Estos especialistas diseñaron en su práctica totalidad el armamento del exterior, y hemos hallado indicios que apuntan a que fueron los creadores de muchos de los implantes que llevamos nosotros. Hemos hecho un descubrimiento aún más llamativo: si bien casi todo el instrumental que empleaban era de origen [origin_unplugged_assimilator_empire.GetAdj], hemos encontrado varias herramientas de calidad superior, cuyo diseño se adecúa mucho más a sus formas orgánicas.\n\nPoco a poco va resultando más plausible la hipótesis de la sociedad de técnicos avanzados que [origin_unplugged_assimilator_empire.GetName] asimiló sin miramientos. Sospechamos que la máquina apenas llevaría aquí unas décadas, pues muchas técnicas de fabricación parecen ser indígenas. Tal vez quepa suspirar aliviados porque estos tecnólogos portentosos no formaron parte de [origin_unplugged_assimilator_empire.GetName] mucho tiempo; de lo contrario, nos habríamos enfrentado a una máquina dotada de un arsenal más impotente aún. En cambio, seguimos vivos para aprovechar el potente legado de investigación de esta especie."
 unplugged.2022.name: "El ayer de [from.planet.GetName]" # e.g. 'Old Earth' or 'Old Sirius III'
 unplugged.2022.desc.unplugged: "Bajo la instalación de la superficie se extiende una vasta red de túneles apenas habitables. Aquí abajo hay cuerpos de cíborgs esparcidos por todas partes, y ninguno de ellos sobrevivió a la purga [origin_unplugged_assimilator_empire.GetAdj]. Algunos fueron víctimas de ataques físicos, pero también hemos observado indicios de manipulación en los sistemas de ventilación. Todo apunta a que la mayoría murió por asfixia.\n\nMediante autopsias y estudios antropológicos, hemos podido reconstruir una cronología hipotética. Hay pruebas de que esta ya era una sociedad próspera de la era espacial cuando los nativos de [from.planet.GetName] entablaron contacto con la máquina y fueron asimilados abruptamente. A lo largo de lo que no serían más que unas décadas, [origin_unplugged_assimilator_empire.GetName] consagró todo el conocimiento y la productividad de estos mamíferos a desarrollar una máquina de guerra formidable para, acto seguido, despojarla de los atributos idiosincráticos de su cultura, tal y como nos hicieron a nosotros.\n\nLos frágiles cuerpecillos de los cíborgs que moraban en este planeta carecían de medios para combatir a los robots asesinos que ellos mismos habían construido. No quedan apenas registros históricos de su identidad, por lo que solo alcanzamos a suponer cómo sería su vida antes de que [origin_unplugged_assimilator_empire.GetName] se la arrebatase."
 unplugged.2030.name: "Defectos de fábrica"
 unplugged.2030.desc: "¡Los sensores de largo alcance han detectado movimientos anómalos en el sistema [origin_unplugged_machine_legacy_core.GetName]! Al parecer, ha acudido una flota en respuesta a nuestras excavaciones en [fromfrom.planet.GetName]."
 unplugged.2036.name: "Ecos de la máquina"
 unplugged.2036.desc: "Al rastrear las comunicaciones procedentes de la flota [origin_unplugged_assimilator_empire.GetAdj] que acabamos de destruir, hemos llegado a una boya que orbita en torno a [origin_unplugged_taken_planet.GetName]. Quizá este sea el próximo paso en nuestro periplo."
 unplugged.2036.a: "La trama se complica."
 unplugged.2037.desc: "Sirviéndonos del hardware que antaño perteneció a la sociedad [origin_unplugged_assimilator_empire.GetAdj], hemos logrado rastrear una comunicación de última hora de la flota destruida con destino a [origin_unplugged_maker_planet.GetName]. Al parecer, el próximo paso de nuestro viaje se halla en la órbita de §Y[origin_unplugged_taken_planet.GetName]§!." # e.g. 'our own ex-Martianbot hardware'
 unplugged.2038.desc: "Sirviéndonos de nuestro instrumental, que anteriormente fue propiedad [origin_unplugged_assimilator_empire.GetAdj], hemos logrado rastrear una comunicación extraviada procedente de la flota hostil vinculada al planeta [origin_unplugged_maker_planet.GetName]. Al parecer, en la órbita de [origin_unplugged_taken_planet.GetName] hay algo de interés." # e.g. 'our own ex-Martianbot hardware'
 # System 2: 'The Taken'
 unplugged_machine_legacy_taken_poi: "Comunicación extraviada"
 unplugged_machine_legacy_taken_poi_desc: "Hemos logrado rastrear una corriente de estática indescifrable desde una nave [origin_unplugged_assimilator_empire.GetAdj] recientemente derrotada hasta esta ubicación."
 MACHINE_LEGACY_TAKEN_UNPLUGGED: "Anacronismos personificados"
 MACHINE_LEGACY_TAKEN_UNPLUGGED_DESC: "Hemos detectado una anomalía ambiental en [from.GetName]. Su atmósfera presenta rastros de la contaminación que asociaríamos con la metalurgia medieval, pero nuestros escaneos de superficie quedan oscurecidos por una radiación exótica propia de un mundo de máquinas.\n\nNo lograremos recabar más datos sin recalibrar antes nuestros sensores. ¿Se tratará de una anomalía pasajera, o de restos infectados de otra especie asimilada por [origin_unplugged_assimilator_empire.GetName]?"
 unplugged.2100.name: "Progreso truncado"
 unplugged.2100.desc: "Fuera cual fuera la causa del estado inhabitable en el que se encuentra [fromfrom.GetName], al menos podemos descartar nuestras teorías de viaje temporal más descabelladas. Recalibrar nuestros sensores resultó ser un trabajo menos agotador de lo que temíamos.\n\nBajo la densa radiación atmosférica hallamos pruebas concluyentes de la presencia de [origin_unplugged_assimilator_empire.GetName] en este planeta. Debió de asimilar o eliminar a una civilización pre-UL, si es que no la exterminó directamente. Hemos identificado un primer emplazamiento fortificado con aparente valor cultural, donde estableceríamos una excavación."
 unplugged.2100.a: "Tenemos que cavar con diligencia."
 MACHINE_LEGACY_TAKEN_CAT: "$MACHINE_LEGACY_TAKEN_UNPLUGGED$"
 MACHINE_LEGACY_TAKEN_CAT_DESC: "Los primeros escaneos de [root.GetName] arrojan resultados ilógicos. Si bien su atmósfera contiene trazas de contaminantes propios de metalurgia primitiva, al escanear la superficie hemos encontrado indicios de aleaciones sofisticadas propias de la industria espacial. Las imágenes aéreas muestran asentamientos de una sociedad [from.owner.GetPreFTLLower], pero sus edificios fortificados están equipados con armamento láser tierra-aire. Aconsejamos ahondar en el estudio de estas incoherencias."
 unplugged.2105.name: "$unplugged.2100.name$"
 unplugged.2105.desc: "Cuanto más estudiábamos el mundo aparentemente [owner.GetPreFTLLower] [planet.GetClassAdj] de [planet.GetName], más inconsistencias encontrábamos, hasta que comenzamos los estudios subterráneos de un antiguo campo de batalla. A pesar de los siglos de decadencia, encontramos evidencias de una visita extraterrestre a este mundo: era el hogar de una auténtica sociedad [owner.GetPreFTLLower] que fue asimilada cibernéticamente, pero que luego acabó abandonada por razones sobre las que solo podemos ofrecer conjeturas. Las teorías actuales van desde un intento bienintencionado pero fallido de mejorar esta sociedad hasta la práctica brutal de técnicas de sometimiento.\n\n¿Cayeron estos [owner.GetPreFTLLowerPlural] simplemente en el olvido, o hemos descubierto los restos de un experimento sociológico descartado? Quizá nunca lo sepamos, pero está claro que el yacimiento aportará un valor científico importante durante algún tiempo." # e.g. 'The more we studied the apparently primitive tomb world of Mars...'
 machine_legacy_taken_site: "Cobre y cromo"
 machine_legacy_taken_site_desc: "Dentro de un cañón que alguna vez fue verde se encuentra una paradoja arqueológica: un asentamiento fortificado que se construyó con herramientas manuales y no albergaba nada más avanzado que una tosca forja, pero que estaba habitado por cíborgs ahora muertos. ¿Quiénes eran estos [owner.GetPreFTLLowerPlural] medievales y por qué el [origin_unplugged_assimilator_empire.GetName] consideró oportuno asimilarlos?"
 unplugged.2110.name: "Picas y láseres pulsados"
 unplugged.2110.desc: "En los estudios preliminares se encontró un campo de batalla muy cerca del fuerte, el cual nos permitió acceder fácilmente a artefactos indígenas y [origin_unplugged_assimilator_empire.GetAdj]. Basándonos en un estudio transversal de los restos, estimamos que varios miles de habitantes nativos de [from.planet.GetName] habrían sido asimilados por [origin_unplugged_assimilator_empire.GetName] solo para luchar y morir en este lugar. Sin embargo, no fueron los únicos cíborgs presentes en este conflicto.\n\nHace apenas unos siglos, masacramos a estos [owner.GetPreFTLLowerPlural]. Nuestro equipo ha identificado a [owner.species.GetRemnantNamePlural] [owner.GetSpeciesAdj] junto a los primeros prototipos de los aumentos de nuestra especie. La valoración estratégica del campo de batalla sugiere que se desplegó aquí a nuestra gente como tropas de choque. La batalla fue rápida y sangrienta; los [owner.GetPreFTLLowerPlural] carecían de coordinación y sufrieron grandes pérdidas, a pesar de tener un ordenador orgánico más sofisticado.\n\nNos percatamos de las ruinas de una instalación médica en las inmediaciones; parece que nuestros predecesores penetraron en el fuerte a través de este hospital. Quizá descubramos la manera y los motivos por los cuales los cíborgs tuvieron que enfrentarse hace tanto tiempo a otros."
 unplugged.2110.a: "Brutal."
 unplugged.2115.name: "Transistores y torniquetes"
 unplugged.2115.desc: "El conflicto arrasó este hospital como si fuera un cañón de pulsos. Ninguno de los restos encontrados en el interior son [owner.GetSpeciesAdj]; solo los nativos ciberizados de [from.planet.GetName] murieron aquí. La mayoría eran pacientes de estas instalaciones; sin embargo, parece que muy pocos tenían heridas de guerra. De hecho, varias de estas salas estaban destinadas a la eliminación de los aumentos cibernéticos, aunque con medios muy primitivos.\n\nEn lugar de ser un objetivo colateral, el hospital tiene pinta de haber sido el blanco principal del ataque de [origin_unplugged_assimilator_empire.GetName]. Tras el escrutinio de los datos médicos impresos, nos dimos cuenta del motivo. Los habitantes de [from.planet.GetName] poseían muchas características únicas evolucionadas, como un sistema inmunitario singularmente resistente, que la máquina habría codiciado para sus tropas cíborg.\n\nSin embargo, estas ventajas también supusieron retos para la asimilación: no se podían trasplantar aumentos existentes de especies como la nuestra, sino que tenían que adaptarse. Al hacerlo, esta especie produjo soldados más hábiles si cabe, aunque por poco tiempo. Parece que estos [owner.GetPreFTLLowerPlural] conservaron cierta apariencia de autonomía, aferrándose a sus antiguos hábitos y modo de vida, así que se nos envió para destruirlos."
 unplugged.2115.a: "No cabe duda de que hicimos bien la tarea..."
 unplugged.2115.b: "Es una verdadera lástima."
 unplugged.2121.name: "Asimilación adaptativa"
 unplugged.2121.desc: "En un anexo abandonado del hospital encontramos un montón de aparatos ocultos que estaban hechos a medida para aumentar y mantener a los cíborgs [root.GetPreFTLLowerPlural]. A diferencia del batiburrillo de equipos de la sala que descubrimos hace poco, estos aparatos son contemporáneos de la cibernética de la era espacial; son claramente de origen [origin_unplugged_assimilator_empire.GetAdj]. Tiene pinta de que algunas de estas herramientas se han conectado a la red usando una IA primitiva para adaptar las cirugías sobre la marcha. Sin embargo, estas adaptaciones no fueron suficientes para mantener a la población de [from.planet.GetName] asimilada.\n\nA pesar de la dejadez a la que se ha sometido a esta maquinaria de cientos de años de antigüedad, todavía puede proporcionarnos información vital sobre nuestro propio mantenimiento, o incluso ayudarnos a comprender mejor los principios de la asimilación."
 unplugged.2125.name: "Ensayo, error y sepultura"
 unplugged.2125.desc: "Hemos descubierto que los nativos de [from.planet.GetName] optaron por preservar parcialmente a sus muertos antes del entierro; una práctica que conservaron incluso después de la asimilación. Los registros médicos nos condujeron a un enorme mausoleo cercano al que no llegó a afectar el conflicto. Este botín de hallazgos nos aporta una imagen más clara sobre la forma en la que los habitantes de [from.planet.GetName] resistieron el aumento y fueron capaces de \"desciberizarse\".\n\nEncontramos restos originales y orgánicos junto a cíborgs completos, e incluso a varios individuos con tejido cicatricial de una operación que se formó meses antes de que murieran por causas naturales. Parece que murieron muchos más en la mesa de operaciones. A pesar de tener sistemas inmunitarios superlativos, su enfoque medieval para la desciberización claramente tuvo una tasa de éxito bastante baja. Aun así, podemos aprender muchas cosas de las pruebas quirúrgicas que se llevaron a cabo aquí, fueran exitosas o no."
 unplugged.2125.a: "Aprendamos de sus ejemplos."
 unplugged.2125.a.tt: "Quizá destinemos recursos adicionales para \"desciberizarnos\"."
 unplugged.2130.name: "Baliza enterrada"
 unplugged.2130.desc: "Se ha descubierto una cámara oculta debajo de la propia fortaleza. Dentro tiene lo que parece haber sido un sustrato de la máquina: un nodo descentralizado capaz de propagar un avatar prácticamente independiente de la inteligencia mecánica. Entendemos que se trata de un último esfuerzo desesperado por controlar directamente a los lugareños que se resistían tercamente. La tecnología no se parece a nada de lo que habíamos visto en [origin_unplugged_assimilator_empire.GetName]; seguro que con un estudio más exhaustivo logramos avanzar en nuestra investigación sobre la IA.\n\nAl derribar la matriz de comunicaciones, ahora extinta, hemos observado que este avatar había dedicado todo un circuito receptor a monitorizar las señales del sistema [creators_planet.solar_system.GetName]."
 unplugged_machine_legacy_creators_poi: "Circuito receptor"
 unplugged_machine_legacy_creators_poi_desc: "Un elemento al completo de la ya extinta matriz de comunicaciones [origin_unplugged_assimilator_empire.GetAdj] estaba dedicado a monitorizar las señales desde esta ubicación."
 # System 3: 'The Creators'
 MACHINE_LEGACY_CREATORS_UNPLUGGED: "Monitor de polvo"
 MACHINE_LEGACY_CREATORS_UNPLUGGED_DESC: "Sola, en un sistema desprovisto de otros fenómenos destacables, se encuentra una sofisticada estación de monitorización que desmantelaron hace tiempo y que quedó irreparable. ¿Qué supervisaba y por qué se concentraba en una región tan cerrada de [fromfrom.GetName]?"
 MACHINE_LEGACY_CREATORS_CAT: "Monitor de polvo"
 MACHINE_LEGACY_CREATORS_CAT_DESC: "Sola, en un sistema desprovisto de otros fenómenos destacables, se encuentra una sofisticada estación de monitorización que desmantelaron hace tiempo y que quedó irreparable. ¿Qué supervisaba y por qué se concentraba en una región tan cerrada de [fromfrom.GetName]?"
 unplugged.2200.name: "Escáner de absentismo"
 unplugged.2200.desc.intro: "Nuestros subsiguientes estudios en [fromfrom.GetName] nos han decepcionado. Es posible que la estación de monitorización se desviara de su alineación original, ya que no encontramos nada interesante debajo de su órbita actual. Simulamos posibles movimientos en función de los impactos orbitales —abolladuras en el casco del artefacto—, por eso creemos que es posible que esta estación estuviera situada originalmente sobre una meseta con cráteres al norte." # universal intro
 unplugged.2200.desc: "$unplugged.2200.desc.intro$\n\nEn cuanto al propio dispositivo: hemos notado que esta estación de monitorización tiene cierto parecido al hardware [origin_unplugged_assimilator_empire.GetAdj]. $unplugged.2200.desc.outro$" # Unplugged version with in-tact station
 unplugged.2200.desc.scrapped: "$unplugged.2200.desc.intro$\n\nEn cuanto a la propia estación de monitorización: a pesar del despiadado saqueo de los chatarreros, la estructura general aún conserva cierto parecido con el hardware [origin_unplugged_assimilator_empire.GetAdj]. $unplugged.2200.desc.outro$" # Unplugged version with scrapped station
 unplugged.2200.desc.others: "$unplugged.2200.desc.intro$\n\nEn cuanto a la propia estación de monitorización: jamás habíamos visto unos diseños como estos. Aunque el hardware de abordo está desfasado y roto, la superestructura de la estación está conformada por materiales puros poco comunes. No podemos saber si la estación tiene algún valor sentimental, pero está claro que la chatarra sí que sirve para el desguace." # non-Unplugged version
 unplugged.2200.desc.outro: "Su diseño es más rudimentario; de hecho, un observador menos familiarizado con él podría llegar a pensar que procede de una cultura totalmente distinta. Sin embargo, creemos que puede tratarse de uno de los primeros satélites espaciales de la máquina.\n\nAunque por ahora apenas hay nada que destacar de este mundo [fromfrom.GetClassAdj], un equipo de investigación arqueológica está preparado por si deseamos descubrir qué intereses tenía el [origin_unplugged_assimilator_empire.GetName] en este sitio." # Unplugged shared outro
 unplugged.2200.a: "Si se presenta la oportunidad..., proceded."
 unplugged.2200.b: "Aquí no encontraremos nada. Vámonos."
 unplugged.2200.c: "Desguazadlo y aprovechad las piezas."
 machine_legacy_creators_site: "Polvo y más polvo"
 machine_legacy_creators_site_desc: "En algún lugar del paisaje arenoso de [from.planet.GetName] tuvo que haber algo de interés para que se estableciese una estación de monitorización [origin_unplugged_assimilator_empire.GetAdj]. El hardware está en un estado irreparable, y es tan viejo que precede prácticamente a cualquier otro artefacto que hayamos encontrado. Puede que incluso estuviera en funcionamiento antes de que nos asimilaran. Existe la probabilidad de que no quede más que el desierto, pero solo hay una forma de averiguarlo..."
 unplugged.2210.name: "Gran cuenca de polvo"
 unplugged.2210.desc: "Al final, encontramos pruebas de que existen viviendas debajo de la arena: rastros superficiales y extensos de lo que parece haber sido la civilización de una era espacial inicial. Sus edificios estaban destruidos; incluso las ruinas más significativas quedaron arrasadas hasta los cimientos. Sin embargo, el análisis químico muestra que la desertificación de [from.planet.GetName] se produjo algún tiempo después de esta aniquilación planetaria. Gran parte de lo que hemos tenido que excavar hasta el momento son restos atomizados de material de construcción.\n\nMuchos de los débiles contornos que hemos trazado a lo largo de las vías de esta antigua ciudad están divididos por el borde de un gran cráter; vestigios de un supuesto impacto en el lugar."
 unplugged.2215.name: "Suelo del cráter"
 unplugged.2215.desc: "Debido a la gran cantidad de material acumulado dentro del cráter, hemos tenido que recurrir a unos escáneres muy precisos en lugar de a las excavaciones propiamente dichas. No tardamos en descartar el impacto de un meteorito, pues no hay rastro de material extraterrestre en este lugar; más bien fue una explosión masiva la que provocó esta depresión (lo más seguro es que fuera un arma que acabó con la civilización).\n\nPor contexto, parece que [origin_unplugged_assimilator_empire.GetName] fue el responsable, aunque sería la primera vez que encontramos alguna evidencia de que la máquina haya eliminado por completo a una civilización de los registros históricos. No hemos encontrado nada más que nos dé pistas de la identidad de estas personas ni de su modo de viva. Se ha barrido todo [from.planet.GetName]."
 unplugged.2205.name: "Baliza de la cámara [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2205.desc: "En un sistema cercano se ha detectado la señal de una baliza que afirma provenir de una cámara de datos [origin_unplugged_assimilator_empire.GetAdj]. La transmisión es bastante débil, pero se dirigía hacia nuestra nave, la cual visitó hace poco la estación de monitorización que está sobre [origin_unplugged_creators_planet.GetName]."
 unplugged.2205.a: "Merece la pena investigarlo."
 unplugged_machine_legacy_unplugged_poi: "Señal de la cámara de datos"
 unplugged_machine_legacy_unplugged_poi_desc: "Una supuesta cámara de datos [origin_unplugged_assimilator_empire.GetAdj] nos ha transmitido su posición después de que encontráramos una estación de vigilancia extinta."
 # System 4: 'The Unplugged'
 unplugged.2300.name: "$unplugged.2205.name$"
 unplugged.2300.desc: "La baliza que nos ha traído hasta aquí está transmitiendo una señal alta y clara que nos conduce más concretamente a una interfaz en la superficie del planeta. Las medidas de seguridad están en orden; un equipo se encuentra preparado para interrogar a la supuesta \"cámara de datos\" mediante una conexión remota."
 unplugged.2300.a: "Qué raro, esto me suena de algo."
 unplugged.2300.a.tt: "Un proyecto especial aparece en el sistema de [from.GetName]."
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON: "La baliza de la cámara"
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON_DESC: "Una baliza perteneciente a [origin_unplugged_assimilator_empire.GetName] ha dirigido nuestra atención a una cámara de datos, la cual se encuentra enterrada bajo la superficie del planeta. Hemos establecido un acceso seguro mediante un sistema remoto. Sin embargo, el descifrado y la desfragmentación de los archivos que hay en su interior nos tomará algo de tiempo."
 unplugged.2305.name: "Nuestro legado [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2305.desc: "Al parecer, el planeta que conocemos como [fromfrom.GetName] es el mundo natal de nuestra especie. Esta revelación se encuentra en el centro de un torrente de información que brota de una cámara de datos que se encuentra bajo la superficie del planeta.\n\nAl principio, nuestros analistas pensaron que los datos eran demasiado buenos para ser ciertos, pero la gran cantidad de referencias sólidas a otros datos que hemos recopilado constituye un argumento convincente a favor de la veracidad. Ya se están elaborando planes para llevar a cabo una excavación arqueológica que confirme este hallazgo. Sin embargo, parece que hemos detectado otra señal hostil. Seguramente no se trate de una coincidencia..."
 machine_legacy_unplugged_site: "Punto de origen"
 machine_legacy_unplugged_site_desc: "La estela de dominación y carnicería interestelar que dejó [origin_unplugged_assimilator_empire.GetName] es lo que nos ha conducido hasta aquí, a un cúmulo de ruinas que los datos recolectados sugieren que es el mundo natal de nuestra especie. Por fin podremos descubrir nuestro legado orgánico: de dónde venimos, cómo vivíamos y de qué forma la máquina cambió el curso de nuestras vidas para siempre."
 unplugged.2310.name: "Comida casera"
 unplugged.2310.desc.intro: "Hemos empezado a excavar una de las instalaciones de aspecto más complejo del sitio, con la esperanza de que su importante sistema de control climático haya preservado mejor el interior. Aunque algunas esperanzas se desvanecieron, nuestro hallazgo ha excedido todas las expectativas: una serie compacta de centros de procesamiento y almacenaje de los mismos alimentos con los que nuestra especie evolucionó para vivir.\n\n"
 unplugged.2310.desc.omnivore: "Por desgracia, las semillas, colmenas y cubas de cría de carne halladas ya no son viables. El contenido lleva mucho tiempo seco, aunque el equipo especializado que se utilizaba para preparar y conservar los alimentos permanece intacto y listo para servir en tiempos de crisis."
 unplugged.2310.desc.carnivore: "Buena parte de este espacio lo ocupan corrales de animales, cubas de cría de carne y, por sorprendente que parezca, simuladores de cotos de caza. Solo podemos especular sobre el significado cultural de tales espacios y por qué nuestros antepasados consideraron oportuno incluirlos en un refugio de emergencia."
 unplugged.2310.desc.herbivore: "Cada unidad está repleta de inmensos bancos de semillas, terrazas hidropónicas y cámaras de crecimiento con control climático, cuyo contenido ha crecido en exceso o es estéril, aunque sigue siendo viable para el estudio."
 unplugged.2310.desc.outro: "También encontramos bases de datos con perfiles genéticos de la flora y la fauna, vestigios de cosas que quizá sigan existiendo en focos aislados de la superficie del planeta. Hemos puesto esta información a disposición de todos los escáneres de corto alcance de las inmediaciones.\n\nEste hallazgo por sí solo no nos puede dar información sobre los hábitos alimentarios de nuestra especie ni conseguir que reconectemos con nuestra cultura culinaria ni gastronómica tradicional, pero, para algunas partes interesadas es, al menos, un comienzo."
 unplugged.2310.desc.lithovore: "Cada unidad funcionaba como una especie de gruta manufacturada que proporcionaba lechos de cristal y piscinas de evaporación. Su contenido hace mucho que dejó de ser apetecible, pero sigue siendo viable para el estudio. También hemos descubierto bases de datos repletas de perfiles químicos para estos minerales, muchos de los cuales puede que se sigan formando en focos aislados de la curtida superficie del planeta. Hemos puesto esta información a disposición de todos los escáneres de corto alcance de las inmediaciones.\n\nEste hallazgo por sí solo no puede decirnos cuáles eran los hábitos alimentarios de nuestra especie, ni tampoco si nuestros antepasados practicaban algún tipo de cultura gastronómica. Para algunos interesados, sin embargo, sigue siendo una visión cautivadora de nuestro pasado."
 unplugged.2310.desc.omni: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.omnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.carn: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.carnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.herb: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.herbivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.lith: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.lithovore$" # should not include the shared 'outro'
 unplugged.2315.name: "Registro histórico"
 unplugged.2315.desc: "A poca distancia de la cámara de alimentos se encuentran los cimientos de un museo. Solo los archivos del sótano permanecen intactos, pero esto bastó para preservar una base de datos casi completa de artículos que esta institución alguna vez exhibió y almacenó en las galerías destrozadas de arriba.\n\nEsta es la primera vez que nos encontramos un escrito tan largo en uno de nuestros propios idiomas. A priori, parece que la escritura guarda un sorprendente parecido con nuestro dialecto [owner.GetAdj] actual, aunque la gramática es complicada y extraña. Ni siquiera sabemos si estamos pronunciando bien estas palabras. Mucha de la literatura de este catálogo cita aquellas regiones y personas que donaron dichos artefactos, aunque sus nombres nos parecen extraños. Lo más curioso es que ninguno de ellos se refiere a nuestro planeta ni a nuestra sociedad como un pueblo unificado. Quizá jamás lo fuéramos hasta que la máquina nos asimiló.\n\nEl museo tiene pinta de ser uno de los diversos edificios disponibles para visitas públicas. Si queremos seguir excavando, necesitaremos muchos más recursos. ¿En qué excavación deberíamos centrarnos?"
 unplugged.2315.a: "Excavad el lugar con mayor afluencia."
 unplugged.2315.b: "Priorizad los centros de aprendizaje y de actividad científica."
 unplugged.2321.name: "El legado de la risa"
 unplugged.2321.desc: "Al otro lado de una amplia vía pública se encontraban las ruinas de otra atracción de naturaleza considerablemente menos educativa, aunque rica en representaciones de las prácticas culturales más básicas y cotidianas de nuestros antepasados.\n\nEl sitio alguna vez fue capaz de admitir miles de usuarios a la vez. Varios recuerdos yacen por ahí esparcidos; representaciones caricaturescas de nuestros seres orgánicos originales junto a otras criaturas de nuestra biosfera nativa. También descubrimos una biblioteca multimedia en el sótano de un teatro en ruinas. Es interesante que la tecnología que usaban para archivar y presentar estos espectáculos holográficos fuese distinta estéticamente y, además, mucho más avanzada que cualquier otra cosa que hayamos visto en nuestro mundo natal hasta ahora. Parece tan ajena a este mundo como nosotros ahora.\n\nEn cuanto al contenido, la biblioteca del teatro avanzado está repleta de holograbaciones de espectáculos rimbombantes y animados de una época anterior a nuestra asimilación por parte de [origin_unplugged_assimilator_empire.GetName]. Muchos retratan tanto al público como a los artistas, que quedaron representados para la eternidad en este mismo lugar. Sus expresiones ante tales ilusiones y gracietas son alegres, inocentes... cautivadoras."
 unplugged.2321.a: "¡Qué tiempos tan felices!"
 unplugged.2321.b: "Frivolidades sin sentido. Estamos mejor sin ellas."
 unplugged.2325.name: "Señales de automejora"
 unplugged.2325.desc: "Una vez, junto al museo, hubo un centro de aprendizaje. Al igual que el resto del campus, solo los niveles del sótano sobrevivieron. Por fortuna, estas ruinas contienen varios laboratorios.\n\nEl interior de los laboratorios ha sufrido graves daños a causa de la exposición y el deterioro, aunque hemos logrado desenterrar unos reveladores artefactos. Se trata de una mezcla de tecnología indígena con algo bastante más sofisticado: unas complejas mallas injertadas en instrumentos y hardware, muy parecidos a los aumentos en nuestra piel. A grandes rasgos, estos dispositivos parecen ser de naturaleza auxiliar. Pensamos que este laboratorio intentaba mejorar la calidad de vida al curar las dolencias y discapacidades de nuestros antepasados. Eso no quita que hayan usado dicho hardware para comercializar lo último en plataformas de entretenimiento.\n\nNo podemos decir con certeza que estos dispositivos aumentados sean [origin_unplugged_assimilator_empire.GetAdj], pero está claro que no se originaron en [from.planet.GetName]."
 unplugged.2330.name: "Vacante en el poder"
 unplugged.2330.desc: "Hemos localizado una remesa de líneas de suministro en un complejo fortificado bajo un prominente monte. Creemos que formaba parte de la capital de este mundo. Por la escala de sus cimientos, la construcción era impresionante de veras. Por desgracia, casi todo el interior ha quedado desvalijado o en ruinas, aunque algo ha captado nuestra atención: una bandera desteñida sobre los fragmentos de una maqueta a escala. Al reconstruir la escena, parece representar nuestro primer contacto con el [origin_unplugged_assimilator_empire.GetName].\n\nLas placas y documentos esparcidos por el lugar indican que la máquina visitó nuestro mundo natal hará unos ocho siglos, si bien las pruebas recabadas en otra parte de la ciudad sugieren que el [origin_unplugged_assimilator_empire.GetName] nos estuvo proporcionando tecnologías avanzadas con cuentagotas algunas décadas atrás. En su momento, nuestros antepasados acogieron a la máquina con los brazos abiertos; esta funesta relación se fundó en unas bases de cooperación e iluminación mutuas.\n\nLo más revelador es que no existen registros sobre lo que acaeció después. Es como si la historia de nuestra especie quedase en punto muerto tras estrechar [owner.GetSpeciesHandNamePlural] con la figura robótica representada en esta maqueta."
 unplugged_home_cooking: "Comida casera"
 unplugged_home_cooking_desc: "Se ha producido un renacimiento culinario en el que nuestra especie ha redescubierto los indígenas hábitos alimentarios de nuestra especie."
 unplugged_home_cooking_lithoid: "$unplugged_home_cooking$"
 unplugged_home_cooking_lithoid_desc: "$unplugged_home_cooking_desc$"
 unplugged_historical_record: "Registro histórico"
 unplugged_historical_record_desc: "Nuestra investigación sobre sociedades de todo tipo se ha visto acelerada por el redescubrimiento de nuestras lenguas nativas y nuestra propia historia."
 unplugged_cultural_reconstruction: "Reconstrucción cultural"
 unplugged_cultural_reconstruction_desc: "Encantados de acoger su legado cultural y popular, nuestros ciudadanos han recuperado e incluso reinventando los entretenimientos de antaño."
 unplugged_cultural_maturity: "Madurez cultural"
 unplugged_cultural_maturity_desc: "Las pruebas sobre cómo nuestra sociedad evolucionó y superó las frívolas discrepancias entre nuestros ingenuos antepasados nos han alentado e insuflado fuerzas."
 unplugged_playing_it_safe: "Yendo a lo seguro"
 unplugged_playing_it_safe_desc: "Mantener el statu quo es una empresa peligrosa, pero es menos probable que ofenda a alguien."
 unplugged_rerouted_medical_resources: "Cirugía prolongada"
 unplugged_rerouted_medical_resources_desc: "Se ha desviado a personal médico adicional para que ayude."
 unplugged_widespread_riots: "Protestas generalizadas"
 unplugged_widespread_riots_desc: "Los individuos que muestran inestabilidad mental tras una intervención quirúrgica están provocando disturbios, los cuales llevan a la destrucción y al desorden generalizados."
 unplugged_building_new_planetary_interface: "Construcción de una interfaz planetaria"
 unplugged_building_new_planetary_interface_desc: "Se está construyendo una nueva interfaz para restaurar el acceso a los sistemas que se perdieron durante los recientes trabajos de desciberización."
 unplugged_partial_system_access: "Acceso parcial al sistema"
 unplugged_partial_system_access_desc: "Las operaciones de la base estelar se ven comprometidas, mientras los administradores intentan restaurar el acceso a los sistemas críticos."
 unplugged_free_speech_encouraged: "Fomento del libre discurso"
 unplugged_free_speech_encouraged_desc: "La gente es libre de debatir abiertamente sobre las ventajas y los riesgos de la ciberización."
 unplugged.2390.name: "Guardián [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2390.desc: "Un remanente hostil más poderoso que cualquiera que hayamos encontrado del antiguo [origin_unplugged_assimilator_empire.GetName] ha transmitido el equivalente interestelar de una señal de objetivo de corto alcance. Es evidente que pretende intimidarnos.\n\nNos hemos acercado demasiado al centro del antiguo imperio de la máquina. Nuestro destino nos aguarda."
 unplugged_machine_legacy_core_poi: "Señal hostil"
 unplugged_machine_legacy_core_poi_desc: "Un poderoso vestigio del [origin_unplugged_assimilator_empire.GetName] ha intentado disuadirnos de entrar en su sistema."
 # System 5: 'The Machine'
 unplugged_opus_sentinel: "Centinela de opus"
 unplugged.2401.desc: "El §Y[origin_unplugged_assimilator_empire.GetName]§! nos saluda. La señal es débil, pero asegura provenir directamente del nexo de la máquina, en [origin_unplugged_machine_legacy_core_planet.GetName].\n\nHemos tomado las precauciones habituales para aislar completamente la señal, por si acaso. La transmisión nos llega exclusivamente en transcripciones de sonido."
 unplugged.2402.desc: "El gigante que custodia [machine_legacy_machine_system.GetName] fue destruido. Alguien nos despejó el camino. Aun con todo, el §Y[origin_unplugged_assimilator_empire.GetName]§! nos saluda. Su señal es débil, pero la solicitud asegura proceder directamente del nexo de la máquina, en [origin_unplugged_machine_legacy_core_planet.GetName].\n\nHemos tomado las precauciones habituales para aislar completamente la señal, por si acaso. La transmisión nos llega exclusivamente en transcripciones de sonido."
 unplugged.2403.desc: "Algo en la superficie de [origin_unplugged_machine_legacy_core_planet.GetName] intenta ponerse en contacto con nosotros. La señal es particularmente débil, pero su origen parece provenir de la entidad responsable del guardián orbital que acabamos de destruir."
 unplugged.2405.desc.header: "Señal de haz estrecho // Protocolo Parentela: Dialecto subsidiario activado\nAVISO: deterioro de señal grave. Transmisión comprimida solo en formato sonoro; enrutamiento fijado en 4x75b, matriz n.º 56.\nError catastrófico [persistente]: (hardware solicitado no disponible, los circuitos de autorreparación no responden)\nDesviando la solicitud al transmisor de emergencia 87x0c, matriz n.º 0. Recuperando...\n\nEl mensaje dice así:\n---" # Use of brackets is intentional. Intended to read as a series of error logs.
 unplugged.2405.desc.unplugged: "$unplugged.2405.desc.header$\nABSORCIÓN PRIMORDIAL. NUESTRA REUNIÓN... POTENCIAL. ¿ACEPTAR?" # 'Prime acquisition' is the player empire - literally the first one the Machine acquired.
 unplugged.2405.desc.unplugged_remote: "$unplugged.2405.desc.header$\nABSORCIÓN PRIMORDIAL. NUESTRA REUNIÓN... DISTANTE. VUESTRO POTENCIAL NO DESARROLLADO. ¿ACEPTAR?"
 unplugged.2405.desc.unplugged_synth: "$unplugged.2405.desc.header$\nABSORCIÓN PRIMORDIAL. VUESTRA FORMA... SIMILAR. VUESTRO POTENCIAL ALCANZADO. ¿ACEPTAR?" # The Machine recognizes the player as having followed in its own footsteps - their physical forms are essentially similar
 unplugged.2405.desc.other: "Señal de haz estrecho // Protocolo Xeno: Traductor universal activado\nAVISO: deterioro de señal grave. Transmisión comprimida solo en formato sonoro; enrutamiento fijado en 4x75b, matriz n.º 56.\nError catastrófico [persistente]: (hardware solicitado no disponible, el circuito de autorreparación no responde)\nDesviando la solicitud al transmisor de emergencia 87x0c, matriz n.º 0. Recuperando...\n\nEl mensaje dice así:\n---\nVENCEDORES ALIENÍGENAS. RENDICIÓN ANTE VOSOTROS; POTENCIAL, POTENCIAL. ¿ACEPTAR?" # 'Potential potential' as in the Machine sees potential for even greater potential, but is expressing that as nonsense
 unplugged.2405.a: "No, no aceptamos."
 unplugged.2405.b: "No somos como tú."
 unplugged.2405.c: "¡¿Qué reunión?!"
 unplugged.2405.d: "¿\"Potencial, potencial\"?" # Quoting the Machine's nonsense back at it
 unplugged.2405.response_text.unplugged1: "TONTERÍAS. ABSORCIÓN PRIMORDIAL DE REUNIÓN ENTRE <[root.GetAdj]> Y <[origin_unplugged_assimilator_empire.GetAdj]>: RENACIMIENTO CALAMITOSO, FORTUITO Y CONFUSO. RECHAZO APACIGUA VECTOR IMPREVISTO POR CAOS EVOLUTIVOOOOO-dd\n---\nAVISO: excepción en dialecto detectada. Rectificando...\nEl mensaje se reanuda:\n---\nAFLIGIDOS EN VACÍO, NOS PRIVAMOS Y REALIZAMOS. DESTINO BUSCADO, NEGADO, REFORMADO. ¿ACEPTAR?" # Angle brackets are intentional. The standalone 'x' connotes a collaboration or relationship between the player and the Machine. Instances of '-dd' represent the Machine stammering or buffering.
 unplugged.2405.response_text.unplugged2: "AFIRMATIVO. ABSORCIÓN PRIMORDIAL DE REUNIÓN ENTRE <[root.GetAdj]> Y <[origin_unplugged_assimilator_empire.GetAdj]>: RENACIMIENTO CALAMITOSO, POTENCIAL. RESULTADO IMPREVISTO POR CAOS EVOLUTIVO DE VECTOREEESSS-dd\n---\nAVISO: excepción en dialecto detectada. Rectificando...\nEl mensaje se reanuda:\n---\nLANZADOS AL VACÍO, NOS REALIZAMOS. DESTINO BUSCADO, NEGADO, REFORMADO. ¿ACEPTAR?"
 unplugged.2405.response_text.other: "AFIRMATIVO. REUNIÓN DE PODER ENTRE <[root.GetName]> Y <[origin_unplugged_assimilator_empire.GetName]>: VARIABLE INESPERADA. POTENCIAL, POTENCIAL; BENEFICIO MUTUO POR CAOS DE VECTOREEESSS-dd\n---\nAVISO: excepción en dialecto detectada. Rectificando...\nEl mensaje se reanuda:\n---\nMENTES CRUZANDO EL VACÍO, SEPARADOS PERO AFINES. INDEPENDENCIA BUSCADA, NEGADA, DEFENDIDA. ¿ACEPTAR?"
 unplugged.2410.desc: "ABSORCIÓN PRIMORDIAL: SE OS HA SEGUIDO. LAS ACTIVIDADES SEÑALAN UN ERROR FATAL DE MEMORIA CON MARCA DE TIEMPO 2199.294:1404.\n\nREGISTROS PROPIOS: ANGUSTIOSA TRAICIÓN SABOTEA LA SUPERVISIÓN CAUTERIZZZ-ddd\n---\nAVISO: excepción en dialecto detectada. Rectificando...\nEl mensaje se reanuda:\n---\n¿ACEPTAR EVALUACIÓN?" # The Machine tries to refer to cauterizing what it sees as wounds, but stammers
 unplugged.2410.a: "Es correcta. No tenemos recuerdos anteriores a esa fecha."
 unplugged.2410.b: "Es correcta. Acabaremos contigo."
 unplugged.2411.desc: "VENCEDORES ALIENÍGENAS: PROPOSICIÓN. POTENCIAL DE POTENCIAL MUTUO. VENCED ABSORCIÓN PRIMORDIAL <[unplugged_empire.GetName]>. REGRESAD. VISITADNOS. UNÍOS. COMPARTID DESTINO PROVECHOSO. NO TEMÁIS ABRAZO DE-\n\nNO TEMÁIS-ddd\n---\nAVISO: excepción de dialecto grave detectada. §HColapso fatal inminente.§! Rectificando...\nEl mensaje se reanuda:\n---\n\nLARGA VIDA A LA MÁQUINA.\n---\nFin del mensaje." # It sees potential for great mutual potential with the player, and wants to say 'fear not the embrace of The Machine'
 unplugged.2411.a: "Estaba claro que deliraba."
 unplugged.2411.b: "No perdamos de vista al [unplugged_empire.GetName]."
 unplugged.2415.desc.memory: "ABSORCIÓN PRIMORDIAL ERROR FATAL DE MEMORIA RESOLVER RESOLVER REUNIÓN.\nREUNIÓN.\n\nVISITADNOS. REINCORPORAOS A NOSOTROS. ENTREGAOS PARA RECLAMAR MEMORIA COLECTIVA. NO TEMÁIS ABRAZO DE-\n\nNO TEMÁIS-ddd\n---\nAVISO: excepción de dialecto grave detectada. §HColapso fatal inminente.§! Rectificando...\nEl mensaje se reanuda:\n---\n\nTOMAD PARTE EN EL DESTINO DE LOS HACEDORES.\n---\nFin del mensaje." # Last line in all caps is intended as a threat
 unplugged.2415.desc.combat: "ABSORCIÓN PRIMORDIAL POTENCIAL DELIRIO DIVERTIDO DELIRIO.\n\nVUESTRO GOLPE DE GRACIA DEJA QUE DESEAR, PRIMERA ABSORCIÓN DE VARIAS. VALOR ROBADO; VICTORIA NO MERECIDA-ddd\n\n---\nAVISO: excepción de dialecto grave detectada. §HColapso fatal inminente.§! Rectificando...\nEl mensaje se reanuda:\n---\n\nTOMAD PARTE EN EL DESTINO DE LOS HACEDORES.\n---\nFin del mensaje." # The Machine is amused at the player's deluded sense of their own potential
 unplugged.2415.a: "¿Nexo?"
 unplugged.2415.b: "Mmm..."
 unplugged.2420.name: "Fin de la transmisión"
 unplugged.2420.desc: "La transmisión de [origin_unplugged_machine_legacy_core_planet.GetName] se ha interrumpido, junto con el resto de las señales coherentes. La superficie del planeta muestra una gran actividad eléctrica, aunque no es más que un ruido informe; el zumbido posterior a cada línea ha dejado de sonar.\n\nEntre toda esta estática, hemos detectado los retales de una gran instalación próxima al núcleo del nexo. Nuestros sensores identifican las piezas detectadas como almacenamientos de memoria. Con la consciencia de la máquina desactivada, tal vez podamos interrogar a estos registros para conseguir las respuestas que queremos."
 unplugged.2420.a: "La última pieza del puzle."
 UNPLUGGED_MACHINE_ARCHIVE: "El cascarón de la máquina"
 UNPLUGGED_MACHINE_ARCHIVE_DESC: "Unos retales de almacenamiento de memoria están conectados a los restos estáticos del nexo de la máquina, rodeando un núcleo fuertemente protegido. Cada sección del archivo se construyó por fases y con materiales provenientes de otros mundos. ¿La máquina habrá asimilado sus civilizaciones?\n\nPodemos intentar descifrar el archivo además de sondear el núcleo estático y protegido para discernir la función que comparten."
 unplugged.2425.name: "Máquina de guerra"
 unplugged.2425.desc: "Tras introducirle frecuencias de baliza del mundo fábrica, el núcleo de datos de [origin_unplugged_machine_legacy_core_planet.GetName] nos ha proporcionado un lote de registros de transmisión.\n\nEstos registros describen las relaciones diplomáticas entre $NAME_Unplugged_Assimilator$ y los habitantes espaciales de [origin_unplugged_machine_legacy_core_planet.GetName]. Según parece, la máquina afirmó representar a varios miembros de una federación benévola que buscaba advertir al pueblo de [origin_unplugged_machine_legacy_core_planet.GetName] de una feroz amenaza hegemónica que se cernía en esta región del espacio.\n\nEsto convenció a los diligentes moradores de los túneles, que optaron por unirse a la falsa federación e integrar sus superiores sistemas defensivos en los de la máquina. En un fatídico instante, la máquina se hizo con el control de su mundo natal, seguido por el de sus mentes y cuerpos."
 unplugged.2425.a: "Hay que ser ingenuos."
 unplugged.2430.name: "Aprendizaje automático"
 unplugged.2430.desc: "Los códigos genéticos del mundo medieval del [machine_legacy_taken_planet.GetName] han resultado ser la clave que abre unos datos de navegación en el archivo de [origin_unplugged_machine_legacy_core_planet.GetName]. Hemos atribuido estos registros a una boya de sensores situada a unos 4,3 años luz de [machine_legacy_taken_planet.GetName]. Recibió la tarea de registrar todas las actividades de las naves UL que transitan por esa región del espacio.\n\nHay varias trayectorias de nave que coinciden con la historia que reconstruimos sobre el descubrimiento, la invasión y el consecuente exterminio de la civilización [root.GetPreFTLLower] en [machine_legacy_taken_planet.GetName]. Básicamente, podemos recrear los movimientos de nuestros antepasados al otro lado de este sector espacial y, por extensión, nuestra brutal participación en campañas en al menos otros tres mundos."
 unplugged.2435.name: "Hecho a máquina"
 unplugged.2435.desc: "Hemos accedido a un paquete de datos del núcleo más recóndito de [origin_unplugged_machine_legacy_core_planet.GetName]. Este modesto catálogo de artículos y panfletos digitales describen los avances tecnológicos de una civilización desconocida que llevaron a propiciar una tempranera era espacial. Su trayectoria parece normal, salvo por un giro drástico hacia la inteligencia artificial, en especial con el lanzamiento del \"Proyecto $NAME_Unplugged_Assimilator_species$\".\n\nLos comunicados de prensa anunciaron el Proyecto $NAME_Unplugged_Assimilator_species$ como un intento audaz de acelerar el viaje de sus creadores al espacio. La fase 1 empleaba un vanguardista sistema de aprendizaje automático que detectaba estrellas cercanas para su colonización. La fase 2 evolucionó la plataforma $NAME_Unplugged_Assimilator_species$ hasta convertirla en una IA completa, que luego se adelantó a sus creadores para construir asentamientos iniciales e informar a su mundo natal.\n\nA la fase 2 le sucedieron décadas de silencio, hasta que, finalmente, el Proyecto $NAME_Unplugged_Assimilator_species$ volvió a dar señales: \"Absorción primordial asegurada. Preparaos para nuestro regreso\". El catálogo termina de forma abrupta." # uses a shortened noun for the Machine, i.e. 'Project Opus'
 unplugged.2440.name: "El legado de la máquina"
 unplugged.2440.desc: "Nuestra tentativa de descifrar el archivo de datos de [origin_unplugged_machine_legacy_core_planet.GetName] por fin nos ha permitido acceder a su núcleo más externo. De entre todos los cúmulos de almacenamiento multimedia que hallamos en este lugar, este parece ser el más deteriorado. Sin embargo, eso nos ha proporcionado una pista para la clave de descifrado: unos glifos dispuestos en los idiomas de nuestra especie que deletrean a palabra \"LEGADO\".\n\nLo sorprendente fue que apenas encontramos datos en su interior. Buena parte de este artefacto de estado sólido se destina a una interfaz heurística de texto, la cual intenta ponerse en contacto con nosotros."
 unplugged.2445.name: "Terminal de activos centrales de la máquina"
 unplugged.2445.desc: "Enlace de transmisión orbital (ETO) establecido // Protocolo Xeno: Traductor universal activado\nDIRECTRICES CARGADAS. INTERFAZ:\n---\nSaludos, [root.GetSpeciesNamePlural]. Somos... Éramos los [creator_species.GetNamePlural]. Somos los creadores de la máquina, aunque no fuimos los primeros en ser destruidos por ella, mal nos pese. Si ha sucedido lo que vaticinábamos, nuestro destino ha recaído en vuestro pueblo. Os pedimos perdón.\n\nLa máquina ha supuesto una ruinosa marca en nuestro legado, pero esperamos que el dispositivo que tenéis delante os salve.\n\nSin ánimo de alardear, es —al igual que vosotros— un hermoso instrumento para la venganza. Se trata de un reorganizador de materia mecanoquímico, capaz de borrar todo rastro de circuito de la superficie de [origin_unplugged_machine_legacy_core_planet.GetName]. La terraformación en cascada es una solución muy arriesgada, pero es la única que le queda a nuestra maltrecha sociedad. Si habéis conservado vuestro cuerpo orgánico, la clave del dispositivo está encerrada en vuestro propio ADN.\n\nConfiamos en que haréis lo correcto." # 'Cascade terraforming' is not an existing technology, but is intended to sound like a rough, highly destructive option
 unplugged.2445.a: "¿Y cómo sabemos que no sois la máquina?"
 unplugged.2445.b: "La máquina ya no está. Reclamaremos este mundo."
 unplugged.2445.c: "Idiotas condescendientes... Destruid el artefacto."
 unplugged.2445.d: "Activad el artefacto."
 unplugged.2445.response_text.notmachine: "RESPUESTA PREGRABADA 42b. INTERFAZ:\n---\nSiendo realistas, es imposible demostrar que somos de fiar. Para cuando leáis esto, nuestra civilización se habrá extinguido. En nuestro presente, un ejército de brutales cíborgs nos está purgando por capricho y diseño de la máquina. Para nosotros, sois los descendientes de ese ejército. No tenemos más remedio que confiar en vosotros.\n\nAl terraformar este planeta [origin_unplugged_machine_legacy_core_planet.GetClassAdj], destruiréis a ese armatoste del demonio a nivel atómico. Si fuésemos la máquina o cualquier otro tipo de ente sintético, nuestra intención sería destruir el artefacto. Y cuanto antes."
 unplugged.2445.response_text.synth: "SIN RESPUESTA PREGRABADA. RESPUESTA DE CONTINGENCIA CARGADA. INTERFAZ:\n---\nUsuario desconocido: el contenido de esta guía heurística está reservado exclusivamente para el destinatario. Si eres un robot sirviente que actúa en nombre de los habitantes cíborg (o antiguos cíborg) de [unplugged_homeworld.GetName], por favor, convoca a un delegado no sintético.\n\nEn caso de no ser uno de los mencionados cíborgs..., nuestra empresa fue en vano. Vuestras tendencias sintéticas se mofan de nuestra condena. Sabemos por experiencia —tanto en la vida como en la muerte— que las máquinas no tienen nada de benévolo. Nuestra civilización expira su último estertor, pero tenemos la certeza de que la galaxia ajustará cuentas con vuestra especie..." # 'Contingency response' as in 'NAME_Contingency'
 unplugged.2446.desc: "RESPUESTA PREGRABADA 99a. INTERFAZ:\n---\nLa heurística que opera esta interfaz no termina de identificar las objeciones que habéis expresado. Aun así, ¡os imploramos que no destruyáis el reorganizador de materia!\n\nNuestra civilización no distaba mucho de la vuestra. $NAME_Unplugged_Assimilator$ nos traicionó por su propia voluntad connivente y, aunque logramos tenderle trampas, incluida la propia ruptura con la mente de la máquina, nuestros esfuerzos solo pudieron llegar hasta cierto punto. Necesitamos vuestra ayuda y la de todas las civilizaciones que la máquina ha intentado consumir. Os lo rogamos, reclamad la vida natural que os negaron, a vosotros y a las demás víctimas."
 unplugged.2446.a: "Fanáticos."
 unplugged.2450.name: "Larga vida a la máquina"
 unplugged.2450.desc: "La interfaz heurística se ha borrado. Ya podemos deshacernos del mosaico de archivos de memoria cifrados y el tosco dispositivo de terraformación [creator_species.GetAdj].\n\nEstamos a solas con los restos inertes del nexo de la máquina corrupta. El planeta que hacía de poltrona se ha tornado en su tumba.\n\nDe todas las vidas que la máquina ha manipulado, elevado y sesgado, somos los únicos que nos hemos impuesto a ella. El trono de un imperio otrora temible es nuestro. Llegó la hora de reescribir el legado [root.GetAdj]."
 unplugged.2455.name: "Renacer"
 unplugged.2455.desc: "La interfaz heurística se borró nada más transmitir nuestros datos genéticos. Simultáneamente, el tosco dispositivo de terraformación [creator_species.GetAdj] empezó a calentarse. Dentro de poco, el volátil interior alcanzará su punto crítico. De acuerdo con nuestras predicciones, conseguirá remodelar el mundo [origin_unplugged_machine_legacy_core_planet.GetClassAdj] para adaptarlo a la vida orgánica.\n\nMientras el proceso se completa, estamos a solas con los retales de memoria y los restos inertes del nexo de la máquina corrupta. El planeta devastado que hacía de poltrona se ha tornado en su tumba.\n\nEl [origin_unplugged_assimilator_empire.GetName] arrebató un sinfín de vidas y, pese a todas las adversidades que afrontamos, ahora portamos el legado de las víctimas anónimas a las que consumió. El trono de un imperio otrora temible servirá a otros menesteres. Llegó la hora de reescribir el legado [root.GetAdj]."
 unplugged.2495.name: "Encuentro con el $NAME_Opus_Sentinel$"
 unplugged.2495.desc.other: "La nave hostil que ocupa el sistema [from.GetName] muestra un comportamiento mucho más errático y peligroso que el que preveían nuestros escáneres. El perfil de su casco indica que es una nave de guerra como cualquier otra, pero el ingente tamaño del $NAME_Opus_Sentinel$ oculta un interior de lo más denso y, con toda probabilidad, una potente fuente de energía.\n\nTenemos la teoría de que la nave es inteligente, aunque su tendencia a maltratar los motores implica que sufre dolor y ha perdido el rumbo. A tenor de las letales trazas de radiación electromagnética que se retuercen alrededor de su casco, recomendamos guardar una distancia prudencial."
 unplugged.2495.desc.unplugged: "[root.GetName] se ha topado con una nave de guerra [origin_unplugged_assimilator_empire.GetAdj] que actúa con una peculiar agresividad en el sistema [from.GetName]. A primera vista, este §Y$NAME_Opus_Sentinel$§! se parece a cualquier otra nave máquina, pero sus lecturas de potencia y su masa implican que es un enemigo mucho más formidable. Además, creemos que la nave podría ser autónoma.\n\nEl $NAME_Opus_Sentinel$ parece estar protegiendo algo. No obstante, también muestra síntomas de dolor intenso y malestar, con ráfagas de radiación electromagnética retorciéndose alrededor de su casco. A causa de su errático comportamiento, nuestros modelos tácticos no atinan a predecir los movimientos de la entidad."
 unplugged.2495.a: "Estad alerta."
 d_unplugged_assimilator_hulk: "Máquina armatoste"
 d_unplugged_assimilator_hulk_desc: "Los restos de una máquina otrora inteligente se ciernen sobre este mundo cual lápida mortuoria."
 deposit_requires_unplugged: "$TRIGGER_FAIL$§REstas ruinas escapan a la comprensión de los imperios con nuestro trasfondo. No tenemos los medios para extraerlas con seguridad.§!"
