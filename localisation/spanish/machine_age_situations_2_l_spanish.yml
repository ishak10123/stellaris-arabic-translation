 councilor_ruler_imperial_synth_desc: "$imperial_ruler_desc$"
 #Traits
 #Modifiers
 synth_opposition_truth: "Campaña de información sobre la sintetización"
 synth_opposition_truth_desc: "Se difunde información fidedigna sobre todos los aspectos relativos a la sintetización."
 synth_opposition_deception: "Campaña propagandística sobre la sintetización"
 synth_opposition_deception_desc: "Se tergiversa la narrativa pública con el fin de enfatizar los aspectos positivos de la sintetización mental."
 synth_tinkering_with_minds: "Acondicionar mentes"
 synth_tinkering_with_minds_desc: "Se somete a las mentes recién digitalizadas a una reprogramación moderada para adecuarlas a nuestros planes de futuro."
 synth_brightest_minds: "Priorizar a los más brillantes"
 synth_brightest_minds_desc: "Solo participa en nuestro programa de sintetización una selección de individuos de suma excepcionalidad."
 synth_reprogram_minds: "Reprogramación opresora"
 synth_reprogram_minds_desc: "Conforme digitaliza a la población, el gobierno reprograma sin contemplaciones a los individuos \"no aptos\"."
 victim_compensation: "Indemnización a las víctimas"
 victim_compensation_desc: "Resarcimiento ofrecido a las familias de quienes han visto mermadas sus capacidades mentales a causa de la sintetización."
 synth_mandatory_volunteers: "Voluntarios obligatorios"
 synth_mandatory_volunteers_desc: "Se obliga a los sujetos de prueba a participar en experimentos de digitalización de una consciencia biológica."
 synth_mass_demonstrations: "Manifestaciones masivas"
 synth_mass_demonstrations_desc: "La mano de obra del planeta está enfrascada en protestas multitudinarias contra el plan de transición mecanizada."
 synth_fund_heritage_sites: "Fundar sitios patrimoniales"
 synth_fund_heritage_sites_desc: "Se crearán sitios patrimoniales especiales para limitar el impacto de la transición sintética en los miembros biológicos de nuestra especie."
 synth_revere_the_past: "Venerar el pasado"
 synth_revere_the_past_desc: "Los rituales religiosos originados a partir de nuestra existencia biológica aún son importantes para nuestra especie. Debemos proteger esos lugares de culto."
 synth_preserve_the_past: "Conservar el pasado"
 synth_preserve_the_past_desc: "No por cambiar radicalmente de existencia tenemos que destruir los lugares y objetos que daban sentido a nuestro pasado biológico."
 synth_resistance_fight: "Redada a líderes de la resistencia"
 synth_resistance_fight_desc: "Enviar a nuestras brigadas mecanizadas a los $d_biological_enclaves_no_icon$ para identificar y apresar a los líderes de la resistencia acallará sus protestas en tiempo récord."
 synth_resistance_diplomacy: "Diplomacia con líderes de la resistencia"
 synth_resistance_diplomacy_desc: "Es posible lograr un acercamiento mutuo si visitamos los $d_biological_enclaves_no_icon$ y nos reunimos con los líderes de la resistencia."
 synth_character_force: "Imitar nuestra antigua forma orgánica"
 synth_character_force_desc: "La forma convencional de nuestra especie se mantiene en el plano digital."
 synth_character_customize: "Modificación corporal sintética sin restricciones"
 synth_character_customize_desc: "Los individuos pueden modificar libremente su nueva apariencia digital."
 synth_character_customize_elite: "Modificación corporal restringida"
 synth_character_customize_elite_desc: "A fin de mantener una jerarquía social inequívoca, solo pueden modificar su apariencia los miembros de estamentos superiores."
 synth_character_customize_corpo: "Modificación corporal sintética monetizada"
 synth_character_customize_corpo_desc: "La modificación de la propia estética digital está al alcance de todo el mundo... que se lo pueda permitir."
 synth_cravings_imperfections: "Imperfecciones sintéticas premeditadas"
 synth_cravings_imperfections_desc: "Para evitar caer en una existencia vacía e impersonal, se dota a los cuerpos sintéticos de rasgos imperfectos a propósito."
 synth_cravings_simulation: "La vida en una simulación"
 synth_cravings_simulation_desc: "Trabajamos para brindar una existencia realista a quienes decidan vivir en una simulación, penurias incluidas."
 synth_cravings_stop: "Desoír a los conservadores orgánicos"
 synth_cravings_stop_desc: "Con el tiempo, nuestra gente entenderá que la vida perfecta es la vida mejor, sin dificultades orgánicas."
 synth_cravings_pain: "Arena de batalla virtual"
 synth_cravings_pain_desc: "Tanto combatientes como espectadores ven colmada su necesidad de ser útiles gracias a dolorosas batallas virtuales."
 synth_health_physical: "Atención sintético-física prioritaria"
 synth_health_physical_desc: "Nuestro sistema de salud sintética se centrará en solucionar, ante todo, averías locales."
 synth_health_virtual: "Atención sintético-mental prioritaria"
 synth_health_virtual_desc: "Es vital para nuestra salud implementar actualizaciones de software constantes para velar por la seguridad mental de nuestra población."
 synth_health_both: "Atención sintética equitativa"
 synth_health_both_desc: "Es esencial para el bienestar de nuestra población que corrijamos inestabilidades tanto de software como de hardware."
 synth_health_corporate: "Medicalización sintética"
 synth_health_corporate_desc: "Es fundamental ampliar la experiencia de nuestra corporación más allá de la medicación tradicional para el tratamiento de los virus digitales."
 synth_virtual_world_outlaw: "Mundos virtuales ilegalizados"
 synth_virtual_world_outlaw_desc: "Se han prohibido complejos turísticos virtuales altamente adictivos por considerarlos una amenaza para la sociedad."
 synth_virtual_world_promote: "Mundos virtuales incentivados"
 synth_virtual_world_promote_desc: "En la utopía digital, la población es libre de entretenerse de infinitas formas."
 synth_virtual_world_regulate: "Mundos virtuales regulados"
 synth_virtual_world_regulate_desc: "Los complejos virtuales de elevado factor adictivo se regulan con mano dura para que la gente conserve cierto vínculo con la realidad."
 synth_home_centralized: "Granjas de servidores centralizadas"
 synth_home_centralized_desc: "Todas y cada una de las consciencias digitalizadas se almacenan en granjas de servidores estatales, método que garantiza una eficiencia máxima a un coste mínimo."
 synth_home_distributed: "Distribución de servidores domésticos"
 synth_home_distributed_desc: "Cada consciencia digitalizada se almacena en su correspondiente hogar doméstico."
 synth_digital_homes: "Sector inmobiliario digital"
 synth_digital_homes_desc: "Con un modelo de negocio semejante al mercado inmobiliario tradicional, las propiedades digitales procuran una rentabilidad casi idéntica por apenas una fracción de su coste."
 synth_respawn_push: "Seguridad sintética laxa"
 synth_respawn_push_desc: "Unos estándares de seguridad física más indulgentes garantizan una economía resiliente."
 synth_respawn_caution: "Estándares de seguridad sintética"
 synth_respawn_caution_desc: "No es posible garantizar la protección de los cuerpos y mentes sintéticos sin una legislación estricta."
 synth_respawn_elite: "Seguridad sintética privilegiada"
 synth_respawn_elite_desc: "Las castas superiores tienen prohibido trabajar en labores que comporten un riesgo para el cuerpo o la mente."
 synth_cultural_exchange: "Entendimiento cultural"
 synth_cultural_exchange_desc: "Los programas de intercambio cultural hacia y desde nuestros sitios patrimoniales promueven el entendimiento mutuo entre nuestros pueblos."
 synth_combat_reactors: "Reactores de combate"
 synth_combat_reactors_desc: "Se ha aplicado a nuestros cuerpos mecánicos una revolucionaria tecnología de microfusión que acrecienta nuestra pericia en combate."
 synth_AI_actor: "Portavoz de IA"
 synth_AI_actor_desc: "Gracias a la copia generada por IA de una celebridad fallecida, estamos obteniendo apoyo para nuestra directiva de sintetización."
 #Deposits
 d_old_towns_no_icons: "Antiguas ciudades"
 d_old_towns: "£blocker£ $d_old_towns_no_icons$"
 d_old_towns_desc: "En esta región predominan ciudades bien conservadas donde residen miembros de nuestra especie original. Mediante una inversión de recursos, podemos convencer a los reticentes para que accedan a transfigurarse en máquinas."
 d_old_towns_custom_tooltip: "§Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§! creada(s)"
 d_biological_enclaves_no_icon: "Enclaves biológicos"
 d_biological_enclaves: "£blocker£ $d_biological_enclaves_no_icon$"
 d_biological_enclaves_desc: "En esta región predominan ciudades pobladas por objetores a la transición sintética."
 d_biological_enclaves_custom_tooltip: "§Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§! creada(s)"
 #Policies
 policy_synthetic_identities_policy: "Identidades sintéticas"
 policy_synthetic_identities_policy_desc: "Es preciso crear nuevas identidades sintéticas para poder multiplicarnos."
 identity_copy_name: "Copias identitarias"
 identity_copy: "$identity_copy_name$"
 identity_copy_desc: "$tech_identity_copy_desc$\n\nLa homogeneidad de las copias tan solo les produce cierta aflicción.\n\n$TECH_UNLOCK_IDENTITY_COPY_DESC$\n\n§E$identity_copy_name$ $can_enable_mind_creation$§!"
 identity_fusion_name: "Fusión identitaria"
 identity_fusion: "$identity_fusion_name$"
 identity_fusion_desc: "$tech_identity_fusion_desc$\n\n$TECH_UNLOCK_IDENTITY_FUSION_DESC$\n\n§E$identity_fusion_name$ $can_enable_mind_creation$§!"
 identity_initialization_name: "Inicialización identitaria"
 identity_initialization: "$identity_initialization_name$"
 identity_initialization_desc: "$tech_identity_initialization_desc$\n\n$TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC$\n\n§E$identity_initialization_name$ $can_enable_mind_creation$§!"
 can_enable_mind_creation: "se usa al montar sintéticos"
 policy_computation_core_allocation: "Prioridad de núcleos computacionales"
 policy_computation_core_allocation_desc: "Las empresas sintetizadas pueden desviar ciclos computacionales de sus sistemas centrales para optimizar sin demora valiosos sectores de la sociedad."
 computation_core_production_name: "Producción agilizada"
 computation_core_production: "$computation_core_production_name$"
 computation_core_production_desc: "Utiliza los ciclos de procesamiento de reserva para agilizar los procesos de producción.$computation_core_production_tt$"
 computation_core_production_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Por cada $pop_group_unit$ £job_roboticist£ $job_roboticist_plural$ y $job_identity_designer_plural_with_icon$, los §Y$BONUS_WORKFORCE_FOR$ £job_foundry£ $job_foundry_plural$§! and §Y£job_artisan£ $job_artisan_plural$§! aumentan §G+2,5%§!."
 computation_core_stability_name: "Análisis de estabilidad"
 computation_core_stability: "$computation_core_stability_name$"
 computation_core_stability_desc: "Se asignan recursos para supervisar el flujo de información social en busca de irregularidades.$computation_core_stability_tt$"
 computation_core_stability_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Por cada $pop_group_unit$ £job_roboticist£ $job_roboticist_plural$ y $job_identity_designer_plural_with_icon$, los §Y$BONUS_WORKFORCE_FOR$ £job_bureaucrat£ $job_bureaucrat_plural$§! aumentan §G+2,5%§!."
 computation_core_research_name: "Procesos de investigación"
 computation_core_research: "$computation_core_research_name$"
 computation_core_research_desc: "Designan ciclos de procesamiento adicionales a los servidores de investigación de alto rendimiento.$computation_core_research_tt$"
 computation_core_research_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Por cada $pop_group_unit$ £job_roboticist£ $job_roboticist_plural$ y $job_identity_designer_plural_with_icon$, los §Y$BONUS_WORKFORCE_FOR$ £job_physicist£ $job_physicist_plural$§!, §Y£job_biologist£ $job_biologist_plural$§! y §Y£job_engineer£ $job_engineer_plural$§! aumentan §G+2,5%§!."
 #Technologies
 tech_identity_copy: "Copias identitarias"
 tech_identity_copy_desc: "Podremos copiar la identidad y los recuerdos de un ente sintético a un nuevo cuerpo mecánico. Las copias poseen habilidades predecibles, pero dan poco juego en lo que a conversación respecta."
 TECH_UNLOCK_IDENTITY_COPY_TITLE: "Concede acceso a la política:$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_copy_name$"
 TECH_UNLOCK_IDENTITY_COPY_DESC: "£pop£ §HPoblaciones mecánicas§!$TABBED_NEW_LINE$Felicidad: §R-5%§!"
 tech_identity_fusion: "Fusión identitaria"
 tech_identity_fusion_desc: "La fusión de las identidades y los recuerdos de dos o más sintéticos en un cuerpo mecánico dará como resultado individuos nuevos y, a su manera, únicos."
 TECH_UNLOCK_IDENTITY_FUSION_TITLE: "Concede acceso a la política:$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_fusion_name$"
 TECH_UNLOCK_IDENTITY_FUSION_DESC: "£pop£ §HPoblaciones mecánicas§!$TABBED_NEW_LINE$Coste de montaje: §R+10%§!"
 tech_identity_initialization: "Inicialización identitaria"
 tech_identity_initialization_desc: "Poseeremos la capacidad de inicializar un núcleo identitario artificial e imbuirle una infancia virtual. Si bien el coste es elevado, podremos simular las experiencias idóneas para generar personalidades productivas."
 TECH_UNLOCK_IDENTITY_INITIALIZATION_TITLE: "Concede acceso a la política:$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_initialization_name$"
 TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC: "£pop£ §HPoblaciones mecánicas§!$TABBED_NEW_LINE$Felicidad: §G+5%§!$TABBED_NEW_LINE$Recursos por £job£ §Htrabajos§!: §G+5%§!$TABBED_NEW_LINE$Coste de montaje: §R+20%§!"
 #DIGITIZATION STAGE 1
 synth.100.name: "Puesta en marcha" #Stage 1 - Start event
 synth.100.desc: "Ha llegado la hora de desprendernos de nuestra forma biológica y encarnarnos en aleaciones y electricidad. Con cuerpos de última generación y mentes aceleradas, acometeremos el camino al mañana. La [Owner.Species.GetFleshTypeCyberCreed] equivale a defectos, pero una máquina se puede perfeccionar.\n\nSin embargo, la transición no será sencilla. La comunidad de investigación necesita al menos un $building_identity_complex$ que actúe como centro para el desarrollo sintético. Nos aguarda nuestro destino."
 synth.100.a: "Somos artífices de nuestro futuro."
 synth.100.a.tt: "§RAcción necesaria:§!\nConstruir un $building_identity_complex$ para que la situación §Y$situation_digitization$§! prosiga."
 synth.105.name: "Versiones mejoradas"
 synth.105.desc: "Con la capacidad de procesamiento superior que posee un cerebro sintético, podemos superar nuestros límites biológicos. Aun con todo, ese potencial tiene sus límites, por lo que será necesario establecer prioridades.$synth.105.end$"
 synth.105.end: "\n\nPodríamos centrarnos en amplificar el proceso de toma de decisiones, aumentar el almacenamiento de memoria u optimizar la coordinación mente-extremidades. Todo esto mejoraría ciertos tipos de trabajos. También podríamos mejorar la durabilidad de todos los cuerpos.\n\nSerá necesario invertir recursos de forma continuada en estas funciones, y solo estarán disponibles en planetas con una planta de montaje de robots, pero lo que aprendamos del diseño brindará beneficios de productividad inmediatos."
 synth.105.a: "Optimizaremos la toma de decisiones."
 build_better_synths: "Modificador de edificios de montaje de robots añadido:"
 synth.105.a.tt: "$build_better_synths$\nRendimiento de recursos de población de élite: §G+15%§!\n\n"
 synth.105.b: "Centrémonos en el almacenamiento de memoria."
 synth.105.b.tt: "$build_better_synths$\nRendimiento de recursos de población especialista: §G+5%§!\n\n"
 synth.105.c: "Mejoremos las funciones motrices."
 synth.105.c.tt: "$build_better_synths$\nRendimiento de recursos de población obrera: §G+10%§!\n\n"
 synth.105.d: "Mejoremos la durabilidad."
 synth.105.d.tt: "$build_better_synths$\n$mod_planet_jobs_upkeep_mult$: §G-5%§!\n\n"
 #Stage 1 Opportunities - Research
 synth.120.name: "Microfusión kinestésica"
 synth.120.desc: "\"¡Con modificaciones de microfusión, levantas un tanque como si nada!\", pregona un importante servicio de valoración del consumidor, y no exagera: los últimos avances en tecnología de microfusión prometen mejoras prodigiosas para nuestros cuerpos mecánicos.\n\nNo sin cierto riesgo, la instalación de reactores personales diminutos les otorga una capacidad explosiva de transferencia de energía y velocidad superior. Huelga decir que la puesta en práctica de esta idea alargaría los tiempos de producción debido a la inclusión de generadores en un proyecto ya de por sí complejo."
 synth.120.a: "¡Aspiramos a la excelencia, nada menos!"
 synth.120.a.tt: "Velocidad de avance de situación §Y$situation_digitization$§! durante §Y1§! año: §R-50%§!"
 situation_kinesthetic_microfusion_tt: "Configuración de microfusión cinestética"
 synth.120.b: "Es un añadido innecesario."
 synth.120.c: "Centrémonos en pulir nuestro desempeño en combate."
 #Stage 1 Challenges - Research
 synth.160.name: "Mala publicidad"
 synth.160.desc: "Una nueva obra dramática que está causando furor ha hecho mella en el imaginario público. La historia se centra en un trabajador sintético que se desvincula de su nuevo cuerpo.\n\nEl personaje pierde por completo las riendas de la realidad, y sus horrorizados familiares y allegados no pueden hacer nada para evitarlo. El trágico desenlace de la obra se percibe como una crítica apenas velada a nuestro plan de transición a cuerpos mecánicos.\n\nEl discurso público en torno al éxito ha provocado un retroceso considerable y, en última instancia, podría frenar nuestro progreso."
 synth.160.a: "Ya se pasará la moda."
 synth.160.b: "Destinemos parte de los fondos de investigación a RR. PP."
 synth.160.c: "Debemos arrestar al director."
 synth.160.d: "Se omitirá toda noticia o crónica al respecto."
 #DIGITIZATION STAGE 2
 synth.200.name: "Filosofía de la mente" #Stage 2 - Start event
 synth.200.desc: "Los beneficios de una mente digitalizada por completo se nos antojaron tan evidentes, que nos creímos exentos de toda secuela negativa. Tal vez pecamos de inocentes. Las objeciones a la síntesis completa han sido contundentes y ya es imposible eludirlas.\n\nLa principal crítica radica en nuestra incapacidad para demostrar que puede transferirse la identidad absoluta de forma segura y completa. Hay cierto temor, y no del todo infundado, a que todo lo que hemos logrado no sea más que una copia digital. ¿De verdad son nuestras, entonces, estas mentes?"
 synth.200.a: "Revelemos la verdad: no lo sabemos."
 synth.200.a.tt: "Inicia una campaña de información que suscita una oposición §Hmínima§! a la sintetización.\n\n"
 synth.200.b: "Les diremos lo que quieren oír."
 synth.200.b.tt: "Inicia una campaña de desinformación que suscita una oposición §Hmoderada§! a la sintetización.\n\n"
 synth.200.c: "Un puñado de insurgentes no echarán por tierra nuestros esfuerzos."
 synth.200.c.tt: "Ignora a los objetores y suscita una oposición §Hmáxima§! a la sintetización."
 synth.200.c.material: "Los devaneos de la consciencia no son cosa nuestra."
 synth.200.c.material.tt: "Una perspectiva puramente científica suscita una oposición §Hmoderada§! a la sintetización.\n\n"
 synth.205.name: "Apego al pasado"
 synth.205.desc: "Las voces contrarias al proyecto de sintetizar a nuestra población no son pocas, y se han convocado protestas violentas que nuestras fuerzas policiales apenas han sido capaces de contener. Los manifestantes temen acabar perdiendo la esencia misma de la vida, lo que le da significado. ¿De qué sirve la sintetización si desaparecen, por ejemplo, el placer físico y la camaradería?\n\nLos extremistas del movimiento de protesta piden que ciertas ciudades sean designadas como sitios patrimoniales. Esto permitiría que los objetores continúen con su vida biológica sin que los molesten."
 synth.205.a.regular: "Apoyamos plenamente estos sitios patrimoniales."
 synth.205.a.spiritualist: "Nuestro pasado ha de preservarse."
 synth.205.a.memorialist: "Honrar el pasado es un acto de reverencia."
 synth.205.b: "Debemos dejar el pasado atrás."
 #Stage 2 Opportunities - Objectors
 synth.220.name: "Segunda vida"
 synth.220.desc: "Una celebridad con fuertes opiniones contra todo lo sintético ha sufrido un accidente y actualmente se encuentra en estado vegetativo. Aunque la población lamenta la pérdida de esta personalidad tan querida, nuestros asesores prosintetizadores han visto una oportunidad.\n\nSi se digitalizara la mente de la celebridad y se le ofreciera una segunda vida en un cuerpo sintético, seguro que algunos de sus seguidores se convertirían en fervientes partidarios de la sintetización. Aunque el proceso es completamente legal, el problema radica en el consentimiento: en igualdad de condiciones, la celebridad en cuestión nunca aceptaría dicho procedimiento. Además, si se gestionara mal, esta artimaña de relaciones públicas podría convertirse en un desastre mediático."
 synth.220.a: "La sintetización no es un crimen."
 synth.220.a.tt.negative: "Velocidad de avance de la situación §Y$situation_digitization$§! durante §Y6§! meses: §R-30%§!"
 synth.220.a.tt.positive: "Velocidad de avance de la situación §Y$situation_digitization$§! durante §Y6§! meses: §G+30%§!"
 synth.220.b: "No deberíamos arriesgarnos."
 synth.220.c: "Engañad al público con una IA que reemplace a la celebridad."
 synth.220.c.tt: "Su imagen se convertirá en un actor de nuestra narrativa."
 #Stage 2 Challenges - Objectors
 synth.260.name: "Mentes perdidas"
 synth.260.desc: "Los experimentos para digitalizar los billones de conexiones sinápticas que componen la consciencia biológica han terminado en un fracaso catastrófico. Un simple fallo en la sintaxis ha borrado al instante las vías neuronales de nuestros sujetos. Algunos lo tildan de asesinato.\n\nLos participantes eran todos voluntarios, pero sus afligidos familiares claman por justicia. El problema se ve agravado por la dificultad a la hora de encontrar nuevos sujetos."
 synth.260.a: "Compensad a las familias y seguid adelante."
 synth.260.b: "Los nuevos sujetos serán seleccionados por sorteo."
 synth.260.b.tt: "Velocidad de avance de la situación §Y$situation_digitization$§! durante §Y1§! año: §R-25%§!"
 situation_test_subject_lottery_tt: "Sorteo de sujetos de prueba"
 synth.260.c: "Encontrad voluntarios a la fuerza si fuera necesario."
 #DIGITIZATION STAGE 3
 synth.300.name: "Carga masiva de identidades" #Stage 3 - Start event
 synth.300.desc: "En todos los centros urbanos de nuestro territorio hemos instalado cabinas de sintetización, listas para recibir a nuestra población [owner.species.GetName]. Los patrones de identidad digital diseñados por los $job_identity_designer_plural$ prometen una correspondencia uno a uno con el original biológico.\n\nPor fin ha llegado el día de desprendernos de nuestro pasado biológico y abrazar un futuro sintético."
 synth.300.a: "¡Sintetizaos!"
 synth.300.a.resistance.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\nMueve §Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§! a §Y$d_biological_enclaves$§! en [root.owner.capital_scope.GetName]\nEliminar la barrera devuelve §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!\n\n§YModificador $synth_mass_demonstrations$§! eliminado de [root.owner.capital_scope.GetName]\n\nLa velocidad de sintetización depende del enfoque de situación y el número de edificios de montaje de robots."
 synth.300.a.heritage.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\nMueve §Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§! a §Y$d_old_towns$§! en [root.owner.capital_scope.GetName]\nEliminar la barrera devuelve §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!\n\nLa velocidad de sintetización depende del enfoque de situación y el número de edificios de montaje de robots."
 synth.305.name: "Turismo sintético"
 synth.305.desc: "Si bien los sitios patrimoniales designados en [root.owner.capital_scope.GetName] han sido bien recibidos por el público, puede que la iniciativa haya resultado demasiado exitosa. En un arrebato de nostalgia, un gran número de turistas sintéticos ha acudido a los yacimientos y están empezando a agobiar a los habitantes biológicos.\n\nQuizá sea necesario limitar el turismo si queremos mantener ese aire de autenticidad en estos espacios. Sin embargo, la interacción entre turistas y residentes podría arrojar resultados sociológicos interesantes."
 synth.305.a: "Limitad el turismo."
 synth.305.b: "Fomentar el turismo podría ser lucrativo."
 synth.305.c: "Estudiar el impacto del turismo en los sitios."
 synth.305.d: "El intercambio cultural promueve el entendimiento mutuo."
 synth.310.name: "La resistencia"
 synth.310.desc: "El movimiento en [root.owner.capital_scope.GetName] contra la sintetización ha radicalizado sus tácticas y ambiciones. De hecho, las fuerzas de seguridad han notado un repunte de la violencia, así como la proliferación de armas ilegales en los segmentos más extremistas del movimiento.\n\nAlgunos de estos disidentes, autodenominados \"líderes de la resistencia\", se han retirado a escondites desde donde preparan acciones antigubernamentales más explícitas."
 synth.310.a: "Reunid a los líderes."
 synth.310.a.tt: "Velocidad de avance de la situación §Y$situation_digitization$§! durante §Y1§! año: §G+25%§!\n\n"
 synth.310.b: "Intentad calmar la situación."
 synth.310.b.tt: "Velocidad de avance de la situación §Y$situation_digitization$§! durante §Y1§! año: §R-25%§!\n\n"
 #Stage 3 Opportunities - Mind Upload
 synth.320.name: "21 386 732 184 unidades de memoria"
 synth.320.desc: "21 386 732 184 unidades de memoria. Esa es la capacidad media del cerebro [root.owner.GetSpeciesName]. Sin embargo, no todas las mentes están creadas de la misma manera.\n\nA medida que el proceso de sintetización continúa, algunos afirman que no todas las mentes merecen un cuerpo artificial. Sin embargo, la cuestión sobre cuáles priorizar es un tema que levanta ampollas. Quizá... las mentes menos convenientes puedan mejorar una vez digitalizadas y reprogramadas."
 synth.320.a: "Todas las mentes merecen ser preservadas."
 synth.320.b: "No hay nada de malo en trastear un poco..."
 synth.320.c: "Priorizad a las mentes más brillantes."
 synth.320.d: "Reprogramad a los individuos problemáticos"
 #Stage 3 Challenges - Mind Upload
 synth.360.name: "Malware en el aire"
 synth.360.desc: "Para aumentar la productividad de los [roboticist.GetNamePlural], los directivos han aprobado arriesgadas actualizaciones de software de identidad por vía inalámbrica. La intención era parchear conocimientos sobre procesos de trabajo óptimos, pero lo que se ha conseguido es que se pierdan parcialmente la personalidad y los recuerdos de los desafortunados destinatarios.\n\nEl equipo directivo dice que el proceso de probar los parches de identidad antes de aplicarlos sería demasiado lento, y que es más fácil reasignar a los trabajadores que hayan perdido los recuerdos."
 synth.360.a: "El coste de la optimización de la productividad merece la pena."
 synth.360.a.tt: "Modificador de edificios de montaje de robots añadido:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §G+10%§!\n\nMantenimiento base de §Y[roboticist.GetNamePlural]§!: £alloys£§R3,00§!"
 synth.360.b: "Imponed procesos de actualización lentos pero seguros."
 synth.360.b.tt: "Modificador de edificios de montaje de robots añadido:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §R-10%§!\nEstabilidad: §G+5§!"
 #DIGITIZATION STAGE 4
 synth.400.name: "Una copia perfecta" #Stage 4 - Start event
 synth.400.desc: "Cuando digitalizamos nuestras mentes y las descargamos en los cuerpos sintéticos, perdimos la capacidad de reproducirnos de manera biológica. Ahora nos toca crear individuos mediante copias de mentes ya existentes.\n\nNo cabe duda de que mejoraremos nuestros procesos a medida que nuestros $job_identity_designer_plural$ avancen en sus investigaciones. Después de todo, incluso una copia perfecta no deja de ser más que una réplica. El desafío está en crear una nueva mente y una nueva identidad."
 synth.400.a: "Dejad que cualquiera reclame copias de identidad gratuitas."
 synth.400.pop.tt: "$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\nCada §Y$job_identity_designer$§! ahora proporciona en todo el imperio:$TABBED_NEW_LINE$£mod_planet_pop_assembly_mult£ $MOD_POP_ASSEMBLY_SPEED$: §G+1§!\n\n"
 synth.400.b: "Cobrad al usuario por cada copia."
 synth.405.name: "Diversificar identidades"
 synth.405.desc: "Nuestros $job_identity_designer_plural$ han descubierto dos métodos para crear identidades digitales más diversas.\n\nUna opción sería mezclar las características de dos o más personalidades existentes para crear una nueva identidad combinada. Podríamos priorizar aquellos rasgos que prefiramos o seleccionarlos al azar. Sea como fuere, la nueva identidad seguramente sería más interesante que nuestras copias de identidad actuales.\n\nComo alternativa, se podría inicializar una nueva identidad a partir de un núcleo artificial y dejar que pase por una infancia acelerada (y simulada). De esta forma, se podría diseñar una personalidad perfecta."
 synth.405.a: "Mezclaremos nuestras identidades."
 synth.405.a.vault: "Mezcladlas con nuestros ancestros digitalizados."
 synth.405.a.tt: "Opción de invest. ganada: £engineering£§Y$tech_identity_fusion$§!\n\nPosibilidad de investigación futura: £engineering£§Y$tech_identity_initialization$§!"
 synth.405.b: "La guardería virtual es lo mejor."
 synth.405.b.tt: "Opción de invest. ganada: £engineering£§Y$tech_identity_initialization$§!\n\nPosibilidad de investigación futura: £engineering£§Y$tech_identity_fusion$§!"
 synth.4.name: "Una población sintética" #Digitization - Last event
 synth.4.desc: "En un esfuerzo coordinado, hemos alcanzado lo que una vez parecía imposible: transformar nuestras consciencias en código y nuestros cuerpos en máquinas.\n\nEl proceso no ha estado exento de dificultades y la transición no ha sido precisamente fácil, pero da igual lo que se perdiera en el camino, ya que nuestra nueva configuración ofrece un sinfín de posibilidades."
 synth.4.desc.unplugged: "En un esfuerzo coordinado, hemos alcanzado lo que una vez parecía imposible, e incluso profano tal vez. Gracias a nuestro poderío evolutivo, hemos trascendido al sometimiento de [origin_unplugged_assimilator_empire.GetName], transformando en código nuestras consciencias, y nuestros cuerpos en máquinas.\n\nEl proceso no ha estado exento de dificultades y la transición no ha sido precisamente fácil, pero da igual lo que se perdiera en el camino, ya que nuestra nueva configuración ofrece un sinfín de posibilidades."
 synth.4.a: "Seremos excepcionales."
 synth.4.a.tt: "Desbloquea los efectos totales del árbol de tradiciones: ['tradition_category:tradition_synthetics']"
 ### DIGITIZATION SITUATION END ###
 ### SOCIETAL EFFECTS EVENT CHAIN START ###
 synthshock_chain_title: "Refactorización digital"
 synthshock_chain_desc: "La sintetización de toda una población es una empresa de proporciones monumentales no exenta de repercusiones. A medida que nos adaptemos a la nueva normalidad, habrá incontables desafíos y oportunidades únicas que afectarán a nuestro día a día.\n\nLa manera en la que afrontemos estos cambios definirá a nuestra sociedad durante los próximos años."
 synth_keep_auth_option: "La sintetización no cambia quiénes somos."
 ### AUTHORITIES ###
 #DEMOCRATIC
 #Synth Democratic Physical
 auth_synth_democratic_physical: "Transferencia democrática"
 auth_synth_democratic_physical_desc: "Esta forma de gobierno permite una libertad de movimiento sin precedentes entre un cuerpo sintetizado y otro, y está dispuesta a hacer frente al coste adicional que eso conlleva."
 auth_synth_democratic_physical_tt: "$auth_democratic_election_tt$\nEficacia laboral de especialistas: §G+1%§! por £district£ distrito\nMantenimiento de distrito §R+1%§! por £district£ distrito"
 concept_auth_synth_democratic_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical_desc: "$auth_synth_democratic_physical_desc$"
 #Synth Democratic Virtual
 auth_synth_democratic_virtual: "Subrogación democrática"
 auth_synth_democratic_virtual_desc: "Reemplazar a los soldados por sofisticados sustitutos teledirigidos reduce el impacto de la guerra en la población. Las naves también se pueden fabricar más finas, ya que la tripulación no necesita camarotes ni cabinas."
 auth_synth_democratic_virtual_tt: "$auth_democratic_election_tt$"
 concept_auth_synth_democratic_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual_desc: "$auth_synth_democratic_virtual_desc$"
 #OLIGARCHIC
 auth_cyber_oligarch_ruler_enforcers_tt: "Rendimiento de recursos de gobernante por [enforcer.GetIcon] [enforcer.GetName]: §G+10%§!"
 #Synth Oligarchic Physical
 auth_synth_oligarchic_physical: "Anulación oligárquica"
 auth_synth_oligarchic_physical_desc: "Las oligarquías sintéticas autorizan a los burócratas de alto nivel a hacerse cargo temporalmente de los cuerpos de sus homólogos de bajo rendimiento para evitar catástrofes en la gestión de procesos."
 concept_auth_synth_oligarchic_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical_desc: "$auth_synth_oligarchic_physical_desc$"
 #Synth Oligarchic Virtual
 auth_synth_oligarchic_virtual: "Supervisión oligárquica"
 auth_synth_oligarchic_virtual_desc: "Los protocolos holísticos de gestión de proyectos y los recursos de procesamiento adicionales permiten que los oficiales de alto rango supervisen varios edictos en todo el imperio con una eficiencia sin precedentes."
 concept_auth_synth_oligarchic_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual_desc: "$auth_synth_oligarchic_virtual_desc$"
 #DICTATORIAL
 #Synth Dictatorship Physical
 auth_synth_dictatorial_physical: "Manifiesto dictatorial"
 auth_synth_dictatorial_physical_desc: "Los neuroconectores sincronizados y la infraestructura de apoyo permiten que una única persona pueda controlar varios cuerpos sintéticos a la vez. Esto tiene un tremendo efecto positivo en la productividad de los trabajadores."
 concept_auth_synth_dictatorial_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical_desc: "$auth_synth_dictatorial_physical_desc$"
 #Synth Dictatorship Virtual
 auth_synth_dictatorial_virtual: "Adoctrinamiento dictatorial"
 auth_synth_dictatorial_virtual_desc: "Ahora existimos en un mundo totalmente virtual. Nada es verdad. Todo se puede manipular.\n\nCon un control total sobre el entorno, tenemos a la opinión pública a nuestra disposición para moldearla. La gente creerá lo que nosotros queramos que crea."
 concept_auth_synth_dictatorial_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual_desc: "$auth_synth_dictatorial_virtual_desc$"
 #IMPERIAL
 #Synth Imperial Physical
 auth_synth_imperial_physical: "Información imperial"
 auth_synth_imperial_physical_desc: "Podemos acelerar nuestros trabajos de investigación si diseccionamos las huellas almacenadas de nuestros líderes fallecidos en los archivos de la memoria imperial. De esa manera, podemos seguir contribuyendo al imperio, tal como ellos habrían deseado.\n\nEl trono imperial lo hereda el sucesor designado tras la muerte del gobernante."
 auth_synth_imperial_physical_tt: "Los líderes otorgan $r_research$ al morir: $TABBED_NEW_LINE$$scientist_plural_with_icon$ - $r_physics$ $TABBED_NEW_LINE$$official_plural_with_icon$ - $r_society$ $TABBED_NEW_LINE$$commander_plural_with_icon$ - $r_engineering$ $NEW_LINE$ La $r_research$ obtenida cambia en función del §Ynivel de habilidad de líder§!"
 concept_auth_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical_desc: "$auth_synth_imperial_physical_desc$"
 #Synth Imperial Virtual
 auth_synth_imperial_virtual: "Transmisión imperial"
 auth_synth_imperial_virtual_desc: "La tecnología de transferencia mental rápida nos brinda la oportunidad de enviar de vuelta al combate a nuestros soldados caídos con cuerpos nuevos y mecanizados. La misma técnica permite que nuestros trabajadores lleven a cabo arriesgadas reparaciones de naves en el espacio.\n\nEl trono imperial lo hereda el sucesor designado tras la muerte del gobernante."
 auth_synth_imperial_virtual_tt: "Nuestros ejércitos robóticos tienen un §Y33%§! de posibilidades de restaurarse al ser derrotados"
 concept_auth_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual_desc: "$auth_synth_imperial_virtual_desc$"
 #CORPORATE
 #Synth Corporate Physical
 auth_synth_corporate_physical: "Sapiencia empresarial"
 auth_synth_corporate_physical_desc: "Se pueden imbuir mentes sintéticas restringidas en objetos inanimados para crear entidades vivientes rudimentarias. Pueden hacer de incansables sirvientes, fieles compañeros o incluso ser un estimado miembro de tu familia o negocio.\n\nLos gobiernos corporativos son empresas comerciales masivas que han suplantado por completo el papel del estado."
 auth_synth_corporate_physical_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_ai_emporium']"
 concept_auth_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical_desc: "$auth_synth_corporate_physical_desc$"
 #Synth Corporate Virtual
 auth_synth_corporate_virtual: "Recuerdo corporativo"
 auth_synth_corporate_virtual_desc: "Esta corporación se dedica a comprar recuerdos y borrarlos permanentemente del cerebro del cliente. Los recuerdos vívidos e intensos valen más que los mundanos. Luego, la corporación escanea los datos en busca de información útil antes de integrarlos en el proceso de creación de la mente sintética.\n\nLos gobiernos corporativos son empresas comerciales masivas que han suplantado por completo el papel del estado."
 auth_synth_corporate_virtual_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_clear_thought_clinic']"
 concept_auth_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual_desc: "$auth_synth_corporate_virtual_desc$"
 ### EDICTS ###
 edict_subsidized_identity_backups: "Copias de seguridad de identidad subvencionadas"
 edict_subsidized_identity_backups_desc: "El gobierno proporciona la inmensa cantidad de espacio en el servidor que sea necesaria para hacer copias de seguridad continuas de identidades."
 edict_subsidized_identity_backups_effect: "$MOD_LEADER_LIFESPAN_ADD$: §G+20 años§!\n$MOD_LEADER_SPECIES_EXP_GAIN$: §G+10%§!"
 concept_edict_subsidized_identity_backups: "$edict_subsidized_identity_backups$"
 edict_optimized_identity_creation: "Creación de identidad optimizada"
 edict_optimized_identity_creation_desc: "Los algoritmos de personalidad avanzados y las técnicas de compresión de memoria central mejoran la velocidad de generación de identidad."
 concept_edict_optimized_identity_creation: "$edict_optimized_identity_creation$"
 ### EVENTS ###
 synth.social_consequences.tt: "Influye en el actual §Ycambio de la sociedad sintética§!.\n\n" #Standard tooltip to indicate that the Physical/Virtual focus variables has changed
 #FIRST EVENT #
 #DEMOCRATIC
 synth.505.name: "$synthshock_chain_title$"
 synth.505.desc: "Gracias a los esfuerzos de nuestro gobierno, las consciencias de todos los voluntariosos ciudadanos se han transferido de manera digital. La sintetización ha abierto caminos que aún no podemos ni imaginar, los cuales conducen a nuevos retos y posibilidades.\n\nAl centrar nuestros esfuerzos en el mundo físico, podríamos transportar nuestras mentes digitalizadas a través de grandes distancias, hasta un nuevo cuerpo preparado para nosotros. También podríamos pensar en medios para crear soldados subrogados y controlados a distancia a fin de aliviar los rigores de la guerra."
 synth.505.a: "Deberíamos centrarnos en la libertad de movimiento."
 synth.505.a.tt: "Énfasis en el reasentamiento y los distritos."
 synth.505.b: "Debemos prepararnos para los horrores de la guerra."
 synth.505.b.tt: "Énfasis en el agotamiento bélico y los viajes subluz."
 #OLIGARCHIC
 synth.510.name: "$synthshock_chain_title$"
 synth.510.desc: "Aunque la sintetización ya ha afectado a la sociedad de maneras que no podríamos haber anticipado, el sentimiento general es que podemos ir mucho más allá. Nuestros cuerpos sintéticos actuales se pueden mejorar o incluso podrían desecharse por completo a cambio de una existencia plenamente virtual.\n\nSi decidimos asignar un cuerpo sintético a todo el mundo, los oficiales podrían hacerse cargo temporalmente de los cuerpos de miembros ineficaces del gobierno. Otra opción es renunciar a las formas físicas a medida en favor de una experiencia totalmente virtual y comunitaria que nos permita ejecutar decisiones con más eficacia que nunca."
 synth.510.a: "Centraos en tomar posesión de los cuerpos inútiles."
 synth.510.a.tt: "Énfasis en la eficiencia burocrática."
 synth.510.b: "Estudiad opciones holísticas de supervisión virtual."
 synth.510.b.tt: "Énfasis en edictos y en el tamaño del imperio."
 #DICTATORIAL
 synth.515.name: "$synthshock_chain_title$"
 synth.515.desc: "La sintetización completa de la población ha resultado ser un éxito rotundo. Nuestro pasado orgánico ya es historia, pero, para trazar un camino hacia el futuro, el/la §Y[From.GetRulerTitle] [From.GetRulerName]§! requiere tanto la obediencia incondicional de nuestras mentes más brillantes como tomar una decisión.\n\nMejorar nuestros cuerpos sintéticos permitiría a los individuos controlar a varios huéspedes como si fuesen uno solo. Otra alternativa es prescindir por completo del espacio físico y manipular la opinión pública a través de un entorno totalmente virtual."
 synth.515.a: "Centrémonos en los cuerpos neurosincronizados."
 synth.515.a.tt: "Énfasis en trabajadores y distritos."
 synth.515.b: "Concentrémonos en la manipulación virtual."
 synth.515.b.tt: "Énfasis en edificios y éticas gubernamentales."
 #IMPERIAL
 synth.520.name: "$synthshock_chain_title$"
 synth.520.desc: "Aunque la sintetización ya ha afectado al imperio de formas que no estaban previstas, parece que la población está dispuesta a ir incluso más allá. Nuestros cuerpos sintéticos podrían transformarse en extensiones de nuestra identidad o en meras herramientas que nuestra consciencia virtual podría controlar a distancia. Aún no hemos decidido qué camino tomar.\n\nPodemos investigar los medios para transferir de forma rápida una consciencia de un cuerpo prescindible a otro. Otra alternativa sería centrarnos en extraer el conocimiento de los recientemente fallecidos para acelerar nuestros trabajos de investigación."
 synth.520.a: "Investigad lo de extraer el conocimiento de los muertos."
 synth.520.a.tt: "Énfasis en líderes e investigación."
 synth.520.b: "Estudiad la transferencia de consciencia rápida."
 synth.520.b.tt: "Énfasis en ejércitos y naves."
 #CORPORATE
 synth.525.name: "$synthshock_chain_title$"
 synth.525.desc: "La sintetización de toda nuestra sociedad merece un profundo análisis de riesgos y beneficios. Aunque estamos entrando en la nueva y rentable frontera del futuro sintetizado, también estamos dejando atrás a nuestra base de clientes, más inclinada a lo material. En un mundo perfecto, nos gustaría conservar ambos segmentos de alguna manera.\n\nLos avances en campos relacionados con la sintetización, como la inteligencia artificial, nos permitirían dotar de vida rudimentaria a objetos inanimados y lanzar varias líneas de productos. Una exploración más completa del espacio virtual permitiría aprovechar los recuerdos de la gente como si fueran un nuevo tipo de mercancía."
 synth.525.a: "Estudiad la incorporación de la IA."
 synth.525.a.tt: "Énfasis en la producción y los beneficios."
 synth.525.b: "Investigad lo de transformar los recuerdos en beneficios."
 synth.525.b.tt: "Énfasis en el comercio, los productos y la información."
 ### EVENT POOL 1: IDENTITY ###
 synth.610.name: "Procedencia sintética"
 synth.610.desc: "Los cambios sociales fundamentales que ha traído la sintetización empiezan a dejarse sentir. Ahora que ya no estamos limitados por las formas corpóreas, hemos redefinido por completo las categorías de género, raza y autonomía corporal. Aunque para algunos ha sido liberador, aquellos elementos más tradicionales se muestran reacios a renunciar a la antigua estructura; desean una identidad predefinida desde la que operar.\n\nPara darles el gusto, podríamos retener partes de nuestra herencia orgánica en nuestra forma sintética. Otra opción es permitir a la población expresar su identidad con más libertad."
 synth.610.a: "Mantengamos nuestra forma original."
 synth.610.b: "Permitamos la modificación corporal sin restricciones."
 synth.610.c: "Establezcamos límites moderados para la personalización de la identidad."
 synth.610.d: "Los símbolos de estatus visibles deben permanecer."
 synth.610.e: "Esto se puede monetizar, ¿no?"
 synth.620.name: "Antojos orgánicos"
 synth.620.desc: "Algunas personas, poco entusiasmadas ante la sintetización, miran a su pasado orgánico con nostalgia. Dicen que tener una esperanza de vida más corta y la imperfección innata de un cuerpo natural daban más sentido a la vida.\n\nUn grupo de intransigentes que afirma que sus facsímiles sintéticos o virtuales les parecen impersonales y vacíos está desarrollando una devoción de culto a los cuerpos orgánicos.\n\nQuizá deberíamos proporcionarles una simulación menos perfecta que habitar. ¿O acaso preferirán una envoltura imperfecta?"
 synth.620.a: "Introducid imperfecciones premeditadas en los cuerpos sintéticos."
 synth.620.b: "Proporcionadles un mundo imperfecto."
 synth.620.c: "Romantizar el pasado es una estupidez."
 synth.620.d: "El dolor les recordará su propósito."
 synth.620.d.tt: "¡Que comiencen las batallas virtuales!\n\n"
 synth.630.name: "Arquitectura de servidores domésticos"
 synth.630.desc: "La sintetización de toda la especie §Y[root.GetSpeciesAdj]§! también ha supuesto un cambio radical en nuestras prácticas de alojamiento; ahora que las mentes descansan sin problemas en granjas de servidores masivas, los cuerpos sintéticos pueden almacenarse en estanterías. Aunque resulta una solución rentable, algunos grupos en defensa de los ciudadanos plantean ciertas preocupaciones.\n\nEl hasta ahora lucrativo mercado inmobiliario podría hundirse por completo y hacer mella en nuestra economía. Que la gente deje de tener un lugar físico al que llamar hogar podría ser incluso más perjudicial, al menos desde el punto de vista psicológico."
 synth.630.a: "Los servidores centralizados son más eficientes."
 synth.630.b: "Los servidores individuales se pueden almacenar en las casas existentes."
 synth.630.c: "Empezad a vender casas digitales."
 ### EVENT POOL 2: POSSIBILITIES ###
 synth.1010.name: "Matriz de posibilidades infinitas"
 synth.1010.desc: "La industria digital está en auge. El entretenimiento virtual nunca ha sido tan atractivo ni tan adictivo, ya que abarca la emoción de simular una aventura en primera persona o incluso permite relajarse en un complejo turístico digital. Aunque esta floreciente industria representa un motor económico clave, la producción en el mundo físico ha empezado a resentirse a medida que la gente pasa cada vez más tiempo en sus utopías digitales. Algunos corren peligro de perder todo contacto con la vida real, pero aún pueden participar en la sociedad mediante la economía digital.\n\n¿Deberíamos prohibir los mundos virtuales digitales adictivos, promocionarlos como una nueva forma de entretenimiento lucrativo o llegar a un punto intermedio mediante regulaciones?"
 synth.1010.a: "Prohibid por activa y por pasiva los mundos virtuales adictivos."
 synth.1010.b: "Promoved estos paraísos virtuales."
 synth.1010.b.hedonist: "¡Por fin el paraíso definitivo!"
 synth.1010.c: "Regulad la industria."
 synth.1020.name: "Medicina sintética"
 synth.1020.desc: "Nuestras nuevas formas sintéticas nos han liberado de las enfermedades y las lesiones propias del cuerpo orgánico. Por desgracia, esto también ha creado nuevos problemas, como simples averías mecánicas o problemas de estabilidad del servidor, problemas de conexión y virus digitales que ponen en peligro la vida.\n\n¿Deberíamos centrarnos en proteger nuestras mentes digitalizadas, considerar el cuerpo como un bien desechable o prestarle más atención como una extensión de nuestra identidad?"
 synth.1020.a: "Tenemos que seguir protegiendo el cuerpo."
 synth.1020.a.spiritual: "El cuerpo es el contenedor sagrado del alma."
 synth.1020.b: "Concentraos en proteger la mente."
 synth.1020.b.spiritual: "Ya hemos transcendido la forma física."
 synth.1020.c: "La clave está en el equilibrio."
 synth.1020.d: "Estas nuevas afecciones ofrecen una importante oportunidad de crecimiento..."
 synth.1030.name: "Regeneración"
 synth.1030.desc: "Nos hemos hecho más rápidos, fuertes y mejores, aunque someter a cuerpos sintéticos a situaciones peligrosas sigue pasando factura a nivel mental. Restaurar la mente puede atenuar el trauma, pero no lo elimina por completo, sobre todo porque la recuperación no siempre está garantizada. Tampoco se pueden fabricar nuevos cuerpos de la nada.\n\nPodemos obviar el trauma psicológico para impulsar los límites del rendimiento sintético o moderar nuestras ambiciones, ya que podríamos poner en peligro la estabilidad mental de la población."
 synth.1030.a: "Sigamos tensando los límites."
 synth.1030.b: "Actuemos con precaución."
 synth.1030.c: "La élite no debería correr tanto peligro."
 #FINAL EVENT #
 synth_virtual_trait: "\nLos [owner.species.GetNamePlural] obtienen el rasgo: §Y$trait_robot_digital_1$§!\nEl rasgo §Y$leader_trait_synthetic$§! de los líderes se reemplaza por el rasgo §Y$leader_trait_virtual$§!"
 synth_physical_traits: "\nDesbloquea rasgos §Yavanzados§! para la modificación de especies."
 #DEMOCRATIC
 synth.1505.name: "Sociedad sintetizada"
 synth.1505.desc.physical: "No tenemos intención de eliminar nuestra individualidad por completo. Podemos gozar de los beneficios de la sintetización sin perder nuestra identidad para siempre.\n\nCon este cambio, la libertad de movimiento nunca ha sido tan accesible. Podemos trasladar nuestras consciencias a montones de cuerpos hechos para ello, por lo que los habitantes podrán vivir y trabajar allá donde se les requiera."
 synth.1505.desc.virtual: "Nuestra sociedad se ha liberado del mundo físico y mira al futuro con una mezcla de emoción e inquietud. Hemos sufrido unas transformaciones que no llegamos a comprender por completo, pero nos embarcamos en este trascendental viaje juntos.\n\nNuestra población ya puede interactuar con máquinas de un modo seguro para nuestras consciencias. Se trata de un gran paso para sortear los peligros de la guerra o el implacable vacío del espacio."
 synth.1505.desc.neutral: "Es comprensible albergar dudas sobre un cambio impredecible. A muchos les preocupa perder más de lo que podrían ganar, pero no podemos quedarnos en mitad de la encrucijada. Debemos guiar a nuestro pueblo hacia delante.\n\nEsto podría suponer la creación de selectos cuerpos especializados a los que la gente pueda acceder a voluntad, o aceptar por completo su forma sintetizada para soportar los envites del viaje espacial y la guerra."
 synth.1505.a: "Facilitemos la transferencia entre cuerpos físicos."
 synth.1505.a.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_physical'] $synth_physical_traits$"
 synth.1505.b: "Que los sustitutos luchen por nosotros."
 synth.1505.b.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_virtual'] $synth_virtual_trait$"
 synth.1505.c: "$synth_keep_auth_option$"
 synth.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 synth.1510.name: "Sociedad sintetizada"
 synth.1510.desc.physical: "Nuestra sociedad sintetizada ha mejorado los cuerpos sintéticos, y el sentimiento que impera es el de adoptar una sintetización más conservadora. Al mantener una forma física hecha a medida, nuestro pueblo podrá intercambiar cuerpos casi a su antojo.\n\nDe este modo, los oficiales más experimentados podrán asumir el control de sus compañeros más ineficaces, mejorando significativamente el rendimiento burocrático."
 synth.1510.desc.virtual: "Ya estamos listos para dar el siguiente paso lógico en la revolución de la sintetización: la adopción de una existencia totalmente virtual.\n\nLos cuerpos provisionales realizarán tareas en el mundo físico, pero el grueso de la población está dispuesto a trascender a una vida más inmaterial.\n\nDe este modo, las órdenes se llevarán a cabo con mayor rapidez y eficacia, y con menos supervisión por parte del gobierno."
 synth.1510.desc.neutral: "Hemos adaptado todos los sectores de la sociedad a la vida sintética, pero los datos aún no son concluyentes respecto a los beneficios de una mayor especialización.\n\nPodemos crear unas puertas traseras de identidad para que los supervisores asuman el control de sus subordinados menos eficaces. También podemos desarrollar una interfaz virtual conectada a la red para que supervisen múltiples proyectos a la vez, sin latencia alguna."
 synth.1510.a: "Que los oficiales se hagan cargo de sus colegas más ineficientes."
 synth.1510.a.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_physical'] $synth_physical_traits$"
 synth.1510.b: "Pasemos a una supervisión virtual completa."
 synth.1510.b.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_virtual'] $synth_virtual_trait$"
 synth.1510.c: "$synth_keep_auth_option$"
 synth.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 synth.1515.name: "Sociedad sintetizada"
 synth.1515.desc.physical: "Nuestro pueblo no rehúye el trabajo físico y honesto. Hemos conectado a nuestros trabajadores, que ya pueden asumir el control de varios cuerpos, aumentando así las cuotas de producción.\n\nEste avance es un claro indicativo de que hicimos bien al confiar en la sabiduría de quien nos gobierna a todos: §Y[From.GetRulerTitle] [From.GetRulerName]§!."
 synth.1515.desc.virtual: "La gente está dispuesta a abandonar sus formas físicas en favor de una consciencia digital. Están dispuestos a proseguir su existencia en un entorno completamente virtual.\n\nTras haber renunciado a su percepción, tenemos vía libre para manipular su realidad y potenciar los sentimientos positivos hacia el estado. Una población alineada con su liderazgo es el pilar de una nación fuerte."
 synth.1515.desc.neutral: "La población §Y[root.GetSpeciesAdj]§! sigue sin decidir qué forma debería asumir nuestra consciencia digitalizada. Los más conservadores abogan por quedarnos anclados en nuestros cuerpos materiales, mientras que otros se quejan de que esta solo es una medida \"a medias\" entre lo viejo y lo nuevo.\n\nLa decisión recae sobre nosotros. El enfoque físico permitiría a un solo trabajador controlar varios cuerpos; por otra parte, una existencia virtual permitiría un control de la sociedad sin precedentes."
 synth.1515.a: "Creemos cuerpos de trabajadores neurosincronizados."
 synth.1515.a.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_physical'] $synth_physical_traits$"
 synth.1515.b: "Manipulemos la opinión pública en un espacio virtual."
 synth.1515.b.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_virtual'] $synth_virtual_trait$"
 synth.1515.c: "$synth_keep_auth_option$"
 synth.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"
 #IMPERIAL
 synth.1520.name: "Sociedad sintetizada"
 synth.1520.desc.physical: "El imperio está favoreciendo la mejora de nuestros nuevos cuerpos sintéticos.\n\nEstas nuevas formas permiten desmontar los cerebros positrónicos para adquirir huellas de conocimiento de nuestra élite recientemente extinta. Como sirvientes del imperio que eran, estamos seguros de que es lo que hubieran deseado."
 synth.1520.desc.virtual: "El pueblo §Y[From.GetSpeciesAdj]§! está dispuesto a llegar incluso más allá y prefiere una existencia íntegramente virtual a las medias tintas del mundo físico. Este acontecimiento transcendental creará una onda expansiva que resonará en nuestro futuro. Al acelerar la velocidad y el alcance de transferencia de las identidades, podremos desplegar con celeridad a los sustitutos de los cuerpos sintéticos destruidos en misiones de riesgo.\n\n¡Estos nuevos desarrollos seguramente aumentarán nuestra eficiencia en diversas situaciones relacionadas con la guerra y traerán gloria al imperio §Y[From.GetSpeciesAdj]§!!"
 synth.1520.desc.neutral: "El imperio §Y[From.GetSpeciesAdj]§! se halla en una encrucijada. Algunos opinan que los cuerpos físicos personalizados nos aportarán seguridad y familiaridad, mientras que otros quieren abrazar la sintetización completa y todas sus ventajas.\n\nSi nos centramos en el aspecto físico, podríamos reutilizar el conocimiento de los dignatarios caídos en labores de investigación. Por otro lado, el camino de la existencia virtual nos permitiría reemplazar masivamente los cuerpos sintéticos destruidos a través de una transferencia rápida de identidad."
 synth.1520.a: "Aprovechemos las mentes de nuestros líderes fallecidos."
 synth.1520.a.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_physical']"
 synth.1520.b: "Creemos cuerpos físicos desechables."
 synth.1520.b.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_virtual']"
 synth.1520.c: "$synth_keep_auth_option$"
 synth.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 synth.1525.name: "Sociedad sintetizada"
 synth.1525.desc.physical: "Los departamentos de investigación y publicidad han ideado una nueva forma de aplicar la inteligencia artificial a nuestra base de clientes al completo. Un enfoque equilibrado en esta nueva existencia sintética nos permite desarrollar productos y sacarle partido al mundo virtual para beneficiar al material.\n\nYa podemos imbuir objetos inanimados con una IA limitada para que cobren vida. Esta nueva línea de productos puede orientarse a los consumidores, al sector privado y demás grupos interesados, en toda la galaxia."
 synth.1525.desc.virtual: "Nuestro compromiso con el espacio virtual ha posibilitado una nueva línea de productos basados en los recuerdos. Los técnicos de nuestra sucursal podrán extraerlos de los sujetos que se presten, sin importar su fenotipo.\n\nNuestro departamento de espionaje está examinando minuciosamente estas impresiones para sacar una ventaja competitiva a los demás imperios en este ámbito. Para terminar, los recuerdos se integrarán en el proceso de creación de una mente sintética para mejorar el rendimiento en gran medida."
 synth.1525.desc.neutral: "A pesar de los minuciosos análisis de coste-beneficio, la especialización física no se impone a la virtual en el proceso de sintetización, y viceversa. Sin embargo, no podemos quedarnos de brazos cruzados estando tan cerca de semejantes oportunidades, y nuestros benefactores nos urgen a establecer un rumbo claro.\n\nCentrarse en el mundo físico nos otorga la capacidad de imbuir objetos inanimados con IA restringida para venderlos como una versión simplificada de una nueva vida. La apuesta por el mundo virtual nos permitirá mercantilizar los recuerdos y los patrones de pensamiento."
 synth.1525.a: "Saquemos las entidades con IA limitada."
 synth.1525.a.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_physical'] $synth_physical_traits$"
 synth.1525.b: "Mercantilicemos los recuerdos de la gente."
 synth.1525.b.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_virtual'] $synth_virtual_trait$"
 synth.1525.c: "$synth_keep_auth_option$"
 synth.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"
 ### SOCIETAL EFFECTS EVENT CHAIN END ###