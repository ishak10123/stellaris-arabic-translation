 situation_digitization_desc: "Ha llegado el momento de prescindir de nuestros deficientes cuerpos biológicos. Debemos preparar cuerpos mecánicos avanzados e iniciar el proceso de transferencia de consciencias.\n\n§YPoblaciones que se digitalizarán el mes siguiente§!: §G[From.GetSynthPopsPerMonth]§!"
