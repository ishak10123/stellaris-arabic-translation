 #Buildings
 building_identity_complex: "Complejo identitario"
 building_identity_complex_desc: "Un centro de vanguardia para la investigación y el desarrollo de identidades sintéticas."
 building_identity_complex_speed: "§G+100§! £pop£ §Hpoblaciones§!"
 building_identity_complex_effect_desc: "$building_identity_complex_speed$ cargado al mes."
 building_ai_emporium: "Emporio de IA"
 building_ai_emporium_desc: "El megacomplejo que cumple todas tus necesidades en cuanto a tecnologías de inteligencia artificial. Haz que las IA sintientes transformen objetos comunes en compañeros inteligentes para tu familia o negocio. ¿Robots inteligentes para la cuenta que les trae? Tráelos aquí; nuestros técnicos de primera los reinician a velocidad sublumínica."
 building_ai_emporium_fail_tt: "$TRIGGER_FAIL$Ya tenemos un §Y$building_ai_emporium$§! en §Y[planet.owner.GetName]§!"
 building_ai_emporium_outlawed_robots_tt: "$TRIGGER_FAIL$§Y[planet.owner.GetName]§! ha prohibido los robots"
 building_clear_thought_clinic: "Clínica de aclarado mental"
 building_clear_thought_clinic_desc: "¿Tienes recuerdos que te sobran? ¡Conviértelos en créditos energéticos! Nuestro equipo de profesionales te los extrae sin riesgo. Cuanto más feliz es el recuerdo, ¡más te pagamos!\n\nEsta operación es irreversible; una vez extraídos, los patrones de pensamiento no se pueden restablecer."
 clear_thought_clinic_modifier: "$building_clear_thought_clinic$"
 clear_thought_clinic_tt: "Modificador no acumulable para la red de espionaje: $TABBED_NEW_LINE$$MOD_SPY_NETWORK_DAILY_VALUE_MULT$: §G+25%§! $TABBED_NEW_LINE$$MOD_SPY_NETWORK_LEVELS_ADD$: §G+10§!"
 #Jobs
 m_pop_assembly: "£mod_planet_pop_assembly_add£ §Y$MOD_PLANET_POP_ASSEMBLY_ADD$§!"
 job_identity_designer: "Diseñador de identidad"
 job_identity_designer_plural: "Diseñadores de identidad"
 job_identity_designer_plural_with_icon: "£job_identity_designer£ $job_identity_designer_plural$"
 job_identity_designer_converter_desc: "Los $job_identity_designer_plural$ facilitan la conversión de una forma biológica a una entidad digital, propiciando así una transición indolora."
 job_identity_designer_converter_effect_desc: "Los $job_identity_designer_plural_with_icon$ proporcionan $i_engineering$ y $i_amenities$."
 job_identity_designer_desc: "Los $job_identity_designer_plural$ crean nuevas mentes sintéticas de forma intrincada."
 job_identity_designer_effect_desc: "Los $job_identity_designer_plural_with_icon$ proporcionan $i_engineering$, $i_amenities$ y $m_pop_assembly$ en todo el imperio."
 mod_job_identity_designer_add: "Trabajos de $job_identity_designer$"
