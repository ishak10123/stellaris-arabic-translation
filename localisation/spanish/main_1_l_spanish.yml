 TOOLTIP_SETUP_RULER: "§H$RULER$§!\nPersonaliza tu gobernante inicial. Algunos tipos de gobierno pueden cambiar de gobernante más a menudo y los gobernantes pueden morir."
 TOOLTIP_SETUP_NAME_CLASS: "§H$NAME_AND_CLASS$§!\nElige el nombre y la clase de planeta de tu mundo natal. La clase elegida será el tipo de planeta principal de tu especie.\n\nTu especie puede habitar planetas de otras clases, según lo diferentes que sean de la clase de tu planeta."
