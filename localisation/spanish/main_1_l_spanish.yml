 TOOLTIP_SETUP_GOVERNMENT: "§H$ETHICS_AND_GOVERNMENT$§!\nElige las éticas y el tipo de gobierno de tu imperio. La elección de éticas determina los tipos de gobierno disponibles para seleccionar."
 TOOLTIP_SETUP_EMPIRE_ADVISOR: "§H$EMPIRE_ADVISOR$§!\nElige una voz para las alertas y notificaciones."
