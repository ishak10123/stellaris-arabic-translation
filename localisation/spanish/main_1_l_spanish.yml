 DIFF_TECH_SCALING_OFF_TOOLTIP: "§H$DIFF_TECH_SCALING_OFF$§!\nLa dificultad del juego no afecta a los costes de ['concept_technology']."
 DIFF_TECH_SCALING_LOW_TOOLTIP: "§H$DIFF_TECH_SCALING_LOW$§!\nEl aumento de la dificultad tiene un efecto menor en los costes de ['concept_technology']. Las tecnologías de nivel superior aumentan más que las de nivel inferior."
 DIFF_TECH_SCALING_NORMAL_TOOLTIP: "§H$DIFF_TECH_SCALING_NORMAL$§!\nEl aumento de la dificultad tiene un efecto moderado en los costes de ['concept_technology']. Las tecnologías de nivel superior aumentan más que las de nivel inferior."
 DIFF_TECH_SCALING_HIGH_TOOLTIP: "§H$DIFF_TECH_SCALING_HIGH$§!\nEl aumento de la dificultad tiene un efecto importante en los costes de ['concept_technology']. Las tecnologías de nivel superior aumentan más que las de nivel inferior."
 DIFF_TECH_SCALING_EXTREME_TOOLTIP: "§H$DIFF_TECH_SCALING_EXTREME$§!\nEl aumento de la dificultad tiene un efecto muy importante en los costes de ['concept_technology']. Las tecnologías de nivel superior aumentan más que las de nivel inferior.\n\n§RAviso:§! En niveles de dificultad altos, esto puede hacer que sea muy complicado o incluso imposible derrotar a los enemigos finales."
 FE_TRADITION_SPEED: "Coste de tradición"
 FE_TRADITION_SPEED_TOOLTIP: "§H$FE_TRADITION_SPEED$§!\nControla la rapidez con la que los imperios normales obtienen ['concept_technologies']."
 FE_NAVAL_CAPACITY_MULT: "$NAVY_SIZE_TITLE$"
 FE_NAVAL_CAPACITY_MULT_TOOLTIP: "§H$FE_NAVAL_CAPACITY_MULT$§!\nSe multiplica la capacidad naval de todos los imperios. La multiplicación se calcula teniendo en cuenta los demás modificadores de capacidad naval que haya.\n\n§RAdvertencia:§! si aumentas este ajuste, puede repercutir en tu desempeño y en el equilibrio de la partida hacia el final de esta."
 FE_COMMAND_LIMIT_MULT: "$COMMAND_LIMIT$"
 FE_COMMAND_LIMIT_MULT_TOOLTIP: "§H$FE_COMMAND_LIMIT_MULT$§!\nSe multiplica el límite de mando de todos los imperios. La multiplicación se calcula teniendo en cuenta los demás modificadores de límite de mando que haya.\n\n§RAdvertencia:§! este ajuste puede repercutir en el equilibrio de la partida."
 FE_CRISES: "Potencia de la crisis"
 FE_CRISES_TOOLTIP: "§KPotencia de la crisis§!\nEsto controla la potencia de la flota de ['concept_endgame_crises']. Cuanto más alto sea el multiplicador, más peligrosas serán las crisis de fin de partida.\n\nSi se ha seleccionado la opción §ITodos§! en §ITipo de crisis§!, este valor se multiplicará por 2 por cada crisis de fin de partida que se haya superado.\n\nEn la dificultad §Y$DIFFICULTY_ENSIGN$§! o superior, esto también afectará a las §Ycrisis en mitad del juego§!."
 FE_PRIMITIVE_WORLDS: "Civilizaciones pre-UL y especies preinteligentes"
 FE_PRIMITIVE_WORLDS_TOOLTIP: "§H$FE_PRIMITIVE_WORLDS$§!\nEsto controla el predominio de ['concept_preftl_civilizations'] y ['concept_presapient_species'] en la galaxia.\n\nCuanto más alto, mayor será la probabilidad de que se creen en la generación de galaxias."
 FE_LOGISTIC_CEILING: "Límite de crecimiento logístico"
 FE_LOGISTIC_CEILING_TOOLTIP: "§H$FE_LOGISTIC_CEILING$§!\nEsto controla el nivel de las bonificaciones al crecimiento de la población cuando los planetas se encuentran en medio de su curva logística. Cuanto más alto sea, más rápido crecerán las poblaciones.\n\n§RAviso:§! Si se aumenta, este ajuste puede alterar el rendimiento y el equilibrio de la partida en etapas más avanzadas."
 FE_GROWTH_SCALE: "Progresión de crecimiento necesaria"
 FE_GROWTH_SCALE_TOOLTIP: "§H$FE_GROWTH_SCALE$§!\nEsto escala el crecimiento de población basándose en el número de poblaciones del imperio. Cuanto más alto sea, más lento crecerán las poblaciones.\n\n§RAviso:§! Si se reduce, este ajuste puede alterar el rendimiento y el equilibrio de la partida significativamente, por lo que se recomienda reducir también el §Y$FE_LOGISTIC_CEILING$§!."
 FE_LOGISTICS_FLEET_UPKEEP: "Costes logísticos de mantenimiento de flotas"
 FE_LOGISTICS_FLEET_UPKEEP_TOOLTIP: "§H$FE_LOGISTICS_FLEET_UPKEEP$§!\nControla el mantenimiento en $r_trade$ de las flotas cuando no están atracadas o se encuentran en territorio enemigo. Si se aumenta este ajuste, el mantenimiento de las flotas en guerra se encarece."
 FE_LOGISTICS_PLANET_DEFICIT: "Costes logísticos de déficit planetario"
 FE_LOGISTICS_PLANET_DEFICIT_TOOLTIP: "§H$FE_LOGISTICS_PLANET_DEFICIT$§!\nControla el coste en $r_trade$ de suministrar a planetas con déficits locales. Si se aumenta este ajuste, resulta más caro poseer planetas superespecializados con déficits locales altos, aunque reciban abastecimiento de otros planetas de tu imperio."
