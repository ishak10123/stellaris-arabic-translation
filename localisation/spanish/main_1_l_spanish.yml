 #Leader Traits
 ####################################
 #All
 leader_trait_adaptable: "Adaptable"
 leader_trait_adaptable_desc: "Este/a líder adopta rápidamente nuevos métodos e ideas, si resultan ser mejores."
 leader_trait_stubborn: "Terco"
 leader_trait_stubborn_desc: "Este/a líder es tozudo/a y le cuesta aceptar nuevos métodos e ideas, aunque sean mejores."
 leader_trait_resilient: "Resiliente"
 leader_trait_resilient_desc: "Este/a líder es resistente y se encuentra en buena forma física, por lo que su esperanza de vida es mayor."
 leader_trait_substance_abuser: "Adicto"
 leader_trait_substance_abuser_desc: "Este/a líder abusa de las drogas para enfrentarse al estrés, lo cual tiene un efecto perjudicial en su salud física."
 leader_trait_eager: "Fervoroso"
 leader_trait_eager_desc: "Este/a líder está ansioso/a por entrar en acción."
 leader_trait_arrested_development: "Desarrollo detenido"
 leader_trait_arrested_development_desc: "El desarrollo personal y las habilidades de este/a líder parecen haberse estabilizado."
 leader_trait_intemporal: "Intemporal"
 leader_trait_intemporal_desc: "El paso del tiempo ni envejece ni matará a este/a líder."
 #Admiral
 leader_trait_ex_fighter_pilot: "Ex piloto de cazas"
 leader_trait_ex_fighter_pilot_desc: "Este/a líder fue un/a as del espacio y sabe aprovechar bien la velocidad y la maniobrabilidad de los escuadrones de naves de at."
 leader_trait_trickster: "Experto en ardides"
 leader_trait_trickster_desc: "Este/a líder combate con astucia, confía en las técnicas de distracción y el elemento sorpresa."
 leader_trait_fleet_logistician: "Logístico de flotas"
 leader_trait_fleet_logistician_desc: "Este/a líder ha dominado el campo de la logística, y sabe gestionar los suministros para reducir los costes de mantenimiento."
 leader_trait_fleet_organizer: "Organizador de flotas"
 leader_trait_fleet_organizer_desc: "Este/a líder domina la organización y tiene las habilidades de microgestión necesarias para controlar grandes formaciones de naves."
 leader_trait_nervous: "Nervioso"
 leader_trait_nervous_desc: "Este/a líder es nervioso/a e inquieto/a, y puede verse sobrepasado/a por el hecho de dirigir grandes formaciones de naves."
 leader_trait_engineer: "Ingeniero"
 leader_trait_engineer_desc: "Este/a líder es un/a ingeniero/a natural, tiene los conocimientos y habilidades necesarias para organizar y supervisar la reparación de las naves estando de misión."
 leader_trait_aggressive: "Agresivo"
 leader_trait_aggressive_desc: "Este/a líder tiene la infame reputación de ser agresivo/a y abrumar al enemigo a base de cañonazos con su flota."
 leader_trait_cautious: "Cauto"
 leader_trait_cautious_desc: "Este/a líder es un/a comandante cauto/a, evita riesgos innecesarios y siempre se preocupa de mantener formaciones en las que las unidades de las flotas puedan ofrecerse apoyo mutuo contra el enemigo."
 leader_trait_unyielding: "Inquebrantable"
 leader_trait_unyielding_desc: "Antes de reconocer la derrota, este/a líder prefiere luchar hasta la muerte."
 leader_trait_gale_speed: "Huracán"
 leader_trait_gale_speed_desc: "Este/a líder cree que la velocidad y las maniobras rápidas son la clave de cualquier enfrentamiento espacial."
 leader_trait_lethargic: "Letárgico"
 leader_trait_lethargic_desc: "Este/a líder es lento/a e indolente y desempeña sus funciones con poca energía o iniciativa."
 #General
 leader_trait_restrained: "Cuidadoso"
 leader_trait_restrained_desc: "Este/a líder se centra en minimizar pérdidas y evitar muertes innecesarias entre soldados y no combatientes."
 leader_trait_defender: "Defensor"
 leader_trait_defender_desc: "Este/a líder es experto/a en defensa y sabe cuándo es mejor desplegar unidades terrestres y usar fortificaciones planetarias para dificultar al máximo la invasión planetaria al enemigo."
 leader_trait_attacker: "Invasor"
 leader_trait_attacker_desc: "Este/a líder domina el arte de las invasiones planetarias y sabe cuándo es más efectivo atacar un planeta enemigo desde el espacio."
 leader_trait_butcher: "Carnicero"
 leader_trait_butcher_desc: "Este/a líder es implacable, no tiene piedad con el enemigo."
 leader_trait_glory_seeker: "Buscador de gloria"
 leader_trait_glory_seeker_desc: "Este/a líder siempre encabeza el frente, levantando el ánimo a las tropas pese a los riesgos que entraña."
 leader_trait_armchair_commander: "Comandante apoltronado"
 leader_trait_armchair_commander_desc: "Este/a líder da órdenes desde la retaguardia, lo que desmoraliza a las tropas del frente."
 leader_trait_army_logistician: "Logístico de ejércitos"
 leader_trait_army_logistician_desc: "Este/a líder puede sacar suministros de la nada, lo cual disminuye el coste de mantenimiento de las fuerzas terrestres."
 #Governor
 leader_trait_iron_fist: "Puño de hierro"
 leader_trait_iron_fist_desc: "Este/a líder es famoso/a por su búsqueda implacable de la eficiencia y es capaz de sacar el máximo partido de la mano de obra esclava."
 leader_trait_army_veteran: "Veterano del ejército"
 leader_trait_army_veteran_desc: "Este/a veterano/a líder concede un trato preferencial al ejército en su sector."
 leader_trait_retired_fleet_officer: "Oficial de flota retirado"
 leader_trait_retired_fleet_officer_desc: "Este/a líder es un/a antiguo/a mando de la flota que apoya activamente a los astilleros a su cargo."
 leader_trait_architectural_interest: "Interés arquitectónico"
 leader_trait_architectural_interest_desc: "Este/a líder tiene un gran interés por la arquitectura y las técnicas de construcción."
 leader_trait_agrarian_upbringing: "Formación agraria"
 leader_trait_agrarian_upbringing_desc: "Este/a líder se crio en una zona agraria y le interesa optimizar los campos."
 leader_trait_intellectual: "Intelectual"
 leader_trait_intellectual_desc: "Este/a líder siente una inclinación natural por la ciencia y busca fomentar una curiosidad por el mundo natural entre sus súbditos."
 leader_trait_environmental_engineer: "Ingeniero de entornos"
 leader_trait_environmental_engineer_desc: "Este/a líder tiene experiencia en geoescultura de vanguardia y técnicas de ahorro de costes."
 leader_trait_bureaucrat: "Unificador"
 leader_trait_bureaucrat_desc: "Este/a líder destaca en la diplomacia intergubernamental y la generación de consenso."
 leader_trait_bureaucrat_tt: "§E$PLANET_EFFECTS_TXT$ por nivel de habilidad:§!$TABBED_NEW_LINE$$mod_planet_jobs_unity_produces_mult$: §G+5%§!"
