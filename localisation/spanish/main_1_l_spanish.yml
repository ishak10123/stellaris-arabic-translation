 FE_AGGRESSIVENESS: "Agresividad IA"
 FE_AGGRESSIVENESS_TOOLTIP: "§HAgresividad IA§!\nEsto controla la probabilidad de que los imperios IA declaren la guerra a sus enemigos y, por consiguiente, el número general de guerras iniciadas durante una campaña. Con independencia del ajuste de agresividad, la IA solo declarará la guerra si su actitud hacia el objetivo lo permite."
 FE_DIFFICULTY: "Dificultad"
 DIFFICULTY_ADJUSTED_AI_MODIFIERS: "Modificadores ajustados de IA (dificultad)"
 DIFFICULTY_ADJUSTED_AI_MODIFIERS_TOOLTIP: "§H$DIFFICULTY_ADJUSTED_AI_MODIFIERS$§!\nLos modificadores económicos a escala imperial se multiplican por las bonificaciones de §Ydificultad§! de los imperios controlados por la IA. Por ejemplo: una tecnología que concede +20% £minerals£ $minerals$ de [miner.GetIcon] trabajos de minería pasará a otorgar +40% a los imperios de la IA en ['concept_grand_admiral']. \n\n§PAviso§!: activar este ajuste hará que las economías posteriores controladas por la IA se vuelvan mucho más fuertes."
 DIFFICULTY_CIVILIAN_DESC: "El jugador obtiene enormes bonificaciones a su economía, investigación y capacidad naval, así como una bonificación por establecer nuevos contactos. Además, se han desactivado los tipos de imperios de la IA agresivos y perturbadores."
 DIFFICULTY_CADET_DESC: "El jugador recibe bonificaciones para su economía, investigación y capacidad naval."
 DIFFICULTY_ENSIGN_DESC: "La IA no goza de ventajas económicas, científicas o militares sobre el jugador."
 DIFFICULTY_CAPTAIN_DESC: "La IA recibe pequeñas bonificaciones para su economía, investigación y capacidad naval."
 DIFFICULTY_COMMODORE_DESC: "La IA recibe bonificaciones moderadas para su economía, investigación y capacidad naval."
 DIFFICULTY_ADMIRAL_DESC: "La IA recibe grandes bonificaciones para su economía, investigación y capacidad naval."
 DIFFICULTY_GRAND_ADMIRAL_DESC: "La IA recibe enormes bonificaciones para su economía, investigación y capacidad naval."
 FE_DIFFICULTY_TOOLTIP: "§HDificultad§!\nControla la dificultad del juego.\n\nLos ajustes de dificultad disponibles son:\n- §Y$DIFFICULTY_CIVILIAN$§!: $DIFFICULTY_CIVILIAN_DESC$\n- §Y$DIFFICULTY_CADET$§!: $DIFFICULTY_CADET_DESC$\n- §Y$DIFFICULTY_ENSIGN$§!: $DIFFICULTY_ENSIGN_DESC$\n- §Y$DIFFICULTY_CAPTAIN$§!: $DIFFICULTY_CAPTAIN_DESC$\n- §Y$DIFFICULTY_COMMODORE$§!: $DIFFICULTY_COMMODORE_DESC$\n- §Y$DIFFICULTY_ADMIRAL$§!: $DIFFICULTY_ADMIRAL_DESC$\n- §Y$DIFFICULTY_GRAND_ADMIRAL$§!: $DIFFICULTY_GRAND_ADMIRAL_DESC$"
 FE_IRONMAN: "Modo De hierro"
 FE_IRONMAN_TOOLTIP: "§HModo De hierro§!\nEn este modo, se desactivan los comandos de la consola y la partida se guarda regularmente en un solo archivo. En las partidas jugadas con este ajuste, no hay vuelta atrás."
 FE_EMPIRES_TOOLTIP: "§HNúmero de imperios de IA§!\nControla cuántos imperios de IA habrá en la galaxia."
 FE_ADVANCED_EMPIRES_TOOLTIP: "§HNúmero de inicios avanzados de IA§!\nDetermina cuántos imperios de IA comenzarán con una ventaja inicial de recursos, población y tecnología. No tienen otras bonificaciones, solo una ventaja de salida. No afecta a los ['concept_fallen_empires']."
 FE_IRONMAN_MULTIPLAYER: "§REste modo no está disponible en multijugador.§!"
 FE_IRONMAN_NOCLOUD: "§RDe hierro requiere que Steam Cloud esté activado y el usuario inicie sesión.§!"
 FE_IRONMAN_AUTOSAVE: "§RNo puedes cambiar la frecuencia del guardado automático en el modo De hierro.§!"
 FE_GALAXY_SHAPE_TOOLTIP: "§HForma de la galaxia§!\nEstablece la forma del mapa de la galaxia.\n\nAlgunas formas solo están disponibles en ciertos §Ytamaños§!.\n\nLas formas disponibles son las siguientes:\n$concept_galaxy_shape_desc$"
 FE_GALAXY_SIZE_TOOLTIP: "§HTamaño de la galaxia§!\nEstablece el número de sistemas estelares que aparecerán en la galaxia. Afecta al número por defecto de §Yimperios de IA§!.\n\n§RAviso:§! Si se aumenta, este ajuste alterará bastante el rendimiento de la partida en etapas más avanzadas."
