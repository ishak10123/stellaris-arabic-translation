 starting_weapons_missiles_desc: "Son misiles espaciales con ojivas nucleares. Los misiles tienen un alcance excelente, pero son vulnerables a la intercepción por las defensas de precisión."
 starting_ftl_warp: "Curvatura"
 starting_ftl_hyperdrive: "Hiperespacio"
 starting_ftl_wormhole: "Agujero de gusano"
 starting_ftl_warp_desc: "El motor de curvatura genera una burbuja subespacial alrededor de una nave para alcanzar velocidades ultralumínicas. Permite viajar entre las estrellas pero con \"lentitud\", dadas las grandes distancias implicadas."
 starting_ftl_hyperdrive_desc: "El hiperimpulso permite a las naves penetrar en el hiperespacio temporalmente. El viaje interestelar es rápido, pero se limita a las rutas existentes en la red de hipervías."
 starting_ftl_wormhole_desc: "Los generadores de agujeros de gusano abren túneles por el subespacio y comunican dos puntos, lo que permite cruzar grandes distancias. El tamaño de los generadores impide montarlos en naves y se requieren estaciones especiales para manejarlos."
 RECOMMENDED_BEGINNER: "§G(Jugadores nuevos)§!"
 RECOMMENDED_ADVANCED: "§R(Jugadores avanzados)§!"
