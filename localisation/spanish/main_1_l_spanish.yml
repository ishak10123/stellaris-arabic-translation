 leader_trait_archaeologist_desc: "Este/a líder destaca en el estudio de artefactos y restos de edificios alienígenas."
 leader_trait_paranoid: "Paranoico"
 leader_trait_paranoid_desc: "Este/a líder no está dispuesto/a a colaborar con los demás."
 leader_trait_maniacal: "Maníaco"
