 pc_continental_tile: "Terreno templado"
 pc_continental_tile_desc: "Un terreno boscoso diverso con clima suave."
 pc_desert_tile: "Terreno desértico"
 pc_desert_tile_desc: "Un terreno árido y seco con afloramientos rocosos ocasionales."
 pc_arid_tile: "Terreno árido"
 pc_arid_tile_desc: "Un terreno seco y rocoso con vegetación escasa."
 pc_tundra_tile: "Terreno de tundra"
 pc_tundra_tile_desc: "Estepas frías y ventosas con vegetación escasa."
 pc_tropical_tile: "Terreno tropical"
 pc_tropical_tile_desc: "Un terreno cubierto de vegetación con un clima cálido y húmedo."
 pc_ocean_tile: "Terreno oceánico"
 pc_ocean_tile_desc: "Islas y archipiélagos aislados y rodeados de océano."
 pc_arctic_tile: "Terreno ártico"
 pc_arctic_tile_desc: "Un terreno cubierto de nieve y hielo sin vegetación."
 pc_savannah_tile: "Terreno de sabana"
 pc_savannah_tile_desc: "Terreno cálido y seco con árboles y matorrales espaciados."
 pc_alpine_tile: "Terreno alpino"
 pc_alpine_tile_desc: "Terreno elevado cubierto de nieve y hielo."
 pc_gaia_tile: "Terreno Gaia"
 pc_gaia_tile_desc: "Un terreno diverso con biomas muy apropiados para casi toda forma de vida."
 pc_nuked_tile: "Terreno yermo"
 pc_nuked_tile_desc: "Un terreno arrasado por la guerra. Nivel de radiación bastante bajo para albergar vida."
 pc_infested_tile: "Terreno infestado"
 pc_infested_tile_desc: "Un terreno devastado por los enjambres prethoryn."
 pc_ringworld_habitable_tile: "Terreno de mundo anillo"
 pc_ringworld_habitable_tile_desc: "Prístino terreno cuidadosamente mantenido por los sistemas internos del mundo anillo."
 pc_machine_tile: "Terreno cibernético"
 pc_machine_tile_desc: "Terreno esterilizado que protege el entramado superconductor bajo su superficie."
 pc_habitat_tile: "Terreno hábitat"
 pc_habitat_tile_desc: "Placas de minerales sobre generadores de gravedad artificial actúan como cimientos para la construcción industrial y urbana."
