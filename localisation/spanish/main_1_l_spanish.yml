 NUM_FALLEN_EMPIRES: "Imperios caídos"
 FE_FALLEN_EMPIRES_TOOLTIP: "§HNúmero de imperios caídos§!\nControla la cantidad máxima de ['concept_fallen_empires'] que se pueden generar en la galaxia."
 NUM_MARAUDER_EMPIRES: "Imperios merodeadores"
 FE_MARAUDER_EMPIRES_TOOLTIP: "§HNúmero de imperios merodeadores§!\nControla la cantidad máxima de ['concept_marauder_empires', imperios merodeadores] que se pueden generar en la galaxia.$requires_apoc$"
 NUM_HABITABLE_WORLDS: "Mundos habitables"
 FE_HABITABLE_WORLDS_TOOLTIP: "§HMundos habitables§!\nEsta opción ajusta la probabilidad de que un planeta que esté en la zona de los \"rizos de oro\" de un sistema solar sea habitable. Cuanto más alto sea el valor, más mundos habitables contendrá la galaxia en general. En la opción §Y$FE_HABITABLE_WORLDS_RARE$§!, los mundos habitables seguirán apareciendo, pero solo en los sistemas especiales.\n\n§RAviso:§! Este ajuste alterará bastante el rendimiento de la partida en las etapas avanzadas si aumenta por encima de x1."
 FE_HABITABLE_WORLDS_RARE: "Raros"
 FE_RANDOMIZE: "Aleatorio"
 FE_RANDOMIZE_EMPIRES_TOOLTIP: "Si se activa, se generará un número aleatorio de imperios controlados por la IA, dentro del rango especificado por el control deslizante."
 FE_RANDOMIZE_ADVANCED_EMPIRES_TOOLTIP: "Si se activa, un número aleatorio de imperios controlados por la IA empezará con ventaja, dentro del rango especificado por el control deslizante."
 FE_RANDOMIZE_FALLEN_EMPIRES_TOOLTIP: "Si se activa, se generará un número aleatorio de imperios caídos, dentro del rango especificado por el control deslizante."
 FE_RANDOMIZE_MARAUDER_EMPIRES_TOOLTIP: "Si se activa, se generará un número aleatorio de imperios merodeadores, dentro del rango especificado por el control deslizante."
 FE_CLUSTERED_STARTS: "Ubicación del imperio"
 FE_CLUSTERED_STARTS_TOOLTIP: "§HUbicación del imperio§!\nEsto controla si los imperios deben generarse en grupos o estar ubicados al azar por la galaxia."
 FE_ADVANCED_NEAR_PLAYER: "Vecinos avanzados"
 FE_ADVANCED_NEAR_PLAYER_TOOLTIP: "§HVecinos avanzados§!\nEsto controla si se permite a los ['concept_advanced_empires', imperios con inicios avanzados de IA] aparecer cerca de un jugador. §YDesactivarlo§! puede hacer que se generen menos de la cantidad especificada de inicios avanzados."
 FE_MID_GAME: "Año in. mitad de juego"
 FE_MID_GAME_TOOLTIP: "§H$FE_MID_GAME$§!\nControla el primer año en el que pueden ocurrir eventos de mitad de juego como ['concept_machine_uprising'] o ['concept_great_khan']."
 FE_GUARANTEED_COLONIES: "Mundos habitables garantizados"
 FE_GUARANTEED_COLONIES_TOOLTIP: "§H$FE_GUARANTEED_COLONIES$§!\nEsto controla cuántos planetas habitables de la misma clase que tu mundo natal aparecerán cerca de tu sistema inicial.\n\n§RAviso:§! Si lo desactivas, puede que no encuentres mundos habitables cerca de tu mundo natal."
 FE_VICTORY: "Año de la victoria"
 FE_VICTORY_TOOLTIP: "§H$FE_VICTORY$§!\nControla en qué año terminará la partida si ['concept_endgame_crisis'] o ['concept_war_in_heaven'] no se han activado. Ganará el imperio que tenga más §Ipuntos§!. Sigue siendo posible jugar pasado este año.\n\nPoner esta barra deslizante al máximo desactivará por completo la victoria por tiempo."
 FE_END_GAME: "Año in. fin de juego"
 FE_END_GAME_TOOLTIP: "§H$FE_END_GAME$§!\nControla el primer año en el que pueden ocurrir eventos de fin de partida como ['concept_endgame_crises'] o ['concept_fallen_empire_awakening']."
 FE_TECH_SPEED: "Coste de tecnología"
 FE_TECH_SPEED_TOOLTIP: "§H$FE_TECH_SPEED$§!\nControla la rapidez con la que los imperios normales obtienen ['concept_technologies']."
 FE_TECH_SPEED_DIFFICULTY_SCALE: "Costes de tecnología ajustados por dificultad"
 FE_TECH_SPEED_DIFFICULTY_SCALE_TOOLTIP: "§H$FE_TECH_SPEED_DIFFICULTY_SCALE$§!\nControla en qué medida la dificultad seleccionada afecta al coste de investigación de ['concept_technologies']. Tiene un efecto mayor en las tecnologías más avanzadas.\n\nAumentar este valor hace que el juego sea más difícil, especialmente en las dificultades más altas."
