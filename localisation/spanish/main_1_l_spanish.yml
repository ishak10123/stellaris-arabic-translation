 trait_ruler_frontier_spirit: "Espíritu de la frontera"
 trait_ruler_frontier_spirit_desc: "Este/a líder ansía reinar en estrellas lejanas."
 trait_ruler_world_shaper: "Conformador de mundos"
 trait_ruler_world_shaper_desc: "Este/a líder busca remodelar mundos a su imagen."
 trait_ruler_home_in_the_sky: "Casa en los cielos"
 trait_ruler_home_in_the_sky_desc: "Este/a líder busca las estrellas."
 trait_ruler_industrialist: "Fiebre de la minería"
 trait_ruler_industrialist_desc: "Este/a líder tiene un enfoque claro para mejorar la extracción de minerales."
 trait_ruler_eye_for_talent: "Ojo para el talento"
 trait_ruler_eye_for_talent_desc: "Se considera que este/a líder es inusualmente perceptivo/a y detecta talento donde otros solo ven excentricidad o incompetencia."
 trait_ruler_deep_connections: "Buenos contactos"
 trait_ruler_deep_connections_desc: "Este/a líder está muy integrado/a en la maraña laberíntica que conforma la maquinaria política."
 trait_ruler_deep_connections_2: "$trait_ruler_deep_connections$ II"
 trait_ruler_deep_connections_2_desc: "$trait_ruler_deep_connections_desc$"
 trait_ruler_charismatic: "Carismáticos"
 trait_ruler_charismatic_desc: "Este/a líder es muy carismático/a, y hace cumplir su voluntad con facilidad."
 trait_ruler_champion_of_the_people: "Campeón del pueblo"
 trait_ruler_champion_of_the_people_desc: "Este/a líder parece preocuparse de verdad por sus súbditos."
 trait_ruler_feedback_loop: "Bucle de retroalimentación"
 trait_ruler_feedback_loop_desc: "Los bucles de retroalimentación eficaces y el análisis de acción-reacción hacen que esta unidad sea mucho mejor a la hora de predecir resultados."
 trait_ruler_expansionist: "Expansionista"
 trait_ruler_expansionist_desc: "Este/a líder quiere expandir las fronteras."
 trait_ruler_fertility_preacher: "Predicador de la fertilidad"
 trait_ruler_fertility_preacher_desc: "Este/a líder se distingue por adquirir recursos vitales para una población emergente."
 trait_ruler_investor: "Inversor"
 trait_ruler_investor_desc: "Este/a líder es un/a economista sagaz, capaz de maximizar el potencial financiero."
 trait_ruler_investor_2: "$trait_ruler_investor$ II"
 trait_ruler_investor_2_desc: "$trait_ruler_investor_desc$"
 trait_ruler_investor_3: "$trait_ruler_investor$ III"
 trait_ruler_investor_3_desc: "$trait_ruler_investor_desc$"
 trait_ruler_space_miner: "Minero espacial"
 trait_ruler_space_miner_desc: "Este/a líder es consciente de lo vital que es explotar los recursos extraterrestres para una nación estelar."
 trait_ruler_explorer: "Amante del conocimiento"
 trait_ruler_explorer_desc: "Este/a líder es famoso/a por su curiosidad insaciable y valora la exploración espacial ante todo."
 trait_ruler_explorer_2: "$trait_ruler_explorer$ II"
 trait_ruler_explorer_2_desc: "$trait_ruler_explorer_desc$"
 #Machine
 leader_trait_ruler_machine_intelligence: "Inteligencia artificial"
 leader_trait_ruler_machine_intelligence_desc: "Este líder es la inteligencia central que supervisa y dirige todas las acciones de un imperio de máquinas."
 leader_trait_flexible_programming: "Programación flexible"
 leader_trait_flexible_programming_desc: "Este líder tiene una programación excepcionalmente flexible y es capaz de adaptarse rápidamente a nuevos métodos y procedimientos si producen mejores resultados."
 leader_trait_rigid_programming: "Programación rígida"
 leader_trait_rigid_programming_desc: "Este líder tiene una programación especialmente rígida que en pocas ocasiones permite modificaciones en el comportamiento, aun cuando estos cambios pudieran mejorar la eficiencia."
 leader_trait_newboot: "Reiniciado"
 leader_trait_newboot_desc: "Este líder acaba de ser actualizado a un estado lo suficientemente autónomo como para permitir cargos de mando."
 leader_trait_warbot_tinkerer: "Reparador de robots de guerra"
 leader_trait_warbot_tinkerer_desc: "Este líder tiene un interés inusual por el diseño de robots de guerra y constantemente está mejorando y reparando nuestros modelos existentes."
 leader_trait_ai_aided_design: "Diseño asistido por IA"
 leader_trait_ai_aided_design_desc: "Este líder ejecuta constantemente modelos teóricos en un núcleo de memoria secundario con el objetivo de mejorar la eficiencia de la fabricación de las naves espaciales."
 leader_trait_bulldozer: "Excavadora"
 leader_trait_bulldozer_desc: "Este líder ha dominado el arte de transformar de forma rápida y eficiente el terreno alienígena en un aparcamiento."
 leader_trait_analytical: "Analítico"
 leader_trait_analytical_desc: "Este líder dedica un porcentaje inusualmente importante de su potencia de procesamiento a analizar las ciencias naturales y fomentar su estudio."
 leader_trait_parts_cannibalizer: "Caníbal de piezas"
 leader_trait_parts_cannibalizer_desc: "Este líder es muy dado a aprovechar las piezas de robots de guerra caídos o estropeados para conseguir que otros sigan funcionando más tiempo."
 leader_trait_demoralizer: "Desmotivador"
 leader_trait_demoralizer_desc: "A este líder le fascinan las frágiles mentes de los orgánicos y cómo pueden doblegarse utilizando tácticas de terror creativas en el campo de batalla."
 leader_trait_erratic_morality_core: "Núcleo de moralidad errático"
 leader_trait_erratic_morality_core_desc: "Este líder sufre a menudo intensos episodios de vergüenza y arrepentimiento por las víctimas enemigas debido a un núcleo de moralidad errático."
 leader_trait_maintenance_loop: "Bucle de mantenimiento"
 leader_trait_maintenance_loop_desc: "Este líder está constantemente implicado en un bucle de mantenimiento secundario, ocupándose con cuidado de todas las naves de su flota y reduciendo los costes logísticos."
 leader_trait_unstable_code_base: "Código base inestable"
 leader_trait_unstable_code_base_desc: "Este líder sufre de un código base inestable, lo que en ocasiones provoca un comportamiento ilógico y nervioso."
 leader_trait_cataloger: "Clasificador"
 leader_trait_cataloger_desc: "Para este líder no hay mejor trabajo que clasificar todo el universo."
 #Event Special
 leader_trait_sentinel: "Entrenamiento de centinela"
 leader_trait_sentinel_desc: "Los comandantes de la flota centinela conocen a fondo las tácticas y la anatomía prethoryn."
 leader_trait_hive_mind: "Mente colmena"
 leader_trait_hive_mind_desc: "La consciencia gestalt que controla las acciones de las flotas prethoryn ha demostrado ser capaz de hacer varias tareas a la vez."
 leader_trait_hive_affinity: "Afinidad con la colmena"
 leader_trait_hive_affinity_desc: "Las criaturas prethoryn que operan bajo la consciencia de esta flota han adquirido un nivel de afinidad inusual entre ellas. Su disciplina de disparo ha mejorado mucho, lo que redunda en una mayor cadencia de fuego."
 leader_trait_void_swimmer: "Cazador del vacío"
 leader_trait_void_swimmer_desc: "Los instintos cazadores de la consciencia de esta flota han vuelto frenéticas a las criaturas prethoryn que controlaba. Esta ansia de combate es su sustento."
 leader_trait_ethereal: "Medios etéreos"
 leader_trait_ethereal_desc: "Algunos señores de flotas extradimensionales han aprendido a usar la naturaleza etérea de sus naves para mejorar enormemente su capacidad de evasión en combate."
 leader_trait_dimensional_stutter: "Parpadeo dimensional"
 leader_trait_dimensional_stutter_desc: "Por motivos desconocidos, las naves controladas por el señor de esta flota extradimensional parecen salir y entrar de la existencia mientras avanzan, lo cual aumenta su velocidad sublumínica."
