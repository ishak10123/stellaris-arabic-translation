 CANNOT_JUMP_COOLDOWN: "§RLos motores de salto todavía se están recargando. Se podrá saltar tras $DAYS|Y$ día(s).§!"
 JUMP_DRIVE_PENALTY: "Mientras el motor de salto se recarga, esta flota sufre las siguientes penalizaciones:\n§Y$MOD_SHIP_WEAPON_DAMAGE$:§! §R-50%§!\n§Y$MOD_SHIP_SPEED_MULT$:§! §R-50%§!"
 FLEETORDER_ESN_HEADER: "Navegación subespacial experimental"
 FLEETORDER_ESN_ORDER_STATUS: "Navegación subespacial experimental a $SYSTEM|Y$: $DAYS|Y0$ días"
 FLEETORDER_ESN_DESC: "Ordena a la nave científica ignorar temporalmente la red de hipervías estable y navegar directamente por las depresiones del subespacio hasta el destino. La nave científica se considera §Ydesaparecida en combate§! durante el viaje."
 FLEETORDER_ESN_WRONG_FLEET_STANCE: "§RLa implicación de la flota no puede ser evasiva§!"
 FLEETORDER_PATROL_HEADER: "Patrulla"
