 clone_army_plural: "Ejércitos clones"
 clone_army_desc: "Los clones especializados llegan a la edad adulta en cuestión de meses. Con una esperanza de vida de menos de una década, su falta de iniciativa personal se considera el precio a pagar por su obediencia total a los mandos."
 robotic_army: "Ejército robótico de asalto"
 robotic_army_plural: "Ejércitos robóticos"
 robotic_army_desc: "Máquinas de matar frías y despiadadas, pensadas solo para la guerra. Persiguen sus objetivos incansablemente y son inmunes a los demoledores efectos de una baja moral que suelen asolar a las unidades de combate orgánicas."
