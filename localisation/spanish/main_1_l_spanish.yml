 leader_trait_towel_desc: "Una toalla tiene un inmenso valor psicológico."
 leader_trait_percussive_maintainer: "Mantenedor agresivo"
 leader_trait_percussive_maintainer_desc: "No hay ningún problema de hardware que un buen uso de la bota no pueda arreglar."
 #Ruler
 trait_ruler_corvette_focus: "Enfoque de producción: Corbeta"
 trait_ruler_corvette_focus_desc: "Este/a líder intenta promover la construcción de corbetas."
