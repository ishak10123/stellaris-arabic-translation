 trait_ruler_battleship_focus_desc: "Este/a líder intenta promover la construcción de acorazados."
 trait_ruler_recruiter: "Reclutador"
 trait_ruler_recruiter_desc: "Este/a líder es especialmente carismático/a, y nuevos reclutas hacen cola, prácticamente, para servir a su nación."
 trait_ruler_from_the_ranks: "Mando"
 trait_ruler_from_the_ranks_desc: "Este/a líder ha salido de la esfera de los mandos militares."
 trait_ruler_fortifier: "Fortificador"
 trait_ruler_fortifier_desc: "Este/a gobernante sabe del valor de las estaciones militares para asegurar el territorio."
 trait_ruler_logistic_understanding: "Comprensión de la logística"
 trait_ruler_logistic_understanding_desc: "Este/a líder es consciente de la importancia de las cadenas de suministro bien montadas."
 trait_ruler_military_pioneer: "Pionero militar"
 trait_ruler_military_pioneer_desc: "Este/a líder es partidario/a de los avances en tecnología militar y construcción de naves."
 trait_ruler_warlike: "Belicoso"
 trait_ruler_warlike_desc: "Este/a líder no se arredra en caso de conflicto."
 trait_ruler_architectural_sense: "Sentido arquitectónico"
 trait_ruler_architectural_sense_desc: "Este/a líder es un/a arquitecto de corazón e invierte en métodos de construcción más eficientes."
 trait_ruler_architectural_sense_2: "$trait_ruler_architectural_sense$ II"
