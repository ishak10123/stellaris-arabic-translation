 android_army_plural: "Ejércitos androides"
 android_army_desc: "Los combatientes androides son engranajes semiautónomos en una máquina de guerra bien engrasada. Son más resistentes, agresivos y responden mejor a los cambios del campo de batalla que sus predecesores robóticos."
