 leader_trait_meticulous_desc: "Este/a líder examina a conciencia los fenómenos desconocidos."
 leader_trait_spark_of_genius: "Chispa de genialidad"
 leader_trait_spark_of_genius_desc: "Este/a líder es propenso/a a arranques súbitos de inspiración."
 leader_trait_carefree: "Despreocupado"
 leader_trait_carefree_desc: "Este/a líder es quizá menos meticuloso/a que el resto."
 leader_trait_roamer: "Vagabundo"
 leader_trait_roamer_desc: "Este/a líder nació para vagar por el espacio."
 leader_trait_archaeologist: "Arqueólogo"
