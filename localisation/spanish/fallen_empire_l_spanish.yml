 ### FE Civics
 civic_antediluvian_mind: "Mente anciana"
 civic_antediluvian_mind_desc: "El tiempo no ha sido benévolo con esta mente gestalt. Una existencia prolongada en una burbuja cronológica ha embotado su antaño insaciable deseo de supervivencia."
 civic_sluggish_drones: "Drones no dirigidos"
 civic_sluggish_drones_desc: "Con una laxa supramente que apenas ejerce presión, los drones de este imperio desempeñan sus tareas lentamente, con un aire casi apático."
 ### FE Buildings
 building_fe: "Edificio de imperio caído"
 building_ancient_control_center: "Antiguo centro de control"
 building_ancient_control_center_desc: "Los incansables esfuerzos de una legión de máquinas drones mantienen a duras penas el antiguo centro de control del mundo anillo."
 building_ancient_palace: "Palacio antiguo"
 building_ancient_palace_desc: "Este inmenso complejo palaciego es el testamento de una era extinta hace mucho. Pese a la refulgencia de una fachada que se resiste a sucumbir al paso del tiempo, muchas de sus alas se encuentran abandonadas y, la que más y la que menos, en ruinas."
 building_ancient_hive_capital: "Núcleo venerable"
 building_ancient_hive_capital_desc: "En este nexo ancestral de supremacía de la colmena, multitud de generaciones de drones han acatado solícitos sus directrices."
 building_affluence_emporium: "Emporio de afluencia"
 building_affluence_emporium_desc: "Este centro se vale de un algoritmo de suministro avanzado para adelantarse a los anhelos materiales y satisfacerlos antes de que la población sea consciente siquiera de sus deseos."
 building_affluence_center: "Centro de afluencia"
 building_affluence_center_desc: "En este centro se materializan, sin apenas esfuerzo y prácticamente al instante, los deseos más disparatados."
 building_nourishment_complex: "Complejo de nutrición"
 building_nourishment_complex_desc: "La tecnología replicadora conjura con inmediatez sabores nuevos a voluntad."
 building_nourishment_center: "Centro de nutrición"
 building_nourishment_center_desc: "Entre estas paredes se puede replicar cualquier sabor concebible."
 building_dimensional_replicator: "Replicador dimensional"
 building_dimensional_replicator_desc: "La tecnología de esta fábrica permite una impecable conversión de energía a materia."
 building_dimensional_fabricator: "Fábrica dimensional"
 building_dimensional_fabricator_desc: "Esta fábrica avanzada crea túneles en la estructura del espacio dimensional para extraer recursos valiosos."
 building_class_3_singularity: "Singularidad de clase 3"
 building_class_3_singularity_desc: "Capturar toda la producción de energía de esta singularidad es una maravilla de la ingeniería."
 building_class_4_singularity: "Singularidad de clase 4"
 building_class_4_singularity_desc: "Aunque el rendimiento energético de esta singularidad contraviene las leyes de la física, los campos de contención resisten con una estabilidad indefectible."
 building_micro_forge: "Hiperforja"
 building_micro_forge_desc: "La velocidad de producción de esta forja se ve limitada únicamente por su capacidad de carga de recursos."
 building_nano_forge: "Nanoforja"
 building_nano_forge_desc: "Esta forja cuenta con plataformas expansivas de nanorreplicadores que convierten materias primas en aleaciones avanzadas con una eficacia pasmosa."
 building_fe_sky_dome: "Cúpula celeste"
 building_fe_sky_dome_desc: "Esta ciudad que flota gracias a una vanguardista tecnología antigravitatoria ofrece a sus habitantes un refugio idílico."
 building_fe_dome: "Cúpula empírea"
 building_fe_dome_desc: "Suspendida mediante anulación gravimétrica, esta cúpula trasciende toda limitación física y responde a las necesidades de su población mediante sistemas de soporte vital."
 building_fe_fortress: "Bastión Aspis"
 building_fe_fortress_desc: "Este colosal complejo de defensa planetaria cuenta con multitud de arsenales y estratos protectores. Tan solo una fuerza de asedio especializada sería capaz de penetrar sus defensas."
 building_fe_stronghold: "Complejo Aegis"
 building_fe_stronghold_desc: "Este monumental complejo de defensa planetaria ostenta un sinnúmero de arsenales y estratos protectores. Cuando las cordilleras del planeta ya sean polvo, sus defensas seguirán en pie."
 building_master_archive: "Archivo maestro"
 building_master_archive_desc: "Este repositorio alberga conocimiento de varias eras galácticas, pero la capacidad de operar su arcano sistema de consulta se perdió tiempo ha. Los datos que se puedan extraer poseen un valor inconmensurable."
 building_empyrean_shrine: "Altar empíreo fásico"
 building_empyrean_shrine_desc: "Este templo, cuya única y exclusiva función es comulgar con los espíritus del Velo, se manifiesta tan solo parcialmente en nuestra dimensión."
 building_ancient_cryo_chamber: "Criocámara antigua"
 building_ancient_cryo_chamber_desc: "Esta enorme estructura está llena de hileras de criocápsulas con millones de especímenes alienígenas fallecidos que se congelaron hace mucho tiempo."
 building_fe_administration_1: "Administración omnividente"
 building_fe_administration_1_desc: "Este extenso complejo, parte integral de un sistema burocrático que abarca toda la galaxia, está conectado a una vasta red administrativa."
 building_fe_administration_2: "Administración omnisciente"
 building_fe_administration_2_desc: "Este extenso complejo, pieza central de un sistema burocrático que abarca toda la galaxia, coordina una red administrativa sólida y avanzada."
 building_fe_administration_hive_1: "Conglomerado efáptico"
 building_fe_administration_hive_1_desc: "Esta red de nodos efápticos mantenida por drones especializados apuntala el control de la colmena sobre sus extensos dominios cognitivos."
 building_fe_administration_hive_2: "Axón efáptico"
 building_fe_administration_hive_2_desc: "Esta inmensa red de nodos efápticos mantenida por drones especializados consolida la capacidad que posee la colmena de imponer su voluntad en la galaxia."
 building_fe_administration_machine_1: "Punto de coordinación fractal"
 building_fe_administration_machine_1_desc: "Un avanzado centro fractal que procesa y transmite billones de señales con impecable soltura y una precisión casi instantánea."
 building_fe_administration_machine_2: "Punto de coordinación cuántica"
 building_fe_administration_machine_2_desc: "Un centro de entrelazamiento cuántico avanzado donde se procesan y se transmiten miles de billones de señales de forma instantánea y precisa."
 building_fe_temple_1: "Santuario celestial"
 building_fe_temple_1_desc: "Gracias a los más flamantes avances en tecnología metafísica, es posible entablar un vínculo directo con la esencia divina."
 building_fe_temple_2: "Catedral celestial"
 building_fe_temple_2_desc: "La resonancia espiritual se ve redoblada mediante sermones psiónicos potenciados con tecnología metafísica. En este complejo colosal de alcance sistémico, los feligreses conectan en lo más hondo de su ser con la esencia divina."
 building_fe_assembly_1: "Nexo de fabricación de robots"
 building_fe_assembly_1_desc: "Este vanguardista complejo de ensamblado y su experta plantilla de técnicos en robótica trasciende los límites de lo convencional y se consolida a la cabeza de la innovación robótica"
 building_fe_assembly_2: "Centro de producción robótica cuántica"
 building_fe_assembly_2_desc: "La línea de montaje cuántico de esta instalación, una maravilla de la ingeniería, utiliza conversores de entrelazamiento para fabricar piezas de máquinas con una precisión insuperable. Ni un solo átomo queda fuera de lugar."
 building_fe_clinic_1: "Instituto de revitalización molecular"
 building_fe_clinic_1_desc: "En estas instalaciones se analizan a fondo las complejidades de las células a fin de amplificar la eficacia de los tratamientos médicos y aumentar drásticamente la longevidad de la población y la calidad de los cuidados sanitarios que se le procuran."
 building_fe_clinic_2: "Instituto de biorregeneración"
 building_fe_clinic_2_desc: "El instituto de biorregeneración, cumbre de la tecnología médica, es pionero en terapias biorregenerativas innovadoras que redefinen continuamente los límites de la extensión de la vida."
 building_fe_security_1: "Complejo de justicia"
 building_fe_security_1_desc: "Este enorme complejo jurídico alberga un entramado de tribunales y dependencias ejecutivas."
 building_fe_security_2: "Zigurat de la justicia"
 building_fe_security_2_desc: "Este colosal edificio, cénit de las instituciones jurídicas, es un solemne monumento a la justicia que alberga tribunales, centros de detención y correccionales capaces de reformar a los criminales más curtidos."
 building_fe_market_1: "Centro de comercio galáctico"
 building_fe_market_1_desc: "Estas imponentes torres dominan el panorama y proyectan largas sombras sobre los tumultuosos distritos comerciales de su alrededor."
 building_fe_market_2: "Nexo de comercio interestelar"
 building_fe_market_2_desc: "Las descomunales torres de este distrito comercial, que reinan en la economía galáctica, se ven desde la órbita."
 building_fe_silo_1: "Depósito de merma espacial"
 building_fe_silo_1_desc: "Esta reserva altera una fracción de subespacio, reduciendo la distancia entre las moléculas que lo componen y las dimensiones de todo lo almacenado en dicha fracción. Se prohíbe la entrada de seres vivos."
 building_fe_silo_2: "Depósito extradimensional"
 building_fe_silo_2_desc: "Poseemos la capacidad de acotar una dimensión aislada en la que almacenar volúmenes de recursos prácticamente infinitos."
 building_fe_entertainment_1: "Plaza de bienestar virtual"
 building_fe_entertainment_1_desc: "Estos inmensos sectores de entretenimiento se sitúan a la vanguardia de la recreación y el ocio. Dotados de lectores de ondas cerebrales, generan entornos personalizados de asueto virtual."
 building_fe_entertainment_2: "Nexo de omnicomplacencia"
 building_fe_entertainment_2_desc: "Este nexo, culmen colosal del entretenimiento, trasciende los límites convencionales y materializa sueños antes de que el deseo correspondiente llegue siquiera a existir."
 building_fe_lab_1: "Nexo de innovación cuántica"
 building_fe_lab_1_desc: "Este nexo hace gala de instrumental de última generación y una inaudita capacidad de personal. Abre las puertas de una era en la que las teorías cuánticas, más allá de explorarse sin más, se ponen al servicio de la innovación más revolucionaria."
 building_fe_lab_2: "Departamento de innovación trascendental"
 building_fe_lab_2_desc: "Este edificio es la cúspide del avance científico, prueba fehaciente de que vivimos una era de innovación irrestricta."
 building_fe_mine_1: "Planta de excavación cuántica"
 building_fe_mine_1_desc: "Esta planta minera puede encontrar minerales en cualquier parte del manto de este planeta mediante tecnología de túneles cuánticos que perfora materiales sólidos sin contacto físico."
 building_fe_mine_2: "Centro de excavación cuántica"
 building_fe_mine_2_desc: "Este centro minero puede extraer minerales de cualquier lugar, hasta el núcleo exterior del planeta, mediante tecnología de túneles cuánticos que perfora materiales sólidos o líquidos sin contacto físico."
 ### FE Jobs
 job_fe_overseer: "Supervisor"
 job_fe_overseer_plural: "Supervisores"
 job_fe_overseer_desc: "Los pocos fieles han rechazado una vida de lujo a favor del servicio público. Se ocupan de supervisar y guiar a los que quedan de la civilización antigua."
 mod_job_fe_overseer_add: "Trabajos de $job_fe_overseer$"
 job_fe_maintenance_bot: "Cuidador"
 job_fe_maintenance_bot_plural: "Cuidadores"
 job_fe_maintenance_bot_desc: "Estas antiguas máquinas mantienen y reparan la maquinaria en deterioro del mundo anillo en el que residen."
 mod_job_fe_maintenance_bot_add: "Trabajos de $job_fe_maintenance_bot$"
 mod_job_fe_maintenance_bot_per_pop: "§G+1§! trabajo de $job_fe_maintenance_bot$ por $VALUE$ poblaciones"
 mod_job_fe_maintenance_bot_per_pop_short: "\n§G+1§! trabajo de £mod_job_maintenance_drone_add£ por $VALUE$ £pop£"
 job_fe_guardian_bot: "Guardián"
 job_fe_guardian_bot_plural: "Guardianes"
 job_fe_guardian_bot_desc: "Estas antiguas máquinas mantienen una vigilia incesante sobre los restos de miles de millones de seres inteligentes congelados criogénicamente."
 mod_job_fe_guardian_bot_add: "Trabajos de $job_fe_guardian_bot$"
 fe_hedonist: "$job_fe_hedonist$"
 job_fe_hedonist: "Hedonista"
 job_fe_hedonist_plural: "Hedonistas"
 job_fe_hedonist_desc: "Una vida de opulencia en la que se pueden tener los materiales que se necesiten o deseen."
 mod_job_fe_hedonist_add: "Trabajos de $job_fe_hedonist$"
 job_fe_archivist: "Archivista"
 job_fe_archivist_plural: "Archivistas"
 job_fe_archivist_effect_desc: "Los £job_archivist£ $job_fe_archivist_plural$ convierten $r_consumer_goods$ en $r_research$"
 job_fe_archivist_desc: "Hay que archivar cada fragmento de datos, catalogarlo e indexarlo con precisión de acuerdo con los ritos antiguos que el primer bibliotecario estableció hace eones."
 mod_job_fe_archivist_add: "Trabajos de $job_fe_archivist$"
 job_fe_acolyte_farm: "Acólito del arado"
 job_fe_acolyte_farm_plural: "Acólitos del arado"
 job_fe_acolyte_farm_plural_with_icon: "£job_fe_acolyte_farm£ $job_fe_acolyte_farm_plural$"
 job_fe_acolyte_farm_desc: "¿Kazargiel no usó un arado, el instrumento más noble, para cortar la cola venenosa del demonio tres veces maldito y evitar la hambruna?"
 job_fe_acolyte_farm_effect_desc: "Los £job_fe_acolyte_farm£ $job_fe_acolyte_farm_plural$ producen £food£ §Y$food$§!"
 mod_job_fe_acolyte_farm_add: "Trabajos de $job_fe_acolyte_farm$"
 job_fe_acolyte_mine: "Acólito del martillo"
 job_fe_acolyte_mine_plural: "Acólitos del martillo"
 job_fe_acolyte_mine_plural_with_icon: "£job_fe_acolyte_mine£ $job_fe_acolyte_mine_plural$"
 job_fe_acolyte_mine_desc: "Y, de un solo golpe, santa Mazakudal usó el martillo ardiente para partir la cabeza del primer espectro por la mitad y abrió el camino hacia los cristales."
 job_fe_acolyte_mine_effect_desc: "Los £job_fe_acolyte_mine£ $job_fe_acolyte_mine_plural$ producen £minerals£ §Y$minerals$§!"
 mod_job_fe_acolyte_mine_add: "Trabajos de $job_fe_acolyte_mine$"
 job_fe_acolyte_generator: "Acólito de la hiperherramienta"
 job_fe_acolyte_generator_plural: "Acólitos de la hiperherramienta"
 job_fe_acolyte_generator_plural_with_icon: "£job_fe_acolyte_generator£ $job_fe_acolyte_generator_plural$"
 job_fe_acolyte_generator_desc: "Acuérdate de la hiperherramienta y de cómo la usó Bazagg el Brillante para domar el sol cuando parecía que la oscuridad se apoderaría del mundo."
 job_fe_acolyte_generator_effect_desc: "Los £job_fe_acolyte_generator£ $job_fe_acolyte_generator_plural$ producen £energy£ §Y$energy$§!"
 mod_job_fe_acolyte_generator_add: "Trabajos de $job_fe_acolyte_generator$"
 job_fe_acolyte_artisan: "Acólito del taller"
 job_fe_acolyte_artisan_plural: "Acólitos del taller"
 job_fe_acolyte_artisan_desc: "Y así Aznakha les dijo a los acólitos: \"Id a los talleres y fabricad vosotros mismos el futuro que buscáis\"."
 job_fe_acolyte_artisan_effect_desc: "£job_fe_acolyte_artisan£ $job_fe_acolyte_artisan_plural$ producen £consumer_goods£ §Y$consumer_goods$§!"
 mod_job_fe_acolyte_artisan_add: "Trabajos de $job_fe_acolyte_artisan$"
 job_fe_protector: "Protector"
 job_fe_protector_plural: "Protectores"
 job_fe_protector_desc: "Para que la mayoría pueda descansar plácidamente y disfrutar de una buena vida, estos individuos rudos están preparados para usar la violencia por las noches contra los que podrían hacer daño."
 mod_job_fe_protector_add: "Trabajos de $job_fe_protector$"
 job_fe_augur: "Augur del Velo"
 job_fe_augur_plural: "Augures del Velo"
 job_fe_augur_desc: "Habla, pero no con palabras. Para saber su significado, hay que estar al borde de la locura."
 mod_job_fe_augur_add: "Trabajos de $job_fe_augur$"
 job_fe_sky_cardinal: "Cardenal celeste"
 job_fe_sky_cardinal_plural: "Cardenales celeste"
 job_fe_sky_cardinal_desc: "Fue allí, en el cielo, donde nació el futuro. La luz era cegadora, pero algunos podían ver a través de ella. Se propusieron liderar a los demás."
 mod_job_fe_sky_cardinal_add: "Trabajos de $job_fe_sky_cardinal$"
 job_fe_xeno_ward: "Xenoguardia"
 job_fe_xeno_ward_plural: "Xenoguardias"
 job_fe_xeno_ward_desc: "Estos especímenes se han reunido aquí, en lugares que se asemejan a su entorno natural para garantizar la preservación de sus especies en una galaxia destructiva y caótica."
 mod_job_fe_xeno_ward_add: "Trabajos de $job_fe_xeno_ward$"
 job_fe_xeno_keeper: "Xenocuidador"
 job_fe_xeno_keeper_plural: "Xenocuidadores"
 job_fe_xeno_keeper_desc: "Estos cuidadores precursores se ocupan de las necesidades de los xenoguardias a su cargo."
 mod_job_fe_xeno_keeper_add: "Trabajos de $job_fe_xeno_keeper$"
