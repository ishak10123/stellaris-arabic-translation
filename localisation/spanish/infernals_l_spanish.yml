 infernals.35.name: "Envueltos en llamas"
 infernals.35.desc: "La superficie de §H[from.GetName]§! se ha resquebrajado, y su corteza se ha fracturado debido a un calor insoportable que emana desde abajo. La transformación fue rápida y absoluta: las montañas se derrumbaron, los océanos hirvieron y el cielo se convirtió en un velo de brasas.\n\nNo queda rastro de los biomas que antaño prosperaron en el planeta. Solo las formas de vida extremófilas pueden aún considerar este lugar su hogar."
