l_spanish:
 INFERNALS_TITLE: "Infernals Species Pack" # Do not translate
 vo_infernal_voice: "Thermophile"
 # Traits
 trait_pc_volcanic_preference: "Preferencia volcánica"
 trait_pc_volcanic_preference_short: "Volcánica"
 trait_pc_volcanic_preference_desc: "$trait_pc_savannah_preference_desc$"
 trait_volcanic_planet_preference: "$trait_pc_volcanic_preference$" #robotic
 trait_volcanic_planet_preference_desc: "$trait_dry_planet_preference_desc$" #robotic
 trait_infernal: "Termófilo"
 trait_infernal_plural: "Termófilos"
 trait_infernal_desc: "Esta especie desarrolló tejidos de aleaciones metálicas para crecer y prosperar en planetas cálidos donde los seres orgánicos tradicionales acabarían quemados. Estas células aleadas se degradan más lentamente y se reemplazan con muy poca frecuencia, retrasando las enfermedades relacionadas con la edad. Además, pueden soportar climas más fríos que podrían poner en peligro su salud."
 TRAIT_INFERNAL_EFFECT: "Mantenimiento de $r_alloys$ por cada $pop_group_unit$ £pop£ poblaciones: §R+$@living_standard_alloys_normal$§!$TABBED_NEW_LINE$- $pc_volcanic$ $HABITABILITY$: §G+20%§! $TABBED_NEW_LINE$- $HABITABILITY$ Mínima (§H$pc_volcanic$§!): §Y+50%§! $TABBED_NEW_LINE$- $HABITABILITY$ en mundos §Yfríos§!: §R-30%§!  $TABBED_NEW_LINE$- Esperanza de vida del líder: §G+10 años§!"
 trait_unbreakable_resolve: "Determinación férrea"
 trait_unbreakable_resolve_desc: "Estos individuos, unidos por una intrincada red de neuronas espejo, poseen una capacidad innata para sincronizar su voluntad. El deber no es una carga, sino una causa en común, y las dificultades se afrontan con una unidad inquebrantable."
 trait_unbreakable_resolve_tooltip: "Todas las $pop_group_unit$ £pop£ §Hpoblaciones§! del planeta con este rasgo añaden §G+0,2§! £stability£ $PLANET_STABILITY_TITLE$ (§G+15§! máx.) \n- §RNo incluye a los esclavos ni a los estratos de población más bajos.§!"
 trait_shell_slag: "Desechos de carcasas"
 trait_shell_slag_desc: "Una compleja simbiosis con el $r_living_metal$ hace que esta especie no se desarrolle en el sentido tradicional, sino a través de la acumulación y autoensamblaje de estructuras bioferrosas."
 trait_shell_slag_tooltip: "Todas las £pop£ §Hpoblaciones§! $pop_group_unit$ con este rasgo trabajan como esclavos o producen §G$@shell_slag_trait_resource_production|3$§! de §Y$r_living_metal$§! al mes."
 trait_robot_assembly_slag: "Desechos de montaje"
 trait_robot_assembly_slag_desc: "Una compleja integración de $r_living_metal$ hace que esta especie mecánica no se expanda mediante la construcción convencional, sino mediante la acumulación y autoensamblaje de estructuras autoferrosas."
 trait_pyroclastic: "Canalización piroclástica"
 trait_pyroclastic_desc: "Esta especie, fraguada por la implacable furia de los mundos volcánicos, no teme a las fuerzas piroclásticas, sino que las canaliza y manipula para convertir la devastación en una fuente vital de sustento y poder."
 trait_pyroclastic_tooltip: "$MOD_LOGISTIC_GROWTH_MULT$ en $pc_volcanic_plural$: §G+10%§!"
 trait_crucible_community: "Comunidad de crisol"
 trait_crucible_community_desc: "Templada y unida por las adversidades en común, esta especie se ha forjado en su conjunto hasta resultar inquebrantable. Su voluntad colectiva impulsa la gobernación, y cada miembro es un eslabón vital en la cadena de la unidad."
 trait_crucible_community_tooltip: "Todas las $pop_group_unit$ £pop£ §Hpoblaciones§! con este rasgo añaden §G+0,25§! §Y$MOD_COUNTRY_EDICT_FUND_ADD$§!."
 trait_ductile: "Dúctil"
 trait_ductile_desc: "§LEsta especie ha sido diseñada para producir compuestos de aleaciones reutilizables.§!\n"
 # Volcanic World
 pc_volcanic: "Mundo volcánico"
 pc_volcanic_plural: "Mundos volcánicos"
 pc_volcanic_desc: "Un mundo rocoso con una atmósfera rica en azufre y una litosfera parcialmente líquida. La superficie está cubierta de ceniza y basalto, y se intercala con actividad volcánica reciente, lagos y ríos de lava. Solo se pueden encontrar formas de vida extremófilas (si es que las hay)."
 mod_pc_volcanic_habitability: "Habitabilidad de mundo volcánico"
 mod_pc_volcanic_max_districts_add: "Máx. de distritos ($pc_volcanic$)"
 concept_pc_volcanic: "$pc_volcanic$"
 concept_pc_volcanic_desc: "- $mod_planet_jobs_alloys_produces_mult$: §G+5%§! \n\n§L$pc_volcanic_desc$§!"
 district_geothermal: "Planta de energía geotérmica"
 district_geothermal_plural: "Plantas de energía geotérmica"
 district_geothermal_desc: "Aprovecha el calor abrasador que hay en las profundidades del planeta para proporcionar energía a la colonia."
 district_melting: "Conducto de magma"
 district_melting_plural: "Conductos de magma"
 district_melting_desc: "Una serie de tamices electromagnéticos que extraen minerales valiosos del flujo de magma del planeta."
 district_melting_uncapped: "$district_melting$"
 district_melting_uncapped_plural: "$district_melting_plural$"
 district_melting_uncapped_desc: "$district_melting_desc$"
 mod_district_melting_max: "$district_melting_plural$ máx."
 district_polytechnic: "Foro termotécnico"
 district_polytechnic_plural: "Foros termotécnicos"
 district_polytechnic_desc: "Este centro de colaboración y educación interdisciplinaria ayuda a la colonia a gestionar el dinamismo geológico del planeta."
 mod_district_polytechnic_max_add: "$district_polytechnic_plural$ máx."
 thermotechnic_default: "Núcleos auxiliares"
 thermotechnic_hive: "Grupos sinápticos"
 thermotechnic_machine: "Centros auxiliares"
 melt_extractor: "$job_melt_extractor$"
 job_melt_extractor: "Forjador térmico"
 job_melt_extractor_plural: "Forjadores térmicos"
 job_melt_extractor_desc: "Acostumbrada al calor extremo, esta mano de obra está especializada en combinar minerales para crear nuevas aleaciones útiles."
 mod_job_melt_extractor_add: "Trabajos de $job_melt_extractor$"
 job_melt_extractor_effect: "Los £job_miner£ $job_melt_extractor_plural$ producen £minerals£ §Y$minerals$§!"
 melt_extractor_drone: "$job_melt_extractor_drone$"
 job_melt_extractor_drone: "Dron forjador térmico"
 job_melt_extractor_drone_plural: "Drones forjadores térmicos"
 job_melt_extractor_drone_desc: "Creado para soportar el calor extremo, este dron está diseñado para combinar minerales y producir nuevas aleaciones útiles."
 mod_job_melt_extractor_drone_add: "Trabajos de $job_melt_extractor_drone$"
 job_melt_extraction_drone_effect: "Los £job_mining_drone£ $job_melt_extractor_drone_plural$ producen £minerals£ §Y$minerals$§!"
 job_polytechnic_mentor: "Mentor termotécnico"
 job_polytechnic_mentor_plural: "Mentores termotécnicos"
 job_polytechnic_mentor_desc: "Gracias a su amplio abanico de habilidades, este mentor ayuda a solventar los problemas disciplinarios para mejorar la eficiencia de los trabajadores especializados."
 mod_job_polytechnic_mentor_add: "Trabajos de $job_polytechnic_mentor$"
 job_polytechnic_mentor_effect: "Los £job_polytechnic_mentor£ $job_polytechnic_mentor_plural$ se potencian gracias a otros trabajos. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_mentor: "$job_polytechnic_mentor_plural$"
 concept_polytechnic_mentor_desc: "Recursos adicionales producidos por £pop£ §Hpoblaciones§! de $pop_group_unit$\n(Límite: §Y4000§! £job£ trabajos por categoría):\n- £job_miner£ ['concept_planet_miners']: §G+$@polytechnic_output$§! £unity£ $unity$\n- £job_technician£ ['concept_planet_technician']: §G+$@polytechnic_output$§! £physics_research£ $physics_research$\n- £job_foundry£ ['concept_planet_metallurgists']: §G+$@polytechnic_output$§! £engineering_research£ $engineering_research$\n- £job_artisan£ ['concept_planet_artisans']: §G+$@polytechnic_output$§! £society_research£ $society_research$"
 job_polytechnic_job_tt: "$concept_polytechnic_mentor_desc$"
 job_polytechnic_drone: "Dron piroclástico"
 job_polytechnic_drone_plural: "Drones piroclásticos"
 job_polytechnic_drone_desc: "Gracias a su amplio abanico de habilidades, este dron ayuda a solventar los problemas disciplinarios para mejorar la eficiencia de los trabajadores especializados."
 mod_job_polytechnic_drone_add: "Trabajos de $job_polytechnic_drone$"
 job_polytechnic_drone_effect: "Los £job_polytechnic_drone£ $job_polytechnic_drone_plural$ se potencian gracias a otros trabajos. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_drone: "$job_polytechnic_drone_plural$"
 concept_polytechnic_drone_desc: "$concept_polytechnic_mentor_desc$"
 # Origin - Red Giant
 origin_red_giant: "Gigante roja"
 origin_red_giant_desc: "Esta civilización se halla en una encrucijada: la gigante roja, en el corazón de su sistema, está calentando su planeta y amenazando con cocinarlos vivos.\n\n¿Podrán adaptarse hasta encontrar una solución al problema, o decidirán aceptar el calor y aprovechar estos cambios extraños (e incluso antinaturales)?"
 origin_tooltip_red_giant_effects: "- $HOMEWORLD$ ['concept_pc_volcanic'] (tamaño: £planetsize£ 20)"
 START_SCREEN_RED_GIANT: "La verdad se desveló poco a poco, y luego de golpe.\n\nNuestra estrella ha entrado en una rápida y anómala fase evolutiva. Su producción de energía ha superado todos los parámetros esperados. Los cambios espectrales indican patrones de convección erráticos, y su tasa de fusión parece estar aumentando sin una pérdida de masa correspondiente.\n\nHasta ahora, hemos evolucionado en sintonía con este calentamiento. Pero la evolución biológica básica tiene sus límites.\n\nSi estos cambios en el seno de [capital_star.GetName] continúan, el mundo que consideramos nuestro hogar arderá. La cuestión ya no es si lo hará, sino cuándo."
 red_giant_start_NAME: "Sistema de la gigante roja"
 red_giant_start_DESC: "Este es el sistema inicial garantizado para los imperios con el origen §Y$origin_red_giant$§!."
 tech_starfire_cannon: "$starfire_cannon$"
 tech_starfire_cannon_desc: "Al igual que cualquier otro peligro en potencia, la peligrosa radiación que emite nuestra estrella en su transformación también puede aprovecharse como una herramienta. Canalizarla como si fuese un arma de haces nos permitirá sobrecalentar e inutilizar las naves enemigas.\n\nDesbloquea una decisión planetaria que permite la construcción de un §Y$starfire_cannon$§! en órbita."
 SOLARFLARE_EMITTER: "Emisor de erupciones solares"
 SOLARFLARE_EMITTER_DESC: "Un potente haz de energía capaz de atravesar hasta las defensas más fuertes y desactivar los sistemas de las naves vulnerables."
 starfire_cannon_cap: "$starfire_cannon$"
 starfire_cannon: "Cañón de fuego estelar"
 starfire_cannon_plural: "Cañones de fuego estelar"
 NAME_Starfire_Cannon: "$starfire_cannon$"
 starfire_cannon_key: "Núcleo de $starfire_cannon$"
 sfe_on_hit_stun_tt: "§YDesactiva§! el objetivo durante §G5§! días, lo que reduce su velocidad, cadencia de fuego y escudos.\n\n$ION_CANNON_FLEET_EFFECT$"
 sfe_weapon_stun_effect: "§RImpacto de $starfire_cannon$§!"
 sfe_weapon_stun_effect_desc: "   " # not visible
 decision_starfire_cannon: "Construir $starfire_cannon$"
 decision_starfire_cannon_desc: "Imitando la intensa radiación de una estrella gigante roja que se degrada rápidamente, este cañón orbital proyecta un rayo de ionización hipertérmica que no solo daña a sus objetivos, sino que también fríe los componentes de la nave hasta dejarlos inservibles."
 decision_starfire_cannon_effects: "Construye un §Y$starfire_cannon$§! en la órbita del planeta, un arma de largo alcance que puede desactivar los sistemas de varias naves."
 decision_starfire_cannon_limit: "$TRIGGER_FAIL$Límite del sistema: §Y3§!"
 # Origin - Cosmic Dawn
 origin_cosmic_dawn: "Amanecer cósmico"
 origin_cosmic_dawn_desc: "Más que surgir, esta civilización ha sido liberada. Cuando sus cápsulas de estasis se abrieron, despertaron en un mundo envejecido hasta lo irreconocible. Pero no todo está perdido. Su pasado perdura en las ruinas y el polvo esparcidos por toda la galaxia; solo queda redescubrirlo."
 origin_tooltip_cosmic_dawn_effects: "- $HOMEWORLD$ $TABBED_NEW_LINE$- ['concept_pc_volcanic'] (tamaño: £planetsize£ 14) $TABBED_NEW_LINE$- ['concept_inf_cd_deposit']: +5\n- Comienza con la situación: §HExcavación profunda§!"
 origin_tooltip_cosmic_dawn_negatives: "- $INITIAL_POPS$ §R-600§!"
 START_SCREEN_COSMIC_DAWN: "Nos despertamos con la ligera sensación de habernos quedado dormidos. Incluso ahora, la prueba más fehaciente del tiempo que ha transcurrido no proviene de nuestros recuerdos, sino de la compleja tecnología que nos sumió en estasis.\n\nMiles y miles de cápsulas, sistemas gigantescos para transferir el calor, calderos que baten la roca fundida... Al margen de estos mecanismos básicos, las pistas sobre nuestro origen estaban grabadas en las paredes: flotas de naves que partían de mundos en pleno enfriamiento para buscar calor entre las estrellas. Hemos abandonado esta \"cámara de nacimiento\" subterránea para buscar respuestas. En la superficie de §Y[owner.Capital.GetName]§!, hemos descubierto tecnología y recursos útiles. También hemos hallado indicios de otras instalaciones enclavadas en la corteza del planeta. Algunas albergan a más de nuestros semejantes durmiendo.\n\n¿Qué hay de las demás estrellas? ¿Habrá más seres como nosotros en pleno sueño? Si es así, tal vez podamos dar respuesta a la pregunta más candente de todas: ¿quiénes somos?"
 cosmic_dawn_start_NAME: "Nuevo hogar"
 cosmic_dawn_start_DESC: "Este es el sistema inicial garantizado al usar el origen $origin_cosmic_dawn$."
 concept_inf_cd_deposit: "$d_stasis_pods$"
 concept_inf_cd_deposit_desc: "Produce: 3.0 £society_research£\nAl superar: \n$d_stasis_pods_tt$ \n\n§L$d_stasis_pods_desc$§!"
 cosmic_dawn_districtsize: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 cosmic_dawn_districtsize2: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+2§!\n   $d_cd_ancient_tunnels$ §G+2§!"
 cosmic_dawn_tunnel_foundry: "$foundry_jobs_bonus_workforce_mult$ por $d_cd_ancient_tunnels$: §G+1%§!"
 cosmic_dawn_tunnel_bureaucrat: "$bureaucrat_jobs_bonus_workforce_mult$ por $d_cd_ancient_tunnels$: §G+1%§!"
 cosmic_dawn_tunnel_researcher: "$researcher_jobs_bonus_workforce_mult$ por $d_cd_ancient_tunnels$: §G+1%§!"
 cosmic_dawn_tunnel_worker: "$mod_pop_cat_worker_bonus_workforce_mult$ por $d_cd_ancient_tunnels$: §G+1%§!"
 d_stasis_pods: "£blocker£ Antiguas cápsulas de estasis"
 d_stasis_pods_desc: "Estas cápsulas de estasis son dispositivos antiguos de nuestros parientes perdidos. Utilizan tecnología criogénica avanzada para mantener a los individuos en animación suspendida. Con la tecnología adecuada, podríamos despertarlos."
 d_stasis_pods_tt: "[GetStasisPodOwner]"
 d_stasis_pods_tt_inf: "- Se han creado §G100§! £pop£ $POPS$\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_stasis_pods_tt_other: "- Obtención de £society_research£ §Y$society_research$§!: §G+350§!\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_cd_ancient_tunnels: "Túneles antiguos"
 d_cd_ancient_tunnels_desc: "Estos túneles, que en el pasado se utilizaban para almacenar hileras de cámaras de estasis, ahora están vacíos, pero son enormes y suponen un nuevo espacio habitable."
 d_galvanic_living_metal: "Sedimento de $sr_living_metal$"
 d_galvanic_living_metal_desc: "Este planeta posee depósitos naturales de $r_living_metal$. Al entrar en contacto constante con este fascinante recurso, las especies han evolucionado al seguir trayectorias biológicas y científicas únicas."
 # Civic - Scorched World Heralds
 civic_scorched_earth: "Heraldos de mundos calcinados"
 civic_scorched_earth_desc: "El calor impregna cada faceta de la cultura de esta sociedad, desde sus tradiciones y rituales hasta la propia tecnología. Se consideran los supremacistas ardientes y legítimos de la galaxia, y tratan a las especies más débiles como simples obstáculos en el camino hacia un universo ideal, solo para termófilos."
 civic_scorched_earth_effects: "- No puede practicar la §Ydiplomacia§! con otras especies, a excepción de los §Y$trait_infernal_plural$§!.\n- No puede acceder al §Ymercado galáctico§!.\nAplica el casus belli §Y\"$casus_belli_cb_blaze$\"§! a otras especies.\n- Obtiene £unity£ §Y$unity$§! al atacar con la implicación de bombardeo §Y$bombardment_firestorm$§!.\n- Crea barreras especiales con la implicación de bombardeo §Y$bombardment_seismic_bombing$§! en el planeta de abajo. \n- Salvo los ['trait:trait_infernal'], todas las especies están abocadas a la §Yesclavitud§! o una suerte peor."
 SCORCHED_HERALDS_ONLY_INF: "$TRIGGER_FAIL$Los §Y$civic_scorched_earth$§! tan solo toleran en su sociedad a £pop£ $POPS$ ['trait:trait_infernal']."
 civic_hive_scorched_earth: "Instinto pirómano"
 civic_hive_scorched_earth_desc: "Nuestros mundos calcinados son el pináculo de la evolución planetaria. ¡Prenderemos fuego a la galaxia y prosperaremos en las llamas!"
 # Civic - World Forgers
 civic_world_forgers: "Forjadores de planetas"
 civic_world_forgers_desc: "Esta sociedad prospera en entornos volcánicos y, si la naturaleza se queda corta, los crea artificialmente."
 civic_world_forgers_effects: "- Desbloquea el planeta inicial: ['concept_pc_volcanic']. \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge']. \n- Permite construir el edificio £building£ §Y$building_volcanic_forge_1$§!, lo que añade £job_polytechnic_mentor£ ['concept_polytechnic_mentor']. \n- Los planetas con una £building£ §Y$building_volcanic_forge_1$§! se convertirán poco a poco en mundos §Y$pc_volcanic$§!. \n- Las ['concept_guaranteed_colonies'] serán mundos §Y$climate_dry$§!."
 civic_corporate_world_forgers: "Arquitectos planetarios"
 civic_corporate_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_hive_world_forgers: "Anidación volcánica"
 civic_hive_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_world_forgers_gestalt_effects: "- Desbloquea el planeta inicial: ['concept_pc_volcanic']. \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge']. \n- Permite construir el edificio £building£ §Y$building_volcanic_forge_1$§!, lo que añade £job_polytechnic_drone£ ['concept_polytechnic_drone']. \n- Los planetas con una £building£ §Y$building_volcanic_forge_1$§! se convertirán poco a poco en mundos §Y$pc_volcanic$§!. \n- Las ['concept_guaranteed_colonies'] serán mundos §Y$climate_dry$§!."
 civic_machine_world_forgers: "Optimizadores térmicos"
 civic_machine_world_forgers_desc: "$civic_world_forgers_desc$"
 tech_volcanic_forge: "Forja volcánica"
 tech_volcanic_forge_desc: "Al desplegarse, esta instalación transforma lentamente un planeta en un paraíso volcánico, extrayendo recursos útiles en el proceso. Los forjadores térmicos pueden acelerar la transformación."
 concept_volcanic_forge: "$tech_volcanic_forge$"
 concept_volcanic_forge_desc: "$building_volcanic_forge_basic$ \n\n- Progreso mensual: §G+0,1§! \n- Progreso mensual por cada §Y100§! £job_miner£ $job_miner_plural$: §G+0,05§! \n- Progreso mensual por cada §Y100§! £job_foundry£ $job_foundry_plural$: §G+0,05§!"
 building_volcanic_forge_1: "$tech_volcanic_forge$"
 building_volcanic_forge_1_desc: "Diseñado para perforar lo más profundo de la corteza del planeta, este complejo industrial induce la actividad volcánica en todo el mundo y terraforma cada bioma para convertirlo en un paisaje llameante."
 building_volcanic_forge_2: "Fundación volcánica"
 building_volcanic_forge_2_desc: "$building_volcanic_forge_1_desc$"
 building_volcanic_forge_1_effect: "\n$building_volcanic_forge_basic$ \n$volcanic_forge_1_monthly$ \n\nProgreso de todos los £job_miner£ $concept_planet_miners$: §G+[root.GetMinerVar1]§! \nProgreso de todos los £job_foundry£ $concept_planet_metallurgists$: §G+[root.GetForgerVar1]§!"
 building_volcanic_forge_2_effect: "\n$building_volcanic_forge_basic$ \n$volcanic_forge_2_monthly$ \n\nProgreso de todos los £job_miner£ $concept_planet_miners$: §G+[root.GetMinerVar2]§! \nProgreso de todos los £job_foundry£ $concept_planet_metallurgists$: §G+[root.GetForgerVar2]§!"
 building_volcanic_forge_basic: "Convierte el planeta en un §H$pc_volcanic$§!."
 volcanic_forge_1_monthly: "- Añade §G+200§! trabajos de £job_polytechnic_mentor£ ['concept_polytechnic_mentor'].\n- Progreso mensual: §G+0,1§! \n- Progreso mensual por cada §Y100§! £job_miner£ $concept_planet_miners$: §G+0,05§! \n- Progreso mensual por cada §Y100§! £job_foundry£ $concept_planet_metallurgists$: §G+0,05§!"
 volcanic_forge_2_monthly: "- Añade §G+400§! trabajos de £job_polytechnic_mentor£ ['concept_polytechnic_mentor'].\n- Progreso mensual: §G+0,2§! \n- Progreso mensual por cada §Y100§! £job_miner£ $concept_planet_miners$: §G+0,1§! \n- Progreso mensual por cada §Y100§! £job_foundry£ $concept_planet_metallurgists$: §G+0,1§!"
 # Civic - Fire Cult
 civic_pyrolatry: "Secta del fuego"
 civic_pyrolatry_desc: "Forjada durante generaciones por adversidades extremas, esta sociedad cree en la supervivencia mediante la unidad, y en la unidad mediante la supervivencia. Solo una causa nacida del fuego podía unirlos para soportar una galaxia fría e indiferente."
 civic_pyrolatry_effects: "- La producción de trabajo de £unity£ §Y$unity$§! aumenta proporcionalmente con una menor $HABITABILITY$ (hasta un §G500%§!).\n- La facción ['concept_fire_cult'] se formará poco después de iniciar la partida.\n- Sustituye £job_priest£ §Y$job_priest_plural$§! por £job_fire_dancer£ ['concept_inf_fire_dancers'].\n- Sustituye £job_politician£ §Y$job_politician_plural$§! por £job_fire_oracle£ ['concept_inf_fire_oracles'] en planetas con una $HABITABILITY$ por debajo del §R50%§!.\n- Permite el reclutamiento de ejércitos §Y$ember_legion$§! en planetas con una $HABITABILITY$ por debajo del §R20%§!.\n- Otorga acceso a las decisiones planetarias §Y$decision_blazing_scourge$§!, lo que genera £blocker£ ['concept_dec_blazing_scourge'].\n- Sinergia con los principios: $civic_superstitious_beliefs$, $civic_exalted_priesthood$, $civic_death_cult$, $civic_aristocratic_elite$ y $civic_merchant_guilds$."
