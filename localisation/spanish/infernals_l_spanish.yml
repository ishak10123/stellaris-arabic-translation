 fractalized_entropy_category: "Entropía fractalizada"
 fractalized_entropy_category_desc: "Los sensores han detectado un extraño artefacto que flota a la deriva por el campo de asteroides. Se desconoce su origen, pero su trayectoria es constante, de modo que podemos interceptarlo para su estudio."
 infernals.3205.name: "Entropía fractalizada"
 infernals.3205.desc: "[Leader.GetName] ha informado del descubrimiento de un constructo rígido y angular suspendido en una órbita estelar estable. Compuesto por un material desconocido y con marcas de planos facetados semejantes a estructuras cristalinas, el artefacto rechazó todo análisis compositivo. Su orientación permaneció fija, sin dejar de mirar a su estrella madre, y resistió todos los intentos de manipulación o rotación.\n\nDurante un experimento controlado, la nave de reconocimiento sometió al artefacto a un pulso de energía concentrada. El constructo se partió limpiamente en dos mitades simétricas, reconfigurándose cada una en una réplica más pequeña de la original. Los pulsos posteriores arrojaron resultados idénticos: división, replicación y miniaturización consistente.\n\nAl final, una nube difusa de constructos en miniatura se estabilizó en la órbita. Cada fragmento conservó la alineación y geometría precisas del progenitor, y el enjambre en su conjunto reflejó la silueta de la estructura original.\n\nNo hay precedentes ni explicación para semejante fenómeno. La telemetría recopilada se ha archivado para su correspondiente análisis."
 infernals.3205.a: "Preservad y observad los fragmentos."
 # Archaeological Sites
 from_the_ashes_site: "De las cenizas"
 from_the_ashes_site_desc: "La superficie de [Planet.GetName] es abrasadora y un peligro para la vida biológica. Las imágenes de unas ruinas claramente artificiales han llamado la atención de los [GetScientistPlural]. Una investigación arqueológica podría revelar quiénes estuvieron aquí y qué fue de ellos."
 infernals.2700.name: "Imperio olvidado"
 infernals.2700.desc: "Si bien las ruinas de [From.Planet.GetName] parecían inicialmente hechas de piedra, las excavaciones y los análisis sugieren que muchas de las estructuras de esta ciudad perdida están compuestas de un material orgánico petrificado comparable a la madera. Actualmente, no existe ninguna fuente de dichos materiales en el planeta. Los artefactos más pequeños se han fabricado con metales rudimentarios, vidrio y demás materiales orgánicos petrificados. A su vez, los [GetScientistPlural] han hallado fósiles de criaturas nativas ya extintas.\n\nSegún parece, la civilización de marras habitó el planeta en una época en la que su clima era mucho más templado. ¿Desaparecieron antes de que el planeta alcanzara su estado actual, o presenciaron la violenta transición en sus últimos años?"
 infernals.2705.name: "Testigos de una defunción"
 infernals.2705.desc: "La excavación de la ciudad en ruinas de [From.Planet.GetName] ha revelado lugares de gran importancia cultural, decorados con intrincados patrones que podrían corresponder a un lenguaje escrito. Para mayor regocijo, los equipos de excavación han descubierto una cámara subterránea llena de estantes que contienen finas láminas de bronce grabadas con una escritura densa. A pesar de la deficiencia del bronce como método de conservación, parece ser un archivo colectivo de textos.\n\nEl proceso de traducción ha dado comienzo mientras los equipos arqueológicos siguen explorando la ciudad. El destino final de estos individuos sigue siendo una incógnita."
 infernals.2710.name: "Perdición inminente"
 infernals.2710.desc: "El equipo de [From.Planet.GetName] ha encontrado una catacumba sombría. Consiste en una red de trincheras, con restos alienígenas momificados que descansan en cavidades en las paredes, apilados en grupos de tres o cuatro individuos. Los ajuares funerarios nos permiten vislumbrar su desarrollo tecnológico en forma de armas de fuego primitivas, telescopios de vidrio simples y bordados textiles complejos.\n\nMuchas intersecciones de la catacumba están custodiadas por estatuas de una fauna local extinta. Estas criaturas poseen un caparazón redondo y abovedado, cuatro patas achaparradas y una cabeza pequeña y roma. Los especímenes mejor conservados aparecen encorvados, y emplean su caparazón para protegerse de las tallas con forma de llamas en el material que hay encima de ellos.\n\nEl verdadero significado de esta obra de arte puede haberse perdido en el tiempo, pero podría representar la conciencia de esta sociedad sobre su inminente y ardiente destino. Una excavación más a fondo de las ruinas podría aclarar sus vivencias."
 infernals.2715.name: "Caída llameante"
 infernals.2715.desc: "Una exploración concienzuda de la ciudad en ruinas de [From.Planet.GetName] revela que esta civilización sobrevivió al colapso de su ecosistema y era consciente de que sus ardientes días tocaban a su fin. Existían registros en papel hasta que la ceniza volcánica caliente los obligó a utilizar tablillas de bronce. Las representaciones artísticas de animales escondiéndose de las llamas dan testimonio de sus tentativas para asimilar su final.\n\nLa excavación también desentrañó un espécimen casi perfecto de las estatuas que vigilan las catacumbas. Las llamas que tiene talladas emiten un brillo interno, resultando en una impresionante obra digna de su preservación.\n\nAdemás, encontramos pruebas de los intentos de detener el vulcanismo. Las calzadas y carros rotos evidencian que los habitantes transportaron los detritos a la caldera volcánica más próxima para intentar taponar el volcán. Por desgracia, no pudieron detener su destino, pues el planeta ahora carece de vida multicelular.\n\nEsta historia es un recordatorio de la precariedad de cualquier civilización al enfrentarse a un problema mayor que las herramientas a su disposición."
 infernals.2715.a: "Un final trágico."
 infernals.2715.b: "Deberíamos aprender de sus errores."
 inferno_temple_site: "Un templo en el infierno"
 inferno_temple_site_desc: "Lejos de los centros de población de [Planet.GetName], en una cadena de montañas volcánicas activas, se encuentra un antiguo templo en ruinas. Si estudiamos su historia, tal vez podamos obtener más información sobre la cultura local del planeta."
 infernals.2720.name: "Señales ancestrales"
 infernals.2720.desc: "El templo presenta marcas de batalla, y en el suelo se encuentran restos antiguos de las especies sintientes locales. Parece que el templo fue incendiado y abandonado. Los equipos de seguridad han observado que los lugareños evitan la zona, pues la consideran maldita.\n\nLos muros del templo del fuego protegían su contenido, incluidos numerosos frescos y tallas intrincadas. Representan la recurrente imagen de un círculo de fuego retorcido con un oscuro tajo en su centro. En una representación, una figura bípeda arranca uno de esos cuatro ojos y lo proyecta en el mundo, creando este motivo central. Lo llamamos el Ojo Infernal.\n\nSi seguimos excavando, revelaremos las creencias que rodeaban a esta extraña figura."
 infernals.2725.name: "Ofrendas oculares"
 infernals.2725.desc: "Las excavaciones del templo del Ojo Infernal muestran indicios de numerosos sacrificios. Grandes fosas circulares con plataformas en el centro, imitando al Ojo Infernal y su pupila, yacen cubiertas de ceniza y carbón. El análisis molecular revela que la ceniza y el carbón provienen de un tejido animal.\n\nNo logramos discernir si sacrificaban a animales salvajes o domésticos, o a los propios lugareños.\n\nHemos enviado agentes a los centros de población actuales en busca de más pruebas, mientras nuestros excavadores buscan más respuestas."
 infernals.2725.a: "¡Es un misterio a la espera de resolverse!"
 infernals.2725.b: "Enviad drones para resolver el misterio."
 infernals.2730.name: "Prácticas oscuras"
 infernals.2730.desc: "Se ha descubierto una pesada puerta de piedra que bloqueaba la parte más profunda del templo. Los excavadores se abrieron paso y encontraron una cámara circular con un pozo central que se extendía por encima de un depósito subterráneo natural de magma. La luz anaranjada del magma bañaba las paredes con un resplandor rojizo, iluminando tenuemente las inscripciones que rodeaban la peculiar sala. La parte superior de las paredes circundantes se encuentra repleta de ojos brillantes y llameantes.\n\nEn un borde de ese pozo, se encuentran los restos disecados de uno de los lugareños, destrozados sobre un altar con la forma del Ojo Infernal. Todo apunta a que estaban sacrificando a los suyos para intentar apaciguarlo.\n\nEl texto que recorre estas paredes puede ser fundamental para comprender el papel cultural del templo, por lo que debería traducirse cuanto antes."
 infernals.2735.name: "Profecías convulsas"
 infernals.2735.desc: "Un último estudio de las escrituras de la cámara más profunda del templo revela una serie de profecías relacionadas con el regreso del Ojo Infernal. Se habla de la creciente ira del Ojo ante la rebeldía de sus súbditos. Como represalia, vaticinan que el Ojo oscurecerá los cielos, provocará la erupción de una montaña sagrada, hará que una cosecha se marchite sin dar frutos, y mucho más. La profecía lo presenta como el fin de la civilización y asevera que, cuando estos eventos ocurran, solo aquellos que se sometan al Ojo Infernal sobrevivirán.\n\nNuestros agentes han estado buscando conexiones culturales entre la población local, y han descubierto que este texto profético es la fuente de muchos aforismos y frases en las culturas del planeta, así como el texto fuente de muchas historias y mitos posteriores. También creen que los misterios practicados por sus templos modernos incluyen variaciones y reacciones en contra de esta antigua profecía.\n\nPodríamos usar nuestra tecnología para recrear todos estos sucesos proféticos, o falsificarlos con un realismo que pasaría desapercibido. Si nos presentáramos como la reencarnación del Ojo Infernal, demostraríamos que la profecía original era correcta desde el principio, y podríamos obtener concesiones, así como su lealtad. Así facilitaríamos su asimilación a largo plazo."
 infernals.2735.a: "Volvamos a promulgar las profecías."
 infernals.2735.a.tt: "La sociedad primitiva de §Y[From.Planet.GetName]§! aprenderá a adoptar nuestra ética."
 infernals.2735.a.fail: "No ha seleccionado la política §Y$interference_not_allowed$§!."
 infernals.2735.b: "No intervengáis."
 infernals.2735.c: "Su historia se ha perdido para siempre."
 infernal_figurine: "Estatuilla infernal"
 infernal_figurine_desc_short: "Una criatura robusta con un caparazón abovedado y cuatro patas rechonchas se agacha bajo una estilizada escultura de fuego."
 infernal_figurine_desc_details: "La llama está tallada en un mineral desconocido que brilla con un rojo intenso. Este artefacto se sacó de las catacumbas de una sociedad extinta, y podría haber representado su vana esperanza de sobrevivir a la inminente destrucción volcánica de su biosfera."
