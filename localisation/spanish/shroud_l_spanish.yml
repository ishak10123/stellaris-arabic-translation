 trait_tankbound_effects: "Mantenimiento de alimento (o equivalente) de población: §G-50%§! $TABBED_NEW_LINE$- §RNo puede desempeñar trabajos de obrero§!$TABBED_NEW_LINE$- §RNo se puede reclutar para los ejércitos§!"
