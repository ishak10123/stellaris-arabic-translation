 shroud.11225.title: "Una desaparición repentina"
 shroud.11225.desc.common_1: "En un instante, todo desapareció.\n\nLa malévola §R$end_aura$§! presente en nuestros sistemas ha desaparecido repentinamente, llevándose todo consigo. Estrellas enteras se han colapsado formando agujeros negros, los planetas han desaparecido y en su lugar ha quedado un gran silencio."
 shroud.11225.desc.common_2: "Nunca se sabrá qué locura provocó un poder tan destructivo."
 shroud.11225.desc.default: "$shroud.11225.desc.common_1$\n\n$shroud.11225.desc.common_2$"
 shroud.11225.desc.mitigated: "$shroud.11225.desc.common_1$ Parece que nuestros esfuerzos por repeler el aura han tenido algunos efectos mitigadores, preservando lo poco que hemos podido.\n\n$shroud.11225.desc.common_2$"
 shroud.11225.a: "¿Cómo es posible?"
 SPECIAL_PROJECT_CALLING: "Llamada del conocimiento"
 SPECIAL_PROJECT_CALLING_DESC: "$whisperers_in_the_void_color_article_cap$ anhelan obtener conocimientos que superen los límites del pensamiento convencional. Al otorgar a nuestros [Owner.GetResearchers] un amplio mandato para centrarse en áreas de estudio esotéricas, podemos intentar satisfacer el fervor de los Susurradores."
 physics_technology_CALLING_PROJECT: "$SPECIAL_PROJECT_CALLING$"
 physics_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
 society_technology_CALLING_PROJECT: "$SPECIAL_PROJECT_CALLING$"
 society_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
 engineering_technology_CALLING_PROJECT: "$SPECIAL_PROJECT_CALLING$"
 engineering_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
 RECKONING_ARRIVAL_PROJECT: "Llega el juicio"
 RECKONING_ARRIVAL_PROJECT_DESC: "La galaxia se halla amenaza por una entidad de poder inmenso. \"§R$NAME_Reckoning$§!\" la llaman. Compuesta de energía pura, se materializó sin previo aviso y emprendió una campaña de destrucción.\n\nTodos los datos recabados apuntan a que se trata de un oponente como ninguno que hayamos afrontado antes. Si deseamos hacer frente a esta amenaza, sería oportuno poner en marcha una investigación de emergencia a fin de determinar métodos de combate que puedan resultar más efectivos."
 shroud.11235.title: "$RECKONING_ARRIVAL_PROJECT$"
 shroud.11235.desc: "Nuestros [GetScientistPlural] han completado una investigación exhaustiva sobre la poderosa entidad conocida como §R$NAME_Reckoning$§!.\n\nA raíz de sus hallazgos, hemos concretado un método efectivo para enfrentarnos a este enemigo con la tecnología de la que disponemos: la energía de la que se compone $NAME_Reckoning$ se puede degradar con un arma modificada para penetrar escudos de energía.\n\nAunque la amenaza no es ahora menos formidable, tenemos alguna posibilidad de hacerle frente."
 shroud.11235.a: "$extreme_frontiers.1531.i$"
 RECKONING_VULNERABILITY_PROJECT: "Algún punto débil tendrá"
 RECKONING_VULNERABILITY_PROJECT_DESC: "A pesar de nuestra derrota, nuestro enfrentamiento con la entidad conocida como §R$NAME_Reckoning$§! nos proporcionó datos muy valiosos para el estudio.\n\nSi dedicamos esfuerzos de investigación a este misterioso ser de energía, podemos identificar sus vulnerabilidades y desarrollar, en lo sucesivo, métodos de ataque más eficaces."
 shroud.11240.title: "Enseñanzas de la derrota"
 shroud.11240.desc: "§R$NAME_Reckoning$§! es una fuerza inconmensurable para nuestras flotas. A pesar de la derrota, el enfrentamiento nos ha brindado abundantes datos acerca de este misterioso ser de energía, información que no habríamos adquirido de no haber entrado en contacto directo con él.\n\nEl análisis preliminar indica que hemos reunido suficientes datos para modelar la composición de la entidad. Si la investigación continúa, lo siguiente será tratar de identificar sus vulnerabilidades y, en función de lo averiguado, adaptar nuestros ataques."
 shroud.11240.a: "Algún punto débil tendrá."
 shroud.11245.title: "La debilidad de $NAME_Reckoning$"
 shroud.11245.desc.1: "Nuestros [GetScientistPlural] han logrado un gran avance en su investigación sobre la energía conocida como §R$NAME_Reckoning$§!."
 shroud.11245.desc.2.intro: "Además de surgir"
 shroud.11245.desc.2.outro: "Si se les dota de equipamiento láser con propiedades \"psiosupresoras\", nuestras flotas podrían truncar esa conexión, quedando la entidad expuesta a ataques físicos."
 shroud.11245.desc.2.psionic: "$shroud.11245.desc.2.intro$ del §HVelo§!, esta entidad mantiene su poder defensivo gracias a un enlace transdimensional con el plano psiónico. $shroud.11245.desc.2.outro$"
 shroud.11245.desc.2.non_psionic: "$shroud.11245.desc.2.intro$ de otra dimensión de la realidad, la entidad mantiene su poder defensivo a través de un misterioso vínculo transdimensional. $shroud.11245.desc.2.outro$"
 reckoning_insight_modifier: "Datos del ente"
 reckoning_insight_modifier_desc: "Mediante investigación rigurosa, hemos hallado el método más eficaz para dañar a $NAME_Reckoning$, sirviéndonos de un arma que ya forma parte de nuestro arsenal, solo que con mejoras implementadas."
 reckoning_vulnerability_modifier: "Debilidades del ente"
 reckoning_vulnerability_modifier_desc: "Gracias a los datos recabados en el último enfrentamiento con el ente, hemos descubierto cómo infligirle graves estragos con ayuda de láseres \"psiosupresores\"."
