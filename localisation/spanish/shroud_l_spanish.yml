 shroud.4935.tooltip: "Ha aparecido un §H$pc_gaia$§! en [capital_scope.solar_system.GetName]: §H[accord_creation_world.GetName]§!"
 shroud.4970.title: "El fin ha llegado"
 shroud.4970.desc.1: "El velo entre dimensiones ha desaparecido brevemente, expulsando todo el poder psiónico del Velo a la realidad tangible."
 shroud.4970.desc.2: "Todos los seres con consciencia, ya sean vivientes o mecánicos, han sido erradicados. Los planetas se han convertido en una cáscara estéril. Incluso las estrellas exhalaron su última luz.\n\nA pesar de ello, en nuestros últimos momentos, pudimos percibir una voz en el interior de nuestras mentes...\n\n§R\"EL FINAL DE LOS FINALES\".§!"
 shroud.4970.desc: "$end_of_the_cycle_color_article_cap$ está entre nosotros.\n\nEl $end_aura$ ha consumido la galaxia. Cuando el último sistema estelar cedió a su poder, estalló una oleada inconmensurable de energía.$shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4970.a: "Es perfecto."
 shroud.4970.a.tooltip.destroyed: "§YSe ha destruido la galaxia.§!"
 shroud.4970.a.tooltip: "Hemos finalizado el ciclo.\n\n$shroud.4970.a.tooltip.destroyed$"
 shroud.4971.title: "$shroud.4970.title$"
 shroud.4971.desc.1: "Es el final."
 shroud.4971.desc.2.1: "El §H$PSIONIC_AURA$§! destructiva emitida por"
 shroud.4971.desc.2.2: "se ha extendido por toda la galaxia. Cuando el último sistema estelar sucumbió a la corrupción del aura, estalló una oleada inconmensurable de energía."
 shroud.4971.desc.2.3: "Como si de otra dimensión de la realidad se tratase, esta inmensa fuerza de proporciones catastróficas lo destruyó todo."
 shroud.4971.desc.2.contact_psionic: "$shroud.4971.desc.2.1$ el §H[from.GetName]§! $shroud.4971.desc.2.2$ $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.contact_no_psionic: "$shroud.4971.desc.2.1$ el §H[from.GetName]§! $shroud.4971.desc.2.2$ $shroud.4971.desc.2.3$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.no_contact_psionic: "$shroud.4971.desc.2.1$ una civilización alienígena no contactada $shroud.4971.desc.2.2$ $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.no_contact_no_psionic: "$shroud.4971.desc.2.1$ una civilización alienígena no contactada $shroud.4971.desc.2.2$ $shroud.4971.desc.2.3$\n\n$shroud.4970.desc.2$"
 shroud.4971.a: "$crisis.6051.a$"
 #==========================
 # Mindwardens
 #==========================
 MINDWARDEN_ENCLAVE: "$MINDWARDEN$"
 MINDWARDEN_ENCLAVE_plural: "$MINDWARDEN_plural$"
 starbase_mindwarden: "$MINDWARDEN$"
 starbase_mindwarden_plural: "$MINDWARDEN_plural$"
 gov_mindwarden_enclave: "Enclave de los guardianes de la mente"
 gov_mindwarden_enclave_desc: "Esta organización, motivada por una intensa antipatía hacia el Velo, se dedica a proporcionar servicios y tecnologías con los que contrarrestar los poderosos efectos de las prácticas psiónicas."
 civic_mindwarden_enclave: "$ENCLAVE_MINDWARDEN$"
 civic_mindwarden_enclave_desc: ""
 enclave_mindwarden_station: "Estación del $MINDWARDEN$"
 enclave_mindwarden_station_plural: "Estaciones del $MINDWARDEN$"
 leader_trait_iron_will: "Voluntad de hierro"
 leader_trait_iron_will_desc: "Un experto comandante de los $MINDWARDEN_plural$, conocido por su experiencia en fortificaciones pesadas y resistencia psíquica."
 shroud.4190.name: "Enfoques de $PSIONIC_AURA$"
 shroud.4190.desc.intro: "Hace algún tiempo, nuestros [GetScientistPlural] observaron un fenómeno inusual: sistemas estelares lejanos surcados por flujos de energía de origen desconocido, los cuales se extienden gradualmente a otros sistemas."
 shroud.4190.desc: "$shroud.4190.desc.intro$ Denominadas §H\"$PSIONIC_AURA_PLURAL$\"§! por las teorías sin confirmar acerca de sus orígenes. Aún no hemos podido constatar si suponen una amenaza o no.\n\nSe ha detectado un aura de estas características en el sistema §H[from.GetName]§!, la cual podría invadir nuestras fronteras si sigue expandiéndose."
 shroud.4190.desc_mindwarden: "Si las teorías sobre el origen psiónico de este fenómeno son ciertas, es posible que el §H[event_target:mindwarden_enclave_country.GetName]§! sepa de métodos para contrarrestar sus efectos."
 shroud.4190.a: "Quizá conozcamos sus efectos más pronto de lo que esperamos."
 shroud.4191.name: "$shroud.4190.name$"
 shroud.4191.desc_1.common: "Hemos detectado altas concentraciones de energía psiónica en el sistema §H[from.GetName]§!. Nuestros [GetTelepathPlural] han oído ecos del §HVelo§! e informan de que se trata de un fenómeno causado por las actividades psiónicas"
 shroud.4191.desc_1.default: "$shroud.4191.desc_1.common$ de una civilización alienígena."
 shroud.4191.desc_1.contact: "$shroud.4191.desc_1.common$ del §H[fromfrom.GetName]§!."
 shroud.4191.desc_2.common: "materia y consciencia en la realidad observable. Nuestras observaciones demuestran que estas auras se pueden extender entre sistemas estelares."
 shroud.4191.desc_2.default: "Denominada §H\"$PSIONIC_AURA$\"§!, emana de la voluntad de una poderosa entidad del Velo, que influye en $shroud.4191.desc_2.common$."
 shroud.4191.desc_2.knows_aura: "Parece que este imperio ha desarrollado métodos para canalizar un §H$PSIONIC_AURA$§!, la cual emana del Velo e influye en $shroud.4191.desc_2.common$"
 shroud.4191.desc_3.common: "esperamos que sus efectos en nuestro territorio sean [GetPositiveRivalAdj]; siempre y cuando nuestras relaciones con el emisor se mantengan iguales."
 shroud.4191.desc_3.default: "Según nuestros [GetTelepathPlural], irradia una intención [GetBenevolentRivalAdj], así que $shroud.4191.desc_3.common$"
 shroud.4191.desc_3.contact: "Dadas nuestras relaciones [GetLessThanRivalAdj] favorables con [fromfrom.GetName], $shroud.4191.desc_3.common$"
 shroud.4191.a.rival_organic: "$WORRYING$"
 shroud.4191.a.rival_default: "Un desarrollo nada óptimo."
 shroud.4191.a.organic: "Un regalo del Velo."
 shroud.4191.a.default: "Un fenómeno interesante."
 shroud.mindwarden.back: "$enclave.410.a$"
 shroud.4205.name: "[event_target:mindwarden_enclave_country.GetName]"
 shroud.4205.common: "Saludos. Me dirijo a vosotros en calidad de representante del [event_target:mindwarden_enclave_country.GetName]."
 shroud.4205.desc: "$shroud.4205.common$\n\nNuestra misión es brindar protección ante la amenaza del §HVelo§! y de todos aquellos que propagan sus efectos nocivos. Defendemos el derecho a que las mentes se mantengan libres de intrusiones y que la galaxia esté preparada ante los psiónicos.\n\nA juzgar por nuestros sensores psi, no colaboráis con dicha amenaza. Excelente. Estaremos encantados de ayudaros a protegeros de cualquiera que sí lo haga.\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.end: "Si necesitáis servicios militares antipsiónicos o tenéis §H$zro_lower$§! del que deshaceros, os ayudaremos."
 shroud.4205.desc.return: "Bienvenidos. El [event_target:mindwarden_enclave_country.GetName] valora nuestra cooperación sostenida.\n\nLas lecturas de nuestros sensores psi están limpias. No habéis sido corrompidos por el §HVelo§!. Bien, bien...\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.eotc: "Son tiempos sombríos. A pesar de nuestros esfuerzos, el $end_of_the_cycle_color_article$ se cierne sobre nosotros. Su espantosa manifestación acecha entre las estrellas...\n\n$shroud.4205.desc.eotc.end$"
 shroud.4205.desc.eotc.end: "Es el momento de estar juntos para evitar el apocalipsis psiónico."
 shroud.4205.desc.merc_first: "Queridos guardianes: os traemos buenas noticias. Ya se ha completado la construcción del primer §H$gov_mindwarden_enclave$§!. $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_more: "Queridos guardianes: os traemos buenas noticias. Ya se ha completado la construcción de nuestro §H$gov_mindwarden_enclave$§!. $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_back: "Bienvenidos otra vez, queridos guardianes. El §H[mindwarden_enclave_country.GetName]§! valora nuestra cooperación sostenida.\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning: "$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning.eotc: "$shroud.4205.desc.eotc.end$"
 shroud.4205.a: "¿Qué es el Velo?"
 shroud.4205.b: "Nos gustaría hablar sobre §I$sr_zro$§!."
 shroud.4205.c: "¿Qué se puede hacer con las §Y$PSIONIC_AURA_PLURAL$§!?"
 shroud.4205.d: "Conocemos un buen objetivo psiónico..."
 shroud.4205.e: "Necesitamos ayuda con el £crime£ §Y[GetCrimeDeviancy]§!."
 shroud.4205.ef: "Necesitamos §Yayuda logística§!."
 shroud.4205.f: "Nos vendrían bien vuestros soldados."
 shroud.4205.g: "¿Estaríais dispuestos a enviarnos un §Yguardián§!?"
 shroud.4205.h: "Queremos hablar sobre $end_of_the_cycle_article$."
 shroud.4205.i: "Como vuestros §Ymecenas fundadores§!, tenemos una propuesta que haceros."
 shroud.shared_combating_the_shroud: "A partir de hoy, el §H[mindwarden_enclave_country.GetName]§! llevará a cabo la solemne tarea de combatir el §HVelo§! y toda forma de infracción psiónica.\n\nSi los necesitáis, ya podemos prestar diversos servicios antipsiónicos: la eliminación de §H$zro_lower$§! o el reclutamiento militar son algunos de ellos. Y todo de manera rápida y eficaz."
 shroud.4210.desc: "El §HVelo§! podría describirse como una dimensión de la realidad que existe más allá de la percepción normal. Está compuesto íntegramente de energía §Hpsiónica§! dañina. Toca todos los rincones de nuestra galaxia física, aunque muchos no son capaces de percibirla.\n\nLas energías del Velo pueden manifestarse en el reino físico a través de la actividad cognitiva de los seres sintientes. Estas fuerzas son extremadamente peligrosas e impredecibles.\n\nPara garantizar la seguridad de vuestra población se necesitan tomar medidas de protección contra el Velo. Y, para ello, podemos brindaros nuestra ayuda."
 shroud.shared_text_shroud_seal: "Estas máquinas sofisticadas disiparán gradualmente cualquier $PSIONIC_AURA$, hasta que desaparezca por completo, tanto en el sistema principal como en los que están conectados directamente a través de hipervías."
 shroud.4230.desc: "Existen dos métodos principales para eliminar las §H$PSIONIC_AURA_PLURAL$§!.\n\nSi se construye un §H$building_psionic_suppressor$§! en un planeta, la intensidad del aura se irá reduciendo gradualmente en todo el sistema estelar y evitará que se produzcan más invasiones.\n\nUna solución más contundente sería un §H$SHROUD_SEAL$§!. $shroud.shared_text_shroud_seal$"
 shroud.4230.a: "Olvídalo."
 shroud.4230.b: "Enséñanos §Y$tech_psionic_suppression$§!."
 shroud.4231.desc: "Con gusto. Los datos se transmitirán de inmediato.\n\nQue estas tecnologías os traigan paz frente al flagelo áurico."
 mindwarden_encourage_raid: "Paga al [event_target:mindwarden_enclave_country.species.GetNamePlural] para asaltar un imperio psiónico que conozcamos."
 shroud.4240.need_psionics: "Contacto establecido con un imperio §Y$trait_psionic$§!."
 shroud.4240.desc: "¿Eso queréis? Bueno, nunca conoceremos la paz y seguridad verdaderas si siguen infectando la galaxia con psiónicos...\n\nUn asalto dirigido demostraría nuestra oposición ante unas prácticas tan peligrosas. Con vuestro apoyo económico, estaremos encantados de llevar a cabo dicha operación.\n\nSeñaladnos el objetivo, si estáis de acuerdo."
 shroud.4240.a: "Olvidémoslo."
 shroud.4240.b: "§I[event_target:raid_target_1.GetName]§!"
 shroud.4240.c: "§I[event_target:raid_target_2.GetName]§!"
 shroud.4240.d: "§I[event_target:raid_target_3.GetName]§!"
 shroud.4240.e: "§I[event_target:raid_target_4.GetName]§!"
 mindwarden_raid_cooldown_tt: "§RNo podremos solicitar otro asalto a los guardianes de la mente hasta dentro de §Y[root.mindwarden_raid_timer]§!.§!."
 mindwarden_hire_raid: "Paga a los [event_target:mindwarden_enclave_country.GetName] para enviar flotas de asalto que ataquen a este imperio."
 shroud.4245.desc: "Ah, sí. Somos conscientes de sus prácticas psiónicas. Una demostración de fuerza está más que justificada.\n\nGracias por vuestro apoyo. La operación comenzará en breves."
 mindwarden_raider_modifier: "Asaltante guardián de la mente antipsiónico"
 shroud.4246.name: "Asalto $gov_mindwarden_enclave$"
 shroud.4246.common_1: "Las comunicaciones que hemos interceptado indican que una potencia rival los ha contratado para atacar nuestros sistemas."
 shroud.4246.common_2: "están transmitiendo un mensaje a través de un canal abierto, donde se dirigen a nosotros directamente."
 shroud.4246.desc: "¡Una flota militar de §H[event_target:mindwarden_enclave_country.GetSpeciesName]§! se acerca a nuestras fronteras! $shroud.4246.common_1$ Ellos $shroud.4246.common_2$"
 shroud.4247.desc: "¡La flota de una potencia militar previamente desconocida se aproxima a nuestras fronteras! $shroud.4246.common_1$ Se identifican como los §H[event_target:mindwarden_enclave_country.GetSpeciesNamePlural]§!, $shroud.4246.common_2$"
 NAME_Mindwarden_Corvette: "Fanático"
 NAME_Mindwarden_Frigate: "Centinela"
 NAME_Mindwarden_Destroyer: "Inquisidor"
 NAME_Mindwarden_Cruiser: "Exorcista"
 NAME_Mindwarden_Battleship: "Purificador"
 NAME_Mindwarden_Titan: "Judicador"
 mindwarden_defense_modifier: "Fuerza de defensa del guardián de la mente"
 shroud.4250.desc: "Excelente. Confiarnos $zro_lower$ nos permite llevar a cabo investigaciones importantes sobre esta sustancia poderosa de la que tanto se abusa; una investigación que beneficiará a toda la galaxia.\n\nEste es el motivo por el cual la tarifa para adquirirlo está muy por encima de la norma galáctica."
 shroud.4250.a: "$shroud.mindwarden.back$"
 shroud.4250.b: "¿Qué es el §I$sr_zro$§!?"
 shroud.4250.c: "Donar £sr_zro£ §I$sr_zro$§!"
 mindwarden_zro_explanation: "Vende hasta 100 de §Y$sr_zro$§! por un precio 5 veces superior al establecido en el $resolution_category_galactic_market$."
 mindwarden_zro_cooldown_tt: "§RNo podremos dar $sr_zro$ a los guardianes de la mente hasta dentro de §Y[root.mindwarden_zro_timer]§!.§!"
 shroud.4251.desc: "El §Y$sr_zro$§! es una sustancia rara y muy inestable, cuyos efectos son difíciles de controlar y predecir. De manera intencionada, o no, puede producir violentos estallidos de energía capaces de causar una destrucción a una escala masiva.\n\nEstas propiedades surgen mediante reacciones con el §HVelo§!, de ahí que sea popular entre los practicantes psiónicos, algunos de los cuales lo ingieren a modo de droga.\n\nNuestro objetivo es aprender más acerca del $zro_lower$ y desarrollar métodos de investigación para eliminarlo de manera segura; por eso pagamos una generosa suma por cualquier cantidad que nos traigan."
 shroud.4255.desc: "Gracias por vuestra contribución."
 shroud.4260.desc: "En ese caso, permitid que os ofrezcamos una eficaz §Y$decision_thought_police$§!, la cual es capaz de detectar intentos de [GetCriminalDeviant] antes de que se manifiesten en el comportamiento.\n\nSus métodos se desarrollaron como una alternativa segura a las prácticas psiónicas y usan técnicas científicas para controlar la actividad cognitiva de la población, lo cual proporciona conocimientos sobre el estado mental sin tener que emplear energías peligrosas procedentes del §HVelo§!."
 shroud.4260.a: "$shroud.mindwarden.back$"
 shroud.4260.b: "Incorporad una §I$decision_thought_police$§!."
 mindwarden_decision_cooldown_tt: "§RNo podremos solicitarla hasta dentro de §Y[root.mindwarden_decision_timer]§!.§!"
 mindwarden_decision_explanation: "Desbloquea una £decision£ §Ydecisión planetaria§!: §Y$decision_thought_police$§!"
 shroud.4262.desc: "Excelente. Creo que sus métodos os parecerán bastante eficaces."
 shroud.4265.desc: "Exacto. Nuestras colaboraciones han servido para revelar algunas áreas de mejora que podríais implementar en vuestras estrategias de despliegue militar.\n\nNo pretendemos ofenderos con esto; os lo hacemos saber porque son nuestros campos de especialización. Sería un honor para nosotros poder ayudar a un socio tan valioso en este asunto, siempre que nos proporcionéis una compensación adecuada."
 shroud.4265.a: "$shroud.mindwarden.back$"
 shroud.4265.b: "Trato hecho."
 mindwarden_logistics_cooldown_tt: "§RNo podemos solicitar más ayuda logística de los guardianes de la mente hasta §Y[root.mindwarden_logistics_timer]§!.§!"
 shroud.4267.desc: "Saludos, estimado socio.\n\nNuestro contrato para ayudaros con las operaciones logísticas de vuestras flotas ha expirado. Estaríamos más que dispuestos a continuar nuestra cooperación si lo estimáis oportuno."
 shroud.4267.a: "Continuaremos con nuestra cooperación."
 shroud.4267.b: "Declinamos la oferta por el momento."
 shroud.4266.desc: "Muy bien. Nuestras operaciones de apoyo a las flotas comenzarán de inmediato."
 shroud.4270.desc: "Nuestro $NAME_Mindwarden_Army$ está compuesto por unos excelentes soldados de choque. Están equipados para hacer frente a diversas amenazas, pero resultan especialmente eficaces contra oponentes psiónicos.\n\nMerece la pena pagar por ellos."
 shroud.4270.a: "$shroud.mindwarden.back$"
 shroud.4270.b: "Contratad el §I$mindwarden_army$§!."
 mindwarden_army_cooldown_tt: "§RNo podremos solicitar un nuevo ejército a los guardianes de la mente hasta dentro de §Y[root.mindwarden_army_timer]§!.§!"
 mindwarden_army_explanation: "Recluta a un ejército §Y$mindwarden_army$§!, que llega por $transport$ a nuestro sistema capital."
 shroud.4271.desc: "Estáis de suerte; tenemos una compañía lista para su despliegue. En breves llegará la nave de transporte."
 shroud.4280.desc: "Con mucho gusto.\n\nUn liderazgo eficaz es la clave para combatir al §HVelo§!, y nuestros guardianes están versados en el arte de suprimir la actividad psiónica a través de un gobierno firme."
 shroud.4280.a: "$shroud.mindwarden.back$"
 shroud.4280.b: "Contratad a un §I$subclass_commander_governor$§!."
 mindwarden_commander_explanation: "\nContrataremos a un $subclass_commander_governor$ guardián de la mente de nivel 5."
 unlocks_mindwarden_council_position: "\n§EPermite desbloquear el puesto del Consejo:§!\n§H$t$$councilor_mindwarden$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_country_unity_produces_mult$: §G+1%§!\n$ttt$$planet_crime$: §G-1%§!\n$ttt$$MOD_PSIONIC_AURA_RESISTANCE_MULT$: §G+5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$\n\n$COUNCIL_POSITION_REQUIREMENTS$$councilor_mindwarden_conditional_tooltip$"
 mindwarden_commander_already_bought: "§RYa hemos adquirido los servicios de un $subclass_commander_governor$ guardián de la mente.§!"
 mindwarden_commander_conflicted_leader: "§RNo debe tener un líder de [event_target:shroudwalker_enclave_country.GetName].§!"
 mindwarden_commander_cooldown_tt: "§RNo podremos solicitar otro líder a los guardianes de la mente hasta dentro de §Y[root.mindwarden_raid_timer]§!.§!."
 mindwarden_commander_desc: "Este líder, a quien se le ha reclutado de un $gov_mindwarden_enclave$, fomenta una postura inflexible ante las actividades psiónicas a fin de proteger al pueblo de los efectos nocivos del Velo."
 mindwarden_commander_catch_phrase: "Hay que cauterizar la herida por donde el Velo se filtra."
 shroud.4281.desc: "Una sabia decisión. Ojalá su administración mantenga a vuestra población a salvo durante los años venideros."
 shroud.4286.name: "Ataque contra [FROM.GetName]"
 mindwarden_farewell: "§LVuestro reciente ataque a un $gov_mindwarden_enclave$ es inconcebible. Trabajar en vuestro territorio, a cualquier nivel, sería moral y éticamente indefendible. Os recomiendo encarecidamente que desistáis en estas hostilidades carentes de sentido alguno. Sean cuales sean vuestras decisiones futuras, no estaré aquí para permitirlas.§!"
 shroud.4286.desc: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.end$"
 shroud.4286.desc.councilor: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.councilor_end$"
 shroud.4290.desc: "Sí, es un asunto serio. No hay peor azote en la galaxia que el de $end_of_the_cycle_color_article$."
 shroud.4290.a: "$marauder.31.e$"
 shroud.4290.b: "¿Qué es el $end_of_the_cycle_color_article$?"
 shroud.4290.b.response: "Según las informaciones que manejamos, el $end_of_the_cycle_color_article$ es una fuerza cataclísmica que surge del interior del §HVelo§!. Su poder se puede manifestar en la realidad física a través de la complicidad de invasores de la mente sedientos de poder.\n\nEl fin causa la ruina en la galaxia por medio del §R$NAME_Reckoning$§!, un ser maligno hecho de energía psiónica. Su objetivo principal es la aniquilación total de esta existencia."
 shroud.4290.c: "¿Cómo podemos derrotar al §R$NAME_Reckoning$§!?"
 shroud.4290.d: "Enseñadnos §Y$mindwarden_tactics_modifier$§!."
 shroud.4291.desc: "Ojalá triunféis sobre este grave peligro que amenaza la existencia de todos aquellos que llaman hogar a esta galaxia."
 shroud.4292.desc: "Hemos desarrollado un algoritmo que puede aumentar vuestros ataques dirigidos contra el §R$NAME_Reckoning$§!. Afina los sistemas de puntería de las armas para aumentar la efectividad contra esta especie concreta de entidad psiónica.\n\nEn su estado actual, todas las implementaciones del código requieren una refactorización extensiva para asegurar la compatibilidad con las infraestructuras militares individuales. Por eso se trata de un servicio premium, aunque creemos que el gasto os merecerá la pena."
 mindwarden_tactics_modifier: "Tácticas de los guardianes de la mente"
 shroud.4295.desc: "$shroud.4205.common$\n\nAl principio nos preocuparon los informes sobre vuestros \"$building_materiality_engine_plural$\". Sin embargo, y tras un exhaustivo análisis, hemos llegado a la conclusión de que estos dispositivos presentan un avance prometedor para la explotación no psiónica del llamado §HVelo§!.\n\nOs animamos a que sigáis desarrollando esta tecnología. Estaremos encantados de trabajar con vosotros en el futuro."
 mindwarden_opinion_materiality_engine_tt: "Opinión: £opinion£ §G+$@mindwarden_opinion_materiality_engine|0$§!"
 shroud.4300.desc: "Me dirijo a vosotros en calidad de representante del [mindwarden_enclave_country.GetName].\n\nA juzgar por las lecturas que arrojan nuestro sensor psi, el §HVelo§! ha contaminado por completo a [Root.GetName].\n\nVuestras acciones han precipitado vuestro fin; y nosotros lo aceleraremos."
 shroud.4300.a: "¿Por qué teméis al Velo?"
 shroud.4310.desc: "No le tememos ni a él ni a sus agentes corrompidos, pues sabemos cómo hacerles frente.\n\nNo esperamos que una sociedad enloquecida por su influencia sea capaz de entenderlo."
 shroud.4320.desc.psionic: "¿No fue suficiente con envenenar la galaxia con energía psiónica?"
 shroud.4320.desc.default: "Somos una fuerza que defiende el orden de esta galaxia. ¿Qué beneficio puede traer atacarnos? No nos quedaremos de brazos cruzados ante vuestra beligerancia."
 shroud.4320.desc.common: "No tenemos nada más que hablar con vosotros hasta que no confirméis el cese indefinido de vuestros ataques hostiles."
 shroud.4340.desc: "Somos conocedores de los tratos que os traéis con el §H[shroudwalker_enclave_country.GetName]§!. Vuestras acciones no solo legitiman sus fechorías, sino que también ayudan a expandir la infección del §HVelo§!.\n\nNo os prestaremos ningún servicio mientras colaboréis con ellos."
 shroud.4350.desc: "§HNo hemos podido restablecer el contacto con el [mindwarden_enclave_country.GetName] desde la destrucción de su instalación.\n\nCuando sintonizamos su canal, solo escuchamos la vacía tranquilidad del espacio.§!"
 enclave_opinion_tt: "Opinión: £opinion£ §G+$@positive_opinion|0$§!"
 mindwarden_rival_opinion_tt: "Opinión hacia el [event_target:shroudwalker_enclave_country.GetName]: £opinion£ §R$@negative_opinion|0$§!"
 shroudwalker_rival_opinion_tt: "Opinión hacia el [event_target:shroudwalker_enclave_country.GetName]: £opinion£ §R$@negative_opinion|0$§!"
 shroud.4405.title: "$gov_mindwarden_enclave$ Destruida"
 shroud.4405.desc_common: "Nuestra ofensiva en el sistema [mindwarden_enclave_system.GetName] ha sido un éxito; el §H[mindwarden_enclave_country.GetName]§! ya no existe."
 shroud.4405.desc.default: "$shroud.4405.desc_common$ Aunque las prácticas que despreciaban tenían poca importancia para nosotros, su cruzada contra el §HVelo§! representaba la clase de dogmatismo pseudocientífico que no debería tener cabida en nuestra galaxia."
 shroud.4405.desc.psionic: "$shroud.4405.desc_common$ Ya no extenderán su ignorante dogma sobre los peligros del §HVelo§!, y sus atenuadores psiónicos de la estación son ahora deshechos."
 shroud.4405.desc_end: "Nuestra victoria ha sido un éxito por partida doble, pues pudimos rescatar una cantidad considerable de recursos de los restos de su estación."
 shroud.4406.title: "$gov_mindwarden_enclave$ Destruida"
 shroud.4406.desc_common: "Hemos recibido informes que indican que el §H[mindwarden_enclave_country.GetName]§!, en el sistema [mindwarden_enclave_system.GetName], ya no existe. Este $gov_mindwarden_enclave$ fue incapaz de resistir el ataque de §H[mindwarden_destroyer.GetName]§!, que redujo su estación a escombros y no dejó supervivientes."
 shroud.4406.desc.psionic: "La galaxia ahora está libre del tormento de su cruzada antipsiónica. Eso sí, mientras no surjan otros que tomen su lugar."
 shroud.4406.desc.default: "La galaxia tendrá que arreglárselas sin sus servicios antipsiónicos por el momento."
 shroud.4406.a: "Hasta nunca."
 shroud.6855.desc: "Que todo el mundo lo sepa. Estamos encantados de mantener una cooperación estrecha con el [root.GetName]; nuestras historias y objetivos estarán para siempre vinculados."
 shroud.6855.desc.1: "Siempre os estaremos agradecidos por vuestra contribución al [mindwarden_enclave_country.GetName]. Que nuestro vínculo permanezca inquebrantable mientras persista la amenaza psiónica."
 shroud.6855.desc.2: "Podéis estar seguros de que vuestro próximo pago por participación en los beneficios se efectuará sin demoras."
 shroud.6855.b: "Queremos ayudaros a expandir vuestro enclave."
 shroud.6855.b.timeout: "El enclave está buscando nuevos oficiales y tripulación. No pueden realizar las mejoras operativas hasta después de §Y[mindwarden_enclave_country.upgraded_station_timer]§!."
 shroud.6855.c: "Queremos compartir nuestra tecnología con vosotros."
 shroud.6855.c.timeout: "El enclave aún está incorporando la tecnología que hemos facilitado. Podemos compartir nuevas tecnologías con ellos después de §Y[mindwarden_enclave_country.updating_databanks_timer]§!."
 shroud.6855.d: "Queremos contratar una §Yflota§! para nuestros propios intereses."
 shroud.6855.e: "$enclave.205.b$"
 shroud.6855.f: "Queremos aumentar la capacidad de nuestro enclave de guardianes de la mente."
 shroud.6855.f.timeout: "Aún estamos implementando cambios infraestructurales que afectan al enclave. No podemos aumentar la capacidad del enclave de los guardianes de la mente hasta dentro de §Y[mindwarden_enclave_country.mindwarden_enclave_capacity_bought_timer]§!."
 shroud.6860.1.desc: "Podríamos expandir significativamente nuestra operación con fondos adicionales. De esta manera, se incrementaría el número y las capacidades de nuestra flota, y podríamos reclutar a más investigadores para desarrollar tecnologías capaces de proteger la mente. Al final, toda la galaxia se beneficiaría de vuestro mecenazgo."
 shroud.6860.2.desc: "Debemos tener cuidado con la amenaza de los psiónicos, la cual no deja de transformarse. Vuestra generosa donación nos permitirá ampliar nuestras operaciones para afrontar este reto."
 shroud.6860.3.desc: "Hemos conseguido bastante, pero es demasiado pronto para descansar. Si tuviésemos más recursos a nuestra disposición, podríamos desplegar las flotas del [mindwarden_enclave_country.GetName] hasta los rincones más alejados de la galaxia para proteger a un mayor número de mentes afectadas por los psiónicos."
 shroud.6860.4.desc: "Vuestro mecenazgo ha definido nuestra trayectoria desde el principio, y nuestros objetivos comunes no han cambiado: erradicar por completo a los psiónicos para fomentar el bienestar mental. Con vuestra ayuda estamos cada vez más cerca de nuestro objetivo."
 shroud.6860.5.desc: "Si estimáis oportuno volver a invertir en nuestras operaciones, podríamos convertirnos en la mayor fuerza antipsiónica de la galaxia; el bastión supremo contra la invasión mental para todas las naciones de entre las estrellas."
 shroud.6860.b: "Trato hecho, pues."
 shroud.6861.desc: "Gracias. Es un placer trabajar con vosotros para proteger la integridad psíquica de todos los seres inteligentes."
 shroud.6865.desc: "Excelente iniciativa. Cuantos más $ENCLAVE_MINDWARDEN_PLURAL$ haya en la galaxia, más seguras estarán las mentes ante la invasión.\n\nPodemos ofrecer consejos para mejorar vuestra eficiencia infraestructural con el fin de permitir el establecimiento y administración de más enclaves."
 shroud.6865.b.tt: "$mindwarden_enclave_capacity$: §G+1§!"
 shroud.6870.desc: "Agradecemos vuestra disposición a compartir los frutos de vuestra investigación. Cualquier conocimiento que nos transmitáis nos ayudará a reforzar la protección de la galaxia ante las amenazas psiónicas."
 shroud.6875.desc: "Será un honor ayudaros. Las flotas del [mindwarden_enclave_country.GetName] están a la vanguardia de la tecnología y tácticas antipsiónicas; ningún invasor de mentes puede hacer algo contra ellas. Todas se despliegan con un comandante formado especialmente en operaciones contra oponentes psiónicos."
 mindwarden_tt_hirefleet: "Toma el control de la §Yflota de los guardianes de la mente§! de este enclave durante 10 años."
 shroud.6876.desc: "Confiamos en que la §H[mercenary_fleet.GetName]§! será una herramienta eficaz para combatir a aquellos que juegan con el poder destructivo de los psiónicos."
 mindwarden_tt_managefleet: "Cancelad o prolongad el contrato de la §Yflota de los guardianes de la mente§!."
 shroud.6880.desc: "Por supuesto. Esperamos que la §H[mercenary_fleet.GetName]§! haya sido una incorporación valiosa a vuestras filas. ¿Deseáis finalizar o prolongar nuestro contrato?"
 shroud.6880.a: "$marauder.31.e$"
 shroud.6881.desc: "Muy bien. Se ha anulado el contrato y la §H[mercenary_fleet.GetName]§! regresará con nosotros de inmediato. Podéis contratar a nuestras flotas siempre que queráis."
 #======================
 # Mindwardens origin
 #======================
 origin_mindwardens: "$MINDWARDEN_plural$"
 origin_mindwardens_desc: "$CHALLENGING_ORIGIN$§RAdvertencia: bloquea el acceso a ['concept_psionic_ascension'].§!\n\nLos antepasados de esta civilización estaban infestados con fuerzas de otro mundo que invadieron sus mentes, lo que los inspiró a dedicar grandes esfuerzos y recursos al desarrollo de una tecnología antipsiónica.\n\nSus antiguos dispositivos siguen siendo funcionales, pero aún no se han probado contra las amenazas psiónicas de la galaxia."
 origin_tooltip_mindwardens_effects: "- $ADDITIONAL_TECHNOLOGIES_STRING$ £engineering£ ['technology:tech_starbase_3']\n- $HOME_SYSTEM$ Comienza con una §H$tech_starbase_3$§!.\n- $HOMEWORLD$ £building£ ['building:building_ancient_ward_1']\n- Obtiene acceso al §Hcasus belli§! §Y$casus_belli_cb_psionics_containment$§! contra los imperios ascendidos psiónicamente.\n- §Y$FE_GUARANTEED_COLONIES$§! no aparecen.\n- Los §Y$ENCLAVE_MINDWARDEN_PLURAL$§! no se generan al inicio de la partida."
 SPECIES_CLASS_MUST_USE_ORIGIN_MINDWARDENS: "Es necesario tener el origen §Y['civic:origin_mindwardens']§!"
 START_SCREEN_MINDWARDENS: "Los registros de nuestros antepasados describen una plaga psíquica que una vez devastó [GetHomeWorldName]. Unas fuerzas de otro mundo atacaron sus mentes y una radiación devastadora se extendió por toda la atmósfera; todo ello alentado por psiónicos practicantes de la sociedad [GetSpeciesAdj].\n\nEn respuesta a estas amenazas, nuestros antepasados construyeron la $building_ancient_ward_1$ para protegerse de las fuerzas invasoras de la mente. Con solo una rutina de mantenimiento, esta venerable estructura ha demostrado ser lo bastante fuerte para defender a todos los [GetSpeciesNamePlural] de la amenaza de la influencia psiónica, y su tecnología central ha fundamentado el desarrollo de otras defensas para la mente.\n\nNos enfrentamos a lo desconocido mientras nuestra civilización se prepara para un viaje más allá de la órbita de [capital_scope.System.GetName]. ¿Qué amenazas psíquicas estarán acechándonos?"
 mindwarden_system_init_NAME: "$origin_mindwardens$"
 mindwarden_system_init_DESC: "Este será siempre el sistema inicial al usar el origen $origin_mindwardens$.\n\n$system_initializer_DESC$"
 mindwarden_sol_system_init_NAME: "$origin_mindwardens$ (Sol)"
 mindwarden_sol_system_init_DESC: "Sistema opcional de inicio para el origen $origin_mindwardens$. Usa Sol como base.\n\n$system_initializer_DESC$"
 building_ancient_ward_1: "Guardia antigua"
 building_ancient_ward_1_desc: "Esta estructura ancestral usa una gama de atenuadores psiónicos para aislar todo el planeta de las fuerzas invasoras de la mente."
 building_ancient_ward_2: "Gran guardia"
 building_ancient_ward_2_desc: "Se han usado atenuantes psiónicos para mejorar esta estructura ancestral, los cuales son capaces de proteger contra las $PSIONIC_AURA_PLURAL$ en todo el sistema estelar."
 psionic_auras_immunity: "Disipa progresivamente las §Y$PSIONIC_AURA_PLURAL$§! del sistema."
 mindwarden_aura_immunity: ""
 war_goal_wg_end_threat_psionics: "$war_goal_wg_end_threat$"
 war_goal_wg_end_threat_psionics_desc: "Se libra una guerra para defender la galaxia de las amenazas de la infección psiónica."
 casus_belli_cb_psionics_containment: "Contención psiónica"
 NAME_Exiled: "Coro del Soñador"
 EXILED_SYSTEM_01: "Romash"
 EXILED_SYSTEM_02: "Joroqhi"
 EXILED_SYSTEM_03: "Plenxix"
 EXILED_SYSTEM_04: "Gherribla"
 EXILED_SYSTEM_05: "Qyuun"
 EXILED_SYSTEM_06: "Namyyk"
 EXILED_SYSTEM_07: "Szypihn"
 EXILED_SYSTEM_08: "Kzanakl"
 EXILED_SYSTEM_09: "Ukul"
 EXILED_SYSTEM_10: "Xherron"
 EXILED_SYSTEM_11: "Alo Hebkor"
 EXILED_SYSTEM_12: "Uro Bzakor"
 EXILED_SYSTEM_13: "Bihlamat"
 EXILED_SYSTEM_14: "Formoks"
 EXILED_SYSTEM_15: "Ibgannak"
 EXILED_COLONY_01: "Dhorodh"
 EXILED_COLONY_02: "Ix-Travunnh"
 EXILED_COLONY_03: "Ob-Ratak"
 EXILED_COLONY_04: "Dax-i-Hafa"
 EXILED_COLONY_05: "Blorr"
 EXILED_COLONY_06: "Frorzak"
 shroud.6020.name: "$UNKNOWN_LONG$"
 shroud.6020.desc: "§HMientras intentamos establecer contacto, nuestra tripulación de puente sufre punzadas intermitentes en la cabeza...§!"
 shroud.6030.name: "[exiled_country.GetName]"
 shroud.6030.desc: "§HA pesar de nuestros reiterados intentos, el [exiled_country.GetName] no responde a nuestras comunicaciones.§!"
 shroud.6050.name: "Extrañas correlaciones"
 shroud.6050.desc: "Nuestra §H$building_ancient_ward_1$§! de supresión psiónica está arrojando lecturas anómalas. Normalmente, esto sería resultado de picos de actividad psiónica en [Root.GetHomeWorldName], pero no hemos hallado evidencia alguna de tal corrupción.\n\nPuede que las respuestas se encuentren más allá de nuestras fronteras. Las imágenes a distancia muestran extrañas explosiones de flujos de energía recientes en el sistema §H[exiled_system_border.GetName]§!, lo cual encaja con las mediciones erráticas de la $building_ancient_ward_1$."
 shroud.6050.a: "Debemos explorar el [exiled_system_border.GetName]."
 shroud.shared_text_psy_symptoms: "confusión emocional; estrés mental debilitante; visiones recurrentes de horrores inexplicables"
 shroud.shared_text_psi_radiation: "Estos fenómenos se parecen mucho a las experiencias que dejaron registradas nuestros antepasados; posiblemente se trate de lo que ellos denominaban como \"radiación psi\", una emisión de energía particularmente destructiva."
 shroud.shared_text_ship_malfunction: "Los sistemas de la flota también sufren importantes averías que neutralizan la mayoría de sus capacidades normales."
 shroud.6100.name: "Energía peligrosa"
 shroud.6100.desc.no_border_aura: "En el recién explorado sistema §H[from.GetName]§! se está desarrollando una situación alarmante. La tripulación de [root.GetName] padece varios síntomas psicológicos: $shroud.shared_text_psy_symptoms$. Los sistemas de sus flotas también están experimentando averías extrañas y erráticas.\n\n$shroud.shared_text_psi_radiation$ Desprovistos de la protección de la §H$building_ancient_ward_1$§! en §H[owner.GetHomeWorldName]§!, estamos experimentando por primera vez la plaga mental de la que nos advirtieron nuestros antepasados.\n\nTras calibrar nuestros escáneres de largo alcance para detectar esta forma única de energía, descubrimos que la fuente de estas peligrosas emisiones proviene del cercano sistema §H[exiled_center_system.GetName]§!. $shroud.6100.desc.end$"
 shroud.6100.desc.border_aura: "La tripulación de [root.GetName] está en peligro.\n\nTras haber estado sometidos a altos niveles de radiación psi en el sistema §H[from.GetName]§!, empezaron a experimentar una angustia psicológica aún peor de la que constaba en los registros. $shroud.shared_text_ship_malfunction$\n\nLos escáneres de largo alcance indican niveles aún más altos de radiación en el sistema §H[exiled_center_system.GetName]§! cercano. $shroud.6100.desc.end$"
 shroud.6100.desc.end: "Se desaconseja encarecidamente enviar a nuestras naves a las profundidades hasta que no evaluemos sus efectos de manera más exhaustiva."
 shroud.6100.tt: "Que comience el proceso de §Y$first_contact$§!."
 shroud.6110.name: "Una presencia en [This.System.GetName]"
 shroud.6110.desc: "Sorprendentemente, el sistema §H[This.System.GetName]§! parece contener varios objetos grandes que tienen pinta de ser de construcción inteligente. Nuestro objetivo es saber más sobre sus creadores, cuyo nombre en clave es §H[This.ContactCountry.GetName]§!, para lo cual estamos intentando establecer una comunicación directa desde una distancia segura.\n\nCualquier forma de vida que se halle en el sistema corre un grave peligro debido a los altos niveles de radiación psi que hemos detectado."
 fcsum_exiled_1: "Hemos descubierto posibles evidencias de inteligencia alienígena en el sistema §H[This.System.GetName]§!."
 shroud.6115.name: "Progreso limitado"
 shroud.6115.desc: "Unos estudios más exhaustivos han confirmado que los objetos del sistema §H[This.System.GetName]§! son naves extraterrestres, aunque aún no hemos establecido contacto con ninguno de sus ocupantes.\n\nAunque lo más preocupante es que el enviado [exiled_envoy.GetName] informa de que su equipo ha comenzado a sufrir síntomas parapsicológicos, incluidas visiones de extraños seres presentes en [This.System.GetName]. A pesar de las preocupaciones, nuestro enviado sigue al pie del cañón con esta misión."
 shroud.6115.a: "Seguid con ello."
 fcsum_exiled_2: "Tenemos que establecer contacto con §H[This.ContactCountry.GetName]§!. Nuestro enviado ha transmitido preocupación por su equipo."
 shroud.6120.name: "Misión cancelada"
 shroud.6120.desc: "Tras meses de silencio, recibimos una transmisión de parte de [exiled_envoy.GetName]. El enviado, habitualmente sobrio y directo, nos hizo llegar un informe extraño y confuso. Proporcionó descripciones incoherentes de imágenes extrañas; al parecer, una maraña de sueños y delirios. Ningún miembro de su equipo demostró ser más coherente.\n\nSe los ha relevado de sus funciones y la misión se ha suspendido de manera indefinida. Esa presencia que se encuentra en §H[This.System.GetName]§! está más allá de los medios que tenemos para investigar el asunto de forma segura."
 fcsum_exiled_3: "Tras una traumática misión, nuestro equipo ha regresado a casa antes de establecer contacto con el §H[This.ContactCountry.GetName]§!."
 shroud.6125.desc: "Suspendido por encima de la corriente agitada. §H[Root.Capital.GetName]§!, ¿o...?\n\n§H...llamando...§!\n\nLa superficie se retuerce, abierta. Un miasma fétido eructa desde las profundidades invisibles.\n\n§H...ninguna...respuesta...§!\n\nIncesante. Asfixiante.\n\nEs terrible."
 MESSAGE_FIRST_CONTACT_ABORTED_EXILED_DESC: "Nuestro proceso de $first_contact$ con $COUNTRY|H$ ha sido anulado por decreto ejecutivo."
 shroud.shared_text_aura_spread: "La infección psiónica vecina se ha extendido por el sistema §H[exiled_system_border.GetName]§!.\n\nA pesar de la protección que ofrecía la §H$building_ancient_ward_1$§!, nuestra población de §H[Root.GetHomeWorldName]§! ha empezado a experimentar síntomas leves que parecen indicar envenenamiento por radiación psi, probablemente causado por la cada vez mayor proximidad de esta plaga. Las proyecciones muestran que esta plaga de la mente podría no tardar en expandirse por §H[Root.home_planet.System.GetName]§!, donde supone un peligro aún mayor para nuestro mundo natal."
 shroud.shared_text_aura_study: "A pesar de los riesgos, creemos que aprenderemos a protegernos mejor si estudiamos este fenómeno más cerca de su origen."
 shroud.6200.name: "Radiación psi en §H[Root.GetHomeWorldName]§!."
 shroud.6200.desc.no_visit: "Se está produciendo una situación alarmante en §H[Root.GetHomeWorldName]§!. La población está experimentando varios síntomas psicológicos: $shroud.shared_text_psy_symptoms$.\n\n$shroud.shared_text_psi_radiation$ Aquellos desprovistos de la protección de nuestra §H$building_ancient_ward_1$§! están experimentando por primera vez la plaga mental de la que nos advirtieron nuestros antepasados.\n\nTras calibrar nuestros escáneres de largo alcance para detectar esta forma única de energía, descubrimos que estas emisiones peligrosas se propagan desde más allá del sistema §H[exiled_system_border.GetName]§!. $shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_no_ship: "$shroud.shared_text_aura_spread$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_and_ship: "$shroud.shared_text_aura_spread$\n\nTras estar expuestos a altísimos niveles de radiación psi, la tripulación de §H[event_target:ship_in_border.GetName]§!, en [exiled_system_border.GetName], está experimentando una angustia psicológica aún peor de lo que se había informado con anterioridad. $shroud.shared_text_ship_malfunction$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.a: "Dejad que aprendamos a detener esta infección."
 PSI_RADIATION_PROJECT: "Radiación psi"
 PSI_RADIATION_PROJECT_DESC: "Los niveles de radiación psi del sistema §H[exiled_system_border.GetName]§! han aumentado repentinamente, cuyos efectos se dejan sentir en §H[Owner.GetHomeWorldName]§!. Tenemos que estudiar este fenómeno en profundidad antes de que ponga en peligro a la población."
 shroud.6205.name: "$PSIONIC_AURA_PLURAL$"
 shroud.6205.desc.start: "Nuestros investigadores sufrieron mucho con la radiación psi venenosa en el sistema §H[exiled_system_border.GetName]§!, pero su misión arrojó importantes hallazgos.\n\nHemos denominado a este fenómeno alarmante como §H\"$PSIONIC_AURA$\"§!, una vasta acumulación de energía destructiva que perturba nuestras mentes además de nuestra tecnología. Se ha extendido desde el sistema §H[exiled_center_system.GetName]§!, donde las energías psiónicas alcanzaron tal intensidad que se expandieron por los sistemas estelares."
 shroud.6205.desc.aura_home: "$shroud.6205.desc.start$\n\nYa ha alcanzado el sistema §H[Root.home_planet.System.GetName]§!, donde los efectos han resultado ser devastadores. $shroud.6205.desc.end$"
 shroud.6205.desc.no_aura_home: "$shroud.6205.desc.start$\n\nSi llega a nuestro sistema §H[Root.home_planet.System.GetName]§!, los efectos podrían ser devastadores. $shroud.6205.desc.end$"
 shroud.6205.desc.end: "La §H$building_ancient_ward_1$§! de §H[Root.GetHomeWorldName]§! solo ofrece protección limitada."
 shroud.6205.a: "Debemos reforzar la $building_ancient_ward_1$."
 PSIONIC_AURA_RESISTANCE_PROJECT: "Resistencia a $PSIONIC_AURA$"
 PSIONIC_AURA_RESISTANCE_PROJECT_DESC: "La §H$building_ancient_ward_1$§! construida por nuestros antepasados en §H[Owner.GetHomeWorldName]§! se diseñó para protegernos de la radiación psi. La incursión de las §H$PSIONIC_AURA_PLURAL$§! amenaza con sobrepasar su capacidad actual. Si aplicamos lo que hemos aprendido hasta ahora, deberíamos ser capaces de mejorar sus propiedades de resistencia."
 shroud.6210.name: "Atenuación psiónica"
 shroud.6210.desc: "Nuestros infatigables investigadores han desarrollado un método para fortalecer la §H$building_ancient_ward_1$§! de §H[Root.GetHomeWorldName]§!. Mediante la mejora de los atenuadores psiónicos, se puede extender la protección a todo el planeta y al sistema §H[Root.home_planet.System.GetName]§! al completo.\n\nLa investigación ha propiciado un estudio más amplio sobre esta tecnología extinta. Ahora sabemos que el vínculo entre la radiación psi y la mente [Root.GetSpeciesAdj] es recíproco: emisiones no solo pueden afectar a nuestros estados mentales, sino que estos pueden influir en los niveles de radiación psi. Parecería que nuestro tabú inmemorial contra las prácticas psiónicas tiene, después de todo, una base científica."
 shroud.6210.a: "Fascinante y preocupante."
 shroud.6210.a.tt: "$BEGINS_EVENT_CHAIN$ §Y$ancient_ward_upgrade_chain_title$§!"
 ancient_ward_upgrade_chain_title: "$building_ancient_ward_2$"
 ancient_ward_upgrade_chain_desc: "La §H$building_ancient_ward_1$§! de §H[Owner.GetHomeWorldName]§! ha alcanzado sus límites funcionales. Para hacer frente a la amenaza psiónica cercana, será necesario mejorar aún más sus capacidades. Esta nueva §H$building_ancient_ward_2$§! será capaz de proteger a nuestra población de la plaga de las §H$PSIONIC_AURA_PLURAL$§!."
 ancient_ward_upgraded: "Edificio mejorado"
 shroud.6215.name: "La $building_ancient_ward_2$ se ha completado."
 shroud.6215.desc.aura_home: "Ahora que nuestra §H$building_ancient_ward_2$§! se ha completado, la radiación psi del sistema §H[Root.home_planet.System.GetName]§! se ha reducido a niveles manejables. La población de §H[Root.GetHomeWorldName]§! se recupera poco a poco de sus efectos adversos."
 shroud.6215.desc.no_aura_home: "Ahora que nuestra §H$building_ancient_ward_2$§! se ha completado, la radiación psi del sistema §H[Root.GetHomeWorldName]§! se ha reducido a niveles manejables. La población se recupera poco a poco de sus efectos adversos."
 shroud.6215.desc.end: "Sin embargo, esta §H$PSIONIC_AURA$§!, y probablemente otras, siguen envenenando la galaxia. Nuestros científicos tienen la hipótesis de que la tecnología de la $building_ancient_ward_2$ podría aplicarse al desarrollo de un §H\"$SHROUD_SEAL$\"§! más poderoso. Estas estructuras masivas deberían ser capaces de suprimir las auras de sistemas estelares al completo. Construir un $SHROUD_SEAL$ de tales características en el sistema §H[exiled_system_border.GetName]§! supondrá un avance importante a la hora de controlar esta amenaza psiónica."
 shroud.6215.a: "Merece la pena proseguir con esta investigación."
 build_shroud_seal_poi_desc: "Tras investigar la tecnología §H$tech_psionic_suppression$§!, hemos concluido que podemos usar un $constructor$ para elaborar un §H$SHROUD_SEAL$§! dentro de un pozo gravitatorio estelar. Esto suprimirá las §H$PSIONIC_AURA_PLURAL$§! en todo el sistema estelar y los sistemas adyacentes conectados a través de una hipervía."
 shroud_seal_construction_chain_title: "Construcción del $SHROUD_SEAL$"
 shroud_seal_construction_chain_desc: "Nuestros científicos creen que se podría desarrollar una tecnología de §H$tech_psionic_suppression$§! más avanzada para inhibir las §H$PSIONIC_AURA_PLURAL$§! en sistemas estelares enteros.\n\nEsta tecnología nos permitirá construir un §H\"$SHROUD_SEAL$\"§!. Colocar un dispositivo tan poderoso en el sistema §H[exiled_system_border.GetName]§! supondrá un avance significativo en el control de esta amenaza psiónica."
 tech_psionic_suppression_researched: "$tech_psionic_suppression$ investigada"
 shroud_seal_built: "$SHROUD_SEAL$ construido"
 shroud_6216_poi: "[exiled_system_border.GetName]"
 shroud_6216_poi_desc: "$build_shroud_seal_poi_desc$"
 shroud.6220.name: "Radiación extrema"
 shroud.6220.desc: "Tras la exposición a los altísimos niveles de radiación psi del sistema §H[exiled_system_border.GetName]§!, la tripulación de §H[Root.GetName]§! está experimentando una angustia psicológica que supera a la que se había comunicado con anterioridad. $shroud.shared_text_ship_malfunction$"
 shroud.6225.name: "Radiación en §H[Root.home_planet.System.GetName]§!"
 shroud.6225.desc.shared: "Los efectos adversos por envenenamiento debido a la radiación psi ya se están manifestando entre la población de §H[Root.GetHomeWorldName]§!. Además, la funcionalidad de nuestras naves se ha visto gravemente perjudicada."
 shroud.6225.desc.know_aura: "El §H$PSIONIC_AURA$§! se ha extendido por el sistema §H[Root.home_planet.System.GetName]§!. $shroud.6225.desc.shared$\n\nLa urgencia por fortalecer la §H$building_ancient_ward_1$§! es mayor que nunca."
 shroud.6225.desc.no_know_aura: "La plaga psiónica se ha extendido al sistema §H[Root.home_planet.System.GetName]§!. $shroud.6225.desc.shared$\n\nLa urgencia por entender esta contaminación es mayor que nunca."
 shroud.6225.a: "No hay tiempo que perder."
 shroud.6225.a.know_aura.tt: "El §H$PSIONIC_AURA$§! de §H[exiled_country.GetName]§! produce los siguientes efectos:\n$effect_exiled_aura$"
 shroud.6225.a.no_know_aura.tt: "Este fenómeno psiónico produce los siguientes efectos:\n$effect_exiled_aura$"
 effect_exiled_aura: "- $MOD_SHIP_FIRE_RATE_MULT$: §R-125%§!\n- $MOD_SHIP_SHIELD_MULT$: §R-200%§!\n- $MOD_SHIP_EVASION_MULT$: §R-100%§!\n- $mod_planet_jobs_produces_mult$: §R-30%§!\n- $mod_planet_pops_upkeep_mult$: §R+100%§!\n- $MOD_PLANET_BUILDING_TIME_MULT$: §R+100%§!"
 shroud.6231.name: "La pérdida de §H[root.GetHomeWorldName]§!"
 shroud.6231.desc: "Hemos perdido el control sobre nuestro mundo natal, §H[root.GetHomeWorldName]§!. Era nuestro principal almacén de conocimientos y el nexo de todos los proyectos de nuestra sociedad. Si no lo recuperamos, no nos será posible ampliar nuestros trabajos antipsiónicos."
 shroud.6231.a: "Debemos recuperar el control sin demora."
 shroud_6231_poi: "[root.GetHomeWorldName]"
 shroud_6231_poi_desc: "Debemos recuperar el control de §H[root.GetHomeWorldName]§! sin demora."
 shroud_reclaim_homeworld_chain_title: "Reclamar §H[root.GetHomeWorldName]§!"
 shroud_reclaim_homeworld_chain_desc: "Hemos perdido el control sobre nuestro mundo natal, §H[root.GetHomeWorldName]§!. Era nuestro principal almacén de conocimientos y el nexo de todos los proyectos de nuestra sociedad. Si no lo recuperamos, no nos será posible ampliar nuestros trabajos antipsiónicos."
 homeworld_reclaimed: "Mundo natal reclamado"
 shroud.6241.name: "§H[root.GetHomeWorldName]§! reclamado"
 shroud.6241.desc: "Hemos recuperado el control sobre nuestro mundo natal, §H[root.GetHomeWorldName]§!. [root.GetName] puede reanudar sus esfuerzos antipsiónicos con toda su fuerza."
 shroud.6241.a: "$EXCELLENT$"
 shroud.6300.name: "Sombras del Velo"
 shroud.6300.desc: "Nuestros científicos han completado el desarrollo de la tecnología §H$tech_psionic_suppression$§! avanzada. Ahora podemos replicar los efectos de la $building_ancient_ward_2$ en cualquier colonia que esté bajo nuestro control mediante la construcción de un $building_psionic_suppressor$.\n\nSin embargo, para controlar la expansión de las §H$PSIONIC_AURA_PLURAL$§! en otros sistemas, necesitamos construir un dispositivo más poderoso conocido como §H$SHROUD_SEAL$§!. $shroud.shared_text_shroud_seal$\n\nEsta investigación también ha dado credibilidad a una preocupante teoría: parece ser que el reino etéreo conocido como el §HVelo§!, una dimensión de energía psiónica descrita en antiguos textos ocultos, existe de verdad. La teoría postula que la actividad cognitiva de los seres sintientes puede permitir que la energía pase desde el Velo a la realidad observable, y que este proceso es la causa de las $PSIONIC_AURA_PLURAL$ en general.\n\nEsto significa que no hemos estado luchando únicamente contra fuerzas objetivas del universo, sino con acciones potencialmente calculadas con intenciones desconocidas."
 shroud.6300.a: "Entonces, ¿el §HVelo§! existe de verdad...?"
 shroud.6500.name: "Transmisión inesperada"
 shroud.6500.desc: "Estamos recibiendo una transmisión inesperada procedente de más allá del sistema §H[exiled_system_border.GetName]§!. El §H[exiled_country.GetName]§! ha conseguido inexplicablemente dominar por completo nuestro idioma y los sistemas de comunicación."
 shroud.shared_screen_figure: "§HLa figura que aparece en pantalla con una parsimonia hipnótica, puntualizada por pausas prolongadas.§!\n\nVecinos lejanos, puesto que no respondéis al contacto directo, hemos recurrido a la monotonía de las tecnocomunicaciones en bruto.\n\nSoy §HUk-Hogolath Scarat§!, psiarca de §H[exiled_country.GetName]§!. Tenemos un asunto urgente que tratar, así que dispensad la falta de formalismos."
 shroud.shared_auric_flow_inhibition: "está inhibiendo la propagación de nuestro flujo áurico. Asumimos que esta inadmisible situación es resultado de un error desconocido por vuestra parte.\n\nEl aura beneficia a todos. Debería brillar por toda la galaxia. Para demostrar vuestro compromiso con el bien común, exigimos el desmantelamiento inmediato de vuestro supuesto"
 shroud.6505.name: "$shroud.6500.name$"
 shroud.6505.desc: "$shroud.6500.desc$"
 shroud.6510.name: "Psiarca Uk-Hogolath Scarat"
 shroud.6510.desc: "$shroud.shared_screen_figure$ Tu dispositivo en el sistema §H[exiled_system_border.GetName]§! $shroud.shared_auric_flow_inhibition$ \"$SHROUD_SEAL$\"."
 shroud.6510.a: "No hemos recibido ninguna comunicación previa de vuestra parte."
 shroud.6515.desc: "Hablamos con la voz verdadera. De haber escuchado, habríais percibido la llamada interior. Tenéis el don, aunque elijáis reprimirlo."
 shroud.6515.a: "El aura es destructiva. Es una plaga."
 shroud.6520.desc: "Vuestra comprensión es defectuosa. El aura es un regalo sagrado de nuestro protector. Se desprende de aquello que quiere destruir."
 shroud.6520.a: "¿Y si nos oponemos a vuestras exigencias?"
 shroud.6525.desc: "Quien porte el aura ha de ser sometido. Si os negáis, nos veremos obligados a emprender medidas militares."
 shroud.6525.a: "El Sello permanecerá."
 shroud.6525_heritage.a: "Jamás destruiremos nuestro legado."
 shroud.6525.b: "Aceptamos desmantelar el Sello."
 shroud.6530.desc: "Necios ignorantes."
 shroud.6535.desc: "Una sabia decisión."
 shroud.6550.name: "Hostilidades en diferido"
 shroud.6550.desc: "A fin de evitar un conflicto directo con §H[exiled_country.GetName]§!, hemos accedido a sus exigencias de desmantelar el $SHROUD_SEAL$ del sistema §H[exiled_system_border.GetName]§!.\n\nLa exposición a los responsables de la peste psiónica ha provocado una grave preocupación entre los §H[this.GetName]§!. Todo apunta a que la eliminación del $SHROUD_SEAL$ solo será un breve paliativo. Con el tiempo, esperarán lo mismo de nuestra §H$building_ancient_ward_2$§!, y eso es algo que no podemos tolerar.\n\nEn todo caso, las futuras hostilidades parecen inevitables."
 shroud.6550.a: "Debemos prepararnos."
 shroud.6560.name: "$shroud.6510.name$"
 shroud.6560.desc: "$shroud.shared_screen_figure$ Una estructura en §H[capital_scope.GetName]§! $shroud.shared_auric_flow_inhibition$ \"$building_ancient_ward_2$\"."
 shroud.6560.a: "$shroud.6510.a$"
 shroud.shared_psiarch_transmission: "§HEn cuanto aparece su imagen, el psiarca lanza una reprimenda fría y monótona.§!\n\n[This.GetSpeciesNamePlural], esta transmisión ha resultado ser una decepción."
 shroud.shared_auric_flow_disdain: "Vuestras acciones han confirmado vuestra ignorancia. Vuestro desprecio por nuestro flujo áurico y la mejoría psiónica general no es compatible con la paz intergaláctica. No nos queda otra opción.\n\nPreparaos para enfrentaros a nuestras flotas."
 shroud.6570.name: "$shroud.6510.name$"
 shroud.6570.desc: "$shroud.shared_psiarch_transmission$ Si bien habéis accedido a desmantelar el $SHROUD_SEAL$, somos conscientes de que habéis conservado una construcción en §H[capital_scope.GetName]§! de características similares. Vuestras intenciones son evidentes. $shroud.shared_auric_flow_disdain$"
 shroud.6570.a: "Deberíais hacer lo propio. Fin de la transmisión."
 shroud.6575.name: "$shroud.6570.name$"
 shroud.6575.desc: "$shroud.shared_psiarch_transmission$ Vuestro intento de reconstrucción del $SHROUD_SEAL$ ha extinguido toda esperanza que albergábamos por vuestra redención. $shroud.shared_auric_flow_disdain$"
 shroud.6575.a: "$shroud.6570.a$"
 shroud.6580.name: "Sellando §H[exiled_center_system.GetName]§!"
 shroud.6580.desc: "Al accionar sus colosales atenuadores psiónicos, nuestro §H$SHROUD_SEAL$§! ya ha puesto en marcha la expulsión del §H$PSIONIC_AURA$§! del sistema §H[exiled_center_system.GetName]§!.\n\nLos análisis interestelares han confirmado que el resto del territorio enemigo está conectado mediante hipervías a [exiled_center_system.GetName]. Por ende, este $SHROUD_SEAL$ es capaz de disipar las $PSIONIC_AURA_PLURAL$ en todo el territorio de §H[exiled_country.GetName]§!.\n\nNuestra victoria depende de la protección del Sello."
 shroud.6580.a: "Su protección es esencial."
 shroud.6600.name: "La Asamblea de la Mente"
 shroud.6600.desc: "La colonia de la amenaza psiónica en §H[current_planet.GetName]§! ha sido conquistada.\n\nHemos descubierto que el §H$PSIONIC_AURA$§! presente en este sistema se ha amplificado con las interacciones psíquicas de su población con el §HVelo§!. Estas prácticas están dirigidas por un grupo de telépatas de élite, la §HAsamblea de la Mente§!. Esta secta psiónica profesa devoción a su \"mecenas\", una presunta entidad de gran poder que mora en el Velo y a la que se conoce sencillamente como §H$r_the_lost_patron$§!.\n\nSus escrituras sagradas mencionan repetidas veces un artefacto relacionado con este ser que, según parece, se encuentra en el planeta §H[other_planet.GetName]§!. Este artefacto nos ayudaría a frenar su influencia."
 shroud.6600.a: "Poned rumbo a [other_planet.GetName]."
 shroud.6601.name: "Ruinas de [current_planet.GetName]"
 shroud.6601.desc: "Hemos completado la colonización de §H[current_planet.GetName]§!, un antiguo mundo de [exiled_country.GetName].\n\nTras examinar los restos de sus registros, nos hemos enterado de que el $PSIONIC_AURA$ que estuvo presente en este sistema se debió a una interacción psíquica por parte de la población con el §HVelo§!. Estas prácticas estaban dirigidas por un culto psiónico que fomentaba la devoción a su \"mecenas\", una supuesta entidad poderosa del interior del Velo conocida como §H$r_the_lost_patron$§!.\n\nLos fragmentos de sus textos sagrados mencionaban un artefacto relacionado con este ser, el cual aún podría existir en el planeta §H[other_planet.GetName]§!. Obtener este objeto requeriría una conquista más comedida de [other_planet.GetName], algo que dejaría a parte de su población intacta."
 shroud.6601.a: "$shroud.6600.a$"
 shroud.6700.name: "$SANCTUM_OF_THE_LOST$"
 shroud.6700.desc.common: "Hemos iniciado una represión inmediata contra todas las prácticas psiónicas en estos mundos, neutralizando así por completo su abominable §H$PSIONIC_AURA$§!.\n\nEn la principal metrópolis del planeta se encuentra una torre en ruinas conocida como el §H$SANCTUM_OF_THE_LOST$§!. El que otrora fue el templo supremo del culto psiónico en el antiguo imperio ahora ha sido mancillado. Nuestros soldados lo describen como una presencia radiante, espectral e inquietante.\n\nLa cámara interior de la estructura alberga un \"capullo\" sellado herméticamente que emana potentes niveles de radiación psiónica focalizada. La munición estándar ha resultado ser ineficaz para perforar su exterior. Hay que seguir investigando para eliminar la posible amenaza que este objeto supone para nuestra seguridad."
 shroud.6700.desc.contact: "La conquista de §H[current_planet.GetName]§! ha marcado nuestra victoria definitiva sobre el §H[exiled_country.GetName]§!. $shroud.6700.desc.common$"
 shroud.6700.desc.no_contact: "Con la conquista de §H[current_planet.GetName]§!, nos hemos hecho con el control del territorio que una vez estuvo dominado por un imperio conocido como el §H[exiled_country.GetName]§!. $shroud.6700.desc.common$"
 shroud.6700.desc.contact_no_name: "La conquista de §H[current_planet.GetName]§! ha marcado nuestra victoria definitiva sobre el ?. $shroud.6700.desc.common$"
 shroud.6700.desc.no_exiled: "Con la conquista de §H[current_planet.GetName]§!, nos hemos hecho con el control de un territorio antaño gobernado por fanáticos psiónicos. $shroud.6700.desc.common$"
 shroud.6700.a: "Unas noticias inquietantes... Seguid investigando."
 shroud.6705.name: "$psionic_threat_eliminated$"
 shroud.6705.desc.common: "Un estudio preliminar mostró evidencia de una extensa red de edificios en el planeta, probablemente el centro de poder del azote psiónico. Ahora solo quedan sus maltrechos vestigios.\n\nQuizá nunca podamos descubrir qué depravaciones secretas encerraban estas estructuras, ni la verdadera naturaleza de las prácticas cobardes de sus ocupantes. Sin embargo, el sistema ha quedado desprovisto de las últimas trazas de su $PSIONIC_AURA$, lo cual nos protege del daño que una vez causó."
 shroud.6705.desc.contact: "La erradicación de la población de §H[current_planet.GetName]§! marcó el fin del imperio conocido como el §H[exiled_country.GetName]§!.\n\n$shroud.6705.desc.common$"
 shroud.6705.desc.no_contact: "La erradicación de la población de §H[current_planet.GetName]§! marcó el fin de una devastadora amenaza psiónica.\n\n$shroud.6705.desc.common$"
 shroud.6705.a: "Que todas las amenazas sean destruidas."
 psionic_threat_eliminated: "Amenaza psiónica eliminada"
 psionic_threat_eliminated_desc: "La erradicación de un imperio psiónico ha desterrado su $PSIONIC_AURA$ de la galaxia y eso ha traído paz mental a nuestra población."
 SANCTUM_OF_THE_LOST: "Santuario del Soñador"
 SANCTUM_OF_THE_LOST_DESC: "En el interior del $SANCTUM_OF_THE_LOST$, en §H[sanctum_of_the_lost_planet.GetName]§!, hemos encontrado un \"capullo\" sellado herméticamente que emana unos niveles peligrosos de radiación psiónica. Debemos realizar una investigación en el lugar para eliminar cualquier amenaza que este objeto pueda representar."
 shroud.6710.name: "El poder interior"
 shroud.6710.desc: "Nuestros investigadores han analizado a fondo el \"capullo\" de §H[sanctum_of_the_lost_planet.GetName]§!.\n\nLos análisis del exterior de esta imponente estructura revelaron que se trata de un receptáculo de alta seguridad diseñado para contener a una poderosa entidad psiónica. A pesar de las capas aislantes de aleaciones pesadas del contenedor, se han filtrado altos niveles de radiación psiónica.\n\nSe ha instalado un grupo de atenuadores psiónicos alrededor del capullo; al activarse, todos los que estaban cerca sufrieron elevados niveles de angustia neuronal.\n\nLa superficie del capullo se retorció, y su forma ovoide se convirtió en una hélice móvil. La abertura se ha abierto, y recibimos comunicación directa desde su interior..."
 cannot_found_mindwarden_enclave: "Debe haber garantizado la seguridad psíquica del imperio"
 shroud.6800.name: "$MINDWARDENS_THE_FIRST_ENCLAVE$"
 shroud.6800.desc: "Hemos amasado un gran conocimiento sobre el §HVelo§! y hemos desarrollado tecnologías avanzadas para anular sus efectos perjudiciales. Mientras debatimos cómo aplicar este dominio en toda la galaxia, los comandantes de nuestras flotas han propuesto algo de lo más interesante.\n\nNos han sugerido convertir una de las flotas en un §H\"$gov_mindwarden_enclave$\"§! independiente para brindar apoyo antipsiónico en toda la galaxia. $shroud.shared_enclave_investement$"
 shroud.6800.a: "Una empresa digna."
 shroud.6800.a.tt: "Ahora, cualquier flota de §Y30§! de tamaño o más puede convertirse en un §H$gov_mindwarden_enclave$§!."
 shroud.6825.name: "Fundación del $gov_mindwarden_enclave$"
 shroud.6825.desc_first: "Se ha identificado a §H[This.GetName]§! como un candidato adecuado para conformar las bases de nuestro primer §H$gov_mindwarden_enclave$§! independiente. Si se aprueba, la flota construiría una nueva instalación en §H[This.Solar_System.GetName]§! para brindar servicios antipsiónicos de inmediato."
 shroud.6825.desc_default: "Estamos contemplando la posibilidad de convertir §H[This.GetName]§! en un §H\"$gov_mindwarden_enclave$\"§! capaz de ofrecer apoyo antipsiónico en toda la galaxia. $shroud.shared_enclave_investement$"
 shroud.6825.a: "Adelante con la construcción."
 shroud.6825.a.tt: "Se funda un §H$gov_mindwarden_enclave$§!."
 shroud.6825.b: "Reconsideremos nuestras opciones."
 shroud.6830.name: "Los $MINDWARDEN_plural$"
 shroud.6830.desc: "Luchar contra el §HVelo§! y el uso irresponsable de la psiónica ha fortalecido a nuestro pueblo y ha aclarado nuestros objetivos. La fundación del primer §H$gov_mindwarden_enclave$§! supone el advenimiento de una nueva era de sanación y resistencia.\n\nNinguna mente de la galaxia debería sufrir la invasión de los agresores psiónicos, y ningún mundo debería sufrir a manos de las fuerzas del Velo.\n\nEs la era de los $MINDWARDEN_plural$."
 shroud.6830.a: "Nuestro viaje acaba de comenzar."
 shroud.shared_enclave_investement: "Nuestra inversión inicial servirá para financiar la construcción de una estación espacial; a cambio, recibiremos parte de los ingresos que produzca. Su independencia operativa permitirá un despliegue a mayor escala de dichas instalaciones.\n\nComo es natural, nosotros también podemos utilizar sus servicios y cobrar una parte de nuestros pagos."
 shroud.6841.name: "El enclave de [mindwarden_enclave_country.GetName] paga dividendos"
 BEGINS_EVENT_CHAIN: "Empieza la cadena de eventos:"
 ENDS_EVENT_CHAIN: "Acaba la cadena de eventos:"
 the_exiled_become_hostile: "El §H[exiled_country.GetName]§! se vuelve hostil contra nosotros."
 start_psionic_war_chain: "$BEGINS_EVENT_CHAIN$ §Y$the_psionic_war_chain_title$§!"
 shroud_seal_dismantled: "El §HSello del Velo§! de §H[exiled_system_border.GetName]§! se ha desmantelado."
 the_psionic_war_chain_title: "$NAME_Psionic_War$"
 the_psionic_war_chain_desc: "La guerra contra §H[exiled_country.GetName]§! es inminente.\n\nHay que extirpar el azote psiónico de raíz. Primero, debemos construir un $SHROUD_SEAL$ en el sistema de §H[exiled_center_system.GetName]§! a fin de neutralizar el $PSIONIC_AURA$; solo entonces podremos proceder con la purga de esta amenaza para la galaxia."
 the_psionic_war_chain_poi_1: "Construir un $SHROUD_SEAL$"
 the_psionic_war_chain_poi_1_desc: "Construir un §H$SHROUD_SEAL$§! en §H[exiled_center_system.GetName]§! anulará las §H$PSIONIC_AURA_PLURAL$§! de este sistema estelar y otros conectados mediante hipervías."
 the_psionic_war_chain_poi_2: "Controlar §H[exiled_planet_1.GetName]§!"
 the_psionic_war_chain_poi_2_desc: "Los §H[exiled_country.GetName]§! no están dispuestos a interrumpir su asalto psiónico. Conquistar sus mundos es la única garantía contra el futuro resurgimiento de sus §H$PSIONIC_AURA_PLURAL$§!."
 the_psionic_war_chain_poi_3: "Controlar §H[exiled_planet_2.GetName]§!"
 the_psionic_war_chain_poi_3_desc: "Los §H[exiled_country.GetName]§! no están dispuestos a interrumpir su asalto psiónico. Conquistar sus mundos es la única garantía contra el futuro resurgimiento de sus §H$PSIONIC_AURA_PLURAL$§!."
 shroud_seal_reconstruction_chain_title: "Reconstrucción del Sello del Velo"
 shroud_seal_reconstruction_chain_desc: "Desmantelar nuestro §H$SHROUD_SEAL$§! fue un sacrificio necesario para aplacar a los §H[exiled_country.GetName]§!, si bien esta medida fue solo temporal. Hay que reconstruir la estructura antes de penetrar en su territorio y purgar las §H$PSIONIC_AURA_PLURAL$§!.\n\n§PLa reconstrucción será vista como una agresión. Debemos prepararnos para las represalias.§!"
 shroud_seal_reconstruction_chain_poi_1: "[event_target:exiled_system_border.GetName]"
 shroud_seal_reconstruction_chain_poi_1_desc: "$build_shroud_seal_poi_desc$"
 SHROUD_WORLDS_IN_SYSTEM: "Mundos velados: §G$QUANTITY|0$§!"
 NAME_Psionic_War: "La guerra psiónica"
 wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war_desc: "Se libra una guerra para purgar la galaxia de un agresor psiónico."
 shroud.6720.name: "$UNKNOWN_LONG$"
 shroud.6720.desc: "§HOís pero no escucháis. ¿Por qué?§!"
 shroud.6720.a: "¡No dejaremos que corrompas nuestras mentes!"
 shroud.6720.b: "¿Qué eres?"
 shroud.6720.c: "¿Por qué estás aquí?"
 shroud.6720.d: "¿Qué quieres?"
 shroud.6720.e: "¿Vienes del Velo?"
 shroud.6720.f: "Es suficiente."
 shroud.6723.desc: "§H¿Veneno? Veneno no...\n\nUna canción. Para cantar, tenéis que oír. Dejaos llevar y compartid su belleza.§!"
 shroud.6725.desc: "§HMientras la rueda gira..., nosotros escuchamos.\n\nMientras las estrellas giran..., nosotros cantamos.§!"
 shroud.6725.a: "¿Qué \"rueda\" es esa?"
 shroud.6725.b: "Ya está bien."
 shroud.6730.desc: "§HNo deja de girar, tanto por arriba como por abajo. Una armonía conocida como el \"Velo\".§!"
 shroud.6735.desc: "§HEstoy... soñando. Soñando con una canción. Pero las voces se han apagado. ¿A dónde ha ido el coro?§!"
 shroud.6735.a: "Los que te retenían aquí ya no están."
 shroud.6735.b: "¿Qué son esas \"canciones\"?"
 shroud.6735.c: "Ya está bien."
 shroud.6740.desc: "§HEstáis aquí. Podríais cantar...§!"
 shroud.6745.desc: "§HUna corriente entre el despertar y el sueño... Un camino entre lo que hay aquí y lo que hay allí.\n\nNo podéis escucharlos; vuestra mente carece de esa noción...§!"
 shroud.6750.desc: "§HQuiero escuchar cantar... Todo está demasiado silencioso... ¿Por qué?§!"
 shroud.6750.a: "¿Qué nos ofreces a cambio?"
 shroud.6750.b: "Ya está bien."
 shroud.6755.desc: "§HPuedo revelaros... mis sueños. La creación de mundos.§!"
 shroud.6755.a: "¿Cómo sabemos que eres de fiar?"
 shroud.6760.desc: "§HNo tenéis más que escuchar. La canción es verdad porque es hermosa. Una hermosa verdad.\n\nPero tenéis la mente cerrada, mas podéis abrirla.§!"
 shroud.6763.desc: "§HAún sigo aquí... Escucho canciones de dos mundos. Esta está silenciada.§!"
 shroud.6763.a: "Este no es tu lugar."
 shroud.6765.desc: "§HHabláis con la verdad.§!"
 shroud.6770.name: "$r_the_lost_patron$"
 shroud.6770.desc: "El capullo que descubrimos en §H[sanctum_of_the_lost_planet.GetName]§! alberga una poderosa entidad interdimensional. Es probable que este ser fuera el responsable del $PSIONIC_AURA$ que amenazó la santidad de nuestras mentes.\n\nNuestros atenuadores psiónicos mitigan el peligro que representa por ahora, pero no sabemos cuánto tiempo más podrán contener su influencia. Es posible que, en circunstancias controladas, podamos aprovechar su terrible poder para nuestros propios fines.\n\nSin embargo, muchos miembros de nuestra sociedad exigen su destrucción inmediata. Su mera existencia contradice nuestros valores ancestrales."
 shroud.6770.a: "Destruid a esta abominación."
 shroud.6770.b: "Encontrémosle un uso a esa... cosa."
 destroyers_of_the_lost_modifier: "Destructores de los Perdidos"
 destroyers_of_the_lost_modifier_tt: "Brinda acceso al nivel de vida §Y$living_standard_shroud_inoculation$§!, que provoca la eliminación de las habilidades §Ypsiónicas§!."
 destroyers_of_the_lost_modifier_desc: "Al derrotar a un enemigo psiónico y destruir la aparente causa de su $PSIONIC_AURA$, ha aumentado la moral del imperio después de tantos años de tormento."
 living_standard_shroud_inoculation: "Inyección del Velo"
 living_standard_shroud_inoculation_tooltip: "A esta especie se le inoculan defensas que la protegen de los efectos dañinos que conlleva la radiación psiónica.\n\n§RA fin de mitigar perjuicios, se eliminará todo rasgo psiónico.§!"
 living_standard_shroud_inoculation_tooltip_delayed: "§LGarantizaremos la integridad psiónica de la especie.§!"
 psionic_heresy: "Herejía psiónica"
 shroud.6780.name: "$r_the_lost_patron$"
 shroud.6780.desc: "Los pensamientos penetran nuestras mentes.\n\nEscuchamos una melodía, tan radiante como abrasadora.\n\nEste dolor nos resulta muy familiar.\n\n§HHabéis escuchado. El sueño es vuestro... Cantad, cantad...§!"
 shroud.6780.a: "¿Qué has hecho?"
 shroud.6785.desc: "§HLo que os prometí. He soñado por vosotros.§!"
 shroud.6785.a: "¿Y qué has \"soñado\"?"
 shroud.6790.desc: "§HMundos. Nuevos mundos, entre el mío y el vuestro.§!"
 shroud.6790.a: "¿Para qué queremos nosotros esos mundos?"
 shroud.6795.desc: "§HDejad que les cante. La canción más radiante de todas.§!"
 shroud.6795.a: "Esperemos no arrepentirnos."
 shroud.6795.a.tt: "Añade hasta tres §Hmundos velados§! dentro de nuestras fronteras con un máximo de uno por sistema."
 r_the_lost_patron: "El Soñador"
 r_the_lost_patron_desc: "Esta numinosa entidad es la forma física de un ser del Velo; el antiguo mecenas de un imperio ya extinto. Se desconoce cómo se pudo materializar en la realidad física, pero la conexión especial que mantiene con el reino psiónico le concede un poder insondable."
 the_lost_patron_passive_effect: "Alcance efectivo de los §H$SHROUD_SEAL_PLURAL$§!: §G+1§!\nLos §H$SHROUD_SEAL_PLURAL$§! producen £unity£ §Y$unity$§!: §G+25§!\nLos §H$SHROUD_SEAL_PLURAL$§! proporcionan £navy_size£ §Y$NAVY_SIZE_TITLE$§!: §G+10§!"
 the_lost_patron_before_activation_tt: "No sabemos qué puede ocurrir..."
 the_lost_patron_after_activation_effect_tt: "Desbloquea una £decision£ §Ydecisión planetaria§!: ['concept_dreamscaping_decision']"
 decision_dreamscaping: "Escena onírica"
 decision_dreamscaping_desc: "Terraforma un §Y$pc_shrouded$§! en un §Y$pc_gaia$§!"
 concept_dreamscaping_decision: "$decision_dreamscaping$"
 concept_dreamscaping_decision_desc: "$decision_dreamscaping_desc$"
 HAS_NOT_NUM_NEIGHBOR_SYSTEMS: "El n.º de sistemas vecinos $VAL0|2Y$ NO es $COMPARE$ $VAL1|2Y$"
 HAS_NEIGHBOR_SYSTEMS: "El n.º de sistemas vecinos $VAL0|2Y$ es $COMPARE$ $VAL1|2Y$"
 #======================
 # Endbringers origin
 #======================
 origin_endbringers: "Portadores del fin"
 origin_endbringers_desc: "$CHALLENGING_ORIGIN$§RAdvertencia: bloquea todos los caminos de ascensión, excepto ['concept_psionic_ascension'].§!\n\nEsta civilización lleva mucho tiempo obsesionada con una misteriosa calamidad que convirtió a un planeta vecino en un mundo desolado y velado. Ahora que avanzan hacia las estrellas, por fin podrán explorar sus secretos para descubrir si el destino que les aguarda es similar."
 origin_tooltip_endbringers_negative_effects: "- El imperio comienza con el modificador ['concept_paranoia_modifier']\n- No puedes formar ni unirte a una ['concept_federation']"
 concept_paranoia_modifier: "$endbringers_paranoia$"
 concept_paranoia_modifier_desc: "Tras ser testigos de una antigua catástrofe, las generaciones posteriores sienten cada vez más pavor ante los cataclismos.\n\nEl modificador de felicidad empeora con el tiempo: de §R-5%§! hasta §R-50%§!"
 endbringers_paranoia: "Paranoia"
 endbringers_paranoia_desc: "Tras ser testigos de una antigua catástrofe, las generaciones posteriores sienten un pavor generalizado ante los cataclismos. ¿Seremos los próximos en sufrir este destino?"
 endbringers_paranoia_tt: "$chamber_of_silence_negative_effects_reduction$"
 START_SCREEN_ENDBRINGERS: "Somos los heraldos del cataclismo.\n\nDurante los albores de la civilización [GetSpeciesAdj], una misteriosa calamidad azotó a nuestro vecino celestial más cercano. Su repentina y brutal transformación iluminó los cielos nocturnos con una malévola luz púrpura, y en nuestro pueblo despertó el temor de que un día sufriremos un destino similar. Con cada generación que se sucedía, el miedo a una posible aniquilación nos fue sofocando.\n\nAhora que los [GetSpeciesNamePlural] pueden viajar al espacio, sentimos curiosidad por explorar este \"$pc_shrouded$\". Las respuestas que llevamos anhelando durante siglos están a un alcance tentador. No obstante, muchos entre nosotros advierten que nuestra obsesiva fascinación por la fuente de este poder destructivo podría conducirnos a nuestro propio fin.\n\nMuy pronto levantaremos el velo final."
 shroud.8010.title: "Misión a [shrouded_planet.GetName]"
 shroud.8010.desc: "Los satélites de exploración que orbitan alrededor de §H[shrouded_planet.GetName]§! han identificado un objetivo prometedor para nuestra primera misión tripulada a la superficie de este $pc_shrouded$. La zona de aterrizaje emana una extraña radiación que se propaga a través del planeta, impulsada con vientos ultravioletas.\n\nHay muchos [Root.GetSpeciesNamePlural] quejándose de nuestra misión por miedo a que inflijamos la misma maldición a nuestro mundo natal. Su temores tienen justificación; sin embargo, la necesidad primordial de entender este fenómeno distante debe prevalecer.\n\nSi estamos destinados a sufrir esa misma calamidad algún día, al menos moriremos conociendo el motivo."
 shroud.8010.a: "La búsqueda de respuestas comienza ahora."
 the_shrouded_world_site: "El $pc_shrouded$"
 the_shrouded_world_site_desc: "Por fin somos capaces de extender la mano y tocar el $pc_shrouded$, conocido como §H[planet.GetName]§!. Algo de este lugar nos llama con una voz más fuerte que nunca.\n\nLos secretos del cataclismo que azotó este mundo revelarán gran parte de la historia de nuestro propio sistema y, con suerte, aliviarán la obsesión de nuestra sociedad con su propia destrucción predicha. Los escáneres orbitales indican unos patrones circulares de energía intensa aislada en un punto del hemisferio sur; un ojo ominoso que nos devuelve la mirada."
 shroud.8100.name: "El final está cerca"
 shroud.8100.desc: "El terreno de §H[shrouded_planet.GetName]§! es tan traicionero como habíamos imaginado. Vórtices de partículas crepusculares surcan el aire y ralentizan el progreso inicial de §H[Leader.GetName]§! y de su tripulación.\n\nLo más alarmante es que nuestro equipo de investigación ha informado de inconsistencias sensoriales: describen aullidos lejanos arrastrados por el viento y figuras sombrías que acechan en la niebla. ¿Ha sido un error venir hasta aquí?\n\nLa primera transmisión pública del aterrizaje ha desatado el pánico generalizado en §H[Owner.GetHomeWorldName]§!. Muchos tienen miedo de que estemos cortejando a los poderes misteriosos y destructivos que una vez visitaron [shrouded_planet.GetName]. Por nuestro mundo natal se suceden las protestas organizadas que proclaman que el fin está cerca, paralizando gran parte de nuestra infraestructura.\n\nLos escáneres telemétricos han revelado una cavidad que emite niveles de radiación particularmente altos en las profundidades de una cordillera cercana. Estamos decididos a seguir adelante, cueste lo que cueste."
 shroud.8100.a: "Romped la superficie. Debemos descubrir qué nos aguarda."
 the_end_is_nigh: "El final está cerca"
 the_end_is_nigh_desc: "Un sensación de fatalidad inminente se cierne sobre nuestra sociedad."
 shroud.8105.name: "Estructura alienígena"
 shroud.8105.desc: "No somos los primeros.\n\nAl perforarse la cavidad montañosa de §H[shrouded_planet.GetName]§!, se ha revelado una estructura alienígena abandonada que se perdió tras el cataclismo. Creemos que es mejor que esta información permanezca clasificada para evitar que cunda el pánico.\n\nLos análisis preliminares confirman que los materiales usados en la construcción de las instalaciones no encajan con la composición molecular de los minerales disponibles en el planeta, lo cual sugiere que una civilización espacial construyó esta instalación utilizando materiales exóticos. El propósito de este lugar sigue sin estar del todo claro, pero parece que su funcionamiento estaba automatizado en su mayoría.\n\nMientras tanto, los síntomas psicológicos del equipo han empeorado. Algunos afirman que oyen voces susurrando a través de frecuencias encriptadas, mientras que otros describen una percepción distorsionada de su entorno físico inmediato. Los ataques de risa ocasionales se están convirtiendo en algo incómodo que sucede de manera habitual.\n\nHemos ido demasiado lejos como para volver atrás ahora."
 shroud.8110.name: "Los vigilantes"
 shroud.8110.desc: "Están todos muertos.\n\nEn los asientos de las estaciones que están en el corazón de esta instalación se encuentran los cadáveres disecados de una raza alienígena desconocida, con sus pálidos ojos apuntando hacia el techo. A pesar de su terrorífica apariencia, §H[Leader.GetName]§! cree que estas figuras no son producto de las alucinaciones. Las imágenes de estas formas de vida se han clasificado como estrictamente confidenciales.\n\nNo hay armas de ningún tipo, lo cual sugiere que su presencia en §H[shrouded_planet.GetName]§! no era hostil. Esta instalación sería probablemente un puesto de observación con un equipo de monitorización sofisticado apuntando directamente a §H[Owner.GetHomeWorldName]§!. La datación por radiocarbono sitúa su actividad antes del cataclismo.\n\nHemos descifrado muchos de sus registros; aparte de los registros de comunicación rutinarios, se refieren en gran medida a la historia temprana de nuestra civilización."
 shroud.8110.a: "¿Nos estaban vigilando?"
 shroud.8115.name: "Poderes que superan el entendimiento"
 shroud.8115.desc: "Se ha descifrado la base de datos de §H[shrouded_planet.GetName]§!, lo cual ha demostrado que muchas de las leyendas que habíamos puesto en duda son, en realidad, ciertas. Fuimos los sujetos de prueba de un experimento conocido como \"$tech_psionic_theory$\" en la ciencia mental.\n\nNuestra especie estaba resuelta a tener este potencial latente. Muchos de nuestros antepasados habrían percibido estas comunicaciones en sueños o como voces distantes, fenómenos que de otro modo podrían indicar enfermedad mental o paranoia. Sin embargo, su experimento se vio truncado: en los últimos días, este lugar dejó de ser un puesto de observación y se convirtió en un refugio de supervivencia.\n\nLos informes acerca de nuestra sociedad cesaron tras un desastroso experimento llevado a cabo en su mundo capital, el cual implicaba la manipulación temeraria de una barrera situada entre realidades y a la que se conoce como §Hel Velo§!. Sus científicos llamaban a este incidente el \"Juicio\", y sospechamos que fue la verdadera causa del cataclismo.\n\nCualquiera que haya sido este incidente, su influencia no tardó en extenderse a §H[shrouded_planet.GetName]§!. Sus últimos momentos se registran en una única entrada en el diario de situación:\n\n§LEl fin ha llegado.§!"
 shroud.8115.a: "¿Vendrá a por nosotros?"
 shroud.8120.name: "$fragment_of_reckoning$"
 shroud.8120.desc: "Hemos hallado la prueba definitiva del origen del cataclismo. No ha sido difícil encontrarla; §H[Leader.GetName]§! asegura que sintió su llamada.\n\nEn las profundidades de la instalación, y desafiando a los análisis convencionales, se identificó una masa latente intangible. No es ni materia ni energía, así que §H[Leader.GetName]§! la ha descrito como el resentimiento persistente de las voluntades consumidas, y se refiere a ella como §H\"$fragment_of_reckoning$\"§!.\n\nEn un esfuerzo desacertado por contener y canalizar las energías etéreas del §HVelo§!, se quiso usar este objeto como defensa contra el Juicio. Sin embargo solo tuvo éxito hasta cierto punto. En los últimos momentos de este mundo, la malévola entidad fue desterrada a la fuerza de esta dimensión, llevándose consigo a las mentes reticentes de los científicos. Este fragmento es lo único que queda.\n\nEl objeto amplifica las visiones y las alucinaciones de nuestros investigadores, lo cual les concede una segunda visión que supera esta realidad limitada. Es una propuesta peligrosa a la par que prometedora."
 shroud.8120.a: "Aún nos queda mucho por aprender..."
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY: "$tech_psionic_theory$"
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC: "El fragmento de energía psiónica que descubrimos en §H[shrouded_planet.GetName]§! guarda secretos que tenemos que descubrir.\n\nLo que nos frena son los límites impuestos por nuestras mentes."
 ENDBRINGERS_PSIONIC_THEORY_PROJECT_TOOLTIP: "Para completarlo: investiga §H£society_research£ $tech_psionic_theory$§!."
 ENDBRINGERS_ADOPT_PSIONICS_TRADITION: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY$"
 ENDBRINGERS_ADOPT_PSIONICS_TRADITION_DESC: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC$"
 ENDBRINGERS_PSIONICS_TRADITION_PROJECT_TOOLTIP: "Para completarlo: adopta la tradición §H$tradition_psionics_shroud$§!."
 shroud.8200.title: "Un reino de locura"
 shroud.8200.desc: "Las investigaciones en el campo de la psiónica recién descubierto confirmaron la existencia de dimensiones de la realidad hasta ahora desconocidas y a las cuales nuestras mentes son la puerta de entrada. Más allá de este velo se encuentra un reino de caos que nos cuesta entender.\n\nDesde las profundidades nos llama una §Rvoz§!. Su promesa no es una de salvación, sino de un nuevo comienzo. Usar su poder desconocido implicaría abandonar todo lo que fuimos y forjar un destino bordado en el tejido de la propia locura.\n\n§R\"Es la hora\".§!"
 shroud.8200.a: "¿Qué hemos hecho?"
 shroud.8200.a.tt: "Desbloquea el árbol de tradición §H$tradition_psionics_shroud$§!."
 chamber_of_silence_negative_effects_reduction: "Cada ['building:building_chamber_of_silence'] reduce los efectos negativos en un §G$@chamber_of_silence_effect_mult|0%$§!"
 endbringers_madness_1: "Locura"
 endbringers_madness_1_desc: "Nuestro imperio se rige por un único objetivo y propósito: la búsqueda de la §Rvoz§!. Nuestras mentes no descansarán hasta que hallemos una solución."
 endbringers_madness_1_tt: "$chamber_of_silence_negative_effects_reduction$"
 endbringers_madness_2: "$endbringers_madness_1$"
 endbringers_madness_2_desc: "Nuestro imperio se acerca a la §Rvoz§!. Nuestros impulsos se ven atenuados en su intensidad."
