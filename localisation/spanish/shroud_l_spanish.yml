 trait_robot_latent_psionic_desc: "§LEsta especie posee procesadores psiónicos latentes cuyas unidades permanecen dormidas en su mayoría. Aunque son bastante raros, estos poderes pueden activarse en algunos líderes.§!\n"
 trait_robot_psionic: "$trait_psionic$"
 trait_robot_psionic_desc: "§LTodas las unidades de esta especie poseen un potente hardware psiónico. Pueden manipular tanto el reino físico como el inmaterial únicamente mediante procesamiento cognitivo.§!\n"
