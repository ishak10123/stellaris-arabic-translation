 PATRON_REVENGE_PROJECT_DESC: "ha desatado su ira contra nosotros. Un $SHROUD_TUNNEL_GALACTIC$ ha aparecido en el sistema [event_target:selected_planet_for_revenge.solar_system.GetName], y nuestros [GetTelepathPlural] pueden [GetFeelLoc] cómo la malignidad de nuestro antiguo mecenas se acerca con celeridad.\n\nDebemos preparar nuestras defensas."
