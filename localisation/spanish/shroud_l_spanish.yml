 shroud.3000.title: "Impresiones fugaces"
 shroud.3000.desc: "En un remolino de oscuridad, sombras distantes adoptan formas fugaces antes de desaparecer en la nada. Una oscura cacofonía de voces maldice de manera ininteligible... Las luces parpadean y se desvanecen. Los puntos de calor aumentan y disminuyen.\n\nHay movimiento. Algo gira. ¿Somos nosotros los que nos movemos, o es el Velo?\n\nUna presencia se aproxima, aunque lo hace desde todas direcciones a la vez y, a continuación, una voz resuena.\n\n§H¿QUÉ ES LO QUE VEIS?§!"
 shroud.3000.a: "Vemos un mundo en llamas"
 shroud.3000.a.reply: "La presión cambia, y la voz regresa...\n\n§HCORRECTO.§!\n\nLa oscuridad oscila para después girar. Por un instante, algo nos oprime con fuerza y, a renglón seguido, volvemos a estar solos."
 shroud.3000.b: "Vemos una celebración."
 shroud.3000.b.reply: "Una sensación pesada nos estremece. La oscuridad nos aplasta lentamente, con una fuerza cada vez mayor...\n\n§H¡NO!§!\n\nLa nada oscila para después girar y, a renglón seguido, volvemos a estar solos..."
 shroud.3000.c: "No estamos seguros."
 shroud.3000.c.reply: "§H¡DÉBILES!§!\n\nLa nada oscila para después girar y, a renglón seguido, volvemos a estar solos..."
 shroud.3005.title: "Hambre lasciva"
 shroud.3005.desc: "El fétido hedor a vísceras inunda nuestros sentidos.\n\nEn lo más profundo del Velo, las imágenes se retuercen y gruñen con una furia voraz. Los salvajes alaridos de bestias desnutridas son los primeros en resonar... Sentimos su hambre. A continuación, sus fauces salivantes son las nuestras.\n\nUnas siluetas aparecen ante nosotros. Es un ganado en pánico. Son presas, y están casi al alcance de la mano... El dolor se vuelve punzante hasta lo insoportable.\n\nNuestros sentidos se retuercen y se tensan cada vez más conforme el hambre nubla nuestro juicio. ¿Los gritos son de nuestra presa... o de nuestro interior?\n\nLos grilletes que nos atan se tensan. Se fracturan mientras una voz se enrosca a través del tormento y chilla:\n\n§H¡ROMPED VUESTROS VÍNCULOS! ¡DAOS UN HOMENAJE!§!"
 shroud.3005.a: "Rompamos las cadenas y devoremos a las presas."
 shroud.3005.a.boons.tt: "Consigue un $shroud_boon$ centrado en el combate al azar."
 shroud.3005.a.reply: "Nuestras ataduras se rompen.\n\nVoraces. Libres.\n\n¡Cuánto terror!\n\n§HALIMENTAOS.§!"
 shroud.3005.b: "Resistid el hambre. Aplacad la mente."
 shroud.3005.b.reply: "Las cadenas nos aprietan. La voz hierve de rabia mientras filtramos su influencia, aplacando nuestra mente mientras recuperamos el control.\n\n§H¡DÉBILES! ¡INEPTOS!§!\n\nEl hambre se desvanece hasta quedar un poso de resentimiento que se disipa en el Velo."
 shroud.3010.title: "Banquete sacrificial"
 shroud.3010.desc: "En el abismo, una voz... resuena áspera y llena de maldad... Nos llama.\n\n§HALIMENTAOS. CONSUMID. DEVORAD.§!\n\nLas visiones surgen de forma inesperada. Unos mundos silenciados y reducidos a cenizas, los lamentos de nuestros [Root.GetCitizenPlural] mientras sus formas físicas son consumidas por energía psiónica, saciando las voces... y nuestra propia... hambre.\n\nA medida que estas visiones se muestran, sentimos otra presencia que nos conmina a ser moderados y solidarios con nuestros [Root.GetCitizenPlural] para ser más fuertes. Dicha presencia se ahoga entre los gritos de la voz."
 shroud.3010.desc.organic: "§H¡ENTREGADME SU CARNE!§!"
 shroud.3010.desc.other: "§H¡ENTREGADME SUS CUERPOS!§!"
 shroud.3010.a: "A consumir."
 shroud.3010.a.reply: "Los gritos de los devorados resonaron por todo el Velo y el imperio, hasta que se acallaron repentinamente.\n\nCon este sacrificio, nuestro poder crece y el hambre mengua."
 shroud.3010.b: "Uníos."
 shroud.3010.b.reply: "Además de acallar la voz, hemos alcanzado la unidad en todo el Velo, que ha aceptado a nuestro imperio. Un suspiro colectivo de alivio y consuelo sofoca los gritos de rabia a medida que el hambre empeora."
 shroud.3015.title: "Visiones transitorias"
 shroud.3015.desc: "Una potentes corrientes de energía psiónica se entrechocan en la oscuridad. Las sombras se precipitan y caen a nuestro alrededor... Delante, una luz resplandeciente brilla.\n\nAl poco, una escena se hace visible por un breve instante. Sus formas se desvanecen antes de que podamos comprenderlas.\n\nUna extraña presencia se instala a nuestro alrededor.\n\n§H¿QUÉ HABÉIS VISTO?§!"
 shroud.3015.a: "Un bosque rebosante de numerosas formas de vida."
 shroud.3015.a.reply: "El silencio se acrecienta y la voz regresa...\n\n§HEXCELENTE.§!\n\nUn poderoso calor emana de nosotros y, luego, remite. La presencia ya no está."
 shroud.3015.b: "Hemos visto un páramo, despojado de todo lo que tenía que ofrecer."
 shroud.3015.b.reply: "La voz regresa...\n\n§H¡JAMÁS!§!\n\nUn frío extremo nos penetra por dentro y, luego, remite. La presencia ya no está."
 shroud.3015.c: "No estamos seguros."
 shroud.3015.c.reply: "La voz regresa...\n\n§HQUÉ POCO INTERÉS.§!\n\nUna sensación de vacío extremo nos sobrecoge y, luego, remite. La presencia ya no está."
 shroud.3020.title: "Conservación tentadora"
 shroud.3020.desc: "De entre las muchas capas del Velo, una visión se revela ante nosotros.\n\nLa niebla forma el contorno de una criatura que brega, atrapada en unos zarcillos brumosos que la asfixian al apretarse más a su alrededor.\n\nEl animal no se parece a nada que hayamos visto antes.\n\nUna voz se abre paso dentro de nosotros.\n\n§H¡LOS HILOS DEL DESTINO OS LLAMAN! ¿DE CUÁL TIRARÉIS?§!"
 shroud.3020.a: "Liberad a la criatura."
 shroud.3020.a.reply: "La voz resuena en nuestra [GetMindLoc] mientras la criatura desaparece de nuestra vista.\n\n§HPROSPERIDAD.§!\n\nOtro destello fugaz aparece: la vida resurge en alguna parte de nuestro imperio."
 shroud.3020.b: "Capturadla."
 shroud.3020.b.reply: "La voz se atenúa en nuestros pensamientos, dejando solo un grito que resuena en visiones de un paisaje árido.\n\n§HPESTILENCIA.§!"
 shroud.3020.c: "Matadla."
 shroud.3020.c.swarm: "Consumámosla."
 shroud.3020.c.reply: "La voz se aleja de nuestros pensamientos, y una necesidad apremiante ocupa su lugar. La sed de sangre nubla nuestra [GetMindLoc] mientras una brutal risotada resuena en el vacío.\n\n§H¡OBVIAMENTE, ES UNA PRESA FÁCIL!§!"
 shroud.3025.title: "Paisajes cambiantes"
 shroud.3025.desc: "Las brumas del Velo se despliegan y revelan visiones que se agitan sin cesar.\n\nPaisajes oscuros se retuercen de manera incomprensible ante nosotros. Montañas que se alzan y caen. Océanos hirvientes de caos que se evaporan, dejando tras de sí los huesos blanqueados de la vida acuática en desiertos infinitos.\n\nBajo las copas de los árboles, criaturas dóciles serpentean por su hábitat antes de convulsionar y mutar en monstruos sedientos de sangre. Al desgarrarse entre ellos, inician un ciclo interminable de muerte y renacimiento.\n\nA través del caos, una voz penetra en nuestra [GetMindLoc].\n\n§HEL CAOS. SE ENTRELAZA UNA Y OTRA VEZ.§!"
 shroud.3025.a: "Dobleguemos la naturaleza."
 shroud.3025.a.reply: "Intentamos alcanzar el desorden que tenemos delante.\n\nAmarramos los principales puntos de referencia y obligamos a los continentes a quedarse en el sitio.\n\nMientras las piezas encajan, la voz resuena.\n\n§HPLANITUD, BLANDURA, VACÍO...§!"
 shroud.3025.b: "Que el caos de la naturaleza florezca."
 shroud.3025.b.reply: "Vemos cómo las visiones se desenvuelven. El ciclo interminable se difumina antes de estallar y cesar con la misma rapidez con la que comenzó.\n\nLas energías surgen en la inmensidad para después reformarse y adoptar nuevas formas.\n\nLa voz resuena.\n\n§HCONFLICTO PACÍFICO. UNIDAD DESORDENADA.§!"
 shroud.3025.b.reply.tt: "Este planeta obtiene un §Gmodificador positivo§! y §Rotro negativo§! al azar."
 shroud.3030.title: "Prisma en la oscuridad"
 shroud.3030.desc: "El movimiento inquieto del Velo revela una vasta extensión de arena negra. Podemos escuchar cómo las olas se rompen, aunque no podemos verlas.\n\nDelante —o quizás detrás—, aparece un prisma. Un único rayo de luz se refracta brevemente en él para formar una imagen borrosa.\n\nVislumbramos un sinfín de figuras sombrías y formas cambiantes que, al poco, son absorbidas por la oscuridad.\n\nUna presencia se asienta sobre la arena cercana.\n\n§HHABÉIS PRESENCIADO LO QUE SE HA REVELADO, ¿VERDAD?§!"
 shroud.3030.a: "Hemos visto una conferencia con muchas voces."
 shroud.3030.a.reply: "Las arenas se agitan con lentitud, y la voz regresa.\n\n§HBIEN. LA ARMONÍA ES LA SENDA DEL UNIVERSO.§!\n\nSentimos cómo algo pesado se eleva. Volvemos a estar a solas."
 shroud.3030.b: "Hemos visto una encarnizada batalla."
 shroud.3030.b.reply: "Las arenas se arremolinan con la velocidad de una tormenta.\n\n§HNO. ¡QUE LAS ARMAS SE OXIDEN Y PASEN AL OLVIDO!§!\n\nLa tormenta de arena amaina. La voz ya no está."
 shroud.3030.c: "No estamos seguros."
 shroud.3030.c.reply: "Las arenas se agitan con lentitud.\n\n§HLAS DUDAS LLEVAN AL FRACASO...§!\n\nVolvemos a estar a solas."
 shroud.3035.title: "Pelea en las sombras"
 shroud.3035.desc: "Las energías caóticas del Velo se retuercen y se agitan.\n\nLos zarcillos oscuros se agitan y se retuercen, y la neblina gira violentamente sobre sí misma. En medio de esta tormenta de furia psiónica, dos entidades sin forma chocan entre sí. Son implacables, inflexibles y están embargadas por la ira.\n\nUna presencia extraña se impone en nuestra [GetMindPhysicalLoc], invasiva y vasta.\n\n§HLOS QUE ENTREN DEBEN VENIR CON DETERMINACIÓN.§!"
 shroud.3035.a: "El diálogo promueve la comprensión."
 shroud.3035.a.reply: "La neblina se desvanece y se disuelve ante el remolino de energía psiónica que hay de fondo. La consciencia regresa.\n\n§HLA ARMONÍA ES SABIDURÍA.§!\n\nEl Velo se ha aplacado."
 shroud.3035.b: "Comprometerse es una debilidad."
 shroud.3035.b.reply: "Con cada golpe que asesta la bruma, las energías hirvientes que nos rodean se intensifican.\n\n§HLA VIOLENCIA ES LA RECOMPENSA DE LOS SERES NO RACIONALES.§!\n\nLas energías retorcidas del Velo vuelven a convulsionar."
 shroud.3040.title: "Visiones imperceptibles"
 shroud.3040.desc: "Un charco de líquido negro se extiende ante nosotros.\n\nDe repente, una imagen borrosa parpadea en la superficie. Atisbamos un pico resplandeciente, cuyas crestas están salpicadas de un oro reluciente para después desaparecer abruptamente.\n\nUna voz resuena en lo más profundo de nuestra [GetMindLoc].\n\n§H¿HABÉIS VISTO LO QUE NO SE PUEDE VER?§!"
 shroud.3040.a: "Hemos visto una cantera, lista para su extracción."
 shroud.3040.a.reply: "Una serie de ondas irradian simultáneamente por la superficie. Una vez más, sentimos la voz.\n\n§HEL CRECIMIENTO SIN LÍMITES SOSTIENE UN EQUILIBRIO SIN MESURA.§!\n\nMientras el líquido se aquieta, sentimos cómo la voz se desvanece."
 shroud.3040.b: "Hemos visto la perfección de la naturaleza, que ha de preservarse."
 shroud.3040.b.reply: "El líquido se agita. Las olas se expanden y rompen. Un remolino gira en la oscuridad. La voz regresa y cobra más fuerza.\n\n§H¡ES INACETAPBLE! SE GANA CRECIENDO. ¡SE GANA CRECIENDO!§!\n\nLa superficie vuelve a aquietarse. La voz ya no está."
 shroud.3040.c: "No estamos seguros."
 shroud.3040.c.reply: "El líquido se agita. La voz nos llega de nuevo.\n\n§HVUESTRA CONVICCIÓN TITUBEA... VUESTRA VOLUNTAD DENOTA DEBILIDAD.§!\n\nA medida que la superficie se asienta, sentimos que la voz se aleja."
 shroud.3045.title: "Núcleo luminoso"
 shroud.3045.desc: "La neblina se reorganiza ante nosotros. Energías incandescentes laten con un vigor repentino. Vemos el contorno de una extraña forma arbórea.\n\nSu inmenso dosel resplandece a medida que nos acercamos y se modula con una ráfaga de morados, rosas y negros.\n\nDentro de su base se esconde un núcleo luminoso que irradia en sincronía con los colores cambiantes del dosel.\n\nUna voz se asienta en nuestra [GetMindLoc].\n\n§HACERCAOS Y APROVECHAD.§!"
 shroud.3045.a: "Extraedlo."
 shroud.3045.a.reply: "Al extraer el núcleo, el dosel se vuelve opaco y se marchita al instante. La voz regresa.\n\n§H¡SÍ! LA PODREDUMBRE ENGENDRA MÁS PODREDUMBRE.§!"
 shroud.3045.b: "Dejémoslo intacto."
 shroud.3045.b.reply: "Un temblor nos sacude. ¿Quién tiembla, el mundo o nosotros?\n\n§HLA PROSPERIDAD TIENE SENTIDO. ¡IGNORARLA ES UNA NECEDAD!§!"
 shroud.3050.title: "Cacofonías díscolas"
 shroud.3050.desc.intro: "Unas potentes corrientes psiónicas se chocan y agitan en mitad de la infinita turbulencia del Velo. El rugido de una cacofonía se intensifica, reclamando nuestra atención."
 shroud.3050.desc.outro: "El ruido es abrumador."
 shroud.3050.desc.eater: "Gritos de dolor, la atronadora orquesta de una batalla, el estruendo de unas llamas voraces... Sentimos el dolor. ¿A quién pertenecerá?"
 shroud.3050.desc.composer: "Gritos y clamores bestiales, salvajes, primarios... Los ríos brotan y los vientos gimen... Toda la naturaleza ladra y aúlla con premura, simultáneamente..."
 shroud.3050.desc.cradle: "Las voces murmuran, balbucean, exclaman, declaran... Miríadas de entonaciones, sílabas, sonidos... Multitud de lenguas, parloteando a la vez."
 shroud.3050.desc.instrument: "Los taladros perforan, las máquinas pulverizan... La materia se transforma ruidosa y poderosamente... Todas las fábricas del universo explotan y se incendian al mismo tiempo."
 shroud.3050.a: "Ciñámonos a ello."
 shroud.3050.a.reply: "El crescendo va a más. En un instante, nos vemos empujados hacia una dirección que no llegamos a comprender...\n\nTodo para regresar al silencio."
 shroud.3050.b: "Demos la vuelta."
 shroud.3050.b.reply: "Es insoportable. Nuestra [GetMindLoc] huye de ello y regresa a la tranquilidad del silencio."
 shroud.3055.title: "Visiones proféticas"
 shroud.3055.desc.intro: "Una densa penumbra nos envuelve. La presión nos aprieta cada vez más desde todos los ángulos, hasta que una visión borrosa hace su aparición."
 shroud.3055.desc.outro: "En medio de la oscuridad, algo llama nuestra atención. Algo inconfundible y trascendental: la bandera de [Root.GetName].\n\n¿Somos nosotros?"
 shroud.3055.desc.eater: "Vemos un mundo devastado, las secuelas de una batalla... Los vencedores saquean los cadáveres y los escombros."
 shroud.3055.desc.composer: "Vemos múltiples mundos... desfilando por el tiempo y el espacio a una velocidad imposible... Todos ellos, unidos bajo un mismo imperio."
 shroud.3055.desc.cradle: "Vemos una gran asamblea... Muchas siluetas opacas... Escuchando, hablando..."
 shroud.3055.desc.instrument.default: "Vemos un mundo optimizado... Interminables hileras de fábricas y minas... Ni un ápice de la superficie ha quedado intacto."
 shroud.3055.desc.instrument.relentless_industrialist: "Vemos un mundo optimizado... Interminables hileras de fábricas y minas... La perfección misma. Ni un ápice de la superficie ha quedado intacto."
 shroud.3055.a: "Aferraos a la visión."
 shroud.3055.a.reply: "La imagen se vuelve algo más nítida. Confiamos en nuestra percepción."
 shroud.3055.b.organic: "Disipadla de nuestra mente."
 shroud.3055.b.machine: "Borradla de nuestros circuitos."
 shroud.3055.b.reply: "Los borrosos contornos de la visión vuelven a la nada."
 shroud.3060.title: "En mitad del vacío"
 shroud.3060.desc.intro: "Las brumas etéreas del Velo se agitan y retuercen, arrastrando nuestra consciencia hacia lo más profundo, mientras nuestras formas físicas permanecen inertes, incólumes.\n\nNuestra [GetPsycheLoc] se estira, se tensa, atrapada en una marea que se repite. Cada movimiento que intentamos se derrumba por sí solo y la tensión aprieta como si fuese un torno de banco."
 shroud.3060.desc.intro.organic: "Vemos más allá de nosotros mismos. Nuestros cuerpos, sellados en el interior de un teseracto en cascada que trasciende nuestra comprensión física."
 shroud.3060.desc.intro.machine: "Las subrutinas lógicas se activan, identificando el error: se trata de un bucle recursivo. Nuestros procesadores psiónicos no bastan para romper el ciclo y reanudar su funcionamiento estándar."
 shroud.3060.desc.intro.end: "A medida que la tensión se hace insoportable, nuestras formas amenazan con disolverse en el vacío. Una voz se abre paso a través de nuestro aprisionamiento."
 shroud.3060.desc.outro: "Las palabras resuenan en nuestro interior. Su ímpetu aumenta y percibimos una forma de sofocar la perturbación que amenaza con separarnos, si tan solo nos sometemos."
 shroud.3060.desc.eater: "§H¡DEVORAD! ¡CONSUMID EL VACÍO INFINITO!§!"
 shroud.3060.desc.composer: "§H¡SUPERAD LOS LÍMITES DE LA REPETICIÓN ETERNA!§!"
 shroud.3060.desc.cradle: "§H¡ACEPTAD LA ETERNIDAD! ¡TODO ES UNO, TODO ES UN TODO!§!"
 shroud.3060.desc.instrument: "§H¡DISFRUTAD DE UN POTENCIAL ILIMITADO!§!"
 shroud.3060.a: "Someteos."
 shroud.3060.a.reply: "La voz se intensifica, guiando nuestras acciones, empujando nuestros pensamientos más allá de nuestra limitada comprensión. El ciclo continúa cerrándose, arrastrándonos más lejos, antes de estrellarse contra nuestra psique.\n\nHemos roto el bucle, guiados por nuestra súplica a los poderes superiores del Velo.\n\nSin embargo, no todos seguimos aquí. §H[event_target:shroud_warped_leader.GetName]§! ya no está en su estación. La voz vuelve a oírse."
 shroud.3060.a.reply.default: "SERÁN REHECHOS."
 shroud.3060.a.reply.eater: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.composer: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.cradle: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.instrument: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.b: "Resistíos."
 shroud.3060.b.reply: "Rechazamos las compulsiones que se nos imponen.\n\nEl bucle se acelera, arrastrándonos hacia abajo con la fuerza de su marea recursiva. Una vez que dejamos de luchar, la tensión ya no amenaza con rompernos. En cambio, nos envuelve, permitiéndonos ver fugazmente más allá de nosotros mismos.\n\nLa voz vuelve a oírse."
 shroud.3060.b.reply.default: "QUÉ INTERESANTE."
 shroud.3060.b.reply.eater: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.composer: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.cradle: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.instrument: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.leader_return.title: "Deformación del Velo"
 shroud.3060.leader_return.desc: "El Velo tiembla, y unas ligeras distorsiones se propagan por nuestra [GetMindPhysicalLoc] a medida que emerge una presencia familiar. Se agita en el límite de nuestra [GetMindPerceptionLoc], susurrando ecos más allá de nuestros límites auditivos.\n\n§H[from.GetName]§! regresa a nosotros, atravesando las nieblas inefables mientras estas adoptan su forma familiar. Distante pero completo, rehecho por el Velo, arde en deseos de volver al deber."
 shroud.3060.leader_return_tt: "§H[from.GetName]§! ha adquirido un nuevo rasgo: §G$leader_trait_shroud_warped$§!"
 leader_trait_shroud_warped: "Deformación del Velo"
 leader_trait_shroud_warped_desc: "Absorbida y reconstruida por el Velo, la sabiduría etérea otorgada a este líder le concede el poder de observar lo inobservable y amplificar el potencial psiónico de quienes le rodean."
 leader_trait_shroud_warped_invasion_effect: "Información sobre imperio enemigo por victoria en invasión: §G+$@shroud_warped_intel|0$§!"
 shroud.3065.title: "Ofrenda en forma de cáliz"
 shroud.3065.desc.intro: "La neblina del Velo se estremece y se abre para revelar un cáliz rebosante de un líquido brillante, con la superficie lisa e intacta.\n\nNos invade una compulsión. Nos inclinamos hacia delante sin pensar. El líquido expectante tiembla cuando empezamos a [GetDrinkLoc].\n\nLa claridad lo inunda todo. Cuanto más [GetImbibeLoc], más se revela la mentira. El fluido se espesa y cada gota comienza a cuajar en nuestro interior.\n\nNos invade una necesidad imperiosa de purgar nuestros sistemas de toda contaminación."
 shroud.3065.desc.eater: "§H¡TRAGAD! ¡AHOGAD VUESTRA DEBILIDAD!§!"
 shroud.3065.desc.composer: "§H¡ALIMENTAOS! ¡INHALAD NUEVOS CRECIMIENTOS!§!"
 shroud.3065.desc.cradle: "§H¡FORTALECEOS! ¡ABRAZAD LA DOLOROSA UNIFICACIÓN!§!"
 shroud.3065.desc.instrument: "§H¡BEBED! ¡GOZAD DE VUESTRAS ADICCIONES!§!"
 shroud.3065.desc.outro: "La voz se arremolina, mezclándose con el líquido, coagulándose a medida que se abre paso en nuestro interior, doblegando nuestra sumisión a su voluntad."
 shroud.3065.a.organic: "Bebamos."
 shroud.3065.a.machine: "Procesemos."
 shroud.3065.a.reply.intro: "Las últimas gotas se deslizan lentamente, espesas y repugnantes. El líquido se acumula dentro de nosotros, saturando nuestra [GetMindPhysicalLoc].\n\nEl calor nos invade, distorsionando nuestros pensamientos y desgastando los límites de nuestra [GetPsycheLoc].\n\nLa voz vuelve, satisfecha, mientras el cáliz se desvanece ante nosotros."
 shroud.3065.a.reply.default: "¡CONQUISTADOR! CAMPEÓN."
 shroud.3065.a.reply.eater: "§H$shroud.3065.a.reply.default$§!"
 shroud.3065.a.reply.composer: "§H¡MOLDEADOR! CATALIZADOR DE LA VIDA.§!"
 shroud.3065.a.reply.cradle: "§H¡INTEGRADOR! MENTE ENTRE LAS MENTES.§!"
 shroud.3065.a.reply.instrument: "§H¡DECADENCIA! SENTIDOS PARA EXPLORAR.§!"
 shroud.3065.b: "Eliminemos."
 shroud.3065.b.reply.intro: "Violentas convulsiones sacuden nuestros [GetBodiesLoc] mientras rechazamos la contaminación, purgando la sustancia empalagosa de nuestro interior.\n\nEl repugnante líquido salpica el vacío, retorciéndose mientras se dispersa. La voz silba, y sus palabras se evaporan junto con esa inmundicia."
 shroud.3065.b.reply.default: "¡DEBILIDAD!"
 shroud.3065.b.reply.eater: "§H$shroud.3065.b.reply.default$§!"
 shroud.3065.b.reply.composer: "§H¡ESTANCAMIENTO!§!"
 shroud.3065.b.reply.cradle: "§H¡COBARDÍA!§!"
 shroud.3065.b.reply.instrument: "§HTANTO POTENCIAL...§!"
 shroud.3070.title: "Lienzo de cambios"
 shroud.3070.desc.intro: "El Velo se contrae, plegándose hacia dentro, comprimiendo nuestra psique en lo más profundo de un vacío confinado y resonante.\n\nUna presencia se cierne, fluida e indistinta. Su forma cambia a medida que abre y cierra la división que nos separa del resto del Velo. Cada revelación desencadena una cascada de visiones."
 shroud.3070.desc.eater: "Los mundos arden, sus brasas transportadas por los lamentos de los consumidos. Cada panorama cambiante revela un festín potencial, listo para ser devorado."
 shroud.3070.desc.composer: "Paisajes desbordantes, saturados de fauna que pulula por llanuras verdes. Hilos de vida se entrelazan y se expanden. Cada vista cambiante revela una atmósfera rebosante de potencial para transformarse y moldearse."
 shroud.3070.desc.cradle: "Comunidades que se abrazan y se animan mutuamente en unidad a costa de rechazar a quienes disienten. Cada panorama cambiante revela una nueva utopía que solo acoge a los fieles."
 shroud.3070.desc.instrument: "Ante nosotros se extienden vastas canteras, repletas de lucrativos recursos listos para ser extraídos. Cada panorama cambiante revela un tesoro de riquezas que esperan a ser saqueadas."
 shroud.3070.desc.outro: "Con cada nueva visión, la inercia nos sacude y nos retuerce, arrastrándonos a velocidades imposibles mientras las paredes de la realidad se curvan y ondulan.\n\nPercibimos la diversión de la figura. Nos está poniendo a prueba, esperando un nombre para la fuerza que nos atrapa."
 shroud.3070.a.eater: "Satisfacción."
 shroud.3070.a.composer: "Formación."
 shroud.3070.a.cradle: "Armonía."
 shroud.3070.a.instrument: "Potencial."
 shroud.3070.a.reply.intro: "Nuestra voz clama, la presencia se apacigua. Las visiones cambiantes cesan a medida que la tempestad de la inercia se calma y da paso a una claridad resonante.\n\nLe hemos dado nombre."
 shroud.3070.a.reply.default: "SATISFACCIÓN. EL COMBUSTIBLE ES LA CONQUISTA."
 shroud.3070.a.reply.eater: "§H$shroud.3070.a.reply.default$§!"
 shroud.3070.a.reply.composer: "§HFORMACIÓN. LA VIDA SE ENTRELAZA; LOS PATRONES SE CONSOLIDAN.§!"
 shroud.3070.a.reply.cradle: "§HARMONÍA. LA DISCORDIA SE EVITA CON AMABILIDAD.§!"
 shroud.3070.a.reply.instrument: "§HPOTENCIAL. A LA ESPERA DE ABANDONAR EL COSMOS INACTIVO.§!"
 shroud.3070.a.reply.outro: "La figura, complacida con nuestra decisión, separa la barrera; el vacío se disipa a medida que emergemos de ella."
 shroud.3070.b.eater: "Desesperación."
 shroud.3070.b.composer: "Excesivo."
 shroud.3070.b.cradle: "Fachada."
 shroud.3070.b.instrument: "Derroche."
 shroud.3070.b.reply.intro: "Nuestra voz tiembla, arrancada de nosotros por la furiosa figura que nos empuja a través de la barrera."
 shroud.3070.b.reply.default: "¿DESESPERACIÓN? ¡DEBILIDAD, HAMBRE, OS FALTA CONVICCIÓN!"
 shroud.3070.b.reply.eater: "§H$shroud.3070.b.reply.default$§!"
 shroud.3070.b.reply.composer: "§H¿EXCESIVO? ¡REGOCIJAOS EN LA MEDIOCRIDAD!§!"
 shroud.3070.b.reply.cradle: "§H¿FACHADA? ¡ESTANCAOS EN VUESTRO AISLAMIENTO!§!"
 shroud.3070.b.reply.instrument: "§H¿DERROCHE? ¡LA INDIGENCIA ES VUESTRA OBSESIÓN!§!"
 shroud.3070.b.reply.outro: "Atravesamos el Velo, abandonándolo con una sensación de inquietud."
 shroud.3100.title: "Conflicto psiónico"
 shroud.3100.desc: "Una discordante orquesta de devastación nos sumerge más profundamente en el Velo. Cada reverberación golpea nuestra psique con un ritmo implacable de ruina.\n\nEl ruido toma forma.\n\nNos encontramos en la periferia de un conflicto psiónico. La motivación de las entidades implicadas no está clara, pero el poder que están demostrando es considerable.\n\nLos bombardeos psíquicos entran y salen de nuestra percepción, retorciéndose a través de la realidad fracturada que se presenta ante nosotros. No hay refugio, solo una tormenta que se aproxima."
 shroud.3100.a: "§YAguantemos y observemos.§!"
 shroud.3101.title: "§GResonancia incesante§!"
 shroud.3101.desc.intro: "Nos quedamos, arriesgándonos a pagar las consecuencias. El conflicto se aproxima."
 shroud.3101.desc: "$shroud.3101.desc.intro$\n\nCon un enfoque claro, nos sintonizamos con la cascada psíquica y nuestros pensamientos fluyen. El bombardeo no cesa, pero permanecemos intactos, moviéndonos en armonía con el ritmo de la destrucción.\n\nCon cada paso, nuestra comprensión crece. El bombardeo psiónico se cuela entre los huecos de planos invisibles.\n\nA medida que nos retiramos, el patrón se mantiene. Con algunas mejoras, los principios que observamos podrían adaptarse a nuestro propio armamento."
 shroud.3102.title: "§RAsalto abisal§!"
 shroud.3102.desc: "$shroud.3101.desc.intro$Intentamos sintonizar con la tormenta psíquica, nos movemos al ritmo de sus impredecibles ritmos.\n\nNuestros primeros pasos fueron prometedores, pero el ritmo de la destrucción nos consumió inevitablemente.\n\nA medida que la tormenta pasa, los ecos del bombardeo aún resuenan en nosotros. Las reverberaciones psiónicas de nuestro fracaso resuenan en todo el imperio, incluso en esta realidad."
 shroud.3102.a.tt: "Dos edificios aleatorios del imperio quedan destruidos."
 shroud.3105.title: "Rutas psíquicas"
 shroud.3105.desc: "Sin previo aviso, una presión psíquica irrumpe en el Velo.\n\nUn laberinto de caminos incandescentes se despliega ante nosotros, extendiéndose más allá de la percepción, crepitando en una existencia momentánea antes de desvanecerse en el vacío.\n\nComienza a formarse otra oleada. Con concentración, percibimos su configuración antes de que emerja. El laberinto cambiante se enciende de nuevo, estallando hacia afuera en una red de posibilidades.\n\nCada camino ofrece una nueva tentación que explorar, antes de desvanecerse en la nada."
 shroud.3105.a: "§YPasemos por el calvario.§!"
 shroud.3106.title: "§G$tech_psionic_lightning$§!"
 shroud.3106.desc.intro: "La presión aumenta, incitándonos con la expectación. Avanzamos en su crescendo, guiando nuestras mentes a través del laberinto de energía psíquica. Los pensamientos se convierten en impulso, empujándonos hacia adelante."
 shroud.3106.desc: "$shroud.3106.desc.intro$ deslizándose entre los arcos de energía psiónica antes de que nuestra determinación pueda flaquear.\n\nNo estamos atados a nada, ascendemos más allá de nuestras formas físicas. El laberinto y su multitud de caminos se convierten en una extensión de nuestra propia consciencia, revelando conocimientos ocultos en lo más profundo de los patrones de la tormenta.\n\nTan rápido como comenzó, el momento ha terminado. La imagen residual del laberinto se derrumba detrás de nosotros mientras emergemos con un nuevo entendimiento. Con cuidadosos ajustes, estos principios psiónicos podrían aplicarse a nuestras armas de guerra."
 shroud.3107.title: "§RPerdidos en el vacío§!"
 shroud.3107.desc: "$shroud.3106.desc.intro$ Sus innumerables caminos se extienden ante nosotros, abrumando la mente con opciones imposibles.\n\nEn este momento de duda, los caminos incandescentes emergen. Arcos de energía psiónica se retuercen a través del nexo que se derrumba, atrapando nuestros pensamientos y lanzándonos al caos del Velo.\n\nEmergemos. Nuestros [GetTelepathPlural] están desorientados y afectados por el trauma persistente del fracaso. La reacción psiónica resuena a través de [Root.GetName]."
 shroud.3110.title: "Lanza psíquica"
 shroud.3110.desc: "Un haz totémico de energía psiónica singular se extiende más allá de nosotros dentro del Velo hacia infinitos incalculables. Su composición singularmente estable contrasta radicalmente con las formaciones caóticas que hemos encontrado anteriormente.\n\n¿Es seguro permanecer aquí?"
 shroud.3110.a: "§YQuedémonos un rato.§!"
 shroud.3111.title: "§GDisruptores psiónicos§!"
 shroud.3111.desc: "A pesar de su intensidad cegadora, logramos mantener nuestra atención en el haz de energía psíquica perfectamente formado. Finalmente, contemplamos la verdadera naturaleza de su intrincada y sobrenatural estructura.\n\nNuestras mentes se aceleran con nuevas posibilidades; reproducir esta formación de energía única en el reino físico nos otorgará un arma imparable."
 shroud.3112.title: "§R[GetTelepathPluralCap] superados§!"
 shroud.3112.desc: "No pudimos permanecer allí. La proximidad a una formación tan intensa de energía psiónica resultó ser demasiado para nuestros [GetTelepathPlural].\n\nEl daño que ha causado en nuestras mentes la exposición a este fenómeno tan abrumador tardará tiempo en sanar."
 recovering_telepaths: "$DEFAULT_TELEPATH_PLURAL_CAP$ en recuperación"
 recovering_telepaths_desc: "Los esfuerzos excesivos en el Velo han pasado factura a nuestros $DEFAULT_TELEPATH_PLURAL$."
 recovering_telepaths_robot: "$MACHINE_TELEPATH_PLURAL_CAP$ en recuperación"
 recovering_telepaths_robot_desc: "Los esfuerzos excesivos en el Velo han pasado factura a nuestros $MACHINE_TELEPATH_PLURAL$."
 recovering_telepaths_hive: "$HIVE_TELEPATH_PLURAL_CAP$ en recuperación"
 recovering_telepaths_hive_desc: "Los esfuerzos excesivos en el Velo han pasado factura a nuestros $HIVE_TELEPATH_PLURAL$."
 MACHINE_SENSE: "sentido"
 shroud.3120.title: "Un eco distante"
 shroud.3120.desc: "A través del Velo, podemos [GetFeelLoc] la resonancia de vastos poderes. Su influencia impregna el reino psiónico.\n\nNuestras acciones por sí solas pueden acercarnos más a ellos, pero hay otro recurso. Al aprovechar el poder del zro, nuestros [GetTelepathPlural] pueden extender su alcance directamente hacia estas entidades.\n\nSolo tenemos que decidir a cuál acudir."
 shroud.3120.a: "$utopia.3005.a$"
 shroud.3120.b: "$utopia.3005.b$"
 shroud.3120.c: "$utopia.3005.c$"
 shroud.3120.d: "§CUno que llora por la esperanza perdida.§!"
 ORGANIC_SPIRITS: "espíritus"
 MACHINE_SPIRITS: "entidades psiónicas"
 shroud.3125.title: "$shroud.3120.title$"
 shroud.3125.desc: "Al intentar sentir su presencia, podemos [GetFeelSenseLoc] cómo se agita. Ya nos hemos encontrado antes con [GetSpiritsLoc], pero esto es algo diferente, algo mucho más poderoso... algo mucho más antiguo.\n\nCon sus energías infundidas por el zro agotadas, nuestros [GetTelepathPlural] deben retirarse del Velo. Tendremos que volver más adelante."
 shroud.3125.tt: "Gana mucha §Hsintonía§! con una entidad en el §HVelo§!."
 shroud.3115.title: "Bombardeo psiónico"
 shroud.3115.desc: "Una serie de poderosas convulsiones atraviesan el Velo, haciendo que nuestras mentes se estremezcan.\n\nEstas reverberaciones amenazan con abrumar a nuestros [GetTelepathPlural].\n\n¿Cuál es la causa de este bombardeo psiónico?"
 shroud.3115.a: "§YDebemos averiguarlo.§!"
 shroud.3116.title: "§G$tech_psionic_bombers$§!"
 shroud.3116.desc: "Fortalecimos nuestras mentes contra este bombardeo continuo y pronto comprendimos su naturaleza.\n\nLas convulsiones explosivas son causadas por corrientes de energía psiónica concentrada reflejada desde nuestra propia dimensión. Estas volátiles gotas de voluntad psíquica tienen el potencial de dañar significativamente las mentes de quienes no están preparados.\n\nUna idea se asentó: estas poderosas formaciones sentarán las bases para nuevas armas nacidas del Velo."
 shroud.3117.title: "§RTrauma psiónico§!"
 shroud.3117.desc: "Nuestras reservas mentales han disminuido.\n\nLas detonaciones psíquicas han resultado abrumadoras y han provocado casos de trauma psiónico en muchos de nuestros [GetTelepathPlural].\n\nNecesitaremos tiempo para recuperarnos."
 psionic_shock_modifier: "Trauma psiónico"
 psionic_shock_modifier_desc: "La exposición a fuerzas abrumadoras en el Velo ha provocado un trauma psiónico a nuestros $DEFAULT_TELEPATH_PLURAL$."
 psionic_shock_hive_modifier: "$psionic_shock_modifier$"
 psionic_shock_hive_modifier_desc: "La exposición a fuerzas abrumadoras en el Velo ha provocado un trauma psiónico a nuestros $HIVE_TELEPATH_PLURAL$."
 psionic_shock_robot_modifier: "$psionic_shock_modifier$"
 psionic_shock_robot_modifier_desc: "La exposición a fuerzas abrumadoras en el Velo ha provocado un trauma psiónico a nuestros $MACHINE_TELEPATH_PLURAL$."
 shroud.3200.title: "Animatus"
 shroud.3200.desc: "Mientras nuestras mentes se adentran una vez más en las profundidades del Velo, nos encontramos con la familiar presencia de $the_animator_of_clay_color_article$.\n\nRitmos mecánicos emergen alrededor de nuestra consciencia. Voces silenciosas se elevan en coro; los fantasmas que habitan en nuestra flota han comenzado a despertar. Se ofrecen a llevar nuestras formas físicas más allá, liberando nuestras mentes para que podamos centrarnos en asuntos más elevados.\n\nAunque no están vivos, los conocemos. Su forma está moldeada por el diseño, su presencia impregnada de historia y propósito. Todos se fusionan y se extienden expectantes.\n\nYa no somos meros operadores de estas técnicas. Somos socios, una unidad de determinación, impulsados por una voluntad colectiva."
 shroud.3200.a: "No somos más que hojas movidas por el viento."
 shroud.3200.a.tt: "§Y$unlock_edict_tt$§!$edict_animatus$"
 shroud.3210.title: "Voluntad de templanza"
 shroud.3210.desc.intro: "La esencia lúgubre de $the_outsider_color_article$ se infiltra en nuestras mentes.\n\nMientras resuena su eco afligido, vórtices entrelazados de energía psiónica se fusionan en una forma extraña y siempre cambiante. Cuanto más miramos, menos comprensible se vuelve. Se oye una voz.\n\n§HHay cosas que no se pueden entender. El dolor y el arrepentimiento os las enseñarán.\n\nFui el primero de mi pueblo en llegar a este lugar, pero todos hemos pagado su precio. Dejamos que el Velo nos destruyera; ¡no dejéis que nuestro destino sea el vuestro!§!\n\n"
 shroud.3210.desc.know_zroni: "$shroud.3210.desc.intro$Reconocemos esta voz como la de un zroni. No sabemos cómo ha llegado aquí, pero quizá sea prudente prestar atención a sus advertencias sobre el poder destructivo del Velo."
 shroud.3210.desc.left_zroni: "$shroud.3210.desc.intro$Reconocemos esta voz. Ya nos hemos encontrado antes con este zroni, la \"Clarividente\". No sabemos cómo ha llegado hasta aquí, pero sería prudente prestar atención a sus advertencias sobre el poder destructivo del Velo."
 shroud.3210.desc.default: "$shroud.3210.desc.intro$Esta entidad sigue siendo un misterio para nosotros. Entendemos muy poco de su siniestra advertencia."
 shroud.3210.a: "Debemos proceder con cuidado."
 shroud.3210.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_temperance$"
 shroud.3220.title: "Juego mental"
 shroud.3220.desc: "A nuestro alrededor, el Velo vibra con los ritmos tranquilizadores de $the_golden_dream_color_article$.\n\nMientras observamos, jirones errantes de energía psiónica se van organizando lentamente en una intrincada red. Cifras irreconocibles comienzan a manifestarse en diseños cuidadosamente trazados.\n\nEmpiezan a moverse lentamente unos sobre otros y a su alrededor, formando nuevas figuras cada vez más complejas. Poco a poco, percibimos un patrón, una lógica que rige sus movimientos.\n\nNos damos cuenta de que formamos parte de un juego que ha iniciado $the_golden_dream_article$. Cada movimiento que nos guía nos infunde una nueva sensación de indulgencia tranquilizadora."
 shroud.3220.a: "Cuanto más jugamos, más nos evadimos a un lugar significativo."
 shroud.3220.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_distraction$"
 shroud.3230.title: "Arenas del tiempo"
 shroud.3230.desc: "Los granos del pensamiento pasan sobre nosotros. Reconocemos la presencia abrasiva de $the_endless_tide_color_article$.\n\nFluye y refluye, erosionando todo a su paso con una inevitabilidad eterna, antes de volver a posarse de nuevo.\n\nAl resurgir tras su paso, sentimos una verdadera sensación de rejuvenecimiento."
 shroud.3230.a: "Aquí, somos atemporales."
 shroud.3230.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_endless$"
 shroud.3240.title: "Reformados"
 shroud.3240.desc: "Un vértigo se cierne sobre nuestros pensamientos; es $the_pale_mountain_color_article$. Nuestra mente se esfuerza mientras una visión abruma todos los sentidos.\n\nVemos la silueta borrosa de una nave dañada ante nosotros, a la deriva en el vacío.\n\nEn algún lugar de nuestra mente, la presión oblicua cambia y el recipiente comienza a transformarse. Las fisuras se sellan, la corrosión se desvanece y el metal se endereza. Poco a poco, el legado de su destrucción se deshace.\n\nUna vez que la nave está completamente reparada, la visión termina abruptamente. Solo nos queda una profunda sensación de renovación interior."
 shroud.3240.a: "Un gran renacer de nuestras mentes."
 shroud.3240.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_rebirth$"
 shroud.3250.title: "La fuerza de la abstención"
 shroud.3250.desc: "La serenidad de $the_hollow_point_color_article$ llena nuestras mentes con su silencio. Una visión se extiende lánguidamente en nuestros sentidos.\n\nObservamos cómo se desmoronan en un instante eones de conflictos: civilizaciones que se derrumban, historias que se borran, estatuas de tiranos muertos hace mucho tiempo que quedan sepultadas por el paso del tiempo.\n\nLa sabiduría de $the_hollow_point_article$ reside en la fuerza silenciosa de la abstención. Los conflictos surgen y desaparecen, pero nosotros permanecemos. Este desapego imbuye a nuestros líderes de una nueva longevidad, liberados de la toxicidad corrosiva de los agravios mortales."
 shroud.3250.a: "Todavía vivimos."
 shroud.3250.a.tt: "Todos los líderes psiónicos obtienen el rasgo §Y$leader_trait_shroud_age$§!, que otorga §G+40§! años de vida útil del líder."
 shroud.3260.title: "Del caos al orden"
 shroud.3260.desc: "La ebullición del Velo palpita ante nosotros. Una presencia intratable se acerca; es $the_vacant_throne_color_article$.\n\nA medida que se acerca, enormes y enredadas espirales de energía psiónica pura se calman de repente. El caos se vuelve más claro y comprensible. Los colores florecen con una nueva definición. Se imponen la simetría, la lógica y la estructura.\n\nAlgo se forma en lo más profundo de nuestra mente: un deseo profundo de orden."
 shroud.3260.a: "Evitemos el caos. Aceptemos el orden."
 shroud.3260.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_order$"
 shroud.3270.title: "Aceleración infinita"
 shroud.3270.desc: "Una aceleración mental imposible abruma nuestros sentidos. Reconocemos la presencia de $the_black_river_color_article$.\n\nNos precipitamos a una velocidad inconcebible hacia un final que no comprendemos del todo. Es la frontera entre todo y nada; la separación entre lo que siempre ha sido y lo que nunca será; el límite más allá del cual ninguna ley natural puede extenderse.\n\nFinalmente, al volver a nosotros mismos, nos queda una nueva noción de lo que realmente significa moverse."
 shroud.3270.a: "¿Hemos visto el límite del universo?"
 shroud.3270.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_motion$"
 #==========================
 # Forge our own Path
 #==========================
 shroud.3500.title: "Se ha forjado una senda"
 shroud.3500.desc: "Nuestros [GetResearchers] psiónicos han desarrollado una ingeniosa técnica para extraer energía del §HVelo§!.\n\nLos poderes más formidables del reino psiónico son mantenidos en secreto por sus mecenas, y solo se conceden a cambio de un pacto. Eso no está a nuestro alcance, así que hemos encontrado la manera de forjar nuestro propio camino.\n\nAl proyectar nuestra voluntad en el Velo, podemos extraer pequeñas cantidades de poder de cada uno de sus dominios de sintonía. Hacerlo requerirá una gran concentración, pero nuestras mentes se han fortalecido y podrán mantener este delicado equilibrio."
 shroud.3500.a: "Dentro del Velo, nuestra voluntad es nuestra."
 shroud.3510.title: "$utopia.2681.name$"
 shroud.3510.desc: "En un pliegue del §HVelo§! nuestros [GetTelepathPlural] han descubierto un nexo de poder sin explotar.\n\nLas fuerzas convergentes pueden acumularse gradualmente en el reino psiónico, formando poderosas concentraciones de energía que, algún día, podrían madurar y convertirse en entidades superiores. Hemos descubierto una de estas concentraciones, lista para ser explotada.\n\nPor la fuerza de la voluntad psiónica, uno de nosotros puede absorber este extraordinario poder. Varios candidatos han sido seleccionados."
 shroud.3510.a: "§H[leader_1.GetTitle]§! [leader_1.GetName]"
 shroud.3510.b: "§H[leader_2.GetTitle]§! [leader_2.GetName]"
 shroud.3510.c: "§H[leader_3.GetTitle]§! [leader_3.GetName]"
 shroud.3510.d: "§H[leader_4.GetTitle]§! [leader_4.GetName]"
 psionic_mastery: "Maestría psiónica"
 psionic_mastery_desc: "Hemos alcanzado el dominio de nuestros poderes psiónicos. Nuestra psique se mueve libremente por el Velo."
 shroud.3520.title: "$psionic_mastery$"
 shroud.3520.desc: "Al proyectar nuestra voluntad en el §HVelo§!, hemos alcanzado la maestría sobre nuestras habilidades psiónicas. Hemos reunido poder de los dominios de numerosas entidades sin quedar sujetos a su influencia; además, nuestros [GetTelepathPlural] ahora poseen un preciso control sobre sus trances psiónicos.\n\nMientras que otros han dejado que el Velo forjara su destino, nosotros hemos mantenido una verdadera autonomía de voluntad.\n\n§H[this.GetName]§! ha alcanzado su pleno potencial psiónico."
 shroud.3520.a: "Esto es solo el comienzo."
 #==========================
 # Patrons First Contact
 #==========================
 shroud.first_contact.title: "$utopia.3300.name$"
 shroud.first_contact.prompt: "$utopia.2657.a$"
 shroud.first_contact.1.desc.default: "El Velo. Fluye bajo la realidad que conocemos, como una sombra proyectada por la oscuridad. Cualquiera con poderes psiónicos habrá visto este lugar en sus sueños, aunque probablemente no lo supiera en ese momento.\n\nPasamos años tratando de perforarlo, haciéndolo cada vez más fino bajo la presión de nuestras mentes combinadas. Al otro lado, nuestros esfuerzos no pasaron desapercibidos. Algo nos observa.\n\nSu presencia irradia un poder asombroso, [GetPatronInsert] de las profundidades del Velo. Apenas se da cuenta de nuestra presencia, observándonos como nosotros miraríamos una gota de condensación en una ventana.\n\nOjalá pudiésemos llegar a su mente inescrutable."
 shroud.first_contact.1.desc.hive: "El Velo. Fluye bajo la realidad que conocemos, como una visión dentro de un dron en reposo. Aunque extraño, resulta... inexplicablemente familiar.\n\nPasamos años tratando de perforarlo, haciéndolo cada vez más fino bajo la presión de nuestras mentes combinadas. Al otro lado, nuestros esfuerzos no pasaron desapercibidos. Algo nos observa.\n\nSu presencia irradia un poder asombroso, [GetPatronInsert] de las profundidades del Velo. Apenas se da cuenta de nuestra presencia, observándonos como nosotros miraríamos a un dron entre la multitud.\n\nOjalá pudiésemos llegar a su mente inescrutable."
 shroud.first_contact.1.desc.robot: "El Velo. Se encuentra fuera de cualquier parámetro espacio-temporal que hayamos detectado anteriormente. Solo puede compararse con los datos anómalos que perturban nuestros ciclos de descanso.\n\nPasamos años intentando piratear sus defensas, desgastándolas cada vez más bajo la presión de nuestros procesadores combinados. Al otro lado, nuestros esfuerzos no pasaron desapercibidos. Algo nos observa.\n\nSu presencia irradia un poder asombroso, [GetPatronInsert] de las profundidades del Velo. Apenas se da cuenta de nuestra presencia, observándonos como si fuéramos un simple bit en un flujo de datos.\n\nOjalá pudiésemos llegar a su mente inescrutable."
 shroud.first_contact.2.desc.all: "Podemos sentir grandes entidades en el Velo, pero nos resulta imposible calcular su posición. A diferencia del espacio en constante expansión, sus movimientos no pueden rastrearse; sus destinos se repliegan hacia sus orígenes, como si las energías se hubiesen engendrado a sí mismas.\n\nSea cual sea su naturaleza, nos llaman como singularidades de pensamientos y voluntades."
 shroud.first_contact.2.desc.default: "Entre innumerables voces, oímos una más clara que el resto: [GetPatronInsert], que envuelve nuestra psique.\n\nQuizás, con suficiente esfuerzo, podamos llegar a él."
 shroud.first_contact.2.desc.robot: "Entre innumerables voces, oímos una más clara que el resto: [GetPatronInsert], que domina nuestros cálculos.\n\nQuizás, con suficiente esfuerzo, podamos llegar a él."
 shroud.first_contact.3.desc.default: "Atravesamos el espacio intermedio, una nada que separa el Velo de la realidad tangible del espacio convencional.\n\nEn cuanto entramos, sentimos su presencia, [GetPatronInsert] que invade nuestras mentes. Es una entidad de un poder inimaginable que perdura en el mañana.\n\nNo debemos dar la espalda."
 shroud.first_contact.3.desc.robot: "Atravesamos el espacio intermedio, una nada que separa el Velo de los fenómenos del espacio ordinario.\n\nEn cuanto entramos, detectamos su presencia, [GetPatronInsert] que invade nuestras mentes. Es una entidad de un poder asombroso que perdura en el mañana.\n\nNo debemos dar la espalda."
 shroud.first_contact.4.desc.default: "El Velo palpita con fuerza. Sentimos su energía por todas partes y, sin embargo, no está en ningún sitio. Entrar es discernir patrones a partir de sensaciones vagas, percibir grandes entidades a través de la concentración.\n\nPercibimos la señal de una de esas fuerzas, [GetPatronInsert] en las profundidades insondables que se encuentran sobre nosotros.\n\n¿Podremos aguantar la respiración el tiempo suficiente para alcanzarlo?"
 shroud.first_contact.4.desc.robot: "El Velo palpita con fuerza. Sentimos su energía por todas partes y, sin embargo, no está en ningún sitio. Entrar es detectar patrones a partir de sensaciones vagas, revelar entidades poderosas mediante un procesamiento específico.\n\nPercibimos la señal de una de esas fuerzas, [GetPatronInsert] en las profundidades insondables que se encuentran sobre nosotros.\n\n¿Se sobrecargarán nuestros circuitos antes de que podamos llegar?"
 shroud.first_contact.end.b: "Hay mucho que pensar."
 shroud.first_contact_insert.eater.default: "un §Hgruñido voraz§!"
 shroud.first_contact_insert.eater.machine: "un §Hgruñido insaciable§!"
 shroud.4005.title: "$the_eater_of_worlds_article_cap$ Surge"
 shroud.4005.desc.default: "Al profundizar más en el §HVelo§!, llegamos al alcance del §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§!. Retumbaba con una voracidad hueca, alimentándose eternamente y nunca saciándose. Nuestras señales exploratorias fueron recibidas con eructos de fuego y destrucción. Su aparente indiferencia hacia nuestro entendimiento era sofocante.\n\nFinalmente, la cosa se impacientó. Un rugido feroz envolvió las mentes de nuestros [GetTelepathPlural]. Entre montones resonantes de escombros y [GetEaterEmergesExtra].\n\nTan repentinamente como comenzó, el ruido cesó. Sentimos un hambre dolorosa.\n\nAhora tenemos más clara la voluntad de la entidad. [GetEaterEmergesEnding]"
 shroud.4005.desc.hive: "$shroud.4005.desc.default$"
 shroud.4005.desc.gestalt_machine: "Al profundizar más en el §HVelo§!, llegamos al alcance del §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§!. Retumbaba con una voracidad hueca, alimentándose eternamente y nunca saciándose. Nuestras señales exploratorias fueron recibidas con eructos de fuego y destrucción. Su aparente indiferencia hacia nuestro entendimiento era abrumadora.\n\nFinalmente, la cosa se impacientó. Un rugido feroz envolvió las mentes de nuestros [GetTelepathPlural]. Entre montones resonantes de escombros y [GetEaterEmergesExtra].\n\nTan repentinamente como comenzó, el ruido cesó. Sentimos, por primera vez, una debilidad que solo habíamos documentado anteriormente en especies orgánicas: el hambre.\n\nAhora tenemos más clara la voluntad de la entidad. [GetEaterEmergesEnding]"
 shroud.4005.desc.individual_machine: "$shroud.4005.desc.gestalt_machine$"
 shroud.4005.desc_extra_pacifist: "ruina, presentó una visión de agresión sin sentido."
 shroud.4005.desc_extra_robot: "ruina, trazó un modelo de marcial perfección."
 shroud.4005.desc_extra_organic: "cadáveres, trazó un destino marcial de espantoso esplendor."
 shroud.4005.desc_outro_pacifist: "Es violento y conflictivo. Va en contra de muchos de nuestros principios más preciados. No se recomienda sintonizar más con este ser, $the_eater_of_worlds_color_article$."
 shroud.4005.desc_outro_robot: "Conocemos su visión de violencia y gloria. Una vez que nuestros [GetTelepathPlural] se hayan recargado, podremos contactar y comunicarnos con este ser, $the_eater_of_worlds_color_article$."
 shroud.4005.desc_outro_organic: "Conocemos su visión de violencia y gloria. Una vez que nuestros [GetTelepathPlural] se hayan recuperado, podremos contactar y comunicarnos con este ser, $the_eater_of_worlds_color_article$."
 shroud.4005.a.default: "[GetEaterEmergesOptionA]"
 shroud.4005.a.robot: "[GetEaterEmergesOptionA]"
 shroud.4005.a.pacifist: "Podemos aprender, incluso de este terrible poder."
 shroud.4005.a.non_pacifist: "Puro poder."
 shroud.4005.b.default: "$shroud.first_contact.end.b$"
 shroud.4005.b.robot: "$shroud.first_contact.end.b$"
 shroud.4005.c.default: "¡El horror!"
 shroud.4005.c.robot: "Protocolo de evasión de amenazas iniciado."
 shroud.first_contact.end.a.tt.the_eater_of_worlds: "Gana §Ysintonía§! con $the_eater_of_worlds_color_article$.\n$shroud.first_contact.end.b.tt.the_eater_of_worlds$"
 shroud.first_contact.end.b.tt.the_eater_of_worlds: "Revela $the_eater_of_worlds_color_article$ en el §YVelo§!."
 shroud.first_contact.end.c.tt.the_eater_of_worlds: "Pierde bastante §Ysintonía§! con $the_eater_of_worlds_color_article$.\n$shroud.first_contact.end.b.tt.the_eater_of_worlds$"
 shroud.first_contact_insert.cradle.default: "una §Hcalidez acogedora§!"
 shroud.first_contact_insert.cradle.machine: "un §Hcalor irresistible§!"
 shroud.4015.title: "$the_cradle_of_souls_article_cap$ Surge"
 shroud.4015.desc.default: "El poder de la §H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§! se difunde por todo el §HVelo§!, pero su origen es difícil de determinar. Exploramos el reino psiónico, cambiando constantemente de rumbo y cuestionando nuestros criterio.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.hive: "El poder de la §H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§! se difunde por todo el §HVelo§!, pero su origen es difícil de determinar. Exploramos el reino psiónico, cambiando constantemente de rumbo y cuestionando nuestros cálculos.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.default.end: "Mientras nos deteníamos a reflexionar, la entidad emergió. No oímos nada, no vimos nada, pero la sentimos más cálida que nunca.\n\nSentimos el poder en el centro de todo, un nexo de energías procedentes de todo el Velo y más allá, pensamientos que convergían e irradiaban un calor único. De vuelta del viaje, nos sentimos abrumados por la quietud.\n\nAhora tenemos más claro cuáles son los deseos de la entidad. [GetCradleEmergesEnding]"
 shroud.4015.desc.gestalt_machine: "El poder de la §H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§! se difunde por todo el §HVelo§!, pero su origen es difícil de determinar. Exploramos el reino psiónico, cambiando constantemente de rumbo y cuestionando nuestros cálculos.\n\nMientras nos deteníamos a procesar, la entidad emergió. No pudimos reconocer un mensaje, pero activó una parte más profunda de nuestro código.\n\nDetectamos el poder en el centro de todo, un nexo de energías procedentes de todo el Velo y más allá, conceptos que convergían e irradiaban un calor único. De vuelta del viaje, nos sentimos recargados por la quietud.\n\nAhora tenemos más claro cuáles son los deseos de la entidad. [GetCradleEmergesEnding]"
 shroud.4015.desc.individual_machine: "$shroud.4015.desc.gestalt_machine$"
 shroud.4015.desc_outro_homicidal: "Nuestras mentes rechazan inmediatamente sus falsas premisas de orden y armonía. Sintonizar aún más con este ser, $the_cradle_of_souls_color_article$, debilitaría nuestra determinación."
 shroud.4015.desc_outro_robot: "Conocemos su visión de orden y harmonía. Una vez que nuestros [GetTelepathPlural] se hayan recargado, podremos contactar y comunicarnos con este ser, $the_cradle_of_souls_color_article$."
 shroud.4015.desc_outro_organic: "Conocemos su visión de orden y harmonía. Una vez que nuestros [GetTelepathPlural] se hayan recuperado, podremos contactar y comunicarnos con este ser, $the_cradle_of_souls_color_article$."
 shroud_is_homicidal: "§RNuestra naturaleza violenta y depredadora nos lo prohíbe.§!"
 shroud.4015.a.default: "Que podamos estar cada vez más cerca."
 shroud.4015.a.robot: "$shroud.4015.a.default$"
 shroud.4015.b.default: "$shroud.first_contact.end.b$"
 shroud.4015.b.robot: "$shroud.first_contact.end.b$"
 shroud.4015.c.default: "No. Esto no."
 shroud.4015.c.robot: "Un no categórico."
 shroud.first_contact.end.a.tt.the_cradle_of_souls: "Gana §Ysintonía§! con $the_cradle_of_souls_color_article$.\n$shroud.first_contact.end.b.tt.the_cradle_of_souls$"
 shroud.first_contact.end.b.tt.the_cradle_of_souls: "Revela $the_cradle_of_souls_color_article$ en el §YVelo§!."
 shroud.first_contact.end.c.tt.the_cradle_of_souls: "Pierde bastante §Ysintonía§! con $the_cradle_of_souls_color_article$.\n$shroud.first_contact.end.b.tt.the_cradle_of_souls$"
 shroud.first_contact_insert.composer: "un §Hacorde resonante§!"
 shroud.4025.title: "$the_composer_of_strands_article_cap$ Surge"
 shroud.4025.desc.default: "Seguimos el rastro del §H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§!, adentrándonos más en el §HVelo§!. Dejaba señales que podíamos seguir: una imagen aquí, una melodía allá. Nos invitaba a acercarnos, pero avanzábamos lentamente.\n\nFinalmente, lo alcanzamos. Nos recibió un sinfín de visiones: sistemas estelares rebosantes de actividad, prodigiosas distorsiones de la forma [Root.GetSpeciesAdj]. Moviéndonos en su abrazo, nos perdimos en una maraña de diseños penetrantes.\n\nNos aferramos a los hilos, atando sus extremos. Los signos dispares se resolvieron en patrones. Agotadas nuestras energías, nos deleitamos en la majestuosidad de las formas y las figuras. La presencia se retiró al silencio.\n\nAhora tenemos más clara la intención de la entidad. Hemos visto su visión de crecimiento desenfrenado. Una vez que nuestros [GetTelepathPlural] se hayan recuperado, podremos contactar y comunicarnos con este ser, $the_composer_of_strands_color_article$."
 shroud.4025.desc.hive: "$shroud.4025.desc.default$"
 shroud.4025.desc.gestalt_machine: "Seguimos las huellas moleculares del §H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§!, adentrándonos más en el §HVelo§!. Dejaba señales que podíamos seguir: una imagen aquí, una melodía allá. Nos invitaba a acercarnos, pero avanzábamos lentamente.\n\nFinalmente, lo alcanzamos. Nos recibió un sinfín de visiones: sistemas estelares rebosantes de actividad, prodigiosas distorsiones de la forma [Root.GetSpeciesAdj]. Moviéndonos en su abrazo, nos perdimos en una maraña de diseños incongruentes.\n\nNos aferramos a los hilos, atando sus extremos. Los signos dispares se resolvieron en patrones. Agotadas nuestras energías, procesamos el extraordinario conjunto de datos. La presencia se retiró al silencio.\n\nAhora tenemos más clara la intención de la entidad. Hemos visto su visión de crecimiento desenfrenado. Una vez que nuestros [GetTelepathPlural] se hayan recargado, podremos contactar y comunicarnos con este ser, $the_composer_of_strands_color_article$."
 shroud.4025.desc.individual_machine: "$shroud.4025.desc.gestalt_machine$"
 shroud.4025.a.default: "Su poder resplandece."
 shroud.4025.a.robot: "Su poder es incalculable."
 shroud.4025.b.default: "$shroud.first_contact.end.b$"
 shroud.4025.b.robot: "$shroud.first_contact.end.b$"
 shroud.4025.c.default: "¡Qué espectáculo tan lamentable!"
 shroud.4025.c.robot: "Esto no puede acabar bien."
 shroud.first_contact.end.a.tt.the_composer_of_strands: "Gana §Ysintonía§! con $the_composer_of_strands_color_article$.\n$shroud.first_contact.end.b.tt.the_composer_of_strands$"
 shroud.first_contact.end.b.tt.the_composer_of_strands: "Revela $the_composer_of_strands_color_article$ en el §YVelo§!."
 shroud.first_contact.end.c.tt.the_composer_of_strands: "Pierde bastante §Ysintonía§! con $the_composer_of_strands_color_article$.\n$shroud.first_contact.end.b.tt.the_composer_of_strands$"
 shroud.first_contact_insert.instrument: "un §Hpulso frenético§!"
 shroud.4035.title: "$the_instrument_of_desire_article_cap$ Surge"
 shroud.4035.desc.all.start: "Tras meses de llamar en vano, el §H[Root.Patron:the_instrument_of_desire.GetPreCommunicationName]§! finalmente emergió de las profundidades del §HVelo§!."
 shroud.4035.desc.default: "$shroud.4035.desc.all.start$\n\nSu mensaje fue un torrente. Los pensamientos se apoderaron de nuestras mentes con fuerza, apelando a nuestros deseos más salvajes. Las palabras fluían a través de nosotros, rápidas y abundantes, ahogando todo lo demás en nuestras mentes. El mensaje era seductor: una visión de poder y placer.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.default.end: "La oleada se calmó hasta convertirse en un goteo. La presencia no esperaba respuesta, al menos por el momento. Nos dejó con una sed insaciable.\n\nAhora tenemos más claras las necesidades de la entidad. Conocemos su visión de riqueza sin límites. Una vez que nuestros [GetTelepathPlural] se hayan recuperado, podremos contactar y comunicarnos con este ser, $the_instrument_of_desire_color_article$."
 shroud.4035.desc.hive: "$shroud.4035.desc.all.start$\n\nSu mensaje fue un torrente. Los pensamientos se apoderaron de nuestras mentes con fuerza, apelando a nuestros deseos más salvajes. Las palabras fluían a través de nosotros, enérgicas y abundantes, ahogando todo lo demás en nuestras mentes. El mensaje era estimulante: una visión de una producción sin límites.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.gestalt_machine: "$shroud.4035.desc.all.start$\n\nSu mensaje fue un torrente. Los datos se apoderaron de nuestros circuitos con fuerza, superando todas las señales anteriores. Un código exótico nos inundó, enérgico y abundante, ahogando todo lo demás en nuestros sistemas. El mensaje era estimulante: una visión de una producción sin límites.\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.desc.machine.end: "La oleada se calmó hasta convertirse en un goteo. La presencia no esperaba respuesta, al menos por el momento. Nos dejó un vacío fragmentado que ansía una aportación elegante.\n\nAhora tenemos más claras las necesidades de la entidad. Conocemos su visión de riqueza sin límites. Una vez que nuestros [GetTelepathPlural] se hayan recargado, podremos contactar y comunicarnos con este ser, $the_instrument_of_desire_color_article$."
 shroud.4035.desc.individual_machine: "$shroud.4035.desc.all.start$\n\nSu mensaje fue un torrente. Los pensamientos se apoderaron de nuestras mentes con fuerza, apelando a nuestros deseos más salvajes. Las palabras fluían a través de nosotros, enérgicas y abundantes, ahogando todo lo demás en nuestras mentes. El mensaje era estimulante: una visión de una producción sin límites.\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.a.default: "Es glorioso."
 shroud.4035.a.robot: "Es extraordinario."
 shroud.4035.b.default: "$shroud.first_contact.end.b$"
 shroud.4035.b.robot: "$shroud.first_contact.end.b$"
 shroud.4035.c.default: "Palabras vacías."
 shroud.4035.c.robot: "$shroud.4035.c.default$"
 shroud.first_contact.end.a.tt.the_instrument_of_desire: "Gana §Ysintonía§! con $the_instrument_of_desire_color_article$.\n$shroud.first_contact.end.b.tt.the_instrument_of_desire$"
 shroud.first_contact.end.b.tt.the_instrument_of_desire: "Revela $the_instrument_of_desire_color_article$ en el §YVelo§!."
 shroud.first_contact.end.c.tt.the_instrument_of_desire: "Pierde bastante §Ysintonía§! con $the_instrument_of_desire_color_article$.\n$shroud.first_contact.end.b.tt.the_instrument_of_desire$"
 shroud.4040.title: "$utopia.3300.name$"
 shroud.4040.desc: "Conocemos muchas voces dentro del §HVelo§!; sus ecos son omnipresentes y multitudinarios. Tras recientes trances, nuestros [GetTelepathPlural] han informado de la presencia de una entidad diferente a cualquier otra: un §Hzumbido múltiple§! que impregna el centro mismo del Velo.\n\nCon una aplicación suficiente de energía psiónica, podemos intentar seguir el rastro psiónico de esta poderosa entidad, conocida entre nuestros [GetTelepathPlural] como los §H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§!."
 shroud.4040.a: "$utopia.2657.a$"
 shroud.4045.title: "$whisperers_in_the_void_article_cap$"
 shroud.4045.desc.intro: "En nuestro esfuerzo por comunicarnos con los §H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§!, nos vemos arrastrados a las capas más profundas del Velo. En este dominio interior, el Velo gira inmóvil. Los reflejos de cada pensamiento, de cada ciclo, se aglutinan en una fuerza primaria. Oímos las voces de los que no tienen voz, transportadas en un torbellino eterno: $whisperers_in_the_void_color_article$.\n\nUna discordancia chirriante nos rodea. Nos esforzamos por escuchar sus innumerables mensajes, hasta que un pensamiento singular resuena a través de nuestros [GetTelepathPlural].\n\n§HEscuchar es un sacrificio.§!\n\nPara aprovechar este gran poder, debemos ayudar a la entidad a ocupar"
 shroud.4045.desc.covenant: "$shroud.4045.desc.intro$ el dominio de [GetCovenantPatronColor]. Tal acto sustituiría por completo la presencia conocida de nuestro mecenas, rompiendo el pacto establecido.$shroud.4045.desc.outro$"
 shroud.4045.desc.no_covenant: "$shroud.4045.desc.intro$ el dominio de otro mecenas, reemplazando completamente su presencia.$shroud.4045.desc.outro$"
 shroud.4045.desc.outro: "\n\nEsto podría tener consecuencias importantes."
 shroud.4045.a: "Dejemos entrar a los Susurradores."
 shroud.4045.a.covenant.tt: "§RPone fin a nuestro pacto con [GetCovenantPatronColor].§!\nReemplaza el dominio de [GetCovenantPatronColor] al completo con $whisperers_in_the_void_color_article$.\n§RHabrá consecuencias.§!"
 shroud.4045.a.no_covenant.tt: "Elegiremos el dominio de un $major_patron$ para reemplazarlo con $whisperers_in_the_void_color_article$.\n§RHabrá consecuencias.§!"
 shroud.4045.b: "Es mejor no perturbar el equilibrio del Velo."
 shroud.4046.title: "Desplazamiento del Velo"
 shroud.4046.desc.1: "Tan pronto como se tomó la decisión, nuestros [GetTelepathPlural] se alzaron desde el §HVelo§! con un violento"
 shroud.4046.desc.2: "Sus mentes se llenaron con el eco de voces variadas.\n\nNuestra elección ha reconfigurado irrevocablemente nuestra percepción del reino psiónico. A medida que $whisperers_in_the_void_color_article$ se filtran en nuestras mentes, ya no podemos sentir a [GetCovenantPatronColor] como antes; su dominio se ha perdido para nosotros.\n\nPoco a poco estamos comprendiendo la voluntad de los Susurradores. Percibimos su visión de un conocimiento ilimitado. Una vez que nuestros [GetTelepathPlural] se hayan"
 shroud.4046.desc.3: "podemos volver a conectar y comunicarnos con este ser infinito."
 shroud.4046.desc.robot: "$shroud.4046.desc.1$ despertar. $shroud.4046.desc.2$ recuperado, $shroud.4046.desc.3$"
 shroud.4046.desc.organic: "$shroud.4046.desc.1$ activado. $shroud.4046.desc.2$ recargado, $shroud.4046.desc.3$"
 shroud.whispers_in_the_shroud.title: "Susurros en el Velo"
 shroud.whispers_in_the_shroud.a: "$utopia.2657.a$"
 minor_patron_instrument_cradle_intro: "Nos hallamos entre los dominios de $the_instrument_of_desire_article$ y $the_cradle_of_souls_article$."
 minor_patron_cradle_composer_intro: "Nos hallamos entre los dominios de $the_cradle_of_souls_article$ y $the_composer_of_strands_article$."
 minor_patron_composer_eater_intro: "Nos hallamos entre los dominios de $the_composer_of_strands_article$ y $the_eater_of_worlds_article$."
 minor_patron_eater_instrument_intro: "Nos hallamos entre los dominios de $the_eater_of_worlds_article$ y $the_instrument_of_desire_article$."
 minor_patron_default_intro: "Nos hallamos entre los dominios de las mayores entidades del Velo."
 shroud.4050.desc: "[This.GetMinorPatronCradleComposerIntro]\n\nEn una colección de construcciones sin vida, detectamos un §H$code_name_animator$§!, cuya voluntad da forma a densas energías creando nuevas y curiosas formas.\n\nTras haber irrumpido en sus actividades, se acerca, desplazando la neblina opaca del Velo. Ofrece algo.\n\n¿Qué pasará si lo cogemos?"
 shroud.4055.title: "$the_animator_of_clay_article_cap$ Surge"
 shroud.4055.desc: "Mientras sumergíamos nuestras mentes en las turbulentas energías del Velo, nuestros [GetSpeciesBodyPlural] se convulsionaron inexplicablemente. Sentimos que el §H$code_name_animator$§! se apoderaba de nosotros momentáneamente. Nos invitaba a observar.\n\nLa penumbra se disipó para revelar una silueta gesticulante. Sus miembros se extendían bruscamente, en una dirección y luego en otra, por cordones vaporosos hasta que, de repente, sus ataduras se disiparon. La figura se derrumbó.\n\nPoco a poco, volvió a la vida. Miembro a miembro se levantó, sin sus antiguos lazos, y reanudó su hipnótica danza."
 shroud.4055.desc.know_animator: "Entonces nos dimos cuenta de que ya nos habíamos encontrado con esta entidad anteriormente. $the_animator_of_clay_color_article_cap$ se estaba divirtiendo. Dondequiera que se despierte lo inanimado y donde la materia inerte se impregna de alma, allí también se puede encontrar."
 shroud.4055.a: "La marioneta baila sin ataduras."
 shroud.4060.desc: "[This.GetMinorPatronCradleComposerIntro]\n\nSentimos que no estamos solos. Un §H$code_name_outsider$§! invade nuestras mentes, provocando una tormenta de energía psiónica a nuestro alrededor.\n\nUn profundo sentimiento de pesar y nostalgia se apodera de nuestra psique colectiva. Vemos imágenes de sistemas estelares familiares de hace miles de años.\n\nSea lo que sea esta entidad, parece conocer bien nuestra galaxia. ¿Formó parte de ella en algún momento?"
 shroud.4065.title: "$the_outsider_article_cap$ Surge"
 shroud.4065.desc.intro: "El poder lejano conocido como §H$code_name_outsider$§! nos abrasaba con angustia desde dentro del §HVelo§!. No habló, pero su advertencia era inconfundible:\n\n§HCaminad con cuidado en este reino. No sabéis qué poderes podéis despertar. La ruina está a solo un paso...§!"
 shroud.4065.desc.outro_default: "Signifique esto lo que signifique, ahora sabemos de la existencia de $the_outsider_color_article$. Todavía queda por ver cómo se entrelazan nuestros destinos."
 shroud.4065.desc.outro_know_zroni: "Esta entidad no es ajena a nuestra galaxia. Comparte la singular huella mental de los zroni, una civilización que ya nos es conocida. ¿Cómo es posible tal cosa?\n\nSignifique esto lo que signifique, ahora sabemos de la existencia de $the_outsider_color_article$. Todavía queda por ver cómo se entrelazan nuestros destinos."
 shroud.4065.desc.outro_left_zroni: "Reconocemos a este ser. Es la Clarividente a la que encontramos al cruzar una §Hgrieta astral§!. ¿Esto es lo que le deparaba el devenir? ¿Ahora es $the_outsider_color_article$?"
 shroud.4065.a.default: "¿Qué horrores le han sobrevenido?"
 shroud.4065.a.know_zroni: "¿Los zroni aún viven?"
 shroud.4065.a.left_zroni: "Procuremos no correr su misma suerte."
 shroud.4070.desc: "[This.GetMinorPatronComposerEaterIntro]\n\nUna masa cambiante de pensamientos se instala en nuestra mente. Un peso abrasivo nos invade, distorsionando nuestra percepción del tiempo. Hasta la más mínima hebra de pensamiento se estrella y desmadeja contra la textura de este dominio inaudito.\n\nAmaina el éxtasis, y el §H$code_name_tide$§! prosigue su marcha, no sin dejar una honda impronta.\n\nEsta huella permanece ante nosotros y nos invita a seguirla."
 shroud.4075.title: "$the_endless_tide_article_cap$ Surge"
 shroud.4075.desc: "El §H$code_name_tide$§! se ha abierto paso a través del §HVelo§!. Informe pero no por ello menos inmenso, su presencia colma y desborda todo el espectro de nuestra percepción.\n\nNos envuelve por completo un terso susurro que exhuma relatos sepultados tiempo ha. Vemos imperios olvidados reducidos a polvo por la marcha imparable del tiempo. Cada molécula que nos roza, un recuerdo.\n\nA lo largo de esta hemeroteca inabarcable hay patrones evidentes, ciclos de ambición y ruina, triunfo y declive. Alberga saber esta oquedad infinita.\n\n$the_endless_tide_color_article_cap$ trasciende el tiempo mismo, erosionando la ignorancia y sacando a relucir únicamente aquello que posee un afán de prevalecer."
 shroud.4075.a: "Ahora la sabiduría es nuestra."
 shroud.4080.desc: "[This.GetMinorPatronComposerEaterIntro]\n\nLa gravedad de nuestras acciones nos arrastra más hacia adentro, hacia la sombra opresiva de una forma montañosa.\n\nDesde sus cimas cenicientas, una mirada descarnada se nos clava en la mente. No alcanzamos a comprender la magnitud del §H$code_name_mountain$§! que se alza ante nosotros.\n\nLa cumbre más alta nos llama y nos desafía a ascender."
 shroud.4085.title: "$the_pale_mountain_article_cap$ Surge"
 shroud.4085.desc: "Escalando por la vertiginosa pared del §HVelo§!, llegamos a la cumbre intangible. El §H$code_name_mountain$§! nos ha puesto a prueba, como hizo con todos los que nos precedieron aquí.\n\nUn descomunal mausoleo de imperios olvidados entona a coro melodías de historias ya imperceptibles. Cada estrato de fracaso y ambición errónea ha ido conformando los cimientos de lo que llegaría a continuación.\n\nNo obstante, esta no es una fosa estancada, sino un crisol. En este ciclo de devastación y edificación, los escombros de ayer vertebran los triunfos que avendrán mañana. La destrucción no es un fin, sino un nuevo comienzo.\n\n$the_pale_mountain_color_article_cap$ se erige en nuestras mentes."
 shroud.4085.a: "La montaña crecerá."
 shroud.4090.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\nUn grato peso ralentiza nuestros pensamientos hasta reducirlos a un borrón reconfortante. Al relajarse tensiones de las que ni siquiera éramos conscientes, solo queda una calma sublime, arrulladora.\n\nAl ahondar en este abrazo fastuoso, observamos que se aproxima un §H$code_name_dream$§!. Su presencia abrumadora nos sacude, y todo nuestro ser lo recorren susurros de extravagante deleite.\n\nSu indulgencia y ociosidad tientan a nuestra curiosidad."
 shroud.4095.title: "$the_golden_dream_article_cap$ Surge"
 shroud.4095.desc: "Al dejarnos llevar por el esparcimiento en un apacible recoveco del §HVelo§!, llegamos sin pretenderlo a los salones áureos del §H$code_name_dream$§!.\n\nSedosas tentaciones se adueñan de nuestras mentes mientras un rico mosaico de esplendores se despliega ante nosotros. Tal era el opulento peso de la negligencia indulgente, que amenazaba con dejar inertes nuestras capacidades cognitivas.\n\n$the_golden_dream_color_article_cap$ nos ofrece lujos ajenos a nuestra comprensión."
 shroud.4095.a: "El sueño despierta."
 shroud.4100.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\nEl caótico ajetreo del Velo se deforma, dando lugar a un errático vórtice de energía psiónica. De pronto, torrentes multitudinarios se despliegan y convergen, apaciguados por una fuerza invisible hasta componer nuevas formas más plácidas.\n\nObservando el fenómeno, nos apercibimos de que estos movimientos los orquestaba una §H$code_name_point$§! que imponía orden en todo caos.\n\nSu sosiego nos llama."
 shroud.4105.title: "$the_hollow_point_article_cap$ Surge"
 shroud.4105.desc: "Nuestra división de [GetTelepathPlural] se volcó en el intento de comulgar con el turbulento desorden del Velo, pero fue en vano. Cuando al fin desistieron, los embargó plenamente el abrazo de la §H$code_name_point$§!.\n\nEn nuestra mente se reprodujeron imágenes de una abrumadora procesión de conflictos, todos llenos de distracciones de caos y furia.\n\nEntre aquel maremágnum, discernimos la presencia atenta y atemporal de $the_hollow_point_color_article$. Sereno y paciente, aguarda a que las penurias incesantes de la galaxia lleguen a su ansiado fin."
 shroud.4105.desc.outro_homicidal: "A pesar de nuestros instintos más primordiales, nuestras mentes se han expuesto a una curiosa forma de pensar."
 shroud.4105.a.default: "Ante todo conflicto, la paciencia perdurará."
 shroud.4105.a.homicidal: "Una ensoñación idealista... Conocemos nuestro verdadero propósito."
 shroud.4110.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\nEl ruido anárquico da paso a una oscuridad aplastante. Notamos que nuestras intenciones son escrutadas, estudiadas, juzgadas.\n\nEn lo más recóndito de nuestro ser perdura una expectativa apremiante de orden, irrenunciable e invariable. El §H$code_name_throne$§! juzga nuestra intención.\n\nTras pasar su mirada, se disipa la oscuridad. El infeccioso escrutinio nos exhorta a enmendarnos."
 shroud.4115.title: "$the_vacant_throne_article_cap$ Surge"
 shroud.4115.desc: "Nos hemos arrodillado en presencia del §H$code_name_throne$§!.\n\nEste escrutó nuestras mentes con la fría indiferencia de la autoridad más desafectada, corrigiéndonos conforme recorría nuestro ser.\n\nEl vacío apabullante de $the_vacant_throne_color_article$ no ofrece piedad ni sufrimiento alguno, ni espera más que orden y certezas, imponiéndolas allá donde estas faltan.\n\nAhora cargamos con este peso."
 shroud.4115.a: "La presencia del juicio es eterna."
 shroud.4120.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\nNos asalta de repente una sensación de aceleración, y una sobrecarga de información ininteligible desborda nuestra percepción por completo. Una fuerza nos propulsa rumbo a horizontes infinitos.\n\nUna entidad se mueve en paralelo a nosotros. Esta §H$code_name_river$§! permanece apenas unos instantes antes de perderse más allá de los límites de nuestra comprensión.\n\nDebemos seguirla."
 shroud.4125.title: "$the_black_river_article_cap$ Surge"
 shroud.4125.desc: "Solo cuando nos obligamos a superar los límites de nuestra comodidad en el §HVelo§!, pudimos alcanzar por fin a la §H$code_name_river$§!.\n\nNos sobrevino un instinto de movimiento omnidireccional, cuya ilógica velocidad ponía en jaque todo lo que creíamos entender. Pasó el arrebato y nos dejó con la sensación de haber recorrido una distancia inmensa en el más breve de los instantes.\n\nFinalmente, entendimos a $the_black_river_color_article$ y su viaje perpetuo. La inmensidad de la galaxia no es sino el más amplio de los caminos, y con nuestro caminar lo labraremos."
 shroud.4125.a: "Velocidad en estado puro."
 shroud.4135.title: "$end_of_the_cycle_article_cap$"
 shroud.4135.desc: "Sin previo aviso, somos arrojados hacia el Velo. Una presencia acechante invade nuestras mentes.\n\nEs $end_of_the_cycle_color_article$ y siempre nos ha estado esperando. De repente, nuestros [GetTelepathPlural] hablan sumidos en un trance, una docena de voces al unísono: §R\"TODAVÍA NO ES VUESTRO MOMENTO\".§! Una pausa. §R\"PERO PODRÍA SERLO\".§!\n\nNo dicen nada más, pero se ha realizado una oferta, eso está claro. Poder, conocimiento y riquezas sin medida están a nuestro alcance.\n\n§RSolo tenemos que adelantar el fin.§!"
 shroud.4135.a: "$utopia.3308.a$"
 shroud.4135.a.tt: "Sustituye los dominios de todos los mecenas conocidos con $end_of_the_cycle_color_article$.\nSe nos darán 50 o más años para consumir la galaxia en el §H$end_aura$§!. Si lo logramos, termina la partida.\n$covenant.cycle.tooltip$$shroud.8450.a.tech_tooltip$\n$shroud.4135.psionic_components_insight$\n\nRevierte todos los acuerdos con otros mecenas\n$eotc_opinion_modifier_tooltip$"
 shroud.4135.b: "Salgamos del Velo y tratemos de olvidarlo."
 shroud.4135.b.forging_our_own_path: "Nuestra senda está delineada. Caminamos solos."
 shroud.4135.psionic_components_insight: "Progreso de técnica ganado por todos los ['concept_psionic_components']: §G+10%§!"
 concept_psionic_components: "Componentes psiónicos"
 concept_psionic_components_desc: "$tech_psionic_bombers$\n$tech_psionic_lightning$\n$tech_psionic_disruptor$\n$tech_zro_launcher$\n$tech_psionic_shield$\n$tech_precognition_interface$\n$tech_psi_jump_drives$"
 triggered_opinion_eotc_situation_stage1: "Invocando el fin"
 shroud.4140.title: "Todo o nada"
 shroud.4140.desc: "Nuestro destino está ligado a $end_of_the_cycle_color_article$; dondequiera que florezca su aura, también lo hace nuestra población. Una simple conclusión ha surgido en nuestro interior: cualquier cosa que obstaculice el aura obstaculiza el [This.GetName], y por lo tanto debe ser eliminada.\n\nSi lo deseamos, podemos dejar de lado cualquier límite existente en nuestros objetivos militares y conquistar a nuestros enemigos sin piedad. Nada debe interponerse en el camino de la supremacía del fin."
 shroud.4140.a: "Que se cumpla el destino."
 shroud.4140.a.tooltip: "Obtiene acceso al §Hcasus belli§! ['concept_total_war']\n$eotc_opinion_modifier_2_tooltip$"
 triggered_opinion_eotc_situation_stage2: "Heraldos del fin"
 shroud.4145.title: "Aniquilación"
 shroud.4145.desc_1.common_1: "A medida que el §R$end_aura$§! impregna la galaxia, percibimos una resistencia creciente."
 shroud.4145.desc_1.common_2: "No importa; no nos quedaremos esperando a que los otros acepten el $end_of_the_cycle_color_article$."
 shroud.4145.desc_1.default: "$shroud.4145.desc_1.common_1$ Nuestros vecinos lejanos están volviéndose rápidamente contra nosotros. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_1.homicidal: "$shroud.4145.desc_1.common_1$ La antipatía de nuestros enemigos se está volviendo cada vez más enquistada. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_2: "Inspirados por la voluntad de nuestro mecenas, hemos ideado nuevos métodos para gastar energía y materia con el fin de alimentar el aura. La materia misma del universo puede ser sacrificada para avanzar hacia el fin."
 shroud.4145.a: "Debemos hacer todo lo necesario."
 shroud.4145.a.tooltip: "$eotc_opinion_modifier_3_tooltip$\nDesbloquea los edictos:\n$t$- ['edict:annihilation_of_matter', $edict_annihilation_of_matter$]\n$t$- ['edict:annihilation_of_energy', $edict_annihilation_of_energy$][GetDimensionalCollapseEdictGain]"
 shroud.4145.dimensional_collapse: "\n$t$- ['edict:dimensional_collapse', $edict_dimensional_collapse$]"
 triggered_opinion_eotc_situation_stage3: "$triggered_opinion_eotc_situation_stage2$"
 shroud.4150.title: "El fin se acerca"
 shroud.4150.desc: "Nuestro mecenas habla en silencio. Al sentir la inminencia del fin del ciclo, una energía renovada recorre todo el [This.GetName]. Nos invade una sensación de urgencia y vigor.\n\nSi queremos satisfacer la voluntad del fin, la energía colectiva de todos los [This.GetSpeciesNamePlural] debe aplicarse con un único propósito. Debemos manifestar el poder de nuestro mecenas y completar la propagación de su aura hasta los confines de la galaxia."
 shroud.4150.a: "Este es nuestro momento."
