 # Experimentation Chambers
 building_experimentation_chambers_1: "Cámaras de experimentación"
 building_experimentation_chambers_1_desc: "Una instalación de alto secreto donde se experimenta con criminales irredimibles. Se compone principalmente de celdas y laboratorios de investigación."
 building_experimentation_chambers_2: "Complejo de experimentación"
 building_experimentation_chambers_2_desc: "Un campus de tecnología ultrasecreta e instalaciones de internamiento, donde los [Owner.GetIndividualNamePlural] que han quebrantado la ley son utilizados como sujetos en experimentos dirigidos por los principales [Owner.GetResearchers] del imperio."
 building_experimentation_chambers_3: "Nexo de experimentación"
 building_experimentation_chambers_3_desc: "Una red de tecnología de máxima seguridad con centros de internamiento. [Owner.GetResearchers] de élite llevan a cabo experimentos inéditos en [Owner.GetIndividualNamePlural] provenientes de los bajos fondos del imperio."
 # Lifecrypt
 # Lifecrypt (Normal)
 building_lifecrypt_1: "Torre de absorción"
 building_lifecrypt_1_desc: "Estos monumentales dispositivos son capaces de drenar el exceso de energía de las poblaciones que trabajan cerca de ellos. Los individuos asignados llevan un equipo especial que canaliza su fuerza vital hacia un conducto central, desde donde se redistribuye a los que ostentan un estatus mayor."
 building_lifecrypt_2: "Succionador de almas"
 building_lifecrypt_2_desc: "Aunque su nombre pueda sugerir lo contrario, los succionadores de almas se basan en la ciencia. Calibrados específicamente para recolectar energías de individuos a través de una conexión física, son capaces de extraer inmensas cantidades de metabolismo de los organismos sin poner en peligro sus vidas."
 building_lifecrypt_3: "Conducto de esencia"
 building_lifecrypt_3_desc: "Los límites de los conductos de esencia deben estar claramente señalizados, ya que entrar en su área de influencia puede resultar mortal para los que no cuenten con el equipo adecuado. Los individuos asignados están entrenados para regular su metabolismo a fin de no donar demasiada energía de golpe."
 # Lifecrypt (Machine)
 building_lifecrypt_machine_1: "Batería de succión"
 building_lifecrypt_machine_1_desc: "Estos monumentales dispositivos son capaces de drenar el exceso de energía procesada por los drones que operan cerca de ellos. Los trabajadores asignados usan equipos especializados que canalizan sus baterías hacia un conducto central desde donde se redistribuyen a aquellos con un propósito superior."
 building_lifecrypt_machine_2: "Complejo de baterías"
 building_lifecrypt_machine_2_desc: "Calibrados específicamente para extraer energía de los drones a través de una conexión física, estos dispositivos son capaces de absorber enormes cantidades de excedentes sin sufrir fallo crítico alguno."
 building_lifecrypt_machine_3: "Nexo de baterías"
 building_lifecrypt_machine_3_desc: "Los límites del nexo de baterías deben estar claramente señalizados, ya que entrar en su área de influencia puede ser mortal para las unidades que no cuenten con el equipo aislante adecuado."
 # Lifecrypt (Hive Mind)
 building_lifecrypt_hive_mind_1: "Torre de absorción"
 building_lifecrypt_hive_mind_1_desc: "Estos monumentales dispositivos son capaces de drenar el exceso de energía de los drones que operen cerca de ellos. Los trabajadores asignados usan equipos especializados que canalizan su fuerza vital hacia un conducto central desde donde puede redistribuirse entre aquellos de castas superiores."
 building_lifecrypt_hive_mind_2: "Succionador de almas"
 building_lifecrypt_hive_mind_2_desc: "Aunque su nombre pueda sugerir lo contrario, los succionadores de almas se basan en la ciencia. Calibrados específicamente para extraer energía de los drones a través de una conexión física, son capaces de absorber enormes cantidades de metabolismo de los organismos sin poner en peligro sus vidas."
 building_lifecrypt_hive_mind_3: "Conducto de esencia"
 building_lifecrypt_hive_mind_3_desc: "Los límites de los conductos de esencia deben estar claramente señalizados, ya que entrar en su área de influencia puede ser mortal para los drones que no cuenten con el equipo adecuado. Los trabajadores asignados están entrenados para regular su metabolismo y no donar demasiada energía de golpe."
 # Lifecrypt (Corporate)
 building_lifecrypt_corporate_1: "Cuartel general de sinergia"
 building_lifecrypt_corporate_1_desc: "Estos monumentales dispositivos son capaces de drenar el exceso de energía de los aprendices que trabajan cerca de ellos. Los individuos asignados llevan un equipo especial que canaliza su fuerza vital hacia un conducto central, desde donde se redistribuye a los que ocupan puestos de mayor rango."
 building_lifecrypt_corporate_2: "Administración de sinergia"
 building_lifecrypt_corporate_2_desc: "Calibrados específicamente para extraer energía de los individuos a través de una conexión física, los edificios de administración de sinergia son capaces de absorber enormes cantidades de metabolismo de los aprendices sin poner en peligro sus vidas de forma apreciable."
 building_lifecrypt_corporate_3: "Nexo de sinergia"
 building_lifecrypt_corporate_3_desc: "Los límites del nexo de sinergia deben estar claramente marcados, ya que adentrarse en su área de influencia puede ser fatal para los aprendices que no cuenten con el equipo adecuado. Los individuos asignados reciben formación en técnicas avanzadas de sinergia para garantizar su supervivencia durante todo el proceso."
 # Psionic Suppressor
 building_psionic_suppressor: "Supresor psiónico"
 building_psionic_suppressor_desc: "Este complejo soporta una serie de atenuadores psiónicos de largo alcance que disipan $PSIONIC_AURA_PLURAL$ por todo el sistema estelar y evitan su propagación."
 building_psionic_suppressor_tt: "Reducción diaria de la §Hintensidad§! de §Y$PSIONIC_AURA$§! en este sistema: $@building_psionic_suppressor_decrease|0$"
 # Materiality Engine
 building_materiality_engine: "Motor de materialidad"
 building_materiality_engine_plural: "Motores de materialidad"
 building_materiality_engine_desc: "La energía psiónica del Velo se extiende por todos los puntos de la galaxia física. El $building_materiality_engine$ aprovecha esta interfaz, lo que permite atravesar dimensiones y materializar componentes y recursos valiosos."
 building_materiality_engine_tt: "Inicia un §Yproyecto especial§! para obtener la tecnología psiónica ['concept_component'] a partir del §HVelo§!. Cuando se completa este proyecto, aumenta la producción de este edificio y la cantidad de §H$building_materiality_engine_plural$§! que se pueden construir."
 biology_unit_is_observator_tt: "$t$£job_calculator_biologist£ $job_calculator_biologist_plural$ se convierten en $job_observator_drone_plural_with_icon$"
