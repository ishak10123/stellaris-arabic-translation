 shroud.1510.title: "$PSIONIC_AURA$ contendientes"
 shroud.1510.desc: "Nuestra §H$PSIONIC_AURA$§! en el sistema [from.GetName] está luchando contra un aura contraria, originaria del sistema vecino [fromfrom.GetName]. Nuestros [GetResearchers] psiónicos ya habían modelado este comportamiento, aunque esta es la primera vez que experimentamos el fenómeno de primera mano.\n\nSegún la teoría, el aura más potente (la que se proyecta con mayor intensidad) reducirá gradualmente la fuerza opuesta. Si esta lucha conduce a la decadencia absoluta, el aura que prevalezca podría fluir hasta el sistema vacante.\n\nEs una auténtica batalla de mentes."
 shroud.1510.a: "Nuestra voluntad triunfará."
 shroud.1550.title: "El poder del deseo"
 shroud.1550.desc.common_1: "Nuestras incursiones en el §HVelo§! han provocado que sus energías afecten al espacio observable. Estos efectos, a pesar de ser notorios, se han mostrado intermitentes y aislados."
 shroud.1550.desc.common_2: "Nuestras acciones se extienden por todo el Velo y nos acercan más a seres de gran poder. Si nos ganamos el favor de estas entidades, es posible que podamos canalizar su energía psiónica en la realidad corpórea. Nuestros [GetTelepathPlural] tienen la hipótesis de que el aura resultante fortalecerá nuestro imperio,"
 shroud.1550.desc_1.knows: "$shroud.1550.desc.common_1$ las §H\"$PSIONIC_AURA_PLURAL$\"§! ofrecen una manera de convertir esta influencia en un flujo constante."
 shroud.1550.desc_1.default: "$shroud.1550.desc.common_1$ la teoría de las §H\"$PSIONIC_AURA_PLURAL$\"§! ofrece una manera de convertir esta influencia en un flujo constante."
 shroud.1550.desc.knows: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$ así como nuestros aliados, mientras debilita a aquellos que se sublevan contra nosotros, tal y como ya habíamos observado."
 shroud.1550.desc.knows.homicidal: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$ mientras debilita a aquellos que se sublevan contra nosotros, tal y como ya habíamos observado."
 shroud.1550.desc.default: "$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$ así como nuestros aliados, mientras debilita a aquellos que se sublevan contra nosotros."
 shroud.1550.desc.default.homicidal: "$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$ mientras debilita a aquellos que se sublevan contra nosotros."
 shroud.1550.a: "Qué prometedor."
