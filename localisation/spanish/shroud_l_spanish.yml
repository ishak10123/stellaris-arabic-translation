 tr_psionics_endbringers_cult_desc: "$ALLOW_CHAMBER_OF_SILENCE$"
 tr_psionics_endbringers_cult_delayed: "Una vez has oído la voz, no puedes ignorarla. No sometemos a su voluntad."
 building_chamber_of_silence: "Cámara del silencio"
 building_chamber_of_silence_desc: "Aquí se traen a individuos psiónicos de todo nuestro imperio para comulgar con el Velo en cámaras de silencio protector."
 building_chamber_of_silence_madness_1_tt: "Reduce los efectos negativos de ['modifier:endbringers_madness_1'] en §G$@chamber_of_silence_effect_mult|0%$§!."
