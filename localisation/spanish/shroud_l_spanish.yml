 shroud.3.diplo_title: "$utopia.3000.name$"
 shroud.10.name: "Un aliado contra la reina"
 shroud.10.desc.intro: "El Velo resuena con una ferocidad inusitada. Vastas espirales de energía se retuercen y se agitan en el éter.\n\nEn mitad de este caos estroboscópico, observamos los ecos psiónicos de la reina sintética. Infinita y omnipotente, juguetea con la galaxia en la palma de su mano."
 shroud.10.desc.outro: "¿Cuál es la razón? ¿Conocerá una debilidad que escapa a nuestra compresión? ¿Nos ayudará si llegamos hasta ella?\n\nAl concentrar nuestra mente en el Animante, percibimos su impaciencia. Lo más probable es que solo tengamos una oportunidad de pedirle ayuda en este menester. Para ello, se necesitarán grandes cantidades de §Henergía§! y §H$sr_zro$§!."
 shroud.10.desc: "$shroud.10.desc.intro$\n\nNo somos los únicos que la observamos. Desde un punto de observación oculto, la entidad conocida como $the_animator_of_clay_color_article$ observa, sin intimidarse por el poder ilimitado de la reina.\n\n$shroud.10.desc.outro$"
 shroud.10.desc.1: "$shroud.10.desc.intro$\n\nNo somos los únicos que la observamos. Desde un punto de observación oculto, $the_animator_of_clay_color_article$ observa, sin intimidarse por el poder ilimitado de la reina.\n\n$shroud.10.desc.outro$"
 shroud.10.a: "$animator.shroud$"
 shroud.10.b: "No necesitamos su ayuda."
 shroud.10.b.tt: "No habrá otra oportunidad de pedirle ayuda al Animante para derrotar a Cetana."
