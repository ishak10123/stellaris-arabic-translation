 war_goal_wg_proxy_war: "Guerra indirecta"
 war_goal_wg_proxy_war_desc: "Las guerras se empiezan con rumores dañinos y susurros en la sombra. Si el agresor gana, obtiene el control de los sistemas reclamados y genera un §Y33%§! menos de §Yamenaza§! por cada sistema conquistado."
 shroud.5055.title: "$proxy_war_busted_modifier$"
 shroud.5055.desc.common: "Nos han engañado.\n\nNuestros agentes de inteligencia interceptaron comunicaciones encubiertas de §H[from.GetName]§!. Estas revelaron su plan de involucrarnos en una guerra indirecta.\n\nHan negado rotundamente cualquier implicación, pero el daño en nuestra relación ya está hecho."
 shroud.5055.desc.galactic: "$shroud.5055.desc.common$ La noticia de su duplicidad se ha extendido con rapidez, perjudicando la reputación de [from.GetName] en toda la galaxia."
 shroud.5060.title: "$proxy_war_busted_modifier$"
 shroud.5060.desc.common: "Aunque logramos provocar un conflicto, la operación no ha salido del todo bien. Interceptaron las comunicaciones de uno de nuestros agentes, revelando nuestras acciones encubiertas a todas las partes interesadas.\n\nNuestros intentos por justificarlas han sido en vano."
 shroud.5060.desc.galactic: "$shroud.5060.desc.common$ Este escándalo no solo ha dañado nuestra relación con los beligerantes, sino que también ha dañado nuestra reputación a escala galáctica."
 shroud.5060.desc.default: "$shroud.5060.desc.common$ Este suceso ha dañado bastante nuestra relación con los beligerantes."
 shroud.5060.a.tt: "La opinión de los imperios implicados en la §Yguerra indirecta§! sobre nosotros ha caído en §R-200§!."
 proxy_war_busted_modifier: "Beligerancia indirecta descubierta"
 proxy_war_busted_modifier_desc: "Los bandos implicados en el conflicto han descubierto maquinaciones que provocaron la guerra indirecta. Esto ha perjudicado nuestra reputación en general."
 opinion_proxy_war_busted: "$proxy_war_busted_modifier$"
 PROXY_WAR_BUSTED_MESSAGE_TYPE_TITLE: "$proxy_war_busted_modifier$"
 PROXY_WAR_BUSTED_MESSAGE_TYPE_DESC: "Los beligerantes implicados han descubierto que nosotros provocamos la guerra indirecta.\n$shroud.5060.a.tt$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_TITLE: "$proxy_war_busted_modifier$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_DESC: "Hemos descubierto el complot de §H$INSTIGATOR$§! para arrastrarnos a una guerra indirecta.\nNuestra opinión de §H$INSTIGATOR$§! ha caído en §R-200§!."
