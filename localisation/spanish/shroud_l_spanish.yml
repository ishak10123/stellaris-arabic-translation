 # Entropy Drinkers
 civic_tooltip_not_entropy_drinkers: "No tiene un principio ['concept_entropy_drinkers_civics']"
 civic_entropy_drinkers: "Bebedores de entropía"
 civic_entropy_drinkers_desc: "$civic_ap_blockade_tt$\n\nEsta sociedad drena el valioso metabolismo de la población ociosa a través de conexiones psíquicas parasitarias. Una vez recolectadas adecuadamente, estas energías pueden redistribuirse a las clases más importantes."
 civic_entropy_drinkers_effects: "Activa los siguientes §H$EDICTS$§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\nPermite construir: £building£['building:building_lifecrypt_1'].\nLos líderes empiezan con el rasgo ['concept_leader_trait_psionic']."
 civic_entropy_drinkers_psionic_modifier: "- $energy_with_icon$ por cada $pop_group_unit$ £pop£ poblaciones psiónicas: §G+0,5§!"
 civic_entropy_drinkers_machine: "Extractores de energía"
 civic_entropy_drinkers_machine_desc: "$civic_ap_blockade_tt$\n\nLa asignación adecuada de energía es esencial para garantizar la máxima eficiencia de la máquina en su conjunto. Todas las unidades se han diseñado teniendo esto en cuenta, lo que permite sobrecargar periódicamente los nodos críticos cuando es necesario."
 civic_entropy_drinkers_machine_effects: "Activa los siguientes §H$EDICTS$§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council_machine',$edict_sanguine_council_machine$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\nPermite construir: £building£['building:building_lifecrypt_machine_1'].\nLos líderes empiezan con el rasgo ['concept_leader_trait_psionic']."
 civic_entropy_drinkers_hive_mind: "Casta parasitaria"
 civic_entropy_drinkers_hive_mind_desc: "$civic_ap_blockade_tt$\n\nEste colectivo reutiliza el valioso metabolismo de los drones inferiores a través de conexiones psíquicas parasitarias. Una vez recolectadas adecuadamente, estas energías pueden redistribuirse a las castas más importantes."
 civic_entropy_drinkers_hive_mind_effects: "Activa los siguientes §H$EDICTS$§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\nPermite construir: £building£['building:building_lifecrypt_hive_mind_1'].\nLos líderes empiezan con el rasgo ['concept_leader_trait_psionic']."
 civic_entropy_drinkers_corporate: "Vampiros corporativos"
 civic_entropy_drinkers_corporate_desc: "$civic_ap_blockade_tt$\n\nEsta $gov_megacorporation$ extrae el valioso metabolismo de la población ociosa a través de conexiones psíquicas parasitarias. Una vez recolectadas adecuadamente, estas energías pueden redistribuirse a la alta dirección."
 civic_entropy_drinkers_corporate_effects: "Activa los siguientes §H$EDICTS$§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\nPermite construir: £building£['building:building_lifecrypt_corporate_1'].\nLos líderes empiezan con el rasgo ['concept_leader_trait_psionic'].\nEl £building£ §Y$building_executive_retreat$§! $megacorp_civic_branch_office_building_effect$"
 has_not_begun_non_psionic_ascension: "NO tiene un camino de §Yascensión no psiónica§!"
 has_not_begun_non_psionic_ascension_success: "$TRIGGER_PASS$$has_not_begun_non_psionic_ascension$"
 has_not_begun_non_psionic_ascension_fail: "$TRIGGER_FAIL$$has_not_begun_non_psionic_ascension$"
 # Superstitious Beliefs
 civic_tooltip_not_superstitious_beliefs: "No tiene un principio ['concept_superstitious_beliefs_civics']"
 civic_superstitious_beliefs_desc_common: "Se deben realizar las ceremonias adecuadas antes de cada decisión importante para armonizar con las fuerzas invisibles que moldean su destino."
 civic_superstitious_beliefs_common_effects: "Activa ['edict:galactic_dowsing',$edict_galactic_dowsing$]\nEl ['concept_sb_cycle'] cambia cada 13 años.\nLos eventos fortuitos beneficiarán o alterarán tu imperio de manera periódica."
 civic_superstitious_beliefs: "Creencias supersticiosas"
 civic_superstitious_beliefs_desc: "Esta sociedad afirma haber descubierto un mecanismo ritual para predecir el futuro, aprovechando el reconocimiento de patrones esotéricos y el análisis de anomalías cíclicas. $civic_superstitious_beliefs_desc_common$"
 civic_superstitious_beliefs_effects: "Sustituye:\n$t$- £job_priest£ $job_priest_plural$ por £job_superstitious_beliefs_priest£ $job_superstitious_beliefs_priest_plural$\n$t$- £job_high_priest£ $job_high_priest_plural$ por £job_superstitious_beliefs_high_priest£ $job_superstitious_beliefs_high_priest_plural$\n$civic_superstitious_beliefs_common_effects$"
 civic_machine_superstitious_beliefs: "Buscadores de patrones"
 civic_machine_superstitious_beliefs_desc: "Este imperio de máquinas afirma ser capaz de resolver lo desconocido, aprovechando el reconocimiento de patrones esotéricos y el análisis de anomalías cíclicas. Antes de cada decisión importante, se analizan las alineaciones celestes para garantizar el mejor resultado posible."
 civic_machine_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_hive_superstitious_beliefs: "Nexo zodiacal"
 civic_hive_superstitious_beliefs_desc: "Este colectivo afirma haber descubierto un mecanismo ritual para predecir el futuro, aprovechando el reconocimiento de patrones esotéricos y el análisis de anomalías cíclicas. $civic_superstitious_beliefs_desc_common$"
 civic_hive_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_corporate_superstitious_beliefs: "Empresa de la suerte"
 civic_corporate_superstitious_beliefs_desc: "Esta corporación afirma haber descubierto un mecanismo ritual para predecir el futuro, aprovechando el reconocimiento de patrones esotéricos y el análisis de anomalías cíclicas. Para maximizar los resultados, se sopesan las ganancias y pérdidas futuras junto con los indicadores clave de rendimiento de las alineaciones celestes ideales."
 civic_corporate_superstitious_beliefs_effects: "Sustituye:\n$t$- £job_priest£ $job_priest_plural$ por £job_superstitious_beliefs_priest_corporate£ $job_superstitious_beliefs_priest_corporate_plural$\n$t$- £job_high_priest£ $job_high_priest_plural$ por £job_superstitious_beliefs_high_priest_corporate£ $job_superstitious_beliefs_high_priest_corporate_plural$\n$civic_superstitious_beliefs_common_effects$"
 # Twisted Experimenters
 civic_twisted_experimenters: "Sentencias experimentales"
 civic_twisted_experimenters_desc: "El proceso judicial y la sed de conocimiento comparten una única solución en esta sociedad. Trabajando en el más absoluto secreto, los investigadores llevan a cabo duros experimentos con sujetos sacados del mundo criminal. Las muertes ocasionales son el precio del progreso."
 civic_twisted_experimenters_effects: "Comienza con la situación ['concept_experimental_testing'], que otorga avances de tecnología al completarse.\nPuede construir y comienza con: £building£['building:building_experimentation_chambers_1'].\nTodos los esclavos que no sean máquinas obtienen acceso al trabajo de esclavo ['concept_slave_orderly'].\nAcceso a ['concept_slave_army']: §Y$abomination_army$§!"
 civic_twisted_experimenters_hive_mind: "Consciencia correctiva"
 civic_twisted_experimenters_hive_mind_desc: "Los desviados de este colectivo se utilizan como sujetos de prueba en investigaciones científicas pioneras sin restricciones en cuanto a los métodos utilizados. Esto permite que los drones problemáticos conserven cierto valor como activos prescindibles."
 civic_twisted_experimenters_hive_mind_effects: "Comienza con la situación ['concept_experimental_testing_hive_mind'], que otorga conocimientos en tecnología al completarse.\nPermite construir y comienza con: £building£['building:building_experimentation_chambers_1']."
 civic_twisted_experimenters_corporate: "I+D judicial"
 civic_twisted_experimenters_corporate_desc: "Esta $gov_megacorporation$ ha puesto en marcha una interesante iniciativa para reducir las ineficiencias judiciales y maximizar la innovación científica. Los ciudadanos problemáticos son reasignados a proyectos de investigación experimental, donde se someten a rigurosas pruebas para lograr avances tecnológicos. Las tasas de mortalidad se mantienen dentro de las expectativas previstas."
 civic_twisted_experimenters_corporate_effects: "Comienza con la situación ['concept_experimental_testing_corporate'], que otorga avances de tecnología al completarse.\nPuede construir y comienza con: £building£['building:building_experimentation_chambers_1'].\nPermite construir £building£['concept_building_carceral_test_facility'] $BRANCH_OFFICE_BUILDING$.\nTodos los esclavos que no sean máquinas obtienen acceso al trabajo de esclavo ['concept_slave_orderly'].\nAcceso a ['concept_slave_army']: §Y$abomination_army$§!"
 experimenters_we_will_learn_1: "Aprenderemos mucho con esto."
 experimenters_we_will_learn_2: "Una nueva vía para la experimentación."
 experimenters_we_will_learn_3: "Nuevos parámetros de prueba, qué emocionante."
 experimenters_tragic_lesson_1: "Aprenderemos mucho de esta tragedia."
 experimenters_tragic_lesson_2: "Una tragedia..., pero una oportunidad para nuevos experimentos."
 experimenters_tragic_lesson_3: "Una lección trágica, pero los datos serán útiles."
 experimenters_ermerging_crime_1: "Este entorno proporcionará a nuestros [GetExperimentalEngineerPlural] amplias oportunidades para realizar nuevos experimentos."
 experimenters_ermerging_crime_2: "Como mínimo, esta criminalidad nos brinda una gran oportunidad para explorar nuevas y apasionantes vías en la investigación científica."
 experimenters_ermerging_crime_3: "Estas condiciones emergentes nos brindarán una gran cantidad de nuevas oportunidades para la experimentación."
 experimenters_ermerging_crime_4: "Entornos como este son una fuente muy rica de sujetos de prueba para nuestros [GetExperimentalEngineerPlural]."
 # Secret Societies
 civic_tooltip_not_secret_societies: "No tiene un principio ['concept_secret_societies_civics']"
 civic_secret_societies: "Sociedades secretas"
 civic_secret_societies_desc: "Una camarilla de figuras elitistas y secretas teje intrincadas tramas políticas entre bastidores en esta sociedad, entrelazando asuntos internos con los de otros mundos."
 civic_secret_societies_effects: "Las ['concept_ss_factions'] clandestinas emergerán después de contactar con otros imperios.\nEmpieza con la habilidad de librar ['concept_proxy_wars'].\nLos $job_bureaucrat_plural_with_icon$ producirán $i_unity$ por cada §Yguerra indirecta§! exitosa en activo.\nEmpieza con ['concept_first_contact'] en dos imperios vecinos.\nLos imperios suben su $INFILTRATION_LEVEL$ después del §Y$first_contact$§!: §G+$@secret_society_infiltration_gain|0$§!"
 civic_secret_societies_corporate: "Cártel influyente"
 civic_secret_societies_corporate_desc: "Las oficinas más poderosas de esta $gov_megacorporation$ llevan a cabo operaciones extraplanetarias cuando es estrictamente necesario. Si tienes que preguntar, no necesitas saberlo."
 civic_secret_societies_corporate_effects: "Las ['concept_ss_factions'] clandestinas emergerán después de contactar con otros imperios.\nEmpieza con la habilidad de librar ['concept_proxy_wars'].\nLos $job_bureaucrat_plural_with_icon$ producirán $i_unity$ por cada §Yguerra indirecta§! exitosa en activo.\nEmpieza con ['concept_first_contact'] en dos imperios vecinos.\nLos imperios suben su $INFILTRATION_LEVEL$ después del §Y$first_contact$§!: §G+$@secret_society_infiltration_gain|0$§!\nLa £building£ §Y$building_corporate_embassy$§! $megacorp_civic_branch_office_building_effect$"
 shroud.5012.title: "Emergen sociedades secretas"
 shroud.5012.desc: "Nuestras sospechas estaban justificadas. Las civilizaciones [first_neighbor.GetAdjective] y [second_neighbor.GetAdjective] han confirmado haber contactado por canales no oficiales antes de empezar las comunicaciones más formales.\n\nEstas §Hfacciones§! han emergido bajo nuestra sombra y reconocen su existencia. Conocidas como §H$pft_the_curtain$§!, §H$pft_the_masquerade$§! y §H$pft_the_grand_dance$§!, estas organizaciones han pasado de la clandestinidad a solicitar públicamente un diálogo con nosotros.\n\nPuede que no hayamos entendido su objetivo, ni tampoco por qué saben lo que saben. Quizás nos convenga actuar dentro de sus exigencias."
 shroud.5012.a: "Comienza el baile..."
 shroud.5012.tt: "Las siguientes §Yfacciones de sociedades secretas§! emergerán pronto:\n$t$§H$pft_the_curtain$§!\n$t$§H$pft_the_masquerade$§!\n$t$§H$pft_the_grand_dance$§!"
 shroud.5013.title: "Contactos extraños"
 shroud.5013.desc: "Hay quienes, entre nosotros, operan tras las cortinas de la diplomacia. Ahora, tenemos la sospecha de que esto va más allá de nuestro mundo natal.\n\nA pesar de haber empezado a surcar las estrellas hace poco, hemos entablado comunicación con otras formas de vida con una facilidad pasmosa. Esto es algo más que una mera coincidencia. Sospechamos que estas relaciones interestelares se originan tras las puertas cerradas de varias §Hfacciones§! secretas que se han arraigado profundamente en nuestra sociedad.\n\nSi aprendemos más sobre estos seres, los que operan bajo nuestra sombra quizá se den a conocer."
 shroud.5013.a: "¿Están con o contra nosotros?"
 # Chosen
 civic_ap_blockade_tt: "§RAVISO: bloquea todos los caminos de ascensión excepto ['concept_psionic_ascension'].§!"
 civic_chosen: "Elegidos"
 civic_chosen_desc: "$civic_ap_blockade_tt$\n\nInfluenciada por el Velo en sus inicios, esta sociedad está ligada a un pacto de mecenazgo con una poderosa entidad."
 civic_chosen_effects: "- Comienza la partida en contacto con un §IMecenas del Velo§!.\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_psionic_aura']"
 civic_chosen_effects_additional: "- Gana escalado de $i_unity$ con ['concept_attunement'] con el Velo"
 civic_hive_chosen: "Muchos elegidos"
 civic_hive_chosen_desc: "$civic_ap_blockade_tt$\n\nInfluenciado por el Velo en sus inicios, este colectivo está vinculado a un pacto de mecenazgo con una poderosa entidad."
 civic_machine_chosen: "Red de apóstoles"
 civic_machine_chosen_desc: "$civic_ap_blockade_tt$\n\nInfluenciadas por el Velo en su desarrollo temprano, estas máquinas tienen codificado un pacto de mecenazgo con una poderosa entidad."
 civic_corporate_chosen: "Ejecutivos seleccionados"
 civic_corporate_chosen_desc: "$civic_ap_blockade_tt$\n\nDesde su fundación, esta corporación ha debido su éxito a una misteriosa entidad del Velo, y desde entonces ha operado bajo un pacto de mecenazgo."
 civic_corporate_chosen_effects: "$civic_chosen_effects$\n- Las £building£ §Y$building_psionic_offices$§! $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_chosen: "No tiene un principio ['concept_chosen_civics']"
 concept_chosen_civics: "Elegidos"
 concept_chosen_civics_desc: "Los principios $concept_chosen_civics$ incluyen\n- ['civic:civic_chosen']$NEW_LINE$- ['civic:civic_hive_chosen']$NEW_LINE$- ['civic:civic_machine_chosen']$NEW_LINE$- ['civic:civic_corporate_chosen']"
 shroud.5105.title: "Los elegidos"
 shroud.5105.desc: "Siempre lo hemos sabido... Existe una conexión etérea con una entidad que no podemos definir ni comprender.\n\n[This.GetTheChosenP2]\n\nDesde que tenemos registros históricos, esta misteriosa presencia ha estado ahí. Está claro que nos ha elegido..., pero aún se desconoce el motivo.\n\n¿Qué nombre deberíamos darle a esta [This.GetSensation]?"
 shroud.5105.desc_p2: "Sentimos su presencia en nuestros pensamientos más profundos. Permanece ahí, de alguna manera, inalcanzable. Es a la vez una certeza y una imposibilidad en nuestras mentes."
 shroud.5105.desc_p2_machine: "Detectamos su presencia en nuestros cálculos más complejos. Persiste, de alguna manera, fuera de nuestro alcance. Es tanto una certeza como una imposibilidad en nuestros circuitos."
 shroud.5105.a: "$the_composer_of_strands_article_cap$"
 shroud.5105.b: "$the_eater_of_worlds_article_cap$"
 shroud.5105.c: "$the_cradle_of_souls_article_cap$"
 shroud.5105.d: "$the_instrument_of_desire_article_cap$"
 shroud.5110.title: "[GetChosenPatron] nos llama"
 shroud.5110.desc_common: "A lo largo de nuestra historia, la entidad inefable que conocemos como §H[GetChosenPatron]§! ha estado con nosotros. Ahora, mientras la vasta extensión de la galaxia nos aguarda, sentimos su presencia en nuestro [GetMindPhysicalLoc] como nunca.\n\nPersiste, atrayéndonos hacia sí. Con la proximidad, percibimos, por primera vez, los verdaderos contornos de este profundo y misterioso vacío dentro de nuestra [GetMindLogicLoc]. [GetChosenPatron] nos invita a entrar"
 shroud.5110.desc_common_2: "Por fin sabemos cómo visitar este dominio etéreo por voluntad propia."
 shroud.5110.desc_organic: "$shroud.5110.desc_common$, tentándonos con experiencias más allá de nuestra comprensión.\n\n$shroud.5110.desc_common_2$"
 shroud.5110.desc_robot: "$shroud.5110.desc_common$, optimizando nuestros parámetros de acuerdo con algunos principios aún desconocidos.\n\n$shroud.5110.desc_common_2$"
 shroud.5110.a: "Nuestros horizontes se expanden hacia dentro."
 shroud.5110.a.tt: "Gana §Ysintonía§! con esta entidad: $@chosen_patron_attunement_gift|0G$\nSe puede acceder al panel del §YVelo§! desde el menú de §Ycontactos§!."
 shroud.5115.title: "[GetChosenPatron]"
 shroud.5115.desc.intro: "El Velo fluye muy por debajo de nuestra realidad conocida. Una sombra proyectada por la oscuridad.\n\nSi bien hace mucho que nos adentramos en este reino psiónico, nuestras primeras incursiones eran a ciegas. Ahora, después de años dedicados a desgastar el velo entre las dimensiones con nuestras mentes combinadas, lo sentimos con la suficiente claridad como para explorarlo con propósito.\n\nSin embargo, nuestra empresa no ha pasado desapercibida. §H[GetChosenPatron]§! nos espera."
 shroud.5115.desc.outro: "En esta interminable vorágine de entidades, su claridad es una promesa."
 shroud.5115.desc.composer: "$shroud.5115.desc.intro$\n\n§HDESDOBLAD. ENVOLVED. EXPANDÍOS.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.eater: "$shroud.5115.desc.intro$\n\n§HSENTID LO QUE ES EL HAMBRE.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.cradle: "$shroud.5115.desc.intro$\n\n§HREUNÍOS EN ACEPTACIÓN.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.instrument: "$shroud.5115.desc.intro$\n\n§HENTREGAOS AL DESEO.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.a: "Volveremos."
