 # Carceral Test Facility
 building_carceral_test_facility: "Sedes de experimentación"
 building_carceral_test_facility_desc: "Una sede colonial que ofrece oportunidades a posibles inversores y los incita a impulsar sus propios programas de pruebas experimentales. ¡Reduzcamos la delincuencia reforzando la defensa!"
 building_psionic_offices: "Oficinas psiónicas"
 building_psionic_offices_desc: "La complejidad de las mentes externas se puede abordar de manera más efectiva en su versión física, lo que permite acuerdos comerciales de lo más lucrativos para ambas partes."
 building_psionic_offices_tt: "\nEfectos del sistema:\n$t$- Emite un §Y$PSIONIC_AURA$§! para el $TRIGGER_BRANCH_OFFICE_OWNER$ con una intensidad mensual de $@psionic_offices_intensity|0+$.\n$t$- §RCualquier medio de emisión de $PSIONIC_AURA$ por parte del dueño de la colonia tiene prioridad sobre este edificio.§!"
 job_shroud_trader: "Mercader empático"
 job_shroud_trader_plural: "Mercaderes empáticos"
 job_shroud_trader_plural_with_icon: "£job_telepath£ $job_shroud_trader_plural$"
 job_shroud_trader_desc: "Estos expertos se adecúan al ambiente emocional que predomina en los distintos mercados locales y, partiendo de esa base, llegan a acuerdos e imparten seminarios sobre las tendencias en materia de liderazgo intelectual."
 mod_job_shroud_trader_add: "Trabajos de $job_shroud_trader$"
