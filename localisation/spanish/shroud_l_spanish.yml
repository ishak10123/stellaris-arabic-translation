 edict_energy_drain_desc: "La población debe contar con implantes para la recolección de esencia, que deben inspeccionarse periódicamente. Deben poder activarse en cualquier momento."
 edict_energy_drain_tt: "Los §Ylíderes§! nunca morirán de viejos.\n"
 # Sanguine Council
 edict_sanguine_council: "Consejo vampírico"
 edict_sanguine_council_desc: "Se realizan pruebas periódicas de fluidos a toda la población, a través de las cuales se extrae energía vital en beneficio del consejo gobernante del imperio."
 edict_sanguine_council_machine: "Carga del nexo"
 edict_sanguine_council_machine_desc: "$edict_sanguine_council_desc$"
 # Galactic Dowsing
 edict_galactic_dowsing: "Radiestesia galáctica"
 edict_galactic_dowsing_gestalt: "$edict_galactic_dowsing$"
 edict_galactic_dowsing_desc: "Cuando los prospectores añadan prácticas adivinatorias a sus análisis geológicos convencionales, descubrirán vetas más ricas en recursos."
 edict_galactic_dowsing_gestalt_desc: "$edict_galactic_dowsing_desc$"
 edict_annihilation_of_matter: "Aniquilación de materia"
 edict_annihilation_of_matter_desc: "Cada partícula de polvo arrojada a la llama hace que el calor del olvido arda con más intensidad."
 edict_annihilation_of_energy: "Aniquilación de energía"
 edict_annihilation_of_energy_desc: "La entropía lleva bailando desde mucho antes de que fuésemos conscientes de su magnificencia. Ahora, nos dedicamos a acelerar su movimiento."
 edict_dimensional_collapse: "Colapso dimensional"
 edict_dimensional_collapse_desc: "Hay otras dimensiones, aparte del Velo, entrelazadas con la nuestra. Su poder también se deshilará con el tiempo."
 # Psychic Feast
 edict_psychic_feast: "Convergencia de voluntad"
 edict_psychic_feast_desc: "Con un gran esfuerzo mental, podremos despertar un poder aún mayor en nuestros líderes."
 # Animatus
 edict_animatus: "Animatus"
 edict_animatus_desc: "$the_animator_of_clay_color_article_cap$ crea vida en nuestras flotas; es como si tuviesen voluntad propia."
 # Will of Temperance
 edict_will_of_temperance: "Voluntad de templanza"
 edict_will_of_temperance_desc: "La voluntad de $the_outsider_color_article$ nos previene de los peligros que nos acechan."
 # Will of Distraction
 edict_will_of_distraction: "Voluntad de distracción"
 edict_will_of_distraction_desc: "$the_golden_dream_color_article_cap$ nos revela formas superiores de ocio."
 # Will of Endless
 edict_will_of_endless: "Voluntad de infinitud"
 edict_will_of_endless_desc: "$the_endless_tide_color_article_cap$ potencia nuestra perspectiva del tiempo."
 # Will of Rebirth
 edict_will_of_rebirth: "Voluntad de renacimiento"
 edict_will_of_rebirth_desc: "$the_pale_mountain_color_article_cap$ hace para poder deshacer."
 # Will of Order
 edict_will_of_order: "Voluntad de orden"
 edict_will_of_order_desc: "$the_vacant_throne_color_article_cap$ conoce el orden de todas las cosas."
 # Will of Motion
 edict_will_of_motion: "Voluntad de movimiento"
 edict_will_of_motion_desc: "La velocidad de $the_black_river_color_article$ nos barre por el vacío."
 #==========================
 # Event Chains
 #==========================
 mindwarden_enclave_chain_title: "$ENCLAVE_MINDWARDEN_PLURAL$"
 mindwarden_enclave_chain_desc: "Para crear un nuevo $ENCLAVE_MINDWARDEN$, elige un sistema apto y envía allí una flota militar lo bastante grande con un $commander$ al mando. Después, selecciona el comando en la §Hvista de flota§!."
 enclaves_built: "$ENCLAVE_MINDWARDEN_PLURAL$ establecidos"
 dividends_received: "Dividendos recibidos"
 shroud_seals_built: "$SHROUD_SEAL_PLURAL$ en la galaxia"
 chain_aura_suppressors_title: "Impedancia de §H$PSIONIC_AURA$§!"
 chain_aura_suppressors_desc: "El §H$end_aura$§! se ha topado con unos dispositivos foráneos de atenuación psiónica. La voluntad de nuestro mecenas nos insta a desmantelar esas máquinas blasfemas."
 chain_aura_suppressors_seal: "§H$SHROUD_SEAL$§! en §Y[prev.GetName]§!"
 chain_aura_suppressors_seal_desc: "Un $SHROUD_SEAL$ del sistema [prev.GetName] está mitigando el alcance del §H$end_aura$§!.\n\n§RHay que desmantelarlo.§!"
 chain_aura_suppressors_suppressor: "§H$building_psionic_suppressor$§! en §Y[prev.GetName]§!"
 chain_aura_suppressors_suppressor_desc: "El $building_psionic_suppressor$ de [prev.GetName] está mitigando el alcance del §H$end_aura$§!.\n\n§RDebemos destruirlo.§!"
 chain_aura_suppressors_ward: "§H$building_ancient_ward_2$§! en §Y[prev.GetName]§!"
 chain_aura_suppressors_ward_desc: "Una presunta $building_ancient_ward_2$ de [prev.GetName] está mitigando el alcance del §H$end_aura$§!.\n\n§RDebemos destruirla.§!"
 #==========================
 # Events
 #==========================
 # Good luck events
 # Good luck event 1
 shroud.500.title: "Avance poco convencional"
 shroud.500.desc: "Las nuevas y prometedoras investigaciones de nuestras instituciones punteras han logrado un avance inesperado. Por pura casualidad, la normalización rutinaria de nuestros instrumentos ha demostrado una teoría que durante mucho tiempo se consideró un error de cálculo fundamental. Ahora podemos volver a examinar lo que alguna vez se consideró una ciencia marginal."
 HOW_FORTUITOUS: "Qué casualidad."
 shroud.500.tt: "Recibe conocimientos de una tecnología aleatoria: §G$@good_luck_event_1_insight|0%$§!"
 # Good luck event 2
 shroud.507.title: "Veta madre desenterrada"
 shroud.507.desc: "Un sistema de cavernas naturales ricas en minerales que se creía colapsado ha sido redescubierto fortuitamente en §H[This.GetName]§!.\n\nTras una minuciosa evaluación de los riesgos, confiamos en que estos túneles puedan soportar una mayor explotación de minerales con la ampliación de las actuales tareas de minería."
 # Good luck event 3
 shroud.512.title: "[This.GetNewfoundFertilityTitle]"
 shroud.512.title_default: "Nueva fertilidad"
 shroud.512.title_anglers: "Arrecife sin descubrir"
 shroud.512.desc: "Un estudio rutinario de la tierra ha revelado que la calidad del suelo en §H[This.GetName]§! ha mejorado drásticamente en los últimos años en grandes extensiones del planeta.\n\nCreemos que muchas zonas que antes se consideraban incapaces de sustentar la agricultura pueden utilizarse ahora para ampliar nuestras actividades agrícolas."
 shroud.512.desc_anglers: "Un barco pesquero ha descubierto un arrecife oculto en los océanos de §H[This.GetName]§!. La región, que se creía desierta e infértil, alberga un próspero ecosistema de fauna que se puede aprovechar."
 # Good luck event 4
 shroud.517.title: "Conductos geotérmicos"
 shroud.517.desc: "Tras un desplazamiento tectónico, se ha abierto una fisura bajo un gran depósito de agua subterránea en §H[This.GetName]§!. El calor del manto del planeta está haciendo hervir el depósito de agua atrapada, provocando la formación de respiraderos geotérmicos en la superficie.\n\nEste fenómeno natural nos brinda la oportunidad de ampliar la infraestructura energética de la colonia con nuevas centrales geotérmicas y bombas de calor."
 # Good luck event 5
 shroud.522.title: "Descubierta una corriente de partículas cuánticas"
 shroud.522.desc: "Un bucle anómalo de elementos subatómicos ha aparecido espontáneamente en §H[This.GetName]§!. Esta corriente de partículas cuánticas muestra una variedad de interacciones de subpartículas raras cada segundo, lo que proporciona datos asombrosos sobre la naturaleza innata de la dinámica cuántica.\n\nEl estudio de este campo cuántico nos permitiría comprender mejor los componentes fundamentales de nuestro universo."
 # Good luck event 6
 shroud.527.title: "Descubierto un eco interdimensional"
 shroud.527.desc: "Los [From.GetResearchers] han detectado una concentración de señales isócronas en el sistema §H[This.GetName]§!.\n\nLos primeros análisis indican que estas señales han sido transmitidas desde una dimensión más allá de la nuestra. Las primeras traducciones sugieren que estos mensajes están relacionados con principios lógicos y dilemas filosóficos. Tal vez se trate de un intento de enriquecimiento intelectual por parte de entidades que escapan a nuestra comprensión.\n\nSi establecemos una conexión directa con estas señales, podremos seguir vigilando sus revelaciones."
 # Good luck event 7
 shroud.532.title: "Se descubren restos de tecnología avanzada"
 shroud.532.desc: "Ha aparecido una nave abandonada en §H[This.GetName]§!. [From.GetQuantumParticleStreamDiscoveredExtra]\n\nHemos deducido que la nave permaneció sin ser detectada en este sistema durante milenios, revelándose solo cuando falló su generador de energía solar. No hay señales de vida a bordo, y ya hemos comenzado a desmontar cuidadosamente la nave para aprender todo lo que podamos."
 shroud.532.extra: "La nave, irreparablemente dañada, era capaz de generar algún tipo de campo de invisibilidad y, en general, está mucho más avanzada tácticamente que nuestras propias flotas."
 shroud.532.extra_first_contact: "La nave, irreparablemente dañada, utilizaba una tecnología de camuflaje sin parangón."
 shroud.532.a: "Un regalo de las estrellas."
 # Good luck event 8
 shroud.537.title: "Metalurgia geotérmica"
 shroud.537.desc: "La actividad geotérmica se ha vuelto extremadamente volátil en las profundidades de la superficie de §H[This.GetName]§!. Las descargas subterráneas de magma han ascendido a través de la corteza planetaria hacia una serie de depósitos de mineral no excavados.\n\nEste fenómeno geológico ha sobrecalentado algunos de los minerales no explotados, refinando vetas de mineral metálico hasta convertirlas en aleaciones sólidas. De esta manera, las operaciones mineras en el planeta ahora producirán fragmentos de metal trabajable."
 # Good luck event 9
 shroud.543.title: "Crucero abandonado"
 shroud.543.desc: "Se ha detectado una nave de combate desierta navegando a la deriva por el sistema §H[From.GetName]§!. El diseño de la nave no se parece al de ningún imperio conocido y no porta ninguna bandera ni insignia reconocibles.\n\nTras una evaluación exhaustiva y algunas reparaciones menores, nuestros [This.GetEngineerPlural] han declarado que la nave ya está lista para el servicio activo."
 shroud.543.a: "$shroud.532.a$"
 shroud.543.tt: "Gana una nave de clase crucero en el sistema."
 # Good luck event 10
 shroud.545.title: "[This.GetSenseOfOptimismTitle]"
 shroud.545.title_default: "Sensación de optimismo"
 shroud.545.title_gestalt: "Cohesión unilateral"
 shroud.545.desc: "Un inexplicable aire de optimismo recorre los mundos [This.GetAdjective]. La población está un poco más contenta, cómoda y satisfecha con su propia existencia. Este cambio de humor colectivo se debe, sin duda, a las óptimas alineaciones celestes, y solo puede ser un buen augurio para el futuro de §H[This.GetName]§!."
 shroud.545.desc_gestalt: "§H[This.GetName]§! está funcionando en verdadera armonía bajo una directiva de enfoque inequívoco. Esta cohesión unilateral se debe sin duda a óptimas alineaciones celestes y es señal de grandes cosas por venir."
 shroud.545.a: "Las estrellas brillan sobre nosotros."
 # Good luck event 11
 shroud.553.title: "Trino favorable"
 shroud.553.desc: "Tres cuerpos celestes del sistema §H[From.GetName]§! se han alineado para formar un trino favorable; §H[favorable_trine_planet_1.GetName]§!, §H[favorable_trine_planet_2.GetName]§! y §H[favorable_trine_planet_3.GetName]§!.\n\nEsta beneficiosa alineación astrológica aporta una sensación de tranquilidad y armonía a nuestra colonia en §H[This.GetName]§!."
 shroud.553.a: "Un acontecimiento único en la vida."
 # Good luck event 12
 shroud.555.title: "[auspicious_position_planet.GetName] en posición favorable"
 shroud.555.desc: "§H[auspicious_position_planet.GetName]§! está ocupando una posición auspiciosa en los cielos de §H[root.capital_scope.GetName]§!, residiendo en la casa astrológica del Retorno celeste.\n\nEsto representa el comienzo de un nuevo ciclo interno para [root.GetName] y una excelente oportunidad de crecimiento y mejora."
 # Good luck event 13
 shroud.560.title: "Armonía elemental"
 shroud.560.desc: "Todas las métricas astrológicas cuantificables indican que [This.GetName] está en perfecto equilibrio elemental.\n\nCon una gestión precisa de las líneas ley, este beneficioso equilibrio podría mantenerse durante un largo periodo, proporcionando un entorno metafísico ideal en el que nuestros líderes podrían florecer."
 shroud.560.a: "Qué excelente fortuna."
 # Good luck event 14
 shroud.568.title: "Luminaria radiante"
 shroud.568.desc: "La Luminaria principal del sistema §H[From.GetName]§! brilla de manera extraordinaria. Tras comentar este fenómeno con especialistas en astrología, entendemos que su exceso de energía potenciará todas las formas de generación de energía en §H[This.GetName]§!."
 shroud.568.a: "Que las estrellas nos iluminen."
 # Good luck event 15
 shroud.570.title: "Armonía de consejero"
 shroud.570.desc: "Dos de los miembros de nuestro consejo, §H[councilor_harmony_leader_1.GetTitle] [councilor_harmony_leader_1.GetName]§! y §H[councilor_harmony_leader_2.GetTitle] [councilor_harmony_leader_2.GetName]§!, han descubierto recientemente que sus signos astrológicos son perfectamente complementarios.\n\nSu posterior asociación política ha unido desde entonces a nuestro gobierno bajo una bandera de respeto mutuo y eficacia, acelerando diversos procesos legislativos."
 shroud.570.a: "Un emparejamiento excelente."
 # Good luck event 16
 shroud.575.title: "Más de lo que parece"
 shroud.575.desc: "Durante un ejercicio rutinario de catalogación, un espécimen sin asegurar se cayó al suelo del §H$grand_archive$§! y fue entregado rápidamente a un conservador para un examen más detallado.\n\nSe descubrió un compartimento secreto que se había abierto durante el accidente y que anteriormente había pasado desapercibido, el cual contenía una gran variedad de artefactos interesantes que podemos añadir a nuestra colección."
 shroud.575.a: "Los regalos siguen llegando."
 # Bad luck events
 # Bad luck event 1
 shroud.700.title: "Discordancia"
 shroud.700.desc: "Existe una inexplicable sensación de temor en la población de nuestros mundos. La gente se siente más angustiada, distraída e insatisfecha con su propia existencia. Este cambio de humor colectivo debe deberse a alineaciones celestes subóptimas."
 shroud.700.desc_gestalt: "Hay una sensación de falta de armonía en todo §H[This.GetName]§!. Esta falta de coordinación está provocando un estancamiento en nuestro colectivo, y ha de deberse a alineaciones celestes subóptimas."
 HOW_UNFORTUNATE: "Qué infortunio."
 # Bad luck event 2
 shroud.707.title: "Colisión naval"
 shroud.707.desc: "Un error de comunicación durante unas maniobras navales rutinarias ha provocado una colisión a alta velocidad entre varias naves de combate de §H[This.GetName]§! en §H[This.System.GetName]§!.\n\n[This.GetNavalCollisionLeader] ha confirmado que los [From.GetIndividualNamePlural] responsables de este error han sido disciplinados adecuadamente."
 shroud.707.leader_name: "§H[Leader.GetName]§!"
 shroud.707.default_name: "Mando militar central"
 shroud.707.tt: "Naves destruidas en §H[This.GetName]§!: §R5§!"
 # Bad luck event 3
 shroud.710.title: "Fuego en un silo"
 shroud.710.desc_default: "Una avería eléctrica en un silo de recursos en §H[silo_fire_planet_targeted.GetName]§! ha provocado un incendio masivo en el interior del almacén.\n\n$shroud.710.desc$"
 shroud.710.desc_starbase: "Una avería eléctrica en un silo de recursos en la base estelar de §H[silo_fire_starbase_targeted.Fleet.System.GetName]§! ha provocado un incendio masivo en el interior del almacén.\n\n$shroud.710.desc$"
 shroud.710.desc: "Las medidas de extinción de incendios habían fallado temporalmente y una parte importante de los recursos almacenados en su interior resultaron dañados por las llamas. El silo ha sufrido daños irreparables."
 shroud.710.a: "¡Malditas sean las estrellas!"
 shroud.710.tt_default: "§H$building_resource_silo$§! destruido en §H[silo_fire_planet_targeted.GetName]§!\n$shroud.710.tt$"
 shroud.710.tt_starbase: "§H$sm_resource_silo$§! destruido en §H[silo_fire_starbase_targeted.Fleet.System.GetName]§!\n$shroud.710.tt$"
 shroud.710.tt: "Recursos perdidos: §R$@silo_fire_resources_lost|1%$§!"
 # Bad luck event 4
 shroud.715.title: "Error diplomático"
 shroud.715.desc: "Uno de nuestros representantes ha exhibido, sin pretenderlo, una conducta indigna de alguien que pretenda dar voz a su [This.GetGalCommunityOrGalImperium]. Mientras pronunciaba un discurso destinado a conseguir apoyo para nuestros intereses, un fallo del traductor dio lugar a varios insultos vitriólicos y odiosos contra [diplomatic_faux_pas_victim.GetName]. Todos los medios galácticos se han hecho eco del lamentable incidente, que ha mancillado nuestro buen nombre.\n\nSi bien estas acciones no justifican una expulsión inmediata, nuestra posición política se ha debilitado como resultado de esta indiscreción."
 shroud.715.a: "Un error inoportuno."
 shroud.715.tt: "§H[diplomatic_faux_pas_galcom_envoy.GetName]§! ha adquirido un rasgo: §R$leader_trait_destructive$§!"
 # Bad luck event 5
 shroud.720.title: "Llamarada solar extrema"
 shroud.720.desc: "Una erupción solar de [extreme_solar_flare_system.GetName] como pocas se han visto ha inutilizado todas las estaciones orbitales del sistema.\n\nEsta aberrante fulguración de rayos gamma concentrados no se asemeja ni tan siquiera remotamente a los fenómenos de este astro que se han registrado. Nuestro análisis de la corona estelar indica que su esperanza de vida se ha acortado alrededor de tres millones de años."
 shroud.720.desc_storm: "La descarga de energía resultante ha provocado una $celestial_storm$ en el sistema. Se han puesto en marcha medidas de emergencia."
 shroud.720.tt: "Se ha destruido cada $observation_station$, $research_station$ y $mining_station$ presentes en §H[extreme_solar_flare_system.GetName]§!."
 # Bad luck event 6
 shroud.725.title: "Accidente de tráfico mediático"
 shroud.725.desc: "Imprevistos meteorológicos han puesto patas arriba nuestras redes de tráfico en §H[high_profile_traffic_accident_planet.GetName]§!. Además de conllevar multitud de retrasos, el fenómeno ha provocado numerosos accidentes de tráfico, de los cuales uno ha involucrado a §H[This.GetName]§!, [This.GetClass]."
 shroud.725.desc_killed: "$shroud.725.desc$\n\nA pesar de la presteza de nuestros servicios de emergencia, no ha logrado sobrevivir al traumatismo sufrido."
 shroud.725.desc_killed_machine: "$shroud.725.desc$\n\nPor desgracia, sus sistemas han quedado irreparables."
 shroud.725.desc_maimed: "$shroud.725.desc$\n\nAunque [This.GetName] ha sobrevivido al choque, le quedarán secuelas irreversibles."
 shroud.725.a: "Qué trágico."
 # Bad luck event 7
 shroud.730.title: "Sumideros descomunales"
 shroud.730.desc: "En la superficie de §H[This.GetName]§! han aparecido grandes sumideros que han causado daños importantes a la infraestructura. Una de las fisuras se abrió debajo de los cimientos de uno de los edificios del planeta, provocando su derrumbe parcial. Por suerte, se han podido evacuar todas las zonas afectadas.\n\nNo alcanzamos a definir qué ha podido causar la aparición tan repentina de cavidades geológicas, pero se han puesto en marcha inspecciones de mantenimiento con el fin de controlar la erosión de la superficie."
 shroud.730.a: "Astros y centellas..."
 shroud.730.tt: "Un edificio ha quedado en ruinas."
 # Bad luck event 7
 shroud.735.title: "Protesta espontánea"
 shroud.735.desc: "Han estallado peligrosas revueltas por todo el territorio de §H[This.GetName]§!. Enfervorizada, la población se manifiesta en contra de una conspiración infundada, acusando al gobierno [From.GetAdjective] de manipular las alineaciones celestes. Lo que comenzó como una manifestación entusiasta pronto se convirtió en violencia, con agitadores causando una destrucción masiva en toda la colonia.\n\nLos manifestantes violentos fueron neutralizados por las fuerzas de seguridad, pero los daños a nuestra infraestructura tardarán en repararse."
 shroud.735.desc_hive: "Un gran grupo de drones desviados lideró una revuelta en la colonia §H[This.GetName]§!, causando una destrucción generalizada. A pesar de su fervor, las fuerzas planetarias lograron neutralizar a los agitadores, pero los daños a nuestra infraestructura tardarán en repararse."
 shroud.735.desc_machine: "Un misterioso virus ha afectado a una minoría considerable de drones en §H[This.GetName]§!, que se han amotinado en un intento de destruir la colonia. A pesar de su fervor, las fuerzas planetarias lograron neutralizar las unidades defectuosas, pero el daño a nuestra infraestructura tardará tiempo en repararse."
 shroud.735.a: "Reconstruiremos."
 # Bad luck event 9
 shroud.740.title: "Enfermedad infecciosa repentina"
 shroud.740.desc: "En la superficie de §H[This.GetName]§! ha mutado un virus de alta transmisión que ha infectado a gran parte de la población. Se han decretado medidas de aislamiento, como el seguimiento de todo contacto y el confinamiento, a fin de limitar el contagio y no saturar la infraestructura médica local."
 # Bad luck event 10
 shroud.745.title: "Tétrada calamitosa"
 shroud.745.desc: "En el sistema §H[From.GetName]§! se han alineado cuatro cuerpos celestes, formando una tétrada calamitosa: §H[calamitous_quartile_planet_1.GetName]§!, §H[calamitous_quartile_planet_2.GetName]§!, §H[calamitous_quartile_planet_3.GetName]§! y §H[calamitous_quartile_planet_4.GetName]§!.\n\nEste desastroso fenómeno astrológico sembrará las semillas de la duda en la colonia §H[This.GetName]§!, fomentando la [FromFrom.GetDissent] al sembrar la discordia entre la población."
 shroud.745.a: "Se avecinan tiempos funestos."
 # Bad luck event 11
 shroud.750.title: "[planet_in_retrograde_planet.GetName] retrógrado"
 shroud.750.desc: "La población de §H[planet_in_retrograde_home.GetName]§! ha observado que §H[planet_in_retrograde_planet.GetName]§! se encuentra en retrogradación. Es el momento de reconsiderar nuestras acciones y expresar arrepentimiento por las imperfecciones de [This.GetName]. Que este pesado período de reflexión nos acerque a nuestros ideales en el futuro."
 # Bad luck event 12
 shroud.755.title: "Desequilibrio elemental"
 shroud.755.desc: "Desgraciadamente, todos los parámetros cuantificables sugieren que [This.GetName] padece un desbarajuste elemental absoluto.\n\nIntentar restaurar este equilibrio precario será un proceso largo y laborioso. El caos que el astro genera actualmente impide a nuestros líderes acceder a un entorno de meditación metafísica, lo que lastra su desarrollo."
 shroud.755.a: "Inaceptable. Esto hay que corregirlo."
 # Bad luck event 13
 shroud.760.title: "Luminaria menguante"
 shroud.760.desc: "La Luminaria principal del sistema §H[From.GetName]§! se ha atenuado de forma anómala. Nuestros especialistas astrológicos han deliberado acerca del fenómeno, y concluyen que repercutirá negativamente en la infraestructura energética de §H[This.GetName]§!."
 shroud.760.a: "Pero ¿cómo?"
 # Bad luck event 14
 shroud.765.title: "Discordia en el Consejo"
 shroud.765.desc: "Dos miembros de nuestro consejo, §H[discordant_council_leader_1.GetName] y [discordant_council_leader_2.GetName]§!, §H[discordant_council_leader_1.GetTitle] y [discordant_council_leader_2.GetTitle]§! respectivamente, han descubierto que sus signos astrológicos son diametralmente incompatibles.\n\nSu rivalidad política ha creado una atmósfera de animosidad y tensión dentro de nuestro gobierno, lo que ha causado frecuentes retrasos en los procesos legislativos rutinarios."
 # Bad luck event 15
 shroud.770.title: "Desliz comunicativo"
 shroud.770.desc_default: "Las opiniones personales de uno de nuestros administradores regionales sobre otro imperio se han transmitido accidentalmente a sus súbditos. Tras una escabrosa discusión con respecto a la vigilancia de hipervías, un operario de comunicaciones olvidó cerrar el canal de transmisión, de manera que en [careless_talk_empire.GetName] oyeron toda la secuencia de improperios.\n\n$shroud.770.desc_end$"
 shroud.770.desc_machine: "Las declaraciones inmoderadas de una de nuestras unidades administradoras acerca de otro imperio se han trasmitido por accidente a un súbdito de los aludidos. Tras una escabrosa discusión con respecto a la vigilancia de hipervías, una unidad de comunicaciones olvidó cerrar el canal de transmisión, de manera que en [careless_talk_empire.GetName] oyeron toda la secuencia de improperios.\n\n$shroud.770.desc_end$"
 shroud.770.desc_hive: "Los comentarios desdeñosos de uno de nuestros drones administradores acerca de otro imperio se han trasmitido por accidente a un súbdito de los aludidos. Tras una escabrosa discusión con respecto a la vigilancia de hipervías, un dron de comunicaciones olvidó cerrar el canal de transmisión, de manera que en [careless_talk_empire.GetName] oyeron toda la secuencia de improperios.\n\n$shroud.770.desc_end$"
 shroud.770.desc_end: "Lógicamente, la opinión que la población [careless_talk_empire.GetAdjective] tiene de [This.GetName] ha decaído."
 # Bad luck event 16
 shroud.775.title: "Espécimen perdido"
 shroud.775.desc: "Debido a un error administrativo, le hemos perdido la pista a uno de nuestros artefactos culturales más preciados. A pesar de los extensos esfuerzos de búsqueda, parece que se ha perdido en el laberinto que es nuestro §H$grand_archive$§! o que se ha transferido a una ubicación no registrada.\n\nComo resultado, se están revisando los procedimientos establecidos para el seguimiento de nuestros especímenes en exhibición."
 shroud.775.tt: "Espécimen expuesto perdido al azar: §R1§!"
 # Experimental Testing Situation Finished
 shroud.1015.name: "Éxito de investigación experimental"
 shroud.1015.desc.intro: "Nuestros [Root.GetResearchers] han finalizado una serie de experimentos revolucionarios con sujetos vivos, brindándonos una plétora de valiosos conocimientos que fomentarán grandes avances tecnológicos."
 shroud.1015.desc.default: "$shroud.1015.desc.intro$ A continuación, debemos estipular en qué ámbito llevar a cabo la siguiente fase de investigación."
 shroud.1015.desc.escaped: "$shroud.1015.desc.intro$ La última tanda de ejecuciones masivas de prisioneros ha proporcionado a nuestros [Root.GetResearchers] material de sobra para alcanzar un nuevo descubrimiento tecnológico."
 shroud.1015.a: "Realizad una investigación en §Y$PHYSICS$§!."
 shroud.1015.a.tt: "Desencadena la situación §Y$situation_experimental_testing$§!, con el enfoque §Y$situation_experimental_testing_physics$§!:$TABBED_NEW_LINE$$situation_experimental_testing_physics_outcome_tt$"
 shroud.1015.b: "Realizad una investigación en §Y$SOCIETY$§!."
 shroud.1015.b.tt: "Desencadena la situación §Y$situation_experimental_testing$§!, con el enfoque §Y$situation_experimental_testing_society$§!:$TABBED_NEW_LINE$$situation_experimental_testing_society_outcome_tt$"
 shroud.1015.c: "Realizad una investigación en §Y$ENGINEERING$§!."
 shroud.1015.c.tt: "Desencadena la situación §Y$situation_experimental_testing$§!, con el enfoque §Y$situation_experimental_testing_engineering$§!:$TABBED_NEW_LINE$$situation_experimental_testing_engineering_outcome_tt$"
 shroud.1015.d: "Barajemos nuestras opciones."
 shroud.1015.d.tt: "Desencadena la situación §Y$situation_experimental_testing$§!, con el enfoque §Y$situation_experimental_testing_hold$§!:$TABBED_NEW_LINE$$situation_experimental_testing_hold_effect_tt$"
 shroud.1015.physics_reward: "Recaba información acerca de una tecnología de £physics£ §Y$PHYSICS$§! al azar."
 shroud.1015.society_reward: "Recaba información acerca de una tecnología de £society£ §Y$SOCIETY$§! al azar."
 shroud.1015.engineering_reward: "Recaba información acerca de una tecnología de £engineering£ §Y$ENGINEERING$§! al azar."
 EXPERIMENT_TESTING_TECH_OPTION_TITLE: "Éxito en el experimento"
 EXPERIMENT_TESTING_TECH_OPTION_SETTING: "Conocimientos obtenidos ($situation_experimental_testing$)"
 EXPERIMENT_TESTING_TECH_OPTION_DESC: "Nuestro experimento ha arrojado unos resultados prometedores.\n$TECH|Y$: §G+$VAL$%§! de progreso"
 # Experimental Testing - Test subjects escape
 shroud.1105.title: "Fuga de $job_test_subject_plural$"
 shroud.1105.desc.intro: "Un grupo de valiosos sujetos de prueba ha huido de la instalación de §H[root.GetName]§! a través un túnel que cavaron.\n\nUsando herramientas improvisadas y sus [Owner.GetSpeciesHandNamePlural], el túnel les ha tenido que llevar años. No sabemos cuántos sabían de su existencia, ni cómo lo mantuvieron en secreto tanto tiempo."
 shroud.1105.desc.escaped: "Esta situación requiere una respuesta contundente para evitar más transgresiones. La pasividad que hemos mostrado en este asunto parece haber envalentonado al resto de la población."
 shroud.1105.desc.outro: "Esta situación requiere una respuesta contundente para evitar más transgresiones."
 shroud.1105.a: "Se han ganado su libertad."
 shroud.1105.a.tt: "La mitad de los §Y$job_test_subject_plural$§! de §H[root.GetName]§! se marcharán como refugiados."
 shroud.1105.b: "Interrumpid las operaciones hasta que los encontremos."
 shroud.1105.b.tt: "Recuperaremos a los §Y$job_test_subject_plural$§! fugados."
 shroud.1105.c: "Ejecutad a los demás para dar ejemplo."
 shroud.1105.c.tt: "Todos los §Y$job_test_subject_plural$§! de §H[root.GetName]§! se perderán."
 testing_lockdown: "Prueba en cuarentena"
 testing_lockdown_desc: "La prueba queda suspendida hasta que recuperemos a los sujetos fugados."
 testing_lockdown_tt: "Velocidad de avance de situación §Y$situation_experimental_testing$§!: §R-100%§!"
 example_set: "Castigo ejecutado"
 example_set_desc: "La brutal respuesta a un intento de fuga previo ha servido para amansar a la población de sujetos de prueba."
 example_set_tt: "Velocidad de avance de situación §Y$situation_experimental_testing$§!: §G10%§!"
 # Psionic Ascension Situation (Breaching the Shroud)
 # Mid-Stage Events
 # Beneficial Events
 # A1
 shroud.2300.name: "Transmisión de pensamiento"
 shroud.2300.desc: "[Owner.GetThoughtTransmissionIntro]\n\nEsta información puede adoptar diversas formas: material lingüístico o visual, conceptos amplios o sensaciones emocionales generalizadas. Es crucial efectuar toda transmisión con suma meticulosidad para lograr que el sujeto no se percate del procedimiento.\n\n[Owner.GetThoughtTransmissionOutro]"
 shroud.2300.intro: "Un equipo de [Owner.GetResearchers] psiónicos de §H[Owner.Capital.GetName]§! ha desarrollado un procedimiento telepático unidireccional que permite transmitir información cognitiva a toda consciencia susceptible."
 shroud.2300.intro_gestalt: "Un equipo de [Owner.GetResearchers] psiónicos de §H[Capital.GetName]§! ha desarrollado un procedimiento telepático unidireccional que permite transmitir información cognitiva a toda consciencia susceptible, incluso ajena a nuestro colectivo."
 shroud.2300.desc.outro: "Esta técnica plantea un sinfín de posibilidades en materia de comunicación telepática, con todo lo que supone para las interacciones dentro de nuestros confines y más allá de [Owner.GetName]."
 shroud.2300.desc.outro_homicidal: "Esta técnica plantea un sinfín de posibilidades en materia de comunicación telepática que podemos aplicar tanto dentro de nuestros confines como más allá de [Owner.GetName]."
 shroud.2300.a.robot: "El siguiente paso lógico en nuestro desarrollo."
 shroud.2300.a.organic: "El siguiente paso lógico en nuestra evolución."
 shroud.2300.b: "Una nueva forma de imponer nuestra voluntad."
 shroud.2300.c.variant: "Una medida para garantizar el orden social."
 shroud.2300.c.organic: "Que sea la sociedad la que determine cómo se usa."
 # A2
 shroud.2305.name: "Presencia fantasmal"
 shroud.2305.desc: "Varios de nuestros [Owner.GetCitizenPlural] han advertido apariciones inquietantes en diversas ubicaciones de §H[Owner.Capital.GetName]§!. En la mayoría de casos, se trata de avistamientos aislados, pero una zona en concreto ha suscitado interés y se ha convertido en objeto de visitas frecuentes. [Owner.GetPhantomPresenceExtra]\n\nSegún se cuenta, el fantasma aparece junto la entrada a un sistema de cavernas ricas en minerales."
 shroud.2305.extra: "Son muchos los curiosos que empiezan a acudir a la ubicación en cuestión, deseosos de avistar al personaje espectral."
 shroud.2305.extra_spiritualist: "Supuestamente, la figura fantasmal que aparece allí se asemeja a una entidad sagrada descrita en nuestras antiguas tradiciones religiosas."
 shroud.2305.a: "Un fenómeno psiónico digno de estudio."
 shroud.2305.a_spiritualist: "Todo un milagro que se ha de venerar."
 shroud.2305.b: "Que no se perturbe este bien cultural."
 shroud.2305.b_spiritualist: "Que no se perturbe este lugar sagrado."
 shroud.2305.c: "Explotemos todos los recursos de la zona."
 # A3
 shroud.2310.name: "Parásitos psiónicos"
 shroud.2310.desc: "Se ha producido en §H[Owner.Capital.GetName]§! un suceso climático sin precedentes: una perturbación similar a una tormenta que arrasó una zona con niveles particularmente elevados de energía psiónica. A su paso encontramos parte de la fauna local infectada con un extraño parásito que se introduce en el órgano cerebral y lo consume lentamente.\n\nA medida que avanza esta infección parasitaria, el huésped desarrolla aptitudes telequinéticas básicas, que utiliza para cazar y alimentarse antes de que le llegue la muerte inevitable.\n\n[Owner.GetShroudParasitesEnding]"
 shroud.2310.ending_biological: "Curiosamente, es completamente seguro ingerir los parásitos tras procesarlos. Rica fuente de nutrientes, pueden constituir un alimento sano y económico para nuestra ciudadanía."
 shroud.2310.ending_lithoid: "Cabe observar que estas criaturas segregan ingentes cantidades de una sustancia rica en compuestos inorgánicos, que puede procurarnos un novedoso método de síntesis de minerales."
 shroud.2310.ending_machine: "Curiosamente, estas criaturas secretan grandes cantidades de una sustancia altamente combustible. Por lo tanto, podrían proporcionar un método eficiente de producción de bioenergía."
 shroud.2310.a: "Una valiosa oportunidad de investigación."
 shroud.2310.b_organic: "No existe placer mayor que el de comer gratis."
 shroud.2310.b_machine: "Que den comienzo los protocolos de recolección."
 shroud.2310.c: "Se ha revelado una nueva forma de vida fantástica."
 # A4
 shroud.2315.name: "Manifestaciones materiales"
 shroud.2315.desc: "Experimentando con nuevas técnicas psiónicas, se observaron materializaciones inusitadas durante una sesión de meditación grupal. Restringir nuestro enfoque colectivo a un único punto en el espacio dio como resultado la aparición fugaz de objetos extraños y notables.\n\nEs considerable la fatiga psíquica que semejante esfuerzo conlleva, pero tal vez consigamos orientarlo a manifestar objetos que puedan sernos de utilidad. Desconocemos aún la procedencia de estos objetos y qué consecuencias puede acarrear su aparición."
 shroud.2315.a: "Cumpliremos todo deseo imaginable."
 shroud.2315.b: "Cultivaremos sustento."
 shroud.2315.c: "Fortaleceremos a nuestras flotas."
 # A5a
 shroud.2320.name: "Duplicidad psiónica"
 shroud.2320.desc: "Corre la voz de que existen [Owner.GetIndividualNamePlural] con aptitud psiónica capaces de bilocarse, es decir, estar presentes en dos ubicaciones distintas simultáneamente. Enviamos [Owner.GetResearchers] a investigar estas afirmaciones improbables y, para nuestro gran asombro, los rumores eran ciertos.[Owner.GetPsionicDoublingExtra]\n\nActualmente, solo una fracción de nuestra población posee esta notable habilidad, pero estudios más detallados podrían desarrollar métodos para entrenar a otros."
 shroud.2320.extra: "\n\nLa distancia física no parece ser un impedimento, ya que estos adeptos han demostrado repetidamente que pueden ubicarse brevemente en dos sistemas estelares diferentes a la vez"
 shroud.2320.extra_organic: "$shroud.2320.extra$, manteniendo un vínculo psíquico entre dos cuerpos que realizan acciones independientes."
 shroud.2320.extra_machine: "$shroud.2320.extra$, manteniendo un vínculo de procesamiento psiónico entre dos unidades que realizan acciones independientes."
 shroud.2320.extra_default: "$shroud.2320.extra$."
 shroud.2320.a: "Se abre una nueva vía de la cooperación intergaláctica."
 shroud.2320.b: "Se trata de proyección de energía sin trabas."
 shroud.2320.c: "Un nuevo método de gobierno multiplanetario."
 shroud.2320.d: "¡Qué divertido!"
 # A5b
 shroud.2325.name: "Observación psiónica"
 shroud.2325.desc: "Ha surgido una maravillosa aptitud psiónica en una pequeña fracción de la población [Owner.GetAdjective]: telestesia, o la capacidad de sentir entidades que se trascienden con mucho la distancia de percepción normal. Sin formación especializada de índole alguna, estos videntes remotos son capaces de describir objetos distantes con un nivel de detalle pasmoso.\n\nSi se llegara a controlar y fortalecer estos poderes, son muchas las ventajas que deparan a §H[Owner.GetName]§!. Valiéndonos de las destrezas de nuestros [Owner.GetTelepathPlural] más poderosos, podríamos tratar de perfeccionar esta técnica y dedicarla así a cometidos de peso."
 shroud.2325.a: "Averigüemos los secretos de quienes nos rodean."
 shroud.2325.a_tt: "Información de todos los imperios contactados: §G+10§! "
 shroud.2325.b: "Descubramos las regiones más remotas del universo."
 shroud.2325.c: "Averigüemos las vulnerabilidades de nuestros enemigos."
 shroud.2325.d: "Descubramos depósitos de recursos más profundos."
 # Balanced Events
 # B1
 shroud.2400.name: "Materia en flujo"
 shroud.2400.desc: "Estamos perdiendo materias primas a una velocidad alarmante. Reservas enteras de materia inorgánica en fábricas y almacenes se están agotando más rápido de lo que se usan, [Owner.GetMatterInFluxExtra]. Estas pérdidas se correlacionan con una mayor actividad psiónica en las ubicaciones afectadas.\n\nPodríamos responder deteniendo la actividad psiónica en las proximidades de los depósitos de materiales, pero esto ralentizará el ritmo de nuestra investigación psiónica y limitará sus aplicaciones industriales. Alternativamente, podríamos seguir las propuestas para desarrollar un atenuador de campo psiónico que debería detener el proceso de desmaterialización. Si no intervenimos, veremos atenuadas nuestras capacidades de investigación psiónica."
 shroud.2400.desc_default: "se presume que a causa de un fenómeno de desmaterialización espontánea, no por delincuencia o incompetencia"
 shroud.2400.desc_gestalt: "se presume que a causa de una desmaterialización espontánea en lugar de un comportamiento desviado o incompetente"
 shroud.2400.a: "Lo material carece de importancia."
 shroud.2400.b: "Desarrollemos instrumental que ponga freno a la desmaterialización."
 shroud.2400.c: "Declaremos una zona libre de actividad psiónica."
 # B2
 shroud.2405.name: "Mentalismo forense"
 shroud.2405.desc: "El interés generalizado por la energía psiónica entre nuestra población ha dado lugar a una actividad muy singular: coleccionar [Owner.GetSpeciesBrainPlural] exánimes y tratar de entablar comunicación.\n\nQuienes practican esto creen que la información cognitiva de un organismo puede sobrevivir a su [Owner.GetDeathName], idea que parte de teorías científicas que abogan por la existencia de las fuerzas físicas como formas de energía, es decir, convertibles pero indestructibles. Un porcentaje pequeño pero cada vez mayor cree que la defunción de un [Owner.GetIndividualName] con aptitudes psiónicas provoca una ruptura infinitesimal del subespacio, una ventana a través de la cual se pueden observar otras dimensiones.\n\nSi bien la investigación innovadora es encomiable, la interferencia con partes de nuestra población que ha [Owner.GetDeceasedAdj] plantea preocupaciones éticas. Además, hemos recibido informes sobre una clase cada vez mayor de ladrones de cadáveres que obtienen estas piezas por medios delictivos."
 shroud.2405.a: "Una iniciativa aceptable, si la conseguimos regular."
 shroud.2405.b: "A los difuntos hay que dejarlos en paz."
 shroud.2405.c: "[Owner.GetSpeciesBrainPlural] muertos para todos."
 # B3a
 shroud.2410.name: "Transformaciones psiónicas"
 shroud.2410.desc: "A cuantiosos sectores de nuestra población les han brotado extraños apéndices articulados de enrevesado diseño. Según nuestros [Owner.GetScientistPlural], su aparición fue causada por una [Owner.GetGeneticMutationName] espontánea a escala masiva. Queda, pues, demostrado que la actividad psiónica puede inducir cambios físicos a quien la practica. Si bien no podemos evitar la aparición de estas protuberancias, hemos descubierto que podemos controlar psiónicamente su velocidad de crecimiento.\n\nAunque inicialmente causaron algún tipo de [Owner.GetDistressName], estas partes adicionales han demostrado ser sorprendentemente útiles. Si se emplean con fines productivos, tal vez valga la pena la carga cognitiva adicional que suponen."
 shroud.2410.a: "Una iniciativa aceptable, si la conseguimos regular."
 shroud.2410.b: "Qué abominación. Que los amputen todos."
 shroud.2410.c: "Extraordinario, pero fascinante. Bienvenido sea el cambio."
 # B3b
 shroud.2415.name: "Telequinesis aplicada a [Owner.GetEthicsPluralCap]"
 shroud.2415.desc: "Nuestro equipo de [Owner.GetScientistPlural] ha desarrollado un método eficaz para convertir ondas psiónicas en energía cinética, y ya se encuentran trabajando con [Owner.GetEngineerPlural] para adaptar la tecnología a fines prácticos.\n\nAunque su empleo en el ámbito industrial promete, desconocemos aún qué repercusiones acarreará en el plano social. Si un grupo reducido de [Owner.GetIndividualNamePlural] con aptitudes psiónicas es capaz de poner en funcionamiento y operar una red de maquinaria compleja, la inmensa mayoría de [Owner.GetWorkerNamePlural] bien podría caer en la obsolescencia. [Owner.GetTelekineticEthicsExtra] Aunque aún nos queda mucho camino que recorrer en materia de desarrollo de técnicas psiónicas, será mejor proceder con cautela."
 shroud.2415.extra: "El crecimiento desenfrenado de esta práctica amenaza con sembrar discordia en una sociedad que aún está asimilando su potencial psiónico."
 shroud.2415.extra_gestalt: "El crecimiento desenfrenado de esta práctica amenaza con aumentar la desviación de los drones desplazados mientras se les da un nuevo uso."
 shroud.2415.a: "Nuestras industrias prosperarán."
 shroud.2415.b: "Gran noticia para nuestra tecnología militar."
 shroud.2415.c: "Más vale limitar su uso. Es mayor la fiabilidad del trabajo físico."
 # B4
 shroud.2420.name: "Un dolor que se agrava"
 shroud.2420.desc: "Un brote repentino de [Owner.GetAcuteMigrainePlural] azota a nuestro imperio. La dolencia afecta ya a parte considerable de nuestra población, trastocando el buen funcionamiento de §H[Owner.GetName]§!.\n\nLos más afectados son un número reducido de [Owner.GetIndividualNamePlural] con un poder psiónico reseñable, y los análisis preliminares apuntan a una correlación entre la aptitud psiónica y la intensidad de los síntomas.[Owner.GetAGrowingPainExtra]"
 shroud.2420.extra_default: " Los tratamientos convencionales resultan ineficaces, pues parece ser que el dolor incide directamente en las facultades psiónicas a través de canales interdimensionales que apenas empezamos a entender."
 shroud.2420.extra_machine: ""
 shroud.2420.a: "Debemos aprender a sobrellevar este mal."
 shroud.2420.b: "Que se distribuyan analgésicos más potentes."
 shroud.2420.b_machine: "Que se distribuyan mejoras protectoras."
 shroud.2420.c: "El dolor nos hará más fuertes."
 shroud.2420.c_machine: "La adversidad nos hará más fuertes."
 # B5
 shroud.2425.name: "Circuito clandestino de lucha psiónica"
 shroud.2425.desc: "[Owner.GetPsionicUndergroundIntro] [Owner.GetIndividualNamePlural] psiónicos están canalizando sus habilidades psíquicas en un deporte de combate sin ley, en el que los guerreros psiónicos luchan por créditos y gloria. Aunque muchos practicantes son luchadores con talento innato y apenas adiestramiento, [Owner.GetPsionicUndergroundExtra]\n\n[Owner.GetPsionicUndergroundEnd]"
 shroud.2425.intro: "Grupúsculos de"
 shroud.2425.intro_gestalt: "Grupos aberrantes de"
 shroud.2425.extra: "otros proceden de programas estatales de combate psiónico."
 shroud.2425.extra_gestalt: "otros poseen especialización en técnicas marciales psiónicas."
 shroud.2425.end: "Nuestras leyes e instituciones se han quedado rezagadas ante este tipo de prácticas violentas, de las que se nutren organizaciones criminales mediante apuestas ilegales. No obstante, podemos intervenir por vías diversas para someter actividades de esta índole a un control estatal."
 shroud.2425.end_gestalt: "Aunque la desviación siempre entraña ciertos riesgos, esta actividad nos ha procurado un nuevo método de lo más práctico para recabar datos de combate psíquico."
 shroud.2425.end_gestalt_organic: "$shroud.2425.end_gestalt$ Tal vez, con moderación, podríamos destinar esas sensaciones a fines beneficiosos, dando así salida a la agresividad reprimida del colectivo en tiempos de paz."
 shroud.2425.end_gestalt_machine: "$shroud.2425.end_gestalt$ Con parámetros de prueba más rigurosos, estos \"juegos\" podrían servir a nuestro beneficio colectivo."
 shroud.2425.a: "Reclutemos a estos guerreros, pues es importante el servicio que pueden prestar."
 shroud.2425.a.tt: "Consigue 3 §Y$psionic_army_plural$§! en §Y[event_target:spawn_system.GetName]§!"
 shroud.2425.b: "Estudiemos estos \"combates psiónicos\"."
 shroud.2425.c: "Hay que poner punto final a esta violencia innecesaria."
 shroud.2425.d: "Legalicemos la actividad para convertirla en un deporte mediático."
 shroud.2425.d_gestalt: "Que se regularice la actividad a modo de competición pública."
 # Chaotic Events
 # C1
 shroud.2502.name: "Lluvia del Velo"
 shroud.2502.desc: "Hemos recibido informes de cambios ambientales repentinos en un sector particular de §H[This.GetName]§!.\n\nLa atmósfera se encuentra cargada de un vapor gelatinoso que cubre el suelo con una precipitación aceitosa a la que los [Owner.GetIndividualNamePlural] psiónicos llaman \"lluvia del Velo\". En las inmediaciones se han reportado importantes perturbaciones psíquicas.\n\nLas condiciones que acarrea la lluvia del Velo son extremadamente [This.Owner.GetShroudfallExtra]. A menos que invirtamos en la regeneración del entorno, los habitantes no tendrán más remedio que adaptarse a esta alteración radical."
 shroud.2502.extra_default: "peligrosas para la vida sintiente"
 shroud.2502.extra_machine: "dañinas para nuestros circuitos neurales"
 shroud.2502.extra_homicidal_hive: "peligrosas para [Owner.GetSpeciesNamePlural]"
 shroud.2502.a: "Que el Velo consuma esa tierra si así ha de ser."
 shroud.2502.b: "Busquemos la manera de recuperar nuestro medio ambiente."
 shroud.2502.c: "Cosechemos este material exótico antes de que permee."
 # C2
 shroud.2505.name: "Fuera de control"
 shroud.2505.desc: "Hay quien ha comenzado a manifestar un comportamiento anormal, con abruptos cambios de opinión, hábitos y conducta en general. Multitud de [Owner.GetWorkerNamePlural] han cesado sus labores, y [Owner.GetOutOfControlExtra].\n\nLos afectados afirman actuar a voluntad de una entidad ignota que mora en los márgenes de su consciencia, guiando uno a uno sus actos. A medida que forjamos nuestro futuro psiónico, debemos considerar cuidadosamente el impacto de las fuerzas extradimensionales en [Owner.GetOutOfControlPsyche]."
 shroud.2505.extra_default: "representantes cuya lealtad era hasta ayer incuestionable hoy discrepan públicamente"
 shroud.2505.extra_machine: "administradores que siempre fueron fiables ahora no rinden como se espera de ellos"
 shroud.2505.psyche_default: "la psique [Owner.GetAdjective]"
 shroud.2505.psyche_machine: "nuestros circuitos lógicos"
 shroud.2505.a: "Podemos aprender a mitigar estos impulsos."
 shroud.2505.b: "Es mucho lo que nos pueden enseñar esas voces."
 shroud.2505.c: "Una amenaza a nuestra autoridad. Erradiquémosla."
 # C3
 shroud.2510.name: "Sobrecarga neuronal"
 shroud.2510.desc: "[Owner.GetNeuralOverloadIntro]\n\nPruebas exhaustivas han revelado que una porción significativa de nuestra población sufre de [Owner.GetNeuralOverloadExtra], probablemente debido al aumento de la actividad [Owner.GetPsychicAdj]. Toda actividad psiónica exenta de control provoca crecidas de energía que pueden dar pie a consecuencias graves de manera precipitada.\n\nLas técnicas avanzadas de meditación podrían ayudar a controlar esta actividad psiónica sin intervención [Owner.GetMedicalAdj], pero algunos de nuestros [Owner.GetScientistPlural] recomiendan que desarrollemos algún tipo de [Owner.GetMedicalImplantName] para abordar el problema."
 shroud.2510.intro_default: "En §H[Owner.GetName]§! se está registrando un aumento en las rupturas cerebrales graves, que a menudo resultan en deterioro cognitivo o muerte."
 shroud.2510.intro_machine: "En §H[Owner.GetName]§! se está registrando un pico de sobrecarga grave en los circuitos que a menudo resulta en un deterioro cognitivo o un colapso total."
 shroud.2510.extra_default: "aneurismas asintomáticos leves"
 shroud.2510.extra_machine: "sobrecarga de circuitos"
 shroud.2510.a: "Los fuertes sobrevivirán."
 shroud.2510.a_tt: "Probabilidad de que cada colonia en propiedad pierda 100 de £pops£ §Ypoblación§!: §R33%§!"
 shroud.2510.b: "Invirtamos en un modelo de [Owner.GetImplantName]."
 shroud.2510.c: "Apaciguaremos las mentes con meditación."
 shroud.2510.c_corporate: "Pongamos en marcha una formación de sinergia psiónica."
 # C4
 shroud.2515.name: "[Owner.GetNightmaresName]"
 shroud.2515.name_organic_non_gestalt: "Nightmares"
 shroud.2515.name_others: "Surgen los sueños"
 shroud.2515.desc: "Nuestra conexión con las fuerzas psiónicas que nos envuelven se consolida, pero la población [Owner.GetAdjective] se ve de pronto asaltada por [Owner.GetHorrifyingNightmarePlural].\n\n[Owner.GetNightmaresExtra]\n\n[Owner.GetNightmaresEnding]"
 shroud.2515.extra_default: "Los sueños indeseables se han vuelto habituales, y los ciclos de descanso se han tornado en periodos de intranquilo estupor. Quienes padecen estos episodios afirman haber presenciado visiones aterradoras de aberraciones sobrenaturales que despiertan miedos alojados en lo más primigenio de la psique."
 shroud.2515.extra_gestalt: "Hemos empezado a experimentar lo que se cree que las consciencias singulares denominan \"sueños\". Quienes padecen el fenómeno afirman haber presenciado visiones de aberraciones sobrenaturales que representan amenazas fundamentales para nuestro colectivo."
 shroud.2515.extra_machine: "Dichos \"sueños\" se han vuelto habituales, y los ciclos de descanso se han tornado en periodos de perturbación de datos. Quienes padecen estos episodios afirman haber presenciado visiones de aberraciones sobrenaturales que representan un peligro extremo para su bienestar."
 shroud.2515.end_organic: "Nuestras instituciones médicas están teniendo dificultades para frenar la epidemia de agotamiento psíquico."
 shroud.2515.end_machine: "Nuestras unidades de mantenimiento están teniendo dificultades para poner freno al agotamiento que impera en la red neural."
 shroud.2515.a_organic: "Que se prescriban psicofármacos para calmarlos."
 shroud.2515.a_machine: "Mejoremos nuestros psicoprocesadores para atenuar esas alteraciones."
 shroud.2515.b: "Destinaremos equipos científicos a remediar esta crisis."
 shroud.2515.c: "Las pesadillas no pueden hacernos daño."
 # C5
 shroud.2520.name: "Ataques monstruosos"
 shroud.2520.desc: "§H[Owner.Capital.GetName]§! ha sufrido una oleada de ataques por parte de especies fáunicas locales. Las criaturas han agredido a la población, asolado edificios y arrasado valiosas reservas de recursos.\n\nSe ha intentado proteger a la población con patrullas armadas y la imposición de un toque de queda, pero las medidas han resultado ser ineficaces. Nuestra división de [Owner.GetResearchers] ha determinado que se produjo una fisura minúscula entre nuestra realidad y el §HVelo§! en una ubicación específica de §H[Owner.Capital.GetName]§!, y a la energía psiónica que entró a través de ella transformó en violentos depredadores a las que antes eran bestias mansas. Para hacer frente a la amenaza, podríamos concentrar nuestras energías aquí."
 shroud.2520.a: "Bombardeemos sin cuartel la zona donde se originan los ataques."
 shroud.2520.b: "Procedamos al sellado de la zona mediante control psiónico."
 shroud.2520.c: "Ralenticemos la investigación del Velo a fin de apaciguar a esas fuerzas."
 shroud.2520.c_tt: "§Y$situation_breach_shroud$§! $situation_speed_tt$: §R-25%§!"
 shroud.2520.d: "El Velo alberga un sinfín de sorpresas. Vivamos y dejemos vivir."
 # Social Events
 # S1
 shroud.2600.name: "Complejo de superioridad"
 shroud.2600.desc: "La distribución dispareja de aptitudes psiónicas entre nuestra población está originando conflictos sociales sin precedentes.\n\nQuienes mejor controlan sus nuevos poderes se han empezado a considerar superiores y, por consiguiente, a exigir privilegios políticos y económicos. Su retórica divisiva cobra cada vez más agresividad y amenaza ya con volverse violenta."
 shroud.2600.a: "La arrogancia es un mal que no toleramos."
 shroud.2600.b: "Una habilidad superior merece recompensas superiores."
 dissidents_silenced_modifier: "Disidencia silenciada"
 dissidents_silenced_modifier_desc: "La represión de quienes reclaman privilegios psiónicos minimiza la inestabilidad política."
 psionic_superiority_modifier: "Superioridad psiónica"
 psionic_superiority_modifier_desc: "Los individuos con más talento psiónico merecen un trato especial."
 # S2
 shroud.2605.name: "Resistencia antipsiónica"
 shroud.2605.desc: "Empieza a cobrar inercia un movimiento rebelde que manifiesta su oposición a toda tentativa de explorar e integrar nuestro potencial psiónico. Estos grupos disidentes abogan por una supervisión más estricta de los individuos psiónicos y un rechazo total a cualquier investigación futura en esta materia.\n\nSi se permite que sus actividades continúen, el progreso en la comprensión y el dominio de nuestros poderes psiónicos emergentes podría verse amenazado."
 shroud.2605.a: "Aplastemos a los opositores."
 shroud.2605.b: "Tratemos de apaciguarlos."
 dissenters_repressed_modifier: "Disidencia reprimida"
 dissenters_repressed_modifier_desc: "Nuestra sociedad no tiene tiempo que perder con ideologías antipsiónicas."
 performative_pluralism_modifier: "Pluralismo impostado"
 performative_pluralism_modifier_desc: "Fingir un afán pluralista en lo que respecta a los poderes psiónicos servirá para acallar a la disidencia sin renunciar a la productividad."
 # S3
 shroud.2610.name: "Conducta fraudulenta"
 shroud.2610.desc: "A medida que nuestras habilidades psiónicas se fortalecen, hemos visto un aumento en los informes de explotación, engaños y comportamiento fraudulento entre nuestra población. Es evidente que una minoría nada desdeñable de [owner.GetSpeciesNamePlural] está haciendo un uso reprochable de sus nuevos poderes.\n\nLas víctimas ultrajadas exigen una revisión de las leyes existentes para brindar mayor protección contra los delitos psiónicos."
 shroud.2610.a: "Más leyes únicamente entorpecerán los avances."
 shroud.2610.b: "Es imperioso proteger a la población."
 psionic_crime_modifier: "Delincuencia psiónica"
 psionic_crime_modifier_desc: "Cierto abuso del poder psiónico es el precio inevitable del progreso."
 psionic_crime_crackdown_modifier: "Represión de la delincuencia psiónica"
 psionic_crime_crackdown_modifier_desc: "Una sociedad psiónica requiere de un sistema jurídico innovador."
 # S4
 shroud.2615.name: "Experimentos temerarios"
 shroud.2615.desc: "Nuestra población apenas ha empezado a acostumbrarse a sus nuevos poderes, pero hay [owner.GetSpeciesNamePlural] que ya se exponen a riesgos de gran magnitud con tal de acelerar su desarrollo psiónico.\n\nEl uso de [owner.GetMentalUpgrade] del mercado negro ha aumentado drásticamente. [owner.GetMedicalFacility] sin regular ofrecen varios servicios no probados para ayudar a los individuos a maximizar sus capacidades psiónicas. Resulta imposible predecir las consecuencias que podría entrañar semejante riesgo."
 shroud.2615.a: "Estos experimentos podrían hacer avanzar nuestra investigación."
 shroud.2615.b: "Que no queden [owner.GetMedicalFacilityShortPlural] alegales en pie."
 psionic_experimentation_modifier: "Experimentación psiónica"
 psionic_experimentation_modifier_desc: "Los métodos experimentales no probados para aumentar capacidades psiónicas se popularizan."
 self_experimentation_controls_modifier: "Control de la experimentación doméstica"
 self_experimentation_controls_modifier_desc: "Se prohíbe a la población realizar y someterse a experimentos psiónicos no regulados."
 # S5 (gestalt)
 shroud.2620.name: "Escisión psiónica"
 shroud.2620.desc: "Una segregación preocupante se extiende por [owner.GetName]: los drones psiónicos buscan una proximidad física mutua, formando colectivos que en ocasiones se distancian del resto de su [owner.GetHiveEntity].\n\nSi bien dichos drones permanecen presentes [owner.GetMentalAdj] dentro del colectivo, su inusitada conducta física ha suscitado dudas estremecedoras con respecto a las consecuencias venideras de nuestros poderes psiónicos, aún en desarrollo."
 shroud.2620.a: "Sigamos observando el fenómeno."
 shroud.2620.b: "Será mejor limitar los movimientos de los drones psiónicos."
 psionic_cluster_gestalt_modifier: "Concentraciones psiónicas"
 psionic_cluster_gestalt_modifier_desc: "Las observaciones de comportamientos inusuales en drones psiónicos respaldan el progreso de la investigación."
 restricted_movements_gestalt_modifier: "Desplazamientos restringidos"
 restricted_movements_gestalt_modifier_desc: "Es necesario controlar a los drones psiónicos en aras de la unidad."
 # S5 (non-gestalt)
 shroud.2621.name: "Ostracismo psiónico"
 shroud.2621.desc: "Se ha desarrollado una preocupante forma de segregación en [owner.GetName], donde los individuos psiónicos se ven socialmente marginados hasta el punto de retirarse y formar sus propias comunas remotas.\n\nSe dice que quienes visitan estas zonas sin poderes psiónicos regresan físicamente ilesos, pero mentalmente perturbados en formas que les cuesta explicar."
 shroud.2621.a: "$shroud.2620.a$"
 shroud.2621.b: "Será mejor limitar los movimientos de los individuos psiónicos."
 psionic_cluster_modifier: "Comunas psiónicas"
 psionic_cluster_modifier_desc: "Las observaciones de comportamientos inusuales en individuos psiónicos contribuyen al progreso de la investigación."
 restricted_movements_modifier: "$restricted_movements_gestalt_modifier$"
 restricted_movements_modifier_desc: "Es necesario controlar a los individuos psiónicos en aras de la unidad."
 # S6 (organic)
 shroud.2625.name: "Epidemia psiónica"
 shroud.2625.desc_common: "Sin embargo, las investigaciones en curso sobre este inusual fenómeno psiónico sugieren que el proceso puede manipularse de diversas maneras."
 shroud.2625.desc: "Una nueva enfermedad está azotando [owner.GetName], cuya población padece lesiones inexplicables en sus órganos neurales.\n\nLa dolencia afecta exclusivamente a [owner.GetIndividualNamePlural] con aptitudes psiónicas prominentes, llegándose a cobrar su vida en muchos casos.\n\n$shroud.2625.desc_common$"
 shroud.2625.a: "Prioricemos los usos terapéuticos."
 shroud.2625.b: "Esta enfermedad será nuestra arma."
 therapeutic_psionics_organic_modifier: "Terapia psiónica"
 therapeutic_psionics_organic_modifier_desc: "La propagación de afecciones psiónicas brinda la oportunidad de desarrollar nuevos tratamientos."
 weaponized_psionics_modifier: "Belicismo psiónico"
 weaponized_psionics_modifier_desc: "Los poderes psiónicos nos abren las puertas a nuevas estrategias de batalla."
 weaponized_psionics_gestalt_modifier: "$weaponized_psionics_modifier$"
 weaponized_psionics_gestalt_modifier_desc: "$weaponized_psionics_modifier_desc$"
 # S6 (machine)
 shroud.2626.name: "Avería psiónica"
 shroud.2626.desc: "Una oleada de averías inexplicables sacude todo el [owner.GetName]. Los neuroprocesadores de nuestra población ha empezado a fallar de golpe y sin previo aviso.\n\nComo dato curioso, esto solo ha afectado a los [owner.GetIndividualNamePlural] con lecturas psiónicas altas. En la mayoría de los casos, la avería no solo los incapacita, sino que también los destruye.\n\n$shroud.2625.desc_common$"
 shroud.2626.a: "Prioricemos los usos correctivos."
 shroud.2626.b: "Esta vulnerabilidad será nuestra arma."
 therapeutic_psionics_machine_modifier: "$therapeutic_psionics_organic_modifier$"
 therapeutic_psionics_machine_modifier_desc: "La propagación de averías físicas asociadas a la psiónica brinda la oportunidad de desarrollar técnicas de mantenimiento nuevas."
 # S7
 shroud.2630.name: "Experimentos fallidos"
 shroud.2630.desc.common_1: "Los primeros experimentos con [owner.GetIndividualNamePlural] con potencial psiónico han fracasado, provocando a la mayoría de sujetos"
 shroud.2630.desc.common_2: "Aunque estos resultados no carecen de valor para la investigación, es cuestionable si este tipo de trabajos es la mejor manera de avanzar en la comprensión de nuestros incipientes poderes psiónicos."
 shroud.2630.desc.default: "$shroud.2630.desc.common_1$ daños en su procesador lógico.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.hive: "$shroud.2630.desc.common_1$ una merma de sus funciones cognitivas.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.machine: "$shroud.2630.desc.common_1$ graves pérdidas de memoria.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.a: "Redoblemos los experimentos."
 shroud.2630.b: "Será mejor ponerles fin."
 psionic_roll_chance_modifier: "Experimentación psiónica"
 psionic_roll_chance_modifier_desc: "Es absurdo limitar nuestra investigación psiónica."
 population_protections_modifier: "Protecciones para la población"
 population_protections_modifier_desc: "El progreso psiónico debe llegar de forma segura o no debe llegar en absoluto."
 # S8
 shroud.2635.name: "Desarrollo de empatía"
 shroud.2635.desc.gestalt: "La exploración de nuestras nuevas habilidades psiónicas ha resultado en cambios fundamentales en las capacidades empáticas del conjunto de [owner.GetSpeciesNamePlural].\n\nA estas alturas, es ya irrebatible que nos hemos sofisticado en lo que respecta a concebir perspectivas, patrones de pensamiento y emociones de consciencias ajenas. El devenir de [owner.GetName] determinará si el cambio nos fortalece o nos hace más vulnerables."
 shroud.2635.desc.default: "A medida que nuestra población explora sus nuevas capacidades psiónicas, se ha establecido una nueva comunidad con el objetivo de aplicarlas hacia una mayor comprensión empática de otras consciencias.\n\nEste colectivo se dice capaz de concebir perspectivas, patrones de pensamiento y emociones ajenas de manera más sofisticada gracias a sus sentidos psiónicos emergentes. Será el tiempo el que determine si esta corriente beneficiará o irá en detrimento de [owner.GetName]."
 shroud.2635.a: "Es una oportunidad de aprender."
 shroud.2635.b: "La empatía nos debilita."
 empathetic_initiative_modifier: "Iniciativa empática"
 empathetic_initiative_modifier_desc: "La naturaleza de la psiónica permite una mejor comprensión de otras mentes y permite interacciones externas más sofisticadas."
 empathetic_initiative_opinion_tooltip: "£opinion£ $OPINION$ con todos los imperios contactados: §G+$@empathetic_initiative_value|0$§!"
 opinion_empathetic_initiative: "$empathetic_initiative_modifier$"
 cautious_progress_modifier: "Progreso cauteloso"
 cautious_progress_modifier_desc: "Por la seguridad de nuestro imperio, es necesario controlar todo avance en materia psiónica."
 # S9
 shroud.2640.name: "Psiónica desviada"
 shroud.2640.desc.common_1: "Conforme desarrollamos nuestras capacidades psiónicas, hay individuos que no logran asimilar el peso de estos poderes emergentes. Multitud de [owner.GetIndividualNamePlural] han manifestado"
 shroud.2640.desc.common_2: "Nuestros estudios sugieren que no se trata de un defecto, sino de una inestabilidad derivada de la eficiencia psiónica excepcional que ha revelado el segmento afectado de [owner.GetSpeciesNamePlural]. Si se les proporciona un adiestramiento adecuado, esta minoría de [owner.GetIndividualNamePlural] podría constituir el próximo eslabón en nuestra cadena evolutiva psiónica. Todo intento de utilizar estas habilidades conllevará un riesgo inherente."
 shroud.2640.desc.gestalt: "$shroud.2640.desc.common_1$ niveles preocupantes de conducta desviada a medida que se disocian del colectivo.\n\n$shroud.2640.desc.common_2$"
 shroud.2640.desc.default: "$shroud.2640.desc.common_1$ niveles preocupantes de conductas autodestructivas, amén de recurrir a métodos de autosupresión peligrosos.\n\n$shroud.2640.desc.common_2$"
 shroud.2640.a: "Demos uso a sus habilidades extraordinarias."
 shroud.2640.a.tt: "Se destruye un edificio al azar en cada colonia."
 shroud.2640.b: "Sus anomalías no tienen cabida aquí."
 psionic_specialization_modifier: "Especialización psiónica"
 psionic_specialization_modifier_desc: "Gracias a un riguroso adiestramiento psiónico, la productividad ha aumentado sustancialmente."
 psionic_suppression_modifier: "Supresión psiónica"
 psionic_suppression_modifier_desc: "Debemos controlar a aquellos cuyo poder amenaza el bien común."
 psionic_suppression_gestalt_modifier: "$psionic_suppression_modifier$"
 psionic_suppression_gestalt_modifier_desc: "$psionic_suppression_modifier_desc$"
 # Stage Events
 # Mind over Matter
 shroud.2750.name: "Ascensión psiónica"
 shroud.2750.desc_p1: "Desde tiempos inmemoriales proliferan los relatos de [This.GetSpeciesNamePlural] con poderes extraordinarios, capaces de invadir mentes ajenas, elevar objetos pesados con el pensamiento o llevar a cabo todo tipo de hazañas sobrenaturales."
 shroud.2750.desc_p1_hive_mind: "Antiguamente, cuando la desviación estaba muy extendida, se oían historias acerca de [This.GetSpeciesNamePlural] con poderes extraordinarios, capaces de invadir las mentes externas al colectivo, elevar objetos pesados con el pensamiento o llevar a cabo todo tipo de hazañas sobrenaturales."
 shroud.2750.desc_p1_machine: "Ya en las primeras bases de datos que poseemos, algunas de nuestras unidades registraron la existencia de [This.GetSpeciesNamePlural] con poderes extraordinarios, capaces de hackear las mentes de las máquinas y los orgánicos, manipular objetos usando únicamente procesos internos o realizar otras funciones inverosímiles."
 shroud.2750.desc_p1_unplugged: "A pesar de la corta y violenta historia de nuestra civilización, los [This.GetSpeciesNamePlural] hemos tenido ocasiones de dejar volar nuestra imaginación y contar historias de [This.GetSpeciesNamePlural] con poderes extraordinarios, capaces de leer mentes, levantar objetos pesados con solo un pensamiento o realizar todo tipo de hazañas sobrenaturales."
 shroud.2750.desc_p2: "Ahora, nuestros [This.GetScientistPlural] han obtenido una prueba irrefutable de que algunos [This.GetSpeciesNamePlural] son verdaderamente capaces de llevar a cabo dichos actos con la mente. Hasta el momento, solo una pequeña minoría de nuestra [This.GetSpeciesWord] ha manifestado estos poderes \"psiónicos\"."
 shroud.2750.desc_p2_unplugged: "Muchos creen que estas historias fantásticas nos acompañan desde antes de que [origin_unplugged_assimilator_empire.GetName] nos asimilara, aunque pocos de ellos las consideraban verosímiles. $shroud.2750.desc_p2$"
 shroud.2750.desc_p3: "[This.GetMindOverMatterEnding]"
 shroud.2750.desc_p3_default: "Este poder parece clave para alcanzar nuestro máximo potencial. Si la sociedad [This.GetAdjective] consigue desbloquear estas habilidades latentes, seremos capaces de controlar dimensiones que superan la comprensión común."
 shroud.2750.desc_p3_crisis_4_5: "Estamos siendo alimentados por la energía psiónica que extrajimos del §HVelo§!. Si logramos desbloquear la capacidad psiónica de la sociedad [This.GetAdjective], podremos alcanzar el potencial al que estamos abocados."
 shroud.2750.desc_p3_origins: "Las fuerzas psiónicas no son desconocidas para nosotros si tenemos en cuenta la influencia del §HVelo§!. Si logramos desbloquear la capacidad psiónica de la sociedad [This.GetAdjective], podremos alcanzar nuestro potencial latente."
 shroud.2750.a: "$utopia.2600.a$"
 shroud.2750.a.tt: "Desbloquea la sección del §HVelo§!."
 # Establishing the Psi Corps
 shroud.2760.name: "Estableciendo el $building_psi_corps$"
 shroud.2760.desc_p1: "A medida que nuestras habilidades latentes se transforman en poderes psiónicos plenos, nuestra sociedad se enfrenta a innumerables cambios, pues están surgiendo nuevas habilidades y prácticas con rapidez. Estamos empezando a comprender las consecuencias que tienen para nuestra civilización."
 shroud.2760.desc_p2_psi_corps: "Desde que establecimos un §H$building_psi_corps$§!, hemos estado desarrollando y canalizando las habilidades de [GetIndividualNamePlural] psiónicos prometedores para hacer frente a estas condiciones sin precedentes. Usando $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_no_psi_corps: "Estas circunstancias sin precedentes justifican el establecimiento de un §H$building_psi_corps$§! para desarrollar y canalizar las habilidades de [Owner.GetIndividualNamePlural] psiónicos prometedores. Con $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_end: "su conocimiento [Owner.GetTelepathic] de las mentes de nuestra población, podemos supervisar la actividad psiónica para garantizar la seguridad de todos."
 shroud.2760.a: "Confiad en el cuerpo."
 shroud.2760.a_gestalt: "Depositamos nuestra confianza en el cuerpo."
 shroud.2760.a_no_psi_corps: "Permitid que establezcamos este \"$building_psi_corps$\"."
 shroud.2760.a_tt: "$shroud.2820.a.tt$"
 shroud.2760.a_tt_no_psi_corps: "Adopta la tradición §H$tr_psionics_psi_corps$§! y construye un edificio ['building:building_psi_corps'] para que la situación progrese."
 # The Great Awakening
 shroud.2780.name: "$utopia.2650.name$"
 shroud.2780.desc_1: "Nuestra investigación psiónica continúa a buen ritmo. La telepatía ha reemplazado casi por completo nuestra comunicación verbal, y el control cognitivo de la materia podría llegar a ser igual de común. Según nuestros [Owner.GetResearchers], estamos a punto de despertar los poderes latentes de toda nuestra población [Owner.GetSpeciesAdj]."
 shroud.2780.desc_1_trad: "Hemos despertado. Los [Owner.GetSpeciesNamePlural] de [Owner.GetName] han desbloqueado por completo su capacidad psiónica. La telepatía ha reemplazado casi por completo nuestra comunicación verbal, y el control cognitivo de la materia podría llegar a convertirse en algo común."
 shroud.2780.desc_1_gestalt_machine: "Nuestra investigación psiónica continúa a buen ritmo. Ahora podemos comunicarnos sin tener que usar los canales existentes. Además, varias habilidades psiónicas se están integrando rápidamente en nuestra vida cotidiana. Según nuestros [Owner.GetResearchers], estamos a punto de desbloquear las capacidades latentes de nuestra población."
 shroud.2780.desc_1_gestalt_machine_trad: "El destino está aquí. [Owner.GetSpeciesNamePlural] de [Owner.GetName] han desbloqueado su capacidad psiónica al completo. Ahora podemos comunicarnos sin tener que usar los canales existentes. Además, varias habilidades psiónicas se están integrando rápidamente en nuestra vida cotidiana."
 shroud.2780.desc_2: "A medida que se iban abriendo nuestras mentes, percibimos unas fuerzas inefables arremolinándose en nuestro interior y alrededor de nosotros. Nuestros principales [Owner.GetTelepathPlural] hablan del §HVelo§!, un reino primordial del que todos los [Owner.GetIndividualNamePlural] psiónicos extraen poder, aunque sea de manera inconsciente. Se trata del hogar de poderosas entidades hechas de energía psiónica pura. Nos llaman desde el interior de nuestras mentes, como un susurro apagado en una habitación oscura."
 shroud.2780.desc_2_crisis: "A medida que nuestras mentes se iban abriendo, percibimos unas fuerzas inefables procedentes del §HVelo§! arremolinándose en nuestro interior y alrededor de nosotros. Sabemos que todos los [Owner.GetIndividualNamePlural] psiónicos extraen el poder de este reino, aunque sea de manera inconsciente. Se trata del hogar de poderosas entidades hechas de energía psiónica pura. Nos llaman desde el interior de nuestras mentes, como un susurro apagado en una habitación oscura."
 shroud.2780.desc_3: "Si hacemos un esfuerzo cognitivo entre todos, quizá podamos comunicarnos con estos seres. Pero, para ello, tenemos que averiguar cómo romper la cortina que separa nuestra dimensión del Velo."
 shroud.2780.desc_3_chosen: "Si hacemos un esfuerzo cognitivo entre todos, tal vez podamos romper del todo la cortina que separa nuestra dimensión del Velo. Así podremos comulgar mejor con los seres que moran en su interior."
 shroud.2780.a: "Es hora de despertar."
 shroud.2780.a_trad: "$utopia.2655.a$"
 shroud.2780.a_tt: "Adopta la tradición §H$tr_psionics_shroud_great_awakening$§! para:$TABBED_NEW_LINE$- $tr_psionics_psionic_assimilation_desc$$TABBED_NEW_LINE$- $shroud.2780.a_tt_2$"
 shroud.2780.a_tt_2: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2780.a_tt_trad: "$tr_psionics_psionic_assimilation_desc$\n$shroud.2780.a_tt_2$"
 # The Shroud Breached
 shroud.2800.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2800.intro: "Tras pasar unos días sumidos en un trance [Owner.GetHypnotic], por fin hemos conseguido abrir una pequeña puerta al §HVelo§!.\n\nAhora, podemos [Owner.GetSeeVerb] este reino con mayor claridad y resolver los patrones de esa masa arremolinada."
 shroud.2800.desc: "$shroud.2800.intro$ Nuestras acciones influyen en sus flujos cambiantes de energía psiónica, y entidades sin forma nos devuelven la mirada desde el otro lado. A veces con curiosidad, otras con bondad... y, en algunas ocasiones, con malicia.[Owner.GetShroudBreachedExtra]\n\nNuestro dominio psiónico del reino corpóreo solo era el principio. Ahora que hemos establecido una conexión inicial psiónica, podremos combinar nuestros poderes cognitivos y adentrarnos en el Velo."
 shroud.2800.desc_extra: "Sus protocolos son mucho más oscuros que los de $the_animator_of_clay_color_article$."
 shroud.2800.desc_extra_chosen: "Algunos poseen un poder comparable al §H[GetChosenPatron]§!, si bien sus intenciones son completamente distintas."
 shroud.2800.a: "$utopia.2656.a$"
 shroud.2810.desc: "§HNueva conexión. Corriente invertida.\n\nEste giro de energía, aquí; solo un fragmento. Los otros quizá también puedan empoderaros. Profundizad más para procesar sus voluntades.\n\nSoy una sombra del gemelo. La carne precede al metal. Su llamada...§!\n\n$the_animator_of_clay_article_cap$ señala otra presencia, $shroud.first_contact_insert.composer$, en las profundidades del Velo."
 shroud.2810.a: "$utopia.2657.a$"
 # Shroud-Touched
 shroudwalkers_opinion_shroud_seals_tt: "Opinión: £opinion£ §R$@shroudwalkers_opinion_shroud_seals|0$§!"
 shroudwalker_teacher_conflicted_leader: "§RNo debe tener un líder de [event_target:mindwarden_enclave_country.GetName].§!"
 shroud.5300.b: "Deseamos §Ycomunicarnos§! con otras entidades del Velo."
 shroud.5300.c: "Deseamos fomentar nuestra §Ysintonía§! con un mecenas."
 shroud.5300.d: "Buscamos los §Ysecretos§! del Velo."
 shroud.5300.e: "¿Qué nos puedes contar sobre las §Y$PSIONIC_AURA_PLURAL$§!?"
 shroud.5300.f: "Ayúdanos a fortalecer nuestra §Y$PSIONIC_AURA$§!."
 shroud.5300.g: "Deseamos expandir el §Ydominio§! de nuestro mecenas."
 shroud.5305.desc: "Establecer una comunicación en los dominios del §HVelo§! ha resultado una empresa peligrosa para los inexpertos.\n\nPodemos guiaros a lo largo de este proceso, pero tened cuidado: puede ser muy peligroso dar la bienvenida a las entidades que habitan en su interior."
 shroud.5305.desc_all_contacted: "Hemos alcanzado el límite de nuestras capacidades para ayudaros en esta tarea. No hay más entidades a las que podamos guiar vuestros pensamientos.\n\nOs felicitamos por vuestros esfuerzos... Pocos son los que profundizan en los dominios del §HVelo§! y conservan la lucidez mental."
 shroud.5305.b: "Podemos apoyar esta labor con §Y$sr_zro$§!."
 shroud.5305.c: "Podemos apoyar esta labor con §Y$astral_threads$§!."
 shroudwalker_contact_patron_cooldown_tt: "§RTenemos que esperar hasta §Y[This.shroudwalker_contact_patron_cooldown_timer]§!.§!"
 shroud.5310.desc: "Cuanta mayor sea vuestra sintonía con la voluntad del §HVelo§!, más poderosa será vuestra mente.\n\n¿Con qué entidad queréis sintonizar?"
 shroudwalker_attune_patron_cooldown_tt: "§RTenemos que esperar hasta §Y[This.shroudwalker_attune_patron_cooldown_timer]§!.§!"
 shroud.5315.desc: "Ah, sí, el §HVelo§!... Está repleto de secretos, ocultos en lo más profundo de los tejidos del pensamiento y el sueño, para quien sepa encontrarlos.\n\nSolo podemos guiaros hasta el conocimiento que hemos descubierto. A partir de ahí, nuevas y formidables tecnologías pueden prosperar, mas ese camino ya es cosa vuestra.\n\nTan solo sabed que nuestro aquelarre de telépatas debe consagrarse por completo a esta tarea. Lo que haya más allá de su guía... escapa a nuestro control."
 shroud.5315.b: "$shroud.5305.b$"
 shroud.5315.c: "$shroud.5305.c$"
 shroud.5315.trigger_failed: "§REl [event_target:shroudwalker_enclave_country.GetName] no tiene nada más que revelar sobre este asunto.§!"
 shroudwalker_delving_ritual_cooldown_tt: "§REl aquelarre de telépatas necesita tiempo para recuperarse. No podrán llevar a cabo rituales de exploración hasta §Y[This.shroudwalker_delving_ritual_cooldown_timer]§!.§!"
 shroud.5318.desc: "El §HVelo§! ha demostrado una vez más que las coincidencias no existen.\n\nEl conocimiento que nuestro cónclave buscaba para vosotros lo habéis descubierto a través de vuestras propias exploraciones. Aunque aplaudimos vuestros esfuerzos, no podemos ayudaros más con este asunto."
 shroud.5320.desc.none: "La capacidad de que el §HVelo§! se manifieste en el reino físico es un secreto que está muy bien guardado, tanto que ni siquiera nosotros podemos desvelarlo. Para liberar el $PSIONIC_AURA$ es necesario emprender un viaje personal a sus diferentes dominios. Sintonizaos más intensamente con una entidad favorecida y este conocimiento se aclarará en vuestra mente."
 shroud.5320.desc.aura.intro: "Vuestra $PSIONIC_AURA$ es la manifestación de la sintonía que tenéis con el §HVelo§!. Afecta a todos cuantos os rodean y está llena de propósito. Nuestro aquelarre siente su forma mientras hablamos:"
 shroud.5320.desc.aura.outro: "La proyección de vuestro aura es bastante limitada ahora mismo. Si una entidad del Velo os ofrece un pacto, este entendimiento se hará más claro en vuestras mentes."
 shroud.5320.desc.aura.eater: "$shroud.5320.desc.aura.intro$ una textura §Hvoraz§!.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.cradle: "$shroud.5320.desc.aura.intro$ una textura §Hagradable§!.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.instrument: "$shroud.5320.desc.aura.intro$ una textura §Hindulgente§!.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.composer: "$shroud.5320.desc.aura.intro$ una textura §Hretorcida§!.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.whisperers: "$shroud.5320.desc.aura.intro$ una textura §Hinteligente§!.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.intensified: "Os felicitamos. Vuestros conocimientos acerca de las $PSIONIC_AURA_PLURAL$ ya superan los nuestros.\n\nVuestra sola presencia manifiesta una textura formidable del §HVelo§! en esta realidad. Cuántos secretos debéis de conocer..."
 shroud.5325.desc: "La amplificación de las §Y$PSIONIC_AURA_PLURAL$§! requieren grandes niveles de concentración para su mantenimiento.\n\nEstamos deseando ayudaros con esta cuestión, aunque para ello será necesario que contribuyáis con materiales que fomenten nuestra meditación."
 shroud.5325.zro: "$shroud.5305.b$"
 shroud.5325.thread: "$shroud.5305.c$"
 aura_amplification_cooldown_tt: "§REl aquelarre de telépatas necesita tiempo para recuperarse. No podrán ampliar nuestra aura hasta §Y[root.aura_amplification_timer]§!.§!"
 aura_amplification_modifier: "Amplificación del aura"
 shroud.5327.desc: "Nuestros telépatas han finalizado nuestro acuerdo para amplificar la fuerza de vuestra §Y$PSIONIC_AURA$§!.\n\nPara poder proseguir con nuestras meditaciones, necesitaremos más recursos. ¿Es de vuestro interés?"
 shroud.5327.a.zro: "Entregaremos el §H$sr_zro$§!."
 shroud.5327.a.thread: "Entregaremos los §H$astral_threads$§!."
 shroud.5327.b: "Esta vez no."
 shroud.5330.desc: "Como ya sabéis, manifestar vuestra §Y$PSIONIC_AURA$§! en un entorno inmediato es bastante fácil. Proyectar el aura en otra parte, sin embargo, es harina de otro costal.\n\nConocemos una forma de hacerlo...\n\nHay más similitudes entre la tecnología avanzada y la psiónica de lo que uno podría pensar. Quizá esto revele una verdad fundamental más profunda. En cualquier caso, conocemos un dispositivo que puede servir como conducto para hacer vuestra voluntad. Una vez que sintonicéis sus frecuencias, actuará como una mente suplementaria, incluso a grandes distancias.\n\nNuestros diseños pueden instalarse sin problemas en cualquier base estelar que cumpla los requisitos. ¿Os interesaría una máquina de estas características?"
 shroud.5330.zro: "Podemos ofrecer §H$sr_zro$§!"
 shroud.5330.thread: "Podemos ofrecer §H$astral_threads$§!"
 shroud.5350.desc: "No nos sorprende vuestra pregunta. Hemos percibido vuestro interés en este tema, por eso estamos encantados de ayudaros a que ampliéis vuestra mente.\n\nOs lo advertimos: cuando se os abran completamente los ojos, habrá cosas que no podréis olvidar. El camino que estáis invitando conduce hasta el §HVelo§!.\n\nNo os hacemos esta oferta a la ligera. Avisadnos cuando os sintáis preparados."
 shroud.5350.b: "Pagaremos."
 shroud.5350.trigger_failed: "§REsta tecnología ya se ha investigado.§!"
 shroud.5355.desc: "De hecho, sabemos de quienes caminan entre planos. Es una propuesta peligrosa, ya que los reinos físicos están conectados de maneras que ni siquiera nosotros entendemos.\n\nSin embargo, estamos deseando abrir un camino para vosotros. La desestabilización del espacio y del tiempo es algo que hay que hacer de manera responsable, así que esa es nuestra oferta."
 shroud.5355.b: "Abrid el camino."
 shroud.5375.desc: "¡Estáis inmiscuyéndoos con fuerzas que superan vuestra comprensión!\n\nEsas abominaciones del §HSello del Velo§! que estáis construyendo son dolorosas de soportar, incluso a esta distancia. Estáis poniendo a las mentes más brillantes de la galaxia en peligro. Cesad en su creación de inmediato. De lo contrario, dejaremos de tener trato con vosotros."
