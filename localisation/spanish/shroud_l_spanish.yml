 building_chamber_of_silence_paranoia_tt: "Reduce los efectos negativos de ['modifier:endbringers_paranoia'] en §G$@chamber_of_silence_effect_mult|0%$§!."
 building_chamber_of_silence_destroyed_tt: "§REste edificio se destruirá si se pierde la colonia.§!"
 shroud.8310.name: "$shroud.2750.name$"
 shroud.8310.desc: "Hemos sido llamados a niveles superiores de existencia. Aquellos de nosotros que se aferran con una resistencia infructuosa están siendo purgados a fin de preservar la santidad de nuestra ascensión. Nuestro destino está sellado; el camino tras nosotros se ha desmoronado a la sombra del $pc_shrouded$.\n\nLa §Rvoz§! se dirige ahora a nosotros con una claridad contundente.\n\n§R\"El camino está establecido\".§!\n\nAnsía el sacrificio voluntario."
 shroud.8310.a: "Es inevitable."
 shroud.8310.a.tt: "Cada colonia pierde 100-300 £pop£ §Hpoblaciones§!."
