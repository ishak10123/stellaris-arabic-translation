 civic_tankbound_effects_base: "Añade el rasgo ['trait:trait_tankbound'].\nLos trabajos de $job_farmer_plural_with_icon$, $job_miner_plural_with_icon$ y $job_technician_plural_with_icon$ están totalmente §Yautomatizados§!.\nLos trabajos de ['concept_colonist', $job_colonist$] son $SPECIALISTS$.\nLos £district£ distritos §Yurbanos§! poseen más trabajos de §Y$job_production_overseer_with_icon$§!."
