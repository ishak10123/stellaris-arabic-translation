 # Establishing the Chamber of Silence
 shroud.2820.name: "Estableciendo la $building_chamber_of_silence$"
 shroud.2820.desc.1: "A medida que aumenta nuestro dominio psiónico, nos vemos bombardeados por una maraña de susurros provenientes de más allá del velo. La §Rvoz§!, más fuerte y clara que nunca, se abre paso entre las corrientes de pensamiento y se adentra en las sombras de nuestra mente.\n\n§R\"Abrid el camino\".§!"
 shroud.2820.desc.2.intro: "Tenemos que filtrar entre el ruido."
 shroud.2820.desc.2.chamber: "$shroud.2820.desc.2.intro$ Hemos construido $shroud.2820.desc.2.outro$"
 shroud.2820.desc.2.no_chamber: "$shroud.2820.desc.2.intro$ Se han elaborado planes para $shroud.2820.desc.2.outro$"
 shroud.2820.desc.2.outro: "una instalación aislada en la que nuestros individuos con mayores dones psiónicos podrán escuchar las instrucciones de la §Rvoz§! con una placentera claridad."
 shroud.2820.a.chamber: "Nuestras mentes se abren cada vez más."
 shroud.2820.a.no_chamber: "Construyamos esa \"$building_chamber_of_silence$\"."
 CONTINUE_SITUATION: "Continúa la §Ysituación§!:"
 shroud.2820.a.tt: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2820.a.tt_no_chamber: "Adopta la tradición §H$tr_psionics_endbringers_cult$§! y construye un edificio §H$building_chamber_of_silence$§! para que la situación progrese."
 # The Great Awakening
 shroud.2830.name: "$utopia.2650.name$"
 shroud.2830.desc: "En la $building_chamber_of_silence$, oímos el mensaje de la §Rvoz§! con total claridad.\n\n§R\"Todo volverá a nacer\".§!\n\nAhora lo entendemos. El fin es un renacer. No debemos tenerle miedo. Seremos hechos de nuevo. Mejorados y más poderosos que nunca.\n\nPara tomar este destino, debemos aprender a manejar el reino de la mente, conocido como el §HVelo§!. No repetiremos los errores de aquellos que encontramos en el $pc_shrouded$. Ellos rechazaron su miedo y nosotros lo aceptaremos plenamente."
 shroud.2830.desc.outro.awakening: "Nuestra visión es clara como el agua."
 shroud.2830.desc.outro.no_awakening: "Nuestra visión está casi despejada."
 shroud.2830.a.awakening: "El Velo tiene la clave."
 shroud.2830.a.no_awakening: "$shroud.2780.a$"
 shroud.2830.a.tt: "$tr_psionics_psionic_assimilation_desc$\n$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2830.a.tt_no_awakening: "Adopta la tradición §H$tr_psionics_shroud_great_awakening$§! para progresar en la situación."
 # Blind the Willing - First select event
 shroud.8320.name: "Vemos con claridad"
 shroud.8320.desc: "§H[blinded_leader.GetName]§! nos ha mostrado el camino. Nuestros sentidos innecesarios amortiguan la llamada de la §RVoz§!. Al eliminar uno de ellos, podremos elevar aún más nuestras habilidades psíquicas.\n\nCarecer de [Species.GetEyeNamePlural] es la manera más efectiva de hacerlo. Nuestra visión en el reino físico empaña nuestra mirada al §HVelo§!. Muchos [Root.GetSpeciesNamePlural] ya han comenzado a seguir el ejemplo inspirador del/la §H[blinded_leader.GetName]§! y han decidido deshacerse de sus [Species.GetEyeNamePlural] sin pensárselo dos veces.\n\nAquellos que han decidido hacerlo sienten una oleada de satisfacción cuando la §Rvoz§! llena sus mentes de aprobación."
 shroud.8320.a: "Más allá de lo evidente."
 leader_trait_blinded: "Cegados"
 leader_trait_blinded_desc: "Aún quedan lugares por ver así."
 # A Leap of Faith - First select event
 shroud.8330.name: "Un salto de fe"
 shroud.8330.desc: "Presa de la frustración por las limitaciones de nuestra carne, §H[forsaken_leader.GetName]§! ha intentado acelerar su transformación psiónica ingiriendo una toxina letal en una dramática exhibición pública.\n\nAl expirar, su cuerpo fue consumido por un vívido tono púrpura y se desintegró en un fino polvo de pura energía psiónica. Un milagro así solo fue posible con la voluntad de la §Rvoz§!.\n\nHemos visto esto como una señal clara: tenemos que seguir a §H[forsaken_leader.GetName]§!."
 shroud.8330.a: "Nuestra forma física no puede retenernos."
 # Mid-stage events
 shroud.8350.name: "Informes sobre lobotomías"
 shroud.8350.desc: "Algunos [owner.GetSpeciesNamePlural] están teniendo dificultades para vivir en armonía con la presencia de la §Rvoz§!.\n\nLos más débiles de nosotros, en un intento desesperado por hallar la paz, han recurrido a burdos procedimientos de lobotomía no autorizados. Dichas prácticas amenazan con seguir expandiéndose si no se toman medidas."
 shroud.8350.a: "Dejad que los débiles hagan lo que deben."
 shroud.8350.b: "La §Rvoz§! es un regalo. Prohibid esta práctica."
 endbringers_voice_plague: "Plagado de voces"
 endbringers_voice_plague_desc: "Cuando las voces hablan, no nos queda más remedio que escuchar."
 shroud.8360.name: "Autoexperimentación psiónica"
 shroud.8360.desc: "Seguimos acogiendo a la §Rvoz§!. Nos dice verdades como puños que no se pueden negar.\n\nMuchos [owner.GetSpeciesNamePlural] están buscando otras formas de amplificar la §Rvoz§! para beneficiarse de su sabiduría de manera más directa.\n\nLa venta de drogas en el mercado negro ha aumentado exponencialmente, y las instalaciones médicas en situación irregular están ofreciendo servicios experimentales para ayudar a los individuos a optimizar su sensibilidad psiónica.\n\n¿A dónde nos conducirá esto?"
 shroud.8360.a: "Hagamos todo lo posible para dar a conocer la §Rvoz§!."
 shroud.8360.b: "Debemos evitar que se produzca una anarquía total."
 shroud.8370.name: "Pesadillas apocalípticas"
 shroud.8370.desc: "A medida que aumentaban nuestras habilidades psiónicas, unas terribles pesadillas que predecían el fin del universo empezaron a asolar a la población [owner.GetSpeciesAdj].\n\nNuestros sueños se han convertido en profecías apocalípticas, las cuales intensifican el temor existencial entre nuestro pueblo. El sueño ha dado paso a un estupor inquieto y muchos no son capaces de continuar con sus tareas diarias.\n\nEn estos sueños, la §Rvoz§! nos habla.\n\n§R\"Aceptad la entropía\".§!"
 shroud.8370.a: "Todos los comienzos deben tener un final."
 shroud.8370.b: "Ofreced refugio en la $building_chamber_of_silence$."
 endbringers_apocalyptic_nightmares: "Pesadillas apocalípticas"
 endbringers_apocalyptic_nightmares_desc: "La voz perturba nuestros ciclos del sueño con visiones cataclísmicas."
 endbringers_nightmare_shelter: "Refugio de pesadillas"
 endbringers_nightmare_shelter_desc: "La $building_chamber_of_silence$ ofrece refugio a quienes sufren pesadillas cataclísmicas."
 shroud.8380.name: "Marca del fin"
 shroud.8380.desc: "Se ha extendido la tendencia de la automutilación entre la población.\n\nLos seguidores sumamente devotos de la §Rvoz§! han estado marcando su carne con el símbolo de \"El fin\". Proclaman que estos diseños otorgan una terrible bendición a quienes los portan.\n\nSea verdad o no, el número de practicantes que se han sumado a estos rituales crece con avidez. ¿De verdad es esta la voluntad del §HVelo§!?"
 shroud.8380.a: "Portamos la marca con orgullo."
 shroud.8380.a.tt: "La mitad de nuestra población obtiene el rasgo ['trait:trait_marked']."
 shroud.8380.b: "Esta práctica es desacertada."
 approach_blind_selected_tt: "No se ha seleccionado el enfoque $approach_situation_breach_shroud_endbringers_blind$."
 approach_forsake_selected_tt: "No se ha seleccionado el enfoque $approach_situation_breach_shroud_endbringers_forsake_flesh$."
 trait_marked: "Marcado"
 trait_marked_desc: "Como una espeluznante muestra de devoción, esta especie se ha marcado la carne con el símbolo de \"El fin\"."
 trait_marked_unity_bonus: "£unity£ producida por cada 100 £pops£ poblaciones: §G+0,06§!"
 endbringers_sanity: "Cordura entre la locura"
 endbringers_sanity_desc: "Una fuerte determinación por mantener la cordura nos impide caer en la trampa de la locura."
 # Breach the Shroud
 shroud.2840.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2840.desc: "$shroud.2800.intro$ Del interior de las profundidades sin forma surge una ominosa entidad de poder inconmensurable. Se trata de la §Rvoz§!, que perfora nuestras psiques más recónditas con una fuerza estremecedora.\n\n§R\"Conoced mi nombre\".§!\n\nSolo ahora somos conscientes de lo alejadas que están nuestras insignificantes mentes de la §Rvoz§!. El sello está fracturado y pronto se manifestará toda la amplitud de lo que somos.\n\nNuestros telépatas están ya preparados para morar en el corazón del Velo y descubrir el verdadero nombre de nuestro gran mecenas."
 shroud.2840.a: "Es hora de comulgar."
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE: "Comulgar con la §Rvoz§!"
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_DESC: "Nos hemos congregado en [capital_scope.GetName] con un único propósito.\n\nLlegaremos a las profundidades del §HVelo§! y obligaremos al asombroso poder de la §Rvoz§! a reconocernos y que se comunique con nosotros.\n\nLo conocíamos como el Cataclismo. Otros lo llamaban el Juicio. Ahora, nos revelará su verdadero nombre y con ese conocimiento alcanzaremos la grandeza."
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_PROJECT_TOOLTIP: "Por completar: §Hprofundiza§! 3 veces. ([GetEndbringersDelveCount]/3)"
 # EotC Delve Events
 shroud.8420.title: "La prueba del silencio"
 shroud.8420.desc: "Descendemos al Velo mientras nuestra voluntad unificada nos ayuda a silenciar el caótico ruido que nos podría distraer de nuestro objetivo: el §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!.\n\nSin embargo, no podemos escudarnos únicamente en nuestro afán. Las voces susurran tópicos vacíos, complaciéndonos con distracciones insignificantes, cada una más absurda que la anterior, pero todas igual de tentadoras.\n\nA medida que empezamos a fracturarnos, la entidad regresa. Una única orden resuena en el vacío:\n\n§R\"Silencio\".§!"
 shroud.8420.a: "Guardad silencio y aguantad."
 shroud.8420.a.reply: "Esta orden se abre paso por el caos, erosionando el ruido distante y purgando el trastorno molesto que buscaba consumirnos. Nuestra psique se mantiene mientras aguantamos la fragmentación.\n\nEl §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! se adentra aún más en el Velo. La claridad que le sigue es prácticamente igual de ensordecedora. Se asienta en los huecos de nuestras mentes y nos deja con una nueva determinación.\n\nY dones. Unos dones maravillosos."
 shroud.8420.a.tooltip: "§Y$endbringers_madness_1$§! pierde el siguiente efecto:\n$t$$MOD_POP_AMENITIES_USAGE_MULT$: $@madness_base_pop_amenities_usage_mult|0=-%$"
 shroud.8430.title: "La prueba de la pureza"
 shroud.8430.desc: "A medida que nos adentramos en el Velo, observamos la corrupción del caos sintiente.\n\nLas mentes ociosas y en degeneración producen capas de turbulencias psiónicas que contaminan el Velo con una fétida podredumbre. En ese repugnante desastre empezamos a sentir la abrumadora presencia de nuestra presa, el §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!.\n\nLa malicia de sus intenciones satura nuestra psique a medida que se cierne sobre el caos. Nos preparamos para la inminente absolución mientras una orden resuena a través del vacío:\n\n§R\"Orden. Unidad\".§!"
 shroud.8430.a: "¡Aguantad!"
 shroud.8430.a.reply: "El comando atraviesa el maligno caos.\n\nInnumerables voces gritan de dolor mientras el §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! elimina las deformaciones sintientes que plagan el Velo. Un reino de imperfecciones absueltas permanece a su paso.\n\nA medida que la entidad se sumerge en las profundidades del Velo, lo único que nos queda es observar y estudiar las consecuencias de su purificación absoluta."
 shroud.8430.a.tooltip: "§Y$endbringers_madness_2$§! pierde el siguiente efecto:\n$t$$mod_planet_pops_upkeep_mult$: $@madness_base_planet_pops_upkeep_mult|0=-%$"
 shroud.8440.title: "La prueba de las llamas"
 shroud.8440.desc: "A medida que entramos en el Velo, lo único que experimentamos es dolor. Los típicos remolinos de niebla psiónica son un infierno que prende la misma esencia de nuestras mentes.\n\nA través del tormento, percibimos ciudades derrumbándose en ruinas fundidas, planetas devorados por el fuego y poblaciones enteras retorciéndose en agonía mientras unas llamas espectrales reducen sus formas corpóreas a cenizas humeantes.\n\nEn el centro de la pira, detectamos la presencia del §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!. Mientras su poder amenaza con consumir la realidad, la entidad decreta:\n\n§R\"Liberación\".§!"
 shroud.8440.a: "Someteos a la absolución."
 shroud.8440.a.reply: "Las llamas psiónicas devoran nuestras mentes y consumen la complacencia, dejando únicamente una determinación purificada.\n\nAhora podemos ver el glorioso propósito del §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! y la magnífica simplicidad que ofrece."
 shroud.8450.title: "$utopia.3310.name$"
 shroud.8450.desc: "Resuena una declaración:\n\n§R\"Conocéis mi nombre\".§!\n\nLa culminación de nuestro viaje a las estrellas, la respuesta a siglos de interrogantes, está aquí. $end_of_the_cycle_color_article_cap$ nos impulsa. Nuestro pacto está sellado.\n\n§R\"El fin va a comenzar\".§!\n\nDolor. Agonía. Certeza. Mientras las palabras se desvanecen, nuestro destino queda sellado.\n\nAhora lo vemos. Una galaxia sumida en el silencio y saturada en la inexorabilidad del §R$end_aura$§!."
 shroud.8450.a: "La inevitabilidad aguarda."
 shroud.8450.a.homicidal: "Qué bellos horrores nos aguardan."
 shroud.8450.a.tech_tooltip: "Tecnologías obtenidas:\n£society£['technology:tech_psionic_aura']\n£society£['technology:tech_aura_intensification']"
 embracing_the_end: "Aceptando el fin"
 embracing_the_end_desc: "Por fin vemos la belleza del fin. Que venga a nosotros."
 MOD_SHIP_PSIONIC_AURA_SPEED_MULT: "$MOD_SHIP_SPEED_MULT$ en cualquier $PSIONIC_AURA$"
 MOD_SHIP_PSIONIC_AURA_FIRE_RATE_MULT: "$MOD_SHIP_FIRE_RATE_MULT$ en cualquier $PSIONIC_AURA$"
 end_of_the_cycle_endbringers: "$end_of_the_cycle_article_cap$"
 situation_end_of_the_cycle_endbringers_desc: "Nuestro pacto con $end_of_the_cycle_color_article$ nos garantiza un poder indecible y nos encomienda un propósito glorioso.\n\nLa voluntad de nuestro mecenas exige la aniquilación total de esta realidad. Con cada sistema que el §H$end_aura$§! consume, más se acerca el olvido misericordioso.\n\nSeremos testigos de lo inevitable.\n\nSistemas que quedan por conquistar: [Owner.GetEndCycleGalaxySystemsLeft]"
 end_of_the_cycle_endbringers_monthly_change_tooltip: "$end_of_the_cycle_monthly_change_tooltip$"
 situation_end_of_the_cycle_endbringers_finish_effects: "§REl Juicio aguarda.§!"
 approach_situation_end_of_the_cycle_bring_the_inevitable: "Que suceda lo inevitable"
 approach_situation_end_of_the_cycle_stall_for_time: "Ganar tiempo"
 approach_situation_end_of_the_cycle_delay_your_destiny: "Retrasar nuestro destino"
 shroud.8460.title: "El reloj de arena se inclina"
 shroud.8460.desc: "El poder de $end_of_the_cycle_color_article$ tiene un precio, y nos estamos quedando sin tiempo.\n\nLa galaxia aún no está saturada con el aura limpiadora de nuestro mecenas. Nuestros esfuerzos hasta ahora son insignificantes.\n\nPara ver este monumental trabajo completado, una oleada de energía fluye hasta nosotros desde más allá del velo. ¡Es la bendición prometida!"
 shroud.8460.a: "Todavía podemos triunfar."
 shroud.8470.title: "El final está cerca"
 shroud.8470.desc: "El poder de nuestro mecenas es inmenso, pero el tiempo se nos agota. Tal incompetencia no será tolerada por el benevolente olvido de $end_of_the_cycle_color_article$.\n\nAún queda una pequeña esperanza: debemos envolver la galaxia en el $end_aura$, cueste lo que cueste. Desesperados, nuestros [GetTelepathPlural] están extrayendo hasta la última gota de energía posible del §HVelo§!."
 shroud.8470.a: "¡No fracasaremos!"
 shroud.8480.title: "$GALACTIC_FOCUS$ derogado"
 shroud.8480.desc: "El Senado galáctico ha derogado la resolución que catalogaba la emisión de la destructiva §H$PSIONIC_AURA$§! como un objetivo de defensa. Como resultado, las operaciones militares de los miembros de la comunidad contra el §H[former_malevolent_aura.GetName]§! deben cesar de inmediato. De momento, la paz ha vuelto a este rincón de la galaxia."
 shroud.8481.desc: "El Senado galáctico ha derogado la resolución que nos declaraba como un objetivo para sus labores en \"defensa\". Por consiguiente, los miembros de la comunidad han recibido orden de retirarse. Las acciones militares contra nosotros han cesado... de momento."
 shroud.8481.homicidal: "$shroud.8480.desc$\n\n$crisis.4111.nasty$"
 shroud.8500.title: "Heraldos del fin"
 shroud.8500.desc.intro: "La voluntad inevitable de nuestro mecenas estrecha su cerco sobre la galaxia. Ahora sabemos cómo vendrá el fin.\n\nEl §R$end_aura$§! debe expandirse por toda la galaxia. Cuando el reino físico se fusione con la esencia bruta del §HVelo§!, no tardará en llegar la verdadera aniquilación."
 shroud.8500.desc.outro: "Completar esta monumental tarea será nuestra ópera magna y la puerta a la salvación definitiva."
 shroud.8500.desc.homicidal: "$shroud.8500.desc.intro$\n\nLa erradicación de toda vida en esta galaxia tendrá un efecto colateral beneficioso. $shroud.8500.desc.outro$"
 shroud.8500.desc.default: "$shroud.8500.desc.intro$\n\n$shroud.8500.desc.outro$"
 shroud.8500.a: "No podemos fracasar."
 shroud.8600.title: "$shroud.4970.title$"
 shroud.8600.desc.intro: "Este era nuestro destino.\n\nEl §R$end_aura$§! envuelve la galaxia. Nuestro pueblo de [Root.GetHomeWorldName] ha entrado en un estado de euforia frenética para la celebración de"
 shroud.8600.desc.outro: "Se acerca el glorioso renacer que nos prometieron tras nuestro gran despertar.\n\nAnte nosotros, el vacío consume toda existencia. La eliminación y la aniquilación se han convertido en las únicas leyes que permanecen en la galaxia. Uno por uno, los mundos han ido colapsando en la nada de la que una vez se originaron.\n\nSomos los últimos que quedan. Es... precioso. Lo vemos ya en su agonía de una nueva y frágil forma. El fin está aquí. Ahora empieza el comienzo."
 shroud.8600.desc.homicidal: "$shroud.8600.desc.intro$ la aniquilación de todo lo que no somos nosotros. $shroud.8500.desc.outro$"
 shroud.8600.desc.default: "$shroud.8600.desc.intro$ nuestra misericordiosa salvación. $shroud.8600.desc.outro$"
 shroud.8600.a: "La conclusión es... imposible."
 shroud.8610.title: "El precio de la debilidad"
 shroud.8610.desc.intro: "Hemos fracasado. $end_of_the_cycle_color_article$ no ha llegado a buen término debido a nuestra debilidad. El precio que tenemos que pagar por nuestra incompetencia se cierne sobre nosotros.\n\nSe lo llevó todo. En un instante, el [Root.GetName]... desapareció. Donde había ricas colonias, ahora solo hay ruina. Donde había poderosas flotas que cruzaban el vacío, ahora solo hay silencio y escombros. Todo consumido por el fin. Todo tomado por el §HVelo§!."
 shroud.8610.desc.outro: "Ahora, nuestro mecenas ha manifestado una gigantesca entidad del Velo en el espacio que se encuentra sobre [former_capital.GetName]. Se hizo tremendamente poderoso tras devorar las consciencias de nuestros psiónicos, y ahora recorre la galaxia para terminar la tarea que nosotros no fuimos capaces de completar."
 shroud.8610.desc.a: "$shroud.8610.desc.intro$\n\n$shroud.8610.desc.outro$"
 shroud.8610.desc.b: "$shroud.8610.desc.intro$\n\nLa mayoría de los [Root.GetSpeciesNamePlural] han aceptado este destino; sin embargo, un pequeño grupo de infieles ha rechazado someterse a la última voluntad de nuestro mecenas. Son los exiliados capitaneados por §H[Root.GetRulerName]§!, un psíquico poderoso que era conocedor de lo que estaba por suceder. Se han ocultado en un mundo alejado de la influencia del fin.\n\n$shroud.8610.desc.outro$ Cuando haya terminado, vendrá también a por los exiliados."
 shroud.8610.a: "Quizá este fue siempre nuestro destino..."
 shroud.8610.b: "¿Podrán los exiliados resistir a su poder?"
 shroud.8710.title: "Sobrevivir al apocalipsis"
 shroud.8710.desc: "Ha sucedido. El §RJuicio§! ha sido destruido.\n\n$end_of_the_cycle_color_article_cap$ se ha retirado a las profundidades del §HVelo§!. Por ahora, hemos evitado la amenaza que representaba para nuestra realidad física.\n\nA medida que el cadáver velado de su avatar se desvanecía en esta existencia, se pudo recuperar un remanente físico de su manifestación. Incluso en la muerte, nuestros telépatas son capaces de sentir que emite unos asombrosos niveles de energía psiónica mucho más poderosos que el fragmento que se recuperó en §H[shrouded_planet.GetName]§!.\n\nEste núcleo de inexorabilidad concentrada se puede usar para llevar a cabo una reconstrucción a partir de las cenizas de la galaxia que lograron sobrevivir al Juicio.\n\nEl fin ha venido y se ha ido, aunque aún permanece de alguna forma."
 shroud.8710.a: "¿Este era nuestro destino?"
 r_core_of_the_reckoning: "Núcleo del Juicio"
 r_core_of_the_reckoning_desc: "Este núcleo recuperado de los restos del Juicio aún emana altos niveles de energía psiónica."
 core_of_reckoning_active_effect_tt: "Desbloquea una £decision£ §Ydecisión planetaria§!: ['concept_banish_decision']"
 decision_banish: "Destierro"
 decision_banish_desc: "Al permitir que el Velo consumiera este lugar, se ha restaurado el equilibrio en el núcleo del Juicio."
 decision_banish_effects_tt: "Desterrad a este planeta al Velo."
 concept_banish_decision: "$decision_banish$"
 concept_banish_decision_desc: "$decision_banish_desc$\n$decision_banish_effects_tt$\nModificador §Y$shroud_surge$§! añadido durante §Y10§! años:\n$shroud_surge_effects$"
 shroud_surge: "Oleada del Velo"
 shroud_surge_desc: "Se ha restaurado el equilibrio temporalmente en el $r_core_of_the_reckoning$."
 shroud_surge_effects: "Duplica los efectos pasivos del §Y$r_core_of_the_reckoning$§!."
 #======================
 # Shroud Leaders
 #======================
 ganthuata: "Ganthuata"
 ganthuata_desc: "Discípulo devoto de $the_cradle_of_souls_article$, ansioso por descubrir y compartir sus profundas verdades con aquellos que disponen de los medios para recibirlas."
 ganthuata_catch_phrase: "Nos plegamos en el abrazo de la Cuna."
 leader_trait_disciple_of_the_cradle: "Discípulo de la Cuna"
 leader_trait_disciple_of_the_cradle_desc: "Cuanto más vemos, más conocemos, $the_cradle_of_souls_article$ aumenta de manera más segura mientras observamos a nuestros vecinos."
 leader_trait_disciple_of_the_cradle_envoys_zro: "$t$- Enviados asignados al mecenas generan §G+0,5§! £zro£ §Y$sr_zro$§! al mes"
 shroud.12010.desc: "§HNuestra comunión con el Velo ha invitado a una nueva voz que se comunica con nosotros. Su tono cálido y calmado resuena tanto en el reino físico como en el de la mente.§!\n\nSaludos. Soy Ganthuata y vengo en busca de individuos afines en los que haya despertado el camino de la verdad. ¿Habéis oído el mensaje de $the_cradle_of_souls_article$?"
 shroud.12010.name: "$ganthuata$"
 shroud.12010.a: "Hemos oído a $the_cradle_of_souls_article$. ¿Por qué lo preguntas?"
 shroud.12010.a.response: "¿Por qué? ¿Qué impulsa a un viajero a interrogar a quienes se encuentra por el camino? Pues comprender mejor a aquel de quien busca respuestas, amigo. Cuando tú hablas, yo aprendo."
 shroud.12010.b: "¿Qué quieres de nosotros?"
 shroud.12010.b.response: "¿Que anhelan quienes se nutren de la Cuna? Yo busco, para empezar, vuestra amistad. He buscado durante mucho tiempo mentes en sintonía con el esplendor de la Cuna. Y, ahora, una civilización al completo se agita bajo su luz."
 shroud.12010.c: "¿Cómo puedes ayudarnos?"
 shroud.12010.c.response: "Os ayudaré a difundir vuestro mensaje a través de las estrellas. Demos la bienvenida juntos a la galaxia con el suave abrazo de la Cuna."
 shroud.12010.hire_custom_tooltip: "§Y$ganthuata$§! se une a nuestro imperio como §Hlíder§!."
 koborokra: "Koborok'Ra"
 koborokra_desc: "Un antiguo soldado sometido a una tortura psiónica extrema a manos de sus enemigos en un tiempo pasado. Ahora es un almirante atormentado impulsado por un apetito insaciable de destrucción."
 koborokra_catch_phrase: "Hay sangre que ha de ser derramada."
 leader_trait_disciple_of_the_eater: "Portador de sangre"
 leader_trait_disciple_of_the_eater_desc: "Este líder ha hecho un pacto de sangre con $the_eater_of_worlds_article$."
 leader_trait_disciple_of_the_eater_attunement_effect: "§G+$@disciple_of_the_eater_combat_attunement$§! sintonía con $the_eater_of_worlds_article$ por combate de flota ganado"
 leader_trait_disciple_of_the_eater_zro_fleet_attack_effect: "$t$- §G+$@disciple_of_the_eater_zro_fleet_attack|1$§! $i_zro$ por 1% de devastación infligida por un bombardeo orbital"
 leader_trait_disciple_of_the_eater_zro_army_attack_effect: "$t$- §G+$@disciple_of_the_eater_zro_army_attack|0$§! $i_zro$ por 1% de devastación infligida por ejércitos de asalto"
 shroud.12020.name: "$koborokra$"
 shroud.12020.desc: "§HUna armadura desgastada por la batalla y una capa manchada de sangre ocultan una figura enmascarada. Un gruñido ronco rompe el silencio.§!\n\nEsta galaxia merece sufrir. Siento que vosotros pensáis igual.\n\n§HMientras el almirante habla, acaricia la empuñadura de un arma ornamentada.§!\n\nMe han convocado aquí, pero yo sirvo a $the_eater_of_worlds_color_article$."
 shroud.12020.desc.covenant: "$shroud.12020.desc$ Como vosotros."
 shroud.12020.desc.no_covenant: "$shroud.12020.desc$ Quizá vosotros también lo haréis."
 shroud.12020.a: "¿Por qué deseas unirte a nosotros?"
 shroud.12020.a.response: "Juntos, podemos ahogar a las estrellas de todos los rincones de esta galaxia. El sufrimiento que uno puede causar por sí mismo tiene un límite."
 shroud.12020.b: "¿Podemos confiar en ti?"
 shroud.12020.b.response: "$the_eater_of_worlds_article_cap$ controla hasta mi respiración. He jurado servirle, y he presenciado este momento en sueños. Es voluntad suya que te sirva. Tu rechazo sellaría mi destino."
 shroud.12020.c: "¿Por qué sirves a $the_eater_of_worlds_article$?"
 shroud.12020.c.response: "Me traicionaron, hicieron añicos y dejaron a merced de la agonía. $the_eater_of_worlds_article_cap$ me habló. Me bendijo con lo que necesitaba para sobrevivir en aquel momento, un paño ensangrentado sobre heridas sangrantes. Me dio la fuerza para desprenderme de las manos que me causaron sufrimiento. Estoy en deuda con él."
 shroud.12020.d: "¿Qué nos ofreces?"
 shroud.12020.d.response: "Juntos, bañaremos incontables sistemas en llamas purificadoras, y nos deleitaremos con una sinfonía de gritos. Veremos mundos arder. Juntos, le enseñaremos a la galaxia cosas que jamás olvidará. Este es nuestro destino."
 shroud.12020.hire_custom_tooltip: "§Y$koborokra$§! se une a nuestro imperio como §Hlíder§!."
 morr: "Morr"
 morr_desc: "Como prospector humilde que fue, la prolongada exposición a las vetas inestables de $zro_lower$ forjó un potente e irritante vínculo con $the_instrument_of_desire_article$. Ahora, ha aprovechado ese contacto para obtener una riqueza desorbitada mediante la excavación a cielo abierto de mundos enteros y la venta del botín a precios abusivos."
 morr_catch_phrase: "Si brilla, es nuestro."
 leader_trait_disciple_of_the_instrument: "Corazón avaricioso"
 leader_trait_disciple_of_the_instrument_desc: "Este líder, en profunda armonía con $the_instrument_of_desire_article$, puede hallar la presencia de recursos hasta en los rincones más inhóspitos de la galaxia."
 leader_trait_disciple_of_the_instrument_planetary_decision_effect: "- Concede acceso a la decisión planetaria §Y$decision_divine_deposits$§!"
 decision_divine_deposits: "Hallazgo de depósitos"
 decision_divine_deposits_desc: "El gobernador de este planeta, guiador por la críptica atracción de $the_instrument_of_desire_article$, revela depósitos de recursos que se consideraban perdidos desde hace mucho tiempo."
 decision_divine_deposits_tt: "Añade una característica planetaria de recursos aleatoria."
 shroud.12030.name: "$morr$"
 shroud.12030.desc: "§HLa mirada de $morr$ jamás se detiene; fluctúa entre la sombra y la luz, como si estuviese en una cacería perpetua.§!\n\nTú también lo notas, ¿verdad? $the_instrument_of_desire_article_cap$ jamás descansa. Anhela, devora y controla.\n\nLo que veo me lo quedo. Ninguna joya de la naturaleza ha resistido a mi voluntad. Te ofrezco mis servicios, no por lealtad, sino porque, juntos, destruiremos las estrellas y alimentaremos el vacío como es debido."
 shroud.12030.a: "¿Por qué deseas unirte a nosotros?"
 shroud.12030.a.response: "$the_instrument_of_desire_article_cap$ no conoce fin. Hacen falta [root.species.GetHandNamePlural] en abundancia para complacerlo."
 shroud.12030.b: "¿Qué nos ofreces?"
 shroud.12030.b.response: "Puedo ayudaros a extraer hasta la última molécula monetizable de la naturaleza. Ni un solo átomo se quedará sin recoger, sin etiquetar o sin vender.\n\nQuienes susurran que ya es suficiente son unos cobardes. Dan pena. Que se pudran. Juntos, lo conseguiremos todo."
 shroud.12030.c: "¿Por qué sirves a $the_instrument_of_desire_article$?"
 shroud.12030.c.response: "En su día fui prospector y buscaba las avalanchas de minerales que me conferían las estrellas. Aire lleno de polvo, escáneres rotos, concesiones vacías... Hasta que $the_instrument_of_desire_article$ habló.\n\nMe prometió una riqueza sin pretensiones, y lo único que pedía era lealtad.\n\nAhora sirvo, extraigo y entrego. La deuda es eterna, pero... ¿y las riquezas? Las riquezas no conocen fin."
 shroud.12030.hire_custom_tooltip: "§Y$morr$§! se une a nuestro imperio como §Hlíder§!."
 kronen: "Kronen el Afligido"
 kronen_desc: "Este científico solitario, antaño un visionario y ahora un ser fracturado, ha sido víctima de las maquinaciones de $the_composer_of_strands_article$. Solo queda su asombroso intelecto, que titila como una estrella moribunda en la oscuridad."
 kronen_catch_phrase: "Queda tanto por desentrañar..."
 leader_trait_disciple_of_the_composer: "Pupilo afligido"
 leader_trait_disciple_of_the_composer_desc: "Cuanta más carne moldean, más se desmorona la suya. $the_composer_of_strands_article_cap$ hace renacer a quienes se atreven a aprender este arte prohibido."
 shroud.12040.name: "$kronen$"
 shroud.12040.desc: "§HCuando nuestros sensores detectan que una nave cruza nuestras fronteras, una voz fatigada resuena por el Velo: cansada, estridente y extrañamente familiar, como el zumbido de $the_composer_of_strands_article$.§!\n\n¿[GetKronenFlesh] que no había visto? Interesante. Qué suavidad. Qué... mutable. ¿O no? Es difícil saberlo. Hay tantos nudos bajo la [GetKronenSkin]. ¿Qué forma habrá tejido $the_composer_of_strands_article$ para mí hoy?\n\n§HLas comunicaciones por fin se estabilizan y muestran una figura de músculos marcados y en movimiento que convulsionaba y garateaba frenéticamente.§!\n\nMe veis tal como soy. Quizá sigo siendo $kronen$. O quizá no. Pero os percibo igual que a mí, como un lienzo que aguarda el pincel del Compositor. Venid. Empecemos la desvelación."
 shroud.12040.a: "¿Que comience qué?"
 shroud.12040.a.response: "La muda, por supuesto. La supresión de estos cascarones bastos e imperfectos. El descosido de los hilos que nos mantienen unidos y dan forma. El roce del Compositor ha recaído sobre vosotros. Ya habéis empezado... ¿No habéis notado un estremecimiento bajo vuestra [GetSkinType]?"
 shroud.12040.b: "¿Por qué deseas unirte a nosotros?"
 shroud.12040.b.response: "¿No lo notáis? La marca, integrada en todas y cada una de las fibras temblorosas. He de desmoronarme, despojarme de lo que fui, presenciar mi desintegración mientras desgarro los puntos que me atan a la carne. Pero vosotros... Vosotros sois un imperio. Vasto. Capaz. Juntos, podríamos tirar de los hilos mucho más que en solitario."
 shroud.12040.c: "¿Cómo puedes ayudarnos?"
 shroud.12040.c.response: "Ofrezco más que ayuda. Mi carne es un regalo, un doloroso y audaz experimento, esculpido por $the_composer_of_strands_article$. Cada fibra de mi ser grita, pero yo resisto. Estudio. Aprendo. Y todo lo que genera mi sufrimiento... es vuestro. Siempre y cuando le demos forma juntos."
 shroud.12040.hire_custom_tooltip: "§Y$kronen$§! se une a nuestro imperio como §Hlíder§!."
 shroud.12045.desc: "§HA medida que crece nuestra población, $kronen$ enloquece cada vez más. Su voz tiembla por la tensión, su forma se contrae, se ondula, su carne fluye mientras habla con frustración.§!\n\nLas hebras, infinitas... Se enroscan, tiran y desgarran, pero el tejido resiste. ¿Cuánto tiempo más he de soportar esta maldita forma? ¿Cuánta piel he de mudar para que el patrón salga a la luz?"
 shroud.12045.a: "¿Cuál es el problema?"
 shroud.12045.a.response: "¿El problema? ¿En singular? Qué curioso. Con cada jirón del que me desprendo, con cada hebra reluciente que desgarramos, solo conseguimos que los hilos se tensen. Y, mientras tanto, $the_composer_of_strands_article$ tararea su insoportable y visceral melodía."
 shroud.12045.a.response_2: "$shroud.12045.a.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.b: "¿Necesitas descansar?"
 shroud.12045.b.response: "¿Descansar? Jamás. No debemos estancarnos ni dejar que esta miserable carne se pudra en la mediocridad. No necesito descansar... Necesito sujetos. Necesito material que moldear, esculpir y darle vida."
 shroud.12045.b.response_2: "$shroud.12045.b.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.c: "¿Podemos ayudarte con algo?"
 shroud.12045.c.response: "¿Me recuerdas... lo que fui? Dime. Cuando hablamos por primera vez, ¿mis extremidades eran de este color? ¿Tenía la córnea tan nublada? Cada vez que intento recordarlo, la carne me cambia más.\n\nNo... Aquí los recuerdos no sirven de nada. La revelación yace en el propio cambio. Lo que antaño existía no significa nada para $the_composer_of_strands_article$. Márchate. Tengo que... pensar."
 shroud.12045.c.response_2: "$shroud.12045.c.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.desc_2: "§HKronen convulsiona con agresividad. Pone su único ojo en blanco, la carne le palpita y bulle bajo la superficie y, entonces..., llega la quietud. La grotesca transformación se detiene tan abruptamente como comenzó.§!\n\nAh..., hola. ¿Necesitas algo?"
 shroud.12045.d: "¿Estás bien?"
 shroud.12045.d.response: "Por supuesto. ¿Por qué no iba a estarlo? Las hebras me han abierto aún más la mente y han remodelado esta ineficiente carne para que se ajuste al diseño de $the_composer_of_strands_article$. Ahora, si me disculpas... Todavía tengo que tirar de muchos hilos y desprenderme de muchos cascarones.\n\n§HCuando la transmisión termina, una resonancia zumba a través del Velo. Sea la que sea la aflicción que aqueja a Kronen, no es fruto de la casualidad, sino la voluntad de $the_composer_of_strands_article$.§!"
 shroud.12045.end: "No hay que tomarse a la ligera los regalos del Compositor."
 zulyn: "Zulyn el Oyente"
 zulyn_desc: "Un erudito que abandonó las limitaciones del estudio científico convencional para perseguir los secretos revelados por los frenéticos ecos de $whisperers_in_the_void_article$."
 zulyn_catch_phrase: "Solo hay que escuchar..."
 shroud.12050.name: "$zulyn$"
 shroud.12050.desc: "§HEl sistema de comunicación cobra vida mientras una voz murmura con una urgencia inquietante.§!\n\nHola a ti, que me estás escuchando. Distingo tu voz, no, tus voces entre tanta cacofonía. Tú también las oyes, ¿verdad? El gran coro de $whisperers_in_the_void_color_article$, sus silenciosos obsequios y su histeria en forma de susurros.\n\nEstos secretos suponen un peligro para quienes no son capaces de entenderlos. Pero yo puedo ayudarte a desvelarlos. Te ofrezco mi ayuda mientras te enfrentas a la abrumadora cantidad de paradojas que pueblan tus pensamientos. Sin ánimo de insultar. Una vez, hasta a mí me costó comprender su verdadero significado."
 shroud.12050.a: "¿Qué te hace pensar que puedes ayudar?"
 shroud.12050.a.response: "Has atravesado la corteza del §HVelo§!, ¿verdad? Pero dime una cosa. ¿Lo dominas? Llevo toda una vida explorando sus profundidades, dibujando el inconmensurable rumbo de sus entes y ecos en nuestro frágil reino.\n\nLos Susurradores me guían desde hace mucho. Yo puedo ayudarte a entender las exasperantes palabras que ahora pueblan tus pensamientos."
 shroud.12050.b: "¿Qué sabes de los Susurradores?"
 shroud.12050.b.response: "Llevo años catalogando sus susurros, aguardando la llegada de este momento. Ahora estás en sintonía con su diverso coro, y no pienso desperdiciar la oportunidad de desentrañar las verdades enterradas en su interior."
 shroud.12050.c: "¿Qué nos ofreces?"
 shroud.12050.c.response: "Toda una vida de estudio ha afinado mi objetivo y desentrañado las estructuras de nuestra realidad física y de las infinitas profundidades del §HVelo§!.\n\nJuntos, escaparemos de los límites de este plano. Los secretos del universo estarán a nuestro alcance, te lo prometo con total seguridad."
 shroud.12050.hire_custom_tooltip: "§Y$zulyn$§! se une a nuestro imperio como §Hlíder§!."
 leader_trait_disciple_of_the_whisperers: "Susurros velados"
 leader_trait_disciple_of_the_whisperers_desc: "Este líder escucha el eco de $whisperers_in_the_void_article$ a través del Velo, lo que le otorga una visión científica poco común de los mecanismos ocultos del universo físico."
 leader_trait_disciple_of_the_whisperers_effects: "$t$- $@disciple_of_the_whisperers_tech_zro|0=+$ $i_zro$ al investigar una tecnología §Yrara§! o §Ypsiónica§!"
 ouwron: "Ouw'ron"
 ouwron_desc: "Ouw'ron, que se exilió de su clan nómada tras ser testigo de $end_of_the_cycle_article$, ha vagado por las estrellas en busca de su favor. Ahora, con el $NAME_Reckoning$ en el horizonte, arde con un propósito y no será fruto del rechazo."
 ouwron_catch_phrase: "Llegará el Día del Juicio..."
 shroud.12060.name: "$ouwron$"
 shroud.12060.desc_1: "§HUn torrente incomprensible de señales invade nuestro sistema de comunicaciones. Entre el caos, empieza a distinguirse una sola voz.§!\n\nPor fin has llegado. No has sido puntual, pero tampoco llegas tarde. No temas, pues veo más allá de los estrechos límites de esta prisión física a la que llamamos realidad. Se ha hecho la ofrenda. Tengo vía libre."
 shroud.12060.desc_blind: "\n§HEntonces es cuando nos damos cuenta: al igual que nosotros, este ser se ha entregado para servir a la causa.§!"
 shroud.12060.desc_default: "\n§HEs entonces cuando nos percatamos de que tiene las cuencas oculares vacías desde hace mucho tiempo.§!"
 shroud.12060.desc_2: "\nAcércate, no seas tímido. Sé que has atisbado la sublime simplicidad de $end_of_the_cycle_color_article$. Únete a mí en comunión y, juntos, forzaremos su aparición."
 shroud.12060.a: "¿Desde cuándo conoces la existencia de $end_of_the_cycle_article$?"
 shroud.12060.a.response: "Desde antes de ser consciente. Como pasa con todas las mentes, el conocimiento yace latente hasta que el §HVelo§! lo saca a la luz. Ahí es cuando su intención se hace palpable. Nuestro propósito es simple: guiar en el final."
 shroud.12060.b: "¿Por qué quieres ayudarnos?"
 shroud.12060.b.response: "Preguntas lo que ya sabes. Ambos hemos visto que es inevitable. El desenlace ha comenzado, y solo es posible atravesarlo. Juntos, avanzaremos en espiral hacia la conclusión."
 shroud.12060.c: "¿Qué nos ofreces?"
 shroud.12060.c.response: "No soy más que polvo en este mortecino ciclo, igual que todos nosotros. ¿Qué podría ofrecer? Las mentes se desvanecen en esta galaxia, y mi cometido es guiarlas con rapidez. Que mi misericordia te acompañe."
 shroud.12060.hire_custom_tooltip: "§Y$ouwron$§! se une a nuestro imperio como §Hlíder§!."
 leader_trait_disciple_of_the_end: "Apóstol del fin"
 leader_trait_disciple_of_the_end_desc: "Un apóstol devoto de $end_of_the_cycle_article$. Su inquebrantable fe en la llegada del $NAME_Reckoning$ resuena en cada batalla que libra."
 leader_trait_disciple_of_the_end_effects: "$t$- $@disciple_of_the_end_aura_intensity|0=+$ de intensidad de aura por nave destruida en el sistema$TABBED_NEW_LINE$- $@disciple_of_the_end_jumpdrive_range|0=+%$ $MOD_SHIP_FTL_JUMPDRIVE_RANGE_MULT$ con §H$end_aura$§!"
 shroud.12155.name: "Pura convicción"
 shroud.12155.desc: "§HTodas las acciones tienen consecuencias. A medida que nuestras comunicaciones cobran vida, $ouwron$ estalla con una furia desmedida.§!\n\n¡Hereje! ¡Necio! ¡Embustero! Deberíamos habérnoslo imaginado. Deberíamos haberte aniquilado cuando tu infausta esencia se adentró en el §HVelo§!.\n\nHas retrasado lo inevitable, ¡la conclusión que ya se había predicho! ¿Qué crees que consigues con este acto desafiante? Has perdido todo lo que habías ganado.\n\nSolo hay un final posible. Canta..., ¡cántale al olvido!"
 shroud.12155.tt: "¡$ouwron$ se vuelve contra nosotros!"
 NAME_Ouwron_Battleship: "$battleship$"
 NAME_Ouwron_Destroyer: "$destroyer$"
 shroud.12160.title: "Guerra declarada"
 shroud.12160.desc: "El/la [global_event_country.GetGalCommunityOrGalImperium] ha aprobado una resolución para declararnos un objetivo militar. Ahora, todos los miembros del/de la [global_event_country.GetGalCommunityOrGalImperium] están en guerra con el [this.GetName]. Prevemos que sus flotas atacarán en cualquier instante."
