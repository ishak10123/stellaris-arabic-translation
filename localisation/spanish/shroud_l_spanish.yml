 # End of the Cycle
 situation_end_of_the_cycle: "$name_eotc$"
 situation_end_of_the_cycle_desc: "Hemos forjado un pacto con $end_of_the_cycle_color_article$ que nos confiere un poder increíble. Nuestros [Owner.GetTelepathPlural] especulan que el coste del trato se puede posponer gracias al trance psiónico del colectivo, aunque no para siempre.\n\nLa voluntad de nuestro mecenas se manifiesta en una intensa $PSIONIC_AURA$. Si queremos llegar hasta el final, nuestro objetivo prioritario es propagar esta aura. A medida que nuestro número crece y nuestra fortaleza mental aumenta, también lo hacen el poder y el alcance del aura.\n\nSistemas que quedan por conquistar: §Y[Owner.GetEndCycleGalaxySystemsLeft]§!"
