 # Eater of Worlds accords
 ACCORD_FRENZY: "Frenético"
 ACCORD_FRENZY_desc: "$the_eater_of_worlds_article_cap$ desata una furia desenfrenada entre nuestras fuerzas."
 ACCORD_HUNGER: "Hambre"
 ACCORD_HUNGER_desc: "$the_eater_of_worlds_article_cap$ tiene un apetito voraz por el conflicto."
 ACCORD_DOOM: "Perdición"
 ACCORD_DOOM_desc: "Con la voluntad destructiva de $the_eater_of_worlds_article$, azotaremos a nuestros enemigos."
 ACCORD_DOOM_TT: "Convoca a la flota §Y$Name_Doom_Eater_Fleet$§!.\n\nEl poder de esta flota varía según la §Yintensidad de perdición§!.\nIntensidad de perdición actual: §Y[GetEaterOfWorldsDoomIntensity]/50§!\n\nClases de naves disponibles: [GetEaterOfWorldsShipClasses]\n\n§RSi existe otra flota §Y$Name_Doom_Eater_Fleet$§!, se cesará.§!"
 ACCORD_DIGEST: "Digestión"
 ACCORD_DIGEST_desc: "Urge saciar el apetito ilimitado de $the_eater_of_worlds_article$."
