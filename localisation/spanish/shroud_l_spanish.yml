 PROXY_WAR_VIEW_ATTACKERS_DESC: "§GAñade o elimina a los atacantes propuestos haciendo clic sobre ellos en las listas de la izquierda.§!"
 START_PROXY_WAR_COST: "$ACTION_START_PROXY_WAR_TITLE$ $CLAIMS_COST$"
 CASUS_BELLI_COST_TT: "Seleccionar este §Hcasus belli§! costará lo siguiente:"
