l_spanish:
 ##################################
 # ENGLISH LOCALISATION - Shroud #
 ##################################
 SHROUD_TITLE: "Sombras del Velo"
 ap_interdimensional_processing: "Procesamiento interdimensional"
 ap_interdimensional_processing_desc: "Nuestro potencial de cálculo se ve limitado por las tres dimensiones físicas. Podemos ganar mucho más al ampliar nuestra red a los espacios que hay más allá del vacío."
 requires_not_ap_interdimensional_processing: "$TRIGGER_FAIL$Puede no tener la ventaja de ascenso §Y$ap_interdimensional_processing$§!."
 vo_psionic_voice: "Psiónico"
 #==========================
 # Advanced Governments
 #==========================
 shroud.7099.name: "Respuestas psiónicas"
 shroud.7099.desc: "Nuestros pensamientos fluyen por el §HVelo§! con un propósito renovado. Cuando avanzamos, el Velo nos repele. Al principio, lo interpretamos como que se resistía a nuestra presencia, pero ahora lo comprendemos: el Velo nos está haciendo preguntas.\n\nSi bien su significado es confuso, estas preguntas no son triviales. Según nuestros [GetTelepathPlural], las respuestas que demos influirán en el futuro de nuestra sociedad."
 shroud.7099.a: "Hay que responder."
 # Shroud Songs events
 shroud.7100.title: "Canción del Velo: [GetRolledShroudSongName]"
 shroud.7100.desc.common: "Una imagen cobra forma en nuestro/a [GetMindEyeLoc]. Vemos §H[GetRolledShroudSongName]§!.\n\n§P[GetRolledShroudSongDesc]§!"
 shroud.7100.desc: "Nuestro vínculo con el §HVelo§! es fuerte; estamos listos para su llamada. Un mensaje nos llega en frases rítmicas. El Velo nos canta.\n\n$shroud.7100.desc.common$"
 shroud.7100.a: "[GetRolledShroudSongOptionA]"
 shroud.7100.b: "[GetRolledShroudSongOptionB]"
 shroud.7100.tt: "El Velo aguarda nuestra respuesta..."
 shroud.7105.desc: "Lo imperceptible cambia y, con un susurro, otro pensamiento nace.\n\n$shroud.7100.desc.common$"
 shroud.7105.tt: "El Velo aguarda nuestra respuesta con ansia..."
 shroud.7110.desc: "¡Un coro resuena en nuestros pensamientos! Algo más antiguo ha hecho una elección para nada fortuita.\n\n$shroud.7100.desc.common$"
 shroud.7110.tt: "El Velo tiembla de expectación ante nuestra respuesta..."
 shroud_song.1.name: "Estrellas"
 shroud_song.1.desc: "El proceso de la existencia es el camino al saber para aquellos que buscan el conocimiento."
 shroud_song.1.a: "El conocimiento va más allá de nuestros sentidos."
 shroud_song.1.b: "El conocimiento está a nuestro alcance."
 shroud_song.2.name: "Pequeño"
 shroud_song.2.desc: "El Intermedio es la superficie de un océano, un vacío infinitesimal ligado al Velo. Aquí, la verdad se puede vislumbrar."
 shroud_song.2.a: "La verdad está en lo más profundo."
 shroud_song.2.b: "La verdad se refleja en la superficie."
 shroud_song.3.name: "Vida"
 shroud_song.3.desc: "La vida florece para marchitarse.\nSea donde sea, la vida es frágil."
 shroud_song.3.a.default: "En el Velo, la vida y la muerte desaparecen."
 shroud_song.3.a.machine: "Nuestra existencia trasciende a la vida."
 shroud_song.3.b.default: "Eso es lo que nos hace tan valiosos."
 shroud_song.3.b.machine: "Todavía no hemos nacido."
 shroud_song.3.b.homicidal: "Todo lo frágil es prescindible."
 shroud_song.4.name: "Mente"
 shroud_song.4.desc: "La mente es un manantial, y los pensamientos fluyen por el tiempo y el espacio. Nos filtramos por otras dimensiones."
 shroud_song.4.a: "Sigamos la corriente."
 shroud_song.4.b: "Cavemos un pozo."
 shroud_song.5.name: "Líneas"
 shroud_song.5.desc: "Cualquier causa y efecto se puede predecir. Para conocer el destino de todo, hay que saber leer las líneas."
 shroud_song.5.a: "Esas líneas las trazamos en sueños."
 shroud_song.5.b: "Esas líneas se pueden calcular."
 shroud_song.6.name: "Muerte"
 shroud_song.6.desc: "Al morir, una estrella puede brillar con más intensidad que una galaxia, y a esta también le llegará la hora."
 shroud_song.6.a.default: "La muerte ya no nos preocupa."
 shroud_song.6.a.machine: "La muerte es un misterio para nosotros."
 shroud_song.6.b.default: "Todo perece, y pocas cosas sobreviven."
 shroud_song.6.b.machine: "Antes de morir, primero hemos de vivir."
 shroud_song.7.name: "Vacío"
 shroud_song.7.desc: "El caos reina allá donde las galaxias se agrupan. El vacío promete la calma."
 shroud_song.7.a: "Nosotros somos la calma."
 shroud_song.7.b: "Nosotros somos el caos."
 shroud_song.8.name: "Pliegue"
 shroud_song.8.desc: "Un puente puede derrumbarse a cualquier distancia, y cualquier puente puede derrumbarse."
 shroud_song.8.a: "Cruzamos para llegar al otro lado."
 shroud_song.8.b: "Cruzamos con la esperanza de volver."
 shroud_song.9.name: "Gravedad"
 shroud_song.9.desc: "Todo empujón está ligado a un tirón."
 shroud_song.9.a: "Empujemos."
 shroud_song.9.b: "Tiremos."
 shroud_song.10.name: "Nébula"
 shroud_song.10.desc: "Cuando una estrella muere, desprende polvo, y ese polvo forma una nube.\nA partir de esa nube, una estrella nace y su sino es convertirse en polvo."
 shroud_song.10.a: "Es un ciclo sin fin."
 shroud_song.10.b: "Todo debe tener un fin."
 shroud_song.11.name: "Cometa"
 shroud_song.11.desc: "Los exploradores buscan lo desconocido; la exploración los ciega."
 shroud_song.11.a: "El Velo no conoce límites."
 shroud_song.11.b: "El Velo amplía nuestros límites."
 shroud_song.12.name: "Agujero negro"
 shroud_song.12.desc: "Lo que hay dentro es un misterio, y adentrarse implica no salir jamás."
 shroud_song.12.a: "Que nos devore por completo."
 shroud_song.12.b: "Guardemos las distancias."
 shroud_song.13.name: "Energía"
 shroud_song.13.desc: "Un objeto en movimiento decide descansar. ¿Cuál debería ser su castigo?"
 shroud_song.13.a: "¿Quiénes somos nosotros para juzgar?"
 shroud_song.13.b: "Una reacción igual, pero en la otra dirección."
 shroud.7120.name: "Trascendencia psiónica"
 shroud.7120.desc.common: "El §HVelo§! guarda silencio, si bien nuestra sociedad ha notado su poder psíquico. Nuestras respuestas presentan nuevas oportunidades; solo queda aprovecharlas."
 shroud.7120.desc: "$shroud.7120.desc.common$\n\nNuestras mentes ascendidas están listas para la siguiente transformación. Los recipientes que sustentan las necesidades físicas de la mente podrían perder mucha más relevancia.\n\nSi seguimos por este camino, nuestra población podrá trascender a sus preocupaciones materiales y entregarse por completo a una existencia parcial dentro del Velo. Sacrificar la capacidad para el trabajo físico es un pequeño precio a cambio de mejorar nuestra agudeza mental."
 shroud.7120.a.default: "Aceptemos la trascendencia psiónica."
 shroud.7120.a.gestalt: "La trascendencia psiónica es óptima para el colectivo."
 shroud.7120.a.tt: "$change_auth_tt$ [GetTranscendedAuthority]"
 shroud.7120.b.default: "Con semejantes cambios, podremos florecer."
 shroud.7120.b.machine: "Cambios operacionales denegados."
 shroud.7121.name: "Las canciones del Velo"
 shroud.7121.desc: "$shroud.7120.desc.common$\n\nEn esta dimensión corpórea, nuestras formas ascendidas albergan un gran potencial. Si seguimos evolucionando a base de transfusiones de energía psiónica, podremos canalizar este poder aún más en nuestra sociedad.\n\nNo solo estaríamos cantando las canciones del Velo, sino que además las canalizaríamos hacia nuestro [GetGovBehaviourLoc]."
 shroud.7121.a: "Que las canciones del Velo nos guíen."
 shroud.7121.a.tt: "$change_auth_tt$ [GetCorporealAuthority]"
 # Transcendent
 transcendent_trait_common_tt: "El rasgo de especie §Y$trait_psionic$§! otorga efectos adicionales:$TABBED_NEW_LINE$- Eficacia laboral de [GetSpecialist] y $pop_cat_ruler_plural$: §G+10%§!$TABBED_NEW_LINE$- Eficacia laboral de [GetWorker]: §R-10%§!"
 transcendent_trait_tt: "$mod_psionic_aura_hyperlane_range_add$: §G+2§!\n$transcendent_trait_common_tt$\nEl rasgo de líder ['concept_leader_trait_psionic'] otorga efectos adicionales: $TABBED_NEW_LINE$- §G+$@transcendent_psionic_leader_speed_mult|0%$§! de velocidad del orden del día del Consejo $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_ADD$: §G+60§! $TABBED_NEW_LINE$- Los efectos no trascendentes aumentan en un §G+50%§!"
 auth_shroud_democratic_transcendent: "Democracia trascendente"
 auth_shroud_democratic_transcendent_desc: "Todas las mentes trascendidas comparten el mismo estatus en el Velo. Entretanto, las elecciones garantizan la igualdad en el reino corpóreo. Mediante la votación psiónica, los ciudadanos eligen a sus representantes para el cónclave gobernante, el cual buscará el consenso mediante la contemplación telepática."
 transcendent_democratic_tt: "$transcendent_trait_tt$\n$mod_pop_factions_produces_mult$: §G+40%§!\n$MOD_LEADER_LIFESPAN_ADD$: §G+20 años§!\n$mod_negative_traits_leader$: §G-1§!"
 gov_shroud_transcendent_democracy: "$auth_shroud_democratic_transcendent$"
 gov_shroud_transcendent_democracy_desc: "$auth_shroud_democratic_transcendent_desc$"
 auth_shroud_oligarchic_transcendent: "Aristocracia trascendente"
 auth_shroud_oligarchic_transcendent_desc: "Las mayores profundidades del Velo solo están reservadas para las mentes más brillantes. El tiempo para entrar en sintonía con estos dominios se contabiliza en sus mandatos."
 transcendent_oligarchic_tt: "$transcendent_trait_tt$\n$MOD_LEADER_SKILL_ADD$: §G+1§!\n$MOD_LEADER_COUNCILOR_EXP_GAIN$: §G+25%§!\n$mod_leaders_upkeep_mult$: §G-25%§!\n$MOD_ELECTION_TERM_YEARS_ADD$: §Y+20§!\n$mod_planet_telepaths_produces_mult$: $@transcendent_oligarchic_telepath|0=+%$ durante §Y5§! años después de cada elección."
 gov_shroud_transcendent_oligarchy: "$auth_shroud_oligarchic_transcendent$"
 gov_shroud_transcendent_oligarchy_desc: "$auth_shroud_oligarchic_transcendent_desc$"
 transcendent_oligarchic_election_modifier: "$auth_shroud_oligarchic_transcendent$"
 auth_shroud_dictatorial_transcendent: "Teocracia trascendente"
 auth_shroud_dictatorial_transcendent_desc: "El hora de reconocer la verdad: el sumo gobernante es un dios ascendido. Gracias al poder del Velo, lo ve y lo sabe todo."
 auth_shroud_dictatorial_transcendent_tt: "$transcendent_trait_tt$\n[telepath.GetName] §H$EDICT_FUND$§!: +1\nLos £job_politician£ $job_politician_plural$ se sustituyen por ['concept_high_priest']\n$mod_planet_bureaucrats_produces_mult$: §G+15%§!\n$mod_planet_enforcers_produces_mult$: §G+15%§!\n$mod_pop_ethic_spiritualist_attraction_mult$: §G+50%§!"
 gov_shroud_transcendent_dictatorial: "$auth_shroud_dictatorial_transcendent$"
 gov_shroud_transcendent_dictatorial_desc: "$auth_shroud_dictatorial_transcendent_desc$"
 auth_shroud_imperial_transcendent: "Imperio trascendente"
 auth_shroud_imperial_transcendent_desc: "El gobernante eleva nuestra presencia a una dimensión superior. El poder en bruto del Velo emana de la voluntad de la estirpe imperial y se adentra en las deseosas mentes del populacho."
 auth_shroud_imperial_transcendent_tt: "$transcendent_trait_tt$\nEl $imperial_heir$ obtiene efectos adicionales:$TABBED_NEW_LINE$$scientist_plural_with_icon$ - §YArqueología§! y §Yhabilidad en grieta astral§!: $@transcendent_imperial_heir_skill|0=+$$TABBED_NEW_LINE$$official_plural_with_icon$ - $i_stability$: $@transcendent_imperial_heir_stability|0=+$$TABBED_NEW_LINE$$commander_plural_with_icon$ - §Y$HITPOINTS$§! y §Y$MOD_SHIP_SPEED_MULT$§!: $@transcendent_imperial_heir_mult|0=+%$\nCada vez que £leader£ §Y$imperial_ruler$§! o el §Yheredero§! sube de nivel, obtienes: $i_unity$\n$MOD_ENVOY_IMPROVE_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_HARM_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_ATTUNEMENT_MULT$: §G+50%§!\n$MOD_PLANET_CRIME_ADD$: §R+20§!"
 gov_shroud_transcendent_imperial: "$auth_shroud_imperial_transcendent$"
 gov_shroud_transcendent_imperial_desc: "$auth_shroud_imperial_transcendent_desc$"
 councilor_ruler_imperial_transcendent: "$imperial_ruler$"
 councilor_ruler_imperial_transcendent_desc: "$imperial_ruler_desc$"
 auth_shroud_corporate_transcendent: "Empresa trascendente"
 auth_shroud_corporate_transcendent_desc: "La entidad corporativa ha trascendido para avanzar con sus objetivos prioritarios. Al amparo de las sombras del Velo, la empresa puede sondear las mentes tanto de los inversores como de la competencia, lo que da lugar a estrategias empresariales psiónicas."
 auth_shroud_corporate_transcendent_tt: "$transcendent_trait_tt$\n[telepath.GetName] $i_trade_value$: §G+$@corporate_government_telepaths_trade_value_mult|0%$§!\n$MOD_INTEL_DECRYPTION_ADD$: §G+1§!\n$mod_operations_influence_cost_mult$: §G-20%§!\n$MOD_BRANCH_OFFICE_VALUE_MULT$: §G+20%§!\n$MOD_COUNTRY_ENVOYS_ADD$: §G+1§!"
 gov_shroud_transcendent_corporate: "$auth_shroud_corporate_transcendent$"
 gov_shroud_transcendent_corporate_desc: "$auth_shroud_corporate_transcendent_desc$"
 auth_shroud_hive_transcendent: "Mente de éter trascendente"
 auth_shroud_hive_transcendent_desc: "Después de adentrarse en el Velo al unísono, este colectivo ahora se siente más cómodo en el Velo que en sus formas físicas. Cada viaje al otro lado del Velo aumenta la sabiduría conjunta de este nueva mente de éter."
 transcendent_hive_mind_tt: "$transcendent_trait_tt$\nLos §Ylíderes§! obtienen §Y$@transcendent_hive_mind_leader_exp|0$§! de experiencia después de cada $DELVE$.\n$MOD_PLANET_STABILITY_MULT$: §G+10%§!\n$mod_planet_jobs_complex_drone_produces_mult$: §G+10%§!\n$MOD_EMPIRE_SIZE_MULT$: §G-10%§!\n$MOD_POP_ENVIRONMENT_TOLERANCE$: §R-10%§!"
 gov_shroud_transcendent_hive: "$auth_shroud_hive_transcendent$"
 gov_shroud_transcendent_hive_desc: "$auth_shroud_hive_transcendent_desc$"
 auth_shroud_machine_transcendent: "Ordenador central trascendente"
 auth_shroud_machine_transcendent_desc: "Buena parte del procesamiento de esta red se ha trasladado al interior del Velo, donde puede realizar cálculos a niveles de velocidad sin precedentes. Ahora, las operaciones del sistema en el reino mundano se consideran toscas y obsoletas."
 transcendent_machine_tt: "$transcendent_trait_tt$\n$@transcendent_machine_research_per_attunement|2=+%$ de velocidad de investigación por cada punto de sintonía\nObtienes investigación aleatoria en £physics_research£ £society_research£ £engineering_research£ cada vez que decidas §Y$DELVE$§!\nMantenimiento de §Ysubrutinas§! por cada $pop_group_unit$ $job_telepath_swap_plural_with_icon$: $@transcendent_machine_calculator_upkeep|0=-%$\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+25%§!\nLas £pop£ poblaciones con el rasgo ['trait:trait_robot_psionic'] obtienen un $@transcendent_machine_pop_upkeep|0=-%$ de mantenimiento\n$mod_station_researchers_produces_mult$: §R-20%§!"
 gov_shroud_transcendent_machine: "$auth_shroud_machine_transcendent$"
 gov_shroud_transcendent_machine_desc: "$auth_shroud_machine_transcendent_desc$"
 transcendent_machine_research_modifier: "$auth_shroud_machine_transcendent$"
 AUTH_HIVE_MIND_GENEMODDING_ASCENDED: "Puede modificar £pop£ §Hpoblaciones§! para convertirse en §Hmente colmena§!"
 MOD_ENVOY_ATTUNEMENT_MULT: "Sintonía de enviados con el Velo"
 REMOVE_FROM_EMPIRE_COUNCIL_EFFECT: "Eliminar del Consejo"
 # Corporeal
 corporeal_trait_tt: "$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$: §G+25%§!\n$AVAILABLE_POLICIES$ ['policy:psionic_choir',$policy_psionic_choir$]"
 auth_shroud_democratic_corporeal: "Unión espiritual"
 auth_shroud_democratic_corporeal_desc: "Las energías del Velo se esparcen por el imperio de forma democrática, aligeran las cargas de la vida corpórea e inducen a todos los ciudadanos una sensación de unidad física mayor."
 corporeal_democratic_tt: "$corporeal_trait_tt$\nFelicidad de población psiónica: $@corporeal_democratic_psionic_happiness|0=+%$\n$mod_pop_factions_produces_mult$: §G+10%§!\n$MOD_EMPIRE_SIZE_PSIONIC_POPS_MULT$: §G-10%§!\n$mod_planet_jobs_unity_produces_mult$: §G+10%§!\n$MOD_POP_POLITICAL_POWER$: §G+50%§!"
 gov_shroud_corporeal_democracy: "$auth_shroud_democratic_corporeal$"
 gov_shroud_corporeal_democracy_desc: "$auth_shroud_democratic_corporeal_desc$"
 auth_shroud_oligarchic_corporeal: "Prodigocracia"
 auth_shroud_oligarchic_corporeal_desc: "Al iniciar el entrenamiento psíquico de nuestros líderes a una edad temprana, podemos convertirlos en unos telépatas de élite con habilidades psiónicas que, hoy por hoy, solo podemos imaginar."
 corporeal_oligarchic_tt: "$corporeal_trait_tt$\n$MOD_LEADER_INITIAL_SKILL$: §G+2§!\n$mod_leaders_upkeep_mult$: §G-25%§!\n$mod_leader_recruitment_age$: §G-15§!\nLos §Ylíderes§! empiezan con §Run rasgo negativo§! adicional."
 gov_shroud_corporeal_oligarchy: "$auth_shroud_oligarchic_corporeal$"
 gov_shroud_corporeal_oligarchy_desc: "$auth_shroud_oligarchic_corporeal_desc$"
 auth_shroud_dictatorial_corporeal: "Autocracia por decreto"
 auth_shroud_dictatorial_corporeal_desc: "El sumo gobernante encarna el poder del Velo en su forma corpórea, pues traduce la energía psiónica en poder para gobernar. Nada se interpondrá en su visión definitiva."
 auth_shroud_dictatorial_corporeal_tt: "$corporeal_trait_tt$\n+1 §H$EDICT_FUND$§! por telépata\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+25%§!\n$MOD_COUNCIL_AGENDA_COOLDOWN_MULT$: §G-25%§!\n$mod_planet_bureaucrats_upkeep_mult$: §G-25%§!"
 gov_shroud_corporeal_dictatorial: "$auth_shroud_dictatorial_corporeal$"
 gov_shroud_corporeal_dictatorial_desc: "$auth_shroud_dictatorial_corporeal_desc$"
 auth_shroud_imperial_corporeal: "Imperium Vitalis"
 auth_shroud_imperial_corporeal_desc: "El linaje imperial es un conducto de vitalidad procedente del Velo. Este poder se canaliza para aumentar la forma física del gobernante y sus herederos mediante la generosidad de nuestro voluntarioso pueblo."
 auth_shroud_imperial_corporeal_tt: "$corporeal_trait_tt$\n§Y$imperial_heir$§! obtiene $@corporeal_imperial_heir_xp|0+$ de §YPE§! cada vez que ocupe el trono\n$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$ por cada $pop_group_unit$ $job_telepath_swap_plural_with_icon$: $@corporeal_imperial_telepath_effectiveness|0=+%$\n$MOD_ENVOY_IMPROVE_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_HARM_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_ATTUNEMENT_MULT$: §G+50%§!\n$MOD_RULER_SKILL_ADD$: §G+2§!\n$MOD_COUNCILOR_SKILL_ADD$: §G+1§!\n$MOD_LEADER_LIFESPAN_ADD$: §G+10 años§!\n$mod_psionic_pop_bonus_workforce_mult$: §R-20%§!\n$MOD_LOGISTIC_GROWTH_MULT$: §R-5%§!\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §R-5%§!"
 gov_shroud_corporeal_imperial: "$auth_shroud_imperial_corporeal$"
 gov_shroud_corporeal_imperial_desc: "$auth_shroud_imperial_corporeal_desc$"
 auth_shroud_corporate_corporeal: "Junta de física"
 auth_shroud_corporate_corporeal_desc: "Sería una necedad desperdiciar los beneficios mentales que ofrece el Velo. Esta corporación es conocida por fundar $building_psionic_offices$ en civilizaciones vecinas, aumentando la rentabilidad de los acuerdos comerciales con el exterior."
 auth_shroud_corporate_corporeal_tt: "$corporeal_trait_tt$\n$r_trade$ por $pop_group_unit$ $job_telepath_swap_plural_with_icon$: §G+$@corporate_government_telepaths_trade_value_mult|0%$§!\n$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$ por ['building:building_psionic_offices']: §G+2%§!\n$mod_planet_branch_offices_influence_cost_mult$: §G-40%§!\n$mod_council_agenda_early_activation_cost_mult$: §G-25%§!\n$MOD_COUNCIL_AGENDA_COOLDOWN_MULT$: §G-25%§!\n$MOD_LEADER_SPECIES_EXP_GAIN$: §G+25%§!"
 gov_shroud_corporeal_corporate: "$auth_shroud_corporate_corporeal$"
 gov_shroud_corporeal_corporate_desc: "$auth_shroud_corporate_corporeal_desc$"
 auth_shroud_hive_corporeal: "Nexo psiónico"
 auth_shroud_hive_corporeal_desc: "La fuerza de su sintonía con el Velo resuena en las formas físicas de este colectivo."
 corporeal_hive_mind_tt: "$corporeal_trait_tt$\n$@corporeal_hive_mind_job_upkeep_per_attunement|2=-%$ $mod_planet_jobs_upkeep_mult$ por cada punto de sintonía\n$MOD_PLANET_STABILITY_MULT$: §G+10%§!\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+30%§!\n$MOD_COUNCIL_AGENDA_FINISHING_EFFECT_DURATION_MULT$: §G+30%§!"
 gov_shroud_corporeal_hive: "$auth_shroud_hive_corporeal$"
 gov_shroud_corporeal_hive_desc: "$auth_shroud_hive_corporeal_desc$"
 corporeal_hive_mind_upkeep_modifier: "$auth_shroud_hive_corporeal$"
 auth_shroud_machine_corporeal: "Red psiónica"
 auth_shroud_machine_corporeal_desc: "Al conectar sus redes a través de las corrientes ocultas del Velo, estas máquinas logran una transferencia de datos casi instantánea. Con cada byte imbuido por una potente voluntad psiónica, esta configuración es capaz de influir enormemente en el espacio físico que la rodea."
 corporeal_machine_tt: "$corporeal_trait_tt$\n$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$ por cada $pop_group_unit$ $job_telepath_drone_swap_with_icon$: $@corporeal_machine_aura_effectiveness|0=+%$\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+25%§!\n$mod_pop_cat_complex_drone_bonus_workforce_mult$: §G+10%§!\n$mod_leaders_upkeep_mult$: §G-50%§!\n$mod_planet_bureaucrats_upkeep_mult$: §R+30%§!"
 gov_shroud_corporeal_machine: "$auth_shroud_machine_corporeal$"
 gov_shroud_corporeal_machine_desc: "$auth_shroud_machine_corporeal_desc$"
 MOD_PSIONIC_POPS: "Poblaciones psiónicas: $VALUE$"
 MOD_POP_AMENITIES_USAGE_PSIONIC_MULT: "$MOD_POP_AMENITIES_USAGE_BASE$ psiónico"
 MOD_EMPIRE_SIZE_PSIONIC_POPS_MULT: "$EMPIRE_SIZE$ de poblaciones psiónicas"
