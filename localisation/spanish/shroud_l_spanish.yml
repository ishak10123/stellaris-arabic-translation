 shroud_seal: "$SHROUD_SEAL$"
 shroud_seal_DESC: "Esta sofisticada máquina emite ondas de baja frecuencia capaces de contrarrestar la energía psiónica, disipando las $PSIONIC_AURA_PLURAL$ hasta neutralizarlas por completo."
 shroud_seal_MEGASTRUCTURE_DETAILS: "El §Y$SHROUD_SEAL$§! atenúa las §Y$PSIONIC_AURA_PLURAL$§! cercanas y reduce la efectividad de los §Ycomponentes de las naves psiónicas§!."
