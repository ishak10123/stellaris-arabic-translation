 DELVING_RITUAL: "Ritual de indagación"
 DELVING_RITUAL_DESC: "El §Y[shroudwalker_enclave_country.GetName]§! han realizado los preparativos necesarios para un ritual con el que indagar en el §HVelo§!. El conocimiento que obtengamos gracias a ello es un misterio."
 MINDWARDENS_THE_FIRST_ENCLAVE: "El primer enclave"
 MINDWARDENS_THE_FIRST_ENCLAVE_DESC: "En nuestra misión de poner coto a la infección psiónica que azota la galaxia, hemos iniciado los preparativos para construir un §H\"$gov_mindwarden_enclave$\"§!.\n\nUna vez construido, podremos facilitar servicios antipsiónicos a los que precisen de ellos, además de sacar rédito con los beneficios y materiales que reciba."
 MINDWARDENS_THE_FIRST_ENCLAVE_NOTE: "Convierte una §Y$FLEET$§! con un tamaño de 30 o más liderada por un §Y$commander$§! en el §Y$gov_mindwarden_enclave$§! de un sistema bajo nuestro control."
 SHROUD_SHAPING_PROJECT: "Moldeando el Velo"
 SHROUD_SHAPING_PROJECT_DESC: "Las entidades que moran en el §HVelo§! son numerosas, y cada una amasa un gran poder. Precisan un vínculo irrevocable para otorgar sus bendiciones más importantes.\n\nSin embargo, hemos visto una alternativa para forjar nuestro propio camino. En lugar de vincular nuestra psique a un solo mecenas, nuestros [GetResearchers] psiónicos pueden desarrollar los medios para canalizar pequeñas cantidades de energía de cada uno, moldeando el Velo a nuestra propia voluntad."
 EXPLORE_BORDER_SYSTEM: "Explorar [exiled_system_border.GetName]"
 EXPLORE_BORDER_SYSTEM_DESC: "Las imágenes de larga distancia muestran una reciente explosión de extraños flujos de energía en el sistema §H[exiled_system_border.GetName]§! que se correlaciona con las lecturas irregulares generadas por nuestra $building_ancient_ward_1$ en [owner.GetHomeWorldName].\n\nSi queremos comprender este fenómeno, debemos explorar [exiled_system_border.GetName]."
 EXPLORE_BORDER_SYSTEM_TOOLTIP: "Envía una §Ynave§! o una §Yflota§! a explorar §Y[exiled_system_border.GetName]§!."
