 #==========================
 # Tutorials
 #==========================
 TUTORIAL_SHROUD_TAB_TITLE: "Tutorial: $THE_SHROUD_TITLE$"
 TUTORIAL_SHROUD_TAB_DESC: "Esta es la sección del §SVelo§!. El panel izquierdo muestra la posición de tu imperio en el Velo, y se representa con los §Sdominios§! de cuatro entidades psiónicas conocidas como §Smecenas§!.\n\nNuestra posición viene determinada por la §S$concept_attunement$§!, la cual se obtiene cuando una acción en el reino físico agrada a un mecenas. Consigue $concept_attunement$ para empezar a revelar la identidad del mecenas. Cuando lo hagas, haz clic en el dominio de un mecenas para abrir su panel.\n\nHaz clic en §S$DELVE$§! o en el centro del panel izquierdo para entrar en el Velo y explorar el reino psiónico. Lo que descubras mientras exploras puede variar en función de nuestra $concept_attunement$ en los dominios."
 TUTORIAL_SHROUD_PATRON_TITLE: "Tutorial: mecenas del Velo"
 TUTORIAL_SHROUD_PATRON_DESC: "El panel del §Smecenas§! ofrece información y opciones relacionadas con un mecenas del Velo. Completa los objetivos de §S$concept_callings$§! y §S$concept_deeds$§! para obtener §S$concept_attunement$§! con esa entidad en concreto.\n\nAumenta la $concept_attunement$ para desbloquear §S$PASSIVE_ACCORDS$§! que proporcionan ventajas a tu imperio. Obtén mucha $concept_attunement$ con un mecenas para iniciar el proceso de crear un §Spacto§! que aplicará efectos aún más potentes."
 TUTORIAL_SHROUD_COVENANT_TITLE: "Tutorial: pactos"
 TUTORIAL_SHROUD_COVENANT_DESC: "Al cerrar un §Spacto§! con un mecenas del Velo, obtendremos acceso a §S$ACTIVE_ACCORDS$§!. $tutorial.shroud_covenant.shared$"
 tutorial.shroud_covenant.shared: "Haz clic en el icono de un $ACTIVE_ACCORD$ para activar sus efectos a cambio de £sr_zro£ §S$sr_zro$§!. Puedes hacer esto en el panel del Velo o en el de un mecenas.\n\nCuando lo actives, el $ACTIVE_ACCORD$ tardará un tiempo en recargarse antes poder activarlo de nuevo."
 TUTORIAL_SHROUD_SHAPING_TITLE: "Tutorial: moldear el Velo"
 TUTORIAL_SHROUD_SHAPING_DESC: "Ya tenemos los medios para obtener unos poderes que, por lo general, requieren un §Spacto§! con un §Smecenas§!.\n\nCuando hayamos desbloqueados los dos §S$PASSIVE_ACCORDS$§! de un mecenas, podremos acceder a un §S$ACTIVE_ACCORD$§!. $tutorial.shroud_covenant.shared$"
 tutorial.2600.name: "Tutorial: $PSIONIC_AURA_PLURAL$"
 tutorial.2600.desc: "Nuestras colonias con poblaciones psiónicas ya pueden emitir un §S$PSIONIC_AURA$§!. Este aura procede de un §Smecenas del Velo§! con el que tenemos la máxima §S$concept_attunement$§!.\n\nLas $PSIONIC_AURA_PLURAL$ afectan de varias formas a nuestro imperio, pero también a los imperios aliados o enemigos. Si queremos expandir el aura a más sistemas, tendremos que alcanzar una sintonía plena con un mecenas para desbloquear la tecnología £research£ §S$tech_aura_intensification$§!.\n\nPara observar los efectos de nuestro $PSIONIC_AURA$, abre la sección del §SVelo§! o coloca el cursor sobre el icono del aura, en el panel inferior central de la £interface£ §Svista de sistema§!."
 tutorial.2610.name: "Tutorial: $tech_aura_intensification$"
 tutorial.2610.desc: "Nuestra §S$PSIONIC_AURA$§! ya puede §Sintensificarse§! y expandirse a otros sistemas.\n\nLas $PSIONIC_AURA_PLURAL$ pueden alcanzar tres umbrales de intensidad, con efectos cada vez mayores. Cuando un $PSIONIC_AURA$ alcanza un nuevo nivel de intensidad o llega al máximo, intentará extenderse a los sistemas vecinos. Casi todas las $PSIONIC_AURA_PLURAL$ tienen un alcance máximo de expansión que parte desde su origen.\n\nLa intensidad del aura puede aumentar de varias formas; por ejemplo, con unos niveles de poblaciones $trait_psionic$ y £happiness£ §Sfelicidad§! elevados, trabajos de £job_telepath£ [GetTelepathCap], gobernadores psíquicos o £leader£ líderes de £sector£ sectores."
 tutorial.2620.name: "Tutorial: choque de auras"
 tutorial.2620.desc: "Nuestra §S$PSIONIC_AURA$§! se ha topado con otra aura en un sistema colindante. Si esto ocurre, las dos auras podrían competir para decidir cuál ocupará el otro sistema.\n\nEste proceso depende de la §Sintensidad§! mensual obtenida por cada aura, la cual se puede consultar al situar el cursor sobre el icono del aura, en el panel inferior central de la £interface£ §Svista del sistema§!."
 #==========================
 # Technologies
 #==========================
 tech_psionic_aura: "$PSIONIC_AURA$"
 tech_psionic_aura_desc: "Las emanaciones psiónicas del Velo ofrecen el favor de una entidad en la realidad corpórea. Un imperio en sintonía con un mecenas del Velo emitirá un $PSIONIC_AURA$ donde se concentran sus poblaciones psiónicas."
 feature_unlock_psionic_aura: "$PSIONIC_AURA_PLURAL$"
 feature_unlock_psionic_aura_desc: "Un imperio en sintonía con un mecenas del Velo emite un $PSIONIC_AURA$ donde se concentran sus poblaciones psiónicas."
 psionic_aura_delve_success_tt: "Probabilidad de adentrarse con éxito: §G+$@delve_success_tier_1|0$%§!"
 tech_aura_intensification: "Intensificación de $PSIONIC_AURA$"
 tech_aura_intensification_desc: "Las emanaciones psiónicas del Velo anhelan expandirse. Con este nuevo conocimiento, las $PSIONIC_AURA_PLURAL$ del imperio puede aumentar en intensidad y extenderse por los sistemas estelares, para beneficio de los aliados y perjuicio de los enemigos."
 feature_allow_psionic_aura_intensity_spread: "Propagación del $PSIONIC_AURA$"
 feature_allow_psionic_aura_intensity_spread_desc: "Permite que las $PSIONIC_AURA_PLURAL$ se propaguen a los sistemas vecinos, con hipervías de hasta §Y[Owner.GetAuraHyperlaneRange]§! desde la fuente emisora."
 feature_allow_psionic_aura_intensity_growth: "Crecimiento de $PSIONIC_AURA$"
 feature_allow_psionic_aura_intensity_growth_desc: "Permite que las $PSIONIC_AURA_PLURAL$ aumenten su intensidad."
 aura_intensification_delve_success_tt: "Probabilidad de adentrarse con éxito: §G+$@delve_success_tier_2|0$%§!"
 tech_psionic_suppression: "Supresión psiónica"
 tech_psionic_suppression_desc: "La construcción de dispositivos que atenúan la energía psiónica es tan difícil como su comprensión. Tal es el nivel de complejidad de estas fuerzas extradimensionales."
 tech_psionic_suppression_feature_tt: "$i_unlocks_feature$ Desbloquea la habilidad para construir §YSellos del Velo§! y §YSupresores psiónicos§!."
 tech_aura_resonation: "Resonancia de aura"
 tech_aura_resonation_desc: "Existe un método para proyectar $PSIONIC_AURA_PLURAL$ más allá de los mundos habitados. Al incorporar un $sm_aura_emitter$, hasta una base estelar puede convertirse en un conducto para las emanaciones psiónicas del Velo."
 tech_materiality_engine: "$building_materiality_engine$"
 tech_materiality_engine_desc: "$building_materiality_engine_desc$"
 tech_psionic_bombers: "Bombarderos psiónicos"
 tech_psionic_bombers_desc: "Estas pequeñas y ágiles naves están especializadas en lanzar cargas concentradas de energía psiónica. Cuanto más grande sea el objetivo, más resonancia lograrán sus explosiones."
 tech_bio_psionic_bombers: "$tech_psionic_bombers$"
 tech_psionic_lightning: "Rayo psiónico"
 tech_psionic_lightning_desc: "Al establecer una conexión psiónica temporal entre una nave y otra, podemos lanzar una carga directa de poder mental con un efecto devastador. Esa energía bruta es capaz de confundir los sistemas de la nave e influir en las mentes de la tripulación."
 tech_bio_psionic_lightning: "$tech_psionic_lightning$"
 ship_terrify_tt: "Existe la probabilidad de ['concept_terrify'] a las naves militares durante £time£ §Y5-10§! días, según el tamaño del objetivo."
 concept_terrify: "Aterrorizar"
 concept_terrify_desc: "Las naves aterrorizadas dejarán de atacar y huirán de sus agresores."
 tech_psionic_disruptor: "Disruptores psiónicos"
 tech_psionic_disruptor_desc: "Estos disruptores de vanguardia disparan una poderosa lanza de energía psiónica que perfora el casco de las naves enemigas, lo que permite desbaratar su arsenal."
 tech_bio_psionic_disruptor: "$tech_psionic_disruptor$"
 tech_zro_launcher: "Lanzadores de zro"
 tech_zro_launcher_desc: "Estos proyectiles con una alta concentración de $zro_lower$ pueden atravesar los escudos enemigos al saltar de una realidad a otra. Al entrar en contacto con un objeto físico, los efectos son exponencialmente devastadores."
