 abomination_army: "Abominaciones"
 abomination_army_desc: "Soldados esclavizados y sometidos a drásticos tratamientos experimentales que potenciaron su agresividad y sus habilidades marciales y los convirtieron en armas vivientes. Sumisos ante sus amos, y feroces en la batalla."
 seq_abomination_army: "Ejército de $ORD$ $abomination_army$"
 mindwarden_army: "Guardias de asalto"
 mindwarden_army_desc: "Estas unidades especializadas han recibido un entrenamiento exhaustivo en técnicas y tecnologías antipsiónicas, lo que las convierte en poderosas rivales para los objetivos invasores de mentes."
