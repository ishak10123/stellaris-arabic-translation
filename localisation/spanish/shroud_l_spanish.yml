 # Eater of Worlds
 shroud.4500.title: "$utopia.3304.name$"
 shroud.4500.desc.default: "[GetEaterCovenantProposedEvent]"
 shroud.4500.desc.hive: "$shroud.4500.desc.default$"
 shroud.4500.desc.gestalt_machine: "$shroud.4500.desc.default$"
 shroud.4500.desc.individual_machine: "$shroud.4500.desc.default$"
 shroud.4500.desc.1: "Al acercarnos al Velo, sentimos el hambre insaciable de una entidad melancólica."
 shroud.4500.desc.pacifist: "$shroud.4500.desc.1$$utopia.3306.desc.2$\n\nSu impaciencia es amenazante. ¿Podrán nuestras mentes llegar a aceptar a un monstruo así?"
 shroud.4500.desc.non_pacifist: "$shroud.4500.desc.1$$utopia.3306.desc.2$\n\nParece impaciente por empezar."
 shroud.4500.a: "Formemos un pacto con $the_eater_of_worlds_color_article$."
 shroud.4505.desc.intro: "Ya está. Hemos forjado un pacto con $the_eater_of_worlds_color_article$. Su voluntad ahora se abre paso por todo el §H[Root.GetName]§!."
 shroud.4505.desc.outro: "Cuando trabamos nuestro vínculo, el Devorador se cobró su diezmo: la población de una de nuestras ciudades desapareció por completo de repente. Un precio mísero por este poder..., hasta que el Devorador recobre el apetito."
 shroud.4505.desc.default: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.hive: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.gestalt_machine: "$shroud.4505.desc.hive$"
 shroud.4505.desc.individual_machine: "$shroud.4505.desc.intro$\n\nYa se detectan cambios en nuestra sociedad. Nuestras unidades militares se entregan plenamente en toda contienda. Tanto es así, que en tiempos de paz es necesario agotarlas con simulaciones de combate, so riesgo de que su avidez se torne en salvajismo.\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc_2_pacifist: "Ya se aprecian cambios en nuestra sociedad. Nuestras mentes están en conflicto con el gusto por la batalla. Esta disonancia cognitiva está causando un gran malestar entre nuestra población, normalmente pacífica. ¿Hemos hecho lo correcto?"
 shroud.4505.desc_2_organic_non_gestalt: "Ya se aprecian cambios en nuestra sociedad. Nuestras tropas están más ávidas que nunca de entrar en batalla. Tanto es así, que en tiempos de paz es necesario agotarlas con entrenamiento para que su inquietud no se transforme en salvajismo."
 shroud.4505.desc_2_machine_non_gestalt: "Ya se detectan cambios en nuestra sociedad. Nuestras unidades militares se entregan plenamente en toda contienda. Tanto es así, que en tiempos de paz es necesario agotarlas con simulaciones de combate para que su inquietud no se convierta en salvajismo."
 shroud.4505.desc_2_gestalt: "Ya se detectan cambios en nuestra sociedad. El conjunto de [GetIndividualNamePlural] militares se entregan plenamente en toda contienda. Tanto es así, que en tiempos de paz es necesario agotar a estos individuos con simulaciones de combate para que no recurran a agresiones innecesarias."
 shroud.4505.a.default: "Esperemos que no sea así."
 shroud.4505.a.gestalt: "El coste merece la pena."
 shroud.4510.desc.intro: "Hace ya un tiempo que establecimos las bases de un pacto con"
 shroud.4510.desc.outro: ". Nuestro vínculo sigue siendo débil y aún gozamos de la oportunidad de romperlo o de fortalecerlo.\n\nNuestros [GetTelepathPlural] han determinado que confirmar el acuerdo nos permitirá aprovechar activamente los poderes proporcionados por nuestro mecenas, además de proporcionar mejoras a nuestras flotas y $PSIONIC_AURA$."
 shroud.4510.desc: "$shroud.4510.desc.intro$$the_eater_of_worlds_color_article$$shroud.4510.desc.outro$"
 shroud.4510.b: "Renunciemos a $the_eater_of_worlds_color_article$."
 shroud_eater_covenant_chain_title: "$eater_covenant_chain_title$"
 shroud_eater_covenant_chain_desc.intro: "Hemos creado un vínculo con una entidad del Velo llamada $the_eater_of_worlds_color_article$. Nos concede migajas de su insaciable poder a cambio de un precio.\n\nNuestros [GetTelepathPlural] creen que el vínculo se puede reforzar si alineamos nuestras acciones con la voluntad de nuestro mecenas."
 shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\nEl hambre del Devorador no entiende de paciencia. Ansía la guerra y el dulce sabor de la lucha y el lamento."
 shroud_eater_covenant_chain_begin: "$eater_covenant_chain_begin$"
 shroud_eater_covenant_chain_end: "$eater_covenant_chain_end$"
 robot_shroud_eater_covenant_chain_title: "$shroud_eater_covenant_chain_title$"
 robot_shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\nEl hambre del Devorador no entiende de paciencia. Ansía la guerra y el dulce sabor del fuego y la desesperación."
 # Instrument of Desire
 shroud.4550.title: "$utopia.3304.name$"
 shroud.4550.desc.default: "En cuanto nos sumimos en el Velo, una presencia contacta con nosotros. Sus pensamientos se retuercen alrededor de las mentes de nuestros [GetTelepathPlural], regateando y engatusando. Es $the_instrument_of_desire_color_article$ y nos concederá riqueza, poder, prestigio... Todo lo que hayamos deseado. Y todo lo que podamos desear.\n\n¿El precio? Poca cosa, una mera cuota nominal. Solo quiere lo mejor para nosotros. Nos ayudará, nos guiará y dirigirá nuestras ambiciones y sueños.\n\n§HSolo tenemos que aceptarla en nuestros corazones.§!\n\nConfía en que aceptemos. ¿Cómo nos vamos a negar?"
 shroud.4550.desc.hive: "$shroud.4550.desc.default$"
 shroud.4550.desc.gestalt_machine: "En cuanto nos sumimos en el Velo, una presencia contacta con nosotros. Sus pensamientos se retuercen alrededor de los circuitos de nuestros [GetTelepathPlural], regateando y engatusando. Es $the_instrument_of_desire_color_article$ y nos concederá riqueza, poder, prestigio... Todo lo que hayamos deseado. Y todo lo que podamos desear.\n\n¿El precio? Poca cosa, una mera cuota nominal. Solo quiere lo mejor para nosotros. Nos ayudará, nos guiará y dirigirá nuestras ambiciones y sueños.\n\n§HSolo tenemos que aceptarla en nuestras matrices centrales.§!\n\nConfía en que aceptemos. ¿Cómo nos vamos a negar?"
 shroud.4550.desc.individual_machine: "$shroud.4550.desc.gestalt_machine$"
 shroud.4550.a: "Formemos un pacto con $the_instrument_of_desire_color_article$."
 shroud.4555.desc.intro: "Ya está. Hemos forjado un pacto con $the_instrument_of_desire_color_article$. Su voluntad ahora se abre paso por todo el §H[Root.GetName]§!."
 shroud.4555.desc.outro: "Tal es el precio de nuestro enlace. Si nuestra división de [GetTelepathPlural] no erra, las bendiciones más espléndidas del Instrumento aún están por llegar."
 shroud.4555.desc.default: "$shroud.4555.desc.intro$\n\nEl coste acordado no se ha hecho esperar. Mientras esperamos esa edad dorada de riqueza y prosperidad que se nos prometió, el populacho no se conforma ya con ver satisfechas sus necesidades vitales básicas. Multitud de [Root.GetSpeciesNamePlural] ansían ahora toda clase de bienes materiales, lo que supone un nuevo lastre para nuestra economía.\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.hive: "$shroud.4555.desc.intro$\n\nEl coste acordado no se ha hecho esperar. Mientras esperamos la prometida edad dorada de la producción, las necesidades básicas de nuestros drones han aumentado. Multitud de [Root.GetSpeciesNamePlural] exigen ahora diversos bienes no esenciales, lo que supone un nuevo lastre para nuestra economía.\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.gestalt_machine: "$shroud.4555.desc.hive$"
 shroud.4555.desc.individual_machine: "$shroud.4555.desc.default$"
 shroud.4555.a.default: "Esperemos que se cumpla la previsión."
 shroud.4555.a.gestalt: "Confiamos en que no fallará su previsión."
 shroud.4560.desc: "$shroud.4510.desc.intro$$the_instrument_of_desire_color_article$$shroud.4510.desc.outro$"
 shroud.4560.b: "Renunciemos a $the_instrument_of_desire_color_article$."
 shroud_instrument_covenant_chain_title: "$instrument_covenant_chain_title$"
 shroud_instrument_covenant_chain_desc.intro: "Hemos creado un vínculo con una entidad del Velo llamada el §HInstrumento del Deseo§!. En un alarde de afectuosidad, nos concede migajas de su poder por un precio, y seguramente no serán las últimas.\n\nNuestros [GetTelepathPlural] creen que el vínculo se puede reforzar si alineamos nuestras acciones con la voluntad de nuestro mecenas."
 shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\nEl Instrumento vive por y para los anhelos. Los placeres consentidos, la decadencia y la esclavitud claman al firmamento el nombre del Instrumento."
 shroud_instrument_covenant_chain_begin: "$instrument_covenant_chain_begin$"
 shroud_instrument_covenant_chain_end: "$instrument_covenant_chain_end$"
 robot_shroud_instrument_covenant_chain_title: "$shroud_instrument_covenant_chain_title$"
 robot_shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\nEl Instrumento vive por y para los anhelos. El consumo desenfrenado, la explotación y la esclavitud claman al firmamento el nombre del Instrumento."
 # Cradle of Souls
 shroud.4600.title: "$utopia.3304.name$"
 shroud.4600.desc.default: "[GetCradleCovenantProposedDesc]"
 shroud.4600.desc.hive: "$shroud.4600.desc.default$"
 shroud.4600.desc.gestalt_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc.individual_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc_homicidal: "A medida que nos sumergimos en el Velo, una presencia abrasa nuestra visión interior. El resplandor omnipresente oscurece todo lo demás. Es $the_cradle_of_souls_color_article$ y arde en nuestro interior.\n\nExige nada menos que un compromiso a escala galáctica, una paz abyecta entre seres incompatibles. Nos espera un gran poder, promete, si aceptamos esta visión detestable.\n\n§HSi tan solo dejáramos que diera forma a nuevos horizontes.§!\n\nLa luz de la Cuna es implacable y su poder es innegable. ¿Podrán nuestras mentes llegar a aceptar algo así? ¿Debilitará nuestra determinación?"
 shroud.4600.desc_non_homicidal: "Al sumergirse nuestras mentes en el Velo, brota en nuestro ser una presencia. Percibimos un albor que todo lo toca, irradiando orden y equilibro. Se trata de $the_cradle_of_souls_color_article$, cuyo mecer nos arrulla.\n\nNo desea ni más ni menos que la paz perpetua, una galaxia sanada, libre de todo caos. Si compartimos su visión, nos convertirá en adalides de la armonía, y nos promete un vínculo de confianza indisoluble.\n\n§HLa única condición: que le permitamos dar forma a nuestros horizontes.§!\n\nLas esperanzas que la Cuna deposita en nosotros nos pesan."
 shroud.4600.a: "Formemos un pacto con $the_cradle_of_souls_color_article$."
 shroud.4605.intro: "Ya está. Hemos forjado un pacto con $the_cradle_of_souls_color_article$. Su voluntad ahora se abre paso por todo el §H[Root.GetName]§!."
 shroud.4605.desc.default: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc.gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.non_gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.hive: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.gestalt_machine: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.individual_machine: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc_outro_homicidal: "El impacto en la psique [Root.GetSpeciesAdj] ya es innegable. Las mentes de muchos [Root.GetIndividualPlural] están envenenadas por pensamientos de paz galáctica, lo que provoca una profunda disonancia en toda nuestra sociedad.\n\nSegún nuestros [GetTelepathPlural], los beneficios de este trato aún están por llegar. Hasta entonces, un terrible conflicto atormenta nuestras mentes. ¿Qué hemos hecho?"
 shroud.4605.desc_outro_gestalt: "Ya se percibe su influencia en la psique [Root.GetSpeciesAdj]. Si bien nuestro objetivo es mantener relaciones pacíficas en toda la galaxia, cualquier discordia con nuestros vecinos provoca perturbaciones en la consciencia colectiva.\n\nEste leve malestar es el precio que debemos pagar por el vínculo que nos fortalece. Si nuestra división de [GetTelepathPlural] no erra, las bendiciones más espléndidas de la Cuna aún están por llegar."
 shroud.4605.desc_outro_non_gestalt: "Ya se percibe su influencia en la psique [Root.GetSpeciesAdj]. Aunque anhelamos relaciones pacíficas en toda la galaxia, cualquier discordia con nuestros vecinos causa angustia en toda la población.\n\nEste leve malestar es el precio que debemos pagar por el vínculo. Si nuestra división de [GetTelepathPlural] no erra, las bendiciones más espléndidas de la Cuna aún están por llegar."
 shroud.4605.a.default: "[GetCradleCovenantFormedOption]"
 shroud.4605.a.gestalt: "[GetCradleCovenantFormedOption]"
 shroud.4605.opt.a.default: "Esperemos que se cumpla la previsión."
 shroud.4605.opt.a.gestalt: "Confiamos en que no fallará su previsión."
 shroud.4605.opt.a.homicidal: "Por ahora, solo podemos aguantar."
 shroud.4610.desc: "$shroud.4510.desc.intro$$the_cradle_of_souls_color_article$$shroud.4510.desc.outro$"
 shroud.4610.b: "Renunciemos a $the_cradle_of_souls_color_article$."
 shroud_cradle_covenant_chain_title: "$the_cradle_of_souls$"
 shroud_cradle_covenant_chain_desc: "Hemos creado un vínculo con una entidad del Velo llamada $the_cradle_of_souls_color_article$. Nos concede migajas de su poder armonioso a cambio de un precio.\n\nNuestros [GetTelepathPlural] creen que el vínculo se puede reforzar si alineamos nuestras acciones con la voluntad de nuestro mecenas.\n\nLa Cuna ansía una galaxia en la que el caos y el conflicto no tengan lugar, con todos sus habitantes volcados hacia el objetivo unificador de la paz. Un equilibrio perfecto bastará para lograrla."
 shroud_cradle_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"
 shroud_cradle_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"
 robot_shroud_cradle_covenant_chain_title: "$shroud_cradle_covenant_chain_title$"
 robot_shroud_cradle_covenant_chain_desc: "$shroud_cradle_covenant_chain_desc$"
 # Composer of Strands
 shroud.4650.title: "$utopia.3304.name$"
 shroud.4650.desc.default: "En el Velo nos aguarda una presencia que nos da la bienvenida con afable familiaridad. No habla con palabras, sino con visiones, conceptos e ideas. Se filtra en las mentes de nuestra división de [GetTelepathPlural], tan suavemente que se podría pensar que siempre ha estado allí. Ante estos se sucede una serie de imágenes.\n\nA la presencia se la conoce como $the_composer_of_strands_color_article$, y manifiesta un curioso interés por nuestras formas orgánicas. Nos muestra diversos modos en los que pueden crecer y cambiar. Mejorar. Evolucionar.\n\n§HSolo tenemos que aceptarla en nuestra carne.§!\n\nEspera nuestra respuesta con paciencia, afectuosamente. Como un amoroso progenitor espera a su hijo predilecto."
 shroud.4650.desc.hive: "$shroud.4650.desc.default$"
 shroud.4650.desc.gestalt_machine: "En el Velo nos aguarda una presencia que nos da la bienvenida con afable familiaridad. No habla con palabras, sino con visiones, conceptos e ideas. Se filtra en los circuitos de nuestra división de [GetTelepathPlural], tan suavemente que se podría pensar que siempre ha estado allí. Ante estos se sucede una serie de imágenes.\n\nA la presencia se la conoce como $the_composer_of_strands_color_article$, y manifiesta un curioso interés por nuestras formas mecánicas. Nos muestra diversas maneras en las que estas se pueden adaptar y cambiar. Mejorar. Renovar.\n\n§HSolo tenemos que aceptarla en nuestros componentes.§!\n\nEspera nuestra respuesta con paciencia, afectuosamente. Como un amoroso progenitor espera a su hijo predilecto."
 shroud.4650.desc.individual_machine: "$shroud.4650.desc.gestalt_machine$"
 shroud.4650.a: "Formemos un pacto con $the_composer_of_strands_color_article$."
 shroud.4655.desc.intro: "Ya está. Hemos forjado un pacto con $the_composer_of_strands_color_article$. Su voluntad ahora se abre paso por todo el §H[Root.GetName]§!."
 shroud.4655.desc.outro: "Está claro que hemos cedido cierto control sobre la forma de los [Root.GetSpeciesAdj], que ahora nuestro mecenas puede cambiar a voluntad.\n\nEste es un sacrificio ínfimo que bien merece el vínculo del que ahora gozamos. Si nuestra división de [GetTelepathPlural] no erra, las bendiciones más espléndidas del Compositor aún están por llegar."
 shroud.4655.desc.default: "$shroud.4655.desc.intro$\n\nNuestros [GetScientistPlural] ya han detectado patrones anómalos en la estructura genética de las muestras de prueba [Root.GetSpeciesAdj], como si muchas generaciones de cambios evolutivos hubieran ocurrido de la noche a la mañana. $shroud.4655.desc.outro$"
 shroud.4655.desc.hive: "$shroud.4655.desc.default$"
 shroud.4655.desc.individual_machine: "$shroud.4655.desc.intro$\n\nNuestros [GetScientistPlural] ya han detectado patrones anómalos en la estructura molecular de los circuitos de prueba [Root.GetSpeciesAdj], como si muchas generaciones de actualizaciones del sistema hubieran ocurrido de la noche a la mañana. $shroud.4655.desc.outro$"
 shroud.4655.desc.gestalt_machine: "$shroud.4655.desc.individual_machine$"
 shroud.4655.a.default: "$covenant.composer.option$"
 shroud.4655.a.gestalt: "Ese es el precio del poder."
 shroud.4660.desc: "$shroud.4510.desc.intro$$the_composer_of_strands_color_article$$shroud.4510.desc.outro$"
 shroud.4660.b: "Renunciemos a $the_composer_of_strands_color_article$."
 shroud_composer_covenant_chain_title: "$composer_covenant_chain_title$"
 shroud_composer_covenant_chain_desc.intro: "Hemos creado un vínculo con una entidad del Velo llamada $the_composer_of_strands_color_article$. Nos concede migajas de su poder protector a cambio de un precio, y seguramente no serán las últimas.\n\nNuestros [GetTelepathPlural] creen que el vínculo se puede reforzar si alineamos nuestras acciones con la voluntad de nuestro mecenas."
 shroud_composer_covenant_chain_desc: "$shroud_composer_covenant_chain_desc.intro$\n\nEl Compositor ansía manipulaciones genéticas y que la carne sea libre de las ataduras de la evolución. Nos conmina a respetar la vida, la naturaleza y la carne como algo sagrado."
 shroud_composer_covenant_chain_begin: "$composer_covenant_chain_begin$"
 shroud_composer_covenant_chain_end: "$composer_covenant_chain_end$"
 robot_shroud_composer_covenant_chain_title: "$shroud_composer_covenant_chain_title$"
 robot_shroud_composer_covenant_chain_desc: "$shroud_composer_covenant_chain_desc.intro$\n\nEl Compositor anhela manipulaciones de la forma física y un crecimiento libre de las restricciones convencionales. Nos conmina a respetar la vida, la naturaleza y la carne como algo sagrado."
 # Whisperers in the Void
 shroud.4700.title: "$utopia.3304.name$"
 shroud.4700.desc: "$utopia.3304.desc.shroud$"
 shroud.4700.a: "Formemos un pacto con $whisperers_in_the_void_color_article$."
 shroud.4700.b: "$shroud.reject_covenant$"
 shroud_whisperers_in_the_void_covenant_formed_effect: "$t$£unity£ $mod_country_base_unity_produces_add$: §R-15%§!"
 shroud.4705.desc.intro: "Ya está. Hemos forjado un pacto con $whisperers_in_the_void_color_article$. Sus voluntades ahora se abren paso por todo el §H[root.GetName]§!.\n\nNo hemos tardado en percibir la influencia de nuestros nuevos mecenas."
 shroud.4705.desc.outro: "Tal es el precio de un enlace tan poderoso. Si nuestra división de [GetTelepathPlural] no erra, las bendiciones más espléndidas de los Susurradores aún están por llegar. Cabe esperar que el coste de comulgar con una entidad psiónica tan magnífica valga la pena."
 shroud.4705.desc.gestalt: "$shroud.4705.desc.intro$ Mientras nuestro colectivo espera un influjo de conocimiento oculto, sentimos que nuestros pensamientos se fragmentan en patrones divergentes. La harmonía uniforme de nuestra urdimbre o [GetNetworkName] se ve opacada por una creciente discordia de voces internas.\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.non_gestalt: "$shroud.4705.desc.intro$ A medida que aumenta nuestra sed de conocimiento, las ideas y opiniones de nuestra sociedad se han vuelto más divergentes. Una fanfarria disonante de voces interiores desgasta nuestra psique, amenazando el bienestar mental de todo el conjunto de [root.GetSpeciesNamePlural].\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.default: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.desc.hive: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.gestalt_machine: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.individual_machine: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.a.default: "Podemos soportarlo."
 shroud.4705.a.gestalt: "$shroud.4705.a.default$"
 shroud.4710.title: "$utopia.2658.name$"
 shroud.4710.desc: "$shroud.4510.desc.intro$$whisperers_in_the_void_color_article$$shroud.4510.desc.outro$"
 shroud.4710.a: "$utopia.2658.a$"
 shroud.4710.b: "Renunciemos a $whisperers_in_the_void_color_article$."
 shroud_whisperers_in_the_void_covenant_accepted_effect: "$t$Investigación mensual de £research£ por $pop_group_unit$ $telepath_type_plural_with_icon$: $@telepath_whisperers_research|0=+$"
 # End of the Cycle
 shroud.4715.desc.intro: "Ya está. Hemos forjado un pacto con $end_of_the_cycle_color_article$. Al aceptar su oferta, el colectivo de [GetTelepathPlural] vuelve a entonar: §R\"EL FIN VA A COMENZAR\".§!"
 shroud.4715.desc.default: "$shroud.4715.desc.intro$\n\nDespués, se hace el silencio. Un silencio insondable que colma todas las mentes [root.GetSpeciesAdj]. Donde una vez las multitudinarias energías del §HVelo§! se agitaban dentro de cada una de nuestras consciencias, el reino psiónico ahora está silencioso como la muerte.\n\nNo podemos sino contemplar las consecuencias de lo que nosotros mismos nos hemos provocado."
 shroud.4715.desc.hive: "$shroud.4715.desc.intro$\n\nDespués, se hace el silencio. Un silencio insondable que colma todas las mentes [root.GetSpeciesAdj]. Donde una vez las multitudinarias energías del §HVelo§! se agitaban dentro de cada [GetBrainName], ahora el plano psiónico ha quedado inerte.\n\nNo podemos sino estimar las consecuencias de lo que nosotros mismos nos hemos provocado."
 shroud.4715.desc.gestalt_machine: "$shroud.4715.desc.default$"
 shroud.4715.desc.individual_machine: "$shroud.4715.desc.default$"
 shroud.4715.a.default: "Misericorde sea su respuesta."
 shroud.4715.a.gestalt: "$shroud.4715.a.default$"
 shroud_whisperers_covenant_chain_title: "$whisperers_covenant_chain_title$"
 shroud_whisperers_covenant_chain_desc: "Hemos creado un vínculo con una entidad del Velo llamada $whisperers_in_the_void_color_article$, que nos promete migajas de su insondable poder a cambio de un precio.\n\nNuestros [GetTelepathPlural] creen que el vínculo se puede reforzar si alineamos nuestras acciones con la voluntad de nuestro mecenas.\n\nLos Susurradores aprecian los conocimientos nuevos, los secretos y las conspiraciones. Se deleitan con la dicha de una mente tan rebosante que se agrieta."
 shroud_whisperers_covenant_chain_begin: "$whisperers_covenant_chain_begin$"
 shroud_whisperers_covenant_chain_end: "$whisperers_covenant_chain_end$"
 robot_shroud_whisperers_covenant_chain_title: "$shroud_whisperers_covenant_chain_title$"
 robot_shroud_whisperers_covenant_chain_desc: "$shroud_whisperers_covenant_chain_desc$"
 shroud.11110.title: "El ciclo continúa"
 shroud.11110.desc: "Convulsos y lacerantes, los §HSusurradores§! eclipsan con sus voces todo resquicio de pensamiento. Están deseosos de comulgar con nosotros, de colmar de conocimientos nuestras mentes.\n\nDebemos tomar una decisión irrevocable."
 shroud.11110.a: "Absorberemos a $the_eater_of_worlds_article$."
 shroud.11110.b: "Absorberemos a $the_cradle_of_souls_article$."
 shroud.11110.c: "Absorberemos a $the_instrument_of_desire_article$."
 shroud.11110.d: "Absorberemos a $the_composer_of_strands_article$."
 shroud.11120.title: "[GetBetrayedPatronColour]: la venganza"
 shroud.11120.title.eater: "La venganza de $the_eater_of_worlds_color_article$"
 shroud.11120.title.cradle: "La venganza de $the_cradle_of_souls_color_article$"
 shroud.11120.title.instrument: "La venganza de $the_instrument_of_desire_color_article$"
 shroud.11120.title.composer: "La venganza de $the_composer_of_strands_color_article$"
 shroud.11120.desc: "Cuando nuestros [GetTelepathPlural] emergieron del §HVelo§!, descubrimos que nuestra traición había provocado una poderosa reacción por parte de [GetBetrayedPatronColour].\n\nSe ha abierto un $SHROUD_TUNNEL_GALACTIC$ cerca de §H[event_target:selected_planet_for_revenge.GetName]§!, convertido ahora en un mundo de infinitas ruinas. Hemos [GetFeltLoc] una furia palpable más allá del túnel; sin duda, nuestro antiguo mecenas está preparando su venganza."
 shroud.11120.a: "Debemos prepararnos para defendernos."
 shroud.11120.a.tt: "§H[event_target:selected_planet_for_revenge.GetName]§! se convierte en §Y$pc_shrouded$§!.\nCerca de este planeta aparece un $SHROUD_TUNNEL_GALACTIC$."
 shroud_tunnel_object: "$SHROUD_TUNNEL_GALACTIC$"
 shroud.11130.title: "Venganza furibunda"
 shroud.11130.desc_common: "Del $SHROUD_TUNNEL_GALACTIC$ presente en el sistema [event_target:spawn_system.GetName] ha emergido un §Y$NAME_Psionic_Avatar$§!, manifestación de la furia de [GetBetrayedPatronColour], que se dirige a [capital_scope.GetName]."
 shroud.11130.desc_success: "Logramos hacer acopio de fuerzas suficientes para enfrentarnos a la amenaza que se cernía sobre nuestra civilización. Nuestras naves emitieron ondas de energía psiónica hacia el $SHROUD_TUNNEL_GALACTIC$, debilitando a la entidad hostil mientras irrumpía en nuestra realidad."
 shroud.11130.success_tt: "$NAME_Psionic_Avatar$ emerge con su fuerza reducida a la mitad."
 shroud.11250.title: "El Final"
 shroud.11250.desc: "A medida que entramos en trance, nuestras mentes son golpeadas por el silencio. Jamás hemos percibido semejante quietud en el Velo.\n\nEl vacío está privo de voz.\n\nYa no queda nada."
 shroud.11250.a: "Este debe de ser el fin."
 shroud.11255.title: "Renacer de los [owner.GetName]"
 shroud.11255.desc: "Hemos realizado grandes esfuerzos para recuperarnos de la destrucción causada por $end_of_the_cycle_color_article$. Con este fin, hemos reconstruido un §H$starbase_outpost$§! en el sistema §H[solar_system.Star.GetStarName]§!, lo que marca un nuevo comienzo para los [owner.GetName]."
 ACCEPT_COVENANT: "Formemos un pacto con $PATRON$.\n§CEfectos:§!\n$EFFECTS$"
 REFUSE_COVENANT: "Rechacemos el pacto con $PATRON$."
 CONFIRM_COVENANT: "Confirmemos el pacto con $PATRON$."
 RENOUNCE_COVENANT: "Renunciemos al pacto con $PATRON$."
 CREATE_RELATION: "Crea una relación con $PATRON$."
 CRADLE_MARK: "Marca de la Cuna"
 CRADLE_MARK_DESC: "$COMPOSER_MARK_DESC$"
 tech_covenant_cradle: "$CRADLE_MARK$"
 tech_covenant_cradle_desc: "$tech_covenant_composer_desc$"
 leader_trait_cradle_chosen: "Elegido de la Cuna"
 leader_trait_cradle_chosen_desc: "$leader_trait_whisperers_chosen_desc$"
 leader_trait_shroudshaper: "Moldeador del Velo"
 leader_trait_shroudshaper_desc: "Este líder es un ser eterno con un increíble poder psiónico, el cual nos ayuda a moldear el Velo a nuestra voluntad."
 COVENANT_EFFECTS: "§EEfectos del pacto:§!"
 COVENANT_EATER: "§HPacto del Devorador§!"
 covenant_eater_desc: "Nuestro pacto con $the_eater_of_worlds_article$ nos llena de un apetito insaciable de conquista y destrucción."
 COVENANT_CRADLE: "§HPacto de la Cuna§!"
 covenant_cradle_desc: "Nuestro pacto con $the_cradle_of_souls_article$ se irradia a través de la galaxia, induciendo a otros a tratarnos con benevolencia."
 covenant_cradle_tt: "[GetCradleCovenantTooltip]"
 covenant_cradle_bonus_tt: "$covenant_cradle_telepath_tt$\n$covenant_cradle_no_bonus_tt$"
 covenant_cradle_no_bonus_tt: "Mantenimiento del trabajo cuando la opinión de otro imperio que esté dentro de nuestra §H$PSIONIC_AURA$§! sea neutral o peor: §R+[GetCradleCovenantUpkeepMult]%§!"
 COVENANT_INSTRUMENT: "§HPacto del Instrumento§!"
 covenant_instrument_desc: "Nuestro pacto con $the_instrument_of_desire_article$ impregna nuestras mentes con visiones de indulgencia, atrayéndonos cada vez más hacia un paraíso mental."
 COVENANT_COMPOSER: "§HPacto del Compositor§!"
 covenant_composer_desc: "Nuestro pacto con $the_composer_of_strands_article$ medra en nuestro interior, y nuestras raíces transformadoras se extienden por toda la galaxia."
 COVENANT_WITV: "§HPacto de los Susurradores§!"
 covenant_whisperers_desc: "Nuestro pacto con $whisperers_in_the_void_article$ nos inculca una plétora de saber derivada de todos los secretos que estos han adquirido de los dominios más centrales del Velo."
 COVENANT_EOTC: "§HPacto con $NAME_The_End$§!"
