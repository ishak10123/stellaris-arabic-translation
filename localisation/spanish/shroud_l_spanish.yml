 shroud.4950.title: "Aura malévola"
 shroud.4950.desc.1: "Nuestros datos indican que esta aura tiene efectos extremadamente perjudiciales. A falta de unas contramedidas, se prevé que se extienda rápidamente por toda la galaxia."
 shroud.4950.desc.2: "Hemos detectado una poderosa $PSIONIC_AURA$ en el sistema §H[from.GetName]§!"
 shroud.4950.desc.3.intro: "$shroud.4950.desc.2$. De acuerdo con nuestros [GetTelepathPlural], la emisión del §HVelo§! se debe a las actividades psiónicas de"
 shroud.4950.desc.3.default: "$shroud.4950.desc.3.intro$ una civilización alienígena."
 shroud.4950.desc.3.contact: "$shroud.4950.desc.3.intro$ §H[fromfrom.GetName]§!."
 shroud.4950.desc.4: "$shroud.4190.desc.intro$ Una presunta §H\"$PSIONIC_AURA$\"§! (al menos por su origen teórico) se ha detectado en el sistema §H[from.GetName]§!."
 shroud.4950.desc.5.intro: "$shroud.4950.desc.2$, cuyo origen se remonta a las fronteras de"
 shroud.4950.desc.5.default: "$shroud.4950.desc.5.intro$ una civilización alienígena."
 shroud.4950.desc.5.contact: "$shroud.4950.desc.5.intro$ §H[fromfrom.GetName]§!."
 shroud.4950.a: "$grand_archive.1100.a$"
 shroud.4955.title: "Una sensación de peligro"
 shroud.4955.desc.1: "La percepción de una calamidad inminente agita a nuestra población."
 shroud.4955.desc.1.gestalt: "$shroud.4955.desc.1$ Nuestros [GetTelepathPlural] han detectado una perturbación simultánea en las energías del §HVelo§!."
 shroud.4955.desc.1.non_gestalt: "$shroud.4955.desc.1$ De acuerdo con nuestros [GetTelepathPlural], hasta el §HVelo§! se inquieta, como si sus fuerzas temblasen con una aprensión silenciosa."
 shroud.4955.desc.2.intro: "En estos últimos años, las situaciones de emergencia han ido a más en toda la galaxia."
 shroud.4955.desc.2.outro: "Después de detectar un fenómeno de lo más extraño, nuestros [GetResearchers] predicen unos episodios peores en el futuro cercano."
 shroud.4955.desc.2.contact_aura: "$shroud.4955.desc.2.intro$ Hemos presenciado un crecimiento inexplicable de §H[from.GetName]§!. Hemos observado la intrusión de una §H$PSIONIC_AURA$§! adversa. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.contact_no_aura: "$shroud.4955.desc.2.intro$ Hemos presenciado un crecimiento inexplicable de §H[from.GetName]§!. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_aura: "$shroud.4955.desc.2.intro$ Hemos observado la intrusión de una §H$PSIONIC_AURA$§! adversa. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_no_aura: "$shroud.4955.desc.2.intro$ $shroud.4955.desc.2.outro$"
 shroud.4955.desc.3: "No sabemos qué es lo que se aproxima; solo tenemos la certeza de que llegará."
 shroud.4955.a: "Debemos prepararnos para lo peor."
 shroud.4955.a.tt: "Si el §H$end_aura$§! cubre la galaxia, será el fin de la partida."
 shroud.4960.title: "Amenaza psiónica"
 shroud.4960.desc.1.intro: "El §H$PSIONIC_AURA$§! malévola emitida por"
 shroud.4960.desc.1.outro: "se ha expandido por toda la galaxia a un ritmo alarmante. A tenor de las observaciones de nuestros [GetResearchers], ha provocado efectos adversos en numerosos sistemas estelares."
 shroud.4960.desc.1.contact: "$shroud.4960.desc.1.intro$ §H[from.GetName]§! $shroud.4960.desc.1.outro$"
 shroud.4960.desc.1.no_contact: "$shroud.4960.desc.1.intro$ una civilización alienígena no contactada $shroud.4960.desc.1.outro$"
 shroud.4960.desc.2: "Nuestros últimos datos indican que ya ha invadido la mitad de la galaxia conectada por hipervías. La fuerza detrás de esto parece decidida a causar destrucción a escala galáctica; de no contrarrestarla, podría cumplir su objetivo."
 shroud.4960.a: "Hay que detenerla."
 shroud.4960.a.tt: "Puede declarar la ['concept_total_war'] en §H[from.GetName]§!.\n$shroud.4955.a.tt$"
 shroud.4965.title: "Condena inminente"
 shroud.4965.desc.1.intro: "La devastadora §H$PSIONIC_AURA$§! emitida por"
 shroud.4965.desc.1.outro: "ha continuado su expansión por toda la galaxia. Actualmente ocupa la mayoría de los sistemas estelares de nuestra galaxia."
 shroud.4965.desc.1.contact: "$shroud.4960.desc.1.intro$ §H[from.GetName]§! $shroud.4960.desc.1.outro$"
 shroud.4965.desc.1.no_contact: "$shroud.4960.desc.1.intro$ una civilización alienígena no contactada $shroud.4960.desc.1.outro$"
 shroud.4965.desc.2: "Sin contramedidas rápidas y potentes, nos enfrentamos a una catástrofe galáctica."
 shroud.4965.a: "Este es el último bastión."
