 cyber_anti_faith: "Acero puro y duro"
 cyber_anti_faith_desc: "Hemos dejado de lado las especulaciones de fe para impulsar sin demora nuestra iniciativa de ciberización."
 cyber_rulers_force_tests: "Sujetos de prueba de élite a la fuerza"
