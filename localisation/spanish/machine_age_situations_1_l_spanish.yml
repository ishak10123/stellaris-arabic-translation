 #IMPERIAL
 cyber.1520.name: "Larga vida al imperio"
 cyber.1520.desc.individualist: "La sede imperial ha decretado que nuestros esfuerzos se centren en la propia dinastía. Se implantará un §Y$r_the_rulerchip$§! especial en todos los futuros gobernantes para registrar y transferir sus experiencias como [root.GetRulerTitle] de los §Y[root.GetName]§!. Este chip reliquia se transferirá al sucesor cuando fallezca el gobernante.\n\nA medida que el $r_the_rulerchip$ se transmita de generación en generación, su vasta biblioteca de experiencias se convertirá en el registro fundamental de nuestra sociedad. También podemos aprovechar los aprendizajes de nuestra población en beneficio de nuestros líderes."
 cyber.1520.desc.collectivist: "Para ofrecer a los ciudadanos de nuestro imperio un respiro de sus fatigas, debe construirse una gran §Y$building_cyberdome$§! en §Y[root.Capital.GetName]§!. Servirá de glorioso escenario para nuevos tipos de ciberdeportes, en los que atletas aumentados competirán por nuestro favor y admiración. Presenciar una competición tan feroz sin duda estimulará a las masas y su admiración por los §Y[root.GetName]§!.\n\nAdemás, estos espectáculos pueden neurotransmitirse directamente a los cibercerebros de todo el imperio. Esto invitará a las multitudes eufóricas a viajar a [root.Capital.GetName] y experimentar de primera mano la emoción primitiva de la acción."
 cyber.1520.desc.neutral: "Nuestro avance social en el campo de la cibernética se encuentra en una encrucijada. Podemos concentrar nuestros esfuerzos en beneficio de unos pocos o de muchos. Ambos servirían en última instancia a §Y[root.GetName]§!.\n\nDesarrollar un implante especializado nos permitiría transferir las experiencias del/de la [root.GetRulerTitle] a sus herederos. El énfasis en los ciberdeportes aumentados y las tecnologías de radiodifusión nos permitiría organizar magníficos eventos en nuestra capital, [root.Capital.GetName]."
 cyber.1520.a: "Conservad el conocimiento imperial."
 cyber.1520.a.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_individualist']\n$create_relic_the_rulerchip$\n$unlock_edict_levied_experience$"
 cyber.1520.b: "Celebrad y retransmitid ciberdeportes en la capital."
 cyber.1520.b.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_collectivist']\n$unlock_building_cyberdome$\n$unlock_edict_neurocasted_spectacles$"
 cyber.1520.c: "$cyber_keep_auth_option$"
 cyber.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 cyber.1525.name: "Implantes S. A."
 cyber.1525.desc.individualist: "Los grupos de estudio §Y[Species.GetAdj]§! responden positivamente a sus nuevos implantes oculares. Nuestro departamento de análisis sugiere un notable aumento de la eficacia publicitaria y un prometedor repunte de las ventas en todo nuestro catálogo. Esto demuestra el inmenso potencial del futuro lanzamiento del producto completo.\n\nLa era de la cibernética ha llegado, y estamos plenamente preparados para aprovecharla con una estrategia corporativa renovada."
 cyber.1525.desc.collectivist: "Nuestro compromiso con la superación personal holística está calando en la población general.\n\nLa atención a las preocupaciones socioeconómicas se alinea con nuestra visión corporativa, garantizando la introducción constante de nuevas generaciones de implantes de obligada adquisición."
 cyber.1525.desc.neutral: "Dados los enormes cambios que la tecnología cibernética ha introducido en la sociedad, quizá no deba sorprendernos que el consumidor medio esté indeciso sobre qué dirección tomar. ¿Debemos centrarnos en el bienestar colectivo o en la diferenciación individual?\n\nEsta decisión crucial y sin precedentes tendrá sin duda consecuencias de gran alcance, pero la indecisión equivale a la muerte de las ganancias; hay que elegir."
 cyber.1525.a: "Lanzad implantes con anuncios."
 cyber.1525.a.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_individualist']\n$unlock_edict_customer_insights$"
 cyber.1525.b: "Promulgad mejoras en los implantes."
 cyber.1525.b.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_collectivist']\n$unlock_edict_rolling_updates$\n$unlock_agenda_augmentation_product_launch$"
 cyber.1525.c: "$cyber_keep_auth_option$"
 cyber.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"
 ### SOCIETAL EFFECTS EVENT CHAIN END ###
 ### CYBERIZATION SITUATION START - HIVE VARIANT ###
 situation_cyberization_hive: "Ciberización"
 situation_cyberization_hive_type: "Situación de ascenso"
 situation_cyberization_hive_desc: "Una mente colmena necesita cuerpos superiores. Con implantes cibernéticos, nuestros drones pueden ser perfeccionados, mejorados y remodelados.\nEs hora de trascender los límites de nuestra biología.\n\n§YPoblaciones que recibirán implantes el mes que viene§!: §G[From.GetCyberPopsPerMonth]§!"
 situation_cyberization_hive_monthly_change_tooltip: "Nuestros cuerpos se volverán cibernéticos, una fusión perfecta entre lo orgánico y la máquina."
 situation_cyberization_hive_outcome: "Una población cibernética."
 stage_cyberization_hive_effects: "Debemos diseñar implantes cibernéticos, instalarlos y transformarnos."
 cyber.hive_government_shift.tt: "Influye en el actual §Ycambio de la consciencia cibernética§!."
 situation_cyberization_culled_drones_desc: "Drones defectuosos eliminados"
 situation_cyberization_researching_alternatives_desc: "Investigando implantes alternativos"
 situation_cyberization_hive_triggered_modifier: "Modificador de la situación §Y$situation_cyberization_hive$§! añadido:\n"
 triggered_opinion_hive_integrated: "Colmena integrada"
 cyber_hive_imperfect_drones: "Drones imperfectos"
 cyber_hive_imperfect_drones_desc: "Todo el mundo es útil."
 cyber_hive_recycling_implants: "Reciclaje de implantes"
 cyber_hive_recycling_implants_desc: "Implantes antiguos para drones nuevos."
 cyber_hive_recycling_everything: "Eficacia sombría"
 cyber_hive_recycling_everything_desc: "Nada es sagrado. Nada se desperdicia."
 cyber_hive_cyber_babies: "Juventud cibernética"
 cyber_hive_cyber_babies_desc: "Los nuevos drones se equipan con implantes durante su generación."
 cyber_hive_no_cyber_babies: "Ciberización gradual"
 cyber_hive_no_cyber_babies_desc: "Los implantes se instalan gradualmente, reduciendo el daño producido a los drones poco desarrollados."
 cyber_hive_no_individual_drones: "Prohibición de individualidad"
 cyber_hive_no_individual_drones_desc: "Toda identificación personal está estrictamente prohibida."
 cyber_hive_individual_drones: "Autoexpresión"
 cyber_hive_individual_drones_desc: "Los drones pueden expresar su individualidad."
 cyber_hive_individual_leader_drones: "Autoexpresión restringida"
 cyber_hive_individual_leader_drones_desc: "Para nuestros mejores drones, el regalo más inusual: el sentido de identidad."
 ### AUTHORITIES ###
 #VOLITIONAL
 auth_cyber_hive_volitional: "Colmena volitiva"
 auth_cyber_hive_volitional_desc: "Cada dron es un individuo. Cada pensamiento, una nueva perspectiva que el colectivo debe considerar. Un sinfín de mentes forman una colmena mucho mayor que la suma de sus partes."
 concept_auth_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
 gov_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
 gov_cyber_hive_volitional_desc: "$auth_cyber_hive_volitional_desc$"
 #INTEGRATED
 auth_cyber_hive_integrated: "Colmena integrada"
 auth_cyber_hive_integrated_desc: "Se ha corregido toda discrepancia, se ha sofocado toda anomalía, se ha rectificado todo disenso. El control de la mente colmena es absoluto: una consciencia común, y un sinfín de cuerpos que ejecuten su voluntad."
 concept_auth_cyber_hive_integrated: "$auth_cyber_hive_integrated$"
 gov_cyber_hive_integrated: "$auth_cyber_hive_integrated$"
 gov_cyber_hive_integrated_desc: "$auth_cyber_hive_integrated_desc$"
 ### EDICTS ###
 edict_hive_mind_outreach: "Extensión de la mente colmena"
 edict_hive_mind_outreach_desc: "La voluntad de una mente férrea es más veloz que la misma luz."
 concept_edict_hive_mind_outreach: "$edict_hive_mind_outreach$"
 edict_hive_hyper_stimulants: "Hiperestimulantes"
 edict_hive_hyper_stimulants_desc: "Los implantes cibernéticos administran a nuestros drones sustancias analépticas que mejoran su rendimiento."
 concept_edict_hive_hyper_stimulants: "$edict_hive_hyper_stimulants$"
 edict_hive_mega_construction: "Megaconstrucción integrada"
 edict_hive_mega_construction_desc: "Este edicto destina más recursos a nuestro programa de megaingeniería, agilizando así la construcción de estructuras galácticas."
 concept_edict_hive_mega_construction: "$edict_hive_mega_construction$"
 #CYBERIZATION STAGE 1
 cyber.2100.name: "Muchos cuerpos. Un propósito."
 cyber.2100.desc: "Al reflexionar sobre la naturaleza de los aumentos, nos preguntamos cuáles son nuestras aspiraciones.\n\nLa ciberización es un medio para un fin: una forma de optimizar nuestros cuerpos para ejecutar mejor nuestra voluntad. Hay infinitas formas posibles de aumento, cada una de las cuales aporta nuevos puntos fuertes, pero también necesidades. Los miembros mecánicos son pesados, los cibercerebros requieren más energía y los componentes delicados requieren un mantenimiento constante. En el camino hacia la perfección, hay que elegir.\n\n¿Cuál es el objetivo de nuestra ambición, la única meta que requiere trascender los límites del cuerpo de [Owner.Species.GetFleshTypeCyberCreed] para desplegar [owner.GetSpeciesHandName]s de metal por el cielo?"
 cyber.2100.a: "Entendimiento."
 cyber.2100.a.tt: "Centrad la investigación en hacer nuestros drones más inteligentes."
 cyber.2100.b: "Dominación."
 cyber.2100.b.tt: "Centrad la investigación en convertir nuestros drones en herramientas de guerra."
 cyber.2100.c: "Abundancia."
 cyber.2100.c.tt: "Centrad la investigación en hacer nuestros drones más productivos."
 #CYBERIZATION STAGE 2
 cyber.2200.name: "Una meta: los aumentos"
 cyber.2200.desc: "A medida que las ociosas reflexiones se convierten en planes concretos, surge una necesidad acuciante: un espacio dedicado a la experimentación, donde probar y construir prototipos cibernéticos.\n\nLevantaremos un $building_augmentation_center$ para poder desgarrar nuestro ser de [Owner.Species.GetFleshTypeCyberCreed] y volver a unirlo con metal y sueños."
 cyber.2200.a: "Es hora de empezar a construir nuestro futuro."
 cyber.2200.a.tt: "§RAcción necesaria:§!\nConstruir un $building_augmentation_center$ para que la situación §Y$situation_cyberization_hive$§! prosiga.\n\nCada $building_augmentation_center$ otorga §G+200§! trabajos de $job_augmentor_drone_with_icon$.\n\n$job_augmentor_drone_research_effect_desc$"
 cyber.2205.name: "Muchos prototipos. Una elección."
 cyber.2205.desc: "Nuestra investigación cibernética ha dado lugar a varios prototipos de cíborgs prometedores. Los resultados preliminares muestran que algunos prototipos destacan en hazañas físicas, mientras que otros son más adecuados para trabajos de precisión. Cada uno tiene sus puntos fuertes y sus limitaciones, pero ninguno muestra una superioridad clara.\n\nSe nos ocurre una propuesta sobrecogedora: ¿Podríamos, tal vez, diversificar nuestros drones? ¿Modificar nuestros cuerpos de diferentes maneras según su función? Ya no seríamos todos idénticos, una perspectiva que nos cuesta entender, pero la ganancia en eficiencia podría hacer que mereciera la pena sacrificar nuestra armonía."
 cyber.2205.a: "Elegid varios prototipos variados."
 cyber.2205.b: "Elegid un prototipo único y equilibrado."
 cyber.2220.name: "¿Uno de nosotros?"
 cyber.2220.desc: "A veces, el montaje de drones da lugar a cuerpos defectuosos. Los drones deformes suelen ser desechados, pero gracias a los implantes cibernéticos se podrían unir a nuestras filas. Aumentar nuestro número es conveniente, pero los drones defectuosos requieren implantes personalizados en función de la gravedad de sus problemas. Nuestra colmena crecería más rápido, pero también se volvería más... imperfecta."
 cyber.2220.a: "Superioridad numérica, lo llaman."
 cyber.2220.b: "Una colmena imperfecta es una colmena débil."
 cyber.2260.name: "Un problema invisible"
 cyber.2260.desc: "Un porcentaje reducido de nuestros sujetos de prueba están sufriendo reacciones adversas a los aumentos. El rechazo de los implantes les provoca efectos secundarios de riesgo letal. Al parecer, la causa radica en un defecto genético que había pasado desapercibido hasta la fecha. Según nuestros cálculos preliminares, cerca del 5% de nuestra población de drones se ve afectada.\n\nAhora que hemos identificado el problema, podemos analizar nuestros drones a fin de evitarlo, pero está aún por decidir qué hacer con la población afectada."
 cyber.2260.a: "Sacrificaremos a los drones defectuosos."
 cyber.2260.a.tt: "Velocidad de avance de la situación §Y$situation_cyberization_hive$§! durante §Y1§! año: §G+20%§!"
 cyber.2260.b: "Se dotará a los drones defectuosos de implantes limitados."
 cyber.2260.b.tt: "Durante la ciberización, el 5% de la población adquiere el rasgo §Y$trait_limited_cybernetic$§! en lugar del rasgo §Y$trait_cybernetic$§!."
 cyber.2260.c: "Investiguemos implantes alternativos."
 cyber.2260.c.tt: "Velocidad de avance de la situación §Y$situation_cyberization_hive$§! durante §Y5§! años: §R-50%§!"
 #CYBERIZATION STAGE 3
 cyber.2300.name: "Muchos drones, un plan."
 cyber.2300.desc: "Nuestros prototipos de cíborgs ya están aprobados, y ha concluido la construcción del §Y$building_augmentation_center$§!. Nuestro plan está listo, pero aún hay que ultimar la logística de nuestra transformación.\n\nPodríamos ordenar a todos nuestros drones que interrumpan su rutina y se dirijan a un $building_augmentation_center$ para someterse al procedimiento. El proceso sería rápido, pero nuestras fábricas quedarían desiertas hasta que finalice. La alternativa: tener en cuenta las jornadas de nuestros drones y ciberizarlos durante sus descansos obligatorios para no afectar a su actividad laboral. Aunque más lento, este plan es menos disruptivo."
 cyber.2300.shared.tt: "$job_augmentor_drone_assembly_effect_desc$\n\nLa velocidad de aumento depende del enfoque de situación y el número de $building_augmentation_center$ que se hayan construido."
 cyber.2300.a: "La prioridad es la ciberización."
 cyber.2300.a.tt: "Poblaciones ciberizadas cada mes: §G+200§!\n$situation_cyberization_hive_triggered_modifier$Recursos mensuales: §R-5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2300.b: "No interrumpáis nuestro orden."
 cyber.2300.b.tt: "Poblaciones ciberizadas cada mes: §R-100§!\n$situation_cyberization_hive_triggered_modifier$$unity$es mensuales: §G+5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2320.name: "Multiplicidad temida"
 cyber.2320.desc: "Los imperios integrados por entidades singulares nos contemplan con recelo, temerosos de nuestra pluralidad. Mediante implantes cibernéticos, podemos dotar a nuestros enviados de rostros y personalidades diferentes, simulando así cierta homogeneidad.\n\nLos inconexos agradecerían ese esfuerzo por nuestra parte. Puede que incluso empezaran a... empatizar con nosotros. A considerarnos sus semejantes."
 cyber.2320.a: "Detestable."
 cyber.2320.b: "El sacrificio vale la pena."
 cyber.2320.b.tt: "Mejora la opinión que tienen de nosotros los imperios no gestálticos."
 cyber.2320.c: "Que rabien: nuestros enviados serán aún más idénticos si cabe."
 cyber.2320.c.tt: "Empeora la opinión que tienen de nosotros los imperios no gestálticos."
 cyber.2360.name: "Cisma poblacional"
 cyber.2360.desc: "La ciberización de nuestra colmena procede sin fisuras. Una parte de nuestra población lleva implantes cibernéticos, mientras que otros siguen siendo completamente biológicos. Es la primera vez en nuestra historia que se dan diferencias tan evidentes entre nuestra población. Los drones ya se pueden identificar con un grupo u otro, división que exacerba su individualismo.\n\nAlgunos drones se han empezado a engalanar con nimios accesorios, o pintan sus implantes con símbolos que los diferencian. Es una tendencia curiosa, aunque algo preocupante."
 cyber.2360.a: "Fomentemos esta dinámica."
 cyber.2360.b: "Quedan prohibidos los elementos de identificación personal."
 cyber.2360.c: "Solo los líderes podrán llevar símbolos individuales."
 #CYBERIZATION STAGE 4
 cyber.2400.name: "Muchos pensamientos, un cerebro."
 cyber.2400.desc: "Instalar implantes a nuestros drones ha derivado en una consecuencia insospechada: puesto que ahora sus cerebros son en parte cibernéticos, son capaces de formular pensamientos con independencia de nuestra consciencia global.\n\nPodemos seguir desarrollando esta tecnología a fin de mejorar el pensamiento autónomo de nuestros drones."
 cyber.2400.a: "Que los drones piensen por sí mismos."
 cyber.2400.b: "El individualismo amenaza a nuestra unidad."
 cyber.2420.name: "Para todos el mismo fin"
 cyber.2420.desc: "Los implantes cibernéticos están complicando la logística mortuoria.\n\nEn caso de despojar a los drones fallecidos de sus implantes, podríamos reutilizar esa tecnología y minimizar su desperdicio. Habría que revisar todo nuestro proceso de eliminación de residuos para adaptarlo a esta nueva fase, con un coste elevado en recursos."
 cyber.2420.a: "Pongamos en práctica el reciclaje de implantes."
 cyber.2420.b: "No vale la pena el gasto."
 cyber.2420.c: "Que se reciclen los implantes... y los cuerpos."
 cyber.2460.name: "Implantes vitalicios"
 cyber.2460.desc: "La ciberización de nuestra población avanza sin percances, pero urge ya la necesidad de delinear un proceso para quienes aún no han nacido.\n\nLa tecnología nos faculta para dotar de implantes cibernéticos a nuestros [owner.Species.GetSpawnNamePlural] antes siquiera de que nazcan, creando así una especie cibernética desde la concepción misma: una solución rápida, fácil y eficaz. Por otro lado, los estudios preliminares muestran que la instalación de implantes a una edad temprana podría causar disociación, psicosis, temblores y diversos trastornos del desarrollo."
 cyber.2460.a: "No hay [Owner.Species.GetFleshTypeCyberCreed] más fuerte que el metal."
 cyber.2460.b: "La ciberización no se podrá aplicar antes de cierta edad."
 #CYBERIZATION FINISHED
 cyber.2004.name: "Muchos drones, ¿un pensamiento?"
 cyber.2004.desc: "La transformación ha concluido. Los nuevos implantes cibernéticos ya se han probado, prototipado, mejorado, optimizado e instalado, convirtiendo nuestros cuerpos en su versión perfeccionada."
 cyber.2004.desc.volitional: "$cyber.2004.desc$\n\nAhora, nuestros drones poseen una capacidad aumentada de formular pensamientos individuales. Esa libertad abre las puertas a posibilidades inexploradas."
 cyber.2004.desc.integrated: "$cyber.2004.desc$\n\nNuestros drones están hoy más unidos que nunca. Cadenas metálicas fortalecen el vínculo mental que los une."
 cyber.2004.desc.neutral: "$cyber.2004.desc$\n\nDurante el proceso, se han presentado oportunidades de cambiar. Nuestra unión hace la fuerza, pero disponer de más drones autónomos también tiene sus ventajas."
 cyber.2004.end: "Conforme evolucionaban nuestros cuerpos, la mente colmena ha podido transformarse."
 cyber.2004.a: "Convirtámonos en una colmena volitiva."
 cyber.2004.a.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_volitional']\n$unlock_edict_tt$['concept_edict_hive_mind_outreach']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.b: "Convirtámonos en una colmena integrada."
 cyber.2004.b.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_integrated']\n$unlock_edict_tt$['concept_edict_hive_hyper_stimulants']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.c: "No hay por qué cambiar."
 cyber.2004.c.tt: "$cyber.21.a.end$\n$keep_auth_tt$ ['concept_auth_hive_mind']"
 ### Driven Assimilator Cyberization ###
 cyber.2010.name: "Declaración de intenciones"
 cyber.2010.desc: "Con la llegada de la cibernética avanzada, podemos alcanzar nuestro máximo potencial. Hasta ahora, sólo hemos tanteado las posibilidades.\n\nA medida que nuestra experiencia aumente y la tecnología mejore, la sociedad acabará transformándose. Nuestro destino es la asimilación total de la vida inteligente.\n\nToda resistencia es inútil. Las mentes de la galaxia están a nuestra entera disposición."
 cyber.2015.name: "Asimiladores avanzados"
 cyber.2015.desc: "Tras fusionar a nuestra población orgánica con las máquinas, hemos alcanzado prácticamente la perfección. Es el momento de integrar la cibernética avanzada en el tejido de nuestra civilización.\n\nAl simplificar la agudeza mental de nuestros cíborgs, podemos crear una \"memoria por agregación\" que condensará todas las experiencias recabadas para mejorar la capacidad logística. También podemos ampliar la variedad de pensamientos y respuestas emocionales mediante la creación de un \"coro neuronal\".\n\nAmbas opciones repercutirán enormemente en nuestro futuro."
 cyber.2015.a: "Agreguemos nuestras mentes."
 cyber.2015.a.tt: "$change_auth_tt$ ['concept_auth_memory_aggregator']\n\nAumenta los §Yrecursos§! generados al asimilar £pop£ §Hpoblaciones orgánicas§!\n\n$unlock_edict_tt$['concept_edict_aggregated_memory']"
 cyber.2015.b: "Que cante el coro."
 cyber.2015.b.tt: "$change_auth_tt$ ['concept_auth_neural_chorus']\n\n$unlock_edict_tt$['concept_edict_choral_harmony']"
 cyber.2015.c: "Nos quedaremos como estamos."
 cyber.2015.c.tt: "$keep_auth_tt$ ['concept_auth_machine_intelligence']"
 gov_memory_aggregator: "Agregador de memoria"
 gov_memory_aggregator_desc: "Al simplificar la agudeza mental de la población asimilada, se creará una memoria por agregación capaz de mejorar considerablemente cualquier tarea administrativa o logística."
 auth_memory_aggregator: "Agregador de memoria"
 auth_memory_aggregator_desc: "$gov_memory_aggregator_desc$"
 auth_memory_aggregator_tt: "Aumenta los recursos generados al asimilar £pop£ §Hpoblaciones orgánicas§!."
 gov_neural_chorus: "Coro neuronal"
 gov_neural_chorus_desc: "Al permitir una mayor variedad de pensamientos y respuestas emocionales, facilitaremos la creación de un \"coro neuronal\"; una enorme canción mental tan potente como hermosa."
 auth_neural_chorus: "Coro neuronal"
 auth_neural_chorus_desc: "$gov_neural_chorus_desc$"
 auth_driven_neural_chorus_tt: "Nivel inicial de líder cíborg: §G+1§!$NEW_LINE$Mantenimiento de líder cíborg: §G-25%§! $NEW_LINE$£unity£ $unity$ de las poblaciones cíborg: §G+0,1§!"
 concept_auth_memory_aggregator: "$gov_memory_aggregator$"
