 cyber_everyone_force_tests: "Sujetos de prueba forzosos"
 cyber_everyone_force_tests_desc: "Reclutar a la fuerza a sujetos de prueba nos ayudará a alcanzar nuestros objetivos."
 cyber_birth_implants: "Ciberinfancia"
 cyber_birth_implants_desc: "Los jóvenes son aumentados rápidamente con tecnología cibernética."
 cyber_natural_childhood: "Infancia libre de aumentos"
 cyber_natural_childhood_desc: "Los jóvenes son libres de crecer sin aumentos."
 AI_control: "Supervisores de IA"
 AI_control_desc: "Las respuestas sinápticas aumentadas por IA ayudan a dirigir a la gente hacia tareas productivas."
 moderate_AI_control: "$AI_control$"
 moderate_AI_control_desc: "$AI_control_desc$"
 AI_forced_control: "Controladores de IA"
 AI_forced_control_desc: "Implantes alojados en las zonas neurales de toma de decisiones facilitan un mayor control gubernamental."
 media_blockade: "Apagón mediático"
 media_blockade_desc: "Un apagón mediático total ha acallado las voces críticas con los objetivos del gobierno."
 helping_hand: "Una ayudita"
 helping_hand_desc: "Las armas nunca están de más. Sobre todo, en el laboratorio."
 armed_forces: "Fuerzas armadas"
 armed_forces_desc: "El ejército se ve reforzado gracias a la incorporación de extremidades adicionales."
 state_handouts: "Ayudas estatales"
 state_handouts_desc: "Se proporcionan aumentos poliextremitarios a todas las personas con movilidad reducida."
 branching_out: "Estrategia de mercado"
 branching_out_desc: "Los aumentos poliextremitarios se venden al mejor postor."
 handy_workers: "Trabajadores prácticos"
 handy_workers_desc: "Se han entregado punteros aumentos poliextremitarios a la clase trabajadora, que ahora cuenta con mejores medios para prosperar."
 luxury_limbs: "Extremidades de lujo"
 luxury_limbs_desc: "El poder y el privilegio van de la mano: la élite tiene más derecho a poseer varias extremidades."
 murdered_martyrs: "Sujetos sacrificados"
 murdered_martyrs_desc: "Con el fin de acabar con su sufrimiento, se propone un sacrificio ritual a las víctimas de aumentos experimentales."
 artificial_pain_relief: "Analgésicos artificiales"
 artificial_pain_relief_desc: "La industria farmacéutica se vuelca en desarrollar un potente fármaco analgésico para individuos ciberizados que lo necesiten."
 chained_experiments: "Experimentos concatenados"
 chained_experiments_desc: "Solo los ciudadanos tienen derecho a rechazar que los sometan a experimentos."
 cyber_opposition: "Ciberoposición"
 cyber_opposition_desc: "La negativa del estado a responsabilizarse ha suscitado una oposición política nada desdeñable."
 cyber_event_bliss_commercial: "Modificaciones recreativas comerciales"
 cyber_event_bliss_commercial_desc: "Unos implantes comerciales inducen químicamente una sensación de disfrute y bienestar a voluntad."
 cyber_event_bliss_underground: "Modificaciones recreativas clandestinas"
 cyber_event_bliss_underground_desc: "Unos implantes inestables procurados de forma sospechosa suministran placer y salud con tan solo pulsar un botón."
 cyber_event_bliss_regulate: "Modificaciones recreativas reguladas"
 cyber_event_bliss_regulate_desc: "El gobierno se contenta con regular el disfrute existente y las modificaciones regenerativas sin producción propia."
 cyber_event_worklife_name: "$cyber.615.name$"
 cyber_event_worklife_own: "Memoria laboral sin restricciones"
 cyber_event_worklife_own_desc: "El personal no está obligado a aislar secciones de su memoria en el trabajo ni en sus hogares."
 cyber_event_worklife_leave: "Memoria laboral restringida"
 cyber_event_worklife_leave_desc: "Se obliga al personal a aislar recuerdos asociados con el trabajo fuera de su jornada laboral a fin de combatir el espionaje industrial."
 cyber_event_worklife_isolate: "Memoria laboral aislada"
 cyber_event_worklife_isolate_desc: "Se obliga al personal a separar por completo los recuerdos asociados al trabajo de los asociados al ocio, y viceversa, a fin de evitar espionaje industrial y conflictos éticos con la empresa."
 mod_pop_cyborg_specialist_happiness: "Felicidad de $pop_cat_specialist$ cíborg"
 cyber_event_parental_control: "Pleno control motriz parental"
 cyber_event_parental_control_desc: "Los progenitores gozan de un control absoluto sobre las funciones motrices de su descendencia menor de edad."
 cyber_event_parental_limited: "Control motriz parental limitado"
 cyber_event_parental_limited_desc: "Se otorga a los progenitores control limitado sobre su descendencia menor de edad, como pueden ser, entre otras, restricciones de velocidad y de decibelios."
 cyber_event_parental_enforcers: "Control motriz a autoridades"
 cyber_event_parental_enforcers_desc: "Pese a las protestas de los progenitores, las funciones de control motriz quedan reservadas únicamente a las fuerzas policiales."
 cyber_event_knowledge_engineering: "Transferencia de nociones de ingeniería"
 cyber_event_knowledge_engineering_desc: "Se transfieren conocimientos avanzados de ingeniería a las mentes de científicos, a expensas de otros ámbitos de investigación."
 cyber_event_knowledge_physics: "Transferencia de nociones de física"
 cyber_event_knowledge_physics_desc: "Se transfieren conocimientos avanzados de física a las mentes de científicos, a expensas de otros ámbitos de investigación."
 cyber_event_knowledge_society: "Transferencia de nociones de sociales"
 cyber_event_knowledge_society_desc: "Se transfieren conocimientos relacionados con la sociedad a las mentes de científicos, a expensas de otros ámbitos de investigación."
 cyber_implant_taxes: "Gravámenes a implantes"
 cyber_implant_taxes_desc: "Los materiales y la producción de implantes cibernéticos quedan sujetos a impuestos."
 cyber_implant_taxes_tt: "Créditos energéticos mensuales: §G+5%§!\nCoste de crecimiento$pop_cat_cyborg$: §R+10%§!"
 cyber_reformed_implant_taxes: "Reforma fiscal a implantes"
 cyber_reformed_implant_taxes_desc: "Una reforma de los impuestos sobre materiales y producción de implantes cibernéticos genera beneficios inmediatos."
 cyber_reformed_implant_taxes_tt: "Créditos energéticos mensuales: §G+10%§!"
 cyber_market_standards: "Estándares de implantes comerciales"
 cyber_market_standards_desc: "Se imputa a los fabricantes de implantes cibernéticos de peor calidad a fin de elevar los estándares de la industria."
 cyber_implant_weapons: "Implantes ofensivos"
 cyber_implant_weapons_desc: "Los ciudadanos pueden instalarse implantes de armas personales."
 cyber_implants_dismantled: "Desmantelamiento de implantes peligrosos"
 cyber_implants_dismantled_desc: "Se están confiscando todos los implantes creados para hacer daño a otros, y sus componentes servirán para crear productos menos lesivos."
 cyber_implant_hacks: "Implantes hackeados"
 cyber_implant_hacks_desc: "Si un hacker cuenta con el código fuente de control de un implante central, puede acceder a implantes ajenos y manipularlos."
 cyber_counter_hacking: "Contrahackeo de implantes"
 cyber_counter_hacking_desc: "Recabadores de datos se sirven de nuestra red de comunicaciones para detectar actividades de hackeo de implantes."
 cyber_protests: "Protestas por el parón de los implantes"
 cyber_protests_desc: "Nuestra población, acostumbrada a un flujo constante de nuevos aumentos, está en pie de guerra por los recientes retrasos en los productos."
 cyber_stop_protests: "Dispersión de manifestantes"
 cyber_stop_protests_desc: "Se están desarticulando las manifestaciones en contra de los retrasos en la salida de implantes al mercado."
 #Policies
 policy_cyberization_standards: "Estándares de ciberización"
 policy_cyberization_standards_desc: "Es necesario que toda la población lleve implantes para que nuestra sociedad funcione. Los detractores de la ciberización total, en cambio, pueden optar por un número reducido de aumentos."
 cyberization_standards_full_name: "Ciberización plena"
 cyberization_standards_full: "$cyberization_standards_full_name$"
 cyberization_standards_full_effect: "Los líderes espiritualistas ganan el rasgo: §Y$leader_trait_cyborg$§!\nLa población espiritualista gana el rasgo: §Y$trait_cybernetic$§!"
 cyberization_standards_full_desc: "Se espera que todos los individuos se sometan a la instalación de un conjunto completo de implantes cibernéticos.\n\n§E$cyberization_standards_full_effect$§!"
 cyberization_standards_limited_name: "Ciberización limitada"
 cyberization_standards_limited: "$cyberization_standards_limited_name$"
 cyberization_standards_limited_effect: "Los líderes espiritualistas ganan el rasgo: §Y$leader_trait_limited_cyborg$§!\nLa población espiritualista gana el rasgo: §Y$trait_limited_cybernetic$§!"
 cyberization_standards_limited_desc: "Los individuos que se oponen al aumento total pueden instalarse un conjunto limitado de implantes cibernéticos.\n\n§E$cyberization_standards_limited_effect$§!"
 #CYBERIZATION STAGE 1
 cyber.100.name: "Control del futuro" #Stage 1 - Start event
 cyber.100.desc.shared: "Algún día, los recientes avances en implantes cibernéticos avanzados harán posible la remodelación de la sociedad. Si eliminamos todas las debilidades biológicas, seremos más inteligentes, rápidos y fuertes."
 cyber.100.desc.shared_unplugged: "Algún día, los recientes avances en implantes cibernéticos avanzados harán posible la remodelación de la sociedad, esta vez a nuestra manera. Al eliminar las debilidades y los defectos biológicos de nuestros aumentos existentes, podemos volvernos más inteligentes, rápidos y fuertes."
 cyber.100.desc: "$cyber.100.desc.shared$\n\nLas empresas han presentado propuestas de negocio y proyecciones de ventas, mientras que los funcionarios gubernamentales sostienen que el estado debe garantizar el acceso a esta potencial tecnología."
 cyber.100.desc.unplugged: "$cyber.100.desc.shared_unplugged$\n\nLas empresas han presentado propuestas de negocio y proyecciones de ventas, mientras que los funcionarios gubernamentales sostienen que el estado debe garantizar el acceso a esta potencial tecnología."
 cyber.100.desc.megacorp: "$cyber.100.desc.shared$\n\nMultitud de subcontratas han presentado propuestas comerciales y pronósticos de ventas de cara a la producción tercerizada de implantes, mientras que desde la directiva hay quien aboga por monopolizar el acceso a esta tecnología clave."
 cyber.100.desc.megacorp_unplugged: "$cyber.100.desc.shared_unplugged$\n\nMultitud de subcontratas han presentado propuestas comerciales y pronósticos de ventas de cara a la producción tercerizada de implantes, mientras que desde la directiva hay quien aboga por monopolizar el acceso a esta tecnología clave."
 cyber.100.a: "Nacionalizaremos la industria de los aumentos."
 cyber.100.a.megacorp: "Mantengamos el desarrollo interno."
 cyber.100.a.tt: "$situation_cyberization_triggered_modifier$$cyber_control_government_effects$"
 cyber.100.b: "Privatizaremos su distribución."
 cyber.100.b.megacorp: "Quedará en manos de nuestras subsidiarias."
 cyber.100.b.tt: "$situation_cyberization_triggered_modifier$$cyber_control_corporate_effects$"
 cyber.105.name: "Por el pueblo y para el pueblo"
 cyber.105.desc: "Que nuestros diseños cibernéticos sean inaccesibles para el ciudadano de a pie enfurece a los técnicos de implantes domésticos.\n\nEstos sostienen que, si los planos se hicieran públicos y se relajasen las normativas ambientales, prácticamente cualquier persona podría fabricar y reparar sus propios aumentos."
 cyber.105.desc.megacorp: "Las empresas privadas independientes ponen el grito en el cielo porque no tienen acceso a los diseños de nuestros próximos aparatos cibernéticos.\n\nSostienen que, si los planos se hicieran públicos y se liberasen varias patentes, se podría mejorar la producción de implantes."
 cyber.105.a: "Las normativas no están ahí porque sí."
 cyber.105.a.megacorp: "Se trata de nuestra propiedad intelectual."
 cyber.105.a.tt: "Modificador de situación §Y$situation_cyberization$§! sin cambios."
 cyber.105.b: "Desregulemos la industria, pues."
 cyber.105.b.crafters: "Que la gente cree lo que le parezca."
 cyber.105.b.megacorp: "Publiquemos los planos en código abierto."
 cyber.105.b.gov.tt: "Modificador de situación §Y$situation_cyberization$§! actualizado:\n§GSe ha añadido:§! $cyber_control_independent_effects$\n§RSe ha eliminado:§! $cyber_control_government_effects$"
 cyber.105.b.cor.tt: "Modificador de situación §Y$situation_cyberization$§! actualizado:\n§GSe ha añadido:§! $cyber_control_independent_effects$\n§RSe ha eliminado:§! $cyber_control_corporate_effects$"
 #Stage 1 Opportunities - Research
 cyber.120.name: "Descarga mental"
 cyber.120.desc: "Un equipo de investigadores ha presentado una propuesta de integración de supervisores de IA en nuestros dispositivos móviles, con miras a incorporarlos directamente en ciberware en un futuro.\n\nLos supervisores eximirían a la ciudadanía de centrarse en tareas ociosas para que preste más atención a actividades más cerebrales. Si bien comportaría renunciar a cierta autonomía, no podemos desdeñar el aumento de nuestra productividad que puede suponer su aplicación."
 cyber.120.a: "Productividad ante todo."
 cyber.120.a.spiritual: "Debemos tomarnos este avance como la bendición que es."
 cyber.120.b: "La pérdida de autonomía es demasiado grave."
 cyber.120.b.spiritual: "No nos desviaremos más de la senda sagrada."
 cyber.120.c: "Aceptable solo si existe un interruptor para desactivar la IA."
 cyber.120.d: "Cuánto aumentaría nuestro control sobre la gente..."
 #Stage 1 Challenges - Research
 cyber.160.name: "Disociación cibernética"
 cyber.160.desc: "El estreno de una aclamada obra dramática ha cautivado la imaginación colectiva del público.\n\nAmbientada en un mundo donde los implantes cibernéticos son la norma, la narración sigue a un trabajador al que su cuerpo modificado le provoca disociación traumática. La trágica conclusión de la historia presenta una crítica no demasiado sutil de la ciberización total y su inevitable borrado de la identidad [Owner.Species.GetAdj].\n\nSu éxito ha suscitado un rechazo considerable hacia nuestra iniciativa, y los sujetos de prueba disponibles han caído un 60% desde su estreno."
 cyber.160.a: "Iniciemos una campaña de relaciones públicas."
 cyber.160.b: "Recrudeceremos la normativa de implantes."
 cyber.160.c: "La moda no tardará en pasar."
 cyber.160.d: "Que se censure la obra."
 cyber.160.e: "Se omitirá toda noticia o crónica al respecto."
 #CYBERIZATION STAGE 2
 cyber.200.name: "Centros de aumento"
 cyber.200.desc.gov: "Tras un periodo marcado por las rencillas internas, se han repartido las responsabilidades de la producción de aumentos entre diversos departamentos gubernamentales. Si todos sacan tajada, se tendrán controlados unos a otros.\n\nNo obstante, lo primordial ahora es poner en práctica nuestros planes. La comunidad de investigadores necesita al menos un $building_augmentation_center$ que sirva como centro para el desarrollo cibernético."
 cyber.200.desc.cor: "Lo que ayer era un sueño está hoy a nuestro alcance, y ¿cómo no propiciar que de ello se beneficie la plétora de corporaciones que proliferan dentro de nuestros confines? Una ventaja de la creciente industria cibernética es que el lanzamiento de nuevos productos puede verse acelerado.\n\nNo obstante, lo primordial ahora es poner en práctica nuestros planes. Los grupos corporativos de presión necesitan al menos un $building_upload_center$ que sirva como centro para el desarrollo cibernético."
 cyber.200.desc.ind: "Nuestras redes de comunicación están repletas de ideas de diseño alocadas, desde el aumento neurosináptico hasta las glándulas gustativas cibernéticas. La mayoría son disparatadas y se salen de cualquier presupuesto, si bien algunos diseños, para nuestra fortuna, resultan prometedores.\n\nNo obstante, lo primordial ahora es poner en práctica nuestros planes. La comunidad en línea necesita al menos un $building_augmentation_center$ que sirva como centro para el desarrollo cibernético."
 cyber.200.a.gov: "Licencia de construcción concedida."
 cyber.200.a.cor: "Se aprueba la moción."
 cyber.200.a.ind: "Concedido."
 cyber.200.a.tt: "§RAcción necesaria:§!\nConstruir un $building_augmentation_center$ para que la situación §Y$situation_cyberization$§! prosiga.\n\nCada $building_augmentation_center$ otorga §G+200§! trabajos de $job_augmentor_with_icon$.\n\n$job_augmentor_research_effect_desc$"
 cyber.205.name: "Proyectos piloto" #Stage 2 - Start event
 cyber.205.desc.shared: "Ha llegado el momento de poner en marcha proyectos piloto de mayor envergadura. Será necesario destinar recursos de forma continuada y solo estarán disponibles en planetas con un $building_augmentation_center$, pero los beneficios de lo aprendido serán inmediatos en nuestra productividad."
 cyber.205.desc.gov: "Como parte de proyectos de investigación financiados por el gobierno, se han realizado pruebas que confirman que los aumentos mecánicos mejoran la productividad.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.cor: "Se han llevado a cabo pruebas con grupos de voluntarios que confirman que los aumentos mecánicos mejoran la productividad.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.ind: "Los informes de los técnicos de implantes domésticos confirman que los aumentos mecánicos mejoran la productividad.\n\n$cyber.205.desc.shared$"
 cyber.205.a: "Apliquemos mejoras a las élites."
 cyber.205.a.tt: "Rendimiento de recursos de $pop_cat_ruler$: §G+10%§! con $building_augmentation_center$"
 cyber.205.b: "Potenciaremos a nuestros especialistas."
 cyber.205.b.tt: "Rendimiento de recursos de $pop_cat_specialist$: §G+10%§! con $building_augmentation_center$"
 cyber.205.c: "Las optimizaciones, para los obreros."
 cyber.205.c.tt: "Rendimiento de recursos de $pop_cat_worker$: §G+10%§! con $building_augmentation_center$"
 cyber.205.d: "Implantes para todos."
 cyber.205.d.tt: "Recursos por £job£ §Htrabajos§!: §G+5%§! con $building_augmentation_center$"
 cyber.210.name: "Desarrollo paralelo"
 cyber.210.desc.gov.rival: "La prensa tiene pruebas de que el gobierno ha financiado programas de experimentación con microchips de análisis del pensamiento. Desarrollados del todo, se estos dispositivos podrían implantar a la población con el fin de recabar datos personales y de seguridad."
 cyber.210.desc.cor.rival: "En un litigio de propiedad registrada se han presentado pruebas que demuestran que hay empresas que experimentan con implantes de realidad aumentada diseñados para acoplarse íntegramente al nervio óptico del consumidor. En los bocetos se detallan tanto los beneficios para el usuario como la capacidad que tendría una empresa de apropiarse de información visual."
 cyber.210.desc.ind.rival: "Algunos técnicos de implantes independientes ya han empezado a sustituir extremidades convencionales por alternativas mecánicas rudimentarias. Nos es imposible garantizar el bienestar de quien se someta a estos procesos, y se teme que el uso de implantes irregulares pueda resultar más perjudicial que beneficioso."
 cyber.210.a: "Podemos usarlo."
 cyber.210.a.tt: "Velocidad de avance de la situación §Y$situation_cyberization$§! durante §Y1§! año: §G+25%§!\n\n"
 cyber.210.b: "Esta atrocidad se va a acabar."
 cyber.210.b.tt: "Velocidad de avance de la situación §Y$situation_cyberization$§! durante §Y1§! año: §R-25%§!"
 #Stage 2 Opportunities - Test Results and Rival Sector
 cyber.220.name: "Coordinación poliextremitaria"
 cyber.220.desc: "Se ha logrado un avance relevante en el campo de las interfaces neurales. El amplificador de señales encefálicas permitiría al usuario controlar con fluidez, si bien con ciertos límites, multitud de extremidades artificiales. En un futuro, el aparato se podría incorporar directamente en un cibercerebro sin necesidad de dispositivos externos.\n\nEn la fase de pruebas inicial, los resultados son prometedores en cuanto a destreza, manipulación de objetos e incluso un desempeño inaudito en combate. Sin embargo, habida cuenta de los elevados costes de producción, es necesario decidir quién podrá acceder primero a esta revolucionaria tecnología."
 cyber.220.a: "Nuestros científicos necesitan más [owner.species.GetHandNamePlural]."
 cyber.220.b: "La prioridad es fortalecer nuestro ejército."
 cyber.220.c: "Ante todo, ayudemos a quienes padecen limitaciones físicas."
 cyber.220.d: "¡No se regala nada! Serán de quien más pague."
 cyber.220.e: "¡Armemos a la clase obrera!"
 cyber.220.f: "La élite debe ir siempre un paso por delante."
 #Stage 2 Challenges - Test Results and Rival Sector
 cyber.260.name: "Espinazos al tuntún"
 cyber.260.desc: "La fase de pruebas del nuevo módulo ha desembocado en un fracaso estrepitoso. Un exceso de energía generada por los motores del implante ha provocado lesiones vertebrales permanentes a varios sujetos.\n\nHan llegado a ojos del público imágenes inquietantes que muestran el perturbador resultado, lo que se ha traducido en una escasez preocupante de voluntarios de cara a los próximos experimentos."
 cyber.260.a: "Quedan suspendidas las pruebas hasta que se idee una solución."
 cyber.260.a.tt: "Velocidad de avance de la situación §Y$situation_cyberization$§! durante §Y6§! meses: §R-50%§!"
 cyber.260.b: "Que se indemnice a las familias de las víctimas."
 cyber.260.c: "Encontrad voluntarios. Por la fuerza si es preciso."
 #CYBERIZATION STAGE 3
 cyber.300.name: "Lanzamiento" #Stage 3 - Start event
 cyber.300.desc: "A lo largo y ancho de nuestro territorio, en todos los centros urbanos, hemos hecho acopio de implantes mecánicos para la población [Owner.Species.GetName]. Si las especulaciones son ciertas, los dispositivos que han diseñado nuestros $job_augmentor_plural$ supondrán una inmensa mejora de nuestras formas biológicas.\n\nPor fin ha llegado el día de desterrar el pasado y dar la bienvenida a un mañana cibernético."
 cyber.300.a: "Cibericémonos."
 cyber.300.a.tt: "Los líderes ganan el rasgo: §Y$leader_trait_cyborg$§!\nLas poblaciones ganan el rasgo: §Y$trait_cybernetic$§!\n\n$job_augmentor_growth_effect_desc$\n\nLa velocidad de aumento dependerá del enfoque de situación y el número de $building_augmentation_center$ que se hayan construido."
 cyber.305.name: "Objetores cibernéticos" #Spiritualists are Cybernetic Objectors
 cyber.305.desc.shared: "Carecen de los implantes más básicos, y eso les impide encajar en nuestra sociedad, cada día más conectada.\n\nObligar a la población a instalarse implantes completos les ayudaría a integrarse mejor en la sociedad, pero sin duda provocaría resentimiento."
 cyber.305.desc: "Los grupos religiosos que se oponen a la fusión de [Owner.Species.GetFleshTypeCyberCreed] y máquina han optado por no participar en nuestros esfuerzos por ciberizar a la población. $cyber.305.desc.shared$"
 cyber.305.desc.spiritualist: "Los fieles, comprensiblemente reacios a fusionar [Owner.Species.GetFleshTypeCyberCreed] y máquina, han optado por no participar en nuestros esfuerzos por ciberizar a la población. $cyber.305.desc.shared$"
 cyber.305.desc.none: "La ética de fusionar [Owner.Species.GetFleshTypeCyberCreed] y máquina es un debate que ha traído bastante cola. Por desgracia, el incremento de eficacia mediante la ciberización deja a sus detractores en desventaja.\n\nAl obligar a la población a instalarse implantes, no dejaremos a nadie en la estacada, pero el resentimiento acabará aflorando."
 cyber.305.desc.unplugged: "La ética de fusionar [Owner.Species.GetFleshTypeCyberCreed] y máquina es un debate que ha traído bastante cola. Sin embargo, los aumentos de nuestro propio diseño ya no están sujetos a los caprichos de la máquina que nos asimiló y, por tanto, son extremadamente eficientes.\n\nAl obligar a la población a instalarse implantes, no dejaremos a nadie en la estacada, pero el resentimiento acabará aflorando."
 cyber.305.a: "Deben adaptarse."
 cyber.305.a.materialist: "La fe es irrelevante. Lo primordial es avanzar."
 cyber.305.a.spiritualist: "Su fe deberá adaptarse al presente."
 cyber.305.a.tt: "$cyberization_standards_full_effect$\n\nObtienes acceso a la política: §Y$policy_cyberization_standards$§!\n"
 cyber.305.b: "Encontraremos un término medio."
 cyber.305.b.spiritualist: "Dialogando nos entenderemos."
 cyber.305.b.tt: "$cyberization_standards_limited_effect$\n\nObtienes acceso a la política: §Y$policy_cyberization_standards$§!\n"
 #Stage 3 Opportunities - Treatment of Non-Cyborgs
 cyber.320.name: "Potencial infantil"
 cyber.320.birth.desc: "Ahora que hemos descubierto técnicas para incorporar implantes a recién nacidos, nos hallamos ante una encrucijada. Estos revolucionarios aumentos neonatales poseen el poder de transformar para siempre nuestra relación con la tecnología, pues nos darían acceso a un inmenso potencial cibernético desde que llegamos al mundo. Con ellos, nuestra civilización alcanzaría nuevas cotas.$cyber.320.end.desc$"
 cyber.320.metamorphosis.desc: "Hemos logrado un avance formidable que nos capacita para implantar microchips directamente a nuestros benjamines. Durante la metamorfosis, nuestras larvas poseen la capacidad natural de absorber sistemas mecánicos. Al implantar aumentos durante la etapa de crisálida, accederemos a un potencial cibernético inexplorado que impulsará a nuestra civilización a cotas inauditas.$cyber.320.end.desc$"
 cyber.320.lithoid.desc: "Al descubrir técnicas de implantación en retoños cristalinos apenas formados, nos hallamos ante una encrucijada. Los nuevos aumentos permitirían a nuestra juventud formar enlaces naturales con minerales metálicos, concediéndoles así acceso a un inmenso potencial cibernético ya en las primeras etapas de su vida. Con ellos, nuestra civilización alcanzaría cotas pasmosas.$cyber.320.end.desc$"
 cyber.320.root.desc: "Maravillados por la nueva tecnología que nos permite implantar aparatos cibernéticos a nuestros retoños, nos hallamos de pronto ante una encrucijada. Gracias a los aumentos, podrían transmitir impulsos eléctricos mediante una red aumentada de hifas, lo que les otorgaría acceso ya desde muy jóvenes a un potencial cibernético sin precedentes.$cyber.320.end.desc$"
 cyber.320.egg.desc: "Ahora que hemos descubierto técnicas para incorporar implantes directamente a nuestras crías, nos hallamos ante una encrucijada. Estos revolucionarios aumentos poseen el poder de transformar para siempre su relación con la tecnología, pues nos darían acceso a un inmenso potencial cibernético desde que llegamos al mundo. Con ellos, nuestra civilización alcanzaría nuevas cotas.$cyber.320.end.desc$"
 cyber.320.other.desc: "Ahora que poseemos la capacidad de incorporar implantes a nuestras crías, nos encontramos ante una encrucijada. Estos revolucionarios aumentos poseen el poder de transformar para siempre nuestra relación con la tecnología, pues nos darían acceso a un inmenso potencial cibernético desde que llegamos al mundo. Con ellos, nuestra civilización alcanzaría nuevas cotas.$cyber.320.end.desc$"
 cyber.320.end.desc: "\n\nSin embargo, fomentar una dependencia de las mejoras cibernéticas a tan temprana edad podría, a largo plazo, privar a nuestra especie de la capacidad de sobrevivir en su estado natural."
 cyber.320.a: "Lo natural es que evolucionemos."
 cyber.320.b: "Debemos velar por una infancia natural."
 #Stage 3 Challenges - Treatment of Non-Cyborgs
 cyber.360.name: "Dolores de conversión"
 cyber.360.desc: "Últimamente, varios individuos han hecho público que se arrepienten de haberse sometido a modificaciones corporales experimentales. La sustitución del tronco encefálico por un mecanismo artificial les provoca hoy un terror existencial crónico, y hay quien describe su experiencia como un ciclo eterno de agonía insufrible.\n\nDada la avalancha de demandas de resarcimiento, nos vemos obligados a aclarar nuestra postura con respecto a la responsabilidad del estado."
 cyber.360.a: "Quedan prohibidas las modificaciones extremas."
 cyber.360.a.tt: "Velocidad de avance de la situación §Y$situation_cyberization$§! durante §Y6§! meses: §R-50%§!"
 cyber.360.b: "Sacrifiquémoslos para poner fin a su sufrimiento."
 cyber.360.c: "Se les proporcionarán analgésicos más potentes."
 cyber.360.d: "Buscaremos sujetos de prueba solo entre las castas inferiores."
 cyber.360.e: "No asumimos responsabilidad alguna."
 #CYBERIZATION STAGE 4
 cyber.405.name: "Gravámenes a implantes" #Government rival
 cyber.405.desc: "Tras conocer los beneficios de la industria del aumento, apenas regulada, los oficiales del gobierno local tratan de regular los últimos avances. Se han aprobado onerosos impuestos para todas las fases de la producción de implantes cibernéticos, desde la extracción de recursos hasta su instalación final.\n\nLa burocracia y los gastos que estas tasas conllevan entorpecen ahora el proceso de fabricación e implantación con miras a una sociedad plenamente ciberizada."
 cyber.405.a: "Aceptamos los impuestos."
 cyber.405.b: "Impugnemos los impuestos."
 cyber.405.b.tt: "Velocidad de avance de situación §Y$situation_cyberization$§!: §G+25%§!\n\n"
 cyber.405.c: "Que se reforme el modelo de tasación de aumentos."
 cyber.405.c.tt: "Velocidad de avance de situación §Y$situation_cyberization$§! durante §Y1§! año: §R-10%§!"
 cyber.410.name: "Guerra judicial" #Government rival escalation
 cyber.410.desc: "Incapaces de estar al día con la adopción de implantes cibernéticos por parte del público, nuestros legisladores están tratando por todos sus medios de restringir ciertos aspectos de la aumentación.\n\nAseveran que padecemos una \"obsesión por los implantes\" y que cada aumento \"nos aleja más de lo que en esencia supone ser [Owner.Species.GetName]\". Como remedio, la nueva regulación establece un porcentaje máximo de aumentos que puede llevar una persona para que la ley la ampare. Y es que, a fin de cuentas, la población corre el riesgo de ser más máquina que [Owner.Species.GetName]."
 cyber.410.a: "Esa propuesta de ley hay que tumbarla."
 cyber.410.a.tt: "Velocidad de avance de la situación §Y$situation_cyberization$§! durante §Y1§! año: §G+25%§!"
 cyber.410.b: "Acerquemos nuestras posturas."
 cyber.410.b.tt: "Velocidad de avance de la situación §Y$situation_cyberization$§! durante §Y1§! año: §R-25%§!"
 cyber.415.name: "Sin garantías" #Corporate rival
 cyber.415.desc: "En la precipitada carrera por el lucro, el mercado de los aumentos se ha inundado de implantes baratos y de calidad inferior, y los fabricantes de dichos dispositivos no procuran asistencia al cliente cuando los dispositivos, inevitablemente, presentan problemas.\n\nEn un caso reciente que ha recibido mucha atención mediática, el implante cardíaco de un artista se averió en plena actuación. El resultado fue, desgraciadamente, explosivo."
 cyber.415.a: "El mercado se regulará solo."
 cyber.415.a_industrial: "Nada fuera de lo ordinario."
 cyber.415.a.tt: "Velocidad de avance de situación §Y$situation_cyberization$§!: §G+25%§!"
 cyber.415.b: "Debemos garantizar la seguridad de los usuarios."
 cyber.415.c: "Que se castiguen las infracciones más graves."
 cyber.415.c.tt: "Velocidad de avance de situación §Y$situation_cyberization$§!: §R-25%§!"
 cyber.420.name: "Diseños peligrosos" #Corporate rival escalation
 cyber.420.desc: "Hace poco, una nueva y dudosa variedad de implantes cibernéticos ha ido ganando terreno. Estos implantes, más que para ayudar al usuario, se han diseñado para dañar a otros: las calles están plagadas de pulverizadores de toxinas, nanogarrotes y codificadores cibercerebrales.\n\nSus partidarios argumentan que estos implantes son necesarios para la autodefensa, mientras que otros insisten en que esta tecnología no puede traer nada bueno."
 cyber.420.a: "Dejad que se armen."
 cyber.420.b: "Es demasiado peligroso."
 cyber.420.b.tt: "Velocidad de avance de situación §Y$situation_cyberization$§!: §R-25%§!"
 cyber.420.b_pacifist: "Hay que desmantelar todos los implantes violentos."
 cyber.420.b.tt_pacifist: "Usad los materiales para construir algo más... conveniente.\n\n"
 cyber.425.name: "Pirateo del software de control" #Independent rival
 cyber.425.desc: "Varios grupos de hackers han obtenido acceso al software central que alimenta a todos los implantes cibernéticos mediante un ataque coordinado. Estos amenazan con publicar el código, a menos que cedamos a sus peticiones.\n\nPor ahora, no tenemos motivos para dudar de su amenaza. Si el código se hace público, no nos quedará más remedio que reescribirlo, un retraso que tendrá un devastador impacto en nuestros trabajos de aumento."
 cyber.425.a: "Pagad lo que piden."
 cyber.425.b: "Reescribid el software."
 cyber.425.b.tt: "Velocidad de avance de la situación §Y$situation_cyberization$§! durante §Y1§! año: §R-25%§!"
 cyber.425.c: "Que lo intenten."
 cyber.425.c.tt: "Menos mal que tenemos a los mejores hackers en nómina."
 cyber.430.name: "Aumentos poco fiables" #Independent rival escalation
 cyber.430.desc.demands: "A pesar de haber pagado un cuantioso rescate a los grupos responsables del fallo de seguridad, a última hora de la noche de ayer nuestro código base principal se colgó en todas las redes públicas de información. La filtración estuvo precedida de un gráfico obsceno para burlarse de nuestra incapacidad para impedir los ataques.\n\nEl discurso público se ha tornado amargo, y ha aumentado considerablemente el remordimiento del comprador por los implantes cibernéticos."
 cyber.430.desc.protest: "Reescribir el software de control de implantes nos ha supuesto esfuerzo y tiempo, y esto ha hecho que se retrase la producción.\n\nLa población se ha vuelto más dependiente de los últimos aumentos y muchos han tomado las calles para protestar por los retrasos en el lanzamiento de los productos."
 cyber.430.a: "Pronto se lanzarán nuevos productos."
 cyber.430.b: "Ignoradlos."
 cyber.430.c.demands: "Efectuad un hackeo para contraatacar."
 cyber.430.c.protest: "Dispersad a los manifestantes."
 cyber.21.name: "Una población aumentada" #Situation 1 - Last event
 cyber.21.desc: "Hoy es un punto de inflexión para nuestra sociedad: ya podemos aumentar nuestros cuerpos con partes mecánicas totalmente integradas.\n\nEl proceso no ha estado exento de dificultades y la transición no ha sido precisamente fácil, pero da igual lo que se haya perdido por el camino, ya que ahora nuestra nueva existencia ofrece un sinfín de posibilidades."
 cyber.21.a: "Nos haremos más fuertes."
 cyber.21.a.start: "Modificador §Y$building_augmentation_center$§! añadido:$TABBED_NEW_LINE$"
 cyber.21.a.end: "Desbloquea los efectos totales del árbol de tradiciones: ['tradition_category:tradition_cybernetics']"
 cyber.21.a.gov.tt: "$cyber.21.a.start$$cyber_control_government_effects$\n$cyber.21.a.end$"
 cyber.21.a.cor.tt: "$cyber.21.a.start$$cyber_control_corporate_effects$\n$cyber.21.a.end$"
 cyber.21.a.ind.tt: "$cyber.21.a.start$$cyber_control_independent_effects$\n$cyber.21.a.end$"
 ### CYBERIZATION SITUATION END ###
 ### SOCIETAL EFFECTS EVENT CHAIN START ###
 futureshock_chain_title: "Impacto futuro"
 futureshock_chain_desc: "Nos negamos a conformarnos con lo que nos ha dado la naturaleza y queremos esforzarnos por superar los límites del cuerpo orgánico. Nuestra distribución de implantes a gran escala solo ha encontrado problemas menores, los cuales pueden resolverse fácilmente. La gran mayoría de la población está entusiasmada con lo que pueden ofrecer las nuevas cibernéticas.\n\nEstamos a punto de alcanzar la grandeza. Toca esperar a ver qué pasa."
 change_auth_tt: "Cambia autoridad: "
 keep_auth_tt: "Mantiene autoridad: "
 cyber_keep_auth_option: "La ciberización no cambia quiénes somos."
 unlock_edict_tt: "Desbloquea el edicto: "
 unlock_agenda_augmentation_product_launch: "Desbloquea el orden del día: §Y$council_agenda_agenda_augmentation_product_launch_name$§!"
 ### AUTHORITIES ###
 #DEMOCRATIC
 #Cyber Democratic Individualist
 auth_cyber_democratic_individualist: "Concurrencia democrática"
 auth_cyber_democratic_individualist_desc: "Los protocolos avanzados en neuroseguridad permiten a los ciudadanos votar directamente en tiempo real las decisiones políticas.\n\nEste gobierno democrático celebra elecciones periódicas en las que todos los ciudadanos pueden votar quién debe representarlos."
 auth_cyber_democratic_individualist_tt: "$auth_democratic_election_tt$\n$unlock_edict_legislative_chorus$"
