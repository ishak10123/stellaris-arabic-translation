 #Static Modifiers
 borrowed_research: "Investigación ajena"
 borrowed_research_desc: "Los resultados robados de las investigaciones se han incorporado al proyecto de ciberización, lo que ha provocado cierto malestar."
 researcher_media_relations: "Fondos de investigación desviados"
 researcher_media_relations_desc: "Los fondos de investigación se desvían hacia las relaciones públicas."
 bad_publicity: "Mala publicidad"
 bad_publicity_desc: "Una popular película ha hecho que la opinión pública se ponga en contra de los planes del gobierno."
 state_censorship: "Censura estatal"
 state_censorship_desc: "El duro trato a los disidentes ha fomentado el descontento."
 cyber_state_censorship: "Cibercensura"
