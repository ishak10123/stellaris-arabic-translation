 cyber.social_consequences.tt: "Influye en el actual §Ycambio de la sociedad cibernética§!.\n\n" #Standard tooltip to indicate that the Individualism/Collectivism variables are changed
 #FIRST EVENT #
 #DEMOCRATIC
 cyber.505.name: "Impacto futuro"
 cyber.505.desc.gov: "El aumento de nuestro pueblo ha sido un triunfo de la agilización de los procesos de fabricación y la toma de decisiones. Las diferentes voces han sido reconocidas y sus preocupaciones, atendidas. Ahora, todos los §Y[root.GetSpeciesAdj]§! tienen las mismas oportunidades de beneficiarse de estos implantes que cambian vidas.\n\nPor lógica, el siguiente paso consiste en examinar más implicaciones de esta tecnología. ¿Deberíamos aprovecharla para el proceso democrático o para elevar a nuestros trabajadores mediante la sincronización de experiencias?"
 cyber.505.desc.cor: "El proceso de aumento con nuestras corporaciones asociadas se ha completado con éxito. Los implantes se han fabricado, distribuido e instalado con increíble eficacia. Las numerosas voces de la sociedad §Y[root.GetSpeciesAdj]§! han sido escuchadas y se han abordado las preocupaciones de esta. Estamos listos para afrontar el futuro con un vigor renovado.\n\nEl gobierno está preparado para dar un paso adelante. Podemos usar nuestros avances tecnológicos para mejorar el proceso democrático, o bien para sincronizar implantes para el servicio de los trabajadores."
 cyber.505.desc.ind: "A pesar de las reticencias por parte de algunos oficiales del gobierno, el modelo de distribución descentralizado de los implantes ha funcionado. Están apareciendo pequeñas clínicas y servicios en cada esquina que permiten a cualquiera mejorarse sin tener que recorrer grandes distancias.\n\nNuestro gobierno también debe estar listo para avanzar. Podemos usar los implantes para fortalecer nuestro proceso democrático o usarlos para sincronizar nuestras experiencias para nuestro beneficio y el de nuestros trabajadores."
 cyber.505.a: "Deberíamos mejorar el proceso democrático."
 cyber.505.a.tt: "Énfasis en el aumento de la felicidad, la unidad y los especialistas."
 cyber.505.b: "Tenemos que enlazar nuestras mentes."
 cyber.505.b.tt: "Énfasis en el aumento de la felicidad, en el rendimiento de los trabajadores y en la estabilidad."
 #OLIGARCHIC
 cyber.510.name: "Poder reestructurado"
 cyber.510.desc.gov: "Este cambio monumental solo lo pueden entender y promulgar las altas esferas de la sociedad, no sea que provoque confusión y desacuerdos entre nuestros súbditos. Los §Y[Species.GetNamePlural]§! están equipados con sus implantes cibernéticos emitidos por el gobierno, por lo que tenemos una ocasión única para explorar las oportunidades sin explotar que ofrecen ahora estos chips.\n\n¿Deberíamos impulsar una sociedad en la que la competencia feroz eleve a nuestros trabajadores a nuevas cotas o aprovechar el poder computacional ocioso de las mentes dormidas?"
 cyber.510.desc.cor: "Mientras las empresas autorizadas por el gobierno producen biochips cada vez mejores, tenemos que decidir cuál es la mejor manera de utilizar este increíble cambio social.\n\n¿Deberíamos imitar a la naturaleza, en la que solo sobrevive el más fuerte, o alimentar el potencial desaprovechado del cerebro adormecido?"
 cyber.510.desc.ind: "Para bien o para mal, la gente podrá demostrar su valía en la fabricación y distribución de hardware de aumento cibernético, lo que nos permitirá considerar el panorama general y cómo aprovechar al máximo este cambio social imprevisto.\n\n¿Deberíamos empujar a la gente a que alcance cuotas más altas o hacerlos trabajar para nosotros mientras duermen?"
 cyber.510.a: "Que los aduladores trabajen para nosotros."
 cyber.510.a.tt: "Énfasis en el aumento de la producción a costa de la felicidad."
 cyber.510.b: "Aprovechad el poder del sueño."
 cyber.510.b.tt: "Énfasis en el aprovechamiento de las facciones para obtener recursos adicionales."
 #DICTATORIAL
 cyber.515.name: "Masa controlada"
 cyber.515.desc.gov: "Han surgido muchas oportunidades de aumentar la estabilidad y el control gracias a nuestro programa de aumento. Mientras fabricamos implantes emitidos por el gobierno y se los instalamos a toda la población, instalar algoritmos en secreto para guiar a la población hacia el resultado que deseamos tendría que ser pan comido.\n\nPodríamos aumentar la cobertura de la vigilancia si añadimos instrumentos de monitorización y funciones secretas a los implantes personales, o podríamos instalar un código que permita que la radiante personalidad de nuestro/a §Y[Ruler.GetTitle]§! influya en las masas."
 cyber.515.desc.cor: "Nuestras corporaciones asociadas están listas para producir, distribuir e instalar implantes cibernéticos a escala social, mientras que una actualización del próximo firmware nos ofrece una oportunidad única.\n\nPodríamos incluir herramientas de vigilancia ocultas en el hardware de aumento personal, lo que nos permitiría erradicar a los individuos problemáticos. Como alternativa, podemos crear una función de anulación de personalidad que imprima la voluntad de nuestro/a §Y[Ruler.GetTitle]§! a las masas."
 cyber.515.desc.ind: "Los hospitales generales, las tiendas de barrio y las comunidades de hackers ya están preparados para distribuir e instalar implantes cibernéticos en la población. Aunque no es necesario descentralizar nuestro poder totalmente ante esta nueva y emocionante tecnología.\n\nPodríamos suministrar modificaciones de implantes hechas a medida con nuestras propias herramientas de vigilancia encubierta, ocultas en su interior para poder controlar a los individuos problemáticos. Como alternativa, podríamos instalar algoritmos de anulación de la personalidad que permitan que la voluntad de nuestro/a §Y[Ruler.GetTitle]§! guíe a nuestro pueblo de manera subconsciente hacia la grandeza."
 cyber.515.a: "Ocultad las herramientas de vigilancia en los implantes personales."
 cyber.515.a.tt: "Énfasis en la estabilidad del imperio y la reducción del crimen."
 cyber.515.b: "Estudiad lo de la anulación de la personalidad."
 cyber.515.b.tt: "Énfasis en la producción de los trabajadores y el reasentamiento."
 #IMPERIAL
 cyber.520.name: "Impacto futuro"
 cyber.520.desc.gov: "El gobierno ha desplegado sus vastos recursos para aumentar la población de manera eficiente. Los centros de aumento autorizados han estado instalando implantes día y noche, y se ha enseñado a la gente prácticas para el buen uso y mantenimiento de los mismos.\n\nLa pregunta que cabe plantearse es si el valor actual de los implantes debería enfocarse en mejorar nuestro ya impresionante liderazgo o si tendría que servir como medio para entretener y distraer a aquellos que trabajan para él.\n\nTener los implantes de mayor calidad disponibles para nuestra dinastía podría permitir a nuestro liderazgo preservar el conocimiento entre generaciones, ofreciendo así una gran estabilidad. El imperio también puede mejorar la capital y ofrecer entretenimiento con atletas mejorados cibernéticamente que participen en eventos deportivos sangrientos de última generación."
 cyber.520.desc.cor: "Las empresas autorizadas de manera oficial han actuado dentro de las directrices operativas. Se ha aumentado a toda la población con implantes cibernéticos y ya está lista para servir de forma más eficiente que nunca.\n\nLa pregunta que cabe plantearse es en qué debería enfocarse el valor actual de los implantes.\n\nTener los implantes de mayor calidad disponibles para nuestra dinastía podría permitir a nuestro liderazgo preservar el conocimiento entre generaciones, ofreciendo así una gran estabilidad. El imperio también puede mejorar la capital y ofrecer entretenimiento con atletas mejorados cibernéticamente que participen en eventos deportivos sangrientos de última generación."
 cyber.520.desc.ind: "A pesar de las numerosas reticencias por parte de los oficiales imperiales, la distribución y la instalación descentralizada de implantes cibernéticos ha sido todo un éxito. Muchas clínicas pequeñas repartidas por nuestros mundos han trabajado sin descanso para mejorar la población.\n\nLa pregunta que cabe plantearse es en qué debería enfocarse el valor actual de los implantes. Podríamos preservar el conocimiento imperial gracias a implantes intergeneracionales u ofrecer a las masas un deporte sangriento cíborg nunca antes visto por ningún implante ocular."
 cyber.520.a: "Conservad el conocimiento imperial."
 cyber.520.a.tt: "Énfasis en el gobernante imperial."
 cyber.520.b: "Ofreced entretenimiento a las masas."
 cyber.520.b.tt: "Énfasis en la productividad y la felicidad del planeta capital."
 #CORPORATE
 cyber.525.name: "Implantes S. A."
 cyber.525.desc.gov: "El amplio pero ineficaz programa gubernamental de implantes está a punto de concluir, lo que nos brinda la oportunidad de ampliar aún más las fuentes de ingresos relacionadas con este lanzamiento de producto sin precedentes. Nuestro equipo analítico propone dos fuentes potenciales de ingresos, ambas con sus riesgos y ventajas.\n\n¿Debería el gobierno exigir la inclusión de publicidad en todos los implantes oculares futuros, u obligar a hacer mejoras periódicas a la población aumentada?"
 cyber.525.desc.cor: "La producción e instalación de implantes han resultado tan eficientes como esperábamos de nuestra infraestructura corporativa altamente optimizada. Las oportunidades de negocio de estos nuevos implantes son prácticamente infinitas.\n\nSe presentan dos vías especialmente prometedoras. Aunque se excluyen mutuamente, ambas predicen márgenes de beneficio estelares.\n\nLa pregunta que cabe plantearse es si deberíamos exigir la inclusión de publicidad en todos los implantes oculares futuros u obligar a hacer mejoras periódicas a la población aumentada."
 cyber.525.desc.ind: "Como era de esperar, la azarosa implantación \"comunitaria\" del ciberware está llegando a su misericordioso fin. Ahora tenemos la oportunidad de influir en la dirección de esta nueva y prometedora tecnología, aumentando los márgenes de nuestros productos en el proceso.\n\n¿Debería incluirse publicidad en todos los implantes oculares futuros o será mejor que obliguemos a organizar un ciclo de actualización continua de software y wetware?"
 cyber.525.a: "Prototipad implantes oculares con anuncios."
 cyber.525.a.tt: "Énfasis en el crecimiento comercial. Reduce los costes de las oportunidades económicas."
 cyber.525.b: "Investiguemos los planos para mejorar los implantes."
 cyber.525.b.tt: "Énfasis en la productividad, el espionaje y el mantenimiento de instalaciones."
 ### EVENT POOL ###
 cyber.610.name: "Dicha instantánea"
 cyber.610.desc: "Un modificador de implantes clandestino se está popularizando entre la mano de obra, puesto que estimula el cerebro para producir neurotransmisores a su antojo. Sus usos son muy variados, desde provocar placer hasta aumentar la tolerancia al dolor. Para crear una versión estable del implante ilegal con ingeniería inversa, hará falta una gran inversión. Además, los efectos estimulantes acabarán disminuyendo con el tiempo.\n\n¿Deberíamos crear una versión comercial, rediseñar el prototipo clandestino o simplemente regular su uso?"
 cyber.610.a: "Creemos un implante estable."
 cyber.610.b: "Adaptemos el prototipo clandestino."
 cyber.610.c: "Regulemos este tipo de modificadores."
 cyber.615.name: "División entre la vida laboral y personal"
 cyber.615.desc: "Cada vez más empresas exigen que todas las experiencias vividas durante el horario de oficina se almacenen en una área de memoria del cibercerebro inaccesible fuera del trabajo.\n\nAseveran que esta función solo se reserva para fines confidenciales con el objetivo de evitar el espionaje corporativo. Algunas incluso exigen que los empleados bloqueen sus experiencias privadas en el trabajo para evitar que la ética personal interfiera con la productividad."
 cyber.615.a: "La gente debería gozar de un control total."
 cyber.615.b: "Es sano que el trabajo se quede en la oficina."
 cyber.615.c: "Bloqueemos las experiencias en ambos sentidos."
 cyber.625.name: "Monetización a base de suscripciones"
 cyber.625.desc: "El ciberware está tan integrado en nuestras vidas que cualquier cambio en el modelo de monetización afecta a toda la sociedad. La última moda es que los fabricantes de implantes bloqueen funcionalidades esenciales con un modelo de suscripción. Al no pagar la cuota, las ciberextremidades se bloquearán de golpe y las ópticas se desactivarán. Las organizaciones del consumidor exigen poner fin a estas prácticas."
 cyber.625.a: "Prohibamos el ciberware de suscripción."
 cyber.625.b: "Si no pueden permitírselo, que no lo compren."
 cyber.625.c: "Ciñamos las suscripciones a las funciones no esenciales."
 cyber.625.d: "¡Una idea magnífica! Redoblemos esfuerzos."
 cyber_subscription_ban: "Ciberware de suscripción prohibido"
 cyber_subscription_ban_desc: "Hemos logrado que los fabricantes de ciberware dejen de bloquear las funciones de los implantes con suscripciones de pago."
 cyber_subscription_limited: "Suscripciones limitadas de ciberware"
 cyber_subscription_limited_desc: "Hemos logrado que los fabricantes de ciberware dejen de bloquear las funciones esenciales de los implantes con el pago de suscripciones."
 cyber_subscription: "Añade los siguientes modificadores al rasgo de especie §Y$trait_cybernetic$§!:\n$t$Felicidad: §R-5%§!\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_traders']: §G+25%§!"
 cyber_subscription_megacorp: "Añade los siguientes modificadores al rasgo de especie §Y$trait_cybernetic$§!:\n$t$Felicidad: §R-5%§!\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_traders']: §G+50%§!"
 cyber.655.name: "Fallo mecánico imprevisible"
 cyber.655.desc: "Los ingenieros de ciberware nos han ofrecido una oportunidad económica. Si sacrificamos un poco la durabilidad del implante, podríamos generar un mayor margen de beneficios, ya que los usuarios tendrán que reemplazar las piezas principales.\n\nAl emplear una bioaleación de calidad inferior en aquellas secciones que sufran más desgaste de lo normal, los implantes deberían averiarse sin apenas provocar daños en el usuario, obligándole a sustituirlos."
 cyber.655.a: "¡Indignante!"
 cyber.655.a.tt: "¡No vamos a ofrecer a nuestros ciudadanos componentes de menor calidad!\n\n"
 cyber.655.b: "Qué interesante. Haced que el ciberware sea más endeble."
 cyber.655.c: "¡Sí! Además, acompañadlo con una subida de precios."
 cyber.655.d: "Usemos estos datos para mejorar la ciberización."
 worse_parts: "Piezas de peor calidad"
 worse_parts_desc: "Hemos decidido proveer a nuestros ciudadanos de componentes cibernéticos de calidad inferior, obligándolos a comprar repuestos más a menudo."
 worse_parts_effect_tt: "$r_trade$ por $pop_group_unit$ £pop£ §Hpoblaciones§! con el rasgo §Y$trait_auto_mod_cyborg$§!: §G+0,5§!"
 optimized_parts: "Piezas optimizadas"
 optimized_parts_desc: "Hemos seguido innovando y mejorando nuestros componentes cibernéticos hasta el punto de agilizar y simplificar el proceso de instalación."
 optimized_parts_effect_tt: "Mantenimiento de $r_energy$ para £pop£ §Hpoblaciones§! con el rasgo §Y$trait_auto_mod_cyborg$§!: §R+0,1§!"
 cyber.660.name: "Fracaso social imprevisible"
 cyber.660.desc: "Parece que los ciudadanos han descubierto nuestra deplorable iniciativa.\n\nLas calles se han abarrotado de [Owner.GetSpeciesNamePlural] furiosos por los últimos recortes en la calidad del ciberware, y a un precio mayor. Nos imploran que revirtamos los cambios."
 cyber.660.a: "Vale, hemos pecado un poco de avariciosos."
 cyber.660.b: "¿Qué decís? ¡NO OÍMOS NADA!"
 cyber.660.c: "No tenemos por qué..."
 discontent: "Insatisfacción"
 discontent_desc: "Nuestros ciudadanos protestan por el reciente aumento de precios del ciberware y la caída de la calidad."
 cyber.805.name: "Controles parentales"
 cyber.805.desc: "Al instalar implantes cerebrales en los infantes, los cuidadores nos piden un mayor control sobre sus hijos. La capacidad de controlar funciones motoras solo compete a las fuerzas policiales, si bien algunos quieren ampliar estos derechos también a los tutores.\n\nAunque se trata de una clara infracción sobre la autonomía de los cuerpos, en el pasado ya se aprobaron otras formas de coacción parental. Otra opción sería permitir un control limitado, como ralentizar o reducir el nivel de volumen de los hijos problemáticos."
 cyber.805.a: "Dejemos que los adultos controlen a sus niños."
 cyber.805.b: "Permitamos un control limitado."
 cyber.805.c: "Dejemos el control corporal remoto a las fuerzas policiales."
 cyber.810.name: "Trasferencia de conocimientos"
 cyber.810.desc: "El desarrollo de implantes cibernéticos cerebrales nos brinda una oportunidad muy atractiva. En vez de confiar en métodos lentos y subjetivos de enseñanza, podríamos transferir conocimientos relevantes de un cerebro a otro. Para ello, necesitaremos condiciones esterilizadas de laboratorio, por lo que no podremos producirlo a gran escala. Además, la información recibida sobrescribe parte de los recuerdos del receptor.\n\nLa aplicación más impactante sería el intercambio de conocimientos entre científicos. Esto podría compensar parte de la deuda de ingeniería del proceso de ciberización o centrarse en otras áreas."
 cyber.810.a: "Transfiramos conocimientos de ingeniería."
 cyber.810.b: "Transfiramos conocimientos de física."
 cyber.810.c: "Transfiramos conocimientos sociales."
 cyber.810.d: "Respetemos las mentes de todos."
 cyber.815.name: "Amor descentralizado"
 cyber.815.desc: "Mientras que muchos [root.GetSpeciesNamePlural] han mejorado sus vidas y relaciones cotidianas gracias a la cibernética disponible en el mercado, un número creciente de hogares con varias parejas han recurrido a redes privadas con hardware hecho a medida. Estos grupos domésticos han decidido vivir en un aislamiento a medida en el que comparten sentimientos y experiencias con un grado de intimidad único.\n\nAlgunas asociaciones y eruditos especializados en bienestar social han aplaudido este fenómeno, e inciden en que todos podrían beneficiarse de los aumentos personalizados para las relaciones familiares y sentimentales. Otros han expresado su preocupación por el distanciamiento social que implica; algunos hasta sugieren que la práctica podría hacer que los individuos se pierdan en sus \"minigestalts románticas\"."
 cyber.815.a: "Su forma de vivir o amar no es asunto nuestro."
 cyber.815.a.tt: "Seguiremos permitiéndoles el acceso al hardware personalizado y a los espacios digitales privados."
 decentralized_families: "Familias descentralizadas"
 decentralized_families_desc: "Cualquier pareja sentimental doméstica podrá cultivar sus relaciones con el uso de software y aumentos personalizados."
 cyber.815.b: "Traigamos a estas familias de vuelta al redil."
 cyber.815.b.tt: "Desalentaremos el aumento personalizado en favor de soluciones más reguladas."
 centralized_families: "Familias centralizadas"
 centralized_families_desc: "Al ejercer un control más riguroso sobre los aumentos cibernéticos y el software, los hogares se abstendrán de aislarse en sus paraísos digitales." #as in a richly decorated but enclosed space
 cyber.820.name: "Imagen radical"
 cyber.820.desc: "Las subculturas externas han existido a lo largo de la historia [root.GetSpeciesAdj], pero, con la llegada de las mejoras cibernéticas, la situación ha cambiado: ciertos grupos han empezado a alterarse, hasta el punto de no parecer ya [root.GetSpeciesAdj]. Los más jóvenes están ensanchando la brecha generacional con su pasión por la modificación de [root.GetSpeciesHandNamePlural], el arte corporal en 3D y demás apéndices ornamentales.\n\nSus partidarios afirman estar aceptando su verdadero ser; que, al renunciar a la homogeneidad [root.GetSpeciesAdj], lo único que hacen es reforzar el control sobre sus vidas. Un número creciente de padres y expertos sociales preocupados no comparten estos puntos de vista y denuncian que estos individuos son malhechores que pretenden arruinar nuestra sociedad."
 cyber.820.a: "Vamos a endurecer las medidas sobre la modificación de cuerpos."
 cyber.820.b: "Están en esa fase. Ya se les pasará."
 radical_image: "Imagen radical"
 radical_image_desc: "Los jóvenes de esta sociedad se están envalentonando al experimentar con su propia imagen."
 cyber.820.c: "Igual aprendemos algo de esta juventud."
 radical_insights: "Conocimientos radicales"
 radical_insights_desc: "Tras seguir el modelo impuesto por los modificadores corporales de la contracultura, esta sociedad está experimentando con su propia imagen con nuevos tipos de aumentos estéticos."
 cyber.821.name: "Manifestaciones radicales"
 cyber.821.desc: "Miles de jóvenes, activistas y artistas preocupados se han congregado para exigir plena libertad con los aumentos cibernéticos. Los manifestantes abarcan desde los típicos [root.GetSpeciesNamePlural] hasta individuos con extremidades personalizadas, torsos remodelados y otras formas de apariencia alienígena. Todos proclaman su solidaridad con los ciudadanos [root.GetAdj] que sufren discriminación por sus decisiones personales en lo tocante a ornamentos cibernéticos."
 cyber.821.a: "No nos convencerán."
 cyber.821.a.tt: "Seguiremos fomentando un enfoque colectivista para la cibernética."
 radical_image_denied: "Imagen radical denegada"
 radical_image_denied_desc: "Se han intensificado las protestas por el derecho a la libre expresión mediante aumentos cibernéticos."
 cyber.821.b: "Estudiaremos sus exigencias."
 cyber.821.b.tt: "Los individuos gozarán de algo más de libertad con los aumentos cibernéticos."
 radical_image_upheld: "Imagen radical mantenida"
 radical_image_upheld_desc: "Las últimas protestas han garantizado ciertos derechos a la libre expresión mediante notorios aumentos cibernéticos."
 cyber.822.name: "Fisiología radical"
 cyber.822.desc: "El personal médico se ha quejado de los obstáculos sin precedentes a los que se enfrentan al tratar a pacientes con aumentos cibernéticos radicalmente únicos.\n\nMuchos de estos individuos elaboradamente esculpidos requieren tratamientos especiales, como herramientas personalizadas o un desmontaje drástico, incluso en el caso de dolencias menores. El coste de tales intervenciones exceden con creces los asociados con pacientes no modificados y que no son [root.GetSpeciesAdj]."
 cyber.822.a: "El precio está justificado."
 cyber.822.b: "Fue un error permitir semejante nivel de personalización."
 #Cold Metal
 cyber.830.name: "Escalofríos"
 cyber.830.desc: "Un segmento de la población aumentada denuncia episodios de dolor al verse expuesta a climas fríos. La situación es especialmente grave en §H[cold_planet.GetName]§!, donde las temperaturas son, por lo general, bajas.\n\nSomos conscientes de que los implantes de metal, a bajas temperaturas, pueden resultar incómodos, pero no deberían producir una reacción tan adversa. La mano de obra se resiente con la situación."
 cyber.830.a: "Realicemos un estudio médico."
 cyber.830.b: "Su sufrimiento no es responsabilidad nuestra."
 cyber.830.tooltip: "Añade los siguientes modificadores al rasgo de especie §Y$trait_cybernetic$§!:$TABBED_NEW_LINE$Habitabilidad alpina, ártica o de tundra: §R-20%§!"
 COLD_METAL_PROJECT: "Metal gélido"
 COLD_METAL_PROJECT_DESC: "Las poblaciones que habitan en climas fríos denuncian graves episodios de dolor debido a los implantes cibernéticos. Un ensayo clínico nos permitiría recabar más datos."
 cyber.835.name: "Informe médico"
 cyber.835.desc: "Los ensayos clínicos no concretaron una correlación entre la exposición del ciberware a climas fríos y la edad, el sexo, la ocupación o el tipo de implantes utilizados por los pacientes afectados.\n\nHay profesionales médicos que lo achacan a un dolor psicosomático, y que el tratamiento debería reducirse a analgésicos y terapia conductual. Otros nos instan a no subestimar el problema y a que financiemos un programa de mejora de las opciones de tratamiento."
 cyber.835.a: "El dolor es producto de su mente."
 cyber.835.b: "Aprobemos un programa de investigación."
 cyber.835.c: "Traslademos a los afligidos a un planeta más cálido."
 cyber.835.tooltip: "Elimina los siguientes modificadores al rasgo de especie §Y$trait_cybernetic$§!:$TABBED_NEW_LINE$Habitabilidad base alpina/ártica o de tundra: §R-20%§!"
 cyber.840.name: "El destino de nuestros corazones"
 cyber.840.desc: "Nuestro pueblo siempre ha sido itinerante. Nómadas. Trotamundos... Mientras que para algunos viajar es un medio para llegar a un destino, para nosotros el viaje es un destino en sí mismo. Los aumentos nos han facilitado el viaje a nuevos mundos, pero también sirven para rastrear a aquellos que se apartaron del camino. Este cambio no ha sido del agrado de todos.\n\nCada vez más gente trastea con sus implantes y se desconecta de la red para preservar su privacidad. Por ahora es una tendencia de nicho, pero podría crear problemas."
 cyber.840.a: "Tienen razón. Prohibid la tecnología de rastreo."
 cyber.840.b: "No hay razón para alarmarse."
 cyber.840.c: "Ofrezcamos implantes no rastreables... por un precio."
 cyber.840.d: "Frenad a los disidentes. La tecnología de rastreo no se va a ninguna parte."
 cyber_wanderers: "Nómadas incansables"
 cyber_wanderers_desc: "Con lo difícil que es seguirlos, y lo fácil que es encontrarlos..."
 cyber_wanderers_tracked: "Atados en corto"
 cyber_wanderers_tracked_desc: "Nuestro pueblo aprecia su libertad y se opone firmemente a la tecnología de rastreo."
 cyber.855.name: "A la altura" #Idiom: if you achieve a required score, you 'make the grade'; similar to 'make the cut'
 cyber.855.intro.desc: "Microprocesadores cognitivos, tutores mejorados de IA, enzimas de diseño para potenciar la regeneración neuroplástica... Todo destinado a alumnos de preescolar."
 cyber.855.gov.desc: "$cyber.855.intro.desc$\n\nLa adaptación al progreso tecnológico ha supuesto una gran losa para los programas estatales de educación. La diferencia de rendimiento entre los que emplean implantes públicos y los que pueden permitirse lo último en tecnología se agranda cada vez más.\n\nPara mantener un sistema más equitativo, hará falta una gran inversión de recursos durante cinco años."
 cyber.855.corp.desc: "$cyber.855.intro.desc$\n\nUna buena educación puede resultar cara, y a muchos les cuesta cada vez más pagarla. La diferencia de rendimiento entre los que pueden permitirse lo último en aumentos y los que solo pueden confiar en modelos más desfasados se agranda cada vez más.\n\nA fin de detener la estratificación social, habría que realizar una gran inversión de cinco años en nuestro sistema educativo."
 cyber.855.a: "El coste es muy elevado."
 cyber.855.b: "La educación debe ser accesible para todos."
 cyber_education: "Educación aumentada"
 cyber_education.tt: "Iniciaremos un programa de cinco años para promover un sistema educativo sólido y basado en los aumentos."
 cyber.860.name: "Excelencia igualitaria"
 cyber.860.desc: "Nuestra inversión en aumentos educativos ha producido grandes resultados.\n\nEl acceso público a la cibernética de alta calidad ha creado una auténtica meritocracia académica en la que todos —sin importar su clase social— pueden alcanzar su máximo potencial. Los beneficios han tenido un gran impacto en las ciencias, mejorando el rendimiento e innovación de las investigaciones en todo el mundo."
 egalitarian_excellence: "Excelencia igualitaria"
 egalitarian_excellence.tt: "Una población aumentada con una buena educación es esencial para el progreso social y material."
 cyber.865.name: "Líderes excepcionales"
 cyber.865.desc: "La decisión de no financiar con dinero público los aumentos educativos ha resultado ser la idónea.\n\nNuestra sociedad cree en la excelencia del individuo. A pesar de las críticas por la creciente brecha social, la competencia académica ha creado a algunos de los líderes mejor instruidos y más productivos de la galaxia."
 exceptional_leaders: "Líderes excepcionales"
 exceptional_leaders.tt: "El desarrollo de los mejores talentos a nivel individual ha dado lugar a una generación de líderes de calidad excepcional."
 cyber.1005.name: "Rompiendo los límites"
 cyber.1005.desc: "\"Otro récord [Species.GetName] pulverizado\", este ha sido el titular que más se ha repetido en el mundo del deporte [Owner.GetAdjective]. Mientras los [GetAthletePlural] compiten entre ellos con modificaciones más modernas y sofisticadas, los límites del rendimiento deportivo no dejan de expandirse.\n\nMientras que los fans del \"deporte mejorado\" están extasiados con los resultados, un número creciente de devotos incondicionales han pedido que los individuos mejorados sean confinados en una división separada. Por otra parte, un último grupo desea limitar el número de aumentados en los deportes de equipo para no robar protagonismo a los [GetAthletePlural] orgánicos."
 cyber.1005.a: "Los no modificados ya tuvieron su momento de gloria."
 cyber.1005.a.tt: "Apoyaremos a los jugadores modificados para impulsar la innovación."
 cyber.1005.b: "Creemos una liga exclusiva para los atletas mejorados."
 cyber.1005.c: "Limitemos el número de [GetAthletePlural] modificados."
 cyber_athletes: "Atletas cibernéticos"
 cyber_athletes_desc: "Al promover a deportistas modificados, podremos realizar pruebas de campo con lo último en ciberware."
 cyber_athlete_leagues: "Ligas de atletas cibernéticos"
 cyber_athlete_leagues_desc: "Al separar a los deportistas aumentados de los \"naturales\", la competición será más justa para todos."
 limited_cyber_athletes: "Atletas cibernéticos limitados"
 limited_cyber_athletes_desc: "Al regular el número de deportistas modificados, todos los equipos tienen opciones de ganar."
 athlete_plural: "atletas"
 cyber.1010.name: "Se vende: el cielo"
 cyber.1010.desc: "§Y[sky_megacorp.GetName]§! nos ha ofrecido una lucrativa oportunidad. Desean promover su último producto; una bebida energizante llamada Plasma Sacia.\n\nCada vez que nuestros ciudadanos alcen la vista al cielo, en sus implantes oculares verán proyectados unos anuncios de la bebida. Los beneficios generados podrían destinarse a varios proyectos sociales.\n\nA pesar de la naturaleza invasiva de los anuncios, nos aseguran que la bebida es deliciosa y para nada tóxica."
 cyber.1010.a: "¡Bebe Plasma Sacia!" #Feel free to localize Plasma Quench to sound like a slimy energy drink. No need to make it word for word.
 cyber.1010.b: "¡El cielo no está en venta!"
 cyber.1010.c: "Ya estamos negociando las condiciones."
 cyber.1010.d: "No nos interesa."
 cyber.1015.desc: "§Y[sky_megacorp.GetName]§! vuelve con una nueva oferta a propósito de la mejor bebida energizante de la galaxia: Plasma Sacia. Tras el éxito de la venta del cielo que visualizaban los habitantes modificados, ahora nos han pedido añadir anuncios también en el mundo terrenal.\n\n¡\"[most_populous.GetName] sería la ubicación ideal para la campaña!\", declaró un portavoz de [sky_megacorp.GetName]. A fin de cuentas, ¿no es más justo que todos puedan acceder a tan grandiosas oportunidades?"
 cyber.1015.a: "¡Que fluya el Plasma!"
 cyber.1015.a.tt: "Añade carteles de neón gigantes por todo §Y[most_populous.GetName]§!."
 cyber.1015.b: "Nuestros cielos digitales no bastan."
 cyber.1015.c: "¡Que nuestro pueblo vuelva a ver libremente!"
 sold_sky_1: "Carteles digitales"
 sold_sky_1_desc: "¡Vender la atención virtual de nuestros ciudadanos ha sido una gran decisión!"
 sold_sky_1_mega: "$sold_sky_1$"
 sold_sky_1_mega_desc: "$sold_sky_1_desc$"
 sold_sky_2: "Carteles planetarios"
 sold_sky_2_desc: "Las élites de este planeta han elegido vender el cielo de sus ciudadanos a cambio de más recursos."
 sold_sky_2_mega: "$sold_sky_2$"
 sold_sky_2_mega_desc: "$sold_sky_2_desc$"
 cyber.1030.name: "Memorias ilícitas"
 cyber.1030.desc: "Con tantos implantes capaces de controlar experiencias sensoriales y emocionales, los individuos aumentados han recurrido a los eventos de la vida virtual como vía de escape y entretenimiento. Si bien los artistas de los engramas podrían estimular cualquier emoción, el devenir en la práctica es más siniestro.\n\nLos clubes de engramas de memoria están pagando grandes sumas por experiencias propias de gran carga emocional, como bodas o ritos de apareamiento, pero también suicidios, agresiones y asesinatos. Esto ha producido un repunte de delitos, pues ahora los criminales se graban cometiendo atrocidades, además de robar los implantes de sus víctimas tras sufrir una experiencia traumática.\n\n¿Cómo deberíamos gestionar esta preocupante tendencia?"
 cyber.1030.a: "Cerremos la industria. Es demasiado peligrosa."
 cyber.1030.a.tt: "Prohibiremos el entretenimiento con engramas."
 cyber.1030.b: "Gravemos la producción."
 cyber.1030.b.tt: "El entretenimiento con engramas será una fuente de ingresos."
 cyber.1030.c: "Encarcelemos a todo el que posea esas grabaciones."
 cyber.1030.c.tt: "Las fuerzas policiales irán a por todo el que se grabe cometiendo un delito."
 cyber.1030.d: "Suena a decadencia. Apoyémosla."
 cyber.1030.d.tt: "El estado apoyará placeres de toda índole."
 cyber.1030.e: "¿Una experiencia de muerte sin fin? Divino."
 cyber.1030.e.tt: "Esto hará que los sacerdotes de la muerte comprendan y guíen las experiencias de nuestros iniciados mortales."
 entertainment_crackdown: "Mano dura con los engramas"
 entertainment_crackdown_desc: "Se ha prohibido por ley el entretenimiento con engramas grabados para evitar posibles delitos."
 endorsed_entertainment: "Apoyo a los engramas"
 endorsed_entertainment_desc: "El entretenimiento con engramas grabados se ha extendido tras el apoyo estatal."
 illicit_entertainment: "Engramas ilícitos"
 illicit_entertainment_desc: "Las nuevas leyes del entretenimiento con engramas han reducido drásticamente la demanda por el servicio."
 decadent_entertainment: "Engramas decadentes"
 decadent_entertainment_desc: "Nuestro pueblo están gozando de un entretenimiento extremo gracias al entretenimiento con engramas. Al menos, hasta la siguiente moda de turno."
 deadly_entertainment: "Engramas mortales"
 deadly_entertainment_desc: "Los sacerdotes de la muerte ya saben cómo es perder la vida o quitarla. Ahora podrán guiar mejor al pueblo, en especial a nuestros iniciados mortales."
 cyber.1055.name: "Juego de espías"
 cyber.1055.desc: "En un terrible alarde de insensatez, un cadete naval ha filtrado información clasificada. El cadete, aficionado a los simuladores de combate en línea, se enzarzó en una discusión con otros jugadores sobre la velocidad angular de las torretas de nuestros destructores.\n\nPara respaldar su postura, el cadete subió varios planos clasificados de nuestras naves, los cuales se filtraron rápidamente a toda la red galáctica. Aunque ya se ha detenido al culpable, en el Consejo hay voces que piden la prohibición total de los juegos en línea a raíz de este incidente."
 cyber.1055.a: "De todas formas, ya tocaba modernizar la flota."
 cyber.1055.b: "Reforzad las medidas de seguridad de nuestra red."
 cyber.1055.c: "El Consejo tiene razón: debemos prohibir los juegos."
 cyber.1055.d: "Camuflad la fuga de información con informes contradictorios."
 cyber_breach_overcome: "Juego de espías: modernización de la flota"
 cyber_breach_overcome_desc: "Lo hecho, hecho está. Trabajaremos para modernizar nuestras flotas y hacer que los esquemas filtrados queden obsoletos."
 cyber_breach_forgive: "Juego de espías: actualizaciones de seguridad"
 cyber_breach_forgive_desc: "En respuesta a la filtración, hemos actualizado nuestros protocolos de seguridad. Dicho esto, los jugadores no suponen una amenaza para la seguridad nacional. No hay necesidad de reaccionar exageradamente ante un absurdo descuido."
 cyber_breach_ban: "Juego de espías: prohibición total"
 cyber_breach_ban_desc: "Además de reforzar nuestra seguridad operativa, hemos prohibido los juegos en línea."
 cyber.1055.leak.tt: "Cada miembro de la §Ycomunidad galáctica§! recibe información §Ymilitar§! de nivel §Hmedio§! sobre §Y[Root.GetName]§! durante §Y720§! días."
 cyber.1055.minorleak.tt: "Cada miembro de la §Ycomunidad galáctica§! recibe información §Ymilitar§! de nivel §Rbajo§! sobre §Y[Root.GetName]§! durante §Y360§! días."
 has_tradition_subterfuge_tt: "Esta opción está disponible porque hemos completado el árbol de tradiciones §YSubterfugio§!."
 cyber.1205.name: "Censura sensorial"
 cyber.1205.desc: "La última generación de ciberware sensorial permite al usuario bloquear sensaciones no deseadas. Desde olores desagradables a imágenes indecorosas, todo puede atenuarse, enmascararse o incluso borrarse por completo de la percepción del usuario. Entre los grupos más conservadores de nuestra sociedad crece la preocupación por los efectos que esta censura pueda tener en la conciencia de los ciudadanos."
 cyber.1205.a: "Debemos afrontar la verdad de nuestras vidas."
 cyber.1205.b: "Todo el mundo tiene derecho a una feliz ignorancia."
 cyber.1205.c: "Los retoques cosméticos están bien, la censura es arriesgada."
 cyber.1205.d: "Supervisaremos sus sentidos."
 cyber_censure_truth: "Censura sensorial: prohibida"
 cyber_censure_truth_desc: "No está permitido aplicar filtros de percepción que bloqueen elementos de la vida real. Hay que enfrentarse a la verdad en todo momento."
 cyber_censure_total: "Censura sensorial: total"
 cyber_censure_total_desc: "Si la realidad te incomoda, ¿por qué no bloquear los elementos ofensivos? No es necesario presenciar delitos, miseria o prejuicios."
 cyber_censure_partial: "Retoques sensoriales"
 cyber_censure_partial_desc: "Hemos autorizado que las personas utilicen retoques de percepción en sus implantes. De este modo, pueden inyectar colores vivos y efectos en su existencia, que de otro modo sería monótona."
 cyber_censure_authoritarian: "Censura sensorial impulsada por el estado"
 cyber_censure_authoritarian_desc: "Estamos supervisando la forma en que nuestro pueblo percibe la realidad. Al bloquear los mensajes y actores disidentes de la vida de nuestros leales ciudadanos, los protegemos de quienes quieren desorientarlos."
 cyber.1210.name: "Pirateo con mensajes subliminales"
 cyber.1210.desc: "Una tendencia reciente en la publicidad de ciertos grupos clandestinos y empresas ambiciosas consiste en implantar mensajes subrepticios en el ciberware del usuario. Los recuerdos falsos, las reacciones hormonales selectivas y las sugerencias para dormir se están convirtiendo en algo habitual. Algunos agentes políticos preocupados nos han planteado el problema y abogan por la prohibición o, al menos, la regulación de estos mensajes invasivos."
 cyber.1210.a: "Tales prácticas no pueden tolerarse."
 cyber.1210.b: "¡Muy ingenioso! Autorizadlo."
 cyber.1210.c: "Regulad estas prácticas para que se hagan solo con licencia."
 cyber.1210.d: "Usadlas para difundir la fe."
 cyber_subliminhack_banned: "Pirateo subliminal: prohibido"
 cyber_subliminhack_banned_desc: "Hemos prohibido el envío de mensajes subliminales insidiosos a través del ciberware."
 cyber_subliminhack_allowed: "Pirateo subliminal: autorizado"
 cyber_subliminhack_allowed_desc: "Hemos autorizado el envío de mensajes subliminales insidiosos a través del ciberware. Todo es justo en el mercado."
 cyber_subliminhack_licensed: "Pirateo subliminal: con licencia"
 cyber_subliminhack_licensed_desc: "Estamos vendiendo licencias para permitir el envío de mensajes subliminales insidiosos a través del ciberware."
 cyber_subliminhack_hallowed: "Evangelización subliminal"
 cyber_subliminhack_hallowed_desc: "Estamos utilizando mensajes subliminales insidiosos a través del ciberware para difundir nuestra fe."
 cyber.1255.name: "Fallo de ciberseguridad"
 cyber.1255.intro: "Recientemente, varios documentos clasificados han sido descargados ilegalmente desde un servidor remoto. Nuestros operativos de seguridad aseguran que todos los cortafuegos primarios y secundarios permanecen intactos, y hasta ahora no hay pruebas de un ciberataque externo.\n\n"
 cyber.1255.gov.desc: "$cyber.1255.intro$La conclusión es inequívoca: tenemos una filtración y, dada la naturaleza confidencial de la información robada, debe de tratarse de alguien con autorización de alto nivel."
 cyber.1255.hack.desc: "$cyber.1255.intro$La conclusión es inequívoca: tenemos una filtración que pone en duda nuestra decisión de adoptar el aumento cibernético de código abierto."
 cyber.1255.a: "Iniciad una investigación."
 leak_investigation: "Investigación de la filtración"
 leak_investigation_desc: "Para descubrir la fuente de la filtración, tendremos que investigar a todos los que tengan implantes cibernéticos. Es probable que el proceso sea... intrusivo."
 cyber.1260.name: "Neuromancia"
 cyber.1260.desc: "La investigación sobre nuestra filtración de ciberseguridad ha concluido.\n\nCiertos oficiales aumentados y de alto nivel del gobierno han sido objeto de ataques y su wetware neurológico ha sido pirateado. Manipulados por agentes externos y obligados a actuar contra su voluntad, estos individuos no recuerdan nada de lo ocurrido.\n\nAunque ahora conocemos la causa de la filtración, no estamos cerca de descubrir quién (o qué) ha sido el responsable. Sin embargo, implantando subrepticiamente datos falsos en las mentes de los funcionarios afectados, podríamos rastrear la filtración hasta su origen."
 leak_distrust: "Títeres entre nosotros"
 leak_distrust_desc: "¿Cómo podemos esperar que la gente tenga fe en nuestro liderazgo cuando cualquiera de nosotros podría ser un títere?"
 leader_trait_hacked: "Cibertítere"
 leader_trait_hacked_desc: "Ya no podemos confiar en este/a líder. Su wetware neurológico ha sido pirateado por una fuente desconocida."
 hacked_leaders.tt: "Un número al azar de líderes cíborg han adquirido el rasgo §Y$leader_trait_hacked$§!."
 cyber.1265.name: "Secuestradores de mentes" #Playing on the word 'hijacker'
 cyber.1265.desc: "Los tenemos.\n\nHemos descubierto a los criminales responsables de estos ciberataques sin precedentes. Sin otro objetivo que sembrar el caos, estos autoproclamados \"Secuestradores de mentes\" lograron burlar nuestros sistemas de seguridad con una facilidad vergonzosa. Aunque los cabecillas ya han sido detenidos, aún debemos decidir qué hacer con los oficiales afectados.\n\nLa solución más sencilla es instalar un cortafuegos personalizado alrededor de los implantes pirateados. Una opción más limpia, aunque más arriesgada, sería un reinicio. Accediendo a sus funciones cognitivas básicas, los líderes en cuestión podrían \"apagarse\" a la fuerza mientras se les instala un nuevo sistema operativo."
 cyber.1265.a: "Instalad el cortafuegos."
 cyber.1265.b: "Reiniciad a los oficiales."
 cyber.1265.c: "Nos vigilan. Instalad el cortafuegos."
 cyber.1270.name: "Reiniciados y renovados"
 cyber.1270.desc: "El reinicio de los oficiales afectados ha tenido consecuencias inesperadas: se ha borrado todo rastro del pirateo neurológico, pero también una gran parte de sus conocimientos y experiencia acumulados.\n\nA pesar de este contratiempo, al \"empezar de cero\", estos líderes informan de profundos sentimientos de renovación profesional y personal. Al obligarnos a tomar medidas tan drásticas, puede que los piratas informáticos nos hayan hecho un favor sin querer."
 rebooted_leaders: "Elimina todos los §Hrasgos negativos§! de los líderes que tienen el rasgo §Y$leader_trait_hacked$§!.\nPor cada rasgo eliminado, se perderán §R300§! de experiencia."
 leader_hack_resolution: "Vigilancia meticulosa"
 cyber.1275.name: "Cortafuegos neurológicos"
 cyber.1275.desc: "Nuestras mentes están a salvo.\n\nLos ingenieros de wetware han diseñado con éxito un cortafuegos neurológico. Para mantener nuestra seguridad colectiva, el programa se instalará inmediatamente en todos los oficiales actuales y futuros. Aunque esto tendrá un impacto perjudicial en la funcionalidad cognitiva de base de nuestra clase dirigente, el proyecto nos ha permitido profundizar significativamente en la ciencia de la protección de los datos."
 cyber.1275.a: "La seguridad es lo primero."
 leader_trait_firewalled: "Cortafuegos neurológico"
 leader_trait_firewalled_desc: "Aunque están a salvo de los ataques cibernéticos, nuestros líderes aprenden con menos eficacia."
 hacked_and_firewalled_leaders.tt: "Elimina el rasgo §Y$leader_trait_hacked$§! y aplica el rasgo §Y$leader_trait_firewalled$§! a todos los líderes cíborg."
 #FINAL EVENT #
 #DEMOCRATIC
 cyber.1505.name: "Sociedad 2.0"
 cyber.1505.desc.individualist: "El proceso democrático es la base sobre la que se ha construido esta sociedad. Es lógico reforzar estos cimientos. Nuestra nueva cibernética nos permite decidir tener voz y voto en todos los asuntos sociales, grandes o pequeños, ofreciendo al individuo oportunidades sin precedentes para expresar su opinión. La riqueza de datos que esto aporta es inimaginable y las posibilidades, ilimitadas."
 cyber.1505.desc.collectivist: "Transmitir abiertamente tus pensamientos a otros §Y[Species.GetNamePlural]§! es una idea inquietante. Pero la conmoción inicial pronto se ve sustituida por una sensación de confianza y seguridad en el entorno. Somos conscientes de lo que hace la persona que tenemos al lado, y ella es consciente de nosotros. La comunicación se produce instantáneamente, sin palabras, con un simple pensamiento. Para proteger esta claridad mental, el cibercerebro ha sido instruido para anular las emociones, evitando así que se pierda lo realmente importante."
 cyber.1505.desc.neutral: "A pesar de las interminables consultas, rondas de votaciones y animados discursos, la nación sigue indecisa acerca de los retos de la sociedad cibernética. Antes de que el proceso se convierta en una discusión conflictiva, los dirigentes deben intervenir.\n\nPodemos aprovechar esta oportunidad para modificar nuestra cibernética y ponerla al servicio del proceso democrático o adoptar un enfoque más radical en el que las personas compartan sus pensamientos a través de su ciberware. Esto último también requeriría que el cibercerebro suprimiera las emociones básicas para evitar que los pensamientos espontáneos forzados perturbaran el entorno inmediato."
 cyber.1505.a: "Permitid la votación cibercerebral en tiempo real."
 cyber.1505.a.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_individualist']\n$unlock_edict_legislative_chorus$"
 cyber.1505.b: "Enlazad los cibercerebros para compartir experiencias."
 cyber.1505.b.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_collectivist']\n$unlock_edict_self_preservation_override$"
 cyber.1505.c: "$cyber_keep_auth_option$"
 cyber.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 cyber.1510.name: "Poder reestructurado"
 cyber.1510.desc.individualist: "Ha quedado claro que la población desea destacar y competir entre sí. Nuestros planes para apoyar este comportamiento hipercompetitivo con un sistema gamificado, que promete movilidad social y baratijas de escaso valor a cambio de una mayor productividad, se ajustarán bien a su deseo."
 cyber.1510.desc.collectivist: "Que la gente tenga un sentimiento de comunidad es más importante que la movilidad social individual. Así que, en lugar de aprovechar la competitividad, aprovecharemos el potencial del cerebro aumentado dormido. Su potencia computacional está conectada de forma inalámbrica a una estación base mediante una conexión cibernética, que alimenta de tareas computacionales al sujeto durante toda la fase de reposo."
 cyber.1510.desc.neutral: "Nuestros ciudadanos no se han pronunciado a favor de una sociedad más competitiva o comunitaria. Como sus superiores, nosotros decidiremos ahora el mejor curso de acción para ellos.\n\nPodemos crear un sistema gamificado altamente competitivo en el que rendir mejor que sus compañeros podría suponer una trayectoria ascendente para sus carreras, o bien aprovechar la potencia de cálculo de toda la comunidad a través de un enlace cibernético para conectar sus cerebros dormidos a nuestras granjas de servidores."
 cyber.1510.a: "Que se peleen para ganarse los favores."
 cyber.1510.a.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_individualist']\n$unlock_edict_battle_royale$"
 cyber.1510.b: "Hacedlos trabajar mientras duermen."
 cyber.1510.b.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_collectivist']\n$unlock_edict_stately_acclaim$"
 cyber.1510.c: "$cyber_keep_auth_option$"
 cyber.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 cyber.1515.name: "Masa controlada"
 cyber.1515.desc.individualist: "Los §Y[Species.GetAdj]§! están abrazando un mundo en el que los aumentados pueden expresar su identidad de formas totalmente nuevas.\n\nPero la permisividad es solo una fachada, ya que los algoritmos de vigilancia mejorados del implante controlan ahora a cada individuo, detectando los pensamientos discrepantes en el momento en que se conectan las sinapsis cerebrales."
 cyber.1515.desc.collectivist: "La unión hace la fuerza y su impulso unifica frente a la adversidad. Cada §Y[Species.GetAdj]§! cibermejorado lucha por un futuro mejor, confiando en que la persona que tiene al lado hará lo mismo.\n\nNuestro pueblo puede estar tranquilo sabiendo que la radiante personalidad y la voluntad de hierro del/de la §Y[Ruler.GetTitle] [Ruler.GetName]§! lo guía hacia el futuro."
 cyber.1515.desc.neutral: "Mientras el pueblo sigue vacilando en la encrucijada, nuestro/a §Y[Ruler.GetTitle] [Ruler.GetName]§! debe aprovechar la oportunidad única que ofrecen los aumentos y tomar una decisión.\n\n¿Deberían permitírsele al pueblo algunas libertades personales mientras lo supervisan a través de sus implantes o dejamos que la voluntad de la radiante personalidad de su líder influya en ellos?"
 cyber.1515.a: "Moderad la libertad con vigilancia."
 cyber.1515.a.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_individualist']\n$unlock_edict_self_indictment_protocol$"
 cyber.1515.b: "Nuestro/a líder nos guiará."
