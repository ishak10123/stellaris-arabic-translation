 extreme_frontiers.2005.title: "Recursos tóxicos"
 extreme_frontiers.2005.desc.common: "Nuestro primer despliegue de §Yterraformación por georradiación§! en §Y[target.GetName]§! ha concluido.\n\nAl reducir la superficie a un páramo tóxico e inhabitable, hemos extraído una cantidad de materiales sin precedentes, y todo gracias a las mejoras que hemos hecho en el diseño de la matriz de georradiación."
 extreme_frontiers.2005.desc.industrialist: "Este hito marca el inicio de una nueva era de explotación y lucro para nuestro imperio."
 extreme_frontiers.2005.a.default: "Fantástico"
