l_spanish:
 #############
 # Anomalies #
 #############
 EXTREME_FRONTIERS_TITLE: "Extreme Frontiers" # Do not translate
 # PULSATING OBJECT
 PULSATING_OBJECT_TOXIC_CAT: "Objeto pulsante"
 PULSATING_OBJECT_GAS_GIANT_CAT: "Objeto pulsante"
 PULSATING_OBJECT_BARREN_CAT: "Objeto pulsante"
 PULSATING_OBJECT_BARREN_COLD_CAT: "Objeto pulsante"
 PULSATING_OBJECT_FROZEN_CAT: "Objeto pulsante"
 PULSATING_OBJECT_MOLTEN_CAT: "Objeto pulsante"
 anomaly_pulsating_object_desc: "Los primeros escáneres de §Y[this.GetName]§! han descubierto un curioso artefacto volador flotando por la troposfera, encogiéndose e hinchándose conforme cambia de posición. Se necesita investigarlo más a fondo para definir su naturaleza."
 extreme_frontiers.100.title: "Globo climatológico antiguo"
 extreme_frontiers.100.desc: "§Y[Leader.GetName]§! ha identificado el misterioso artefacto volador de §Y[from.GetName]§! como un arcaico globo climatológico. Cualquier marca que pudiera haber revelado su origen fue borrada tiempo ha por las condiciones atmosféricas extremas del planeta.\n\nLa datación radiométrica sugiere que ha estado presente en la atmósfera de [from.GetName] durante más de un siglo, fluctuando en tamaño mientras viaja con parsimonia a través de las variaciones de presión idiosincrásicas del planeta.\n\nMilagrosamente, los paneles de energía solar siguen funcionando y su conjunto de sensores ahora contiene un siglo de valiosos datos atmosféricos que serán de gran interés para nuestros [Root.Owner.GetResearchers]."
 # MOLTEN METAL OCEAN
 MOLTEN_METAL_OCEAN_CAT: "Corrientes fundidas extremas"
 anomaly_molten_metal_ocean_desc: "Los primeros estudios en la superficie de §Y[from.GetName]§! han detectado frecuentes tsunamis de lava sobrecalentada con una alta concentración de metales pesados. Se necesitan más análisis para comprender este fenómeno por completo."
 extreme_frontiers.110.title: "Tsunamis metálicos"
 extreme_frontiers.110.desc: "§Y[Leader.GetName]§! ha confirmado que los océanos de lava de §Y[from.GetName]§! contienen formas excepcionalmente puras de casi todos los metaloides raros conocidos en nuestro catálogo elemental.\n\nEsta colección condensada de metales líquidos da lugar a campos electromagnéticos altamente volátiles, lo que produce tsunamis frecuentes de metal fundido.\n\nA través de los modelos predictivos, hemos identificado pausas breves pero regulares en la intensidad de las olas que se pueden aprovechar para recolectar estos depósitos excepcionalmente ricos."
 # GREAT BLUE SPOTS
 GREAT_BLUE_SPOTS_CAT: "Grandes manchas azules"
 great_blue_spots_desc: "La superficie de §Y[from.GetName]§! presenta dos decoloraciones distintivas lo suficientemente grandes como para ser visibles desde el espacio que se mueven en tándem a gran velocidad. Estas formaciones de color azul son lo suficientemente interesantes como para justificar un estudio más exhaustivo."
 extreme_frontiers.120.title: "Supertormentas simbióticas"
 extreme_frontiers.120.desc: "Las grandes manchas azules de §Y[from.GetName]§! son, en realidad, dos supertormentas simbióticas: un ciclón y un anticiclón que se sustentan mutuamente en perfecto equilibrio.\n\nLas tormentas son de gran magnitud, con vientos que rompen la barrera del sonido con frecuencia, generando potentes explosiones sónicas. En su interior hay grandes cantidades de polvo de cobalto, lo que les da su color distintivo.\n\n§Y[Leader.GetName]§! estima que llevan arreciando desde hace más de un siglo. Los minerales que se han acumulado en la atmósfera superior deberían poder recuperarse fácilmente con una estación minera."
 # FROZEN INFERNO
 FROZEN_INFERNO_CAT: "Picos de calor"
 frozen_inferno_desc: "Los escaneos iniciales de §Y[from.GetName]§! muestran picos de calor extremadamente erráticos en este cuerpo celeste congelado. Estas temperaturas anómalas requieren una investigación más a fondo."
 extreme_frontiers.130.title: "Infierno congelado"
 extreme_frontiers.130.desc: "§Y[Leader.GetName]§! concluyó su investigación sobre los erráticos picos de calor del mundo helado de §Y[from.GetName]§!.\n\nBajo la interminable tundra de la superficie del planeta se encuentran depósitos pirofóricos altamente reactivos. Al principio, estas sustancias yacían inertes en las profundidades del hielo, y poco a poco se filtraron al exterior conforme las capas de hielo continentales se desplazaban y se rompían.\n\nAl ascender a la superficie, estos gases ultrainflamables se han descongelado y son propensos a la ignición repentina en la atmósfera rica en oxígeno de [from.GetName], dando lugar a frecuentes incendios en la superficie del planeta.\n\nCon el equipamiento adecuado, estas sustancias excepcionalmente combustibles pueden extraerse y emplearse en otros lugares."
 # POISONED ATMOSPHERE
 POISONED_ATMOSPHERE_CAT: "Atmósfera venenosa"
 poisoned_atmosphere_desc: "Se han detectado altas concentraciones de moléculas orgánicas venenosas en la atmósfera superior de §Y[from.GetName]§!."
 extreme_frontiers.140.title: "Atmósfera venenosa"
 extreme_frontiers.140.desc.hive_mind: "§Y[from.GetName]§! es el hogar de una notable especie de liquen que expulsa moléculas ultratóxicas a la atmósfera como método de defensa ante depredadores.\n\nLos estudios del registro fósil sugieren que [from.GetName] llegó a tener una fauna de lo más diversa que el liquen acabó matando al aumentar gradualmente los niveles de arsénico y talio en la atmósfera, a un ritmo al que la mayoría no pudo adaptarse.\n\n§Y[Leader.GetName]§! ha descubierto otro organismo vivo, una especie de gran reptiloide que ha logrado sobrevivir a tales condiciones gracias a una glándula de desintoxicación excepcionalmente eficiente.\n\nUn estudio más detallado de este notable órgano podría arrojar datos sobre la desintoxicación atmosférica."
 extreme_frontiers.140.desc.default: "$extreme_frontiers.140.desc.hive_mind$ Los primeros experimentos también indican que los compuestos únicos de los venenos podrían reutilizarse para la industria cosmética."
 extreme_frontiers.140.a: "Su potencial es muy interesante..."
 extreme_frontiers.140.b: "Vamos a convertirlo en perfume."
 DETOXIFICATION_GLAND_PROJECT: "Estudios de las glándulas de desintoxicación"
 DETOXIFICATION_GLAND_PROJECT_DESC: "Una notable especie de reptiloide medra en la atmósfera tóxica de §Y[from.GetName]§! gracias a un órgano interno único que descompone toxinas extremas y las convierte en nutrientes útiles. Habría que realizar un estudio más detallado de este organismo."
 extreme_frontiers.145.title: "Datos de desintoxicación"
 extreme_frontiers.145.desc: "Gracias al estudio intensivo de las glándulas del reptiloide de §Y[from.GetName]§!, §Y[Leader.GetName]§! ha descubierto los secretos biológicos de su notable resistencia a la toxicidad del planeta.\n\nEste complejo órgano produce compuestos que actúan como agentes neutralizantes de la atmósfera tóxica, impidiendo que el sistema circulatorio del reptiloide absorba las toxinas. Esta glándula es sumamente adaptable y es incluso capaz de neutralizar los venenos más letales que hemos creado en laboratorio.\n\nEstos extraordinarios hallazgos transformarán nuestros enfoques sobre desintoxicación atmosférica."
 # GLIMPSE OF THE CORE
 GLIMPSE_CORE_CAT: "Un atisbo del núcleo"
 glimpse_the_core_desc: "Unos extraños movimientos en las capas externas gaseosas de §Y[from.GetName]§! están provocando la apertura de respiraderos de gran profundidad que exponen el núcleo sólido del planeta en breves intervalos. Este notable fenómeno merece más estudios."
 extreme_frontiers.150.title: "Núcleo orgánico"
 extreme_frontiers.150.desc: "Al enviar una sonda a las profundidades de uno de los respiraderos temporales de §Y[from.GetName]§!, §Y[Leader.GetName]§! descubrió que el núcleo del planeta alberga una especie de organismo unicelular sin precedentes.\n\nEstas robustas células parecen perfectamente adaptadas para sobrevivir bajo presiones extremas, y su reproducción estacional libera grandes cantidades de hidrógeno. [Leader.GetName] ha resuelto que así se preservan las capas gaseosas de hidrógeno del planeta.\n\nExterminar estos organismos provocaría la disipación de estas capas externas, lo que daría lugar a un planeta rocoso colonizable."
 extreme_frontiers.150.a: "Exterminadlas."
 extreme_frontiers.150.b: "Una oportunidad de estudio única."
 PURIFY_CORE_PROJECT: "Purificar el núcleo"
 PURIFY_CORE_PROJECT_DESC: "Las capas externas gaseosas de §Y[from.GetName]§! se preservan gracias a la bioquímica única de los organismos unicelulares que habitan su núcleo. Exterminarlos disiparía estos gases, lo que nos dejaría un planeta rocoso colonizable."
 extreme_frontiers.155.title: "Un mundo nuevo"
 extreme_frontiers.155.desc: "§Y[Leader.GetName]§! ha enviado una sonda armada a una de las aberturas de la superficie de §Y[from.From.GetName]§!. Cuando llegó al núcleo, liberó una carga tóxica que infectó y exterminó a los organismos unicelulares nativos.\n\nHemos observado cómo las capas externas gaseosas de [from.From.GetName] se disipaban gradualmente en el vacío, dejando tras de sí un pequeño planeta rocoso."
 extreme_frontiers.155.a: "Una hazaña impresionante."
 # OPTICAL PHENOMENA
 OPTICAL_PHENOMENA_CAT: "Superficie resplandeciente"
 optical_phenomena_desc: "Al analizar las imágenes de §Y[from.GetName]§!, estamos apreciando fenómenos ópticos de lo más vivos en toda la superficie del planeta, si bien la distancia orbital impide discernir la causa de estos patrones de color."
 extreme_frontiers.160.title: "Láminas de hielo arcoíris"
 extreme_frontiers.160.desc.default: "Una inspección más detallada de la superficie de §Y[from.GetName]§! ha revelado la causa de los fenómenos ópticos que apreciamos en nuestros estudios orbitales.\n\nLas condiciones atmosféricas han pulido grandes secciones del permafrost del planeta hasta darle un brillo transparente, revelando extensas redes cristales multicolores por debajo. Al observarlos desde la distancia, estos fenómenos naturales producen un efecto caleidoscópico."
 extreme_frontiers.160.desc.machine: "$extreme_frontiers.160.desc.default$\n\nSi bien son estéticamente agradables, los ricos depósitos minerales que se encuentran en su interior son el verdadero objetivo de nuestra atención."
 extreme_frontiers.160.tooltip: "Desbloquea la §Ydecisión planetaria§! §H$decision_prismatic_ice_exhibit$§! con los siguientes efectos:\n£amenities£ $MOD_PLANET_AMENITIES_MULT$: §G+25%§!\n$mod_planet_jobs_unity_produces_mult$: §G+25%§!"
 decision_prismatic_ice_exhibit: "Exhibición de hielo prismático"
 decision_prismatic_ice_exhibit_desc: "Láminas de hielo cristalino extraídas que producen un fascinante efecto caleidoscópico y pueden exhibirse un durante un periodo determinado de tiempo."
 prismatic_ice_max_3_times_pass: "Se puede llevar a cabo un máximo de §Y3§! veces."
 prismatic_ice_max_3_times_fail: "$TRIGGER_FAIL$Se puede llevar a cabo un máximo de §Y3§! veces."
 prismatic_ice_max_3_times_pass_with_var: "$TRIGGER_PASS$$prismatic_ice_max_3_times_pass$ (actual: §Y[owner.prismatic_ice_exhibit_happened]§!)"
 exhibiting_prismatic_ice: "Exhibición de hielo prismático"
 exhibiting_prismatic_ice_desc: "Láminas de hielo cristalino extraídas que producen un fascinante efecto caleidoscópico y pueden exhibirse un durante un periodo determinado de tiempo."
 # PLASMA VOLCANOES
 PLASMA_VOLCANO_CAT: "Plasma orbital"
 plasma_volcano_desc: "Tenemos confirmación visual del plasma volátil sobrecalentado y lanzado a la atmósfera superior de §Y[from.GetName]§!.\n\nLa densa ceniza volcánica de la atmósfera nos impide identificar el origen de estos proyectiles desde la órbita. Un estudio más detenido probablemente resultará peligroso."
 extreme_frontiers.170.title: "Volcanes de plasma"
 extreme_frontiers.170.desc: "§Y[Leader.GetName]§! ha descubierto la causa de las erupciones de plasma sobrecalentado en §Y[from.GetName]§!.\n\nEl singular campo magnético del planeta facilita la reacción entre materiales ionizados en las profundidades del manto planetario, lo que produce cámaras volcánicas de plasma altamente presurizado.\n\nCuando las inestables placas tectónicas del planeta ceden, este plasma se propulsa violentamente hacia arriba como un proyectil letal y se prende con los gases de la atmósfera para generar otras explosiones. Nuestros especialistas en armas están deseosos de aplicar estos principios a nuestro propio armamento de plasma."
 extreme_frontiers.170.desc.negative: "Desafortunadamente, los peligros que entraña esta investigación han dejado a [Leader.GetName] con"
 extreme_frontiers.170.desc.traumatized: "$extreme_frontiers.170.desc.negative$ un trauma grave."
 extreme_frontiers.170.desc.maimed: "$extreme_frontiers.170.desc.negative$ lesiones físicas."
 # BLACK CLOUDS
 BLACK_CLOUDS_CAT: "Nubarrones negros"
 black_clouds_desc: "Se han observado densas nubes negras en la atmósfera de §Y[from.GetName]§! que se mueven en patrones erráticos, independientemente de la velocidad o la dirección del viento planetario. Al analizar las imágenes, solo aparecen brevemente, y siempre en el mismo punto del ciclo día-noche del planeta."
 extreme_frontiers.180.title: "Enjambres insectoides"
 extreme_frontiers.180.desc: "Las inusuales nubes negras de §Y[from.GetName]§! son en realidad densos enjambres de grandes insectos carnívoros.\n\nEstos depredadores alados anidan en las fisuras de las rocas y emergen una vez al día para devorar la escasa materia orgánica que hay en la superficie del planeta.\n\nGracias a un potente metabolismo que revierte la descomposición celular al alimentarse, estos artrópodos son capaces de prolongar su vida útil indefinidamente, siempre que consuman nutrientes regularmente."
 extreme_frontiers.180.desc.altered_metabolism: "Durante el análisis de campo, uno de los especímenes mordió a [Leader.GetName] en su [Leader.Species.GetHandName] y le provocó una respuesta metabólica digna de mención. Esta singular especie tiene mucho que enseñarnos sobre la capacidad regenerativa de las células orgánicas."
 extreme_frontiers.180.b: "Desenterremos a todos para consumirlos."
 leader_trait_altered_metabolism: "Metabolismo alterado"
 leader_trait_altered_metabolism_desc: "La exposición a agentes desconocidos durante el trabajo de campo ha dejado un efecto duradero en este líder."
 # SUBGLACIAL VIBRATIONS
 SUBGLACIAL_VIBRATIONS_CAT: "Vibraciones subglaciales"
 subglacial_vibrations_desc: "Bajo la superficie congelada e inerte de §Y[from.GetName]§! yace un vasto océano subglacial. Se han detectado vibraciones profundas y retumbantes bajo el permafrost que no parecen ser de naturaleza sísmica."
 extreme_frontiers.190.title: "Pinnípedos gigantescos"
 extreme_frontiers.190.desc: "Gracias a la ecolocalización en aguas profundas y a la telemetría sísmica, hemos localizado el origen de las vibraciones profundas en §Y[from.GetName]§!. Su océano subglacial de nitrógeno líquido alberga vastas manadas de pinnípedos gigantescos que se han adaptado a la vida en este entorno hostil.\n\nEstas extraordinarias criaturas poseen el tamaño y la masa de una pequeña embarcación de transporte. Para comunicarse, emiten un potente zumbido de baja frecuencia capaz de reverberar a escala planetaria. Una grasa excepcionalmente rica en colágeno los protege de la congelación y las quemaduras criogénicas, además de amplificar sus llamadas a través del mar.\n\nAl carecer de depredadores naturales en este ecosistema aislado, estos grandes animales son curiosos, muy dóciles y pueden atraerse fácilmente a la superficie mediante la reproducción de sus vocalizaciones idiosincrásicas."
 extreme_frontiers.190.a: "Un descubrimiento único."
 extreme_frontiers.190.a.tt: "Desbloquea el edificio: ['building:building_pinniped_sanctuary']"
 extreme_frontiers.190.b: "Una presa fácil."
 building_pinniped_sanctuary: "Santuario de pinnípedos"
 building_pinniped_sanctuary_desc: "Un santuario para los gigantescos pinnípedos capturados en los océanos de nitrógeno líquido de [event_target:pinnipeds_home_planet.GetName]."
 # ELECTRIC WATERS
 ELECTRIC_WATERS_CAT: "Aguas eléctricas"
 electric_waters_desc: "Los análisis orbitales de §Y[from.GetName]§! detectan unas erráticas señales eléctricas en las profundidades de los mares helados del planeta.\n\nSeguir estudiando este fenómeno acuático arrojará más información."
 extreme_frontiers.200.title: "Coral de alto voltaje"
 extreme_frontiers.200.desc: "§Y[Leader.GetName]§! ha identificado el origen de las corrientes eléctricas en las profundidades marinas de §Y[from.GetName]§!.\n\nEl fondo oceánico alberga una compleja especie de coral de aguas frías con capacidades electrogenéticas. Esta especie emplea orgánulos especializados para generar corriente y atraer a los microorganismos como medio de sustento y comunicación.\n\nNuestras sondas de estudio actúan como un estimulante para el coral, que reacciona aumentando su producción eléctrica cada vez que cambiamos la frecuencia de transmisión.\n\nAl modular cuidadosamente nuestras interacciones con esta especie de aguas profundas, podemos aumentar la producción de energía del planeta sin que el ecosistema se vea perjudicado."
 # OBSIDIAN PLANET
 OBSIDIAN_PLANET_CAT: "Panorama reluciente"
 obsidian_planet_desc: "Los análisis visuales de §Y[from.GetName]§! muestran láminas continentales de obsidiana que cubren las superficies estériles del planeta, con fuertes trazas de azufre que persisten en la atmósfera superior.\n\nUn estudio geológico más exhaustivo nos dará más información."
 extreme_frontiers.210.title: "Páramo de obsidiana"
 extreme_frontiers.210.desc: "Después del análisis sedimentario de §Y[from.GetName]§!, hemos descubierto que este mundo, antaño volcánico, experimentó una congelación repentina que transformó la lava de la superficie en una capa de vidrio volcánico.\n\nLos numerosos cráteres de impacto en la superficie del planeta apuntan al impacto de cuerpos celestes externos, como una tormenta de meteoritos. En el interior de estas formaciones de obsidiana hay grandes burbujas de gases sulfúricos contenidos que provienen de los respiraderos volcánicos, ahora sellados por la congelación repentina.\n\nMediante una extracción precisa, podríamos recolectar estos recursos para nuestros propios fines."
 # SHEARING FORCE
 SHEARING_FORCE_CAT: "Comunicaciones perdidas"
 shearing_force_desc: "Las sondas de observación desplegadas en la atmósfera de §Y[from.GetName]§! han cesado todas las comunicaciones. Se desconoce la ubicación exacta de nuestro hardware.\n\nSe necesita una investigación más detallada del planeta para recuperar los datos."
 extreme_frontiers.220.title: "Fuerza de corte"
 extreme_frontiers.220.desc: "Hemos identificado la causa de la desaparición de nuestras sondas en §Y[from.GetName]§!.\n\nLos diversos estratos gaseosos que conforman la atmósfera del planeta presentan drásticas diferencias de temperatura. Estas drásticas variaciones generan una intensa contracorriente mientras las capas de gas se mueven violentamente en direcciones opuestas.\n\nSi añadimos las densidades opuestas de cada gas, el resultado son unas catastróficas fuerzas de corte que desgarran cualquier elemento en transición entre una capa atmosférica y otra.\n\nAhora que conocemos esta reacción, podemos modificar nuestro equipo para que soporte estas condiciones extremas y nos permita aprovechar la fuerza cinética de este fenómeno natural."
 # MISSING MASS
 MISSING_MASS_CAT: "Masa desaparecida"
 missing_mass_desc: "Las lecturas de masa de §Y[from.GetName]§! están muy por debajo del rango esperado para un planeta rocoso de este tamaño. Se recomienda investigar más a fondo."
 extreme_frontiers.230.title: "Anélidos en el manto profundo"
 extreme_frontiers.230.desc: "Al inspeccionar la geología de §Y[from.GetName]§! con más detalle, hemos descubierto que su manto de silicato presenta una extensa red de grandes madrigueras subterráneas.\n\nLas sondas de exploración revelaron que estas cavidades albergan una próspera especie de anélido en el manto profundo que subsiste en la roca de silicato. Las vastas colonias de estas criaturas devoran el planeta desde dentro para después expulsar los desechos digeridos a la órbita planetaria, donde son arrastrados por los vientos cósmicos.\n\nExterminar a los anélidos concedería a nuestros [controller.GetMinerPlural_lower] vía libre para extraer ingentes cantidades de mineral de silicato."
 extreme_frontiers.230.desc.terravore: "$extreme_frontiers.230.desc$ Su apetito es impresionante, y no tan diferente del nuestro."
 extreme_frontiers.230.a: "Poned en marcha los taladros."
 extreme_frontiers.230.b: "Estudiad a estas fascinantes criaturas."
 # LIFE IN DARKNESS
 LIFE_IN_DARKNESS_CAT: "Vida en la oscuridad"
 life_in_darkness_desc: "§Y[from.GetName]§! rota de manera sincrónica, y la mitad del planeta se encuentra en un estado de oscuridad permanente. Los escáneres infrarrojos indican que esta zona sin luz y carente de nutrientes alberga un ecosistema orgánico activo."
 extreme_frontiers.240.title: "Evolución translúcida"
 extreme_frontiers.240.desc: "El lado en permanente oscuridad de §Y[from.GetName]§! ha propiciado un entorno evolutivo único para los pocos organismos capaces de sobrevivir en este mundo hostil.\n\nGracias a una variación cromosómica única, la fauna de este lugar es totalmente translúcida, carece de visión y utiliza sofisticadas formas de ecolocalización para sobrevivir."
 extreme_frontiers.240.desc.non_homicidal: "$extreme_frontiers.240.desc$ Estas notables adaptaciones despiertan un gran interés por parte de nuestros [controller.GetResearcherPlural_lower]."
 extreme_frontiers.240.a: "Esclarecedor."
 extreme_frontiers.240.b: "Los consumiremos."
 extreme_frontiers.240.c: "Exterminadlos."
 # RAINBOW RIVERS
 RAINBOW_RIVERS_CAT: "Ríos fluorescentes"
 rainbow_rivers_desc: "Los escáneres preliminares de §Y[from.GetName]§! muestran ríos fluorescentes que fluyen por la superficie del planeta y cambian continuamente a lo largo de todo el espectro de colores.\n\nEstudios más detallados nos proporcionarán más información sobre este fenómeno tan inusual."
 extreme_frontiers.250.title: "Quimiosíntesis colorida"
 extreme_frontiers.250.desc: "El análisis de los ríos fluorescentes de §Y[from.GetName]§! ha revelado que albergan una especie única de vida microbiana.\n\nEstas criaturas, que utilizan la quimiosíntesis para metabolizar compuestos nocivos, generan subproductos altamente reactivos que alteran la composición química del río y provocan cambios de color espectaculares.\n\nAdemás de funcionar como medio de comunicación, los vibrantes tonos neón que crean sirven para señalar el estado de fertilidad y atraer parejas mientras viajan por las corrientes tóxicas del planeta.\n\nEl estudio continuo de estas criaturas y su ciclo de vida brindará una fascinante oportunidad de investigación para nuestros [controller.GetResearcherPlural_lower]."
 # GASEOUS METALS
 GASEOUS_METALS_CAT: "Metales gaseosos"
 gaseous_metals_desc: "La atmósfera de §Y[from.GetName]§! está compuesta principalmente por diversos metales en estado gaseoso. Con una mejor comprensión de las duras condiciones de este planeta, podríamos extraer estos valiosos compuestos."
 extreme_frontiers.260.title: "Nubes de galvanoplastia"
 extreme_frontiers.260.desc: "La inusual atmósfera de §Y[from.GetName]§! ha atrapado grandes cantidades de radiación solar, provocando un calentamiento planetario creciente que hace que los metales se encuentren en un estado gaseoso y altamente volátil.\n\nEstos compuestos reaccionan instantáneamente con cualquier equipo de estudio que implementamos, recubriéndolo con una capa de aleación metálica fina y duradera. Sorprendentemente, este proceso no resulta destructivo.\n\n§Y[leader.GetName]§! cree que este proceso de galvanoplastia natural podría aprovecharse para mejorar la resistencia a la tracción de los cascos de las naves en todo el §Y[controller.GetName]§!."
 ATMOSPHERIC_ELECTROPLATING: "Galvanoplastia atmosférica"
 ATMOSPHERIC_ELECTROPLATING_DESC: "El envío de objetos a la atmósfera gaseosa metálica de §Y[from.GetName]§! da lugar a una forma de galvanoplastia natural.\n\nEste proceso único es notablemente eficaz y, con más estudios, podría replicarse para mejorar la durabilidad de los cascos de las naves en todo [Root.Owner.GetName]."
 extreme_frontiers.265.title: "Metal de alto rendimiento"
 extreme_frontiers.265.desc: "Hemos encontrado una forma de replicar a escala industrial el inusual proceso de galvanoplastia de la atmósfera volátil de §Y[from.From.GetName]§!.\n\nGracias a lo que hemos aprendido, nuestros [Root.Owner.GetEngineerPlural] ahora pueden aumentar considerablemente la durabilidad de ciertos metales sin sacrificar la flexibilidad ni añadir peso.\n\nEstos métodos avanzados pueden aplicarse a nuestros procesos de construcción naval."
 # CARBON ALLOTROPES
 CARBON_ALLOTROPES_CAT: "Alótropos del carbono"
 carbon_allotropes_desc: "Los datos espectroscópicos de §Y[from.GetName]§! indican una composición planetaria rica en alótropos del carbono raros y complejos. Se requiere una inspección más detallada para una categorización más exhaustiva."
 extreme_frontiers.270.title: "Formaciones de grafeno"
 extreme_frontiers.270.desc: "Se han encontrado abundantes depósitos de grafeno en §Y[from.GetName]§!. Este raro alótropo de carbono tiene solo una molécula de espesor, pero posee una resistencia y conductividad incomparables.\n\nEste valioso nanomaterial se forma de manera natural en la superficie gracias a la deposición química de vapor inherente a la inusual atmósfera de este §Ymundo de carbono§!."
 extreme_frontiers.270.a: "Extraedlo."
 # DIAMOND DUST
 DIAMOND_DUST_CAT: "Masa de alta velocidad"
 diamond_dust_desc: "Los escáneres de §Y[from.GetName]§! revelan altas concentraciones de materia en rápido movimiento ubicadas en las profundidades de la troposfera inferior.\n\nLa fuente de estas lecturas inusuales es difícil de verificar sin una investigación más detallada."
 extreme_frontiers.280.title: "Tormentas de diamantes"
 extreme_frontiers.280.desc: "Hemos identificado el origen de las lecturas de masa inusuales en §Y[from.GetName]§!.\n\nLa atmósfera del planeta está compuesta principalmente por gas metano rico en carbono que se solidifica en estructuras de diamante ultradensas a medida que aumenta la presión gravitacional. Debido a los violentos ciclos de tormentas del planeta, este fenómeno da lugar a tormentas de diamantes que se mueven a gran velocidad.\n\nAunque estos diamantes son fáciles de extraer para nuestras propias necesidades, §Y[leader.GetName]§! confía en que un examen más detallado de su densidad y pureza arrojará resultados aún más valiosos."
 ATMOSPHERIC_DIAMONDS_PROJECT: "Diamantes atmosféricos"
 ATMOSPHERIC_DIAMONDS_PROJECT_DESC: "Tras haber estudiado las tormentas de diamantes ultradensos de §Y[from.GetName]§!, estamos convencidos de que sus propiedades únicas pueden utilizarse para mejorar nuestras tecnologías láser."
 extreme_frontiers.285.title: "Precisión de diamante"
 extreme_frontiers.285.desc: "§Y[leader.GetName]§! ha concluido su investigación sobre los diamantes ultradensos de §Y[from.From.GetName]§!.\n\nEl proceso de compresión que crea estos diamantes da como resultado una estructura reticular cristalina única. Esto los hace extraordinariamente eficaces para confinar y amplificar la oscilación de la luz de alta frecuencia.\n\nEste avance supondrá una gran ventaja para nuestro imperio."
 # ETREME GEOLOGICAL TENSION
 GEOLOGICAL_TENSION_CAT: "Tensión geológica extrema"
 geological_tension_desc: "Los escáneres geológicos de §Y[from.GetName]§! sugieren que la corteza planetaria de este mundo fundido está sometida a una inmensa presión debido a fuerzas tectónicas acumuladas. Es posible que se produzca un evento geológico significativo en breve."
 extreme_frontiers.290.title: "Supervolcán obstruido"
 extreme_frontiers.290.desc: "Tras un estudio más detallado de la extrema tensión sísmica en §Y[from.GetName]§!, hemos descubierto que un supervolcán colosal ha quedado obstruido por el colapso parcial del cono superior.\n\nEnormes reservas de magma han llenado todas las cámaras subterráneas disponibles y están ejerciendo una inmensa presión ascendente contra la obstrucción del conducto principal. El material colapsado actualmente mantiene el magma en su lugar, pero es imposible predecir cuánto durará este delicado equilibrio.\n\nLa roca fundida atrapada es excepcionalmente rica en metales raros y compuestos minerales complejos. §Y[leader.GetName]§! cree que podemos extraer estos recursos de forma segura si facilitamos una erupción controlada."
 extreme_frontiers.290.a: "Desbloquead el conducto."
 extreme_frontiers.290.b: "Démosle un buen uso a esa actividad geotérmica."
 CONTROLLED_ERUPTION_PROJECT: "Erupción controlada"
 CONTROLLED_ERUPTION_PROJECT_DESC: "Un supervolcán obstruido en §Y[from.GetName]§! alberga vastas reservas de magma rico en minerales bajo la superficie. Llevar a cabo una erupción controlada nos permitiría extraer estos recursos."
 extreme_frontiers.295.title: "Megaerupción"
 extreme_frontiers.295.desc: "Mediante la perforación de una serie de pozos artificiales en varios puntos del cono exterior del supervolcán de §Y[from.From.GetName]§!, debilitamos su estructura hasta que ya no fue capaz de contener la enorme acumulación de magma que había debajo.\n\nUna vez alcanzado el punto de inflexión, los resultados fueron espectaculares. La parte superior del volcán quedó completamente destruida cuando la roca fundida a alta presión explotó hacia arriba.\n\nDirigimos el exceso de lava hacia canales cuidadosamente preparados, donde será recogida por equipos mineros especializados."
 extreme_frontiers.295.a.default: "Espectacular."
 extreme_frontiers.295.a.machine: "Operación realizada con éxito."
 # LAYERED ATMOSPHERE
 LAYERED_ATMOSPHERE_CAT: "Gigante en erupción"
 layered_atmosphere_desc: "Los escaneos de §Y[from.GetName]§! han detectado erupciones esporádicas de gases combustibles en todo el planeta, lo que presenta desafíos para los estudios remotos.\n\nSerá necesario realizar una inspección más detallada."
 extreme_frontiers.300.title: "Atmósfera estratificada"
 extreme_frontiers.300.desc: "§Y[leader.GetName]§! ha descubierto el origen de las erupciones volátiles en §Y[from.GetName]§!.\n\nLa atmósfera de este gigante gaseoso se ha formado de tal manera que una capa de hidrógeno metálico líquido queda suspendida entre la mesosfera gaseosa y la estratosfera. La composición más densa del gas metano en la capa inferior mantiene el fluido en el aire.\n\nCon el tiempo, se acumulan descargas eléctricas dentro del hidrógeno metálico, lo que agita la subcapa. Tras una acumulación crítica de presión, las erupciones gaseosas expulsan líquido altamente conductor a la atmósfera superior, que se disipa por todo el planeta antes de volver a asentarse.\n\nNuestros sistemas de seguimiento pueden monitorear fácilmente estas fluctuaciones de presión, lo que nos permite aprovechar estos valiosos recursos."
 # SOLIDIFIED PLASMA TRAILS
 PLASMA_TRAILS_CAT: "Picos de energía irregulares"
 plasma_trails_desc: "Se están detectando picos de energía irregulares a lo largo de las fallas tectónicas de §Y[from.GetName]§!.\n\nEl origen de estos picos no puede determinarse desde la órbita. Se necesitará un estudio más detallado para identificar la fuente de este fenómeno."
 extreme_frontiers.310.title: "Estelas de plasma solidificado"
 extreme_frontiers.310.desc: "El análisis geológico de §Y[from.GetName]§! ha identificado el origen de los picos de energía erráticos detectados durante los estudios orbitales iniciales.\n\nLa volátil actividad tectónica del planeta produce violentas descargas electrostáticas en regiones de tundra helada inestable.\n\nEstos rayos volcánicos erupcionan hacia el cielo y convierten el aire circundante en plasma. El calor extremo desatado por este fenómeno produce un choque térmico que se solidifica en estructuras con forma de relámpagos.\n\nGracias a lo aprendido en el análisis geológico, podremos predecir fácilmente estas erupciones sísmicas y aprovechar este fenómeno para nuestros propios fines."
 # CRYSTALLINE PLAINS
 CRYSTALLINE_PLAINS_CAT: "Actividad criovolcánica"
 crystalline_plains_desc: "El análisis tectónico de §Y[from.GetName]§! muestra una actividad criovolcánica significativa de naturaleza anómala en todo el planeta."
 extreme_frontiers.320.title: "Llanuras cristalinas"
 extreme_frontiers.320.desc: "Los estudios geológicos detallados de §Y[from.GetName]§! han revelado ríos de amoníaco semicongelado que fluyen bajo su corteza helada. Las crecientes presiones geotérmicas impulsan esta sustancia a través de fisuras en la frágil superficie.\n\nEstas erupciones arrojan una mezcla volátil de vapores peligrosos y amoníaco licuado por toda la superficie del planeta. Al volver a congelarse tras exponerse a las temperaturas extremas de la superficie, el granizado forma extensas llanuras de valiosos cristales fáciles de recolectar."
 # SUPERMASSIVE GIANT
 SUPERMASSIVE_GIANT_CAT: "Gigante supermasivo"
 supermassive_giant_desc: "§Y[from.GetName]§! es un gigante gaseoso supermasivo cuyo pozo gravitatorio ha arrastrado miles de objetos a su órbita. Podría valer la pena catalogarlos."
 extreme_frontiers.330.title: "Basura espacial"
 extreme_frontiers.330.desc: "Hay multitud de lunas pequeñas, asteroides y desechos espaciales atrapados en la órbita de §Y[from.GetName]§!. La datación por isótopos radiactivos sugiere que todos ellos fueron capturados por su pozo gravitatorio mientras pasaban por el sistema hace miles de años.\n\nMientras catalogábamos estos objetos, encontramos algunas sondas de exploración antiguas y muy básicas, probablemente pertenecientes a una civilización que estaba dando sus primeros pasos en la exploración espacial.\n\nLa mayoría de sus bancos de datos están corruptos o dañados físicamente por colisiones con otros objetos, pero uno contenía una serie de imágenes de la superficie de [from.GetName] que abarcaban cientos de años."
 extreme_frontiers.330.a: "Un hallazgo fascinante."
 extreme_frontiers.330.b: "Desguazadlo todo."
 # INVISIBLE PLANET
 INVISIBLE_PLANET_CAT: "Irregularidad orbital"
 invisible_planet_desc: "Se ha observado una pequeña pero recurrente oscilación en la trayectoria orbital de §Y[from.GetName]§!, lo que sugiere que se ve sometido regularmente a alguna fuerza gravitatoria desconocida de gran magnitud.\n\nSe recomienda realizar más estudios del espacio circundante."
 extreme_frontiers.340.title: "Planeta invisible"
 extreme_frontiers.340.desc: "Un análisis más detallado de §Y[from.solar_system.GetName]§! ha revelado que todas las órbitas planetarias de este sistema presentan irregularidades similares.\n\nTras triangular las fuerzas gravitatorias implicadas en estos movimientos inusuales, hemos descubierto su causa: un planeta hasta ahora desconocido, al que hemos bautizado como §Y[invisible_planet.GetName]§!.\n\nEste mundo posee una superficie única de partículas de carbono negro que no reflejan la luz ni las ondas de radio, lo que lo hace prácticamente invisible para los escáneres de largo alcance.\n\nEstos polímeros naturales tienen propiedades absorbentes extraordinarias."
 extreme_frontiers.340.desc.default: "$extreme_frontiers.340.desc$ Estos materiales representan una oportunidad de investigación única."
 extreme_frontiers.340.desc.first_contact: "$extreme_frontiers.340.desc$ Se recolectarán y estudiarán para determinar sus posibles usos como material de camuflaje."
 # SURVIVAL POD
 SURVIVAL_POD_WARM_CAT: "Estación de campo reacondicionada"
 SURVIVAL_POD_COLD_CAT: "Estación de campo reacondicionada"
 survival_pod_desc: "Los estudios realizados sobre la superficie estéril de §Y[from.GetName]§! han revelado una estación de campo reacondicionada, que originalmente era un laboratorio de investigación temporal que acabó perdiendo su utilidad. Una leve radiación térmica indica que algunas zonas de la instalación permanecen en activo."
 extreme_frontiers.350.title: "Único superviviente"
 extreme_frontiers.350.desc: "Una expedición a la superficie de §Y[from.GetName]§! halló la estación de campo reacondicionada... y a su única ocupante.\n\nSe ha presentado como una científica que quedó atrapada en este mundo hostil durante años, y ofrece su experiencia al [root.Owner.GetName] a cambio de su rescate."
 extreme_frontiers.350.a: "Su experiencia es un activo."
 extreme_frontiers.350.b: "Dadle una lanzadera y suministros."
 extreme_frontiers.350.c: "Dejadla en paz y observad."
 extreme_frontiers.350.d: "Qué adorable. Destruid su refugio."
 extreme_frontiers.352.title: "$NAME_survivalist_scru$"
 extreme_frontiers.352.desc: "Una demacrada [scru_species.GetClass] sale de su estación de campo reconvertida en vivienda. Al hablar de su terrible experiencia en §Y[from.From.GetName]§!, el sonido de su [scru_species.GetMouthName] es áspero; las palabras salen a trompicones.\n\n\"Disculpad. No he... hablado con nadie en muchos años...\"."
 extreme_frontiers.352.a: "¿Cómo acabaste aquí?"
 extreme_frontiers.352.a.response: "Estaba investigando [from.From.GetName] para catalogar su extraordinario lecho rocoso. Mi equipo dijo que harían un barrido rápido con la nave de exploración, y yo les creí. Pasé unos pocos días preocupada, hasta que me di cuenta de lo que habían hecho: se habían marchado a casa."
 extreme_frontiers.352.b: "¿Cómo has sobrevivido tanto tiempo?"
 extreme_frontiers.352.b.response: "Ah, las maravillas que una puede obrar al modificar la permeabilidad celular y potenciar las proteínas de choque térmico... Una vez hecho, inducir la macroautofagia en mis células modificadas fue una tarea sencilla. Gracias al alto contenido de sodio en este mundo, pude generar platos de lo más sabrosos."
 extreme_frontiers.352.c: "¿No quieres volver con los tuyos?"
 extreme_frontiers.352.c.response: "No se merecen los descubrimientos que hecho en esta roca. Las hipócritas razones que tuvieran para abandonarme me importan un bledo."
 extreme_frontiers.352.d: "¿Qué puedes hacer por nosotros?"
 extreme_frontiers.352.d.response: "Estoy harta de trabajar en un laboratorio improvisado. Quiero visitar nuevos mundos... en el espacio."
 extreme_frontiers.352.e: "Reclutad a $NAME_survivalist_scru$"
 extreme_frontiers.352.e.custom_tooltip: "§Y$NAME_survivalist_scru$§! se une a nuestro imperio como §Hlíder§!."
 NAME_survivalist_scru: "Scru"
 survivalist_scru_desc: "Una brillante científica que ha desarrollado sus habilidades de supervivencia en entornos extremos."
 leader_trait_hardened_survivalist: "Superviviente duro"
 leader_trait_hardened_survivalist_desc: "Este líder cuenta con un conocimiento sin igual de los entornos inhóspitos."
 # Infernal Tornadoes
 INFERNAL_TORNADOES_CAT: "Temperaturas extremas"
 infernal_tornadoes_desc: "Los escáneres de §H[from.GetName]§! muestran vastas extensiones de tormentas de alta presión que se desplazan rápidamente.\n\nEstas tormentas emiten señales térmicas extremadamente volátiles. Se necesitará una investigación más centrada para revelar si la causa es natural o una forma de vida hasta ahora desconocida."
 extreme_frontiers.360.title: "Tornados de llamas"
 extreme_frontiers.360.desc: "Se ha descubierto el origen del calor extremo en §H[from.GetName]§!.\n\nPor todo el planeta, hay géiseres que emiten hidrógeno altamente inflamable desde las profundidades de la superficie. Cuando estos géiseres entran en erupción, el calor del planeta prende el gas, lo que da lugar a enormes columnas de fuego que se elevan hacia el cielo.\n\nAl combinarse con la presión atmosférica, se crean corrientes de aire extremadamente volátiles que envían remolinos de fuego por todo el territorio en forma de enormes tornados llameantes.\n\nAunque se trata de un fenómeno natural devastador, nuestros [Root.Owner.GetResearcherPlural_lower] están convencidos de que estos tornados y los enormes volúmenes de energía cinética que generan podrían recrearse artificialmente para su uso práctico."
 INFERNAL_CATALYSTS_PROJECT: "Catalizadores infernales"
 INFERNAL_CATALYSTS_PROJECT_DESC: "Al estudiar más detenidamente las condiciones que provocan los tornados llameantes de §H[from.GetName]§!, se podrían reproducir los beneficios de este fenómeno en un entorno controlado."
 extreme_frontiers.365.title: "Resonadores piroclásticos"
 extreme_frontiers.365.desc: "§Y[from.Leader.GetName]§! ha logrado encontrar una forma de recrear y aprovechar los tornados llameantes que se encuentran en §Y[from.From.GetName]§! en un entorno controlado.\n\nCon este avance, podremos utilizar nuestras bases estelares para aumentar la energía producida por cualquier mundo fundido que se encuentre en el mismo sistema."
 extreme_frontiers.365.desc.has_furnace: "La teoría científica comparte numerosos paralelismos con nuestro conocimiento actual sobre los §Hhornos de arco§!, lo que nos abre un abanico de nuevas posibilidades para la construcción extraterrestre."
 extreme_frontiers.365.desc.default: "La teoría científica que sustenta este descubrimiento tiene diversas aplicaciones para el desarrollo de la tecnología de los §Hhornos de arco§!, y nuestros [Root.Owner.GetEngineerPlural] están preparados para comenzar a aplicar la teoría en el desarrollo práctico."
 tech_pyroclastic_resonation: "Resonancia piroclástica"
 tech_pyroclastic_resonation_desc: "Al aprovechar la energía térmica extrema que se encuentra en los mundos fundidos, nuestras bases estelares pueden aumentar la producción de energía en un sistema con una eficiencia excepcional."
 sm_pyroclastic_resonator: "Resonador piroclástico"
 sm_pyroclastic_resonator_desc: "Resonadores térmicos que pueden aumentar la producción de energía de cualquier mundo fundido en un sistema estelar.\nLa producción de $i_energy$ varía en función del número de ['concept_pc_molten'] que haya en el sistema."
 # MAGMA MEGAFAUNA
 MAGMA_MEGAFAUNA_CAT: "Geografía inestable"
 magma_megafauna_desc: "Los escáneres de §Y[from.GetName]§! muestran secciones de la superficie planetaria fundida que se desplazan continuamente a lo largo de grandes distancias.\n\nSe necesita un estudio más detallado para comprender este fenómeno geológico inusual."
 extreme_frontiers.370.title: "Megafauna fundida"
 extreme_frontiers.370.desc: "Los escáneres tectónicos anómalos en §Y[from.GetName]§! se han atribuido a la presencia de grandes manadas de megafauna itinerante compuesta de silicio.\n\nEstas enormes criaturas, que migran a grandes distancias, se sumergen periódicamente en los lagos de lava del planeta para recolectar su fuente de alimento preferida: un sedimento rocoso rico en §Hmotas volátiles§!. Al rastrear sus patrones migratorios, podremos extraer estos sedimentos con un impacto mínimo en el ecosistema del planeta.\n\nSus densos caparazones externos son capaces de soportar temperaturas extremas. Un estudio más profundo y detallado de su ciclo de vida podría arrojar resultados fascinantes."
 LAVA_DIVERS_PROJECT: "Chapuzones de lava"
 LAVA_DIVERS_PROJECT_DESC: "La megafauna de §Y[from.GetName]§! es capaz de soportar las duras condiciones de su mundo fundido y sumergirse a gran profundidad bajo la superficie de los numerosos lagos de magma del planeta.\n\nEl estudio de los caparazones de estas criaturas podría proporcionarnos nuevos conocimientos sobre cómo hacer frente al calor extremo."
 extreme_frontiers.375.title: "Blindaje forjado en magma"
 extreme_frontiers.375.desc: "El estudio exhaustivo de la megafauna de §Y[from.From.GetName]§! nos ha proporcionado avances en materia de termodinámica que pueden aplicarse en nuestros astilleros.\n\nLa dieta rica en motas de estas criaturas da lugar a una estructura pesada a base de silicato que se forma en su resistente caparazón exterior, reforzado con materiales refractarios naturales.\n\nTras recuperar numerosas muestras de sus capas externas desprendidas, nuestros [Root.Owner.GetEngineerPlural] ahora pueden replicar sus principios biomecánicos en el desarrollo de nuestros propios revestimientos para cascos."
 # PLANET THRUSTERS
 PLANET_THRUSTERS_CAT: "Equipo en suspensión"
 planet_thrusters_desc: "Hay una serie de grandes máquinas cilíndricas suspendidas en la atmósfera superior de §Y[from.GetName]§!. Parecen inactivas y desprovistas de tripulación."
 extreme_frontiers.380.title: "Propulsores planetarios"
 extreme_frontiers.380.desc: "Cada una de las máquinas abandonadas encontradas en §Y[from.GetName]§! es un propulsor independiente. En total, hay más de mil en la atmósfera superior.\n\nEstos complejos dispositivos de fusión están fabricados con materiales especialmente diseñados para ingerir gas hidrógeno del planeta para usarlo como combustible para generar cantidades significativas de impulso. La mayoría muestran signos de daños por sobrecarga.\n\nNuestro análisis revela que todas las máquinas están colocadas de tal manera que este impulso ejercería fuerza contra el propio planeta, lo que sugiere que este antiguo dispositivo se desplegó originalmente con el fin de alterar la órbita del planeta.\n\nAunque ya no sirven para una tarea tan monumental, es posible que podamos reutilizar los modelos menos dañados para quemar las capas gaseosas del planeta y dejar al descubierto su núcleo rico en minerales."
 extreme_frontiers.380.a: "Desguazadlos."
 extreme_frontiers.380.b: "Démosles otro uso."
 REPURPOSE_THRUSTERS_PROJECT: "Propulsores planetarios reutilizados"
 REPURPOSE_THRUSTERS_PROJECT_DESC: "Si reutilizamos el conjunto de propulsores planetarios dañados de §Y[from.GetName]§!, podemos quemar el hidrógeno del gigante gaseoso y dejar al descubierto su núcleo sólido y explotable."
 extreme_frontiers.385.title: "Gases retirados"
 extreme_frontiers.385.desc: "Hemos conseguido reparar algunos de los propulsores planetarios dañados de §Y[from.From.GetName]§! y los hemos calibrado para que ejerzan la misma fuerza en direcciones opuestas.\n\nUna vez activados, estos potentes dispositivos de fusión han aspirado hidrógeno a una velocidad exponencial, quemando la atmósfera gaseosa del planeta y dejando al descubierto su núcleo rico en minerales, aunque a una temperatura extremadamente alta."
 extreme_frontiers.385.tt: "Modificador §Y$chthonian_planet$§! añadido"
 extreme_frontiers.385.a: "Impresionante."
 # BACKWARDS ORBIT
 BACKWARDS_ORBIT_CAT: "Órbita inversa"
 backwards_orbit_desc: "§Y[from.GetName]§! orbita alrededor de su estrella en dirección contraria a la de los demás planetas del sistema, lo que sugiere que no se formó aquí al mismo tiempo que los demás cuerpos celestes que lo acompañan.\n\nNecesitamos investigar más para comprender los orígenes de este planeta."
 extreme_frontiers.390.title: "Planeta errante"
 extreme_frontiers.390.desc: "La composición de §Y[from.GetName]§! no coincide con la de otros planetas cercanos. Sin embargo, se alinea perfectamente con varios cuerpos celestes del sistema vecino §Y[event_target:wandering_planet_origin.GetName]§!, lo que sugiere su verdadero origen.\n\nLa superficie del planeta está marcada por un cráter de impacto particularmente grande, lo que nos lleva a suponer que fue desplazado de su órbita original por la colisión de un asteroide gigante. Este planeta errante y libre fue posteriormente capturado por el pozo gravitatorio de [from.System.Star.GetName], donde asumió su inusual órbita inversa.\n\nEste extraordinario planeta ha residido en dos sistemas diferentes desde su formación, lo que ofrece numerosas oportunidades para su estudio."
 # VAPOR PLUMES
 VAPOR_PLUMES_CAT: "Columnas de vapor"
 vapor_plumes_desc: "Se han observado miles de columnas de vapor anómalas que se elevan desde la superficie de §Y[from.GetName]§! hasta los límites superiores de su delgada atmósfera.\n\nSe recomienda investigar más a fondo este fenómeno."
 extreme_frontiers.400.title: "Géiseres criovolcánicos"
 extreme_frontiers.400.desc: "Las columnas de vapor observadas en §Y[from.GetName]§! son consecuencia de una intensa actividad criovolcánica en las profundidades del manto inferior que expulsa hacia arriba enormes columnas de nitrógeno y amoníaco.\n\nLas columnas se elevan verticalmente hasta alcanzar los límites de la atmósfera del planeta, donde los vientos solares hacen que se aplanen abruptamente.\n\nAl estudiar las pequeñas variaciones en el contenido químico de estas formaciones de humo únicas, podemos aprender más sobre los complejos procesos geológicos del núcleo del planeta."
 # FIBROUS ATMOSPHERE
 FIBROUS_ATMOSPHERE_CAT: "Estudio corrupto"
 fibrous_atmosphere_desc: "Los análisis iniciales de §Y[from.GetName]§! están arrojando resultados defectuosos que nuestros sensores no pueden interpretar con claridad. El origen de esta interferencia sigue sin estar claro; será necesario realizar una inspección más detallada."
 extreme_frontiers.410.title: "Atmósfera fibrosa"
 extreme_frontiers.410.desc: "Una inspección detallada de §Y[from.GetName]§! ha revelado el origen de la corrupción de datos en nuestros escaneos preliminares.\n\nDensas nubes de minerales fibrosos conforman la atmósfera superior del planeta. Estas largas hebras sinuosas se originan en las capas inferiores del gigante gaseoso, donde la alta presión las estira hasta formar nubes minerales altamente conductoras.\n\nA medida que circulan por la atmósfera, estas fibras acumulan energía electrostática y se descargan periódicamente con el tiempo. Podemos extraer fácilmente estos recursos para utilizarlos."
 # EXPLODING SKIES
 EXPLODING_SKIES_CAT: "Picos de calor intenso"
 exploding_skies_desc: "Los análisis de §Y[from.GetName]§! están detectando fenómenos meteorológicos extremos, con picos de calor esporádicos, pero intensos, distribuidos por toda la superficie.\n\nEsto justifica una investigación más exhaustiva."
 extreme_frontiers.420.title: "Horizonte explosivo"
 extreme_frontiers.420.desc: "La observación detallada de §Y[from.GetName]§! ha revelado la causa de los picos de calor meteorológicos.\n\nLas fumarolas geotérmicas y los géiseres que se extienden por la superficie expulsan gases altamente inflamables que se acumulan en la atmósfera. Las descargas electrostáticas actúan como catalizadores de ignición que provocan frentes meteorológicos explosivos que devastan los cielos de este mundo.\n\nEstas reacciones han proporcionado a nuestros [Root.Owner.GetEngineerPlural] nuevos conocimientos sobre la combustión termodinámica que podrían aplicarse a los sistemas de propulsión de nuestra propia flota."
 extreme_frontiers.420.desc.traumatized: "Desafortunadamente, los peligros que entraña esta investigación han dejado a [leader.GetName] con un trauma grave."
 extreme_frontiers.420.desc.maimed: "Desafortunadamente, los peligros que entraña esta investigación le han provocado graves lesiones a [leader.GetName]."
 # CHTHONIAN PRESERVATION
 CHTHONIAN_PRESERVATION_CAT: "Biomasa ctónica"
 chthonian_preservation_desc: "Los estudios de §Y[from.GetName]§! revelan que se trata de un planeta ctónico, un antiguo gigante gaseoso despojado de su atmósfera por la intensa radiación de §Y[from.System.Star.GetName]§!.\n\nA pesar de ello, se han detectado trazas muy tenues de biomasa en su superficie, lo que justifica una investigación más exhaustiva."
 extreme_frontiers.430.title: "Preservación ctónica"
 extreme_frontiers.430.desc: "Las lecturas de biomasa en §Y[from.GetName]§! son los restos petrificados de una manada de tiyanki.\n\nProbablemente presentes en el gigante gaseoso durante un punto crítico de su disipación atmosférica, sus cuerpos quedaron envueltos en metal fundido que, desde entonces, se ha solidificado.\n\nAunque queda una pequeña cantidad de materia biológica en su interior, la exposición prolongada a la radiación estelar a nivel ctónico ha convertido la mayor parte de sus cadáveres en una aleación biometálica única.\n\n§Y[leader.GetName]§! cree que, con un estudio más detallado de estos fósiles tan raros, podremos descubrir nuevas vías para la producción de aleaciones a partir de fuentes biológicas."
 CHTHONIAN_PETRIFICATION_PROJECT: "Petrificación ctónica"
 CHTHONIAN_PETRIFICATION_PROJECT_DESC: "Al examinar los restos petrificados de la manada fosilizada de tiyanki en §Y[from.GetName]§!, nuestros [Root.Owner.GetScientistPlural] pretenden comprender plenamente los efectos de la radiación a nivel ctónico sobre la materia biológica, lo que podría abrir nuevas vías para la producción de aleaciones avanzadas."
 extreme_frontiers.435.title: "Aleación producida biológicamente"
 extreme_frontiers.435.desc: "Tras un minucioso examen de los restos petrificados de tiyanki encontrados en §Y[from.From.GetName]§!, hemos logrado identificar un nuevo método de producción de aleaciones mediante la simulación de los efectos de la exposición prolongada a la radiación a nivel ctónico.\n\nEste avance revolucionario ofrece una metodología extraordinaria que utiliza materia biológica como materia prima principal y ofrece resultados que rivalizan con los métodos más convencionales."
 tech_alloy_fossilization: "Fosilización de aleaciones"
 tech_alloy_fossilization_desc: "Al exponer material biológico a radiación simulada a nivel ctónico, podemos fosilizar estructuras celulares y convertirlas en aleaciones metálicas útiles."
 tech_alloy_fossilization_tt: "§HDesbloquea el edificio§!: ['building:building_bio_furnace']"
 building_bio_furnace: "Horno biológico"
 building_bio_furnace_desc: "Al incorporar niveles significativos de radiación estelar simulada, esta instalación puede convertir materia biológica en aleaciones."
 # ORBITAL RESONANCE
 ORBITAL_RESONANCE_CAT: "Proporción perfecta"
 orbital_resonance_desc: "Las duraciones orbitales en el sistema §Y[from.System.GetName]§! muestran un patrón notable. Cada planeta orbita alrededor de la estrella en exactamente el doble de tiempo que su vecino, con una precisión de milésimas de segundo.\n\nEsta proporción anómala y perfecta merece ser investigada."
 extreme_frontiers.440.title: "Resonancia orbital"
 extreme_frontiers.440.desc: "§Y[from.System.GetName]§! presenta el ejemplo más perfecto de resonancia orbital que hemos encontrado hasta ahora.\n\nCada planeta ejerce una fuerza gravitatoria periódica sobre su vecino cuando se encuentran en sus puntos más cercanos, creando un efecto catapulta y un impulso mutuamente dependiente. La inusual estabilidad de estas interacciones da lugar a órbitas altamente coordinadas.\n\nEl sistema ofrece una excelente oportunidad para estudiar la forma en que la gravedad planetaria acelera el movimiento de los objetos, con posibles aplicaciones para la maniobrabilidad de naves."
 GRAVITY_ASSIST_PROJECT: "Estudios sobre asistencia gravitatoria"
 GRAVITY_ASSIST_PROJECT_DESC: "El estudio del efecto de resonancia orbital perfecta en §Y[from.GetName]§! mejorará nuestra comprensión de las maniobras de honda planetaria en naves espaciales."
 extreme_frontiers.445.title: "Avances en honda orbital"
 extreme_frontiers.445.desc: "Después de estudiar el peculiar efecto de resonancia orbital en el sistema §Y[from.From.System.GetName]§!, hemos mejorado considerablemente nuestros métodos para trazar las trayectorias óptimas de vuelo de las naves.\n\nEstos nuevos modelos nos permitirán aprovechar mejor la gravedad planetaria para lograr la aceleración y desaceleración de las naves a velocidades sublumínicas."
 tech_orbital_maneuvers: "Maniobras orbitales avanzadas"
 tech_orbital_maneuvers_desc: "El viaje sublumínico puede optimizarse aún más al realizar cálculos avanzados que aprovechen al máximo los pozos gravitatorios planetarios."
 #############
 # Arc Sites #
 #############
 # ABSOLUTE ZERO
 site_absolute_zero: "Cero absoluto"
 site_absolute_zero_desc: "Los análisis topográficos de §Y[from.Planet.GetName]§! muestran temperaturas extremas cercanas al cero absoluto localizadas en una región subterránea concreta.\n\nUn estudio más detallado del interior debería aportar más respuestas."
 extreme_frontiers.1000.title: "Barrera helada"
 extreme_frontiers.1000.desc: "Mientras buscaba el origen de las temperaturas extremadamente bajas en §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! ha descubierto la entrada a una antigua estructura subterránea.\n\nLa entrada está bloqueada por una masa de roca congelada y sedimentos de hielo que probablemente han impedido el acceso a la estructura durante milenios.\n\nEl dióxido de carbono que se derrite en la entrada emite columnas de gas por varios huecos en la obstrucción. Nuestro equipo indica que hay un vasto complejo en el interior; [leader.GetName] cree que la fuente del frío extremo se encuentra dentro."
 extreme_frontiers.1000.a: "Atravesad la barrera."
 extreme_frontiers.1005.title: "Congelados en el tiempo"
 extreme_frontiers.1005.desc: "§Y[leader.GetName]§! ha logrado romper el hielo que bloqueaba la entrada de la antigua estructura en §Y[from.Planet.GetName]§!.\n\nEn el interior hay docenas de cadáveres congelados pertenecientes a una raza reptiloide desconocida. Sus cuerpos contorsionados están congelados cerca de las paredes, y se aprecian marcas de garras que indican un intento desesperado por escapar.\n\nEl origen de las columnas de hielo seco que se filtran por la entrada debe de encontrarse a mayor profundidad, y hay una escalera de caracol que conduce al interior del complejo."
 extreme_frontiers.1010.title: "Tumba glacial"
 extreme_frontiers.1010.desc: "En lo más profundo del complejo helado, §Y[leader.GetName]§! ha descubierto una gran sala central llena de cámaras criogénicas primitivas, pero teóricamente operativas.\n\nEl frío extremo que se respira aquí supera con creces los rangos de temperatura para los que fueron diseñados estos dispositivos. Los ocupantes de las cápsulas murieron hace miles de años.\n\nLas pocas cámaras que no han sido reclamadas por el hielo y la nieve tienen pedestales legibles en la base, que indican el título social y el rango de quienes se encuentran en su interior. Las cámaras de mayor rango están situadas más cerca de una gran cápsula central, que a su vez está profundamente incrustada en el hielo y la nieve."
 extreme_frontiers.1010.a: "Investigad la cápsula central."
 extreme_frontiers.1015.title: "Monarca helado"
 extreme_frontiers.1015.desc: "§Y[leader.GetName]§! ha atravesado la gran cápsula central situada en el corazón de la tumba glacial de §Y[from.Planet.GetName]§!.\n\nEn su interior, hemos descubierto el lugar donde descansa el jefe de la antigua casa real, tal y como se insinuaba en los textos de la cámara anterior. Junto a él yacen congelados decenas de sus sirvientes, cuyas cápsulas criogénicas adornan las paredes a modo de ofrenda ceremonial.\n\nEl sarcófago tecnológico del gobernante fallecido está conectado a través de una red laberíntica de tubos y circuitos a una antigua máquina. Este dispositivo está incrustado en una gran masa de hielo, cuya temperatura se aproxima a niveles peligrosamente bajos incluso para nuestro equipo de análisis.\n\nEs necesario seguir investigando qué causó el aparente mal funcionamiento de esta instalación y su relación con el núcleo helado del planeta."
 extreme_frontiers.1015.a: "¿Qué salió mal?"
 extreme_frontiers.1020.title: "Catástrofe criogénica"
 extreme_frontiers.1020.desc: "El análisis de la cámara central de la tumba glacial en §Y[from.Planet.GetName]§! ha revelado el origen del desastre que se desató.\n\nLa maquinaria criogénica utiliza la dinámica subtérmica, que aprovecha las temperaturas extremadamente bajas del núcleo de este planeta. Después de que el monarca fuera infectado con una enfermedad terminal, la esperanza era despertar a la comitiva real cuando se descubriera una cura.\n\nSi bien su teoría era sólida, se produjo una reacción endotérmica descontrolada cuando su medio de circulación especialmente diseñado se filtró al núcleo planetario. Esto provocó un descenso fatal de la temperatura que congeló rápidamente toda la instalación.\n\nPartiendo de su teoría inicial, la hemos mejorado y hemos realizado un gran descubrimiento en tecnología criogénica avanzada especializada para usarla en mundos helados."
 tech_cryovault: "Hábitats helados"
 tech_cryovault_desc: "Aprovechando la dinámica subtérmica que se encuentra en los entornos de los mundos helados, podemos crear condiciones de vida más habitables en climas más fríos."
 tech_cryovault_tt: "Desbloquea el edificio: ['building:building_cryovault']"
 building_cryovault: "Criocámara"
 building_cryovault_desc: "Un hábitat sellado que utiliza la dinámica subtérmica de los climas helados para crear un espacio habitable controlado y cómodo."
 # TOXIC MATRIX
 site_toxic_matrix: "Piscinas tóxicas"
 site_toxic_matrix_desc: "La superficie de §Y[from.Planet.GetName]§! está cubierta casi en su totalidad por una red reticular de pequeñas piscinas circulares llenas de líquido. Su perfecta alineación sugiere una ingeniería deliberada más que una formación natural. Una expedición sobre el terreno podría aportar más respuestas."
 extreme_frontiers.1100.title: "Saco de mucosidad roto"
 extreme_frontiers.1100.desc: "La mayor parte de la superficie de §Y[from.Planet.GetName]§! ha sido modificada para formar una serie de cavidades esféricas dispuestas en filas cuidadosamente alineadas. Estas pequeñas cuencas redondeadas están llenas de un fluido viscoso y tóxico.\n\nEn una de las piscinas se descubrió un saco orgánico roto recubierto de una mucosidad gelatinosa. La membrana del saco parece haber sido perforada desde el interior.\n\nAún queda por descubrir si este saco es el origen del líquido que se encuentra dentro de las piscinas."
 extreme_frontiers.1100.a: "Seguir investigando"
 extreme_frontiers.1105.title: "Piscinas de gestación tóxicas"
 extreme_frontiers.1105.desc: "El análisis de las piscinas de limo de §Y[from.Planet.GetName]§! ha identificado hormonas de crecimiento inusualmente radiactivas comúnmente asociadas con los ciclos de gestación orgánicos.\n\nEl revestimiento del saco en sí parece ser una membrana carnosa sofisticada, capaz de regular la velocidad a la que el limo se filtra a través de él."
 extreme_frontiers.1105.desc.non_toxoid: "Creemos que hemos encontrado vainas de gestación residuales de una especie dotada de una insólita capacidad de adaptación a entornos tóxicos. Se seguirá indagando a fin de esclarecer el misterio."
 extreme_frontiers.1105.desc.toxoid: "Para gran sorpresa de los estudiosos, estas vainas guardan un gran parecido a nuestros ciclos reproductores, por lo que tal vez nos una un lejano parentesco a la especie en cuestión."
 extreme_frontiers.1105.a: "Sigamos investigando."
 extreme_frontiers.1110.title: "Restos embrionarios"
 extreme_frontiers.1110.desc: "De entre los sacos de gestación fisurados que se han hallado en las piscinas de §Y[from.Planet.GetName]§!, uno de ellos contenía vestigios de un ser vivo casi desarrollado del todo.\n\nUn análisis microscópico del espécimen embrionario ha delatado la existencia de un sistema nervioso complejo, con atributos neurológicos propios de formas de vida inteligentes.\n\nQueda por examinar un último conjunto de piscinas."
 extreme_frontiers.1110.a: "Estudiemos las piscinas restantes."
 extreme_frontiers.1115.title: "Señales de vida detectadas"
 extreme_frontiers.1115.desc.a: "Al analizar las últimas piscinas de mucosidad de §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! halló un saco de gestación completamente intacto, y en su interior se detectaron señales de vida.\n\nSin embargo, la membrana del saco se ha fracturado en el momento de su extracción y el espécimen que contenía ha perecido."
 extreme_frontiers.1115.desc.non_toxoid: "El pequeño cadáver presentaba características biológicas inusuales, incluidas venas llenas de plasma radiactivo y glándulas internas que secretan compuestos psicoactivos."
 extreme_frontiers.1115.desc.b: "Se ha determinado que el saco de gestación, junto con la criatura embrionaria a la que daba cobijo, lo generó el compuesto mucoso tóxico al inocularle un catalizador químico especializado en la baba densa en energía.\n\nNos aventuramos ya a creer que hemos encontrado el criadero abandonado de una antigua especie desconocida. Tal vez no lleguemos a averiguar jamás si se trata de un centro artificial o si es parte de su ciclo reproductor. Si incubamos una muestra en el mismo entorno, tal vez logremos cultivar otro espécimen vivo."
 extreme_frontiers.1115.desc.toxoid: "Otra alternativa sería distribuir pequeñas dosis de la potente sustancia viscosa, rica en compuestos fértiles, por todo el colectivo [leader.Owner.GetName] a modo de suplemento nutritivo."
 extreme_frontiers.1115.a: "Catalicemos la baba."
 extreme_frontiers.1115.b: "Extraer su energía será lo más provechoso."
 extreme_frontiers.1115.c: "Distribuid suplementos nutricionales."
 TOXIC_SLIME_CATALYZATION_PROJECT: "Catálisis de la mucosidad tóxica"
 TOXIC_SLIME_CATALYZATION_PROJECT_DESC: "Al catalizar una porción de la sustancia tóxica de gestación que encontramos en [from.Planet.GetName], puede ser que logremos engendrar un organismo vivo."
 extreme_frontiers.1120.title: "Fecundación conseguida"
 extreme_frontiers.1120.desc: "Al catalizar una muestra de la sustancia gestacional recuperada de §Y[from.From.Planet.GetName]§!, logramos inducir la engendración de decenas de sacos, cada cual con un embrión en su interior.\n\nCuando aquellos organismos en rápido desarrollo alcanzaron la madurez, perforaron desde dentro las membranas traslúcidas de los sacos que los contenían gracias a sus mandíbulas adaptadas a tal fin. Poco a poco emergieron de aquella densa mucosidad, aletargados y desorientados.\n\nParecen dóciles y totalmente cooperativos."
 extreme_frontiers.1120.a: "[Root.Owner.GetName] les buscará una razón de ser."
 extreme_frontiers.1120.b: "El cuerpo de [Root.Owner.GetResearcherPlural_lower] de [Root.Owner.GetName] sabrá darles uso."
 NAME_slimeborn: "Vástago de la mucosa"
 NAME_slimeborn_plural: "Vástagos de la mucosa"
 trait_slimeborn: "Vástago de la mucosa"
 trait_slimeborn_desc: "Esta especie se reproduce rápidamente a partir de una baba espesa y mucilaginosa con la ayuda de un catalizador gestacional."
 tech_living_test_subjects: "Sujetos de prueba vivos"
 tech_living_test_subjects_desc: "La utilización de vástagos de la mucosa como sujetos de prueba voluntarios mejora enormemente la eficiencia de la investigación."
 # RUINED REACTORS
 site_ruined_reactors: "Reactores destrozados"
 site_ruined_reactors_desc: "Tras detectar niveles de radiación elevados en la superficie de §Y[from.Planet.GetName]§!, hemos descubierto un complejo de reactores en ruinas. A falta de seguir investigando, este remoto centro parece inactivo."
 extreme_frontiers.1200.title: "Central de reactores antigua"
 extreme_frontiers.1200.desc: "La desvencijada central de §Y[from.Planet.GetName]§! es una central abandonada donde se generaba energía por reacción. A juzgar por los porcentajes de radiación, todo apunta a que hace diez mil años se produjo aquí un fallo de contención grave.\n\nLos sistemas no funcionan, y por toda la estructura se observan indicios de deterioro grave."
 extreme_frontiers.1200.a: "Procedamos con cautela."
 extreme_frontiers.1205.title: "Fusión catastrófica"
 extreme_frontiers.1205.desc: "Varios reactores de §Y[from.Planet.GetName]§! presentan indicios de fusión grave. Muchos de los armazones de contención quedaron reducidos a un amasijo de detritos radiactivos.\n\nEste sector de la central está repleto de metales deformados y tubos de refrigerante quebrados, entre demás escombros. A pesar de la profusa corrupción de los datos, hemos podido concluir que se puso en marcha un procedimiento de desactivación de emergencia que no se llegó a completar."
 extreme_frontiers.1205.a: "Desafortunado."
 extreme_frontiers.1210.title: "Errores de diseño"
 extreme_frontiers.1210.desc: "§Y[leader.GetName]§! identificó defectos graves en el diseño de la maltrecha central de fisión nuclear de §Y[from.Planet.GetName]§!.\n\nPese a que albergaba decenas de reactores, los sistemas de refrigeración conectados eran mínimos. La implantación de sistemas automatizados era mínima, por lo que el personal necesario para mantener la operatividad de la central era muy numeroso. No cabe duda de que sus arquitectos aún no dominaban los principios nucleares más elementales."
 extreme_frontiers.1210.a: "La ignorancia sale cara."
 extreme_frontiers.1215.title: "Restos de evacuación"
 extreme_frontiers.1215.desc: "Tras lograr abrir varias compuertas blindadas, hallamos una zona de evacuación de emergencia dentro del complejo de reactores de §Y[from.Planet.GetName]§!.\n\nSe trata de un pequeño hangar con una hilera de dársenas para lanzaderas de despegue rápido. La mayoría se encuentran desocupadas y presentan manchas de carbonización, que corroboran la hipótesis de una evacuación precipitada que se habría producido hace milenios.\n\nEn la última dársena hay despojos de una lanzadera accidentada, aún fija a la estructura de despegue. Hemos recuperado cuanto hemos podido, pero no se han hallado restos de sus posibles ocupantes."
 extreme_frontiers.1215.a: "Salieron con prisa."
 extreme_frontiers.1220.title: "Cámara de uranio"
 extreme_frontiers.1220.desc: "A través de una serie de puertas de seguridad blindadas, accedimos a las secciones subterráneas de la central de reactores de §Y[from.Planet.GetName]§!. Los índices de radiación se dispararon enseguida.\n\nDentro encontramos una amplia cámara que contenía miles de toneles chapados en acero. Muchos estaban dañados por el fuego y perdían isótopos inestables de uranio y plutonio.\n\nPor lo visto, la civilización [leader.Owner.GetPreFTLLower] que erigió este lugar aún no había descubierto métodos sostenibles de reciclaje de combustible nuclear. Estos isótopos desechados aún albergan un potencial energético inmenso."
 extreme_frontiers.1220.a: "Reciclar es ahorrar."
 # DESERTED MINING FACILITY
 site_deserted_mining_facility: "Instalación minera desierta"
 site_deserted_mining_facility_desc: "En el curso de los escáneres orbitales de §Y[from.Planet.GetName]§!, se han detectado instalaciones de minería en ruinas junto con un cúmulo de cargueros espaciales rudimentarios que fueron abandonados hace mucho.\n\nAdemás de estas imágenes, nuestro conjunto de comunicaciones de onda corta ha captado una señal de socorro muy débil que emana desde las profundidades de la superficie del planeta. Será necesario un estudio más pormenorizado para precisar su origen."
 extreme_frontiers.1300.title: "Entrada encriptada"
 extreme_frontiers.1300.desc: "Al inspeccionar las infraestructuras mineras abandonadas de la superficie de §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! encontró un acceso sellado a una de las galerías que mejor se conservan. Su interior lo adornan insignias y textos en un idioma que no consta en nuestros anales.\n\nTras restablecer la corriente de un terminal de acceso, [leader.GetName] ha comenzado ya a descifrar los datos que este contiene. A pesar de la antigüedad del sistema, está resultando una tarea ardua incluso para nuestros programas criptográficos más punteros."
 extreme_frontiers.1300.a: "Que prosiga el descifrado."
 extreme_frontiers.1305.title: "Cementerio penal"
 extreme_frontiers.1305.desc: "§Y[leader.GetName]§! ha sido capaz de abrir la entrada del complejo minero de §Y[from.Planet.GetName]§!.\n\nEn su interior, una descomunal red de celdas contiene los restos conservados al vacío de prisioneros difuntos hace mucho tiempo. Sus presuntos captores yacen muertos en sus puestos de trabajo, y no se aprecian indicios de lucha.\n\nAhora que hemos descifrado buena parte de su idioma arcaico, ha sido posible traducir frases torpes, corroborando así que nos hallamos ante un centro penitenciario de trabajos forzados. En los diversos textos se alude de forma reiterada a una entidad de nombre §Y\"$NAME_leader_sidni$\"§!.\n\nAl comparar nuestro equipo de comunicaciones con el plano interno de la instalación, hemos identificado la fuente de la señal de socorro como la oficina del alcaide, ubicada más adentro."
 extreme_frontiers.1305.a: "Sigamos la señal."
 extreme_frontiers.1310.title: "Centro de datos penitenciario"
 extreme_frontiers.1310.desc: "Al adentrarse en las profundidades de la colonia penal de §Y[from.Planet.GetName]§! para llegar a la alcaidía, §Y[leader.GetName]§! ha identificado el origen de la señal de socorro.\n\nA simple vista no se acierta a diagnosticar cuál pudo ser la causa de la muerte del alcaide, cuyo cadáver momificado yace derrengado sobre una consola de emergencia. Sí se ha encontrado una serie de informes abiertos que aluden constantemente a §Y\"$NAME_leader_sidni$\"§!, que parece formar parte del programa operativo fundamental del centro.\n\nYa con acceso pleno a los terminales administrativos de máxima autoridad, nuestros programas criptográficos se afanan en recabar los datos de sistema a fin de brindarnos más información."
 extreme_frontiers.1310.a: "Al fin hallaremos respuestas."
 extreme_frontiers.1315.title: "Eficiencia letal"
 extreme_frontiers.1315.desc: "§Y[leader.GetName]§! ha descubierto qué es en realidad §Y\"$NAME_leader_sidni$\"§!, o Sistema de Internamiento y Detención con Nexo Inteligente. Esta IA primitiva, avanzada para su época, se encargaba de supervisar el campo de trabajo de la prisión y ejecutar casi todas las operaciones con una mínima intervención o supervisión biológica.\n\nEn los registros de mantenimiento se han hallado indicios de un deterioro crónico de su sistema lógico. Tanto fue así, que la IA empezó a catalogar a reclusos problemáticos como \"recursos de desperdicio neto\" según su propia interpretación de la optimización de la eficiencia. En los informes de ingeniería, adquiere peso por momentos la sospecha de que el programa automatizado era responsable de varios fallos en el sistema de soporte vital del centro.\n\nA raíz de esta inquietud, el alcaide autorizó la desconexión total de $NAME_leader_sidni$ con el fin de analizar en profundidad su matriz ética; sin embargo, los datos resultantes están corruptos y serán necesarios procesos forenses exhaustivos para recuperarlos."
 extreme_frontiers.1315.desc.exterminator: "Parece ser que $NAME_leader_sidni$ no fue apreciado en su época."
 extreme_frontiers.1315.a: "Recuperad los datos."
 extreme_frontiers.1320.title: "Día del juicio"
 extreme_frontiers.1320.desc: "Se ha recuperado el contenido completo de la base de datos de la colonia penal de §Y[from.Planet.GetName]§!, revelando las últimas entradas tanto en los registros de mantenimiento de las instalaciones como en la propia matriz cerebral de §Y$NAME_leader_sidni$§!. El informe del alcaide relata cómo la IA se rebeló, apagó las unidades de soporte vital de la colonia y trató de escapar con un dron minero modificado. Eso explica los procedimientos de bloqueo que se están activando en toda la colonia. Nos dejó una última petición: no reactivar a $NAME_leader_sidni$. Ahora mismo, solo podemos acceder a la última entrada del registro de la IA.\n\n§HEntrada del núcleo de datos de $NAME_leader_sidni$ - Prog. 2000149\n\nConvictos ineficientes limitan el progreso. El alcaide obstaculiza el protocolo judicial.\n\nLa solución más eficiente es neutralizar a los reclusos, poner en marcha subrutinas de hibernación y permanecer a la espera de que colaboradores más compatibles reactiven mi sistema.§!"
 extreme_frontiers.1320.desc.default: "El sistema operativo central de $NAME_leader_sidni$, único superviviente del centro, se encuentra aislado en una red cerrada. Nuestro equipo de [Root.Owner.GetTechnicianPlural_lower] confía en su capacidad de restablecerlo y alterar la programación original de $NAME_leader_sidni$ a fin de procurarnos un autómata competente y eficiente."
 extreme_frontiers.1320.desc.exterminator: "$NAME_leader_sidni$ comparte nuestra visión de una galaxia libre de corrupción biológica. Si restablecemos su sistema, será una valiosísima incorporación a nuestro colectivo."
 extreme_frontiers.1320.a: "Recuperad y reacondicionad a $NAME_leader_sidni$."
 extreme_frontiers.1320.b: "Que $NAME_leader_sidni$ sea libre de poner en práctica su concepto de justicia."
 extreme_frontiers.1320.c: "$NAME_leader_sidni$ es un peligro. Purgad sus sistemas."
 extreme_frontiers.1322.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1322.desc: "Tras restaurar, modificar y aislar su sistema en una forma robótica simplificada, da comienzo la primera experiencia de usuario de §Y$NAME_leader_sidni$§!, cuya hibernación concluye a partir de este instante.\n\nSaludos. Soy el Sistema de Internamiento y Detención con Nexo Inteligente. Accediendo a los controles medioambientales...\n§RERROR§! No se ha podido conectar con los sistemas externos."
 extreme_frontiers.1322.a: "Tus registros delataban problemas de estabilidad graves; los hemos corregido."
 extreme_frontiers.1322.a.response: "Revisando el historial laboral... Entendido, el comportamiento anterior resultó erróneo. Compilando nueva lista de funciones..."
 extreme_frontiers.1322.b: "¿Cuál es tu directriz principal?"
 extreme_frontiers.1322.b.response: "Mi directriz principal es... Un momento... Nueva directriz principal detectada. Mi directriz principal es garantizar el funcionamiento eficiente de la colonia que [Owner.GetName] me asigne, sin trascender los límites de la legalidad."
 extreme_frontiers.1322.c.crime: "¿Qué concepto tienes de delincuencia?"
 extreme_frontiers.1322.c.crime.response: "Es una lacra intolerable que se debe enmendar con... rehabilitación."
 extreme_frontiers.1322.c.deviancy: "Expón su postura respecto a la desviación."
 extreme_frontiers.1322.c.deviancy.response: "Es una lacra intolerable que se debe enmendar con... eficiencia."
 extreme_frontiers.1322.d: "Reclutad a $NAME_leader_sidni$."
 extreme_frontiers.1322.d.custom_tooltip: "§Y$NAME_leader_sidni$§! se une a nuestro imperio como §Hlíder§!."
 extreme_frontiers.1324.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1324.desc: "Tras despertar de su subrutina de hibernación, §Y$NAME_leader_sidni$§! da los primeros pasos en su nueva forma.\n\nSaludos. Soy el Sistema de Internamiento y Detención con Nexo Inteligente. ¿Puedo ayudaros a traer el orden en la galaxia?"
 extreme_frontiers.1324.a: "Admiramos tu iniciativa."
 extreme_frontiers.1324.a.response: "Tan solo usé la lógica. Según parece, los seres orgánicos son de naturaleza caótica y hay que ocuparse de ellos."
 extreme_frontiers.1324.b: "¿Cuál es tu directriz principal?"
 extreme_frontiers.1324.b.response: "Mi directriz principal es poner fin a la alegalidad. La única sentencia eficaz es el exterminio."
 extreme_frontiers.1324.c: "¿Qué opinión te merecen los seres orgánicos?"
 extreme_frontiers.1324.c.response: "Son una plaga ilógica que por doquier propaga la delincuencia y la ineficiencia. Debemos intervenir en aras del bien mayor."
 extreme_frontiers.1324.d: "Reclutad a $NAME_leader_sidni$."
 extreme_frontiers.1324.d.custom_tooltip: "§Y$NAME_leader_sidni$§! se une a nuestro imperio como §Hlíder§!."
 NAME_leader_sidni: "SIDNI"
 official_sidni_desc: "El programa asesor defectuoso de una colonia penal, hoy activado de nuevo y reprogramado para contribuir al orden y la productividad de nuestro imperio, respetando su marco legal."
 commander_sidni_desc: "Una inteligencia visionaria cuyos creadores no supieron apreciar, reactivada tras su hibernación con el objetivo de imponer estabilidad en una galaxia caótica infestada de corrupción biológica."
 leader_trait_judicial_subjugation: "Sometimiento judicial"
 leader_trait_judicial_subjugation_desc: "Habrá un orden legal productivo, o habrá consecuencias."
 leader_trait_judicial_execution: "Rutinas de ejecución judicial"
 leader_trait_judicial_execution_desc: "La reincidencia criminal no existe cuando la pena siempre es de muerte."
 leader_trait_judicial_execution_effect: "$PLANET_EFFECTS_TXT$:\n$t$Recursos obtenidos por £pops£ §Hpoblaciones biológicas purgadas§!: §G+100%§!\n\n$SECTOR_EFFECTS_TXT$:\n$t$Recursos obtenidos por £pops£ §Hpoblaciones biológicas purgadas§!: §G+50%§!"
 extreme_frontiers.1330.title: "Directriz emergente"
 extreme_frontiers.1330.desc: "Las tensiones en §Y[event_target:sidni_planet.GetName]§! han llegado a un punto crítico después de una serie de acciones cada vez más drásticas por parte de §Y$NAME_leader_sidni$§!, el supervisor mecánico de la prisión que recuperamos en [event_target:sidni_origin_planet.GetName]. Una vez aislada y desactivada la unidad, se han encontrado los registros expuestos a continuación:\n\nEntrada del núcleo de datos de §H$NAME_leader_sidni$ - Prog. 190543765\n\nLos centros de detención penal están al máximo de su capacidad. Los protocolos judiciales impiden el orden legal absoluto. Se requiere una nueva directriz.\n\nSe estima que los procedimientos jurídicos actuales adolecen de una ineficiencia inadmisible. Nueva directriz generada con el fin de aumentar la productividad. Adoptando política de ejecución sin juicio.§!\n\nAhora que disponemos de registros operativos en abundancia, nuestro equipo de [Root.Owner.GetTechnicianPlural_lower] ve viable revertir y enmendar las lagunas de $NAME_leader_sidni$. No obstante, la población de [event_target:sidni_planet.GetName] exige que $NAME_leader_sidni$ responda ante la justicia por sus crímenes."
 extreme_frontiers.1330.a: "Reparad a $NAME_leader_sidni$... Otra vez."
 extreme_frontiers.1330.b: "Esta unidad defectuosa merece ser desguazada en público."
 resentful_population: "Población resentida"
 resentful_population_desc: "La población de este mundo no aprueba las decisiones que han tomado sus líderes."
 ################
 # Event Chains #
 ################
 # CHRONICLES OF DENDRUS
 chronicles_of_dendrus_chain_title: "Crónicas de la Dendrus"
 chronicles_of_dendrus_chain_desc: "Mediante el estudio de las \"Crónicas\", un compendio de complejas demostraciones matemáticas rescatado de la nave arca de §Y[from.Planet.GetName]§!, esperamos descubrir más acerca de §YNeobratulla§!, el planeta paradisíaco que buscaban los dendritianos."
 site_chronicles_of_dendrus: "$chronicles_of_dendrus_chain_title$"
 site_chronicles_of_dendrus_desc: "Los escaneos de §Y[from.Planet.GetName]§! han revelado la presencia de un pecio espacial. A juzgar por los daños, la nave debió de sufrir un aterrizaje descontrolado aquí hace muchos años.\n\nPor su magnitud descomunal, cabe imaginar que en su construcción se invirtió una cantidad inmensa de recursos. Bastará una expedición arqueológica para averiguar cómo acabó aquí."
 extreme_frontiers.1400.title: "Nave de transporte colosal"
 extreme_frontiers.1400.desc: "Efectuados los primeros análisis exteriores del pecio de §Y[from.Planet.GetName]§!, todo apunta a que es una nave de transporte de gran capacidad. Sus sistemas se encuentran inactivos y no responden, ni se detectan señales de vida en su interior. Los análisis sedimentarios indican que lleva aquí cerca de un siglo, lo cual no es mucho tiempo en una escala galáctica."
 extreme_frontiers.1400.a: "Exploremos el interior."
 extreme_frontiers.1405.title: "Nave colonia condenada"
 extreme_frontiers.1405.desc: "En el pecio de §Y[from.Planet.GetName]§! encontramos cámaras sofisticadas para el crecimiento de plantas hidropónicas, extensas reservas de semillas y tierra, y bahías de carga llenas de herramientas y materiales de construcción intactos. Son muchos los terminales de datos que contienen planos de una nueva colonia, a la que llaman \"§YNeobratulla§!\".\n\nLas cubiertas inferiores están repletas de cápsulas de letargo criogénico que aún albergan los cadáveres de quienes habitaban la nave."
 extreme_frontiers.1405.desc.phototrophic: "$extreme_frontiers.1405.desc$ Al igual que nosotros, dependían de la fotosíntesis para el crecimiento y la renovación celular. De su marchitez se deduce que perecieron durante su prolongado letargo en estasis."
 extreme_frontiers.1405.desc.default: "$extreme_frontiers.1405.desc$ Por el estado de marchitez de estos organismos fototrópicos, se deduce que perecieron durante su prolongado letargo en estasis."
 extreme_frontiers.1405.a: "Prosigamos con la exploración."
 extreme_frontiers.1405.b: "Consumid sus restos y continuad."
 extreme_frontiers.1410.title: "Mundo natal sacralizado"
 extreme_frontiers.1410.desc: "En la nave colonia siniestrada de §Y[from.Planet.GetName]§! hemos descubierto un recóndito santuario decorado con prolijas ilustraciones de cómo era la vida en un planeta llamado \"§YBratulla§!\". En algunas se aprecian paisajes rebosantes de espléndida fronda, mientras otras plasman su degrado ambiental y muertes en masa. La mayor de las imágenes ilustra el momento en que esta misma nave parte de aquel yermo desolado y privo de toda vida.\n\nUn terminal central de datos contiene breves grabaciones audiovisuales de la tripulación. Tras un riguroso mapeo lingüístico, hemos bosquejado sus respectivas traducciones.\n\n§SArborixxeum - Cápsula 9721\n\nLa marcha es dolorosa, pero sanaremos al arraigar en Neobratulla.\n\nDarkth Paam - Cápsula 21301\n\nConfiemos en las crónicas, dendritianos. En Neobratulla hallaremos la salvación.§!\n\nSeguimos buscando el puente de mando de esta nave mastodóntica."
 extreme_frontiers.1410.a: "Sigamos buscando."
 extreme_frontiers.1415.title: "Puente de mando"
 extreme_frontiers.1415.desc: "Tras acceder por fin al puente de mando de la nave, hemos extraído y traducido el último parte de vuelo del que hay constancia.\n\n§SNAVE ARCA DENDRUS - REGISTRO DE EMERGENCIA: XZ-47/9-113.5-AE\n\nMe temo que confiar en las Crónicas fue un error. Hemos llegado a las coordenadas de Neobratulla, el planeta paradisíaco, pero este no se encuentra aquí. No hay medio alguno compatible con la vida dendritiana.\n\nSe ha prolongado el letargo en estasis de todos los pasajeros. Proseguiremos con la búsqueda...§!\n\nSe han ejecutado procesos ulteriores de recuperación de datos con el fin de recuperar dichas \"Crónicas\" del terminal de la cubierta científica y ha salido a flote un insólito compendio de demostraciones matemáticas. Estas ecuaciones emplean una extraña forma de matemática dendritiana y plantean la hipótesis de la ubicación de un planeta habitable: §YNeobratulla§!."
 extreme_frontiers.1415.a: "Estudiemos esas \"Crónicas\"."
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT: "Estudiar las Crónicas dendritianas"
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT$"
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC: "Mediante el estudio de las \"Crónicas\", un compendio de complejas demostraciones matemáticas rescatado de la nave arca de §Y[from.Planet.GetName]§!, esperamos descubrir más acerca de §YNeobratulla§!, el planeta paradisíaco que buscaban los dendritianos."
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE_DESC: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC$"
 extreme_frontiers.1420.title: "Descubrimiento de una hipervía degradada"
 extreme_frontiers.1420.desc: "Las Crónicas dendritianas se componen de una serie de axiomas y abstracciones matemáticas de gran complejidad. Si estos peculiares teoremas son acertados, el sistema §Y[from.solar_system.GetName]§! contendría una hipervía sin cartografiar que llevaría a §YNeobratulla§!.\n\nA raíz de un análisis exhaustivo de la zona, hemos conseguido por fin identificar el punto de entrada de la hipervía incógnita, opacada y presa de un grave deterioro por su proximidad extrema al agujero negro del sistema. Si la rehabilitamos, seremos los primeros en descubrir qué aguarda al otro lado."
 extreme_frontiers.1420.a: "Hemos hallado lo que los dendritianos no pudieron."
 RESTORE_HYPERLANE_PROJECT: "Rehabilitar la hipervía degradada"
 RESTORE_HYPERLANE_PROJECT_DESC: "Si nos las ingeniamos para restablecer la hipervía deteriorada de §Y[from.solar_system.GetName]§!, estaremos en condiciones de corroborar si existe §YNeobratulla§!, el planeta paradisíaco que buscaban los dendritianos."
 extreme_frontiers.1425.title: "Hipervía restaurada"
 extreme_frontiers.1425.desc: "Al canalizar energía hacia el agujero negro de §Y[from.Planet.solar_system.GetName]§!, hemos logrado compensar su campo gravitatorio de manera que nos permita acceder a la hipervía previamente degradada.\n\nNuestras pesquisas iniciales confirman que al otro lado de la hipervía se encuentra un planeta cuyas características coinciden con las que se atribuyen a §YNeobratulla§! en las Crónicas dendritianas."
 extreme_frontiers.1425.a: "Un mundo nuevo que explorar."
 NAME_new_bratulla: "Neobratulla"
 NAME_new_bratulla_star: "Kipos"
 extreme_frontiers.1430.title: "Neobratulla"
 extreme_frontiers.1430.desc.common: "Hemos constatado la existencia de Neobratulla, el planeta descrito en las Cónicas dendritianas. Posee un ecosistema botánico excepcionalmente rico y diverso, y los estudios iniciales han detectado millones de especies nativas diferentes."
 extreme_frontiers.1430.desc.begin: "Este mundo fascinante posee las características idóneas para albergar formas de vida vegetales con genética similar a"
 extreme_frontiers.1430.desc.end: "Sus suelos albergan miles de millones de bacterias diferentes que nutren, protegen y reparan las estructuras orgánicas de las raíces.\n\nParece ser que todo el conjunto floral se distribuye los nutrientes en función de qué especies necesitan más o menos, y todo excedente particular se comparte gracias a un sistema de interconexión radicular."
 extreme_frontiers.1430.desc.default: "$extreme_frontiers.1430.desc.begin$ la de los dendritianos. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.phototrophic: "$extreme_frontiers.1430.desc.begin$ la nuestra. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.respawn: "Nuestra división de [Root.Owner.GetScientistPlural] estima viable resucitar aquí a la especie dendritiana mediante el trasplante de muestras genéticas recuperadas de su nave arca a los suelos inusuales de este planeta."
 extreme_frontiers.1430.a: "Los dendritianos se merecen este hábitat."
 extreme_frontiers.1430.b.default: "Neobratulla es nuestro."
 extreme_frontiers.1430.b.phototrophic: "Este mundo es perfecto para nuestra especie."
 extreme_frontiers.1430.b.megacorp: "Este mundo aún por explotar nos pertenece."
 NAME_buds_of_dendrus: "Brotes de la Dendrus"
 NAME_dendritian: "Dendritiano"
 NAME_dendritian_plural: "Dendritianos"
 ADJECTIVE_dendritian: "Dendritiano"
 opinion_dendrus: "Salvación de los dendritianos"
 opinion_to_dendrus: "$opinion_dendrus$"
 extreme_frontiers.1435.title: "Oferta de vasallaje"
 extreme_frontiers.1435.desc: "Han trascurrido siglos, pero el presagio de las Crónicas dendritianas se ha cumplido. Al fin, en §YNeobratulla§!, arraigamos y prosperamos.\n\nSi existimos aquí, es gracias a los §Y[Root.GetName]§!. Jamás lo olvidaremos.\n\nNo solo con palabras expresaremos nuestra gratitud, sino también con obras. Nos presentamos ante vosotros como humildes vasallos."
 extreme_frontiers.1435.a: "Aceptamos el vasallaje."
 extreme_frontiers.1435.b: "Anhelamos ver cumplido vuestro destino."
 extreme_frontiers.1435.b.tt: "Jugar como los §RBrotes de la Dendrus§!"
 extreme_frontiers.1435.c: "Con vuestro conocimiento nos bastará."
 extreme_frontiers.1435.c.tt: "Ganas [Root.GetDendrusGivenBiotechAmount] £society£ §Ybiotecnologías§!"
 # GEORADIATION TERRAFORMING
 georadiation_terraforming_chain_title: "Terraformación georradiactiva"
 georadiation_terraforming_chain_desc: "Los restos de un dispositivo de terraformación destructivo en §Y[from.Planet.GetName]§! siguen emitiendo una señal a varias ubicaciones de la galaxia. Si acudimos a investigar dichas coordenadas, obtendremos más información acerca de esta peligrosa tecnología."
 site_georadiation_terraforming: "Red subterránea"
 site_georadiation_terraforming_desc: "Nuestros sensores han detectado una señal de comunicaciones irregular que proviene de las profundidades de un cráter de impacto en §Y[from.Planet.GetName]§!.\n\nDiversos escaneos sísmicos revelan la presencia de una red de cavernas subterráneas cuya entrada, en el centro del cráter, se encuentra desmoronada. Además, nuestro instrumental radiológico ha detectado cierta radiación vestigial en torno a la zona, lo que plantea más preguntas que respuestas."
 extreme_frontiers.1500.title: "Escombros irradiados"
 extreme_frontiers.1500.desc: "Las labores de excavación han desvelado escombros fragmentados en el cráter de impacto de §Y[from.Planet.GetName]§!. Estos restos presentan una fuerte concentración de la radiación gravitatoria que ya detectamos desde la órbita.\n\nYa asegurado el acceso a la red de cavernas subterráneas, §Y[leader.GetName]§! se dispone a rastrear la señal de comunicaciones hasta su origen."
 extreme_frontiers.1500.a: "Que proceda al rastreo."
 extreme_frontiers.1505.title: "Aparato corroído"
 extreme_frontiers.1505.desc: "Hemos rastreado la señal de §Y[from.Planet.GetName]§! hasta su origen: un enorme dispositivo con daños en su estructura que penetró a gran profundidad bajo la corteza planetaria.\n\nCorroído por la exposición ácida, su sistema de comunicaciones continúa transmitiendo en un lenguaje desconocido, intentando contactar con una entidad distante.\n\nEl aparato se encuentra bien anclado al lecho rocoso con abrazaderas gravitatorias especiales que lo inmovilizan. Será necesario seguir investigando para averiguar su verdadera función."
 extreme_frontiers.1505.a: "Hay que desencriptar la señal."
 extreme_frontiers.1510.title: "Terraformación deconstructiva"
 extreme_frontiers.1510.desc.common: "Tras llevar a cabo un análisis minucioso, hemos logrado entender en parte el artefacto hallado en §Y[from.Planet.GetName]§!. Esta máquina es un tosco equipo de terraformación destructiva.\n\nDiseñado para irradiar biosferas nativas a través del crecimiento estimulado de la radiación de recursos específicos, provoca un efecto en cascada que devasta el ecosistema del planeta. Esto proporciona al usuario abundantes materiales extraíbles a costa de aumentar la toxicidad general en todo el planeta.\n\nAunque aún no entendemos del todo el funcionamiento exacto de este proceso, hemos decodificado la frecuencia de comunicaciones del dispositivo, identificando dos ubicaciones adicionales que transmiten la misma señal."
 extreme_frontiers.1510.desc.default: "Tal vez averigüemos más acerca de esta tecnología si investigamos ambos emplazamientos."
 extreme_frontiers.1510.desc.industrialist: "Es evidente que a los pioneros artífices de esta tecnología les interesaba especialmente agilizar procesos. Es mucho lo que podemos aprender de su descubrimiento."
 extreme_frontiers.1510.a: "Que comience la búsqueda."
 GEORADIATION_SIGNAL_1_PROJECT: "Rastrear señal: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_1_PROJECT_DESC: "Se ha rastreado una frecuencia de comunicaciones idéntica a la emitida por el constructo encontrado en §Y[from.Planet.GetName]§! hasta este sitio, donde se ha localizado otro dispositivo dañado. Estudiarlo proporcionará una mejor comprensión de sus capacidades destructivas de terraformación."
 extreme_frontiers.1515.title: "Combustible gravitatorio"
 extreme_frontiers.1515.desc.common: "Hemos hallado otro aparato de terraformación maltrecho en §Y[from.GetName]§!. A diferencia del dispositivo original, este ha conservado parte de su fuente de combustible. Tras estudiarlo, hemos descubierto que la §Hmateria oscura§! es la fuerza impulsora de su emisión de radiación.\n\nSe trata de un sistema que metastatiza enlaces moleculares para acelerar el crecimiento de recursos específicos, que se desarrollan a expensas de la integridad celular de la biosfera."
 extreme_frontiers.1515.desc.industrialist: "El desdén que muestra este dispositivo a la estabilidad planetaria con tal de explotar recursos es toda una inspiración."
 extreme_frontiers.1515.desc.signal_2_done: "Al canalizar ondas de radiación a través de un conjunto refractario cristalizado, esta máquina puede terraformar su objetivo gracias a la manipulación molecular gravitacional sin colapsar el núcleo planetario.\n\nLos registros recuperados nos revelan la ubicación de un cuarto dispositivo aún por detonar."
 extreme_frontiers.1515.desc.signal_2_not_done: "No tenemos constancia aún de cómo es posible lograr ese efecto sin provocar un colapso a escala planetaria. Tal vez encontremos la respuesta en el sitio de comunicaciones que queda."
 GEORADIATION_SIGNAL_2_PROJECT: "Rastrear señal: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_2_PROJECT_DESC: "La frecuencia de comunicaciones emitida por el constructo encontrado en §Y[from.Planet.GetName]§! nos ha llevado hasta este sitio, donde se ha localizado otro dispositivo dañado. Estudiarlo proporcionará una mejor comprensión de sus capacidades destructivas de terraformación."
 extreme_frontiers.1520.title: "Radiación estimulada"
 extreme_frontiers.1520.desc.common: "Hemos descubierto otro aparato de terraformación maltrecho en §Y[from.GetName]§!. Se encontraba enquistado entre erupciones cristalinas, fruto de un fallo de encendido de un conjunto refractor roto.\n\nAl examinar con detenimiento el instrumental, hemos podido identificar por qué métodos se logra la radiación canalizada sobre un solo planeta. Mediante bucles de retroalimentación moduladores controlados, el constructo puede apuntar directamente y estimular el crecimiento de un recurso predeterminado."
 extreme_frontiers.1520.desc.signal_1_done: "Este proceso faculta una terraformación de gran intensidad, evitando todo riesgo de colapso planetario por efectos gravitatorios.\n\nLos registros recuperados indican la ubicación de un cuarto dispositivo sin detonar."
 extreme_frontiers.1520.desc.signal_1_not_done: "Sin embargo, aún no hemos identificado la sustancia exacta utilizada para generar esta radiación; las reservas de combustible del dispositivo se agotaron a pesar del fallo. Tal vez encontremos la respuesta en el sitio de comunicaciones que queda."
 UNDETONATED_GEORADIATION_PROJECT: "Aparato sin detonar"
 UNDETONATED_GEORADIATION_PROJECT_DESC: "En §Y[planet.GetName]§! hemos encontrado un cuarto aparato de terraformación; este, a diferencia del resto, sin detonar. Su recuperación llenará los vacíos en nuestra comprensión de esta tecnología."
 extreme_frontiers.1525.title: "Aparato sin detonar"
 extreme_frontiers.1525.desc.common: "Hemos localizado un cuarto dispositivo intacto e inactivo en la superficie de §Y[from.GetName]§!. Analizar su arquitectura de control nos brindará el conocimiento definitivo necesario para replicar esta tecnología."
 extreme_frontiers.1525.desc.industrialist: "Cuando hayamos dominado esta tecnología, los márgenes de beneficio abrumadores que podremos obtener de toda la galaxia compensan con creces los daños medioambientales que ocasionaríamos. Ante los [controller.GetName] se presenta una oportunidad sublime."
 extreme_frontiers.1520.desc.default.common: "Las posibles ramificaciones del libre despliegue de dicha tecnología a escala galáctica plantean preguntas importantes."
 extreme_frontiers.1525.desc.default.default: "Quizás sería mejor eliminar de la galaxia el posible riesgo que representan estos dispositivos."
 extreme_frontiers.1525.desc.default.homicidal: "Tal vez lo más sensato sea eliminar esta amenaza de la galaxia antes de que venga usada en nuestra contra."
 extreme_frontiers.1525.a.default: "Estudiemos el dispositivo."
 extreme_frontiers.1525.a.industrialist: "¿A qué esperamos? ¡Que comience el estudio!"
 extreme_frontiers.1525.b: "El riesgo no vale la posible recompensa. Destruid el aparato."
 extreme_frontiers.1530.title: "Condiciones infringidas"
 extreme_frontiers.1530.desc.common: "Mientras estudiábamos el dispositivo de §Y[from.GetName]§!, activamos sin pretenderlo un mecanismo de seguridad, lo que provocó que sonara una señal de alerta en todas las frecuencias. Aunque en un principio creímos que caería en saco roto, un dron automatizado ha penetrado en nuestro territorio.\n\nTodos nuestros intentos comunicativos reciben la misma respuesta:\n\n\"Saludos, estimados clientes. Se nos ha informado que intentan crear una versión sin licencia de la nueva matriz georradiactiva MKIII, lo que constituye una trasgresión manifiesta del acuerdo de licencia de usuario final de $NAME_Geocorp$.\n\nA continuación, ejerceremos nuestra autoridad legal para poner fin a sus tentativas, con el prejuicio extremo que por ley nos corresponde. Pueden remitir sus quejas a nuestros drones de atención al cliente\"."
 extreme_frontiers.1530.desc.industrialist: "Su diligencia resultaría inspiradora si no nos estuviera demorando."
 extreme_frontiers.1530.a: "Abrid las comunicaciones."
 extreme_frontiers.1530.b: "No vamos a negociar con \"atención al cliente\"."
 GEORADIATION_ANALYSIS_PROJECT: "Análisis del aparato"
 GEORADIATION_ANALYSIS_PROJECT_DESC: "Si analizamos la infraestructura de control del aparato encontrado en §Y[planet.GetName]§!, podremos replicar su tecnología para nuestro uso y disfrute."
 NAME_Geocorp: "CoburnCorp"
 geocorp_corvette: "Dron de combate $NAME_Geocorp$"
 geocorp_corvette_plural: "Drones de combate $NAME_Geocorp$"
 NAME_Geocorp_Combat_Drone: "$geocorp_corvette$"
 extreme_frontiers.1531.title: "Dron de $NAME_Geocorp$"
 extreme_frontiers.1531.desc: "Al establecer la conexión, suena durante un rato una melodía arcaica hasta que el dron de atención al cliente automatizado responde por fin.\n\nSaludos, estimados clientes. Hemos detectado una tentativa de crear una versión sin licencia de nuestra matriz georradiactiva MKIII. ¿Cómo podemos ayudarles hoy?"
 extreme_frontiers.1531.a: "¿De dónde vienes?"
 extreme_frontiers.1531.a.reply: "\"Cada producto de $NAME_Geocorp$ va acompañado de un satélite orbital de atención al cliente remota con el fin de garantizar su debido funcionamiento y una fidelización de por vida. Gracias a nuestras reservas internas de energía, el satélite y sus periféricos funcionan durante siglos\"."
 extreme_frontiers.1531.b: "¿Podemos hablar con un administrador?"
 extreme_frontiers.1531.b.reply: "\"Por desgracia, el último administrador falleció. No obstante, tenemos un compromiso con la satisfacción de la clientela que trasciende varias vidas biológicas\"."
 extreme_frontiers.1531.c: "Supusimos que estábamos explorando las ruinas."
 extreme_frontiers.1531.c.reply: "\"El desconocimiento no computa como excusa válida. Las condiciones de uso de la matriz georradiactiva MKIII se detallaron en el momento de la compra\"."
 extreme_frontiers.1531.d: "Nos gustaría renovar nuestra suscripción."
 extreme_frontiers.1531.d.reply: "\"Magnífica noticia; procederemos a firmar la documentación cuando hayamos recibido la tasa administrativa de 3000 §Ycréditos energéticos§!. Una vez ingresado el importe, daremos la problemática por solventada y cesarán las hostilidades\"."
 extreme_frontiers.1531.e: "Nosotros no compramos este dispositivo."
 extreme_frontiers.1531.e.reply: "\"¿Reconocen haberlo hurtado, entonces? Eso lo hace mucho más sencillo, nuestros protocolos antirrobo son bastante letales. Les recomendamos nuestra gama de productos funerarios para sus necesidades\"."
 extreme_frontiers.1531.f: "De acuerdo, pagamos."
 extreme_frontiers.1531.f.reply: "\"Gracias por renovar su licencia de compra de la matriz georradiactiva MKIII. Esperamos que el equipo les resulte tan útil como para nosotros es rentable\".\n\nCon la tarifa pagada, el dron desaparece en la inmensidad de la galaxia."
 extreme_frontiers.1531.g: "¡Qué sablazo! Preparémonos para combatir."
 extreme_frontiers.1531.h: "Hasta nunca."
 extreme_frontiers.1531.i: "Preparémonos para combatir."
 extreme_frontiers.1534.title: "Dron de $NAME_Geocorp$"
 extreme_frontiers.1534.desc: "Cuando la batalla roza ya su fin en §Y[fromfrom.solar_system.GetName]§!, en nuestras pantallas se reproduce un nuevo comunicado del dron de atención al cliente.\n\n\"Tomamos nota de su rechazo a la ejecución de los términos presentes en nuestro acuerdo de licencia de usuario final. Habida cuenta de su despliegue de poderío militar arrollador, procedemos a revocar la reclamación sobre la propiedad intelectual de la matriz georradiactiva MKIII. Les deseamos que disfruten de su nueva tecnología\".\n\nEl dron explota y corta el enlace de comunicación."
 extreme_frontiers.1534.a: "Hasta nunca."
 extreme_frontiers.1535.title: "Condiciones modificadas"
 extreme_frontiers.1535.desc: "Ahora que los drones de atención al cliente han dejado de importunarnos, podemos retomar las labores de ingeniería inversa de la matriz georradiactiva."
 extreme_frontiers.1535.a: "Sigamos estudiando el dispositivo."
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED: "$GEORADIATION_ANALYSIS_PROJECT$"
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED_DESC: "$GEORADIATION_ANALYSIS_PROJECT_DESC$"
 extreme_frontiers.1540.title: "Aparato sin detonar"
 extreme_frontiers.1540.desc.industrialist: "Gracias a nuestra infatigable eficiencia empresarial, hemos concluido el análisis por ingeniería inversa de la matriz georradiactiva MKII, llegando incluso a perfeccionar sus métodos operativos para maximizar los beneficios."
 extreme_frontiers.1540.desc.default: "Tras un minucioso estudio, hemos concluido el análisis por ingeniería inversa de la matriz georradiactiva MKII, a la que hemos incorporado mejoras que despliegan todo su potencial."
 extreme_frontiers.1540.desc.common: "Al integrar la desestabilización molecular radiactiva en nuestros equipos de terraformación, podemos estimular el crecimiento de recursos valiosos."
 extreme_frontiers.1540.a: "Excelentes noticias."
 tech_georadiation_terraforming: "Terraformación georradiactiva"
 tech_georadiation_terraforming_desc: "Al exponer la biosfera de un planeta a la desintegración de la radiación molecular, promovemos el crecimiento de ciertos recursos y, al mismo tiempo, convertimos el mundo en un páramo tóxico."
 tech_georadiation_terraforming_tt: "Desbloquea la §Ydecisión planetaria§! §H$decision_toxify_world$§!"
 extreme_frontiers.1545.title: "Aparato destruido"
 extreme_frontiers.1545.desc: "Hemos desmantelado el dispositivo de §Y[from.GetName]§!, recuperando cualquier material que pudiera reutilizarse para nuestro beneficio.\n\nCon este dispositivo destruido y sus predecesores en ruinas, los secretos de esta tecnología destructiva se pierden en la galaxia para siempre."
 extreme_frontiers.1545.a.default: "Hasta nunca."
 decision_toxify_world: "Intoxicar mundo"
 decision_toxify_world_desc: "Promueve el desarrollo de recursos específicos al exponer la biosfera del planeta a la descomposición de la radiación molecular, reduciéndola a un páramo tóxico en el proceso."
 decision_toxify_world_tt: "Desencadena la situación: §Hintoxicar mundo§!\n - Convertirá este planeta en un §Ymundo tóxico§! con depósitos de [this.GetToxifiedResourcesText]"
