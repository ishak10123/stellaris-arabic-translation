 MACRO_BUILDER_TITLE: "§ECentro de ejércitos de asalto§!"
 MACRO_BUILDER_DESC: "El §Ycentro de ejércitos de asalto§! proporciona una manera fácil de reunir un gran número de ejércitos de asalto. Los ejércitos se reunirán en los planetas disponibles de este sector.\n\nUna vez completados, reforzarán cualquier §Yejército§! con §YReunir tropas§! activado o se reunirán en esta base estelar."
 MACRO_BUILDER_CAPACITY_DESC: "El número de £planet£§Yplanetas§! disponibles determina la cantidad de ejércitos que se pueden construir en paralelo. Se pueden excluir planetas del §Ycentro de ejércitos de asalto§! en la pestaña Ejército que se encuentra en la vista Planeta."
