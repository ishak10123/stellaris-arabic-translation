 citizenship_caste_system_limited: "Sistema de castas (residencia)"
 citizenship_caste_system_limited_tooltip: "Las poblaciones de esta especie serán automáticamente esclavizadas si producen £food£ §Halimento§! o £minerals£ §Hminerales§!. Otras poblaciones son libres, pero no pueden participar en política y la especie no puede producir §Hlíderes§!."
