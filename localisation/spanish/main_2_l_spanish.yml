 civic_machine_astromining_drones: "Drones de astrominería"
 civic_machine_astromining_drones_desc: "Esta inteligencia mecánica se especializa en operaciones orbitales y extracción de recursos. Sus drones sirvientes no rinden bien en tareas planetarias."
