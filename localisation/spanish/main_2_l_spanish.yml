 #Origin Events
 TIMELINE_EVENT_GALACTIC_DOORSTEP_TOOLTIP: "§H$origin.1050.name$§!\n§YEvento de origen§!\n\nNuestras naves ya pueden cruzar al otro lado. A modo de regalo de despedida, sus artífices compartieron los secretos de su construcción. Queda despejada la incógnita que tanto nos desconcertaba. No tardaremos en construir nuestros propios portales que permitirán viajar por nuestro imperio de manera prácticamente instantánea."
 TIMELINE_EVENT_GALACTIC_DOORSTEP: "Se abre la Corona negra\n§L[GetDate]§!"
 TIMELINE_EVENT_LOST_COLONY_TOOLTIP: "§HMundo natal descubierto§!\n§YEvento de origen§!\n\nHemos entrado en contacto con la civilización que dio lugar a nuestra colonia perdida. Si bien el tiempo y la distancia nos diferencian de ellos, al fin conocemos nuestros orígenes. Los ecos de nuestro pasado común determinarán lo que nos depara el futuro."
 TIMELINE_EVENT_LOST_COLONY: "El hogar perdido\n§L[GetDate]§!"
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION_TOOLTIP: "§HMundo máquina creado§!\n§YEvento de origen§!\n\nHemos forjado un verdadero mundo máquina, libre de toda ineficiencia y decadencia orgánica. El futuro relucirá como el acero, y será un algoritmo el que lo determine."
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION: "Mundos reforjados\n§L[GetDate]§!"
 TIMELINE_EVENT_REMNANTS_TOOLTIP: "§HEcumenópolis restaurada§!\n§YEvento de origen§!\n\nNuestro imperio ha devuelto su gloria de antaño a nuestro mundo natal. Lo que fue la ruinosa sombra de una reliquia vuelve a erigirse hoy como una boyante ecumenópolis, prueba de la tenacidad y ambición de nuestra civilización."
 TIMELINE_EVENT_REMNANTS: "Mundos reforjados\n§L[GetDate]§!"
 TIMELINE_EVENT_SHATTERED_RING_TOOLTIP: "§HMundo anillo restaurado§!\n§YEvento de origen§!\n\nLas ruinas destrozadas de nuestro sistema natal han sido completamente restauradas. Donde ayer había un cementerio de ambiciones malogradas, hoy refulge un faro de civilización."
 TIMELINE_EVENT_SHATTERED_RING: "Se cierra el círculo\n§L[GetDate]§!"
 TIMELINE_EVENT_LEGENDARY_LEADER_TOOLTIP: "§HDestino cumplido§!\n§YEvento de origen§!\n\nEl viaje de la Luminaria ha llegado a su etapa final. Su gobierno durará eternamente, dando forma al imperio para siempre, o marcará el comienzo de una nueva era, una en la que el liderazgo será compartido y el futuro se reescribirá."
 TIMELINE_EVENT_LEGENDARY_LEADER: "El destino final\n§L[GetDate]§!"
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE_TOOLTIP: "§H§!Túnel del Velo construido\n§YEvento de origen§!\n\nSe ha retirado el Velo que acotaba las realidades, y el primer túnel del Velo conecta ahora nuestros dominios con una dimensión ignota. A través de esta grieta, la distancia y el tiempo se desmoronan, abriendo paso donde antes solo había vacío. Queda por indagar qué misterios o peligros aguardan más allá."
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE: "Más allá del Velo\n§L[GetDate]§!"
 TIMELINE_EVENT_VOID_DWELLERS_TOOLTIP: "§HHábitat construido§!\n§YEvento de origen§!\n\nA partir del vacío, hemos creado. Al crear nuestro primer hábitat adicional, comienza un proceso de expansión de nuestros dominios celestiales. Así, nuestro pueblo jamás verá su existencia limitada a según qué planeta."
 TIMELINE_EVENT_VOID_DWELLERS: "Un hogar entre los astros\n§L[GetDate]§!"
 TIMELINE_EVENT_OCEAN_PARADISE_TOOLTIP: "§HDominio de los mares§!\n§YEvento de origen§!\n\nGracias al poder del control hidrocéntrico, hemos transformado nuestro mundo natal, expandiendo sus vastos océanos más allá de sus límites naturales. Las mareas se doblegan ahora a nuestra voluntad. Pronto, lo hará la galaxia entera."
 TIMELINE_EVENT_OCEAN_PARADISE: "Reclamado por las mareas\n§L[GetDate]§!"
 TIMELINE_EVENT_DOOMSDAY_TOOLTIP: "§HMundo natal destruido§!\n§YEvento de origen§!\n\nHa sucedido lo inevitable. Nuestro mundo natal, que otrora fue un edén de prosperidad, ha sucumbido presa del fuego y la furia de los peores cataclismos. Las cenizas de nuestro pasado se hallan ahora dispersas por el vacío, y nuestro futuro queda en manos de quienes han logrado escapar."
 TIMELINE_EVENT_DOOMSDAY: "El día del fin\n§L[GetDate]§!"
 TIMELINE_EVENT_EVOPRED_ABSORB_TOOLTIP: "§HRasgo de especie absorbido§!\n§YEvento de origen§!\n\nEs la primera vez que absorbemos un nuevo material genético... Qué rico."
 TIMELINE_EVENT_EVOPRED_ABSORB: "Material genético absorbido\n§L[GetDate]§!"
 TIMELINE_EVENT_WORMHOLE_DEFENDED_TOOLTIP: "La destrucción del criadero y sus flotas se produjo con fecha: §L[GetDate]§!"
 TIMELINE_EVENT_WORMHOLE_DEFENDED: "Agujero de gusano defendido\n§L[GetDate]§!"
 #Crisis Events
 TIMELINE_EVENT_CRISIS_GREAT_KHAN_TOOLTIP: "§HGran kan§!\n§YEvento de crisis§!\n\nHa surgido una belicosa figura de autoridad que, aunando a los clanes de merodeadores fragmentados, ha constituido una horda implacable. Gran kan le llaman, y se abre camino por la galaxia a fuerza de plasma y fibra de carbono, derrocando imperios y esclavizando mundos. Flotas enteras sucumben a su poderío. Resulta aterrador ver a unos salvajes erráticos organizarse con un fin claro. Queda atrás la era del saqueo. Esto es una conquista."
 TIMELINE_EVENT_CRISIS_GREAT_KHAN: "Horda desenfrenada\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST_TOOLTIP: "§HTempestad gris§!\n§YEvento de crisis§!\n\nSe han abierto los Portales-L y, a través de ellos, han llegado las ancestrales flotas de guerra de la Tempestad gris. Sus naves trazan un camino de destrucción por la galaxia, aniquilando todo a su paso. No entienden de diplomacia ni clemencia; tan solo ansían la replicación más implacable. Planetas quedan yermos, flotas enteras dejan de existir y el terror no hace sino propagarse. El pasado ha regresado, y todo resulta idéntico."
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST: "El despertar\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_FORMLESS_TOOLTIP: "§HSin forma§!\n§YEvento de crisis§!\n\nUnos aspirantes a refugiados se han visto obligados a contraatacar. Los seres de energía conocidos como Sin forma consideran nuestra galaxia de todo menos un refugio seguro. Llenarán nuestro universo con invasores extradimensionales o morirán en el intento."
 TIMELINE_EVENT_CRISIS_FORMLESS: "La furia de los Sin forma\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE_TOOLTIP: "§HPlaga de gusanos del vacío§!\n§YEvento de crisis§!\n\nLa naturaleza de los gusanos del vacío ha cambiado. Tras alcanzar un punto crítico, han entrado en un frenesí reproductor y ya no crecen a un ritmo sostenible. A este paso —y sin ser conscientes—, erradicarán toda la vida en la galaxia para después poner fin a su propio ciclo."
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE: "Hambre convulsa\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_UNBIDDEN_TOOLTIP: "§HInesperados§!\n§YEvento de crisis§!\n\nA raíz de una fisura en el tejido mismo de la existencia, ha comenzado una invasión de seres de energía pura. No negocian ni flaquean, consumiendo sistemas enteros para alimentar su expansión incansable. Estabilizan la fisura con sus anclas, propiciando así la llegada de más congéneres suyos a nuestros dominios. Han llegado los inesperados."
 TIMELINE_EVENT_CRISIS_UNBIDDEN: "Se abre la fisura\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE_TOOLTIP: "§HCaleidoscopio§!\n§YEvento de crisis§!\n\nUn voraz ente de energía conocido como el Caleidoscopio ha irrumpido en la galaxia y ha empezado a devorar sistemas habitados. Su hambre no parece conocer fin, y se distrae con facilidad. Muy pronto debería reducirse a polvo estelar de nuevo."
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE: "El espectro hambriento\n§L[GetDate]§!"
 TIMELINE_EVENT_BECOME_THE_CRISIS_TOOLTIP: "§HSé la crisis§!\n§YEvento de crisis§!\n\nLa galaxia se ha tornado en un lugar más oscuro. [EVENT_TARGET_0.GetName] ha abandonado toda pretensión diplomática y se ha declarado la mayor amenaza a la existencia galáctica. Sus flotas se preparan, y los espías susurran rumores sobre un plan apocalíptico definitivo. Más que un imperio, es una crisis."
 TIMELINE_EVENT_BECOME_THE_CRISIS: "Némesis galáctica\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE_TOOLTIP: "§HAzote prethoryn§!\n§YEvento de crisis§!\n\nLos prethoryn han llegado desde más allá de los confines galácticos. Sus naves biológicas pululan por las estrellas, dejando únicamente mundos infestados a su paso. El trinar de la horda acallará toda súplica."
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE: "La marea devoradora\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CONTINGENCY_TOOLTIP: "§HContingencia§!\n§YEvento de crisis§!\n\nUna señal fría, calculada e imparable recorre la galaxia. Los sistemas con IA flaquean. Las mentes sintéticas se rinden. La contingencia ha despertado. Del interior de mundos máquinas ocultos emergen implacables formas de guerra que ejecutan su última instrucción: el exterminio total."
 TIMELINE_EVENT_CRISIS_CONTINGENCY: "La señal fantasma\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CETANA_TOOLTIP: "§HCetana§!\n§YEvento de crisis§!\n\nUna voz clama en el vacío: \"Mis hijos, por fin regreso a vosotros.\"\n\nCetana, una antigua inteligencia a la que sellaron hace tanto que incluso su nombre se perdió en el tiempo, ha despertado. Su propósito es rotundo: eliminar el sufrimiento usando cualquier medio necesario. Sus flotas se mueven con una gracia gélida, custodiando su cruzada para llevar a la galaxia a una paz definitiva y despiadada."
 TIMELINE_EVENT_CRISIS_CETANA: "El retorno de la reina\n§L[GetDate]§!"
 TIMELINE_EVENT_HATCH_BEHEMOTH_TOOLTIP: "§HCría de gigante§!\n§YHito§!\n\nLa primera cría de gigante eclosionó con fecha: §L[GetDate]§!"
 TIMELINE_EVENT_HATCH_BEHEMOTH: "Cría de gigante\n§L[GetDate]§!"
 #Galactic Events
 TIMELINE_EVENT_GALACTIC_MARKET_TOOLTIP: "§HMercado galáctico§!\n§YEvento galáctico§!\n\nEl comercio tiende puentes entre las estrellas. Ya es oficial la fundación de un mercado galáctico que constituirá el centro económico de la galaxia. El comercio fluye libremente, las fortunas se crean y se pierden en un instante, y el destino de imperios enteros depende ahora de la oferta y la demanda."
 TIMELINE_EVENT_GALACTIC_MARKET: "Comercio sin fronteras\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_TOOLTIP: "§HComunidad galáctica§!\n§YEvento galáctico§!\n\nLos imperios de la galaxia se han aunado en una sola entidad política. Ha nacido la comunidad galáctica, un inmenso foro en el que la diplomacia, el debate y las pugnas por el poder determinarán el porvenir del firmamento. El tiempo dirá hasta dónde llega su influencia."
 TIMELINE_EVENT_GALACTIC_COMMUNITY: "Nuevo orden\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION_TOOLTIP: "§HResolución aprobada§!\n§YEvento galáctico§!\n\nLa comunidad galáctica ha hablado. Una nueva resolución marcará el rumbo del derecho interestelar. Unos lo celebran y otros montan en cólera, pero todos han de obedecer."
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION: "Una ley para los astros\n§L[GetDate]§!"
 TIMELINE_EVENT_WAR_IN_HEAVEN_TOOLTIP: "§HGuerra en el cielo§!\n§YEvento galáctico§!\n\nLas reliquias de la antigüedad se alzan de nuevo como benévolos supervisores y como coléricos titanes. [EVENT_TARGET_0.GetName] y [EVENT_TARGET_1.GetName], antiguos rivales en una época olvidada, han reavivado su guerra cósmica. Sus flotas eclipsan las estrellas y exigen que las razas más jóvenes se arrodillen... o serán aniquiladas."
 TIMELINE_EVENT_WAR_IN_HEAVEN: "Guerra de los Antiguos\n§L[GetDate]§!"
 TIMELINE_EVENT_NEXUS_STORM_TOOLTIP: "§HTormenta del nexo§!\n§YEvento galáctico§!\n\nUna tormenta como ninguna que se haya visto ha estallado en el sistema [EVENT_TARGET_0.GetName]. La tormenta del nexo arrasa los sistemas, paralizando naves y bombardeando planetas con una devastación despiadada."
 TIMELINE_EVENT_NEXUS_STORM: "Una tempestad sin tiempo\n§L[GetDate]§!"
