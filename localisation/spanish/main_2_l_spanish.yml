 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_VASSAL_DESC: "§HSubyugación§!\nPermite subyugar a otros imperios y ofrecerles protección bajo nuestro control. Todos los imperios serán vasallos, pero las naciones tecnológicamente inferiores serán protectorados. También podemos pedir convertirnos en súbditos si necesitamos protección."
