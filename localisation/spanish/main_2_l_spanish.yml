 slavery_normal: "Esclavitud tradicional"
 slavery_normal_tooltip: "Los §Hesclavos tradicionales§! tienen mayor producción de recursos, pero no pueden emplearse en trabajos de §Y$pop_cat_ruler$§! ni de §Y$pop_cat_specialist$§!."
 slavery_normal_tooltip_delayed: "§La esclavitud tradicional es la forma más común de esclavitud en la galaxia. Ya sea de por vida o por tiempo limitado, el acceso sin restricciones al trabajo ajeno se considera en algunas partes un privilegio con numerosos deberes, y en otras un prerrequisito evidente para una sociedad funcional.§!"
 slavery_domestic: "Servidumbre domestica"
 slavery_domestic_tooltip: "Los §Hsirvientes domésticos§! sin otro trabajo asignado se emplearán como sirvientes, lo que aumenta £amenities£ $PLANET_AMENITIES_TITLE$. No pueden emplearse en trabajos de £pop_cat_ruler£ §Y$pop_cat_ruler$§! ni de £pop_cat_specialist£ §Y$pop_cat_specialist$§!, pero pueden trabajar como [entertainer.GetIcon] §Y[entertainer.GetNamePlural]§!."
 slavery_domestic_tooltip_delayed: "§LLos sirvientes domésticos se dedican a atender las necesidades de las poblaciones libres. Algunos son asignados a domicilios particulares y otros trabajan en espacios públicos. Suelen vivir junto a sus amos y no requieren alojamientos específicos.§!"
 slavery_military: "Siervos de combate"
 slavery_military_tooltip: "Los §Hsiervos de combate§! no tienen bonificaciones a la producción de recursos, pero son excelentes soldados para los §Hejércitos§! locales. Pueden emplearse en trabajos de [enforcer.GetIcon] §Y[enforcer.GetName]§!, [soldier.GetIcon] §Y[soldier.GetName]§! o £pop_cat_worker£ §Y$pop_cat_worker$§!."
 slavery_military_tooltip_delayed: "§LLos siervos de combate a menudo han sido entrenados desde que nacieron en las artes marciales y se les ha inculcado obediencia absoluta. A cambio de su incondicional servicio militar, se les otorga mucha más autonomía que a otros esclavos y pueden emplearse en una mayor variedad de trabajos.§!"
 slavery_livestock: "Ganado"
 slavery_livestock_tooltip: "Las £pop£ §Hpoblaciones de ganado§! no pueden emplearse para producir recursos, pero se pueden mantener para aumentar el suministro de £food£ §Halimento§!.\n\nEn su lugar, el ganado litoideo produce £minerals£ §Hminerales§! y el ganado termófilo produce £alloys£ §Haleaciones§!.\n\nEl ganado se puede almacenar en §Hzoológicos alienígenas§!, donde procurará $r_amenities$."
 slavery_livestock_tooltip_delayed: "§L¡El ganado es población!§!"
 slavery_indentured: "Trabajos no remunerados"
 slavery_indentured_tooltip: "Los §Hsirvientes forzosos§! pueden desempeñar trabajos de £pop_cat_worker£ §Y$pop_cat_worker$§! o £pop_cat_specialist£ §Y$pop_cat_specialist$§! y conservan más poder político que otros esclavos. No pueden trabajar como [entertainer.GetIcon] §Y[entertainer.GetNamePlural]§! o [enforcer.GetIcon] §Y[enforcer.GetNamePlural]§!. Las bonificaciones a la producción basada en la esclavitud solo se aplican cuando se emplean como £pop_cat_worker£ §Y$pop_cat_worker_plural$§!."
 slavery_indentured_tooltip_delayed: "§LEn teoría pueden saldar sus deudas y obtener la libertad, pero sus contratos están redactados de tal forma que eso no suponga un problema.§!"
 living_standard_utopian: "Abundancia utópica"
