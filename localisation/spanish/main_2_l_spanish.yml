 MACRO_BUILDER_QUEUE: "Cola de construcción de ejércitos"
 DEPLOY_IN_ORBIT: "Desplegar en órbita"
 DEPLOY_IN_ORBIT_DESC: "Determina si los §Yejércitos§! recién construidos se despliegan en §Yórbita§! o en el §Yplaneta§!.\n\nLos §Yejércitos§! construidos con el §Yconstructor de ejércitos de la base estelar§! se desplegarán en §Yórbita§!."
