 TECH_UNLOCK_VOLCANO_TERRAFORM_TITLE: "§H Opción de investigación:§! Terraformación volcánica"
 TECH_UNLOCK_VOLCANO_TERRAFORM_DESC: "Nos permite terraformar mundos volcánicos para transformarlos en climas templados."
