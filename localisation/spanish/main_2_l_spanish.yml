 GROUND_SUPPORT_HEADER: "$SUPPORT$ Bombardeo orbital"
 GROUND_SUPPORT_STANCE_DESC: "§HBombardeo orbital§!\nLa implicación de bombardeo orbital actual es $STANCE|Y$"
 bombardment_selective_desc: "$bombardment_selective$ Solo se bombardean objetivos militares identificados procurando evitar las bajas civiles innecesarias.\n- Daño §Ymoderado§! a los §Yejércitos§!\n- Daño §Ymoderado§! al §Yplaneta§!\n- Daño §Eligero§! a las §Ypoblaciones§!\n- §RNO§! se bombardearán planetas indefensos\n- §RNO§! se matarán a las últimas §Y$MIN_POPS$§! poblaciones"
 bombardment_indiscriminate_desc: "$bombardment_indiscriminate$ Se bombardean objetivos militares y la infraestructura planetaria sin importar las bajas civiles.\n- Daño §Hintenso§! a los §Yejércitos§!\n- Daño §Hintenso§! al §Yplaneta§!\n- Daño §Ymoderado§! a las §Ypoblaciones§!\n- Se bombardearán planetas indefensos cuando §H$policy_orbital_bombardment_accept_surrender$§! sea §H$orbital_bombardment_surrender_forbidden$§! \n- §RNO§! se matará a las últimas §Y$MIN_POPS$§! poblaciones"
 bombardment_armageddon_desc: "$bombardment_armageddon$ Barre el planeta con bombardeos cuyo objetivo explícito es causar el máximo de bajas civiles.\n- Daño §Rmasivo§! a los §Yejércitos§!\n- Daño §Rmasivo§! al §Yplaneta§!\n- Daño §Rmasivo§! a las §Ypoblaciones§!\n- Se bombardearán planetas indefensos.\n- Puede reducir a los planetas a mundos tumba sin vida."
 bombardment_raiding_desc: "$bombardment_raiding$ Apunta a los centros de población enemigos. Naves de asalto intentarán capturar a los habitantes para que trabajen en nuestros mundos.\n- Daño §Eligero§! a los §Yejércitos§!\n- Daño §Eligero§! al §Yplaneta§!\n- Se §Ysecuestrarán§! poblaciones cuando sea posible en vez de matarlas.\n- §RNO§! se secuestrará ni se matará a la última población. Cada ejército en el planeta aumenta el número de poblaciones protegidas."
