 building_slave_processing: "Procesadora de esclavos"
 building_slave_processing_desc: "Esta instalación grande e imponente se utiliza para procesar el trabajo esclavo y borrar cualquier atisbo de libre albedrío."
 building_slave_processing_migrate_effect_desc: "El §Yreasentamiento automático§! a otras colonias está habilitado para los §Y$SLAVES$§! desempleados locales y robots no inteligentes."
 building_slave_processing_slave_army_effect_desc: "Permite el reclutamiento de §Y$slave_army_plural$§!.\n\n"
 building_robotics_assembly_plant: "Planta de montaje robótica I"
 building_robotics_assembly_plant_desc: "Es necesaria para la creación de ejércitos de robots.\nAñade §Y100§! £pop£ §H$ROBOT_POP_SPECIES_1$ poblaciones§! al año.\nManten. población: £energy£ §Y1§!"
 building_robotics_assembly_plant_2: "Planta de montaje de androides"
 building_robotics_assembly_plant_2_desc: "Es necesaria para la creación de ejércitos de androides.\nAñade §Y100§! £pop£ §H$ROBOT_POP_SPECIES_2$ poblaciones§! al año.\nMejora poblaciones de §H$ROBOT_POP_SPECIES_1$§! a §H$ROBOT_POP_SPECIES_2$§!\nManten. población: £energy£ §Y2§!"
 building_robotics_assembly_plant_3: "Planta de montaje de sintéticos"
 building_robotics_assembly_plant_3_desc: "Es necesaria para la creación de ejércitos robóticos.\nAñade §Y100§! £pop£ §H$ROBOT_POP_SPECIES_3$ poblaciones§! al año.\nMejora poblaciones de §H$ROBOT_POP_SPECIES_2$§! a §H$ROBOT_POP_SPECIES_3$§!\nManten. población: £energy£ §Y5§!"
 building_colony_shelter: "Refugio de nave reciclada"
 building_colony_shelter_desc: "Los restos de una nave colonia, reciclados para formar un enclave planetario."
 building_capital: "Administración planetaria"
 building_capital_desc: "Sede de la élite gobernante local."
 building_major_capital: "Capital planetaria"
 building_major_capital_desc: "Un extenso complejo de estructuras burocráticas que actúa como centro administrativo para una importante colonia."
 building_system_capital: "Sistema complejo-capital"
 building_system_capital_desc: "Un enorme entramado de ministerios administrativos e infraestructura en red que permite la construcción y manejo de instalaciones muy complejas."
 building_ancient_factory: "Fabricantes autónomos"
 building_ancient_factory_desc: "§LEste antiguo complejo se construyó con tecnología perdida hace mucho tiempo.§!"
 building_ancient_archives: "Archivos precursores"
 building_ancient_archives_desc: "§LVastos almacenes de antiguo conocimiento.§!"
 building_dark_matter_power_plant: "Planta de energía de materia oscura"
 building_dark_matter_power_plant_desc: "§LEste antiguo complejo se construyó con tecnología perdida hace mucho tiempo.§!"
 building_agri_processing_complex: "Complejo agrícola"
 building_agri_processing_complex_desc: "§LEste antiguo complejo se construyó con tecnología perdida hace mucho tiempo.§!"
 building_primitive_farm: "Granjas primitivas"
 building_primitive_farm_desc: "Explotan el suelo por exiguas cosechas."
 building_primitive_factory: "Fábricas básicas"
 building_primitive_factory_desc: "Factorías primitivas e ineficientes que polucionan mientras producen bienes."
 building_primitive_offices: "Oficinas básicas"
 building_primitive_offices_desc: "Estas oficinas contienen un sinfín de cubículos que emiten el típico ruido del absurdo papeleo."
 building_primitive_mine: "Mina primitiva"
 building_primitive_mine_desc: "Túneles mineros primitivos que serpentean por el suelo."
 building_primitive_power_plant: "Planta de energía primitiva"
 building_primitive_power_plant_desc: "Una planta de energía primitiva y poco fiable que depende del carbón o de la temprana energía atómica y que contamina la atmósfera."
 building_mutant_landfill: "Vertedero de mutantes"
 building_mutant_landfill_desc: "Una masa pútrida de horrores mutados muertos. Su materia orgánica volátil se ha fusionado para formar una especie de edificio."
 building_vault: "Cámara subterránea"
 building_vault_desc: "Estas tiendas en la superficie señalan la entrada a una gran cámara subterránea que los habitantes originarios convirtieron en refugio contra bombardeos. Los ocupantes se enfrentaron entre ellos al acabarse la comida."
 building_vault_2: "Cámara subterránea"
 building_vault_2_desc: "Estas tiendas en la superficie señalan la entrada a una gran cámara subterránea que los habitantes originarios convirtieron en refugio contra bombardeos. La cámara contiene una máquina enorme, colocada junto al equipo de minería."
 building_particle_accelerator: "Acelerador de partículas"
 building_particle_accelerator_desc: "Este antiguo acelerador se construyó usando un diseño novedoso, y los terminales que han sobrevivido en el edificio contienen una cantidad enorme de datos de investigación de mano de lo que al parecer fue un brillante físico teórico."
 building_odd_factory: "Fábrica extraña"
 building_odd_factory_desc: "Una instalación bien construida que produce recursos de gran valor y que otra civilización abandonó en el planeta."
 building_quarantine: "Estación de investigación de plagas"
 building_quarantine_desc: "Un hospital provisional centrado en estudiar a los infectados para conseguir una cura."
 building_plague_memorial: "Monumento de la plaga"
 building_plague_memorial_desc: "Un monumento para recordar al pueblo la horrible enfermedad que antaño asoló su hogar. Es testimonio de la supervivencia de la nación."
 building_energy_grid: "Red eléctrica"
 building_energy_grid_plural: "Redes eléctricas"
 building_energy_grid_desc: "Una red cuidadosamente calibrada optimiza el rendimiento de los generadores de energía."
 building_energy_grid_effect_desc: "Aumenta en §G1§! la producción base de los trabajos que otorgan £energy£ §Yenergía§!."
 building_energy_nexus: "Nexo de energía"
 building_energy_nexus_desc: "Esta enorme instalación centraliza todas las redes eléctricas del planeta, lo que mejora su eficacia."
 building_mineral_purification_plant: "Purificadoras de mineral"
 building_mineral_purification_plant_desc: "Los minerales que pasan por estas purificadoras son de la máxima calidad."
 building_mineral_purification_hub: "Centros de purificación de mineral"
 building_mineral_purification_hub_desc: "Enormes centros donde se reciben los minerales para luego enviarlos a una serie de purificadoras."
 building_medical_1: "Centro médico"
 building_medical_1_desc: "$job_healthcare_desc$"
 building_medical_2: "Clínicas genéticas"
 building_medical_2_desc: "Las clínicas genéticas pueden ofrecer avanzados tratamientos médicos, que estadísticamente derivan en una población significativamente más sana y más longeva."
 building_medical_3: "Centros de citorrevitalización"
 building_medical_3_desc: "Los centros de citorrevitalización pueden ofrecer avanzados tratamientos médicos a una gran población. Los tratamientos a nivel celular derivan en una población significativamente más sana y más longeva."
 building_mineral_silo_1: "Silo de minerales I"
 building_mineral_silo_1_desc: "Aumentan la capacidad de almacenamiento de minerales de nuestro imperio."
 building_mineral_silo_2: "Silo de minerales II"
 building_mineral_silo_2_desc: "$building_mineral_silo_1_desc$"
 building_mineral_silo_3: "Silo de minerales III"
 building_mineral_silo_3_desc: "$building_mineral_silo_1_desc$"
 building_planetary_shield_generator: "Generador de escudos planetarios"
 building_planetary_shield_generator_desc: "$tech_planetary_shield_generator_desc$"
 building_autochthon_monument: "Monumento autochthon"
 building_autochthon_monument_plural: "Monumentos autochthon"
 building_autochthon_monument_desc: "Un monumento a los primeros pioneros que se aventuraron en el espacio."
 building_autochthon_monument_effect: "Produce £unity£§G1§! por cada §Yventaja de ascenso§! adoptada por nuestro imperio.\n\n"
 building_heritage_site: "Sitio del pasado"
 building_heritage_site_desc: "Una zona dedicada al inicio de la historia de nuestro imperio y su pueblo."
 building_heritage_site_effect: "Produce £unity£§G2§! por cada §Yventaja de ascenso§! adoptada por nuestro imperio.\n\n"
 building_hypercomms_forum: "Foro de hipercomunicaciones"
 building_hypercomms_forum_desc: "Una inmensa instalación con equipo de comunicación interpersonal avanzado. El foro permite el intercambio de ideas multisensoriales en discusiones informales y debates de rápido consenso."
 building_hypercomms_forum_effect: "Produce £unity£§G3§! por cada §Yventaja de ascenso§! adoptada por nuestro imperio.\n\n"
 building_autocurating_vault: "Cámara de autopreservación"
 building_autocurating_vault_desc: "Una red informática altamente especializada que adquiere, analiza, evalúa y muestra los artefactos que considera relevantes para crear un museo viviente del presente."
 building_temple: "Templo"
 building_temple_desc: "Sencillos edificios construidos desde tiempos inmemoriales. Los templos son lugares de oración serena y comunión con aquello que nos une a todos."
 building_holotemple: "Holotemplo"
 building_holotemple_desc: "Una forma evolucionada de sus toscos predecesores. Lo último en tecnología espiritualista crea una realidad mutable dentro del holotemplo para fomentar una meditación más profunda e intensificar la devoción."
 building_sacred_nexus: "Nexo sagrado"
 building_sacred_nexus_desc: "Los últimos avances en la tecnología de campo permiten que los adoradores experimenten directamente la influencia divina del terreno sagrado."
 building_citadel_of_faith: "Ciudadela de la fe"
 building_citadel_of_faith_desc: "Un enorme complejo que ofrece refugio y aislamiento del mundo material, desde todos los rincones."
 building_stronghold: "Bastión"
 building_stronghold_desc: "Una fortaleza planetaria con una considerable guarnición para proteger el mundo de invasiones y rebeliones."
 building_fortress: "Fortaleza"
 building_fortress_desc: "Un enorme bastión con mayor guarnición e instalaciones de entrenamiento para los soldados."
 building_bio_reactor: "Biorreactor"
 building_bio_reactor_desc: "Una instalación en la que la materia orgánica se convierte en energía a un ritmo muy eficaz."
 tech_bio_reactor: "$building_bio_reactor$"
 tech_bio_reactor_desc: "$building_bio_reactor_desc$"
 building_bio_reactor_2: "Biorreactor avanzado"
 building_bio_reactor_2_desc: "Una instalación en la que la materia orgánica se convierte en energía a un ritmo muy eficaz. Las mejoras en la recogida de residuos permiten cosechar subproductos gaseosos útiles."
 tech_bio_reactor_2: "$building_bio_reactor_2$"
 tech_bio_reactor_2_desc: "$building_bio_reactor_2_desc$"
 building_hab_stronghold: "Zona de seguridad"
 building_hab_stronghold_desc: "Esta sección del hábitat está destinada a la seguridad y proporciona una fuerza de seguridad armada para protegerlo de los peligros internos y externos."
 building_crude_huts: "Chozas toscas"
 building_crude_huts_desc: "Primitivos refugios de piedra, arcilla o cualquier otro material disponible."
 building_primitive_dwellings: "Moradas primitivas"
 building_primitive_dwellings_desc: "Estos pequeños edificios proporcionan poco refugio, pero protegen del rigor de los elementos."
 building_stone_palace: "Palacios de piedra"
 building_stone_palace_desc: "Palacios de piedra primitivos en los que reside la élite gobernante local."
 building_primitive_capital: "Capitales regionales"
 building_primitive_capital_desc: "Los edificios de las capitales regionales de diversas naciones estado que habitan en este mundo primitivo."
 building_urban_dwellings: "Moradas urbanas"
 building_urban_dwellings_desc: "Junglas de asfalto abarrotadas y a menudo contaminadas."
 building_pre_ftl_radio_telescope: "Red de radiotelescopios"
 building_pre_ftl_radio_telescope_desc: "Un entramado de radiotelescopios cuyo fin es descubrir vida alienígena inteligente."
 awareness_gain_desc: "Aumenta la probabilidad de que esta civilización adquiera £awareness£ §Yconocimiento§! con el tiempo."
 building_hive_crude_huts: "Nidos simples"
 building_hive_crude_huts_desc: "Estos nidos hechos de materiales accesibles y sencillos apenas logran evitar que los drones se congelen por las noches."
 building_hive_primitive_dwellings: "Colonia arcaica"
 building_hive_primitive_dwellings_desc: "Estos edificios hexagonales constituyen un primer paso hacia la optimización del espacio disponible y pueden albergar colonias modestas."
 building_hive_stone_palace: "Colmena de piedra"
 building_hive_stone_palace_desc: "En un mundo en el que la competición por sobrevivir es contra la propia especie, contar con muros de piedra es una ventaja."
 building_hive_primitive_capital: "Nexo continental"
 building_hive_primitive_capital_desc: "El típico punto central del continente que abarca colmenas que pugnan por el control de este mundo."
 building_hive_urban_dwellings: "Parque de drones"
 building_hive_urban_dwellings_desc: "Solución funcional para alojar drones en su ciclo de descanso. Dispone de entradas y salidas separadas para maximizar el proceso de recarga de la colmena."
 building_hive_primitive_factory: "$building_primitive_factory$"
 building_hive_primitive_factory_desc: "$building_primitive_factory_desc$"
 building_hive_primitive_mine: "$building_primitive_mine$"
 building_hive_primitive_mine_desc: "$building_primitive_mine_desc$"
 building_hive_primitive_power_plant: "$building_primitive_power_plant$"
 building_hive_primitive_power_plant_desc: "$building_primitive_power_plant_desc$"
 building_hive_primitive_farm: "$building_primitive_farm$"
 building_hive_primitive_farm_desc: "$building_primitive_farm_desc$"
 building_hive_primitive_node: "Nodo sináptico simple"
 building_hive_primitive_node_desc: "Gracias a este rudimentario nodo sináptico, la voluntad de la colmena se verá reforzada."
 building_machine_primitive_node: "Nodo de enlace simple"
 building_machine_primitive_node_desc: "Un nodo de enlace rudimentario que reduce la latencia del planeta."
 building_farming_districts_1: "Centro de desarrollo para los cultivos"
 building_farming_districts_1_desc: "Un modesto centro burocrático con la misión de inspeccionar tierras de cultivo e iniciar la expansión de la agricultura planetaria."
 building_farming_districts_2: "Centro de reclamación de terrenos"
 building_farming_districts_2_desc: "Este centro se centra en recuperar tierras marginales y mejorar el rendimiento para acelerar el crecimiento de los distritos agrícolas."
 building_farming_districts_3: "Complejo agrícola automatizado"
 building_farming_districts_3_desc: "La veloz expansión de los distritos agrícolas viene motivada por los recolectores mecanizados, las flotas de drones y los campos con clima regulado."
 building_farming_districts_4: "Red de cultivo planetario"
 building_farming_districts_4_desc: "Un vasto complejo integrado que supervisa intensivas operaciones agrícolas de gran densidad. Aumenta al máximo el número de distritos agrícolas abastecidos en el planeta."
 building_mine_generic: "Depósito de canteras en la superficie"
 building_mine_generic_desc: "Este deposito habilita la expansión preliminar de los distritos mineros al coordinar la excavación de superficies poco profundas con la extracción de minerales."
 building_mining_districts_1: "Emplazamiento minero industrial"
 building_mining_districts_1_desc: "Los equipos de excavación, los sistemas de transporte y las matrices de clasificación funcionan al unísono para mantener un rendimiento estable e iniciar la expansión de los distritos mineros."
 building_mining_districts_2: "Matriz principal de perforación"
 building_mining_districts_2_desc: "Una instalación que apuesta por operaciones mineras más profundas mediante perforaciones de gran calibre y refuerzos estructurales con el fin de habilitar más yacimientos de minerales."
 building_mining_districts_3: "Parcela de excavación sísmica"
 building_mining_districts_3_desc: "Un complejo equipado para la excavación de túneles y una estabilización subterránea de alto rendimiento que amplía el acceso a vetas minerales otrora inaccesibles."
 building_mining_districts_4: "Red de extracción profunda"
 building_mining_districts_4_desc: "Una instalación ampliable que opera a la máxima profundidad planetaria. Administra zonas de extracción completamente industrializadas y permite que el distrito minero se expanda al máximo."
 building_generator_generic: "Parcela de producción voltaica"
 building_generator_generic_desc: "Esta construcción se dedica a la generación de energía a gran escala. Consta de células de energía, conductos de plasma y matrices generadoras de alto rendimiento."
 building_generator_districts_1: "Complejo de obras conductivas"
 building_generator_districts_1_desc: "Este complejo facilita la construcción de nuevos distritos generadores al distribuir las infraestructuras fundamentales de redes y los sistemas de manipulación de energía."
 building_generator_districts_2: "Complejo de relé subestacional"
 building_generator_districts_2_desc: "Gracias a un apoyo mayor en el desarrollo de distritos generadores, esta instalación amplía las infraestructuras de energía planetaria mediante el despliegue de relés de alta capacidad, parcelas de transformación y nodos estabilizadores de red."
 building_generator_districts_3: "Matriz reguladora de plasma"
 building_generator_districts_3_desc: "Un complejo donde los flujos de plasma estabilizado y el control de resonancia de circuitos permiten la intensificación en el desarrollo de generadores por todo el planeta."
 building_generator_districts_4: "Nexo planetario"
 building_generator_districts_4_desc: "Este nexo integrado de energía coordina las operaciones de los generadores a escala planetaria, y es capaz de maximizar la expansión de los distritos generadores."
