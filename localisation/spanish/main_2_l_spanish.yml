 TECH_UNLOCK_BORDER_EXTRUDER_3_DESC: "§HBaliza fronteriza avanzada§!\nConvertirnos en gobernantes supremos es nuestro destino, y debemos ponerlo de manifiesto a nuestros enemigos."
