 TECH_UNLOCK_TERRAFORMING_GAIA_CHANGE_DESC: "§HManipulación atmosférica§!\nNos permite terraformar mundos en planetas Gaia."
 TECH_UNLOCK_TERRAFORMING_NUKED_CHANGE_TITLE: "§HDesbloquea función:§! reparación de clima"
 TECH_UNLOCK_TERRAFORMING_NUKED_CHANGE_DESC: "§HReparación de clima§!\nNos permite terraformar mundos ecológicamente devastados."
 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_TITLE: "§HDesbloquea la estación:§! Puerto espacial"
 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_DESC: "§HPuerto espacial§!\nEs necesario para construir cualquier tipo de nave capaz de volar por el espacio. Se puede mejorar con más funciones y lleva defensas básicas."
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Nave científica"
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_DESC: "§HNave científica§!\nSe utiliza como base de operaciones para un gran científico dispuesto a investigar la inmensidad del espacio."
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Nave de construcción"
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_DESC: "§HNave de construcción§!\nPermite montar diversas estaciones espaciales mediante avanzados drones soldadores."
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Nave colonia"
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_DESC: "§HNave colonia§!\nEs una nave de un solo uso para colonizar mundos alienígenas. Tras colonizarlos, la nave se desmonta y se convierte en refugios y cabezas de puente planetarios."
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Corbeta"
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_DESC: "§HCorbeta§!\nEs el tipo de nave militar más básico, armada y lista en caso de contacto con enemigos."
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Destructor"
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_DESC: "§HDestructor§!\nUn diseño más grande, de dos secciones, que ofrece un amplio abanico de opciones de armamento estratégico."
 TECH_UNLOCK_CRUISER_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Crucero"
 TECH_UNLOCK_CRUISER_CONSTRUCTION_DESC: "§HCrucero§!\nEs el primer diseño de tres secciones, lo que permite un amplio abanico de configuraciones de módulos para quienes puedan pagarlo."
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Acorazado"
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_DESC: "§HAcorazado§!\nLa configuración de casco más grande disponible, lleva una potencia inmensa a la batalla a un coste todavía más grande y con una maniobrabilidad reducida."
 TECH_UNLOCK_TITAN_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Titán"
 TECH_UNLOCK_TITAN_CONSTRUCTION_DESC: "§HTitán§!\nEstas enormes naves de guerra son el orgullo de la flota. Están armadas hasta los dientes y suelen ser naves insignia."
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! Gigante"
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_DESC: "§HGigante§!\nLas construcciones colosales son más una estación espacial que una nave. Esta en concreto es una estación espacial móvil inmensa que puede reparar y construir naves, así que sirve como base avanzada de operaciones durante las campañas ofensivas."
 TECH_UNLOCK_DEFENSE_PLATFORM_TITLE: "§HDesbloquea la estación:§! Plataforma de defensa"
