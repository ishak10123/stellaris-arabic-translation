 civic_ancient_preservers_desc: ""
 civic_trading_conglomerate: "Conglomerado comercial"
 civic_trading_conglomerate_desc: ""
 civic_artist_collective: "Colectivo de artistas"
 civic_artist_collective_desc: ""
