 ####################################
 decision_wilderness_expand: "Expandir tamaño de planeta"
 decision_wilderness_expand_desc: "Reabsorbe la biomasa purificada que hemos recolectado para que nuestro mundo crezca."
 decision_wilderness_mastery_over_nature_desc: "Nuestro yo colectivo necesita espacio para desarrollarse, así que debemos proporcionárselo. Nos adaptaremos a todos los entornos del planeta."
