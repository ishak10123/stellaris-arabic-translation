 job_wilderness_maintenance_drone_plural: "$job_wilderness_maintenance_drone$"
 job_wilderness_maintenance_drone_desc: "Una biomasa de gran potencial que se almacena y se mantiene hasta que llegue el momento de usarla."
 job_heart_processing: "Biomasa recién formada"
 job_heart_processing_plural: "$job_heart_processing$"
 job_heart_processing_desc: "Muy pronto, esta biomasa se integrará en nosotros para desempeñar una función mayor."
 neurosymbiont: "$job_neurosymbiont$"
 job_neurosymbiont: "Neurosimbionte"
