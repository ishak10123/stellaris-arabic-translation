 district_orchard_forests: "Vergel boscoso"
 district_orchard_forests_plural: "Vergeles boscosos"
 district_orchard_forests_desc: "Regiones destinadas al cultivo y la caza en las que crece de todo, desde alimentos celulares y granos comestibles hasta simbiontes para cazar."
