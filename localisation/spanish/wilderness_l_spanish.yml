l_spanish:
 ####################################
 # Events
 ####################################
 # introduction event
 progress.2.desc.wilderness: "El [Root.GetName] ha realizado un hallazgo sorprendente en [from.GetName]: ¡[from.GetPlanetMoon] rebosa de vida alienígena! Por primera vez, hemos encontrado formas de vida que se han originado fuera de nosotros.\n\nEste descubrimiento ha confirmado, por fin, que nosotros, el planeta [root.owner.capital_scope.GetName], no estamos solos en el universo. Aunque ninguna de las criaturas alienígenas de [from.GetName] es inteligente, es probable que solo sea cuestión de tiempo antes de que nos encontremos con seres que sí lo sean..."
 # Colonization Events
 wilderness.1010.name: "[from.GetName] despierta"
 wilderness.1010.desc.intro: "Nuestras esporas de terraformación han completado su propósito y han enviado a una parte de nuestro ser a colonizar un mundo alienígena por primera vez."
 wilderness.1010.desc.same: "Hacernos [from.GetName] y, a la vez, [root.GetHomeWorldName]... Ya nos resulta familiar: una forma cómoda de ser, a pesar de adoptar tantas formas nuevas bajo un sol que antaño fue ajeno. Nos hemos adaptado fácilmente a las condiciones preexistentes." #e.g. 'becoming Mars as well as Earth...''
 wilderness.1010.desc.similar_cold: "Adaptarnos para encajar en el §Y[from.GetName]§! [from.GetClassAdj] tiene sus retos, pero ya hemos hallado formas conocidas para sobrellevarlo. Los tentáculos se extienden, los hábitats se esculpen y las bocas hambrientas cazan." #e.g. 'Adapting our self to suit arctic Pluto...'
 wilderness.1010.desc.similar_dry: "Como planeta [root.GetHomeWorldName], siempre hemos prosperado en atmósferas secas, así que debemos estar a la altura del reto de convertirnos en §Y[from.GetName]§! [from.GetClassAdj]. Hemos encontrado nuevas formas de buscar y conservar la humedad, y hemos aprendido a trabajar con esta nueva y desafiante geología, en lugar de luchar contra ella." #e.g. 'the challenge of becoming savannah Mars'
 wilderness.1010.desc.similar_wet: "Al igual que prosperamos en las aguas de [root.GetHomeWorldName], también conseguiremos desarrollarnos como §Y[from.GetName]§! [from.GetClassAdj]. Los minerales, las corrientes, e incluso la luz del día que recibimos nos parecen extraños, pero hemos encontrado maneras de extraer aquello que necesitamos." #e.g. 'we flourish as oceanic Neptune'
 wilderness.1010.desc.diff_cold: "Sabíamos que transformarnos en §Y[from.GetName]§! sería complicado. De hecho, parte de lo que nos hacía el planeta [root.GetHomeWorldName] [root.capital_scope.GetClassAdj] ha desaparecido aquí, aunque lo que queda es fuerte y ha empezado a adaptarse. Este entorno desconocido complica la obtención de recursos básicos para la vida, pero, aferrados a este gélido paisaje, observamos que la vida ya ha encontrado su camino." #e.g. 'becoming Earth'
 wilderness.1010.desc.diff_dry: "Este lugar evoca un miedo primitivo en nosotros: tan caliente y seco, que despierta los recuerdos instintivos de la Quema. Sin embargo, si logramos adaptarnos y a prosperar aquí... Transformarnos en §Y[from.GetName]§! podría despertar algo nuevo en nosotros también. Donde haya humedad, nosotros podemos almacenarla, y donde la sombra escaseaba, encontramos formas de crearla nosotros mismos."
 wilderness.1010.desc.diff_wet: "Nuestros esfuerzos por convertirnos en §Y[from.GetName]§! serán difíciles, pero nos hemos preparado contra la podredumbre y el diluvio. Aquellas partes de nosotros más capaces de gestionar el agua ahora la absorben para las más vulnerables. Hemos aceptado las corrientes únicas de este lugar." #e.g. 'Our effort to become Mars'
 wilderness.1010.desc.other: "A medida que cambiamos para convertirnos en §Y[from.GetName]§!, identificamos las partes de nuestro ser que prosperarán y las que se marchitarán. Esta existencia [from.GetClassAdj] tiene mucho en común con lo que sabíamos hasta ahora, pero también tiene cosas extrañas. Así que observamos y experimentamos." #e.g. 'shape ourselves to become Luna'
 wilderness.1010.desc.outro: "Nuestras superestructuras, nutrientes y ADN han empezado a adaptarse y a mezclarse con la vida que existía aquí antes que la nuestra. [from.GetName] está despertando."
 wilderness.1010.a: "Pronto, nuestros mundos serán uno."
 # Terraforming Events
 terra.25.desc.wilderness: "Nuestro longevo proyecto para despertar a §Y[From.GetName]§! no ha tenido el éxito que esperábamos. Una fractura en uno de nuestros realineadores de biomasa ha provocado una avalancha de §Yresiduos de terraformación§! que ha saturado los valles y ha formado una corteza pegajosa sobre algunas zonas habitables.\n\nSi bien no es inherentemente peligroso para nosotros, este exceso de material parecido al pus implica que algunos de nuestros elementos más móviles puedan sufrir dificultades durante un tiempo."
 terra.80.desc.wilderness: "Hemos librado a nuestro yo futuro de otra capa de radiación en la atmósfera y el suelo de §Y[From.GetName]§!. Eso sí, nuestros atentos [Root.GetTerraformerPlural] tuvieron que intervenir y aislar parte de este mundo temporalmente. Parece que hemos perturbado a una especie nativa de lo más escurridiza que medra en entornos radiactivos. Desafortunadamente, ha empezado a marchitarse por culpa de nuestras acciones.\n\nLo más curioso es que esta especie parece preinteligente; están a nada de desarrollar el pensamiento individual. Ahora, mientras [From.GetName] se dispone a purgar los vestigios de su tóxico legado, debemos decidir cómo proceder con esta nueva forma de vida."
 terra.80.b.wilderness: "Es su mundo. Deberíamos dejar que despierten."
 terra.80.d.wilderness: "Vamos a consumirlos."
 wilderness.2000.name: "Un despertar meticuloso"
 #wilderness.2000.desc.reg: "We feel the tremendous potential of [from.GetName]. It seems proper to both fear and delight in the awesome power we are about to exert there: shaping this [from.GetPlanetMoon] with our will and the tools we have developed; laying the pattern for its eventual awakening.\n\nWe have long relied on natural processes to grow and sustain the [root.GetName]. But these trials also cost us dearly, and taught us much. Now we shall see what wonders emerge when a habitable world skips its own evolution and gains the wisdom of hard-earned growth and decay."
 wilderness.2000.desc.barren: "Puede que la desolación de [from.GetName] sea dolorosa de ver, pero no durará mucho más. Hasta ahora, la vida en esta galaxia ha considerado conveniente ignorar este mundo estéril, pero ahora nosotros, los [root.GetName], poseemos las herramientas y el conocimiento necesarios para enmendarlo.\n\nPese a todo lo que hemos aprendido hasta ahora, la restauración de [from.GetName] se antoja una quimera. Entre nuestra voluntad y las herramientas climáticas que hemos descubierto, la vida aflorará allá donde antes no estaba."
 wilderness.2000.desc.tomb_detox: "Si bien la vida como la conocemos en [from.GetName] se ha apagado, estamos listos para darle al mundo una segunda oportunidad. Hemos empezado a restablecer la atmósfera, las corrientes y el suelo para que [from.GetName] pueda albergar vida de nuevo, en este caso, para los [root.GetName]."
 wilderness.2000.desc.gaia: "El crisol de la evolución ha obrado maravillas con nosotros, los [root.GetName]. Aun con todo, ahora tenemos la oportunidad enseñar mucho más a los [from.GetName] de [from.GetPlanetMoon]. Haciendo uso de herramientas y conocimientos que nuestros yos del pasado no llegaban a concebir, hemos empezado a preparar [from.GetName] para un despertar como nunca jamás se ha visto.\n\nAlgún día, los cimientos de [from.GetName] estarán repletos de nutrientes y se actualizarán con los vibrantes ciclos de vida de nuestra flora y fauna. Los valles, las crestas y los altiplanos ofrecerán un espacio exuberante para la recolección, la caza y el alojamiento. La vida florecerá aquí."
 wilderness.2000.a: "Empecemos."
 wilderness_pre_sapient_defence_army: "Manada preinteligente"
 seq_wilderness_pre_sapient_defence_army: "Manada simbionte $R$" # e.g. 'Symbiont Herd IV'
 wilderness_pre_sapient_defence_army_plural: "Manadas preinteligentes"
 wilderness_pre_sapient_defence_army_desc: "Criaturas sumamente territoriales que permanecen dóciles hasta que se las provoca, momento en el que se liberan de todo instinto excepto del más básico para defender a quienes reconocen como parientes."
 wilderness_pre_sapient_assault_army: "Horda preinteligente"
 seq_wilderness_pre_sapient_assault_army: "Horda simbionte $R$" # e.g. 'Symbiont Horde IV'
 wilderness_pre_sapient_assault_army_plural: "Hordas preinteligentes"
 wilderness_pre_sapient_assault_army_desc: "Feroces criaturas con la suficiente astucia y aguante natural como para sembrar la destrucción de aquellos a los que ven como enemigos."
 ####################################
 # Origins
 ####################################
 origin_wilderness: "Natura"
 origin_wilderness_desc: "§RAVISO: se bloquearán todos los caminos de ascensión, excepto ['concept_purity_ascension'].§!\n\nEsta entidad es nada menos que una ecosfera inteligente: una multitud de diversas formas de vida que llevan mucho tiempo fusionándose para formar una conciencia gestalt a escala planetaria."
 origin_tooltip_wilderness_effects: "- Rasgo de especie: ['trait:trait_wilderness']\n- Sustituye todos los £building£ ['concept_buildings'], £district£ ['concept_districts'] y £zone£ ['concept_district_specialization'] normales por versiones personalizadas\n- Sustituye la colonización mediante naves colonia por ['concept_terraforming']\n- Desbloquea un nuevo recurso: £biomass£ ['concept_biomass'] \n- Mundo natal:$TABBED_NEW_LINE$- Tamaño: £planetsize£ 18$TABBED_NEW_LINE$- ['concept_scorched_plains', £blocker£ $d_scorched_plains$]"
 trait_wilderness: "Natura"
 trait_wilderness_desc: "§LEsta especie existe como parte de una entidad mutualista cuyos pensamientos y rendimiento son indistinguibles de su entorno.§!"
 WILDERNESS_NATURAL_WORLDS_DECLINE: "§RLa §Ynatura§! no puede sobrevivir en nuestros mundos antinaturales.§!"
 WILDERNESS_DEAD_WORLD: "$TRIGGER_FAIL$La §Ynatura§! no puede sobrevivir en imperios que van contra natura."
 country_virtual_jobs: "Se han ocupado automáticamente todos los puestos de trabajo de este imperio."
 concept_wilderness_trait: "$trait_wilderness$"
 concept_wilderness_trait_desc: "- $MOD_LOGISTIC_GROWTH_MULT$: §R-100%§!\n- §RNo se puede migrar ni reasentar§! $NEW_LINE$- §RNo se puede reproducir naturalmente§!\n\n§L$trait_wilderness_desc$§!"
 PRESCRIPTED_adjective_zhardmehka: "Florescencias"
 PRESCRIPTED_ship_prefix_zhardmehka: "ZMV"
 PRESCRIPTED_species_name_zhardmehka: "Zhard-Krellin"
 PRESCRIPTED_species_name_plural_zhardmehka: "Zhard-Krellins"
 PRESCRIPTED_species_adjective_zhardmehka: "Zhard-Krelline"
 PRESCRIPTED_planet_name_zhardmehka: "Tellon"
 PRESCRIPTED_system_name_zhardmehka: "Tattla"
 PRESCRIPTED_ruler_name_zhardmehka: "$FUN3_CHR_Obanva$ $FUN3_CHR_uvi-Livve$"
 PRESCRIPTED_ruler_title_zhardmehka: "Avatar"
 START_SCREEN_WILDERNESS_INTRO: "Hasta donde nos alcanza la memoria, [root.GetHomeWorldName] ha sido el planeta [root.GetHomeWorldName]. Cada tallo, zarcillo y enzima presente es parte de un todo; un equilibrio de crecimiento, descomposición y depredación. Durante eones, [root.GetHomeWorldName] solo podía atisbar la galaxia que se extendía más allá. Sin embargo, las estrellas llevan mucho tiempo inquietas.\n\nUna batalla tuvo lugar en los cielos de [root.GetHomeWorldName]. Restos de grandes naves cayeron sobre su superficie, y los artefactos alienígenas no tardaron en reutilizarse. Fue entonces cuando llegó la supererupción..."
 START_SCREEN_WILDERNESS_DEFAULT: "[root.GetHomeWorldName] lo sintió como una luz cegadora y abrasadora. Las tormentas de fuego y la radiación quemaron o arrasaron a miles de millones de simbiontes. La vida de todo un continente, erradicada."
 START_SCREEN_WILDERNESS_COLD: "[root.GetHomeWorldName] lo sintió como una luz cegadora y abrasadora. Los glaciares se tornaron en rabiosos torrentes mientras la radiación estelar arrasaba [root.GetHomeWorldName] hasta los cimientos. Todo un continente, arrasado."
 START_SCREEN_WILDERNESS_DRY: "[root.GetHomeWorldName] lo sintió como una luz cegadora y abrasadora. Las dunas se fundieron, cristalizándose, y los fuertes vientos dejaron lisas las superficies rocosas. Todo un continente, estéril."
 START_SCREEN_WILDERNESS_WET: "[root.GetHomeWorldName] lo sintió como una luz cegadora y abrasadora. Los lagos empezaron a hervir y las capas de hielo se derretían mientras la radiación estelar arrasaba [root.GetHomeWorldName] hasta los cimientos. Todo un continente, perdido."
 START_SCREEN_WILDERNESS_OUTRO: "El dolor nos despertó. Por primera vez, fuimos conscientes de nuestra fragilidad. La galaxia alberga peligros, pero también maravillas. Emplearemos lo aprendido para germinar y dispersarnos. Como uno solo, viajaremos a las estrellas."
 ####################################
 # Authorities
 ####################################
 auth_mutualistic_intelligence: "Inteligencia mutualista"
 auth_mutualistic_intelligence_plural: "Inteligencias mutualistas"
 auth_mutualistic_intelligence_desc: "Las $auth_mutualistic_intelligence_plural$ emergen como consciencia distribuida a escala planetaria. Se componen de especies simbióticas provenientes de diversas biotas que actúan conforme a la voluntad colectiva de su entorno.\n\nAlgunos simbiontes pueden trabajar de forma semiautónoma en tareas especializadas, pero la mayoría depende del contacto regular con su entorno mutualista. Si se les aísla, regresarán a su estado salvaje a instintivo antes de fallecer."
 tt_auth_mutualistic_intelligence: "Tiene autoridad §Y$auth_mutualistic_intelligence$§! (§Y$auth_hive_mind$§!)"
 gov_wilderness: "$gov_hive_mind$"
 gov_wilderness_desc: "Este gobierno funciona como una sola consciencia. La población no tiene agenda propia, más allá de atender a las necesidades y los deseos de la $RT_WILDERNESS$."
 RT_WILDERNESS: "Natura"
 RT_WILDERNESS_FEMALE: "$RT_WILDERNESS$"
 ####################################
 # Buildings
 ####################################
 building_colony_shelter_wilderness: "Zarcillos planetarios"
 building_colony_shelter_wilderness_desc: "Una frontera pluricelular de organismos entretejida con este mundo para asegurar la presencia estable de la natura."
 building_capital_wilderness: "Lote de raíces planetarias"
 building_capital_wilderness_desc: "Una vibrante masa en expansión de sencillos organismos armonizados con simbiontes móviles a fin de mejorar su coordinación y productividad."
 building_major_capital_wilderness: "Complejo de raíces planetarias"
 building_major_capital_wilderness_desc: "Una masa viviente concentrada, lo bastante densa como para que los simbiontes puedan vivir, trabajar y reproducirse en una esfera sumamente restringida."
 building_system_capital_wilderness: "Nexo de raíces planetarias"
 building_system_capital_wilderness_desc: "Una inmensa unión de diversas formas de vida que trabajan en conjunción. Su inmensidad es tal que genera sus propios microclimas ideales."
 requires_building_wilderness_capital: "§RRequiere §Y$building_capital_wilderness$§! en el planeta.§!"
 requires_building_wilderness_major_capital: "§RRequiere §Y$building_major_capital_wilderness$§! en el planeta.§!"
 requires_building_wilderness_system_capital: "§RRequiere §Y$building_system_capital_wilderness$§! en el planeta.§!"
 building_imperial_capital_wilderness: "Complejo imperial"
 building_imperial_capital_wilderness_desc: "La natura gobierna el emporio galáctico desde esta gigantesca y compleja estructura. Aquí se decide el destino de la galaxia."
 building_tendril_cradle_1: "Cuna de zarcillos"
 building_tendril_cradle_1_desc: "De este emplazamiento parte un cúmulo de cortos filamentos bien arraigados que atraen todo material de las proximidades a los órganos vitales."
 building_tendril_cradle_2: "Filamentos de alcance"
 building_tendril_cradle_2_desc: "Apéndices alargados cubren todo el paraje, aferrando recursos de extensiones adyacentes para su posterior procesado y distribución."
 building_tendril_cradle_3: "Nido de raíces transportadoras"
 building_tendril_cradle_3_desc: "Bajo la superficie se encuentra una maraña de raíces en constante pálpito y cambio, cuyo cometido es trasladar biomasa a centros bióticos distantes a través de una red de canales estratificados."
 building_tendril_cradle_4: "Filocorazón planetario"
 building_tendril_cradle_4_desc: "Inmensos zarcillos logísticos se extienden por todo el cuerpo planetario, atrayendo, moviendo y descartando los recursos de la natura en infatigable armonía."
 planet_research_buildings: "Edificios de investigación planetaria"
 mod_planet_research_buildings_upkeep_mult: "Mantenimiento de $planet_research_buildings$"
 building_brain_node_1: "Crecimiento de investigación"
 building_brain_node_1_desc: "La investigación general se basa en el trabajo de estos juguetones simbiontes prospectores."
 mod_planet_building_brain_node_1_build_speed_mult: "Veloc. construc. $building_brain_node_1$"
 building_brain_node_2: "Arboleda de investigación"
 building_brain_node_2_desc: "Un hábitat que solo se dedica a fomentar conductas inquisitivas que facilitan el estudio de artefactos y fenómenos más avanzados."
 mod_planet_building_brain_node_2_build_speed_mult: "Veloc. construc. $building_brain_node_2$"
 building_brain_node_3: "Recinto de investigación exótica"
 building_brain_node_3_desc: "Estos recintos en expansión albergan a una gran cantidad de simbiontes extremófilos para que experimenten con toda clase de materiales exóticos y peligrosos."
 mod_planet_building_brain_node_3_build_speed_mult: "Veloc. construc. $building_brain_node_3$"
 building_brain_node_4: "Recinto de investigación avanzada"
 building_brain_node_4_desc: "Esta fusión de tecnología exótica y un vasto recinto desarrollado por simbiontes facilita la investigación de vanguardia en varios entornos sandbox."
 mod_planet_building_brain_node_4_build_speed_mult: "Veloc. construc. $building_brain_node_4$"
 building_commensal_clearing_1: "Claro de comensales"
 building_commensal_clearing_1_desc: "El sosiego de estas islas permite a los simbiontes móviles reunirse, descansar y reorientarse en la natura."
 building_commensal_clearing_2: "Arboleda de comensales"
 building_commensal_clearing_2_desc: "Unos refugios ideales para las congregaciones masivas de simbiontes. Sus interacciones aquí permiten comprender mejor su distribución."
 building_commensal_clearing_3: "Valle de comensales"
 building_commensal_clearing_3_desc: "Por estas pulcras formaciones migran grandes comunidades de simbiontes de todo tipo para fortalecer los lazos que los unen."
 building_commensal_clearing_4: "Bioma de comensales"
 building_commensal_clearing_4_desc: "Unos vastos hábitats interconectados que albergan infinitud de encuentros. Cada uno desprende una chispa esencial para la unidad mutualista."
 building_massive_growth_1: "Valle nutritivo"
 building_massive_growth_1_desc: "Una pequeña estructura geológica que ofrece un microclima ideal durante todo el año para el crecimiento de los cultivos."
 building_massive_growth_2: "Sotobosque nutritivo"
 building_massive_growth_2_desc: "Un enorme dosel arbóreo semipermeable dota a este sotobosque de la protección medioambiental que necesita para seguir produciendo alimentos tan ricos como suculentos."
 building_massive_growth_3: "Megaplantación topográfica"
 building_massive_growth_3_desc: "Un refugio para microorganismos y fauna semiacuáticos. Estas terrazas en expansión ofrecen una plétora de materia proteica y cereales."
 building_massive_growth_4: "Plantación de silvicultura"
 building_massive_growth_4_desc: "Arreglos de sotobosques cubiertos por una frondosa megaflora que producen una enorme cantidad de alimentos para satisfacer toda una red trófica."
 building_bioelectric_stimulator_1: "Aclimatador cloroplástico"
 building_bioelectric_stimulator_1_desc: "Agrupaciones de burbujas con forma de lente absorben los rayos del sol para conformar una rica sopa de algas. Dicha energía se convierte y se almacena para usos posteriores."
 building_bioelectric_stimulator_2: "Acelerador cloroplástico"
 building_bioelectric_stimulator_2_desc: "Unas vítreas burbujas llenas de algas fotosintéticas que emplean la energía solar para estrechar vínculos bioquímicos y reducir las emisiones propias."
 building_bioelectric_stimulator_3: "Matriz de lentes cloroplásticas"
 building_bioelectric_stimulator_3_desc: "Ramas compensadas con colectores solares capaces de subir o bajar conforme a su demanda y capacidad. Un centro de energía versátil y fiable."
 building_bioelectric_stimulator_4: "Quiste cloroplástico"
 building_bioelectric_stimulator_4_desc: "Estos sacos vítreos de algas migran y se multiplican allá donde su energía es necesaria, eliminando casi por completo la pérdida de energía a lo largo de la distancia."
 building_churning_tunnels_1: "Orificio lítico"
 building_churning_tunnels_1_desc: "La dureza cuasi cristalina de la materia vegetal se fuerza tanto dentro como alrededor de los yacimientos existentes, permitiendo extraer una mayor cantidad de minerales útiles."
 building_churning_tunnels_2: "Filtros líticos"
 building_churning_tunnels_2_desc: "Las colonias de biocapas semipermeables recogen minerales valiosos que, de otra forma, se perderían con los vertidos de las operaciones de minería líquida."
 building_churning_tunnels_3: "Macerador lítico"
 building_churning_tunnels_3_desc: "Las potentes placas y pinzas pulverizadoras sirven para reducir la materia terrestre a un lodo químico que facilita la extracción de minerales."
 building_churning_tunnels_4: "Baños líticos"
 building_churning_tunnels_4_desc: "Una sinfonía de maceradores, agentes bioquímicos y biocapas que permite la extracción de minerales allá donde haya un depósito abundante."
 building_natural_furnace_0: "Estanque fundidor"
 building_natural_furnace_0_desc: "Los simbiontes termófilos trabajan a destajo para producir aleaciones de gran calidad tanto en el interior como alrededor de esta fuente de calor natural."
 building_natural_furnace_1: "Horno fundidor"
 building_natural_furnace_1_desc: "Los crecimientos con resistencia térmica permiten un uso más eficiente del calor y, por lo tanto, la producción de aleaciones superiores."
 building_natural_furnace_2: "Fundidor de luz sólida"
 building_natural_furnace_2_desc: "Sofisticados hornos litoorgánicos que, gracias a la tecnología holográfica, permiten la producción de aleaciones de lo más versátiles."
 building_natural_furnace_3: "Nanofundidor"
 building_natural_furnace_3_desc: "Los nanoorganismos termófilos que pueblan estos sofocantes estanques y hornos limpian nuestras aleaciones de impurezas no deseadas."
 building_avatar_chamber_1: "Cuna de avatares"
 building_avatar_chamber_1_desc: "Un órgano incipiente a través del cual la natura empieza a moldear formas básicas, preparando sus instintos para, en un futuro, interactuar con vidas desconocida y territorios ajenos a su biosfera nativa."
 building_avatar_chamber_2: "Cámara de avatares"
 building_avatar_chamber_2_desc: "Cuerpos simulados se crían y someten a pruebas internas, a semejanza de organismos y ecosistemas ajenos. El saber se propaga al incorporar lo desconocido."
 building_avatar_chamber_2_effect: "La $building_avatar_chamber_1$ produce §G200§! £amenities£ servicios adicionales"
 building_avatar_chamber_3: "Bosque de avatares"
 building_avatar_chamber_3_desc: "Este órgano extenso emite plantillas de avatares a imagen de seres y parajes alienígenas. Así, la natura aprende mediante prueba y error acerca de lo que jamás ha tocado."
 building_avatar_chamber_3_effect: "La $building_avatar_chamber_1$ produce §G400§! £amenities£ servicios adicionales"
 building_avatar_chamber_4: "Córtex de avatares"
 building_avatar_chamber_4_desc: "Un motor de corporeidad de escala planetaria capaz de simular civilizaciones enteras, con sus sistemas ecológicos y extremos ambientales observados en parajes alienígenas. Aquí, la natura ensaya su futuro encuentro con la galaxia."
 building_avatar_chamber_4_effect: "La $building_avatar_chamber_1$ produce§G800§! £amenities£ servicios adicionales"
 building_mote_aggravator: "Digestivo químico"
 building_mote_aggravator_desc: "Un elegante sistema de tejidos vasculares y metabolizadores químicos que produce $volatile_motes$ a partir de la materia de arcilla cotidiana."
 building_churning_stomach: "Filtros de gases exóticos"
 building_churning_stomach_desc: "Microbios y nanoorganismos altamente capacitados que reaccionan ante los atomizadores naturales para producir estos $exotic_gases$ refinados."
 building_crystal_growth: "Lecho de cristales"
 building_crystal_growth_desc: "Unos doseles especiales propician la humedad adecuada y regulan la temperatura exacta para la creación de $rare_crystals$ artificiales."
 building_planetary_carapace: "Guarnición ósea"
 building_planetary_carapace_desc: "Este remoto campo de pruebas puede dar cabida a una plétora de simbiontes sumamente territoriales, prestos a actuar si la situación lo requiere."
 mod_planet_building_planetary_carapace_build_speed_mult: "Veloc. construc. $building_planetary_carapace$"
 building_planetary_carapace_2: "Fortaleza ósea"
 building_planetary_carapace_2_desc: "Gracias a sus recios campos de entrenamiento y alojamientos, este recinto en expansión garantiza que los defensores estén preparados para cualquier incursión planetaria."
 building_ozone_thickener: "Dosel de escudos planetarios"
 building_ozone_thickener_desc: "$tech_planetary_shield_generator_desc$"
 building_subterranean_cache: "Depósito subterráneo"
 building_subterranean_cache_desc: "$building_resource_silo_desc$"
 building_cradle_of_rebirth: "Cuna del renacer"
 building_cradle_of_rebirth_desc: "Esta estructura de profundo arraigo metaboliza materia decadente y presas capturadas, convirtiéndolas en biomasa que nutrirá el cuerpo del mundo con cada pálpito silencioso."
 building_wilderness_storm_relief: "$building_storm_resistant_production$"
 building_wilderness_storm_relief_desc: "Un amplio dosel de hojas endurecidas con carga bioeléctrica que garantiza la seguridad de los simbiontes cercanos. Además, permite responder al instante a la actividad de las tormentas cósmicas sin poner en peligro sus vidas ni su productividad."
 building_wilderness_storm_relief_tt: "Los efectos negativos de la §Y$default_storm$§! que afectan a la producción del planeta se reducen en un §G25%§!."
 holding_wilderness_glade: "Calvero natural"
 holding_wilderness_glade_plural: "Calveros naturales"
 holding_wilderness_glade_desc: "Una región productiva de naturaleza simbiótica levemente vinculada a su colectivo original. Si bien los simbiontes dependen en gran medida de las fuentes de alimento locales, los que habitan este pequeño bioma son expertos en la extracción de otros recursos cercanos."
 holding_wilderness_glade_effect_desc: "El súbdito convierte [owner.WildernessGladeProvides] en $r_basic_plural$ para su dominador.\nEl dominador reduce el $mod_planet_jobs_productive_upkeep_mult$ del mundo súbdito.\nAparecerá un £blocker£ §Y$holding_wilderness_glade$§! en el planeta que ocupará un espacio de distrito."
 no_free_district_for_wilderness_glade: "$TRIGGER_FAIL$§RNo hay distrito libre en este planeta para nuestro pequeño bioma.§!"
 blocker_tied_to_wilderness_glade: "$TRIGGER_FAIL$§REsta barrera seguirá mientras exista la parcela §Y$holding_wilderness_glade$§! en este mundo.§!"
 d_wilderness_glade_blocker: "$d_wilderness_root_blocker$"
 d_wilderness_glade_blocker_desc: "Un $holding_wilderness_glade$ cercano necesita sustentarse sobre grandes estructuras de raíces para que este pequeño bioma pueda sobrevivir en nuestro entorno alienígena."
 holding_wilderness_glade_modifier: "Calveros naturales repartidos"
 holding_wilderness_glade_modifier_desc: "Mundos súbditos en armonía con el nuestro, cada uno compartiendo su riqueza mutualista." # appears in 'lore brown'
 holding_wilderness_glade_modifier_tt: "La cantidad depende del número de mundos súbditos con §Y$holding_wilderness_glade_plural$§!."
