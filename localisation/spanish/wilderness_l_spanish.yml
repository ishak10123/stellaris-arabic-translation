 ####################################
 # City Appearance
 ####################################
 WILDERNESS: "Natura"
 ####################################
 # Deposits
 ####################################
 d_wilderness_mining: "Sistema de cuevas huecas"
 d_wilderness_mining_desc: "Las formas de vida que antes ocupaban este mundo abandonaron sus minas de forma precipitada y desordenada, dejando varios túneles desnudos y propensos a derrumbarse."
 d_wilderness_mining_2: "Meseta llena de agujeros"
 d_wilderness_mining_2_desc: "Esta peligrosa región está plagada de residuos sin valor y posibles hundimientos, todo ello derivado de la intensa actividad minera desarrollada en el pasado."
 d_wilderness_farming: "Bosque seco"
 d_wilderness_farming_desc: "Lo que una vez fue un bosque extenso y productivo ahora carece de vida. Sus ramas marchitas ya no son capaces de producir cosechas."
 d_wilderness_farming_2: "Bosque fosilizado"
 d_wilderness_farming_2_desc: "Los restos de una vasta región rica en silvicultura diversa. La abundante vida vegetal y los hongos murieron tan rápidamente que los restos parecen cristalinos y bioquímicamente inertes."
 d_wilderness_generator: "Campo solar calcinado"
 d_wilderness_generator_desc: "Un follaje marchito y tallos quebradizos son cuanto queda de este parque solar desaparecido."
 d_wilderness_generator_2: "Yermo solar"
 d_wilderness_generator_2_desc: "Esta vasta región está ocupada por los restos espinosos de un bosque solar que en su día fue exuberante. La materia foliar seca y ligeramente irradiada ahora se desplaza como polvo atmosférico."
 d_wilderness_city: "Pantano fétido"
 d_wilderness_city_desc: "Lo que una vez fue un próspero hábitat para innumerables formas de vida ha sido abandonado, y ahora es poco más que un pozo supurante y enconado."
 d_wilderness_city_2: "Ciénaga enconada"
 d_wilderness_city_2_desc: "Innumerables formas de vida de diversos tipos han perecido aquí. Sus restos en descomposición se han filtrado en el paisaje, liberando una avalancha de sustancias bioquímicas acres y corrosivas."
 d_wilderness_industrial: "Lodazal metálico"
 d_wilderness_industrial_desc: "Los restos de varios manantiales minerales al aire libre, cuyo contenido se ha vuelto tóxico e inerte por el colapso de la geología circundante."
 d_wilderness_industrial_2: "Tierras baldías bioquímicas"
 d_wilderness_industrial_2_desc: "Cuencos líticos y barrancos cubiertos de polvo químico son cuanto queda de una vasta cadena de plantas de tratamiento de minerales semiorgánicos."
 d_scorched_plains: "Llanuras abrasadas"
 d_scorched_plains_desc: "Esta región, que en su día rebosaba de vida, quedó devastada por la explosión de una supererupción estelar."
 concept_scorched_plains: "$d_scorched_plains$"
 concept_scorched_plains_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-2§!\n- Tiempo para eliminar: £time£ 180 §Idías§!\n- Coste de eliminar:\n$t$- 900 $i_energy$\n\n§L$d_scorched_plains_desc$§!"
 ####################################
 # Colony Types
 ####################################
 col_wilderness_default: "Colonia de natura"
 ####################################
 # Planet Designations
 ####################################
 col_wilderness_capital: "Mundo corazón"
 col_wilderness_capital_tt: "$col_wilderness_capital_desc$"
 col_wilderness_capital_desc: "Cada faceta de este mundo vibra con vida simbiótica, reunida en cantidades tan vastas que constituyen un cuerpo estelar viviente."
 col_wilderness_generator: "Mundo fotosintético"
 col_wilderness_generator_desc: "$col_generator_desc$"
 col_wilderness_generator_tt: "Innumerables grupos de simbiontes cloroplásticos se reúnen y almacenan energía en este mundo."
 col_wilderness_mining: "Mundo lítico"
 col_wilderness_mining_desc: "$col_mining_desc$"
 col_wilderness_mining_tt: "Bajo la aparentemente estéril superficie de este planeta, se esconde un concierto de vida subterránea que extrae con entusiasmo su abundancia mineral."
 col_wilderness_farming: "Mundo polinizador"
 col_wilderness_farming_desc: "$col_farming_desc$"
 col_wilderness_farming_tt: "Simbiontes especializados mantienen las condiciones de crecimiento ideales en todo el mundo, lo que favorece una abundante variedad de flora y fauna nutritivas."
 col_wilderness_fortress: "Mundo cazador"
 col_wilderness_fortress_desc: "$col_fortress_desc$"
 col_wilderness_fortress_tt: "La superficie de este mundo tiembla con las estampidas de manadas fuertemente territoriales y los gritos de temibles depredadores."
 col_wilderness_tech: "Mundo de reflexión"
 col_wilderness_tech_desc: "$col_research_desc$"
 col_wilderness_tech_tt: "Este dinámico mundo está plagado de curiosidades y fenómenos extraños, a disposición de las mentes inquisitivas y ávidas de conocimiento."
 col_wilderness_nest: "Mundo tejedor"
 col_wilderness_nest_desc: "$col_city_desc$"
 col_wilderness_nest_tt: "Un santuario para tal plétora de formas de vida simbióticas que la propia atmósfera puede cambiar de composición en respuesta a las necesidades y estados de ánimo de la natura."
 col_wilderness_refinery: "Mundo refinador"
 col_wilderness_refinery_desc: "Su especialidad es la producción de £exotic_gases£ §H$exotic_gases$§! y otros £strategic_resource£ §Hrecursos estratégicos§!."
 col_wilderness_refinery_tt: "Este planeta está plagado de respiraderos geotérmicos donde una gran cantidad de nanoorganismos y otros simbiontes exóticos pueden reunirse y procesar materias primas."
 col_wilderness_forge: "Mundo crisol"
 col_wilderness_forge_desc: "$col_foundry_desc$"
 col_wilderness_forge_tt: "Un crisol del tamaño de un planeta para procesar minerales en bruto y convertirlos en aleaciones eficaces y versátiles."
 col_wilderness_unification: "Mundo calmo"
 col_wilderness_unification_desc: "$col_bureau_desc$"
 col_wilderness_unification_tt: "Un aura de mutualismo sereno se extiende por todo este mundo, profundizando las complejas relaciones entre simbiontes."
 ####################################
 # Personalities
 ####################################
 personality_benevolent_wilderness: "Natura armónica"
 personality_benevolent_wilderness_desc: "Esta vasta e inteligente biosfera solo busca entrelazarse con las estrellas. Sus raíces se extienden pacientemente por toda la galaxia, no con hambre, sino en armonía."
 personality_rampant_wilderness: "Natura desenfrenada"
 personality_rampant_wilderness_desc: "La natura salvaje no se enfurece; se extiende, consume y perdura. Todas las cosas, vivas o muertas, son reclamadas en el ciclo interminable de crecimiento y decadencia."
 ####################################
 # Policies
 ####################################
 policy_symbiont_policy: "$policy_drone_policy$"
 policy_symbiont_policy_desc: "Nuestro colectivo mutualista es eminentemente capaz y productivo, pero no es ilimitado. Debemos decidir cómo y dónde se utilizan mejor nuestros recursos."
 symbiont_policy_balanced: "$drone_policy_balanced$"
 symbiont_policy_balanced_name: "$symbiont_policy_balanced$"
 symbiont_policy_balanced_desc: "La natura se dedica por igual a la producción de materias primas y a la de productos manufacturados.\n\n§ENo hay penalizaciones ni bonificaciones a la producción de recursos.§!"
 symbiont_policy_worker: "$drone_policy_worker$"
 symbiont_policy_worker_name: "$symbiont_policy_worker$"
 symbiont_policy_worker_desc: "La natura da prioridad a la extracción de materias primas, y los simbiontes correspondientes se vuelven más productivos, pero a cambio se reduce la fabricación de productos manufacturados.\n\n"
 symbiont_policy_thinker: "$drone_policy_thinker$"
 symbiont_policy_thinker_name: "$symbiont_policy_thinker$"
 symbiont_policy_thinker_desc: "La natura da prioridad a la fabricación de productos manufacturados, aumentando la productividad a expensas de una menor extracción de materias primas.\n\n"
 ####################################
 # Edicts
 ####################################
 edict_capacity_subsidies_wilderness: "$edict_capacity_subsidies$"
 edict_capacity_subsidies_wilderness_desc: "Este edicto anima a nuestros simbiontes fotosintéticos a formar manadas migratorias que siguen al sol a través de nuestra superficie, aumentando la producción de energía."
 edict_mining_subsidies_wilderness: "$edict_mining_subsidies$"
 edict_mining_subsidies_wilderness_desc: "Este edicto refuerza nuestras raíces, permitiendo que nuestros simbiontes excavadores caven con menos riesgo de colapso estructural."
 edict_farming_subsidies_wilderness: "$edict_farming_subsidies$"
 edict_farming_subsidies_wilderness_desc: "Este edicto establece una dilución agresiva de productos químicos de alta energía en nuestro suelo para aumentar nuestra producción de nutrientes."
 edict_forge_subsidies_wilderness: "$edict_forge_subsidies$"
 edict_forge_subsidies_wilderness_desc: "Saturar nuestras piscinas de algas litotróficas con nutrientes permite la floración estacional y el aumento de la cosecha de subproductos de aleación."
 edict_research_subsidies_wilderness: "$edict_research_subsidies$"
 edict_research_subsidies_wilderness_desc: "$edict_research_subsidies_desc$"
 edict_clearing_motes_wilderness: "$edict_clearing_motes$"
 edict_clearing_motes_wilderness_desc: "Complementar las dietas de los simbiontes con motas volátiles permite la digestión de sustancias tanto orgánicas como inorgánicas. Nuestro holobionte se adaptará a su propio entorno alimentándose de él."
 edict_learning_campaign_wilderness: "$edict_learning_campaign$"
 edict_learning_campaign_wilderness_desc: "Al proporcionar nutrientes adicionales a nuestros simbiontes, podemos aumentar la productividad."
 edict_war_drone_campaign_wilderness: "Campaña de simbiontes de guerra"
 edict_war_drone_campaign_wilderness_desc: "Al proporcionar nutrientes adicionales a nuestros depredadores y simbiontes de manada, podemos aumentar su fuerza y su disposición para el combate."
 edict_scientific_revolution_wilderness: "$edict_scientific_revolution$"
 edict_scientific_revolution_wilderness_desc: "$edict_scientific_revolution_desc$"
 edict_drone_overdrive_wilderness: "Saturación simbionte"
 edict_drone_overdrive_wilderness_desc: "Nuestros biomas serán más competitivos, ya que se requieren más recursos."
