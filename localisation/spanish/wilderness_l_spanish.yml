 job_gaseosymbiote: "Gaseosimbionte" #Cus I don't want to have a Gassy  mbionte
 job_gaseosymbiote_plural: "Gaseosimbiontes"
 job_gaseosymbiote_desc: "Estos simbiontes, maestros de la alquimia microbiana, mantienen las condiciones idóneas para la generación natural de gases exóticos."
 job_gaseosymbiote_effect_desc: "Los [gas_refiner_drone.GetIcon] $job_gaseosymbiote_drone_plural$ convierten [GetCatalyticMineralsOrFood] en £exotic_gases£ §Y$exotic_gases$§!"
