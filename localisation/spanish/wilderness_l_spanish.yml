 ####################################
 # Traditions
 ####################################
 tr_adaptability_appropriation_wilderness: "Apropiación"
 tr_adaptability_appropriation_wilderness_delayed: "Los ecosistemas desaprovechados no sirven de nada a nuestro imperio. Hay que reubicar a los [GetIndividualNamePluralCap] de manera eficiente en aquellos planetas donde más necesarios son."
 tr_discovery_faith_in_science_wilderness: "Red micélica"
 tr_discovery_faith_in_science_wilderness_delayed: "Aprovechar la curiosidad natural de todos los [GetIndividualNamePlural] en una red interconectada basada en hongos permite un descubrimiento mucho más eficiente."
 tr_domination_wilderness_network: "Macroaceleración metabólica"
 tr_domination_wilderness_network_delayed: "Aumentar la tasa de intercambio de energía a escala continental mejora en gran medida la cantidad de ayuda que cada parte de nosotros puede proporcionarse mutuamente."
 tr_domination_wilderness_network_effect: "§YDesbloquea el edicto:§! $edict_drone_overdrive_wilderness$"
 tr_domination_imperious_architecture_wilderness: "Compatibilidad de feromonas entre especies"
 tr_domination_imperious_architecture_wilderness_desc: "Los §Y$district_craglands_plural$§! proporcionan £defense_army£ §Y$defense_army_plural$§! adicionales: §G+1§!"
 tr_domination_imperious_architecture_wilderness_delayed: "Forzar la comunicación feromonal entre todos los [GetIndividualNamePlural] permite responder más rápidamente a las amenazas externas."
 tr_expansion_colonization_fever_wilderness: "Mente de muchos mundos"
 tr_expansion_colonization_fever_wilderness_desc: "Añade un §Y£district£distrito§! al azar al colonizar un nuevo mundo."
 tr_expansion_colonization_fever_wilderness_delayed: "La [GetGestaltEntityName] es un coro de pensamientos que ni siquiera el frío vacío del espacio puede acallar."
 tr_expansion_a_new_life_wilderness: "Crecimiento desenfrenado"
 tr_expansion_a_new_life_wilderness_delayed: "La [GetGestaltEntityName] desarrolla soluciones para sus problemas."
 tr_expansion_courier_network_wilderness: "$tr_expansion_courier_network_hive$"
 tr_expansion_courier_network_wilderness_delayed: "Tratar cada bioma como una subdivisión más pequeña del todo mayor permite una comunicación específica sin requerir la atención completa de la mente del planeta."
 tr_expansion_galactic_ambition_wilderness: "$tr_expansion_galactic_ambition_hive$"
 tr_expansion_galactic_ambition_wilderness_delayed: "Un terror primigenio acompañó nuestros primeros avances en la oscuridad, lejos de nuestro mundo incubadora. Solo si conquistamos y superamos este miedo seguiremos creciendo. Millones de [GetIndividualNamePlural] morirán para que la [GetGestaltEntityName] sobreviva."
 tr_prosperity_pursuit_of_profit_wilderness: "Transporte global de líquidos"
 tr_prosperity_pursuit_of_profit_wilderness_delayed: "Las venas que atraviesan el continente transportan nutrientes y materiales de construcción importantes para complementar los ecosistemas necesitados."
 tr_prosperity_public_works_wilderness: "Madrigueras subterráneas"
 tr_prosperity_public_works_wilderness_desc: "Todos los £district£ §Ydistritos§! proporcionan §G+50§! de £housing£ §Y$MOD_PLANET_HOUSING_ADD$§!."
 tr_prosperity_public_works_wilderness_delayed: "Al hacer que los [GetIndividualNamePlural] penetren en las capas superficiales de la corteza y complementen sus nidos con estructuras de cera, pueden alojarse muchos más."
 tr_synchronicity_kinship_wilderness: "Ritmos circadianos sincronizados"
 tr_synchronicity_kinship_wilderness_delayed: "El control preciso de los ciclos de descanso de los [GetIndividualNamePlural] hace que surjan cronogramas naturales de reasignación de nutrientes a nivel global."
 ####################################
 # Ascension Perks
 ####################################
 ap_mastery_of_nature_wilderness: "$ap_mastery_of_nature$"
 ap_mastery_of_nature_wilderness_desc: "Somos el ciclo que come y es comido. Desde la célula más pequeña hasta el árbol más alto, vivimos según este principio. Somos naturaleza."
 ap_engineered_evolution_wilderness: "$ap_engineered_evolution$"
 ap_engineered_evolution_wilderness_desc: "Nuestra consciencia evolucionó para superar las adversidades de su entorno. El entorno ha cambiado, y nosotros también."
 engineered_evolution_wilderness_tt: "- Inicia la §Ysituación $genetic_ascension_situation$§!, que desbloquea el árbol de tradiciones ['tradition_category:tradition_purity'].$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n- $UNLOCKS_AGENDA$ §Y$council_agenda_agenda_engineered_evolution_name$§!, que otorga tecnologías de modificación genética como opciones de investigación."
 ############
 # Espionage
 ############
 operation_embed_planetary_roots: "Implantar raíces planetarias" # literal roots, as in plantlife
 operation_embed_planetary_roots_desc: "Tenemos tareas más apremiantes para nuestros [owner.GetIndividualNamePlural] que recopilan información. Sin embargo, al sembrar un microbioma semiconsciente en uno de los mundos del objetivo, podemos preservar la mayor parte de nuestra red de espionaje y tal vez incluso interrumpir su cadena de suministro de alimentos." # the Wilderness embeds a part of itself, hence 'microbiome'
 operation_embed_planetary_roots_on_success: "$operation_sleeper_cells_on_success$"
 espionage_planetary_roots: "Raíces planetarias"
 espionage_planetary_roots_desc: "Hemos implantado un microbioma semiconsciente que nos mantiene informados de los asuntos de este imperio. Estos simbiontes primitivos están listos para servir de apoyo a nuestros recopiladores de inteligencia [owner.GetIndividualNamePlural] en cualquier momento."
 operation_embed_planetary_roots_requires_blocker: "$TRIGGER_FAIL$ §RNuestras $espionage_planetary_roots$ necesitan una ['concept_natural_blocker'] en uno de nuestros mundos objetivo.§!"
 operation_embed_planetary_roots_dont_stack_this: "$TRIGGER_FAIL$ §RYa hemos implantado $espionage_planetary_roots$ en [target.GetName]. Sus beneficios pueden perdurar hasta §Y[planet_roots_success]§!.§!"
 operation_embed_planetary_roots_not_cleared: "$TRIGGER_FAIL$ §RTodavía podemos percibir la presencia de nuestras $espionage_planetary_roots$ en algún lugar de [target.GetName].§!"
 d_wilderness_root_blocker: "Matorral invasivo"
 d_wilderness_root_blocker_desc: "Una ebullición de natura preinteligente y no autóctona está asfixiando los límites de estas tierras rurales."
 wilderness.4500.name: "Peinar la naturaleza"
 wilderness.4500.desc: "Nuestros [owner.GetOperativesLowerPlural] semiautónomos han identificado varios emplazamientos viables para nuestro exclusivo microbioma. Ahora supervisarán estos hábitats durante un tiempo, dando prioridad a aquellos que nos ofrezcan mayores posibilidades de éxito a largo plazo."
 wilderness.4505.name: "Posible emplazamiento identificado"
 wilderness.4505.desc: "Nos hemos asegurado la ayuda de un [target.GetSpeciesAdj] involuntario que cree que está a punto de participar en un acto de conservación de la naturaleza. En cambio, está preparado para entregar nuestra \"bomba de semillas\" de microbioma a un emplazamiento en el interior de §H[roots_planet.GetPlanetMoon] [roots_planet.GetName]§!.\n\nAunque los simbiontes criados dentro de este paquete pueden tener una vida corta y nunca llegarán a ser una extensión completa de nuestro ser, sentimos su afán por infiltrarse y observar este paisaje alienígena tanto como puedan."
 wilderness.4510.name: "$espionage_planetary_roots$ implantadas"
 wilderness.4510.desc: "Desde el momento en que nuestro microbioma fue entregado a su nuevo hogar de [GetRootsBlockerName], comenzamos a respirar su aire prohibido y a percibir el mundo conocido como §H[roots_planet.GetName]§!.\n\nNuestra presencia aquí será tenue, mientras estos simbiontes permanezcan fundamentalmente desconectados de nuestro yo más amplio. Sin embargo, nos serán de gran utilidad cuando llegue el momento de reanudar las operaciones en el espacio [target.GetAdj]."
 wilderness.4510.a: "Nuestras raíces deben profundizar más y ser más duraderas."
 wilderness.4510.b: "Dejemos que nuestras raíces crezcan aquí."
 ####################################
 # Technologies
 ####################################
 tech_wilderness_terraform: "Germinación planetaria"
 tech_wilderness_terraform_desc: "Para extender nuestras raíces a un nuevo mundo, primero debemos preparar el semillero. Al terraformar primero un planeta, podemos asegurarnos de que nuestras colonias tengan un comienzo saludable."
 tech_terrestrial_sculpting_wilderness: "$tech_terrestrial_sculpting$"
 tech_terrestrial_sculpting_wilderness_desc: "$tech_terrestrial_sculpting_desc$"
 tech_terrestrial_sculpting_wilderness_effect: "§HDesbloquea la función:§! Permite la terraformación de todas las clases de planetas estándar."
 tech_wilderness_node: "Centros del ser"
 tech_wilderness_node_desc: "Al fomentar el crecimiento de simbiontes profundamente reflexivos en los claros de nuestro ser distribuido, todos sentirán más intensamente nuestra voluntad colectiva."
 tech_wilderness_cluster: "$tech_hive_cluster$"
 tech_wilderness_cluster_desc: "Podemos acelerar la fluidez del pensamiento colectivo global invirtiéndolo en reuniones de simbiontes cuyo único propósito en la vida es facilitar esa misma voluntad."
 tech_wilderness_confluence: "$tech_hive_confluence$"
 tech_wilderness_confluence_desc: "Nuestra voluntad mutualista se verá fortalecida por grandes reuniones de simbiontes profundamente empáticos, tan en sintonía con su entorno como para concentrarse y retransmitir nuestro pensamiento colectivo."
 tech_genome_mapping_wilderness: "$tech_genome_mapping$"
 tech_genome_mapping_wilderness_desc: "El mapeo de los genomas de nuestras innumerables cepas de ADN mejora nuestra comprensión de cómo crecemos y ayuda a eliminar factores adversos."
 tech_mining_1_wilderness: "$tech_mining_1$"
 tech_mining_1_wilderness_desc: "Se pueden aplicar agentes espesantes de la mucosidad y presión hidráulica a los depósitos minerales existentes para profundizar más y aumentar nuestros resultados."
 tech_powered_exoskeletons_wilderness: "$tech_powered_exoskeletons$"
 tech_powered_exoskeletons_wilderness_desc: "Los trajes exoesqueléticos motorizados aumentan la fuerza y la velocidad de quien los lleva, lo que proporciona evidentes aplicaciones militares al tiempo que aumenta la eficiencia del trabajo manual."
 tech_colonization_1_wilderness: "Iniciativa de nuevos mundos"
 tech_colonization_1_wilderness_desc: "Centramos nuestra atención en calcular los recursos y materiales necesarios para despertar nuevos mundos, preparando así a nuestros simbiontes pioneros para sus arduos viajes a través de las estrellas."
 tech_wilderness_government: "$tech_planetary_government$"
 tech_wilderness_government_desc: "Desde el momento en que un nuevo planeta se despierta, sus prioridades deben centrarse en asegurar un entorno estable y próspero, más que en preocuparse por nuestro yo más amplio."
 tech_wilderness_colonial_centralization: "$tech_colonial_centralization$"
 tech_wilderness_colonial_centralization_desc: "$tech_colonial_centralization_desc$"
