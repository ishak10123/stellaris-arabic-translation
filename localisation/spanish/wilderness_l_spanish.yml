 job_immunosymbiont: "Inmunosimbionte"
 job_immunosymbiont_plural: "Inmunosimbiontes"
 job_immunosymbiont_desc: "Estos simbiontes son anticuerpos sobredimensionados para un organismo en proporción que patrullan las raíces de la natura en busca de divergencias, anulando toda disidencia."
 job_immunosymbiont_effect_desc: "Los [patrol_drone.GetIcon] $job_immunosymbiont_plural$ reducen £crime£ §Y$PLANET_CRIME_NO_HAPPINESS_TITLE$§!, generan £defense_army£ §Yejércitos de defensa§! y producen £unity£ §Y$unity$§!"
 broodsymbiont: "$job_broodsymbiont$"
