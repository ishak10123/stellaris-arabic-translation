 job_neurosymbiont_desc: "Conductos vivientes entre el gigante y nosotros. Los simbiontes se pasan la vida alimentando la psique de la bestia con la nuestra."
 job_neurosymbiont_effect_desc: "Los £job_neurosymbiont£ $job_neurosymbiont_plural$ producen £energy£ §Y$energy$§!"
