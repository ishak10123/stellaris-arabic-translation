 spindlesymbiont: "$job_spindlesymbiont$"
 job_spindlesymbiont: "Simbiontejedor"
 job_spindlesymbiont_plural: "Simbiontejedores"
 job_spindlesymbiont_desc: "Gracias a un sinfín de extremidades flexibles y a unos exóticos órganos sensoriales, este simbionte encauza el flujo de recursos, y dirige los nutrientes, la materia y el material donde más falta hacen. Cada movimiento contribuye al equilibrio de la natura."
 job_spindlesymbiont_with_icon: "£job_spindlesymbiont£ $job_spindlesymbiont$"
 job_spindlesymbiont_plural_with_icon: "£job_spindlesymbiont£ $job_spindlesymbiont_plural$"
