 ####################################
 # Zones
 ####################################
 zone_urban_wilderness: "Corazón vegetal"
 zone_urban_wilderness_desc: "Un núcleo palpitante e instintivo de biomasa que no deja de expandirse y remodelarse. Aquí, la natura expande y entierra sus raíces bien hondo, listas para apoyar cualquier función emergente."
 zone_foundry_wilderness: "Entrañas de fundición"
 zone_foundry_wilderness_desc: "Esta cámara térmica funciona con piedras fundidas y la fuerza de los elementos. Aquí, los $job_forgesymbiont_plural$ moldean el metal con una cadencia digestiva que nutre el esqueleto del mundo."
 zone_research_wilderness: "Tallo reflexivo"
 zone_research_wilderness_desc: "Un nodo desarrollado por raíces nerviosas y floración mutagénica. Los $job_evosymbiont_plural$ locales presentan nuevas extremidades, sentidos y conocimientos."
 zone_unity_wilderness: "Peñascos cantarines"
 zone_unity_wilderness_desc: "Unas imponentes formaciones de huesos huecos y carne lítica entrelazados. El viento esparce capas de tonos por toda la superficie del mundo. Aquí, los $job_choirsymbiont_plural$ recolectan y escuchan al mundo cantar."
 zone_fortress_wilderness: "Bulbo de mando"
 zone_fortress_wilderness_desc: "Un abultado nodo sensorial donde los $job_tamersymbiont_plural$ se agrupan y emiten pulsos aromáticos para reunir y dirigir a las hordas preinteligentes. La natura no da órdenes; tan solo segrega."
 zone_minerals_wilderness: "Columna mineral"
 zone_minerals_wilderness_desc: "Una imponente y corrugada estructura de piedra viva, a mitad de camino entre una cordillera y un órgano. En el interior de sus cavernosos huesos, los minerales se acumulan y reverberan con el pausado aliento de la natura."
 zone_energy_wilderness: "Micopulmones solares"
 zone_energy_wilderness_desc: "Extensos campos de tejido fotosintético que se hinchan con la luz solar recogida, acumulando presión hasta que exhalarla en rítmicas ráfagas. Estas radiantes pulsaciones lanzan a los $job_photosymbiont_plural$ por los aires, y estos cabalgan sobre corrientes térmicas en pos del arco estelar."
 zone_food_wilderness: "Telar florido"
 zone_food_wilderness_desc: "Un fragante cerebro de pétalos y feromonas que tejen rutas polinizadoras como si fuesen los hilos de un tapiz. Desde aquí, la fertilidad del planeta se organiza con la eficiencia de una fábrica mecanizada."
 zone_research_unity_wilderness: "Núcleo de armonía"
 zone_research_unity_wilderness_desc: "Un órgano rítmico ubicado en el corazón de la natura. El conocimiento vibra a través de la memoria y el conocimiento. Aquí, el pensamiento no nace; resuena."
 zone_trade_wilderness: "Enhebración"
 zone_trade_wilderness_desc: "Bucles fibrosos, extremidades enroscadas y sacos de almacenamiento confeccionan un infatigable centro de enrutamiento donde los $job_spindlesymbiont_plural$ tejen y producen la esencia misma de la vida. La natura cumple consigo misma."
 ####################################
