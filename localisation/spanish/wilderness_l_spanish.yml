 job_broodsymbiont_plural: "Progenosimbiontes"
 job_broodsymbiont_plural_with_icon: "[spawning_drone.GetIcon] $job_broodsymbiont_plural$"
 job_broodsymbiont_desc: "Estos simbiontes saturan la natura con biomasa adaptable: materia viva en estado puro, propensa a transformarse en lo que requiera el planeta."
 job_broodsymbiont_effect_desc: "Los [spawning_drone.GetIcon] $job_broodsymbiont_plural$ convierten $r_food$ (o $r_minerals$) en £mod_planet_amenities_no_happiness_add£ §Y$PLANET_AMENITIES_TITLE$§! y £biomass£ §Ybiomasa§!"
