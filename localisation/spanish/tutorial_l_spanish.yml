l_spanish:
 SITLOG: "Diario de situación actualizado"
 ####################################
 #Advisor Tutorial Messages
 ####################################
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_TITLE: "Gobierno"
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_DESC: "La pantalla de §Sgobierno§! nos presenta información relativa a nuestro imperio y su gobierno. Aquí puedes ver al §Sgobernante§! y los efectos que tiene.\n\nUna pestaña separada da información sobre la §Sdemografía§! del imperio."
 TUTORIAL_TECH_VIEW_TITLE: "Tutorial: tecnología"
 TUTORIAL_TECH_VIEW_DESC: "Desde la pantalla §STecnología§! dirigimos la investigación. Las tecnologías se engloban en tres campos distintos, y cada uno suele tener tres opciones de investigación disponibles.\n\nLos campos disponibles son £physics£ física, £society£ sociedad e £engineering£ ingeniería.\n\nPara investigar una §Stecnología§!:\n\n£dot_green£ Haz clic en el botón §SSeleccionar investigación§!.\n£dot_green£ Elige entre las opciones disponibles.\n\nAsignar un §Sjefe de investigación§! agilizará el progreso y es muy recomendable. Además, sus §Srasgos§! pueden ofrecer otros beneficios.\n\nTambién puedes automatizar la investigación haciendo clic en el botón §SActivar investigación automática§! del campo correspondiente.\n\n$tttt$$ttt$£automate_research£\n"
 TUTORIAL_CONTACTSVIEW_EMPIRES_TITLE: "Tutorial: contactos"
 TUTORIAL_CONTACTSVIEW_EMPIRES_DESC: "En la pantalla de §Scontactos§! vemos una lista detallada de los diversos §Simperios§! con los que nos hemos encontrado. Podemos ver a simple vista su §Sopinión§! sobre nosotros y entablar §Sdiplomacia§! rápida y fácilmente.\n\nCada entrada muestra también datos importantes como el §Stipo de gobierno§!, la §Sética§! y el §Sestado del imperio§!.\n\nDesde ella podemos acceder también a operaciones de §Sespionaje§! y ver los §Sacuerdos§! vigentes con cada imperio."
 TUTORIAL_SITUATION_LOG_TITLE: "Tutorial: diario de situación"
 TUTORIAL_SITUATION_LOG_DESC: "El §Sdiario de situación§! muestra todos los §Sproyectos especiales§!, £archaeology£ §Syacimientos arqueológicos§! disponibles y diversas cosas de interés.\n\nEs posible que aparezcan nuevos elementos a medida que exploremos la galaxia."
 TUTORIAL_SHIP_DESIGNER_TITLE: "Tutorial: diseño de naves"
 TUTORIAL_SHIP_DESIGNER_DESC: "Aquí se diseñan las §Snaves§! que utiliza nuestro imperio. Se desbloquearán más §Stamaños de casco§! y §Scomponentes§! cuando investiguemos nuevas tecnologías.\n\nPara crear un nuevo §Sdiseño§!:\n\n£dot_green£ Haz clic en el botón §SNuevo diseño§!.\n£dot_green£ Elige un §Stamaño de casco§!.\n£dot_green£ Haz clic en el botón §SSin secciones§! y selecciona una §Ssección§!.\n\nA continuación, elige los §Scomponentes de nave§! que más te gusten haciendo clic en los espacios disponibles.\n\n\n$tttt$$tt$£slot_component£\n\n\nUna vez guardado, el nuevo diseño se podrá construir en cualquier §Sbase estelar§! provista de un §Sastillero§!."
 TUTORIAL_EMPIREVIEW_PLANETS_TITLE: "Tutorial: planetas y sectores"
 TUTORIAL_EMPIREVIEW_PLANETS_DESC: "La pantalla de §Splanetas y sectores§! ofrece un sumario de todos los mundos colonizados, sus £pops£ §Spoblaciones§! y su §Sproducción de recursos§!.\n\nA medida que crece el imperio, se puede organizar en §Ssectores§! para facilitar la administración.\n\nTambién se pueden crear £vassal£ §Svasallos§! a partir de §Ssectores§! existentes."
 TUTORIAL_MILITARY_FLEET_TITLE: "Tutorial: flotas militares"
 TUTORIAL_MILITARY_FLEET_DESC: "Las §Sflotas militares§! se usan para proteger nuestro imperio emergente de amenazas... o para expandirnos por la fuerza de las armas, si queremos.\n\nEl tamaño de nuestra flota viene condicionado por nuestra §Scapacidad naval§! actual, la cual no es muy grande de primeras. Aun así, podemos aumentarla al:\n\n£dot_green£ Investigar nuevas §Stecnologías.§!\n£dot_green£ Hacer crecer nuestra £pops£ población.\n£dot_green£ Construir §Sfondeaderos de bases estelares§!.\n\nPodemos asignar el mando de una flota a un £commander£ §Scomandante§! para gozar de un mayor poder militar, además de las bonificaciones que aporte el £leader£ §Slíder§!."
 TUTORIAL_SCIENCE_SHIP_TITLE: "Tutorial: sondear"
 TUTORIAL_SCIENCE_SHIP_DESC: "Esta es nuestra £science_ship£ §Snave científica§!, que usamos para §Ssondear§! objetos astronómicos, como los £planet£ §Splanetas§! de un £system£ §Ssistema estelar§!. Los planetas se deben sondear para que sus §Srecursos§! se hagan visibles.\n\nYa hemos sondeado nuestro sistema natal, así que deberíamos centrarnos en otra parte.\n\nCon la §Snave científica§! seleccionada:\n\n£dot_green£ Haz clic derecho en un §Ssistema§!\n£dot_green£ cercano Selecciona §SSondear sistema§!"
 TUTORIAL_CONSTRUCTION_SHIP_TITLE: "Tutorial: nave de construcción"
 TUTORIAL_CONSTRUCTION_SHIP_DESC: "Esta es nuestra £construction_ship£ §Snave de construcción§!, que usamos para crear estaciones espaciales.\n\nCuando se sondea un objeto astronómico, como un £planet£ §Splaneta§!, podemos ordenar a esta nave que construya una £science_ship£ §Sestación de investigación§! o una £mining_station£ §Sestación minera§! para explotar sus recursos.\n\nEstas §Snaves§! también se usan para [GetBuildGrow] §Sbases estelares§! en £system£ §Ssistemas§! no reivindicados, por lo que resultan fundamentales para nuestros planes de expansión."
 TUTORIAL_PLANETVIEW_PLANET_TITLE: "Tutorial: superficie"
 TUTORIAL_PLANETVIEW_PLANET_DESC: "La pestaña §SSuperficie§! ofrece un resumen de las infraestructuras y estado de un £planet£ §Splaneta§!.\n\nLa sección £building£ §SDistritos y edificios§! muestra los espacios de edificio ocupados y disponibles en sus respectivos distritos.\n\nLos £district£ §Sdistritos§! y las §Szonas§! brindan £housing£ §Salojamiento§!, £job£ §Strabajos§! y recursos.\n\nLa §Sautomatización§! permite que el planeta se gestione solo en base al enfoque.\n\nLa barra de §Sestadísticas planetarias§! de la sección parte de la ventana muestra la £stability£ §Sestabilidad§!, el £crime£ §Scrimen§!, los modificadores activos y el §Sgobernador§! asignado."
 TUTORIAL_PLANETVIEW_TILES_TITLE: "Tutorial: economía"
 TUTORIAL_PLANETVIEW_TILES_DESC: "La pestaña §SEconomía§! ofrece una vista general de la §Smano de obra§! y los £job£ §Strabajos§!.\n\nLas poblaciones de los £planet£ §Splanetas§! se organizan en §Sestratos§!, que se pueden ampliar para ver los tipos de §Strabajo§!. Las £pops£ §Spoblaciones§! irán ocupando los estratos según se requiera para mantener la §Smano de obra§!.\n\n§SLos trabajos§! consumen y producen recursos.\n\nLas poblaciones necesitan £housing£ §Salojamientos§! y £amenities£ §Sservicios§!.\n\nSi falta una de las dos cosas, se reduce la £happiness£ §Sfelicidad§!, que a su vez afecta a la £stability£ §Sestabilidad§! general."
 TUTORIAL_PLANETVIEW_COMBAT_TITLE: "Tutorial: ejércitos"
 TUTORIAL_PLANETVIEW_COMBAT_DESC: " Desde la pestaña de §Sejércitos§! se gestionan todas las fuerzas terrestres del planeta. Aquí también se indica cuánta §Sdevastación§! o daño ha sufrido el £planet£ §Splaneta§!.\n\nAquí se forman los nuevos §Sejércitos§!. Para ello, haz clic en el botón §SReclutar§!.\n\n§SLos ejércitos de defensa§! los produce automáticamente la £pops£ §Spoblación§! que ocupa §Strabajos§! de policía o [soldier.GetName]. Estos £job£ §Strabajos§! los ofrece la capital del planeta, las £building£ §Scomisarías§! y los £building£ §Sbastiones§!."
 TUTORIAL_PLANETVIEW_SPACEPORT_TITLE: "Puerto espacial"
 TUTORIAL_PLANETVIEW_SPACEPORT_DESC: "En la pestaña §SPuerto espacial§! se pueden consultar las flotas en órbita y [GetBuildGrow] nuevas naves civiles. Las naves militares solo pueden construirse en una §Sbase estelar§! equipada con un §Sastillero§!, pero las §Snaves colonia§!, científicas y de construcción se montan aquí.\n\nAunque perdamos nuestra última base estelar, podremos expandirnos y reconstruir mientras tengamos al menos un £planet£ §Splaneta§!habitado."
 TUTORIAL_MILITARY_STATION_TITLE: "Estaciones militares"
 TUTORIAL_MILITARY_STATION_DESC: "Las §Sestaciones militares§! son defensas estáticas que se usan para proteger £planet£ §Splanetas§! importantes o vías de aproximación estratégicas, pero solo pueden construirse dentro de nuestras fronteras o territorios a los que tengamos acceso especial.\n\nProcura no [GetBuildGrow] demasiadas: su mantenimiento puede ser un lastre para la economía, como las §Snaves§!."
 TUTORIAL_RESEARCH_STATION_TITLE: "Tutorial: estaciones de investigación"
 TUTORIAL_RESEARCH_STATION_DESC: "Una £science_ship£ §Sestación de investigación§! construida en la órbita de un cuerpo planetario recolecta datos sobre su £physics£ §SFísica§!, £engineering£ §SIngeniería§! y £society£ §SSociedad§!.\n\nSolo puede construirse dentro de nuestras fronteras y no es necesaria si el £planet£ §Splaneta§! ya está colonizado."
 TUTORIAL_MINING_STATION_TITLE: "Estaciones mineras"
 TUTORIAL_MINING_STATION_DESC: "Las £mining_station£ §Sestaciones mineras§! se usan para extraer los £minerals£ §Sminerales§! y £strategic_resource£ §Srecursos estratégicos§! del objeto que orbitan.\n\nLas §Sestaciones mineras§! no son necesarias para acceder a los recursos de £planet£ §Splanetas§! colonizados, y solo pueden construirse dentro de las fronteras."
 TUTORIAL_TRANSPORT_SHIP_TITLE: "Tutorial: naves de transporte"
 TUTORIAL_TRANSPORT_SHIP_DESC: "Cuando se envían §Sejércitos§! al espacio, embarcan automáticamente en estas naves de §Stransporte§!. Asegúrate de protegerlas, ya que están bastante indefensas."
 TUTORIAL_DIPLOMACY_VIEW_TITLE: "Tutorial: diplomacia"
 TUTORIAL_DIPLOMACY_VIEW_DESC: "La pantalla §SDiplomacia§! sirve para comunicarse con otras civilizaciones. Desde ahí podemos §Sdeclarar guerras§!, establecer §Sredes de espionaje§! contra nuestros vecinos o formar §Salianzas§! y §Sacuerdos comerciales§! con ellos. También se puede comprobar el §Hnivel de información§! actual.\n\nTu §Srelación§! con el imperio seleccionado se muestra con uno de los cinco niveles, de Terrible a Excelente. Para firmar un acuerdo o negociar, debes tener un nivel de relación suficiente.\n\nPuedes asignar £envoy£ §Senviados§! a un imperio para §Sespiarlos§!, recabar §Sinformación§!, eludir los requisitos de §Srelación§! o §Smejorar§! o §Sdañar las relaciones§!."
 TUTORIAL_DIPLOMACY_VIEW_TRADE_TITLE: "Tutorial: comercio"
 TUTORIAL_DIPLOMACY_VIEW_TRADE_DESC: "Esta es la §Spantalla de comercio§!. Podemos intercambiar cualquier tipo de §Srecurso§! con otro imperio, así como §Sinformación§! y §Sfavores§!.\n\nLos favores se pueden gastar para incrementar las posibilidades de que un imperio acepte un acuerdo. También puedes pedir favores durante una votación en el Senado de la §Hcomunidad galáctica§! para mejorar tu peso diplomático."
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_TITLE: "Tipos de federación"
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_DESC: "Los §Stipos de federación§! dictaminan cuál es el interés de la £federation£ §Sfederación§!. Cada tipo de federación tiene §Sventajas y leyes§! únicas al inicio y §Sdesbloqueará§! más ventajas a medida que consiga PE."
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_TITLE: "Tutorial: nivel de información elevado"
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_DESC: "Hemos conseguido un §Snivel de información alto§! con este imperio, por lo que tenemos acceso a más información sobre ellos.\n\nSi mantenemos un nivel de información alto con un imperio, tendremos información actualizada sobre su §Sética§! y §Sprincipios§!, sus §Srelaciones§! con otros imperios y su poder de §Stecnología§!, §Seconomía§! y §Smilitar§! en comparación con nosotros."
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_TITLE: "Tutorial: nivel de información bajo"
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_DESC: "Nuestro §Snivel de información§! con este imperio está bajando. Nos arriesgamos a perder información que ya teníamos sobre ellos, ya que, con el tiempo, pierde §Svalidez§!.\n\nPara aumentar el §Snivel de información§!: \n\n£dot_green£ Establece §Sacuerdos diplomáticos.§!\n£dot_green£ Asigna a £envoy£ §Senviados§! para mejorar las relaciones.\n£dot_green£ Establece una §Sred de espionaje.§!\n£dot_green£ Instala una §Sembajada§! en su territorio."
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_TITLE: "Efectos de adyacencia"
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_DESC: "Algunos £building£ §Sedificios§! pueden causar §Sefectos de adyacencia§! a otros §Sedificios§! en §Scasillas§! vecinas. Hay que tenerlo en cuenta cuando se construyen nuevas instalaciones."
 TUTORIAL_GOVERNMENTVIEW_BUDGET_TITLE: "Presupuesto"
 TUTORIAL_GOVERNMENTVIEW_BUDGET_DESC: "Esta pestaña detalla los §Singresos§! y §Sgastos§! mensuales del imperio en £energy £créditos energéticos, así como una gran variedad de efectos que influyen en nuestra economía."
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_TITLE: "Edictos"
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_DESC: "Aquí se pueden aplicar los §Sedictos§! de todo el imperio, medidas que se obligan a cumplir gastando parte de los recursos.\n\nLos edictos tienen un coste de mantenimiento mensual, que se puede cubrir con nuestros §H$EDICT_FUND$§! o gastando £unity£ §Yunidad§!."
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_TITLE: "Tutorial: demografía"
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_DESC: "Esta pestaña muestra la conformación y la diseminación del pueblo de nuestro imperio.\n\nTambién muestra los §Srasgos§! dominantes de nuestras £pops£ §Spoblaciones§! y los modificadores a la productividad y la £happiness£ §Sfelicidad§!, entre otras cosas."
 TUTORIAL_EMPIREVIEW_LEADERS_TITLE: "Tutorial: líderes"
 TUTORIAL_EMPIREVIEW_LEADERS_DESC: "Desde la pantalla de §Slíderes§! podremos contratar, despedir y gestionar a nuestros £leader£ §Slíderes§!, así como consultar un resumen de su estado.\n\nLa §Sclase§! de un líder determina qué encargos podrá llevar a cabo en nuestro imperio y los puestos que puede ocupar en el §SConsejo§!.\n\nCada cierto tiempo, se actualizará la lista de §Slíderes§! disponibles, pero como la capacidad es limitada, sobrepasarla aumenta los costes de mantenimiento y se reducirá la experiencia adquirida. Despide a los líderes innecesarios para evitar estas penalizaciones."
 TUTORIAL_EMPIREVIEW_FACTIONS_TITLE: "Tutorial: facciones"
 TUTORIAL_EMPIREVIEW_FACTIONS_DESC: "En la pantalla de §Sfacciones§! se ven las tendencias políticas de la población. Pueden surgir §Sfacciones§! por cambios en el clima sociopolítico. También hay información sobre el tamaño de una §Sfacción§!, su atractivo para las £pops£ §Spoblaciones§! y su satisfacción.\n\n§SLas facciones§! tienen §Spreocupaciones§!, que son importantes para su §Saprobación§! general, y nuestras políticas y acciones pueden disgustar o complacer a estos grupos, lo que proporciona un aumento cada vez mayor a la generación de £unity£ §Sunidad§!. La fuerza de las §Sfacciones§! y la naturaleza de sus §Spreocupaciones§! pueden cambiar con nuestras circunstancias, pero recuerda que la £happiness£ §Sfelicidad§! de una §Spoblación§! se puede ver afectada por la §Saprobación§! de la §Sfacción§! a la que pertenece.\n\nTambién podemos §Sgestionar facciones§! para manipular la relación entre una §Sfacción§! y el estado, incluso con la adopción de la ética de una §Sfacción§! fuerte."
 TUTORIAL_CREATESECTOR_TITLE: "Tutorial: gestión de sectores"
 TUTORIAL_CREATESECTOR_DESC: "Para establecer un §Ssector§!, selecciona un £planet£ §Splaneta§! de la §Sfrontera espacial§! y pulsa el botón Crear sector. El planeta se convertirá en la §Scapital§! de un nuevo sector y se le añadirán todos los sistemas de la frontera espacial que haya a menos de seis hipersaltos. Los sectores pueden automatizar la construcción de £building£ §Sedificios§! planetarios si se habilita esta opción y si tienen recursos, lo que reduce enormemente la necesidad de microgestión."
 TUTORIAL_CONTACTSVIEW_SPECIES_TITLE: "Tutorial: especies"
 TUTORIAL_CONTACTSVIEW_SPECIES_DESC: "La pantalla de §Sespecies§! enumera los tipos de seres nominalmente inteligentes encontrados. Podemos §Salternar especies§! para mostrar solo los ciudadanos de nuestro imperio o todos los habitantes conocidos de la galaxia.\n\nSi lo permiten la tecnología y el acceso, podemos §Smodificar§! los rasgos de las especies, §Sevolucionar§! a criaturas preinteligentes y §Sasignar derechos predeterminados§! a todas nuestras £pops£ §Spoblaciones§! o §Sasignar derechos§! a cada especie de nuestros ciudadanos."
 TUTORIAL_PLANETVIEW_TERRAFORM_TITLE: "Tutorial: terraformación"
 TUTORIAL_PLANETVIEW_TERRAFORM_DESC: "La §Sterraformación§! permite alterar las condiciones de un £planet£ §Splaneta§! para adaptarlo mejor a una §Sespecie§! o a un propósito en particular."
 TUTORIAL_GENEMODIFICATION_TITLE: "Modificación genética"
 TUTORIAL_GENEMODIFICATION_DESC: "Podemos alterar genéticamente esta especie, modificando sus §Srasgos§!.\n\nEsto creará una nueva §Splantilla§! de especie con los nuevos rasgos que hayas seleccionado. Para alterar una £pops£ §Spoblación§!, primero tendrás que hacer clic en el botón §SAplicar plantilla§! que creará un nuevo §Sproyecto especial§!."
 TUTORIAL_UPLIFTING_TITLE: "Evolucionar"
 TUTORIAL_UPLIFTING_DESC: "Podemos modificar los §Srasgos§! de estos animales y §Smodificarlos§! para que sean ciudadanos plenamente conscientes y productivos para el imperio."
 TUTORIAL_SYSTEMVIEW_TITLE: "Vista de los sistemas"
 TUTORIAL_SYSTEMVIEW_DESC: "Es una vista de cerca de un £system£ §Ssistema estelar§! en particular. Aquí podemos localizar visualmente £planet£ §Splanetas§!, estaciones y flotas con relativa facilidad."
 TUTORIAL_WORMHOLE_STATION_TITLE: "Estación de agujeros de gusano"
 TUTORIAL_WORMHOLE_STATION_DESC: "Estas estaciones se construyen en el borde exterior de un £system£ §Ssistema§! para convertir desgarrones diminutos del espaciotiempo en portales a otras estrellas. Ingenioso."
 TUTORIAL_OBSERVATION_STATION_TITLE: "Tutorial: puesto de observación"
 TUTORIAL_OBSERVATION_STATION_DESC: "Los §Spuestos de observación§! albergan equipos de £scientist£ §Scientíficos§! que investigan y observan desde lejos a especies §Spre-UL§! de los £planet£ §Splanetas§! en los que orbitan.\n\nEn función de la §Sética§! y la tecnología de tu imperio, podrás elegir entre la observación pasiva, la influencia cultural, la iluminación tecnológica, la abducción o la infiltración.\n\nEstas decisiones afectan a la evolución de la civilización y a la opinión general sobre tu imperio."
 TUTORIAL_TERRAFORMING_STATION_TITLE: "Estación de terraformación"
 TUTORIAL_TERRAFORMING_STATION_DESC: "Estas estaciones permiten la §Sterraformación§! de los planetas en los que orbitan."
 TUTORIAL_PLANETVIEW_EDICTS_TITLE: "Decisiones"
 TUTORIAL_PLANETVIEW_EDICTS_DESC: "Son §Sdecisiones§! de los planetas, órdenes o prácticas que se pueden imponer durante un tiempo usando parte de nuestros recursos.\n\nPuede haber nuevas §Sdecisiones§! disponibles cuando investiguemos nuevas tecnologías y nos topemos con nuevas situaciones."
 TUTORIAL_UNKNOWN_ALIEN_FLEET_TITLE: "Desconocidos"
 TUTORIAL_UNKNOWN_ALIEN_FLEET_DESC: "Son §Sentes espaciales no identificados§!. Si completamos el §Sproyecto especial§! adecuado, aprenderemos más sobre ellos y quizá iniciaremos el §Sprimer contacto§!."
 TUTORIAL_VICTORY_TITLE: "Tutorial: victorias"
 TUTORIAL_VICTORY_DESC: "La pantalla de §Svictoria§! enumera §Sciertas condiciones§! que debemos alcanzar para asegurarnos de que el legado de nuestra nación estelar dure tanto como la vida inteligente en esta galaxia."
 TUTORIAL_OUTPOST_STATION_TITLE: "Tutorial: bases estelares"
 TUTORIAL_OUTPOST_STATION_DESC: "Esta es la §Sbase estelar§! de nuestro sistema. Estas estaciones mejorables marcan la propiedad del sistema estelar y suelen ocuparse de la producción de todo tipo de §Snaves§!.\n\nPodemos ampliar las fronteras [GetBuildingGrowing] §Sbases estelares§! en los sistemas cercanos.\n\nSe pueden capturar §Sbases estelares§! del enemigo si las atacamos.\n\nLas §Sbases estelares§! se pueden especializar en varias funciones mediante §Smódulos§! y £building£ §Sedificios§!. Además, constituyen la última línea de defensa contra las flotas enemigas en un sistema."
 TUTORIAL_GALAXY_MAP_TITLE: "Mapa de la galaxia"
 TUTORIAL_GALAXY_MAP_DESC: "El §Smapa galáctico§! muestra vastas extensiones de §Sespacio inexplorado§!, los límites de nuestras fronteras y los territorios de las civilizaciones alienígenas con las que hayamos establecido comunicaciones.\n\nPodemos hacer clic en el botón §SModo de mapa de detalles§! en la barra de menú inferior derecha para mostrar los §Srecursos§! y el §Salcance de sensores§!."
 TUTORIAL_WAR_GOAL_TITLE: "Obj. de guerra"
 TUTORIAL_WAR_GOAL_DESC: "Al declarar la guerra, debemos anunciar nuestras intenciones a nuestros enemigos y aliados. Este §Sobjetivo de guerra§! determina las exigencias que podemos hacer durante las negociaciones de paz, desde ceder £system£ §Ssistemas§! reivindicados a sometimiento a vasallaje.\n\nPresentar este objetivo le da la oportunidad al enemigo de reaccionar adecuadamente. Puede rendirse de inmediato, presentar una contraoferta y tregua o defender sus intereses hasta el último hombre, mujer, espora fúngica o herbívoro semi-inteligente. ¡Descubrirlo forma parte de la diversión!\n\nPara declarar un §Sobjetivo de guerra§!, selecciónalo de la lista."
 TUTORIAL_WAROVERVIEW_TITLE: "Vista de guerra"
 TUTORIAL_WAROVERVIEW_DESC: "Esta ventana muestra información de nuestra guerra actual. Cada bando sufre §Shastío bélico§! según el desarrollo del conflicto, lo que determina su predisposición para aceptar un acuerdo de paz.\n\nSi el hastío bélico de uno de los bandos llega al 100 %, el otro bando puede imponerle un acuerdo de §Sstatu quo§!. Aquí también puede revisarse el resultado de todos los enfrentamientos que se han disputado en la guerra."
 TUTORIAL_STRATEGIC_RESOURCES_TITLE: "Recursos estratégicos"
 TUTORIAL_STRATEGIC_RESOURCES_DESC: "La pantalla de §Hrecursos estratégicos§! enumera nuestros £strategic_resource£ §Srecursos estratégicos§! disponibles y sus efectos.\n\nMuchos §Srecursos estratégicos§! requieren que se investiguen §Stecnologías§! específicas antes de que se puedan extraer y utilizar."
 TUTORIAL_EXPANSION_PLANNER_TITLE: "Tutorial: planificador de expansiones"
 TUTORIAL_EXPANSION_PLANNER_DESC: "En el §Hplanificador de expansiones§! se ven los £planet£ §Splanetas§! §Shabitables§! que podrían colonizarse. Podemos [GetBuildGrow] £colony_ship£ §Snaves colonia§! y darles órdenes directamente desde esta pantalla.\n\nDebemos sondear los planetas e investigar sus anomalías antes de poder colonizarlos.\n\nTambién debemos haber construido una §Sbase estelar§! en el £system£ §Ssistema§! para que los §Splanetas§! estén dentro de nuestras fronteras."
 TUTORIAL_TRADITIONS_TITLE: "Tutorial: tradiciones"
 TUTORIAL_TRADITIONS_DESC: "La pantalla de §Htradiciones§! muestra los §Sárboles de tradiciones§! disponibles para nuestro imperio.\n\nDebemos §Sadoptar§! un §Sárbol de tradiciones§! antes de poder desbloquear sus £traditions£ §Stradiciones§!.\n\n§SAdoptar§! un §Sárbol de tradiciones§! o desbloquear una §Stradición§! específica cuesta una cierta cantidad de £unity£ §Hunidad§!, y el precio aumenta a medida que desbloqueamos §Stradiciones§! y nuestro imperio crece.\n\nPara adoptar un §Sárbol de tradiciones§!:\n\n£dot_green£ Haz clic en el botón de §Sseleccionar§!.\n£dot_green£ Haz clic en el botón de §Sadoptar§! en el árbol de tu elección.\n\nPuedes consultar las §Stradiciones§! disponibles al resaltar los §Sárboles§!."
 TUTORIAL_TRADITIONS_SELECT_TITLE: "Adoptar un árbol de tradiciones"
 TUTORIAL_TRADITIONS_SELECT_DESC: "Esta pantalla muestra todos los §Hárboles de tradiciones§! disponibles para nuestro imperio. Aquí puedes comprobar todas las £traditions£ §Htradiciones§! de cada árbol así como los efectos de §Hadopción§! y §Hcompleción§!.\n\nTe he recomendado algunos §Hárboles de tradiciones§! para empezar."
 TUTORIAL_TRADITIONS_NEW_TITLE: "Nuevo árbol o tradición"
 TUTORIAL_TRADITIONS_NEW_DESC: "Cuando nuestro imperio tenga suficiente £unity£ §Hunidad§!, podrás §Hseleccionar§! un §Hnuevo árbol§! o una £traditions£ §Htradición§! de un árbol previamente seleccionado."
 TUTORIAL_ASCENSION_PERKS_TITLE: "Tutorial: ventajas de ascenso"
 TUTORIAL_ASCENSION_PERKS_DESC: "La lista de §Hventajas de ascenso§! muestra las §Sventajas de ascenso§! que podemos desbloquear. Algunas §Sventajas de ascenso§! pueden tener requisitos especiales, como §Stecnologías§! o el hecho de disponer de un cierto número de §Sespacios de ventaja de ascenso§! ya desbloqueados.\n\nDesbloqueamos un §Hespacio de ventaja de ascenso§! siempre que adoptemos todas las £traditions£ §Htradiciones§! de uno de los §Sárboles de tradiciones§!."
 TUTORIAL_SPECIES_RIGHTS_TITLE: "Tutorial: derechos de especies"
 TUTORIAL_SPECIES_RIGHTS_DESC: "La lista de §Hderechos de especie§! nos permite personalizar la §Sciudadanía§! y los §Sestándares de vida§! de una especie en concreto, entre otras cosas.\n\nAl personalizar los §Sderechos predeterminados§!, los derechos se aplican a todas las £pops£ §Spoblaciones§! que no tengan un conjunto de §Sderechos de especie§!, como inmigrantes, refugiados u otros recién llegados a nuestra nación."
 TUTORIAL_FLEET_MANAGER_TITLE: "Tutorial: gestor de flotas"
 TUTORIAL_FLEET_MANAGER_DESC: "En el §SGestor de flotas§!, podemos crear plantillas para nuestras flotas militares. Cuando nuestras flotas aumentan de tamaño, estas plantillas facilitan encargar reemplazos para las pérdidas que hayamos sufrido."
 TUTORIAL_CLAIMS_VIEW_TITLE: "Tutorial: reivindicaciones"
 TUTORIAL_CLAIMS_VIEW_DESC: "Mediante la interfaz de §SReivindicaciones§!, podemos gastar £influence£ §Sinfluencia§! para reivindicar £system£ §Ssistemas estelares§! que sean propiedad de otros.\n\nTener una reivindicación en un §Ssistema§! nos da un §Scasus belli§! válido contra el propietario, lo que nos permite declarar la guerra para conquistarlo.\n\nEn las guerras en las que participan varios aliados, el imperio con la mayor §Sreivindicación§! sobre un §Ssistema§! será su propietario cuando se gane la guerra."
 TUTORIAL_ANOMALIES_TITLE: "Tutorial: anomalías"
 TUTORIAL_ANOMALIES_DESC: "En la pantalla §SAnomalías§! se enumeran todas las §Sanomalías§! que hemos encontrado y aún no hemos investigado, así como su ubicación. Puedes investigarlas con una £science_ship£ §Snave científica§! que tenga asignado a un £scientist£ §Scientífico§!."
 TUTORIAL_GOVERNMENTVIEW_MARKET_TITLE: "Tutorial: mercado interno"
 TUTORIAL_GOVERNMENTVIEW_MARKET_DESC: "Desde la pantalla £market£ §SMercado§!, se compran y se venden recursos. En principio, solo es un mercado interno, pero si varios imperios se ponen en contacto, pueden formar un §Smercado galáctico§!.\n\nAquí se pueden comprar y vender recursos usando tu reserva de £trade£ §Scomercio§!, que funciona como moneda de cambio. Los precios fluctúan con cada transacción: suben al comprar y bajan al vender.\n\n§STambién se pueden configurar operaciones de comercio automático§! mensuales."
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_TITLE: "Tutorial: mercado de esclavos"
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_DESC: "Todo tiene un precio, y eso incluye a las personas. En el §Smercado de esclavos§! se compran y se venden £pops£ §Spoblaciones§! como si fueran suministros para trasladarlas entre las estrellas. Una vez compradas, las nuevas §Spoblaciones§! se entregan automáticamente en el £planet£ §Splaneta§! elegido, sin tener que preocuparse por la logística. El mercado se ocupa... por un precio."
 #TUTORIAL_PLANETVIEW_CORPORATE_TITLE: "Corporation View"
 #TUTORIAL_PLANETVIEW_CORPORATE_DESC: "The corporate tab allows §SMegacorporations§! to build §SBranch Offices§! on the planets of other Empires, provided they have signed the necessary paperwork. Once built, they can view and upgrade their facilities here as well. As we know, large Corporations wish only the best for their customers, events of the 23rd cycle notwithstanding."
 TUTORIAL_GOVERNMENTVIEW_POLICIES_TITLE: "Tutorial: políticas"
 TUTORIAL_GOVERNMENTVIEW_POLICIES_DESC: "La pestaña §SPolíticas§! detalla las §Spolíticas§! que tienen amplios efectos sobre la dirección del imperio.\n\nSuele haber unas cuantas posturas que adoptar respecto a una §Spolítica§!, aunque pueden estar limitadas por la tecnología y nuestra §Sética§!."
 TRADE_VIEW_DESC: "A medida que crece el imperio, el §Scomercio§! entre nuestros £planet£ §Splanetas§! se convierte en una parte cada vez más importante de nuestra economía. Las §Sbases estelares§! con §Scentros de comercio§! reúnen el §Scomercio§! de su £system£ §Ssistema§! para dirigirlo a la §Scapital§! y convertirlo en £energy£ §Scréditos energéticos§!.\n\nSi hay más §Scentros de comercio§!, la §Sbase estelar§! podrá reunir también §Scomercio§! de los sistemas adyacentes. Las rutas comerciales ricas pueden atraer a los §Spiratas§!, aunque pueden enfrentarse a las flotas que estén de §Spatrulla§! y a los §Smódulos de defensa§! de las §Sbases estelares§!. Los §Smódulos de hangar§! son muy eficaces para esto."
 PLANETVIEW_CORPORATE_DESC: "La pestaña corporativa permite a las §Smegacorporaciones§! construir sucursales en los £planet£ §Splanetas§! de otros imperios, siempre que hayan firmado el papeleo necesario. Una vez construidas, pueden ver y mejorar sus instalaciones desde aquí. Como bien sabemos, las grandes corporaciones solo desean lo mejor para sus clientes, a pesar de los acontecimientos del ciclo 23."
 TUTORIAL_FEDERATION_VIEW_TITLE: "Tutorial: federación"
 TUTORIAL_FEDERATION_VIEW_DESC: "Esta es la §Hpantalla Federación§!. Nuestra £federation£ §Sfederación§! será más fuerte si los miembros tienen una buena §Scohesión§!. Cuando se une un nuevo miembro a la federación, se pierde cohesión.\n\nAsignar £envoy£ §Senviados§! la mejora.\n\nA medida que la federación se vuelva más fuerte, §Sdesbloquearemos ventajas§! que incrementarán los beneficios mutuos."
 TUTORIAL_FEDERATION_VIEW_ENVOYS_TITLE: "Tutorial: enviados a la federación"
 TUTORIAL_FEDERATION_VIEW_ENVOYS_DESC: "Al añadir £envoy£ §Senviados§! a la £federation£ §Sfederación§!, la §Scohesión§! mejorará. Recuerda que el número de enviados a tu disposición es limitado. Los enviados asignados a las federaciones pueden reasignarse a otras §Sacciones diplomáticas§!."
 TUTORIAL_FEDERATION_VIEW_MEMBERS_TITLE: "Tutorial: miembros de la federación"
 TUTORIAL_FEDERATION_VIEW_MEMBERS_DESC: "Esta es la pantalla §HMiembros de la federación§!. Aquí podemos consultar lo poderosos que son los §Smiembros§! en varias áreas, cuántos £envoy£ §Senviados§! están aportando y cuáles de sus §Séticas§! entran en conflicto y provocan la pérdida de §Scohesión§!."
 TUTORIAL_FEDERATION_VIEW_NAVY_TITLE: "Armada de federación"
 TUTORIAL_FEDERATION_VIEW_NAVY_DESC: "La §Harmada de la federación§! se construye a partir de la §Scapacidad naval§! que conceden todos los miembros y la controla el §Spresidente§!. Los miembros pueden construir naves de la armada de la £federation£ §Sfederación§! para añadirlas a la flota."
 TUTORIAL_FEDERATION_VIEW_LAWS_TITLE: "Tutorial: leyes de la federación"
 TUTORIAL_FEDERATION_VIEW_LAWS_DESC: "Cualquier miembro puede proponer cambios en las §Hleyes de la federación§!. Si la £federation£ §Sfederación§! no aprueba una ley, sufrirá una §Spenalización de cohesión§!.\n\nAlgunas leyes están bloqueadas y hay que aumentar la §Scentralización§! para desbloquearlas. Primero, la federación debe §Ssubir de nivel§! para acceder a una centralización mayor.\n\nPero ten cuidado: cuando aumenta la centralización, la cohesión se ve afectada negativamente."
 TUTORIAL_GALACTIC_COMMUNITY_TITLE: "Tutorial: comunidad galáctica"
 TUTORIAL_GALACTIC_COMMUNITY_DESC: "Te damos la bienvenida a la §Hcomunidad galáctica§!, en la que los diplomáticos de toda la galaxia se reúnen para decidir las leyes galácticas a través de la votación de §Sresoluciones§!.\n\nPuedes apoyar las §Sresoluciones propuestas§! desde la §Scola§!. En este caso, se añadirá tu §Speso diplomático§! al apoyo total.\n\nLa resolución con más apoyo pasará al §SSenado§! cuando este se reúna. Habrá una votación para ver si se convierte en una §Sley galáctica§!.\n\nFíjate en el §Senfoque galáctico§!, puesto que define el objetivo común de la comunidad.\n\nPor último, puedes ver cuáles son todos los imperios miembros, así como los §Smodificadores galácticos§! en vigor derivados de las resoluciones de esta pantalla."
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_TITLE: "Tutorial: enviados"
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_DESC: "Puedes asignar £envoy£ §Senviados§! a la comunidad galáctica para aumentar tu §Speso diplomático§!. Los enviados asignados a la comunidad galáctica pueden reasignarse a otras §Sacciones diplomáticas§!."
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_TITLE: "Tutorial: Senado"
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_DESC: "En el §HSenado§!, la comunidad galáctica vota para aprobar o rechazar la resolución de la §Scola§! que más apoyos haya recibido. Como miembro, puedes votar §S\"Sí\", \"No\" o \"Abstenerse\"§!. Si se aprueba la resolución, se convierte en §Sley galáctica§!, y afectará a todos los miembros de la comunidad galáctica. En caso de votación desfavorable, la resolución no podrá proponerse de nuevo hasta que pase cierto tiempo.\n\nLos imperios que no se abstengan recibirán un §Sincremento de opinión§! entre los imperios que votaron lo mismo, y una reducción entre los que votaron lo contrario.\n\nSi tienes §Sfavores§! diplomáticos de otros imperios, puedes usarlos para mejorar tu §Speso diplomático§! en la votación del §SSenado§!."
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_TITLE: "Tutorial: resoluciones"
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_DESC: "La pantalla §HResoluciones§! es una lista de las resoluciones promulgadas. Puedes §Sproponer una nueva resolución§! si la seleccionas en una cadena de resoluciones. Esto tiene un coste de £influence£ influencia.\n\nSolo puedes proponer la primera §Sresolución§! no promulgada de la cadena. Cada paso allana el camino a cambios más radicales, aunque el apoyo a los mismos no está garantizado.\n\nSi se aprueba una §Sresolución§!, no se podrá proponer la siguiente de la cadena en varios años."
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_TITLE: "El Consejo galáctico"
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_DESC: "El §HConsejo galáctico§! se ha establecido. Habrá §Selecciones§! y los miembros con el mayor peso diplomático conseguirán §Spuestos en el Consejo§!. Los miembros del Consejo aumentan su peso diplomático y pueden enviar una propuesta al Senado como §Sresolución de emergencia§!.\n\nLa habilidad §Sveto del Consejo§! se puede desbloquear mediante la aprobación de resoluciones para fortalecer el Consejo. Los miembros tienen acceso a §Sresoluciones especiales§!."
 TUTORIAL_EMPIRE_SPRAWL_TITLE: "Tutorial: $EMPIRE_SIZE$"
 TUTORIAL_EMPIRE_SPRAWL_DESC: "El £empire_sprawl£ §H$EMPIRE_SIZE$§! es una medida de la expansión territorial de tu imperio de acuerdo con los £system£ §Ssistemas§!, las £colony£ §Scolonias§! y los £district£ §Sdistritos§! controlados, así como la población total.\n\nUn gran tamaño del imperio pone a prueba la §Scapacidad administrativa§! del imperio y aumenta el coste de las §Stecnologías§!, las £traditions£ §Stradiciones§!, los £leader£ §Slíderes§! y los §Sedictos§!."
 TUTORIAL_FIRSTCONTACT_VIEW_TITLE: "Tutorial: asignar enviado"
 TUTORIAL_FIRSTCONTACT_VIEW_DESC: "Hemos establecido contacto con una nueva entidad, puede que se trate de una §Scriatura espacial§! u otro §Simperio§!. Podremos obtener más información si establecemos un §Hprimer contacto§!.\n\nTendremos que asignarle esta misión a un £envoy£ §Senviado§!. Deberá establecer comunicaciones con la entidad y descifrar el idioma que usa.\n\nPara asignar a un §Senviado§!:\n\n£dot_green£ Haz clic en su retrato de la ventana §SPrimer contacto§!\n£dot_green£ Selecciona un §Senviado§! entre los disponibles"
 TUTORIAL_CRISIS_VIEW_TITLE: "Tutorial: Sé la crisis"
 TUTORIAL_CRISIS_VIEW_DESC: "Vamos camino de §Sser la crisis§!. Esta senda desbloquea bonificaciones especiales que nos darán más poder y nos convertirán en una fuerza más amenazadora en la galaxia.\n\nLa pantalla §SCrisis§! muestra nuestros objetivos, acciones específicas que podemos realizar para ganar §S[GetCrisisResource]§!. Al obtener [GetCrisisResource], podremos desbloquear los §Sniveles de crisis§! y §Sventajas§! que necesitaremos para desarrollar todo nuestro potencial y propagarlo por la galaxia.\n\nA medida que nuestro imperio se vuelva más amenazante, es posible que la comunidad galáctica decida unirse y declararnos una §Samenaza para la galaxia§!."
 TUTORIAL_CRISIS_VIEW_LEVEL1_TITLE: "Tutorial: niveles de crisis"
 TUTORIAL_CRISIS_VIEW_LEVEL1_DESC: "A medida que avancemos en la ruta \"§SSé la crisis§!\" y alcancemos ciertos requisitos, desbloquearemos nuevos niveles. Cada uno incluye bonificaciones distintas, como §Sventajas de [GetCrisisResource]§! y §Snaves§! especiales.\n\nCuando lleguemos al §Snivel 5§! o la comunidad galáctica nos considere una crisis, tendremos a toda la galaxia en contra. En ese momento, también entraremos en §Sguerra total§! con la comunidad galáctica."
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_TITLE: "Tutorial: redes de espionaje"
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_DESC: "Uno de nuestros £envoy£ §Senviados§! está construyendo una §Sred de espionaje§! en este imperio.\n\nEl §Snivel de infiltración§! de la red de espionaje aumentará con el tiempo en función del §Svalor de red de espionaje§! actual y el £empire_sprawl£ §Stamaño del imperio§! del objetivo. A medida que la red de espionaje crezca, obtendremos más §Sinformación§! sobre el objetivo. También podremos realizar §Soperaciones§! encubiertas allí mediante la §Spestaña Espionaje§!.\n\nUna red de espionaje empezará a §Pempeorar§! si no tiene ningún enviado asignado o si su existencia sale a la luz mediante §Soperaciones§! encubiertas."
 TUTORIAL_ESPIONAGE_VIEW_TITLE: "Tutorial: espionaje"
 TUTORIAL_ESPIONAGE_VIEW_DESC: "La pestaña §SEspionaje§! muestra cómo nuestros £envoy£ §Senviados§! están construyendo las redes de espionaje dentro de otros imperios. Puedes acceder al §Slibro de información§! aquí, además de ver y realizar §Soperaciones§!.\n\nLas operaciones se pueden llevar a cabo en imperios en los que haya un §Senviado§! gestionando una red de espionaje. Para cada tipo de operación es necesario que una red de espionaje haya alcanzado cierto nivel antes de llevarla a cabo."
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_TITLE: "Tutorial: operaciones de espionaje"
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_DESC: "Ahora que nuestras redes de espionaje han llegado a cierto nivel, podemos realizar §Soperaciones§! contra este imperio. Se dividen en categorías, y los diferentes tipos de operación dan resultados distintos, algunos más peligrosos que otros.\n\nLas categorías de operaciones pueden ser §S$op_cat_subterfuge$§!, §S$op_cat_manipulation$§!, §S$op_cat_sabotage$§! y §S$op_cat_provocation$§!. Las operaciones de sabotaje y provocación son más exigentes y acarrean §Spenalizaciones diplomáticas§! más graves si salen a la luz."
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_TITLE: "Tutorial: asignar activos"
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_DESC: "Los §Sactivos§! son agentes y artefactos valiosos que otorgan diferentes efectos en nuestras actividades de espionaje. Trabajan en la red de espionaje y pueden asignarse a operaciones, donde pueden abrir nuevas oportunidades o ayudarnos en caso de que haya problemas.\n\nLos activos se pueden recibir mediante eventos o al realizar la operación §SAdquirir activo§!. Si una red de espionaje deja de existir, sus activos se perderán."
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_TITLE: "Tutorial: megaestructuras"
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_DESC: "De esta lista, podemos elegir una £megastructure£ §Smegaestructura§! que [GetBuildGrow] dentro del £system£ §Ssistema solar§!. Algunos proyectos solo estarán disponibles tras descubrir e investigar la §Stecnología§! relevante.\n\nMis subrutinas de ambición galáctica se han activado por completo. Es recomendable aprovechar la oportunidad para dejar nuestra huella en la galaxia."
 TUTORIAL_ORBITAL_RING_TITLE: "Tutorial: anillo orbital"
 TUTORIAL_ORBITAL_RING_DESC: "Los §Sanillos orbitales§! son enormes £megastructure£ §Smegaestructuras§! que se construyen alrededor de todo un £planet£ §Splaneta§!. Funcionan como un puente entre el espacio y el planeta inferior, lo que otorga espacio para colocar astilleros, estructuras defensivas y centros de recursos.\n\nCon la vista del anillo orbital podemos añadir o eliminar £building£ §Sedificios§! y §Smódulos§!, además de subir de grado los anillos orbitales. Al subir de grado, aumenta el número de espacios en los que se puede construir. La infraestructura planetaria determina los grados."
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_TITLE: "Tutorial: condiciones personalizables"
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_DESC: "Con esta pantalla podemos elegir un §Spreajuste§! para nuestro acuerdo, además de configurar las condiciones individuales. Cada preajuste ofrece un conjunto personalizado de responsabilidades y obligaciones tanto para el súbdito como para el dominador.\n\nPodemos efectuar cambios en la lista de §Scondiciones§! que ajustarán la §Slealtad§! al gusto de los demás imperios, por lo que el acuerdo será más atractivo para ambas partes."
 TUTORIAL_AGREEMENTS_TITLE: "Tutorial: vista general de acuerdos"
 TUTORIAL_AGREEMENTS_DESC: "La pantalla de §Sacuerdos§! te ofrece un resumen de nuestros acuerdos de súbdito y dominador. Podemos usar esta pantalla para llevar la cuenta de la §Slealtad§!, gestionar las §Sparcelas§! y el §Scomercio§! y renegociar las §Scondiciones§! de los acuerdos ya existentes. Si ya no nos sirve, también podemos dar por finalizado un acuerdo."
 TUTORIAL_AGREEMENTS_NO_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_NO_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$\n\nLos imperios súbditos pueden elegir convertirse en §Simperios especialistas§!. La especialización aporta grandes beneficios sobre cuestiones como la producción de recursos o la capacidad militar; sin embargo, el imperio verá cómo decrece su habilidad en otros ámbitos.\n\nLos imperios especialistas también aportan un extra de §Slealtad§!. Siempre y cuando mantengan una cantidad de lealtad estable, dichos imperios ganarán PE y avanzarán hacia los grados superiores de la especialidad elegida."
 TUTORIAL_HOLDINGS_TITLE: "Tutorial: parcelas"
 TUTORIAL_HOLDINGS_DESC_SHARED: "Las pantalla de §Sparcelas§! te permite ver todas las parcelas que hay en el £planet£ §Splaneta§!. Así, los imperios podrán colocar diferentes tipos de £building£ §Sedificios§! en las capitales y £colony£ §Scolonias§! de los demás. Esto puede tener su efecto en cuestiones como la diplomacia, la información y la producción de recursos."
 TUTORIAL_HOLDINGS_DESC_MEGA_CORP: "Las megacorporaciones pueden abrir §Ssucursales§! en los mundos de otros imperios, siempre que se haya establecido algún tipo de acuerdo diplomático. Como bien sabemos, las grandes corporaciones solo desean lo mejor para sus clientes, ¡a pesar de los acontecimientos del ciclo 23!"
 TUTORIAL_HOLDINGS_DESC_OVERLORD: "Los §Sdominadores§! pueden usar parcelas para ampliar su alcance sobre el dominio del §Ssúbdito§!. Muchas parcelas afectan a la lealtad, y algunas solo valen para los imperios especialistas. Las mejoras también se pueden activar con esta pantalla."
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_PLANETVIEW_COLONY_GOV_TITLE: "Tutorial: reclutar gobernador"
 TUTORIAL_PLANETVIEW_COLONY_GOV_DESC: "Para ayudar a la nueva £colony£ §Scolonia§!, deberíamos pensar en reclutar a un §Sgobernador§! para que supervise las operaciones.\n\nLa mayoría de nuestros mundos se las arreglará perfectamente sin el lujo de tener un §Sgobernador§! y se beneficiarán de bonificaciones en función del tipo de gobierno que tengamos. En el caso de aquellos £planet£ §Splanetas§! más afortunados, tener un §Sgobernador§! puede ser una gran bendición.\n\nLos gobernadores pueden ejercer distintos efectos sobre el planeta a su cargo, la mayoría de ellos positivos. Estos efectos dependen de los §Srasgos§! y el nivel de habilidad del §Sgobernador§!."
 TUTORIAL_ELECTION_VIEW_TITLE: "Tutorial: elecciones"
 TUTORIAL_ELECTION_VIEW_DESC: "Desde la pantalla §SElección§! se puede elegir a un nuevo gobernante para nuestro imperio.\n\n[TutorialElectionViewTypeSpecific]"
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_NO: "Los candidatos válidos se escogen de entre tus l£leader£ §Slíderes actuales§!. Si tienes recursos de sobra, puedes elegir el gobernante"
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_YES: "Los candidatos válidos se escogen de entre tus £leader£ §Slíderes§! actuales y se les puede ascender para aumentar su apoyo. De la forma más democrática posible, claro."
 TUTORIAL_EDICTS_AND_POLICIES_TITLE: "Tutorial: políticas y edictos"
 TUTORIAL_EDICTS_AND_POLICIES_DESC: "La pestaña §SPolíticas§! incluye las §Spolíticas§! del gobierno, así como los §Sedictos§! de todo el imperio, prácticas que se pueden aplicar gastando algunos de nuestros recursos.\n\nSe pueden adoptar distintas posturas con respecto a una §Spolítica§!, aunque estas pueden verse limitadas por la tecnología y nuestra §Sética§!.\n\nLos edictos tienen un coste de mantenimiento mensual, sufragado por nuestro §H$EDICT_FUND$§! y que se paga con £unity£ §SUnidad§! o (a veces) otros recursos."
 TUTORIAL_COUNCIL_VIEW_TITLE: "Tutorial: consejo y orden del día"
 TUTORIAL_COUNCIL_VIEW_DESC: "Desde la pantalla §SConsejo§!, puedes designar a los £leader£ §Slíderes§! que nos guiarán hacia el futuro. Sus personalidades y §Srasgos§! influirán en nuestro imperio, tanto para bien como para mal. Podemos establecer §Sórdenes del día§! para que centren sus labores en un área específica.\n\nA los §Sconsejeros§! se los puede asignar o reemplazar en cualquier momento, y siempre pueden cumplir otra asignación, como pilotar una £science_ship£ §Snave científica§!. La única excepción es nuestro gobernante.[TutorialCouncilViewDlcSpecific]El avance del §Sorden del día§! depende del nivel de los consejeros, de nuestro $EMPIRE_SIZE$ y, en algunas ocasiones, de la ética de los consejeros. Al finalizar un orden del día, este se puede activar para potenciar su efecto y dejar espacio a otro orden del día."
 TUTORIAL_COUNCIL_VIEW_PARAGON_NO: "\n\n"
 TUTORIAL_COUNCIL_VIEW_PARAGON_YES: "\n\nPara desbloquear más §Spuestos en el Consejo§!, hacen falta dos cosas: un §Sprincipio§! que coincida, y que se complete un orden del día concreto.\n\n"
 TUTORIAL_ASSIGN_COUNCILOR_TITLE: "Tutorial: rasgos de consejero"
 TUTORIAL_ASSIGN_COUNCILOR_DESC: "Algunos £leader£ §Slíderes§! ostentan §Srasgos de consejero§!. Los más impactantes y con mayor efecto de largo alcance solo se activarán cuando un líder esté en el Consejo.\n\n§SLos puestos del Consejo§! otorgan efectos inherentes. Cuanto mayor sea el nivel de habilidad de un líder asignado, mayores serán esos efectos."
 TUTORIAL_LEADER_LEVEL_UP_TITLE: "Tutorial: habilidad de líder"
 TUTORIAL_LEADER_LEVEL_UP_DESC: "¡Un £leader£ §Slíder§! de nuestro imperio ha alcanzado un nuevo nivel de §Shabilidad§!! Esto mejorará sus bonificaciones y le concederá un nuevo rasgo.[TutorialLeaderLevelUpDlcSpecific]Para consultar los §Slíderes§! disponibles:\n\n£dot_green£ Haz clic en el botón §S$topbar_button_leaders_name$§! que hay en la barra izquierda o pulsa §SF5§!\n\n$tttt$$tt$£leaders£\n\nAl envejecer, los §Slíderes§! pueden adquirir rasgos negativos, de manera que sustituirlos será la opción más lógica."
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_NO: "\n\n"
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_YES: "\n\nPara encauzar el crecimiento de un £leader£ §Slíder§!, podemos elegir su §Srasgo§!. Es posible adjudicar rasgos más adelante sin que el progreso se detenga. Tras aumentar unos cuantos niveles, estará disponible una §Ssubclase§! que añadirá bonificaciones e influirá en las opciones de rasgos sucesivas.\n\nHay rasgos de todo tipo, tamaño y con diferentes particularidades: algunos serán mejorables, otros mutuamente excluyentes, y otros otorgarán efectos tanto positivos como negativos. Todos los rasgos suelen ser permanentes.\n\n"
