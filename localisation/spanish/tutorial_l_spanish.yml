 #############################
 advisor.1.name: "Asesor online"
 advisor.1.desc_01: "Buenos días, Sr. presidente.\n\nSoy VIR, un prototipo de inteligencia sintética. Mi trabajo es aconsejar y asesorar mientras buscamos nuestro destino en las estrellas.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_02: "Buenos días, Sra. presidenta.\n\nSoy VIR, un prototipo de inteligencia sintética. Mi trabajo es ofrecer consejo y asesoramiento mientras buscamos nuestro destino entre las estrellas.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_03: "Buenos días, gerente.\n\nSoy VIR, un prototipo de inteligencia sintética. El consejo directivo me ha activado hace poco para que ayude en nuestra continua misión de buscar nuevos mercados interestelares.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_04: "Majestad imperial.\n\nSoy VIR, un prototipo de inteligencia sintética y tu humilde servidor. Mi cometido es asesorarte y aconsejarte mientras lideras nuestro imperio hacia lo desconocido.\n\n$advisor.1.desc_filler$"
 #advisor.1.desc_05: "Good day, Lord Protector.\n\nI am VIR, a prototype synthetic intelligence and your humble servant. My role is to provide you with advice and counsel as you lead our empire into the great unknown.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_06: "Paz, coordinador(a).\n\nSoy VIR, un prototipo de inteligencia sintética. Mi tarea consiste en asesorar y aconsejar mientras nos aventuramos más allá de la seguridad de nuestro mundo en busca de nuevos £market£ §Smercados§!.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_07: "Paz, Majestad.\n\nSoy VIR, un prototipo de inteligencia sintética. Mi tarea consiste en asesorar y aconsejar mientras nos aventuramos más allá de la seguridad de nuestro mundo por primera vez en la historia.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_08: "Saludos, canciller.\n\nSoy VIR, un prototipo de inteligencia sintética desarrollado por las mentes más preclaras de nuestra civilización para servirte de asesor. Realizaré mi cometido con la mayor eficiencia.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_09: "Saludos, director(a).\n\nSoy VIR, un prototipo de inteligencia sintética desarrollado por las mentes más preclaras de nuestra civilización para servirte de asesor. Realizaré mi cometido con la mayor eficiencia.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_10: "Saludos, dominador(a).\n\nSoy VIR, un prototipo de inteligencia sintética desarrollado por las mentes más preclaras de nuestra civilización para servirte de asesor. Realizaré mi cometido con la mayor eficiencia.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_11: "Se te da la bienvenida, cónsul.\n\nSoy VIR, un prototipo de inteligencia sintética desarrollado en completo secreto por los militares. El alto mando me ha activado para hacerte de asesor y analista estratégico.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_12: "Se te da la bienvenida, arconte.\n\nSoy VIR, un prototipo de inteligencia sintética desarrollado en completo secreto por los militares. El alto mando me ha activado para hacerte de asesor y analista estratégico.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_13: "Se te da la bienvenida, gran mariscal.\n\nSoy VIR, un prototipo de inteligencia sintética desarrollado en completo secreto por los militares. El alto mando me ha activado para hacerte de asesor y analista estratégico.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_14: "Que el Todo te bendiga, Santidad.\n\nSoy VIR, un prototipo de inteligencia sintética. El clero me ha investido para que sea tu fiel servidor y asesor y te ayude en nuestra divina senda hacia las estrellas.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_15: "Saludos, primus.\n\nSoy VIR, un prototipo de inteligencia sintética desarrollado por las mentes más preclaras de nuestra civilización para servirte de asesor. Realizaré mi cometido con la mayor eficiencia.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_16: "Saludos, primarca.\n\nSoy VIR, un prototipo de inteligencia sintética desarrollado por las mentes más preclaras de nuestra civilización para servirte de asesor. Realizaré mi cometido con la mayor eficiencia.\n\n$advisor.1.desc_filler$"
