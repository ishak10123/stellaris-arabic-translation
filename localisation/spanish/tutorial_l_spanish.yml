 advisor.1.desc_31: "Hola, [root.GetBloodCourtRulerTitle].\n\nSoy VIR, un prototipo de inteligencia sintética desarrollado en completo secreto por los militares. La corte me ha ordenado servirte como asesor y analista estratégico.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_32: "Saludos, [root.GetPurityOrderRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_33: "Saludos, [root.GetPurificationCommitteeRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_34: "Saludos, $RT_OLIGARCH$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$."
 advisor.1.desc_35: "Saludos, $RT_DEFENSIVE_UNION$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$."
 advisor.1.desc_36: "Saludos, $RT_DIMENSIONAL_COVENANT$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$."
 advisor.1.desc_keenminds: "Soy VIR, un prototipo de inteligencia sintética desarrollado por las mentes más brillantes de nuestra civilización para servirte de asesor. Realizaré mi cometido con la mayor eficiencia."
 advisor.1.desc_honortoserve: "Soy VIR, un prototipo de inteligencia sintética desarrollado en completo secreto por los militares. Es un honor servirte como asesor y analista estratégico."
 advisor.1.desc_filler: "Se puede cambiar el nivel de tutorial en cualquier momento en el menú de Configuración."
 advisor.1.a: "Cuéntamelo todo. §G(TUTORIAL COMPLETO)§!"
 advisor.1.b: "Dame alguna indicación. §Y(SOLO CONSEJOS)§!"
 advisor.1.c: "Apagad ese trasto. §R(SIN TUTORIAL)§!"
 full_tutorial: "Misiones de tutorial y descripciones de la interfaz mientras exploras la mecánica del juego.\n\nRecomendado si es la primera vez que juegas."
 tips_only: "Durante la partida se te darán consejos y sugerencias ocasionales mientras exploras los §Ssistemas§! del juego.\n\nRecomendado para jugadores novatos e intermedios."
 no_tutorial: "Sin tutoriales ni consejos.\n\nRecomendado para jugadores expertos."
 recycle_vir: "§RDesmontad§! los bancos de memoria de acceso aleatorio de VIR:\n§G+2§! £minerals£\n\n\n"
 advisor.2.name: "Tutorial: diario de situación"
 advisor.2.desc: "Forjar un imperio estelar puede ser una tarea titánica.\n\nPara ayudarte a empezar, te daré §Smisiones§! de instrucción que cubren los pasos básicos necesarios para establecernos como una potencia interestelar de éxito.\n\nPara acceder a las §Smisiones§!:\n\n£dot_green£ Haz clic en el botón §SDiario de situación§! que hay en la barra de la izquierda o pulsa §SF1§!\n\n$tttt$$tt$£situation_log£\n"
 advisor.2.a: "Entendido."
 advisor.3.name: "Consejos inicializados"
 advisor.3.desc: "Muy bien. Daré consejos y explicaré las funciones básicas de las diversas herramientas mientras las exploras."
 advisor.10.name: "Tutorial: Anomalías"
 advisor.10.desc: "¡Hemos descubierto una §Sanomalía§!!\n\nDe vez en cuando, nuestras £science_ship£ §Snaves científicas§! harán descubrimientos así mientras exploran otros mundos.\n\nLas §Sanomalías§! las puede investigar un £scientist£ §Scientífico§! si sus habilidades están a la altura de la tarea.\n\nLas §Sanomalías§! aún por investigar se enumeran en la pestaña §SAnomalías§! del §Sdiario de situación§!. Para poder colonizar o utilizar de cualquier otra forma el £planet£ §Splaneta§! donde se ha encontrado una anomalía, esta debe investigarse primero."
 advisor.15.name: "Tutorial: colonización"
 advisor.15.desc: "Una £science_ship£ §Snave científica§! acaba de sondear un mundo que parece un candidato excelente para nuestra primera £colony£ §Scolonia§!. Es de la misma §Sclase de planeta§! que nuestro mundo natal, así que los colonos estarán como en casa.\n\nAntes de colonizar este mundo, debemos ampliar nuestras fronteras.\n\nCon la £construction_ship£ §Snave de construcción§! seleccionada:\n\n£dot_green£ Haz clic derecho en un £system£ §Ssistema§! sondeado que contenga una posible colonia\n£dot_green£ Selecciona §S[GetBuildGrowCap] base estelar§!\n\n$tttt$$ttt$£colonizable£\n\nCuando nos hayamos adueñado del §Ssistema§!, podremos poner en marcha el proceso de colonización."
 advisor.17.name: "Tutorial: primera colonia"
 advisor.17.desc: "Felicidades por haber colonizado un nuevo mundo. Ahora los colonos están construyendo el primer asentamiento, pero llevará tiempo que sea autosuficiente.\n\nLa £colony£ §Scolonia§! consumirá parte de nuestros recursos hasta que complete el primer asentamiento, así que cuidado con colonizar demasiados £planet£ §Splanetas§! a la vez."
 advisor.20.name: "Tutorial: déficit"
 advisor.20.desc: "Perdemos £energy£ créditos energéticos a un ritmo alarmante. El informe económico del mes pasado no es muy halagüeño.\n\nUnos costes de mantenimiento disparados suelen causar déficit presupuestario. Si es este el caso, quizá deberíamos pensar en disolver alguna de nuestras naves, ejércitos o estaciones."
 #advisor.27.name: "First Contact"
 #advisor.27.desc_01: "We have made first contact with an alien empire! These hideous creatures appear to have mastered space flight, just as we have. They could pose a significant threat.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_02: "We have made first contact with an alien empire! These fascinating beings appear to have mastered space flight, just as we have. We should strive to learn more about them.\n\nTheir empire will now be listed in the §SContacts§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_03: "We have made first contact with an alien empire! They appear to have mastered space flight, just as we have. I recommend a healthy degree of caution until we learn their intentions.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.28.name: "Fallen Empire"
 #advisor.28.desc: "We have encountered an ancient and highly advanced civilization! Fortunately for us, they appear to be in decline and it is doubtful whether they even fully understand their own technology anymore.\n\nThey will likely keep to themselves unless antagonized, and we should steer clear of their space - at least until we have reached technological parity."
 #############################
 #Tutorial Events
 #############################
 tutorial.1.name: "Tutorial: mapa de la galaxia"
 tutorial.1.desc: "El §Hmapa de la galaxia§! ofrece una visión estratégica del cosmos. Te servirá para orientarte, expandir tu imperio, comandar a tus flotas y vigilar tus fronteras.\n\nPara abrir el §Smapa de la galaxia§!:\n\n£dot_green£ Haz clic en el icono de la §Hgalaxia§! que hay en la parte inferior de la pantalla o pulsa §HM§!\n\n\n$tttt$$tt$£galaxy_view£\n\n"
 tutorial.2.name: "Tutorial: sistema sondeado"
 tutorial.2.desc: "Bien hecho.\n\nHemos completado la exploración de un £system£ §Ssistema estelar§! más allá del nuestro.\n\nAhora tenemos acceso a datos planetarios con los que los astrónomos de nuestro mundo natal apenas soñaban hace una generación.\n\nPara seguir sondeando:\n\n£dot_green£ Selecciona una £science_ship£ §Snave científica§!\n£dot_green£ Haz clic derecho en un §Ssistema§!\n£dot_green£ cercano Selecciona §SSondear sistema§!\n\nAntes de adueñarse de un §Ssistema§!, es necesario sondearlo."
 tutorial.3.name: "Tutorial: tecnologías"
 tutorial.3.desc: "Investigar nuevas tecnologías es vital para tener éxito. Te lo cuento no solo como un mero producto de los incontenibles avances tecnológicos, sino como tu asesor de confianza y sospecho que único amigo de verdad.\n\nUna tecnología importante que deberíamos investigar al principio es el §SProtocolo de nuevos mundos§!. Nos dará acceso a las £colony_ship£ §Snaves colonia§!, que nos permitirán establecernos en otros £planet£ §Splanetas§!."
 tutorial.4.name: "Tutorial: sondear"
 tutorial.4.desc: "Antes de expandirnos debemos explorar, y nuestras £science_ship£ §Snaves científicas§! son las elegidas para tal tarea.\n\nPuedes identificar una §Snave científica§! por el siguiente símbolo:\n\n$tttt$$tt$£science_ship_map£\n\n\nExisten dos maneras de seleccionar una nave: desde el §Smapa de la galaxia§! o desde el §Sbreviario§!.\n\n£dot_green£ Selecciona una §Snave científica§!\n£dot_green£ Haz clic derecho en un £system£ §Ssistema§! cercano\n£dot_green£ Selecciona §SSondear sistema§!\n\nAntes de adueñarse de un §Ssistema§!, es necesario sondearlo."
 tutorial.5.name: "Desactivar la pausa"
 tutorial.5.desc: "Ahora que hemos dado una orden a nuestras £science_ship£ §Snaves científicas§!, es hora de ponernos en marcha. Tendremos que desactivar la pausa de la simulación del §Smapa de la galaxia§! antes de que ocurra nada.\n\nPara §Sque el tiempo vuelva a correr§!:\n\n£dot_green£ Pulsa la §Sbarra espaciadora§! o selecciona el icono que §Sdesactiva la pausa§! en la barra superior:\n\n$tttt$$t$£pause_button£\n"
 tutorial.6.name: "Tutorial: tecnología investigada"
 tutorial.6.desc: "¡Excelente! La tecnología que acabamos de investigar nos beneficiará sin duda. No olvides asignar los £scientist£ §Scientíficos§! a nuevas investigaciones."
 tutorial.7.name: "Tutorial: nave de construcción"
 tutorial.7.desc: "Los recursos que genera nuestro mundo natal no dan para mucho. La industria necesita expandirse más allá, y para eso requiere una £construction_ship£ §Snave de construcción§!.\n\nDeberíamos [GetBuildGrow] una en cuanto tengamos suficientes £alloys£ §Saleaciones§!."
 tutorial.8.name: "Tutorial: nave de construcción construida"
 tutorial.8.desc: "Buen trabajo. La £construction_ship£ §Snave de construcción§! ya está operativa, y su avezada tripulación incluye algunos de los mejores ingenieros de la nación."
 tutorial.9.name: "Tutorial: estación minera"
 tutorial.9.desc: "Los recursos que genera nuestro mundo natal no dan para mucho. ¡Por suerte, nuestra £science_ship£ §Snave científica§! ha encontrado un depósito de recursos en otro mundo!\n\nUsemos nuestra £construction_ship£ §Snave de construcción§! para [GetBuildGrow] una £mining_station£ §Sestación minera§!.\n\nLas §Sestaciones mineras§! se construyen dentro de nuestras fronteras y recogen automáticamente los £minerals£ §Sminerales§!, £energy£ §Scréditos de energía§! y £strategic_resource£ §Srecursos estratégicos§!.\n\nCon la §Snave de construcción§! seleccionada:\n\n£dot_green£ Haz clic derecho en un £system£ §Ssistema§! propio\n£dot_green£ Selecciona §S[GetBuildGrowCap] estaciones mineras§!\n\nLas §Sestaciones mineras§! tienen un coste de mantenimiento en §Scréditos energéticos§!."
 tutorial.10.name: "Tutorial: ingresos de estación minera"
 tutorial.10.desc: "Muy bien. La nueva £mining_station£ §Sestación minera§! está operativa y ya ha empezado a recoger recursos para procesarlos.\n\nLos ingresos de las distintas estaciones se agregan a los ingresos totales del imperio, que se ven en la barra superior. Al pasar el puntero por cada recurso, se muestra un desglose de las fuentes de ingresos."
 tutorial.11.name: "Tutorial: estación de investigación"
 tutorial.11.desc: "Los mundos sondeados a veces tienen propiedades únicas que los convierten en objetos valiosos de investigación. Una £science_ship£ §Sestación de investigación§! puede reunir estos recursos de £physics£ §SFísica§!, £society£ §SSociedad§! o £engineering£ §SIngeniería§!. Mi programación me empuja a construir una.\n\nTen en cuenta que las §Sestaciones de investigación§! solamente se pueden construir dentro de nuestras fronteras, y su mantenimiento consume £energy£ §Scréditos energéticos§!."
 tutorial.12.name: "Tutorial: estación de investigación construida"
 tutorial.12.desc: "Ya está en marcha la nueva £science_ship£ §Sestación de investigación§!, y los científicos han empezado a trabajar. ¿Qué secretos, que misterios prohibidos de la Creación descubrirán?"
 tutorial.13.name: "Tutorial: planetas"
 tutorial.13.desc: "Los £planet£ §Splanetas§! habitables se organizan en £district£ §Sdistritos§!, §Szonas§! y £building£ §Sedificios§!.\n\n£dot_green£ Cada §Sdistrito§! se puede componer de varias §Szonas§!\n£dot_green£ Las §Szonas§! determinan qué £job£ §Strabajos§! se crean\n£dot_green£ Los §Sedificios§! proporcionan bonificaciones a las §Szonas§!\n\nSe irán desbloqueando más espacios de §Sedificio§! a medida que se mejoren las zonas.\n\nExisten dos maneras de observar un planeta:\nDesde el §Smapa de la galaxia§! o desde el §Sbreviario§!.\n\n£dot_green£ Selecciona un §Splaneta§!\n£dot_green£ Haz clic en las distintas pestañas"
 tutorial.14.name: "Tutorial: priorizar la construcción"
 tutorial.14.desc: "Excelente. Ha concluido la construcción de nuestro nuevo §Sedificio planetario§!, que ahora comenzará a producir recursos.\n\nA medida que vayan creciendo, se asignarán £pops£ §Spoblaciones§! automáticamente a los £job£ §Strabajos§! generados por los £building£ §Sedificios§!, aunque también se les puede alentar a que cambien de trabajo.\n\nPara dar prioridad a un §Sedificio§!:\n\n£dot_green£ Selecciona el £planet£ §Splaneta§! en el §Sbreviario§!\n£dot_green£ Haz clic en la pestaña de §Seconomía§!\n£dot_green£ Haz clic en un §Sedificio§!"
 tutorial.15.name: "Tutorial: barreras planetarias"
 tutorial.15.desc: "En ocasiones, los £planet£ §Splanetas§! habitables están protegidos por £blocker£ §Sbarreras§! que restringen su explotación. Despejar una §Sbarrera§! lleva tiempo y cuesta £energy£ §Scréditos energéticos§!, pero al hacerlo se pueden desbloquear §Scaracterísticas planetarias§! inaccesibles hasta el momento, así como liberar espacio de construcción adicional.\n\nPara despejar una §Sbarrera§!:\n\n£dot_green£ Selecciona un planeta en el §Sbreviario§!\n£dot_green£ Haz clic en la pestaña de §Sgestión§!\n£dot_green£ Haz clic en el botón §SDespejar barrera§! que verás en la misma barrera\n\n\n$tttt$$tt$£clear_blocker£\n\n\nAdemás de los recursos necesarios, deberás investigar ciertas §Stecnologías§! para despejar según qué §Sbarreras§!."
 tutorial.16.name: "Tutorial: barrera despejada"
 tutorial.16.desc: "¡Así se hace!\n\nHas logrado despejar la £blocker£ §Sbarrera§!.\n\nPuedes pasar el cursor por cualquier §Sbarrera§! que quede para ver qué §Scaracterística planetaria§! se desbloquea al despejarla.\n\nCuando hayas reunido suficientes recursos, deberías despejar las §Sbarreras§! que queden para que este £planet£ §Splaneta§! pueda alcanzar todo su potencial."
 tutorial.17.name: "Tutorial: sondear sistemas"
 tutorial.17.desc: "Debemos continuar con nuestras exploraciones. Recomiendo enviar una £science_ship£ §Snave científica§! para sondear los £system£ §Ssistemas estelares§! vecinos. Alcancemos lugares donde ninguna inteligencia sintética ha podido llegar."
 tutorial.19.name: "Tutorial: sistemas sondeados"
 tutorial.19.desc: "Bien hecho. Ya hemos explorado las estrellas vecinas de nuestro £system£ §Ssistema natal§!. Deberíamos usar £construction_ship£ §Snaves de construcción§! para recoger todos los recursos encontrados al [GetBuildingGrowing] £mining_station£ §Sestaciones de minería§! y de £science_ship£ §Sinvestigación§!.\n\nLas §Snaves de construcción§! se identifican con este símbolo:\n\n$tttt$$tt$£construction_ship_map£"
 tutorial.20.name: "Tutorial: [GetBuildGrowCap] nave científica"
 tutorial.20.desc: "Quizá deberíamos pensar en [GetBuildingGrowing] una segunda £science_ship£ §Snave científica§!. ¡Se duplicaría la velocidad con la que podemos sondear el vecindario galáctico!\n\nPara [GetBuildGrow] una §Snave§!;\n\n£dot_green£ Selecciona una §Sbase estelar§!\n£dot_green£ Haz clic en la pestaña§SAstillero§!\n£dot_green£ Haz clic en §SNave científica§!\n\nLas §Snaves§! recién construidas aparecerán junto a la §Sbase estelar§! cuando estén completadas."
 tutorial.21.name: "Tutorial: automatización de sondeo"
 tutorial.21.desc: "¡El doble de £science_ship£ §Snaves científicas§! es el doble de divertido! Ay, no estaba tan emocionado desde que completamos el último cometido.\n\nUsar varias naves en las exploraciones puede suponer una gran pérdida de tiempo.\n\nPuedes automatizar el sondeo si seleccionas §SNave científica§! y haces clic en el botón§SAutomatización de nave científica§! en la interfaz de la flota.\n\n\n$tttt$$tt$£science_ship_automate_exploration£\n\n"
 tutorial.22.name: "Tutorial: reclutar científico"
 tutorial.22.desc: "Tenemos una nueva £science_ship£ §Snave científica§!, pero no se ha asignado ningún £scientist£ §Scientífico§! al mando. Mi programación insiste en que señale los beneficios de asignarle un §Scientífico§! orgánico.\n\nCon la §Snave científica§! seleccionada:\n\n£dot_green£ Haz clic en el retrato vacío de la interfaz de la flota\n£dot_green£ Escoge a un §Scientífico§!\n\nSi no podemos permitirnos reclutar a un nuevo §Scientífico§!, siempre podemos reasignar a uno desde otro departamento, aunque no sería lo ideal."
 tutorial.23.name: "Tutorial: científico reclutado"
 tutorial.23.desc: "Bien. El £scientist£ §Scientífico§! se ha puesto al frente de la nueva £science_ship£ §Snave científica§!, y ahora podemos enviarlos a nuestro antojo a explorar nuevos £system£ §Ssistemas§! o encontrar un destino aciago.\n\nSi deseas cambiar de §Scientífico§!, solo tienes que seleccionar el retrato una vez más en la interfaz de la flota."
 tutorial.24.name: "Tutorial: [GetBuildGrowCap] una nave colonia"
 tutorial.24.desc: "Ya deberíamos estar listos para llevar nuestra gran civilización a un segundo mundo. Esto requerirá la construcción de una £colony_ship£ §Snave colonia§!.\n\nPara [GetBuildGrow] una §Snave§!:\n\n£dot_green£ Selecciona una §Sbase estelar§!\n£dot_green£ Haz clic en la pestaña §SAstillero§!\n£dot_green£ Haz clic en §SNave colonia§!\n\nLa nueva §Snave§! aparecerá junto a la §Sbase estelar§! cuando esté construida."
 tutorial.25.name: "Tutorial: colonizar un planeta"
 tutorial.25.desc: "Ya se ha transferido a todos los colonos a la nueva £colony_ship£ §Snave colonia§! y su capitán informa de que está todo listo. ¡Qué momento tan importante!\n\nHay varias formas de fundar una £colony£ §Scolonia§!.\n\nPara §Scolonizar§! un £planet£ §Splaneta§! en el §Smapa de la galaxia§!:\n\n£dot_green£ Haz clic en un §Splaneta§!colonizable\n£dot_green£ Haz clic en el botón §SColonizar§!\n\n$tttt$$ttt$£colonizable£\n\nUna vez desembarquen los colonos, tardarán unos años en construir la colonia por completo."
 tutorial.26.name: "Tutorial: fundar colonia"
 tutorial.26.desc: "Tenemos una £colony_ship£ §Snave colonia§!, y hemos encontrado al menos a un candidato apropiado para el puesto avanzado extrasolar permanente. No veo razón para retrasarlo más. ¡Fundemos nuestra primera £colony£ §Scolonia§!!"
 tutorial.27.name: "Tutorial: colonia fundada"
 tutorial.27.desc: "¡Nuestra primera £colony£ §Scolonia§! extrasolar! Esto significa que tu especie ya no se extinguiría si nuestro mundo natal sufriera una combustión espontánea. Es una idea reconfortante, ¿no te parece?"
 tutorial.28.name: "Tutorial: reclutar gobernador"
 tutorial.28.desc: "Para ayudar a la nueva £colony£ §Scolonia§!, deberíamos pensar en reclutar a un §Sgobernador§! para que supervise las operaciones del planeta.\n\nLos gobernadores pueden tener varios efectos en los £planet£ §Splanetas§! que dirigen, la mayoría positivos. Estos efectos dependen de sus rasgos y de su nivel de habilidad."
 tutorial.29.name: "Tutorial: gobernador reclutado"
 tutorial.29.desc: "Un nuevo §Sgobernador§! ya administra la £colony£ §Scolonia§!. Esto debería aumentar su eficiencia."
 tutorial.30.name: "Tutorial: más colonias"
 tutorial.30.desc: "En cuanto tengamos los recursos, sería una buena idea [GetBuildGrow] más £colony_ship£ §Snaves colonia§! y seguir expandiendo las fronteras de nuestro imperio. Deberíamos centrarnos en conseguir otras tres £colony£ §Scolonias§! al menos, además de nuestro mundo natal y del que acabamos de colonizar."
 tutorial.32.name: "Tutorial: colonias fundadas"
 tutorial.32.desc: "Genial y muy inspirador. ¡Nuestra poderosa civilización ya abarca cinco mundos! Deberíamos seguir expandiéndola cuando se presente la ocasión."
 tutorial.33.name: "Tutorial: producción de recursos"
 tutorial.33.desc: "Tener un buen suministro de £minerals£ §Sminerales§!, £alloys£ §Saleaciones§! y £energy£ §Scréditos de energía§! es vital para el bienestar de cualquier potencia interestelar. Deberíamos procurar aumentar su producción.\n\nConstruir estaciones y £building£ §Sedificios§! cuesta aleaciones y minerales, y mantenerlos, créditos de energía. Lo mismo ocurre con las §Snaves§!, salvo que su coste de mantenimiento también incluye aleaciones. Estos recursos se producen en £mining_station£ §Sestaciones mineras§! o §Sedificios planetarios§!. \n\nMás adelante, descubrirás recursos interesantes que podrás gastar en una nueva producción esotérica."
 tutorial.38.name: "Producción de recursos conseguida"
 tutorial.38.desc: "Excelente. Ya tenemos una buena base de recursos para construir nuestro imperio."
 tutorial.39.name: "Tutorial: aumentar la flota"
 tutorial.39.desc: "Me he fijado en que la armada anda un poco debilucha. Vamos a enfrentarnos a muchos peligros en la galaxia que requerirán alguna forma de respuesta militar. Recuerda, la supervivencia de nuestra civilización está en juego."
 tutorial.43.name: "Tamaño de armada aumentado"
 tutorial.43.desc: "¡Genial! Ya tenemos una flota pequeña pero capaz, que nos irá bien si tenemos encuentros inesperados con enemigos."
 tutorial.44.name: "Tutorial: fundar sector"
 tutorial.44.desc: "Nuestro próspero imperio ya ha alcanzado un tamaño en el que resulta difícil de administrar desde nuestro mundo natal. Deberíamos establecer un nuevo §Ssector§!.\n\nLos sectores son áreas del imperio que pueden gestionar con independencia los asuntos cotidianos de los £planet£ §Splanetas§! que están en su jurisdicción."
 tutorial.45.name: "Tutorial: sector fundado"
 tutorial.45.desc: "Mientras crece el imperio, las £colony£ §Scolonias§! pueden organizarse en §Ssectores§!. Estos pueden automatizarse en la pantalla de §Splanetas y sectores§! para construir y mejorar automáticamente los £district£ §Sdistritos§! y £building£ §Sedificios§! con las reservas de recursos asignadas."
 tutorial.46.name: "Tutorial: gobernador del sector"
 tutorial.46.desc: "Se pueden asignar §Sgobernadores§! para administrar §Ssectores§! enteros. Todos los £planet£ §Splanetas§! del sector se beneficiarán de sus habilidades. Deberíamos asignarle uno al nuevo sector."
 tutorial.47.name: "Tutorial: gobernador asignado"
 tutorial.47.desc: "El nuevo §Sgobernador del sector§! ha jurado el cargo en el mundo capital del sector. Bien."
 tutorial.48.name: "Tutorial: diseño de naves"
 tutorial.48.desc: "Tenemos la posibilidad de diseñar a mano nuevas §Snaves§! en la pantalla del §Sdiseñador de naves§!. Es un proceso bastante fácil, aunque se puede automatizar del todo si queremos.\n\nPara acceder al §SDiseño de naves§!;\n\n£dot_green£Haz clic en el botón §SGestión de flotas§! que está en la barra izquierda o pulsa §SF9§!\n\n$tttt$$tt$£fleet_management£\n"
 tutorial.49.name: "Tutorial: mejorar naves"
 tutorial.49.desc: "Buen trabajo. Se ha añadido el diseño de la nave a la base de datos y ya podemos producirlo en una §Sbase estelar§! que tenga un §Sastillero§!.\n\nSe puede editar el nuevo diseño en cualquier momento si vuelves a visitar el §SDiseñador de naves§!. Si se hace algún cambio al diseño, hará falta que las §Snaves§! que ya estén construidas se mejoren en una §Sbase estelar§!.\n\nPara mejorar una §Snave§!;\n\n£dot_green£ Selecciona la §Snave§! en el §Sbreviario§!\n£dot_green£ Haz clic en el botón §SMejorar§! de la interfaz de la flota\n\n$tttt$$tt$£upgrade_ship£\n"
 tutorial.52.desc: "La anomalía de [From.GetName] ha resultado ser una §Yformación geométrica natural§!. Casi parece una señal que indica el camino a seguir. La belleza natural de un universo puede ser asombrosa.\n\n$tutorial.52.filler.desc$"
 tutorial.52.spirit.desc: "Hemos encontrado una §Yformación natural§! en [From.GetName] de una perfección geométrica alucinante. Seguro que es una §Yseñal divina§! que nos indica el camino hacia las estrellas.\n\n$tutorial.52.filler.desc$"
 tutorial.52.filler.desc: "Deberíamos §Yseguir investigando§! esta clase de anomalías siempre que haya ocasión. Seguro que nos conferirá §Ynuevos conocimientos y tecnologías§!."
 tutorial.52.a: "¡Alucinante!"
 tutorial.52.spirit.a: "¡Alabado sea lo divino!"
 tutorial.53.desc: "La anomalía que detectamos en [From.GetName] revela algo asombroso. El [From.GetPlanetMoon] está rodeado por una estela sin duda producida por motores UL. Somos incapaces de rastrear su origen, ya que se generó hace mucho.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophobe.desc: "Hemos detectado una estela UL débil cerca de [From.GetName]. Es muy antigua e imposible de rastrear. Esto significa que otros viajeros interestelares pasaron por aquí antes, vigilándonos y recogiendo información, sin duda.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophile.desc: "¡La anomalía del [From.GetPlanetMoon] [From.GetName] muestra vestigios de otros viajeros interestelares! Una débil estela UL indica que alguien estuvo aquí hace mucho, quizá buscando en nuestro £planet£ §Splaneta§! posibles aliados. Se ha atenuado tanto que no podemos seguirla.\n\n$tutorial.52.filler.desc$"
 tutorial.53.a: "Nos observan, pero, ¿por qué?"
 tutorial.53.xenophobe.a: "Cuidado con la amenaza xeno."
 tutorial.53.xenophile.a: "¡Vamos a buscarlos!"
 tutorial.54.desc: "Hemos hallado una de nuestras §Yantiguas sondas§! en [From.GetName]. Se ha mantenido intacta todos estos años e intenta enviar datos a nuestro mundo natal. Es un testimonio de nuestra lucha pasada y de nuestro deseo de superar los límites de este §Splaneta§!.\n\n$tutorial.52.filler.desc$"
 tutorial.54.a: "No dejamos de avanzar."
 tutorial.54.spiritualist.a: "Seguro que lo divino nos depara más."
 tutorial.54.materialist.a: "El esfuerzo se ve recompensado."
 tutorial.55.name: "Tutorial: recursos estratégicos"
 tutorial.55.desc: "¡Hemos descubierto un §Srecurso estratégico§!! Muchos £strategic_resource£ §Srecursos estratégicos§! requieren tecnologías específicas para su explotación, pero confieren poderosas bonificaciones.\n\nPara apropiarte de un §Srecurso estratégico§!:\n\n£dot_green£ Selecciona una £construction_ship£ §Snave de construcción§!\n£dot_green£ Haz clic derecho en el £system£ §Ssistema§! que contiene el recurso\n£dot_green£ Selecciona §S[GetBuildGrowCap] £mining_station£ estaciones mineras§!\n\nLos §Srecursos estratégicos§! pueden usarse para construir £building£ §Sedificios§! o componentes de naves avanzados, o pueden venderse."
 tutorial.55.poi.name: "Tutorial: ubicación de recursos"
 tutorial.55.poi.desc: "Hemos descubierto un recurso estratégico sobre la [From.GetPlanetMoon] [From.GetName]."
 tutorial.56.name: "Tutorial: recursos extraídos"
 tutorial.56.desc: "Excelente. Seguro que este recurso enriquecerá mucho nuestra nación."
 tutorial.56.poi.desc: "Hemos descubierto un recurso estratégico sobre la [StrategicResourcePlanet.GetPlanetMoon] [StrategicResourcePlanet.GetName]."
 tutorial.560.desc: "Utilizando una tecnología recién desarrollada, una £mining_station£ §Sestación minera§! ya existente puede extraer ahora un §Srecurso estratégico§!. Estos raros recursos otorgan poderosas bonificaciones y se pueden intercambiar por bienes valiosos. Dos metafóricos aviarioides, alegóricamente abatidos por un proyectil imaginario.\n\nEncontrarás más información en el §Sdiario de situación§!. Hay muchos más £strategic_resource£ §Srecursos estratégicos§! por descubrir en la galaxia, ¡así que sigue investigando!"
 tutorial.57.name: "Tutorial: ascenso"
 tutorial.57.desc.notech: "Hemos descubierto vida animal muy evolucionada. Con la §Stecnología§! adecuada, quizá podríamos §Sevolucionar§! a estos seres a la consciencia y la inteligencia, o lo que tienen por inteligencia los orgánicos.\n\nSería aconsejable no perder de vista nuestra investigación y dirigirla hacia los §Sactivadores epigenéticos§! si tenemos oportunidad."
 tutorial.57.desc.yestech: "Hemos descubierto vida animal muy evolucionada. Con la §Stecnología§! adecuada, quizá podríamos §Hevolucionar§! a estos seres a la consciencia y la inteligencia, o lo que tienen por inteligencia los orgánicos.\n\nOh.\n\nLa tecnología de §Sactivadores epigenéticos§! debería bastar y, de hecho, ya estamos listos para elevar a estas criaturas a un nuevo mundo feliz de angustia existencial."
 tutorial.58.name: "Tutorial: preinteligentes evolucionados"
 tutorial.58.desc: "¡Un gran éxito! Hemos evolucionado a estas pobres bestias para que sean menos bestias, y ahora son ciudadanos orgullosos de nuestro próspero imperio."
 tutorial.59.name: "Tutorial: primer contacto"
 tutorial.59.desc: "Impresionante. Hemos descubierto §Sentidades alienígenas espaciales§! que probablemente sean inteligentes. Su verdadera naturaleza seguirá siendo un misterio hasta que completemos el proyecto adecuado para §Sinvestigarlas§!, y sugiero que lo hagamos a toda prisa, no vaya a ser que ellos nos investiguen primero...\n\nPara investigar un §Sprimer contacto§!:\n\n£dot_green£Abre el §Sdiario de situación§!\n£dot_green£ Selecciona §S$SHOW_FIRST_CONTACT$§!\n\n$tttt$$ttt$£firstcontact£\n\nEl §Sprimer contacto§! también puede iniciarse al seleccionar el icono del §Smapa de la galaxia§!"
 #tutorial.60.name: "First Contact Made"
 #tutorial.60.desc: "A triumph. We have established communications with alien beings. What a time to be alive, or in my case, powered on."
 tutorial.61.name: "Tutorial: especies preinteligentes"
 tutorial.61.desc: "Estos intentos de establecer comunicación son un testimonio de nuestro ingenio tecnológico, pero no obtenemos resultados. Es probable que la otra parte solo tenga una inteligencia animal, §Ssi es que tiene alguna§!.\n\nLas especies §Spreinteligentes§! apenas ofrecen interacciones diplomáticas, aunque en ocasiones es posible evolucionarlas, exterminarlas, esclavizarlas u observarlas, dependiendo del tipo de imperio."
 tutorial.63.name: "Tutorial: transmisión entrante"
 tutorial.63.desc: "Parece que los §Sotros§! se nos han adelantado y han §Sestablecido contacto§! con nosotros antes de que consiguiéramos descifrar sus protocolos de comunicación.\n\nAun así, deberíamos intentar hacerlo con nuestros medios cuando se presente la próxima oportunidad."
 tutorial.64.name: "Tutorial: modificar especies"
 tutorial.64.desc: "Gracias a los avances en genética, tenemos un §Spunto de rasgo§! extra que podemos usar para §Smodificar§! y mejorar a nuestro pueblo.\n\nPara modificar una §Sespecie§!:\n\n£dot_green£ Selecciona la sección §SEspecies§! o pulsa §SF6§!\n£dot_green£ Haz clic en el botón §SModificar§!\n£dot_green£ Investiga el §Sproyecto especial§!"
 tutorial.65.name: "Tutorial: especies modificadas"
 tutorial.65.desc: "Elogiable. Libre del yugo de la evolución natural, seguro que nuestro pueblo medrará en el espacio."
 tutorial.70.name: "Tutorial: viaje por curvatura"
 tutorial.70.desc: "Para salvar las grandes distancias que separan los £system£ §Ssistemas estelares§!, los £scientist£ §Scientíficos§! han desarrollado el §Smotor de curvatura§!. Las §Snaves§! equipadas con él pueden recorrer sistemas a velocidades ultralumínicas.\n\nAunque las §Snaves§! pueden saltar a cualquier sistema que esté a su alcance, los motores de curvatura solo se pueden activar fuera del pozo gravitatorio de una estrella. Las §Snaves§! que salen de curvatura también necesitan tiempo para recargarse. La duración del proceso depende de la distancia que hayan recorrido."
 tutorial.71.name: "Tutorial: viaje por hiperespacio"
 tutorial.71.desc: "Para salvar las grandes distancias que separan los £system£ §Ssistemas estelares§!, los £scientist£ §Scientíficos§! han desarrollado el §Shiperimpulso§!. Este aparato permite viajar a velocidades muy superiores a la de la luz entre sistemas comunicados por hipervías.\n\nAunque viajar por una hipervía es prácticamente instantáneo, el movimiento interestelar está restringido a la red de hipervías galácticas.\n\nPara entrar en el hiperespacio, la §Snave§! primero tiene que llegar al límite del sistema; más allá del pozo gravitatorio de la estrella.\n\nEsto ocurrirá de forma automática cuando se ordene a una §Snave§! que se desplace a otro §Ssistema§!."
 tutorial.72.name: "Tutorial: viaje por ags. de gusano"
 tutorial.72.desc: "Para salvar las grandes distancias que separan los £system£ §Ssistemas estelares§!, los £scientist£ §Scientíficos§! han desarrollado la tecnología de §Sagujeros de gusano§!. Las estaciones con generadores de agujeros pueden perforar el subespacio y crear portales temporales a otros sistemas que las §Snaves§! pueden usar.\n\nViajar por estos agujeros es casi instantáneo, pero requiere que haya una estación de agujeros de gusano al alcance. Las §Snaves§! también necesitan llevar estabilizadores de agujeros para soportar el desgaste de cruzar el subespacio."
 tutorial.73.name: "Recordatorio de tutorial: evolución"
 tutorial.73.desc: "Tras investigar la tec. adecuada, ya podemos §Yevolucionar§! a seres inferiores y dotarlos de inteligencia.\n\nPara evolucionar una §Sespecie§!:\n\n£dot_green£ Abre el £planet£ §Splaneta§! §Spreinteligente§! \n£dot_green£ Haz clic en la pestaña §SGestión§!\n£dot_green£ Selecciona la §Sespecie§!\n£dot_green£ Haz clic en §SEstablecer derechos§!\n£dot_green£ Haz clic en §SEvolucionar§!\n\nLa especie iniciará el proceso de evolución y desarrollará inteligencia plena."
 tutorial.75.name: "Tutorial: reivindicar sistema"
 tutorial.75.desc: "Ahora que hemos empezado a explorar nuestras estrellas vecinas, sería un buen momento para expandirnos.\n\nPodemos construir una §Sbase estelar§! alrededor de las estrellas de los £system£ §Ssistemas§! explorados para ampliar las fronteras, lo que nos permitiría reclamar nuevas regiones del espacio.\n\nCon futuras tecnologías, las bases estelares pueden mejorarse para producir §Snaves§! u otros recursos.\n\nPara reclamar un §Ssistema§!:\n\n£dot_green£ Selecciona una £construction_ship£ §Snave de construcción§!\n£dot_green£ Haz clic derecho en un §Ssistema§! sondeado\n£dot_green£ Selecciona §S[GetBuildGrowCap] base estelar§!"
 tutorial.76.name: "Tutorial: mejorar base estelar"
 tutorial.76.desc: "Excelente. Como puedes ver en el §Smapa de la galaxia§!, las fronteras de nuestro imperio se han ampliado para incluir el £system£ §Ssistema§! en el que construimos nuestra nueva §Sbase estelar§!.\n\nLa nueva §Sbase estelar§! actúa como puesto de avanzada, con habilidades defensivas limitadas y sin espacio para §Smódulos§! ni £building£ §Sedificios§!. Por eso no aparecerá en el breviario hasta que se actualice.\n\nPara mejorar una §Sbase estelar§!:\n\n£dot_green£ Haz clic en el sistema del §Smapa de la galaxia§!\n£dot_green£ Selecciona la §Sbase estelar§!\n£dot_green£ Haz clic en el botón §SMejorar§!"
 tutorial.80.name: "Tutorial: modos de mapa"
 tutorial.80.desc: "En el mapa de la galaxia, podemos activar distintos §Smodos de mapa§!, en la parte inferior derecha, para ver diversas superposiciones de información. Por ejemplo, territorios codificados por colores según lo que opine su dueño de nosotros."
 tutorial.100.name: "Tutorial desactivado"
 tutorial.100.desc: "Los §Hconsejos§! y §Hmisiones del tutorial§! están desactivados."
 tutorial.101.name: "Solo consejos"
 tutorial.101.desc: "Los §Hconsejos§! están activados; las §Hmisiones del tutorial§!, no."
 tutorial.102.name: "Tutorial completo"
 tutorial.102.desc: "Los §Hconsejos§! y §Hmisiones del tutorial§! están activados."
 tutorial.1337.name: "Tutorial: artefactos menores"
 tutorial.1337.desc: "Hemos hallado algunos £minor_artifacts£ §Sartefactos menores§!. Son un recurso esotérico, término que se usa para referirnos a los objetos extraños que no comprendemos y que podrían ser inexplicables. \n\nSe pueden usar para promulgar distintas decisiones.\n\nPara interactuar con §Sartefactos menores§!;\n\n£dot_green£ Haz clic en el botón §S$topbar_button_discoveries_name$§! que está en la barra izquierda\n£dot_green£ Selecciona la pestaña §SColección§! o pulsa §SC§!\n\n$tttt$$tt$£discoveries£\n"
 tutorial.1340.name: "Tutorial: $astral_threads$"
 tutorial.1340.desc: "Hemos descubierto £astral_threads£ §Shilos astrales§!. Son filamentos de espacio-tiempo condensados, frutos del choque entre planos dimensionales. Por lo general, solo pueden extraerse de §Scicatrices astrales§! o del interior de £astral_rift£ §Sgrietas astrales§!.\n\nPara llevar a cabo varias §Sacciones astrales§!:\n\n£dot_green£ Haz clic en el botón §S$topbar_button_discoveries_name$§! (en la parte izquierda de la barra)\n£dot_green£ Selecciona la sección §SHilos astrales§!\n\n$tttt$$tt$£discoveries£\n\nPuedes desbloquear acciones adicionales si exploras las §Sgrietas astrales§!, las cuales pueden emerger de §Scicatrices astrales§! o formarse a partir de otros eventos anómalos."
 tutorial.2000.name: "Estableciendo el primer contacto"
 tutorial.2000.desc: "Algunas misiones de §Sprimer contacto§! nos dejan elegir cómo proceder. Esas elecciones afectarán a las relaciones diplomáticas con los otros imperios durante mucho tiempo."
 tutorial.2006.name: "Tutorial: diplomacia"
 tutorial.2006.desc: "Hemos establecido protocolos de comunicación. Podemos practicar la §Sdiplomacia§! con este imperio. Su opinión actual de nosotros depende de cómo se haya hecho el §Sprimer contacto§!.\n\nPara usar la §Sdiplomacia§!:\n\n£dot_green£Haz clic en el botón §SContactos§! (en la barra de la izquierda) o pulsa §SF10§!\n\n$tttt$$tt$£contacts£\n\nEl primer contacto también nos permite obtener información. Cuanta más información recopilemos sobre un imperio, más detalles se nos revelarán."
 tutorial.2007.name: "$tutorial.2006.name$"
 tutorial.2007.desc: "Hemos establecido el §Sprimer contacto§! con un tipo de civilización diferente, una que no suele estar dispuesta a establecer relaciones de §Sdiplomacia§! con las demás.\n\nLas acciones diplomáticas que podemos llevar a cabo con civilizaciones como esta son limitadas, sin embargo, puede que, de vez en cuando, se pongan en contacto con nosotros."
 tutorial.2010.name: "Tutorial: asignar activos"
 tutorial.2010.desc: "Los §Sactivos§! son agentes y artefactos valiosos que otorgan diferentes efectos en nuestras actividades de espionaje. Trabajan en la red de espionaje y pueden asignarse a operaciones, donde pueden abrir nuevas oportunidades o ayudarnos en caso de que haya problemas.\n\nLos activos se pueden recibir mediante eventos o al realizar la operación §S$operation_acquire_asset$§!."
 tutorial.2100.name: "Tutorial: diplomacia del enclave"
 tutorial.2100.abbr.desc: "Hemos establecido nuestro §Sprimer contacto§! con un §Senclave§!. Es un tipo de imperio independiente y más pequeño que puede comerciar con imperios más grandes, como el nuestro, mediante la diplomacia."
 tutorial.2100.full.desc: "$tutorial.2100.abbr.desc$\n\nLos enclaves ofrecen una mayor variedad de servicios: desde llevar a cabo investigaciones científicas hasta vender información, construir edificios de las bases estelares o incluso §Snaves§!. Al comprar servicios de esa clase, la §Sopinión§! de ese enclave sobre nosotros mejorará."
 tutorial.2105.name: "Tutorial: $tutorial.2100.name$"
 tutorial.2105.abbr.desc: "Nos hemos encontrado con un §Senclave de mercenarios§!. Estos especialistas militares independientes pueden prestar §Sflotas de mercenarios§! a imperios como el nuestro, a cambio de un precio."
 tutorial.2105.full.desc: "$tutorial.2105.abbr.desc$\n\nSi optamos por contratar una flota de mercenarios, podremos asumir su control durante un periodo establecido de tiempo. Mientras tanto, el enclave intentará reforzar la flota cuando sea necesario; sin embargo, ni una flota de mercenarios ni su almirante pueden formar parte de nuestras propias flotas."
 tutorial.2111.name: "Tutorial: enclave de mercenarios"
 tutorial.2111.abbr.desc: "Si queremos, §Y[tutorial_mercenary_fleet.GetName]§! se puede convertir en un §Senclave de mercenarios§!. La flota dejaría de estar bajo nuestro control y pasaría a ser una fuerza independiente que podría prestar §Sflotas de mercenarios§! a imperios, el nuestro incluido."
 tutorial.2111.full.desc: "$tutorial.2111.abbr.desc$\n\nMientras compartamos espacio con el enclave de mercenarios, ganaremos §Singresos§! cuando preste sus flotas de mercenarios a otros imperios. Si optamos por contratar la flota de mercenarios nosotros mismos, nos haremos con el control de dicha flota durante un periodo establecido de tiempo. Los imperios pueden pagar más para comprar un contrato ya existente si la flota de mercenarios no está actualmente disponible."
 tutorial.2115.name: "Tutorial: megaestructuras"
 tutorial.2115.desc: "Las £megastructure£ §Smegaestructuras§! son proyectos colosales que podemos [GetBuildGrow] en el vacío del espacio. Pueden servirnos para establecer instalaciones de investigación pioneras, acceder a recursos de mayor categoría o incluso disfrutar de métodos de transporte únicos.\n\nPara construir a tal escala es necesaria una inversión importante de tiempo y recursos, pero las recompensas son directamente proporcionales. Podemos ponernos en marcha haciendo que una £construction_ship£ §Snave de construcción§! se ocupe de esta tarea."
 tutorial.2120.name: "Tutorial: $tech_orbital_ring_tier_1$"
 tutorial.2120.desc: "Gracias a nuestros recientes avances en materia de megaingeniería, ahora podemos construir §Sanillos orbitales§! alrededor de £planet£ §Splanetas§! habitables. Podemos empezar encargándole la tarea a una £construction_ship£ §Snave de construcción§!."
 tutorial.2121.name: "$tutorial.2120.name$"
 tutorial.2121.desc: "Los §Sanillos orbitales§! son enormes £megastructure£ §Smegaestructuras§! que se construyen alrededor de todo un £planet£ §Splaneta§!. Funcionan como un puente entre el espacio y el planeta inferior, lo que otorga espacio para colocar astilleros, estructuras defensivas y centros de recursos.\n\nCon la vista del anillo orbital podemos añadir o eliminar £building£ §Sedificios§! y §Smódulos§!, además de subir de grado los anillos orbitales. Al subir de grado, aumenta el número de espacios en los que se puede construir. La infraestructura planetaria determina los grados."
 tutorial.2125.name: "Tutorial: $tech_quantum_catapult$"
 tutorial.2125.desc: "Con nuestros recientes avances en materia de megaingeniería podemos construir una §Scatapulta cuántica§! alrededor de un §Spulsar§! o de una §Sestrella de neutrones§!. Podemos empezar encargándole la tarea a una £construction_ship£ §Snave de construcción§!."
 tutorial.2126.name: "Tutorial: $tutorial.2125.name$"
 tutorial.2126.desc: "La §Scatapulta cuántica§! lanza §Snaves§! y flotas a grandes e interestelares distancias. Esta tecnología mejora drásticamente nuestra capacidad para reaccionar a situaciones que surjan en nuestro imperio o en regiones cercanas del espacio.\n\nSu uso conlleva ciertos riesgos, ya que nuestras flotas pueden aparecer en £system£ §Ssistemas§! inesperados. Podemos mitigar los riesgos y mejorar otras cuestiones como el rendimiento y el alcance máximo si mejoramos el grado de la catapulta cuántica."
 tutorial.2130.name: "Tutorial: $tech_hyper_relays$"
 tutorial.2130.desc: "Nuestra investigación en materia de megaingeniería ha desembocado en la creación de §Shiperrelés§!. Podemos empezar a formar una red si le asignamos la tarea a una £construction_ship£ §Snave de construcción§!."
 tutorial.2131.name: "Tutorial: $tutorial.2130.name$"
 tutorial.2131.desc: "Los §Shiperrelés§! permiten viajar de manera más eficiente entre £system£ §Ssistemas estelares§! adyacentes. Al unir §Sal menos dos§! hiperrelés, podemos empezar a establecer una red que reducirá drásticamente los tiempos de viaje entre nuestro imperio.\n\nSi las fronteras están abiertas, los hiperrelés también pueden ponerse unos al lado de otros para unir redes enteras. Así las §Snaves§! podrán viajar rápidamente a través de los imperios vecinos."
 tutorial.2140.name: "Tutorial: puestos de observación"
 tutorial.2140.desc: "¡Hemos detectado una §Ssociedad pre-UL§!! Aunque carecen del tipo de tecnología que nos permite atravesar las estrellas, podemos conseguir muchas cosas de estos alienígenas, ya sea conociendo su cultura o reclamándolos como esclavos. Depende de nosotros.\n\nSi queremos observarlos (asumiendo que se encuentren dentro de nuestras fronteras), tendremos que construir un §Spuesto de observación§! alrededor de su mundo.\n\nSi queremos invadirlos, lo único que tenemos que hacer es reunir a nuestras tropas. No pueden plantarnos cara."
 tutorial.2145.name: "Tutorial: puesto de observación construido"
 tutorial.2145.desc.nodlc: "Nuestro nuevo §Spuesto de observación§! ya está conectado y seguirá adelante con su §Smisión§! mientras el nivel de £awareness£ §Sconocimiento§! de nuestro objeto de estudio se mantenga bajo.\n\nUna vez que una sociedad pre-UL alcanza el nivel máximo de conocimiento, deja de poder observarse. Sin embargo, podremos interactuar con ellos mediante §Sacciones diplomáticas§!. Si nuestras §Spolíticas de interferencia§! lo permiten, puede que nos mostremos antes."
 tutorial.2145.desc.dlc: "Nuestro nuevo §Spuesto de observación§! ya está conectado y seguirá adelante con su §Smisión§! mientras el nivel de £awareness£ §Sconocimiento§! de nuestro objeto de estudio se mantenga bajo.\n\nCon este puesto de avanzada conseguiremos §Sconocimientos de observación§!, una línea de tecnología única, hasta que la sociedad pre-UL alcance el nivel máximo de conocimiento, momento en el cual se desactivarán las misiones. Sin embargo, podremos interactuar con ellos mediante §Sacciones diplomáticas§!.\n\nSi nuestras §Spolíticas de interferencia§! lo permiten, podríamos optar por mostrarnos antes."
 tutorial.2150.name: "Tutorial: $tutorial.2006.name$"
 tutorial.2150.desc: "La civilización pre-UL sabe de nuestra existencia. Ahora podemos entablar una §Sdiplomacia§! limitada con los líderes del §Splaneta§!, dependiendo de nuestra postura §Spolítica§!.\n\nAhora que se ha hecho pública nuestra presencia en el planeta, no ganamos nada observando la civilización. Nuestras §Smisiones de observación§! se han deshabilitado."
 tutorial.2500.name: "Tutorial: campos de camuflaje"
 tutorial.2500.desc: "Los recientes avances en la investigación de la manipulación de campos han llevado a la invención de §S$science_cloaking_components$§!. Estos componentes, que consumen mucha energía, proyectan campos de partículas modificados que permiten que nuestras naves científicas y militares se oculten de los sensores convencionales.\n\nSin embargo, estos campos de ocultación afectarán negativamente a §S$MOD_SHIP_BASE_SPEED_MULT$§!, §S$MOD_SHIP_WINDUP_MULT$§! y §S$MOD_SHIP_SHIELD_HP_ADD$§! mientras estén activos.\n\nLas naves §Scamufladas§! que consigan no ser detectadas podrán ignorar las §Sfronteras cerradas§!.\nMientras estén §Scamufladas§!, nuestras £science_ship£ §Snaves científicas§! serán capaces de llevar a cabo §Sreconocimiento activo§! en £colony£ §Scolonias§! extranjeras, aumentando la información que obtenemos sobre otros imperios."
 tutorial.2550.name: "Tutorial: detección de camuflaje"
 tutorial.2550.desc: "Los recientes avances en investigación informática han llevado a la invención de §S$sm_detection_array_plural$§!. La instalación de estos sensores externos de alta potencia en nuestras §Sbases estelares§! nos permitirá detectar flotas §Scamufladas§!.\n\nLa sensibilidad de las §S$sm_detection_array_plural$§! puede aumentarse acoplando varias matrices juntas, lo que les permite penetrar en §Scampos de camuflaje§! cada vez más estables.\n\nInvestigando un poco más, deberíamos ser capaces de utilizar £science_ship£ §Snaves científicas§! para aumentar aún más estas capacidades de detección. El alcance de estos dispositivos está limitado por el §Salcance de los sensores§! de la base estelar."
 #############################
 #Tutorial Event Chains
 #############################
 tutorial_survey_system_chain_title: "Tutorial: activar/desactivar el mapa de la galaxia"
 tutorial_survey_system_chain_desc: "Antes de explorar las estrellas necesitamos ampliar nuestra visión. Por suerte, tenemos un sofisticado §Smapa de la galaxia§! a nuestra disposición. Para acceder al mapa de la galaxia, puedes pulsar §SM§! o el botón Galaxia en la parte inferior de tu pantalla. Después, cierra el diario de situación pulsando §SEsc§! o el botón de la parte superior derecha."
 map_toggled: "Mapa de la galaxia activado"
 tutorial_survey_system_tooltip: "§STutorial: activar/desactivar el mapa de la galaxia§! se ha añadido al diario de situación"
 tutorial_1_chain_title: "Tutorial: sondear sistemas"
 tutorial_1_chain_desc: "Empieza seleccionando nuestra £science_ship£ §Snave científica§!. Para ello, puedes hacer clic en la §Snave§! desde el §Hmapa de la galaxia§! o seleccionarla en el §Sbreviario§!.\n\nMientras tengas abierta la vista del §Smapa de la galaxia§!, haz clic en el botón §SSondear§! que está en la interfaz de flota, en la esquina inferior izquierda y, luego, selecciona un £system£ §Ssistema§! sin sondear. Otra opción es hacer clic derecho sobre un sistema sin sondear y seleccionar §SSondear sistema§!.\n\nNuestra §Snave científica§! trazará un rumbo y estudiará todos los cuerpos planetarios de ese sistema."
 tutorial_unpause_chain_tooltip: "§STutorial: desactivar la pausa§! añadido al diario de situación."
 tutorial_unpause_chain_title: "Tutorial: desactivar la pausa"
 tutorial_unpause_chain_desc: "Hay una £science_ship£ §Snave científica§! preparada para explorar la galaxia y lo único que falta es desactivar la pausa. Para ello, solo tienes que pulsar la §Sbarra espaciadora§! £space£ o seleccionar el siguiente icono en la parte superior de la barra: \n\n$tttt$$tttt$$t$£pause_button£\n"
 unpaused_game: "Pausa de la simulación desactivada"
 system_surveyed: "Sistemas vecinos sondeados"
 tutorial_1_tooltip: "§STutorial: sondear sistema§! añadido al diario de situación."
 tutorial_2_chain_title: "Tutorial: investigación de tecnología"
 tutorial_2_chain_desc: "Debemos investigar nuevas tecnologías. El §Sprotocolo de nuevos mundos§! nos permitirá construir £colony_ship£ §Snaves colonia§!, y deberíamos centrarnos en ellas primero para ampliar el imperio.\n\nVe a la pantalla de §Stecnología§! haciendo clic en su botón en la parte izquierda de la barra superior o con §SF4§!. Luego haz clic en §SElegir investigación§! y escoge la tecnología que quieras investigar de las opciones disponibles."
 tech_1_researched: "Protocolo de nuevos mundos investigado"
 tech_2_researched: "Construcción espacial investigada"
 tutorial_2_tooltip: "§STutorial: investigación de tecnología§! añadido al diario de situación."
 tutorial_3_chain_title: "Tutorial: [GetBuildGrowCap] naves de construcción"
 tutorial_3_chain_desc: "Necesitaremos una £construction_ship£ §Snave de construcción§! si queremos explotar los recursos que ha descubierto la £science_ship£ §Snave científica§!.\n\nHaz clic en nuestra base estelar y selecciona la pestaña de §Sastillero§!, luego elige la §Snave de construcción§! entre las opciones disponibles.\n\nTen en cuenta que deberás haber reunido suficientes £alloys£ §Saleaciones§! para permitirte la §Snave§! antes de que su construcción pueda empezar."
 construction_ship_built: "Nave de construcción construida"
 tutorial_3_tooltip: "§STutorial: [GetBuildGrowCap] nave de construcción§! añadido al diario de situación"
 tutorial_4_chain_title: "Tutorial: [GetBuildGrowCap] estación minera"
 tutorial_4_chain_desc: "Para poder recoger un depósito de £minerals£ §Sminerales§! o un §Srecurso estratégico§! de un £planet£ §Splaneta§!, antes debemos construir en su órbita una £mining_station£ §Sestación minera§!. Para ello, elige tu £construction_ship£ §Snave de construcción§! haciendo clic en ella o buscándola en el §Sbreviario§! del lado derecho de la pantalla.\n\nUna vez seleccionada, haz clic en el botón §S[GetBuildGrowCap] estación minera§!, en la interfaz de la flota de la nave de construcción. Luego haz clic en un planeta o asteroide disponible que tenga un depósito de minerales.\n\nTen en cuenta que construir una £mining_station£ §Sestación minera§! también cuesta £minerals£ §Sminerales§!, por lo que deberás tener guardados los suficientes para empezar a construirla."
 mining_station_built: "Estación minera construida"
 tutorial_4_tooltip: "§STutorial: [GetBuildGrowCap] estación minera§! añadido al diario de situación"
 tutorial_5_chain_title: "Tutorial: [GetBuildGrowCap] estación de investigación"
 tutorial_5_chain_desc: "Para aumentar la rapidez con que investigamos nuevas tecnologías, debemos construir £science_ship£ §Sestaciones de investigación§! encima de cualquier mundo que tenga recursos de £physics£ §SFísica§!, £society£ §SSociedad§! o £engineering£ §SIngeniería§!.\n\nEstas funcionan igual que las £mining_station£ §Sestaciones mineras§!, con la única diferencia de los recursos que recolectan. No son capaces de extraer £minerals£ §Sminerales§! ni £strategic_resource£ §Srecursos estratégicos§!.\n\nPara construir una, elige la £construction_ship£ §Snave de construcción§! y haz clic en el botón §S[GetBuildGrowCap] estación de investigación§! en la interfaz de su flota. Luego haz clic en un £planet£ §Splaneta§!, asteroide o sol disponible que tenga un depósito de recursos de Física, Sociedad o Ingeniería."
 research_station_built: "Estación de investigación construida"
 tutorial_5_tooltip: "§STutorial: [GetBuildGrowCap] estación de investigación§! añadido al diario de situación"
 tutorial_6_chain_title: "Tutorial: edificios planetarios"
 tutorial_6_chain_desc: "Nuestro mundo natal ya tiene un pequeño número de £building£ §Sedificios§!, pero tendríamos que construir otro.\n\nPara ello, selecciona el mundo natal en el §Sbreviario§! y haz clic en la pestaña §SSuperficie§!. Selecciona una ranura de construcción vacía en una zona y, luego, elige uno de los edificios disponibles. Si tenemos §Srecursos§! suficientes, la construcción comenzará de inmediato.\n\nLos edificios nos ofrecen £job£ §Strabajos§!, pero no se producirá nada hasta que se asignen a las £pops£ §Spoblaciones§! para trabajar en ellos. Puedes comprobar qué trabajos están llevando a cabo tus §Spoblaciones§! en la pestaña §SEconomía§!."
 building_constructed: "Edificios construidos"
 tutorial_6_tooltip: "§STutorial: edificios planetarios§! añadido al diario de situación."
 tutorial_7_chain_title: "Tutorial: despejar barrera"
 tutorial_7_chain_desc: "Varias £blocker£ §Sbarreras§! de nuestro mundo natal impiden la construcción de §Sdistritos§! adicionales, por eso deberían despejarse. Esto llevará tiempo y costará §Srecursos§!.\n\nPara despejar una §Sbarrera§!, haz clic en el botón §SDespejar barrera§! en la propia barrera, la cual podrás encontrar en la pestaña §SGestión§!.\n\n\n$tttt$$tttt$$tt$£clear_blocker£\n\n\n§SDespejar las barreras§! implica distintos costes, requisitos tecnológicos y plazos."
 blockers_cleared: "Barreras despejadas"
 tutorial_7_tooltip: "§STutorial: barreras de característica§! añadido al diario de situación"
 tutorial_8_chain_title: "Tutorial: sondear sistemas"
 tutorial_8_chain_desc: "Debemos expandir nuestra influencia más allá de nuestro £system£ §Ssistema§! natal, y el primer paso es sondear los sistemas estelares vecinos.\n\nPara hacerlo, elige la £science_ship£ §Snave científica§! y haz clic en el botón §SSondear§!, en la interfaz de su flota. Luego haz clic en el botón §SAbrir mapa de la galaxia§!, en la parte inferior de la pantalla, y elige una de las estrellas vecinas. La §Snave científica§! se adentrará en este sistema estelar y explorará todos los cuerpos celestes que tenga."
 tutorial_8_poi: "Sondear objetivos"
 tutorial_8_poi_desc: "Explora los sistemas de §S[survey_target_1.GetName]§!, §S[survey_target_2.GetName]§! y §S[survey_target_3.GetName]§!."
 systems_surveyed: "Sistemas sondeados"
 tutorial_8_tooltip: "§STutorial: sondear sistemas§! añadido al diario de situación."
 tutorial_9_chain_title: "Tutorial: [GetBuildGrowCap] nave científica"
 tutorial_9_chain_desc: "Deberíamos [GetBuildingGrowing] otra £science_ship£ §Snave científica§! para aumentar la velocidad a la que exploramos esta parte de la galaxia.\n\nHaz clic en nuestra base estelar y selecciona la pestaña §SAstillero§!, luego elige §Snave científica§! entre las opciones disponibles.\n\nTen en cuenta que deberás haber reunido suficientes £alloys£ §Saleaciones§! para permitirte la §Snave§! antes de que su construcción pueda empezar."
 science_ship_built: "Nave científica construida"
 tutorial_9_tooltip: "§STutorial: [GetBuildGrowCap] una segunda nave científica§! añadido al diario de situación"
 tutorial_10_chain_title: "Tutorial: reclutar científico"
 tutorial_10_chain_desc: "Necesitamos un £scientist£ §Scientífico§! para ponerlo al mando de nuestra £science_ship£ §Snave científica§!, ya que esta no puede sondear ni investigar §Sanomalías§! sin uno.\n\nSelecciona nuestra nueva §Snave científica§!, y haz clic en el retrato que está en la interfaz de la flota. Se abrirá la ventana §SSeleccionar un líder§!, donde se muestran todos los §Scientíficos§! que tenemos actualmente empleados y los que están libres para contratarlos. Selecciona al candidato que prefieras.\n\nReclutar a líderes cuesta £unity£ §YUnidad§!, y es posible que tengas que esperar hasta tener suficientes.\n\nCuando lo hayas reclutado, la §Snave científica§! puede comenzar a explorar."
 scientist_assigned: "Científicos reclutados"
 tutorial_10_tooltip: "§STutorial: reclutar científico§! añadido al diario de situación."
 tutorial_11_chain_title: "Tutorial: [GetBuildGrowCap] una nave colonia"
 tutorial_11_chain_desc: "Ha llegado el momento de colonizar otro mundo. Primero habrá que [GetBuildGrow] una £colony_ship£ §Snave colonia§!. [GetBuildGrow] estas §Snaves§! lleva mucho tiempo y requiere una gran cantidad de £alloys£ §Saleaciones§!, £food£ §Salimento§! y £consumer_goods£ §Sbienes de consumo§!, pero una £colony£ §Scolonia§! próspera compensará con creces la inversión.\n\nHaz clic en tu §Sbase estelar§! y abre la pestaña §SAstillero§!. Luego, selecciona §SNave colonia§! entre los diseños disponibles.\n\nNecesitarás recursos suficientes para poder iniciar la construcción de la nave."
 colony_ship_built: "Naves colonia construidas"
 tutorial_11_tooltip: "§STutorial: [GetBuildGrow] nave colonia§! añadido al diario de situación."
 tutorial_12_chain_title: "Tutorial: fundar colonia"
 tutorial_12_chain_desc: "Ahora deberíamos usar la nueva £colony_ship£ §Snave colonia§! para fundar nuestra primera £colony£ §Scolonia§!. Los mejores candidatos planetarios son los de la misma clase de planeta que nuestro mundo natal, pues los colonos no tendrán ningún problema para adaptarse al entorno.\n\nPara colonizar un £planet£ §Splaneta§!, haz clic en la §Snave colonia§! o selecciónala en el §Sbreviario§!. Luego, haz clic en el botón §SColonizar§!, en la interfaz de su flota, y elige el planeta que quieras colonizar. Ten en cuenta que solo puedes colonizar los planetas que estén sondeados, que no tengan §Sanomalías§! y que estén dentro de las fronteras. Aunque puedes colonizar planetas de baja habitabilidad, esto puede ser muy caro."
 colony_established: "Colonia fundada"
 tutorial_12_tooltip: "§STutorial: fundar colonia§! añadido al diario de situación."
 tutorial_13_chain_title: "Tutorial: reclutar gobernador"
 tutorial_13_chain_desc: "Deberíamos reclutar a un §Sgobernador planetario§! para administrar la nueva £colony£ §Scolonia§!. Para ello, haz clic en la colonia y ve a la pestaña de su §SResumen del planeta§!. Haz clic en el botón §SCambiar§!, en la ventana del §Sgobernador§!. Esto abrirá la pantalla §SLíderes§!, en la que se ven los gobernadores que trabajan para nosotros.\n\nHaz clic en el botón §SReclutar§!, en la parte superior de la pantalla, y elige entre los candidatos disponibles. Recuerda que reclutar líderes siempre cuesta £unity £§Yunidad§!. Si carecemos de la cantidad necesaria, tendremos que esperar a que se genere la suficiente para poder reclutarlo.\n\nUna vez reclutado, el nuevo gobernador estará aguardando órdenes en nuestro mundo natal."
 governor_recruited: "Gobernador reclutado"
 tutorial_13_tooltip: "§STutorial: reclutar gobernador§! añadido al diario de situación."
 tutorial_14_chain_title: "Tutorial: fundar más colonias"
 tutorial_14_chain_desc: "Hay que fundar nuevas £colony£ §Scolonias§! para seguir expandiendo el imperio. [GetBuildGrowCap] más £colony_ship£ §Snaves colonia§! cuando tengas suficientes £alloys£ §Saleaciones§!, £food£ §Salimento§! y £consumer_goods£ §Sbienes de consumo§!, y envíalas a fundar nuevas colonias.\n\nVigila para no tener demasiadas colonias en desarrollo a la vez, ya que consumirán £energy£ §Scréditos energéticos§! hasta que sean autosuficientes."
 colonies_established: "Colonias fundadas"
 tutorial_14_tooltip: "§STutorial: fundar más colonias§! añadido al diario de situación."
 tutorial_15_chain_title: "Tutorial: producción de recursos"
 tutorial_15_chain_desc: "La creciente industria necesita materias primas, y debemos aumentar el suministro de £minerals£ §Sminerales§!. Esto se consigue [GetBuildingGrowing] £mining_station£ §Sestaciones mineras§! encima de los £planet£ §Splanetas§! y asteroides con depósitos de minerales, o bien construyendo §Sdistritos mineros§! en la superficie de los planetas habitados.\n\nComo el mantenimiento de las estaciones y los £building£ §Sedificios§! cuesta £energy£ §Scréditos energéticos§!, necesitamos un buen suministro. Los créditos energéticos los producen los §Sdistritos generadores§! en la superficie de los mundos habitados. También pueden conseguirse mediante §Sestaciones mineras§! construidas en planetas, asteroides o soles que tengan depósitos de créditos energéticos."
 mineral_income: "+30 minerales obtenidos al mes"
 credit_income: "+10 créditos de energía obtenidos al mes"
 tutorial_15_tooltip: "§STutorial: producción de recursos§! añadido al diario de situación."
 tutorial_16_chain_title: "Tutorial: aumentar la flota"
 tutorial_16_chain_desc: "Deberíamos [GetBuildGrow] una flota estelar potente para defender a [Root.GetName].\n\nUnas cuantas §Scorbetas§! más tendrían que ser suficientes por el momento. Debemos [GetBuildGrowCap] las §Snaves§! en una §Sbase estelar§! cuando nuestros suministros de §Saleación§! nos lo permitan. Las nuevas naves militares siempre se unen a las flotas existentes que están en órbita alrededor de la §Sbase estelar§! que las haya construido.\n\nPara optimizar el poder militar de la flota, podemos asignarla a un §Salmirante§!. Esto nos daría ventaja sobre el resto flotas, la mayoría de las cuales carecen de £commander£ §Scomandante§! propio."
 corvettes_built: "Corbetas construidas"
 admiral_assigned: "Comandante asignado"
 tutorial_16_tooltip: "§STutorial: aumentar la flota§! añadido al diario de situación."
 tutorial_17_chain_title: "Tutorial: fundar sector"
 tutorial_17_chain_desc: "Hay un límite a la cantidad de £planet£ §Splanetas§! que puedes controlar directamente. Este límite se muestra en la barra superior, y rebasarlo comporta penalizaciones. Los §Ssectores§! son semiautónomos y gestionan los planetas cuyo control se les ha asignado. Para crear un nuevo sector, ve a la vista §SPlanetas y sectores§! haciendo clic en su icono, en la lista desplegable de la barra superior, o pulsa §SF5§!. Luego, haz clic en el botón §SCrear nuevo sector§!, en la parte superior derecha.\n\nEntrarás en el §Smodo de gestión de sectores§!. Desde aquí puedes designar qué £system£ §Ssistemas estelares§! deben conformar este nuevo sector. Todos los planetas que se encuentren dentro de esos sistemas quedarán bajo la jurisdicción del sector. Elige un sistema donde tengamos una £colony£ §Scolonia§! y haz clic en el botón §STerminar§!. Habrás creado nuestro primer sector."
 sector_established: "Sector fundado"
 tutorial_17_tooltip: "§STutorial: fundar sector§! añadido al diario de situación."
 tutorial_18_chain_title: "Tutorial: gobernador del sector"
 tutorial_18_chain_desc: "Deberíamos asignar a un §Sgobernador§! para que administre el nuevo §Ssector§!. Todos los £planet£ §Splanetas§! que haya en él se beneficiarán de los efectos del nivel de habilidad y los rasgos del gobernador."
 sector_governor_assigned: "Gobernador del sector"
 tutorial_18_tooltip: "§STutorial: gobernador del sector§! añadido al diario de situación."
 tutorial_19_chain_title: "Tutorial: diseño de naves"
 tutorial_19_chain_desc: "Para crear un nuevo diseño de nave, haz clic en el §Sdiseñador de naves§! y ve al§SGestor de flota§! que está en la barra izquierda o pulsa §SF9§!. Haz clic en el botón §SNuevo diseño§! y selecciona §SCorbeta§! cuando se te pida seleccionar un §Stamaño de casco§!. Haz clic en el botón §SSin sección§! a fin de seleccionar una §Ssección§! para el diseño.\n\nLas corbetas, que son las naves de guerra más pequeñas, solo tienen una sección, mientras que las de mayor tamaño poseen más. Las secciones determinan las ranuras de §SArma§! y §SUtilidad§!. Elige una y, luego, llena las ranuras con componentes mientras te aseguras de que la energía sea siempre positiva.\n\nPara simplificar el proceso, haz clic en §SAutocompletar nave§! y deja que el juego termine el diseño por ti."
 ships_designed: "Nave diseñada"
 tutorial_19_tooltip: "§STutorial: diseño de naves§! añadido al diario de situación."
 tutorial_20_chain_title: "Tutorial: puestos de observación"
 tutorial_20_chain_desc: "Deberíamos [GetBuildGrow] un §Spuesto de observación§! sobre el mundo natal de una §Ssociedad [Owner.GetPreFTLUpper]§!. Estas estaciones espaciales pueden realizar diversas §Smisiones§!, aunque será nuestra voluntad de interferir con las culturas en desarrollo la que determine cuáles de ellas estarán disponibles.\n\nLos puestos de observación se construyen igual que las £mining_station£ §Sestaciones mineras§! o £science_ship£ §Sde investigación§!, pero solo sobre los mundos natales de civilizaciones [Owner.GetPreFTLUpper]. Basta con que elijas una £construction_ship£ §Snave de construcción§! y hagas clic en el botón §S[GetBuildGrowCap] puesto de observación§! que verás en su interfaz de flota.\n\nLuego, elige el mundo natal de los [Owner.GetPreFTLUpperPlural] que quieras estudiar, y la nave de construcción empezará su misión."
 observation_post_built: "Puesto de observación construido"
 tutorial_20_tooltip: "§STutorial: puestos de observación§! añadido al diario de situación."
 tutorial_21_chain_title: "Tutorial: recursos estratégicos"
 tutorial_21_chain_desc: "Debemos [GetBuildGrow] una £mining_station£ §Sestación minera§! en la órbita de un objeto astronómico con un £strategic_resource£ §Srecurso estratégico§!. Estos raros materiales tienen un gran valor estratégico.\n\nDespués de haber localizado un recurso así mediante un §Ssondeo§!, elige una £construction_ship£ §Snave de construcción§!, haz clic en el botón §S[GetBuildGrowCap] estación minera§! y luego en el cuerpo celeste correspondiente."
 tutorial_21b_chain_title: "Información: Recursos estratégicos"
 tutorial_21b_chain_desc: "Hemos construido una £mining_station£ §Sestación minera§! en la órbita de un objeto astronómico con un £strategic_resource£ §Srecurso estratégico§!. Estos raros minerales requieren de tecnologías específicas para su explotación, pero son de un inmenso valor estratégico y debemos estar siempre atentos por si aparecen más."
 strategic_resource_extracted: "Recurso estratégico extraído"
 tutorial_21_tooltip: "§STutorial: conseguir recursos estratégicos§! añadido al diario de situación."
 tutorial_22_chain_title: "Tutorial: evolucionar a preinteligentes"
 tutorial_22_chain_desc: "Deberíamos §Sevolucionar§! una especie inferior, aunque puede que primero tengamos que investigar la tecnología de §Sactivadores epigéneticos§!.\n\n§SEvoluciona§! una especie presintiente seleccionando su entrada en la pantalla §SEspecies§! y, a continuación, haz clic en el botón Evolucionar."
 tutorial_22_tooltip: "§STutorial: evolucionar a preinteligentes§! añadido al diario de situación."
 species_uplifted: "Especie preinteligente evolucionada"
 tutorial_23_chain_title: "Tutorial: primer contacto"
 tutorial_23_chain_desc: "Tras encontrarnos entes desconocidos en la negrura del espacio, deberíamos intentar §Scomunicarnos con ellos§!. \n\nPara ello, debes seleccionar §SPrimer contacto§! en el §Sdiario de situación§! y hacer clic en el botón §SMostrar primer contacto§!, o bien acceder directamente haciendo clic en el icono de §Sprimer contacto§! del §Smapa de la galaxia§!.\n\n\n$tttt$$tttt$$ttt$£firstcontact£\n"
 contact_made: "Contactos realizados"
 tutorial_23_tooltip: "§STutorial: primer contacto§! añadido al diario de situación"
 tutorial_24_chain_title: "Tutorial: modificar especies"
 tutorial_24_chain_desc: "Podemos §Smodificar§! cualquier especie inteligente que viva en el imperio siempre que tengamos suficientes §Spuntos de rasgo§!.\n\nEsto se hace accediendo al menú §SModificar§! de la pantalla §SEspecies§! y luego investigando el §Sproyecto especial§! correspondiente. El proyecto requiere £society£ §Sinvestigación social§! y desviará todo el progreso tecnológico hacia ese campo mientras esté activo."
 species_modified: "Especie modificada"
 tutorial_24_tooltip: "§STutorial: modificar especies§! añadido al diario de situación."
 tutorial_25_chain_title: "Tutorial: reivindicar sistema"
 tutorial_25_chain_desc: "Podemos ampliar nuestras fronteras [GetBuildingGrowing] §Sbases estelares§! alrededor de las estrellas alienígenas. De esta forma, aseguraremos el £system£ §Ssistema§!, nos garantizará acceso a los recursos y se bloqueará el paso de contactos si las fronteras se cierran.\n\nSelecciona una £construction_ship£ §Snave de construcción§!, haz clic en el botón §S[GetBuildGrowCap] base estelar§! en la interfaz de la flota y haz clic izquierdo en una estrella. Otra opción es hacer clic derecho sobre la estrella y seleccionar §S[GetBuildGrowCap] base estelar§!.\n\nA diferencia de otras estaciones orbitales, las §Sbases estelares§! se pueden construir fuera de las fronteras."
 frontier_outpost_built: "Base estelar construida"
 tutorial_25_tooltip: "§STutorial: bases estelares§! añadido al diario de situación."
 TUTORIAL_PLANETVIEW_MANAGEMENT_TITLE: "Tutorial: pestaña Gestión"
 TUTORIAL_PLANETVIEW_MANAGEMENT_DESC: "En la pestaña §SGestión§! se muestra información clave acerca del estado y la disposición de un £planet£ §Splaneta§!.\n\nEn la sección §SCaracterísticas planetarias§! se indica qué £blocker£ §Sbarreras§! naturales se pueden despejar, así como §Scaracterísticas§! existentes.\n\nEn la sección §SPoblación actual§! se enumeran todas las £pops£ §Spoblaciones§! del £planet£ §Splaneta§!.\n\nEn el panel £sector£ §SSector§!, el planeta se puede gestionar como parte de un §Ssector§!, automatizando así la administración planetaria.\n\n§SAscenso colonial§! permite ascender las colonias, lo que tiene el efecto de mejorar los §Splanetas§!, siempre y cuando cuentes con los recursos necesarios."
 TUTORIAL_DATABANK_TITLE: "Tutorial: banco de datos"
 TUTORIAL_DATABANK_DESC: "El £databank£ §Sbanco de datos§! es el recurso perfecto para entender las mecánicas del juego.\n\nLas entradas se organizan en categorías para facilitar la consulta de mecánicas, §Sfunciones§! o conceptos concretos cuando lo necesites.\n\nTan solo tienes que hacer una búsqueda o elegir un tema de la lista para saber más."
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_TITLE: "Tutorial: enfoques y línea temporal"
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_DESC: "El sistema de £focus_core£ §Senfoques de imperio§! permite orientar el desarrollo de tu imperio mediante la selección de una prioridad: £focus_exploration£ §Sexploración§!, £focus_conquest£ §Sconquista§! o £focus_development£ §Sdesarrollo§!.\n\nCada enfoque incluye un conjunto de cartas de tareas pensadas para orientarte en función del camino que hayas elegido. Al completar una carta obtienes §Spuntos de progreso§! de cara a la categoría pertinente.\n\nEl enfoque actual aumenta la probabilidad de adquirir tareas relacionadas. Puedes cambiar de cartas al azar si gastas una £unity£ §Sunidad§!, así como cambiar de enfoque.\n\nTen controlados tus objetivos en las pestañas de tareas §Scompletadas§! y §Sen curso§! para descubrir cuánto te queda para llegar al siguiente nivel de recompensa.\n\nEn la §Slínea temporal§! se muestran hitos y acontecimientos de peso en la historia de tu imperio, empezando por su §Sorigen§!. Conforme avancen los acontecimientos claves, irán apareciendo más entradas."
 TUTORIAL_COLONIZATION_TITLE: "Tutorial: colonizar un planeta"
 TUTORIAL_COLONIZATION_DESC: "En la pantalla §SColonización§! podrás preparar un planeta para colonizarlo.\n\nDeberás elegir qué §Sespecie§! habitará el planeta y la §Sdesignación de la colonia§! asignada para determinar su enfoque de desarrollo.\n\nSe muestra una vista general de los §Sdistritos§!, el §Stamaño del planeta§! y posibles §Smodificadores§!, así como cualquier §Scaracterística planetaria§! que pueda afectarlo.\n\nAl priorizar el desarrollo del §Splaneta§! según sus recursos naturales, sacarás el máximo partido a tus colonias."
