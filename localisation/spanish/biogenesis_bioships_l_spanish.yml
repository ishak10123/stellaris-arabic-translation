 tech_bio_hyper_drive_1: "Viaje por hiperespacio"
 tech_bio_hyper_drive_1_desc: "Como las hebras de una telaraĂ±a, el reino extradimensional del hiperespacio recorre los pozos de gravedad de todas las estrellas. En teorĂ­a, el viaje ultralumĂ­nico es posible a travĂ©s de estas hipervĂ­as.\n\n"
 tech_bio_hyper_drive_2: "Fisuras en hipervĂ­as"
 tech_bio_hyper_drive_2_desc: "Hemos comprobado la existencia de lugares donde una nave gasta menos energĂ­a por adentrarse en una hipervĂ­a. Esto conllevarĂ¡ una nueva generaciĂ³n de hiperimpulsores.\n\n"
