 concept_biological_ship_desc: "- Las naves biolĂ³gicas se catalogan por clases de combate, cada cual con funciones bien definidas y tres etapas de crecimiento. $NEW_LINE$- Los costes de construcciĂ³n, por lo general, consisten en $i_food$ en lugar de $i_alloys$ $NEW_LINE$- Los costes de mantenimiento, por lo general, consisten en $i_food$ en lugar de $i_energy$. $NEW_LINE$- Dependen de tecnologĂ­as de Â§YÂ£societyÂ£biologĂ­aÂ§! en lugar de tecnologĂ­as de Â§YÂ£engineeringÂ£arte del vacĂ­oÂ§!. $NEW_LINE$$h_line$Â§LLas naves vivas compuestas de enormes fibras musculares onduladas llenas de orgĂ¡nulos bioluminiscentes liberan compuestos ricos en energĂ­a para producir rĂ¡fagas de luz y calor para la propulsiĂ³n.Â§!"
 default_ship: "Naves mecĂ¡nicas"
 bio_ship: "Naves biolĂ³gicas"
 #Shipset Descriptions
 biogenesis_01_shipset_desc: "Â§HTipo de conjunto de naves: ['concept_biological_ship', biolĂ³gicas]Â§!\nMĂ¡s engendradas que construidas, estas naves de guerra orgĂ¡nicas son el epĂ­tome de la superdepredaciĂ³n. Su biomasa semisintiente se adapta, caza y ataca con voracidad insaciable."
 biogenesis_02_shipset_desc: "Â§HTipo de conjunto de naves: ['concept_biological_ship', biolĂ³gicas]Â§!\nCultivadas para los mĂ¡s audaces, estas naves de robusta coraza no existen para servir sin mĂ¡s, sino que resisten y crecen junto a los intrĂ©pidos exploradores que las llaman hogar."
 humanoid_01_shipset_desc: "Recias y denodadas, estas naves estĂ¡n concebidas para sobrevivir a las inclemencias del espacio profundo. DiseĂ±adas para conquistar lo desconocido, llevan las esperanzas y los sueĂ±os de sus creadores a las estrellas mĂ¡s lejanas."
 synthetics_01_shipset_desc: "Estos diseĂ±os reflejan la pureza de mentes infatigables. Los serpentines tĂ©rmicos de sus cascos dispersan la energĂ­a de la unidad central, de manera que el organismo opera en su totalidad con la eficiencia mĂ¡s absoluta."
 mammalian_01_shipset_desc: "Creadas para durar, estas naves formidables dan testimonio de la entereza de sus artĂ­fices. Sus densos cascos aĂ­slan y protegen, mientras que sus sistemas redundantes garantizan su supervivencia en los ambientes mĂ¡s inhĂ³spitos."
 reptilian_01_shipset_desc: "Este diseĂ±o prĂ¡ctico a la vez que tosco evoca la resistencia de un depredador. La presencia de esta nave en el vacĂ­o constituye un testamento de la tenacidad inmisericorde de quienes la concibieron."
 avian_01_shipset_desc: "GrĂ¡ciles y refinadas, estas versĂ¡tiles naves rinden homenaje a la belleza del vuelo. Cada curva y cada contorno es digno de una especie que no entiende el espacio como un escollo, sino como una prolongaciĂ³n del cielo."
 arthropoid_01_shipset_desc: "Quitina o acero, forma o utilidad... No existe distinciĂ³n. Estas naves se concibieron mĂ¡s para resistir que para sobrecoger, y su casco estratificado pone de manifiesto una filosofĂ­a cuyo epicentro es la supervivencia mĂ¡s asĂ©ptica."
 molluscoid_01_shipset_desc: "Estas naves, elegantes pero duraderas, son al mismo tiempo refugio y lanza. Bajo su dura coraza, complejos sistemas regulan el trasiego de energĂ­a y los ciclos de nutrientes con silenciosa eficiencia."
 fungoid_01_shipset_desc: "Estas naves bulbosas evocan la belleza de los brotes fĂºngicos. Concebidas con la autosuficiencia como mĂ¡xima, sus sistemas especializados forman intrincadas redes internas, a semejanza de los patrones lĂ³gicos de un micelio."
 plantoid_01_shipset_desc: "Estas naves frondosas no solo viajan por las estrellas, sino que tambiĂ©n echan raĂ­ces entre ellas. Sus gĂ³ndolas fotosintĂ©ticas velan por el equilibrio de los biomas de a bordo."
 lithoid_01_shipset_desc: "Forjadas por el tiempo y la presiĂ³n, estas naves de aspecto rocoso son un paradigma de permanencia. Matrices de silicatos cristalizados blindan los sistemas principales, extrayendo su energĂ­a de las mismĂ­simas fuerzas que dan forma a los mundos."
 necroid_01_shipset_desc: "Oscuras e infaustas, estas catedrales flotantes son monumentos a la muerte y el renacer. Sus nĂºcleos entrĂ³picos y diseĂ±os rituales aluden a poderes del vacĂ­o y una ambiciĂ³n perpetua."
 nemesis_01_shipset_desc: "Estos colosos imponentes conminan a someterse ante ellos. Sus superestructuras reforzadas y sistemas redundantes proyectan un aura de dominio inigualable."
 aquatic_01_shipset_desc: "Volubles, pero no por ello menos firmes, estas naves canalizan un poder oceĂ¡nico. Su interior acuĂ¡tico y su hidrodinĂ¡mico contorno son fiel reflejo de la gracilidad de sus creadores."
 toxoid_01_shipset_desc: "Estas naves emiten gases, traquetean precarias y desafĂ­an a toda regla. Pero funcionan. NutriĂ©ndose de residuos y apuntaladas por un ingenio obstinado, perduran donde otras fracasan."
 cybernetics_01_shipset_desc: "Los exteriores cromados, el siseo de los circuitos y los reflejos metĂ¡licos estĂ¡n ya desfasados. Con enlaces neurales directos, no hay retardos ni lĂ­mites; tan solo una intachable precisiĂ³n de altĂ­simo octanaje."
