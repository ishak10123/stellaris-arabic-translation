 #Combat Computers
 BIO_COMBAT_COMPUTER_DEFAULT: "Instinto de combate"
 BIO_COMBAT_COMPUTER_DEFAULT_DESC: "Todas las naves biolĂ³gicas poseen un instinto de combate rudimentario que les permite efectuar maniobras evasivas y cĂ¡lculos de punterĂ­a."
 BIO_COMBAT_COMPUTER_BASIC: "Implantes neurales"
 BIO_COMBAT_COMPUTER_BASIC_DESC: "Estos implantes se acoplan directamente a los sistemas orgĂ¡nicos de la nave, agilizando la toma de decisiones y perfeccionando su coordinaciĂ³n tĂ¡ctica. Como si de un ordenador de combate viviente se tratasen, aumentan la percepciĂ³n de peligros y el rendimiento de la nave en combate."
 BIO_COMBAT_COMPUTER_ADVANCED: "Implantes neurales avanzados"
 BIO_COMBAT_COMPUTER_ADVANCED_DESC: "Estos sistemas son una versiĂ³n desarrollada de los implantes neurales bĂ¡sicos y aumentan el procesamiento tĂ¡ctico y la velocidad de toma de decisiones. Redoblan la eficacia y la coordinaciĂ³n de las naves biolĂ³gicas, de manera que pueden responder con inmediatez a cambios en las condiciones del campo de batalla."
 BIO_COMBAT_COMPUTER_SAPIENT: "Implantes neurales inteligentes"
 BIO_COMBAT_COMPUTER_SAPIENT_DESC: "Estos implantes estĂ¡n dotados de una inteligencia biosapiente capaz de proyectar estrategias de manera independiente. Una combinaciĂ³n de instinto orgĂ¡nico y razonamiento estratĂ©gico permite a las naves biolĂ³gicas adaptarse dinĂ¡micamente a situaciones de combate complejas, presentando una capacidad de tomar decisiones que raya en el pensamiento autĂ³nomo."
 BIO_COMBAT_COMPUTER_AUTONOMOUS: "Implantes neurales autĂ³nomos"
 BIO_COMBAT_COMPUTER_AUTONOMOUS_DESC: "Estos sistemas operan con plena autonomĂ­a. Dotados de una inteligencia biolĂ³gica con conciencia propia, brindan a las naves la posibilidad de analizar, plantear estrategias y ejecutar decisiones sin intervenciĂ³n externa, logrando asĂ­ una efectividad incomparable en combate."
 BIO_COMBAT_COMPUTER_PRECOG: "Instinto de combate precognitivo"
 BIO_COMBAT_COMPUTER_PRECOG_DESC: "Estos implantes emplean energĂ­a psiĂ³nica para dotar a las naves biolĂ³gicas de percepciĂ³n precognitiva, de manera que pueden anticiparse a las acciones del enemigo antes de que este las ejecute. Esta capacidad, que roza lo sobrenatural, confiere a las flotas una ventaja decisiva que les permite reaccionar a las amenazas mĂ¡s complejas en cuestiĂ³n de milisegundos."
