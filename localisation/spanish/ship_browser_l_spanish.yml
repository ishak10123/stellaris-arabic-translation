l_spanish:
 SHIPSET_LABEL: "Conjunto de naves"
 SHIPSETS_LABEL: "Conjuntos de naves"
 SHIP_GRAPHICS_PREVIEW: "Vista previa de clases de nave"
 SHIP_GRAPHICS_REQUIRED_DLC: "Requiere DLC"
 SHIP_GRAPHICS_MISSING_DLC_TOOLTIP: "§GClic para obtener una vista previa de las naves $CULTURE_NAME$§!"
 SHIP_GRAPHICS_CAMERA_TRANSFORM_TOOLTIP: "£camera_zoom_in£ Gira la §Grueda del ratón hacia delante§! para hacer zoom.\n£camera_zoom_out£ Gira la §Grueda del ratón hacia atrás§! para alejar el zoom.\n£camera_rotate£ Mantén pulsado el §Gbotón derecho del ratón§! y arrastra sobre el modelo de nave para girarlo."
 SHIP_GRAPHICS_CORVETTE_DESC: "Las corbetas son la primera clase de nave militar disponible para los imperios. Son rápidas, ágiles y baratas."
 SHIP_GRAPHICS_FRIGATE_DESC: "Las fragatas son una versión avanzada de la corbeta especializada en disparar torpedos. Puede que sean algo más lentas y vulnerables, pero pueden resultar devastadoras contra objetivos grandes."
 SHIP_GRAPHICS_DESTROYER_DESC: "Los destructores cambian la agilidad y la velocidad de las corbetas por más potencia de fuego y un casco más grueso."
 SHIP_GRAPHICS_CRUISER_DESC: "Los cruceros son versátiles y duraderos, capaces de absorber daño e infligirlo."
 SHIP_GRAPHICS_BATTLESHIP_DESC: "Los acorazados son caros, aunque poderosos. Con su gran campo de tiro, destacan a la hora de dañar al rival antes de que pueda contratacar."
 SHIP_GRAPHICS_TITAN_DESC: "Aunque son tremendamente poderosos, los Titanes también pueden usar sus habilidades de aura para reforzar a las naves aliadas."
 SHIP_GRAPHICS_BIO_TITAN_DESC: "$SHIP_GRAPHICS_TITAN_DESC$"
 SHIP_GRAPHICS_JUGGERNAUT_DESC: "Crear una Gigante es una gran empresa para cualquier imperio. Son naves colosales que funcionan como astillero móvil y como nave de apoyo."
 SHIP_GRAPHICS_COLOSSUS_DESC: "Estas naves tan inmensas no están equipadas para luchar contra flotas hostiles, sino que sirven para neutralizar mundos enteros."
 SHIP_GRAPHICS_OUTPOST_DESC: "El puesto de avanzada es el nivel más bajo de una base estelar. No tiene demasiadas funciones más allá de marcar la propiedad de un sistema estelar."
 SHIP_GRAPHICS_STARBASE_CITADEL_DESC: "La ciudadela es el nivel mejorable más alto de una base estelar. Está equipada con unas defensas inmensas y es un hueso duro de roer para cualquier enemigo."
 SHIP_GRAPHICS_TRANSPORT_DESC: "Las naves de transporte llevan a los ejércitos para asaltar planetas hostiles durante la guerra. No tienen blindaje ni armas, por lo que necesitan una flota de apoyo cuando se adentran en territorio enemigo."
 SHIP_GRAPHICS_SCIENCE_DESC: "Las naves científicas sirven para explorar nuevos sistemas estelares e investigar anomalías. Al ser naves civiles, no tienen blindaje y son vulnerables."
 SHIP_GRAPHICS_CONSTRUCTOR_DESC: "Las naves de construcción son necesarias para construir cualquier estación espacial. Al ser naves civiles, no tienen blindaje ni armas, por lo que son vulnerables."
 SHIP_GRAPHICS_COLONIZER_DESC: "Las naves colonia llevan a colonos de planetas con asentamientos a otros nuevos para colonizarlos. Al ser naves civiles, no tienen blindaje ni armas, por lo que son vulnerables."
 SHIP_GRAPHICS_SHIP_SIZE_LOCKED_DESC: "§REsta clase de nave requiere el contenido descargable $SHIP_SIZE_NAME$.§!"
 SHIP_GRAPHICS_ION_CANNON_DESC: "Un arma defensiva colosal capaz de incapacitar naves con las devastadoras ráfagas de energía que dispara. Lenta pero potente, actúa como un formidable elemento disuasorio para visitantes no deseados."
 SHIP_GRAPHICS_MILITARY_STATION_SMALL_DESC: "Las plataformas de defensa son fortificaciones orbitales estacionarias concebidas para proteger bases estelares de posibles incursores."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_1_DESC: "Una estación orbital que actúa en la primera línea defensiva de un sistema. Está diseñada para proyectar energía y defender ubicaciones estratégicas."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_2_DESC: "Una fortaleza vanguardista repleta de hangares armamentísticos y sistemas defensivos. Sus contrafuertes defensivos le permiten resistir en contiendas prolongadas y servir de base de operaciones en regiones del espacio disputadas."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_3_DESC: "Esta enorme estación, el pináculo de la fortificación del espacio profundo, es un baluarte casi inexpugnable, capaz de soportar ataques a gran escala y de ejercer un control total sobre la logística del sistema."
 SHIP_SIZE_SELECTOR_LOC: "SHIP_GRAPHICS_$SIZE$_DESC"
 SHIPSETS_DESCRIPTION_LABEL: "Descripción"
 SHIP_GRAPHICS_NANITE_SWARMER_DESC: "Una nave de ataque rápida y errática que se compone de nanorrobots autorreplicantes. A falta de pilotos convencionales, estos enjambres autónomos abruman a los enemigos gracias a su gran número y disuelven las defensas enemigas con una precisión implacable."
 SHIP_GRAPHICS_NANITE_INTERDICTOR_DESC: "El interdictor, una nave de ataque adaptable formada a partir de nanorrobots autorreplicantes, impone control en pleno caos. Operando como una sola unidad, los constructos autónomos que la componen interceptan y neutralizan toda amenaza con una eficiencia pasmosa, desbaratando las formaciones enemigas a fuerza de acoso coordinado e infatigables cacerías."
 SHIP_GRAPHICS_CRISIS_CORVETTE_DESC: "Las corbetas de crisis están diseñadas para un despliegue rápido y una fuerza abrumadora gracias a su gran número. Superan a las corbetas estándar e infunden miedo en quienes se oponen a la tormenta que se avecina."
 SHIP_GRAPHICS_CRISIS_DESTROYER_DESC: "Una nave de guerra dotada de armamento pesado, diseñada para aniquilar al enemigo con una eficiencia implacable. Más grande y duradera que las corbetas, ofrece una potencia de fuego abrumadora y una velocidad suficiente para dar caza a los enemigos que intentan huir."
 SHIP_GRAPHICS_CRISIS_CRUISER_DESC: "Una formidable nave de guerra que equilibra potencia de fuego, resistencia y supremacía estratégica. Fuertemente armada y resistente, es un pilar fundamental en toda ofensiva, pues rompe las líneas enemigas con una fuerza implacable."
 SHIP_GRAPHICS_STAR_EATER_DESC: "Esta nave colosal es capaz de consumir por completo cualquier estrella, provocando supernovas que erradican sistemas completos. El devorador de estrellas no es una simple nave de guerra: se le considera el heraldo del cataclismo galáctico, pues convierte todos los mundos a su paso en vacíos sin vida."
 SHIP_GRAPHICS_COSMO_CRISIS_DESTROYER_DESC: "Una elegante nave de guerra infundida con energías cósmicas que ataca con precisión y una fuerza implacable. Es más que una nave cualquiera, pues su presencia anuncia un antes y un después en la realidad."
 SHIP_GRAPHICS_COSMO_CRISIS_BATTLECRUISER_DESC: "Una descomunal amalgama de ciencia y destino cuyo armamento todo lo devasta. Al igual que sus amos dominan los astros, esta nave de guerra domina el campo de batalla."
 SHIP_GRAPHICS_COSMO_CRISIS_TITAN_DESC: "Una máquina de guerra celestial que irradia el poder de la transformación inminente. Su presencia altera la realidad, proclamando el renacer de un universo."
 SHIP_GRAPHICS_OFFSPRING_CORVETTE_DESC: "$SHIP_GRAPHICS_CORVETTE_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_DESTROYER_DESC: "$SHIP_GRAPHICS_DESTROYER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_CRUISER_DESC: "$SHIP_GRAPHICS_CRUISER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_BATTLESHIP_DESC: "$SHIP_GRAPHICS_BATTLESHIP_DESC$\n\n$OFFSPRING_SHIP_DESC$"
