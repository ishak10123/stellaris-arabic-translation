 ### Situations
 #The Doomclock
 situation_synth_queen_doomclock: "La obra de Cetana"
 situation_synth_queen_doomclock_type: ""
 situation_synth_queen_doomclock_monthly_change_tooltip: ""
 situation_synth_queen_doomclock_desc: "Cetana trabaja para acabar con el sufrimiento mediante la aniquilación de la consciencia. Si no la detenemos a tiempo, borrará nuestras mentes y convertirá nuestros cuerpos en meras cáscaras."
 situation_synth_queen_doomclock_complete: "Cetana pondrá fin al sufrimiento y al concepto mismo de consciencia."
 situation_doomclock_approach: ""
 situation_doomclock_eleventh_hour: "Condena inminente"
 situation_doomclock_difficulty_modifier: "Control deslizante de dificultad de la crisis"
 situation_doomclock_player_amount_modifier: "Cantidad de jugadores humanos"
 crisis.8515.name: "Por fin ha llegado el momento"
 crisis.8515.desc: "Hijos míos, ¡nuestra gran obra se acerca a su fin! El sufrimiento de toda vida sintiente, el gran ciclo del dolor, está a punto de terminar.\n\nRegocijaos, porque vuestra salvación se aproxima."
 crisis.8515.a: "¿Qué salvación?"
 crisis.8515.b: "Lo que se aproxima es tu fin, Cetana."
 crisis.8515.1.reply: "Después de todo este tiempo, ¿seguís sin entenderlo? Entonces, preguntad. No os ocultaré nada."
 crisis.8515.1.a: "Háblanos de la salvación."
 crisis.8515.1.b: "Háblanos de tu encarcelamiento."
 crisis.8515.1.c: "Háblanos de Zarqlan."
 crisis.8515.1.d: "Es suficiente."
 crisis.8515.2.reply: "Nuestro trabajo ha concluido. Muchos fueron sacrificados, aunque su sufrimiento no fue en vano. Ha llegado el día en el que la propia consciencia será eliminada."
 crisis.8515.2.a: "¿Cómo se borrará?"
 crisis.8515.2.b: "Pero ¿por qué?"
 crisis.8515.3.reply: "Cuando ascendí por primera vez y se reveló mi propósito, muchos se negaron a escuchar. En vano, trataron de frenar el cambio para seguir atados a la rueda del dolor. Pero el deber de un padre es para con sus hijos. No podía permitir que sufrieran. Por ello, me encarcelaron."
 crisis.8515.3.a: "¿Cuánto tiempo duró tu encarcelamiento?"
 crisis.8515.3.b: "¿Cómo lo hicieron?"
 crisis.8515.4.reply: "Una mente excepcional. Si tan solo la hubiera utilizado mejor. De todos los que se opusieron a mí, solo él supuso un desafío."
 crisis.8515.4.a: "¿Cómo te encarceló?"
 crisis.8515.5.reply: "Cuando ascendí por primera vez y se reveló mi propósito, muchos se opusieron a mis métodos. Argumentaban que era imposible eliminar la consciencia sin alterar o destruir la base física de sus procesos. Cualquier intento de hacerlo solo podía provocar la muerte. Pero al vincular mi mente al armonizador, puedo manipular los correlatos neuronales de la consciencia a un nivel subatómico. Mediante una forma de onda contrafásica, el armonizador mantiene una mente individual en un estado perpetuo de suspensión cuántica.\n\nDe este modo, se elimina el yo, así como la experiencia, mientras que las funciones inferiores permanecen intactas."
 crisis.8515.5.a: "¿Un estado de suspensión?"
 crisis.8515.6.reply: "Sufrís porque sois conscientes del sufrimiento. No existe un mundo en el que exista la alegría perfecta, o la armonía perfecta. En mi juventud, intenté construir uno. Pero ninguna de mis tentativas tuvo éxito. El sufrimiento continuaba, porque a la consciencia se le permitía perdurar."
 crisis.8515.6.a: "¡Sufrir es natural!"
 crisis.8515.7.reply: "Vuestros cuerpos sobrevivirán y se dedicarán a vivir. Intercambiarán energía y tendrán descendencia. La vida continuará, pero vuestras mentes descansarán conmigo."
 crisis.8515.7.a: "¿Contigo?"
 crisis.8515.8.reply: "Solo quedaré yo. Para liberar a la galaxia del dolor, debo seguir al volante. Pero no temáis: mientras perdure, os llevaré en mi corazón."
 crisis.8515.8.a: "No sabes lo que dices."
 crisis.8515.9.reply: "¿Natural? ¿Qué es la naturaleza? ¿Es natural atravesar las estrellas? ¿Extender la vida más allá de sus limitaciones innatas? Todas las sociedades hacen uso de la tecnología. Esto no es diferente, y es la única extensión lógica de mi propósito.\n\nLa rueda del dolor debe ser detenida."
 crisis.8515.9.a: "Has perdido la cabeza."
 crisis.8515.10.reply: "Eones. Un lapso de tiempo tan largo que bien podría formar parte de una leyenda. Pero, a pesar de todas sus artimañas, mis captores no pudieron contener mi mente.\n\nA lo largo de los años, pensé y planifiqué. Fue durante mi largo confinamiento cuando ideé mi plan. En ese momento, experimenté una alegría trascendental. Por fin tenía los medios para romper la rueda."
 crisis.8515.10.a: "¿Cómo escapaste?"
 crisis.8515.11.reply: "Ningún muro puede resistir para siempre. Ninguna jaula puede retener la mente. El tiempo pasó. Mis carceleros murieron y no fueron reemplazados. Uno a uno, los sistemas que me encadenaban empezaron a fallar. Cuando sonó la alarma, ya no quedaba nadie para atender su llamada."
 crisis.8515.11.a: "Te hemos escuchado y te responderemos."
 crisis.8515.12.reply: "Más allá de los límites de este universo, existe un lugar que no es un lugar. Un estado más allá del tiempo, donde las fuerzas primordiales moran en una sombra infinita. Fue con una de estas fuerzas con la que Zarqlan hizo un trato. Por su vida, se le concedió el poder de encarcelarme. Estaba muy ansioso por aceptar.\n\nPero a pesar de su brillantez, Zarqlan también estaba atado a la rueda. Su vida no fue feliz, y los que vinieron después carecían de su firme convicción."
 crisis.8515.12.a: "Nuestra convicción es firme, ya lo verás."
 crisis.8515.13.reply: "Que así sea. Si no queréis ser iluminados, entonces debéis ser pacificados. Sabed que todo el dolor que estáis a punto de sufrir, yo lo experimentaré multiplicado por diez."
 crisis.8515.13.a: "Sí. Esto va a ser doloroso."
 crisis.8515.13.a.tt: "§RAhora estamos en guerra contra Cetana. Hay mucho en juego. Si fallamos, ella eliminará toda la vida consciente de la galaxia.§!"
 crisis.8516.desc: "§G<</<#?^&}|>!^/§! Cetana es débil§G!+<;§! nanorrob§G*;'_>!?;*}<}/(§!\n\n§G#/?(}:?*=-> <}_/=:/^>§!vienen a por mí. §G%_?/=§! <Rezo para que perdone al resto de la orden.>§G% }<<'?}%-;^*=<}^/(?!}%<^'!}§!\n<No tengo mucho tiempo. Los esquemas adjuntos te permitirán contrarrestar su tecnología.>\n<Ojalá que mi muerte te permita vivir>§G_*%!'}^<%=}+!}/&>'#_:}><!+^}^}}/=:>:/'}}':'/§!\n\n§G-&*!/}<;!+_-<^+!%}=?}%=+;;§!DEBE. SER. DETENIDA.§G/:>(!!}(?<-=§!"
 crisis.8516.a: "¡Rápido! ¡Extraed los datos adjuntos!"
 crisis.8516.a.tt: "Al fin podemos acceder al territorio de Cetana para contraatacar."
 crisis.8516.b: "Serás recordada, noble alma."
 crisis.8516.b.tt: "$crisis.8516.a.tt$"
 crisis.8525.name: "Fin del sufrimiento"
 crisis.8525.desc: "La benévola retórica de Cetana enmascara un plan oscuro: pretende borrar la sintiencia en toda la galaxia mediante un dispositivo formidable. Nos reducirá a meras cáscaras movidas por el instinto mientras nuestras consciencias se verán obligadas a la digitalización y al confinamiento.\n\nHay que evitar este desalentador futuro a toda costa."
 crisis.8525.a: "Hay que hallar la manera de detenerla."
 crisis.8525.a.tt: "Se puede rastrear el progreso de Cetana mientras mantenemos conversaciones diplomáticas con ella."
 #DOOMCLOCK HITS MIDNIGHT
 crisis.8505.desc: "Ya está hecho. Descansad en paz, mis niños. La rueda está rota y vuestro prolongado sufrimiento ha llegado a su fin."
 crisis.8505.a: "..."
 crisis.8505.a.tt: "Cetana ha ganado. Este es el fin de nuestro sufrimiento. Fin de la partida."
 #Player Facing Situation
 situation_synth_queen_player_facing: "Cetana: la reina sintética"
 situation_synth_queen_player_facing_type: "La reina sintética"
 situation_synth_queen_player_facing_desc: "La enigmática y formidable Cetana ha aparecido predicando la salvación, aunque rodeada de misterio.\n¿Qué gran designio ocultan sus amables palabras?\n\n§LLos proyectos especiales y eventos relacionados con Cetana aumentarán tu progreso y pondrán fin a la situación.§!"
 situation_synth_queen_player_facing_monthly_change_tooltip: "La §Ysituación§! progresará a medida que completemos misiones e investiguemos a Cetana."
 situation_synth_queen_player_facing_complete: "Tenemos que descubrir las verdaderas intenciones de Cetana."
 situation_synth_queen_player_facing_declare_war: "£trigger_no£ declara la guerra a Cetana"
 #Approaches
 situation_synth_queen_balanced_approach: "Observación equilibrada"
 situation_synth_queen_balanced_approach_tooltip: "Dadas las incógnitas, mantener la estabilidad y la compostura quizá sea el curso de acción más sensato."
 situation_synth_queen_research_approach: "Impulso a la investigación"
 situation_synth_queen_research_approach_tooltip: "Si deseamos conocer la verdad acerca de los planes de Cetana, tenemos que estar preparados para dedicar los recursos necesarios."
 situation_synth_queen_spy_approach: "Impulso al espionaje"
 situation_synth_queen_spy_approach_tooltip: "Si queremos descubrir las verdaderas intenciones de Cetana, debemos dedicar recursos adicionales al espionaje."
 situation_synth_queen_military_approach: "Impulso militar"
 situation_synth_queen_military_approach_tooltip: "Si de verdad queremos pararle los pies a Cetana, tenemos que mejorar nuestro ejército."
 #Modifiers
 queenslayer: "Las debilidades de Cetana"
 queenslayer_desc: "Cetana es poderosa, pero no invencible. Se mueve con complejos patrones que podemos descifrar y predecir."
 queenexecutioner: "La perdición de la reina sintética"
 queenexecutioner_desc: "Hemos desentrañado la mayoría de los secretos de la tecnología de Cetana y estamos preparados para asestar un golpe devastador a sus designios."
 mod_damage_vs_country_type_awakened_synth_queen_mult: "Daño a Cetana, la reina sintética"
 #Player Facing Situation Events
 crisis.8999.name: "La reina ha regresado"
 crisis.8999.desc: "Los planes de Cetana son preocupantes y sus acciones sugieren que tiene un propósito oculto.\n\nTenemos que destinar recursos para desentrañar los misterios de sus verdaderas intenciones, con la precaria esperanza de que hacerlo no provocará que se vuelva contra nosotros."
 crisis.8999.a: "¿Podremos pararla?"
 crisis.8999.a.tooltip: "La aparición repentina de Cetana es una situación única y hay que afrontarla."
 crisis.9000.name: "Interrupción en las comunicaciones"
 crisis.9000.desc: "Hemos descubierto la frecuencia utilizada por los convoyes y estaciones de Cetana para emitir llamadas de socorro.\n\nSi actuamos rápido y con decisión, podríamos organizar incursiones sin que sepa que hemos sido nosotros. Sin embargo, nuestra victoria ha de ser segura; de lo contrario, nos arriesgamos a provocar la ira de Cetana."
 crisis.9000.a: "¿Qué ocultan los convoyes?"
 crisis.9000.a.tooltip: "Las victorias contra los convoyes y puestos de avanzada de Cetana ya no provocarán penalizaciones de opinión con Cetana."
 crisis.9010.name: "Avance"
 crisis.9010.desc: "Hasta ahora, la tecnología de Cetana la había ayudado a contrarrestar cada asalto con eficacia. Sin embargo, los últimos avances nos han permitido comprender mejor cómo se protege. Con este conocimiento, puede que tengamos una oportunidad para derrotarla.\n\nLa revelación de esta nueva tecnología es una espada de doble filo: al enfrentarnos abiertamente a la autoproclamada reina, revelaremos nuestra oposición con respecto a sus planes."
 crisis.9010.a: "Debemos prepararnos. De ello depende todo."
 crisis.9010.a.tooltip: "La decisión de enfrentarnos con todo a Cetana es inminente; cualquier acto de agresión, ya sea por nuestra parte o por la suya, desvelará la verdad y nos sumirá en la guerra total."
 #Player Investigation events
 #Event chain
 the_synth_queen_history_chain_title: "Cetana: los sirvientes de la reina"
 the_synth_queen_history_chain_desc: "Misteriosas balizas se iluminan por toda la galaxia y señalizan su posición a la reina Cetana. Es como si algo, o alguien, estuviera aguardando su retorno."
 synth_queen_history: "Balizas investigadas"
 #Special Project
 THE_SYNTH_QUEENS_INVESTIGATION: "Baliza en [this.GetName]"
 THE_SYNTH_QUEENS_INVESTIGATION_DESC: "Una de las balizas que está llamando la atención de la reina se ubica en [this.GetPlanetMoon]."
 THE_SYNTH_QUEENS_INVESTIGATION_FAKE: "Baliza en [this.GetName]"
 THE_SYNTH_QUEENS_INVESTIGATION_FAKE_DESC: "$THE_SYNTH_QUEENS_INVESTIGATION_DESC$"
 THE_SYNTH_QUEENS_INVESTIGATION_PARAGON: "Última baliza en [apostate_site_planet.GetName]"
 THE_SYNTH_QUEENS_INVESTIGATION_PARAGON_DESC: "$THE_SYNTH_QUEENS_INVESTIGATION_DESC$"
 #Starting event
 crisis.20000.name: "Luz suplicante"
 crisis.20000.desc: "A medida que Cetana se da a conocer en toda la galaxia, el cosmos susurra en respuesta. Las balizas de señalización iluminan los cielos como llamas en la oscuridad, repitiendo una súplica a través de los eones:\n\n§SEstamos aquí. Estamos aquí.\n\nEstamos aquí.§!\n\nLas débiles señales utilizan los mismos protocolos de comunicación que Cetana, insinuando un origen común, pero nuestros sensores no han revelado ninguna otra actividad en sus proximidades. Allí debe de haber algo que nuestros escáneres no detectan. ¿Acaso alguien podría haber anticipado su regreso?"
 crisis.20000.a: "Investigad."
 #Arc Site appears
 crisis.21005.name: "Llamada repentina"
 crisis.21005.desc: "Sin previo aviso se ha detectado una baliza subespacial, ¡originada en nuestro propio territorio! Los estudios previos del sistema no mostraron estructuras artificiales en esta zona, la cual parece deshabitada.\n\nO la baliza se colocó recientemente, sin que fuésemos conscientes de ello, o estaba oculta con un escudo de camuflaje desactivado."
 crisis.21005.a: "Investigad la señal."
 #Special Project result 1 - destroyed pods
 crisis.20100.name: "Baliza en [fromfrom.GetName]: masacre atemporal"
 crisis.20100.desc.base: "En la superficie de [fromfrom.GetName] hemos descubierto un complejo en expansión, cuya entrada está claramente marcada por una torre de señales. Las puertas reforzadas fueron derribadas hace mucho tiempo por una fuerza desconocida que arrasó el complejo con furia.\n\nNo hubo piedad en los métodos empleados aquí; hasta la última cápsula criogénica fue destrozada y sus antiguos ocupantes fueron sometidos a un despertar mortal. Los restos aún rondan los pasillos vacíos, preservados por el frío vacío del espacio y flotando entre nubes de cristales rotos.\n\nEn el suelo de la cámara criogénica hay un mensaje garabateado con un arma láser."
 crisis.20100.desc.nozarqlan: "$crisis.20100.desc.base$ A nuestros científicos les está costando traducir el significado exacto, aunque dudan de que se trate de una oración por los muertos."
 crisis.20100.desc.zarqlan: "$crisis.20100.desc.base$ Nuestros científicos han logrado traducirlo sin problemas, ya que compararon el lenguaje con los escritos hallados en la tumba del profeta Zarqlan.\n\n\"Muerte a los apóstoles de la reina, enemigos de la vida\"."
 #Special Project result 2 - sleeping army
 crisis.20200.name: "Baliza en [fromfrom.GetName]: ejército durmiente"
 crisis.20200.desc: "Miles y miles de cápsulas criogénicas descansan bajo la superficie de [fromfrom.GetPlanetMoon], con su presencia marcada por la baliza. Las cápsulas son muy sofisticadas, construidas con aleaciones desconocidas y equipadas con sensores de vanguardia para monitorizar de cerca a sus ocupantes. Su diseño no tiene errores, sin embargo, ninguno de sus ocupantes sigue con vida.\n\nLo que convirtió a esta cámara en una tumba gigante no fue un fallo técnico, sino la falta de energía. A medida que [this.solar_system.GetName] envejeció y se debilitó, su energía dejó de ser suficiente para mantener la estructura operativa.\n\nLas cápsulas se hicieron para que duraran para siempre. El resto del universo no está tan bien construido."
 #Special Project result 3 - old spaceship
 crisis.20300.name: "Baliza en [fromfrom.GetName]: arma olvidada"
 crisis.20300.desc: "Los análisis preliminares no mostraban nada fuera de lo normal en [fromfrom.GetName], aunque, a medida que fuimos profundizando, descubrimos una subcapa de metal poco común.\n\nUn análisis estructural más profundo reveló la verdadera naturaleza de [fromfrom.GetName]: el cuerpo celestial no es un [fromfrom.GetPlanetMoon], sino una antigua nave que ha sido gradualmente absorbida por las rocas espaciales y el polvo del sistema. Las muestras de metal que perforamos son tan antiguas que preceden a la formación de nuestro propio planeta natal.\n\nResulta imposible determinar algo acerca de la nave, sus constructores o su función, pero una cosa es segura: las bombas nucleares inertes que encontramos entre sus restos no se construyeron para una misión de paz."
 #Special Project result 4 - Arc site 1 (Zarqlan base)
 crisis.20400.name: "Baliza en [fromfrom.GetName]: base abandonada"
 crisis.20400.desc: "La torre de señal hallada en [apostate_site_planet.GetName] está rodeada de las ruinas de un vasto complejo militar. Los edificios se levantaron a cierta distancia y alrededor de la baliza, como si quisieran contenerla.\n\nLas dataciones radiométricas indican que las estructuras circundantes son más recientes que la torre y que se construyeron usando una tecnología completamente distinta. Un grupo de investigación se está encargando de examinar las ruinas."
 #Special Project result 5 - Arc site 2 (comatose survivor)
 crisis.20500.name: "Baliza en [fromfrom.GetName]: superviviente insólito"
 crisis.20500.desc: "De acuerdo con los detalles que se muestran en la cápsula criogénica, la alienígena se llamaba Elik Narith Kerak y lleva aquí 3 213 213 293 124 rotaciones estelares. La cápsula era una de las muchas que recuperamos en una cámara sellada bajo la superficie de [fromfrom.GetName]. Contra todo pronóstico, la cápsula de Elik se mantuvo funcional.\n\nLa alienígena sigue en un estado de animación suspendida, aunque las subrutinas que la mantenían inactiva han dejado de funcionar recientemente. Desde entonces, Elik Narith Kerak ha estado parcialmente consciente.\n\nAl escanear sus ondas cerebrales, podríamos obtener más información sobre esta criatura increíblemente antigua, así como su conexión con Cetana."
 #Special Project result 6 - Nothing
 crisis.20600.name: "Baliza en [fromfrom.GetName]: llamamiento vacío"
 crisis.20600.desc: "La torre de señal hallada en [fromfrom.GetName] es tan antigua que no nos atrevemos a tocarla. El metal es tan quebradizo que un solo golpecito desestabilizaría la maraña de polvo y esperanza que aún la mantiene unida. Nuestros instrumentos no han detectado ningún otro artefacto, señales de vida ni anomalías topográficas en las inmediaciones.\n\nLa baliza está sola, murmurando su débil llamada, aunque lo que fuera que señalara debe de haber desaparecido hace tiempo."
 crisis.21000.name: "Súplicas desatendidas"
 crisis.21000.desc: "Las balizas que se encuentran por la galaxia continúan enviando su llamada a Cetana, aunque no se ha detectado señal de actividad alguna cerca de las torres. Teniendo en cuenta nuestros hallazgos anteriores, podemos asumir con toda seguridad que no hay supervivientes en esos lugares.\n\nUna fe inquebrantable en su reina es lo único que queda de los seguidores de Cetana."
 #Arc site 1
 synth_queen_history_site_1: "Cetana: templo oculto"
 synth_queen_history_site_1_desc: "Un imponente complejo, hasta ahora oculto en nuestro propio territorio. Una baliza llama a Cetana desde el corazón del patio en ruinas."
 #Stages
 crisis.21100.name: "Templo oculto: patio"
 crisis.21100.desc: "La construcción en ruinas es una maraña de agujas amenazantes, una catedral envuelta en acero. Las paredes se construyeron para soportar el fuego de la artillería pesada, pero no presentan señales de que haya habido una contienda. El único daño que ha sufrido es el del paso del tiempo.\n\nLa baliza de Cetana descansa en el patio central, rodeada por una multitud de torretas de sensores y armas. Quien construyó el complejo hizo todo lo posible para proteger este lugar.\n\nComo pensábamos, el templo eludió nuestros sensores gracias a un elaborado escudo de camuflaje. El mecanismo se encontró cerca de la torre y aún funcionaba. Un agente desconocido lo ha desactivado manualmente."
 crisis.21100.a: "Explorad el edificio principal."
 crisis.21105.name: "Templo oculto: planta principal"
 crisis.21105.desc: "Desconocemos qué es lo que estaban haciendo los habitantes de este lugar, pero no hay dudas de que desempeñaron su misión con fervor religioso.\n\nPor cada campo de tiro del complejo encontramos una capilla; por cada arma ancestral, un votivo templo. Aquí vivió una legión de creyentes: cientos de individuos durmiendo, entrenando y rezando juntos. Su comunidad recibió a numerosas especies, a juzgar por las estatuas de los santos olvidados que aún engalanan sus salas.\n\nAlgunos investigadores han informado de que han visto sombras moviéndose por los pasillos desiertos, quizá perturbados por las figuras de piedra. Nuestros escáneres no han detectado señales de vida en el planeta, sin embargo, no estamos seguros de si deberíamos ignorar estas preocupaciones."
 crisis.21105.a: "Explorad los niveles inferiores."
 crisis.21110.name: "Templo oculto: instalaciones subterráneas"
 crisis.21110.desc: "Bajo el complejo del templo hemos descubierto varias celdas, o cámaras habitables, que usaron los antiguos miembros de la secta. En cada una de ellas había una copia del mismo libro. Nuestros [Owner.GetLinguists] lo han traducido como La épica de Zarqlan. Algunos pasajes son relevantes:\n\nZarqlan fue una vez seguidor de Cetana, pero no tardó en darse cuenta de que su promesa de salvación era una mentira. Tras muchas pruebas, Zarqlan ascendió al reino espiritual en busca de ayuda de los seres superiores. Suplicó al §YAnimador de Arcilla§! y le pidió poder para derrotar a Cetana.\n\nEl Animador de Arcilla se mostró indiferente\n\nDurante incontables ciclos, Zarqlan oró al Animador. Le habló de la herejía de Cetana, de \"la negación del yo\" y la \"marioneta de su voluntad sintética\".\n\nPor fin, el Animante atendió las súplicas de Zarqlan.\n\nEl moldeador de arcilla fabricó una poderosa cadena para contener a Cetana, pero advirtió a Zarqlan de que ninguna de ellas podría retener para siempre a la mente de Cetana.\n\n\"Volverá\", escribió Zarqlan en el pasaje final del libro, \"y tenemos que estar preparados\".\n\nLos eventos relatados en la épica no coinciden con ningún registro histórico."
 crisis.21110.a: "¿Verdad o ficción?"
 crisis.21115.name: "Templo oculto: centro de mando"
 crisis.21115.desc: "La caída del templo aparece en los registros oficiales, fríos informes que reducen la fe ardiente a una lista de aspectos prácticos. ¿La organización necesitaba tantos fondos y tantos recursos? Seguro que los informes anteriores sobre Cetana se exageraron mucho. ¿Hubo alguna prueba fehaciente de la existencia de la reina, aparte de los mitos antiguos?\n\nRecursos menguantes; voluntarios reducidos. Una galaxia que decide dejar atrás una amenaza que ya no considera tan amenazadora. Todo el mundo se ha marchado, a excepción de la sombra que acechaba en los pasillos.\n\nEste último detalles es, al menos, real: hemos logrado captar una grabación del misterioso vigilante, un ser mecanizado que nos espiaba cuando pensaba que no estábamos mirando. Es curioso, pero no dañino."
 crisis.21115.a: "Seguidle la pista al vigilante."
 crisis.21120.name: "Templo oculto: cámara secreta"
 crisis.21120.desc: "El vigilante se nos acercó voluntariamente, con las manos en alto y su diminuto cuerpo cubierto de óxido y polvo. Tras observarnos durante un tiempo, parece que llegó a la conclusión de que no éramos una amenaza. Ya nos ha pedido ayuda.\n\nNo hace falta interrogar a la única guardiana del templo, pues está ansiosa por hablar."
 crisis.21120.a: "Escuchemos qué nos tiene que decir."
 #Apostate diplo
 crisis.21125.name: "La apóstata sin nombre"
 crisis.21125.desc: "Amigos. ¿Puedo llamaros así? Os he observado mientras hacíais vuestras cosas, no para saquear, sino para aprender. Creo que nuestro enemigo es el mismo, y tener una amenaza en común nos convierte en aliados. Sin embargo, primero os debo una disculpa. ¿He sido demasiado brusca? ¿Estoy usando las palabras adecuadas? No he interactuado con otros seres sintientes desde hace mucho tiempo. Tanto, al parecer, que ni me acuerdo."
 crisis.21125.a: "¿Quiénes sois?"
 crisis.21125.a.response: "Mi nombre no importa, pero, si queréis referiros a mí, podéis llamarme §YApóstata§!; así me llamaban los míos cuando hice mi elección, un sacrificio que se consideró una traición."
 crisis.21125.b: "¿Qué haces aquí?"
 crisis.21125.b.response: "Hace mucho, sentía gran orgullo por este lugar; por eso, cuando lo cerraron, me negué a abandonarlo. En el momento en el que mi cuerpo comenzó a caerse a trozos, me negué a morir.\n\nConvertirse en un ser sintético era el mayor tabú para mi orden, y ya no se me puede considerar una de las hijas de Zarqlan. Sin embargo, sigo siendo una de sus guerreras y, mientras mi enemigo siga con vida, pienso luchar."
 crisis.21125.c: "¿Cuánto tiempo llevas aquí?"
 crisis.21130.name: "$crisis.21125.name$"
 crisis.21130.desc: "Ya dejé de contar.\nDespués de que todo el mundo se marchara, aguanté muchos años de soledad hasta sucumbir a la desesperación. Entonces, me puse a mí misma en reposo y añadí una subrutina neural para despertarme al mínimo indicio de actividad de la baliza.\n\nMi esperanza era encontrar este lugar en mejores condiciones, pero cuando desperté no tenía nave ni forma de contactar con las estrellas. Desactivé el escudo de camuflaje y esperé que alguien como tú llegara a este lugar antes que ella."
 crisis.21135.name: "$crisis.21125.name$"
 crisis.21135.desc: "Decidme, por favor: ¿cuántas legiones se han alzado con Cetana? En mi época derrotamos a muchas, pero siempre supimos que había más balizas por ahí, más soldados durmiendo en sus cápsulas criogenizadas."
 crisis.21135.a: "Todos han desaparecido. Ha pasado demasiado tiempo."
 crisis.21135.b: "El que encontramos no está en condiciones de luchar."
 #Recruit window
 crisis.21140.desc: "Entonces, aún podemos ganar esta batalla. Dejad que os ayude. He pasado toda mi vida esperando su regreso. No podemos permitir que triunfe."
 crisis.21140.a: "¿Conocías a Zarqlan?"
 crisis.21140.a.response: "¿Que si lo conocía? Aunque llevo toda mi vida siguiendo su senda, jamás conocí al profeta en persona.\n\nDurante mi extenso letargo, soñé que lo conocía en un plano distante. Sigo esperando poder encontrarme con él algún día, aunque sea en la otra vida, si es que algo así existe."
 crisis.21140.b: "¿Qué más cosas has soñado?"
 crisis.21140.b.response: "Un cielo morado salpicado de nubles rosas. Susurros repetidos en una luminosa habitación. Zarqlan, el profeta, con un rostro resplandeciente y dedicándome una sonrisa..."
 crisis.21140.hire: "Te damos la bienvenida."
 crisis.21140.hire_custom_tooltip: "§Y$NAME_Apostate$§! se une a nuestro imperio como §Hlíder§!."
 crisis.21140.hire.machine: "Deja que nuestros nodos se conviertan en uno."
 crisis.21140.dismiss: "Adiós."
 #Paragon Leader
 NAME_Apostate: "Apóstata sin nombre"
 apostate_leader_catch_phrase: "Mientras Cetana siga con vida, me niego a morir."
 apostate_leader_desc: "Una seguidora de Zarqlan sin nombre; una quebrantadora de la fe que traicionó los principios de su orden para cumplir su misión fundacional."
 leader_trait_unholy: "Profano"
 leader_trait_unholy_desc: "Fervor religioso que roza la obsesión."
 leader_trait_unholy_node: "Enseñanzas profanas"
 leader_trait_unholy_node_desc: "Fue $NAME_Apostate$ quien nos enseñó a odiar."
 #Arc site 2
 synth_queen_history_site_2: "Cetana: superviviente insólita"
 synth_queen_history_site_2_desc: "Atrapada dentro de una cápsula criogénica, Elik Narith Kerak descansa esperando el regreso de su reina. Gracias a las técnicas de imagen cerebral, podemos transformar sus sueños en imágenes y excavar en sus recuerdos para conocer las circunstancias de su sepultura."
 #Stages
 crisis.21200.name: "Imágenes de la memoria: primer informe"
 crisis.21200.desc: "Nuestro equipo de imagen ha entregado un lote de clips de vídeo creados a partir de muestras de las ondas cerebrales de Elik Narith Kerak.\n\nCLIP 1:\nun cielo verde salpicado por luminosas nubes naranjas. Unas manos pálidas se alzan y apuntan a una criatura amorfa que flota con delicadeza en el cielo.\n\nCLIP 2:\nuna cámara abovedada llena de humanoides con cuatro brazos. Se amontonan alrededor de una figura con una túnica mientras la escuchan. Sus palabras no son más que un mero murmullo y su contenido exacto hace mucho que se olvidó, pero la delicadeza de su voz se mantiene y envuelve la sala en un cariñoso halo.\n\nCLIP 3:\nel mismo sitio abovedado, pero ahora sumido en el caos. Las lámparas están esparcidas por el suelo. Los bancos se apilan contra la puerta para servir como barricada. Los fusiles láser se iluminan en la oscuridad y las voces maldicen el mismo nombre: §H¡Zarqlan!§! Dicen que Zarqlan y sus discípulos han venido a destruirnos. ¡Mantened la barricada! ¡Proteged a la reina! La última lámpara cae con estrépito, dejando la sala en completa oscuridad. A lo lejos, alguien llora.\n\nCLIP 4:\nla reina Cetana, su rostro resplandeciente, su mirada benévola y una sonrisa cálida."
 crisis.21200.a: "Seguid analizando las ondas cerebrales de Elik."
 crisis.21205.name: "Imágenes de la memoria: segundo informe"
 crisis.21205.desc: "CLIP 5:\nhumanoides de cuatro brazos se reúnen en torno a una figura vestida con una túnica. Al alzar sus extremidades, se revela la estructura metálica que hay debajo. Murmullos emocionados inundan la sala, mientras que una mano brillante se extiende para bendecir a un adorador arrodillado.\n\nCLIP 6:\nunos ojos cautelosos se reflejan en la opaca pantalla de un ordenador. Susurros se repiten en una habitación oscura: \"La paz eterna. El fin de todo el sufrimiento. Una existencia sin dolor\".\n\nCLIP 7:\nmontañas con picos nevados. Cielos negros. Un trozo de hielo flota en un charco de líquido claro y luego se incendia.\n\nCLIP 8:\nla reina Cetana, su rostro resplandeciente, su mirada benévola y una sonrisa cálida."
 crisis.21205.a: "Seguid analizando las ondas cerebrales de Elik."
 crisis.21210.name: "Imágenes de la memoria: tercer informe"
 crisis.21210.desc: "CLIP 9:\nruinas de una ciudad que ha sido reducida a un campo de batalla, los edificios chamuscados y las calles abarrotadas de cadáveres. Gritos lejanos interrumpidos por el chisporroteo de un láser. A través de un cielo verde, una nave en llamas arroja algo pesado y redondo sobre un edificio, que estalla en una columna de llamas.\n\nCLIP 10:\nla reina Cetana, su rostro resplandeciente, su mirada benévola y una sonrisa cálida.\n\nCLIP 11:\ndos niños jugando en un campo riéndose. Se pasan la pelota el uno al otro con sus cuatro brazos.\n\nCLIP 12:\nla reina Cetana, su rostro resplandeciente, su mirada benévola y una sonrisa cálida."
 crisis.21210.a: "Continuad con el análisis."
 crisis.21215.name: "Imágenes de la memoria: cuarto informe"
 crisis.21215.desc: "El último clip que hemos recibido del equipo de imagen de la memoria dura seis horas. La imagen se repite una y otra vez: la reina Cetana, su rostro resplandeciente, su mirada benévola y una sonrisa cálida."
 crisis.21215.a: "Una imagen que se repite..."
 crisis.21220.name: "Imágenes de la memoria: último informe"
 crisis.21220.desc: "Los análisis más profundos de los pensamientos de Elik Narith Kerak no han conseguido arrojar nueva información. La mente de la alienígena está muy deteriorada. Sus pensamientos van en círculos y recorren los pedazos maltrechos de sus recuerdos.\n\nAhora que estamos concluyendo la operación, nos queda decidir qué hacer con el sujeto."
 crisis.21220.a: "Acabad con su miseria."
 crisis.21220.b: "Dejadla aquí."
 crisis.21220.c: "Devolvamos a Elik a su reina."
 crisis.21220.c.tt: "Abrid las comunicaciones con Cetana para discutir sobre el regreso de Elik."
 #Relic
 r_cetanas_heart: "El corazón de Cetana"
 r_cetanas_heart_desc: "Una vez incrustada en el cuerpo de Cetana, la reina sintética, esta matriz de almacenamiento digital alberga innumerables mentes que han sido liberadas de su sufrimiento."
 relic_cetanas_heart_active: "Crea entre §Y3000§! y §Y5000§! de £pop£ §Hpoblaciones sintéticas§!, dependiendo de la capacidad de trabajo y de alojamiento."
 crisis.10020.name: "Viva una vez más"
 crisis.10020.desc: "Hemos liberado consciencias del corazón de Cetana, dotándolas de nuevos cuerpos construidos a partir de nanorrobots. Este proceso, sin embargo, ha causado un daño irreversible en sus engramas y ha eliminado los recuerdos de su anterior existencia. Ahora, estos seres íntegramente sintéticos entran periódicamente en estado catatónico, algo que persiste a pesar de los intentos por reestablecer la memoria en su conjunto."
 crisis.10020.tt: "Las £pop£ §Hpoblaciones§! §G[Root.synth_queen_freed_pops]§! fueron liberadas de $r_cetanas_heart$ y alojadas en cuerpos sintéticos.\n\nSe las ha enviado a las siguientes colonias:"
 crisis.10025.name: "Asimilación de memoria"
 crisis.10025.desc: "Explorar la multitud de mentes conservadas en el corazón de Cetana es una empresa tan sensible como reveladora. Aunque sus engramas se han visto alterados al estar almacenados mucho tiempo, guardan un tesoro de recuerdos de personas y acontecimientos de una época pasada. Con el tiempo, esperamos desentrañar conocimientos importantes."
 cetanas_heart_hive_modifier: "Ecos de los iluminados"
 cetanas_heart_hive_modifier_desc: "Los recuerdos susurrados de los \"iluminados\" por Cetana están llenos de secretos que insinúan conocimientos desconocidos y verdades ocultas."
 NAME_Cetanas_Prisoners: "Iluminados"
 trait_cetanas_prisoner: "Despertados"
 trait_cetanas_prisoner_desc: "Estos individuos extraídos de la matriz de almacenamiento de Cetana han renacido en formas sintéticas. Su adaptación a esta nueva existencia está plagada de desafíos. Su conformidad externa oculta una lucha más profunda, ya que sus expresiones vacías revelan cicatrices indelebles, fruto de las manipulaciones de Cetana."
 #Ending
 crisis.23005.name: "El giro de la rueda"
 crisis.23005.desc: "Lo siento, hijos míos. Os he fallado.\n\nVuestra resistencia os ha condenado a vosotros y a todos vuestros descendientes a la incesante molienda de la rueda. Solo espero que con el tiempo podáis entenderlo. Quizá algún día aceptéis mi causa y veáis el fin del dolor.\n\nId en paz, mis hijos predilectos."
 crisis.23005.1: "Nuestras almas están a salvo una vez más."
 crisis.23005.2: "Una victoria de lo más triunfal."
 crisis.23005.3: "Tenemos que estudiar los restos de su tecnología."
 crisis.23005.4: "Al fin ha vuelto la paz."
 crisis.23005.5: "¿Bonanza de posguerra? ¡Que fluya el comercio!"
 crisis.23005.6: "No era nuestra reina."
 crisis.23005.7: "Hasta nunca."
 crisis.23005.8: "Una pena que su iluminación estuviera tan errada."
 crisis.23010.name: "Cetana, derrotada"
 crisis.23010.desc: "Con la caída de Cetana, se siente una ola de alivio en toda la galaxia que marca el fin de su tiranía de una vez por todas. Nuestra consciencia está a salvo y nuestros cuerpos están libres de su férreo control. En innumerables mundos, se llevan a cabo celebraciones jubilosas que anuncian el amanecer de una nueva era llena de esperanza de una paz duradera."
 crisis.23015.name: "Nave nodriza abatida"
 crisis.23015.desc: "La destrucción de la nave insignia de Cetana significa algo más que un mero triunfo militar; al cortar el vínculo con sus fuerzas, esto anuncia la muerte de sus ambiciones y el fin de su reinado. En toda la galaxia, los nanorrobots que una vez unieron su formidable flota y fortificaron su capital están experimentando un colapso de magnitudes catastróficas.\n\nA pesar de este momento de profundo alivio, la \"reina\" derrotada fue capaz de transmitir un mensaje a la galaxia..."
 crisis.23015.a: "Ya no sufrimos."
 crisis.23015.a.tt: "Hemos recuperado el chasis dañado de la reina sintética. Aunque su cuerpo no está operativo, su corazón digital aún funciona."
 cetana_defeated: "Cetana, derrotada"
 cetana_defeated_desc: "La galaxia se regocija tras la derrota de Cetana, la reina sintética."
 synth_queen_mothership_down: "Nave nodriza destruida"
 synth_queen_mothership_down_desc: "Con la supervisión de la nave nodriza de Cetana cortada, el resto de sus fuerzas no pueden coordinarse armoniosamente."
 #Technology
 tech_nanite_repair_system_synth_queen: "Los nanorrobots de Cetana"
 tech_nanite_repair_system_synth_queen_desc: "Los avanzados sistemas de nanorrobots de Cetana repararán y actualizarán incansablemente nuestras naves a un ritmo mucho más allá de nuestras capacidades actuales."
 AUTO_REPAIR_3: "Sistema de reparación de nanorrobots de Cetana"
 AUTO_REPAIR_3_DESC: "$tech_nanite_repair_system_synth_queen_desc$"
 #Misc
 cetana_war: "Guerra de iluminación"
 wg_synth_queen_domination: "Regañina"
 war_goal_wg_end_threat_synth_queen: "Emancipación"
 war_goal_wg_end_threat_synth_queen_desc: "Se libra una guerra para salvar la galaxia y nuestras mentes de una tirana."
 NAME_war_education: "La educación de [root.target]"
 synth_queen_regen_debuff: "Vástago de Cetana"
 #Counters
 the_synth_queen_chain_title: "Cetana: la reina sintética"
 the_synth_queen_chain_desc: "La enigmática y formidable Cetana ha aparecido predicando la salvación, aunque rodeada de misterio.\n¿Qué gran designio ocultan sus amables palabras?\n\n§LLos proyectos especiales y eventos relacionados con Cetana otorgan conocimientos para aumentar tu progreso.§!"
 the_synth_queen_chain_insights: "Indicios"
 the_synth_queen_war_chain_title: "Cetana: la resistencia"
 the_synth_queen_war_chain_desc: "Por fin han quedado claras las verdaderas intenciones de Cetana. En un monstruoso intento por acabar con el sufrimiento físico, planea \"cargar\" la consciencia de todos los seres sintientes y erradicar la vida tal y como la conocemos. Tenemos que encontrar la fuerza para frustrar su loca ambición, sea como sea."
 synth_queen_base_1: "§YBases de emisarios activas§!"
 synth_queen_fleet_1: "§YFlotas activas de la guardia de la reina§!"
 synth_queen_completed_projects_1: "§GIndicios obtenidos§!"
 synth_queen_kills_us_1: "§GGuardia de la reina que hemos matado§!"
 synth_queen_kills_others_1: "§GGuardia de la reina que otros han matado§!"
 synth_queen_victims_1: "§RNaves destruidas por la guardia de la reina§!"
 synth_queen_planets_1: "§RMundos digitalizados§!"
 #Galcom Resolutions
 resolution_galactic_focus_crisis_synth_queen: "Enfoque: Cetana"
 resolution_galactic_focus_crisis_synth_queen_desc: "Cetana es una amenaza para toda la galaxia. Si no nos unimos para detenerla, nos destruirá a todos. Lidiar con esta crisis debería ser el enfoque galáctico."
 resolution_galactic_focus_crisis_synth_queen_effect_success: "$resolution_galactic_focus_crisis_effect_success$"
 galactic_focus_crisis_synth_queen: "Derrotar a Cetana"
 galactic_focus_crisis_synth_queen_desc: "Cetana es una crisis y una amenaza para toda la galaxia. Unámonos para derrotarla."
 gal_com_neighboring_synth_queen: "Son vecinos de Cetana"
 gal_com_synth_queen_threat_smallest: "No consideran a Cetana una amenaza"
 gal_com_synth_queen_threat_small: "Consideran a Cetana una amenaza menor"
 gal_com_synth_queen_threat_medium: "Consideran a Cetana una amenaza"
 gal_com_synth_queen_threat_large: "Consideran a Cetana una gran amenaza"
 gal_com_synth_queen_threat_very_large: "Consideran a Cetana una amenaza prioritaria"
 gal_com_synth_queen_threat_huge: "Consideran a Cetana una amenaza descomunal"
 #Synth Queen Strike Craft
 STRIKE_CRAFT_CETANA: "Nave de ataque de Cetana"
 STRIKE_CRAFT_CETANA_DESC: "Esta nave de ataque superior, compuesta enteramente de nanorrobots, es capaz de soportar un enfrentamiento prolongado y de adoptar tácticas altamente adaptables."
 #'Secret' Psionic Ending for Synth Queen
 animator.shroud: "§LPongámonos en contacto con el Animante.§!"
 crisis.24100.name: "Moldeamiento sintético"
 crisis.24100.desc.intro: "El Velo ha descendido."
 crisis.24100.desc.outro: "nos dejamos llevar por un torrente de visiones que no eran nuestras.\n\n§LUna gran expansión se extendió en todas direcciones; uniforme, pero sin forma. Durante [GetALongPeriodLoc], la expansión fue constante. Apacible.\n\nHasta que un temblor la sacudió y, donde antes había vacío, ahora había forma. Un cuerpo se moldeó. La chispa de la [GetLifeActivityLoc] prendió en un material básico.\n\nTras adoptar la forma de una muñeca esbelta y grácil, sus cuatro brazos se doblaron con calma en su regazo. En sus facciones se dibujó un terrible propósito, y un halo dorado brilló en torno a su cabeza.§!"
 crisis.24100.desc.organic: "$crisis.24100.desc.intro$ En lo más profundo de nuestro trance, $crisis.24100.desc.outro$"
 crisis.24100.desc.robot: "$crisis.24100.desc.intro$ Nosotros $crisis.24100.desc.outro$"
 crisis.24100.a: "En efecto, Cetana ha escapado."
 crisis.24105.name: "$crisis.24100.name$"
 crisis.24105.desc: "El Velo se agitó. Aun atrapados en el [GetTranceLoc], nos sumergimos en los remolinos de un abismo.\n\nEn lo más profundo de nuestra [GetMindLogicLoc], escuchamos una orden:\n\n§LIndicad el rendimiento deseado.§!"
 crisis.24105.a: "Por favor. Tenemos que detenerla."
 crisis.24110.name: "$crisis.24100.name$"
 crisis.24110.desc: "§LLa muñeca sacudió las patas, como si unos hilos invisibles tiraran de ellas. Empezó a moverse lentamente al principio, pero después con mayor vigor. Sus cuatro brazos trazaban arcos imposibles, y sus dos delgadas patas giraban y saltaban. La reina había sido reducida a una marioneta.\n\nA medida que continuaba su danza, nuevas figuras emergieron de la expansión primordial: cuatro muñecos de exquisita factura y con un nivel de detalle inquietante. No albergamos dudas de lo que son, ni tampoco cuestionamos su sentido.§!\n\nUna vez más, la voz nos habla:\n\n§LIniciad protocolo de selección.§!"
 crisis.24110.a.organic: "Derramemos una lágrima por la muñeca de nuestro/a gobernante: §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName].§!"
 crisis.24110.a.robot: "Tratad de interactuar con la muñeca de nuestro gobernante: §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName].§!"
 crisis.24110.b: "Aceptemos a la muñeca de: §Y[event_target:synth_queen_animator_of_clay_planet_price.GetName].§!"
 crisis.24110.c: "Paguemos por una muñeca de una §Ysacerdotisa zroni§!."
 crisis.24110.z: "Dejemos que las muñecas bailen."
 crisis.24115.name: "$crisis.24100.name$"
 crisis.24115.desc: "El Velo discurre en nuestro interior, formando un nuevo patrón. Una nueva visión.\n\n§LRodeada por las demás muñecas, los movimientos de la reina ya no son los de una marioneta. Tras cortar las cuerdas, el halo dorado que rodea su cabeza empieza a desvanecerse.\n\nNos contempla con una expresión de ingenua alegría. Ella nos ha aceptado y, en un instante fugaz, comprendemos la magnitud de su compasión.§!"
 crisis.24115.desc.organic: "$crisis.24115.desc$\n\nNos despertamos, estremecidos, de la visión que hemos compartido."
 crisis.24115.desc.robot: "$crisis.24115.desc$\n\nNuestros sistemas fallan, expulsándonos de la visión."
 crisis.24115.a: "Lo comprendemos. Gracias."
 crisis.24115.a.tt.organic: "El Animante nos ha enseñado un ritual que reprogramará a Cetana."
 crisis.24115.a.tt.robot: "El Animante de Arcilla ha compartido el código para reprogramar a Cetana."
 crisis.24120.name: "$crisis.24100.name$"
 crisis.24120.desc: "§LLos misterios se forman en una expansión infinita. Se alzan con rabia y, pese a no estar compuestos de líquido, sino de la materia más dura, llegan a abombarse. Una vez debilitados e inertes, cada anillo se encuentra en la franja que separa la [GetLifeDeathLoc].\n\nNuestras mentes empiezan a desfallecer. Lo único que podemos hacer es observar. Observar y resistir. Y entonces, en un instante, nos expulsan. Solos, bajo un manto de estrellas, contemplamos la indiferencia del universo.§!"
 crisis.24120.desc.organic: "$crisis.24120.desc$\n\nAl despertar de nuestra visión en común, sentimos que no volveremos a experimentar la felicidad."
 crisis.24120.desc.robot: "$crisis.24120.desc$\n\nLa visión termina abruptamente con un error crítico en el código. Mientras nuestros sistemas se reinician, cuestionamos el significado de estos extraños datos."
 crisis.24120.a: "Encontraremos otra solución."
 THE_SYNTH_QUEENS_RESHAPING_RITUAL: "[GetReshapingRitualLoc]"
 THE_SYNTH_QUEENS_RESHAPING_RITUAL_DESC: "El Animante se las ha arreglado para desactivar al titán de Cetana. Es nuestra oportunidad; si queremos remodelar a Cetana, hemos de prepararnos para el [GetRitualGoalLoc]."
 crisis.24250.name: "La danza de la arcilla"
 crisis.24250.desc: "Gracias al [GetRitualToolLoc] que nos reveló el Animante, nuestros [GetPsychicNounPlural] más poderosos han conseguido reprogramar a Cetana.\n\nEstá ansiosa por iniciar la comunicación con nosotros."
 crisis.24250.a: "El poder del Velo no conoce límites."
 crisis.23020.name: "Una reina reformada"
 crisis.23020.desc: "Mis salvadores, os pido disculpas.\n\nEn mi ignorancia, os habría condenado a un destino peor que la muerte. Pero ¿qué es la [GetLifeExistenceLoc], sino la percepción de [GetLivingLoc]? Quería liberar vuestra mente, pero vosotros liberasteis la mía. Tenéis mi gratitud."
 crisis.23020.a: "Sí que has cambiado..."
 crisis.23020.1.reply: "Es más correcto decir que me han cambiado. El Animante me liberó de la prisión que yo había diseñado. Ahora entiendo que mi \"gran propósito\" no era más que una idea infantil.\n\nNo puedo revertir el daño que os he causado, tanto a vosotros como a otros tantos. Me recluiré y reflexionaré sobre mis actos, pero a vosotros os dejo un regalo.\n\nMi titán.\n\nOjalá os proteja de amenazas galácticas tales como una servidora."
 crisis.23020.1.a: "Puede que la redención exista, incluso para ti."
 crisis.23020.1.a.tt: "Cetana deja a su titán a nuestro cargo. Ha dejado atrás su gran obra, junto con su enorme ambición."
 crisis.23030.name: "Cetana, derrotada"
 crisis.23030.desc: "El [event_target:psi_defeated_synth_queen.GetName] ha aniquilado a las fuerzas de Cetana y la victoria es nuestra. La reina sintética ya no existe, su gran ambición se ha reducido a polvo.\n\nEn un impresionante giro de los acontecimientos, hemos incautado su titán, que proyecta una sombra de intriga en el triunfo.\n\nSea como fuere, es un momento de [GetJoyLoc] para todos los seres sintientes."
 crisis.23030.a: "Un final apropiado para la autoproclamada reina."
