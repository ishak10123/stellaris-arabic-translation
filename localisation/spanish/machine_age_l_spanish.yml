 trait_robot_history_warbot: "Máquina de guerra"
 trait_robot_history_warbot_desc: "Creadas inicialmente para la guerra y para reforzar la seguridad, estas máquinas presentan unos tiempos de reacción extraordinarios, un blindaje fortificado y robustos sistemas de apoyo."
 trait_robot_history_artbot: "Bot doméstico"
 trait_robot_history_artbot_desc: "Diseñadas originalmente como droides para el servicio doméstico, estas máquinas poseen una excelente motricidad, una eficaz gestión de los recursos y una excepcional capacidad para realizar múltiples tareas."
 trait_robot_history_explorebot: "Generador de arte"
 trait_robot_history_explorebot_desc: "Estas máquinas, que no se diseñaron inicialmente para ser prácticas, sobresalen en actividades artísticas y culturales, con impresionantes algoritmos creativos, intrincados procesos de diseño y resultados expresivos."
 trait_robot_history_researchbot: "Ayudantes de investigación"
 trait_robot_history_researchbot_desc: "Diseñadas inicialmente como ayudantes de investigación, estas máquinas muestran una aguda capacidad analítica, una rápida asimilación de la información y una búsqueda incesante de descubrimientos científicos."
 trait_robot_history_resourcebot: "Bots de trabajo"
 trait_robot_history_resourcebot_desc: "Estas máquinas se diseñaron con el propósito de extraer materias primas. Las herramientas especializadas, las juntas reforzadas y los sistemas modulares las convierten en los trabajadores ideales."
 trait_robot_history_chatbot: "IA conversacional"
 trait_robot_history_chatbot_desc: "Diseñadas inicialmente para proporcionar apoyo social a sus creadores, las máquinas poseen algoritmos avanzados de empatía y habilidades de comunicación impecables, lo que las convierte en compañeras ideales."
