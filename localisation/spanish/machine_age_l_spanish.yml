 tech_lathe_validator_desc: "$building_lathe_validator_desc$"
 building_lathe_capital: "Unidad de procesamiento"
 building_lathe_capital_desc: "La naturaleza cuántica de las unidades de procesamiento del torno sináptico nos permite computar múltiples capas dimensionales en paralelo."
 building_lathe_major_capital: "Unidad de procesamiento: en paralelo"
 building_lathe_major_capital_desc: "Esta unidad de procesamiento mejorada ya es más capaz de ejecutar operaciones paralelas rebotando los ecos cognitivos de los chips neurales en los espacios contenidos en el espacio gamma."
 building_lathe_super_capital: "Unidad de procesamiento: vectorial"
 building_lathe_super_capital_desc: "Esta unidad de procesamiento mejorada simplifica la computación a base de crear vectores de espacio negativos. Esta compartimentación dimensional de procesos produce resultados extraordinarios en eficiencia y estabilidad."
 building_lathe_resonator: "Resonador sináptico"
 building_lathe_resonator_desc: "Los resonadores controlan y redireccionan el potencial cognitivo de los pensamientos aislados y los sistemas autónomos, por lo que cada chip mejorará la eficacia de procesamiento de sus vecinos colindantes."
 lathe_resonator_tt: "§Y$job_neural_chip_plural$§! Rendimiento: §G+1%§! por §Y$job_neural_chip_plural$§!\n(Valor actual: §G+[num_neural_chips]%§!)"
 building_lathe_stabilisator: "Estabilizador neuronal"
 building_lathe_stabilisator_desc: "Los sistemas de estabilización aíslan el ruido generado al computar cuando el malestar físico abruma a los chips neurales. La reducción de las interferencias mejoraría el rendimiento en general."
 building_lathe_overclocker: "Acelerador sináptico"
 building_lathe_overclocker_desc: "El torno se ha diseñado para preservar los chips neurales instalados y que rindan tanto tiempo como sea posible. El acelerador puede anular estos comandos, acelerando y mejorando el rendimiento, pero conlleva una mayor tasa de fallos."
 building_lathe_preserver: "Preservador sináptico"
 building_lathe_preserver_desc: "Los componentes orgánicos de la red son especialmente vulnerables a las fluctuaciones enérgicas, las cuales pueden causar una veloz degeneración axonal. El preservador intentará reducir dichas fluctuaciones para proteger las piezas más delicadas del torno sináptico."
 building_lathe_reactor: "Reactor ampliado"
 building_lathe_reactor_desc: "Cuantos más chips conectemos a la red, más energía será necesaria para mantenerla. Al instalar más reactores, reduciremos la compleja logística interna para suministrar energía al torno sináptico."
 building_lathe_life_support: "Sustentador sináptico"
 building_lathe_life_support_desc: "Unas instalaciones especializadas organizarán el mantenimiento de los componentes críticos del torno, por lo que podremos conservar más chips en un entorno de red más saludable."
 building_lathe_cogitator: "Pensador sináptico"
 building_lathe_cogitator_desc: "Calcular cadenas de suministro hiperespacial es una tarea compleja. Redirigir parte del poder de procesamiento ayudará incluso a la flota más grande a profundizar en territorio enemigo."
 building_lathe_cogitator_tt: "§YCapacidad naval§!: §G+1%§! por §Y$job_neural_chip_plural$§!\n(Valor actual: §G+[num_neural_chips]%§!)\n§YExperiencia de nave obtenida§!: §G+2%§! por §Y$job_neural_chip_plural$§!\n(Valor actual: §G+[num_neural_chips_double]%§!)"
 building_lathe_validator: "Validador sináptico"
 building_lathe_validator_desc: "Si bien el principal objetivo de las funciones del validador es ayudar a formular tesis de la infinitud, también puede aplicarse a aspectos más generales de la computación."
 building_lathe_validator_tt: "$mod_category_computing_research_speed_mult$: §G+1%§! por §Y$job_neural_chip_plural$§!\n(Valor actual: §G+[num_neural_chips]%§!)"
 ### Synaptic Lathe UI
 SYNAPTIC_LATHE_STABILITY_DESC: "La §E$r_stability$ mide la estabilidad general de la red del torno sináptico. Se determina principalmente por la £happiness£ §Yfelicidad§! general de los chips neurales.\n\nLa estabilidad puede reducirse por condiciones como la £housing£ §Rsuperpoblación§! o los £amenities£ §Rbajos servicios§!. Una alta $PLANET_STABILITY_TITLE$ aumentará la producción de recursos, mientras que una $PLANET_STABILITY_TITLE$ baja la reducirá. A diferencia de otras colonias, el torno sináptico nunca sufrirá §Yrebeliones§! a escala completa.§!"
 SYNAPTIC_LATHE_RESISTANCE_DESC: "§ELa §Yresistencia§! mide el nivel general de los problemas causados por los chips neurales rebeldes. Un alto nivel de £crime£ §Yresistencia§! acelerará el §Ydeclive de la población§! y mejorará sus opciones para escapar. Por lo general, esto sucede al tener una población planetaria grande, y puede mitigarse al aumentar la £happiness£ §Yfelicidad§! o construir £building£ §Yestabilizadores neurales§!.§!"
 SYNAPTIC_LATHE_HOUSING_DESC: "El §E§Y$PLANET_HOUSING_TITLE$§! representa las infraestructuras que albergan los chips neurales. La falta de espacio para acomodarlos o mantenerlos adecuadamente reducirá la $r_stability$. Puedes aumentar el §Yalojamiento§! al construir más £district£ §Ydistritos§!, mejorar la §Yunidad de procesamiento§! del torno o crear £building£ §Ysustentadores sinápticos§!.§!"
 SYNAPTIC_LATHE_AMENITIES_DESC: "§ELos §Y$PLANET_AMENITIES_TITLE$§! representan las infraestructuras dedicadas a satisfacer las necesidades de soporte vital de los chips neurales. Un planeta que no produce suficientes $PLANET_AMENITIES_TITLE$ para su población sufrirá penalizaciones a la £happiness£ §Yfelicidad§!. Puedes aumentar los §Yservicios§! al mejorar la §Yunidad de procesamiento§! del torno o construir £building£ §Ysustentadores sinápticos§!.§!"
 SYNAPTIC_LATHE_RESISTANCE_TITLE: "Resistencia"
 POP_BASE_RESISTANCE: "Resistencia básica: $VALUE|2Y$"
 TOOLTIP_RESISTANCE: "Resistencia: £crime£ $VALUE|Y1$"
