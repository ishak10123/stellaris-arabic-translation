 #MACHINE AGE TRAITS #
 ######################
 #CYBORG
 trait_cyborg_stainless_steel_smile: "Aumentos embellecidos"
 trait_cyborg_stainless_steel_smile_desc: "Esta especie aboga por los grabados personalizados, los componentes de repuesto y las paletas de colores para causar el mayor impacto visual. A veces, lo único que podemos hacer es lucir cromo."
 trait_cyborg_welded_countenance: "Aumentos utilitaristas"
 trait_cyborg_welded_countenance_desc: "Estos cíborgs emplean piezas rudimentarias pero funcionales, sin apenas prestar atención a la estética. A veces, con que haga el trabajo va que chuta."
 trait_cyborg_apathy_loops: "Implantes abrasivos"
 trait_cyborg_apathy_loops_desc: "Los implantes de estos cíborgs son toscos y no están hechos a medida, lo que produce irritaciones subdérmicas y averías ocasionales. No afecta al cuerpo, pero la mente lo pasa fatal."
 trait_cyborg_bionic_engineers: "Ingenieros biónicos"
 trait_cyborg_bionic_engineers_desc: "Herramientas y modificaciones de implantes elaboradas con precisión para asistir en los proyectos de ingeniería más exigentes."
 trait_cyborg_bionic_physicists: "Físicos biónicos"
 trait_cyborg_bionic_physicists_desc: "Los múltiples módulos de procesamiento integrados producen cálculos de física al instante sin tener que conectarse a una unidad de computación externa."
 trait_cyborg_bionic_sociologists: "Sociólogos biónicos"
 trait_cyborg_bionic_sociologists_desc: "Los controladores de empatía y la heurística conductual abren una vía rápida a la investigación sociológica al procesar los análisis más complejos como si fuese un segundo cerebro."
 trait_cyborg_integrated_weaponry: "Arsenal integrado"
 trait_cyborg_integrated_weaponry_desc: "La fusión entre armamento y extremidades cibernéticas añade una potencia de fuego instantánea tanto al ejército como a las fuerzas de la ley."
 trait_cyborg_delicate_frames: "Estructuras delicadas"
 trait_cyborg_delicate_frames_desc: "Los componentes y la instalación deficientes han dado como resultado un chasis cíborg frágil. Las operaciones más básicas no se verán comprometidas, pero se recomendará a los usuarios que no se expongan a situaciones de peligro físico."
 trait_cyborg_scarcity_algorithms: "Algoritmos de escasez"
 trait_cyborg_scarcity_algorithms_desc: "Al programar siendo muy conscientes de los costes, es probable que asuman menos riesgos para obtener un beneficio mayor."
 trait_cyborg_limited_memory: "Memoria limitada"
 trait_cyborg_limited_memory_desc: "La falta de memoria operativa ha producido un cuello de botella en la capacidad de aprendizaje, por lo que el usuario no puede procesar las experiencias en su totalidad."
 trait_cyborg_climate_adjustment_dry: "Alteraciones de clima seco"
 trait_cyborg_climate_adjustment_dry_desc: "Las modificaciones hechas a medida, como el reciclaje de fluidos y el blindaje contra la radiación, son perfectas para soportar un clima seco, pero menos adecuadas en otros."
 trait_cyborg_climate_adjustment_dry_tt: "Habitabilidad en clima seco: §G+$@cyborg_hab_preference|0%$§!\n$t$- Otorga hasta un §G125%§! de habitabilidad en planetas con clima seco, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_wet: "Alteraciones de clima húmedo"
 trait_cyborg_climate_adjustment_wet_desc: "El aislamiento intenso y la protección de las bioformas alienígenas se han adaptado para los climas húmedos, aunque en los demás resultarán peores."
 trait_cyborg_climate_adjustment_wet_tt: "Habitabilidad en clima húmedo: §G+$@cyborg_hab_preference|0%$§!\n$t$- Otorga hasta un §G125%§! de habitabilidad en planetas con clima húmedo, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_cold: "Alteraciones de clima frío"
 trait_cyborg_climate_adjustment_cold_desc: "Componentes de calefacción mejorados y lubricantes resistentes al frío adaptados para los climas fríos, aunque para los demás resultarán perjudiciales."
 trait_cyborg_climate_adjustment_cold_tt: "Habitabilidad en clima frío: §G+$@cyborg_hab_preference|0%$§!\n$t$- Otorga hasta un §G125%§! de habitabilidad en planetas con clima frío, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_mass_produced: "Implantes reacondicionados"
 trait_cyborg_mass_produced_desc: "Al imponer por decreto la retrocompatibilidad de los implantes obligatorios, se reduce en gran medida el coste de equipar a los ciudadanos neonatos."
 trait_cyborg_propaganda_machines: "Filtros de obediencia"
 trait_cyborg_propaganda_machines_desc: "Las unidades de análisis cortical propinan descargas a los usuarios cuando el pensamiento sedicioso apenas comienza a gestarse, mientras que a ciudadanos modélicos les suministra gratificación hormonal."
 #MACHINE
 trait_robot_artificial_engineers: "Núcleo de ingeniería"
 trait_robot_artificial_engineers_desc: "Núcleos de memoria dedicada y recursos de procesamiento para investigaciones de ingeniería que permiten cálculos más rápidos y una ejecución de tareas más pronta."
 trait_robot_artificial_physicists: "Núcleo de física"
 trait_robot_artificial_physicists_desc: "Las unidades de procesamiento personalizadas y las subrutinas de memoria para la investigación en física reducen la dependencia de la computación externa."
 trait_robot_artificial_sociologists: "Núcleo de sociología"
 trait_robot_artificial_sociologists_desc: "Las unidades de procesamiento avanzadas contienen algoritmos de investigación en sociología dedicados a este campo variado y exigente."
 trait_robot_integrated_weaponry: "Arsenal integrado"
 trait_robot_integrated_weaponry_desc: "La integración de armas de guerra en cuerpos mecánicos aumenta la eficacia operativa y la versatilidad en situaciones de combate cambiantes."
 trait_robot_delicate_frames: "Chasis delicado"
 trait_robot_delicate_frames_desc: "La precariedad de los materiales y un proceso de montaje deficiente han dado lugar a un cuerpo mecánico frágil. Se recomienda a los drones que eviten peligros físicos en la medida de lo posible."
 trait_robot_scarcity_algorithms: "Subrutinas de escasez"
 trait_robot_scarcity_algorithms_desc: "La frugalidad es fundamental para su programación. Esto suele desembocar en patrones de comportamiento perjudiciales necesarios para acciones comerciales rentables."
 #Pre-Scripted Empires
 EMPIRE_DESIGN_BASIDRIX_CYBER_ECCLESIA: "Iglesia Cibernética de Basidrix"
 EMPIRE_DESIGN_basidrix_cyber_ecclesia_desc: "En la sagrada amplitud del cosmos, la Iglesia Cibernética de Basidrix se yergue para dar testimonio de una fe inquebrantable. Guiada por mandato divino, la Iglesia propugna una fusión sublime entre los fibrosos tejidos y la fría precisión del cromo.\n\nEsta senda no ha estado exenta de retos. Muchos cultos se han alzado y caído, cada uno con la firme convicción de que solo ellos conocían la verdad. Semejante fe no puede evitar encender una llama: la historia de la Iglesia está escrita con sangre y acero destrozado. Sin embargo, fue la guerra la que moldeó a un pueblo con una convicción inquebrantable.\n\nAhora, la Iglesia afronta un nuevo desafío: la interminable expansión de las estrellas. ¿Será una prueba de fe, o una oportunidad para salvarnos? A medida que se adentren en el vacío, los fieles solo podrán tener la certeza de una cosa:\n\nque la divinidad reside en la fusión, y su veneración pasa por los aumentos."
