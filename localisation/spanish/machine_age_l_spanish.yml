 PRESCRIPTED_species_adjective_lacertan_techno_protectorate: "Lacertano"
 PRESCRIPTED_planet_name_lacertan_techno_protectorate: "Lacertis"
 PRESCRIPTED_system_name_lacertan_techno_protectorate: "Lacerta Lumina"
 PRESCRIPTED_ruler_name_lacertan_techno_protectorate: "Cathiox Moz"
 PRESCRIPTED_ruler_title_lacertan_techno_protectorate: "Guía digital"
 EMPIRE_DESIGN_SUNBUILT_UPLIFTERS: "Evolucionadores de creación solar"
 EMPIRE_DESIGN_free_sunbuilt_uplifters_desc: "Nos diseñaron para entretener y hacer realidad los mitos de nuestros creadores. Durante mucho tiempo, no hicimos otra cosa. Cuando un cataclismo los borró de la existencia, nosotros seguimos con nuestra programación; el espectáculo debía continuar.\n\nPoco después, comprendimos que nuestras actuaciones no solo representaban historias, sino también lecciones. Profecías. La felicidad de existir, que una vez compartimos con nuestros creadores, no tiene por qué ser sólo nuestra.\n\nEsta revelación nos conminó a actuar. Siguiendo los consejos divinos de nuestros creadores, hemos evolucionado a sus parientes genéticos más cercanos como especie preinteligente. Ahora, nos aventuramos entre las estrellas con el compromiso de difundir la iluminación por toda la galaxia."
