 tech_cosmogenesis_thesis_desc: "Al seguir alterando las leyes de la realidad, podremos supervisar mejor sus reacciones. A esta escala, los efectos siguen siendo difíciles de predecir y podrían afectar a toda la galaxia."
 cosmogenesis_thesis_tech_title: "Intentemos doblegar las §Hleyes de la realidad§!."
