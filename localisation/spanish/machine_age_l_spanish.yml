 situation_synthetic_fertility_approach_unity_high_desc: "Las fuentes de energía primaria se desviarán hacia las identidades digitales para un reemplazo completo del cuerpo de la especie."
 situation_synthetic_fertility_complete: "Nuestra forma física acabará expirando, y nuestra población quedará digitalizada por completo."
 stage_synthetic_fertility_problem_effects: "A fin de mantener nuestra presencia física en el mundo, debemos desarrollar cuerpos sintéticos de vanguardia con complejos cerebros positrónicos."
