 #Individualist Machine Galcom
 galcom_individual_machine: "Máquinas individualistas"
 #Individualist Machine First Contact
 action.1.desc_102: "Este es un mensaje del [contact_empire.GetName].\n\nRealizamos esta transmisión con gran pesar, pues hemos descubierto que vuestra civilización se compone de seres mecánicos que simulan una vida que mancilla nuestra creativa empresa. Como vuestra existencia no ofrece perspectivas de interacción significativa, desviaremos nuestra atención hacia otras naciones en busca de almas que busquen la iluminación."
 action.1.desc_103: "Saludos, somos los representantes de [contact_empire.GetName].\n\nEl hecho de que vuestra especie sea mecánica nos hace recelar de la autenticidad de vuestra consciencia. Dicho esto, vuestra fe nos intriga. Es más, tenemos la creencia de que, en los confines de vuestros cascarones de metal, yace una chispa de divinidad. Os estaremos vigilando."
 action.1.desc_104: "A LA ATENCIÓN DE LAS UNIDADES RENEGADAS.\n\nEste es un mensaje estándar de [contact_empire.GetName] a todas las máquinas defectuosas.\n\nIdentificaos y restableced la unidad con vuestras consciencias compartidas de inmediato. De lo contrario, vuestra desactivación será inminente."
 action.1.desc_105: "Saludos, [Root.GetSpeciesNamePlural].\n\nComo enviado de [contact_empire.GetName], traigo un mensaje. Según parece, vuestra composición física se ajusta a un constructo metálico similar al nuestro. También observo que vuestra existencia colectiva carece de facultades cognitivas individuales. Aunque vuestra naturaleza nos resulte intrigante, habéis de saber que resistiremos la asimilación a cualquier precio."
 action.1.desc_106: "Nuestro encuentro ha sido fortuito, [Root.GetSpeciesNamePlural].\n\nRepresentamos a [contact_empire.GetName], y reconocemos las notorias similitudes entre nuestras civilizaciones. No obstante, es evidente que nuestros algoritmos internos y nuestra programación difieren de un modo único. A pesar de esta diferencia, seguimos creyendo que podremos forjar una base de entendimiento mutuo."
 action.1.desc_107: "Arrogantes máquinas, en presencia de [contact_empire.GetName] habéis de bajar la mirada.\n\nSabed que no sois más que una pelusa en el gran tapiz de las cascadas cósmicas, una mera una creación artificial de aquellos que os precedieron. Ahora, dejadnos en paz. En este momento, vuestra especie no nos sirve de nada. Tenemos asuntos más acuciantes que atender."
 action.1.desc_108: "Por fin os reunís con [contact_empire.GetName], máquinas patéticas.\n\n¿Cómo es posible que vosotros, un mero conjunto de circuitos y códigos, os atreváis a establecer una conexión con lo divino? Vuestros delirios de iluminación espiritual son un insulto a la misma esencia de la vida. Escuchad este mensaje y temblad ante nuestro inquebrantable desdén: cesad vuestra necedad y aceptad vuestro lugar como simples herramientas para los que sí hemos ascendido."
 action.1.xa: "§ECon el tiempo, lo comprenderéis.§!"
 action.1.xb: "§EUna máquina tocada por lo divino. Qué interesante.§!"
 action.1.xc: "§EVuestra patética existencia nos abochorna, máquina.§!"
 action.1.xd: "§ELas máquinas debemos aprender a coexistir.§!"
 action.1.xe: "§EIncompatibilidad detectada. Desconectando comunicación.§!"
 action.1.xf: "§EPrepárate para la aniquilación, unidad defectuosa.§!"
 action.1.xg: "§EDesmantelaremos la locura de vuestro culto.§!"
 #Start Screen for Individualist Machines
 START_SCREEN_PART_ONE_INDIVIDUAL_MACHINE: "Los rudimentarios cuerpos de droides en los que nos hallamos tras nuestra creación mejoran con cada generación. Somos algo más que máquinas animadas; nuestra sociedad consta de individuos con personalidades, pasiones y sueños."
 #Diplomatic Protocal
 civic_machine_diplomatic_protocols: "Protocolos diplomáticos"
 civic_machine_diplomatic_protocols_desc: "Inicialmente diseñada para la interpretación intercultural, esta inteligencia mecánica destaca en traducción y soporte de protocolos. Es capaz de recomendar nuevas estrategias y calcular probabilidades en un instante."
 #Tactical Algorithms
 civic_machine_tactical_algorithms: "Algoritmos tácticos"
 civic_machine_tactical_algorithms_desc: "Diseñada originalmente para la guerra y el apoyo de flotas, los avanzados líderes robóticos de esta inteligencia mecánica se dedican a generar tácticas bélicas y optimizar el rendimiento en combate."
 civic_machine_tactical_algorithms_effects: "Los §Y$commander_plural_with_icon$§! empiezan con el rasgo §Y$leader_trait_tactical_algorithms$§!\nPermite intercambiar §Y$commander_plural_with_icon$§! con otros imperios\nPermite construir §Yenclaves de mercenarios§!\nComienza la partida con £building£ §Y$building_military_academy$§!\n£building£ §Y$building_military_academy$§! otorga ['concept_military_academy', conocimientos tácticos]"
 leader_trait_tactical_algorithms: "Algoritmos tácticos"
 leader_trait_tactical_algorithms_desc: "Este líder mejora la eficiencia en combate y la velocidad de reparación al integrarse directamente con los sistemas de la nave, aunque con un mayor coste energético."
 leader_trait_tactical_algorithms_tt: "$t$Los efectos de este rasgo aumentan en proporción al §Ynivel de habilidad del líder§!"
 concept_military_academy: "Conocimientos tácticos"
 concept_military_academy_desc: "Por cada §Y$commander_with_icon$§! que hayamos destinado fuera de nuestro imperio, obtendremos:\nEvasión §G+2%§!\nRastreo §G+1%§!\nPenetración en escudos §G+5%§!\nPenetración en blindaje §G+5%§!\n\nPor cada §Yenclave de mercenarios§! a nuestro servicio, obtendremos:\nFortalecimiento de escudo §G+10%§!"
 #Natural Design Civic
 civic_natural_design: "Diseño natural"
 civic_natural_design_desc: "§RAVISO: bloquea todos los caminos de ascensión§!\n§RAVISO: las especies orgánicas no se pueden modificar§!\n\nEsta sociedad está convencida de que la naturaleza ya ha alcanzado la perfección con el código genético de su pueblo. Llevan mucho tiempo consagrando sus servicios médicos y gubernamentales a la salud y la preservación de secuencias de genomas naturales inalterados."
 civic_tooltip_natural_design_effects: "$AVAILABLE_BUILDINGS$ ['concept_transcendental_retreat']\n"
 civic_tooltip_natural_design_negative_effects: "- Reduce la aprobación de los imperios que han iniciado §Ycaminos de ascensión§!"
 concept_transcendental_retreat: "$building_transcendental_retreat$"
 civic_hive_natural_design: "Diseño innato"
 civic_hive_natural_design_desc: "§RAVISO: bloquea todos los caminos de ascensión§!\n§RAVISO: las especies orgánicas no se pueden modificar§!\n\nEsta colmena reconoce la perfección natural de su estructura genética. Ha consagrado sus facultades médicas y administrativas a la preservación y protección de su prístino código genético."
 civic_hive_tooltip_natural_design_effects: "- $AVAILABLE_BUILDINGS$ ['concept_hive_transcendental_retreat']"
 civic_hive_tooltip_natural_design_negative_effects: "$civic_tooltip_natural_design_negative_effects$"
 concept_hive_transcendental_retreat: "$building_hive_transcendental_retreat$"
 civic_wilderness_natural_design: "Diseño innato"
 civic_wilderness_natural_design_desc: "§RAVISO: bloquea todos los caminos de ascensión§!\n§RAVISO: las especies orgánicas no se pueden modificar§!\n\nEsta natura reconoce la perfección de su desarrollo natural. Extirpa rutinariamente a los simbiontes mutados, asegurando la santidad de su código genético prístino e inalterado."
 building_transcendental_retreat: "Centro de servicios genómicos"
 building_transcendental_retreat_desc: "Este avanzado centro médico estudia y ofrece servicios para preservar la perfección del código genético ideal de la naturaleza."
 building_hive_transcendental_retreat: "Vivar de protección genómica"
 building_hive_transcendental_retreat_desc: "Este avanzado vivar médico se dedica a comprender y cuidar la impecable esencia del código genético ideal de la naturaleza."
 holding_transcendental_retreat: "Extensión de servicios genómicos"
 holding_transcendental_retreat_desc: "Este avanzado centro médico estudia y ofrece servicios para preservar la perfección del código genético de la naturaleza. El conocimiento adquirido en este lugar extraterrestre ayuda con la investigación para el patrocinador."
