 machine_age.1100.name: "El futuro de la fe"
 machine_age.1100.desc: "Hoy, nos levantamos plenamente fusionados, no solo en nuestros cuerpos y almas, sino también en nuestra fe. Los credos dogmáticos ya no tienen poder; la fusión divina será un viaje personal para todos los fieles.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1100.a: "Nuestra fe está tan unificada como nuestra [Owner.Species.GetFleshTypeCyberCreed] fusionada."
 machine_age.1100.a.tooltip: "$machine_age.geneswaptooltip$\n$cyber.21.a.end$\n$machine_age.democraticgovtooltip$"
 machine_age.1100.b.tooltip: "$machine_age.geneswaptooltip$\n$cyber.21.a.end$\n$machine_age.oligarchicgovtooltip$"
