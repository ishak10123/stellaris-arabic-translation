 situation_fulfill_overdrive: "Sobrecarga"
 situation_paperclip_stage_1: "Meses restantes"
 situation_paperclips_outcome: "Si cumplimos la cuota, podremos convertir los $r_consumer_goods$ producidos en otros recursos.\n\n[Owner.GetPaperclipStatus]"
 situation_paperclips_progress: "Este enfoque reducirá el tiempo para la siguiente evaluación de nuestra cuota de producción."
 stage_the_drive_effects: "$situation_paperclips_monthly_change_tooltip$"
 situation_paperclip_status_positive: "La cuota se ha §Gcumplido§!."
