 MACHINEAGE_TITLE: "The Machine Age" #Do not translate
 #### Cosmogenesis Crisis ####
 ap_cosmogenesis: "Cosmogénesis"
 ap_cosmogenesis_desc: "El tiempo, la gravedad y el espacio son los principales engranajes que componen el reloj de la realidad. Si averiguamos cómo manipularlos, el universo será nuestro, junto con sus secretos."
 cosmogenesis_chain_title: "Cosmogénesis"
 cosmogenesis_chain_desc: "Los grilletes de la ignorancia nos alejan de los secretos del universo.\n\nDebemos liberarnos, a cualquier precio.\n\n§R¡Imperios caídos tratarán de detenernos!§!"
 cosmogenesis_level_reached: "Nivel de crisis alcanzado"
 cosmogenesis_aborted_tt: "\n£trigger_no£ §RHemos renunciado a nuestras ambiciones cosmogenéticas.§!"
 ### Crisis Stage Techs
 tech_cosmogenesis_crisis_1: "Teoría de aprendizaje exponencial"
 tech_cosmogenesis_crisis_1_desc: "El cambio radical de perspectiva que necesitamos para comprender las infinitas capas de la realidad será un reto hasta para nuestras mentes más brillantes."
 cosmogenesis_level_1_tech_title: "Desbloquea la crisis §HCosmogénesis§! §Hnivel 2§!"
 cosmogenesis_level_1_tech_desc: "§H$tech_cosmogenesis_crisis_1$§!\nPara descifrar el funcionamiento interno de la realidad, debemos abrir la mente a una mayor escala de pensamiento."
 tech_cosmogenesis_crisis_2: "Pincel gravitatorio"
 tech_cosmogenesis_crisis_2_desc: "La gravedad y el espacio-tiempo moldean el universo. Empezaremos por la gravedad a fin de dominar los instrumentos de nuestra ascensión."
 cosmogenesis_level_2_tech_title: "Desbloquea la crisis §HCosmogénesis§! §Hnivel 3§!"
 cosmogenesis_level_2_tech_desc: "§H$tech_cosmogenesis_crisis_2$§!\nLa gravedad no es más que un pincel que podemos usar para pintar el lienzo de la realidad."
 tech_cosmogenesis_crisis_3: "Tesis teórica de infinitud"
 tech_cosmogenesis_crisis_3_desc: "Las ínfimas pero precisas alteraciones de la gravedad nos permiten introducir comandos en el código de la realidad. Mientras aprendemos el funcionamiento de esta nueva e increíble herramienta, es imperativo extremar las precauciones."
 cosmogenesis_level_3_tech_title: "Desbloquea la crisis §HCosmogénesis§! §Hnivel 4§!"
 cosmogenesis_level_3_tech_desc: "§H$tech_cosmogenesis_crisis_3$§!\nUna a una, las puntadas de la fuerza gravitacional nos permitirán perforar el espacio-tiempo."
 tech_cosmogenesis_crisis_4: "Las leyes de la realidad"
 tech_cosmogenesis_crisis_4_desc: "Los últimos experimentos confirman que nuestras ediciones de la realidad solo son temporales. Harán falta unas alteraciones más radicales para perpetuar los cambios."
 cosmogenesis_level_4_tech_title: "Desbloquea la crisis §HCosmogénesis§! §Hnivel 5§!"
 cosmogenesis_level_4_tech_desc: "§H$tech_cosmogenesis_crisis_4$§!\nLa realidad ha gemido; protesta y refunfuña mientras se afana en recomponerse de nuestras alteraciones. No podemos seguir con este curso de imprevistos."
 tech_cosmogenesis_crisis_5: "Universos emergentes"
 tech_cosmogenesis_crisis_5_desc: "El viaje a gran escala hacia distintos universos se antoja una quimera. Debemos diseñar una nave espacial que sea capaz de atravesar el tejido del espacio-tiempo y sobrevivir al viaje.\n\n§R¡Imperios caídos tratarán de detenernos!§!"
 cosmogenesis_level_5_tech_title: "§HDesbloquea la megaestructura:§! Aguja del Horizonte"
 cosmogenesis_level_5_tech_desc: "§HAguja del Horizonte§!\nUna maravilla de la tecnología. La Aguja del Horizonte es una nave civil capaz de manipular la realidad. Puede albergar a nuestra población y los conocimientos que acumulamos para llevarnos en esta migración transuniversal."
 requires_capital: "£trigger_no£ Debe construirse en la órbita de nuestra capital."
 ### Crisis Tab
 crisobj_research_tech_name: "Investigar nuevas tecnologías"
 crisobj_research_tech_desc: "Por pequeño que sea, cada nuevo descubrimiento nos lleva a comprender los entresijos de la realidad.\n\nInvestiga tecnologías y consigue una recompensa de lógica avanzada."
 crisobj_research_thesis_name: "Investigar tesis de infinitud aplicada"
 crisobj_research_thesis_desc: "Los ambiciosos experimentos para alterar las reglas que gobiernan la realidad arrojarán datos de gran valor.\n\nInvestiga estas tecnologías poco comunes y consigue una recompensa de lógica avanzada."
 crisobj_have_scholarium_vassals_name: "Conservar vasallos del scholarium"
 crisobj_have_scholarium_vassals_desc: "Centrémonos en investigar a aquellos sujetos que puedan ayudarnos en nuestra búsqueda del conocimiento absoluto.\n\nConserva a los §Yvasallos del scholarium§! y consigue una recompensa §Yanual§! de lógica avanzada."
 crisobj_neural_chips_name: "Usar chips neurales"
 crisobj_neural_chips_desc: "Tal es la escala de nuestra investigación, que debemos hacer sacrificios para facilitarla.\n\nUsa poblaciones como §Ychips neurales§! en el §Ytorno sináptico§! para obtener lógica avanzada.\n\nEl rendimiento de los §Ychips neurales§! crece en proporción al número de poblaciones del §Ytorno sináptico§!, y puede potenciarse aún más con distritos y construcciones."
 crisobj_have_science_nexuses_name: "Controlar nexos de ciencia"
 crisobj_have_science_nexuses_desc: "Lejos de toda anomalía gravitacional, este laboratorio de vanguardia sirve para cotejar datos puros del espacio-tiempo.\n\nControla megaestructuras de §Ynexos de ciencia§! con todas las mejoras para conseguir una recompensa §Yanual§! de lógica avanzada."
 crisobj_galcom_science_resolution_name: "Asegurar el apoyo de la comunidad galáctica"
 crisobj_galcom_science_resolution_desc: "Si convencemos a los miembros de la comunidad galáctica de que nuestra investigación es esencial, daríamos un gran paso para que nuestros planes avanzaran.\n\nHaz que la §Ycomunidad galáctica§! adopte §Yresoluciones§! de Conocimientos desencadenados y consigue una recompensa §Yanual§! de lógica avanzada."
 crisis_cosmogenesis_level_1: "§UPreocupante§!"
 crisis_cosmogenesis_level_1_desc: "Nivel de crisis 1"
 crisis_cosmogenesis_level_2: "§URiesgo§!"
 crisis_cosmogenesis_level_2_desc: "Nivel de crisis 2"
 crisis_cosmogenesis_level_3: "§UPeligro§!"
 crisis_cosmogenesis_level_3_desc: "Nivel de crisis 3"
 crisis_cosmogenesis_level_4: "§UCatástrofe§!"
 crisis_cosmogenesis_level_4_desc: "Nivel de crisis 4"
 crisis_cosmogenesis_level_5: "§UAmenaza existencial§!"
 crisis_cosmogenesis_level_5_desc: "Nivel de crisis 5"
 menp_cosmo_objectives: "Lógica avanzada"
 unlocks_cosmo_objectives: "Permite la acumulación de £advanced_logic£ §Y$menp_cosmo_objectives$§! al completar §Hobjetivos de crisis§!.\n\nDesbloquea la tecnología §Y$tech_cosmogenesis_crisis_1$§!, que nos acercará al cumplimiento de nuestros objetivos.\n"
 menp_cosmo_objectives_desc: "La lógica avanzada representa nuestra comprensión de las leyes que gobiernan la realidad y nuestro poder para influir en ellas."
 menp_cosmo_buildings_1: "Arcologías perfectas"
 unlocks_buildings_1: "Las construcciones sencillas de los imperios caídos ya aparecen como opciones de investigación.\n"
 menp_cosmo_buildings_1_desc: "Puede que los imperios caídos hayan olvidado cómo replicar su avanzada tecnología, pero nuestras mentes desvelarán los secretos de su época dorada."
 menp_cosmo_techs_1: "Energía no bariónica"
 unlocks_techs_1: "Desbloquea la tecnología para el componente de nave §Y$tech_dark_matter_power_core$§!.\n"
 menp_cosmo_techs_1_desc: "El siguiente paso para la generación de energía ultracompacta pasa por aprender a controlar la energía de las partículas antibariónicas."
 menp_cosmo_features_1: "Wetware"
 unlocks_features_1: "Desbloquea la tecnología para la megaestructura §YTorno sináptico§!.\n"
 menp_cosmo_features_1_desc: "El torno sináptico es un ordenador de reserva de escala gigantesca. El poder de procesamiento de las mentes en red de nuestra población se utiliza para calcular y almacenar datos. Los beneficios son evidentes, pero algunas especies descarriadas pueden ver la transmutación de los individuos en chips de computación como algo moralmente cuestionable."
 menp_cosmo_ship_2: "Escoltas enigmáticas"
 unlocks_ship_2: "Desbloquea la tecnología para las §Ynaves escolta§! de los imperios caídos.\n"
 menp_cosmo_ship_2_desc: "[Get_menp_cosmo_ship_2]"
 menp_cosmo_ship_2_desc_regular: "Una nave estelar de tamaño modesto que optimiza nuestros conocimientos del espacio-tiempo para promulgar el trascendentalismo dimensional, engrandeciendo el interior más de lo que el exterior deja entrever. A diferencia de los diseños de las naves tradicionales, su avanzado armamento conlleva un menor coste logístico."
 menp_cosmo_buildings_2: "Cosecha avanzada"
 unlocks_buildings_2: "Las construcciones avanzadas de los imperios caídos ya aparecen como opciones de investigación.\n"
 menp_cosmo_buildings_2_desc: "La generación de recursos de los imperios caídos es algo que llevaba tiempo desconcertándonos..., hasta ahora."
 menp_cosmo_techs_2: "Avances antibariónicos"
 unlocks_techs_2: "Desbloquea la tecnología para los componentes de nave §Y$tech_enigmatic_decoder$§! y §Y$tech_dark_matter_propulsion$§!.\n"
 menp_cosmo_techs_2_desc: "Nuestra mayor comprensión de la materia oscura y sus aplicaciones nos abrirá nuevas vías de progreso tecnológico."
 menp_cosmo_features_2: "Herramientas gravitacionales"
 unlocks_features_2: "Desbloquea la tecnología §Y$tech_cosmogenesis_crisis_2$§!, que nos acerca a nuestros objetivos.\n"
 menp_cosmo_features_2_desc: "$tech_cosmogenesis_crisis_2_desc$\n"
 menp_cosmo_ship_3: "Cruceros desconcertantes"
 unlocks_ship_3: "Desbloquea la tecnología para los §Ycruceros de combate§! de los imperios caídos.\n"
 menp_cosmo_ship_3_desc: "[Get_menp_cosmo_ship_3]"
 menp_cosmo_ship_3_desc_regular: "Otra nave espacial optimizada, esta vez de mayores dimensiones, que hará que los acorazados actuales parezcan juguetes."
 menp_cosmo_buildings_3: "Infraestructuras complejas"
 unlocks_buildings_3: "Las construcciones complejas de los imperios caídos ya aparecen como opciones de investigación.\n"
 menp_cosmo_buildings_3_desc: "Ahora que hemos empezado a desvelar el misterio que rodea a los imperios caídos, debemos seguir tirando del hilo. Con el tiempo, los secretos de su tecnología se irán deshilachando."
 menp_cosmo_techs_3: "Antibarión exótico"
 unlocks_techs_3: "Desbloquea la tecnología para los componentes de nave §Y$tech_enigmatic_encoder$§! y §Y$tech_dark_matter_deflector$§!.\n"
 menp_cosmo_techs_3_desc: "El uso de materia oscura en tecnologías defensivas y de codificación nos permitirá crear campos anuladores, así como robustos canales de comunicación."
 menp_cosmo_features_3: "Expansión eterna"
 unlocks_features_3: "Desbloquea la tecnología §Y$tech_cosmogenesis_crisis_3$§!, que nos acerca a nuestros objetivos.\n"
 menp_cosmo_features_3_desc: "$tech_cosmogenesis_crisis_3_desc$\n"
 menp_cosmo_ship_4: "Naves insignia insondables"
 unlocks_ship_4: "Desbloquea la tecnología para las §Ynaves titán§! de los imperios caídos.\n"
 menp_cosmo_ship_4_desc: "[Get_menp_cosmo_ship_4]"
 menp_cosmo_ship_4_desc_regular: "Estas formidables naves parecen fortalezas móviles más que otra cosa; solo los asaltos más brutales pueden hacer mella en ellas."
 menp_cosmo_buildings_4: "Edad de oro"
 unlocks_buildings_4: "Las extraordinarias construcciones de los imperios caídos ya aparecen como opciones de investigación.\n"
 menp_cosmo_buildings_4_desc: "El conocimiento de los imperios caídos en manipulación dimensional es asombroso. Con cada hallazgo, hasta su tecnología más arcana empieza a antojarse sencilla."
 menp_cosmo_techs_4: "Blindaje y armamento"
 unlocks_techs_4: "Desbloquea la tecnología para los componentes de nave §Y$tech_energy_lance_2$§! y §Y$tech_dragon_armor$§!.\n"
 menp_cosmo_techs_4_desc: "Gracias a los últimos avances en tecnología, deberíamos poder instalar armas más letales y blindajes más robustos para nuestras naves."
 menp_cosmo_features_4: "Rompeleyes"
 unlocks_features_4: "Desbloquea la tecnología §Y$tech_cosmogenesis_crisis_4$§!, que nos acerca a nuestros objetivos.\nTambién desbloquea la tecnología repetible §Y$tech_cosmogenesis_thesis$§!, que puede generar grandes cantidades de §Ylógica avanzada§!.\n"
 menp_cosmo_features_4_desc: "$tech_cosmogenesis_crisis_4_desc$"
 menp_cosmo_buildings_5: "Memoria y creación"
 unlocks_buildings_5: "Las construcciones arcanas de los imperios caídos ya aparecen como opciones de investigación.\n"
 menp_cosmo_buildings_5_desc: "Los secretos de los imperios caídos, recién descubiertos, marcarán el comienzo de una nueva era para nuestro pueblo."
 menp_cosmo_techs_5: "Nanoenjambres"
 unlocks_techs_5: "Desbloquea la tecnología para los componentes de nave §Y$tech_nanite_repair_system$§!, §Y$tech_nanite_autocannon$§! y §Y$tech_nanite_flak_batteries$§!.\n"
 menp_cosmo_techs_5_desc: "Cada cambio de perspectiva plantea nuevas oportunidades. El más mínimo cambio puede tener unas consecuencias tremendas."
 menp_cosmo_features_5: "Viaje por el vacío"
 unlocks_features_5: "Desbloquea la tecnología §Y$tech_cosmogenesis_crisis_5$§!, que nos permitirá construir una §YAguja del Horizonte§! para consumar nuestros objetivos."
 menp_cosmo_features_5_desc: "$tech_cosmogenesis_crisis_5_desc$"
