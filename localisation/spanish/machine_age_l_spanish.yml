 machine_age.govswapnotice: "Para alinearnos con la fusión de nuestros cuerpos, nuestro gobierno adoptará plenamente la cibernética y se someterá a una reestructuración. Se creará el §Y[Owner.GetGovernmentName]§!."
 machine_age.democraticgovtooltip: "Nuestra autoridad ha cambiado a un §Y['concept_auth_cyber_creed_democratic']§! cibernético."
 machine_age.oligarchicgovtooltip: "Nuestra autoridad ha cambiado a un §Y['concept_auth_cyber_creed_oligarchic']§! cibernético."
