 pc_cosmogenesis_world: "Torno sináptico"
 col_cosmogenesis_world: "$pc_cosmogenesis_world$"
 pc_cosmogenesis_world_desc: "Un colosal sistema informático de reserva diseñado para conectar miles de millones de seres sintientes, orgánicos o sintéticos, mediante un intrincado conjunto de cables, transistores y cápsulas de soporte vital. El intenso estrés al que estarán sometidos los órganos de procesamiento individual acabarán causando daños cerebrales en cualquier \"componente\" conectado a la red."
 col_cosmogenesis_world_desc: "$pc_cosmogenesis_world_desc$"
 trait_pc_cosmogenesis_world_preference: "Preferencia de torno sináptico"
 trait_pc_cosmogenesis_world_preference_short: "Torno sináptico"
 trait_pc_cosmogenesis_world_preference_desc: "La especie no es apta para sobrevivir fuera de las cápsulas de soporte vital de un torno sináptico. Lo que ansían es un coma de felicidad, no los constantes envites de la realidad."
 mod_pc_cosmogenesis_world_habitability: "Habitabilidad de $pc_cosmogenesis_world$"
 job_neural_chip: "Chip neural"
 job_neural_chip_plural: "Chips neurales"
 job_neural_chip_desc: "Un chip neural, por sí solo, carece de importancia. Sin embargo, al conectarlos, sus capacidades de procesamiento aumentan exponencialmente."
