 cybercreed_tithe_construction: "El diezmo de la construcción"
 cybercreed_tithe_construction_desc: "$machine_age.1070.intro$ para construir edificios y trabajar en los astilleros."
 cybercreed_tithe_army: "El diezmo del ejército"
 cybercreed_tithe_army_desc: "$machine_age.1070.intro$ para el servicio militar."
 cybercreed_tithe_navy: "El diezmo de la marina"
