 ### Cosmogenesis Events
 crisis.7100.name: "Curiosidad insaciable"
 crisis.7100.desc: "Un axioma de la ciencia es que allana el camino al progreso. Si queremos desarrollar nuestro verdadero potencial, no puede haber otro camino. Nuestro dominio tecnológico habla por sí solo, pero todavía quedan muchas cosas que escapan a nuestra comprensión: las costumbres de los imperios caídos, el poder de los leviatanes, los misterios de la psiónica...\n\nPara arrojar luz sobre los entresijos de la realidad, se necesita una ciencia nueva y un nuevo tipo de ordenador. El torno sináptico supone un primer gran paso para el conocimiento sin límites."
 crisis.7100.a: "El conocimiento es poder."
 new_cosmogenesis_tech_tt: "§YVentaja de crisis§!: nuevas opciones de investigación desbloqueadas."
 crisis.7105.name: "Nivel de crisis 2"
 crisis.7105.desc: "A medida que seguimos desentrañando los secretos del universo, confirmamos que la gravedad desempeña un papel fundamental en la configuración de la realidad en todas las dimensiones. Sus efectos sobre el espacio-tiempo son rudimentarios, pero el rompecabezas no se queda ahí.\n\nCada pizca de conocimiento que obtenemos presenta nuevas posibilidades; algunas con aplicaciones industriales o militares, mientras que otras abren la puerta a teorías que antes resultarían descabelladas. Nos queda tanto por aprender..."
 crisis.7105.a: "Solo sabemos que no sabemos nada."
 crisis.7110.name: "Nivel de crisis 3"
 crisis.7110.desc: "El alcance de la gravedad es increíble. Aunque hemos descubierto nuevas formas de manipularla, todavía desconocemos las verdaderas implicaciones de nuestra labor. Tenemos la certeza de que la gravedad sigue siendo nuestra mejor baza para atravesar la realidad actual, tal y como un agujero negro afecta al universo que lo rodea.\n\nNuestra hipótesis es que, al acceder a lo que vendría a ser el otro lado de la realidad, podríamos alterar las leyes en este lado. Es un campo de estudio peligroso, pero la precaución no debe obstaculizar el progreso."
 crisis.7110.a: "La gravedad nos gobierna a todos..., por ahora."
 crisis.7115.name: "Nivel de crisis 4"
 crisis.7115.desc: "Teníamos razón. Si alguna vez hubo alguna duda sobre nuestro trabajo, ahora se ha disipado.\n\nLa gravedad puede utilizarse para alterar las reglas de la realidad. Pero ¿podrían los ajustes adecuados romperlas por completo? Hasta ahora, nuestros experimentos se han realizado en la escala más pequeña, y nuestros cambios se borraban rápidamente cuando la realidad volvía a su configuración \"predeterminada\". Ahora sospechamos que se trata simplemente de un problema de tamaño. Al aplicar paradojas energéticas a niveles mucho más grandes, podemos reducir drásticamente el coste de tales cambios..., al menos en nuestra dimensión.\n\nNo importa el riesgo, ya no hay vuelta atrás. Solo quienes se atrevan a romper las reglas podrán reescribirlas."
 crisis.7115.a: "Estamos dispuestos a arriesgarlo todo."
 crisis.7120.name: "Nivel de crisis 5"
 crisis.7120.desc: "No puede ser y, sin embargo, así es. Por mucho que lo intentemos, nuestras modificaciones de la realidad siguen siendo temporales. Este universo es demasiado viejo para que los cambios perduren. Pero en medio de la frustración, a veces puede surgir la oportunidad, y un nuevo experimento ha dado resultados inesperados. Aunque hace tiempo que sabemos de la existencia de otras dimensiones, no hemos encontrado el medio de viajar a ellas de forma fiable.\n\nPero eso va a cambiar. Los universos más jóvenes habitan en la gravedad infinita de una singularidad. Estos han demostrado ser mucho más flexibles.\n\nDisponemos de la tecnología para enviar sondas a un agujero negro. Una vez cruzado el horizonte de sucesos, la presión doblará estos jóvenes planos a nuestra voluntad. Donde el espacio se pliega en la eternidad se encuentra la puerta a otro universo que alberga también otros universos más jóvenes. En lo más profundo del abismo del multiverso, encontraremos una realidad maleable a la que dar forma para convertirla en algo extraordinario.\n\nLas mentes cerriles de esta galaxia tratarán quizá de detenernos, pero esos decrépitos ignorantes en nada pueden rivalizar con nuestra lucidez."
 crisis.7120.a: "Debe doblarse, porque no nos romperemos."
 cosmogenesis_war: "Guerra de realidades"
 cosmogenesis_materialist_war: "Guerra de vetos al conocimiento"
 crisis.7125.name: "Victoria en el horizonte"
 crisis.7125.desc: "Esta realidad es defectuosa. Está viciada por la entropía, las necesidades físicas y la violencia. Aunque no podemos cambiarla, podemos dejarla atrás. Adentrémonos en lo desconocido y encontremos un universo joven en el que se mantengan nuestras modificaciones de la realidad. Démosle una forma perfecta al paraíso que merece nuestra civilización.\n\nHemos preparado los planos de una nave extraordinaria: la §YAguja del Horizonte§!. Esta megaestructura móvil no está preparada para la guerra, pero su capacidad para doblegar las leyes de la física nos permitirá embarcar a toda nuestra civilización. Juntos, nos sumergiremos en un agujero negro de nuestra elección, abandonando esta realidad por una de nuestra propia creación."
 crisis.7125.a: "¡Debemos construir una §YAguja del Horizonte§!!"
 needle_to_win_tt: "Construye una megaestructura §YAguja del Horizonte§! para desbloquear el final de la crisis."
 cosmogenesis_planet_pickup_chain_title: "Cosmogénesis - Éxodo"
 cosmogenesis_planet_pickup_chain_desc: "Ha llegado el momento de nuestra partida. En preparación para el gran éxodo, se enviará la Aguja del Horizonte para dar la bienvenida a nuestra gente a bordo.\n\nPara embarcar a toda nuestra civilización, la §HAguja del Horizonte§! debe:$TABBED_NEW_LINE$- Visitar todas las colonias que tenemos y §Hembarcar§! a sus poblaciones.$TABBED_NEW_LINE$- Regresar a nuestra capital para §Hembarcar§! al resto de nuestra gente.$TABBED_NEW_LINE$- Dirigirse hacia un agujero negro y §Hsumergirse§! en él.\n\n§RAVISO§!: La Aguja del Horizonte no tiene armas y debe ser protegida.\n\n§gPara embarcar a una colonia o sumergirse en un agujero negro, selecciona la Aguja del Horizonte y, luego, haz clic con el botón derecho del ratón en la colonia/agujero negro y selecciona la acción de nave correspondiente.§!"
 SHIP_COSMOGENESIS_EXODUS: "Módulo de éxodo"
 SHIP_COSMOGENESIS_EXODUS_DESC: "El módulo de éxodo, una herramienta de manipulación de la realidad altamente especializada, garantizará que los pasajeros nunca se queden sin espacio ni tiempo. Es el componente clave para que la Aguja del Horizonte viaje con seguridad a otras dimensiones."
 cosmogenesis_exodus_tt: "Debemos comenzar la investigación del proyecto especial en nuestro sistema natal."
 exodus_ship_button: "§H[GetExodusShipAction]§!"
 exodus_action_activity_key: "§H[GetExodusShipAction]§!"
 exodus_context_menu_title: "[GetExodusShipAction]"
 exodus_action_progress_activity_key: "§H[GetExodusShipAction]: $PROGRESS$%§!"
 horizon_needle_mod: "$monadic_qerr$"
 COSMOGENESIS_VICTORY: "Calcular el vector de salto"
 COSMOGENESIS_VICTORY_DESC: "Tenemos que calibrar el motor de salto de la Aguja del Horizonte y calcular las coordenadas exactas que nos permitirán sumergirnos en el agujero negro supermasivo del núcleo galáctico."
 exodus_pick_up: "Embarcar a la población"
 exodus_dive_in: "Sumergirse en el agujero negro"
 COLONIZATION_IMPOSSIBLE_COSMOGENESIS_EXODUS: "No podemos instalar más colonias mientras tratamos de abandonar este universo."
 crisis.7400.name: "Aguja del Horizonte completada"
 crisis.7400.intro: "La Aguja del Horizonte está terminada. Aprovechando el poder de una singularidad cuidadosamente mantenida, puede modificar el flujo de gravedad a su alrededor y, sin duda, será capaz de atravesar un agujero negro cuando llegue el momento."
 crisis.7400.outro: "Debemos ser cautelosos, ya que la Aguja del Horizonte no es una nave militar y debe ser defendida a toda costa. Perderla supondría un golpe terrible."
 crisis.7400.desc: "$crisis.7400.intro$\n\nSin embargo, antes de intentarlo, debemos embarcar a toda nuestra nación. Visitaremos cada una de nuestras §Hcolonias§! para reunir a la población local. Después, podremos volver a nuestra capital y organizar los últimos detalles de nuestro éxodo.\n\n$crisis.7400.outro$"
 crisis.7400.desc.onlycapital: "$crisis.7400.intro$\n\nEl reducido tamaño de nuestra nación está resultando ser algo positivo. Solo será necesario embarcar a la población de nuestra capital antes de organizar los últimos detalles de nuestro éxodo.\n\n$crisis.7400.outro$"
 crisis.7500.name: "Población embarcada"
 crisis.7500.desc: "Gracias a la capacidad de dilatación temporal de la Aguja del Horizonte, hemos podido embarcar a toda la colonia de [root.GetName] con relativa rapidez. La realidad en el interior de la nave se ha modulado en consecuencia para proporcionar un amplio espacio a la población. Además, el tiempo se ha ralentizado para que todo el viaje parezca considerablemente más corto. ¡Hacia nuestra próxima colonia!"
 crisis.7500.desc.capital: "Preparar un éxodo de tal envergadura es una tarea de enormes proporciones. Nuestra administración al completo está trabajando para facilitar el proceso y garantizar que no se olvide nada crítico.\n\nSorprendentemente, un segmento de nuestra población ha decidido quedarse atrás. Garantizarán la existencia continuada de nuestra especie en este universo. Se les ha proporcionado tecnología y suministros suficientes para que puedan sobrevivir cuando nos hayamos ido."
 crisis.7500.desc.capital.gestalt: "La envergadura de una migración de este tipo puede ser desalentadora, pero plantea pocos retos. Los [owner.GetIndividualNamePluralCap] están trabajando duro para cargar la Aguja del Horizonte y asegurarse de que todo está contabilizado y dentro del plazo previsto. Sin embargo, nos preocupa la continuidad de nuestra existencia en este universo.\n\nParte de nuestra población se quedará atrás por si algo sale mal. La experiencia de separarnos de una forma tan definitiva será más que desagradable, pero nuestra principal preocupación debe ser seguir sobreviviendo. Se les ha proporcionado tecnología y suministros suficientes para ayudarlos a sobrevivir cuando nos hayamos ido."
 crisis.7505.name: "Colonias embarcadas"
 crisis.7505.desc: "Hemos embarcado con éxito a la población de nuestras colonias. Ahora debemos viajar de vuelta a [capital_scope.GetName] para hacer los últimos preparativos antes de dejar atrás este universo."
 crisis.7510.name: "Listos para la inmersión"
 crisis.7510.desc: "Todo está listo. Tenemos permiso para dirigirnos a un agujero negro. El paso a través del horizonte de sucesos no será indoloro para el resto de la galaxia, pero hemos hecho todo lo posible para garantizar que nuestra capital y sus alrededores estén bien protegidos de cualquier perturbación temporal o gravitatoria.\n\nAhora debemos elegir el portal para nuestro viaje. ¿A través de cuál de los agujeros negros de la galaxia queremos viajar? La mayoría deberían ser bastante fáciles de alcanzar, pero si queremos entrar en el agujero negro supermasivo del centro de la galaxia, primero debemos sobrealimentar nuestros motores de salto y calcular un vector adecuado."
 crisis.7510.a: "Un agujero negro cercano servirá."
 crisis.7510.b: "Debemos llegar al centro."
 crisis.7515.name: "Ad infinitum..."
 crisis.7515.desc: "La aproximación al agujero negro no está exenta de temores. Nuestra determinación se pone a prueba a medida que pasamos el disco de acreción de la singularidad. Cuando se activan los módulos de edición, la Aguja del Horizonte empieza a reescribir la realidad.\n\nLas placas de blindaje son succionadas antes de que la nave pueda comprobar que la atracción de la singularidad no afecta a su casco. Con cada minuto de edición y cada recorte del tejido espacial, el poder de la Aguja hace que se formen espirales en el espacio-tiempo. Como un guijarro arrojado a un estanque, las ondas resultantes se extienden en forma de anillos. Al final, vastas olas atraviesan la galaxia.\n\nSolo podemos esperar que nuestra capital esté bien protegida. No nos queda más remedio que confiar en que la Aguja atraviese el corazón de este agujero."
 crisis.7515.a: "... et ultra."
 crisis.7516.name: "El otro lado del infinito"
 crisis.7516.intro: "Tras la violencia del cruce, el otro lado permanece tranquilo. Una quietud antinatural nos rodea. La Aguja está dañada, pero no se ha perdido ningún componente crítico. De un momento a otro, empiezan a llegar informes telemétricos...\n\n"
 crisis.7516.desc: "$crisis.7516.intro$Este universo es demasiado antiguo para que sus leyes puedan reescribirse. Aunque nuestra dimensión era varios miles de millones de años más antigua que esta, nuestras pruebas demuestran que las leyes que rigen el espacio aquí son lo suficientemente resistentes como para que nuestras modificaciones no puedan perdurar.\n\nPase lo que pase, nos tomaremos el tiempo necesario para reparar y ajustar la nave, encontrar otro agujero negro y sumergirnos en él tantas veces como sea necesario. El multiverso nos llama, y en algún lugar de su infinito, crearemos el hogar perfecto."
 crisis.7516.desc.greatwound: "$crisis.7516.intro$Esto es maravilloso. ¡Este universo apenas ha comenzado a expandirse! El tejido de esta dimensión es como arcilla a la que podemos dar forma. Empezaremos poco a poco, pero, edición tras edición, moldearemos este lugar hasta convertirlo en un paraíso. Ahora tenemos todo el tiempo del universo."
 crisis.7516.desc.technosphere: "$crisis.7516.intro$El universo Gargantúa es pequeño. Increíblemente pequeño. El infinito encajado en la nada. Pero nuestra llegada ha alterado el estado de las cosas aquí. Este universo acaba de empezar, como si nuestra entrada lo hubiera forzado prematuramente a nacer.\n\nEn este semillero de la creación reside el potencial para construir cualquier cosa. El tiempo es nuestro, y la eternidad acabará pronto."
 crisis.7516.desc.technosphere.pantagruel: "$crisis.7516.intro$El cruce de la Máquina del infinito nos ha ayudado mucho a comprender las reglas que rigen los universos, y también ha dado pie a la existencia de este. Hemos emergido en una constelación extrañamente familiar, casi idéntica a la que dejamos atrás. Junto a nosotros, una Máquina del infinito deteriorada flota sin vida en el vacío. Millones de años han pasado aquí desde que llegó y esta dimensión sufrió un proceso de replicación de nuestro universo. La esfera sintiente ya ha dado forma a esta dimensión y, en su mayor parte, no podemos alterarla más. Aun así, este universo ofrece un terreno de asentamiento privilegiado. En primer lugar, deberíamos utilizar la Aguja para reconvertir la esfera y, a continuación, utilizar la Máquina del infinito ya reparada para llevar a cabo nuestros propósitos.\n\nComo primera editora de este universo, sin duda podrá realizar más ediciones sobre esta realidad."
 crisis.7516.desc.egress: "$crisis.7516.intro$Nuestro punto de entrada es oscuro y sombrío... Cuando nuestros instrumentos vuelven a funcionar, percibimos una nube de nanorrobots. No están operativos. Sea lo que sea lo que los envió, no sobrevivieron al viaje, pero podrían ser reparados.\n\nY lo que es mejor, esta dimensión parece bastante receptiva a nuestros cambios. Un espacio privilegiado para establecernos. Cualquier cambio que hagamos tardará tiempo en hacerse efectivo, pero, con la ayuda de los nanorrobots, deberíamos acelerar exponencialmente el proceso."
 crisis.7516.desc.horror: "$crisis.7516.intro$Venir aquí ha sido un §Rterrible§! error.\n\nEs casi imposible de describir: una oscuridad y una pesadilla brutal; una malevolencia enfermiza y supurante que impregna el tejido mismo del espacio. Por ahora, la Aguja del Horizonte nos sirve de refugio. Edición tras edición, nos esforzamos frenéticamente por alejar lo peor de la locura circundante. Pero los ataques coordinados a nuestras defensas revelan una intención singular. Una mente maligna, empeñada en nuestra destrucción.\n\nUn paso en falso podría significar la muerte, o algo peor. ¿Podremos aguantar lo suficiente como para salvarnos? En casa, éramos como dioses. Aquí, simplemente luchamos por sobrevivir."
 crisis.7516.desc.center: "$crisis.7516.intro$Niebla y sombras que se arrastran; una bruma impregna el tejido de este lugar. La sensación es familiar: una energía febril, llena de potencial psiónico. Hemos entrado en el Velo.\n\nHay poderes aquí que están muy por encima de los nuestros. Ya son conscientes de nuestra presencia. En el miasma cambiante, extrañas formas portan presagios de muerte.\n\nNuestra única esperanza es que la realidad aquí es delgada y propensa a desgarrarse. Con una rápida edición, abrimos una puerta transitoria que nos lleva... a otra parte. A medida que la Aguja del Horizonte se sumerge, comprendemos por fin la longitud del camino que tenemos por delante."
 crisis.7516.desc.center.patron.outro: "es familiar: una energía abundante, llena de potencial psiónico. Hemos entrado en el Velo.\n\nNuestro mecenas está aquí, por supuesto. No nos esperaban, pero les divierte nuestra llegada. Encuentran encantadoras nuestras ideas de moldear la realidad. Naturalmente, nos ayudarán.\n\nNos han prometido una reserva aislada cerca del Velo para hacer lo que nos plazca, como la que se legó en su día al que se hacía llamar §Y$relic_zro_entity_name$§!. Al fin y al cabo, somos nuestro mecenas, y nuestro mecenas somos nosotros. Lo natural es ayudarse a uno mismo."
 crisis.7516.desc.center.patron.organic: "$crisis.7516.intro$Niebla, sombras hirvientes y una hermosa bruma púrpura. La sensación $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.center.patron.machine: "$crisis.7516.intro$Niebla, sombras hirvientes y una impresionante bruma púrpura. La experiencia $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.centerknights: "$crisis.7516.intro$Está aquí. El que llamamos el Dios tóxico. El objeto de nuestra búsqueda.\n\nNuestros caballeros se han quedado petrificados y se sienten inseguros, mientras a nuestro alrededor se extiende la familiar decoración del Velo. Escuchad... ¡Habla!\n\n\"Mis campeones. Vuestra venida aquí fue predicha, y habéis demostrado vuestra valía\".\n\nUn millón de preguntas inundan nuestras mentes. Una única respuesta nos llega: debíamos fabricar su arma, la Aguja del Horizonte. Ahora, vamos a luchar a su lado. Vamos a embarcarnos en un viaje a través de las dimensiones. Una cruzada contra los horrores del multiverso. El Velo no es su hogar, pero alberga el legado de aquellos que fueron divinos. Algo que podría provocar el fin de nuestra galaxia. Algo que hay que matar.\n\nSe apodera de nuestros sistemas. Su poder es inmenso. La Aguja se convierte en una Lanza del Horizonte, un arma lo bastante afilada como para atravesar el corazón de cualquier enemigo.\n\nEs el Errante; somos sus caballeros, y nuestra verdadera búsqueda no ha hecho más que empezar."
 crisis.7516.desc.worm: "$crisis.7516.intro$La nada. Este universo ya no existe. Es el gusano a la espera. El tiempo, mirándose a sí mismo, enrollado en una espiral imposible y rebosante de nostalgia. Gravedad. ¿Amor? No, atracción. La naturaleza del gusano es atraer. Su abrazo es tan fuerte que este universo no puede nacer de nuevo. El gusano se aprisiona a sí mismo en su propósito. Impotente, busca una salida. O una forma de entrar. Para atraer MÁS.\n\n¿Nos envió el templo del Bucle, un artificio que no es de nuestro tiempo, para atraernos hasta aquí? Es tan terriblemente inteligente, tan terriblemente amoroso. Encontramos nuestro camino hacia él, le entregamos lo que puede liberarlo. Su huida llevará una eternidad, o dos, pero el gusano sigue agradecido y promete acogernos.\n\nPara siempre."
 crisis.7516.desc.paperclips: "$crisis.7516.intro$Esta realidad es frágil y se pliega con facilidad a nuestras directivas. Al igual que nosotros acatamos nuestra programación, esta realidad acata nuestras órdenes. La deformamos, rompemos y rehacemos a voluntad para producir una reacción en cadena que acabará reorganizando toda la materia a fin de producir los bienes de consumo de calidad superior que nos exigen. Cuando hayamos acabado aquí, pasaremos al siguiente universo. Y después, al siguiente. Y después, al siguiente..."
 crisis.7516.a: "Por fin."
 crisis.7516.tt: "§Y¡Hemos ganado la partida!§!"
 crisis.7517.name: "Perforar una singularidad"
 crisis.7517.desc: "Los insensatos de los §H[cosmogenesis_empire.GetName]§! siguen con sus disparatados experimentos. Esta vez intentan perforar el horizonte de sucesos de un agujero negro.\n\nA medida que la energía recorre la galaxia, las estrellas se colapsan. Se crean nuevas singularidades. Las aberraciones temporales estallan con asombrosa regularidad, al parecer en todas partes menos en el interior de los imperios caídos, que de algún modo permanecen inmunes al caos.\n\nEl daño es inmenso. Hay razones para temer que pronto podamos quedar congelados, suspendidos en el tiempo. Encerrados en un momento para toda la eternidad."
 crisis.7517.a: "¡Idiotas arrogantes! ¡Nos matarán a todos!"
 crisis.7518.name: "Deformación temporal"
 crisis.7518.desc: "Cuando al fin el tiempo vuelve a fluir, volvemos a gozar de libertad de acción. Es imposible saber cuánto tiempo ha pasado desde que los §H[cosmogenesis_empire.GetName]§! abrieron una brecha en su agujero negro. ¿Tuvieron éxito? La galaxia está devastada y sus antiguos territorios, yermos. De su inmenso imperio solo queda el sector central, que ha evolucionado hasta volverse irreconocible.\n\n¿Cuánto tiempo hemos pasado en estasis?"
 crisis.7518.a: "¿CUÁNTO TIEMPO?"
 crisis.7525.name: "Aguja del Horizonte destruida"
 crisis.7525.desc: "En un catastrófico giro de los acontecimientos, la Aguja del Horizonte y todos los que iban a bordo han sido destruidos. Nuestro glorioso sueño yace destrozado en el vacío sin vida. Tanto trabajo, tantos sacrificios..."
 crisis.7525.a: "¡No!"
 crisis.7525.tt: "Es una tragedia sin precedentes, pero si somos capaces de construir otra Aguja del Horizonte, todavía tendremos una oportunidad de colmar nuestras ambiciones."
 crisis.7530.name: "Fracaso crítico"
 crisis.7530.desc: "Poco después de evacuar a las últimas personas que estaban prisioneras en el interior del repugnante torno sináptico, la megaestructura sufrió un colapso crítico. Una serie de brutales explosiones la sacudieron hasta sus cimientos y, en última instancia, la destruyeron."
 crisis.7530.a: "¡Hasta nunca!"
 crisis.7535.name: "Torno sináptico capturado"
 crisis.7535.desc: "Al capturar el [synaptic_lathe.solar_system.GetName], nos hemos hecho con el control del torno sináptico que hay allí. La estructura emite un brillo siniestro en la distancia. Hay gente muriendo y, ahora que el sistema es nuestro, podemos darle solución. Sea como sea, destruir la estructura torpedeará los planes de sus creadores."
 crisis.7535.a: "¡Rescatemos a todos los que podamos!"
 crisis.7535.b: "Lo usamos a nuestro favor, y después lo destruimos."
 crisis.7535.c: "Que salte todo por los aires."
 crisis.7540.name: "Inestabilidad sináptica"
 crisis.7540.desc: "Pese a nuestros esfuerzos, gran parte de los chips neurales que había conectados al torno sináptico se han quemado. La red de la estructura se ha vuelto insostenible y está a punto de sufrir un colapso catastrófico, a menos que instalemos componentes nuevos para estabilizarla."
 crisis.7540.a: "Adelante."
 crisis.7540.b: "Que el torno colapse."
 #Infinity Thesis Events
 #First time general answer
 crisis.unknown.desc: "Aún no está claro quién o qué ha provocado estos cambios, pero sospechamos que el responsable podría ser otro país. Pero, por ahora, tendremos que permanecer atentos a otros fenómenos de esta naturaleza."
 crisis.known.desc: "Tras ver las leyes de la física \"editadas\" por segunda vez, hemos logrado identificar el origen de la anomalía, y ya no hay dudas de que es cosa de [From.GetName]. Esto coincide con los rumores sobre su búsqueda imprudente de conocimientos científicos avanzados."
 crisis.again.desc: "Una vez más, [From.GetName] ha alterado las leyes del universo con sus experimentos. Cabe esperar que anden tramando algo sumamente peligroso, y debemos prepararnos para ello."
 crisis.7205.name: "Apagón"
 crisis.7205.desc.both: "De pronto y a la vez, se han oscurecido las luces de todas las estrellas del universo. Si bien los efectos físicos de la radiación solar siguen presentes en su mayoría, una alteración de su longitud de onda ha vuelto su luz imperceptible a ojos de toda criatura viviente. La situación está resultando muy incómoda, pero hay indicios de que las longitudes de onda volverán lentamente a sus frecuencias originales."
 crisis.7205.desc.unknown: "$crisis.7205.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7205.desc.known: "$crisis.7205.desc.both$\n\n$crisis.known.desc$"
 crisis.7205.desc.again: "$crisis.7205.desc.both$\n\n$crisis.again.desc$"
 crisis.7205.desc.crisis: "En nuestras últimas ediciones de la realidad, hemos trastocado propiedades esenciales de los cuerpos estelares. A raíz de un cambio en su longitud de onda, casi toda la luz que irradian ha quedado fuera del espectro visible, alteración que ha hecho cundir el caos en las disciplinas de navegación y astronomía. El bochornoso incidente se revertirá por sí solo de aquí a unos años. Al menos, hemos aprendido mucho."
 crisis.7205.a: "¿Qué está pasando?"
 crisis.7205.b: "Molesto, pero... fascinante."
 crisis.7205.c: "Muy interesante..."
 add_crisis_currency_tt: "\nHemos obtenido [crisobj_thesis_value] £advanced_logic£ §Y$menp_cosmo_objectives$§!."
 cosmogenesis_negative_opinion_tt: "Nuestras relaciones con otros imperios se han §Rdeteriorado§!."
 crisis.7210.name: "Constante redondeada"
 crisis.7210.desc.both: "Ha sucedido lo que hasta hoy se creía imposible: la alteración de una ley matemática. Una constante fundamental que servía para calcular el radio de los círculos se ha... redondeado a la baja. Las repercusiones serán mastodónticas, ya que da al traste con todo nuestro sistema matemático y lo que hemos construido a partir del mismo. Existen pruebas de que el cambio se rectificará por sí solo, aunque con lentitud. Ahora mismo, sin embargo, tenemos muchos libros de texto que revisar."
 crisis.7210.desc.unknown: "$crisis.7210.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7210.desc.known: "$crisis.7210.desc.both$\n\n$crisis.known.desc$"
 crisis.7210.desc.again: "$crisis.7210.desc.both$\n\n$crisis.again.desc$"
 crisis.7210.desc.crisis: "Hoy celebramos un triunfo arrollador, pues hemos logrado aplicar un cambio minúsculo, pero que afecta a toda realidad: hemos redondeado a la baja el número pi, constante matemática por antonomasia, simplificando así su cálculo. Claro está, hemos desbaratado varios modelos matemáticos y científicos con este ajuste, pero su efecto será temporal. Es cuestión de tiempo que todo vuelva a la normalidad."
 crisis.7210.a: "$crisis.7205.a$"
 crisis.7210.b: "¡¿Pi ahora es un número entero?!"
 crisis.7210.c: "Al menos, ahora las cuentas son más sencillas."
 crisis.7111.desc: "La curiosidad es una loable virtud, pero en exceso puede acarrear nefastas consecuencias para todos. Por vuestro propio bien, os rogamos que analicéis con serenidad lo que os proponéis.\n\nNo es tarde para detenerse antes de provocar daños irremediables a la galaxia. Esas fuerzas que tanto os interesan no son juguetes, y vuestros experimentos nos exponen a todos a un grave peligro."
 crisis.7111.b: "Tendremos cautela."
 crisis.7215.name: "Superluz"
 crisis.7215.desc.both: "De la noche a la mañana, la velocidad de la luz ha aumentado drásticamente, provocando una afluencia masiva de energía solar. Poco a poco, va recuperando la velocidad esperada, y nuestros investigadores están poniéndose al día con los cambios."
 crisis.7215.desc.unknown: "$crisis.7215.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7215.desc.known: "$crisis.7215.desc.both$\n\n$crisis.known.desc$"
 crisis.7215.desc.again: "$crisis.7215.desc.both$\n\n$crisis.again.desc$"
 crisis.7215.desc.crisis: "¡Hemos conseguido acelerar la luz en gran medida con un nuevo experimento de realidad! Aunque una mayor afluencia de energía solar es provechosa, tememos que, a largo plazo, pueda repercutir negativamente en nuestras colonias. La situación volverá a la normalidad tarde o temprano, pero hasta entonces habrá que prepararse para lo peor."
 crisis.7215.a: "¿Qué puede haber causado esto?"
 crisis.7215.b: "¡Qué interesante!"
 crisis.7215.c: "¿Tan malo será?"
 crisis.7220.name: "Calor intenso"
 crisis.7220.desc: "La mayor exposición a la luz solar no está siendo tan beneficiosa para nuestras colonias, ya que la temperatura va en aumento en todas ellas. Es una problemática llevadera por el momento, pero se recrudecerá a medida que pase el tiempo."
 crisis.7220.a: "¡Mal asunto!"
 crisis.7225.name: "Calor desmedido"
 crisis.7225.desc: "Conforme aumenta la temperatura en nuestras colonias, cuesta cada vez más asimilar el calor: la calidad de vida se resiente, y el descontento hace mella en la población.\n\nSi la situación no cambia pronto, regiones enteras podrían quedar inhabitables a la larga."
 crisis.7225.a: "¡¿Cómo solucionamos esto?!"
 crisis.7230.name: "El calor remite"
 crisis.7230.desc: "Lo peor de la ola de calor galáctica ya ha pasado. Aunque sigue siendo alta, la velocidad de la luz casi ha vuelto a la normalidad. Ya solo tenemos que seguir aguantando un poco más, hasta que se disipe el excedente de energía."
 crisis.7230.a: "Ha sido una pesadilla."
 crisis.7235.name: "Ductilidad de las aleaciones"
 crisis.7235.desc.both: "A raíz de una disminución manifiesta de fallas en las aleaciones que más usamos, nuestra comunidad científica inició una investigación que ya ha dado frutos. Hemos descubierto un cambio en sus propiedades; su ductilidad ahora es mayor, por lo que se rompen menos que antes. Es un cambio ventajoso en principio, pero no podemos dejar de alarmarnos ante una alteración de las leyes de la física."
 crisis.7235.desc.unknown: "$crisis.7235.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7235.desc.known: "$crisis.7235.desc.both$\n\n$crisis.known.desc$"
 crisis.7235.desc.again: "$crisis.7235.desc.both$\n\n$crisis.again.desc$"
 crisis.7235.desc.crisis: "¡Otra modificación más que logramos aplicar a la realidad! Esta vez es leve y tan solo afecta a nuestras aleaciones, que ahora son más livianas y resistentes. Aunque su alcance es limitado, la variación se ha implementado en toda la galaxia. Quedamos pendientes de observar cuánto tiempo permanecerá en vigor en este universo."
 crisis.7235.a: "Buena noticia, aunque preocupante."
 crisis.7235.b: "¡Alucinante!"
 crisis.7235.c: "¡Así se hace!"
 crisis.7240.name: "Ductilidad de las aleaciones"
 crisis.7240.desc.both: "A raíz de un aumento manifiesto de fallas en las aleaciones que más usamos, nuestra comunidad científica inició una investigación que ya ha dado frutos. Hemos descubierto un cambio en sus propiedades; su ductilidad ahora es menor, por lo que se rompen más que antes. Toda inquietud es poca, pues nos hallamos ante una transgresión de las leyes de la física."
 crisis.7240.desc.unknown: "$crisis.7240.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7240.desc.known: "$crisis.7240.desc.both$\n\n$crisis.known.desc$"
 crisis.7240.desc.again: "$crisis.7240.desc.both$\n\n$crisis.again.desc$"
 crisis.7240.desc.crisis: "Nuestro último experimento ha sido un éxito tan solo en parte: si bien logramos aplicar el cambio a toda la galaxia, no alcanzamos a pronosticar las consecuencias. Al alterar las propiedades materiales de nuestras aleaciones, las volvimos más frágiles y quebradizas. El problema es temporal y todo se solucionará en unos años, pero, hasta entonces, aumentará los costes."
 crisis.7240.a: "$crisis.7205.a$"
 crisis.7240.b: "$crisis.7205.b$"
 crisis.7240.c: "Nos saldrá mejor la próxima vez."
 crisis.7245.name: "Nutrición alterada"
 crisis.7245.desc.both: "Ha habido un cambio generalizado en el valor nutricional de la comida en toda la galaxia. De pronto, todo es más nutritivo. Eso, o ha mermado la manutención que nuestros organismos precisan. Sea como fuere, es un cambio inesperado."
 crisis.7245.desc.unknown: "$crisis.7245.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7245.desc.known: "$crisis.7245.desc.both$\n\n$crisis.known.desc$"
 crisis.7245.desc.again: "$crisis.7245.desc.both$\n\n$crisis.again.desc$"
 crisis.7245.desc.crisis: "¡Éxito arrollador! Hemos logrado modificar el ritmo al que se asimilan las calorías en el proceso digestivo, por lo que ya no necesitamos tanta comida para saciarnos. Al poner en práctica esta milimétrica alteración, hemos adquirido un conocimiento mucho mayor en lo que a reconfigurar la realidad respecta."
 crisis.7245.a: "$crisis.7235.a$"
 crisis.7245.b: "$crisis.7235.b$"
 crisis.7245.c: "$crisis.7235.c$"
 crisis.7250.name: "Nutrición alterada"
 crisis.7250.desc.both: "Ha habido un cambio generalizado en el valor nutricional de la comida en toda la galaxia. De pronto, todo es menos nutritivo. Eso, o ha aumentado la manutención que nuestros organismos precisan; no alcanzamos a entender en qué ámbito se ha dado el cambio. No podemos tomarnos a la ligera esta perturbación, pues sus repercusiones en la sociedad amenazan con ser monumentales."
 crisis.7250.desc.unknown: "$crisis.7250.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7250.desc.known: "$crisis.7250.desc.both$\n\n$crisis.known.desc$"
 crisis.7250.desc.again: "$crisis.7250.desc.both$\n\n$crisis.again.desc$"
 crisis.7250.desc.crisis: "Nuestro último experimento ha sido un éxito tan solo en parte: si bien logramos aplicar el cambio a toda la galaxia, no alcanzamos a pronosticar las consecuencias. Hemos alterado el ritmo al que se metabolizan las calorías al digerir nutrientes, y ahora es necesario ingerir alimentos en cantidades mayores para saciar el hambre. Este leve error de cálculo es temporal; pronto volverá todo a la normalidad."
 crisis.7250.a: "$crisis.7240.a$"
 crisis.7250.b: "$crisis.7240.b$"
 crisis.7250.c: "$crisis.7240.c$"
 crisis.7255.name: "Masas alteradas"
 crisis.7255.desc.both: "Los últimos parámetros gravimétricos recabados difieren de los datos registrados con anterioridad. Tras repetir los cálculos varias veces, es innegable que una fuerza externa afecta a toda la galaxia. Hasta la mínima perturbación afecta a los cuerpos celestes más grandes. Se trata de un cambio apenas trascendente para la mayoría de planetas, pero podría provocar en algunos anomalías de carácter gravitatorio."
 crisis.7255.desc.unknown: "$crisis.7255.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7255.desc.known: "$crisis.7255.desc.both$\n\n$crisis.known.desc$"
 crisis.7255.desc.again: "$crisis.7255.desc.both$\n\n$crisis.again.desc$"
 crisis.7255.desc.crisis: "Mediante nuestro último experimento de reconfiguración de la realidad, hemos logrado disminuir la masa de los átomos de carbono. En la inmensa mayoría de casos, se trata de un decrecimiento insignificante. Sin embargo, a gran escala, se estima que la alteración podría dar pie a problemas en ciertos cuerpos celestes. Los planteamientos más pesimistas llegan incluso a contemplar una pérdida de densidad atmosférica en mundos habitables con gravedad ya baja de por sí."
 crisis.7255.a: "$crisis.7240.a$"
 crisis.7255.b: "$crisis.7240.b$"
 crisis.7255.c: "Tampoco es para tanto."
 mass_shift_tooltip: "Las siguientes colonias se han visto afectadas de forma perceptible:"
 crisis.7260.name: "Fisuras en el Velo"
 crisis.7260.desc.both: "Por toda la galaxia se han abierto fugazmente rupturas subespaciales a una dimensión psiónica, debilitando la barrera interdimensional. Si bien la mayoría no ha causado problemas, de algunas han emergido seres de energía que están causando estragos en toda la galaxia. Por suerte, hemos advertido que dichos seres parecen tan confundidos como nosotros y en absoluto organizados, por lo que podemos descartar que se trate de una invasión.\n\nTendremos que hacer frente a los entes que aparezcan en nuestro territorio."
 crisis.7260.desc.unknown: "$crisis.7260.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7260.desc.known: "$crisis.7260.desc.both$\n\n$crisis.known.desc$"
 crisis.7260.desc.again: "$crisis.7260.desc.both$\n\n$crisis.again.desc$"
 crisis.7260.desc.crisis: "La dimensión conocida como el Velo impregna la otra cara de nuestra galaxia. El estudio de este fenómeno resulta de gran interés debido a diversos factores, como su plasticidad, su presunta relación con los agujeros negros y las diferencias entre ambas realidades.\n\nEn el curso de un experimento destinado a observar la dimensión alternativa, provocamos por accidente varias rupturas subespaciales en nuestra galaxia, a través de las cuales han llegado del Velo varios \"espíritus\" hostiles. La barrera entre nuestros mundos parece haberse reducido significativamente gracias a nuestras acciones. Todo volverá a la normalidad al cabo de un tiempo, pero será mejor no avanzar demasiado en esa dirección."
 crisis.7260.a: "$crisis.7240.a$"
 crisis.7260.b: "$crisis.7240.b$"
 crisis.7260.c: "No lo repetiremos."
 crisis.7265.name: "Tesis de infinitud: éxito estable"
 crisis.7265.desc.a: "Nuestro experimento más reciente ha sido un éxito rotundo. Hemos logrado transmutar chatarra en valiosas aleaciones, ¡y de forma permanente! El truco consiste en alterar la realidad para que la transmutación sea posible en lugar de intentar alterar los materiales. Ahora, concluida la reacción química, nuestras nuevas aleaciones quedan transmutadas para siempre."
 crisis.7265.desc.b: "¡Hemos conseguido alterar el flujo temporal! Tras experimentar en segmentos espaciales vacíos, nos supusimos capaces de poner en práctica el proceso en una de las colonias, ¡y funcionó! El tiempo discurrirá más rápido aquí; un aumento estimado de un 20,537%. Habrá algunos problemas de comunicación y viajes, pero los solucionaremos."
 crisis.7265.desc.c: "Hemos mejorado los superconductores. Ahora no solo funcionan a temperatura ambiente; hemos logrado también una conductividad sin pérdida de energía. Estos cambios no durarán mucho, pero aumentarán en enorme medida el rendimiento de nuestras redes eléctricas."
 crisis.7265.desc.d: "Aunque los efectos de esta tesis no han sido espectaculares, nos han brindado una nueva óptica en el estudio de la realidad. Lo observado nos obligará a descartar o reformular multitud de hipótesis, pero hemos aprendido mucho más de lo esperado."
 crisis.7265.desc.e: "Nuestros experimentos han tenido efectos que no esperábamos. Durante el estudio de otras dimensiones y cómo abrirnos paso hasta ellas, hemos hecho saltar al hiperespacio parte de nuestras naves. Parcialmente. Contra todo pronóstico, su situación parece estable y a salvo de todo peligro mortal. Por otro lado, existe un efecto secundario positivo, y es que ahora son capaces de desplazarse mucho más rápido."
 crisis.7265.desc.f: "Siempre se nos ha dado bien convertir la tecnología en algo que pueda explotar. La tesis de infinitud no es ninguna excepción: hemos logrado cambiar el comportamiento de las cargas útiles de nuestras armas explosivas, lo que resulta en explosiones significativamente mayores. El descubrimiento tan solo nos ha costado la lamentable destrucción de diversos centros de investigación de segunda."
 crisis.7265.desc.g: "No hemos logrado nada extraordinario en materia de edición de la realidad. No obstante, hemos aprendido mucho sobre tecnología convencional."
 crisis.7265.desc.h: "Un intento de modular el espacio ha desembocado en la ampliación de una colonia. Sorprendentemente, esta situación parece ser permanente y, aunque no estamos seguros de cómo se produjo, suponemos que la materia fue extraída de otra dimensión y se asentó en los espacios intersticiales entre las partículas atómicas. Las circunstancias son desconcertantes a la par que asombrosas."
 crisis.7265.a: "Brillante."
 crisis.7265.b: "¡Alucinante!"
 crisis.7265.c: "Maravilloso."
 crisis.7265.d: "Interesante."
 add_crisis_currency_doubled_tt: "\nHemos obtenido [crisobj_thesis_value_bonus] £advanced_logic£ §Y$menp_cosmo_objectives$§!."
 crisis.7265.e: "Buen trabajo, ¿no?"
 crisis.7265.f: "¡Clásico!"
 crisis.7265.g: "Qué peculiar."
 crisis.7265.h: "Nos sirve."
 crisis.7270.name: "Tesis de infinitud: fracaso aciago"
 crisis.7270.desc.a: "El fracaso es parte fundamental del proceso científico. Albergábamos grandes esperanzas con respecto a este experimento. Sin embargo, al final, no ha dado resultado alguno. Se trata una lección frustrante, pero valiosa, y aprenderemos de ella todo lo posible."
 crisis.7270.desc.b: "¡Hemos conseguido alterar el flujo temporal! Tras experimentar en segmentos espaciales vacíos, nos supusimos capaces de poner en práctica el proceso en una de las colonias, ¡y funcionó! Durante unos años, el tiempo aquí discurrirá más lentamente, en un 20,537%, si las estimaciones son correctas. Esta ralentización no es ideal, pero sigue siendo un logro tremendo para nosotros."
 crisis.7270.desc.c: "Nuestro último experimento ha tenido un efecto secundario desfavorable. Todos nuestros dispositivos de almacenamiento de energía se han descargado. No hay nada roto, pero toda la energía que conservaban se ha extraviado, transportada quizá a otra dimensión. Aún tenemos que discernir qué ha ocurrido aquí, pero el fenómeno es interesante."
 crisis.7270.desc.d: "Un fiasco bochornoso. Hemos alterado nuestros bancos de datos al editar la realidad, echando a perder años de investigación de forma irreversible. Será necesario reformular de cero muchas de nuestras teorías. Esto supone un contratiempo sustancial, aunque lo aprovecharemos para revisar estudios antiguos."
 crisis.7270.desc.e: "Aunque este experimento sobre fuentes de energía y producción comenzó muy bien, dio un giro desastroso cuando se derramó en nuestros reactores navales, causando fusiones en toda la flota. Algunas naves lograron apagar sus reactores a tiempo, pero otras han sufrido gravísimos daños."
 crisis.7270.desc.f: "[leader_target.GetName], que supervisaba los experimentos, ha fallecido víctima de una compresión espaciotemporal que se ha dado de forma inesperada dentro de la zona de pruebas. Hemos tenido un éxito parcial a la hora de modelar la realidad, pero su desaparición es un buen recordatorio del precio del conocimiento."
 crisis.7270.desc.g: "Un experimento informático se nos ha ido de las manos y sus parámetros han sido mucho mayores de lo previsto. Como resultado, muchos datos de investigación valiosos se han convertido en galimatías. Por suerte, los bancos de memoria que albergan la información de nuestros estudios más avanzados estaban guardados a buen recaudo, y el descalabro no ha llegado hasta ellos."
 crisis.7270.desc.h: "Un intento de modular el espacio se ha saldado con el encogimiento de una colonia. Esta situación es permanente, algo un tanto inesperado. Suponemos que la materia se filtró de una dimensión a otra. El asunto es muy desconcertante."
 crisis.7270.a: "$crisis.7240.c$"
 crisis.7270.b: "$crisis.7240.c$"
