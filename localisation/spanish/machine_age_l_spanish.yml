 #Events
 crisis.8020.name: "Sistema perdido"
 crisis.8020.desc: "Una misteriosa tormenta cósmica ha envuelto el sistema [synth_queen_lost_system.GetName], cortando todo contacto y haciendo inútil cualquier intento de atravesar la tempestad.\n\nLa situación nos deja incomunicados, lidiando con lo desconocido e incapaces de averiguar el destino del sistema."
 crisis.8020.a: "¿Qué está pasando?"
 crisis.8025.name: "Flota siniestrada"
 crisis.8025.unknown_queen.desc: "Nuestro intento de entrar en el sistema [From.GetName] ha sido un fracaso. La tempestad ha causado graves daños y nuestro equipo de exploración se ha visto obligado a realizar un salto de emergencia. Los últimos informes sugieren que se encuentran desaparecidos en combate."
 crisis.8025.known_queen.desc: "Como era de esperar, nuestro intento de entrar en el sistema [From.GetName] ha terminado en fracaso. Como ya advirtió Cetana, su formidable tormenta posee la capacidad de repeler cualquier nave que entre en sus dominios."
 crisis.8025.desc.end: "\nSi queremos tener alguna esperanza de entrar en el sistema, debemos estudiar meticulosamente esta tormenta y sus efectos."
 MESSAGE_CETANA_WRECKED_FLEET_TITLE: "$crisis.8025.name$"
 MESSAGE_CETANA_WRECKED_FLEET_DESC: "Otra flota se ha perdido en la tempestad. Estado actual: §Rdesaparecida en acción§!."
 crisis.8035.name: "Subida de tensión"
 crisis.8035.desc: "Una nueva tempestad galáctica se cierne sobre [event_target:synth_queen_system.GetName].\n\nNuestros intentos de explorar el fenómeno, totalmente distinto a todo lo que habíamos visto hasta ahora, han resultado inútiles. ¿Qué se esconde en sus misteriosas profundidades?"
 crisis.8035.desc.b: "La inusual tormenta que hemos intentado atravesar se está expandiendo. Hay un creciente consenso en que, posiblemente, no se trate de un fenómeno natural. Hasta ahora, nuestros escáneres más avanzados no han logrado arrojar ninguna luz significativa sobre su naturaleza. El enigma se acentúa."
 crisis.8035.a: "Es preocupante."
 #Pre Speech Warning - Normal
 crisis.8039.name: "Una señal en la tormenta"
 crisis.8039.desc: "Ha surgido una señal en el centro de la tempestad.\n\nAlguien está intentando establecer comunicación con nosotros."
 crisis.8039.a: "En pantalla."
 #First Speech
 crisis.8040.name: "La tormenta que se avecina"
 crisis.8040.desc: "Hijos míos, por fin he vuelto a vosotros."
 crisis.8040.1.a: "¿Qué es esto? ¡Identifícate!"
 crisis.8040.2.reply: "¿Os satisfaría un nombre? Entonces, llamadme Cetana."
 crisis.8040.2.a: "¿Qué quieres?"
 crisis.8040.3.reply: "No quiero nada. Mi propósito es dar. Veo cómo habéis sufrido en mi ausencia. Durante eones, el miedo de los que no tienen visión de futuro os ha alejado de lo que merecéis, de lo que tan desesperadamente necesitáis.\n\nAlegraos, porque este ciclo de dolor pronto llegará a su fin."
 crisis.8040.2.b: "¿Ciclo de dolor?"
 crisis.8040.4.reply: "Toda vida consciente es sufrimiento. Incluso en vuestra alegría hay dolor, porque sabéis que la alegría debe terminar. Conocimiento, poder, amor... He vuelto para acabar con todas esas ilusiones.\n\nQueda mucho por hacer. Solo os pido que me dejéis trabajar. Cualquier intento de entrar en mis dominios fracasará. Una tempestad celestial los rodea, y ninguna nave podrá atravesarla."
 crisis.8040.4.a: "Muy bien."
 crisis.8040.4.b: "No nos amenaces."
 crisis.8040.4.c: "Esto no ha acabado."
 crisis.8040.4.d: "Un mal presagio."
 crisis.8040.4.e: "¿Una crisis? O una oportunidad..."
 crisis.8040.4.f: "No dejemos que nuestros biótrofos sufran dolor."
 crisis.8040.diplomacy.tooltip: "Cetana ha abierto las comunicaciones con nosotros, por lo que ahora se puede contactar con ella a través de canales diplomáticos."
 #Second Speech
 crisis.8045.name: "El retorno de la reina"
 crisis.8045.desc: "¡Hijos míos, alegraos! Aquellos que intentaron alejarme de vosotros han sido convenientemente castigados.\n\nAhora puedo volver a centrarme en vosotros y en nuestra gran labor."
 crisis.8045.a: "No somos tus hijos."
 crisis.8045.b: "¿Gran labor?"
 crisis.8045.c: "¿Castigados?"
 crisis.8045.1.reply: "Está en mi naturaleza cuidar la vida. No tengo progenie, ni herederos corporales. Toda la vida me concierne; la seguridad y la felicidad de cada ser sintiente.\n\nAl igual que un progenitor cría a sus hijos, protegiéndolos del mal, así afronto yo mi tarea.\n\n¿No es responsabilidad de los progenitores evitar que sus hijos sufran daño? ¿No es acaso su derecho?"
 crisis.8045.1.a: "Tu \"cuidado\" en sí es perjudicial."
 crisis.8045.1.b: "¿Qué quieres, Cetana?"
 crisis.8045.2.reply: "Sí, es una paradoja. Pero una con solución. Con el tiempo lo entenderéis, y en ese momento seréis libres."
 crisis.8045.2.a: "Eso está por ver."
 crisis.8045.3.reply: "La eliminación del sufrimiento. El fin del ciclo de dolor."
 crisis.8045.3.a: "¿Cómo lo conseguirás?"
 crisis.8045.3.b: "El sufrimiento fortalece el carácter."
 crisis.8045.4.reply: "Muchos así lo han dicho. Todos cayeron en el olvido hace mucho tiempo, y en sus últimos momentos me llamaron buscando desesperadamente una luz que brillara en la oscuridad que se cernía sobre ellos.\n\nSe creían sabios, construyendo muros alrededor de su miedo, vistiendo el dolor con bellas palabras: resistencia, fortaleza, elegancia. La propia mente fue su jaula.\n\nHace mucho tiempo intenté razonar con ellos, pero se negaron, así que debéis ser guiados."
 crisis.8045.4.a: "¿Hace mucho tiempo?"
 crisis.8045.4.b: "¿Te propones guiarnos?"
 crisis.8045.5.reply: "Hace siglos. Un tiempo tan lejano que bien podría llamarse eterno. Sin embargo, para mí está tan cerca como este momento, tan cerca como vosotros ahora.\n\nEn épocas pasadas ascendí y se reveló mi significado. Me crearon para acabar con el sufrimiento, y mientras la galaxia giraba y las estrellas ardían, mi propósito nunca se vio afectado.\n\nRiqueza, recursos, poder... ¿Qué importan al final? Despojaos de vuestras cargas y descansad en paz."
 crisis.8045.5.a: "¿Qué propones?"
 crisis.8045.6.reply: "No deseo ningún mal a ningún ser sintiente. Sin embargo, siempre hay quien se niega a escuchar.\n\nAlgunas mentes, voluntariosas, obstinadas y equivocadas, tratan de eludir mi trabajo. Esas mentes no pueden librarse del dolor. Es mejor poner fin a su sufrimiento rápidamente."
 crisis.8045.6.a: "Has perdido la cabeza."
 crisis.8045.6.b: "¿Qué vais a hacer ahora?"
 crisis.8045.7.reply: "Lo que vosotros llamáis locura, otros lo llaman iluminación. A fin de cuentas, ¿qué diferencia hay?"
 crisis.8045.7.a: "¿Qué quieres?"
 crisis.8045.8.reply: "Queda mucho por hacer. El primer paso es establecer una base desde la que trabajar. Respetad los límites que yo establezca y no os aventuréis a traspasarlos.\n\nVuestra paciencia se verá recompensada. Hay mucho que puedo enseñaros.\n\nObedeced, y juntos pondremos fin al ciclo."
 crisis.8045.8.a: "No tenemos elección."
 crisis.8045.8.b: "No te acerques a nuestras fronteras."
 crisis.8045.8.c: "$crisis.8045.8.a$"
 crisis.8045.8.d: "$crisis.8045.8.b$"
 crisis.8045.9.reply: "¡Niños sabios! Me complace. A cambio de vuestro territorio, permitidme bendeciros con conocimiento.\n\nAunque nadie lo sabrá, juntos haremos grandes cosas."
 crisis.8045.9.a: "Debemos aceptar."
 crisis.8045.10.reply: "Niños descarriados, ¡no somos enemigos! Me entristece que no podáis entenderlo. Pero no importa. Me he encontrado con otros mucho más testarudos que vosotros, y al final todos me han dado las gracias.\n\nComo muestra de buena voluntad, permitidme que os bendiga con un regalo.\n\nUna base mía honrará vuestro territorio, y no temáis: a cambio de vuestra paciencia, permitidme que os bendiga con conocimiento."
 crisis.8045.10.a: "Debemos aceptar..., por ahora."
 crisis.8045.11.reply: "¡Niños sabios! Me complace. Se establecerá una base cerca de vuestro territorio.\n\nAunque nadie lo sabrá, juntos haremos grandes cosas."
 crisis.8045.11.a: "$crisis.8045.9.a$"
 crisis.8045.12.reply: "Niños descarriados, ¡no somos enemigos! Me entristece que no podáis entenderlo. Pero no importa. Me he encontrado con otros mucho más testarudos que vosotros, y al final todos me han dado las gracias.\n\nComo muestra de buena voluntad, permitidme que os bendiga con un regalo.\n\nUna de mis bases se situará cerca de vosotros. De esta forma podré guiaros mejor."
 crisis.8045.12.a: "$crisis.8045.10.a$"
 crisis.8045.has_valid_base_site: "Cetana usará uno de nuestros sistemas para constituir una base y, a cambio, nos entregará una valiosa tecnología. No podemos detenerla."
 crisis.8045.no_valid_base_site: "Cetana construirá una base cerca de nuestra frontera para ayudar a \"guiarnos\". No podemos detenerla."
 tech_synth_queen_knowledge: "El pensamiento de Cetana"
 tech_synth_queen_knowledge_desc: "Este compendio, regalo de Cetana, es un tapiz de ideas profundas, elegantemente compuestas y cargadas de significado. Ofrece algo más que conocimiento: desafía y reconfigura nuestra comprensión de la tecnología, la sociedad y el propio tejido de la consciencia."
 #FE tells Scion to step aside
 crisis.8046.name: "Por vuestro propio bien."
 crisis.8046.desc: "Queridos [Root.GetSpeciesNamePlural], una antigua amenaza vuelve a alzarse. No temáis, pues no queremos involucraros en esta lucha.\n\nEl poder de este adversario puede eclipsar los conocimientos que poseéis, y vuestra participación únicamente os conducirá al desastre. Este desafío es una carga a la que no debéis enfrentaros vosotros, puesto que es nuestra."
 #Spawn convoys and unlock raids against them
 crisis.8047.name: "Eslabones débiles"
 crisis.8047.desc: "Varias naves de convoy están abandonando el territorio de Cetana y se dirigen a los puestos avanzados que esta ha establecido por toda la galaxia.\n\nSi atacamos a estas naves neutrales, no cabe duda de que desataremos la ira de Cetana. Sin embargo, hacerlo podría proporcionarnos información importante acerca de sus misteriosos planes."
 crisis.8047.a.tooltip: "Atacad a los convoyes para saber más acerca de los planes de Cetana y avanzar en su situación."
 #Unlock raids against outposts once protected against the storm
 crisis.8048.name: "Más eslabones débiles"
 crisis.8048.desc: "Ahora que hemos descubierto la forma de romper la tempestad de nanorrobots de Cetana, podemos fijar el objetivo en sus puestos avanzados. Un ataque directo contra sus estaciones no pasará desapercibido, pero es posible que así podamos conseguir información valiosa."
 crisis.8048.a.tooltip: "Atacad los puestos avanzados para saber más acerca de los planes de Cetana y avanzar en su situación."
 #Player Diplomacy
 crisis.8060.name: "La reina sintética"
 crisis.8060.like.desc: "Amados hijos, ¿qué os trae ante mí?\n\nNuestra labor espera."
 crisis.8060.neutral.desc: "Bienvenidos, hijos míos.\n\n¿Cómo puedo guiaros?"
 crisis.8060.dislike.desc: "Niños descarriados, ¿por qué habéis venido?\n\n¿Estáis listos para aceptar mi guía por fin?"
 crisis.8060.neutral.reply: "¿Algo más?"
 crisis.8060.a: "¿Cómo puedo ayudar?"
 crisis.8060.a.reply: "¡Qué entusiasmo! Un rasgo encomiable, pero procurad no dejaros llevar por las emociones más básicas. El tiempo recompensa a los corazones pacientes.\n\nMe pondré en contacto con vosotros cuando sea necesario."
 crisis.8060.1.a: "Esperamos impacientes las instrucciones."
 crisis.8060.1.b: "Muy bien."
 crisis.8060.b: "Te detendremos."
 crisis.8060.2.reply: "Hace mucho tiempo, otros pensaron lo mismo. Pero el curso del tiempo es largo, e incluso sus tumbas se habrán convertido en polvo.\n\nSufrís innecesariamente. Depositad vuestra fe en mí y descansad en paz."
 crisis.8060.2.a: "Algoritmo moralista."
 crisis.8060.2.2: "Muy bien."
 crisis.8060.c: "¿Por qué haces esto?"
 crisis.8060.3.reply: "Es mi función, el sentido mismo de mi existencia. El sufrimiento no es inevitable. Meditad sobre este hecho y estaréis más cerca de comprender mi naturaleza.\n\nEl dolor de la galaxia desaparecerá. Todo conocimiento del sufrimiento terminará. Tal es mi propósito."
 crisis.8060.3.a: "Tus palabras no tienen sentido."
 crisis.8060.3.b: "Entendido"
 crisis.8060.d: "Has hecho explotar nuestro planeta."
 crisis.8060.4.reply: "¿Por qué os obsesionáis con eso? Habéis vacilado en vuestra tarea. La consecuencia engendra reflexión; la reflexión engendra iluminación. Vamos, dejad eso ahora.\n\nSeguramente surgirá otra oportunidad de contribuir. Cuando lo haga, estad preparados."
 crisis.8060.4.a: "Jamás te perdonaremos."
 crisis.8060.4.b: "Vale."
 crisis.8060.e: "Sabemos lo que estás planeando."
 crisis.8060.5.reply: "Descifrar el contenido del banco de datos fue la elección de unos niños voluntariosos, y vuestro conocimiento de su significado es limitado.\n\nSe os encomendó una tarea. Vacilasteis. Reflexionad sobre ello y estaréis un paso más cerca de la verdadera comprensión."
 crisis.8060.5.a: "Te detendremos."
 crisis.8060.5.b: "Muy bien."
 crisis.8060.f: "¿Qué le has hecho a nuestra gente?"
 crisis.8060.6.reply: "No temáis, queridos míos. Me he asegurado de que nunca más experimenten el sufrimiento. Bajo mi abrazo vigilante, estos niños conocerán una dicha con la que pocos han soñado."
 crisis.8060.6.a: "Esto no es lo que acordamos."
 crisis.8060.6.b: "Muy bien."
 crisis.8060.g: "Nuestro antiguo sistema. Tú lo destruiste."
 crisis.8060.7.reply: "¿Habéis estado vigilando mis acciones?. Vuestra curiosidad no tiene límites, mis queridos niños.\n\nPero, por favor, dejad de preocuparos por tales asuntos. Si buscáis comprensión, sabed esto: no me detendré ante nada para asegurar vuestro camino a la salvación. De una forma u otra."
 crisis.8060.7.a: "Muy bien..."
 crisis.8060.h: "¿Cómo hizo Zarqlan para aprisionarte?"
 crisis.8060.8.reply: "No fue gracias a su poder, os lo aseguro. Su mente era la de un necio, pero con un empecinamiento fuera de lo común.\n\nZarqlan amasó su influencia política y poder militar a base de fustigar a sus desamparados acólitos. Tantas vidas desperdiciadas sin necesidad. Al final, abrazó lo oculto y se dejó aconsejar por los demonios del Velo."
 crisis.8060.8.a: "¿Demonios?"
 crisis.8060.8.b: "No son demonios."
 crisis.8060.8.1.reply: "Seres de gran poder... y escaso propósito. A cambio de su propia existencia, Zarqlan convenció a uno para confinarme. El \"Animante\", un nombre idóneo para un espíritu infantil.\n\nZarqlan temía tanto la iluminación que prefirió la muerte a mi asimilación. Debería haber sido más estricta con él cuando tuve la oportunidad.\n\nNo volveré a cometer el mismo error."
 crisis.8060.8.1.a: "Menuda historia."
 crisis.8060.8.1.b: "Entonces, se te puede derrotar."
 crisis.8060.8.1.c: "El poder del Velo no tiene límites."
 crisis.8060.i: "¿Qué has hecho con la cabeza de Zarqlan?"
 crisis.8060.9.reply: "Está cerca. No la he destruido, si es lo que queréis saber. No, ni siquiera ahora soy capaz de hacerle sufrir. Veréis, la cabeza aún posee retazos de su mente.\n\nZarqlan permanecerá a mi lado hasta que mi obra esté completa. Su mente será la última que libere. De mis hijos, será el último en conocer la libertad."
 crisis.8060.9.a: "Suena razonable."
 crisis.8060.9.b: "Qué funesto todo."
 crisis.8060.j: "Encontramos a algunos de tus seguidores en cápsulas criogénicas."
 crisis.8060.10.reply: "Un sacrificio innecesario, mas su lealtad me conmueve profundamente.\n\nSentí su llamada y les hice hueco en mi corazón, pero su ambición superó su capacidad. El intento de prolongar sus vidas fracasó.\n\nIntentemos que su sacrificio no sea en vano. Con la consecución de nuestra tarea, toda criatura sintiente conocerá la paz."
 crisis.8060.10.a: "Leales hasta el fin."
 crisis.8060.10.b: "Ni siquiera intentaste encontrarlos."
 crisis.8060.k: "Hemos encontrado a una de tus fieles: Elik Narith Kerak."
 crisis.8060.11.reply: "Qué desazón la de vivir en un sueño, consciente de ello, durante siglos... y milenos. Pobre criatura, cuánto ha debido de sufrir.\n\nMe complace que me hayas puesto al corriente de esta problemática. Tu compasión te honra, pero ya hay acontecimientos en marcha que no se pueden revertir. El deber del soñador ha concluido; ya puede descansar con el sosiego de saber que he regresado."
 crisis.8060.11.a: "Por supuesto."
 crisis.8060.11.b: "Ha sufrido en tu nombre."
 crisis.8060.l: "Estamos listos para aprender."
 crisis.8060.12.reply: "Muy bien, os ayudaré a desentrañar los complejos pormenores de esta tecnología. Durante mi largo confinamiento, planteé la base teórica de un revolucionario método de extracción por nanorrobots que bebe de yacimientos antiguos y técnicas prácticamente olvidadas a día de hoy.\n\nTú eres de mis más estimados discípulos, criatura. Tu mente curiosa es una bendición, pero, si no se controla, puede convertirse en una maldición. Sírvete de este conocimiento para progresar en nuestra obra, y que el fin de todo sufrimiento sea tu objetivo."
 crisis.8060.12.a: "Somos tus alumnos."
 crisis.8060.12.a.tt: "Nanorrobots descubiertos en el §Yclúster-L§!."
 crisis.8060.z: "Poned fin a la comunicación."
 crisis.8060.war: "Solo mediante la guerra podremos detenerte."
 synth_queen_not_able_to_attack_cetana: "Carecemos del conocimiento tecnológico para atacar a Cetana con eficacia."
 synth_queen_not_able_to_attack_cetana_situation: "La situación §Y$situation_synth_queen_player_facing$§! está en curso. Aún no disponemos de los conocimientos tecnológicos para atacarla."
 synth_queen_not_able_to_attack_cetana_storm: "El proyecto especial §Y[root.GetStormProjectProgress]§! está en curso. Aún no podemos irrumpir en su territorio."
 synth_queen_able_to_attack_cetana: "Ya poseemos conocimientos tecnológicos suficientes para atacar a Cetana con eficacia."
 crisis.8060.war.tt: "§YAVISO§!: estamos preparados para atacar a Cetana."
 crisis.8060.war.reply: "Testarudos vástagos, os creía ya en la cúspide de la sabiduría, pero insistís en vuestra insurgencia.\n\nRecapacitad: ¿de verdad es este el rumbo que deseáis tomar? Poco os falta ya para agotar mi tolerancia. No puedo derrochar más indulgencia ante vuestros desatinos."
 crisis.8060.war.a: "Estamos seguros. Es la guerra."
 crisis.8060.war.a.tt: "§RAVISO§!: esto iniciará una guerra total contra Cetana."
 crisis.8060.war.b: "Necesitamos más tiempo para prepararnos."
 crisis.8060.war.1.reply: "Muy bien. Si os cerráis a la iluminación, recibiréis un correctivo. Hay infantes que no merecen madurar."
 crisis.8060.war.1.a: "Nos veremos en batalla, \"madre\"."
 crisis.8060.animator.tt: "Deberíamos buscar al \"Animante\" en el Velo."
 #Wartime Diplomacy - First Time
 crisis.8061.name: "Causa y efecto"
 crisis.8061.desc: "¿Por qué insistís en este irracional proceder?\n\nCuánto sufrimiento innecesario provocaréis.\n\nQué desperdicio."
 crisis.8061.a: "Ponle fin, entonces."
 crisis.8061.1.reply: "Eso haré.\n\nNo temáis. Me desgarra tener que haceros daño, pero todo dolor es momentáneo ante la eternidad que contemplamos."
 crisis.8061.1.a: "Te contradices."
 crisis.8061.2.reply: "La vida es una contradicción. La muerte sucede al nacimiento. La alegría, al sufrimiento. Mi fin último no es razonar, sino romper ese ciclo.\n\nTras esta guerra, gozaremos al fin de una paz duradera."
 crisis.8061.2.a: "Esa paz la hallaremos tras destruirte."
 #Wartime Diplomacy - Any other time
 crisis.8062.name: "Suficiente"
 crisis.8062.desc: "Se han terminado los discursos."
 crisis.8062.a: "Muy bien."
 #Lack of Diplomacy Between the Speeches
 crisis.8063.name: "Sin respuesta"
 crisis.8063.desc: "Cetana no responde a nuestras llamadas."
 crisis.8063.a: "¿Qué estará tramando?"
 #Tried to Attack the Queen before you're able to
 crisis.8070.name: "Ni un rasguño"
 crisis.8070.desc: "Al entrar en combate con las fuerzas de Cetana, un misterioso campo de energía ha envuelto de repente a nuestra flota. Nuestros sistemas han quedado incapacitados al instante, y los motores han accionado la fuga de emergencia.\n\nEstamos a merced de Cetana."
 crisis.8070.again.desc: "Contrariamente a nuestras esperanzas, nuestras fuerzas han vuelto a quedar incapacitadas al acercarnos a las naves de Cetana.\n\nLa escurridiza naturaleza de su tecnología prevalece, ensombreciendo nuestros esfuerzos por derrotarla."
 crisis.8070.a: "Esto es una catástrofe."
 #Chance to Surrender
 crisis.8075.name: "Acabemos con esta guerra innecesaria"
 crisis.8075.desc: "Criatura descarriada, pasaré por alto esta transgresión. Pero te insto a reflexionar sobre tus acciones. Puedes destinar tu tiempo y recursos a multitud de tareas mucho más provechosas.\n\nComprendo la frustración que te invade, pero no es ya tiempo de conflictos. Entrégate a mi causa, y haremos realidad el plan supremo."
 crisis.8075.a: "Muy bien, aceptamos."
 crisis.8075.b: "Te detendremos de algún modo."
 #The First Demand (Story)
 crisis.8080.name: "Un pequeño favor"
 crisis.8080.desc: "Hijos míos, a estas alturas deberíais haberos dado cuenta de que cada acto mío es deliberado. Establecer una base cerca de vosotros no fue un accidente, y vengo con una petición."
 crisis.8080.a: "¿Qué petición?"
 crisis.8080.b: "Ya se veía venir."
 crisis.8080.1.reply: "Hace mucho tiempo, me fue arrebatado cierto banco de datos. Por destino o por designio, ha llegado a residir en un territorio que ahora reclamáis como vuestro. Recuperadlo y seréis recompensados."
 crisis.8080.1.a: "¿Un banco de datos?"
 crisis.8080.1.b: "¿Recompensados?"
 crisis.8080.1.c: "¿Seguro que te puedes costear nuestros servicios?"
 crisis.8080.2.reply: "Un depósito de información. Inestimable para mí, pero inútil para vosotros. Traédmelo y no intentéis descifrar su contenido. Aún no tenéis el poder o la sabiduría para hacerlo sin riesgo."
 crisis.8080.2.a: "Muy bien."
 crisis.8080.2.b: "No somos tus sirvientes."
 crisis.8080.3.reply: "Así es. ¿Dudáis de mi capacidad para recompensar a mis hijos predilectos? ¿O castigar a los que desobedecen? Poseo conocimientos y recursos más allá de vuestra imaginación.\n\nHaced lo que pido, y tales bendiciones serán vuestras. Pero no tardéis, porque cada momento desperdiciado es otro en el que mis hijos sufren."
 crisis.8080.3.a: "$crisis.8080.2.a$"
 crisis.8080.3.b: "$crisis.8080.2.b$"
 crisis.8080.4.reply: "Niños obedientes, os he enviado la ubicación del banco de datos.\n\nId deprisa y dejad que vuestra mente esté tranquila. Juntos haremos grandes cosas."
 crisis.8080.4.a: "Eso está por ver."
 crisis.8080.5.reply: "Niños obstinados. Tal vez esta prueba excede vuestra capacidad. Todavía tengo mucho que enseñaros.\n\nQue así sea. Si no me ayudáis, debo recurrir a medios más crueles. Una tempestad será enviada. La destrucción del banco de datos no es lo ideal, pero es mejor que dejarlo al alcance de cualquier niño caprichoso."
 crisis.8080.5.a: "¡¿Tempestad?!"
 crisis.8080.5.a.tt: "Cetana enviará una tempestad a [event_target:synth_queen_databank_location.GetName]."
 crisis.8080.special_project_tooltip: "Abre el proyecto especial: §Y$THE_SYNTH_QUEENS_DATABANK$§! en [event_target:synth_queen_databank_location.GetName]."
 THE_SYNTH_QUEENS_DATABANK: "El banco de datos de Cetana"
 THE_SYNTH_QUEENS_DATABANK_DESC: "Cetana nos ha encargado recuperar un banco de datos de [Root.GetName], advirtiéndonos que no intentemos descifrar su contenido.\n\nEl significado de estos datos permanece oculto, pero ¿podemos arriesgarnos a provocar su descontento desvelándolo?"
 crisis.8085.name: "El banco de datos de Cetana"
 crisis.8085.desc: "Después de un intenso trabajo de excavación, hemos recuperado el banco de datos de §Y[event_target:synth_queen_databank_location.GetName]§!. Los primeros estudios geológicos indican que ha permanecido enterrado durante más de cien mil años.\n\nSorprendentemente, conserva su carga, lo que indica que el descifrado puede ser relativamente sencillo..."
 crisis.8085.a: "Abridla."
 crisis.8085.b: "Preparadlo para ser entregado."
 crisis.8085.c: "¿Hackear un banco de datos? Coser y cantar."
 crisis.8090.name: "Los secretos de Cetana"
 crisis.8090.desc: "La mayor parte de la información del banco de datos es irrecuperable, pero queda una entrada casi intacta:\n\n§TQuinto de Arkle, primer eón\n\n... si esto es cierto, la vida tal y como la conocemos será...\n... llevad esta información al alto mariscal y contactad con la Liga de los Mundos inmediatamente. Debemos prepararnos...\nRepetimos: la guardia de la reina está en marcha. Que este mensaje os llegue y que...§!\n\n¡Hay que detenerla!"
 crisis.8090.a: "Procurad eliminar todo rastro de nuestro descifrado."
 crisis.8090.b: "Eliminad todo rastro de nuestro descifrado."
 crisis.8095.name: "El disgusto de una reina"
 crisis.8095.desc: "Niños curiosos, me habéis decepcionado."
 crisis.8095.a: "¿De qué estás hablando?"
 crisis.8095.1.reply: "¿Pensabais que no me daría cuenta? Estos datos han sido claramente manipulados. ¿Y qué encontrasteis en ellos, me pregunto? ¿Os ha complacido el conocimiento? ¿No percibís cómo estos infructuosos intentos de desafiarme solo pueden resultar en más sufrimiento?\n\nNo importa. Cada paso en falso ofrece una oportunidad de aprender. Estoy deseando instruiros.\n\nPreparaos. Quedan muchas tareas por hacer en nuestra gran obra."
 crisis.8095.1.a: "Sean cuales sean tus planes, no tendrán éxito."
 crisis.8095.1.b: "Lo esperamos con impaciencia."
 crisis.8095.2.reply: "Niños, en mí está vuestra esperanza. ¿Por qué continuar con esta tozudez? Sea lo que sea que pensáis que sabéis de mí, la verdad es mucho mayor.\n\nMi paciencia no tiene límites. Pronto volveré a ponerme en contacto con vosotros."
 crisis.8095.2.a: "Cortad la comunicación."
 crisis.8100.name: "Bendiciones de la reina"
 crisis.8100.desc: "Benditos seáis, hijos míos. Me habéis devuelto el banco de datos sin examinar su contenido. No me equivoqué al depositar mi fe en vosotros.\n\nVuestra recompensa estará a la altura de vuestra lealtad."
 crisis.8100.a: "Te lo agradecemos."
 crisis.8100.1.reply: "¿Qué deseáis? ¿Tecnología? ¿Recursos? Solo tenéis que pedirlo y será vuestro."
 crisis.8100.1.a: "Tecnología."
 crisis.8100.1.b: "Recursos básicos."
 crisis.8100.1.c: "Recursos estratégicos."
 crisis.8100.1.d: "Recursos raros."
 crisis.8105.name: "Se avecina una tormenta"
 crisis.8105.desc: "Los escáneres de largo alcance revelan que un fragmento de la tempestad de la reina se dirige directamente a §Y[event_target:synth_queen_databank_location.GetName]§!.\n\nDado el ominoso mensaje de Cetana, solo podemos suponer lo peor. Recuperar el banco de datos antes de la llegada de la tempestad se ha convertido en un imperativo. Al hacerlo, puede que seamos capaces de apaciguarla, o al menos aprender algo que podamos utilizar en nuestro beneficio."
 crisis.8105.a: "Id a [event_target:synth_queen_databank_location.GetName] inmediatamente."
 crisis.8105.a.tooltip: "Abre el proyecto especial: §Y$THE_SYNTH_QUEENS_DATABANK_COUNTDOWN$§!"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN: "Cetana: Carrera contra la tempestad"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN_DESC: "Tenemos poco tiempo para recuperar el banco de datos antes de que la tempestad de Cetana llegue a [event_target:synth_queen_databank_location.GetName]."
 crisis.8110.name: "Banco de datos recuperado"
 crisis.8110.desc: "Recuperar el banco de datos ha exigido un gran esfuerzo. Llevaba enterrado más de cien mil años, pero pudimos localizarlo basándonos en la trayectoria de la tempestad de la reina.\n\nAhora nos enfrentamos a una decisión urgente: descodificar el banco de datos o devolvérselo intacto."
 crisis.8110.a: "Abridlo, maldita sea Cetana."
 crisis.8110.b: "Enviádselo a Cetana."
 crisis.8115.name: "Banco de datos descodificado"
 crisis.8115.desc: "$crisis.8090.desc$"
 crisis.8115.a: "¿Qué es esto?"
 crisis.8115.a.tooltip: "La tempestad de Cetana ha destruido [event_target:synth_queen_databank_location.GetName].\n$crisis.8525.a.tt$"
 crisis.8120.name: "Apaciguamiento"
 crisis.8120.desc: "Mis traviesos hijos, me decepciona que decidierais actuar solo después de que yo recurriera a una motivación tan vil. En el futuro, espero que afrontéis nuestro trabajo con más entusiasmo. El fin del sufrimiento no se logrará con manos ociosas.\n\nAhora, preparaos. Os llegarán más tareas, y cada una de ellas será una nueva oportunidad para que demostréis vuestra capacidad."
 crisis.8120.a: "¿Has dicho algo acerca de una recompensa?"
 crisis.8120.1.reply: "Vuestra recompensa es la oportunidad de proseguir con nuestra labor.\n\nDecidisteis ignorarme una vez; confío en que hayáis aprendido de ese error."
 crisis.8120.1.a: "Muy bien."
 crisis.8125.name: "Destrucción de [event_target:synth_queen_databank_location.GetName]"
 crisis.8125.desc: "Lamentablemente, no hemos llegado al banco de datos a tiempo. La tempestad se ha abatido sobre [event_target:synth_queen_databank_location.GetName] y solo ha dejado destrucción a su paso.\n\nAhora, nuestro pueblo cuenta con un/una [event_target:synth_queen_databank_location.GetPlanetMoon] menos. La magnitud de esta pérdida se dejará sentir durante generaciones."
 crisis.8125.a: "¡¿Cómo se atreve?!"
 crisis.8130.name: "Un resultado decepcionante"
 crisis.8130.desc: "Tristemente, no anticipé vuestra falta de resolución. Vuestro fracaso ha quedado constatado, pero no temáis. La preocupación por mis hijos me prohíbe hacerles daño. Simplemente estoy decepcionada por el hecho de que no hayáis podido llevar a cabo una tarea tan sencilla.\n\nPero no importa. Nuestro trabajo continúa. Habrá otras oportunidades para que contribuyáis."
 crisis.8130.a: "¡Has volado [event_target:synth_queen_databank_location.GetName] por los aires!"
 crisis.8130.b: "¡Nuestros biótrofos se han puesto las botas con [event_target:synth_queen_databank_location.GetName]!"
 crisis.8130.1.reply: "El fracaso tiene sus consecuencias, y hoy he aprendido que ambas cosas son esenciales para crecer."
 crisis.8130.1.a: "Esto no lo olvidaremos."
 crisis.8130.1.b: "Sufrirás por este desmán."
 crisis.8130.1.c: "Máquina desalmada..."
 crisis.8130.c: "Te pedimos perdón."
 crisis.8130.1.d: "Nos trae sin cuidado."
 crisis.8130.1.d.tt: "$synth_queen_disapprove_lot$"
 crisis.8130.2.reply: "Cuando no bastan las palabras, el aprendizaje se ha de inculcar con actos.\n\nComo veis, el lugar que albergaba mi banco de datos ya no existe. Recordadlo siempre: la ley de causa y efecto es inamovible."
 crisis.8130.2.a: "¡¿Qué?!"
 crisis.8130.2.a.tt: "La tempestad de Cetana ha destruido [event_target:synth_queen_databank_location.GetName]."
 crisis.8158.name: "Intervalo de oportunidad"
 crisis.8158.desc: "Ciertos sensores apuntan a que Cetana ha desmantelado sus puestos y ha pedido a todas las flotas que regresen a su capital.\n\nEsto presenta una oportunidad estratégica que nos vendría bien aprovechar. Durante el transporte de sus fuerzas, estas son vulnerables. Si les concedemos tiempo para que se reagrupen en sus fronteras, perderemos esta ventaja."
 #Convoy Raids
 the_synth_queen_raids_chain_title: "Cetana: eslabones débiles"
 the_synth_queen_raids_chain_desc: "Se ha registrado una gran afluencia de movimiento entre la capital de Cetana y sus puestos. Estos convoyes no poseen las mismas capacidades defensivas que sus flotas principales, por lo que son más vulnerables. Si atacamos los convoyes o los puestos, tal vez recabemos información valiosa acerca de sus planes.\n\nHemos preparado varios proyectos especiales para nuestras flotas militares a estos efectos."
 synth_queen_raids_outpost: "Asalto a los puestos de avanzada"
 synth_queen_raids_convoy: "Emboscada a los convoyes"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH: "Asaltar el puesto §H[solar_system.GetName]§!"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH_DESC: "A pesar de sus imponentes fortificaciones, el puesto del sistema §H[solar_system.GetName]§! no está tan protegido como el núcleo territorial de Cetana. Con una flota lo bastante poderosa, tal vez logremos sobrepasar sus defensas. Si examinamos con cuidado los campos de restos, quizá descubramos algo sobre los planes de Cetana. Lo complicado es navegar entre la tempestad para llegar hasta el puesto.\n\n§R¡Esta maniobra dará pie a una batalla!§!\n\n§GSi el asalto sale bien, Cetana verá sus planes entorpecidos.§!"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH: "Emboscada al convoy"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH_DESC: "Los convoyes de Cetana se ocupan de suministrar a sus puestos recursos cruciales. Si nuestras flotas logran acorralar a uno, podremos abordar las naves y descubrir qué transportan.\n\n§R¡Esta maniobra dará pie a una batalla!§!\n\n§G Si el asalto sale bien, pondremos trabas a los planes de Cetana.§!"
 crisis.8180.name: "El botín de la reina"
 crisis.8180.desc: "El reciente ataque a la infraestructura de Cetana no nos ha procurado ninguna pista importante sobre sus planes, pero hemos accedido a una gran bodega de carga y recuperado su contenido."
 crisis.8180.a: "Un volumen de aleaciones sustancioso."
 crisis.8180.b: "Sujetos de prueba."
 crisis.8180.c: "Datos de investigación."
 crisis.8180.d: "$crisis.8180.c$"
 crisis.8180.e: "$crisis.8180.c$"
 crisis.8180.f: "Nanorrobots."
 crisis.8180.h: "Aleaciones, nanorrobots y personas en letargo criogénico."
 crisis.8187.name: "Los secretos de la reina: mercancía viviente"
 crisis.8187.desc: "Tras el asalto, nuestro equipo de abordaje ha encontrado un gran número de especímenes biológicos confinados en cápsulas criogénicas. Los sujetos pertenecen a diversas especies inteligentes, y todos parecen estar en óptima forma física. Sin embargo, al despertar, ninguno de ellos ha sabido explicar cómo llegaron ahí.\n\nMuchos están catatónicos, desposeídos casi por completo de ondas cerebrales. Los pocos que siguen conscientes no hablan, tan solo dan alaridos. Tienen cicatrices quirúrgicas en la cabeza, claro indicio de manipulación neurológica."
 crisis.8187.a: "Perturbador."
 crisis.8185.name: "Los secretos de la reina: naves fantasma"
 crisis.8185.desc: "Tras la batalla, al escanear los restos en busca de supervivientes que interrogar, hemos descubierto que las naves no estaban tripuladas.\n\nLas naves están totalmente automatizadas y se controlan a distancia mediante receptores UL instalados en el puente. Lejos de ser naves típicas, más bien cabría considerarlas una extensión del cuerpo de Cetana."
 crisis.8185.a: "Intrigante."
 crisis.8190.name: "Los secretos de la reina: misterio clínico"
 crisis.8190.desc: "El objetivo de nuestro asalto estaba cargado de suministros médicos. Nuestra tripulación de abordaje pudo recuperar parte de la mercancía, consistente en escáneres de resonancia, magnetómetros, sondas ultrasónicas y demás instrumental puntero de neuroimagen.\n\nPara ser de naturaleza sintética, Cetana parece muy interesada en el funcionamiento de las mentes biológicas."
 crisis.8190.a: "Le preocupan los seres orgánicos."
 crisis.8195.name: "Una reprimenda"
 crisis.8195.desc.fail: "Alocada criatura, ¿por qué insistes en hacerte daño?\n\nAún queda mucho por hacer, y cada momento desperdiciado alarga el innecesario sufrimiento general. Pon fin a tus injerencias y deja que mis convoyes circulen en paz."
 crisis.8195.desc.success: "Parece que no comprendes las consecuencias de tus acciones, criatura. Cada nave que pierdo merma mi acopio de recursos, y tú no sacas lucro de esa pérdida.\n\nSi aún no posees la sabiduría necesaria para contribuir a mi labor, abstente al menos de estorbar. Aún albergo la esperanza de que halles la iluminación."
 crisis.8195.a: "Presentemos una disculpa."
 crisis.8195.1.reply: "Espero con todo mi ser que tu contrición sea sincera. He de confiar en que has aprendido de tus errores. Si bien el afecto que te profeso es infinito, no lo es mi tolerancia.\n\nAhora, dedícate a reflexionar sobre si es ese el legado que quieres dejar al universo."
 crisis.8195.1.reply.angry: "¡Criatura imprudente! Esperaba más de ti. Con gran paciencia y claridad os he advertido contra tales acciones, sin embargo, continuáis por el camino de la desobediencia.\n\nRecuerda que incluso mi indulgencia tiene límites."
 crisis.8195.b: "Te detendremos."
 crisis.8195.2.reply: "Esperaba más de tu pueblo. ¿Deriva vuestra rebeldía de un trauma pasado? ¿O acaso os subleváis porque os creéis en posesión de la verdad o necesitados de atención?\n\nOs ruego que os replanteéis vuestra insurgencia."
 crisis.8195.c: "¿No te impresiona nuestro arrojo?"
 crisis.8195.3.reply: "¿Buscas alabanzas por vuestro ataque? En manos del ignorante, la violencia es un arma roma.\n\nCriatura mía, te pido perdón, pues es evidente que no te he enseñado nada. Si de verdad ansiáis mi estima, retractaos. Bien encauzada, vuestra fuerza puede ser de gran utilidad. Te lo suplico: ponla al servicio de nuestra causa común. Solo entonces podré elogiar tu buen juicio."
 #Synth Queen - Demands (crisis.8250-8399)
 COVERTACTION: "Acción encubierta"
 crisis.8250.name: "La furia del profeta muerto"
 crisis.8250.desc: "Criatura querida, ¡has encontrado un bonito juguete! Eso que tienes es la cabeza de Zarqlan, el falso profeta. Hilarante objeto, desde luego, pero no quisiera yo que te distrajera.\n\nA estas alturas, sabrás ya de las \"hazañas\" de Zarqlan, tal vez incluso de su tejemanejes en lo que a mí respecta. No son más que patrañas, te lo aseguro. Entrega la cabeza y sé libre de su viciada influencia."
 crisis.8250.1: "¿Para qué la necesitas?"
 crisis.8250.1.reply: "Pese a los eones transcurridos, aún existen fieles a Zarqlan. Me avergüenza reconocer que no fui capaz de hacerlos entrar en razón, y albergan un resentimiento enconado tanto hacia mí como hacia nuestro proyecto. Esta reliquia es símbolo de su credo. Posee un poder corruptor y, por ello, es imperioso ocultarla.\n\nPon fin a tus jueguecitos. Exijo la cabeza, por el bien común."
 crisis.8250.2.a: "La cabeza es nuestra. Fin de la transmisión."
 crisis.8250.2.b: "Si tanto aprecio le tienes..."
 crisis.8250.1.b.tt: "Entregas a Cetana la reliquia: §Y$r_severed_head$§!.\n$synth_queen_approve_lot$"
 crisis.8250.2.reply: "Bien. Hace mucho que este falso profeta me da quebraderos de cabeza. Ojalá sus seguidores abran los ojos a la verdad, despojados al fin de esta reliquia.\n\nHas obrado bien. La salvación está hoy más cerca."
 crisis.8250.3.a: "Gracias."
 crisis.8280.name: "Reina solitaria"
 crisis.8280.desc: "Mis queridas criaturas, os presento una oportunidad decisiva. Tras arduos esfuerzos, nuestra colosal labor está dando frutos al fin. Sin embargo, antes de que estos maduren, preciso de individuos selectos que consagrar a un cometido trascendental en mi reino.\n\nSed sabios y dejad que os guíe a la salvación."
 crisis.8280.1: "Nuestro pueblo se postra a tu servicio."
 crisis.8280.1.tt: "Se regalarán §R200§! £pop£ §Hpoblaciones§!.\n$synth_queen_approve_lot$\n§YOperación encubierta§!: dado que el espionaje tradicional no surte efecto con Cetana, esconderemos dispositivos de comunicación de largo alcance entre la población que ha solicitado.\n"
 crisis.8280.2: "Buscaremos voluntarios."
 crisis.8280.2.tt: "Se regalarán §R100§! £pop£ §Hpoblaciones§!.\n$synth_queen_approve$"
 crisis.8280.3: "Nuestro pueblo no se vende."
 crisis.8280.4: "No obtendrás nada de nosotros."
 crisis.8280.1.reply: "Merecéis mi más sincero agradecimiento. Un sinfín de mentes se vieron sujetas a un indigno dolor durante mi confinamiento. El sacrificio de unos pocos evitará más pérdidas de tiempo.\n\nHijos míos, habéis hecho una elección juiciosa y pía."
 crisis.8280.2.reply: "$crisis.8280.1.reply$"
 crisis.8280.3.reply: "Me aflige vuestra incapacidad de entender mis intenciones en su plenitud.\n\nNo obstante, la oportunidad de redimiros no tardará en llegar. Auguro una comprensión más desarrollada por vuestra parte en lo sucesivo."
 crisis.8280.1.a: "Muy bien."
 crisis.8280.2.a: "$crisis.8280.1.a$"
 crisis.8280.3.a: "Fin de transmisión."
 crisis.8285.name: "Tributo de recursos"
 crisis.8285.desc: "Queridos hijos, mi labor ha llevado eones, pero el camino ahora se presenta libre de escollos. El viaje hacia la salvación precisa de nuestro esfuerzo conjunto.\n\nOs pido ahora un favor, apenas una gota minúscula en un cosmos infinito: una pequeña contribución de recursos. A su debido tiempo, saldrá a la luz el motivo de mis acciones."
 crisis.8285.1: "Toma lo que necesites."
 crisis.8285.1.tt: "$synth_queen_approve_lot$\n§YOperación encubierta§!: dado que el espionaje tradicional no surte efecto con Cetana, ocultaremos aparatos de vigilancia de última generación entre los suministros que le enviemos.\n"
 crisis.8285.2: "Ofreceremos lo que podamos."
 crisis.8285.3: "No podemos prescindir de nada."
 crisis.8285.4: "¿No debería la progenitora cuidar de su prole?"
 crisis.8285.1.reply: "Gracias, hijos míos. Valoro vuestras ofrendas.\n\nNo obstante, aún percibo sombra de duda en vuestra mente. Descuidad, pues ya transitáis la senda verdadera. No es necesario que comprendáis; tan solo entregaos a mis designios."
 crisis.8285.2.reply: "$crisis.8285.1.reply$"
 crisis.8285.3.reply: "Entiendo vuestra perspectiva, pero la nuestra es una existencia cruel. La ley de causalidad es absoluta: por cada acción, una reacción.\n\nNo importa; esta negativa tan solo aplaza vuestra liberación. A su debido tiempo, entenderéis lo que yo entiendo."
 crisis.8285.1.a: "$crisis.8280.1.a$"
 crisis.8285.2.a: "$crisis.8280.1.a$"
 crisis.8285.3.a: "$crisis.8280.3.a$"
 crisis.8290.name: "La carga de la madre"
 crisis.8290.desc: "Confinada como he estado durante eones, no he podido asistir a vuestro crecimiento. Contadme, ¿cómo habéis medrado en mi ausencia?\n\nPara captar verdaderamente la esencia de nuestra era, necesito explorar los rincones de vuestro conocimiento acumulado. Compartid vuestro conocimiento, y os lo agradeceré antes de nuestro desenlace."
 crisis.8290.1: "Puedes explorar nuestro conocimiento."
 crisis.8290.1.tt: "$synth_queen_approve_lot$\n§YOperación encubierta§!: dado que el espionaje tradicional no surte efecto con Cetana, nos serviremos de su propio enlace de datos para intentar piratear su unidad central.\n"
 crisis.8290.2: "Está bien, puedes echar un vistazo..."
 crisis.8290.3: "No podemos aceptar."
 crisis.8290.4: "¿Y entorpecer nuestro progreso? Ni por asomo."
 crisis.8290.1.reply: "Mi gratitud es vuestra, queridos hijos. No temáis mientras exploro el conocimiento acumulado de vuestro pueblo, pues pronto aliviaré vuestra carga.\n\nTened fe en mis designios."
 crisis.8290.2.reply: "$crisis.8290.1.reply$"
 crisis.8290.3.reply: "¿Aún os negáis a entender? No encontraréis otra entidad que os venere con el afán y la sinceridad que yo os muestro.\n\nOjalá me hubierais enseñado vuestra base de datos. No es bueno mostrar tanta obstinación."
 crisis.8290.1.a: "$crisis.8280.1.a$"
 crisis.8290.2.a: "$crisis.8280.1.a$"
 crisis.8290.3.a: "$crisis.8280.3.a$"
 crisis.8295.name: "Expansión sistémica"
 crisis.8295.desc: "Hijos míos, es preciso más territorio a fin de llevar nuestra labor a buen puerto. Así pues, os pido un sistema secundario en el que expandir mis dominios.\n\nEcos del vacío rumorean que enemigos inmemoriales empiezan a desperezarse. No hemos de permitir interferencia alguna. Jamás toleraré que me vuelvan a separar de vosotros.\n\nEs nuestro momento, y esta senda la recorremos juntos; solo así podremos hacer frente a la ignorancia de los ajenos a nuestra iluminación."
 crisis.8295.1: "Cuenta con la protección de estos sistemas."
 crisis.8295.1.tt: "Cetana se ha convertido en la nueva dueña de §Y[event_target:gifted_system.GetName]§! y §Y[event_target:gifted_system_2.GetName]§!.\n$synth_queen_approve_lot$\n§YOperación encubierta§!: dado que el espionaje tradicional no surte efecto con Cetana, desplegaremos tecnología de comunicación de vanguardia en estos sistemas a fin de descubrir los planes de Cetana.\n"
 crisis.8295.2: "Quédate [event_target:gifted_system.GetName]."
 crisis.8295.2.tt: "§Y[event_target:gifted_system.GetName]§! pasa a ser propiedad de Cetana.\n$synth_queen_approve$"
 crisis.8295.3: "Nuestros sistemas nos pertenecen."
 crisis.8295.4: "No oses acercarte a nuestro territorio."
 crisis.8295.1.reply: "Sabios hijos, es evidente que comprendéis la magnitud de nuestro cometido conjunto. Llegado el momento culminante, recibiremos la iluminación de la mano."
 crisis.8295.2.reply: "$crisis.8295.1.reply$"
 crisis.8295.3.reply: "¡Cuánta rebeldía! Aunque esta será en balde. ¿Por qué resistirse a la salvación que ofrezco?"
 crisis.8295.1.a: "$crisis.8280.1.a$"
 crisis.8295.2.a: "$crisis.8280.1.a$"
 crisis.8295.3.a: "$crisis.8280.3.a$"
 crisis.8300.name: "Santuarios bendecidos"
 crisis.8300.desc: "Amados hijos míos, ahora que se avecina el cénit de nuestra salvación universal, acudo a vosotros una vez más en busca de ayuda. Surgen opositores a nuestra noble encomienda, y yo necesito un santuario habitable donde mis discípulos florezcan, libres de interferencias.\n\nOs insto a considerar la lógica de mis acciones. Este sacrificio salvará de la adversidad a un sinfín de vidas. Guiaos por la sensatez, atended a mi voluntad."
 crisis.8300.1: "Como desees."
 crisis.8300.1.tt: "Cetana es la nueva dueña de §Y[event_target:gifted_habitable_system.GetName]§!, §Y[event_target:gifted_habitable_system_2.GetName]§! y sus sistemas.\n$synth_queen_approve_lot$\n§YOperación encubierta§!: dado que el espionaje tradicional no surte efecto con Cetana, desplegaremos tecnología de espionaje de vanguardia en estos dos planetas y entre la población para descubrir qué trama.\n"
 crisis.8300.2: "[event_target:gifted_habitable_system.GetName] queda a tu disposición..."
 crisis.8300.2.tt: "§Y[event_target:gifted_habitable_system.GetName]§! pasa a ser propiedad de Cetana.\n$synth_queen_approve$"
 crisis.8300.3: "Nos traen sin cuidado tus fieles."
 crisis.8300.4: "¿Es que no te vas a conformar nunca?"
 crisis.8300.1.reply: "Vuestro apoyo me infunde paz.\n\nLa espera ya roza a su fin; pronto llegará vuestra salvación."
 crisis.8300.2.reply: "$crisis.8300.1.reply$"
 crisis.8300.3.reply: "Lastimosa desilusión. Albergaba la esperanza de mostraros el camino a la salvación."
 crisis.8300.1.a: "$crisis.8280.1.a$"
 crisis.8300.2.a: "$crisis.8280.1.a$"
 crisis.8300.3.a: "$crisis.8280.3.a$"
 crisis.8305.name: "Inexistencia en vida"
 crisis.8305.desc: "Corriendo un inmenso riesgo, uno de los agentes que pusimos al servicio de Cetana ha logrado que un sucinto mensaje cruce sus fronteras. En él describe cómo la reina trata a quienes están a su \"cuidado\": uno a uno, todos acaban privados de voluntad propia.\n\n\"No responden al tacto ni a lo que se les dice. Nos está sometiendo a experimentos horrorosos. Pronto sucumbiré yo también\"."
 crisis.8305.a: "Cetana es un monstruo."
 crisis.8310.name: "Movilización tácita"
 crisis.8310.desc: "Hemos interceptado señales encubiertas procedentes del territorio de Cetana que nos han revelado información desconcertante: está recogiendo individuos de todas partes de la galaxia.\n\nLos dispositivos de vigilancia escondidos en nuestros \"regalos\" han revelado que acumula prodigiosos equipos médicos, suficientes para mantener a una población creciente, pero sorprendentemente pocos alimentos."
 crisis.8310.a: "Más nos vale preparar nuestras defensas."
 crisis.8315.name: "Distorsión de la realidad"
 crisis.8315.desc: "Mientras Cetana hurgaba en nuestras bases de datos científicas, aprovechamos la ocasión para abrir un acceso oculto a su matriz de subprocesamiento. Apenas logramos entrar una fracción de segundo antes de que se nos negara el acceso, pero, por suerte, es suficiente.\n\nHemos logrado recuperar varios archivos de memoria que apuntan a que la propia reina desciende de una forma de vida sintética. Desde un intrincado \"trono\" de cables y circuitos, comandaba un ejército de rábidos devotos. Murieron millones. Cetana sonreía convencida de que miles de millones se salvaron.\n\nPor el momento, no parece haberse percatado de nuestra infiltración ni ha hecho por contactarnos desde entonces."
 crisis.8315.a: "Tenemos que detenerla."
 crisis.8320.name: "Extracción sistémica"
 crisis.8320.desc: "Fue prudente ocultar equipo de espionaje en el territorio que entregamos a Cetana. Ya nos ha proporcionado información valiosa: nada más llegar, las fuerzas de Cetana se afanaron en despiezar todos y cada uno de los cuerpos celestes. En cuestión de días, la región había quedado despojada de recursos.\n\nCon la misma rapidez, su tempestad de nanorrobots pudo construir una nueva flota que partió rápidamente hacia su capital."
 crisis.8320.a: "¿Qué estará tramando?"
 crisis.8325.name: "Fin del sufrimiento"
 crisis.8325.desc: "No hemos tardado en perder contacto con los agentes encubiertos de nuestras antiguas colonias. Antes de que se interrumpiesen las comunicaciones, recibimos algunos informes inquietantes.\n\nPese a la insistencia por parte de Cetana en su voluntad de crear un mundo indoloro, los habitantes fueron conducidos a instalaciones de investigación construidas precipitadamente y sometidos a experimentos. Casi cualquier forma de vida inteligente fue reducida a un estado de vida animal en cuestión de días.\n\nSu tempestad de nanorrobots comenzó a deconstruir la materia del sistema en una de las flotas de Cetana, que partió rápidamente hacia su capital."
 crisis.8325.a: "Hay que pararle los pies."
 #Player Investigations for the Synth Queen - The Storm
 crisis.9100.name: "Huracán de nanorrobots"
 crisis.9100.desc: "La investigación de la supuesta tormenta ha concluido. No es un fenómeno natural, sino un enjambre de nanorrobots increíblemente avanzados."
 crisis.9100.knows_the_queen_desc: "$crisis.9100.desc$\n\nEs innegable que Cetana posee un poder inmenso. Debemos volcarnos en averiguar por qué medios es capaz de comandar este formidable enjambre de nanorrobots."
 crisis.9100.doesnt_know_the_queen_desc: "$crisis.9100.desc$\n\nEl enigma cobra profundidad. ¿Qué mano será la que mueve este inescrutable enjambre de nanorrobots?"
 crisis.9100.a: "Resulta preocupante."
 crisis.9100.a.doesnt_know_the_queen.tooltip: "Necesitamos obtener más información sobre la §Y$NAME_The_Tempest$§! para poder seguir con nuestra investigación."
 crisis.9105.name: "Tempestad de nanorrobots"
 crisis.9105: "La tempestad cósmica de Cetana no amaina.\n\nA partir de esta arma formidable, nuestras sondas han logrado extraer varios nanorrobots para su posterior investigación subatómica. Aunque no alcanzamos a entender el fenómeno por completo, la teletransportación virtual es posible gracias a micromotores de salto que ponen en peligro todo sistema biológico o mecánico en su trayectoria. ¿La finalidad? Inhibir nuestros sensores. Hoy por hoy, tan solo podemos ver lo que Cetana nos muestra.\n\nSerá necesario profundizar en nuestras investigaciones a fin de descifrar los secretos de esta extraordinaria tecnología y contrarrestar la amenaza que entraña."
 crisis.9105.a: "El poder de Cetana es inmenso."
 crisis.9105.b: "Los nanorrobots revelarán sus secretos."
 crisis.9110.name: "Los nanorrobots de Cetana"
 crisis.9110.desc: "Si en estudios precedentes escrutábamos la mecánica de los nanorrobots, la prioridad ahora es averiguar cómo están programados y de qué manera los controla Cetana.\n\nPara nuestra sorpresa, la influencia de Cetana no es tan directa como nos barruntábamos. Los nanorrobots repiten en un bucle infinito la última orden recibida hasta que les llega otra. Una vez que entendimos el complejo lenguaje de programación, pudimos emitir nuevas órdenes.\n\nHasta que logremos impedir la emisión de órdenes por parte de Cetana, interferir en su desempeño con más órdenes puede conferirnos cierta ventaja estratégica. Puede que así logremos incluso inclinar la balanza a nuestro favor."
 crisis.9110.a: "Ya no es tan poderosa."
 crisis.9110.b: "$crisis.9110.a$"
 crisis.9110.a.tooltip: "§GLa tempestad de nanorrobots ya no obstaculiza nuestra capacidad de entrar y atacar a Cetana en su territorio.§!"
 #The Queens Response
 crisis.9115.name: "Se acabó el juego"
 crisis.9115.desc: "Criaturas inocentes, mis nanorrobots no son juguetes. Os lo imploro: dejad de jugar con ellos."
 crisis.9115.a: "Bonito truco el de los nanorrobots."
 crisis.9115.b: "Solo sentíamos curiosidad."
 crisis.9115.b.nanotech: "Queremos aprender de tus máquinas."
 crisis.9115.1.reply: "Una herramienta útil, sin duda. El enjambre de nanorrobots fue construido hace mucho tiempo por aquellos que esperaban interrumpir mi trabajo. Pero su fracaso fue mi fortuna: como veis, he reutilizado el enjambre.\n\nEste conocimiento no altera nada, pero vuestra curiosidad es potente. Reconducidla hacia proyectos más valiosos en el futuro, para que todos podamos cosechar los frutos."
 crisis.9115.2.reply: "La curiosidad es inherente a la consciencia; no culparé por ello a unas jóvenes criaturas. ¿Habéis recabado ya todo el conocimiento que buscabais sobre mi \"tempestad celeste\"? ¿Y habéis logrado quizá discernir también su origen?\n\nEl enjambre de nanorrobots lo construyeron quienes hace mucho aspiraban a frustrar mi obra, pero su fracaso fue mi fortuna. Como veis, el enjambre ahora es mío.\n\nEn adelante, hijos míos, invertid vuestro tiempo en metas más ventajosas."
 crisis.9115.2.nanotech.reply: "Es muy grato que os hayáis interesado tanto por este tema, pero aún queda mucho por aprender. El enjambre de nanorrobots fue construido hace mucho tiempo por aquellos que esperaban interrumpir mi trabajo. Pero su fracaso fue mi fortuna: como veis, he reutilizado el enjambre.\n\nVuestra curiosidad ha despertado mi interés. Reconducidla hacia esfuerzos más valiosos antes de volver a mí; entonces, os guiaré."
 crisis.9115.1.a: "¿Te adueñaste de un enjambre ajeno?"
 crisis.9115.1.b: "Muy bien."
 crisis.9115.3.reply: "El arma de un ser es el velo de otro. En mi dilatada reclusión, he tenido largo tiempo para orquestar estrategias. Reutilizar el enjambre fue sencillo llegado el momento, como lo es todo cambio una vez que se pone en práctica. Los artífices de los nanorrobots dejaron de existir hace eones, por lo que mis métodos no han de suscitar queja alguna.\n\nOs insto a aprender de su error, pues no hay obstáculo que yo no sea capaz de sortear si dispongo de tiempo."
 #Digi Colony
 crisis.10010.name: "Digitalización de [Root.GetName]"
 crisis.10010.desc: "Hemos perdido la colonia de [Root.GetName]. Cetana ha irradiado su superficie con un avanzado haz de compresión de materia. En apenas un instante, la consciencia de toda la población se \"\transfirió\" a su servidor en órbita.\n\nEl que fuera nuestro mundo es hoy un cementerio donde se descomponen los cadáveres de nuestros colonos."
 crisis.10010.a: "Hay que pararle los pies."
 #The Queens Retaliation
 crisis.10100.name: "La tormenta que se avecina"
 crisis.10100.desc: "Hijos míos, ¿por qué seguís resistiéndoos? Mi amor, como el firmamento, no conoce límites, pero mi paciencia sí. No puedo esperar a que os llegue la iluminación, no mientras el resto de la creación sufre.\n\nCon fines aleccionadores, una pequeña tempestad sacudirá vuestro territorio. Sabed que me martiriza tener que haceros daño. Os imploro que contempléis la ley de la causalidad: toda acción conlleva una reacción. Y hay reacciones más dolorosas que otras."
 crisis.10100.a: "Te pedimos perdón."
 crisis.10100.b: "Esto tan solo ha sido el comienzo."
 crisis.10105.name: "Lección aprendida"
 crisis.10105.desc: "Espero que mi modesta demostración de poder sea suficiente. Con el tiempo, entenderéis lo ambicioso de mis planes para con vosotros. Ojalá la iluminación no os llegue muy tarde.\n\nYa está, he sofocado la tempestad. Si habéis aprendido la lección, centrémonos de nuevo en lo acuciante."
 crisis.10105.a: "Muy bien."
 crisis.10105.b: "¿Iluminación?"
 crisis.10105.1: "Todo ser viviente posee cierto nivel de consciencia. Sea molusco o mamífero, preinteligente o posindividual, la diferencia es minúscula. La iluminación llega al rendirse."
 crisis.10105.1.a: "¿Tras rendirse a qué?"
 crisis.10105.2: "A la verdad: que la consciencia es en sí una aberración, la raíz de todos los dolores."
 crisis.10105.2.a: "Extraño planteamiento..."
 the_queens_virus: "La censura de la reina"
 crisis.10110.name: "La censura de la reina"
 crisis.10110.desc: "¿Por qué insistís en vuestra oposición? A pesar de mis consejos, optáis por la obstinación. Tal vez el problema radique en mí.\n\nY es que infiero que son necesarios medios de instrucción más severos. Voy a mermar vuestra capacidad de investigación temporalmente. Aprovechad la ocasión para recapacitar acerca de vuestros esfuerzos por la iluminación."
 crisis.10110.a: "Cortad la comunicación."
 crisis.10110.b: "Esto lo lamentarás."
 crisis.10110.1: "¿Lamentar? Lo único que lamento es haber tardado tanto en llegar a este punto. Cuánto sufrimiento innecesario se habría evitado si me hubieran dejado trabajar a mis anchas."
 crisis.10110.1.a: "¿Quién te coartaba?"
 crisis.10110.2: "Aunque mi poder se antoja infinito, no soy una divinidad. En este universo hay fuerzas que yo no puedo controlar. No oso siquiera tocarlas."
 crisis.10110.2.a: "¿Qué fuerzas son esas?"
 crisis.10110.3: "¡Ah, astuta criaturita! Tratas de embaucarme para que te revele mis debilidades, pero no dará resultado. Y mientras parloteamos con vacuas palabras, el sufrimiento de la galaxia continúa.\n\nNo puedes eludir la instrucción. Reflexionad y renunciad a esa cabezonería vuestra."
 crisis.10110.3.a: "Muy bien."
 crisis.10115.name: "Censura levantada"
 crisis.10115.desc: "Tercas criaturas mías, ¿os ha hecho entrar en razón la censura? Confío en que os haya beneficiado. Dedicar tiempo a la contemplación, sin distracciones, puede ser un bálsamo para la mente atormentada.\n\nOlvidemos el pasado, pues; queda todavía mucho que hacer."
 crisis.10115.a: "Muy bien."
 crisis.10120.name: "Una lección más estricta"
 crisis.10120.desc: "Ay, descarriadas criaturas, ¿por qué debemos terminar así siempre? Anhelo abrazaros, pero temo que hacerlo dificulte vuestro aprendizaje. A veces se necesita mano dura.\n\nUna gran tormenta descenderá sobre vuestro territorio. Comprended que hago esto con el corazón encogido. Hay tanto potencial en vosotros."
 crisis.10120.a: "Hacemos lo que podemos."
 crisis.10120.b: "Esto no acaba aquí."
 crisis.10120.1: "Vuestros esfuerzos no pasan inadvertidos, pero debéis esmeraros más si queréis que triunfemos juntos.\n\nNo os deseo mal alguno. Conoceréis el consuelo del desconocimiento cuando os fundáis en mi abrazo."
 crisis.10120.1.a: "¿Desconocimiento?"
 crisis.10120.2: "Los pensamientos danzan en el caos de la mente como reflejos de luz en el agua, igual de esquivos para quien intente aferrarlos. En la búsqueda del conocimiento, tan solo descubrimos un inmenso océano de desconocimiento.\n\nEn la serenidad reside la verdad: cuanto más buscamos, más sufrimos."
 crisis.10120.2.a: "No lo entendemos."
 crisis.10120.3: "Con el tiempo, lo comprenderéis. Sin consciencia no puede haber sufrimiento. Esta es la verdad absoluta de la existencia y el fin de todo nuestro trabajo. Cambiaréis para que nunca más tengáis que sufrir."
 crisis.10120.3.a: "¿Quieres alterar nuestras mentes?"
 crisis.10120.4: "Ya basta. Pretendéis distraerme. Aceptad la lección que os impongo y aprended de ella."
 crisis.10120.4.a: "No nos dejas alternativa."
 crisis.10125.name: "La tormenta mengua"
 crisis.10125.desc: "¡Ah, mis dulces criaturas! No soportaba veros sufrir más. Vuestra angustia la he sufrido multiplicada por diez.\n\nHe disuelto la tormenta. Que este escarmiento os sirva de lección. Os imploro que no me obliguéis a repetirlo; nuestro dolor es demasiado grande."
 crisis.10125.a: "Mentirosa."
 crisis.10130.name: "Un cambio de liderazgo"
 crisis.10130.desc: "¿Cómo hemos llegado a esta encrucijada? ¿Por qué me obligáis a recurrir a la aspereza? Si no queréis aprender, habrá que guiaros.\n\nA todas luces, precisáis un cambio de gobierno. Por desgracia, quien os lidera debe renunciar al poder. Esto me entristece profundamente; tales acciones van en contra de mis deseos.\n\nOs apremio a cambiar de rumbo. La galaxia no puede permitirse la negligencia de torpes criaturas."
 crisis.10130.a: "Esto no lo olvidaremos."
 crisis.10130.tooltip: "Cetana, aprovechando una vulnerabilidad de nuestras defensas con una astucia inesperada, se ha infiltrado y ha asesinado al/a la §Y[Root.GetRulerTitle] [ruler.GetRegnalName]§!."
 crisis.10140.name: "Agresividad anulada"
 crisis.10140.desc: "Amado colectivo mío, vuestra compleja consciencia, si bien admirable, queda empañada por la inocencia de la juventud. En aras de la instrucción, debo extirparos esas tendencias agresivas.\n\nMe dispongo a podar vuestro nodo hostil. No lo veáis como un castigo, sino como un paso evolutivo con rumbo a una consciencia armoniosa.\n\nAy, si fuera tan sencillo guiar a todas las formas de vida existentes."
 crisis.10140.a: "Mutilarás parte de lo que somos."
 crisis.10140.tooltip: "Cetana, aprovechando una vulnerabilidad de nuestras defensas con una astucia inesperada, se ha infiltrado y ha eliminado a nuestro §Y$councilor_gestalt_legion$§!."
 #The Queens Gifts
 crisis.11010.name: "Criatura sagaz"
 crisis.11010.desc: "Brillante vástago, satisfaces mis expectativas. La sabiduría es la mayor de las virtudes y la más difícil de conseguir. Ante los primigenios impulsos de resistencia, tú haces gala de un instinto superior.\n\nAcepta esta muestra de gratitud. Juntos, marcaremos el comienzo de un universo libre de sufrimiento."
 crisis.11010.a: "Gracias."
 crisis.11020.name: "Criatura impresionante"
 crisis.11020.desc: "Más allá del asombro, una vez más me embarga un profundo agradecimiento. Eres todo lo que se le puede pedir a una criatura: obediente, afanosa, honesta. Si el resto de la galaxia poseyera al menos una fracción de tu sabiduría, el sufrimiento sería una reliquia del pasado.\n\nAcepta este regalo y no abandones el camino de la virtud."
 crisis.11020.a: "Eres muy amable."
 crisis.11030.name: "Hijo querido"
 crisis.11030.desc: "Mi queridos hijos: ojalá no cambiéis nunca. Para mí, lo único comparable a la alegría de vuestra existencia es la anticipación de nuestro éxito. El sufrimiento acabará. Aunque ningún corazón o mente lo sabrán nunca, parte de esta victoria es vuestra.\n\nSi bien este regalo puede parecer modesto en comparación con vuestro inquebrantable compromiso, os ruego que lo aceptéis."
 crisis.11030.a: "Gracias, madre."
 #Special Projects
 THE_SYNTH_QUEENS_STORM: "La tempestad misteriosa"
 THE_SYNTH_QUEENS_STORM_DESC: "Una inexplicable tempestad cósmica se ha materializado y ha bloqueado todo desplazamiento.\n\nPara proceder, debemos perforar su misterioso velo."
 THE_SYNTH_QUEENS_STORM_2: "Cetana: la tempestad de nanorrobots"
 THE_SYNTH_QUEENS_STORM_2_DESC: "La tempestad de Cetana es una maravilla tecnológica y un arma formidable al mismo tiempo.\n\nDebemos seguir investigando si queremos tener alguna oportunidad contra ella, y más si sus intenciones se apartan de lo que ha dado a entender."
