 advanced_logic: "Lógica avanzada"
 advanced_logic_name: "$advanced_logic$:"
 advanced_logic_value: "£advanced_logic£ $VAL|0$"
 advanced_logic_gaining: "Completa §Hobjetivos de crisis§! para obtener más £advanced_logic£ §Ylógica avanzada§!."
 advanced_logic_desc: "La lógica avanzada mide nuestra comprensión de los secretos más insondables del universo."
 advanced_logic_crisis_objective: "Objetivos de la crisis"
