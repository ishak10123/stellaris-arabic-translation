 #Fallen Empire Reactions
 action.1.desc_111: "Estúpido mocoso. Dices que conoces lo divino y, sin embargo, profanas tu [Owner.Species.GetFleshTypeCyberCreed]. Pues que sepas que somos el [contact_empire.GetName], el pueblo elegido de esta galaxia. Mantened vuestros cuerpos impuros fuera de nuestros lugares sagrados o preparaos para la destrucción inmediata."
 action.1.desc_110: "Somos el [contact_empire.GetName], el pueblo elegido de esta galaxia. Durante siglos hemos dejado de atender las necesidades espirituales de las especies inferiores. Tú y tus naves impuras sois el mayor ejemplo de nuestro error. Aceptad nuestras doctrinas y convertíos u os pulverizaremos."
 #Cybernetic Situation Events
 machine_age.90.name: "Implantes divinos"
 machine_age.90.desc: "Los fieles han desvelado a todos los secretos de la cibernética. Sin embargo, hoy marca el comienzo de nuestro viaje, ya que ahora debemos aceptar plenamente la fusión divina."
 machine_age.90.a: "Es la hora."
 machine_age.90.a.tooltip: "Tenemos que adoptar el árbol de tradiciones ['tradition_category:tradition_cybernetics'] para empezar la fusión divina."
 machine_age.100.name: "El cónclave de la fusión"
 machine_age.100.desc: "A lo largo de la historia, nuestros intentos erróneos por aumentar nuestra [Owner.Species.GetFleshTypeCyberCreed] han lacerado inevitablemente numerosas naves divinas, lo que ha dado lugar a interpretaciones contradictorias de la fusión divina entre los distintos credos.\n\nAhora que la tecnología permite un aumento íntegro, los santos líderes de nuestra fe, los tecnofantes, han convocado un cónclave. Su propósito es establecer los principios fundamentales de nuestra Iglesia, fusionando los credos individuales en un dogma unificado."
 machine_age.100.a: "Que la divinidad los guíe."
 machine_age.1000.name: "La fusión de fe"
 machine_age.1000.desc: "Formar el cónclave de los tecnofantes ha sido un trabajo arduo, ya que los credos más importantes exigieron representación en el mismo. Tras algunas deliberaciones, se decidió invitar a §Y$CYBERCREED_construction$§!, §Y$CYBERCREED_war$§!, §Y$CYBERCREED_research$§! y §Y$CYBERCREED_labor$§!.\n\nEl cónclave ahora tratará su divina tarea con férrea convicción. Su primer decreto exige un aumento de los diezmos o un servicio comunitario obligatorio por parte de la población general."
 machine_age.1000.a: "Debemos elegir de qué manera apoyaremos al cónclave."
 machine_age.1000.a.tooltip: "Habrá más opciones de enfoque disponibles para la situación."
 machine_age.1010.name: "El código de aumento"
 machine_age.1010.desc: "El segundo decreto del cónclave de los tecnofantes es una llamada para formalizar la fe. Durante mucho tiempo, las diferencias entre los distintos credos han causado fricciones en nuestra sociedad.\n\nLos credos más importantes abogan por una fe unificada, mientras que las voces más moderadas defienden una vía que se muestre abierta y sea integradora."
 machine_age.1010.a: "La Hermandad del Martillo debería construir un futuro más brillante."
 machine_age.1010.a.tooltip: "El dogma se formará en torno al §Y$CYBERCREED_construction$§!. $machine_age.1010.shared.tooltip$"
 machine_age.1010.b: "Los Templarios del Acero protegerán nuestra [Owner.Species.GetFleshTypeCyberCreed]."
 machine_age.1010.b.tooltip: "El dogma se formará en torno al credo de §Y$CYBERCREED_war$§!.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.c: "El Coro de la Mente cantará al progreso."
 machine_age.1010.c.tooltip: "El dogma se formará en torno al credo de §Y$CYBERCREED_research$§!.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.d: "La Comuna del Esfuerzo dará sentido a nuestros trabajadores."
 machine_age.1010.d.tooltip: "El dogma se formará en torno al credo de §Y$CYBERCREED_labor$§!.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.e: "Deberíamos poner fin a estos dogmas divisivos."
 machine_age.1010.e.tooltip: "Los credos serán reformados en §Y$pft_cyber_creed_general$§!, permitiendo que cada fiel sea modificado.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.shared.tooltip: "Todos los edificios que estén asociados a otros credos se reemplazarán por §Ytemplos§!.\nEste credo se mantendrá como la única §Yfacción espiritualista§!.\nSe permitirá la formación de facciones que pertenezcan a las éticas §Yno espiritualistas§!."
 machine_age.1020.name: "Las fes falsas"
 machine_age.1020.desc.pickedacreed: "Tras elegir el §Y[GetCyberCreed]§!, el resto de credos han protestado. Muchos creen que el cónclave se ha vuelto contra la fe \"verdadera\". \n\n$machine_age.1020.both$"
 machine_age.1020.desc.nocreed: "Los credos están protestando y aseguran que el cónclave ha rechazado la fe.\n\n$machine_age.1020.both$"
 machine_age.1020.both: "Hasta ahora, las protestas han sido acaloradas pero pacíficas. Solo el tiempo dirá si estas chispas terminarán convirtiéndose en llamas.\n\nSea lo que sea que venga después, debemos decidir el destino del resto de credos. Algunos han pedido una excomunión total, calificando su dogma de herejía, y la agitación que han causado es buena evidencia de su blasfemia. Otros creen que la misericordia es la forma de seguir adelante; por eso piden que mostremos tolerancia hacia los miembros desviados de nuestra fe."
 machine_age.1020.a: "Solo puede haber una fe."
 machine_age.1020.a.tooltip: "Los tecnofantes eliminarán el resto de credos, lo cual puede ocasionar malestar."
 machine_age.1020.b: "En nuestra fe hay sitio para todos."
 machine_age.1020.b.tooltip: "Aunque habrá un dogma oficial, los tecnofantes tolerarán las prácticas de otros credos."
 machine_age.1030.name: "Molestando a los fieles"
 machine_age.1030.desc: "Han estallado protestas minoritarias por todos nuestros planetas y muchas condenan lo que consideran una desviación de la fusión sagrada. Los tecnofantes creen que la inestabilidad es solo temporal, dado que la mayoría de nuestro pueblo apoya al dogma unificado, y solo es cuestión de tiempo que los manifestantes más entusiastas acepten la verdad divina."
 machine_age.1030.a: "Solo habrá una fe."
 machine_age.1030.a.tooltip: "La decisión de eliminar los credos rivales ha provocado cierto malestar."
 machine_age.1040.name: "Conversión voluntaria"
 machine_age.1040.desc: "La dedicación a un dogma unificado se ha extendido entre la población, y la mayoría de los practicantes de los diversos credos han renegado de sus antiguas costumbres.\n\nTodo el mundo, excepto los auténticos fanáticos, se encuentra preparando su [Owner.Species.GetFleshTypeCyberCreed] divina para la transformación final."
 machine_age.1040.a: "La verdad de nuestra fusión divina prevalece."
 machine_age.1040.a.tooltip: "Hemos unificado la fe con éxito."
 machine_age.1050.name: "Credos satisfechos"
 machine_age.1050.desc: "La opción más pacífica ha sido permitir la libertad de expresión de los distintos credos: únicamente se han observado pequeñas protestas y solo los miembros más entusiastas de los credos han participado en ellas.\n\nAhora que la mayoría de los fieles siguen nuestro dogma oficial, estamos preparados para centrarnos en la fusión divina."
 machine_age.1050.a: "Somos una fe sin divisiones."
 machine_age.1050.a.tooltip: "La tolerancia concedida a los distintos credos ha evitado los disturbios."
 machine_age.1060.name: "Compromiso irracional"
 machine_age.1060.desc: "Ceder ante las intransigentes demandas ha disgustado a la mayoría de los moderados. Afirmando que cada credo tiene una larga historia de violencia interreligiosa, muchos creen que permitir que creencias marginales no tengan oposición ha sido una decisión equivocada.\n\nLa mayoría pide que se reformen oficialmente los credos y que se elimine cualquier independencia que pudieran tener."
 machine_age.1060.a: "Los fieles deben ser tolerantes."
 machine_age.1060.a.tooltip: "La tolerancia que se ha concedido a los credos ha enfadado a las facciones más moderadas de nuestra fe y ha ocasionado agitación."
 machine_age.1060.b: "Empezad a reformar los credos."
 machine_age.1060.b.tooltip: "La fe absorberá los diferentes credos y pondrá fin a sus mezquinas disputas doctrinales."
 machine_age.1070.name: "El diezmo del tiempo"
 machine_age.1070.desc: "A medida que se acerca la gran fusión, echamos la vista atrás a una antigua tradición de la fe: el diezmo del tiempo.\n\nDurante incontables generaciones, todos los miembros fieles de la sociedad han entregado una parte de su tiempo y energía a la Iglesia. Al igual que la fusión divina, este servicio ayuda a fortalecer al cuerpo de la fe.\n\n¿Cuál es la mejor forma de que los fieles apoyen el aumento divino?"
 machine_age.1070.intro: "Cada año, los fieles de nuestra población dedicarán una porción de su tiempo"
 machine_age.1070.a: "El diezmo de las minas."
 machine_age.1070.a.tooltip: "$machine_age.1070.intro$ para explotación minera."
 machine_age.1070.b: "El diezmo de la agricultura."
 machine_age.1070.b.tooltip: "$machine_age.1070.intro$ para cultivar."
 machine_age.1070.c: "El diezmo del acero."
 machine_age.1070.c.tooltip: "$machine_age.1070.intro$ para trabajar en las forjas."
 machine_age.1070.d: "El diezmo de la construcción."
 machine_age.1070.d.tooltip: "$machine_age.1070.intro$ para construir edificios y trabajar en los astilleros."
 machine_age.1070.e: "El diezmo del ejército."
 machine_age.1070.e.tooltip: "$machine_age.1070.intro$ para el servicio militar."
 machine_age.1070.f: "El diezmo de la marina."
 machine_age.1070.f.tooltip: "$machine_age.1070.intro$ para el servicio naval."
 machine_age.1070.g: "El diezmo de aumento."
 machine_age.1070.g.tooltip: "$machine_age.1070.intro$ para investigar cibernética divina."
 machine_age.1070.h: "El diezmo del conocimiento."
 machine_age.1070.h.tooltip: "$machine_age.1070.intro$ para investigar los secretos del universo."
 machine_age.1070.i: "El diezmo del trabajo."
 machine_age.1070.i.tooltip: "$machine_age.1070.intro$ para la producción de necesidades."
 machine_age.1070.j: "El diezmo de la riqueza."
 machine_age.1070.j.tooltip: "$machine_age.1070.intro$ para comerciar."
 machine_age.1070.k: "El diezmo de la artesanía."
 machine_age.1070.k.tooltip: "$machine_age.1070.intro$ para elaborar productos de calidad."
 machine_age.1075.name: "Sangre y circuitos"
 machine_age.1075.desc: "Por fin ha llegado la hora de la fusión divina.\n\nEs hora de construir §Y$building_augmentation_center$s§! sagrados en nuestros mundos para que dé comienzo el proceso."
 machine_age.1075.a: "$machine_age.1090.pray$"
 machine_age.1075.a.tooltip: "El aumento cibernético completo ha comenzado para los fieles. Todas las demás acciones del cónclave se detendrán hasta que se complete la fusión divina.\n\n§RAcción requerida:§!\nconstruir un $building_augmentation_center$ para retomar la situación §Y$situation_cybernetic_creed_cyberization$§!."
 machine_age.1090.name: "El futuro de la carne"
 machine_age.1090.desc: "Al completar el viaje divino, nuestras naves alcanzan por fin la fusión sagrada de máquina y [Owner.Species.GetFleshTypeCyberCreed]. El último paso para los fieles es la instalación de aumentos sagrados."
 machine_age.1090.construction: "$machine_age.1090.desc$ §Y$CYBERCREED_construction$§! exige que nuestros cuerpos se transformen en instrumentos divinos.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.war: "$machine_age.1090.desc$ §Y$CYBERCREED_war$§! exige a los fieles que se transformen en armas sagradas.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.research: "$machine_age.1090.desc$ §Y$CYBERCREED_research$§! revelará los secretos del universo con una población de mentes conectadas en red.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.labor: "$machine_age.1090.desc$ §Y$CYBERCREED_labor$§! promete que nuestros cuencos y almacenes siempre estarán llenos.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.pray: "Fusionarse es divino. El aumento es adoración."
 machine_age.1090.a: "Forjaremos una nueva era de [GetCyberCreed]."
 machine_age.1090.a.tooltip: "$machine_age.geneslockedtooltip$\n$cyber.21.a.end$\n$machine_age.democraticgovtooltip$\nDesbloquea el edicto: §Y[GetCyberCreedEdict]§!"
