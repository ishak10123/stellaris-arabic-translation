 cybercreed_tithe_cybernetics: "El diezmo del aumento"
 cybercreed_tithe_cybernetics_desc: "$machine_age.1070.intro$ para investigar cibernética divina."
 cybercreed_tithe_research: "El diezmo del conocimiento"
 cybercreed_tithe_research_desc: "$machine_age.1070.intro$ para investigar los secretos del universo."
 cybercreed_tithe_labor: "El diezmo del trabajo"
 cybercreed_tithe_labor_desc: "$machine_age.1070.intro$ para la producción de necesidades."
 cybercreed_tithe_wealth: "El diezmo de la riqueza"
 cybercreed_tithe_wealth_desc: "$machine_age.1070.intro$ para comerciar."
 cybercreed_tithe_craft: "El diezmo de la artesanía"
 cybercreed_tithe_craft_desc: "$machine_age.1070.intro$ para elaborar productos de calidad."
 cyber_creed_flesh_rock: "piedra"
 cyber_creed_flesh_plant: "fibra"
 cyber_creed_flesh_arthropod: "quitina"
 cyber_creed_flesh_default: "carne"
 cyber_creed_flesh_machine: "constructos"
 building_amphitheater_of_the_mind: "Anfiteatro de la mente"
 building_amphitheater_of_the_mind_desc: "Este santuario de procesamiento localizado permite al Coro de la Mente semiconectado debatir, compartir y explorar los secretos del plano material a la velocidad de la luz."
 building_grand_concert_hall_of_the_mind: "La gran sala de conciertos de la mente"
 building_grand_concert_hall_of_the_mind_desc: "El sistema de comunicación de última generación que albergan estas salas resonantes permite que el Coro de la Mente se reúna en busca de la divinidad. Junto con el ciberware, sus cánticos desentrañarán las melodías ocultas del universo."
 building_forge_of_the_fellowship: "Forja de la Hermandad"
 building_forge_of_the_fellowship_desc: "La primera forja de la Hermandad del Martillo produce materiales de construcción de primerísima calidad. Los martillos cantan mientras los fieles llevan a cabo su trabajo divino."
 building_grand_forge_of_the_fellowship: "Gran forja de la Hermandad"
 building_grand_forge_of_the_fellowship_desc: "Muy lejos de los pasillos de la gran forja, los fieles pueden oír la letanía de las herramientas incansables de la Hermandad. Por la noche, el brillo de la ornamentada catedral de fundición eclipsa las estrellas del cielo, igual que nuestras chispas sagradas brillan por lo divino."
 building_battlement_of_steel: "Almenas de acero"
 building_battlement_of_steel_desc: "Esta iglesia fortificada alberga la armería y el campo de entrenamiento de los Templarios del Acero, listos para la batalla. Estos permanecen vigilantes para proteger nuestra carne divina."
 building_grand_battlements_of_steel: "Las grandes almenas de acero"
 building_grand_battlements_of_steel_desc: "Ojalá que las magníficas paredes de esta gran catedral fortaleza no se derrumben jamás. Su armería está a rebosar de implantes santificados de los Templarios del Acero, a la espera de un campeón ungido. En estas salas, la divinidad habita en la interfaz de la carne y del acero."
 building_sanctuary_of_toil: "Santuario del esfuerzo"
 building_sanctuary_of_toil_desc: "Este santuario coordina, repara y rejuvenece la carne y los aumentos de la Comuna del Esfuerzo."
 building_grand_cathedral_of_toil: "Gran catedral del esfuerzo"
 building_grand_cathedral_of_toil_desc: "Bienaventurados los que proveen a las necesidades de los fieles. Que sus maltrechas almas descansen en la gran catedral del esfuerzo. Sus talleres y centros de coordinación guían y reponen a los fieles trabajadores y a sus santos aumentos para todos su deberes divinos."
 building_the_sanctum_of_augmentation: "Santuario del aumento"
 building_the_sanctum_of_augmentation_desc: "Con el espíritu de una fe compartida, este santuario sagrado se erige como un símbolo de unidad. Dentro de estas cámaras consagradas, los fieles atienden a las almas y aumentos de su rebaño."
 building_the_united_sanctum_of_augmentation: "Santuario unido del aumento"
 building_the_united_sanctum_of_augmentation_desc: "Este majestuoso santuario se alza como un testimonio vivo del respeto a la más sagrada fusión. En sus cámaras consagradas se congregan los fieles, inquebrantables en su compromiso por promover la noble causa de la fusión divina."
 #Advanced Cyber Creed Authorities
 auth_cyber_creed_democratic: "Aumentocracia democrática"
 auth_cyber_creed_democratic_desc: "Los gobiernos cibernéticos democráticos tienen derechos de voto sagrados que permiten a los ciudadanos aumentados hacer oír su voz en diversos asuntos políticos, cumpliendo así su comunión con lo divino."
 concept_auth_cyber_creed_democratic: "$auth_cyber_creed_democratic$"
 auth_cyber_creed_oligarchic: "Ciberteocracia oligárquica"
 auth_cyber_creed_oligarchic_desc: "Los gobiernos oligárquicos cibernéticos tienen un grupo privilegiado de individuos altamente aumentados que mantienen el poder político total y que dirigen a su sociedad cibernética con una precisión inigualable."
 concept_auth_cyber_creed_oligarchic: "$auth_cyber_creed_oligarchic$"
 auth_cyber_creed_dictatorial: "Sintodoxia dictatorial"
 auth_cyber_creed_dictatorial_desc: "Los gobiernos cibernéticos dictatoriales seleccionan a gobernantes vitalicios que poseen el control absoluto mediante implantes cibernéticos avanzados y guían el destino de la sociedad."
 concept_auth_cyber_creed_dictatorial: "$auth_cyber_creed_dictatorial$"
 auth_cyber_creed_imperial: "Cibernetato imperial"
 auth_cyber_creed_imperial_desc: "Los gobiernos cibernéticos imperiales tienen un gobernante supremo y un sucesor designado para asegurar la sucesión del poder. Estos aúnan espiritualidad y cibernética avanzada en un gobierno inquebrantable."
 concept_auth_cyber_creed_imperial: "$auth_cyber_creed_imperial$"
 auth_cyber_creed_corporate: "Corporación tecnosagrada"
 auth_cyber_creed_corporate_desc: "Los gobiernos corporativos cibernéticos trascienden las funciones estatales tradicionales mediante implantes avanzados, una fusión de fe y tecnología a fin de buscar oportunidades financieras divinas."
 concept_auth_cyber_creed_corporate: "$auth_cyber_creed_corporate$"
 #Advanced Cyber Creed Government Types
 gov_cyber_creed_monarchy: "Soberanía cibernética"
 gov_cyber_creed_monarchy_desc: "Este gobierno es una monarquía tecnoespiritualista en la que el gobernante y su progenie constituyen símbolos divinos de la sagrada fusión. La Iglesia apoya directamente al aparato estatal."
 gov_cyber_creed_dictatorship: "Tecnocracia divina"
 gov_cyber_creed_dictatorship_desc: "Este gobierno es una dictadura tecnoespiritualista, gobernada por un solo individuo aumentado dentro de una estructura de poder jerárquica aprobada por la religión oficial."
 gov_cyber_creed_oligarchy: "Consejo de tecnofantes"
 gov_cyber_creed_oligarchy_desc: "Este gobierno es una forma tecnoespiritualista de oligarquía en la que el poder político está en manos de las facciones religiosas más poderosas de la nación."
 gov_cyber_creed_democracy: "República trascendida"
 gov_cyber_creed_democracy_desc: "Este gobierno es una forma tecnoespiritualista de democracia, donde un consejo religioso de individuos aumentados supervisa el proceso democrático."
 gov_cyber_creed_divine_empire: "Imperio divino aumentado"
 gov_cyber_creed_divine_empire_desc: "Este gobierno es una forma de tecnoespiritualista de autocracia. La fe oficial del estado permea cada aspecto de la vida pública, y el pueblo considera a su gobernante aumentado un dios viviente infalible."
 gov_cyber_creed_holy_tribunal: "Tribunal de tecnofantes"
 gov_cyber_creed_holy_tribunal_desc: "Este gobierno es una forma de tecnoespiritualista de oligarquía en la que un consejo del clero, guiado por voluntad divina, controla todos los mecanismos del estado."
 gov_cyber_creed_megachurch: "Megaiglesia aumentada"
 gov_cyber_creed_megachurch_desc: "Este gobierno es una oligarquía basada en una mezcla de valores comerciales y tecnoespirituales en la que los puestos de sacerdote ordenado y director corporativo se han fundido en uno solo."
 gov_cyber_creed_subversive_cult: "Culto a las máquinas"
 gov_cyber_creed_subversive_cult_desc: "Este gobierno es un culto religioso que depende de una variedad de empresas criminales y corporativas centradas en la cibernética."
 #Advanced Government Edicts
 edict_cybernetic_creed_construction_edict: "Martilleo de la virtud"
 edict_cybernetic_creed_construction_edict_desc: "Si queremos instaurar una sociedad divina, debemos apoyar plenamente a la Hermandad del Martillo, pues su trabajo es clave para construir un futuro digno de la divinidad."
 edict_cybernetic_creed_war_edict: "La cruzada del acero"
 edict_cybernetic_creed_war_edict_desc: "Para protegernos de los demonios que atacan nuestra carne divina, hemos de apoyar a los Templarios del Acero. Así, nuestros guerreros estará siempre preparados."
 edict_cybernetic_creed_research_edict: "La canción del conocimiento"
 edict_cybernetic_creed_research_edict_desc: "Solo a través de la vibrante canción del conocimiento nuestro pueblo llegará a conocer la divinidad. Hemos de apoyar al Coro de la Mente en todas sus iniciativas."
 edict_cybernetic_creed_construction_labor: "Las masas trabajadoras"
 edict_cybernetic_creed_construction_labor_desc: "Nuestra verdadera fuerza reside en nuestros trabajadores. Si no tenemos la fuerza necesaria para levantarlos, ellos no tendrán la fuerza necesaria para llevarnos hacia el futuro."
 edict_cybernetic_creed_general_edict: "Lecciones de armonía"
 edict_cybernetic_creed_general_edict_desc: "Unificar la Iglesia fue de lo más aleccionador. Nuestra fe se ha vuelto más fuerte y contemplativa que nunca."
 #Intro Events
 machine_age.2150.name: "Los credos"
 machine_age.2150.desc: "Varios credos de nuestra fe, guiados por la divinidad hasta las estrellas, esperan ejercer su influencia en el nuevo gobierno.\n\nCada uno ejerce una influencia considerable sobre los fieles, abogando por la elevación de sus miembros a posiciones influyentes y satisfaciendo sus distintas necesidades espirituales.\n\nSolo el tiempo dirá si tanta diversidad de presiones nos acercará a la divinidad o nos sumirá en el caos."
 machine_age.2150.a: "Con suerte, serán de ayuda."
 machine_age.2150.a.tooltip: "§YFacciones formadas§!:\n- $cyber_creed_labor$\n- $cyber_creed_war$\n- $cyber_creed_research$\n- $cyber_creed_construction$"
 cyber_creed_please_labor: "Esto agradará al credo §Y$cyber_creed_labor$§!.\nDesagradará al resto."
 cyber_creed_displease_labor: "Esto agradará al credo §Y$cyber_creed_labor$§!.\nDesagradará al resto."
 cyber_creed_please_war: "Esto agradará al credo §Y$cyber_creed_war$§!.\nDesagradará al resto."
 cyber_creed_displease_war: "Esto agradará al credo §Y$cyber_creed_war$§!.\nDesagradará al resto."
 cyber_creed_please_construction: "Esto agradará al credo §Y$cyber_creed_construction$§!.\nDesagradará al resto."
 cyber_creed_displease_construction: "Esto agradará al credo §Y$cyber_creed_construction$§!.\nDesagradará al resto."
 cyber_creed_please_research: "Esto agradará al credo §Y$cyber_creed_research$§!.\nDesagradará al resto."
 cyber_creed_displease_research: "Esto agradará al credo §Y$cyber_creed_research$§!.\nDesagradará al resto."
 machine_age.2205.name: "Reescribiendo la historia"
 machine_age.2205.desc: "Los §YTemplarios del Acero§! iniciaron hace poco una campaña para omitir cualquier derrota militar en nuestros registros históricos o religiosos.\n\nEl credo afirma que esta información desmoraliza a quienes están en el servicio militar y debilita el apoyo público. Nuestros historiadores descartan esta noción y nos recuerdan que aquellos que no conocen la historia están abocados a repetirla.\n\n¿Deberíamos difundir una versión más positiva de nuestro pasado?"
 machine_age.2205.a: "Para ganar, hay que tener mentalidad ganadora."
 machine_age.2205.a.tooltip: "$cyber_creed_please_war$"
 machine_age.2205.b: "Es inaceptable. Debemos aprender de nuestros errores."
 machine_age.2205.b.tooltip: "$cyber_creed_displease_war$"
 machine_age.2210.name: "La llama se ha extinguido"
 machine_age.2210.desc: "El líder de la §YHermandad del Martillo§!, el sumo herrero, ha sufrido una muerte repentina.\n\nA pesar de ser conocido por su comportamiento franco y sus puntos de vista decisivos, tenía un culto entre los miembros del credo. La Hermandad ha solicitado celebrar un funeral oficial de estado, un honor reservado normalmente para nuestros líderes más queridos.\n\nPara sorpresa de nadie, los demás credos exigen que el estado no debería tomar parte en el entierro del líder espiritual.\n\n¿Cómo deberíamos abordar estas exigencias?"
 machine_age.2210.a: "Adelante con el funeral."
 machine_age.2210.a.tooltip: "$cyber_creed_please_construction$"
 machine_age.2210.b: "No vale la pena irritar a los demás credos."
 machine_age.2210.b.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2215.name: "Reliquias controvertidas"
 machine_age.2215.desc: "Hace poco, un equipo de arqueólogos descubrió un antiguo yacimiento religioso. Su existencia se consideraba un mito, por lo que hemos tenido que revisar algunos registros históricos de nuestra fe.\n\nEl dato más sorprendente es que la iconografía de buena parte de los artefactos descubiertos recuerda a la de la §YComuna del Esfuerzo§!. Esta información demostraría que la Comuna es la interpretación original de nuestra religión, un aspecto muy debatido de nuestra fe.\n\nReconocer esta revelación como oficial, complacería mucho a la §YComuna del Esfuerzo§!. Por otra parte, guardar un estratégico silencio complacería a los demás credos."
 machine_age.2215.a: "No hay que temer la verdad."
 machine_age.2215.a.tooltip: "$cyber_creed_please_labor$"
 machine_age.2215.b: "Si estaba enterrado, sería por algo. Vamos a ignorarlo."
 machine_age.2215.b.tooltip: "$cyber_creed_displease_labor$"
 machine_age.2221.name: "Agente infiltrado del credo"
 machine_age.2221.desc: "Hemos descubierto que §Y[cyber_creed_undercover_leader.GetName]§! guarda una relación estrecha con §Y[GetCyberCreed]§!. No solo ha malversado fondos, sino que también ha reorientado proyectos a conveniencia del credo.\n\nLos demás credos han montado en cólera por semejante abuso de poder durante la administración actual y exigen despojar a §Y[cyber_creed_undercover_leader.GetName]§! de su cargo con carácter inmediato.\n\n¿Cómo deberíamos proceder con el líder díscolo?"
 machine_age.2221.a: "Retiremos a [cyber_creed_undercover_leader.GetHerHim] del cargo."
 machine_age.2221.a.tooltip: "Hemos retirado a [cyber_creed_undercover_leader.GetName] del poder."
 machine_age.2221.b: "El bien que ha hecho compensa de sobra su afrenta."
 machine_age.2225.name: "Jubileo del Martillo"
 machine_age.2225.desc: "El viaje del jubileo de la §YHermandad del Martillo§! está a punto de comenzar. Un sinfín de fieles partirán desde sus forjas locales a la §Y$building_forge_of_the_fellowship$§! de la capital.\n\nHistóricamente, este acontecimiento ha planteado toda clase de problemas logísticos, y a menudo se ha saldado con estallidos de violencia de la Hermandad contra los miembros de otros credos.\n\nSe han producido llamamientos por parte de los credos y los residentes de la capital para cancelar esta tradición."
 machine_age.2225.a: "Prohibamos el peregrinaje de una vez."
 machine_age.2225.a.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2225.b: "La libertad religiosa es un derecho."
 machine_age.2225.b.tooltip: "$cyber_creed_please_construction$"
 machine_age.2230.name: "Reivindicaciones por tecnología exigua"
 machine_age.2230.desc: "Hace poco, el líder del §YCoro de la Mente§!, el gran maestro del coro, habló públicamente sobre la falta de atención de nuestros fieles a la financiación de la investigación.\n\nInferimos que es una estratagema para proveer de más fondos a los miembros de su credo. Si cedemos a sus peticiones, los demás podrían pensar que damos al §YCoro de la Mente§! un trato preferente.\n\n¿Deberíamos aumentar los fondos para la ciencia?"
 machine_age.2230.a: "El Gran Maestro del Coro puede cantar hasta desgañitarse."
 machine_age.2230.a.tooltip: "$cyber_creed_displease_research$"
 machine_age.2230.b: "Aumentemos los fondos moderadamente hasta que la situación se calme."
 machine_age.2230.b.tooltip: "$cyber_creed_please_research$"
 machine_age.2230.c: "Aumentaremos los fondos en gran medida."
 machine_age.2230.c.tooltip: "$cyber_creed_please_research$"
 cyber_creed_history_rewritten: "Historia reescrita"
 cyber_creed_history_rewritten_desc: "Hemos borrado de nuestros registros toda referencia a derrotas militares, para disgusto de los historiadores."
 cyber_creed_history_repeating: "La historia se repite"
 cyber_creed_history_repeating_desc: "Hemos mantenido en nuestros registros toda referencia a derrotas militares. Esta decisión no ha agradado a los Templarios del Acero."
 cyber_creed_no_choirmaster_funding: "Gran maestro del coro ignorado"
 cyber_creed_no_choirmaster_funding_desc: "Hemos ignorado las peticiones del Coro de la Mente para aumentar los fondos científicos."
 cyber_creed_low_choirmaster_funding: "Gran maestro escuchado"
 cyber_creed_low_choirmaster_funding_desc: "Hemos aumentado ligeramente los fondos de investigación para apaciguar al Coro de la Mente."
 cyber_creed_high_choirmaster_funding: "Gran maestro aceptado"
 cyber_creed_high_choirmaster_funding_desc: "Hemos aceptado plenamente el deseo del Coro de la Mente de financiar investigaciones."
 cyber_creed_state_funeral: "Funeral de los sumos herreros"
 cyber_creed_state_funeral_desc: "Hemos celebrado un funeral de estado para el líder de la Hermandad del Martillo."
 cyber_creed_no_state_funeral: "Sin funeral de estado"
 cyber_creed_no_state_funeral_desc: "Hemos rechazado el funeral de estado para el líder de la Hermandad del Martillo."
 cyber_creed_relics_truth: "Verdad revelada"
 cyber_creed_relics_truth_desc: "Hemos difundido la verdad sobre la era de la Comuna del Esfuerzo, lo que ha enfurecido a los demás credos."
 cyber_creed_relics_hidden: "Verdad enterrada"
 cyber_creed_relics_hidden_desc: "Al ignorar la reliquia, casi todos los credos quedaron complacidos. Sin embargo, la confianza en el liderazgo de la fe se ha resentido."
 cyber_creed_leader_removed: "Líder rebelde eliminado"
 cyber_creed_leader_removed_desc: "Se ha eliminado del poder a nuestro líder por ser un infiltrado del credo."
 cyber_creed_leader_stayed: "El líder rebelde se queda"
 cyber_creed_leader_stayed_desc: "Pese a las peticiones de destitución, hemos mantenido al líder infiltrado del credo."
 cyber_creed_pilgrimage_allowed: "Peregrinaje de la Hermandad permitido"
 cyber_creed_pilgrimage_allowed_desc: "El peregrinaje de la Hermandad del Martillo ha seguido adelante. Como preveíamos, la violencia y las protestas sucedieron a la procesión."
 cyber_creed_pilgrimage_canceled: "Peregrinaje de la Hermandad cancelado"
 cyber_creed_pilgrimage_canceled_desc: "El peregrinaje de la Hermandad del Martillo no ha seguido adelante; una decisión que ha evitado la violencia, pero ha contrariado a sus fieles."
 POP_ATTRACTION_CYBER_CREED_WAR: "§G+ £empire£ ética adoptada por $CYBERCREED_war$§!"
 POP_ATTRACTION_CYBER_CREED_RESEARCH: "§G+ £empire£ ética adoptada por $CYBERCREED_research$§!"
