 SYNAPTIC_LATHE_EFFICENCY_TITLE: "Eficiencia"
 SYNAPTIC_LATHE_EFFICENCY_DESC: "§ECon cada §Ychip neural§! que conectamos al torno, aumenta la eficacia de los demás §Ychips§! que integran la estructura. Si reacomodamos a más miembros de la población aquí, podremos mejorar la producción de la estructura en gran medida.§!"
 pop_cat_chip_slave: "Componente informático"
 pop_cat_chip_slave_desc: "Estos individuos se utilizan como chips en un ordenador de escala gigantesca. Inducidos en un coma artificial, las cápsulas de soporte vital preservan su longevidad todo lo posible. Con el tiempo, el enorme estrés de la carga de procesamiento dañará sus órganos cognitivos."
 pop_cat_chip_slave_plural: "$pop_cat_chip_slave$s"
 purge_cosmogenesis: "Sobrecarga cognitiva"
 purge_cosmogenesis_tooltip: "Las poblaciones afectadas se trasladarán automáticamente al §Ytorno sináptico§! y se emplearán como $job_neural_chip$."
 purge_cosmogenesis_tooltip_delayed: "§LUn engranaje en la máquina.§!"
 cosmogenesis_world_0: "$pc_cosmogenesis_world$"
 cosmogenesis_world_0_DESC: "Un ordenador de proporciones surrealistas que emplea a los seres sintientes como chips de procesamiento para generar investigación y lógica avanzada hasta matarlos. Su eficacia aumenta significativamente cuantas más unidades tenga conectadas."
 cosmogenesis_world_0_MEGASTRUCTURE_DETAILS: "Una estructura informática que consume poblaciones de manera eficaz para generar §Yinvestigación§! y §Ylógica avanzada§!."
 cosmogenesis_world_ruined: "$pc_cosmogenesis_world$ en ruinas"
 cosmogenesis_world_ruined_DESC: "Los restos fragmentados de un torno sináptico. En tiempos, fue un ordenador gigante que usaba a los seres sintientes como chips para desentrañar los secretos del universo."
 cosmogenesis_world_ruined_MEGASTRUCTURE_DETAILS: "$cosmogenesis_world_ruined_DESC$"
