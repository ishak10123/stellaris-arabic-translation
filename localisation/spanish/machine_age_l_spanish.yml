 district_cosmogenesis_world_science: "Puerta neural"
 district_cosmogenesis_world_science_plural: "Puertas neurales"
 district_cosmogenesis_world_science_desc: "Las facultades imaginativas reunidas de innumerables individuos nos permiten realizar simulaciones rápidas de hipótesis avanzadas. Una compleja estructura de puertas lógicas y bancos de memoria orgánicos ofrece un rendimiento con una precisión inigualable."
 district_cosmogenesis_world_logic: "Especulación ampliativa"
 district_cosmogenesis_world_logic_plural: "Especulaciones ampliativas"
 district_cosmogenesis_world_logic_desc: "Este distrito es una maravilla de la metafísica dialéctica. Utiliza chips neurales para verificar la verdad en las declaraciones formales de la realidad. Básicamente, responde sí o no a las preguntas más complejas jamás formuladas por la psique colectiva de los que habitan el torno sináptico."
 tech_lathe_resonator: "$building_lathe_resonator$"
 tech_lathe_resonator_desc: "$building_lathe_resonator_desc$"
 tech_lathe_overclocker: "$building_lathe_overclocker$"
