 cybercreed_forced_cyberization_desc: "A los infieles de la sociedad les molesta que se les obligue a aceptar la santa fusión."
 cybercreed_allowed_non_cyborgs: "Libertad de elección"
 cybercreed_allowed_non_cyborgs_desc: "A los infieles de nuestra sociedad se les ha permitido continuar sin las mejoras divinas. Esto genera buena predisposición hacia la fe."
 cyber_creed_no_creed_robot_points_modifier: "Cibernética sin credo"
 cyber_creed_no_creed_robot_points_modifier_desc: "Los análisis de los aumentos divinos que han usado los credos han aumentado nuestra comprensión sobre el diseño cibernético."
 elevated_creed_desc: "ha elevado nuestro credo."
 cybernetic_creed_construction_robot_points_modifier: "Comunidad elevada"
 cybernetic_creed_construction_robot_points_modifier_desc: "$CYBERCREED_construction$ $elevated_creed_desc$"
 cybernetic_creed_war_robot_points_modifier: "Templarios elevados"
 cybernetic_creed_war_robot_points_modifier_desc: "$CYBERCREED_war$ $elevated_creed_desc$"
 cybernetic_creed_research_robot_points_modifier: "Coro elevado"
 cybernetic_creed_research_robot_points_modifier_desc: "$CYBERCREED_research$ $elevated_creed_desc$"
 cybernetic_creed_labor_robot_points_modifier: "Comuna elevada"
 cybernetic_creed_labor_robot_points_modifier_desc: "$CYBERCREED_labor$ $elevated_creed_desc$"
 CANNOT_MODIFY_SELF_MODIFIED_SPECIES: "$TRIGGER_FAIL$Esta especie se ha modificado a sí misma y no puede modificarse genéticamente."
 CANNOT_MODIFY_RITUALISTIC_IMPLANTS_SPECIES: "$TRIGGER_FAIL$Aquellos con implantes rituales de cualquier credo cibernético no pueden ser modificados como exigen los principios de su fe."
