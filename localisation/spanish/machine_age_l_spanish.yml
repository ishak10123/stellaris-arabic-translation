 ###########################
 building_augmentation_bazaars: "Bazar de aumentos"
 building_augmentation_bazaars_desc: "Un laberinto de pasillos iluminados con luces de neón, vendedores de implantes y clínicas clandestinas de hardware que atienden todas las necesidades de implantes cibernéticos, ya sea de venta libre o estraperlo."
 concept_augmentation_bazaars: "$building_augmentation_bazaars$"
 building_augmentation_bazaars_branch: "Centro de implantes extraterrestres"
 building_augmentation_bazaars_branch_desc: "¿Quieres correr más rápido, saltar más alto, pensar mejor o vivir más? Pues compra implantes exóticos importados de toda la galaxia en tu centro local."
 concept_augmentation_bazaars_branch: "$building_augmentation_bazaars_branch$"
 civic_augmentation_bazaars: "Bazares de aumentos"
 civic_augmentation_bazaars_desc: "§RAVISO: bloquea todos los caminos de ascensión a excepción de ['concept_cybernetic_ascension'].§!\n\nLa cibernética mercantilizada ha generado mercados laberínticos repletos de distribuidores de aumentos a precios reducidos, clínicas turbias de modificaciones y anuncios mal iluminados. Déjate seducir por la sinergia entre lo orgánico y lo maquinal, sin importar tu poder adquisitivo."
 civic_tooltip_augmentation_bazaars_effects: "- $SPECIES_TRAITS$ Permite la selección de ['concept_universal_augmentations_traits'] $NEW_LINE$- $AVAILABLE_BUILDINGS$ ['concept_augmentation_bazaars']$NEW_LINE$- $AVAILABLE_HOLDINGS$ ['concept_augmentation_bazaars_branch'] $NEW_LINE$- Los £job_executive£ §Y$job_executive_plural$§! son sustituidos por £job_augmentation_merchant£ §Y$job_augmentation_merchant_plural$§!"
 concept_basic_cyborg_trait: "Rasgos cibernéticos básicos"
 concept_basic_cyborg_trait_desc: "Los rasgos cibernéticos básicos son:$NEW_LINE$- ['trait:trait_cyborg_power_drills'] $NEW_LINE$- ['trait:trait_cyborg_harvesters'] $NEW_LINE$- ['trait:trait_cyborg_superconductive']"
 councilor_augmentation_bazaars: "Empresario de implantes"
