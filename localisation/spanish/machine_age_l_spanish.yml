 CYBERCREED_labor: "La Comuna del Esfuerzo"
 pft_cyber_creed_labor: "$CYBERCREED_labor$"
 pft_cyber_creed_labor_desc: "La Comuna del Esfuerzo supervisa diligentemente a cada humilde trabajador y sus aumentos. Además, la profunda creencia en la divinidad del trabajo duro es lo que impulsa sus acciones. Solo aquellos que cuidan las raíces pueden comprender lo divino.\n\n§LÉtica espiritualista§!"
 cyber_creed_labor: "$CYBERCREED_labor$"
 pft_cyber_creed_war: "$CYBERCREED_war$"
 pft_cyber_creed_war_desc: "Los Templarios del Acero salvaguardan los cuerpos sagrados, la cibernética y las almas. Los aumentos mejoran su riguroso entrenamiento y destreza en combate.\n\n§LÉtica espiritualista§!"
 cyber_creed_war: "$CYBERCREED_war$"
 pft_cyber_creed_construction: "$CYBERCREED_construction$"
 pft_cyber_creed_construction_desc: "La Hermandad del Martillo produce materiales de la más alta calidad. Sus aumentos mejoran a los artesanos de nuestro imperio.\n\n§LÉtica espiritualista§!"
 cyber_creed_construction: "$CYBERCREED_construction$"
 pft_cyber_creed_research: "$CYBERCREED_research$"
 pft_cyber_creed_research_desc: "El Coro de la Mente es un colectivo casi colmena de investigadores e ingenieros. Sus señales meditativas sirven para compartir información instantánea con los miembros de su credo.\n\n§LÉtica espiritualista§!"
 cyber_creed_research: "$CYBERCREED_research$"
 pft_cyber_creed_general: "Los Credos Unidos"
 pft_cyber_creed_general_desc: "Los Credos Unidos, guiados por una coalición de tecnofantes sagrados, han purgado cualquier creencia extremista. Sin embargo, su dedicación a la fusión sagrada permanece invariable, libre del pasado dogmático que intentaba coartar su gloria.\n\n§LÉtica espiritualista§!"
