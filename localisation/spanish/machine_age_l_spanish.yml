 situation_paperclip_status_on_target: "La producción §Yva cumpliendo§! con los plazos."
 situation_paperclip_status_low_capacity: "La capacidad de almacenamiento §Rno es suficiente§! para cumplir los plazos."
 civic_machine_obsessional_directive: "Directiva obsesiva"
 civic_machine_obsessional_directive_desc: "El objetivo principal de esta inteligencia mecánica es la producción incesante de bienes para perpetuar los beneficios, aunque sus creadores hayan desaparecido tiempo ha. Nada puede impedir el crecimiento constante de sus objetivos de producción."
 civic_machine_obsessional_directive_effects: "- La situación §Y$situation_paperclips$§! otorga recompensas al cumplir los objetivos de producción"
 paperclip_failure: "Fracaso en los objetivos de producción"
