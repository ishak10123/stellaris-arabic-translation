 origin_cybernetic_creed_desc: "§RAVISO: bloquearás todos los caminos de ascensión, salvo ['concept_cybernetic_ascension'].§!\n\nEste imperio aboga por la vocación divina, por la fusión de la corporeidad exaltada y la sacra cibernética. Los aumentos son actos de devoción."
