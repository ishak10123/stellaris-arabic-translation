 advanced_logic_crisis_description_title: "Cosmogénesis"
 advanced_logic_crisis_description: "$menace_crisis_description_intro$\n\nLos imperios caídos tienen el conocimiento que buscamos, pero se han dormido en los laureles. Nuestro deber es superarlos, a toda costa."
 advanced_logic_crisis_howto_title: "Lógica y tesis"
 advanced_logic_crisis_howto: "Cumplir §Hobjetivos de crisis§! genera £advanced_logic£ §Hlógica avanzada§! y desarrolla el potencial tecnológico de nuestro imperio. Si queremos superar a los imperios caídos, tendremos que investigar §Htesis§! y reescribir las leyes del universo."
 ###########################
