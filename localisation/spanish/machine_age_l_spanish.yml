 trait_auto_mod_biological: "Genómica vocacional"
 trait_auto_mod_biological_desc: "Los avanzados conductores genéticos incluyen activadores epigenéticos que se adaptan a la ocupación impuesta, optimizando de manera dinámica la expresión genética en el entorno laboral del anfitrión."
 trait_auto_mod_cyborg: "Aumentos universales"
 trait_auto_mod_cyborg_desc: "Los puertos universales de conexión rápida permiten sustituir los aumentos a voluntad, adaptando sus capacidades a la actual demanda operacional."
 trait_auto_mod_robotic: "Estructuras adaptables"
 trait_auto_mod_robotic_desc: "El sistema reconfigura el hardware de manera dinámica para satisfacer la demanda operacional. Cada tarea asignada optimiza su rendimiento."
 trait_auto_mod_overtuned: "Excelencia efímera"
 trait_auto_mod_overtuned_desc: "Los activadores epigenéticos avanzados mejoran el rendimiento físico y cognitivo en el espacio laboral, pero reducen significativamente la esperanza de vida. A fin de cuentas, desvanecerse poco a poco es mucho más aburrido que quemarse enseguida."
 concept_automodding_trait: "Rasgo de automodificación"
 concept_automodding_traits: "Rasgos de automodificación"
 concept_automodding_trait_desc: "- Combina automáticamente los modificadores con los de una lista predeterminada de rasgos para adecuarse al trabajo desempeñado.\n- Los efectos de los rasgos varían en función del porcentaje del grupo de población que presenta el rasgo.\n- $pop$ §HPoblaciones§! con §Y$concept_automodding_traits$§! revisadas cada mes, por colonia: §G100§!\n- El crecimiento de población y los edificios £building£ de montaje aumentan el número de £pop£ §Hpoblaciones automodificadas §! que se actualizan cada mes."
 concept_automodding_biological: "Listas de rasgos de automodificación biológica"
 concept_automodding_biological_desc: "- ['trait:trait_traditional']\n- ['trait:trait_thrifty']\n- ['trait:trait_intelligent']\n- ['trait:trait_industrious']\n- ['trait:trait_agrarian']\n- ['trait:trait_ingenious']\n- ['trait:trait_charismatic']"
 concept_vocational_traits: "Rasgos vocacionales"
 concept_vocational_traits_desc: "Los $concept_vocational_traits$ son rasgos de especie que pueden alterarse automáticamente con el rasgo ['trait:trait_auto_mod_biological'].$NEW_LINE$$concept_automodding_biological_desc$"
