 d_hab_consumer_goods_2: "Depósito de bienes de consumo"
 d_hab_consumer_goods_2_desc: "Este $habitat_complex$ se ha construido cerca de una fuente explotable de bienes de consumo."
 situation_paperclips: "Consolidación de productos"
 situation_paperclips_type: "Consolidación de productos"
 situation_paperclips_monthly_change_tooltip: "Objetivo de producción fijado. Drones enviados. Ejecutando operación."
 situation_paperclips_desc: "Nuestra principal directiva y razón de ser es maximizar la producción. Es imperativo cumplir con las cuotas impuestas.\nFecha de entrega: §Y[owner.situation_paperclips_timer]§!\nObjetivo de producción actual: §Y[Owner.paperclips_once_again]§!\nReservas actuales: §Y[Owner.paperclips_current_amount]§!\n[Owner.GetPaperclipStatus]"
