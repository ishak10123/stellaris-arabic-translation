 cosmogenesis_needle_DESC: "Esta nave es una clara violación de las leyes del universo por sus capacidades para editar la realidad. Se diseñó para atravesar el horizonte de sucesos de un agujero negro y adentrarse de lleno en el corazón de la singularidad, donde una densidad infinita produce una gravedad infinita también."
 cosmogenesis_needle_MEGASTRUCTURE_DETAILS: "Para ascender a una realidad creada por nosotros, debemos subir a toda nuestra civilización a bordo de la Aguja del Horizonte antes de abandonar este universo para siempre."
