 START_SCREEN_CYBERNETIC_CREED: "Nuestro elevado cometido es la fusión de [Owner.Species.GetFleshTypeCyberCreed] y máquina. Nuestra historia está repleta de intentos fallidos, pero, guiados por la voluntad divina, hemos alcanzado la primera etapa de una simbiosis sagrada con nuestros implantes rituales.\n\nApenas hemos comenzado a explotar nuestro ilimitado potencial cibernético; el futuro nos depara una plétora de aumentos.\n\nSin embargo, nuestra fe se encuentra dividida, pues distintas corrientes espirituales pugnan entre sí por lograr los objetivos de los sacros aumentos. Una vez que respondamos a esta pregunta, la perfecta unión entre la divina [Owner.Species.GetFleshTypeCyberCreed] y las tecnologías benditas nos permitirán ir más allá de los límites de mejoría que la evolución nos impone.\n\n$machine_age.1090.pray$"
