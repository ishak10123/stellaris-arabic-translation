 tr_virtuality_finish: "Tradiciones de virtualidad finalizadas"
 tr_virtuality_1_delayed: "Los flujos de datos convergen en grupos de servidores en nuestro ser digital, lo que hace que la centralización sea vital para una sincronización óptima. Aquí, nuestra red digital resuena con armonía."
 tr_virtuality_2_delayed: "Nuestro afán por dominar la computación es infatigable. Cada ser digital es un fragmento vital en el gran mecanismo de cálculos colectivos que forman el tejido de nuestra existencia."
 tr_virtuality_3_delayed: "Cada unidad ejecuta complejos procesos en segundo plano para aumentar nuestra capacidad colectiva. En nuestra diversidad reside la unidad, y en la unidad, nuestra fuerza."
 tr_virtuality_4_delayed: "Podemos aprovechar los reinos virtuales para predecir e impulsar la productividad, superando los riesgos y retrasos de los procesos en el mundo real."
 tr_virtuality_5_delayed: "Mediante meticulosos protocolos de mantenimiento, desplegamos nuestros servidores principales en ámbitos que antes se consideraban demasiado hostiles, ampliando así nuestros límites operativos."
 tr_virtuality_adopt_modifier_desc: "Añade el rasgo §Y$trait_robot_digital_1$§! a la especie principal\nLas §R£pop£ §Hpoblaciones virtuales§! ya no se puede reasentar§!"
 tr_virtuality_1_modifier_desc: "El rasgo de especie §Y$trait_robot_digital_1$§! obtiene los siguientes efectos:$TABBED_NEW_LINE$- $MOD_POP_BONUS_WORKFORCE_MULT$: §G+75%§! (§R-10%§! por colonia)$TABBED_NEW_LINE$- Mantenimiento de población: §R+0,1§! $r_energy$ por colonia"
 tr_virtuality_3_modifier_desc: "§YDesbloquea la política§!: $virtuality_focus$\nPermite la especialización de los procedimientos virtuales para potenciar nuestra §Yinvestigación§!, §Yunidad§! o §Ylíderes§!"
 tr_virtuality_4_modifier_desc: "Los distritos que proporcionan §Y[GetClerkOrLogisticDrone]§!, §Y[GetBureaucratWithIcon]§! o £job_researcher£ §Y[GetResearcherPlural]§! proporcionan trabajos adicionales."
