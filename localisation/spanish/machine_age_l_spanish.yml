 ##########################
 #ARC WELDERS ORIGIN
 ##########################
 origin_arc_welders: "Soldadores de arco"
 origin_arc_welders_desc: "El planeta está desierto, pero su sistema natal está a rebosar de riquezas. Para explotarlas, se han construido estas máquinas con un tamaño más grande que nunca. Un poderoso §H$tech_orbital_arc_furnace$§! domina ahora su cielo, pero estos maestros ingenieros están lejos de estar satisfechos\n\nLa galaxia aguarda y las posibilidades son infinitas. Solo hace falta ingenio para poder aprovecharlas."
 origin_tooltip_arc_builders_effects: "- $HOMEWORLD$ ['Concept_mining_district', £district£ $district_mining_plural$] inicial reemplazado por ['concept_generator_district', £district£ $district_generator_plural$] $NEW_LINE$- $HOME_SYSTEM$ ['concept_arc_furnace'] construido en torno a ['concept_pc_molten'] $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_orbital_arc_furnace',£engineering_research£ $tech_orbital_arc_furnace$] $NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_mega_engineering', £engineering_research£ $tech_mega_engineering$] tras construir un segundo horno de arco"
 origin_tooltip_arc_builders_negative_effects: "- $INITIAL_POPS$ §R-300§! $NEW_LINE$- $HOMEWORLD$ Tamaño: £planetsize£ 15"
 START_SCREEN_ARC_WELDERS: "Los años de explotación han dejado [Root.Capital.GetName] como un erial. No obstante, el cielo es rico en recursos y, con una ambición que solo rivaliza con nuestro ingenio, ahora nos proponemos vivir en el espacio.\n\nLa fase inicial de la construcción del $tech_orbital_arc_furnace$ ha sido una tarea titánica, si bien su potencial es enorme. El siguiente paso lógico es mejorar al máximo su capacidad, así como la extracción de recursos en todo el sistema. Pero ¿qué habita más allá? ¿Qué increíbles oportunidades aguardan a nuestros astutos ingenieros?\n\nCon la llegada del viaje UL, nuestros diseños ya no se limitan a un solo sistema. La galaxia es un boceto técnico en blanco, y es hora de rellenarlo."
 concept_arc_furnace: "$orbital_arc_furnace_1$"
 concept_arc_furnace_desc: "§EEfectos:§!$NEW_LINE$$orbital_arc_furnace_1_mod_tooltip$\n\n§L$tech_orbital_arc_furnace_desc$§!"
 concept_orbital_arc_furnace: "$tech_orbital_arc_furnace$"
 concept_orbital_arc_furnace_desc: "§IDesbloquea la megaestructura:§! $orbital_arc_furnace_4$ $DOUBLE_NEW_LINE$§L$tech_orbital_arc_furnace_desc$§!"
 concept_mega_engineering: "$tech_mega_engineering$"
 concept_mega_engineering_desc: "- $MOD_COUNTRY_RESOURCE_MAX_ADD$: §G+20 000§! $NEW_LINE$- §I$UNLOCKS_FEATURE$§! Restauración de megaestructuras $DOUBLE_NEW_LINE$§L$tech_mega_engineering_desc$§!"
 machine_age.3400.name: "Combustible para la forja"
 machine_age.3400.desc: "Aun en la distancia, [From.GetName] parecía el candidato ideal. Ahora que nuestro estudio del sistema está completo, ya no hay ninguna duda: un mundo fundido y un gigante gaseoso, una gran cantidad de asteroides y lunas; este es el lugar ideal para otro horno de arco.\n\nEl siguiente paso lógico es solicitar a una nave de construcción que inicie los trabajos. Vamos prender la forja."
 ideal_furnace_system_poi: "Sistema perfecto para el horno"
 ideal_furnace_system_name: "[From.GetName]"
 ideal_furnace_system_desc: "Un sistema perfecto para la construcción de un segundo $tech_orbital_arc_furnace$."
 ideal_furnace_system: "Sistema perfecto localizado"
 ideal_furnace_chain_title: "Combustible para la forja"
 ideal_furnace_chain_desc: "Hemos encontrado un sistema perfecto para construir un segundo $tech_orbital_arc_furnace$."
 machine_age.3405.name: "Horizonte de soldadura"
 machine_age.3405.desc: "El horno de arco de nuestro sistema natal fue una gran prueba de concepto que daba fe de nuestra ambición e ingenio. Ahora, en el sistema [from.GetName], otro horno se ilumina ante el vacío.\n\nMás allá de los recursos de los que proveerá, nuestra labor aquí ha abierto la puerta a proyectos de una envergadura descomunal. Nos sentimos como si estuviéramos en el precipicio de un vasto horizonte.\n\nEl único límite es la imaginación."
 ##########################
 #SYNTHETIC FERTILITY
 ##########################
 #Event Chain
 synthetic_fertility_chain_title: "$origin_synthetic_fertility$"
 synthetic_fertility_chain_desc: "Hemos perdido la capacidad de procrear. Nuestro mundo natal está plagado de centros educativos cuyos patios están vacíos. Nuestra extinción es cuestión de tiempo. De momento, nuestra esperanza reside en el almacenamiento digital del repositorio de identidad.\n\nDebemos desarrollar cuerpos sintéticos y un cerebro positrónico lo bastante complejo como para que podamos regresar al mundo físico."
 #Origin Text
 origin_synthetic_fertility: "Fertilidad sintética"
 origin_synthetic_fertility_desc: "§RAVISO: bloquearás todos los caminos de ascensión, salvo ['concept_synthetic_ascension'].§!\n\nEsta especie, antaño una sociedad próspera, ha dejado de reproducirse por un problema genético reciente. Al quedarse sin opciones ante una inminente extinción, han depositado sus esperanzas en la salvación digital."
 origin_tooltip_synthetic_fertility_effects: "- $INITIAL_POPS$ §G+900§! $NEW_LINE$- $SPECIES_TRAITS$ ['concept_pathogenic_genes']\n- Mundo natal: $TABBED_NEW_LINE$- Tamaño: £planetsize£ 20 $TABBED_NEW_LINE$- ['concept_abandoned_cities', £blocker£ $concept_abandoned_cities$]: +2 $TABBED_NEW_LINE$- ['concept_identity_repository',£building£ $concept_identity_repository$] $TABBED_NEW_LINE$- ['concept_abandoned_gene_clinic',£building£ $concept_abandoned_gene_clinic$] $NEW_LINE$- Situación: ['concept_identity_rescue'] $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_synth_ai'] $NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_robotic_workers', £engineering_research£ $tech_robotic_workers$]"
 origin_tooltip_synthetic_fertility_negative_effects: "- £pop£ §HPoblaciones§!: en declive"
 START_SCREEN_SYNTHETIC_FERTILITY: "Nuestra primera incursión en las consciencias digitales fue revolucionaria, pues dio lugar a una comunidad completamente digitalizada que difuminaba la línea entre el mundo físico y el virtual. Tal fue nuestro éxito que nos volvimos complacientes, creyendo que nos quedarían innumerables generaciones para innovar y explorar.\n\nQué equivocados estábamos.\n\nCuando una nueva enfermedad atacó nuestro código genético, perdimos la capacidad de procrear. Nuestras mentes más brillantes no dieron con una cura y el pánico cundió en una población que envejecía cada vez más.\n\nDesesperados, expandimos nuestro almacenamiento digital para preservar nuestras identidades. Pero ¿es esta la existencia que merecemos? Nos hemos volcado en el desarrollo de cuerpos sintéticos y un cerebro positrónico lo bastante sofisticado como para permitirnos existir en el mundo físico."
 #Concepts
 concept_synthetic_ascension: "Ascensión sintética"
 concept_synthetic_ascension_desc: "$ap_synthetic_evolution_desc$"
 concept_pathogenic_genes: "$trait_pathogenic_genes$"
 concept_pathogenic_genes_desc: "- §RNo puede colonizar o reasentar planetas§! $NEW_LINE$- §RNo se puede reproducir naturalmente§!\n\n§L$trait_pathogenic_genes_desc$§!"
 concept_identity_rescue: "$situation_synthetic_fertility_digitization$"
 concept_identity_rescue_desc: "Recompensa tecnologías que desbloquean $concept_synthetic_ascension$ \n\n§L$situation_synthetic_fertility_digitization_desc$§!"
 concept_identity_repository: "$building_identity_repository$"
 concept_identity_repository_desc: "- Producción:$TABBED_NEWLINE$ £physics£ 6,00 £society£ 6,00 £engineering£ 6,00 £unity£ 6,00 $NEW_LINE$- Mantenimiento: £energy£ 6,00 $NEW_LINE$- £trade£: §G+6§!\n\nEste repositorio alberga §Y300§! identidades. $building_identity_repository_scaling$\n\n§L$building_identity_repository_desc$§!"
 concept_abandoned_gene_clinic: "$building_abandoned_gene_clinic$"
 concept_abandoned_gene_clinic_desc: "- $building_abandoned_gene_clinic_tt$\n\n§L$building_abandoned_gene_clinic_desc$§!"
 concept_abandoned_cities: "$d_abandoned_cities$"
 concept_abandoned_cities_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-1§! $NEW_LINE$- Tiempo de eliminación: £time£ 360 §Idías§!$NEW_LINE$- Coste de eliminación: $TABBED_NEW_LINE$- 750 $i_energy$ $TABBED_NEW_LINE$- 250 $i_minerals$\n\n§L$_abandoned_cities_desc$§!"
 concept_synth_ai: "Tecnologías de IA"
 concept_synth_ai_desc: "- ['concept_powered_exoskeletons', £engineering_research£ $tech_powered_exoskeletons$] $NEW_LINE$- ['concept_administrative_ai', £physics_research£ $tech_administrative_ai$] $NEW_LINE$- ['concept_self_aware_logic', £physics_research£ $tech_self_aware_logic$] $NEW_LINE$- ['concept_sapient_ai', £physics_research£ $tech_sapient_ai$]"
 concept_administrative_ai: "$tech_administrative_ai$"
 concept_administrative_ai_desc: "$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$: §G+5%§!\n$job_researcher_plural_with_icon$ Mantenimiento: §R+5%§!\n\n§L$tech_administrative_ai_desc$§!"
 concept_self_aware_logic: "$tech_self_aware_logic$"
 concept_self_aware_logic_desc: "$MOD_COUNTRY_NUM_TECH_ALTERNATIVES_ADD$: §G+1§!\n\n§L$tech_self_aware_logic_desc$§!"
 concept_sapient_ai: "$tech_sapient_ai$"
 concept_sapient_ai_desc: "$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$: §G+5%§!\n$job_researcher_plural_with_icon$ Mantenimiento: §R+5%§!\n\n§L$tech_sapient_ai_desc$§!"
 #Traits
 trait_pathogenic_genes: "Genes patógenos"
 trait_pathogenic_genes_desc: "Una nueva enfermedad genética impide a esta especie reproducirse. Además, ha resistido todos los métodos de terapia genética."
 PATHOGENIC_GENES_FORCE_DECLINE: "§RLa especie está en declive§! a causa de sus §Y$trait_pathogenic_genes$§!"
 pathogenic_genes_tooltip: "§RNo se puede colonizar o reasentar planetas§!"
 pathogenic_genes_warning: "$TRIGGER_FAIL$§YLas poblaciones con §R$trait_pathogenic_genes$§! no se pueden reasentar§!"
 leader_trait_robotic_surrogate: "Reemplazo robótico"
 leader_trait_robotic_surrogate_desc: "Este incómodo y lento cuerpo robótico está controlado por un líder digitalizado en el $building_identity_repository$."
 #Buildings
 building_identity_repository: "Repositorio de identidad"
 building_identity_repository_tt: "Este repositorio alberga §Y[Owner.GetTotalIdentities]§! identidades. $building_identity_repository_scaling$"
 building_identity_repository_scaling: "\n\nCada identidad aumenta el rendimiento y el mantenimiento del repositorio, que se reparte entre todos los $building_identity_repository$ de nuestros planetas.\n"
 building_identity_repository_desc: "Antes de que el cuerpo muera, la mente se digitaliza. Una vez a salvo, seguimos trabajando por el bien de la sociedad."
 building_abandoned_gene_clinic: "Clínica genética abandonada"
 building_abandoned_gene_clinic_tt: "§RNo se puede demoler, sustituir o reparar§!"
 building_abandoned_gene_clinic_desc: "Tras perder la capacidad de procrear de forma natural, la comunidad médica depositó sus esperanzas en esta clínica genética de última generación. Como gran parte de nuestra infraestructura, ahora está vacía, un recordatorio constante de nuestra difícil situación y la extrema necesidad de nuevas soluciones."
 #Situation Events
 machine_age.3100.name: "Salvación digital"
 machine_age.3100.desc: "A falta de una solución médica, nuestra mejor opción para sobrevivir pasa por digitalizar a nuestra población en el §Yrepositorio de identidad§!. No obstante, esta solución es temporal, pues estamos en proceso de desarrollar cuerpos sintéticos y cerebros positrónicos bastante complejos. Si aunamos esfuerzos, tendremos tiempo de sobra para completar la investigación.\n\nHaciendo uso de una IA de vanguardia, nuestros mejores expertos ya han elaborado los planos de los cuerpos robóticos. Será el primer paso para la salvación sintética."
 machine_age.3100.a: "Tiene que funcionar."
 machine_age.3110.name: "Obreros robóticos"
 machine_age.3110.desc: "La investigación de los cuerpos robóticos ha finalizado. Hemos convertido la $building_abandoned_gene_clinic$ en una $building_robot_assembly_plant$, y los prototipos ya se han mejorado y desplegado. Si bien estos toscos sistemas no tienen suficiente capacidad de procesamiento para albergar la consciencia de un sujeto, podrán sustituir parte de nuestra mano de obra perdida. A través de un enlace positrónico, los habitantes del reino digital pueden añadir sus conocimientos y experiencia a las operaciones rutinarias de estos robots para mejorar su rendimiento.\n\nA su vez, nuestros sistemas de IA han desarrollado un diseño para androides avanzados. Los ingenieros caducos están listos para trabajar."
 machine_age.3110.a: "Una fase menos."
 machine_age.3110.a.tooltip: "[Root.Capital.GetName]:\n- §Y$building_robot_assembly_plant$§!: §G+1§! \n- £pop£ §Hpoblaciones mecánicas§!: §G+300§!"
 machine_age.3115.name: "Maestría con droides"
 machine_age.3115.desc: "Esta gran mejora de nuestra tecnología robótica nos permite colonizar otros planetas, además de brindar apoyo a nuestra población mecanizada en operaciones más complejas.\n\nSegún nuestros sistemas de IA, el siguiente paso lógico sería emular las matrices positrónicas de los cuerpos sintéticos. Con este ambicioso proyecto de investigación, deberíamos poder devolver una consciencia digitalizada al mundo orgánico."
 machine_age.3115.a: "No podemos rendirnos ahora."
 machine_age.3120.name: "Un último paso"
 machine_age.3120.desc: "Nuestro arduo trabajo por fin ha dado sus frutos. Hemos diseñado un cerebro positrónico funcional y lo bastante sofisticado como para contener nuestras identidades.\n\nTal vez no podamos superar la mortalidad, pero muy pronto dejaremos de estar ligados a las limitaciones de la existencia biológica."
 machine_age.3120.a: "Es la hora de nuestro despertar sintético."
 machine_age.3120.a.tooltip: "Para avanzar en estos eventos, debemos adoptar la §Ytradición sintética§!."
 machine_age.3125.name: "El sueño digital"
 machine_age.3125.both: "Nuestras plantas de montaje y nuestros expertos en sintetización están listos para iniciar la titánica misión de transferir identidades a cuerpos sintéticos con cerebros positrónicos."
 machine_age.3125.desc: "$machine_age.3125.both$\n\nEmpezaremos por los que todavía residen en el mundo físico. Así erradicaremos la enfermedad genética de una vez. Con la capacidad de procesamiento superior que posee un cerebro sintético, podemos superar nuestros límites biológicos.$synth.105.end$"
 machine_age.3125.nobody.desc: "$machine_age.3125.both$\n\nAntes de perder nuestra presencia física en el mundo, debemos construir el primer prototipo de cuerpo cuanto antes. Con la capacidad de procesamiento superior que posee un cerebro sintético, podemos superar nuestros límites biológicos.$synth.105.end$"
 machine_age.3125.a: "Que empiece la transferencia de identidades."
 machine_age.3125.a.tooltip: "Las poblaciones biológicas que queden empezarán a transferirse a cuerpos sintéticos."
 machine_age.3200.name: "Purgatorio digital"
 machine_age.3200.desc: "Nuestros peores temores se han hecho realidad.\n\nEl último cuerpo físico ha sucumbido. Aunque nuestras consciencias digitalizadas están a salvo en el repositorio de identidad, carecemos de la tecnología necesaria para depositar nuestra mente en un cerebro artificial.\n\nHasta que no completemos la investigación, nuestros líderes digitales tendrán que interactuar con el mundo orgánico con proxis robóticos."
 machine_age.3305.name: "Salvación virtual"
 machine_age.3305.desc: "Hemos conseguido trasferir todas las identidades a nuevos cuerpos sintéticos o al repositorio de identidad para garantizar la continuidad de nuestro pueblo.\n\nSin embargo, ante nosotros tenemos un nuevo reto. El espacio digital que creamos para almacenar nuestras identidades digitales siempre estuvo destinado a ser algo temporal, pero los habitantes se han acostumbrado a esta existencia y se muestran reacios a regresar al mundo físico.\n\nPodemos ofrecerles quedarse, pero la opción de obligarlos a habitar los nuevos cuerpos sintéticos sigue siendo viable."
 machine_age.3305.a: "Que disfruten del nirvana."
 machine_age.3305.a.tooltip: "Las identidades digitales restantes se quedarán en el §Y$building_identity_repository$§! para seguir apoyando a nuestro pueblo."
 machine_age.3305.b: "Si permanecemos unidos, seremos más fuertes."
 machine_age.3305.b.tooltip: "Transferiremos las identidades digitales que quedan a nuestra reserva actual de cuerpos sintéticos y para los demás crearemos otros nuevos. El §Y$building_identity_repository$§! será destruido."
 machine_age.3310.name: "Renacer sintético"
 machine_age.3310.desc: "Han pasado décadas desde que un [Root.Owner.GetSpeciesName] sostuvo a un recién nacido en sus brazos. Es posible que nunca volvamos a experimentar algo así, pero hoy es un día de esperanza para nuestro pueblo.\n\nHemos desarrollado §Ycomplejos de identidad§!, unos centros avanzados en los que podemos copiar las identidades actuales para crear nuevas personas.\n\nPodríamos asignar rasgos de personalidad de varios individuos al azar, lo que supondría un sinfín de combinaciones para crear nuevas identidades. También podemos imitar el proceso orgánico al cultivar \"semillas mentales\" en un entorno virtual abierto."
 machine_age.3310.a: "Mezclaremos nuestras mentes."
 machine_age.3310.building_tooltip.a.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.a.tt$\n§YDesbloquea el edificio:§! $building_identity_complex$"
 machine_age.3310.b: "Algunos sistemas de la naturaleza tienen sentido."
 machine_age.3310.building_tooltip.b.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.b.tt$\n§YDesbloquea el edificio:§! $building_identity_complex$"
 machine_age.3315.name: "Albor sintético"
 machine_age.3315.desc: "Hoy es el fin de nuestro periplo digital. Nadie podrá negar la magnitud de lo que hemos logrado, ni el sacrificio que hemos hecho para ello.\n\nHemos ascendido a un pueblo completamente digitalizado y sintético. Ya no sucumbiremos a los estragos de las enfermedades. Las limitaciones de la endeble genética no nos condicionarán más.\n\nSomos libres de crear la realidad que juzguemos apropiada."
 machine_age.3315.a: "Larga vida al albor sintético."
 machine_age.3315.a.tooltip: "Acaba la cadena de eventos §Y$origin_synthetic_fertility$§!."
 machine_age.3315.a.tt: "§Y[This.Owner.GetSpeciesName]§! con el rasgo ['concept_synthetic_dawn']"
 synthetic_dawn: "Synthetic Dawn"
 synthetic_dawn_desc: "Ascendemos como un pueblo sintético completamente digitalizado y libre de crear la realidad que tengamos a bien."
 trait_robot_synthetic_dawn: "Salvación sintética"
 trait_robot_synthetic_dawn_desc: "Esta especie sintética ha trascendido sus orígenes biológicos, adoptando una nueva existencia digital."
 concept_synthetic_dawn: "$trait_robot_synthetic_dawn$"
 #Situations
 situation_synthetic_fertility_digitization: "Preservación veloz de identidades"
 situation_synthetic_fertility_digitization_type: "Preservación veloz de identidades"
 situation_synthetic_fertility_digitization_monthly_change_tooltip: "Estamos investigando la tecnología necesaria para reponer una población física."
