 PRESCRIPTED_system_name_basidrix_cyber_ecclesia: "Basolux"
 PRESCRIPTED_ruler_name_basidrix_cyber_ecclesia: "Qaarugm Seedkugh"
 PRESCRIPTED_ruler_title_basidrix_cyber_ecclesia: "Sumo tecnofante"
 EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE: "Tecnoprotectorado Lacertano"
 EMPIRE_DESIGN_lacertan_techno_protectorate_desc: "La cultura lacertana está a caballo entre la filosofía y la ciencia. Para un lacertano, el objetivo final es la expresión del individualismo. ¿Qué significa realmente \"representar\" la mente? Es más, ¿cómo puede un simulacro englobar la totalidad de un individuo? Estas preguntas conforman la tradición lacertana.\n\nCon la llegada de la realidad virtual y los impresionantes avances en inteligencia artificial, los lacertanos descubrieron una nueva frontera para la expresiones artísticas y tecnológicas. Los mundos virtuales vienen a ser el lienzo de sus proyectos más ambiciosos, lo que permite experiencias tan inmersivas que trascienden los límites de la realidad física.\n\nEntonces, llegó el Declive. Afectados por una enfermedad genética incurable que les impedía procrear de manera natural, los lacertanos deben encomendarse a la salvación digital. La transición a una existencia digitalizada no solo supone un desesperado intento de sobrevivir, sino también una nueva oportunidad para la cultura lacertana. En el reino digital, los lacertanos siguen preguntándose el sentido de su existencia, aun con la premura de tener que preservar su futuro."
 PRESCRIPTED_adjective_lacertan_techno_protectorate: "$EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE$"
 PRESCRIPTED_ship_prefix_lacertan_techno_protectorate: "TPL"
