 crisis.7270.e: "$crisis.7240.c$"
 cosmogenesis_damage_ships_tt: "Nuestras flotas sufrirán daño."
 crisis.7270.f: "$crisis.7240.c$"
 crisis.7270.g: "$crisis.7240.c$"
 crisis.7270.h: "$crisis.7240.c$"
 crisis.7280.desc: "Saludos, genios [Root.GetSpeciesNamePlural]. Hoy habéis alcanzado un gran hito tecnológico que llena de orgullo nuestros corazones. El camino que habéis recorrido no ha estado exento de desafíos. Al superarlos, habéis crecido, y vuestros recientes avances tecnológicos son la prueba de que hicimos bien al ofreceros consejo."
 crisis.7285.desc: "¡Hijos problemáticos! Hoy habéis colmado nuestra paciencia. Vuestros imprudentes experimentos son un peligro para todos, por lo que hemos ordenado su cese inmediato. No os hacéis una idea de dónde os estáis metiendo. Si bien vuestra curiosidad es encomiable, vuestra enorme temeridad es intolerable. La realidad se creó así por algo. Dejadla en paz."
 crisis.7285.a: "Tienes razón, el riesgo es desmedido."
 crisis.7285.a.tt: "Renuncias a tus ambiciones cosmogenéticas y pierdes acceso a casi todos los edificios y naves de imperios caídos.\n\n§RNo podremos completar nuestra ruta de crisis.§!"
