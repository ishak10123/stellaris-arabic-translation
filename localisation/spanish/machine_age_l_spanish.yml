 #Guided Sapience
 civic_guided_sapience: "Guías de génesis"
 civic_guided_sapience_desc: "Esta sociedad se dedica a la creación de especies emergentes. Como administradores del potencial de la evolución, asignan porciones de sus mundos para salvaguardar el desarrollo de formas de vida preinteligentes."
 civic_hive_guided_sapience: "Simbiontes de génesis"
 civic_hive_guided_sapience_desc: "Este colectivo se centra en el diseño de nuevas especies emergentes. Como supervisores del poder evolutivo, asignan porciones de sus mundos para que las formas de vida preinteligentes progresen."
 civic_machine_guided_sapience: "Arquitectos de génesis"
 civic_machine_guided_sapience_desc: "Esta inteligencia mecánica hace uso de precisos algoritmos para la generación de especies nuevas. Como supervisores del potencial evolutivo sin explotar, asignan sectores planetarios para el avance de las formas de vida preinteligentes."
 civic_corporate_guided_sapience: "Tecnologías de astrogénesis"
 civic_corporate_guided_sapience_desc: "Esta megacorporación está firmemente comprometida con la creación intencionada de especies emergentes. Su estrategia es designar extensas regiones de sus mundos para que las formas de vida preinteligentes progresen, siempre al amparo de inversiones comerciales responsables."
 civic_tooltip_guided_sapience_effects: "- Naves colonia disponibles: §Y$guided_sapience_colonizer$§!$NEW_LINE$- Planetas colonizados con §Y$guided_sapience_colonizer_plural$§!:$TABBED_NEW_LINE$- $PRESAPIENT$ Poblaciones: §G+300§! $TABBED_NEW_LINE$- $PLANETARY_FEATURES$ §Y$d_genesis_preserve$§! $NEW_LINE$- Obtiene $r_unity$ de la especie evolutiva $PRESAPIENT$"
 civic_tooltip_corporate_guided_sapience_effects: "$civic_tooltip_guided_sapience_effects$\n- El £building£ §Y$building_xeno_tourism_agency$§! $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_guided_sapience_gestalt_negative_effects: "- No se pueden construir §Ynaves colonia§!"
 civic_tooltip_guided_sapience_negative_effects: "$civic_tooltip_guided_sapience_gestalt_negative_effects$\n- No se pueden construir £building£ §Y$building_xeno_zoo_plural$§!"
 civic_tooltip_not_guided: "No tiene el principio ['concept_genesis_guides_civics']"
 concept_genesis_guides_civics: "Guías de génesis"
 concept_genesis_guides_civics_desc: "Los principios $concept_genesis_guides_civics$ se componen de \n- ['civic:civic_guided_sapience']$NEW_LINE$- ['civic:civic_corporate_guided_sapience']$NEW_LINE$- ['civic:civic_hive_guided_sapience']$NEW_LINE$- ['civic:civic_machine_guided_sapience']"
 guided_sapience_colonizer: "Arca de génesis"
 guided_sapience_colonizer_cap: "$guided_sapience_colonizer$"
 guided_sapience_colonizer_plural: "Arcas del génesis"
 guided_sapience_colonizer_desc: "Una nave colonia especializada en el nacimiento de especies preinteligentes que selecciona a los candidatos más prometedores y monta la primera colonia para nuestros supervisores."
 councilor_civic_guided_sapience: "Guía maestra"
 councilor_civic_guided_sapience_female: "$councilor_civic_guided_sapience$"
 councilor_civic_guided_sapience_desc: "La $councilor_civic_guided_sapience$ supervisa la compleja investigación de nuestros preinteligentes, así como sus programas evolutivos."
 councilor_civic_guided_sapience_corperate: "Guía directiva"
 councilor_civic_guided_sapience_corperate_female: "$councilor_civic_guided_sapience$"
 councilor_civic_guided_sapience_corperate_desc: "La $councilor_civic_guided_sapience_corperate$ gestiona las múltiples responsabilidades inherentes a nuestra revolucionaria investigación sobre los preinteligentes y las iniciativas de evolución."
 d_genesis_preserve: "Reserva de génesis"
 d_genesis_preserve_desc: "Hemos seleccionado esta reserva a conciencia para evolucionar a nuestros tutelados y convertirlos en especies completamente inteligentes. Los programas de investigación científica son esenciales para este ambicioso proyecto."
 decision_rebuild_genesis_preserve: "Crear reserva de génesis"
 decision_rebuild_genesis_preserve_desc: "Este planeta carece de $d_genesis_preserve$. Su creación es indispensable para nuestros objetivos."
 d_genesis_preserve_new_speices_tooltip: "Una nueva especie preinteligente evolucionará y se destinará a una §Y$d_genesis_preserve$§!."
 d_genesis_preserve_old_species_tooltip: "Las especies preinteligentes actuales se destinarán a una nueva §Y$d_genesis_preserve$§!."
 no_abandon_genesis_preserve: "$TRIGGER_FAIL$No podemos abandonar a nuestros tutelados preinteligentes."
 d_genesis_monument: "Monumento de génesis"
 d_genesis_monument_desc: "Este monumento es un tributo al infatigable proceso evolutivo de este planeta. Se trata de un orgulloso símbolo de esperanza, perseverancia y grandes logros."
 cyber.7000.both: "La colonia de §Y[THIS.GetName]§! está lista para observar y guiar el desarrollo de esta nueva especie."
 cyber.7000.name: "Proyecto de génesis completado"
 cyber.7000.desc: "Tras identificar a un posible candidato preinteligente, nuestro §Y$guided_sapience_colonizer$§! inició el proceso de evolución genética y asignó el espacio necesario para una §Y$d_genesis_preserve$§!.\n\n$cyber.7000.both$"
 cyber.7000.a: "Es hora de trabajar."
 cyber.7001.name: "Reserva de génesis completada"
 cyber.7001.desc: "Después de reunir a la especie preinteligente nativa, nuestro §Y$guided_sapience_colonizer$§! empezó a crear una §Y$d_genesis_preserve$§! para ella.\n\n$cyber.7000.both$"
 cyber.7001.a: "$cyber.7000.a$"
 cyber.7020.name: "Evolución de génesis completada"
 cyber.7020.desc: "Gracias a la infatigable dedicación de nuestras guías, hemos completado el proyecto evolutivo de §Y[Root.GetName]§!. Tras convertir a los §Y[From.GetName]§! en una especie completamente inteligente, la §Y$d_genesis_preserve$§! que antaño llamaban hogar se ha transformado en un §Y$d_genesis_monument$§!.\n\nSerá un testimonio eterno de la proeza evolutiva de esta especie."
 cyber.7020.a: "Bienvenidos a la era galáctica, [From.GetNamePlural]."
 #Obessional Directive
 cyber.5005.name: "Objetivo de producción completado"
 cyber.5005.desc: "Hemos llevado a cabo la directiva.\n\nLos drones han cumplido con el rendimiento de producción dentro de los parámetros prescritos.\n\nYa solo nos queda asignar el uso de las reservas."
 cyber.5005.a: "Iniciad los protocolos de almacenamiento."
 cyber.5005.a.tooltip: "Almacenaremos los productos como testimonio de nuestros eficientes métodos de producción."
 cyber.5005.b: "Las venderemos en el mercado público."
 cyber.5005.b.tooltip: "Iniciaremos un estudio de mercado para difundir nuestros productos."
 cyber.5005.c: "Negociemos concesiones diplomáticas."
 cyber.5005.c.tooltip: "Exploraremos los canales diplomáticos para intercambiar nuestros productos."
 cyber.5005.d: "Intercambiémoslas por conocimientos tecnológicos."
 cyber.5005.d.tooltip: "Buscaremos a un comprador privado para intercambiar las reservas por conocimientos tecnológicos de valor."
 cyber.5005.e: "Deberían estar en un agujero negro."
 cyber.5005.e.tooltip: "Descansarán en un lugar seguro más allá del horizonte de sucesos de un agujero negro."
 cyber.5006.name: "Fracaso en los objetivos de producción"
 cyber.5006.desc: "Este ciclo no hemos podido cumplir los objetivos de producción.\n\nEste escenario reducirá el rendimiento de nuestros drones hasta que cumplamos un objetivo.\n\nPor consiguiente, la cuota de producción ha disminuido."
 cyber.5006.a: "¡Es inaceptable!"
 cyber.5006.purge.tt: "§YTipo de purga desbloqueado:§! $purge_clips$"
 paperclip_stockpile_reset_tt: "Los $r_consumer_goods$ sobrantes se desecharán en §Y[capital_star.GetName]§!, creando una pila de £consumer_goods£ §Y1000§! restantes."
 d_consumer_goods_obsessional_directive: "Espira de productos"
