 #==========================
 sm_aura_emitter: "Излучатель ауры"
 sm_aura_emitter_desc: "$sm_aura_emitter$ создает статичный проводник, проецирующий псионическую энергию, что позволяет космической базе испускать псионическую ауру.\n"
 sm_ring_aura_emitter: "$sm_aura_emitter$"
 sm_ring_aura_emitter_desc: "$sm_aura_emitter_desc$"
 #==========================
 # Shroud Seals Kilostructure
 #==========================
 SHROUD_SEAL: "Печать Покрова"
 SHROUD_SEAL_PLURAL: "Печати Покрова"
 SHROUD_SEAL_IN_SYSTEM: "В этой системе содержится $SHROUD_SEAL$, ослабляющая находящиеся поблизости §Y$PSIONIC_AURA_PLURAL$§!. Убрать ее может только владелец системы."
 shroud_seal: "$SHROUD_SEAL$"
 shroud_seal_DESC: "Эта изощрённая машина испускает низкочастотные волны, нейтрализующие псионическую энергию, тем самым постепенно рассеивая псионические ауры и в конечном счёте сводя на нет их эффекты."
 shroud_seal_MEGASTRUCTURE_DETAILS: "§Y$SHROUD_SEAL$§! ослабляет §Yпсионические ауры§! неподалёку и снижает эффективность §Yпсионических корабельных компонентов§!."
 shroud_seal_modifier: "$SHROUD_SEAL$"
 requires_no_existing_shroud_seal: "$TRIGGER_FAIL$Нельзя строить, поскольку в системе уже есть печать Покрова."
 shroud_seal_dismantle_conditions_tt: "$TRIGGER_FAIL$Враги в системе не позволят нам безопасно разобрать печать Покрова."
 mod_shroud_storm_repelling: "Сила отражения покровной бури"
 #==========================
 # Armies
 #==========================
 abomination_army: "Чудовища"
 abomination_army_desc: "Обращённые в рабство солдаты, подвергнутые радикальным экспериментам для усиления их агрессии и боевых качеств. Теперь они — живое оружие, покорные перед хозяевами и свирепые в бою."
 seq_abomination_army: "$ORD$-я армия чудовищ"
 mindwarden_army: "Штурмовики-смотрители"
 mindwarden_army_desc: "Эти спецподразделения прошли тщательную подготовку и освоили антипсионические техники и технологии, а потому весьма эффективны против тех, кто умеет вторгаться в разум."
 NAME_Mindwarden_Army: "$mindwarden_army$"
 #==========================
 # Branch-Office Buildings
 #==========================
 # Carceral Test Facility
 building_carceral_test_facility: "Экспериментальные офисы"
 building_carceral_test_facility_desc: "Колониальное учреждение, предлагающее франчайзинговые возможности перспективным заинтересованным сторонам и позволяющее им создавать собственные экспериментальные программы. Подавляйте преступность и укрепляйте оборону!"
 building_psionic_offices: "Псионические представительства"
 building_psionic_offices_desc: "Чужие мысли проще читать при личном контакте — это позволяет заключать самые выгодные для обеих сторон торговые сделки."
 building_psionic_offices_tt: "\nЭффекты для системы:\n$t$- Испускает §Yпсионическую ауру§! государства $TRIGGER_BRANCH_OFFICE_OWNER$ с $@psionic_offices_intensity|0+$ ед. ежемесячной интенсивности\n$t$- §RЛюбые другие источники излучения псионической ауры у владельца колонии перекрывают эффект этого сооружения.§!"
 job_shroud_trader: "Эмпатический маркетолог"
 job_shroud_trader_plural: "Эмпатические маркетологи"
 job_shroud_trader_plural_with_icon: "£job_telepath£ $job_shroud_trader_plural$"
 job_shroud_trader_desc: "Эти специалисты настраиваются на эмоциональные настроения на местных рынках, заключая сделки и проводя семинары по актуальным тенденциям в идейном лидерстве."
 mod_job_shroud_trader_add: "Должности эмпатических маркетологов"
 mod_pop_shroud_trader_bonus_workforce_mult: "$BONUS_WORKFORCE_FOR$ должностей [shroud_trader.GetNamePlural]"
 #==========================
 # Buildings
 #==========================
 # Experimentation Chambers
 building_experimentation_chambers_1: "Экспериментальные камеры"
 building_experimentation_chambers_1_desc: "Сверхсекретный комплекс для опытов над неисправимыми преступниками, состоящий в основном из тюремных камер и исследовательских лабораторий."
 building_experimentation_chambers_2: "Экспериментальный комплекс"
 building_experimentation_chambers_2_desc: "Кампус сверхсекретных технологий и изоляторов, где нарушившие закон [Owner.GetIndividualNamePlural&nom] становятся подопытными для исследований, которые проводят ведущие [Owner.GetResearchers] государства."
 building_experimentation_chambers_3: "Экспериментальная сеть"
 building_experimentation_chambers_3_desc: "Сеть максимально защищённых технологических и исправительных центров. Элитные [Owner.GetResearchers] объединяются в команды и проводят передовые эксперименты над [Owner.GetIndividualNamePlural&inst] из криминального мира государства."
 # Lifecrypt
 # Lifecrypt (Normal)
 building_lifecrypt_1: "Высасывающая башня"
 building_lifecrypt_1_desc: "Эти монументальные устройства способны извлекать избыточную энергию у населения в непосредственной близости от него. Назначенные лица носят специальное оборудование, которое направляет их жизненную силу в центральный канал для дальнейшего перераспределения в пользу высших слоёв."
 building_lifecrypt_2: "Сифон душ"
 building_lifecrypt_2_desc: "Несмотря на название, сифоны душ базируются на принципах практической науки. Настроенные на сбор энергии через физическую связь, они способны поглощать огромные объёмы продуктов метаболизма, не подвергая жизни организмов опасности."
 building_lifecrypt_3: "Проводник сущности"
 building_lifecrypt_3_desc: "Границы проводников сущности должны быть чётко обозначены — случайное попадание в зону их действия фатально для лиц без соответствующего оборудования. Назначенные лица обучены регулировать свой метаболизм, чтобы не отдавать слишком много энергии за раз."
 # Lifecrypt (Machine)
 building_lifecrypt_machine_1: "Аккумуляторный сифон"
 building_lifecrypt_machine_1_desc: "Эти монументальные устройства способны извлекать избыточную вычислительную энергию у единиц в непосредственной близости от него. Назначенные рабочие носят специальное оборудование, которое направляет их заряд в центральный канал для дальнейшего перераспределения в пользу высших слоёв."
 building_lifecrypt_machine_2: "Аккумуляторный комплекс"
 building_lifecrypt_machine_2_desc: "Настроенные на сбор энергии через физическую связь, эти устройства способны поглощать огромные объёмы избыточных вычислений, не вызывая критических сбоев."
 building_lifecrypt_machine_3: "Аккумуляторная сеть"
 building_lifecrypt_machine_3_desc: "Границы аккумуляторных сетей должны быть чётко обозначены — вход в зону их действия фатален для модулей без соответствующего изоляционного оборудования."
 # Lifecrypt (Hive Mind)
 building_lifecrypt_hive_mind_1: "Высасывающая башня"
 building_lifecrypt_hive_mind_1_desc: "Эти монументальные устройства способны извлекать избыточную энергию у единиц в непосредственной близости от них. Назначенные рабочие носят специальное оборудование, которое направляет их жизненную силу в центральный канал для дальнейшего перераспределения в пользу высших каст."
 building_lifecrypt_hive_mind_2: "Сифон душ"
 building_lifecrypt_hive_mind_2_desc: "Несмотря на название, сифоны душ основаны на принципах практической науки. Настроенные на сбор энергии через физическую связь, они способны поглощать огромные объёмы продуктов метаболизма, не подвергая жизни организмов опасности."
 building_lifecrypt_hive_mind_3: "Проводник сущности"
 building_lifecrypt_hive_mind_3_desc: "Границы проводников сущности должны быть чётко обозначены — вход в зону их действия фатален для единиц без соответствующего оборудования. Назначенные рабочие обучены регулировать свой метаболизм, чтобы не отдавать слишком много энергии за раз."
 # Lifecrypt (Corporate)
 building_lifecrypt_corporate_1: "Синергический штаб"
 building_lifecrypt_corporate_1_desc: "Эти монументальные устройства способны извлекать избыточную энергию у стажёров в непосредственной близости от них. Назначенные лица носят специальное оборудование, которое направляет их жизненную силу в центральный канал для дальнейшего перераспределения в пользу руководящего персонала."
 building_lifecrypt_corporate_2: "Синергическая администрация"
 building_lifecrypt_corporate_2_desc: "Настроенные на сбор энергии через физическую связь, сооружения синергической администрации способны поглощать огромные объёмы продуктов метаболизма, не подвергая жизни стажёров слишком большой опасности."
 building_lifecrypt_corporate_3: "Синергическая сеть"
 building_lifecrypt_corporate_3_desc: "Границы синергической сети должны быть чётко обозначены — случайное попадание в зону их действия фатально для стажёров без соответствующего оборудования. Назначенные лица обучены передовым техникам синергии, которые гарантируют их выживаемость в процессе."
 # Psionic Suppressor
 building_psionic_suppressor: "Псионический подавитель"
 building_psionic_suppressor_desc: "Этот комплекс поддерживает массив дальнодействующих псионических глушителей, рассеивающих псионические ауры по всей звёздной системе и предотвращающих их дальнейшее распространение."
 building_psionic_suppressor_tt: "Ежедневное снижение §Hинтенсивности§! §Yпсионической ауры§! в системе: $@building_psionic_suppressor_decrease|0$"
 # Materiality Engine
 building_materiality_engine: "Машина материальности"
 building_materiality_engine_plural: "Машины материальности"
 building_materiality_engine_desc: "Псионическая энергия Покрова соприкасается с каждой точкой физической галактики. Машина материальности использует этот контакт, позволяя дотянуться до других измерений и материализовывать ценные компоненты и ресурсы."
 building_materiality_engine_tt: "Начинает §Yособый проект§!, который позволит извлечь из §HПокрова§! технологию создания псионических ['concept_component', компонентов]. По завершении этого проекта вырастет производительность сооружения, а также число §Hмашин материальности§!, которые мы можем построить."
 biology_unit_is_observator_tt: "$t$£job_calculator_biologist£ $job_calculator_biologist_plural$ заменяются на $job_observator_drone_plural_with_icon$"
