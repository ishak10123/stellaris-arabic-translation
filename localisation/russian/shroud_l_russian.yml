 gov_shroud_corporeal_imperial_desc: "$auth_shroud_imperial_corporeal_desc$"
 auth_shroud_corporate_corporeal: "Совет псиоников"
 auth_shroud_corporate_corporeal_desc: "Было бы глупо растрачивать ментальные преимущества, дарованные Покровом. Наша корпорация известна созданием псионических представительств в соседних цивилизациях, что повышает прибыльность внешнеторговых сделок."
 auth_shroud_corporate_corporeal_tt: "$corporeal_trait_tt$\n$r_trade$ за каждые $pop_group_unit$ должностей $job_telepath_swap_plural_with_icon$: §G+$@corporate_government_telepaths_trade_value_mult|0%$§!\n$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$ от ['building:building_psionic_offices', псионических представительств]: §G+2%§!\n$mod_planet_branch_offices_influence_cost_mult$: §G-40%§!\n$mod_council_agenda_early_activation_cost_mult$: §G-25%§!\n$MOD_COUNCIL_AGENDA_COOLDOWN_MULT$: §G-25%§!\n$MOD_LEADER_SPECIES_EXP_GAIN$: §G+25%§!"
