 # Experimental Engineer (Gestalt)
 job_experiment_engineer_drone: "Инженерная единица-экспериментатор"
 job_experiment_engineer_drone_plural: "Инженерные единицы-экспериментаторы"
 job_experiment_engineer_drone_desc: "Эти исследовательские единицы проводят эксперименты на живых подопытных, набранных из числа девиантного населения. Ради пользы коллективу любые методы хороши."
 job_experiment_engineer_drone_effect_desc: "£job_experiment_engineer_drone£ $job_experiment_engineer_drone_plural$ превращают $i_crime$ в $r_research$"
