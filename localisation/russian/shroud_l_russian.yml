 trait_tankbound: "Жизнь в резервуарах"
 trait_tankbound_desc: "Эта раса проводит всю свою жизнь в резервуарах с особой биожидкостью. Из-за этого она полностью зависит от вспомогательных систем и неспособна напрямую заниматься физическим трудом."
 trait_tankbound_effects: "Потребление пищи (или эквивалентного ресурса) населением: §G−50%§! $TABBED_NEW_LINE$• §RНе могут занимать должности рабочих§!$TABBED_NEW_LINE$• §RНе могут служить в армиях§!"
 trait_tankbound_portrait_override_tt: "Требуется раса, вынужденная жить в резервуарах"
 trait_robot_latent_psionic: "$trait_latent_psionic$"
 trait_robot_latent_psionic_desc: "§LЭта раса обладает скрытыми псионическими процессорами, которые неактивны у большинства модулей. Хотя и довольно редко, эти силы могут задействоваться у некоторых лидеров.§!\n"
 trait_robot_psionic: "$trait_psionic$"
 trait_robot_psionic_desc: "§LВсе модули этой расы снабжены мощной псионической аппаратурой. Они могут управлять и физической, и нематериальной сферой с помощью одних лишь когнитивных процессов.§!\n"
 trait_default_psionic_desc: "§LВсе представители этой расы обладают мощными псионическими способностями. Обычно они общаются друг с другом посредством телепатии.§!\n"
 trait_hive_psionic_desc: "§LВсе представители этой расы обладают мощными псионическими способностями. Они могут управлять и физической, и нематериальной сферой с помощью силы разума.§!\n"
