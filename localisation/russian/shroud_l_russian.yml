 shroud.10.name: "Союзник в борьбе с королевой"
 shroud.10.desc.intro: "Покров резонирует с необычайной силой. Огромные кольца энергии содрогаются и сталкиваются в эфире.\n\nПосреди пульсирующего хаоса мы видим псионическое отражение синтетической королевы. Безмерная и всесильная, она играет с галактикой у нее на ладони."
 shroud.10.desc.outro: "Зачем? Он знает о слабом месте, которое нам неизвестно? Он поможет нам, если мы попросим помощи?\n\nМы сосредоточиваем свое внимание на Оживляющем и чувствуем его нетерпение. Похоже, у нас будет лишь одна возможность попросить о помощи. Для этого нам понадобятся огромные количества §Hэнергии§! и §H$sr_zro$§!."
 shroud.10.desc: "$shroud.10.desc.intro$\n\nМы не одиноки в своем наблюдении. Из укрытия за ней следит сущность по имени $the_animator_of_clay_color_article$ — и его не пугает безграничная мощь королевы.\n\n$shroud.10.desc.outro$"
 shroud.10.desc.1: "$shroud.10.desc.intro$\n\nМы не одиноки в своем наблюдении. Из укрытия за ней следит $the_animator_of_clay_color_article$ — и его не пугает безграничная мощь королевы.\n\n$shroud.10.desc.outro$"
 shroud.10.a: "$animator.shroud$"
 shroud.10.b: "Нам не нужна его помощь."
 shroud.10.b.tt: "У нас не будет другого шанса попросить Оживляющего о помощи в борьбе с Кетаной."
