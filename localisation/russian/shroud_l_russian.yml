 approach_situation_breach_shroud_endbringers_blind: "Ослеплять желающих"
 approach_situation_breach_shroud_endbringers_blind_desc: "Там, куда мы направляемся, не нужны [Owner.Species.GetEyeNamePlural], чтобы видеть."
 breach_shroud_endbringers_blind_tooltip: "$situation_speed_tt$: §G+50%§!\n$breach_shroud_endbringers_blind_effects_tooltip$"
 breach_shroud_endbringers_blind_effects_tooltip: "Ежемесячно $@nb_blinded_pop|0$ £pop£ §Hпоселений§! получают признак ['trait:trait_blindness']"
 approach_situation_breach_shroud_endbringers_forsake_flesh: "Отринуть плоть"
 approach_situation_breach_shroud_endbringers_forsake_flesh_desc: "Оковы плоти лишь сдерживают нас на пути к преображению."
 breach_shroud_endbringers_forsake_flesh_tooltip: "$situation_speed_tt$: §G+100%§!\n$breach_shroud_endbringers_forsake_flesh_effects_tooltip$"
 breach_shroud_endbringers_forsake_flesh_effects_tooltip: "Ежемесячно погибает $@nb_forsaken_pop|0$ £pop£ §Hпоселений§!"
 approach_breach_shroud_endbringers_wait_cooldown_tooltip: "$TRIGGER_FAIL$Нельзя изменить подход до §Y[Target.approach_breach_shroud_endbringers_cooldown_wait_time]§!."
 approach_breach_shroud_endbringers_blind_cooldown_tooltip: "$TRIGGER_FAIL$Нельзя изменить подход до §Y[Target.approach_breach_shroud_endbringers_cooldown_blind_time]§!."
 approach_breach_shroud_endbringers_forsake_cooldown_tooltip: "$TRIGGER_FAIL$Нельзя изменить подход до §Y[Target.approach_breach_shroud_endbringers_cooldown_forsake_time]§!."
 trait_blindness: "Слепота"
 trait_blindness_desc: "Там, куда мы направляемся, не нужны [Species.GetEyeNamePlural], чтобы видеть."
 # Establishing the Chamber of Silence
 shroud.2820.name: "Строительство залов безмолвия"
 shroud.2820.desc.1: "По мере роста нашего псионического мастерства нас захлестывает поток шепотов из-за пределов завесы. §RГолос§!, звучащий громче и четче, чем когда-либо прежде, пронизывает эти потоки мыслей, просачиваясь в самые темные уголки нашего разума.\n\n§R«ОТКРОЙТЕ ПУТЬ».§!"
 shroud.2820.desc.2.intro: "Мы должны отделить истинный сигнал от этого хаоса."
 shroud.2820.desc.2.chamber: "$shroud.2820.desc.2.intro$ Мы завершили строительство $shroud.2820.desc.2.outro$"
 shroud.2820.desc.2.no_chamber: "$shroud.2820.desc.2.intro$ Мы разработали проект $shroud.2820.desc.2.outro$"
 shroud.2820.desc.2.outro: "изолированного комплекса, где наиболее одаренные псионики смогут воспринимать указания §RГолоса§! с кристальной ясностью."
 shroud.2820.a.chamber: "Наши разумы раскрываются всё шире."
 shroud.2820.a.no_chamber: "Давайте построим эти «$building_chamber_of_silence$»."
 CONTINUE_SITUATION: "Продолжить §Yинцидент§!:"
 shroud.2820.a.tt: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2820.a.tt_no_chamber: "Примите традицию §H«$tr_psionics_endbringers_cult$»§! и постройте сооружение §H$building_chamber_of_silence$§!, чтобы продвинуть инцидент."
 # The Great Awakening
 shroud.2830.name: "$utopia.2650.name$"
 shroud.2830.desc: "В залах безмолвия мы слышим послание §RГолоса§! с абсолютной ясностью.\n\n§R«ВСЁ ПЕРЕРОДИТСЯ».§!\n\nТеперь мы понимаем. Конец — это перерождение. Мы не должны его бояться. Мы перевоплотимся вновь — сильнее и совершеннее, чем могли представить.\n\nЧтобы принять эту судьбу, мы должны овладеть ментальным царством, известным как §HПокров§!. Мы не повторим ошибок тех, кого нашли в окутанном мире. Там, где они отвергли свой страх, мы примем его."
 shroud.2830.desc.outro.awakening: "Наше видение теперь абсолютно ясно."
 shroud.2830.desc.outro.no_awakening: "Наше видение почти прояснилось."
 shroud.2830.a.awakening: "Ключ — в Покрове."
 shroud.2830.a.no_awakening: "$shroud.2780.a$"
 shroud.2830.a.tt: "$tr_psionics_psionic_assimilation_desc$\n$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2830.a.tt_no_awakening: "Примите традицию §H$tr_psionics_shroud_great_awakening$§!, чтобы продвинуть инцидент."
 # Blind the Willing - First select event
 shroud.8320.name: "Мы видим ясно"
 shroud.8320.desc: "§H[blinded_leader.GetName]§! [blinded_leader.GetAXX::указал|||fem:указала] нам путь. Наши избыточные чувства заглушают зов §RГолоса§!. Отказавшись от одного из них, мы сможем усилить свои псионические способности.\n\nНаши [Species.GetEyeNamePlural] — главное препятствие. Физическое зрение затуманивает видение §HПокрова§!. Многие [Root.GetSpeciesNamePlural] уже последовали примеру, который [blinded_leader.GetAXX::показал|||fem:показала] §H[blinded_leader.GetName]§!, без колебаний удалив свои [Species.GetEyeNamePlural].\n\nТе, кто сделал этот выбор, испытывают прилив блаженства, когда §RГолос§! наполняет их разум своим одобрением."
 shroud.8320.a: "Взгляд в незримое."
 leader_trait_blinded: "Слепота"
 leader_trait_blinded_desc: "Слепота дарит истинное прозрение."
 # A Leap of Faith - First select event
 shroud.8330.name: "Прыжок веры"
 shroud.8330.desc: "Разочаровавшись ограничениями плоти, §H[forsaken_leader.GetName]§! [forsaken_leader.GetName::предпринял|||fem:предприняла] попытку ускорить свое псионическое преображение, приняв смертельный токсин во время драматичного публичного выступления.\n\n[forsaken_leader.GetName::Его|||fem:Её] угасающее тело поглотил фиолетовый свет, после чего оно распалось в прах чистой псионической энергии. Такие чудеса возможны лишь по воле §RГолоса§!.\n\nМы восприняли это как знак: §H[forsaken_leader.GetName]§! [forsaken_leader.GetName::указал|||fem:указала] нам путь, и мы должны последовать за [forsaken_leader.GetName::ней|||fem:ним]."
 shroud.8330.a: "Физическая оболочка больше не будет нас сдерживать."
 # Mid-stage events
 shroud.8350.name: "Сообщения о лоботомии"
 shroud.8350.desc: "Некоторые [owner.GetSpeciesNamePlural] не могут примириться с присутствием §RГолоса§!.\n\nОтчаявшись обрести покой, слабейшие среди нас прибегают к кустарной лоботомии. Если не принять мер, эта практика может стать повсеместной."
 shroud.8350.a: "Пусть слабые делают что должны."
 shroud.8350.b: "§RГолос§! — это дар. Запретить эту практику."
 endbringers_voice_plague: "Терзаемые голосами"
 endbringers_voice_plague_desc: "Когда голоса говорят, нам остается только слушать."
 shroud.8360.name: "Псионические эксперименты над собой"
 shroud.8360.desc: "Мы продолжаем внимать §RГолосу§!. Истины, что он изрекает, неоспоримы.\n\nМногие [owner.GetSpeciesNamePlural] ищут способы усилить §RГолос§! и напрямую воспринимать его мудрость.\n\nВ связи с этим резко возросло употребление наркотиков, приобретаемых на черном рынке, а подпольные клиники начали предлагать экспериментальные процедуры для повышения псионической чувствительности.\n\nК чему всё это приведет?"
 shroud.8360.a: "Мы пойдем на всё, лишь бы приблизиться к §RГолосу§!."
 shroud.8360.b: "Нельзя допускать полной анархии."
 shroud.8370.name: "Апокалиптические кошмары"
 shroud.8370.desc: "С ростом наших псионических способностей [owner.GetSpeciesAdj&neut] население начало страдать от кошмаров, предрекающих конец вселенной.\n\nНаши сны стали пророчествами гибели, усиливая экзистенциальный ужас. Многие уже не могут вести обычную жизнь, а сон превратился в беспокойный ступор.\n\nВ этих снах §RГолос§! обращается к нам:\n\n§R«ПРИМИТЕ ХАОС».§!"
 shroud.8370.a: "Всякому началу приходит конец."
 shroud.8370.b: "Предоставить им убежище в залах безмолвия."
 endbringers_apocalyptic_nightmares: "Апокалиптические кошмары"
 endbringers_apocalyptic_nightmares_desc: "Голос нарушает наши циклы сна, насылая видения о конце света."
 endbringers_nightmare_shelter: "Убежище от кошмаров"
 endbringers_nightmare_shelter_desc: "$building_chamber_of_silence$ дают приют страдающим от пророческих снов."
 shroud.8380.name: "Метка Конца"
 shroud.8380.desc: "Среди населения распространяется ритуальное членовредительство.\n\nСамые преданные последователи §RГолоса§! выжигают на плоти символ «Конец», утверждая, что он дарует страшное благословение обладателям.\n\nПравда это или нет, число практикующих подобные ритуалы стремительно растет. Неужели такова воля §HПокрова§!?"
 shroud.8380.a: "Мы носим эту метку с гордостью."
 shroud.8380.a.tt: "Половина нашего населения получит признак ['trait:trait_marked']."
 shroud.8380.b: "Эта практика ошибочна."
 approach_blind_selected_tt: "Подход $approach_situation_breach_shroud_endbringers_blind$ не был выбран."
 approach_forsake_selected_tt: "Подход $approach_situation_breach_shroud_endbringers_forsake_flesh$ не был выбран."
 trait_marked: "Отмеченные"
 trait_marked_desc: "В ужасающем проявлении преданности эта раса выжигает на себе символ «Конец»."
 trait_marked_unity_bonus: "£unity£ за каждые 100 £pops£ поселений: §G+0,06§!"
 endbringers_sanity: "Разум среди безумия"
 endbringers_sanity_desc: "Твердая воля сохраняет наш рассудок, не позволяя сгинуть в пучине безумия."
 # Breach the Shroud
 shroud.2840.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2840.desc: "$shroud.2800.intro$ Из бездны возникает чудовищная сущность неимоверной мощи. Это §RГолос§!, и он пронзает наши души леденящей силой:\n\n§R«ПОЗНАЙТЕ МОЕ ИМЯ»§!.\n\nЛишь теперь мы осознаём, как ничтожно мал наш разум перед §RГолосом§!. Печать надколота, и скоро нам откроется истина о том, что мы есть на самом деле.\n\nНаши телепаты готовы погрузиться в сердце Покрова, чтобы узнать истинное имя нашего великого благоволителя."
 shroud.2840.a: "Пора начать общение."
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE: "Общение с §RГолосом§!"
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_DESC: "Мы собрались в мире [capital_scope.GetName] с единой целью.\n\nМы проникнем вглубь §HПокрова§!, чтобы заставить всемогущий §RГолос§! признать нас и поговорить с нами.\n\nМы знали его как Катаклизм. Другие звали его Расплатой. Теперь он откроет свое истинное имя, и с этим знанием мы достигнем величия."
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_PROJECT_TOOLTIP: "Для завершения: трижды выполните §Hпогружение§!. ([GetEndbringersDelveCount]/3)"
 # EotC Delve Events
 shroud.8420.title: "Испытание безмолвия"
 shroud.8420.desc: "Мы погружаемся в Покров, и наша единая воля заглушает хаотичный шум, что мешает нам достичь цели — §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!.\n\nНо одной лишь целеустремлённости недостаточно. Голоса шепчут пустые обещания, соблазняя нас, отвлекая — бессмысленные, но оттого не менее манящие.\n\nИ вот, когда мы уже начинаем трескаться, сущность возвращается. Её повеление грохочет в пустоте:\n\n§R«БЕЗМОЛВИЕ».§!"
 shroud.8420.a: "Покориться безмолвию и выстоять."
 shroud.8420.a.reply: "Повеление рассекает хаос, выжигая разноголосый шум, очищая навязчивый беспорядок, что пытался поглотить нас. Наша психика выдерживает, оставаясь целой.\n\n§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! отступает глубже в Покров. Последующая ясность почти оглушительна. Она проникает в трещины нашего разума, оставляя после себя новую решимость.\n\nИ дары. Такие прекрасные дары."
 shroud.8420.a.tooltip: "§Y$endbringers_madness_1$§! теряет следующий эффект:\n$t$$MOD_POP_AMENITIES_USAGE_MULT$: $@madness_base_pop_amenities_usage_mult|0=-%$"
 shroud.8430.title: "Испытание чистоты"
 shroud.8430.desc: "Погружаясь в Покров, мы сталкиваемся с заразой разумного хаоса.\n\nГниющие, праздные умы порождают слои псионических вихрей, отравляя Покров зловонной скверной. Среди этого отвратительного месива мы начинаем ощущать подавляющее присутствие нашей добычи — это §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!.\n\nЕё злобный замысел пропитывает наше сознание, пока он обрушивается на хаос. Мы готовимся к грядущему очищению, когда в пустоте раздаётся повеление:\n\n§R«ПОРЯДОК. ЕДИНСТВО».§!"
 shroud.8430.a: "Выстоять!"
 shroud.8430.a.reply: "Повеление пронзает заражённый хаос.\n\nБесчисленные голоса начинают вопить от боли, когда §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! смывает разумные искажения, терзающие Покров. На их месте остаётся царство безупречной чистоты.\n\nСущность уходит глубже в Покров, а мы остаёмся наблюдать и изучать последствия этого безоговорочного очищения."
 shroud.8430.a.tooltip: "§Y$endbringers_madness_2$§! теряет следующий эффект:\n$t$$mod_planet_pops_upkeep_mult$: $@madness_base_planet_pops_upkeep_mult|0=-%$"
 shroud.8440.title: "Испытание пламени"
 shroud.8440.desc: "Войдя в Покров, мы познаём лишь боль. Обычные псионические туманы стали адским пламенем, обжигающим самую суть нашего разума.\n\nСквозь мучения мы видим города, обращающиеся в оплавленные руины, пожираемые огнём планеты, целые народы, корчащиеся в агонии, пока фантомное пламя обращает их плоть в тлеющий пепел.\n\nВ сердце этого жертвенного костра мы ощущаем чьё-то присутствие — это §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!. Когда сила этой сущности грозит поглотить реальность, она провозглашает:\n\n§R«ОСВОБОЖДЕНИЕ».§!"
 shroud.8440.a: "Принять очищение."
 shroud.8440.a.reply: "Псионическое пламя охватывает наш разум, выжигая всё лишнее. Оставляя лишь очищенную решимость.\n\nТеперь мы видим великую цель, которую преследует §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!, и ту величественную простоту, что он нам дарует."
 shroud.8450.title: "$utopia.3310.name$"
 shroud.8450.desc: "Раздается громогласное восклицание:\n\n§R«ВЫ ЗНАЕТЕ МОЕ ИМЯ».§!\n\nВенец нашего звездного пути, ответ на величайший вопрос всех времен — перед нами. $end_of_the_cycle_color_article_cap$ влечет нас. Договор заключен.\n\n§R«НАЧАЛО КОНЦА».§!\n\nБоль. Судороги. Уверенность. Слова растворяются — наша судьба предрешена.\n\nТеперь мы видим. Галактику, погруженную в безмолвие, пронизанную неизбежностью §Rауры конца§!."
 shroud.8450.a: "Неизбежность ждет."
 shroud.8450.a.homicidal: "Какие прекрасные ужасы нас ждут."
 shroud.8450.a.tech_tooltip: "Получены технологии:\n£society£['technology:tech_psionic_aura']\n£society£['technology:tech_aura_intensification']"
 embracing_the_end: "Объятия Конца"
 embracing_the_end_desc: "Наконец-то мы узрели всю красоту Конца. Примем же его."
 MOD_SHIP_PSIONIC_AURA_SPEED_MULT: "$MOD_SHIP_SPEED_MULT$ внутри псионических аур"
 MOD_SHIP_PSIONIC_AURA_FIRE_RATE_MULT: "$MOD_SHIP_FIRE_RATE_MULT$ внутри псионических аур"
 end_of_the_cycle_endbringers: "$end_of_the_cycle_article_cap$"
 situation_end_of_the_cycle_endbringers_desc: "Наш договор с §HКонцом цикла§! дарует нам невообразимую мощь и благородную цель.\n\nНаш благоволитель желает, чтобы мы полностью уничтожили эту реальность. С каждой новой системой, поглощенной §Hаурой Конца§!, будет приближаться милосердное забвение.\n\nМы станем свидетелями неизбежного.\n\nОсталось захватить систем: [Owner.GetEndCycleGalaxySystemsLeft]"
 end_of_the_cycle_endbringers_monthly_change_tooltip: "$end_of_the_cycle_monthly_change_tooltip$"
 situation_end_of_the_cycle_endbringers_finish_effects: "§RРасплата ждет.§!"
 approach_situation_end_of_the_cycle_bring_the_inevitable: "Принять неизбежное"
 approach_situation_end_of_the_cycle_stall_for_time: "Выиграть время"
 approach_situation_end_of_the_cycle_delay_your_destiny: "Отсрочить судьбу"
 shroud.8460.title: "Песочные часы перевернулись"
 shroud.8460.desc: "Сила §HКонца цикла§! требует жертв, и наше время на исходе.\n\nГалактика всё еще не пропитана очищающей аурой нашего благоволителя. Все наши усилия до сих пор — ничто.\n\nНо чтобы помочь завершить этот великий труд, из-за завесы к нам хлынул новый поток энергии. Это обещанное благословение!"
 shroud.8460.a: "Мы еще можем преуспеть."
 shroud.8470.title: "Конец близок"
 shroud.8470.desc: "Мощь нашего покровителя безгранична, но время почти истекло. Милосердное забвение §HКонца цикла§! не потерпит столь вопиющей несостоятельности.\n\nОстается смутная надежда: мы должны охватить галактику аурой конца, какой бы ценой это ни обернулось. В отчаянии наши [GetTelepathPlural&nom] вытягивают из §HПокрова§! всю энергию до последней капли."
 shroud.8470.a: "Мы вас не подведем!"
 shroud.8480.title: "$GALACTIC_FOCUS$ аннулирован"
 shroud.8480.desc: "Галактический сенат аннулировал резолюцию, предписывающую предпринимать оборонительные меры против государства, распространяющего §Hпсионическую ауру§!. В результате все активные военные действия, в которых участвуют члены сообщества и §H[former_malevolent_aura.GetName]§!, должны быть немедленно прекращены. В галактике вновь воцарился мир."
 shroud.8481.desc: "Галактический сенат аннулировал резолюцию, предписывающую предпринимать «оборонительные» меры против нас, и все члены Сообщества получили приказ о прекращении военных действий… по крайней мере, пока."
 shroud.8481.homicidal: "$shroud.8480.desc$\n\n$crisis.4111.nasty$"
 shroud.8500.title: "Предвестники конца"
 shroud.8500.desc.intro: "Неотвратимая воля нашего благоволителя сжимает галактику в тисках. Теперь мы знаем, как наступит Конец.\n\n§R$end_aura$§! должна распространиться повсюду. Когда физический мир сольется с изначальной сутью §HПокрова§!, истинное уничтожение станет неизбежным."
 shroud.8500.desc.outro: "Завершение этой великой задачи станет нашим величайшим достижением и откроет путь к окончательному спасению."
 shroud.8500.desc.homicidal: "$shroud.8500.desc.intro$\n\nИстребление всей жизни в галактике — лишь приятный побочный эффект. $shroud.8500.desc.outro$"
 shroud.8500.desc.default: "$shroud.8500.desc.intro$\n\n$shroud.8500.desc.outro$"
 shroud.8500.a: "У нас нет права на ошибку."
 shroud.8600.title: "$shroud.4970.title$"
 shroud.8600.desc.intro: "Такова была наша судьба.\n\n§R$end_aura$§! окутала галактику. Наш народ в мире [Root.GetHomeWorldName] погрузился в лихорадочную эйфорию, празднуя"
 shroud.8600.desc.outro: "Грядет великое возрождение, обещанное еще со времен нашего пробуждения.\n\nМы наблюдаем, как пустота поглощает все сущее. Небытие и уничтожение стали единственными законами галактики. Один за другим миры обращаются в пыль, из которой они когда-то возникли.\n\nМы — последние, кого коснется Конец. Это... прекрасно. Мы уже видим его, трепещущий в новой, хрупкой форме. Конец настал. Это эпоха нового Начала."
 shroud.8600.desc.homicidal: "$shroud.8600.desc.intro$ уничтожение всего, что не есть мы. $shroud.8500.desc.outro$"
 shroud.8600.desc.default: "$shroud.8600.desc.intro$ милосердное забвение. $shroud.8600.desc.outro$"
 shroud.8600.a: "Небытие... невозможно."
 shroud.8610.title: "Цена слабости"
 shroud.8610.desc.intro: "Мы потерпели неудачу. Из-за нашей слабости $end_of_the_cycle_color_article$ не смог воплотиться во всем своем великолепии. И теперь нам предстоит заплатить за эту несостоятельность.\n\nОн забрал всё. В одно мгновение [Root.GetName]... [Root.GetName::исчез|||fem:исчезла|||neut:исчезло|||pl:исчезли]. Там, где были процветающие колонии, теперь лишь руины. Там, где могущественные флотилии бороздили пустоту, теперь лишь тишина и обломки. Всё поглощено Концом. Всё унесено §HПокровом§!."
 shroud.8610.desc.outro: "И теперь наш благоволитель явил в пространстве над миром [former_capital.GetName] исполинскую сущность Покрова. Усиленная поглощенными сознаниями наших псиоников, она теперь рыщет по галактике, стремясь завершить то, что не удалось нам."
 shroud.8610.desc.a: "$shroud.8610.desc.intro$\n\n$shroud.8610.desc.outro$"
 shroud.8610.desc.b: "$shroud.8610.desc.intro$\n\nМногие [Root.GetSpeciesNamePlural] приняли эту судьбу, но небольшая группа отступников отказалась покориться высшей воле нашего благоволителя. Возглавляет этих изгнанников могучий псионик §H[Root.GetRulerName]§!, [Root.Ruler.GetAXX::который знал|||fem:которая знала], что грядет. Они скрываются в мире, куда не дотянулось влияние Конца.\n\n$shroud.8610.desc.outro$ А когда закончит — придет и за изгнанниками."
 shroud.8610.a: "Может, такова была наша судьба с самого начала..."
 shroud.8610.b: "Смогут ли изгнанники противостоять ее мощи?"
 shroud.8710.title: "Пережив апокалипсис"
 shroud.8710.desc: "Свершилось. §RРасплата§! уничтожена.\n\n$end_of_the_cycle_color_article_cap$ отступил в глубины §HПокрова§!. Угроза, которую он представлял для физической реальности, устранена — пока что.\n\nКогда окутанный труп его аватара исчез из этого мира, нам удалось сохранить физический фрагмент его проявления. Наши телепаты чувствуют, что даже после смерти он излучает колоссальную псионическую энергию — куда мощнее, чем артефакт, найденный на планете §H[shrouded_planet.GetName]§!.\n\nМы можем использовать это ядро концентрированной неизбежности, чтобы возродиться из пепла уцелевшей галактики.\n\nКонец пришел и ушел, но мы всё же сумели остаться."
 shroud.8710.a: "Неужели это и была наша судьба?"
 r_core_of_the_reckoning: "Ядро Расплаты"
 r_core_of_the_reckoning_desc: "Это ядро, добытое из останков Расплаты, испускает высокий уровень псионической энергии."
 core_of_reckoning_active_effect_tt: "Можно один раз использовать £decision£ §Yпланетарное решение§!: ['concept_banish_decision']"
 decision_banish: "Изгнание"
 decision_banish_desc: "Позволив Покрову поглотить это место, мы восстановим баланс ядра Расплаты."
 decision_banish_effects_tt: "Изгнать эту планету в Покров."
 concept_banish_decision: "$decision_banish$"
 concept_banish_decision_desc: "$decision_banish_desc$\n$decision_banish_effects_tt$\nДобавлен модификатор §Y«$shroud_surge$»§! на §Y10§! лет:\n$shroud_surge_effects$"
 shroud_surge: "Прилив Покрова"
 shroud_surge_desc: "Баланс ядра Расплаты временно восстановлен."
 shroud_surge_effects: "Пассивные эффекты §Yядра Расплаты§! удвоены."
 #======================
 # Shroud Leaders
 #======================
 ganthuata: "Гантуата"
 ganthuata_desc: "Преданный последователь Колыбели душ, стремящийся отыскать ее глубочайшие истины и донести их до тех, кто способен их принять."
 ganthuata_catch_phrase: "Мы растворяемся в объятиях Колыбели."
 leader_trait_disciple_of_the_cradle: "Последователь колыбели"
 leader_trait_disciple_of_the_cradle_desc: "Чем больше мы видим, тем больше познаём. $the_cradle_of_souls_article$ крепнет, когда мы наблюдаем за соседями."
 leader_trait_disciple_of_the_cradle_envoys_zro: "$t$— Послы, отправленные к благоволителю, производят §G0,5§! £zro£ §Y$sr_zro$§! в месяц"
 shroud.12010.desc: "§HНаше общение с Покровом привлекло новый голос, который обращается к нам. Его теплые, умиротворяющие ноты звучат как в физическом мире, так и в глубинах разума.§!\n\nПриветствую. Я Гантуата, и я пришел в поисках единомышленников, вставших на истинный путь. Слышали ли вы весть Колыбели душ?"
 shroud.12010.name: "$ganthuata$"
 shroud.12010.a: "Мы слышали Колыбель душ. Почему вы спрашиваете?"
 shroud.12010.a.response: "Почему? Что движет любым странником, вопрошающим тех, кто повстречался ему на пути? Желание понять того, чей ответ он хочет услышать, друг мой. Когда вы говорите — я познаю."
 shroud.12010.b: "Чего вы от нас хотите?"
 shroud.12010.b.response: "Чего же жаждут те, кого вскормила Колыбель? Прежде всего — вашей дружбы. Я провел века в поисках умов, резонирующих с сиянием Колыбели, и вот — целая цивилизация пробуждается в ее свете."
 shroud.12010.c: "Чем вы можете нам помочь?"
 shroud.12010.c.response: "Я помогу нести ваше послание среди звезд. Вместе мы приведем галактику в нежные объятия Колыбели."
 shroud.12010.hire_custom_tooltip: "§Y$ganthuata$§! присоединяется к нашему государству в качестве §Hлидера§!."
 koborokra: "Коборок'Ра"
 koborokra_desc: "Бывший солдат, подвергнутый жестоким псионическим пыткам со стороны [Root.GetHisHer] врагов много лет назад. Теперь — измученный адмирал, движимый ненасытной жаждой разрушения."
 koborokra_catch_phrase: "Пора пролить кровь."
 leader_trait_disciple_of_the_eater: "Жнец крови"
 leader_trait_disciple_of_the_eater_desc: "Этот лидер заключил кровавый договор с Пожирателем миров."
 leader_trait_disciple_of_the_eater_attunement_effect: "§G+$@disciple_of_the_eater_combat_attunement$§! к сонастроенности с Пожирателем миров за победу в битве флотилий"
 leader_trait_disciple_of_the_eater_zro_fleet_attack_effect: "$t$— §G+$@disciple_of_the_eater_zro_fleet_attack|1$§! ед. $i_zro$ за каждый 1% опустошения из-за орбитальной бомбардировки"
 leader_trait_disciple_of_the_eater_zro_army_attack_effect: "$t$— §G+$@disciple_of_the_eater_zro_army_attack|0$§! ед. $i_zro$ за каждый 1% опустошения из-за наступательных армий"
 shroud.12020.name: "$koborokra$"
 shroud.12020.desc: "§HПотрепанные доспехи и плащ, испачканный кровью, скрывают фигуру в маске. Хриплый рык разрывает тишину.§!\n\nЭта галактика заслуживает страданий. Я чувствую, что вы думаете так же.\n\n§HАдмирал говорит, проводя рукой по эфесу украшенного клинка.§!\n\nМеня направили к вам, но в конечном счете я служу §HПожирателю миров§!."
 shroud.12020.desc.covenant: "$shroud.12020.desc$ Как и вы."
 shroud.12020.desc.no_covenant: "$shroud.12020.desc$ Возможно, и вы последуете за ним."
 shroud.12020.a: "Почему вы хотите работать на нас?"
 shroud.12020.a.response: "Вместе мы сможем задушить звезды в каждом уголке этой галактики. В одиночку много страданий не посеешь."
 shroud.12020.b: "Мы можем вам доверять?"
 shroud.12020.b.response: "$the_eater_of_worlds_article_cap$ управляет каждым моим вздохом. Я присягнул ему на верность и видел этот момент в своих снах. Его воля — служить вам. Ваш отказ станет моим приговором."
 shroud.12020.c: "Почему вы служите Пожирателю миров?"
 shroud.12020.c.response: "Меня предали, сломали и обрекли на агонию. Пожиратель миров заговорил со мной. Он даровал мне то, что было нужно для выживания... кровавую повязку на кровавые раны. Он дал силу отсечь руки, причинившие мне страдания. Теперь я в долгу перед ним."
 shroud.12020.d: "Что вы можете нам предложить?"
 shroud.12020.d.response: "Вместе мы выжжем бесчисленные системы очищающим пламенем и насладимся симфонией криков. Мы будем наблюдать, как горят миры. Вместе мы покажем галактике то, что она не сможет забыть. Такова наша судьба."
 shroud.12020.hire_custom_tooltip: "§Y$koborokra$§! присоединяется к нашему государству в качестве §Hлидера§!."
 morr: "Морр"
 morr_desc: "Бывший скромный старатель, у которого из-за длительного воздействия нестабильных залежей зро развилась мощная, сводящая с ума связь с Исполнителем желаний. Теперь он использует эту связь для получения баснословных богатств, опустошая недра целых миров и продавая добытое по заоблачным ценам."
 morr_catch_phrase: "Блестит — значит, наше."
 leader_trait_disciple_of_the_instrument: "Алчное сердце"
 leader_trait_disciple_of_the_instrument_desc: "Глубоко связанный с Исполнителем желаний, этот лидер способен чуять месторождения даже в самых негостеприимных уголках галактики."
 leader_trait_disciple_of_the_instrument_planetary_decision_effect: "— Доступно планетарное решение §Y«$decision_divine_deposits$»§!"
 decision_divine_deposits: "Божественный зов месторождений"
 decision_divine_deposits_desc: "Ведомый таинственным зовом Исполнителя желаний, губернатор этой планеты находит давно забытые месторождения ресурсов."
 decision_divine_deposits_tt: "Добавляется случайное планетарное свойство с ресурсами."
 shroud.12030.name: "$morr$"
 shroud.12030.desc: "§HВзгляд Морра ни на чем не задерживается, скользя между тенями и бликами, будто вечно выслеживая добычу.§!\n\nВы тоже чувствуете это, да? Исполнитель желаний никогда не бывает спокоен. Он жаждет. Он поглощает. Он повелевает.\n\nЯ беру всё, что вижу. Ни одно сокровище природы не устояло перед моей волей. Я предлагаю вам свои услуги не из верности, а потому что вместе мы сможем опустошить галактику и насытить пустоту тем, что ей причитается."
 shroud.12030.a: "Почему вы хотите работать на нас?"
 shroud.12030.a.response: "$the_instrument_of_desire_article_cap$ ненасытен. Чтобы угодить ему, нужны [root.species.GetHandNamePlural] многих."
 shroud.12030.b: "Что вы можете нам предложить?"
 shroud.12030.b.response: "Я помогу вам выжать из природы каждую хоть сколько-нибудь стоящую молекулу. Каждый атом будет учтен, промаркирован и продан.\n\nТе, кто шепчут «достаточно», — трусы. Жалкие трусы. Пусть они сгниют. Вместе мы завладеем всем."
 shroud.12030.c: "Почему вы служите Исполнителю желаний?"
 shroud.12030.c.response: "Когда-то я был старателем, гнавшимся за каждой минеральной лихорадкой, которую подбрасывал космос. Затянутый пылью воздух, сломанные сканеры, голословные притязания... пока не заговорил $the_instrument_of_desire_article$.\n\nОн обещал невообразимые богатства. Всё, что он попросил взамен, — преданность.\n\nТеперь я служу. Добываю. Поставляю. Долг вечен... но богатства? О, богатствам нет конца."
 shroud.12030.hire_custom_tooltip: "§Y$morr$§! присоединяется к нашему государству в качестве §Hлидера§!."
 kronen: "Кронен Страдающий"
 kronen_desc: "Когда-то — гениальный ум, ныне — раздробленная оболочка. Этот ученый-отшельник был искажен замыслами Составителя цепочек. Остался лишь его непревзойденный интеллект, мерцающий во тьме, словно угасающая звезда."
 kronen_catch_phrase: "Столько всего еще предстоит познать..."
 leader_trait_disciple_of_the_composer: "Страдания нитей"
 leader_trait_disciple_of_the_composer_desc: "Чем больше плоти он изменяет, тем сильнее раскрывается его собственная. $the_composer_of_strands_article_cap$ преображает всех, кто осмелится постичь его запретное искусство."
 shroud.12040.name: "$kronen$"
 shroud.12040.desc: "§HКогда наши сенсоры засекают корабль, нарушающий границы, сквозь Покров раздается напряженный голос — усталый, пронзительный, но тревожно знакомый, словно гул самого Составителя цепочек.§!\n\n[GetKronenFlesh::Новый|||fem:Новая|||neut:Новое|||pl:Новые]... [GetKronenFlesh]? Любопытно. [GetKronenFlesh::Такой... мягкий. Такой... податливый|||fem:Такая... мягкая. Такая... податливая|||neut:Такое... мягкое. Такое... податливое|||pl:Такие... мягкие. Такие... податливые]. Или нет? Трудно сказать. Столько узлов, шевелящихся под [GetKronenSkin]. Какую же форму сплел для меня сегодня Составитель цепочек?\n\n§HСвязь наконец стабилизируется, открывая фигуру из обнаженных, пульсирующих мышц — существо подергивается и яростно что-то записывает.§!\n\nВы видите меня таким, какой я есть. Возможно, я еще $kronen$. Возможно, уже нет. Но я чувствую вас — как и я, вы холст, натянутый для кисти Составителя. Подойдите. Давайте начнем."
 shroud.12040.a: "Начнем? Начнем что?"
 shroud.12040.a.response: "Преображение, конечно же. Будем избавляться от этих грубых, несовершенных оболочек. Распутывать нити, что привязывают нас к форме, к определённости. Составитель коснулся и вас тоже. Вы уже начали... разве не чувствуете его подёргиваний внутри себя?"
 shroud.12040.b: "Зачем вы обратились к нам?"
 shroud.12040.b.response: "Разве вы не ощущаете? Отпечаток, вдавленный в каждую дрожащую нить. Я должен распутаться, сбросить то, чем был, увидеть свое развоплощение, пока рву стежки, сшивающие меня с плотью. Но вы... вы — целое государство. Огромное. Могучее. Вместе мы могли бы тянуть за куда более великие нити, чем любая из наших одиноких рук."
 shroud.12040.c: "Чем вы можете нам помочь?"
 shroud.12040.c.response: "Я предлагаю больше, чем помощь. Моя плоть — это дар, эксперимент боли и предназначения, вылепленный Составителем цепочек. Каждая моя частица кричит, но я терплю. Изучаю. Познаю. И всё, что рождает мое страдание... будет вашим. При условии, что мы вместе придадим этому форму."
 shroud.12040.hire_custom_tooltip: "§Y$kronen$§! присоединяется к нашему государству в качестве §Hлидера§!."
 shroud.12045.desc: "§HПо мере роста нашего населения $kronen$ становится всё более неистовым. Его голос дрожит от напряжения, тело дергается, плоть пульсирует и перетекает, пока он хрипит в отчаянии.§!\n\nНити... им нет конца... Они извиваются, я тяну, рву, но ткань не поддается! Сколько еще я должен терпеть эту жалкую форму? Сколько ещё нужно сбросить, чтобы узор наконец открылся?!"
 shroud.12045.a: "В чем проблема?"
 shroud.12045.a.response: "Проблема? В единственном числе? О, как мило. С каждым клочком, что я сбрасываю, с каждой сверкающей нитью, что мы рвем, — петли лишь затягиваются туже! А $the_composer_of_strands_article$ тем временем напевает свою сводящую с ума, пронзительную мелодию..."
 shroud.12045.a.response_2: "$shroud.12045.a.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.b: "Вам нужен отдых?"
 shroud.12045.b.response: "Отдых? Нет, никогда. Мы не должны застаиваться, позволять этой жалкой плоти гнить в посредственности. Мне нужен не покой... мне нужны испытуемые. Материал, чтобы лепить, ваять, сливаться."
 shroud.12045.b.response_2: "$shroud.12045.b.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.c: "Мы можем чем-то помочь?"
 shroud.12045.c.response: "Можете напомнить мне... кем я был? Скажите, когда мы познакомились... мои конечности были такого же цвета? Моя роговица была так же замутнена? Каждый раз, когда я пытаюсь вспомнить, моя плоть меняется ещё сильнее.\n\nНет... память здесь не имеет значения. Откровение кроется в самом изменении. Былое ничего не значит для Составителя цепочек теперь. Оставьте меня. Мне надо... подумать."
 shroud.12045.c.response_2: "$shroud.12045.c.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.desc_2: "§HКронен бьется в конвульсиях. Его единственный глаз закатывается, плоть пульсирует, пузырится под поверхностью, и вдруг... наступает тишина. Чудовищное преобразование прекращается так же внезапно, как и началось.§!\n\nА... здравствуйте. Вам что-то нужно?"
 shroud.12045.d: "Вы в порядке?"
 shroud.12045.d.response: "Конечно. С чего бы мне быть не в порядке? Нити раскрыли мой разум ещё шире, перекроили эту несовершенную плоть, чтобы она лучше соответствовала замыслу Составителя цепочек. А теперь, если позволите... мне нужно потянуть ещё так много нитей. Так много оболочек оставить позади.\n\n§HСвязь прерывается, но в Покрове ещё долго звучит странный резонанс. Что бы ни терзало Кронена сейчас... это не случайность. Это воля Составителя цепочек.§!"
 shroud.12045.end: "С даром Составителя нельзя обращаться легкомысленно."
 zulyn: "Зулин Слушатель"
 zulyn_desc: "Ученый, отказавшийся от ограничений традиционной науки в погоне за тайнами, что открывают безумные отголоски Шепчущих в пустоте."
 zulyn_catch_phrase: "Нам нужно лишь слушать..."
 shroud.12050.name: "$zulyn$"
 shroud.12050.desc: "§HКоммуникационный массив оживает, и в эфире раздаётся голос, бормочущий с тревожной настойчивостью.§!\n\nПриветствую, собратья по слушанию. Я услышал ваш голос — нет, голоса — среди этого хаоса. Вы ведь теперь тоже слышите их, да? Великий хор §HШепчущих в пустоте§!, их тихие дары, их шёпоты безумия?\n\nЭти тайны опасны для тех, кто не способен их постичь. Но я могу помочь вам понять их. Я предлагаю помощь перед этим всепоглощающим потоком парадоксов, разрывающих ваш разум. Без обид. Когда-то и я с трудом постигал их истинный смысл."
 shroud.12050.a: "Почему вы считаете, что можете нам помочь?"
 shroud.12050.a.response: "Вы же прорвались сквозь завесу §HПокрова§!, не так ли? Но скажите, овладели ли вы им? Я провел всю жизнь, исследуя его глубины, составляя карты непостижимых перемещений его сущностей и их отголосков в нашем хрупком мире.\n\nШепчущие давно направляют меня. Каждое сводящее с ума слово, что теперь укоренилось в ваших мыслях — я помогу вам понять их."
 shroud.12050.b: "Что вам известно о Шепчущих?"
 shroud.12050.b.response: "Я годами записывал их шёпоты, ожидая этого самого момента. Теперь вы вступили в согласие с их многоголосым хором, и я не упущу шанса извлечь сокрытые в их словах истины."
 shroud.12050.c: "Что вы нам предлагаете?"
 shroud.12050.c.response: "Годы исследований отточили мое восприятие, позволив проникать в структуры нашей физической реальности и бездонные глубины §HПокрова§!.\n\nВместе мы вырвемся за пределы этого пространства. Тайны вселенной станут нашими. Это я вам обещаю с абсолютной уверенностью."
 shroud.12050.hire_custom_tooltip: "§Y$zulyn$§! присоединяется к нашему государству в качестве §Hлидера§!."
 leader_trait_disciple_of_the_whisperers: "Шёпоты Покрова"
 leader_trait_disciple_of_the_whisperers_desc: "Этот лидер слышит отголоски Шепчущих в пустоте, проникающие сквозь Покров, что дает уникальное научное понимание скрытых механизмов физической вселенной."
 leader_trait_disciple_of_the_whisperers_effects: "$t$— $@disciple_of_the_whisperers_tech_zro|0=+$ ед. $i_zro$ при исследовании §Yредких§! или §Yпсионических§! технологий"
 ouwron: "Оув'рон"
 ouwron_desc: "Изгнанный из своего кочевого клана после встречи с Концом цикла, Оув'рон скитался среди звезд в поисках его благосклонности. Теперь, когда на горизонте появилась $NAME_Reckoning$, он горит решимостью — и ничто его не остановит."
 ouwron_catch_phrase: "Расплаты не избежать..."
 shroud.12060.name: "$ouwron$"
 shroud.12060.desc_1: "§HНаш коммуникационный массив захлебывается от потока невнятных сигналов. Сквозь хаос пробивается единственный голос.§!\n\nНаконец-то вы пришли. Не вовремя, но и не слишком поздно. Не бойтесь — я вижу дальше тонких границ этой физической тюрьмы, что мы зовем реальностью. Жертва принесена. Мой путь ясен."
 shroud.12060.desc_blind: "\n§HТут мы понимаем: как и мы, это существо отказалось от зрения во имя служения.§!"
 shroud.12060.desc_default: "\n§HТут мы замечаем: его глазницы пусты, словно он давно отказался от глаз.§!"
 shroud.12060.desc_2: "\nНу же, не стесняйтесь. Я знаю, вы уже узрели возвышенную простоту §HКонца цикла§!. Примите участие в обряде — и вместе мы ускорим его приход."
 shroud.12060.a: "Как давно вы знаете о Конце цикла?"
 shroud.12060.a.response: "Дольше, чем осознаю себя. Как и в любом разуме, это знание дремало, пока §HПокров§! не приоткрыл завесу. Там его чистая воля становится очевидной. Наша цель проста: приблизить Конец."
 shroud.12060.b: "Почему вы хотите нам помочь?"
 shroud.12060.b.response: "Вы спрашиваете, хотя ответ вам уже известен. Мы оба видели его неизбежность. Распад уже начался. Пути назад нет — только насквозь. Мы вместе движемся к финалу."
 shroud.12060.c: "Что вы нам предлагаете?"
 shroud.12060.c.response: "Я всего лишь пылинка в этом умирающем цикле, как и все мы. Что я могу по-настоящему предложить? Разум в этой галактике угасает, и мой долг — провести его по этому пути быстро... И я предлагаю эту милость вам."
 shroud.12060.hire_custom_tooltip: "§Y$ouwron$§! присоединяется к нашему государству в качестве §Hлидера§!."
 leader_trait_disciple_of_the_end: "Апостол Конца"
 leader_trait_disciple_of_the_end_desc: "Преданный апостол Конца цикла, его непоколебимая вера в пришествие Расплаты движет им в каждом сражении, которое он ведет."
 leader_trait_disciple_of_the_end_effects: "$t$— $@disciple_of_the_end_aura_intensity|0=+$ к интенсивности ауры за каждый уничтоженный в системе корабль$TABBED_NEW_LINE$— $@disciple_of_the_end_jumpdrive_range|0=+%$ к дальности действия прыжкового двигателя внутри §Hауры Конца§!"
 shroud.12155.name: "Чистая убеждённость"
 shroud.12155.desc: "§HУ всех действий есть последствия. Когда наш коммуникационный массив вспыхивает, Оув'рон изливает поток праведного гнева.§!\n\nЕретики! Глупцы! Лжецы! Нам следовало знать. Нам следовало уничтожить вас в тот же миг, когда ваша гнилая сущность осмелилась проникнуть в §HПокров§!!\n\nВы отсрочили неизбежное — предначертанный финал! На что вы надеетесь? Всё, что вы могли обрести, теперь потеряно.\n\nЕсть только один конец. Так пойте же... пойте, погружаясь в небытие!"
 shroud.12155.tt: "$ouwron$ обращается против нас!"
 NAME_Ouwron_Battleship: "$battleship$"
 NAME_Ouwron_Destroyer: "$destroyer$"
 shroud.12160.title: "Объявлена война"
 shroud.12160.desc: "[global_event_country.GetGalCommunityOrGalImperium] принимает резолюцию, объявляющую нас целью военных действий. Все его участники объявили войну [this.GetName&dat]. Их флотилии могут нанести удар в любой момент."
 shroud.12160.a: "$extreme_frontiers.1531.i$"
