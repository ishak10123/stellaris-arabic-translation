 concept_psionic_phenotype_traits_desc: "- ['trait:trait_uncanny_intuition']\n- ['trait:trait_cranial_hypertrophy']\n- ['trait:trait_cranial_megatrophy']\n- ['trait:trait_haunting_visions']"
 trait_uncanny_intuition: "Сверхъестественная интуиция"
 trait_uncanny_intuition_desc: "Эта раса обладает необъяснимой способностью с первого раза находить решения сложнейших задач."
 trait_uncanny_intuition_portrait_override_tt: "Раса должна обладать псионическим даром"
 trait_cranial_hypertrophy: "Черепная гипертрофия"
 trait_cranial_hypertrophy_desc: "Нейроструктуры этой расы разрослись настолько, что их физические возможности оказались существенно ограничены."
 trait_cranial_hypertrophy_portrait_override_tt: "$trait_uncanny_intuition_portrait_override_tt$"
 trait_cranial_megatrophy: "Черепная мегатрофия"
 trait_cranial_megatrophy_desc: "Нейроструктуры этой расы достигли пределов биологического роста, возможного для их формы."
