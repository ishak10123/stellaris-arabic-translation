 # Mindwardens
 #==========================
 MINDWARDEN_ENCLAVE: "$MINDWARDEN$"
 MINDWARDEN_ENCLAVE_plural: "$MINDWARDEN_plural$"
 starbase_mindwarden: "$MINDWARDEN$"
 starbase_mindwarden_plural: "$MINDWARDEN_plural$"
 gov_mindwarden_enclave: "Анклав Защитников разума"
 gov_mindwarden_enclave_desc: "Объединение ненавистников Покрова. Предоставляет услуги по защите от псионического воздействия и сопутствующие технологии."
 civic_mindwarden_enclave: "$ENCLAVE_MINDWARDEN$"
 civic_mindwarden_enclave_desc: ""
 enclave_mindwarden_station: "Станция анклава Защитников разума"
 enclave_mindwarden_station_plural: "Станции анклава Защитников разума"
 leader_trait_iron_will: "Железная воля"
 leader_trait_iron_will_desc: "Искусный командир Защитников разума, прославившийся мастерством в строительстве мощных укреплений и развитии псионической устойчивости."
 shroud.4190.name: "$PSIONIC_AURA$ приближается"
 shroud.4190.desc.intro: "Какое-то время назад наши [GetScientistPlural] обнаружили любопытный феномен: в отдаленных звездных системах они зафиксировали потоки энергии неизвестного происхождения, постепенно растекающиеся в направлении других систем."
 shroud.4190.desc: "$shroud.4190.desc.intro$ Это явление мы, взяв за основу неподтвержденные пока гипотезы, назвали §H«$PSIONIC_AURA_PLURAL$»§!. Пока еще сложно сказать, представляют ли наблюдаемые потоки какую-либо угрозу.\n\nОдну такую ауру наша аппаратура обнаружила в системе §H[from.GetName]§!. Расползающиеся оттуда потоки в теории со временем могут оказаться и в наших границах."
 shroud.4190.desc_mindwarden: "Если предположения о псионической природе этого явления верны, возможно, справиться с ним [event_target:mindwarden_enclave_country.GetName::поможет|||fem:поможет|||neut:поможет|||pl:помогут] §H[event_target:mindwarden_enclave_country.GetName]§!."
 shroud.4190.a: "Скоро узнаем, насколько это опасно."
 shroud.4191.name: "$shroud.4190.name$"
 shroud.4191.desc_1.common: "Мы зафиксировали плотные скопления псионической энергии в системе §H[from.GetName]§!. Прислушавшись к отзвукам внутри §HПокрова§!, наши [GetTelepathPlural&nom] сообщили, что это явление вызвано псионической деятельностью"
 shroud.4191.desc_1.default: "$shroud.4191.desc_1.common$, которую ведет некая инопланетная цивилизация."
 shroud.4191.desc_1.contact: "$shroud.4191.desc_1.common$, которую ведет государство §H[fromfrom.GetName]§!."
 shroud.4191.desc_2.common: "вещественного и сознательного в наблюдаемой реальности. Наблюдения показали, что эти ауры могут постепенно охватывать новые системы."
 shroud.4191.desc_2.default: "Новое открытие мы назвали §H«$PSIONIC_AURA$»§!. Ее испускает неизвестная, но достаточно могущественная сущность из Покрова, своим влиянием захватывающее все аспекты $shroud.4191.desc_2.common$"
 shroud.4191.desc_2.knows_aura: "По всей видимости, эта цивилизация научилась создавать §Hпсионическую ауру§!, исходящую из Покрова и своим влиянием захватывающую все аспекты $shroud.4191.desc_2.common$"
 shroud.4191.desc_3.common: "мы предполагаем, что ее влияние на нашу территорию будет [GetPositiveRivalAdj&masc,inst]… пока не изменятся наши отношения с «излучателем»."
 shroud.4191.desc_3.default: "По данным наших [GetTelepathPlural&gen], аура испускает нечто [GetBenevolentRivalAdj&neut], поэтому $shroud.4191.desc_3.common$"
 shroud.4191.desc_3.contact: "С учетом того, что наши отношения с государством [fromfrom.GetName] [GetLessThanRivalAdj] добрыми, $shroud.4191.desc_3.common$"
 shroud.4191.a.rival_organic: "$WORRYING$"
 shroud.4191.a.rival_default: "Неоптимальный исход."
 shroud.4191.a.organic: "Дар от Покрова."
 shroud.4191.a.default: "Любопытное явление."
 shroud.mindwarden.back: "$enclave.410.a$"
 shroud.4205.name: "[event_target:mindwarden_enclave_country.GetName]"
 shroud.4205.common: "Приветствую вас. Я говорю с вами от имени [event_target:mindwarden_enclave_country.GetName&gen]."
 shroud.4205.desc: "$shroud.4205.common$\n\nНаше предназначение — оберегать галактику от грозящего ей §HПокрова§! и всех, кто помогает распространять его тлетворное влияние. Каждый ум в галактике должен быть надежно защищен от вмешательства псиоников.\n\nНаши пси-датчики показывают, что вы не представляете угрозы. Это замечательно. Мы готовы помочь вам защититься от всего, что может вам угрожать.\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.end: "Если вам нужны антипсионические услуги военного характера или вы хотите избавиться от §Hзро§! — мы поможем."
 shroud.4205.desc.return: "Мы снова приветствуем вас. [event_target:mindwarden_enclave_country.GetName] весьма [event_target:mindwarden_enclave_country.GetName::ценит|||fem:ценит|||neut:ценит|||pl:ценят] наше сотрудничество.\n\nПси-датчики показывают, что всё в порядке. §HПокров§! пока не исказил вашу сущность. Хорошо, очень хорошо…\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.eotc: "Настали мрачные времена. Несмотря на все наши усилия, $end_of_the_cycle_color_article$ уже здесь. Его ужасающее воплощение рыщет среди звезд...\n\n$shroud.4205.desc.eotc.end$"
 shroud.4205.desc.eotc.end: "Теперь нам нужно сплотиться и предотвратить псионический апокалипсис."
 shroud.4205.desc.merc_first: "Защитники, мы принесли добрые вести: основан первый §H$gov_mindwarden_enclave$§!. $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_more: "Защитники, мы принесли добрые вести: основан наш §H$gov_mindwarden_enclave$§!. $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_back: "Вновь приветствуем вас, защитники. §H[mindwarden_enclave_country.GetName]§! весьма ценит наше сотрудничество.\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning: "$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning.eotc: "$shroud.4205.desc.eotc.end$"
 shroud.4205.a: "Что такое Покров?"
 shroud.4205.b: "Мы хотели бы обсудить §I$sr_zro$§!."
 shroud.4205.c: "Что можно сделать с §Yпсионическими аурами§!?"
 shroud.4205.d: "Нам известна неплохая цель-псионик…"
 shroud.4205.e: "Помогите нам уменьшить £crime£ §Y[GetCrimeDeviancy]§! в нашем государстве."
 shroud.4205.ef: "Нам нужна §Yлогистическая поддержка§!."
 shroud.4205.f: "Нам пригодились бы ваши солдаты."
 shroud.4205.g: "Не могли бы вы отправить нам §Yсмотрителя§!?"
 shroud.4205.h: "Мы хотим поговорить о Конце цикла."
 shroud.4205.i: "Как ваши §Yоснователи§! мы хотели бы сделать предложение."
 shroud.shared_combating_the_shroud: "Начиная с этого дня §H[mindwarden_enclave_country.GetName]§! [event_target:mindwarden_enclave_country.GetName::берет|||fem:берет|||neut:берет|||pl:берут] на себя жизненно важную задачу противостояния §HПокрову§! и преступлениям псиоников.\n\nМы предлагаем самый широкий спектр услуг по борьбе с псионическим влиянием — от утилизации §Hзро§! до найма солдат. Скорость и результат гарантированы."
 shroud.4210.desc: "Точнее всего описать §HПокров§! можно так: это отдельное измерение нашей реальности, существующее за пределами простого восприятия. Покров целиком состоит из вредной §H«псионической»§! энергии и охватывает каждый сантиметр нашей галактики, но мало кто способен его уловить.\n\nКогнитивная деятельность мыслящих существ способна приводить к воплощению энергий Покрова в материальном мире. Эти силы невероятно опасны и непредсказуемы.\n\nЗащититься от него можно только одним способом: превентивно. И мы готовы вам в этом помочь."
 shroud.shared_text_shroud_seal: "Эти хитроумные устройства постепенно рассеивают псионическую ауру, пока та не исчезнет окончательно — и в системе, где она зародилась, и в соседних системах, связанных с ней гиперкоридорами."
 shroud.4230.desc: "Подавлять §Hпсионические ауры§! можно двумя основными способами.\n\nПервый способ: построить на планете §Hпсионический подавитель§!. Под его воздействием аура в звездной системе будет постепенно ослабевать и не сможет расползаться за пределы системы.\n\nВторой, более действенный способ: применить §Hпечать Покрова§!. $shroud.shared_text_shroud_seal$"
 shroud.4230.a: "Неважно."
 shroud.4230.b: "Научите нас §Yпсионическому подавлению§!."
 shroud.4231.desc: "С удовольствием. Данные мы передадим незамедлительно.\n\nДа поможет вам эта технология защититься от зловредной ауры."
 mindwarden_encourage_raid: "Заплатить, чтобы [event_target:mindwarden_enclave_country.species.GetNamePlural] напали на известное нам государство псиоников."
 shroud.4240.need_psionics: "Установлен контакт с государством §Yпсиоников§!."
 shroud.4240.desc: "В самом деле? Ну что ж… Пока в галактике существует хоть один псионик, о мире и спокойствии остается лишь мечтать.\n\nМы готовы рискнуть: ничто так не продемонстрирует всю серьезность нашей борьбы, как налет. Поддержите нас финансово, и мы тут же начнем операцию.\n\nЕсли вас устраивают такие условия, просто укажите цель."
 shroud.4240.a: "Ладно, неважно."
 shroud.4240.b: "§I[event_target:raid_target_1.GetName]§!"
 shroud.4240.c: "§I[event_target:raid_target_2.GetName]§!"
 shroud.4240.d: "§I[event_target:raid_target_3.GetName]§!"
 shroud.4240.e: "§I[event_target:raid_target_4.GetName]§!"
 mindwarden_raid_cooldown_tt: "§RМы не сможем запросить новый налет у Защитников разума до §Y[root.mindwarden_raid_timer]§!.§!"
 mindwarden_hire_raid: "Заплатить [event_target:mindwarden_enclave_country.GetName&dat] за налет на эту державу."
 shroud.4245.desc: "Ах, эти… Да, нам известно, что они занимаются псионикой. Демонстрация силы будет вполне оправдана.\n\nБлагодарим за поддержку. Операция вскоре начнется."
 mindwarden_raider_modifier: "Антипсионический налетчик Защитников разума"
 shroud.4246.name: "Налет анклава Защитников разума"
 shroud.4246.common_1: "Судя по перехваченным переговорам, одно из соперничающих с нами государств наняло их для атаки на наши системы."
 shroud.4246.common_2: "выходят с нами на связь напрямую по открытому каналу."
 shroud.4246.desc: "К нашим границам приближается боевая флотилия — ей командуют §H[event_target:mindwarden_enclave_country.GetSpeciesName]§!! $shroud.4246.common_1$ Они $shroud.4246.common_2$"
 shroud.4247.desc: "К нашим границам приближается боевая флотилия неизвестной державы! $shroud.4246.common_1$ Налетчики, называющие себя «§H[event_target:mindwarden_enclave_country.GetSpeciesNamePlural]§!», $shroud.4246.common_2$"
 NAME_Mindwarden_Corvette: "Фанатик"
 NAME_Mindwarden_Frigate: "Страж"
 NAME_Mindwarden_Destroyer: "Инквизитор"
 NAME_Mindwarden_Cruiser: "Экзорцист"
 NAME_Mindwarden_Battleship: "Очиститель"
 NAME_Mindwarden_Titan: "Вершитель"
 mindwarden_defense_modifier: "Силы обороны Защитников разума"
 shroud.4250.desc: "Превосходно. Ваши запасы зро существенно помогут нашим исследователям этого сильного и — увы! — неправильно применяемого вещества. Мы трудимся на благо всей галактики.\n\nИменно поэтому мы покупаем зро по ценам гораздо выше общегалактических."
 shroud.4250.a: "$shroud.mindwarden.back$"
 shroud.4250.b: "Что такое §I$sr_zro$§!?"
 shroud.4250.c: "Пожертвовать £sr_zro£ §I$sr_zro$§!"
 mindwarden_zro_explanation: "Продать до 100 единиц §Y$sr_zro$§! по цене, впятеро превышающей стандартную цену на галактическом рынке."
 mindwarden_zro_cooldown_tt: "§RМы не сможем вновь отдать $sr_zro$ Защитникам разума до §Y[root.mindwarden_zro_timer]§!.§!"
 shroud.4251.desc: "§YЗро§! — редкое и крайне нестабильное вещество, производимые им эффекты трудно предсказать и еще труднее контролировать. Оно может вызывать — даже непреднамеренно — мощные всплески энергии, которые грозят масштабными разрушениями.\n\nТакие свойства оно получает, когда вступает в реакцию с §HПокровом§!, поэтому зро часто пользуются псионики. Некоторые даже принимают его, словно наркотик.\n\nМы хотим постичь природу зро и разработать способы его безопасной утилизации. Именно поэтому мы щедро платим всем, кто делится с нами своими запасами."
 shroud.4255.desc: "Благодарим за содействие."
 shroud.4260.desc: "В таком случае мы можем предложить вам услуги §Yполиции мыслей§!. Она способна пресечь любой [GetCriminalDeviant&masc] поступок еще до того, как из намерения он оформится в действие.\n\nДействия полиции, в отличие от действий псиоников, совершенно безопасны: она отслеживает когнитивную деятельность населения исключительно научными способами, не прибегая для этого к опасной энергии §HПокрова§!."
 shroud.4260.a: "$shroud.mindwarden.back$"
 shroud.4260.b: "Нанять §Iполицию мыслей§!."
 mindwarden_decision_cooldown_tt: "§RМы не сможем вновь запросить эту услугу до §Y[root.mindwarden_decision_timer]§!.§!"
 mindwarden_decision_explanation: "Доступно одно £decision£ §Yпланетарное решение§!: §Y«$decision_thought_police$»§!"
 shroud.4262.desc: "Превосходно. Мы не сомневаемся, что вы по достоинству оцените ее методы."
 shroud.4265.desc: "Верно. Наше сотрудничество уже выявило несколько аспектов, которые можно улучшить в вашей стратегии военного развертывания.\n\nРазумеется, мы не хотим вас оскорбить — просто это наша специализация. Мы будем рады помочь столь ценному партнеру, если вы обеспечите нам достойное вознаграждение."
 shroud.4265.a: "$shroud.mindwarden.back$"
 shroud.4265.b: "Договорились!"
 mindwarden_logistics_cooldown_tt: "§RМы не можем запросить дополнительную логистическую поддержку Защитников разума до §Y[root.mindwarden_logistics_timer]§!.§!"
 shroud.4267.desc: "Приветствуем, уважаемый партнер.\n\nНаш контракт на поддержку логистики вашего флота истек. Мы готовы продолжить сотрудничество, если вы сочтете это выгодным."
 shroud.4267.a: "Продолжить сотрудничество."
 shroud.4267.b: "Пока отказываемся."
 shroud.4266.desc: "Отлично. Поддержка флота начнется незамедлительно."
 shroud.4270.desc: "Наши $NAME_Mindwarden_Army$ — превосходные ударные части. Они могут совладать с самыми разными угрозами, но лучше всего проявляют себя против псиоников.\n\nВы не пожалеете о затратах на них."
 shroud.4270.a: "$shroud.mindwarden.back$"
 shroud.4270.b: "Нанять §Iштурмовиков-смотрителей§!."
 mindwarden_army_cooldown_tt: "§RМы не сможем запросить новую армию у Защитников разума до §Y[root.mindwarden_army_timer]§!.§!"
 mindwarden_army_explanation: "Нанять §Yштурмовиков-смотрителей§!. Армия прибудет в нашу столичную систему на транспортном корабле."
 shroud.4271.desc: "Вам повезло: одна из наших рот как раз готова к передислокации. Вскоре прибудет транспортный корабль."
 shroud.4280.desc: "Мы более чем согласны.\n\nУмелое руководство — ключ к победе над §HПокровом§!, а наши смотрители весьма подкованы в подавлении псионической активности жесткими методами."
 shroud.4280.a: "$shroud.mindwarden.back$"
 shroud.4280.b: "Нанять §Iкомиссара§!."
 mindwarden_commander_explanation: "\nМы наймем комиссара 5 уровня из числа Защитников разума."
 unlocks_mindwarden_council_position: "\n§EВозможность открыть место в совете:§!\n§H$t$$councilor_mindwarden$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_country_unity_produces_mult$: §G+1%§!\n$ttt$$planet_crime$: §G-1%§!\n$ttt$$MOD_PSIONIC_AURA_RESISTANCE_MULT$: §G+5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$\n\n$COUNCIL_POSITION_REQUIREMENTS$$councilor_mindwarden_conditional_tooltip$"
 mindwarden_commander_already_bought: "§RМы уже оплатили услуги комиссара из числа Защитников разума.§!"
 mindwarden_commander_conflicted_leader: "§RНе должно быть лидера из государства [event_target:shroudwalker_enclave_country.GetName].§!"
 mindwarden_commander_cooldown_tt: "§RМы не сможем запросить нового лидера у Защитников разума до §Y[root.mindwarden_commander_timer]§!.§!"
 mindwarden_commander_desc: "Этот лидер, нанятый в анклаве Защитников разума, воспитывает в населении умение не поддаваться деятельности псиоников и защищает его от тлетворного влияния Покрова."
 mindwarden_commander_catch_phrase: "Всякую рану, через которую наружу сочится Покров, следует прижигать."
 shroud.4281.desc: "Вы поступили разумно. Пусть ваше население процветает под мудрым руководством."
 shroud.4286.name: "[FROM.GetName] подвергается нападению"
 mindwarden_farewell: "§L«Вы подло и бесчестно напали на $gov_mindwarden_enclave$. Отныне мы отказываемся работать на вашей территории: этому нет никаких нравственных оправданий. Настойчиво рекомендуем прекратить эту бессмысленную вражду. Впрочем, как бы вы ни собирались поступить, мы не станем вам ни в чем потворствовать».§!"
 shroud.4286.desc: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.end$"
 shroud.4286.desc.councilor: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.councilor_end$"
 shroud.4290.desc: "Исключительно серьезный вопрос. В галактике нет угрозы страшнее, чем $end_of_the_cycle_color_article$."
 shroud.4290.a: "$marauder.31.e$"
 shroud.4290.b: "Что такое $end_of_the_cycle_color_article$?!"
 shroud.4290.b.response: "Согласно нашим данным, $end_of_the_cycle_color_article$ — это катастрофическая сила из глубин §HПокрова§!. Его мощь проявляется в физической реальности через пособничество жаждущих власти псиоников.\n\nКонец обрушивает на галактику §RРасплату§! — жестокое существо из псионической энергии. В конечном счете он стремится полностью уничтожить всё сущее."
 shroud.4290.c: "Как нам победить §RРасплату§!?"
 shroud.4290.d: "Научите нас §Yтактикам Защитников разума§!."
 shroud.4291.desc: "Да пребудет с вами победа над этой великой угрозой. Она опасна для всех, кто считает эту галактику домом."
 shroud.4292.desc: "Мы разработали алгоритм, который может усилить атаки против §RРасплаты§!. Он настраивает системы наведения оружия для большей эффективности против подобных псионических сущностей.\n\nОднако на данный момент каждое развертывание кода требует кропотливой адаптации под конкретную военную инфраструктуру. Ввиду этого мы взимаем дополнительную плату за эту услугу, однако мы уверены, что она стоит затрат."
 mindwarden_tactics_modifier: "Тактика Защитников разума"
 shroud.4295.desc: "$shroud.4205.common$\n\nПервые донесения о том, что вы строите машины материальности, вызвали у нас некоторые опасения. Но, изучив вопрос подробнее, мы пришли к выводу, что эти устройства весьма перспективны: с их помощью можно эксплуатировать §HПокров§!, не прибегая к псионическим силам.\n\nРекомендуем продолжать производство и надеемся, что в будущем сможем объединить с вами усилия."
 mindwarden_opinion_materiality_engine_tt: "Мнение: £opinion£ §G+$@mindwarden_opinion_materiality_engine|0$§!"
 shroud.4300.desc: "Я говорю с вами от имени [mindwarden_enclave_country.GetName&gen].\n\nНаши пси-датчики показывают, что [Root.GetName] полностью и непоправимо [Root.GetName::находится|||fem:находится|||neut:находится|||pl:находятся] под заразительным влиянием §HПокрова§!.\n\nСвоими поступками вы лишь приблизили собственную гибель… а мы ускорим ее наступление."
 shroud.4300.a: "Почему вы боитесь Покрова?"
 shroud.4310.desc: "Мы не боимся ни Покрова, ни его порочных посланцев — мы знаем, как им противостоять.\n\nВам этого не понять: ваше общество обезумело под влиянием Покрова."
 shroud.4320.desc.psionic: "Разве мало было того, что вы отравляете всю галактику псионикой?"
 shroud.4320.desc.default: "Мы — та сила, что вершит в галактике порядок. Нападая на нас, вы не добьетесь ничего — кроме решительного ответа на вашу агрессию."
 shroud.4320.desc.common: "Мы не станем с вами ничего обсуждать, пока вы безоговорочно не прекратите все свои нападения."
 shroud.4340.desc: "Нам известно, что с вами ведет дела другой анклав — §H[shroudwalker_enclave_country.GetName]§!. Вы не только узакониваете их преступления — вы помогаете распространять вирус §HПокрова§!.\n\nНаши услуги доступны лишь тем, кто не сотрудничает с врагом."
 shroud.4350.desc: "§HВсе попытки вновь установить связь с [mindwarden_enclave_country.GetName&inst] после уничтожения их комплекса окончились неудачей.\n\nВ ответ мы слышим лишь тишину космического пространства.§!"
 enclave_opinion_tt: "Мнение: £opinion£ §G+$@positive_opinion|0$§!"
 mindwarden_rival_opinion_tt: "Мнение о [event_target:shroudwalker_enclave_country.GetName&prep]: £opinion£ §R$@negative_opinion|0$§!"
 shroudwalker_rival_opinion_tt: "Мнение о [event_target:mindwarden_enclave_country.GetName&prep]: £opinion£ §R$@negative_opinion|0$§!"
 shroud.4405.title: "$gov_mindwarden_enclave$ уничтожен"
 shroud.4405.desc_common: "Наше наступление на систему [mindwarden_enclave_system.GetName] завершилось победой. §H[mindwarden_enclave_country.GetName]§! больше не [event_target:mindwarden_enclave_country.GetName::существует|||fem:существует|||neut:существует|||pl:существуют]."
 shroud.4405.desc.default: "$shroud.4405.desc_common$ Предмет ненависти врага не представлял для нас никакого интереса, однако псевдонаучному догматизму подобному их священной борьбе с §H«Покровом»§! нет места в нашей галактике."
 shroud.4405.desc.psionic: "$shroud.4405.desc_common$ Больше они не смогут отравлять галактику своим невежественным учением об опасности §HПокрова§!, а от установленных на станции псионических глушителей остались лишь обломки."
 shroud.4405.desc_end: "Наш триумф оказался двойным: помимо победы над противником мы извлекли из обломков станции значительное количество ресурсов."
 shroud.4406.title: "$gov_mindwarden_enclave$ уничтожен"
 shroud.4406.desc_common: "Нам сообщили, что §H[mindwarden_enclave_country.GetName]§! в системе [mindwarden_enclave_system.GetName] [event_target:mindwarden_enclave_country.GetName::уничтожен|||fem:уничтожена|||neut:уничтожено|||pl:уничтожены]. $gov_mindwarden_enclave$ оказался неспособен противостоять натиску §H[mindwarden_destroyer.GetName&gen]§!. От станции не осталось ничего, кроме обломков; о выживших также ничего не известно."
 shroud.4406.desc.psionic: "Теперь галактика может вздохнуть спокойно: ее больше не станут терзать святоши, поднявшие меч на псиоников… До тех пор, пока их место не займет кто-нибудь еще."
 shroud.4406.desc.default: "Пока что галактике придется как-то обходиться без их услуг по борьбе с псионикой."
 shroud.4406.a: "Так им и надо."
 shroud.6855.desc: "Будьте уверены, мы ценим тесное сотрудничество с [root.GetName&inst]. Наши истории и цели теперь неразрывно связаны."
 shroud.6855.desc.1: "Мы бесконечно благодарны за ваш вклад в [mindwarden_enclave_country.GetName&acc]. Пока существует псионическая угроза, наш союз будет нерушим."
 shroud.6855.desc.2: "Можете быть уверены: ваша следующая доля прибыли будет переведена точно в срок."
 shroud.6855.b: "Мы хотели бы помочь вам расширить анклав."
 shroud.6855.b.timeout: "Анклав сейчас нанимает новых офицеров и экипажи. Он не сможет взяться за новые операционные улучшения до §Y[mindwarden_enclave_country.upgraded_station_timer]§!."
 shroud.6855.c: "Мы хотели бы поделиться с вами нашими технологиями."
 shroud.6855.c.timeout: "Анклав всё еще внедряет технологию, которой мы поделились ранее. Мы сможем поделиться с ним новыми технологиями после §Y[mindwarden_enclave_country.updating_databanks_timer]§!."
 shroud.6855.d: "Мы хотели бы нанять §Yфлотилию§! для собственных целей."
 shroud.6855.e: "$enclave.205.b$"
 shroud.6855.f: "Мы хотели бы увеличить наш лимит анклавов Защитников разума."
 shroud.6855.f.timeout: "Мы всё еще внедряем инфраструктурные изменения, связанные с анклавами. Мы не сможем снова увеличить наш лимит анклавов Защитников разума до §Y[mindwarden_enclave_country.mindwarden_enclave_capacity_bought_timer]§!."
 shroud.6860.1.desc: "Дополнительное финансирование позволит нам значительно интенсифицировать операции: увеличить флот и расширить его возможности, нанять исследователей и усовершенствовать технологии защиты разума. В конечном счете вся галактика выиграет от вашей поддержки."
 shroud.6860.2.desc: "Мы должны сохранять бдительность перед изменчивой псионической угрозой. Ваше пожертвование позволит нам масштабировать операции для противодействия ей."
 shroud.6860.3.desc: "Мы многого достигли, но рано почивать на лаврах. С дополнительными ресурсами флот [mindwarden_enclave_country.GetName&gen] сможет действовать в масштабах всей галактики, защищая еще больше разумов от псионической чумы."
 shroud.6860.4.desc: "Ваша поддержка определяла наш путь с самого начала, и наши общие цели остаются неизменными: обеспечить благополучие разума через полное искоренение псионики. С вашей помощью мы всё ближе к достижению этой цели."
 shroud.6860.5.desc: "Если вы сочтете нужным повторно инвестировать в наши операции, мы сможем стать крупнейшей антипсионической силой в галактике — главным бастионом против вторжений в разум для всех космических держав."
 shroud.6860.b: "Тогда мы договорились."
 shroud.6861.desc: "Благодарим вас. Для нас честь сотрудничать с вами ради защиты психической целостности всех разумных существ."
 shroud.6865.desc: "Благородное начинание. Чем больше анклавов Защитников разума будет в галактике, тем защищеннее будут все разумы от вторжений.\n\nМы можем проконсультировать вас по улучшению инфраструктурной эффективности для создания и управления дополнительными анклавами."
 shroud.6865.b.tt: "$mindwarden_enclave_capacity$: §G+1§!"
 shroud.6870.desc: "Мы ценим вашу готовность делиться плодами исследований. Любые знания, которыми вы поделитесь, помогут укрепить защиту галактики от псионических угроз."
 shroud.6875.desc: "Для нас честь помочь. Флотилии [mindwarden_enclave_country.GetName&gen] находятся на передовой антипсионических технологий и тактик; ни один посягнувший на разумы агрессор не выстоит против них. Каждую флотилию возглавляет командир, специально обученный борьбе с псиониками."
 mindwarden_tt_hirefleet: "Взять под контроль §Yфлотилию Защитников разума§! этого анклава на 10 лет."
 shroud.6876.desc: "Мы уверены, что §H[mercenary_fleet.GetName]§! станет эффективным инструментом против тех, кто играет с разрушительной силой псионики."
 mindwarden_tt_managefleet: "Отменить или продлить контракт с §Yфлотилией Защитников разума§!."
 shroud.6880.desc: "Конечно. Надеемся, флотилия §H[mercenary_fleet.GetName]§! была полезным подразделением в вашем флоте. Желаете расторгнуть или продлить контракт?"
 shroud.6880.a: "$marauder.31.e$"
 shroud.6881.desc: "Хорошо. Контракт аннулирован, §H[mercenary_fleet.GetName]§! немедленно вернется к нам. Наши флотилии доступны для найма в любое время."
 #======================
 # Mindwardens origin
 #======================
 origin_mindwardens: "$MINDWARDEN_plural$"
 origin_mindwardens_desc: "$CHALLENGING_ORIGIN$§RВНИМАНИЕ: будет недоступен путь ['concept_psionic_ascension', псионического возвышения].§!\n\nВ прошлом эта цивилизация страдала от происков сверхъестественных сил, способных вторгаться в разум, а потому она бросила все силы и средства на развитие технологий противостояния псионике.\n\nПостроенные ею в древности устройства еще работают, но неизвестно, как они проявят себя в масштабах галактики."
 origin_tooltip_mindwardens_effects: "— $ADDITIONAL_TECHNOLOGIES_STRING$ £engineering£ ['technology:tech_starbase_3']\n— $HOME_SYSTEM$ в начале игры присутствует §H$tech_starbase_3$§!.\n— $HOMEWORLD$ £building£ ['building:building_ancient_ward_1']\n— Доступен §Hповод к войне§! против прошедших через псионическое возвышение государств §Y«$casus_belli_cb_psionics_containment$»§!.\n— Не появляются §Yгарантированно пригодные миры§!.\n— В начале игры не создаются §Y$ENCLAVE_MINDWARDEN_PLURAL$§!."
 SPECIES_CLASS_MUST_USE_ORIGIN_MINDWARDENS: "Требуется происхождение §Y«['civic:origin_mindwardens']»§!"
 START_SCREEN_MINDWARDENS: "В летописях, доставшихся нам от предков, говорится о великом псионическом бедствии, поразившем планету [GetHomeWorldName]. Умы ее жителей беспрестанно подвергались нападениям потусторонних сил, а в атмосфере стараниями псиоников из [GetSpeciesAdj&neut,gen] общества повисла смертоносная радиация.\n\nОтветом стало сооружение, которое мы назвали «$building_ancient_ward_1$». Благодаря действию этой неприхотливой вопреки своему почтенному возрасту машины все [GetSpeciesNamePlural] оказались надежно защищены от псионического влияния и вторжений в сознание. Технологии, легшие в основу устройства, позже помогли разработать и другие способы сохранить ум целостным.\n\nСегодня мы готовимся сделать первый шаг за пределы известного. [capital_scope.System.GetName] останется позади; нас же ждет неизведанное. Какие угрозы нашему сознанию таятся в глубине космоса?.."
 mindwarden_system_init_NAME: "$origin_mindwardens$"
 mindwarden_system_init_DESC: "Всегда будет стартовой системой после выбора происхождения «$origin_mindwardens$».\n\n$system_initializer_DESC$"
 mindwarden_sol_system_init_NAME: "$origin_mindwardens$ (Сол)"
 mindwarden_sol_system_init_DESC: "Возможная стартовая система происхождения «$origin_mindwardens$» с Солнцем в качестве базы.\n\n$system_initializer_DESC$"
 building_ancient_ward_1: "Древний отвод"
 building_ancient_ward_1_desc: "Это доставшееся нам от предков сооружение с помощью целой системы псионических глушителей защищает планету от сил, способных вторгнуться в сознание."
 building_ancient_ward_2: "Большой отвод"
 building_ancient_ward_2_desc: "Это доставшееся нам от предков сооружение оснащено усовершенствованными псионическими глушителями и способно защищать нас от псионических аур в масштабе целой системы."
 psionic_auras_immunity: "Постепенно рассеивает §Yпсионические ауры§! в системе"
 mindwarden_aura_immunity: ""
 war_goal_wg_end_threat_psionics: "$war_goal_wg_end_threat$"
 war_goal_wg_end_threat_psionics_desc: "Война ведется для защиты галактики от заразы псионики."
 casus_belli_cb_psionics_containment: "Сдерживание псионики"
