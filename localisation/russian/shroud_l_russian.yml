 shroud.1510.title: "Столкновение псионических аур"
 shroud.1510.desc: "Наша §Hпсионическая аура§! в системе [from.GetName] вступила в противостояние с враждебной аурой, исходящей из соседней системы [fromfrom.GetName]. Наши [GetResearchers] уже моделировали подобные явления, но сейчас мы впервые наблюдаем это воочию.\n\nСогласно теории, более мощная аура — та, что излучается с большей интенсивностью, — постепенно подавит противоположную силу. Если это противоборство приведет к полному затуханию, победившая аура может распространиться на опустевшую систему.\n\nЭто настоящая битва разумов."
 shroud.1510.a: "Наша воля восторжествует."
 shroud.1550.title: "Сила воли"
 shroud.1550.desc.common_1: "Из-за нашего вмешательства энергии §HПокрова§! начали воздействовать на наблюдаемое пространство. Их влияние велико, но его проявления нерегулярны и единичны."
 shroud.1550.desc.common_2: "Наши действия создают рябь в Покрове, привлекая внимание могущественных сущностей. Если мы заручимся их благосклонностью, то сможем направить их псионическую энергию в физическую реальность. Наши [GetTelepathPlural&nom] предполагают, что возникшая «аура» усилит наше государство"
 shroud.1550.desc_1.knows: "$shroud.1550.desc.common_1$ Однако §H«Псионические ауры»§! — способ превратить это влияние в постоянный поток."
 shroud.1550.desc_1.default: "$shroud.1550.desc.common_1$ Однако теория §H«Псионических аур»§! предлагает способ превратить это влияние в постоянный поток."
 shroud.1550.desc.knows: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$ и союзников, при этом ослабляя каждого, кто нам противостоит; именно такое воздействие мы наблюдали ранее."
 shroud.1550.desc.knows.homicidal: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$, при этом ослабляя каждого, кто нам противостоит; именно такое воздействие мы наблюдали ранее."
 shroud.1550.desc.default: "$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$ и союзников, при этом ослабляя каждого, кто нам противостоит."
 shroud.1550.desc.default.homicidal: "$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$, при этом ослабляя каждого, кто нам противостоит."
 shroud.1550.a: "Многообещающе."
