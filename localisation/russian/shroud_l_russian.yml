 civic_tankbound: "Жизнь в резервуарах"
 civic_tankbound_desc: "Члены этого общества проводят всю свою жизнь в резервуарах с особой биожидкостью. Из-за этого они полностью зависят от вспомогательных систем и неспособны напрямую заниматься физическим трудом."
 civic_tankbound_effects_base: "Добавляется признак ['trait:trait_tankbound'].\n$job_farmer_plural_with_icon$, $job_miner_plural_with_icon$ и $job_technician_plural_with_icon$ полностью §Yавтоматизированы§!.\nДолжности ['concept_colonist', колонистов] считаются £pop_cat_specialist£ специалистами.\nВ £district£ §Yгородских§! районах доступны дополнительные должности §Y£job_production_overseer£ надзирателей за производством§!."
