 # Eater of Worlds accords
 ACCORD_FRENZY: "Неистовство"
 ACCORD_FRENZY_desc: "$the_eater_of_worlds_article_cap$ наполняет наши войска пылающей яростью."
 ACCORD_HUNGER: "Голод"
 ACCORD_HUNGER_desc: "$the_eater_of_worlds_article_cap$ жаждет сражений."
 ACCORD_DOOM: "Обреченность"
 ACCORD_DOOM_desc: "Мы обрушим разрушительную волю Пожирателя миров на наших врагов."
 ACCORD_DOOM_TT: "Призвать флотилию §YОбреченности Пожирателя§!.\n\nСила этой флотилии зависит от §Yинтенсивности Обреченности§!.\nТекущая интенсивность Обреченности: §Y[GetEaterOfWorldsDoomIntensity]/50§!\n\nДоступные классы кораблей: [GetEaterOfWorldsShipClasses]\n\n§RВсе прочие флотилии §YОбреченности Пожирателя§! будут распущены.§!"
 ACCORD_DIGEST: "Переваривание"
 ACCORD_DIGEST_desc: "Безграничный аппетит Пожирателя миров надо утолить."
 ACCORD_DIGEST_TT: "§Y$DEVASTATION$§! в мирах противников в войне внутри нашей §Hпсионической ауры§!: §G+$@accord_digest_devastation|0$§!\n§Y$HULL$§! и §Yброня§! кораблей противников в войне внутри нашей §Hпсионической ауры§!: §G$@accord_digest_ship_malus|0%$§!\n$ACCORD_LOOSE_INTENSITY$"
 # Cradle of Souls accords
 ACCORD_CHARITY: "Доверие"
 ACCORD_CHARITY_desc: "Всепоглощающая добродетель Колыбели душ притягивает других в круг нашего доверия."
 ACCORD_TRUST: "Видение"
 ACCORD_TRUST_desc: "$the_cradle_of_souls_article_cap$ говорит множеством уст — и теперь мы стали ее голосом."
 ACCORD_THOUGHTBOND: "Мыслесвязь"
 ACCORD_THOUGHTBOND_desc: "$the_cradle_of_souls_article_cap$ дарует неслыханное единство мыслей."
 ACCORD_THOUGHTBOND_TT: "$mod_pop_factions_produces_mult$: §G+$@accord_thoughtbond_faction_output|0%$§! в течение §H$@accord_duration|0$§! лет"
 ACCORD_THOUGHTBOND_TT_gestalt: "$mod_planet_jobs_unity_produces_mult$: §G+$@accord_thoughtbond_unity_from_jobs|0%$§! в течение §H$@accord_duration|0$§! лет"
 ACCORD_FAVOR: "Одолжение"
 ACCORD_FAVOR_desc: "$the_cradle_of_souls_article_cap$ наделяет дипломатию весом непререкаемого авторитета."
 ACCORD_FAVOR_TT: "Потратить все одолжения от других государств внутри нашей §Hпсионической ауры§! и получить единство и влияние за каждое.\n$ACCORD_LOOSE_INTENSITY$"
 # Composer of Strands accords
 ACCORD_LIFE: "Рост"
 ACCORD_LIFE_desc: "$the_composer_of_strands_article_cap$ приносит плоды, а мы — разбрасываем зерна."
 ACCORD_FERTILITY: "Жизненная сила"
 ACCORD_FERTILITY_desc: "$the_composer_of_strands_article_cap$ благословляет нас плодородным влиянием."
 ACCORD_TRANSFORMATION: "Трансформация"
 ACCORD_TRANSFORMATION_desc: "$the_composer_of_strands_article_cap$ строит миры сообразно своей воле."
