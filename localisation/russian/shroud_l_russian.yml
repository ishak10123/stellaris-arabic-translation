 auth_shroud_machine_corporeal: "Псионическая сеть"
 auth_shroud_machine_corporeal_desc: "Пронизывая свои сети скрытыми течениями Покрова, эти машины достигают почти мгновенной передачи данных. Каждый байт, заряженный мощной псионической волей, позволяет сети активно влиять на физическое пространство вокруг."
