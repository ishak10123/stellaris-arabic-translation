 PROXY_WAR_VIEW_ATTACKERS_DESC: "§GДобавляйте или удаляйте предлагаемых атакующих, щелкая по ним в списках слева.§!"
 START_PROXY_WAR_COST: "$ACTION_START_PROXY_WAR_TITLE$ $CLAIMS_COST$"
 CASUS_BELLI_COST_TT: "Стоимость выбора этого §Hповода к войне§!:"
 casus_belli_cb_proxy_war: "Прокси-война"
 war_goal_wg_proxy_war: "Прокси-война"
 war_goal_wg_proxy_war_desc: "Война ведётся из-за враждебных слухов и тайных перешёптываний. В случае победы атакующий установит контроль над всеми захваченными системами, получив за это на §Y33%§! меньше §Yугрозы§!."
 shroud.5055.title: "$proxy_war_busted_modifier$"
 shroud.5055.desc.common: "Нас одурачили.\n\nНаши оперативники перехватили тайное сообщение от §H[from.GetName&gen]§!. Таким образом был раскрыт их заговор с целью втянуть нас в прокси-войну.\n\nОни яростно отрицают свою причастность, но ущерб нашим отношениям уже нанесен."
 shroud.5055.desc.galactic: "$shroud.5055.desc.common$ Вести об их вероломстве быстро распространились, пагубно повлияв на репутацию [from.GetName&gen] по всей галактике."
 shroud.5060.title: "$proxy_war_busted_modifier$"
 shroud.5060.desc.common: "Хотя нам и удалось разжечь конфликт, операция пошла не совсем по плану. Сообщение одного из наших агентов было перехвачено, что раскрыло наши действия для всех вовлеченных сторон.\n\nВсе попытки замять это дело провалились."
 shroud.5060.desc.galactic: "$shroud.5060.desc.common$ Это событие не только навредило нашим отношениям с воюющими сторонами, но и запятнало нашу репутацию по всей галактике."
 shroud.5060.desc.default: "$shroud.5060.desc.common$ Это событие сильно навредило нашим отношениям с воюющими сторонами."
 shroud.5060.a.tt: "Мнение государств, участвующих в §Yпрокси-войне§!, о нас: §R−200§!"
 proxy_war_busted_modifier: "Выявлена подстрекательская деятельность"
 proxy_war_busted_modifier_desc: "Махинации, приведшие к прокси-войне, были раскрыты вовлеченными в конфликт сторонами. Это нанесло значительный ущерб нашей репутации."
 opinion_proxy_war_busted: "$proxy_war_busted_modifier$"
 PROXY_WAR_BUSTED_MESSAGE_TYPE_TITLE: "$proxy_war_busted_modifier$"
 PROXY_WAR_BUSTED_MESSAGE_TYPE_DESC: "Воюющие стороны обнаружили, что это мы развязали прокси-войну.\n$shroud.5060.a.tt$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_TITLE: "$proxy_war_busted_modifier$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_DESC: "Мы обнаружили, что государство §H$INSTIGATOR$§! втянуло нас в прокси-войну.\nНаше мнение о государстве §H$INSTIGATOR$§!: §R−200§!"
