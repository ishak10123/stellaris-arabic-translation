 gov_shroud_corporeal_corporate_desc: "$auth_shroud_corporate_corporeal_desc$"
 auth_shroud_hive_corporeal: "Псионическое средоточие"
 auth_shroud_hive_corporeal_desc: "Сила сонастроенности с Покровом резонирует через физические оболочки этого коллективного разума."
 corporeal_hive_mind_tt: "$corporeal_trait_tt$\n$@corporeal_hive_mind_job_upkeep_per_attunement|2=-%$ $mod_planet_jobs_upkeep_mult$ за каждое очко сонастроенности\n$MOD_PLANET_STABILITY_MULT$: §G+10%§!\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+30%§!\n$MOD_COUNCIL_AGENDA_FINISHING_EFFECT_DURATION_MULT$: §G+30%§!"
