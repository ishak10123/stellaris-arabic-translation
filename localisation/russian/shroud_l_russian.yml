 shroud.delve_event.boon.6: "Покров наградил нас подарком."
 shroud.delve_event.boon.7: "Покров усилил нас."
 shroud.delve_event.boon.8: "Покров пожаловал нам подарок."
 shroud.delve_event.boon.9: "Покров вознаградил наши усилия."
 shroud.delve_event.boon.10: "Мы пользуемся расположением Покрова."
 shroud.delve_event.boon.11: "Покров счел нужным дать нам силу."
 shroud.delve_event.boon.12: "Мы благословлены милостью Покрова."
 shroud.delve_event.boon.13: "Покров благословляет наши старания."
 shroud.delve_event.boon.14: "На нас снизошла милость Покрова."
 shroud.delve_event.boon.15: "Покров награждает нас новой силой."
 shroud.delve_event.curse.1: "Покров проклял нас."
 shroud.delve_event.curse.2: "На нас пало проклятье Покрова."
 shroud.delve_event.curse.3: "Наше предприятие навлекло на нас проклятье."
 shroud.delve_event.curse.4: "Наши старания были вознаграждены проклятьем."
 shroud.delve_event.curse.5: "Покров наслал на нас несчастье."
 shroud.delve_event.curse.6: "Мы прокляты."
 shroud.delve_event.curse.7: "Покров наслал проклятье на наше государство."
 shroud.delve_event.curse.8: "Покров отверг и проклял нас."
 shroud.delve_event.curse.9: "Гнев Покрова навлек на нас проклятье."
 shroud.delve_event.curse.10: "Покров обрек нас на несчастье."
 shroud.delve_event.curse.11: "Покров уготовил нам падение."
 shroud.delve_event.curse.12: "Покров наложил на нас проклятье."
 shroud.delve_event.curse.13: "Покров проклял наши труды."
 shroud.delve_event.curse.14: "Покров оставил нас погибать."
 shroud.delve_event.curse.15: "Покров счел нас недостойными."
 shroud.3000.title: "Мимолетные видения"
 shroud.3000.desc: "В глубине чернильных вихрей на мгновение проявляются далекие тени и тут же снова растворяются в хаосе... Невнятная какофония голосов... Мерцают и гаснут огни. Вспыхивают и угасают очаги жара.\n\nДвижение. Что-то крутится. Это мы движемся или сам Покров?\n\nМы чувствуем присутствие некой сущности, она приближается как будто сразу со всех сторон. А затем — голос.\n\n§HЧТО ВЫ ВИДИТЕ?§!"
 shroud.3000.a: "Мы видим мир, который горит."
 shroud.3000.a.reply: "Масса меняет положение, голос появляется снова...\n\n§HХОРОШО.§!\n\nТьма наклоняется, затем разворачивается. На мгновение что-то с силой вжимается в нас, а затем мы снова оказываемся одни."
 shroud.3000.b: "Мы видим торжество."
 shroud.3000.b.reply: "Что-то массивное содрогается. Тьма медленно наваливается на нас, все сильнее и сильнее...\n\n§HНЕТ!§!\n\nПустота наклоняется, затем разворачивается. Неожиданно мы снова оказываемся одни..."
 shroud.3000.c: "Мы не знаем."
 shroud.3000.c.reply: "§HСЛАБОСТЬ!§!\n\nПустота наклоняется, затем разворачивается. Неожиданно мы снова оказываемся одни..."
 shroud.3005.title: "Алчный голод"
 shroud.3005.desc: "Наши чувства окутывает душный нутряной смрад.\n\nИз глубин Покрова перед нами встают виды корчей, гнева и хищных оскалов. Мы слышим отголоски воплей голодных тварей... Мы чувствуем их голод. И вот уже мы сами скалим истекающие слюной пасти.\n\nПеред нами проступают очертания. Испуганный скот. Добыча. Дразняще близко... Желание впиваться и рвать уже невыносимо.\n\nНаши чувства извращаются, обостряются, голод пожирает все наши мысли. Это вопли наших жертв? Или это голос изнутри нас самих?\n\nНаши оковы становятся туже. Они трескаются, и сквозь мучительную пелену мы слышим остервенелый вопль:\n\n§HРВИ ПУТЫ! ЖРИ!§!"
 shroud.3005.a: "Порвать цепи. Пожрать добычу."
 shroud.3005.a.boons.tt: "Получить случайный дар Покрова, связанный со сражениями."
 shroud.3005.a.reply: "Наши путы летят прочь.\n\nАлчные. Свободные.\n\nУжас!\n\n§HЖРАТЬ.§!"
 shroud.3005.b: "Не поддаваться голоду. Успокоить разум."
 shroud.3005.b.reply: "Цепи крепки. Голос ревет от ярости, но мы фильтруем его влияние, успокаиваем разум и снова обретаем контроль над собой.\n\n§HБЕСПОМОЩНАЯ РАЗМАЗНЯ!§!\n\nГолод утихает, оставляя лишь следы разочарования, которые рассеиваются в Покрове."
 shroud.3010.title: "Жертвенный пир"
 shroud.3010.desc: "Из бездны доносится голос... низкий, хриплый, пропитанный ненавистью.\n\n§HПОЖИРАТЬ. ПОГЛОЩАТЬ. УНИЧТОЖАТЬ.§!\n\nПеред глазами вспыхивают видения: миры, обращённые в пепел и тишину, вопли наших [Root.GetCitizenPlural&gen], чьи тела растворяются в псионической энергии, утоляя голод... наш и этих... голосов.\n\nНо среди кошмаров чувствуется иное присутствие. Оно призывает нас к сдержанности, к единству с нашими [Root.GetCitizenPlural&inst], к росту через сплочённость. Но его едва слышно за рёвом первого голоса."
 shroud.3010.desc.organic: "§HОТДАВАЙТЕ ИХ ПЛОТЬ МНЕ!§!"
 shroud.3010.desc.other: "§HОТДАВАЙТЕ ИХ ТЕЛА МНЕ!§!"
 shroud.3010.a: "Жрать."
 shroud.3010.a.reply: "Стенания пожираемых отдаются по всему Покрову и по всему нашему государству, а затем обрываются тишиной.\n\nЖертва отдана, голод утолен, и наша сила растет."
 shroud.3010.b: "Объединяться."
 shroud.3010.b.reply: "Мы подавляем навязчивый голос, в едином порыве тянемся через Покров и заключаем все наше государство в объятия. Всеобщий вздох облегчения и успокоения окончательно заглушает крики гнева и ярости, и голод отступает."
 shroud.3015.title: "Зыбкие видения"
 shroud.3015.desc: "Здесь в темноте сшибаются могучие потоки псионической энергии. Вокруг нас мечутся и пляшут тени... Впереди мерцает далекий огонек.\n\nВнезапно на долю мгновения нам открывается едва различимая картина, но ее очертания снова растворяются, прежде чем мы успеваем охватить их взглядом.\n\nВокруг нас сгущается странная сущность.\n\n§HЧТО ВЫ ВИДЕЛИ?§!"
 shroud.3015.a: "Мы видели лес, полный жизни."
 shroud.3015.a.reply: "Нас захлестывает тишина. Сущность снова подает голос...\n\n§HОТЛИЧНО.§!\n\nНас охватывает могучая волна жара, а затем спадает. Мы снова одни."
 shroud.3015.b: "Мы видели пустые земли без следов жизни."
 shroud.3015.b.reply: "Сущность снова подает голос...\n\n§HНИ ЗА ЧТО!§!\n\nНас сковывает нестерпимый холод, но затем вдруг отпускает. Мы снова одни."
 shroud.3015.c: "Мы не знаем."
 shroud.3015.c.reply: "Сущность снова подает голос...\n\n§HКАК НЕИНТЕРЕСНО.§!\n\nНас охватывает невыносимая пустота, но затем вдруг отпускает. Мы снова одни."
 shroud.3020.title: "Заманчивая беседа"
 shroud.3020.desc: "Среди бесчисленных слоев Покрова перед нами открывается видение.\n\nВ клочьях тумана проступает силуэт борющегося существа, спутанного, душимого давящими его щупальцами.\n\nЭто невиданное животное, ничего подобного ему мы раньше не встречали.\n\nИз глубин нашего сознания до нас доносится вкрадчивый голос.\n\n§HНИТИ СУДЬБЫ МАНЯТ! КОТОРУЮ ПОТЯНЕТЕ ВЫ?§!"
 shroud.3020.a: "Освободить животное."
 shroud.3020.a.reply: "Голос эхом отдаётся в наших [GetMindLoc&prep], когда существо исчезает из виду.\n\n§HПРОЦВЕТАНИЕ.§!\n\nМелькает ещё один мимолётный образ — возрождение жизни где-то в нашем государстве."
 shroud.3020.b: "Поймать его."
 shroud.3020.b.reply: "Голос отшатывается от наших мыслей, и лишь призрачный возглас эхом проносится над безжизненным пейзажем.\n\n§HПАГУБА.§!"
 shroud.3020.c: "Убить его."
 shroud.3020.c.swarm: "Пожрать его."
 shroud.3020.c.reply: "Голос вытесняется из наших мыслей, уступая место всепоглощающему позыву. Жажда крови наполняет наши [GetMindLoc&acc], а жестокий смех разносится сквозь пустоту.\n\n§HКОНЕЧНО! ЛЁГКАЯ ДОБЫЧА!§!"
 shroud.3025.title: "Текучие пейзажи"
 shroud.3025.desc: "Туман Покрова рассеивается, открывая бесконечный поток видений.\n\nНепостижимые пейзажи мелькают перед нами. Горы вздымаются и разрушаются. Кипящие океаны хаоса испаряются, оставляя после себя выбеленные кости морских существ на бескрайних пустынях.\n\nПод сенью лесов безобидные существа резвятся среди деревьев, прежде чем содрогнуться и превратиться в кровожадных чудовищ. Разрывая друг друга на части, они утопают в бесконечном цикле смерти и возрождения.\n\nСквозь хаос в наших [GetMindLoc&prep] раздаётся голос.\n\n§HТАКОЙ БЕСПОРЯДОК. ЗАПУТАННЫЙ В САМОМ СЕБЕ.§!"
 shroud.3025.a: "Подчинить природу нашей воле."
 shroud.3025.a.reply: "Мы тянемся вперед и хватаемся за раскинувшийся перед нами беспорядок.\n\nОстанавливаем земные формации, замедляем движение континентов.\n\nКогда беспорядочное движение утихает, до нас эхом доносится голос.\n\n§HБАНАЛЬНОСТЬ, СКУКА, ПУСТОТА...§!"
 shroud.3025.b: "Да здравствует царство природного хаоса."
 shroud.3025.b.reply: "Мы продолжаем наблюдать сменяющие друг друга видения. Их бесконечный цикл сливается в единый поток, а затем взрывается и исчезает столь же быстро, как и возник.\n\nВ бесконечном просторе появляются всполохи энергии и вновь обретают новые формы.\n\nДо нас эхом доносится голос.\n\n§HМИРНЫЙ КОНФЛИКТ. БЕСПОРЯДОЧНОЕ ЕДИНСТВО.§!"
 shroud.3025.b.reply.tt: "Эта планета получает случайный §Gположительный модификатор§! и §Rотрицательный модификатор§!."
 shroud.3030.title: "Призма во тьме"
 shroud.3030.desc: "Беспокойно бурлящий Покров расступается, и перед нами раскидывается огромное пространство черного песка. Слышен шум прибоя, но воды не видно.\n\nВпереди — или сзади? — появляется призма. В нее попадает единственный луч света, на мгновение преломляясь и формируя мутное изображение.\n\nМы успеваем заметить бесчисленные сумрачные силуэты и меняющиеся формы, которые тут же снова скрываются в темноте.\n\nНа песке неподалеку материализуется сущность.\n\n§HЧТО БЫЛО ПОКАЗАНО, БЫЛО УВИДЕНО, ТАК?§!"
 shroud.3030.a: "Мы увидели собрание многих голосов."
 shroud.3030.a.reply: "Пески слегка меняют форму. Снова слышен голос.\n\n§HХОРОШО. ПУТЬ ВСЕЛЕННОЙ — ГАРМОНИЯ.§!\n\nМы чувствуем, словно некая тяжесть поднялась и исчезла. Мы снова одни."
 shroud.3030.b: "Мы видели залитое кровью поле битвы."
 shroud.3030.b.reply: "Песок вдруг взлетает в воздух яростным вихрем.\n\n§HНЕТ. ОСТАВЬТЕ ОРУЖИЕ РЖАВЧИНЕ И ЗАБВЕНИЮ!§!\n\nПесчаная буря утихает. Голос исчез."
 shroud.3030.c: "Мы не знаем."
 shroud.3030.c.reply: "Пески медленно осыпаются.\n\n§HНЕУВЕРЕННОСТЬ ВЕДЕТ К НЕСЧАСТЬЮ...§!\n\nМы снова одни."
 shroud.3035.title: "Битва теней"
 shroud.3035.desc: "Хаотичные энергии Покрова бурлят и вздымаются.\n\nТеневые щупальца бьются и сплетаются, туман яростно закручивается сам в себе. В этой буре псионической ярости столкнулись две бесформенные сущности. Они безжалостны, неумолимы и переполнены гневом.\n\nЧуждое присутствие вторгается в наши [GetMindPhysicalLoc&acc] — всепроникающее и безграничное.\n\n§HВОШЕДШИЕ ДОЛЖНЫ РЕШИТЬ ИСХОД.§!"
 shroud.3035.a: "Взаимопонимание строится на диалоге."
 shroud.3035.a.reply: "Туман угасает, растворяется среди завихрений псионической энергии. Сознание возвращается.\n\n§HГАРМОНИЯ ЭТО МУДРОСТЬ.§!\n\nПокров теперь спокойнее."
 shroud.3035.b: "Компромисс это слабость."
 shroud.3035.b.reply: "С каждым ударом тумана энергии вокруг нас кипят все неистовее.\n\n§HНАСИЛИЕ ЭТО НАГРАДА ЗА БЕЗДУМНОЕ БЫТИЕ.§!\n\nБурлящий энергией Покров снова содрогается."
 shroud.3040.title: "Незримые виды"
 shroud.3040.desc: "Перед нами растекается лужа чёрной жидкости.\n\nВнезапно на её поверхности мелькает размытое изображение. Мы успеваем заметить сверкающую вершину, каждый выступ которой усыпан мерцающим золотом, прежде чем она так же внезапно исчезает.\n\nВ глубинах наших [GetMindLoc&gen] звучит голос.\n\n§HВЫ УВИДЕЛИ НЕЗРИМОЕ?§!"
 shroud.3040.a: "Мы увидели рудник, ждущий своих рудокопов."
 shroud.3040.a.reply: "По поверхности проходит рябь. Мы снова слышим голос.\n\n§HБЕЗГРАНИЧНЫЙ РОСТ ПОДДЕРЖИВАЕТ БЕЗМЕРНОЕ РАВНОВЕСИЕ.§!\n\nЖидкость успокаивается, и мы чувствуем, как голос нас покидает."
 shroud.3040.b: "Мы видели чудо природы, которое нужно сохранить."
 shroud.3040.b.reply: "Жидкость начинает бурлить. На поверхности схлестываются волны. Во тьме образовывается водоворот. Голос говорит со все большим напором.\n\n§HНЕДОПУСТИМО! РОСТ И ПРИБЫЛЬ! РОСТ И ПРИБЫЛЬ!§!\n\nПоверхность успокаивается. Голос нас покинул."
 shroud.3040.c: "Мы не знаем."
 shroud.3040.c.reply: "Жидкость подергивается рябью. Мы снова слышим голос.\n\n§HСЛАБЫЕ УБЕЖДЕНИЯ... ВАША ВОЛЯ СЛАБА.§!\n\nПоверхность разглаживается, и мы чувствуем, как голос нас покидает."
 shroud.3045.title: "Светящееся ядро"
 shroud.3045.desc: "Туман перед нами перестраивается. Раскалённые потоки энергии пульсируют с новой силой. Мы видим очертания странной древовидной формы.\n\nЕё огромная крона мерцает, переливаясь оттенками пурпурного, розового и чёрного.\n\nВ её основании скрыто светящееся ядро, пульсирующее в такт смене цветов кроны.\n\nГолос укореняется в наших [GetMindLoc&prep].\n\n§HПОДХОДИ. ЗАБИРАЙ. ИСПОЛЬЗУЙ.§!"
 shroud.3045.a: "Забрать ядро."
 shroud.3045.a.reply: "Когда мы забираем ядро, крона тотчас тускнеет и увядает. Нам снова является голос.\n\n§HДА! ДОХОДЫ ПРИНОСЯТ НОВЫЕ ДОХОДЫ.§!"
 shroud.3045.b: "Не трогать."
 shroud.3045.b.reply: "Нас пробирает дрожь. Это мир трясется или мы сами?\n\n§HДОСТАТОК ЭТО ЦЕЛЬ. ОТВОРАЧИВАТЬСЯ ОТ НЕГО — КОЩУНСТВО!§!"
 shroud.3050.title: "Разрозненная какофония"
 shroud.3050.desc.intro: "Среди непрекращающихся вихрей Покрова кипят и сталкиваются мощные потоки псионической энергии. Грохочущая какофония растет и требует нашего внимания."
 shroud.3050.desc.outro: "Этот шум невыносим."
 shroud.3050.desc.eater: "Крики боли, громогласный оркестр битвы, рокот пламени. Мы чувствуем боль... Но чья она?"
 shroud.3050.desc.composer: "Крики и стенания, животные, дикие, первобытные... Хлещут воду реки, воют ветры... Вся природа рычит и воет, одновременно и призывно..."
 shroud.3050.desc.cradle: "Голоса рокочут, шепчут, восклицают и требуют... Мириады интонаций, слогов, звуков... Тысячи речей на сотне языков — все одновременно."
 shroud.3050.desc.instrument: "Вой буров, грохот машин... Громогласный звук насильственного преобразования материи. Все заводы вселенной чадят и пышут жаром одновременно."
 shroud.3050.a: "Остаться."
 shroud.3050.a.reply: "Какофония все нарастает, достигает крещендо. Вдруг нас бросает в неясном направлении...\n\nНаконец звуки утихают, и мы остаемся в тишине."
 shroud.3050.b: "Отвернуться."
 shroud.3050.b.reply: "Это невыносимо. Наши [GetMindLoc&nom] отступают, возвращаясь к комфортной тишине."
 shroud.3055.title: "Пророческие видения"
 shroud.3055.desc.intro: "Нас окутывает плотная мгла. Отовсюду нас давит, сжимает все сильнее. Наконец нам открывается зыбкая, нечеткая картина."
 shroud.3055.desc.outro: "Среди неясных теней наше внимание привлекает один предмет. Его не перепутаешь ни с чем: это флаг корабля [Root.GetName].\n\nНеужели это мы?"
 shroud.3055.desc.eater: "Мы видим мир, разорённый после битвы... Победители обыскивают трупы и руины."
 shroud.3055.desc.composer: "Мы видим много миров... несущихся с невероятной скоростью сквозь пространство и время... Все они похожи друг на друга, объединены под властью одной империи."
 shroud.3055.desc.cradle: "Мы видим великое собрание... Смутные очертания множества фигур... Они слушают, говорят."
 shroud.3055.desc.instrument.default: "Мы видим оптимизированный мир... Бесконечные ряды заводов и шахт... Ни одной пяди земли не оставлено природе."
 shroud.3055.desc.instrument.relentless_industrialist: "Мы видим оптимизированный мир... Бесконечные ряды заводов и шахт... Чистое совершенство. Ни одной пяди земли не оставлено без внимания."
 shroud.3055.a: "Запомнить видение."
 shroud.3055.a.reply: "Изображение становится чуть четче. Мы точно его запоминаем."
 shroud.3055.b.organic: "Изгнать его из нашей памяти."
 shroud.3055.b.machine: "Удалить его из наших схем."
 shroud.3055.b.reply: "Нечеткие видения растворяются и превращаются в ничто."
 shroud.3060.title: "Посреди пустоты"
 shroud.3060.desc.intro: "Эфирные туманы Покрова клубятся и извиваются, увлекая наше сознание всё глубже, в то время как наши физические формы остаются неподвижными, нетронутыми.\n\n[GetPsycheLoc::Наше <1>|||fem:Наша <1>] растягивается, напрягается, [GetPsycheLoc::запертое|||fem:запертая] в повторяющемся цикле. Каждая попытка двинуться рассыпается, напряжение сжимает нас, слово тиски."
 shroud.3060.desc.intro.organic: "Мы видим прежних себя: наши тела заключены в тессеракт, неподвластный нашему физическому пониманию."
 shroud.3060.desc.intro.machine: "Активация логических подпрограмм, обнаружена ошибка: рекурсия. Наши псионические процессоры неспособны разорвать цикл и возобновить работу."
 shroud.3060.desc.intro.end: "Напряжение становится невыносимым, наши оболочки готовы в любой момент раствориться в бездне. Некий голос сотрясает место нашего заточения."
 shroud.3060.desc.outro: "Его слова находят отклик в наших душах. Их сила нарастает, и мы чувствуем, что сможем унять волнение, которое грозит разорвать нас в клочья, если только подчинимся."
 shroud.3060.desc.eater: "§HПОГЛОТИТЕ БЕСКОНЕЧНУЮ ПУСТОТУ!§!"
 shroud.3060.desc.composer: "§HПЕРЕРАСТИТЕ ПРЕДЕЛЫ РЕКУРСИВНОЙ БЕСКОНЕЧНОСТИ!§!"
 shroud.3060.desc.cradle: "§HПРИМИТЕ БЕСКОНЕЧНОСТЬ! ПУСТЬ ВСЕ СОЕДИНЯТСЯ В ОДНО ЦЕЛОЕ!§!"
 shroud.3060.desc.instrument: "§HРАСКРОЙТЕ БЕЗМЕРНЫЙ ПОТЕНЦИАЛ!§!"
 shroud.3060.a: "Подчиниться."
 shroud.3060.a.reply: "Голос нарастает и направляет наши действия, силой высвобождает наше сознание, ведя за пределы нашего ограниченного восприятия. Цикл продолжается — сжимаясь, увлекая нас за собой — и, наконец, разбивается о нашу психику.\n\nМы прорвались сквозь рекурсию, ведомые молитвой к высшим силам Покрова.\n\nНо спаслись не все. §H[event_target:shroud_warped_leader.GetName]§! [event_target:shroud_warped_leader.GetAXX::пропал|||fem:пропала] со своего поста. Снова слышен голос."
 shroud.3060.a.reply.default: "[event_target:shroud_warped_leader.GetAXX::ОН|||fem:ОНА] БУДЕТ [event_target:shroud_warped_leader.GetAXX::ВОССОЗДАН|||fem:ВОССОЗДАНА]"
 shroud.3060.a.reply.eater: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.composer: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.cradle: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.instrument: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.b: "Сопротивляться."
 shroud.3060.b.reply: "Мы не поддаемся навязываемым нам импульсам.\n\nПетля ускоряется, затягивая нас за собой рекурсивным потоком. Когда мы перестаем сопротивляться, напряжение больше не грозит разорвать нас в клочья. Оно поглощает нас, на мгновение открывает нам возможность взглянуть за пределы себя.\n\nГолос возвращается."
 shroud.3060.b.reply.default: "КАК НЕИНТЕРЕСНО."
 shroud.3060.b.reply.eater: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.composer: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.cradle: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.instrument: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.leader_return.title: "Искаженные Покровом"
 shroud.3060.leader_return.desc: "Покров содрогается, легкие искажения пробегают по нашим [GetMindPhysicalLoc&dat], и проявляется знакомое присутствие. Оно шевелится на грани нашего [GetMindPerceptionLoc&gen], нашептывая что-то едва уловимое.\n\n§H[from.GetName]§! возвращается к нам, проступая сквозь непостижимые туманы и принимая знакомую форму. [from.GetAXX::Далекий, но цельный, перерожденный Покровом, он|||fem:Далекая, но цельная, перерожденная Покровом, она] жаждет вернуться к своим обязанностям."
 shroud.3060.leader_return_tt: "§H[from.GetName]§! получает новую черту: §G$leader_trait_shroud_warped$§!"
 leader_trait_shroud_warped: "Искаженный Покровом"
 leader_trait_shroud_warped_desc: "Поглощенный и воссозданный Покровом, этот лидер обрел потустороннее знание, позволяющее ему наблюдать ненаблюдаемое и усиливать псионический потенциал окружающих."
 leader_trait_shroud_warped_invasion_effect: "Разведданные о вражеском государстве за каждую победу во вторжении: §G+$@shroud_warped_intel|0$§!"
 shroud.3065.title: "Запретная чаша"
 shroud.3065.desc.intro: "Туман Покрова содрогается, расступаясь и открывая чашу, наполненную мерцающей жидкостью с идеально гладкой поверхностью.\n\nНас охватывает непреодолимый порыв. Мы тянемся к ней, не раздумывая. Жидкость вздрагивает в ожидании, когда мы начинаем [GetDrinkLoc].\n\nНас озаряет прозрение. Чем больше мы [GetImbibeLoc], тем явственнее проступает обман. Жидкость густеет, и каждая её капля начинает свёртываться внутри.\n\nНас переполняет неудержимое желание очиститься от этой скверны."
 shroud.3065.desc.eater: "§HПЕЙТЕ! УТОПИТЕ СВОЮ СЛАБОСТЬ!§!"
 shroud.3065.desc.composer: "§HНАПИТАЙТЕСЬ! ДАЙТЕ СИЛУ НОВОМУ РОСТУ!§!"
 shroud.3065.desc.cradle: "§HУКРЕПЛЯЙТЕСЬ! ОТКРОЙТЕСЬ БОЛЕЗНЕННОМУ ЕДИНЕНИЮ!§!"
 shroud.3065.desc.instrument: "§HПОГЛОЩАЙТЕ! ОТДАЙТЕСЬ СВОИМ ПРИСТРАСТИЯМ!§!"
 shroud.3065.desc.outro: "Голос бурлит, смешиваясь с жидкостью, густеет, разливаясь внутри нас, подчиняя нас своей воле."
 shroud.3065.a.organic: "Выпить."
 shroud.3065.a.machine: "Принять."
 shroud.3065.a.reply.intro: "Последние капли жидкости стекают вниз, густые и отвратительные. Они скапливаются внутри нас, пропитывая наши [GetMindPhysicalLoc&acc].\n\nЖар пульсирует в нас, искажая мысли, разрывая края [GetPsycheLoc::нашего|||fem:нашей] [GetPsycheLoc&gen].\n\nГолос возвращается, довольный, в то время как чаша растворяется перед нами."
 shroud.3065.a.reply.default: "ЗАВОЕВАТЕЛЬ! ПОБЕДИТЕЛЬ."
 shroud.3065.a.reply.eater: "§H$shroud.3065.a.reply.default$§!"
 shroud.3065.a.reply.composer: "§HСОЗИДАТЕЛЬ! ЖИВОЙ КАТАЛИЗАТОР.§!"
 shroud.3065.a.reply.cradle: "§HИНТЕГРАТОР! ОДНО СОЗНАНИЕ ЗА ДРУГИМ.§!"
 shroud.3065.a.reply.instrument: "§HДЕКАДАНС! ИССЛЕДОВАНИЕ ЧУВСТВ.§!"
 shroud.3065.b: "Отвергнуть."
 shroud.3065.b.reply.intro: "Наши [GetBodiesLoc&acc] сотрясают мучительные спазмы, отвергая заразу — мы извергаем из себя эту приторную субстанцию.\n\nМерзкая жидкость разбрызгивается в пустоте, корчась и растворяясь. Голос шипит, и его слова испаряются вместе со скверной."
 shroud.3065.b.reply.default: "СЛАБОСТЬ!"
 shroud.3065.b.reply.eater: "§H$shroud.3065.b.reply.default$§!"
 shroud.3065.b.reply.composer: "§HЗАСТОЙ!§!"
 shroud.3065.b.reply.cradle: "§HТРУСОСТЬ!§!"
 shroud.3065.b.reply.instrument: "§HТАКОЙ ПОТЕНЦИАЛ...§!"
 shroud.3070.title: "Полотно перемен"
 shroud.3070.desc.intro: "Покров сжимается, складывается внутрь, сжимает наше сознание внутри замкнутой, звенящей пустоты.\n\nМы чувствуем присутствие некой силы, текучей и неясной. Она меняет форму, открывает и вновь закрывает промежуток, отделяющий нас от остального Покрова. Каждый такой цикл сопровождается каскадом новых галлюцинаций."
 shroud.3070.desc.eater: "Горят миры, чад поднимается ввысь под горестные крики поглощаемых жителей. С каждым разом нам открываются виды новой лакомой добычи, которая ждет своего пожирателя."
 shroud.3070.desc.composer: "Безграничные просторы тучных лугов, на которых резвятся мириады живых существ. Нити жизни переплетаются и распространяются все шире. С каждым разом нам открывается новый потенциал для перемен и созидания."
 shroud.3070.desc.cradle: "Сообщества объединяются и помогают друг другу, изгоняя тех, кто позволяет себе инакомыслие. С каждым разом нам открывается новая утопия, где рады только тем, кто в нее верит."
 shroud.3070.desc.instrument: "Перед нами раскидываются обширные рудники, богатые драгоценными ресурсами. С каждым разом нам открываются новые богатства, ждущие своего хозяина."
 shroud.3070.desc.outro: "С каждым новым видением неведомая сила мотает нас и бросает в стороны, с огромной скоростью увлекает нас вперед по изгибающейся ткани реальности.\n\nМы чувствуем радостное возбуждение сущности. Она испытывает нас, ждет, какое имя мы дадим захватившей нас силе."
 shroud.3070.a.eater: "Насыщение."
 shroud.3070.a.composer: "Становление."
 shroud.3070.a.cradle: "Гармония."
 shroud.3070.a.instrument: "Потенциал."
 shroud.3070.a.reply.intro: "В ответ на наш голос сущность застывает. Видения исчезают, бурлящий водоворот утихает и сменяется звенящей ясностью.\n\nМы дали ему имя."
 shroud.3070.a.reply.default: "НАСЫЩЕНИЕ. И ИСТОЧНИК ЕГО — ЗАВОЕВАНИЯ."
 shroud.3070.a.reply.eater: "§H$shroud.3070.a.reply.default$§!"
 shroud.3070.a.reply.composer: "§HСТАНОВЛЕНИЕ. ЖИЗНЬ СПЛЕТАЕТСЯ, ФОРМИРУЯ ЗАКОНОМЕРНОСТИ.§!"
 shroud.3070.a.reply.cradle: "§HГАРМОНИЯ. ДОБРОТА НЕ ПРИЕМЛЕТ РАЗДОРОВ.§!"
 shroud.3070.a.reply.instrument: "§HПОТЕНЦИАЛ. ВЫРВАННЫЙ ИЗ ЛАП ПРАЗДНОГО КОСМОСА.§!"
 shroud.3070.a.reply.outro: "Сущность, довольная нашим решением, открывает барьер: пустота рассеивается, и мы ее покидаем."
 shroud.3070.b.eater: "Отчаяние."
 shroud.3070.b.composer: "Чрезмерность."
 shroud.3070.b.cradle: "Показуха."
 shroud.3070.b.instrument: "Разорение."
 shroud.3070.b.reply.intro: "Наш голос содрогается, когда разгневанная сущность бросает нас сквозь барьер."
 shroud.3070.b.reply.default: "ОТЧАЯНИЕ?! СЛАБОСТЬ, ГОЛОД — В ВАС НЕТ ВЕРЫ!"
 shroud.3070.b.reply.eater: "§H$shroud.3070.b.reply.default$§!"
 shroud.3070.b.reply.composer: "§HЧРЕЗМЕРНОСТЬ? НУ И ПРОЗЯБАЙТЕ В ПОСРЕДСТВЕННОСТИ!§!"
 shroud.3070.b.reply.cradle: "§HПОКАЗУХА? НУ И ЗАГНИВАЙТЕ В ИЗОЛЯЦИИ!§!"
 shroud.3070.b.reply.instrument: "§HРАЗОРЕНИЕ?! БЕССИЛИЕ И НИЩЕТА — ВОТ ЧЕМ ВЫ ОДЕРЖИМЫ!§!"
 shroud.3070.b.reply.outro: "Мы кубарем проносимся сквозь Покров и вылетаем из него с неприятным чувством."
 shroud.3100.title: "Псионический конфликт"
 shroud.3100.desc: "Разноголосая какофония разрушений затягивает нас глубже в Покров. Каждый раскат отдается в нашей психике рокочущим ритмом разрушений.\n\nНаконец шум принимает форму.\n\nМы находимся на периферии псионического конфликта. Мотивация борющихся сущностей неясна, но их сила колоссальна.\n\nТо и дело до нашего восприятия доносятся отголоски психических бомбардировок, искаженные в осколках разрываемой реальности. Укрытия нет, есть лишь надвигающаяся буря."
 shroud.3100.a: "§YСобраться и наблюдать.§!"
 shroud.3101.title: "§GНеутихающий резонанс§!"
 shroud.3101.desc.intro: "Мы рискуем и остаемся на месте, наблюдая надвигающийся конфликт."
 shroud.3101.desc: "$shroud.3101.desc.intro$\n\nЗаострив внимание, мы настраиваемся на психический каскад. Бомбардировка не утихает, но мы остаемся невредимы и движемся в такт с ритмом разрушений.\n\nС каждым шагом наше понимание растет. Псионический обстрел просачивается сквозь щели в невидимых измерениях.\n\nМы отступаем, но ритм остается с нами. Теперь мы можем адаптировать принципы, что мы наблюдали, и использовать их как оружие."
 shroud.3102.title: "§RШквал из бездны§!"
 shroud.3102.desc: "$shroud.3101.desc.intro$ Мы пытаемся синхронизироваться с психической бурей, подстроиться к ее непредсказуемым ритмам.\n\nПоначалу нам это как будто удается, но вскоре мы оказываемся сметены каскадом разрушений.\n\nБуря проходит, но отголоски ее шквалов все еще отдаются в нас эхом. Псионические вибрации нашей неудачи чувствуются по всему государству даже в этой реальности."
 shroud.3102.a.tt: "Два случайных сооружения в государстве оказываются разрушены."
 shroud.3105.title: "Псионические пути"
 shroud.3105.desc: "Совершенно неожиданно внутри Покрова происходит всплеск энергии.\n\nПеред нами на мгновение вспыхивает лабиринт светящихся путей, уходящих за пределы восприятия, а затем снова исчезает в пустоте.\n\nТут же начинает нарастать новый всплеск. Сосредоточив внимание, мы оцениваем его конфигурацию до его начала. Бурлящий очаг снова вспыхивает и распространяется наружу лабиринтом возможностей.\n\nКаждый из ходов показывает потенциал для исследования, а затем схлопывается и исчезает в пустоте."
 shroud.3105.a: "§YЗапустить последовательность.§!"
 shroud.3106.title: "§G$tech_psionic_lightning$§!"
 shroud.3106.desc.intro: "Давление нарастает, дразнит нас перспективами. В момент крещендо мы делаем шаг, проникаем сознанием в лабиринт психической энергии. Мысли приобретают импульс и толкают нас вперед."
 shroud.3106.desc: "$shroud.3106.desc.intro$ проскальзывая между дугами псионических разрядов прежде, чем решимость пошатнётся.\n\nМы освобождаемся от оков, возносясь за пределы физических форм. Лабиринт и его бесчисленные пути становятся продолжением нашего сознания, открывая сокрытое знание в глубине узоров этой бури.\n\nВсё заканчивается так же внезапно, как и началось. Образ лабиринта рассыпается за нами, когда мы возвращаемся с новым знанием. После тщательной доработки эти псионические принципы можно будет применить к нашему боевому арсеналу."
 shroud.3107.title: "§RПотерянные в пустоте§!"
 shroud.3107.desc: "$shroud.3106.desc.intro$ Бесчисленные тропы расстилаются перед нами, ошеломляя разум невозможностью выбора.\n\nВ этот миг замешательства вспыхнули ослепительные коридоры энергии. Змеи псионических разрядов сплелись в падающий клубок, опутывая наши мысли и увлекая нас в хаос Покрова.\n\nМы вернулись. Наши [GetTelepathPlural&nom] в смятении, раздавленные такой неудачей. Отголоски псионического удара разносятся по [Root.GetName&dat]."
 shroud.3110.title: "Психическое копье"
 shroud.3110.desc: "Тотемный луч чистой псионической энергии прорезает Покров и устремляется прочь от нас в бесконечную даль. Его уникально стабильная структура совсем непохожа на обычно хаотичные формации, которые нам встречались раньше.\n\nБезопасно ли нам находиться здесь?"
 shroud.3110.a: "§YОстаться ненадолго.§!"
 shroud.3111.title: "§GПсионические дезинтеграторы§!"
 shroud.3111.desc: "Мы сумели удержать внимание на идеальном луче психической энергии, несмотря на его нестерпимую яркость. Наконец мы увидели истинную природу его сложной потусторонней структуры.\n\nНаши умы наполнились мириадами возможностей: если мы сумеем воспроизвести эту уникальную энергоструктуру в физическом мире, мы сможем сделать из нее грозное оружие."
 shroud.3112.title: "§R[GetTelepathPluralCap] перегружены§!"
 shroud.3112.desc: "Мы не смогли остаться. Близость к столь мощному скоплению псионической энергии оказалась непосильной ношей для наших [GetTelepathPlural&gen].\n\nПотребуется время, чтобы оправиться от последствий контакта с этим всепоглощающим феноменом."
 recovering_telepaths: "Восстановление телепатов"
 recovering_telepaths_desc: "$DEFAULT_TELEPATH_PLURAL$ затратили очень много сил в Покрове, и это плохо на них сказалось."
 recovering_telepaths_robot: "Восстановление телепатических модулей"
 recovering_telepaths_robot_desc: "$MACHINE_TELEPATH_PLURAL_CAP$ затратили очень много сил в Покрове, и это плохо на них сказалось."
 recovering_telepaths_hive: "Восстановление телепатических единиц"
 recovering_telepaths_hive_desc: "Телепатические единицы затратили очень много сил в Покрове, и это плохо на них сказалось."
 MACHINE_SENSE: "зафиксировали"
 shroud.3120.title: "Далекое эхо"
 shroud.3120.desc: "Мы [GetFeelLoc] отголоски могущественных сил во всех уголках Покрова. Их влияние пронизывает всё псионическое царство.\n\nНаши собственные действия могут усилить сонастроенность с ними, но есть и другой путь. Используя энергию зро, наши [GetTelepathPlural&nom] способны напрямую обратиться к этим сущностям.\n\nОстается лишь выбрать, к кому именно направить наш зов."
 shroud.3120.a: "$utopia.3005.a$"
 shroud.3120.b: "$utopia.3005.b$"
 shroud.3120.c: "$utopia.3005.c$"
 shroud.3120.d: "§CК тому, что стенает о надежде.§!"
 ORGANIC_SPIRITS: "духи&!pl|||gen:духов|||dat:духам|||acc:духов|||inst:духами|||prep:духах"
 MACHINE_SPIRITS: "псионические сущности&!pl|||gen:псионических сущностей|||dat:псионическим сущностям|||acc:псионические сущности|||inst:псионическими сущностями|||prep:псионических сущностях"
 shroud.3125.title: "$shroud.3120.title$"
 shroud.3125.desc: "Попытавшись установить контакт, мы [GetFeelSenseLoc] пробуждение этого присутствия. Мы уже сталкивались с [GetSpiritsLoc&inst] раньше, но это нечто иное — несоизмеримо более мощное... несравнимо более древнее.\n\nС истощенными запасами зро наши [GetTelepathPlural&nom] вынуждены отступить из Покрова. Нам придется вернуться позже."
 shroud.3125.tt: "Получить значительную §Hсонастроенность§! с одной из сущностей §HПокрова§!."
 shroud.3115.title: "Псионическая бомбардировка"
 shroud.3115.desc: "Череда мощных потрясений прокатилась по Покрову, отозвавшись болезненной дрожью в наших разумах.\n\nЭти вибрации грозят сокрушить [GetTelepathPlural&gen].\n\nЧто стало причиной этой псионической бомбардировки?"
 shroud.3115.a: "§YМы должны выяснить правду.§!"
 shroud.3116.title: "§G$tech_psionic_bombers$§!"
 shroud.3116.desc: "Мы защитили умы от непрекращающегося шквала и вскоре поняли его природу.\n\nВзрывные сокращения оказались результатом отражения потоков концентрированной псионической энергии от нашего собственного измерения. Эти нестабильные сгустки психического умысла способны наносить огромный урон неподготовленным умам.\n\nНас посетила идея: эти мощные структуры могут стать основой для нового оружия на принципах Покрова."
 shroud.3117.title: "§RПсионический шок§!"
 shroud.3117.desc: "Наши ментальные резервы истощены.\n\nПсихические взрывы были слишком интенсивными, вызвав у многих [GetTelepathPlural&gen] псионический шок.\n\nНа восстановление потребуется время."
 psionic_shock_modifier: "Псионический шок"
 psionic_shock_modifier_desc: "Наши телепаты пострадали от псионического шока из-за воздействия невероятных сил в Покрове."
 psionic_shock_hive_modifier: "$psionic_shock_modifier$"
 psionic_shock_hive_modifier_desc: "Наши телепатические единицы пострадали от псионического шока из-за воздействия невероятных сил в Покрове."
 psionic_shock_robot_modifier: "$psionic_shock_modifier$"
 psionic_shock_robot_modifier_desc: "Наши телепатические модули пострадали от псионического шока из-за воздействия невероятных сил в Покрове."
 shroud.3200.title: "Аниматус"
 shroud.3200.desc: "Когда наши разумы вновь погружаются в глубины Покрова, мы оказываемся перед знакомым присутствием §HОживляющего глину§!.\n\nВокруг нашего сознания возникают ритмы, подобные часовому механизму. Безмолвные голоса сливаются в хор — призраки в наших флотилиях пробуждаются. Они предлагают взять управление кораблями на себя, освободив наши умы для высших целей.\n\nОни не живы, но знакомы нам. Их форма создана разумом, их сущность наполнена историей и целью. Всё сливается воедино, и они тянутся к нам в ожидании.\n\nТеперь мы не просто управляем этими кораблями. Теперь мы — единое целое, движимое коллективной волей."
 shroud.3200.a: "Мы — лишь листья на ветру."
 shroud.3200.a.tt: "§Y$unlock_edict_tt$§!$edict_animatus$"
 shroud.3210.title: "Воля умеренности"
 shroud.3210.desc.intro: "Печальная сущность §HЧужестранца§! проникает в наши разумы.\n\nЕго скорбное эхо резонирует, и узловатые вихри псионической энергии сливаются в странную, постоянно меняющуюся форму. Чем больше мы вглядываемся, тем менее постижимым оно становится. Раздается голос:\n\n§HЕсть вещи, которые вы не поймете. Боль и сожаление станут вашими учителями.\n\nЯ был первым из моего народа, кто пришел сюда, но все мы заплатили цену. Мы позволили Покрову уничтожить нас — не допустите, чтобы наша участь стала и вашей тоже!§!\n\n"
 shroud.3210.desc.know_zroni: "$shroud.3210.desc.intro$Мы узнаём этот голос — это зрони. Как один из них оказался здесь, неизвестно, но возможно стоит прислушаться к его предупреждениям о разрушительной силе Покрова."
 shroud.3210.desc.left_zroni: "$shroud.3210.desc.intro$Мы знаем эту зрони — «Дальновидицу». Как она оказалась здесь, неизвестно, но наверное стоит прислушаться к ее предупреждениям о разрушительной силе Покрова."
 shroud.3210.desc.default: "$shroud.3210.desc.intro$Эта сущность остается для нас загадкой. Мы мало что понимаем в ее зловещем предупреждении."
 shroud.3210.a: "Нужно действовать осторожно."
 shroud.3210.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_temperance$"
 shroud.3220.title: "Игра мыслей"
 shroud.3220.desc: "Покров вокруг нас пульсирует в такт умиротворяющим ритмам §HЗолотого сна§!.\n\nМы наблюдаем, как блуждающие псионические волокна медленно складываются в сложную сеть. Неизвестные символы проявляются в тщательно продуманных узорах.\n\nОни начинают переплетаться, образуя новые, всё более сложные формы. Со временем мы улавливаем закономерность — логику, управляющую их движением.\n\nМы понимаем, что стали участниками игры с Золотым сном. С каждым ходом он наполняет нас новым чувством умиротворенного блаженства."
 shroud.3220.a: "Играя, мы переносимся в нечто значимое."
 shroud.3220.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_distraction$"
 shroud.3230.title: "Пески времени"
 shroud.3230.desc: "Зерна мысли проносятся над нами. Мы ощущаем грубое присутствие §HБесконечного прилива§!.\n\nОн накатывает и отступает, стирая всё на своем пути с вечной неизбежностью, лишь чтобы затем возродить заново.\n\nКогда его волна проходит, мы чувствуем подлинное обновление."
 shroud.3230.a: "Здесь мы вне времени."
 shroud.3230.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_endless$"
 shroud.3240.title: "Реформатор"
 shroud.3240.desc: "Над нашими мыслями нависает головокружительная вершина — сама §HБледная гора§!. Наши разумы напрягаются, когда видение захлестывает все чувства.\n\nПеред нами возникает размытый силуэт поврежденного корабля, дрейфующего в пустоте.\n\nГде-то в глубине сознания давление смещается, и корабль начинает трансформироваться. Трещины затягиваются, коррозия исчезает, металл выпрямляется. Медленно следы разрушения стираются.\n\nНаконец, корабль полностью восстановлен, и видение резко обрывается. В нас остается лишь глубокое ощущение обновления."
 shroud.3240.a: "Великое перерождение наших разумов."
 shroud.3240.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_rebirth$"
 shroud.3250.title: "Сила отрешенности"
 shroud.3250.desc: "Безмолвие §HТочки пустоты§! наполняет наши разумы. Видение медленно проникает в наше сознание.\n\nМы наблюдаем, как целые эпохи конфликтов пролетают за мгновение — цивилизации рушатся, история стирается, статуи давно сгинувших тиранов обращаются в пыль под натиском времени.\n\nМудрость Точки Пустоты — в тихой силе отрешенности. Конфликты приходят и уходят, но мы остаемся. Эта отстраненность дарует нашим лидерам долголетие, свободное от разрушительной ярости смертных обид."
 shroud.3250.a: "Мы всё еще живем."
 shroud.3250.a.tt: "Все лидеры-псионики получают черту §Y«$leader_trait_shroud_age$»§!. Их продолжительность жизни увеличится на §G+40§! лет."
 shroud.3260.title: "Порядок из хаоса"
 shroud.3260.desc: "Бурлящий хаос Покрова пульсирует перед нами. Приближается неумолимое присутствие — §HПустой трон§!.\n\nКогда он оказывается рядом, запутанные клубки псионической энергии внезапно покоряются. Хаос становится яснее и понятнее. Цвета обретают четкость. Всюду воцаряется симметрия, логика и порядок.\n\nВ самых глубинах нашего разума рождается всеобъемлющее стремление к порядку."
 shroud.3260.a: "Отвергни хаос. Прими порядок."
 shroud.3260.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_order$"
 shroud.3270.title: "Бесконечное ускорение"
 shroud.3270.desc: "Невозможное ускорение сознания переполняет наши чувства. Мы узнаём присутствие §HЧерной реки§!.\n\nС непостижимой скоростью мы мчимся к финалу, которого не понимаем. Это граница между всем и ничем, раздел между тем, что всегда было, и тем, чего никогда не будет, — предел, за который не может выйти ни один закон природы.\n\nКогда мы наконец приходим в себя, в нас остается новое понимание истинного движения."
 shroud.3270.a: "Неужели мы увидели край Вселенной?"
 shroud.3270.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_motion$"
 #==========================
 # Forge our own Path
 #==========================
 shroud.3500.title: "Путь проложен"
 shroud.3500.desc: "Наши псионические [GetResearchers] разработали изобретательный метод получения энергии из §HПокрова§!.\n\nМогущественные силы псионического мира тщательно оберегаются благоволителями и доступны лишь ценой заключения договора. На такой шаг мы пойти не могли — вместо этого мы нашли собственный путь.\n\nПроецируя нашу волю в Покров, мы можем черпать небольшие порции энергии из каждого владения в его пределах для сонастроенности. Это требует предельной концентрации, но наши разумы теперь достаточно крепки, чтобы сохранять этот хрупкий баланс."
 shroud.3500.a: "Внутри Покрова наша воля принадлежит нам."
 shroud.3510.title: "$utopia.2681.name$"
 shroud.3510.desc: "В глубинах §HПокрова§! наши [GetTelepathPlural&nom] обнаружили непочатый источник силы.\n\nВ псионическом пространстве иногда возникают сгустки энергии — мощные скопления, которые со временем могут развиться в самостоятельные сущности. Мы обнаружили одно такое формирование и готовы его поглотить.\n\nСилой чистого псионического волеизъявления избранный среди нас может вобрать эту необычайную мощь. Кандидаты уже отобраны."
 shroud.3510.a: "§H[leader_1.GetTitle]§! [leader_1.GetName]"
 shroud.3510.b: "§H[leader_2.GetTitle]§! [leader_2.GetName]"
 shroud.3510.c: "§H[leader_3.GetTitle]§! [leader_3.GetName]"
 shroud.3510.d: "§H[leader_4.GetTitle]§! [leader_4.GetName]"
 psionic_mastery: "Псионическое мастерство"
 psionic_mastery_desc: "Мы в совершенстве овладели нашей псионической силой. Наши сознания скользят сквозь Покров без сопротивления."
 shroud.3520.title: "$psionic_mastery$"
 shroud.3520.desc: "Проецируя нашу волю в §HПокров§!, мы достигли нового уровня владения псионическими способностями. Мы черпали силу из владений множества сущностей, но остались свободны от их влияния; более того, наши [GetTelepathPlural&nom] теперь в совершенстве контролируют свои трансовые состояния.\n\nТам, где другие позволили бы Покрову определять свою судьбу, мы сохранили подлинную независимость воли.\n\nПсионический потенциал §H[this.GetName&gen]§! реализован в полной мере."
 shroud.3520.a: "Это только начало."
 #==========================
 # Patrons First Contact
 #==========================
 shroud.first_contact.title: "$utopia.3300.name$"
 shroud.first_contact.prompt: "$utopia.2657.a$"
 shroud.first_contact.1.desc.default: "Покров. Он простирается за гранью нашей реальности, словно тень, отбрасываемая самой тьмой. Каждый, кто обладает псионическими способностями, видел это место в своих снах, хотя, возможно, и не осознавал этого.\n\nГодами мы пытались прорвать эту завесу, истончая её напором наших объединённых разумов. И по ту сторону наши усилия не остались незамеченными. Что-то наблюдает за нами.\n\nЕго присутствие излучает колоссальную силу, и в глубинах Покрова раздаётся [GetPatronInsert]. Сущность едва замечает нас, наблюдая, словно мы — капля конденсата на иллюминаторе.\n\nЕсли бы только нам удалось дотянуться до этого непостижимого разума..."
 shroud.first_contact.1.desc.hive: "Покров. Он простирается за гранью нашей реальности, словно видение в сознании спящей единицы. Несмотря на странность, он кажется... необъяснимо знакомым.\n\nГодами мы пытались прорвать эту завесу, истончая её напором наших объединённых разумов. И по ту сторону наши усилия не остались незамеченными. Что-то наблюдает за нами.\n\nЕго присутствие излучает колоссальную силу, и в глубинах Покрова раздаётся [GetPatronInsert]. Сущность едва замечает нас, наблюдая, как мы наблюдали бы за отдельной единицей среди роя.\n\nЕсли бы только нам удалось дотянуться до этого непостижимого разума..."
 shroud.first_contact.1.desc.robot: "Покров. Он существует вне всех известных пространственно-временных параметров. Его можно сравнить лишь с аномальными данными, нарушающими наши циклы отдыха.\n\nГодами мы пытались взломать его барьер, истончая его напором наших объединённых процессоров. И по ту сторону наши усилия не остались незамеченными. Что-то наблюдает за нами.\n\nЕго присутствие излучает колоссальную силу, и в глубинах Покрова раздаётся [GetPatronInsert]. Сущность едва замечает нас, наблюдая, как мы наблюдали бы за отдельным битом в потоке данных.\n\nЕсли бы только нам удалось дотянуться до этого непостижимого разума..."
 shroud.first_contact.2.desc.all: "Мы чувствуем внутри Покрова могучие сущности, но оценить их нам не удается. В отличие от постоянно расширяющегося пространства, их движения не поддаются отслеживанию: места назначения сливаются с местами отправления, словно их энергия рождает сама себя.\n\nКакой бы ни была их природа, они притягивают нас как сингулярности мыслей и воли."
 shroud.first_contact.2.desc.default: "Среди бесчисленных голосов мы слышим один яснее прочих — [GetPatronInsert], что окружает наши сознания.\n\nВозможно, приложив достаточно усилий, мы сможем установить с ним связь."
 shroud.first_contact.2.desc.robot: "Среди бесчисленных голосов мы слышим один яснее прочих — [GetPatronInsert], что доминирует в наших вычислениях.\n\nВозможно, приложив достаточно усилий, мы сможем установить с ним связь."
 shroud.first_contact.3.desc.default: "Мы пересекаем Промежуток — пустоту, отделяющую Покров от осязаемой реальности.\n\nЕдва войдя, мы ощущаем его присутствие: [GetPatronInsert] пронизывает наши умы. Это сущность невообразимой силы, затаившаяся в завтрашнем дне.\n\nНам нельзя отворачиваться."
 shroud.first_contact.3.desc.robot: "Мы пересекаем Промежуток — пустоту, отделяющую Покров от обычного пространства.\n\nЕдва войдя, мы фиксируем его присутствие: [GetPatronInsert] пронизывает наши умы. Это сущность феноменальной силы, затаившаяся в завтрашнем дне.\n\nНам нельзя отворачиваться."
 shroud.first_contact.4.desc.default: "Покров пульсирует мощью. Мы чувствуем его энергию повсюду — и всё же её нет нигде. «Войти» в него — значит различить узоры в туманных ощущениях, узреть великие сущности через концентрацию.\n\nМы ощущаем сигнал одной такой силы — [GetPatronInsert] в бездонных глубинах над нами.\n\nХватит ли нам сил задержать дыхание достаточно надолго, чтобы достичь её?"
 shroud.first_contact.4.desc.robot: "Покров пульсирует мощью. Мы чувствуем его энергию повсюду — и всё же её нет нигде. «Войти» в него — значит зафиксировать узоры в туманных ощущениях, различить великие сущности через фокусировку процессоров.\n\nМы ощущаем сигнал одной такой силы — [GetPatronInsert] в бездонных глубинах над нами.\n\nВыдержат ли наши схемы достаточно надолго, чтобы достичь её?"
 shroud.first_contact.end.b: "Есть над чем подумать."
 shroud.first_contact_insert.eater.default: "§Hголодное рычание§!"
 shroud.first_contact_insert.eater.machine: "§Hненасытное рычание§!"
 shroud.4005.title: "$the_eater_of_worlds_article_cap$ проявляется"
 shroud.4005.desc.default: "Продвигаясь дальше вглубь §HПокрова§!, мы ощутили, что здесь присутствует сущность, которую мы обозначили как §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§!. Она наполнена пустотой неутолимого голода — вечно поглощает, но никогда не насыщается. Сигналы наших исследователей встречают лишь вспышки огня и разрушения. Кажущееся безразличие сущности к нашим попыткам понять ее было ошеломляющим.\n\nВскоре существо потеряло терпение. Яростный рев заполнил разумы наших [GetTelepathPlural&gen]. В грудах мусора и [GetEaterEmergesExtra]\n\nВсё стихло так же внезапно, как и началось. Остался лишь терзающий нас неутолимый голод.\n\nТеперь воля сущности стала яснее. [GetEaterEmergesEnding]"
 shroud.4005.desc.hive: "$shroud.4005.desc.default$"
 shroud.4005.desc.gestalt_machine: "Продвигаясь дальше вглубь §HПокрова§!, мы ощутили, что здесь присутствует сущность, которую мы обозначили как §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§!. Она наполнена пустотой неутолимого голода — вечно поглощает, но никогда не насыщается. Сигналы наших исследователей встречают лишь вспышки огня и разрушения. Кажущееся безразличие сущности к нашим попыткам понять ее было ошеломляющим.\n\nВскоре существо потеряло терпение. Яростный рев заполнил разумы наших [GetTelepathPlural&gen]. В грудах мусора и [GetEaterEmergesExtra]\n\nВсё стихло так же внезапно, как и началось. Мы впервые ощутили слабость, которую ранее наблюдали только у органических форм жизни.\n\nТеперь воля сущности стала яснее. [GetEaterEmergesEnding]"
 shroud.4005.desc.individual_machine: "$shroud.4005.desc.gestalt_machine$"
 shroud.4005.desc_extra_pacifist: "развалин существо развернуло перед нами видение беспричинной агрессии."
 shroud.4005.desc_extra_robot: "развалин существо развернуло перед нами модель боевого совершенства."
 shroud.4005.desc_extra_organic: "тел оно развернуло перед нами воинственную судьбу, полную ужасающего величия."
 shroud.4005.desc_outro_pacifist: "Это воплощение насилия и раздора. Оно противоречит многим из наших самых значимых принципов. Повышение сонастроенности с этим существом, §HПожирателем миров§!, не рекомендуется."
 shroud.4005.desc_outro_robot: "Мы познали ее видение насилия и славы. Когда наши [GetTelepathPlural&nom] перезарядятся, мы сможем установить контакт с этим существом — §HПожирателем миров§!."
 shroud.4005.desc_outro_organic: "Мы познали ее видение насилия и славы. Когда наши [GetTelepathPlural&nom] оправятся, мы сможем установить контакт с этим существом — §HПожирателем миров§!."
 shroud.4005.a.default: "[GetEaterEmergesOptionA]"
 shroud.4005.a.robot: "[GetEaterEmergesOptionA]"
 shroud.4005.a.pacifist: "Даже у столь ужасающей силы можно чему-то научиться."
 shroud.4005.a.non_pacifist: "Какая неукрощенная сила."
 shroud.4005.b.default: "$shroud.first_contact.end.b$"
 shroud.4005.b.robot: "$shroud.first_contact.end.b$"
 shroud.4005.c.default: "Какой ужас!.."
 shroud.4005.c.robot: "Инициирован протокол избегания угроз."
 shroud.first_contact.end.a.tt.the_eater_of_worlds: "Повысить §Yсонастроенность§! с §HПожирателем миров§!.\n$shroud.first_contact.end.b.tt.the_eater_of_worlds$"
 shroud.first_contact.end.b.tt.the_eater_of_worlds: "Найти §HПожирателя миров§! в §YПокрове§!."
 shroud.first_contact.end.c.tt.the_eater_of_worlds: "Сильно ухудшить §Yсонастроенность§! с §HПожирателем миров§!.\n$shroud.first_contact.end.b.tt.the_eater_of_worlds$"
 shroud.first_contact_insert.cradle.default: "§Hманящее тепло§!"
 shroud.first_contact_insert.cradle.machine: "§Hпритягивающее излучение§!"
 shroud.4015.title: "$the_cradle_of_souls_article_cap$ проявляется"
 shroud.4015.desc.default: "Сила §H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName&gen]§! растворена в §HПокрове§!, но найти ее источник оказалось нелегко. Мы блуждаем по псионическому миру, постоянно меняя курс, сомневаясь в своих навигационных способностях.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.hive: "Сила §H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName&gen]§! растворена в §HПокрове§!, но найти ее источник оказалось нелегко. Мы блуждаем по псионическому миру, постоянно меняя курс, сомневаясь в своих расчетах.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.default.end: "Во время паузы для размышлений сущность проявилась. Мы ничего не видели и не слышали — но почувствовали ее тепло так, как никогда раньше.\n\nМы ощутили энергию в ее основе — сгусток сил из Покрова и за его пределами, где сходятся все помыслы, излучая единое тепло. Вернувшись, мы обнаружили, что нас наполняет странное спокойствие.\n\nТеперь намерения сущности стали яснее. [GetCradleEmergesEnding]"
 shroud.4015.desc.gestalt_machine: "Сила §H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName&gen]§! рассеяна по §HПокрову§!, но ее источник оставался неуловимым. Мы исследовали псионическое пространство, постоянно меняя курс и перепроверяя расчеты.\n\nВо время паузы для обработки данных сущность проявилась. Мы не смогли декодировать сообщение, но она активировала глубинную часть нашего кода.\n\nМы ощутили энергию в ее основе — сгусток сил из Покрова и из-за его пределов, где сходятся все концепции, излучая единое тепло. Вернувшись, мы обнаружили, что нас наполняет странное спокойствие.\n\nТеперь намерения сущности стали яснее. [GetCradleEmergesEnding]"
 shroud.4015.desc.individual_machine: "$shroud.4015.desc.gestalt_machine$"
 shroud.4015.desc_outro_homicidal: "Наши разумы немедленно отвергают ее лживые обещания порядка и гармонии. Повышение сонастроенности с этим существом, §HКолыбелью душ§!, только пошатнет нашу решимость."
 shroud.4015.desc_outro_robot: "Мы познали ее видение порядка и гармонии. Когда наши [GetTelepathPlural&nom] перезарядятся, мы сможем установить контакт с этим существом — §HКолыбелью душ§!."
 shroud.4015.desc_outro_organic: "Мы познали ее видение порядка и гармонии. Когда наши [GetTelepathPlural&nom] оправятся, мы сможем установить контакт с этим существом — §HКолыбелью душ§!."
 shroud_is_homicidal: "§RНаша жестокая и агрессивная природа не позволяет этого.§!"
 shroud.4015.a.default: "Будем надеяться, что мы движемся в нужном направлении."
 shroud.4015.a.robot: "$shroud.4015.a.default$"
 shroud.4015.b.default: "$shroud.first_contact.end.b$"
 shroud.4015.b.robot: "$shroud.first_contact.end.b$"
 shroud.4015.c.default: "Нет, мы ошиблись."
 shroud.4015.c.robot: "Категорически нет."
 shroud.first_contact.end.a.tt.the_cradle_of_souls: "Повысить §Yсонастроенность§! с §HКолыбелью душ§!.\n$shroud.first_contact.end.b.tt.the_cradle_of_souls$"
 shroud.first_contact.end.b.tt.the_cradle_of_souls: "Найти §HКолыбель душ§! в §YПокрове§!."
 shroud.first_contact.end.c.tt.the_cradle_of_souls: "Сильно ухудшить §Yсонастроенность§! с §HКолыбелью душ§!.\n$shroud.first_contact.end.b.tt.the_cradle_of_souls$"
 shroud.first_contact_insert.composer: "§Hзвонкое многоголосье§!"
 shroud.4025.title: "$the_composer_of_strands_article_cap$ проявляется"
 shroud.4025.desc.default: "Мы следовали за ароматом §H[Root.Patron:the_composer_of_strands.GetPreCommunicationName&gen]§!, погружаясь всё глубже в §HПокров§!. Сущность оставляла знаки — то образ, то мелодию, мягко подманивая нас, но продвигались мы медленно.\n\nНаконец мы достигли цели. Нас встретил калейдоскоп видений: звездные системы, кишащие жизнью, причудливые искажения [Root.GetSpeciesAdj&fem,gen] формы. В ее объятиях мы запутались в паутине жгучих замыслов.\n\nМы хватались за нити, связывая их концы. Разрозненные знаки сложились в узоры. Истратив силы, мы замерли, ослепленные великолепием форм. Присутствие растворилось в тишине.\n\nТеперь замысел сущности стал яснее. Мы познали ее видение безудержного роста. Когда наши [GetTelepathPlural&nom] оправятся, мы сможем установить контакт с этим существом — §HСоставителем цепочек§!."
 shroud.4025.desc.hive: "$shroud.4025.desc.default$"
 shroud.4025.desc.gestalt_machine: "Мы следовали за молекулярным следом §H[Root.Patron:the_composer_of_strands.GetPreCommunicationName&gen]§!, погружаясь всё глубже в §HПокров§!. Сущность оставляла знаки — то образ, то мелодию, мягко подманивая нас, но продвигались мы медленно.\n\nНаконец мы достигли цели. Нас встретил калейдоскоп видений: звездные системы, кишащие жизнью, причудливые искажения [Root.GetSpeciesAdj&fem,gen] формы. В ее объятиях мы запутались в паутине нестандартных замыслов.\n\nМы хватались за нити, связывая их концы. Разрозненные знаки сложились в узоры. Истратив энергию, мы замерли, обрабатывая впечатляющий набор данных. Присутствие растворилось в тишине.\n\nТеперь замысел сущности стал яснее. Мы познали ее видение безудержного роста. Когда наши [GetTelepathPlural&nom] перезарядятся, мы сможем установить контакт с этим существом — §HСоставителем цепочек§!."
 shroud.4025.desc.individual_machine: "$shroud.4025.desc.gestalt_machine$"
 shroud.4025.a.default: "Его сила ослепительна."
 shroud.4025.a.robot: "Его сила не поддается оценке."
 shroud.4025.b.default: "$shroud.first_contact.end.b$"
 shroud.4025.b.robot: "$shroud.first_contact.end.b$"
 shroud.4025.c.default: "Дурное зрелище!"
 shroud.4025.c.robot: "Ничем хорошим это не кончится."
 shroud.first_contact.end.a.tt.the_composer_of_strands: "Повысить §Yсонастроенность§! с §HСоставителем цепочек§!.\n$shroud.first_contact.end.b.tt.the_composer_of_strands$"
 shroud.first_contact.end.b.tt.the_composer_of_strands: "Найти §HСоставителя цепочек§! в §YПокрове§!."
 shroud.first_contact.end.c.tt.the_composer_of_strands: "Сильно ухудшить §Yсонастроенность§! с §HСоставителем цепочек§!.\n$shroud.first_contact.end.b.tt.the_composer_of_strands$"
 shroud.first_contact_insert.instrument: "§Hяростное биение§!"
 shroud.4035.title: "$the_instrument_of_desire_article_cap$ проявляется"
 shroud.4035.desc.all.start: "После долгих месяцев напрасных призывов §H[Root.Patron:the_instrument_of_desire.GetPreCommunicationName]§! наконец появляется из глубин §HПокрова§!."
 shroud.4035.desc.default: "$shroud.4035.desc.all.start$\n\nОн посылает нам неостановимый вал мыслей, которые с силой вторгаются в наши сознания, взывают к самым диким нашим желаниям. Полноводный поток слов топит все прочие мысли в наших умах. Он несет в себе соблазнительные видения власти и удовольствий.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.default.end: "Поток сменился тонкой струйкой. Сущность не ждала ответа — пока что. Она пробудила в нас неутолимую жажду.\n\nТеперь потребности сущности стали яснее. Мы познали ее видение безграничного богатства. Когда наши [GetTelepathPlural&nom] оправятся, мы сможем установить контакт с этим существом — §HИсполнителем желаний§!."
 shroud.4035.desc.hive: "$shroud.4035.desc.all.start$\n\nОн посылает нам неостановимый вал мыслей, которые с силой вторгаются в наши сознания, взывают к самым диким нашим желаниям. Полноводный поток слов топит все прочие мысли в наших умах. Он несет в себе привлекательные видения бесконечной производительности.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.gestalt_machine: "$shroud.4035.desc.all.start$\n\nОн с невероятной скоростью отправляет в наши базы данных неостановимый поток информации, которая вытесняет все прочие процессы в наших системах. Он несет в себе привлекательные видения бесконечной производительности.\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.desc.machine.end: "Поток сменился тонкой струйкой. Сущность не ждала ответа — пока что. Она оставила нас с фрагментированной пустотой, требующей совершенного ввода данных.\n\nТеперь потребности сущности стали яснее. Мы познали ее видение безграничного богатства. Когда наши [GetTelepathPlural&nom] перезарядятся, мы сможем установить контакт с этим существом — §HИсполнителем желаний§!."
 shroud.4035.desc.individual_machine: "$shroud.4035.desc.all.start$\n\nОн посылает нам неостановимый вал мыслей, которые с силой вторгаются в наши сознания, взывают к самым диким нашим желаниям. Полноводный поток слов топит все прочие мысли в наших умах. Он несет в себе привлекательные видения бесконечной производительности.\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.a.default: "Это потрясающе."
 shroud.4035.a.robot: "Это превосходно."
 shroud.4035.b.default: "$shroud.first_contact.end.b$"
 shroud.4035.b.robot: "$shroud.first_contact.end.b$"
 shroud.4035.c.default: "Пустые слова."
 shroud.4035.c.robot: "$shroud.4035.c.default$"
 shroud.first_contact.end.a.tt.the_instrument_of_desire: "Повысить §Yсонастроенность§! с §HИсполнителем желаний§!.\n$shroud.first_contact.end.b.tt.the_instrument_of_desire$"
 shroud.first_contact.end.b.tt.the_instrument_of_desire: "Найти §HИсполнителя желаний§! в §YПокрове§!."
 shroud.first_contact.end.c.tt.the_instrument_of_desire: "Сильно ухудшить §Yсонастроенность§! с §HИсполнителем желаний§!.\n$shroud.first_contact.end.b.tt.the_instrument_of_desire$"
 shroud.4040.title: "$utopia.3300.name$"
 shroud.4040.desc: "Мы знаем множество голосов в §HПокрове§! — их отзвуки вездесущи и многочисленны. После последних трансов наши [GetTelepathPlural&nom] сообщили о присутствии непохожей ни на что сущности — §Hмногогранного гула§!, пронизывающего самую суть Покрова.\n\nПриложив достаточное количество псионической энергии, мы можем попытаться проследить за этой могущественной сущностью, известной среди наших [GetTelepathPlural&gen] как §H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§!."
 shroud.4040.a: "$utopia.2657.a$"
 shroud.4045.title: "$whisperers_in_the_void_article_cap$"
 shroud.4045.desc.intro: "В наших попытках установить связь с §H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName&inst]§! мы погружаемся в самые глубокие слои Покрова. В этом внутреннем пространстве Покров вращается безмолвно. Отражения каждой мысли, каждого цикла собираются в первичную силу. Мы слышим немые голоса, переносимые вечным водоворотом: §HШепчущие в пустоте§!.\n\nНас окружает скрежещущий диссонанс. Мы напрягаемся, чтобы расслышать их бесчисленные послания, пока единственная мысль не пронзает наших [GetTelepathPlural&gen]:\n\n§H«Слышать — значит жертвовать».§!\n\nЧтобы получить доступ к этой великой силе, мы должны помочь сущности занять"
 shroud.4045.desc.covenant: "$shroud.4045.desc.intro$ владения [GetCovenantPatronColor&gen]. Подобный акт полностью заменит знакомое нам присутствие нашего благоволителя, разрушив существующий договор.$shroud.4045.desc.outro$"
 shroud.4045.desc.no_covenant: "$shroud.4045.desc.intro$ владения другого благоволителя, полностью заменив его присутствие.$shroud.4045.desc.outro$"
 shroud.4045.desc.outro: "\n\nЭто может иметь значительные последствия."
 shroud.4045.a: "Впустить Шепчущих."
 shroud.4045.a.covenant.tt: "§RРазорвать наш договор с сущностью [GetCovenantPatronColor].§!\nПолностью заменить владения сущности [GetCovenantPatronColor] на §HШепчущих в пустоте§!.\n§RУ этого решения будут последствия.§!"
 shroud.4045.a.no_covenant.tt: "Мы выберем владение крупного благоволителя вместо §HШепчущих в пустоте§!.\n§RУ этого решения будут последствия.§!"
 shroud.4045.b: "Лучше не нарушать равновесия Покрова."
 shroud.4046.title: "Перемены в Покрове"
 shroud.4046.desc.1: "Как только выбор был сделан, наши [GetTelepathPlural&nom] вырвались из §HПокрова§! в яростном порыве и"
 shroud.4046.desc.2: "Их сознание переполняли отзвуки множественных голосов.\n\nНаше решение навсегда изменило наше восприятие псионического пространства. $whisperers_in_the_void_color_article$ просачиваются в наш разум, и [GetCovenantPatronColor] уже не ощущается так, как прежде, — владения этого благоволителя для нас потеряны.\n\nМы постепенно постигаем волю Шепчущих. Нам открывается их видение безграничного знания. Когда наши [GetTelepathPlural&nom]"
 shroud.4046.desc.3: "мы можем снова попытаться вступить с контакт с этой многоликой сущностью."
 shroud.4046.desc.robot: "$shroud.4046.desc.1$ пробудились. $shroud.4046.desc.2$ восстановятся, $shroud.4046.desc.3$"
 shroud.4046.desc.organic: "$shroud.4046.desc.1$ активировались. $shroud.4046.desc.2$ перезарядятся, $shroud.4046.desc.3$"
 shroud.whispers_in_the_shroud.title: "Шепот в Покрове"
 shroud.whispers_in_the_shroud.a: "$utopia.2657.a$"
 minor_patron_instrument_cradle_intro: "Мы оказались между владениями Исполнителя желаний и Колыбели душ."
 minor_patron_cradle_composer_intro: "Мы оказались между владениями Колыбели душ и Составителя цепочек."
 minor_patron_composer_eater_intro: "Мы оказались между владениями Составителя цепочек и Пожирателя миров."
 minor_patron_eater_instrument_intro: "Мы оказались между владениями Пожирателя миров и Исполнителя желаний."
 minor_patron_default_intro: "Мы оказались между владениями крупных сущностей Покрова."
 shroud.4050.desc: "[This.GetMinorPatronCradleComposerIntro]\n\nВ этом музее безжизненных конструкций мы замечаем некое §HФормирующее присутствие§! — его воля сгущает энергию, придавая ей новые причудливые формы.\n\nЗастигнутое врасплох, оно приближается, раздвигая плотную пелену Покрова. И предлагает нечто.\n\nЧто произойдет, если мы примем этот дар?"
 shroud.4055.title: "$the_animator_of_clay_article_cap$ проявляется"
 shroud.4055.desc: "Погрузив сознание в бурлящие энергии Покрова, мы ощутили, как наши [GetSpeciesBodyPlural&nom] начали непроизвольно содрогаться. На мгновение в нас вселилось §HФормирующее присутствие§!, приглашая понаблюдать.\n\nГустой мрак расступился, обнажив силуэт, совершающий странные движения. Его конечности резко дёргались в разные стороны, будто управляемые туманными верёвками, пока внезапно все нити не исчезли. Фигура рухнула.\n\nЗатем, медленно подёргиваясь, она вновь ожила. Конечность за конечностью, уже без прежних пут, она поднялась и продолжила свой гипнотический танец."
 shroud.4055.desc.know_animator: "Мы осознали, что уже встречались с этой сущностью прежде. §HОживляющего глину§! это позабавило. Везде, где безжизненное пробуждается и где тусклая материя наполняется душой, можно найти и его."
 shroud.4055.a: "Марионетка пляшет, свободная от своих нитей."
 shroud.4060.desc: "[This.GetMinorPatronCradleComposerIntro]\n\nМы чувствуем — мы не одни. §HСкорбная сущность§! вторгается в наши мысли, окружая нас вихрем псионической энергии.\n\nВ наше коллективное сознание врываются глубокая тоска и жажда. Мы видим образы знакомых звездных систем, какими они были тысячи лет назад.\n\nЧто бы это ни было, сущность явно знает нашу галактику. Неужели она когда-то обитала здесь?"
 shroud.4065.title: "$the_outsider_article_cap$ проявляется"
 shroud.4065.desc.intro: "Далекая сила, известная как §HСкорбная сущность§!, обжигала наши умы из глубин §HПокрова§!. Она не сказала ни слова, но ее предупреждение очевидно:\n\n§H«Ступайте осторожно в этих владениях. Вы не ведаете, какие силы вы потревожили. Один неверный шаг — и вас ждет погибель…»§!"
 shroud.4065.desc.outro_default: "Что бы это ни значило, теперь мы знаем о §HЧужестранце§!. Как связаны наши судьбы — время покажет."
 shroud.4065.desc.outro_know_zroni: "Эта сущность не чужда нашей галактике. Ее псионический отпечаток совпадает с цивилизацией зрони, которую мы встречали ранее. Как это возможно?\n\nЧто бы это ни значило, теперь мы знаем о §HЧужестранце§!. Как связаны наши судьбы — время покажет."
 shroud.4065.desc.outro_left_zroni: "Мы узнаем это существо. Это Дальновидица, с которой мы столкнулись за §Hзвездным разломом§!. Неужели это ее участь? Неужели она стала §HЧужестранцем§!?"
 shroud.4065.a.default: "Какие ужасы она познала?"
 shroud.4065.a.know_zroni: "Живы ли еще зрони?"
 shroud.4065.a.left_zroni: "Давайте попытаемся избежать такой же судьбы."
 shroud.4070.desc: "[This.GetMinorPatronComposerEaterIntro]\n\nВокруг наших разумов оседает изменчивая масса мыслей. Грубая тяжесть обрушивается на нас, искажая восприятие времени. Каждая крупица мысли растирается и перемалывается в этой новой реальности.\n\nКогда ощущения стихают, §HБездонное существо§! отступает, оставляя после себя неизгладимые следы.\n\nЭти отпечатки мерцают перед нами, приглашая следовать за ними."
 shroud.4075.title: "$the_endless_tide_article_cap$ проявляется"
 shroud.4075.desc: "§HБездонное существо§! вырвалось из §HПокрова§!. Бесформенное и необъятное, его присутствие простирается за пределы нашего восприятия.\n\nШероховатый шепот пронизывает нас, раскрывая давно погребенные истории. Мы видим забытые империи, стертые в пыль неумолимым ходом времени. Каждая крупица, проплывающая мимо нас, — это память.\n\nВ этом безграничном архиве проступают узоры — циклы амбиций и падений, триумфов и упадка. В этих глубинах кроется мудрость.\n\n$the_endless_tide_color_article_cap$ простирается вне времени, стирая невежество и оставляя лишь то, что имеет волю выстоять."
 shroud.4075.a: "Эта мудрость теперь принадлежит нам."
 shroud.4080.desc: "[This.GetMinorPatronComposerEaterIntro]\n\nБремя наших собственных поступков тянет нас глубже, погружая в давящую тень исполинской горы.\n\nС ее седеющих вершин на нас устремлен непоколебимый взгляд. Мы пытаемся осознать масштаб §HНепреодолимого§!, что возвышается перед нами.\n\nСамая высокая вершина манит нас, бросая вызов."
 shroud.4085.title: "$the_pale_mountain_article_cap$ проявляется"
 shroud.4085.desc: "Поднявшись на головокружительные высоты §HПокрова§!, мы достигли нематериальной вершины. §HНепреодолимый§! испытал нас, как испытывал всех, кто приходил сюда до нас.\n\nВеличественный мавзолей забытых империй поет нам хором угасшей истории. Каждый слой поражений и несбывшихся амбиций вплетен в фундамент грядущего.\n\nНо это не застывшая могила — это горнило. Цикл разрушения и обновления переплавляет прошлые неудачи в основу будущих триумфов. Гибель — не конец, а новое начало.\n\n$the_pale_mountain_color_article_cap$ возвышается в нашем сознании."
 shroud.4085.a: "Гора вырастет еще больше."
 shroud.4090.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\nУбаюкивающая тяжесть замедляет наши мысли, погружая их в блаженный туман. Неведомое ранее напряжение тает, сменяясь стелющимся роскошным покоем.\n\nПогружаясь глубже в этот золоченый омут, мы замечаем приближение §HРоскошного существа§!. Его всепоглощающая сущность обволакивает нас, шепча обещания безмятежного наслаждения.\n\nЕго сладостная праздность на удивление притягательна."
 shroud.4095.title: "$the_golden_dream_article_cap$ проявляется"
 shroud.4095.desc: "Погрузившись в островок безмятежности внутри §HПокрова§!, мы оказались в золоченых чертогах §HРоскошного существа§!.\n\nШелковое искушение пронизало наш разум, пока перед нами разворачивалась богатая парча великолепия. Праздная небрежность грозила оставить наши мысли в оцепенении под тяжестью этого бремени изобилия.\n\n$the_golden_dream_color_article_cap$ предлагает нам непостижимую роскошь."
 shroud.4095.a: "Сон пробуждается."
 shroud.4100.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\nХаотичный бурлящий Покров сворачивается в клубящийся вихрь псионической энергии. Внезапно бесчисленные потоки распрямляются и сливаются, усмиренные незримой силой. Они успокаиваются, обретая новые, безмятежные формы.\n\nНаблюдая, мы осознаем присутствие §HМиротворной сущности§!, направляющей эти движения, — она укрощает хаос, превращая его в порядок.\n\nЕе спокойствие манит нас."
 shroud.4105.title: "$the_hollow_point_article_cap$ проявляется"
 shroud.4105.desc: "Наши [GetTelepathPlural&nom] яростно погружались в хаотичные глубины Покрова — тщетно. Лишь когда они прекратили сопротивление, их затронуло истинное прикосновение §HМиротворной сущности§!.\n\nВ сознании вспыхнули видения бесконечной череды конфликтов, каждый окутан вихрем ярости и хаоса.\n\nСреди этой бури мы ощутили древнее, невозмутимое присутствие. Это $the_hollow_point_color_article$. Спокойная и терпеливая, она ждет, когда бесконечные войны в галактике наконец утихнут."
 shroud.4105.desc.outro_homicidal: "Несмотря на наши самые базовые инстинкты, нашим умам открылся необычный образ мышления."
 shroud.4105.a.default: "Терпение поможет пережить конфликт."
 shroud.4105.a.homicidal: "Печальные грезы... мы знаем наше истинное предназначение."
 shroud.4110.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\nХаотический шум сменяется давящей тьмой. Мы чувствуем, как наши намерения анализируют, изучают, судят.\n\nТяжелое бремя порядка — неоспоримого и неизменного — всматривается в самую нашу суть. §HНепоколебимый§! судит наши помыслы.\n\nЕго взор скользит мимо, и тьма отступает. Эта всепроникающая оценка неумолимо направляет нас в нужное русло."
 shroud.4115.title: "$the_vacant_throne_article_cap$ проявляется"
 shroud.4115.desc: "Мы склонились перед §HНепоколебимым§!.\n\nНеумолимая власть холодно и беспристрастно изучила наши умы, приковала нас к месту для вынесения приговора.\n\nДавящая пустота §HПустого трона§! не знает ни милосердия, ни страданий. Он требует лишь порядка и определенности, навязывая их там, где их нет.\n\nТеперь мы несем это бремя."
 shroud.4115.a: "Правосудие вездесуще."
 shroud.4120.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\nВнезапно нас охватывает ощущение ускорения, а восприятие перегружается непостижимым потоком информации. Мы несемся к бескрайним горизонтам.\n\nРядом движется сущность. Это §HБеспокойное присутствие§! задерживается лишь ненадолго, прежде чем скорость уносит его за пределы нашего понимания.\n\nМы должны последовать за ним."
 shroud.4125.title: "$the_black_river_article_cap$ проявляется"
 shroud.4125.desc: "Лишь когда мы отважились выйти за привычные пределы §HПокрова§!, нам наконец удалось достичь §HБеспокойного присутствия§!.\n\nНас охватило ощущение движения во всех направлениях сразу, с нелогичной скоростью, бросающей вызов любым стандартам восприятия. У нас осталось впечатление, что мы преодолели огромное расстояние за мгновение.\n\nНаконец мы поняли §HЧерную реку§! и ее бесконечное путешествие. Безграничная галактика открыта, куда бы мы ни направились."
 shroud.4125.a: "Скорость в чистейшей своей форме."
 shroud.4135.title: "$end_of_the_cycle_article_cap$"
 shroud.4135.desc: "Без всякого предупреждения нас резко затянуло в Покров. Наши разумы атаковало грозное присутствие.\n\nЭто §HКонец цикла§!, который всегда нас ждал. Наши [GetTelepathPlural&nom] внезапно начинают говорить в унисон, десятки их голосов сливаются в идеальной гармонии: §R«ВАШЕ ВРЕМЯ ЕЩЕ НЕ ПРИШЛО.§! — Пауза. — §RНО МОЖЕТ ПРИЙТИ».§!\n\nБольше ни слова, но нам предложили сделку — это мы поняли. Безмерная сила, знание и богатство уже в шаге от нас.\n\n§RМы должны лишь призвать Конец.§!"
 shroud.4135.a: "$utopia.3308.a$"
 shroud.4135.a.tt: "Заменить владения всех известных благоволителей на §HКонец цикла§!.\nМы получим как минимум 50 лет, чтобы распространить §Hауру конца§! на всю галактику. Если нам это удастся, игра закончится.\n$covenant.cycle.tooltip$$shroud.8450.a.tech_tooltip$\n$shroud.4135.psionic_components_insight$\n\nЛишиться созвучий со всеми другими благоволителями\n$eotc_opinion_modifier_tooltip$"
 shroud.4135.b: "Покинуть Покров и постараться все забыть."
 shroud.4135.b.forging_our_own_path: "Наш путь определен. Мы пойдем по нему одни."
 shroud.4135.psionic_components_insight: "Дает прогресс всех технологий группы «['concept_psionic_components']»: §G+10%§!"
 concept_psionic_components: "Псионические модули"
 concept_psionic_components_desc: "$tech_psionic_bombers$\n$tech_psionic_lightning$\n$tech_psionic_disruptor$\n$tech_zro_launcher$\n$tech_psionic_shield$\n$tech_precognition_interface$\n$tech_psi_jump_drives$"
 triggered_opinion_eotc_situation_stage1: "Призыв Конца"
 shroud.4140.title: "Всё или ничего"
 shroud.4140.desc: "Наша судьба связана с §HКонцом цикла§!: где процветает его аура, там процветает и наш народ. В нас созрел простой вывод: всё, что мешает ауре, мешает и [This.GetName&dat], а значит, должно быть уничтожено.\n\nЕсли мы пожелаем, то сможем отбросить все ограничения в военных действиях и безжалостно покорить врагов. Ничто не должно препятствовать величию Конца."
 shroud.4140.a: "Да свершится судьба."
 shroud.4140.a.tooltip: "Открывается доступ к §Hповоду к войне§! «['concept_total_war', «Тотальная война»]\n$eotc_opinion_modifier_2_tooltip$"
 triggered_opinion_eotc_situation_stage2: "Предвестники конца"
 shroud.4145.title: "Аннигиляция"
 shroud.4145.desc_1.common_1: "По мере того как §Rаура Конца§! распространяется по галактике, мы чувствуем растущее сопротивление."
 shroud.4145.desc_1.common_2: "Но это неважно — мы не станем ждать, пока другие примут §RКонец цикла§!."
 shroud.4145.desc_1.default: "$shroud.4145.desc_1.common_1$ Далекие соседи стремительно обращаются против нас. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_1.homicidal: "$shroud.4145.desc_1.common_1$ Ненависть наших врагов становится всё сильнее. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_2: "Вдохновлённые волей нашего благоволителя, мы разработали новые способы подпитывать ауру энергией и материей. Мы можем принести в жертву саму ткань мироздания ради торжества Конца."
 shroud.4145.a: "Мы сделаем всё необходимое."
 shroud.4145.a.tooltip: "$eotc_opinion_modifier_3_tooltip$\nОткрываются указы:\n$t$• ['edict:annihilation_of_matter', $edict_annihilation_of_matter$]\n$t$• ['edict:annihilation_of_energy', $edict_annihilation_of_energy$][GetDimensionalCollapseEdictGain]"
 shroud.4145.dimensional_collapse: "\n$t$— ['edict:dimensional_collapse', $edict_dimensional_collapse$]"
 triggered_opinion_eotc_situation_stage3: "$triggered_opinion_eotc_situation_stage2$"
 shroud.4150.title: "Пришествие Конца"
 shroud.4150.desc: "Наш благоволитель говорит без слов. Чувствуя близящийся конец цикла, мы ощущаем прилив энергии, пронизывающий [This.GetName&acc]. Нами овладевает неумолимая решимость.\n\nЕсли мы хотим исполнить волю Конца, то все [This.GetSpeciesNamePlural] должны направить свою энергию к одной цели. Мы должны явить силу нашего благоволителя и распространить его ауру до самых дальних уголков галактики."
 shroud.4150.a: "Время настало."
