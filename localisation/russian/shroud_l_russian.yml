 policy_psionic_choir: "Псионический хор"
 policy_psionic_choir_desc: "Телепаты собираются, чтобы слиться в гармонии с энергиями Покрова. Их мелодии резонируют среди псионического населения государства, направляя и поддерживая их усилия."
 song_of_calming: "Песнь успокоения"
 song_of_calming_desc: "Псионическая баллада, усмиряющая разум.\n\n"
 song_of_plenty: "Песнь изобилия"
 song_of_plenty_desc: "Псионическая ода щедрости природы.\n\n"
 song_of_steel: "Песнь стали"
 song_of_steel_desc: "Псионический гимн во славу промышленности.\n\n"
 song_of_luxury: "Песнь роскоши"
 song_of_luxury_desc: "Псионическая песнь блаженного упоения.\n\n"
 song_of_knowing: "Песнь знания"
 song_of_knowing_desc: "Псионический резонанс сложных узоров и ритмов.\n\n"
 policy_psionic_suppression_policy: "Псионическое подавление"
 policy_psionic_suppression_policy_desc: "Эта политика определяет, будем ли мы разбирать устройства для подавления псионических аур, когда получаем контроль над системой."
 psionic_suppression_dismantle: "Разобрать"
 psionic_suppression_dismantle_name: "$psionic_suppression_dismantle$"
 psionic_suppression_dismantle_desc: "Устройства для подавления псионических аур будут автоматически разобраны."
 psionic_suppression_allow: "Разрешить"
 psionic_suppression_allow_name: "$psionic_suppression_allow$"
 psionic_suppression_allow_desc: "Устройства для подавления псионических аур останутся на месте."
 shroud.80.title: "Псионическое подавление прекращено"
 shroud.80.desc: "Получив контроль над системой §H[from.GetName]§!, мы обнаружили и немедленно разобрали машины, способные подавлять нашу псионическую ауру."
 shroud.80.a: "Теперь наш разум свободен."
