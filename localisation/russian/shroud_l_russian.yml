 job_test_subject: "Подопытный"
 job_test_subject_plural: "Подопытные"
 job_test_subject_desc: "Осуждённые преступники, которые теперь исполняют роль живых подопытных для технологических экспериментов."
 job_test_subject_effect_desc: "£job_test_subject£ $job_test_subject_plural$ используются, чтобы производить $r_research$ и $i_amenities$"
 mod_job_test_subject_add: "Должности подопытных"
