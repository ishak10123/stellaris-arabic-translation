 job_experiment_engineer: "Инженер-экспериментатор"
 job_experiment_engineer_plural: "Инженеры-экспериментаторы"
 job_experiment_engineer_desc: "Эти элитные исследователи проводят эксперименты на живых подопытных, набранных из криминального мира, не оглядываясь на «жестокость» методов."
