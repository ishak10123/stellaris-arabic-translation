 superstitious_beliefs_priest: "$job_superstitious_beliefs_priest$"
 job_superstitious_beliefs_priest_icon: "£job_superstitious_beliefs_priest£"
 # Superstitious Beliefs Priests (Corporate)
 job_superstitious_beliefs_priest_corporate: "Предсказатель"
 job_superstitious_beliefs_priest_corporate_plural: "Предсказатели"
 job_superstitious_beliefs_priest_corporate_desc: "Используя древние мистические практики, эти евангелисты бренда предоставляют коммерческие прогнозы, недоступные обычному анализу рынка."
 job_superstitious_beliefs_priest_corporate_effect_desc: "$job_superstitious_beliefs_priest_corporate_icon$ $job_superstitious_beliefs_priest_corporate_plural$ превращают $i_consumer_goods$ в $i_unity$, $i_trade_value$ и $i_stability$"
 superstitious_beliefs_priest_corporate: "$job_superstitious_beliefs_priest_corporate$"
