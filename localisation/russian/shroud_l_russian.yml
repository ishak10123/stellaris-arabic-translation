 # Energy Thralls (Normal)
 job_energy_thrall: "Энергетический невольник"
 job_energy_thrall_plural: "Энергетические невольники"
 job_energy_thrall_desc: "Избыточная энергия населения направляется на поддержание качественного управления. Каждый энергетический невольник оснащён калиброванным сифоном, собирающим жизненную силу в удобные для транспортировки энергоячейки."
 job_energy_thrall_effect_desc: "£job_energy_thrall£ $job_energy_thrall_plural$ производят $i_unity$, £mod_leader_species_exp_gain£ §Y$MOD_LEADER_SPECIES_EXP_GAIN$§!, а также снижают §Yштрафы к приросту населения§! от указов §Y«$edict_energy_drain$»§! и §Y«$edict_sanguine_council$»§! на §G0,02%§!.\n\n"
 mod_job_energy_thrall_add: "Должности энергетических невольников"
 # Energy Thralls (Gestalt)
 job_drone_energy_thrall: "Энергетическая единица"
 job_drone_energy_thrall_plural: "Энергетические единицы"
 job_drone_energy_thrall_desc: "Бездействующие сознания можно перенаправить на поддержку узлов управления. Каждая энергетическая единица оснащена калиброванным сифоном, собирающим неиспользованную энергию в удобные для транспортировки энергоячейки."
 job_drone_energy_thrall_effect_desc: "£job_energy_thrall£ $job_drone_energy_thrall_plural$ производят $i_unity$, $i_leader_exp_gain$, а также снижают §Yштрафы к сборке поселений§! от указов §Y«$edict_energy_drain$»§! и §Y«$edict_sanguine_council$»§! на §G0,02%§!."
 mod_job_drone_energy_thrall_add: "Должности энергетических единиц"
 planet_energy_thralls: "Должности поглотителей энтропии"
