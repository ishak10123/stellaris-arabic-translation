 #==========================
 # Tutorials
 #==========================
 TUTORIAL_SHROUD_TAB_TITLE: "Обучение: $THE_SHROUD_TITLE$"
 TUTORIAL_SHROUD_TAB_DESC: "Это вкладка §SПокрова§!. На панели слева отображается положение нашего государства в Покрове, представленное §Sвладениями§! четырех псионических сущностей, известных как §Sблаговолители§!.\n\nНаше положение определяется §Sсонастроенностью§!, которая увеличивается, когда наши действия в материальном мире находят одобрение благоволителя. Копите сонастроенность, чтобы начать раскрывать личность благоволителя. Познакомившись с ним, нажмите на владение благоволителя, чтобы открыть его панель.\n\nНажмите §S$DELVE$§! или щелкните в центре панели слева, чтобы войти в Покров и исследовать псионическое измерение. Во время исследования наши открытия могут зависеть от уровня сонастроенности во владениях."
 TUTORIAL_SHROUD_PATRON_TITLE: "Обучение: Благоволители Покрова"
 TUTORIAL_SHROUD_PATRON_DESC: "Панель §Sблаговолителя§! содержит информацию и варианты взаимодействия с ним. Выполняйте задачи, предлагаемые §Sвоззваниями§! и §Sдеяниями§!, чтобы увеличить §Sсонастроенность§! с конкретной сущностью.\n\nПовышение сонастроенности открывает §Sсозвучия§!, дающие преимущества нашему государству. Высокая сонастроенность с благоволителем позволяет заключить §Sдоговор§!, который даст еще более мощные эффекты."
 TUTORIAL_SHROUD_COVENANT_TITLE: "Обучение: Договоры"
 TUTORIAL_SHROUD_COVENANT_DESC: "Заключение §Sдоговора§! с благоволителем Покрова открывает доступ к §Sсилам договора§!. $tutorial.shroud_covenant.shared$"
 tutorial.shroud_covenant.shared: "Нажмите на значок силы договора, чтобы активировать ее эффекты, потратив £sr_zro£ §Sзро§!. Это можно сделать как на главной панели Покрова, так и на панели отдельного благоволителя.\n\nПосле активации должно пройти какое-то время, прежде чем силу договора можно будет использовать снова."
 TUTORIAL_SHROUD_SHAPING_TITLE: "Обучение: Формирование Покрова"
 TUTORIAL_SHROUD_SHAPING_DESC: "Теперь мы можем получать возможности, которые обычно требуют заключить §Sдоговор§! с §Sблаговолителем§!.\n\nПосле открытия обоих §Sсозвучий§! благоволителя мы получим доступ к силе §Sдоговора§!. $tutorial.shroud_covenant.shared$"
 tutorial.2600.name: "Обучение: $PSIONIC_AURA_PLURAL$"
 tutorial.2600.desc: "Наши колонии с псионическим населением теперь могут излучать §Sпсионическую ауру§!. Эта аура исходит от §Sблаговолителя Покрова§!, с которым у нас наибольшая §Sсонастроенность§!.\n\n$PSIONIC_AURA_PLURAL$ оказывают различные эффекты на наше государство, а также могут влиять как на врагов, так и на союзников. Чтобы расширить зону действия ауры, необходимо усилить сонастроенность с благоволителем и открыть технологию £research£ §S$tech_aura_intensification$§!.\n\nЧтобы увидеть эффекты ауры, откройте вкладку §SПокрова§! или наведите курсор на значок ауры на панели в нижней части £interface£ §Sобзора системы§!."
 tutorial.2610.name: "Обучение: Усиление ауры"
 tutorial.2610.desc: "Теперь мы можем повышать §Sинтенсивность§! нашей §Sпсионической ауры§!, распространяя ее на другие системы.\n\nУ аур может быть три порога интенсивности с возрастающими эффектами. При достижении нового уровня или максимума интенсивности аура попытается распространиться на соседние системы. У большей части аур ограниченный радиус распространения.\n\nИнтенсивность ауры можно повысить разными способами: за счет большого псионического населения, уровня £happiness£ §Sсчастья§!, должностей £job_telepath£ [GetTelepathPlural&gen], а также благодаря губернаторам или £leader£ лидерам £sector£ секторов с псионическими способностями."
 tutorial.2620.name: "Обучение: Столкновение аур"
 tutorial.2620.desc: "Наша §Sпсионическая аура§! столкнулась с другой аурой в соседней системе. В таком случае ауры могут вступить в противостояние, по результатам которого станет ясно, какая из них распространится дальше.\n\nЭто зависит от ежемесячного прироста §Sинтенсивности§! аур; его можно увидеть, наведя курсор на значок ауры на панели в нижней части £interface£ §Sобзора системы§!."
 #==========================
 # Technologies
 #==========================
 tech_psionic_aura: "$PSIONIC_AURA$"
 tech_psionic_aura_desc: "Псионические волны из Покрова воплощают благосклонность сущности в материальной реальности. Государство, настроенное на благоволителя из Покрова, будет излучать псионическую ауру в местах скопления своего псионического населения."
 feature_unlock_psionic_aura: "$PSIONIC_AURA_PLURAL$"
 feature_unlock_psionic_aura_desc: "Позволяют государству, связанному с благоволителем из Покрова, излучать псионическую ауру в местах скопления псионического населения."
 psionic_aura_delve_success_tt: "Вероятность успешного погружения: §G+$@delve_success_tier_1|0$%§!"
 tech_aura_intensification: "Усиление псионической ауры"
 tech_aura_intensification_desc: "Псионические волны из Покрова стремятся расшириться. Благодаря углубленному пониманию, псионические ауры государства могут усиливаться и распространяться по звёздным системам, принося пользу союзникам и создавая проблемы врагам."
 feature_allow_psionic_aura_intensity_spread: "Распространение псионической ауры"
 feature_allow_psionic_aura_intensity_spread_desc: "Позволяет псионическим аурам распространяться на соседние системы на расстоянии вплоть до §Y[Owner.GetAuraHyperlaneRange]§! гиперкоридоров от источника излучения."
 feature_allow_psionic_aura_intensity_growth: "Рост псионической ауры"
 feature_allow_psionic_aura_intensity_growth_desc: "Позволяет псионическим аурам усиливаться."
 aura_intensification_delve_success_tt: "Вероятность успешного погружения: §G+$@delve_success_tier_2|0$%§!"
 tech_psionic_suppression: "Псионическое подавление"
 tech_psionic_suppression_desc: "Устройства, ослабляющие псионическую энергию, так же трудно создать, как и понять. Такова сложность обращения с порождениями других измерений."
 tech_psionic_suppression_feature_tt: "$i_unlocks_feature$ Позволяет строить §Yпечати Покрова§! и §Yпсионические подавители§!."
 tech_aura_resonation: "Резонанс ауры"
 tech_aura_resonation_desc: "Существует способ проецировать псионические ауры за пределы заселённых миров. Благодаря излучателю ауры даже космическая станция может стать проводником псионических волн из Покрова."
 tech_materiality_engine: "$building_materiality_engine$"
 tech_materiality_engine_desc: "$building_materiality_engine_desc$"
 tech_psionic_bombers: "Псионические бомбардировщики"
 tech_psionic_bombers_desc: "Эти манёвренные корабли специализируются на доставке концентрированных зарядов псионической энергии. Чем крупнее цель, тем мощнее резонанс и сила взрыва."
 tech_bio_psionic_bombers: "$tech_psionic_bombers$"
 tech_psionic_lightning: "Псионическая молния"
 tech_psionic_lightning_desc: "Создавая временную псионическую связь между двумя кораблями, по этому каналу можно пропустить прямой заряд ментальной энергии с сокрушительным эффектом. Подобная грубая сила способна нарушать работу систем корабля и влиять на разум экипажа."
 tech_bio_psionic_lightning: "$tech_psionic_lightning$"
 ship_terrify_tt: "Шанс ['concept_terrify', запугать] военные корабли на £time£ §Y5-10§! дней в зависимости от размера цели"
 concept_terrify: "Запугивание"
 concept_terrify_desc: "Запуганные корабли перестанут атаковать и попытаются сбежать от противника."
 tech_psionic_disruptor: "Псионические дезинтеграторы"
 tech_psionic_disruptor_desc: "Эти высокотехнологичные дезинтеграторы пропускают мощный луч псионической энергии сквозь корпуса вражеских кораблей, позволяя точечно выводить из строя вооружение противника."
 tech_bio_psionic_disruptor: "$tech_psionic_disruptor$"
 tech_zro_launcher: "Пусковые установки на зро"
 tech_zro_launcher_desc: "Эти высококонцентрированные гранулы зро беспрепятственно проходят сквозь вражеские щиты, перемещаясь между реальностями. При контакте с физическим объектом разрушительный эффект возрастает в геометрической прогрессии."
 tech_bio_zro_launcher: "$tech_zro_launcher$"
