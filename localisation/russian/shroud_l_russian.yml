 shroud.11225.title: "Неожиданное исчезновение"
 shroud.11225.desc.common_1: "В одно мгновение всё пропало.\n\nЗловещая §Rаура Конца§!, присутствовавшая в наших системах, внезапно исчезла — и унесла всё с собой. Целые звезды коллапсировали в черные дыры, планеты испарились, и на их месте осталась лишь гробовая тишина."
 shroud.11225.desc.common_2: "Безумие, породившее такую разрушительную силу, навсегда останется загадкой."
 shroud.11225.desc.default: "$shroud.11225.desc.common_1$\n\n$shroud.11225.desc.common_2$"
 shroud.11225.desc.mitigated: "$shroud.11225.desc.common_1$ Похоже, наши попытки противостоять ауре смягчили ее воздействие, сохранив то немногое, что уцелело.\n\n$shroud.11225.desc.common_2$"
 shroud.11225.a: "Как это вообще возможно?"
