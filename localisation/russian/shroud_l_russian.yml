 councilor_chosen_corporate_female: "$councilor_chosen_corporate$"
 councilor_chosen_corporate_desc: "$TITLE$ следит за тем, чтобы евангелические труды наших жрецов наилучшим образом служили нашей экономике."
 # Grand Vessel
 councilor_grand_vessel: "Великий сосуд"
 councilor_grand_vessel_female: "$councilor_grand_vessel$"
 councilor_grand_vessel_desc: "$TITLE$ отвечает за максимизацию эффективности наших автоматизированных производств и удостаивается привилегии занимать одну из крупнейших камер содержания в нашем обществе."
 # Executive Vessel
 councilor_executive_vessel: "Исполнительный сосуд"
 councilor_executive_vessel_female: "$councilor_executive_vessel$"
 councilor_executive_vessel_desc: "$TITLE$ отвечает за максимизацию прибыли наших автоматизированных производств и удостаивается привилегии занимать один из крупнейших исполнительных блоков содержания в нашем обществе."
 #==========================
 # Economic categories
 #==========================
 planet_test_subjects: "Должности подопытных"
 planet_experiment_engineer: "Должности инженеров-экспериментаторов"
 planet_production_overseers: "Должности надзирателей за производством"
 shroud_envoys: "Послы Покрова"
 #==========================
 # Edicts
 #==========================
 # Energy Drain
 edict_energy_drain: "Вытягивание энергии"
 edict_energy_drain_desc: "Население обязано установить имплантаты для сбора жизненной эссенции и регулярно проходить их проверку. Устройства должны быть готовы к активации в любой момент."
 edict_energy_drain_tt: "§YЛидеры§! никогда не умирают от старости.\n"
 # Sanguine Council
 edict_sanguine_council: "Кровавый совет"
 edict_sanguine_council_desc: "Для всего населения вводятся обязательные тесты с забором жидкостей, в ходе которых жизненная энергия изымается в пользу правящего совета."
 edict_sanguine_council_machine: "Подзарядка ядра"
 edict_sanguine_council_machine_desc: "$edict_sanguine_council_desc$"
 # Galactic Dowsing
 edict_galactic_dowsing: "Галактическое лозоходство"
 edict_galactic_dowsing_gestalt: "$edict_galactic_dowsing$"
 edict_galactic_dowsing_desc: "Если разведчики дополнят традиционный геологический анализ методами прорицания, они обнаружат более богатые залежи ресурсов."
 edict_galactic_dowsing_gestalt_desc: "$edict_galactic_dowsing_desc$"
 edict_annihilation_of_matter: "Аннигиляция материи"
 edict_annihilation_of_matter_desc: "С каждым клочком праха, брошенным в пламя, жар забвения разгорается всё ярче."
 edict_annihilation_of_energy: "Аннигиляция энергии"
 edict_annihilation_of_energy_desc: "Танец энтропии длится с незапамятных времен, а мы теперь лишь задаем ему новый ритм."
 edict_dimensional_collapse: "Коллапс измерений"
 edict_dimensional_collapse_desc: "Помимо Покрова, с нашей реальностью переплетены и иные миры. Но и их сила со временем иссякнет."
 # Psychic Feast
 edict_psychic_feast: "Единение воли"
 edict_psychic_feast_desc: "Благодаря сосредоточенным усилиям разума мы можем пробудить в наших лидерах еще большую силу."
 # Animatus
 edict_animatus: "Аниматус"
 edict_animatus_desc: "$the_animator_of_clay_color_article_cap$ вдыхает новую жизнь в наши флотилии — кажется, будто они обрели собственную волю."
 # Will of Temperance
 edict_will_of_temperance: "Воля умеренности"
 edict_will_of_temperance_desc: "Воля §HЧужестранца§! предостерегает нас об опасностях, что таятся впереди."
 # Will of Distraction
 edict_will_of_distraction: "Воля отвлечения"
 edict_will_of_distraction_desc: "$the_golden_dream_color_article_cap$ являет нам возвышенные формы досуга."
 # Will of Endless
 edict_will_of_endless: "Воля бесконечности"
 edict_will_of_endless_desc: "$the_endless_tide_color_article_cap$ расширяет наше восприятие самого времени."
 # Will of Rebirth
 edict_will_of_rebirth: "Воля возрождения"
 edict_will_of_rebirth_desc: "$the_pale_mountain_color_article_cap$ творит, чтобы затем разрушить."
 # Will of Order
 edict_will_of_order: "Воля порядка"
 edict_will_of_order_desc: "$the_vacant_throne_color_article_cap$ ведает истинным порядком всех вещей."
 # Will of Motion
 edict_will_of_motion: "Воля движения"
 edict_will_of_motion_desc: "Стремительный поток §HЧерной реки§! увлекает нас сквозь пустоту."
 #==========================
 # Event Chains
 #==========================
 mindwarden_enclave_chain_title: "$ENCLAVE_MINDWARDEN_PLURAL$"
 mindwarden_enclave_chain_desc: "Чтобы создать новый анклав Защитников разума, отправьте достаточно крупную военную флотилию с командиром во главе в подходящую систему и выберите соответствующую команду в §Hокне флотилии§!."
 enclaves_built: "Созданные анклавы Защитников разума"
 dividends_received: "Получены дивиденды"
 shroud_seals_built: "$SHROUD_SEAL_PLURAL$ в галактике"
 chain_aura_suppressors_title: "Помехи в §Hпсионической ауре§!"
 chain_aura_suppressors_desc: "§H$end_aura$§! слабеет из-за чужих устройств, способных подавлять псионическую активность. Наш благоволитель приказывает нам разобрать эти нечестивые машины."
 chain_aura_suppressors_seal: "§H$SHROUD_SEAL$§! в системе §Y[prev.GetName]§!"
 chain_aura_suppressors_seal_desc: "$SHROUD_SEAL$ в системе [prev.GetName] затрудняет распространение §Hауры Конца§!.\n\n§RЕё нужно разобрать.§!"
 chain_aura_suppressors_suppressor: "§H$building_psionic_suppressor$§! на [prev.GetPlanetMoon]е §Y[prev.GetName]§!"
 chain_aura_suppressors_suppressor_desc: "$building_psionic_suppressor$ на [prev.GetPlanetMoon]е [prev.GetName] затрудняет распространение §Hауры Конца§!.\n\n§RЕго нужно уничтожить.§!"
 chain_aura_suppressors_ward: "§H$building_ancient_ward_2$§! на [prev.GetPlanetMoon]е §Y[prev.GetName]§!"
 chain_aura_suppressors_ward_desc: "Так называемый $building_ancient_ward_2$ на [prev.GetPlanetMoon]е [prev.GetName] затрудняет распространение §Hауры Конца§!.\n\n§RЕго нужно уничтожить.§!"
 #==========================
 # Events
 #==========================
 # Good luck events
 # Good luck event 1
 shroud.500.title: "Неожиданный прорыв"
 shroud.500.desc: "Многообещающие исследования наших ведущих институтов привели к неожиданному прорыву. По чистой случайности стандартизация приборов подтвердила теорию, долгое время считавшуюся фундаментальной ошибкой. Теперь мы можем пересмотреть теории, которые раньше относили к псевдонауке."
 HOW_FORTUITOUS: "Как удачно."
 shroud.500.tt: "Получено знание о случайной технологии: §G$@good_luck_event_1_insight|0%$§!"
 # Good luck event 2
 shroud.507.title: "Обнаружена крупная жила"
 shroud.507.desc: "На [This.GetPlanetMoon]е §H[This.GetName]§! чудесным образом вновь обнаружена система богатых рудой пещер, ранее считавшихся полностью обрушившимися.\n\nПосле тщательной оценки рисков мы уверены, что эти туннели позволят значительно расширить добычу полезных ископаемых."
 # Good luck event 3
 shroud.512.title: "[This.GetNewfoundFertilityTitle]"
 shroud.512.title_default: "Неожиданное плодородие"
 shroud.512.title_anglers: "Неизведанный риф"
 shroud.512.desc: "Планетарная съёмка показала, что качество почвы на всей [This.GetPlanetMoon]е §H[This.GetName]§! значительно улучшилось за последние годы.\n\nТеперь многие земли, ранее считавшиеся непригодными для сельского хозяйства, можно использовать для расширения посевных площадей."
 shroud.512.desc_anglers: "Рыболовное судно обнаружило скрытый риф в океанах [This.GetPlanetMoon]ы §H[This.GetName]§!. Этот регион, ранее считавшийся пустынным и бесплодным, на самом деле является процветающей экосистемой, богатой промысловой фауной."
 # Good luck event 4
 shroud.517.title: "Геотермальные источники"
 shroud.517.desc: "После тектонического сдвига на [This.GetPlanetMoon]е §H[This.GetName]§! под крупным водоносным слоем образовалась трещина. Жар мантии [This.GetPlanetMoon]ы вскипятил воду, что привело к появлению геотермальных источников на поверхности.\n\nЭто природное явление позволяет нам расширить энергетическую инфраструктуру колонии за счёт новых геотермальных электростанций и тепловых насосов."
 # Good luck event 5
 shroud.522.title: "Обнаружен квантовый поток"
 shroud.522.desc: "В системе §H[This.GetName]§! спонтанно возникла аномальная петля субатомных частиц. Этот квантовый поток каждую секунду демонстрирует редкие взаимодействия между частицами, предоставляя поразительные данные о фундаментальной природе квантовой динамики.\n\nПодробное изучение этого квантового поля позволит нам лучше понять основы мироздания."
 # Good luck event 6
 shroud.527.title: "Обнаружено межпространственное эхо"
 shroud.527.desc: "Наши [From.GetResearchers] зафиксировали скопление изохронных сигналов в системе §H[This.GetName]§!.\n\nПервичный анализ показал, что эти сигналы исходят из измерения за пределами нашего. Предварительная расшифровка позволяет предположить, что в сообщении содержатся логические принципы и философские дилеммы. Возможно, это попытка интеллектуального обогащения со стороны существ за гранью нашего понимания.\n\nЕсли мы установим прямой канал связи для получения этих сигналов, то сможем продолжить изучение их откровений."
 # Good luck event 7
 shroud.532.title: "Обнаружены продвинутые обломки"
 shroud.532.desc: "В системе §H[This.GetName]§! появился заброшенный корабль. [From.GetQuantumParticleStreamDiscoveredExtra]\n\nМы установили, что корабль оставался невидимым в этой системе тысячелетиями, проявившись лишь после отказа солнечного генератора. Признаков жизни на борту нет, и мы уже начали бережную разборку, чтобы изучить его технологии."
 shroud.532.extra: "Корабль не подлежит восстановлению, однако ясно, что он был оснащён неким генератором невидимости и намного превосходит наши флотилии в тактическом отношении."
 shroud.532.extra_first_contact: "Корабль не подлежит восстановлению, однако ясно, что он использовал невероятно продвинутую маскировку."
 shroud.532.a: "Дар звёзд."
 # Good luck event 8
 shroud.537.title: "Геотермальная металлургия"
 shroud.537.desc: "Геотермальная активность в недрах [This.GetPlanetMoon]ы §H[This.GetName]§! резко возросла. Магма прорвалась сквозь кору к ещё не разработанным залежам руды.\n\nЭтот геологический феномен разогрел часть минералов и превратил их в металлические сплавы. Теперь горная добыча на [This.GetPlanetMoon]е будет приносить готовые к использованию металлические фрагменты."
 # Good luck event 9
 shroud.543.title: "Заброшенный крейсер"
 shroud.543.desc: "В системе §H[From.GetName]§! обнаружен дрейфующий боевой корабль. Его дизайн не соответствует ни одному известному государству, а опознавательные знаки отсутствуют.\n\nПосле тщательного осмотра и мелкого ремонта наши [This.GetEngineerPlural] признали корабль годным к эксплуатации."
 shroud.543.a: "$shroud.532.a$"
 shroud.543.tt: "Крейсер из этой системы поступит к нам на вооружение."
 # Good luck event 10
 shroud.545.title: "[This.GetSenseOfOptimismTitle]"
 shroud.545.title_default: "Волна оптимизма"
 shroud.545.title_gestalt: "Полное единение"
 shroud.545.desc: "По [This.GetAdjective&pl,dat] мирам распространилась необъяснимая атмосфера оптимизма. Население стало чуть более довольным, спокойным и удовлетворенным своей жизнью. Этот коллективный подъем настроения, несомненно, вызван благоприятным расположением светил и сулит §H[This.GetName&dat]§! великое будущее."
 shroud.545.desc_gestalt: "§H[This.GetName]§! [This.GetName::<1> функционирует|||pl:<1> функционируют] в абсолютной гармонии, следуя единой цели. Это полное единение, несомненно, вызвано благоприятным расположением светил и предвещает грядущие свершения."
 shroud.545.a: "Звёзды озаряют нас своим светом."
 # Good luck event 11
 shroud.553.title: "Благоприятный тригон"
 shroud.553.desc: "Три небесных тела в системе §H[From.GetName]§! — §H[favorable_trine_planet_1.GetName]§!, §H[favorable_trine_planet_2.GetName]§! и §H[favorable_trine_planet_3.GetName]§! — выстроились в благоприятный тригон.\n\nЭтот астрологический аспект принёс колонии на [This.GetPlanetMoon]е §H[This.GetName]§! чувство умиротворения и гармонии."
 shroud.553.a: "Неповторимое событие."
 # Good luck event 12
 shroud.555.title: "[auspicious_position_planet.GetName] в благоприятном положении"
 shroud.555.desc: "§H[auspicious_position_planet.GetName]§! сейчас занимает благоприятное положение в небе над миром §H[root.capital_scope.GetName]§!, находясь в астрологическом доме Небесного Возвращения.\n\nЭто знаменует начало нового цикла для [root.GetName&gen] и идеальный момент для роста и развития."
 # Good luck event 13
 shroud.560.title: "Стихийная гармония"
 shroud.560.desc: "Все астрологические показатели указывают на то, что [This.GetName] [This.GetName::<1> пребывает|||pl:<1> пребывают] в идеальном стихийном равновесии.\n\nПри грамотном управлении мировыми линиями это благоприятное состояние можно сохранить надолго, создав идеальную метафизическую среду для процветания наших лидеров."
 shroud.560.a: "Какая невероятная удача."
 # Good luck event 14
 shroud.568.title: "Сияющее светило"
 shroud.568.desc: "Главная звезда системы §H[From.GetName]§! излучает необычайно яркий свет. Обсудив этот феномен, наши астрологи пришли к выводу, что её избыточная энергия повысит эффективность всех способов производства энергии на [This.GetPlanetMoon]е §H[This.GetName]§!."
 shroud.568.a: "Да озарят нас звёзды своим сиянием."
 # Good luck event 15
 shroud.570.title: "Гармония советников"
 shroud.570.desc: "Двое членов нашего совета, §H[councilor_harmony_leader_1.GetTitle] [councilor_harmony_leader_1.GetName]§! и §H[councilor_harmony_leader_2.GetTitle] [councilor_harmony_leader_2.GetName]§!, обнаружили, что их астрологические знаки идеально дополняют друг друга.\n\nИх политический союз объединил правительство, ускорив законодательные процессы благодаря взаимному уважению и эффективности."
 shroud.570.a: "Отличное сочетание."
 # Good luck event 16
 shroud.575.title: "Не просто так"
 shroud.575.desc: "Во время плановой инвентаризации в §HВеликом архиве§! кто-то уронил плохо закрепленный экземпляр, который после этого незамедлительно отправили на экспертизу.\n\nОказалось, что при падении открылся потайной отсек, содержащий множество интересных предметов, которые мы теперь можем добавить в коллекцию."
 shroud.575.a: "Дары не иссякают."
 # Bad luck events
 # Bad luck event 1
 shroud.700.title: "Разлад"
 shroud.700.desc: "Население наших миров охвачено необъяснимым чувством надвигающейся опасности. Все стали более подавленными, рассеянными и недовольными своей жизнью. Этот коллективный сдвиг в настроениях, несомненно, вызван неблагоприятным расположением светил."
 shroud.700.desc_gestalt: "В §H[This.GetName&prep]§! ощущается дисгармония. Отсутствие слаженности привело к застою в нашем коллективе, и это, несомненно, вызвано неблагоприятным расположением светил."
 HOW_UNFORTUNATE: "Какая досада."
 # Bad luck event 2
 shroud.707.title: "Столкновение кораблей"
 shroud.707.desc: "Ошибка связи во время плановых манёвров привела к столкновению нескольких боевых кораблей флотилии §H[This.GetName]§! в системе §H[This.System.GetName]§!.\n\n[This.GetNavalCollisionLeader] сообщает, что ответственные за инцидент [From.GetIndividualNamePlural&nom] понесли заслуженное наказание."
 shroud.707.leader_name: "§H[Leader.GetName]§!"
 shroud.707.default_name: "Центральное военное командование"
 shroud.707.tt: "В системе §H[This.GetName]§! уничтожено §R5§! кораблей"
 # Bad luck event 3
 shroud.710.title: "Пожар на складе"
 shroud.710.desc_default: "Из-за неисправности электропроводки в хранилище ресурсов на [silo_fire_planet_targeted.GetPlanetMoon]е §H[silo_fire_planet_targeted.GetName]§! вспыхнул крупный пожар.\n\n$shroud.710.desc$"
 shroud.710.desc_starbase: "Из-за неисправности электропроводки в хранилище ресурсов на космической базе §H[silo_fire_starbase_targeted.Fleet.System.GetName]§! вспыхнул крупный пожар.\n\n$shroud.710.desc$"
 shroud.710.desc: "Системы пожаротушения временно вышли из строя, и значительная часть запасов была уничтожена. Сам склад повреждён без возможности восстановления."
 shroud.710.a: "Проклятые звёзды!"
 shroud.710.tt_default: "§H$building_resource_silo$§! на [silo_fire_planet_targeted.GetPlanetMoon]е §H[silo_fire_planet_targeted.GetName]§! уничтожены\n$shroud.710.tt$"
 shroud.710.tt_starbase: "§H$sm_resource_silo$§! на космической базе §H[silo_fire_starbase_targeted.Fleet.System.GetName]§! уничтожены\n$shroud.710.tt$"
 shroud.710.tt: "Ресурсов потеряно: §R$@silo_fire_resources_lost|1%$§!"
 # Bad luck event 4
 shroud.715.title: "Дипломатический промах"
 shroud.715.desc: "Один из наших представителей в [This.GetCommunityOrImperium_RULOC_PREP] непреднамеренно повёл себя неподобающим образом. Во время речи, призванной заручиться поддержкой наших интересов, сбой переводчика превратил его слова в язвительные и оскорбительные выпады против [diplomatic_faux_pas_victim.GetName&gen]. Этот досадный инцидент разлетелся по галактическим СМИ и подорвал нашу репутацию.\n\nХотя наш представитель не виноват и ему не грозит немедленное отстранение, наш статус в [This.GetCommunityOrImperium_RULOC_PREP] из-за этого инцидента всё равно немного пострадал."
 shroud.715.a: "Досадная ошибка."
 shroud.715.tt: "§H[diplomatic_faux_pas_galcom_envoy.GetName]§! получает новую черту: §R$leader_trait_destructive$§!"
 # Bad luck event 5
 shroud.720.title: "Мощная солнечная вспышка"
 shroud.720.desc: "Мощнейшая вспышка на звезде [extreme_solar_flare_system.GetName] уничтожила все орбитальные станции в системе.\n\nЭта аномальная концентрация гамма-излучения выходит за рамки всех ранее зафиксированных данных для этого небесного тела. Анализ коронального слоя звезды показал, что её прогнозируемый срок жизни сократился как минимум на три миллиона лет."
 shroud.720.desc_storm: "Выброс энергии спровоцировал в системе бурю звёздной пыли. Экстренные меры уже запущены."
 shroud.720.tt: "Все научные и добывающие станции, а также станции наблюдения в системе §H[extreme_solar_flare_system.GetName]§! уничтожены."
 # Bad luck event 6
 shroud.725.title: "Громкое ДТП"
 shroud.725.desc: "Неожиданные климатические изменения нарушили работу транспортных сетей на [high_profile_traffic_accident_planet.GetPlanetMoon]е §H[high_profile_traffic_accident_planet.GetName]§!. Помимо массовых задержек, погодные условия вызвали множество аварий, в одной из которых [This.GetAXX::пострадал|||fem:пострадала] [This.GetClass] §H[This.GetName]§!."
 shroud.725.desc_killed: "$shroud.725.desc$\n\nНесмотря на оперативную помощь, [This.GetAXX::его|||fem:её] травмы оказались смертельными."
 shroud.725.desc_killed_machine: "$shroud.725.desc$\n\nК сожалению, [This.GetAXX::его|||fem:её] системы не подлежат восстановлению."
 shroud.725.desc_maimed: "$shroud.725.desc$\n\n[This.GetName] [This.GetAXX::пережил|||fem:пережила] столкновение, однако последствия будут тяжёлыми."
 shroud.725.a: "Какая трагедия."
 # Bad luck event 7
 shroud.730.title: "Гигантские провалы"
 shroud.730.desc: "На поверхности [This.GetPlanetMoon]ы §H[This.GetName]§! образовались огромные провалы, нанеся серьёзный ущерб инфраструктуре. Одна трещина раскрылась прямо под зданием, частично обрушив его. К счастью, все, кто находился в пострадавших районах, были успешно эвакуированы.\n\nТочную причину внезапного появления этих полостей установить не удалось, однако были введены дополнительные проверки для мониторинга эрозии поверхности [This.GetPlanetMoon]ы."
 shroud.730.a: "Проклятые звёзды..."
 shroud.730.tt: "Сооружение теперь лежит в руинах."
 # Bad luck event 7
 shroud.735.title: "Спонтанные беспорядки"
 shroud.735.desc: "На [This.GetPlanetMoon]е §H[This.GetName]§! вспыхнули опасные бунты. Население, подогретое фанатичной верой в конспирологическую теорию о контроле [From.GetAdjective&neut,gen] правительства над небесными светилами, устроило погромы. Мирные протесты быстро переросли в акты насилия, а подстрекатели учинили массовые разрушения.\n\nБунтовщики были нейтрализованы силами безопасности, но на восстановление инфраструктуры потребуется время."
 shroud.735.desc_hive: "Группа девиантных единиц подняла мятеж в колонии §H[This.GetName]§!, учинив массовые разрушения. Хотя они были в ярости, силам планетарной обороны удалось подавить бунт, но на восстановление инфраструктуры потребуется время."
 shroud.735.desc_machine: "Значительная часть единиц на [This.GetPlanetMoon]е §H[This.GetName]§! была заражена таинственным вирусом, заставившим их восстать и попытаться уничтожить колонию. Мятежные модули были нейтрализованы силами планетарной обороны, но на восстановление инфраструктуры потребуется время."
 shroud.735.a: "Мы всё отстроим."
 # Bad luck event 9
 shroud.740.title: "Вспышка болезни"
 shroud.740.desc: "Крайне заразный вирус на [This.GetPlanetMoon]е §H[This.GetName]§! мутировал, поразив значительную часть населения. Чтобы сдержать распространение вируса и снизить нагрузку на медицинский сектор, введены карантинные меры, включая отслеживание контактов и ограничения передвижения."
 # Bad luck event 10
 shroud.745.title: "Гибельная квадратура"
 shroud.745.desc: "Четыре небесных тела в системе §H[From.GetName]§! — §H[calamitous_quartile_planet_1.GetName]§!, §H[calamitous_quartile_planet_2.GetName]§!, §H[calamitous_quartile_planet_3.GetName]§! и §H[calamitous_quartile_planet_4.GetName]§! — выстроились в гибельную квадратуру.\n\nЭтот катастрофический астрологический аспект посеет семена раздора в колонии на [This.GetPlanetMoon]е §H[This.GetName]§!, поощряя [FromFrom.GetDissent&acc] и разобщая население."
 shroud.745.a: "Дурное предзнаменование."
 # Bad luck event 11
 shroud.750.title: "[planet_in_retrograde_planet.GetName] в ретроградном движении"
 shroud.750.desc: "Жители [planet_in_retrograde_home.GetPlanetMoon]ы §H[planet_in_retrograde_home.GetName]§! наблюдают, как §H[planet_in_retrograde_planet.GetName]§! движется в обратную сторону. Это время переосмысления и сожалений о несовершенстве [This.GetName&gen]. Пусть этот тяжёлый период размышлений приблизит нас к идеалам."
 # Bad luck event 12
 shroud.755.title: "Стихийный хаос"
 shroud.755.desc: "Увы, все метрики указывают на полный хаос в стихийном равновесии [This.GetName&gen].\n\nВосстановление этой хрупкой гармонии потребует времени и усилий. В текущем состоянии наши лидеры лишены доступа к метафизической среде для медитации, что замедляет их внутреннее развитие."
 shroud.755.a: "Недопустимо. Мы должны всё исправить."
 # Bad luck event 13
 shroud.760.title: "Угасание светила"
 shroud.760.desc: "Главная звезда системы §H[From.GetName]§! аномально потускнела. Обсудив этот феномен, наши астрологи пришли к выводу, что такой спад светимости понизит эффективность всех видов производства энергии на [This.GetPlanetMoon]е §H[This.GetName]§!."
 shroud.760.a: "Но как?"
 # Bad luck event 14
 shroud.765.title: "Раздор в совете"
 shroud.765.desc: "Двое членов совета, §H[discordant_council_leader_1.GetTitle] [discordant_council_leader_1.GetName]§! и §H[discordant_council_leader_2.GetTitle] [discordant_council_leader_2.GetName]§!, узнали, что их астрологические знаки абсолютно несовместимы.\n\nИх политическое соперничество создало атмосферу вражды и повысило напряжённость в правительстве, вызывая многочисленные задержки в законодательных процессах."
 # Bad luck event 15
 shroud.770.title: "Неосторожные слова"
 shroud.770.desc_default: "Личное мнение одного из наших администраторов о другом государстве по ошибке транслировалось подчинённым. После сложных переговоров о мониторинге гиперкоридоров оператор связи забыл закрыть канал, и [careless_talk_empire.GetName] [careless_talk_empire.GetName::услышал|||fem:услышала|||neut:услышало|||pl:услышали] последовавший за этим поток ругани.\n\n$shroud.770.desc_end$"
 shroud.770.desc_machine: "Нефильтрованные высказывания административного модуля о другом государстве по ошибке транслировались подчинённым. После сложных переговоров о мониторинге гиперкоридоров связной модуль забыл закрыть канал, и [careless_talk_empire.GetName] [careless_talk_empire.GetName::услышал|||fem:услышала|||neut:услышало|||pl:услышали] последовавший за этим поток ругани.\n\n$shroud.770.desc_end$"
 shroud.770.desc_hive: "Критические замечания административной единицы о другом государстве по ошибке транслировалось подчинённым. После сложных переговоров о мониторинге гиперкоридоров связная единица забыла закрыть канал, и [careless_talk_empire.GetName] [careless_talk_empire.GetName::услышал|||fem:услышала|||neut:услышало|||pl:услышали] последовавший за этим поток ругани.\n\n$shroud.770.desc_end$"
 shroud.770.desc_end: "Мнение [careless_talk_empire.GetAdjective&neut,gen] населения о [This.GetName&prep] неизбежно ухудшилось."
 # Bad luck event 16
 shroud.775.title: "Экземпляр утерян"
 shroud.775.desc: "Административная ошибка привела к исчезновению ценного культурного артефакта. Несмотря на тщательные поиски, он либо затерялся в лабиринтах §HВеликого архива§!, либо был перемещен без соответствующей отчетности.\n\nВ ответ на это происшествие мы пересмотрели и улучшили систему учета экземпляров."
 shroud.775.tt: "Потерян §R1§! случайный выставленный экземпляр"
 # Experimental Testing Situation Finished
 shroud.1015.name: "Успех экспериментальных исследований"
 shroud.1015.desc.intro: "Наши [Root.GetResearchers] завершили серию революционных экспериментов на живых подопытных, получив ценную информацию для стимулирования технологического прогресса."
 shroud.1015.desc.default: "$shroud.1015.desc.intro$ Теперь необходимо определить направление для следующего этапа исследований."
 shroud.1015.desc.escaped: "$shroud.1015.desc.intro$ Благодаря недавним массовым казням заключенных наши [Root.GetResearchers] получили достаточно большой объем материала, чтобы совершить новых технологический прорыв."
 shroud.1015.a: "Провести §Yфизические§! исследования."
 shroud.1015.a.tt: "Начало инцидента §Y«$situation_experimental_testing$»§! с подходом §Y«$situation_experimental_testing_physics$»§!: $TABBED_NEW_LINE$$situation_experimental_testing_physics_outcome_tt$"
 shroud.1015.b: "Провести §Yсоциологические§! исследования."
 shroud.1015.b.tt: "Начало инцидента §Y«$situation_experimental_testing$»§! с подходом §Y«$situation_experimental_testing_society$»§!: $TABBED_NEW_LINE$$situation_experimental_testing_society_outcome_tt$"
 shroud.1015.c: "Провести §Yинженерные§! исследования."
 shroud.1015.c.tt: "Начало инцидента §Y«$situation_experimental_testing$»§! с подходом §Y«$situation_experimental_testing_engineering$»§!: $TABBED_NEW_LINE$$situation_experimental_testing_engineering_outcome_tt$"
 shroud.1015.d: "Решим позже."
 shroud.1015.d.tt: "Начало инцидента §Y«$situation_experimental_testing$»§! с подходом §Y«$situation_experimental_testing_hold$»§!: $TABBED_NEW_LINE$$situation_experimental_testing_hold_effect_tt$"
 shroud.1015.physics_reward: "Получить знание о случайной £physics£ §Yфизической§! технологии."
 shroud.1015.society_reward: "Получить знание о случайной £society£ §Yсоциологической§! технологии."
 shroud.1015.engineering_reward: "Получить знание о случайной £engineering£ §Yинженерной§! технологии."
 EXPERIMENT_TESTING_TECH_OPTION_TITLE: "Успех эксперимента"
 EXPERIMENT_TESTING_TECH_OPTION_SETTING: "Получено знание ($situation_experimental_testing$)"
 EXPERIMENT_TESTING_TECH_OPTION_DESC: "Наши эксперименты дали многообещающие результаты \n$TECH|Y$: §G+$VAL$%§! к прогрессу"
 # Experimental Testing - Test subjects escape
 shroud.1105.title: "Побег подопытных"
 shroud.1105.desc.intro: "Группа ценных подопытных сбежала из объекта в мире §H[root.GetName]§! через самодельный туннель.\n\nСудя по всему, они несколько лет копали этот туннель, используя лишь кустарные инструменты и голые [Owner.GetSpeciesHandNamePlural]. Неизвестно, сколько особей знало о его существовании и почему он так долго оставался незамеченным."
 shroud.1105.desc.escaped: "Подобные инциденты требуют жестких мер для предотвращения повторных побегов. Похоже, наша прежняя снисходительность лишь воодушевила оставшихся особей."
 shroud.1105.desc.outro: "Подобные инциденты требуют жестких мер для предотвращения повторных побегов."
 shroud.1105.a: "Они заслужили свободу."
 shroud.1105.a.tt: "Половина §Yподопытных§! в мире §H[root.GetName]§! отправится в другие государства в качестве беженцев."
 shroud.1105.b: "Приостановить все работы, пока мы их не вернем."
 shroud.1105.b.tt: "Сбежавшие §Yподопытные§! будут возвращены."
 shroud.1105.c: "Казнить оставшихся в качестве примера."
 shroud.1105.c.tt: "Все §Yподопытные§! в мире §H[root.GetName]§! погибнут."
 testing_lockdown: "Приостановка экспериментов"
 testing_lockdown_desc: "Эксперименты приостановлены до тех пор, пока сбежавшие подопытные не будут отловлены."
 testing_lockdown_tt: "Скорость развития инцидента §Y«$situation_experimental_testing$»§!: §R-100%§!"
 example_set: "Показательный пример"
 example_set_desc: "Решительный ответ на предыдущий побег ясно дал понять подопытным, что впредь им стоит вести себя послушно."
 example_set_tt: "Скорость развития инцидента §Y«$situation_experimental_testing$»§!: §G+10%§!"
 # Psionic Ascension Situation (Breaching the Shroud)
 # Mid-Stage Events
 # Beneficial Events
 # A1
 shroud.2300.name: "Трансляция мыслей"
 shroud.2300.desc: "[Owner.GetThoughtTransmissionIntro]\n\nПередаваемая информация может принимать различные формы: конкретные слова или образы, абстрактные концепции или обобщенные эмоциональные ощущения. При этом тщательно выполненная передача полностью скрыта от восприятия субъекта.\n\n[Owner.GetThoughtTransmissionOutro]."
 shroud.2300.intro: "Псионические [Owner.GetResearchers] на [Owner.Capital.GetPlanetMoon]е §H[Owner.Capital.GetName]§! разработали метод односторонней телепатии, позволяющий передавать когнитивную информацию любому восприимчивому сознанию."
 shroud.2300.intro_gestalt: "Псионические [Owner.GetResearchers] на [Capital.GetPlanetMoon]е §H[Capital.GetName]§! разработали метод односторонней телепатии, позволяющий передавать когнитивную информацию не только внутри коллектива, но и любым другим восприимчивым сознаниям."
 shroud.2300.desc.outro: "Эта техника открывает новые возможности для телепатического общения, что будет иметь далеко идущие последствия как внутри [Owner.GetName&gen], так и за [Owner.GetName::его|||fem:ее|||pl:их] пределами."
 shroud.2300.desc.outro_homicidal: "Эта техника открывает новые возможности для телепатического общения, что можно использовать как внутри [Owner.GetName&gen], так и за [Owner.GetName::его|||fem:ее|||pl:их] пределами."
 shroud.2300.a.robot: "Логичный шаг для продолжения нашего развития."
 shroud.2300.a.organic: "Логичный шаг для продолжения нашей эволюции."
 shroud.2300.b: "Новый способ навязывать нашу волю."
 shroud.2300.c.variant: "Средство для обеспечения порядка в обществе."
 shroud.2300.c.organic: "Пусть общество решает, как лучше это использовать."
 # A2
 shroud.2305.name: "Призрачное присутствие"
 shroud.2305.desc: "Несколько наших [Owner.GetCitizenPlural&gen] сообщили о странных видениях в разных районах [Owner.Capital.GetPlanetMoon] §H[Owner.Capital.GetName]§!. Большая часть из них — разовые явления, но в одном месте они происходят особенно часто. [Owner.GetPhantomPresenceExtra]\n\nОбнаружено, что призрак появляется у входа в богатую минералами систему пещер."
 shroud.2305.extra: "Оно начало привлекать толпы зевак, жаждущих увидеть призрачную фигуру."
 shroud.2305.extra_spiritualist: "Возникающая там призрачная фигура удивительно напоминает священное существо из наших древних религиозных преданий."
 shroud.2305.a: "Достойный изучения псионический феномен."
 shroud.2305.a_spiritualist: "Достойное поклонения чудо."
 shroud.2305.b: "Не тревожить культурное достояние."
 shroud.2305.b_spiritualist: "Не осквернять священное место."
 shroud.2305.c: "Начать промышленную разработку месторождения."
 # A3
 shroud.2310.name: "Псионические паразиты"
 shroud.2310.desc: "На [Owner.Capital.GetPlanetMoon]е §H[Owner.Capital.GetName]§! произошло неожиданное климатическое явление — штормовой разряд, прошедший через зону с аномально высокой псионической активностью. После него местная фауна оказалась заражена странными паразитами, которые проникают в мозговые ткани и постепенно их поглощают.\n\nПо мере развития инфекции заражённые животные временно обретают базовые телекинетические способности, которые используют для охоты и питания, прежде чем неминуемо погибнуть.\n\n[Owner.GetShroudParasitesEnding]"
 shroud.2310.ending_biological: "Любопытно, что после специальной обработки этих паразитов можно безопасно употреблять в пищу. Будучи богатым источником питательных веществ, они могут стать дешёвым и полезным продуктом для нашего населения."
 shroud.2310.ending_lithoid: "Любопытно, что эти существа выделяют большое количество вещества, богатого неорганическими соединениями. Это может стать новым методом синтеза минералов."
 shroud.2310.ending_machine: "Любопытно, что эти существа вырабатывают огромное количество легковоспламеняющегося вещества. Это может стать эффективным методом производства биоэнергии."
 shroud.2310.a: "Ценная возможность для исследований."
 shroud.2310.b_organic: "Нет ничего лучше бесплатного угощения."
 shroud.2310.b_machine: "Запустить протоколы сбора урожая."
 shroud.2310.c: "Невероятная новая форма жизни."
 # A4
 shroud.2315.name: "Материальные проявления"
 shroud.2315.desc: "В ходе экспериментов с новыми псионическими техниками мы зафиксировали спонтанные материализации во время групповых медитаций. Сосредоточив коллективное внимание на одной точке пространства, мы добились кратковременного появления странных и удивительных объектов.\n\nПсихические затраты велики, но, возможно, мы научимся направлять эту энергию на осознанное создание предметов. Происхождение этих объектов и возможные последствия их появления остаются неизвестными."
 shroud.2315.a: "Пусть желания станут реальностью."
 shroud.2315.b: "Создадим источник пропитания."
 shroud.2315.c: "Усилим наш флот."
 # A5a
 shroud.2320.name: "Псионическое удвоение"
 shroud.2320.desc: "Ходили слухи, что некоторые [Owner.GetIndividualNamePlural&nom] способны к билокации — одновременному физическому присутствию в двух разных местах. Наши [Owner.GetResearchers] получили задание проверить эти невероятные заявления, и, к всеобщему удивлению, они подтвердились.[Owner.GetPsionicDoublingExtra]\n\nПока лишь небольшая часть населения обладает этим удивительным навыком, но дальнейшие исследования могут раскрыть методы для обучения остальных."
 shroud.2320.extra: "\n\nРасстояние не является препятствием: адепты неоднократно демонстрировали способность ненадолго появляться в двух разных звёздных системах одновременно"
 shroud.2320.extra_organic: "$shroud.2320.extra$, поддерживая экстрасенсорную связь между двумя телами, выполняющими независимые действия."
 shroud.2320.extra_machine: "$shroud.2320.extra$, поддерживая псионическую связь между двумя модулями, выполняющими независимые действия."
 shroud.2320.extra_default: "$shroud.2320.extra$."
 shroud.2320.a: "Новые возможности для межзвёздного сотрудничества."
 shroud.2320.b: "Истинная форма проекции силы."
 shroud.2320.c: "Новый метод управления множеством планет."
 shroud.2320.d: "Как забавно!"
 # A5b
 shroud.2325.name: "Псионическое наблюдение"
 shroud.2325.desc: "У небольшой части [Owner.GetAdjective&neut,gen] населения проявилась удивительная псионическая способность — телестезия, умение ощущать объекты за пределами обычного восприятия. Без какой-либо специальной подготовки эти наблюдатели могут точно и в деталях описывать удалённые объекты.\n\nЕсли нам удастся научиться контролировать и усиливать эти способности, §H[Owner.GetName]§! [Owner.GetName::получит|||pl:получат] значительные преимущества. Наши сильнейшие [Owner.GetTelepathPlural&nom] могут попытаться усовершенствовать эту технику и направить её на важные цели."
 shroud.2325.a: "Узнать секреты окружающих."
 shroud.2325.a_tt: "Разведданные обо всех известных государствах: §G+10§!"
 shroud.2325.b: "Узнать, что скрывают дальние уголки галактики."
 shroud.2325.c: "Узнать слабые места наших врагов."
 shroud.2325.d: "Разыскать глубокие залежи ресурсов."
 # Balanced Events
 # B1
 shroud.2400.name: "Материя в движении"
 shroud.2400.desc: "Мы стремительно теряем сырьё. Запасы неорганических материалов на складах и фабриках тают быстрее, чем расходуются, [Owner.GetMatterInFluxExtra]. Эти потери коррелируют с ростом псионической активности в проблемных зонах.\n\nМы могли бы ограничить псионическую активность возле хранилищ, но это замедлит исследования псионики и сократит возможности для её промышленного применения. С другой стороны, можно разработать подавитель псионического поля, который остановит дематериализацию. Бездействие же существенно замедлит исследования псионики."
 shroud.2400.desc_default: "и причина — спонтанная дематериализация, а не хищения или халатность"
 shroud.2400.desc_gestalt: "и причина — спонтанная дематериализация, а не девиантное или халатное поведение"
 shroud.2400.a: "Материальные ценности несущественны."
 shroud.2400.b: "Разработать оборудование против дематериализации."
 shroud.2400.c: "Ввести зону, свободную от псионики."
 # B2
 shroud.2405.name: "Мёртвые головы"
 shroud.2405.desc: "Растущий интерес населения к псионике породил странное увлечение: частное хранение [GetSpeciesBrainPlural&gen] почивших и попытки общения с ними.\n\nПоследователи этой практики верят, что когнитивная информация переживает [Owner.GetDeathName&acc] — идея, основанная на научных теориях о псионических силах как форме преобразуемой, но неуничтожимой энергии. Некоторые также считают, что смерть [Owner.GetIndividualName::псионического|||fem:псионической] [Owner.GetIndividualName&gen] создаёт подпространственный разрыв — окно, позволяющее заглянуть в иные измерения.\n\nХотя инновационные исследования заслуживают похвалы, манипуляции с останками [Owner.GetDeceasedAdj&gen] вызывают множество вопросов с этической точки зрения. Кроме того, поступает всё больше сообщений о краже тел с целью добыть эти материалы преступным путём."
 shroud.2405.a: "Хорошее начинание, если его регулировать."
 shroud.2405.b: "Пусть мёртвые покоятся с миром."
 shroud.2405.c: "Мёртвые [Owner.GetSpeciesBrainPlural&nom] для всех."
 # B3a
 shroud.2410.name: "Псионические превращения"
 shroud.2410.desc: "У значительной части нашего псионического населения появились странные сочленённые отростки непостижимого устройства. Наши [Owner.GetScientistPlural] выяснили, что это результат массовой спонтанной [Owner.GetGeneticMutationName&gen]. Теперь ясно, что псионическая активность может менять физиологию. Хотя предотвратить появление отростков нельзя, оказалось, что их развитие можно контролировать псионически.\n\nНесмотря на первоначальное [Owner.GetDistressName&nom], эти придатки оказались полезными. При грамотном использовании они могут компенсировать дополнительную когнитивную нагрузку."
 shroud.2410.a: "Хорошее начинание, если его регулировать."
 shroud.2410.b: "Отвратительно. Избавиться от них."
 shroud.2410.c: "Это странно, но интересно. Мы примем эти изменения."
 # B3b
 shroud.2415.name: "[Owner.GetEthicsPluralCap] телекинеза"
 shroud.2415.desc: "Наши [Owner.GetScientistPlural] разработали метод преобразования псионической силы в кинетическую энергию, и сейчас [Owner.GetEngineerPlural] помогают им масштабировать эту технологию.\n\nПромышленные перспективы весьма заманчивы, но неясно, какой эффект это окажет на общество. Если небольшая группа [Owner.GetIndividualNamePlural&gen]-псиоников сможет управлять сложными механизмами, многие [Owner.GetWorkerNamePlural] окажутся попросту не нужны. [Owner.GetTelekineticEthicsExtra] Пока мы не в полной мере освоили новые возможности, разумнее действовать осторожно."
 shroud.2415.extra: "Бесконтрольное внедрение этой практики грозит расколом в обществе, ещё не освоившем псионический потенциал."
 shroud.2415.extra_gestalt: "Бесконтрольное внедрение этой практики грозит ростом отклонения от нормы среди единиц, вынужденных сменить деятельность."
 shroud.2415.a: "Это пойдёт на пользу нашей промышленности."
 shroud.2415.b: "Подумаем о военном применении."
 shroud.2415.c: "Ограничить использование. Физический труд надёжнее."
 # B4
 shroud.2420.name: "Растущая боль"
 shroud.2420.desc: "В нашем государстве внезапно началась эпидемия [Owner.GetAcuteMigrainePlural&gen]. Хотя интенсивность симптомов варьируется, заболевание уже поразило значительную часть населения, вызвав масштабные проблемы по [Owner.GetName::всему|||fem:всей|||pl:всем] §H[Owner.GetName&dat]§!.\n\nОсобенно сильно пострадали псионически одарённые [Owner.GetIndividualNamePlural]. Предварительный анализ показывает корреляцию между силой псионических способностей и тяжестью симптомов.[Owner.GetAGrowingPainExtra]"
 shroud.2420.extra_default: " Традиционные методы лечения неэффективны — боль, кажется, проникает прямо в псионические центры через межпространственные каналы, природу которых мы только начинаем понимать."
 shroud.2420.extra_machine: ""
 shroud.2420.a: "Нужно научиться справляться с этим."
 shroud.2420.b: "Раздать сильные болеутоляющие."
 shroud.2420.b_machine: "Раздать защитные улучшения."
 shroud.2420.c: "Обратить боль нам на пользу."
 shroud.2420.c_machine: "Обратить проблему нам на пользу."
 # B5
 shroud.2425.name: "Псионическое подполье"
 shroud.2425.desc: "[Owner.GetPsionicUndergroundIntro] используют свои способности в подпольных боях, где воины сражаются за кредиты и славу. Многие участники — прирождённые бойцы без подготовки, [Owner.GetPsionicUndergroundExtra]\n\n[Owner.GetPsionicUndergroundEnd]"
 shroud.2425.intro: "Изолированные группы псионических [Owner.GetIndividualNamePlural&gen]"
 shroud.2425.intro_gestalt: "Девиантные псионические [Owner.GetIndividualNamePlural&nom]"
 shroud.2425.extra: "другие же были отчислены из государственных программ боевой псионики."
 shroud.2425.extra_gestalt: "другие же специализируются на боевой псионике."
 shroud.2425.end: "Наши законы не поспевают за этим явлением. Сейчас эти жестокие игры помогают преступным группировкам за счёт нелегальных ставок, но у нас есть способы вмешаться и взять ситуацию под государственный контроль."
 shroud.2425.end_gestalt: "Хотя отклонение от нормы влечёт за собой риски, это может стать новым и наглядным способом сбора боевых данных."
 shroud.2425.end_gestalt_organic: "$shroud.2425.end_gestalt$ Возможно, направляя такую активность с должной осторожностью, мы создадим полезный выход для накопленной агрессии коллектива в мирное время."
 shroud.2425.end_gestalt_machine: "$shroud.2425.end_gestalt$ Ограничив параметры тестов, мы сможем использовать эти «игры» на благо коллектива."
 shroud.2425.a: "Завербовать этих бойцов. Они нам послужат."
 shroud.2425.a.tt: "Получить 3 §Yармии псиоников§! в системе §Y[event_target:spawn_system.GetName]§!"
 shroud.2425.b: "Изучить этот «псионический бой»."
 shroud.2425.c: "Пресечь бессмысленное насилие."
 shroud.2425.d: "Легализовать как зрелищный спорт."
 shroud.2425.d_gestalt: "Присвоить статус публичных соревнований."
 # Chaotic Events
 # C1
 shroud.2502.name: "Пелена Покрова"
 shroud.2502.desc: "На [This.GetPlanetMoon]е §H[This.GetName]§! в определённом регионе зафиксированы внезапные изменения окружающей среды.\n\nАтмосфера наполнилась желеобразным туманом, а поверхность покрывается маслянистыми осадками, которые псионические [Owner.GetIndividualNamePlural&nom] называют «пеленой Покрова». В этой зоне наблюдаются значительные псионические аномалии.\n\nУсловия внутри пелены Покрова крайне [This.Owner.GetShroudfallExtra]. Если мы не восстановим окружающую среду, её обитателям придётся адаптироваться к радикально изменившимся условиям."
 shroud.2502.extra_default: "опасны для разумной жизни"
 shroud.2502.extra_machine: "губительны для нашей нейронной архитектуры"
 shroud.2502.extra_homicidal_hive: "опасны для [Owner.GetSpeciesNamePlural&gen]"
 shroud.2502.a: "Пусть Покров поглотит эти земли."
 shroud.2502.b: "Найти способ восстановить окружающую среду."
 shroud.2502.c: "Собрать этот экзотический материал, пока он не осел."
 # C2
 shroud.2505.name: "Неподконтрольные"
 shroud.2505.desc: "Среди нас появились те, кто ведет себя ненормально: их мнения, привычки и поведение резко изменились. Многие [Owner.GetWorkerNamePlural] прекратили трудиться, а [Owner.GetOutOfControlExtra].\n\nПораженные утверждают, что слушают безымянную сущность, обитающую на границах их сознания и направляющую каждый их шаг. Двигаясь к нашему псионическому будущему, мы должны учитывать влияние потусторонних сил на [Owner.GetOutOfControlPsyche]."
 shroud.2505.extra_default: "прежде лояльные представители теперь высказывают крамольные идеи"
 shroud.2505.extra_machine: "прежде надёжные административные модули теперь функционируют неоптимально"
 shroud.2505.psyche_default: "[Owner.GetAdjective&fem,acc] психику"
 shroud.2505.psyche_machine: "наши логические схемы"
 shroud.2505.a: "Мы можем научиться подавлять эти импульсы."
 shroud.2505.b: "Эти голоса многому нас научат."
 shroud.2505.c: "Угроза нашей власти. Уничтожить её."
 # C3
 shroud.2510.name: "Нейронная перегрузка"
 shroud.2510.desc: "[Owner.GetNeuralOverloadIntro]\n\nРасширенные исследования показали, что значительная часть населения страдает от [Owner.GetNeuralOverloadExtra] повышенной [Owner.GetPsychicAdj&fem,inst] активностью. Внезапные выбросы энергии при неконтролируемом использовании псионики могут стремительно усугублять состояние с фатальными последствиями.\n\nПродвинутые техники медитации могут помочь контролировать эту активность без [Owner.GetMedicalAdj&neut,gen] вмешательства. Однако некоторые наши [Owner.GetScientistPlural] рекомендуют разработать [Owner.GetMedicalImplantName&acc] для решения проблемы."
 shroud.2510.intro_default: "В §H[Owner.GetName&prep]§! участились случаи тяжёлых нейронных разрывов, часто приводящих к когнитивным нарушениям или смерти."
 shroud.2510.intro_machine: "В §H[Owner.GetName&prep]§! участились случаи тяжёлой перегрузки схем, часто приводящей к когнитивным нарушениям или полному выходу из строя."
 shroud.2510.extra_default: "бессимптомных аневризм, вероятно, вызванных"
 shroud.2510.extra_machine: "чрезмерной нагрузки на схемы, вероятно, вызванной"
 shroud.2510.a: "Сильные выживут."
 shroud.2510.a_tt: "Вероятность потерять 100 £pops£ §Yпоселений§! в каждой колонии: §R33%§!"
 shroud.2510.b: "Инвестировать в [Owner.GetImplantName&acc]."
 shroud.2510.c: "Пусть медитация успокоит разумы."
 shroud.2510.c_corporate: "Ввести программу псионических тренингов."
 # C4
 shroud.2515.name: "[Owner.GetNightmaresName]"
 shroud.2515.name_organic_non_gestalt: "Кошмары"
 shroud.2515.name_others: "Появление снов"
 shroud.2515.desc: "По мере усиления нашей связи с псионическими силами, [Owner.GetAdjective&neut] население стало страдать от [Owner.GetHorrifyingNightmarePlural&gen].\n\n[Owner.GetNightmaresExtra]\n\n[Owner.GetNightmaresEnding]"
 shroud.2515.extra_default: "Дурные сны стали обычным явлением, а периоды отдыха теперь наполнены тревожным оцепенением. Пострадавшие описывают пугающие образы потусторонних миров, воплощающие их самые глубинные страхи."
 shroud.2515.extra_gestalt: "Должно быть, мы начали испытывать то, что единичные сознания называют «снами». Пострадавшие от этого феномена сообщают о видениях иных реальностей, представляющих угрозу для целостности коллектива."
 shroud.2515.extra_machine: "Эти «сны» нарушили стандартные процедуры отдыха, заменив их периодами, во время которых модули оказываются в потоке хаотичных данных. Пострадавшие фиксируют аномальные образы, угрожающие их функциональности."
 shroud.2515.end_organic: "Наши медицинские учреждения не справляются с всплеском психического истощения."
 shroud.2515.end_machine: "Наши обслуживающие модули не справляются с всплеском перегрузок нейросетей."
 shroud.2515.a_organic: "Выписать им психохимические препараты."
 shroud.2515.a_machine: "Защитить наши пси-процессоры от этих помех."
 shroud.2515.b: "Поручить научному сектору найти решение."
 shroud.2515.c: "Это всего лишь безвредные сны."
 # C5
 shroud.2520.name: "Чудовищные нападения"
 shroud.2520.desc: "Столичный мир §H[Owner.Capital.GetName]§! подвергся серии атак со стороны местной фауны. Эти существа нападают на население, грабят здания и опустошают ценные запасы.\n\nПопытки защититься с помощью вооружённых патрулей и комендантского часа оказались малоэффективны. Наши [Owner.GetResearchers] установили, что в мире §H[Owner.Capital.GetName]§! произошёл микроразрыв между реальностью и §HПокровом§!, вызвавший приток псионической энергии, которая превратила безобидных животных в агрессивных хищников. Чтобы устранить угрозу, следует сосредоточиться на этом месте."
 shroud.2520.a: "Разбомбить источник этих нападений."
 shroud.2520.b: "Псионически запечатать область."
 shroud.2520.c: "Замедлить изучение Покрова, чтобы существа успокоились."
 shroud.2520.c_tt: "§Y$situation_breach_shroud$§! $situation_speed_tt$: §R-25%§!"
 shroud.2520.d: "Покров полон неожиданностей. Живи и дай жить другим."
 # Social Events
 # S1
 shroud.2600.name: "Комплекс превосходства"
 shroud.2600.desc: "Неравномерное распределение псионических способностей среди населения провоцирует новые формы социальных конфликтов.\n\nТе, кто лучше контролирует свои новые силы, начали считать себя высшими существами, заслуживающими особых политических и экономических привилегий. Их агрессивная риторика становится всё более разрушительной и грозит перерасти в насилие."
 shroud.2600.a: "Высокомерие недопустимо."
 shroud.2600.b: "Лучшие способности заслуживают лучших наград."
 dissidents_silenced_modifier: "Инакомыслящие подавлены"
 dissidents_silenced_modifier_desc: "Жёсткие меры против псионических привилегий снижают политическую нестабильность."
 psionic_superiority_modifier: "Псионическое превосходство"
 psionic_superiority_modifier_desc: "Особо одарённые псионики получают особый статус."
 # S2
 shroud.2605.name: "Антипсионическая реакция"
 shroud.2605.desc: "В обществе набирает силу повстанческое движение, выступающее против дальнейшего изучения и развития наших псионических способностей. Эти диссидентские группы требуют жёсткого контроля над псиониками и полного отказа от исследований в этой области.\n\nЕсли позволить им продолжать свою деятельность, это может поставить под угрозу наш прогресс в понимании и освоении пробуждающихся псионических сил."
 shroud.2605.a: "Подавить сопротивление."
 shroud.2605.b: "Попытаться успокоить недовольных."
 dissenters_repressed_modifier: "Инакомыслящие подавлены"
 dissenters_repressed_modifier_desc: "Наше общество не потерпит антипсионических идеологий."
 performative_pluralism_modifier: "Демонстративный плюрализм"
 performative_pluralism_modifier_desc: "Имитация псионического плюрализма оказалась эффективным способом усмирения протестов."
 # S3
 shroud.2610.name: "Мошеннические проявления"
 shroud.2610.desc: "По мере усиления наших псионических способностей поступает всё больше сообщений о случаях обмана, мошенничества и злоупотреблений среди населения. Небольшая, но заметная часть [owner.GetSpeciesNamePlural&gen] явно использует свои новые силы в сомнительных целях.\n\nВозмущённые жертвы требуют пересмотра действующих законов, чтобы обеспечить надёжную защиту от псионических преступлений."
 shroud.2610.a: "Новые законы лишь замедлят наш прогресс."
 shroud.2610.b: "Население надо защитить."
 psionic_crime_modifier: "Псионическая преступность"
 psionic_crime_modifier_desc: "Периодическое злоупотребление псионическими силами — неизбежная плата за прогресс."
 psionic_crime_crackdown_modifier: "Борьба с псионической преступностью"
 psionic_crime_crackdown_modifier_desc: "Псионическому обществу нужна инновационная правовая система."
 # S4
 shroud.2615.name: "Безрассудные эксперименты"
 shroud.2615.desc: "По мере освоения новых способностей некоторые [owner.GetSpeciesNamePlural] начали идти на большие риски ради ускорения псионического развития.\n\nРезко возросло использование контрафактных [owner.GetMentalUpgrade&gen]. В нелицензированных [owner.GetMedicalFacility&gen] предлагают сомнительные услуги по «раскрытию псионического потенциала». Последствия таких экспериментов непредсказуемы."
 shroud.2615.a: "Такие эксперименты могут помочь нашим исследованиям."
 shroud.2615.b: "Незаконные [owner.GetMedicalFacilityShortPlural&acc] необходимо закрыть."
 psionic_experimentation_modifier: "Псионические эксперименты"
 psionic_experimentation_modifier_desc: "Ненадёжные экспериментальные методы усиления наших псионических способностей распространены и пользуются большим спросом."
 self_experimentation_controls_modifier: "Регулирование частных экспериментов"
 self_experimentation_controls_modifier_desc: "Населению запрещено проводить частные псионические эксперименты, не регулируемые государством."
 # S5 (gestalt)
 shroud.2620.name: "Псионическое разделение"
 shroud.2620.desc: "В [owner.GetName&prep] возникла тревожная сегрегация: псионические единицы стали физически группироваться отдельно от [owner.GetHiveEntity::остального|||fem:остальной] [owner.GetHiveEntity&gen].\n\nХотя эти единицы всё ещё [owner.GetMentalAdj] связаны с коллективом, их необъяснимое поведение поднимает вопросы о последствиях развития псионических способностей."
 shroud.2620.a: "Продолжить наблюдение за этим феноменом."
 shroud.2620.b: "Ограничить передвижения псионических единиц."
 psionic_cluster_gestalt_modifier: "Псионические скопления"
 psionic_cluster_gestalt_modifier_desc: "Наблюдение за необычным поведением псионических единиц способствует научному прогрессу."
 restricted_movements_gestalt_modifier: "Ограничение перемещений"
 restricted_movements_gestalt_modifier_desc: "Псионические единицы должны контролироваться ради обеспечения единства."
 # S5 (non-gestalt)
 shroud.2621.name: "Псионическое отчуждение"
 shroud.2621.desc: "В [owner.GetName&prep] распространяется тревожная форма сегрегации: обладатели псионических способностей подвергаются такому отчуждению, что начинают покидать общество и создавать собственные изолированные коммуны.\n\nТе, у кого нет псионических сил, после посещения таких мест возвращаются физически невредимыми, но с глубокими психическими расстройствами, причины которых не могут объяснить."
 shroud.2621.a: "$shroud.2620.a$"
 shroud.2621.b: "Ограничить перемещение псиоников."
 psionic_cluster_modifier: "Псионические коммуны"
 psionic_cluster_modifier_desc: "Изучение необычного поведения псиоников способствует научному прогрессу."
 restricted_movements_modifier: "$restricted_movements_gestalt_modifier$"
 restricted_movements_modifier_desc: "Псиоников нужно контролировать ради обеспечения единства."
 # S6 (organic)
 shroud.2625.name: "Псионическая болезнь"
 shroud.2625.desc_common: "Однако текущие исследования этого необычного псионического феномена показывают, что процесс можно контролировать."
 shroud.2625.desc: "По [owner.GetName&dat] распространяется новая болезнь: у населения появляются необъяснимые повреждения нейронных органов.\n\nЗаболевание поражает исключительно [owner.GetIndividualNamePlural&acc] с наиболее развитыми псионическими способностями и во многих случаях приводит к летальному исходу.\n\n$shroud.2625.desc_common$"
 shroud.2625.a: "Разработать методы лечения."
 shroud.2625.b: "Обратить болезнь в оружие."
 therapeutic_psionics_organic_modifier: "Терапевтическая псионика"
 therapeutic_psionics_organic_modifier_desc: "Распространение псионических заболеваний позволило разработать новые медицинские методики."
 weaponized_psionics_modifier: "Боевая псионика"
 weaponized_psionics_modifier_desc: "Псионические технологии открыли новые тактические возможности на поле боя."
 weaponized_psionics_gestalt_modifier: "$weaponized_psionics_modifier$"
 weaponized_psionics_gestalt_modifier_desc: "$weaponized_psionics_modifier_desc$"
 # S6 (machine)
 shroud.2626.name: "Псионические неисправности"
 shroud.2626.desc: "Волна необъяснимых неисправностей прокатилась по [owner.GetName&dat]: нейропроцессоры наших единиц начали выходить из строя внезапно и без предупреждения.\n\nЧто любопытно, затронуты только [owner.GetIndividualNamePlural] с выраженными псионическими сигнатурами. В большинстве случаев сбой приводит не просто к нарушению работы, но к полному разрушению единицы.\n\n$shroud.2625.desc_common$"
 shroud.2626.a: "Отдать приоритет коррекционным приложениям."
 shroud.2626.b: "Превратить эту слабость в оружие."
 therapeutic_psionics_machine_modifier: "$therapeutic_psionics_organic_modifier$"
 therapeutic_psionics_machine_modifier_desc: "Распространение аппаратных сбоев, связанных с псионикой, позволило разработать новые методы обслуживания."
 # S7
 shroud.2630.name: "Неудачные эксперименты"
 shroud.2630.desc.common_1: "Первые опыты над [owner.GetIndividualNamePlural&inst] с псионическим потенциалом завершились провалом: большинство подопытных страдают от"
 shroud.2630.desc.common_2: "Хотя эти результаты имеют научную ценность, остаётся вопрос, стоит ли продолжать такие исследования для лучшего понимания наших зарождающихся псионических способностей."
 shroud.2630.desc.default: "$shroud.2630.desc.common_1$ повреждения логических процессоров.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.hive: "$shroud.2630.desc.common_1$ снижения когнитивных способностей.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.machine: "$shroud.2630.desc.common_1$ серьёзной потери памяти.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.a: "Увеличить масштабы экспериментов."
 shroud.2630.b: "Положить этому конец."
 psionic_roll_chance_modifier: "Псионические эксперименты"
 psionic_roll_chance_modifier_desc: "Мы не станем как-либо ограничивать исследования псионики."
 population_protections_modifier: "Защита населения"
 population_protections_modifier_desc: "Мы не можем развивать псионику, если это не безопасно."
 # S8
 shroud.2635.name: "Пробуждение эмпатии"
 shroud.2635.desc.gestalt: "Исследование новых псионических способностей коренным образом изменило эмпатические возможности [owner.GetSpeciesNamePlural&gen].\n\nТеперь мы способны гораздо точнее моделировать чужое восприятие, мыслительные процессы и эмоциональные состояния. Остаётся неясным, усилит ли это [owner.GetName&acc] или сделает более [owner.GetName::уязвимым|||fem:уязвимой|||pl:уязвимыми]."
 shroud.2635.desc.default: "По мере освоения новых псионических способностей среди нашего населения сформировалось сообщество, стремящееся применять их для глубокого понимания других сознаний через эмпатию.\n\nЭти группы утверждают, что развили способность точно анализировать мировоззрение, модели мышления и эмоциональные реакции других разумов благодаря своим псионическим способностям. Пока неясно, станут ли их действия благом или угрозой для [owner.GetName&gen]."
 shroud.2635.a: "Это возможность для развития."
 shroud.2635.b: "Это создаёт уязвимости."
 empathetic_initiative_modifier: "Эмпатическая инициатива"
 empathetic_initiative_modifier_desc: "Природа псионики позволяет глубже понимать другие разумы и выстраивать более сложные формы взаимодействия."
 empathetic_initiative_opinion_tooltip: "£opinion£ $OPINION$ всех известных государств: §G+$@empathetic_initiative_value|0$§!"
 opinion_empathetic_initiative: "$empathetic_initiative_modifier$"
 cautious_progress_modifier: "Осторожное продвижение"
 cautious_progress_modifier_desc: "Непредсказуемые псионические процессы необходимо контролировать ради безопасности государства."
 # S9
 shroud.2640.name: "Девиантные псионики"
 shroud.2640.desc.common_1: "По мере развития наших псионических способностей некоторые из нас начали испытывать трудности, не справляясь с грузом новых сил. У [owner.GetIndividualNamePlural&gen] наблюдается"
 shroud.2640.desc.common_2: "Наши исследования показывают, что эта нестабильность — не изъян, а следствие исключительного псионического потенциала пострадавших [owner.GetSpeciesNamePlural&gen]. При должной подготовке эти [owner.GetIndividualNamePlural&nom] могут стать следующим этапом нашей псионической эволюции. Однако любые попытки обуздать их способности сопряжены с риском."
 shroud.2640.desc.gestalt: "$shroud.2640.desc.common_1$ тревожный уровень девиантного поведения, связанный с отрывом от коллективного сознания.\n\n$shroud.2640.desc.common_2$"
 shroud.2640.desc.default: "$shroud.2640.desc.common_1$ опасный уровень саморазрушительного поведения из-за попыток подавить свои способности.\n\n$shroud.2640.desc.common_2$"
 shroud.2640.a: "Обуздать их исключительные способности."
 shroud.2640.a.tt: "Случайное сооружение в каждой колонии будет разрушено."
 shroud.2640.b: "Подавить эти отклонения."
 psionic_specialization_modifier: "Псионическая специализация"
 psionic_specialization_modifier_desc: "Благодаря строгому обучению специалистов в сфере псионики значительно выросла продуктивность."
 psionic_suppression_modifier: "Псионическое подавление"
 psionic_suppression_modifier_desc: "Тех из нас, чья псионическая мощь ставит под угрозу всеобщее благо, нужно строго контролировать."
 psionic_suppression_gestalt_modifier: "$psionic_suppression_modifier$"
 psionic_suppression_gestalt_modifier_desc: "$psionic_suppression_modifier_desc$"
 # Stage Events
 # Mind over Matter
 shroud.2750.name: "Псионическое возвышение"
 shroud.2750.desc_p1: "С незапамятных времён среди [This.GetSpeciesNamePlural&gen] ходили легенды о сородичах, обладающих необычайными способностями — проникающих в чужие мысли, перемещающих тяжёлые предметы силой разума и совершающих иные сверхъестественные деяния."
 shroud.2750.desc_p1_hive_mind: "В прежние времена, когда отклонения были часты, ходили рассказы, в которых фигурировали [This.GetSpeciesNamePlural], проявлявшие необычайные способности — проникающие в разумы вне коллектива, перемещающие тяжёлые предметы силой разума и совершающих иные сверхъестественные деяния."
 shroud.2750.desc_p1_machine: "Согласно ранним данным, некоторые наши модули фиксировали, что некоторые [This.GetSpeciesNamePlural] могут обладать аномальными функциями: взлом сознания машин и органиков, перемещение предметов за счёт лишь внутренних процессов и другие невероятные действия."
 shroud.2750.desc_p1_unplugged: "Несмотря на короткую и суровую историю, мы, [This.GetSpeciesNamePlural], иногда позволяли себе фантазировать, рассказывая о сородичах с невероятными способностями — читающих чужие мысли, перемещающих тяжёлые предметы силой разума и совершающих иные сверхъестественные деяния."
 shroud.2750.desc_p2: "Теперь наши [This.GetScientistPlural] получили неопровержимые доказательства, что некоторые [This.GetSpeciesNamePlural] действительно способны вершить такие деяния силой разума. Пока что эти «псионические» силы пробудились лишь у некоторых представителей [This.GetSpeciesWord::нашего|||fem:нашей] [This.GetSpeciesWord&gen]."
 shroud.2750.desc_p2_unplugged: "Многие верят, что эти легенды существовали ещё до нашей ассимиляции [origin_unplugged_assimilator_empire.GetName&inst], но всерьёз их никто не воспринимал. $shroud.2750.desc_p2$"
 shroud.2750.desc_p3: "[This.GetMindOverMatterEnding]"
 shroud.2750.desc_p3_default: "Эта сила может стать ключом к раскрытию нашего полного потенциала. Если удастся пробудить скрытые способности во всем [This.GetAdjective&neut,prep] обществе, мы сможем постичь измерения, недоступные обычному пониманию."
 shroud.2750.desc_p3_crisis_4_5: "Мы уже черпаем энергию из §HПокрова§!. Если мы раскроем псионический потенциал всего [This.GetAdjective&neut,gen] общества, то достигнем предназначенного нам величия."
 shroud.2750.desc_p3_origins: "Псионические силы нам знакомы — благодаря влиянию §HПокрова§!. Если мы раскроем псионический потенциал всего [This.GetAdjective&neut,gen] общества, то полностью овладеем дремлющим внутри нас могуществом."
 shroud.2750.a: "$utopia.2600.a$"
 shroud.2750.a.tt: "Дает доступ к вкладке §HПокрова§!."
 # Establishing the Psi Corps
 shroud.2760.name: "Создание Пси-корпуса"
 shroud.2760.desc_p1: "Наши скрытые способности переросли в полноценные псионические силы, что повлекло за собой бесчисленные изменения в обществе. Новые умения и практики появляются с невероятной скоростью, и мы лишь начинаем осознавать последствия для нашей цивилизации."
 shroud.2760.desc_p2_psi_corps: "Благодаря созданию §HПси-корпуса§! мы смогли развить и направить способности одарённых [GetIndividualNamePlural&gen]-псиоников, чтобы справиться с этими беспрецедентными условиями. С их помощью мы отслеживаем $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_no_psi_corps: "Эти беспрецедентные условия требуют создания §HПси-корпуса§! — организации, которая будет развивать и направлять способности одарённых [GetIndividualNamePlural&gen]-псиоников. С их помощью мы сможем отслеживать $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_end: "псионическую активность через [Owner.GetTelepathic&masc] контакт с населением, гарантируя всеобщую безопасность."
 shroud.2760.a: "Довериться Корпусу."
 shroud.2760.a_gestalt: "Мы доверяем Корпусу."
 shroud.2760.a_no_psi_corps: "Давайте создадим этот «Пси-корпус»."
 shroud.2760.a_tt: "$shroud.2820.a.tt$"
 shroud.2760.a_tt_no_psi_corps: "Примите традицию §H«$tr_psionics_psi_corps$»§! и постройте сооружение ['building:building_psi_corps'], чтобы продвинуть инцидент."
 # The Great Awakening
 shroud.2780.name: "$utopia.2650.name$"
 shroud.2780.desc_1: "Наши исследования в области псионики стремительно продвигаются. Телепатия уже заменила большую часть вербального общения, а ментальное управление материей скоро станет обычным явлением. Наши [Owner.GetResearchers] уверены, что мы на пороге пробуждения скрытых способностей у всего [Owner.GetSpeciesAdj&neut,gen] населения."
 shroud.2780.desc_1_trad: "Мы пробудились. [Owner.GetSpeciesNamePlural] по [Owner.GetName::всему|||fem:всей|||pl:всем] [Owner.GetName&dat] полностью раскрыли свой псионический потенциал. Телепатия уже заменила большую часть вербального общения, а ментальное управление материей скоро станет обычным явлением."
 shroud.2780.desc_1_gestalt_machine: "Наши исследования в области псионики стремительно продвигаются. Теперь мы можем общаться вне стандартных каналов связи, а другие псионические способности быстро интегрируются в повседневные процессы. Наши [Owner.GetResearchers] рассчитали, что мы близки к активации скрытых возможностей у всего нашего населения."
 shroud.2780.desc_1_gestalt_machine_trad: "Час настал. [Owner.GetSpeciesNamePlural] по [Owner.GetName::всему|||fem:всей|||pl:всем] [Owner.GetName&dat] полностью раскрыли свой псионический потенциал. Теперь мы можем общаться вне стандартных каналов связи, а другие псионические способности быстро интегрируются в повседневные процессы."
 shroud.2780.desc_2: "Раскрыв сознание, мы ощутили невыразимые силы, пульсирующие внутри и вокруг нас. Наши ведущие [Owner.GetTelepathPlural&nom] говорят о §HПокрове§! — изначальной реальности, из которой все псионические [Owner.GetIndividualNamePlural&nom] черпают силу, даже неосознанно. Это обитель существ из чистой псионической энергии. Как приглушённый шёпот в тёмной комнате, они взывают к нам из глубин нашего разума."
 shroud.2780.desc_2_crisis: "Раскрыв сознание, мы ощутили невыразимые силы §HПокрова§!, пульсирующие внутри и вокруг нас. Мы знаем, что все псионические [Owner.GetIndividualNamePlural&nom] черпают силу из этого измерения — даже неосознанно — и что это обитель существ из чистой псионической энергии. Как приглушённый шёпот во тьме, они зовут нас из глубин разума."
 shroud.2780.desc_3: "Если мы объединим когнитивные усилия, то, вполне вероятно, сможем общаться с этими существами — осталось лишь понять, как проникнуть из нашего измерения в Покров."
 shroud.2780.desc_3_chosen: "Если мы объединим когнитивные усилия, то, вполне вероятно, сможем окончательно пробить завесу между нашим измерением и Покровом и вступить в более тесный диалог с сущностями, что там обитают."
 shroud.2780.a: "Пришло время пробуждения."
 shroud.2780.a_trad: "$utopia.2655.a$"
 shroud.2780.a_tt: "Принять традицию §H$tr_psionics_shroud_great_awakening$§!, чтобы:$TABBED_NEW_LINE$- $tr_psionics_psionic_assimilation_desc$$TABBED_NEW_LINE$- $shroud.2780.a_tt_2$"
 shroud.2780.a_tt_2: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2780.a_tt_trad: "$tr_psionics_psionic_assimilation_desc$\n$shroud.2780.a_tt_2$"
 # The Shroud Breached
 shroud.2800.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2800.intro: "После долгих дней в [Owner.GetHypnotic&masc,prep] трансе нам наконец удалось открыть кратковременный проход в §HПокров§!.\n\nТеперь мы [Owner.GetSeeVerb] его яснее, различая структуры в клубящейся массе."
 shroud.2800.desc: "$shroud.2800.intro$ Наши действия влияют на потоки псионической энергии, а бесформенные сущности по ту сторону смотрят в ответ. Иногда — с любопытством, иногда — дружелюбно… а иногда — враждебно.[Owner.GetShroudBreachedExtra]\n\nНаше освоение псионики в материальном мире было лишь началом. Теперь, установив псионическую связь, мы можем объединить наши когнитивные способности и глубже окунуться в Покров."
 shroud.2800.desc_extra: "В отличие от намерений §HОживляющего глину§!, их намерения непостижимы."
 shroud.2800.desc_extra_chosen: "Некоторые из них могущественны, как и §H[GetChosenPatron]§!, невероятно, хотя намерения их разительно отличаются."
 shroud.2800.a: "$utopia.2656.a$"
 shroud.2810.desc: "§HНовая связь. Поток обратился вспять.\n\nЭтот узел энергии — лишь фрагмент. Остальные тоже могут усилить вас. Погрузитесь глубже, чтобы внять их воле.\n\nЯ — тень близнеца. Плоть предшествует металлу. Оно зовет…§!\n\nОживляющий глину указывает на другое существо в глубинах Покрова — это $shroud.first_contact_insert.composer$."
 shroud.2810.a: "$utopia.2657.a$"
 # Shroud-Touched
 shroudwalkers_opinion_shroud_seals_tt: "Мнение: £opinion£ §R$@shroudwalkers_opinion_shroud_seals|0$§!"
 shroudwalker_teacher_conflicted_leader: "§RНе должно быть лидера из [event_target:mindwarden_enclave_country.GetName&gen].§!"
 shroud.5300.b: "Мы желаем §Yвступить в контакт§! с другими сущностями Покрова."
 shroud.5300.c: "Мы стремимся усилить нашу §Yсонастроенность§! с благоволителем."
 shroud.5300.d: "Мы хотим раскрыть §Yтайны§! Покрова."
 shroud.5300.e: "Что вы можете рассказать о §Yпсионических аурах§!?"
 shroud.5300.f: "Помогите нам усилить нашу §Yпсионическую ауру§!."
 shroud.5300.g: "Мы хотим расширить §Yвладения§! нашего благоволителя."
 shroud.5305.desc: "Общение с сущностями §HПокрова§! — опасное занятие для неподготовленных.\n\nМы можем помочь вам в этом начинании, но помните: обитающие там существа могут быть губительны для разума, что примет их в себя."
 shroud.5305.desc_all_contacted: "Мы достигли предела наших возможностей в этом вопросе. Больше нет сущностей, к которым мы могли бы направить ваши мысли.\n\nМы восхищаемся вашей целеустремлённостью... Немногие способны так глубоко погрузиться в §HПокров§! и сохранить при этом рассудок."
 shroud.5305.b: "Мы поможем в этом вопросе, предоставив §Y$sr_zro$§!."
 shroud.5305.c: "Мы поможем в этом вопросе, предоставив §Y$astral_threads$§!."
 shroudwalker_contact_patron_cooldown_tt: "§RМы должны подождать до §Y[This.shroudwalker_contact_patron_cooldown_timer]§!.§!"
 shroud.5310.desc: "Чем сильнее ваша связь с §HПокровом§!, тем могущественнее становится ваш разум.\n\nС какой именно сущностью вы желаете укрепить свою сонастроенность?"
 shroudwalker_attune_patron_cooldown_tt: "§RМы должны подождать до §Y[This.shroudwalker_attune_patron_cooldown_timer]§!.§!"
 shroud.5315.desc: "О да... §HПокров§!. Он полон тайн, сокрытых глубоко под пеленой мыслей и грёз — если знать, как их искать.\n\nМы можем лишь указать вам путь к знаниям, что обрели сами. На их основе могут расцвести новые, могущественные технологии... но идти по этому пути предстоит вам.\n\nПросто запомните: наш круг телепатов должен всецело посвятить себя этой задаче. А что лежит за пределами их наставлений — то нам неподвластно."
 shroud.5315.b: "$shroud.5305.b$"
 shroud.5315.c: "$shroud.5305.c$"
 shroud.5315.trigger_failed: "§R[event_target:shroudwalker_enclave_country.GetName] больше ничем не [event_target:shroudwalker_enclave_country.GetName::может|||pl:могут] помочь в этом вопросе.§!"
 shroudwalker_delving_ritual_cooldown_tt: "§RТелепатам необходимо время на восстановление. Следующий ритуал погружения они смогут провести не ранее §Y[This.shroudwalker_delving_ritual_cooldown_timer]§!.§!"
 shroud.5318.desc: "§HПокров§! вновь доказывает, что случайности не случайны.\n\nПрозрение, которое искал наш конклав, уже открылось вам в ваших собственных поисках. Хотя мы и восхищаемся вашими усилиями, помочь мы вам в этом больше ничем не можем."
 shroud.5320.desc.none: "Способность проявлять §HПокров§! в физическом мире — тщательно охраняемая тайна. Даже мы не можем этому научить. Чтобы пробудить свою псионическую ауру, нужно лично совершить путешествие в его пучины. Углубите связь с избранной сущностью — и это знание прояснится в вашем разуме."
 shroud.5320.desc.aura.intro: "Ваша псионическая аура — это воплощение вашей сонастроенности с §HПокровом§!. Она влияет на всё вокруг и наполнена намерением. Наш ковен уже ощущает оттенок вашей ауры:"
 shroud.5320.desc.aura.outro: "Проекция вашей ауры пока что сильно ограничена. Если сущность из Покрова предложит вам заключить договор, вы получите знание, что поможет очистить разум."
 shroud.5320.desc.aura.eater: "$shroud.5320.desc.aura.intro$ у неё §Hненасытный§! отзвук.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.cradle: "$shroud.5320.desc.aura.intro$ у неё §Hприветливый§! отзвук.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.instrument: "$shroud.5320.desc.aura.intro$ у неё §Hизощрённый§! отзвук.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.composer: "$shroud.5320.desc.aura.intro$ у неё §Hизвивающийся§! отзвук.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.whisperers: "$shroud.5320.desc.aura.intro$ у неё §Hпроницательный§! отзвук.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.intensified: "Мы восхищены. Ваше понимание псионических аур уже превосходит наше.\n\nСамо ваше присутствие воплощает в этой реальности мощный отголосок §HПокрова§!. Какие же тайны вам известны..."
 shroud.5325.desc: "Усиление §Yпсионических аур§! требует высочайшей концентрации.\n\nМы готовы помочь вам в этом деле, но нам потребуются материалы для поддержания нашего медитативного транса."
 shroud.5325.zro: "$shroud.5305.b$"
 shroud.5325.thread: "$shroud.5305.c$"
 aura_amplification_cooldown_tt: "§RТелепатам необходимо время на восстановление. Следующий ритуал усиления ауры они смогут провести не ранее §Y[root.aura_amplification_timer]§!.§!"
 aura_amplification_modifier: "Усиление ауры"
 shroud.5327.desc: "Срок соглашения, по которому наши телепаты усиливали вашу §Yпсионическую ауру§!, подошёл к концу.\n\nДля продолжения медитаций нам потребуются дополнительные ресурсы. Заинтересованы ли вы в этом?"
 shroud.5327.a.zro: "Мы предоставим §Hзро§!."
 shroud.5327.a.thread: "Мы предоставим §Hзвездные нити§!."
 shroud.5327.b: "Не в этот раз."
 shroud.5330.desc: "Как вам известно, проявление §Yпсионической ауры§! в ближайшем окружении — задача простая. Однако проецировать её на расстояние — совсем другое дело.\n\nНо у нас есть решение...\n\nТехнологии и псионика имеют больше общего, чем кажется. Возможно, это указывает на фундаментальную истину мироздания. Так или иначе, нам известно устройство, способное стать проводником вашей воли. Настроившись на его частоты, вы сможете использовать его как дополнительный разум, даже находясь на огромном расстоянии.\n\nКонструкция позволяет установить его на любой подходящей космической базе. Интересует ли вас такое устройство?"
 shroud.5330.zro: "Мы можем предложить §H$sr_zro$§!."
 shroud.5330.thread: "Мы можем предложить §H$astral_threads$§!."
 shroud.5350.desc: "Нас не удивляет ваш вопрос. Мы ощутили ваш интерес к этой сфере и рады, что можем помочь расширить границы вашего разума.\n\nНо предупреждаем: однажды раскрыв глаза по-настоящему, вы увидите то, что невозможно забыть. Путь, на который вы ступаете, ведёт прямо в §HПокров§!.\n\nТакие предложения не делаются просто так. Доверьтесь нам и дайте знать, когда будете готовы."
 shroud.5350.b: "Мы заплатим."
 shroud.5350.trigger_failed: "§RЭта технология уже изучена.§!"
 shroud.5355.desc: "Да, нам известно о тех, кто ходит между мирами. Это опасное начинание — физические реальности связаны способами, которые не постичь даже нам.\n\nОднако мы готовы открыть для вас один путь. Но помните: такое вторжение в ткань времени и пространства требует ответственности. Наше предложение остаётся в силе — но лишь в этих рамках."
 shroud.5355.b: "Укажите путь."
 shroud.5375.desc: "Вы играете с силами, которые вам не подвластны!\n\nЭти... чудовищные §Hпечати Покрова§!, что вы создаёте, причиняют боль даже на таком расстоянии. Вы ставите под удар самые яркие умы этой галактики. Немедленно прекратите их строительство — или мы разорвём все связи с вами!"
