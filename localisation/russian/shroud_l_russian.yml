 shroud_suppression_desc: "На наши действия пытаются влиять псионические сущности. Эти импульсы необходимо подавлять."
 psionic_inhibitors: "Псионические подавители"
 psionic_inhibitors_desc: "Мы разрабатываем импланты, подавляющие психические нарушения, вызванные псионической активностью."
 psionic_inhibitors_machine: "$psionic_inhibitors$"
