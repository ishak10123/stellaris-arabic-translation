 THE_SHROUD_TITLE: "Покров"
 SHROUD_HEADER_INSIGHT_TT: "$SHROUD_HEADER_TT$\n\nРазыщите местных благоволителей и заручитесь их расположением, добившись должной §Hсонастроенности§!."
